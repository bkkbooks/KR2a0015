body:
  text: 晉書卷一百十載記第十慕容俊韓李産産子績慕容俊字宣英皓之第二子也初廆常言吾積福纍仁子孫當有中原既而生俊廆曰此兒骨相不吾家得之矣及長身長八尺二寸姿貌魁偉博觀圖書有文武幹略皓為燕王拜俊假節安北將軍東夷校尉左賢王燕王世子皓死永和五年僭即燕王位依春秋列國故事稱元年赦于境內是時石季龍死趙魏大亂俊將圖兼并之計以慕容恪為輔國將軍慕容評為輔弼將軍陽騖為輔義將軍慕容垂為前鋒都督建鋒將軍簡精卒二十餘萬以待期是歲穆帝使謁者陳沈拜俊為使持節侍中大都督都督河北諸軍事幽冀并平四州牧大將軍大單于燕王承制封拜一如廆皓故事明年俊率三軍南伐出自盧龍次于無終石季龍幽州刺史王午棄城走留其將王他守薊俊攻陷其城斬他因而都之徙廣寧上谷人于徐無代郡人于凡城而還及冉閔殺石祗僭稱大號遣其使人常煒聘於俊俊引之觀下使其記室封裕詰之曰冉閔養息常才負恩篡逆有何祥應而僭稱大號煒曰天之所興其致不同狼烏紀于三王麟龍表于漢魏寡君應天馭曆能無祥乎且用兵殺伐哲王盛典湯武親行誅放而仲尼美之魏武養於宦官莫知所出衆不盈旅遂能終成大功暴胡酷亂蒼生屠膾寡君奮劍而誅除之黎元獲濟可謂功格皇天勳侔高祖恭承乾命有何不可裕曰石祗去歲使張舉請救云璽在襄國其言信不又聞閔鑄金為己象壞而不成奈何言有天命煒曰誅胡之日在鄴者略無所遺璽何從而向襄國此求救之辭耳天之神璽實在寡君且妖孽之徒欲假奇眩衆或改作萬端以神其事寡君今已握乾符類上帝四海懸諸掌大業集於身何所求慮而取信此乎鑄形之事所未聞也俊既鋭信舉言又欣于閔鑄形之不成也必欲審之乃積薪置火於其側命裕等以意喻之煒神色自若抗言曰結髮已來尚不欺庸人況千乘乎巧詐虛言以救死者使臣所不為也直道受戮死自分耳益薪速火君之大惠左右勸俊殺之俊曰古者兵交使在其間此亦人臣常事遂赦之遣慕容恪略地中山慕容評攻王午于魯口恪次唐城冉閔將白同中山太守侯龕固守不下恪留其將慕容彪攻之進討常山評次南安王午遣其將鄭生距評評逆擊斬之侯龕踰城出降恪進克中山斬白同俊軍令嚴明諸將無所犯閔章武太守賈堅率郡兵邀評戰于高城擒堅於陳斬首三千餘級是歲丁零翟鼠及冉閔將劉準等率其所部降于俊封鼠歸義王拜準左司馬時鮮卑段勤初附於俊其後復叛俊遣慕容恪及相國封奕討冉閔于安喜慕容垂討段勤于繹慕俊如中山為二軍聲勢閔懼奔于常山恪追及於泒水閔威名素振衆咸憚之恪謂諸將曰閔師老卒疲實為難用加其勇而無謀一夫之敵耳雖有甲兵不足擊也吾今分軍為三部掎角以待之閔性輕鋭又知吾軍勢非其敵必出萬死衝吾中軍吾今貫甲厚陳以俟其至諸君但厲卒從旁須其戰合夾而擊之蔑不克也及戰敗之斬首七千餘級擒閔送之斬於龍城恪屯軍呼閔將蘇亥遣其將金光率騎數千襲恪恪逆擊斬之亥大懼奔于并州恪進據常山段勤懼而請降遂進攻鄴閔將蔣幹閉城距守俊又遣慕容評等率騎一萬會攻鄴是時燈巢于俊正陽殿之西椒生三雛項上有豎毛凡城獻異鳥五色成章俊謂羣僚曰是何祥也咸稱燈者燕鳥也首有毛冠者言大燕龍興冠通天章甫之象也正陽西椒者言至尊臨軒朝萬國之徵也三子者數應三統之驗也神鳥五色言聖朝將繼五行之籙以御四海者也俊覽之大悅既而蔣幹率鋭卒五千出城挑戰慕容評等擊敗之斬首四千餘級幹單騎還鄴於是羣臣勸俊稱尊號俊答曰吾本幽漠射獵之鄉被髮左袵之俗曆數之籙寧有分邪卿等苟相褒舉以覬非望實匪寡德所宜聞也慕容恪封奕討王午于魯口降之尋而慕容評攻克鄴城送冉閔妻子僚屬及其文物于中山先是蔣幹以傳國璽送于建鄴俊欲神其事業言曆運在己乃詐云閔妻得之以獻賜號曰奉璽君因以永和八年僭即皇帝位大赦境內建元曰元璽署置百官以封奕為太尉慕容恪為侍中陽騖為尚書令皇甫真為尚書左僕射張希為尚書右僕射宋活為中書監韓為中書令其餘封授各有差追尊廆為高祖武宣皇帝皓為太祖文明皇帝時朝廷遣使詣俊俊謂使者曰汝還白汝天子我承人乏為中國所推已為帝矣初石季龍使人探策于華山得玉版文曰歲在申酉不絶如線歲在壬子真人乃見及此燕人咸以為俊之應也改司州為中州置司隸校尉官羣下言大燕受命上承光紀黑精之君運曆傳屬代金行之后宜行夏之時服周之冕旗幟尚黑牲牡尚玄俊從之其從行文武諸藩使人及登號之日者悉增位三級泒河之師守鄴之軍下及戰士賜各有差臨陳戰亡者將士加贈二等士卒復其子孫殿中舊人皆隨才擢立其妻可足渾氏為皇后世子曄為皇太子晉寧朔將軍榮胡以彭城魯郡叛降于俊常山人李犢聚衆數千反于普壁壘俊遣慕容恪率衆討降之初冉閔既敗王午自號安國王午既死呂護復襲其號保于魯口恪進討走之遣前軍悅綰追及于野王悉降其衆姚襄以梁國降于俊以慕容評為都督秦雍益梁江揚荊徐兗豫十州河南諸軍事權鎮于洛水慕容彊為前鋒都督都督荊徐二州緣淮諸軍事進據河南俊自和龍至薊城幽冀之人以為東遷互相驚擾所在屯結其下請討之俊曰羣小以朕東巡故相惑耳今朕既至尋當自定然不虞之備亦不可不為於是令內外戒嚴苻生河內太守王會黎陽太守韓高以郡歸俊晉蘭陵太守孫黑濟北太守高柱建興太守高各以郡叛歸于俊初俊車騎大將軍范陽公劉寧屯據蕕城降于苻氏至此率戶二千詣薊歸罪拜後將軍高句麗王釗遣使謝恩貢其方物俊以釗為營州諸軍事征東大將軍營州刺史封樂浪公王如故俊給事黃門侍郎申胤上言曰夫名尊禮重先王之制冠冕之式代或不同漢以蕭曹之功有殊羣辟故劍履上殿入朝不趨世無其功則禮宜闕也至於東宮體此為儀魏晉因循制不納舄今皇儲過謙準同百僚禮卑逼下有違朝式太子有統天之重而與諸王齊冠遠游非所以辨章貴賤也祭饗朝慶宜正服衮衣九文冠冕九旒又仲冬長至太陰數終黃鍾産氣綿微於下此月閉關息旅后不省方禮記曰是月也事欲靜君子齊戒去聲色唯周官有天子之南郊從八能之說或以有事至靈非朝饗之節故有樂作之理王者慎微禮從其重前來二至闕鼓不宜有設今之鏗鏘蓋以常儀二至之禮事殊餘節猥動金聲驚越神氣施之宣養實為未盡又朝服雖是古禮絳始於秦漢迄于今代遂相仍準朔望正旦乃具衮舄禮諸侯旅見天子不得終事者三雨沾服失容其在一焉今或朝日天雨未有定儀禮貴適時不在過恭近以地溼不得納舄而以衮襈改履案言稱朝服所以服之而朝一體之間上下二制或廢或存實乖禮意大燕受命侔蹤虞夏諸所施行宜損益定之以為皇代永制俊曰其劍舄不趨事下太常參議太子服衮冕冠九旒超級逼上未可行也冠服何容一施一廢皆可詳定初段蘭之子龕因冉閔之亂擁衆東屯廣固自號齊王稱藩于建鄴遣書抗中表之儀非俊正位俊遣慕容恪慕容塵討之恪既濟河龕弟羆驍勇有智計言於龕曰慕容恪善用兵加其衆旅既盛恐不可抗也若頓兵城下雖復請降懼終不聽王但固守羆請率精鋭距之若其戰捷王可馳來追擊使虜匹馬無反如其敗也遽出請降不失千戶侯也龕弗從羆固請行龕怒斬之率衆三萬來距恪恪遇龕於濟水之南與戰大敗之遂斬其弟欽盡俘其衆恪進圍廣固諸將勸恪宜急攻之恪曰軍勢有宜緩以克敵有宜急而取之若彼我勢均且有強援慮腹背之患者須急攻之以速大利如其我強彼弱外無寇援力足制之者當羈縻守之以待其斃兵法十圍五攻此之謂也龕恩結賊黨衆未離心濟南之戰非不鋭也但其用之無術以致敗耳今憑固天險上下同心攻守勢倍軍之常法若其促攻不過數旬克之必矣但恐傷吾士衆自有事已來卒不獲寧吾每思之不覺忘寢亦何宜輕殘人命乎當持久以取耳諸將皆曰非所及也乃築室反耕嚴固圍壘龕所署徐州刺史王騰索頭單于薛雲降于恪段龕之被圍也遣使詣建鄴請救穆帝遣北中郎將荀羡赴之憚虜強遷延不敢進攻破陽都斬王騰以歸恪遂克廣固以龕為伏順將軍徙鮮卑胡羯三千餘戶于薊留慕容塵鎮廣固恪振旅而歸俊太子曄死僞諡獻懷升平元年復立次子暐為皇太子赦其境內改元曰光壽遣其撫軍慕容垂中軍慕容虔與護軍平熙等率步騎八萬討丁零敕勒于塞北大破之俘斬十餘萬級獲馬十三萬匹牛羊億餘萬初廆有駿馬曰赭白有奇相逸力石季龍之伐棘城也皓將出避難欲乘之馬悲鳴踶齧人莫能近皓曰此馬見異先朝孤常仗之濟難今不欲者蓋先君之意乎乃止季龍尋退皓益奇之至是四十九歲矣而駿逸不虧俊比之於鮑氏驄命鑄銅以圖其象親為銘贊鐫勒其旁置之薊城東掖門是歲象成而馬死胸奴單于賀賴頭率部落三萬五千降于俊拜寧西將軍雲中郡公處之于代郡平舒城晉太山太守諸葛攸伐其東郡俊遣慕容恪距戰王師敗績北中郎將謝萬先據梁宋懼而遁歸恪進兵入寇河南汝潁譙沛皆陷置守宰而還俊自薊城遷于鄴赦其境內繕修宮殿復銅雀臺廷尉監常煒上言大燕雖革命創制至於朝廷銓謨亦多因循魏晉唯祖父不殮葬者獨不聽官身清朝斯誠王教之首不刊之式然禮貴適時世或損益是以高祖制三章之法而秦人安之自頃中州喪亂連兵積年或遇傾城之敗覆軍之禍坑師沈卒往往而然孤孫煢子十室而九兼三方嶽峙父子異邦存亡吉凶杳成天外或便假一時或依嬴博之制孝子糜身無補順孫心喪靡及雖招魂虛葬以罔極之情又禮無招葬之文令不此載若斯之流抱琳琅而無申懷英才而不齒誠可痛也恐非明揚側陋務盡時珍之道吳起二陳之疇終將無所展其才幹漢祖何由免於平城之圍郅支之首何以懸於漢關謹案戊辰詔書蕩清瑕穢與天下更始以明惟新之慶五六年間尋相違伐於則天之體臣竊未安俊曰煒宿德碩儒練明刑法覽其所陳良足採也今六合未寧喪亂未已又正當搜奇拔異之秋未可才行兼舉且除此條聽大同更議使昌黎遼東二郡營起廆廟范陽燕郡構皓廟以其護軍平熙領將作大匠監造二廟焉苻堅平州刺史劉特率戶五千降于俊河間李黑聚衆千餘攻略州郡殺棗彊令衛顏俊長樂太守傅顏討斬之常山大樹自拔根下得璧七十圭七十三光色精奇有異常玉俊以為嶽神之命遣其尚書郎段勤以太牢祀之初冉閔之僭號也石季龍將李歷張平高昌等並率其所部稱藩於俊遣子入侍既而投款建鄴結援苻堅並受爵位羈縻自固雖貢使不絶而誠節未盡呂護之走野王也遣弟奉表謝罪於俊拜寧南將軍河內太守又上黨馮鴦自稱太守附于張平平屢言之俊以平故赦其罪以為京兆太守護鴦亦陰通京師張平跨有新興雁門西河太原上黨上郡之地壘壁三百餘胡晉十餘萬戶遂拜置征鎮為鼎跱之勢俊遣其司徒慕容評討平領軍慕輿根討鴦司空陽騖討昌撫軍慕容臧攻歷并州壘壁降者百餘所以尚書右僕射悅綰為安西將軍領護胸奴中郎將并州刺史以撫之平所署征西諸葛驤鎮北蘇象寧東喬庶鎮南石賢等率壘壁百三十八降于俊俊大悅皆復其官爵既而平率衆三千奔于平陽鴦奔于野王歷走滎陽昌奔邵陵悉降其衆俊于是復圖入寇兼欲經略關西乃令州郡校閲見丁精覆隱漏率戶留一丁餘悉發之欲使步卒滿一百五十萬期明年大集將進臨洛陽為三方節度武邑劉貴上書極諫陳百姓凋弊召兵非法恐人不堪命有土崩之禍并陳時政不便于時者十有三事俊覽而悅之付公卿博議事多納用乃改為三五占兵寬戎備一周悉令明年季冬赴集鄴都是歲晉將荀羡攻山茌拔之斬俊太山太守賈堅俊青州刺史慕容塵遣司馬悅明救之羡師敗績復陷山茌俊立小學于顯賢里以教胄子封其子泓為濟北王沖為中山王宴羣臣於蒲池酒酣賦詩因談經史語及周太子晉潸然流涕顧謂羣臣曰昔魏武追痛倉舒孫權悼登無已孤常謂二主緣愛稱奇無大雅之體自曄亡以來孤鬚髮中白始知二主有以而然卿等言曄定何如也孤今悼之得無貽怪將來乎其司徒左長史李績對曰獻懷之在東宮臣為中庶子既忝近侍聖質志業臣實不敢不知臣聞道備無愆其唯聖人乎先太子大德有八未見闕也俊曰卿言亦以過矣然試言之績曰至孝自天性與道合此其一也聰敏慧悟機思若流此其二也沈毅好斷理詣無幽此其三也疾諛亮物雅悅直言此其四也好學愛賢不恥下問此其五也英姿邁古藝業超時此其六也虛襟恭讓尊師重道此其七也輕財好施勤恤民隱此其八也俊泣曰卿雖褒譽然此兒若在吾死無憂也吾既不能追蹤唐虞官天下以禪有德近模三王以世傳授景茂幼沖器藝未舉卿以為何如績曰皇太子天資岐嶷聖敬日躋而八德闃然二闕未補雅好遊田娛心絲竹所以為損耳俊顧謂暐曰伯陽之言藥石之惠汝宜戢之因問高年疾苦孤寡不能自存者賜穀帛有差俊夜夢石季龍齧其臂寤而惡之命發其墓剖棺出尸踏而罵之曰死胡安敢夢生天子遣其御史中尉陽約數其殘酷之罪鞭之棄于漳水諸葛攸又率水陸三萬討俊入自石門屯于河渚攸部將匡超進據㕷䱤蕭館屯于新柵又遣督護徐冏率水軍三千泛舟上下為東西聲勢俊遣慕容評傅顏等統步騎五萬戰于東阿王師敗績塞北七國賀蘭涉勒等皆降俄而俊寢疾謂慕容恪曰吾所疾惙然當恐不濟修短命也復何所恨但二寇未除景茂沖幼慮其未堪多難吾欲遠追宋宣以社稷屬汝恪曰太子雖幼天縱聰聖必能勝殘刑措不可以亂正統也俊怒曰兄弟之間豈虛飾也恪曰陛下若以臣堪荷天下之任者寧不能輔少主乎俊曰若汝行周公之事吾復何憂李績清方忠亮堪任大事汝善遇之是時兵集鄴城盜賊互起每夜攻劫晨昏斷行於是寬常賦設奇禁賊盜有相告者賜奉車都尉捕誅賊首木穀和等百餘人乃止升平四年俊死時年四十二在位十一年僞諡景昭皇帝廟號烈祖墓號龍陵俊雅好文籍自初即位至末年講論不倦覽政之暇唯與侍臣錯綜義理凡所著述四十餘篇性嚴重慎威儀未曾以慢服臨朝雖間居宴處亦無懈怠之色云韓字景山灌津人也父默以學行顯名少能屬文師事同郡張載載奇之曰王佐才也身長八尺一寸博覽經籍無所不通永嘉之亂避地遼東廆既逐崔毖復徙昌黎召見嘉之拜參軍事咸和中宋該等建議以廆立功一隅勤誠王室位卑任重不足以鎮華夷宜表請大將軍燕王之號廆納之命羣僚博議咸以為宜如該議駁曰自羣胡乘間人嬰荼毒諸夏蕭條無復綱紀明公忠武篤誠憂勤社稷抗節孤危之中建功萬里之外終古勤王之義未之有也夫立功者患信義不著不患名位不高故桓文有寧復一匡之功亦不先求禮命以令諸侯宜繕甲兵候機會除羣凶靖四海功成之後九錫自至且要君以求寵爵者非為臣之義也廆不平之出為新昌令皓為鎮軍復參軍事遷營丘太守政化大行俊為大將軍徵拜咨議參軍加揚烈將軍俊僭位將定五行次衆論紛紜時疾在龍城俊召以決之未至而羣臣議以燕宜承晉為水德既而至言於俊曰趙有中原非唯人事天所命也天實與之而人奪之臣竊謂不可且大燕王迹始自於震於易震為青龍受命之初有龍見於都邑城龍為木德幽契之符也俊初雖難改後終從議俊祕書監清河聶熊聞言乃歎曰不有君子國何以興其韓令君之謂乎後與李産俱傅東宮從太子曄入朝俊顧謂左右曰此二傅一代偉人未易繼也其見重如此李産字子喬范陽人也少剛厲有志格永嘉之亂同郡祖逖擁衆部於南土力能自固産遂往依之逖素好從橫弟約有大志産微知其旨乃率子弟十數人間行還鄉里仕於石氏為本郡太守及慕容俊南征前鋒達郡界鄉人皆勸産降産曰夫受人之祿當同其安危今若舍此節以圖存義士將謂我何衆潰始詣軍請降俊嘲之曰卿受石氏寵任衣錦本鄉何故不能立功於時而反委質乎烈士處身於世固當如是邪産泣曰誠知天命有歸非微臣所抗然犬馬為主豈忘自效但以孤窮勢蹙致力無術僶俯歸死實非誠款俊嘉其慷慨顧謂左右曰此真長者也乃擢用之歷位尚書性剛正好直言每至進見未曾不論朝政之得失同輩咸憚焉俊亦敬其儒雅前後固辭年老不堪理劇轉拜太子太保謂子績曰以吾之才而致於此始者之願亦已過矣不可復以西夕之年取笑於來今也固辭而歸死於家子績績字伯陽少以風節知名清辨有辭理弱冠為郡功曹時石季龍親征段遼師次范陽百姓饑儉軍供有闕季龍大怒太守惶怖避匿績進曰郡帶北裔與寇接壤疆埸之間人懷危慮聞輿駕親戎將除殘賊雖嬰兒白首咸思效命非唯為國亦自求寧雖身膏草野猶甘為之敢有私吝而闕軍實但比年災儉家有菜色困弊力屈無所取濟逋廢之罪情在可矜季龍見績年少有壯節嘉而恕之於是太守獲免刺史王午辟為主簿俊之南征也隨午奔魯口鄧謂午曰績鄉里在北父已降燕今雖在此終不為用方為人患午曰績於喪亂之中捐家立義情節之重有侔古烈若懷嫌害之必駭衆望乃止午恐績終為所害乃資遣之及到俊責其背親後至績答曰臣聞豫讓報智伯仇稱于前史既官身所在何事非君陛下方弘唐虞之化臣實未謂歸順之晚也俊曰此亦事主之一節耳纍遷太子中庶子及暐立慕容恪欲以績為尚書右僕射暐憾績往言不許恪屢請乃謂恪曰萬機之事委之叔父伯陽一人暐請獨裁績遂憂死
