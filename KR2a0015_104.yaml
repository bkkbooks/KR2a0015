body:
  text: 晉書卷一百四載記第四石勒上石勒字世龍初名鞱上黨武鄉羯人也其先胸奴別部羌渠之胄祖耶奕于父周曷朱一名乞翼加並為部落小率勒生時赤光滿室白氣自天屬于中庭見者咸異之年十四隨邑人行販洛陽倚嘯上東門王衍見而異之顧謂左右曰向者胡雛吾觀其聲視有奇志恐將為天下之患馳遣收之會勒已去長而壯健有膽力雄武好騎射曷朱性凶粗不為羣胡所附每使勒代己督攝部胡愛信之所居武鄉北原山下草木皆有鐵騎之象家園中生人參花葉甚茂悉成人狀父老及相者皆曰此胡狀貌奇異志度非常其終不可量也勸邑人厚遇之時多嗤笑唯塢人郭敬陽曲寧驅以為信然並加資贍勒亦感其恩為之力耕每聞鞞鐸之音歸以告其母母曰作勞耳鳴非不祥也太安中并州飢亂勒與諸小胡亡散乃自雁門還依寧驅北澤都尉劉監欲縛賣之驅匿之獲免勒於是潛詣納降都尉李川路逢郭敬泣拜言飢寒敬對之流涕以帶貨鬻食之并給以衣服勒謂敬曰今者大餓不可守窮諸胡飢甚宜誘將冀州就穀因執賣之可以兩濟敬深然之會建威將軍閻粹説并州刺史東嬴公騰執諸胡於山東賣充軍實騰使將軍郭陽張隆虜羣胡將詣冀州兩胡一枷勒時年二十餘亦在其中數為隆所驅辱敬先以勒屬郭陽及兄子時陽敬族兄也是以陽時每為解請道路飢病賴陽時而濟既而賣與茌平人師歡為奴有一老父謂勒曰君魚龍髮際上四道已成當貴為人主甲戌之歲王彭祖可圖勒曰若如公言弗敢忘德忽然不見每耕作於野常聞鼓角之聲勒以告諸奴諸奴亦聞之因曰吾幼來在家聞如是諸奴歸以告歡歡亦奇其狀貌而免之歡家鄰於馬牧與牧率魏郡汲桑往來勒以能相馬自託於桑嘗傭於武安臨水為遊軍所囚會有羣鹿旁過軍人競逐之勒乃獲免俄而又見一父老謂勒曰向羣鹿者我也君應為中州主故相救爾勒拜而受命遂招集王陽夔安支雄冀保吳豫劉膺桃豹逯明等八騎為羣盜後郭敖劉徵劉寶張曀僕呼延莫郭黑略張越孔豚趙鹿支屈六等又赴之號為十八騎復東如赤龍騄驥諸苑中乘苑馬遠掠繒寶以賂汲桑及成都王穎敗乘輿于蕩陰逼帝如鄴宮王浚以穎陵辱天子使鮮卑擊之穎懼挾惠帝南奔洛陽帝復為張方所逼遷于長安關東所在兵起皆以誅穎為名河間王顒懼東師之盛欲輯懷東夏乃奏議廢穎是歲劉元海稱漢王于黎亭穎故將陽平人公師藩等自稱將軍起兵趙魏衆至數萬勒與汲桑帥牧人乘苑馬數百騎以赴之桑始命勒以石為姓勒為名焉藩拜勒為前隊督從攻平昌公模於鄴模使將軍馮嵩逆戰敗之藩濟自白馬而南濮陽太守苟晞討藩斬之勒與桑亡潛苑中桑以勒為伏夜牙門帥牧人劫掠郡縣繫囚又招山澤亡命多附勒勒率以應之桑乃自號大將軍稱為成都王穎誅東海王越東嬴公騰為名桑以勒為前驅屢有戰功署為掃虜將軍忠明亭侯桑進軍攻鄴以勒為前鋒都督大敗騰將馮嵩因長驅入鄴遂害騰殺萬餘人掠婦女珍寶而去濟自延津南擊兗州越大懼使苟晞王讚等討之桑勒攻幽州刺史石鮮於樂陵鮮死之乞活田禋帥衆五萬救鮮勒逆戰敗禋與晞等相持于平原陽平間數月大小三十餘戰互有勝負越懼次於官渡為晞聲援桑勒為晞所敗死者萬餘人乃收餘衆將奔劉元海冀州刺史丁紹要之于赤橋又大敗之桑奔馬牧勒奔樂平王師斬桑于平原時胡部大張鞱督馮莫突等擁衆數千壁于上黨勒往從之深為所昵因説鞱督曰劉單于舉兵誅晉部大距而不從豈能獨立乎曰不能勒曰如其不能者兵馬當有所屬今部落皆已被單于賞募往往聚議欲叛部大而歸單于矣宜早為之計鞱督等素無智略懼部衆之二己也乃潛隨勒單騎歸元海元海署鞱督為親漢王莫突為都督部大以勒為輔漢將軍平晉王以統之勒於是命鞱督為兄賜姓石氏名之曰會言其遇己也烏丸張伏利度亦有衆二千壁于樂平元海屢招而不能致勒偽獲罪于元海因奔伏利度伏利度大悅結為兄弟使勒率諸胡寇掠所向無前諸胡畏服勒知衆心之附己也乃因會執伏利度告諸胡曰今起大事我與伏利度孰堪為主諸胡咸以推勒勒於是釋伏利度率其部衆歸元海元海加勒督山東征討諸軍事以伏利度衆配之元海使劉聰攻壺關命勒率所統七千為前鋒都督劉琨遣護軍黃秀等救壺關勒敗秀於白田秀死之勒遂陷壺關元海命勒與劉零閻羆等七將率衆三萬寇魏郡頓丘諸壘壁多陷之假壘主將軍都尉簡強壯五萬為軍士老弱安堵如故軍無私掠百姓懷之及元海僭號遣使授勒持節平東大將軍校尉都督王如故勒并軍寇鄴鄴潰和郁奔于衛國執魏郡太守王粹于三臺進攻趙郡害冀州西部都尉馮沖攻乞活赦亭田禋于中丘皆殺之元海授勒安東大將軍開府置左右長史司馬從事中郎進軍攻巨鹿常山害二郡守將陷冀州郡縣堡壁百餘衆至十餘萬其衣冠人物集為君子營乃引張賓為謀主始署軍功曹以刁膺張敬為股肱夔安孔萇為爪牙支雄呼延莫王陽桃豹逯明吳豫等為將率使其將張斯率騎詣并州山北諸郡縣説諸胡羯曉以安危諸胡懼勒威名多有附者進軍常山分遣諸將攻中山博陵高陽諸縣降之者數萬人王浚使其將祁弘帥鮮卑段務塵等十餘萬騎討勒大敗勒于飛龍山死者萬餘勒退屯黎陽分命諸將攻諸未下及叛者降三十餘壁置守宰以撫之進寇信都害冀州刺史王斌於是車騎將軍王堪北中郎將裴憲自洛陽率衆討勒勒燒營并糧回軍距之次于黃牛壘魏郡太守劉矩以郡附于勒勒使矩統其壘衆為中軍左翼勒至黎陽裴憲棄其軍奔于淮南王堪退堡倉垣元海授勒鎮東大將軍封汲郡公持節都督王如故勒固讓公不受與閻羆攻月者圈苑市二壘陷之羆中流矢死勒并統其衆潛自石橋濟河攻陷白馬坑男女三千餘口東襲鄄城害兗州刺史袁孚因攻倉垣陷之遂害堪渡河攻廣宗清河平原陽平諸縣降勒者九萬餘口復南濟河滎陽太守裴純奔于建業時劉聰攻河內勒率騎會之攻冠軍將軍梁巨于武德懷帝遣兵救之勒留諸將守武德與王桑逆巨於長陵巨請降勒弗許巨踰城而遁軍人執之勒馳如武德坑降卒萬餘數梁巨罪而害之王師退還河北諸堡壁大震皆請降送任于勒及元海死劉聰授勒征東大將軍并州刺史汲郡公持節開府都督校尉王如故勒固辭將軍乃止劉粲率衆四萬寇洛陽勒留輜重于重門率騎二萬會粲於大陽大敗王師於澠池遂至洛川粲出轘轅勒出成關圍陳留太守王讚於倉垣為讚所敗退屯文石津將北攻王浚會浚將王甲始率遼西鮮卑萬餘騎敗趙固于津北勒乃燒船棄營引軍向柏門迎重門輜重至于石門濟河攻襄城太守崔曠於繁昌害之先是雍州流人王如侯脫嚴嶷等起兵江淮間聞勒之來也懼遣衆一萬屯襄城以距勒擊敗之盡俘其衆勒至南陽屯于宛北山如懼勒之攻襄也使送珍寶車馬犒師結為兄弟勒納之如與侯脫不平説勒攻脫勒夜令三軍雞鳴而駕晨壓宛門攻之旬有二日而克嚴嶷率衆救脫至則無及遂降于勒勒斬脫囚嶷送于平陽盡并其衆軍勢彌盛勒南寇襄陽攻陷江西壘壁三十餘所留刁膺守襄陽躬帥精騎三萬還攻王如憚如之盛遂趣襄城如知之遣弟璃率騎二萬五千詐言犒軍實欲襲勒勒逆擊滅之復屯江西蓋欲有雄據江漢之志也張賓以為不可勸勒北還弗從以賓為參軍都尉領記室位次司馬專居中總事元帝慮勒南寇使王導率衆討勒勒軍糧不接死疫太半納張賓之策乃焚輜重裹糧卷甲渡沔寇江夏太守楊岠棄郡而走北寇新蔡害新蔡王確于南頓朗陵公何襲廣陵公陳眕上黨太守羊綜廣平太守邵肇等率衆降于勒勒進陷許昌害平東將軍王康先是東海王越率洛陽之衆二十餘萬討勒越薨于軍衆推太尉王衍為主率衆東下勒輕騎追及之衍遣將軍錢端與勒戰為勒所敗端死之衍軍大潰勒分騎圍而射之相登如山無一免者於是執衍及襄陽王範任城王濟西河王喜梁王禧齊王超吏部尚書劉望豫州刺史劉喬太傅長史庾敳等坐之于幕下問以晉故衍濟等懼死多自陳説惟範神色儼然意氣自若顧呵之曰今日之事何復紛紜勒甚奇之勒於是引諸王公卿士於外害之死者甚衆勒重衍清辨奇範神氣不能加之兵刃夜使人排牆填殺之左衛何倫右衛李惲聞越薨奉越妃裴氏及越世子毗出自洛陽勒逆毗於洧倉軍復大潰執毗及諸王公卿士皆害之死者甚衆因率精騎三萬入自成關會劉曜王彌寇洛陽洛陽既陷勒歸功彌曜遂出轘轅屯于許昌劉聰署勒征東大將軍勒固辭不受先是平陽人李洪有衆數千壘于舞陽苟晞假洪雍州刺史勒進寇穀陽害冠軍將軍王茲破王讚于陽夏獲讚以為從事中郎襲破大將軍苟晞于蒙城執晞署為左司馬劉聰授勒征東大將軍幽州牧固辭將軍不受先是王彌納劉暾之説將先誅勒東王青州使暾徵其將曹嶷於齊勒遊騎獲暾得彌所與嶷書勒殺之密有圖彌之計矣會彌將徐邈輒引部兵去彌彌漸削弱及勒之獲苟晞也彌惡之偽卑辭使謂勒曰公獲苟晞而赦之何其神也使晞為公左彌為公右天下不足定勒謂張賓曰王彌位重言卑恐其遂成前狗意也賓曰觀王公有青州之心桑梓本邦固人情之所樂明公獨無并州之思乎王公遲回未發者懼明公踵其後已有規明公之志但未獲便爾今不圖之恐曹嶷復至共為羽翼後雖欲悔何所及邪徐邈既去軍勢稍弱觀其控御之懷猶盛可誘而滅之勒以為然勒時與陳午相攻于蓬關王彌亦與劉瑞相持甚急彌請救于勒勒未之許張賓進曰明公常恐不得王公之便今天以其便授我矣陳午小豎何能為寇王彌人傑將為我害勒因回軍擊瑞斬之彌大悅謂勒深心推奉無復疑也勒引師攻陳午于肥澤午司馬上黨李頭説勒曰公天生神武當平定四海四海士庶皆仰屬明公望濟于塗炭有與公爭天下者公不早圖之而返攻我曹流人我曹鄉黨終當奉戴何遽見逼乎勒心然之詰朝引退詭請王彌宴于已吾彌長史張嵩諫彌勿就恐有專諸孫峻之禍彌不從既入酒酣勒手斬彌而并其衆啓聰稱彌叛逆之狀聰署勒鎮東大將軍督并幽二州諸軍事領并州刺史持節征討都督校尉開府幽州牧公如故苟晞王讚謀叛勒勒害之以將軍左伏肅為前鋒都尉攻掠豫州諸郡臨江而還屯于葛陂降諸夷楚署將軍二千石以下稅其義穀以供軍士初勒被鬻平原與母王相失至是劉琨遣張儒送王于勒遺勒書曰將軍發迹河朔席卷兗豫飲馬江淮折衝漢沔雖自古名將未足為諭所以攻城而不有其人略地而不有其土翕爾雲合忽復星散將軍豈知其然哉存亡決在得主成敗要在所附得主則為義兵附逆則為賊衆義兵雖敗而功業必成賊衆雖克而終歸殄滅昔赤眉黃巾橫逆宇宙所以一旦敗亡者正以兵出無名聚而為亂將軍以天挺之質威振宇內擇有德而推崇隨時望而歸之勳義堂堂長享遐貴背聰則禍除向主則福至採納往誨翻然改圖天下不足定蟻寇不足掃今相授侍中持節車騎大將軍領護胸奴中郎將襄城郡公總內外之任兼華戎之號顯封大郡以表殊能將軍其受之副遠近之望也自古以來誠無戎人而為帝王者至於名臣建功業者則有之矣今之遲想蓋以天下大亂當須雄才遙聞將軍攻城野戰合於機神雖不視兵書暗與孫吳同契所謂生而知之者上學而知之者次但得精騎五千以將軍之才何向不摧至心實事皆張儒所具勒報琨曰事功殊途非腐儒所聞君當逞節本朝吾自夷難為效遺琨名馬珍寶厚賓其使謝歸以絶之勒於葛陂繕室宇課農造舟將寇建鄴會霖雨歷三月不止元帝使諸將率江南之衆大集壽春勒軍中飢疫死者太半檄書朝夕繼至勒會諸將計之右長史刁膺諫勒先送款於帝求掃平河朔待軍退之後徐更計之勒愀然長嘯中堅夔安勸勒就高避水勒曰將軍何其怯乎孔萇支雄等三十餘將進曰及吳軍未集萇等請各將三百步卒乘船三十餘道夜登其城斬吳將頭得其城食其倉米今年要當破丹楊定江南盡生縛取司馬家兒輩勒笑曰是勇將之計也各賜鎧馬一匹顧問張賓曰於君計何如賓曰將軍攻陷帝都囚執天子殺害王侯妻略妃主擢將軍之髮不足以數將軍之罪奈何復還相臣奉乎去年誅王彌之後不宜於此營建天降霖雨方數百里中示將軍不應留也鄴有三臺之固西接平陽四塞山河有喉襟之勢宜北徙據之伐叛懷服河朔既定莫有處將軍之右者晉之保壽春懼將軍之往擊爾今卒聞回軍必欣於敵去未遑奇兵掎擊也輜重徑從北道大軍向壽春輜重既過大軍徐回何懼進退無地乎勒攘袂鼓髯曰賓之計是也責刁膺曰君共相輔佐當規成功業如何便相勸降此計應斬然相明性怯所以宥君於是退膺為將軍擢賓為右長史加中壘將軍號曰右侯發自葛陂遣石季龍率騎二千距壽春會江南運船至獲米布數十艘將士爭之不設備晉伏兵大發敗季龍于巨靈口赴水死者五百餘人奔退百里及于勒軍軍中震擾謂王師大至勒陳以待之晉懼有伏兵退還壽春勒所過路次皆堅壁清野採掠無所獲軍中大飢士衆相食行達東燕聞汲郡向冰有衆數千壁于枋頭勒將於棘津北渡懼冰邀之會諸將問計張賓進曰如聞冰船盡在瀆中未上枋內可簡壯勇者千人詭道潛渡襲取其船以濟大軍大軍既濟冰必可擒也勒從之使支雄孔萇等從文石津縛筏潛渡勒引其衆自酸棗向棘津冰聞勒軍至始欲內其船會雄等已渡屯其壘門下船三十餘艘以濟其軍令主簿鮮于豐挑戰設三伏以待之冰怒乃出軍將戰而三伏齊發夾擊攻之又因其資軍遂豐振長驅寇鄴攻北中郎將劉演于三臺演部將臨深牟穆等率衆數萬降于勒時諸將佐議欲攻取三臺以據之張賓進曰劉演衆猶數千三臺險固攻守未可卒下舍之則能自潰王彭祖劉越石大敵也宜及其未有備密規進據罕城廣運糧儲西稟平陽掃定并薊桓文之業可以濟也且今天下鼎沸戰爭方始遊行羇旅人無定志難以保萬全制天下也夫得地者昌失地者亡邯鄲襄國趙之舊都依山憑險形勝之國可擇此二邑而都之然後命將四出授以奇略推亡固存兼弱攻昧則羣凶可除王業可圖矣勒曰右侯之計是也於是進據襄國賓又言於勒曰今我都此越石彭祖深所忌也恐及吾城池未固資儲未廣送死於我聞廣平諸縣秋稼大成可分遣諸將收掠野穀遣使平陽陳宜鎮此之意勒又然之於是上表於劉聰分命諸將攻冀州郡縣壘壁率多降附運糧以輸勒劉聰署勒使持節散騎常侍都督冀幽并營四州雜夷征討諸軍事冀州牧進封本國上黨郡公邑五萬戶開府幽州牧東夷校尉如故廣平遊綸張豺擁衆數萬受王浚假署保據苑鄉勒使夔安支雄等七將攻之破其外壘浚遣督護王昌及鮮卑段就六眷末柸匹磾等部衆五萬餘以討勒時城隍未修乃於襄國築隔城重柵設鄣以待之就六眷屯于渚陽勒分遣諸將連出挑戰頻為就六眷所敗又聞其大造攻具勒顧謂其將佐曰今寇來轉逼彼衆我寡恐攻圍不解外救不至內糧罄絶縱孫吳重生亦不能固也吾將簡練將士大陳於野以決之何如諸將皆曰宜固守以疲寇彼師老自退追而擊之蔑不克矣勒顧謂張賓孔萇曰君以為何如賓萇俱曰聞就六眷剋來月上旬送死北城其大衆遠來戰守連日以我軍勢寡弱謂不敢出戰意必懈怠今段氏種衆之悍末柸尤最其卒之精勇悉在末柸所可勿復出戰示之以弱速鑿北壘為突門二十餘道候賊列守未定出其不意直衝末柸帳敵必震惶計不及設所謂迅雷不及掩耳末柸之衆既奔餘自摧散擒末柸之後彭祖可指辰而定勒笑而納之即以萇為攻戰都督造突門于北城鮮卑入屯北壘勒候其陳未定躬率將士鼓譟于城上會孔萇督諸突門伏兵俱出擊之生摛末柸就六眷等衆遂奔散萇乘勝追擊枕尸三十餘里獲鎧馬五千匹就六眷收其遺衆屯于渚陽遺使求和送鎧馬金銀并以末柸三弟為質而請末柸諸將并勸勒殺末柸以挫之勒曰遼西鮮卑健國也與我素無怨讐為王浚所使耳今殺一人結怨一國非計也放之必悅不復為王浚用矣於是納其質遣石季龍盟就六眷于渚陽結為兄弟就六眷等引還使參軍閻綜獻捷於劉聰於是遊綸張豺請降稱藩勒將襲幽州務養將士權宜許之皆就署將軍於是遣衆寇信都害冀州刺史王象王浚復以邵舉行冀州刺史保于信都建興元年石季龍攻鄴三臺鄴潰劉演奔于廩丘將軍謝胥田青郎牧等率三臺流人降于勒勒以桃豹為魏郡太守以撫之命段末柸為子署為使持節安北將軍北平公遣還遼西末柸感勒厚恩在途日南面而拜者三段氏遂專心歸附自是王浚威勢漸衰勒襲苑鄉執遊綸以為主簿攻乞活李惲于上白斬之將坑其降卒見郭敬而識之曰汝郭季子乎敬叩頭曰是也勒下馬執其手泣曰今日相遇豈非天邪賜衣服車馬署敬上將軍悉免降者以配之其將孔萇寇定陵害兗州刺史田徽烏丸薄盛執渤海太守劉既率戶五千降于勒劉聰授勒侍中征東大將軍餘如故拜其母王氏為上黨國太夫人妻劉氏上黨國夫人章綬首飾一同王妃段末柸任弟亡歸遼西勒大怒所經令尉皆殺之烏丸審廣漸裳郝襲背王浚密遣使降于勒勒厚加撫納司冀漸寧人始租賦立太學簡明經善書吏署為文學掾選將佐子弟三百人教之勒母王氏死潛窆山谷莫詳其所既而備九命之禮虛葬于襄國城南勒謂張賓曰鄴魏之舊都吾將營建既風俗殷雜須賢望以綏之誰可任也賓曰晉故東萊太守南陽趙彭忠亮篤敏有佐時良幹將軍若任之必能允副神規勒於是徵彭署為魏郡太守彭至入泣而辭曰臣往策名晉室食其祿矣犬馬戀主切不敢忘誠知晉之宗廟鞠為茂草亦猶洪川東逝往而不還明公應符受命可謂攀龍之會但受人之榮復事二姓臣志所不為恐亦明公之所不許若賜臣餘年全臣一介之願者明公大造之惠也勒默然張賓進曰自將軍神旗所經衣冠之士靡不變節未有能以大義進退者至如此賢以將軍為高祖自擬為四公所謂君臣相知此亦足成將軍不世之高何必吏之勒大悅曰右侯之言得孤心矣於是賜安車駟馬養以卿祿辟其子明為參軍勒以石季龍為魏郡太守鎮鄴三臺季龍篡奪之萌兆于此矣時王浚署置百官奢縱淫虐勒有吞并之意欲先遣使以觀察之議者僉曰宜如羊祜與陸抗書相聞時張賓有疾勒就而謀之賓曰王浚假三部之力稱制南面雖曰晉藩實懷僭逆之志必思協英雄圖濟事業將軍威聲震于海內去就為存亡所在為輕重浚之欲將軍猶楚之招韓信也今權譎遣使無誠款之形脫生猜疑圖之兆露後雖奇略無所設也夫立大事者必先為之卑當稱藩推奉尚恐未信羊陸之事臣未見其可勒曰右侯之計是也乃遣其舍人王子春董肇等多齎珍寶奉表推崇浚為天子曰勒本小胡出於戎裔值晉綱弛御海內飢亂流離屯厄竄命冀州共相帥合以救性命今晉祚淪夷遠播吳會中原無主蒼生無繫伏惟明公殿下州鄉貴望四海所宗為帝王者非公復誰勒所以捐軀命興義兵誅暴亂者正為明公驅除爾伏願殿下應天順時踐登皇阼勒奉戴明公如天地父母明公當察勒微心慈眄如子也亦遺棗嵩書而厚賂之浚謂子春等曰石公一時英武據趙舊都成鼎峙之勢何為稱藩于孤其可信乎子春對曰石將軍英才俊拔士馬雄盛實如聖旨仰惟明公州鄉貴望纍葉重光出鎮藩嶽威聲播于八表固以胡越欽風戎夷歌德豈唯區區小府而敢不斂袵神闕者乎昔陳嬰豈其鄙王而不王韓信薄帝而不帝者哉但以知帝王不可以智力爭故也石將軍之擬明公猶陰精之比太陽江河之比洪海爾項籍子陽覆車不遠是石將軍之明鑒明公亦何怪乎且自古誠胡人而為名臣者實有之帝王則未之有也石將軍非所以惡帝王而讓明公也顧取之不為天人之所許耳願公勿疑浚大悅封子春等為列侯遣使報勒答以方物浚司馬遊統時鎮范陽陰叛浚馳使降于勒勒斬其使送于浚以表誠實浚雖不罪統彌信勒之忠誠無復疑矣子春等與王浚使至勒命匿徑卒精甲虛府羸師以示之北面拜使而受浚書浚遺勒麈尾勒偽不敢執懸之于壁朝夕拜之云我不得見王公見王公所賜如見公也復遣董肇奉表于浚期親詣幽州奉上尊號亦修箋于棗嵩乞并州牧廣平公以見必信之誠也勒將圖浚引子春問之子春曰幽州自去歲大水人不粒食浚積粟百萬不能贍恤刑政苛酷賦役殷煩賊害賢良誅斥諫士下不堪命流叛略盡鮮卑烏丸離二于外棗嵩田矯貪暴于內人情沮擾甲士羸弊而浚猶置立臺閣布列百官自言漢高魏武不足並也又幽州謠怪特甚聞者莫不為之寒心浚意氣自若曾無懼容此亡期之至也勒撫几笑曰王彭祖真可擒也浚使達幽州具陳勒形勢寡弱款誠無二浚大悅以勒為信然勒纂兵戒期將襲浚而懼劉琨及鮮卑烏丸為其後患沈吟未發張賓進曰夫襲敵國當出其不意軍嚴經日不行豈顧有三方之慮乎勒曰然為之奈何賓曰彭祖之據幽州唯仗三部今皆離叛還為寇讐此則外無聲援以抗我也幽州飢儉人皆蔬食衆叛親離甲旅寡弱此則內無強兵以禦我也若大軍在郊必土崩瓦解今三方未靖將軍便能懸軍千里以征幽州也輕軍往返不出二旬就使三方有動勢足旋趾宜應機電發勿後時也且劉琨王浚雖同名晉藩其實仇敵若修箋于琨送質請和琨必欣于得我喜于浚滅終不救浚而襲我也勒曰吾所不了右侯已了復何疑哉於是輕騎襲幽州以火宵行至柏人殺主簿遊綸以其兄統在范陽懼聲軍計故也遣張慮奉箋于劉琨陳己過深重求討浚以自效琨既素疾浚乃檄諸州郡説勒知命思愆收纍年之咎求拔幽都效善將來今聽所請受任通和軍達易水浚督護孫緯馳遣白浚將引軍距勒遊統禁之浚將佐咸請出擊勒浚怒曰石公來正欲奉戴我也敢言擊者斬乃命設饗以待之勒晨至薊叱門者開門疑有伏兵先驅牛羊數千頭聲言上禮實欲填諸街巷使兵不得發浚乃懼或坐或起勒升其廳事命甲士執浚立之于前使徐光讓浚曰君位冠元台爵列上公據幽都驍悍之國跨全燕突騎之鄉手握強兵坐觀京師傾覆不救天子而欲自尊又專任姦暴殺害忠良肆情恣欲毒遍燕壤自貽于此非為天也使其將王洛生驛送浚襄國市斬之於是分遣流人各還桑梓擢荀綽裴憲資給車服數朱碩棗嵩田矯等以賄亂政責遊統以不忠于浚皆斬之遷烏丸審廣漸裳郝襲靳市等于襄國焚燒浚宮殿以晉尚書劉翰為寧朔將軍行幽州刺史戍薊置守宰而還遣其東曹掾傅遘兼左長史封王浚首獻捷于劉聰勒既還襄國劉翰叛勒奔段匹磾襄國大飢穀二升直銀二斤肉一斤直銀一兩劉聰以平幽州之勳乃遣其使人柳純持節署勒大都督陝東諸軍事驃騎大將軍東單于侍中使持節開府校尉二州牧公如故加金鉦黃鉞前後鼓吹二部增封十二郡勒固辭受二郡而已勒封左長史張敬等十一人為伯子侯文武進位有差勒將支雄攻劉演於廩丘為演所敗演遣其將韓弘潘良襲頓丘斬勒所署太守邵攀支雄追擊弘等害潘良于廩丘劉琨遣樂平太守焦球攻勒常山斬其太守邢泰琨司馬溫嶠西討山胡勒將逯明要之敗嶠于潞城勒以幽冀漸平始下州郡閲實人戶戶資二匹租二斛勒將陳午以浚儀叛于勒逯明攻寧黑于茌平降之因破東燕酸棗而還徙降人二萬餘戶于襄國勒使其將葛薄寇濮陽陷之害太守韓弘劉聰遣其使人范龕持節策命勒賜以弓矢加崇為陝東伯得專征伐拜封刺史將軍守宰列侯歲盡集上署其長子興為上黨國世子加翼軍將軍為驃騎副二劉琨遣王旦攻中山逐勒所署太守秦固勒將劉勔距旦敗之執旦于望都關勒襲邵續于樂陵續盡衆逆戰大敗而還章武人王起兵于科斗壘擾亂勒河間渤海諸郡勒以揚武張夷為河間太守參軍臨深為渤海太守各率步騎三千以鎮靜之使長樂太守程遐屯于昌亭為之聲勢徙平原烏丸展廣劉哆等部落三萬餘戶于襄國使石季龍襲乞活王平于梁城敗績而歸又攻劉演于廩丘支雄逯明擊寧黑于東武陽陷之黑赴河而死徙其衆萬餘于襄國邵續使文鴦救演季龍退止盧關津避之文鴦弗能進屯于景亭兗豫豪右張平等起兵救演季龍夜棄營設伏于外揚聲將歸河北平等以為信然入于空營季龍回擊敗之遂陷廩丘演奔文鴦軍獲演弟啓送于襄國演即劉琨之兄子也勒以琨撫存其母德之賜啓田宅令儒官授其經時大蝗中山常山尤甚中山丁零翟鼠叛勒攻中山常山勒率騎討之獲其母妻而還鼠保于胥關遂奔代郡勒攻樂平太守韓據于坫城劉琨遣將軍姬淡率衆十餘萬討勒琨次廣牧為淡聲援勒將距之或諫之曰淡兵馬精盛其鋒不可當宜深溝高壘以挫其鋭攻守勢異必獲萬全勒曰淡大衆遠來體疲力竭犬羊烏合號令不齊可一戰而擒之何強之有寇已垂至胡可捨去大軍一動豈易中還若淡乘我之退顧乃無暇焉得深溝高壘乎此為不戰而自滅亡之道立斬諫者以孔萇為前鋒都督令三軍後出者斬設疑兵于山上分為二伏勒輕騎與淡戰偽收衆而北淡縱兵追之勒前後伏發夾擊淡軍大敗獲鎧馬萬匹淡奔代郡據奔劉琨琨長史李弘以并州降于勒琨遂奔于段匹磾勒遷陽曲樂平戶于襄國置守宰而退孔萇追姬淡于桑乾勒遣兼左長史張敷獻捷于劉聰勒之征樂平也其南和令趙領招合廣川平原渤海數千戶叛勒奔于邵續河間邢嘏纍徵不至亦聚衆數百以叛勒巡下冀州諸縣以右司馬程遐為寧朔將軍監冀州七郡諸軍事勒姊夫廣威張越與諸將蒱博勒親臨觀之越戲言忤勒勒大怒叱力士折其脛而殺之孔萇攻代郡淡死之時司冀并兗州流人數萬戶在于遼西迭相招引人不安業孔萇等攻馬嚴馮月者久而不克勒問計於張賓賓對曰馮月者等本非明公之深仇遼西流人悉有戀本之思今宜班師息甲差選良守任之以龔遂之事不拘常制奉宣仁澤奮揚威武幽冀之寇可翹足而靜遼西流人可指時而至勒曰右侯之計是也召萇等歸署武遂令李回為易北都護振武將軍高陽太守馬嚴士衆多李潛軍人回先為潛府長史素服回威德多叛嚴歸之嚴以部衆離二懼奔于幽州溺水而死馮月者率衆降于勒回移居易京流人降者歲常數千勒甚嘉之封回弋陽子邑三百戶加賓封一千戶進賓位前將軍固辭不受河朔大蝗初穿地而生二旬則化狀若蠶七八日而臥四日蛻而飛彌亘百草唯不食三豆及麻并冀尤甚石季龍濟自長壽津寇梁國害內史荀闔劉琨與段匹磾涉復辰疾六眷段末柸等會于固安將謀討勒勒使參軍王續齎金寶遺末柸以間之末柸既思有以報勒恩又欣於厚賂乃説辰眷等引還琨匹磾亦退如薊城邵續使兄子濟攻勒渤海虜三千餘人而還劉聰將趙固以洛陽歸順恐勒襲之遣參軍高少奉書推崇勒請師討聰勒以大義讓之固深恨恚與郭默攻掠河內汲郡段末柸殺鮮卑單于截附真立忽跋鄰為單于段匹磾自幽州攻末柸末柸逆擊敗之匹磾奔還幽州因害太尉劉琨琨將佐相繼降勒末柸遣弟騎督擊匹磾于幽州匹磾率其部衆數千將奔邵續勒將石越要之于鹽山大敗之匹磾退保幽州越中流矢死勒為之屏樂三月贈平南將軍初曹嶷據有青州既叛劉聰南稟王命以建鄴懸遠勢援不接懼勒襲之故遣通和勒授嶷東州大將軍青州牧封琅邪公劉聰疾甚驛召勒為大將軍録尚書事受遺詔輔政勒固辭乃止聰又遣其使人持節署勒大將軍持節鉞都督侍中校尉二州牧公如故增封十郡勒不受聰死其子粲襲偽位其大將軍靳準殺粲于平陽勒命張敬率騎五千為前鋒以討準勒統精鋭五萬繼之據襄陵北原羌羯降者四萬餘落準數挑戰勒堅壁以挫之劉曜自長安屯于蒲阪曜復僭號署勒大司馬大將軍加九錫增封十郡并前十三郡進爵趙公勒攻準于平陽小城平陽大尹周置等率雜戶六千降于勒巴帥及諸羌羯降者十餘萬落徙之司州諸縣準使卜泰送乘輿服御請和勒與劉曜競有招懷之計乃送泰于曜使知城內無歸曜之意以挫其軍勢曜潛與泰結盟使還平陽宣慰諸屠各勒疑泰與曜有謀欲斬泰以速降之諸將皆曰今斬卜泰準必不復降就令泰宣漢要盟于城中使相率誅靳準準必懼而速降矣勒久乃從諸將議遣之泰入平陽與準將喬泰馬忠等起兵攻準殺之推靳明為盟主遣泰及卜玄奉傳國六璽送于劉曜勒大怒遣令史羊升使平陽責明殺準之狀明怒斬升勒怒甚進軍攻明明出戰勒擊敗之枕尸二里明築城門堅守不復出戰勒遣其左長史王修獻捷于劉曜晉彭城內史周堅害沛內史周默以彭沛降于勒石季龍率幽冀州兵會勒攻平陽劉曜遣征東劉暢救明勒命舍師于蒲上靳明率平陽之衆奔于劉曜曜西奔粟邑勒焚平陽宮室使裴憲石會修復元海聰二墓收劉粲已下百餘尸葬之徙渾儀樂器于襄國劉曜又遣其使人郭汜等持節署勒太宰領大將軍進爵趙王增封七郡并前二十郡出入警蹕冕十有二旒乘金根車駕六馬如曹公輔漢故事夫人為王后世子為王太子勒舍人曹平樂因使留仕於曜言於曜曰大司馬遣王修等來外表至虔內覘大駕強弱謀待修之返將輕襲乘輿時曜勢實殘弊懼修宣之曜大怒追汜等還斬修于粟邑停太宰之授劉茂逃歸言王修死故勒大怒誅平樂三族贈修太常又知停殊禮之授怒甚下令曰孤兄弟之奉劉家人臣之道過矣若微孤兄弟豈能南面稱朕哉根基既立便欲相圖天不助惡使假手靳準孤惟事君之體當資舜求瞽瞍之義故復推崇令主齊好如初何圖長惡不悛殺奉誠之使帝王之起復何常邪趙王趙帝孤自取之名號大小豈其所節邪於是置太醫尚方御府諸令命參軍鼂讚成正陽門俄而門崩勒大怒斬讚既怒刑倉卒尋亦悔之賜以棺服贈大鴻臚平西將軍祖逖攻陳川于蓬關石季龍救川逖退屯梁國季龍使揚武左伏肅攻之勒增置宣文宣教崇儒崇訓十餘小學于襄國四門簡將佐豪右子弟百餘人以教之且備擊柝之衛置挈壺署鑄豐貨錢河西鮮卑日六延叛于勒石季龍討之敗延于朔方斬首二萬級俘三萬餘人獲牛馬十餘萬孔萇討平幽州諸郡時段匹磾部衆飢散棄其妻子匹磾奔邵續曹嶷遣使來聘獻其方物請以河為斷桃豹至蓬關祖逖退如淮南徙陳川部衆五千餘戶于廣宗石季龍與張敬張賓及諸將佐百餘人勸勒稱尊號勒下書曰孤猥以寡德忝荷崇寵夙夜戰惶如臨深薄豈可假尊竊號取譏四方昔周文以三分之重猶服事殷朝小白居一匡之盛而尊崇周室況國家道隆殷周孤德卑二伯哉其亟止斯議勿復紛紜自今敢言刑茲無赦乃止勒又下書曰今大亂之後律令滋煩其採集律令之要為施行條制於是命法曹令史貫志造辛亥制度五千文施行十餘歲乃用律令晉太山太守徐龕叛降于勒石季龍及張敬張賓左右司馬張屈六程遐文武等一百二十九人上疏曰臣等聞有非常之度必有非常之功有非常之功必有非常之事是以三代陵遲五伯迭興靜難濟時績侔睿后伏惟殿下天縱聖哲誕應符運鞭撻宇宙弼成皇業普天率土莫不來蘇嘉瑞徵祥日月相繼物望去劉氏威懷于明公者十分而九矣今山川夷靜星辰不孛夏海重譯天人係仰誠應升御中壇即皇帝位使攀附之徒蒙寸尺之潤請依劉備在蜀魏王在鄴故事以河內魏汲頓丘平原清河巨鹿常山中山長樂樂平十一郡并前趙國廣平陽平章武渤海河間上黨定襄范陽漁陽武邑燕國樂陵十三郡合二十四郡戶二十九萬為趙國封內依舊改為內史準禹貢魏武復冀州之境南至盟津西達龍門東至于河北至于塞垣以大單于鎮撫百蠻罷并朔司三州通置部司以監之伏願欽若昊天垂副羣望也勒西面而讓者五南面而讓者四百僚皆叩頭固請勒乃許之
