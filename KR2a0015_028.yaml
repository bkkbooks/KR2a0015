body:
  text: 晉書卷二十八志第十八五行中傳曰言之不從是謂不厥咎僭厥罰陽厥極憂時則有詩妖時則有介蟲之孽時則有犬禍時則有口舌之痾時則有白眚白祥惟木沴金言之不從從順也是謂不治也孔子曰君子居其室出其言不善則千里之外違之況其邇者乎詩曰如蜩如螳如沸如羹言上號令不順人心虛譁憒亂則不能治海內失在過差故其咎僭差也刑罰妄加羣陰不附則陽氣勝故其罰常陽也旱傷百穀則有寇難上下俱憂故其極憂也君炕陽而暴虐臣畏刑而箝口則怨謗之氣發於歌謠故有詩妖介蟲孽者謂小蟲有甲飛揚之類陽氣所生也於春秋為螽今謂之蝗皆其類也於易兌為口犬以吠守而不可信言氣毀故有犬禍一曰旱歲犬多狂死及為怪亦是也及人則多病口喉咳嗽者故有口舌痾金色白故有白眚白祥凡言傷者病金氣金氣病則木沴之其極憂者順之其福曰康寧劉歆言傳曰時則有毛蟲之孽說以為於天文西方參為獸星故為毛蟲魏齊王嘉平初東郡有訛言云白馬河出妖馬夜過官牧邊鳴呼衆馬皆應明日見其跡大如斛行數里還入河楚王彪本封白馬兗州刺史令狐愚以彪有智勇及聞此言遂與王淩謀共立之事泄淩愚被誅彪賜死此言不從之罰也詩云人之訛言寧莫之懲蜀劉禪嗣位譙周曰先主諱備其訓具也後主諱禪其訓授也若言劉已具矣當授與人甚於晉穆侯漢靈帝命子之祥也蜀果亡此言之不從也劉備卒劉禪即位未葬亦未踰月而改元為建興此言之不從也禮國君即位踰年而後改元者緣臣子之心不忍一年而有二君今可謂亟而不知禮義矣後遂降焉魏明帝太和中姜維歸蜀失其母魏人使其母手書呼維令反并送當歸以譬之維報書曰良田百頃不計一畝但見遠志無有當歸維卒不免景初元年有司奏帝為烈祖與太祖高祖並為不毀之廟從之案宗廟之制祖宗之號皆身沒名成乃正其禮故雖功赫天壤德邁前王未有豫定之典此蓋言之不從失之甚者也後二年而宮車晏駕於是統微政逸吳孫休時烏程人有得困病及差能以響言者言於此而聞於彼自其所聽之不覺其聲之大也自遠聽之如人對言不覺聲之自遠來也聲之所往隨其所向遠者所過十數里其鄰人有責息於外歷年不還乃假之使為責讓懼以禍福負物者以為鬼神即傎倒畀之其人亦不自知所以然也言不從之咎也魏時起安世殿武帝後居之安世武帝字也武帝每延羣臣多說平生常事未嘗及經國遠圖此言之不從也何曾謂子遵曰國家無貽厥之謀及身而已後嗣其殆乎此子孫之憂也自永熙後王室漸亂永嘉中天下大壞及何綏以非辜被殺皆如曾言趙王倫廢惠帝於金墉城改號金墉城為永安宮帝尋復位而倫誅惠帝永興元年詔廢太子覃還為清河王立成都王穎為皇太弟猶加侍中大都督領丞相備九錫封二十郡如魏王故事案周禮傳國以胤不以勳故雖公旦之聖不易成王之嗣所以遠絶覬覦永一宗祧後代遵履改之則亂今擬非其實僭差已甚且既為國嗣則不應復開封土兼領庶職此言之不從進退乖爽故帝既播越穎亦不終是其咎僭也後猶不悟又立懷帝為皇太弟懷終流弒不永厥祚又其應也語曰變古易常不亂則亡此之謂乎元帝永昌二年大將軍王敦下據姑孰百姓訛言行蟲病食人大孔數日入腹入腹則死療之有方當得白犬膽以為藥自淮泗遂及京都數日之間百姓驚擾人人皆自云已得蟲病又云始在外時當燒鐵以灼之於是翕然被燒灼者十七八矣而白犬暴貴至相請奪其價十倍或有自云能行燒鐵灼者賃灼百姓日得五六萬憊而後已四五日漸靜說曰夫裸蟲人類而人為之主今云蟲食人言本同臭類而相殘賊也自下而上明其逆也必入腹者言害由中不由外也犬有守衛之性白者金色而膽用武之主也帝王之運王霸會于戌戌主用兵金者晉行火燒鐵以療疾者言必去其類而來火與金合德共除蟲害也案中興之際大將軍本以腹心受伊呂之任而元帝末年遂攻京邑明帝諒暗又有異謀是以下逆上腹心內爛也及錢鳳沈充等逆兵四合而為王師所挫踰月而不能濟水北中郎劉遐及淮陵內史蘇峻率淮泗之衆以救朝廷故其謠言首作於淮泗也朝廷卒以弱制強罪人授首是用白犬膽可救之效也海西公時庾晞四五年中喜為挽歌自搖大鈴為唱使左右齊和又宴會輒令倡妓作新安人歌舞離別之辭其聲悲切時人怪之後亦果敗太元中小兒以兩鐵相打於土中名曰鬬族後王國寶王孝伯一姓之中自相攻擊桓玄初改年為大亨遐邇歡言曰二月了故義謀以仲春發也玄篡立又改年為建始以與趙王倫同又易為永始永始復是王莽受封之年也始徙司馬道子于安成安帝遜位出永安宮封為平固王琅邪王德文為石陽公並使往尋陽城識者皆以為言不從之妖僭也武帝初何曾薄太官御膳自取私食子劭又過之而王愷又過劭王愷羊琇之儔盛致聲色窮珍極麗至元康中夸恣成俗轉相高尚石崇之侈遂兼王何而儷人主矣崇既誅死天下尋亦淪喪僭踰之咎也庶徵陽劉向以為春秋大旱也其夏旱雩禮謂之大雩不傷二穀謂之不雨京房易傳曰欲德不用茲謂張厥災荒旱也其旱陰雲不雨變而赤因四際師出過時茲謂廣其旱不生上下皆蔽茲謂隔其旱天赤三月時有雹殺飛禽上緣求妃茲謂僭其旱三月大溫亡雲君高臺府茲謂犯陰侵陽其旱萬物根死數有火災庶位踰節茲為僭其旱澤物枯為火所傷魏明帝太和二年五月大旱元年以來崇廣宮府之應也又是春宣帝南擒孟達置二郡張郃西破諸葛亮斃馬謖亢陽自大又其應也太和五年三月自去冬十月至此月不雨辛巳大雩齊王正始元年二月自去冬十二月至此月不雨去歲正月明帝崩二月曹爽白嗣主轉宣帝為太傅外示尊崇內實欲令事先由己是時宣帝功蓋魏朝欲德不用之應也高貴鄉公甘露三年正月自去秋至此月旱是時文帝圍諸葛誕衆出過時之應也初壽春秋夏常雨淹城而此旱踰年城陷乃大雨咸以誕為天亡吳孫亮五鳳二年大旱百姓饑是歲征役煩興軍士怨叛此亢陽自大勞役失衆之罰也其役彌歲故旱亦竟年孫晧寶鼎元年春夏旱時孫晧遷都武昌勞役動衆之應也武帝泰始七年五月閏月旱大雩八年五月旱是時帝納荀勖邪說留賈充不復西鎮而任愷漸疏上下皆蔽之應也及李喜魯芝李胤等並在散職近厥德不用之謂也九年自正月旱至于六月祈宗廟社稷山川癸未雨十年四月旱去年秋冬採擇卿校諸葛沖等女是春五十餘人入殿簡選又取小將吏女數十人母子號哭於宮中聲聞于外行人悲酸是殆積陰生陽上緣求妃之應也咸寧二年五月旱大雩至六月乃澍雨太康二年旱自去冬旱至此春三年四月旱乙酉詔司空齊王攸與尚書廷尉河南尹録訊繫囚事從蠲宥五年六月旱此年正月天陰解而復合劉毅上疏曰必有阿黨之臣姦以事君者當誅而不赦也帝不答是時荀勖馮紞僭作威福亂朝尤甚六年三月青梁幽冀郡國旱六月濟陰武陵旱傷麥七年夏郡國十三大旱八年四月冀州旱九年夏郡國三十三旱扶風始平京兆安定旱傷麥十年二月旱太熙元年二月旱自太康已後雖正人滿朝不被親仗而賈充荀勖楊駿馮紞等迭居要重所以無年不旱者欲德不用上下皆蔽庶位踰節之罰也惠帝元康七年七月秦雍二州大旱疾疫關中饑米斛萬錢因此氐羌反叛雍州刺史解系敗績而饑疫荐臻戎晉並困朝廷不能振詔聽相賣鬻其九月郡國五旱永寧元年自夏及秋青徐幽并四州旱十二月又郡國十二旱是年春三王討趙王倫六旬之中數十戰死者十餘萬人懷帝永嘉三年五月大旱襄平縣梁水淡池竭河洛江漢皆可涉是年三月司馬越歸京都遣兵入宮收中書令繆播等九人殺之皆僭踰之罰也又四方諸侯多懷無君之心劉元海石勒王彌李雄之徒賊害百姓流血成泥又其應也五年自去冬旱至此春去歲十一月司馬越以行臺自隨斥黜宮衛無君臣之節元帝建武元年六月揚州旱去年十二月淳于伯冤死其年即旱而太興元年六月又旱干寶曰殺淳于伯之後旱三年是也刑罰妄加羣陰不附則陽氣勝之罰也元帝太興四年五月旱是時王敦陵僭已著永昌元年夏大旱是年三月王敦有石頭之變二宮陵辱大臣誅死僭踰無上故旱尤甚也其閏十一月京都大旱川谷並竭明帝太寧三年自春不雨至于六月成帝咸和元年夏秋旱是時庾太后臨朝稱制言不從而僭踰之罰也二年夏旱五年五月大旱六年四月大旱八年秋七月旱九年自四月不雨至于八月咸康元年六月旱是時成帝沖弱未親萬機內外之政決之將相此僭踰之罰連歲旱也至四年王導固讓太傅復子明辟是後不旱殆其應也時天下普旱會稽餘姚特甚米斗直五百人有相鬻者二年三月旱三年六月旱時王導以天下新定務在遵養不任刑罰遂盜賊公行頻五年亢旱亦舒緩之應也康帝建元元年五月旱穆帝永和元年五月旱是時帝在襁褓褚太后臨朝如明穆太后故事五年七月不雨至于十月六年夏旱八年夏旱九年春旱升平三年冬大旱四年冬大旱哀帝隆和元年夏旱是時桓溫強恣權制朝廷僭踰之罰也海西公太和元年夏旱四年冬旱涼州春旱至夏簡文帝咸安二年十月大旱饑自永和至是嗣主幼沖桓溫陵僭用兵征伐百姓怨苦孝武帝寧康元年三月旱是時桓溫入覲高平陵闔朝致拜踰僭之應也三年冬旱太元四年夏大旱八年六月旱十年七月旱饑初八年破苻堅九年諸將略地有事徐豫楊亮趙統攻討巴沔是年正月謝安又出鎮廣陵使子琰進次彭城頻有軍役十三年六月旱去歲北府遣戍胡陸荊州經略河南是年夏郭銓置戍野王又遣軍破黃淮十五年七月旱十七年秋旱至冬是時烈宗仁恕信任會稽王道子政事舒緩又茹千秋為驃騎咨議竊弄主相威福又比丘尼乳母親黨及婢僕之子階緣近習臨部領衆又所在多上春竟囚不以其辜建康獄吏枉暴既甚此又僭踰不從冤濫之罰安帝隆安二年冬旱寒甚四年五月旱五年夏秋大旱十二月不雨時孫恩作亂桓玄疑二迫殺殷仲堪而朝廷即授以荊州之任司馬元顯又諷百僚悉使敬己內外騷動兵革煩興此皆陵僭憂愁之應也元興元年七月大饑九月十月不雨泉水涸二年六月不雨冬又旱時桓玄奢僭十二月遂篡位三年八月不雨義熙四年冬不雨六年九月不雨八年十月不雨九年秋冬不雨十年九月旱十二月又旱井瀆多竭是時軍役煩興詩妖魏明帝太和中京師歌兜鈴曹子其唱曰其奈汝曹何此詩妖也其後曹爽見誅曹氏遂廢景初初童謠曰阿公阿公駕馬車不意阿公東渡河阿公來還當奈何及宣帝遼東歸至白屋當還鎮長安會帝疾篤急召之乃乘追鋒車東渡河終如童謠之言齊王嘉平中有謠曰白馬素羈西南馳其誰乘者朱虎騎朱虎者楚王小字也王淩令狐愚聞此謠謀立彪事發淩等伏誅彪賜死吳孫亮初童謠曰吁汝恪何若若蘆葦單衣篾鉤絡於何相求常子閣常子閣者反語石子缸也鉤絡鉤帶也及諸葛恪死果以葦席裹身篾束其要投之石子缸後聽恪故吏收斂求之此缸云孫亮初公安有白鼉鳴童謠曰白鼉鳴龜背平南郡城中可長生守死不去義無成南郡城中可長生者有急易以逃也明年諸葛恪敗弟融鎮公安亦見襲融刮金印龜服之而死鼉有鱗介甲兵之象又曰白祥也孫休永安二年將守質子羣聚嬉戲有異小兒忽來言曰三公鋤司馬如又曰我非人熒惑星也言畢上升仰視若曳一匹練有頃沒干寶曰後四年而蜀亡六年而魏廢二十一年而吳平於是九服歸晉魏與吳蜀並戰國三公鋤司馬如之謂也孫晧遣使者祭石印山下妖祠使者因以丹書巖曰楚九州渚吳九州都揚州士作天子四世治太平矣晧聞之意益張曰從大皇帝至朕四世太平之主非朕復誰恣虐踰甚尋以降亡近詩妖也孫晧天紀中童謠曰阿童復阿童銜刀游渡江不畏岸上獸但畏水中龍武帝聞之加王濬龍驤將軍及征吳江西衆軍無過者而王濬先定秣陵武帝太康三年平吳後江南童謠曰局縮肉數橫目中國當敗吳當復又曰宮門柱且當朽吳當復在三十年後又曰雞鳴不拊翼吳復不用力于時吳人皆謂在孫氏子孫故竊發為亂者相繼案橫目者四字自吳亡至元帝興幾四十年元帝興於江東皆如童謠之言焉元帝磱而少斷局縮肉者有所斥也太康末京洛為折楊柳之歌其曲始有兵革苦辛之辭終以擒獲斬截之事是時三楊貴盛而被族滅太后廢黜幽死中宮折楊柳之應也惠帝永熙中河內溫縣有人如狂造書曰光光文長大戟為牆毒藥雖行戟還自傷又曰兩火沒地哀哉秋蘭歸形街郵終為人歎及楊駿居內府以戟為衛死時又為戟所害傷楊后被廢賈后絶其膳八日而崩葬街郵亭北百姓哀之也兩火武帝諱蘭楊后字也其時又有童謠曰二月末三月初荊筆楊板行詔書宮中大馬幾作驢此時楊駿專權楚王用事故言荊筆楊板二人不誅則君臣禮悖故云幾作驢也元康中京洛童謠曰南風起吹白沙遙望魯國何嵯峨千歲髑髏生齒牙又曰城東馬子莫嚨哅比至來年纏女南風賈后字也白晉行也沙門太子小名也魯賈謐國也言賈后將與謐為亂以危太子而趙王因釁咀嚼豪賢以成篡奪不得其死之應也元康中天下商農通著大鄣日時童謠曰屠蘇鄣日覆兩耳當見瞎兒作天子及趙王倫篡位其目實眇焉趙王倫既篡洛中童謠曰獸從北來鼻頭汗龍從南來登城看水從西來河灌灌數月而齊王成都河間義兵同會誅倫案成都西藩而在鄴故曰獸從北來齊東藩而在許故曰龍從南來河間水源而在關中故曰水從西來齊留輔政居于宮西又有無君之心故言登城看也太安中童謠曰五馬游渡江一馬化為龍後中原大亂宗藩多絶唯琅邪汝南西陽南頓彭城同至江東而元帝嗣統矣司馬越還洛有童謠曰洛中大鼠長尺二若不早去大狗至及苟晞將破汲桑又謠曰元超兄弟大落度上桑打椹為苟作由是越惡晞奪其兗州隙難遂搆焉愍帝初有童謠曰天子何在豆田中至建興四年帝降劉曜在城東豆田壁中建興中江南謠歌曰訇如白坑破合集持作甒揚州破換敗吳興覆瓿砙案白者晉行坑器有口屬甕瓦甕質剛亦金之類也訇如白坑破者言二都傾覆王室大壞也合集持作甒者元帝鳩集遺餘以主社稷未能克復中原但偏王江南故其喻也及石頭之事六軍大潰兵人抄掠京邑爰及二宮其後三年錢鳳復攻京邑阻水而守相持月餘日焚燒城邑井堙木刊矣鳳等敗退沈充將其黨還吳興官軍踵之蹈藉郡縣充父子授首黨與誅者以百數所謂揚州破換敗吳興覆瓿砙瓿砙瓦器又小於甒也明帝太寧初童謠曰惻惻力力放馬山側大馬死小馬餓高山崩石自破及明帝崩成帝幼為蘇峻所逼遷於石頭御膳不足此大馬死小馬餓也高山峻也又言峻尋死石峻弟蘇石也峻死後石據石頭尋為諸公所破復是崩山石破之應也成帝之末又有童謠曰何隆隆駕車入梓宮少日而宮車晏駕咸康二年十二月河北謠云麥入土殺石武後如謠言庾亮初鎮武昌出至石頭百姓於岸上歌曰庾公上武昌翩翩如飛鳥庾公還揚州白馬牽旒旐又曰庾公初上時翩翩如飛烏庾公還揚州白馬牽流蘇後連徵不入及薨於鎮以喪還都葬皆如謠言穆帝升平中童兒輩忽歌於道曰阿子聞曲終輒云阿子汝聞不無幾而帝崩太后哭之曰阿子汝聞不升平末俗間忽作廉歌有扈謙者聞之曰廉者臨也歌云白門廉宮庭廉內外悉臨國家其大諱乎少時而穆帝晏駕哀帝隆和初童謠曰升平不滿斗隆和那得久桓公入石頭陛下徒跣走朝廷聞而惡之改年曰興寧人復歌曰雖復改興寧亦復無聊生哀帝尋崩升平五年而穆帝崩不滿斗升平不至十年也海西公太和中百姓歌曰青青御路楊白馬紫遊韁汝非皇太子那得甘露漿識者曰白者金行馬者國族紫為奪正之色明以紫間朱也海西公尋廢其三子並非海西公之子縊以馬韁死之明日南方獻甘露焉太和末童謠曰犁牛耕御路白門種小麥及海西公被廢百姓耕其門以種小麥遂如謠言海西公初生皇子百姓歌云鳳皇生一雛天下莫不喜本言是馬駒今定成龍子其歌甚美其旨甚微海西公不男使左右向龍與內侍接生子以為己子桓石民為荊州鎮上明百姓忽歌曰黃曇子曲中又曰黃曇英揚州大佛來上明頃之而桓石民死王忱為荊州黃曇子乃是王忱字也忱小字佛大是大佛來上明也孝武帝太元末京口謠曰黃雌雞莫作雄父啼一旦去毛衣衣被拉栖尋而王恭起兵誅王國寶旋為劉牢之所敗故言拉栖也會稽王道子於東府造土山名曰靈秀山無幾而孫恩作亂再踐會稽會稽道子所封靈秀孫恩之字也庾楷鎮歷陽百姓歌曰重羅黎重羅黎使君南上無還時後楷南奔桓玄為玄所誅殷仲堪在荊州童謠曰芒籠目繩縛腹殷當敗桓當復未幾而仲堪敗桓玄遂有荊州王恭鎮京口舉兵誅王國寶百姓謠云昔年食白飯今年食麥酉廣糸天公誅謫汝教汝捻嚨喉嚨喉喝復喝京口敗復敗識者曰昔年食白飯言得志也今年食麥酉廣糸酉廣糸粗穢其精已去明將敗也天公將加譴謫而誅之也捻嚨喉氣不通死之祥也敗復敗丁寧之辭也恭尋死京都又大行咳疾而喉並喝焉王恭在京口百姓間忽云黃頭小兒欲作賊阿公在城下指縛得又云黃頭小人欲作亂賴得金刀作藩扞黃字上恭字頭也小人恭字下也尋如謠言者焉安帝隆安中百姓忽作懊之歌其曲曰草生可攬結女兒可攬擷尋而桓玄篡位義旗以三月二日掃定京都誅之玄之宮女及逆黨之家子女妓妾悉為軍賞東及甌越北流淮泗皆人有所獲故言時則草可結事則女可擷也桓玄既篡童謠曰草生及馬腹烏啄桓玄目及玄敗走至江陵時正五月中誅如其期焉安帝義熙初童謠曰官家養蘆化成荻蘆生不止自成積其時官養盧龍寵以金紫奉以名州養之極也而龍不能懷我好音舉兵內伐遂成讐敵也蘆生不止自成積及盧龍之敗斬伐其黨猶如草木以成積也盧龍據廣州人為之謠曰蘆生漫漫竟天半後擁上流數州之地內逼京輦應天半之言義熙二年小兒相逢於道輒舉其兩手曰盧健健次曰鬬歎鬬歎末曰翁年老翁年老當時莫知所謂其後盧龍內逼舟艦蓋川健健之謂也既至查浦屢剋期欲與官鬬鬬歎之應也翁年老羣公有期頤之慶知妖逆之徒自然消殄也其時復有謠言曰盧橙橙逐水流東風忽如起那得入石頭盧龍果敗不得入石頭也昔溫嶠令郭景純卜己與庾亮吉凶景純云元吉嶠語亮曰景純每筮是不敢盡言吾等與國家同安危而曰元吉是事有成也於是協同討滅王敦苻堅初童謠云阿堅連牽三十年後若欲敗時當在江湖邊及堅在位凡三十年敗於淝水是其應也又謠語云河水清復清苻堅死新城及堅為姚萇所殺死於新城復謠歌云魚羊田升當滅秦識者以為魚羊鮮也田升卑也堅自號秦言滅之者鮮卑也其羣臣諫堅令盡誅鮮卑堅不從及淮南敗還初為慕容沖所攻又為姚萇所殺身死國滅毛蟲之孽武帝太康六年南陽獻兩足猛獸此毛蟲之孽也識者為其文曰武形有虧金獸失儀聖主應天斯異何為言兆亂也京房易傳曰足少者下不勝任也干寶以為者陰精居于陽金獸也南陽火名也金精入火而失其形王室亂之妖也六水數言水數既極火慝得作而金受其敗也至元康九年始殺太子距此十四年二七十四火始終相乘之數也自帝受命至愍懷之廢凡三十五年焉太康七年十一月丙辰四角獸見于河間河間王顒獲以獻天戒若曰角兵象也四者四方之象當有兵亂起于四方後河間王遂連四方之兵作為亂階殆其應也懷帝永嘉五年蝘鼠出延陵郭景純筮之曰此郡東之縣當有妖人欲稱制者亦尋自死矣其後吳興徐馥作亂殺太守袁琇馥亦時滅是其應也成帝咸和六年正月丁巳會州郡秀孝於樂賢堂有見於前獲之孫盛以為吉祥夫秀孝天下之彥士樂賢堂所以樂養賢也自喪亂以後風教陵夷秀孝策試乏四科之實興於前或斯故乎哀帝隆和元年十月甲申有麈入東海第百姓歡言曰麈入東海第識者怪之及海西廢為東海王乃入其第孝武太元十三年四月癸巳祠廟畢有兔行廟堂上天戒若曰兔野物也而集宗廟之堂不祥莫之甚焉犬禍公孫文懿家有犬冠幘絳衣上屋此犬禍也屋上亢陽高危之地天戒若曰亢陽無上偷自尊高狗而冠者也及文懿自立為燕王果為魏所滅京房易傳曰君不正臣欲篡厥妖狗出朝門魏侍中應璩在直廬欻見一白狗出門問衆人無見者踰年卒近犬禍也吳諸葛恪征淮南歸將朝會犬銜引其衣恪曰犬不欲我行乎還坐有頃復起犬又銜衣乃令逐犬遂升車入而被害武帝太康九年幽州有犬鼻行地三百餘步天戒若曰是時帝不思和嶠之言卒立惠帝以致衰亂是言不從之罰也惠帝元康中吳郡婁縣人家聞地中有犬子聲掘之得雌雄各一還置窟中覆以磨石經宿失所在天戒若曰帝既衰弱藩王相譖故有犬禍永興元年丹楊內史朱逵家犬生三子皆無頭後逵為揚州刺史曹武所殺孝懷帝永嘉五年吳郡嘉興張林家狗人言云天下人餓死於是果有二胡之亂天下饑荒焉愍帝建興元年狗與猪交案漢書景帝時有此以為悖亂之氣亦犬豕禍也犬兵革之占也豕北方胸奴之象逆言失聽異類相交必生害也俄而帝沒于胡是其應也元帝太興中吳郡太守張懋聞齊內牀下犬聲求而不得既而地自坼見有二犬子取而養之皆死尋而懋為沈充所害京房易傳曰讒臣在側則犬生妖太興四年廬江灊縣何旭家忽聞地中有犬子聲掘之得一母犬青釐色狀甚羸瘦走入草中不知所在視其處有二犬子一雄一雌哺而養之雌死雄活及長為犬善噬獸其後旭里中為蠻所沒安帝隆安初吳郡治下狗夜吠聚高橋上人家狗有限而吠聲甚衆或有夜覘視之云一狗假有兩三頭皆前向亂吠無幾孫恩亂於吳會焉是時輔國將軍孫無終家于既陽地中聞犬子聲尋而地坼有二犬子皆白色一雄一雌取而養之皆死後無終為桓玄所誅滅案尸子曰地中有犬名曰地狼夏鼎志曰掘地得犬名曰賈此蓋自然之物不應出而出為犬禍也桓玄將拜楚王已設拜席羣官陪位玄未及出有狗來便其席莫不驚怪玄性猜暴竟無言者逐狗改席而已天戒若曰桓玄無德而叨竊大位故犬便其席示其妄據之甚也八十日玄敗亡焉白眚白祥魏明帝青龍三年正月乙亥隕石于壽光案左氏傳隕石星也劉歆說曰庶衆惟星隕于宋者象宋襄公將得諸侯而不終也秦始皇時有隕石班固以為石陰類也又白祥臣將危君是後宣帝得政云武帝太康五年五月丁巳隕石于溫及河陽各二六年正月隕石于溫三成帝咸和八年五月星隕于肥鄉一九年正月隕石于涼州二吳孫亮五鳳二年五月陽羡縣離里山大石自立案京房易傳曰庶士為天子之祥也其說曰石立於山同姓平地異姓干寶以為孫晧承廢故之家得位其應也或曰孫休見立之祥也武帝太康十年洛陽宮西宜秋里石生地中始高三尺如香爐形後如傴人槃薄不可掘案劉向說此白眚也明年宮車晏駕王室始騷卒以亂亡京房易傳曰石立如人庶士為天下雄此近之矣惠帝元康五年十二月有石生于宜年里永康元年襄陽郡上言得鳴石撞之聲聞七八里太安元年丹楊湖熟縣夏架湖有大石浮二百步而登岸民驚噪相告曰石來干寶曰尋有石冰入建鄴車騎大將軍東嬴王騰自并州遷鎮鄴行次真定時久積雪而當門前方數丈獨消釋騰怪而掘之得玉馬高尺許口齒缺騰以馬者國姓上送之以為瑞然馬無齒則不得食妖祥之兆衰亡之徵案占此白祥也是後騰為汲桑所殺而天下遂亂武帝泰始八年五月蜀地雨白毛此白祥也時益州刺史皇甫晏伐汶山胡從事何旅固諫不從牙門張弘等衆之怨誣晏謀逆害之京房易傳曰前樂後憂厥妖天雨羽又曰邪人進賢人逃天雨毛其易妖曰天雨毛羽貴人出走三占皆應惠帝永寧元年齊王冏舉義軍軍中有小兒出於襄城繁昌縣年八歲髮體悉白頗能卜於洪範白祥也成帝咸康初地生毛近白祥也孫盛以為人勞之異也是後石季龍滅而中原向化將相皆甘心焉於是方鎮屢革邊戍仍遷皆擁帶部曲動有萬數其間征伐徵賦役無寧歲天下勞擾百姓疲怨咸康三年六月地生毛孝武太元二年五月京都地生毛至四年而氐賊次襄國圍彭城向廣陵征戍仍出兵連年不解太元十四年四月京都地生毛是時苻堅滅後經略多事人勞之應也十七年四月地生毛安帝隆安四年四月乙未地生毛或白或黑元興三年五月江陵地生毛是後江陵見襲交戰者數矣義熙三年三月地生白毛十年三月地生毛明年王旅西討司馬休之又明年北掃關洛木沴金魏齊王正始末河南尹李勝治聽事有小材激墮檛受符吏石彪頭斷之此木沴金也勝後旬日而敗惠帝元康八年五月郊禖壇石中破為二此木沴金也郊禖壇者求子之神位無故自毀太子將危之象也明年愍懷廢死孝武帝太元十年四月謝安出鎮廣陵始發石頭金鼓無故自破此木沴金之異也天意也天戒若曰安徒揚經略之聲終無其實鉦鼓不用之象也月餘以疾還而薨傳曰視之不明是謂不哲厥咎舒厥罰燠厥極疾時則有草妖時則有螺蟲之孽時則有羊禍時則有目痾時則有赤眚赤祥惟水沴火視之不明是謂不哲哲知也詩云爾德不明以亡陪亡卿不明爾德以亡背亡側言上不明暗昧蔽惑則不能知善惡親近習長同類亡功者受賞有罪者不殺百官廢亂失在舒緩故其咎舒也盛夏日長暑以養物政弛緩故其罰常燠也燠則冬溫春夏不和傷病疾人其極疾也誅不行則霜不殺草繇臣下則殺不以時故有草妖凡妖貌則以服言則以詩聽則以聲視不以色者五色物之大分也在於眚祥故聖人以為草妖失物柄之明者也溫燠生蟲故有螺蟲之孽謂螟螣之類當死不死當生而不生或多於故而為災也劉歆以為屬思心不容於易剛而苞柔為離離為火為目羊上角下蹄剛而苞柔羊大目而不精明視氣毀故有羊禍一曰暑歲羊多疫死及為怪亦是也及人則多病目者故有目痾火色赤故有赤眚赤祥凡視傷者病火氣火氣傷則水沴之其極疾者順之其福曰壽劉歆視傳曰有羽蟲之孽雞禍說以為於天文南方朱張為鳥星故為羽蟲禍亦從羽故為雞雞於易自在巽說非是庶徵之燠劉向以為春秋無冰也小燠不書無冰然後書舉其大者也京房易傳曰祿不遂行茲謂欺厥咎燠其燠雨雲四至而溫臣安祿樂逸茲謂亂燠而生蟲知罪不誅茲謂舒其燠夏則暑殺人冬則物華實重過不誅茲謂亡徵其咎當寒而燠盡六日也吳孫亮建興元年九月桃李華孫權世政煩賦重人雕於役是時諸葛恪始輔政息校官原逋責除關梁崇寬厚此舒緩之應也一說桃李寒華為草妖或屬華孽魏少帝景元三年十月桃李華時少帝深樹恩德事崇優緩此其應也惠帝元康二年二月巴西郡界草皆生華結子如麥可食時帝初即位楚王瑋矯詔誅汝南王亮及太保衛瓘帝不能察今非時草結實此燠寬舒之罰穆帝永和九年十二月桃李華是時簡文輔政事多弛略舒緩之應也草妖漢獻帝建安二十五年春正月魏武帝在洛陽起建始殿伐濯龍樹而血出又掘徙梨根傷亦血出帝惡之遂寢疾是月崩蓋草妖又赤祥是歲魏文帝黃初元年也吳孫亮五鳳元年六月交址稗草化為稻昔三苗將亡五穀變種此草妖也其後亮廢蜀劉禪景耀五年宮中大樹無故自折譙周憂之無所與言乃書柱曰衆而大其之會具而授若何復言曹者衆也魏者大也衆而大天下其當會也具而授如何復有立者乎蜀果亡如周言此草妖也吳孫晧天璽元年吳郡臨平湖自漢末穢塞是時一夕忽開除無草長老相傳此湖塞天下亂此湖開天下平吳尋亡而九服為一天紀三年八月建鄴有鬼目菜於工黃狗家生依緣棗樹長丈餘莖廣四寸厚二分又有砶菜生工吳平家高四尺如枇杷形上圓徑一尺八寸莖廣五寸兩邊生葉緑色東觀案圖名鬼目作芝草砶菜作平慮遂以狗為侍芝郎平為平慮郎皆銀印青綬干寶曰明年平吳王濬止船正得平渚姓名顯然指事之徵也黃狗者吳以土運承漢故初有黃龍之瑞及其季年而有鬼目之妖託黃狗之家黃稱不改而貴賤大殊天道精微之應也惠帝元康二年春巴西郡界竹生花紫色結實如麥外皮青中赤白味甘元康九年六月庚子有桑生東宮西廂日長尺餘甲辰枯死此與殷太戊同妖太子不能悟故至廢戮也班固稱野木生朝而暴長小人將暴居大臣之位危國亡家之象朝將為墟也是後孫秀張林用事遂至大亂永康元年四月立皇孫臧為皇太孫五月甲子就東宮桑又生於西廂明年趙王倫篡位鴆殺臧此與愍懷同妖也是月壯武國有桑化為柏而張華遇害壯武華之封邑也孝懷帝永嘉二年冬項縣桑樹有聲如解材人謂之桑樹哭案劉向說桑者喪也又為哭聲不祥之甚是時京師虛弱胡寇交侵東海王越無衛國之心四年冬季而南出五年春薨于此城石勒邀其衆圍而射之王公以下至衆庶死者十餘萬人又剖越棺焚其尸是敗也中原無所請命洛京亦尋覆沒桑哭之應也六年五月無錫縣有四株茱萸樹相樛而生狀若連理先是郭景純筮延陵蝘鼠遇臨之益曰後當復有妖樹生若瑞而非辛螫之木也儻有此東西數百里必有作逆者及此木生其後徐馥果作亂亦草妖也郭又以為木不曲直其七月豫章郡有樟樹久枯是月忽更榮茂與漢昌邑枯社復生同占是懷愍淪陷之徵元帝中興之應也明帝太寧元年九月會稽剡縣木生如人面是後王敦稱兵作逆禍敗無成昔漢哀成之世並有此妖而人貌備具故其禍亦大今此但如人面而已故其變也輕矣成帝咸和六年五月癸亥曲阿有柳樹枯倒六載是日忽復起生至九年五月甲戌吳縣吳雄家有死榆樹是日因風雨起生與漢上林斷柳起生同象初康帝為吳王于時雖改封琅邪而猶食吳郡為邑是帝越正體饗國之象也曲阿先亦吳地象見吳邑雄之舍又天意乎哀帝興寧三年五月癸卯廬陵西昌縣修明家有僵栗樹是日忽復起生時孝武年始四歲俄而哀帝崩海西即位未幾而廢簡文越自藩王入纂大業登阼享國又不踰二年而孝武嗣統帝諱昌明識者竊謂西昌修明之祥帝諱實應焉是亦與漢宣帝同象也海西太和元年涼州楊樹生松天戒若曰松者不改柯易葉楊者柔脆之木今松生於楊豈非永久之業將集危亡之地邪是時張天錫稱雄於涼州尋而降苻堅孝武太元十四年六月建寧郡銅樂縣枯樹斷折忽然自立相屬京房易傳曰棄正作淫厥妖木斷自屬妃后有專木仆反立是時正道多僻其後張夫人專寵及帝崩兆庶歸咎張氏焉安帝元興三年荊江二州界竹生實如麥義熙二年九月揚武將軍營士陳蓋家有苦砶菜莖高四尺六寸廣三尺二寸厚三寸亦草妖也此殆與吳終同象識者以為苦砶者買勤苦也自後歲歲征討百姓勞苦是買苦也十餘年中姚泓滅兵始戢是苦砶之應也義熙中宮城上及御道左右皆生蒺藜亦草妖也蒺藜有刺不可踐而行生宮牆及馳道天戒若曰人君不聽政雖有宮室馳道若空廢也故生蒺藜羽蟲之孽魏文帝黃初四年五月有鵜鶘鳥集靈芝池案劉向說此羽蟲之孽又青祥也詔曰此詩人所謂汙澤者也曹詩刺共公遠君子近小人今豈有賢智之士處于下位否則斯鳥何為而至哉其博舉天下俊德茂才獨行君子以答曹人之刺於是楊彪管寧之徒咸見薦舉此所謂覩妖知懼者也然猶不能優容亮直而多溺偏私矣京房易傳曰辟退有德厥妖水鳥集于國中黃初元年未央宮中又有燕生鷹口爪俱赤此與商紂宋隱同象景初元年又有燕生巨鷇於衛國李蓋家形若鷹吻似燕此羽蟲之孽又赤眚也高堂隆曰此魏室之大異宜防鷹揚之臣於蕭牆之內其後宣帝起誅曹爽遂有魏室漢獻帝建安二十三年禿鶖鳥集鄴宮文昌殿後池明年魏武王薨魏文帝黃初三年又集雒陽芳林園池七年又集其夏文帝崩景初末又集芳林園池已前再至輒有大喪帝惡之其年明帝崩蜀劉禪建興九年十月江陽至江州有鳥從江南飛渡江北不能達墮水死者以千數是時諸葛亮連年動衆志吞中夏而終死渭南所圖不遂又諸將分爭頗喪徒旅鳥北飛不能達墮水死者皆有其象也亮竟不能過渭又其應乎此與漢時楚國烏鬬墮泗水粗類矣景初元年陵霄闕始構有鵲巢其上鵲體白黑雜色此羽蟲之孽又白黑祥也帝以問高堂隆對曰詩云惟鵲有巢惟鳩居之今興起宮室而鵲來巢此宮室未成身不得居之象也天戒若曰宮室未成將有他姓制御之不可不深慮於是帝改顏動色吳孫權赤烏十二年四月有兩烏銜鵲墮東館權使領丞相朱據燎鵲以祭案劉歆說此羽蟲之孽又黑祥也視不明聽不聰之罰也是時權意溢德衰信讒好殺二子將危將相俱殆覩妖不悟加之以燎昧道之甚者也明年太子和廢魯王霸賜死朱據左遷陸議憂卒是其應也東館典教之府鵲墮東館又天意乎吳孫權太元二年正月封前太子和為南陽王遣之長沙有鵲巢其帆檣和故宮僚聞之皆憂慘以為檣末傾危非久安之象是後果不得其死孫亮建興二年十一月有大鳥五見于春申吳人以為鳳皇明年改元為五鳳漢桓帝時有五色大鳥司馬彪云政道衰缺無以致鳳乃羽蟲孽耳孫亮未有德政孫峻驕暴方甚此與桓帝同事也案瑞應圖大鳥似鳳而為孽者非一宜皆是也孫晧建衡三年西苑言鳳皇集以之改元義同於亮武帝泰始四年八月有翟雉飛上閶闔門天戒若曰閶闔門非雉所止猶殷宗雉登鼎耳之戒也惠帝永康元年趙王倫既篡京師得異鳥莫能名倫使人持出周旋城邑匝以問人積日宮西有小兒見之逆自言曰服留鳥翳持者即還白倫倫使更求又見之乃將入宮密籠鳥并閉小兒戶中明日視之悉不見此羽蟲之孽時趙王倫有目瘤之疾言服留者謂倫留將服其罪也尋而倫誅趙王倫篡位有鶉入太極殿雉集東堂天戒若曰太極東堂皆朝享聽政之所而鶉雉同日集之者趙王倫不當居此位也詩云鵲之強強鶉之奔奔人之無良我以為君其此之謂乎尋而倫滅孝懷帝永嘉元年二月洛陽東北步廣里地陷有蒼白二色鵝出蒼者飛翔沖天白者止焉此羽蟲之孽又黑白祥也陳留董養曰步廣周之狄泉盟會地也白者金色國之行也蒼為胡象其可盡言乎是後劉元海石勒相繼亂華明帝太寧三年八月庚戌有大鳥二蒼黑色翼廣一丈四尺其一集司徒府射而殺之其一集市北家人舍亦獲焉此羽蟲之孽又黑祥也及閏月戊子而帝崩後遂有蘇峻祖約之亂成帝咸和二年正月有五鷗鳥集殿庭此又白祥也是時庾亮苟違衆謀將召蘇峻有言不從之咎故白祥先見也三年二月峻果作亂宮掖焚毀化為汙萊此其應也咸康八年七月有白鷺集殿屋是時康帝始即位不永之祥也後涉再期而帝崩案劉向曰野鳥入處宮室將空此其應也海西初以興寧三年二月即位有野雉集于相風此羽蟲之孽也尋為桓溫所廢也孝武帝太元十六年六月鵲巢太極東頭鵄尾又巢國子學堂西頭十八年東宮始成十九年正月鵲又巢其西門此殆與魏景初同占學堂風教之所聚西頭又金行之祥及帝崩後安皇嗣位桓玄遂篡風教乃穨金行不競之象也安帝義熙三年龍驤將軍朱猗戍壽陽婢炊飯忽有羣烏集竈競來啄噉婢驅逐不去有獵狗咋殺兩烏餘烏因共啄殺狗又噉其肉唯餘骨存此亦羽蟲之孽又黑祥也明年六月猗死此其應也羊禍成帝咸和二年五月司徒王導廄羊生無後足此羊禍也京房易傳曰足少者下不勝任也明年蘇峻破京都導與帝俱幽石頭僅乃得免是其應也赤眚赤祥公孫文懿時襄平北市生肉長圍各數尺有頭目口喙無手足而動搖此赤祥也占曰有形不成有體不聲其國滅亡文懿尋為魏所誅吳戍將鄧喜殺猪祠神治畢懸之忽見一人頭往食肉喜引弓射中之咋咋作聲繞屋三日近赤祥也後人白喜謀北叛闔門被誅京房易傳曰山見葆江于邑邑有兵狀如人頭赤色武帝太康五年四月壬子魯國池水變赤如血七年十月河陰有赤雪二頃此赤祥也是後四載而帝崩王室遂亂惠帝元康五年三月呂縣有流血東西百餘步此赤祥也至元康末窮凶極亂僵尸流血之應也干寶以為後八載而封雲亂徐州殺傷數萬人是其應也永康元年三月尉氏雨血夫政刑舒緩則有常燠赤祥之妖此歲正月送愍懷太子幽于許宮天戒若曰不宜緩恣姦人將使太子冤死惠帝愚眊不寤是月愍懷遂斃於是王室成釁禍流天下淖齒殺齊湣王日天雨血霑衣天以告也此之謂乎京房易傳曰歸獄不解茲謂追非厥咎天雨血茲謂不親下有惡心不出三年無其宗又曰佞人祿功臣戮天雨血也愍帝建興元年十二月河東地震雨肉四年十二月丙寅丞相府斬督運令史淳于伯血逆流上柱二丈三尺此赤祥也是時後將軍褚裒鎮廣陵丞相揚聲北伐伯以督運稽留及役使贓罪依軍法戮之其息訴稱督運事訖無所稽乏受賕役使罪不及死兵家之勢先聲後實實是屯戍非為征軍自四年已來運漕稽停皆不以軍興法論僚佐莫之理及有變司直彈劾衆官元帝不問遂頻旱三年干寶以為冤氣之應也郭景純曰血者水類同屬于坎坎為法象水平潤下不宜逆流此政有咎失之徵也劉聰僞建元元年正月平陽地震其崇明觀陷為池水赤如血赤氣至天有赤龍奮迅而去流星起于牽牛入紫微龍形委蛇其光照地落于平陽北十里視之則肉臭聞于平陽長三十步廣二十七步肉旁常有哭聲晝夜不止數日聰后劉氏産一蛇一獸各害人而走尋之不得頃之見於隕肉之旁是時劉聰納劉殷三女並為其后天戒若曰聰既自稱劉姓三后又俱劉氏逆骨肉之綱亂人倫之則隕肉諸妖其眚亦大俄而劉氏死哭聲自絶
