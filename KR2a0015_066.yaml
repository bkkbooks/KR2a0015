body:
  text: 晉書卷六十六列傳第三十六劉弘劉弘字和季沛國相人也祖馥魏揚州刺史父靖鎮北將軍弘有幹略政事之才少家洛陽與武帝同居永安里又同年共研席以舊恩起家太子門大夫纍遷率更令轉太宰長史張華甚重之由是為寧朔將軍假節監幽州諸軍事領烏丸校尉甚有威惠寇盜屏迹為幽朔所稱以勳德兼茂封宣城公太安中張昌作亂轉使持節南蠻校尉荊州刺史率前將軍趙驤等討昌自方城至宛新野所向皆平及新野王歆之敗也以弘代為鎮南將軍都督荊州諸軍事餘官如故弘遣南蠻長史陶侃為大都護參軍蒯為義軍督護牙門將皮初為都戰帥進據襄陽張昌并軍圍宛敗趙驤軍弘退屯梁侃初等纍戰破昌前後斬首數萬級及到官昌懼而逃其衆悉降荊土平初弘之退也范陽王虓遣長水校尉張奕領荊州弘至奕不受代舉兵距弘弘遣軍討奕斬之表曰臣以凡才謬荷國恩作司方州奉辭伐罪不能奮揚雷霆折衝萬里軍良於宛分受顯戮猥蒙含宥被遣之職即進達所鎮而范陽王虓先遣前長水校尉張奕領荊州臣至不受節度擅舉兵距臣今張昌姦黨初平昌未梟擒益梁流人蕭條猥集無賴之徒易相扇動飆風駭蕩則滄海橫波苟患失之無所不至比須表上慮失事機輒遣軍討奕即梟其首奕雖貪亂欲為荼毒由臣劣弱不勝其任令奕肆心以勞資斧敢引覆餗之刑甘受專輒之罪詔曰將軍文武兼資前委方夏宛城不守咎由趙驤將軍所遣諸軍克滅羣寇張奕貪禍距違詔命將軍致討傳首闕庭雖有不請之嫌古人有專之之義其恢宏奧略鎮綏南海以副推轂之望焉張昌竄于下雋山弘遣軍討昌斬之悉降其衆時荊部守宰多闕弘請補選帝從之弘乃功銓德隨才補授甚為論者所稱乃表曰被中詔敕臣隨資品選補諸缺吏夫慶賞刑威非臣所專且知人則哲聖帝所難非臣暗蔽所能斟酌然萬事有機豪氂宜慎謹奉詔書差所應用蓋崇化莫若貴德則所以濟屯故太上立德其次立功也頃者多難淳朴彌凋臣輒以徵士伍朝補零陵太守庶以懲波蕩之弊養退讓之操臣以不武前退於宛長史陶侃參軍蒯牙門皮初勠力致討蕩滅姦凶侃各以始終軍事初為都戰帥忠勇冠軍漢沔清肅實初等之勳也司馬法賞不踰時欲人知為善之速福也若不超報無以勸徇功之士慰熊羆之志臣以初補襄陽太守侃為府行司馬使典論功事為山都令詔惟令臣以散補空缺然沶鄉令虞潭忠誠烈正首唱義舉舉善以教不能者勸臣輒特轉潭補醴陵令南郡廉吏仇勃母老疾困賊至守衛不移以致拷掠幾至隕命尚書令史郭貞張昌以為尚書郎欲訪以朝議遁逃不出昌質其妻子避之彌遠勃孝篤著於臨危貞忠厲於強暴雖各四品皆可以訓奬臣子長益風教臣輒以勃為歸鄉令貞為信陵令皆功行相參循名校實條列行狀公文具上朝廷以初雖有功襄陽又是名郡名器宜慎不可授初乃以前東平太守夏侯陟為襄陽太守餘並從之陟弘之壻也弘下教曰夫統天下者宜與天下一心化一國者宜與一國為任若必姻親然後可用則荊州十郡安得十女壻然後為政哉乃表陟姻親舊制不得相監皮初之勳宜見酬報詔聽之弘於是勸課農桑寬刑省賦歲用有年百姓愛悅弘嘗夜起聞城上持更者歎聲甚苦遂呼省之兵年過六十羸疾無襦弘愍之乃謫罰主者遂給韋袍復帽轉以相付舊制峴方二山澤中不聽百姓捕魚弘下教曰禮名山大澤不封與共其利今公私并兼百姓無復厝手地當何謂邪速改此法又酒室中云齊中酒聽事酒猥酒同用麴米而優劣三品投醪當與三軍同其薄厚自今不得分別時益州刺史羅尚為李特所敗遣使告急請糧弘移書贍給而州府綱紀以運道懸遠文武匱乏欲以零陵一運米五千斛與尚弘曰諸君未之思耳天下一家彼此無異吾今給之則無西顧之憂矣遂以零陵米三萬斛給之尚賴以自固于時流人在荊州十餘萬戶羈旅貧乏多為盜賊弘乃給其田種糧食擢其賢才隨資用時總章太樂伶人避亂多至荊州或勸可作樂者弘曰昔劉景升以禮壞樂崩命杜夔為天子合樂樂成欲庭作之夔曰為天子合樂而庭作之恐非將軍本意吾常為之歎息今主上蒙塵吾未能展效臣節雖有家伎猶不宜聽況御樂哉乃下郡縣使安慰之須朝廷旋返送還本署論平張昌功應封次子一人縣侯弘上疏固讓許之進拜侍中鎮南大將軍開府儀同三司惠帝幸長安河間王顒挾天子詔弘為劉喬繼援弘以張方殘暴知顒必敗遣使受東海王越節度時天下大亂弘專督江漢威行南服前廣漢太守辛冉説弘以從橫之事弘大怒斬之河間王顒使張光為順陽太守南陽太守衛展説弘曰彭城王前東奔有不善之言張光太宰腹心宜斬光以明向背弘曰宰輔得失豈張光之罪危人自安君子弗為也展深恨之陳敏寇揚州引兵欲西上弘乃解南蠻以授前北軍中候蔣超統江夏太守陶侃武陵太守苗光以大衆屯于夏口又遣治中何松領建平宜都襄陽三郡兵屯巴東為羅尚後繼又加南平太守應詹寧遠將軍督三郡水軍繼蔣超侃與敏同郡又同歲舉吏或有間侃者弘不疑之乃以侃為前鋒督護委以討敏之任侃遣子及兄子為質弘遣之曰賢叔征行君祖母年高便可歸也匹夫之交尚不負心何況大丈夫乎陳敏竟不敢窺境永興三年詔進號車騎將軍開府及餘官如故弘每有興廢手書守相丁寧款密所以人皆感悅爭赴之咸曰得劉公一紙書賢於十部從事及東海王越奉迎大駕弘遣參軍劉盤為督護率諸軍會之盤既旋弘自以老疾將解州及校尉適分授所部未及表上卒于襄陽士女嗟痛若喪所親矣初成都王穎南奔欲之本國弘距之及弘卒弘司馬郭勱欲推穎為主弘子璠追遵弘志於是墨絰率府兵討勱戰於濁水斬之襄沔肅清初東海王越疑弘與劉喬二于己雖下節度心未能安及弘距穎璠又斬勱朝廷嘉之越手書與璠贊美之表贈弘新城郡公諡曰元以高密王略代鎮寇盜不禁詔起璠為順陽內史江漢之間翕然歸心及略薨山簡代之簡至知璠得衆心恐百姓逼以為主表陳之由是徵璠為越騎校尉璠亦深慮逼迫被書便輕至洛陽然後遣迎家纍僑人侯脫路難等相率衛送至都然後辭去南夏遂亂父老追思弘雖甘棠之詠召伯無以過也陶侃子洪瞻夏琦旗斌稱範岱兄子臻臻弟輿陶侃字士行本鄱陽人也吳平徙家廬江之尋陽父丹吳揚武將軍侃早孤貧為縣吏鄱陽孝廉范逵嘗過侃時倉卒無以待賓其母乃截髮得雙髲以易酒肴樂飲極歡雖僕從亦過所望及逵去侃追送百餘里逵曰卿欲仕郡乎侃曰欲之困於無津耳逵過廬江太守張夔稱美之夔召為督郵領樅陽令有能名遷主簿會州部從事之郡欲有所按侃閉門部勒諸吏謂從事曰若鄙郡有違自當明憲直繩不宜相逼若不以禮吾能禦之從事即退夔妻有疾將迎醫於數百里時正寒雪諸綱紀皆難之侃獨曰資於事父以事君小君猶母也安有父母之疾而不盡心乎乃請行衆咸服其義長沙太守萬嗣過廬江見侃虛心敬悅曰君終當有大名命其子與之結友而去夔察侃為孝廉至洛陽數詣張華華初以遠人不甚接遇侃每往神無忤色華後與語異之除郎中伏波將軍孫秀以亡國支庶府望不顯中華人士恥為掾屬以侃寒宦召為舍人時豫章國郎中令楊侃州里也為鄉論所歸侃詣之曰易稱貞固足以幹事陶士行是也與同乘見中書郎顧榮榮甚奇之吏部郎溫雅謂曰奈何與小人共載曰此人非凡器也尚書樂廣欲會荊揚士人武庫令黃慶進侃於廣人或非之慶曰此子終當遠到復何疑也慶後為吏部令史舉侃補武岡令與太守呂嶽有嫌棄官歸為郡小中正會劉弘為荊州刺史將之官辟侃為南蠻長史遣先向襄陽討賊張昌破之弘既至謂侃曰吾昔為羊公參軍謂吾其後當居身處今相觀察必繼老夫矣後以軍功封東鄉侯邑千戶陳敏之亂弘以侃為江夏太守加鷹揚將軍侃備威儀迎母官舍鄉里榮之敏遣其弟恢來寇武昌侃出兵禦之隨郡內史扈瓌間侃於弘曰侃與敏有鄉里之舊居大郡統強兵脫有異志則荊州無東門矣弘曰侃之忠能吾得之已久豈有是乎侃潛聞之遽遣子洪及兄子臻詣弘以自固弘引為參軍資而遣之又加侃為督護使與諸軍并力距恢侃乃以運船為戰艦或言不可侃曰用官物討官賊但須列上有本末耳於是擊恢所向必破侃戎政齊肅凡有虜獲皆分士卒身無私焉後以母憂去職嘗有二客來弔不哭而退化為雙鶴沖天而去時人異之服闋參東海王越軍事江州刺史華軼表侃為揚武將軍使屯夏口又以臻為參軍軼與元帝素不平臻懼難作託疾而歸白侃曰華彥夏有憂天下之志而才不足且與琅邪不平難將作矣侃怒遣臻還軼臻遂東歸於帝帝見之大悅命臻為參軍加侃奮威將軍假赤幢曲蓋軺車鼓吹侃乃與華軼告絶頃之遷龍驤將軍武昌太守時天下飢荒山夷多斷江劫掠侃令諸將詐作商船以誘之劫果至生獲數人是西陽王羕之左右侃即遣兵逼羕令出向賊侃整陳於釣臺為後繼羕縛送帳下二十人侃斬之自是水陸肅清流亡者歸之盈路侃竭資振給焉又立夷市於郡東大收其利而帝使侃擊杜韜令振威將軍周訪廣武將軍趙誘受侃節度侃令二將為前鋒兄子輿為左甄擊賊破之時周顗為荊州刺史先鎮潯水城賊掠其良口侃使部將朱伺救之賊退保泠口侃謂諸將曰此賊必更步向武昌吾宜還城晝夜三日行可至卿等誰能忍飢鬬邪部將吳寄曰要欲十日忍飢晝當擊賊夜分捕魚足以相濟侃曰卿健將也賊果增兵來攻侃使朱伺等逆擊大破之獲其輜重殺傷甚衆遣參軍王貢告捷于王敦敦曰若無陶侯便失荊州矣伯仁方入境便為賊所破不知那得刺史貢對曰鄙州方有事難非陶龍驤莫可敦然之即表拜侃為使持節寧遠將軍南蠻校尉荊州刺史領西陽江夏武昌鎮于沌口又移入沔江遣朱伺等討江夏賊殺之賊王沖自稱荊州刺史據江陵王貢還至竟陵矯侃命以杜曾為前鋒大督護進軍斬沖悉降其衆侃召曾不到貢又恐矯命獲罪遂與曾舉兵反擊侃督護鄭攀於沌陽破之又敗朱伺於沔口侃欲退入溳中部將張奕將二於侃詭説曰賊至而動衆必不可侃惑之而不進無何賊至果為所敗賊鉤侃所乘艦侃窘急走入小船朱伺力戰僅而獲免張奕竟奔于賊侃坐免官王敦表以侃白衣領職侃復率周訪等進軍入湘使都尉楊舉為先驅擊杜韜大破之屯兵于城西侃之佐史辭詣王敦曰州將陶使君孤根特立從微至著忠允之功所在有效出佐南夏輔翼劉征南前遇張昌後屬陳敏侃以偏旅獨當大寇無征不克羣醜破滅近者王如亂北杜韜跨南二征奔走一州星馳其餘郡縣所在土崩侃招攜以禮懷遠以德子來之衆前後纍至奉承指授獨守危厄人往不動人離不散往年董督徑造湘城志陵雲霄神機獨斷徒以軍少糧懸不果獻捷然杜韜懾懼來還夏口未經信宿建平流人迎賊俱叛侃即回軍遡流芟夷醜類至使西門不鍵華圻無虞者侃之功也明將軍愍此荊楚救命塗炭使侃統領窮殘之餘寒者衣之飢者食之比屋相慶有若挾纊江濱孤危地非重險非可單軍獨能保固故移就高莋以避其衝賊輕易先至大衆在後侃距戰經日殺其名帥賊尋犬羊相結并力來攻侃以忠臣之節義無退顧被堅執鋭身當戎行將士奮擊莫不用命當時死者不可勝數賊衆參伍更息更戰侃以孤軍一隊力不獨禦量宜取全以俟後舉而主者責侃重加黜削侃性謙沖功成身退今奉還所受唯恐稽遲然某等區區實恐理失於內事敗於外豪氂之差將致千里使荊蠻乖離西嵎不守脣亡齒寒侵逼無限也敦於是奏復侃官韜將王貢精卒三千出武陵江誘五溪夷以舟師斷官運徑向武昌侃使鄭攀及伏波將軍陶延夜趣巴陵潛師掩其不備大破之斬千餘級降萬餘口貢遁還湘城賊中離阻杜韜遂疑張奕而殺之衆情益懼降者滋多王貢復挑戰侃遙謂之曰杜韜為益州吏盜用庫錢父死不奔喪卿本佳人何為隨之也天下寧有白頭賊乎貢初橫燧馬上侃言訖貢斂容下燧辭色甚順侃知其可動復令諭之截髮為信貢遂來降而韜敗走進克長沙獲其將毛寶高寶梁堪而還王敦深忌侃功將還江陵欲詣敦別皇甫方回及朱伺等諫以為不可侃不從敦果留侃不遣左轉廣州刺史平越中郎將以王廙為荊州侃之佐吏將士詣敦請留侃敦怒不許侃將鄭樊手蘇溫馬俊等不欲南行遂西迎杜曾以距廙敦意攀承侃風旨被甲持矛將殺侃出而復回者數四侃正色曰使君之雄斷當裁天下何此不決乎因起如廁咨議參軍梅陶長史陳頒言於敦曰周訪與侃親姻如左右手安有斷人左手而右手不應者乎敦意遂解於是設盛饌以餞之侃便夜發敦引其子瞻為參軍侃既達豫章見周訪流涕曰非卿外援我殆不免侃因進至始興先是廣州人背刺史郭訥迎長沙人王機為刺史機復遣使詣王敦乞為交州敦從之而機未發會杜弘據臨賀因機乞降勸弘取廣州弘遂與溫邵及交州秀才劉沈俱謀反或勸侃且住始興觀察形勢侃不聽直至廣州弘遣使偽降侃知其詐先於封口起發石車俄而弘率輕兵而至知侃有備乃退侃追擊破之執劉沈於小桂又遣部將許高討機斬之傳首京都諸將皆請乘勝擊溫邵侃笑曰吾威名已著何事遣兵但一函紙自足耳於是下書諭之邵懼而走追獲於始興以功封柴桑侯食邑四千戶侃在州無事輒朝運百甓於齋外暮運於齋內人問其故答曰吾方致力中原過爾優逸恐不堪事其勵志勤力皆此類也太興初進號平南將軍尋加都督交州軍事及王敦舉兵反詔侃以本官領江州刺史尋轉都督湘州刺史敦得志上侃復本職加散騎常侍時交州刺史王諒為賊梁碩所陷侃遣將高寶進擊平之以侃領交州刺史録前後功封次子夏為都亭侯進號征南大將軍開府儀同三司及王敦平遷都督荊雍益梁州諸軍事領護南蠻校尉征西大將軍荊州刺史餘如故楚郢士女莫不相慶侃性聰敏勤於吏職恭而近禮愛好人倫終日斂膝危坐閫外多事千緒萬端罔有遺漏遠近書疏莫不手答筆翰如流未嘗壅滯引接疏遠門無停客常語人曰大禹聖者乃惜寸陰至於衆人當惜分陰豈可逸遊荒醉生無益於時死無聞於後是自棄也諸參佐或以談戲廢事者乃命取其酒器蒱博之具悉投之于江吏將則加鞭撲曰樗蒱者牧月者奴戲耳老莊浮華非先王之法言不可行也君子當正其衣冠攝其威儀何有亂頭養望自謂宏達邪有奉饋者皆問其所由若力作所致雖微必喜慰賜參倍若非理得之則切厲訶辱還其所饋嘗出遊見人持一把未熟稻侃問用此何為人云行道所見聊取之耳侃大怒曰汝既不田而戲賊人稻執而鞭之是以百姓勤於農殖家給人足時造船木屑及竹頭悉令舉掌之咸不解所以後正會積雪始晴聽事前餘雪猶溼於是以屑布地及桓溫伐蜀又以侃所貯竹頭作丁裝船其綜理微密皆此類也暨蘇峻作逆京都不守侃子瞻為賊所害平南將軍溫嶠要侃同赴朝廷初明帝崩侃不在顧命之列深以為恨答嶠曰吾疆埸外將不敢越局嶠固請之因推為盟主侃乃遣督護龔登率衆赴嶠而又追回嶠以峻殺其子重遣書以激怒之侃妻龔氏亦固勸自行於是便戎服登舟星言兼邁瞻喪至不臨五月與溫嶠庾亮等俱會石頭諸軍即欲決戰侃以賊盛不可爭鋒當以歲月智計擒之纍戰無功諸將請於查浦築壘監軍部將李根建議請立白石壘侃不從曰若壘不成卿當坐之根曰查浦地下又在水南唯白石峻極險固可容數千人賊來攻不便滅賊之術也侃笑曰卿良將也乃從根謀夜修曉訖賊見壘大驚賊攻大業壘侃將救之長史殷羡曰若遣救大業步戰不如峻則大事去矣但當急攻石頭峻必救之而大業自解侃又從羡言峻果棄大業而救石頭諸軍與峻戰陳陵東侃督護竟陵太守李陽部將彭世斬峻於陳賊衆大潰峻弟逸復聚衆侃與諸軍斬逸於石頭初庾亮少有高名以明穆皇后之兄受顧命之重蘇峻之禍職亮是由及石頭平懼侃致討亮用溫嶠謀詣侃拜謝侃遽止之曰庾元規乃拜陶士行邪王導入石頭城令取故節侃笑曰蘇武節似不如是導有慚色使人屏之侃旋江陵尋以為侍中太尉加羽葆鼓吹改封長沙郡公邑三千戶賜絹八千匹加都督交廣寧七州軍事以江陵偏遠移鎮巴陵遣咨議參軍張誕討五溪夷降之屬後將軍郭默矯詔襲殺平南將軍劉胤輒領江州侃聞之曰此必詐也遣將軍宋夏陳修率兵據湓口侃以大軍繼進默遣使送妓婢絹百匹寫中詔呈侃參佐多諫曰默不被詔豈敢為此事若進軍宜待詔報侃厲色曰國家年小不出胸懷且劉胤為朝廷所禮雖方任非才何緣猥加極刑郭默虓勇所在暴掠以大難新除威網寬簡欲因隙會騁其從橫耳發使上表討默與王導書曰郭默殺方州即用為方州害宰相便為宰相乎導答曰默居上流之勢加有船艦成資故苞含隱忍使其有地一月潛嚴足下軍到是以得風發相赴豈非遵養時晦以定大事者邪侃省書笑曰是乃遵養時賊也侃既至默將宗侯縛默父子五人及默將張丑詣侃降侃斬默等默在中原數與石勒等戰賊畏其勇聞侃討之兵不血刃而擒也益畏侃蘇峻將馮鐵殺侃子奔于石勒勒以為戍將侃告勒以故勒召而殺之詔侃都督江州領刺史增置左右長史司馬從事中郎四人掾屬十二人侃旋于巴陵因移鎮武昌侃命張夔子隱為參軍范逵子珧為湘東太守辟劉弘曾孫安為掾屬表論梅陶凡微時所荷一餐咸報遣子斌與南中郎將桓宣西伐樊城走石勒將郭敬使兄子臻竟陵太守李陽等共破新野遂平襄陽拜大將軍劍履上殿入朝不趨讚拜不名上表固讓曰臣非貪榮於疇昔而虛讓於今日事有合於時宜臣豈敢與陛下有違理有益於聖世臣豈與朝廷作異臣常欲除諸浮長之事遣諸虛假之用非獨臣身而已若臣杖國威靈梟雄斬勒則又何以加咸和七年六月疾篤又上表遜位曰臣少長孤寒始願有限過蒙聖朝歷世殊恩陛下睿鑒寵靈彌泰有始必終自古而然臣年垂八十位極人臣啓手啓足當復何恨但以陛下春秋尚富餘寇不誅山陵未反所以憤愾兼懷不能已已臣雖不知命年時已邁國恩殊特賜封長沙隕越之日當歸骨國土臣父母舊葬今在尋陽緣存處亡無心分違已勒國臣修遷改之事刻以來秋奉迎窀穸葬事訖乃告老下藩不圖所患遂爾綿篤伏枕感結情不自勝臣間者猶為犬馬之齒尚可小延欲為陛下西平李雄北吞石季龍是以遣毋丘奧於巴東授桓宣於襄陽良圖未於此長乖此方之任內外之要願陛下速選臣代使必得良才奉宣王猷遵成臣志則臣死之日猶生之年陛下雖聖姿天縱英奇日新方事之殷當賴羣俊司徒導鑒識經遠光輔三世司空鑒簡素貞正內外惟允平西將軍亮雅量詳明器用周時即陛下之周召也獻替疇咨敷融政道地平天成四海幸賴謹遣左長史殷羡奉送所假節麾幢曲蓋侍中貂蟬太尉章荊江州刺史印傳棨戟仰戀天恩悲酸感結以後事付右司馬王愆期加督護統領文武侃輿車出臨津就船明日薨于樊溪時年七十六成帝下詔曰故使持節侍中太尉都督荊江雍梁交廣益寧八州諸軍事荊江二州刺史長沙郡公經德蘊哲謀猷弘遠作藩于外八州肅清勤王于內皇家以寧乃者桓文之勳伯舅是憑方賴大猷俾屏豫一人前進位大司馬禮秩策命未及加崇昊天不弔奄忽薨殂朕用震悼于厥心今遣兼鴻臚追贈大司馬假蜜章祠以太牢魂而有靈嘉茲寵榮又策諡曰桓祠以太牢侃遺令葬國南二十里故吏刊石立碑畫像於武昌西侃在軍四十一載雄毅有權明悟善決斷自南陵迄于白帝數千里中路不拾遺蘇峻之役庾亮輕進失利亮司馬殷融詣侃謝曰將軍為此非融等所裁將軍王章至曰章自為之將軍不知也侃曰昔殷融為君子王章為小人今王章為君子殷融為小人侃性纖密好問頗類趙廣漢嘗課諸營種柳都尉夏施盜官柳植之於己門侃後見駐車問曰此是武昌西門前柳何因盜來此種施惶怖謝罪時武昌號為多士殷浩庾翼等皆為佐吏侃每飲酒有定限常歡有餘而限已竭浩等勸更少進侃悽懷良久曰年少曾有酒失亡親見約故不敢踰議者以武昌北岸有邾城宜分兵鎮之侃每不答而言者不已侃乃渡水獵引將佐語之曰我所以設險而禦寇正以長江耳邾城隔在江北內無所倚外接羣夷夷中利深晉人貪利夷不堪命必引寇虜乃致禍之由非禦寇也且吳時此城乃三萬兵守今縱有兵守之亦無益於江南若羯虜有可乘之會此又非所資也後庾亮戍之果大敗季年懷止足之分不與朝權未亡一年欲遜位歸國佐吏等苦留之及疾篤將歸長沙軍資器仗牛馬舟船皆有定簿封印倉庫自加管鑰以付王愆期然後登舟朝野以為美談將出府門顧謂愆期曰老子婆娑正坐諸君輩尚書梅陶與親人曹識書曰陶公機神明鑒似魏武忠順勤勞似孔明陸抗諸人不能及也謝安每言陶公雖用法而得法外意其為世所重如此然媵妾數十家僮千餘珍奇寶貨富於天府或云侃少時漁於雷澤網得一織梭以挂于壁有頃雷雨自化為龍而去又夢生八翼飛而上天見天門九重已登其八唯一門不得入閽者以杖擊之因墜地折其左翼及寤左腋猶痛又嘗如廁見一人朱衣介幘斂板曰以君長者故來相報君後當為公位至八州都督有善相者師圭謂侃曰君左手中指有豎理當為公若徹於上貴不可言侃以針決之見血灑壁而為公字以紙裛手公字愈明及都督八州據上流握強兵潛有窺窬之志每思折翼之祥自抑而止侃有子十七人唯洪瞻夏琦旗斌稱範岱見舊史餘者並不顯洪辟丞相掾早卒瞻字道真少有才器歷廣陵相廬江建昌二郡太守遷散騎常侍都亭侯為蘇峻所害追贈大鴻臚諡愍悼世子以夏為世子及送侃喪還長沙夏與斌及稱各擁兵數千以相圖既而解散斌先往長沙悉取國中器仗財物夏至殺斌庾亮上疏曰斌雖醜惡罪在難忍然王憲有制骨肉至親親運刀鋸以刑同體傷父母之恩無惻隱之心應加放黜以懲暴虐亮表未至都而夏病卒詔復以瞻息弘襲侃爵仕至光祿勳卒子綽之嗣綽之卒子延壽嗣宋受禪降為吳昌侯五百戶琦司空掾旗歷位散騎常侍郴縣開國伯咸和末為散騎侍郎性甚凶暴卒子定嗣卒子襲之嗣卒子謙之嗣宋受禪國除斌尚書郎稱東中郎將南平太守南蠻校尉假節性虓勇不倫與諸弟不協後加建威將軍咸康五年庾亮以稱為監江夏隨義陽三郡軍事南中郎將江夏相以本所領二千人自隨到夏口輕將二百人下見亮亮大會吏佐責稱前後罪惡稱拜謝因罷出亮使人於閣外收之棄市亮上疏曰案稱大司馬侃之孽子父亡不居喪位荒耽于酒昧利偷榮擅攝五郡自謂監軍輒召王官聚之軍府故車騎將軍劉弘曾孫安寓居江夏及將楊恭趙韶並以言色有忤稱放聲當殺安恭懼自赴水而死韶於獄自盡將軍郭開從稱往長沙赴喪稱疑開附其兄弟乃反縛懸頭於帆檣仰而彈之鼓棹渡江二十餘里觀者數千莫不震駭又多藏匿府兵收坐應死臣猶未忍直上且免其司馬稱肆縱醜言無所顧忌要結諸將欲阻兵構難諸將惶懼莫敢酬答由是姦謀未即發露臣以侃勳勞王室是以依違容掩故表為南中郎將與臣相近思欲有以匡救之而稱豺狼愈甚發言激切不忠不孝莫此之甚苟利社稷義有專斷輒收稱伏法範最知名太元初為光祿勳岱散騎侍郎臻字彥遐有勇略智謀賜爵當陽亭侯咸和中為南郡太守領南蠻校尉假節卒官追贈平南將軍諡曰肅臻弟輿果烈善戰以功纍遷武威將軍初賊張奕本中州人元康中被差西征遇天下亂遂留蜀至是率三百餘家欲就杜韜為侃所獲諸將請殺其丁壯取其妻息輿曰此本官兵數經戰陳可赦之以為用侃赦之以配輿及侃與杜韜戰敗賊以桔橰打沒官軍船艦軍中失色輿率輕舸出其上流以擊之所向輒克賊又率衆將焚侃輜重輿又擊破之自是每戰輒克賊望見輿軍相謂曰避陶武威無敢當者後與杜韜戰輿被重創卒侃哭之慟曰喪吾家寶三軍皆為之垂泣詔贈長沙太守史臣曰古者明王之建國也下料疆宇列為九州輔相玄功咨于四嶽所以仰希齊政俯寄宣風備連率之儀威騰閫外總頒條之務禮縟區中委稱其才甘棠以之流詠據非其德讎餉以是興嗟中朝叔世要荒多阻分符建節並紊天綱和季以同里之情申盧綰之契居方牧之地振吳起之風自幽徂荊亟斂豺狼之迹舉賢登善窮掇孔翠之毛由是吏民畢力華夷順命一州清晏恬波於沸海之中百城安堵靜祲於稽天之際猶獨稱善政何其寡歟易云貞固足以幹事於征南見之矣士行望非世族俗異諸華拔萃陬落之間比肩髦俊之列超居外相宏總上流布澤懷邊則嚴城靜柝釋位匡主則淪鼎再寧元規以戚里之崇挹其膺而下拜茂弘以保衡之貴服其言而動色望隆分陝理則宜然至於時屬雲屯富逾天府潛有包藏之志顧思折翼之祥悖矣夫子曰人無求備斯言之信於是有徵贊曰和季承恩建旟南服威靜荊塞化揚江澳勠力天朝匪忘忠肅長沙勤王擁旆戎場任隆三事功宣一匡繄賴之重匪伊舟航
