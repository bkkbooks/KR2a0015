body:
  text: 晉書卷四十六列傳第十六劉頌劉頌字子雅廣陵人漢廣陵厲王胥之後也世為名族同郡有雷蔣穀魯四姓皆出其下時人為之語曰雷蔣穀魯劉最為祖父觀平陽太守頌少能辨物理為時人所稱察孝廉舉秀才皆不就文帝辟為相府掾奉使于蜀時蜀新平人飢土荒頌表求振貸不待報而行由是除名武帝踐阼拜尚書三公郎典科律申寃訟纍遷中書侍郎咸寧中詔頌與散騎郎白褒巡撫荊揚以奉使稱旨轉黃門郎遷議郎守廷尉時尚書令史扈寅非罪下獄詔使考竟頌執據無罪寅遂得免時人以頌比張釋之在職六年號為詳平會滅吳諸將爭功遣頌校其事以王渾為上功王濬為中功帝以頌持法失理左遷京兆太守不行轉任河內臨發上便宜多所納用郡界多公主水碓遏塞流水轉為浸害頌表罷之百姓獲其便利尋以母憂去職服闋除淮南相在官嚴整甚有政績舊修芍陂年用數萬人豪強兼並孤貧失業頌使大小勠力計功受分百姓歌其平惠頌在郡上疏曰臣昔忝河內臨辭受詔卿所言悉要事宜大小數以聞苦多事或不能悉有報勿以為疑臣受詔之日喜懼交集益思自竭用忘其鄙願以螢燭增暉重光到郡草具所陳如左未及書上會臣嬰丁天罰寢頓纍年今謹封上前事臣雖才不經國言淺多違猶願陛下垂省使臣微誠得經聖鑒不總棄於常案如有足採冀補萬一伏見詔書開啓土宇以支百世封建戚屬咸出之藩夫豈不懷公理然也樹國全制始成于今超秦漢魏氏之局節紹五帝三代之絶迹功被無外光流後裔巍巍盛美三五之君殆有慚德何則彼因自然而就之異乎絶迹之後更創之雖然封幼稚皇子于吳蜀臣之愚慮謂未盡善夫吳越剽輕庸蜀險絶此故變釁之所出易生風塵之地且自吳平以來東南六州將士更守江表此時之至患也又內兵外守吳人有不自信之心宜得壯主以鎮撫之使內外各安其舊又孫氏為國文武衆職數擬天朝一旦堙替同于編戶不識所蒙更生之恩而災困逼身自謂失地用懷不靖今得長王以臨其國隨才授任文武並士卒百役不出其鄉求富貴者取之于國內內兵得散新邦又安兩獲其所於事為宜宜取同姓諸王年二十以上人才高者分王吳蜀以其去近就遠割裂土宇令倍於舊以徙封故地用王幼稚須皇子長乃遣君之於是無晚也急所須地交得長主此事宜也臣所陳封建今大義已舉然餘衆事儻有足採以參成制故皆並列本事臣聞不憚危悔之患而願獻所見者盡忠之臣也垂聽逆耳甘納苦言者濟世之君也臣以期運幸遇無諱之朝雖嘗抗疏陳辭泛論政體猶未悉所見指言得失徒荷恩寵不異凡流臣竊自愧不盡忠規無以上報謹列所見如左臣誠未自許所言必當然要以不隱所懷為上報之節若萬一足採則微臣更生之年如皆瞽妄則國之福也願陛下缺半日之間垂省臣言伏惟陛下雖應天順人龍飛踐阼為創基之主然所遇之時實是叔世何則漢末陵遲閹豎用事小人專朝君子在野政荒衆散遂以亂亡魏武帝以經略之才撥煩理亂兼肅文教積數十年至于延康之初然後吏清下順法始大行逮至文明二帝奢淫驕縱傾殆之主也然內盛臺榭聲色之娛外當三方英豪嚴敵事成克舉少有愆違其故何也實賴前緒以濟勳業然法物政刑固已漸穨矣自嘉平之初晉祚始基逮于咸熙之末其間纍年雖鈇鉞屢斷翦除凶醜然其存者咸蒙遭時之恩不軌于法泰始之初陛下踐阼其所服乘皆先代功臣之胤非其子孫則其曾玄古人有言膏粱之性難正故曰時遇叔世當此之秋天地之位始定四海洗心整綱之會也然陛下猶以用才因宜法寬有由積之在素異于漢魏之先三祖崛起易朝之為未可一旦直繩御下誠時宜也然至所以為政矯世衆務自宜漸出公塗法正威斷日遷就肅譬由行舟雖不橫截迅流然俄向所趣漸靡而往終得其濟積微稍著以至于今可以言政而自泰始以來將三十年政功美績未稱聖旨凡諸事業不茂既往以陛下明聖猶未及叔世之弊以成始初之隆傳之後世不無慮乎意者臣言豈不少概聖心夫顧惟萬載之事理在二端天下大器一安難傾一傾難正故慮經後世者必精目下之政政安遺業使數世賴之若乃兼建諸侯而樹藩屏深根固蒂則祚延無窮可以比迹三代如或當身之政遺風餘烈不及後嗣雖樹親戚而成國之制不建使夫後世獨任智力以安大業若未盡其理雖經異時憂責猶追在陛下將如之何願陛下善當今之政樹不拔之勢則天下無遺憂矣夫聖明不世及後嗣不必賢此天理之常也故善為天下者任勢而不任人任勢者諸侯是也任人者郡縣是也郡縣之察小政理而大勢危諸侯為邦近多違而遠慮固聖王推終始之弊權輕重之理包彼小違以據大安然後足以藩固內外維鎮九服夫武王聖主也成王賢嗣也然武王不恃成王之賢而廣封建者慮經無窮也且善言今者必有驗之於古唐虞以前書文殘缺其事難詳至於三代則並建明德及興王之顯親列爵五等開國承家以藩屏帝室延祚久長近者五六百歲遠者僅將千載逮至秦氏罷侯置守子弟不分尺土孤立無輔二世而亡漢承周秦之後雜而用之前後二代各二百餘年揆其封建不用雖強弱不適制度舛錯不盡事中然迹其衰亡在同姓失職諸侯微時不在強盛昔呂氏作亂幸賴齊代之援以寧社稷七國叛逆梁王捍之卒弭其難自是之後威權削奪諸侯止食租奉甚者至乘牛車是以王莽得擅本朝遂其姦謀傾蕩天下毒流生靈光武紹起雖封樹子弟而不建成國之制祚亦不延魏氏承之圈閉親戚幽囚子弟是以神器速傾天命移在陛下長短之應禍福之徵可見於此又魏氏雖正位居體南面稱帝然三方未賓正朔有所不加實有戰國相持之勢大晉之興宣帝定燕太祖平蜀陛下滅吳可謂功格天地土廣三王舟車所至人迹所及皆為臣妾四海大同始于今日宜承大勳之籍及陛下聖明之時開啓土宇使同姓必王建久安於萬載垂長世於無窮臣又聞國有任臣則安有重臣則亂而王制人君立子以適不以長立適以長不以賢此事情之不可易者也而賢明至少不肖至衆此固天理之常也物類相求感應而至又自然也是以暗君在位則重臣盈朝明后臨政則任臣列職夫任臣之與重臣俱執國統而立斷者也然成敗相反邪正相背其故何也重臣假所資以樹私任臣因所籍以盡公盡公者政之本也樹私者亂之源也推斯言之則泰日少亂日多政教漸穨欲國之無危不可得也又非徒唯然而已借令愚劣之嗣蒙先哲之遺緒得中賢之佐而樹國本根不深無幹輔之固則所謂任臣者化而為重臣矣何則國有可傾之勢則執權者見疑衆疑難以自信而甘受死亡者非人情故也若乃建基既厚藩屏強禦雖置幼君赤子而天下不懼曩之所謂重臣者今悉反忠而為任臣矣何則理無危勢懷不自猜忠誠得著不惕于邪故也聖王知賢哲之不世及故立相持之勢以御其臣是以五等既列臣無忠慢同於竭節以徇其上羣后既建繼體賢鄙亦均一契等於無慮且樹國苟固則所任之臣得賢益理次委中智亦足以安何則勢固易持故也然則建邦苟盡其理則無向不可是以周室自成康以下逮至宣王宣王之後到于赧王其間歷載朝無名臣而宗廟不隕者諸侯維持之也故曰為社稷計莫若建國夫邪正逆順者人心之所繫服也今之建置宜審量事勢使諸侯率義而動同忿俱奮令其力足以維帶京邑若包藏禍心惕于邪而起孤立無黨所蒙之籍不足獨以有為然齊此甚難陛下宜與達古今善識事勢之士深共籌之建侯之理使君樂其國臣榮其朝各流福祚傳之無窮上下一心愛國如家視百姓如子然後能保荷天祿兼翼王室今諸王裂土皆兼於古之諸侯而君賤其爵臣恥其位莫有安志其故何也法同郡縣無成國之制故也今之建置宜使率由舊章一如古典然人心繫常不纍十年好惡未改情願未移臣之愚慮以為宜早創大制遲回衆望猶在十年之外然後能令君臣各安其位榮其所蒙上下相持用成藩輔如今之為適足以虧天府之藏徒棄穀帛之資無補鎮國衛上之勢也古者封建既定各有其國後雖王之子孫無復尺土此今事之必不行者也若推親疏轉有所廢以有所樹則是郡縣之職非建國之制今宜豫開此地令十世之內使親者得轉處近十世之遠近郊地盡然後親疏相維不得復如十世之內然猶樹親有所遲天下都滿已彌數百千年矣今方始封而親疏倒施甚非所宜宜更大量天下土田方里之數都更裂土分人以王同姓使親疏遠近不錯其宜然後可以永安古者封國大者不過土方百里然後人數殷衆境內必盈其力足以備充制度今雖一國周環近將千里然力實寡不足以奉國典所遇不同故當因時制宜以盡事適今宜令諸王國容少而軍容多然於古典所應有者悉立其制然非急所須漸而備之不得頓設也須車甲器械既具羣臣乃服綵章倉廩已實乃營宮室百姓已足乃備官司境內充實乃作禮樂唯宗廟社稷則先建之至於境內之政官人用才自非內史國相命於天子其餘衆職及死生之斷穀帛資實慶賞刑威非封爵者悉得專之今臣所舉二端蓋事之大較其所不載應在二端之屬者以此為率今諸國本一郡之政耳若備舊典則官司以數事所不須而以虛制損實力至于慶賞刑斷所以衛下之權不重則無以威衆人而衛上故臣之愚慮欲令諸侯權具國容少而軍容多然亦終於必備今事為宜周之建侯長享其國與王者並遠者僅將千載近者猶數百年漢之諸王傳祚暨至曾玄人性不甚相遠古今一揆而短長甚違其故何邪立意本殊而制不同故也周之封建使國重於君公侯之身輕於社稷故無道之君不免誅放敦興滅繼絶之義故國祚不泯不免誅放則羣后思懼胤嗣必繼是無亡國也諸侯思懼然後軌道下無亡國天子乘之理勢自安此周室所以長在也漢之樹置君國輕重不殊故諸王失度陷于罪戮國隨以亡不崇興滅繼絶之序故下無固國下無固國天子居上勢孤無輔故姦臣擅朝易傾大業今宜反漢之弊修周舊迹國君雖或失道陷于誅絶又無子應除苟有始封支胤不問遠近必紹其祚若無遺類則虛建之須皇子生以繼其統然後建國無滅又班固稱諸侯失國亦猶網密今又宜都寬其檢且建侯之理本經盛衰大制都定班之羣后著誓丹青書之玉版藏之金匱置諸宗廟副在有司寡弱小國猶不可危豈況萬乘之主承難傾之邦而加其上則自然永久居重固之安可謂根深華嶽而四維之也臣之愚願陛下置天下于自安之地寄大業于固成之勢則可以無遺憂矣今閻閭少名士官司無高能其故何也清議不肅人不立德行在取容故無名士下不專局又無考課吏不竭節故無高能無高能則有疾世事少名士則後進無準故臣思立吏課而肅清議夫欲富貴而惡貧賤人理然也聖王大諳物情知不可去故直同公私之利而詭其求道使夫欲富者必先由貧欲貴者必先安賤安賤則不矜不矜然後廉恥厲守貧者必節欲節欲然後操全以此處務乃得盡公盡公者富貴之徒也為無私者終得其私故公私之利同也今欲富者不由貧自得富欲貴者不安賤自得貴公私之塗既乖而人情不能無私私利不可以公得則背公而橫務是以風節日穨公理漸替人士富貴非軌道之所得以此為政小大難期然教穨來既久難反一朝又世放都靡營欲比肩羣士渾然庸行相似不可頓肅甚殊黜陟也且教不求盡善善在抑尤同侈之中猶有甚泰使夫昧適情之樂者捐其顯榮之貴俄在不鮮之地約己潔素者蒙儉德之報列于清官之上二業分流令各有蒙然俗放都奢不可頓肅故臣私慮願先從事於漸也天下至大萬事至衆人君至少同于天日故非垂聽所得周覽是以聖王之化執要而已委務于下而不以事自嬰也分職既定無所與焉非憚日昃之勤而牽於逸豫之虞誠以政體宜然事勢致之也何則夫造創謀始逆暗是非以別能否甚難察也既以施行因其成敗以分功罪甚易識也易識在考終難察在造始故人君居其易則安人臣不處其難則亂今陛下每精事始而略于考終故羣吏慮事懷成敗之懼輕飾文采以避目下之譴重此政功所以未善也今人主能居易執要以御其下然後人臣功罪形于成敗之徵無逃其誅賞故罪不可蔽功不可誣功不可誣則能者勸罪不可蔽則違慢日肅此為國之大略也臣竊惟陛下聖心意在盡善懼政有違故精事始以求無失又以衆官勝任者少故不委務寧居日昃也臣之愚慮竊以為今欲盡善故宜考終何則精始難校故也又羣官多不勝任亦宜委務使能者得以成功不能者得以著敗敗著可得而廢功成可得遂任然後賢能常居位以善事暗劣不得以尸祿害政如此不已則勝任者漸多經年少久即羣司遍得其人矣此校才考實政之至務也今人主不委事仰成而與諸下共造事始則功罪難分下不專事居官不久故能否不別何以驗之今世士人決不悉良能也又決不悉疲軟也然今欲舉一忠賢不知所賞求一負敗不知所罰及其免退自以犯法耳非不能也登進者自以纍資及人間之譽耳非功實也若謂不然則當今之政未稱聖旨此其徵也陛下御今法為政將三十年而功未日新其咎安在古人有言琴瑟不調甚者必改而更張凡臣所言誠政體之常然古今異宜所遇不同陛下縱未得盡仰成之理都委務於下至如今事應奏御者蠲除不急使要事得精可三分之二古者六卿分職冢宰為師秦漢已來九列執事丞相都總今尚書制斷諸卿奉成於古制為重事所不須然今未能省并可出衆事付外寺使得專之尚書為其都統若丞相之為惟立法創制死生之斷除名流徙退免大事及連度支之事臺乃奏處其餘外官皆專斷之歲終臺閣課功校簿而已此為九卿造創事始斷而行之尚書書主賞罰繩之其勢必愈考成司非而已於今親掌者動受成於上上之所失不得復以罪下歲終事功不建不知所責也夫監司以法舉罪獄官案劾盡實法吏據辭守文大較雖同然至於施用監司與夫法獄體宜小異獄官唯實法吏唯文監司則欲舉大而略小何則夫細過微闕謬妄之失此人情之所必有而悉糾以法則朝野無全人此所謂欲理而反亂者也故善為政者綱舉而網疏綱舉則所羅者廣網疏則小必漏所羅者廣則為政不苛此為政之要也而自近世以來為監司者類大綱不振而微過必舉微過不足以害政舉之則微而益亂大綱不振則豪強橫肆豪強橫肆則百姓失職矣此錯所急而倒所務之由也今宜令有司反所常之政使天下可善化及此非難也人主不善碎密之案必責犯強舉尤之奏當以盡公則害政之姦自然禽矣夫大姦犯政而亂兆庶之罪者類出富強而豪富者其力足憚其貨足欲是以官長顧勢而頓筆下吏縱姦懼所司之不舉則謹密網以羅微罪使奏劾相接狀似盡公而撓法不亮固已在其中矣非徒無益於政體清議乃由此而益傷古人有言曰君子之過如日之蝕焉又曰過而能改又曰不二過凡此數者皆是賢人君子不能無過之言也苟不至於害政則皆天網之所漏所犯在甚泰然後王誅所必加此舉罪淺深之大例者也故君子得全美以善事不善者必夷戮以警衆此為政誅赦之準式也何則所謂賢人君子苟不能無過小疵不可以廢其身而輒繩以法則愧於明時何則雖有所犯輕重甚殊於士君子之心受責不同而名不異者故不軌之徒得引名自方以惑衆聽因名可亂假力取直故清議益傷也凡舉過彈違將以肅風論而整世教今舉小過清議益穨是以聖人深識人情而達政體故其稱曰不以一眚掩大德又曰赦小過舉賢才又曰無求備於一人故冕而前旒充纊塞耳意在善惡之報必取其尤然後簡而不漏大罪必誅法禁易全也何則害法在犯尤而謹搜微過何異放兕豹于公路而禁鼠盜于隅隙古人有言鈇鉞不用而刀鋸日弊不可以為政此言大事緩而小事急也時政所失少有此類陛下宜反而求之乃得所務也夫權制不可以經常政乖不可以守安此言攻守之術異也百姓雖愚望不虛生必因時而發有因而發則望不可奪事變異前則時不可違明聖達政應赴之速不及下車故能動合事機大得人情昔魏武帝分離天下使人役居戶各在一方既事勢所須且意有曲為權假一時以赴所務非正典也然逡巡至今積年未改百姓雖身丁其困而私怨不生誠以三方未悉蕩并知時未可以求安息故也是以甘役如歸視險若夷至于平吳之日天下懷靜而東南二方六州郡兵將士武吏戍守江表或給京城運漕父南子北室家分離咸更不寧又不習水土運役勤瘁並有死亡之患勢不可久此宜大見處分以副人望魏氏錯役亦應改舊此二者各盡其理然黔首感恩懷德謳吟樂生必十倍於今也自董卓作亂以至今近出百年四海勤瘁丁難極矣六合渾并始於今日兆庶思寧非虛望也然古今異宜所遇不同誠亦未可以希遵在昔放息馬牛然使受百役者不出其國兵備待事其鄉實在可為縱復不得悉然為之苟盡其理可靜三分之二吏役可不出千里之內但如斯而已天下所蒙已不訾矣政務多端世事之未盡理者難遍以疏舉振領總綱要在三條凡政欲靜靜在息役息役在無為倉廩欲實實在利農利農在平糴為政欲著信著信在簡賢簡賢在官久官久非難也連其班級自非才宜不得傍轉以終其課則事善矣平糴已有成制其未備者可就周足則穀積矣無為匪他却功作之勤抑似益而損之利如斯而已則天下靜矣此三者既舉雖未足以厚化然可以為安有餘矣夫王者之利在生天地自然之財農是也所立為指於此事誠有功益苟或妨農皆務所息此悉似益而損之謂也然今天下自有事所必須不得止已或用功甚少而所濟至重目下為之雖少有廢而計終已大益農官有十百之利及有妨害在始似如未急終作大患宜逆加功以塞其漸如河汴將合沈萊苟善則役不可息諸如此類亦不得已已然事患緩急權計輕重自非近如此類準以為率乃可興為其餘皆務在靜息然能善算輕重權審其宜知可興可廢甚難了也自非上智遠才不幹此任夫創業之美勳在垂統使夫後世蒙賴以安其為安也雖昏猶明雖愚若智濟世功者實在善化之為要在靜國至夫修飾官署凡諸作役務為傷過泰不患不舉此將來所不須於陛下而自能者也至於仰蒙前緒所憑日月者實在遺風繫人心餘烈匡幼弱而今勤所不須以傷所憑鈞此二者何務孰急陛下少垂恩回慮詳擇所安則大理盡矣世之私議竊比陛下於孝文臣以為聖德隆殺將在乎後不在當今何則陛下龍飛鳳翔應期踐阼有創業之勳矣掃滅強吳奄征南海又有之矣以天子之貴而躬行布衣之所難孝儉之德冠于百王又有之矣履宜無細動成軌度又有之矣若善當身之政建藩屏之固使晉代久長後世仰瞻遺迹校功考事實與湯武比隆何孝文足云臣之此言非臣下褒上虛美常辭其事實然若所以資為安之理或未盡善則恐良史書勳不得遠盡弘美甚可惜也然不可使夫知政之士得參聖慮經年少久終必有成願陛下少察臣言又論肉刑見刑法志詔答曰得表陳封國之制宜如古典任刑齊法宜復肉刑及六州將士之役居職之宜諸所陳聞具知卿之乃心為國也動靜數以聞元康初從淮南王允入朝會誅楊駿頌屯衛殿中其夜詔以頌為三公尚書又上疏論律令事為時論所美久之轉吏部尚書建九班之制欲令百官居職希遷考課能否明其賞罰賈郭專朝仕者欲速竟不施行及趙王倫之害張華也頌哭之甚慟聞華子得逃喜曰茂先卿尚有種也倫黨張林聞之大怒憚頌持正而不能害也孫秀等推崇倫功宜加九錫百僚莫敢異議頌獨曰昔漢之錫魏魏之錫晉皆一時之用非可通行今宗廟安雖嬖后被退勢臣受誅周勃誅諸呂而尊孝文霍光廢昌邑而奉孝宣並無九錫之命違舊典而習權變非先王之制九錫之議請無所施張林積忿不已以頌為張華之黨將害之孫秀曰誅張裴已傷時望不可復誅頌林乃止於是以頌為光祿大夫門施行馬尋病卒使使者弔祭賜錢二十萬朝服一具諡曰貞中書侍郎劉沈議頌當時少輩應贈開府孫秀素恨之不聽頌無子養弟和子雍早卒更以雍弟詡子為適孫襲封永康元年詔以頌誅賈謐督攝衆事有功追封梁鄒縣侯食邑千五百戶頌弟彪字仲雅參安東軍事伐吳獲張悌纍官積弩將軍及武庫火彪建計斷屋得出諸寶器歷荊州刺史次弟仲字世混歷黃門郎滎陽太守未之官卒初頌嫁女臨淮陳矯矯本劉氏子與頌近親出養於姑改姓陳氏中正劉友譏之頌曰舜後姚虞陳田本同根系而世皆為婚禮律不禁今與此同義為婚可也友方欲列上為陳騫所止故得不劾頌問明法掾陳默蔡畿曰鄉里誰最屈二人俱云劉友屈頌作色呵之畿曰友以私議冒犯明府為非然鄉里公論稱屈友辟公府掾尚書郎黃沙御史李重李重字茂曾江夏鍾武人也父景秦州刺史都亭定侯重少好學有文辭早孤與羣弟居以友愛著稱弱冠為本國中正遜讓不行後為始平王文學上疏陳九品曰先王議制以時因革因革之理唯變所適九品始於喪亂軍中之政誠非經國不刊之法也且其檢防轉碎徵刑失實故朝野之論僉謂驅動風俗為弊已甚而至於議改又以為疑臣以革法創制當先盡開塞利害之理舉而錯之使體例大通而無否滯亦未易故也古者諸侯之治分土有常國有定主人無異望卿大夫世祿仕無出位之思臣無越境之交上下體固人德歸厚秦反斯道罷侯置守風俗淺薄自此來矣漢革其弊斟酌周秦並建侯守亦使分土有定而牧司必各舉賢貢士任之鄉議事合聖典比蹤三代方今聖德之隆光被四表兆庶顒顒欣覩太平然承魏氏雕弊之迹人物播越仕無常朝人無定處郎吏蓄於軍府豪右聚於都邑事體駁錯與古不同謂九品既除宜先開移徙聽相并就且明貢舉之法不濫於境外則冠帶之倫將不分而自均即土斷之實行矣又建樹官司功在簡久階級少則人心定久其事則政化成而能否著此三代所以直道而行也以為選例九等當今之要所宜施用也聖王知天下之難常從事於其易故寄隱括於閭伍則邑屋皆為有司若任非所由事非所核則雖竭聖智猶不足以贍其事由此而觀誠令二者既行即人思反本修之於鄉華競自息而禮讓日隆矣遷太子舍人轉尚書郎時太中大夫恬和表陳便宜稱漢孔光魏徐幹等議使王公已下制奴婢限數及禁百姓賣田宅中書啓可屬主者為條制重奏曰先王之制士農工商有分不遷其業所以利用厚生各肆其力也周官以土均之法經其土地井田之制而辨其五物九等貢賦之序然後公私制定率土均齊自秦立阡陌建郡縣而斯制已沒降及漢魏因循舊迹王法所峻者唯服物車器有貴賤之差令不僭擬以亂尊卑耳至于奴婢私産則實皆未嘗曲為之立限也八年己巳詔書申明律令諸士卒百工以上所服乘皆不得違制若一縣一歲之中有違犯者三家洛陽縣十家已上官長免如詔書之旨法制已嚴今如和所陳而稱光幹之議此皆衰世踰侈當時之患然盛漢之初不議其制光等作而不行非漏而不及能而不用也蓋以諸侯之軌既滅而井田之制未復則王者之法不得制人之私也人之田宅既無定限則奴婢不宜偏制其數懼徒為之法實碎而難檢方今聖明垂制每尚簡易法禁已具和表無施又司隸校尉石鑒奏鬱林太守介登役使所監求召還尚書荀愷以為遠郡非人情所樂奏登貶秩居官重駁曰臣聞立法無制所以齊衆檢邪非必曲尋事情而理無所遺也故所滯者寡而所濟者衆今如登郡比者多若聽其貶秩居官動為準例懼庸才負遠必有黷貨之纍非所以肅清王化輯寧殊域也臣愚以為宜聽鑒所上先召登還且使體例有常不為遠近異制詔從之太熙初遷廷尉平駁廷尉奏邯鄲醉等文多不載再遷中書郎每大事及疑議輒參以經典處決多皆施行遷尚書吏部郎務抑華競不通私謁特留心隱逸由是羣才畢舉拔用北海西郭湯琅邪劉珩燕國霍原馮翊吉謀等為祕書郎及諸王文學故海內莫不歸心時燕國中正劉沈舉霍原為寒素司徒府不從沈又抗詣中書奏原而中書復下司徒參論司徒左長史荀組以為寒素者當謂門寒身素無世祚之資原為列侯顯佩金紫先為人間流通之事晚乃務學少長異業年踰始立草野之譽未洽德禮無聞不應寒素之目重奏曰案如癸酉詔書廉讓宜崇浮競宜黜其有履謙寒素靖恭求己者應有以先之如詔書之旨以二品繫資或失廉退之士故開寒素以明尚德之舉司徒總御人倫實掌邦教當務峻準評以一風流然古之厲行高尚之士或棲身巖穴或隱迹丘園或克己復禮或耄期稱道出處默語唯義所在未可以少長異操疑其所守之美而遠同終始之責非所謂擬人必於其倫之義也誠當考之於邦黨之倫審之於任舉之主沈為中正親執銓衡陳原隱居求志篤古好學學不為利行不要名絶迹窮山韞韣道藝外無希世之容內全遁逸之節行成名立搢紳慕之委質受業者千里而應有孫孟之風嚴鄭之操始舉原先咨侍中領中書監華前州大中正後將軍嬰河南尹軼去三年諸州還朝幽州刺史許猛特以原名聞擬之西河求加徵聘如沈所列州黨之議既舉又刺史班詔表薦如此而猶謂草野之譽未洽德禮無聞舍所徵檢之實而無明理正辭以奪沈所執且應二品非所求備但原定志窮山修述儒道義在可嘉若遂抑替將負幽邦之望傷敦德之教如詔書所求之旨應為二品詔從之重與李毅同為吏部郎時王戎為尚書重以清尚見稱毅淹通有智識雖二人操異然俱處要職戎以識會待之各得其所毅字茂彥舊史闕其行事于時內官重外官輕兼階級繁多重議之見百官志又上疏曰凡山林避寵之士雖違世背時出處殊軌而先王許之者嘉其服膺高義也昔先帝患風流之弊而思反純朴乃咨詢朝衆搜求隱逸咸寧二年始以太子中庶子徵安定皇甫謐四年又以博士徵南安朱沖太康元年復以太子庶子徵沖雖皆以病疾不至而朝野悅服陛下遠邁先帝禮賢之旨臣訪沖州邑言其雖年近耋耄而志氣克壯耽道窮藪老而彌新操尚貞純所居成化誠山栖耆德足以表世篤俗者也臣以為宜垂聖恩及其未沒顯加優命時朝廷政亂竟不能從出為行討虜護軍平陽太守崇德化修學校表篤行拔賢能清簡無欲正身率下在職三年彈黜四縣弟嶷亡表去官永康初趙王倫用為相國左司馬以憂逼成疾而卒時年四十八家貧宅宇狹小無殯斂之地詔於典客署營喪追贈散騎常侍諡曰成子式有美名官至侍中咸和初卒史臣曰子雅束髮登朝竭誠奉國廣陳封建深中機宜詳辨刑名該核政體雖文慚華婉而理歸切要遊目西京望賈誼而非遠眷言東國顧郎顗而有餘逮元康之間賊臣專命舉朝戰栗苟避菹醢頌以此時忠鯁不撓哭張公之非罪拒趙王之妄錫雖古遺直何以尚茲至於緣其私議不平劉友異夫憎而知善舉不避讐者歟李重言因革之理駁田産之制詞愜事當蓋亹亹可觀及鋭志銓衡留心隱逸濬沖期之識會豈虛也哉贊曰劉頌剛直義形於詞自下摩上彼實有之李重清雅志乃無私推賢拔滯嘉言在茲懋哉兩哲邦家之基
