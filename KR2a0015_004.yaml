body:
  text: 晉書卷四帝紀第四惠帝孝惠皇帝諱衷字正度武帝第二子也泰始三年立為皇太子時年九歲太熙元年四月己酉武帝崩是日皇太子即皇帝位大赦改元為永熙尊皇后楊氏曰皇太后立妃賈氏為皇后夏五月辛未葬武皇帝於峻陽陵丙子增天下位一等預喪事者二等復租調一年二千石已上皆封關中侯以太尉楊駿為太傅輔政秋八月壬午立廣陵王遹為皇太子以中書監何劭為太子太師吏部尚書王戎為太子太傅衛將軍楊濟為太子太保遣南中郎將石崇射聲校尉胡奕長水校尉趙俊揚烈將軍趙歡將屯兵四出冬十月辛酉以司空石鑒為太尉前鎮西將軍隴西王泰為司空永平元年春正月乙酉朔臨朝不設樂詔曰朕夙遭不造淹恤在疚賴祖宗遺靈宰輔忠賢得以眇身託于羣后之上昧於大道不明于訓戰戰兢兢夕惕若厲乃者哀迷之際三事股肱惟社稷之重率遵翼室之典猶欲長奉先皇之制是以有永熙之號然日月踰邁已涉新年開元易紀禮之舊章其改永熙二年為永平元年又詔子弟及羣官並不得謁陵丙午皇太子冠丁未見于太廟二月甲寅賜王公已下帛各有差癸酉鎮南將軍楚王瑋鎮東將軍淮南王允來朝戊寅復置袐書監官三月辛卯誅太傅楊駿駿弟衛將軍珧太子太保濟中護軍張劭散騎常侍段廣楊邈左將軍劉預河南尹李斌中書令蔣俊東夷校尉文淑尚書武茂皆夷三族壬辰大赦改元賈后矯詔廢皇太后為庶人徙于金墉城告于天地宗廟誅太后母龐氏壬寅徵大司馬汝南王亮為太宰與太保衛瓘輔政以秦王柬為大將軍東平王楙為撫軍大將軍鎮南將軍楚王瑋為衛將軍領北軍中候下邳王晃為尚書令東安公繇為尚書左僕射進封東安王督將侯者千八十一人庚戌免東安王繇及東平王楙繇徙帶方夏四月癸亥以征東將軍梁王肜為征西大將軍都督關西諸軍事太子少傅阮坦為平東將軍監青徐二州諸軍事己巳以太子太傅王戎為尚書右僕射五月甲戌毗陵王軌薨壬午除天下戶調綿絹賜孝悌高年魚衆寡力田者帛人三匹六月賈后矯詔使楚王瑋殺太宰汝南王亮太保災陽公衛瓘乙丑以瑋擅害亮瓘殺之曲赦洛陽以廣陵王師劉實為太子太保司空隴西王泰録尚書事秋七月分揚州荊州十郡為江州八月庚申以趙王倫為征東將軍都督徐兗二州諸軍事河間王顒為北中郎將鎮鄴太子太師何劭為都督豫州諸軍事鎮許昌徙長沙王為常山王己巳進西陽公羕爵為王辛未立隴西世子越為東海王九月甲午大將軍秦王柬薨辛丑徵征西大將軍梁王肜為衛將軍録尚書事以趙王倫為征西大將軍都督雍梁二州諸軍事冬十二月辛酉京師地震是歲東夷十七國南夷二十四部並詣校尉內附二年春二月己酉賈后弒皇太后于金墉城秋八月壬子大赦九月乙酉中山王耽薨冬十一月大疫是歲沛國雨雹傷麥三年夏四月滎陽雨雹六月弘農郡雨雹深三尺冬十月太原王泓薨四年春正月丁酉朔侍中太尉安昌公石鑒薨夏五月蜀郡山移淮南壽春洪水出山崩地陷壞城府及百姓廬舍胸奴郝散反攻上黨殺長吏六月壽春地大震死者二十餘家上庸郡山崩殺二十餘人秋八月郝散帥衆降馮翊都尉殺之上谷居庸上庸並地陷裂水泉涌出人有死者大飢九月丙辰赦諸州之遭地災者甲午枉矢東北竟天是歲京師及郡國八地震五年夏四月彗星見于西方孛于奎至軒轅六月金城地震東海雨雹深五寸秋七月下邳暴風壞廬舍九月雁門新興太原上黨大風傷禾稼冬十月武庫火焚纍代之寶十二月丙戌新作武庫大調兵器丹楊雨雹有石生于京師宜年里是歲荊揚兗豫青徐等六州大水詔遣御史巡行振貸六年春正月大赦司空下邳王晃薨以中書監張華為司空太尉隴西王泰為尚書令衛將軍梁王肜為太子太保丁丑地震三月東海隕霜傷桑麥彭城呂縣有流血東西百餘步夏四月大風五月荊揚二州大水胸奴郝散弟度元帥馮翊北地馬蘭羌盧水胡反攻北地太守張損死之馮翊太守歐陽建與度元戰建敗績徵征西大將軍趙王倫為車騎將軍以太子太保梁王肜為征西大將軍都督雍梁二州諸軍事鎮關中秋八月雍州刺史解系又為度元所破秦雍氐羌悉叛推氐帥齊萬年僭號稱帝圍涇陽冬十月乙未曲赦雍涼二州十一月丙子遣安西將軍夏侯駿建威將軍周處等討萬年梁王肜屯好畤關中飢大疫七年春正月癸丑周處及齊萬年戰於六陌王師敗績處死之夏五月魯國雨雹秋七月雍梁州疫大旱隕霜殺秋稼關中飢米斛萬錢詔骨肉相賣者不禁丁丑司徒京陵公王渾薨九月以尚書右僕射王戎為司徒太子太師何劭為尚書左僕射八年春正月丙辰地震詔發倉廩振雍州飢人三月壬戌大赦夏五月郊禖石破為二秋九月荊豫揚徐冀等五州大水雍州有年九年春正月左積弩將軍孟觀伐氐戰于中亭大破之獲齊萬年徵征西大將軍梁王肜録尚書事以北中郎將河間王顒為鎮西將軍鎮關中成都王穎為鎮北大將軍鎮鄴夏四月鄴人張承基等妖言署置聚黨數千郡縣逮捕皆伏誅六月戊戌太尉隴西王泰薨秋八月以尚書裴頠為尚書僕射冬十一月甲子朔日有蝕之京師大風發屋折木十二月壬戌廢皇太子遹為庶人及其三子幽于金墉城殺太子母謝氏永康元年春正月癸亥朔大赦改元己卯日有蝕之丙子皇孫草友一卒二月丁酉大風飛沙拔木三月尉氏雨血妖星見于南方癸未賈后矯詔害庶人遹于許昌夏四月辛卯日有蝕之癸巳梁王肜趙王倫矯詔廢賈后為庶人司空張華尚書僕射裴頠皆遇害侍中賈謐及黨與數十人皆伏誅甲午倫矯詔大赦自為相國都督中外諸軍如宣文輔魏故事追復故皇太子位丁酉以梁王肜為太宰左光祿大夫何劭為司徒右光祿大夫劉實為司空淮南王允為驃騎將軍己亥趙王倫矯詔害賈庶人于金墉城五月己巳立皇孫臧為皇太孫尚為襄陽王六月壬寅葬愍懷太子于顯平陵撫軍將軍清河王遐薨癸卯震崇陽陵標秋八月淮南王允舉兵討趙王倫不克允及其二子秦王郁漢王迪皆遇害曲赦洛陽平東將軍彭城王植薨改封吳王晏為賓徒縣王以齊王冏為平東將軍鎮許昌光祿大夫陳準為太尉録尚書事九月改司徒為丞相以梁王肜為之冬十月黃霧四塞十一月戊午大風飛沙石六日乃止甲子立皇后羊氏大赦大酺三日十二月彗星見于東方益州刺史趙廞與略陽流人李庠害成都內史耿勝犍為太守李密汶山太守霍固西夷校尉陳總據成都反永寧元年春正月乙丑趙王倫篡帝位丙寅遷帝于金墉城號曰太上皇改金墉曰永昌宮廢皇太孫臧為濮陽王五星經天縱橫無常癸酉倫害濮陽王臧略陽流人李特殺趙廞傳首京師三月平東將軍齊王冏起兵以討倫傳檄州郡屯于陽翟征北大將軍成都王穎征西大將軍河間王顒常山王豫州刺史李毅兗州刺史王彥南中郎將新野公歆皆舉兵應之衆數十萬倫遣其將閭和出伊闕張泓孫輔出堮坂以距冏孫會士猗許超出黃橋以距穎及穎將趙驤石超戰于湨水會等大敗棄軍走閏月丙戌朔日有蝕之夏四月歲星晝見冏將何勗盧播擊張泓於陽翟大破之斬孫輔等辛酉左衛將軍王輿與尚書淮陵王漼勒兵入宮禽倫黨孫秀孫會許超士猗駱休等皆斬之逐倫歸第即日乘輿反正羣臣頓首謝罪帝曰非諸卿之過也癸亥詔曰朕以不德纂承皇統遠不能光濟大業靖綏四方近不能開明刑威式遏姦宄至使逆臣孫秀敢肆凶虐窺間王室遂奉趙王倫叨據天位鎮東大將軍齊王冏征北大將軍成都王穎征西大將軍河間王顒並以明德茂親忠規允著首建大策匡救國難尚書漼共立大謀左衛將軍王輿與羣公卿士協同謀略親勒本營斬秀及其二子前趙王倫為秀所誤與其子等已詣金墉迎朕幽宮旋軫閶闔豈在豫一人獨饗其慶宗廟社稷實有賴焉於是大赦改元孤寡賜穀五斛大酺五日誅趙王倫義陽王威九門侯質等及倫之黨與五月立襄陽王尚為皇太孫六月戊辰大赦增吏位二等復封賓徒王晏為吳王庚午東萊王蕤左衛將軍王輿謀廢齊王冏事泄蕤廢為庶人輿伏誅夷三族甲戌以齊王冏為大司馬都督中外諸軍事成都王穎為大將軍録尚書事河間王顒為太尉罷丞相復置司徒官己卯以梁王肜為太宰領司徒封齊王冏功臣葛旟牟平公路季小黃公衛毅平陰公劉真安鄉公韓泰封丘公秋七月甲午立吳王晏子國為漢王復封常山王為長沙王八月大赦戊辰原徙邊者益州刺史羅尚討羌破之己巳徙南平王祥為宜都王下邳王韡薨以東平王楙為平東將軍都督徐州諸軍事九月追東安王繇復其爵丁丑封楚王瑋子範為襄陽王冬十月流人李特反於蜀十二月司空何劭薨封齊王冏子冰為樂安王英為濟陽王超為淮南王是歲郡國十二旱六蝗太安元年春正月庚子安東將軍譙王隨薨三月癸卯赦司冀豫四州皇太孫尚薨夏四月彗星晝見五月乙酉侍中太宰領司徒梁王肜薨以右光祿大夫劉實為太傅太尉河間王顒遣將衙博擊李特於蜀為特所敗特遂陷梓潼巴西害廣漢太守張微自號大將軍癸卯以清河王遐子覃為皇太子賜孤寡帛大酺五日以齊王冏為太師東海王越為司空秋七月兗豫徐冀等四州大水冬十月地震十二月丁卯河間王顒表齊王冏窺伺神器有無君之心與成都王穎新野王歆范陽王虓同會洛陽請廢冏還第長沙王奉乘輿屯南止車門攻冏殺之幽其諸子于金墉城廢冏弟北海王實大赦改元以長沙王為太尉都督中外諸軍事封東萊王蕤子照為齊王二年春正月甲子朔赦五歲刑三月李特攻陷益州荊州刺史宋岱擊特斬之傳首京師夏四月特子雄復據益州五月義陽蠻張昌舉兵反以山都人丘沈為主改姓劉氏偽號漢建元神鳳攻破郡縣南陽太守劉彬平南將軍羊伊鎮南大將軍新野王歆並遇害六月遣荊州刺史劉弘等討張昌于方城王師敗績秋七月中書令卞粹侍中馮蓀河南尹李含等二於長沙王疑而害之張昌陷江南諸郡武陵太守賈隆零陵太守孔紘豫章太守閻濟武昌太守劉根皆遇害昌別帥石冰寇揚州刺史陳徽與戰大敗諸郡盡沒臨淮人封雲舉兵應之自阜陵寇徐州八月河間王顒成都王穎舉兵討長沙王帝以為大都督帥軍禦之庚申劉弘及張昌戰於清水斬之顒遣其將張方穎遣其將陸機牽秀石超等來逼京師乙丑帝幸十三里橋遣將軍皇甫商距方于宜陽己巳帝旋軍于宣武場庚午舍于石樓天中裂無雲而雷九月丁丑帝次于河橋壬午皇甫商為張方所敗甲申帝軍于芒山丁亥幸偃師辛卯舍于豆田癸巳尚書右僕射興晉侯羊玄之卒帝旋于城東丙申進軍緱氏擊牽秀走之大赦張方入京城燒清明開陽二門死者萬計石超逼乘輿于緱氏冬十月壬寅帝旋于宮石超焚緱氏服御無遺丁未破牽秀范陽王虓于東陽門外戊申破陸機于建春門石超走斬其大將賈崇等十六人懸首銅駝街張方退屯十三里橋十一月辛巳星晝隕聲如雷王師攻方壘不利方決千金堨水碓皆涸乃發王公奴婢手舂給兵廩一品已下不從征者男子十三以上皆從役又發奴助兵號為四部司馬公私窮踧米石萬錢詔命所至一城而已壬寅夜赤氣竟天隱隱有聲丙辰地震癸亥東海王越執長沙王幽於金墉城尋為張方所害甲子大赦丙寅揚州秀才周玘前南平內史王矩前吳興內史顧祕起義軍以討石冰冰退自臨淮趣壽陽征東將軍劉準遣廣陵度支陳敏擊冰李雄自郫城攻益州刺史羅尚尚委城而遁雄盡有成都之地封鮮卑段勿塵為遼西公永興元年春正月丙午尚書令樂廣卒成都王穎自鄴諷于帝乃大赦改元為永安帝逼于河間王顒密詔雍州刺史劉沈秦州刺史皇甫重以討之沈舉兵攻長安為顒所敗張方大掠洛中還長安於是軍中大餒人相食以成都王穎為丞相穎遣從事中郎成夔等以兵五萬屯十二城門殿中宿所忌者穎皆殺之以三部兵代宿衛二月乙酉廢皇后羊氏幽于金墉城黜皇太子覃復為清河王三月陳敏攻石冰斬之揚徐二州平河間王顒表請立成都王穎為太弟戊申詔曰朕以不德纂承鴻緒于茲十有五載禍亂滔天姦逆仍起至乃幽廢重宮宗廟圮絶成都王穎溫仁惠和克平暴亂其以穎為皇太弟都督中外諸軍事丞相如故大赦賜魚衆寡高年帛三匹大酺五日丙辰盜竊太廟服器以太尉顒為太宰太傅劉實為太尉六月新作三城門秋七月丙申朔右衛將軍陳眕以詔召百僚入殿中因勒兵討成都王穎戊戌大赦復皇后羊氏及皇太子覃己亥司徒王戎東海王越高密王簡平昌公模吳王晏豫章王熾襄陽王範右僕射荀藩等奉帝北征至安陽衆十餘萬穎遣其將石超距戰己未六軍敗績于蕩陰矢及乘輿百官分散侍中嵇紹死之帝傷頰中三矢亡六璽帝遂幸超軍餒甚超進水左右奉秋桃超遣弟熙奉帝之鄴穎帥羣官迎謁道左帝下輿涕泣其夕幸于穎軍穎府有九錫之儀陳留王送貂蟬文衣鶡尾明日乃備法駕幸于鄴唯豫章王熾司徒王戎僕射荀藩從庚申大赦改元為建武八月戊辰穎殺東安王繇張方復入洛陽廢皇后羊氏及皇太子覃胸奴左賢王劉元海反於離石自號大單于安北將軍王浚遣烏丸騎攻成都王穎于鄴大敗之穎與帝單車走洛陽服御分散倉卒上下無齎侍中黃門被囊中齎私錢三千詔貸用所在買飯以供宮人止食于道中客舍宮人有持升餘石要米飯及燥蒜鹽豉以進帝帝噉之御中黃門布被次獲嘉市粗米飯盛以瓦盆帝噉兩盂有老父獻蒸雞帝受之至溫將謁陵帝喪履納從者之履下拜流涕左右皆歔欷及濟河張方帥騎三千以陽燧青蓋車奉迎方拜謁帝躬止之辛巳大赦賞從者各有差冬十一月乙未方請帝謁廟因劫帝幸長安方以所乘車入殿中帝馳避後園竹中方逼帝升車左右中黃門鼓吹十二人步從唯中書監盧志侍側方以帝幸其壘帝令方具車載宮人寶物軍人因妻略後宮分爭府藏魏晉已來之積掃地無遺矣行次新安寒甚帝墮馬傷足尚書高光進面衣帝嘉之河間王顒帥官屬步騎三萬迎于霸上顒前拜謁帝下車止之以征西府為宮唯僕射荀藩司隸劉暾太常鄭球河南尹周馥與其遺官在洛陽為留臺承制行事號為東西臺焉丙午留臺大赦改元復為永安辛丑復皇后羊氏李雄僭號成都王劉元海僭號漢王十二月丁亥詔曰天禍晉邦冢嗣莫繼成都王穎自在儲二政績虧損四海失望不可承重其以王還第豫章王熾先帝愛子令問日新四海注意今以為皇太弟以隆我晉邦以司空越為太傅與太宰顒夾輔朕躬司徒王戎參録朝政光祿大夫王衍為尚書左僕射安南將軍虓安北將軍浚平北將軍騰各守本鎮高密王簡為鎮南將軍領司隸校尉權鎮洛陽東中郎將模為寧北將軍都督冀州鎮于鄴鎮南大將軍劉弘領荊州以鎮南土周馥繆胤各還本部百官皆復職齊王冏前應還第長沙王輕陷重刑封其子紹為樂平縣王以奉其嗣自頃戎車屢征勞費人力供御之物皆減三分之二戶調田租三分減一蠲除苛政愛人務本清通之後當還東京大赦改元以河間王顒都督中外諸軍事二年春正月甲午朔帝在長安夏四月詔封樂平王紹為齊王丙子張方廢皇后羊氏六月甲子侍中司徒安豐侯王戎薨隴西太守韓稚攻秦州刺史張輔殺之李雄僭即帝位國號蜀秋七月甲午尚書諸曹火燒崇禮闥東海王越嚴兵徐方將西迎大駕成都王穎部將公師藩等聚衆攻陷郡縣害陽平太守李志汲郡太守張延等轉攻鄴平昌公模遣將軍趙驤擊破之八月辛丑大赦驃騎將軍范陽王虓逐冀州刺史李義揚州刺史曹武殺丹楊太守朱建李雄遣其將李驤寇漢安車騎大將軍劉弘逐平南將軍彭城王釋于宛九月庚寅朔公師藩又害平原太守王景清河太守馮熊庚子豫州刺史劉喬攻范陽王虓於許昌敗之壬子以成都王穎為鎮軍大將軍都督河北諸軍事鎮鄴河間王顒遣將軍呂朗屯洛陽冬十月丙子詔曰得豫州刺史劉喬檄稱潁川太守劉輿迫脅驃騎將軍虓距逆詔令造構凶逆擅劫郡縣合聚兵衆擅用苟晞為兗州斷截王命鎮南大將軍荊州刺史劉弘平南將軍彭城王釋等其各勒所統徑會許昌與喬并力今遣右將軍張方為大都督統精卒十萬建武將軍呂朗廣武將軍騫貙建威將車刁默等為軍前鋒共會許昌除輿兄弟丁丑使前車騎將軍石超北中郎將王闡討輿等赤氣見于北方東西竟天有星孛于北斗平昌公模遣將軍宋胄等屯河橋十一月立節將軍周權詐被檄自稱平西將軍復皇后羊氏洛陽令何喬攻權殺之復廢皇后十二月呂朗等東屯滎陽成都王穎進據洛陽張方劉弘等並桉兵不能禦范陽王虓濟自官渡拔滎陽斬石超襲許昌破劉喬于蕭喬奔南陽右將軍陳敏舉兵反自號楚公矯稱被中詔從沔漢奉迎天子逐揚州刺史劉機丹楊太守王曠遣弟恢南略江州刺史應邈奔弋陽光熙元年春正月戊子朔日有蝕之帝在長安河間王顒聞劉喬破大懼遂殺張方請和于東海王越越不聽宋胄等破穎將樓裒進逼洛陽穎奔長安甲子越遣其將祁弘宋胄司馬纂等迎帝三月東萊令劉柏根反自稱公襲臨淄高密王簡奔聊城王浚遣將討柏根斬之夏四月己巳東海王越屯于溫顒遣弘農太守彭隨北地太守刁默距祁弘等于湖五月枉矢西南流范陽國地燃可以爨壬辰祁弘等與刁默戰默大敗顒穎走南山奔于宛弘等所部鮮卑大掠長安殺二萬餘人是日日光四散赤如血甲午又如之己亥弘等奉帝還洛陽帝乘牛車行宮藉草公卿跋涉戊申驃騎范陽王虓殺司隸校尉邢喬己酉盜取太廟金匱及策文各四六月丙辰朔至自長安升舊殿哀感流涕謁于太廟復皇后羊氏辛未大赦改元秋七月乙酉朔日有蝕之太廟吏賈苞盜太廟靈衣及劍伏誅八月以太傅東海王越録尚書驃騎將軍范陽王虓為司空九月頓丘太守馮嵩執成都王穎送之于鄴進東嬴公騰爵為東燕王平昌公模為南陽王冬十月司空范陽王虓薨虓長史劉輿害成都王穎十一月庚午帝崩于顯陽殿時年四十八葬太陽陵帝之為太子也朝廷咸知不堪政事武帝亦疑焉嘗悉召東宮官屬使以尚書事令太子決之帝不能對賈妃遣左右代對多引古義給事張泓曰太子不學陛下所知今宜以事斷不可引書妃從之泓乃具草令帝書之武帝覽而大悅太子遂安及居大位政出羣下綱紀大壞貨賂公行勢位之家以貴陵物忠賢路絶讒邪得志更相薦舉天下謂之互市焉高平王沈作釋時論南陽魯褒作錢神論廬江杜嵩作任子春秋皆疾時之作也帝又嘗在華林園聞蝦蟆聲謂左右曰此鳴者為官乎私乎或對曰在官地為官在私地為私及天下荒亂百姓餓死帝曰何不食肉糜其蒙蔽皆此類也後因食中毒而崩或云司馬越之鴆史臣曰不才之子則天稱大權非帝出政邇宵人褒姒共叔帶並興襄后與犬戎俱運昔者丹朱不肖赧王逃責相彼凶德事關休咎方乎土梗以墜其情溽暑之氣將闌淫蛙之音罕記乃彰嗤笑用符顛隕豈通才俊彥猶形于前代增淫助虐獨擅于當今者歟物號忠良于茲拔本人稱祅孽自此疏源長樂不祥承華非命生靈版蕩社稷丘墟古者敗國亡身分鑣共軫不有亂常則多庸暗豈明神喪其精魄武皇不知其子也贊曰惠皇居尊臨朝聽言厥體斯昧其情則昏高臺望子長夜奚寃金墉毀冕蕩陰釋胄及爾皆亡滔天來遘
