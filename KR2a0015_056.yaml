body:
  text: 晉書卷五十六列傳第二十六江統子虨惇江統字應元陳留圉人也祖蕤以義行稱為譙郡太守封亢父男父祚南安太守統靜默有遠志時人為之語曰嶷然稀言江應元與鄉人蔡克俱知名襲父爵除山陰令時關隴屢為氐羌所擾孟觀西討自擒氐帥齊萬年統深惟四夷亂華宜杜其萌乃作徙戎論其辭曰夫夷蠻戎狄謂之四夷九服之制地在要荒春秋之義內諸夏而外夷狄以其言語不通贄幣不同法俗詭異種類乖殊或居絶域之外山河之表崎嶇川谷阻險之地與中國壤斷土隔不相侵涉賦役不及正朔不加故曰天子有道守在四夷禹平九土而西戎即其性氣貪婪凶悍不仁四夷之中戎狄為甚弱則畏服強則侵叛雖有賢聖之世大德之君咸未能以通化率導而以恩德柔懷也當其強也以殷之高宗而憊於鬼方有周文王而患昆夷獫狁高祖困於白登孝文軍於霸上及其弱也周公來九譯之貢中宗納單于之朝以元成之微而猶四夷賓服此其已然之效也故胸奴求守邊塞而侯應陳其不可單于屈膝未央望之議以不臣是以有道之君牧夷狄也惟以待之有備禦之有常雖稽顙執贄而邊城不弛固守為寇賊強暴而兵甲不加遠征期令境內獲安疆埸不侵而已及至周室失統諸侯專征以大兼小轉相殘滅封疆不固而利害異心戎狄乘間得入中國或招誘安撫以為己用故申繒之禍顛覆宗周襄公要秦遽興姜戎當春秋時義渠大荔居秦晉之域陸渾陰戎處伊洛之間鄋瞞之屬害及濟東侵入齊宋陵虐邢衛南夷與北狄交侵中國不絶若線齊桓攘之存亡繼絶北伐山戎以開燕路故仲尼稱管仲之力嘉左衽之功逮至春秋之末戰國方盛楚吞蠻氏晉翦陸渾趙武胡服開榆中之地秦雄咸陽滅義渠之等始皇之并天下也南兼百越北走胸奴五嶺長城戎卒億計雖師役煩殷寇賊橫暴然一世之功戎虜奔卻當時中國無復四夷也漢興而都長安關中之郡號曰三輔禹貢雍州宗周豐鎬之舊也及至王莽之敗赤眉因之西都荒毀百姓流亡建武中以馬援領隴西太守討叛羌徙其餘種於關中居馮翊河東空地而與華人雜處數歲之後族類蕃息既恃其肥強且苦漢人侵之永初之元騎都尉王弘使西域發調羌氐以為行衛於是羣羌奔駭互相扇動二州之戎一時俱發覆沒將守屠破城邑鄧㪣之征棄甲委兵輿尸喪師前後相繼諸戎遂熾至於南入蜀漢東掠趙魏唐突軹關侵及河內及遣北軍中候朱寵將五營士於孟津距羌十年之中夷夏俱斃任尚馬賢僅乃克之此所以為害深重纍年不定者雖由禦者之無方將非其才亦豈不以寇發心腹害起肘腋疢篤難療瘡大遲愈之故哉自此之後餘燼不盡小有際會輒復侵叛馬賢忸終于覆敗段熲臨衝自西徂東雍州之戎常為國患中世之寇惟此為大漢末之亂關中殘滅魏興之初與蜀分隔疆埸之戎一彼一此魏武皇帝令將軍夏侯妙才討叛氐阿貴千萬等後因拔棄漢中遂徙武都之種於秦川欲以弱寇強國扞禦蜀虜此蓋權宜之計一時之勢非所以為萬世之利也今者當之已受其弊矣夫關中土沃物豐厥田上上加以涇渭之流溉其舄鹵鄭國白渠灌浸相通黍稷之饒畝號一鍾百姓謠詠其殷實帝王之都每以為居未聞戎狄宜在此土也非我族類其心必異戎狄志態不與華同而因其衰弊遷之畿服士庶玩習侮其輕弱使其怨恨之氣毒於骨髓至於蕃育衆盛則坐生其心以貪悍之性挾憤怒之情候隙乘便輒為橫逆而居封域之內無障塞之隔掩不備之人收散野之積故能為禍滋擾暴害不測此必然之勢已驗之事也當今之宜宜及兵威方盛衆事未罷徙馮翊北地新平安定界內諸羌著先零罕幵析支之地徙扶風始平京兆之氐出還隴右著陰平武都之界廩其道路之糧令足自致各附本種反其舊土使屬國撫夷就安集之戎晉不雜並得其所上合往古即之義下為盛世永久之規縱有猾夏之心風塵之警則絶遠中國隔閡山河雖為寇暴所害不廣是以充國子明能以數萬之衆制羣羌之命有征無戰全軍獨克雖有謀謨深計廟勝遠圖豈不以華夷異處戎夏區別要塞易守之故得成其功也哉難者曰方今關中之禍暴兵二載征戍之勞老師十萬水旱之害荐饑纍荒疫癘之災札瘥夭昏凶逆既戮悔惡初附且款且畏咸懷危懼百姓愁苦異人同慮望寧息之有期若枯旱之思雨露誠宜鎮之以安豫而子方欲作役起徒興功造事使疲悴之衆徙自猜之寇以無穀之人遷乏食之虜恐勢盡力屈緒業不卒羌戎離散心不可一前害未及弭而後變復橫出矣答曰羌戎狡猾擅相號署攻城野戰傷害牧守連兵聚衆載離寒暑矣而今異類瓦解同種土崩老幼繫虜丁壯降散禽離獸迸不能相一子以此等為尚挾餘資悔惡反善懷我德惠而來柔附乎將勢窮道盡智力俱困懼我兵誅以至於此乎曰無有餘力勢窮道盡故也然則我能制其短長之命而令其進退由己矣夫樂其業者不易事安其居者無遷志方其自疑危懼畏怖促遽故可制以兵威使之左右無違也逮其死亡散流離逖未鳩與關中之人戶皆為讎故可遐遷遠處令其心不懷土也夫聖賢之謀事也為之於未有理之於未亂道不著而平德不顯而成其次則能轉禍為福因敗為功值困必濟遇否能通今子遭弊事之終而不圖更制之始愛易轍之勤而得覆車之軌何哉且關中之人百餘萬口率其少多戎狄居半處之與遷必須口實若有窮乏糝粒不繼者故當傾關中之穀以全其生生之計必無擠於溝壑而不為侵掠之害也今我遷之傳食而至附其種族自使相贍而秦地之人得其半穀此為濟行者以廩糧遺居者以積倉寬關中之逼去盜賊之原除旦夕之損建終年之益若憚暫舉之小勞而忘永逸之弘策惜日月之煩苦而遺纍世之寇敵非所謂能開物成務創業垂統崇基拓跡謀及子孫者也并州之胡本實胸奴桀惡之寇也漢宣之世凍餒殘破國內五裂後合為二呼韓邪遂衰弱孤危不能自存依阻塞下委質柔服建武中南單于復來降附遂令入塞居於漠南數世之後亦輒叛戾故何熙梁慬戎車屢征中平中以黃巾賊起發調其兵部衆不從而殺羌渠由是於彌扶羅求助於漢以討其賊仍值世喪亂遂乘釁而作鹵掠趙魏寇至河南建安中又使右賢王去卑誘質呼廚泉聽其部落散居六郡咸熙之際以一部太強分為三率泰始之初又增為四於是劉猛內叛連結外虜近者郝散之變發於穀遠今五部之衆戶至數萬人口之盛過於西戎然其天性驍勇弓馬便利倍於氐羌若有不虞風塵之慮則并州之域可為寒心滎陽句驪本居遼東塞外正始中幽州刺史毋丘儉伐其叛者徙其餘種始徙之時戶落百數子孫孳息今以千計數世之後必至殷熾今百姓失職猶或亡叛犬馬肥充則有噬齧況於夷狄能不為變但顧其微弱勢力不陳耳夫為邦者患不在貧而在不均憂不在寡而在不安以四海之廣士庶之富豈須夷虜在內然後取足哉此等皆可申諭發遣還其本域慰彼羇旅懷土之思釋我華夏纖介之憂惠此中國以綏四方德施永世於計為長帝不能用未及十年而夷狄亂華時服其深識遷中郎選司以統叔父春為宜春令統因上疏曰故事父祖與官職同名皆得改選而未有身與官職同名不在改選之例臣以為父祖改選者蓋為臣子開地不為父祖之身也而身名所加亦施於臣子佐吏係屬朝夕從事官位之號發言所稱若指實而語則違經禮諱尊之義若詭辭避回則為廢官擅犯憲制今以四海之廣職位之衆名號繁多士人殷富至使有受寵皇朝出身宰牧而令佐吏不得表其官稱子孫不得言其位號所以上嚴君父下為臣子體例不通若易私名以避官職則違春秋不奪人親之義臣以為身名與官職同者宜與觸父祖名為比體例既全於義為弘朝廷從之轉太子洗馬在東宮纍年甚被親禮太子頗闕朝覲又奢費過度多諸禁忌統上書諫曰臣聞古之為臣者進思盡忠退思補過獻可替否拾遺補闕是以人主得以舉無失行言無口過德音發聞揚名後世臣等不逮無能云補思竭愚誠謹陳五事如左惟蒙一省再省少垂察納其一曰六行之義以孝為首虞舜之德以孝為稱故太子以朝夕視君膳為職左右就養無方文王之為世子可謂篤於事親者也故能擅三代之美為百王之宗自頃聖體屢有疾患數闕朝侍遠近觀聽者不能深知其故以致疑惑伏願殿下雖有微苦可堪扶輿則宜自力易曰君子終日乾乾蓋自勉強不息之謂也其二曰古之人君雖有聰明之姿睿哲之質必須輔弼之助相導之功故虞舜以五臣興周文以四友隆及成王之為太子也則周召為保傅史佚昭文章故能聞道早備登崇大業刑措不用流聲洋溢伏惟殿下天授逸才聰鑒特達臣謂猶宜時發聖令宣揚德音咨詢保傅訪逮侍臣覲見賓客得令接盡壅否之情沛然交泰殿下之美煥然光明如此則高朗之風扇於前人弘範令軌永為後式其三曰古之聖王莫不以儉為德故堯稱采椽茅茨禹稱卑宮惡服漢文身衣弋綈足履革舄以身先物政致太平存為明王沒見宗祀及諸侯修之者魯僖以躬儉節用聲列雅頌蚡冒以篳路藍縷用張楚國大夫修之者文子相魯妾不衣帛晏嬰相齊鹿裘不補亦能匡君濟俗興國隆家庶人修之者顏回以簞食瓢飲揚其仁聲原憲以蓬戶繩樞邁其清德此皆聖主明君賢臣智士之所履行也故能懸名日月永世不朽蓋儉之福也及到末世以奢失之者帝王則有瑤臺瓊室玉杯象箸肴膳之珍則熊蹯豹胎酒池肉林諸侯為之者至於丹楹刻桷餼徵百牢大夫有瓊辨玉纓庶人有擊鍾鼎食亦罔不亡國喪宗破家失身醜名彰聞以為後戒竊聞後園鏤飾金銀刻磨犀象畫室之巧課試日精臣等以為今四海之廣萬物之富以今方古不足為侈也然上之所好下必從之是故居上者必慎其所好也昔漢光武皇帝時有獻千里馬及寶劍者馬以駕鼓車劍以賜騎士世祖武皇帝有上雉頭裘者即詔有司焚之都街高世之主不尚尤物故能正天下之俗刑四方之風臣等以為畫室之功可且減省後園雜作一皆罷遣肅然清靜優游道德則日新之美光于四海矣其四曰以天下而供一人以百里而供諸侯故王侯食籍而衣稅公卿大夫受爵而資祿莫有不贍者也是以士農工商四業不雜交易而退以通有無者庶人之業也周禮三市旦則百族晝則商賈夕則販夫販婦買賤賣貴販鬻菜果收十百之盈以救旦夕之命故為庶人之貧賤者也樊遲匹夫請學為圃仲尼不答魯大夫臧文仲使妾織蒲又譏其不仁公儀子相魯則拔其園葵言食祿者不與貧賤之人爭利也秦漢以來風俗轉薄公侯之尊莫不殖園圃之田而收市井之利漸冉相放莫以為恥乘以古道誠可愧也今西園賣葵菜藍子雞之屬虧敗國體貶損令問其五曰竊見禁土令不得繕修牆壁動正屋瓦臣以為此既違典彝舊義且以拘攣小忌而廢弘廓大道宜可蠲除於事為宜朝廷善之及太子廢徙許昌賈后諷有司不聽宮臣追送統與宮臣冒禁至伊水拜辭道左悲泣流漣都官從事悉收統等付河南洛陽獄付郡者河南尹樂廣悉散遣之繫洛陽者猶未釋都官從事孫琰說賈謐曰所以廢徙太子以為惡故耳東宮故臣冒罪拜辭涕泣路次不顧重辟乃更彰太子之德不如釋之謐語洛陽令曹攄由是皆免及太子薨改葬統作誄哀為世所重後為博士尚書郎參大司馬齊王冏軍事冏驕荒將敗統切諫文多不載遷廷尉正每州郡疑獄斷處從輕成都王穎請為記室多所針諫申論陸雲兄弟辭甚切至以母憂去職服闋為司徒左長史東海王越為兗州牧以統為別駕委以州事與統書曰昔王子師為豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪應此者不統舉高平郗鑒為賢良陳留阮修為直言濟北程收為方正時以為知人尋遷黃門侍郎散騎常侍領國子博士永嘉四年避難奔于成臯病卒凡所造賦頌表奏皆傳於後二子虨惇虨字思玄本州辟舉秀才平南將軍溫嶠以為參軍復為州別駕辟司空郗鑒掾除長山令鑒又請為司馬轉黃門郎車騎將軍庾冰鎮江州請為長史冰薨庾翼以為咨議參軍俄而復補長史翼薨大將干瓚作難虨討平之除尚書吏部郎仍遷御史中丞侍中吏部尚書永和中代桓景為護軍將軍出補會稽內史加右軍將軍代王彪之為尚書僕射哀帝即位疑周貴人名號所宜虨議見禮志帝欲於殿庭立鴻祀又欲躬自藉田虨並以為禮廢日久儀注不存中興以來所不行謂宜停之為僕射積年簡文帝為相每訪政事虨多所補益轉護軍將軍領國子祭酒卒官子敳歷琅邪內史驃騎咨議敳子元熙中為西中郎長史弟夷尚書惇字思悛孝友淳粹高節邁俗性好學儒玄並綜每以為君子立行應依禮而動雖隱顯殊途未有不傍禮教者也若乃放達不羈以肆縱為貴者非但動違禮法亦道之所棄也乃著通道崇檢論世咸稱之蘇峻之亂避地東陽山太尉郗鑒檄為兗州治中又辟太尉掾康帝為司徒亦辟焉征西將軍庾亮請為儒林參軍徵拜博士著作郎皆不就邑里宗其道有事必咨而後行東陽太守阮裕長山令王濛皆一時名士並與惇游處深相欽重養志二十餘年永和九年卒時年四十九友朋相與刊石立頌以表德美云孫楚孫統綽孫楚字子荊太原中都人也祖資魏驃騎將軍父宏南陽太守楚才藻卓絶爽邁不羣多所陵傲缺鄉曲之譽年四十餘始參鎮東軍事文帝遣符劭孫郁使吳將軍石苞令楚作書遺孫晧曰蓋見機而作周易所貴小不事大春秋所誅此乃吉凶之萌兆榮辱所由生也是故許鄭以銜璧全國曹談以無禮取滅載籍既記其成敗古今又著其愚智不復廣引譬類崇飾浮辭苟以夸大為名更喪忠告之實今粗論事要以相覺悟昔炎精幽昧曆數將終桓靈失德災釁並興豺狼抗爪牙之毒生靈罹塗炭之難由是九州絶貫王綱解紐四海蕭條非復漢有太祖承運神武應期征討暴亂克寧區夏協建靈符天命既集遂廓弘基奄有魏域土則神州中嶽器則九鼎猶存世載淑美重光相襲故知四隩之攸同帝者之壯觀也昔公孫氏承藉父兄世居東裔擁帶燕胡憑陵險遠講武游盤不供職貢內傲帝命外通南國乘桴滄海交酬貨賄葛越布于朔土貂馬延于吳會自以控弦十萬奔走之力信能右折燕齊左震扶桑輮轢沙漠南面稱王宣王薄伐猛鋭長驅師次遼陽而城池不守枹鼓暫鳴而元凶折首於是遠近疆埸列郡大荒收離聚散大安其居衆庶悅服殊俗款附自茲以降九野清泰東夷獻其樂器肅慎貢其楛矢曠世不羈應化而至巍巍蕩蕩想所具聞也吳之先祖起自荊楚遭時擾攘潛播江表劉備震懼亦逃巴岷遂因山陵積石之固三江五湖浩汗無涯假氣遊魂迄茲四紀兩邦合從東西唱和互相扇動距捍中國自謂三分鼎足之勢可與泰山共相終始也相國晉王輔相帝室文武桓桓志厲秋霜廟勝之算應變無窮獨見之鑒與衆絶慮主上欽明委以萬機長轡遠御妙略潛授偏師同心上下用力陵威奮伐入其阻并敵一向奪其膽氣小戰江由則成都自潰曜兵劍閣則姜維面縛開地六千領郡三十兵不踰時梁益肅清使竊號之雄稽顙絳闕球琳重錦充於府庫夫韓并魏徙虢滅虞亡此皆前鑒後事之表又南中呂興深覩天命蟬蛻內附願為臣妾外失輔車脣齒之援內有羽毛零落之漸而徘徊危國冀延日月此由魏武侯卻指山河自以為強殊不知物有興亡則所美非其地也方今百僚濟濟俊乂盈朝武臣猛將折衝萬里國富兵強六軍精練思復翰飛飲馬南海自頃國家整修器械興造舟楫簡習水戰樓船萬艘千里相望刳木已來舟車之用未有如今之殷盛者也驍勇百萬畜力待時役不再舉今日之師也然主相眷眷未便電發者猶以為愛人治國道家所尚崇城遂卑文王退舍故先開大信喻以存亡殷勤之指往使所究也若能審勢安危自求多福蹶然改容祗承往錫追慕南越嬰齊入侍北面稱臣伏聽告策則世祚江表永為魏藩豐功顯報隆於今日矣若猶侮慢未順王命然後謀力雲合指麾從風雍梁二州順流而東青徐戰士列江而西荊揚兗豫爭驅八衝征東甲卒武步秣陵爾乃王輿整駕六戎徐征羽校燭日旌旗星流龍游曜路歌吹盈耳士卒奔邁其會如林煙塵俱起震天駭地渴賞之士鋒鏑爭先忽然一旦身首橫分宗祀淪覆取戒萬世引領南望良助寒心夫療膏肓之疾者必進苦口之藥決狐疑之慮者亦告逆耳之言如其猶豫迷而不反恐俞附見其已死扁鵲知其無功矣勉思良圖惟所去就劭等至吳不敢為通楚後遷佐著作郎復參石苞驃騎軍事楚既負其材氣頗侮易於苞初至長揖曰天子命我參卿軍事因此而嫌隙遂構苞奏楚與吳人孫世山共訕毀時政楚亦抗表自理紛紜經年事未判又與鄉人郭奕忿爭武帝雖不顯明其罪然以少賤受責遂湮廢積年初參軍不敬府主楚既輕苞遂制施敬自楚始也征西將軍扶風王駿與楚舊好起為參軍轉梁令遷衛將軍司馬時龍見武庫井中羣臣將上賀楚上言曰頃聞武庫井中有二龍羣臣或有謂之禎祥而稱賀者或有謂之非祥無所賀者可謂楚既失之而齊亦未為得也夫龍或俯鱗潛于重泉或仰攀雲漢游乎蒼昊而今蟠于坎井同於蛙蝦者豈獨管庫之士或有隱伏厮役之賢沒於行伍故龍見光景有所感悟願陛下赦小過舉賢才垂夢於傅巖望想於渭濱修學官起淹滯申命公卿舉獨行君子可惇風厲俗者又舉亮拔秀異之才可以撥煩理難矯世抗言者無繫世族必先逸賤夫戰勝攻取之勢并兼混一之威五伯之事韓白之功耳至於制禮作樂闡揚道化甫是士人出筋力之秋也伏願陛下擇狂夫之言惠帝初為馮翊太守元康三年卒初楚與同郡王濟友善濟為本州大中正訪問銓邑人品狀至楚濟曰此人非卿所能目吾自為之乃狀楚曰天才英博亮拔不羣楚少時欲隱居謂濟曰當欲枕石漱流誤云漱石枕流濟曰流非可枕石非可漱楚曰所以枕流欲洗其耳所以漱石欲厲其齒楚少所推服惟雅敬濟初楚除婦服作詩以示濟濟曰未知文生於情情生於文覽之悽然增伉儷之重三子衆洵纂衆及洵俱未仕而早終惟纂子統綽並知名統字承公幼與綽及從弟盛過江誕任不羈而善屬文時人以為有楚風征北將軍禇裒聞其名命為參軍辭不就家于會稽性好山水乃求為鄞令轉在吳寧居職不留心碎務縱意游肆名山勝川靡不窮究後為餘姚令卒子騰嗣以博學著稱位至廷尉騰弟登少善名理注老子行于世仕至尚書郎早終綽字興公博學善屬文少與高陽許詢俱有高尚之志居于會稽游放山水十有餘年乃作遂初賦以致其意嘗鄙山濤而謂人曰山濤吾所不解吏非吏隱非隱若以元禮門為龍津則當點額暴鱗矣所居齊前種一株松自守護鄰人謂之曰樹子非不楚楚可憐但恐永無棟梁日耳綽答曰楓柳雖復合抱亦何所施邪綽與詢一時名流或愛詢高邁則鄙於綽或愛綽才藻而無取於詢沙門支遁試問綽君何如許答曰高情遠致弟子早已伏膺然一詠一吟許將北面矣絶重張衡左思之賦每云三都二京五經之鼓吹也嘗作天台山賦辭致甚工初成以示友人范榮期云卿試擲地當作金石聲也榮期曰恐此金石非中宮商然每至佳句輒云應是我輩語除著作佐郎襲爵長樂侯綽性通率好譏調嘗與習鑿齒共行綽在前顧謂鑿齒曰沙之汰之瓦石在後鑿齒曰簸之揚之穅秕在前征西將軍庾亮請為參軍補章安令徵拜太學博士遷尚書郎揚州刺史殷浩以為建威長史會稽內史王羲之引為右軍長史轉永嘉太守遷散騎常侍領著作郎時大司馬桓溫欲經緯中國以河南粗平將移都洛陽朝廷畏溫不敢為異而北土蕭條人情疑懼雖並知不可莫敢先諫綽乃上疏曰伏見征西大將軍臣溫表便當躬率三軍討除二寇蕩滌河渭清灑舊京然後神旗電舒朝服濟江反皇居於中土正玉衡於天極斯超世之弘圖千載之盛事然臣之所懷竊有未安以為帝王之興莫不藉地利人和以建功業貴能以義平暴因而撫之懷愍不建淪胥秦京遂令胡戎交侵神州絶綱土崩之釁誠由道喪然中夏蕩蕩一時橫流百郡千城曾無完郛者何哉亦以地不可守投奔有所故也天祚未革中宗龍飛非惟信順協於天人而已實賴萬里長江畫而守之耳易稱王公設險以守其國險之時義大矣哉斯已然之明效也今作勝談自當任道而遺險校實量分不得不保小以固存自喪亂已來六十餘年蒼生殄滅百不遺一河洛丘虛函夏蕭條井堙木刊阡陌夷滅生理茫茫永無依歸播流江表已經數世存者長子老孫亡者丘隴成行雖北風之思感其素心目前之哀實為交切若遷都旋軫之日中興五陵即復緬成遐域泰山之安既難以理保蒸蒸之思豈不纏於聖心哉溫今此舉誠欲大覽始終為國遠圖向無山陵之急亦未首決大謀獨任天下之至難也今發憤忘食忠慨亮到凡在有心孰不致感而百姓震駭同懷危懼者豈不以反舊之樂賒而趣死之憂促哉何者植根於江外數十年矣一朝拔之頓驅踧於空荒之地提挈萬里踰險浮深離墳墓棄生業富者無三年之糧貧者無一餐之飯田宅不可復售舟車無從而得捨安樂之國適習亂之鄉出必安之地就纍卵之危將頓仆道塗飄溺江川僅有達者夫國以人為本疾寇所以為人衆喪而寇除亦安所取裁此仁者所宜哀矜國家所宜深慮也自古今帝王之都豈有常所時隆則宅中而圖大勢屈則遵養以待會使德不可勝家有三年之積然後始可謀太平之事耳今天時人事有未至者矣一朝欲一宇宙無乃頓而難舉乎臣之愚計以為且可更遣一將有威名資實者先鎮洛陽於陵所築二壘以奉衛山陵掃平梁許清一河南運漕之路既通然後盡力於開墾廣田積穀漸為徙者之資如此賊見亡徵勢必遠竄如其迷逆不化復欲送死者南北諸軍風馳電赴若身手之救痛癢率然之應首尾山陵既固中夏小康陛下且端委紫極增修德政躬行漢文簡朴之至去小惠節游費審官人練甲兵以養士滅寇為先十年行之無使隳廢則貧者殖其財怯者充其勇人知天德赴死如歸以此致政猶運諸掌握何故捨百勝之長理舉天下而一擲哉陛下春秋方富溫克壯其猷君臣相與弘養德業括囊元吉豈不快乎今溫唱高議聖朝互同臣以輕微獨獻管見出言之難實在今日而臣區區必聞天聽者竊以無諱之朝狂瞽進說芻蕘之謀聖賢所察所以不勝至憂觸冒干陳若陛下垂神溫少留思豈非屈於一人而允億兆之願哉如以干忤罪大欲加顯戮使丹誠上達退受刑誅雖沒泉壤尸且不朽桓溫見綽表不悅曰致意興公何不尋君遂初賦知人家國事邪尋轉廷尉卿領著作綽少以文才垂稱于時文士綽為其冠溫王郗庾諸公之薨必須綽為碑文然後刊石焉年五十八卒子嗣有綽風文章相亞位至中軍參軍早亡史臣曰江統風檢操行良有可稱陳留多士斯為其冠徙戎之論實乃經國遠圖然運距中衰陵替有漸假其言見用恐速禍招怨無救於將顛也逮愍懷廢徙冒禁拜辭所謂命輕鴻毛義貴熊掌虨位隆端右竭誠獻替惇遺忽榮利聿修天爵雖出處異塗俱難兄弟矣孫楚體英絢之姿超然出類見知武子誠無愧色覽其貽晧之書諒曩代之佳筆也而負才誕傲蔑苞忿奕違遜讓之道肆陵憤之氣丁年沈廢諒自取矣統綽棣華秀發名顯中興可謂無忝爾祖統竟淪跡下邑窮觀勝地會其心焉綽獻直論辭都不懾元子有匪躬之節豈徒文雅而已哉贊曰應元蹈義子荊越俗江寡悔尤孫貽擯辱虨統昆弟江左馳聲彬彬藻思綽冠羣英
