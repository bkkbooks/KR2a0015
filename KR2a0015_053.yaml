body:
  text: 晉書卷五十三列傳第二十三愍懷太子子虨臧尚愍懷太子遹字熙祖惠帝長子母曰謝才人幼而聰慧武帝愛之在左右嘗與諸皇子共戲殿上惠帝來朝執諸皇子手次至太子帝曰是汝兒也惠帝乃止宮中嘗夜失火武帝登樓望之太子時年五歲牽帝裾入暗中帝問其故太子曰暮夜倉卒宜備非常不宜令照見人君也由是奇之嘗從帝觀豕牢言於帝曰豕甚肥何不殺以享士而使久費五穀帝嘉其意即使烹之因撫其背謂廷尉傅祗曰此兒當興我家嘗對羣臣稱太子似宣帝於是令譽流於天下時望氣者言廣陵有天子氣故封為廣陵王邑五萬戶以劉實為師孟珩為友楊準馮蓀為文學惠帝即位立為皇太子盛選德望以為師傅以何劭為太師王戎為太傅楊濟為太保裴楷為少師張華為少傅和嶠為少保元康元年出就東宮又詔曰遹尚幼蒙今出東宮惟當賴師傅羣賢之訓其遊處左右宜得正人使共周旋能相長益者於是使太保衛瓘息庭司空泰息略太子太傅楊濟息毖太子少師裴楷息憲太子少傅張華息禕尚書令華廙息與太子遊處以相輔導焉及長不好學惟與左右嬉戲不能尊敬保傅賈后素忌太子有令譽因此密敕黃門閹宦媚諛於太子曰殿下誠可及壯時極意所欲何為自拘束每見喜怒之際輒歎曰殿下不知用威刑天下豈得畏服太子所幸蔣美人生男又言宜隆其賞賜多為皇孫造玩弄之器太子從之於是慢弛益彰或廢朝侍在後園遊戲愛埤車小馬令左右馳騎斷其鞅勒使墮地為樂或有犯忤者手自捶擊之性拘小忌不許繕壁修牆正瓦動屋而於宮中為市使人屠酤手揣斤兩輕重不差其母本屠家女也故太子好之又令西園賣葵菜藍子雞之屬而收其利東宮舊制月請錢五十萬備於衆用太子探取二月以供嬖寵洗馬江統陳五事以諫之太子不納語在統傳中舍人杜錫以太子非賈后所生而后性凶暴深以為憂每盡忠規勸太子修德進善遠於讒謗太子怒使人以針著錫常所坐中而刺之太子性剛知賈謐恃后之貴不能假借之謐至東宮或捨之而於後庭遊戲詹事裴權諫曰賈謐甚有寵於中宮而有不順之色若一旦交構大事去矣宜深自謙屈以防其變廣延賢士用自輔翼太子不能從初賈后母郭槐欲以韓壽女為太子妃太子亦欲婚韓氏以自固而壽妻賈午及后皆不聽而為太子聘王衍小女惠風太子聞衍長女美而賈后為謐聘之心不能平頗以為言謐嘗與太子圍爭道成都王穎見而訶謐謐意愈不平因此譖太子於后曰太子廣買田業多畜私財以結小人者為賈氏故也密聞其言云皇后萬歲後吾當魚肉之非但如是也若宮車晏駕彼居大位依楊氏故事誅臣等而廢后於金墉如反手耳不如早為之所更立慈順者以自防衛后納其言又宣揚太子之短布諸遠近于時朝野咸知賈后有害太子意中護軍趙俊請太子廢后太子不聽九年六月有桑生于宮西廂日長尺餘數日而枯十二月賈后將廢太子詐稱上不和呼太子入朝既至后不見置于別室遣婢陳舞賜以酒棗逼飲醉之使黃門侍郎潘嶽作書草若禱神之文有如太子素意因醉而書之令小婢承福以紙筆及書草使太子書之文曰陛下宜自了不自了吾當入了之中宮又宜速自了不了吾當手了之并謝妃共要剋期而兩發勿疑猶豫致後患茹毛飲血於三辰之下皇天許當掃除患害立道文為王蔣為內主願成當三牲祠北君大赦天下要疏如律令太子醉迷不覺遂依而寫之其字半不成既而補成之后以呈帝帝幸式乾殿召公卿入使黃門令董猛以太子書及青紙詔曰遹書如此今賜死遍示諸公王莫有言者惟張華裴頠證明太子賈后使董猛矯以長廣公主辭白帝曰事宜速決而羣臣各有不同若有不從詔宜以軍法從事議至日西不決后懼事變乃表免太子為庶人詔許之於是使尚書和郁持節解結為副及大將軍梁王肜鎮東將軍淮南王允前將軍東武公淡趙王倫太保何劭詣東宮廢太子為庶人是日太子遊玄圃聞有使者至改服出崇賢門再拜受詔步出承華門乘粗犢車淡以兵仗送太子妃王氏三皇孫于金墉城考竟謝淑妃及太子保林蔣俊明年正月賈后又使黃門自首欲與太子為逆詔以黃門首辭班示公卿又遣淡以千兵防送太子更幽于許昌宮之別坊令治書御史劉振持節守之先是有童謠曰東宮馬子莫聾空前至臘月纏汝又曰南風起兮吹白沙遙望魯國鬱嵯峨千歲髑髏生齒牙南風后名沙門太子小字也初太子之廢也妃父王衍表請離婚太子至許遺妃書曰鄙雖頑愚心念為善欲盡忠孝之節無有惡逆之心雖非中宮所生奉事有如親母自為太子以來敕見禁檢不得見母自宜城君亡不見存恤在空室中坐去年十二月道文疾病困篤父子之情實相憐愍于時表國家乞加徽號不見聽許疾病既篤為之求請恩福無有惡心自道文病中宮三遣左右來視云天教呼汝到二十八日暮有短函來題言東宮發疏云言天教欲見汝即便作表求入二十九日早入見國家須臾遣至中宮中宮左右陳舞見語中宮旦來吐不快使住空屋中坐須臾中宮遣陳舞見語聞汝表陛下為道文乞王不得王是成國耳中宮遙呼陳舞昨天教與太子酒棗便持三升酒大盤棗來見與使飲酒噉棗盡鄙素不飲酒即便遣舞啓説不堪三升之意中宮遙呼曰汝常陛下前持酒可喜何以不飲天與汝酒當使道文差也便答中宮陛下會同一日見賜故不敢辭通日不飲三升酒也且實未食恐不堪又未見殿下飲此或至顛倒陳舞復傳語云不孝那天與汝酒飲不肯飲中有惡物邪遂可飲二升餘有一升求持還東宮飲盡逼迫不得已更飲一升飲已體中荒迷不復自覺須臾有一小婢持封箱來云詔使寫此文書鄙便驚起視之有一白紙一青紙催促云陛下停待又小婢承福持筆研墨黃紙來使寫急疾不容復視實不覺紙上語輕重父母至親實不相疑事理如此實為見誣想衆人見明也太子既廢非其罪衆情憤怨右衛督司馬雅宗室之疏屬也與常從督許超並有寵於太子二人深傷之説趙王倫謀臣孫秀曰國無適嗣社稷將危大臣之禍必起而公奉事中宮與賈后親密太子之廢皆云豫知一旦事起禍必及矣何不先謀之秀言於趙王倫倫深納焉計既定而秀説倫曰太子為人剛猛若得志之日必肆其情性矣明公素事賈后街談巷議皆以公為賈氏之黨今雖欲建大功於太子太子雖將含忍宿忿必不能加賞於公當謂公逼百姓之望翻覆以免罪耳若有瑕釁猶不免誅不若遷延却期賈后必害太子然後廢賈后為太子報讐猶足以為功乃可以得志倫然之秀因使反間言殿中人欲廢賈后迎太子賈后聞之憂怖乃使太醫令程據合巴豆杏子丸三月矯詔使黃門孫慮齎至許昌以害太子初太子恐見鴆自煮食於前慮以告劉振振乃徙太子於小坊中絶不與食宮中猶於牆壁上過食與太子慮乃逼太子以藥太子不肯服因如廁慮以藥杵椎殺之太子大呼聲聞于外時年二十三將以庶人禮葬之賈后表曰遹不幸喪亡傷其迷悖又早短折悲痛之懷不能自已妾私心冀其刻肌刻骨更思孝道規為稽顙正其名號此志不遂重以酸恨遹雖罪在莫大猶王者子孫便以匹庶送終情實憐愍特乞天恩賜以王禮妾誠暗淺不識禮義不勝至情冒昧陳聞詔以廣陵王禮葬之及賈庶人死乃誅劉振孫慮程據等册復太子曰皇帝使使持節兼司空衛尉伊策故皇太子之靈曰嗚呼維爾少資岐嶷之質荷先帝殊異之寵大啓土宇奄有淮陵朕奉遵遺旨越建爾儲副以光顯我祖宗祗爾德行以從保傅事親孝敬禮無違者而朕昧于凶構致爾于非命之禍俾申生孝己復見于今賴宰相賢明人神憤怨用啓朕心討厥有罪咸伏其辜何補於荼毒冤魂酷痛哉是用忉怛悼恨震動於五內今追復皇太子喪禮反葬京畿祠以太牢魂而有靈尚獲爾心帝為太子服長子斬衰羣臣齊衰使尚書和郁率東宮官屬具吉凶之制迎太子喪於許昌喪之發也大風雷電幃蓋飛裂又為哀策曰皇帝臨軒使洗馬劉務告于皇太子之殯曰咨爾遹幼稟英挺芬馨誕茂既表髫齔高明逸秀昔爾聖祖嘉爾淑美顯詔仍崇名振同軌是用建爾儲副永統皇基如何凶戾潛構禍害如茲哀感和氣痛貫四時嗚呼哀哉爾之降廢實我不明牝亂沈災釁結禍成爾之逝矣誰百其形昔之申生含枉莫訟今爾之負抱冤于東悠悠有識孰不哀慟壺關干主千秋悟己異世同規古今一理皇孫啓建隆祚爾子雖悴前終庶榮後始窀穸既營將寧爾神華髦電逝戎車雷震芒芒羽蓋翼翼縉紳同悲等痛孰不酸辛庶光來葉永世不泯諡曰愍懷六月己卯葬于顯平陵帝感閻纘之言立思子臺故臣江統陸機並作誄頌焉太子三子虨臧尚並與父同幽金墉虨字道文永康元年正月薨四月追封南陽王臧字敬文永康元年四月封臨淮王己巳詔曰咎徵數發姦回作變遹既逼廢非命而沒今立臧為皇太孫還妃王氏以母之稱太孫太妃太子官屬即轉為太孫官屬趙王倫行太孫太傅五月倫與太孫俱之東宮太孫自西掖門出車服侍從皆愍懷之舊也到銅駝街宮人哭侍從者皆哽咽路人抆淚焉桑復生于西廂太孫廢乃枯永寧元年正月趙王倫篡位廢為濮陽王與帝俱遷金墉尋被害太安初追諡曰哀尚字敬仁永康元年四月封為襄陽王永寧元年八月立為皇太孫太安元年三月癸卯薨帝服齊衰期諡曰沖太孫史臣曰愍懷挺岐嶷之姿表夙成之質武皇鍾愛既深詒厥之謀天下歸心頗有后來之望及于繼明宸極守器春坊四教不勤三朝或闕豹姿未變鳳德已衰信惑姦邪疏斥正士好屠酤之賤役耽苑囿之佚遊可謂靡不有初鮮克有終者也既而中宮凶忍久懷危害之心外戚諂諛競進讒邪之説坎牲之謀已搆斃犬之譖遂行一人乏探隱之聰百辟無爭臣之節遂使冤逾楚建酷甚戾園雖復禮備哀榮情深憫慟亦何補於荼毒者哉贊曰愍懷聰穎諒惟天挺皇祖鍾心庶僚引領震宮肇建儲德不恢掇蜂搆隙歸胙生災既罹凶忍徒望歸來
