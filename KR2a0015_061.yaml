body:
  text: 晉書卷六十一列傳第三十一周浚子嵩謨從父弟馥周浚字開林汝南安成人也父裴少府卿浚性果烈以才理見知有人倫鑒識鄉人史曜素微賤衆所未知浚獨引之為友遂以妹妻之曜竟有名於世浚初不應州郡之辟後仕魏為尚書郎纍遷御史中丞拜折衝將軍揚州刺史封射陽侯隨王渾伐吳攻破江西屯戍與孫晧中軍大戰斬僞丞相張悌等首級數千俘馘萬計進軍屯于橫江時聞龍驤將軍王濬既破上方別駕何惲說浚曰張悌率精鋭之卒悉吳國之衆殄滅於此吳之朝野莫不震懾今王龍驤既破武昌兵威甚盛順流而下所向輒克土崩之勢見矣竊謂宜速渡江直指建鄴大軍卒至奪其膽氣可不戰而擒浚善其謀便使白渾惲曰渾暗於事機而欲慎己免咎必不我從浚固使白之渾果曰受詔但令江北抗衡吳軍不使輕進貴州雖武豈能獨平江東今者違命勝不足多若其不勝為罪已重且詔令龍驤受我節度但當具君舟楫一時俱濟耳惲曰龍驤克萬里之寇以既濟之功來受節度未之聞也且握兵之要可則奪之所謂受命不受辭也今渡江必全克獲將有何慮若疑於不濟不可謂智知而不行不可謂忠實鄙州上下所以恨恨也渾執不聽居無何而濬至渾召之不來乃直指三山孫晧遂降於濬渾深恨之而欲與濬爭功惲箋與浚曰書貴克讓易大謙光斯古文所詠道家所崇前破張悌吳人失氣龍驤因之陷其區宇論其前後我實緩師動則為傷事則不及而今方競其功彼既不吞聲將虧雍穆之弘興矜爭之鄙斯愚情之所不取也浚得箋即諫止渾渾不能納遂相表奏浚既濟江與渾共行吳城壘綏撫新附以功進封成武侯食邑六千戶賜絹六千匹明年移鎮秣陵時吳初平屢有逃亡者頻討平之賓禮故老搜求俊乂甚有威德吳人悅服初吳之未平也浚在弋陽南北為互市而諸將多相襲奪以為功吳將蔡敏守于沔中其兄圭為將在秣陵與敏書曰古者兵交使在其間軍國固當舉信義以相高而聞疆埸之上往往有襲奪互市甚不可行弟慎無為小利而忘大備也候者得圭書以呈浚浚曰君子也及渡江求圭得之問其本曰汝南人也浚戲之曰吾固疑吳無君子而卿果吾鄉人遷侍中武帝問浚卿宗後生稱誰為可答曰臣叔父子恢稱重臣宗從父子馥稱清臣宗帝並召用浚轉少府以本官領將作大匠改營宗廟訖增邑五百戶後代王渾為使持節都督揚州諸軍事安東將軍卒于位三子顗嵩謨顗嗣爵別有傳云嵩字仲智狷直果俠每以才氣陵物元帝作相引為參軍及帝為晉王又拜奉朝請嵩上疏曰臣聞取天下者常以無事及其有事不足以取天下故古之王者必應天順時義全而後取讓成而後得是以享世長久重光萬載也今議者以殿下化流江漢澤被六州功濟蒼生欲推崇尊號臣謂今梓宮未反舊京未清義夫泣血士女震動宜深明周公之道先雪社稷大恥盡忠言嘉謀之助以時濟弘仁之功崇謙謙之美推後己之誠然後揖讓以謝天下誰敢不應誰敢不從由是忤旨出為新安太守嵩怏怏不悅臨發與散騎郎張嶷在侍中戴邈坐褒貶朝士又詆毀邈邈密表之帝召嵩入面責之曰卿矜豪傲慢敢輕忽朝廷由吾不德故耳嵩跪謝曰昔唐虞至聖四凶在朝陛下雖聖明御世亦安能無碌碌之臣乎帝怒收付廷尉廷尉華以嵩大不敬棄市論嶷以扇和減罪除名時顗方貴重帝隱忍久之補廬陵太守不之職更拜御史中丞是時帝以王敦勢盛漸疏忌王導等嵩上疏曰臣聞明君思隆其道故賢智之士樂在其朝忠臣將明其節故量時而後仕樂在其朝故無過任之譏將明其節故無過寵之謗是以君臣並隆功格天地近代以來德廢道衰君懷術以御臣臣挾利以事君君臣交利而禍亂相尋故得失之迹難可詳言臣請較而明之夫傅說之相高宗申召之輔宣王管仲之佐齊桓衰范之翼晉文或宗師其道垂拱受成委以權重終致匡主未有憂其逼己還為國蠹者也始田氏擅齊王莽篡漢皆藉封土之強假纍世之寵因暗弱之主資母后之權樹比周之黨階絶滅之勢然後乃能行其私謀以成篡奪之禍耳豈遇立功之主為天人所相而能運其姦計以濟其不軌者哉光武以王族奮於閭閻因時之望收攬英奇遂續漢業以美中興之功及天下既定頗廢黜功臣者何哉武力之士不達國體以立一時之功不可久假以權勢其興廢之事亦可見矣近者三國鼎峙並以雄略之才命世之能皆委賴俊哲終成功業貽之後嗣未有愆失遺方來之恨者也今王導王廙等方之前賢猶有所後至於忠素竭誠義以輔上共隆洪基翼成大業亦昔之亮也雖陛下乘奕世之德有天人之會割據江東奄有南極龍飛海嵎興復舊物此亦羣才之明豈獨陛下之力也今王業雖建羯寇未梟天下蕩蕩不賓者衆公私匱竭倉庾未充梓宮沈淪妃后不反正委賢任能推轂之日也功業垂就晉祚方隆而一旦聽孤臣之言惑疑似之說乃更以危為安以疏易親放逐舊德以佞伍賢遠虧既往之明顧傷伊管之交傾巍巍之望喪如山之功將令賢智杜心義士喪志近招當時之患遠遺來世之笑夫安危在號令存亡在寄任以古推今豈可不寒心而哀歎哉臣兄弟受遇無彼此之嫌而臣干犯時諱觸忤龍鱗者何誠念社稷之憂欲報之於陛下也古之明王思聞其過悟逆旅之言以明成敗之由故採納愚言以考虛實上為宗廟無窮之計下收億兆元元之命臣不勝憂憤竭愚以聞疏奏帝感悟故導等獲全王敦既害顗而使人弔嵩嵩曰亡兄天下人為天下人所殺復何所弔敦甚銜之懼失人情故未加害用為從事中郎嵩王應嫂父也以顗橫遇禍意憤憤嘗衆中云應不宜統兵敦密使妖人李脫誣嵩及周莚潛相署置遂害之嵩精於事佛臨刑猶於市誦經云謨以顗故頻居顯職王敦死後詔贈戴若思譙王承等而未及顗時謨為後軍將軍上疏曰臣亡兄顗昔蒙先帝顧眄之施特垂表啓以參戎佐顯居上列遂管朝政並與羣后共隆中興仍典選曹重蒙寵授忝位師傅得與陛下揖讓抗禮恩結特隆加以鄙族結婚帝室義深任重庶竭股肱以報所受凶逆所忌惡直醜正身陷極禍忠不忘君守死善道有隕無二顗之云亡誰不痛心況臣同生能不哀結王敦無君由來實久元惡之甚古今無二幸賴陛下聖聰神武故能摧破凶強撥亂反正以寧區宇前軍事之際聖恩不遺取顗息閔得充近侍臣時面啓欲令閔還襲臣亡父侯爵時卞壼庾亮並侍御坐壼云事了當論顯贈時未淹久言猶在耳至於譙王承甘卓已蒙清復王澄久遠猶在論議況顗忠以衛主身死王事雖嵇紹之不違難何以過之至今不聞復封加贈褒顯之言不知顗有餘責獨負殊恩為朝廷急於時務不暇論及此臣所以痛心疾首重用哀歎者也不勝辛酸冒陳愚款疏奏不報謨復重表然後追贈顗官謨歷少府丹楊尹侍中中護軍封西平侯卒贈金紫光祿大夫諡曰貞馥字祖宣浚從父弟也父蕤安平太守馥少與友人成公簡齊名俱起家為諸王文學纍遷司徒左西屬司徒王渾表馥理識清正兼有才幹主定九品檢括精詳臣委任責成褒貶允當請補尚書郎許之稍遷司徒左長史吏部郎選舉精密論望益美轉御史中丞侍中拜徐州刺史加冠軍將軍假節徵為廷尉惠帝幸鄴成都王穎以馥守河南尹陳眕上官巳等奉清河王覃為太子加馥衛將軍録尚書馥辭不受覃令馥與上官巳合軍馥以巳小人縱暴終為國賊乃共司隸滿奮等謀共除之謀泄為巳所襲奮被害馥走得免及巳為張方所敗召馥還攝河南尹暨東海王越迎大駕以馥為中領軍未就遷司隸校尉加散騎常侍假節都督諸軍事於澠池帝還宮出為平東將軍都督揚州諸軍事代劉準為鎮東將軍與周玘等討陳敏滅之以功封永寧伯馥自經世故每欲維正朝廷忠情懇至以東海王越不盡臣節每言論厲然越深憚之馥覩羣賊孔熾洛陽孤危乃建策迎天子遷都壽春永嘉四年與長史吳思司馬殷識上書曰不圖厄運遂至於此戎狄交侵畿甸危逼臣輒與祖納裴憲華談孫惠等三十人伏思大計僉以殷人有屢遷之事周王有岐山之徙方今王都罄乏不可久居河朔蕭條崤函險澀宛都屢敗江漢多虞於今平夷東南為愈淮揚之地北阻塗山南抗靈嶽名川四帶有重險之固是以楚人東遷遂宅壽春徐邳東海亦足戍禦且運漕四通無患空乏雖聖上神聰元輔賢明居儉守約用保宗廟未若相土遷宅以享永祚臣謹選精卒三萬奉迎皇駕輒檄前北中郎將裴憲行使持節監豫州諸軍事東中郎將風馳即路荊湘江揚各先運四年米租十五萬斛布絹各十四萬匹以供大駕令王浚苟晞共平河朔臣等勠力以啓南路遷都弭寇其計並得皇輿來巡臣宜轉據江州以恢王略知無不為古人所務敢竭忠誠庶報萬分朝遂夕隕猶生之願越與苟晞不協馥不先白於越而直上書越大怒先是越召馥及淮南太守裴碩馥不肯行而令碩率兵先進碩二於馥乃舉兵稱馥擅命已奉越密旨圖馥遂襲之為馥所敗碩退保東城求救於元帝帝遣揚威將軍甘卓建威將軍郭逸攻馥于壽春安豐太守孫惠帥衆應之使謝摛為檄摛馥之故將也馥見檄流涕曰必謝摛之辭摛聞之遂毀草旬日而馥衆潰奔于項為新蔡王確所拘憂憤發病卒初華談之失廬江也往壽春依馥及馥軍敗歸于元帝帝問曰周祖宣何至於反談對曰周馥雖死天下尚有直言之士馥見寇賊滋蔓王威不振故欲移都以紓國難方伯不同遂致其伐曾不踰時而京都淪沒若使從馥之謀或可後亡也原情求實何得為反帝曰馥位為征鎮握兵方隅召而不入危而不持亦天下之罪人也談曰然馥振纓中朝素有俊彥之稱出據方嶽實有偏任之重而高略不舉往往失和危而不持當與天下共受其責然謂之反不亦誣乎帝意始解馥有二子密矯密字泰玄性虛簡時人稱為清士位至尚書郎矯字正玄亦有才幹成公簡成公簡字宗舒東郡人也家世二千石性朴素不求榮利潛心味道罔有干其志者默識過人張茂先每言簡清靜比楊子雲默識擬張安世後為中書郎時馥已為司隸校尉遷鎮東將軍簡自以才高而在馥之下謂馥曰楊雄為郎三世不徙而王莽董賢位列三司古今一揆耳馥甚慚之官至太子中庶子散騎常侍永嘉末奔苟晞與晞同沒苟晞苟晞字道將河內山陽人也少為司隸部從事校尉石鑒深器之東海王越為侍中引為通事令史纍遷陽平太守齊王冏輔政晞參冏軍事拜尚書右丞轉左丞廉察諸曹八坐以下皆側目憚之及冏誅晞亦坐免長沙王乂為驃騎將軍以晞為從事中郎惠帝征成都王穎以為北軍中候及帝還洛陽晞奔范陽王虓虓承制用晞行兗州刺史汲桑之破鄴也東海王越出次官渡以討之命晞為前鋒桑素憚之於城外為柵以自守晞將至頓軍休士先遣單騎示以禍福桑衆大震棄柵宵遁嬰城固守晞陷其九壘遂定鄴而還西討呂朗等滅之後高密王泰討青州賊劉根破汲桑故將公師藩敗石勒於河北威名甚盛時人擬之韓白進位撫軍將軍假節都督青兗諸軍事封東平郡侯邑萬戶晞練於官事文簿盈積斷決如流人不敢欺其從母依之奉養甚厚從母子求為將晞距之曰吾不以王法貸人將無後悔邪固欲之晞乃以為督護後犯法晞杖節斬之從母叩頭請救不聽既而素服哭之流涕曰殺卿者兗州刺史哭弟者苟道將其杖法如此晞見朝政日亂懼禍及己而多所交結每得珍物即貽都下親貴兗州去洛五百里恐不鮮美募得千里牛每遣信旦發暮還初東海王越以晞復其讎恥甚德之引升堂結為兄弟越司馬潘滔等說曰兗州要衝魏武以之輔相漢室苟晞有大志非純臣久令處之則患生心腹矣若遷于青州厚其名號晞必悅公自牧兗州經緯諸夏藩衛本朝此所謂謀之於未有為之於未亂也越以為然乃遷晞征東大將軍開府儀同三司加侍中假節都督青州諸軍事領青州刺史進為郡公晞乃多置參佐轉易守令以嚴刻立功日加斬戮流血成川人不堪命號曰屠伯頓丘太守魏植為流人所逼衆五六萬大掠兗州晞出屯無鹽以弟純領青州刑殺更甚於晞百姓號小苟酷於大苟晞尋破植時潘滔及尚書劉望等共誣陷晞晞怒表求滔等首又請越從事中郎劉洽為軍司越皆不許晞於是昌言曰司馬元超為宰相不平使天下淆亂苟道將豈可以不義使之韓信不忍衣食之惠死於婦人之手今將誅國賊尊王室桓文豈遠哉乃移告諸州稱己功伐陳越罪狀時懷帝惡越專權乃詔晞曰朕以不德戎車屢興上懼宗廟之纍下愍兆庶之困當賴方嶽為國藩翰公威震赫然梟斬藩桑走降喬朗魏植之徒復以誅除豈非高識明斷朕用委成加王彌石勒為社稷之憂故有詔委統六州而公謙分小節稽違大命非所謂與國同憂也今復遣詔便施檄六州協同大舉翦除國難稱朕意焉晞復移諸征鎮州郡曰天步艱險禍難殷流劉元海造逆於汾陰石世龍階亂於三魏荐食畿甸覆喪鄴都結壘近郊仍震兗豫害三刺史殺二都督郡守官長堙沒數十百姓流離肝腦塗地晞以虛薄負荷國重是以弭節海隅援枹曹衛猥被中詔委以關東督統諸軍欽承詔命剋今月二日當西經濟黎陽即日得滎陽太守丁嶷白事李惲陳午等救懷諸軍與羯大戰皆見破散懷城已陷河內太守裴整為賊所執宿衛闕乏天子蒙難宗廟之危甚於纍卵承問之日憂歎纍息晞以為先王選建明德庸以服章所以藩固王室無俾城壞是以舟楫不固齊桓責楚襄王逼狄晉文致討夫翼奬皇家宣力本朝雖陷湯火大義所甘加諸方牧俱受榮寵義同畢力以報國恩晞雖不武首啓戎行秣馬裹糧以俟方鎮凡我同盟宜同赴救顯立名節在此行矣會王彌遣曹嶷破琅邪北攻齊地苟純城守嶷衆轉盛連營數十里晞還登城望之有懼色與賊連戰輒破之後簡精鋭與賊大戰會大風揚塵晞遂敗績棄城夜走嶷追至東山部衆皆降嶷晞單騎奔高平收邸閣募得數千人帝又密詔晞討越晞復上表曰殿中校尉李初至奉被手詔肝心若裂東海王越得以宗臣遂執朝政委任邪佞寵樹姦黨至使前長史潘滔從事中郎畢邈主簿郭象等操弄天權刑賞由己尚書何綏中書令繆播太僕繆胤黃門侍郎應紹皆是聖詔親所抽拔而滔等妄構陷以重戮帶甲臨宮誅討后弟翦除宿衛私樹國人崇奬魏植招誘逋亡覆喪州郡王塗圮隔方貢乖絶宗廟闕蒸嘗之饗聖上有約食之匱鎮東將軍周馥豫州刺史馮嵩前北中郎將裴憲並以天朝空曠權臣專制事難之興慮在旦夕各率士馬奉迎皇輿思隆王室以盡臣禮而滔邈等劫越出關矯立行臺逼徙公卿擅為詔令縱兵寇抄茹食居人交尸塞路暴骨盈野遂令方鎮失職城邑蕭條淮豫之萌陷離塗炭臣雖憤悶守局東嵎自奉明詔三軍奮厲卷甲長驅次于倉垣即日承司空博陵公浚書稱殿中中郎劉權齎詔敕浚與臣共克大舉輒遣前鋒征虜將軍王讚徑至項城使越稽首歸政斬送滔等伏願陛下寬宥宗臣聽越還國其餘逼迫宜蒙曠蕩輒寫詔宣示征鎮顯明義舉遣揚烈將軍閻弘步騎五千鎮衛宗廟五年帝復詔晞曰太傅信用姦佞阻兵專權內不遵奉皇憲外不協比方州遂令戎狄充斥所在犯暴留軍何倫抄掠宮寺劫剝公主殺害賢士悖亂天下不可忍聞雖惟親親宜明九伐詔至之日其宣告天下率齊大舉桓文之績一以委公其思盡諸宜善建弘略道澀故練寫副手筆示意晞表曰奉被手詔委臣征討喻以桓文紙練兼備伏讀跪歎五情惶怛自頃宰臣專制委杖佞邪內擅朝威外殘兆庶矯詔專征遂圖不軌縱兵寇掠陵踐宮寺前司隸校尉劉暾御史中丞溫畿右將軍杜育並見攻劫廣平武安公主先帝遺體咸被逼辱逆節虐亂莫此之甚輒祗奉前詔部分諸軍遣王讚率陳午等將兵詣項龔行天罰初越疑晞與帝有謀使遊騎於成臯間獲晞使果得詔令及朝廷書遂大構疑隙越出牧豫州以討晞復下檄說晞罪惡遣從事中郎楊瑁為兗州與徐州刺史裴盾共討晞晞使騎收河南尹潘滔滔夜遁及執尚書劉曾侍中程延斬之會越薨盾敗詔晞為大將軍大都督督青徐兗豫荊揚六州諸軍事增邑二萬戶加黃鉞先官如故晞以京邑荒饉日甚寇難交至表請遷都遣從事中郎劉會領船數十艘宿衛五百人獻穀千斛以迎帝朝臣多有異同俄而京師陷晞與王讚屯倉垣豫章王端及和郁等東奔晞晞率羣官尊端為皇太子置行臺端承制以晞領太子太傅都督中外諸軍録尚書自倉垣徙屯蒙城讚屯陽夏晞出於孤微位至上將志頗盈滿奴婢將千人侍妾數十終日纍夜不出戶庭刑政苛虐縱情肆欲遼西閻亨以書固諫晞怒殺之晞從事中郎明預有疾居家聞之乃輿病諫晞曰皇晉遭百六之數當危難之機明公親稟廟算將為國家除暴閻亨美士奈何無罪一旦殺之晞怒曰我自殺閻亨何關人事而輿病來罵我左右為之戰栗預曰以明公以禮見進預欲以禮自盡今明公怒預其若遠近怒明公何昔堯舜之在上也以和理而興桀紂之在上也以惡逆而滅天子且猶如此況人臣乎願明公且置其怒而思預之言晞有慚色由是衆心稍離莫為致用加以疾疫饑饉其將溫畿傅宣皆叛之石勒攻陽夏滅王讚馳襲蒙城執晞署為司馬月餘乃殺之晞無子弟純亦遇害華軼華軼字彥夏平原人魏太尉歆之曾孫也祖表太中大夫父淡河南尹軼少有才氣聞於當世泛愛博納衆論美之初為博士纍遷散騎常侍東海王越牧兗州引為留府長史永嘉中歷振威將軍江州刺史雖逢喪亂每崇典禮置儒林祭酒以弘道訓乃下教曰今大義穨替禮典無宗朝廷滯議莫能攸正常以慨然宜特立此官以弘其事軍咨祭酒杜夷棲情玄遠確然絶俗才學精博道行優備其以為儒林祭酒俄被越檄使助討諸賊軼遣前江夏太守陶侃為揚武將軍率兵三千屯夏口以為聲援軼在州甚有威惠州之豪士接以友道得江表之歡心流亡之士赴之如歸時天子孤危四方瓦解軼有匡天下之志每遣貢獻入洛不失臣節謂使者曰若洛都道斷可輸之琅邪王以明吾之為司馬氏也軼自以受洛京所遣而為壽春所督時洛京尚存不能祗承元帝教命郡縣多諫之軼不納曰吾欲見詔書耳時帝遣揚烈將軍周訪率衆屯彭澤以備軼訪過姑孰著作郎干寶見而問之訪曰大府受分令屯彭澤彭澤江州西門也華彥夏有憂天下之誠而不欲碌碌受人控御頃來紛紜粗有嫌隙今又無故以兵守其門將成其釁吾當屯尋陽故縣既在江西可以扞禦北方又無嫌於相逼也尋洛都不守司空荀藩移檄而以帝為盟主既而帝承制改易長吏軼又不從命於是遣左將軍王敦都督甘卓周訪宋典趙誘等討之軼遣別駕陳雄屯彭澤以距敦自為舟軍以為外援武昌太守馮逸次于湓口訪擊逸破之前江州刺史衛展不為軼所禮心常怏怏至是與豫章太守周廣為內應潛軍襲軼軼衆潰奔于安城追斬之及其五子傳首建鄴初廣陵高悝寓居江州軼辟為西曹掾尋而軼敗悝藏匿軼二子及妻崎嶇經年既而遇赦悝攜之出首帝嘉而宥之劉喬孫耽耽子柳劉喬字仲彥南陽人也其先漢宗室封安衆侯傳襲歷三代祖廙魏侍中父阜陳留相喬少為祕書郎建威將軍王戎引為參軍伐吳之役戎使喬與參軍羅尚濟江破武昌還授滎陽令遷太子洗馬以誅楊駿功賜爵關中侯拜尚書右丞豫誅賈謐封安衆男纍遷散騎常侍齊王冏為大司馬初嵇紹為冏所重每下階迎之喬言於冏曰裴張之誅朝臣畏憚孫秀故不敢不受財物嵇紹今何所逼忌故畜裴家車牛張家奴婢邪樂彥輔來公未嘗下牀何獨加敬於紹冏乃止紹謂喬曰大司馬何故不復迎客喬曰似有正人言以卿不足迎者紹曰正人為誰喬曰其則不遠紹默然頃之遷御史中丞冏腹心董艾勢傾朝廷百僚莫敢忤旨喬二旬之中奏劾艾罪釁者六艾諷尚書右丞苟晞免喬官復為屯騎校尉張昌之亂喬出為威遠將軍豫州刺史與荊州刺史劉弘共討昌進左將軍惠帝西幸長安喬與諸州郡舉兵迎大駕東海王越承制轉喬安北將軍冀州刺史以范陽王虓領豫州刺史喬以虓非天子命不受代發兵距之潁川太守劉輿昵於虓喬上尚書列輿罪惡河間王顒得喬所上乃宣詔使鎮南將軍劉弘征東大將軍劉準平南將軍彭城王釋與喬并力攻虓於許昌輿弟琨率衆救虓未至而虓敗虓乃與琨俱奔河北未幾琨率突騎五千濟河攻喬喬劫琨父蕃以檻車載之據考城以距虓衆不敵而潰喬復收散卒屯于平氏河間王顒進喬鎮東將軍假節以其長子祐為東郡太守又遣劉弘劉準彭城王釋等率兵援喬弘與喬箋曰適承范陽欲代明使君明使君受命本朝列居方伯當官而行同奬王室橫見遷代誠為不允然古人有言牽牛以蹊人之田信有罪矣而奪之牛罰亦重矣明使君不忍亮直狷介之忿甘為戎首竊以為過何者至人之道用行舍藏跨下之辱猶宜俯就況於換代之嫌纖介之釁哉范陽國屬使君庶姓周之宗盟疏不間親曲直既均責有所在廉藺區區戰國之將猶能升降以利社稷況命世之士哉今天下紛紜主上播越正是忠臣義士同心勠力之時弘實暗劣過蒙國恩願與使君共戴盟主雁行下風掃除凶寇救蒼生之倒懸反北辰於太極此功未立不宜乖離備蒙顧遇情隆於常披露丹誠不敢不盡春秋之時諸侯相伐復為和親者多矣願明使君回既往之恨追不二之蹤解連環之結修如初之好范陽亦將悔前之失思崇後信矣東海王越將討喬弘又與越書曰適聞以吾州將擅舉兵逐范陽當討之誠明同異懲禍亂之宜然吾竊謂不可何者今北辰遷居元首移幸羣后抗義以謀王室吾州將荷國重恩列位方伯亦伐鼓即戎勠力致命之秋也而范陽代之吾州將不從由代之不允但矯枉過正更以為罪耳昔齊桓赦射鉤之讎而相管仲晉文忘斬袪之怨而親勃鞮方之於今當何有哉且君子躬自厚而薄責於人今姦臣弄權朝廷困逼此四海之所危懼宜釋私嫌共存公義含垢匿瑕忍所難忍以大逆為先奉迎為急不可思小怨忘大德也苟崇忠恕共明分局連旗推鋒各致臣節吾州將必輸寫肝膽以報所蒙實不足計一朝之謬發赫然之怒使韓盧東郭相困而為豺狼之擒也吾雖庶姓負乘過分實願足下率齊內外以康王室竊恥同儕自為蠹害貪獻所懷惟足下圖之又上表曰范陽王虓欲代豫州刺史喬喬舉兵逐虓司空東海王越以喬不從命討之臣以為喬忝受殊恩顯居州司自欲立功於時以徇國難無他罪闕而范陽代之代之為非然喬亦不得以虓之非專威輒討誠應顯戮以懲不恪然自頃兵戈紛亂猜禍鋒生恐疑隙構於羣王災難延于宗子權柄隆於朝廷逆順效於成敗今夕為忠明旦為逆翩其反而互為戎首載籍以來骨肉之禍未有如今者也臣竊悲之痛心疾首今邊陲無備豫之儲中華有杼軸之困而股肱之臣不惟國體職競尋常自相楚剝為害轉深積毀銷骨萬一四夷乘虛為變此亦猛獸交鬬自效於卞莊者矣臣以為宜速發明詔詔越等令兩釋猜嫌各保分局自今以後其有不被詔書擅興兵馬者天下共伐之詩云誰能執熱逝不以濯若誠濯之必無灼爛之患永有泰山之固矣時河間王顒方距關東倚喬為助不納其言東海王越移檄天下帥甲士三萬將入關迎大駕軍次于蕭喬懼遣子祐距越於蕭縣之靈壁劉琨分兵向許昌許昌人納之琨自滎陽率兵迎越遇祐衆潰見殺喬衆遂散與五百騎奔平氏帝還洛陽大赦越復表喬為太傅軍咨祭酒越薨復以喬為都督豫州諸軍事鎮東將軍豫州刺史卒於官時年六十三愍帝末追贈司空子挺潁川太守挺子耽耽字敬道少有行檢以義尚流稱為宗族所推博學明習詩禮三史歷度支尚書加散騎常侍在職公平廉慎所蒞著績桓玄耽女壻也及玄輔政以耽為尚書令加侍中不拜改授特進金紫光祿大夫尋卒追贈左光祿大夫開府耽子柳柳字叔惠亦有名譽少登清官歷尚書左右僕射時右丞傅迪好廣讀書而不解其義柳唯讀老子而已迪每輕之柳云卿讀書雖多而無所解可謂書簏矣時人重其言出為徐兗江三州刺史卒贈右光祿大夫開府儀同三司喬弟乂始安太守乂子成丹楊尹史臣曰周浚人倫鑒悟周馥理識精詳華軼動顧禮經劉喬志存諒直用能歷官內外咸著勳庸而祖宣獻策遷都乖忤於東海彥夏係心宸極獲罪於琅邪乃被以惡名加其顯戮豈不哀哉向若違左袵於伊川建右社於淮服據方城之險藉全楚之資簡練吳越之兵漕引淮海之粟縱未能祈天永命猶足以紓難緩亡嗟乎不用其良覆俾我悖其此之謂也苟晞擢自庸微位居上將釋位之功未立貪暴之釁已彰假手世龍以至屠戮斯所謂殺人多矣能無及此乎贊曰開林才理爰登貴仕績著折衝化行江汜軼既尊主馥亦勤王背時獲戾違天不祥喬為戎首未識行藏道將鞠旅威名克舉貪虐有聞忠勤未取
