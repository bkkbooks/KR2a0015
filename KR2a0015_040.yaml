body:
  text: 晉書卷四十列傳第十賈充孫謐充弟混族子模郭彰賈充字公閭平陽襄陵人也父逵魏豫州刺史陽里亭侯逵晚始生充言後當有充閭之慶故以為名字焉充少孤居喪以孝聞襲父爵為侯拜尚書郎典定科令兼度支考課辨章節度事皆施用纍遷黃門侍郎汲郡典農中郎將參大將軍軍事從景帝討毋丘儉文欽於樂嘉帝疾篤還許昌留充監諸軍事以勞增邑三百五十戶後為文帝大將軍司馬轉右長史帝新執朝權恐方鎮有異議使充詣諸葛誕圖欲伐吳陰察其變充既論説時事因謂誕曰天下皆願禪代君以為如何誕厲聲曰卿非賈豫州子乎世受魏恩豈可欲以社稷輸人乎若洛中有難吾當死之充默然及還白帝曰誕再在揚州威名夙著能得人死力觀其規略為反必也今徵之反速而事小不徵事遲而禍大帝乃徵誕為司空而誕果叛復從征誕充進計曰楚兵輕而鋭若深溝高壘以逼賊城可不戰而克也帝從之城陷帝登壘以勞充帝先歸洛陽使充統後事進爵宣陽鄉侯增邑千戶遷廷尉充雅長法理有平反之稱轉中護軍高貴鄉公之攻相府也充率衆距戰於南闕軍將敗騎督成倅弟太子舍人濟謂充曰今日之事如何充曰公等養汝正擬今日復何疑濟於是抽戈犯蹕及常道鄉公即位進封安陽鄉侯增邑千二百戶統城外諸軍加散騎常侍鍾會謀反於蜀帝假充節以本官都督關中隴右諸軍事西據漢中未至而會死時軍國多事朝廷機密皆與籌之帝甚信重充與裴秀王沈羊祜荀勗同受腹心之任帝又命充定法律假金章賜甲第一區五等初建封臨沂侯為晉元勳深見寵異祿賜常優於羣官充有刀筆才能觀察上旨初文帝以景帝恢贊王業方傳位於舞陽侯攸充稱武帝寬仁且又居長有人君之德宜奉社稷及文帝寢疾武帝請問後事文帝曰知汝者賈公閭也帝襲王位拜充晉國衛將軍儀同三司給事中改封臨潁侯及受禪充以建明大命轉車騎將軍散騎常侍尚書僕射更封魯郡公母柳氏為魯國太夫人充所定新律既班于天下百姓便之詔曰漢氏以來法令嚴峻故自元成之世及建安嘉平之間咸欲辨章舊典刪革刑書述作體大歷年無成先帝愍元元之命陷於密網親發德音釐正名實車騎將軍賈充奬明聖意咨詢善道太傅鄭沖又與司空荀顗中書監荀勗中軍將軍羊祜中護軍王業及廷尉杜友守河南尹杜預散騎侍郎裴楷潁川太守周雄齊相郭頎騎都尉成公綏荀輝尚書郎柳軌等典正其事朕每鑒其用心常慨然嘉之今法律既成始班天下刑寬禁簡足以克當先旨昔蕭何以定律受封叔孫通以制儀為奉常賜金五百斤弟子皆為郎夫立功立事古之所重自太傅車騎以下皆加祿賞其詳依故典於是賜充子弟一人關內侯絹五百匹固讓不許後代裴秀為尚書令常侍車騎將軍如故尋改常侍為侍中賜絹七百匹以母憂去職詔遣黃門侍郎慰問又以東南有事遣典軍將軍楊囂宣諭使六旬還內充為政務農節用并官省職帝善之又以文武異容求罷所領兵及羊祜等出鎮充復上表欲立勳邊境帝並不許從容任職褒貶在己頗好進士每有所薦達必終始經緯之是以士多歸焉帝舅王恂嘗毀充而充更進恂或有背充以要權貴者充皆陽以素意待之而充無公方之操不能正身率下專以諂媚取容侍中任愷中書令庾純等剛直守正咸共疾之又以充女為齊王妃懼後益盛及氐羌反叛時帝深以為慮愷因進説請充鎮關中乃下詔曰秦涼二境比年屢敗胡虜縱暴百姓荼毒遂使異類扇動害及中州雖復吳蜀之寇未嘗至此誠由所任不足以內撫夷夏外鎮醜逆輕用其衆而不能盡其力非得腹心之重推轂委成大匡其弊恐為患未已每慮斯難忘寢與食侍中守尚書令車騎將軍賈充雅量弘高達見明遠武有折衝之威文懷經國之慮信結人心名震域外使權統方任綏靜西夏則吾無西顧之念而遠近獲安矣其以充為使持節都督秦涼二州諸軍事侍中車騎將軍如故假羽葆鼓吹給第一駙馬朝之賢良欲進忠規獻替者皆幸充此舉望隆惟新之化充既外出自以為失職深銜任愷計無所從將之鎮百僚餞于夕陽亭荀勗私焉充以憂告勗曰公國之宰輔而為一夫所制不亦鄙乎然是行也辭之實難獨有結婚太子不頓駕而自留矣充曰然孰可寄懷對曰勗請言之俄而侍宴論太子婚姻事勗因言充女才質令淑宜配儲宮而楊皇后及荀顗亦並稱之帝納其言會京師大雪平地二尺軍不得發既而皇儲當婚遂不西行詔充居本職先是羊祜密啓留充及是帝以語充充謝祜曰始知君長者時吳將孫秀降拜為驃騎大將軍帝以充舊臣欲改班使車騎居驃騎之右充固讓見聽尋遷司空侍中尚書令領兵如故會帝寢疾充及齊王攸荀勗參醫藥及疾愈賜絹各五百匹初帝疾篤朝廷屬意於攸河南尹夏侯和謂充曰卿二女壻親疏等耳立人當立德充不答及是帝聞之徙和光祿勳乃奪充兵權而位遇無替尋轉太尉行太子太保録尚書事咸寧三年日蝕於三朝充請遜位不許更以沛國之公丘益其封寵幸愈甚朝臣咸側目焉河南尹王恂上言弘訓太后入廟合食於景皇帝齊王攸不得行其子禮充議以為禮諸侯不得祖天子公子不得禰先君皆謂奉統承祀非謂不得復其父祖也攸身宜服三年喪事自如臣制有司奏若如充議服子服行臣制未有前比宜如恂表攸喪服從諸侯之例帝從充議伐吳之役詔充為使持節假黃鉞大都督總統六師給羽葆鼓吹緹幢兵萬人騎二千置左右長史司馬從事中郎增參軍騎司馬各十人帳下司馬二十人大車官騎各三十人充慮大功不捷表陳西有昆夷之患北有幽并之戍天下勞擾年穀不登興軍致討懼非其時又臣老邁非所克堪詔曰君不行吾便自出充不得已乃受節鉞將中軍為諸軍節度以冠軍將軍楊濟為副南屯襄陽吳江陵諸守皆降充乃徙屯項王濬之克武昌也充遣使表曰吳未可悉定方夏江淮下溼疾疫必起宜召諸軍以為後圖雖腰斬張華不足以謝天下華豫平吳之策故充以為言中書監荀勗奏宜如充表帝不從杜預聞充有奏馳表固爭言平在旦夕使及至轘轅而孫晧已降吳平軍罷帝遣侍中程咸犒勞賜充帛八千匹增邑八千戶分封從孫暢新城亭侯蓋安陽亭侯弟陽里亭侯混從孫關內侯衆增戶邑充本無南伐之謀固諫不見用及師出而吳平大慚懼議欲請罪帝聞充當詣闕豫幸東堂以待之罷節鉞僚佐仍假鼓吹麾幢充與羣臣上告成之禮請有司具其事帝謙讓不許及疾篤上印綬遜位帝遣侍臣諭旨問疾殿中太醫致湯藥賜牀帳錢帛自皇太子宗室躬省起居太康三年四月薨時年六十六帝為之慟使使持節太常奉策追贈太宰加袞冕之服緑綟綬御劍賜東園祕器朝服一具衣一襲大鴻臚護喪事假節鉞前後部羽葆鼓吹緹麾大路鑾路轀輬車帳下司馬大車椎斧文衣武賁輕車介士葬禮依霍光及安平獻王故事給塋田一頃與石苞等為王功配饗廟庭諡曰武追贈充子黎民為魯殤公充婦廣城君郭槐性妬忌初黎民年三歲乳母抱之當閣黎民見充入喜笑充就而拊之槐望見謂充私乳母即鞭殺之黎民戀念發病而死後又生男過期復為乳母所抱充以手摩其頭郭疑乳母又殺之兒亦思慕而死充遂無胤嗣及薨槐輒以外孫韓謐為黎民子奉充後郎中令韓咸中尉曹軫諫槐曰禮大宗無後以小宗支子後之無異姓為後之文無令先公懷腆后土良史書過豈不痛心槐不從咸等上書求改立嗣事寢不報槐遂表陳是充遺意帝乃詔曰太宰魯公充崇德立勳勤勞佐命背世殂隕每用悼心又胤子早終世嗣未立古者列國無嗣取始封支庶以紹其統而近代更除其國至於周之公旦漢之蕭何或豫建元子或封爵元妃蓋尊顯勳庸不同常例太宰素取外孫韓謐為世子黎民後吾退而斷之外孫骨肉至近推恩計情合於人心其以謐為魯公世孫以嗣其國自非功如太宰始封無後如太宰所取必以己自出不如太宰皆不得以為比及下禮官議充諡博士秦秀議諡曰荒帝不納博士段暢希旨建議諡曰武帝乃從之自充薨至葬賻賜二千萬惠帝即位賈后擅權加充廟備六佾之樂母郭為宜城君及郭氏亡諡曰宣特加殊禮時人譏之而莫敢言者初充前妻李氏淑美有才行生二女褒裕褒一名荃裕一名濬父豐誅李氏坐流徙後娶城陽太守郭配女即廣城君也武帝踐阼李以大赦得還帝特詔充置左右夫人充母亦敕充迎李氏郭槐怒攘袂數充曰刊定律令為佐命之功我有其分李那得與我並充乃答詔託以謙沖不敢當兩夫人盛禮實畏槐也而荃為齊王攸妃欲令充遣郭而還其母時沛國劉含母及帝舅羽林監王虔前妻皆毋丘儉孫女此例既多質之禮官俱不能決雖不遣後妻多異居私通充自以宰相為海內準則乃為李築室於永年里而不往來荃濬每號泣請充充竟不往會充當鎮關右公卿供帳祖道荃濬懼充遂去乃排幔出於坐中叩頭流血向充及羣僚陳母應還之意衆以荃王妃皆驚起而散充甚愧愕遣黃門將宮人扶去既而郭槐女為皇太子妃帝乃下詔斷如李比皆不得還後荃恚憤而薨初槐欲省李氏充曰彼有才氣卿往不如不往及女為妃槐乃盛威儀而去既入戶李氏出迎槐不覺腳屈因遂再拜自是充每出行槐輒使人尋之恐其過李也初充母柳見古今重節義竟不知充與成濟事以濟不忠數追罵之侍者聞之無不竊笑及將亡充問所欲言柳曰我教汝迎李新婦尚不肯安問他事遂無言及充薨後李氏二女乃欲令其母祔葬賈后弗之許也及后廢李氏乃得合葬李氏作女訓行於世謐字長深母賈午充少女也父韓壽字德真南陽堵陽人魏司徒暨曾孫美姿貌善容止賈充辟為司空掾充每宴賓僚其女輒於青璅中窺之見壽而悅焉問其左右識此人不有一婢説壽姓字云是故主人女大感想發於寤寐婢後往壽家具説女意并言其女光麗艷逸端美絶倫壽聞而心動便令為通殷勤婢以白女女遂潛修音好厚相贈結呼壽夕入壽徑捷過人踰垣而至家中莫知惟充覺其女悅暢異於常日時西域有貢奇香一著人則經月不歇帝甚貴之惟以賜充及大司馬陳騫其女密盜以遺壽充僚屬與壽燕處聞其芬馥稱之於充自是充意知女與壽通而其門閣嚴峻不知所由得入乃夜中陽驚託言有盜因使循牆以觀其變左右白曰無餘異惟東北角如狐狸行處充乃考問女之左右具以狀對充祕之遂以女妻壽壽官至散騎常侍河南尹元康初卒贈驃騎將軍謐好學有才思既為充嗣繼佐命之後又賈后專恣謐權過人主至乃宀元攴繫黃門侍郎其為威福如此負其驕寵奢侈踰度室宇崇僭器服珍麗歌僮舞女選極一時開閣延賓海內輻湊貴遊豪戚及浮競之徒莫不盡禮事之或著文章稱美謐以方賈誼渤海石崇歐陽建滎陽潘嶽吳國陸機陸雲蘭陵繆徵京兆杜斌摯虞琅邪諸葛詮弘農王粹襄城杜育南陽鄒捷齊國左思清河崔基沛國劉瓌汝南和郁周恢安平牽秀潁川陳眕太原郭彰高陽許猛彭城劉訥中山劉輿劉琨皆傅會於謐號曰二十四友其餘不得預焉歷位散騎常侍後軍將軍廣城君薨去職喪未終起為祕書監掌國史先是朝廷議立晉書限斷中書監荀勗謂宜以魏正始起年著作郎王瓚欲引嘉平已下朝臣盡入晉史于時依違未有所決惠帝立更使議之謐上議請從泰始為斷於是事下三府司徒王戎司空張華領軍將軍王衍侍中樂廣黃門侍郎嵇紹國子博士謝衡皆從謐議騎都尉濟北侯荀畯侍中荀藩黃門侍郎華混以為宜用正始開元博士荀熙刁協謂宜嘉平起年謐重執奏戎華之議事遂施行尋轉侍中領祕書監如故謐時從帝幸宣武觀校獵諷尚書於會中召謐受拜誡左右勿使人知於是衆疑其有異志矣謐既親貴數入二宮共愍懷太子遊處無屈降心常與太子奕爭道成都王穎在坐正色曰皇太子國之儲君賈謐何得無禮謐懼言之於后遂出穎為平北將軍鎮鄴及為常侍侍講東宮太子意有不悅謐患之而其家數有妖異飄風吹其朝服飛上數百丈墜於中丞臺又蛇出其被中夜暴雷震其室柱陷入地壓毀牀帳謐益恐及遷侍中專掌禁內遂與后成謀誣陷太子及趙王倫廢后以詔召謐於殿前將戮之走入西鍾下呼曰阿后救我乃就斬之韓壽少弟蔚有器望及壽兄鞏令保弟散騎侍郎預吳王友鑒謐母賈午皆伏誅初充伐吳時嘗屯項城軍中忽失充所在充帳下都督周勤時晝寢夢見百餘人録充引入一徑勤驚覺聞失充乃出尋索忽覩所夢之道遂往求之果見充行至一府舍侍衛甚盛府公南面坐聲色甚厲謂充曰將亂吾家事必爾與荀勗既惑吾子又亂吾孫間使任愷黜汝而不去又使庾純詈汝而不改今吳寇當平汝方表斬張華汝之暗戇皆此類也若不悛慎當旦夕加罪充因叩頭流血公曰汝所以延日月而名器如此者是衛府之勳耳終當使係嗣死於鍾虡之間大子斃於金酒之中小子困於枯木之下荀勗亦宜同然其先德小濃故在汝後數世之外國嗣亦替言畢命去充忽然得還營顏色憔悴性理昏喪經日乃復及是謐死於鍾下賈后服金酒而死賈午考竟用大杖終皆如所言趙王倫之敗朝廷追述充勳議立其後欲以充從孫散騎侍郎衆為嗣衆陽狂自免以子禿後充封魯公又病死永興中立充從曾孫湛為魯公奉充後遭亂死國除泰始中人為充等謠曰賈裴王亂紀綱王裴賈濟天下言亡魏而成晉也充弟混字宮奇篤厚自守無殊才能太康中為宗正卿歷鎮軍將軍領城門校尉加侍中封永平侯卒贈中軍大將軍儀同三司充從子彝遵並有鑒裁俱為黃門郎遵弟模最知名模字思範少有志尚頗覽載籍而沈深有智算確然難奪深為充所信愛每事籌之焉充年衰疾劇憂己諡傳模曰是非久自見不可掩也起家為邵陵令遂歷事二宮尚書吏部郎以公事免起為車騎司馬豫誅楊駿封平陽鄉侯邑千戶及楚王瑋矯詔害汝南王亮太保衛瓘詔使模將中騶二百人救之是時賈后既豫朝政欲委信親黨拜模散騎常侍二日擢為侍中模乃盡心匡弼推張華裴頠同心輔政數年之中朝野寧靜模之力也乃加授光祿大夫然模潛執權勢外形欲遠之每有啓奏賈后事入輒取急或託疾以避之至於素有嫌忿多所中陷朝廷甚憚之加貪冒聚斂富擬王公但賈后性甚強暴模每盡言為陳禍福后不能從反謂模毀己於是委任之情日衰而讒間之徒遂進模不得志憂憤成疾卒追贈車騎將軍開府儀同三司諡曰成子遊字彥將嗣歷官太子侍講員外散騎侍郎郭彰字叔武太原人賈后從舅也與賈充素相親遇充妻待彰若同生歷散騎常侍尚書衛將軍封冠軍縣侯及賈后專朝彰豫參權勢物情歸附賓客盈門世人稱為賈郭謂謐及彰也卒諡曰烈楊駿弟珧濟楊駿字文長弘農華陰人也少以王官為高陸令驍騎鎮軍二府司馬後以后父超居重位自鎮軍將軍遷車騎將軍封臨晉侯識者議之曰夫封建諸侯所以藩屏王室也后妃所以供粢盛弘內教也后父始封而以臨晉為侯兆於亂矣尚書褚祀郭奕並表駿小器不可以任社稷之重武帝不從帝自太康以後天下無事不復留心萬機惟耽酒色始寵后黨請謁公行而駿及珧濟勢傾天下時人有三楊之號及帝疾篤未有顧命佐命功臣皆已沒矣朝臣惶惑計無所從而駿盡斥羣公親侍左右因輒改易公卿樹其心腹會帝小間見所用者非乃正色謂駿曰何得便爾乃詔中書以汝南王亮與駿夾輔王室駿恐失權寵從中書借詔觀之得便藏匿中書監華廙恐懼自往索之終不肯與信宿之間上疾遂篤后乃奏帝以駿輔政帝頷之便召中書監華廙令何劭口宣帝旨使作遺詔曰昔伊望作佐勳垂不朽周霍拜命名冠往代侍中車騎將軍行太子太保領前將軍楊駿經德履哲鑒識明遠毗翼二宮忠肅茂著宜正位上台擬迹阿衡其以駿為太尉太子太傅假節都督中外諸軍事侍中録尚書領前將軍如故置參軍六人步兵三千人騎千人移止前衛將軍珧故府若止宿殿中宜有翼衛其差左右衛三部司馬各二十人殿中都尉司馬十人給駿令得持兵仗出入詔成后對廙劭以呈帝帝親視而無言自是二日而崩駿遂當寄託之重居太極殿梓宮將殯六宮出辭而駿不下殿以武賁百人自衛不恭之迹自此而始惠帝即位進駿為太傅大都督假黃鉞録朝政百官總己慮左右間己乃以其甥段廣張劭為近侍之職凡有詔命帝省訖入呈太后然後乃出駿知賈后情性難制甚畏憚之又多樹親黨皆領禁兵於是公室怨望天下憤然矣駿弟珧濟並有俊才數相諫止駿不能用因廢於家駿暗於古義動違舊典武帝崩未踰年而改元議者咸以為違春秋踰年書即位之義朝廷惜於前失令史官沒之故明年正月復改年焉駿自知素無美望懼不能輯和遠近乃依魏明帝即位故事遂大開封賞欲以悅衆為政嚴碎愎諫自用不允衆心馮翊太守孫楚素與駿厚説之曰公以外戚居伊霍之重握大權輔弱主當仰思古人至公至誠謙順之道於周則周召為宰在漢則朱虛東牟未有庶姓專朝而克終慶祚者也今宗室親重藩王方壯而公不與共參萬機內懷猜忌外樹私昵禍至無日矣駿不能從弘訓少府蒯欽駿之姑子少而相昵直亮不回屢以正言犯駿珧濟為之寒心欽曰楊文長雖暗猶知人之無罪不可妄殺必當疏我我得疏外可以不與俱死不然傾宗覆族其能久乎殿中中郎孟觀李肇素不為駿所禮陰搆駿將圖社稷賈后欲預政事而憚駿未得逞其所欲又不肯以婦道事皇太后黃門董猛始自帝之為太子即為寺人監在東宮給事於賈后后密通消息於猛謀廢太后猛乃與肇觀潛相結託賈后又令肇報大司馬汝南王亮使連兵討駿亮曰駿之凶暴死亡無日不足憂也肇報楚王瑋瑋然之於是求入朝駿素憚瑋先欲召入防其為變因遂聽之及瑋至觀肇乃啓帝夜作詔中外戒嚴遣使奉詔廢駿以侯就第東安公繇率殿中四百人隨其後以討駿段廣跪而言於帝曰楊駿受恩先帝竭心輔政且孤公無子豈有反理願陛下審之帝不答時駿居曹爽故府在武庫南聞內有變召衆官議之太傅主簿朱振説駿曰今內有變其趣可知必是閹豎為賈后設謀不利於公宜燒雲龍門以示威索造事者首開萬春門引東宮及外營兵公自擁翼皇太子入宮取姦人殿內震懼必斬送之可以免難駿素怯懦不決乃曰魏明帝造此大功奈何燒之侍中傅祗夜白駿請與武茂俱入雲龍門觀察事勢祗因謂羣僚宮中不宜空便起揖於是皆走尋而殿中兵出燒駿府又令弩士於閣上臨駿府而射之駿兵皆不得出駿逃于馬以戟殺之觀等受賈后密旨誅駿親黨皆夷三族死者數千人又令李肇焚駿家私書賈后不欲令武帝顧命手詔聞于四海也駿既誅莫敢收者惟太傅舍人巴西閻纂殯斂之初駿徵高士孫登遺以布被登截被於門大呼曰斫斫刺刺旬日託疾詐死及是其言果驗永熙中溫縣有人如狂造書曰光光文長大戟為牆毒藥雖行戟還自傷及駿居內府以戟為衛焉永寧初詔曰舅氏失道宗族隕墜渭陽之思孔懷感傷其以蓩亭侯楊超為奉朝請騎都尉以慰蓼莪之思焉珧字文琚歷位尚書令衛將軍素有名稱得幸於武帝時望在駿前以兄貴盛知權寵不可居自乞遜位前後懇至終不獲許初聘后珧表曰歷觀古今一族二后未嘗以全而受覆宗之禍乞以表事藏之宗廟若如臣之言得以免禍從之右軍督趙休上書陳王莽五公兄弟相代今楊氏三公並在大位而天變屢見臣竊為陛下憂之由此珧益懼固求遜位聽之賜錢百萬絹五千匹珧初以退讓稱晚乃合朋黨搆出齊王攸中護軍羊琇與北軍中候成粲謀欲因見珧而手刃之珧知而辭疾不出諷有司奏琇轉為太僕自是舉朝莫敢枝梧而素論盡矣珧臨刑稱寃云事在石函可問張華當時皆謂宜為申理合依鍾育事例而賈氏族黨待諸楊如讎促行刑者遂斬之時人莫不嗟歎焉濟字文通歷位鎮南征北將軍遷太子太傅濟有才藝嘗從武帝校獵北芒下與侍中王濟俱著布袴褶騎馬執角弓在輦前猛獸突出帝命王濟射之應弦而倒須臾復一出濟受詔又射殺之六軍大叫稱快帝重兵官多授貴戚清望濟以武藝號為稱職與兄珧深慮盛滿乃與諸甥李斌等共切諫駿斥出王佑為河東太守建立皇儲皆濟謀也初駿忌大司馬汝南王亮催使之藩濟與斌數諫止之駿遂疏濟濟謂傅咸曰若家兄徵大司馬入退身避之門戶可得免耳不爾行當赤族咸曰但徵還共崇至公便立太平無為避也夫人臣不可有專豈獨外戚今宗室疏因外戚之親以得安外戚危倚宗室之重以為援所謂脣齒相依計之善者濟益懼而問石崇曰人心云何崇曰賢兄執政疏外宗室宜與四海共之濟曰見兄可及此崇見駿及焉駿不納後與諸兄俱見害難發之夕東宮召濟濟謂裴楷曰吾將何之楷曰子為保傅當至東宮濟好施久典兵馬所從四百餘人皆秦中壯士射則命中皆欲救濟濟已入宮莫不歎恨史臣曰賈充以諂諛陋質刀筆常材幸屬昌辰濫叨非據抽戈犯順曾無猜憚之心杖鉞推亡遽有知難之請非惟魏朝之悖逆抑亦晉室之罪人者歟然猶身極寵光任兼文武存荷台衡之寄沒有從享之榮可謂無德而祿殃將及矣逮乎貽厥乃乞丐之徒嗣惡稔之餘基縱姦邪之凶德煽茲哲婦索彼惟家雖及誅夷曷云塞責昔當塗闕翦公閭實肆其勞典午分崩南風亦盡其力可謂君以此始必以此終信乎其然矣楊駿階緣寵幸遂荷棟梁之任敬之猶恐弗逮驕奢淫泆庸可免乎括母以明智全身會昆以先言獲宥文琚識同曩烈而罰異昔人悲夫贊曰公閭便佞心乖雅正邀遇時來遂階榮命乞丐承緒凶家亂政瑣瑣文長遂居棟梁據非其位乃底滅亡珧雖先覺亦罹禍殃
