body:
  text: 晉書卷五帝紀第五孝懷帝孝懷皇帝諱熾字豐度武帝第二十五子也太熙元年封豫章郡王屬惠帝之時宗室構禍帝沖素自守門絶賓遊不交世事專玩史籍有譽于時初拜散騎常侍及趙王倫篡見收倫敗為射聲校尉纍遷車騎大將軍都督青州諸軍事未之鎮永興元年改授鎮北大將軍都督鄴城守諸軍事十二月丁亥立為皇太弟帝以清河王覃本太子也懼不敢當典書令廬陵修肅曰二相經營王室志寧社稷儲二之重宜歸時望親賢之舉非大王而誰清河幼弱未允衆心是以既升東宮復贊藩國今乘輿播越二宮久曠常恐氐羌飲馬於涇川蟻衆控弦於霸水宜及吉辰時登儲副上翼大駕早寧東京下允黔首喁喁之望帝曰卿吾之宋昌也乃從之光熙元年十一月庚午孝惠帝崩羊皇后以於太弟為嫂不得為太后催清河王覃入已至尚書閣侍中華混等急召太弟癸酉即皇帝位大赦尊皇后羊氏為惠皇后居弘訓宮追尊所生太妃王氏為皇太后立妃梁氏為皇后十二月壬午朔日有食之己亥封彭城王植子融為樂城縣王南陽王模殺河間王顒于雍谷辛丑以中書監溫羡為司徒尚書左僕射王衍為司空己酉葬孝惠皇帝于太陽陵李雄別帥李離寇梁州永嘉元年春正月癸丑朔大赦改元除三族刑以太傅東海王越輔政殺御史中丞諸葛玫二月辛巳東萊人王彌起兵反寇青徐二州長廣太守宋羆東牟太守龐伉並遇害三月己未朔平東將軍周馥斬送陳敏首丁卯改葬武悼楊皇后庚午立豫章王詮為皇太子辛未大赦庚辰東海王越出鎮許昌以征東將軍高密王簡為征南大將軍都督荊州諸軍事鎮襄陽改封安北將軍東燕王騰為新蔡王都督司冀二州諸軍事鎮鄴以征南將軍南陽王模為征西大將軍都督秦雍梁益四州諸軍事鎮長安并州諸郡為劉元海所陷刺史劉琨獨保晉陽夏五月馬牧帥汲桑聚衆反敗魏郡太守馮嵩遂陷鄴城害新蔡王騰燒鄴宮火旬日不滅又殺前幽州刺史石鮮於樂陵入掠平原山陽公劉秋遇害洛陽步廣里地陷有二鵝出色蒼者沖天白者不能飛建寧郡夷攻陷寧州死者三千餘人秋七月己酉朔東海王越進屯官渡以討汲桑己未以平東將軍琅邪王睿為安東將軍都督揚州江南諸軍事假節鎮建鄴八月己卯朔撫軍將軍苟晞敗汲桑於鄴甲辰曲赦幽并司冀兗豫等六州分荊州江州八郡為湘州九月戊申苟晞又破汲桑陷其九壘辛亥有大星如日小者如斗自西方流於東北天盡赤俄有聲如雷始修千金堨於許昌以通運冬十一月戊申朔日有蝕之甲寅以尚書右僕射和郁為征北將軍鎮鄴十二月戊寅并州人田蘭薄盛等斬汲桑於樂陵甲午以前太傅劉實為太尉庚子以光祿大夫延陵公高光為尚書令東海王越矯詔囚清河王覃于金墉城癸卯越自為丞相以撫軍將軍苟晞為征東大將軍二年春正月丙午朔日有蝕之丁未大赦二月辛卯清河王覃為東海王越所害庚子石勒寇常山安北將軍王浚討破之三月東海王越鎮鄄城劉元海侵汲郡略有頓丘河內之地王彌寇青徐兗豫四州夏四月丁亥入許昌諸郡守將皆奔走五月甲子彌遂寇洛陽司徒王衍帥衆禦之彌退走秋七月甲辰劉元海寇平陽太守宋抽奔京師河東太守路述力戰死之八月丁亥東海王越自鄄城遷屯于濮陽九月石勒寇趙郡征北將軍和郁自鄴奔于衛國冬十月甲戌劉元海僭帝號于平陽仍稱漢十一月乙巳尚書令高光卒丁卯以太子少傅荀藩為尚書令己酉石勒寇鄴魏郡太守王粹戰敗死之十二月辛未朔大赦立長沙王子碩為長沙王鮮為臨淮王三年春正月甲午彭城王釋薨三月戊申征南大將軍高密王簡薨以尚書左僕射山簡為征南將軍都督荊湘交廣等四州諸軍事司棣校尉劉暾為尚書左僕射丁巳東海王越歸京師乙丑勒兵入宮於帝側收近臣中書令繆播帝舅王延等十餘人並害之丙寅曲赦河南郡丁卯太尉劉實請老以司徒王衍為太尉東海王越領司徒劉元海寇黎陽遣車騎將軍王堪擊之王師敗績于延津死者三萬餘人大旱江漢河洛皆竭可涉夏四月左積弩將軍朱誕叛奔於劉元海石勒攻陷冀州郡縣百餘壁秋七月戊辰當陽地裂三所各廣三丈長三百餘步辛未平陽人劉芒蕩自稱漢後誑誘羌戎僭帝號於馬蘭山支胡五斗叟郝索聚衆數千為亂屯新豐與芒蕩合黨劉元海遣子聰及王彌寇上黨圍壺關并州刺史劉琨使兵救之為聰所敗淮南內史王曠將軍施融曹超及聰戰又敗超融死之上黨太守龐淳以郡降賊九月丙寅劉聰圍浚儀遣平北將軍曹武討之丁丑王師敗績東海王越入保京城聰至西明門越禦之戰于宣陽門外大破之石勒寇常山安北將軍王浚使鮮卑騎救之大破勒於飛龍山征西大將軍南陽王模使其將淳于定破劉芒蕩五斗叟並斬之使車騎將軍王堪平北將軍曹武討劉聰王師敗績堪奔還京師李雄別帥羅羡以梓潼歸順劉聰攻洛陽西明門不克宜都夷道山崩荊湘二州地震冬十一月石勒陷長樂安北將軍王斌遇害因屠黎陽乞活帥李惲薄盛等帥衆救京師聰退走惲等又破王彌于新汲十二月乙亥夜有白氣如帶自地升天南北各二丈四年春正月乙丑朔大赦二月石勒襲鄄城兗州刺史袁孚戰敗為其部下所害勒又襲白馬車騎將軍王堪死之李雄將文碩殺雄大將軍李國以巴西歸順戊午吳興人錢璯反自稱平西將軍三月丞相倉曹屬周玘帥鄉人討璯斬之夏四月大水將軍祁弘破劉元海將劉靈曜于廣宗李雄陷梓潼兗州地震五月石勒寇汲郡執太守胡寵遂南濟河滎陽太守裴純奔建鄴大風折木地震幽并司冀秦雍等六州大蝗食草木牛馬毛皆盡六月劉元海死其子和嗣偽位和弟聰弒和而自立秋七月劉聰從弟曜及其將石勒圍懷詔征虜將軍宋抽救之為曜所敗抽死之九月河內人樂仰執太守裴整叛降于石勒徐州監軍王隆自下邳棄軍奔于周馥雍州人王如舉兵反于宛殺害令長自號大將軍司雍二州牧大掠漢沔新平人龐實馮翊人嚴嶷京兆人侯脫等各起兵應之征南將軍山簡荊州刺史王澄南中郎將杜蕤並遣兵援京師及如戰于宛諸軍皆大敗王澄獨以衆進至沶口衆潰而歸冬十月辛卯晝昏至于庚子大星西南墜有聲壬寅石勒圍倉垣陳留內史王讚擊敗之勒走河北壬子以驃騎將軍王浚為司空平北將軍劉琨為平北大將軍京師飢東海王越羽檄徵天下兵帝謂使者曰為我語諸征鎮若今日尚可救後則無逮矣時莫有至者石勒陷襄城太守崔曠遇害遂至宛王浚遣鮮卑文鴦帥騎救之勒退浚又遣別將王申始討勒于汶石津大破之十一月甲戌東海王越帥衆出許昌以行臺自隨宮省無復守衛荒饉日甚殿內死人交橫府寺營署並掘塹自守盜賊公行枹鼓之音不絶越軍次項自領豫州牧以太尉王衍為軍司丁丑流氐隗伯等襲宜都太守嵇晞奔建鄴王申始攻劉曜王彌于瓶壘破之鎮東將軍周馥表迎大駕遷都壽陽越使裴碩討馥為馥所敗走保東城請救于琅邪王睿襄陽大疫死者三千餘人加涼州刺史張軌安西將軍十二月征東大將軍苟晞攻王彌別帥曹嶷破之乙酉平陽人李洪帥流人入定陵作亂五年春正月帝密詔苟晞討東海王越壬申晞為曹嶷所破乙未越遣從事中郎將楊瑁徐州刺史裴盾共擊晞癸酉勒入江夏太守楊珉奔于武昌乙亥李雄攻陷涪城梓潼太守譙登遇害湘州流人杜韜據長沙反戊寅安東將軍琅邪王睿使將軍甘卓攻鎮東將軍周馥于壽春馥衆潰庚辰太保平原王幹薨二月石勒寇汝南汝南王祐奔建鄴三月戊午詔下東海王越罪狀告方鎮討之以征東大將軍苟晞為大將軍丙子東海王越薨四月戊子石勒追東海王越喪及于東郡將軍錢端戰死軍潰太尉王衍吏部尚書劉望廷尉諸葛銓尚書鄭豫武陵王淡等皆遇害王公已下死者十餘萬人東海世子毗及宗室四十八王尋又沒于石勒賊王桑冷道陷徐州刺史裴盾遇害桑遂濟淮至于歷陽五月益州流人汝班梁州流人蹇撫作亂于湘州虜刺史苟眺南破零桂諸郡東掠武昌安城太守郭察邵陵太守鄭融衡陽內史滕育並遇害進司空王浚為大司馬征西大將軍南陽王模為太尉太子太傅傅祗為司徒尚書令荀藩為司空安東將軍琅邪王睿為鎮東大將軍東海王越之出也使河南尹潘滔居守大將軍苟晞表遷都倉垣帝將從之諸大臣畏滔不敢奉詔且宮中及黃門戀資財不欲出至是飢甚人相食百官流亡者十八九帝召羣臣會議將行而警衛不備帝撫手歎曰如何曾無車輿乃使司徒傅祗出詣河陰修理舟楫為水行之備朝士數十人導從帝步出西掖門至銅街為盜所掠不得進而還六月癸未劉曜王彌石勒同寇洛川王師頻為賊所敗死者甚衆庚寅司空荀藩光祿大夫荀組奔轘轅太子左率溫畿夜開廣莫門奔小平津丁酉劉曜王彌入京師帝開華林園門出河陰藕池欲幸長安為曜等所追及曜等遂焚燒宮廟逼辱妃后吳王晏竟陵王楙尚書左僕射和郁右僕射曹馥尚書閭丘沖袁粲王緄河南尹劉默等皆遇害百官士庶死者三萬餘人帝蒙塵于平陽劉聰以帝為會稽公荀藩移檄州鎮以琅邪王為盟主豫章王端東奔苟晞晞立為皇太子自領尚書令具置官屬保梁國之蒙縣百姓飢儉米斛萬餘價秋七月大司馬王浚承制假立太子置百官署征鎮石勒寇穀陽沛王滋戰敗遇害八月劉聰使子粲攻陷長安太尉征西將軍南陽王模遇害長安遺人四千餘家奔漢中九月癸亥石勒襲陽夏至於蒙縣大將軍苟晞豫章王端並沒于賊冬十月勒寇豫州諸郡至江而還十一月猗盧寇太原平北將軍劉琨不能制徙五縣百姓於新興以其地居之六年春正月帝在平陽劉聰寇太原故鎮南府牙門將胡亢聚衆寇荊土自號楚公二月壬子日有蝕之癸丑鎮東大將軍琅邪王睿上尚書檄四方以討石勒大司馬王浚移檄天下稱被中詔承制以荀藩為太尉汝陽王熙為石勒所害夏四月丙寅征南將軍山簡卒秋七月歲星熒惑太白聚于牛斗石勒寇冀州劉粲寇晉陽平北將軍劉琨遣部將郝詵帥衆禦粲詵敗績死之太原太守高喬以晉陽降粲八月庚戌劉琨奔于常山己亥陰平都尉董沖逐太守王鑒以郡叛降于李雄辛亥劉琨乞師于猗盧表盧為代公九月己卯猗盧使子利孫赴琨不得進辛巳前雍州刺史賈匹討劉粲於三輔走之關中小定乃與衛將軍梁芬京兆太守梁綜共奉秦王鄴為皇太子於長安冬十月猗盧自將六萬騎次于盂城十一月甲午劉粲遁走劉琨收其遺衆保于陽曲是歲大疫七年春正月劉聰大會使帝著青衣行酒侍中庾珉號哭聰惡之丁未帝遇弒崩于平陽時年三十帝初誕有嘉禾生于豫章之南昌先是望氣者云豫章有天子氣其後竟以豫章王為皇太弟在東宮恂恂謙損接引朝士講論書籍及即位始遵舊制臨太極殿使尚書郎讀時令又於東堂聽政至於宴會輒與羣官論衆務考經籍黃門侍郎傅宣歎曰今日復見武帝之世矣祕書監荀嵩又常謂人曰懷帝天姿清劭少著英猷若遭承平足為守文佳主而繼惠帝擾亂之後東海專政無幽厲之釁而有流亡之禍孝愍帝孝愍皇帝諱鄴字彥旗武帝孫吳孝王晏之子也出繼後伯父秦獻王柬襲封秦王永嘉二年拜散騎常侍撫軍將軍及洛陽傾覆避難於滎陽密縣與舅荀藩荀組相遇自密南趨許潁豫州刺史閻鼎與前撫軍長史王毗司徒長史劉疇中書郎李昕及藩組等同謀奉帝歸於長安而疇等中塗復叛鼎追殺之藩組僅而獲免鼎遂挾帝乘牛車自宛趣武關頻遇山賊士卒亡散次于藍田鼎告雍州刺史賈匹匹遽遣州兵迎衛達于長安又使輔國將軍梁綜助守之時有玉龜出霸水神馬鳴城南焉六年九月辛巳奉秦王為皇太子登壇告類建宗廟社稷大赦加匹征西大將軍以秦州刺史南陽王保為大司馬賈匹討賊張連遇害衆推始平太守麴允領雍州刺史為盟主承制選置建興元年夏四月丙午奉懷帝崩問舉哀成禮壬申即皇帝位大赦改元以衛將軍梁芬為司徒雍州刺史麴允為使持節領軍將軍録尚書事京兆太守索綝為尚書右僕射石勒攻龍驤將軍李惲於上白惲敗死之五月壬辰以鎮東大將軍琅邪王睿為侍中左丞相大都督陝東諸軍事大司馬南陽王保為右丞相大都督陝西諸軍事又詔二王曰夫陽九百六之厄雖在盛世猶或遘之朕以幼沖纂承洪緒庶憑祖宗之靈羣公義士之力蕩滅凶寇拯拔幽宮瞻望未達肝心分裂昔周邵分陝姬氏以隆平王東遷晉鄭為輔今左右丞相茂德齊聖國之昵屬當恃二公掃除鯨鯢奉迎梓宮克復中興令幽并兩州勒卒三十萬直造平陽右丞相宜帥秦涼梁雍武旅三十萬徑詣長安左丞相帥所領精兵二十萬徑造洛陽分遣前鋒為幽并後駐赴同大限克成元勳又詔琅邪王曰朕以沖昧纂承洪緒未能梟夷凶逆奉迎梓宮枕戈煩寃肝心抽裂前得魏浚表知公帥先三軍已據壽春傳檄諸侯協齊威勢想今漸進已達洛陽涼州刺史張軌乃心王室連旗萬里已到隴梁州刺史張光亦遣巴漢之卒屯在駱谷秦川驍勇其會如林間遣使適還具知平陽定問云幽并隆盛餘胡衰破然猶恃險當須大舉未知公今所到是以息兵馬未便進軍今為已至何許當須來旨便乘輿自出會除中原也公宜思弘謀猷勗濟遠略使山陵旋反四海有賴故遣殿中都尉劉蜀蘇馬等具宣朕意公茂德昵屬宣隆東夏恢融六合非公而誰但洛都陵廟不可空曠公宜鎮撫以綏山東右丞相當入輔弼追蹤周邵以隆中興也六月石勒害兗州刺史田徽是時山東郡邑相繼陷于勒秋八月癸亥劉蜀等達于揚州改建鄴為建康改鄴為臨漳杜韜寇武昌焚燒城邑韜別將王真襲沌陽荊州刺史周顗奔于建康九月司空荀藩薨于滎陽劉聰寇河南河南尹張髦死之冬十月荊州刺史陶侃討杜韜黨杜曾於石城為曾所敗己巳大雨雹庚午大雪十一月流人楊武攻陷梁州十二月河東地震雨肉二年春正月己巳朔黑霧著人如墨連夜五日乃止辛未辰時日隕于地又有三日相承出於西方而東行丁丑大赦楊武大略漢中遂奔李雄二月壬寅以司空王浚為大司馬衛將軍荀組為司空涼州刺史張軌為太尉封西平郡公并州刺史劉琨為大將軍三月癸酉石勒陷幽州殺侍中大司馬幽州牧博陵公王浚焚燒城邑害萬餘人杜韜別帥王真襲荊州刺史陶侃於林鄣侃奔灄中夏四月甲辰地震五月壬辰太尉領護羌校尉涼州刺史西平公張軌薨六月劉曜趙冉寇新豐諸縣安東將軍索綝討破之秋七月曜冉等又逼京都領軍將軍麴允討破之冉中流矢而死九月北中郎將劉演克頓丘斬石勒所署太守邵攀丙戌麟見襄平單于代公猗盧遣使獻馬蒲子馬生人三年春正月盜殺晉昌太守趙珮吳興人徐馥害太守袁琇以侍中宋哲為平東將軍屯華陰二月丙子進左丞相琅邪王睿為大都督督中外諸軍事右丞相南陽王保為相國司空荀組為太尉大將軍劉琨為司空進封代公猗盧為代王荊州刺史陶侃破王真於巴陵杜韜別將杜弘張彥與臨川內史謝摛戰于海昏摛敗績死之三月豫章內史周訪擊杜弘走之斬張彥於陳夏四月大赦五月劉聰寇并州六月盜發漢霸杜二陵及薄太后陵太后面如生得金玉綵帛不可勝記時以朝廷草創服章多闕敕收其餘以實內府丁卯地震辛巳大赦敕雍州掩骼埋胔修復陵墓有犯者誅及三族秋七月石勒陷濮陽害太守韓弘劉聰寇上黨劉琨遣將救之八月癸亥戰于襄垣王師敗績荊州刺史陶侃攻杜韜韜敗走道死湘州平九月劉曜寇北地命領軍將軍麴允討之冬十月允進攻青白城以豫州牧征東將軍索綝為尚書僕射都督宮城諸軍事劉聰陷馮翊太守梁肅奔萬年十二月涼州刺史張實送皇帝行璽一紐盜殺安定太守趙班四年春三月代王猗盧薨其衆歸于劉琨夏四月丁丑劉曜寇上郡太守藉韋率其衆奔于南鄭涼州刺史張實遣步騎五千來赴京都石勒陷廩丘北中郎將劉演出奔五月平夷太守雷照害南廣太守孟桓帥二郡三千餘家叛降于李雄六月丁巳朔日有蝕之大蝗秋七月劉曜攻北地麴允帥步騎三萬救之王師不戰而潰北地太守麴昌奔于京師曜進至涇陽渭北諸城悉潰建威將軍魯充散騎常侍梁緯少府皇甫陽等皆死之八月劉曜逼京師內外斷絶鎮西將軍焦嵩平東將軍宋哲始平太守竺恢等同赴國難麴允與公卿守長安小城以自固散騎常侍華輯監京兆馮翊弘農上洛四郡兵東屯霸上鎮軍將軍胡嵩帥城西諸郡兵屯遮馬橋並不敢進冬十月京師飢甚米斗金二兩人相食死者太半太倉有麴數十麴允屑為粥以供帝至是復盡帝泣謂允曰今窘厄如此外無救援死于社稷是朕事也然念將士暴離斯酷今欲聞城未陷為羞死之事庶令黎元免屠爛之苦行矣遣書朕意決矣十一月乙未使侍中宋敞送箋于曜帝乘羊車肉袒銜璧輿櫬出降羣臣號泣攀車執帝之手帝亦悲不自勝御史中丞吉朗自殺曜焚櫬受璧使宋敞奉帝還宮初有童謠曰天子何在豆田中時王浚在幽州以豆有藿殺隱士霍原以應之及帝如曜營營實在城東豆田壁辛丑帝蒙塵于平陽麴允及羣官並從劉聰假帝光祿大夫懷安侯壬寅聰臨殿帝稽首于前麴允伏地慟哭因自殺尚書梁允侍中梁濬散騎常侍嚴敦左丞臧振黃門侍郎任播張偉杜曼及諸郡守並為曜所害華輯奔南山石勒圍樂平司空劉琨遣兵援之為勒所敗樂平太守韓據出奔司空長史李弘以并州叛降于勒十二月乙卯朔日有蝕之己未劉琨奔薊依段匹磾五年春正月帝在平陽庚子虹霓彌天三日並照平東將軍宋哲奔江左李雄使其將李恭羅寅寇巴東二月劉聰使其將劉暢攻滎陽太守李矩擊破之三月琅邪王睿承制改元稱晉王于建康夏五月丙子日有蝕之秋七月大旱司冀青雍等四州螽蝗石勒亦競取百姓禾時人謂之胡蝗八月劉聰使趙固襲衛將軍華薈于定潁遂害之冬十月丙子日有蝕之劉聰出獵令帝行車騎將軍戎服執戟為導百姓聚而觀之故老或歔欷流涕聰聞而惡之聰後因大會使帝行酒洗爵反而更衣又使帝執蓋晉臣在坐者多失聲而泣尚書郎辛賓抱帝慟哭為聰所害十二月戊戌帝遇弒崩于平陽時年十八帝之繼皇統也屬永嘉之亂天下崩離長安城中戶不盈百牆宇穨毀蒿棘成林朝廷無車馬章服唯桑版署號而已衆唯一旅公私有車四乘器械多闕運饋不繼巨猾滔天帝京危急諸侯無釋位之志征鎮闕勤王之舉故君臣窘迫以至殺辱云史臣曰昔炎暉杪暮英雄多假于宗室金德韜華顛沛共推于懷愍樊陽寂寥兵車靡會豈力不足而情有餘乎喋喋遺萌苟存其主譬彼詩人愛其棠樹夫有非常之事而無非常之功詳觀發迹用非天啓是以輿棺齒劍可得而言焉于是五嶽三塗並皆淪寇龍州牛首故以立君股肱非挑戰之秋劉石有滔天之勢療飢中斷嬰戈外絶兩京淪狄再駕徂戎周王隕首於驪峰衛公亡肝於淇上思為一郡其可得乎干寶有言曰昔高祖宣皇帝以雄才碩量應時而仕值魏太祖創基之初籌畫軍國嘉謀屢中遂服輿軫驅馳三世性深阻有若城府而能寬綽以容納行任數以御物而知人善采拔故賢愚咸懷大小畢力爾乃取鄧艾于農瑣引州泰于行役委以文武各善其事故能西禽孟達東舉公孫內夷曹爽外襲王淩神略獨斷征伐四克維御羣后大權在己于是百姓與能大象始構世宗承基太祖繼業玄豐亂內欽誕寇外潛謀雖密而在機必兆淮浦再擾而許洛不震咸黜異圖用融前烈然後推轂鍾鄧長驅庸蜀三關電掃而劉禪入臣天符人事於是信矣始當非常之禮終受備物之錫至于世祖遂享皇極仁以厚下儉以足用和而不弛寬而能斷故民詠維新四海悅勸矣聿修祖宗之志思輯戰國之苦腹心不同公卿異議而獨納羊祜之策杖王杜之決役不二時江湘來同掩唐虞之舊域班正朔於八荒天下書同文車同軌牛馬被野餘糧委畝故于時有天下無窮人之諺雖太平未洽亦足以明吏奉其法民樂其生矣武皇既崩山陵未乾而楊駿被誅母后廢黜尋以二公楚王之變宗子無維城之助師尹無具瞻之貴至乃易天子以太上之號而有免官之謠民不見德惟亂是聞朝為伊周夕成桀跖善惡陷於成敗毀譽脅於世利內外混淆庶官失才名實反錯天綱解紐國政迭移於亂人禁兵外散於四方方嶽無鈞石之鎮關門無結草之固李辰石冰傾之於荊楊元海王彌撓之於青冀戎羯稱制二帝失尊何哉樹立失權託付非才四維不張而苟且之政多也夫作法於治其弊猶亂作法於亂誰能救之彼元海者離石之將兵都尉王彌者青州之散吏也蓋皆弓馬之士驅走之人非有吳先主諸葛孔明之能也新起之寇烏合之衆非吳蜀之敵也脫耒為兵裂裳為旗非戰國之器也自下逆上非鄰國之勢也然而擾天下如驅羣羊舉二都如拾遺芥將相王侯連頸以受戮后嬪妃主虜辱於戎卒豈不哀哉天下大器也羣生重畜也愛惡相攻利害相奪其勢常也若積水于防燎火于原未嘗暫靜也器大者不可以小道治勢重者不可以爭競擾古先哲王知其然也是以扞其大患禦其大災百姓皆知上德之生己而不謂浚己以生也是以感而應之悅而歸之如晨風之鬱北林龍魚之趣藪澤也然後設禮文以理之斷刑罰以威之謹好惡以示之審禍福以喻之求明察以官之尊慈愛以固之故衆知向方皆樂其生而哀其死悅其教而安其俗君子勤禮小人盡力廉恥篤於家閭邪辟消於胸懷故其民有見危以授命而不求生以害義又況可奮臂大呼聚之以干紀作亂乎基廣則難傾根深則難拔理節則不亂膠結則不遷是以昔之有天下者之所以長久也夫豈無僻主賴道德典刑以維持之也昔周之興也后稷生於薑嫄而天命昭顯文武之功起於后稷至於公劉遭夏人之亂去邰之豳身服厥勞至於太王為戎翟所逼而不忍百姓之命杖策而去之故從之如歸市一年成邑二年成都三年五倍其初至于王季能貊其德音至于文王而維新其命由此觀之周家世積忠厚仁及草木內隆九族外尊事黃耇以成其福祿者也而其妃后躬行四教尊敬師傅服浣濯之衣修煩辱之事化天下以成婦道是以漢濱之女守潔白之志中林之士有純一之德始於憂勤終於逸樂以三聖之知伐獨夫之紂猶正其名教曰逆取順守及周公遭變陳后稷先公風化之所由致王業之艱難者則皆農夫女工衣食之事也故自后稷之始基靖民十五王而文始平之十六王而武始居之十八王而康克安之故其積基樹本經緯禮俗節理人情恤隱民事如此之纏綿也今晉之興也功烈於百王事捷於三代宣景遭多難之時誅庶孽以便事不及修公劉太王之仁也受遺輔政屢遇廢置故齊王不明不獲思庸於亳高貴沖人不得復子明辟也二祖逼禪代之期不暇待參分八百之會也是其創基立本異於先代者也加以朝寡純德之人鄉乏不二之老風俗淫僻恥尚失所學者以老莊為宗而黜六經談者以虛蕩為辨而賤名檢行身者以放濁為通而狹節信進仕者以苟得為貴而鄙居正當官者以望空為高而笑勤恪是以劉頌屢言治道傅咸每糾邪正皆謂之俗吏其倚杖虛曠依阿無心者皆名重海內若夫文王日旰不暇食仲山甫夙夜匪懈者蓋共嗤黜以為灰塵矣由是毀譽亂于善惡之實情慝奔于貨欲之塗選者為人擇官官者為身擇利而執鈞當軸之士身兼官以十數大極其尊小録其要而世族貴戚之子弟陵邁超越不拘資次悠悠風塵皆奔競之士列官千百無讓賢之舉子真著崇讓而莫之省子雅制九班而不得用其婦女莊櫛織紝皆取成於婢僕未嘗知女工絲枲之業中饋酒食之事也先時而婚任情而動故皆不恥淫泆之過不拘妬忌之惡父兄不之罪也天下莫之非也又況責之聞四教於古修貞順於今以輔佐君子者哉禮法刑政於此大壞如水斯積而決其隄防如火斯畜而離其薪燎也國之將亡本必先顛其此之謂乎故觀阮籍之行而覺禮教崩弛之所由也察庾純賈充之爭而見師尹之多僻考平吳之功而知將帥之不讓思郭欽之謀而寤戎狄有釁覽傅玄劉毅之言而得百官之邪核傅咸之奏錢神之論而覩寵賂之彰民風國勢如此雖以中庸之才守文之主治之辛有必見之於祭祀季札必得之於聲樂范燮必為之請死賈誼必為之痛哭又況我惠帝以放蕩之德臨之哉懷帝承亂得位羈於強臣愍帝奔播之後徒廁其虛名天下之政既去非命世之雄才不能取之矣淳耀之烈未渝故大命重集於中宗元皇帝贊曰懷佩玉璽愍居黃屋鼇墜三山鯨吞九服獯入金商穹居未央圜顱盡仆方趾咸僵大夫反首徙我平陽主憂臣哭于何不臧
