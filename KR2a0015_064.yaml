body:
  text: 晉書卷六十四列傳第三十四武十三王武帝二十六男楊元后生毗陵悼王軌惠帝秦獻王柬審美人生城陽懷王景楚隱王瑋長沙厲王乂徐才人生城陽殤王憲匱才人生東海沖王祗趙才人生始平哀王裕趙美人生代哀王演李夫人生淮南忠壯王允吳孝王晏嚴保林生新都懷王該陳美人生清河康王遐諸姬生汝陰哀王謨程才人生成都王穎王才人生孝懷帝楊悼后生渤海殤王恢餘八子不顯母氏並早夭又無封國及追諡今並略之其瑋乂穎自有傳毗陵悼王軌字正則初拜騎都尉年二歲而夭太康十年追加封諡以楚王瑋子義嗣秦獻王柬字弘度沈敏有識量泰始六年封汝南王咸寧初徙封南陽王拜左將軍領右軍將軍散騎常侍武帝嘗幸宣武場以三十六軍兵簿令柬料校之柬一省便擲脫謬帝異之於諸子中尤見寵愛以左將軍居齊獻王故府甚貴寵為天下所屬目性仁訥無機辨之譽太康十年徙封於秦邑八萬戶于時諸王封中土者皆五萬戶以柬與太子同産故特加之轉鎮西將軍西戎校尉假節與楚淮南王俱之國及惠帝即位來朝拜驃騎將軍開府儀同三司加侍中録尚書事進位大將軍時楊駿伏誅柬既痛舅氏覆滅甚有憂危之慮屢述武帝旨請還藩而汝南王亮留柬輔政及亮與楚王瑋被誅時人謂柬有先識元康元年薨時年三十朝野痛惜之葬禮如齊獻文王攸故事廟設軒懸之樂無子以淮南王允子郁為嗣與允俱被害永寧二年追諡曰悼又以吳王晏子鄴嗣懷帝崩鄴入纂帝位國絶城陽懷王景字景度出繼叔父城陽哀王兆後泰始五年受封六年薨東海沖王祗字敬度泰始九年五月受封殤王薨復以祗繼兆其年薨時年三歲始平哀王裕字濬度咸寧三年受封其年薨年七歲無子以淮南王允子迪為嗣太康十年改封漢王為趙王倫所害淮南忠壯王允字欽度咸寧三年封濮陽王拜越騎校尉太康十年徙封淮南仍之國都督揚江二州諸軍事鎮東大將軍假節元康九年入朝初愍懷之廢議者將立允為太弟會趙王倫廢賈后詔遂以允為驃騎將軍開府儀同三司侍中都督如故領中護軍允性沈毅宿衛將士皆敬服之倫既有篡逆志允陰知之稱疾不朝密養死士潛謀誅倫倫甚憚之轉為太尉外示優崇實奪其兵也允稱疾不拜倫遣御史逼允收官屬以下劾以大逆允恚視詔乃孫秀手書也大怒便收御史將斬之御史走而獲免斬其令史二人厲色謂左右曰趙王欲破我家遂率國兵及帳下七百人直出大呼曰趙王反我將攻之佐淮南王者左袒於是歸之者甚衆允將赴宮尚書左丞王輿閉東掖門允不得入遂圍相府允所將兵皆淮南奇才劍客也與戰頻敗之倫兵死者千餘人太子左率陳徽勒東宮兵鼓譟於內以應允結陳於承華門前弓弩齊發射倫飛矢雨下主書司馬畦祕以身蔽倫箭中其背而死倫官屬皆隱樹而立每樹輒中數百箭自辰至未徽兄淮時為中書令遣麾騶虞幡以解鬬倫子虔為侍中在門下省密要壯士約以富貴於是遣司馬督護伏胤領騎四百從宮中出舉空版詐言有詔助淮南王允允不之覺開陳納之下車受詔為胤所害時年二十九初倫兵敗皆相傳曰已擒倫矣百姓大悅既而聞允死莫不歎息允三子皆被害坐允夷滅者數千人及倫誅齊王冏上表理允曰故淮南王允忠孝篤誠憂國忘身討亂奮發幾於克捷遭天凶運奄至隕沒逆黨遘惡并害三子冤魂酷毒莫不悲酸洎興義兵淮南國人自相率領衆過萬人人懷慷愾愍國統滅絶發言流涕臣輒以息超繼允後以慰存亡有詔改葬賜以殊禮追贈司徒冏敗超被幽金墉城後更以吳王晏子祥為嗣拜散騎常侍洛京傾覆為劉聰所害代哀王演字宏度太康十年受封少有廢疾不之國演常止于宮中薨無子以成都王穎子廓為嗣改封中都王後與穎俱死新都王該字玄度咸寧三年受封太康四年薨時年十二無子國除清河康王遐字深度美容儀有精彩武帝愛之既受封出繼叔父城陽哀王兆太康十年增封渤海郡歷右將軍散騎常侍前將軍元康初進撫軍將軍加侍中遐長而懦弱無所是非性好內不能接士大夫及楚王瑋之舉兵也使遐收衛瓘而瓘故吏榮晦遂盡殺瓘子孫遐不能禁為世所尤永康元年薨時年二十八四子覃籥銓端覃嗣立及沖太孫薨齊王冏表曰東宮曠然冢嗣莫繼天下大業帝王神器必建儲副以固洪基今者後宮未有孕育不可庶幸將來而虛天緒非祖宗之遺志社稷之長計也禮兄弟之子猶子故漢成無嗣繼由定陶孝和之絶安以紹興此先王之令典往代之成式也清河王覃神姿岐嶷慧智早成康王正妃周氏所生先帝衆孫之中於今為嫡昔薄姬賢明文則承位覃外祖恢世載名德覃宜奉宗廟之重統無窮之祚以寧四海顒顒之望覃兄弟雖並出紹可簡令淑還為國胤不替其嗣輒咨大將軍穎及羣公卿士咸同大願請具禮儀擇日迎拜遂立覃為皇太子既而河間王顒脅遷大駕表成都王穎為皇太弟廢覃復為清河王初覃為清河世子所佩金鈴欻生隱起如麻粟祖母陳太妃以為不祥毀而賣之占者以金是晉行大興之祥覃為皇胤是其瑞也毀而賣之象覃見廢不終之驗也永嘉初前北軍中候任城呂雍度支校尉陳顏等謀立覃為太子事覺幽於金墉城未幾被害時年十四葬以庶人禮籥初封新蔡王覃薨還封清河王銓初封上庸王懷帝即位更封豫章王二年立為皇太子洛京傾覆沒于劉聰端初封廣川王銓之為皇太子也轉封豫章禮秩如皇子拜散騎常侍平南將軍都督江州諸軍事假節當之國會洛陽陷沒端東奔苟晞於蒙晞立為皇太子七十日為石勒所沒汝陰哀王謨字令度太康七年薨時年十一無後國除吳敬王晏字平度太康十年受封食丹楊吳興并吳三郡歷射聲校尉後軍將軍與兄淮南王允共攻趙王倫允敗收晏付廷尉欲殺之傅祗於朝堂正色而爭於是羣官並諫倫乃貶為賓徒縣王後徙封代王倫誅詔復晏本封拜上軍大將軍開府加侍中長沙王乂成都王穎之相攻也乂以晏為前鋒都督數交戰永嘉中為太尉大將軍晏為人恭願才不及中人於武帝諸子中最劣又少有風疾視瞻不端後轉增劇不堪朝覲及洛京傾覆晏亦遇害時年三十一愍帝即位追贈太保五子長子不顯名與晏同沒餘四子祥鄴固衍祥嗣淮南王允鄴即愍帝固初封漢王改封濟南衍初封新都王改封濟陰為散騎常侍皆沒于賊渤海殤王恢字思度太康五年薨時年二歲追加封諡元四王元帝六男宮人荀氏生明帝及琅邪孝王裒石婕妤生東海哀王沖王才人生武陵威王晞鄭夫人生琅邪悼王煥及簡文帝琅邪孝王裒字道成母荀氏以微賤入宮元帝命虞妃養之裒初繼叔父長樂亭侯渾後徙封宣城郡公拜後將軍及帝為晉王有司奏立太子帝以裒有成人之量過於明帝從容謂王導曰立子以德不以年導曰世子宣城俱有朗俊之目固當以年於是太子位遂定更封裒琅邪嗣恭王後改食會稽宣城邑五萬二千戶拜散騎常侍使持節都督青徐兗三州諸軍事車騎將軍徵還京師建武元年薨年十八贈車騎大將軍加侍中及妃山氏薨祔葬穆帝更贈裒太保子哀王安國立未踰年薨東海哀王沖字道讓元帝以東海王越世子毗沒于石勒不知存亡乃以沖繼毗後稱東海世子以毗陵郡增本封邑萬戶又改食下邳蘭陵以越妃裴氏為太妃拜長水校尉高選僚佐以沛國劉耽為司馬潁川庾懌為功曹吳郡顧和為主簿永昌初遷中軍將軍加散騎常侍及東海太妃薨因發毗喪沖即王位以滎陽益東海國轉車騎將軍徙驃騎將軍咸康七年薨年三十一贈侍中驃騎大將軍儀同三司無子成帝臨崩詔曰哀王無嗣國統將絶朕所哀怛其以小晚生奕繼哀王為東海王以道遠罷滎陽更以臨川郡益東海及哀帝以琅邪王即尊位徙奕為琅邪王東海國闕無嗣奕後入纂大業桓溫廢之復為東海王既而貶為海西公東海國又闕嗣隆安三年安帝詔以會稽忠王次子彥璋為東海王繼哀王為曾孫改食吳興郡為桓玄所害國除武陵威王晞字道叔出繼武陵王哲後太興元年受封咸和初拜散騎常侍後以湘東增武陵國除左將軍遷鎮軍將軍加散騎常侍康帝即位加侍中特進建元初領祕書監穆帝即位轉鎮軍大將軍遷太宰太和初加羽葆鼓吹入朝不趨贊拜不名劍履上殿固讓晞無學術而有武幹為桓溫所忌及簡文帝即位溫乃表晞曰晞體自皇極故寵靈光世不能率由王度修己慎行而聚納輕剽苞藏亡命又息綜矜忍虐加于人袁真叛逆事相連染頃自猜懼將成亂階請免晞官以王歸藩免其世子綜官解子𩼔散騎常侍𩼔以梁王隨晞晞既見黜送馬八十五匹三百人杖以歸溫溫又逼新蔡王晃使自誣與晞綜及著作郎殷涓太宰長史庾倩掾曹秀舍人劉強等謀逆遂收付廷尉請誅之簡文帝不許溫於是奏徙新安郡家屬悉從之而族誅殷涓等廢晃徙衡陽郡太元六年晞卒于新安時年六十六孝武帝三日臨于西堂詔曰感惟摧慟便奉迎靈柩并改移妃應氏及故世子梁王諸喪家屬悉還復下詔曰故前武陵王體自皇極克己思愆仰惟先朝仁宥之旨豈可情禮靡寄其追封新寧郡王邑千戶晞三子綜𩼔遵以遵嗣追贈綜給事中𩼔散騎郎十二年追復晞武陵國綜𩼔各復先官𩼔還繼梁國梁王𩼔字賢明出繼梁王翹官至永安太僕與父晞俱廢薨子和嗣太元中復國薨子珍之嗣桓玄篡位國人孔朴奉珍之奔于壽陽桓玄敗珍之歸朝廷大將軍武陵王令曰梁王珍之理悟貞立蒙險違難撫義懷順載奔闕庭值壽陽擾亂在危克固且可通直散騎郎纍遷遊擊將軍左衛太常劉裕伐姚泓請為咨議參軍裕將弱王室誣其罪害之忠敬王遵字茂遠初襲封新寧時年十二受拜流涕哀感左右右將軍桓伊嘗詣遵遵曰門何為通桓氏左右曰伊與桓溫疏宗相見無嫌遵曰我聞人姓木邊便欲殺之況諸桓乎由是少稱聰慧及晞追復封武陵王以遵嗣歷位散騎常侍祕書監太常中領軍桓玄用事拜金紫光祿大夫玄篡貶為彭澤侯遣之國行次石頭夜濤水入淮船破未得發會義旗興復還國第朝廷稱受密詔使遵總攝萬機加侍中大將軍移入東宮內外畢敬遷轉百官稱制書又教稱令書安帝反正更拜太保加班劍二十人義熙四年薨時年三十五詔賜東園溫明祕器朝服一具衣一襲錢百萬布千匹策贈太傅葬加殊禮子定王季度立拜散騎侍郎薨子球之立宋興國除琅邪悼王煥字耀祖母有寵元帝特所鍾愛初繼帝弟長樂亭侯渾後封顯義亭侯尚書令刁協奏昔魏臨淄侯以邢顒為家丞劉楨為庶子今侯幼弱宜選明德帝令曰臨淄萬戶封又植少有美才能同遊田蘇者今晚生矇弱何論於此間封此兒不以寵稚子也亡弟當應繼嗣不獲已耳家丞庶子足以攝祠祭而已豈宜屈賢才以受無用乎及煥疾篤帝為之徹膳乃下詔封為琅邪王嗣恭王後俄而薨年二歲帝悼念無已將葬以煥既封列國加以成人之禮詔立凶門柏歷備吉凶儀服營起陵園功役甚衆琅邪國右常侍會稽孫霄上疏諫曰臣聞法度典制先王所重吉凶之禮事貴不過是以世豐不使奢放凶荒必務約殺朝聘嘉會足以展庠序之儀殯葬送終務以稱哀榮之情上無奢泰之謬下無匱竭之困故華元厚葬君子謂之不臣嬴博至儉仲尼稱其合禮明傷財害時古人之所譏節省簡約聖賢之所嘉也語曰上之化下如風靡草京邑翼翼四方所則明教化法制不可不慎也陛下龍飛踐阼興微濟弊聖懷勞謙務從簡儉憲章舊制猶欲節省禮典所無而反尚飾此臣愚情竊所不安也棺槨輿服旒翣之屬禮典舊制不可廢闕凶門柏歷禮典所無天晴可不用遇雨則無益此至宜節省者也若琅邪一國一時所用不為大費臣在機近義所不言今天臺所居王公百僚聚在都輦凡有喪事皆當供給材木百數竹薄千計凶門兩表衣以細竹及材價直既貴又非表凶哀之宜如此過飾宜從粗簡又案禮記國君之葬棺槨之間容柷大夫容壺士容甒以壺甒為差則柷財大於壺明矣槨周於棺槨不甚大也語曰葬者藏也藏欲其深而固也槨大則難為堅固無益於送終而有損於財力凶荒殺禮經國常典既減殺而猶過舊此為國之所厚惜也又禮將葬遷柩于廟祖而行及墓即窆葬之日即反哭而虞如此則柩不宿於墓上也聖人非不哀親之在土而無情於丘墓蓋以墓非安神之所故修虞於殯宮始則營草宮於山陵遷神柩於墓側又非典也非禮之事不可以訓萬國臣至愚至賤忽求革前之非可謂狂瞽不知忌諱然今天下至弊自古所希宗廟社稷遠託江表半州之地凋殘以甚加之荒旱百姓困瘁非但不足死亡是懼此乃陛下至仁之所矜愍可憂之至重也正是匡矯末俗改張易調之時而猶當竭已罷之人營無益之事殫已困之財修無用之費此固臣之所不敢安也今琅邪之於天下國之最大若割損非禮之事務遵古典上以彰聖朝簡易之至化下以表萬世無窮之規則此芻蕘之言有補萬一塵露之微有增山海表寢不報永昌元年立煥母弟昱為琅邪王即簡文帝也咸和二年徙封會稽以康帝為琅邪王康帝即位哀帝為琅邪王哀帝即位廢帝為琅邪王廢帝即位又以簡文帝攝行琅邪王國祀簡文登阼國遂無嗣帝臨崩封少子道子為琅邪王太元十七年道子為會稽王更以恭帝為琅邪王恭帝即位於是琅邪國除簡文三子簡文帝七子王皇后生會稽思世子道生皇子俞生胡淑儀生臨川獻王郁皇子朱生王淑儀生皇子天流李夫人生孝武帝會稽文孝王道子俞生朱生天流並早夭今並略之會稽思世子道生字延長帝為會稽王立道生為世子拜散騎侍郎給事中性疏躁不修行業多失禮度竟以幽廢而卒時年二十四無後及孝武帝即位嘗晝日見道生及臨川獻王郁郁曰大郎飢乏辛苦言竟不見帝傷感因以西陽王羕玄孫珣之為後珣之歷吳興太守劉裕之伐關中以為咨議參軍時帝道方謝珣之為宗室之美與梁王珍之俱被害臨川獻王郁字深仁幼而敏慧道生初以無禮失旨郁數勸以敬慎之道道生不納郁為之流涕簡文帝深器異之年十七而薨久之追諡獻世子寧康初贈左將軍加散騎常侍追封郡王以武陵威王曾孫寶為嗣追尊其母胡淑儀為臨川太妃寶字弘文歷祕書監太常左將軍散騎常侍護軍將軍宋興以為金紫光祿大夫降為西豐侯食邑千戶會稽文孝王道子字道子出後琅邪孝王少以清淡為謝安所稱年十歲封琅邪王食邑一萬七千六百五十一戶攝會稽國五萬九千一百四十戶太元初拜散騎常侍中軍將軍進驃騎將軍後公卿奏道子親賢莫二宜正位司徒固讓不拜使録尚書六條事尋加開府領司徒及謝安薨詔曰新喪哲輔華戎未一自非明賢懋德莫能綏御內外司徒琅邪王道子體道自然神識穎遠實當旦奭之重宜總二南之任可領揚州刺史録尚書假節都督中外諸軍事衛府文武一以配驃騎府讓不受數年領徐州刺史太子太傅公卿又奏宜進位丞相揚州牧假黃鉞羽葆鼓吹並讓不受于時孝武帝不親萬機但與道子酣歌為務姏姆尼僧尤為親昵並竊弄其權凡所幸接皆出自小豎郡守長吏多為道子所樹立既為揚州總録勢傾天下由是朝野奔湊中書令王國寶性卑佞特為道子所寵昵官以賄遷政刑謬亂又崇信浮屠之學用度奢侈下不堪命太元以後為長夜之宴蓬首昏目政事多闕桓玄嘗候道子正遇其醉賓客滿坐道子張目謂人曰桓溫晚塗欲作賊云何玄伏地流汗不得起長史謝重舉板答曰故宣武公黜昏登聖功超伊霍紛紜之議宜裁之聽覽道子頷曰儂知儂知因舉酒屬玄玄乃得起由是玄益不自安切齒於道子于時朝政既紊左衛領營將軍會稽許榮上疏曰今臺府局吏直衛武官及僕隸婢兒取母之姓者本臧獲之徒無鄉邑品第皆得命議用為郡守縣令並帶職在內委事於小吏手中僧尼乳母競進親黨又受貨賂輒臨官領衆無衛霍之才而比方古人為患一也臣聞佛者清遠玄虛之神以五誡為教絶酒不淫而今之奉者穢慢阿尼酒色是耽其違二矣夫致人于死未必手刃害之若政教不均暴濫無罪必夭天命其違三矣盜者未必躬竊人財江乙母失布罪由令尹今禁令不明劫盜公行其違四矣在上化下必信為本昔年下書敕使盡規而衆議兼集無所採用其違五矣尼僧成羣依傍法服五誡粗法尚不能遵況精妙乎而流惑之徒競加敬事又侵漁百姓取財為惠亦未合布施之道也又陳太子宜出臨東宮克奬德業疏奏並不省中書郎范寧亦深陳得失帝由是漸不平於道子然外每優崇之國寶即寧之甥以諂事道子寧奏請黜之國寶懼使陳郡袁悅之因尼妙音致書與太子母陳淑媛説國寶忠謹宜見親信帝因發怒斬悅之國寶甚懼復譖寧於帝帝不獲已流涕出寧為豫章太守道子由是專恣嬖人趙牙出自優倡茹千秋本錢塘捕賊吏因賂諂進道子以牙為魏郡太守千秋驃騎咨議參軍牙為道子開東第築山穿池列樹竹木功用巨萬道子使宮人為酒肆沽賣於水側與親昵乘船就之飲宴以為笑樂帝嘗幸其宅謂道子曰府內有山因得遊矚甚善也然修飾太過非示天下以儉道子無以對唯唯而已左右侍臣莫敢有言帝還宮道子謂牙曰上若知山是板築所作爾必死矣牙曰公在牙何敢死營造彌甚千秋賣官販爵聚資貨纍億又道子既為皇太妃所愛親遇同家人之禮遂恃寵乘酒時失禮敬帝益不能平然以太妃之故加崇禮秩博平令吳興聞人奭上疏曰驃騎咨議參軍茹千秋協輔宰相起自微賤竊弄威權衒賣天官其子壽齡為樂安令贓私狼藉畏法奔逃竟無罪罰傲然還縣又尼姏屬類傾動亂時穀賤人飢流殣不絶由百姓單貧役調深刻又振武將軍庾鳴角京邑主簿戴良夫苦諫被囚殆至沒命而以醉酒見怒良夫以執忠廢棄又權寵之臣各開小府施置吏佐無益於官有損於國疏奏帝益不平而逼於太妃無所廢黜乃出王恭為兗州殷仲堪為荊州王珣為僕射王雅為太子少傅以張王室而潛制道子也道子復委任王緒由是朋黨競扇友愛道盡太妃每和解之而道子不能改中書郎徐邈以國之至親唯道子而已宜在敦穆從容言於帝曰昔漢文明主猶悔淮南世祖聰達負愧齊王兄弟之際實宜深慎帝納之復委任道子如初時有人為雲中詩以指斥朝廷曰相王沈醉輕出教命捕賊千秋干豫朝政王愷守常國寶馳競荊州大度散誕難名盛德之流法護王寧仲堪仙民特有言詠東山安道執操高抗何不徵之以為朝匠荊州謂王忱也法護即王珣寧即王恭仙民即徐邈字安道戴逵字也及恭帝為琅邪王道子受封會稽國并宣城為五萬九千戶安帝踐阼有司奏道子宜進位太傅揚州牧中書監假黃鉞備殊禮固辭不拜又解徐州詔內外衆事動靜咨之帝既冠道子稽首歸政王國寶始總國權勢傾朝廷王恭乃舉兵討之道子懼收國寶付廷尉并其從弟琅邪內史緒悉斬之以謝於恭恭即罷兵道子乞解中外都督録尚書以謝方嶽詔不許道子世子元顯時年十六為侍中心惡恭請道子討之乃拜元顯為征虜將軍其先衛府及徐州文武悉配之屬道子妃薨帝下詔曰會稽王妃尊賢莫二朕義同所親今葬加殊禮一依琅邪穆太妃故事元顯夙令光懋乃心所寄誠孝性蒸蒸至痛難奪然不以家事辭王事陽秋之明義不以私限違公制中代之變禮故閔子腰絰山王逼屈良以至戚由中軌容著外有禮無時賢哲斯順須妃葬畢可居職如故于時王恭威振內外道子甚懼復引譙王尚之以為腹心尚之説道子曰藩伯強盛宰相權輕宜密樹置以自藩衛道子深以為然乃以其司馬王愈為江州刺史以備恭與尚之等日夜謀議以伺四方之隙王恭知之復舉兵以討尚之為名荊州刺史殷仲堪豫州刺史庾楷廣州刺史桓玄並應之道子使人説楷曰本情相與可謂斷金往年帳中之飲結帶之言寧可忘邪卿今棄舊交結新援忘王恭疇昔陵侮之恥乎若乃欲委體而臣之若恭得志以卿為反覆之人必不相信何富貴可保禍敗亦旋及矣楷怒曰王恭昔赴山陵相王憂懼無計我知事急即勒兵而至去年之事亦俟命而奮我事相王無相負者既不能距恭反殺國寶自爾已來誰復敢攘袂於君之事乎庾楷實不能以百口助人屠滅當與天下同舉誅鉏姦臣何憂府不開爵不至乎時楷已應恭檄正徵士馬信反朝廷憂懼於是內外戒嚴元顯攘袂慷慨謂道子曰去年不討王恭致有今役今若復從其欲則太宰之禍至矣道子日飲醇酒而委事於元顯元顯雖年少而聰明多涉志氣果鋭以安危為己任尚之為之羽翼時相傅會者皆謂元顯有明帝神武之風於是以為征討都督假節統前將軍王珣左將軍謝琰及將軍桓之才毛泰高素等伐恭滅之既而楊佺期桓玄殷仲堪等復至石頭元顯於竹里馳還京師遣丹楊尹王愷鄱陽太守桓放之新蔡內史何嗣潁川太守溫詳新安太守孫泰等發京邑士庶數萬人據石頭以距之道子將出頓中堂忽有驚馬蹂藉軍中因而擾亂赴江而死者甚衆仲堪既知王恭敗死狼狽西走與桓玄屯于尋陽朝廷嚴兵相距內外騷然詔元顯甲杖百人入殿尋加散騎常侍中書令又領中領軍持節都督如故會道子有疾加以昏醉元顯知朝望去之謀奪其權諷天子解道子揚州司徒而道子不之覺元顯自以少年頓居權重慮有譏議於是以琅邪王領司徒元顯自為揚州刺史既而道子酒醒方知去職於是大怒而無如之何廬江太守會稽張法順以刀筆之才為元顯謀主交結朋援多樹親黨自桓謙以下諸貴遊皆斂衽請交元顯性苛刻生殺自己法順屢諫不納又發東土諸郡免奴為客者號曰樂屬移置京師以充兵役東土囂然人不堪命天下苦之矣既而孫恩乘釁作亂加道子黃鉞元顯為中軍以討之又加元顯録尚書事然道子更為長夜之飲政無大小一委元顯時謂道子為東録元顯為西録西府車騎填湊東第門下可設雀羅矣元顯無良師友正言弗聞諂譽日至或以為一時英傑或謂為風流名士由是自謂無敵天下故驕侈日增帝又以元顯有翼亮之功加其所生母劉氏為會稽王夫人金章紫綬會洛陽覆沒道子以山陵幽辱上疏送章綬請歸藩不許及太皇太后崩詔道子乘輿入殿元顯因諷禮官下議稱己德隆望重既録百揆內外羣僚皆應盡敬於是公卿皆拜于時軍旅荐興國用虛竭自司徒已下日釰七升而元顯聚斂不已富過帝室及謝琰為孫恩所害元顯求領徐州刺史加侍中後將軍開府儀同三司都督十六州諸軍事封其子彥璋為東海王尋以星變元顯解録復加尚書令會孫恩至京口元顯柵斷石頭率兵距戰頻不利道子無他謀略唯日禱蔣侯廟為厭勝之術既而孫恩遁于北海桓玄復據上流致箋於道子曰賊造近郊以風不得進以雨不致火食盡故去耳非力屈也昔國寶卒後王恭不乘此威入統朝政足見其心非侮於明公也而謂之非忠今之貴要腹心有時流清望者誰乎豈可云無佳勝直是不能信之耳用理之人然後可以信義相期求利之徒豈有所惜而更委信邪爾來一朝一夕遂成今日之禍矣阿衡之重言何容易求福則立至干忤或致禍在朝君子豈不有懷但懼害及身耳玄忝任在遠是以披寫事實元顯覽而大懼張法順謂之曰桓玄承籍門資素有豪氣既并殷楊專有荊楚然桓氏世在西藩人或為用而第下之所控引止三吳耳孫恩為亂東土塗地編戶飢饉公私不贍玄必乘此縱其姦凶竊用憂之元顯曰為之奈何法順曰玄始據荊州人情未輯方就綏撫未遑他計及其如此發兵誅之使劉牢之為前鋒而第下以大軍繼進桓玄之首必懸於麾下矣元顯以為然遣法順至京口謀於牢之而牢之有疑色法順還説元顯曰觀牢之顏色必二於我未若召入殺之不爾敗人大事元顯不從道子尋拜侍中太傅置左右長史司馬從事中郎四人崇異之儀備盡盛典其驃騎將軍僚佐文武即配太傅府加元顯侍中驃騎大將軍開府征討大都督十八州諸軍事儀同三司加黃鉞班劍二十人以伐桓玄竟以牢之為前鋒法順又言於元顯曰自舉大事未有威斷桓謙兄弟每為上流耳目斬之以孤荊楚之望且事之濟不繼在前軍而牢之反覆萬一有變則禍敗立至可令牢之殺謙兄弟以示不二若不受命當逆為其所元顯曰非牢之無以當桓玄且始事而誅大將人情必動二三不可于時揚土飢虛運漕不繼玄斷江路商旅遂絶於是公私匱乏士卒唯給橡大軍將發玄從兄驃騎長史石生馳使告玄玄進次尋陽傳檄京師罪狀元顯俄而玄至西陽帝戎服餞元顯于西池始登舟而玄至新亭元顯棄船退屯國子學堂明日列陳于宣陽門外元顯佐吏多散走或言玄已至大桁劉牢之遂降于玄元顯回入宣陽門牢之參軍張暢之率衆逐之衆潰元顯奔入相府唯張法順隨之問計於道子道子對之泣玄遣太傅從事中郎毛泰收元顯送于新亭縛於舫前而數之元顯答曰為王誕張法順所誤於是送付廷尉并其六子皆害之玄又奏道子酣縱不孝當棄市詔徙安成郡使御史杜竹林防衛竟承玄旨鴆殺之時年三十九帝三日哭於西堂及玄敗大將軍武陵王遵承旨下令曰故太傅公阿衡二世契闊皇家親賢之重地無與二驃騎大將軍內總朝維外宣威略志蕩世難以寧國祚天未靜亂禍酷備鍾悲動區宇痛貫人鬼感惟永往心情崩隕今皇祚反正幽顯式宜崇明國體以述舊典便可追崇太傅為丞相加殊禮一依安平獻王故事追贈驃騎為太尉加羽葆鼓吹丞相墳塋翳然飄薄非所須南道清通便奉迎神柩太尉宜便遷改可下太史詳吉日定宅兆於是遣通直常侍司馬珣之迎道子柩于安成時寇賊未平喪不時達義熙元年合葬於王妃陵追諡元顯曰忠以臨川王寶子修之為道子嗣尊妃王氏為太妃義熙中有稱元顯子秀熙避難蠻中而至者太妃請以為嗣於是修之歸于別第劉裕意其詐而案驗之果散騎郎滕羡奴勺藥也竟坐棄市太妃不悟哭之甚慟修之復為嗣薨諡悼王無子國除史臣曰泰始之受終也乃憲章往昔稽古前王廣誓山河大開藩屏文昭武穆方駕於魯衛應韓磐石犬牙連衡於吳楚齊代然而作法於亂付託非才何曾歎經國之無謀郭欽識危亡之有兆及宮車晏駕墳土未乾國難荐臻朝章弛廢重以八王繼亂九服沸騰戎羯交馳乘輿幽逼瑤枝瓊萼隨鋒鏑而消亡朱芾緑車與波塵而殄瘁遂使茫茫禹迹咸窟穴於豺狼惵惵周餘竟沈淪於塗炭嗚呼運極數窮一至于此詳觀載籍未或前聞道子地則親賢任惟元輔耽荒麴糱信惑讒諛遂使尼媼竊朝權姦邪制國命始則彝倫攸斁終則宗社淪亡元顯以童之年受棟梁之寄專制朝廷陵蔑君親奮庸瑣之常材抗姦凶之巨寇喪師殄國不亦宜乎斯則元顯為安帝之孫強道子實晉朝之宰嚭者也列代之崇建維城用藩王室有晉之分封子弟實樹亂階詩云懷德惟寧宗子維城無俾城壞無獨斯畏城既壞矣畏也宜哉典午之喪亂弘多實此之由矣贊曰帝子分封嬰此鞠凶札瘥繼及禍難仍鍾秦獻聰悟清河內顧淮南忠勇宣城識度道子昏凶遂傾國祚
