body:
  text: 晉書卷十五志第五地理下青州徐州荊州揚州交州廣州青州案禹貢為海岱之地舜置十二牧則其一也舜以青州越海又分為營州則遼東本為青州矣周禮正東曰青州蓋取土居少陽其色為青故以名也春秋元命包云虛危流為青州漢武帝置十三州因舊名歷後漢至晉不改州統郡國六縣三十七戶五萬三千齊國秦置郡漢以為國景帝以為北海郡統縣五戶一萬四千臨淄西安有棘里亭東安平女水出東北廣饒昌國樂毅所封濟南郡漢置統縣五戶五千或云魏平蜀徙其豪將家於濟河北故改為濟岷郡而太康地理志無此郡名未之詳平壽古國寒浞封此下密有三石祠膠東侯國即墨有天山祠祝阿樂安國漢置統縣八戶一萬一千高苑臨濟有蚩尤祠博昌有薄姑祠利益侯相蓼城侯國鄒壽光古斟灌氏所封國東朝陽城陽郡漢置屬北海自魏至晉分北海而立焉郡統縣十戶一萬二千莒故莒子國姑幕古薄姑氏國諸淳于故淳于公國東武高密漢改為郡壯武黔陬平昌昌安東萊國漢置郡統縣六戶六千五百掖侯相當利侯國盧鄉曲城黃有萊山松林萊君祠侯國有百支萊王祠長廣郡咸寧三年置統縣三戶四千五百不其侯國長廣挺惠帝元康十年又置平昌郡又分城陽之黔陬壯武淳于昌安高密平昌營陵安丘大劇臨朐十一縣為高密國自永嘉喪亂青州淪沒石氏東萊人曹嶷為刺史造廣固城後為石季龍所滅季龍末遼西段龕自號齊王據青州慕容恪滅趙克青州苻氏平燕盡有其地及苻氏敗後刺史苻朗以州降朝廷置幽州以別駕辟閭渾為刺史鎮廣固隆安四年為慕容德所滅遂都之是為南燕復改為青州德以并州牧鎮陰平幽州刺史鎮發干徐州刺史鎮莒城青州刺史鎮東萊兗州刺史鎮梁父慕容超移青州於東萊郡後為劉裕所滅留長史羊穆之為青州刺史築東陽城而居之自元帝渡江於廣陵僑置青州至是始置北青州鎮東陽城以僑立州為南青州而後省南青州而北青州直曰青州徐州案禹貢海岱及淮之地舜十二牧則其一也於周入青州之域春秋元命包云天氐流為徐州蓋取舒緩之義或云因徐丘以立名秦兼天下以置泗水薛琅邪三郡楚漢之際分置東陽郡漢又分置東海郡改泗水為沛改薛為魯分沛置楚國以東陽屬吳國景帝改吳為江都武帝分沛東陽置臨淮郡改江都為廣陵及置十三州以其地為徐州統楚國及東海琅邪臨淮廣陵四郡宣帝改楚為彭城郡後漢改為彭城國以沛郡之廣戚縣來屬改臨淮為下邳國及太康元年復分下邳屬縣在淮南者置臨淮郡分琅邪置東莞郡州凡領郡國七縣六十一戶八萬一千二十一彭城國漢以為郡統縣七戶四千一百二十一彭城故殷伯太彭國留張良所封廣戚傅陽武原呂梧下邳國漢置為臨淮郡統縣七戶七千五百下邳葛嶧山在西古嶧陽也韓信為楚王都之淩良城侯相睢陵夏丘取慮僮東海郡漢置統縣十二戶一萬一千一百郯故郯子國祝其羽山在縣之西朐襄賁利城贛榆厚丘蘭陵承昌慮合鄉戚琅邪國秦置郡統縣九戶二萬九千五百開陽侯相臨沂陽都繒即丘華費魯季氏邑東安蒙陰山在西南東莞郡太康中置統縣八戶一萬東莞故魯鄆邑朱虛營陵尚父呂望所封安丘故莒渠丘父封邑蓋臨朐有海水祠劇廣廣陵郡漢置統縣八戶八千八百淮陰射陽輿海陵有江海會祠廣陵鹽瀆淮浦江都有江水祠臨淮郡漢置章帝以合下邳太康元年復立統縣十戶一萬盱眙東陽高山贅其潘旌高郵淮陵司吾下相徐太康十年以青州城陽郡之莒姑幕諸東武四縣屬東莞元康元年分東海置蘭陵郡七年又分東莞置東安郡分臨淮置淮陵郡以堂邑置堂邑郡永嘉之亂臨淮淮陵並淪沒石氏元帝渡江之後徐州所得惟半乃僑置淮陽陽平濟陰北濟陰四郡又琅邪國人隨帝過江者遂置懷德縣及琅邪郡以統之是時幽冀青并兗五州及徐州之淮北流人相帥過江淮帝並僑立郡縣以司牧之割吳郡之海虞北境立郯朐利城祝其厚丘西隰襄賁七縣寄居曲阿以江乘置南東海南琅邪南東平南蘭陵等郡分武進立臨淮淮陵南彭城等郡屬南徐州又置頓丘郡屬北徐州明帝又立南沛南清河南下邳南東莞南平昌南濟陰南濮陽南太平南泰山南濟陽南魯等郡以屬徐兗二州初或居江南或居江北或以兗州領州郗鑒都督青兗二州諸軍事兗州刺史加領徐州刺史鎮廣陵蘇峻平後自廣陵還鎮京口又於漢故九江郡界置鍾離郡屬南徐州江北又僑立幽冀青并四州穆帝時移南東海七縣出居京口義熙七年始分淮北為北徐州淮南但為徐州統彭城沛下邳蘭陵東莞東安琅邪淮陽陽平濟陰北濟陰十一郡以盱眙立盱眙郡統考城直瀆陽城三縣又分廣陵界置海陵山陽二郡後又以幽冀合徐州青并合兗州荊州案禹貢荊及衡陽之地舜置十二牧則其一也周禮正南曰荊州春秋元命包云軫星散為荊州荊強也言其氣躁強亦曰警也言南蠻數為寇逆其人有道後服無道先強常警備也又云取名於荊山六國時其地為楚及秦取楚鄢郢為南郡又取巫中地為黔中郡以楚之漢北立南陽郡滅楚之後分黔中為長沙郡漢高祖分長沙為桂陽郡改黔中為武陵郡分南郡為江夏郡武帝又分長沙為零陵郡及置十三州因舊名為荊州統南郡南陽零陵桂陽武陵長沙江夏七郡後漢獻帝建安十三年魏武盡得荊州之地分南郡以北立襄陽郡又分南陽西界立南鄉郡分枝江以西立臨江郡及敗於赤壁南郡以南屬吳吳後遂與蜀分荊州於是南郡零陵武陵以西為蜀江夏桂陽長沙三郡為吳南陽襄陽南鄉三郡為魏而荊州之名南北雙立蜀分南郡立宜都郡劉備沒後宜都武陵零陵南郡四郡之地悉復屬吳魏文帝以漢中遺黎立魏興新城二郡明帝分新城立上庸郡孫權分江夏立武昌郡又分蒼梧立臨賀郡分長沙立衡陽湘東二郡孫休分武陵立天門郡分宜都立建平郡孫晧分零陵立始安郡分桂陽立始興郡又分零陵立邵陵郡分長沙立安成郡荊州統南郡武昌武陵宜都建平天門長沙零陵桂陽衡陽湘東邵陵臨賀始興始安十五郡其南陽江夏襄陽南鄉魏興新城上庸七郡屬魏之荊州及武帝平吳分南郡為南平郡分南陽立義陽郡改南鄉為順陽郡又以始興始安臨賀三郡屬廣州以揚州之安成郡來屬州統郡二十二縣一百六十九戶三十五萬七千五百四十八江夏郡漢置統縣七戶二萬四千安陸橫尾山在東北古之陪尾山雲杜故雲子國曲陵平春鄳竟陵章山在東北古之內方山南新市南郡漢置統縣十一戶五萬五千江陵故楚都編有雲夢官當陽華容鄀故鄀子國枝江故羅國旌陽州陵楚嬖人州侯所邑監利松滋石首襄陽郡魏置統縣八戶二萬二千七百宜城故鄢也中廬臨沮荊山在東北鳦襄陽侯相山都鄧城鄾南陽國秦置郡統縣十四戶二萬四千四百宛西鄂侯相雉魯陽公國相犨淯陽公國相博望公國相堵陽葉侯相有長城山號曰方城舞陰公國相比陽公國相涅陽冠軍酈順陽郡太康中置統縣八戶二萬一百酇順陽南鄉丹水武當侯相陰築陽析義陽郡太康中置統縣十二戶一萬九千新野侯相穰鄧故鄧侯國蔡陽隨故隨國安昌棘陽厥西平氏桐柏山在南義陽平林朝陽新城郡魏置統縣四戶一萬五千二百房陵綏陽昌魏沶鄉魏興郡魏置統縣六戶一萬二千晉興安康西城錫長利洵陽上庸郡魏置統縣六戶一萬一千四百四十八上庸侯相安富北巫武陵上廉微陽建平郡吳晉各有建平郡太康元年合統縣八戶一萬三千二百巫北井秦昌信陵興山建始秭歸故楚子國沙渠宜都郡吳置統縣三戶八千七百夷陵夷道佷山南平郡吳置以為南郡太康元年改曰南平統縣四戶七千作唐孱陵南安江安武陵郡漢置統縣十戶一萬四千臨沅龍陽漢壽沅陵黚陽酉陽鐔城沅南遷陵舞陽天門郡吳置統縣五戶三千一百零陽漊中充臨澧澧陽長沙郡漢置統縣十戶三萬三千臨湘攸下雋醴陵劉陽建寧吳昌羅蒲沂巴陵衡陽郡吳置故屬長沙統縣九戶二萬三千湘鄉重安湘南湘西蒸陽衡山連道新康益陽湘東郡吳置故屬長沙統縣七戶一萬九千五百酃茶陵臨蒸利陽陰山新平新寧零陵郡漢置統縣十一戶二萬五千一百泉陵有香茅云古貢之以縮酒祁陽零陵營浦洮陽永昌觀陽營道舂陵泠道應陽東界有鼻墟云象所封邵陵郡吳置統縣六戶一萬二千邵陵都梁夫夷建興邵陽高平桂陽郡漢置統縣六戶一萬一千三百郴項羽封義帝之邑耒陽便臨武晉寧南平武昌郡吳置統縣七戶一萬四千八百武昌故東鄂也楚子熊渠封中子紅於此柴桑有湓口關陽新沙羡有夏口對沔口有津沙陽鄂有新興馬頭鐵官官陵安成郡吳置統縣七戶三千平都宜春新諭永新安復萍鄉廣興惠帝分桂陽武昌安成三郡立江州以新城魏興上庸三郡屬梁州又分義陽立隨郡分南陽立新野郡分江夏立竟陵郡懷帝又分長沙衡陽湘東零陵邵陵桂陽及廣州之始安始興賀九郡置湘州時蜀亂又割南郡之華容州陵監利三縣別立豐都合四縣置成都郡為成都王穎國居華容縣愍帝建興中併還南郡亦併豐都於監利元帝渡江又僑立新興南河東二郡穆帝時又分零陵立營陽郡以義陽流人在南郡者立為義陽郡又以廣州之臨賀始興始安三郡及江州之桂陽益州之巴東合五郡來屬以長沙衡陽湘東零陵邵陵營陽六郡屬湘州桓溫又分南郡立武寧郡安帝又僑立南義陽東義陽長寧三郡義熙十三年省湘州長沙衡陽湘東零陵邵陵營陽還入荊州揚州案禹貢淮海之地舜置十二牧則其一也周禮東南曰揚州春秋元命包云牽牛流為揚州分為越國以為江南之氣躁徑厥性輕揚亦曰州界多水水波揚也於古則荒服之國戰國時其地為楚分秦始皇并天下以置鄣會稽九江三郡項羽封英布為九江王盡有其地漢改九江曰淮南即封布為淮南王六年分淮南置豫章郡十一年布誅立皇子長為淮南王封劉濞為吳王二國盡得揚州之地文帝十六年分淮南立廬江衡山二郡景帝四年封皇子非為江都王并得鄣會稽郡而不得豫章武帝改江都曰廣陵封皇子胥為王而以屬徐州元封二年改鄣曰丹楊改淮南復為九江後漢順帝分會稽立吳郡揚州統會稽丹楊吳豫章九江廬江六郡省六安并廬江郡獻帝興平中孫策分豫章立廬陵郡孫權又分豫章立鄱陽郡分丹楊立新都郡孫亮又分豫章立臨川郡分會稽立臨海郡孫休又分會稽立建安郡孫晧分會稽立東陽郡分吳立吳興郡分豫章廬陵長沙立安成郡分廬陵立廬陵南部都尉揚州統丹楊吳會稽吳興新都東陽臨海建安豫章鄱陽臨川安成廬陵南部十四郡江西廬江九江之地自合肥之北至壽春悉屬魏及晉平吳以安成屬荊州分丹楊之宣城宛陵陵陽安吳涇廣德寧國懷安石城臨城春穀十一縣立宣城郡理宛陵改新都曰新安郡改廬陵南部為南康郡分建安立晉安郡又分丹楊立毗陵郡揚州合統郡十八縣一百七十三戶三十一萬一千四百丹楊郡漢置統縣十一戶五萬一千五百建鄴本秣陵孫氏改為建業武帝平吳以為秣陵太康三年分秣陵北為建鄴改業為鄴江寧太康二年分建鄴置丹楊丹楊山多赤柳在西也于湖蕪湖永世溧陽溧水所出江乘句容有茅山湖熟秣陵宣城郡太康二年置統縣十一戶二萬三千五百宛陵侯相彭澤聚在西南宣城陵陽淮水出東北入江仙人陵陽子明所居安吳臨城石城涇春穀孝武改春為陽廣德寧國懷安淮南郡秦置九江郡漢以為淮南國漢武帝置為九江郡武帝改為淮南郡統縣十六戶三萬三千四百壽春成德下蔡義城西曲陽平阿有塗山歷陽全椒阜陵漢明帝時淪為麻湖鍾離故州來邑合肥逡遒陰陵當塗古塗山國東城烏江廬江郡漢置統縣十戶四千二百陽泉舒故國有桐鄉灊天柱山在南有祠皖尋陽居巢桀死於此臨湖襄安龍舒六故六國毗陵郡吳分會稽無錫已西為屯田置典農校尉太康二年省校尉為毗陵郡統縣七戶一萬二千丹徒故朱方曲阿故雲陽武進延陵毗陵既陽無錫有磨山春申君祠吳郡漢置統縣十一戶二萬五千吳故國具區在西嘉興海鹽鹽官錢唐武林山武林水所出富陽桐廬建德壽昌海虞婁吳興郡吳置統縣十戶二萬四千烏程臨安餘杭武康故防風氏國東遷於潛有潛水故鄣安吉原鄉長城會稽郡秦置統縣十戶三萬山陰會稽山在南上有禹冢上虞有仇亭舜避丹朱於此地餘姚有句餘山在南句章鄞有鮚崎亭鄮始寧剡永興諸暨東陽郡吳置統縣九戶一萬二千長山有赤松子廟永康烏傷吳寧太末信安豐安定陽遂昌新安郡吳置統縣六戶五千始新遂安黝歙海寧黎陽臨海郡吳置統縣八戶一萬八千章安臨海始豐永寧寧海松陽安固橫陽建安郡故秦閩中郡漢高帝五年以立閩越王及武帝滅之徙其人名為東冶又更名東城後漢改為候官都尉及吳置建安郡統縣七戶四千三百建安吳興東平建陽將樂邵武延平晉安郡太康三年置統縣八戶四千三百原豐新羅宛平同安候官羅江晉安溫麻豫章郡漢置統縣十六戶三萬五千南昌海昏新淦建城望蔡永修建昌吳平豫章彭澤艾康樂豐城新吳宜豐鍾陵臨川郡吳置統縣十戶八千五百臨汝西豐南城東興南豐永成宜黃安浦西寧新建鄱陽郡吳置統縣八戶六千一百廣晉鄱陽樂安餘汗鄡陽歷陵葛陽晉興廬陵郡吳置統縣十戶一萬二千二百西昌高昌石陽巴丘南野東昌遂興吉陽興平陽豐南康郡太康三年置統縣五戶一千四百贛雩都平固南康揭陽惠帝元康元年有司奏荊揚二州疆土廣遠統理尤難於是割揚州之豫章鄱陽廬陵臨川南康建安晉安荊州之武昌桂陽安成合十郡因江水之名而置江州永興元年分廬江之尋陽武昌之柴桑二縣置尋陽郡屬江州分淮南之烏江歷陽二縣置歷陽郡又以周玘創義討石冰割吳興之陽羡并長城縣之北鄉置義鄉國山臨津并陽羡四縣又分丹楊之永世置平陵及永世凡六縣立義興郡以表玘之功並屬揚州又以毗陵郡封東海王世子毗避毗諱改為晉陵懷帝永嘉元年又以豫章之彭澤縣屬尋陽郡愍帝立避帝諱改建鄴為建康元帝渡江建都揚州改丹楊太守為尹江州又置新蔡郡尋陽郡又置九江上甲二縣尋又省九江縣入尋陽是時司冀雍涼青并兗豫幽平諸州皆淪沒江南所得但有揚荊湘江梁益交廣其徐州則有過半豫州惟得譙城而已明帝太寧元年分臨海立永嘉郡統永寧安固松陽橫陽等四縣而揚州統丹楊吳郡吳興新安東陽臨海永嘉宣城義興晉陵十一郡自中原亂離遺黎南渡並僑置牧司在廣陵丹徒南城非舊土也及胡寇南侵淮南百姓皆渡江成帝初蘇峻祖約為亂於江淮胡寇又大至百姓南渡者轉多乃於江南僑立淮南郡及諸縣又於尋陽僑置松滋郡遙隸揚州咸康四年僑置魏郡廣川高陽堂邑等諸郡并所統縣並寄居京邑改陵陽為廣陽孝武寧康二年又分永嘉郡之永寧縣置樂成縣是時上黨百姓南渡僑立上黨郡為四縣寄居蕪湖尋又省上黨郡為縣又罷襄城郡為繁昌縣並以屬淮南安帝義熙八年省尋陽縣入柴桑縣柴桑仍為郡後又省上甲縣入彭澤縣舊江州督荊州之竟陵郡及何無忌為刺史表以竟陵去州遼遠去江陵三百里荊州所立綏安郡人戶入境欲資此郡助江濱戍防以竟陵郡還荊州又司州之弘農揚州之松滋二郡寄在尋陽人戶雜居並宜建督安帝從之後又省松滋郡為松滋縣弘農郡為弘農縣並屬尋陽郡交州案禹貢揚州之域是為南越之土秦始皇既略定揚越以謫戍卒五十萬人守五嶺自北徂南入越之道必由嶺嶠時有五處故曰五嶺後使任囂趙他攻越略取陸梁地遂定南越以為桂林南海象等三郡非三十六郡之限乃置南海尉以典之所謂東南一尉也漢初以嶺南三郡及長沙豫章封吳芮為長沙王十一年以南武侯織為南海王陸賈使還拜趙他為南越王割長沙之南三郡以封之武帝元鼎六年討平呂嘉以其地為南海蒼梧鬱林合浦日南九真交址七郡蓋秦時三郡之地元封中又置儋耳珠崖二郡置交址刺史以督之昭帝始元五年罷儋耳并珠崖元帝初元三年又罷珠崖郡後漢馬援平定交部始調立城郭置井邑順帝永和九年交址太守周敞求立為州朝議不許即拜敞為交址刺史桓帝分立高興郡靈帝改曰高涼建安八年張津為刺史士燮為交址太守共表立為州乃拜津為交州牧十五年移居番禺詔以邊州使持節郡給鼓吹以重城鎮加以九錫六佾之舞吳黃武五年割南海蒼梧鬱林三郡立廣州交址日南九真合浦四郡為交州戴良為刺史值亂不得入呂岱擊平之復還并交部赤烏五年復置珠崖郡永安七年復以前三郡立廣州及孫晧又立新昌武平九德三郡蜀以李恢為建寧太守遙領交州刺史晉平蜀以蜀建寧太守霍弋遙領交州得以便宜選用長吏平吳後省珠崖入合浦交州統郡七縣五十三戶二萬五千六百合浦郡漢置統縣六戶二千合浦南平蕩昌徐聞毒質珠官交址郡漢置統縣十四戶一萬二千龍編苟𧜞望海𥕟西于武寧朱鳶曲昜交興北帶稽徐安定南定海平新昌郡吳置統縣六戶三千麋泠婦人徵側為主處馬援平之嘉寧吳定封山臨西西道武平郡吳置統縣七戶五千武寧武興進山根寧安武扶安封溪九真郡漢置統縣七戶三千胥浦移風津梧建初常樂扶樂松原九德郡吳置周時越常氏地統縣八無戶九德咸歡南陵陽遂扶苓曲胥浦陽都洨日南郡秦置象郡漢武帝改名焉統縣五戶六百象林自此南有四國其人皆云漢人子孫今有銅柱亦是漢置此為界貢金供稅也盧容象郡所居朱吾西卷比景廣州案禹貢揚州之域秦末趙他所據之地及漢武帝以其地為交址郡至吳黃武五年分交州之南海蒼梧鬱林高梁四郡立為廣州俄復舊永安六年復分交州置廣州分合浦立合浦北部以都尉領之孫晧分鬱林立桂林郡及太康中吳平遂以荊州始安始興臨賀三郡來屬合統郡十縣六十八戶四萬三千一百二十南海郡秦置統縣六戶九千五百番禺四會增城博羅龍川平夷臨賀郡吳置統縣六戶二千五百臨賀謝沐馮乘封陽興安富川始安郡吳置統縣七戶六千始安始陽平樂荔浦常安熙平永豐始興郡吳置統縣七戶五千曲江桂陽始興含洭湞陽中宿陽山蒼梧郡漢置統縣十二戶七千七百廣信端溪高要建陵新寧猛陵鄣平農城元溪臨允都羅武城鬱林郡秦置桂林郡漢武帝更名統縣九戶六千布山阿林新邑晉平始建鬱平領方武熙安廣桂林郡吳置統縣八戶二千潭中武豐粟平羊平龍剛夾陽武城軍騰高涼郡吳置統縣三戶二千安寧高涼思平高興郡吳置統縣五戶一千二百廣化海安化平黃陽西平寧浦郡吳置統縣五戶一千二百二十寧浦連道吳安昌平平山武帝後省高興郡懷帝永嘉元年又以臨賀始興始安三郡凡二十縣為湘州元帝分鬱林立晉興郡成帝分南海立東官郡以始興臨賀二郡還屬荊州穆帝分蒼梧立晉康新寧永平三郡哀帝太和中置新安郡安帝分東官立義安郡恭帝分南海立新會郡
