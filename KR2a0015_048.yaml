body:
  text: 晉書卷四十八列傳第十八向雄向雄字茂伯河內山陽人也父韶彭城太守雄初仕郡為主簿事太守王經及經之死也雄哭之盡哀市人咸為之悲後太守劉毅嘗以非罪笞雄及吳奮代毅為太守又以少譴繫雄於獄司隸鍾會於獄中辟雄為都官從事會死無人殯斂雄迎喪而葬之文帝召雄而責之曰往者王經之死卿哭王經於東市我不問也今鍾會躬為叛逆又輒收葬若復相容其如王法何雄曰昔者先王掩骼埋胔仁流朽骨當時豈先卜其罪而後葬之哉今王誅既加於法已備雄感義收葬教亦無闕法立於上教弘於下何必使雄違生背死以立於時殿下讎枯骨而捐之中野為將來仁賢之資不亦惜乎帝甚悅與談宴而遣之累遷黃門侍郎時吳奮劉毅俱為侍中同在門下雄初不交言武帝聞之敕雄令復君臣之好雄不得已乃詣毅再拜曰向被詔命君臣義絕如何於是即去帝聞而大怒問雄曰我令卿復君臣之好何以故絕雄曰古之君子進人以禮退人以禮今之進人若加諸膝退人若墜諸川劉河內於臣不為戎首亦已幸甚安復為君臣之好帝從之泰始中累遷秦州刺史假赤幢曲蓋鼓吹賜錢二十萬咸寧初入為御史中丞遷侍中又出為征虜將軍太康初為河南尹賜爵關內侯齊王攸將歸藩雄諫曰陛下子弟雖多然有名望者少齊王臥在京邑所益實深不可不思帝不納雄固諫忤旨起而徑出遂以憤卒弟匡惠帝世為護軍將軍段灼段灼字休然敦煌人也世為西土著姓果直有才辯少仕州郡稍遷鄧艾鎮西司馬從艾破蜀有功封關內侯累遷議郎武帝即位灼上疏追理艾曰故征西將軍鄧艾心懷至忠而荷反逆之名平定巴蜀而受三族之誅臣竊悼之惜哉言艾之反也以艾性剛急矜功伐善而不能協同朋類輕犯雅俗失君子之心故莫肯理之臣敢昧死言艾所以不反之狀艾本屯田掌犢人宣皇帝拔之於農吏之中顯之於宰府之職處內外之官據文武之任所在輒有名績固足以明宣皇帝之知人矣會值洮西之役官兵失利刺史王經困於圍城之中當爾之時二州危懼隴右懍懍幾非國家之有也先帝以為深憂重慮思惟可以安邊殺敵莫賢於艾故授之以兵馬解狄道之圍圍解留屯上邽承官軍大敗之後士卒破膽將吏無氣倉庫空虛器械殫盡艾欲積穀強兵以待有事是歲少雨又為區種之法手執耒耜率先將士所統萬數而身不離僕虜之勞親執士卒之役故落門段谷之戰能以少擊多摧破強賊斬首萬計遂委艾以廟勝成圖指授長策艾受命忘身龍驤麟振前無堅敵蜀地阻險山高谷深而艾步乘不滿二萬束馬懸車自投死地勇氣陵雲將士乘勢故能使劉禪震怖君臣面縛軍不踰時而巴蜀蕩定此又固足以彰先帝之善任矣艾功名已成亦當書之竹帛傳祚萬世七十老公復何所求哉艾以禪初降遠郡未附矯令承制權安社稷雖違常科有合古義原心定罪事可詳論故鎮西將軍鍾會有吞天下之心恐艾威名知必不同因其疑似構成其事艾被詔書即遣強兵束身就縛不敢顧望誠自知奉見先帝必無當死之理也會受誅之後艾參佐官屬部曲將吏愚戇相聚自共追艾破壞檻車解其囚執艾在困地是以狼狽失據夫反非小事若懷惡心即當謀及豪傑然後乃能興動大眾不聞艾有腹心一人臨死口無惡言獨受腹背之誅豈不哀哉故見之者垂涕聞之者歎息此賈誼所以慷慨於漢文天下之事可為痛哭者良有以也陛下龍興闡弘大度受誅之家不拘用聽艾立後祭祀不絕昔秦人憐白起之無罪吳人傷子胥之冤酷皆為之立祠天下之人為艾悼心痛恨亦由是也謂可聽艾門生故吏收艾尸柩歸葬舊墓還其田宅以平蜀之功繼封其後使艾闔棺定諡死無所恨赦冤魂於黃泉收信義於後世則天下徇名之士思立功之臣必投湯火樂為陛下死矣帝省表甚嘉其意灼後復陳時宜曰臣聞天時不如地利地利不如人和三里之城五里之郭圜圍而攻之有不克者此天時不如地利城非不高池非不深穀非不多兵非不利委而去之此地利不如人和然古之王者非不先推恩德結固人心人心苟和雖三里之城五里之郭不可攻也人心不和雖金城湯池不能守也臣推此以廣其義舜彈五絃之琴詠南風之詩而天下自理由堯人可比屋而封也曩者多難姦雄屢起攪亂衆心刀鋸相乘流死之孤哀聲未絕故臣以為陛下當深思遠念杜漸防萌彈琴詠詩垂拱而已其要莫若推恩以協和黎庶故推恩足以保四海不推恩不足以保妻子是故唐堯以親睦九族為先周文以刑于寡妻為急明王聖主莫不先親後疏自近及遠臣以為太宰司徒衞將軍三王宜留洛中鎮守其餘諸王自州征足任者年十五以上悉遣之國為選中郎傅相才兼文武以輔佐之聽於其國繕修兵馬廣布恩信必撫下猶子愛國如家君臣分定百世不遷連城開地為晉魯衞所謂盤石之宗天下服其強矣雖云割地譬猶囊漏貯中亦一家之有耳若慮後世強大自可豫為制度使得推恩以分子弟如此則枝分葉布稍自削小漸使轉至萬國亦後世之利非所患也昔在漢世諸呂自疑內有朱虛東牟之親外有諸侯九國之強故不敢動搖於今之宜諸侯強大是為太山之固非我族類其心必異而魏法禁錮諸王親戚隔絕不祥莫大焉間者無故又瓜分天下立五等諸侯上不象賢下不議功而是非雜糅例受茅士似權時之宜非經久之制將遂不改此亦煩擾之人漸亂之階也夫國之興也由於九族親睦黎庶協和其衰也在於骨肉疏絕百姓離心故夏邦不安伊尹歸殷殷邦不和呂氏入周殷監在於夏后去事之誡誠來事之鑒也又陳曰昔伐蜀募取涼州兵馬羌胡健兒許以重報五千餘人隨艾討賊功皆第一而乙亥詔書州郡將督不與中外軍同雖在上功無應封者唯金城太守楊欣所領兵以逼江由之勢得封者三十人自金城以西非在欣部無一人封者苟在中軍之例雖下功必侯如在州郡雖功高不封非所謂近不重施遠不遺恩之謂也臣聞魚懸由於甘餌勇夫死於重報故荊軻慕燕丹之義專諸感闔閭之愛匕首振於秦庭吳刀耀於魚腹視死如歸豈不有由也哉夫功名重賞士之所競不平致怨由來久矣詩云尸鳩在桑其子七兮淑人君子其儀一兮臣以為此等宜蒙爵封灼前後陳事輒見省覽然身微宦孤不見進序乃取長假還鄉里臨去遣息上表曰臣受恩三世剖符守境試用無績沈伏數年犬馬之力無所復堪陛下弘廣納之聽採狂夫之言原臣侵官之罪不問干忤之愆天地恩厚於臣足矣臣聞忠臣之於其君猶孝子之於其親進則有欣然之慶非貪官也退則有戚然之憂非懷祿也其意在於不忘光君榮親情所不能已已者也臣伏自悼私懷至恨生長荒裔而久在外任自還抱疾未嘗覲見陛下竟不知臣何人此臣之恨一也遭運會之世值有事之時而不能垂功名於竹帛此臣之恨二也逮事聖明之君而悴羸劣陳力又不能當歸死於地下此臣之恨三也哀二親早亡隕兄弟並凋喪孝敬無復施於家門此臣之恨四也夏之日忽以過冬之夜尋復來人生百歲尚以為不足而臣中年嬰災此臣之恨五也慚日月之所養愧昊蒼而無報此臣之所以懷五恨而歎息臨歸路而自悼者也語有之曰華言虛也至言實也苦言藥也甘言疾也臣欲言天下太平而靈龜神狐未見仙芝萐莆未生麒麟未游乎靈禽之囿鳳皇未儀於太極之庭此臣之所以不敢華言而為佞者也昔漢高祖初定天下于時戍卒婁敬上書諫曰陛下取天下不與成周同而欲比隆成周臣竊以為不侔於是漢祖感悟深納其言賜姓為劉氏又顧謂陸賈曰為我著秦所以亡而吾所以得之者賈乃作新語之書述前世成敗以為勸戒又田肯建一言之計非親子弟莫可使王齊者而受千金之賜故世稱漢祖之寬明博納所以能成帝業也今之言世者皆曰堯舜復興天下已太平矣臣獨以為未亦竊有所勸焉且百王垂制聖賢吐言來事之明鑒也孟子曰堯不能以天下與舜則舜之有天下也天與之也昔舜為相堯崩三年之喪畢舜避堯之子於南河天下諸侯朝覲者獄訟者不之堯之子而之舜舜曰天也乃之中國踐天子位焉若居堯之宮逼堯之子非天所與者也曩昔西有不臣之蜀東有僭號之吳三主鼎足並稱天子魏文帝率萬乘之衆受禪於靡陂而自以德同唐虞以為漢獻即是古之堯自謂即是今之舜乃謂孟軻孫卿不通禪代之變遂作禪代之文刻石垂戒班示天下傳之後世亦安能使將來君子皆曉然心服其義乎然魏文徒希慕堯舜之名推新集之魏欲以同於唐虞之盛忽骨肉之恩忘藩屏之固竟不能使四海賓服混一皇化而于時羣臣莫有諫者不其過矣哉孫卿曰堯舜禪讓是不然矣天下者至重也非至強莫之能任至大也非至辯莫之能分至衆也非至明莫之能見此三至者非聖人莫之能盡由此言之孫卿孟軻亦各有所不取焉陛下受禪從東府入西宮兵刃耀天旌旗翳日雖應天順人同符唐虞然法度損益則亦不異於昔魏文矣故宜資三至以強制之而今諸王有立國之名而無襟帶之實又蜀地有自然之險是歷世姦雄之所闚逋逃之所聚也而無親戚子弟之守此豈深思遠慮杜漸防萌者乎昔漢文帝據已成之業六合同風天下一家而賈誼上疏陳當時之勢猶以為譬如抱火厝於積薪之下而寢其上火未及然因謂之安此言誠存不忘亡安不忘亂者也然臣之慺慺亦竊願陛下居安思危無曰高高在上常念臨深之義不忘履冰之戒盡除魏世之弊法綏以新政之大化使萬邦欣欣喜戴洪惠蜫蟲草木咸蒙恩澤朝廷詠康哉之歌山藪無伐之人此固天下所視望者也陛下自初踐阼發無諱之詔置箴諫之官赫然寵異諤諤之臣以明好直言之信恐陳事者知直言之不用皆杜口結舌祥瑞亦曷由來哉臣無陸生之才不在顧問之地蓋聞主聖臣直義在於有犯無隱臣不惟疏遠未信而言敢歷論前代隆名之君及亡敗之主廢興所由又博陳舉賢之路廣開養老之制崇必信之道又張設議者之難凡五事以聞臣之所言皆直陳古今已行故事非新聲異端也辭義實淺不足採納然臣私心誠謂有可發起覺悟遺忘願陛下察臣愚忠愍臣狂直無使天下以言者為戒疾痛增篤退念桑梓之詩惟狐死之義輒取長休歸近墳墓顧瞻宮闕繫情皇極不勝丹款遣息穎表言其一曰臣聞善有章也著在經典惡有罰也戒在刑書上自遠古下洎秦漢其明王霸主及亡國闇君故可得而稱至于忠蹇賢相及佞諂姦臣亦可得而言故朝有諤諤盡規之臣無不昌也任用阿諛唯唯之士無不亡也是有國者皆欲求忠以自輔舉賢以自佐而亡國破家者相繼皆由任失其人所謂賢者不賢忠者不忠也臣謹言前任賢所由興任不肖所以亡者堯之末年四凶在朝而不去八元在家而不舉然致天平地寧四門穆穆其功固在重華之為相夏癸放於鳴條商辛梟於牧野此俱萬乘之主而國滅身擒由不能屬任賢相用婦人之言荒淫無道肆志沈宴作靡靡之樂長夜之飲於是登糟丘臨酒池觀牛飲望肉林龍逢忠而被害比干諫而剖心天下之所以歸惡者也太甲暴虐顛覆湯之典制於是伊尹放之桐宮而能改悔反善三年而後歸于亳既已放而復還殷道微而復興諸侯咸服號稱太宗實賴阿衡之盡忠也周室既衰諸侯並爭天王微弱政遂陵遲齊桓公淫亂之主耳然所以能九合一匡之功有尊周之名誠管夷吾之力及其死也蟲流出門豈非任豎貂之過乎且一桓公之身得管仲其功如彼用豎貂其亂如此夫榮辱存亡實在所任可不審哉秦本伯翳之後微微小邑至秦仲始大有車馬禮樂侍御之好焉自穆公至於始皇皆能留心待賢遠求異士招由余於西戎致五羖於宛市取丕豹於晉鄉迎蹇叔於宗里由是四方雄俊繼踵而至故能世為強國吞滅諸侯奄有天下兼稱皇帝由謀臣之助也道化未淳崩于沙丘胡亥乘虐用詐自悞不能弘濟統緒克成堂構而乃殘賊仁義毒流黔首故陳勝吳廣奮臂大呼而天下響應於是趙高逆亂閻樂承指二世窮迫自戮望夷子嬰雖立去帝為王孤危無輔四旬而亡此由邪臣擅命指鹿為馬所以速秦之禍也秦失其鹿豪傑競逐項羽既得而失之其咎在烹韓生而范增之謀不用假令羽既距項伯之邪說斬沛公于鴻門都咸陽以號令諸侯則天下無敵矣而羽距韓生之忠諫背范增之深計自謂霸王之業已定都彭城還故鄉為晝被文繡此蓋世俗兒女之情耳而羽榮之是故五載為漢所擒至此尚不知覺悟乃曰天亡我非戰之罪甚痛矣哉且夫士之歸仁猶水之歸下禽之走曠野故曰為川驅魚者獺也為藪驅雀者鸇也為湯武驅人者桀紂也漢高祖起於布衣提三尺之刃而取天下用六國之資無唐虞之禪豈徒賴良平之奇謀盡英雄之智力而已乎亦由項氏為驅人也子孫承基二百餘年逮成帝委政舅家使權勢外移安昌侯張禹者漢之三公成帝保傅也帝親幸其家拜禹牀下深問天災人事禹當惟大臣之節為社稷深慮忠言嘉謀陳其災患則王氏不得專權寵王莽無緣乘勢位遂託雲龍而登天衢令漢祚中絕也禹佞諂不忠挾懷私計徒低仰於五侯之間苟取容媚而已是以朱雲抗節求尚方斬馬劍欲以斬禹以戒其餘可謂忠矣而成帝尚復不寤乃以為居下訕上廷辱保傅罪死無赦詔御史將雲下欲急烹之雲攀殿折檻幸賴左將軍辛慶忌叩頭流血以死爭之若不然則雲已摧碎矣後雖釋檻不修欲以彰明直臣誠足以為後世之戒何益於漢室所由亡也哉然世之論者以為亂臣賊子無道之甚者莫過於莽此亦猶紂之不善不如是之甚也傳稱莽始起外戚折節力行以要名譽宗族稱孝朋友歸仁及其輔政成哀之際勤勞國家動見稱述然于時人士詣闕上書薦莽者不可稱紀內外羣臣莫不歸莽功德遭遇漢室中微國嗣三絕而太后壽考為之宗主故莽得遂策命孺子而奪其位也昔湯武之興亦逆取而順守之耳向莽深惟殷周取守之術崇道德務仁義履信實去華偽施惠天下十有八年恩足以感百姓義足以結英雄人懷其德豪傑並用如此宗廟社稷宜未滅也光武雖復賢才大業詎可冀哉莽即位之後自謂得天人之助以為功廣三王德茂唐虞乃自驕矜奮其威詐班宣符讖震暴殘酷窮凶極惡人怨神怒冬雷電以驚其耳目夏地動以惕其心腹而莽猶不知覺悟方復重行不順時之令竟連伍之刑佞媚者親幸忠諫者誅夷由是天下忿憤內外俱發四海分崩城池不守身死於匹夫之手為天下笑豈不異哉其所由然者非取之過而守之非道也莽既屠肌六合雲擾劉聖公已立而不辨盆子承之而覆敗公孫述又稱帝於蜀漢如此數子固非所謂應天順人者徒為光武之驅除者耳夫天下者蓋亦天下之天下非一人之天下也殷商之旅其會如林矢于牧野維予侯興又曰侯服于周天命靡常由此言之主非常人也有德則天下歸之無德則天下叛之故古之明王其勞心遠慮常如臨川無津涯於是法天地象四時隆恩德敬大臣近忠直遠佞人仁孝著乎宮牆弘化洽乎兆庶為平直如砥矢信義感人神雖有椒房外戚之寵不受其委曲之言雖有近習愛幸之豎不聽其姑息之辭四門穆穆闢而不闔待諫者而無忌戰戰慄慄不忘戒懼所以欲永終天祿恐為將來賢聖之驅除也且臣聞之懼危者常安者也憂亡者存者也使夫有國之君能安不忘危則本枝百世長保榮祚名位與天地無窮亦何慮乎為來者之驅除哉傳有之曰狂夫之言明主察焉其二曰士之立業行非一概吳起貪官母死不歸殺妻求將不孝之甚然在魏使秦人不敢東向在楚則三晉不敢南謀曾參閔騫誠孝子也不能宿夕離其親豈肯出身致死涉危險之地哉今大晉應期運之所授齊聖美於有虞而吳人不臣稱帝私附此亦國之羞也陛下誠欲致熊羆之士不二心之臣使奮威淮浦震服蠻荊者故宜疇咨博采廣開貢士之路薦巖穴舉賢才徵命考試匪俊莫用今臺閣選舉塗塞耳目九品訪人唯問中正故據上品者非公侯之子孫則當塗之昆弟也二者苟然則蓽門蓬戶之俊安得不有陸沈者哉其三曰昔田子方養老馬而窮士知所歸況居天下之廣居立天下之正位行天下之大道乎昔明王聖主無不養老老人衆多未必皆賢不可悉養故父事三老所以明孝宗事五更所以明敬孟子曰吾老以及人之老吾幼以及人之幼今天下雖定而華山之陽無放馬之羣桃林之下未有休息之牛故以吳人尚未臣服故也夫饑者易為食渴者易為飲天下元元瞻望新政願陛下思子方之仁念犬馬之勞思帷蓋之報發仁惠之詔廣開養老之制其四曰法令賞罰莫大乎信古人有言人而無信不知其可況有養人以惠使人以義而可以不信行之哉臣前為西郡太守被州所下己未詔書羌胡道遠其但募取樂行不樂勿強臣被詔書輒宣恩廣募示以賞信所得人名即條言征西其晉人自可差簡丁強如法調取至於羌胡非恩意告諭則無欲度金城河西者也自往每興軍渡河未曾有變故刺史郭綏勸帥有方深加奬厲要許重報是以所募感恩利賞遂立績效功在第一今州郡督將並已受封羌胡健兒或王或侯不蒙論也晉文猶不貪原而失信齊桓不惜地而背盟況聖主乎其五曰昔周漢之興樹親建德周因五等之爵漢有河山之誓及其衰也神器奪於重臣國祚移於他人故滅周者秦非姬姓也代漢者魏非劉氏也於今國家大計使異姓無裂土專封之邑同姓並據有連城之地縱復令諸王後世子孫還自相并蓋亦楚人失繁弱於雲夢尚未為亡其弓也其於神器不移他族則始祖不遷之廟萬年億兆不改其名矣大晉諸王二十餘人而公侯伯子男五百餘國欲言其國皆小乎則漢祖之起俱無尺土之地況有國者哉將謂大晉世世賢聖而諸侯之胤常不肖邪則放勛欽明而有丹朱瞽瞍頑凶而有虞舜天下有事無不由兵而無故多樹兵本廣開亂原臣故曰五等不便也臣以為可如前表諸王宜大其國增益其兵悉遣守藩使形勢足以相接則陛下可高枕而臥耳臣以為諸侯伯子男名號皆宜改易之使封爵之制祿奉禮秩並同天下諸侯之例臣聞與覆車同軌者未嘗安也與死人同病者未嘗生也與亡國同法者未嘗存也況夫巍巍大晉方將登太山禪梁父刻石書勳垂示無窮宜遠鑒往代興廢深為嚴防使著事奮筆必有紀焉昔伊尹恥其君不為堯舜此臣所以私懷慷慨自忘輕賤者也灼書奏帝覽而異焉擢為明威將軍魏興太守卒于官閻纘閻纘字續伯巴西安漢人也祖圃為張魯功曹勸魯降魏封平樂鄉侯父璞嗣爵仕吳至牂柯太守纘僑居河南新安少游英豪多所交結博覽墳典該通物理父卒繼母不慈纘恭事彌謹而母疾之愈甚乃誣纘盜父時金寶訟于有司遂被清議十餘年纘無怨色孝謹不怠母後意解更移中正乃得復品為太傅楊駿舍人轉安復令駿之誅也纘棄官歸要駿故主簿潘岳掾崔基等共葬之基岳畏罪推纘為主墓成當葬駿從弟模告武陵王澹將表殺造意者衆咸懼填冢而逃纘獨以家財成墓葬駿而去國子祭酒鄒湛以纘堪佐著作薦於祕書監華嶠嶠曰此職閑廩重貴勢多爭之不暇求其才遂不能用河間王顒引為西戎校尉司馬有功封平樂鄉侯愍懷太子之廢也纘輿棺詣闕上書理太子之冤曰伏見赦文及牓下前太子遹手疏以為驚愕自古以來臣子悖逆未有如此之甚也幸賴天慈全其首領臣伏念遹生於聖父而至此者由於長養深宮沈淪富貴受饒先帝父母驕之每見選師傅下至羣吏率取膏粱擊鍾鼎食之家希有寒門儒素如衞綰周文石奮疎廣洗馬舍人亦無汲黯鄭莊之比遂使不見事父事君之道臣案古典太子居以士禮與國人齒以此明先王欲令知先賤然後乃貴自頃東宮亦微太盛所以致敗也非但東宮歷觀諸王師友文學皆豪族力能得者率非龔遂王陽能以道訓友無亮直三益之節官以文學為名實不讀書但共鮮衣好馬縱酒高會嬉遊博弈豈有切磋能相長益臣常恐公族遲陵以此歎息今遹可以為戒恐其被斥棄逐遠郊始當悔過無所復及昔戾太子無狀稱兵距命而壺關三老上書有田千秋之言猶曰子弄父兵罪應笞耳漢武感悟之築思子之臺今遹無狀言語悖逆受罪之日不敢失道猶為輕於戾太子尚可禁持重選保傅如司空張華道德深遠乃心忠誠以為之師光祿大夫劉寔寒苦自立終始不衰年同呂望經籍不廢以為之保尚書僕射裴頠明允恭肅體道居正以為之友置游談文學皆選寒門孤宦以學行自立者及取服勤更事涉履艱難事君事親名行素聞者使與共處使嚴御史監護其家絕貴戚子弟輕薄賓客如此左右前後莫非正人師傅文學可令十日一講使共論議於前敕使但道古今孝子慈親忠臣事君及思愆改過之義皆聞善道庶幾可全昔太甲有罪放之三年思庸克復為殷明王又魏文帝懼於見廢夙夜自祗竟能自全及至明帝因母得罪廢為平原侯為置家臣庶子師友文學皆取正人共相匡矯兢兢慎罰事父以孝父沒事母以謹聞于天下于今稱之漢高皇帝數置酒於庭欲廢太子後四晧為師子房為傅竟復成就前事不忘後事之戒孟軻有云孤臣孽子其操心也危慮患也深故多善功李斯云慈母多敗子嚴家無格虜由陛下驕遹使至於此庶其受罪以來足自思改方今天下多虞四夷未寧將伺國隙儲副大事不宜空虛宜為大計小復停留先加嚴誨依平原侯故事若不悛改棄之未晚也臣素寒門無力仕宦不經東宮情不私遹念昔楚國處女諫其王曰有龍無尾言年四十未有太子臣嘗備近職雖未得自結天日情同閽寺悾悾之誠皆為國計臣老母見臣為表乃為臣卜卦云書御即死妻子守臣涕泣見止臣獨以為頻見拔擢嘗為近職此恩難忘何以報德唯當陳誠以死獻忠輒具棺絮伏須刑誅書御不省及張華遇害賈謐被誅朝野震悚纘獨撫華尸慟哭曰早語君遜位而不肯今果不免命也夫過叱賈謐尸曰小兒亂國之由誅其晚矣皇太孫立纘復上疏曰臣前上書訟太子之枉不見省覽昔壺關三老陳衞太子之冤而漢武築思子之臺高廟令田千秋上書不敢正言託以鬼神之教而孝武大感月中三遷位至丞相乘車入殿號曰車氏恨臣精誠微薄不能有感竟使太子流離沒命許昌向令陛下即納臣言不致此禍天贊聖意三公獻謀庶人賜死罪人斯得太子以明臣恨其晚無所復及詔書慈悼迎喪反葬復其禮秩誠副衆望不意呂霍之變復生於今日伏見詔書建立太孫斯誠陛下上順先典以安社稷中慰慈悼冤魂之痛下令萬國心有所繫追惟庶人所為無狀幾傾宗廟賴相國太宰至忠憤發潛謀俱斷奉贊聖意以成神武雖周誅二叔漢掃諸呂未足以喻臣願陛下因此大更釐改以為永制禮置太子居以士禮與國人齒為置官屬皆如朋友不為純臣既使上厭至望以崇孝道又令不相嚴憚易相規正昔漢武既信姦讒危害太子復用望氣之言欲盡誅詔獄中囚邴吉以皇孫在焉閉門距命後遂擁護皇孫督罰乳母卒至成人立為孝宣皇帝苟志於忠無往不可歷觀古人雖不避死亦由世教寬以成節吉雖距詔書事在於忠故宥而不責自晉興已來用法太嚴遲速之間輒加誅斬一身伏法猶可強為今世之誅動輒滅門昔呂后臨朝肆意無道周昌相趙三召其王而昌不遣先徵昌入乃後召王此由漢制本寬得使為快假令如今呂后必謂昌已反夷其三族則誰敢復為殺身成義者哉此法宜改可使經遠又漢初廢趙王張敖其臣貫高謀弒高祖高祖不誅以明臣道田叔孟舒十人為奴髠鉗隨王隱親侍養故令平安向使晉法得容為義東宮之臣得如周昌固護太子得如邴吉距詔不坐伏死諫爭則聖意必變太子以安如田叔孟舒侍從不罪者則隱親左右姦凶毒藥無緣得設太子不夭也臣每責東宮臣故無侍從者後聞頗有於道路望車拜辭而有司收付洛陽獄奏科其罪然臣故莫從良有以也又本置三率盛其兵馬所以宿衞防虞而使者卒至莫有警嚴覆請審者此由恐畏滅族今皇孫沖幼去事多故若有不虞強臣專制姦邪矯詐雖有相國保訓東宮擁佑之恩同於邴吉適可使玉體安全宜開來防可著于令自今已後諸有廢興倉卒羣臣皆得輒嚴須錄詣殿前面受口詔然後為信得同周昌不遣王節下聽臣子隱親得如田叔孟舒不加罪責則永固儲副以後安嗣之遠慮也來事難知往事可改臣前每見詹事裴權用心懇惻舍人秦戢數上疏啟諫而爰倩贈以九列權有忠意獨不蒙賞謂宜依倩為比以寵其魂推尋表疏如秦戢輩及司隸所奏諸敢拜辭於道路者明詔稱揚使微異於衆以勸為善以奬將來也纘又陳今相國雖已保傅東宮保其安危至於旦夕訓誨輔導出入動靜劬勞宜選寒苦之士忠貞清正老而不衰如城門校尉梁柳白衣南安朱沖比者以為師傅其侍臣以下文武將吏且勿復取盛戚豪門子弟若吳太妃家室及賈郭之黨如此之輩生而富溢無念修己率多輕薄浮華相驅放縱皆非所補益於吾少主者也皆可擇寒門篤行學問素士更履險易節義足稱者以備羣臣可輕其禮儀使與古同於相切磋為益昔魏文帝之在東宮徐幹劉楨為友文學相接之道並如氣類吳太子登顧譚為友諸葛恪為賓臥同牀帳行則參乘交如布衣相呼以字此則近代之明比也天子之子不患不富貴不患人不敬畏患於驕盈不聞其過不知稼穡之艱難耳至於甚者乃不知名六畜可不勉哉昔周公親撻伯禽曹參笞窋二百聖考慈父皆不傷恩今不忍小相維持令至闕失頓相罪責不亦誤哉在禮太子朝夕視膳昏定晨省跪問安否於情得盡五日一朝於敬既簡於恩亦疏易致構間故曰一朝不朝其間容刀五日之制起漢高祖身為天子父為庶人萬機事多故闕私敬耳今主上臨朝太子無事專主孝養宜改此俗文王世子篇曰王季一飯亦一飯再飯亦再飯安有逸豫五日一覲哉纘又陳今迎太子神柩孤魂獨行太孫幼沖不可涉道謂可遣妃奉迎遠路令其父衍隨行衞護皇太子初見誣陷臣家門無祐三世假親具嘗辛苦以家觀國固知太子有變臣故求副監國欲依邴吉故事距違來使供養擁護身親飲食醫藥冀足救危主者以臣名資輕淺不肯見與世人見笑謂為此職進退難居有必死憂臣獨以為苟全儲君賈氏所誅甘心所願今監國御史直副皆當三族侍衞無狀實自宜然臣謂其小人不足具責故孔子曰可以託六尺之孤臨大節而不可奪是以聖王慎選故河南尹向雄昔能犯難葬故將鍾會文帝嘉之始拔顯用至於先帝以為右率如間之事若得向雄之比則豈可觸哉此二使者但為愚怯亦非與謀但可誅身自全三族如郭俶郭斌則於刑為當又東宮亦宜妙選忠直亮正如向雄比陛下千秋萬歲之後太孫幼沖選置兵衞宜得柱石之士如周昌者世俗淺薄士無廉節賈謐小兒恃寵恣睢而淺中弱植之徒更相翕習故世號魯公二十四友又謐前見臣表理太子曰閻兒作此為健然觀其意欲與諸司馬家同皆為臣寒心伏見詔書稱明滿奮樂廣侍郎賈胤與謐親理而亦疏遠往免父喪之後停家五年雖為小屈有識貴之潘岳繆徵等皆謐父黨共相沈浮人士羞之聞其晏然莫不為怪今詔書暴揚其罪並皆遣出百姓咸云清當臣獨謂非但岳徵二十四人宜皆齊黜以肅風教朝廷善其忠烈擢為漢中太守趙王倫死既葬纘以車轢其冢時張華兄子景後徙漢中纘又表宜還纘不護細行而慷慨好大節卒於官時年五十九纘五子皆開朗有才力長子亨為遼西太守屬王浚自用其人亨不得之官依青州刺史苟晞刑政苛虐亨數切諫為晞所害史臣曰愍懷之廢也天下稱其冤然皆懼亂政之參夷懾淫嬖之凶忍遂使謀臣懷忠而結舌義士蓄憤而吞聲閻續伯官既微於侍郎位不登於執戟輕生重義視死如歸伏奏而待嚴誅輿棺以趨鼎鑊察言觀行豈非忠直壯乎顧視晉朝公卿曾不得與其徒隸齒也茂伯篤終哭王經以全節休然追遠理鄧艾以成名故得義感明時仁流枯骨雖朱勃追論新息欒布奏事彭王弗之尚也贊曰感義收會篤終理艾道既相侔名亦俱泰續伯區區輿櫬陳偪茲淫嬖弗遂良圖啜其泣矣何嗟及乎
