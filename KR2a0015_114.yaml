body:
  text: 晉書卷一百十四載記第十四苻堅下王猛苻融苻朗太元七年堅饗羣臣於前殿樂奏賦詩秦州別駕天水姜平子詩有丁字直而不曲堅問其故平子曰臣丁至剛不可以屈且曲下者不正之物未足獻也堅笑曰名不虛行因擢為上第堅兄法子東海公陽與王猛子散騎侍郎皮謀反事洩堅問反狀陽曰禮云父母之仇不同天地臣父哀公死不以罪齊襄復九世之仇而況臣也皮曰臣父丞相有佐命之勳而臣不免貧餧所以圖富也堅流涕謂陽曰哀公之薨事不在朕卿寧不知之讓皮曰丞相臨終託卿以十具牛為田不聞為卿求位知子莫若父何斯言之徵也皆赦不誅徙陽於高昌皮於朔方之北苻融以位忝宗正不能肅遏姦萌上疏請待罪私藩堅不許將以融為司徒融固辭堅銳意荊揚將謀入寇乃改授融征南大將軍開府儀同三司新平郡獻玉器初堅即偽位新平王彫陳說圖讖堅大悅以彫為太史令嘗言於堅曰謹案讖云古月之末亂中州洪水大起健西流惟有雄子定八州此即三祖陛下之聖諱也又曰當有艸付臣又土滅東燕破白虜氐在中華在表案圖讖之文陛下當滅燕平六州願徙汧隴諸氐於京師三秦大戶置之於邊地以應圖讖之言堅訪之王猛猛以彫為左道惑衆勸堅誅之彫臨刑上疏曰臣以趙建武四年從京兆劉湛學明于圖記謂臣曰新平地古顓頊之墟里名曰雞閭記云此里應出帝王寶器其名曰延壽寶鼎顓頊有云河上先生為吾隱之於咸陽西北吾之孫有艸付臣又土應之湛又云吾嘗齋於室中夜有流星大如半月落於此地斯蓋是乎願陛下誌之平七州之後出於壬午之年至是而新平人得之以獻器銘篆書文題之法一為天王二為王后三為三公四為諸侯五為伯子男六為卿大夫七為元士自此已下考載文記列帝王名臣自天子王后內外次序上應天文象紫宮布列依玉牒版辭不違帝王之數從上元人皇起至中元窮於下元天地一變盡三元而止堅以彫言有徵追贈光祿大夫幽州蝗廣袤千里堅遣其散騎常侍劉蘭持節為使者發青冀幽并百姓討之以苻朗為使持節都督青徐兗三州諸軍事鎮東將軍青州刺史以諫議大夫裴元略為陵江將軍西夷校尉巴西梓潼二郡太守密授規模令與王撫備舟師於蜀將以入寇車師前部王彌窴鄯善王休密馱朝於堅堅賜以朝服引見西堂窴等觀其宮宇壯麗儀衞嚴肅甚懼因請年年貢獻堅以西域路遙不許令三年一貢九年一朝以為永制窴等請曰大宛諸國雖通貢獻然誠節未純請乞依漢置都護故事若王師出關請為鄉導堅於是以驍騎呂光為持節都督西討諸軍事與陵江將軍姜飛輕騎將軍彭晃等配兵七萬以討定西域苻融以虛秏中國投兵萬里之外得其人不可役得其地不可耕固諫以為不可堅曰二漢力不能制匈奴猶出師西域今匈奴既平易若摧朽雖勞師遠役可傳檄而定化被崑山垂芳千載不亦美哉朝臣又屢諫皆不納晉將軍朱綽焚踐沔北屯田掠六百餘戶而還堅引羣臣會議曰吾統承大業垂二十載芟夷逋穢四方略定惟東南一隅未賓王化吾每思天下不一未嘗不臨食輟餔今欲起天下兵以討之略計兵杖精卒可有九十七萬吾將躬先啟行薄伐南裔於諸卿意何如祕書監朱彤曰陛下應天順時恭行天罰嘯咤則五嶽摧覆呼吸則江海絕流若一舉百萬必有征無戰晉主自當銜璧輿櫬啟顙軍門若迷而弗悟必逃死江海猛將追之即可賜命南巢中州之人還之桑梓然後迴駕岱宗告成封禪起白雲於中壇受萬歲於中嶽爾則終古一時書契未有堅大悅曰吾之志也左僕射權翼進曰臣以為晉未可伐夫以紂之無道天下離心八百諸侯不謀而至武王猶曰彼有人焉迴師止旆三仁誅放然後奮戈牧野今晉道雖微未聞喪德君臣和睦上下同心謝安桓沖江表偉才可謂晉有人焉臣聞師克在和今晉和矣未可圖也堅默然久之曰諸君各言其志太子左衞率石越對曰吳人恃險偏隅不賓王命陛下親御六師問罪衡越誠合人神四海之望但今歲鎮星守斗牛褔德在吳懸象無差弗可犯也且晉中宗藩王耳夷夏之情咸共推之遺愛猶在於人昌明其孫也國有長江之險朝無昏貳之釁臣愚以為利用修德未宜動師孔子曰遠人不服修文德以來之願保境養兵伺其虛隙堅曰吾聞武王伐紂逆歲犯星天道幽遠未可知也昔夫差威陵上國而為句踐所滅仲謀澤洽全吳孫晧因三代之業龍驤一呼君臣面縛雖有長江其能固乎以吾之衆旅投鞭於江足斷其流越曰臣聞紂為無道天下患之夫差淫虐孫晧昏暴衆叛親離所以敗也今晉雖無德未有斯罪深願厲兵積粟以待天時羣臣各有異同庭議者久之堅曰所謂築室于道沮計萬端吾當內斷於心矣羣臣出後獨留苻融議之堅曰自古大事定策者一兩人而已羣議紛紜徒亂人意吾當與汝決之融曰歲鎮在斗牛吳越之福不可以伐一也晉主休明朝臣用命不可以伐二也我數戰兵疲將倦有憚敵之意不可以伐三也諸言不可者策之上也願陛下納之堅作色曰汝復如此天下之事吾當誰與言之今有衆百萬資杖如山吾雖未稱令主亦不為闇劣以累捷之威擊垂亡之寇何不克之有乎吾終不以賊遺子孫為宗廟社稷之憂也融泣曰吳之不可伐昭然虛勞大舉必無功而反臣之所憂非此而已陛下寵育鮮卑羌羯布諸畿甸舊人族類斥徙遐方今傾國而去如有風塵之變者其如宗廟何監國以弱卒數萬留守京師鮮卑羌羯攢聚如林此皆國之賊也我之仇也臣恐非但徒返而已亦未必萬全臣智識愚淺誠不足採王景略一時奇士陛下每擬之孔明其臨終之言不可忘也堅不納游於東苑命沙門道安同輦權翼諫曰臣聞天子法駕侍中陪乘清道而行進止有度三代末主或虧大倫適一時之情書惡來世故班姬辭輦垂美無窮道安毀形賤士不宜參穢神輿堅作色曰安公道冥至境德為時尊朕舉天下之重未足以易之非公與輦之榮此乃朕之顯也命翼扶安升輦顧謂安曰朕將與公南游吳越整六師而巡狩謁虞陵於疑嶺瞻禹穴於會稽泛長江臨滄海不亦樂乎安曰陛下應天御世居中土而制四維逍遙順時以適聖躬動則鳴鑾清道止則神栖無為端拱而化與彭舜比隆何為勞身於馳騎口倦於經略櫛風沐雨蒙塵野次乎且東南區區地下氣癘虞舜游而不返大禹適而弗歸何足以上勞神駕下困蒼生詩云惠此中國以綏四方苟文德足以懷遠可不煩寸兵而坐賓百越堅曰非為地不廣人不足也但思混一六合以濟蒼生天生蒸庶樹之君者所以除煩去亂安得憚勞朕既大運所鍾將簡天心以行天罰高辛有熊泉之役唐堯有丹水之師此皆著之前典昭之後王誠如公言帝王無省方之文乎且朕此行也以義舉耳使流度衣冠之冑還其墟墳復其桑梓止為濟難銓才不欲窮兵極武安曰若鑾駕必欲親動猶不願遠涉江淮可暫幸洛陽明授勝略馳紙檄於丹楊開其改迷之路如其不庭伐之可也堅不納先是羣臣以堅信重道安謂安曰主上欲有事於東南公何不為蒼生致一言也故安因此而諫苻融及尚書原紹石越等上書面諫前後數十堅終不從堅少子中山公詵有寵於堅又諫曰臣聞季梁在隨楚人憚之宮奇在虞晉不闚兵國有人焉故也及謀之不用而亡不淹歲前車之覆軌後車之明鑒陽平公國之謀主而陛下違之晉有謝安桓沖而陛下伐之是行也臣竊惑焉堅曰國有元龜可以決大謀朝有公卿可以定進否孺子言焉將為戮也所司奏劉蘭討蝗幽州經秋冬不滅請徵下廷尉詔獄堅曰災降自天殆非人力所能除也此自朕之政違所致蘭何罪焉明年呂光發長安堅送於建章宮謂光曰西戎荒俗非禮義之邦羈縻之道服而赦之示以中國之威導以王化之法勿極武窮兵過深殘掠加鄯善王休密馱使持節散騎常侍都督西域諸軍事寧西將軍車師前部王彌窴使持節平西將軍西域都護率其國兵為光鄉導是年益州西南夷海東諸國皆遣使貢其方物堅南游灞上從容謂羣臣曰軒轅大聖也其仁若天其智若神猶隨不順者從而征之居無常所以兵為衞故能日月所照風雨所至莫不率從今天下垂平惟東南未殄朕忝荷大業巨責攸歸豈敢優游卒歲不建大同之業每思桓溫之寇也江東不可不滅今有勁卒百萬文武如林鼓行而摧遺晉若商風之隕秋籜朝廷內外皆言不可吾實未解所由晉武若信朝士之言而不征吳者天下何由一軌吾計決矣不復與諸卿議也太子宏進曰吳今得歲不可伐也且晉主無罪人為之用謝安桓沖兄弟皆一方之儁才君臣勠力阻險長江未可圖也但可厲兵積粟以待暴主一舉而滅之今若動而無功則威名損於外資財竭於內是故聖王之行師也內斷必誠然後用之彼若憑長江以固守徙江北百姓於江南增城清野杜門不戰我已疲矣彼未引弓土下氣癘不可久留陛下將若之何堅曰往年車騎滅燕亦犯歲而捷之天道幽遠非汝所知也昔始皇之滅六國其王豈皆暴乎且吾內斷於心久矣舉必克之何為無功吾方命蠻夷以攻其內精甲勁兵以攻其外內外如此安有不克道安曰太子之言是也願陛下納之堅弗從冠軍慕容垂言於堅曰陛下德侔軒唐功高湯武威澤被於八表遠夷重譯而歸司馬昌明因餘燼之資敢距王命是而不誅法將安措孫氏跨僭江東終併於晉其勢然也臣聞小不敵大弱不御強況大秦之應符陛下之聖武強兵百萬韓白盈朝而令其偷魂假號以賊虜遺子孫哉詩云築室于道謀是用不潰于成陛下內斷神謀足矣不煩廣訪朝臣以亂聖慮昔晉武之平吳也言可者張杜數賢而已若採羣臣之言豈能建不世之功諺云憑天俟時時已至矣其可已乎堅大悅曰與吾定天下者其惟卿耳賜帛五百匹彗星掃東井自堅之建元十七年四月長安有水影遠觀若水視地則見人至是則止堅惡之上林竹死洛陽地陷晉車騎將軍桓沖率衆十萬伐堅遂攻襄陽遣前將軍劉波冠軍桓石虔振威桓石民攻沔北諸城輔國楊亮伐蜀攻拔伍城進攻涪城龍驤胡彬攻下蔡鷹揚郭銓攻武當沖別將攻萬歲城拔之堅大怒遣其子征南叡及冠軍慕容垂左衞毛當率步騎五萬救襄陽揚武張崇救武當後將軍張蚝步兵校尉姚萇救涪城叡次新野垂次鄧城王師敗長崇於武當掠二千餘戶而歸叡遣垂及驍騎石越為前鋒次於沔水垂越夜命三軍人持十炬火繫炬於樹枝光照十數里中沖懼退還上明張蚝出斜谷楊亮亦引兵退歸堅下書悉發諸州公私馬人十丁遣一兵門在灼然者為崇文義從良家子年二十已下武藝驍勇富室材雄者皆拜羽林郎下書期克捷之日以帝為尚書左僕射謝安為吏部尚書桓沖為侍中並立第以待之良家子至者三萬餘騎其秦州主簿金城趙盛之為建威將軍少年都統遣征南苻融驃騎張蚝撫軍苻方衞軍梁成平南慕容暐冠軍慕容垂率步騎二十五萬為前鋒堅發長安戎卒六十餘萬騎二十七萬前後千里旗鼓相望堅至項城涼州之兵始達咸陽蜀漢之軍順流而下幽冀之衆至於彭城東西萬里水陸齊進運漕萬艘自河入石門達於汝潁融等攻陷壽春執晉平虜將軍徐元喜安豐太守王先垂攻陷鄖城害晉將軍王太丘梁成與其揚州刺史王顯弋陽太守王詠等率衆五萬屯於洛澗柵淮以遏東軍成頻敗王師晉遣都督謝石徐州刺史謝玄豫州刺史桓伊輔國謝琰等水陸七萬相繼距融去洛澗二十五里憚成不進龍驤將軍胡彬先保硤石為融所逼糧盡詐揚沙以示融軍潛遣使告石等曰今賊盛糧盡恐不見大軍融軍人獲而送之融乃馳使白堅曰賊少易俘但懼其越逸宜速進衆軍掎禽賊帥堅大悅恐石等遁也捨大軍於項城以輕騎八千兼道赴之令軍人曰敢言吾至壽春者拔舌故石等弗知晉龍驤將軍劉牢之率勁卒五千夜襲梁成壘克之斬成及王顯王詠等十將士卒死者萬五千謝石等以既敗梁成水陸繼進堅與苻融登城而望王師見部陣齊整將士精銳又北望八公山上草木皆類人形顧謂融曰此亦勍敵也何謂少乎憮然有懼色初朝廷聞堅入寇會稽王道子以威儀鼓吹求助於鍾山之神奉以相國之號及堅之見草木狀人若有力焉堅遣其尚書朱序說石等以衆盛欲脅而降之序詭謂石曰若秦百萬之衆皆至則莫可敵也及其衆軍未集宜在速戰若挫其前鋒可以得志石聞堅在壽春也懼謀不戰以疲之謝琰勸從序言遣使請戰許之時張蚝敗謝石於肥南謝玄謝琰勒卒數萬陣以待之蚝乃退列陣逼肥水王師不得渡遣使謂融曰君懸軍深入置陣逼水此持久之計豈欲戰者乎若小退師令將士周旋僕與君公緩轡而觀之不亦美乎融於是麾軍卻陣卻因其濟水覆而取之軍遂奔退制之不可止融馳騎略陣馬倒被殺軍遂大敗王師乘勝追擊至於青岡死者相枕堅為流矢所中單騎遁還於淮北飢甚人有進壺𧹞豚髀者堅食之大悅曰昔公孫豆粥何以加也命賜帛十匹緜十斤辭曰臣聞白龍厭天池之樂而見困豫且陛下目所覩也耳所聞也今蒙塵之難豈自天乎且妄施不為惠妄受不為忠陛下臣之父母也安有子養而求報哉弗顧而退堅大慚顧謂其夫人張氏曰朕若用朝臣之言豈見今日之事邪當何面目復臨天下乎潸然流涕而去聞風聲鶴唳皆謂晉師之至其僕射張天錫尚書朱序及徐元喜等皆歸順初諺言堅不出項羣臣勸堅停項為六軍聲鎮堅不從故敗諸軍悉潰惟慕容垂一軍獨全堅以千餘騎赴之垂子寶勸垂殺堅垂不從乃以兵屬堅初慕容暐屯鄖城姜成等守漳口晉隨郡太守夏侯澄攻姜成斬之暐棄其衆奔還堅收離集散比至洛陽衆十餘萬百官威儀軍容粗備未及關而垂有貳志說堅請巡撫燕岱并求拜墓堅許之權翼固諫以為不可堅不從尋懼垂為變悔之遣驍騎石越率卒三千戍鄴驃騎張蚝率羽林五千戍并州留兵四千配鎮軍毛當戍洛陽堅至自淮南次於長安東之行宮哭苻融而後入告罪於其太廟赦殊死已下文武增位一級厲兵課農存卹孤老諸士卒不返者皆復其家終世贈融大司馬諡曰哀公衞軍從事中郎丁零翟斌反於河南長樂公苻丕遣慕容垂及苻飛龍討之垂南結丁零殺飛龍盡坑其衆豫州牧平原公苻暉遣毛當擊翟斌為斌所敗當死之垂子農亡奔列人招集羣盜衆至萬數千丕遣石越撀之為農所敗越死之垂引丁零烏丸之衆二十餘萬為飛梯地道以攻鄴城慕容暐弟燕故濟北王泓先為北地長史聞垂攻鄴亡命奔關東收諸馬牧鮮卑衆至數千還屯華陰慕容暐乃潛使諸弟及宗人起兵於堅遣將軍強永率騎擊之為泓所敗泓衆遂盛自稱使持節大都督陝西諸軍事大將軍雍州牧濟北王推叔父垂為丞相都督陝東諸軍事領大司馬冀州牧吳王堅謂權翼曰吾不從卿言鮮卑至是關東之地吾不復與之爭將若泓何翼曰寇不可長慕容垂正可據山東為亂不暇近逼今暐及宗族種類盡在京師鮮卑之衆布於畿甸實社稷之元憂宜遣重將討之堅乃以廣平公苻熙為使持節都督雍州雜戎諸軍事鎮東大將軍雍州刺史鎮蒲坂徵苻叡為都督中外諸軍事衞大將軍司隸校尉錄尚書事配兵五萬以左將軍竇衝為長史龍驤姚萇為司馬討泓於華澤平陽太守慕容沖起兵河東有衆二萬進攻蒲坂堅命竇衝討之苻叡勇果輕敵不恤士衆泓聞其至也懼率衆將奔關東叡馳兵要之姚萇諫曰鮮卑有思歸之心宜驅令出關不可遏也叡弗從戰於華澤叡敗績被殺堅大怒萇懼誅遂叛竇衝擊慕容沖於河東大破之沖率騎八千奔於泓軍泓衆至十餘萬遣使謂堅曰秦為無道滅我社稷今天誘其衷使秦師傾敗將欲興復大燕吳王已定關東可速資備大駕奉送家兄皇帝並宗室功臣之家泓當率關中燕人翼衞皇帝還返鄴都與秦以武牢為界分王天下永為鄰好不復為秦之患也鉅鹿公輕戇銳進為亂兵所害非泓之意堅大怒召慕容暐責之曰卿父子干紀僭亂乖逆人神朕應天行罰盡兵勢而得卿卿非改迷歸善而合宗蒙宥兄弟布列上將納言雖曰破滅其實若歸奈何因王師小敗便猖悖若此垂為長蛇於關東泓沖稱兵內侮泓書如此卿欲去者朕當相資卿之宗族可謂人面獸心殆不可以國士期也暐叩頭流血泣涕陳謝堅久之曰書云父子兄弟無相及也卿之忠誠實簡朕心此自三豎之罪非卿之過復其位而待之如初命暐以書招喻垂及泓沖使息兵還長安恕其反叛之咎而暐密遣使者謂泓曰今秦數已終長安怪異特甚當不復能久立吾既籠中之人必無還理昔不能保守宗廟致令傾喪若斯吾罪人也不足復顧吾之存亡社稷不輕勉建大業以興復為務可以吳王為相國中山王為太宰領大司馬汝可為大將軍領司徒承制封拜聽吾死問汝便即尊位泓於是進向長安改年曰燕興是時鬼夜哭三旬而止堅率步騎二萬討姚萇於北地次於趙氏塢使護軍楊璧游騎三千斷其奔路右軍徐成左軍竇衝鎮軍毛盛等屢戰敗之仍斷其運水之路馮翊游欽因淮南之敗聚衆數千保據頻陽遣軍運水及粟以饋姚萇楊璧盡獲之萇軍渴甚遣其弟鎮北尹買率勁卒二萬決堰竇衝率衆敗其軍於鸛雀渠斬尹買及首級萬三千萇衆危懼人有渴死者俄而降雨於萇營營中水三尺周營百步之外寸餘而已於是萇軍大振堅方食去案怒曰天其無心何故降澤賊營萇又東引慕容泓為援泓謀臣高蓋宿勤崇等以泓德望後沖且持法苛峻乃殺泓立沖為皇太弟承制行事自相署置姚萇留其弟征虜緒守楊渠川大營率衆七萬來攻堅堅遣楊璧等擊之為萇所敗獲楊璧毛盛徐成及前軍齊午等數十人皆禮而遣之苻暉率洛陽陝城之衆七萬歸於長安益州刺史王廣遣將軍王蚝率蜀漢之衆來赴難堅聞慕容沖去長安二百餘里引師而歸使撫軍苻方戍驪山拜苻暉使持節散騎常侍都督中外諸軍事車騎大將軍司隸校尉錄尚書配兵五萬距沖河間公苻琳為中軍大將軍為暉後繼沖乃令婦人乘牛馬為衆揭竿為旗揚土為塵督厲其衆晨攻暉營於鄭西暉出距戰沖揚塵鼓譟暉師敗績堅又以尚書姜宇為前將軍與苻琳率衆三萬擊沖於灞上為沖所敗宇死之琳中流矢沖遂據阿房城初堅之滅燕沖姊為清河公主年十四有殊色堅納之寵冠後庭沖年十二亦有龍陽之姿堅又幸之姊弟專寵宮人莫進長安歌之曰一雌復一雄雙飛入紫宮咸懼為亂王猛切諫堅乃出沖長安又謠曰鳳皇鳳皇止阿房堅以鳳皇非梧桐不栖非竹實不食乃植桐竹數十萬株於阿房城以待之沖小字鳳皇至是終為堅賊入止阿房城焉晉西中郎將桓石虔進據魯陽遣河南太守高茂北戍洛陽晉冠軍謝玄次於下邳徐州刺史趙遷棄彭城奔還玄前鋒張願追遷及於碭山轉戰而免玄進據彭城時呂光討平西域三十六國所獲珍寶以萬萬計堅下書以光為使持節散騎常侍都督玉門以西諸軍事安西將軍西域校尉進封順鄉侯增邑一千戶劉牢之伐兗州堅刺史張崇棄鄄城奔於慕容垂牢之遣將軍劉襲追崇戰於河南斬其東平太守楊光而退牢之遂據鄄城慕容沖進逼長安堅登城觀之歎曰此虜何從出也其強若斯大言責沖曰爾輩羣奴正可牧牛羊何為送死沖曰奴則奴矣既厭奴苦復欲取爾見代堅遣使送錦袍一領遺沖稱詔曰古人兵交使在其間卿遠來草創得無勞乎今送一袍以明本懷朕於卿恩分如何而於一朝忽為此變沖命詹事答之亦稱皇太弟有令孤今心在天下豈顧一袍小惠苟能知命便可君臣束手早送皇帝自當寬貸苻氏以酬曩好終不使既往之施獨美於前堅大怒曰吾不用王景略陽平公之言使白虜敢至於此苻丕在鄴糧竭馬無草削松木而食之會丁零叛慕容垂垂引師去鄴始具西問知苻叡等喪敗長安危逼乃遣其陽平太守邵興率騎一千將北引重合侯苻謨高邑侯苻亮阜城侯苻定于常山固安侯苻鑒中山太守王兗於中山以為己援垂遣將軍張崇要興獲之於襄國南又遣其參軍封孚西引張蚝并州刺史王騰於晉陽蚝騰以衆寡不赴丕進退路窮乃謀於羣僚司馬楊膺唱歸順之計丕猶未從會晉遣濟北太守丁匡據碻磝濟陽太守郭滿據滑臺將軍顏肱劉襲次於河北丕遣將軍桑據距之為王師所敗襲等進攻黎陽克之丕懼乃遣從弟就與參軍焦逵請救於謝玄丕書稱假途求糧還赴國難須軍援既接以鄴與之若西路不通長安陷沒請率所領保守鄴城乃羈縻一方文降而已逵與參軍姜讓密謂楊膺曰今禍難如此京師阻隔吉凶莫審密邇寇仇三軍罄絕傾危之甚朝不及夕觀公豪氣不除非救世之主既不能竭盡誠款速致糧援方設兩端必無成也今日之殆疾於轉機不容虛設徒成反覆宜正書為表以結殷勤若王師之至必當致身如其不從可逼縛與之苟不義服一人力耳古人行權寧濟為功況君侯累葉載德顯祖初著名於晉朝今復建崇勳使功業相繼千載一時不可失也膺素輕丕自以力能逼之乃改書而遣逵等并遣濟南毛蜀毛鮮等分房為任於晉堅遣鴻臚郝稚徵處士王嘉於到獸山既至堅每日召嘉與道安於外殿動靜諮問之慕容暐入見東堂稽首謝曰弟沖不識義方孤背國恩臣罪應萬死陛下垂天地之容臣蒙更生之惠臣二子昨婚明當三日愚欲暫屈鑾駕幸臣私第堅許之暐出嘉曰椎蘆作蘧蒢不成文章會天大雨不得殺羊堅與羣臣莫之能解是夜大雨晨不果出初暐之遣諸弟起兵於外也堅防守甚嚴謀應之而無因時鮮卑在城者猶有千餘人暐乃密結鮮卑之衆謀伏兵請堅因而殺之令其豪帥悉羅騰屈突鐵侯等潛告之曰官今使侯外鎮聽舊人悉隨可於某日會集某處鮮卑信之北部人突賢與其妹別妹為左將軍竇衝小妻聞以告衝請留其兄衝馳入白堅堅大驚召騰問之騰具首服堅乃誅暐父子及其宗族城內鮮卑無少長及婦女皆殺之慕容垂復圍鄴城焦逵既至朝廷果欲徵丕任子然後出師逵固陳丕款誠無貳并宣楊膺之意乃遣劉牢之等率衆二萬水陸運漕救鄴時長安大飢人相食諸將歸而吐肉以飴妻子慕容沖僭稱尊號於阿房改年更始堅與沖戰各有勝負嘗為沖軍所圍殿中上將軍鄧邁左中郎將鄧綏尚書郎鄧瓊相謂曰吾門世荷榮寵先君建殊功於國家不可不立忠效節以成先君之志且不死君難者非丈夫也於是與毛長樂等蒙獸皮奮矛而擊沖軍沖軍潰堅獲免嘉其忠勇並拜五校加三品將軍賜爵關內侯沖又遣其尚書令高蓋率衆夜襲長安攻陷南門入於南城左將軍竇衝前禁將軍李辯等擊敗之斬首千八百級分其屍而食之堅尋敗沖於城西追奔至於阿城諸將請乘勝入城堅懼為沖所獲乃擊金以止軍是時劉牢之至枋頭征東參軍徐義宦人孟豐告苻丕楊膺姜讓等謀反丕收膺讓戮之牢之以丕自相屠戮盤桓不進苻暉屢為沖所敗堅讓之曰汝吾之子也擁大衆屢為白虜小兒所摧何用生為暉憤恚自殺關中堡壁三千餘所推平遠將軍馮翊趙敖為統主相率結盟遣兵糧助堅左將軍苟池右將軍俱石子率騎五千與沖爭麥戰於驪山為沖所敗池死之石子奔鄴堅大怒復遣領軍楊定率左右精騎二千五百擊沖大敗之俘掠鮮卑萬餘而還堅怒悉坑之定果勇善戰沖深憚之遂穿馬埳以自固劉牢之至鄴慕容垂北如新城鄴中飢甚丕率鄴城之衆就晉穀于枋頭牢之入屯鄴城慕容垂軍人飢甚多奔中山幽冀人相食初關東謠曰幽州生當滅若不滅百姓絕垂之本名與丕相持經年百姓死幾絕先是姚萇攻新平新平太守苟輔將降之郡人遼西太守馮傑蓮勺令馮翊等諫曰天下喪亂忠臣乃見昔田單守一城而存齊今秦之所有猶連州累鎮郡國百城臣子之於君父盡心焉盡力焉死而後已豈宜貳哉輔大悅於是憑城固守萇為土山地道輔亦為之或戰山峯萇衆死者萬有餘人輔乃詐降萇將入覺之引衆而退輔馳出擊之斬獲萬計至是糧竭矢盡外救不至萇遣吏謂輔曰吾方以義取天下豈仇忠臣乎卿但率見衆男女還長安吾須此城置鎮輔以為然率男女萬五千口出城萇圍而坑之男女無遺初石季龍末清河崔悅為新平相為郡人所殺悅子液後仕堅為尚書郎自表父仇不同天地請還冀州堅愍之禁錮新平人缺其城角以恥之新平酋望深以為慚故相率距萇以立忠義時有羣烏數萬翔鳴於長安城上其聲甚悲占者以為鬬羽不終年有甲兵入城之象沖率衆登城堅身貫甲冑督戰距之飛矢滿身血流被體時雖兵寇危逼馮翊諸堡壁猶有負糧冒難而至者多為賊所殺堅謂之曰聞來者率不善達誠是忠臣赴難之義當今寇難殷繁非一人之力所能濟也庶明靈有照禍極災返善保誠順為國自愛蓄糧厲甲端聽師期不可徒喪無成相隨獸口三輔人為沖所略者咸遣使告堅請放火以為內應堅曰哀諸卿忠誠之意也何復已已但時運圮喪恐無益於國空使諸卿坐自夷滅吾所不忍也且吾精兵若獸利器如霜而衄於烏合疲鈍之賊豈非天也宜善思之衆固請曰臣等不愛性命投身為國若上天有靈單誠或冀一濟沒無遺恨矣堅遣騎七百應之而沖營放火者為風焰所燒其能免者十有一二堅深痛之身為設祭而招之曰有忠有靈來就此庭歸汝先父勿為妖形歔欷流涕悲不自勝衆咸相謂曰至尊慈恩如此吾等有死無移沖毒暴關中人皆流散道路斷絕千里無煙堅以甘松護軍仇騰為馮翊太守加輔國將軍與破虜將軍蜀人蘭犢慰勉馮翊諸縣之衆衆咸曰與陛下同死共生誓無有貳每夜有人周城大呼曰楊定健兒應屬我宮殿臺觀應坐我父子同出不共汝旦尋而不見人跡城中有書曰古符傳賈錄載帝出五將久長得先是又謠曰堅入五將山長得堅大信之告其太子宏曰脫如此言天或導予今留汝兼總戎政勿與賊爭利朕當出隴收兵運糧以給汝天其或者正訓予也於是遣衞將軍楊定擊沖於城西為沖所擒堅彌懼付宏以後事將中山公詵張夫人率騎數百出如五將宣告州郡期以孟冬救長安宏尋將母妻宗室男女數千騎出奔百僚逃散慕容沖入據長安縱兵大掠死者不可勝計初秦之未亂也關中土然無火而煙氣大起方數十里中月餘不滅堅每臨聽訟觀令百姓有怨者舉煙於城北觀而錄之長安為之語曰欲得必存當舉煙又為謠曰長鞘馬鞭擊左股太歲南行當復虜秦人呼鮮卑為白虜慕容垂之起於關東歲在癸未堅之分氐戶於諸鎮也趙整因侍援琴而歌曰阿得脂阿得脂博勞舊父是仇綏尾長翼短不能飛遠徙種人留鮮卑一旦緩急語阿誰堅笑而不納至是整言驗矣堅至五將山姚萇遣將軍吳忠圍之堅衆奔散獨侍御十數人而已神色自若坐而待之召宰人進食俄而忠至執堅以歸新平幽之於別室萇求傳國璽於堅曰萇次膺符曆可以為惠堅瞋目叱之曰小羌乃敢干逼天子豈以傳國璽授汝羌也圖緯符命何所依據五胡次序無汝羌名違天不祥其能久乎璽已送晉不可得也萇又遣尹緯說堅求為堯舜禪代之事堅責緯曰禪代者聖賢之事姚萇叛賊奈何擬之古人堅既不許萇以禪代罵而求死萇乃縊堅於新平佛寺中時年四十八中山公詵及張夫人並自殺是歲太元十年也宏之奔也歸其南秦州刺史楊璧於下辯璧距之乃奔武都氐豪強熙假道歸順朝廷處宏於江州宏歷位輔國將軍桓玄篡位以宏為梁州刺史義熙初以謀叛被誅初堅強盛之時國有童謠云河水清復清苻詔死新城堅聞而惡之每征伐戒軍候云地有名新者避之時又童謠云阿堅連牽三十年若後欲敗當在江淮間堅在位二十七年因壽春之敗其國大亂後二年竟死於新平佛寺咸應謠言矣丕僭號偽追諡堅曰世祖宣昭皇帝王猛字景略北海劇人也家於魏郡少貧賤以鬻畚為業嘗貨畚於洛陽乃有一人貴買其畚而云無直自言家去此無遠可隨我取直猛利其貴而從之行不覺遠忽至深山見一父老鬚髮皓然踞胡牀而坐左右十許人有一人引猛進拜之父老曰王公何緣拜也乃十倍償畚直遣人送之猛既出顧視乃嵩高山也猛瓌姿儁偉博學好兵書謹重嚴毅氣度雄遠細事不干其慮自不參其神契略不與交通是以浮華之士咸輕而笑之猛悠然自得不以屑懷少游於鄴都時人罕能識也惟徐統見而奇之召為功曹遁而不應遂隱於華陰山懷佐世之志希龍顏之主斂翼待時候風雲而後動桓溫入關猛被褐而詣之一面談當世之事捫蝨而言旁若無人溫察而異之問曰吾奉天子之命率銳師十萬杖義討逆為百姓除殘賊而三秦豪傑未有至者何也猛曰公不遠數千里深入寇境長安咫尺而不渡灞水百姓未見公心故也所以不至溫默然無以酬之溫之將還賜猛車馬拜高官督護請與俱南猛還山諮師師曰卿與桓溫豈並世哉在此自可富貴何為遠乎猛乃止苻堅將有大志聞猛名遣呂婆樓招之一見便若平生語及廢興大事異符同契若玄德之遇孔明也及堅僭位以猛為中書侍郎時始平多枋頭西歸之人豪右縱橫劫盜充斥乃轉猛為始平令猛下車明法峻刑澄察善惡禁勒強豪鞭殺一吏百姓上書訟之有司劾奏檻車徵下廷尉詔獄堅親問之曰為政之體德化為先莅任未幾而殺戮無數何其酷也猛曰臣聞宰寧國以禮治亂邦以法陛下不以臣不才任臣以劇邑謹為明君翦除凶猾始殺一姦餘尚萬數若以臣不能窮殘盡暴肅清軌法者敢不甘心鼎鑊以謝孤負酷政之刑臣實未敢受之堅謂羣臣曰王景略固是夷吾子產之儔也於是赦之遷尚書左丞咸陽內史京兆尹未幾除吏部尚書太子詹事又遷尚書左僕射輔國將軍司隸校尉加騎都尉居中宿衞時猛年三十六歲中五遷權傾內外宗戚舊臣皆害其寵尚書仇騰丞相長史席寶數譖毀之堅大怒黜騰為甘松護軍寶白衣領長史爾後上下咸服莫有敢言頃之遷尚書令太子太傅加散騎常侍猛頻表累讓堅竟不許又轉司徒錄尚書事餘如故猛辭以無功不拜後率諸軍討慕容暐軍禁嚴明師無私犯猛之未至鄴也劫盜公行及猛之至遠近帖然燕人安之軍還以功進封清河郡侯賜以美妾五人上女妓十二人中妓三十八人馬百匹車十乘猛上疏固辭不受時既留鎮冀州堅遣猛於六州之內聽以便宜從事簡召英儁以補關東守宰授訖言臺除正居數月上疏曰臣前所以朝聞夕拜不顧艱虞者正以方難未夷軍機權速庶竭命戎行甘驅馳之役敷宣皇威展筋骨之效故僶俛從事叨據負乘可謂恭命於濟時俟太平於今日今聖德格于皇天威靈被于八表弘化已熙六合清泰竊敢披貢丹誠請避賢路設官分職各有司存豈應孤任愚臣以速傾敗東夏之事非臣區區所能康理願徙授親賢濟臣顛墜若以臣有鷹犬微勤未忍捐棄者乞待罪一州效盡力命徐方始賓淮汝防重六州處分府選便宜輒以悉停督任弗可虛曠深願時降神規堅不許遣其侍中梁讜詣鄴喻旨猛乃視事如前俄入為丞相中書監尚書令太子太傅司隸校尉持節常侍將軍侯如故稍加都督中外諸軍事猛表讓久之堅曰卿昔螭蟠布衣朕龍潛弱冠屬世事紛紜厲士之際顛覆厥德朕奇卿於暫見擬卿為臥龍卿亦異朕於一言迴考槃之雅志豈不精契神交千載之會雖傅巖入夢姜公悟兆今古一時亦不殊也自卿輔政幾將二紀內釐百揆外蕩羣凶天下向定倫始朕且欲從容於上望卿勞心於下弘濟之務非卿而誰遂不許其後數年復授司徒猛復上疏曰臣聞乾象盈虛惟后則之位稱以才官非則曠鄭武翼周仍世載詠王叔昧寵政替身亡斯則成敗之殷監為臣之炯戒竊惟鼎宰崇重參路太階宜妙盡時賢對揚休命魏祖以文和為公貽笑孫后千秋一言致相匈奴口白匕之臣何庸狷而應斯舉不但取嗤鄰遠實令為虜輕秦昔東野窮馭顏子知其將弊陛下不復料度臣之才力私懼敗亡是及且上虧憲典臣何顏處之雖陛下私臣其如天下何願迴日月之鑒矜臣後悔使上無過授之謗臣蒙覆燾之恩堅竟不從猛乃受命軍國內外萬機之務事無巨細莫不歸之猛宰政公平流放尸素拔幽滯顯賢才外修兵革內崇儒學勸課農桑教以廉恥無罪而不刑無才而不任庶績咸熙百揆時於是兵強國富垂及升平猛之力也堅嘗從容謂猛曰卿夙夜匪懈憂勤萬機若文王得太公吾將優游以卒歲猛曰不圖陛下知臣之過臣何足以擬古人堅曰以吾觀之太公豈能過也常敕其太子宏長樂公丕等曰汝事王公如事我也其見重如此廣平麻思流寄關右因母亡歸葬請還冀州猛謂思曰便可速裝是暮已符卿發遣及始出關郡縣已被符管攝其令行禁整事無留滯皆此類也性剛明清肅於善惡尤分微時一餐之惠睚𣏾之忿靡不報焉時論頗以此少之其年寢疾堅親祈南北郊宗廟社稷分遣侍臣禱河嶽諸祀靡不周備猛疾未瘳乃大赦其境內殊死已下猛疾甚因上疏謝恩并言時政多所弘益堅覽之流涕悲慟左右及疾篤堅親臨省病問以後事猛曰晉雖僻陃吳越乃正朔相承親仁善鄰國之寶也臣沒之後願不以晉為圖鮮卑羌虜我之仇也終為人患宜漸除之以便社稷言終而死時年五十一堅哭之慟比斂三臨謂太子宏曰天不欲使吾平一六合邪何奪吾景略之速也贈侍中丞相餘如故給東園溫明祕器帛三千匹穀萬石謁者僕射監護喪事葬禮一依漢大將軍霍光故事諡曰武侯朝野巷哭三日苻融字博休堅之季弟也少而岐嶷夙成魁偉美姿度健之世封安樂王融上疏固辭健深奇之曰且成吾兒箕山之操乃止苻生愛其器貌常侍左右未弱冠便有台輔之望長而令譽彌高為朝野所屬堅僭號拜侍中尋除中軍將軍融聰辯明慧下筆成章至於談玄論道雖道安無以出之耳聞則誦過目不忘時人擬之王粲嘗著浮圖賦壯麗清贍世咸珍之未有升高不賦臨喪不誄朱彤趙整等推其妙速旅力雄勇騎射擊刺百夫之敵也銓綜內外刑政修理進才理滯王景略之流也尤善斷獄姦無所容故為堅所委任後為司隸校尉京兆人董豐游學三年而返過宿妻家是夜妻為賊所殺妻兄疑豐殺之送豐有司豐不堪楚掠誣引殺妻融察而疑之問曰汝行往還頗有怪異及卜筮以不豐曰初將發夜夢乘馬南渡水返而北渡復自北而南馬停水中鞭策不去俯而視之見兩日在於水下馬左白而溼右黑而燥寤而心悸竊以為不祥還之夜復夢如初問之筮者筮者云憂獄訟遠三枕避三沐既至妻為具沐夜授豐枕豐記筮者之言皆不從之妻乃自沐枕枕而寢融曰吾知之矣周易坎為水馬為離夢乘馬南渡旋北而南者從坎之離三爻同變變而成離離為中女坎為中男兩日二夫之象坎為執法吏吏詰其夫婦人被流血而死坎二陰一陽離二陽一陰相承易位離下坎上既濟文王遇之囚牖里有禮而生無禮而死馬左而溼溼水也左水右馬馮字也兩日昌字也其馮昌殺之乎於是推檢獲昌而詰之昌具首服曰本與其妻謀殺董豐期以新沐枕枕為驗是以誤中婦人在冀州有老母遇劫於路母揚聲唱盜行人為母逐之既擒劫者劫者返誣行人為盜時日垂暮母及路人莫知孰是乃俱送之融見而笑曰此易知耳可二人並走先出鳳陽門者非盜既而還入融正色謂後出者曰汝真是盜何以誣人其發姦摘伏皆此類也所在盜賊止息路不拾遺堅及朝臣雅皆歎服州郡疑獄莫不折之於融融觀色察形無不盡其情狀雖鎮關東朝之大事靡不馳驛與融議之性至孝初屆冀州遣使參問其母動止或日有再三堅以為煩月聽一使後上疏請還侍養堅遣使慰喻不許久之徵拜侍中中書監都督中外諸軍事車騎大將軍司隸校尉太子太傅領宗正錄尚書事俄轉司徒融苦讓不受融為將善謀略好施愛士專方征伐必有殊功堅既有意荊揚時慕容垂姚萇等常說堅以平吳封禪之事堅謂江東可平寢不暇旦融每諫曰知足不辱知止不殆窮兵極武未有不亡且國家戎族也正朔會不歸人江東雖不絕如綖然天之所相終不可滅堅曰帝王曆數豈有常哉惟德之所授耳汝所以不如吾者正病此不達變通大運劉禪可非漢之遺祚然終為中國之所并吾將任汝以天下之事奈何事事折吾沮壞大謀汝尚如此況於衆乎堅之將入寇也融又切諫曰陛下聽信鮮卑羌虜諂諛之言採納良家少年利口之說臣恐非但無成亦大事去矣垂萇皆我之仇敵思聞風塵之變冀因之以逞其凶德少年等皆富足子弟希關軍旅苟說佞諂之言以會陛下之意不足採也堅弗納及淮南之敗垂萇之叛堅悼恨彌深苻朗字元達堅之從兄子也性宏達神氣爽邁幼懷遠操不屑時榮堅嘗目之曰吾家千里駒也徵拜鎮東將軍青州刺史封樂安男不得已起而就官及為方伯有若素士耽翫經籍手不釋卷每談虛語玄不覺日之將夕登涉山水不知老之將至在任甚有稱績後晉遣淮陰太守高素伐青州朗遣使詣謝玄於彭城求降玄表朗許之詔加員外散騎侍郎既至揚州風流邁於一時超然自得志陵萬物所與悟言不過一二人而已驃騎長史王忱江東之儁秀聞而詣之朗稱疾不見沙門釋法汰問朗曰見王吏部兄弟未朗曰吏部為誰非人面而狗心狗面而人心兄弟者乎王忱醜而才慧國寶美貌而才劣于弟故朗云然汰悵然自失其忤物侮人皆此類也謝安常設讌請之朝士盈坐並机褥壺席朗每事欲誇之唾則令小兒跪而張口既唾而含出頃復如之坐者以為不及之遠也又善識味鹹酢及肉皆別所由會稽王司馬道子為朗設盛饌極江左精餚食訖問曰關中之食孰若此答曰皆好惟鹽味小生耳既問宰夫皆如其言或人殺雞以食之既進朗曰此雞栖半露檢之皆驗又食鵝肉知黑白之處人不信記而試之無豪釐之差時人咸以為知味後數年王國寶譖而殺之王忱將為荊州刺史待殺朗而後發臨刑志色自若為詩曰四大起何因聚散無窮已既過一生中又入一死理冥心乘和暢未覺有終始如何箕山夫奄焉處東市曠此百年期遠同嵇叔子命也歸自天委化任冥紀著苻子數十篇行於世亦老莊之流也
