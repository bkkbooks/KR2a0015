body:
  text: 晉書卷七十六列傳第四十六王舒子允之王舒字處明丞相導之從弟也父會侍御史舒少為從兄敦所知以天下多故不營當時名處私門潛心學植年四十餘州禮命太傅辟皆不就及敦為青州舒往依焉時敦被徵為祕書監以寇難路險輕騎歸洛陽委棄公主時輜重金寶甚多親賓無不競取惟舒一無所眄益為敦所賞及元帝鎮建康因與諸父兄弟俱渡江委質焉參鎮東軍事出補溧陽令明帝之為東中郎將妙選上佐以舒為司馬轉後將軍宣城公褚裒諮議參軍遷軍司固辭不受裒鎮廣陵復以舒為車騎司馬頻領望府咸稱明練裒薨遂代裒鎮除北中郎將監青徐二州軍事頃之徵國子博士加散騎常侍未拜轉少府太寧初徙廷尉敦表舒為鷹揚將軍荊州刺史領護南蠻校尉監荊州沔南諸軍事及敦敗王含父子俱奔舒舒遣軍逆之並沈於江進都督荊州平西將軍假節尋以陶侃代舒遷舒為安南將軍廣州刺史舒疾病不樂越嶺朝議亦以其有功不應遠出乃徙為湘州刺史將軍都督持節如故徵代鄧攸為尚書僕射時將徵蘇峻司徒王導欲出舒為外援乃授撫軍將軍會稽內史秩中二千石舒上疏辭以父名朝議以字同音異於禮無嫌舒復陳音雖異而字同求換他郡於是改會字為鄶舒不得已而行在郡二年而蘇峻作逆乃假舒節都督行揚州刺史事時吳國內史庾冰棄郡奔舒舒移告屬郡以吳王師虞為軍司御史中丞謝藻行龍驤將軍監前鋒征討軍事率衆一萬與庾冰俱渡浙江前義興太守顧衆護軍參軍顧颺等皆起義軍以應舒舒假衆揚威將軍督護吳中軍事颺監晉陵軍事於御亭築壘峻聞舒等兵起乃赦庾亮諸弟以悅東軍舒率衆次郡之西江為冰藻後繼冰颺等遣前鋒進據無錫遇賊將張健等數千人交戰大敗奔還御亭復自相驚擾冰颺等並退于錢唐藻守嘉興賊遂入吳燒府舍掠諸縣所在塗地舒以輕進奔敗斬二軍主者免冰颺督護以白衣行事更以顧衆督護吳晉陵軍屯兵章埭吳興太守虞潭率所領討健屯烏苞亭並不敢進時暴雨大水賊管商乘船旁出襲潭及衆潭等奔敗潭還保吳興衆退守錢唐舒更遣將軍陳孺率精銳千人增戍海浦所在築壘或勸舒宜還都使謝藻守西陵扶海立柵舒不聽留藻守錢唐使衆颺守紫壁於是賊轉攻吳興潭諸軍復退賊復掠東遷餘杭武康諸縣舒遣子允之行揚烈將軍與將軍徐遜陳孺及揚烈司馬朱燾以精銳三千輕邀賊於武康出其不意遂破之斬首數百級賊悉委舟步走允之收其器械進兵助潭時賊韓晃既破宣城轉入故鄣長城允之遣朱燾何準等擊之戰於于湖潭以強弩射之晃等退走斬首千餘級納降二千人潭由是得保郡是時臨海新安諸山縣並反應賊舒分兵悉討平之會陶侃等至京都舒潭等並以屢戰失利移書盟府自貶去節侃遣使敦喻不聽及侃立行臺上舒監浙江東五郡軍事允之督護吳郡義興晉陵三郡征討軍事既而晃等南走允之追躡於長塘湖復大破之賊平以功封彭澤縣侯尋卒官贈車騎大將軍儀同三司諡曰穆長子晏之蘇峻時為護軍參軍被害晏之子崐之嗣卒子陋之嗣宋受禪國除晏之弟允之最知名允之字深猷總角從伯敦謂為似己以自隨出則同輿入則共寢敦嘗夜飲允之辭醉先臥敦與錢鳳謀為逆允之已醒悉聞其言慮敦或疑己便於臥處大吐衣面並樜鳳既出敦果照視見允之臥吐中以為大醉不復疑之時父舒始拜廷尉允之求還定省敦許之至都以敦鳳謀議事白舒舒即與導俱啟明帝舒為荊州允之隨在西府及敦平帝欲令允之仕舒請曰臣子尚少不樂早官帝許隨舒之會稽及蘇峻反允之討賊有功封番禺縣侯邑千六百戶除建武將軍錢唐令領司鹽都尉舒卒去職既葬除義興太守以憂哀不拜從伯導與其書曰太保安豐侯以孝聞天下不得辭司隸和長輿海內名士不免作中書令吾羣從死亡略盡子弟零落遇汝如親如其不爾吾復何言允之固不肯就咸和末除宣城內史監揚州江西四郡事建武將軍鎮于湖咸康中進號西中郎將假節尋遷南中郎將江州刺史莅政甚有威惠時王恬服闋除豫章郡允之聞之驚愕以為恬丞相子應被優遇不可出為遠郡乃求自解州欲與庾冰言之冰聞甚愧即以恬為吳郡而以允之為衞將軍會稽內史未到卒年四十諡曰忠子晞之嗣卒子肇之嗣王廙弟彬彬子彪之彬從兄棱王廙字世將丞相導從弟而元帝姨弟也父正尚書郎廙少能屬文多所通涉工書畫善音樂射御博弈雜伎辟太傅掾轉參軍豫迎大駕封武陵縣侯拜尚書郎出為濮陽太守元帝作鎮江左廙棄郡過江帝見之大悅以為司馬頻守廬江鄱陽二郡豫討周馥杜弢以功累增封邑除冠軍將軍鎮石頭領丞相軍諮祭酒王敦啟為寧遠將軍荊州刺史及帝即位廙奏中興賦上疏曰臣託備肺腑幼蒙洪潤爰自齠齔至於弱冠陛下之所撫育恩侔於兄弟義同於交友思欲攀龍鱗附鳳翼者有年矣是以昔忝濮陽棄官遠跡扶持老母攜將細弱越長江歸陛下者誠以道之所存願託餘蔭故也天誘其願遇陛下中興當大明之盛而守局遐外不得奉瞻大禮聞問之日悲喜交集昔司馬相如不得覩封禪之事慷慨發憤況臣情則骨肉服膺聖化哉又臣昔嘗侍坐於先后說陛下誕育之日光明映室白毫生於額之左相者謂當王有四海又臣以壬申歲見用為鄱陽內史七月四星聚于牽牛又臣郡有枯樟更生及臣後還京都陛下見臣白兔命臣作賦時琅邪郡又獻甘露陛下命臣嘗之又驃騎將軍導向臣說晉陵有金鐸之瑞郭璞云必致中興璞之爻筮雖京房管輅不過也明天之曆數在陛下矣臣少好文學志在史籍而飄放遐外嘗與桀寇為對臣犬馬之年四十三矣未能上報天施而諐負屢彰恐先朝露填溝壑令微情不得上達謹竭其頑獻中興賦一篇雖未足以宣揚盛美亦是詩人嗟歎詠歌之義也文多不載初王敦左遷陶侃使廙代為荊州將吏馬俊鄭攀等上書請留侃敦不許廙為俊等所襲奔於江安賊杜曾與俊攀北迎第五猗以距廙廙督諸軍討曾又為曾所敗敦命湘州刺史甘卓豫章太守周廣等助廙擊曾曾衆潰廙得到州廙性儁率嘗從南下旦自尋陽迅風飛帆暮至都倚舫樓長嘯神氣甚逸王導謂庾亮曰世將為傷時識事亮曰正足舒其逸氣耳廙在州大誅戮侃時將佐及徵士皇甫方回於是大失荊土之望人情乖阻帝乃徵廙為輔國將軍加散騎常侍以母喪去職服闋拜征虜將軍進左衞將軍及王敦構禍帝遣廙喻敦既不能諫其悖逆乃為敦所留受任助亂敦得志以廙為平南將軍領護南蠻校尉荊州刺史尋病卒帝猶以親故深痛愍之喪還京都皇太子親臨拜柩如家人之禮贈侍中驃騎將軍諡曰康明帝與大將軍溫嶠書曰痛謝鯤未絕於口世將復至於此並盛年雋才不遂其志痛切於心廙明古多通鯤遠有識致其言雖未足令人改聽然味之不倦近未易有也坐相視盡如何子頤之嗣仕至東海內史頤之弟胡之字修齡弱冠有聲譽歷郡守侍中丹楊尹素有風眩疾發動甚數而神明不損石季龍死朝廷欲綏輯河洛以胡之為西中郎將司州刺史假節以疾固辭未行而卒子茂之亦有美譽官至晉陵太守子敬弘義熙末為尚書彬字世儒少稱雅正弱冠不就州郡之命光祿大夫傅祗辟為掾後與兄廙俱渡江為揚州刺史劉機建武長史元帝引為鎮東賊曹參軍轉典兵參軍豫討華軼功封都亭侯愍帝召為尚書郎以道險不就遷建安太守徙義興內史未之職轉軍諮祭酒中興建稍遷侍中從兄敦舉兵入石頭帝使彬勞之會周顗遇害彬素與顗善先往哭顗甚慟既而見敦敦怪其有慘容而問其所以彬曰向哭伯仁情未能已敦怒曰伯仁自致刑戮且凡人遇汝復何為者哉彬曰伯仁長者君之親友在朝雖無謇諤亦非阿黨而赦後加以極刑所以傷惋也因勃然數敦曰兄抗旌犯順殺戮忠良謀圖不軌禍及門戶音辭慷慨聲淚俱下敦大怒厲聲曰爾狂悖乃可至此為吾不能殺汝邪時王導在坐為之懼勸彬起謝彬曰有㸂疾已來見天子尚欲不拜何跪之有此復何所謝敦曰㸂痛孰若頸痛彬意氣自若殊無懼容後敦議舉兵向京師彬諫甚苦敦變色目左右將收彬彬正色曰君昔歲害兄今又殺弟邪先是彬從兄豫章太守棱為敦所害敦以彬親故容忍之俄而以彬為豫章太守彬為人樸素方直乏風味之好雖居顯貴常布衣蔬食遷前將軍江州刺史及敦死王含欲投王舒王應勸含投彬含曰大將軍平素與江州云何汝欲歸之應曰此乃所以宜往也江州當人強盛時能立同異此非常人所及覩衰厄必興愍惻荊州守文豈能意外行事含不從遂共投舒舒果沈含父子於江彬聞應來密具船以待之既不至深以為恨敦平有司奏彬及兄子安成太守籍之並是敦親皆除名詔曰司徒導以大義滅親其後昆雖或有違猶將百世宥之況彬等公之近親乃原之徵拜光祿勳轉度支尚書蘇峻平後改築新宮彬為大匠以營創勳勞賜爵關內侯遷尚書右僕射卒官年五十九贈特進衞將軍加散騎常侍諡曰肅長子彭之嗣位至黃門郎次彪之最知名彪之字叔武年二十鬚鬢皓白時人謂之王白鬚初除佐著作郎東海王文學從伯導謂曰選官欲以汝為尚書郎汝幸可作諸王佐邪彪之曰位之多少既不足計自當任之於時至於超遷是所不願遂為郎鎮軍將軍武陵王晞以為司馬累遷尚書左丞司徒左長史御史中丞侍中廷尉時永嘉太守謝毅赦後殺郡人周矯矯從兄球詣州訴冤揚州刺史殷浩遣從事收毅付廷尉彪之以球為獄主身無王爵非廷尉所料不肯受與州相反覆穆帝發詔令受之彪之又上疏執據時人比之張釋之時當南郊簡文帝為撫軍執政訪彪之應有赦不答曰中興以來郊祀往往有赦愚意嘗謂非宜何者黎庶不達其意將謂郊祀必赦至此時凶愚之輩復生心於僥倖矣遂從之轉吏部尚書簡文有命用秣陵令曲安遠補句容令殿中侍御史奚朗補湘東郡彪之執不從曰秣陵令三品縣耳殿下昔用安遠談者紛然句容近畿三品佳邑豈可處卜術之人無才用者邪湘東雖復遠小所用未有朗比談者謂頗兼卜術得進殿下若超用寒悴當令人才可拔朗等凡器實未足充此選太尉桓溫欲北伐屢詔不許溫輒下武昌人情震懼或勸殷浩引身告退彪之言於簡文曰此非保社稷為殿下計皆自為計耳若殷浩去職人情崩駭天子獨坐既爾當有任其責者非殿下而誰又謂浩曰彼抗表問罪卿為其首事任如此猜釁已構欲作匹夫豈有全地邪且當靜以待之令相王與手書示以款誠陳以成敗當必旋旆若不順命即遣中詔如復不奉乃當以正義相裁無故先自猖蹶浩曰決大事正自難頃日來欲使人悶聞卿此謀意始得了溫亦奉帝旨果不進時衆官漸多而遷徙每速彪之上議曰為政之道以得賢為急非謂雍容廊廟標的而已固將莅任贊時職思其憂也得賢之道在於莅任莅任之道在於能久久於其道天下化成是以三載考績三考黜陟不收一切之功不採速成之譽故勳格辰極道融四海風流遐邈聲冠百代凡庸之族衆賢能之才寡才寡於世而官多於朝焉得不賢鄙共貫清濁同官官衆則闕多闕多則遷速前後去來更相代補非為故然理固然耳所以職事未修朝風未澄者也職事之修在於省官朝風之澄在於并職官省則選清而得久職并則吏簡而俗靜選清則勝人久於其事事久則中才猶足有成今內外百官較而計之固應有并省者矣六卿之任太常望雅而職重然其所司義高務約宗正所統蓋尟可以并太常宿衞之重二衞任之其次驍騎左軍各有所領無兵軍校皆應罷廢四軍皆罷則左軍之名不宜獨立宜改游擊以對驍騎內官自侍中以下舊員皆四中興之初二人而已二人對直或有不周愚謂三人於事則無闕也凡餘諸官無綜事實者可令大官隨才位所帖而領之若未能頓廢自可因缺而省之委之以職分責之以有成能否因考績而著清濁隨黜陟而彰雖緝熙之隆康哉之歌未可使庶官之選差清莅職之日差久無奉祿之虛費簡吏寺之煩役矣永和末多疾疫舊制朝臣家有時疾染易三人以上者身雖無病百日不得入宮至是百官多列家疾不入彪之又言疾疫之年家無不染若以之不復入宮則直侍頓闕王者宮省空矣朝廷從之既而長安人雷弱兒梁安等詐云殺苻健苻眉請兵應接時殷浩鎮壽陽便進據洛營復山陵屬彪之疾歸上簡文帝牋陳弱兒等容有詐偽浩未應輕進尋而弱兒果詐姚襄反叛浩大敗退守譙城簡文笑謂彪之曰果如君言自頃以來君謀無遺策張陳復何以過之轉領軍將軍遷尚書僕射以疾病不拜徙太常領崇德衞尉時或謂簡文曰武陵第中大修器杖將謀非常也簡文以問彪之彪之曰武陵王志意盡於馳騁田獵耳願深靜之以懷異同者或復以此為言簡文甚悅復轉尚書僕射時豫州刺史謝弈卒簡文遽使彪之舉可以代弈者對曰當今時賢備簡高監簡文曰人有舉桓雲者君謂如何彪之曰雲不必非才然溫居上流割天下之半其弟復處西藩兵權盡出一門亦非深根固蔕之宜也人才非可豫量但當令不與殿下作異者耳簡文頷曰君言是也後以彪之為鎮軍將軍會稽內史加散騎常侍居郡八年豪右斂跡亡戶歸者三萬餘口桓溫下鎮姑孰威勢震主四方修敬皆遣上佐綱紀彪之獨曰大司馬誠為富貴朝廷既有宰相動靜之宜自當諮稟修敬若遣綱紀致貢天子復何以過之竟不遣溫以山陰縣折布米不時畢郡不彈糾上免彪之彪之去郡郡見罪讁未上州臺者皆原散之溫復以為罪乃檻收下吏會赦免左降為尚書頃之復為僕射是時溫將廢海西公百僚震慄溫亦色動莫知所為彪之既知溫不臣迹已著理不可奪乃謂溫曰公阿衡皇家便當倚傍先代耳命取霍光傳禮度儀制定於須臾曾無懼容溫歎曰作元凱不當如是邪時廢立之儀既絕於曠代朝臣莫有識其故典者彪之神彩毅然朝服當階文武儀準莫不取定朝廷以此服之溫又廢武陵王遵以事示彪之彪之曰武陵親尊未有顯罪不可以猜嫌之間便相廢徙公建立聖明遐邇歸心當崇奬王室伊周同美此大事宜更深詳溫曰此已成事卿勿復言及簡文崩羣臣疑惑未敢立嗣或云宜當須大司馬處分彪之正色曰君崩太子代立大司馬何容得異若先面諮必反為所責矣於是朝議乃定及孝武帝即位太皇太后令以帝沖幼加在諒闇令溫依周公居攝故事事已施行彪之曰此異常大事大司馬必當固讓使萬機停滯稽廢山陵未敢奉令謹具封還內請停事遂不行溫遇疾諷朝廷求九錫袁宏為文以示彪之彪之視訖歎其文辭之美謂宏曰卿固大才安可以此示人時謝安見其文又頻使宏改之宏遂逡巡其事既屢引日乃謀於彪之彪之曰聞彼病日增亦當不復支久自可更小遲迴宏從之溫亦尋薨時桓沖及安夾輔朝政安以新喪元輔主上未能親覽萬機太皇太后宜臨朝彪之曰先代前朝主在襁抱母子一體故可臨朝太后亦不能決政事終是顧問僕與君諸人耳今上年出十歲垂婚冠反令從嫂臨朝示人君幼弱豈是翼戴讚揚立德之謂乎二君必行此事豈僕所制所惜者大體耳時安不欲委任桓沖故使太后臨朝決政獻替專在乎己彪之不達安旨故以為言安竟不從尋遷尚書令與安共掌朝政安每曰朝之大事衆不能決者諮王公無不得判以年老上疏乞骸骨詔不許轉拜護軍將軍加散騎常侍安欲更營宮室彪之曰中興初即位東府殊為儉陋元明二帝亦不改制蘇峻之亂成帝止蘭臺都坐殆不蔽寒暑是以更營修築方之漢魏誠為儉狹復不至陋殆合豐約之中今自可隨宜增益修補而已強寇未殄正是休兵養士之時何可大興功力勞擾百姓邪安曰宮室不壯後世謂人無能彪之曰任天下事當保國寧家朝政惟允豈以修屋宇為能邪安無以奪之故終彪之之世不改營焉加光祿大夫儀同三司未拜疾篤帝遣黃門侍郎問所苦賜錢三十萬以營醫藥太元二年卒年七十三即以光祿為贈諡曰簡二子越之撫軍參軍臨之東陽太守棱字文子彬季父國子祭酒琛之子也少歷清官渡江為元帝丞相從事中郎從兄導以棱有政事宜守大郡乃出為豫章太守加廣武將軍棱知從兄敦驕傲自負有罔上心日夕諫諍以為宜自抑損推崇盟主且羣從一門並相與服事應務相崇高以隆勳業每言苦切敦不能容潛使人害之弟侃亦知名少歷顯職位至吳國內史虞潭孫嘯父兄子虞潭字思奧會稽餘姚人吳騎都尉翻之孫也父忠仕至宜都太守吳之亡也堅壁不降遂死之潭清貞有檢操州辟從事主簿舉秀才大司馬齊王冏請為祭酒除祁鄉令徙醴陵令值張昌作亂郡縣多從之潭獨起兵斬昌別率鄧穆等襄陽太守華恢上潭領建平太守以疾固辭遂周旋征討以軍功賜爵都亭侯陳敏反潭東下討敏弟讚於江州廣州刺史王矩上潭領廬陵太守綏撫荒餘咸得其所又與諸軍共平陳恢仍轉南康太守進爵東鄉侯尋被元帝檄使討江州刺史華軼潭至廬陵會軼已平而湘川賊杜弢猶盛江州刺史衞展上潭并領安成太守時甘卓屯宜陽為弢所逼潭進軍救卓卓上潭領長沙太守固辭不就王敦版潭為湘東太守復以疾辭弢平後元帝召補丞相軍諮祭酒轉琅邪國中尉帝為晉王除屯騎校尉徙右衞將軍遷宗正卿以疾告歸會王含沈充等攻逼京都潭遂於本縣招合宗人及郡中大姓共起義軍衆以萬數自假明威將軍乃進赴國難至上虞明帝手詔潭為冠軍將軍領會稽內史潭即受命義衆雲集時有野鷹飛集屋梁衆咸懼潭曰起大義而剛鷙之鳥來集破賊必矣遣長史孔坦領前鋒過浙江追躡充潭次於西陵為坦後繼會充已擒罷兵徵拜尚書尋補右衞將軍加散騎常侍成帝即位出為吳興太守秩中二千石加輔國將軍以討充功進爵零陵縣侯蘇峻反加潭督三吳晉陵宣城義興五郡軍事會王師敗績大駕逼遷潭勢弱不能獨振乃固守以俟四方之舉會陶侃等下潭與郗鑒王舒協同義舉侃等假潭節監揚州浙江西軍事潭率衆與諸軍并勢東西掎角遣督護沈伊距管商於吳縣為商所敗潭自貶還節尋而峻平潭以母老輒去官還餘姚詔轉鎮軍將軍吳國內史復徙會稽內史未發還復吳郡以前後功進爵武昌縣侯邑一千六百戶是時軍荒之後百姓饑饉死亡塗地潭乃表出倉米振救之又修滬瀆壘以防海抄百姓賴之咸康中進衞將軍潭貌雖和弱而內堅明有膽決雖屢統軍旅而尟有傾敗以母憂去職服闋以侍中衞將軍徵既至更拜右光祿大夫開府儀同三司給親兵三百人侍中如故年七十九卒於位追贈左光祿大夫開府侍中如故諡曰孝烈子仡嗣官至右將軍司馬仡卒子嘯父嗣嘯父少歷顯位後至侍中為孝武帝所親愛嘗侍飲宴帝從容問曰卿在門下初不聞有所獻替邪嘯父家近海謂帝有所求對曰天時尚溫舤魚蝦鮓未可致尋當有所上獻帝大笑因飲大醉出拜不能起帝顧曰扶虞侍中嘯父曰臣位未及扶醉不及亂非分之賜所不敢當帝甚悅隆安初為吳國內史徵補尚書未發而王廞舉兵版嘯父行吳興太守嘯父即入吳興應廞廞敗有司奏嘯父與廞同謀罪應斬詔以祖潭舊勳聽以疾贖為庶人四年復拜尚書桓玄用事以為太尉左司馬尋遷護軍將軍出為會稽內史義熙初去職卒於家字思行潭之兄子也雖機幹不及於潭然而素行過之與譙國桓彝俱為吏部郎情好甚篤彝遣溫拜使子谷拜彝歷吳興太守金紫光祿大夫王導嘗謂曰孔愉有公才而無公望丁潭有公望而無公才兼之者其在卿乎官未達而喪時人惜之子谷位至吳國內史顧衆顧衆字長始吳郡吳人驃騎將軍榮之族弟也父祕交州刺史有文武才幹衆出後伯父早終事伯母以孝聞光祿朱誕器之州辟主簿舉秀才除餘杭秣陵令並不行元帝為鎮東將軍命為參軍以討華軼功封東鄉侯辟丞相掾祕卒州人立衆兄壽為刺史尋為州人所害衆往交州迎喪值杜弢之亂崎嶇六年乃還祕曾莅吳興吳興義故以衆經離寇難共遺錢二百萬一無所受及帝踐阼徵拜駙馬都尉奉朝請轉尚書郎大將軍王敦請為從事中郎上補南康太守會詔除鄱陽太守加廣武將軍衆徑之鄱陽不過敦敦甚怪焉及敦構逆令衆出軍衆遲迴不發敦大怒以軍期召衆還詰之聲色甚厲衆不為動容敦意漸釋時敦又怒宣城內史陸喈衆又辨明之敦長史陸玩在坐代衆危懼出謂衆曰卿真所謂剛亦不吐柔亦不茹雖仲山甫何以加之敦事捷欲以衆為吳興內史衆固辭舉吏部郎桓彝彝亦讓衆事並不行敦鎮姑孰復以衆為從事中郎敦平除太子中庶子為義興太守加揚威將軍蘇峻反王師敗績衆還吳潛圖義舉時吳國內史庾冰奔於會稽峻以蔡謨代之前陵江將軍張悊為峻收兵於吳衆遣人喻悊悊從之衆乃遣郎中徐機告謨曰衆已潛合家兵待時而奮又與張悊剋期效節謨乃檄衆為本國督護揚威將軍仍舊衆從弟護軍將軍颺為威遠將軍前鋒督護吳中人士同時響應峻遣將弘徽領甲卒五百鼓行而前衆與颺悊要擊徽戰於高莋大破之收其軍實謨以冰當還任故便去郡衆遣颺率諸軍屯無錫冰至鎮御亭恐賊從海虞道入衆自往備之而賊率張健馬流攻無錫颺等大敗庾冰亦失守健等遂據吳城衆自海虞由婁縣東倉與賊別率交戰破之義軍又集進屯烏苞會稽內史王舒吳興內史虞潭並檄衆為五郡大督護統諸義軍討健潭遣將姚休為衆前鋒與賊戰沒衆還守紫壁時賊黨方銳義軍沮退人咸勸衆過浙江衆曰不然今保固紫壁可得全錢唐以南五縣若越他境便為寓軍控引無所非長計也臨平人范明亦謂衆曰此地險要可以制寇不可委也衆乃版明為參軍明率宗黨五百人合諸軍凡四千人復進討健健退于曲阿留錢弘為吳令軍次路丘即斬弘首衆進住吳城遣督護朱祈等九軍與蘭陵太守李閎共守庱亭健遣馬流陶陽等往攻之閎與祈等逆擊大破之斬首二千餘級峻平論功衆以承檄奮義推功於謨謨以衆唱謀非己之力俱表相讓論者美之封鄱陽縣伯除平南軍司不就更拜丹楊尹本國大中正入為侍中轉尚書咸康末遷領軍將軍揚州大中正固讓不拜以母憂去職穆帝即位何充執政復徵衆為領軍不起服闋乃就是時充與武陵王不平衆會通其間遂得和釋充崇信佛教衆議其糜費每以為言嘗與充同載經佛寺充要衆入門衆不下車充以衆州里宿望每優遇之以年老上疏乞骸骨詔書不許遷尚書僕射永和二年卒時年七十三追贈特進光祿大夫諡曰靖長子昌嗣為建康令第三子會中軍諮議參軍時稱美士張闓張闓字敬緒丹楊人吳輔吳將軍昭之曾孫也少孤有志操太常薛兼進之於元帝言闓才幹貞固當今之良器即引為安東參軍甚加禮遇轉丞相從事中郎以母憂去職既葬帝強起之闓固辭疾篤優命敦逼遂起視事及帝為晉王拜給事黃門侍郎領本郡大中正以佐翼勳賜爵丹楊縣侯遷侍中帝踐阼出補晉陵內史在郡甚有威惠帝下詔曰夫二千石之任當勉勵其德綏齊所莅使寬而不縱嚴而不苛其於勤功督察便國利人抑強扶弱使無雜濫真太守之任也若聲過其實古人所不取攻乎異端為政之甚害蓋所貴者本也闓遵而行之時所部四縣並以旱失田闓乃立曲阿新豐塘溉田八百餘頃每歲豐稔葛洪為其頌計用二十一萬一千四百二十功以擅興造免官後公卿並為之言曰張闓興陂溉田可謂益國而反被黜使臣下難復為善帝感悟乃下詔曰丹楊侯闓昔以勞役部人免官雖從吏議猶未掩其忠節之志也倉釰國之大本宜得其才今以闓為大司農闓陳黜免始爾不宜便居九列疏奏不許然後就職帝晏駕以闓為大匠卿營建平陵事畢遷尚書蘇峻之役闓與王導俱入宮侍衞峻使闓持節權督東軍王導潛與闓謀密宣太后詔於三吳令速起義軍陶侃等至假闓節行征虜將軍與振威將軍陶回共督丹楊義軍闓到晉陵使內史劉耽盡以一部穀并遣吳郡度支運四部穀以給車騎將軍郗鑒又與吳郡內史蔡謨前吳興內史虞潭會稽內史王舒等招集義兵以討峻峻平以尚書加散騎常侍賜爵宜陽伯遷廷尉以疾解職拜金紫光祿大夫尋卒時年六十四子混嗣闓牋表文議傳於世史臣曰季孫行父稱見有禮於其君者如孝子之養父母無禮於其君者如鷹鸇之逐鳥雀是以石碏戮厚叔向誅鮒前史以為美譚王敦之惡不足矜其類然而朱家容布為大俠之首酈寄載呂興賣友之譏亦所以激揚風俗弘長名教王彬艤船而厚其所薄王舒沈江而薄其所厚較之優劣斷乎可知思行彪之厲風規於多僻之日虞潭顧衆徇貞心於危蹙之辰龍筦為出納之端舤魚非獻替之術嘯父之對何其鄙歟贊曰處明夙令聲穨暮年允之騂角無棄山川廙稱多藝綢繆哲后二三其德亦孔之醜世儒憤發慟顗陵敦彪之不撓寧浩旋溫顧實南金虞惟東箭銑質無改筠心不變公望公才為其選
