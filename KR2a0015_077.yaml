body:
  text: 晉書卷七十七列傳第四十七陸曄弟玩玩子納陸曄字士光吳郡吳人也伯父喜吳吏部尚書父英高平相員外散騎常侍曄少有雅望從兄機每稱之曰我家世不乏公矣居喪以孝聞同郡顧榮與鄉人書曰士光氣息裁屬慮其性命言之傷心矣後察孝廉除永世烏江二縣令皆不就元帝初鎮江左辟為祭酒尋補振威將軍義興太守以疾不拜預討華軼功封平望亭侯纍遷散騎常侍本郡大中正太興元年遷太子詹事時帝以侍中皆北士宜兼用南人曄以清貞著稱遂拜侍中徙尚書領州大中正明帝即位轉光祿勳遷太常代紀瞻為尚書左僕射領太子少傅尋加金紫光祿大夫代卞壼為領軍將軍以平錢鳳功進爵江陵伯帝不豫曄與王導卞壼庾亮溫嶠郗鑒並受顧命輔皇太子更入殿將兵直宿遺詔曰曄清操忠貞歷職顯允且其兄弟事君如父憂國如家歲寒不凋體自門風既委以六軍可録尚書事加散騎常侍成帝踐阼拜左光祿大夫開府儀同三司給親兵百人常侍如故蘇峻之難曄隨帝在石頭舉動方正不以凶威變節峻以曄吳士之望不敢加害使守留臺匡術以苑城歸順時共推曄督宮城軍事峻平加衛將軍給千兵百騎以勳進爵為公封次子嘏新康子咸和中求歸鄉里拜墳墓有司奏舊制假六十日侍中顏含黃門侍郎馮懷駁曰曄內蘊至德清一其心受託付之重居台司之位既蒙詔許歸省墳塋大臣之義本在忘己豈容有期而反無期必違愚謂宜還自還不須制日帝從之曄因歸以疾卒時年七十四追贈侍中車騎大將軍諡曰穆子諶散騎常侍玩字士瑤器量淹雅弱冠有美名賀循每稱其清允平當郡檄綱紀東海王越辟為掾皆不就元帝引為丞相參軍時王導初至江左思結人情請婚於玩玩對曰培塿無松柏薰蕕不同器玩雖不才義不能為亂倫之始導乃止玩嘗詣導食酪因而得疾與導箋曰僕雖吳人幾為傖鬼其輕易權貴如此纍加奮武將軍徵拜侍中以疾辭王敦請為長史逼以軍期不得已乃從命敦平尚書令郗鑒議敦佐吏不能匡正姦惡宜皆免官禁錮會溫嶠上表申理得不坐復拜侍中遷吏部尚書領會稽王師讓不拜轉尚書左僕射領本州大中正及蘇峻反遣玩與兄曄俱守宮城玩潛説匡術歸順以功封興平伯轉尚書令又詔曰玩體道清純雅量弘遠歷位內外風績顯著宜居台司以允衆望授左光祿大夫開府儀同三司加散騎常侍餘如故玩頻自表優詔褒揚重復自陳曰臣實凡短風操不立階緣嘉會便蕃榮顯遂總括憲臺豫聞政道竟不能敷融玄風清一朝序咎責之來於臣已重誠以身許國義忘曲讓而慺慺所守終於陳訴者特以端右機耍事務殷多臣已盈六十之年智力有限疾患深重體氣日弊朝夕自勵非復所堪若偃息苟免職事並廢則莫大之悔天下將謂臣何乞陛下披豁聖懷霈然垂允詔不許玩重表曰臣比披誠款不足上暢天聰聖恩徘徊厲以體國臣聞至公之道上下玄同用才不負其長量力不受其短雖加官重祿無世不有皆庸勳親賢時所須賴兼統以濟世務非優崇以榮一人臣受遇三世恩隆寵厚豈敢辭職事之勞求沖讓之譽徒以端右耍重興替所存久以無任妨賢曠職臣猶自知不可況天下之人乎今復外參論道內統百揆不堪之名有如皎日願陛下少垂哀矜使四海知官不可以私於人人不可以私取官則天工弘坦誰不謂允猶不許尋而王導郗鑒庾亮相繼而薨朝野咸以為三良既沒國家殄瘁以玩有德望乃遷侍中司空給羽林四十人玩既拜有人詣之索杯酒瀉置柱梁之間呪曰當今乏材以爾為柱石莫傾人梁棟邪玩笑曰戢卿良針既而歎息謂賓客曰以我為三公是天下為無人談者以為知言玩雖登公輔謙讓不辟掾屬成帝聞而勸之玩不得已而從命所辟皆寒素有行之士玩翼亮纍世常以弘重為人主所貴加性通雅不以名位格物誘納後進謙若布衣由是搢紳之徒莫不廕其德宇後疾甚上表曰臣嬰遘疾疢沈頓歷月不蒙痊損而日夕漸篤自省微綿無復生望荷恩不報孤負已及仰瞻天覆伏枕霣涕臣年向中壽窮極寵榮終身歸全將復何恨惟願陛下崇明聖德弘敷洪化曾構祖宗之基道濟羣生之命臣不勝臨命遺戀之情貪及視息上表以聞薨年六十四諡曰康給兵千人守冢七十家太元中功臣普被減削司空何充等止得六家以玩有佐命之勳先陪陵而葬由是特置興平伯官屬以衛墓子始嗣歷侍中尚書納字祖言少有清操貞厲絶俗初辟鎮軍大將軍武陵王掾州舉秀才太原王述雅敬重之引為建威長史纍遷黃門侍郎本州別駕尚書吏部郎出為吳興太守將之郡先至姑孰辭桓溫因問溫曰公致醉可飲幾酒食肉多少溫曰年大來飲三升便醉白肉不過十臠卿復云何納曰素不能飲止可二升肉亦不足言後伺溫間謂之曰外有微禮方守遠郡欲與公一醉以展下情溫欣然納之時王坦之刁彝在坐及受禮唯酒一斗鹿肉一柈坐客愕然納徐曰明公近云飲酒三升納止可二升今有一斗以備杯杓餘瀝溫及賓客並歎其率素更敕中廚設精饌酣飲極歡而罷納至郡不受俸祿頃之徵拜左民尚書領州大中正將應召外白宜裝幾船納曰私奴裝糧食來無所復須也臨發止有被襆而已其餘並封以還官遷太常徙吏部尚書加奉車都尉衛將軍謝安嘗欲詣納而納殊無供辦其兄子俶不敢問之乃密為之具安既至納所設唯茶果而已俶遂陳盛饌珍羞畢具客罷納大怒曰汝不能光益父叔乃復穢我素業邪於是杖之四十其舉措多此類後以愛子長生有疾求解官營視兄子禽又犯法應刑乞免官謝罪詔特許輕降頃長生小佳喻還攝職尋遷尚書僕射轉左僕射加散騎常侍俄拜尚書令常侍如故恪勤貞固始終不渝時會稽王道子以少年專政委任羣小納望闕而歎曰好家居纖兒欲撞壞之邪朝士咸服其忠亮尋除左光祿大夫開府儀同三司未拜而卒即以為贈長生先卒無子以弟子道隆嗣元熙中為廷尉何充何充字次道廬江灊人魏光祿大夫禎之曾孫也祖惲豫州刺史父睿安豐太守充風韻淹雅文義見稱初辟大將軍王敦掾轉主簿敦兄含時為廬江郡貪汙狼藉敦嘗於座中稱曰家兄在郡定佳廬江人士咸稱之充正色曰充即廬江人所聞異於此敦默然傍人皆為之不安充晏然自若由是忤敦左遷東海王文學尋屬敦敗纍遷中書侍郎充即王導妻之姊子充妻明穆皇后之妹也故少與導善早歷顯官嘗詣導導以麈尾指牀呼充共坐曰此是君坐也導繕揚州解舍顧而言曰正為次道耳明帝亦友昵之成帝即位遷給事黃門侍郎蘇峻作亂京都傾覆導從駕在石頭充東奔義軍其後導奔白石充亦得還賊平封都鄉侯拜散騎常侍出為東陽太守仍除建威將軍會稽內史在郡甚有德政薦徵士虞喜拔郡人謝奉魏顗等以為佐吏後以墓被發去郡詔徵侍中不拜改葬畢除建威將軍丹楊尹王導庾亮並言於帝曰何充器局方概有萬夫之望必能總録朝端為老臣之副臣死之日願引充內侍則外譽唯緝社稷無虞矣由是加吏部尚書進號冠軍將軍又領會稽王師及導薨轉護軍將軍與中書監庾冰參録尚書事詔充冰各以甲杖五十人至止車門尋遷尚書令加左將軍充以內外統任宜相糾正若使事綜一人於課對為嫌乃上疏固讓許之徙中書令加散騎常侍領軍如故又領州大中正以州有先達宿德固讓不拜庾冰兄弟以舅氏輔王室權侔人主慮易世之後戚屬轉疏將為外物所攻謀立康帝即帝母弟也每説帝以國有強敵宜須長君帝從之充建議曰父子相傳先王舊典忽妄改易懼非長計故武王不授聖弟即其義也昔漢景亦欲傳祚梁王朝臣咸以為虧亂典制據而弗聽今琅邪踐阼如孺子何社稷宗廟將其危乎冰等不從既而康帝立帝臨軒冰充侍坐帝曰朕嗣鴻業二君之力也充對曰陛下龍飛臣冰之力也若如臣議不覩升平之世帝有慚色建元初出為驃騎將軍都督徐州揚州之晉陵諸軍事假節領徐州刺史鎮京口以避諸庾頃之庾翼將北伐庾冰出鎮江州充入朝言於帝曰臣冰舅氏之重宜居宰相不應遠出朝議不從於是徵充入為都督揚豫徐州之琅邪諸軍事假節領揚州刺史將軍如故先是翼悉發江荊二州編戶奴以充兵役士庶嗷然充復欲發揚州奴以均其謗後以中興時已發三吳今不宜復發而止俄而帝疾篤冰翼意在簡文帝而充建議立皇太子奏可及帝崩充奉遺旨便立太子是為穆帝冰翼甚恨之獻后臨朝詔曰驃騎任重可以甲杖百人入殿又加中書監録尚書事充自陳既録尚書不宜復監中書許之復加侍中羽林騎十人冰翼等尋卒充專輔幼主翼臨終表以後任委息爰之于時論者並以諸庾世在西藩人情所歸宜依翼所請以安物情充曰不然荊楚國之西門戶口百萬北帶強胡西鄰徑蜀經略險阻周旋萬里得賢則中原可定勢弱則社稷同憂所謂陸抗存則吳存抗亡則吳亡者豈可以白面年少猥當此任哉桓榲英略過人有文武識度西夏之任無出溫者議者又曰庾爰之肯避溫乎如令阻兵恥懼不淺充曰溫足能制之諸君勿憂乃使溫西爰之果不敢爭充以衛將軍褚裒皇太后父宜綜朝政上疏薦裒參録尚書裒以地逼固求外出充每曰桓溫褚裒為方伯殷浩居門下我可無勞矣充居宰相雖無澄正改革之能而強力有器局臨朝正色以社稷為己任凡所選用皆以功臣為先不以私恩樹親戚談者以此重之然所昵庸雜信任不得其人而性好釋典崇修佛寺供給沙門以百數糜費巨億而不吝也親友至於貧乏無所施遺以此獲譏於世阮裕嘗戲之曰卿志大宇宙勇邁終古充問其故裕曰我圖數千戶郡尚未能得卿圖作佛不亦大乎于時郗愔及弟曇奉天師道而充與弟準崇信釋氏謝萬譏之云二郗諂於道二何佞於佛充能飲酒雅為劉惔所貴惔每云見次道飲令人欲傾家釀言其能溫克也永和二年卒時年五十五贈司空諡曰文穆無子弟子放嗣卒又無子又以兄孫松嗣位至驃騎咨議參軍充弟準見外戚傳褚翜褚翜字謀遠太傅裒之從父兄也父頠少知名早卒翜以才藝楨幹稱襲爵關內侯補冠軍參軍于時長沙王乂擅權成都河間阻兵于外翜知內難方作乃棄官避地幽州後河北有寇難復還鄉里河南尹舉翜行本縣事及天下鼎沸翜招合同志將圖過江先移住陽城界潁川庾敳即翜之舅也亦憂世亂以家付翜翜道斷不得前東海王越以為參軍辭疾不就尋洛陽覆沒與滎陽太守郭秀共保萬氏臺秀不能綏衆與將陳撫郭重等構怨遂相攻擊翜懼禍及謂撫等曰以諸君所以在此謀逃難也今宜共勠力以備賊幸無外難而內自相擊是避坑落井也郭秀誠為失理應且容之若遂所忿城內自潰胡賊聞之指來掩襲諸君雖得殺秀無解胡虜矣纍弱非一宜深思之撫等悔悟與秀交和時數萬口賴翜獲全明年率數千家將謀東下遇道險不得進因留密縣司隸校尉荀組以為參軍廣威將軍復領本縣率邑人三千督新城梁陽城三郡諸營事頃之遷司隸司馬仍督營事率衆進至汝水柴肥口復阻賊翜乃單馬至許昌見司空荀藩以為振威將軍行梁國內史建興初復為豫州司馬督司州軍事太傅參軍王玄代翜為郡時梁國部曲將耿奴甚得人情而專勢翜常優遇之玄為政既急翜知其不能容奴因戒之曰卿威殺已多而人情難一宜深慎之玄納翜言外羈縻奴而內懷憤會遷為陳留將發乃收奴斬之奴餘黨聚衆殺玄梁郡既有內難而徐州賊張平等欲掩襲之郡人遑惑將以郡歸平荀組遣翜往撫之衆心乃定頃之組舉翜為吏部郎不應召遂東過江元帝為晉王以翜為散騎郎轉太子中庶子出為奮威將軍淮南內史永昌初王敦構逆征西將軍戴若思令翜出軍赴難翜遣將領五百人從之明帝即位徵拜屯騎校尉遷太子左衛率成帝初為左衛將軍蘇峻之役朝廷戒嚴以翜為侍中典征討軍事既而王師敗績司徒王導謂翜曰至尊當御正殿君可啓令速出翜即入上閣躬自抱帝登太極前殿導升御牀抱帝翜及鍾雅劉超侍立左右時百官奔散殿省蕭然峻兵既入叱翜令下翜正立不動呵之曰蘇冠軍來覲至尊軍人豈得侵逼由是兵士不敢上殿及峻執政猶以為侍中從乘輿幸石頭明年與光祿大夫陸曄等出據苑城蘇逸任讓圍之翜等固守賊平以功封長平縣伯遷丹楊尹時京邑焚蕩人物凋殘翜收集散亡甚有惠政代庾亮為中護軍鎮石頭尋為領軍徙五兵尚書加奉車都尉監新宮事遷尚書右僕射轉左僕射加散騎常侍久之代何充為護軍將軍常侍如故咸康七年卒時年六十七贈衛將軍諡曰穆子希嗣官至豫章太守蔡謨蔡謨字道明陳留考城人也世為著姓曾祖睦魏尚書祖德樂平太守父克少好學博涉書記為邦族所敬性公亮守正行不合己雖富貴不交也高平劉整恃才縱誕服飾詭異無所拘忌嘗行造人遇克在坐整終席慚不自安克時為處士而見憚如此後為成都王穎大將軍記室督穎為丞相擢為東曹掾克素有格量及居選官苟進之徒望風畏憚初克未仕時河內山簡嘗與琅邪王衍書曰蔡子尼今之正人衍以書示衆曰山子以一字拔人然未易可稱後衍聞克在選官曰山子正人之言驗於今矣陳留時為大郡號稱多士琅邪王澄行經其界太守呂豫遣吏迎之澄入境問吏曰此郡人士為誰吏曰有蔡子尼江應元是時郡人多居大位者澄以其姓名問曰甲乙等非君郡人邪吏曰是也曰然則何以但稱此二人吏曰向謂君侯問人不謂問位澄笑而止到郡以吏言謂豫曰舊名此郡有風俗果然小吏亦知如此克以朝政日弊遂絶不仕東嬴公騰為車騎將軍鎮河北以克為從事中郎知必不就以軍期致之克不得已至數十日騰為汲桑所攻城陷克見害謨弱冠察孝廉州辟從事舉秀才東海王越召為掾皆不就避亂渡江時明帝為東中郎將引為參軍元帝拜丞相復辟為掾轉參軍後為中書侍郎歷義興太守大將軍王敦從事中郎司徒左長史遷侍中蘇峻構逆吳國內史庾冰出奔會稽乃以謨為吳國內史謨既至與張闓顧衆顧揚等共起義兵迎冰還郡峻平復為侍中遷五兵尚書領琅邪王師謨上疏讓曰八坐之任非賢莫居前後所用資名有常孔愈諸葛恢並以清節令才少著名望昔愈為御史中丞臣尚為司徒長史恢為會稽太守臣為尚書郎恢尹丹楊臣守小郡名輩不同階級殊懸今猥以輕鄙超倫踰等上亂聖朝貫魚之序下違羣士準平之論豈惟微臣其亡之誡實招聖政惟塵之纍且左長史一超而侍帷幄再登而廁納言中興已來上德之舉所未嘗有臣何人斯而猥當之是以叩心自忖三省愚身與其苟進以穢清塗寧受違命狷固之罪疏奏不許轉掌吏部以平蘇峻勳賜爵濟陽男又讓不許冬蒸謨領祠部主者忘設明帝位與太常張泉俱免白衣領職頃之遷太常領祕書監以疾不堪親職上疏自解不聽成帝臨軒遣使拜太傅太尉司空會將作樂宿懸於殿庭門下奏非祭祀燕饗則無設樂之制事下太常謨議臨軒遣使宜有金石之樂遂從之臨軒作樂自此始也彭城王紘上言樂賢堂有先帝手畫佛象經歷寇難而此堂猶存宜敕作頌帝下其議謨曰佛者夷狄之俗非經典之制先帝量同天地多才多藝聊因臨時而畫此象至於雅好佛道所未承聞也盜賊奔突王都隳敗而此堂塊然獨存斯誠神靈保祚之徵然未是大晉盛德之形容歌頌之所先也人臣覩物興義私作賦頌可也今欲發王命敕史官上稱先帝好佛之志下為夷狄作一象之頌於義有疑焉於是遂寢時征西將軍庾亮以石勒新死欲移鎮石城為滅賊之漸事下公卿謨議曰時有否泰道有屈伸暴逆之寇雖終滅亡然當其強盛皆屈而避之是以高祖受黜於巴漢忍辱於平城也若爭強於鴻門則亡不終日故蕭何曰百戰百敗不死何待也原始耍終歸於大濟而已豈與當亡之寇爭遲速之間哉夫惟鴻門之不爭故垓下莫能與之爭文王身圮於羑里故道泰於牧野句踐見屈於會稽故威申於強吳今日之事亦由此矣賊假息之命垂盡而豺狼之力尚強宜抗威以待時或曰抗威待時時已可矣愚以為時之可否在賊之強弱賊之強弱在季龍之能否季龍之能否可得而言矣自勒初起則季龍為爪牙百戰百勝遂定中國境土所據同於魏世及勒死之日將相內外欲誅季龍季龍獨起於衆異之中殺嗣主誅寵臣內難既定千里遠出一攻而拔金墉再戰而斬石生禽彭彪殺石聰滅郭權還據根本內外並定四方鎮守不失尺土詳察此事豈能乎將不能也假令不能者為之其將濟乎將不濟也賊前攻襄陽而不能拔誠有之矣不信百戰之效而執一攻之驗棄多從少於理安乎譬若射者百發而一不中可謂之拙乎且不拔襄陽者非季龍身也桓平北守邊之將耳賊前攻之爭疆埸耳得之為善不得則止非其所急也今征西之往則異於是何者重鎮也名賢也中國之人所聞而歸心也今而西度實有席卷河南之勢賊所大懼豈與桓宣同哉季龍必率其精兵身來距爭若欲與戰戰何如石生若欲城守守何如金墉若欲阻沔沔何如大江蘇峻何如季龍凡此數者宜詳校之愚謂石生猛將關中精兵征西之戰不能勝也金墉險固劉曜十萬所不能拔今征西之守不能勝也又是時兗州洛陽關中皆舉兵擊季龍今此三處反為其用方之於前倍半之覺也若石生不能敵其半而征西欲當其倍愚所疑也蘇峻之強不及季龍沔水之險不及大江大江不能禦蘇峻而以沔水禦季龍又所疑也昔祖士稚在譙佃於城北慮賊來攻因以為資故豫安軍屯以禦其外穀將熟賊果至丁夫戰於外老弱穫於內多持炬火急則燒穀而走如此數年竟不得其利是時賊唯據沔北方之於今四分之一耳士稚不能捍其一而征西欲禦其四又所疑也或云賊若多來則必無糧然致糧之難莫過崤函而季龍昔涉此險深入敵國平關中而後還今至襄陽路既無險又行其國內自相供給方之於前難易百倍前已經至難而謂今不能濟其易又所疑也然此所論但説征西既至之後耳尚未論道路之慮也自沔以西水急岸高魚貫泝流首尾百里若賊無宋襄之義及我未陳而擊之將如之何今王士與賊水陸異勢便習不同寇若送死雖開江延敵以一當千猶吞之有餘宜誘而致之以保萬全棄江遠進以我所短擊彼所長懼非廟勝之算朝議同之故亮不果移鎮初皇后每年拜陵勞費甚多謨建議曰古者皇后廟見而已不拜陵也由是遂止及太尉郗鑒疾篤出謨為太尉軍司加侍中鑒卒即拜謨為征北將軍都督徐兗青三州揚州之晉陵豫州之沛郡諸軍事領徐州刺史假節時左衛將軍陳光上疏請伐胡詔令攻壽陽謨上疏曰今壽陽城小而固自壽陽至琅邪城壁相望其間遠者裁百餘里一城見攻衆城必救且王師在路五十餘日劉仕一軍早已入淮又遣數部北取堅壁大軍未至聲息久聞而賊之郵驛一日千里河北之騎足以來赴非惟鄰城相救而已夫以白起韓信項籍之勇猶發梁焚舟背水而陳今欲停船水渚引兵造城前對堅敵顧臨歸路此兵法之所誡也若進攻未拔胡騎卒至懼桓子不知所為而舟中之指可掬今征軍五千皆王都精鋭之衆又光為左衛遠近聞之名為殿中之軍宜令所向有征無戰而頓之堅城之下勝之不武不勝為笑今以國之上駟擊寇之下邑得之則利薄而不足損敵失之則害重而足以益寇懼非策之長者臣愚以為聞寇而致討賊退而振旅於事無失不勝管見謹冒陳聞季龍於青州造船數百掠緣海諸縣所在殺戮朝廷以為憂謨遣龍驤將軍徐玄等守中洲并設募若得賊大白船者賞布千匹小船百匹是時謨所統七千餘人所戍東至土山西至江乘鎮守八所城壘凡十一處烽火樓望三十餘處隨宜防備甚有算略先是郗鑒上部下有勳勞者凡一百八十人帝並酬其功未卒而鑒薨斷不復與謨上疏以為先已許鑒今不宜斷且鑒所上者皆積年勳效百戰之餘亦不可不報詔聽之康帝即位徵拜左光祿大夫開府儀同三司領司徒代殷浩為揚州刺史又録尚書事領司徒如故初謨沖讓不辟僚佐詔屢敦逼之始取掾屬石季龍死中國大亂時朝野咸謂當太平復舊謨獨謂不然語所親曰胡滅誠大慶也然將貽王室之憂或曰何哉謨曰夫能順天而奉時濟六合於草昧若非上哲必由英豪度德量力非時賢所及必將經營分表疲人以逞志才不副意略不稱心財單力竭智勇俱屈此韓盧東郭所以雙斃也遷侍中司徒上疏讓曰伏自惟省昔階謬恩蒙忝非據尸素纍積而光寵更崇謗讟彌興而榮進復加上虧聖朝棟隆之舉下增微臣覆餗之釁惶懼戰灼寄顏無所乞垂天鑒回恩改謬以允羣望皇太后詔報不許謨猶固讓謂所親曰我若為司徒將為後代所哂義不敢拜也皇太后遣使喻意自四年冬至五年末詔書屢下謨固守所執六年復上疏以疾病乞骸骨上左光祿大夫領司徒印綬章表十餘上穆帝臨軒遣侍中紀璩黃門郎丁纂徵謨謨陳疾篤使主簿謝攸對曰臣謨不幸有公族穆子之疾天威不違顏咫尺不敢奉詔寢伏待罪自旦至申使者十餘反而謨不至時帝年八歲甚倦問左右曰所召人何以至今不來臨軒何時當竟君臣俱疲弊皇太后詔必不來者宜罷朝中軍將軍殷浩奏免吏部尚書江虨官簡文時為會稽王命曹曰蔡公傲違上命無人臣之禮若人主卑屈於上大義不行於下亦不知復所以為政矣於是公卿奏曰司徒謨頃以常疾久逋王命皇帝臨軒百僚齊立俯僂之恭有望於謨若志存止退自宜致辭闕庭安有人君卑勞終日而人臣曾無一酬之禮悖慢傲上罪同不臣臣等參議宜明國憲請送廷尉以正刑書謨懼率子弟素服詣闕稽顙躬到廷尉待罪皇太后詔曰謨先帝師傅服事纍世且歸罪有司內訟思愆若遂致之于理情所未忍可依舊制免為庶人謨既被廢杜門不出終日講誦教授子弟數年皇太后詔曰前司徒謨以道素著稱軌行成名故歷事先朝致位台輔以往年之失用致黜責自爾已來闔門思愆誠合大臣罪己之義以謨為光祿大夫開府儀同三司於是遣謁者僕射孟洪就加册命謨上疏陳謝曰臣以頑薄昔忝殊寵尸素纍紀加違慢詔命當肆市朝幸蒙寬宥不悟天施復加光飾非臣隕越所能上報臣寢疾未損不任詣闕不勝仰感聖恩謹遣拜章遂以疾篤不復朝見詔賜几杖門施行馬十二年卒時年七十六賵贈之禮一依太尉陸玩故事詔贈侍中司空諡曰文穆謨博學於禮儀宗廟制度多所議定文筆論議有集行於世總應劭以來注班固漢書者為之集解謨初渡江見彭蜞大喜曰蟹有八足加以二螯令烹之既食吐下委頓方知非蟹後詣謝尚而説之尚曰卿讀爾雅不熟幾為勸學死謨性方雅丞相王導作女伎施設牀席謨先在坐不悅而去導亦不止之性尤篤慎每事必為過防故時人云蔡公過浮航脫帶腰舟長子邵永嘉太守少子系有才學文義位至撫軍長史諸葛恢諸葛恢字道明琅邪陽都人也祖誕魏司空為文帝所誅父靚奔吳為大司馬吳平逃竄不出武帝與靚有舊靚姊又為琅邪王妃帝知靚在姊間因就見焉靚逃於廁帝又逼見之謂曰不謂今日復得相見靚流涕曰不能漆身皮面復覩聖顏詔以為侍中固辭不拜歸於鄉里終身不向朝廷而坐恢弱冠知名試守即丘長轉臨沂令為政和平值天下大亂避地江左名亞王導庾亮導嘗謂曰明府當為黑頭公及導拜司空恢在坐導指冠謂曰君當復著此導嘗與恢戲爭族姓曰人言王葛不言葛王也恢曰不言馬驢而言驢馬豈驢勝馬邪其見親狎如此于時潁川荀闓字道明陳留蔡謨字道明與恢俱有名譽號曰中興三明人為之語曰京都三明各有名蔡氏儒雅荀葛清元帝為安東將軍以恢為主簿再遷江寧令討周馥有功封博陵亭侯復為鎮東參軍與卞壼並以時譽遷從事中郎兼統記室時四方多務箋疏殷積恢斟酌酬答咸稱折中于時王氏為將軍而恢兄弟及顏含並居顯耍劉超以忠謹掌書命時人以帝善任一國之才愍帝即位徵用四方賢雋召恢為尚書郎元帝以經緯須才上疏留之承制調為會稽太守臨行帝為置酒謂曰今之會稽昔之關中足食足兵在於良守以君有蒞任之方是以相屈四方分崩當匡振圮運政之所先君為言之恢陳謝因對曰今天下喪亂風俗陵遲宜尊五美屏四惡進忠實退浮華帝深納焉太興初以政績第一詔曰自頃多難官長數易益有諸弊雖聖人猶久於其道然後化成況其餘乎漢宣帝稱與我共安天下者其惟良二千石斯言信矣是以黃霸等或十年或二十年而不徙所以能濟其中興之勳也賞罰黜陟所以明政道也會稽內史諸葛恢蒞官三年政清人和為諸郡首宜進其位班以勸風教今增恢秩中二千石頃之以母憂去官服闋拜中書令王敦上恢為丹楊尹以久疾免明帝征敦以恢為侍中加奉車都尉討王含有功進封建安伯以先爵賜次子虪為關內侯又拜恢後將軍會稽內史徵為侍中遷左民尚書武陵王師吏部尚書纍遷尚書右僕射加散騎常侍銀青光祿大夫領選本州大中正尚書令常侍吏部如故成帝踐阼加侍中金紫光祿大夫卒年六十二贈左光祿大夫儀同三司賵贈之禮一依太尉興平伯故事諡曰敬祠以太牢子甝嗣位至散騎常侍恢兄頤字道回亦為元帝所器重終於太常殷浩顧悅之蔡裔殷浩字深源陳郡長平人也父羡字洪喬為豫章太守都下人士因其致書者百餘函行次石頭皆投之水中曰沈者自沈浮者自浮殷洪喬不為致書郵其資性介立如此終於光祿勳浩識度清遠弱冠有美名尤善玄言與叔父融俱好老易融與浩口談則辭屈著篇則融勝浩由是為風流談論者所宗或問浩曰將蒞官而夢棺將得財而夢糞何也浩曰官本臭腐故將得官而夢尸錢本糞土故將得錢而夢穢時人以為名言三府辟皆不就征西將軍庾亮引為記室參軍纍遷司徒左長史安西庾翼復請為司馬除侍中安西軍司並稱疾不起遂屏居墓所幾將十年于時擬之管葛王濛謝尚猶伺其出處以卜江左興亡因相與省之知浩有確然之志既反相謂曰深源不起當如蒼生何庾翼貽浩書曰當今江東社稷安危內委何褚諸君外託庾桓數族恐不得百年無憂亦朝夕而弊足下少標令名十餘年間位經內外而欲潛居利貞斯理難全且夫濟一時之務須一時之勝何必德均古人韻齊先達邪王夷甫先朝風流士也然吾薄其立名非真而始終莫取若以道非虞夏自當超然獨往而不能謀始大合聲譽極致名位正當抑揚名教以靜亂源而乃高談莊老説空終日雖云談道實長華競及其末年人望猶存思安懼亂寄命推務而甫自申述徇小好名既身囚胡虜棄言非所凡明德君子遇會處際寧可然乎而世皆然之益知名實之未定弊風之未革也浩固辭不起建元初庾冰兄弟及何充等相繼卒簡文帝時在藩始綜萬幾衛將軍褚裒薦浩徵為建武將軍揚州刺史浩上疏陳讓并致箋於簡文具自申簡文答之曰屬當厄運危弊理盡誠賴時有其才不復遠求版築足下沈識淹長思綜通練起而明之足以經濟若復深存挹退苟遂本懷吾恐天下之事於此去矣今紘領不振晉網不綱願蹈東海復可得邪由此言之足下去就即是時之廢興時之廢興則家國不異足下弘思之靜算之亦將有以深鑒可否望必廢本懷率羣情也浩頻陳讓自三月至七月乃受拜焉時桓溫既滅蜀威勢轉振朝廷憚之簡文以浩有盛名朝野推伏故引為心膂以抗於溫於是與溫頗相疑二會遭父憂去職時以蔡謨攝揚州以俟浩服闋徵為尚書僕射不拜復為建武將軍揚州刺史遂參綜朝權潁川荀羡少有令聞浩擢為義興吳郡以為羽翼王羲之密説浩羡令與桓溫和同不宜內構嫌隙浩不從及石季龍死胡中大亂朝廷欲遂蕩平關河於是以浩為中軍將軍假節都督揚豫徐兗青五州軍事浩既受命以中原為己任上疏北征許洛將發墜馬時咸惡之既而以淮南太守陳逵兗州刺史蔡裔為前鋒安西將軍謝尚北中郎將荀羡為督統開江西體田千餘頃以為軍儲師次壽陽潛誘苻健大臣梁安雷弱兒等使殺健許以關右之任初降人魏脫卒其弟憬代領部曲姚襄殺憬以并其衆浩大惡之使龍驤將軍劉啓守譙遷襄於梁既而魏氏子弟往來壽陽襄益猜懼俄而襄部曲有欲歸浩者襄殺之浩於是謀誅襄會苻健殺其大臣健兄子眉自洛陽西奔浩以為梁安事捷意苻健已死請進屯洛陽修復園陵使襄為前驅冠軍將軍劉洽鎮鹿臺建武將軍劉遁據倉垣又求解揚州專鎮洛陽詔不許浩既至許昌會張遇反謝尚又敗績浩還壽陽後復進軍次山桑而襄反浩懼棄輜重退保譙城器械軍儲皆為襄所掠士卒多亡叛浩遣劉啓王彬之擊襄於山桑並為襄所殺桓溫素忌浩及聞其敗上疏罪浩曰案中軍將軍浩過蒙朝恩叨竊非據寵靈超卓再司京輦不能恭慎所任恪居職次而侵官離局高下在心前司徒臣謨執義履素位居台輔師傅先帝朝之元老年登七十以禮請退雖臨軒固辭不順恩旨適足以明遜讓之風弘優賢之禮而浩虛生狡説疑誤朝聽獄之有司將致大辟自羯胡夭亡羣凶殄滅而百姓塗炭企遲拯接浩受專征之重無雪恥之志坐自封植妄生風塵遂使寇讎稽誅姦逆並起華夏鼎沸黎元殄悴浩懼罪將及不容於朝外聲進討內求苟免出次壽陽頓甲彌年傾天府之資竭五州之力收合無賴以自強衛爵命無章猜害罔顧故范豐之屬反叛於芍陂奇德龍會作變於肘腋羌帥姚襄率衆歸化遣其母弟入質京邑浩不能撫而用之陰圖殺害再遣刺客為襄所覺襄遂惶懼用致逆命生長亂階自浩始也復不能以時掃滅縱放小豎鼓行毒身狼狽於山桑軍破碎於梁國舟車焚燒輜重覆沒三軍積實反以資寇精甲利器更為賊用神怒人怨衆之所棄傾危之憂將及社稷臣所以忘寢屏營啓處無地夫率正顯義所以致訓明罰敕法所以齊衆伏願陛下上追唐堯放命之刑下鑒春秋無君之典若聖上含弘未忍誅殛且宜遐棄擯之荒裔雖未足以塞山海之責粗可以宣誡於將來矣竟坐廢為庶人徙于東陽之信安縣浩少與溫齊名而每心競溫嘗問浩君何如我浩曰我與君周旋久寧作我也溫既以雄豪自許每輕浩浩不之憚也至是溫語人曰少時吾與浩共騎竹馬我棄去浩輒取之故當出我下也又謂郗超曰浩有德有言向使作令僕足以儀刑百揆朝廷用違其才耳浩雖被黜放口無怨言夷神委命談詠不輟雖家人不見其有流放之戚但終日書空作咄咄怪事四字而已浩甥韓伯浩素賞愛之隨至徙所經歲還都浩送至渚側詠曹顏遠詩云富貴他人合貧賤親戚離因而泣下後溫將以浩為尚書令遺書告之浩欣然許焉將答書慮有謬誤開閉者數十竟達空函大忤溫意由是遂絶永和十二年卒子涓亦有美名咸安初桓溫廢太宰武陵王晞誣涓及庾倩與晞謀反害之浩後將改葬其故吏顧悅之上疏訟浩曰伏見故中軍將軍揚州刺史殷浩體德沈粹識理淹長風流雅勝聲蓋當時再臨神州萬里肅清勳績茂著聖朝欽嘉遂授分陝推轂之任戎旗既建出鎮壽陽驅其豺狼翦其荊棘收羅向義廣開屯田沐雨櫛風等勤臺僕仰憑皇威羣醜革面進軍河洛修復園陵不虞之變中路猖蹶遂令為山之功崩於垂成忠款之志於是而廢既受削黜自擯山海杜門終身與世兩絶可謂克己復禮窮而無怨者也尋浩所犯蓋負敗之常科非即情之永責論其名德深誠則如彼察其補過罪己則如此豈可棄而不恤使法有餘冤方今宅兆已成埏隧已開懸棺而窆禮同庶人存亡有非命之分九泉無自訴之期仰感三良昊天罔極若使明詔爰發旌我善人崇復本官遠彰幽昧斯則國家威恩有兼濟之美死而可作無負心之恨疏奏詔追復浩本官顧悅之字君叔少有義行與簡文同年而髮早白帝問其故對曰松柏之姿經霜猶茂蒲柳常質望秋先零簡文悅其對始將抗表訟浩浩親故多謂非宜悅之決意以聞又與朝臣爭論故衆無以奪焉時人咸稱之為州別駕歷尚書右丞卒子凱之別有傳蔡裔者有勇氣聲若雷震嘗有二偷入室裔拊牀一呼而盜俱隕故浩委以軍鋒焉史臣曰陸曄等並以時望國華效彰歷試迭居端揆參掌機衡然皆率由舊章得免祗悔而充抗言孺子雖屈壓於權臣翊奉儲君竟導揚於末命頻參大議屢畫嘉謀可謂忠貞在斯而已殷浩清徽雅量衆議攸歸高秩厚禮不行而至咸謂教義由其興替社稷俟以安危及其入處國鈞未有嘉謀善政出總戎律唯聞蹙國喪師是知風流異貞固之才談論非奇正之要違方易任以致播遷悲夫蔡謨度德而處弘斯止足置以刑書斯為過矣贊曰士光時望士瑤允當政既弟兄任惟台相祖言簡率遺風可尚蔡葛知名或雅或清次道方概謀遠忠貞中軍鑒局譽光雅俗夷曠有餘經綸不足舍長任短功虧名辱
