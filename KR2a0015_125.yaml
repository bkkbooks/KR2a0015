body:
  text: 晉書卷一百二十五載記第二十五乞伏國仁乞伏國仁隴西鮮卑人也在昔有如弗斯出連叱盧三部自漠北南出大陰山遇一巨蟲於路狀若神龜大如陵阜乃殺馬而祭之祝曰若善神也便開路惡神也遂塞不通俄而不見乃有一小兒在焉時又有乞伏部有老父無子者請養為子衆咸許之老父欣然自以有所依憑字之曰紇干紇干者夏言依倚也年十歲驍勇善騎射彎弓五百斤四部服其雄武推為統主號之曰乞伏可汗託鐸莫何託鐸者言非神非人之稱也其後有祐鄰者即國仁五世祖也泰始初率戶五千遷于夏緣部衆稍盛鮮卑鹿結七萬餘落屯于高平川與祐鄰迭相攻擊鹿結敗南奔略陽祐鄰盡并其衆因居高平川祐鄰死子結權立徙于牽屯結權死子利那立擊鮮卑吐賴于烏樹山討尉遲渴權于大非川收衆三萬餘落利那死弟祁碸立祁碸死利那子述延立討鮮卑莫侯于苑川大破之降其衆二萬餘落因居苑川以叔父軻碸為師傅委以國政斯引烏碸為左輔將軍鎮蔡園川出連高胡為右輔將軍鎮至便川叱盧那胡為率義將軍鎮牽屯山述延死子大寒立會石勒滅劉曜懼而遷于麥田旡孤山大寒死子司繁立始遷于度堅山尋為苻堅將王統所襲部衆叛降于統司繁歎謂左右曰智不距敵德不撫衆劍騎未交而本根已敗見衆分散勢亦難全若奔諸部必不我容吾將為呼韓邪之計矣乃詣統降于堅堅大悅署為南單于留之長安以司繁叔父吐雷為勇士護軍撫其部衆俄而鮮卑勃寒侵斥隴右堅以司繁為使持節都督討西胡諸軍事鎮西將軍以討之勃寒懼而請降司繁遂鎮勇士川甚有威惠司繁卒國仁代鎮及堅興壽春之役徵為前將軍領先鋒騎會國仁叔父步穨叛於隴西堅遣國仁還討之步穨聞而大悅迎國仁於路國仁置酒高會攘袂大言曰苻氏往因趙石之亂遂妄竊名號窮兵極武跨僭八州疆宇既寧宜綏以德方虛廣威聲勤心遠略騷動蒼生疲弊中國違天怒人將何以濟且物極則虧禍盈而覆者天之道也以吾量之是役也難以免矣當與諸君成一方之業及堅敗歸乃招集諸部有不附者討而并之衆至十餘萬及堅為姚萇所殺國仁謂其豪帥曰苻氏以高世之姿而困於烏合之衆可謂天也夫守常迷運先達恥之見機而作英豪之舉吾雖薄德藉纍世之資豈可覩時來之運而不作乎以孝武太元十年自稱大都督大將軍大單于領秦河二州牧建元曰建義以其將乙旃音碸為左相屋引出支為右相獨孤匹蹄為左輔武羣勇士為右輔弟乾歸為上將軍自餘拜授各有差置武城武陽安固武始漢陽天水略陽漒川甘松匡朋白馬苑川十二郡築勇士城以居之鮮卑匹蘭率衆五千降明年南安祕宜及諸羌虜來擊國仁四面而至國仁謂諸將曰先人有奪人之心不可坐待其至宜抑威餌敵羸師以張之軍法所謂怒我而怠寇也於是勒衆五千襲其不意大敗之祕宜奔還南安尋與其弟莫侯悌率衆三萬餘戶降於國仁各拜將軍刺史苻登遣使者署國仁使持節大都督都督雜夷諸軍事大將軍大單于苑川王國仁率騎三萬襲鮮卑大人密貴裕苟提倫等三部於六泉高平鮮卑沒奕于東胡金熙連兵來襲相遇于渴渾川大戰敗之斬級三千獲馬五千匹沒奕于及熙奔還三部震懼率衆迎降署密貴建義將軍六泉侯裕苟建忠將軍蘭泉侯提倫建節將軍鳴泉侯國仁建威將軍叱盧烏孤跋擁衆叛保牽屯山國仁率騎七千討之斬其部將叱羅侯降者千餘戶跋大懼遂降復其官位因討鮮卑越質叱黎于平襄大破之獲其子詰歸弟子復半及部落五千餘人而還太元十三年國仁死在位四年偽諡宣烈王廟號烈祖乞伏乾歸乾歸國仁弟也雄武英傑沈雅有度量國仁之死也其羣臣咸以國仁子公府沖幼宜立長君乃推乾歸為大都督大將軍大單于河南王赦其境內改元曰太初立其妻邊氏為王后以出連乞都為丞相鎮南將軍南梁州刺史悌眷為御史大夫自餘封拜各有差遂遷于金城太元十四年苻登遣使署乾歸大將軍大單于金城王南羌獨如率衆七千降之休官阿敦侯年二部各擁五千餘落據牽屯山為其邊害乾歸討破之悉降其衆於是聲振邊服吐谷渾大人視連遣使貢方物鮮卑豆留叱豆渾及南丘鹿結并休官曷呼奴盧水尉地跋並率衆降于乾歸皆署其官爵隴西太守越質詰歸以平襄叛自稱建國將軍右賢王乾歸擊敗之詰歸東奔隴山既而擁衆來降乾歸妻以宗女署立義將軍苻登將沒奕于遣使結好以二子為質請討鮮卑大兜國乾歸乃與沒奕于攻大兜於安陽城大兜退固鳴蟬堡乾歸攻陷之遂還金城為呂光弟寶所攻敗於鳴雀峽退屯青岸寶進追乾歸乾歸使其將彭奚念斷其歸路躬貫甲胄連戰敗之寶及將士投河死者萬餘人苻登遣使署乾歸假黃鉞大都督隴右河西諸軍事左丞相大將軍河南王領秦梁益涼沙五州牧加九錫之禮時登為姚興所逼遣使請兵進封乾歸梁王命置官司納其妹東平長公主為梁王后乾歸遣其前將軍乞伏益州冠軍翟瑥率騎二萬救之會登為興所殺乃還師氐王楊定率步騎四萬伐之乾歸謂諸將曰楊定以勇虐聚衆窮兵逞欲兵猶火也不戢將自焚定之此役殆天以之資我也於是遣其涼州牧乞伏軻殫秦州牧乞伏益州立義將軍詰歸距之定敗益州於平川軻殫詰歸引衆而退翟瑥奮劍諫曰吾王以神武之姿開基隴右東征西討靡不席卷威震秦梁聲光巴漢將軍以維城之重受閫外之寄宜宣力致命輔寧家國秦州雖敗二軍猶全奈何不思赴救便逆奔敗何面目以見王乎昔項羽斬慶子以寧楚胡建戮監軍以成功將軍之所聞也瑥誠才非古人敢忘項氏之義乎軻殫曰向所以未赴秦州者未知衆心何如耳敗不相救軍罰所先敢自寧乎乃率騎赴之益州詰歸亦勒衆而進大敗定斬定及首虜萬七千級於是盡有隴西巴西之地太元十七年赦其境內殊死以下署其長子熾磐領尚書令左長史邊芮為尚書左僕射右長史祕宜為右僕射翟瑥為吏部尚書翟勍為主客尚書杜宣為兵部尚書王松壽為民部尚書樊謙為三公尚書方弘麴景為侍中自餘拜授一如魏武晉文故事猶稱大單于大將軍楊定之死也天水薑乳襲據上邽至是遣乞伏益州討之邊芮王松壽言於乾歸曰益州以懿弟之親屢有戰功狃於纍勝常有驕色若其遇寇必將易之且未宜專任示有所先乾歸曰益州驍勇善御衆諸將莫有及之者但恐其專擅耳若以重佐輔之當無慮也於是以平北韋虔為長史散騎常侍務和為司馬至大寒嶺益州恃勝自矜不為部陳命將士解甲遊畋縱飲令曰敢言軍事者斬虔等諫曰王以將軍親重故委以專征之任庶能摧彼凶醜以副具瞻賊已垂逼奈何解甲自寬宴安鴆毒竊為將軍危之益州曰乳以烏合之衆聞吾至理應遠竄今乃與吾決戰者斯成擒也吾自揣之有方卿等不足慮也乳率衆距戰益州果敗乾歸曰孤違蹇叔以至於此將士何為孤之罪也皆赦之索虜禿髮如苟率戶二萬降之乾歸妻以宗女呂光率衆十萬將伐乾歸左輔密貴周左衛莫者羖羝言於乾歸曰光旦夕將至陛下以命世雄姿開業洮罕克翦羣凶威振遐邇將鼓淳風於東夏建八百之鴻慶不忍小屈與姦豎競於一時若機事不捷非國家利也宜遣愛子以退之乾歸乃稱藩於光遣子敕勃為質既而悔之遂誅周等乞伏軻殫與乞伏益州不平奔于呂光光又伐之咸勸其東奔成紀乾歸不從謂諸將曰昔曹孟德敗袁本初於官渡陸伯言摧劉玄德於白帝皆以權略取之豈在衆乎光雖舉全州之軍而無經遠之算不足憚也且其精卒盡在呂延延雖勇而愚易以奇策制之延軍若敗光亦遁還乘勝追奔可以得志衆咸曰非所及也隆安元年光遣其子纂伐乾歸使呂延為前鋒乾歸泣謂衆曰今事勢窮踧逃命無所死中求生正在今日涼軍雖四面而至然相去遼遠山河既阻力不周接敗其一軍而衆軍自退乃縱反間稱秦王乾歸衆潰東奔成紀延信之引師輕進果為乾歸所敗遂斬之禿髮烏孤遣使來結和親使乞伏益州攻克支陽鸇武允吾三城俘獲萬餘人而還又遣益州與武衛慕容允冠軍翟瑥率騎二萬伐吐谷渾視羆至于度周川大破之視羆遁保白蘭山遣使謝罪貢其方物以子宕豈為質鮮卑掘河內率戶五千自魏降乾歸乾歸所居南景門崩惡之遂遷于苑川姚興將姚碩德率衆五萬伐之入自南安峽乾歸次于隴西以距碩德興潛師繼發乾歸聞興將至謂諸將曰吾自開建以來屢摧勍敵乘機藉算舉無遺策今姚興盡中國之師軍勢甚盛山川阻狹無縱騎之地宜引師平川伺其怠而擊之存亡之機在斯一舉卿等勠力勉之若梟翦姚興關中之地盡吾有也於是遣其衛軍慕容允率中軍二萬遷于柏陽鎮軍羅敦將外軍四萬遷于侯辰谷乾歸自率輕騎數千候興軍勢俄而大風昏霧遂與中軍相失為興追騎所逼入于外軍旦而交戰為興所敗乾歸遁還苑川遂走金城謂諸豪帥曰吾才非命世謬為諸君所推心存撥亂而德非時雄叨竊名器年踰一紀負乘致寇傾喪若斯今人衆已散勢不得安吾欲西保允吾以避其鋒若方軌西邁理難俱濟卿等宜安土降秦保全妻子羣下咸曰昔古公杖策豳人歸懷玄德南奔荊楚襁負分岐之感古人所悲況臣等義深父子而有心離背請死生與陛下俱乾歸曰自古無不亡之國廢興命也苟天未亡我冀興復有期德之不建何為俱死公等自愛吾將寄食以終餘年於是大哭而別乃率騎數百馳至允吾禿髮利鹿孤遣弟檀迎乾歸處之於晉興南羌梁弋等遣使招之乾歸將叛謀泄利鹿孤遣弟吐雷屯于捫天嶺乾歸懼為利鹿孤所害謂其子熾磐曰吾不能負荷大業致茲顛覆以利鹿孤義兼姻好冀存脣齒之援方乃忘義背親謀人父子忌吾威名勢不全立姚興方盛吾將歸之若其俱去必為追騎所及今送汝兄弟及汝母為質彼必不疑吾既在秦終不害汝於是送熾磐兄弟於西平乾歸遂奔長安姚興見而大悅署乾歸持節都督河南諸軍事鎮遠將軍河州刺史歸義侯遣乾歸還鎮苑川盡以部衆配之乾歸既至苑川以邊芮為長史王松壽為司馬公卿大將已下悉降號為偏裨元興元年熾磐自西平奔長安姚興以為振忠將軍興晉太守尋遣使者加乾歸散騎常侍左賢王遣隨興將齊難迎呂隆于河西討叛羌黨龍頭于滋川攻楊盛將苻帛于皮氏堡並克之又破吐谷渾將大孩俘獲萬餘人而還尋復率衆攻楊盛將楊玉于西陽堡克之既而苑川地震裂生毛狐雉入于寢內乾歸甚惡之姚興慮乾歸終為西州之患因其朝也興留為主客尚書以熾磐為建武將軍行西夷校尉監撫其衆熾磐以長安兵亂將始乃招結諸部二萬七千築城于嵻捒山以據之熾磐攻克枹罕遣使告之乾歸奔還苑川鮮卑悅大堅有衆五千自龍馬苑降乾歸乾歸遂如枹罕留熾磐鎮之乾歸收衆三萬遷于度堅山羣下勸乾歸稱王乾歸以寡弱弗許固請曰夫道應符曆雖廢必興圖籙所棄雖成必敗本初之衆非不多也魏武運籌四州瓦解尋邑之兵非不盛也世祖龍申亡新鳥散固天命不可虛邀符籙不可妄冀姚數將終否極斯泰乘機撫運實係聖人今見衆三萬足可以疆理秦隴清蕩洮河陛下應運再興四海鵠望豈宜固守謙沖不以社稷為本願時即大位允副羣心乾歸從之義熙三年僭稱秦王赦其境內改元更始置百官公卿已下皆復本位遣熾磐討諭薄地延師次煩于地延率衆出降署為尚書徙其部落于苑川又遣隴西羌昌何攻克姚興金城郡以其驍騎乞伏務和為東金城太守乾歸復都苑川又攻克興略陽南安隴西諸郡徙二萬五千戶於苑川枹罕姚興力未能西討恐更為邊害遣使署乾歸使持節散騎常侍都督隴西嶺北胸奴雜胡諸軍事征西大將軍河州牧大單于河南王乾歸方圖河右權宜受之遂稱藩于興遣熾磐與其次子中軍審虔率步騎一萬伐禿髮檀師濟河敗檀太子武臺于嶺南獲牛馬十餘萬而還又攻克興別將姚龍于伯陽堡王憬于永洛城徙四千餘戶於苑川三千餘戶于談郊乾歸率步騎三萬征西羌彭利髮於枹罕師次于奴葵谷利髮棄其部衆南奔乾歸遣其將公府追及于清水斬之乾歸入枹罕收羌戶一萬三千因率騎二萬討吐谷渾支統阿若干于赤水大破降之乾歸畋于五溪有梟集于其手甚惡之六年為兄子公府所弒并其諸子十餘人公府奔固大夏熾磐與乾歸弟廣武智達揚武木奕于討之公府走達等追擒于嵻捒南山并其四子轘之於談郊葬乾歸于枹罕偽諡武元王在位二十四年乞伏熾磐熾磐乾歸長子也性勇果英毅臨機能斷權略過人初乾歸為姚興所敗熾磐質於禿髮利鹿孤後自西平逃而降興興以為振忠將軍興晉太守又拜建武將軍行西夷校尉留其衆鎮苑川及乾歸返政復立熾磐為太子領冠軍大將軍都督中外諸軍録尚書事後乾歸稱藩于姚興興遣使署熾磐假節鎮西將軍左賢王平昌公尋進號撫軍大將軍乾歸死義熙六年熾磐襲偽位大赦改元曰永康署翟勍為相國麴景為御史大夫段暉為中尉弟延祚為禁中録事樊謙為司直罷尚書令僕射尚書六卿侍中散騎常侍黃門郎官置中左右常侍侍郎各三人義熙九年遣其龍驤乞伏智達平東王松壽討吐谷渾樹洛干於澆河大破之獲其將呼那烏提虜三千餘戶而還又遣其鎮東曇達與松壽率騎一萬東討破休官權小郎呂破胡于白石川虜其男女萬餘口進據白石城休官降者萬餘人後顯親休官權小成呂奴迦等叛保白坑曇達謂將士曰昔伯圭憑嶮卒有滅宗之禍韓約肆暴終受覆族之誅今小成等逆命白坑宜在除滅王者之師有征無戰粵爾輿人勠力勉之衆咸拔劍大呼於是進攻白坑斬小成奴迦及首級四千七百隴右休官悉降遣安北烏地延冠軍翟紹討吐谷渾別統句旁于泣勤川大破之俘獲甚衆熾磐率諸將討吐谷渾別統支旁于長柳川掘達于渴渾川皆破之前後俘獲男女二萬八千僭立十年有雲五色起於南山熾磐以為己瑞大悅謂羣臣曰吾今年應有所定王業成矣於是繕甲整兵以待四方之隙聞禿髮檀西征乙弗投劍而起曰可以行矣率步騎二萬襲樂都禿髮武臺憑城距守熾磐攻之一旬而克遂入樂都論功行賞各有差遣平遠犍虔率騎五千追檀徙武臺與其文武及百姓萬餘戶于枹罕檀遂降署為驃騎大將軍左南公隨檀文武依才銓擢之熾磐既兼檀兵強地廣置百官立其妻禿髮氏為王后十一年熾磐攻克沮渠蒙遜河湟太守沮渠漢平以其左衛匹逵為河湟太守因討降乙弗窟乾而還遣其將曇達王松壽等討南羌彌姐康薄于赤水降之熾磐攻漒川師次沓中沮渠蒙遜率衆攻石泉以救之熾磐聞而引還遣曇達與其將出連虔率騎五千赴之蒙遜聞曇達至引歸遣使聘于熾磐遂結和親又遣曇達王松壽等率騎一萬伐姚艾于上邽曇達進據蒲水艾距戰大敗之艾奔上邽曇達進屯大利破黃石大羌二戍徙五千餘戶于枹罕令其安東木奕于率騎七千討吐谷渾樹洛干于塞上破其弟阿柴於堯扞川俘獲五千餘口而還洛干奔保白蘭山而死熾磐聞而喜曰此虜矯矯所謂有豕白蹢往歲曇達東征姚艾敗走今木奕于西討黠虜遠逃境宇稍清姦凶方殄股肱惟良吾無患矣於是以曇達為左丞相其子元基為右丞相麴景為尚書令翟紹為左僕射遣曇達元基東討姚艾降之至是乙弗鮮卑烏地延率戶二萬降于熾磐署為建義將軍地延尋死弟他子立以子軻蘭質于西平他子從弟提孤等率戶五千以西遷叛于熾磐涼州刺史出連虔遣使喻之提孤等歸降熾磐以提孤姦猾終為邊患稅其部中戎馬六萬匹後二歲而提孤等扇動部落西奔出塞他子率戶五千入居西平先是姚艾叛降蒙遜蒙遜率衆迎之艾叔父俊言于衆曰秦王寬仁有雅度自可安土事之何為從涼主西遷衆咸以為然相率逐艾推俊為主遣使請降熾磐大悅徵俊為侍中中書監征南將軍封隴西公邑一千戶使征西孔子討吐谷渾覓地于弱水南大破之覓地率衆六千降于熾磐署為弱水護軍遣其左衛匹逵建威梯君等討彭利和于漒川大破之利和單騎奔仇池獲其妻子徙羌豪三千戶于枹罕漒川羌三萬餘戶皆安堵如故元熙元年立其第二子慕末為太子領撫軍大將軍都督中外諸軍事大赦境內改元曰建弘其臣佐等多所封授熾磐在位七年而宋氏受禪以宋元嘉四年死子慕末嗣偽位在位四年為赫連定所殺始國仁以孝武太元十年僭位至慕末四世凡四十有六載而滅史臣曰夫天地閉大祲生雲雷屯羣凶作自晉室遘孽胡兵肆禍封域無紀干戈是務國仁陰山遺噍難以義服伺我阽危長其陵暴向使偶欽明之運遭雄略之主已當褫魂沙漠請命䤝街豈暇竊據近郊經綸王業者也乾歸智不及遠而以力詐自矜陷呂延之師姦謀潛斷俘視羆之衆威策遐舉便欲誓汧隴之餘卒窺崤函之奧區秣疲馬而宵征翦勍敵而朝食既而控弦鳴鏑厥志未逞沮岸崩山其功已喪履重氛於外難幸以計全貽巨釁於蕭牆終成凶禍宜哉熾磐叱吒風雲見機而動牢籠俊傑決勝多奇故能命將掩澆河之酋臨戎襲樂都之地不盈數載遂隆偽業覽其遺迹盜亦有道乎馮跋馮素弗馮跋字文起長樂信都人也小字乞直伐其先畢萬之後也萬之子孫有食采馮鄉者因以氏焉永嘉之亂跋祖父和避地上黨父安雄武有器量慕容永時為將軍永滅跋東徙和龍家于長谷幼而懿重少言寬仁有大度飲酒一石不亂三弟皆任俠不修行業惟跋恭慎勤於家産父母器之所居上每有雲氣若樓閣時咸異之嘗夜見天門開神光赫然燭於庭內及慕容寶僭號署中衛將軍初跋弟素弗與從兄萬泥及諸少年遊于水濱有一金龍浮水而下素弗謂萬泥曰頗有見否萬泥等皆曰無所見也乃取龍而示之咸以為非常之瑞慕容熙聞而求焉素弗祕之熙怒及即偽位密欲誅跋兄弟其後跋又犯熙禁懼禍乃與其諸弟逃于山澤每夜獨行猛獸常為避路時賦役繁數人不堪命跋兄弟謀曰熙今昏虐兼忌吾兄弟既還首無路不可坐受誅滅當及時而起立公侯之業事若不成死其晚乎遂與萬泥等二十二人結謀跋與二弟乘車使婦人御潛入龍城匿于北部司馬孫護之室遂殺熙立高雲為主雲署跋為使持節侍中都督中外諸軍事征北大將軍開府儀同三司録尚書事武邑公跋宴羣僚忽有血流其左臂跋惡之從事中郎王垂因説符命之應跋戒其勿言雲為其幸臣離班桃仁所殺跋升洪光門以觀變帳下督張泰李桑謂跋曰此豎勢何所至請為公斬之於是奮劍而下桑斬班于西門泰殺仁于庭中衆推跋為主跋曰范陽公素弗才略不志於靖亂掃清凶桀皆公勳也素弗辭曰臣聞父兄之有天下傳之於子弟未聞子弟藉父兄之業而先之今鴻基未建危甚綴旒天工無曠業係大兄願上順皇天之命下副元元之心羣臣固請乃許之於是以太元二十年乃僭稱天王于昌黎而不徙舊號即國曰燕赦其境內建元曰太平分遣使者巡行郡國觀察風俗追尊祖和為元皇帝父安為宣皇帝尊母張氏為太后立妻孫氏為王后子永為太子署弟素弗為侍中車騎大將軍録尚書事弘為侍中征東大將軍尚書右僕射汲郡公從兄萬泥為驃騎大將軍幽平二州牧務銀提為上大將軍遼東太守孫護為侍中尚書令陽平公張興為衛將軍尚書左僕射永寧公郭生為鎮東大將軍領右衛將軍陳留公從兄子乳陳為征西大將軍并青二州牧上谷公姚昭為鎮南大將軍司隸校尉上黨公馬弗勤為吏部尚書廣宗公王難為侍中撫軍將軍潁川公自餘拜授文武進位各有差尋而萬泥抗表請代跋曰猥以不德謬為羣賢所推思與兄弟同茲休戚今方難未寧維城任重非明德懿親孰克居也且折衝禦侮為國藩屏雖有他人不如我弟兄豈得如所陳也於是加開府儀同三司義熙六年跋下書曰昔高祖為義帝舉哀天下歸其仁吾與高雲義則君臣恩踰兄弟其以禮葬雲及其妻子立雲廟於韭町置園邑二十家四時供薦初跋之立也萬泥乳陳自以親而有大功謂當入為公輔跋以二藩任重因而弗徵並有憾焉乳陳性粗獷勇氣過人密遣告萬泥曰乳陳有至謀願與叔父圖之萬泥遂奔白狼阻兵以叛跋遣馮弘與將軍張興將步騎二萬討之弘遣使喻之曰昔者兄弟乘風雲之運撫翼而起羣公以天命所鍾人望攸係推逼主上光踐寶位裂土疏爵當與兄弟共之奈何欲尋干戈於蕭牆棄友于而為閼伯過貴能改善莫大焉宜舍茲嫌同奬王室萬泥欲降乳陳按劍怒曰大丈夫死生有命決之于今何謂降也遂剋期出戰興謂弘曰賊明日出戰今夜必來驚我營宜命三軍以備不虞弘乃密嚴人課草十束畜火伏兵以待之是夜乳陳果遣壯士千餘人來斫營衆火俱起伏兵邀擊俘斬無遺乳陳等懼而出降弘皆斬之署素弗為大司馬改封遼西公馮弘為驃騎大將軍改封中山公跋下書曰自頃多故事難相尋賦役繁苦百姓困窮宜加寬宥務從簡易前朝苛政皆悉除之守宰當垂仁惠無得侵害百姓蘭臺都官明加澄察初慕容熙之敗也工人李訓竊寶而逃資至巨萬行貨于馬弗勤弗勤以訓為方略令既而失志之士書之於闕下碑馮素弗言之於跋請免弗勤官仍推罪之跋曰大臣無忠清之節貨財公行於朝雖由吾不明所致弗勤宜肆諸市朝以正刑憲但大業草創彝倫未弗勤拔自寒微未有君子之志其特原之李訓小人汙辱朝士可東市考竟於是上下肅然請賕路絶蝚蠕勇斛律遣使求跋女偽樂浪公主獻馬三千匹跋命其羣下議之素弗等議曰前代舊事皆以宗女妻六夷宜許以妃嬪之女樂浪公主不宜下降非類跋曰女生從夫千里豈遠朕方崇信殊俗奈何欺之乃許焉遣其遊擊秦都率騎二千送其女歸于蝚蠕庫莫奚虞出庫真率三千餘落請交市獻馬千匹許之處之於營丘分遣使者巡行郡國孤老久疾不能自存者振穀帛有差孝悌力田閨門和順者皆褒顯之昌黎郝越營丘張買成周刁溫建德何纂以賢良皆擢之遣其太常丞劉軒徙北部人五百戶于長谷為祖父園邑以其太子永領大單于置四輔跋勵意農桑勤心政事乃下書省徭薄賦墮農者戮之力田者褒賞命尚書紀達為之條制每遣守宰必親見東堂問為政事之要令極言無隱以觀其志於是朝野競勸焉先是河間人褚匡言於跋曰陛下至德應期龍飛東夏舊邦宗族傾首朝陽以日為歲若聽臣往迎致之不遠跋曰隔絶殊域阻回數千將何可致也匡曰章武郡臨海船路甚通出於遼西臨渝不為難也跋許之署匡遊擊將軍中書侍郎厚加資遣匡尋與跋從兄買從弟睹自長樂率五千餘戶來奔署買為衛尉封城陽伯睹為太常高城伯契丹庫莫奚降署其大人為歸善王跋又下書曰今疆宇無虞百姓寧業而田畝荒穢有司不隨時督察欲令家給人足不亦難乎桑柘之益有生之本此土少桑人未見其利可令百姓人殖桑一百根柘二十根又下書曰聖人制禮送終有度重其衣衾厚其棺椁將何用乎人之亡也精魂上歸於天骨肉下歸於地朝終夕壞無寒暖之期衣以錦繡服以羅紈寧有知哉厚於送終貴而改葬皆無益亡者有損於生是以祖考因舊立廟皆不改營陵寢申下境內自今皆令奉之魏使耿二至其國跋遣其黃門郎常陋迎之於道跋為不稱臣怒而不見及至跋又遣陋勞之二忿而不謝跋散騎常侍申秀言於跋曰陛下接二以禮而敢驕蹇若斯不可容也中給事馮懿以傾佞有幸又盛稱二之陵以激跋跋曰亦各其志也匹夫尚不可屈況一方之主乎請幽而降之跋乃留二不遣是時井竭三日而復其尚書令孫護里有犬與豕交護見而惡之召太史令閔尚筮之尚曰犬豕異類而交違性失本其於洪範為犬禍將勃亂失衆以至敗亡明公位極冢宰遐邇具瞻諸弟並封列侯貴傾王室妖見里庭不為他也願公戒滿盈之失修尚恭儉則妖怪可消永享元吉護默然不悅昌黎尹孫伯仁護弟叱支叱支弟乙拔等俱有才力以驍勇聞跋之立也並冀開府而跋未之許由是有怨言每於朝饗之際常拔劍擊柱曰興建大業有功力焉而滯於散將豈是漢祖河山之義乎跋怒誅之進護左光祿大夫開府儀同三司録尚書事以慰之護自三弟誅後常怏怏有不悅之色跋怒鴆之尋而遼東太守務銀提自以功在孫護張興之右而出為邊郡抗表有恨言密謀外叛跋怒殺之跋下書曰武以平亂文以經務寧國濟俗實所憑焉自頃喪難禮崩樂壞閭閻絶諷誦之音後生無庠序之教子襟之歎復興于今豈所以穆章風化崇闡斯文可營建太學以長樂劉軒營丘張熾成周翟崇為博士郎中簡二千石已下子弟年十五已上教之跋弟丕先是因亂投於高句麗跋迎致之至龍城以為左僕射常山公蝚蠕斛律為其弟大但所逐盡室奔跋乃館之于遼東郡待之以客禮跋納其女為昭儀時三月不雨至于夏五月斛律上書請還塞北跋曰棄國萬里又無內應若以強兵相送糧運難繼少也勢不能固且千里襲國古人為難況數千里乎斛律固請曰不煩大衆願給騎三百足矣得達敕勒國人必欣而來迎乃許之遣單于前輔萬陵率騎三百送之陵憚遠役至黑山殺斛律而還晉青州刺史申永遣使浮海來聘跋乃使其中書郎李扶報之蝚蠕大但遣使獻馬三千匹羊萬口有赤氣四塞太史令張穆言於跋曰兵氣也今大魏威制六合而聘使斷絶自古未有鄰國接境不通和好違義怒鄰取亡之道宜還前使修和結盟跋曰吾當思之尋而魏軍大至遣單于右輔古泥率騎候之去城十五里遇軍奔還又遣其將姚昭皇甫軌等距戰軌中流矢死魏以有備引還跋境地震山崩洪光門鸛雀折又地震右寢壞跋問閔尚曰比年屢有地動之變卿可明言其故尚曰地陰也主百姓震有左右比震皆向右臣懼百姓將西移跋曰吾亦甚慮之分遣使者巡行郡國問所疾苦孤老不能自存者賜以穀帛有差跋立十一年至是元熙元年也此後事入于宋至元嘉七年死弟弘殺跋子翼自立後為魏所伐東奔高句麗居二年高句麗殺之始跋以孝武太元二十年僭號至弘二世凡二十有八載馮素弗跋之長弟也慷慨有大志姿貌魁偉雄傑不羣任俠放蕩不修小節故時人未之奇惟王齊異焉曰撥亂才也惟交結時豪為務不以産業經懷弱冠自詣慕容熙尚書左丞韓業請婚業怒而距之復求尚書郎高邵女邵亦弗許南宮令成藻豪俊有高名素弗造焉藻命門者勿納素弗徑入與藻對坐旁若無人談飲連日藻始奇之曰吾遠求騏驥不知近在東鄰何識子之晚也當世俠士莫不歸之及熙僭號為侍御郎小帳下督跋之偽業素弗所建也及為宰輔謙虛恭慎非禮不動雖厮養之賤皆與之抗禮車服屋宇務於儉約修己率下百僚憚之初為京尹及鎮營丘百姓歌之嘗謂韓業曰君前既不顧今將自取何如業拜而陳謝素弗曰既往之事豈復與君計之然待業彌厚好存亡繼絶申拔舊門問侍中陽哲曰秦趙勳臣子弟今何在乎哲曰皆在中州惟桃豹孫鮮在焉素弗召為左常侍論者歸其有宰衡之度跋之七年死跋哭之哀慟比葬七臨之史臣曰自五胡縱慝九域淪胥帝里神州遂混之於荒裔鴻名寶位咸假之於雜種嘗謂戎狄凶嚚未窺道德欺天擅命抑乃其常而馮跋出自中州有殊醜類因鮮卑之昏虐亦盜名於海隅然其遷徙之餘少非雄傑幸以寬厚為衆所推初雖砥礪終罕成德舊史稱其信惑妖祀斥黜諫臣無開馭之才異經決之士信矣速禍致寇良謂在茲猶能撫育黎萌保守疆宇發號施令二十餘年豈天意乎非人事也贊曰國仁驍武乾歸勇悍矯矯熾磐臨機能斷孰謂獯虜亦懷沈算文起常才憑時叛換咸竊大寶為我多難
