body:
  text: 晉書卷九十列傳第六十良吏漢宣帝有言百姓所以安其田里而無歎息愁恨之心者政平訟理也與我共此者其唯良二千石乎此則長吏之官實為撫導之本是以東里相鄭西門宰鄴潁川黃霸蜀郡文翁或吏不敢欺或人懷其惠或教移齊魯或政務寬和斯並惇史播其徽音良吏以為準的有晉肇茲王業光啓霸圖授方任能經文緯武泰始受禪改物君臨纂三葉之鴻基膺百王之大寶勞心庶績垂意黎元申敕守宰之司屢發憂矜之詔辭旨懇切誨諭殷勤欲使直道正身抑末敦本當此時也可謂農安其業吏盡其能者歟而帝寬厚足以君人明威未能厲俗政刑以之私謁賄賂於此公行結綬者以放濁為通彈冠者以苟得為貴流遁忘反寖以為常劉毅抗賣官之言當時以為矯枉察其風俗豈虛也哉爰及惠懷中州鼎沸逮於江左晉政多門元帝比少康之隆處仲為梗海西微昌邑之罪元子亂常既權逼是憂故羈縻成俗蒞職者為身擇利銓綜者為人擇官下僚多英俊之才勢位必高門之胄遂使良能之績僅有存焉雖復茂弘以明允贊經綸安石以時宗鎮雅俗然外虞孔熾內難方殷而匡救彌縫方免傾覆弘風革弊彼則未遑今采其政績可稱者以為良吏傳魯芝魯芝字世英扶風郿人也世有名德為西州豪族父為郭泛所害芝襁褓流離年十七乃移居雍耽思墳籍郡舉上計吏州辟別駕魏車騎將軍郭淮為雍州刺史深敬重之舉孝廉除郎中會蜀相諸葛亮侵隴右淮復請芝為別駕事平薦於公府辟大司馬曹真掾轉臨淄侯文學鄭袤薦於司空王朗朗即加禮命後拜騎都尉參軍事行安南太守遷尚書郎曹真出督關右又參大司馬軍事真薨宣帝代焉乃引芝參驃騎軍事轉天水太守郡鄰于蜀數被侵掠戶口減削寇盜充斥芝傾心鎮衛更造城市數年間舊土意悉復遷廣平太守天水夷夏慕德老幼赴闕獻書乞留芝魏明帝許焉仍策書嘉歎勉以黃霸之美加討寇將軍曹爽輔政引為司馬芝屢有讜言嘉謀爽弗能納及宣帝起兵誅爽芝率餘衆犯門斬關馳出赴爽勸爽曰公居伊周之位一旦以罪見黜雖欲牽黃犬復可得乎若挾天子保許昌杖大威以羽檄徵四方兵孰敢不從捨此而去欲就東巿豈不痛哉爽磱惑不能用遂委身受戮芝坐爽下獄當死而口不訟直志不苟免宣帝嘉之赦而不誅俄而起為使持節領護胸奴中郎將振威將軍并州刺史以綏緝有方遷大鴻臚高貴鄉公即位賜爵關內侯邑二百戶毋丘儉平隨例增邑二百戶拜揚武將軍荊州刺史諸葛誕以壽春叛文帝奉魏帝出征徵兵四方芝率荊州文武以為先驅誕平進爵武進亭侯又增邑九百戶遷大尚書掌刑理常道鄉公即位進爵斄城鄉侯又增邑八百戶遷監青州諸軍事振武將軍青州刺史轉平東將軍五等建封陰平伯武帝踐阼轉鎮東將軍進爵為侯帝以芝清忠履正素無居宅使軍兵為作屋五十間芝以年及懸車告老遜位章表十餘上於是徵為光祿大夫位特進給吏卒門施行馬羊祜為車騎將軍乃以位讓芝曰光祿大夫魯芝潔身寡欲和而不同服事華髮以禮終始未蒙此選臣更越之何以塞天下之望上不從其為人所重如是泰始九年卒年八十四帝為舉哀賵贈有加諡曰貞賜塋田百畝胡威胡威字伯武一名貔淮南壽春人也父質以忠清著稱少與鄉人蔣濟朱績俱知名於江淮間仕魏至征東將軍荊州刺史威早厲志尚質之為荊州也威自京都定省家貧無車馬僮僕自驅驢單行每至客舍躬放驢取樵炊爨食畢隨侶進道既至見父停廏中十餘日告歸父賜絹一匹為裝威曰大人清高不審於何得此絹質曰是吾俸祿之餘以為汝糧耳威受之辭歸質帳下都督先威未發請假還家陰資裝於百餘里要威為伴每事佐助行數百里威疑而誘問之既知乃取所賜絹與都督謝而遣之後因他信以白質質杖都督一百除吏名其父子清慎如此於是名譽著聞拜侍御史歷南鄉侯安豐太守遷徐州刺史勤於政術風化大行後入朝武帝語及平生因歎其父清謂威曰卿孰與父清對曰臣不如也帝曰卿父以何為勝耶對曰臣父清恐人知臣清恐人不知是臣不及遠也帝以威言直而婉謙而順纍遷監豫州諸軍事右將軍豫州刺史入為尚書加奉車都尉威嘗諫時政之寬帝曰尚書郎以下吾無所假借威曰臣之所陳豈在丞郎令史正謂如臣等輩始可以肅化明法耳拜前將軍監青州諸軍事青州刺史以功封平春侯太康元年卒于位追贈使持節都督青州諸軍事鎮東將軍餘如故諡曰烈子奕嗣奕字次孫仕至平東將軍威弟羆字季象亦有幹用仕至益州刺史安東將軍杜軫杜軫字超宗蜀郡成都人也父雄綿竹令軫師事譙周博涉經書州辟不就為郡功曹史時鄧艾至成都軫白太守曰今大軍來征必除舊布新明府宜避之此全福之道也太守乃出艾果遣其參軍牽弘自之郡弘問軫前守所在軫正色對曰前守達去就之機輒自出官舍以俟君子弘器之命復為功曹軫固辭察孝廉除建寧令導以德政風化大行夷夏悅服秩滿將歸羣蠻追送賂遺甚多軫一無所受去如初至又除池陽令為雍州十一郡最百姓生為立祠得罪者無怨言纍遷尚書郎軫博聞廣涉奏議駁論多見施用時涪人李驤亦為尚書郎與軫齊名每有論議朝廷莫能踰之號蜀有二郎軫後拜犍為太守甚有聲譽當遷會病卒年五十一子毗毗字長基州舉秀才成都王穎辟大將軍掾遷尚書郎參太傅軍事及洛陽覆沒毗南渡江王敦表為益州刺史將與宜都太守柳純共固白帝杜韜遣軍要毗遂遇害毗弟秀字彥穎為羅尚主簿州沒為氐賊李驤所得欲用為司馬秀不受見害毗次子歆舉秀才軫弟烈明政事察孝廉歷平康安陽令所居有異績遷衡陽太守聞軫亡因自表兄子幼弱求去官詔轉犍為太守蜀土榮之後遷湘東太守為成都王穎郎中令病卒烈弟良舉秀才除新都令涪陵太守不就補州大中正卒竇允竇允字雅始平人也出自寒門清尚自修少仕縣稍遷郡主簿察孝廉除浩亹長勤於為政勸課田蠶平均調役百姓賴之遷謁者泰始中詔曰當官者能潔身修己然後在公之節乃全身善有章雖賤必賞此興化立教之務也謁者竇允前為浩亹長以修勤清白見稱河右是輩當擢用使立行者有所勸主者詳復參訪有以旌表之拜臨水令克己厲俗改修政事士庶悅服咸歌詠之遷巨鹿太守甚有政績卒於官王宏王宏字正宗高平人魏侍中粲之從孫也魏時辟公府纍遷尚書郎歷給事中泰始初為汲郡太守撫百姓如家耕桑樹藝屋宇阡陌莫不躬自教示曲盡事宜在郡有殊績司隸校尉石鑒上其政術武帝下詔稱之曰朕惟人食之急而懼天時水旱之運夙夜警戒念在於農雖詔書屢下敕厲殷勤猶恐百姓廢惰以損生植之功而刺史二千石百里長吏未能盡勤至使地有遺利而人有餘力每思聞監司糾舉能不將行其賞罰以明沮勸今司隸校尉石鑒上汲郡太守王宏勤恤百姓導化有方督勸開荒五千餘頃而熟田常課頃畝不減比年普饑人食不足而宏郡界獨無匱乏可謂能矣其賜宏穀千斛布告天下咸使聞知俄遷衛尉河南尹大司農無復能名更為苛碎坐桎梏罪人以泥墨塗面置深坑中餓不與食又擅縱五歲刑以下二十一人為有司所劾帝以宏纍有政績聽以贖罪論太康中代劉毅為司隸校尉於是檢察士庶使車服異制庶人不得衣紫絳及綺繡錦繢帝常遣左右微行觀察風俗宏緣此復遣吏科檢婦人衵服至褰發於路論者以為暮年謬妄由是獲譏於世復坐免官後起為尚書太康五年卒追贈太常曹攄曹攄字顏遠譙國譙人也祖肇魏衛將軍攄少有孝行好學善屬文太尉王衍見而器之調補臨淄令縣有寡婦養姑甚謹姑以其年少勸令改適婦守節不移姑愍之密自殺親黨告婦殺姑官為考鞫寡婦不勝苦楚乃自誣獄當決適值攄到攄知其有寃更加辨究具得情實時稱其明獄有死囚歲夕攄行獄愍之曰卿等不幸致此非所如何新歲人情所重豈不欲暫見家邪衆囚皆涕泣曰若得暫歸死無恨也攄悉開獄出之剋日令還掾吏固爭咸謂不可攄曰此雖小人義不見負自為諸君任之至日相率而還並無違者一縣歎服號曰聖君入為尚書郎轉洛陽令仁惠明斷百姓懷之時天大雨雪宮門夜失行馬羣官檢察莫知所在攄使收門士衆官咸謂不然攄曰宮掖禁嚴非外人所敢盜必是門士以燎寒耳詰之果服以病去官復為洛陽令及齊王冏輔政攄與左思俱為記室督冏嘗從容問攄曰天子為賊臣所逼莫有能奮吾率四海義兵興復王室今入輔朝廷匡振時艱或有勸吾還國於卿意如何攄曰蕩平國賊匡復帝祚古今人臣之功未有如大王之盛也然道罔隆而不殺物無盛而不衰非唯人事抑亦天理竊預下問敢不盡情願大王居高慮危在盈思沖精選百官存公屏欲舉賢進善務得其才然後脂車秣馬高揖歸藩則上下同慶攄等幸甚冏不納尋轉中書侍郎長沙王乂以為驃騎司馬乂敗免官因丁母憂惠帝末起為襄城太守時襄城屢經寇難攄綏懷振理旬月克復永嘉二年高密王簡鎮襄陽以攄為征南司馬其年流人王逌等聚衆屯冠軍寇掠城邑簡遣參軍崔曠討之令攄督護曠曠姦凶人也譎攄前戰期為後繼既而不至攄獨與逌戰于酈縣軍敗死之故吏及百姓並奔喪會葬號哭即路如赴父母焉潘京潘京字世長武陵漢壽人也弱冠郡辟主簿太守趙廞甚器之嘗問曰貴郡何以名武陵京曰鄙郡本名義陵在辰陽縣界與夷相接數為所攻光武時移東出遂得全完共議易號傳曰止戈為武詩稱高平曰陵於是名焉為州所辟因謁見問策探得不孝字刺史戲京曰辟士為不孝邪京舉版答曰今為忠臣不得復為孝子其機辨皆此類後太廟立州郡皆遣使賀京白太守曰夫太廟立移神主應問訊不應賀遂遣京作文使詣京師以為永式京仍舉秀才到洛尚書令樂廣京州人也共談纍日深歎其才謂京曰君天才過人恨不學耳若學必為一代談宗京感其言遂勤學不倦時武陵太守戴昌亦善談論與京共談京假借之昌以為不如己笑而遣之令過其子若思京方極其言論昌竊聽之乃歎服曰才不可假遂父子俱屈焉歷巴丘邵陵泉陵三令京明於政術路不拾遺遷桂林太守不就歸家年五十卒范晷范晷字彥長南陽順陽人也少游學清河遂徙家僑居郡命為五官掾歷河內郡丞太守裴楷雅知之薦為侍御史調補上谷太守遭喪不之官後為司徒左長史轉馮翊太守甚有政能善於綏撫百姓愛悅之徵拜少府出為涼州刺史轉雍州于時西土荒毀氐羌蹈藉田桑失收百姓困弊晷傾心化導勸以農桑所部甚賴之元康中加左將軍卒於官二子廣稚廣字仲將舉孝廉除靈壽令不之官姊適孫氏早亡有孫名邁廣負以南奔雖盜賊艱急終不棄之元帝承制以為堂邑令丞劉榮坐事當死郡劾以付縣榮即縣人家有老母至節廣輒聽暫還榮亦如期而反縣堂為野火所及榮脫械救火事畢還自著械後大旱米貴廣散私穀振饑人至數千斛遠近流寓歸投之戶口十倍卒於官稚少知名辟大將軍掾早卒子汪別有傳丁紹丁紹字叔倫譙國人也少開朗公正早歷清官為廣平太守政平訟理道化大行于時河北騷擾靡有完邑而廣平一郡四境乂安是以皆悅其法而從其令及臨漳被圍南陽王模窘急紹率郡兵赴之模賴以獲全模感紹恩生為立碑遷徐州刺史士庶戀慕攀附如歸未之官復轉荊州刺史從車千乘南渡河至許時南陽王模為都督留紹啓轉為冀州刺史到鎮率州兵討破汲桑有功加寧北將軍假節監冀州諸軍事時境內羯賊為患紹捕而誅之號為嚴肅河北人畏而愛之紹自以為才足為物雄當官蒞政每事克舉視天下之事若運於掌握遂慨然有董正四海之志矣是時王浚盛於幽州苟晞盛於青州然紹視二人蔑如也永嘉三年暴疾而卒臨終歎曰此乃天亡冀州豈吾命哉懷帝策贈車騎將軍喬智明喬智明字元達鮮卑前部人也少喪二親哀毀過禮長而以德行著稱成都王穎辟為輔國將軍穎之敗趙王倫也表智明為殄寇將軍隆慮共二縣令二縣愛之號為神君部人張兌為父報仇母老單身有妻無子智明愍之停其獄歲餘令兌將妻入獄兼陰縱之人有勸兌逃者兌曰有君如此吾何忍纍之縱吾得免作何面目視息世間於獄産一男會赦得免其仁感如是惠帝之伐鄴也穎以智明為折衝將軍參丞相前鋒軍事智明勸穎奉迎乘輿穎大怒曰卿名曉事投身事孤主上為羣小所逼將加非罪於孤卿奈何欲使孤束手就刑邪共事之義正若此乎智明乃止尋屬永嘉之亂仕於劉曜鄧攸鄧攸字伯道平陽襄陵人也祖殷亮直強正鍾會伐蜀奇其才自黽池令召為主簿賈充伐吳請殷為長史後授皇太子詩為淮南太守夢行水邊見一女子猛獸自後斷其盤囊占者以為水邊有女汝字也斷盤囊者新獸頭代故獸頭也不作汝陰當汝南也果遷汝陰太守後為中庶子攸七歲喪父尋喪母及祖母居喪九年以孝致稱清和平簡貞正寡欲少孤與弟同居初祖父殷有賜官敕攸受之後太守勸攸去王官欲舉為孝廉攸曰先人所賜不可改也嘗詣鎮軍賈混混以人訟事示攸使決之攸不視曰孔子稱聽訟吾猶人也必也使無訟乎混奇之以女妻焉舉灼然二品為吳王文學歷太子洗馬東海王越參軍越欽其為人轉為世子文學吏部郎越弟騰為東中郎將請攸為長史出為河東太守永嘉末沒于石勒然勒宿忌諸官長二千石聞攸在營馳召將殺之攸至門門幹乃攸為郎時幹識攸攸求紙筆作辭幹候勒和悅致之勒重其辭乃勿殺勒長史張賓先與攸比舍重攸名操因稱攸于勒勒召至幕下與語悅之以為參軍給車馬勒每東西置攸車營中勒夜禁火犯之者死攸與胡鄰轂胡夜失火燒車吏按問胡乃誣攸攸度不可與爭遂對以弟婦散發溫酒為辭勒赦之既而胡人深感自縛詣勒以明攸而陰遺攸馬驢諸胡莫不歎息宗敬之石勒過泗水攸乃斫壞車以牛馬負妻子而逃又遇賊掠其牛馬步走擔其兒及其弟子綏度不能兩全乃謂其妻曰吾弟早亡唯有一息理不可絶止應自棄我兒耳幸而得存我後當有子妻泣而從之乃棄之其子朝棄而暮及明日攸繫之於樹而去至新鄭投李矩三年將去而矩不聽荀組以為陳郡汝南太守愍帝徵為尚書左丞長水校尉皆不果就後密捨矩去投荀組於許昌矩深恨焉久之乃送家屬還攸攸與刁協周顗素厚遂至江東元帝以攸為太子中庶子時吳郡闕守人多欲之帝以授攸攸載米之郡俸祿無所受唯飲吳水而已時郡中大饑攸表振貸未報乃輒開倉救之臺遣散騎常侍桓彝虞慰勞饑人觀聽善不乃劾攸以擅出穀俄而有詔原之攸在郡刑政清明百姓歡悅為中興良守後稱疾去職郡常有送迎錢數百萬攸去郡不受一錢百姓數千人留牽攸船不得進攸乃小停夜中發去吳人歌之曰紞如打五鼓雞鳴天欲曙鄧侯拖不留謝令推不去百姓詣臺乞留一歲不聽拜侍中歲餘轉吏部尚書蔬食弊衣周急振乏性謙和善與人交賓無貴賤待之若一而頗敬媚權貴永昌中代周顗為護軍將軍太寧二年王敦反明帝密謀起兵乃遷攸為會稽太守初王敦伐都之後中外兵數每月言之於敦攸已出在家不復知護軍事有惡攸者誣攸尚白敦兵數帝聞而未之信轉攸為太常時帝南郊攸病不能從車駕過攸問疾攸力病出拜有司奏攸不堪行郊而拜道左坐免攸每有進退無喜慍之色久之遷尚書右僕射咸和元年卒贈光祿大夫加金章紫綬祠以少牢攸棄子之後妻不復孕過江納妾甚寵之訊其家屬說是北人遭亂憶父母姓名乃攸之甥攸素有德行聞之感恨遂不復畜妾卒以無嗣時人義而哀之為之語曰天道無知使鄧伯道無兒弟子綬服攸喪三年吳隱之吳隱之字處默濮陽鄄城人魏侍中質六世孫也隱之美姿容善談論博涉文史以儒雅標名弱冠而介立有清操雖日晏啜菽不饗非其粟儋石無儲不取非其道年十餘丁父憂每號泣行人為之流涕事母孝謹及其執喪哀毀過禮家貧無人鳴鼓每至哭臨之時有雙鶴警叫及祥練之夕復有羣雁俱集時人咸以為孝感所至嘗食鹹菹以其味旨掇而棄之與太常韓康伯鄰居康伯母殷浩之姊賢明婦人也每聞隱之哭聲輟餐投筯為之悲泣既而謂康伯曰汝若居銓衡當舉如此輩人及康伯為吏部尚書隱之遂階清級解褐輔國功曹轉參征虜軍事兄坦之為袁真功曹真敗將及禍隱之詣桓溫乞代兄命溫矜而釋之遂為溫所知賞拜奉朝請尚書郎纍遷晉陵太守在郡清儉妻自負薪入為中書侍郎國子博士太子右衛率轉散騎常侍領著作郎孝武帝欲用為黃門郎以隱之貌類簡文帝乃止尋守廷尉祕書監御史中丞領著作如故遷左衛將軍雖居清顯祿賜皆班親族冬月無被嘗浣衣乃披絮勤苦同於貧庶廣州包帶山海珍異所出一篋之寶可資數世然多瘴疫人情憚焉唯貧窶不能自立者求補長史故前後刺史皆多黷貨朝廷欲革嶺南之弊隆安中以隱之為龍驤將軍廣州刺史假節領平越中郎將未至州二十里地名石門有水曰貪泉飲者懷無厭之欲隱之既至語其親人曰不見可欲使心不亂越嶺喪清吾知之矣乃至泉所酌而飲之因賦詩曰古人云此水一歃懷千金試使夷齊飲終當不易心及在州清操踰厲常食不過菜及乾魚而已帷帳器服皆付外庫時人頗謂其矯然亦終始不易帳下人進魚每剔去骨存肉隱之覺其用意罰而黜焉元興初詔曰夫孝行篤於閨門清節厲乎風霜實立人之所難而君子之美致也龍驤將軍廣州刺史吳隱之孝友過人祿均九族菲己潔素儉愈魚𧹞夫處可欲之地而能不改其操饗惟錯之富而家人不易其服革奢務嗇南域改觀朕有嘉焉可進號前將軍賜錢五十萬穀千斛及盧循寇南海隱之率厲將士固守彌時長子曠之戰沒循攻擊百有餘日踰城放火焚燒三千餘家死者萬餘人城遂陷隱之攜家纍出欲奔還都為循所得循表朝廷以隱之黨附桓玄宜加裁戮詔不許劉裕與循書令遣隱之還久方得反歸舟之日裝無餘資及至數畝小宅籬垣仄陋內外茅屋六間不容妻子劉裕賜車牛更為起宅固辭尋拜度支尚書太常以竹篷為屏風坐無席後遷中領軍清儉不革每月初得祿裁留身糧其餘悉分振親族家人績紡以供朝夕時有困絶或并日而食身布衣不完妻子不霑寸祿義熙八年請老致事優詔許之授光祿大夫加金章紫綬賜錢十萬米三百斛九年卒追贈左光祿大夫加散騎常侍隱之清操不渝屢被褒飾致事及於身沒常蒙優錫顯贈廉士以為榮初隱之為奉朝請謝石請為衛將軍主簿隱之將嫁女石知其貧素遣女必當率薄乃令移廚帳助其經營使者至方見婢牽犬賣之此外蕭然無辦後至自番禺其妻劉氏齎沈香一斤隱之見之遂投於湖亭之水子延之復厲清操為鄱陽太守延之弟及子為郡縣者常以廉慎為門法雖才學不逮隱之而孝悌潔敬猶為不替史臣曰魯芝等建旟剖竹布政宣條存樹威恩沒留遺愛咸見知明主流譽當年若伯武之潔己克勤顏遠之申寃緩獄鄧攸贏糧以述職吳隱酌水以厲精晉代良能此焉為最而攸棄子存姪以義斷恩若力所不能自可割情忍痛何至預加徽纆絶其奔走者乎斯豈慈父仁人之所用心也卒以絶嗣宜哉勿謂天道無知此乃有知矣世英盡節曹氏犯門斬關宣帝收雷霆之威奬忠貞之烈豈非既已在我欲其罵人者歟贊曰猗歟良宰嗣美前賢威同御黠靜若烹鮮唯嘗吳水但挹貪泉人風既偃俗化斯遷
