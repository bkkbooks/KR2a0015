body:
  text: 晉書卷五十七列傳第二十七羅憲兄子尚羅憲字令則襄陽人也父蒙蜀廣漢太守憲年十三能屬文早知名師事譙周周門人稱為子貢性方亮嚴整待士無倦輕財好施不營産業仕蜀為太子舍人宣信校尉再使於吳吳人稱焉時黃皓預政衆多附之憲獨介然皓恚之左遷巴東太守時大將軍閻宇都督巴東拜憲領軍為宇副二魏之伐蜀召宇西還憲守永安城及成都敗城中擾動邊江長吏皆棄城走憲斬亂者一人百姓乃安知劉禪降乃率所統臨于都亭三日吳聞蜀敗遣將軍盛憲西上外託救援內欲襲憲憲曰本朝傾覆吳為脣齒不恤我難而邀其利吾寧當為降虜乎乃歸順於是繕甲完聚厲以節義士皆用命及鍾會鄧艾死百城無主吳又使步協西征憲大破其軍孫休怒又遣陸抗助協憲距守經年救援不至城中疾疫太半或勸南出牂柯北奔上庸可以保全憲曰夫為人主百姓所仰既不能存急而棄之君子不為也畢命於此矣會荊州刺史胡烈等救之抗退加陵江將軍監巴東軍事使持節領武陵太守泰始初入朝詔曰憲忠烈果毅有才策器幹可給鼓吹又賜山玄玉佩劍泰始六年卒贈使持節安南將軍武陵太守追封西鄂侯諡曰烈初憲侍宴華林園詔問蜀大臣子弟後問先輩宜時用者憲薦蜀人常忌杜軫等皆西國之良器武帝並召而任之子襲歷給事中陵江將軍統其父部曲至廣漢太守兄子尚尚字敬之一名仲父式牂柯太守尚少孤依叔父憲善屬文荊州刺史王戎以尚及劉喬為參軍並委任之太康末為梁州刺史及趙廞反于蜀尚表曰廞非雄才必無所成計日聽其敗耳乃假尚節為平西將軍益州刺史西戎校尉性貪少斷蜀人言曰尚之所愛非邪則佞尚之所憎非忠則正富擬魯衛家成市里貪如豺狼無復極已又曰蜀賊尚可羅尚殺我平西將軍反更為禍時李特亦起於蜀攻蜀殺趙廞又攻尚於成都尚退保江陽初尚乞師方嶽荊州刺史宗岱率建平太守孫阜救之次于江州岱阜兵盛諸為寇所逼者人有奮志尚乃使兵曹從事任鋭偽降因出密宣告于外剋日俱擊遂大破之斬李特傳首洛陽特子雄僭號都于郫城尚遣將軍隗伯攻之不克俄而尚卒雄遂據有蜀土滕修滕修字顯先南陽西鄂人也仕吳為將帥封西鄂侯孫晧時代熊睦為廣州刺史甚有威惠徵為執金吾廣州部曲督郭馬等為亂晧以修宿有威惠為嶺表所伏以為使持節都督廣州軍事鎮南將軍廣州牧以討之未克而王師伐吳修率衆赴難至巴丘而晧已降乃縞素流涕而還與廣州刺史閭豐蒼梧太守王毅各送印綬詔以修為安南將軍廣州牧持節都督如故封武當侯加鼓吹委以南方事修在南積年為邊夷所附太康九年卒請葬京師帝嘉其意賜墓田一頃諡曰聲修之子並上表曰亡父修羈紲吳壤為所驅馳幸逢開通沐浴至化得從俘虜握戎馬之要未覲聖顏委南藩之重實由勳勞少聞天聽故也年衰疾篤屢乞骸骨未蒙垂哀奄至薨隕臣承遺意輿櫬還都瞻望雲闕實懷痛裂竊聞博士諡修曰聲直彰流播不稱行績不勝愚情冒昧聞訴帝乃賜諡曰忠並子含初為庾冰輕車長史討蘇峻有功封夏陽縣開國侯邑千六百戶授平南將軍廣州刺史在任積年甚有威惠卒諡曰戴含弟子遁交州刺史修曾孫恬之龍驤將軍魏郡太守戍黎陽為翟遼所執死之馬隆馬隆字孝興東平平陸人少而智勇好立名節魏兗州刺史令狐愚坐事伏誅舉州無敢收者隆以武吏託稱愚客以私財殯葬服喪三年列植松柏禮畢乃還一州以為美談署武猛從事泰始中將興伐吳之役下詔曰吳會未平宜得猛士以濟武功雖舊有薦舉之法未足以盡殊才其普告州郡有壯勇秀異才力傑出者皆以名聞將簡其尤異擢而用之苟有其人勿限所取兗州舉隆才堪良將稍遷司馬督初涼州刺史楊欣失羌戎之和隆陳其必敗俄而欣為虜所沒河西斷絶帝每有西顧之憂臨朝而歎曰誰能為我討此虜通涼州者乎朝臣莫對隆進曰陛下若能任臣臣能平之帝曰必能滅賊何為不任顧卿方略何如耳隆曰陛下若能任臣當聽臣自任帝曰云何隆曰臣請募勇士三千人無問所從來率之鼓行而西稟陛下威德醜虜何足滅哉帝許之乃以隆為武威太守公卿僉曰六軍既衆州郡兵多但當用之不宜橫設賞募以亂常典隆小將妄説不可從也帝弗納隆募限腰引弩三十六鈞弓四鈞立標簡試自旦至中得三千五百人隆曰足矣因請自至武庫選杖武庫令與隆忿爭御史中丞奏劾隆隆曰臣當亡命戰場以報所受武庫令乃以魏時朽杖見給不可復用非陛下使臣滅賊意也帝從之又給其三年軍資隆於是西渡溫水虜樹機能等以衆萬計或乘險以遏隆前或設伏以截隆後隆依八陳圖作偏箱車地廣則鹿角車營路狹則為木屋施於車上且戰且前弓矢所及應弦而倒奇謀間發出敵不意或夾道纍磁石賊負鐵鎧行不得前隆卒悉被犀甲無所留礙賊咸以為神轉戰千里殺傷以千數自隆之西音問斷絶朝廷憂之或謂已沒後隆使夜到帝撫掌歡笑詰朝召羣臣謂曰若從諸卿言是無秦涼也乃詔曰隆以偏師寡衆奮不顧難冒險能濟其假節宣威將軍加赤幢曲蓋鼓吹隆到武威虜大人猝跋韓且萬能等率萬餘落歸降前後誅殺及降附者以萬計又率善戎沒骨能等與樹機能大戰斬之涼州遂平朝議將加隆將士勳賞有司奏隆將士皆先加顯爵不應更授衛將軍楊珧駁曰前精募將士少加爵命者此適所以為誘引今隆全軍獨克西土獲安不得便以前授塞此後功宜皆聽許以明要信乃從珧議賜爵加秩各有差太康初朝廷以西平荒毀宜時興復以隆為平虜護軍西平太守將所領精兵又給牙門一軍屯據西平時南虜成奚每為邊患隆至帥軍討之虜據險距守隆令軍士皆負農器將若田者虜以隆無征討意御衆稍怠隆因其無備進兵擊破之畢隆之政不敢為寇太熙初封奉高縣侯加授東羌校尉積十餘年威信震於隴右時略陽太守馮翊嚴舒與楊駿通親密圖代隆毀隆年老謬耄不宜服戎於是徵隆以舒代鎮氐羌聚結百姓驚懼朝廷恐關隴復擾乃免舒遣隆復職竟卒于官子咸嗣亦驍勇成都王穎攻長沙王以咸為鷹揚將軍率兵屯河橋中渚為將王瑚所敗沒於陳胡奮胡奮字玄威安定臨涇人也魏車騎將軍陰密侯遵之子也奮性開朗有籌略少好武事宣帝之伐遼東也以白衣侍從左右甚見接待還為校尉稍遷徐州刺史封夏陽子胸奴中部帥劉猛叛使驍騎路蕃討之以奮為監軍假節頓軍硜北為蕃後繼擊猛破之猛帳下將李恪斬猛而降以功纍遷征南將軍假節都督荊州諸軍事遷護軍加散騎常侍奮家世將門晚乃好學有刀筆之用所在有聲績居邊特有威惠泰始末武帝怠政事而耽於色大採擇公卿女以充六宮奮女選入為貴人奮唯有一子為南陽王友早亡及聞女為貴人哭曰老奴不死唯有二兒男入九地之下女上九天之上奮既舊臣兼有椒房之助甚見寵待遷左僕射加鎮軍大將軍開府儀同三司時楊駿以后父驕傲自得奮謂駿曰卿恃女更益豪邪歷觀前代與天家婚未有不滅門者但早晚事耳觀卿舉措適所以速禍駿曰卿女不在天家乎奮曰我女與卿女作婢耳何能損益時人皆為之懼駿雖銜之而不能害後卒於官贈車騎將軍諡曰壯奮兄弟六人兄廣弟烈並知名廣字宣祖位至散騎常侍少府廣子喜字林甫亦以開濟為稱仕至涼州刺史建武將軍假節護羌校尉烈字武玄為將伐蜀鍾會之反也烈與諸將皆被閉烈子世元時年十八為士卒先攻殺會名馳遠近烈為秦州刺史及涼州叛烈屯於萬子塠為虜所圍無援遇害陶璜陶璜字世英丹楊陵人也父基吳交州刺史璜仕吳歷顯位孫晧時交址太守孫諝貪暴為百姓所患會察戰鄧荀至擅調孔雀三千頭遣送陵既苦遠役咸思為亂郡吏呂興殺諝及荀以郡內附武帝拜興安南將軍交址太守尋為其功曹李統所殺帝更以建寧爨谷為交址太守谷又死更遣巴西馬融代之融病卒南中監軍霍弋又遣犍為楊稷代融與將軍毛炅九真太守董元牙門孟幹孟通李松王業爨能等自蜀出交址破吳軍於古城斬大都督修則交州刺史劉俊吳遣虞汜為監軍薛珝為威南將軍大都督璜為蒼梧太守距稷戰于分水璜敗退保合浦亡其二將珝怒謂璜曰若自表討賊而喪二帥其責安在璜曰下官不得行意諸軍不相順故致敗耳珝怒欲引軍還璜夜以數百兵襲董元獲其寶物船載而歸珝乃謝之以璜領交州為前部督璜從海道出於不意徑至交址元距之諸將將戰璜疑斷牆內有伏兵列長戟於其後兵才接元偽退璜追之伏兵果出長戟逆之大破元等以前所得寶船上錦物數千匹遺扶嚴賊帥梁奇奇將萬餘人助璜元有勇將解系同在城內璜誘其弟象使為書與系又使象乘璜軺車鼓吹導從而行元等曰象尚若此系必有去志乃就殺之珝璜遂陷交址吳因用璜為交州刺史璜有謀策周窮好施能得人心滕修數討南賊不能制璜曰南岸仰吾鹽鐵斷勿與市皆壞為田器如此二年可一戰而滅也修從之果破賊初霍弋之遣稷炅等與之誓曰若賊圍城未百日而降者家屬誅若過百日救兵不至吾受其罪稷等守未百日糧盡乞降璜不許給其糧使守諸將並諫璜曰霍弋已死不能救稷等必矣可須其日滿然後受降使彼得無罪我受有義內訓百姓外懷鄰國不亦可乎稷等期訖糧盡救兵不至乃納之修則既為毛炅所殺則子允隨璜南征城既降允求復讐璜不許炅密謀襲璜事覺收炅呵曰晉賊炅厲聲曰吳狗何等為賊允剖其腹曰復能作賊不炅猶罵曰吾志殺汝孫晧汝父何死狗也璜既擒稷等並送之稷至合浦發病死孟幹爨能李松等至建鄴晧將殺之或勸晧幹等忠於所事宜宥之以勸邊將晧從其言將徙之臨海幹等志欲北歸慮東徙轉遠以吳人愛蜀側竹弩言能作之晧留付作部後幹逃至京都松能為晧所殺幹陳伐吳之計帝乃厚加賞賜以為日南太守先是以楊稷為交州刺史毛炅為交址太守印綬未至而敗即贈稷交州炅及松能子並關內侯九真郡功曹李祚保郡內附璜遣將攻之不克祚舅黎晃隨軍勸祚令降祚答曰舅自吳將祚自晉臣唯力是視耳踰時乃拔晧以璜為使持節都督交州諸軍事前將軍交州牧武平九德新昌土地阻險夷獠徑悍歷世不賓璜征討開置三郡及九真屬國三十餘縣徵璜為武昌都督以合浦太守修允代之交土人請留璜以千數於是遣還晧既降晉手書遣璜息融敕璜歸順璜流涕數日遣使送印綬詣洛陽帝詔復其本職封宛陵侯改為冠軍將軍吳既平普減州郡兵璜上言曰交土荒裔斗絶一方或重譯而言連帶山海又南郡去州海行千有餘里外距林邑才七百里夷帥范熊世為逋寇自稱為王數攻百姓且連接扶南種類猥多朋黨相倚負險不賓往隸吳時數作寇逆攻破郡縣殺害長吏臣以駑昔為故國所採偏戍在南十有餘年雖前後征討翦其魁桀深山僻穴尚有逋竄又臣所統之卒本七千餘人南土溫溼多有氣毒加纍年征討死亡減耗其見在者二千四百二十人今四海混同無思不服當卷甲消刃禮樂是務而此州之人識義者寡厭其安樂好為禍亂又廣州南岸周旋六千餘里不賓屬者乃五萬餘戶及桂林不羈之輩復當萬戶至於服從官役才五千餘家二州脣齒唯兵是鎮又寧州興古接據上流去交址郡千六百里水陸並通互相維衛州兵未宜約損以示單虛夫風塵之變出於非常臣亡國之餘議不足採聖恩廣厚猥垂飾擢蠲其罪釁改授方任去辱即寵拭目更視誓念投命以報所受臨履所見謹冒瞽陳又以合浦郡土地磽確無有田農百姓唯以采珠為業商賈去來以珠貿米而吳時珠禁甚嚴慮百姓私散好珠禁絶來去人以飢困又所調猥多限每不充今請上珠三分輸二次者輸一粗者蠲除自十月訖二月非採上珠之時聽商旅往來如舊並從之在南三十年威恩著于殊俗及卒舉州號哭如喪慈親朝廷乃以員外散騎常侍吾彥代璜彥卒又以員外散騎常侍顧祕代彥祕卒州人逼祕子參領州事參尋卒參弟壽求領州州人不聽固求之遂領州壽乃殺長史胡肇等又將殺帳下督梁碩碩走得免起兵討壽禽之付壽母令鴆殺之碩乃迎璜子蒼梧太守威領刺史在職甚得百姓心三年卒威弟淑子綏後並為交州自基至綏四世為交州者五人璜弟濬吳鎮南大將軍荊州牧濬弟抗太子中庶子濬子湮字恭之湮弟猷字恭豫並有名湮至臨海太守黃門侍郎猷宣城內史王導右軍長史湮子馥于湖令為韓晃所殺追贈廬江太守抗子回自有傳吾彥吾彥字士則吳郡吳人也出自寒微有文武才幹身長八尺手格猛獸旅力絶羣仕吳為通江吏時將軍薛珝杖節南征軍容甚盛彥觀之慨然而歎有善相者劉札謂之曰以君之相後當至此不足慕也初為小將給吳大司馬陸抗抗奇其勇略將拔用之患衆情不允乃會諸將密使人陽狂拔刀跳躍而來坐上諸將皆懼而走唯彥不動舉几禦之衆服其勇乃擢用焉稍遷建平太守時王濬將伐吳造船於蜀彥覺之請增兵為備晧不從彥乃輒為鐵鎖橫斷江路及師臨境緣江諸城皆望風降附或見攻而拔唯彥堅守大衆攻之不能克乃退舍禮之吳亡彥始歸降武帝以為金城太守帝嘗從容問薛瑩曰孫晧所以亡國者何也瑩對曰歸命侯臣晧之君吳昵近小人刑罰妄加大臣大將無所親信人人憂恐各不自安敗亡之釁由此而作矣其後帝又問彥對曰吳主英俊宰輔賢明帝笑曰君明臣賢何為亡國彥曰天祿永終曆數有屬所以為陛下擒此蓋天時豈人事也張華時在坐謂彥曰君為吳將積有歲年蔑爾無聞竊所惑矣彥厲聲曰陛下知我而卿不聞乎帝甚嘉之轉在敦煌威恩甚著遷雁門太守時順陽王暢驕縱前後內史皆誣之以罪及彥為順陽內史彥清身率下威刑嚴肅衆皆畏懼暢不能誣乃更薦之冀其去職遷員外散騎常侍帝嘗問彥陸喜陸抗二人誰多也彥對曰道德名望抗不及喜立功立事喜不及抗會交州刺史陶璜卒以彥為南中都督交州刺史重餉陸機兄弟機將受之雲曰彥本微賤為先公所拔而答詔不善安可受之機乃止因此每毀之長沙孝廉尹虞謂機等曰自古由賤而興者乃有帝王何但公卿若何元幹侯孝明唐儒宗張義允等並起自寒微皆內侍外鎮人無譏者卿以士則答詔小有不善毀之無已吾恐南人皆將去卿卿便獨坐也於是機等意始解毀言漸息矣初陶璜之死也九真戍兵作亂逐其太守九真賊帥趙祉圍郡城彥悉討平之在鎮二十餘年威恩宣著南州寧靖自表求代徵為大長秋卒於官張光張光字景武江夏鍾武人也身長八尺明眉目美音聲少為郡吏家世有部曲以牙門將伐吳有功遷江夏西部都尉轉北地都尉初趙王倫為關中都督氐羌反叛太守張損戰沒郡縣吏士少有全者光以百餘人戍馬蘭山北賊圍之百餘日光撫厲將士屢出奇兵擊賊破之光以兵少路遠自分敗沒會梁王肜遣司馬索靖將兵迎光舉軍悲泣遂還長安肜表光處絶圍之地有耿恭之忠宜加甄賞以明奬勸於是擢授新平太守加鼓吹屬雍州刺史劉忱被密詔討河間王顒光起兵助忱忱時委任秦州刺史皇甫重重自以關西大族心每輕光謀多不用及二州軍潰為顒所擒顒謂光曰前起兵欲作何策光正色答曰但劉雍州不用鄙計故令大王得有今日也顒壯之引與歡宴彌日表為右衛司馬陳敏作亂除光順陽太守加陵江將軍率步騎五千詣荊州討之刺史劉弘雅敬重光稱為南楚之秀時江夏太守陶侃與敏大將錢端相距於長岐將戰襄陽太守皮初為步軍使光設伏以待之武陵太守苗光為水軍藏舟艦於沔水皮初等與賊交戰光發伏兵應之水陸同奮賊衆大敗弘表光有殊勳遷材官將軍梁州刺史先是秦州人鄧定等二千餘家飢餓流入漢中保于成固漸為抄盜梁州刺史張殷遣巴西太守張燕討之定窘急偽乞降于燕并餽燕金銀燕喜為之緩師定密結李雄雄遣衆救定燕退定遂進逼漢中太守杜正沖東奔魏興殷亦棄官而遁光不得赴州止於魏興乃結諸郡守共謀進取燕唱言曰漢中荒敗迫近大賊克復之事當俟英雄正沖曰張燕受賊金銀不時進討阻兵緩寇致喪漢中實燕之罪也光於是發怒呵燕令出斬之以徇綏撫荒殘百姓悅服光於是卻鎮漢中時逆賊王如餘黨李運楊武等自襄陽將三千餘家入漢中光遣參軍晉邈率衆於黃金距之邈受運重賂勸光納運光從邈言使居成固既而邈以運多珍貨又欲奪之復言於光曰運之徒屬不事佃農但營器杖意在難測可掩而取之光又信焉遣邈衆討運不克光乞師於氐王楊茂搜茂搜遣子難敵助之難敵求貨於光光不與楊武乃厚賂難敵謂之曰流人寶物悉在光處今伐我不如伐光難敵大喜聲言助光內與運同光弗之知也遣息援率衆助邈運與難敵夾攻邈等援為流矢所中死賊遂大盛光嬰城固守自夏迄冬憤激成疾佐吏及百姓咸勸光退據魏興光按劍曰吾受國厚恩不能翦除寇賊今得自死便如登仙何得退還也聲絶而卒時年五十五百姓悲泣遠近傷惜之有二子炅邁炅少辟太宰掾邁多才略有父風州人推邁權領州事與賊戰沒別駕范曠及督護王喬奉光妻息率其遺衆還據魏興其後義陽太守任愔為梁州光妻子歸本郡南平太守應詹白都督王敦稱光在梁州能興微繼絶威振巴漢值中原傾覆征鎮失守外無救助內闕資儲以寡敵衆經年抗禦厲節不撓宜應追論顯贈以慰存亡敦不能從趙誘趙誘字元孫淮南人也世以將顯州辟主簿值刺史郗隆被齊王冏檄使起兵討趙王倫隆欲承檄舉義而諸子姪並在洛陽欲坐觀成敗恐為冏所討進退有疑會羣吏計議誘説隆曰趙王篡逆海內所病今義兵飈起其敗必矣今為明使君計莫若自將精兵徑赴許昌上策也不然且可留後遣猛將將兵會盟亦中策也若遣小軍隨形助勝下策耳隆曰我受二帝恩無所偏助正欲保州而已誘與治中留寶主簿張褒等諫隆若無所助變難將生州亦不可保也隆猶豫不決遂為其下所害誘還家杜門不出左將軍王敦以為參軍加廣武將軍與甘卓周訪共討華軼破之又擊杜韜於西湘太興初復與卓攻韜滅之纍功賜爵平阿縣侯代陶侃為武昌太守時杜曾迎第五猗於荊州作亂敦遣誘與襄陽太守朱軌共距之猗既愍帝所遣加有時望為荊楚所歸誘等苦戰皆沒敦甚悼惜之表贈征虜將軍秦州刺史諡曰敬子龔與誘俱死元帝為晉王下令贈新昌太守龔弟胤字伯舒王敦使周訪擊杜曾胤請從行訪憚曾之強欲先以胤餌曾使其衆疲而後擊之胤多梟首級王導引為從事中郎南頓王宗反胤殺宗於是王導庾亮並倚杖之轉冠軍將軍遷西豫州刺史卒於官史臣曰忠為令德貞曰事君徇國家而竭身歷夷險而一節羅憲滕修濯纓入仕指巴東而受脤出嶺嶠而揚麾屬鼎命淪胥本朝失守屆巴丘而流涕集都亭而大臨古之忠烈罕輩于茲孝興之智勇玄威之武藝滅醜虜於河西制凶酋於硜北審楊欣之必敗譏楊駿之速禍陶璜吾彥逸足齊驅毛炅屈其深謀陸抗奇其茂略薪楢之任清規自遠鼙鼓之臣厥聲彌劭景武南楚秀士元孫纍葉將門赴死喻於登仙效誠陳於上策竟而俱斃貞則斯存贊曰憲居玉壘才博流譽修赴石門惠政攸著孝興玄威操履無違愚墳畢禮楊門致譏璜謀超絶彥材雄傑潛師襲董觀兵歎薛惟趙與張神略多方作尉北地立功西湘
