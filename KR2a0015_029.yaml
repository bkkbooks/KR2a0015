body:
  text: 晉書卷二十九志第十九五行下傳曰聽之不聰是謂不謀厥咎急厥罰寒厥極貧時則有鼓妖時則有魚孽時則有豕禍時則有耳痾時則有黑眚黑祥惟火沴水聽之不聰是謂不謀言上偏聽不聰下情隔塞則謀慮利害失在嚴急故其咎急也盛冬日短寒以殺物政促迫故其罰常寒也寒則不生百穀上下俱貧故其極貧也君嚴猛而閉下臣戰栗而塞耳則妄聞之氣發於音聲故有鼓妖寒氣動故有魚孽而龜能為孽龜能陸處非極陰也魚去水而死極陰之孽也於易坎為水為豕豕大耳而不聰察聽氣毀故有豕禍也一曰寒歲豕多死及為怪亦是也及人則多病耳者故有耳痾水色黑故有黑眚黑祥凡聽傷者病水氣水氣病則火沴之其極貧者順之其福曰富劉歆聽傳曰有介蟲之孽也庶徵之寒劉歆以為大雨雪及未當雨雪而雨雪及大雨雹隕霜殺菽草皆寒之罰也京房易傳曰有德遭險茲謂逆命厥異寒誅罰過深當燠而寒盡六日亦為雹害正不誅茲謂養賊寒七十二日殺飛禽道人始去茲謂傷其寒物無霜而死涌水而出戰不量敵茲謂辱命其寒雖雨物不茂聞善不豫厥咎聾吳孫權嘉禾三年九月朔隕霜傷穀案劉向説誅罰不由君出在臣下之象也是時校事呂一專作威福與漢元帝時石顯用事隕霜同應班固書九月二日陳壽言朔皆明未可以傷穀也一後亦伏誅京房易傳曰興兵妄誅茲謂亡法厥災霜夏殺五穀冬殺麥誅不原情茲謂不仁其霜夏先大雷風冬先雨乃隕霜有芒角賢聖遭害其霜附木不下地佞人依刑茲謂私賊其霜在草根土間不教而誅茲謂虐其霜反在草下四年七月雨雹又隕霜案劉向説雹者陰脅陽也是時呂一作威用事詆毀重臣排陷無辜自太子登以下咸患毒之而一反獲封侯寵異與春秋時公子遂專任雨雹同應也漢安帝信讒多殺無辜亦雨雹董仲舒曰凡雹皆為有所脅行專一之政故也赤烏四年正月大雪平地深三尺鳥獸死者太半是年夏全琮等四將軍攻略淮南襄陽戰死者千餘人其後權以讒邪數責讓陸議議憤恚致卒與漢景武大雪同事十一年四月雨雹是時權聽讒將危太子其後朱據屈晃以忤意黜辱陳正陳象以忠諫族誅而太子終廢此有德遭險誅罰過深之應也武帝泰始六年冬大雪七年十二月又大雪明年有步闡楊肇之敗死傷甚衆不聰之罰也九年四月辛未隕霜是時賈充親黨比周用事與魯定公漢元帝時隕霜同應也咸寧三年八月平原安平上黨泰山四郡霜害三豆是月河間暴風寒冰郡國五隕霜傷穀是後大舉征吳馬隆又帥精勇討涼州五年五月丁亥巨鹿魏郡雨雹傷禾麥辛卯雁門雨雹傷秋稼六月庚戌汲郡廣平陳留滎陽雨雹丙辰又雨雹隕霜傷秋麥千三百餘頃壞屋百二十餘間癸亥安定雨雹七月丙申魏郡又雨雹閏月壬子新興又雨雹八月庚子河南河東弘農又雨雹兼傷秋稼三豆太康元年三月河東高平霜雹傷桑麥四月河南河內河東魏郡弘農雨雹傷麥豆是月庚午畿內縣二及東平范陽雨雹癸酉畿內縣五又雨雹五月東平平陽上黨雁門濟南雨雹傷禾麥三豆是時王濬有大功而權戚互加陷抑帝從容不斷陰脅陽之應也二年二月辛酉隕霜于濟南琅邪傷麥壬申琅邪雨雹傷麥三月甲午河東隕霜害桑五月丙戌城陽章武琅邪傷麥庚寅河東樂安東平濟陰弘農濮陽齊國頓丘魏郡河內汲郡上黨雨雹傷禾稼六月郡國十七雨雹七月上黨雨雹三年十二月大雪五年七月乙卯中山東平雨雹傷秋稼甲辰中山雨雹九月南安大雪折木六年二月東海隕霜傷桑麥三月戊辰齊郡臨淄長廣不其等四縣樂安梁鄒等八縣琅邪臨沂等八縣河間易城等六縣高陽北新城等四縣隕霜傷桑麥六月滎陽汲郡鴈門雨雹八年四月齊國天水二郡隕霜十二月大雪九年正月京都大風雨雹發屋拔木四月隴西隕霜十年四月郡國八隕霜惠帝元康二年八月沛及蕩陰雨雹三年四月滎陽雨雹六月弘農湖華陰又雨雹深三尺是時賈后凶淫專恣與春秋魯桓夫人同事陰氣盛也五年六月東海雨雹深五寸十二月丹楊建鄴雨雹是月丹楊建鄴大雪六年三月東海隕雪殺桑麥七年五月魯國雨雹七月秦雍二州隕霜殺稼也九年三月旬有八日河南滎陽潁川隕霜傷禾五月雨雹是時賈后凶躁滋甚及冬遂廢愍懷永寧元年七月襄城河南雨雹十月襄城河南高平平陽又風雹折木傷稼光熙元年閏八月甲申朔霰雪劉向曰盛陽雨水傷熱陰氣脅之則轉而為雹盛陰雨雪凝滯陽氣薄之則散而為霰今雪非其時此聽不聰之應是年帝崩孝懷帝永嘉元年十二月冬雪平地三尺七年十月庚午大雪元帝太興二年三月丁未成都風雹殺人三年三月海鹽雨雹是時王敦陵上永昌二年十二月幽冀并三州大雨明帝太寧元年十二月幽冀并三州大雪二年四月庚子京都雨雹燕雀死三年三月丁丑雨雪癸巳隕霜四月大雨雹是年帝崩尋有蘇峻之亂成帝咸和六年三月癸未雨雹是時帝幼弱政在大臣九年八月成都大雪是歲李雄死咸康二年正月丁巳皇后見于太廟其夕雨雹康帝建元元年八月大雪是時政在將相陰氣盛也劉向曰凡雨陰也雪又雨之陰也出非其時迫近象也穆帝永和二年八月冀方大雪人馬多凍死五年六月臨漳暴風震電雨雹大如升十年五月涼州雪明年八月張祚枹罕護軍張瓘率宋混等攻滅祚更立張耀靈弟玄靚京房易傳曰夏雪戒臣為亂此其亂之應也十一年四月壬申朔霜十二月戊午雷己未雪是時帝幼母后稱制政在大臣陰盛故也升平二年正月大雪海西太和三年四月雨雹折木孝武太元二年四月己酉雨雹十二月大雪是時帝幼政在將相陰之盛也十二年四月己丑雨雹二十年五月癸卯上虞雨雹二十一年四月丁亥雨雹是時張夫人專寵及帝暴崩兆庶尤之十二月雨雪二十三日是時嗣主幼沖冢宰專政安帝隆安二年三月乙卯雨雹是秋王恭殷仲堪稱兵內侮終皆誅之也元興二年十二月酷寒過甚是時桓玄篡位政事煩苛識者以為朝政失在舒緩玄則反之以酷案劉向曰周衰無寒歲秦滅無燠年此之謂也三年正月甲申霰雪又雷雷霰同時皆失節之應也四月丙午江陵雨雹是時安帝蒙塵義熙元年四月壬申雨雹是時四方未一鉦鼓日戒五年三月己亥雪深數尺五月癸巳溧陽雨雹九月己丑廣陵雨雹明年盧循至蔡洲六年正月丙寅雪又雷五月壬申雨雹八年四月辛未朔雨雹六月癸亥雨雹大風發屋是秋誅劉蕃等十年四月辛卯雨雹雷震魏明帝景初中洛陽城東橋城西洛水浮橋桓楹同日三處俱時震尋又震西城上候風木飛鳥時勞役大起帝尋晏駕吳孫權赤烏八年夏震宮門柱又擊南津大橋桓楹孫亮建興元年十二月朔大風震電是月又雷雨義同前説亮終廢武帝太康六年十二月甲申朔淮南郡震電七年十二月己亥毗陵雷電南沙司鹽都尉戴亮以聞十年十二月癸卯廬江建安雷電大雨惠帝永康元年六月癸卯震崇陽陵標西南五百步標破為七十片是時賈后陷害鼎輔寵樹私戚與漢桓帝時震憲陵寢同事也后終誅滅永興二年十月丁丑雷震懷帝永嘉四年十月震電愍帝建興元年十一月戊午會稽大雨震電己巳夜赤氣曜於西北是夕大雨震電庚午大雪案劉向説雷以二月出八月入今此月震電者陽不閉藏也既發泄而明日便大雪皆失節之異也是時劉載僭號平陽李雄稱制於蜀九州幅裂西京孤微為君失時之象也赤氣赤祥也元帝太興元年十一月乙卯暴雨雷電永昌二年七月丙子朔雷震太極殿柱十二月會稽吳郡雷震電成帝咸和元年十月己巳會稽郡大雨震電三年六月辛卯臨海大雷破郡府內小屋柱十枚殺人九月二日壬午立冬會稽雷電四年十一月吳郡會稽又震電穆帝永和七年十月壬午雷雨震電升平元年十一月庚戌雷乙丑又雷五年十月庚午雷發東南方孝武帝太元五年六月甲寅雷震含章殿四柱并殺內侍二人十年十二月雷聲在南方十四年七月甲寅雷震燒宣陽門西柱安帝隆安二年九月壬辰雷雨元興三年永安皇后至自巴陵將設儀導入宮天雷震人馬各一俱殪焉義熙四年十一月辛卯朔西北方疾風發癸丑雷五年六月丙寅雷震太廟破東鴟尾徹柱又震太子西池合堂是時帝不親蒸嘗故天震之明簡宗廟也西池是明帝為太子時所造次故號太子池及安帝多病患無嗣故天震之明無後也六年正月丙寅雷又雪十二月壬辰大雷九年十一月甲戌雷乙亥又雷鼓妖惠帝元康九年三月有聲若牛出許昌城十二月廢愍懷太子幽于許宮明年賈后遣黃門孫慮殺太子擊以藥杵聲聞于外是其應也蘇峻在歷陽外營將軍鼓自鳴如人弄鼓者峻手自破之曰我鄉土時有此則城空矣俄而作亂夷滅此聽不聰之罰也石季龍末洛陽城西北九里石牛在青石趺上忽鳴聲聞四十里季龍遣人打落兩耳及尾鐵釘釘四腳尋而季龍死孝武太元十五年三月己酉朔東北方有聲如雷案劉向説以為雷當託於雲猶君託於臣無雲而雷此君不恤於下下人將叛之象也及帝崩而天下漸亂孫恩桓玄交陵京邑吳興長城夏架山有石鼓長丈餘面徑三尺所下有盤石為足鳴則聲如金鼓三吳有兵至安帝隆安中大鳴後有孫恩之亂魚孽魏齊王嘉平四年五月有二魚集于武庫屋上此魚孽也王肅曰魚生於水而亢於屋介鱗之物失其所也邊將其殆有𠫓廾甲之變乎後果有東關之敗干寶又以為高貴鄉公兵禍之應二説皆與班固旨同武帝太康中有鯉魚二見武庫屋上干寶以為武庫兵府魚有鱗甲亦兵類也魚既極陰屋上太陽魚見屋上象至陰以兵革之禍干太陽也至惠帝初誅楊駿廢太后矢交館閣元康末賈后謗殺太子尋亦誅廢十年之間母后之難再興是其應也自是禍亂搆矣京房易傳曰魚去水飛入道路兵且作蝗蟲春秋螽劉歆從介蟲之孽與魚同占魏文帝黃初三年七月冀州大蝗人飢案蔡雍説蝗者在上貪苛之所致也是時孫權歸順帝因其有西陵之役舉大衆襲之權遂背叛也武帝泰始十年六月蝗是時荀賈任政疾害公直惠帝永寧元年郡國六蝗懷帝永嘉四年五月大蝗自幽并司冀至于秦雍草木牛馬毛鬣皆盡是時天下兵亂漁獵黔黎存亡所繼惟司馬越苟晞而已競為暴刻經略無章故有此孽愍帝建興四年六月大蝗去歲劉曜頻攻北地馮翊麴允等悉衆御之卒為劉曜所破西京遂潰五年帝在平陽司冀青雍螽元帝太興元年六月蘭陵合鄉蝗害禾稼乙未東莞蝗蟲縱廣三百里害苗稼七月東海彭城下邳臨淮四郡蝗蟲害禾豆八月冀青徐三州蝗食生草盡至于二年是時中州淪喪暴亂滋甚也二年五月淮陵臨淮淮南安豐廬江等五郡蝗蟲食秋麥是月癸丑徐州及揚州江西諸郡蝗吳郡百姓多餓死是年王敦并領荊州苛暴之釁自此興矣孝武帝太元十五年八月兗州蝗是時慕容氏逼河南征戍不已故有斯孽十六年五月飛蝗從南來集堂邑縣界害苗稼是年春發江州兵營甲士二千人家口六七千配護軍及東宮後尋散亡殆盡又邊將連有征役故有斯孽豕禍吳孫晧寶鼎元年野豕入右大司馬丁奉營此豕禍也後奉見遣攻穀陽無功而反晧怒斬其導軍及舉大衆北出奉及萬彧等相謂曰若至華里不得不各自還也此謀泄奉時雖已死晧追討穀陽事殺其子溫家屬皆遠徙豕禍之應也龔遂曰山野之獸來入宮室宮室將空又其象也懷帝永嘉中壽春城內有豕生兩頭而不活周馥取而觀之時識者云豕北方畜胡狄象兩頭者無上也生而死不遂也天戒若曰勿生專利之謀將自致傾覆也周馥不寤遂欲迎天子令諸侯俄為元帝所敗是其應也石勒亦尋渡淮百姓死者十有其九元帝建武元年有豕生八足此聽不聰之罰又所任邪也是後有劉隗之變成帝咸和六年六月錢唐人家猳豕産兩子而皆人面如胡人狀其身猶豕京房易妖曰豕生人頭豕身者危且亂今此猳豕而産異之甚者也孝武帝太元十年四月京都有豚一頭二脊八足十三年京都人家豕産子一頭二身八足並與建武同妖也是後宰相沈酗不恤朝政近習用事漸亂國綱至於大壞也黑眚黑祥孝懷帝永嘉五年十二月黑氣四塞近黑祥也帝尋淪陷王室丘墟是其應也愍帝建興二年正月己巳朔黑霧著人如墨連夜五日乃止此近黑祥也其四年帝降劉曜元帝永昌元年十月京師大霧黑氣蔽天日月無光十一月帝崩火沴水武帝太康五年六月任城魯國池水皆赤如血案劉向説近火沴水聽之不聰之罰也京房易傳曰君淫於色賢人潛國家危厥異水流赤穆帝升平三年二月涼州城東池中有火四年四月姑臧澤水中又有火此火沴水之妖也明年張天錫殺中護軍張雍雍執政之人也安帝元興二年十月錢唐臨平湖水赤桓玄諷吳郡使言開除以為己瑞俄而桓玄敗傳曰思心之不容是謂不聖厥咎霿厥罰風厥極凶短折時則有脂夜之妖時則有華孽時則有牛禍時則有心腹之痾時則有黃眚黃祥時則有金木水火沴土思心不容是謂不聖思心者心思慮也容寬也孔子曰居上不寬吾何以觀之哉言上不寬大包容臣下則不能居聖位貌言視聽以心為主四者皆失則區霿無識故其咎霿也雨旱寒燠亦以風為本四氣皆亂故其罰風也風傷物故其極凶短折也傷人曰凶禽獸曰短草木曰折一曰凶夭也兄喪弟曰短父喪子曰折在人腹中肥而包裹心者脂也心區霿則冥晦故有脂夜之妖一曰有脂物而夜為妖若脂夜樜人衣淫之象也一曰夜妖者雲風並起而杳冥故與常風同象也溫而風則生螟螣有裸蟲之孽劉向以為於易巽為風為木卦在三月四月繼陽而治主木之華實風氣盛至秋冬木復華故有華孽一曰地氣盛則秋冬復華一曰華者色也土為內事謂女孽也於易坤為土為牛牛大心而不能思慮心氣毀故有牛禍一曰牛多死及為怪亦是也及人則多病心腹者故有心腹之痾土色黃故有黃眚黃祥凡思心傷者病土氣土氣病則金木水火沴之故曰時則有金木水火沴土不言惟而獨曰時則有者非一衝氣所沴明其異大也其極凶短折者順之其福曰考終命劉歆思心傳曰時有裸蟲之孽謂螟螣之屬也庶徵風魏齊王正始九年十一月大風數十日發屋折樹十二月戊午晦尤甚動太極東閣嘉平元年正月壬辰朔西北大風發屋折樹木昏塵蔽天案管輅説此為時刑大臣執政之憂也是時曹爽區霿自專驕僭過度天戒數見終不改革此思心不睿風之罰也後踰旬而爽等誅滅京房易傳曰衆逆同志至德乃潛厥異風其風也行不解物不長雨小而傷政悖德隱茲謂亂厥風先風不雨大風暴起發屋折木守義不進茲謂眊厥風與雲俱起折五穀莖臣易上政茲謂不順厥風大猋發屋賦斂不理茲謂禍厥風絶經紀止即溫溫即蟲侯專封茲謂不統厥風疾而樹不搖穀不成辟不思道利茲謂無澤厥風不搖木旱無雲傷禾公常於利茲謂亂厥風微而溫生蟲蝗害五穀棄政作淫茲謂惑厥風溫螟蟲起害有益人之物諸侯不朝茲謂畔厥風無地變赤雨殺人吳孫權太元元年八月朔大風江海涌溢平地水深八尺拔高陵樹二千株石碑蹉動吳城兩門飛落案華核對役繁賦重區霿不容之罰也明年權薨孫亮建興元年十二月丙申大風震電是歲魏遣大衆三道來攻諸葛恪破其東興軍二軍亦退明年恪又攻新城喪衆太半還伏誅孫休永安元年十一月甲午風四轉五復蒙霧連日是時孫綝一門五侯權傾吳主風霧之災與漢五侯丁傅同應也十二月丁卯夜有大風發木揚沙明日綝誅武帝泰始五年五月辛卯朔廣平大風折木咸寧元年五月下邳廣陵大風壞千餘家折樹木其月甲申廣陵司吾下邳大風折木三年八月河間大風折木太康二年五月濟南暴風折木傷麥六月高平大風折木發壞邸閣四十餘區七月上黨又大風傷秋稼八年六月郡國八大風九年正月京都風雹發屋拔樹後二年宮車晏駕惠帝元康四年六月大風雨拔木五年四月庚寅夜暴風城東渠波浪殺人七月下邳大風壞廬舍九月雁門新興太原上黨災風傷稼明年氐羌反叛大兵西討九年六月飆風吹賈謐朝服飛數百丈明年謐誅十一月甲子朔京都連大風發屋折木十二月愍懷太子廢幽于許昌永康元年二月大風拔木三月愍懷被害己卯喪柩發許昌還洛是日又大風雷電幃蓋飛裂四月張華第舍飆風起折木飛繒折軸六七是月華遇害十一月戊午朔大風從西北來折木飛沙石六日止明年正月趙王倫篡位永寧元年八月郡國三大風永興元年正月乙丑西北大風趙王倫建始元年正月癸酉趙王倫祠太廟災風暴起塵四合其年四月倫伏辜元帝永昌元年七月丙寅大風拔木屋瓦皆飛八月暴風壞屋拔御道柳樹百餘株其風縱橫無常若風自八方來者是時王敦專權害尚書令刁協僕射周顗等故風縱橫若非一處也此臣易上政諸侯不朝之罰也十一月宮車晏駕成帝咸康四年三月壬辰成都大風發屋折木四月李壽襲殺李期自立康帝建元元年七月庚申晉陵吳郡災風穆帝升平元年八月丁未策立皇后何氏是日疾風後桓玄篡位乃降后為零陵縣君不睿之罰也五年正月戊戌朔疾風海西公太和六年二月大風迅急是年被廢孝武帝寧康元年三月京都大風火大起是時桓溫入朝志在陵上帝又幼少人懷憂恐斯不睿之徵也三年三月戊申朔暴風迅起從丑上來須臾逆轉從子上來飛沙揚礫太元二年二月乙丑朔暴風折木閏三月甲子朔暴風疾雨俱至發屋折木三年六月長安大風拔苻堅宮中樹其後堅再南伐遂有淝水之敗身戮國亡四年八月乙未暴風揚沙石十二年正月壬子夜暴風七月甲辰大風折木十三年十二月乙未大風晝晦其後帝崩而諸侯違命權奪於元顯禍成於桓玄是其應也十七年六月乙卯大風折木安帝元興二年二月甲辰夜大風雨大航門屋瓦飛落明年桓玄篡位由此門入三年正月桓玄出遊大航南飄風飛其𨷟輗蓋經三月而玄敗歸江陵五月江陵又大風折木是月桓玄敗於崢嶸洲身亦屠裂十一月丁酉大風江陵多死者義熙四年十一月辛卯朔西北疾風起五年閏十月丁亥大風發屋明年盧循至蔡洲六年五月壬申大風拔北郊樹樹幾百年也并吹琅邪揚州二射堂倒壞是日盧循大艦漂沒甲戌又風發屋折木是冬王師南討九年正月大風白馬寺浮圖剎柱折壞十年四月己丑朔大風拔木六月辛亥大風拔木七月淮北大風壞廬舍明年西討司馬休之應夜妖魏高貴鄉公正元二年正月戊戌景帝討毋丘儉大風晦暝行者皆頓伏近夜妖也劉向曰正晝而暝陰為陽臣制君也元帝景元三年十月京都大震晝晦此夜妖也班固曰夜妖者雲風並起而杳冥故與常風同象也劉向春秋説云天戒若曰勿使大夫世官將令專事暝晦公室卑矣魏見此妖晉有天下之應也懷帝永嘉四年十月辛卯晝昏至于庚子此夜妖也後年劉曜寇洛川王師頻為賊所敗帝蒙塵于平陽孝武帝太元十三年十二月乙未大風晦暝其後帝崩而諸侯違命干戈內侮權奪於元顯禍成於桓玄裸蟲之孽京房易傳曰臣安祿位茲謂貪厥災蟲食根德無常茲謂煩蟲食葉不絀無德蟲食本與東作爭茲謂不時蟲食莖蔽惡生孽蟲食心武帝咸寧元年七月郡國螟九月青州又螟是月郡國有青蟲食其禾稼四年司冀兗豫荊揚郡國二十螟太康四年會稽彭蜞及蟹皆化為鼠甚衆復大食稻為災九年八月郡國二十四螟九月蟲又傷秋稼是時帝聽讒諛寵任賈充楊駿故有蟲蝗之災不絀無德之罰惠帝元康三年九月帶方等六縣螟食禾葉盡永寧元年七月梁益涼三州螟是時齊王冏執政貪苛之應也十月南安巴西江陽太原新興北海青蟲食禾葉甚者十傷五六十二月郡國六螟牛禍武帝太康九年幽州塞北有死牛頭語近牛禍也是時帝多疾病深以後事為念而託付不以至公思瞀亂之應也案師曠曰怨讟動於人則有非言之物而言又其義也京房易傳曰殺無罪牛生妖惠帝太安中江夏張騁所乘牛言曰天下亂乘我何之騁懼而還犬又言曰歸何早也尋後牛又人立而行騁使善卜者卦之謂曰天下將有兵亂為禍非止一家其年張昌反先略江夏騁為將帥於是五州殘亂騁亦族滅京房易傳曰牛能言如其言占吉凶易萌氣樞曰人君不好士走馬被文繡犬狼食人食則有六畜談言時天子諸侯不以惠下為務又其應也元帝建武元年七月晉陵陳門才牛生犢一體兩頭案京房易傳言牛生子二首一身天下將分之象也是時愍帝蒙塵於平陽尋為逆胡所殺元帝即位江東天下分為二是其應也太興元年武昌太守王諒牛生子兩頭八足兩尾共一腹三年後死又有牛一足三尾皆生而死案司馬彪説兩頭者政在私門上下無別之象也京房易傳曰足多者所任邪也足少者不勝任也其後王敦等亂政此其祥也四年十二月郊牛死案劉向説春秋郊牛死曰宣公區霿昏亂故天不饗其祀今元帝中興之業實王導之謀也劉隗探會上意以得親幸導見疏外此區霿不睿之禍成帝咸和二年五月護軍牛生犢兩頭六足是冬蘇峻作亂七年九德人袁榮家牛産犢兩頭八足二尾共身桓玄之國在荊州詣刺史殷仲堪行至鶴穴逢一老公驅青牛形色瓌異桓玄即以所乘牛易取乘至零陵涇溪駿駛非常息駕飲牛牛徑入江水不出玄遣人覘守經日無所見於後玄敗被誅黃眚黃祥蜀劉備章武二年東伐二月自秭歸進屯夷道六月秭歸有黃氣見長十餘里廣數十丈後踰旬備為陸議所破近黃祥也魏齊王正始中中山王周南為襄邑長有鼠從穴出語曰王周南爾以某日死周南不應鼠還穴後至期更冠幘皂衣出語曰周南汝日中當死又不應鼠復入穴斯須更出語如向日適欲中鼠入須臾復出出復入轉更數語如前日適中鼠曰周南汝不應我復何道言絶顛蹶而死即失衣冠取視俱如常鼠案班固説此黃祥也是時曹爽專政競為比周故鼠作變也惠帝元康四年十二月大霧帝時昏眊政非己出故有區霿之妖元帝太興四年八月黃霧四塞埃氛蔽天永昌元年十月京師大霧黑氣貫天日無光明帝太寧元年正月癸巳黃霧四塞二月又黃霧四塞是時王敦擅權謀逆愈甚穆帝永和七年三月涼州大風拔木黃霧下塵是時張重華納譖出謝艾為酒泉太守而所任非其人至九年死嗣子見殺是其應也京房易傳曰聞善不豫茲謂不知厥異黃厥咎聾厥災不嗣黃者有黃濁氣四塞天下蔽賢絶道故災至絶世也孝武太元八年二月癸未黃霧四塞是時道子專政親近佞人朝綱方替安帝元興元年十月丙申朔黃霧昏濁不雨是時桓玄謀逆之應義熙五年十一月大霧十年十一月又大霧是時帝室衰微臣下權盛兵及土地略非君有此其應也地震劉向曰地震金木水火沴土者也伯陽甫曰天地之氣不過其序若過其序人之亂也陽伏而不能出陰迫而不能升於是有地震吳孫權黃武四年江東地連震是時權受魏爵命為大將軍吳王改元專制不修臣迹京房易傳曰臣事雖正專必震其震於水則波於木則搖於屋則瓦落大經在辟而易臣茲謂陰動厥震搖政宮大經搖政茲謂不陰厥震搖山出涌水嗣子無德專祿茲謂不順厥震動丘陵涌水出劉向並云臣下強盛將動而為害之應也魏明帝青龍二年十一月京都地震從東來隱隱有聲搖屋瓦景初元年六月戊申京都地震是秋吳將朱然圍江夏荊州刺史胡質擊退之又公孫文懿叛自立為燕王改年置百官明年討平之吳孫權嘉禾六年五月江東地震赤烏二年正月地再震是時呂一專事步騭上疏曰伏聞校事吹毛求瑕趣欲陷人成其威福無罪無辜橫受重刑雖有大臣不見信任如此天地焉得無變故地連震動臣下專政之應也冀所以警悟人主可不深思其意哉一後卒敗魏齊王正始二年十一月南安郡地震三年七月甲申南安郡地震十二月魏郡地震六年二月丁卯南安郡地震是時曹爽專政遷太后于永寧宮太后與帝相泣而別連年地震是其應也吳孫權赤烏十一年二月江東地仍震是時權聽讒尋黜朱據廢太子蜀劉禪炎興元年蜀地震是時宦人黃皓專權案司馬彪説閹官無陽施猶婦人也皓見任之應與漢和帝時同事也是冬蜀亡武帝泰始五年四月辛酉地震是年冬新平氐羌叛明年孫晧遣大衆入渦口七年六月丙申地震咸寧二年八月庚辰河南河東平陽地震四年六月丁未陰平廣武地震甲子又震太康二年二月庚申淮南丹楊地震五年正月朔壬辰京師地震六年七月己丑地震七年七月南安犍為地震八月京兆地震八年五月壬子建安地震七月陰平地震八月丹楊地震九年正月會稽丹楊吳興地震四月辛酉長沙南海等郡國八地震七月至于八月地又四震其三有聲如雷九月臨賀地震十二月又震十年十二月己亥丹楊地震太熙元年正月地又震武帝世始於賈充終於楊駿阿黨昧利苟竊朝權至於末年所任轉弊故頻年地震過其序也終喪天下惠帝元康元年十二月辛酉京都地震此夏賈后使楚王瑋殺汝南王亮及太保衛瓘此陰道盛陽道微故也四年二月上谷上庸遼東地震五月蜀郡山移淮南壽春洪水出山崩地陷壞城府八月上谷地震水出殺百餘人十月京都地震十一月滎陽襄城汝陰梁國南陽地皆震十二月京都又震是時賈后亂朝終至禍敗之應也漢鄧太后攝政時郡國地震李固以為地陰也法當安靜今乃越陰之職專陽之政故應以震此同事也京房易傳曰小人剝廬厥妖山崩茲謂陰乘陽弱勝強又曰陰背陽則地裂父子分離夷羌叛去五年五月丁丑地震六月金城地震六年正月丁丑地震八年正月丙辰地震太安元年十月地震時齊王冏專政之應二年十二月丙辰地震是時長沙王乂專政之應也孝懷帝永嘉三年十月荊湘二州地震時司馬越專政四年四月兗州地震五月石勒寇汲郡執太守胡寵遂南濟河是其應也愍帝建興二年四月甲辰地震三年六月丁卯長安又地震是時主幼權傾於下四方雲擾兵亂不息之應也元帝太興元年四月西平地震湧水出十二月廬陵豫章武昌西陵地震湧水出山崩干寶以為王敦陵上之應也二年五月己丑祁山地震山崩殺人是時相國南陽王保在祁山稱晉王不終之象也三年五月庚寅丹楊吳郡晉陵又地成帝咸和二年二月江陵地震三月益州地震四月己未豫章地震是年蘇峻作亂九年三月丁酉會稽地震穆帝永和元年六月癸亥地震是時嗣主幼沖母后稱制政在臣下所以連年地震二年十月地震三年正月丙辰地震九月地又震四年十月己未地震五年正月庚寅地震是時石季龍僭即皇帝位亦過其序也九年八月丁酉京都地震有聲如雷十年正月丁卯地震聲如雷雞雉皆鳴詬十一年四月乙酉地震五月丁未地震升平二年十一月辛酉地震五年八月涼州地震哀帝隆和元年四月甲戌地震是時政在將相人主南面而已興寧元年四月甲戌揚州地震湖瀆溢二年二月庚寅江陵地震是時桓溫專政海西公太和元年二月涼州地震水涌是海西將廢之應也簡文帝咸安二年十月辛未安成地震是年帝崩孝武帝寧康元年十月辛未地震二年二月丁巳地震七月甲午涼州地又震山崩是時嗣主幼沖權在將相陰盛之應也太元二年閏三月壬午地震五月丁丑地震十一年六月己卯地震是後緣河諸將連歲兵役人勞之應也十五年三月己酉朔夜地震八月京都地震十二月己未地震十七年六月癸卯地震十二月己未地又震是時羣小弄權天下側目十八年正月癸亥朔地震二月乙未夜地震安帝隆安四年四月乙未地震九月癸丑地震是時幼主沖昧政在臣下義熙四年正月壬子夜地震有聲十月癸亥地震五年正月戊戌夜尋陽地震有聲如雷明年盧循下八年自正月至四月南康廬陵地四震明年王旅西討荊益十年三月戊寅地震山崩地陷裂吳孫權赤烏十三年八月丹楊句容及故鄣寧國諸山崩鴻水溢案劉向説山陽君也水陰百姓也天戒若曰君道崩壞百姓將失其所與春秋梁山崩漢齊楚衆山發水同事也夫三代命祀祭不越望吉凶禍福不是過也吳雖稱帝其實列國災發丹楊其天意矣劉歆以為國主山川山崩川竭亡之徵也後二年而權薨又二十六年而吳亡魏元帝咸熙二年二月太行山崩此魏亡之徵也其冬晉有天下武帝泰始三年三月戊午大石山崩四年七月泰山崩墜三里京房易傳曰自上下者為崩厥應泰山之石顛而下聖王受命人君虜及帝晏駕而祿去王室惠皇懦弱懷愍二帝俱辱虜庭淪胥於北元帝中興於南此其應也太康五年五月丙午宣帝廟地陷六年十月南安新興山崩涌水出七年二月朱提之大瀘山崩震壞郡舍陰平之仇池崖隕八年七月大雨殿前地陷方五尺深數丈中有破船惠帝元康四年蜀郡山崩殺人五月壬子壽春山崩洪水出城壞地陷方三十丈殺人六月壽春大雷山崩地坼人家陷死上庸亦如之八月居庸地裂廣三十六丈長八十四丈水出大飢上庸四處山崩地墜廣三十丈長百三十丈水出殺人皆賈后亂朝之應也太安元年四月西墉崩懷帝永嘉元年三月洛陽東北步廣里地陷二年八月乙亥鄄城城無故自壞七十餘丈司馬越惡之遷于濮陽此見沴之異也越卒以陵上受禍三年七月戊辰當陽地裂三所廣三丈長三百餘步京房易傳曰地坼裂者臣下分離不肯相從也其後司馬越苟晞交惡四方牧伯莫不離散王室遂亡三年十月宜都夷道山崩四年四月湘東酃黑石山崩元帝太興元年二月廬陵豫章武昌西陽地震山崩二年五月祁山地震山崩殺人三年南平郡山崩出雄黃數千斤時王敦陵傲帝優容之示含養禍萌也四年八月常山崩水出滹盈溢大木傾拔成帝咸和四年十月柴桑廬山西北崖崩十二月劉胤為郭默所殺穆帝永和七年九月峻平崇陽二陵崩十二年十一月遣散騎常侍車灌修峻平陵開埏道崩壓殺數十人升平五年二月南掖門馬足陷地得鍾一有文四字哀帝隆和元年四月丁丑浩亹山崩張天錫亡徵也安帝義熙八年三月壬寅山陰地陷方四丈有聲如雷十年五月戊寅西明門地穿涌水出毀門扇及限此水沴土也十一年五月霍山崩出銅鍾六枚十三年七月漢中成固縣水涯有聲若雷既而岸崩出銅鍾十有二枚惠帝元康九年六月夜暴雷雨賈謐齋屋柱陷入地壓謐牀帳此木沴土土失其性不能載也明年謐誅焉光熙元年五月范陽國地燃可以爨此火沴土也是時禮樂征伐自諸侯出傳曰皇之不極是謂不建厥咎眊厥罰陰厥極弱時則有射妖時則有龍蛇之孽時則有馬禍時則有下人伐上之痾時則有日月亂行星辰逆行皇之不極是謂不建皇君極中建立也人君貌言視聽思心五事皆失不得其中不能立萬事失在眊悖故其咎眊也王者自下承天理物雲起於山而彌於天天氣亂故其罰陰一曰上失中則下強盛而蔽君明也易曰亢龍有悔貴而亡位高而亡民賢人在下位而亡輔如此則君有南面之尊而亡一人之助故其極弱也盛陽動進輕疾禮春而大射以順陽氣上微弱則下奮驚動故有射妖易曰雲從龍又曰龍蛇之蟄以存身也陰氣動故有龍蛇之孽於易乾為君為馬任用而強力君氣毀故有馬禍一曰馬多死及為怪亦是也君亂且弱人之所叛天之所去不有明王之誅則有篡殺之禍故有下人伐上之痾凡君道傷者病天氣不言五行沴天而曰日月亂行星辰逆行者為若下不敢沴天猶春秋曰王師敗績于貿戎不言敗之者以自敗為文尊尊之意也劉歆皇極傳曰有下體生於上之痾説以為下人伐上天誅已成不得復為痾云陰吳孫亮太平三年自八月沈陰不雨四十餘日是時將誅孫綝謀泄九月戊午綝以兵圍宮廢亮為會稽王此陰之罰也吳孫晧寶鼎元年十二月太史奏久陰不雨將有陰謀孫晧驚懼時陸凱等謀因其謁廟廢之及出留平領兵前驅凱先語平平不許是以不果晧既肆虐羣下多懷異圖終至降亡射妖蜀車騎將軍鄧芝征涪陵見玄猿緣山手射中之猿拔其箭卷木葉塞其創芝曰嘻吾違物之性其將死矣俄而卒此射妖也一曰猿母抱子芝射中之子為拔箭取木葉塞創芝歎息投弩水中自知當死恭帝為琅邪王好奇戲嘗閉一馬於門內令人射之欲觀幾箭死左右有諫者曰馬國姓也今射之不祥於是乃止而馬已被十許箭矣此蓋射妖也俄而禪位於宋焉龍蛇之孽魏明帝青龍元年正月甲申青龍見郟之摩陂井中凡瑞興非時則為妖孽況困于井非嘉祥矣魏以改年非也干寶曰自明帝終魏世青龍黃龍見者皆其主興廢之應也魏土運青木色而不勝于金黃得位青失位之象也青龍多見者君德國運內相克伐也故高貴鄉公卒敗于兵案劉向説龍貴象而困井中諸侯將有幽執之禍也魏世龍莫不在井此居上者逼制之應高貴鄉公著潛龍詩即此旨也高貴鄉公正元元年十月戊戌黃龍見于鄴井中甘露元年正月辛丑青龍見軹縣井中六月乙丑青龍見元城縣界井中二年二月青龍見溫縣井中三年黃龍青龍俱見頓丘冠軍陽夏縣界井中四年正月黃龍二見寧陵縣界井中元帝景元元年十二月甲申黃龍見華陰縣井中三年二月龍見軹縣井中吳孫晧天册中龍乳於長沙人家啖雞雛京房易妖曰龍乳人家王者為庶人其後晧降晉武帝咸寧二年六月丙午白龍二見于九原井中太康五年正月癸卯二龍見武庫井中帝觀之有喜色百僚將賀劉毅獨表曰昔龍漦夏庭禍發周室龍見鄭門子産不賀帝答曰朕德政未修未有以應受嘉祥遂不賀也孫盛曰龍水物也何與於人子産言之當矣但非其所處實為妖災夫龍以飛翔顯見為瑞今則潛伏幽處非休祥也漢惠帝二年兩龍見蘭陵井中本志以為其後趙王幽死之象武庫者帝王威御之器所寶藏也屋宇邃密非龍所處是後七年藩王相害二十八年果有二胡僭竊神器二逆皆字曰龍此之表異為有證矣愍帝建興二年十一月枹罕羌妓産一龍子色似錦文常就母乳遙見神光少得就視此亦皇之不建於是帝竟淪沒呂纂末龍出東廂井中到其殿前蟠臥比旦失之俄又有黑龍升其宮門纂咸以為美瑞或曰龍者陰類出入有時今而屢見必有下人謀上之變後纂果為呂超所殺武帝咸寧中司徒府有二大蛇長十許丈居聽事平橑上而人不知但數年怪府中數失小兒及豬犬之屬後有一蛇夜出被刃傷不能去乃覺之發徒攻擊移時乃死夫司徒五教之府此皇極不建故蛇孽見之漢靈帝時蛇見御座楊賜云為帝溺於色之應也魏代宮人猥多晉又過之燕遊是湎此其孽也詩云惟虺惟蛇女子之祥也惠帝元康五年三月癸巳臨淄有大蛇長十餘丈負二小蛇入城北門徑從市入漢城陽景王祠中不見天戒若曰昔漢景王有定傾之功而不厲節忠慎以至失職奪功之辱今齊王冏不寤雖建興復之功而驕陵取禍此其徵也明帝太寧初武昌有大蛇常居故神祠空樹中每出頭從人受食京房易妖曰蛇見於邑不出三年有大兵國有大憂尋有王敦之逆馬禍武帝太熙元年遼東有馬生角在兩耳下長三寸案劉向説曰此兵象也及帝晏駕之後王室毒於兵禍是其應也京房易傳曰臣易上政不順厥妖馬生角茲謂賢士不足又曰天子親伐馬生角呂氏春秋曰人君失道馬有生角及惠帝踐阼昏愚失道又親征伐成都是其應也惠帝元康八年十二月皇太子將釋奠太傅趙王倫驂乘至南城門馬止力士推之不能動倫入軺車乃進此馬禍也天戒若曰倫不知義方終為亂逆非傅導行禮之人也九年十一月戊寅忽有牡騮馬驚奔至廷尉訊堂悲鳴而死天戒若曰愍懷寃死之象也見廷尉訊堂其天意乎懷帝永嘉六年二月神馬鳴南城門愍帝建興二年九月蒲子縣馬生人京房易傳曰上亡天子諸侯相伐厥妖馬生人是時帝室衰微不絶如線胡狄交侵兵戈日逼尋而帝亦淪陷故此妖見也元帝太興二年丹楊郡吏濮陽演馬生駒兩頭自項前別生而死司馬彪説曰此政在私門二頭之象也其後王敦陵上成帝咸康八年五月甲戌有馬色赤如血自宣陽門直走入于殿前盤旋走出尋逐莫知所在己卯帝不豫六月崩此馬禍又赤祥也是年張重華在涼州將誅其西河相張祥廄馬數十匹同時悉無後尾也安帝隆安四年十月梁州有馬生角刺史郭銓送示桓玄案劉向説曰馬不當生角猶玄不當舉兵向上也玄不寤以至夷滅石季龍在鄴有一馬尾有燒狀入其中陽門出顯陽門東宮皆不得入走向東北俄爾不見術者佛圖澄歎曰災其及矣逾年季龍死其國遂滅人痾魏文帝黃初初清河宋士宗母化為鱉入水明帝太和三年曹休部曲丘奚農女死復生時又有開周世冢得殉葬女子數日而有氣數月而能言郭太后愛養之又太原人發冢破棺棺中有一生婦人問其本事不知也視其墓木可三十歲案京房易傳曰至陰為陽下人為上宣帝起之象也漢平帝獻帝並有此異占以為王莽曹操之徵孫休永安四年安吳民陳焦死七日復生穿冢出干寶曰此與漢宣帝同事烏程侯晧承廢故之家得位之祥也孫晧寶鼎元年丹楊宣騫母年八十因浴化為黿兄弟閉戶衛之掘堂上作大坎實水其中黿入坎遊戲一二日延頸外望伺戶小開便輪轉自躍入于遠潭遂不復還與漢靈帝時黃氏母同事吳亡之象也魏元帝咸熙二年八月襄武縣言有大人見長三丈餘迹長三尺二寸髮白著黃巾黃單衣柱杖呼王始語曰今當太平晉尋代魏武帝泰始五年元城人年七十生角殆趙王倫篡亂之象也咸寧二年十二月琅邪人顏畿病死棺斂已久家人咸夢畿謂己曰我當復生可急開棺遂出之漸能飲食屈伸視瞻不能行語二年復死京房易傳曰至陰為陽下人為上厥妖人死復生其後劉元海石勒僭逆遂亡晉室下為上之應也惠帝元康中安豐有女子周世寧年八歲漸化為男至十七八而氣性成京房易傳曰女子化為丈夫茲謂陰昌賤人為王此亦劉元海石勒蕩覆天下之妖也永寧初齊王冏唱義兵誅除亂逆乘輿反正忽有婦人詣大司馬門求寄産門者詰之婦曰我截臍便去耳是時齊王冏匡復王室天下歸功識者為其惡之後果斬戮永寧元年十二月甲子有白頭公入齊王冏大司馬府大呼曰有大兵起不出甲子旬冏殺之明年十二月戊辰冏敗即甲子旬也太安元年四月癸酉有人自雲龍門入殿前北面再拜曰我當作中書監即收斬之干寶以為禁庭尊祕之處今賤人徑入而門衛不覺者宮室將虛而下人踰上之妖也是後帝北遷鄴又遷長安宮闕遂空焉元康中梁國女子許嫁已受禮娉尋而其夫戍長安經年不歸女家更以適人女不樂行其父母逼強不得已而去尋得病亡後其夫還問其女所在其家具説之其夫徑至女墓不勝哀情便發冢開棺女遂活因與俱歸後壻聞知詣官爭之所在不能決祕書郎王導議曰此是非常事不得以常理斷之宜還前夫朝廷從其議惠帝世杜錫家葬而婢誤不得出後十年開冢祔葬而婢尚生始如瞑有頃漸覺問之自謂再宿耳初婢之埋年十五六及開冢更生猶十五六也嫁之有子光熙元年會稽謝真生子頭大而有髮兩跖反向上有男女兩體生便作丈夫聲經一日死此皇之不極下人伐上之痾於是諸王有僭亂之象也惠帝之世京洛有人兼男女體亦能兩用人道而性尤淫此亂氣所生自咸寧太康之後男寵大興甚於女色士大夫莫不尚之天下相倣效或至夫婦離絶多生怨曠故男女之氣亂而妖形作也懷帝永嘉元年吳郡吳縣萬詳婢生子鳥頭兩足馬蹄一手無毛尾黃色大如枕此亦人妖亂之象也五年五月枹罕令嚴根妓産一龍一女一鵝京房易傳曰人生他物非人所見者皆為天下大兵是時帝承惠皇之後四海沸騰尋而陷於平陽為逆胡所害此其徵也愍帝建興四年新蔡縣吏任僑妻産二女腹與心相合自胸以上臍以下各分此蓋天下未一之妖也時內史呂會上言案瑞應圖異根同體謂之連理異畝同穎謂之嘉禾草木之異猶以為瑞今二人同心易稱二人同心其利斷金蓋四海同心之瑞也時皆哂之俄而四海分崩帝亦淪沒元帝太興初有女子其陰在腹當臍下自中國來至江東其性淫而不産又有女子陰在首渡在揚州性亦淫京房易妖曰人生子陰在首天下大亂在腹天下有事在背天下無後于時王敦據上流將欲為亂是其徵三年十二月尚書騶謝平妻生女墮地濞濞有聲須臾便死鼻目皆在頂上面處如項口有齒都連為一胸如鱉手足爪如鳥爪皆下勾此亦人生他物非人所見者後二年有石頭之敗明帝太寧二年七月丹楊江寧侯紀妻死經三日復生成帝咸康五年四月下邳民王和僑居暨陽息女可年二十自云上天來還得徵瑞印綬當母天下晉陵太守以為妖收付獄至十一月有人持柘杖絳衣詣止車門口列為聖人使求見天子門候受辭辭稱姓呂名賜其言王和女可右足下有七星星皆有毛長七寸天今命可為天下母奏聞即伏誅并下晉陵誅可康帝建元二年十月衛將軍營督過望所領兵陳瀆女臺有文在其足曰天下之母灸之愈明京都喧譁有司收繫以聞俄自建康縣獄亡去明年帝崩獻后臨朝此其祥也孝武帝寧康初南郡州陵女唐氏漸化為丈夫安帝義熙七年無錫人趙未年八歲一旦暴長八尺髭鬚蔚然三日而死義熙中東陽人莫氏生女不養埋之數日於土中啼取養遂活義熙末豫章吳平人有二陽道重纍生恭帝元熙元年建安人陽道無頭正平本下作女人形體
