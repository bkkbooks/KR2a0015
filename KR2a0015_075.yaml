body:
  text: 晉書卷七十五列傳第四十五王湛子承承子述述子坦之禕之坦之子愷愈國寶忱愈子綏承族子嶠袁悅之祖台之王湛字處沖司徒渾之弟也少有識度身長七尺八寸龍顙大鼻少言語初有隱德人莫能知兄弟宗族皆以為癡其父昶獨異焉遭父喪居於墓次服闋闔門守靜不交當世沖素簡淡器量隤然有公輔之望兄子濟輕之所食方丈盈前不以及湛湛命取菜蔬對而食之濟嘗詣湛見牀頭有周易問曰叔父何用此為湛曰體中不佳時脫復看耳濟請言之湛因剖析玄理微妙有奇趣皆濟所未聞也濟才氣抗邁於湛略無子姪之敬既聞其言不覺栗然心形俱肅遂留連彌日纍夜自視缺然乃歎曰家有名士三十年而不知濟之罪也既而辭去湛送至門濟有從馬絶難乘濟問湛曰叔頗好騎不湛曰亦好之因騎此馬姿容既妙回策如縈善騎者無以過之又濟所乘馬甚愛之湛曰此馬雖快然力薄不堪苦行近見督郵馬當勝但芻秣不至耳濟試養之而與己馬等湛又曰此馬任重方知之平路無以別也於是當蟻封內試之濟馬果躓而督郵馬如常濟益歎異還白其父曰濟始得一叔乃濟以上人也武帝亦以湛為癡每見濟輒調之曰卿家癡叔死未濟常無以答及是帝又問如初濟曰臣叔殊不癡因稱其美帝曰誰比濟曰山濤以下魏舒以上時人謂湛上方山濤不足下比魏舒有餘湛聞曰欲處我於季孟之間乎湛少仕歷秦王文學太子洗馬尚書郎太子中庶子出為汝南內史元康五年卒年四十七子承嗣承字安期清虛寡欲無所修尚言理辨物但明其指要而不飾文辭有識者服其約而能通弱冠知名太尉王衍雅貴異之比南陽樂廣焉永寧初為驃騎參軍值天下將亂乃避難南下遷司空從事中郎豫迎大駕賜爵藍田縣侯遷尚書郎不就東海王越鎮許以為記室參軍雅相知重敕其子毗曰夫學之所益者淺體之所安者深間習禮度不如式瞻儀形諷味遺言不若親承音旨王參軍人倫之表汝其師之在府數年見朝政漸替辭以母老求出越不許久之遷東海太守政尚清淨不為細察小吏有盜池中魚者綱紀推之承曰文王之囿與衆共之池魚復何足惜耶有犯夜者為吏所拘承問其故答曰從師受書不覺日暮承曰鞭撻寧越以立威名非政化之本使吏送令歸家其從容寬恕若此尋去官東渡江是時道路梗澀人懷危懼承每遇艱險處之夷然雖家人近習不見其憂喜之色既至下邳登山北望歎曰人言愁我始欲愁矣及至建鄴為元帝鎮東府從事中郎甚見優禮承少有重譽而推誠接物盡弘恕之理故衆咸親愛焉渡江名臣王導衛玠周顗庾亮之徒皆出其下為中興第一年四十六卒朝野痛惜之自昶至承世有高名論者以為祖不及孫孫不及父子述嗣述字懷祖少孤事母以孝聞安貧守約不求聞達性沈靜每坐客馳辨異端競起而述處之恬如也少襲父爵年三十尚未知名人或謂之癡司徒王導以門地辟為中兵屬既見無他言惟問以江東米價述但張目不答導曰王掾不癡人何言癡也嘗見導每發言一坐莫不贊美述正色曰人非堯舜何得每事盡善導改容謝之謂庾亮曰懷祖清貞簡貴不減祖父但曠淡微不及耳康帝為驃騎將軍召補功曹出為宛陵令太尉司空頻辟又除尚書吏部郎並不行歷庾冰征虜長史時庾翼鎮武昌以纍有妖怪又猛獸入府欲移鎮避之述與冰箋曰竊聞安西欲移鎮樂鄉不審此為算邪將為情邪若謂為算則彼去武昌千有餘里數萬之衆造創移徙方當興立城壁公私勞擾若信要害之地所宜進據猶當計移徙之煩權二者輕重況此非今日之要邪方今強胡陸梁當力養鋭而無故遷動自取非算又江州當泝流數千供繼軍府力役增倍疲曳道路且武昌實是江東鎮戍之中非但扞禦上流而已急緩赴告駿奔不難若移樂鄉遠在西陲一朝江渚有虞不相接救方嶽取重將故當居要害之地為內外形勢使窺之心不知所向若是情邪則天道玄遠鬼神難言妖祥吉凶誰知其故是以達人君子直道而行不以情失昔秦忌亡胡之讖卒為劉項之資周惡檿弧之謠而成褒姒之亂此既然矣歷觀古今鑒其遺事妖異速禍敗者蓋不少矣禳避之道苟非所審且當擇人事之勝理思社稷之長計斯則天下幸甚令名可保矣若安西盛意已耳不能安於武昌但得近移夏口則其次也樂鄉之舉咸謂不可願將軍體國為家固審此舉時朝議亦不允翼遂不移鎮述出補臨海太守遷建威將軍會稽內史蒞政清肅終日無事母憂去職服闋代殷浩為揚州刺史加征虜將軍初至主簿請諱報曰亡祖先君名播海內遠近所知內諱不出門餘無所諱尋加中書監固讓經年不拜復加征虜將軍進都督揚州徐州之琅邪諸軍事衛將軍并冀幽平四州大中正刺史如故尋遷散騎常侍尚書令將軍如故述每受職不為虛讓其有所辭必於不受至是子坦之諫以為故事應讓述曰汝謂我不堪邪坦之曰非也但克讓自美事耳述曰既云堪何為復讓人言汝勝我定不及也坦之為桓溫長史溫欲為子求婚於坦之及還家省父而述愛坦之雖長大猶抱置膝上坦之因言溫意述大怒遽排下曰汝竟癡邪詎可畏溫面而以女妻兵也坦之乃辭以他故溫曰此尊君不肯耳遂止簡文帝每言述才既不長直以真率便敵人耳謝安亦歎美之初述家貧求試宛陵令頗受贈遺而修家具為州司所檢有一千三百條王導使謂之曰名父之子不患無祿屈臨小縣甚不宜耳述答曰足自當止時人未之達也比後屢居州郡清潔絶倫祿賜皆散之親故宅宇舊物不革於昔始為當時所歎但性急為纍嘗食雞子以筯刺之不得便大怒擲地雞子圓轉不止便下牀以屐齒踏之又不得瞋甚掇內口中齧破而吐之既躋重位每以柔克為用謝奕性粗嘗忿述極言罵之述無所應面壁而已居半日奕去始復坐人以此稱之太和二年以年迫懸車上疏乞骸骨曰臣曾祖父魏司空昶白箋於文皇帝曰昔與南陽宗世林共為東宮官屬世林少得好名州里瞻敬及其年老汲汲自勵恐見廢棄時人咸共笑之若天假其壽致仕之年不為此公婆娑之事情旨慷慨深所鄙薄雖是箋書乃實訓誡臣忝端右而以疾患禮敬廢替猶謂可有差理日復一日而年衰疾痼永無復瞻華幄之期乞奉先誡歸老丘園不許述竟不起三年卒時年六十六初桓溫平洛陽議欲遷都朝廷憂懼將遣侍中止之述曰溫欲以虛聲威朝廷非事實也但從之自無所至事果不行又議欲移洛陽鍾虡述曰永嘉不競暫都江左方當蕩平區宇旋軫舊京若其不耳宜改遷園陵不應先事鍾虡溫竟無以奪之追贈侍中驃騎將軍開府諡曰穆以避穆帝改曰簡子坦之嗣坦之字文度弱冠與郗超俱有重名時人為之語曰盛德絶倫郗嘉賓江東獨步王文度嘉賓超小字也僕射江虨領選將擬為尚書郎坦之聞曰自過江來尚書郎正用第二人何得以此見擬虨遂止簡文帝為撫軍將軍辟為掾纍遷參軍從事中郎仍為司馬加散騎常侍出為大司馬桓溫長史尋以父憂去職服闋徵拜侍中襲父爵時卒士韓悵逃亡歸首云失牛故叛有司劾悵偷牛考掠服罪坦之以為悵束身自歸而法外加罪懈怠失牛事或可恕加之木石理有自誣宜附罪疑從輕之例遂以見原海西公廢領左衛將軍坦之有風格尤非時俗放蕩不敦儒教頗尚刑名學著廢莊論曰荀卿稱莊子蔽於天而不知人楊雄亦曰莊周放蕩而不法何晏云鬻莊軀放玄虛而不周乎時變三賢之言遠有當乎夫獨構之唱唱虛而莫和無感之作義偏而用寡動人由於兼忘應物在乎無心孔父非不體遠以體遠故用近顏子豈不具德以德備故膺教胡為其然哉不獲已而然也夫自足者寡故理懸於羲農徇教者衆故義申於三代道心惟微人心惟危吹萬不同孰知正是雖首陽之情三黜之智摩頂之甘落毛之愛枯稿之生負石之死格諸中庸未入乎道而況下斯者乎先王知人情之難肆懼違行以致訟悼司徹之貽悔審褫帶之所緣故陶鑄羣生謀之未兆每攝其契而為節焉使夫敦禮以崇化日用以成俗誠存而邪忘利損而競息成功遂事百姓皆曰我自然蓋善暗者無怪故所遇而無滯執道以離俗孰踰於不達語道而失其為者非其道也辨德而有其位者非其德也言默所未究況揚之以為風乎且即濠以尋魚想彼之我同推顯以求隱理得而情昧若夫莊生者望大庭而撫契仰彌高於不足寄積想於三篇恨我懷之未盡其言詭譎其義恢誕君子內應從我遊方之外衆人因藉之以為弊薄之資然則天下之善人少不善人多莊子之利天下也少害天下也多故曰魯酒薄而邯鄲圍莊生作而風俗穨禮與浮雲俱征偽與利蕩並肆人以克己為恥士以無措為通時無履德之譽俗有蹈義之愆驟語賞罰不可以造次屢稱無為不可與適變雖可用於天下不足以用天下人昔漢陰丈人修渾沌之術孔子以為識其一不識其二莊生之道無乃類乎與夫如愚之契何殊間哉若夫利而不害天之道也為而不爭聖之德也羣方所資而莫知誰氏在儒而非儒非道而有道彌貫九流玄同彼我萬物用之而不既亹亹日新而不朽昔吾孔老固已言之矣又領本州大中正簡文帝臨崩詔大司馬溫依周公居攝故事坦之自持詔入於帝前毀之帝曰天下儻來之運卿何所嫌坦之曰天下宣元之天下陛下何得專之帝乃使坦之改詔焉溫薨坦之與謝安共輔幼主遷中書令領丹楊尹俄授都督徐兗青三州諸軍事北中郎將徐兗二州刺史鎮廣陵將之鎮上表曰臣聞人君之道以孝敬為本臨御四海以委任為貴恭順無為則盛德日新親杖賢能則政道雍睦昔周成漢昭並以幼年纂承大統當時天下未為無難終能顯揚祖考保安社稷蓋尊尊親親信納大臣之所致也伏維陛下誕奇秀之姿稟生知之量春秋尚富涉道未廣方須訓導以成天德皇太后仁淑之體過於三母先帝奉事積年每稱聖明臣願奉事之心便當自同孝宗太后慈愛之隆亦不必異所生琅邪王餘姚主及諸皇女宜朝夕定省承受教誨導習儀刑以成景仰恭敬之美不可以屬非至親自為疏疑昔肅祖崩殂成康幼沖事無大小必咨丞相導所以克就聖德實此之由今僕射臣安中軍臣沖人望具瞻社稷之臣且受遇先帝綢繆繾綣並志竭忠貞盡心盡力歸誠陛下以報先帝愚謂周旋舉動皆應咨此二臣二臣之於陛下則周之旦奭漢之霍光顯宗之於王導沖雖在外路不云遠事容信宿必宜參詳然後情聽獲盡庶事可畢又天聽雖聰不啓不廣羣情雖忠不引不盡宜數引侍臣詢求讜言平易之世有道之主猶尚誡懼日昃不倦況今艱難理盡慮經安危祖宗之基繫之陛下不可不精心務道以申先帝堯舜之風可不敬修至德以保宣元天地之祚表奏帝納之初謝安愛好聲律期功之慘不廢妓樂頗以成俗坦之非而苦諫之安遺坦之書曰知君思相愛惜之至僕所求者聲謂稱情義無所不可為聊復以自娛耳若潔軌迹崇世教非所擬議亦非所屑常謂君粗得鄙趣者猶未悟之濠上邪故知莫逆未易為人坦之答曰具君雅旨此是誠心而行獨往之美然恐非大雅中庸之謂意者以為人之體韻猶器之方圓方圓不可錯用體韻豈可易處各順其方以弘其業則歲寒之功必有成矣吾子少立德行體議淹允加以令地優遊自居僉曰之談咸以清遠相許至於此事實有疑焉公私二三莫見其可以此為濠上悟之者得無鮮乎且天下之寶故為天下所惜天下之所非何為不可以天下為心乎想君幸復三思書往反數四安竟不從坦之又嘗與殷康子書論公謙之義曰夫天道以無私成名二儀以至公立德立德存乎至公故無親而非理成名在乎無私故在當而忘我此天地所以成功聖人所以濟化由斯論之公道體於自然故理泰而愈降謙義生於不足故時弊而義著故大禹咎繇稱功言惠而成名於彼孟反范燮殿軍後入而全身於此從此觀之則謙公之義固以殊矣夫物之所美己不可收人之所貴我不可取誠患人惡其上衆不可蓋故君子居之而每加損焉隆名在於矯伐而不在於期當匿迹在於違顯而不在於求是於是謙光之義與矜競而俱生卑挹之義與夸伐而並進由親譽生於不足未若不知之有餘良藥效於瘳疾未若無病之為貴也夫乾道確然示人易矣坤道隤然示人簡矣二象顯於萬物兩德彰於羣生豈矯枉過直而失其所哉由此觀之則大通之道公坦於天地謙伐之義險巇於人事今存公而廢謙則自伐者託至公以生嫌自美者因存黨以致惑此王生所謂同貌而實異不可不察者也然理必有源教亦有主苟探其根則玄指自顯若尋其末弊無不至豈可以嫌似而疑至公弊貪而忘於諒哉康子及袁宏並有疑難坦之標章擲句一一申而釋之莫不厭服又孔嚴著通葛論坦之與書贊美之其忠公慷慨標明賢勝皆此類也初坦之與沙門竺法師甚厚每共論幽明報應便要先死者當報其事後經年師忽來云貧道已死罪福皆不虛惟當勤修道德以升濟神明耳言訖不見坦之尋亦卒時年四十六臨終與謝安桓沖書言不及私惟憂國家之事朝野甚痛惜之追贈安北將軍諡曰獻禕之字文邵少知名尚尋陽公主歷中書侍郎年未三十而卒贈散騎常侍坦之四子愷愈國寶忱愷字茂仁愈字茂和並少踐清階愷襲父爵愈稍遷驃騎司馬加輔國將軍愷太元末為侍中領右衛將軍多所獻替兄弟貴盛當時莫比及王恭等討國寶愷愈並請解職以與國寶異生又素不協故得免禍國寶既死出愷為吳郡內史愈為江州刺史都督豫州四郡輔國將軍假節未幾徵愷為丹楊尹及桓玄等至江寧愷領兵守石頭俄而玄等走復為吳郡病卒追贈太常愈至鎮未幾殷仲堪桓玄楊佺期舉兵應王恭乘流奄至愈既無備惶遽奔臨川為玄所得玄盟于尋陽以愈置壇所愈甚恥之及事解除會稽內史玄篡位以為尚書僕射劉裕義旗建加前將軍愈既桓氏壻父子寵貴又嘗輕侮劉裕心不自安潛結司州刺史溫詳謀作亂事泄被誅子孫十餘人皆伏法國寶少無士操不修廉隅婦父謝安惡其傾側每抑而不用除尚書郎國寶以中興膏腴之族惟作吏部不為餘曹郎甚怨望固辭不拜從妹為會稽王道子妃由是與道子遊處遂間毀安焉及道子輔政以為祕書丞俄遷琅邪內史領堂邑太守加輔國將軍入補侍中遷中書令中領軍與道子持威權扇動內外中書郎范寧國寶舅也儒雅方直疾其阿諛勸孝武帝黜之國寶乃使陳郡袁悅之因尼支妙音致書與太子母陳淑媛説國寶忠謹宜見親信帝知之託以他罪殺悅之國寶大懼遂因道子譖毀寧寧由是出為豫章太守及弟忱卒國寶自表求解職迎母并奔忱喪詔特賜假而盤桓不時進發為御史中丞褚粲所奏國寶懼罪衣女子衣託為王家婢詣道子告其事道子言之於帝故得原後驃騎參軍王徽請國寶同宴國寶素驕貴使酒怒尚書左丞祖台之攘袂大呼以盤盞樂器擲台之台之不敢言復為粲所彈詔以國寶縱肆情性甚不可長台之懦弱非監司體並坐免官頃之復職愈驕蹇不遵法度起齋侔清暑殿帝惡其僭侈國寶懼遂諂媚於帝而頗疏道子道子大怒嘗於內省面責國寶以劍擲之舊好盡矣是時王雅亦有寵薦王珣於帝帝夜與國寶及雅宴帝微有酒令召珣將至國寶自知才出珣下恐至傾其寵因曰王珣當今名流不可以酒色見帝遂止而以國寶為忠將納國寶女為琅邪王妃未婚而帝崩安帝即位國寶復事道子進從祖弟緒為琅邪內史亦以佞邪見知道子復惑之倚為心腹並為時之所疾國寶遂參管朝權威震內外遷尚書左僕射領選加後將軍丹楊尹道子悉以東宮兵配之時王恭與殷仲堪並以才器各居名藩恭惡道子國寶亂政屢有憂國之言道子等亦深忌憚之將謀去其兵未及行而恭檄至以討國寶為名國寶惶遽不知所為緒説國寶令矯道子命召王珣車胤殺之以除羣望因挾主相以討諸侯國寶許之珣胤既至而不敢害反問計於珣珣勸國寶放兵權以迎恭國寶信之語在珣傳又問計於胤胤曰南北同舉而荊州未至若朝廷遣軍恭必城守昔桓公圍壽陽彌時乃克若京城未拔而上流奄至君將何以待之國寶尤懼遂上疏解職詣闕待罪既而悔之詐稱詔復其本官欲收其兵距王恭道子既不能距諸侯欲委罪國寶乃遣譙王尚之收國寶付廷尉賜死并斬緒於市以謝王恭國寶貪縱聚斂不知紀極後房伎妾以百數天下珍玩充滿其室及王恭伏法詔追復國寶本官元興初桓玄得志表徙其家屬於交州忱字元達弱冠知名與王恭王珣俱流譽一時歷位驃騎長史嘗造其舅范寧與張玄相遇寧使與玄語玄正坐斂袵待其有發忱竟不與言玄失望便去寧讓忱曰張玄吳中之秀何不與語忱笑曰張祖希欲相識自可見詣寧謂曰卿風流雋望真後來之秀忱曰不有此舅焉有此甥既而寧使報玄玄束帶造之始為賓主太元中出為荊州刺史都督荊益寧三州軍事建武將軍假節忱自恃才氣放酒誕節慕王澄之為人又年少居方伯之任談者憂之及鎮荊州威風肅然殊得物和桓玄時在江陵既其本國且奕葉故義常以才雄駕物忱每裁抑之玄嘗詣忱通人未出乘輿直進忱對玄鞭門幹玄怒去之忱亦不留嘗朔日見客仗衛甚盛玄言欲獵借數百人忱悉給之玄憚而服焉性任達不拘末年尤嗜酒一飲連月不醒或裸體而遊每歎三日不飲便覺形神不相親婦父嘗有慘忱乘醉弔之婦父慟哭忱與賓客十許人連臂被髮裸身而入繞之三匝而出其所行多此類數年卒官追贈右將軍諡曰穆綏字彥猷少有美稱厚自矜邁實鄙而無行愈為殷桓所捕綏未測存亡在都有憂色居處飲食每事貶降時人每謂為試守孝子桓玄之為太尉綏以桓氏甥甚見寵待為太尉右長史及玄篡遷中書令劉裕建義以為冠軍將軍其家夜中梁上無故有人頭墮於牀而流血滂俄拜荊州刺史假節坐父愈之謀與弟納並被誅初綏與王謐桓胤齊名為後進之秀謐位官既極保身而終胤以從坐誅聲稱猶全綏身死名論殆盡亦以薄行矜峭而尚人故也自昶父漢雁門太守澤已有名稱忱又秀出綏亦著稱八葉繼軌軒冕莫與為比焉嶠字開山祖默魏尚書父佑以才智稱為楊駿腹心駿之排汝南王亮退衛瓘皆佑之謀也位至北軍中候嶠少有風尚并司二州交辟不就永嘉末攜其二弟避亂渡江時元帝鎮建鄴教曰王佑三息始至名德之胄並有操行宜蒙飾且可給錢三十萬帛三百匹米五十斛親兵二十人尋以嶠參世子東中郎軍事不就愍帝徵拜著作郎右丞相南陽王保辟皆以道險不行元帝作相以為水曹屬除長山令遷太子中舍人以疾不拜王敦請為參軍爵九原縣公敦在石頭欲禁私伐蔡洲荻以問羣下時王師新敗士庶震懼莫敢異議嶠獨曰中原有菽庶人採之百姓不足君孰與足若禁人樵伐未知其可敦不悅敦將殺周顗戴若思嶠於坐諫曰濟濟多士文王以寧安可戮諸名士以自全生敦大怒欲斬嶠賴謝鯤以免敦猶銜之出為領軍長史敦平後除中書侍郎兼大著作固辭轉越騎校尉頻遷吏部郎御史中丞祕書監領本州大中正咸和初朝議欲以嶠為丹楊尹嶠以京尹望重不宜以疾居之求補廬陵郡乃拜嶠廬陵太守以嶠家貧無以上道賜布百匹錢十萬尋卒官諡曰穆子淡嗣歷位右衛將軍侍中中護軍尚書廣州刺史淡子度世驍騎將軍袁悅之字元禮陳郡陽夏人也父朗給事中悅之能長短説甚有精理始為謝玄參軍為玄所遇丁憂去職服闋還都止齎戰國策言天下要惟此書後甚為會稽王道子所親愛每勸道子專覽朝權道子頗納其説俄而見誅祖台之字元辰范陽人也官至侍中光祿大夫撰志怪書行於世荀嵩子蕤羡荀嵩字景猷潁川臨潁人魏太尉彧之玄孫也父頵羽林右監安陵鄉侯與王濟何劭為拜親之友嵩志操清純雅好文學齠齔時族曾祖顗見而奇之以為必興頵門弱冠太原王濟甚相器重以方其外祖陳郡袁侃謂侃弟奧曰近見荀監子清虛名理當不及父德性純粹是賢兄輩人也其為名流所賞如此泰始中詔以嵩代兄襲父爵補濮陽王允文學與王敦顧榮陸機等友善趙王倫引為相國參軍倫篡轉護軍司馬給事中稍遷尚書吏部郎太弟中庶子纍遷侍中中護軍王彌入洛嵩與百官奔于密未至而母亡賊追將及同旅散走嵩被髮從車守喪號泣賊至棄其母尸於地奪車而去嵩被四創氣絶至夜方蘇葬母於密山服闋族父藩承制以嵩監江北軍事南中郎將後將軍假節襄城太守時山陵發掘嵩遣主簿石覽將兵入洛修復山陵以勳進爵舞陽縣公遷都督荊州江北諸軍事平南將軍鎮宛改封曲陵公為賊杜曾所圍石覽時為襄城太守嵩力弱食盡使其小女灌求救於覽及南中郎將周訪訪即遣子撫率兵三千人會石覽俱救嵩賊聞兵至散走嵩既得免乃遣南陽中部尉王國劉願等潛軍襲穰縣獲曾從兄偽新野太守保斬之元帝踐阼徵拜尚書僕射使嵩與刁協共定中興禮儀從弟馗早亡二息序廞年各數歲嵩迎與共居恩同其子太尉臨淮公荀顗國胤廢絶朝廷以嵩屬近欲以嵩子襲封嵩哀序孤微乃讓封與序論者稱焉轉太常時方修學校簡省博士置周易王氏尚書鄭氏古文尚書孔氏毛詩鄭氏周官禮記鄭氏春秋左傳杜氏服氏論語孝經鄭氏博士各一人凡九人其儀禮公羊穀梁及鄭易皆省不置嵩以為不可乃上疏曰自喪亂以來儒學尤寡今處學則闕朝廷之秀仕朝則廢儒學之俊昔咸寧太康永嘉之中侍中常侍黃門通洽古今行為世表者領國子博士一則應對殿堂奉酬顧問二則參訓國子以弘儒訓三則祠儀二曹及太常之職以得質疑今皇朝中興美隆往初宜憲章令軌祖述前典世祖武皇帝應運登禪崇儒興學經始明堂營建辟雍告朔班政鄉飲大射西閣東序河圖祕書禁籍臺省有宗廟太府金墉故事太學有石經古文先儒典訓賈馬鄭杜服孔王何顏尹之徒章句傳注衆家之學置博士十九人九州之中師徒相傳學士如林猶選張華劉實居太常之官以重儒教傳稱孔子沒而微言絶七十二子終而大義乖自頃中夏殄瘁講誦遏密斯文之道將墮於地陛下聖哲龍飛恢崇道教樂正雅頌於是乎在江揚二州先漸聲教學士遺文於今為盛然方疇昔猶千之一臣學不章句才不弘通方之華實儒風殊邈思竭駑駘庶增萬分願斯道隆於百世之上搢紳詠於千載之下伏聞節省之制皆三分置二博士舊置十九人今五經合九人準古計今猶未能半宜及節省之制以時施行今九人以外猶宜增四願陛下萬機餘暇時垂省覽宜為鄭易置博士一人鄭儀禮博士一人春秋公羊博士一人穀梁博士一人昔周之衰下陵上替上無天子下無方伯善者誰賞惡者誰罰孔子懼而作春秋諸侯諱妬懼犯時禁是以微辭妙旨義不顯明故曰知我者其惟春秋罪我者其惟春秋時左丘明子夏造膝親受無不精究孔子既沒微言將絶於是丘明退撰所聞而為之傳其書善禮多膏腴美辭張本繼末以發明經意信多奇偉學者好之稱公羊高親受子夏立於漢朝辭義清雋斷決明審董仲舒之所善也穀梁赤師徒相傳暫立於漢世向歆漢之碩儒猶父子各執一家莫肯相從其書文清義約諸所發明或是左氏公羊所不載亦足有所訂正是以三傳並行於先代通才未能孤廢今去聖久遠其文將墮與其過廢寧與過立臣以為三傳雖同曰春秋而發端異趣案如三家異同之説此乃義則戰爭之場辭亦劍戟之鋒於理不可得共博士宜各置一人以博其學元帝詔曰嵩表如此皆經國之務為政所由息馬投戈猶可講藝今雖日不暇給豈忘本而遺存邪可共博議者詳之議者多請從嵩所奏詔曰穀梁膚淺不足置博士餘如奏會王敦之難不行敦表以嵩為尚書左僕射及帝崩羣臣議廟號王敦遣使謂曰豺狼當路梓宮未反祖宗之號宜別思詳嵩議以為禮祖有功宗有德元皇帝天縱聖哲光啓中興德澤侔於太戊功惠邁於漢宣臣敢依前典上號曰中宗既而與敦書曰承以長蛇未翦別詳祖宗先帝應天受命以隆中興中興之主寧可隨世數而遷毀敢率丹直詢之朝野上號中宗卜日有期不及重請專輒之愆所不敢辭初敦待嵩甚厚欲以為司空於此銜之而止太寧初加散騎常侍後領太子太傅以平王敦功更封平樂伯坐使威儀為猛獸所食免職後拜金紫光祿大夫録尚書事散騎常侍如故遷右光祿大夫開府儀同三司録尚書如故又領祕書監給親兵百二十人年雖衰老而孜孜典籍世以此嘉之蘇峻之役嵩與王導陸曄共登御牀擁衛帝及帝被逼幸石頭嵩亦侍從不離帝側賊平帝幸溫嶠舟嵩時年老病篤猶力步而從咸和三年薨時年六十七贈侍中諡曰敬其後著作郎虞預與丞相王導箋曰伏見前祕書光祿大夫荀公生於積德之族少有儒雅之稱歷位內外在貴能降蘇峻肆虐乘輿失幸公處嫌忌之地有纍卵之危朝士為之寒心論者謂之不免而公將之以智險而不懾扶侍至尊繾綣不離雖無扶迎之勳宜蒙守節之報且其宣慈之美早彰遠近朝野之望許以台司雖未正位已加儀同至守終純固名定闔棺而薨卒之日直加侍中生有三槐之望沒無鼎足之名寵不增於前秩榮不副於本望此一時愚智所慷慨也今承大弊之後淳風穨散苟有一介之善宜在旌表之例而況國之元老志節若斯者乎不從升平四年嵩改葬詔賜錢百萬布五千匹有二子蕤羡蕤嗣蕤字令遠起家祕書郎稍遷尚書左丞蕤有儀操風望雅為簡文帝所重時桓溫平蜀朝廷欲以豫章郡封溫蕤言於帝曰若溫復假王威北平河洛修復園陵將何以加此於是乃止轉散騎常侍少府不拜出補東陽太守除建威將軍吳國內史卒官子籍嗣位至散騎常侍大長秋羡字令則清和有準才年七歲遇蘇峻難隨父在石頭峻甚愛之置膝上羡陰白其母曰得一利刀子足以殺賊母掩其口曰無妄言年十五將尚尋陽公主羡不欲連婚帝室仍遠遁去監司追不獲已乃出尚公主拜駙馬都尉弱冠與琅邪王洽齊名沛國劉惔太原王濛陳郡殷浩並與交好驃騎將軍何充出鎮京口請為參軍穆帝又以為撫軍參軍徵補太常博士皆不就後拜祕書丞義興太守征北將軍褚裒以為長史既到裒謂佐吏曰荀生資逸羣之氣將有沖天之舉諸君宜善事之尋遷建威將軍吳國內史除北中郎將徐州刺史監徐兗二州揚州之晉陵諸軍事假節殷浩以羡在事有能名故居以重任時年二十八中興方伯未有如羡之少者羡至鎮發二州兵使參軍鄭襲戍淮陰羡尋北鎮淮陰屯田於東陽之石鱉尋加監青州諸軍事又領兗州刺史鎮下邳羡自鎮來朝時蔡謨固讓司徒不起中軍將軍殷浩欲加大辟以問於羡羡曰蔡公今日事危明日必有桓文之舉浩乃止及慕容俊攻段蘭於青州詔使羡救之俊將王騰趙盤寇琅邪鄄城北境騷動羡討之擒騰盤迸走軍次琅邪而蘭已沒羡退還下邳留將軍諸葛攸高平太守劉莊等三千人守琅邪參軍戴丄卜蕭二千人守泰山是時慕容蘭以數萬衆屯汴城甚為邊害羡自光水引汶通渠至于東阿以征之臨陳斬蘭帝將封之羡固辭不受先是石季龍死胡中大亂羡撫納降附甚得衆心以疾篤解職後除右軍將軍加散騎常侍讓不拜升平二年卒時年三十八帝聞之歎曰荀令則王敬和相繼凋落股肱腹心將復誰寄乎追贈驃騎將軍范汪子寧汪叔堅范汪字玄平雍州刺史晷之孫也父稚蚤卒汪少孤貧六歲過江依外家新野庾氏荊州刺史王澄見而奇之曰興范族者必是子也年十三喪母居喪盡禮親鄰哀之及長好學外氏家貧無以資給汪乃廬於園中布衣蔬食然薪寫書寫畢誦讀亦遍遂博學多通善談名理弱冠至京師屬蘇峻作難王師敗績汪乃遁逃西歸庾亮溫嶠屯兵尋陽時行李斷絶莫知峻之虛實咸恐賊強未敢輕進及汪至嶠等訪之汪曰賊政令不一貪暴縱橫滅亡已兆雖強易弱朝廷有倒懸之急宜時進討嶠深納之是日護軍平南二府禮命交至始解褐參護軍事賊平賜爵都鄉侯復為庾亮平西參軍從討郭默進爵亭侯辟司空郗鑒掾除宛陵令復參亮征西軍事轉州別駕汪為亮佐吏十有餘年甚相欽待轉鷹揚將軍安遠護軍武陵內史徵拜中書侍郎時庾翼將悉郢漢之衆以事中原軍次安陸尋轉屯襄陽汪上疏曰臣伏思安西將軍翼今至襄陽倉卒攻討凡百草創安陸之調不復為襄陽之用而玄冬之月沔漢乾涸皆當魚貫而行排推而進設一處有急勢不相救臣所至慮一也又既至之後桓宣當出宣往實翦豺狼之林招攜二之衆待之以至寬御之以無法田疇墾闢生産始立而當移之必有嗷然悔吝難測臣所至慮二也襄陽頓益數萬口奉師之費皆當出於江南運漕之難船人之力不可不熟計臣之所至慮三也且申伯之尊而與邊將並驅又東軍不進殊為孤懸兵書云知彼知此百戰不殆知彼不知此一勝一負賊誠衰弊然得臣猶在我雖方隆今實未暇而連兵不解患難將起臣所至慮四也翼豈不知兵家所患常在於此顧以門戶事任憂責莫大晏然終年非心情所安是以抗表輒行畢命原野以翼宏規經略文武用命忽遇釁會大事便濟然國家之慮常以萬全非至安至審王者不舉臣謂宜嚴詔諭翼還鎮養鋭以為後圖若少合聖聽乞密出臣表與車騎臣冰等詳共集議尋而驃騎將軍何充輔政請為長史桓溫代翼為荊州復以汪為安西長史溫西征蜀委以留府蜀平進爵武興縣侯而溫頻請為長史江州刺史皆不就自請還京求為東陽太守溫甚恨焉在郡大興學校甚有惠政頃之召入頻遷中領軍本州大中正時簡文帝作相甚相親昵除都督徐兗青冀四州揚州之晉陵諸軍事安北將軍徐兗二州刺史假節既而桓溫北伐令汪率文武出梁國以失期免為庶人朝廷憚溫不敢執談者為之歎恨汪屏居吳郡從容講肆不言枉直後至姑孰見溫溫時方起屈滯以傾朝廷謂汪遠來詣己傾身引望謂袁宏曰范公來可作太常邪汪既至才坐溫謝其遠來意汪實來造溫恐以趨時致損乃曰亡兒瘞此故來視之溫殊失望而止時年六十五卒於家贈散騎常侍諡曰穆長子康嗣早卒康弟寧最知名寧字武子少篤學多所通覽簡文帝為相將辟之為桓溫所諷遂寢不行故終溫之世兄弟無在列位者時以浮虛相扇儒雅日替寧以為其源始於王弼何晏二人之罪深於桀紂乃著論曰或曰黃唐緬邈至道淪翳濠濮輟詠風流靡託爭奪兆於仁義是非成於儒墨平叔神懷超絶輔嗣妙思通微振千載之穨綱落周孔之塵網斯蓋軒冕之龍門濠梁之宗匠嘗聞夫子之論以為罪過桀紂何哉答曰子信有聖人之言乎夫聖人者德侔二儀道冠三才雖帝皇殊號質文異制而統天成務曠代齊趣王何蔑棄典文不遵禮度遊辭浮説波蕩後生飾華言以翳實騁繁文以惑世搢紳之徒翻然改轍洙泗之風緬焉將墜遂令仁義幽淪儒雅蒙塵禮壞樂崩中原傾覆古之所謂言偽而辨行僻而堅者其斯人之徒歟昔夫子斬少正於魯太公戮華士於齊豈非曠世而同誅乎桀紂暴虐正足以滅身覆國為後世鑒戒耳豈能回百姓之視聽哉王何叨海內之浮譽資膏粱之傲誕畫螭魅以為巧扇無檢以為俗鄭聲之亂樂利口之覆邦信矣哉吾固以為一世之禍輕歷代之罪重自喪之釁小迷衆之愆大也寧崇儒抑俗率皆如此溫薨之後始解褐為餘杭令在縣興學校養生徒潔己修禮志行之士莫不宗之期年之後風化大行自中興已來崇學敦教未有如寧者也在職六年遷臨淮太守封陽遂鄉侯頃之徵拜中書侍郎在職多所獻替有益政道時更營新廟博求辟雍明堂之制寧據經傳奏上皆有典證孝武帝雅好文學甚被親愛朝廷疑議輒咨訪之寧指斥朝士直言無諱王國寶寧之甥也以諂媚事會稽王道子懼為寧所不容乃相驅扇因被疏隔求補豫章太守帝曰豫章不宜太守何急以身試死邪寧不信卜占固請行臨發上疏曰臣聞道尚虛簡政貴平靜坦公亮於幽顯流子愛於百姓然後可以經夷險而不憂乘休否而常夷先王所以致太平如此而已今四境晏如烽燧不舉而倉庾虛耗帑藏空匱古者使人歲不過三日今之勞擾殆無三日休停至有殘刑翦髮要求復除生兒不復舉養魚衆寡不敢妻娶豈不怨結人鬼感傷和氣臣恐社稷之憂積薪不足以為喻臣久欲粗啓所懷日復一日今當永離左右不欲令心有餘恨請出臣啓事付外詳擇帝詔公卿牧守普議得失寧又陳時政曰古者分土割境以益百姓之心聖王作制籍無黃白之別昔中原喪亂流寓江左庶有旋反之期故許其挾注本郡自爾漸久人安其業丘壟墳柏皆已成行雖無本邦之名而有安土之實今宜正其封疆以土斷人戶明考課之科修閭伍之法難者必曰人各有桑梓俗自有南北一朝屬戶長為人隸君子則有土風之慨小人則懷下役之慮斯誠并兼者之所執而非通理者之篤論也古者失地之君猶臣所寓之主列國之臣亦有違適之禮隨會仕秦致稱春秋樂毅宦燕見褒良史且今普天之人原其氏出皆隨世遷移何至於今而獨不可凡荒郡之人星居東西遠者千餘近者數百而舉召役調皆相資須期會差違輒致嚴坐人不堪命叛為盜賊是以山湖日積刑獄愈滋今荒小郡縣皆宜并合不滿五千戶不得為郡不滿千戶不得為縣守宰之任宜得清平之人頃者選舉惟以恤貧為先雖制有六年而富足便退又郡守長吏牽置無常或兼臺職或帶府官夫府以統州州以監郡郡以蒞縣如令互相領帖則是下官反為上司賦調役使無復節限且牽曳百姓營起廨舍東西流遷人人易處文書簿籍少有存者先之室宇皆為私家後來新官復應修立其為弊也胡可勝言又方鎮去官皆割精兵器仗以為送故米布之屬不可稱計監司相容初無彈糾其中或有清白亦復不見甄異送兵多者至有千餘家少者數十戶既力入私門復資官廩布兵役既竭枉服良人牽引無端以相充補若是功勳之臣則已享裂土之祚豈應封外復置吏兵乎謂送故之格宜為節制以三年為斷夫人性無涯奢儉由勢今并兼之士亦多不贍非力不足以厚身非祿不足以富家是得之有由而用之無節蒱酒永日馳騖卒年一宴之饌費過十金麗服之美不可資算盛狗馬之飾營鄭衛之音南畝廢而不墾講誦闕而無聞凡庸競馳傲誕成俗謂宜驗其鄉黨考其業尚試其能否然後升進如此匪惟家給人足賢人豈不繼踵而至哉官制謫兵不相襲代頃者小事便以補役一愆之違辱及纍世親戚傍支罹其禍毒戶口減耗亦由於此皆宜料遣以全國信禮十九為長殤以其未成人也十五為中殤以為尚童幼也今以十六為全丁則備成人之役矣以十三為半丁所任非復童幼之事矣豈可傷天理違經典困苦萬姓乃至此乎今宜修禮文以二十為全丁十六至十九為半丁則人無夭折生長滋繁矣帝善之初寧之出非帝本意故所啓多合旨寧在郡又大設庠序遣人往交州採磬石以供學用改革舊制不拘常憲遠近至者千餘人資給衆費一出私祿并取郡四姓子弟皆充學生課讀五經又起學臺功用彌廣江州刺史王凝之上言曰豫章郡居此州之半太守臣寧入參機省出宰名郡而肆其奢濁所為狼籍郡城先有六門寧悉改作重樓復更開二門合前為八私立下舍七所臣伏尋宗廟之設各有品秩而寧自置家廟又下十五縣皆使左宗廟右社稷準之太廟皆資人力又奪人居宅工夫萬計寧若以古制宜崇自當列上而敢專輒惟在任心州既聞知即符從事制不復聽而寧嚴威屬縣惟令速立願出臣表下太常議之禮典詔曰漢宣云可與共治天下者良二千石也若范寧果如凝之所表者豈可復宰郡乎以此抵罪子泰時為天門太守棄官稱訴帝以寧所務惟學事久不判會赦免初寧嘗患目痛就中書侍郎張湛求方湛因嘲之曰古方宋陽里子少得其術以授魯東門伯魯東門伯以授左丘明遂世世相傳及漢杜子夏鄭康成魏高堂隆晉左太沖凡此諸賢並有目疾得此方云用損讀書一減思慮二專內視三簡外觀四旦晚起五夜早眠六凡六物熬以神火下以氣篩蘊於胸中七日然後納諸方寸修之一時近能數其目睫遠視尺捶之餘長服不已洞見牆壁之外非但明目乃亦延年既免官家於丹楊猶勤經學終年不輟年六十三卒于家初寧以春秋穀梁氏未有善釋遂沈思積年為之集解其義精審為世所重既而徐邈復為之注世亦稱之子泰元熙中為護軍將軍堅字子常博學善屬文永嘉中避亂江東拜佐著作郎撫軍參軍討蘇峻賜爵都亭侯纍遷尚書右丞時廷尉奏殿中帳吏邵廣盜官幔三張合布三十匹有司正刑棄市廣二子宗年十三雲年十一黃幡撾登聞鼓乞恩辭求自沒為奚官奴以贖父命尚書郎朱映議以為天下之人父無子者少一事遂行便成永制懼死罪之刑於此而弛堅亦同映議時議者以廣為鉗徒二兒沒入既足以懲又使百姓知父子之道聖朝有垂恩之仁可特聽減廣死罪為五歲刑宗等付奚官為奴而不為永制堅駁之曰自淳朴澆散刑辟仍作刑之所以止刑殺之所以止殺雖時有赦過宥罪議獄緩死未有行小不忍而輕易典刑者也且既許宗等宥廣以死若復有宗比而不求贖父者豈得不擯絶人倫同之禽獸邪案主者今奏云惟特聽宗等而不為永制臣以為王者之作動關盛衰嚬笑之間尚慎所加況於國典可以徒虧今之所以宥廣正以宗等耳人之愛父誰不如宗今既居然許宗之請將來訴者何獨匪民特聽之意未見其益不以為例交興怨讟此為施一恩於今而開萬怨於後也成帝從之正廣死刑後遷護軍長史卒官子啓字榮期雖經學不及堅而以才義顯於當世於時清談之士庾和韓伯袁宏等並相知友為祕書郎纍居顯職終於黃門侍郎父子並有文筆傳於世劉惔劉惔字真長沛國相人也祖宏字終嘏光祿勳宏兄粹字純嘏侍中宏弟潢字沖嘏吏部尚書並有名中朝時人語曰洛中雅雅有三嘏父耽晉陵太守亦知名惔少清遠有標奇與母任氏寓居京口家貧織芒屩以為養雖蓽門陋巷晏如也人未之識惟王導深器之後稍知名論者比之袁羊惔喜還告其母其母聰明婦人也謂之曰此非汝比勿受之又有方之范汪者惔復喜母又不聽及惔年德轉升論者遂比之荀粲尚明帝女廬陵公主以惔雅善言理簡文帝初作相與王濛並為談客俱蒙上賓禮時孫盛作易象妙於見形論帝使殷浩難之不能屈帝曰使真長來故應有以制之乃命迎惔盛素敬服惔及至便與抗答辭甚簡至盛理遂屈一坐撫掌大笑咸稱美之纍遷丹楊尹為政清整門無雜賓時百姓頗有訟官長者諸郡往往有相舉正惔歎曰夫居下訕上此弊道也古之善政司契而已豈不以其敦本正源鎮靜流末乎君雖不君下安可以失禮若此風不革百姓將往而不反遂寢而不問性簡貴與王羲之雅相友善郗愔有傖奴善知文章羲之愛之每稱奴於惔惔曰何如方回邪羲之曰小人耳何比郗公惔曰若不如方回故常奴耳桓溫嘗問惔會稽王談更進邪惔曰極進然故第二流耳溫曰第一復誰惔曰故在我輩其高自標置如此惔每奇溫才而知其有不臣之迹及溫為荊州惔言於帝曰溫不可使居形勝地其位號常宜抑之勸帝自鎮上流而己為軍司帝不納又請自行復不聽及溫伐蜀時咸謂未易可制惟惔以為必克或問其故云以蒱博驗之其不必得則不為也恐溫終專制朝廷及後竟如其言嘗薦吳郡張憑憑卒為美士衆以此服其知人尤好老莊任自然趣疾篤百姓欲為之祈禱家人又請祭神惔曰丘之禱久矣年三十六卒官孫綽為之誄云居官無官官之事處事無事事之心時人以為名言後綽嘗詣褚裒言及惔流涕曰可謂人之云亡邦國殄瘁裒大怒曰真長生平何嘗相比數而卿今日作此面向人邪其為名流所敬重如此張憑張憑字長宗祖鎮蒼梧太守憑年數歲鎮謂其父曰我不如汝有佳兒憑曰阿翁豈宜以子戲父邪及長有志氣為鄉閭所稱舉孝廉負其才自謂必參時彥初欲詣惔鄉里及同舉者共笑之既至惔處之下坐神意不接憑欲自發而無端會王濛就惔清言有所不通憑於末坐判之言旨深遠足暢彼我之懷一坐皆驚惔延之上坐清言彌日留宿至旦遣之憑既還船須臾惔遣傳教覓張孝廉船便召與同載遂言之於簡文帝帝召與語歎曰張憑勃窣為理窟官至吏部郎御史中丞韓伯韓伯字康伯潁川長社人也母殷氏高明有行家貧窶伯年數歲至大寒母方為作襦令伯捉尉斗而謂之曰且著襦尋當作復褌伯曰不復須母問其故對曰火在斗中而柄尚熱今既著襦下亦當暖母甚異之及長清和有思理留心文藝舅殷浩稱之曰康伯能自標置居然是出羣之器潁川庾和名重一時少所推服常稱伯及王坦之曰思理倫和我敬韓康伯志力強正吾愧王文度自此以還吾皆百之矣舉秀才徵佐著作郎並不就簡文帝居藩引為談客自司徒左西屬轉撫軍掾中書郎散騎常侍豫章太守入為侍中陳郡周協為謝安主簿居喪廢禮崇尚莊老脫落名教伯領中正不通協議曰拜下之敬猶違衆從禮情理之極不宜以多比為通時人憚焉識者謂伯可謂澄世所不能澄而裁世所不能裁者矣與夫容己順衆者豈得同時而共稱哉王坦之又嘗著公謙論袁宏作論以難之伯覽而美其辭旨以為是非既辨誰與正之遂作辨謙以折中曰夫尋理辨疑必先定其名分所存所存既明則彼我之趣可得而詳也夫謙之為義存乎降己者也以高從卑以賢同鄙故謙名生焉孤寡不穀人之所惡而侯王以自稱降其貴者也執御執射衆之所賤而君子以自目降其賢者也與夫山在地中之象其致豈殊哉捨此二者而更求其義雖南轅求冥終莫近也夫有所貴故有降焉夫有所美故有謙焉譬影響之與形聲相與而立道足者忘貴賤而一賢愚體公者乘理當而均彼我降挹之義於何而生則謙之為美固不可以語至足之道涉乎大方之家矣然君子之行己必尚於至當而必造乎匿善至理在乎無私而動之於降己者何誠由未能一觀於能鄙則貴賤之情立非忘懷於彼我則私己之纍存當其所貴在我則矜值其所賢能之則伐處貴非矜而矜己者常有其貴言善非伐而伐善者驟稱其能是以知矜貴之傷德者故宅心於卑素悟驟稱之虧理者故情存於不言情存於不言則善斯匿矣宅心於卑素則貴斯降矣夫所況君子之流苟理有未盡情有未夷存我之理未冥於內豈不同心於降挹洗之所滯哉體有而擬無者聖人之德有纍而存理者君子之情雖所滯不同其於遣情之纍緣有弊而用降己之道由私我而存一也故懲忿窒欲著於損象卑以自牧實繫謙爻皆所以存其所不足拂其所有餘者也王生之談以至理無謙近得之矣云人有爭心善不可收假後物之迹以逃動者之患以語聖賢則可施之於下斯者豈惟逃患於外亦所以洗心於內也轉丹楊尹吏部尚書領軍將軍既疾病占候者云不宜此官朝廷改授太常未拜卒時年四十九即贈太常子璯官至衡陽太守史臣曰王湛門資台鉉地處膏腴識表鄰機才惟王佐叶宣尼之遠契玩道韋編遵伯陽之幽旨含虛牝谷所謂天質不雕合於大朴者也安期英姿挺秀籍甚一時朝野挹其風流人倫推其表燭雖崇勳懋績有闕於旗常素德清規足傳於汗簡矣懷祖鑒局夷遠沖襟玉粹坦之牆宇凝曠逸操金貞騰諷庾之良箋情嗤語怪演廢莊之宏論道煥崇儒或寄重文昌允釐於袞職或任華綸閣密勿於王言咸能克著徽音保其榮秩美矣國寶檢行無聞坐升彼相混暗識於心鏡開險路於情田於時疆埸多虞憲章罕備天子居綴旒之運人臣微覆餗之憂於是竊勢擁權黷明王之彝典窮奢縱侈假凶豎之餘威繡桷雕楹陵跨於宸極驪珍冶質充牣於帷房亦猶犬彘腴肥不知禍之將及告盡私室固其宜哉荀景猷履孝居忠無慚往烈范玄平陳謀獻策有會時機嵩則思業該通緝遺經於已紊汪則風飈直亮抗高節於將顛揚榷而言俱為雅士劉韓俊爽標置軼羣勝氣籠霄飛談卷霧並蘭芬菊耀無絶於終古矣贊曰處沖純懿是稱奇器養素虛庭同塵下位雅道雖屈高風不墜猗歟後胤世傳清德帝室馳芬士林揚則國寶庸暗託意驕奢既豐其屋終蔀其家荀范令望金聲遠暢劉韓秀士珠談間起異術同華葳蕤青史
