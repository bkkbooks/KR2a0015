body:
  text: 晉書卷八帝紀第八穆帝穆皇帝諱聃字彭子康帝子也建元二年九月丙申立為皇太子戊戌康帝崩己亥太子即皇帝位時年二歲大赦尊皇后為皇太后壬寅皇太后臨朝攝政冬十月乙丑葬康皇帝于崇平陵十一月庚辰車騎將軍庾冰卒永和元年春正月甲戌朔皇太后設白紗帷於太極殿抱帝臨軒改元甲申進鎮軍將軍武陵王晞為鎮軍大將軍開府儀同三司以鎮軍將軍顧衆為尚書右僕射夏四月壬戌詔會稽王昱録尚書六條事五月戊寅大雩尚書令金紫光祿大夫建安伯諸葛恢卒六月癸亥地震秋七月庚午持節都督江荊司梁雍益寧七州諸軍事江州刺史征西將軍都亭侯庾翼卒翼部將干瓚戴羲等殺冠軍將軍曹據舉兵反安西司馬朱燾討平之八月豫州刺史路永叛奔於石季龍庚辰以輔國將軍徐州刺史桓溫為安西將軍持節都督荊司雍益梁寧六州諸軍事領護南蠻校尉荊州刺史石季龍將路永屯于壽春九月丙申皇太后詔曰今百姓勞弊其共思詳所以振恤之宜及歲常調非軍國要急者並宜停之冬十二月李勢將爨頠來奔涼州牧張駿伐焉耆降之二年春正月丙寅大赦己卯使持節侍中都督揚州諸軍事揚州刺史驃騎將軍録尚書事都鄉侯何充卒二月癸丑以左光祿大夫蔡謨領司徒録尚書六條事撫軍大將軍會稽王昱及謨並輔政三月丙子以前司徒左長史殷浩為建武將軍揚州刺史夏四月己酉朔日有蝕之五月丙戌涼州牧張駿卒子重華嗣六月石季龍將王擢襲武街執張重華護軍胡宣又使麻秋孫伏都伐金城太守張沖降之重華將謝艾擊秋敗之秋七月以兗州刺史褚裒為征北大將軍開府儀同三司冬十月地震十一月辛未安西將軍桓溫帥征虜將軍周撫輔國將軍譙王無忌建武將軍袁喬伐蜀拜表輒行十二月枉矢自東南流於西北其長竟天三年春三月乙卯桓溫攻成都克之丁亥李勢降益州平林邑范文攻陷日南害太守夏侯覽以尸祭天夏四月地震蜀人鄧定隗文舉兵反桓溫又擊破之使益州刺史周撫鎮彭模丁巳鄧定隗文復入據成都征虜將軍楊謙棄涪城退保德陽五月戊申進慕容皓為安北將軍石季龍又使其將石寧麻秋等伐涼州次於曲柳張重華使將軍牛旋禦之退守枹罕六月辛酉大赦秋七月范文復陷日南害督護劉雄隗文立范賁為帝八月戊午張重華將謝艾進擊麻秋大敗之九月地震冬十月乙丑假涼州刺史張重華大都督隴右關中諸軍事護羌校尉大將軍武都氐王楊初為征南將軍雍州刺史平羌校尉仇池公並假節十二月振威護軍蕭敬文害征虜將軍楊謙攻涪城陷之遂取巴西通于漢中四年夏四月范文寇九德多所殺害五月大水秋八月進安西將軍桓溫為征西大將軍開府儀同三司封臨賀郡公西中郎將謝尚為安西將軍九月丙申慕容皓死子俊嗣僞位冬十月己未地震石季龍使其將苻健寇竟陵十二月豫章人黃韜自號孝神皇帝聚衆數千寇臨川太守庾條討平之五年春正月辛巳朔大赦庚寅地震石季龍僭即皇帝位于鄴二月征北大將軍褚裒使部將王龕北伐獲石季龍將支重夏四月益州刺史周撫龍驤將軍朱燾擊范賁獲之益州平封周撫為建城公假慕容俊大將軍幽平二州牧大單于燕王征西大將軍桓溫遣督護滕畯討范文為文所敗石季龍死子世嗣僞位五月石遵廢世而自立六月桓溫屯安陸遣諸將討河北石遵揚州刺史王浹以壽陽來降秋七月褚裒進次彭城遣部將王龕李邁及石遵將李農戰于代陂王師敗績王龕為農所執李邁死之八月褚裒退屯廣陵西中郎將陳逵焚壽春而遁梁州刺史司馬勳攻石遵長城戍仇池公楊初襲西城皆破之冬十月石遵將石遇攻宛陷之執南陽太守郭啓司馬勳進次懸鉤石季龍故將麻秋距之勳退還梁州十一月丙辰石鑒弒石遵而自立十二月己酉使持節都督徐兗二州諸軍事徐州刺史征北大將軍開府儀同三司都鄉侯褚裒卒以建武將軍吳國內史荀羡為使持節監徐兗二州諸軍事北中郎將徐州刺史六年春正月帝臨朝以褚裒喪故懸而不樂閏月冉閔弒石鑒僭稱天王國號魏鑒弟祗僭帝號于襄國丁丑彗星見于亢己丑加中軍將軍殷浩督揚豫徐兗青五州諸軍事假節氐帥苻洪遣使來降以為氐王封廣川郡公假洪子健節監河北諸軍事右將軍封襄國縣公三月石季龍故將麻秋鴆殺苻洪于枋頭夏五月大水廬江太守袁真攻合肥克之六月石祗遣其弟琨攻冉閔將王泰于邯鄲琨師敗績秋八月輔國將軍譙王無忌薨苻健帥衆入關冬十一月冉閔圍襄國十二月免司徒蔡謨為庶人是歲大疫七年春正月丁酉日有蝕之辛丑鮮卑段龕以青州來降苻健僭稱王國號秦二月戊寅以段龕為鎮北將軍封齊公石祗大敗冉閔于襄國夏四月梁州刺史司馬勳出步騎三萬自漢中入秦川與苻健戰于五丈原王師敗績加尚書令顧和開府儀同三司劉顯弒石祗五月祗兗州刺史劉啓自鄄城來奔秋七月尚書令左光祿大夫開府儀同三司顧和卒甲辰濤水入石頭溺死者數百人八月冉閔豫州牧張遇以許昌來降拜鎮西將軍九月峻陽太陽二陵崩甲辰帝素服臨于太極殿三日遣兼太常趙拔修復山陵冬十月雷雨震電十一月石祗將姚弋仲冉閔將魏脫各遣使來降以弋仲為車騎將軍大單于封高陵郡公弋仲子襄為平北將軍都督并州諸軍事并州刺史平鄉縣公脫為安北將軍監冀州諸軍事冀州刺史十二月辛未征西大將軍桓溫帥衆北伐次于武昌而止時石季龍故將周成屯廩丘高昌屯野王樂立屯許昌李歷屯衛國皆相次來降八年春正月辛卯日有蝕之劉顯僭帝號于襄國冉閔擊破殺之苻健僭帝號于長安二月峻平崇陽二陵崩戊辰帝臨三日遣殿中都尉王惠如洛陽以衛五陵鎮西將軍張遇反于許昌使其黨上官恩據洛陽樂弘攻督護戴施於倉垣三月使北中郎將荀羡鎮淮陰苻健別帥侵順陽太守薛珍擊破之夏四月冉閔為慕容俊所滅俊僭帝號于中山稱燕安西將軍謝尚帥姚襄與張遇戰于許昌之誡橋王師敗績苻健使其弟雄襲遇虜之秋七月大雩石季龍故將王擢遣使請降拜征西將軍秦州刺史丁酉以鎮軍大將軍武陵王晞為太宰撫軍大將軍會稽王昱為司徒征西大將軍桓溫為太尉八月平西將軍周撫討蕭敬文于涪城斬之冉閔子智以鄴降督護戴施獲其傳國璽送之文曰受天之命皇帝壽昌百僚畢賀九月冉智為其將馬願所執降于慕容恪中軍將軍殷浩帥衆北伐次泗口遣河南太守戴施據石門滎陽太守劉丄卜戍倉垣冬十月秦州刺史王擢為苻健所逼奔于涼州九年春正月乙卯朔大赦張重華使王擢與苻健將苻雄戰擢師敗績丙寅皇太后與帝同拜建平陵三月旱交州刺史阮敷討林邑范佛于日南破其五十餘壘夏四月以安西將軍謝尚為尚書僕射五月大疫張重華復使王擢襲秦州取之仇池公楊初為苻雄所敗秋七月丁酉地震有聲如雷八月遣兼太尉河間王欽修復五陵冬十月中軍將軍殷浩進次山桑使平北將軍姚襄為前鋒襄叛反擊浩浩棄輜重退保譙城丁未涼州牧張重華卒子耀靈嗣是月張祚弒耀靈而自稱涼州牧十一月殷浩使部將劉啓王彬之討姚襄復為襄所敗襄遂進據芍陂十二月加尚書僕射謝尚為都督豫揚江西諸軍事領豫州刺史鎮歷陽十年春正月己酉朔帝臨朝以五陵未復懸而不樂涼州牧張祚僭帝位冉閔降將周成舉兵反自宛陵襲洛陽辛酉河南太守戴施奔鮪渚丁卯地震有聲如雷二月己丑太尉征西將軍桓溫帥師伐關中廢揚州刺史殷浩為庶人以前會稽內史王述為揚州刺史夏四月己亥溫及苻健子萇戰于藍田大敗之五月江西乞活郭敞等執陳留內史劉仕而叛京師震駭以吏部尚書周閔為中軍將軍屯于中堂豫州刺史謝尚自歷陽還衛京師六月苻健將苻雄悉衆及桓溫戰于白鹿原王師敗績秋九月辛酉桓溫糧盡引還十一年春正月甲辰侍中汝南王統薨平羌校尉仇池公楊初為其部將梁式所害初子國嗣位因拜鎮北將軍秦州刺史齊公段龕襲慕容俊將榮國於郎山敗之夏四月壬申隕霜乙酉地震姚襄帥衆寇外黃冠軍將軍高季大破之五月丁未地又震六月苻健死其子生嗣僞位秋七月宋混張瓘弒張祚而立耀靈弟玄靚為大將軍涼州牧遣使來降以吏部尚書周閔為尚書左僕射領軍將軍王彪之為尚書右僕射冬十月進豫州刺史謝尚督并冀幽三州諸軍事鎮西將軍鎮馬頭十二月慕容恪帥衆寇廣固壬戌上黨人馮鴦自稱太守背苻生遣使來降十二年春正月丁卯帝臨朝以皇太后母喪懸而不樂鎮北將軍段龕及慕容恪戰于廣固大敗之恪退據安平二月辛丑帝講孝經三月姚襄入于許昌以太尉桓溫為征討大都督以討之秋八月己亥桓溫及姚襄戰于伊水大敗之襄走平陽徙其餘衆三千餘家於江漢之間執周成而歸使揚武將軍毛穆之督護陳午輔國將軍河南太守戴施鎮洛陽冬十月癸巳朔日有蝕之慕容恪攻段龕於廣固使北中郎將荀羡帥師次于琅邪以救之十一月遣兼司空散騎常侍車灌龍驤將軍袁真等持節如洛陽修五陵十二月庚戌以有事于五陵告于太廟帝及羣臣皆服緦于太極殿臨三日是歲仇池公楊國為其從父俊所殺俊自立升平元年春正月壬戌朔帝加元服告于太廟始親萬機大赦改元增文武位一等皇太后居崇德宮丁丑隕石于槐里一是月鎮北將軍齊公段龕為慕容恪所陷遇害扶南竺旃檀獻馴象詔曰昔先帝以殊方異獸或為人患禁之今及其未至可令還本土三月帝講孝經壬申親釋奠于中堂夏五月庚午鎮西將軍謝尚卒苻生將苻眉苻堅擊姚襄戰於三原斬之六月苻堅殺苻生而自立以軍司謝奕為使持節都督安西將軍豫州刺史秋七月苻堅將張平以并州降遂以為并州刺史八月丁未立皇后何氏大赦賜孝悌魚衆寡米人五斛逋租宿債皆勿收大酺三日冬十月皇后見於太廟十一月雷十二月以太常王彪之為尚書左僕射二年春正月司徒會稽王昱稽首歸政帝不許三月慕容俊陷冀州諸郡詔安西將軍謝奕北中郎將荀羡北伐三月佽飛督王饒獻鴆鳥帝怒鞭之二百使殿中御史焚其鳥于四達之衢夏五月大水有星孛于天船六月并州刺史張平為苻堅所逼帥衆三千奔于平陽堅追敗之慕容恪進據上黨冠軍將軍馮鴦以衆叛歸慕容俊俊盡陷河北之地秋八月安西將軍謝奕卒壬申以吳興太守謝萬為西中郎將持節監司豫冀并四州諸軍事豫州刺史以散騎常侍郗曇為北中郎將持節都督徐兗青冀幽五州諸軍事徐兗二州刺史鎮下邳冬十月乙丑陳留王曹勱薨十一月庚子雷辛酉地震十二月北中郎將荀羡及慕容俊戰于山茌王師敗績三年春三月甲辰詔以比年出軍糧運不繼王公已下十三戶借一人一年助運秋七月平北將軍高昌為慕容俊所逼自白馬奔于滎陽冬十月慕容俊寇東阿遣西中郎將謝萬次下蔡北中郎將郗曇次高平以擊之王師敗績十一月戊子進揚州刺史王述為衛將軍十二月又以中軍將軍琅邪王丕為驃騎將軍東海王奕為車騎將軍封武陵王晞子𩼔為梁王交州刺史溫放之帥兵討林邑參黎耽潦並降之四年春正月仇池公楊俊卒子世嗣丙戌慕容俊死子暐嗣僞位二月鳳皇將九雛見于豐城秋七月以軍役繁興省用徹膳八月辛丑朔日有蝕之既冬十月天狗流于西南十一月封太尉桓溫為南郡公溫弟沖為豐城縣公子濟為臨賀郡公鳳皇復見豐城衆鳥隨之五年春正月戊戌大赦賜魚衆寡孤獨不能自存者人米五斛北中郎將都督徐兗青冀幽五州諸軍事徐兗二州刺史郗曇卒二月以鎮軍將軍范汪為都督徐兗青冀幽五州諸軍事安北將軍徐兗二州刺史平南將軍廣州刺史陽夏侯滕含卒夏四月大水太尉桓溫鎮宛使其弟豁將兵取許昌鳳皇見于沔北五月丁巳帝崩于顯陽殿時年十九葬永平陵廟號孝宗哀帝哀皇帝諱丕字千齡成帝長子也咸康八年封為琅邪王永和元年拜散騎常侍十二年加中軍將軍升平三年除驃騎將軍五年五月丁巳穆帝崩皇太后令曰帝奄不救疾胤嗣未建琅邪王丕中興正統明德懋親昔在咸康屬當儲二以年在幼沖未堪國難故顯宗高讓今義望情地莫與為比其以王奉大統于是百官備法駕迎于琅邪第庚申即皇帝位大赦壬戌詔曰朕獲承明命入纂大統顧惟先王宗廟蒸嘗無主太妃喪庭廓然靡寄悲痛感摧五內抽割宗國之尊情禮兼隆胤嗣之重義無與二東海王奕戚屬親近宜奉本統其以奕為琅邪王秋七月戊午葬穆皇帝于永平陵慕容恪攻陷野王守將呂護退保滎陽八月己卯夜天裂廣數丈有聲如雷九月戊申立皇后王氏穆帝皇后何氏稱永安宮呂護叛奔于慕容暐冬十月安北將軍范汪有罪廢為庶人十一月丙辰詔曰顯宗成皇帝顧命以時事多艱弘高世之風樹德博重以隆社稷而國故不已康穆早世胤祚不融朕以寡德復承先緒感惟永慕悲痛兼摧夫昭穆之義固宜本之天屬繼體承基古今常道宜上嗣顯宗以修本統十二月加涼州刺史張玄靚為大都督隴右諸軍事護羌校尉西平公隆和元年春正月壬子大赦改元甲寅減田稅畝收二升是月慕容暐將呂護傅末波攻陷小壘以逼洛陽二月辛未以輔國將軍吳國內史庾希為北中郎將徐兗二州刺史鎮下邳前鋒監軍龍驤將軍袁真為西中郎將監護豫司并冀四州諸軍事豫州刺史鎮汝南並假節丙子尊所生周氏為皇太妃三月甲寅朔日有蝕之夏四月旱詔出輕繫振困乏丁丑梁州地震浩亹山崩呂護復寇洛陽乙酉輔國將軍河南太守戴施奔于宛五月丁巳遣北中郎將庾希竟陵太守鄧遐以舟師救洛陽秋七月呂護等退守小平津進琅邪王奕為侍中驃騎大將軍開府鄧遐進屯新城庾希部將何謙及慕容暐將劉則戰于檀丘破之八月西中郎將袁真進次汝南運米五萬斛以饋洛陽冬十月賜貧乏者米人五斛章武王珍薨十二月戊午朔日有蝕之詔曰戎旅路次未得輕簡賦役玄象失度亢旱為患豈政事未洽將有板築渭濱之士邪其搜揚隱滯蠲除苛碎詳議法令咸從損要庾希自下邳退鎮山陽袁真自汝南退鎮壽陽興寧元年春二月己亥大赦改元三月壬寅皇太妃薨于琅邪第癸卯帝奔喪詔司徒會稽王昱總內外衆務夏四月慕容暐寇滎陽太守劉遠奔魯陽甲戌揚州地震湖瀆溢五月加征西大將軍桓溫侍中大司馬都督中外諸軍事録尚書事假黃鉞復以西中郎將袁真都督司冀并三州諸軍事北中郎將庾希都督青州諸軍事癸卯慕容暐陷密城滎陽太守劉遠奔于江陵秋七月張天錫弒涼州刺史西平公張玄靚自稱大將軍護羌校尉涼州牧西平公丁酉葬章皇太妃八月有星孛于角亢入天市九月壬戌大司馬桓溫帥衆北伐癸亥以皇子生大赦冬十月甲申立陳留王世子恢為王十一月姚襄故將張駿殺江州督護趙毗焚武昌略府藏以叛江州刺史桓沖討斬之是歲慕容暐將慕容塵攻陳留太守袁披于長平汝南太守朱斌承虛襲許昌克之二年春二月庚寅江陵地震慕容暐將慕容評襲許昌潁川太守李福死之評遂侵汝南太守朱斌遁于壽陽又進圍陳郡太守朱輔嬰城固守桓溫遣江夏相劉岵擊退之改左軍將軍為遊擊將軍罷右軍前軍後軍將軍五校三將官癸卯帝親耕藉田三月庚戌朔大閲戶人嚴法禁稱為庚戌制辛未帝不悆帝雅好黃老斷穀餌長生藥服食過多遂中毒不識萬機崇德太后復臨朝攝政夏四月甲申慕容暐遣其將李洪侵許昌王師敗績于懸瓠朱斌奔于淮南朱輔退保彭城桓溫遣西中郎將袁真江夏相劉岵等鑿楊儀道以通運溫帥舟師次于合肥慕容塵復屯許昌五月遷陳人于陸以避之戊辰以揚州刺史王述為尚書令衛將軍以桓溫為揚州牧録尚書事壬申遣使喻溫入相溫不從秋七月丁卯復徵溫入朝八月溫至赭圻遂城而居之苻堅別帥侵河南慕容暐寇洛陽九月冠軍將軍陳祐留長史沈徑守洛陽帥衆奔新城三年春正月庚申皇后王氏崩二月乙未以右將軍桓豁監荊州揚州之義城雍州之京兆諸軍事領南蠻校尉荊州刺史桓沖監江州荊州之江夏隨郡豫州之汝南西陽新蔡潁川六郡諸軍事南中郎將江州刺史領南蠻校尉並假節丙申帝崩于西堂時年二十五葬安平陵海西公廢帝諱奕字延齡哀帝之母弟也咸康八年封為東海王永和八年拜散騎常侍尋加鎮軍將軍升平四年拜車騎將軍五年改封琅邪王隆和初轉侍中驃騎大將軍開府儀同三司興寧三年二月丙申哀帝崩無嗣丁酉皇太后詔曰帝遂不救厥疾艱禍仍臻遺緒泯然哀慟切心琅邪王奕明德茂親屬當儲嗣宜奉祖宗纂承大統便速正大禮以寧人神於是百官奉迎于琅邪第是日即皇帝位大赦三月壬申葬哀皇帝于安平陵癸酉散騎常侍河間王欽薨丙子慕容暐將慕容恪陷洛陽寧朔將軍竺瑤奔于襄陽冠軍長史揚武將軍沈徑死之夏六月戊子使持節都督益寧二州諸軍事鎮西將軍益州刺史建城公周撫卒秋七月胸奴左賢王衛辰右賢王曹穀帥衆二萬侵苻堅杏城己酉改封會稽王昱為琅邪王壬子立皇后庾氏封琅邪王昱子昌明為會稽王冬十月梁州刺史司馬勳反自稱成都王十一月帥衆人劍閣攻涪西夷校尉毋丘暐棄城而遁乙卯圍益州刺史周楚于成都桓溫遣江夏相朱序救之十二月戊戌以會稽內史王彪之為尚書僕射太和元年春二月己丑以涼州刺史張天錫為大將軍都督隴右關中諸軍事西平郡公丙申以宣城內史桓祕為持節監梁益二州征討諸軍事三月辛亥新蔡王邈薨荊州刺史桓豁遣督護桓羆攻南鄭魏興人畢欽舉兵以應羆夏四月旱五月戊寅皇后庾氏崩朱序攻司馬勳于成都衆潰執勳斬之秋七月癸酉葬孝皇后于敬平陵九月甲午曲赦梁益二州冬十月辛丑苻堅將王猛楊安攻南鄉荊州刺史桓豁救之師次新野而猛安退以會稽王昱為丞相十二月南陽人趙弘趙憶等據宛城反太守桓淡走保新野慕容暐將慕容厲陷魯郡高平二年春正月北中郎將庾希有罪走入于海夏四月慕容暐將慕容塵寇竟陵太守羅崇擊破之苻堅將王猛寇涼州張天錫距之猛師敗績五月右將軍桓豁擊趙憶走之進獲慕容暐將趙槃送于京師秋九月以會稽內史郗愔為都督徐兗青幽四州諸軍事平北將軍徐州刺史冬十月乙巳彭城王玄薨三年春三月丁巳朔日有蝕之癸亥大赦夏四月癸巳雨雹大風折木秋八月壬寅尚書令衛將軍藍田侯王述卒四年夏四月庚戌大司馬桓溫帥衆伐慕容暐秋七月辛卯暐將慕容垂帥衆距溫溫擊敗之九月戊寅桓溫裨將鄧遐朱序遇暐將傅末波于林渚又大破之戊子溫至枋頭丙申以糧運不繼焚舟而歸辛丑慕容垂追敗溫後軍于襄邑冬十月大星西流有聲如雷己巳溫收散卒屯于山陽豫州刺史袁真以壽陽叛十一月辛丑桓溫自山陽及會稽王昱會于涂中將謀後舉十二月遂城廣陵而居之五年春正月己亥袁真子雙之愛之害梁國內史朱憲汝南內史朱斌二月癸酉袁真死陳郡太守朱輔立真子瑾嗣事求救于慕容暐夏四月辛未桓溫部將竺瑤破瑾于武丘秋七月癸酉朔日有蝕之八月癸丑桓溫擊袁瑾于壽陽敗之九月苻堅將王猛伐慕容暐陷其上黨廣漢妖賊李弘與益州妖賊李金根聚衆反弘自稱聖王衆萬餘人梓潼太守周虓討平之冬十月王猛大破慕容暐將慕容評于潞川十一月猛克鄴獲慕容暐盡有其地六年春正月苻堅遣將王鑒來援袁瑾將軍桓伊逆擊大破之丁亥桓溫克壽陽斬袁瑾三月壬辰監益寧二州諸軍事冠軍將軍益州刺史建城公周楚卒夏四月戊午大赦賜窮獨米人五斛苻堅將苻雅伐仇池仇池公楊纂降之六月京都及丹楊晉陵吳郡吳興臨海並大水秋八月以前寧州刺史周仲孫為假節監益梁二州諸軍事益州刺史冬十月壬子高密王俊薨十一月癸卯桓溫自廣陵屯于白石丁未詣闕因圖廢立誣帝在藩夙有痿疾嬖人相龍計好朱靈寶等參侍內寢而二美人田氏孟氏生三男長欲封樹時人惑之溫因諷太后以伊霍之舉己酉集百官于朝堂宣崇德太后令曰王室艱難穆哀短祚國嗣不育儲宮靡立琅邪王奕親則母弟故以入纂大位不圖德之不建乃至于斯昏濁潰亂動違禮度有此三孽莫知誰子人倫道喪醜聲遐布既不可以奉守社稷敬承宗廟且昏孽並大便欲建樹儲藩誣罔祖宗傾移皇基是而可忍孰不可懷今廢奕為東海王以王還第供衛之儀皆如漢朝昌邑故事但未亡人不幸罹此百憂感念存沒心焉如割社稷大計義不獲已臨紙悲塞如何可言于是百官入太極前殿即日桓溫使散騎侍郎劉享收帝璽綬帝著白帢單衣步下西堂乘犢車出神獸門羣臣拜辭莫不歔欷侍御史殿中監將兵百人衛送東海第初桓溫有不臣之心欲先立功河朔以收時望及枋頭之敗威名頓挫遂潛謀廢立以長威權然憚帝守道恐招時議以宮闈重閟牀笫易誣乃言帝為閹遂行廢辱初帝平生每以為慮嘗召術人扈謙筮之卦成答曰晉室有盤石之固陛下有出宮之象竟如其言咸安二年正月降封帝為海西縣公四月徙居吳縣敕吳國內史刁彝防衛又遣御史顧允監察之十一月妖賊盧悚遣弟子殿中監許龍晨到其門稱太后密詔奉迎興復帝初欲從之納保母諫而止龍曰大事將捷焉用兒女子言乎帝曰我得罪於此幸蒙寬宥豈敢妄動哉且太后有詔便應官屬來何獨使汝也汝必為亂因叱左右縛之龍懼而走帝知天命不可再深慮橫禍乃杜塞聰明無思無慮終日酣暢耽於內寵有子不育庶保天年時人憐之為作歌焉朝廷以帝安于屈辱不復為虞太元十一年十月甲申薨于吳時年四十五史臣曰孝宗因繈抱之姿用母氏之化中外無事十有餘年以武安之才啓之疆埸以文王之風被乎江漢則孔子所謂吾無間然矣哀皇寬惠可以為君而鴻祀禳天用塵其德東海違許龍之駕屈放命之臣所謂柔弱勝剛強得盡于天年者也贊曰委裘稱化大孝為宗遵彼聖善成茲允恭西旌玉壘北旆金墉遷殷舊僰莫不來從哀后寬仁惟靈既集海西多故時災見及彼異阿衡我非昌邑
