body:
  text: 晉書卷六十三列傳第三十三邵續邵續字嗣祖魏郡安陽人也父乘散騎侍郎續朴素有志烈博覽經史善談理義妙解天文初為成都王穎參軍穎將討長沙王乂續諫曰續聞兄弟如左右手今明公當天下之敵而欲去一手乎續竊惑之穎不納後為苟晞參軍除沁水令時天下漸亂續去縣還家糾合亡命得數百人王浚假續綏集將軍樂陵太守屯厭次以續子乂為督護續綏懷流散多歸附之石勒既破浚遣乂還招續續以孤危無援權附於勒勒亦以乂為督護既而段匹磾在薊遣書要續俱歸元帝續從之其下諫曰今棄勒歸匹磾任子危矣續垂泣曰我出身為國豈得顧子而為叛臣哉遂絶於勒勒乃害乂續懼勒攻先求救於匹磾匹磾遣弟文鴦救續文鴦未至勒已率八千騎圍續勒素畏鮮卑及聞文鴦至乃棄攻具東走續與文鴦追勒至安陵不及虜勒所署官并驅三千餘家又遣騎入散勒北邊掠常山亦二千家而還匹磾既殺劉琨夷晉多怨叛遂率其徒依續勒南和令趙領等率廣川渤海千餘家背勒歸續而帝以續為平原樂安太守右將軍冀州刺史進平北將軍假節封祝阿子續遣兄子武邑內史存與文鴦率匹磾衆就食平原為石季龍所破續先與曹嶷亟相侵掠嶷因存等敗乃破續屯田又抄其戶口續首尾相救疲於奔命太興初續遣存及文鴦屯濟南黃巾固因以逼嶷嶷懼求和俄而匹磾率衆攻段末杯石勒知續孤危遣季龍乘虛圍續季龍騎至城下掠其居人續率衆出救季龍伏騎斷其後遂為季龍所得使續降其城續呼其兄子竺等曰吾志雪國難以報所受不幸至此汝等努力自勉便奉匹磾為主勿有二心時帝既聞續沒下詔曰邵續忠烈在公義誠慷慨綏集荒餘憂國亡身功勳未遂不幸陷沒朕用悼恨于懷所統任重宜時有代其部曲文武已共推其息緝為營主續之忠誠著于公私今立其子足以安衆一以續本位即授緝使總率所統效節國難雪其家仇季龍遣使送續於勒勒使使徐光讓之曰國家應符撥亂八表宅心遺晉怖威遠竄揚越而續蟻封海阿跋扈王命以夷狄不足為君邪何無上之甚也國有常刑於分甘乎續對曰晉末飢亂奔控無所保合鄉宗庶全老幼屬大王龍飛之始委命納質精誠無感不蒙慈恕言歸遺晉仍荷寵授誓盡忠節實無二心且受彼厚榮而復二三其趣者恐亦不容於明朝矣周文生于東夷大禹出於西羌帝王之興蓋惟天命所屬德之所招當何常邪伏惟大王聖武自天道隆虞夏凡在含生孰不延首神化恥隔皇風而況囚乎使囚去真即偽不得早叩天門者大王負囚囚不負大王也釁鼓之刑囚之分但恨天實為之謂之何哉勒曰其言慨至孤愧之多矣夫忠于其君者乃吾所求也命張賓延之于館厚撫之尋以為從事中郎令自後諸克敵擒俊皆送之不得輒害冀獲如續之流初季龍之攻續也朝廷有王敦之逼不遑救恤續既為勒所執身灌園鬻菜以供衣食勒屢遣察之歎曰此真高人矣不如是安足貴乎嘉其清苦數賜穀帛每臨朝嗟歎以勵羣官續被獲之後存及竺緝等與匹磾嬰城距寇而帝又假存揚武將軍武邑太守勒屢遣季龍攻之戰守疲苦不能自立久之匹磾及其弟文鴦與竺緝等悉見獲惟存得潰圍南奔在道為賊所殺續竟亦遇害李矩李矩字世回平陽人也童齔時與羣兒聚戲便為其率計畫指授有成人之量及長為吏送故縣令於長安征西將軍梁王肜以為牙門伐氐齊萬年有殊功封東明亭侯還為本郡督護太守宋胄欲以所親吳畿代之矩謝病去畿恐矩復還陰使人刺矩會有人救之故得免屬劉元海攻平陽百姓奔走矩素為鄉人所愛乃推為塢主東屯滎陽後移新鄭矩勇毅多權略志在立功東海王越以為汝陰太守永嘉初使矩與汝南太守袁孚率衆修洛陽千金堨以利運漕及洛陽不守太尉荀藩奔陽城衛將軍華薈奔成時大飢賊帥侯都等每略人而食之藩薈部曲多為所啖矩討都等滅之乃營護藩薈各為立屋宇輸穀以給之及藩承制建行臺假矩滎陽太守矩招懷離散遠近多附之石勒親率大衆襲矩矩遣老弱入山令所在散牛馬因設伏以待之賊爭取牛馬伏發齊呼聲動山谷遂大破之斬獲甚衆勒乃退藩表元帝加矩冠軍將軍軺車幢蓋進封陽武縣侯領河東平陽太守時飢饉相仍又多疫癘矩垂心撫恤百姓賴焉會長安羣盜東下所在多虜掠矩遣部將擊破之盡得賊所略婦女千餘人諸將以非矩所部欲遂留之矩曰俱是國家臣妾焉有彼此乃一時遣之時劉琨所假河內太守郭默為劉元海所逼乞歸於矩矩將使其甥郭誦迎致之而不敢進會劉琨遣參軍張肇率鮮卑范勝等五百餘騎往長安屬默被圍道路不通將還依邵續行至矩營矩謂肇曰默是劉公所授公家之事知無不為屠各舊畏鮮卑遂邀肇為聲援肇許之賊望見鮮卑不戰而走誦潛遣輕舟濟河使勇士夜襲懷城掩賊留營又大破之默遂率其屬歸于矩後劉聰遣從弟暢步騎三萬討矩屯于韓王故壘相去七里遣使招矩時暢卒至矩未暇為備遣使奉牛酒詐降于暢潛匿精勇見其老弱暢不以為虞大饗渠帥人皆醉飽矩謀夜襲之兵士以賊衆皆有懼色矩令郭誦禱鄭子産祠曰君昔相鄭惡鳥不鳴凶胡臭羯何得過庭使巫揚言東里有教當遣神兵相助將士聞之皆踴躍爭進乃使誦及督護楊璋等選勇敢千人夜掩暢營獲鎧馬甚多斬首數千級暢僅以身免先是郭默聞矩被攻遣弟芝率衆援之既而聞破暢芝復馳來赴矩矩乃與芝馬五百匹分軍為三道夜追賊復大獲而旋先是聰使其將趙固鎮洛陽長史周振與固不協密陳固罪矩之破暢也帳中得聰書敕暢平矩訖過洛陽收固斬之便以振代固矩送以示固固即斬振父子遂率騎一千來降矩還令守洛後數月聰遣其太子粲率劉雅生等步騎十萬屯孟津北岸分遣雅生攻趙固於洛固奔陽城山遣弟告急矩遣郭誦屯洛口以救之誦使將張皮簡精卒千人夜渡河粲候者告有兵至粲恃其衆不以為虞既而誦等奄至十道俱攻粲衆驚擾一時奔潰殺傷太半因據其營獲其器械軍資不可勝數及旦粲見皮等人少更與雅生悉餘衆攻之苦戰二十餘日不能下矩進救之使壯士三千泛舟迎皮賊臨河列陳作長鉤以鉤船連戰數日不得渡矩夜遣部將格增潛濟入皮壘與皮選精騎千餘而殺所獲牛馬焚燒器械夜突圍而出奔武牢聰追之不及而退聰因憤恚發病而死帝嘉其功除矩都督河南三郡軍事安西將軍滎陽太守封修武縣侯及劉粲嗣位昏虐日甚其將靳準乃起兵殺粲并其宗族發聰冢斬其尸遣使歸矩稱劉元海屠各小醜因大晉事故之際作亂幽并矯稱天命至令二帝幽沒虜庭輒率衆扶侍梓宮因請上聞矩馳表于帝帝遣太常韓胤等奉迎梓宮未至而準已為石勒劉曜所沒矩以衆少不足立功每慷慨憤歎及帝踐阼以為都督司州諸軍事司州刺史改封平陽縣侯將軍如故時弘農太守尹安振威將軍宋始等四軍並屯洛陽各相疑阻莫有固志矩默各遣千騎至洛以鎮之安等乃同謀告石勒勒遣石生率騎五千至洛陽矩默軍皆退還俄而四將復背勒遣使乞迎默又遣步卒五百人入洛石生以四將相謀不能自安乃虜宋始一軍渡河而南百姓相率歸矩於是洛中遂空矩乃表郭誦為揚武將軍陽翟令阻水築壘且耕且守為滅賊之計屬趙固死石生遣騎襲誦誦多計略賊至輒設伏破之虜掠無所得生怒又自率四千餘騎暴掠諸縣因攻誦壘接戰須臾退軍堮坂誦率徑勇五百追及生於磐脂故亭又大破之矩以誦功多表加赤幢曲蓋封吉陽亭侯郭默欲侵祖約矩禁之不可遂為約所破石勒遣其養子襲默默懼後患未已將降於劉曜遣參軍鄭雄詣矩謀之矩距而不許後勒遣其將石良率精兵五千襲矩矩逆擊不利郭誦弟元復為賊所執賊遣元以書説矩曰去年東平曹嶷西賓猗盧矩如牛角何不歸命矩以示誦誦曰昔王陵母在賊猶不改意弟當何論勒復遺誦麈尾馬鞭以示殷勤誦不答勒將石生屯洛陽大掠河南矩默大飢默因復説矩降曜矩既為石良所破遂從默計遣使於曜曜遣從弟嶽軍于河陰欲與矩謀攻石生勒遣將圍嶽嶽閉門不敢出默後為石所敗自密南奔建康矩聞之大怒遣其將郭誦等齎書與默又敕誦曰汝識脣亡之談不迎接郭默皆由於卿臨難逃走其必留之誦追及襄城默自知負矩棄妻子而遁誦擁其餘衆而歸矩待其妻子如初劉嶽以外援不至降于石季龍矩所統將士有陰欲歸勒者矩知之而不能討乃率衆南走將歸朝廷衆皆道亡惟郭誦及參軍郭方功曹張景主簿苟遠將軍騫韜江霸梁志司馬尚季弘李瓌段秀等百餘人棄家送矩至於魯陽縣矩墜馬卒葬襄陽之峴山段匹磾段匹磾東部鮮卑人也種類徑健世為大人父務勿塵遣軍助東海王越征討有功王浚表為親晉王封遼西公嫁女與務勿塵以結鄰援懷帝即位以務勿塵為大單于匹磾為左賢王率衆助國征討假撫軍大將軍務勿塵死弟涉復辰以務勿塵子疾陸眷襲號劉曜逼洛陽王浚遣督護王昌等率疾陸眷及弟文鴦從弟末杯攻石勒於襄國勒敗還壘末杯追入壘門為勒所獲勒質末杯遣使求和於疾陸眷疾陸眷將許之文鴦諫曰受命討勒寧以末杯一人故縱成擒之寇既失浚意且有後憂必不可許疾陸眷不聽以鎧馬二百五十匹金銀各一簏贖末杯勒歸之又厚以金寶綵絹報疾陸眷疾陸眷令文鴦與石季龍同盟約為兄弟遂引騎還昌等不能獨守亦還建武初匹磾推劉琨為大都督結盟討勒并檄涉復辰疾陸眷末杯等三面俱集襄國琨匹磾進屯固安以候衆軍勒懼遣間使厚賂末杯然末杯既思報其舊恩且因匹磾在外欲襲奪其國乃間匹磾於涉復辰疾陸眷曰以父兄而從子弟邪雖一旦有功匹磾獨收之矣涉復辰等以為然引軍而還匹磾亦止會疾陸眷病死匹磾自薊奔喪至於右北平末杯宣言匹磾將篡出軍擊敗之末杯遂害涉復辰及其子弟黨與二百餘人自立為單于及王浚敗匹磾領幽州刺史劉琨自并州依之復與匹磾結盟俱討石勒匹磾復為末杯所敗士衆離散懼琨圖己遂害之於是晉人離散矣匹磾不能自固北依邵續末杯又攻敗之匹磾被瘡謂續曰吾夷狄慕義以至破家君若不忘舊要與吾進討君之惠也續曰賴公威德續得效節今公有難豈敢不俱遂并力追末杯斬獲略盡又令文鴦北討末杯弟於薊城及還去城八十里聞續已沒衆懼而散復為石季龍所遮文鴦以其親兵數百人力戰破之始得入城季龍復抄城下文鴦登城臨見欲出擊之匹磾不許文鴦曰我以勇聞故百姓杖我見人被略而不救非丈夫也令衆失望誰復為我致死乎遂將壯士數十騎出戰殺胡甚多遇馬乏伏不能起季龍呼曰大兄與我俱是戎狄久望共同天不違願今日相見何故復戰請釋杖文鴦罵曰汝為寇虐久應合死吾兄不用吾計故令汝得至此吾寧死不為汝擒遂下馬苦戰槊折執刀力戰不已季龍軍四面解馬羅披自鄣前捉文鴦文鴦戰自辰至申力極而後被執城內大懼匹磾欲單騎歸朝續弟樂安內史洎勒兵不許洎復欲執臺使王英送於季龍匹磾正色責之曰卿不能遵兄之志逼吾不得歸朝亦以甚矣復欲執天子使者我雖胡夷所未聞也因謂英曰匹磾世受重恩不忘忠孝今日事逼欲歸罪朝廷而見逼迫忠款不遂若得假息未死之日心不忘本遂渡黃河南匹磾著朝服持節賓從出見季龍曰我受國恩志在滅汝不幸吾國自亂以至於此既不能死又不能為汝敬也勒及季龍素與匹磾結為兄弟季龍起而拜之匹磾到襄國又不為勒禮常著朝服持晉節經年國中謀推匹磾為主事露被害文鴦亦遇鴆而死惟末波存焉及死弟牙立牙死其後從祖就陸眷之孫遼立自務勿塵已後值晉喪亂自稱位號據有遼西之地而臣御晉人其地西盡幽州東界遼水然所統胡晉可三萬餘家控弦可四五萬騎而與石季龍遞相侵掠連兵不息竟為季龍所破徙其遺黎數萬家於司雍之地其子蘭復聚兵與季龍為患久之及石氏之亡末波之子勤鳩集胡羯得萬餘人保枉人山自稱趙王附于慕容俊俄為冉閔所敗徙于繹幕僭即尊號俊遣慕容恪擊之勤懼而降魏浚族子該魏浚東郡東阿人也寓居關中初為雍州小吏河間王顒敗亂之際以為武威將軍後為度支校尉有幹用永嘉末與流人數百家東保河陰之硤石時京邑荒儉浚劫掠得穀麥獻之懷帝帝以為揚威將軍平陽太守度支如故以亂不之官及洛陽陷屯于洛北石梁塢撫養遺衆漸修軍器其附賊者皆先解喻説大晉運數靈長行已建立歸之者甚衆其有恃遠不從命者遣將討之服從而已不加侵暴於是遠近感悅襁負至者漸衆劉琨承制假浚河南尹時太尉荀藩建行臺在密縣浚詣藩咨謀軍事藩甚悅要李矩同會矩將夜赴之矩官屬以浚不可信不宜夜往矩曰忠臣同心將何疑乎及會客主盡歡浚因與矩相結而去劉曜忌浚得衆率衆軍圍之劉演郭默遣軍來救曜分兵逆于河北乃伏兵深隱處以邀演默軍大破之盡虜演等騎浚夜遁走為曜所得遂死之追贈平西將軍族子該領其衆該一名亥本僑居京兆陰磐河間王顒之伐趙王倫以該為將兵都尉及劉曜攻洛陽隨浚赴難先領兵守金墉城故得無他曜引去餘衆依之時杜預子尹為弘農太守屯宜陽界一泉塢數為諸賊所抄掠尹要該共距之該遣其將馬瞻將三百人赴尹瞻知其無備夜襲尹殺之迎該據塢塢人震懼並服從之乃與李矩郭默相結以距賊荀藩即以該為武威將軍統城西雍涼人使討劉曜元帝承制加冠軍將軍河東太守督護河東河南平陽三郡曜嘗攻李矩該破之及矩將迎郭默該遣軍助之又與河南尹任愔相連結後漸飢弊曜寇日至欲率衆南徙衆不從該遂單騎走至南陽帝又以為前鋒都督平北將軍雍州刺史馬瞻率該餘衆降曜曜徵發既苦瞻又驕虐部曲遣使呼該該密往赴之其衆殺瞻而納該該遷於新野率衆助周訪討平杜曾詔以該為順陽太守王敦之反也梁州刺史甘卓不從欲觀該去就試以敦旨動之該曰我本去賊惟忠於國今王公舉兵向天子非吾所宜與也遂距而不應及蘇峻反率衆救臺軍次石頭受陶侃節度峻未平該病篤還屯卒於道葬于武陵從子雄統其衆郭默郭默河內懷人少微賤以壯勇事太守裴整為督將永嘉之亂默率遺衆自為塢主以漁舟抄東歸行旅積年遂致巨富流人依附者漸衆撫循將士甚得其歡心默婦兄同郡陸嘉取官米數石餉妹默以為違制將殺嘉嘉懼奔石勒默乃自射殺婦以明無私遣使謁劉琨琨加默河內太守劉元海遣從子曜討默曜列三屯圍之欲使餓死默送妻子為質并請糴焉糴畢設守曜怒沈默妻子于河而攻之默遣弟芝求救于劉琨琨知默狡猾留之而緩其救默更遣人告急會芝出城浴馬使強與俱歸默乃遣芝質於石勒勒以默多詐封默書與劉曜默使人伺得勒書便突圍投李矩後與矩并力距劉石事見矩傳太興初除潁川太守默與石戰敗矩轉蹙弱默深憂懼解印授其參軍殷嶠謂之曰李使君遇吾甚厚今遂棄去無顏謝之三日可白吾去也乃奔陽翟矩聞之大怒遣其將郭誦追默至襄城及之默棄家人單馬馳去默至京都明帝授征虜將軍劉遐卒以默為北中郎將監淮北軍事假節遐故部曲李龍等謀反詔默與右衛將軍趙胤討平之朝廷將徵蘇峻懼其為亂召默拜後將軍領屯騎校尉初戰有功及六軍敗績南奔郗鑒議於曲阿北大業里作壘以分賊勢使默守之峻遣韓晃等攻默甚急壘中頗乏水默懼分人馬出外乃潛從南門蕩出留人堅守會峻死圍解徵為右軍將軍默樂為邊將不願宿衛及赴召謂平南將軍劉胤曰我能禦胡而不見用右軍主禁兵若疆埸有虞被使出征方始配給將卒無素恩信不著以此臨敵少有不敗矣時當為官擇才若人臣自擇官安得不亂乎胤曰所論事雖然非小人所及也當發求資於胤時胤被詔免官不即歸罪方自申理而驕侈更甚遠近怪之初默之被徵距蘇峻也下次尋陽見胤胤參佐張滿等輕默倮露視之默常切齒至是胤臘日餉默酒一器肫一頭默對信投之水中忿憤益甚又僑人蓋肫先略取祖煥所殺孔煒女為妻煒家求之張滿等使還其家肫不與因與胤滿有隙至是肫謂默曰劉江州不受免密有異圖與長史司馬張滿荀楷等日夜計謀反逆已形惟忌郭侯一人云當先除郭侯而後起事禍將至矣宜深備之默既懷恨便率其徒候旦門開襲胤胤將吏欲距默默詬之曰我被詔有所討動者誅及三族遂入至內寢胤尚與妾臥默牽下斬之出取胤僚佐張滿荀楷等誣以大逆傳胤首于京師詐作詔書宣視內外掠胤女及諸妾并金寶還船初云下都俄而還停胤故府招桓宣王愆期愆期懼逼勸默為平南江州默從之愆期因逃廬山桓宣固守不應司徒王導懼不可制乃大赦天下梟胤首于大航以默為西中郎將豫州刺史武昌太守鄧嶽馳白太尉陶侃侃聞之投袂起曰此必詐也即日率衆討默上疏陳默罪惡導聞之乃收胤首詔庾亮助侃討默默欲南據豫章而侃已至城下築土山以臨之諸軍大集圍之數重侃惜默驍勇欲活之遣郭誦見默默許降而默將張丑宋侯等恐為侃所殺故致進退不時得出攻之轉急宋侯遂縛默求降即斬于軍門同黨死者四十人傳首京師史臣曰邵李魏郭等諸將契闊喪亂之辰驅馳戎馬之際威懷足以容衆勇略足以制人乃保據危城折衝千里招集義勇抗禦仇讎雖艱阻備嘗皆乃心王室而矩能以少擊衆戰勝獲多遂使玄明憤恚世龍挫衄惜其寡弱功虧一簣方之數子其最優乎默既拔迹危亡參陪朝伍忿因眥睚禍及誅夷非夫狂悖豈宜至此段匹磾本自遐方而係心朝廷始則盡忠國難終乃抗節虜廷自蘇子卿以來一人而已越石之見誅段氏實以威名匹磾之取戮世龍亦由衆望禍福之應何其速哉詩云無言不酬無德不報此之謂也贊曰邵李諸將實惟忠壯蒙犯艱危驅馳亭鄣力小任重功虧身喪匹磾徑烈隕身全節默實凶殘自貽罪戾
