body:
  text: 晉書卷二十六志第十六食貨昔者先王量地以制邑度地以居民因三才以節其務敬四序以成其業觀其謠俗而正其紀綱勖農桑之本通魚鹽之利登良山而採符玉泛瀛海而罩珠璣日中為市總天下之隸先諸布帛繼以貨泉貿遷有無各得其所周禮正月始和乃布教于象魏若乃一夫之士十畝之宅三日之徭九均之賦施陽禮以興其讓命春社以勖其耕天之所貴者人也明之所求者學也治經入官則君子之道焉詩曰三之日于耜四之日舉趾是以農官澤虞各有攸次父兄之習不玩而成十五從務始勝衣服鄉無遊手邑不廢時所謂厥初生民各從其事者也是以太公通市井之貨以致齊國之強鴟夷善廢斂之居以盛中陶之業昔在金天勤於民事命春以耕稼召夏以耘鋤秋所以收斂冬於焉蓋藏書曰曆象日月星辰敬授民時傳曰禹稷躬稼而有天下若乃九土既敷四民承範東吳有齒角之饒西蜀有丹沙之富兗豫漆絲之廥燕齊怪石之府秦邠旄羽迥帶琅玕荊郢桂林旁通竹箭江干橘柚河外舟車遼西旃罽之鄉葱右蒲梢之駿殖物怪錯于何不有若乃上法星象下料無外因天地之利而總山海之饒百畝之田十一而稅九年躬稼而有三年之蓄可以長孺齒可以養耆年因乎人民用之邦國宮室有度旗章有序朝聘自其儀宴饗由其制家殷國阜遠至邇安救水旱之災恤寰瀛之弊然後王之常膳乃間笙鏞商周之興用此道也辛紂暴虐玩其經費金鏤傾宮廣延百里玉飾鹿臺崇高千仞宮中九市各有女司厚賦以實鹿臺之錢大斂以增巨橋之粟多發妖冶以充傾宮之麗廣收珍玩以備沙丘之遊懸肉成林積醪為沼使男女裸體相逐於其間伏詣酒池中牛飲者三千餘人宮中以錦綺為席綾紈為薦及周王誅紂肅拜殷墟乃盡振鹿財並頒橋粟上天降休殷人大喜王赧云季徙都西周九鼎淪沒二南堙盡貸於百姓無以償之乃上層臺以避其責周人謂王所居為逃責臺者也昔周姬公制以六典職方陳其九貢頒財內府永為不刊及刑政陵夷菁茅罕至魯侯初踐畝之稅秦君收太半之入前王之範靡有孑遺史臣曰班固為殖貨志自三代至王莽之誅網羅前載其文詳悉光武寬仁龔行天討王莽之後赤眉新敗雖復三暉乃眷而九服蕭條及得隴望蜀黎民安堵自此始行五銖之錢田租三十稅一民有産子者復以三年之算顯宗即位天下安寧民無橫徭歲比登稔永平五年作常滿倉立粟市於城東粟斛直錢二十草樹殷阜牛羊彌望作貢尤輕府廩還積姦回不用禮義專行于時東方既明百官詣闕戚里侯家自相馳騖車如流水馬若飛龍照映軒廡光華前載傳曰三統之元有陰陽之九焉蓋天地之恆數也安帝永初三年天下水旱人民相食帝以鴻陂之地假與貧民以用度不足三公又奏請令吏民入錢穀得為關內侯云桓帝永興元年郡國少半遭蝗河泛數千里流人十餘萬戶所在廩給逮建寧永和之初西羌反叛二十餘年兵連師老軍旅之費三百二十餘億府帑空虛延及內郡沖質短祚桓靈不軌中平二年南宮災延及北闕於是復收天下田畝十錢用營宮宇帝出自侯門居貧即位常曰桓帝不能作家曾無私蓄故於西園造萬金堂以為私藏復寄小黃門私錢家至巨億於是懸鴻都之榜開賣官之路公卿以降悉有等差廷尉崔烈入錢五百萬以買司徒刺史二千石遷除皆責助治宮室錢大郡至二千萬錢不畢者或至自殺獻帝作五銖錢而有四道連於邊緣有識者尤之曰豈京師破壞此錢四出也及董卓尋戈火焚宮室乃劫鸞駕西幸長安悉壞五銖錢更鑄小錢盡收長安及洛陽銅人飛廉之屬以充鼓鑄又錢無輪郭文章不便時人以為秦始皇見長人於臨洮乃鑄銅人卓臨洮人也興毀不同凶訛相類及卓誅死李傕郭汜自相攻伐於長安城中以為戰地是時穀一斛五十萬豆麥二十萬人相食啖白骨盈積殘骸餘肉臭穢道路帝使侍御史侯汶出太倉米豆為饑民作糜經日頒布而死者愈多帝於是始疑有司盜其糧廩乃親於御前自加臨給饑者人皆泣曰今始得耳帝東歸也李傕郭汜等追敗乘輿於曹陽夜潛渡河六宮皆步初出營欄后手持縑數匹董承使符節令孫徽以刃脅奪之殺旁侍者血濺后服既至安邑御衣穿敗唯以野棗園菜以為糇糧自此長安城中盡空並皆四散二三年間關中無復行人建安元年車駕至洛陽宮闈蕩滌百官披荊棘而居焉州郡各擁強兵而委輸不至尚書郎官自出採或不能自反死於墟巷魏武之初九州雲擾攻城掠地保此懷民軍旅之資權時調給于時袁紹軍人皆資椹棗袁術戰士取給螺蒲魏武于是乃募良民屯田許下又於州郡列置田官歲有數千萬斛以充兵戎之用及初平袁氏以定鄴都令收田租畝粟四升戶絹二匹而綿二斤餘皆不得擅興藏強賦弱文帝黃初二年以穀貴始罷五銖錢于時天下未并戎車歲動孔子曰加之以師旅因之以饑饉此言兵凶之謀而沴氣應之也于時三方之人志相吞滅戰勝攻取耕夫釋耒江淮之鄉尤缺儲峙吳上大將軍陸遜抗疏請令諸將各廣其田權報曰甚善今孤父子親自受田車中八牛以為四耦雖未及古人亦欲與衆均勞也有吳之務農重穀始於此焉魏明帝不恭淫於官百僚編於手役天下失其躬稼此後關東遇水民亡産業而興師遼陽坐甲江甸皆以國乏經用胡可勝言世祖武皇帝太康元年既平孫晧納百萬而罄三吳之資接千年而總西蜀之用韜干戈於府庫破舟船於江壑河濱海岸三丘八藪耒耨之所不至者人皆受焉農祥晨正平秩東作荷鍤贏糧有同雲布若夫因天而資五緯因地而興五材世屬升平物流倉府官闈增飾服玩相輝於是王君夫武子石崇等更相誇尚輿服鼎俎之盛連衡帝室布金埒之泉粉珊瑚之樹物盛則衰固其宜也永寧之初洛中尚有錦帛四百萬珠寶金銀百餘斛惠后北征蕩陰反駕寒桃在御隻雞以給其布衾兩幅囊錢三千以為車駕之資焉懷帝為劉曜所圍王師纍敗府帑既竭百官飢甚比屋不見火煙飢人自相啖食愍皇西宅餒饉弘多斗米二金死者太半劉曜陳兵內外斷絶十之麴屑而供帝君臣相顧莫不揮涕元后渡江軍事草創蠻陬賧布不有恆準中府所儲數四千匹于時石勒勇鋭挻亂淮南帝懼其侵逼甚患之乃詔方鎮云有斬石勒首者賞布千匹云漢自董卓之亂百姓流離穀石至五十餘萬人多相食魏武既破黃巾欲經略四方而苦軍食不足羽林監潁川棗祗建置屯田議魏武乃令日夫定國之術在於強兵足食秦人以急農兼天下孝武以屯田定西域此先世之良式也於是以任峻為典農中郎將募百姓屯田許下得穀百萬斛郡國列置田官數年之中所在積粟倉廩皆滿祗死魏武後追思其功封爵其子建安初關中百姓流入荊州者十餘萬家及聞本土安寧皆企望思歸而無以自業於是衛覬議為鹽者國之大寶自喪亂以來放散今宜如舊置使者監賣以其直益市犁牛百姓歸者以供給之勤耕積粟以豐殖關中遠者聞之必多競還於是魏武遣謁者僕射監鹽官移司隸校尉居弘農流人果還關中豐實既而又以沛國劉馥為揚州刺史鎮合肥廣屯田修芍陂茹陂七門吳塘諸堨以溉稻田公私有蓄歷代為利賈逵之為豫州南與吳接修守戰之具堨汝水造新陂又通運渠二百餘里所謂賈侯渠者也當黃初中四方郡守墾田又加以故國用不匱時濟北顏斐為京兆太守京兆自馬超之亂百姓不專農殖乃無車牛斐又課百姓令間月取車材轉相教匠其無牛者令養猪投貴賣以買牛始者皆以為煩一二年中編戶皆有車牛於田役省贍京兆遂以豐沃鄭渾為沛郡太守郡居下溼水潦為患百姓飢乏渾於蕭相二縣興陂堨開稻田郡人皆不以為便渾以為終有經久之利遂躬率百姓興功一冬皆成比年大收頃畝歲增租入倍常郡中賴其利刻石頌之號曰鄭陂魏明帝世徐邈為涼州土地少雨常苦乏穀邈上修武威酒泉鹽池以收虜穀又廣開水田募貧民佃之家家豐足倉庫盈溢及度支州界軍用之餘以市金錦犬馬通供中國之費西域人入貢財貨流通皆邈之功也其後皇甫隆為敦煌太守敦煌俗不作耬犂及不知用水人牛功力既費而收穀更少隆到乃教作耬犁又教使灌溉歲終率計所省庸力過半得穀加五西方以豐嘉平四年關中饑宣帝表徙冀州農夫五千人佃上邽興京兆天水南安鹽池以益軍實青龍元年開成國渠自陳倉至槐里築臨晉陂引汧洛溉舄鹵之地三千餘頃國以充實焉正始四年宣帝又督諸軍伐吳將諸葛恪焚其積聚恪棄城遁走帝因欲廣田積穀為兼并之計乃使鄧艾行陳項以東至壽春地艾以為田良水少不足以盡地利宜開河渠可以大積軍糧又通運漕之道乃著濟河論以喻其指又以為昔破黃巾因為屯田積穀許都以制四方今三隅已定事在淮南每大軍征舉運兵過半功費巨億以為大役陳蔡之間土下田良可省許昌左右諸稻田并水東下令淮北二萬人淮南三萬人分休且佃且守水豐常收三倍於西計除衆費歲完五百萬斛以為軍資六七年間可積三千萬餘斛於淮土此則十萬之衆五年食也以此乘敵無不克矣宣帝善之皆如艾計施行遂北臨淮水自鍾離而南橫石以西盡沘水四百餘里五里置一營營六十人且佃且守兼修廣淮陽百尺二渠上引河流下通淮潁大治諸陂於潁南潁北穿渠三百餘里溉田二萬頃淮南淮北皆相連接自壽春到京師農官兵田雞犬之聲阡陌相屬每東南有事大軍出征泛舟而下達于江淮資食有儲而無水害艾所建也及晉受命武帝欲平一江表時穀賤而布帛貴帝欲立平糴法用布帛巿穀以為糧儲議者謂軍資尚少不宜以貴易賤泰始二年帝乃下詔曰夫百姓年豐則用奢凶荒則窮匱是相報之理也故古人權量國用取贏散滯有輕重平糴之法理財鈞施惠而不費政之善者也然此事廢久天下希習其宜加以官蓄未廣言者異同財貨未能達通其制更令國寶散於穰歲而上不收貧弱困於荒年而國無備豪人富商挾輕資蘊重積以管其利故農夫苦其業而末作不可禁也今者省徭務本并力墾殖欲令農功益登耕者益勸而猶或騰踊至於農人並傷今宜通糴以充儉乏主者平議具為條制然事竟未行是時江南未平朝廷厲精於稼穡四年正月丁亥帝親耕藉田庚寅詔曰使四海之內棄末反本競農務功能奉宣朕志令百姓勸事樂業者其唯郡縣長吏乎先之勞之在於不倦每念其經營職事亦為勤矣其以中左典牧種草馬賜縣令長相及郡國丞各一匹是歲乃立常平倉豐則糴儉則糶以利百姓五年正月癸巳敕戒郡國計吏諸郡國守相令長務盡地利禁游食商販其休假者令與父兄同其勤勞豪勢不得侵役寡弱私相置名十月詔以司隸校尉石鑒所上汲郡太守王宏勤恤百姓導化有方督勸開荒五千餘頃遇年普饑而郡界獨無匱乏可謂能以勸教時同功異者矣其賜穀千斛布告天下八年司徒石苞奏州郡農桑未有殿最之制宜增掾屬令史有所循行帝從之事見石苞傳苞既明於勸課百姓安之十年光祿勳夏侯和上修新渠富壽遊陂三渠凡溉田千五百頃咸寧元年十二月詔曰出戰入耕雖自古之常然事力未息未嘗不以戰士為念也今以鄴奚官奴婢著新城代田兵種稻奴婢各五十人為一屯屯置司馬使皆如屯田法三年又詔曰今年霖雨過差又有蟲災潁川襄城自春以來略不下種深以為慮主者何以為百姓計促處當之杜預上疏曰臣輒思惟今者水災東南特劇非但五稼不收居業并損下田所在停汙高地皆多磽塉此即百姓困窮方在來年雖詔書切告長吏二千石為之設計而不廓開大制定其趣舍之宜恐徒文具所益蓋薄當今秋夏蔬食之時而百姓已有不贍前至冬春野無青草則必指仰官穀以為生命此乃一方之大事不可不豫為思慮者也臣愚謂既以水為困當恃魚菜螺而洪波泛濫貧弱者終不能得今者宜大壞兗豫州東界諸陂隨其所歸而宣導之交令饑者盡得水産之饒百姓不出境界之內旦暮野食此目下日給之益也水去之後填淤之田畝收數鍾至春大種五穀五穀必豐此又明年益也臣前啓典牧種牛不供耕駕至於老不穿鼻者無益於用而徒有吏士穀草之費歲送任駕者甚少尚復不調習宜大出賣以易穀及為賞直詔曰孳育之物不宜減散事遂停寢問主者今典虞右典牧種産牛大小相通有四萬五千餘頭苟不益世用頭數雖多其費日廣古者匹馬匹牛居則以耕出則以戰非如猪羊類也今徒養宜用之牛終為無用之費甚失事宜東南以水田為業人無牛犢今既壞陂可分種牛三萬五千頭以付二州將吏士庶使及春耕穀登之後頭責三百斛是為化無用之費得運水次成穀七百萬斛此又數年後之益也加以百姓降丘宅土將來公私之饒乃不可計其所留好種萬頭可即令右典牧都尉官屬養之人多畜少可並佃牧地明其考課此又三魏近甸歲當復入數十萬斛穀牛又皆當調習動可駕用皆今日之可全者也預又言諸欲修水田者皆以火耕水耨為便非不爾也然此事施於新田草萊與百姓居相絶離者耳往者東南草創人稀故得火田之利自頃戶口日增而陂堨歲決良田變生蒲葦人居沮澤之際水陸失宜放牧絶種樹木立枯皆陂之害也陂多則土薄水淺潦不下潤故每有水雨輒復橫流延及陸田言者不思其故因云此土不可陸種臣計漢之戶口以驗今之陂處皆陸業也其或有舊陂舊堨則堅完修固非今所謂當為人害者也臣前見尚書胡威啓宜壞陂其言懇至臣中者又見宋侯相應遵上便宜求壞泗陂徙運道時下都督度支共處當各據所見不從遵言臣案遵上事運道東詣壽春有舊渠可不由泗陂泗陂在遵地界壞地凡萬三千餘頃傷敗成業遵縣領應佃二千六百口可謂至少而猶患地狹不足肆力此皆水之為害也當所共恤而都督度支方復執異非所見之難直以不同害理也人心所見既不同利害之情又有異軍家之與郡縣士大夫之與百姓其意莫有同者此皆偏其利以忘其害者也此理之所以未盡而事之所以多患也臣又案豫州界二度支所領佃者州郡大軍雜士凡用水田七千五百餘頃耳計三年之儲不過二萬餘頃以常理言之無為多積無用之水況於今者水潦溢大為災害臣以為與其失當寧瀉之不滀宜發明詔敕刺史二千石其漢氏舊陂舊堨及山谷私家小陂皆當修繕以積水其諸魏氏以來所造立及諸因雨決溢蒲葦馬腸陂之類皆決瀝之長吏二千石躬親勸功諸食力之人並一時附功令比及水凍得粗枯涸其所修功實之人皆以俾之其舊陂堨溝渠當有所補塞者皆尋求微跡一如漢時故事豫為部分列上須冬東南休兵交代各留一月以佐之夫川瀆有常流地形有定體漢氏居人衆多猶以無患今因其所患而宣寫之跡古事以明近大理顯然可坐論而得臣不勝愚意竊謂最是今日之實益也朝廷從之及平吳之後有司又奏詔書王公以國為家京城不宜復有田宅今未暇作諸國邸當使城中有往來處近郊有芻䤝之田今可限之國王公侯京城得有一宅之處近郊田大國田十五頃次國十頃小國七頃城內無宅城外有者皆聽留之又制戶調之式丁男之戶歲輸絹三匹綿三斤女及次丁男為戶者半輸其諸邊郡或三分之二遠者三分之一夷人輸賨布戶一匹遠者或一丈男子一人占田七十畝女子三十畝其外丁男課田五十畝丁女二十畝次丁男半之女則不課男女年十六已上至六十為正丁十五已下至十三六十一已上至六十五為次丁十二已下六十六已上為老小不事遠夷不課田者輸義米戶三斛遠者五斗極遠者輸算錢人二十八文其官品第一至于第九各以貴賤占田品第一者占五十頃第二品四十五頃第三品四十頃第四品三十五頃第五品三十頃第六品二十五頃第七品二十頃第八品十五頃第九品十頃而又各以品之高卑蔭其親屬多者及九族少者三世宗室國賓先賢之後及士人子孫亦如之而又得蔭人以為衣食客及佃客品第六已上得衣食客三人第七第八品二人第九品及舉輦跡禽前驅由基強弩司馬羽林郎殿中冗從武賁殿中武賁持椎斧武騎武賁持鈒冗從武賁命中武賁武騎一人其應有佃客者官品第一第二者佃客無過五十戶第三品十戶第四品七戶第五品五戶第六品三戶第七品二戶第八品第九品一戶是時天下無事賦稅平均人咸安其業而樂其事及惠帝之後政教陵夷至於永嘉喪亂彌甚雍州以東人多飢乏更相鬻賣奔迸流移不可勝數幽并司冀秦雍六州大蝗草木及牛馬毛皆盡又大疾疫兼以饑饉百姓又為寇賊所殺流尸滿河白骨蔽野劉曜之逼朝廷議欲遷都倉垣人多相食饑疫總至百官流亡者十八九元帝為晉王課督農功詔二千石長吏以入穀多少為殿最其非宿衛要任皆宜赴農使軍各自佃作即以為廩太興元年曰徐揚二州土宜三麥可督令熯地投秋下種至夏而熟繼新故之交於以周濟所益甚大昔漢遣輕車使者泛勝之督三輔種麥而關中遂穰勿令後晚其後頻年麥雖有旱蝗而為益猶多二年三吳大饑死者以百數吳郡太守鄧攸輒開倉廩賑之元帝時使黃門侍郎虞桓彝開倉廩振給并省衆役百官各上封事後軍將軍應詹表曰夫一人不耕天下必有受其饑者而軍興以來征戰運漕朝廷宗廟百官用度既已殷廣下及工商流寓僮僕不親農桑而遊食者以十萬計不思開立美利而望國足人給豈不難哉古人言曰飢寒並至堯舜不能使野無寇盜貧富并兼雖臯陶不能使強不陵弱故有國有家者何嘗不務農重穀近魏武皇帝用棗祗韓浩之議廣建屯田又於征伐之中分帶甲之士隨宜開墾故下不甚勞而大功克舉也間者流人奔東吳東吳今儉皆已還反江西良田曠廢未久火耕水耨為功差易宜簡流人興復農官功勞報賞皆如魏氏故事一年中與百姓二年分稅三年計賦稅以使之公私兼濟則倉盈庾億可計日而待也又曰昔高祖使蕭何鎮關中光武令寇恂守河內魏武委鍾繇以西事故能使八表夷蕩區內輯寧今中州蕭條未蒙疆理此兆庶所以企望壽春一方之會去此不遠宜選都督有文武經略者遠以振河洛之形勢近以為徐豫之藩鎮綏集流散使人有攸依專委農功令事有所局趙充國農於金城以平西零諸葛亮耕於渭濱規抗上國今諸軍自不對敵皆宜齊課咸和五年成帝始度百姓田取十分之一率畝稅米三升六年以海賊寇抄運漕不繼發王公以下餘丁各運米六斛是後頻年水災旱蝗田收不至咸康初算度田稅米空懸五十餘萬斛尚書褚裒以下免官穆帝之世頻有大軍糧運不繼制王公以下十三戶共借一人助度支運升平初荀羡為北府都督鎮下邳起田于東陽之石鱉公私利之哀帝即位乃減田租畝收二升孝武太元二年除度田收租之制王公以下口稅三斛唯蠲在役之身八年又增稅米口五石至於末年天下無事時和年豐百姓樂業穀帛殷阜幾乎家給人足矣漢錢舊用五銖自王莽改革百姓皆不便之及公孫述僭號於蜀童謠曰黃牛白腹五銖當復好事者竊言王莽稱黃述欲繼之故稱白帝五銖漢貨言漢當復併天下也至光武中興除莽貨泉建武十六年馬援又上書曰富國之本在於食貨宜如舊鑄五銖錢帝從之於是復鑄五銖錢天下以為便及章帝時穀帛價貴縣官經用不足朝廷憂之尚書張林言今非但穀貴也百物皆貴此錢賤故爾宜令天下悉以布帛為租市買皆用之封錢勿出如此則錢少物賤矣又鹽者食之急也縣官可自賣鹽武帝時施行之名曰均輸於是事下尚書通議尚書朱暉議曰王制天子不言有無諸侯不言多少食祿者不與百姓爭利均輸之法與賈販無異以布帛為租則吏多姦官自賣鹽與下爭利非明王所宜行帝本以林言為是得暉議因發怒遂用林言少時復止桓帝時有上書言人以貨輕錢薄故致貧困宜改鑄大錢事下四府羣僚及太學能言之士孝廉劉陶上議曰臣伏讀鑄錢之詔平輕重之議訪覃幽微不遺窮賤是以藿食之人謬延逮及蓋以當今之憂不在於貨在乎人飢是以先王觀象育物敬授民時使男不逋畝女不下機故君臣之道行王路之教通由是言之食者乃有國之所寶百姓之至貴也竊以比年已來良苗盡於蝗螟之口杼柚空於公私之求所急朝夕之食所患靡盬之事豈謂錢之厚薄銖兩之輕重哉就使當今沙礫化為南金瓦石變為和玉使百姓渴無所飲飢無所食雖皇羲之純德唐虞之文明猶不能以保蕭牆之內也蓋百姓可百年無貨不可以一朝有飢故食為至急也議者不達農殖之本多言鑄冶之便或欲因緣行詐以賈國利國利將盡取者爭競造鑄之端於是乎生蓋萬人鑄之一人奪之猶不能給況今一人鑄之則萬人奪之乎雖以陰陽為炭萬物為銅役不食之民使不飢之士猶不能足無厭之求也夫欲民財殷阜要在止役禁奪則百姓不勞而足陛下聖德愍海內之憂戚傷天下之艱難欲鑄錢齊貨以救其弊此猶養魚沸鼎之中棲鳥烈火之上木水本魚鳥之所生也用之不時必至焦爛願陛下寬鍥薄之禁後冶鑄之議也帝竟不鑄錢及獻帝初平中董卓乃更鑄小錢由是貨輕而物貴穀一斛至錢數百萬至魏武為相於是罷之還用五銖是時不鑄錢既久貨本不多又更無增益故穀賤無已及黃初二年魏文帝罷五銖錢使百姓以穀帛為市至明帝世錢廢穀用既久人間巧僞漸多競溼穀以要利作薄絹以為市雖處以嚴刑而不能禁也司馬芝等舉朝大議以為用錢非徒豐國亦所以省刑今若更鑄五銖錢則國豐刑省於事為便魏明帝乃更立五銖錢至晉用之不聞有所改創孫權嘉禾五年鑄大錢一當五百赤烏元年又鑄當千錢故呂蒙定荊州孫權賜錢一億錢既太貴但有空名人間患之權聞百姓不以為便省息之鑄為器物官勿復出也私家有者並以輸藏平卑其直勿有所枉晉自中原喪亂元帝過江用孫氏舊錢輕重雜行大者謂之比輪中者謂之四文吳興沈充又鑄小錢謂之沈郎錢錢既不多由是稍貴孝武太元三年詔曰錢國之重寶小人貪利銷壞無已監司當以為意廣州夷人寶貴銅鼓而州境素不出銅聞官私賈人皆於此下貪比輪錢斤兩差重以入廣州貨與夷人鑄敗作鼓其重為禁制得者科罪安帝元興中桓玄輔政立議欲廢錢用穀帛孔琳之議曰洪範八政貨為食次豈不以交易所資為用之至要者乎若使百姓用力於為錢則是妨為生之業禁之可也今農自務穀工自務器各隸其業何嘗致勤於錢故聖王制無用之貨以通有用之財既無毀敗之費又省難運之苦此錢所以嗣功龜貝歷代不廢者也穀帛為寶本充衣食分以為貨則致損甚多又勞毀於商販之手耗棄於割截之用此之為弊著自於曩故鍾繇曰巧僞之人競溼穀以要利制薄絹以充資魏世制以嚴刑弗能禁也是以司馬芝以為用錢非徒豐國亦所以省刑錢之不用由於兵亂積久自致於廢有由而然漢末是也今既用而廢之則百姓頓亡其利今括囊天下之穀以周天下之食或倉廩充溢或糧靡并儲以相資通則貧者仰富致富之道實假於錢一朝斷之便為棄物是有錢無糧之人皆坐而飢困以此斷之又立弊也且據今用錢之處不以為貧用穀之處不以為富又人習來久革之必惑語曰利不百不易業況又錢便于穀邪魏明帝時錢廢穀用既久不以便於人乃舉朝大議精才達政之士莫不以宜復用錢下無異情朝無異論彼尚舍穀帛而用錢足以明穀帛之弊著於已誡也世或謂魏氏不用錢久積纍巨萬故欲行之利公富國斯殆不然晉文後舅犯之謀而先成季之信以為雖有一時之勳不如萬世之益于時名賢在列君子盈朝大謀天下之利害將定經國之要術若穀實便錢義不昧當時之近利而廢永用之通業斷可知矣斯實由困而思革改而更張耳近孝武之末天下無事時和年豐百姓樂業穀帛殷阜幾乎家給人足驗之實事錢又不妨人也頃兵革屢興荒饉荐及飢寒未振實此之由公既援而拯之大革視聽弘敦本之教明廣農之科敬授人時各從其業遊蕩知反務末自休同以南畝競力野無遺壤矣於此以往將升平必至何衣食之足恤愚謂救弊之術無取於廢錢朝議多同琳之故玄議不行
