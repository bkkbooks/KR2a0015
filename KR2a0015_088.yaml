body:
  text: 晉書卷八十八列傳第五十八孝友大矣哉孝之為德也分渾元而立體道貫三靈資品彙以順名功苞萬象用之于國動天地而降休徵行之于家感鬼神而昭景福若乃博施備物尊仁安義柔色承顏怡怡盡樂擊鮮就養亹亹忘劬集包思藝黍之勤循陔有採蘭之詠事親之道也屬屬如在哀哀罔極聚薪流慟銜索興嗟曬風樹以隤心俯寒泉而沫泣追遠之情也審德筮仕正務移官居高匪危在醜無爭協修升以匡化懷履冰而砥節立身之行也是以閔曾翼翼遵六教而緝貞規蔡董蒸蒸弘七體而垂令迹亦有至誠上感明祇下贊郭巨致錫金之慶陽雍標蒔玉之祉烏馴丹羽巢叔和之室鹿呈白毳擾功文之廬然則因彼孝慈而生友悌理在兼綜義歸一揆夫天倫之重共氣分形心睽則葉悴荊枝性合則華承棣萼乃有推肥代瘦徇急難之情讓果同衾盡歡愈之致緬窺緗素載流塵躅者歟晉氏始自中朝逮于江左雖百六之災遄及而君子之道未消孝悌名流猶為繼踵王偉元之行己許季義之立節夏方盛彥體至性以馳芬庾袞顏含篤友于而宣範自餘羣士咸標懿德採其遺絢足厲澆風故著孝友篇以續前史云耳李密李密字令伯犍為武陽人也一名虔父早亡母何氏改醮密時年數歲感戀彌至蒸蒸之性遂以成疾祖母劉氏躬自撫養密奉事以孝謹聞劉氏有疾則涕泣側息未嘗解衣飲膳湯藥必先嘗後進有暇則講學忘疲而師事譙周周門人方之游夏少仕蜀為郎數使吳有才辨吳人稱之蜀平泰始初詔徵為太子洗馬密以祖母年高無人奉養遂不應命乃上疏曰臣以險釁夙遭閔凶生孩六月慈父見背行年四歲舅奪母志祖母劉愍臣孤弱躬親撫養臣少多疾病九歲不行零丁辛苦至于成立既無伯叔終鮮兄弟門衰祚薄晚有兒息外無朞功強近之親內無應門五尺之童煢煢孑立形影相弔而劉早嬰疾病常在牀蓐臣侍湯藥未嘗廢離自奉聖朝沐浴清化前太守臣逵察臣孝廉後刺史臣榮舉臣秀才臣以供養無主辭不赴命明詔特下拜臣郎中尋蒙國恩除臣洗馬猥以微賤當侍東宮非臣隕首所能上報臣具以表聞辭不就職詔書切峻責臣逋慢郡縣逼迫催臣上道州司臨門急於星火臣欲奉詔奔馳則劉病日篤苟徇私情則告訴不許臣之進退實為狼狽伏惟聖朝以孝治天下凡在故老猶蒙矜恤況臣孤苦羸之極且臣少仕僞朝歷職郎署本圖宦達不矜名節今臣亡國賤俘至微至陋猥蒙拔擢寵命殊私豈敢盤桓有所希冀但以劉日薄西山氣息奄奄人命危淺朝不慮夕臣無祖母無以至今日祖母無臣無以終餘年母孫二人更相為命是以私情區區不敢棄遠臣密今年四十有四祖母劉今年九十有六是臣盡節於陛下之日長而報養劉之日短也烏鳥私情願乞終養臣之辛苦非但蜀之人士及二州牧伯之所明知皇天后土實所鑒見伏願陛下矜愍愚誠聽臣微志庶劉僥幸保卒餘年臣生當隕身死當結草帝覽之曰士之有名不虛然哉乃停召後劉終服闋復以洗馬徵至洛司空張華問之曰安樂公何如密曰可次齊桓華問其故對曰齊桓得管仲而霸用豎刁而蟲流安樂公得諸葛亮而抗魏任黃皓而喪國是知成敗一也次問孔明言教何碎密曰昔舜禹皋陶相與語故得簡雅大誥與凡人言宜碎孔明與言者無己敵言教是以碎耳華善之出為溫令而憎疾從事嘗與人書曰慶父不死魯難未已從事白其書司隸司隸以密在縣清慎弗之劾也密有才能常望內轉而朝廷無援乃遷漢中太守自以失分懷怨及賜餞東堂詔密令賦詩末章曰人亦有言有因有緣官無中人不如歸田明明在上斯語豈然武帝忿之於是都官從事奏免密官後卒於家二子賜興賜字宗石少能屬文嘗為玄鳥賦詞甚美州辟別駕舉秀才未行而終興字雋石亦有文才刺史羅尚辟別駕尚為李雄所攻使興詣鎮南將軍劉弘求救興因願留為弘參軍而不還尚白弘弘即奪其手版而遣之興之在弘府弘立諸葛孔明羊叔子碣使興俱為之文甚有辭理盛彥盛彥字翁子廣陵人也少有異才年八歲詣吳太尉戴昌昌贈詩以觀之彥於坐答之辭甚慷慨母王氏因疾失明彥每言及未嘗不流涕於是不應辟召躬自侍養母食必自哺之母既疾久至于婢使數見捶撻婢忿恨伺彥暫行取蠐螬炙飴之母食以為美然疑是異物密藏以示彥彥見之抱母慟哭絶而復蘇母目豁然即開從此遂愈彥仕吳至中書侍郎吳平陸雲薦之於刺史周浚本邑大中正劉頌又舉彥為小中正太康中卒夏方夏方字文正會稽永興人也家遭疫癘父母伯叔羣從死者十三人方年十四夜則號哭晝則負土十有七載葬送得畢因廬于墓側種植松柏烏鳥猛獸馴擾其旁吳時拜仁義都尉纍遷五官中郎將朝會未嘗乘車行必讓路吳平除高山令百姓有罪應加捶撻者方向之涕泣而不加罪大小莫敢犯焉在官三年州舉秀才還家卒年八十七王裒王裒字偉元城陽營陵人也祖修有名魏世父儀高亮雅直為文帝司馬東關之役帝問於衆曰近日之事誰任其咎儀對曰責在元帥帝怒曰司馬欲委罪於孤邪遂引出斬之裒少立操尚行己以禮身長八尺四寸容貌絶異音聲清亮辭氣雅正博學多能痛父非命未嘗西向而坐示不臣朝廷也於是隱居教授三徵七辟皆不就廬于墓側旦夕常至墓所拜跪攀柏悲號涕淚著樹樹為之枯母性畏雷母沒每雷輒到墓曰裒在此及讀詩至哀哀父母生我劬勞未嘗不三復流涕門人受業者並廢蓼莪之篇家貧躬耕計口而田度身而蠶或有助之者不聽諸生密為刈麥裒遂棄之知舊有致遺者皆不受門人為本縣所役告裒求屬令裒曰卿學不足以庇身吾德薄不足以蔭卿屬之何益且吾不執筆已四十年矣乃步擔乾飯兒負鹽豉草屩送所役生到縣門徒隨從者千餘人安丘令以為詣己整衣出迎之裒乃下道至土牛旁磬折而立云門生為縣所役故來送別因執手涕泣而去令即放之一縣以為恥鄉人管彥少有才而未知名裒獨以為必當自達拔而友之男女各始生便共許為婚彥後為西夷校尉卒而葬于洛陽裒後更嫁其女彥弟馥問裒裒曰吾薄志畢願山藪昔嫁姊妹皆遠吉凶斷絶每以此自誓今賢兄子葬父于洛陽此則京邑之人也豈吾結好之本意哉馥曰嫂齊人也當還臨淄裒曰安有葬父河南而隨母還齊用意如此何婚之有北海邴春少立志操寒苦自居負笈遊學鄉邑僉以為邴原復出裒以春性險狹慕名終必不成其後春果無行學業不終有識以此歸之裒常以為人之所行期於當歸善道何必以所能而責人所不能及洛京傾覆寇盜蜂起親族悉欲移渡江東裒戀墳壟不去賊大盛方行猶思慕不能進遂為賊所害許孜許孜字季義東陽吳寧人也孝友恭讓敏而好學年二十師事豫章太守會稽孔沖受詩書禮易及孝經論語學竟還鄉里沖在郡喪亡孜聞問盡哀負擔奔赴送喪還會稽蔬食執役制服三年俄而二親沒柴毀骨立杖而能起建墓于縣之東山躬自負土不受鄉人之助或愍孜羸憊苦求來助孜晝則不逆夜便除之每一悲號鳥獸翔集孜以方營大功乃棄其妻鎮宿墓所列植松柏亙五六里時有鹿犯其松栽孜悲歎曰鹿獨不念我乎明日忽見鹿為猛獸所殺置於所犯栽下孜悵惋不已乃為作冢埋於隧側猛獸即於孜前自撲而死孜益歎息又取埋之自後樹木滋茂而無犯者積二十餘年孜乃更娶妻立宅墓次蒸蒸朝夕奉亡如存鷹雉棲其梁簷鹿與猛獸擾其庭圃交頸同遊不相搏噬元康中郡察孝廉不起巾褐終身年八十餘卒于家邑人號其居為孝順里咸康中太守張虞上疏曰臣聞聖賢明訓存乎舉善褒貶所興不遠千載謹案所領吳寧縣物故人許孜至性孝友立節清峻與物恭讓言行不二當其奉師則在三之義盡及其喪親實古今之所難咸稱殊類致感猛獸弭害雖臣不及見然備聞斯語竊謂蔡順董黯無以過之孜沒積年其子尚在性行純賣心今亦家於墓側臣以為孜之履操世所希逮宜標其令跡甄其後嗣以酬既往以奬方來陽秋傳曰善善及其子孫臣不達大體請臺量議疏奏詔旌表門閭蠲復子孫其子生亦有孝行圖孜像於堂朝夕拜焉庾袞庾袞字叔褒明穆皇后伯父也少履勤儉篤學好問事親以孝稱咸寧中大疫二兄俱亡次兄毗復殆癘氣方熾父母諸弟皆出次於外袞獨留不去諸父兄強之乃曰袞性不畏病遂親自扶持晝夜不眠其間復撫柩哀臨不輟如此十有餘旬疫勢既歇家人乃反毗病得差袞亦無恙父老咸曰異哉此子守人所不能守行人所不能行歲寒然後知松柏之後凋始疑疫癘之不相染也初袞諸父並貴盛惟父獨守貧約袞躬親稼穡以給供養而執事勤恪與弟子樹籬跪以授條或曰今在隱屏先生何恭之過袞曰幽顯易操非君子之志也父亡作筥賣以養母母見其勤曰我無所食對曰母食不甘袞將何居母感而安之袞前妻荀氏繼妻樂氏皆官族富室及適袞俱棄華麗散資財與袞共安貧苦相敬如賓母終服喪居于墓側歲大饑藜羹不糝門人欲進其飯者而袞每曰已食莫敢為設及麥熟穫者已畢而採捃尚多袞乃引其羣子以退曰待其間及其捃也不曲行不旁掇跪而把之則亦大獲又與邑人入山拾橡分夷嶮序長幼推易居難禮無違者或有斬其墓柏莫知其誰乃召鄰人集于墓而自責焉因叩頭泣涕謝祖禰曰德之不修不能庇先人之樹袞之罪也父老咸亦為之垂泣自後人莫之犯撫諸孤以慈奉諸寡以仁事加於厚而教之義方使長者體其行幼者忘其孤孤甥郭秀比諸子姪衣食而每先之孤兄女曰芳將嫁美服既具袞乃刈荊苕為箕帚召諸子集之于堂男女以班命芳曰芳乎汝少孤汝逸汝豫不汝疪瑕今汝適人將事舅姑灑掃庭內婦之道也故賜汝此匪器之為美欲溫恭朝夕雖休勿休也而以舊宅與其長兄子賡翕及翕卒袞哀其早孤痛其成人而未娶乃撫柩長號哀感行路聞者莫不垂涕初袞父誡袞以酒每醉輒自責曰余廢先父之誡其何以訓人乃於父墓前自杖三十鄰人褚德逸者善事其親老而不倦袞每拜之嘗與諸兄過邑人陳準兄弟諸兄友之皆拜其母袞獨不拜準弟徽曰子不拜吾親何袞曰未知所以拜也夫拜人之親者將自同於人之子也其義至重袞敢輕之乎遂不拜準徽歎曰古有亮直之士君近之矣君若當朝則社稷之臣歟君若握兵臨大節孰能奪之方今徵聘君實宜之於是鄉黨薦之州郡交命察孝廉舉秀才清白異行皆不降志世遂號之為異行元康末潁川太守召為功曹袞服造役之衣杖鍤荷斧不俟駕而行曰請受下夫之役太守飾車而迎袞逡巡辭退請徒行入郡將命者遂逼扶升車納於功曹舍既而袞自取己車而寢處焉形雖恭而神有不可動之色太守知其不屈乃歎曰非常士也吾何以降之厚為之禮而遣焉齊王冏之唱義也張泓等肆掠于陽翟袞乃率其同族及庶姓保于禹山是時百姓安寧未知戰守之事袞曰孔子云不教而戰是謂棄之乃集諸羣士而謀曰二三君子相與處於險將以安保親尊全妻孥也古人有言千人聚而不以一人為主不散則亂矣將若之何衆曰善今日之主非君而誰袞默然有間乃言曰古人急病讓夷不敢逃難然人之立主貴從其命也乃誓之曰無恃險無怙亂無暴鄰無抽屋無樵採人所植無謀非德無犯非義勠力一心同恤危難衆咸從之於是峻險厄杜蹊徑修壁塢樹藩障考功庸計丈尺均勞逸通有無繕完器備量力任能物應其宜使邑推其長里推其賢而身率之分數既明號令不二上下有禮少長有儀將順其美匡救其惡及賊至袞乃勒部曲整行伍皆持滿而勿發賊挑戰晏然不動且辭焉賊服其慎而畏其整是以皆退如是者三時人語曰所謂臨事而懼好謀而成者其庾異行乎及冏歸于京師踰年不朝袞曰晉室卑矣寇難方興乃攜其妻子適林慮山事其新鄉如其故鄉言忠信行篤敬比及朞年而林慮之人歸之咸曰庾賢及石勒攻林慮父老謀曰此有大頭山九州之絶險也上有古人遺迹可共保之惠帝遷于長安袞乃相與登于大頭山而田於其下年穀未熟食木實餌石蘂同保安之有終焉之志及將收穫命子怞與之下山中塗目眩瞀墜崖而卒同保赴哭曰天乎獨不可舍我賢乎時人傷之曰庾賢絶塵避地超然遠迹固窮安陋木食山棲不與世同榮不與人爭利不免遭命悲夫袞學通詩書非法不言非道不行尊事耆老惠訓蒙幼臨人之喪必盡哀會人之葬必躬築勞則先之逸則後之言必行之行必安之是以宗族鄉黨莫不崇仰門人感慕為之樹碑焉有四子怞蔑澤捃在澤生故名澤因捃生故曰捃蔑後南渡江中興初為侍中蔑生願安成太守孫晷孫晷字文度吳國富春人吳伏波將軍秀之曾孫也晷為兒童未嘗被呵怒顧榮見而稱之謂其外祖薛兼曰此兒神明清審志氣貞立非常童也及長恭孝清約學識有理義每獨處幽暗之中容止瞻望未嘗傾邪雖侯家豐厚而晷常布衣蔬食躬親壟畝誦詠不廢欣然獨得父母愍其如此欲加優饒而夙興夜寐無暫懈也父母起居嘗饌雖諸兄親饋而晷不離左右富春車道既少動經江川父難於風波每行乘籃輿晷躬自扶侍所詣之處則於門外樹下藩屏之間隱息初不令主人知之兄嘗篤疾經年晷躬自扶侍藥石甘苦必經心目跋涉山水祈求懇至而聞人之善欣若有得聞人之惡慘若有失見人饑寒並周贍之鄉里贈遺一無所受親故有窮老者數人往來告索人多厭慢之而晷見之欣敬逾甚寒則與同衾食則與同器或解衣推被以恤之時年饑穀貴人有生刈其稻者晷見而避之須去而出既而自刈送與之鄉鄰感愧莫敢侵犯會稽虞喜隱居海嵎有高世之風晷欽其德聘喜弟預女為妻喜戒女棄華尚素與晷同志時人號為梁鴻夫婦濟陽江惇少有高操聞晷學行過人自東陽往候之始面便終日談宴結歡而別司空何充為揚州檄晷為主簿司徒蔡謨辟為掾屬並不就尚書張國明州土之望表薦晷公車特徵會卒時年三十八朝野嗟痛之晷未及大斂有一老父縕袍草屨不通姓名徑入撫柩而哭哀聲慷慨感于左右哭止便出容貌甚清眼瞳又方門者告之喪主怪而追焉直去不顧同郡顧和等百餘人歎其神貌有異而莫之測也顏含顏含字弘都琅邪莘人也祖欽給事中父默汝陰太守含少有操行以孝聞兄畿咸寧中得疾就醫自療遂死於醫家家人迎喪旐每繞樹而不可解引喪者顛仆稱畿言曰我壽命未死但服藥太多傷我五藏耳今當復活慎無葬也其父祝之曰若爾有命復生豈非骨肉所願今但欲還家不爾葬也旐乃解及還其婦夢之曰吾當復生可急開棺婦頗說之其夕母及家人又夢之即欲開棺而父不聽含時尚少乃慨然曰非常之事古則有之今靈異至此開棺之痛孰與不開相負父母從之乃共發棺果有生驗以手刮棺指爪盡傷然氣息甚微存亡不分矣飲哺將護纍月猶不能語飲食所須託之以夢闔家營視頓廢生業雖在母妻不能無倦矣含乃絶棄人事躬親侍養足不出戶者十有三年石崇重含淳行贈以甘旨含謝而不受或問其故答曰病者綿昧生理未全既不能進噉又未識人惠若當謬留豈施者之意也畿竟不起含二親既終兩兄繼沒次嫂樊氏因疾失明含課勵家人盡心奉養每日自嘗省藥饌察問息耗必簪屨束帶醫人疏方應須髯蛇膽而尋求備至無由得之含憂歎纍時嘗晝獨坐忽有一青衣童子年可十三四持一青囊授含含開視乃蛇膽也童子逡巡出戶化成青鳥飛去得膽藥成嫂病即愈由是著名本州辟不就東海王越以為太傅參軍出補闓陽令元帝初鎮下邳復命為參軍過江以含為上虞令轉王國郎中丞相東閣祭酒出為東陽太守東宮初建含以儒素篤行補太子中庶子遷黃門侍郎本州大中正歷散騎常侍大司農豫討蘇峻功封西平縣侯拜侍中除吳郡太守王導問含曰卿今蒞名郡政將何先答曰王師歲動編戶虛耗南北權豪競招遊食國弊家豐執事之憂且當徵之勢門使反田桑數年之間欲令戶給人足如其禮樂俟之明宰含所歷簡而有恩明而能斷然以威御下導歎曰顏公在事吳人斂手矣未之官復為侍中尋除國子祭酒加散騎常侍遷光祿勳以年老遜位成帝美其素行就加右光祿大夫門施行馬賜牀帳被褥敕太官四時致膳固辭不受于時論者以王導帝之師傅名位隆重百僚宜為降禮太常馮懷以問於含含曰王公雖重理無偏敬降禮之言或是諸君事宜鄙人老矣不識時務既而告人曰吾聞伐國不問仁人向馮祖思問佞於我我有邪德乎人嘗論少正卯盜跖其惡孰深或曰正卯雖姦不至剖人充膳盜跖為甚含曰為惡彰露人思加戮隱伏之姦非聖不誅由此言之少正為甚衆咸服焉郭璞嘗遇含欲為之筮含曰年在天位在人修己而天不與者命也守道而人不知者性也自有性命無勞蓍龜桓溫求婚於含含以其盛滿不許惟與鄧攸深交或問江左羣士優劣答曰周伯仁之正鄧伯道之清卞望之之節餘則吾不知也其雅重行實抑絶浮僞如此致仕二十餘年年九十三卒遺命素棺薄斂諡曰靖喪在殯而鄰家失火移棺紼斷火將至而滅僉以為淳誠所感也三子髦謙約髦歷黃門郎侍中光祿勳謙至安成太守約零陵太守並有聲譽劉殷劉殷字長盛新興人也高祖陵漢光祿大夫殷七歲喪父哀毀過禮服喪三年未曾見齒曾祖母王氏盛冬思堇而不言食不飽者一旬矣殷怪而問之王言其故殷時年九歲乃於澤中慟哭曰殷罪釁深重幼丁艱罰王母在堂無旬月之養殷為人子而所思無獲皇天后土願垂哀愍聲不絶者半日於是忽若有人云止止聲殷收淚視地便有堇生焉因得斛餘而歸食而不減至時堇生乃盡又嘗夜夢人謂之曰西籬下有粟寤而掘之得粟十五鍾銘曰七年粟百石以賜孝子劉殷自是食之七載方盡時人嘉其至性通感競以穀帛遺之殷受而不謝直云待後貴當相酬耳弱冠博通經史綜核羣言文章詩賦靡不該覽性倜儻有濟世之志儉而不陋清而不介望之頽然而不可侵也鄉黨親族莫不稱之郡命主簿州辟從事皆以供養無主辭不赴命司空齊王攸辟為掾征南將軍羊祜召參軍事皆以疾辭同郡張宣子識達之士也勸殷就徵殷曰當今二公有晉之棟楹也吾方希達如榱椽耳不憑之豈能立乎吾今王母在堂既應他命無容不竭盡臣禮便不得就養子輿所以辭齊大夫良以色養無主故耳宣子曰如子所言豈庸人所識哉而今而後吾子當為吾師矣遂以女妻之宣子者并州豪族也家富於財其妻怒曰我女年始十四姿識如此何慮不得為公侯妃而遽以妻劉殷乎宣子曰非爾所及也誡其女曰劉殷至孝冥感兼才識超世此人終當遠達為世名公汝其謹事之張氏性亦婉順事王母以孝聞奉殷如君父焉及王氏卒殷夫婦毀瘠幾至滅性時柩在殯而西鄰失火風勢甚盛殷夫婦叩殯號哭火遂越燒東家後有二白鳩巢其庭樹自是名譽彌顯太傅楊駿輔政備禮聘殷殷以母老固辭駿於是表之優詔遂其高志聽終色養敕所在供其衣食蠲其徭賦賜帛二百匹穀五百斛趙王倫篡位孫秀夙重殷名以散騎常侍徵之殷逃奔雁門及齊王冏輔政辟為大司馬軍咨祭酒既至謂殷曰先王虛心召君君不至今孤辟君君何能屈也殷曰世祖以大聖應期先王以至德輔世既堯舜為君稷契為佐故殷希以一夫而距千乘為不可回之圖幸邀唐虞之世是以不懼斧鉞之戮耳今殿下以神武睿姿除殘反政然聖迹稍粗嚴威滋肅殷若復爾恐招華士之誅故不敢不至也冏奇之轉拜新興太守明刑旌善甚有政能屬永嘉之亂沒於劉聰聰奇其才而擢任之纍至侍中太保録尚書事殷戒子孫曰事君之法當務幾諫凡人尚不可面斥其過而況萬乘乎夫犯顏之禍將彰君過宜上思召公咨商之義下念鮑勛觸鱗之誅也在聰之朝與公卿恂恂然常有後己之色士不修操行者無得入其門然滯理不申藉殷而濟者亦已百數有七子五子各授一經一子授太史公一子授漢書一門之內七業俱興北州之學殷門為盛竟以壽終王延王延字延元西河人也九歲喪母泣血三年幾至滅性每至忌日則悲啼至旬繼母卜氏遇之無道以蒲穰及敗麻頭與延貯衣其姑聞而問之延知而不言事母彌謹卜氏嘗盛冬思生魚敕延求而不獲抶之流血延尋汾叩凌而哭忽有一魚長五尺踊出水上延取以進母卜氏食之積日不盡於是心悟撫延如己生延事親色養夏則扇枕席冬則以身溫被隆冬盛寒體無全衣而親極滋味晝則傭賃夜則誦書遂究覽經史皆通大義州郡禮辟貪供養不起父母終後廬于墓側非其蠶不衣非其耕不食屬天下喪亂隨劉元海遷于平陽農蠶之暇訓誘宗族侃侃不倦家牛生一犢他人認之延牽而授與初無吝色其人後自知妄認送犢還延叩頭謝罪延仍以與之不復取也年六十方仕於劉聰稍遷尚書左丞至金紫光祿大夫聰死後靳準將作亂謀之于延延不從準既誅劉氏自號漢天王以延為左光祿大夫延又大罵不受準遂殺之王談王談吳興烏程人也年十歲父為鄰人竇度所殺談陰有復讎志而懼為度所疑寸刃不畜日夜伺度未得至年十八乃密市利鍤陽若耕鉏者度常乘船出入經一橋下談伺度行還伏草中度既過談於橋上以鍤斬之應手而死既而歸罪有司大守孔巖義其孝勇列上宥之巖諸子為孫恩所害無嗣談乃移居會稽修理巖父子墳墓盡其心力後太守孔廞究其義行元興三年舉談為孝廉時稱其得人談不應召終于家桑虞桑虞字子深魏郡黎陽人也父沖有深識遠量惠帝時為黃門郎河間王顒執權引為司馬沖知顒必敗就職一旬便稱疾求退虞仁孝自天至年十四喪父毀瘠過禮日以米百粒用糝藜藿其姊諭之曰汝毀瘠如此必至滅性滅性不孝宜自抑割虞曰藜藿雜米足以勝哀虞有園在宅北數里瓜果初熟有人踰垣盜之虞以園援多棘刺恐偷見人驚走而致傷損乃使奴為之開道及偷負瓜將出見道通利知虞使除之乃送所盜瓜叩頭請罪虞乃歡然盡以瓜與之嘗行寄宿逆旅同宿客失脯疑虞為盜虞默然無言便解衣償之主人曰此舍數失魚肉雞鴨多是狐貍偷去君何以疑人乃將脯主至山冢間尋求果得之客求還衣虞投之不顧虞諸兄仕于石勒之世咸登顯位惟虞恥臣非類陰欲避地海東會丁母憂遂止哀毀骨立廬于墓側五年後石勒以為武城令虞以密邇黃河去海微近將申前志欣然就職石季龍太守劉徵甚器重之徵遷青州刺史請虞為長史帶祝阿郡徵遇疾還鄴令虞監行州府屬季龍死國中大亂朝廷以虞名父之子必能立功海岱潛遣東莞人華挺授虞寧朔將軍青州刺史虞曰功名非吾志也乃附使者啓讓刺史靖居海右不交境外雖歷僞朝而不豫亂世以此高之卒于官虞五世同居閨門雍穆苻堅青州刺史苻朗甚重之嘗詣虞家升堂拜其母時人以為榮何琦何琦字萬倫司空充之從兄也祖父龕後將軍父阜淮南內史琦年十四喪父哀毀過禮性沈敏有識度好古博學居于宣城陽穀縣事母孜孜朝夕色養常患甘鮮不贍乃為郡主簿察孝廉除郎中以選補宣城涇縣令司徒王導引為參軍不就及丁母憂居喪泣血杖而後起停柩在殯為鄰火所逼煙焰已交家乏僮使計無從出乃匍匐撫棺號哭俄而風止火息堂屋一間免燒其精誠所感如此服闋乃慨然歎曰所以出身仕者非謂有尺寸之能以效智力實利微祿私展供養一旦煢然無復恃怙豈可復以朽鈍之質塵黷清朝哉於是養志衡門不交人事耽玩典籍以琴書自娛不營産業節儉寡欲豐約與鄉鄰共之鄉里遭亂姊沒人家琦惟有一婢便為購贖然不為小謙凡有贈遺亦不苟讓但於己有餘輒復隨而散之任心而行率意而動不占卜無所事司空陸玩太尉桓溫並辟命皆不就詔徵博士又不起簡文帝時為撫軍欽其名行召為參軍固辭以疾公車再徵通直散騎侍郎散騎常侍不行由是君子仰德莫能屈也桓溫嘗登琦縣界山喟然歎曰此山南有人焉何公真止足者也琦善養性老而不衰布褐蔬食以述作為事著三國評論凡所撰録百許篇皆行于世年八十二卒吳逵吳逵吳興人也經荒饑疾病合門死者十有三人逵時亦病篤其喪皆鄰里以葦席裹而埋之逵夫妻既存家極貧窘冬無衣被晝則傭賃夜燒磚甓晝夜在山未嘗休止遇毒蟲猛獸輒為之下道朞年成七墓十三棺時有賻贈一無所受太守張崇義之以羔雁之禮禮焉卒於家史臣曰尊親之道禮經之明訓孝友之義詩人之美談是知人倫之本罔茲攸尚盛翁子立行淳至素蓄異才流慟致其感通含哺申其就養戴昌賞其清韵陸雲嘉其茂德王裒隱居不從其辟行己莫逾其禮枯柏以應其誠驚雷以危其慮永言董蔡異時均美許孜少而敏學禮備在三馴雉棲其梁棟猛獸擾其庭圃居喪之禮實古今之所難焉庾叔褒不匱表於執勤則裕存乎敬業幽顯不易其操疫癘不駭其心急病讓夷之規有古人之風烈矣孫晷之匪懈王談之復讎神人惜其亡良守宥其罪劉殷幼丁艱酷柴毀逾制發三冬之堇賜七年之粟至誠之契義形于茲王延叩冰而召鱗扇席而清暑雖黃香孟宗抑為倫輩其餘羣子並孝養可崇清風素範高山景行會其宗流同斯志也贊曰德之所屆有感必徵孝哉王許永慕蒸蒸揮泗凋柏對榥巢鷹密彥夏庾夙標至性文度弘都勤修懿行敦彼孝友載光謠詠鳩馴長盛魚薦延元談桑義闡琦吳道存專洞之德咸摛左言
