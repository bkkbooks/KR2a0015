body:
  text: 晉書卷五十九列傳第二十九自古帝王之臨天下也皆欲廣樹藩屏崇固維城唐虞以前憲章蓋闕夏殷以後遺迹可知然而玉帛會于塗山雖云萬國至於分疆胙土猶或未詳洎乎周室粲焉可觀封建親賢並為列國當其興也周召贊其升平及其衰也桓文輔其危亂故得卜世之祚克昌卜年之基惟永逮王赧即世天祿已終虛位無主三十餘載爰及暴秦并吞天下戒衰周之削弱忽帝業之遠圖謂王室之陵遲由諸侯之強大於是罷侯置守獨尊諸己至乎子弟並為匹夫惟欲肆虐陵威莫顧謀孫翼子枝葉微弱宗祏孤危內無社稷之臣外闕藩維之助陳項一呼海內沸騰隕身於望夷繫頸於軹道事不師古二世而滅漢祖勃興爰革斯弊於是分王子弟列建功臣錫之山川誓以帶礪然而矯枉過直懲羹吹齏土地封疆踰越往古始則韓彭菹醢次乃吳楚稱亂然雖克滅權逼猶足維翰王畿洎成哀之後戚藩陵替君臣乘茲間隙竊位偷安光武雄略緯天慷慨下國遂能除凶靜亂復禹配天休祉盛於兩京鼎祚隆於四百宗支繼絶之力可得而言魏武忘經國之宏規行忌刻之小數功臣無立錐之地子弟君不使之人徒分茅社實傳虛爵本根無所庇廕遂乃三葉而亡有晉思改覆車復隆盤石或出擁旄節蒞嶽牧之榮入踐台階居端揆之重然而付託失所授任乖方政令不賞罰斯濫或有材而不任或無罪而見誅朝為伊周夕為莽卓機權失於上禍亂作於下楚趙諸王相仍構釁徒興晉陽之甲竟匪勤王之師始則為身擇利利未加而害及初乃無心憂國國非憂而奚拯遂使昭陽興廢有甚奕乘輿幽縶更同羑里胡羯陵侮宗廟丘墟良可悲也夫為國之有藩屏猶濟川之有舟楫安危成敗義實相資舟楫且完波濤不足稱其險藩屏式固禍亂何以成其階向使八王之中一藩繄賴如梁王之禦大敵若朱虛之除大憝則外寇焉敢憑陵內難奚由竊發縱令天子暗劣鼎臣奢放雖或顛沛未至土崩何以言之琅邪譬彼諸王權輕衆寡度長潔大不可同年遂能匹馬濟江奄有吳會存重宗社百有餘年雖曰天時抑亦人事豈如趙倫齊冏之輩河間東海之徒家國俱亡身名並滅善惡之數此非其效歟西晉之政亂朝危雖由時主然而煽其風速其禍者咎在八王故序而論之總為其傳云耳汝南王亮子粹矩羕宗熙矩子祐汝南文成王亮字子翼宣帝第四子也少清警有才用仕魏為散騎侍郎萬歲亭侯拜東中郎將進封廣陽鄉侯討諸葛誕於壽春失利免官頃之拜左將軍加散騎常侍假節出監豫州諸軍事五等建改封祁陽伯轉鎮西將軍武帝踐阼封扶風郡王邑萬戶置騎司馬增參軍掾屬持節都督關中雍涼諸軍事會秦州刺史胡烈為羌虜所害亮遣將軍劉旗騎督敬琰赴救不進坐是貶為平西將軍旗當斬亮與軍司曹冏上言節度之咎由亮而出乞丐旗死詔曰高平困急計城中及旗足以相拔就不能徑至尚當深進今奔突有投而坐視覆敗故加旗大戮今若罪不在旗當有所在有司又奏免亮官削爵土詔惟免官頃之拜撫軍將軍是歲吳將步闡來降假亮節都督諸軍事以納之尋加侍中之服咸寧初以扶風池陽四千一百戶為太妃伏氏湯沐邑置家令丞僕後改食南郡枝江太妃嘗有小疾祓於洛水亮兄弟三人侍從並持節鼓吹震耀洛濱武帝登陵雲臺望見曰伏妃可謂富貴矣其年進號衛將軍加侍中時宗室殷盛無相統攝乃以亮為宗師本官如故使訓導觀察有不遵禮法小者正以義方大者隨事聞奏三年徙封汝南出為鎮南大將軍都督豫州諸軍事開府假節之國給追鋒車皂輪犢車錢五十萬頃之徵亮為侍中撫軍大將軍領後軍將軍統冠軍步兵射聲長水等營給兵五百人騎百匹遷太尉録尚書事領太子太傅侍中如故及武帝寢疾為楊駿所排乃以亮為侍中大司馬假黃鉞大都督督豫州諸軍事出鎮許昌加軒懸之樂六佾之舞封子羕為西陽公未發帝大漸詔留亮委以後事楊駿聞之從中書監華廙索詔視遂不還帝崩亮懼駿疑己辭疾不入於大司馬門外哀而已表求過葬駿欲討亮亮知之問計於廷尉何勗勗曰今朝廷皆歸心於公公何不討人而懼為人所討或説亮率所領入廢駿亮不能用夜馳赴許昌故得免及駿誅詔曰大司馬汝南王亮體道沖粹通識政理宣翼之績顯於本朝二南之風流于方夏將憑遠猷以康王化其以亮為太宰録尚書事入朝不趨劍履上殿增掾屬十人給千兵百騎與太保衛瓘對掌朝政亮論賞誅楊駿之功過差欲以苟悅衆心由是失望楚王瑋有勳而好立威亮憚之欲奪其兵權瑋甚憾乃承賈后旨誣亮與瓘有廢立之謀矯詔遣其長史公孫宏與積弩將軍李肇夜以兵圍之帳下督李龍白外有變請距之亮不聽俄然楚兵登牆而呼亮驚曰吾無二心何至於是若有詔書其可見乎宏等不許促兵攻之長史劉準謂亮曰觀此必是姦謀府中俊如林猶可盡力距戰又弗聽遂為肇所執而歎曰我之忠心可破示天下也如何無道枉殺不辜是時大熱兵人坐亮于車下時人憐之為之交扇將及日中無敢害者瑋出令曰能斬亮者賞布千匹遂為亂兵所害投于北門之壁鬢髮耳鼻皆悉毀焉及瑋誅追復亮爵位給東園溫明祕器朝服一襲錢三百萬布絹三百匹喪葬之禮如安平獻王孚故事廟設軒懸之樂有五子粹矩羕宗熙粹字茂弘早卒矩字延明拜世子為屯騎校尉與父亮同被害追贈典軍將軍諡懷王子祐立是為威王祐字永猷永安中從惠帝北征帝遷長安祐反國及帝還洛以征南兵八百人給之特置四部牙門永興初率衆依東海王越討劉喬有功拜揚武將軍以江夏雲杜益封並前二萬五千戶越征汲桑表留祐領兵三千守許昌加鼓吹麾旗越還祐歸國永嘉末以寇賊充斥遂南渡江元帝命為軍咨祭酒建武初為鎮軍將軍太興末領左軍將軍太寧中進號衛將軍加散騎常侍咸和元年薨贈侍中特進子恭王統立以南頓王宗謀反被廢其後成帝哀亮一門殄絶詔統復封纍遷祕書監侍中薨追贈光祿勳子義立官至散騎常侍薨子遵之立義熙初梁州刺史劉稚謀反推遵之為主事泄伏誅弟楷之子蓮扶立宋受禪國除羕字延年太康末封西陽縣公拜散騎常侍亮之被害也羕時年八歲鎮南將軍裴楷與之親姻竊之以逃一夜八遷故得免及瑋誅進爵為王歷步兵校尉左軍驍騎將軍元康初進封郡王永興初拜侍中以長沙王乂黨廢為庶人惠帝還洛復羕封為撫軍將軍又以汝南期思西陵益其國永嘉初拜鎮軍將軍加散騎常侍領後軍將軍復以邾蘄春益之並前三萬五千戶隨東海王越東出鄄城遂南渡江元帝承制更拜撫軍大將軍開府給千兵百騎詔與南頓王宗統流人以實中州江西荒梗復還及元帝踐阼進位侍中太保以羕屬尊元會特為設牀太興初録尚書事尋領大宗師加羽葆斧鉞班劍六十人進位太宰及王敦平領太尉明帝即位以羕宗室元老特為之拜羕放縱兵士劫鈔所司奏免羕官詔不問及帝寢疾羕與王導同受顧命輔成帝時帝幼沖詔羕依安平獻王孚故事設牀帳於殿上帝親迎拜咸和初坐弟南頓王宗免官降為弋陽縣王及蘇峻作亂羕詣峻稱述其勳峻大悅矯詔復羕爵位峻平賜死世子播播弟充及息嵩並伏誅國除咸康初復其屬籍以羕孫珉為奉車都尉奉朝請宗字延祚元康中封南頓縣侯尋進爵為公討劉喬有功進封王增邑五千並前萬戶為征虜將軍與兄羕俱過江元帝承制拜散騎常侍愍帝之在西都以宗為平東將軍元帝即位拜撫軍將軍領左將軍明帝踐阼加長水校尉轉左衛將軍與虞胤俱為帝所昵委以禁旅宗與王導庾亮志趣不同連結輕俠以為腹心導亮並以為言帝以宗戚屬每容之及帝疾篤宗胤密謀為亂亮排闥入升御牀流涕言之帝始悟轉為驃騎將軍胤為大宗正宗遂怨望形於辭色咸和初御史中丞鍾雅劾宗謀反庾亮使右衛將軍趙胤收之宗以兵距戰為胤所殺貶其族為馬氏徙妻子于晉安既而原之三子綽超演廢為庶人咸康中復其屬籍綽為奉車都尉奉朝請熙初封汝陽公討劉喬有功進爵為王永嘉末沒於石勒楚王瑋楚隱王瑋字彥度武帝第五子也初封始平王歷屯騎校尉太康末徙封於楚出之國都督荊州諸軍事平南將軍轉鎮南將軍武帝崩入為衛將軍領北軍中候加侍中行太子少傅楊駿之誅也瑋屯司馬門瑋少年果鋭多立威刑朝廷忌之汝南王亮太保衛瓘以瑋性很戾不可大任建議使與諸王之國瑋甚忿之長史公孫宏舍人岐盛並薄於行為瑋所昵瓘等惡其為人慮致禍亂將收盛盛知之遂與宏謀因積弩將軍李肇矯稱瑋命譖亮瓘於賈后而后不之察使惠帝為詔曰太宰太保欲為伊霍之事王宜宣詔令淮南長沙成都王屯宮諸門廢二公夜使黃門齎以授瑋瑋欲覆奏黃門曰事恐漏泄非密詔本意也瑋乃止遂勒本軍復矯詔召三十六軍手令告諸軍曰天禍晉室凶亂相仍間者楊駿之難實賴諸君克平禍亂而二公潛圖不軌欲廢陛下以絶武帝之祀今輒奉詔免二公官吾今受詔都督中外諸軍諸在直衛者皆嚴加警備其在外營便相率領徑詣行府助順討逆天所福也懸賞開封以待忠效皇天后土實聞此言又矯詔使亮瓘上太宰太保印綬侍中貂蟬之國官屬皆罷遣之又矯詔赦亮瓘官屬曰二公潛謀欲危社稷今免還第官屬以下一無所問若不奉詔便軍法從事能率所領先出降者封侯受賞朕不食言遂收亮瓘殺之岐盛説瑋可因兵勢誅賈模郭彰匡正王室以安天下瑋猶豫未決會天明帝用張華計遣殿中將軍王宮齎騶虞幡麾衆曰楚王矯詔衆皆釋杖而走瑋左右無復一人窘迫不知所為惟一奴年十四駕牛車將赴秦王柬帝遣謁者詔瑋還營執之於武賁署遂下廷尉詔以瑋矯制害二公父子又欲誅滅朝臣謀圖不軌遂斬之時年二十一其日大風雷雨礔詔曰周公決二叔之誅漢武斷昭平之獄所不得已者廷尉奏瑋已伏法情用悲痛吾當發哀瑋臨死出其懷中青紙詔流涕以示監刑尚書劉頌曰受詔而行謂為社稷今更為罪託體先帝受枉如此幸見申列頌亦歔欷不能仰視公孫宏岐盛並夷三族瑋性開濟好施能得衆心及此莫不隕淚百姓為之立祠賈后先惡瓘亮又忌瑋故以計相次誅之永寧元年追贈驃騎將軍封其子範為襄陽王拜散騎常侍後為石勒所害趙王倫趙王倫字子彝宣帝第九子也母曰柏夫人魏嘉平初封安樂亭侯五等建改封東安子拜諫議大夫武帝受禪封琅邪郡王坐使散騎將劉緝買工所將盜御裘廷尉杜友正緝棄市倫當與緝同罪有司奏倫爵重屬親不可坐諫議大夫劉毅駁曰王法賞罰不阿貴賤然後可以齊禮制而明典刑也倫知裘非常蔽不語吏與緝同罪當以親貴議減不得闕而不論宜自於一時法中如友所正帝是毅駁然以倫親親故下詔赦之及之國行東中郎將宣威將軍咸寧中改封於趙遷平北將軍督鄴城守事進安北將軍元康初遷征西將軍開府儀同三司鎮關中倫刑賞失中氐羌反叛徵還京師尋拜車騎將軍太子太傅深交賈郭諂事中宮大為賈后所親信求録尚書張華裴頠固執不可又求尚書令華頠復不許愍懷太子廢使倫領右軍將軍時左衛司馬督司馬雅及常從督許超並嘗給事東宮二人傷太子無罪與殿中中郎士猗等謀廢賈后復太子以華頠不可移難與圖權倫執兵之要性貪冒可假以濟事乃説倫嬖人孫秀曰中宮凶妬無道與賈謐等共廢太子今國無嫡嗣社稷將危大臣將起大事而公名奉事中宮與賈郭親善太子之廢皆云豫知一朝事起禍必相及何不先謀之乎秀許諾言於倫倫納焉遂告通事令史張林及省事張衡殿中侍御史殷渾右衛司馬督路始使為內應事將起而秀知太子聰明若還東宮將與賢人圖政量己必不得志乃更説倫曰太子為人剛猛不可私請明公素事賈后時議皆以公為賈氏之黨今雖欲建大功於太子太子含宿怒必不加賞於明公矣當謂逼百姓之望翻覆以免罪耳此乃所以速禍也今且緩其事賈后必害太子然後廢后為太子報讎亦足以立功豈徒免禍而已倫從之秀乃微泄其謀使謐黨頗聞之倫秀因勸謐等早害太子以絶衆望太子既遇害倫秀之謀益甚而超雅懼後難欲悔其謀乃辭疾秀復告右衛佽飛督閭和和從之期四月三日丙夜一籌以鼓聲為應至期乃矯詔敕三部司馬曰中宮與賈謐等殺吾太子今使車騎入廢中宮汝等皆當從命賜爵關中侯不從誅三族於是衆皆從之倫又矯詔開門夜入陳兵道南遣翊軍校尉齊王冏將三部司馬百人排閣而入華林令駱休為內應迎帝幸東堂遂廢賈后為庶人幽之于建始殿收吳太妃趙粲及韓壽妻賈午等付暴室考竟詔尚書以廢后事仍收捕賈謐等召中書監侍中黃門侍郎八坐皆夜入殿執張華裴頠解結杜斌等於殿前殺之尚書始疑詔有詐郎師景露版奏請手詔倫等以為沮衆斬之以徇明日倫坐端門屯兵北向遣尚書和郁持節送賈庶人于金墉誅趙粲叔父中護軍趙浚及散騎侍郎韓豫等內外羣官多所黜免倫尋矯詔自為使持節大都督督中外諸軍事相國侍中王如故一依宣文輔魏故事置左右長史司馬從事中郎四人參軍十人掾屬二十人兵萬人以其世子散騎常侍荂領冗從僕射子馥前將軍封濟陽王虔黃門郎封汝陰王詡散騎侍郎封霸城侯孫秀等封皆大郡並據兵權文武官封侯者數千人百官總己聽於倫倫素庸下無智策復受制於秀秀之威權振於朝廷天下皆事秀而無求於倫秀起自琅邪小史纍官於趙國以諂媚自達既執機衡遂恣其姦謀多殺忠良以逞私欲司隸從事遊皓與殷渾有隙渾誘皓奴晉興偽告皓有異志秀不詳察即收皓及襄陽中正李邁殺之厚待晉興以為己部曲督前衛尉石崇黃門郎潘嶽皆與秀有嫌並見誅於是京邑君子不樂其生矣淮南王允齊王冏以倫秀驕僭內懷不平秀等亦深忌焉乃出冏鎮許奪允護軍允發憤起兵討倫允既敗滅倫加九錫增封五萬戶倫偽為飾讓詔遣百官詣府敦勸侍中宣詔然後受之加荂撫軍將軍領軍將軍馥鎮軍將軍領護軍將軍虔中軍將軍領右衛將軍詡為侍中又以孫秀為侍中輔國將軍相國司馬右率如故張林等並居顯要增相府兵為二萬人與宿衛同又隱匿兵士衆過三萬起東宮三門四角華櫓斷宮東西道為外徼或謂秀曰散騎常侍楊準黃門侍郎劉逵欲奉梁王肜以誅倫會有星變乃徙肜為丞相居司徒府轉準逵為外官倫無學不知書秀亦以狡黠小才貪淫昧利所共立事者皆邪佞之徒惟競榮利無深謀遠略荂淺薄鄙陋馥虔暗很強戾詡愚嚚輕訬而各乖異互相憎毀秀子會年二十為射聲校尉尚帝女河東公主公主母喪未期便納聘禮會形貌短陋奴僕之下者初與富室兒於城西販馬百姓忽聞其尚主莫不駭愕倫秀並惑巫鬼聽妖邪之説秀使牙門趙奉詐為宣帝神語命倫早入西宮又言宣帝於北芒為趙王佐助於是別立宣帝廟於芒山謂逆謀可成以太子詹事裴劭左軍將軍卞粹等二十人為從事中郎掾屬又二十人秀等部分諸軍分布腹心使散騎常侍義陽王威兼侍中出納詔命矯作禪讓之詔使使持節尚書令滿奮僕射崔隨為副奉皇帝璽綬以禪位于倫倫偽讓不受於是宗室諸王羣公卿士咸假稱符瑞天文以勸進倫乃許之左衛王輿與前軍司馬雅等率甲士入殿譬喻三部司馬示以威賞皆莫敢違其夜使張林等屯守諸門義陽王威及駱休等逼奪天子璽綬夜漏未盡內外百官以乘輿法駕迎倫惠帝乘雲母車鹵簿數百人自華林西門出居金墉城尚書和郁兼侍中散騎常侍琅邪王睿中書侍郎陸機從到城下而反使張衡衛帝實幽之也倫從兵五千人入自端門登太極殿滿奮崔隨樂廣進璽綬於倫乃僭即帝位大赦改元建始是歲賢良方正直言秀才孝廉良將皆不試計吏及四方使命之在京邑者太學生年十六以上及在學二十年皆署吏郡縣二千石令長赦日在職者皆封侯郡綱紀並為孝廉縣綱紀為廉吏以世子荂為太子馥為侍中大司農領護軍京兆王虔為侍中大將軍領軍廣平王詡為侍中撫軍將軍霸城王孫秀為侍中中書監驃騎將軍儀同三司張林等諸黨皆登卿將並列大封其餘同謀者咸超階越次不可勝紀至於奴卒厮役亦加以爵位每朝會貂蟬盈坐時人為之諺曰貂不足狗尾續而以苟且之惠取悅人情府庫之儲不充於賜金銀冶鑄不給於印故有白版之侯君子恥服其章百姓亦知其不終矣倫親祠太廟還遇大風飄折麾蓋孫秀既立非常之事倫敬重焉秀住文帝為相國時所居內府事無巨細必咨而後行倫之詔令秀輒改革有所與奪自書青紙為詔或朝行夕改者數四百官轉易如流矣時有雉入殿中自太極東階上殿驅之更飛西鍾下有頃飛去又倫於殿上得異鳥問皆不知名纍日向夕宮西有素衣小兒言是服劉鳥倫使録小兒并鳥閉置牢室明旦開視戶如故並失人鳥所在倫目上有瘤時以為妖焉時齊王冏河間王顒成都王穎並擁強兵各據一方秀知冏等必有異圖乃選親黨及倫故吏為三王參佐及郡守秀本與張林有隙雖外相推崇內實忌之及林為衛將軍深怨不得開府潛與荂箋具説秀專權動違衆心而功臣皆小人撓亂朝廷可一時誅之荂以書白倫倫以示秀秀勸倫誅林倫從之於是倫請宗室會於華林園召林秀及王輿入因收林殺之誅三族及三王起兵討倫檄至倫秀始大懼遣其中堅孫輔為上軍將軍積弩李嚴為折衝將軍率兵七千自延壽關出征虜張泓左軍蔡璜前軍閭和等率九千人自堮坂關出鎮軍司馬雅揚威莫原等率八千人自成臯關出召東平王楙為使持節衛將軍都督諸軍以距義師使楊珍晝夜詣宣帝別廟祈請輒言宣帝謝陛下某日當破賊拜道士胡沃為太平將軍以招福祐秀家日為淫祀作厭勝之文使巫祝選擇戰日又令近親於嵩山著羽衣詐稱仙人王喬作神仙書述倫祚長久以惑衆秀欲遣馥虔領兵助諸軍戰馥虔不肯虔素親愛劉輿秀乃使輿説虔虔然後率衆八千為三軍繼援而泓雅等連戰雖勝義軍散而輒合雅等不得前許超等與成都王穎軍戰于黃橋殺傷萬餘人泓徑造陽翟又於城南破齊王冏輜重殺數千人遂據城保邸閣而冏軍已在潁陰去陽翟四十里冏分軍渡潁攻泓等不利泓乘勝至于潁上夜臨潁而陳冏縱輕兵擊之諸軍不動而孫輔徐建軍夜亂徑歸洛自首輔建之走也不知諸軍督尚存乃云齊王兵盛不可當泓等已沒倫大震祕之而召虔及超還會泓敗冏露布至倫大喜乃復遣超而虔還已至庾倉超還濟河將士疑阻鋭氣內挫泓等悉其諸軍濟潁進攻冏營冏出兵擊其別率孫髦司馬談孫輔皆破之士卒散歸洛陽泓等收衆還營秀等知三方日急詐傳破冏營執得冏以誑惑其衆令百官皆賀而士猗伏胤孫會皆杖節各不相從倫復授太子詹事劉琨節督河北將軍率步騎千人催諸軍戰會等與義軍戰于激水大敗退保河上劉琨燒斷河橋自義兵之起百官將士咸欲誅倫秀以謝天下秀知衆怒難犯不敢出省及聞河北軍悉敗憂悶不知所為義陽王威勸秀至尚書省與八坐議征戰之備秀從之使京城四品以下子弟年十五以上皆詣司隸從倫出戰內外諸軍悉欲劫殺秀威懼自崇禮闥走還下舍許超士猗孫會等軍既並還乃與秀謀或欲收餘卒出戰或欲焚燒宮室誅殺不附己者挾倫南就孫旗孟觀等或欲乘船東走入海計未決王輿反之率營兵七百餘人自南掖門入敕宮中兵各守衛諸門三部司馬為應於內輿自往攻秀秀閉中書南門輿放兵登牆燒屋秀及超猗遽走出左衛將軍趙泉斬秀等以徇收孫奇於右衛營付廷尉誅之執前將軍謝惔黃門令駱休司馬督王潛皆於殿中斬之三部司馬兵於宣化闥中斬孫弼以徇時司馬馥在秀坐輿使將士囚之于散騎省以大戟守省閣八坐皆入殿中坐東除樹下王輿屯雲龍門使倫為詔曰吾為孫秀等所誤以怒三王今已誅秀其迎太上復位吾歸老于農畝傳詔以騶虞幡敕將士解兵文武官皆奔走莫敢有居者黃門將倫自華林東門出及荂皆還汶陽里第於是以甲士數千迎天子于金墉百姓咸稱萬歲帝自端門入升殿御廣室送倫及荂等付金墉城初秀懼西軍至復召虔還是日宿九曲詔遣使者免虔官虔懼棄軍將數十人歸于汶陽里梁王肜表倫父子凶逆宜伏誅百官會議于朝堂皆如肜表遣尚書袁敞持節賜倫死飲以金屑苦酒倫慚以巾覆面曰孫秀誤我孫秀誤我於是收荂馥虔詡付廷尉獄考竟馥臨死謂虔曰坐爾破家也百官是倫所用者皆斥免之臺省府衛僅有存者自兵興六十餘日戰所殺害僅十萬人凡與倫為逆豫謀大事者張林為秀所殺許超士猗孫弼謝惔殷渾與秀為王輿所誅張衡閭和孫髦高越自陽翟還伏胤戰敗還洛陽皆斬于東市蔡璜自陽翟降齊王冏還洛自殺王輿以功免誅後與東萊王蕤謀殺冏又伏法齊王冏鄭方齊武閔王冏字景治獻王攸之子也少稱仁惠好振施有父風初攸有疾武帝不信遣太醫診候皆言無病及攸薨帝往臨喪冏號踊訴父病為醫所誣詔即誅醫由是見稱遂得為嗣元康中拜散騎常侍領左軍將軍翊軍校尉趙王倫密與相結廢賈后以功轉遊擊將軍冏以位不滿意有恨色孫秀微覺之且憚其在內出為平東將軍假節鎮許昌倫篡遷鎮東大將軍開府儀同三司欲以寵安之冏因衆心怨望潛與離狐王盛潁川王處穆謀起兵誅倫倫遣腹心張烏覘之烏反曰齊無異志冏既有成謀未發恐事泄乃與軍司管襲殺處穆送首於倫以安其意謀定乃收襲殺之遂與豫州刺史何勗龍驤將軍董艾等起軍遣使告成都河間常山新野四王移檄天下征鎮州郡縣國咸使聞知揚州刺史郗隆承檄猶豫未決參軍王邃斬之送首于冏冏屯軍陽翟倫遣其將閭和張泓孫輔出堮坂與冏交戰冏軍失利堅壘自守會成都軍破倫衆於黃橋冏乃出軍攻和等大破之及王輿廢倫惠帝反正冏誅討賊黨既畢率衆入洛頓軍通章署甲士數十萬旌旗器械之盛震於京都天子就拜大司馬加九錫之命備物典策如宣景文武輔魏故事冏於是輔政居攸故宮置掾屬四十人大築第館北取五穀市南開諸署毀壞廬舍以百數使大匠營制與西宮等鑿千秋門牆以通西閣後房施鍾懸前庭舞八佾沈于酒色不入朝見坐拜百官符敕三臺選舉不均惟寵親昵以車騎將軍何勗領中領軍封葛旟為牟平公路秀小黃公衛毅陰平公劉真安鄉公韓泰封丘公號曰五公委以心膂殿中御史桓豹奏事不先經冏府即考竟之於是朝廷側目海內失望矣南陽處士鄭方露版極諫主簿王豹屢有針規冏並不能用遂奏豹殺之有白頭公入大司馬府大呼言有兵起不出甲子旬即收殺之冏驕恣日甚終無悛志前賊曹屬孫惠復上諫曰惠聞天下五難四不可而明公皆以居之矣捐宗廟之主忽千乘之重躬貫甲胄犯冒鋒刃此一難也奮三百之卒決全勝之策集四方之衆致英豪之士此二難也舍殿堂之尊居單幕之陋安囂塵之慘同將士之勞此三難也驅烏合之衆當凶強之敵任神武之略無疑阻之懼此四難也檄六合之內著盟信之誓升幽宮之帝復皇祚之業此五難也大名不可久荷大功不可久任大權不可久執大威不可久居未有行其五難而不以為難遺其不可而謂之為可惠竊所不安也自永熙以來十有一載人不見德惟戮是聞公族構篡奪之禍骨肉遭梟夷之刑羣王被囚檻之困妃主有離絶之哀歷觀前代國家之禍至親之亂未有今日之甚者也良史書過後嗣何觀天下所以不去於晉符命長存於世者主無嚴虐之暴朝無酷烈之政武帝餘恩獻王遺愛聖慈惠和尚經人心四海所係實在於茲今明公建不世之義而未為不世之讓天下惑之思求所悟長沙成都魯衛之密國之親親與明公計功受賞尚不自先今公宜放桓文之勳邁臧札之風芻狗萬物不仁其化崇親推近功遂身退委萬機於二王命方嶽於羣后耀義讓之旗鳴思歸之鑾宅大齊之墟振泱泱之風垂拱青徐之域高枕營丘之藩金石不足以銘高八音不足以贊美姬文不得專聖於前太伯不得獨賢於後今明公忘亢極之悔忽窮高之凶棄五嶽之安居纍卵之危外以權勢受疑內以百揆損神雖處高臺之上逍遙重仞之墉及其危亡之憂過於潁翟之慮羣下竦戰莫之敢言惠以衰亡之餘遭陽九之運甘矢石之禍赴大王之義脫褐冠胄從戎于許契闊戰陳功無可記當隨風塵待罪初服屈原放斥心存南郢樂毅適趙志戀北燕況惠受恩偏蒙識養雖復暫違情隆二臣是以披露血誠冒昧干忤言入身戮義讓功舉退就鈇鑕此惠之死賢於生也冏不納亦不加罪翊軍校尉李含奔于長安詐云受密詔使河間王顒誅冏因導以利謀顒從之上表曰王室多故禍難罔已大司馬冏雖唱義有興復皇位之功而定都邑克寧社稷實成都王之勳力也而冏不能固守臣節實協異望在許昌營有東西掖門官置治書侍御史長史司馬直立左右如侍臣之儀京城大清篡逆誅夷而率百萬之衆來繞洛城阻兵經年不一朝覲百官拜伏晏然南面壞樂官市署用自增廣輒取武庫祕杖嚴列不解故東萊王蕤知其逆節表陳事狀而見誣陷加罪黜徙以樹私黨僭立官屬幸妻嬖妾名號比之中宮沈湎酒色不恤羣黎董艾放縱無所畏忌中丞按奏而取退免張偉愡恫擁停詔可葛旟小豎維持國命操弄王爵貨賂公行羣姦聚黨擅斷殺生密署腹心實為貨謀斥罪忠良伺窺神器臣受重任蕃衛方嶽見冏所行實懷激憤即日翊軍校尉李含乘驛密至宣騰詔旨臣伏讀感切五情若灼春秋之義君親無將冏擁強兵樹置私黨權官要職莫非腹心雖復重責之誅恐不義服今輒勒兵精卒十萬與州征並協忠義共會洛陽驃騎將軍長沙王同奮忠誠廢冏還第有不順命軍法從事成都王穎明德茂親功高勳重往歲去就允合衆望宜為宰輔代冏阿衡之任顒表既至冏大懼會百僚曰昔孫秀作逆篡逼帝王社稷傾覆莫能禦難孤糾合義衆掃除元惡臣子之節信著神明二王今日聽信讒言造構大難當賴忠謀以和不協耳司徒王戎司空東海王越説冏委權崇讓冏從事中郎葛旟怒曰趙庶人聽任孫秀移天易日當時喋喋莫敢先唱公蒙犯矢石躬貫甲胄攻圍陷陳得濟今日計功行封事殷未遍三臺納言不恤王事賞報稽緩責不在府讒言僭逆當共誅討虛承偽書令公就第漢魏以來王侯就第寧有得保妻子者乎議者可斬於是百官震悚無不失色長沙王徑入宮發兵攻冏府冏遣董艾陳兵宮西又遣宋洪等放火燒諸觀閣及千秋神武門冏令黃門令王湖悉盜騶虞幡唱云長沙王矯詔又稱大司馬謀反助者誅五族是夕城內大戰飛矢雨集火光屬天帝幸上東門矢集御前羣臣救火死者相枕明日冏敗擒冏至殿前帝惻然欲活之叱左右促牽出冏猶再顧遂斬於閶闔門外徇首六軍諸黨屬皆夷三族幽其子淮陵王超樂安王冰濟陽王英于金墉暴冏尸於西明亭三日而莫敢收斂冏故掾屬荀闓等表乞殯葬許之初冏之盛也有一婦人詣大司馬府求寄産吏詰之婦人曰我截齊便去耳識者聞而惡之時又謠曰著布袙腹為齊持服俄而冏誅永興初詔以冏輕陷重刑前勳不宜堙沒乃赦其三子超冰英還第封超為縣王以繼冏祀歷員外散騎常侍光熙初追册冏曰咨故大司馬齊王冏王昔以宗藩穆胤紹世緒于東國作翰許京允鎮靜我王室誕率義徒同盟觸澤克成元勳大濟潁東朕用應嘉茂績謂篤爾勞俾式先典以疇茲顯懿廓土殊分跨兼吳楚崇禮備物寵侔蕭霍庶憑翼戴之重永隆邦家之望而恭德不建取侮二方有司過舉致王于戮古人有言曰用其法猶思其人況王功濟朕身勳存社稷追惟既往有悼於厥心哉今復王本封命嗣子還紹厥緒禮秩典度一如舊制使使持節大鴻臚即墓賜策祠以太牢魂而有靈祗服朕命肆寧爾心嘉茲寵榮子超嗣爵永嘉中懷帝下詔重述冏唱義元勳還贈大司馬加侍中假節追諡及洛陽傾覆超兄弟皆沒于劉聰冏遂無後太元中詔以故南頓王宗子柔之襲封齊王紹攸冏之祀歷散騎常侍元興初會稽王道子將討桓玄詔柔之兼侍中以騶虞幡宣告江荊二州至姑孰為玄前鋒所害贈光祿勳子建之立宋受禪國除鄭方者字子回慷慨有志節博涉史傳卓犖不常鄉閭有識者歎其奇而未能薦達及冏輔政專恣方發憤步詣洛陽自稱荊楚逸民獻書於冏曰方聞聖明輔世夙夜祗懼泰而不驕所以長守貴也今大王安不慮危耽于酒色燕樂過度其失一也大王檄命當使天下穆如清風宗室骨肉永無纖介今則不然其失二也四夷交侵邊境不靜大王自以功業興隆不以為念其失三也大王興義羣庶競赴天下雖寧人勞窮苦不聞大王振救之令其失四也又與義兵歃血而盟事定之後賞不踰時自清泰已來論功未分此則食言其失五也大王建非常之功居宰相之任謗聲盈塗人懷忿怨方以狂愚冒死陳誠冏含忍答之云孤不能致五闕若無子則不聞其過矣未幾而敗焉長沙王長沙厲王字士度武帝第六子也太康十年受封拜員外散騎常侍及武帝崩時年十五孺慕過禮會楚王瑋奔喪諸王皆近路迎之獨至陵所號慟以俟瑋拜步兵校尉及瑋之誅二公也守東掖門會騶虞幡出投弓流涕曰楚王被詔是以從之安知其非瑋既誅以同母貶為常山王之國身長七尺五寸開朗果斷才力絶人虛心下士甚有名譽三王之舉義也率國兵應之過趙國房子令距守殺之進軍為成都後係常山內史程恢將二於到鄴斬恢及其五子至洛拜撫軍大將軍領左軍將軍頃之遷驃騎將軍開府復本國見齊王冏漸專權嘗與成都王穎俱拜陵因謂穎曰天下者先帝之業也王宜維之時聞其言者皆憚之及河間王顒將誅冏傳檄以為內主冏遣其將董艾襲將左右百餘人手斫車幰露乘馳赴宮閉諸門奉天子與冏相攻起火燒冏府連戰三日冏敗斬之并誅諸黨與二千餘人顒本以弱冏強冀為冏所擒然後以為辭宣告四方共討之因廢帝立成都王己為宰相專制天下既而殺冏其計不果乃潛使侍中馮蓀河南尹李含中書令卞粹等襲並誅之顒遂與穎同伐京都穎遣刺客圖時長沙國左常侍王矩侍直見客色動遂殺之詔以為大都督以距顒連戰自八月至十月朝議以穎兄弟可以辭説而釋乃使中書令王衍行太尉光祿勳石陋行司徒使説穎令與分陝而居穎不從乂因致書於穎曰先帝應乾撫運統攝四海勤身苦己克成帝業六合清泰慶流子孫孫秀作逆反易天常卿興義衆還復帝位齊王恃功肆行非法上無宰相之心下無忠臣之行遂其讒惡離逖骨肉主上怨傷尋已蕩除吾之與卿友于十人同産皇室受封外都各不能闡敷王教經濟遠略今卿復與太尉共起大衆阻兵百萬重圍宮城羣臣同忿聊即命將示宣國威未擬摧殄自投溝澗蕩平山谷死者日萬酷痛無罪豈國恩之不慈則用刑之有常卿所遣陸機不樂受卿節鉞將其所領私通國家想來逆者當前行一尺卻行一丈卿宜還鎮以寧四海令宗族無羞子孫之福也如其不然念骨肉分裂之痛故復遣書穎復書曰文景受圖武皇乘運庶幾堯舜共康政道恩隆洪業本枝百世豈期骨肉豫禍后族專權楊賈縱毒齊趙內篡幸以誅夷而未靜息每憂王室心悸肝爛羊玄之皇甫商等恃寵作禍能不興慨於是征西羽檄四海雲應本謂仁兄同其所懷便當內擒商等收級遠送如何迷惑自為戎首上矯君詔下離愛弟推移輦轂妄動兵威還任豺狼棄戮親善行惡求福如何自勉前遣陸機董督節鉞雖黃橋之退而溫南收勝一彼一此未足增慶也今武士百萬良將鋭猛要當與兄整頓海內若能從太尉之命斬商等首投戈退讓自求多福穎亦自歸鄴都與兄同之奉覽來告緬然慷慨慎哉大兄深思進退也前後破穎軍斬獲六七萬人戰久糧乏城中大飢雖曰疲弊將士同心皆願效死而奉上之禮未有虧失張方以為未可克欲還長安而東海王越慮事不濟潛與殿中將收送金墉城表曰陛下篤睦委臣朝事臣小心忠孝神祇所鑒諸王承謬率衆見責朝臣無正各慮私困收臣別省送臣幽宮臣不惜軀命但念大晉衰微枝黨欲盡陛下孤危若臣死國寧亦家之利但恐快凶人之志無益於陛下耳殿中左右恨功垂成而敗謀劫出之更以距穎越懼難作欲遂誅黃門郎潘滔勸越密告張方方遣部將郅輔勒兵三千就金墉收至營炙而殺之寃痛之聲達於左右三軍莫不為之垂涕時年二十八將殯於城東官屬莫敢往故掾劉佑獨送之步持喪車悲號斷絶哀感路人張方以其義士不之問也初執權之始洛下謠曰草木萌牙殺長沙以正月二十五日廢二十七日死如謠言焉永嘉中懷帝以子碩嗣拜散騎常侍後沒于劉聰成都王穎成都王穎字章度武帝第十六子也太康末受封邑十萬戶後拜越騎校尉加散騎常侍車騎將軍賈謐嘗與皇太子博爭道穎在坐厲聲呵謐曰皇太子國之儲君賈謐何得無禮謐懼由此出穎為平北將軍鎮鄴轉鎮北大將軍趙王倫之篡也進征北大將軍加開府儀同三司及齊王冏舉義穎發兵應冏以鄴令盧志為左長史頓丘太守鄭琰為右長史黃門郎程牧為左司馬陽平太守和演為右司馬使兗州刺史王彥冀州刺史李毅督護趙驤石超等為前鋒羽檄所及莫不響應至朝歌衆二十餘萬趙驤至黃橋為倫將士猗許超所敗死者八千餘人士衆震駭穎欲退保朝歌用盧志王彥策又使趙驤率衆八萬與王彥俱進倫復遣孫會劉琨等率三萬人與猗超合兵距驤等精甲耀日鐵騎前驅猗既戰勝有輕驤之心未及溫十餘里復大戰猗等奔潰穎遂過河乘勝長驅左將軍王輿殺孫秀幽趙王倫迎天子反正及穎入京都誅倫使趙驤石超等助齊王冏攻張泓於陽翟泓等遂降冏始率衆入洛自以首建大謀遂擅威權穎營于太學及入朝天子親勞焉穎拜謝曰此大司馬臣冏之勳臣無豫焉見訖即辭出不復還營便謁太廟出自東陽城門遂歸鄴遣信與冏別冏大驚馳出送穎至七里澗及之穎住車言別流涕不及時事惟以太妃疾苦形於顏色百姓觀者莫不傾心至鄴詔遣兼太尉王粹加九錫殊禮進位大將軍都督中外諸軍事假節加黃鉞録尚書事入朝不趨劍履上殿穎拜受徽號讓殊禮九錫表論興義功臣盧志和演董洪王彥趙驤等五人皆封開國公侯又表稱大司馬前在陽翟與強賊相持既久百姓創痍飢餓凍餒宜急振救乞差發郡縣車一時運河北邸閣米十五萬斛以振陽翟飢人盧志言於穎曰黃橋戰亡者有八千餘人既經夏暑露骨中野可為傷惻昔周王葬枯骨故詩云行有死人尚或墐之況此等致死王事乎穎乃造棺八千餘枚以成都國秩為衣服斂祭葬於黃橋北樹枳籬為之塋域又立都祭堂刊石立碑紀其赴義之功使亡者之家四時祭祀有所仍表其門閭加常戰亡二等又命河內溫縣埋藏趙倫戰死士卒萬四千餘人穎形美而神昏不知書然器性敦厚委事於志故得成其美焉及齊王冏驕侈無禮於是衆望歸之詔遣侍中馮蓀中書令卞粹喻穎入輔政并使受九錫穎猶讓不拜尋加太子太保穎嬖人孟玖不欲還洛又程太妃愛戀鄴都以此議久不決留義募將士既久咸怨曠思歸或有輒去者乃題鄴城門云大事解散蠶欲遽請且歸赴時務昔以義來今以義去若復有急更相語穎知不可留因遣之百姓乃安及冏敗穎懸執朝政事無巨細皆就鄴咨之後張昌擾亂荊土穎拜表南征所在響赴既恃功驕奢百度弛廢甚於冏時穎方恣其欲而憚長沙王在內遂與河間王顒表請誅后父羊玄之左將軍皇甫商等檄使就第乃與顒將張方伐京都以平原內史陸機為前鋒都督前將軍假節穎次朝歌每夜矛戟有光若火其壘井中皆有龍象進軍屯河南阻清水為壘造浮橋以通河北以大木函盛石沈之以繫橋名曰石鱉陸機戰敗死者甚衆機又為孟玖所譖穎收機斬之夷其三族語在機傳於是進攻京城時常山人王輿合衆萬餘欲襲穎會被執其黨斬輿降穎既入京師復旋鎮于鄴增封二十郡拜丞相河間王顒表穎宜為儲副遂廢太子覃立穎為皇太弟丞相如故制度一依魏武故事乘輿服御皆遷于鄴表罷宿衛兵屬相府更以王官宿衛僭侈日甚有無君之心委任孟玖等大失衆望永興初左衛將軍陳眕殿中中郎逯苞成輔及長沙故將上官巳等奉大駕討穎馳檄四方赴者雲集軍次安陽衆十餘萬鄴中震懼穎欲走其掾步熊有道術曰勿動南軍必敗穎會其衆問計東安王繇乃曰天子親征宜罷甲縞素出迎請罪司馬王混參軍崔曠勸穎距戰穎從之乃遣奮武將軍石超率衆五萬次于蕩陰眕二弟匡規自鄴赴王師云鄴中皆已離散由是不甚設備超衆奄至王師敗績矢及乘輿侍中嵇紹死於帝側左右皆奔散乃棄天子於䤝中超遂奉帝幸鄴穎改元建武害東安王繇署置百官殺生自己立郊於鄴南安北將軍王浚寧北將軍東嬴公騰殺穎所置幽州刺史和演穎徵浚浚屯冀州不進與騰及烏丸羯朱襲穎候騎至鄴穎遣幽州刺史王斌及石超李毅等距浚為羯朱等所敗鄴中大震百僚奔走士卒分散穎懼將帳下數十騎擁天子與中書監盧志單車而走五日至洛羯朱追至朝歌不及而還河間王顒遣張方率甲卒二萬救穎至洛方乃挾帝擁穎及豫章王并高光盧志等歸于長安顒廢穎歸藩以豫章王為皇太弟穎既廢河北思之鄴中故將公師藩汲桑等起兵以迎穎衆情翕然顒復拜穎鎮軍大將軍都督河北諸軍事給兵千人鎮鄴穎至洛而東海王越率衆迎大駕所在鋒起穎以北方盛強懼不可進自洛陽奔關中值大駕還洛穎自華陰趨武關出新野帝詔鎮南將軍劉弘南中郎將劉陶收捕穎於是棄母妻單車與二子廬江王普中都王廓渡河赴朝歌收合故將士數百人欲就公師藩頓丘太守馮嵩執穎及普廓送鄴范陽王虓幽之而無他意屬虓暴薨虓長史劉輿見穎為鄴都所服慮為後患祕不發喪偽令人為臺使稱詔夜賜穎死穎謂守者田徽曰范陽王亡乎徽曰不知穎曰卿年幾徽曰五十穎曰知天命不徽曰不知穎曰我死之後天下安乎不安乎我自放逐於今三年身體手足不見洗沐取數斗湯來其二子號泣穎敕人將去乃散髮東首臥命徽縊之時年二十八二子亦死鄴中哀之穎之敗也官屬並奔散惟盧志隨從不怠論者稱之其後汲桑害東嬴公騰稱為穎報讎遂出穎棺載之於軍中每事啓靈以行軍令桑敗棄棺於故井中穎故臣收之改葬於洛陽懷帝加以縣王禮穎死後數年開封間有傳穎子年十餘歲流離百姓家東海王越遣人殺之永嘉中立東萊王蕤子遵為穎嗣封華容縣王後沒於賊國除河間王顒河間王顒字文載安平獻王孚孫太原烈王瓌之子也初襲父爵咸寧二年就國三年改封河間少有清名輕財愛士與諸王俱來朝武帝歎顒可以為諸國儀表元康初為北中郎將監鄴城九年代梁王肜為平西將軍鎮關中石函之制非親親不得都督關中顒於諸王為疏特以賢舉及趙王倫篡位齊王冏謀討之前安西參軍夏侯奭自稱侍御史在始平合衆得數千人以應冏遣信要顒顒遣主簿房陽河間國人張方討擒奭及其黨十數人於長安市腰斬之及冏檄至顒執冏使送之於倫倫徵兵於顒顒遣方率關右健將赴之方至華陰顒聞二王兵盛乃加長史李含龍驤將軍領督護席薳等追方軍回以應二王義兵至潼關而倫秀已誅天子反正含方各率衆還及冏論功雖怒顒初不同而終能濟義進位侍中太尉加三賜之禮後含為翊軍校尉與冏參軍皇甫商司馬趙驤等有憾遂奔顒詭稱受密詔伐冏因説利害顒納之便發兵遣使邀成都王穎以含為都督率諸軍屯陰盤前鋒次于新安去洛百二十里檄長沙王討冏及冏敗顒以含為河南尹使與馮蓀卞粹等潛圖害商知含前矯妄及與顒陰謀具以告乃誅含等顒聞含死即起兵以討商為名使張方為都督領精卒七萬向洛方攻商商距戰而潰方遂進攻西明門率中軍左右衛擊之方衆大敗死者五千餘人方初於駃水橋西為營於是築壘數重外引廩穀以足軍資復從天子出攻方戰輒不利及死方還長安詔以顒為太宰大都督雍州牧顒廢皇太子覃立成都王穎為太弟改年大赦左衛將軍陳眕奉天子伐穎顒又遣方率兵二萬救鄴天子已幸鄴方屯兵洛陽及王浚等伐穎穎挾天子歸洛陽方將兵入殿中逼帝幸其壘掠府庫將焚宮廟以絶衆心盧志諫乃止方又逼天子幸長安顒乃選置百官改秦州為定州及東海王越起兵徐州西迎大駕關中大懼方謂顒曰方所領猶有十餘萬衆奉送大駕還洛宮使成都王反鄴公自留鎮關中方北討博陵如此天下可小安無復舉手者顒慮事大難濟不許乃假劉喬節進位鎮東大將軍遣成都王穎總統樓褒王闡等諸軍據河橋以距越王浚遣督護劉根將三百騎至河上闡出戰為根所殺穎頓軍張方故壘范陽王虓遣鮮卑騎與平昌博陵衆襲河橋樓褒西走追騎至新安道路死者不可勝數初越以張方劫遷車駕天下怨憤唱義與山東諸侯剋期奉迎先遣説顒令送帝還都與顒分陝而居顒欲從之而方不同及東軍大捷成都等敗顒乃令方親信將郅輔夜斬方送首以示東軍尋變計更遣刁默守潼關乃咎輔殺方又斬輔顒先遣將呂朗等據滎陽范陽王虓司馬劉琨以方首示朗於是朗降時東軍既盛破刁默以入關顒懼又遣馬瞻郭偉於霸水禦之瞻等戰敗散走顒乘單馬逃于太白山東軍入長安大駕旋以太弟太保梁柳為鎮西將軍守關中馬瞻等出詣柳因共殺柳於城內瞻等與始平太守梁邁合從迎顒於南山顒初不肯入府長安令蘇衆記室督朱永勸顒表稱柳病卒輒知方事弘農太守裴廙秦國內史賈龕安定太守賈匹等起義討顒斬馬瞻梁邁等東海王越遣督護麋晃率國兵伐顒至鄭顒將牽秀距晃晃斬秀并其二子義軍據有關中顒保城而已永嘉初詔書以顒為司徒乃就徵南陽王模遣將梁臣於新安雍谷車上扼殺之并其三子詔以彭城元王植子融為顒嗣改封樂成縣王薨無子建興中元帝又以彭城康王釋子欽為融嗣東海王越東海孝獻王越字元超高密王泰之次子也少有令名謙虛持布衣之操為中外所宗初以世子為騎都尉與駙馬都尉楊邈及琅邪王胄子繇俱侍講東宮拜散騎侍郎歷左衛將軍加侍中討楊駿有功封五千戶侯遷散騎常侍輔國將軍尚書右僕射領遊擊將軍復為侍中加奉車都尉給溫信五十人別封東海王食六縣永康初為中書令徙侍中遷司空領中書監成都王穎攻長沙王固守洛陽殿中諸將及三部司馬疲於戰守密與左衛將軍朱默夜收別省逼越為主啓惠帝免官事定越稱疾遜位帝不許加守尚書令太安初帝北征鄴以越為大都督六軍敗越奔下邳徐州都督東平王楙不納越徑還東海成都王穎以越兄弟宗室之美下寬令招之越不應命帝西幸以越為太傅與太宰顒夾輔朝政讓不受東海中尉劉洽勸越發兵以備穎越以洽為左司馬尚書曹馥為軍司既起兵楙懼乃以州與越越以司空領徐州都督以楙領兗州刺史越三弟並據方任征伐輒選刺史守相朝士多赴越而河間王顒挾天子發詔罷越等皆令就國越唱義奉迎大駕還復舊都率甲卒三萬西次蕭縣豫州刺史劉喬不受越命遣子祐距之越軍敗范陽王虓遣督護田徽以突騎八百迎越遇祐於譙祐衆潰越進屯陽武山東兵盛關中大懼顒斬送張方首求和尋變計距越越率諸侯及鮮卑許扶歷駒次宿歸等步騎迎惠帝反洛陽詔越以太傅録尚書以下邳濟陽二郡增封及懷帝即位委政於越吏部郎周穆清河王覃舅越之姑子也與其妹夫諸葛玫共説越曰主上之為太弟張方意也清河王本太子為羣凶所廢先帝暴崩多疑東宮公盍思伊霍之舉以寧社稷乎言未卒越曰此豈宜言邪遂叱左右斬之以玫穆世家罪止其身因此表除三族之法帝始親萬機留心庶事越不悅求出藩帝不許越遂出鎮許昌永嘉初自許昌率苟晞及冀州刺史丁劭討汲桑破之越還于許長史潘滔説之曰兗州天下樞要公宜自牧乃轉苟晞為青州刺史由是與晞有隙尋詔越為丞相領兗州牧督兗豫司冀幽并六州越辭丞相不受自許遷于鄄城越恐清河王覃終為儲副矯詔收付金墉城尋害之王彌入許越遣左司馬王斌率甲士五千人入衛京都鄄城自壞越惡之移屯濮陽又遷于滎陽召田甄等六率甄不受命越遣監軍劉望討甄初東嬴公騰之鎮鄴也攜并州將田甄甄弟蘭任祉祁濟李惲薄盛等部衆萬餘人至鄴遣就穀冀州號為乞活及騰敗甄等邀破汲桑於赤橋越以甄為汲郡蘭為巨鹿太守甄求魏郡越不許甄怒故吾不至望既渡河甄退李惲薄盛斬田蘭率其衆降甄祉濟棄軍奔上黨越自滎陽還洛陽以太學為府疑朝臣二己乃誣帝舅王延等為亂遣王景率甲士三千人入宮收延等付廷尉殺之越解兗州牧領司徒越既與苟晞構怨又以頃興事多由殿省乃奏宿衛有侯爵者皆罷之時殿中武官並封侯由是出者略盡皆泣涕而去乃以東海國上軍將軍何倫為右衛將軍王景為左衛將軍領國兵數百人宿衛越自誅王延等大失衆望而多有猜嫌散騎侍郎高韜有憂國之言越誣以訕謗時政害之而不自安乃戎服入見請討石勒且鎮集兗豫以援京師帝曰今逆虜侵逼郊畿王室蠢蠢莫有固心朝廷社稷倚賴於公豈可遠出以孤根本對曰臣今率衆邀賊勢必滅之賊滅則不逞消殄已東諸州職貢流通此所以宣暢國威藩屏之宜也若端坐京輦以失機會則釁弊日滋所憂逾重遂行留妃裴氏世子鎮軍將軍毗及龍驤將軍李惲并何倫等守衛京都表以行臺隨軍率甲士四萬東屯于項王公卿士隨從者甚衆詔加九錫越乃羽檄四方曰皇綱失御社稷多難孤以弱才備當大任自頃胡寇內逼偏裨失利帝鄉便為戎州冠帶奄成殊域朝廷上下以為憂懼皆由諸侯蹉遂及此難投袂忘履討之已晚人情奉本莫不義奮當須合會之衆以俟戰守之備宗廟主上相賴匡救檄至之日便望風奮發忠臣戰士效誠之秋也所徵皆不至而苟晞又表討越語在晞傳越以豫州刺史馮嵩為左司馬自領豫州牧越專擅威權圖為霸業朝賢素望選為佐吏名將徑卒充于己府不臣之迹四海所知而公私罄乏所在寇亂州郡攜二上下崩離禍結釁深遂憂懼成疾永嘉五年薨于項祕不發喪以襄陽王範為大將軍統其衆還葬東海石勒追及於苦縣寧平城將軍錢端出兵距勒戰死軍潰勒命焚越柩曰此人亂天下吾為天下報之故燒其骨以告天地於是數十萬衆勒以騎圍而射之相踐如山王公士庶死者十餘萬王彌弟璋焚其餘衆并食之天下歸罪於越帝發詔貶越為縣王何倫李惲聞越之死祕不發喪奉妃裴氏及毗出自京邑從者傾城所經暴掠至洧倉又為勒所敗毗及宗室三十六王俱沒于賊李惲殺妻子奔廣宗何倫走下邳裴妃為人所略賣於吳氏太興中得渡江欲招魂葬越元帝詔有司詳議博士傅純曰聖人制禮以事緣情設冢椁以藏形而事之以凶立廟祧以安神而奉之以吉送形而往迎精而還此墓廟之大分形神之異制也至於室廟寢廟祊祭非一處所以廣求神之道而獨不祭於墓明非神之所處也今亂形神之別錯廟墓之宜違禮制義莫大於此於是下詔不許裴妃不奉詔遂葬越於廣陵太興末墓毀改葬丹徒初元帝鎮建鄴裴妃之意也帝深德之數幸其第以第三子沖奉越後薨無子成帝以少子奕繼之哀帝徙奕為琅邪王而東海無嗣隆安初安帝更以會稽忠王次子彥璋為東海王繼沖為曾孫為桓玄所害國除史臣曰昔高辛撫運釁起參商宗周嗣曆禍纏管蔡詳觀曩册逖聽前古亂臣賊子昭鑒在焉有晉鬱興載崇藩翰分茅錫瑞道光典儀台飾袞禮備彝章汝南以純和之姿失於無斷楚隱習果鋭之性遂成凶很或位居朝右或職參近禁俱為女子所詐相次受誅雖曰自貽良可哀也倫實庸璅見欺孫秀潛構異圖煽成姦慝乃使元良遘怨酷上宰陷誅夷乾耀以之暫傾皇綱於焉中圮遂裂冠毀冕幸百六之會綰璽揚纛窺九五之尊夫神器焉可偷安鴻名豈容妄假而欲託茲淫祀享彼天年凶暗之極未之有也冏名父之子唱義勤王摧偽業於既成拯皇輿於已墜策勳考績良足可稱然而臨禍忘憂逞心縱欲曾不知樂不可極盈難久持笑古人之未工忘己事之已拙向若採王豹之奇策納孫惠之嘉謀高謝袞章永表東海雖古之伊霍何以加焉長沙材力絶人忠概邁俗投弓掖門落落標壯夫之氣馳車魏闕懍懍懷烈士之風雖復陽九數屯在三之情無奪撫其遺節終始可觀穎既入總大權出居重鎮中臺藉以成務東夏資其宅心乃協契河間共圖進取而顒任李含之狙詐杖張方之陵虐遂使武閔喪元長沙授首逞其無君之志矜其不義之強鑾駕北巡異乎有征無戰乘輿西幸非由望秩觀風若火燎原猶可撲滅矧茲安忍能無及乎東海糾合同盟創為義舉匡復之功未立陵暴之釁已彰罄彼車徒固求出鎮既而帝京寡弱狡寇憑陵遂令神器劫遷宗社顛覆數十萬衆並垂餌於豺狼三十六王咸隕身於鋒刃禍難之極振古未聞雖及焚如猶為幸也自惠皇失政難起蕭牆骨肉相殘黎元塗炭胡塵驚而天地閉戎兵接而宮廟隳支屬肇其禍端戎羯乘其間隙悲夫詩所謂誰生厲階至今為梗其八王之謂矣贊曰亮總朝政瑋懷職競讒巧乘間艷妻過聽構怨連禍遞遭非命倫實下愚敢竊龍圖亂常姦位遄及嚴誅偉哉武閔首創宏謨德之不建良可悲夫長沙奉國始終靡慝功虧一簣奄罹殘賊章度勤王效立名揚合從關右犯順爭強事窮勢蹙俱為亂亡元超作輔出征入撫敗國喪師無君震主焚如之變抑惟自取
