body:
  text: 晉書卷七十二列傳第四十二郭璞郭璞字景純河東聞喜人也父瑗尚書都令史時尚書杜預有所增損瑗多駁正之以公方著稱終於建平太守璞好經術博學有高才而訥於言論詞賦為中興之冠好古文奇字妙於陰陽算曆有郭公者客居河東精於卜筮璞從之受業公以青囊中書九卷與之由是遂洞五行天文卜筮之術攘災轉禍通致無方雖京房管輅不能過也璞門人趙載嘗竊青囊書未及讀而為火所焚惠懷之際河東先擾璞筮之投策而嘆曰嗟乎黔黎將湮於異類桑梓其翦為龍荒乎於是潛結姻昵及交遊數十家欲避地東南抵將軍趙固會固所乘良馬死固惜之不接賓客璞至門吏不為通璞曰吾能活馬吏驚入白固固趨出曰君能活吾馬乎璞曰得健夫二三十人皆持長竿東行三十里有丘林社廟者便以竿打拍當得一物宜急持歸得此馬活矣固如其言果得一物似猴持歸此物見死馬便噓吸其鼻頃之馬起奮迅嘶鳴食如常不復見向物固奇之厚加資給行至廬江太守胡孟康被丞相召為軍咨祭酒時江淮清宴孟康安之無心南渡璞為占曰敗康不之信璞將促裝去之愛主人婢無由而得乃取小豆三斗繞主人宅散之主人晨見赤衣人數千圍其家就視則滅甚惡之請璞為卦璞曰君家不宜畜此婢可於東南二十里賣之慎勿爭價則此妖可除也主人從之璞陰令人賤買此婢復為符投於井中數千赤衣人皆反縛一一自投於井主人大悅璞攜婢去後數旬而廬江陷璞既過江宣城太守殷祐引為參軍時有物大如水牛灰色卑腳腳類象胸前尾上皆白大力而遲鈍來到城下衆咸異焉祐使人伏而取之令璞作卦遇遁之蠱其卦曰艮體連乾其物壯巨山潛之畜匪兕匪武身與鬼并精見二午法當為禽兩靈不許遂被一創還其本墅按卦名之是為驢鼠卜適了伏者以戟刺之深尺餘遂去不復見郡綱紀上祠請殺之巫云廟神不悅曰此是鰮亭驢山君鼠使詣荊山暫來過我不須觸之其精妙如此祐遷石頭督護璞復隨之時有鼯鼠出延陵璞占之曰此郡東當有妖人欲稱制者尋亦自死矣後當有妖樹生然若瑞而非瑞辛螫之木也儻有此者東南數百里必有作逆者期明年矣無錫縣欻有茱萸四株交枝而生若連理者其年盜殺吳興太守袁琇或以問璞璞曰卯爻發而沴金此木不曲直而成災也王導深重之引參己軍事嘗令作卦璞言公有震厄可命駕西出數十里得一柏樹截斷如身長置常寢處災當可消矣導從其言數日果震柏樹粉碎時元帝初鎮建鄴導令璞筮之遇咸之井璞曰東北郡縣有武名者當出鐸以著受命之符西南郡縣有陽名者井當沸其後晉陵武進縣人於田中得銅鐸五枚歷陽縣中井沸經日乃止及帝為晉王又使璞筮遇豫之睽璞曰會稽當出鍾以告成功上有勒銘應在人家井泥中得之繇辭所謂先王以作樂崇德殷薦之上帝者也及帝即位太興初會稽剡縣人果於井中得一鍾長七寸二分口徑四寸半上有古文奇書十八字云會稽嶽命餘字時人莫識之璞曰蓋王者之作必有靈符塞天人之心與神物合契然後可以言受命矣觀五鐸啓號於晉陵棧鍾告成於會稽瑞不失類出皆以方豈不偉哉若夫鐸發其響鍾徵其象器以數臻事以實應天人之際不可不察帝甚重之璞著江賦其辭甚偉為世所稱後復作南郊賦帝見而嘉之以為著作佐郎于時陰陽錯繆而刑獄繁興璞上疏曰臣聞春秋之義貴元慎始故分至啓閉以觀雲物所以顯天人之統存休咎之徵臣不揆淺見輒依歲首粗有所占卦得解之既濟案爻論思方涉春木王龍德之時而為廢水之氣來見乘加升陽未布隆陰仍積坎為法象刑獄所麗變坎加離厥象不燭以義推之皆為刑獄殷繁理有壅濫又去年十二月二十九日太白蝕月月者屬坎羣陰之府所以照察幽情以佐太陽者也太白金行之星而來犯之天意若曰刑理失中自壞其所以為法者也臣術學庸近不練內事卦理所及敢不盡言又去秋以來沈雨跨年雖為金家涉火之祥然亦是刑獄充溢怨歎之氣所致往建興四年十二月中行丞相令史淳于伯刑於市而血逆流長摽伯者小人雖罪在未允何足感動靈變致若斯之怪邪明皇天所以保祐金家子愛陛下屢見災異殷勤無已陛下宜側身思懼以應靈譴皇極之謫事不虛降不然恐將來必有愆陽苦雨之災崩震薄蝕之變狂狡蠢戾之妖以益陛下旰食之勞也臣謹尋按舊經尚書有五事供禦之術京房易傳有消復之救所以緣咎而致慶因異而邁政故木不生庭太戊無以隆雉不鳴鼎武丁不為宗夫寅畏者所以饗福怠傲者所以招患此自然之符應不可不察也案解卦繇云君子以赦過宥罪既濟云思患而豫防之臣愚以為宜發哀矜之詔引在豫之責蕩除瑕釁贊陽布惠使幽斃之人應蒼生以悅育否滯之氣隨谷風而紓散此亦寄時事以制用藉開塞而曲成者也臣竊觀陛下貞明仁恕體之自然天假其祚奄有區夏啓重光於已昧廓四祖之遐武祥靈表瑞人鬼獻謀應天順時殆不尚此然陛下即位以來中興之化未闡雖躬綜萬機勞逾日昃玄澤未加於羣生聲教未被乎宇宙臣主未寧于上黔細未輯于下鴻鴈之詠不興康哉之歌不作者何也杖道之情未著而任刑之風先彰經國之略未震而軌物之迹屢遷夫法令不一則人情惑職次數改則覬覦生官方不審則秕政作懲勸不明則善惡渾此有國者之所慎也臣竊為陛下惜之夫以區區之曹參猶能遵蓋公之一言倚清靖以鎮俗寄市獄以容非德音不忘流詠于今漢之中宗聰悟獨斷可謂令主然厲意刑名用虧純德老子以禮為忠信之薄況刑又是禮之糟粕者乎夫無為而為之不宰以宰之固陛下之所體者也恥其君不為堯舜者亦豈惟古人是以敢肆狂瞽不隱其懷若臣言可採或所以為塵露之益若不足採所以廣聽納之門願陛下少留神鑒賜察臣言疏奏優詔報之其後日有黑氣璞復上疏曰臣以頑昧近者冒陳所見陛下不遺狂言事蒙御省伏讀聖詔歡懼交戰臣前云升陽未布隆陰仍積坎為法象刑獄所麗變坎加離厥象不燭疑將來必有薄蝕之變也此月四日日出山六七丈精光潛昧而色都赤中有異物大如雞子又有青黑之氣共相薄擊良久方解案時在歲首純陽之月日在癸亥全陰之位而有此異殆元首供禦之義不顯消復之理不著之所致也計去微臣所陳未及一月而便有此變益明皇天留情陛下懇懇之至也往年歲末太白蝕月今在歲始日有咎謫曾未數旬大眚再見日月告釁見懼詩人無曰天高其鑒不遠故宋景言善熒惑退次光武寧亂呼結冰此明天人之懸符有若形影之相應應之以德則休祥臻酬之以怠則咎徵作陛下宜恭承靈譴敬天之怒施沛然之恩諧玄同之化上所以允塞天意下所以弭息羣謗臣聞人之多幸國之不幸赦不宜數實如聖旨臣愚以為子産之鑄刑書非政事之善然不得不作者須以救弊故也今之宜赦理亦如之隨時之宜亦聖人所善者此國家大信之要誠非微臣所得干豫今聖朝明哲思弘謀猷方闢四門以亮采訪輿誦於羣心況臣蒙珥筆朝末而可不竭誠盡規哉頃之遷尚書郎數言便宜多所匡益明帝之在東宮與溫嶠庾亮並有布衣之好璞亦以才學見重埒於嶠亮論者美之然性輕易不修威儀嗜酒好色時或過度著作郎干寶常誡之曰此非適性之道也璞曰吾所受有本限用之恐不得盡卿乃憂酒色之為患乎璞既好卜筮縉紳多笑之又自以才高位卑乃著客傲其辭曰客傲郭生曰玉以兼城為寶士以知名為賢明月不妄映蘭葩豈虛鮮今足下既以拔文秀於叢薈蔭弱根於慶雲陵扶搖而竦翮揮清瀾以濯鱗而響不徹於一臯價不登乎千金傲岸榮悴之際頡頏龍魚之間進不為諧隱退不為放言無沈冥之韵而希風乎嚴先徒費思於鑽味摹洞林乎連山尚何名乎夫攀驪龍之髯撫翠禽之毛而不得絶霞肆跨天津者未之前聞也郭生粲然而笑曰鷦鷯不可與論雲翼井蛙難與量海鼇雖然將袪子之惑訊以未悟其可乎乃者地維中絶乾光墜采皇運暫回廓祚淮海龍德時乘羣才雲駭藹若鄧林之會逸翰爛若溟海之納奔濤不煩咨嗟之訪不假蒲帛之招羈九有之奇駿咸總之于一朝豈惟豐沛之英南陽之豪昆吾挺鋒驌驦軒髦杞梓競敷蘭荑爭翹嚶聲冠於伐木援類繁乎拔茅是以水無浪士巖無幽人刈蘭不暇爨桂不給安事錯薪乎且夫窟泉之潛不思雲翬熙冰之采不羡旭晞混光耀於埃藹者亦曷願滄浪之深秋陽之映乎登降紛於九五淪湧懸乎龍津蚓蛾以不才陸槁蟒蛇以騰騖暴鱗連城之寶藏於褐𩹉三秀雖艷糜于麗采香惡乎芬賈惡乎在是以不塵不冥不驪不騂支離其神蕭悴其形形廢則神王跡粗而名生體全者為犧至獨者不孤傲俗者不得以自得默覺者不足以涉無故不恢心而形遺不外纍而智喪無巖穴而冥寂無江湖而放浪玄悟不以應機洞鑒不以昭曠不物物我我不是是非非忘意非我意意得非我懷寄羣籟乎無象域萬殊于一歸不壽殤子不夭彭涓不壯秋豪不小太山蚊淚與天地齊流蜉蝣與大椿齒年然一闔一開兩儀之跡一沖一溢懸象之節渙沍期於寒暑凋蔚要乎春秋青陽之翠秀龍豹之委穎駿狼之長暉玄陸之短景故臯壤為悲欣之府胡蝶為物化之器矣夫欣黎黃之音者不顰蟪蛄之吟豁雲臺之觀者必閟帶索之歡縱蹈而詠採薺擁璧而歎抱關戰機心以外物不能得意於一弦悟往復於嗟歎安可與言樂天者乎若乃莊周偃蹇於漆園老萊婆娑於林窟嚴平澄漠於塵肆梅真隱淪乎市卒梁生吟嘯而矯跡焦先混沌而槁杌阮公昏酣而賣傲翟叟遁形以倏忽吾不能幾韵於數賢故寂然玩此員策與智骨永昌元年皇孫生璞上疏曰有道之君未嘗不以危自持亂世之主未嘗不以安自居故存而不忘亡者三代之所以興也亡而自以為存者三季之所以廢也是以古之令主開納忠讜以弼其違摽顯切直用攻其失至乃聞一善則拜見規誡則懼何者蓋不私其身處天下以至公也臣竊惟陛下符運至著勳業至大而中興之祚不隆聖敬之風未躋者殆由法令太明刑教太峻故水至清則無魚政至察則衆乖此自然之勢也臣去春啓事以囹圄充斥陰陽不和推之卦理宜困郊祀作赦以蕩滌瑕穢不然將來必有愆陽苦雨之災崩震薄蝕之變狂狡蠢戾之妖其後月餘日果薄鬬去秋以來諸郡並有暴雨水皆洪潦歲用無年適聞吳興復欲有構妄者咎徵漸成臣甚惡之頃者以來役賦轉重獄犴日結百姓困擾甘亂者多小人愚嶮共相扇惑雖勢無所至然不可不虞案洪範傳君道虧則日蝕人憤怨則水涌溢陰氣積則下代上此微理潛應已著實於事者也假令臣遂不幸謬中必貽陛下側席之憂今皇孫載育天固靈基黔首顒顒實望惠潤又歲涉午位金家所忌宜於此時崇恩布澤則火氣潛消災譴不生矣陛下上承天意下順物情可因皇孫之慶大赦天下然後明罰敕法以肅理官克厭天心慰塞人事兆庶幸甚禎祥必臻矣臣今所陳暫而省之或未允聖旨久而尋之終亮臣誠若所啓上合願陛下勿以臣身廢臣之言臣言無隱而陛下納之適所以顯君明臣直之義耳疏奏納焉即大赦改年時暨陽人任谷因耕息於樹下忽有一人著羽衣就淫之既而不知所在谷遂有娠積月將産羽衣人復來以刀穿其陰下出一蛇子便去谷遂成宦者後詣闕上書自云有道術帝留谷于宮中璞復上疏曰任谷所為妖異無有因由陛下玄鑒廣覽欲知其情狀引之禁內供給安處臣聞為國以禮正不聞以奇邪所聽惟人故神降之吉陛下簡默居正動遵典刑案周禮奇服怪人不入宮況谷妖詭怪人之甚者而登講肆之堂密邇殿省之側塵點日月穢亂天聽臣之私情竊所以不取也陛下若以谷信為神靈所憑者則應敬而遠之夫神聰明正直接以人事若以谷為妖蠱詐妄者則當投畀裔土不宜令褻近紫闈若以谷或是神祇告譴為國作眚者則當克己修禮以弭其妖不宜令谷安然自容肆其邪變也臣愚以為陰陽陶蒸變化萬端亦是狐貍魍魎憑假作慝願陛下採臣愚懷特遣谷出臣以人乏忝荷史任敢忘直筆惟義是規其後元帝崩谷因亡走璞以母憂去職卜葬地於暨陽去水百步許人以近水為言璞曰當即為陸矣其後沙漲去墓數十里皆為桑田未朞王敦起璞為記室參軍是時潁川陳述為大將軍掾有美名為敦所重未幾而沒璞哭之哀甚呼曰嗣祖嗣祖焉知非福未幾而敦作難時明帝即位踰年未改號而熒惑守房璞時休歸帝乃遣使齎手詔問璞會暨陽縣復上言曰赤烏見璞乃上疏請改年肆赦文多不載璞嘗為人葬帝微服往觀之因問主人何以葬龍角此法當滅族主人曰郭璞云此葬龍耳不出三年當致天子也帝曰出天子邪答曰能致天子問耳帝甚異之璞素與桓彝友善彝每造之或值璞在婦間便入璞曰卿來他處自可徑前但不可廁上相尋耳必客主有殃彝後因醉詣璞正逢在廁掩而觀之見璞裸身被髮銜刀設醊璞見彝撫心大驚曰吾每屬卿勿來反更如是非但禍吾卿亦不免矣天實為之將以誰咎璞終嬰王敦之禍彝亦死蘇峻之難王敦之謀逆也溫嶠庾亮使璞筮之璞對不決嶠亮復令占己之吉凶璞曰大吉嶠等退相謂曰璞對不了是不敢有言或天奪敦魄今吾等與國家共舉大事而璞云大吉是為舉事必有成也於是勸帝討敦初璞每言殺我者山宗至是果有姓崇者構璞於敦敦將舉兵又使璞筮璞曰無成敦固疑璞之勸嶠亮又聞卦凶乃問璞曰卿更筮吾壽幾何答曰思向卦明公起事必禍不久若住武昌壽不可測敦大怒曰卿壽幾何曰命盡今日日中敦怒收璞詣南岡斬之璞臨出謂行刑者欲何之曰南岡頭璞曰必在雙柏樹下既至果然復云此樹應有大鵲巢衆索之不得璞更令尋覓果於枝間得一大鵲巢密葉蔽之初璞中興初行經越城間遇一人呼其姓名因以袴褶遺之其人辭不受璞曰但取後自當知其人遂受而去至是果此人行刑時年四十九及王敦平追贈弘農太守初庾翼幼時嘗令璞筮公家及身卦成曰建元之末丘山傾長順之初子凋零及康帝即位將改元為建元或謂庾冰曰子忘郭生之言邪丘山上名此號不宜用冰撫心歎恨及帝崩何充改元為永和庾翼歎曰天道精微乃當如是長順者永和也吾庸得免乎其年翼卒冰又令筮其後嗣卦成曰卿諸子並當貴盛然有白龍者凶徵至矣若墓碑生金庾氏之大忌也後冰子蘊為廣州刺史妾房內忽有一新生白狗子莫知所由來其妾祕愛之不令蘊知狗轉長大蘊入見狗眉眼分明又身至長而弱異於常狗蘊甚怪之將出共視在衆人前忽失所在蘊慨然曰殆白龍乎庾氏禍至矣又墓碑生金俄而為桓溫所滅終如其言璞之占驗皆如此類也璞撰前後筮驗六十餘事名為洞林又抄京費諸家要最更撰新林十篇卜韵一篇注釋爾雅別為音義圖譜又注三蒼方言穆天子傳山海經及楚辭子虛上林賦數十萬言皆傳於世所作詩賦誄頌亦數萬言子驁官至臨賀太守葛洪葛洪字稚川丹楊句容人也祖系吳大鴻臚父悌吳平後入晉為邵陵太守洪少好學家貧躬自伐薪以貿紙筆夜輒寫書誦習遂以儒學知名性寡欲無所愛玩不知局幾道摴蒲齒名為人木訥不好榮利閉門却掃未嘗交游於餘杭山見何幼道郭文舉目擊而已各無所言時或尋書問義不遠數千里崎嶇冒涉期於必得遂究覽典籍尤好神仙導養之法從祖玄吳時學道得仙號曰葛仙公以其鍊丹祕術授弟子鄭隱洪就隱學悉得其法焉後師事南海太守上黨鮑玄玄亦內學逆占將來見洪深重之以女妻洪洪傳玄業兼綜練醫術凡所著撰皆精核是非而才章富贍太安中石冰作亂吳興太守顧祕為義軍都督與周玘等起兵討之祕檄洪為將兵都尉攻冰別率破之遷伏波將軍冰平洪不論功賞徑至洛陽欲搜求異書以廣其學洪見天下已亂欲避地南土乃參廣州刺史嵇含軍事及含遇害遂停南土多年征鎮檄命一無所就後還鄉里禮辟皆不赴元帝為丞相辟為掾以平賊功賜爵關內侯咸和初司徒導召補州主簿轉司徒掾遷咨議參軍干寶深相親友薦洪才堪國史選為散騎常侍領大著作洪固辭不就以年老欲鍊丹以祈遐壽聞交址出丹求為句𧜞令帝以洪資高不許洪曰非欲為榮以有丹耳帝從之洪遂將子姪俱行至廣州刺史鄧嶽留不聽去洪乃止羅浮山煉丹嶽表補東官太守又辭不就嶽乃以洪兄子望為記室參軍在山積年優游間養著述不輟其自序曰洪體乏進趣之才偶好無為之業假令奮翅則能陵厲玄霄騁足則能追風躡景猶欲戢徑翮於鷦鷃之羣藏逸迹於跛驢之伍豈況大塊稟我以尋常之短羽造化假我以至駑之蹇足自卜者審不能者止又豈敢力蒼蠅而慕沖天之舉策跛鱉而追飛兔之軌飾嫫母之篤陋求媒陽之美談推沙礫之賤質索千金於和肆哉夫僬僥之步而企及夸父之蹤近才所以躓礙也要離之羸而強赴扛鼎之勢秦人所以斷筋也是以望絶於榮華之途而志安乎窮圮之域藜藿有八珍之甘蓬蓽有藻梲之樂也故權貴之家雖咫尺弗從也知道之士雖艱遠必造也考覽奇書既不少矣率多隱語難可卒解自非至精不能尋究自非篤勤不能悉見也道士弘博洽聞者寡而意斷妄說者衆至於時有好事者欲有所修為倉卒不知所從而意之所疑又無足咨今為此書粗舉長生之理其至妙者不得宣之於翰墨蓋粗言較略以示一隅冀悱憤之徒省之可以思過半矣豈謂暗塞必能窮微暢遠乎聊論其所先覺者耳世儒徒知服膺周孔莫信神仙之書不但大而笑之又將謗毀真正故豫所著子言黃白之事名曰內篇其餘駁難通釋名曰外篇大凡內外一百一十六篇雖不足藏諸名山且欲緘之金匱以示識者自號抱朴子因以名書其餘所著碑誄詩賦百卷移檄章表三十卷神仙良吏隱逸集異等傳各十卷又抄五經史漢百家之言方技雜事三百一十卷金匱藥方一百卷肘後要急方四卷洪博聞深洽江左絶倫著述篇章富於班馬又精辨玄賾析理入微後忽與嶽疏云當遠行尋師剋期便發嶽得疏狼狽往別而洪坐至日中兀然若睡而卒嶽至遂不及見時年八十一視其顏色如生體亦柔軟舉尸入棺甚輕如空衣世以為尸解得仙云史臣曰景純篤志綈緗洽聞強記在異書而畢綜瞻往滯而咸釋情源秀逸思業高奇襲文雅於西朝振辭鋒於南夏為中興才學之宗矣夫語怪徵神伎成則賤前修貽訓鄙乎茲道景純之探策定數考往知來邁京管於前圖軼梓竈於遐篆而宦微於世禮薄於時區區然寄客傲以申懷斯亦伎成之纍也若乃大塊流形玄天賦命吉凶修短定乎自然雖稽象或通而厭勝難恃稟之有在必也無差自可居常待終穨心委運何至銜刀被髮遑遑於幽穢之間哉晚抗忠言無救王敦之逆初慚智免竟斃山宗之謀仲尼所謂攻乎異端斯害也已悲夫稚川束髮從師老而忘倦紬奇冊府總百代之遺編紀化仙都窮九丹之祕術謝浮榮而捐雜藝賤尺寶而貴分陰游德棲真超然事外全生之道其最優乎贊曰景純通秀夙振宏材沈研鳥冊洞曉龜枚匪寧國釁坐致身災稚川優洽貧而樂道載範斯文永傳洪藻
