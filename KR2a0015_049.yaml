body:
  text: 晉書卷四十九列傳第十九阮籍兄子咸咸子瞻瞻弟孚從子修族弟放放弟裕阮籍字嗣宗陳留尉氏人也父瑀魏丞相掾知名於世籍容貌瓌傑志氣宏放傲然獨得任性不羈而喜怒不形於色或閉戶視書纍月不出或登臨山水經日忘歸博覽羣籍尤好莊老嗜酒能嘯善彈琴當其得意忽忘形骸時人多謂之癡惟族兄文業每歎服之以為勝己由是咸共稱異籍嘗隨叔父至東郡兗州刺史王昶請與相見終日不開一言自以不能測太尉蔣濟聞其有雋才而辟之籍詣都亭奏記曰伏惟明公以含一之德據上台之位英豪翹首俊賢抗足開府之日人人自以為掾屬辟書始下而下走為首昔子夏在於西河之上而文侯擁篲鄒子處於黍谷之陰而昭王陪乘夫布衣韋帶之士孤居特立王公大人所以禮下之者為道存也今籍無鄒卜之道而有其陋猥見採擇無以稱當方將耕於東皋之陽輸黍稷之餘稅負薪疲病足力不強補吏之召非所克堪乞回謬恩以光清舉初濟恐籍不至得記欣然遣卒迎之而籍已去濟大怒於是鄉親共喻之乃就吏後謝病歸復為尚書郎少時又以病免及曹爽輔政召為參軍籍因以疾辭屏於田里歲餘而爽誅時人服其遠識宣帝為太傅命籍為從事中郎及帝崩復為景帝大司馬從事中郎高貴鄉公即位封關內侯徙散騎常侍籍本有濟世志屬魏晉之際天下多故名士少有全者籍由是不與世事遂酣飲為常文帝初欲為武帝求婚於籍籍醉六十日不得言而止鍾會數以時事問之欲因其可否而致之罪皆以酣醉獲免及文帝輔政籍嘗從容言於帝曰籍平生曾游東平樂其風土帝大悅即拜東平相籍乘驢到郡壞府舍屏鄣使內外相望法令清簡旬日而還帝引為大將軍從事中郎有司言有子殺母者籍曰嘻殺父乃可至殺母乎坐者怪其失言帝曰殺父天下之極惡而以為可乎籍曰禽獸知母而不知父殺父禽獸之類也殺母禽獸之不若衆乃悅服籍聞步兵廚營人善釀有貯酒三百斛乃求為步兵校尉遺落世事雖去佐職游府內朝宴必與焉會帝讓九錫公卿將勸進使籍為其辭籍沈醉忘作臨詣府使取之見籍方據案醉眠使者以告籍便書案使寫之無所改竄辭甚清壯為時所重籍雖不拘禮教然發言玄遠口不臧否人物性至孝母終正與人圍對者求止籍留與決賭既而飲酒二斗舉聲一號吐血數升及將葬食一蒸肫飲二斗酒然後臨訣直言窮矣舉聲一號因又吐血數升毀瘠骨立殆致滅性裴楷往弔之籍散髮箕踞醉而直視楷弔唁畢便去或問楷凡弔者主哭客乃為禮籍既不哭君何為哭楷曰阮籍既方外之士故不崇禮典我俗中之士故以軌儀自居時人歎為兩得籍又能為青白眼見禮俗之士以白眼對之及嵇喜來弔籍作白眼喜不懌而退喜弟康聞之乃齎酒挾琴造焉籍大悅乃見青眼由是禮法之士疾之若讐而帝每保護之籍嫂嘗歸寧籍相見與別或譏之籍曰禮豈為我設邪鄰家少婦有美色當壚沽酒籍嘗詣飲醉便臥其側籍既不自嫌其夫察之亦不疑也兵家女有才色未嫁而死籍不識其父兄徑往哭之盡哀而還其外坦蕩而內淳至皆此類也時率意獨駕不由徑路車迹所窮輒慟哭而反嘗登廣武觀楚漢戰處嘆曰時無英雄使豎子成名登武牢山望京邑而嘆於是賦豪傑詩景元四年冬卒時年五十四籍能屬文初不留思作詠懷詩八十餘篇為世所重著達莊論無為之貴文多不録籍嘗於蘇門山遇孫登與商略終古及栖神導氣之術登皆不應籍因長嘯而退至半嶺聞有聲若鸞鳳之音響乎巖谷乃登之嘯也遂歸著大人先生傳其略曰世人所謂君子惟法是修惟禮是克手執圭璧足履繩墨行欲為目前檢言欲為無窮則少稱鄉黨長聞鄰國上欲圖三公下不失九州牧獨不見羣蝨之處褌中逃乎深縫匿乎壞絮自以為吉宅也行不敢離縫際動不敢出褌襠自以為得繩墨也然炎丘火流焦邑滅都羣蝨處於褌中而不能出也君子之處域內何異夫蝨之處褌中乎此亦籍之胸懷本趣也子渾字長成有父風少慕通達不飾小節籍謂曰仲容已豫吾此流汝不得復爾太康中為太子庶子咸字仲容父熙武都太守咸任達不拘與叔父籍為竹林之游當世禮法者譏其所為咸與籍居道南諸阮居道北北阮富而南阮貧七月七日北阮盛曬衣服皆錦綺粲目咸以竿挂大布犢鼻於庭人或怪之答曰未能免俗聊復爾耳歷仕散騎侍郎山濤舉咸典選曰阮咸貞素寡欲深識清濁萬物不能移若在官人之職必絶於時武帝以咸耽酒浮虛遂不用太原郭奕高爽有識量知名於時少所推先見咸心醉不覺歎焉而居母喪縱情越禮素幸姑之婢姑當歸于夫家初云留婢既而自從去時方有客咸聞之遽借客馬追婢既及與婢纍騎而還論者甚非之咸妙解音律善彈琵琶雖處世不交人事惟共親知絃歌酣宴而已與從子修特相善每以得意為歡諸阮皆飲酒咸至宗人間共集不復用杯觴斟酌以大盆盛酒圓坐相向大酌更飲時有羣豕來飲其酒咸直接去其上便共飲之羣從昆弟莫不以放達為行籍弗之許荀勖每與咸論音律自以為遠不及也疾之出補始平太守以壽終二子瞻孚瞻字千里性清虛寡欲自得於懷讀書不甚研求而默識其要遇理而辨辭不足而旨有餘善彈琴人聞其能多往求聽不問貴賤長幼皆為彈之神氣沖和而不知向人所在內兄潘嶽每令鼓琴終日達夜無忤色由是識者歎其恬淡不可榮辱矣舉止灼然見司徒王戎戎問曰聖人貴名教老莊明自然其旨同異瞻曰將無同戎咨嗟良久即命辟之時人謂之三語掾太尉王衍亦雅重之瞻嘗羣行冒熱渴甚逆旅有井衆人競趨之瞻獨逡巡在後須飲者畢乃進其夷退無競如此東海王越鎮許昌以瞻為記室參軍與王承謝鯤鄧攸俱在越府越與瞻等書曰禮年八歲出就外傅明始可以加師訓之則十年曰幼學明可漸先王之教也然學之所入淺體之所安深是以間習禮容不如式瞻儀度諷誦遺言不若親承音旨小兒毗既無令淑之質不聞道德之風望諸君時以間豫周旋誨接永嘉中為太子舍人瞻素執無鬼論物莫能難每自謂此理足可以辨正幽明忽有一客通名詣瞻寒溫畢聊談名理客甚有才辨瞻與之言良久及鬼神之事反覆甚苦客遂屈乃作色曰鬼神古今聖賢所共傳君何得獨言無即僕便是鬼於是變為異形須臾消滅瞻默然意色大惡後歲餘病卒於倉垣時年三十孚字遙集其母即胡婢也孚之初生其姑取王延壽魯靈光殿賦曰胡人遙集於上楹而以字焉初辟太傅府遷騎兵屬避亂渡江元帝以為安東參軍蓬髮飲酒不以王務嬰心時帝既用申韓以救世而孚之徒未能棄也雖然不以事任處之轉丞相從事中郎終日酣縱為有司所按帝每優容之琅邪王裒為車騎將軍鎮廣陵高選綱佐以孚為長史帝謂曰卿既統軍府郊壘多事宜節飲也孚答曰陛下不以臣不才委之以戎旅之重臣僶勉從事不敢有言者竊以今王蒞鎮威風赫然皇澤遐被賊寇斂迹氛祲既澄日月自朗臣亦何可爝火不息正應端拱嘯詠以樂當年耳遷黃門侍郎散騎常侍嘗以金貂換酒復為所司彈劾帝宥之轉太子中庶子左衛率領屯騎校尉明帝即位遷侍中從平王敦賜爵南安縣侯轉吏部尚書領東海王師稱疾不拜詔就家用之尚書令郗鑒以為非禮帝曰就用之誠不快不爾便廢才及帝疾大漸溫嶠入受顧命過孚要與同行升車乃告之曰主上遂大漸江左危弱實資羣賢共康世務卿時望所歸今欲屈卿同受顧託孚不答固求下車嶠不許垂至臺門告嶠內迫求暫下便徒步還家初祖約性好財孚性好屐同是纍而未判其得失有詣約見正料財物客至屏當不盡餘兩小簏以著背後傾身障之意未能平或有詣阮正見自蠟屐因自嘆曰未知一生當著幾量屐神色甚間暢於是勝負始分咸和初拜丹楊尹時太后臨朝政出舅族孚謂所親曰今江東雖纍世而年數實淺主幼時艱運終百六而庾亮年少德信未孚以吾觀之將兆亂矣會廣州刺史劉顗卒遂苦求出王導等以孚疏放非京尹才乃除都督交廣寧三州軍事鎮南將軍領平越中郎將廣州刺史假節未至鎮卒年四十九尋而蘇峻作逆識者以為知幾無子從孫廣嗣修字宣子好易老善清言嘗有論鬼神有無者皆以人死者有鬼修獨以為無曰今見鬼者云著生時衣服若人死有鬼衣服有鬼邪論者服焉後遂伐社樹或止之修曰若社而為樹伐樹則社移樹而為社伐樹則社亡矣性簡任不修人事絶不喜見俗人遇便舍去意有所思率爾褰裳不避晨夕至或無言但欣然相對常步行以百錢挂杖頭至酒店便獨酣暢雖當世富貴而不肯顧家無儋石之儲宴如也與兄弟同志常自得於林阜之間王衍當時談宗自以論易略盡然有所未了研之終莫悟每云不知比沒當見能通之者不衍族子敦謂衍曰阮宣子可與言衍曰吾亦聞之但未知其亹亹之處定何如耳及與修談言寡而旨暢衍乃歎服焉梁國張偉志趣不常自隱於屠釣修愛其才美而知其不真偉後為黃門郎陳留內史果以世事受纍修居貧年四十餘未有室王敦等斂錢為婚皆名士也時慕之者求入錢而不得修所著述甚寡嘗作大鵬贊曰蒼蒼大鵬誕自北溟假精靈鱗神化以生如雲之翼如山之形海運水擊扶搖上征翕然層舉背負太清志存天地不屑唐庭鷽鳩仰笑尺鷃所輕超世高逝莫知其情王敦時為鴻臚卿謂修曰卿常無食鴻臚丞差有祿能作不修曰亦復可爾耳遂為之轉太傅行參軍太子洗馬避亂南行至西陽期思縣為賊所害時年四十二放字思度祖略齊郡太守父顗淮南內史放少與孚並知名中興除太學博士太子中舍人庶子時雖戎車屢駕而放侍太子常說老莊不及軍國明帝甚友愛之轉黃門侍郎遷吏部郎在銓管之任甚有稱績時成帝幼沖庾氏執政放求為交州乃除監交州軍事揚威將軍交州刺史行達寧浦逢陶侃將高寶平梁碩自交州還放設饌請寶伏兵殺之寶衆擊放敗走保簡陽城得免到州少時暴發渴見寶為祟遂卒朝廷甚悼惜之年四十四追贈廷尉放素知名而性清約不營産業為吏部郎不免饑寒王導庾亮以其名士常供給衣食子晞之南頓太守裕字思曠宏達不及放而以德業知名弱冠辟太宰掾大將軍王敦命為主簿甚被知遇裕以敦有不臣之心乃終日酣觴以酒廢職敦謂裕非當世實才徒有虛譽而已出為溧陽令復以公事免官由是得違敦難論者以此貴之咸和初除尚書郎時事故之後公私弛廢裕遂去職還家居會稽剡縣司徒王導引為從事中郎固辭不就朝廷將欲徵之裕知不得已乃求為王舒撫軍長史舒薨除吏部郎不就即家拜臨海太守少時去職司空郗鑒請為長史詔徵祕書監皆以疾辭復除東陽太守尋徵侍中不就還剡山有肥遁之志有以問王羲之羲之曰此公近不驚寵辱雖古之沈冥何以過此人云裕骨氣不及逸少簡秀不如真長韶潤不如仲祖思致不如殷浩而兼有諸人之美成帝崩裕赴山陵事畢便還諸人相與追之裕亦審時流必當逐己而疾去至方山不相及劉惔歎曰我入東正當泊安石渚下耳不敢復近思曠傍裕雖不博學論難甚精嘗問謝萬云未見四本論君試為言之萬說既畢裕以傅嘏為長於是構辭數百言精義入微聞者皆嗟味之裕嘗以人不須廣學正應以禮讓為先故終日靜默無所修綜而物自宗焉在剡曾有好車借無不給有人葬母意欲借而不敢言後裕聞之乃歎曰吾有車而使人不敢借何以車為遂命焚之在東山久之復徵散騎常侍領國子祭酒俄而復以為金紫光祿大夫領琅邪王師經年敦逼並無所就御史中丞周閔奏裕及謝安違詔纍載並應有罪禁錮終身詔書貰之或問裕曰子屢辭徵聘而宰二郡何邪裕曰雖屢辭王命非敢為高也吾少無宦情兼拙於人間既不能躬耕自活必有所資故曲躬二郡豈以騁能私計故耳年六十二卒三子傭寧普傭早卒寧鄱陽太守普驃騎咨議參軍傭子歆之中領軍寧子腆祕書監腆弟萬齡及歆之子彌之元熙中並列顯位嵇康嵇康字叔夜譙國銍人也其先姓奚會稽上虞人以避怨徙焉銍有嵇山家于其側因而命氏兄喜有當世才歷太僕宗正康早孤有奇才遠邁不羣身長七尺八寸美詞氣有風儀而土木形骸不自藻飾人以為龍章鳳姿天質自然恬靜寡欲含垢匿瑕寬簡有大量學不師受博覽無不該通長好老莊與魏宗室婚拜中散大夫常修養性服食之事彈琴詠詩自足於懷以為神仙稟之自然非積學所得至於導養得理則安期彭祖之倫可及乃著養生論又以為君子無私其論曰夫稱君子者心不措乎是非而行不違乎道者也何以言之夫氣靜神虛者心不存於矜尚體亮心達者情不繫於所欲矜尚不存乎心故能越名教而任自然情不繫於所欲故能審貴賤而通物情物情順通故大道無違越名任心故是非無措也是故言君子則以無措為主以通物為美言小人則以匿情為非以違道為闕何者匿情矜吝小人之至惡虛心無措君子之篤行也是以大道言及吾無身吾又何患無以生為貴者是賢於貴生也由斯而言夫至人之用心固不存有措矣故曰君子行道忘其為身斯言是矣君子之行賢也不察於有度而後行也任心無邪不議於善而後正也顯情無措不論於是而後為也是故傲然忘賢而賢與度會忽然任心而心與善遇儻然無措而事與是俱也其略如此蓋其胸懷所寄以高契難期每思郢質所與神交者惟陳留阮籍河內山濤豫其流者河內向秀沛國劉伶籍兄子咸琅邪王戎遂為竹林之游世所謂竹林七賢也戎自言與康居山陽二十年未嘗見其喜慍之色康嘗採藥游山澤會其得意忽焉忘反時有樵蘇者遇之咸謂為神至汲郡山中見孫登康遂從之遊登沈默自守無所言說康臨去登曰君性烈而才雋其能免乎康又遇王烈共入山烈嘗得石髓如飴即自服半餘半與康皆凝而為石又於石室中見一卷素書遽呼康往取輒不復見烈乃歎曰叔夜志趣非常而輒不遇命也其神心所感每遇幽逸如此山濤將去選官舉康自代康乃與濤書告絶曰聞足下欲以吾自代雖事不行知足下故不知之也恐足下羞庖人之獨割引尸祝以自助故為足下陳其可否老子莊周吾之師也親居賤職柳下惠東方朔達人也安乎卑位吾豈敢短之哉又仲尼兼愛不羞執鞭子文無欲卿相而三為令尹是乃君子思濟物之意也所謂達能兼善而不渝窮則自得而無悶以此觀之故知堯舜之居世許由之巖棲子房之佐漢接輿之行歌其揆一也仰瞻數君可謂能遂其志者也故君子百行殊塗同致循性而動各附所安故有處朝廷而不出入山林而不反之論且延陵高子臧之風長卿慕相如之節意氣所託亦不可奪也吾每讀尚子平臺孝威傳慨然慕之想其為人加少孤露母兄驕恣不涉經學又讀老莊重增其放故使榮進之心日穨任逸之情轉篤阮嗣宗口不論人過吾每師之而未能及至性過人與物無傷惟飲酒過差耳至為禮法之士所繩疾之如仇讐幸賴大將軍保持之耳吾以不如嗣宗之資而有慢弛之闕又不識物情暗於機宜無萬石之慎而有好盡之纍久與事接疵釁日興雖欲無患其可得乎又聞道士遺言餌朮黃精令人久壽意甚信之游山澤觀魚鳥心甚樂之一行作吏此事便廢安能舍其所樂而從其所懼哉夫人之相知貴識其天性因而濟之禹不逼伯成子高全其長也仲尼不假蓋於子夏護其短也近諸葛孔明不迫元直以入蜀華子魚不強幼安以卿相此可謂能相終始真相知者也自卜已審若道盡塗殫則已耳足下無事寃之令轉於溝壑也吾新失母兄之歡意常悽切女年十三男年八歲未及成人況復多疾顧此悢悢如何可言今但欲守陋巷教養子孫時時與親舊離闊陳說平生濁酒一杯彈琴一曲志意畢矣豈可見黃門而稱貞哉若趣欲共登王塗期於相致時為歡益一旦迫之必發狂疾自非重讐不至此也既以解足下并以為別此書既行知其不可羈屈也性絶巧而好鍛宅中有一柳樹甚茂乃激水圜之每夏月居其下以鍛東平呂安服康高致每一相思輒千里命駕康友而善之後安為兄所枉訴以事繫獄辭相證引遂復收康康性慎言行一旦縲紲乃作幽憤詩曰嗟余薄祜少遭不造哀煢靡識越在襁褓母兄鞠育有慈無威恃愛肆姐不訓不師爰及冠帶憑寵自放抗心希古任其所尚託好莊老賤物貴身志在守朴養素全真曰豫不敏好善暗人子玉之敗屢增惟塵大人含弘藏垢懷恥人之多僻政不由己惟此褊心顯明臧否感悟思愆怛若創痏欲寡其過謗議沸騰性不傷物頻致怨憎昔慚柳惠今愧孫登內負宿心外恧良朋仰慕嚴鄭樂道間居與世無營神氣晏如咨豫不淑嬰纍多虞匪降自天實由頑疏理弊患結卒致囹圄對答鄙訊縶此幽阻實恥訟寃時不我與雖曰義直神辱志沮澡身滄浪曷云能補雍雍鳴雁厲翼北游順時而動得意忘憂嗟我憤歎曾莫能疇事與願違遘茲淹留窮達有命亦又何求古人有言善莫近名奉時恭默咎悔不生萬石周慎安親保榮世務紛紜祇攪余情安樂必誡乃終利貞煌煌靈芝一年三秀豫獨何為有志不就懲難思復心焉內疚庶勖將來無馨無臭採薇山阿散髮巖岫永嘯長吟頤神養壽初康居貧嘗與向秀共鍛於大樹之下以自贍給潁川鍾會貴公子也精練有才辨故往造焉康不為之禮而鍛不輟良久會去康謂曰何所聞而來何所見而去會曰聞所聞而來見所見而去會以此憾之及是言於文帝曰嵇康臥龍也不可起公無憂天下顧以康為慮耳因譖康欲助毋丘儉賴山濤不聽昔齊戮華士魯誅少正卯誠以害時亂教故聖賢去之康安等言論放蕩非毀典謨帝王者所不宜容宜因釁除之以淳風俗帝既昵聽信會遂并害之康將刑東市太學生三千人請以為師弗許康顧視日影索琴彈之曰昔袁孝尼嘗從吾學廣陵散吾每靳固之廣陵散於今絶矣時年四十海內之士莫不痛之帝尋悟而恨焉初康嘗游于洛西暮宿華陽亭引琴而彈夜分忽有客詣之稱是古人與康共談音律辭致清辨因索琴彈之而為廣陵散聲調絶倫遂以授康仍誓不傳人亦不言其姓字康善談理又能屬文其高情遠趣率然玄遠撰上古以來高士為之傳贊欲友其人於千載也又作太師針亦足以明帝王之道焉復作聲無哀樂論甚有條理子紹別有傳向秀向秀字子期河內懷人也清悟有遠識少為山濤所知雅好老莊之學莊周著內外數十篇歷世才士雖有觀者莫適論其旨統也秀乃為之隱解發明奇趣振起玄風讀之者超然心悟莫不自足一時也惠帝之世郭象又述而廣之儒墨之迹見鄙道家之言遂盛焉始秀欲注嵇康曰此書詎復須注正是妨人作樂耳及成示康曰殊復勝不又與康論養生辭難往復蓋欲發康高致也康善鍛秀為之佐相對欣然傍若無人又共呂安灌園於山陽康既被誅秀應本郡計入洛文帝問曰聞有箕山之志何以在此秀曰以為巢許狷介之士未達堯心豈足多慕帝甚悅秀乃自此役作思舊賦云余與嵇康呂安居止接近其人並有不羈之才嵇意遠而疏呂心曠而放其後並以事見法嵇博綜伎藝於絲竹特妙臨當就命顧視日影索琴而彈之逝將西邁經其舊廬于時日薄虞泉寒冰凄然鄰人有吹笛者發聲寥亮追想曩昔游宴之好感音而歎故作賦曰將命適於遠京兮遂旋反以北徂濟黃河以泛舟兮經山陽之舊居瞻曠野之蕭條兮息余駕乎城隅踐二子之遺迹兮歷窮巷之空廬歎黍離之愍周兮悲麥秀於殷墟惟追昔以懷今兮心徘徊以躊躇棟宇在而弗毀兮形神逝其焉如昔李斯之受罪兮歎黃犬而長吟悼嵇生之永辭兮顧日影而彈琴託運遇於領會兮寄餘命於寸陰聽鳴笛之慷慨兮妙聲絶而復尋佇駕言其將邁兮故援翰以寫心後為散騎侍郎轉黃門侍郎散騎常侍在朝不任職容迹而已卒於位二子純悌劉伶劉伶字伯倫沛國人也身長六尺容貌甚陋放情肆志常以細宇宙齊萬物為心淡默少言不妄交游與阮籍嵇康相遇欣然神解攜手入林初不以家産有無介意常乘鹿車攜一壺酒使人荷鍤而隨之謂曰死便埋我其遺形骸如此嘗渴甚求酒於其妻妻捐酒毀器涕泣諫曰君酒太過非攝生之道必宜斷之伶曰善吾不能自禁惟當祝鬼神自誓耳便可具酒肉妻從之伶跪祝曰天生劉伶以酒為名一飲一斛五斗解酲婦兒之言慎不可聽仍引酒御肉隗然復醉嘗醉與俗人相忤其人攘袂奮拳而往伶徐曰雞肋不足以安尊拳其人笑而止伶雖陶兀昏放而機應不差未嘗厝意文翰惟著酒德頌一篇其辭曰有大人先生以天地為一朝萬期為須臾日月為扃牖八荒為庭衢行無轍迹居無室廬幕天席地縱意所如止則操卮執觚動則挈榼提壺惟酒是務焉知其餘有貴介公子搢紳處士聞吾風聲議其所以乃奮袂攘襟怒目切齒陳說禮法是非蜂起先生於是方捧罌承槽銜杯漱醪奮髯箕踞枕麴藉糟無思無慮其樂陶陶兀然而醉恍爾而醒靜聽不聞雷霆之聲熟視不睹泰山之形不覺寒暑之切肌利欲之感情俯觀萬物擾擾焉若江海之載浮萍二豪侍側焉如蜾螺之與螟蛉嘗為建威參軍泰始初對策盛言無為之化時輩皆以高第得調伶獨以無用罷竟以壽終謝鯤謝鯤字幼輿陳國陽夏人也祖纘典農中郎將父衡以儒素顯仕至國子祭酒鯤少知名通簡有高識不修威儀好老易能歌善鼓琴王衍嵇紹並奇之永興中長沙王乂入輔政時有疾鯤者言其將出奔乂欲鞭之鯤解衣就罰曾無忤容既舍之又無喜色太傅東海王越聞其名辟為掾任達不拘尋坐家僮取官除名于時名士王玄阮修之徒並以鯤初登宰府便至黜辱為之歎恨鯤聞之方清歌鼓琴不以屑意莫不服其遠暢而恬於榮辱鄰家高氏女有美色鯤嘗挑之女投梭折其兩齒時人為之語曰任達不已幼輿折齒鯤聞之然長嘯曰猶不廢我嘯歌越尋更辟之轉參軍事鯤以時方多故乃謝病去職避地于豫章嘗行經空亭中夜宿此亭舊每殺人將曉有黃衣人呼鯤字令開戶鯤憺然無懼色便於窗中度手牽之胛斷視之鹿也尋血獲焉爾後此亭無復妖怪左將軍王敦引為長史以討杜韜功封咸亭侯母憂去職服闋遷敦大將軍長史時王澄在敦坐見鯤談話無倦惟歎謝長史可與言都不眄敦其為人所慕如此鯤不徇功名無砥礪行居身於可否之間雖自處若穢而動不纍高敦有不臣之迹顯於朝野鯤知不可以道匡弼乃優游寄遇不屑政事從容諷議卒歲而已每與畢卓王尼阮放羊曼桓彝阮孚等縱酒敦以其名高雅相賓禮嘗使至都明帝在東宮見之甚相親重問曰論者以君方庾亮自謂何如答曰端委廟堂使百僚準則鯤不如亮一丘一壑自謂過之溫嶠嘗謂鯤子尚曰尊大君豈惟識量淹遠至於神鑒沈深雖諸葛瑾之喻孫權不過也及敦將為逆謂鯤曰劉隗姦邪將危社稷吾欲除君側之惡匡主濟時何如對曰隗誠始禍然城狐社鼠也敦怒曰君庸才豈達大理出鯤為豫章太守又留不遣藉其才望逼與俱下敦至石頭歎曰吾不復得為盛德事矣鯤曰何為其然但使自今以往日忘日去耳初敦謂鯤曰吾當以周伯仁為尚書令戴若思為僕射及至都復曰近來人情何如鯤對曰明公之舉雖欲大存社稷然悠悠之言實未達高義周顗戴若思南北人士之望明公舉而用之羣情帖然矣是日敦遣兵收周戴而鯤弗知敦怒曰君粗疏邪二子不相當吾已收之矣鯤與顗素相親重聞之愕然若喪諸己參軍王嶠以敦誅顗諫之甚切敦大怒命斬嶠時人士畏懼莫敢言者鯤曰明公舉大事不戮一人嶠以獻替忤旨便以釁鼓不亦過乎敦乃止敦既誅害忠賢而稱疾不朝將還武昌鯤喻敦曰公大存社稷建不世之勳然天下之心實有未達若能朝天子使君臣釋然萬物之心於是乃服杖衆望以順羣情盡沖退以奉主上如斯則勳侔一匡名垂千載矣敦曰君能保無變乎對曰鯤近日入覲主上側席遲得見公宮省穆然必無虞矣公若入朝鯤請侍從敦勃然曰正復殺君等數百人亦復何損於時竟不朝而去是時朝望被害皆為其憂而鯤推理安常時進正言敦既不能用內亦不悅軍還使之郡涖政清肅百姓愛之尋卒官時年四十三敦死後追贈太常諡曰康子尚嗣別有傳胡毋輔之子謙之胡毋輔之字彥國泰山奉高人也高祖班漢執金吾父原練習兵馬山濤稱其才堪邊任舉為太尉長史終河南令輔之少擅高名有知人之鑒性嗜酒任縱不拘小節與王澄王敦庾敳俱為太尉王衍所昵號曰四友澄嘗與人書曰彥國吐佳言如鋸木屑霏霏不絶誠為後進領袖也辟別駕太尉掾並不就以家貧求試守繁昌令始節酒自厲甚有能名遷尚書郎豫討齊王冏賜爵陰平男纍轉司徒左長史復求外出為建武將軍樂安太守與郡人光逸晝夜酣飲不視郡事成都王穎為太弟召為中庶子遂與謝鯤王澄阮修王尼畢卓俱為放達嘗過河南門下飲河南騶王子博箕坐其傍輔之叱使取火子博曰我卒也惟不乏吾事則已安復為人使輔之因就與語歎曰吾不及也薦之河南尹樂廣廣召見甚悅之擢為功曹其甄拔人物若此東海王越聞輔之名引為從事中郎復補振威將軍陳留太守王彌經其郡輔之不能討坐免官尋除寧遠將軍揚州刺史不之職越復以為右司馬本州大中正越薨避亂渡江元帝以為安東將軍咨議祭酒遷揚武將軍湘州刺史假節到州未幾卒時年四十九子謙之謙之字子光才學不及父而傲縱過之至酣醉常呼其父字輔之亦不以介意談者以為狂輔之正酣飲謙之窺而厲聲曰彥國年老不得為爾將令我尻背東壁輔之歡笑呼入與共飲其所為如此年未三十卒畢卓畢卓字茂世新蔡鮦陽人也父諶中書郎卓少希放達為胡毋輔之所知太興末為吏部郎常飲酒廢職比舍郎釀熟卓因醉夜至其甕間盜飲之為掌酒者所縛明旦視之乃畢吏部也遽釋其縛卓遂引主人宴於甕側致醉而去卓嘗謂人曰得酒滿數百斛船四時甘味置兩頭右手持酒杯左手持蟹螯拍浮酒船中便足了一生矣及過江為溫嶠平南長史卒官王尼王尼字孝孫城陽人也或云河內人本兵家子寓居洛陽卓犖不羈初為護軍府軍士胡毋輔之與琅邪王澄北地傅暢中山劉輿潁川荀邃河東裴遐迭屬河南功曹甄述及洛陽令曹攄請解之攄等以制旨所及不敢輔之等齎羊酒詣護軍門門吏疏名呈護軍護軍歎曰諸名士持羊酒來將有以也尼時以給府養馬輔之等入遂坐馬廄下與尼炙羊飲酒醉飽而去竟不見護軍護軍大驚即與尼長假因免為兵東嬴公騰辟為車騎府舍人不就時尚書何綏奢侈過度尼謂人曰綏居亂世矜豪乃爾將死不久人曰伯蔚聞言必相危害尼曰伯蔚比聞我語已死矣未幾綏果為東海王越所殺初入洛尼詣越不拜越問其故尼曰公無宰相之能是以不拜因數之言甚切又云公負尼物越大驚曰寧有是也尼曰昔楚人亡布謂令尹盜之今尼屋舍資財悉為公軍人所略尼今飢凍是亦明公之負也越大笑即賜絹五十匹諸貴人聞競往餉之洛陽陷避亂江夏時王澄為荊州刺史遇之甚厚尼早喪婦止有一子無居宅惟畜露車有牛一頭每行輒使子御之暮則共宿車上常歎曰滄海橫流處處不安也俄而澄卒荊土饑荒尼不得食乃殺牛壞車肉噉之既盡父子俱餓死羊曼弟聃羊曼字祖延太傅祜兄孫也父暨陽平太守曼少知名本州禮命太傅辟皆不就避難渡江元帝以為鎮東參軍轉丞相主簿委以機密歷黃門侍郎尚書吏部郎晉陵太守以公事免曼任達穨縱好飲酒溫嶠庾亮阮放桓彝同志友善並為中興名士時州里稱陳留阮放為宏伯高平郗鑒為方伯泰山胡毋輔之為達伯濟陰卞壼為裁伯陳留蔡謨為朗伯阮孚為誕伯高平劉綏為委伯而曼為濌伯凡八人號兗州八伯蓋擬古之八雋也王敦既與朝廷乖二羈録朝士曼為右長史曼知敦不臣終日酣醉諷議而已敦以其士望厚加禮遇不委以事故得不涉其難敦敗代阮孚為丹楊尹時朝士過江初拜官相飾供饌曼拜丹楊客來早者得佳設日宴則漸罄不復及精隨客早晚而不問貴賤有羊固拜臨海太守竟日皆美雖晚至者猶獲盛饌論者以固之豐腆乃不如曼之真率蘇峻作亂加前將軍率文武守雲龍門王師不振或勸曼避峻曼曰朝廷破敗吾安所求生勒衆不動為峻所害年五十五峻平追贈太常子賁嗣少知名尚明帝女南郡悼公主除祕書郎早卒弟聃聃字彭祖少不經學時論皆鄙其凡庸先是兗州有八伯之號其後更有四伯大鴻臚陳留江泉以能食為穀伯豫章太守史疇以大肥為笨伯散騎郎高平張嶷以狡妄為猾伯而聃以狼戾為瑣伯蓋擬古之四凶聃初辟元帝丞相府纍遷廬陵太守剛克粗暴恃國戚縱恣尤甚睚眦之嫌輒加刑殺疑郡人簡良等為賊殺二百餘人誅及嬰孩所髠鎖復百餘庾亮執之歸于京都有司奏聃罪當死以景獻皇后是其祖姑應八議成帝詔曰此事古今所無何八議之有猶未忍肆之市朝其賜命獄所兄子賁尚公主自表求解婚詔曰罪不相及古今之令典也聃雖極法於賁何有其特不聽離婚琅邪太妃山氏聃之甥也入殿叩頭請命王導又啓聃罪不容恕宜極重法山太妃憂戚成疾陛下罔極之恩宜蒙生全之宥於是詔下曰太妃惟此一舅發言摧咽乃至吐血情慮深重朕往丁荼毒受太妃撫育之恩同於慈親若不堪難忍之痛以致頓弊朕亦何顏以寄今便原聃生命以慰太妃渭陽之思於是除名頃之遇疾見簡良等為祟旬日而死光逸光逸字孟祖樂安人也初為博昌小吏縣令使逸送客冒寒舉體凍溼還遇令不在逸解衣炙之入令被中臥令還大怒將加嚴罰逸曰家貧衣單沾溼無可代若不暫溫勢必凍死奈何惜一被而殺一人乎君子仁愛必不爾也故寢而不疑令奇而釋之後為門亭長迎新令至京師胡毋輔之與荀邃共詣令家望見逸謂邃曰彼似奇才便呼上車與談良久果俊器令怪客不入吏白與光逸語令大怒除逸名斥遣之後舉孝廉為州從事棄官投輔之輔之時為太傅越從事中郎薦逸於越越以門寒而不召越後因間宴責輔之無所舉薦輔之曰前舉光逸公以非世家不召非不舉也越即辟焉書到郡縣皆以為誤審知是逸乃備禮遣之尋以世難避亂渡江復依輔之初至屬輔之與謝鯤阮放畢卓羊曼桓彝阮孚散髮裸裎閉室酣飲已纍日逸將排戶入守者不聽逸便於戶外脫衣露頭於狗竇中窺之而大叫輔之驚曰他人決不能爾必我孟祖也遽呼入遂與飲不捨晝夜時人謂之八達元帝以逸補軍咨祭酒中興建為給事中卒官史臣曰夫學非常道則物靡不通理有忘言則在情斯遣其進也撫俗同塵不居名利其退也餐和履順以保天真若乃一其本原體無為之用分其華葉開寓言之道是以伯陽垂範鳴謙置式欲崇諸己先下於人猶大樂無聲而蹌鸞斯應者也莊生放達其旨而馳辨無窮棄彼榮華則俯輕爵位懷其道術則顧蔑王公舐痔兼車鳴鳶吞腐以茲自口於焉玩物殊異虛舟有同攘臂嵇阮竹林之會劉畢芳樽之友馳騁莊門排登李室若夫儀天布憲百官從軌經禮之外棄而不存是以帝堯縱許由於埃罔古之表光武舍子陵於潺湲之瀨松蘿低舉用以優賢巖水澄華茲焉賜隱臣行厥志主有嘉名至於嵇康遺巨源之書阮氏創先生之傳軍咨散髮吏部盜樽豈以世疾名流茲焉自垢臨鍛竈而不回登廣武而長歎則嵇琴絶響阮氣徒存通其旁徑必雕風俗召以效官居然尸素軌躅之外或有可觀者焉咸能符契情靈各敦終始愴神交於晚笛或相思而動駕史臣是以拾其遺事附于篇云贊曰老篇爰植孔教提衡各存其趣道貴無名相彼非禮遵乎達生秋水揚波春雲斂映旨酒厥德憑虛其性不玩斯風誰虧王政
