body:
  text: 晉書卷七十一列傳第四十一孫惠孫惠字德施吳國富陽人吳豫章太守賁曾孫也父祖並仕吳惠口訥好學有才識州辟不就寓居蕭沛之間永寧初赴齊王冏義討趙王倫以功封晉興縣侯辟大司馬戶曹掾轉東曹屬冏驕矜僭侈天下失望惠獻言於冏諷以五難四不可勸令歸藩辭甚切至冏不納惠懼罪辭疾去頃之冏果敗成都王穎薦惠為大將軍參軍領奮威將軍白沙督是時穎將征長沙王以陸機為前鋒都督惠與機同鄉里憂其致禍勸機讓都督於王粹及機兄弟被戮惠甚傷恨之時惠又擅殺穎牙門將梁俊懼罪因改姓名以遁後東海王越舉兵下邳惠乃詭稱南嶽逸士秦祕之以書干越曰天禍晉國遘茲厄運歷觀危亡其萌有漸枝葉先零根株乃斃伏惟明公資睿哲之才應神武之略承衰亂之餘當傾險之運側身昏讒之俗局蹐凶諂之間執夷正立則取疾姦佞抱忠懷直則見害賊臣餔糟非聖性所堪苟免非英雄之節是以感激於世發憤忘身抗辭金門則謇諤之言顯扶翼皇家則匡主之功著事雖未集大命有在夫以漢祖之賢猶有彭城之恥魏武之能亦有濮陽之失孟明三退終於致果句踐喪衆期於擒吳今明公名著天下聲振九域公族歸美萬國宗賢加以四王齊聖仁明篤友急難之感同奬王室股肱爪牙足相維持皇穹無親惟德是輔惡盈福謙鬼神所讚以明公達存亡之符察成敗之變審所履之運思天人之功武視東夏之藩龍躍海嵎之野西咨河間南結征鎮東命徑吳鋭卒之富北有幽并率義之旅宣喻青徐啓示羣王旁收雄俊廣延秀傑糾合攜二明其賞信仰惟天子蒙塵鄴宮外矯詔命擅誅無辜豺狼篡噬其事無遠夫心火傾移喪亂可必太白橫流兵家攸杖歲鎮所去天厭其德玄象著明謫譴彰見違天不祥奉時必克明公思安危人神之應慮禍敗前後之徵弘勞謙日昃之德躬吐握求賢之義傾府竭庫以振貧乏將有濟世之才渭濱之士含奇謨於朱脣握神策於玉掌逍遙川嶽之上以俟真人之求目想不世之佐耳聽非常之輔舉而任之則元勳建矣祕之不天值此衰運竊慕墨翟申包之誠跋涉荊棘重繭而至櫛風沐雨來承禍難思以管穴毗佐大猷道險時吝未敢自顯伏在川泥繫情宸極謹先白箋以啓天慮若猶沈吟際會徘徊二端徼幸在險請從恕宥之例明公今旋軫臣子之邦宛轉名義之國指麾則五嶽可傾呼吸則江湖可竭況履順討逆執正伐邪是烏獲摧冰賁育拉朽猛獸吞狐泰山壓卵因風燎原未足方也今時至運集天與神助復不能鵲起於慶命之會拔劍於時哉之機恐流濫之禍不在一人自先帝公王海內名士近者死亡皆如蟲獸尸元曳於糞壤形骸捐於溝澗非其口無忠貞之辭心無義正之節皆希目下之小生而惑終焉之大死凡人知友猶有刎頸之報朝廷之內而無死命之臣非獨祕之所恥惜乎晉世之無人久矣今天下喁喁四海注目社稷危而復安宗廟替而復紹惟明公兄弟能弘濟皇猷國之存亡在斯舉矣祕之以不才之姿而值危亂之運竭其狗馬之節加之忠貞之心左屬平亂之鞬右握滅逆之矢控馬鵠立計日俟命時難獲而易失機速變而成禍介如石焉實無終日自求多福惟君裁之越省書榜道以求之惠乃出見越即以為記室參軍專職文疏豫參謀議除散騎郎太子中庶子復請補司空從事中郎越誅周穆等夜召參軍王廙造表廙戰懼壞數紙不成時惠不在越歎曰孫中郎在表久就矣越遷太傅以惠為軍咨祭酒數咨訪得失每造書檄越或驛馬催之應命立成皆有文釆除祕書監不拜轉彭城內史廣陵相遷廣武將軍安豐內史以迎大駕之功封臨湘縣公元帝遣甘卓討周馥於壽陽惠乃率衆應卓馥敗走廬江何鋭為安豐太守惠權留郡境鋭以他事收惠下人推之惠既非南朝所授常慮讒間因此大懼遂攻殺鋭奔入蠻中尋病卒時年四十七喪還鄉里朝廷明其本心追加弔賻熊遠熊遠字孝文豫章南昌人也祖翹嘗為石崇蒼頭而性廉直有士風黃門郎潘嶽見而稱異勸崇免之乃還鄉里遠有志尚縣召為功曹不起強與衣幘扶之使謁十餘日薦於郡由是辟為文學掾遠曰辭大不辭小也固請留縣太守察遠孝廉屬太守討氐羌遠遂不行送至隴右而還後太守會稽夏靜辟為功曹及靜去職遠送至會稽以歸州辟主簿別駕舉秀才除監軍華軼司馬領武昌太守寧遠護軍元帝作相引為主簿時傳北陵被發帝將舉哀遠上疏曰園陵既不親行承傳言之者未可為定且園陵非一而直言侵犯遠近弔問答之宜當有主謂應更遣使攝河南尹案行得審問然後可發哀即宜命將至洛修復園陵討除逆類昔宋殺無畏莊王奮袂而起衣冠相追於道軍成宋城之下況此酷辱之大恥臣子奔馳之日夫修園陵至孝也討逆叛至順也救社稷至義也恤遺黎至仁也若修此四道則天下響應無思不服矣昔項羽殺義帝以為罪漢祖哭之以為義劉項存亡在此一舉羣賊豺狼弱於往日惡逆之甚重於丘山大晉受命未改於上兆庶謳吟思德於下今順天下之心命貔貅之士鳴檄前驅大軍後至威風赫然聲振朔野則上副西土義士之情下允海內延頸之望矣屬有杜韜之難不能從時江東草創農桑弛廢遠建議曰立春之日天子祈穀于上帝乃擇元辰載耒耜帥三公九卿諸侯大夫躬耕帝藉以勸農功詩云弗躬弗親庶人不信自喪亂以來農桑不修遊食者多皆由去本逐末故也時議美之建興初正旦將作樂遠諫曰謹案尚書堯崩四海遏密八音禮云凶年天子徹樂減膳孝懷皇帝梓宮未反豺狼當塗人神同忿公明德茂親社稷是賴今杜韜蟻聚湘川比歲征行百姓疲弊故使義衆奉迎未舉履端元日正始之初貢士鱗萃南北雲集有識之士於是觀禮公與國同體憂容未歇昔齊桓貫澤之會有憂中國之心不召而至者數國及葵丘自矜叛者九國人心所歸惟道與義將紹皇綱於既往恢霸業於來今表道德之軌闡忠孝之儀明仁義之統弘禮樂之本使四方之士退懷嘉則今榮耳目之觀崇戲弄之好懼違雲韶雅頌之美非納軌物有塵大教謂宜設饌以賜羣下而已元帝納之轉丞相參軍是時琅邪國侍郎王鑒勸帝親征杜韜遠又上疏曰皇綱失統中夏多故聖主肇祚遠奉西都梓宮外次未反園陵逆寇遊魂國賊未夷明公憂勞乃心王室伏讀聖教人懷慷慨杜韜小豎寇抄湘川比年征討經載不夷昔高宗伐鬼方三年乃克用兵之難非獨在今伏以古今之霸王遭時艱難亦有親征以隆大勳亦有遣將以平小寇今公親征文武將吏度支籌量舟輿器械所出若足用者然後可征愚謂宜如前遣五千人徑與水軍進征既可得速必不後時昔齊用穰苴燕晉退軍秦用王翦克平南荊必使督護得才即賊不足慮也會韜已平轉從事中郎纍遷太子中庶子尚書左丞散騎常侍帝每嘆其忠公謂曰卿在朝正色不茹柔吐剛忠亮至到可謂王臣也吾所欣賴卿其勉之及中興建帝欲賜諸吏投刺勸進者加位一等百姓投刺者賜司徒吏凡二十餘萬遠以為秦漢因赦賜爵非長制也今案投刺者不獨近者情重遠者情輕可依漢法例賜天下爵於恩為普無偏頗之失可以息檢核之煩塞巧僞之端帝不從轉御史中丞時尚書刁協用事衆皆憚之尚書郎廬綝將入直遇協于大司馬門外協醉使綝避之綝不回協令威儀牽捽綝墮馬至協車前而後釋遠奏免協官時冬雷電且大雨帝下書責躬引過遠復上疏曰被庚午詔書以雷電震暴雨非時深自克責雖禹湯罪己未足以喻臣暗於天道竊以人事論之陛下節儉敦朴愷悌流惠而王化未興者皆羣公卿士不能夙夜在公以益大化素餐負乘秕穢明時之責也今逆賊猾夏暴虐滋甚二帝幽殯梓宮未反四海延頸莫不東望而未能遣軍北討讎賊未報此一失也昔齊侯既敗七年不飲酒食肉況此恥尤大臣子之責宜在枕戈為王前驅若此志未果者當上下克儉恤人養士徹樂減膳惟修戎事陛下憂勞於上而羣官未同戚容於下每有會同務在調戲酒食而已此二失也選官用人不料實德惟在白望不求才幹鄉舉道廢請託交行有德而無力者退修望而有助者進稱職以違俗見譏虛資以從容見貴是故公正道虧私塗日開強弱相陵冤枉不理今當官者以理事為俗吏奉法為苛刻盡禮為諂諛從容為高妙放蕩為達士驕蹇為簡雅此三失也世所謂三失者公法加其身私議貶其非轉見排退陸沈泥滓時所謂三善者王法所不加清論美其賢漸相登進仕不輟官攀龍附鳳翺翔雲霄遂使世人削方為圓撓直為曲豈待顧道德之清塗踐仁義之區域乎是以萬機未整風俗僞薄皆此之由不明其黜陟以審能否此則俗未可得而變也今朝廷羣司以從順為善相違見貶不復論才之曲直言之得失也時有言者或不見用是以朝少辨爭之臣士有祿仕之志焉郭翼上書武帝擢為屯留令又置諫官所以容受直言誘進將來故人得自盡言無隱諱任官然後爵之位定然後祿之敷奏以言明試以功車服以庸舜猶歷試諸難而今先祿不試甚違古義亂之所由也求才急於疏賤用刑先於親貴然後令行禁止野無遺滯堯取舜於仄陋舜拔賢於巖穴姬公不曲繩於天倫叔向不虧法於孔懷今朝廷法吏多出於寒賤是以章書日奏而不足以懲物官人選才而不足以濟事宜招賢良於屠釣聘耿介於丘園若此道不改雖并官省職無救弊亂也能哲而惠何憂乎歡兜何遷乎有苗何畏乎巧言令色孔壬此官得其人之益也纍遷侍中出補會稽內史時王敦作逆沈充舉兵應之加遠將軍距而不受不輸軍資於充保境安衆為務敦至石頭諷朝廷徵遠乃拜太常卿加散騎常侍敦深憚其正而有謀引為長史數月病卒遠弟縉名亞於遠為王敦主簿終於鄱陽太守縉子鳴鵠位至武昌太守王鑒王鑒字茂高堂邑人也父濬御史中丞鑒少以文筆著稱初為元帝琅邪國侍郎時杜韜作逆江湘流弊王敦不能制朝廷深以為憂鑒上疏勸帝征之曰天禍晉室四海顛覆喪亂之極開闢未有明公遭曆運之厄當陽九之會聖躬負伊周之重朝廷延匡合之望方將振長轡而御八荒掃河漢而清天塗所藉之資江南之地蓋九州之隅角垂盡之餘人耳而百越鴟視於五嶺蠻蜀狼顧於湘漢江州蕭條白骨塗地豫章一郡十殘其八繼以荒年公私虛匱倉庫無旬月之儲三軍有絶乏之色賦斂搜奪周而復始卒散人流相望於道殘弱之源日深全勝之勢未舉鑒懼雲旗反旆元戎凱入未在旦夕也昔齊旅未朞而申侯懼其老況暴甲三年介胄生蟣蝨而可不深慮者哉江揚本六郡之地一州封域耳若兵不時戢人不堪命三江受敵彭蠡振搖是賊踰我垣牆之內窺我室家之好黷武之衆易動驚弓之鳥難安鑒之所甚懼也去年已來纍喪偏將軍師屢失送死之寇兵厭奔命賊量我力矣雖繼遣偏裨懼未足成功也愚謂尊駕宜親幸江州然後方召之臣其力可得而宣熊羆之士其鋭可得而奮進左軍於武昌為陶侃之重建名將於安成連甘卓之壘南望交廣西撫蠻夷要害之地勒徑卒以保之深溝堅壁按精甲而守之六軍既贍戰士思奮爾乃乘隙騁奇擾其窟穴顯示大信開以生塗杜韜之頸固已鎖於麾下矣議者將以大舉役重人不可擾鑒謂暫擾以制敵愈於放敵而常擾也夫四體者人之所甚愛苟宜伐病則削肌刮骨矣然守不可虛鑒謂王導可委以蕭何之任或以小賊方斃不足動千乘之重鑒見王彌之初亦小寇也官軍不重其威狡逆得肆其變卒令溫懷不守三河傾覆致有今日之弊此已然之明驗也蔓草猶不可長況狼兕之寇乎當五霸之世將非不良士非不勇征伐之役君必親之故齊桓免胄於邵陵晉文擐甲於城濮昔漢高光武二帝征無遠近敵無大小必手振金鼓身當矢石櫛風沐雨壺漿不贍馳騖四方匪遑寧處然後皇基克構元勳以融今大弊之極劇於曩代崇替之命繫我而已欲使鑾旗無野次之役聖躬遠風塵之勞而大功坐就鑒未見其易也魏武既定中國親征柳城揚旍盧龍之嶺頓轡重塞之表非有當時烽燧之虞蓋一日縱敵終己之患雖戎輅蒙嶮不以為勞況急於此者乎劉玄德躬登漢山而夏侯之鋒摧吳僞祖親泝長江而關羽之首懸袁紹猶豫後機挫衄三分之勢劉表臥守其衆卒亡全楚之地歷觀古今撥亂之主雖聖賢未有高拱間居不勞而濟者也前鑒不遠可謂蓍龜議者或以當今暑夏非出軍之時鑒謂今宜嚴戒須秋而動高風啓塗龍舟電舉曾不十日可到豫章豫章去賊尚有千里之限但臨之以威靈則百勝之理濟矣既掃清湘野滌蕩楚郢然後班爵序功酬將士之勞卷甲韜旗廣農桑之務播愷悌之惠除煩苛之賦比及數年國富兵強龍驤虎步以威天下何思而不服何往而不濟桓文之功不難懋也今惜一舉之勞而緩垂死之寇誠國家之大恥臣子之深憂也鑒以凡瑣謬蒙奬育思竭愚忠以補萬一芻蕘之言聖王不棄戍卒之謀先后採之乞留神鑒思其所陳疏奏帝深納之即命中外戒嚴將自征韜會韜已平故止中興建拜駙馬都尉奉朝請出補永興令大將軍王敦請為記室參軍未就而卒時年四十一文集傳于世鑒弟濤及弟子戭並有才筆濤字茂略歷著作郎無錫令戭字庭堅亦為著作並早卒陳頵陳頵字延思陳國苦人也少好學有文義父欣立宅起門頵曰當使容馬車欣笑而從之仕為郡督郵檢獲隱匿者三千人為一州尤最太守劉享拔為主簿州辟部從事乘馬車還家宗黨榮之劾案沛王韜獄未竟會解結代楊準為刺史韜因河間王顒屬結結至大會問主簿史鳳曰沛王貴藩州據何法而擅拘邪時頵在坐對曰甲午詔書刺史銜命國之外臺其非所部而在境者刺史并糾事徵文墨前後列上七被詔書如州所劾無有違謬結曰衆人之言不可妄聽宜依法窮竟又問僚佐曰河北白壤膏粱何故少人士每以三品為中正答曰詩稱維嶽降神生甫及申夫英偉大賢多出於山澤河北土平氣均蓬蒿裁高三尺不足成林故也結曰張彥真以為汝潁巧辨恐不及青徐儒雅也頵曰彥真與元禮不協故設過言老子莊周生陳梁伏羲傅說師曠大項出陽夏漢魏二祖起於沛譙準之衆州莫之與比結甚異之曰豫州人士常半天下此言非虛會結遷尚書結恨不得盡其才用元康中舉孝廉而州將留之頵薦同縣焦保曰保出自寒素稟質清沖若得參嘉命必能光贊大猷允清朝望使黃憲之徒不乏於豫土令頵庶免臧文之責州乃辟保齊王冏起義州遣頵將兵赴之拜駙馬都尉遭賊避難于江西歷陽內史朱彥引為參軍鎮東從事中郎袁琇薦頵於元帝遷鎮東行參軍事典法兵二曹頵與王導書曰中華所以傾弊四海所以土崩者正以取才失所先白望而後實事浮競驅馳互相貢薦言重者先顯言輕者後遂相波扇乃至陵遲加有莊老之俗傾惑朝廷養望者為弘雅政事者為俗人王職不恤法物墜喪夫欲制遠先由近始故出其言善千里應之今宜改張明賞信罰拔卓茂於密縣顯朱邑於桐鄉然後大業可舉中興可冀耳建興初制版補録事參軍參佐掾屬多設解故以避事任頵議諸僚屬乘昔西臺養望餘弊小心恭肅更以為俗偃蹇倨慢以為優雅至今朝士縱誕臨事遊行漸弊不革以至傾國故百尋之屋突直而燎焚千里之隄蟻垤而穿敗古人防小以全大慎微以杜萌自今臨使稱疾須催乃行者皆免官初趙王倫篡位三王起義制己亥格其後論功雖小亦皆依用頵意謂不宜以為常式駁之曰聖王懸爵賞功制罰糾違斯道苟明人赴水火且名器之實不可妄假非才謂之致寇寵厚戒在斯亡昔孫秀口唱篡逆手弄天機惠皇失御九服無戴三王建議席卷四海合起義之衆結天下之心故設己亥義格以權濟難此自一切之法非常倫之格也其起義以來依格雜猥遭人為侯或加兵伍或出皂僕金紫佩士卒之身符策委庸隸之門使天官降辱王爵黷賤非所以正皇綱重名器之謂也請自今以後宜停之頵以孤寒數有奏議朝士多惡之出除譙郡太守太興初以疾徵久之白衣兼尚書因陳時務以為昔江外初平中州荒亂故貢舉不試宜漸循舊搜揚隱逸試以經策又馬隆孟觀雖出貧賤勳濟甚大以所不習而統戎事鮮能以濟宜開舉武略任將率者言問核試盡其所能然後隨才授任舉十得一猶勝不舉況或十得二三日磾降虜七世內侍由余戎狄入為秦相豈藉華宗之族見齒於奔競之流乎宜引幽滯之雋抑華校實則天清地平人神感應後拜天門太守殊俗安之選腹心之吏為荊州參軍若有調發動靜馳白故得宿辦陶侃征還頵先至巴陵上禮侃以為能表為梁州刺史綏懷荒弊甚有威惠梁州大姓互相嫉妬說頵年老耳聾侃召頵還以西陽太守蔣巽代之年六十九卒高嵩高嵩字茂琰廣陵人也父悝少孤事母以孝聞年十三值歲饑悝菜蔬不饜每致甘肥於母撫幼弟以友愛稱寓居江州刺史華軼辟為西曹書佐及軼敗悝藏匿軼子經年會赦乃出元帝嘉而宥之以為參軍遂歷顯位至丹楊尹光祿大夫封建昌伯嵩少好學善史書總角時司空何充稱其明惠充為揚州引嵩為主簿益相欽重轉驃騎主簿舉州秀才除太學博士父艱去職初悝以納妾致訟被黜及終嵩乃自繫廷尉訟冤遂停喪五年不葬表疏數十上帝哀之乃下詔曰悝備位大臣違憲被黜事已久判其子嵩求直無已今特聽傳侯爵由是見稱拜中書郎黃門侍郎簡文帝輔政引為撫軍司馬時桓溫擅威率衆北伐軍次武昌簡文患之嵩曰宜致書喻以禍福自當反旆如其不爾便六軍整駕逆順於茲判矣若有異計請先釁鼓便於坐為簡文書草曰寇難宜平時會宜接此實為國遠圖經略大算能弘斯會非足下而誰但以此興師動衆要當以資實為本運轉之艱古人之所難不可易之於始而不熟慮頃所以深用惟疑在乎此耳然異常之舉衆之所駭遊聲噂想足下亦少聞之苟患失之無所不至或能望風振擾一時崩散如其不然者則望實並喪社稷之事去矣皆由吾暗弱德信不著不能鎮靜羣庶保固維城所以內愧於心外慚良友吾與足下雖職有內外安社稷保家國其致一也天下安危繫之明德先存寧國而後圖其外使王基克隆大義弘著所望於足下區區誠懷豈可復顧嫌而不盡哉溫得書還鎮嵩纍遷侍中是時謝萬為豫州都督疲於親賓相送方臥在室嵩徑造之謂曰卿今疆理西藩何以為政萬粗陳其意嵩便為刑政之要數百言萬遂起坐呼嵩小字曰阿酃故有才具邪哀帝雅好服食嵩諫以為非萬乘所宜陛下此事實日月之一食也後以公事免卒於家子耆官至散騎常侍史臣曰昔張良拙說項氏巧謀於沛公孫惠沮計齊王耀奇於東海終而誓甘之旅炎運載昌稱狩之師金行不競豈遭時之會斯蹇將謀國之道未通迷於委質之貞暗於所修之慮本既顛矣何以能終熊遠王鑒有毗濟之道比之大廈其榱桷之佐乎嵩之詆溫頵之距結挫其勞役之策申其汝潁之論採郭嘉之風旨挹朱育之餘波故桓溫輟許攸之謀解結欽王朗之跡緝之時典用此道歟贊曰臨湘游藝才識英發詭名違穎陳書干越孝文忠謇嘉言斯踐茂高器鑒雕章尤善侯爵嵩傳高門頵顯
