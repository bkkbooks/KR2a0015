body:
  text: 晉書卷八十九列傳第五十九忠義古人有言君子殺身以成仁不求生以害仁又云非死之難處死之難信哉斯言也是知隕節苟合其宜義夫豈吝其沒捐軀若得其所烈士不愛其存故能守鐵石之深衷厲松筠之雅操見貞心於歲暮標徑節於嚴風赴鼎鑊其如歸履危亡而不顧書名竹帛畫象丹青前史以為美談後來仰其徽烈者也晉自元康之後政亂朝昏禍難荐興艱虞孔熾遂使姦凶放命戎狄交侵函夏沸騰蒼生塗炭干戈日用戰爭方興雖背恩忘義之徒不可勝載而蹈節輕生之士無乏於時至若嵇紹之衛難乘輿卞壼之亡軀鋒鏑桓雄之義高田叔周崎之節邁解揚羅丁致命于舊君辛吉恥臣于戎虜張禕引鴆以全節王諒斷臂以厲忠莫不志烈秋霜精貫白日足以激清風于萬古厲薄俗于當年者歟所謂亂世識忠臣斯之謂也卞壼劉超鍾雅周虓等已入列傳其餘即其行事以為忠義傳用旌晉氏之有人焉嵇紹從子含嵇紹字延祖魏中散大夫康之子也十歲而孤事母孝謹以父得罪靖居私門山濤領選啓武帝曰康誥有言父子罪不相及嵇紹賢侔郤缺宜加旌命請為祕書郎帝謂濤曰如卿所言乃堪為丞何但郎也乃發詔徵之起家為祕書丞紹始入洛或謂王戎曰昨於稠人中始見嵇紹昂昂然如野鶴之在雞羣戎曰君復未見其父耳纍遷汝陰太守尚書左僕射裴頠亦深器之每曰使延祖為吏部尚書可使天下無復遺才矣沛國戴晞少有才智與紹從子含相友善時人許以遠致紹以為必不成器晞後為司州主簿以無行被斥州黨稱紹有知人之明轉豫章內史以母憂不之官服闋拜徐州刺史時石崇為都督性雖驕暴而紹將之以道崇甚親敬之後以長子喪去職元康初為給事黃門侍郎時侍中賈謐以外戚之寵年少居位潘嶽杜斌等皆附託焉謐求交於紹紹距而不答及謐誅紹時在省以不阿比凶族封弋陽子遷散騎常侍領國子博士太尉廣陵公陳準薨太常奏諡紹駁曰諡號所以垂之不朽大行受大名細行受細名文武顯於功德靈厲表於暗蔽自頃禮官協情諡不依本準諡為過宜諡曰繆事下太常時雖不從朝廷憚焉趙王倫篡位署為侍中惠帝復阼遂居其職司空張華為倫所誅議者追理其事欲復其爵紹又駁之曰臣之事君當除煩去惑華歷位內外雖粗有善事然闔棺之責著于遠近兆禍始亂華實為之故鄭討幽公之亂斫子家之棺魯戮隱罪終篇貶翬未忍重戮事已弘矣謂不宜復其爵位理其無罪時帝初反正紹又上疏曰臣聞改前轍者則車不傾革往弊者則政不爽太一統于元首百司役于多士故周文興于上成康穆于下也存不忘亡易之善義願陛下無忘金墉大司馬無忘潁上大將軍無忘黃橋則禍亂之萌無由而兆矣齊王冏既輔政大興第舍驕奢滋甚紹以書諫曰夏禹以卑室稱美唐虞以芧茨顯德豐屋蔀家無益危亡竊承毀敗太樂以廣第舍興造功力為三王立宅此豈今日之先急哉今大事始定萬姓顒顒咸待覆潤宜省起造之煩深思謙損之理復主之勳不可棄矣矢石之殆不可忘也冏雖謙順以報之而卒不能用紹嘗詣冏咨事遇冏宴會召董艾葛旟等共論時政艾言於冏曰嵇侍中善於絲竹公可令操之左右進琴紹推不受冏曰今日為歡卿何吝此邪紹對曰公匡復社稷當軌物作則垂之于後紹雖虛鄙忝備常伯腰紱冠冕鳴玉殿省豈可操執絲竹以為伶人之事若釋公服從私宴所不敢辭也冏大慚艾等不自得而退頃之以公事免冏以為左司馬旬日冏被誅初兵交紹奔散赴宮有持弩在東閣下者將射之遇有殿中將兵蕭隆見紹姿容長者疑非凡人趣前拔箭於此得免遂還滎陽舊宅尋徵為御史中丞未拜復為侍中河間王顒成都王穎舉兵向京都以討長沙王乂大駕次于城東乂宣言於衆曰今日西討欲誰為都督乎六軍之士皆曰願嵇侍中勠力前驅死猶生也遂拜紹使持節平西將軍屬乂被執紹復為侍中公王以下皆詣鄴謝罪於穎紹等咸見廢黜免為庶人尋而朝廷復有北征之役徵紹復其爵位紹以天子蒙塵承詔馳詣行在所值王師敗績于蕩陰百官及侍衛莫不散潰唯紹儼然端冕以身捍衛兵交御輦飛箭雨集紹遂被害于帝側血濺御服天子深哀歎之及事定左右欲浣衣帝曰此嵇侍中血勿去初紹之行也侍中秦準謂曰今日向難卿有佳馬否紹正色曰大駕親征以正伐逆理必有征無戰若使皇輿失守臣節有在駿馬何為聞者莫不歎息及張方逼帝遷長安河間王顒表贈紹司空進爵為公會帝還洛陽事遂未行東海王越屯許路經滎陽過紹墓哭之悲慟刊石立碑又表贈官爵帝乃遣使册贈侍中光祿大夫加金章紫綬進爵為侯賜墓田一頃客十戶祠以少牢元帝為左丞相承制以紹死節事重而贈禮未副勳德更表贈太尉祠以太牢及帝即位賜諡曰忠穆復加太牢之祠紹誕于行己不飾小節然曠而有檢通而不雜與從子含等五人共居撫恤如所同生門人故吏思慕遺愛行服墓次畢三年者三十餘人長子眕有父風早夭以從孫翰襲封成帝時追述紹忠以翰為奉朝請翰以無兄弟自表還本宗太元中孝武帝詔曰褒德顯仁哲王令典故太尉忠穆公執德高邈在否彌宣貞潔之風義著千載每念其事愴然傷懷忠貞之胤蒸嘗宜遠所以大明至節崇奬名教可訪其宗族襲爵主祀於是復以翰孫曠為弋陽侯含字君道祖喜徐州刺史父蕃太子舍人含好學能屬文家在鞏縣亳丘自號亳丘子門曰歸厚之門室曰慎終之室楚王瑋辟為掾瑋誅坐免舉秀才除郎中時弘農王粹以貴公子尚主館宇甚盛圖莊周于室廣集朝士使含為之讚含援筆為弔文文不加點其序曰帝壻王弘遠華池豐屋廣延賢彥圖莊生垂綸之象記先達辭聘之事畫真人於刻桷之室載退士於進趣之堂可謂託非其所可弔不可讚也其辭曰邁矣莊周天縱特放大塊授其生自然資其量器虛神清窮玄極曠人偽俗季真風既散野無訟屈之聲朝有爭寵之歎上下相陵長幼失貫於是借玄虛以助溺引道德以自奬戶詠恬曠之辭家畫老莊之象今王生沈淪名利身尚帝女連耀三光有出無處池非巖石之溜宅非芧茨之宇馳屈産於皇衢畫茲象其焉取嗟乎先生高迹何局生處巖岫之居死寄雕楹之屋託非其所沒有餘辱悼大道之湮晦遂含悲而吐曲粹有愧色齊王冏辟為征西參軍襲爵武昌鄉侯長沙王乂召為驃騎記室督尚書郎乂與成都王穎交戰穎軍轉盛尚書郎旦出督戰夜還理事含言于乂曰昔魏武每有軍事增置掾屬青龍二年尚書令陳矯以有軍務亦奏增郎今姦逆四逼王路擁塞倒懸之急不復過此但居曹理事尚須增郎況今都官中騎三曹晝出督戰夜還理事一人兩役內外廢乏含謂今有十萬人都督各有主帥推轂授綏委付大將不宜復令臺僚雜與其間乂從之乃增郎及令史懷帝為撫軍將軍以含為從事中郎惠帝北征轉中書侍郎及蕩陰之敗含走歸滎陽永興初除太弟中庶子西道阻閡未得應召范陽王虓為征南將軍屯許昌復以含為從事中郎尋授振威將軍襄城太守虓為劉喬所破含奔鎮南將軍劉弘於襄陽弘待以上賓之禮含性通敏好薦達才賢常欲崇趙武之諡加臧文之罪屬陳敏作亂江揚震蕩南越險遠而廣州刺史王毅病卒弘表含為平越中郎將廣州刺史假節未發會弘卒時或欲留含領荊州含性剛躁素與弘司馬郭勱有隙勱疑含將為己害夜掩殺之時年四十四懷帝即位諡曰憲王豹王豹順陽人也少而抗直初為豫州別駕齊王冏為大司馬以豹為主簿冏驕縱失天下心豹致箋於冏曰豹聞王臣蹇蹇匪躬之故將以安主定時保存社稷者也是以為人臣而欺其君者刑罰不足以為誅為人主而逆其諫者靈厲不足以為諡伏惟明公虛心下士開懷納善款誠以著而逆耳之言未入於聽豹伏思晉政漸缺始自元康以來宰相在位未有一人獲終乃事勢使然未為輒有不善也今公克平禍亂安國定家故復因前傾敗之法尋中間覆車之軌欲冀長存非所敢聞今河間樹根於關右成都盤桓於舊魏新野大封於江漢三面貴王各以方剛強盛並典戎馬處險害之地且明公興義討逆功蓋天下聖德光茂名震當世今以難賞之功挾震主之威獨據京都專執大權進則亢龍有悔退則蒺藜生庭冀此求安未知其福敢以淺見陳寫愚情昔武王伐紂封建諸侯為二伯自陝以東周公主之自陝以西召公主之及至其末霸國之世不過數州之地四海強兵不敢入窺九鼎所以然者天下習於所奉故也今誠能尊用周法以成都為北州伯統河北之王侯明公為南州伯以攝南土之官長各因本職出居其方樹德於外盡忠於內歲終率所領而貢於朝簡良才命賢俊以為天子百官則四海長寧萬國幸甚明公之德當與周召同其至美危敗路塞社稷可保願明公思高祖納婁敬之策悟張良履足之謀遠臨深之危保泰山之安若合聖思宛許可都也書入無報豹重箋曰豹書御已來十有二日而聖旨高遠未垂採察不賜一字之令不敕可否之宜蓋霸王之神寶安危之祕術不可須臾而忽者也伏思明公挾大功抱大名懷大德執大權此四大者域中所不能容賢聖所以戰戰兢兢日昃不暇食雖休勿休者也昔周公以武王為兄成王為君伐紂有功以親輔政執德弘深聖恩博遠至忠至仁至孝至敬而攝事之日四國流言離主出奔居東三年賴風雨之變成王感悟若不遭皇天之應神人之察恐公旦之禍未知所限也至于執政猶與召公分陝為伯今明公自視功德孰如周公且元康以來宰相之患危機竊發不及容思密禍潛起輒在呼吸豈復晏然得全生計前鑒不遠公所親見也君子不有遠慮必有近憂憂至乃悟悔無所及也今若從豹此策皆遣王侯之國北與成都分河為伯成都在鄴明公都宛寬方千里以與圻內侯伯子男小大相率結好要盟同奬皇家貢御之法一如周典若合聖規可先旨與成都共論雖以小才願備行人昔厮養燕趙之微者耳百里奚秦楚之商人也一開其説兩國以寧況豹雖陋大州之綱紀加明公起事險難之主簿也故身雖輕其言未必否也冏令曰得前後白事具意輒別思量也會長沙王乂至于冏案上見豹箋謂冏曰小子離間骨肉何不銅駝下打殺冏既不能嘉豹之策遂納乂言乃奏豹曰臣忿姦凶肆逆皇祚顛墜與成都長沙新野共興義兵安復社稷唯欲勠力皇家與親親宗室腹心從事此臣夙夜自誓無負神明而主簿王豹比有白事敢造異端謂臣忝備宰相必遘危害慮在一旦不祥之聲可蹻足而待欲臣與成都分陝為伯盡出藩王上誣聖朝鑒御之威下長妖惑疑阻衆心噂背憎巧賣兩端訕上謗下讒內間外遘惡導姦坐生猜嫌昔孔丘匡魯乃誅少正子産相鄭先戮鄧析誠以交亂名實若趙高詭怪之類也豹為臣不忠不順不義輒敕都街考竟以明邪正豹將死曰懸吾頭大司馬門見兵之攻齊也衆庶冤之俄而冏敗劉沈劉沈字道真燕國薊人也世為北州名族少仕州郡博學好古太保衛瓘辟為掾領本邑大中正敦儒道愛賢能進霍原為二品及申理張華皆辭旨明峻為當時所稱齊王冏輔政引為左長史遷侍中于時李流亂蜀詔沈以侍中假節統益州刺史羅尚梁州刺史許雄等以討流行次長安河間王顒請留沈為軍司遣席薳代之後領雍州刺史及張昌作亂詔顒遣沈將州兵萬人并征西府五千人自藍田關以討之顒不奉詔沈自領州兵至藍田顒又逼奪其衆長沙王乂命沈將武吏四百人還州張方既逼京都王師屢敗王瑚祖逖言于乂曰劉沈忠義果毅雍州兵力足制河間宜啓上詔與沈使發兵襲顒顒窘急必召張方以自救此計之良也乂從之沈奉詔馳檄四境合七郡之衆及守防諸軍塢壁甲士萬餘人以安定太守衛博新平太守張光安定功曹皇甫淡為先登襲長安顒時頓于鄭縣之高平亭為東軍聲援聞沈兵起還鎮渭城遣督護虞夔率步騎萬餘人逆沈于好畤接戰夔衆敗顒大懼退入長安果急呼張方沈渡渭而壘顒每遣兵出鬬輒不利沈乘勝攻之使淡博以精甲五千從長安門而入力戰至顒帳下沈軍來遲顒軍見淡等無繼氣益倍馮翊太守張輔率衆救顒橫擊之大戰于府門博父子皆死之淡又被擒顒奇淡壯勇將活之淡不為之屈於是見殺沈軍遂敗率餘卒屯于故營張方遣其將敦偉夜至沈軍大驚而潰與麾下百餘人南遁為陳倉令所執沈謂顒曰夫知己之顧輕在三之節重不可違君父之詔量強弱以苟全投袂之日期之必死葅醢之戮甘之如薺辭義慷慨見者哀之顒怒鞭之而後腰斬有識者以顒干上犯順虐害忠義知其滅亡不久也麴允焦嵩麴允金城人也與遊氏世為豪族西州為之語曰麴與遊牛羊不數頭南開朱門北望青樓洛陽傾覆閻鼎等立秦王為皇太子於長安鼎總攝百揆允時為安夷護軍始平太守心害鼎功且規權勢因鼎殺京兆太守梁綜乃與綜弟馮翊太守緯等攻鼎走之會雍州刺史賈匹為屠各所殺允代其任愍帝即尊位以允為尚書左僕射領軍持節西戎校尉録尚書事雍州如故時劉曜殷凱趙染數萬衆逼長安允擊破之擒凱於陳曜復攻北地允為大都督驃騎將軍次于青白城以救之曜聞而轉寇上郡允軍于靈武以兵弱不敢進曜後復圍北地太守麴昌遣使求救允率步騎赴之去城數十里羣賊繞城放火煙塵蔽天縱反間詐允曰郡城已陷焚燒向盡無及矣允信之衆懼而潰後數日麴昌突圍赴長安北地遂陷允性仁厚無威斷吳皮王隱之徒無賴凶人皆加重爵新平太守竺恢始平太守楊像扶風太守竺爽安定太守焦嵩皆征鎮杖節加侍中常侍村塢主帥小者猶假銀青將軍之號欲以撫結衆心然諸將驕恣恩不及下人情頗離由是羌胡因此跋扈關中淆亂劉曜復攻長安百姓飢甚死者太半久之城中窘逼帝將出降歎曰誤我事者麴索二公也帝至平陽為劉聰所幽辱允伏地號哭不能起聰大怒幽之於獄允發憤自殺聰嘉其忠烈贈車騎將軍諡節愍侯焦嵩安定人初率衆據雍曜之逼京都允告難於嵩嵩素侮允曰須允困當救之及京都敗嵩亦尋為寇所滅賈渾賈渾不知何郡人也太安中為介休令及劉元海作亂遣其將喬晞攻陷之渾抗節不降曰吾為晉守不能全之豈苟求生以事賊虜何面目以視息世間哉晞怒執將殺之晞將尹嵩曰將軍舍之以勸事君晞不聽遂害之王育王育字伯春京兆人也少孤貧為人傭牧羊每過小學必歔欷流涕時有暇即折蒲學書忘而失羊為羊主所責育將鬻己以償之同郡許子章敏達之士也聞而嘉之代育償羊給其衣食使與子同學遂博通經史身長八尺餘鬚長三尺容貌絶異音聲動人子章以兄之子妻之為立別宅分之資業育受之無愧色然行己任性頗不偶俗妻喪弔之者不過四五人然皆鄉閭名士太守杜宣命為主簿俄而宣左遷萬年令杜令王攸詣宣宣不迎之攸怒曰卿往為二千石吾所敬也今吾儕耳何故不見迎欲以小雀遇我使我畏死鷂乎育執刀叱攸曰君辱臣死自昔而然我府君以非罪黜降如日月之蝕耳小縣令敢輕辱吾君汝謂吾刀鈍邪敢如是乎前將殺之宣懼跣下抱育乃止自此知名司徒王渾辟為掾除南武陽令為政清約宿盜逃奔他郡遷并州督護成都王穎在鄴又以育為振武將軍劉元海之為北單于育説穎曰元海今去育請為殿下促之不然懼不至也穎然之以育為破虜將軍元海遂拘之其後以為太傅韋忠韋忠字子節平陽人也少慷慨有不可奪之志好學博通性不虛諾閉門修己不交當世每至吉凶親表贈遺一無所受年十二喪父哀慕毀悴杖而後起司空裴秀弔之匍匐號訴哀慟感人秀出而告人曰此子長大必為佳器歸而命子頠造焉服闋遂廬於墓所頠慕而造之皆託行不見家貧藜藿不充人不堪其憂而忠不改其樂頠為僕射數言之於司空張華華辟之辭疾不起人問其故忠曰吾茨簷賤士本無宦情且茂先華而不實裴頠欲而無厭棄典禮而附賊后若此豈大丈夫之所宜行邪裴常有心託我常恐洪濤蕩嶽餘波見漂況可臨尾閭而窺沃焦哉太守陳楚迫為功曹會山羌破郡楚攜子出走賊射之中三創忠冒刃伏楚以身捍之泣曰韋忠願以身代君乞諸君哀之亦遭五矢賊相謂曰義士也舍之忠於是負楚以歸後仕劉聰為鎮西大將軍平羌校尉討叛羌矢盡不屈節而死辛勉辛勉字伯力隴西狄道人也父洪左衛將軍勉博學有貞固之操懷帝世纍遷為侍中及洛陽陷隨帝至平陽劉聰將署為光祿大夫勉固辭不受聰遣其黃門侍郎喬度齎藥酒逼之勉曰大丈夫豈以數年之命而虧高節事二姓下見武皇帝哉引藥將飲度遽止之曰主上相試耳君真高士也歎息而去聰嘉其貞節深敬異之為築室于平陽西山月致酒米勉亦辭而不受年八十卒勉族弟賓愍帝時為尚書郎及帝蒙塵於平陽劉聰使帝行酒洗爵欲觀晉臣在朝者意賓起而抱帝大哭聰曰前殺庾珉輩故不足為戒邪引出遂加害焉劉敏元劉敏元字道光北海人也厲己修學不以險難改心好星曆陰陽術數潛心易太玄不好讀史常謂同志曰誦書當味義根何為費功於浮辭之文易者義之源太玄理之門能明此者即吾師也永嘉之亂自齊西奔同縣管平年七十餘隨敏元而西行及滎陽為盜所劫敏元已免乃還謂賊曰此公孤老餘年無幾敏元請以身代願諸君舍之賊曰此公於君何親敏元曰同邑人也窮窶無子依敏元為命諸君若欲役之老不堪使若欲食之復不如敏元乞諸君哀也有一賊瞋目叱敏元曰吾不放此公憂不得汝乎敏元奮劍曰吾豈望生邪當殺汝而後死此公窮老神祇尚當哀矜之吾親非骨肉義非師友但以見投之故乞以身代諸大夫慈惠皆有聽吾之色汝何有靦面目而發斯言顧謂諸盜長曰夫仁義何常寧可失諸君子上當為高皇光武之事下豈失為陳項乎當取之由道使所過稱詠威德奈何容畜此人以損盛美當為諸君除此人以成諸君霸王之業前將斬之盜長遽止之而相謂曰義士也害之犯義乃俱免之後仕劉曜為中書侍郎太尉長史周該周該天門人也性果烈以義勇稱雖不好學而率由名教叔父級為宜都內史亦忠節士也聞譙王承立義湘州甘卓又不同王敦之舉而書檄不至級謂該曰吾嘗疾王敦挾陵上之心今稱兵構逆有危社稷之勢譙王宗室之望據方州之重建旗誓衆圖襲武昌甘安南少著勇名士馬器械當今為盛聞與譙王剋期舉義此乃烈士急病之秋吾致死之時也汝其成吾之志申款于譙王乎該欣然奉命潛至湘州與承相見口陳至誠承大悅會王敦遣其將魏乂圍承甚急該乃與湘州從事周崎間出反命俱為乂所執考之至死竟不言其故級由是獲免王敦之難桓雄桓雄長沙人也少仕州郡譙王承為湘州刺史命為主簿王敦之逆承為敦將魏乂所執佐吏奔散雄與西曹韓階從事武延並毀服為僮豎隨承向武昌乂見雄姿貌長者進退有禮知非凡人有畏憚之色因害之韓階韓階長沙人也性廉謹篤慎為閭里所敬愛刺史譙王承辟為議曹祭酒轉西曹書佐及承為魏乂所執送武昌階與武延等同心隨從在承左右桓雄被害之後二人執志愈固及承遇禍階延親營殯斂送柩還都朝夕哭奠俱葬畢乃還周崎周崎邵陵人也為湘州從事王敦之難譙王承使崎求救于外與周該俱為魏乂偵人所執乂責崎辭情臨以白刃崎曰州將使求援于外本無定指隨時制宜耳又謂崎曰汝為我語城中稱大將軍已破劉隗戴若思甘卓住襄陽無復異議三江州郡萬里肅清外援理絶如是者我當活汝崎偽許之既到城下大呼曰王敦軍敗於于湖甘安南已克武昌即日分遣大衆來赴此急努力堅守賊今散矣乂於是數而殺之易雄易雄字興長長沙瀏陽人也少為縣吏自念卑賤無由自達乃脫幘挂縣門而去因習律令及施行故事交結豪右州里稍稱之仕郡為主簿張昌之亂也執太守萬嗣將斬之雄與賊爭論曲直賊怒叱使牽雄斬之雄趨出自若賊又呼問之雄對如初如此者三賊乃舍之嗣由是獲免雄遂知名舉孝廉為州主簿遷別駕自以門寒不宜久處上綱謝職還家後為舂陵令刺史譙王承既距王敦將謀起兵以赴朝廷雄承符馳檄遠近列敦罪惡宣募縣境數日之中有衆千人負糧荷戈而從之承既固守而湘中殘荒之後城池不完兵資又闕敦遣魏乂李攻之雄勉厲所統扞禦纍旬士卒死傷者相枕力屈城陷為乂所虜意氣慷慨神無懼色送到武昌敦遣人以檄示雄而數之雄曰此實有之惜雄位微力弱不能救國之難王室如燬雄安用生為今日即戮得作忠鬼乃所願也敦憚其辭正釋之衆人皆賀雄笑曰昨夜夢乘車挂肉其傍夫肉必有筋筋者斤也車傍有斤吾其戮乎尋而敦遣殺之當時見者莫不傷惋樂道融樂道融丹楊人也少有大志好學不倦與朋友信每約己而務周給有國士之風為王敦參軍敦將圖逆謀害朝賢以告甘卓卓以為不可遲留不赴敦遣道融召之道融雖為敦佐忿其逆節因説卓曰主上躬統萬機非專任劉隗今慮七國之禍故割湘州以削諸侯而王氏擅權日久卒見分政便謂被奪耳王敦背恩肆逆舉兵伐主國家待君至厚今若同之豈不負義生為逆臣死為愚鬼永成宗黨之恥邪君當偽許應命而馳襲武昌敦衆聞之必不戰自散大勳可就矣卓大然之乃與巴東監軍柳純等露檄陳敦過逆率所統致討又遣齎表詣臺卓性不果決且年老多疑遂待諸方同進出軍稽遲至豬口敦聞卓已下兵卓兄子卬時為敦參軍使卬求和於卓令其旋軍卓信之將旋主簿鄧騫與道融勸卓曰將軍起義兵而中廢為敗軍之將竊為將軍不取今將軍之下士卒各求其利一旦而還恐不可得也卓不從道融晝夜涕泣諫卓憂憤而死虞悝虞悝長沙人也弟望字子都並有士操孝悌廉信為鄉黨所稱而俱好臧否以人倫為己任少仕州郡兄弟更為治中別駕元帝為丞相招延四方之士多辟府掾時人謂之百六掾望亦被召恥而不應譙王承臨州知其名檄悝為長史未到遭母喪會王敦作逆承往弔悝因留與語曰吾前被詔遣鎮此州正以王敦專擅防其為禍今敦果為逆謀吾受任一方欲率所領馳赴朝廷而衆少糧乏且始到貴州恩信未著卿兄弟南夏之翹俊而智勇遠聞古人墨絰即戎況今鯨鯢塞路王室危急安得遂罔極之情忘忠義之節乎如今起事將士器械可以濟不悝望對曰王敦居分陝之任一旦構逆圖危社稷此天地所不容人神所忿疾大王不以猥劣枉駕訪及悝兄弟並受國恩敢不自奮今天朝中興人思晉德大王以宗子之親奉信順而誅有罪孰不荷戈致命但鄙州荒弊糧器空竭舟艦寡少難以進討宜且收衆固守傳檄四方其勢必分然後圖之事可捷也承以為然乃命悝為長史望為司馬督護諸軍湘東太守鄭淡敦之姊夫也不順承旨遣望討之望率衆一旅直入郡斬淡以徇四境及魏乂來攻望每先登力戰而死城破悝復為乂所執將害之子弟對之號泣悝謂曰人生有死闔門為忠義鬼亦何恨哉及王敦平贈悝襄陽太守望滎陽太守遣謁者至墓祭以少牢沈徑沈徑字世堅吳興武康人也父充與王敦構逆衆敗而逃為部曲將吳儒所殺徑當坐誅鄉人錢舉匿之得免其後竟殺讎人徑少有節操哀父死于非義志欲立勳以雪先恥年三十餘以刑家不得仕進郡將王胡之深異之及遷平北將軍司州刺史將鎮洛陽上疏曰臣當藩衛山陵式遏戎狄雖義督羣心人思自百然方翦荊棘奉宣國恩艱難急病非才不濟吳興男子沈徑清操著於鄉邦貞固足以幹事且臣今西文武義故吳興人最多若令徑參臣府事者見人既悅義附亦衆徑父充昔雖得罪先朝然其門戶纍蒙曠蕩不審可得特垂沛然許臣所上否詔聽之徑既應命胡之以疾病解職升平中慕容恪侵逼山陵時冠軍將軍陳祐守洛陽衆不過二千徑自表求配祐效力因以徑補冠軍長史令自募壯士得千餘人以助祐擊賊頻以寡制衆而糧盡援絶祐懼不能保全會賊寇許昌祐因以救許昌為名興寧三年留徑以五百人守城祐率衆而東會許昌已沒祐因奔崖塢徑志欲致命欣獲死所尋為恪所攻城陷被執神氣自若恪奇而將宥之其中軍將軍慕容虔曰徑雖奇士觀其志度終不為人用今若赦之必為後患遂遇害恪還從容言於慕容暐曰前平廣固不能濟辟閭今定洛陽而殺沈徑實有愧於四海朝廷聞而嘉之贈東陽太守子赤黔為大長秋赤黔子叔任義熙中為益州刺史吉挹吉挹字祖沖馮翊蓮芍人也祖朗愍帝時為御史中丞西朝不守朗歎曰吾智不能謀勇不能死何忍君臣相隨北面事賊虜乎乃自殺挹少有志節孝武帝初苻堅陷梁益桓豁表挹為魏興太守尋加輕車將軍領晉昌太守以距堅之功拜員外散騎侍郎苻堅將韋鍾攻魏興挹遣衆距之斬七百餘級加督五郡軍事鍾率衆欲趣襄陽挹又邀擊斬五千餘級鍾怒回軍圍之挹又屢挫其鋭其後賊衆繼至挹力不能抗城將陷引刃欲自殺其友止之曰且苟存以展他計為計不立死未晚也挹不從友人逼奪其刀會賊執之挹閉口不言不食而死車騎將軍桓沖上言曰故輕車將軍魏興太守吉挹祖朗西臺傾覆隕身守節挹世篤忠孝乃心本朝臣亡兄溫昔伐咸陽軍次灞水挹攜將二弟單馬來奔録其此誠仍加擢授自新野太守轉在魏興久處兵任委以邊戍疆埸歸懷著稱所蒞前年狡氐縱逸浮河而下挹孤城獨立衆無一旅外摧凶鋭內固津要虜賊舟船俘馘千計而賊并力攻圍經歷時月會襄陽失守邊情沮喪加衆寡勢殊以至陷沒挹辭氣慷慨志在不辱杖刃推戈期之以隕將吏持守用不即斃遂乃杜口無言絶粒而死挹參軍史穎近於賊中得還齎挹臨終手疏并具説意狀挹之忠志猶在可録若蒙天地垂曲宥之恩則榮加枯朽惠隆泉壤矣帝嘉之追贈益州刺史王諒王諒字幼成丹楊人也少有幹略為王敦所擢參其府事稍遷武昌太守初新昌太守梁碩專威交土迎立陶咸為刺史咸卒王敦以王機為刺史碩發兵距機自領交址太守乃迎前刺史修則子湛行州事永興三年敦以諒為交州刺史諒將之任敦謂曰修湛梁碩皆國賊也卿至便收斬之諒既到境湛退還九真廣州刺史陶侃遣人誘湛來詣諒所諒敕從人不得入閣既前執之碩時在坐曰湛故州將之子有罪可遣不足殺也諒曰是君義故無豫我事即斬之碩怒而出諒陰謀誅碩使客刺之弗克遂率衆圍諒於龍編陶侃遣軍救之未至而諒敗碩逼諒奪其節諒固執不與遂斷諒右臂諒正色曰死且不畏臂斷何有十餘日憤恚而卒碩據交州凶暴酷虐一境患之竟為侃軍所滅傳首京都宋矩宋矩字處規敦煌人也慷慨有志節張重華據涼州地以矩為宛戍都尉石季龍遣將麻秋攻大夏護軍梁式執太守宋晏以城應秋秋遣晏以書致矩矩既至謂秋曰辭父事君當立功與義苟功義不立當守名節矩終不背主覆宗偷生於世先殺妻子自刎而死秋曰義士也命葬之重華嘉其誠節贈振威將軍車濟車濟字萬度敦煌人也果毅有大量張重華以為金城令為石季龍將麻秋所陷濟不為秋屈秋必欲降之乃臨之以兵濟辭色不撓曰吾雖才非龐德而受任同之身可殺志不可移乃伏劍而死秋歎其忠節以禮葬之後重華迎致其喪親臨慟哭贈宜禾都尉丁穆丁穆字彥遠譙國人也積功勞封真定侯纍遷為順陽太守太元四年除振武將軍梁州刺史受詔未發會苻堅遣衆寇順陽穆戰敗被執至長安稱疾不仕偽朝堅又傾國南寇穆與關中人士唱義謀襲長安事泄遇害臨死作表以付其妻周其後周得至京師詣闕上之孝武帝下詔曰故順陽太守真定侯丁穆力屈身陷而誠節彌固直亮壯徑義貫古烈其喪柩始反言尋傷悼可贈龍驤將軍雍州刺史賻賜一依周虓故事為立屋宅并給其妻衣食以終厥身辛恭靖辛恭靖隴西狄道人也少有器幹才量過人隆安中為河南太守會姚興來寇恭靖固守百餘日以無救而陷被執至長安興謂之曰朕將任卿以東南之事可乎恭靖厲色曰我寧為國家鬼不為羌賊臣興怒幽之別室經三年至元興中誑守者乃踰垣而遁歸于江東安帝嘉之桓玄請為咨議參軍置之朝首尋而病卒羅企生羅企生字宗伯豫章人也多才藝初拜佐著作郎以家貧親老求補臨汝令刺史王凝之請為別駕殷仲堪之鎮江陵引為功曹纍遷武陵太守未之郡而桓玄攻仲堪仲堪更以企生為咨議參軍仲堪多疑少決企生深憂之謂弟遵生曰殷侯仁而無斷事必無成成敗天也吾當死生以之仲堪果走文武無送者唯企生從焉路經家門遵生曰作如此分離何可不執手企生回馬授手遵生有勇力便牽下之謂曰家有老母將欲何之企生揮淚曰今日之事我必死之汝等奉養不失子道一門之中有忠與孝亦復何恨遵生抱之愈急仲堪於路待之企生遙呼曰生死是同願少見待仲堪見企生無脫理策馬而去玄至荊州人士無不詣者企生獨不往而營理仲堪家或謂之曰玄猜忍之性未能取卿誠節若遂不詣禍必至矣企生正色曰我是殷侯吏見遇以國士為弟以力見制遂不我從不能共殄醜逆致此奔敗亦何面目復就桓求生乎玄聞之大怒然素待企生厚先遣人謂曰若謝我當釋汝企生曰為殷荊州吏荊州奔亡存亡未判何顏復謝玄即收企生遣人問欲何言答曰文帝殺嵇康嵇紹為晉忠臣從公乞一弟以養老母玄許之又引企生於前謂曰吾相遇甚厚何以見負今者死矣企生對曰使君既興晉陽之甲軍次尋陽並奉王命各還所鎮升壇盟誓口血未乾而生姦計自傷力劣不能翦滅凶逆恨死晚也玄遂害之時年三十七衆咸悼焉先是玄以羔裘遺企生母胡氏及企生遇害即日焚裘張禕張禕吳郡人也少有操行恭帝為琅邪王以禕為郎中令及帝踐阼劉裕以禕帝之故吏素所親信封藥酒一罌付禕密令鴆帝禕既受命而歎曰鴆君而求生何面目視息世間哉不如死也因自飲之而死史臣曰中散以膚受見誅王儀以抗言獲戾時皆可謂死非其罪也偉元恥臣晉室延祖甘赴危亡所由之理雖同所趣之塗即異而並見稱當世垂芳竹帛豈不以君父居在三之極忠孝為百行之先者乎且裒獨善其身故得全其孝而紹兼濟于物理宜竭其忠可謂蘭桂異質而齊芳韶武殊音而並美或有論紹者以死難獲譏揚榷言之未為篤論夫君天也天可讎乎安既享其榮危乃違其禍進退無據何以立人嵇生之隕身全節用此道也贊曰重義輕生亡軀殉節徑松方操嚴霜比烈白刃可陵貞心難折道光振古芳流來哲
