body:
  text: 晉書卷二帝紀第二景帝景皇帝諱師字子元宣帝長子也雅有風彩沈毅多大略少流美譽與夏侯玄何晏齊名晏常稱曰惟幾也能成天下之務司馬子元是也魏景初中拜散騎常侍纍遷中護軍為選用之法舉不越功吏無私焉宣穆皇后崩居喪以至孝聞宣帝之將誅曹爽深謀祕策獨與帝潛畫文帝弗之知也將發夕乃告之既而使人覘之帝寢如常而文帝不能安席晨會兵司馬門鎮靜內外置陳甚整宣帝曰此子竟可也初帝陰養死士三千散在人間至是一朝而集衆莫知所出也事平以功封長平鄉侯食邑千戶尋加衛將軍及宣帝薨議者咸云伊尹既卒伊陟嗣事天子命帝以撫軍大將軍輔政魏嘉平四年春正月遷大將軍加侍中持節都督中外諸軍録尚書事命百官舉賢才明少長恤窮獨理廢滯諸葛誕毌丘儉王昶陳泰胡遵都督四方王基州泰鄧艾石苞典州郡盧育李豐掌選舉傅嘏虞松參計謀鍾會夏侯玄王肅陳本孟康趙酆張緝預朝議四海傾注朝野肅然或有請改易制度者帝曰不識不知順帝之則詩人之美也三祖典制所宜遵奉自非軍事不得妄有改革五年夏五月吳太傅諸葛恪圍新城朝議慮其分兵以寇淮泗欲戍諸水口帝曰諸葛恪新得政於吳欲徼一時之利并兵合肥以冀萬一不暇復為青徐患也且水口非一多戍則用兵衆少戍則不足以禦寇恪果并力合肥卒如所度帝於是使鎮東將軍毌丘儉揚州刺史文欽等距之儉欽請戰帝曰恪卷甲深入投兵死地其鋒未易當且新城小而固攻之未可拔遂命諸將高壘以弊之相持數月恪攻城力屈死傷太半帝乃敕欽督鋭卒趨合榆要其歸路儉帥諸將以為後繼恪懼而遁欽逆擊大破之斬首萬餘級正元元年春正月天子與中書令李豐后父光祿大夫張緝黃門監蘇鑠永寧署令樂敦冗從僕射劉寶賢等謀以太常夏侯玄代帝輔政帝密知之使舍人王羡以車迎豐豐見迫隨羡而至帝數之豐知禍及因肆惡言帝怒遣勇士以刀鐶築殺之逮捕玄緝等皆夷三族三月乃諷天子廢皇后張氏因下詔曰姦臣李豐等靖譖庸回陰構凶慝大將軍糾虔天刑致之誅辟周勃之克呂氏霍光之擒上官曷以過之其增邑九千戶并前四萬帝讓不受天子以玄緝之誅深不自安而帝亦慮難作潛謀廢立乃密諷魏永寧太后秋九月甲戌太后下令曰皇帝春秋已長不親萬機耽淫內寵沈嫚女德日近倡優縱其醜虐迎六宮家人留止內房毀人倫之亂男女之節又為羣小所迫將危社稷不可承奉宗廟帝召羣臣會議流涕曰太后令如是諸君其如王室何咸曰伊尹放太甲以寧殷霍光廢昌邑以安漢權定社稷以清四海二代行之於古明公當之於今今日之事惟命是從帝曰諸君見望者重安敢避之乃與羣公卿士共奏太后曰臣聞天子者所以濟育羣生永安萬國皇帝春秋已長未親萬機日使小優郭懷袁信等裸袒淫戲又於廣望觀下作遼東妖婦道路行人莫不掩目清商令令狐景諫帝帝燒鐵灸之太后遭合陽君喪帝嬉樂自若清商丞龐熙諫帝帝弗聽太后還北宮殺張美人帝甚恚望熙諫帝怒復以彈彈熙每文書入帝不省視太后令帝在式乾殿講學帝又不從不可以承天序臣請依漢霍光故事收皇帝璽綬以齊王歸藩奏可於是有司以太牢策告宗廟王就乘輿副車羣臣從至西掖門帝泣曰先臣受歷世殊遇先帝臨崩託以遺詔臣復忝重任不能獻可替否羣公卿士遠惟舊典為社稷深計寧負聖躬使宗廟血食於是使使者持節衛送舍河內之重門誅郭懷袁信等是日與羣臣議所立帝曰方今宇宙未清二虜爭衡四海之主惟在賢哲彭城王據太祖之子以賢則仁聖明允以年則皇室之長天位至重不得其才不足以寧濟六合乃與羣公奏太后太后以彭城王先帝諸父於昭穆之序為不次則烈祖之世永無承嗣東海定王明帝之弟欲立其子高貴鄉公髦帝固爭不獲乃從太后令遣使迎高貴鄉公於元城而立之改元曰正元天子受璽惰舉趾高帝聞而憂之及將大會帝訓於天子曰夫聖王重始正本敬初古人所慎也明當大會萬衆瞻穆穆之容公卿聽玉振之音詩云示人不佻是則是效易曰出其言善則千里之外應之雖禮儀周備猶宜加之以祗恪以副四海顒顒式仰癸巳天子詔曰朕聞創業之君必須股肱之臣守文之主亦賴匡佐之輔是故文武以呂召彰受命之功宣王倚山甫享中興之業大將軍世載明德應期作輔遭天降險帝室多難齊王蒞政不迪率典公履義執忠以寧區夏式是百辟總齊庶事內摧寇虐外靜姦宄日昃憂勤劬勞夙夜德聲光于上下勳烈施於四方深惟大議首建明策權定社稷援立朕躬宗廟獲安億兆慶賴伊摯之保殷邦公旦之綏寧周室蔑以尚焉朕甚嘉之夫德茂者位尊庸大者祿厚古今之通義也其登位相國增邑九千并前四萬戶進號大都督假黃鉞入朝不趨奏事不名劍履上殿賜錢五百萬帛五千匹以彰元勳帝固辭相國又上書訓于天子曰荊山之璞雖美不琢不成其寶顏冉之才雖茂不學不弘其量仲尼有云豫非生而知之者好古敏以求之者也仰觀黃軒五代之主莫不有所稟則顓頊受學於緑圖高辛問道於柏招逮至周成旦望作輔故能離經辨志安道樂業夫然故君道明於上兆庶順於下刑措之隆實由於此宜遵先王下問之義使講誦之業屢聞於聽典謨之言日陳於側也時天子頗修華飾帝又諫曰履端初政宜崇玄朴并敬納焉十一月有白氣經天二年春正月有彗星見於吳楚之分西北竟天鎮東大將軍毋丘儉揚州刺史文欽舉兵作亂矯太后令移檄郡國為壇盟于西門之外各遣子四人質于吳以請救二月儉欽帥衆六萬渡淮而西帝會公卿謀征討計朝議多謂可遣諸將擊之王肅及尚書傅嘏中書侍郎鍾會勸帝自行戊午帝統中軍步騎十餘萬以征之倍道兼行召三方兵大會于陳許之郊甲申次于橋儉將史招李續相次來降儉欽移入項城帝遣荊州刺史王基進據南頓以逼儉帝深壁高壘以待東軍之集諸將請進軍攻其城帝曰諸君得其一未知其二淮南將士本無反志且儉欽欲蹈縱橫之迹習儀秦之說謂遠近必應而事起之日淮北不從史招李續前後瓦解內乖外叛自知必敗困獸思鬬速戰更合其志雖云必克傷人亦多且儉等欺誑將士詭變萬端小與持久詐情自露此不戰而克之也乃遣諸葛誕督豫州諸軍自安風向壽春征東將軍胡遵督青徐諸軍出譙宋之間絶其歸路帝屯汝陽遣兗州刺史鄧艾督太山諸軍進屯樂嘉示弱以誘之欽進軍將攻艾帝潛軍銜枚徑造樂嘉與欽相遇欽子鴦年十八勇冠三軍謂欽曰及其未定請登城鼓譟擊之可破也既謀而行三譟而欽不能應鴦退相與引而東帝謂諸將曰欽走矣命發鋭軍以追之諸將皆曰欽舊將鴦少而鋭引軍內入未有失利必不走也帝曰一鼓作氣再而衰三而竭鴦三鼓欽不應其勢已屈不走何待欽將遁鴦曰不先折其勢不得去也乃與驍騎十餘摧鋒陷陳所向皆披靡遂引去帝遣左長史司馬璉督驍騎八千翼而追之使將軍樂綝等督步兵繼其後比至沙陽頻陷欽陳弩矢雨下欽蒙楯而馳大破其軍衆皆投戈而降欽父子與麾下走保項儉聞欽敗棄衆宵遁淮南安風津都尉追儉斬之傳首京都欽遂奔吳淮南平初帝目有瘤疾使醫割之鴦之來攻也驚而目出懼六軍之恐蒙之以被痛甚齧被敗而左右莫知焉閏月疾篤使文帝總統諸軍辛亥崩于許昌時年四十八二月帝之喪至自許昌天子素服臨弔詔曰公有濟世寧國之勳克定禍亂之功重之以死王事宜加殊禮其令公卿議制有司議以為忠安社稷功濟宇內宜依霍光故事追加大司馬之號以冠大將軍增邑五萬戶諡曰武公文帝表讓曰臣亡父不敢受丞相相國九命之禮亡兄不敢受相國之位誠以太祖常所階歷也今諡與二祖同必所祗懼昔蕭何張良霍光咸有匡佐之功何諡文終良諡文成光諡宣成必以文武為諡請依何等就加詔許之諡曰忠武晉國既建追尊曰景王武帝受禪上尊號曰景皇帝陵曰峻平廟稱世宗文帝文皇帝諱昭字子上景帝之母弟也魏景初二年封新城鄉侯正始初為洛陽典農中郎將值魏明奢侈之後帝蠲除苛碎不奪農時百姓大悅轉散騎常侍大將軍曹爽之伐蜀也以帝為征蜀將軍副夏侯玄出駱谷次于興勢蜀將王林夜襲帝營帝堅臥不動林退帝謂玄曰費禕以據險距守進不獲戰攻之不可宜亟旋軍以為後圖爽等引旋禕果馳兵趣三嶺爭險乃得過遂還拜議郎及誅曹爽帥衆衛二宮以功增邑千戶蜀將姜維之寇隴右也征西將軍郭淮自長安距之進帝位安西將軍持節屯關中為諸軍節度淮攻維別將句安於麴久而不決帝乃進據長城南趣駱谷以疑之維懼退保南鄭安軍絶援帥衆來降轉安東將軍持節鎮許昌及大軍討王淩帝督淮北諸軍事帥師會于項增邑三百戶假金印紫綬尋進號都督統征東將軍胡遵鎮東將軍諸葛誕伐吳戰于東關二軍敗績坐失侯蜀將姜維又寇隴右揚聲欲攻狄道以帝行征西將軍次長安雍州刺史陳泰欲先賊據狄道帝曰姜維攻羌收其質任聚穀作邸閣訖而復轉行至此正欲了塞外諸羌為後年之資耳若實向狄道安肯宣露令外人知今揚聲言出此欲歸也維果燒營而去會新平羌胡叛帝擊破之遂耀兵靈州北虜震讋叛者悉降以功復封新城鄉侯高貴鄉公之立也以參定策進封高都侯增封二千戶毌丘儉文欽之亂大軍東征帝兼中領軍留鎮洛陽及景帝疾篤帝自京都省疾拜衛將軍景帝崩天子命帝鎮許昌尚書傅嘏帥六軍還京師帝用嘏及鍾會策自帥軍而還至洛陽進位大將軍加侍中都督中外諸軍録尚書事輔政劍履上殿帝固辭不受甘露元年春正月加大都督奏事不名夏六月進封高都公地方七百里加之九錫假斧鉞進號大都督劍履上殿又固辭不受秋八月庚申加假黃鉞增封三縣二年夏五月辛未鎮東大將軍諸葛誕殺揚州刺史樂綝以淮南作亂遣子靚為質於吳以請救議者請速伐之帝曰誕以毌丘儉輕疾傾覆今必外連吳寇此為變大而遲吾當與四方同力以全勝制之乃表曰昔黥布叛逆漢祖親征隗囂違戾光武西伐烈祖明皇帝乘輿仍出皆所以奮揚赫斯震耀威武也陛下宜暫臨戎使將士得憑天威今諸軍可五十萬以衆擊寡蔑不克矣秋七月奉天子及皇太后東征徵兵青徐荊豫分取關中遊軍皆會淮北師次于項假廷尉何楨節使淮南宣慰將士申明逆順示以誅賞甲戌帝進軍丘頭吳使文欽唐咨全端全懌等三萬餘人來救誕諸將逆擊不能禦將軍李廣臨敵不進泰山太守常時稱疾不出並斬之以徇八月吳將朱異帥兵萬餘人留輜重於都陸輕兵至黎漿監軍石苞兗州刺史州泰禦之異退泰山太守胡烈以奇兵襲都陸焚其糧運苞泰復進擊異大破之異之餘卒餒甚食葛葉而遁吳人殺異帝曰異不得至壽春非其罪也而吳人殺之適以謝壽春而堅誕意使其猶望救耳若其不爾彼當突圍決一旦之命或謂大軍不能久省食減口冀有他變料賊之情不出此三者今當多方以亂之備其越逸此勝計也因命合圍分遣羸疾就穀淮北廩軍士大豆人三升欽聞之果喜帝愈羸形以示之多縱反間揚言吳救方至誕等益寬恣食俄而城中乏糧石苞王基並請攻之帝曰誕之逆謀非一朝一夕也聚糧完守外結吳人自謂足據淮南欽既同惡相濟必不便走今若急攻之損游軍之力外寇卒至表𩹉受敵此危道也今三叛相聚於孤城之中天其或者將使同戮吾當以長策縻之但堅守三面若賊陸道而來軍糧必少吾以游兵輕騎絶其轉輸可不戰而破外賊外賊破欽等必成擒矣全懌母孫權女也得罪於吳全端兄子禕及儀奉其母來奔儀兄靜時在壽春用鍾會計作禕儀書以譎靜靜兄弟五人帥其衆來降城中大駭三年春正月壬寅誕欽等出攻長圍諸軍逆擊走之初誕欽內不相協及至窮蹙轉相疑二會欽計事與誕忤誕手刃殺欽欽子鴦攻誕不克踰城降以為將軍封侯使鴦巡城而呼帝見城上持弓者不發謂諸將曰可攻矣二月乙酉攻而拔之斬誕夷三族吳將唐咨孫曼孫彌徐韶等帥其屬皆降表加爵位廩其餒疾或言吳兵必不為用請坑之帝曰就令亡還適見中國之弘耳於是徙之三河夏四月歸于京師魏帝命改丘頭曰武丘以旌武功五月天子以并州之太原上黨西河樂平新興雁門司州之河東平陽八郡地方七百里封帝為晉公加九錫進位相國晉國置官司焉九讓乃止於是增邑萬戶食三縣諸子之無爵者皆封列侯秋七月奏録先世名臣元功大勳之子孫隨才用四年夏六月分荊州置二都督王基鎮新野州泰鎮襄陽使石苞都督揚州陳騫都督豫州鍾育都督徐州宋鈞監青州諸軍事景元元年夏四月天子復命帝爵秩如前又讓不受天子既以帝三世宰輔政非己出情不能安又慮廢辱將臨軒召百僚而行放黜五月戊子夜使冗從僕射李昭等發甲於陵雲臺召侍中王沈散騎常侍王業尚書王經出懷中黃素詔示之戒嚴俟旦沈業馳告于帝帝召護軍賈充等為之備天子知事泄帥左右攻相府稱有所討敢有動者族誅相府兵將止不敢戰賈充叱諸將曰公畜養汝輩正為今日耳太子舍人成濟抽戈犯蹕刺之刃出於背天子崩于車中帝召百僚謀其故僕射陳泰不至帝遣其舅荀顗輿致之延於曲室謂曰玄伯天下其如我何泰曰惟腰斬賈充微以謝天下帝曰卿更思其次泰曰但見其上不見其次於是歸罪成濟而斬之太后令曰昔漢昌邑王以罪廢為庶人此兒亦宜以庶人禮葬之使外內咸知其所行也殺尚書王經二於我也戊申帝奏曰故高貴鄉公帥從駕人兵拔刃鳴鼓向臣所臣懼兵刃相接即敕將士不得有所傷害違令者以軍法從事騎督成倅弟太子舍人濟入兵陳傷公至隕臣聞人臣之節有死無二事上之義不敢逃難前者變故卒至禍同發機誠欲委身守死惟命所裁然惟本謀乃欲上危皇太后傾覆宗廟臣忝當元輔義在安國即駱驛申敕不得迫近輿輦而濟妄入間以致大變哀怛痛恨五內摧裂濟干國亂紀罪不容誅輒收濟家屬付廷尉太后從之夷濟三族與公卿議立燕王宇之子常道鄉公璜為帝六月改元丙辰天子進帝為相國封晉公增十郡加九錫如初羣從子弟未侯者封亭侯賜錢千萬帛萬匹固讓乃止冬十一月吳吉陽督蕭慎以書詣鎮東將軍石苞僞降求迎帝知其詐也使苞外示迎之而內為之備二年秋八月甲寅天子使太尉高柔授帝相國印綬司空鄭沖致晉公茅土九錫固辭三年夏四月肅慎來獻楛矢石砮弓甲貂皮等天子命歸於大將軍府四年春二月丁丑天子復命帝如前又固讓三月詔大將軍府增置司馬一人從事中郎二人舍人十人夏帝將伐蜀乃謀衆曰自定壽春已來息役六年治兵繕甲以擬二虜略計取吳作戰船通水道當用千餘萬功此十萬人百數十日事也又南土下溼必生疾疫今宜先取蜀三年之後因巴蜀順流之勢水陸並進此滅虞定虢吞韓并魏之勢也計蜀戰士九萬居守成都及備他郡不下四萬然則餘衆不過五萬今絆姜維於沓中使不得東顧直指駱谷出其空虛之地以襲漢中彼若嬰城守險兵勢必散首尾離絶舉大衆以屠城散鋭卒以略野劍閣不暇守險關頭不能自存以劉禪之暗而邊城外破士女內震其亡可知也征西將軍鄧艾以為未有釁屢陳異議帝患之使主簿師纂為艾司馬以喻之艾乃奉命於是徵四方之兵十八萬使鄧艾自狄道攻姜維於沓中雍州剌史諸葛緒自祁山軍于武街絶維歸路鎮西將軍鍾會帥前將軍李輔征蜀護軍胡烈等自駱谷襲漢中秋八月軍發洛陽大賚將士陳師誓衆將軍鄧敦謂蜀未可討帝斬以徇九月又使天水太守王頎攻維營隴西太守牽弘邀其前金城太守楊欣趣甘松鍾會分為二隊入自斜谷使李輔圍王含於樂城又使部將易愷攻蔣斌於漢城會直指陽安護軍胡烈攻陷關城姜維聞之引還王頎追敗維於彊川維與張翼廖化合軍守劍閣鍾會攻之冬十月天子以諸侯獻捷交至乃申前命曰朕以寡德獲承天序嗣我祖宗之洪烈遭家多難不明於訓曩者姦逆屢興方寇內侮大懼淪喪四海以隳三祖之弘業惟公經德履哲明允廣深迪宣武文世作保傅以輔皇家櫛風沐雨周旋征伐劬勞王室二十有餘載毗翼前人仍斷大政克厭不端維安社稷暨儉欽之亂公綏援有衆分命興師統紀有方用緝寧淮浦其後巴蜀屢侵西土不靖公奇畫指授制勝千里是以段谷之戰乘釁大捷斬將搴旗效首萬計孫峻猾夏致寇徐方戎車首路威靈先邁黃鉞未啓鯨鯢竄迹孫一搆隙自相疑阻幽鑒遠照奇策洞微遠人歸命作藩南夏爰授鋭卒畢力戎行暨諸葛誕滔天作逆稱兵揚楚欽咨逋罪同惡相濟帥其蛑賊以入壽春憑阻淮山敢距王命公躬擐甲胄龔行天罰玄謀廟算遵養時晦奇兵震擊而朱異摧破神變應機而全琮稽服取亂攻昧而高墉不守兼九伐之弘略究五兵之正度用能戰不窮武而大敵殲潰旗不再麾而元憝授首收勍吳之雋臣係亡命之逋虜交臂屈膝委命下吏俘馘十萬積尸成京雪宗廟之滯恥拯兆庶之艱難掃平區域信威吳會遂戢干戈靖我疆土天地鬼神罔不獲乃者王室之難變起蕭牆賴公之靈弘濟艱險宗廟危而獲安社稷墜而復寧忠格皇天功濟六合是用疇咨古訓稽諸典籍命公崇位相國加于羣后啓土參墟封以晉域所以方軌齊魯翰屏帝室而公遠蹈謙遜深履沖讓固辭策命至于八九朕重違讓德抑禮虧制以彰公志于今四載上闕在昔建侯之典下違兆庶具瞻之望惟公嚴虔王度闡濟大猷敦尚純朴省繇節用務穡勸分九野康耆叟荷崇養之德魚衆寡蒙矜恤之施仁風興於中夏流澤布於遐荒是以東夷西戎南蠻北狄狂狡貪悍世為寇讐者皆感義懷惠款塞內附或委命納貢或求置官司九服之外絶域之氓曠世所希至者咸浮海來享鼓舞王德前後至者八百七十餘萬口海隅幽裔無思不服雖西旅遠貢越裳九譯義無以踰維翼朕躬下匡萬國思靖殊方寧濟八極以庸蜀未賓蠻荊作猾潛謀獨斷整軍經武簡練將帥授以成策始踐賊境應時摧陷狂狡奔北首尾震潰禽其戎帥屠其城邑巴漢震疊江源雲徹地平天成誠在斯舉公有濟六合之勳加以茂德實總百揆允釐庶政敦五品以崇仁恢六典以敷訓而靖恭夙夜勞謙昧旦雖尚父之左右文武周公之勤勞王家罔以加焉昔先王選建明德光啓諸侯體國經野方制五等所以藩翼王畿垂祚百世也故齊魯之封於周為弘山川土田邦畿七百官司典策制殊羣后惠襄之難桓文以翼戴之勞猶受錫命之禮咸用光疇大德範于後惟公功邁於前烈而賞闕於舊式百辟於邑人神同恨焉豈可以公謙沖而久淹弘典哉今以并州之太原上黨西河樂平新興雁門司州之河東平陽弘農雍州之馮翊凡十郡南至於華北至於陘東至於壺口西踰於河提封之數方七百里皆晉之故壤唐叔受之世作盟主實紀綱諸夏用率舊職爰胙茲土封公為晉公命使持節兼司徒司隸校尉陔即授印綬策書金獸符第一至第五竹使符第一至第十錫茲玄土苴以白茅建爾國家以永藩魏室昔在周召并以公侯入作保傅其在近代酇侯蕭何實以相國光尹漢朝隨時之制禮亦宜之今進公位為相國加緑綟綬又加公九錫其敬聽後命以公思弘大猷崇正典禮儀刑作範旁訓四方是用錫公大輅戎輅各一玄牡二駟公道和陰陽敬授人時嗇夫反本農殖維豐是用錫公衮冕之服亦舄副焉公光敷顯德惠下以和敬信思順庶尹允諧是用錫公軒懸之樂六佾之舞公鎮靖宇宙翼播聲教海外懷服荒裔款附殊方馳義諸夏順軌是用錫公朱戶以居公簡賢料材營求俊逸爰升多士置彼周行是用錫公納陛以登公嚴恭寅畏砥平四國式遏寇虐苛厲不作是用錫公武賁之士三百人公明慎用刑簡恤大中章厥天威以糾不虔是用錫公鈇鉞各一公爰整六軍典司征伐犯命陵正乃維誅殛是用錫公彤弓一彤矢百玈弓十玈矢千公饗祀蒸蒸孝思維則篤誠之至通于神明是用錫公秬鬯一卣圭瓚副焉晉國置官司以下率由舊式往欽哉祗服朕命弘敷訓典光澤庶方永終爾明德丕顯余一人之休命公卿將校皆詣府喻旨帝以禮辭讓司空鄭沖率羣官勸進曰伏見嘉命顯至竊聞明公固讓沖等眷眷實有愚心以為聖王作制百代同風褒德賞功有自來矣昔伊尹有莘氏之媵臣耳一佐成湯遂荷阿衡之號周公藉已成之勢據既安之業光宅曲阜奄有龜蒙呂尚磻溪之漁者也一朝指麾乃封營丘自是以來功薄而賞厚者不可勝數然賢哲之士猶以為美談況自先相國以來世有明德翼輔魏室以綏天下朝無秕政人無謗言前者明公西征靈州北臨沙漠榆中以西望風震服羌戎來馳回首內向東誅叛逆全軍獨克禽闔閭之將虜輕鋭之卒以萬萬計威加南海名懾三越宇內康寧苛慝不作是以時俗畏懷東夷獻舞故聖上覽乃昔以來禮典舊章開國光宅顯茲太原明公宜承奉聖旨受茲介福允當天人元功盛勳光光如彼國土嘉祚巍巍如此內外協同靡愆靡違由斯征伐則可朝服濟江掃除吳會西塞江源望祀岷山回戈弭節以麾天下遠無不服邇無不肅令大魏之德光于唐虞明公盛勳超於桓文然後臨滄海而謝文伯登箕山而揖許由豈不盛乎至公至平誰與為鄰何必勤勤小讓也哉帝乃受命十一月鄧艾帥萬餘人自陰平踰絶險至江由破蜀將諸葛瞻於綿竹斬瞻傳首進軍雒縣劉禪降天子命晉公以相國總百揆於是上節傳去侍中大都督録尚書之號焉表鄧艾為太尉鍾會為司徒會潛謀叛逆因密使譖艾咸熙元年春正月檻車徵艾乙丑帝奉天子西征次于長安是時魏諸王侯悉在鄴城命從事中郎山濤行軍司事鎮於鄴遣護軍賈充持節督諸軍據漢中鍾會遂反於蜀監軍衛瓘右將軍胡烈攻會斬之初會之伐蜀也西曹屬邵悌言於帝曰鍾會難信不可令行帝笑曰取蜀如指掌而衆人皆言不可唯會與吾意同滅蜀之後中國將士人自思歸蜀之遺黎猶懷震恐縱有異志無能為也卒如所量丙辰帝至自長安三月己卯進帝爵為王增封并前二十郡夏五月癸未天子追加舞陽宣文侯為晉宣王舞陽忠武侯為晉景王秋七月帝奏司空荀顗定禮儀中護軍賈充正法律尚書僕射裴秀議官制太保鄭沖總而裁焉始建五等爵冬十月丁亥奏遣吳人相國參軍徐劭散騎常侍水曹屬孫彧使吳喻孫晧以平蜀之事致馬錦等物以示威懷丙午天子命中撫軍新昌鄉侯炎為晉世子二年春二月甲辰朐縣獻靈龜歸於相府夏四月孫晧使紀陟來聘且獻方物五月天子命帝冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲罕樂舞八佾設鍾虡宮懸位在燕王上進王妃為王后世子為太子王女王孫爵命之號皆如帝者之儀諸禁網煩苛及法式不便於時者帝皆奏除之晉國置御史大夫侍中常侍尚書中領軍衛將軍官秋八月辛卯帝崩于露寢時年五十五九月癸酉葬崇陽陵諡曰文王武帝受禪追尊號曰文皇帝廟稱太祖史臣曰世宗以睿略創基太祖以雄才成務事殷之跡空存翦商之志彌遠三分天下功業在焉及踰劍銷氛浮淮靜亂桐宮胥怨或所不堪若乃體以名臣格之端揆周公流連於此歲魏武得意於茲日軒懸之樂大啓南陽師摯之圖於焉北面壯矣哉包舉天人者也為帝之主不亦難乎贊曰世宗繼文邦權未分三千之士其從如雲太祖無外靈關靜氛反雖討賊終為弒君
