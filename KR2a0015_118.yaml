body:
  text: 晉書卷一百十八載記第十八姚興下尹緯晉義熙二年平北將軍梁州督護苻宣入漢中興梁州別駕呂營漢中徐逸席難起兵應宣求救於楊盛盛遣軍臨濜口南梁州刺史王敏退守武興楊盛復通於晉興以太子泓録尚書事慕容超司徒北地王鍾右僕射濟陽王嶷高都公始皆來奔華山郡地涌沸廣袤百餘步燒生物皆熟歷五月乃止赫連勃勃殺高平公沒奕于收其衆以叛先是魏主拓跋圭送馬千匹求婚于興興許之以魏別立后遂絶婚故有柴壁之戰至是復與魏通和魏放狄伯支姚伯禽唐小方姚良國康宦還長安皆復其爵位時禿髮檀沮渠蒙遜迭相攻擊檀遂東招河州刺史西羌彭奚念奚念阻河以叛蜀譙縱遣使稱藩請桓謙欲令順流東伐劉裕興以問謙謙請行遂許之使中軍姚弼後軍斂成鎮遠乞伏乾歸等率步騎三萬伐檀左僕射齊難等率騎二萬討勃勃吏部尚書尹昭諫曰檀恃遠輕敢違逆宜詔蒙遜及李玄盛使自相攻擊待其斃也然後取之此卞莊之舉也興不從勃勃退保河曲弼濟自金城弼部將姜紀言於弼曰今王師聲討勃勃檀猶豫未為嚴防請給輕騎五千掩其城門則山澤之人皆為吾有孤城獨立坐可克也弼不從進拔昌松長驅至姑臧檀嬰城固守出其兵擊弼弼敗退據西苑興又遣衛大將軍姚顯率騎二萬為諸軍節度至高平聞弼敗績兼道赴之撫慰河外率衆而還檀遣使人徐宿詣興謝罪齊難為勃勃所擒興遣平北姚沖征虜狄伯支輔國斂曼嵬鎮東楊佛嵩率騎四萬討勃勃沖次于嶺北欲回師襲長安伯支不從乃止懼其謀泄遂鴆殺伯支時王師伐譙縱大敗之縱遣使乞師于興興遣平西姚賞南梁州刺史王敏率衆二萬救之王師引還縱遣使拜師仍貢其方物興遣其兼司徒韋華持節策拜縱為大都督相國蜀王加九錫備物典策一如魏晉故事承制封拜悉如王者之儀興自平涼如朝那聞沖謀逆以其弟中最少雄武絶人猶欲隱忍容之斂成泣謂興曰沖凶險不仁每侍左右臣常寢不安席願早為之所興曰沖何能為也但輕害名將吾欲明其罪於四海乃下書賜沖死葬以庶人之禮晉河間王子國璠章武王子叔道來奔興謂之曰劉裕匡復晉室卿等何故來也國璠等曰裕與不逞之徒削弱王室宗門能自修立者莫不害之是避之來實非誠款所以避死耳興嘉之以國璠為建義將軍揚州刺史叔道為平南將軍兗州刺史賜以甲第興如二城將討赫連勃勃遣安遠姚詳及斂曼嵬鎮軍彭白狼分督租運諸軍未集而勃勃騎大至興欲留步軍輕如嵬營衆咸惶懼羣臣固以為不可興弗納尚書郎韋宗希旨勸興行蘭臺侍御史姜楞越次而進曰韋宗傾險不忠沮敗國計宜先腰斬以謝天下脫車駕動軫六軍駭懼人無守志取危之道也宜遣單使以徵詳等興默然右僕射韋華等諫曰若車騎輕動必不戰自潰嵬營亦未必可至惟陛下圖之興乃遣左將軍姚文宗率禁兵距戰中壘齊莫統氐兵以繼之文宗與莫皆勇果兼人以死力戰勃勃乃退留禁兵五千配姚詳守二城興還長安譙縱遣其侍中譙良太常楊軌朝於興請大舉以寇江東遣其荊州刺史桓謙梁州刺史譙道福率衆二萬東寇江陵興乃遣前將軍苟林率騎會之謙屯枝江林屯江津謙江左貴族部曲於荊楚晉之將士皆有叛心荊州刺史劉道規大懼嬰城固守雍州刺史魯宗之率襄陽之衆救之道規乃留宗之守江陵率軍逆戰謙等舟師大盛兼列步騎以待之大戰枝江謙敗績乘輕舸奔就苟林晉人獲而斬之苟林懼而引歸興以國用不足增關津之稅鹽竹山木皆有賦焉羣臣咸諫以為天殖品物以養羣生王者子育萬邦不宜節約以奪其利興曰能踰關梁通利於山水者皆豪富之家吾損有餘以裨不足有何不可乃遂行之興從朝門游於文武苑及昏而還將自平朔門入前驅既至城門校尉王滿聰被甲持杖閉門距之曰今已昏暗姦良不辨有死而已門不可開興乃回從朝門而入旦而召滿聰進位二等乞伏乾歸以衆叛攻陷金城執太守任蘭蘭厲色責乾歸以背恩違義乾歸怒而囚之蘭遂不食而死赫連勃勃遣其將胡金纂將萬餘騎攻平涼興如二城因救平涼纂衆大潰生擒纂勃勃遣兄子提攻陷定陽執北中郎將姚廣都興將曹熾曹雲王肆佛等各將數千戶避勃勃內徙興處佛于湟山澤熾雲於陳倉勃勃寇隴右攻白崖堡破之遂趣清水略陽太守姚壽都委守奔秦州勃勃又收其衆而歸興自安定追之至壽渠川不及而還初天水人姜紀呂氏之叛臣阿諂姦詐好間人之親戚興子弼有寵於興紀遂傾心附之弼時為雍州刺史鎮安定與密謀還朝令傾心事常山公顯樹黨左右至是興以弼為尚書令侍中大將軍既居將相虛襟引納收結朝士勢傾東宮遂有奪嫡之謀矣興以勃勃乾歸作亂西北檀蒙遜擅兵河右疇咨將帥之臣欲鎮撫二方隴東太守郭播言於興曰嶺北二州鎮戶皆數萬若得文武之才以綏撫之足以靖塞姦略興曰吾每思得廉頗李牧鎮撫四方使便宜行事然任非其人致負敗卿試舉之播曰清潔善撫邊則平陸子王元始雄武多奇略則建威王煥賞罰必行臨敵不顧則奮武彭蚝興曰蚝令行禁止則有之非綏邊之才也始煥年少吾未知其為人播曰廣平公弼才兼文武宜鎮督一方願陛下遠鑒前車近悟後轍興不從以其太常索棱為太尉領隴西內史綏誘乾歸政績既美乾歸感而歸之太史令任猗言於興曰白氣出於北方東西竟天五百里當有破軍流血乞伏乾歸遣使送所掠守宰謝罪請降興以勃勃之難權宜許之假乾歸及其子熾磐官爵姚詳時鎮杏城為赫連勃勃所逼糧盡委守南奔大蘇勃勃要之衆散為勃勃所執時遣衛大將軍顯迎詳詳敗遂屯杏城因令顯都督安定嶺北二鎮事潁川太守姚平都自許昌來朝言於興曰劉裕敢懷姦計屯聚芍陂有擾邊之志宜遣燒之以散其衆謀興曰裕之輕弱安敢窺吾疆埸苟有姦心其在子孫乎召其尚書楊佛嵩謂之曰吳兒不自知乃有非分之意待至孟冬當遣卿率精騎三萬焚其積聚嵩曰陛下若任臣以此役者當從肥口濟淮直趣壽春舉大衆以屯城縱輕騎以掠野使淮南蕭條兵粟俱了足令吳兒俯仰回惶神爽飛越興大悅時西胡梁國兒於平涼作壽冢每將妻妾入冢飲宴酒酣升靈牀而歌時人或譏之國兒不以為意前後征伐屢有大功興以為鎮北將軍封平輿男年八十餘乃死時客星入東井所在地震前後一百五十六興公卿抗表請罪興曰災譴之來咎在元首近代或歸罪三公甚無謂也公等其悉冠履復位仇池公楊盛叛侵擾祁山遣建威趙琨率騎五千為前鋒立節楊伯壽統步卒繼之前將軍陜恢左將軍姚文宗入自鷲陝鎮西秦州刺史姚嵩入羊頭陜右衛胡翼度從陰密出自汧城討盛興將輕騎五千自雍赴之與諸將軍會于隴口天水太守王松忩言于嵩曰先皇神略無方威武冠世冠軍徐洛生猛毅兼人佐命英輔再入仇池無功而還非楊盛智勇能全直是地勢然也今以趙琨之衆使君之威準之先朝實未見成功使君具悉形便何不表聞嵩不從盛率衆與琨相持伯壽畏懦弗進琨衆寡不敵為盛所敗興斬伯壽而還嵩乃具陳松忩之言興善之乾歸為其下人所殺子熾磐新立羣下咸勸興取之興曰乾歸先已返善吾方當懷撫因喪伐之非朕本志也以楊佛嵩都督嶺北討虜諸軍事安遠將軍雍州刺史率嶺北見兵以討赫連勃勃嵩發數日興謂羣臣曰佛嵩驍勇果鋭每臨敵對寇不可制抑吾常節之配兵不過五千今衆旅既多遇賊必敗今去已遠追之無及吾深憂之其下咸以為不然佛嵩果為勃勃所執絶亢而死興立昭儀齊氏為皇后又下書以其故丞相姚緒太宰姚碩德太傅姚旻大司馬姚崇司徒尹緯等二十四人配饗於萇廟興以大臣屢喪令所司更詳臨赴之制所司白興依故事東堂發哀興不從每大臣死皆親臨之姚文宗有寵於姚泓姚弼深疾之誣文宗有怨言以侍御史廉桃生為證興怒賜文宗死是後羣臣纍足莫敢言弼之短時二縣羌叛興興遣後將軍斂成鎮軍彭白狼北中郎將姚洛都討之斂成為羌所敗甚懼詣趙興太守姚穆歸罪穆欲送殺之成怒奔赫連勃勃興遣姚紹與姚弼率禁衛諸軍鎮撫嶺北遼東侯彌姐亭地率其部人南居陰密劫掠百姓弼收亭地送之殺其衆七百餘人徙二千餘戶于鄭城弼寵愛方隆所欲施行無不信納乃以嬖人尹沖為給事黃門侍郎唐盛為治書侍御史左右機要皆其黨人漸欲廣樹爪牙彌縫其闕右僕射梁喜侍中任謙京兆尹尹昭承間言於興曰父子之際人罕得而言然君臣亦猶父子臣等理不容默並后匹嫡未始不傾國亂家廣平公弼姦凶無狀潛有陵奪之志陛下寵之不道假其威權傾險無賴之徒莫不鱗湊其側市巷諷議皆言陛下欲有廢立之志誠如此者臣等有死而已不敢奉詔興曰安有此乎昭等曰若無廢立之事陛下愛弼適所以禍之願去其左右減其威權非但弼有太山之安宗廟社稷亦有磐石之固矣興默然興寢疾妖賊李弘反于二原二原氐仇常起兵應弘興輿疾討之斬常執弘而還徙常部人五百餘戶于許昌興疾篤其太子泓屯兵于東華門侍疾於咨議堂姚弼潛謀為亂招集數千人被甲伏于其第撫軍姚紹及侍中任謙右僕射梁喜冠軍姚讚京兆尹尹昭輔國斂曼嵬並典禁兵宿衛于內姚裕遣使告姚懿于蒲坂并密信諸藩論弼逆狀懿流涕以告將士曰上今寢疾臣子所宜冠履不整而廣平公弼擁兵私第不以忠於儲宮正是孤徇義亡身之日諸君皆忠烈之士亦當同孤徇斯舉也將士無不奮怒攘袂曰惟殿下所為死生不敢二於是盡赦囚徒散布帛數萬匹以賜其將士建牙誓衆將赴長安鎮東豫州牧姚洸起兵洛陽平西姚諶起兵於雍將以赴泓之難興疾瘳朝其羣臣征虜劉羌泣謂興曰陛下寢疾數旬奈何忽有斯事興曰朕過庭無訓使諸子不穆愧于四海卿等各陳所懷以安社稷尹昭曰廣平公弼恃寵不虔阻兵懷二自宜置之刑書以明典憲陛下若含忍未便加法者且可削奪威權使散居藩國以紓窺之禍全天性之恩興謂梁喜曰卿以為何如喜曰臣之愚見如昭所陳興以弼才兼文武未忍致法免其尚書令以將軍公就第懿等聞興疾瘳各罷兵還鎮懿恢及弟諶等皆抗表罪弼請致之刑法興弗許時魏遣使聘于興且請婚會平陽太守姚成都來朝興謂之曰卿久處東藩與魏鄰接應悉彼事形今來求婚吾已許之終能分災共患遠相接援以不成都曰魏自柴壁克捷已來戎甲未曾損失士馬桓桓師旅充盛今修和親兼婚姻之好豈但分災共患而已實亦永安之福也興大悅遣其吏部郎嚴康報聘并致方物時姚懿姚洸姚宣姚諶來朝使姚裕言於興曰懿等今悉在外欲有所陳興曰汝等正欲道弼事耳吾已知之裕曰弼苟有可論陛下所宜垂聽若懿等言違大義便當肆之刑辟奈何距之於是引見咨議堂宣流涕曰先帝以大聖起基陛下以神武定業方隆七百之祚為萬世之美安可使弼謀傾社稷宜委之有司肅明刑憲臣等敢以死請興曰吾自處之非汝等所憂先是大司農竇溫司徒左長史王弼皆有密表勸興廢立興雖不從亦不以為責撫軍東曹屬姜虬上疏曰廣平公弼懷姦積年謀禍有歲傾諂羣豎為之畫足釁成逆著取嗤戎裔文王之化刑于寡妻聖朝之亂起自愛子今雖欲含忍其瑕掩蔽其罪而逆黨猶繁扇惑不已弼之亂心其可革耶宜斥散凶徒以絶禍始興以虬表示梁喜曰天下之人莫不以吾兒為口實將何以處之喜曰信如虬言陛下宜早裁決興默然太子詹事王周亦虛襟引士樹黨東宮弼惡之每規陷害周周抗志確然不為之屈興嘉其守正以周為中書監興如三原顧謂羣臣曰古人有言關東出相關西出將三秦饒俊異汝潁多奇士吾應天明命跨據中原自流沙已東淮漢已北未嘗不傾己招求冀匡不逮然明不照下弗感懸魚至於智效一官行著一善吾歷級而進之不使有後門之歎卿等宜明揚仄陋助吾舉之梁喜對曰奉旨求賢弗曾休倦未見儒亮大才王佐之器可謂世之乏賢興曰自古霸王之起也莫不將則韓吳相兼蕭鄧終不採將於往賢求相於後哲卿自識拔不明求之不至奈何厚誣四海乎羣臣咸悅晉荊州刺史司馬休之據江陵雍州刺史魯宗之據襄陽與劉裕相攻遣使求援興遣姚成王司馬國璠率騎八千赴之弼恨姚宣之毀己遂譖宣於興會宣司馬權丕至長安興責丕以無匡輔之益將戮之丕性傾巧因誣宣罪狀興大怒遂收宣于杏城下獄而使弼將三萬人鎮秦州尹昭言於興曰廣平公與皇太子不平握強兵於外陛下一旦不諱恐社稷必危小不忍以致大亂者陛下之謂也興弗納赫連勃勃攻杏城興又遣弼救之至冠泉而杏城陷興如北地弼次於三樹遣弼及斂曼嵬向新平興還長安姚成王至于南陽司馬休之等為劉裕所敗引歸休之宗之等遂與譙王文思新蔡王道賜寧朔將軍梁州刺史馬敬輔國將軍竟陵太守魯軌寧朔將軍南陽太守魯範奔于興勃勃遣其將赫連建率衆寇二縣數千騎入平涼姚恢與建戰于五井平涼太守姚興都為建所獲遂入新平姚弼討之戰于龍尾堡大破之擒建送於長安初勃勃攻彭雙方于石堡方力戰距守積年不能克至是聞建敗引歸休之等至長安興謂之曰劉裕崇奉晉帝豈便有闕乎休之曰臣前下都琅邪王德文泣謂臣曰劉裕供御主上克薄奇深以事勢推之社稷之憂方未可測興將以休之為荊州刺史任以東南之事休之固辭請與魯宗之等擾動襄陽淮漢乃以休之為鎮南將軍揚州刺史宗之等並有拜授休之將行侍御史唐盛言於興曰符命所記司馬氏應復河洛休之既得濯鱗南翔恐非復池中之物可以崇禮不宜放之興曰司馬氏脫如所記留之適足為患遂遣之揚武安鄉侯康宦驅略白鹿原氐胡數百家奔上洛太守宋林距之商洛人黃金等起義兵以掎宦宦乃率衆歸罪興赦之復其爵位時白虹貫日有術人言於興曰將有不祥之事終當自消時興藥動姚弼稱疾不朝集兵於第興聞之怒甚收其黨殿中侍御史唐盛孫玄等殺之泓言於興曰臣誠不肖不能訓諧於弟致弼構造是非仰慚天日陛下若以臣為社稷之憂除臣而國寧亦家之福也若垂天性之恩不忍加臣刑戮者乞聽臣守藩興慘然改容召姚讚梁喜尹昭斂曼嵬於咨議堂密謀收弼時姚紹屯兵雍城馳遣告之數日不決弼黨凶懼興慮其為變乃收弼囚之中曹窮責黨與將殺之泓流涕固請之乃止興謂梁喜曰泓天心平和性少猜忌必能容養羣賢保全吾子於是皆赦弼黨靈臺令張泉又言於興曰熒惑入東井旬紀而返未餘月復來守心王者惡之宜修仁虛己以答天譴興納之正旦興朝羣臣于太極前殿沙門賀僧慟泣不能自勝衆咸怪焉賀僧者莫知其所從來也言事皆有效驗興甚神禮之常與隱士數人預於宴會興如華陰以泓監國入居西宮因疾篤還長安泓欲出迎其宮臣曰今主上疾篤姦臣在側廣平公每希覬非常變故難測今殿下若出進則不得見主上退則有弼等之禍安所歸乎自宜深抑情禮以寧宗社泓從之乃拜迎於黃龍門樽下弼黨見興升輿咸懷危懼尹沖等先謀欲因泓出迎害之尚書姚沙彌曰若太子有備不來迎侍當奉乘輿直趣公第宿衛者聞上在此自當來奔誰與太子守乎吾等以廣平公之故陷身逆節今以乘輿南幸自當是杖義之理匪但救廣平之禍足可以申雪前愆沖等不從欲隨興入殿中作亂復未知興之存亡疑而不發興命泓録尚書事使姚紹胡翼度典兵禁中防制內外遣斂曼嵬收弼第中甲杖內之武庫興疾轉篤興妹僞南安長公主問疾不應興少子耕兒出告其兄愔曰上已崩矣宜速決計於是愔與其屬率甲士攻端門殿中上將軍斂曼嵬勒兵距戰右衛胡翼度率禁兵閉四門愔等遣壯士登門緣屋而入及于馬道泓時侍疾於咨議堂遣斂曼嵬率殿中兵登武庫距戰太子右衛率姚和都率東宮兵入屯馬道南愔等既不得進遂燒端門興力疾臨前殿賜弼死禁兵見興喜躍貫甲赴賊賊衆駭擾和都勒東宮兵自後擊之愔等奔潰逃于驪山愔黨呂隆奔雍尹沖等奔于京師興引紹及讚梁喜尹昭斂曼嵬入內寢受遺輔政義熙十二年興死時年五十一在位二十二年僞諡文桓皇帝廟號高祖墓曰偶陵尹緯字景亮天水人也少有大志不營産業身長八尺腰帶十圍魁梧有爽氣每覽書傳至宰相立勳之際常輟書而歎苻堅以尹赤之降姚襄諸尹皆禁錮不仕緯晚乃為吏部令史風志豪邁郎皆憚之堅末年祅星見于東井緯知堅將滅喜甚向天再拜既而流涕長歎友人略陽桓識怪而問之緯曰天時如此正是霸王龍飛之秋吾徒杖策之日然知己難遭恐不得展吾才志是以欣懼交懷及姚萇奔馬牧緯與尹詳龐演等扇動羣豪推萇為盟主遂為佐命元功萇既敗符堅遣緯說堅求禪代之事堅問緯曰卿於朕何官緯曰尚書令史堅歎曰宰相之才也王景略之儔而朕不知卿亡也不亦宜乎緯性剛簡清亮慕張子布之為人馮翊段鏗性傾巧萇愛其博識引為侍中緯固諫以為不可萇不從緯屢衆中辱鏗鏗心不平之萇聞而謂緯曰卿性不好學何為憎學者緯曰臣不憎學憎鏗不正耳萇因曰卿好不自知每比蕭何真何如也緯曰漢祖與蕭何俱起布衣是以相貴陛下起貴中是以賤臣萇曰卿實不及胡為不也緯曰陛下何如漢祖萇曰朕實不如漢祖卿遠蕭何故不如甚也緯曰漢祖所以勝陛下者以能遠段鏗之徒故耳萇默然乃出鏗為北地太守萇死緯與姚興滅苻登成興之業皆緯之力也歷輔國將軍司隸校尉尚書左右僕射清河侯緯友人隴西牛壽率漢中流人歸興謂緯曰足下平生自謂時明也才足以立功立事道消也則追二疏朱雲發其狂直不能如胡廣之徒汙隆隨俗今遇其時矣正是垂名竹素之日可不勉歟緯曰吾之所庶幾如是但未能委宰衡於夷吾識韓信於羈旅以斯為愧耳立功立事竊謂未負昔言興聞而謂緯曰君之與壽言也何其誕哉立功立事自謂何如古人緯曰臣實未愧古人何則遇時來之運則輔翼太祖建八百之基及陛下龍飛之始翦滅苻登蕩清秦雍生極端右死饗廟庭古之君子正當爾耳興大悅及死興甚悼之贈司徒諡曰忠成侯
