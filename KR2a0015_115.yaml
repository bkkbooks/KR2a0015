body:
  text: 晉書卷一百十五載記第十五苻丕苻丕字永叔堅之長庶子也少而聰慧好學博綜經史堅與言將略嘉之命鄧羌教以兵法文武才幹亞于苻融為將善收士卒情出鎮于鄴東夏安之堅敗歸長安丕為慕容垂所逼自鄴奔枋頭堅之死也丕復入鄴城將收兵趙魏西赴長安會幽州刺史王永平州刺史苻沖頻為垂將平規等所敗乃遣昌黎太守宋敞焚燒和龍薊城宮室率衆三萬進屯壺關遣使招丕丕乃去鄴率男女六萬餘口進如潞川驃騎張蚝并州刺史王騰迎之入據晉陽始知堅死問舉哀于晉陽三軍縞素王永留苻沖守壺關率騎一萬會丕勸稱尊號丕從之乃以太元十年僭即皇帝位于晉陽南立堅行廟大赦境內改元曰太安置百官以張蚝為侍中司空封上黨郡公王永為使持節侍中都督中外諸軍事車騎大將軍尚書令進封清河公王騰為散騎常侍中軍大將軍司隸校尉陽平郡公苻沖為左光祿大夫尚書左僕射西平王俱石子為衛將軍濮陽公楊輔為尚書右僕射濟陽公王亮為護軍將軍彭城公強益耳梁暢為侍中徐義為吏部尚書並封縣公自餘封授各有差是時安西呂光自西域還師至于宜禾堅涼州刺史梁熙謀閉境距之高昌太守楊翰言于熙曰呂光新定西國兵強氣鋭其鋒不可當也度其事意必有異圖且今關中擾亂京師存亡未知自河已西迄于流沙地方萬里帶甲十萬鼎峙之勢實在今日若光出流沙其勢難測高梧谷口水險之要宜先守之而奪其水彼既窮渴自然投戈如其以遠不守伊吾之關亦可距也若度此二要雖有子房之策難為計矣地有所必爭真此機也熙弗從美水令犍為張統說熙曰主上傾國南討覆敗而還慕容垂擅兵河北泓沖寇逼京師丁零雜虜跋扈關洛州郡姦豪所在風扇王綱弛絶人懷利己今呂光回師將軍何以抗也熙曰誠深憂之未知計之所出統曰光雄果勇毅明略絶人今以蕩西域之威擁歸師之鋭鋒若猛火之盛於原弗可敵也將軍世受殊恩忠誠夙著立勳王室宜在于今行唐公洛上之從弟勇冠一時為將軍計者莫若奉為盟主以攝衆望推忠義以總率羣豪則光無異心也資其精鋭東兼毛興連王統楊璧集四州之衆掃凶逆於諸夏寧帝室于關中此桓文之舉也熙又不從殺洛于西海以子胤為鷹揚將軍率衆五萬距光于酒泉敦煌太守姚靜晉昌太守李純以郡降光胤及光戰于安彌為光所敗武威太守彭濟執熙迎光光殺之建威西郡太守索泮奮威督洪池已南諸軍事酒泉太守宋皓等並為光所殺堅尚書令魏昌公苻纂自關中來奔拜太尉進封東海王以中山太守王兗為平東將軍平州刺史阜城侯苻定為征東將軍冀州牧高城侯苻紹為鎮東將軍督冀州諸軍事重合侯苻謨為征西將軍幽州牧高邑侯苻亮為鎮北大將軍督幽并二州諸軍事並進爵郡公定紹據信都謨亮先據常山慕容垂之圍鄴城也並降于垂聞丕稱尊號遣使謝罪王兗固守博陵與垂相持左將軍竇衝秦州刺史王統河州刺史毛興益州刺史王廣南秦州刺史楊璧衛將軍楊定並據隴右遣使招丕請討姚萇丕大悅以定為驃騎大將軍雍州牧衝為征西大將軍梁州牧統鎮西大將軍興車騎大將軍璧征南大將軍並開府儀同三司加散騎常侍廣安西將軍皆進位州牧於是王永宣檄州郡曰大行皇帝棄背萬國四海無主征東大將軍長樂公先帝元子聖武自天受命荊南威振衡海分陝東都道被夷夏仁澤光于宇宙德聲侔于下武永與司空蚝等謹順天人之望以季秋吉辰奉公紹承大統銜哀即事栖谷總戎枕戈待旦志雪大恥慕容垂為封豕于關東泓沖繼凶于京邑致乘輿播越宗社淪傾羌賊姚萇我之牧士乘釁滔天親行大逆有生之巨賊也永纍葉受恩世荷將相不與驪山之戎滎澤之狄共戴皇天同履厚土諸牧伯公侯或宛沛宗臣或四七勳舊豈忍捨破國之醜豎縱殺君之逆賊乎主上飛龍九五實協天心靈祥休瑞史不輟書投戈效義之士三十餘萬少康光武之功可旬朔而成今以衛將軍俱石子為前軍師司空張蚝為中軍都督武將猛士風烈雷震志殄元凶義無他顧永謹奉乘輿恭行天罰君臣終始之義在三忘軀之誠勠力同之以建晉鄭之美先是慕容驎攻王兗于博陵至是糧竭矢盡郡功曹張猗踰城聚衆應驎兗臨城數之曰卿秦之人也吾卿之君也起衆應賊號稱義兵何名實相違之甚卿兄往合鄉宗親逐城主天地不容為世大戮身滅未幾卿復續之卿見為吾吏親尋干戈競為戎首為爾君者不亦難乎今人可取卿一切之功寧能忘卿不忠不孝之事古人有云求忠臣必出孝子之門卿母在城不能顧之何忠義之可望惡不絶世卿之謂也不圖中州禮義之邦而卿門風若斯卿去老母如脫屣吾復何論哉既而城陷兗及固安侯苻鑒並為驎所殺丕復以王永為司徒録尚書事徐義為尚書令加右光祿大夫初王廣還自成都也奔其兄秦州刺史統及長安不守廣攻河州牧毛興于枹罕興遣建節將軍臨清伯衛平率其宗人千七百夜襲廣軍大敗之王統復遣兵助廣興於是嬰城固守既而襲王廣敗之廣亡奔秦州為隴西鮮卑匹蘭所執送詣姚萇興既敗王廣謀伐王統平上邽枹罕諸氐皆窘於兵革而疲不堪命乃殺興推衛平為使持節安西將軍河州刺史遣使請命刁雲殺慕容忠乃推慕容永為使持節大都督中外諸軍事大將軍大單于雍秦梁涼四州牧録尚書事河東王稱藩于垂征東苻定鎮東苻紹征北苻謨鎮北苻亮皆降于慕容垂丕又進王永為左丞相苻纂為大司馬張蚝為太尉王騰為驃騎大將軍儀同三司徐義為司空苻沖為車騎大將軍尚書令儀同三司俱石子為衛大將軍尚書左僕射領官皆如故永又檄州郡曰昔夏有窮夷之難少康起焉王莽毒殺平帝世祖重光漢道百六之運何代無之天降喪亂羌胡猾夏先帝晏駕賊庭京師鞠為戎穴神州蕭條生靈塗炭天未亡秦社稷有奉主上聖德恢弘道侔光武所在宅心天人歸屬必當隆中興之功復配天之美姚萇殘虐慕容垂凶暴所過滅戶夷煙毀發丘墓毒遍存亡痛纏幽顯雖黃巾之害于九州赤眉之暴于四海方之未為甚也今素秋將及行師令辰公侯牧守壘主鄉豪或勠力國家乃心王室各率所統以孟冬上旬會大駕于臨晉於是天水姜延馮翊寇明河東王昭新平張晏京兆杜敏扶風馬郎建忠高平牧官都尉王敏等咸承檄起兵各有衆數萬遣使應丕皆就拜將軍郡守封列侯冠軍鄧景擁衆五千據彭池與竇衝為首尾擊萇平涼太守金熙安定北部都尉鮮卑沒奕于率鄯善王胡員吒護羌中郎將梁苟奴等與萇左將軍姚方成鎮遠強京戰于孫丘谷大敗之枹罕諸氐以衛平年老不可以成事業議廢之而憚其宗強連日不決氐有啖青者謂諸將曰大事宜定東討誂萇不可沈吟猶豫一旦事發反為人害諸軍但請衛公會集衆將青為諸軍決之衆以為然於是大饗諸將青抽劍而前曰今天下大亂豺狼塞路吾曹今日可謂休戚是同非賢明之主莫可濟艱難也衛公朽耄不足以成大事宜反初服以避賢路狄道長苻登雖王室疏屬而志略雄明請共立之以赴大駕諸君若有不同者便下異議乃奮劍攘袂將斬二己者衆皆從之莫敢仰視於是推登為帥遣使于丕請命丕以登為征西大將軍開府儀同三司南安王持節及州郡督因其所稱而授之又以徐義為右丞相丕留王騰守晉陽楊輔戍壺關率衆四萬進據平陽王統以秦州降姚萇慕容永以丕至平陽恐不自固乃遣使求假道還東丕弗許遣王永及苻纂攻之以俱石子為前鋒都督與慕容永戰于襄陵王永大敗永及石子皆死之初苻纂之奔丕也部下壯士三千餘人丕猜而忌之及永之敗懼為纂所殺率騎數千南奔東垣晉揚威將軍馮該自陝要擊敗之斬丕首執其太子寧長樂王壽送于京師朝廷赦而不誅歸之于苻宏徐義為慕容永所獲械埋其足將殺之義誦觀世音經至夜中土開械脫於重禁之中若有人導之者遂奔楊佺期佺期以為洛陽令苻纂及弟師奴率丕餘衆數萬奔據杏城苻登稱尊號僞諡丕為哀平皇帝丕之臣佐皆沒慕容永永乃進據上黨之長子僭稱大號改元曰中興丕在位二年而敗苻登索泮徐嵩登字文高堅之族孫也父敞健之世為太尉司馬隴東太守建節將軍後為苻生所殺堅即僞位追贈右將軍涼州刺史以登兄同成嗣毛興之鎮上邽以為長史登少而雄勇有壯氣粗險不修細行故堅弗之奇也長而折節謹厚頗覽書傳拜殿上將軍稍遷羽林監揚武將軍長安令坐事黜為狄道長及關中亂去縣歸毛興同成言於興請以登為司馬常在營部登度量不羣好為奇略同成常謂之曰汝聞不在其位不謀其政無數干時將為博識者不許吾非疾汝恐或不喜人妄豫耳自是可止汝後得政自可專意時人聞同成言多以為疾登而抑蔽之登乃屏迹不妄交遊興有事則召之戲謂之曰小司馬可坐評事登出言輒析理中興內服焉然敬憚而不能委任姚萇作亂遣其弟碩德率衆伐毛興相持久之興將死告同成曰與卿纍年共擊逆羌事終不克何恨之深可以後事付卿小弟司馬殄碩德者必此人也卿可換攝司馬事登既代衛平遂專統征伐是時歲旱衆飢道殣相望登每戰殺賊名為熟食謂軍人曰汝等朝戰暮便飽肉何憂於飢士衆從之噉死人肉輒飽健能鬬姚萇聞之急召碩德曰汝不來必為苻登所食盡碩德於是下隴奔萇及丕敗丕尚書寇遣奉丕子渤海王懿濟北王昶自杏城奔登登乃具丕死問於是為丕發喪行服三軍縞素登請立懿為主衆咸曰渤海王雖先帝之子然年在幼沖未堪多難國亂而立長君春秋之義也三虜跨僭寇旅殷強豺狼梟鏡舉目而是自古厄運之極莫甚于斯大王挺劍西州鳳翔秦隴偏師暫接姚萇奔潰一戰之功可謂光格天地宜龍驤武奮拯拔舊京以社稷宗廟為先不可顧曹臧吳札一介微節以失圖運之機不建中興之業也登於是以太元十一年僭即皇帝位大赦境內改元曰太初立堅神主于軍中載以輜軿羽葆青蓋車建黃旗武賁之士三百人以衛之將戰必告凡欲所為啓主而後行繕甲纂兵將引師而東乃告堅神主曰維曾孫皇帝臣登以太皇帝之靈恭踐寶位昔五將之難賊羌肆害于聖躬實登之罪也今合義旅衆餘五萬精甲徑兵足以立功年穀豐穰足以資贍即日星言電邁直造賊庭奮不顧命隕越為期庶上報皇帝酷冤下雪臣子大恥惟帝之靈降監厥誠因歔欷流涕將士莫不悲慟皆刻鉾鎧為死休字示以戰死為志每戰以長矟鉤刃為方圓大陳知有厚薄從中分配故人自為戰所向無前初長安之將敗也堅中壘將軍徐嵩屯騎校尉胡空各聚衆五千據險築堡以自固而受姚萇官爵及萇之害堅嵩等以王禮葬堅于二堡之間至是各率衆降登拜嵩鎮軍將軍雍州刺史空輔國將軍京兆尹登復改葬堅以天子之禮又僭立其妻毛氏為皇后弟懿為皇太弟遣使拜苻纂為使持節侍中都督中外諸軍事太師領大司馬進封魯王纂弟師奴為撫軍大將軍并州牧朔方公纂怒謂使者曰渤海王世祖之孫先帝之子南安王何由不立而自尊乎纂長史王旅諫曰南安已立理無中改賊虜未平不可宗室之中自為仇敵願大王遠蹤光武推聖公之義梟二虜之後徐更圖之纂乃受命於是二縣虜帥彭沛穀屠各董成張龍世新平羌雷惡地等盡應之有衆十餘萬纂遣師奴攻上郡羌酋金大黑金洛生大黑等逆戰大敗之斬首五千八百登以竇衝為車騎大將軍南秦州牧楊定為大將軍益州牧楊璧為司空梁州牧苻纂敗姚碩德于涇陽姚萇自陰密距纂纂退屯敷陸竇衝攻萇汧雍二城克之斬其將軍姚元平張略等又與萇戰于汧東為萇所敗登次于瓦亭萇攻彭沛穀堡陷之沛穀奔杏城萇遷陰密登征虜馮翊太守蘭犢率衆二萬自頻陽入于和寧與苻纂首尾將圖長安師奴勸其兄纂稱尊號纂不從乃殺纂自立為秦公蘭犢絶之皆為姚萇所敗登進據胡空堡戎夏歸之者十有餘萬姚萇遣其將軍姚方成攻陷徐嵩堡嵩被殺悉坑戎士登率衆下隴入朝那姚萇據武都相持纍戰互有勝負登軍中大饑收椹以供兵士立其子崇為皇太子辨為南安王尚為北海王姚萇退還安定登就食新平留其大軍于胡空堡率騎萬餘圍萇營四面大哭哀聲動人萇惡之及命三軍哭以應登登乃引退萇以登頻戰輒勝謂堅有神驗亦於軍中立堅神主請曰往年新平之禍非萇之罪臣兄襄從陝北渡假路求西狐死首丘欲暫見鄉里陛下與苻眉要路距擊不遂而沒襄敕臣行殺非臣之罪苻登陛下末族尚欲復讎臣為兄報恥於情理何負昔陛下假臣龍驤之號謂臣曰朕以龍驤建業卿其勉之明詔昭然言猶於耳陛下雖過世為神豈假手于苻登而圖臣忘前征時言邪今為陛下立神象可歸休于此勿計臣過聽臣至誠登進師攻萇既而升樓謂萇曰自古及今安有殺君而反立神象請福望有益乎大呼曰殺君賊姚萇出來吾與汝決之何為枉害無辜萇憚而不應萇自立堅神象戰未有利軍中每夜驚恐乃嚴鼓斬象首以送登登將軍竇洛竇于等謀反發覺出奔于萇登進討彭池不克攻彌姐營及繁川諸堡皆克之萇連戰屢敗乃遣其中軍姚崇襲大界登引師要之大敗崇于安丘俘斬二萬五千進攻萇將吳忠唐匡于平涼克之以尚書苻碩原為前禁將軍滅羌校尉戍平涼登進據苟頭原以逼安定萇率騎三萬夜襲大界營陷之殺登妻毛氏及其子辨尚擒名將數十人驅掠男女五萬餘口而去登收合餘兵退據胡空堡遣使齎書加竇衝大司馬驃騎將軍前鋒大都督都督隴東諸軍事楊定左丞相上大將軍都督中外諸軍事楊璧大將軍都督隴右諸軍事遣衝率見衆為先驅自繁川趣長安登率衆從新平徑據新豐之千戶固使定率隴上諸軍為其後繼璧留守仇池又命其并州刺史楊政冀州刺史楊楷率所統大會長安萇遣其將軍王破虜略地秦州楊定及破虜戰于清水之格奴坂大敗之登攻張龍世于鴦泉堡姚萇救之登引退萇密遣其將任宗度詐為內應遣使招登許開門納之登以為然雷惡地馳謂登曰姚萇多計略善御人必為姦變願深宜詳思登乃止萇聞惡地之詣登也謂諸將曰此羌多姦智今其詣登事必無成登聞萇懸門以待之大驚謂左右曰雷征東其殆聖乎微此公朕幾為豎子所誤萇攻陷新羅堡萇扶風太守齊益男奔登登將軍路柴強武等並以衆降於萇登攻萇將張業生于隴東萇救之不克而退登將軍魏褐飛攻姚當成于杏城為萇所殺馮翊郭質起兵廣鄉以應登宣檄三輔曰義感君子利動小人吾等生逢先帝堯舜之化纍世受恩非常伯納言之子即卿校牧守之胤而可坐視豺狼忍害君父裸尸薦棘痛結幽泉山陵無松隧之兆靈主無清廟之頌賊臣莫大之甚自古所未聞雖茹荼之苦銜蓼之辛何以諭之姚萇窮凶肆害毒被人神於圖讖曆數萬無一分而敢妄竊重名厚顏瞬息日月固所不照二儀實亦不育皇天雖欲絶之亦將假手於忠節凡百君子皆夙漸神化有懷義方含恥而存孰若蹈道而沒乎衆咸然之唯鄭縣人苟曜不從聚衆數千應姚萇登以質為平東將軍馮翊太守質遣部將伐曜大敗而歸質乃東引楊楷以為聲援又與曜戰于鄭東為曜所敗遂歸于萇萇以為將軍質衆皆潰散登自雍攻萇將金溫于范氏堡克之遂渡渭水攻萇京兆太守韋范于段氏堡不克進據曲牢苟曜有衆一萬據逆方堡密應登登去曲牢繁川次于馬頭原萇率騎來距大戰敗之斬其尚書吳忠進攻新平萇率衆救之登引退復攻安定為萇所敗據路承堡是時萇疾病見苻堅為祟登聞之秣馬厲兵告堅神主曰曾孫登自受任執戈幾將一紀未嘗不上天錫祐皇鑒垂矜所在必克賊旅冰摧今太皇帝之靈降災疢于逆羌以形類推之醜虜必將不振登當因其隕斃順行天誅拯復梓宮謝罪清廟於是大赦境內百僚進位二等與萇將姚崇爭麥于清水纍為崇所敗進逼安定去城九十餘里萇疾小瘳率衆距登登去營逆萇萇遣其將姚熙隆別攻登營登懼退還萇夜引軍過登營三十餘里以躡登後旦而候人告曰賊諸營已空不知所向登驚曰此為何人去令我不知來令我不覺謂其將死忽然復來朕與此羌同世何其厄哉遂罷師還雍以竇衝為右丞相尋而衝叛自稱秦王建年號登攻之于野人堡衝請救于姚萇萇遣其太子興攻胡空堡以救之登引兵還赴胡空堡衝遂與萇連和至是萇死登聞之喜曰姚興小兒吾將折杖以笞之於是大赦盡衆而東攻屠各姚奴帛蒲二堡克之自甘泉向關中興追登不及數十里登從六陌趣廢橋興將尹緯據橋以待之登爭水不得衆渴死者十二三與緯大戰為緯所敗其夜衆潰登單馬奔雍初登之東也留其弟司徒廣守雍太子崇守胡空堡廣崇聞登敗出奔衆散登至無所歸遂奔平涼收集遺衆入馬毛山興率衆攻之登遣子汝陰王宗質于隴西鮮卑乞伏乾歸結婚請援乾歸遣騎二萬救登登引軍出迎與興戰于山南為興所敗登被殺在位九年時年五十二崇奔于湟中僭稱尊號改元延初僞諡登曰高皇帝廟號太宗崇為乾歸所逐崇定皆死始健以穆帝永和七年僭立至登五世凡四十有四歲以孝武帝太元十九年滅索泮字德林敦煌人也世為冠族泮少時游俠及長變節好學有佐世才器張天錫輔政以泮為冠軍記室參軍天錫即位拜司兵歷位禁中録事執法御掾州府肅然郡縣改迹遷羽林左監有勤幹之稱出為中壘將軍西郡武威太守典戎校尉政務寬和戎夏懷其惠天錫甚敬之苻堅見而歎曰涼州信多君子既而以泮河西德望拜別駕呂光既克姑臧泮固郡不降光攻而獲之光曰孤既平西域將赴難京師梁熙無狀絶孤歸路此朝廷之罪人卿何意阻郡固迷自同元惡泮厲色責光曰將軍受詔討叛胡可受詔亂涼州邪寡君何罪而將軍害之泮但苦力寡不能固守以報君父之讎豈如逆氐彭濟望風反叛主滅臣死禮之常也乃就刑于市神色不變弟菱有俊才仕張天錫為執法中郎冗從右監苻堅世至伏波將軍典農都尉與泮俱被害徐嵩字元高盛之子也少以清白著稱苻堅時舉賢良為郎中稍遷長安令貴戚子弟犯法者嵩一皆考竟請託路絶堅甚奇之謂其叔父成曰人為長吏故當應耳此年少落落有端二之才遷守始平郡甚有威惠及壘陷姚方成執而數之嵩厲色謂方成曰汝姚萇罪應萬死主上止黃眉之斬而宥之叨據內外位為列將無犬馬識養之誠首為大逆汝曹羌輩豈可以人理期也何不速殺我早見先帝取姚萇于地下方成怒三斬嵩漆其首為便器登哭之哀慟贈車騎大將軍儀同三司諡曰忠武史臣曰自兩京殄覆九土分崩赤縣成蛇豕之墟紫宸遷蛙黽之穴干戈日用戰爭方興猶逐鹿之並驅若瞻烏之靡定苻洪擅蠻陬之桀黠乘羯虜之危亡乃附款江東而志圖關右禍生蠆毒未逞狼心健既承家克隆凶緒率思歸之衆投山西之隙據億丈之巖險總三秦之果鋭敢窺大寶遂竊鴻名校數姦雄有可言矣長生慘虐稟自率由覩辰象之災謂法星之夜飲忍生靈之命疑猛獸之朝飢但肆毒于刑殘曾無心於戒懼招亂速禍不亦宜乎永固雅量瓌姿變夷從夏叶魚龍之謠詠挺草付之休徵克翦姦回纂承僞曆遵明王之德教闡先聖之儒風撫育黎元憂勤庶政王猛以宏材緯軍國苻融以懿戚贊經綸權薛以諒直進規謨鄧張以忠勇恢威略雋賢效足嵵梓呈才文武兼施德刑具舉乃平燕定蜀擒代吞涼跨三分之二居九州之七遐荒慕義幽險宅心因止馬而獻歌託棲鸞以成頌因以功侔曩烈豈直化洽當年雖五胡之盛莫之比也既而足己夸世愎諫違謀輕敵怒鄰窮兵黷武懟三正之未叶恥五運之猶乖傾率土之師起滔天之寇負其犬羊之力肆其吞噬之能自謂戰必勝攻必取便欲鳴鸞禹穴駐蹕疑山疏爵以侯楚材築館以須歸命曾弗知人道助順神理害盈雖矜涿野之強終致昆陽之敗遂使凶渠候隙狡寇伺間步搖啓其禍先燒當乘其亂極宗社遷於他族身首罄于賊臣貽戒將來取笑天下豈不哀哉豈不謬哉苻丕承亂僭竊尋及傾敗斯可謂天之所廢人不能支苻登集離散之兵厲死休之志雖衆寡不敵難以立功而義烈慷慨有足稱矣贊曰洪惟壯勇威棱氐種健藉世資遂雄關隴長生昏虐敗不旋踵永固禎祥肇自龍驤垂旒負扆竊帝圖王患生縱敵難起矜強丕登僭假淪胥以亡
