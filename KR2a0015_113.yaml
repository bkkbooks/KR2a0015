body:
  text: 晉書卷一百十三載記第十三苻堅上苻堅字永固一名文玉雄之子也祖洪從石季龍徙鄴家於永貴里其母苟氏嘗游漳水祈子於西門豹祠其夜夢與神交因而有孕十二月而生堅焉有神光自天燭其庭背有赤文隱起成字曰草付臣又土王咸陽臂垂過膝目有紫光洪奇而愛之名曰堅頭年七歲聰敏好施舉止不踰規矩每侍洪側輒量洪舉措取與不失機候洪每曰此兒姿貌瓌偉質性過人非常相也高平徐統有知人之鑒遇堅於路異之執其手曰苻郎此官之御街小兒敢戲於此不畏司隸縛邪堅曰司隸縛罪人不縛小兒戲也統謂左右曰此兒有霸王之相左右怪之統曰非爾所及也後又遇之統下車屏人密謂之曰苻郎骨相不後當大貴但僕不見如何堅曰誠如公言不敢忘德八歲請師就家學洪曰汝戎狄異類世知飲酒今乃求學邪欣而許之健之入關也夢天神遣使者朱衣赤冠命拜堅為龍驤將軍健翌日為壇於曲沃以授之健泣謂堅曰汝祖昔受此號今汝復為神明所命可不勉之堅揮劍捶馬志氣感厲士卒莫不憚服焉性至孝博學多才藝有經濟大志要結英豪以圖緯世之宜王猛呂婆樓強汪梁平老等並有王佐之才為其羽翼太原薛讚略陽權翼見而驚曰非常人也及苻生嗣偽位讚翼說堅曰今主上昏虐天下離心有德者昌無德受殃天之道也神器業重不可令他人取之願君王行湯武之事以順天人之心堅深然之納為謀主生既殘虐無度梁平老等亟以為言堅遂弒生以偽位讓其兄法法自以庶孼不敢當堅及母苟氏並慮衆心未服難居大位羣僚固請乃從之以升平元年僭稱大秦天王誅生佞倖臣董龍趙韶等二十餘人赦其境內改元曰永興追諡父雄為文桓皇帝尊母苟氏為皇太后妻苟氏為皇后子宏為皇太子兄法為使持節侍中都督中外諸軍事丞相錄尚書從祖侯為太尉從兄柳為車騎大將軍尚書令封弟融為陽平公雙河南公子丕長樂公暉平原公熙廣平公叡鉅鹿公李威為衞將軍尚書左僕射梁平老為右僕射強汪為領軍將軍仇騰為尚書領選席寶為丞相長史行太子詹事呂婆樓為司隸校尉王猛薛讚為中書侍郎權翼為給事黃門侍郎與猛讚並掌機密追復魚遵雷弱兒毛貴王墮梁楞梁安段純辛牢等本官以禮改葬之其子孫皆隨才擢授初堅母以法長而賢又得衆心懼終為變至此遣殺之堅性仁友與法訣于東堂慟哭嘔血贈以本官諡曰哀封其子陽為東海公敷為清河公於是修廢職繼絕世禮神祇課農桑立學校魚眾寡孤獨高年不自存者賜穀帛有差其殊才異行孝友忠義德業可稱者令在所以聞其將張平以并州叛堅率衆討之以其建節將軍鄧羌為前鋒率騎五千據汾上堅至銅壁平盡衆拒戰為羌所敗獲其養子蚝送之平懼乃降于堅堅赦其罪署為右將軍蚝武賁中郎將加廣武將軍徙其所部三千餘戶于長安堅自臨晉登龍門顧謂其羣臣曰美哉山河之固婁敬有言關中四塞之國真不虛也權翼薛讚對曰臣聞夏殷之都非不險也周秦之衆非不多也終於身竄南巢首懸白旗軀殘於犬戎國分於項籍者何也德之不修故耳吳起有言在德不在險深願陛下追蹤唐虞懷遠以德山河之固不足恃也堅大悅乃還長安賜為父後者爵一級魚眾寡高年穀帛有差丐所過田租之半是秋大旱堅減膳徹懸金玉綺繡皆散之戎士後宮悉去羅紈衣不曳地開山澤之利公私共之偃甲息兵與境內休息王猛親寵愈密朝政莫不由之特進樊世氐豪也有大勳於苻氏負氣倨傲衆辱猛曰吾輩與先帝共興事業而不預時權君無汗馬之勞何敢專管大任是為我耕稼而君食之乎猛曰方當使君為宰夫安直耕稼而已世大怒曰要當懸汝頭于長安城門不爾者終不處于世也猛言之於堅堅怒曰必須殺此老氐然後百僚可整俄而世入言事堅謂猛曰吾欲以楊璧尚主璧何如人也世勃然曰楊璧臣之壻也婚已久定陛下安得令之尚主乎猛讓世曰陛下帝有海內而君敢競婚是為二天子安有上下世怒起將擊猛左右止之世遂醜言大罵堅由此發怒命斬之于西廄諸氐紛紜競陳猛短堅恚甚慢罵或有鞭撻於殿庭者權翼進曰陛下宏達大度善馭英豪神武卓犖錄功捨過有漢祖之風然慢易之言所宜除之堅笑曰朕之過也自是公卿以下無不憚猛焉堅起明堂繕南北郊郊祀其祖洪以配天宗祀其伯健于明堂以配上帝親耕藉田其妻苟氏親蠶於近郊堅南游霸陵顧謂羣臣曰漢祖起自布衣廓平四海佐命功臣孰為首乎權翼進曰漢書以蕭曹為功臣之冠堅曰漢祖與項羽爭天下困於京索之間身被七十餘創通中六七父母妻子為楚所囚平城之下七日不火食賴陳平之謀太上妻子克全免匈奴之禍二相何得獨高也雖有人狗之喻豈黃中之言乎于是酣飲極歡命羣臣賦詩大赦復改元曰甘露以王猛為侍中中書令京兆尹其特進強德健妻之弟也昏酒豪橫為百姓之患猛捕而殺之陳尸於市其中丞鄧羌性鯁直不撓與猛協規齊志數旬之間貴戚強豪誅死者二十有餘人於是百僚震肅豪右屏氣路不拾遺風化大行堅歎曰吾今始知天下之有法也天子之為尊也於是遣使巡察四方及戎夷種落州郡有高年孤寡不能自存長吏刑罰失中為百姓所苦清修疾惡勸課農桑有便於俗篤學至孝義烈力田者皆令具條以聞時匈奴左賢王衞辰遣使降于堅遂請田內地堅許之雲中護軍賈雍遣其司馬徐斌率騎襲之因縱兵掠奪堅怒曰朕方修魏絳和戎之術不可以小利忘大信昔荊吳之戰事興蠶婦澆瓜之惠梁宋息兵夫怨不在大事不在小擾邊動衆非國之利也所獲資產其悉以歸之免雍官以白衣領護軍遣使修和示之信義辰於是入居塞內貢獻相尋烏丸獨孤鮮卑沒奕于率衆數萬又降於堅堅初欲處之塞內苻融以匈奴為患其興自古比虜馬不敢南首者畏威故也今處之于內地見其弱矣方當闚兵郡縣為北邊之害不如徙之塞外以存荒服之義堅從之堅僭位五年鳳皇集於東闕大赦其境內百僚進位一級初堅之將為赦也與王猛苻融密議於露堂悉屏左右堅親為赦文猛融供進紙墨有一大蒼蠅入自間鳴聲甚大集於筆端驅而復來俄而長安街巷市里人相告曰官今大赦有司以聞堅驚謂融猛曰禁中無耳屬之理事何從泄也於是敕外窮推之咸言有一小人衣黑衣大呼於市曰官今大赦須臾不見堅歎曰其向蒼蠅乎聲狀非常吾固惡之諺曰欲人勿知莫若勿為聲無細而弗聞事未形而必彰者其此之謂也堅廣修學官召郡國學生通一經以上充之公卿已下子孫並遣受業其有學為通儒才堪幹事清修廉直孝悌力田者皆旌表之于是人思勸勵號稱多士盜賊止息請託路絕田疇修闢帑藏充盈典章法物靡不悉備堅親臨太學考學生經義優劣品而第之問難五經博士多不能對堅謂博士王寔曰朕一月三臨太學黜陟幽明躬親奬勵罔敢倦違庶幾周孔微言不由朕而墜漢之二武其可追乎寔對曰自劉石擾覆華畿二都鞠為茂艸儒生罕有或存墳籍滅而莫紀經淪學廢奄若秦皇陛下神武撥亂道隆虞夏開庠序之美弘儒教之風化盛隆周垂馨千祀漢之二武焉足論哉堅自是每月一臨太學諸生競勸焉屠各張罔聚衆數千自稱大單于寇掠郡縣堅以其尚書鄧羌為建節將軍率衆七千討平之時商人趙掇丁妃鄒等皆家累千金車服之盛擬則王侯堅之諸公競引之為國二卿黃門侍郎程憲言於堅曰趙掇等皆商販醜豎市郭小人車馬衣服僭同王者官齊君子為藩國列卿傷風敗俗有塵聖化宜肅明典法使清濁顯分堅於是推檢引掇等為國卿者降其爵乃下制非命士已上不得乘車馬於都城百里之內金銀錦繡工商皁隸婦女不得服之犯者棄市興寧三年堅又改元為建元慕容暐遣其太宰慕容恪攻拔洛陽略地至於崤澠堅懼其入關親屯陝城以備之匈奴右賢王曹轂左賢王衞辰舉兵叛率衆二萬攻其杏城已南郡縣屯於馬蘭山索虜烏延等亦叛堅而通于辰轂堅率中外精銳以討之以其前將軍楊安鎮軍毛盛等為前鋒都督轂遣弟活距戰于同官川安大敗之斬活并四千餘級轂懼而降堅徙其酋豪六千餘戶於長安進擊烏延斬之鄧羌討衞辰擒之於木根山堅自驄馬城如朔方巡撫夷狄以衞辰為夏陽公以統其衆轂尋死分其部落貳城已西二萬餘落封其長子璽為駱川侯貳城已東二萬餘落封其小子寅為力川侯故號東西曹秦雍二州地震裂水泉湧出金象生毛長安大風震電壞屋殺人堅懼而愈修德政焉使王猛楊安等率衆二萬寇荊州北鄙諸郡掠漢陽萬餘戶而還羌斂岐叛堅自稱益州刺史率部落四千餘家西依張天錫叛將李儼堅遣王猛與隴西太守姜衡南安太守邵羌討斂岐於略陽張天錫率步騎三萬擊李儼攻其大夏武始二郡克之天錫將掌據又敗儼諸軍於葵谷儼懼遣兄子純謝罪於堅仍請救尋而猛攻破略陽斂岐奔白馬堅遣楊安與建威王撫率衆會猛以救儼猛遣邵羌追斂岐使王撫守侯和姜衡守白石猛與楊安救枹罕及天錫將楊遹戰于枹罕東猛不利邵羌擒斂岐於白馬送之長安天錫遂引師而歸儼猶憑城未出猛乃服白乘輿從數十人請與相見儼開門延之未及設備而將士續入遂虜儼而還堅以其將軍彭越為平西將軍涼州刺史鎮枹罕以儼為光祿勳歸安侯是歲苻雙據上邽苻柳據蒲坂叛於堅苻庾據陝城苻武據安定並應之將共伐長安堅遣使諭之各齧梨以為信皆不受堅命阻兵自守堅遣後禁將軍楊成世左將軍毛嵩等討雙武王猛鄧羌攻蒲坂楊安張蚝攻陝城成世毛嵩為雙武所敗堅又遣其武衞王鑒寧朔呂光等率中外精銳以討之左衞苻雅左禁竇衝率羽林騎七千繼發雙武乘勝至於榆眉鑒等擊敗之斬獲萬五千人武棄安定隨雙奔上邽鑒等攻之苻柳出挑戰猛閉壘不應柳以猛為憚己留其世子良守薄坂率衆二萬將攻長安長安去蒲坂百餘里鄧羌率勁騎七千夜襲敗之柳引軍還猛又盡衆邀擊悉俘其卒柳與數百騎入於蒲坂鑒等攻上邽克之斬雙武猛又尋破蒲坂斬柳及其妻子傳首長安猛屯蒲坂遣鄧羌與王鑒等攻陷陝城克之送庾於長安殺之太和四年晉大司馬桓溫伐慕容暐次於枋頭暐衆屢敗遣使乞師於堅請割武牢以西之地堅亦欲與暐連橫乃遣其將苟池等率步騎二萬救暐王師尋敗引歸池乃還是時慕容垂避害奔於堅王猛言於堅曰慕容垂燕之戚屬世雄東夏寬仁惠下恩結士庶燕趙之間咸有奉戴之意觀其才略權智無方兼其諸子明毅有幹藝人之傑也蛟龍猛獸非可馴之物不如除之堅曰吾方以義致英豪建不世之功且其初至吾告之至誠今而害之人將謂我何王師既旋慕容暐悔割武牢之地遣使謂堅曰頃者割地行人失辭有國有家分災救患理之常也堅大怒遣王猛與建威梁成鄧羌率步騎三萬署慕容垂為冠軍將軍以為鄉導攻暐洛州刺史慕容筑於洛陽暐遣其將慕容臧率精卒十萬將解筑圍猛使梁成等以精銳萬人卷甲赴之大破臧於滎陽筑懼而請降猛陳師以受之留鄧羌鎮金墉猛振旅而歸太和五年又遣猛率楊安張蚝鄧羌等十將率步騎六萬伐暐堅親送猛於霸東謂曰今授卿精兵委以重任便可從壺關上黨出潞川此捷濟之機所謂捷雷不及掩耳吾當躬自率衆以繼卿後於鄴相見已敕運漕相繼但憂賊不煩後慮也猛曰臣庸劣孤生操無豪介蒙陛下恩榮內侍帷幄出總戎旅藉宗廟之靈稟陛下神算殘胡不足平也願不煩鑾軫冒犯霜露臣雖不武望克不淹時但願速敕有司部置鮮卑之所堅大悅於是進師楊安攻晉陽猛攻壺關執暐上黨太守慕容越所經郡縣皆降於猛猛留屯騎校尉苟萇戍壺關會楊安攻晉陽為地道遣張蚝率壯士數百人入其城中大呼斬關猛安遂入晉陽執暐并州刺史慕容莊暐遣其太傅慕容評率衆四十餘萬以救二城評憚猛不敢進屯於潞川猛留將軍毛當戍晉陽進師與評相持遣游擊郭慶以銳卒五千夜從間道出評營後傍山起火燒其輜重火見鄴中暐懼遣使讓評催之速戰猛知評賣水鬻薪有可乘之會評又求戰乃陣於渭原而誓衆曰王景略受國厚恩任兼內外今與諸君深入賊地宜各勉進不可退也願勠力行間以報恩顧受爵明君之朝慶觴父母之室不亦美乎衆皆勇奮破釜棄糧大呼競進猛望評師之衆也惡之謂鄧羌曰今日之事非將軍莫可以捷成敗之機在斯一舉將軍其勉之羌曰若以司隸見與者公無以為憂猛曰此非吾之所及也必以安定太守萬戶侯相處羌不悅而退俄而兵交猛召之羌寢而弗應猛馳就許之羌於是大飲帳中與張蚝徐成等跨馬運矛馳入評軍出入數四旁若無人搴旗斬將殺傷甚衆及日中評衆大敗俘斬五萬有餘乘勝追擊又降斬十萬於是進師圍鄴堅聞之留李威輔其太子宏守長安以苻融鎮洛陽躬率精銳十萬向鄴七日而至於安陽過舊閭引諸耆老語及祖父之事泫然流涕乃停信宿猛潛至安陽迎堅堅謂之曰昔亞夫不出軍迎漢文將軍何以臨敵而棄衆也猛曰臣每覽亞夫之事嘗謂前却人主以此而為名將竊未多之臣奉陛下神算擊垂亡之虜若摧枯拉朽何足慮也監國沖幼鑾駕遠臨脫有不虞其如宗廟何堅遂攻鄴陷之慕容暐出奔高陽堅將郭慶執而送之堅入鄴宮閱其名籍凡郡百五十七縣一千五百七十九戶二百四十五萬八千九百六十九口九百九十八萬七千九百三十五諸州郡牧守及六夷渠帥盡降於堅郭慶窮追餘燼慕容評奔於高句麗慶追至遼海句麗縛評送之堅散暐宮人珍寶以賜將士論功封賞各有差以王猛為使持節都督關東六州諸軍事車騎大將軍開府儀同三司冀州牧鎮鄴以郭慶為持節都督幽州諸軍事揚武將軍幽州刺史鎮薊堅自鄴如枋頭讌諸父老改枋頭為永昌縣復之終世堅至自永昌行飲至之禮歌勞止之詩以饗其羣臣赦慕容暐及其王公已下皆徙於長安封授有差堅於是行禮於辟雍祀先師孔子其太子及公侯卿大夫士之元子皆束脩釋奠焉徙關東豪傑及諸雜夷十萬戶於關中處烏丸雜類於馮翊北地丁零翟斌于新安徙陳留東阿萬戶以實青州諸因亂流移避仇遠徙欲還舊業者悉聽之晉叛臣袁瑾固守壽春為大司馬桓溫所圍遣使請救於堅堅遣王鑒張蚝率步騎二萬救之鑒據洛澗蚝屯八公山桓溫遣諸將夜襲鑒蚝敗之鑒蚝屯慎城初仇池氐楊世以地降於堅堅署為平南將軍秦州刺史仇池公既而歸順於晉世死子纂代立遂受天子爵命而絕於堅世弟統驍武得衆起兵武都與纂分爭堅遣其將苻雅楊安與益州刺史王統率步騎七萬先取仇池進圖寧益雅等次于鷲陜纂率衆五萬距雅晉梁州刺史楊亮遣督護郭寶率騎千餘救之戰於陜中為雅等所敗纂收衆奔還雅進攻仇池楊統帥武都之衆降於雅纂將楊他遣子碩密降於雅請為內應纂懼面縛出降雅釋其縛送之長安以楊統為平遠將軍南秦州刺史加楊安都督鎮仇池先是王猛獲張天錫將敦煌陰據及甲士五千堅既東平六州西擒楊纂欲以德懷遠且跨威河右至是悉送所獲還涼州天錫懼而遣使謝罪稱藩堅大悅即署天錫為使持節散騎常侍都督河右諸軍事驃騎大將軍開府儀同三司涼州刺史西域都護西平公吐谷渾碎奚以楊纂既降懼而遣使送馬五千匹金銀五百斤堅拜奚安遠將軍漒川侯堅嘗如鄴狩于西山旬餘樂而忘返伶人王洛叩馬諫曰臣聞千金之子坐不垂堂萬乘之主行不履危故文帝馳車袁公止轡孝武好田相如獻規陛下為百姓父母蒼生所繫何可盤于游田以玷聖德若禍起須臾變在不測者其如宗廟何其如太后何堅曰善昔文公悟愆於虞人朕聞罪於王洛召過也自是遂不復獵堅聞桓溫廢海西公也謂羣臣曰溫前敗灞上後敗枋頭十五年間再傾國師六十歲公舉動如此不能思愆免退以謝百姓方廢君以自悅將如四海何諺云怒其室而作色於父者其桓溫之謂乎堅以境內旱課百姓區種懼歲不登省節穀帛之費太官後宮減常度二等百僚之秩以次降之復魏晉士籍使役有常聞諸非正道典學一皆禁之堅臨太學考學生經義上第擢者八十三人自永嘉之亂庠序無聞及堅之僭頗留心儒學王猛整齊風俗政理稱舉學校漸興關隴清晏百姓豐樂自長安至于諸州皆夾路樹槐柳二十里一亭四十里一驛旅行者取給於途工商貿販於道百姓歌之曰長安大街夾樹楊槐下走朱輪上有鸞栖英彥雲集誨我萌黎是歲有大風從西南來俄而晦冥星皆見又有赤星見於西南太史令魏延言於堅曰於占西南國亡明年必當平蜀漢堅大悅命秦梁密嚴戎備乃以王猛為丞相以苻融為鎮東大將軍代猛為冀州牧融將發堅祖於霸東奏樂賦詩堅母苟氏以融少子甚愛之比發三至灞上其夕又竊如融所內外莫知是夜堅寢於前殿魏延上言天市南門屏內后妃星失明左右閽寺不見后妃移動之象堅推問知之驚曰天道與人何其不遠遂重星官王猛至長安加都督中外諸軍事猛辭讓再三堅不許其後天鼓鳴有彗星出於尾箕長十餘丈名蚩尤旗經太微掃東井自夏及秋冬不滅太史令張孟言於堅曰彗起尾箕而掃東井此燕滅秦之象因勸堅誅慕容暐及其子弟堅不納更以暐為尚書垂為京兆尹沖為平陽太守苻融聞之上疏於堅曰臣聞東胡在燕曆數彌久逮于石亂遂據華夏跨有六州南面稱帝陛下爰命六師大舉征討勞卒頻年勤而後獲本非慕義懷德歸化而今父子兄弟列官滿朝執權履職勢傾勞舊陛下親而幸之臣愚以為猛獸不可養狼子野心往年星異災起於燕願少留意以思天戒臣據可言之地不容默已詩曰兄弟急難朋友好合昔劉向以肺腑之親尚能極言況於臣乎堅報之曰汝為德未充而懷是非立善未稱而名過其實詩云德輶如毛人鮮克舉君子處高戒懼傾敗可不務乎今四海事曠兆庶未寧黎元應撫夷狄應和方將混六合以一家同有形於赤子汝其息之勿懷耿介夫天道助順修德則禳災苟求諸己何懼外患焉晉梁州刺史楊亮遣子廣襲仇池與堅將楊安戰廣敗績晉沮水諸戍皆委城奔潰亮懼而退守磬險安遂進寇漢川堅遣王統朱彤率卒二萬為前鋒寇蜀前禁將軍毛當鷹揚將軍徐成率步騎三萬入自劍閣楊亮率巴獠萬餘拒之戰于青谷王師不利亮奔固西城彤乘勝陷漢中徐成又攻二劍克之楊安進據梓潼晉奮威將軍西蠻校尉周虓降于彤揚武將軍益州刺史周仲孫勒兵距彤等于緜竹聞堅將毛當將至成都仲孫率騎五千奔於南中安當進兵遂陷益州於是西南夷邛莋夜郎等皆歸之堅以安為右大將軍益州牧鎮成都毛當為鎮西將軍梁州刺史鎮漢中姚萇為寧州刺史領西蠻校尉王統為南秦州刺史鎮仇池蜀人張育楊光等起兵與巴獠相應以叛於堅晉益州刺史竺瑤威遠將軍桓石虔率衆三萬據墊江育乃自號蜀王遣使歸順與巴獠酋帥張重尹萬等五萬餘人進圍成都尋而育與萬爭權舉兵相持堅遣鄧羌與楊安等擊敗之育光退屯緜竹安又敗張重尹萬于成都南重死之及首級二萬三千鄧羌復擊張育楊光于緜竹皆害之桓石虔敗姚萇於墊江萇退據五城石虔與竺瑤移屯巴東時有人於堅明光殿大呼謂堅曰甲申乙酉魚羊食人悲哉無復遺堅命執之俄而不見祕書監朱彤等因請誅鮮卑堅不從遣使巡行四方觀風俗問政道明黜陟恤孤獨不能自存者以安車蒲輪徵隱士樂陵王歡為國子祭酒及王猛卒堅置聽訟觀於未央之南禁老莊圖讖之學中外四禁二衞四軍長上將士皆令修學課後宮置典學立內司以授于掖庭選閹人及女隸有聰識者署博士以授經遣其武衞苟萇左將軍毛盛中書令梁熙步兵校尉姚萇等率騎十三萬伐張天錫於姑臧遣尚書郎閻負梁殊銜命軍前下書徵天錫堅嚴飾鹵簿親餞萇等於城西賞行將各有差又遣其秦州刺史苟池河州刺史李辯涼州刺史王統率三州之衆以繼之閻負等到涼州天錫自以晉之列藩志在保境命斬之遣將軍馬建出距萇等俄而梁熙王統等自清石津攻其將梁粲於河會城陷之苟萇濟自石城津與梁熙等會攻纏縮城又陷之馬建懼自楊非退還清塞天錫又遣將軍掌據率衆三萬與馬建陣於洪池苟萇遣姚萇以甲卒三千挑戰諸將勸據擊之以挫其鋒據不從天錫乃率中軍三萬次金昌萇熙聞天錫來逼急攻據建建降於萇遂攻據害之及其軍司席仂萇進軍入清塞乘高列陣天錫又遣司兵趙充哲為前鋒率勁勇五萬與萇等戰於赤岸哲大敗天錫懼而奔還致牋請降萇至姑臧天錫乘素車白馬面縛輿櫬降於軍門萇釋縛焚櫬送之於長安諸郡縣悉降堅以梁熙為持節西中郎將涼州刺史領護西羌校尉鎮姑臧徙豪右七千餘戶於關中五品稅百姓金銀一萬三千斤以賞軍士餘皆安堵如故堅封天錫重光縣之東寧鄉二百戶號歸義侯初萇等將征天錫堅為其立第於長安至是而居之堅既平涼州又遣其安北將軍幽州刺史洛為北討大都督率幽州兵十萬討代王涉翼犍又遣後將軍俱難與鄧羌等率步騎二十萬東出和龍西出上郡與洛會於涉翼犍庭翼犍戰敗遁於弱水苻洛逐之勢窘迫退還陰山其子翼圭縛父請降洛等振旅而還封賞有差堅以翼犍荒俗未參仁義令入太學習禮以翼圭執父不孝遷之於蜀散其部落於漢鄣邊故地立尉監行事官僚領押課之治業營生三五取丁優復三年無稅租其渠帥歲終令朝獻出入行來為之制限堅嘗之太學召涉翼犍問曰中國以學養性而人壽考漠北噉牛羊而人不壽何也翼犍不能答又問卿種人有堪將者可召為國家用對曰漠北人能捕六畜善馳走逐水草而已何堪為將又問好學否對曰若不好學陛下用教臣何為堅善其答堅以關中水旱不時議依鄭白故事發其王侯已下及豪望富室僮隸三萬人開涇水上源鑿山起堤通渠引瀆以溉岡鹵之田及春而成百姓賴其利以涼州新附復租賦一年為父後者賜爵一級孝悌力田爵二級孤寡高年穀帛有差女子百戶牛酒大酺三日遣其尚書令苻丕率司馬慕容暐苟萇等步騎七萬寇襄陽使楊安將樊鄧之衆為前鋒屯騎校尉石越率精騎一萬出魯陽關慕容垂與姚萇出自南鄉苟池等與強弩王顯將勁卒四萬從武當繼進大會漢陽師次沔北晉南中郎將朱序以丕軍無舟檝不以為虞石越遂游馬以渡序大懼固守中城越攻陷外郛獲船百餘艘以濟軍丕率諸將進攻中城遣苟池石越毛當以衆五萬屯於江陵晉車騎將軍桓沖擁衆七萬為序聲援憚池等不進保據上明兗州刺史彭超遣使上言於堅曰晉沛郡太守戴丄卜以卒數千戍彭城臣請率精銳五萬攻之願更遣重將討淮南諸城堅於是又遣其後將軍俱難率右將軍毛當後禁毛盛陵江邵保等步騎七萬寇淮陰盱眙揚武彭超寇彭城梁州刺史韋鍾寇魏興攻太守吉挹於西城晉將軍毛武生率衆五萬距之與俱難等相持於淮南先是梁熙遣使西域稱揚堅之威德并以繒綵賜諸國王於是朝獻者十有餘國大宛獻天馬千里駒皆汗血朱鬣五色鳳膺麟身及諸珍異五百餘種堅曰吾思漢文之返千里馬咨嗟美詠今所獻馬其悉返之庶克念前王髣髴古人矣乃命羣臣作止馬詩而遣之示無欲也其下以為盛德之事遠同漢文於是獻詩者四百餘人是時苻丕久圍襄陽御史中丞李柔劾丕以師老無功請徵下廷尉堅曰丕等費廣無成實宜貶戮但師已淹時不可虛然中返其特原之令以功成贖罪因遣其黃門郎韋華持節切讓丕等仍賜以劍曰來春不捷者汝可自裁不足復持面見吾也初丕之寇襄陽也將急攻之苟萇諫曰今以十倍之衆積粟如山但掠徙荊楚之人內於許洛絕其糧運使外援不接糧盡無人不攻自潰何為促攻以傷將士之命丕從之及堅讓至衆咸疑懼莫知所為征南主簿河東王施進曰以大將軍英秀諸將勇銳以攻小城何異洪鑪燎羽毛所以緩攻欲以計制之若決一旦之機可指日而定今破襄陽上明自遁復何所疑願請一旬之期以展三軍之勢如其不捷施請為戮首丕於是促圍攻之堅將親率衆助丕等使苻融將關東甲卒會于壽春梁熙統河西之衆以繼中軍融熙並上言以為未可興師乃止太元四年晉兗州刺史謝玄率衆數萬次于泗汭將救彭城苻丕陷襄陽執南中郎將朱序送于長安堅署為度支尚書以其中壘梁成為南中郎將都督荊揚州諸軍事荊州刺史領護南蠻校尉配兵一萬鎮襄陽以征南府器仗給之彭超圍彭城也置輜重於留城至是晉將謝玄遣將軍何謙之高衡率衆萬餘聲趣留城超引軍赴之戴丄卜率彭城之衆奔於謝玄超留其治中徐褒守彭城而復寇盱眙俱難既陷淮陰留邵保戍之與超會師而南晉將毛武生救魏興遣前鋒督護趙福將軍袁虞等將水軍一萬溯江而上堅南巴校尉姜宇遣將張紹仇生等水陸五千距之戰於南縣王師敗績尋而韋鍾攻陷魏興執太守吉挹毛當與王顯自襄陽而東會攻淮南彭超陷盱眙獲晉建威將軍高密內史毛璪之遂攻晉幽州刺史田洛於三阿去廣陵百里京都大震臨江列戍孝武帝遣征虜將軍謝石率水軍次于涂中右衞將軍毛安之游擊將軍河間王曇之次于堂邑謝玄自廣陵救三阿毛當毛盛馳襲安之王師敗績玄率衆三萬次於白馬塘俱難遣其將都顏率騎逆玄戰於塘西玄大敗之斬顏玄進兵至三阿與難超戰超等又敗退保盱眙玄進次石梁與田洛攻盱眙難超出戰復敗退屯淮陰玄遣將軍何謙之督護諸葛侃率舟師乘潮而上焚淮橋又與難等合戰謙之斬其將邵保難超退師淮北難歸罪彭超斬其司馬柳渾堅聞之大怒檻車徵超下獄超自殺難免為庶人堅以毛當為平南將軍徐州刺史鎮彭城毛盛為平東將軍兗州刺史鎮胡陸王顯為平吳校尉揚州刺史戍下邳賞堂邑之功也又以苻洛為散騎常侍持節都督益寧西南夷諸軍事征南大將軍益州牧領護西夷校尉鎮成都命從伊闕自襄陽溯漢而上洛健之兄子也雄勇多力而猛氣絕人堅深忌之故常為邊牧洛有征伐之功而未賞及是遷也恚怒謀於衆曰孤於帝室至親也主上不能以將相任孤常擯孤於外既投之西裔復不聽過京師此必有伏計令梁成沈孤於漢水矣為宜束手就命為追晉陽之事以匡社稷邪諸君意如何其治中平顏妄陳祥瑞勸洛舉兵洛因攘袂大言曰孤計決矣沮謀者斬於是自稱大將軍大都督秦王署置官司以平顏為輔國將軍幽州刺史為其謀主分遣使者徵兵於鮮卑烏丸高句麗百濟及薛羅休忍等諸國並不從洛懼而欲止平顏曰且宜聲言受詔盡幽并之兵出自中山常山陽平公必郊迎於路因而執之進據冀州總關東之衆以圖秦雍可使百姓不覺易主而大業定矣洛從之乃率衆七萬發和龍將圖長安於是關中騷動盜賊並起堅遣使數之曰天下未一家兄弟匪他何為而反可還和龍當以幽州永為世封洛謂使者曰汝還白東海王幽州褊阨不足容萬乘須還王咸陽以承高祖之業若能候駕潼關者位為上公爵歸本國堅大怒遣其左將軍竇衝及呂光率步騎四萬討之右將軍都貴馳傳詣鄴率冀州兵三萬為前鋒以苻融為大都督授之節度使石越率騎一萬自東萊出石徑襲和龍海行四百餘里苻重亦盡薊城之衆會洛次於中山有衆十萬衝等與洛戰於中山大敗之執洛及其將蘭殊送於長安呂光追斬苻重於幽州石越克和龍斬平顏及其黨與百餘人堅赦蘭殊署為將軍徙洛於涼州徵苻融為車騎大將軍領宗正錄尚書事洛既平堅以關東地廣人殷思所以鎮靜之引其羣臣於東堂議曰凡我族類支胤彌繁今欲分三原九嵕武都汧雍十五萬戶於諸方要鎮不忘舊德為磐石之宗於諸君之意如何皆曰此有周所以祚隆八百社稷之利也於是分四帥子弟三千戶以配苻丕鎮鄴如世封諸侯為新券主堅送丕於灞上流涕而別諸戎子弟離其父兄者皆悲號哀慟酸感行人識者以為喪亂流離之象於是分幽州置平州以石越為平州刺史領護鮮卑中郎將鎮龍城大鴻臚韓胤領護赤沙中郎將移烏丸府于代郡之平城中書令梁讜為安遠將軍幽州刺史鎮薊城毛興為鎮西將軍河州刺史鎮枹罕王騰為鷹揚將軍并州刺史領謢匈奴中郎將鎮晉陽二州各配支戶三千苻暉為鎮東大將軍豫州牧鎮洛陽苻叡為安東將軍雍州刺史鎮蒲坂先是高陸人穿井得龜大三尺背有八卦文堅命太卜池養之食以粟及此而死藏其骨於太廟其夜廟丞高虜夢龜謂之曰我本出將歸江南遭時不遇隕命秦庭又有人夢中謂虜曰龜三千六百歲而終終必妖興亡國之徵也堅自平諸國之後國內殷實遂示人以侈懸珠簾於正殿以朝羣臣宮宇車乘器物服御悉以珠璣琅玕奇寶珍怪飾之尚書郎裴元略諫曰臣聞堯舜茅茨周卑宮室故致和平慶隆八百始皇窮極奢麗嗣不及孫願陛下則采椽之不琢鄙瓊室而不居敷純風於天下流休範於無窮賤金玉珍穀帛勤恤人隱勸課農桑捐無用之器棄難得之貨敦至道以厲薄俗修文德以懷遠人然後一軌九州同風天下刑措既登先成東嶽蹤軒皇以齊美哂二漢之徙封臣之願也堅大悅命去珠廉以元略為諫議大夫鄯善王車師前部王來朝大宛獻汗血馬肅慎貢楛矢天竺獻火浣布康居於闐及海東諸國凡六十有二王皆遣使貢其方物初堅母少寡將軍李威有辟陽之寵史官載之至是堅收起居注及著作所錄而觀之見其事慚怒乃焚其書而大檢史官將加其罪著作郎趙泉車敬等已死乃止荊州刺史都貴遣其司馬閻振中兵參軍吳仲等率衆二萬寇竟陵留輜重于管城水陸輕進桓沖遣南平太守桓石虔竟陵太守郭銓等水陸二萬距之相持月餘戰於滶水振等大敗退保管城石虔乘勝攻破之斬振及仲俘斬萬七千
