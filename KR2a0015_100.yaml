body:
  text: 晉書卷一百列傳第七十王彌王彌東萊人也家世二千石祖頎魏玄墳太守武帝時至汝南太守彌有才幹博涉書記少遊俠京都隱者董仲道見而謂之曰君豺聲豹視好亂樂禍若天下騷擾不作士大夫矣惠帝末妖賊劉柏根起於東萊之縣彌率家僮從之柏根以為長史柏根死聚徒海渚為苟純所敗亡入長廣山為羣賊彌多權略凡有所掠必豫圖成敗舉無遺策弓馬迅捷膂力過人青土號為飛豹後引兵入寇青徐兗州刺史苟晞逆擊大破之彌退集亡散衆復大振晞與之連戰不能克彌進兵寇泰山魯國譙梁陳汝南潁川襄城諸郡入許昌開府庫取器杖所在陷沒多殺守令有衆數萬朝廷不能制會天下大亂進逼洛陽京邑大震宮城門晝閉司徒王衍等率百官距守彌屯七里澗王師進擊大破之彌謂其黨劉靈曰晉兵尚強歸無所厝劉元海昔為質子我與之周旋京師深有分契今稱漢王將歸之可乎靈然之乃渡河歸元海元海聞而大悅遣其侍中兼御史大夫郊迎致書於彌曰以將軍有不世之功超時之德故有此迎耳遲望將軍之至孤今親行將軍之館輒拂席洗爵敬待將軍及彌見元海勸稱尊號元海謂彌曰孤本謂將軍如竇周公耳今真吾孔明仲華也烈祖有云吾之有將軍如魚之有水於是署彌司隸校尉加侍中特進彌固辭使隨劉曜寇河內又與石勒攻臨漳永嘉初寇上黨圍壺關東海王越遣淮南內史王曠安豐太守衛乾等討之及彌戰於高都長平間大敗之死者十六七元海進彌征東大將軍封東萊公與劉曜石勒等攻魏郡汲郡頓丘陷五十餘壁皆調為軍士又與勒攻鄴安北將軍和郁棄城而走懷帝遣北中郎將裴憲次白馬討彌車騎將軍王堪次東燕討勒平北將軍曹武次大陽討元海武部將軍彭默為劉聰所敗見害衆軍皆退聰渡黃河帝遣司隸校尉劉暾將軍宋抽等距之皆不能抗彌聰以萬騎至京城焚二學東海王越距戰於西明門彌等敗走彌復以二千騎寇襄城諸縣河東平陽弘農上黨諸流人之在潁川襄城汝南南陽河南者數萬家為舊居人所不禮皆焚燒城邑殺二千石長吏以應彌彌又以二萬人會石勒寇陳郡潁川屯陽翟遣弟璋與石勒共寇徐兗因破越軍彌後與曜寇襄城遂逼京師時京邑大飢人相食百姓流亡公卿奔河陰曜彌等遂陷宮城至太極前殿縱兵大掠幽帝於端門逼辱羊皇后殺皇太子詮發掘陵墓焚燒宮廟城府蕩盡百官及男女遇害者三萬餘人遂遷帝於平陽彌之掠也曜禁之彌不從曜斬其牙門王延以徇彌怒與曜阻兵相攻死者千餘人彌長史張嵩諫曰明公與國家共興大事事業甫耳便相攻討何面見主上乎平洛之功誠在將軍然劉曜皇族宜小下之晉二王平吳之鑒其則不遠願明將軍以為慮縱將軍阻兵不還其若子弟宗族何彌曰善微子吾不聞此過也於是詣曜謝結分如初彌曰下官聞過乃是張長史之功曜謂嵩曰君為朱建矣豈況范生乎各賜嵩金百斤彌謂曜曰洛陽天下之中山河四險之固城池宮室無假營造可徙平陽都之曜不從焚燒而去彌怒曰屠各子豈有帝王之意乎汝奈天下何遂引衆東屯項關初曜以彌先入洛不待己怨之至是嫌隙遂構劉暾説彌還據青州彌然之乃以左長史曹嶷為鎮東將軍給兵五千多齎寶物還鄉里招誘亡命且迎其室彌將徐邈高梁輒率部曲數千人隨嶷去彌益衰弱初石勒惡彌驍勇常密為之備彌之破洛陽也多遺勒美女寶貨以結之時勒擒苟晞以為左司馬彌謂勒曰公獲苟晞而用之何其神妙使晞為公左彌為公右天下不足定也勒愈忌彌陰圖之劉暾又勸彌徵曹嶷藉其衆以誅勒於是彌使暾詣青州令曹嶷引兵會己而詐耍勒共向青州暾至東阿為勒遊騎所獲勒見彌與嶷書大怒乃殺暾彌未之知勒伏兵襲彌殺之并其衆張昌張昌本義陽蠻也少為平氏縣吏武力過人每自占卜言應當富貴好論攻戰儕類咸共笑之及李流寇蜀昌潛遁半年聚黨數千人盜得幢麾詐言臺遣其募人討流會壬午詔書發武勇以赴益土號曰壬午兵自天下多難數術者云當有帝王興於江左及此調發人咸不樂西征昌黨因之誑惑百姓各不肯去而詔書催遣嚴速所經之界停留五日者二千石免由是郡縣官長皆躬出驅逐展轉不遠屯聚而為劫掠是歲江夏大稔流人就食者數千口太安二年昌於安陸縣石巖山屯聚去郡八十里諸流人及避戍役者多往從之昌乃易姓名為李辰太守弓欽遣軍就討輒為所破昌徒衆日多遂來攻郡欽出戰大敗乃將家南奔沔口鎮南大將軍新野王歆遣騎督靳滿討昌於隨郡西大戰滿敗走昌得其器杖據有江夏即其府庫造妖言云當有聖人出山都縣吏丘沈遇於江夏昌名之為聖人盛車服出迎之立為天子置百官沈易姓名為劉尼稱漢後以昌為相國昌兄味為車騎將軍弟放廣武將軍各領兵於石巖中作宮殿又於巖上織竹為鳥形衣以五綵聚肉於其傍衆鳥羣集詐云鳳皇降又言珠袍玉璽鐵券金鼓自然而至乃下赦書建元神鳳郊祀服色依漢故事其有不應其募者族誅又流訛言云江淮已南當圖反逆官軍大起悉誅討之羣小互相扇動人情惶懼江沔間一時猋起豎牙旗鳴鼓角以應昌旬月之間衆至三萬皆以絳科頭圿之以毛江夏義陽士庶莫不從之惟江夏舊姓江安令王傴秀才呂蕤不從昌以三公位徵之傴蕤密將宗室北奔汝南投豫州刺史劉喬鄉人期思令李權常安令吳鳳孝廉吳暢糾合善士得五百餘家追隨傴等不豫妖逆新野王歆上言妖賊張昌劉尼妄稱神聖犬羊萬計絳頭毛面挑刀走戟其鋒不可當請臺敕諸軍三道救助於是劉喬率諸軍據汝南以禦賊前將軍趙驤領精卒八千據宛助平南將軍羊伊距守昌遣其將軍黃林為大都督率二萬人向豫州前驅李宮欲掠取汝水居人喬遣將軍李楊逆擊大破之林等東攻弋陽太守梁桓嬰城固守又遣其將馬武破武昌害太守昌自領其衆西攻宛破趙驤害羊伊進攻襄陽害新野王歆昌別率石冰東破江揚二州偽置守長當時五州之境皆畏逼從逆又遣其將陳貞陳蘭張甫等攻長沙湘東零陵諸郡昌雖跨帶五州樹立牧守皆桀盜小人而無禁制但以劫掠為務人情漸離是歲詔以寧朔將軍領南蠻校尉劉弘鎮宛弘遣司馬陶侃參軍蒯桓皮初等率衆討昌於竟陵劉喬又遣將軍李楊督護尹奉總兵向江夏侃等與昌苦戰纍日大破之納降萬計昌乃沈竄于下俊山明年秋乃擒之傳首京師同黨並夷三族陳敏陳敏字令通廬江人也少有幹能以郡廉吏補尚書倉部令史及趙王倫篡逆三王起義兵久屯不散京師倉廩空虛敏建議曰南方米穀皆積數十年時將欲腐敗而不漕運以濟中州非所以救患周急也朝廷從之以敏為合肥度支遷廣陵度支張昌之亂遣其將石冰等趣壽春都督劉準憂惶計無所出時敏統大軍在壽春謂準曰此等本不樂遠戍故逼迫成賊烏合之衆其勢易離敏請合率運兵公分配衆力破之必矣準乃益敏兵擊之破吳弘石冰等敏遂乘勝逐北戰數十合時冰衆十倍敏以少擊衆每戰皆克遂至揚州回討徐州賊封雲雲將張統斬雲降敏以功為廣陵相時惠帝幸長安四方交爭敏遂有割據江東之志其父聞之怒曰滅我門者必此兒也父亡去職東海王越當西迎大駕承制起敏為右將軍假節前鋒都督致書於敏曰將軍建謀富國則有大漕之勳及遭冰昌之亂則首率義徒以寡敵衆外無強兵之援內無運籌之侶隻身挺立雄略從橫擢奇謀於馬首奮靈計於臨危金聲振於江外精光赫於揚楚攻堅陷嶮三十餘戰師徒無虧勍敵自滅五州復全苞茅入貢豈非將軍之功力哉今羯賊屯結遊魂河濟鼠伏雉竄藏匿陳留始欲姦盜終圖不軌將軍孫吳之術既明已試之功先著孤與將軍情分特隆想割草土之哀抑難居之思捨絰執戈來恤國難天子遠巡鑾輿未反引領東眷有懷山陵當憑將軍勠力王輅有旋將軍率將所領承書風發米布軍資惟將軍所運時越討豫州刺史劉喬敏引兵會之與越俱敗於蕭敏因中國大亂遂請東歸收兵據歷陽會吳王常侍甘卓自洛至教卓假稱皇太弟命拜敏為揚州刺史并假江東首望顧榮等四十餘人為將軍郡守榮並偽從之敏為息娶卓女遂相為表𩹉揚州刺史劉機丹楊太守王廣等皆棄官奔走敏弟昶知顧榮等有二心勸敏殺之敏不從昶將精兵數萬據烏江弟恢率錢端等南寇江州刺史應邈奔走弟斌東略諸郡遂據有吳越之地敏命寮佐以己為都督江東軍事大司馬楚公封十郡加九錫列上尚書稱自江入河奉迎鑾駕東海王軍咨祭酒華談聞敏自相署置而顧榮等並江東首望悉受敏官爵乃遺榮等書曰石冰之亂朝廷録敏微功故加越次之禮授以上將之任庶有韓盧一噬之效而本性凶狡素無識達貪榮干運逆天而動阻兵作威盜據吳會內用凶弟外委軍吏上負朝廷寵授之榮下孤宰輔過禮之惠天道伐惡人神所不祐雖阻長江命危朝露忠節令圖君子高行屈節附逆義士所恥王蠋匹夫志不可屈於期慕義隕首燕庭況吳會仁人並受國寵或剖符名郡或列為近臣而便辱身姦人之朝降節逆叛之黨稽顙屈膝不亦羞乎昔龔勝絶粒不食莽朝魯連赴海恥為秦臣君子義行同符千載遙度雅量豈獨是安昔吳之武烈稱美一代雖奮奇宛葉亦受折襄陽討逆雄氣志存中夏臨江發怒命訖丹徒賴先主承運雄謀天挺尚內倚慈母仁明之教外杖子布廷爭之忠又有諸葛顧步張朱陸全之族故能鞭笞百越稱制南州然兵家之興不出三世運未盈百歸命入臣今以陳敏倉部令史七第頑六品下才欲躡桓王之高蹤蹈大皇之絶軌遠度諸賢猶當未許也諸君垂頭不能建翟義之謀而顧生俯眉已受羈絆之辱皇輿東軒行即紫館百僚垂纓雲翔鳳闕廟勝之謨潛運帷幄然後發荊州武旅順流東下徐州鋭鋒南據堂邑征東徑卒耀威歷陽飛橋越橫江之津泛舟涉瓜步之渚威震丹楊擒寇建鄴而諸賢何顏見中州之士邪小寇隔津音符道闊引領南望情存舊懷忠義之人何世蔑有夫危而不能安亡而不能存將何貴乎永長宿德情所素重彥先垂髮分著金石公胄早交恩紀特隆令伯義聲親好密結上欲與諸賢效翼紫宸建功帝籍如其不爾亦可泛舟河渭擊楫清歌何為辱身小寇之手以蹈逆亂之禍乎昔為同志今已殊域往為一體今成異身瞻江長歎非子誰思願圖良策以存嘉謀也敏凡才無遠略一旦據有江東刑政無章不為英俊所服且子弟凶暴所在為患周玘顧榮之徒常懼禍敗又得談書皆有慚色玘榮遣使密報征東大將軍劉準遣兵臨江己為內應準遣揚州刺史劉機寧遠將軍衡彥等出歷陽敏使弟昶及將軍錢廣次烏江以距之又遣弟閎為歷陽太守戍牛渚錢廣家在長城玘鄉人也玘潛使圖昶廣遣其屬何康錢象投募送白事於昶昶俯頭視書康揮刀斬之稱州下已殺敏敢有動者誅三族吹角為內應廣先勒兵在朱雀橋陳兵水南玘榮又説甘卓卓遂背敏敏率萬餘人將與卓戰未獲濟榮以白羽扇麾之敏衆潰散敏單騎東奔至江乘為義兵所斬母及妻子皆伏誅於是會稽諸郡並殺敏諸弟無遺焉王如王如京兆新豐人也初為州武吏遇亂流移至宛時諸流人有詔並遣還鄉里如以關中荒殘不願歸征南將軍山簡南中郎將杜蕤各遣兵送之而促期令發如遂潛結諸無賴少年夜襲二軍破之杜蕤悉衆擊如戰于涅陽蕤軍大敗山簡不能禦移屯夏口如又破襄城於是南安龐實馮翊嚴嶷長安侯脫等各帥其黨攻諸城鎮多殺令長以應之未幾衆至四五萬自號大將軍領司雍二州牧如懼石勒之攻己也乃厚賄於勒結為兄弟勒亦假其強而納之時侯脫據宛與如不協如説勒曰侯脫雖名漢臣其實漢賊如常恐其來襲兄宜備之勒素怒脫二己憚如脣齒故不攻之及聞如言甚悅遂夜令三軍蓐食待命雞鳴而駕後出者斬晨壓宛門攻之旬有二日而克之勒遂斬脫如於是大掠沔漢進逼襄陽征南山簡使將趙同帥師擊之經年不能克智力並屈遂嬰城自守王澄帥軍赴京都如邀擊破之如連年種穀皆化為莠軍中大飢其黨互相攻劫官軍進討各相率來降如計無所出歸于王敦敦從弟稜愛如驍武請敦配己麾下敦曰此輩虓險難蓄汝性忌急不能容養更成禍端稜固請與之稜置諸左右甚加寵遇如數與敦諸將角射屢鬬爭為過失稜果不容而杖之如甚以為恥初敦有不臣之迹稜每諫之敦常怒其異己及敦聞如為稜所辱密使人激怒之勸令殺稜如詣稜因間宴請劍舞為歡稜從之如於是舞刀為戲漸漸來前稜惡而呵之不止叱左右使牽去如直前害稜敦聞而陽驚亦捕如誅之杜曾杜曾新野人南中郎將蕤之從祖弟也少驍勇絶人能被甲遊於水中始為新野王歆鎮南參軍歷華容令至南蠻司馬凡有戰陳勇冠三軍會永嘉之亂荊州荒梗故牙門將胡亢聚衆於竟陵自號楚公假曾竟陵太守亢後與其黨自相猜二誅其驍將數十人曾心不自安潛謀圖之乃卑身屈節以事於亢亢弗之覺甚信任之會荊州賊王沖自號荊州刺史部衆亦盛屢遣兵抄亢所統亢患之問計於曾曾勸令擊之亢以為然曾白亢取帳下刀戟付工磨之因潛引王沖之兵亢遣精騎出距沖城中空虛曾因斬亢而并其衆自號南中郎將領竟陵太守曾求南郡太守劉務女不得盡滅其家會愍帝遣第五猗為安南將軍荊州刺史曾迎猗於襄陽為兄子娶猗女遂分據沔漢時陶侃新破杜韜乘勝擊曾有輕曾之色侃司馬魯恬言於侃曰古人爭戰先料其將今使君諸將無及曾者未易可逼也侃不從進軍圍之於石城時曾軍多騎而侃兵無馬曾密開門突侃陳出其後反擊其背侃師遂敗投水死者數百人曾將趨順陽下馬拜侃告辭而去既而致箋於平南將軍荀嵩求討丹水賊以自效嵩納之侃遺嵩書曰杜曾凶狡所將之卒皆豺狼也可謂鴟梟食母之物此人不死州土未寧足下當識吾言嵩以宛中兵少藉曾為外援不從侃言曾復率流亡二千餘人圍襄陽數日不下而還及王廙為荊州刺史曾距之廙使將朱軌趙誘擊曾皆為曾所殺王敦遣周訪討之屢戰不能克訪潛遣人緣山開道出曾不意以襲之曾衆潰其將馬俊蘇溫等執曾詣訪降訪欲生致武昌而朱軌息昌趙誘息胤皆乞曾以復冤於是斬曾而昌胤臠其肉而噉之杜韜杜韜字景文蜀郡成都人也祖植有名蜀土武帝時為符節令父眕略陽護軍韜初以才學著稱州舉秀才遭李庠之亂避地南平太守應詹愛其才而禮之後為醴陵令時巴蜀流人汝班蹇碩等數萬家布在荊湘間而為舊百姓之所侵苦並懷怨恨會蜀賊李驤殺縣令屯聚樂鄉衆數百人韜與應詹擊驤破之蜀人杜疇蹇撫等復擾湘州參軍馮素與汝班不協言於刺史荀眺曰流人皆欲反眺以為然欲盡誅流人班等懼死聚衆以應疇時韜在湘中賊衆共推韜為主韜自稱梁益二州牧平難將軍湘州刺史攻破郡縣眺委城走廣州廣州刺史郭訥遣始興太守嚴佐率衆攻韜韜逆擊破之荊州刺史王澄復遣王機擊韜敗於巴陵韜遂縱兵肆暴偽降於山簡簡以為廣漢太守眺之走也州人推安成太守郭察領州事因率衆討韜反為所敗察死之韜遂南破零陵東侵武昌害長沙太守崔敷宜都太守杜鑒邵陵太守鄭融等元帝命征南將軍王敦荊州刺史陶侃等討之前後數十戰韜將士多物故於是請降帝不許韜乃遺應詹書曰天步艱難始自吾州州黨流移在於荊土其所遇值蔑之如遺頓伏死亡者略復過半備嘗荼毒足下之所鑒也客主難久嫌隙易構不謂樂鄉起變出於不意時與足下思散疑結求擒其黨帥惟患算不經遠力不陷堅耳及在湘中懼死求生遂相結聚欲守善自衛天下小定然後輸誠盟府尋山公鎮夏口即具陳之此公鑒開塞之會察窮通之運納吾於衆疑之中非高識玄覩孰能若此西州人士得沐浴於清流豈惟滌蕩瑕穢乃骨肉之施此公薨逝斯事中廢賢愚痛毒竊心自悼欲遣滕永文張休豫詣大府備列起事以來本末但恐貪功殉名之徒將讒間於聖主之聽戮吾使於市朝以彰叛逆之罪故未敢遣之而甘陶卒至水陸十萬旌旗曜於山澤舟艦盈於三江威則威矣然吾衆竊未以為懼晉文伐原以全信為本故能使諸侯歸之陶侃宣赦書而繼之以進討豈所以崇奉明詔示軌憲於四海逼向義之夫以為叛逆之虜踧思善之衆以極不赦之責非不戰而屈人之算也驅略烏合欲與必死者求一戰未見爭衡之機權也吾之赤心貫於神明西州人士卿粗悉之耳寧當令抱枉於時不證於大府邪昔虞卿不榮大國之相與魏齊同其安危司馬遷明言於李陵雖刑殘而無慨足下抗威千里聲播汶衡進宜為國思靜難之略退與舊交措枉直之正不亦綽然有餘裕乎望卿騰吾箋令時達盟府遣大使光臨使吾得披露肝膽沒身何恨哉伏想盟府必結紐於紀綱為一匡於聖世使吾廁列義徒負戈前驅迎皇輿於閶闔掃長蛇於荒裔雖死之日猶生之年也若然先清方夏却定中原吾得一年之糧使泝流西歸夷李雄之逋寇修禹貢之舊獻展微勞以補往愆復州邦以謝鄰國亦其志也惟所裁處耳吾遠州寒士與足下出處殊倫誠不足感神交而濟其傾危但顯吾忠誠則汶嶽荷忠順之恕衡湘無伐叛之虞隆足下宏納之望拯吾徒陷溺之艱焉可金玉其音哉然顒顒十餘萬口亦勞瘁於警備思放逸於南畝矣衡嶽江湘列吾左右若往言有二血誠不亮益梁受殃不惟鄙門而已詹甚哀之乃啓呈韜書并上言曰韜益州秀才素有清望文理既優幹事兼美往因使流寓居詹郡界其貞心堅白詹所委究李驤為變樂鄉劫略良善韜時出家財招募忠勇登壇歃血義誠慷慨會驤攻燒南平韜遂東下巴漢與湘中鄉人相遇推其素望遂相憑結論韜本情非首作亂階者也然破湘川實韜之罪亦由兵交其間遂使滋蔓按韜今書血誠亦至矣昔朱鮪自疑於洛陽光武指河水以明心鮪感義歸誠終展力報施受封侯之寵由恕過以録功也詹竊謂今者當圮運之會思弘遠猷故齊赦射鉤之誅晉貰斬袪之戮用能濟翼戴之高勳隆一匡之美譽況韜等素無斯愆而稽顙投命邪以為可遣大使宣揚聖旨雲澤沾之於上百姓沐浴於下則上下交泰江左無風塵之虞矣帝乃使前南海太守王運受韜降宣詔書大赦凡諸反逆一皆除之加韜巴東監軍韜受命後諸將殉功者攻擊之不已韜不勝憤怒遂殺運而使其將王真領精卒三千為奇兵出江南向武陵斷官軍運路陶侃使伏波將軍鄭攀邀擊大破之真步走湘城於是侃等諸軍齊進真遂降侃衆黨散潰韜乃逃遁不知所在王機兄矩王機字令明長沙人也父毅廣州刺史甚得南越之情機美姿儀俶儻有度量陳恢之亂機年十七率衆擊破之嘗慕王澄為人澄亦雅知之以為己亞遂與友善內綜心膂外為牙爪尋用為成都內史機終日醉酒不存政事由是百姓怨之人情騷動會澄遇害機懼禍及又屬杜韜所在發墓而獨為機守冢機益自疑就王敦求廣州敦不許會廣州人背刺史郭訥迎機為刺史機遂將奴客門生千餘人入廣州州部將溫邵率衆迎機敦遣參軍葛幽追之及於廬陵機叱幽曰何以敢來欲取死邪幽不敢逼而歸郭訥聞邵之納機也乃遣兵擊邵反為所破訥又遣機父兄時吏距之咸倒戈迎機訥衆皆散乃握節而避機機遂入城就訥求節訥歎曰昔蘇武不失其節前史以為美談此節天朝所假義不相與自可遣兵來取之機慚而止機自以篡州懼為王敦所討乃更求交州時杜韜餘黨杜弘奔臨賀送金數千兩與機求討桂林賊以自效機為列上朝廷許之王敦以機難制又欲因機討梁碩故以降杜弘之勳轉為交州刺史碩聞而遣子侯候機於鬱林機怒其迎遲責云須至州當相收拷碩子馳使報碩碩曰王郎已壞廣州何可復來破交州也乃禁州人不許迎之府司馬杜讚以碩不迎機率兵討碩為碩所敗碩恐諸僑人為機於是悉殺其良者乃自領交址太守機既為碩所距遂往鬱林時杜弘大破桂林賊還遇機於道機勸弘取交州弘素有意乃執機節曰當相與迭持何可獨捉機遂以節與之於是機與弘及溫邵劉沈等並反尋而陶侃為廣州到始興州人皆諫不可輕進侃不聽及至州諸郡縣皆已迎機矣侃先討溫邵劉沈皆殺之機遣牙門屈藍還州詐言增糧密招誘所部欲以距侃侃即收藍斬之遣督護許高討機走之病死于道高掘出其尸斬首并殺其二子焉機兄矩字令式美姿容每出遊觀者盈路初為南平太守豫討陳恢有功遷廣州刺史將赴職忽見一人持奏謁矩自云京兆杜靈之矩問之答稱天上京兆被使召君為主簿矩意甚惡之至州月餘卒祖約祖約字士少豫州刺史逖之弟也初以孝廉為成臯令與逖甚相友愛永嘉末隨逖過江元帝稱制引為掾屬與陳留阮孚齊名後轉從事中郎典選舉約妻無男而性妬約亦不敢違忤嘗夜寢於外忽為人所傷疑其妻所為約求去職帝不聽約便從右司馬營東門私出司直劉隗劾之曰約幸荷殊寵顯位選曹銓衡人物衆所具瞻當敬以直內義以方外杜漸防萌式遏寇害而乃變起蕭牆患生婢妾身被刑傷虧其膚髮羣小噂日丸聲遠被塵穢清化垢纍明時天恩含垢猶復慰喻而約違命輕出既無明智以保其身又孤恩廢命宜加貶黜以塞衆謗帝不之罪隗重加執據終不許及逖有功於譙沛約漸見任遇逖卒自侍中代逖為平西將軍豫州刺史領逖之衆約異母兄光祿大夫納密言於帝曰約內懷陵上之心抑而使之可也今顯侍左右假其權勢將為亂階矣帝不納時人亦謂納與約異生忌其寵貴故有此言而約竟無綏馭之才不為士卒所附及王敦舉兵約歸衛京都率衆次壽陽逐敦所署淮南太守任台以功封五等侯進號鎮西將軍使屯壽陽為北境藩扞自以名輩不後郗卞而不豫明帝顧命又望開府及諸所表請多不見許遂懷怨望石聰嘗以衆逼之約屢表請救而官軍不至聰既退朝議又欲作塗塘以遏胡寇約謂為棄己彌懷憤恚先是太后使蔡謨勞之約見謨瞋目攘袂非毀朝政及蘇峻舉兵遂推崇約而罪執政約聞而大喜從子智及衍並傾險好亂又讚成其事於是命逖子沛內史渙女壻淮南太守許柳以兵會峻妻柳之姊也固諫不從及峻克京都矯詔以約為侍中太尉尚書令潁川人陳光率其屬攻之約左右閻禿貌類約光謂為約而擒之約踰垣獲免光奔於石勒而約之諸將復陰結於勒請為內應勒遣石聰來攻之約衆潰奔歷陽遣兄子渙攻桓宣于皖城會毛寶援宣擊渙敗之趙胤復遣將軍甘苗從三焦上歷陽約懼而夜遁其將牽騰率衆出降約以左右數百人奔於石勒勒薄其為人不見者久之勒將程遐説勒曰天下粗定當顯明逆順此漢高祖所以斬丁公也今忠於事君者莫不顯擢背叛不臣者無不夷戮此天下所以歸伏大王也祖約猶存臣切惑之且約大引賓客又占奪鄉里先人田地地主多怨於是勒乃詐約曰祖侯遠來未得喜歡可集子弟一時俱會至日勒辭之以疾令遐請約及其宗室約知禍及大飲致醉既至於市抱其外孫而泣遂殺之并其親屬中外百餘人悉滅之婦女伎妾班賜諸胡初逖有胡奴曰王安待之甚厚及在雍丘告之曰石勒是汝種類吾亦不在爾一人乃厚資遣之遂為勒將祖氏之誅也安多將從人於市觀省潛取逖庶子道重藏之為沙門時年十歲石氏滅後來歸蘇峻蘇峻字子高長廣掖人也父模安樂相峻少為書生有才學仕郡主簿年十八舉孝廉永嘉之亂百姓流亡所在屯聚峻糾合得數千家結壘於本縣于時豪傑所在屯聚而峻最強遣長史徐瑋宣檄諸屯示以王化又收枯骨而葬之遠近感其恩義推峻為主遂射獵於海邊青山中元帝聞之假峻安集將軍時曹嶷領青州刺史表峻為掖令峻辭疾不受嶷惡其得衆恐必為患將討之峻懼率其所部數百家泛海南渡既到廣陵朝廷嘉其遠至轉鷹揚將軍會周堅反於彭城峻助討之有功除淮陵內史遷蘭陵相王敦作逆詔峻討敦卜之不吉遲回不進及王師敗績峻退保盱眙淮陵故吏徐深艾毅重請峻為內史詔聽之加奮威將軍太寧初更除臨淮內史王敦復肆逆尚書令郗鑒議召峻及劉遐援京都敦遣峻兄説峻曰富貴可坐取何為自來送死峻不從遂率衆赴京師頓於司徒故府道遠行速軍人疲困沈充錢鳳謀曰北軍新到未堪攻戰擊之必克若復猶豫後難犯也賊於其夜度竹格渚拔柵將戰峻率其將韓晃於南塘橫截大破之又隨庾亮追破沈充進使持節冠軍將軍歷陽內史加散騎常侍封邵陵公食邑一千八百戶峻本以單家聚衆於擾攘之際歸順之後志在立功既有功於國威望漸著至是有鋭卒萬人器械甚精朝廷以江外寄之而峻頗懷驕溢自負其衆潛有異志撫納亡命得罪之家有逃死者峻輒蔽匿之衆力日多皆仰食縣官運漕者相屬稍有不如意便肆忿言時明帝初崩委政宰輔護軍庾亮欲徵之峻聞將徵遣司馬何仍詣亮曰討賊外任遠近從命至於內輔實非所堪不從遂下優詔徵峻為大司農加散騎常侍位特進以弟逸代領部曲峻素疑亮欲害己表曰昔明皇帝親執臣手使臣北討胡寇今中原未靖無用家為乞補青州界一荒郡以展鷹犬之用復不許峻嚴裝將赴召而猶豫未決參軍任讓謂峻曰將軍求處荒郡而不見許事勢如此恐無生路不如勒兵自守峻從之遂不應命朝廷遣使諷諭之峻曰臺下云我欲反豈得活邪我寧山頭望廷尉不能廷尉望山頭往者國危纍卵非我不濟狡兔既死獵犬理自應烹但當死報造謀者耳於是遣參軍徐會結祖約謀為亂而以討亮為名約遣祖渙許柳率衆助峻峻遣將韓晃張健等襲姑孰進逼慈湖殺于湖令陶馥及振威將軍司馬流峻自率渙柳衆萬人乘風濟自橫江次於陵口與王師戰頻捷遂據蔣陵覆舟山率衆因風放火臺省及諸營寺署一時蕩盡遂陷宮城縱兵大掠侵逼六宮窮凶極暴殘酷無道驅役百官光祿勳王彬等皆被捶撻逼令擔負登蔣山裸剝士女皆以壞席苫草自鄣無草者坐地以土自覆哀號之聲震動內外時官有布二十萬匹金銀五千斤錢億萬絹數萬匹他物稱是峻盡廢之矯詔大赦惟庾亮兄弟不在原例自為驃騎領軍將軍録尚書事許柳丹楊尹加前將軍馬雄左衛將軍祖渙驍騎將軍復弋陽王羕為西陽王太宰録尚書事羕息播亦復本官於是改易官司置其親黨朝廷政事一皆由之又遣韓晃入義興張健管商弘徽等入晉陵時溫嶠陶侃已唱義於武昌峻聞兵起用參軍賈寧計還據石頭更分兵距諸義軍所過無不殘滅嶠等將至峻遂遷天子於石頭逼迫居人盡聚之後苑使懷德令匡術守苑城嶠等既到乃築壘於白石峻率衆攻之幾至陷沒東西抄掠多所擒虜兵威日盛戰無不克由是義衆沮衄人懷異計朝士之奔義軍者皆云峻狡黠有智力其徒黨驍勇所向無敵惟當以天討有罪誅滅不久若以人事言之未易除也溫嶠怒曰諸君怯懦乃是譽賊及後纍戰不捷嶠亦深憚之管商等進攻吳郡焚吳縣海鹽嘉興敗諸義軍韓晃又攻宣城害太守桓彝商等又焚餘杭而大敗於武康退還義興嶠與趙胤率步兵萬人從白石南上欲以臨之峻與匡孝將八千人逆戰峻遣子碩與孝以數十騎先薄趙胤敗之峻望見胤走曰孝能破賊我更不如乎因舍其衆與數騎北下突陳不得入將回趨白木陂牙門彭世李千等投之以矛墜馬斬首臠割之焚其骨三軍皆稱萬歲峻司馬任讓等共立峻弟逸為主求峻尸不獲碩乃發庾亮父母墓剖棺焚尸逸閉城自守韓晃聞峻死引兵赴石頭管商及弘徽進攻庱亭壘督護李閎及輕車長史滕含擊破之斬首千級商率衆走延陵李閎與庱亭諸軍追之斬獲數千級商詣庾亮降匡術舉苑城降韓晃與蘇逸等并力攻術不能陷溫嶠等選精鋭將攻賊營碩率驍勇數百渡淮而戰於陳斬碩晃等震懼以其衆奔張健於曲阿門厄不得出更相蹈藉死者萬數逸為李湯所執斬於車騎府管商之降也餘衆並歸張健健又疑弘徽等不與己同盡殺之更以舟軍自延陵向長塘小大二萬餘口金銀寶物不可勝數揚烈將軍王允之與吳興諸軍擊健大破之獲男女萬餘口健復與馬雄韓晃等輕軍俱走閎率鋭兵追之及於巖山攻之甚急健等不敢下山惟晃獨出帶兩步殹箭却據胡牀彎弓射之傷殺甚衆箭盡乃斬之健等遂降並梟其首孫恩孫恩字靈秀琅邪人孫秀之族也世奉五斗米道恩叔父泰字敬遠師事錢唐杜子恭而子恭有祕術嘗就人借瓜刀其主求之子恭曰當即相還耳既而刀主行至嘉興有魚躍入船中破魚得瓜刀其為神效往往如此子恭死泰傳其術然浮狡有小才誑誘百姓愚者敬之如神皆竭財産進子女以祈福慶王珣言於會稽王道子流之於廣州廣州刺史王懷之以泰行鬱林太守南越亦歸之太子少傅王雅先與泰善言於孝武帝以泰知養性之方因召還道子以為徐州主簿猶以道術眩惑士庶稍遷輔國將軍新安太守王恭之役泰私合義兵得數千人為國討恭黃門郎孔道鄱陽太守桓放之驃騎咨議周協等皆敬事之會稽世子元顯亦數詣泰求其祕術泰見天下兵起以為晉祚將終乃扇動百姓私集徒衆三吳士庶多從之于時朝士皆懼泰為亂以其與元顯交厚咸莫敢言會稽內史謝輶發其謀道子誅之恩逃于海衆聞泰死惑之皆謂蟬蛻登仙故就海中資給恩聚合亡命得百餘人志欲復讎及元顯縱暴吳會百姓不安恩因其騷動自海攻上虞殺縣令因襲會稽害內史王凝之有衆數萬於是會稽謝針吳郡陸瓌吳興丘義興許允之臨海周胄永嘉張永及東陽新安等凡八郡一時俱起殺長吏以應之旬日之中衆數十萬於是吳興太守謝邈永嘉太守謝逸嘉興公顧胤南康公謝明慧黃門郎謝沖張琨中書郎孔道太子洗馬孔福烏程令夏侯愔等皆遇害吳國內史桓謙義興太守魏傿臨海太守新蔡王崇等並出奔於是恩據會稽自號征東將軍號其黨曰長生人宣語令誅殺異己有不同者戮及嬰孩由是死者十七八畿內諸縣處處蜂起朝廷震懼內外戒嚴遣衛將軍謝琰鎮北將軍劉牢之討之並轉鬬而前吳會承平日久人不習戰又無器械故所在多被破亡諸賊皆燒倉廩焚邑屋刊木堙井虜掠財貨相率聚於會稽其婦女有嬰纍不能去者囊簏盛嬰兒投於水而告之曰賀汝先登仙堂我尋後就汝初恩聞八郡響應告其屬曰天下無復事矣當與諸君朝服而至建康既聞牢之臨江復曰我割浙江不失作句踐也尋知牢之已濟江乃曰孤不羞走矣乃虜男女二十餘萬口一時逃入海懼官軍之躡乃緣道多棄寶物子女時東土殷實莫不粲麗盈目牢之等遽於收斂故恩復得逃海朝廷以謝琰為會稽率徐州文武戍海浦隆安四年恩復入餘姚破上虞進至刑浦琰遣參軍劉宣之距破之恩退縮少日復寇刑浦害謝琰朝廷大震遣冠軍將軍桓不才輔國將軍孫無終寧朔將軍高雅之擊之恩復還於海於是復遣牢之東屯會稽吳國內史袁山松築扈瀆壘緑海備恩明年恩復入浹口雅之敗績牢之進擊恩復還于海轉寇扈瀆害袁山松仍浮海向京口牢之率衆西擊未達而恩已至劉裕乃總兵緣海距之及戰恩衆大敗狼狽赴船尋又集衆欲向京都朝廷駭懼陳兵以待之恩至新州不敢進而退北寇廣陵陷之乃浮海而北劉裕與劉敬宣并軍躡之於郁洲纍戰恩復大敗由是漸衰弱復沿海還南裕亦尋海要截復大破恩於扈瀆恩遂遠迸海中及桓玄用事恩復寇臨海臨海太守辛景討破之恩窮戚乃赴海自沈妖黨及妓妾謂之水仙投水從死者百數餘衆復推恩妹夫盧循為主自恩初入海所虜男女之口其後戰死及自溺并流離被傳賣者至恩死時裁數千人存而恩攻沒謝琰袁山松陷廣陵前後數十戰亦殺百姓數萬人盧循盧循字于先小名元龍司空從事中郎諶之曾孫也雙眸冏徹瞳子四轉善草隸奕棋之藝沙門慧遠有鑒裁見而謂之曰君雖體涉風素而志存不軌循娶孫恩妹及恩作亂與循通謀恩性酷忍循每諫止之人士多賴以濟免恩亡餘衆推循為主元興二年正月寇東陽八月攻永嘉劉裕討循至晉安循窘急泛海到番禺寇廣州逐刺史吳隱之自攝州事號平南將軍遣使獻貢時朝廷新誅桓氏中外多虞乃權假循征虜將軍廣州刺史平越中郎將義熙中劉裕伐慕容超循所署始興太守徐道覆循之姊夫也使人勸循乘虛而出循不從道覆乃至番禺説循曰朝廷以君為腹心之疾劉公未有旋日不乘此機而保一日之安若平齊之後劉公自率衆至豫章遣鋭師過嶺雖復君之神武必不能當也今日之機萬不可失既克都邑劉裕雖還無能為也君若不同便當率始興之衆直指尋陽循甚不樂此舉無以奪其計乃從之初道覆密欲裝舟艦乃使人伐船材於南康山偽云將下都貨之後稱力少不能得致即於郡賤賣之價減數倍居人貪賤賣衣物而市之贛石水急出船甚難皆儲之如是者數四故船版大積而百姓弗之疑及道覆舉兵案賣券而取之無得隱匿者乃并力裝之旬日而辦遂舉衆寇南康廬陵豫章諸郡守相皆委任奔走鎮南將軍何無忌率衆距之兵敗被害循遣道覆寇江陵未至為官軍所敗馳走告循曰請并力攻京都若克之江陵非所憂也乃連旗而下戎卒十萬舳艫千計敗衛將軍劉毅於桑落洲徑至江寧道覆素有膽決知劉裕已還欲乾沒一戰請於新亭至白石焚舟而上數道攻之循多謀少決欲以萬全之計固不聽道覆以循無斷乃歎曰我終為盧公所誤事必無成使我得為英雄驅馳天下不足定也裕懼其侵軼乃柵石頭斷柤浦以距之循攻柵不利船艦為暴風所傾人有死者列陳南岸戰又敗績乃進攻京口寇掠諸縣無所得循謂道覆曰師老矣弗能復振可據尋陽并力取荊州徐更與都下爭衡猶可以濟因自蔡洲南走復據尋陽裕先遣羣率追討自統大衆繼進又敗循於雷池循欲遁還豫章乃悉力柵斷左里裕命衆攻柵循衆雖死戰猶不能抗裕乘勝擊之循單舸而走收散卒得千餘人還保廣州裕先遣孫處從海道據番禺城循攻之不下道覆保始興因險自固循乃襲合浦克之進攻交州至龍編刺史杜慧度譎而敗之循勢屈知不免先鴆妻子十餘人又召妓妾問曰我今將自殺誰能同者多云雀鼠貪生就死實人情所難有云官尚當死某豈願生於是悉鴆諸辭死者因自投於水慧度取其尸斬之及其父嘏同黨盡獲傳首京都譙縱譙縱巴西南充人也祖獻之有重名於西土縱少而謹慎蜀人愛之為安西府參軍義熙元年刺史遣縱及侯暉等領諸縣氐進兵東下暉有二志因梁州人不樂東也將圖益州刺史毛璩與巴西陽昧結謀於五城水口共逼縱為主縱懼而不當走投於水暉引出而請之至於再三遂以兵逼縱於輿上攻璩弟西夷校尉瑾於涪城城陷瑾死之縱乃自號梁秦二州刺史璩聞縱反自略城步還成都遣參軍王瓊率三千人討縱又遣弟瑗領四千兵繼瓊後進縱遣弟明子及暉距瓊於廣漢瓊擊破暉等追至綿竹明子設二伏以待之大敗瓊衆死者十八九益州營戶李騰開城以納縱毛璩既死縱以從弟洪為益州刺史明子為鎮東將軍巴州刺史率其衆五千人屯白帝自稱成都王明年遣使稱藩於姚興將順流東寇以討車騎將軍劉裕為名乞師於姚興且請桓謙為助興遣之九年劉裕以西陽太守朱齡石為益州刺史寧朔將軍臧喜下邳太守劉鍾蘭陵太守蒯恩等率衆二萬自江陵討縱初謀元率僉難其人齡石資名素淺裕違衆拔之授以麾下之半臧喜裕妻弟也位出其右又隸焉齡石次於白帝縱遣譙道福重兵守涪齡石師次平模去成都二百里縱遣其大將軍侯暉尚書僕射譙詵屯平模夾岸連城層樓重柵衆未能攻齡石謂劉鍾曰天方暑熱賊今固險攻之難拔祗困我師吾欲蓄鋭息兵伺隙而進卿以為何如鍾曰不然前揚聲言大將由內水故道福不敢捨涪今重軍逼之出其不意侯暉之徒已破膽矣正可因其凶而攻之勢當必克克平模之後自可鼓行而前成都必不能守若緩兵相持虛實相見涪軍復來難為敵也進不戰戰退無所資二萬餘人因為蜀子虜耳從之翌日進攻皆克斬侯暉等於是遂進縱之城守者相次瓦解縱乃出奔其尚書令馬耽封倉庫以待王師及齡石入成都誅縱同祖之親餘皆安堵使復其業縱之走也先如其墓縱女謂縱曰走必不免祗取辱焉等死死於先人之墓可也縱不從投道福於涪道福怒謂縱曰大丈夫居如斯功業安可棄哉今欲為降虜豈可而得人誰不死何懼之甚因投縱以劍中其馬鞍縱去之乃自縊道福謂其徒曰吾養爾等正為今日蜀之存亡實係在我不在譙王我尚在猶足一戰士咸許諾乃散金帛以賜其衆衆受之而走道福獨奔廣漢廣漢人杜瑾執之朱齡石徙馬耽於越巂追殺之耽之徙也謂其徒曰朱侯不送我京師滅衆口也吾必不免乃盥洗而臥引繩而死須臾齡石師至遂戮尸焉史臣曰惠皇失御政紊朝危難起蕭牆毒痡函夏九州波駭五嶽塵飛干戈日尋戎車競逐王彌好亂樂禍挾詐懷姦命儔嘯侶伺間候隙助悖逆於平陽肆殘忍於都邑遂使生靈塗炭神器流離邦國軫麥秀之哀宮廟興黍離之痛豈天意乎豈人事乎何醜虜之猖狂而亂離之斯瘼者也張昌等或鴟張淮浦或蟻聚荊衡招烏合之凶徒逞豺狼之貪暴憑陵險隘倔強江湖未淹歲稔咸至誅戮實自取之非為不幸峻約同惡相濟生此亂階孫盧同類相求嗣成妖逆至乃干戈掃地災沴滔天雖樊謝之毒被含靈李郭之禍延宮闕方凶比暴弗是加也譙縱乘茲釁隙肆彼姦謀旋踵而亡無足論矣贊曰中朝隳政王彌肇亂神器流離生靈塗炭羣妖伺隙構茲多難荐食荊衡陵虐江漢孫盧姦慝約峻殘賊窮凶極暴為鬼為蜮縱竊岷峨旋至顛踣
