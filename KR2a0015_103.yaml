body:
  text: 晉書卷一百三載記第三劉曜劉曜字永明元海之族子也少孤見養於元海幼而聰慧有奇度年八歲從元海獵于西山遇雨止樹下迅雷震樹旁人莫不顛仆曜神色自若元海異之曰此家千里駒也從兄為不亡矣身長九尺三寸垂手過膝生而眉白目有赤光鬚髯不過百餘根而皆長五尺性拓落高亮與衆不羣讀書志於廣覽不精思章句善屬文工草隸雄武過人鐵厚一寸射而洞之于時號為神射尤好兵書略皆暗誦常輕侮吳鄧而自比樂毅蕭曹時人莫之許也惟聰每曰永明世祖魏武之流何數公足道哉弱冠遊于洛陽坐事當誅亡匿朝鮮遇赦而歸自以形質異衆恐不容于世隱迹管涔山以琴書為事嘗夜間居有二童子入跪曰管涔王使小臣奉謁趙皇帝獻劍一口置前再拜而去以燭視之劍長二尺光澤非常赤玉為室背上有銘曰神劍御除衆毒曜遂服之劍隨四時而變為五色元海世頻歷顯職後拜相國都督中外諸軍事鎮長安靳準之難自長安赴之至于赤壁太保呼延晏等自平陽奔之與太傅朱紀太尉范隆等上尊號曜以太興元年僭即皇帝位大赦境內惟準一門不在赦例改元光初以朱紀領司徒呼延晏領司空范隆以下悉復本位使征北劉雅鎮北劉策次于汾陰與石勒為掎角之勢靳準遣侍中卜泰降于勒勒囚泰送之曜謂泰曰先帝末年實亂大倫羣閹撓政誅滅忠良誠是義士匡討之秋司空執心忠烈行伊霍之權拯濟塗炭使朕及此勳高古人德格天地朕方寧濟大艱終不以非命及君子賢人司空若執忠誠早迎大駕者政由靳氏祭則寡人以朕此意布之司空宣之朝士泰還平陽具宣曜旨準自以殺曜母兄沈吟未從尋而喬泰王騰靳康馬忠等殺準推尚書令靳明為盟主遣卜泰奉傳國六璽降于曜曜大悅謂泰曰使朕獲此神璽而成帝王者子也石勒聞之怒甚增兵攻之明戰纍敗遣使求救于曜曜使劉雅劉策等迎之明率平陽士女萬五千歸于曜曜命誅明靳氏男女無少長皆殺之使劉雅迎母胡氏喪于平陽還葬粟邑墓號陽陵偽諡宣明皇太后僭尊高祖父亮為景皇帝曾祖父廣為獻皇帝祖防懿皇帝考曰宣成皇帝徙都長安起光世殿於前紫光殿於後立其妻羊氏為皇后子熙為皇太子封子襲為長樂王闡太原王沖淮南王敞齊王高魯王徽楚王徵諸宗室皆進封郡王繕宗廟社稷南北郊以水承晉金行國號曰趙牲牡尚黑旗幟尚玄冒頓配天元海配上帝大赦境內殊死已下黃石屠各路松多起兵於新平扶風聚衆數千附于南陽王保保以其將楊曼為雍州刺史王連為扶風太守據陳倉張顗為新平太守周庸為安定太守據陰密松多下草壁秦隴氐羌多歸之曜遣其車騎劉雅平西劉厚攻楊曼于陳倉二旬不克曜率中外精鋭以赴之行次雍城太史令辨廣明言於曜曰昨夜妖星犯月師不宜行乃止敕劉雅等攝圍固壘以待大軍地震長安尤甚時曜妻羊氏有殊寵頗與政事陰有餘之徵也三年曜發雍政陳倉曼連謀曰諜者適還云其五牛旗建多言胡主自來其鋒恐不可當也吾糧廩既少無以支久若頓軍城下圍人百日不待兵刃而吾自滅不如率見衆以一戰如其勝也關中不待檄而至如其敗也一等死早晚無在遂盡衆背城而陳為曜所敗王連死之楊曼奔于南氐曜進攻草壁又陷之松多奔隴城進陷安定保懼遷于桑城氐羌悉從之曜振旅歸于長安署劉雅為大司徒晉將李矩襲金墉克之曜左中郎將宋始振威宋恕降于石勒署其大將軍廣平王嶽為征東大將軍鎮洛陽會三軍疫甚嶽遂屯澠池石勒遣石生馳應宋始等軍勢甚盛曜將尹安趙慎等以洛陽降生嶽乃班師鎮于陝城西明門內大樹風吹折經一宿樹撥變為人形髮長一尺鬚眉長三寸皆黃白色有斂手之狀亦有兩燧著裙之形惟無目鼻每夜有聲十日而生柯條遂成大樹枝葉甚茂長水校尉尹車謀反潛結巴酋徐庫彭曜乃誅車囚庫彭等五十餘人于阿房將殺之光祿大夫遊子遠固諫曜不從子遠叩頭流血曜大怒幽子遠而盡殺庫彭等尸諸街巷之中十日乃投之於水於是巴氐盡叛推巴歸善王句渠知為主四山羌氐巴羯應之者三十餘萬關中大亂城門晝閉子遠又從獄表諫曜怒甚毀其表曰大荔奴不憂命在須臾猶敢如此嫌死晚邪叱左右速殺之劉雅朱紀呼延晏等諫曰子遠幽而尚諫者所謂忠於社稷不知死之將至陛下縱弗能用奈何殺之若子遠朝誅臣等亦暮死以彰陛下過差之咎天下之人皆當去陛下蹈西海而死耳陛下復與誰居乎曜意解乃赦之於是敕內外戒嚴將親討渠知子遠進曰陛下誠能納愚臣之計者不勞大駕親動一月之中可使清定曜曰卿試言之子遠曰彼匪有大志希竊非望也但逼於陛下峻網耳今死者不可追莫若赦諸逆人之家老弱沒奚官者使迭相撫育聽其復業大赦與之更始彼生路既開不降何待若渠知自以罪重不即下者願假臣弱兵五千以為陛下梟之不敢勞陛下之將帥也不爾者今賊黨既衆彌川被谷雖以天威臨之恐非年歲可除曜大悅以子遠為車騎大將軍開府儀同三司都督雍秦征討諸軍事大赦境內子遠次于雍城降者十餘萬進軍安定氐羌悉下惟句氏宗黨五千餘家保于陰密進攻平之遂振旅循隴右陳安郊迎先是上郡氐羌十餘萬落保嶮不降酋大虛除權渠自號秦王子遠進師至其壁下權渠率衆來距五戰敗之權渠恐將降其子伊餘大言於衆曰往劉曜自來猶無若我何況此偏師而欲降之率徑卒五萬晨壓壘門左右勸戰子遠曰吾聞伊餘之勇當今無敵士馬之強復非其匹又其父新敗怒氣甚盛且西戎剽徑鋒鋭不可擬也不如緩之使氣竭而擊之乃堅壁不戰伊餘有驕色子遠候其無備夜誓衆蓐食晨大風霧子遠曰天贊我也躬先士卒掃壁而出遲明覆之生擒伊餘悉俘其衆權渠大懼被髮割面而降子遠啓曜以權渠為征西將軍西戎公分徙伊餘兄弟及其部落二十餘萬口于長安西戎之中權渠部最強皆稟其命而為寇暴權渠既降莫不歸附曜大悅宴羣臣于東堂語及平生泫然流涕遂下書曰蓋褒德惟舊聖后之所先念惠録孤明王之典是以世祖草創河北而致封於嚴尤之孫魏武勒兵梁宋追慟於橋公之墓前新贈大司徒烈愍公崔嶽中書令曹恂晉陽太守王忠太子洗馬劉綏等或識朕於童齔之中或濟朕於艱窘之極言念君子實傷我心詩不云乎中心藏之何日忘之嶽漢昌之初雖有褒贈屬否運之際禮章莫備今可贈嶽使持節侍中大司徒遼東公恂大司空南郡公綏左光祿大夫平昌公忠鎮軍將軍安平侯並加散騎常侍但皆丘墓夷滅申哀莫由有司其速班訪嶽等子孫授以茅土稱朕意焉初曜之亡與曹恂奔於劉綏綏匿之於書匱載送於忠忠送之朝鮮歲餘飢窘變姓名客為縣卒嶽為朝鮮令見而異之推問所由曜叩頭自首流涕求哀嶽曰卿謂崔元嵩不如孫賓碩乎何懼之甚也今詔捕卿甚峻百姓間不可保也此縣幽僻勢能相濟縱有大急不過解印綬與卿俱去耳吾既門衰無兄弟之纍身又薄祜未有兒子卿猶吾子弟也勿為過憂大丈夫處身立世鳥獸投人要欲濟之而況君子乎給以衣服資供書傳曜遂從嶽質通疑滯恩顧甚厚嶽從容謂曜曰劉生姿宇神調命世之才也四海脫有微風搖之者英雄之魁卿其人矣曹恂雖於屯厄之中事曜有君臣之禮故皆德之曜立太學於長樂宮東小學於未央宮西簡百姓年二十五已下十三已上神志可教者千五百人選朝賢宿儒明經篤學以教之以中書監劉均領國子祭酒置崇文祭酒秩次國子散騎侍郎董景道以明經擢為崇文祭酒以遊子遠為大司徒曜命起酆明觀立西宮建陵霄臺於滈池又將於霸陵西南營壽陵侍中喬豫和苞上疏諫曰臣聞人主之興作也必仰準乾象俯順人時是以衛文承亂亡之後宗廟社稷流漂無所而猶上候營室以構楚宮彼其急也猶尚若茲故能興康叔武公之迹以延九百之慶也奉詔書將營酆明觀市道芻蕘咸以非之曰一觀之功可以平涼州矣又奉敕旨復欲擬阿房而建西宮模瓊臺而起陵霄此則費萬酆明功億前役也以此功費亦可以吞吳蜀翦齊魏矣陛下何為於中興之日而蹤亡國之事自古聖王人誰無過陛下此役實為過舉過貴在能改終之實難又伏聞敕旨將營建壽陵周回四里下深二十五丈以銅為棺槨黃金飾之恐此功費非國內所能辦也且臣聞堯葬穀林市不改肆顓頊葬廣陽下不及泉聖王之於終也如是秦皇下錮三泉周輪七里身亡之後毀不旋踵暗主之於終也如此向魋石椁孔子以為不如速朽王孫倮葬識者嘉其矯世自古無有不亡之國不掘之墓故聖王知厚葬之招害也故不為之臣子之於君父陵墓豈不欲高廣如山嶽哉但以保全始終安固萬世為優耳興亡奢儉冏然於前惟陛下覽之曜大悅下書曰二侍中懇懇有古人之風烈矣可謂社稷之臣也非二君朕安聞此言乎以孝明於承平之世四海無虞之日尚納鍾離一言而罷北宮之役況朕之暗眇當今極弊而可不敬從明誨乎今敕悉停壽陵制度一遵霸陵之法詩不云乎無言不酬無德不報其封豫安昌子苞平輿子並領諫議大夫可敷告天下使知區區之朝思聞過也自今政法有不便於時不利社稷者其詣闕極言勿有所諱省酆水囿以與貧戶終南山崩長安人劉終於崩所得白玉方一尺有文字曰皇亡皇亡敗趙昌井水竭構五梁咢酉小衰困日丸喪嗚呼嗚呼赤牛奮靷其盡乎時羣臣咸賀以為勒滅之徵曜大悅齋七日而後受之於太廟大赦境內以終為奉瑞大夫中書監劉均進曰臣聞國主山川故山崩川竭君為之不舉終南京師之鎮國之所瞻無故而崩其凶焉可極言昔三代之季其災也如是今朝臣皆言祥瑞臣獨言非誠上忤聖旨下違衆議然臣不達大理竊所未同何則玉之於山石也猶君之於臣下山崩石壞象國傾人亂皇亡皇亡敗趙昌者此言皇室將為趙所敗趙因之而昌今大趙都於秦雍而勒跨全趙之地趙昌之應當在石勒不在我也井水竭構五梁者井謂東井秦之分也五謂五車梁謂大梁五車大梁趙之分也此言秦將竭滅以構成趙也咢者歲之次名作咢也言歲馭作咢酉之年當有敗軍殺將之事困謂困敦歲在子之年名玄囂亦在子之次言歲馭於子國當喪亡赤牛奮靷謂赤奮若在丑之歲名也牛謂牽牛東北維之宿丑之分也言歲在丑當滅亡盡無復遺也此其誡悟蒸蒸欲陛下勤修德化以禳之縱為嘉祥尚願陛下夕惕以答之書曰雖休勿休願陛下追蹤周旦盟津之美捐鄙虢公夢廟之凶謹歸沐浴以待妖言之誅曜憮然改容御史劾均狂言瞽説誣罔祥瑞請依大不敬論曜曰此之災瑞誠不可知深戒朕之不德朕收其忠惠多矣何罪之有乎曜親征氐羌仇池楊難敵率衆來距前鋒擊敗之難敵退保仇池仇池諸氐羌多降於曜曜後復西討楊韜于南安韜懼與隴西太守梁勛等降于曜皆封列侯使侍中喬豫率甲士五千遷韜等及隴右萬餘戶于長安曜又進攻仇池時曜寢疾兼癘疫甚議欲班師恐難敵躡其後乃以其尚書郎王獷為光國中郎將使于仇池以説難敵難敵於是遣使稱藩曜大悅署難敵為使持節侍中假黃鉞都督益寧南秦涼梁巴六州隴上西域諸軍事上大將軍益寧南秦三州牧領護南氐校尉寧羌中郎將武都王子弟為公侯列將二千石者十五人陳安請朝曜以疾篤不許安怒且以曜為死也遂大掠而歸曜疾甚篤馬輿而還使其將呼延實監輜重於後陳安率精騎要之于道實奔戰無路與長史魯憑俱沒于安安囚實而謂之曰劉曜已死子誰輔哉孤當與足下終定大業實叱安曰狗輩汝荷人榮寵處不疑之地前背司馬保今復如此汝自視何如主上憂汝不久梟首上邽通衢何謂大業可速殺我懸我首於上邽東門觀大軍之入城也安怒遂殺之以魯憑為參軍又遣其弟集及將軍張明等率騎二萬追曜曜衛軍呼延瑜逆戰擊斬之悉俘其衆安懼馳還上邽曜至自南安陳安使其將劉烈趙罕襲汧城拔之西州氐羌悉從安安士馬雄盛衆十餘萬自稱使持節大都督假黃鉞大將軍雍涼秦梁四州牧涼王以趙募為相國領左長史魯憑對安大哭曰吾不忍見陳安之死也安怒命斬之憑曰死自吾分懸吾頭於秦州通衢觀趙之斬陳安也遂殺之曜聞憑死悲慟曰賢人者天下之望也賢人是塞天下之情夫承平之君猶不敢乖臣妾之心況於四海乎陳安今於招賢採哲之秋而害君子絶當時之望吾知其無能為也休屠王石武以桑城降曜大悅署武為使持節都督秦州隴上雜夷諸軍事平西大將軍秦州刺史封酒泉王曜后羊氏死偽諡獻文皇后羊氏內有特寵外參朝政生曜三子熙襲闡曜始禁無官者不聽乘馬祿八百石已上婦女乃得衣錦繡自季秋農功畢乃聽飲酒非宗廟社稷之祭不得殺牛犯者皆死曜臨太學引試學生之上第者拜郎中武功男子蘇撫陝男子伍長平並化為女子石言於陝若言勿東者曜將葬其父及妻親如粟邑以規度之負土為墳其下周回二里作者繼以脂燭怨呼之聲盈于道路遊子遠諫曰臣聞聖主明王忠臣孝子之於終葬也棺足周身椁足周棺藏足周椁而已不封不樹為無窮之計伏惟陛下聖慈幽被神鑒洞遠每以清儉恤下為先社稷資儲為本今二陵之費至以億計計六萬夫百日作所用六百萬功二陵皆下錮三泉上崇百尺積石為山增土為阜發掘古冢以千百數役夫呼嗟氣塞天地暴骸原野哭聲盈衢臣竊謂無益於先皇先后而徒喪國之儲力陛下脫仰尋堯舜之軌者則功不盈百萬費亦不過千計下無怨骨上無怨人先帝先后有太山之安陛下饗舜禹周公之美惟陛下察焉曜不納乃使其將劉嶽等帥騎一萬迎父及弟暉喪於太原疫氣大行死者十三四上洛男子張盧死二十七日有盜發其冢者盧得蘇曜葬其父墓號永垣陵葬妻羊氏墓號顯平陵大赦境內殊死已下賜人爵二級孤老貧病不能自存者帛各有差太寧元年陳安攻曜征西劉貢於南安休屠王石武自桑城將攻上邽以解南安之圍安聞之懼馳歸上邽遇於瓜田武以衆寡不敵奔保張春故壘安引軍追武曰叛逆胡奴要當生縛此奴然後斬劉貢武閉壘距之貢敗安後軍俘斬萬餘安馳還赴救貢逆擊敗之俄而武騎大至安衆大潰收騎八千奔于隴城貢乃留武督後衆躬先士卒戰輒敗之遂圍安于隴城大雨霖震曜父墓門屋大風飄發其父寢堂于垣外五十餘步曜避正殿素服哭于東堂五日使其鎮軍劉襲太常梁胥等繕復之松柏衆木植已成林至是悉枯署其大司馬劉雅為太宰加劍履上殿入朝不趨讚拜不名給千兵百騎甲仗百人入殿增班劍六十人前後鼓吹各二部曜親征陳安圍安于隴城安頻出挑戰纍擊敗之斬獲八千餘級右軍劉幹攻平襄克之隴上諸縣悉降曲赦隴右殊死已下惟陳安趙募不在其例安留楊伯支薑沖兒等守隴城帥騎數百突圍而出欲引上邽平襄之衆還解隴城之圍安既出知上邽被圍平襄已敗乃南走陝中曜使其將軍平先丘中伯率徑騎追安頻戰敗之俘斬四百餘級安與壯士十餘騎於陝中格戰安左手奮七尺大刀右手執丈八蛇矛近交則刀矛俱發輒害五六遠則雙帶鞬服左右馳射而走平先亦壯健絶人勇捷如飛與安搏戰三交奪其蛇矛而退會日暮雨甚安棄馬與左右五六人步踰山嶺匿于溪澗翌日尋之遂不知所在會連雨始霽輔威呼延清尋其徑迹斬安于澗曲曜大悅安善於撫接吉凶夷險與衆同之及其死隴上歌之曰隴上壯士有陳安驅幹雖小腹中寬愛養將士同心肝𠸄驄父馬鐵瑕鞍七尺大刀奮如湍丈八蛇矛左右盤十蕩十決無當前戰始三交失蛇矛棄我𠸄驄竄巖幽為我外援而懸頭西流之水東流河一去不還奈子何曜聞而嘉傷命樂府歌之楊伯支斬薑沖兒以隴城降宋亭斬趙募以上邽降徙秦州大姓楊薑諸族二千餘戶于長安氐羌悉下並送質任時劉嶽與涼州刺史張茂相持于河上曜自隴長驅至西河戎卒二十八萬五千臨河列營百餘里中鍾鼓之聲沸河動地自古軍旅之盛未有斯比茂臨河諸戍皆望風奔退揚聲欲百道俱渡直至姑臧涼州大怖人無固志諸將咸欲速濟曜曰吾軍旅雖盛不踰魏武之東也畏威而來者三有二焉中軍宿衛已皆疲老不可用也張氏以吾新平陳安師徒殷盛以形聲言之非彼五郡之衆所能抗也必怖而歸命受制稱藩吾復何求卿等試之不出中旬張茂之表不至者吾為負卿矣茂懼果遣使稱藩獻馬一千五百匹牛三千頭羊十萬口黃金三百八十斤銀七百斤女妓二十人及諸珍寶珠玉方域美貨不可勝紀曜大悅使其大鴻臚田嵩署茂使持節假黃鉞侍中都督涼南北秦梁益巴漢隴右西域雜夷胸奴諸軍事太師領大司馬涼州牧領西域大都護護氐羌校尉涼王曜至自河西遣胡元增其父及妻墓高九十尺楊難敵以陳安既平內懷危懼奔于漢中鎮西劉厚追擊之獲其輜重千餘兩士女六千餘人還之仇池曜以大鴻臚田嵩為鎮南大將軍益州刺史鎮仇池以劉嶽為侍中都督中外諸軍事進封中山王初靳準之亂曜世子胤沒于黑匿郁鞠部至是胤自言郁鞠大驚資給衣馬遣子送之曜對胤悲慟嘉郁鞠忠款署使持節散騎常侍忠義大將軍左賢王胤字義孫美姿貌善機對年十歲身長七尺五寸眉鬢如畫聰奇之謂曜曰此兒神氣豈同義真乎固當應為卿之冢嫡卿可思文王廢伯邑考立武王之意也曜曰臣之藩國僅能守祭祀便足矣不可以亂長幼之倫也聰曰卿勳格天地國兼百城當世祚太師受專征之任五侯九伯得專征之者卿之子孫奈何言同諸藩國也義真既不能遠追太伯高讓之風吾不過為卿封之以一國義真曜子儉之字也於是封儉為臨海王立胤為世子胤雖少離屯難流躓殊荒而風骨俊茂爽朗卓然身長八尺三寸髮與身齊多力善射驍捷如風雲曜因以重之其朝臣亦屬意焉曜於是顧謂羣下曰義孫可謂歲寒而不凋涅而不淄者矣義光雖先已樹立然沖幼儒謹恐難乎為今世之儲二也懼非所以上固社稷下愛義光義孫年長明德又先世子也朕欲遠追周文近蹤光武使宗廟有太山之安義光饗無疆之福於諸卿意如何其太傅呼延晏等咸曰陛下遠擬周漢為國家無窮之計豈惟臣等賴之實亦宗廟四海之慶左光祿卜泰太子太保韓廣等進曰陛下若以廢立為是也則不應降日月之明垂訪羣下若以為疑也固思聞臣等異同之言竊以誠廢太子非也何則昔周文以未建之前擇聖表而超樹之可也光武緣母色而廢立豈足為聖朝之模範光武誠以東海纂統何必不如明帝皇子胤文武才略神度弘遠信獨絶一時足以擬蹤周發然太子孝友仁慈志尚沖雅亦足以堂負聖基為承平之賢主何況儲宮者六合人神所繫望也不可輕以廢易陛下誠實爾者臣等有死而已未敢奉詔曜默然胤前泣曰慈父之於子也當務存尸鳩之仁何可替熙而立臣也陛下謬恩乃爾者臣請死於此以明赤心且陛下若愛忘其醜以臣微堪指授亦當能輔導義光仰遵聖軌因歔欷流涕悲感朝臣曜亦以太子羊氏所生羊有寵哀之不忍廢乃止追諡前妻卜氏為元悼皇后胤之母也卜泰胤之舅曜嘉之拜上光祿大夫儀同三司領太子太傅封胤為永安王署侍中衛大將軍都督二宮禁衛諸軍事開府儀同三司録尚書事領太子太傅號曰皇子命熙於胤盡家人之禮時有鳳皇將五子翔於故未央殿五日悲鳴不食皆死曜立后劉氏石勒將石他自雁門出上郡襲安國將軍北羌王盆句除俘三千餘落獲牛馬羊百餘萬而歸曜大怒投袂而起是日次于渭城遣劉嶽追之曜次于富平為嶽聲援嶽及石他戰于河濱敗之斬他及其甲士一千五百級赴河死者五千餘人悉收所虜振旅而歸楊難敵自漢中還襲仇池克之執田嵩立之於前難敵左右叱嵩令拜嵩瞋目叱之曰氐狗安有天子牧伯而向賊拜乎難敵曰子岱吾當與子終定大事子謂劉氏可為盡忠吾獨不可乎嵩厲色大言曰若賊氐奴才安敢欲希覬非分吾寧為國家鬼豈可為汝臣何不速殺我顧排一人取其劍前刺難敵不中為難敵所殺曜遣劉嶽攻石生于洛陽配以近郡甲士五千宿衛精卒一萬濟自盟津鎮東呼延謨率荊司之衆自崤澠而東嶽攻石勒盟津石梁二戍克之斬獲五千餘級進圍石生于金墉石季龍率步騎四萬入自成皋關嶽陳兵以待之戰于洛西嶽師敗績嶽中流矢退保石梁季龍遂塹柵列圍遏絶內外嶽衆飢甚殺馬食之季龍又敗呼延謨斬之曜親率軍援嶽季龍率騎三萬來距曜前軍劉黑大敗季龍將石聰于八特坂曜次于金谷夜無故大驚軍中潰散乃退如澠池夜中又驚士卒奔潰遂歸長安季龍執劉嶽及其將王騰等八十餘人并氐羌三千餘人送于襄國坑士卒一萬六千曜至自澠池素服郊哭七日乃入城武功豕生犬上邽馬生牛及諸妖變不可勝記曜命其公卿各舉博識直言之士一人司空劉均舉參軍臺産曜親臨東堂遣中黃門策問之産極言其故曜覽而嘉之引見東堂訪以政事産流涕歔欷具陳災變之禍政化之闕辭旨諒直曜改容禮之即拜博士祭酒諫議大夫領太史令其後所言皆驗曜彌重之歲中三遷歷位尚書光祿大夫太子少師位特進曜署劉胤為大司馬進封南陽王以漢陽諸郡十三為國置單于臺于渭城拜大單于置左右賢王已下皆以胡羯鮮卑氐羌豪桀為之曜自還長安憤恚發病至是疾瘳曲赦長安殊死已下署其汝南王劉咸為太尉録尚書事光祿大夫劉綏為大司徒卜泰為大司空曜妻劉氏疾甚曜親省臨之問其所欲言劉泣曰妾叔父昶無子妾少養於叔恩撫甚隆無以報德願陛下貴之妾叔皚女芳有德色願備後宮曜許之言終而死偽諡獻烈皇后以劉昶為使持節侍中大司徒録尚書事進封河南郡公封昶妻張氏為慈鄉君立劉皚女芳為皇后追念劉氏之言也俄署驃騎劉述為大司徒劉昶為太保召公卿已下子弟有勇幹者為親御郎被甲乘鎧馬動止自隨以充折衝之任尚書郝述都水使者支當等固諫曜大怒鴆而殺之咸和三年夜夢三人金面丹脣東向浚巡不言而退曜拜而履其迹旦召公卿已下議之朝臣咸賀以為吉祥惟太史令任義進曰三者曆運統之極也東為震位王者之始次也金為兌位物衰落也脣丹不言事之畢也逡巡揖讓退舍之道也為之拜者屈伏於人也履迹而行慎不出疆也東井秦分也五車趙分也秦兵必暴起亡主喪師留敗趙地遠至三年近七百日其應不遠願陛下思而防之曜大懼於是躬親二郊飾繕神祠望秩山川靡不周及大赦殊死已下復百姓租稅之半長安自春不雨至於五月曜遣其武衛劉朗率騎三萬襲楊難敵于仇池弗克掠三千餘戶而歸張駿聞曜軍為石氏所敗乃去曜官號復稱晉大將軍涼州牧遣金城太守張閬及枹罕護軍辛晏將軍韓璞等率衆數萬人自大夏攻掠秦州諸郡曜遣劉胤率步騎四萬擊之夾洮相持七十餘日冠軍呼延那雞率親御郎二千騎絶其運路胤濟師逼之璞軍大潰奔還涼州胤追之及于令居斬級二萬張閬辛晏率衆數萬降于曜皆拜將軍封列侯石勒遣石季龍率衆四萬自軹關西入伐曜河東應之者五十餘縣進攻蒲坂曜將東救蒲坂懼張駿楊難敵承虛襲長安遣其河間王述發氐羌之衆屯于秦州曜盡中外精鋭水陸赴之自衛關北濟季龍懼引師而退追之及于高候大戰敗之斬其將軍石瞻枕尸二百餘里收其資仗億計季龍奔于朝歌曜遂濟自大陽攻石生于金墉決千金堨以灌之曜不撫士衆專與嬖臣飲博左右或諫曜怒以為妖言斬之大風拔樹昏霧四塞聞季龍進據石門續知勒自率大衆已濟始議增滎陽戍杜黃馬關俄而洛水候者與勒前鋒交戰擒羯送之曜問曰大胡自來邪其衆大小復如何羯曰大胡自來軍盛不可當也曜色變使攝金墉之圍陳于洛西南北十餘里曜少而淫酒末年尤甚勒至曜將戰飲酒數斗常乘赤馬無故局頓乃乘小馬比出復飲酒斗餘至於西陽門撝陳就平勒將石堪因而乘之師遂大潰曜昏醉奔退馬陷石渠墜于冰上被瘡十餘通中者三為堪所執送于勒所曜曰石王憶重門之盟不勒使徐光謂曜曰今日之事天使其然復云何邪幽曜于河南丞廨使金瘡醫李永療之歸于襄國曜瘡甚勒載以馬輿使李永與同載北苑市三老孫機上禮求見曜勒許之機進酒于曜曰僕谷王關右稱帝皇當持重保土疆輕用兵敗洛陽祚運窮天所亡開大分持一觴曜曰何以健邪當為翁飲勒聞之悽然改容曰亡國之人足令老叟數之舍曜于襄國永豐小城給其妓妾嚴兵圍守遣劉嶽劉震等乘馬從男女衣以見曜曜曰久謂卿等為灰土石王仁厚全宥至今而我殺石他負盟之甚今日之禍自其分耳留宴終日而去勒諭曜與其太子熙書令速降之曜但敕熙與諸大臣匡維社稷勿以吾易意也勒覽而惡之後為勒所殺熙及劉胤劉咸等議西保秦州尚書胡勳曰今雖喪主國尚全完將士情一未有離叛可共并力距險走未晚也胤不從怒其沮衆斬之遂率百官奔于上邽劉厚劉策皆捐鎮奔之關中擾亂將軍蔣英辛恕擁衆數十萬據長安遣使招勒勒遣石生率洛陽之衆以赴之胤及劉遵率衆數萬自上邽將攻石生于長安隴東武都安定新平北地扶風始平諸郡戎夏皆起兵應胤胤次于仲橋石生固守長安勒使石季龍率騎二萬距胤戰於義渠為季龍所敗死者五千餘人胤奔上邽季龍乘勝追戰枕尸千里上邽潰季龍執其偽太子熙南陽王劉胤并將相諸王等及其諸卿校公侯已下三千餘人皆殺之徙其臺省文武關東流人秦雍大族九千餘人于襄國又坑其王公等及五郡屠各五千餘人于洛陽曜在位十年而敗始元海以懷帝永嘉四年僭位至曜三世凡二十有七載以成帝咸和四年滅史臣曰彼戎狄者人面獸心見利則棄君親臨財則忘仁義者也投之遐遠猶懼外侵而處以封畿窺我中釁昔者幽后不綱胡塵暗於戲水襄王失御戎馬生于關洛至于算強弱妙兵權體興衰知利害於我中華未可量也況元海人傑必致青雲之上許以殊才不居庸劣之下是以策馬鴻騫乘機豹變五部高嘯一旦推雄皇枝相害未有與之爭衡者矣伊秩啓興王之略骨都論克定之秋單于無北顧之懷獫狁有南郊之祭大哉天地茲為不仁矣若乃習以華風溫乎雅度兼其舊俗則罕規模雖復石勒稱藩王彌效款終為夷狄之邦未辨君臣之位至於不遠儒風虛襟正直則昔賢所謂并仁義而盜之者焉偽主斯亡玄明篡嗣樹恩戎旅既總威權關河開曩日之疆士馬倍前人之氣然則信不由中自乖弘遠貌之為美處事難終縱武窮兵殘忠害謇佞人方轡並后載馳閹竪類於回天凝科踰於炮烙遣豺狼之將逐鷹犬之師懸旌俯渭分麾陷洛鐵馬陵山胡笳遵渚粉忠貞於戎手聚搢紳於京觀先王井賦乃眷維桑舊都宮室咸成茂草墜露沾衣行人灑泪若乃上古敦龐不親其子功成高讓歸諸有德爰及三代乃用干戈將以拯厥版蕩恭膺天命懿彼武王殷之列辟載旆乘時興兵誓野投焚既隕可以絶言而輕呂旁揮彤弧三發豈若響清蹕於常道之門馳金車於山陽之館故知黔首來蘇居今愛古白旗陳肆古不如今胡寇不仁有同豺豕役天子以行觴驅乘輿以執蓋庾珉之淚既盡辛賓加之以血若乃有生之貴處死為難弘在三之義忘七尺之重主憂之恨畢命同歸自古篡奪於斯為甚是以災氣呈形賊臣苞亂政荒民散可以危亡劉聰竟得壽終非不幸也曜則天資虓勇運偶時艱用兵則王翦之倫好殺亦董公之亞而承基醜類或有可稱子遠納忠高旌暫偃和苞獻直酆明罷觀而師之所處荊棘生焉自絶強藩禍成徑敵天之所厭人事以之駭戰士而宵奔酌戎杯而不醒有若假手同乎拾芥豈石氏之興歟何不支之甚也贊曰惟皇不範邇甸居穹丹朱罕嗣昌頓爭雄胡旌揚月朔馬騰風埃塵淮浦虓呼河宮未央朝寂謻門旦空郭欽之慮辛有知戎
