順行百七十二分之十三八十六日行六度半而留不行三十二日半而旋逆日行十七分之一百二日退六度而復留不行三十二日半復順日行十三分八十六日行六度半在日前夕伏西方順十九日三百八十四萬七千六百七十五分半行星二度六百四十九萬一千一百二十一分半而與日合凡一終三百七十八日六十七萬五千三百六十四分行星十二度五百九十六萬二千二百五十六分金晨與日合伏六日退四度而晨見東方在日後而逆遲日行五分之三十日退六度留不行七日而旋順遲日行四十五分之三十三四十五日行三十三度而順疾日行一度九十一分之十四九十一日行百五度而順益疾日行一度九十一分之二十一九十一日行百一十二度在日後而晨伏東方順四十二日十九萬四千九百九十分行星五十二度十九萬四千九百九十分而與日合一合二百九十二日十九萬四千九百九十分行星如之金夕與日合伏順四十二日十九萬四千九百九十分行星五十二度十九萬四千九百九十分而夕見西方在日前順疾日行一度九十一分之二十一九十一日行百一十二度而更順遲日行一度十四分九十一日行百五度而順益遲日行四十五分之三十三四十五日行三十三度而留不行七日而旋逆日行五分之三十日退六度在日前夕伏西方逆六日退四度而與日合凡再合一終五百八十四日三十八萬九千九百八十分行星如之水晨與日合伏十一日退七度而晨見東方在日後逆疾一日退一度而留不行一日而旋順遲日行八分之七八日行七度而順疾日行一度十八分之四十八日行二十二度在日後晨伏東方順十八日二千三十四萬四千二百六十一分行星三十六度二千三十四萬四千二百六十一分而與日合凡一合五十七日二千三十四萬四千二百六十一分行星如之水夕與日合伏十八日二千三十四萬四千二百六十一分行星三十六度二千三十四萬四千二百六十一分而夕見西方在日前順疾日行一度十八分之四十八日行二十二度而更順遲日行八分之七八日行七度而留不行一日而旋逆一日退一度在日前夕伏西方逆十一日退七度而與日合凡再合一終百一十五日千八百九十六萬一千三百九十五分行星如之五星曆步術以法伏日度餘加星合日度餘餘滿日度法得一從全命之如前得星見日及度餘也以星行分母乘見度分如日度法得一分不盡半法以上亦得一而日加所行分分滿其母得一度逆順母不同以當行之母乘故分如故母而一當行分也留者承前逆則減之伏不盡度除斗分以行母為率分有損益前後相御武帝侍中平原劉智以斗曆改憲推四分法三百年而減一日以百五十為度法三十七為斗分推甲子為上元至泰始十年歲在甲午九萬七千四百一十一歲上元天正甲子朔夜半冬至日月五星始于星紀得元首之端飾以浮說名為正曆當陽侯杜預著春秋長曆說云日行一度月行十三度十九分之七有奇日官當會集此之遲疾以考成晦朔以設閏月閏月無中氣而北斗邪指兩辰之間所以異於他月積此以相通四時八節無違乃得成歲其微密至矣得其精微以合天道則事而不愆故傳曰閏以正時時以作事然陰陽之運隨動而差差而不已遂與曆錯故仲尼丘明每於朔閏發文蓋矯正得失因以宣明曆數也劉子駿造三正曆以修春秋日蝕有甲乙者三十四而三正曆惟得一蝕比諸家既最疏又六千餘歲輒益一日凡歲當纍日為次而故益之此不可行之甚者自古已來諸論春秋者多違謬或造家術或用黃帝已來諸曆以推經傳朔日皆不諧合日蝕於朔此乃天驗經傳又書其朔蝕可謂得天而劉賈諸儒說皆以為月二日或三日公違聖人明文其弊在於守一元不與天消息也余感春秋之事嘗著曆論極言曆之通理其大指曰天行不息日月星辰各運其舍皆動物也物動則不一雖行度有大量可得而限纍日為月纍月為歲以新故相涉不得不有毫末之差此自然之理也故春秋日有頻月而蝕者有曠年不蝕者理不得一而算守數故曆無不有先後也始失於毫毛而尚未可覺積而成多以失弦望晦朔則不得不改憲以從之書所謂欽若昊天曆象日月星辰易所謂治曆明時言當順天以求合非為合以驗天者也推此論之春秋二百餘年其治曆變通多矣雖數術絶滅遠尋經傳微旨大量可知時之違謬則經傳有驗學者固當曲循經傳月日日蝕以考晦朔以推時驗而皆不然各據其學以推春秋此無異於度己之跡而欲削他人之足也余為曆論之後至咸寧中善算者李修卜顯依論體為術名乾度曆表上朝廷其術合日行四分數而微增月行用三百歲改憲之意二元相推七十餘歲承以強弱強弱之差蓋少而適足以遠通盈縮時尚書及史官以乾度與泰始曆參校古今記注乾度曆殊勝泰始曆上勝官曆四十五事今其術具存又并考古今十曆以驗春秋知三統之最疏也春秋大凡七百七十九日三百九十三經三百八十六傳其三十七日蝕三無甲乙黃帝曆得四百六十六日一蝕顓頊曆得五百九日八蝕夏曆得五百三十六日十四蝕真夏曆得四百六十六日一蝕殷曆得五百三日十三蝕周曆得五百六日十三蝕真周曆得四百八十五日一蝕魯曆得五百二十九日十三蝕三統曆得四百八十四日一蝕乾象曆得四百九十五日七蝕泰始曆得五百一十日十九蝕乾度曆得五百三十八日十九蝕今長曆得七百四十六日三十三蝕失三十三日經傳誤四日蝕三無甲乙漢末宋仲子集七曆以考春秋案其夏周二曆術數皆與藝文志所記不同故更名為真夏真周曆也穆帝永和八年著作郎琅邪王朔之造通曆以甲子為上元積九萬七千年四千八百八十三為紀法千二百五為斗分因其上元為開闢之始後秦姚興時當孝武太元九年歲在甲申天水姜岌造三紀甲子元曆其略曰治曆之道必審日月之行然後可以上考天時下察地化一失其本則四時變移故仲尼之作春秋日以繼月月以繼時時以繼年年以首事明天時者人事之本是以王者重之自皇羲以降暨于漢魏各自制曆以求厥中考其疏密惟交會薄蝕可以驗之然書契所記惟春秋著日蝕之變自隱公訖于哀公凡二百四十二年之間日蝕三十有六考其晦朔不知用何曆也班固以為春秋因魯曆魯曆不正故置閏失其序魯以閏餘一之歲為蔀首檢春秋置閏不與此蔀相符也命曆序曰孔子為治春秋之故退修殷之故曆使其數可傳於後如是春秋宜用殷曆正之今考其交會不與殷曆相應以殷曆考春秋月朔多不及其日又以檢經率多一日傳率少一日但公羊經傳異朔於理可從而經有蝕朔之驗傳為失之也服虔解傳用太極上元太極上元乃三統曆劉歆所造元也何緣施於春秋於春秋而用漢曆於義無乃遠乎傳之違失多矣不惟斯事而已襄公二十七年冬十有一月乙亥朔日有蝕之傳曰辰在申司曆過再失閏也考其去交分交會應在此月而不為再失閏也案歆曆於春秋日蝕一朔其餘多在二日因附五行傳著朓與側匿之說云春秋時諸侯多失其政故月行遲歆不以曆失天而為之差說日之蝕朔此乃天驗也而歆反以己曆非此寃天而負時曆也杜預又以為周衰世亂學者莫得其真今之所傳七曆皆未必是時王之術也今誠以七家之曆以考古今交會信無其驗也皆由斗分疏之所致也殷曆以四分一為斗分三統以一千五百三十九分之三百八十五為斗分乾象以五百八十九分之一百四十五為斗分今景初以一千八百四十三分之四百五十五為斗分疏密不同法數各異殷曆斗分粗故不施於今乾象斗分細故不得通於古景初斗分雖在粗細之中而日之所在乃差四度日月虧已皆不及其次假使日在東井而蝕以月驗之乃在參六度差違乃爾安可以考天時人事乎今治新曆以二千四百五十一分之六百五為斗分日在斗十七度天正之首上可以考合於春秋下可以取驗於今世以之考春秋三十六蝕正朔者二十有五蝕二日者二蝕晦者二誤者五凡三十三蝕其餘蝕經𣰋日諱之名𣰋以考其得失圖緯皆云三百歲斗曆改憲以今新曆施於春秋之世日蝕多在朔春秋之世下至於今凡一千餘歲交會弦望故進退於三蝕之間此法乃可永載用之豈三百歲斗曆改憲者乎甲子上元以來至魯隱公元年己未歲凡八萬二千七百三十六至晉孝武太元九年甲申歲凡八萬三千八百四十一算上元法七千三百五十三紀法二千四百五十一通數十七萬九千四十四日法六千六十二月周三萬二千七百六十六氣分萬二千八百六十元月九萬九百四十五紀月三萬三百一十五沒分四萬四千七百六十一沒法六百四十三斗分六百五周天八十九萬五千二百二十一名紀日章月二百三十五章歲十九章閏七歲中十二會數四十七日月八百九十三歲凡四十七會分盡氣中十二甲子紀交差九千一百五十七甲申紀交差六千三百三十七甲辰紀交差三千五百一十七周半一百二十七朔望合數九百四十一會歲八百九十三會月萬一千四十五小分二千一百九十六章數一百二十九小分二千一百八十三周閏大分七萬六千二百六十九曆周四十四萬七千六百一十半周天會分三萬八千一百三十四差分一萬一千九百八十六會率一千八百八十二小分法二千二百九入交限一萬一百四小周二百五十四甲子紀差率四萬九千一百七十八甲申紀差率五萬八千二百三十一甲辰紀差率六萬七千二百八十四通周十六萬七千六十三周日日餘三千三百六十二周虛二千七百一五星約法據出見以為正不繫於元本然則算步究於元初約法施於今用曲求其趣則各有宜故作者兩設其法也岌以月蝕檢日宿度所在為曆術者宗焉又著渾天論以步日於黃道駁前儒之失并得其中矣
