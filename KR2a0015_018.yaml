body:
  text: 晉書卷十八志第八律曆下魏尚書郎楊偉表曰臣覽載籍斷考曆數時以紀農月以紀事其所由來遐而尚矣乃自少昊則玄鳥司分顓頊帝嚳則重黎司天唐帝虞舜則羲和掌日三代因之則世有日官日官司曆則頒之諸侯諸侯受之則頒于境內夏后之世羲和湎淫廢時亂日則書載胤征由此觀之審農時而重人事歷代然之也逮至周室既衰戰國橫騖告朔之羊廢而不紹登臺之禮滅而不遵閏分乖次而不識孟陬失紀而莫悟大火猶西流而怪蟄蟲之不藏也是時也天子不協時司曆不書日諸侯不受職日御不分朔人事不恤廢棄農時仲尼之撥亂於春秋託褒貶糾正司曆失閏則譏而書之登臺頒朔則謂之有禮自此以降暨于秦漢乃復以孟冬為歲首閏為後九月中節乖錯時月紕繆加時後天蝕不在朔纍載相襲久而不革也至武帝元封七年始乃悟其繆焉於是改正朔更曆數使大才通人更造太初曆校中朔所差以正閏分課中星得度以考疏密以建寅之月為正朔以黃鍾之月為曆初其曆斗分太多後遂疏闊至元和二年復用四分曆施而行之至于今日考察日蝕率常在晦是則斗分太多故先密後疏而不可用也是以臣前以制典餘日推考天路稽之前典驗之以蝕朔詳而精之更建密曆則不先不後古今中天以昔在唐帝協日正時允釐百工咸熙庶績也欲使當今國之典禮凡百制度皆韜合往古郁然備足乃改正朔更曆數以大呂之月為歲首以建子之月為曆初臣以為昔在帝代則法曰顓頊曩自軒轅則曆曰黃帝暨至漢之孝武革正朔更曆數改元曰太初因名太初曆今改元為景初宜曰景初曆臣之所建景初曆法數則約要施用則近密治之則省功學之則易知雖復使研桑心算隸首運籌重黎司晷羲和察景以考天路步驗日月究極精微盡術數之極者皆未能並臣如此之妙也是以纍代曆數皆疏而不密自黃帝以來常改革不已壬辰元以來至景初元年丁巳歲積四千四十六算上此元以天正建子黃鍾之月為曆初元首之歲夜半甲子朔旦冬至元法萬一千五十八紀法千八百四十三紀月二萬二千七百九十五章歲十九章月二百三十五章閏七通數十三萬四千六百三十日法四千五百五十九餘數九千六百七十周天六十七萬三千一百五十紀歲中十二氣法十二沒分六萬七千三百一十五沒法九百六十七月周二萬四千六百三十八通法四十七會通七十九萬百一十朔望合數六萬七千三百一十五入交限數七十二萬二千七百九十五通周十二萬五千六百二十一周日日餘二千五百二十八周虛二千三十一斗分四百五十五甲子紀第一紀首合朔月在日道𩹉交會差率四十一萬二千九百一十九遲疾差率十萬三千九百四十七甲戌紀第二紀首合朔月在日道𩹉交會差率五十一萬六千五百二十九遲疾差率七萬三千七百六十七甲申紀第三紀首合朔月在日道𩹉交會差率六十二萬一百三十九遲疾差率四萬三千五百八十七甲午紀第四紀首合朔月在日道𩹉交會差率七十二萬三千七百四十九遲疾差率一萬三千四百七甲辰紀第五紀首合朔月在日道𩹉交會差率三萬七千二百四十九遲疾差率十萬八千八百四十八甲寅紀第六紀首合朔月在日道𩹉交會差率十四萬八百五十九遲疾差率七萬八千六百六十八交會紀差十萬三千六百一十求其數之所生者置一紀積月以通數乘之會通去之所去之餘紀差之數也以之轉加前紀則得後紀加之未滿會通者則紀首之歲天正合朔月在日道𩹉滿去之則月在日道表加表滿在𩹉加𩹉滿在表遲疾紀差三萬一百八十求其數之所生者置一紀積月以通數乘之通周去之餘以減通周所減之餘紀差之數也以之轉減前紀則得後紀不足減者加通周求次元紀差率轉減前元甲寅紀差率餘則次元甲子紀差率也求次紀如上法也推朔積月術曰置壬辰元以來盡所求年外所求以紀法除之所得算外所入紀第也餘則入紀年數也以章月乘之如章歲而一為積月不盡為閏餘閏餘十二以上其年有閏閏月以無中氣為正推朔術曰以通數乘積月為朔積分如日法而一為積日不盡為小餘以六十去積日餘為大餘大餘命以紀算外所求年天正十一月朔日也求次月加大餘二十九小餘二千四百一十九小餘滿日法從大餘命如前次月朔日也小餘二千一百四十以上其月大也推弦望加朔大餘七小餘千七百四十四小分一小分滿二從小餘小餘滿日法從大餘大餘滿六十去之餘命以紀算外上弦日也又加得望下弦後月朔其月蝕望者定小餘如在中節者定小餘如所近中節間限數限數以下者算上為日望在中節前後各四日以還者視限數望在中節前後各五日以上者視間限推二十四氣術曰置所入紀年外所求以餘數乘之滿紀法為大餘不盡為小餘大餘滿六十去之餘命以紀算外天正十一月冬至日也求次氣加大餘十五小餘四百二小分十一小分滿氣法從小餘小餘滿紀法從大餘命如前次氣日也推閏月術曰以閏餘減章歲餘以歲中乘之滿章閏得一月餘滿半法以上亦得一月數從天正十一月起算外閏月也閏有進退以無中氣御之大雪十一月節限數千二百四十二間限千二百四十八冬至十一月中限數千二百五十四間限千二百四十五小寒十二月節限數千二百三十五間限千二百二十四大寒十二月中限數千二百一十三間限千一百九十二立春正月節限數千一百七十二間限千一百四十七雨水正月中限數千一百二十二間限千九十三驚蟄二月節限數千六十五間限千三十六春分二月中限數千八間限九百七十九清明三月節限數九百五十一間限九百二十五穀雨三月中限數九百間限八百七十九立夏四月節限數八百五十七間限八百四十小滿四月中限數八百二十三間限八百一十二芒種五月節限數八百間限七百九十九夏至五月中限數七百九十八間限八百一小暑六月節限數八百五間限八百一十五大暑六月中限數八百二十五間限八百四十二立秋七月節限數八百五十九間限八百八十三處暑七月中限數九百七間限九百三十五白露八月節限數九百六十二間限九百九十二秋分八月中限數千二十一間限千五十一寒露九月節限數千八十間限千一百七霜降九月中限數千一百三十三間限千一百五十七立冬十月節限數千一百八十一間限千一百九十八小雪十月中限數千二百一十五間限千二百二十九推沒滅術曰因冬至積日有小餘者加積一以沒分乘之以沒法除之所得為大餘不盡為小餘大餘滿六十去之餘命以紀算外即去年冬至後沒日也求次沒加大餘六十九小餘五百九十二小餘滿沒法得一從大餘命如前小餘盡為滅也推五行用事日立春立夏立秋立冬者即木火金水始用事日也各減其大餘十八小餘四百八十三小分六餘命以紀算外各四立之前土用事日也大餘不足減者加六十小餘不足減者減大餘一加紀法小分不足減者滅小餘一加氣法推卦用事日因冬至大餘六其小餘即坎卦用事日也加小餘萬九十一滿元法從大餘即中孚用事日也求次卦各加大餘六小餘九百六十七其四正各因其中日六其小餘推日度術曰以紀法乘朔積日滿周天去之餘以紀法除之所得為度不盡為分命度從牛前五起宿次除之不滿宿則天正十一月朔夜半日所在度及分也求次日日加一度分不加經斗除斗分分少退一度推月度術曰以月周乘朔積日滿周天去之餘以紀法除之所得為度不盡為分命如上法則天正十一月朔夜半月所在度及分也求次月小月加度二十二分八百六大月又加一日度十三分六百七十九分滿紀法得一度則次月朔夜半月所在度及分也其冬下旬月在張心署之推合朔度術曰以章歲乘朔小餘滿通法為大分不盡為小分以大分從朔夜半日度分分滿紀法從度命如前則天正十一月合朔日月所共合度也求次月加度二十九大分九百七十七小分四十二小分滿通法從大分大分滿紀法從度經斗除其分則次月合朔日月所共合度也推弦望日所在度加合朔度七大分七百五小分十微分一微分滿二從小分小分滿通法從大分大分滿紀法從度命如前則上弦日所在度也又加得望下弦後月合也推弦望月所在度加合朔度九十八大分千二百七十九小分三十四數滿命如前即上弦月所在度也又加得望下弦後月合也推日月昏明度術曰日以紀法月以月周乘所近節氣夜漏二百而一為明分日以減紀法月以減月周餘為昏分各以分加夜半如法為度推合朔交會月蝕術曰置所入紀朔積分以所入紀下交會差率之數加之以會通去之餘則所求年天正十一月合朔去交度分也以通數加之滿會通去之餘則次月合朔去交度分也以朔望合數各加其月合朔去交度分滿會通去之餘則各其月望去交度分也朔望去交分如朔望合數以下入交限數以上者朔則交會望則月蝕推合朔交會月蝕月在日道表𩹉術曰置所入紀朔積分以所入紀下交會差率之數加之倍會通去之餘不滿會通者紀首表天正合朔月在表紀首𩹉天正合朔月在𩹉滿會通去之表滿在𩹉𩹉滿在表求次月以通數加之滿會通去之加𩹉滿在表加表滿在𩹉先交會後月蝕者朔在表則望在表朔在𩹉則望在𩹉先月蝕後交會者看蝕月朔在𩹉則望在表朔在表則望在𩹉交會月蝕如朔望合數以下則前交後會如入交限數以上則前會後交其前交後會近於限數者則豫伺之前會後交近於限數者則後伺之求去交度術曰其前交後會者今去交度分如日法而一所得則却去交度分也其前會後交者以去交度分減會通餘如日法而一所得則前去交度也餘皆度分也去交度十五以上雖交不蝕也十以下是蝕十以上虧蝕微少光晷相及而已虧之多少以十五為法求日蝕虧起角術曰其月在外道先交後會者虧蝕西南角起先會後交者虧蝕東南角起其月在內道先交後會者虧蝕西北角起先會後交者虧蝕東北角起虧蝕分多少如上以十五為法會交中者蝕盡月蝕在日之衝虧角與上反也月行遲疾度損益率盈縮積分月行分一日十四度十四分益二十六盈初二百八十二日十四度十一分益二十三盈積分一十一萬八千五百三十四二百七十七三日十四度八分益二十盈積分二十二萬三千三百九十一二百七十四四日十四度五分益十七盈積分三十一萬四千五百七十一二百七十一五日十四度一分益十三盈積分三十九萬二千七十四二百六十七六日十三度十四分益七盈積分四十五萬一千三百四十一二百六十一七日十三度七分損盈積分四十八萬三千二百五十四二百五十四八日十三度一分損六盈積分四十八萬三千二百五十四二百四十八九日十二度十六分損十盈積分四十五萬五千九百二百四十四十日十二度十三分損十三盈積分四十一萬三百一十二百四十一十一日十二度十一分損十五盈積分三十五萬一千四十三二百三十九十二日十二度八分損十八盈積分二十八萬二千六百五十八二百三十六十三日十二度五分損二十一盈積分二十萬五百九十六二百三十三十四日十二度三分損二十三盈積分十萬四千八百五十七二百三十一十五日十二度五分益二十一縮初二百三十三十六日十二度七分益十九縮積分九萬五千七百三十九二百三十五十七日十二度九分益十七縮積分十八萬二千三百六十二百三十七十八日十二度十二分益十四縮積分二十五萬九千八百六十三