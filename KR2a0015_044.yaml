body:
  text: 晉書卷四十四列傳第十四鄭袤子默默子球鄭袤字林叔滎陽開封人也高祖衆漢大司農父泰揚州刺史有高名袤少孤早有識鑒荀攸見之曰鄭公業為不亡矣隨叔父渾避難江東時華歆為豫章太守渾往依之歆素與泰善撫養袤如己子年十七乃還鄉里性清正時濟陰魏諷為相國掾名重當世袤同郡任覽與結交袤以諷姦雄終必為禍勸覽遠之及諷敗論者稱焉魏武帝初封諸子為侯精選賓友袤與徐幹俱為臨淄侯文學轉司隸功曹從事司空王朗辟為掾袤舉高陽許允扶風魯芝東萊王基朗皆命之後咸至大位有重名袤遷尚書郎出為黎陽令吏民悅服太守班下屬城特見甄異為諸縣之最遷尚書右丞轉濟陰太守下車旌表孝悌敬禮賢能興立庠序開誘後進調補大將軍從事中郎拜散騎常侍會廣平太守缺宣帝謂袤曰賢叔大匠垂稱於陽平魏郡百姓蒙惠化且盧子家王子雍繼踵此郡使世不乏賢故復相屈袤在廣平以德化為先善作條教郡中愛之徵拜侍中百姓戀慕涕泣路隅遷少府高貴鄉公即位袤與河南尹王肅備法駕奉迎于元城封廣昌亭侯徙光祿勳領宗正毋丘儉作亂景帝自出征之百官祖送于城東袤疾病不任會帝謂中領軍王肅曰唯不見鄭光祿為恨肅以語袤袤自輿追帝及於近道帝笑曰故知侯生必來也遂與袤共載曰計將何先袤曰昔與儉俱為臺郎特所知悉其人好謀而不達事情自昔建勳幽州志望無限文欽勇而無算今大軍出其不意江淮之卒鋭而不能固深溝高壘以挫其氣此亞夫之長也帝稱善轉太常高貴鄉公議立明堂辟雍精選博士袤舉劉毅劉實程咸庾峻後並至公輔大位及常道鄉公立與議定策進封安城鄉侯邑千戶景元初疾病失明屢乞骸骨不許拜光祿大夫五等初建封密陵伯武帝踐阼進爵為侯雖寢疾十餘年而時賢並相推薦泰始中詔曰光祿密陵侯袤履行純正守道沖粹退有清和之風進有素絲之節宜登三階之曜補袞職之闕今以袤為司空天子臨軒遣五官中郎將國坦就第拜授袤前後辭讓遣息稱上送印綬至于十數謂坦曰魏以徐景山為司空吾時為侍中受詔譬旨徐公語吾曰三公當上應天心苟非其人實傷和氣不敢以垂死之年纍辱朝廷也終於不就遵大雅君子之迹可不務乎固辭久之見許以侯就第拜儀同三司置舍人官騎賜牀帳簟褥錢五十萬九年薨時年八十五帝於東堂發哀賜祕器朝服一具衣一襲錢三十萬絹布各百匹以供喪事諡曰元有子六人長子默嗣次質舒詡稱豫位並列卿默字思元起家祕書郎考核舊文刪省浮穢中書令虞松謂曰而今而後朱紫別矣轉尚書考功郎專典伐蜀事封關內侯遷司徒左長史武帝受禪與太原郭奕俱為中庶子朝廷以太子官屬宜稱陪臣默上言皇太子體皇極之尊無私於天下宮臣皆受命天朝不得同之藩國事遂施行出為東郡太守值歲荒人飢默輒開倉振給乃舍都亭自表待罪朝廷嘉默憂國詔書褒歎比之汲黯班告天下若郡縣有此比者皆聽出給入為散騎常侍初帝以貴公子當品鄉里莫敢與為輩求之州內于是十二郡中正僉共舉默文帝與袤書曰小兒得廁賢子之流愧有竊賢之纍及武帝出祀南郊詔使默驂乘因謂默曰卿知何以得驂乘乎昔州里舉卿相輩常愧有纍清談遂問政事對曰勸穡務農為國之基選人得才濟世之道居官久職政事之宜明慎黜陟勸戒之由崇尚儒素化導之本如此而已矣帝善之後以父喪去官尋起為廷尉是時鬲令袁毅坐交通貨賂大興刑獄在朝多見引逮唯默兄弟以潔慎不染其流遷太常時僕射山濤欲舉一親親為博士謂默曰卿似尹翁歸令吾不敢復言默為人敦重柔而能整皆此類也及齊王攸當之國下禮官議崇錫典制博士祭酒曹志等並立異議默容過其事坐免尋拜大鴻臚遭母喪舊制既葬還職默自陳懇至久而見許遂改法定令聽大臣終喪自默始也服闋為大司農轉光祿勳太康元年卒時年六十八諡曰成尚書令衛瓘奏默才行名望宜居論道五升九卿位未稱德宜贈三司而后父楊駿先欲以女妻默子豫默曰吾每讀雋不疑傳常想其人畏遠權貴奕世所守遂辭之駿深為恨至此駿議不同遂不施行默寬沖博愛謙虛溫謹不以才地矜物事上以禮遇下以和雖僮豎厮養不加聲色而猶有嫌怨故士君子以為居世之難子球球字子瑜少辟宰府入侍二宮成都王為大將軍起義討趙王倫球自頓丘太守為右長史以功封平壽公纍遷侍中尚書散騎常侍中護軍尚書右僕射領吏部永嘉二年卒追贈金紫光祿大夫諡曰元球弟豫永嘉末為尚書李胤李胤字宣伯遼東襄平人也祖敏漢河內太守去官還鄉里遼東太守公孫度欲強用之敏乘輕舟浮滄海莫知所終胤父信追求積年浮海出塞竟無所見欲行喪制服則疑父尚存情若居喪而不聘娶後有鄰居故人與其父同年者亡因行喪制服燕國徐邈與之同州里以不孝莫大於無後勸使娶妻既生胤遂絶房室如居喪禮不堪其憂數年而卒胤既幼孤母又改行有識之後降食哀戚亦以喪禮自居又以祖不知存亡設木主以事之由是以孝聞容貌質素穨然若不足者而知度沈邃言必有則初仕郡上計掾州辟部從事治中舉孝廉參鎮北軍事遷樂平侯相政尚清簡入為尚書郎遷中護軍司馬吏部郎銓綜廉平賜爵關中侯出補安豐太守文帝引為大將軍從事中郎遷御史中丞恭恪直繩百官憚之伐蜀之役為西中郎將督關中諸軍事後為河南尹封廣陸伯泰始初拜尚書進爵為侯胤奏以為古者三公坐而論道內參六官之事外與六卿之教或處三槐兼聽獄訟稽疑之典謀及卿士陛下聖德欽明垂心萬機猥發明詔儀刑古式雖唐虞疇咨周文翼翼無以加也自今以往國有大政可親延羣公詢納讜言其軍國所疑延詣省中使侍中尚書咨論所宜若有疾疢不任覲會臨時遣侍臣訊訪詔從之遷吏部尚書僕射尋轉太子少傅詔以胤忠允高亮有匪躬之節使領司隸校尉胤屢自表讓忝傅儲宮不宜兼監司之官武帝以二職並須忠賢故每不許咸寧初皇太子出居東宮帝以司隸事任峻重而少傅有旦夕輔導之務胤素羸不宜久勞之轉拜侍中加特進俄遷尚書令侍中特進如故胤雖歷職內外而家至貧儉兒病無以市藥帝聞之賜錢十萬其後帝以司徒舊丞相之職詔以胤為司徒在位五年簡亮持重稱為任職以吳會初平大臣多有勳勞宜有登進乃上疏遜位帝不聽遣侍中宣旨優詔敦諭絶其章表胤不得已起視事太康三年薨詔遣御史持節監喪致祠諡曰成皇太子命舍人王贊誄之文義甚美帝後思胤清節詔曰故司徒李胤太常彭灌並履忠清儉身沒家無餘積賜胤家錢二百萬穀千斛灌家半之三子固真長修固字萬基散騎郎先胤卒固子志嗣爵志字彥道歷位散騎侍郎建威將軍陽平太守真長位至太僕卿修黃門侍郎太弟中庶子盧欽子浮弟珽珽子志志子諶盧欽字子若范陽涿人也祖植漢侍中父育魏司空世以儒業顯欽清淡有遠識篤志經史舉孝廉不行魏大將軍曹爽辟為掾爽弟嘗有所屬請欽白爽子弟不宜干犯法度爽深納之而罰其弟除尚書郎爽誅免官後為侍御史襲父爵大利亭侯纍遷琅邪太守宣帝為太傅辟從事中郎出為陽平太守遷淮北都督伏波將軍甚有稱績徵拜散騎常侍大司農遷吏部尚書進封大梁侯武帝受禪以為都督沔北諸軍事平南將軍假節給追鋒軺臥車各一乘第二駙馬二乘騎具刀器御府人馬鎧等及錢三十萬欽在鎮寬猛得中疆埸無虞入為尚書僕射加侍中奉車都尉領吏部以清貧特賜絹百匹欽舉必以材稱為廉平咸寧四年卒詔曰欽履道清正執德貞素文武之稱著于方夏入躋機衡惟允庶事肆勤內外有匪躬之節不幸薨沒朕甚悼之其贈衛將軍開府儀同三司賜祕器朝服一具衣一襲布五十匹錢三十萬諡曰元又以欽忠清高潔不營産業身沒之後家無所庇特賜錢五十萬為立第舍復下詔曰故司空王基衛將軍盧欽領典軍將軍楊囂並素清貧身沒之後居無私積頃者飢饉聞其家大匱其各賜穀三百斛欽歷宰州郡不尚功名唯以平理為務祿俸散之親故不營資産動循禮典妻亡制廬杖終喪居外所著詩賦論難數十篇名曰小道子浮嗣浮字子雲起家太子舍人病疽截手遂廢然朝廷器重之以為國子博士祭酒祕書監皆不就欽弟珽字子笏衛尉卿珽子志志字子道初辟公府掾尚書郎出為鄴令成都王穎之鎮鄴也愛其才量委以心膂遂為謀主齊王冏起義遣使告穎穎召志計事志曰趙王無道肆行篡逆四海人神莫不憤怒今殿下總率三軍應期電發子來之衆不召自至掃夷凶逆必有征無戰然兵事至重聖人所慎宜旌賢任才以收時望穎深然之改選上佐高辟掾屬以志為咨議參軍仍補左長史專掌文翰穎前鋒都督趙驤為倫所敗士衆震駭議者多欲還保朝歌志曰今我軍失利敵新得勝必有輕易陵轢之情若頓兵不進三軍畏衄懼不可用且戰何能無勝負宜更選精兵星行倍道出賊不意此用兵之奇也穎從之及倫敗志勸穎曰齊王衆號百萬與張泓等相持不能決大王徑得濟河此之大勳莫之與比而齊王今當與大王共輔朝政志聞兩雄不俱處功名不並立今宜因太妃微疾求還定省推崇齊王徐結四海之心此計之上也穎納之遂以母疾還藩委重於冏由是穎獲四海之譽天下歸心朝廷封志為武強侯加散騎常侍及河間王顒納李含之説欲內除二王樹穎儲副遣報穎穎將應之志正諫不從及冏滅穎遙執朝權遂懷觖望之心以長沙王在內不得恣其所欲密欲去時荊州有張昌之亂穎表求親征朝廷許之會昌等平乃回兵以討志諫曰公前有復皇祚之大勳及事平歸功於齊辭九錫之賞不當朝政之權振陽翟飢人葬黃橋白骨皆盛德之事四海之人莫不荷賴矣逆寇縱肆猾擾荊楚今公掃清羣難南土以寧振旅而旋頓軍關外文服入朝此霸王者之事也穎不納及死穎表志為中書監留鄴參署相府事乘輿敗於蕩陰穎遣志督兵迎帝及王浚攻鄴志勸穎奉天子還洛陽時甲士尚萬五千人志夜部分至曉衆皆成列而程太妃戀鄴不欲去穎未能決俄而衆潰唯志與子謐兄子綝殿中武賁千人而已志復勸穎早發時有道士姓黃號曰聖人太妃信之及使呼入道士求兩杯酒飲訖拋杯而去於是志計始決而人馬復散志於營陳間尋索得數乘鹿車司馬督韓玄收集黃門得百餘人志入帝問志曰何故散敗至此志曰賊去鄴尚八十里而人士一朝駭散太弟今欲奉陛下還洛陽帝曰甚佳於是御犢車便發屯騎校尉郝昌先領兵八千守洛陽帝召之至汲郡而昌至兵仗甚盛志喜於復振啓天子宜下赦書與百姓同其休慶既達洛陽志啓以滿奮為司隸校尉奔散者多還百官粗備帝悅賜志絹二百匹綿百斤衣一襲鶴綾袍一領初河間王顒聞王浚起兵遣右將軍張方救鄴方聞成都軍敗頓兵洛陽不敢進縱兵虜掠密欲遷都長安將焚宗廟宮室以絶人心志説方曰昔董卓無道焚燒洛陽怨毒之聲百年猶存何為襲之乃止方遂逼天子幸其壘帝垂泣就輿唯志侍側曰陛下今日之事當一從右將軍臣駑怯無所云補唯知盡微誠不離左右而已停方壘三日便西志復從至長安穎被黜志亦免官及東海王越奉迎大駕顒啓帝復穎還鄴以志為魏郡太守加左將軍隨穎北鎮行達洛陽而平昌公模遣前鋒督護馮嵩距穎穎還長安未至而聞顒斬張方求和於越穎住華陰志進長安詣闕陳謝即還就穎于武關奔南陽復為劉陶所驅回詣河北及穎薨官屬奔散唯志親自殯送時人嘉之越命志為軍咨祭酒遷衛尉永嘉末轉尚書洛陽沒志將妻子北投并州刺史劉琨至陽邑為劉粲所虜與次子謐詵等俱遇害于平陽長子諶諶字子諒清敏有理思好老莊善屬文選尚武帝女滎陽公主拜駙馬都尉未成禮而公主卒後州舉秀才辟太尉掾洛陽沒隨志北依劉琨與志俱為劉粲所虜粲據晉陽留諶為參軍琨收散卒引猗盧騎還攻粲粲敗走諶得赴琨先父母兄弟在平陽者悉為劉聰所害琨為司空以諶為主簿轉從事中郎琨妻即諶之從母既加親愛又重其才地建興末隨琨投段匹磾匹磾自領幽州取諶為別駕匹磾既害琨尋亦敗喪時南路阻絶段末波在遼西諶往投之元帝之初末波通使于江左諶因其使抗表理琨文旨甚切於是即加弔祭纍徵諶為散騎中書侍郎而為末波所留遂不得南渡末波死弟遼代立諶流離世故且二十載石季龍破遼西復為季龍所得以為中書侍郎國子祭酒侍中中書監屬冉閔誅石氏諶隨閔軍于襄國遇害時年六十七是歲永和六年也諶名家子早有聲譽才高行潔為一時所推值中原喪亂與清河崔悅潁川荀綽河東裴憲北地傅暢並淪陷非所雖俱顯于石氏以為辱諶每謂諸子曰吾身沒之後但稱晉司空從事中郎爾撰祭法注莊子及文集皆行於世悅字道儒魏司空林曾孫劉琨妻之姪也與諶俱為琨司空從事中郎後為末波佐史沒石氏亦居大官其綽憲暢並別有傳華表子廙廙子廙弟嶠華表字偉容平原高唐人也父歆清德高行為魏太尉表年二十拜散騎黃門郎纍遷侍中正元初石苞來朝盛稱高貴鄉公以為魏武更生時聞者流汗沾背表懼禍作頻稱疾歸下舍故免于大難後遷尚書五等建封觀陽伯坐供給喪事不整免泰始中拜太子少傅轉光祿勳遷太常卿數歲以老病乞骸骨詔曰表清貞履素有老成之美久幹王事靜恭匪懈而以疾固辭章表懇至今聽如所上以為太中大夫賜錢二十萬牀帳褥席祿賜與卿同門施行馬表以苦節垂名司徒李胤司隸王宏等並歎美表清淡退靜以為不可得貴賤而親疏也咸寧元年八月卒時年七十二諡曰康詔賜朝服有六子廙岑嶠鑒淡簡廙字長駿弘敏有才義妻父盧育典選難舉姻親故廙年三十五不得調晚為中書通事郎泰始初遷冗從僕射少為武帝所禮歷黃門侍郎散騎常侍前軍將軍侍中南中郎將都督河北諸軍事父疾篤輒還仍遭喪舊例葬訖復任廙固辭忤旨初表有賜客在鬲使廙因縣令袁毅録名三客各代以奴及毅以貨賕致罪獄辭迷謬不復顯以奴代客直言送三奴與廙而毅亦盧氏壻也又中書監荀勗先為中子求廙女廙不許為恨因密啓帝以袁毅貨賕者多不可盡罪宜責最所親者一人因指廙當之又緣廙有違忤之咎遂于喪服中免廙官削爵土大鴻臚何遵奏廙免為庶人不應襲封請以表世孫混嗣表有司奏曰廙所坐除名削爵一時之制廙為世子著在名簿不聽襲嗣此為刑罰再加諸侯犯法八議平處者褒功重爵也嫡統非犯終身棄罪廢之為重依律應聽襲封詔曰諸侯薨子踰年即位此古制也應即位而廢之爵命皆去矣何為罪罰再加且吾之責廙以肅貪穢本不論常法也諸賢不能將明此意乃更詭易禮律不顧憲度君命廢之而羣下復之此為上下正相反也於是有司奏免議者官詔皆以贖論混以世孫當受封逃避斷髮陽狂病瘖不能語故得不拜世咸稱之廙棲遲家巷垂十載教誨子孫講誦經典集經書要事名曰善文行于世與陳協共造豬闌於宅側帝嘗出視之問其故左右以實對帝心憐之帝後又登陵雲臺望見廙苜蓿園阡陌甚整依然感舊太康初大赦乃得襲封久之拜城門校尉遷左衛將軍數年以為中書監惠帝即位加侍中光祿大夫尚書令進爵為公廙應楊駿召不時還有司奏免官尋遷太子少傅加散騎常侍動遵禮典得傅導之義後年衰病篤詔遣太醫療病進位光祿大夫開府儀同三司時河南尹韓壽因託賈后求以女配廙孫陶廙距而不許后深以為恨故遂不登台司年七十五卒諡曰元三子混薈混字敬倫嗣父爵清貞簡正歷位侍中尚書卒官子陶嗣補鞏令沒於石勒薈字敬叔為河南尹與荀藩荀組俱避賊至臨潁父子並遇害字敬則博學以清素為稱尚武帝女滎陽長公主拜駙馬都尉元康初東宮建以選為太子賓友賜爵關內侯食邑百戶辟司徒王渾倉曹掾屬除散騎侍郎纍遷散騎常侍北軍中候俄拜領軍加散騎常侍愍帝即位以為尚書進爵苑陵縣公頃之劉聰逼長安詔出為鎮軍將軍領潁川太守以為外援興合義軍得二千人未及西赴而關中陷沒時羣賊方盛所在州郡相繼奔敗亦欲棄郡東渡而從兄軼為元帝所誅以此為疑先書與驃騎將軍王導導言於帝帝曰兄弟罪不相及況羣從乎即召補光祿勳到未及拜更以為衛將軍加散騎常侍本州大中正尋拜太常議立郊祀尚書刁協國子祭酒杜彝議須還洛乃修郊祀議漢獻帝居許即便郊祡宜於此修立司徒荀組驃騎將軍王導同議遂定郊祀尋以疾求解詔曰太常職主宗廟蒸嘗敬重而華所疾不堪親奉職事夫子稱吾不與祭如不祭況宗伯之任職所司邪今轉為廷尉頃之加特進太寧初遷驃騎將軍加散騎常侍督石頭水陸諸軍事王敦表轉為護軍疾病不拜授金紫光祿大夫又領太子太保成帝即位加散騎常侍領國子祭酒咸和初以愍帝時賜爵進封一皆削除更以討王敦功封苑陵縣侯復領太常蘇峻之亂侍帝左右從至石頭備履艱危困悴踰年初為州大中正鄉人任讓輕薄無行為所黜及讓在峻軍中任勢多所殺害見輒恭敬不肆其虐鍾雅劉超之死亦將及讓盡心救衛故得免及帝加元服又將納后寇難之後典籍靡遺婚冠之禮無所依據推尋舊典撰定禮儀并郊廟辟雍朝廷軌則事並施用遷左光祿大夫開府常侍如故固讓未拜會卒時年六十九册贈侍中左光祿大夫開府諡曰敬清恪儉素雖居顯列常布衣蔬食年老彌篤死之日家無餘財唯有書數百卷時人以此貴之子俊嗣為尚書郎俊子仰之大長秋嶠字叔駿才學深博少有令聞文帝為大將軍辟為掾屬補尚書郎轉車騎從事中郎泰始初賜爵關內侯遷太子中庶子出為安平太守辭親老不行更拜散騎常侍典中書著作領國子博士遷侍中太康末武帝頗親宴樂又多疾病屬小瘳嶠與侍臣表賀因微諫曰伏惟聖體漸就平和上下同慶不覺抃舞臣等愚戇竊有微懷以為收功於所忽事乃無悔慮福於垂成祚乃日新唯願陛下深垂聖明遠思所忽之悔以成日新之福沖靜和氣嗇養精神頤身於清簡之宇留心於虛曠之域無厭世俗常戒以忽羣下之言則豐慶日延天下幸甚帝手詔報曰輒自消息無所為慮元康初封宣昌亭侯誅楊駿改封樂鄉侯遷尚書後以嶠博聞多識屬書典實有良史之志轉祕書監加散騎常侍班同中書寺為內臺中書散騎著作及治禮音律天文數術南省文章門下撰集皆典統之初嶠以漢紀煩穢慨然有改作之意會為臺郎典官制事由是得遍觀祕籍遂就其緒起于光武終于孝獻一百九十五年為帝紀十二卷皇后紀二卷十典十卷傳七十卷及三譜序傳目録凡九十七卷嶠以皇后配天作合前史作外戚傳以繼末編非其義也故易為皇后紀以次帝紀又改志為典以有堯典故也而改名漢後書奏之詔朝臣會議時中書監荀勗令和嶠太常張華侍中王濟咸以嶠文質事核有遷固之規實録之風藏之祕府後太尉汝南王亮司空衛瓘為東宮傅列上通講事遂施行嶠所著論議難駁詩賦之屬數十萬言其所奏官制太子宜還宮及安邊雩祭明堂辟雍浚導河渠巡禹之舊迹置都水官修蠶宮之禮置長秋事多施行元康三年卒追贈少府諡曰簡嶠性嗜酒率常沈醉所撰書十典未成而終祕書監何劭奏嶠中子徹為佐著作郎使踵成之未竟而卒後監繆徵又奏嶠少子暢為佐著作郎克成十典并草魏晉紀傳與著作郎張載等俱在史官永嘉喪亂經籍遺沒嶠書存者三十餘卷嶠有三子頤徹暢頤嗣官至長樂內史暢有才思所著文章數萬言遭寇亂避難荊州為賊所害時年四十石鑒石鑒字林伯樂陵厭次人也出自寒素雅志公亮仕魏歷尚書郎侍御史尚書左丞御史中丞多所糾正朝廷憚之出為并州刺史假節護胸奴中郎將武帝受禪封堂陽子入為司隸校尉轉尚書時秦涼為虜所敗遣鑒都督隴右諸軍事坐論功虛偽免官後為鎮南將軍豫州刺史坐討吳賊虛張首級詔曰昔雲中守魏尚以斬首不實受刑武牙將軍田順以詐增虜獲自殺誣罔敗法古今所疾鑒備大臣吾所取信往者西事公欺朝廷以敗為得竟不推究中間黜免未久尋復授用冀能補過而乃與下同詐所謂大臣義得爾乎有司奏是也顧未忍耳今遣歸田里終身不得復用勿削爵土也久之拜光祿勳復為司隸校尉稍加特進遷右光祿大夫開府領司徒前代三公册拜皆設小會所以崇宰輔之制也自魏末已後廢不復行至鑒有詔令會遂以為常太康末拜司空領太子太傅武帝崩鑒與中護軍張劭監統山陵時大司馬汝南王亮為太傅楊駿所疑不敢臨喪出營城外時有告亮欲舉兵討駿駿大懼白太后令帝為手詔詔鑒及張劭使率陵兵討亮劭駿甥也便率所領催鑒速發鑒以為不然保持之遣人密覘視亮已別道還許昌於是駿止論者稱之山陵訖封昌安縣侯元康初為太尉年八十餘克壯慷慨自遇若少年時人美之尋薨諡曰元子陋字處賤襲封歷屯騎校尉溫羡溫羡字長卿太原祁人漢護羌校尉序之後也祖恢魏揚州刺史父恭濟南太守兄弟六人並知名於世號曰六龍羡少以朗寤見稱齊王攸辟為掾遷尚書郎惠帝即位拜豫州刺史入為散騎常侍纍遷書及齊王冏輔政以羡攸之故吏意特親之轉吏部尚書先是張華被誅冏建議欲復其官爵論者或以為非羡駁之曰自天子已下爭臣各有差不得歸罪於一人也故晏子曰為己死亡非其親昵誰能任之里克之殺二庶陳乞之立陽生漢朝之誅諸呂皆積年之後乃得立事未有事主見存而得行其志於數月之內者也式乾之會張華獨諫上宰不和不能承風贊善望其指麾從命不亦難乎況今皇后譖害其子內難不預禮非所在且后體齊於帝尊同皇極罪在枉子事不為逆義非所討今以華不能廢枉子之后與趙盾不討殺君之賊同而貶責之於義不經通也華竟得追復爵位其後以從駕討成都王穎有勳封大陵縣公邑千八百戶出為冀州刺史加後將軍范陽王虓敗於許昌也自牧冀州羡乃避之惠帝之幸長安以羡為中書令不就及帝還洛陽徵為中書監加散騎常侍未拜會帝崩懷帝即位遷左光祿大夫開府領司徒論者僉謂為速在位未幾病卒贈司徒諡曰元有三子祗允裕祗字敬齊太傅西曹掾允字敬咸太子舍人裕字敬嗣尚武安長公主官至左光祿大夫史臣曰晉氏中朝承纍世之資建兼并之業衣冠斯盛英彥如林此數公者或以雅望處台槐或以高名居保傅自非一時之秀亦曷能至于斯惜其參緘於論道之辰獨善於兼濟之日良圖鯁議無足多談然退己進賢林叔弘推讓之美自家刑國宣伯協恭孝之規子若之儒素為基偉容之苦節流譽慶垂來葉不亦宜哉石鑒以公亮升溫羡以明寤顯屬于危亂不隕其名歲寒見松柏之後雕斯人之謂矣贊曰讓矣密陵孝哉廣陸欽既博雅表亦貞肅鑒績克宣溫聲載穆同鏘玉振爭芬蘭郁
