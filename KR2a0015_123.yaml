body:
  text: 晉書卷一百二十三載記第二十三慕容垂慕容垂字道明皓之第五子也少岐嶷有器度身長七尺七寸手垂過膝皓甚寵之常目而謂諸弟曰此兒闊達好奇終能破人家或能成人家故名霸字道業恩遇踰于世子俊故俊不能平之以滅宇文之功封都鄉侯石季龍來伐既還猶有兼并之志遣將鄧率衆數萬屯于樂安營攻取之備垂戍徒河與相持憚而不敢侵垂少好畋遊因獵墜馬折齒慕容俊僭即王位改名外以慕郤為名內實惡而改之尋以讖記之文乃去夬以垂為名焉石季龍之死也趙魏亂垂謂俊曰時來易失赴機在速兼弱攻昧今其時矣俊以新遭大喪不許慕輿根言於俊曰王子之言千載一時不可失也俊乃從之以垂為前鋒都督俊既克幽州將坑降卒垂諫曰弔伐之義先代常典今方平中原宜綏懷以德坑戮之刑不可為王師之先聲俊從之及俊僭稱尊號封垂吳王徙鎮信都以侍中右禁將軍録留臺事大收東北之利又為征南將軍荊兗二州牧有聲於梁楚之南再為司隸僞王公已下莫不纍迹時慕容暐嗣僞位慕容恪為太宰恪甚重垂常謂暐曰吳王將相之才十倍於臣先帝以長幼之次以臣先之臣死之後願陛下委政吳王可謂親賢兼舉及敗桓溫于枋頭威名大振慕容評深忌惡之乃謀誅垂垂懼禍及己與世子全奔于苻堅自恪卒後堅密有圖暐之謀憚垂威名而未發及聞其至堅大悅郊迎執手禮之甚重堅相王猛惡垂雄略勸堅殺之堅不從以為冠軍將軍封賓都侯食華陰之五百戶王猛伐洛引全為參軍猛乃令人詭傳垂語於全曰吾已東還汝可為計也全信之乃奔暐猛表全叛狀垂懼而東奔及藍田為追騎所獲堅引見東堂慰勉之曰卿家國失和委身投朕賢子志不忘本猶懷首丘書不云乎父父子子無相及也卿何為過懼而狼狽若斯也於是復垂爵位恩待如初及堅擒暐垂隨堅入鄴收集諸子對之悲慟見其故吏有不悅之色前郎中令高弼私於垂曰大王以命世之姿遭無妄之運迍邅棲伏艱亦至矣天啓嘉會靈命暫遷此乃鴻漸之始龍變之初深願仁慈有以慰之且夫高世之略必懷遺俗之規方當網漏吞舟以弘苞養之義收納舊臣之胄以成為山之功奈何以一怒捐之竊為大王不取垂深納之垂在堅朝歷位京兆尹進封泉州侯所在征伐皆有大功堅之敗於淮南也垂軍獨全堅以千餘騎奔垂垂世子寶言於垂曰家國傾喪皇綱廢弛至尊明命著之圖籙當隆中興之業建少康之功但時來之運未至故韜光俟奮耳今天厭亂德凶衆土崩可謂乾啓神機授之于我千載一時今其會也宜恭承皇天之意因而取之且夫立大功者不顧小節行大仁者不念小惠秦既蕩覆三京竊辱神器仇恥之深莫甚於此願不以意氣微恩而忘社稷之重五木之祥今其至矣垂曰汝言是也然彼以赤心投命若何害之苟天所棄圖之多便且縱令北還更待其釁既不負宿心可以義取天下垂弟德進曰夫鄰國相吞有自來矣秦強而并燕秦弱而圖之此為報仇雪辱豈所謂負宿心也昔鄧祁侯不納三甥之言終為楚所滅吳王夫差違子胥之諫取禍句踐前事之不忘後事之師表也願不棄湯武之成蹤追韓信之敗迹乘彼土崩恭行天罰斬逆氐復宗祀建中興繼洪烈天下大機弗宜失也若釋數萬之衆授干將之柄是卻天時而待後害非至計也語曰當斷不斷反受其亂願兄無疑垂曰吾昔為太傅所不容投身於秦主又為王猛所譖復見昭亮國士之禮每深報德之分未一如使秦運必窮曆數歸我者授首之便何慮無之關西之地會非吾有自當有擾之者吾可端拱而定關東君子不怙亂不為禍先且可觀之乃以兵屬堅初寶在長安與韓黃李根等因宴摴蒱寶危坐整容誓之曰世云摴蒱有神豈虛也哉若富貴可期頻得三盧於是三擲盡盧寶拜而受賜故云五木之祥堅至澠池垂請至鄴展拜陵墓因張國威刑以安戎狄堅許之權翼諫曰垂爪牙名將所謂今之韓白世豪東夏志不為人用頃以避禍歸誠非慕德而至列土千城未可以滿其志冠軍之號豈足以稱其心且垂猶鷹也飢則附人飽便高揚遇風塵之會必有陵霄之志惟宜急其羈靽不可任其所欲堅不從遣其將李蠻閔亮尹國率衆三千送垂又遣石越戍鄴張蚝戍并州時堅子丕先在鄴及垂至丕館之于鄴西垂具說淮南敗狀會堅將苻暉告丁零翟斌聚衆謀逼洛陽丕謂垂曰翟斌兄弟因王師小失敢肆凶勃子母之軍殆難為敵非冠軍英略莫可以滅也欲相煩一行可乎垂曰下官殿下之鷹犬敢不惟命是聽於是大賜金帛一無所受惟請舊田園丕許之配垂兵二千遣其將苻飛龍率氐騎一千為垂之副丕戒飛龍曰卿王室肺腑年秩雖卑其實帥也垂為三軍之統卿為謀垂之主用兵制勝之權防微杜二之略委之於卿卿其勉之垂請入鄴城拜廟丕不許乃潛服而入亭吏禁之垂怒斬吏燒亭而去石越言於丕曰垂之在燕破國亂家及投命聖朝蒙超常之遇忽敢輕侮方鎮殺吏焚亭反形已露終為亂階將老兵疲可襲而取之矣丕曰淮南之敗衆散親離而垂侍衛聖躬誠不可忘越曰垂既不忠於燕其肯盡忠於我乎且其亡虜也主上寵同功舊不能銘澤誓忠而首謀為亂今不擊之必為後害丕不從越退而告人曰公父子好存小仁不顧天下大計吾屬終當為鮮卑虜矣垂至河內殺飛龍悉誅氐兵召募遠近衆至三萬濟河焚橋令曰吾本外假秦聲內規興復亂法者軍有常刑奉命者賞不踰日天下既定封爵有差不相負也翟斌聞垂之將濟河也遣使推垂為盟主垂距之曰吾父子寄命秦朝危而獲濟荷主上不世之恩蒙更生之惠雖曰君臣義深父子豈可因其小隙便懷二三吾本救豫州不赴君等何為斯議而及於我垂進欲襲據洛陽故見苻暉以臣節退又未審斌之誠款故以此言距之垂至洛陽暉閉門距守不與垂通斌又遣長史河南郭通說垂乃許之斌率衆會垂勸稱尊號垂曰新興侯國之正統孤之君也若以諸君之力得平關東當以大義喻秦奉迎反正無上自尊非孤心也謀于衆曰洛陽四面受敵北阻大河至於控馭燕趙非形勝之便不如北取鄴都據之而制天下衆咸以為然乃引師而東遣建威將軍王騰起浮橋于石門初垂之發鄴中子農及兄子楷紹弟子宙為苻丕所留及誅飛龍遣田生密告農等使起兵趙魏以相應於是農宙奔列人楷紹奔辟陽衆咸應之農西招庫辱官偉于上黨東引乞特歸于東阿各率衆數萬赴之衆至十餘萬丕遣石越討農為農所敗斬越于陳垂引兵至滎陽以太元八年自稱大將軍大都督燕王承制行事建元曰燕元令稱統府府置四佐王公已下稱臣凡所封拜一如王者以翟斌為建義大將軍封河南王翟檀為柱國大將軍弘農王弟德為車騎大將軍范陽王兄子楷征西大將軍太原王衆至二十餘萬濟自石門長驅攻鄴農楷紹宙等率衆會垂立子寶為燕王太子封功臣為公侯伯子男者百餘人苻丕乃遣侍郎姜讓謂垂曰往歲大駕失據君保衛鑾輿勤王誠義邁蹤前烈宜述修前規終忠貞之節奈何棄崇山之功為此過舉過貴能改先賢之嘉事也深宜詳思悟猶未晚垂謂讓曰孤受主上不世之恩故欲安全長樂公使盡衆赴京師然後修復家國之業與秦永為鄰好何故暗於機運不以鄴見歸也大義滅親況於意氣之顧公若迷而不返者孤亦欲窮兵勢耳今事已然恐單馬乞命不可得也讓厲色責垂曰將軍不容於家國投命於聖朝燕之尺土將軍豈有分乎主上與將軍風殊類別臭味不同奇將軍於一見託將軍以斷金寵踰宗舊任齊懿藩自古君臣冥契之重豈甚此邪方付將軍以六尺之孤萬里之命奈何王師小敗便有二圖夫師起無名終則弗成天之所廢人不能支將軍起無名之師而欲興天所廢竊未見其可長樂公主上之元子聲德邁于唐衛居陝東之任為朝廷維城其可束手輸將軍以百城之地大夫死王事國君死社稷將軍欲裂冠毀冕拔本塞源者自可任將軍兵勢何復多云但念將軍以七十之年懸首白旗高世之忠忽為逆鬼竊為將軍痛之垂默然左右勸垂殺之垂曰古者兵交使在其間犬各吠非其主何所問也乃遣讓歸垂上表于苻堅曰臣才非古人致禍起蕭牆身嬰時難歸命聖朝陛下恩深周漢猥叨微顧之遇位為列將爵忝通侯誓在勠力輸誠常懼不及去夏桓沖送死一擬雲消回討鄖城俘馘萬計斯誠陛下神算之奇頗亦愚臣忘死之效方將飲馬桂州懸旌閩會不圖天助亂德大駕班師陛下單馬奔臣臣奉衛匪二豈陛下聖明鑒臣單心皇天后土實亦知之臣奉詔北巡受制長樂然丕外失衆心內多猜忌令臣野次外庭不聽謁廟丁零逆豎寇逼豫州丕迫臣單赴限以師程惟給弊卒二千盡無兵杖復令飛龍潛為刺客及至洛陽平原公暉復不信納臣竊惟進無淮陰功高之慮退無李廣失利之愆懼有青蠅交亂白黑丁零夷夏以臣忠而見疑乃推臣為盟主臣受託善始不遂令終泣望西京揮涕即邁軍次石門所在雲赴雖復周武之會於孟津漢祖之集于垓下不期之衆實有甚焉欲令長樂公盡衆赴難以禮發遣而丕固守匹夫之志不達變通之理臣息農收集故營以備不虞而石越傾鄴城之衆輕相掩襲兵陳未交越已隕首臣既單車懸軫歸者如雲斯實天符非臣之力且鄴者臣國舊都應即惠及然後西面受制永守東藩上成陛下遇臣之意下全愚臣感報之誠今進師圍鄴并喻丕以天時人事而丕不察機運杜門自守時出挑戰鋒戈屢交恐飛矢誤中以傷陛下天性之念臣之此誠未簡神聽輒遏兵止鋭不敢窮攻夫運有推移去來常事惟陛下察之堅報曰朕以不德忝承靈命君臨萬邦三十年矣遐方幽裔莫不來庭惟東南一隅敢違王命朕爰奮六師恭行天罰而玄機不弔王師敗績賴卿忠誠之至輔翼朕躬社稷之不隕卿之力也詩云中心藏之何日忘之方任卿以元相爵卿以郡侯庶弘濟艱難敬酬勳烈何圖伯夷忽毀冰操柳惠倏為淫夫覽表惋然有慚朝士卿既不容於本朝匹馬而投命朕則寵卿以將位禮卿以上賓任同舊臣爵齊勳輔歃血斷金披心相付謂卿食椹懷音保之偕老豈意畜水覆舟養獸反害悔之噬臍將何所及誕言駭衆誇擬非常周武之事豈卿庸人所可論哉失籠之鳥非羅所羈脫網之鯨豈罟所制翹陸任懷何須聞也念卿垂老老而為賊生為叛臣死為逆鬼侏張幽顯布毒存亡中原士女何痛如之朕之曆運興喪豈復由卿但長樂平原以未立之年遇卿於兩都慮其經略未稱朕心所恨者此焉而已垂攻拔鄴郛丕固守中城垂塹而圍之分遣老弱於魏郡肥鄉築新興城以置輜重擁漳水以灌之翟斌潛諷丁零及西人請斌為尚書令垂訪之羣僚其安東將軍封衡厲色曰馬能千里不免羈靽明畜生不可以人御也斌戎狄小人遭時際會兄弟封王自歡兜已來未有此福忽履盈忘止復有斯求魂爽錯亂必死不出年也垂猶隱忍容之令曰翟王之功宜居上輔但臺既未建此官不可便置待六合廓清更當議之斌怒密應苻丕潛使丁零決防潰水事泄垂誅之斌兄子真率其部衆北走邯鄲引兵向鄴欲與丕為內外之勢垂令其太子寶冠軍慕容隆擊破之真自邯鄲北走又使慕容楷率騎追之戰于下邑為真所敗真遂屯于承營垂謂諸將曰苻丕窮寇必守死不降丁零叛擾乃我腹心之患吾欲遷師新城開其逸路進以謝秦主疇昔之恩退以嚴擊真之備於是引師去鄴北屯新城慕容農進攻翟嵩于黃泥破之垂謂其范陽王德曰苻丕吾縱之不能去方引晉師規固鄴都不可置也進師又攻鄴開其西奔之路垂將有北都中山之意農率衆數萬迎之羣僚聞慕容暐為苻堅所殺勸垂僭位垂以慕容沖稱號關中不許晉龍驤將軍劉牢之率衆救苻丕至鄴垂逆戰敗績遂徹鄴圍退屯新城垂自新城北走牢之追垂連戰皆敗又戰于五橋澤王師敗績德及隆引兵要之於五丈橋牢之馳馬跳五丈澗會苻丕救至而免翟真去承營徙屯行唐真司馬鮮于乞殺真盡誅翟氏自立為趙王營人攻殺乞迎立真從弟成為主真子遼奔黎陽高句驪寇遼東垂平北慕容佐遣司馬郝景率衆救之為高句驪所敗遼東玄菟遂沒建節將軍徐巖叛于武邑驅掠四千餘人北走幽州垂馳敕其將平規曰但固守勿戰比破丁零吾當自討之規違命距戰為巖所敗巖乘勝入薊掠千餘戶而去所過寇暴遂據令支翟成長史鮮于得斬成而降垂入行唐悉坑其衆苻丕棄鄴城奔于并州慕容農攻克令支斬徐巖兄弟進伐高句驪復遼東玄菟二郡還屯龍城垂定都中山羣僚勸即尊號具典儀修郊燎之禮垂從之以太元十一年僭即位赦其境內改元曰建興置百官繕宗廟社稷立寶為太子以其左長史庫辱官偉右長史段崇龍驤張崇中山尹封衡為吏部尚書慕容德為侍中都督中外諸軍事領司隸校尉撫軍慕容麟為衛大將軍其餘拜授有差追尊母蘭氏為文昭皇后遷皓后段氏以蘭氏配饗博士劉詳董謐議以堯母妃位第三不以貴陵姜嫄明聖王之道以至公為先垂不從遣其征西慕容楷衛軍慕容麟鎮南慕容紹征虜慕容宙等攻苻堅冀州牧苻定鎮東苻紹幽州牧苻謨鎮北苻亮楷與定等書喻以禍福定等悉降垂留其太子寶守中山率諸將南攻翟遼以楷為前鋒都督遼之部衆皆燕趙人也咸曰太原王之子吾之父母相率歸附遼懼遣使請降垂至黎陽遼肉袒謝罪垂厚撫之為其太子寶起承華觀以寶録尚書政事巨細皆委之垂總大綱而已立其夫人段氏為皇后又以寶領侍中大單于驃騎大將軍幽州牧建留臺于龍城以高陽王慕容隆録留臺尚書事時慕容暐及諸宗室為苻堅所害者並招魂葬之清河太守賀耕聚衆定陵以叛南應翟遼慕容農討斬之毀定陵城進師入鄴以鄴城廣難固築鳳陽門大道之東為隔城其尚書郎婁會上疏曰三年之喪天下之達制兵荒殺禮遂以一切取士人心奔競苟求榮進至乃身冒縗絰以赴時役豈必殉忠於國家亦昧利于其間也聖王設教不以顛沛而虧其道不以喪亂而變其化故能杜豪競之門塞奔波之路陛下鍾百王之季廓中興之業天下漸平兵革方偃誠宜蠲蕩瑕穢率由舊章吏遭大喪聽終三年之禮則四方知化人斯服禮垂不從翟遼死子釗代立攻逼鄴城慕容農擊走之垂引師伐釗于滑臺次于黎陽津釗于南岸距守諸將惡其兵精咸諫不宜濟河垂笑曰豎子何能為吾今為卿等殺之遂徙營就西津為牛皮船百餘艘載疑兵列杖溯流而上釗先以大衆備黎陽見垂向西津乃棄營西距垂潛遣其桂林王慕容鎮驃騎慕容國於黎陽津夜濟壁于河南釗聞而奔還士衆疲渴走歸滑臺釗攜妻子率數百騎北趣白鹿山農追擊盡擒其衆釗單騎奔長子釗所統七郡戶三萬八千皆安堵如故徙徐州流人七千餘戶于黎陽於是議征長子諸將咸諫以慕容永未有釁連歲征役士卒疲怠請俟他年垂將從之及聞慕容德之策笑曰吾計決矣且吾投老扣囊底智足以克之不復留逆賊以纍子孫也乃發步騎七萬遣其丹楊王慕容瓚龍驤張崇攻永弟支于晉陽永遣其將刁雲慕容鍾率衆五萬屯潞川垂遣慕容楷出自滏口慕容農入自壺關垂頓于鄴之西南月餘不進永謂垂詭道伐之乃攝諸軍還杜太行軹關垂進師入自天井關至于壺壁永率精卒五萬來距阻河曲以自固馳使請戰垂列陳于壺壁之南農楷分為二翼慕容國伏千兵于深澗與永大戰垂引軍僞退永追奔數里國發伏兵馳斷其後楷農夾擊之永師大敗斬首八千餘級永奔還長子慕容瓚攻克晉陽垂進圍長子永將賈韜等潛為內應垂進軍入城永奔北門為前驅所獲於是數而戮之并其所署公卿刁雲等三十餘人永所統新舊八郡戶七萬六千八百及乘輿服御伎樂珍寶悉獲之於是品物具矣使慕容農略地河南攻廩丘陽城皆克之太山琅邪諸郡皆委城奔潰農進師臨海置守宰而還垂告捷于龍城之廟遣其太子寶及農與慕容麟等率衆八萬伐魏慕容德慕容紹以步騎一萬八千為寶後繼魏聞寶將至徙往河西寶進師臨河懼不敢濟還次參合忽有大風黑氣狀若隄防或高或下臨覆軍上沙門支曇猛言於寶曰風氣暴迅魏軍將至之候宜遣兵禦之寶笑而不納曇猛固以為言乃遣麟率騎三萬為後殿以禦非常麟以曇猛言為虛縱騎遊獵俄而黃霧四塞日月晦冥是夜魏師大至三軍奔潰寶與德等數千騎奔免士衆還者十一二紹死之初寶至幽州所乘車軸無故自折術士靳安以為大凶固勸寶還寶怒不從故及於敗寶恨參合之敗屢言魏有可乘之機慕容德亦曰魏人狃於參合之役有陵太子之心宜及聖略摧其鋭志垂從之留德守中山自率大衆出參合鑿山開道次于獵嶺遣寶與農出天門征北慕容隆征西慕容盛踰青山襲魏陳留公泥于平城陷之收其衆三萬餘人而還垂至參合見往年戰處積骸如山設弔祭之禮死者父兄一時號哭軍中皆慟垂慚憤歐血因而寢疾乘馬輿而進過平城北三十里疾篤築燕昌城而還寶等至雲中聞垂疾皆引歸及垂至于平城或有叛者奔告魏曰垂病已亡輿尸在軍魏又聞參合大哭以為信然乃進兵追之知平城已陷而退還館陰山垂至上谷之沮陽以太元二十一年死時年七十一凡在位十三年遺令曰方今禍難尚殷喪禮一從簡易朝終夕殯事訖成服三日之後釋服從政強寇伺隙祕勿發喪至京然後舉哀行服寶等遵行之僞諡成武皇帝廟號世祖墓曰宣平陵
