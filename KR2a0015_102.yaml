body:
  text: 晉書卷一百二載記第二劉聰子粲陳元達劉聰字玄門一名載元海第四子也母曰張夫人初聰之在孕也張氏夢日入懷寤而以告元海曰此吉徵也慎勿言十五月而生聰焉夜有白光之異形體非常左耳有一白毫長二尺餘甚光澤幼而聰悟好學博士朱紀大奇之年十四究通經史兼綜百家之言孫吳兵法靡不誦之工草隸善屬文著述懷詩百餘篇賦頌五十餘篇十五習擊刺猿臂善射彎弓三百斤膂力驍捷冠絶一時太原王渾見而悅之謂元海曰此兒吾所不能測也弱冠游于京師名士莫不交結樂廣張華尤異之也新興太守郭頤辟為主簿舉良將入為驍騎別部司馬纍遷右部都尉善於撫接五部豪右無不歸之河間王顒表為赤沙中郎將聰以元海在鄴懼為成都王穎所害乃亡奔成都王拜右積弩將軍參前鋒戰事元海為北單于立為右賢王隨還右部及即大單于位更拜鹿蠡王既殺其兄和羣臣勸即尊位聰初讓其弟北海王乂乂與公卿泣涕固請聰久而許之曰乂及羣公正以四海未定禍難尚殷貪孤年長故耳此國家之事孤敢不祗從今便欲遠遵魯隱待乂年長復子明辟於是以永嘉四年僭即皇帝位大赦境內改元光興尊元海妻單氏曰皇太后其母張氏為帝太后乂為皇太弟領大單于大司徒立其妻呼延氏為皇后封其子粲為河內王署使侍節撫軍大將軍都督中外諸軍事易河間王翼彭城王悝高平王遣粲及其征東王彌龍驤劉曜等率衆四萬長驅入洛川遂出轘轅周旋梁陳汝潁之間陷壘壁百餘以其司空劉景為大司馬左光祿劉殷為大司徒右光祿王育為大司空僞太后單氏姿色絶麗聰蒸焉單即乂之母也乂屢以為言單氏慚恚而死聰悲悼無已後知其故乂之寵因此漸衰然猶追念單氏未便黜廢又尊母為皇太后署其衛尉呼延晏為使侍節前鋒大都督前軍大將軍配禁兵二萬七千自宜陽入洛川命王彌劉曜及鎮軍石勒進師會之晏比及河南王師前後十二敗死者三萬餘人彌等未至晏留輜重于張方故壘遂寇洛陽攻陷平昌門焚東陽宣陽諸門及諸府寺懷帝遣河南尹劉默距之王師敗于社門晏以外繼不至出自東陽門掠王公已下子女二百餘人而去時帝將濟河東遁具船于洛水晏盡焚之還于張方故壘王彌劉曜至復與晏會圍洛陽時城內饑甚人皆相食百官分散莫有固志宣陽門陷彌晏入于南宮升太極前殿縱兵大掠悉收宮人珍寶曜於是害諸王公及百官已下三萬餘人於洛水北築為京觀遷帝及惠帝羊后傳國六璽于平陽聰大赦改年嘉平以帝為特進左光祿大夫平阿公遣其平西趙染安西劉雅率騎二萬攻南陽王模于長安粲曜率大衆繼之染敗王師于潼關將軍呂毅死之軍至于下邽模乃降染染送模於粲粲害模及其子范陽王黎送衛將軍梁芬模長史魯繇兼散騎常侍杜驁辛謐及北宮純等于平陽聰以粲之害模也大怒粲曰臣殺模本不以其晚識天命之故但以其晉氏肺腑洛陽之難不能死節天下之惡一也故誅之聰曰雖然吾恐汝不免誅降之殃也夫天道至神理無不報署劉曜為車騎大將軍開府儀同三司雍州牧改封中山王鎮長安王彌為大將軍封齊公尋而石勒等殺彌於己吾而并其衆表彌叛狀聰大怒遣使讓勒專害公輔有無上之心又恐勒之有二志也以彌部衆配之劉曜既據長安安定太守賈匹及諸氐羌皆送質任唯雍州刺史麴特新平太守竺恢固守不降護軍麴允頻陽令梁肅自京兆南山將奔安定遇匹任子於陰密擁還臨涇推匹為平南將軍率衆五萬攻曜於長安扶風太守梁綜及麴特竺恢等亦率衆十萬會之曜遣劉雅趙染來距敗績而還曜又盡長安鋭卒與諸軍戰于黃丘曜衆大敗中流矢退保甘渠杜人王禿紀特等攻劉粲于新豐粲還平陽曜攻陷池陽掠萬餘人歸于長安時閻鼎等奉秦王為皇太子入于雍城關中戎晉莫不響應聰后呼延氏死將納其太保劉殷女其弟乂固諫聰更訪之於太宰劉延年太傅劉景景等皆曰臣常聞太保自云周劉康公之後與聖氏本源既殊納之為允聰大悅使其兼大鴻臚李弘拜殷二女為左右貴嬪位在昭儀上又納殷女孫四人為貴人位次貴嬪謂弘曰此女輩皆姿色超世女德冠時且太保於朕實自不同卿意安乎弘曰太保胤自有周與聖源實別陛下正以姓同為恨耳且魏司空東萊王基當世大儒豈不達禮乎為子納司空太原王沈女以其姓同而源異故也聰大悅賜弘黃金六十斤曰卿當以此意諭吾子弟輩於是六劉之寵傾於後宮聰稀復出外事皆中黃門納奏左貴嬪決之聰假懷帝儀同三司封會稽郡公庾珉等以次加秩聰引帝入宴謂帝曰卿為豫章王時朕嘗與王武子相造武子示朕於卿卿言聞其名久矣以卿所製樂府歌示朕謂朕曰聞君善為辭賦試為看之朕時與武子俱為盛德頌卿稱善者久之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿贈朕柘弓銀研卿頗憶否帝曰臣安敢忘之但恨爾日不早識龍顏聰曰卿家骨肉相殘何其甚也帝曰此殆非人事皇天之意也大漢將應乾受曆故為陛下自相驅除且臣家若能奉武皇之業九族敦睦陛下何由得之至日夕乃出以小劉貴人賜帝謂帝曰此名公之孫今特以相妻卿宜善遇之拜劉為會稽國夫人遣其鎮北靳沖寇太原平北卜珝率衆繼之沖攻太原不克而歸罪于珝輒斬之聰聞之大怒曰此人朕所不得加刑沖何人哉遣其御史中丞浩衍持節斬沖左都水使者襄陵王攄坐魚蟹不供將作大匠望都公靳陵坐溫明徽光二殿不成皆斬于東市聰游獵無度常晨出暮歸觀漁於汾水以燭繼晝中軍王彰諫曰今大難未夷餘晉假息陛下不懼白龍魚服之禍而昏夜忘歸陛下當思先帝創業之艱難嗣承之不易鴻業已爾四海屬情何可墜之於垂成隳之於將就比竊觀陛下所為臣實痛心疾首有日矣且愚人係漢之心未專而思晉之懷猶盛劉琨去此咫尺之間狂狷刺客息頃而至帝王輕出一夫敵耳願陛下改往修來則億兆幸甚聰大怒命斬之上夫人王氏叩頭乞哀乃囚之詔獄聰母以聰刑怒過差三日不食弟乂子粲並輿櫬切諫聰怒曰吾豈桀紂幽厲乎而汝等生來哭人其太宰劉延年及諸公卿列侯百有餘人皆免冠涕泣固諫曰光文皇帝以聖武膺期創建鴻祚而六合未一夙世升遐陛下睿德自天龍飛紹統東平洛邑南定長安真可謂功高周成德超夏啓往也唐虞今則陛下歷觀書記未有此比而頃頻以小務不供而斬王公直言忤旨便囚大將游獵無度機管不修臣等竊所未解臣等所以破肝糜胃忘寢與食者也聰乃赦彰麴特等圍長安劉曜連戰敗績乃驅掠士女八萬餘口退還平陽因攻司徒傅祗于三渚使其右將軍劉參攻郭默于懷城祗病卒城陷遷祗孫純粹并其二萬餘戶于平陽縣聰贈祗太保純粹皆給事中謂祗子暢曰尊公雖不達天命然各忠其主吾亦有以亮之但晉主已降天命非人所支而虔劉南鄙沮亂邊萌此其罪也以元惡之種而贈同勳舊逆臣之孫荷榮禁闥卿知皇漢之德弘曠以不暢曰陛下每嘉先臣不以小臣之故而虧其忠節及是恩也自是明主伐國弔人之義臣輒同萬物未敢謝生於自然聰遣劉粲劉曜等攻劉琨於晉陽琨使張喬距之戰于武灌喬敗績死之晉陽危懼太原太守高喬琨別駕郝聿以晉陽降粲琨與左右數十騎攜其妻子奔于趙郡之亭頭遂如常山粲曜入于晉陽先是琨與代王猗盧結為兄弟乃告敗於猗盧且乞師猗盧遣子日利孫賓六須及將軍衛雄姬淡等率衆數萬攻晉陽琨收散卒千餘為之鄉導猗盧率衆六萬至于狼猛曜及賓六須戰于汾東曜墜馬中流矢身被七創討虜傅武以馬授曜曜曰當今危亡之極人各思免吾創已重自分死此矣武泣曰武小人蒙大王識拔以至於是常思效命今其時矣且皇室始基大難未弭天下何可一日無大王也於是扶曜乘馬驅令渡汾回而戰死曜入晉陽夜與劉粲等掠百姓踰蒙山遁歸猗盧率騎追之戰于藍谷粲敗績斬其征虜邢延獲其鎮北劉豐琨收合離散保于陽曲猗盧戍之而還正旦聰宴于光極前殿逼帝行酒光祿大夫庾珉王俊等起而大哭聰惡之會有告珉等謀以平陽應劉琨者聰遂鴆帝而誅珉俊復以賜帝劉夫人為貴人大赦境內殊死已下立左貴嬪劉氏為皇后聰將為劉氏起𨶑儀殿於後庭廷尉陳元達諫曰臣聞古之聖王愛國如家故皇天亦祐之如子夫天生蒸民而樹之君者使為之父母以刑賞之不欲使殿屎黎元而蕩逸一人晉氏暗虐視百姓如草芥故上天剿絶其祚乃眷皇漢蒼生引領息肩懷更蘇之望有日矣我高祖光文皇帝靖言惟茲痛心疾首故身衣大布居不重茵先皇后嬪服無綺綵重逆羣臣之請故建南北宮焉今光極之前足以朝羣后饗萬國矣昭德溫明已後足可以容六宮列十二等矣陛下龍興已來外殄二京不世之寇內興殿觀四十餘所重之以饑饉疾疫死亡相屬兵疲於外人怨於內為之父母固若是乎伏聞詔旨將營𨶑儀中宮新立誠臣等樂為子來者也竊以大難未夷宮宇粗給今之所營尤實非宜臣聞太宗承高祖之業惠呂息役之後以四海之富天下之殷尚以百金之費而輟露臺歷代垂美為不朽之迹故能斷獄四百擬於成康陛下之所有不過太宗二郡地耳戰守之備者豈僅胸奴南越而已哉孝文之廣思費如彼陛下之狹欲損如此愚臣所以敢昧死犯顏色冒不測之禍者也聰大怒曰吾為萬機主將營一殿豈問汝鼠子乎不殺此奴沮亂朕心朕殿何當得成邪將出斬之并其妻子同梟東市使羣鼠共穴時在逍遙園李中堂元達抱堂下樹叫曰臣所言者社稷之計也而陛下殺臣若死者有知臣要當上訴陛下於天下訴陛下於先帝朱雲有云臣得與龍逢比干游於地下足矣未審陛下何如主耳元達先鎖腰而入及至即以鎖繞樹左右曳之不能動聰怒甚劉氏時在後堂聞之密遣中常侍私敕左右停刑於是手疏切諫聰乃解引元達而謝之易逍遙園為納賢園李中堂為愧賢堂時愍帝即位于長安聰遣劉曜及司隸喬智明武牙李景年等寇長安命趙染率衆赴之時大都督麴允據黃白城纍為曜染所敗染謂曜曰麴允率大衆在外長安可襲而取之得長安黃白城自服願大王以重衆守此染請輕騎襲之曜乃承制加染前鋒大都督安南大將軍以精騎五千配之而進王師敗於渭陽將軍王廣死之染夜入長安外城帝奔射雁樓染焚燒龍尾及諸軍營殺掠千餘人旦退屯逍遙園麴允率衆襲曜連戰敗之曜入粟邑遂歸平陽時流星起於牽牛入紫微龍形委蛇其光照地落于平陽北十里視之則有肉長三十步廣二十七步臭聞于平陽肉旁常有哭聲晝夜不止聰甚惡之延公卿已下問曰朕之不德致有斯異其各極言勿有所諱陳元達及博士張師等進對曰星變之異其禍行及臣恐後庭有三后之事亡國喪家靡不由此願陛下慎之聰曰此陰陽之理何關人事既而劉氏産一蛇一猛獸各害人而走尋之不得頃之見在隕肉之旁俄而劉氏死乃失此肉哭聲亦止自是後宮亂寵進御無序矣聰以劉易為太尉初置相國官上公有殊勳德者死乃贈之於是大定百官置太師丞相自大司馬以上七公位皆上公緑綟綬遠遊冠置輔漢都護中軍上軍輔軍鎮衛京前後左右上下軍輔國冠軍龍驤武牙大將軍營各配兵二千皆以諸子為之置左右司隸各領戶二十餘萬萬戶置一內史凡內史四十三單于左右輔各主六夷十萬落萬落置一都尉省吏部置左右選曹尚書自司隸以下六官皆位次僕射置御史大夫及州牧位皆亞公以其子粲為丞相領大將軍録尚書事進封晉王食五都劉延年録尚書六條事劉景為太師王育為太傅任顗為太保馬景為大司徒朱紀為大司空劉曜為大司馬曜復次渭汭趙染次新豐索綝自長安東討染染狃于纍捷有輕綝之色長史魯徽曰今司馬鄴君臣自以逼僭王畿雄劣不同必致死距我將軍宜整陳案兵以擊之弗可輕也困獸猶鬬況於國乎染曰以司馬模之強吾取之如拉朽索綝小豎豈能樜吾馬蹄刀刃邪要擒之而後食晨率精騎數百馳出逆之戰于城西敗績而歸悔曰吾不用魯徽之言以至於此何面見之於是斬徽徽臨刑謂染曰將軍愎諫違謀戇而取敗而復忌前害勝誅戮忠良以逞愚忿亦何顏面瞬息世間哉袁紹為之於前將軍踵之於後覆亡敗喪亦當相尋所恨不得一見大司馬而死死者無知則已若其有知下見田豐為徒要當訴將軍於黃泉使將軍不得服牀枕而死叱刑者曰令吾面東向大司馬曜聞之曰蹄涔不容尺鯉染之謂也曜還師攻郭默于懷城收其米粟八十萬斛列三屯以守之聰遣使謂曜曰今長安假息劉琨游魂此國家所尤宜先除也郭默小醜何足以勞公神略可留征虜將軍貝丘王翼光守之公其還也於是曜歸蒲坂俄而徵曜輔政趙染寇北地夢魯徽大怒引弓射之染驚悸而寤旦將攻城中弩而死聰以粲為相國總百揆省丞相以并相國平陽地震烈風拔樹發屋光義人羊充妻産子二頭其兄竊而食之三日而死聰以其太廟新成大赦境內改年建元雨血於其東宮延明殿徹瓦在地者深五寸劉乂惡之以訪其太師盧志太傅崔瑋太保許遐志等曰主上往以殿下為太弟者蓋以安衆望也志在晉王久矣王公已下莫不希旨歸之相國之位自魏武已來非復人臣之官主上本發明詔置之為贈官今忽以晉王居之羽儀威尊踰於東宮萬機之事無不由之置太宰大將軍及諸王之營以為羽翼此事勢去矣殿下不得立明也然非止不得立而已不測之危厄在於旦夕宜早為之所四衛精兵不減五千餘營諸王皆年齒尚幼可奪而取之相國輕佻正可煩一刺客耳大將軍無日不出其營可襲而得也殿下但當有意二萬精兵立便可得鼓行向雲龍門宿衛之士孰不倒戈奉迎大司馬不慮為異也乂弗從乃止聰如中護軍靳準第納其二女為左右貴嬪大曰月光小曰月華皆國色也數月立月光為皇后東宮舍人荀裕告盧志等勸乂謀反乂不從之狀聰於是收志瑋遐於詔獄假以他事殺之使冠威卜抽監守東宮禁乂朝賀乂憂懼不知所為乃上表自陳乞為黔首并免諸子之封褒美晉王粲宜登儲副抽又抑而弗通其青州刺史曹嶷攻汶陽關公丘陷之害齊郡太守徐浮執建威劉宣齊魯之間郡縣壘壁降者四十餘所嶷遂略地西下祝阿平陰衆十餘萬臨河置戍而歸于臨淄嶷於是遂有雄據全齊之志石勒以嶷之懷二也請討之聰又憚勒之并齊乃寢而弗許劉曜濟自盟津將攻河南將軍魏該奔于一泉塢曜進攻李矩于滎陽矩遣將軍李平師於成皋曜覆而滅之矩恐送質請降時聰以其皇后靳氏為上皇后立貴妃劉氏為左皇后右貴嬪靳氏為右皇后左司隸陳元達以三后之立也極諫聰不納乃以元達為右光祿大夫外示優賢內實奪其權也於是太尉范隆大司馬劉丹大司空呼延晏尚書令王鑒等皆抗表遜位以讓元達聰乃以元達為御史大夫儀同三司劉曜寇長安頻為王師所敗曜曰彼猶強盛弗可圖矣引師而歸聰宮中鬼夜哭三日而聲向右司隸寺乃止其上皇后靳氏有淫穢之行陳元達奏之聰廢靳靳慚恚自殺靳有殊寵聰迫於元達之勢故廢之既而追念其姿色深仇元達劉曜進師上黨將攻陽曲聰遣使謂曜曰長安擅命國家之深恥也公宜以長安為先陽曲一委驃騎天時人事其應至矣公其亟還曜回滅郭邁朝于聰遂如蒲阪平陽地震雨血于東宮廣袤頃餘劉曜又進軍屯于粟邑麴允饑甚去黃白而軍于靈武曜進攻上郡太守張禹與馮翊太守梁肅奔于允吾於是關右翕然所在應曜曜進據黃阜聰武庫陷入地一丈五尺時聰中常侍王沈宣懷俞容中宮僕射郭猗中黃門陵修等皆寵幸用事聰游宴後宮或百日不出羣臣皆因沈等言事多不呈聰率以其意愛憎而決之故或有勳舊功臣而弗見録姦佞小人數日而便至二千石者軍旅無歲不興而將士無錢帛之賞後宮之家賜賚及於僮僕動至數千萬沈等車服宅宇皆踰於諸王子弟中表布衣為內史令長者三十餘人皆奢僭貪殘賊害良善靳準合宗內外諂以事之郭猗有憾於劉乂謂劉粲曰太弟於主上之世猶懷不逞之志此則殿下父子之深仇四海蒼生之重怨也而主上過垂寬仁猶不替二尊之位一旦有風塵之變臣竊為殿下寒心且殿下高祖之世孫主上之嫡統凡在含齒孰不係仰萬機事大何可與人臣昨聞太弟與大將軍相見極有言矣若事成許以主上為太上皇大將軍為皇太子乂又許衛軍為大單于二王已許之矣二王居不疑之地並握重兵以此舉事事何不成臣謂二王茲舉禽獸之不若也背父親人人豈親之今又苟貪其一切之力耳事成之後主上豈有全理殿下兄弟故在忘言東宮相國單于在武陵兄弟何肯與人許以三月上巳因宴作難事淹變生宜早為之所春秋傳曰蔓草猶不可除況君之寵弟乎臣屢啓主上主上性敦友于謂臣言不實刑臣刀鋸之餘而蒙主上殿下成造之恩故不慮逆鱗之誅每所聞必言冀垂採納臣當入言之願殿下不泄密表其狀也若不信臣言可呼大將軍從事中郎王皮衛軍司馬劉惇假之恩顧通其歸善之路以問之必可知也粲深然之猗密謂皮惇曰二王逆狀主相已具知之矣卿同之乎二人驚曰無之猗曰此事必無疑吾憐卿親舊并見族耳於是歔欷流涕皮惇大懼叩頭求哀猗曰吾為卿作計卿能用不二人皆曰謹奉大人之教猗曰相國必問卿卿但云有之若責卿何不先啓卿即答云臣誠負死罪然仰惟主上聖性寬慈殿下篤於骨肉恐言成詿僞故也皮惇許諾粲俄而召問二人至不同時而辭若畫一粲以為信然初靳準從妹為乂孺子淫于侍人乂怒殺之而屢以嘲準準深慚恚說粲曰東宮萬機之副殿下宜自居之以領相國使天下知早有所繫望也至是準又說粲曰昔孝成距子政之言使王氏卒成篡逆可乎粲曰何可之有準曰然誠如聖旨下官亟欲有所言矣但以德非更生親非皇宗恐忠言暫出霜威已及故不敢耳粲曰君但言之準曰聞風塵之言謂大將軍衛將軍及左右輔皆謀奉太弟剋季春構變殿下宜為之備不然恐有商臣之禍粲曰為之奈何準曰主上愛信於太弟恐卒聞未必信也如下官愚意宜緩東宮之禁固勿絶太弟賓客使輕薄之徒得與交游太弟既素好待士必不思防此嫌輕薄小人不能無逆意以勸太弟之心小人有始無終不能如貫高之流也然後下官為殿下露表其罪殿下與太宰拘太弟所與交通者考問之窮其事原主上必以無將之罪罪之不然今朝望多歸太弟主上一旦晏駕恐殿卜抽得立矣於是粲命卜抽引兵去東宮聰自去冬至是遂不復受朝賀軍國之事一決於粲唯發中旨殺生除授王枕郭猗等意所欲皆從之又立市於後庭與宮人宴戲或三日不醒聰臨上秋閣誅其特進綦毋達太中大夫公師彧尚書王琰田歆少府陳休左衛卜崇大司農朱誕等皆羣閹所忌也侍中卜幹泣諫聰曰陛下方隆武宣之化欲使幽谷無考槃奈何一旦先誅忠良將何以垂之於後昔秦愛三良而殺之君子知其不霸以晉厲之無道尸三卿之後猶有不忍之心陛下如何忽信左右愛憎之言欲一日尸七卿詔尚在臣間猶未宣露乞垂昊天之澤回雷霆之威且陛下直欲誅之耳不露其罪名何以示四海此豈是帝王三訊之法邪因叩頭流血王沈叱幹曰卜侍中欲距詔乎聰拂衣而入免幹為庶人太宰劉易及大將軍劉敷御史大夫陳元達金紫光祿大夫王延等詣闕諫曰臣聞善人者乾坤之紀政教之本也邪佞者宇宙之螟螣王化之蟊賊也故文王以多士基周桓靈以羣閹亡漢國之興亡未有不由此也自古明王之世未嘗有宦者與政武元安順豈足為故事乎今王沈等乃處常伯之位握生死與奪於中勢傾海內愛憎任之矯弄詔旨欺誣日月內諂陛下外佞相國威權之重侔於人主矣王公見之駭目卿宰望塵下車銓衡迫之選舉不復以實士以屬舉政以賄成多樹姦徒殘毒忠善知王琰等忠臣必盡節於陛下懼其姦萌發露陷之極刑陛下不垂三察猥加誅戮怨感穹蒼痛入九泉四海悲惋賢愚傷懼沈等皆刀鋸之餘背恩忘義之類豈能如士人君子感恩展效以答乾澤也陛下何故親近之何故貴任之昔齊桓公任易牙而亂孝懷委黃皓而滅此皆覆車於前殷鑒不遠比年地震日蝕雨血火災皆沈等之由願陛下割翦凶醜與政之流引尚書御史朝省萬機相國與公卿五日一入會議政事使大臣得極其言忠臣得逞其意則衆災自弭和氣呈祥今遺晉未殄巴蜀未賓石勒潛有跨趙魏之志曹嶷密有王全齊之心而復以沈等助亂大政陛下心腹四支何處無患復誅巫咸戮扁鵲臣恐遂成桓侯膏肓之疾後雖欲療之其如病何請免沈等官付有司定罪聰以表示沈等笑曰是兒等為元達所引遂成癡也寢之沈等頓首泣曰臣等小人過蒙陛下識拔幸得備灑掃宮閣而王公朝士疾臣等如仇讐又深恨陛下願收大造之恩以臣等膏之鼎鑊皇朝上下自然雍穆矣聰曰此等狂言然卿復何足恨乎更以訪粲粲盛稱沈等忠清乃心王室聰大悅封沈等為列侯太宰劉易詣闕又上疏固諫聰大怒手壞其表易遂忿恚而死元達哭之悲慟曰人之云亡邦國殄悴吾既不復能言安用此默默生乎歸而自殺北地饑甚人相食噉羌酋大軍須運糧以給麴昌劉雅擊敗之麴允與劉曜戰于磻石谷王師敗績允奔靈武平陽大饑流叛死亡十有五六石勒遣石越率騎二萬屯于并州以懷撫叛者聰使黃門侍郎喬詩讓勒勒不奉命潛結曹嶷規為鼎峙之勢聰立上皇后樊氏即張氏之侍婢也時四后之外佩皇后璽綬者七人朝廷內外無復綱紀阿諛日進貨賄公行軍旅在外饑疫相仍後宮賞賜動至千萬劉敷屢泣言之聰不納怒曰爾欲得使汝公死乎朝朝夕夕生來哭人敷憂忿發病而死河東大蝗唯不食黍豆靳準率部人收而埋之哭聲聞於十餘里後乃鑽土飛出復食黍豆平陽饑甚司隸部人奔于冀州二十萬戶石越招之故也犬與豕交于相國府門又交于宮門又交司隸御史門有豕著進賢冠升聰坐犬冠武冠帶綬與豕並升俄而鬬死殿上宿衛莫有見其入者而聰昏虐愈甚無誡懼之心宴羣臣于光極前殿引見其太弟乂容貌毀悴鬢髮蒼然涕泣陳謝聰亦對之悲慟縱酒極歡待之如初劉曜陷長安外城愍帝使侍中宋敞送箋于曜帝肉袒牽羊輿櫬銜璧出降及至平陽聰以帝為光祿大夫懷安侯使粲告于太廟大赦境內改年麟嘉麴允自殺聰東宮四門無故自壞後內史女人化為丈夫時聰子約死一指猶暖遂不殯殮及蘇言見元海於不周山經五日遂復從至昆崘山三日而復返於不周見諸王公卿將相死者悉在宮室甚壯麗號曰蒙珠離國元海謂約曰東北有遮須夷國無主久待汝父為之汝父後三年當來來後國中大亂相殺害吾家死亡略盡但可永明輩十數人在耳汝且還後年當來見汝不久約拜辭而歸道遇一國曰猗尼渠餘國引約入宮與約皮囊一枚曰為吾遺漢皇帝約辭而歸謂約曰劉郎後年來必見過當以小女相妻約歸置皮囊於機上俄而蘇使左右機上取皮囊開之有一方白玉題文曰猗尼渠餘國天王敬信遮須夷國天王歲在攝提當相見也馳使呈聰聰曰若審如此吾不懼死也及聰死與此玉并葬焉時東宮鬼哭赤虹經天南有一歧三日並照各有兩珥五色甚鮮客星歷紫宮入於天獄而滅太史令康相言於聰曰蛇虹見彌天一歧南徹三日並照客星入紫宮此皆大異其徵不遠也今虹達東西者許洛以南不可圖也一歧南徹者李氏當仍跨巴蜀司馬睿終據全吳之象天下其三分乎月為胡王皇漢雖苞括二京龍騰九五然世雄燕代肇基北朔太陰之變其在漢域乎漢既據中原曆命所屬紫宮之異亦不在他此之深重胡可盡言石勒鴟視趙魏曹嶷狼顧東齊鮮卑之衆星布燕代齊代燕趙皆有將大之氣願陛下以東夏為慮勿顧西南吳蜀之不能北侵猶大漢之不能南向也今京師寡弱勒衆精盛若盡趙魏之鋭燕之突騎自上黨而來曹嶷率三齊之衆以繼之陛下將何以抗之紫宮之變何必不在此乎願陛下早為之所無使兆人生心陛下誠能發詔外以遠追秦皇漢武循海之事內為高帝圖楚之計無不克矣聰覽之不悅劉粲使王平謂劉曰適奉中詔云京師將有變敕裹甲以備之以為信然令命宮臣裹甲以居粲馳遣告靳準王沈等曰向也王平告云東宮陰備非常將若之何準白之聰大驚曰豈有此乎王沈等同聲曰臣等久聞但恐言之陛下弗信於是使粲圍東宮粲遣沈準收氐羌酋長十餘人窮問之皆懸首高格燒鐵灼目乃自誣與同造逆謀聰謂沈等言曰而今而後吾知卿等忠於朕也當念為知無不言勿恨往日言不用也於是誅素所親厚大臣及東宮官屬數十人皆靳準及閹豎所怨也廢為北部王粲使準賊殺之坑士衆萬五千餘人平陽街巷為之空氐羌叛者十餘萬落以靳準行車騎大將軍以討之時聰境內大蝗平陽冀雍尤甚靳準討之震其二子而死河汾大溢漂沒千餘家東宮災異門閣宮殿蕩然立粲為皇太子大赦殊死已下以粲領相國大單于總攝朝政如前聰校獵上林以帝行車騎將軍戎服執戟前導行三驅之禮粲言於聰曰今司馬氏跨據江東趙固李矩同逆相濟興兵聚衆者皆以子鄴為名不如除之以絶其望聰然之趙固郭默攻其河東至於絳邑右司隸部人盜牧馬負妻子奔之者三萬餘騎騎兵將軍劉勳追討之殺萬餘人固默引歸劉頡遮邀擊之為固所敗使粲及劉雅等伐趙固次于小平津固揚言曰要當生縛劉粲以贖天子聰聞而惡之李矩使郭默郭誦救趙固屯于洛汭遣耿稚張皮潛濟襲粲貝丘王翼光自厘城覘之以告粲粲曰征北南渡趙固望聲逃竄彼方憂自固何暇來邪且聞上身在此自當不敢北視況敢濟乎不須驚動將士也是夜稚等襲敗粲軍粲奔據陽鄉稚館穀粲壘雅聞而馳還柵于壘外與稚相持聰聞粲敗使太尉范隆率騎赴之稚等懼率衆五千突圍趨北山而南劉勳追之戰于河陽稚師大敗死者三千五百人投河死者千餘人聰所居螽斯則百堂災焚其子會稽王衷已下二十有一人聰聞之自投於牀哀塞氣絶良久乃蘇平陽西明門牡自亡霍山崩署其驃騎大將軍濟南王劉驥為大將軍都督中外諸軍事録尚書衛大將軍齊王劉勱為大司徒中常侍王沈養女年十四有妙色聰立為左皇后尚書令王鑒中書監崔懿之中書令曹恂等諫曰臣聞王者之立后也將以上配乾坤之性象二儀敷育之義生承宗廟母臨天下亡配后土執饋皇姑必擇世德名宗幽間淑令副四海之望稱神祇之心是故周文造舟姒氏以興關雎之化饗則百世之祚永孝成任心縱欲以婢為后使皇統亡絶社稷淪傾有周之隆既如彼矣大漢之禍又如此矣從麟嘉以來亂淫於色縱沈之弟女刑餘小醜猶不可塵瓊寢汙清廟況其家婢邪六宮妃嬪皆公子公孫奈何一旦以婢主之何異象榱玉簀而對腐木朽楹哉臣恐無福於國家也聰覽之大怒使宣懷謂粲曰鑒等小子慢侮國家狂言自口無復君臣上下之禮其速考竟於是收鑒等送市金紫光祿大夫王延馳將入諫門者弗通鑒等臨刑王沈以杖叩之曰庸奴復能為惡乎乃公何與汝事鑒瞋目叱之曰豎子使皇漢滅者坐汝鼠輩與靳準耳要當訴汝於先帝取汝等於地下懿之曰靳準梟聲鏡形必為國患汝既食人人亦當食汝皆斬之聰又立其中常侍宣懷養女為中皇后鬼哭於光極殿又哭於建始殿雨血平陽廣袤十里時聰子約已死至是晝見聰甚惡之謂粲曰吾寢疾惙頓怪異特甚往以約之言為妖比纍日見之此兒必來迎吾也何圖人死定有神靈如是吾不悲死也今世難未夷非諒暗之日朝終夕殮旬日而葬徵劉曜為丞相録尚書輔政固辭乃止仍以劉景為太宰劉驥為大司馬劉顗為太師朱紀為太傅呼延晏為太保並録尚書事范隆守尚書令儀同三司靳準為大司空領司隸校尉皆迭決尚書奏事太興元年聰死在位九年僞諡曰昭武皇帝廟號烈宗粲字士光少而俊傑才兼文武自為宰相威福任情疏遠忠賢昵近姦佞任性嚴刻無恩惠距諫飾非好興造宮室相國之府仿像紫宮在位無幾作兼晝夜飢困窮叛死亡相繼粲弗之恤也既嗣僞位尊聰后靳氏為皇太后樊氏號弘道皇后宣氏號弘德皇后王氏號弘孝皇后靳等年皆未滿二十並國色也粲晨夜蒸淫於內志不在哀立其妻靳氏為皇后子元公為太子大赦境內改元漢昌雨血于平陽靳準將有異謀私於粲曰如聞諸公將欲行伊尹霍光之事謀先誅太保及臣以大司馬統萬機陛下若不先之臣恐禍之來也不晨則夕粲弗納準懼其言之不從謂聰二靳氏曰今諸公侯欲廢帝立濟南王恐吾家無復種矣盍言之於帝二靳承間言之粲誅其太宰上洛王劉景太師昌國公劉顗大司馬濟南王劉驥大司徒齊王劉勱等太傅朱紀太尉范隆出奔長安又誅其車騎大將軍吳王劉逞驥母弟也粲大閲上林謀討石勒以靳準為大將軍録尚書事粲荒耽酒色游宴後庭軍國之事一決於準準矯粲命以從弟明為車騎將軍康為衛將軍準將作亂以金紫光祿大夫王延耆德時望謀之于延延弗從馳將告之遇靳康劫延以歸準勒兵入宮升其光極前殿下使甲士執粲數而殺之劉氏男女無少長皆斬于東市發掘元海聰墓焚燒其宗廟鬼大哭聲聞百里準自號大將軍漢大王置百官遣使稱藩于晉左光祿劉雅出奔西平尚書北宮純胡嵩等招集晉人保於東宮靳康攻滅之準將以王延為左光祿延罵曰屠各逆奴何不速殺我以吾左目置西陽門觀相國之入也右目置建春門觀大將軍之入也準怒殺之陳元達字長宏後部人也本姓高以生月妨父故改云陳少而孤貧常躬耕兼誦書樂道行詠欣欣如也至年四十不與人交通元海之為左賢王聞而招之元達不答及元海僭號人謂元達曰往劉公相屈君蔑而不顧今稱號龍飛君其懼乎元達笑曰是何言邪彼人姿度卓犖有籠羅宇宙之志吾固知之久矣然往日所以不往者以期運未至不能無事喧喧彼自有以亮吾矣卿但識之吾恐不過二三日驛書必至其暮元海果徵元達為黃門郎人曰君殆聖乎既至引見元海曰卿若早來豈為郎官而已元達曰臣惟性之有分盈分者顛臣若早叩天門者恐大王賜處於九卿納言之間此則非臣之分臣將何以堪之是以抑情盤桓待分而至大王無過授之謗小臣免招寇之禍不亦可乎元海大悅在位忠謇屢進讜言退而削草雖子弟莫得而知也聰每謂元達曰卿當畏朕反使朕畏卿乎元達叩頭謝曰臣聞師臣者王友臣者霸臣誠愚暗無可採也幸邀陛下垂齊桓納九九之義故使微臣得盡愚忠昔世宗遙可汲黯之奏故能恢隆漢道桀紂誅諫幽厲弭謗是以三代之亡也忽焉陛下以大聖應期挺不世之量能遠捐商周覆國之弊近模孝武光漢之美則天下幸甚羣臣知免及其死也人盡冤之
