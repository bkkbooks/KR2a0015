body:
  text: 晉書卷九十一列傳第六十一儒林昔周德既衰諸侯力政禮經廢缺雅頌陵夷夫子將聖多能固天攸縱歎鳳鳥之不至傷麟出之非時於是乃刪詩書定禮樂贊易道修春秋載籍逸而復存風雅變而還正其後卜商衞賜田吳孫孟之儔或親稟微言或傳聞大義猶能強晉存魯藩魏卻秦既抗禮於邦君亦馳聲於海內及嬴氏慘虐棄德任刑煬墳籍於埃塵填儒林於坑穽嚴是古之法抵挾書之罪先王徽烈靡有孑遺漢祖勃興救焚拯溺粗修禮律未遑俎豆逮于孝武崇尚文儒爰及東京斯風不墜於是傍求蠹簡博訪遺書創甲乙之科擢賢良之舉莫不紆青拖紫服冕乘軒或徒步而取公卿或累旬以膺台鼎故搢紳之士靡然嚮風餘芳遺烈煥乎可紀者也洎當塗草創深務兵權而主好斯文朝多君子鴻儒碩學無乏於時武帝受終憂勞軍國時既初并庸蜀方事江湖訓卒厲兵務農積穀猶復修立學校臨幸辟雍而荀顗以制度贊惟新鄭沖以儒宗登保傅茂先以博物參朝政子真以好禮居秩宗雖媿明揚亦非遐棄既而荊揚底定區𧜛乂安羣公草封禪之儀天子發謙沖之詔未足比隆三代固亦擅美一時惠帝纘戎朝昏政弛釁起宮掖禍成藩翰惟懷逮愍喪亂弘多衣冠禮樂掃地俱盡元帝運鍾百六光啟中興賀荀刁杜諸賢並稽古博文財成禮度雖尊儒勸學亟降於綸言東序西膠未聞於弦誦明皇聰睿雅愛流略簡文玄嘿敦悅丘墳乃招集學徒弘奬風烈並時艱祚促未能詳備有晉始自中朝迄於江左莫不崇飾華競祖述虛玄擯闕里之典經習正始之餘論指禮法為流俗目縱誕以清高遂使憲章弛廢名教穨毀五胡乘間而競逐二京繼踵以淪胥運極道消可為長歎息者矣鄭沖等名位既隆自有列傳其餘編之于左以續前史儒林云范平范平字子安吳郡錢塘人也其先銍侯馥避王莽之亂適吳因家焉平研覽墳素遍該百氏姚信賀邵之徒皆從受業吳時舉茂才累遷臨海太守政有異能孫晧初謝病還家敦悅儒學吳平太康中頻徵不起年六十九卒有詔追加諡號曰文貞先生賀循勒碑紀其德行三子奭咸泉並以儒學至大官泉子蔚關內侯家世好學有書七千餘卷遠近來讀者有百餘人蔚為辦衣食蔚子文才亦幼知名文立文立字廣休巴郡臨江人也蜀時游太學專毛詩三禮師事譙周門人以立為顏回陳壽李虔為游夏羅憲為子貢仕至尚書蜀平舉秀才除郎中泰始初拜濟陰太守入為太子中庶子上表請以諸葛亮蔣琬費禕等子孫流徙中畿宜見用一以慰巴蜀之心其次傾吳人之望事皆施行詔曰太子中庶子文立忠貞清實有思理器幹前在濟陰政事修明後事東宮盡輔導之節昔光武平隴蜀皆收其賢才以之蓋所以拔幽滯而濟殊方也其以立為散騎常侍蜀故尚書犍為程瓊雅有德業與立深交武帝聞其名以問立對曰臣至知其人但年垂八十稟性謙退無復當時之望不以上聞耳瓊聞之曰廣休可謂不黨矣故吾善夫人也時西域獻馬帝問立馬何如對曰乞問太僕帝善之遷衞尉咸寧末卒所著章奏詩賦數十篇行於世陳邵陳邵字節良東海襄賁人也郡察孝廉不就以儒學徵為陳留內史累遷燕王師撰周禮評甚有條貫行於世泰始中詔曰燕王師陳邵清貞潔靜行著邦族篤志好古博通六籍耽悅典誥老而不倦宜在左右以篤儒教可為給事中卒於官虞喜虞喜字仲寧會稽餘姚人光祿潭之族也父察吳征虜將軍喜少立操行博學好古諸葛恢臨郡屈為功曹察孝廉州舉秀才司徒辟皆不就元帝初鎮江左上疏薦喜懷帝即位公車徵拜博士不就喜邑人賀循為司空先達貴顯每詣喜信宿忘歸自云不能測也太寧中與臨海任旭俱以博士徵不就復下詔曰夫興化致政莫尚乎崇道教明退素也喪亂以來儒雅陵夷每覽子衿之詩未嘗不慨然臨海任旭會稽虞喜並潔靜其操歲寒不移研精墳典居今行古志操足以勵俗博學足以明道前雖不至其更以博士徵之喜辭疾不赴咸和末詔公卿舉賢良方正直言之士太常華舉喜為賢良會國有軍事不行咸康初內史何充上疏曰臣聞二八舉而四門穆十亂用而天下安徽猷克闡有自來矣方今聖德欽明思恢遐烈旌輿整駕俟賢而動伏見前賢良虞喜天挺貞素高尚邈世束脩立德皓首不倦加以傍綜廣深博聞強識鑽堅研微有弗及之勤處靜味道無風塵之志高枕柴門怡然自足宜使蒲輪紆衡以旌殊操一則翼贊大化二則敦勵薄俗疏奏詔曰尋陽翟湯會稽虞喜並守道清貞不營世務耽學高尚操擬古人往雖徵命而不降屈豈素絲難染而搜引禮簡乎政道須賢宜納諸廊廟其並以散騎常侍徵之又不起永和初有司奏稱十月殷祭京兆府君當遷祧室征西豫章潁川三府君初毀主內外博議不能決時喜在會稽朝廷遣就喜諮訪焉其見重如此喜專心經傳兼覽讖緯乃著安天論以難渾蓋又釋毛詩略注孝經為志林三十篇凡所注述數十萬言行於世年七十六卒無子弟豫自有傳劉兆劉兆字延世濟南東平人漢廣川惠王之後也兆博學洽聞溫篤善誘從受業者數千人武帝時五辟公府三徵博士皆不就安貧樂道潛心著述不出門庭數十年以春秋一經而三家殊塗諸儒是非之議紛然互為讐敵乃思三家之異合而通之周禮有調人之官作春秋調人七萬餘言皆論其首尾使大義無乖時有不合者舉其長短以通之又為春秋左氏解名曰全綜公羊穀梁解詁皆納經傳中朱書以別之又撰周易訓注以正動二體互通其文凡所讚述百餘萬言嘗有人著鞾騎驢至兆門外曰吾欲見劉延世兆儒德道素青州無稱其字者門人大怒兆曰聽前既進踞牀問兆曰聞君大學比何所作兆答如上事末云多有所疑客問之兆說疑畢客曰此易解耳因為辯釋疑者是非耳兆別更立意客一難兆不能對客去已出門兆欲留之使人重呼還客曰親親在此營葬宜赴之後當更來也既去兆令人視葬家不見此客竟不知姓名兆年六十六卒有五子卓炤燿育臍氾毓氾毓字稚春濟北盧人也奕世儒素敦睦九族客居青州逮毓七世時人號其家兒無常父衣無常主毓少履高操安貧有志業父終居于墓所三十餘載至晦朔躬掃墳壠循行封樹還家則不出門庭或薦之武帝召補南陽王文學祕書郎太傅參軍並不就于時青土隱逸之士劉兆徐苗等皆務教授惟毓不蓄門人清淨自守時有好古慕德者諮詢亦傾懷開誘以一隅示之合三傳為之解注撰春秋釋疑肉刑論凡所述造七萬餘言年七十一卒徐苗徐苗字叔冑高密淳于人也累世相承皆以博士為郡守曾祖華有至行嘗宿亭舍夜有神人告之亭欲崩遽出得免祖邵為魏尚書郎以廉直見稱苗少家貧晝執鉏耒夜則吟誦弱冠與弟賈就博士濟南宋鈞受業遂為儒宗作五經同異評又依道家著玄微論前後所造數萬言皆有義味性抗烈輕財貴義兼有知人之鑒弟患口膿潰苗為吮之其兄弟皆早亡撫養孤遺慈愛聞于州里田宅奴婢盡推與之鄉鄰有死者便輟耕助營棺槨門生亡於家即斂於講堂其行己純至類皆如此遠近咸歸其義師其行焉郡察孝廉州辟從事治中別駕舉異行公府五辟博士再徵並不就武惠時計吏至臺帝輒訪其安不永寧二年卒遺命濯巾澣衣榆棺雜塼露車載尸葦席瓦器而已崔遊崔遊字子相上黨人也少好學儒術甄明恬靖謙退自少及長口未嘗語及財利魏末察孝廉除相府舍人出為氐池長甚有惠政以病免遂為廢疾泰始初武帝錄文帝故府僚屬就家拜郎中年七十餘猶敦學不倦撰喪服圖行於世及劉元海僭位命為御史大夫固辭不就卒於家時年九十三范隆范隆字玄嵩雁門人父方魏雁門太守隆在孕十五月生而父亡年四歲又喪母哀號之聲感慟行路單孤無緦功之親疏族范廣愍而養之迎歸教書為立祠堂隆好學修謹奉廣如父博通經籍無所不覽著春秋三傳撰三禮吉凶宗紀甚有條義惠帝時天下將亂隆隱迹不應州郡之命晝勤耕稼夜誦書典頗習祕曆陰陽之學知并州將有氛祲之祥故彌不復出仕與上黨朱紀友善嘗共紀游山見一父老於窮澗之濱父老曰二公何為在此隆等拜之仰視則不見後與紀依于劉元海元海以隆為大鴻臚紀為太常並封公隆死于劉聰之世聰贈太師杜夷杜夷字行齊廬江灊人也世以儒學稱為郡著姓夷少而恬泊操尚貞素居甚貧窘不營產業博覽經籍百家之書算曆圖緯靡不畢究寓居汝潁之間十載足不出門年四十餘始還鄉里閉門教授生徒千人惠帝時三察孝廉州命別駕永嘉初公車徵拜博士太傅東海王越辟並不就懷帝詔王公舉賢良方正刺史王敦以賀循為賢良夷為方正乃上疏曰臣聞有唐疇咨元凱時登漢武欽賢俊彥響應故能允協時雍敷崇盛化伏見太孫舍人會稽賀循處士廬江杜夷履道彌高清操絕俗思學融通才經王務循宰二縣皆有名績備僚東宮忠恪允著夷清虛沖淡與俗異軌考槃空谷肥遁匿跡蓋經國之良寶聘命之所急若得待詔公車承對冊問必有忠讜良謨弘益政道矣敦於是逼夷赴洛夷遁於壽陽鎮東將軍周馥傾心禮接引為參軍夷辭之以疾馥知不可屈乃自詣夷為起宅宇供其醫藥馥敗夷歸舊居道遇兵寇刺史劉陶告廬江郡曰昔魏文侯軾干木之閭齊相曹參尊崇蓋公皆所以優賢表德敦勵末俗徵士杜君德懋行潔高尚其志頃流離道路聞其頓躓刺史忝任不能崇飾有道而使高操之士有此艱屯今遣吏宣慰郡可遣一吏縣五吏營卹之常以市租供給家人糧廩勿令闕乏尋以胡寇又移渡江王導遣吏周贍之元帝為丞相教曰今大義穨替禮典無宗朝廷滯義莫能攸正宜特立儒林祭酒官以弘其事處士杜夷棲情遺遠確然絕俗才學精博道行優備其以夷為祭酒夷辭疾未嘗朝會帝常欲詣夷夷陳萬乘之主不宜往庶人之家帝乃與夷書曰吾與足下雖情在忘言然虛心歷載正以足下羸疾故欲相省寧論常儀也又除國子祭酒建武中令曰國子祭酒杜夷安貧樂道靜志衡門日不暇給雖原憲無以加也其賜穀二百斛皇太子三至夷第執經問義夷雖逼時命亦未嘗朝謁國有大政就夷諮訪焉明帝即位夷自表請退詔曰先王之道將墜於地君下帷研思今之劉楊搢紳之徒景仰軌訓豈得高退而朕靡所取則焉太寧元年卒年六十六贈大鴻臚諡曰貞子夷臨終遺命子晏曰吾少不出身頃雖見羈錄冠舄之飾未嘗加體其角巾素衣斂以時服殯葬之事務從簡儉亦不須苟取矯異也夷所著幽求子二十篇行於世晏仕至蒼梧太守夷兄弟三人兄崧字行高亦有志節惠帝時俗多浮偽著任子春秋以刺之弟援高平相援子潛右衞將軍董景道董景道字文博弘農人也少而好學千里追師所在惟晝夜讀誦略不與人交通明春秋三傳京氏易馬氏尚書韓詩皆精究大義三禮之義專遵鄭氏著禮通論非駁諸儒演廣鄭旨永平中知天下將亂隱於商洛山衣木葉食樹果彈琴歌笑以自娛毒蟲猛獸皆繞其傍是以劉元海及聰屢徵皆礙而不達至劉曜時出山廬于渭汭曜徵為太子少傅散騎常侍並固辭竟以壽終續咸續咸字孝宗上黨人也性孝謹敦重履道貞素好學師事京兆杜預專春秋鄭氏易教授常數十人博覽羣言高才善文論又修陳杜律明達刑書永嘉中歷廷尉平東安太守劉琨承制于并州以為從事中郎後遂沒石勒勒以為理曹參軍持法平詳當時稱其清裕比之于公著遠游志異物志汲冢古文釋皆十卷行於世年九十七死于石季龍之世季龍贈儀同三司徐邈徐邈東莞姑幕人也祖澄之為州治中屬永嘉之亂遂與鄉人臧琨等率子弟并閭里士庶千餘家南渡江家于京口父藻都水使者邈姿性端雅勤行勵學博涉多聞以慎密自居少與鄉人臧壽齊名下帷讀書不游城邑及孝武帝始覽典籍招延儒學之士邈既東州儒素太傅謝安舉以應選年四十四始補中書舍人在西省侍帝雖不口傳章句然開釋文義標明指趣撰正五經音訓學者宗之遷散騎常侍猶處西省前後十年每被顧問輒有獻替多所匡益甚見寵待帝宴集酣樂之後好為手詔詩章以賜侍臣或文詞率爾所言穢雜邈每應時收斂還省刊削皆使可觀經帝重覽然後出之是時侍臣被詔者或宣揚之故時議以此多邈及謝安薨論者或有異同邈固勸中書令王獻之奏加殊禮仍崇進謝石為尚書令玄為徐州邈轉祠部郎上南北郊宗廟迭毀禮皆有證據豫章太守范甯欲遣十五議曹下屬城採求風政并吏假還訊問官長得失邈與甯書曰知足下遣十五議曹各之一縣又吏假歸白所聞見誠是足下留意百姓故廣其視聽吾謂勸導以實不以文十五議曹欲何所敷宣邪庶事辭訟足下聽斷允塞則物理足矣上有理務之心則下之求理者至矣日昃省覽庶事無滯則吏慎其負而人聽不惑豈須邑至里詣飾其游聲哉非徒不足致益乃是蠶漁之所資又不可縱小吏為耳目也豈有善人君子而干非其事多所告白者乎君子之心誰毀誰譽如有所譽必由歷試如有所毀必以著明託社之鼠政之甚害自古以來欲為左右耳目者無非小人皆先因小忠而成其大不忠先藉小信而成其大不信遂使君子道消善人輿尸前史所書可為深鑒足下選綱紀必得國士足以攝諸曹諸曹皆是良吏則足以掌文案又擇公方之人以為監司則清濁能否與事而明足下但平心居宗何取於耳目哉昔明德馬后未嘗顧與左右言可謂遠識況大丈夫而不能免此乎遷中書侍郎專掌綸詔帝甚親昵之初范甯與邈皆為帝所任使共補朝廷之闕甯才素高而措心正直遂為王國寶所讒出守遠郡邈孤宦易危而無敢排強族乃為自安之計會帝頗疏會稽王道子邈欲和協之因從容言於帝曰昔淮南齊王漢晉成戒會稽王雖有酣媟之累而奉上純一宜加弘貸消散紛議外為國家之計內慰太后之心帝納焉邈嘗詣東府遇衆賓沈湎引滿諠譁道子曰君時有暢不邈對曰邈陋巷書生惟以節儉清修為暢耳道子以邈業尚道素笑而不以為忤也道子將用為吏部郎邈以波競成俗非己所能節制苦辭乃止時皇太子尚幼帝甚鍾心文武之選皆一時之俊以邈為前衞率領本郡大中正授太子經帝謂邈曰雖未敕以師禮相待然不以博士相遇也古之帝王受經必敬自魏晉以來多使微人教授號為博士不復尊以為師故帝有云邈雖在東宮猶朝夕入見參綜朝政修飾文詔拾遺補闕劬勞左右帝嘉其謹密方之於金霍有託重之意將進顯位未及行而帝暴崩安帝即位拜驍騎將軍隆安元年遭父憂邈先疾患因哀毀增篤不踰年而卒年五十四州里傷悼識者悲之邈莅官簡惠達於從政論議精密當時多諮稟之觸類辯釋問則有對舊疑歲辰在卯此宅之左則彼宅之右何得俱忌於東邈以為太歲之屬自是遊神譬如日出之時向東皆逆非為藏體地中也所注穀梁傳見重於時邈長子豁有父風以孝聞為太常博士祕書郎豁弟浩散騎侍郎鎮南將軍何無忌請為功曹出補西陽太守與無忌俱為盧循所害邈弟廣別有傳孔衍孔衍字舒元魯國人孔子二十二世孫也祖文魏大鴻臚父毓征南軍司衍少好學年十二能通詩書弱冠公府辟本州舉異行直言皆不就避地江東元帝引為安東參軍專掌記室書令殷積而衍每以稱職見知中興初與庾亮俱補中書郎明帝之在東宮領太子中庶子于時庶事草創衍經學深博又練識舊典朝儀軌制多取正焉由是元明二帝並親愛之王敦專權衍私於太子曰殿下宜博延朝彥搜揚才俊詢謀時政以廣聖聰敦聞而惡之乃啟出衍為廣陵郡時人為之寒心而衍不形于色雖郡鄰接西賊猶教誘後進不以戎務廢業石勒嘗騎至山陽敕其黨以衍儒雅之士不得妄入郡境視職朞月以太興三年卒於官年五十三衍雖不以文才著稱而博覽過於賀循凡所撰述百餘萬言子啟廬陵太守宗人夷吾有美名博學不及衍涉世聲譽過之元帝以為主簿轉參軍稍遷侍中徙太子左衞率卒追贈太僕范宣范宣字宣子陳留人也年十歲能誦詩書嘗以刀傷手捧手改容人問痛邪答曰不足為痛但受全之體而致毀傷不可處耳家人以其年幼而異焉少尚隱遁加以好學手不釋卷以夜繼日遂博綜衆書尤善三禮家至貧儉躬耕供養親沒負土成墳廬于墓側太尉郗鑒命為主簿詔徵太學博士散騎郎並不就家于豫章太守殷羨見宣茅茨不完欲為改宅宣固辭之庾爰之以宣素貧加年荒疾疫厚餉給之宣又不受爰之問宣曰君博學通綜何以太儒宣曰漢興貴經術至於石渠之論實以儒為弊正始以來世尚老莊逮晉之初競以裸裎為高僕誠太儒然丘不與易宣言談未嘗及老莊客有問人生與憂俱生不知此語何出宣云出莊子至樂篇客曰君言不讀老莊何由識此宣笑曰小時嘗一覽時人莫之測也宣雖閑居屢空常以講誦為業譙國戴逵等皆聞風宗仰自遠而至諷誦之聲有若齊魯太元中順陽范甯為豫章太守甯亦儒博通綜在郡立鄉校教授數百人由是江州人士並好經學化二范之風也年五十四卒著禮易論難皆行於世子輯歷郡守國子博士大將軍從事中郎自免歸亦以講授為事義熙中連徵不至韋謏韋謏字憲道京兆人也雅好儒學善著述於羣言祕要之義無不綜覽仕於劉曜為黃門郎後又入石季龍署為散騎常侍歷守七郡咸以清化著名又徵為廷尉識者擬之于張前後四登九列六在尚書二為侍中再為太子太傅封京兆公好直諫陳軍國之宜多見允納著伏林三千餘言遂演為典林二十三篇凡所述作及集記世事數十萬言皆深博有才義至冉閔又署為光祿大夫時閔拜其子胤為大單于而以降胡一千處之麾下謏諫曰今降胡數千接之如舊誠是招誘之恩然胡羯本為仇敵今之款附苟全性命耳或有刺客變起須臾敗而悔之何所及也古人有言一夫不可狃而況千乎願誅屏降胡去單于之號深思聖王苞桑之誡也閔志在綏撫銳於澄定聞其言大怒遂誅之并殺其子伯陽謏性不嚴重好徇己之功論者亦以是少之嘗謂伯陽曰我高我曾重光累徽我祖我考父父子子汝為我對正值惡抵伯陽曰伯陽之不肖誠如尊教尊亦正值軟抵耳謏慚無言時人傳之以為嗤笑范弘之范弘之字長文安北將軍汪之孫也襲爵武興侯雅正好學以儒術該明為太學博士時衞將軍謝石薨請諡下禮官議弘之議曰石階藉門蔭屢登崇顯總司百揆翼贊三臺閑練庶事勤勞匪懈內外僉議皆曰與能當淮肥之捷勳拯危墜雖皇威遐震狡寇天亡因時立功石亦與焉又開建學校以延冑子雖盛化未洽亦愛禮存羊然古之賢輔大則以道事君侃侃終日次則厲身奉國夙夜無怠下則愛人惜力以濟時務此數者然後可以免惟塵之譏塞素餐之責矣今石位居朝端任則論道唱言無忠國之謀守職則容身而已不可謂事君貨黷京邑聚斂無厭不可謂厲身坐擁大衆侵食百姓大東流於遠近怨毒結於衆心不可謂愛人工徒勞於土木思慮殫於機巧紈綺盡於婢妾財用縻於絲桐不可謂惜力此人臣之大害有國之所去也先王所以正風俗理人倫者莫尚乎節儉故夷吾受謗乎三歸平仲流美於約己自頃風軌陵遲奢僭無度廉恥不興利競交馳不可不深防原本以絕其流漢文襲弋綈之服諸侯猶侈武帝焚雉頭之裘靡麗不息良由儉德雖彰而威禁不肅道自我建而刑不及物若存罰其違亡貶其惡則四維必張禮義行矣案諡法因事有功曰襄貪以敗官曰墨宜諡曰襄墨公又論殷浩宜加贈諡不得因桓溫之黜以為國典仍多溫移鼎之迹時謝族方顯桓宗猶盛尚書僕射王珣溫故吏也素為溫所寵三怨交集乃出弘之為餘杭令將行與會稽王道子牋曰下官輕微寒士謬得廁在俎豆實懼辱累清流惟塵聖世竊以人君居廟堂之上智周四海之外者非徒聰明內照亦賴羣言之助也是以舜之佐堯以啟闢為首咎繇禹以侃侃為先故下無隱情之責上收神明之功敢緣斯義志在輸盡常以謝石黷累應被清澄殷浩忠貞宜蒙褒顯是以不量輕弱先衆言之而惡直醜正其徒實繁雖仰恃聖主欽明之度俯賴明公愛物之隆而交至之患實有無賴下官與石本無怨忌生不相識事無相干正以國體宜明不應稍計強弱與浩年時邈絕世不相及無復藉聞故老語其遺事耳於下官之身有何痛癢而當為之犯時干主邪每觀載籍志士仁人有發中心任直道而行者有懷知陽愚負情曲從者所用雖異而並傳後世故比干處三仁之中箕子為名賢之首後人用捨參差不同各信所見率應而至或榮名顯赫或禍敗係踵此皆不量時趣以身嘗禍雖有硜硜之稱而非大雅之致此亦下官所不為也世人乃云下官正直能犯艱難斯談實過下官知主上聖明明公虛己思求格言必不使盡忠之臣屈於邪枉之門也是以敢獻愚誠布之執事豈與昔人擬其輕重邪亦以臣之事君惟思盡忠而已不應復計利鈍事不允心則讜言悟主義感於情則陳辭靡悔若懷情藏意蘊而不言此乃古人所以得罪於明君明君所以致法於羣下者也桓溫事跡布在天朝逆順之情暴之四海在三者臣子情豈或異凡厥黔首誰獨無心舉朝嘿嘿未有唱言者是以頓筆按氣不敢多云桓溫於亡祖雖其意難測求之於事止免黜耳非有至怨也亡父昔為溫吏推之情禮義兼他人所以每懷憤發痛若身首者明公有以尋之王珣以下官議殷浩諡不宜暴揚桓溫之惡珣感其提拔之恩懷其入幙之遇託以廢黜昏闇建立聖明自謂此事足以明其忠貞之節明公試復以一事觀之昔周公居攝道致升平禮樂刑政皆自己出以德言之周公大聖以年言之成王幼弱猶復遽避君位復子明辟漢之霍光大勳赫然孝宣年未二十亦反萬機故能君臣俱隆道邁千歲若溫忠為社稷誠存本朝便當仰遵二公式是令矩何不奉還萬機退守藩屏方提勒公王匡總朝廷豈為先帝幼弱未可親政邪將德桓溫不能聽政邪又逼脅袁宏使作九錫備物光赫其文具存朝廷畏怖莫不景從惟謝安王坦之以死守之故得稽留耳會上天降怒姦惡自亡社稷危而復安靈命墜而復構晉自中興以來號令威權多出強臣中宗肅祖斂衽於王敦先皇受屈於桓氏今主上親覽萬機明公光讚百揆政出王室人無異望復不於今大明國典作制百代不審復欲待誰先王統物必明其典誥貽厥孫謀故令問休嘉千歲承風願明公遠覽殷周近察漢魏慮其所以危求其所以安如此而已又與王珣書曰見足下答仲堪書深具義發之懷夫人道所重莫過君親君親所係忠孝而已孝以揚親為主忠以節義為先殷侯忠貞居正心貫人神加與先帝隆布衣之好著莫逆之契契闊艱難夷嶮以之雖受屈姦雄志達千載此忠貞之徒所以義干其心不獲以已者也既當時貞烈之徒所究見亦後生所備聞吾亦何敢苟避狂狡以欺聖明足下不推居正之大致而懷知己之小惠欲以幙府之小節奪名教之重義於君臣之際既以虧矣尊大君以殷侯協契忠規同戴王室志厲秋霜誠貫一時殷侯所以得宣其義聲實尊大君協贊之力也足下不能光大君此之直志乃感溫小顧懷其曲澤公在聖世欺罔天下使丞相之德不及三葉領軍之基一構而傾此忠臣所以解心孝子所以喪氣父子之道固若是乎足下言臣則非忠語子則非孝二者既亡吾誰畏哉吾少嘗過庭備聞祖考之言未嘗不發憤衝冠情見乎辭當爾之時惟覆亡是懼豈暇謀及國家不圖今日得操筆斯事是以上憤國朝無正義之臣次惟祖考有沒身之恨豈得與足下同其肝膽邪先君往亦嘗為其吏于時危懼不自保仰首聖朝心口憤歎豈復得計策名昔日自同在三邪昔子政以五世純臣子駿以下委質王莽先典既已正其逆順後人亦已鑒其成敗每讀其事未嘗不臨文痛歎憤愾交懷以今況古乃知一揆耳弘之詞雖亮直終以桓謝之故不調卒於餘杭令年四十七王歡王歡字君厚樂陵人也安貧樂道專精耽學不營產業常丐食誦詩雖家無斗儲意怡如也其妻患之或焚毀其書而求改嫁歡笑而謂之曰卿不聞朱買臣妻邪時聞者多哂之歡守志彌固遂為通儒至慕容暐襲偽號署為國子博士親就受經遷祭酒及暐為苻堅所滅歡死於長安史臣曰范平等學府儒宗譽隆望重或質疑是屬或師範攸歸雖為未及古人故亦一時之俊若仲寧之清貞守道抗志柴門行齊之居室屢空棲心陋巷文博之漱流枕石鏟跡銷聲宣子之樂道安貧弘風闡教斯並通儒之高尚者也而邈協和主相刊削繁辭可謂將順其美匡救其惡舒元入參機務明主賞其博聞出莅邊隅獷狄欽其明德弘之抗言立論不避朝權貶石抵溫斯為當矣遂乃厄於三怨以至陵遲悲夫贊曰郁郁周文洋洋漢典炙輠流譽解頤飛辯雅誥弗淪微言復顯爰及晉代斯風逾闡
