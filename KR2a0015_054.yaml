body:
  text: 晉書卷五十四列傳第二十四陸機孫拯陸機字士衡吳郡人也祖遜吳丞相父抗吳大司馬機身長七尺其聲如鐘少有異才文章冠世伏膺儒術非禮不動抗卒領父兵為牙門將年二十而吳滅退居舊里閉門勤學積有十年以孫氏在吳而祖父世為將相有大勳於江表深慨孫晧舉而棄之乃論權所以得晧所以亡又欲述其祖父功業遂作辨亡論二篇其上篇曰昔漢氏失御姦臣竊命禍基京畿毒遍宇內皇綱弛頓王室遂卑於是羣雄蜂駭義兵四合吳武烈皇帝慷慨下國電發荊南權略紛紜忠勇伯世威稜則夷羿震蕩兵交則醜虜授馘遂掃清宗祊蒸禋皇祖于時雲興之將帶州猋起之師跨邑哮闞之羣風驅熊羆之族霧合雖兵以義動同盟勠力然皆苞藏禍心阻兵怙亂或師無謀律喪威稔寇忠規武節未有如此其著者也武烈既沒長沙桓王逸才命世弱冠秀發招攬遺老與之述業神兵東驅奮寡犯衆攻無堅城之將戰無交鋒之虜誅叛柔服而江外底定飭法修師則威德翕赫賓禮名賢而張公為之雄交御豪俊而周瑜為之傑彼二君子皆弘敏而多奇雅達而聰哲故同方者以類附等契者以氣集江東蓋多士矣將北伐諸華誅鉏干紀旋皇輿於夷庚反帝坐於紫闥挾天子以令諸侯清天步而歸舊物戎車既次羣凶側目大業未就中世而殞用集我大皇帝以奇蹤襲逸軌睿心因令圖從政咨於故實播憲稽乎遺風而加之以篤敬申之以節儉疇咨俊茂好謀善斷束帛旅於丘園旌命交乎塗巷故豪彥尋聲而響臻志士睎光而景騖異人輻輳猛士如林於是張公為師傅周瑜陸公魯肅呂蒙之儔入為腹心出為股肱甘寧凌統程普賀齊朱桓朱然之徒奮其威韓當潘璋黃蓋蔣欽周泰之屬宣其力風雅則諸葛瑾張承步騭以名聲光國政事則顧雍潘濬呂範呂岱以器任幹職奇偉則虞翻陸績張惇以風義舉政奉使則趙咨沈珩以敏達延譽術數則吳範趙達以禨祥協德董襲陳武殺身以衛主駱統劉基強諫以補過謀無遺計舉不失策故遂割據山川跨制荊吳而與天下爭衡矣魏氏嘗藉戰勝之威率百萬之師浮鄧塞之舟下漢陰之衆羽楫萬計龍躍順流鋭師千旅武步原隰謨臣盈室武將連衡喟然有吞江滸之志一宇宙之氣而周瑜驅我偏師黜之赤壁喪旗亂轍僅而獲免收迹遠遁漢王亦憑帝王之號帥巴漢之人乘危騁變結壘千里志報關羽之敗圖收湘西之地而我陸公亦挫之西陵覆師敗績困而後濟絶命永安續以濡須之寇臨川摧鋭蓬蘢之戰孑輪不反由是二邦之將喪氣挫鋒勢衄財匱而吳莞然坐乘其弊故魏人請好漢氏乞盟遂躋天號鼎跱而立西界庸益之郊北裂淮漢之涘東苞百越之地南括羣蠻之表於是講八代之禮搜三王之樂告類上帝拱揖羣后武臣毅卒循江而守長棘徑鎩望猋而奮庶尹盡規於上黎元展業於下化協殊裔風衍遐圻乃俾一介行人撫巡外域巨象逸駿擾於外間明珠瑋寶耀於內府珍瑰重迹而至奇玩應響而赴輶軒騁於南荒衝輣息於朔野黎庶免干戈之患戎馬無晨服之虞而帝業固矣大皇既沒幼主蒞朝姦回肆虐景皇聿興虔修遺憲政無大闕守文之良主也降及歸命之初典刑未滅故老猶存大司馬陸公以文武熙朝左丞相陸凱以謇諤盡規而施績范慎以威重顯丁奉鍾離斐以武毅稱孟宗丁固之徒為公卿樓玄賀邵之屬掌機事元首雖病股肱猶良爰逮末葉羣公既喪然後黔首有瓦解之患皇家有土崩之釁曆命應化而微王師躡運而發卒散于陳衆奔于邑城池無藩籬之固山川無溝阜之勢非有工輸雲梯之械智伯灌激之害楚子築室之圍燕人濟西之隊軍未浹辰而社稷夷矣雖忠臣孤憤烈士死節將奚救哉夫曹劉之將非一世所選向時之師無曩日之衆戰守之道抑有前符險阻之利俄然未改而成敗貿理古今詭趣何哉彼此之化殊授任之才異也其下篇曰昔三方之王也魏人據中夏漢氏有岷益吳制荊揚而掩有交廣曹氏雖功濟諸華虐亦深矣其人怨劉翁因險以飾智功已薄矣其俗陋夫吳桓王基之以武太祖成之以德聰明睿達懿度弘遠矣其求賢如弗及恤人如稚子接士盡盛德之容親仁罄丹府之愛拔呂蒙於戎行試潘濬於係虜推誠信士不恤人之我欺量能授器不患權之我逼執鞭鞠躬以重陸公之威悉委武衛以濟周瑜之師卑宮菲食豐功臣之賞披懷虛己納謨士之算故魯肅一面而自託士燮蒙險而效命高張公之德而省遊田之娛賢諸葛之言而割情欲之歡感陸公之規而除刑法之煩奇劉基之議而作三爵之誓屏氣局蹐以伺子明之疾分滋損甘以育凌統之孤登壇慷愾歸魯子之功削投怨言信子瑜之節是以忠臣競盡其謨志士咸得肆力洪規遠略固不厭夫區區者也故百官苟合庶務未遑初都建鄴羣臣請備禮秩天子辭而弗許曰天下其謂朕何宮室輿服蓋慊如也爰及中葉天人之分既定故百度之缺粗修雖醲化懿綱未齒乎上代抑其體國經邦之具亦足以為政矣地方幾萬里帶甲將百萬其野沃其兵練其器利其財豐東負滄海西阻險塞長江制其區宇峻山帶其封域國家之利未見有弘於茲者也借使守之以道御之以術敦率遺典勤人謹政修定策守常險則可以長世永年未有危亡之患也或曰吳蜀脣齒之國也夫蜀滅吳亡理則然矣夫蜀蓋藩援之與國而非吳人之存亡也其郊境之接重山積險陸無長轂之徑川厄流迅水有驚波之艱雖有鋭師百萬啓行不過千夫軸轤千里前驅不過百艦故劉氏之伐陸公喻之長蛇其勢然也昔蜀之初亡朝臣異謀或欲積石以險其流或欲機械以禦其變天子總羣議以咨之大司馬陸公公以四瀆天地之所以節宣其氣固無可遏之理而機械則彼我所共彼若棄長技以就所屈即荊楚而爭舟楫之用是天贊我也將謹守峽口以待擒耳逮步闡之亂憑寶城以延強寇資重幣以誘羣蠻于時大邦之衆雲翔電發懸旍江介築壘遵渚襟帶要害以止吳人之西巴漢舟師沿江東下陸公偏師三萬北據東坑深溝高壘按甲養威反虜踠迹待戮而不敢北窺生路強寇敗績宵遁喪師太半分命鋭師五千西禦水軍東西同捷獻俘萬計信哉賢人之謀豈欺我哉自是烽燧罕驚封域寡虞陸公沒而潛謀兆吳釁深而六師駭夫太康之役衆未盛乎曩日之師廣州之亂禍有愈乎向時之難而邦家顛覆宗廟為墟嗚呼人之云亡邦國殄瘁不其然歟易曰湯武革命順乎天或曰亂不極則治不形言帝王之因天時也古人有言曰天時不如地利易曰王侯設險以守其國言為國之恃險也又曰地利不如人和在德不在險言守險之在人也吳之興也參而由焉孫卿所謂合其參者也及其亡也恃險而已又孫卿所謂舍其參者也夫四州之萌非無衆也大江以南非乏俊也山川之險易守也徑利之器易用也先政之策易修也功不興而禍遘何哉所以用之者失也故先王達經國之長規審存亡之至數謙己以安百姓敦惠以致人和寬沖以誘俊之謀慈和以結士庶之愛是以其安也則黎元與之同慶及其危也則兆庶與之同患安與衆同慶則其危不可得也危與下同患則其難不足恤也夫然故能保其社稷而固其土宇麥秀無悲殷之思黍離無愍周之感也至太康末與弟雲俱入洛造太常張華華素重其名如舊相識曰伐吳之役利獲二俊又嘗詣侍中王濟濟指羊酪謂機曰卿吳中何以敵此答云千里蓴羹未下鹽豉時人稱為名對張華薦之諸公後太傅楊駿辟為祭酒會駿誅纍遷太子洗馬著作郎范陽盧志於衆中問機曰陸遜陸抗於君近遠機曰如君於盧育盧珽志默然既起雲謂機曰殊邦遐遠容不相悉何至於此機曰我父祖名播四海寧不知邪議者以此定二陸之優劣吳王晏出鎮淮南以機為郎中令遷尚書中兵郎轉殿中郎趙王倫輔政引為相國參軍豫誅賈謐功賜爵關中侯倫將篡位以為中書郎倫之誅也齊王冏以機職在中書九錫文及禪詔疑機與焉遂收機等九人付廷尉賴成都王穎吳王晏並救理之得減死徙邊遇赦而止初機有駿犬名曰黃耳甚愛之既而羈寓京師久無家問笑語犬曰我家絶無書信汝能齎書取消息不犬搖尾作聲機乃為書以竹筒盛之而繫其頸犬尋路南走遂至其家得報還洛其後因以為常時中國多難顧榮戴若思等咸勸機還吳機負其才望而志匡世難故不從冏既矜功自伐受爵不讓機惡之作豪士賦以刺焉其序曰夫立德之基有常而建功之路不一何則修心以為量者存乎我因物以成務者係乎彼存乎我者隆殺止乎其域係乎彼者豐約惟所遭遇落葉俟微飈以隕而風之力蓋寡孟嘗遭雍門以泣而琴之感以末何哉欲隕之葉無所假烈風將墜之泣不足煩哀響也是故苟時啓於天理盡於人庸夫可以濟聖賢之功斗筲可以定烈士之業故曰才不半古功已倍之蓋得之於時世也歷觀今古徼一時之功而居伊周之位者有矣夫我之自我智士猶嬰其纍物之相物昆蟲皆有此情夫以自我之量而挾非常之勳神器暉其顧眄萬物隨其俯仰心玩居常之安耳飽從諛之説豈識乎功在身外任出才表者哉且好榮惡辱有生之所大期忌盈害上鬼神猶且不免人主操其常柄天下服其大節故曰天可讐乎而時有袨服荷戟立乎廟門之下援旗誓衆奮於阡陌之上況乎世主制命自下裁物者乎廣樹恩不足以敵怨勤興利不足以補害故曰代大匠斫者必傷其手且夫政由寧氏忠臣所以慷慨祭則寡人人主所不久堪是以君奭怏怏不悅公旦之舉高平師師側目博陸之勢而成王不遣嫌吝於懷宣帝若負芒刺於背非其然者歟嗟乎光于四表德莫富焉王曰叔父親莫昵焉登帝天位功莫厚焉守節沒齒忠莫至焉而傾側顛沛僅而自全則伊生抱明允以嬰戮文子懷忠敬而齒劍固其所也因斯以言夫以篤聖穆親如彼之懿大德至忠如此之盛尚不能取信於人主之懷止謗於衆多之口過此以往惡覩其可安危之理斷可識矣又況乎叨大名以冒道家之忌運短才而易聖哲所難者哉身危由於勢過而不知去勢以求安禍積起於寵盛而不知辭寵以招福見百姓之謀己則申宮警守以崇不畜之威懼萬方之不服則嚴刑峻制以賈傷心之怨然後威窮乎震主而怨行乎上下衆心日陊危機將發而方偃仰瞪眄謂足以夸世笑古人之未工忘己事之已拙知曩勳之可矜暗成敗之有會是以事窮運盡必有顛仆風起塵合而禍至常酷也聖人忌功名之過己惡寵祿之踰量蓋為此也夫惡欲之大端賢愚所共有而遊子殉高位於生前志士思垂名於身後受生之分惟此而已夫蓋世之業名莫盛焉率意無違欲莫順焉借使伊人頗覽天道知盡不可益盈難久持超然自引高揖而退則巍巍之盛仰邈前賢洋洋之風俯觀來籍而大欲不止於身至樂無愆乎舊節彌效而德彌廣身逾逸而名逾劭此之不為而彼之必昧然後河海之迹堙為窮流一匱之釁積成山嶽名編凶頑之條身厭荼毒之痛豈不謬哉故聊為賦焉庶使百世少有悟云冏不之悟而竟以敗機又以聖王經國義在封建因採其遠指著五等論曰夫體國經野先王所慎創制垂基思隆後葉然而經略不同長世異術五等之制始於黃唐郡縣之治創於秦漢得失成敗備在典謨是以其詳可得而言夫王者知帝業至重天下至廣廣不可以偏制重不可以獨任任重必於借力制廣終乎因人故設官分職所以輕其任也並建伍長所以弘其制也於是乎立其封疆之典裁其親疏之宜使萬國相維以成盤石之固宗庶雜居而定維城之業又有以見綏世之長御識人情之大方知其為人不如厚己利物不如圖身安上在於悅下為己存乎利人故易曰悅以使人人忘其勞孫卿曰不利而利之不如利而後利之利也是以分天下以厚樂則己得與之同憂饗天下以豐利而己得與之共害利博而恩篤樂遠則憂深故諸侯享食土之實萬國受傳世之祚夫然則南面之君各務其政九服之內知有定主上之子愛於是乎生下之禮信於是乎結世平足以敦風道衰足以禦暴故強毅之國不能擅一時之勢雄俊之人無所寄霸王之志然後國安由萬邦之思化主尊賴羣后之圖身譬猶衆目營方則天網自昶四體辭難而心膂獲蓋三代所以直道四王所以垂業也夫盛衰隆弊理所固有教之廢興繫乎其人原法期於必諒明道有時而暗故世及之制弊於強禦厚下之典漏於末折侵弱之釁遘自三季陵夷之禍終乎七雄昔成湯親照夏后之鑒公旦目涉商人之戒文質相濟損益有物然五等之禮不革于時封畛之制有隆爾者豈玩二王之禍而暗經世之算乎固知百世非可懸御善制不能無弊而侵弱之辱愈於殄祀土崩之困痛於陵夷也是以經始獲其多福慮終取其少禍非謂侯伯無可亂之符郡縣非興化之具故國憂賴其釋位主弱憑於翼戴及承微積弊王室遂卑猶保名位祚垂後嗣皇統幽而不輟神器否而必存者豈非事勢使之然歟降及亡秦棄道任術懲周之失自矜其得尋斧始於所庇制國昧於弱下國慶獨饗其利主憂莫與共害雖速亡趨亂不必一道顛沛之釁實由孤立是蓋思五等之小怨亡萬國之大德知陵夷之可患暗土崩之為痛也周之不競有自來矣國乏令主十有餘世然片言勤王諸侯必應一朝振矜遠國先叛故強晉收其請隧之圖暴楚頓其觀鼎之志豈劉項之能窺關勝廣之敢號澤哉借使秦人因循其制雖則無道有與共亡覆滅之禍豈在曩日漢矯秦枉大啓王侯境土踰溢不遵舊典故賈生憂其危朝錯痛其亂是以諸侯岨其國家之富憑其士庶之力勢足者反疾土狹者逆遲六臣犯其弱綱七子衝其漏網皇祖夷於黔徒西京病於東帝是蓋過正之災而非建侯之纍也然呂氏之難朝士外顧宋昌策漢必稱諸侯逮至中葉忌其失節割削宗子有名無實天下曠然復襲亡秦之軌矣是以五侯作威不忌萬國新都襲漢易於拾遺也光武中興纂隆皇統而由遵覆車之遺轍養喪家之宿疾僅及數世姦宄充斥卒有強臣專朝則天下風靡一夫從衡而城池自夷豈不危哉在周之衰難興王室放命者七臣干位者三子嗣王委其九鼎凶族據其天邑鉦鼙震於閫宇鋒鏑流於絳闕然禍止畿甸害不覃及天下晏然以安待危是以宣王興於共和襄惠振於晉鄭豈若二漢階闥暫擾而四海已沸嬖臣朝入九服夕亂哉遠惟王莽篡逆之事近覽董卓權之際億兆悼心愚智同痛然周以之存漢以之亡夫何故哉豈世乏曩時之臣士無匡合之志歟蓋遠績屈於時異雄心挫於卑勢耳故烈士扼腕終委寇讐之手中人變節以助虐國之桀雖復時有鳩合同志以謀王室然上非奧主下皆市人師旅無先定之班君臣無相保之志是以義兵雲合無救劫殺之禍衆望未改而已見大漢之滅矣或以諸侯世位不必常全昏主暴君有時比迹故五等所以多亂今之牧守皆官方庸能雖或失之其得固多故郡縣易以為政夫德之休明黜陟日用長率連屬咸述其職而淫昏之君無所容過何則其不治哉故先代有以興矣苟或衰陵百度自悖鬻官之吏以貨準財則貪殘之萌皆羣后也安在其不亂哉故後王有以之廢矣且要而言之五等之君為己思政郡縣之長為吏圖物何以徵之蓋企及進取仕子之常志修己安人良士所希及夫進取之情鋭而安人之譽遲是故侵百姓以利己者在位所不憚損實事以養名者官長所夙慕也君無卒歲之圖臣挾一時之志五等則不然知國為己土衆皆我民民安己受其利國傷家嬰其病故前人欲以垂後後嗣思其堂構為上無苟且之心羣下知膠固之義使其並賢居政則功有厚薄兩愚處亂則過有深淺然則八代之制幾可以一理貫秦漢之典殆可以一言蔽也時成都王穎推功不居勞謙下士機既感全濟之恩又見朝廷屢有變難謂穎必能康隆晉室遂委身焉穎以機參大將軍軍事表為平原內史太安初穎與河間王顒起兵討長沙王假機後將軍河北大都督督北中郎將王粹冠軍牽秀等諸軍二十餘萬人機以三世為將道家所忌又羈旅入宦頓居羣士之右而王粹牽秀等皆有怨心固辭都督穎不許機鄉人孫惠亦勸機讓都督於粹機曰將謂吾為首鼠避賊適所以速禍也遂行穎謂機曰若功成事定當爵為郡公位以台司將軍勉之矣機曰昔齊桓任夷吾以建九合之功燕惠疑樂毅以失垂成之業今日之事在公不在機也穎左長史盧志心害機寵言於穎曰陸機自比管樂擬君暗主自古命將遣師未有臣陵其君而可以濟事者也穎默然機始臨戎而牙旗折意甚惡之列軍自朝歌至於河橋鼓聲聞數百里漢魏以來出師之盛未嘗有也長沙王奉天子與機戰於鹿苑機軍大敗赴七里澗而死者如積焉水為之不流將軍賈稜皆死之初宦人孟玖弟超並為穎所嬖寵超領萬人為小都督未戰縱兵大掠機録其主者超將鐵騎百餘人直入機麾下奪之顧謂機曰貉奴能作督不機司馬孫拯勸機殺之機不能用超宣言於衆曰陸機將反又還書與玖言機持兩端軍不速決及戰超不受機節度輕兵獨進而沒玖疑機殺之遂譖機於穎言其有異志將軍王闡郝昌公師藩等皆玖所用與牽秀等共證之穎大怒使秀密收機其夕機夢黑幰繞車手決不開天明而秀兵至機釋戎服著白帢與秀相見神色自若謂秀曰自吳朝傾覆吾兄弟宗族蒙國重恩入侍帷幄出剖符竹成都命吾以重任辭不獲已今日受誅豈非命也因與穎箋詞甚悽惻既而歎曰華亭鶴唳豈可復聞乎遂遇害於軍中時年四十三二子蔚夏亦同被害機既死非其罪士卒痛之莫不流涕是日昏霧晝合大風折木平地尺雪議者以為陸氏之寃機天才秀逸辭藻宏麗張華嘗謂之曰人之為文常恨才少而子更患其多弟雲嘗與書曰君苗見兄文輒欲燒其筆硯後葛洪著書稱機文猶玄圃之積玉無非夜光焉五河之吐流泉源如一焉其弘麗妍贍英鋭漂逸亦一代之絶乎其為人所推服如此然好遊權門與賈謐親善以進趣獲譏所著文章凡三百餘篇並行於世孫拯者字顯世吳都富春人也能屬文仕吳為黃門郎孫晧世侍臣多得罪惟拯與顧榮以智全吳平後為涿令有稱績機既為孟玖等所誣收拯考掠兩踝骨見終不變辭門生費慈宰意二人詣獄明拯拯譬遣之曰吾義不可誣枉知故卿何宜復爾二人曰僕亦安得負君拯遂死獄中而慈意亦死陸雲弟耽從父兄喜雲字士龍六歲能屬文性清正有才理少與兄機齊名雖文章不及機而持論過之號曰二陸幼時吳尚書廣陵閔鴻見而奇之曰此兒若非龍駒當是鳳雛後舉雲賢良時年十六吳平入洛機初詣張華華問雲何在機曰雲有笑疾未敢自見俄而雲至華為人多姿制又好帛繩鬚雲見而大笑不能自已先是嘗著縗絰上船於水中顧見其影因大笑落水人救獲免雲與荀隱素未相識嘗會華坐華曰今日相遇可勿為常談雲因抗手曰雲間陸士龍隱曰日下荀鳴鶴鳴鶴隱字也雲又曰既開青雲覩白雉何不張爾弓挾爾矢隱曰本謂是雲龍騤騤乃是山鹿野麋獸微弩強是以發遲華撫手大笑刺史周浚召為從事謂人曰陸士龍當今之顏子也俄以公府掾為太子舍人出補浚儀令縣居都會之要名為難理雲到官肅然下不能欺市無二價人有見殺者主名不立雲録其妻而無所問十許日遣出密令人隨後謂曰其去不出十里當有男子候之與語便縛來既而果然問之具服云與此妻通共殺其夫聞妻得出欲與語憚近縣故遠相要候於是一縣稱其神明郡守害其能屢譴責之雲乃去官百姓追思之圖畫形象配食縣社尋拜吳王晏郎中令晏於西園大營第室雲上書曰臣竊見世祖武皇帝臨朝拱默訓世以儉即位二十有六載宮室臺榭無所新營屢發明詔厚戒豐奢國家纂承務在遵奉而世俗陵遲家競盈溢漸漬波蕩遂已成風雖嚴詔屢宣而侈俗滋廣每觀詔書衆庶歎息清河王昔起墓宅時手詔追述先帝節儉之教懇切之旨形于四海清河王毀壞成宅以奉詔命海內聽望咸用欣然臣愚以先帝遺教日以陵替今與國家協崇大化追闡前蹤者實在殿下先敦素朴而後可以訓正四方凡在崇麗一宜節之以制然後上厭帝心下允時望臣以凡才特蒙拔擢亦思竭忠效節以報所受之施是以不慮犯忤敢陳所懷如愚臣言有可采乞垂三省時晏信任部將使覆察諸官錢帛雲又陳曰伏見令書以部曲將李咸馮南司馬吳定給使徐泰等覆校諸官市買錢帛簿臣愚以聖德龍興光有大國選衆官材庶工肄業中尉該大農誕皆清廉淑慎恪居所司其下衆官悉州閭一介疏暗之咎雖可日聞至於處義用情庶無大戾今咸南軍旅小人定泰士卒廝賤非有清慎素著忠公足稱大臣所關猶謂未詳咸等督察然後得信既非開國勿用之義又傷殿下推誠曠蕩之量雖使咸等能盡節益國而功利百倍至於光輔國美猶未若開懷信士之無失況所益不過姑息之利而使小人用事大道陵替此臣所以慷慨也臣備位大臣職在獻可苟有管見敢不盡規愚以宜發明令罷此等覆察衆事一付治書則大信臨下人思盡節矣雲愛才好士多所貢達移書太常府薦同郡張贍曰蓋聞在昔聖王承天御世殷薦明德思和人神莫不崇典謨以教思興禮學以陶遠是以帝堯昭煥而道協人天西伯質文而周隆二代大晉建皇崇配天地區夏既混禮樂將庸君侯應曆運之會贊天人之期博延俊茂熙隆載典伏見衛將軍舍人同郡張贍茂德清粹器思深通初慕聖門棲心重仞啓塗及階遂升樞奧抽靈匱於祕宮披金縢於玄夏思樂百氏博採其珍辭邁翰林言敷其藻探微集逸思心洞神論道屬書篇章光覿含奇宰府婆娑公門棲靜隱寶淪虛藏器褧裳襲錦緇衣被玉曾泉改路懸車將邁考盤下位歲聿屢遷搢紳之士具懷愾恨方今太清闢宇四門啓籥玄綱括地天網廣羅慶雲興以招龍和風起而儀鳳誠巖穴耀穎之秋河津託乘之日也而贍沈淪下位羣望悼心若得端委太學錯綜先典垂纓玉階論道紫宮誠帝室之瑰寶清廟之偉器廣樂九奏必登昊天之庭韶夏六變必饗上帝之祀矣入為尚書郎侍御史太子中舍人中書侍郎成都王穎表為清河內史穎將討齊王冏以雲為前鋒都督會冏誅轉大將軍右司馬穎晚節政衰雲屢以正言忤旨孟玖欲用其父為邯鄲令左長史盧志等並阿意從之而雲固執不許曰此縣皆公府掾資豈有黃門父居之邪玖深忿怨張昌為亂穎上雲為使持節大都督前鋒將軍以討昌會伐長沙王乃止機之敗也并收雲穎官屬江統蔡克棗嵩等上疏曰統等聞人主聖明臣下盡規苟有所懷不敢不獻昨聞教以陸機後失軍期師徒敗績以法加刑莫不謂當誠足以肅齊三軍威示遠近所謂一人受戮天下知誡者也且聞重教以機圖為反逆應加族誅未知本末者莫不疑惑夫爵人於朝與衆共之刑人於市與衆棄之惟刑之恤古人所慎今明公興舉義兵以除國難四海同心雲合響應罪人之命懸於漏刻泰平之期不旦則夕矣機兄弟並蒙拔擢俱受重任不當背罔極之恩而向垂亡之寇去泰山之安而赴纍卵之危也直以機計慮淺近不能董攝羣帥致果殺敵進退之間事有疑似故令聖鑒未察其實耳刑誅事大言機有反逆之徵宜令王粹牽秀檢校其事令事驗顯然暴之萬姓然後加雲等之誅未足為晚今此舉措實為太重得則足令天下情服失則必使四方心離不可不令審諦不可不令詳慎統等區區非為陸雲請一身之命實慮此舉有得失之機敢竭愚戇以備誹謗穎不納統等重請穎遲回者三日盧志又曰昔趙王殺中護軍趙浚赦其子驤驤詣明公而擊趙即前事也蔡克入至穎前叩頭流血曰雲為孟玖所怨遠近莫不聞今果見殺罪無彰驗將令羣心疑惑竊為明公惜之僚屬隨克入者數十人流涕固請穎惻然有宥雲色孟玖扶穎入催令殺雲時年四十二有二女無男門生故吏迎喪葬清河修墓立碑四時祠祭所著文章三百四十九篇又撰新書十篇並行於世初雲嘗行逗宿故人家夜暗迷路莫知所從忽望草中有火光於是趣之至一家便寄宿見一年少美風姿共談老子辭致深遠向曉辭去行十許里至故人家云此數十里中無人居雲意始悟却尋昨宿處乃王弼冢雲本無玄學自此談老殊進雲弟耽為平東祭酒亦有清譽與雲同遇害大將軍參軍孫惠與淮南內史朱誕書曰不意三陸相攜暗朝一旦湮滅道業淪喪痛酷之深荼毒難言國喪俊望悲豈一人其為州里所痛悼如此後東海王越討穎移檄天下亦以機雲兄弟枉害罪狀穎云喜字恭仲父瑁吳吏部尚書喜仕吳纍遷吏部尚書少有聲名好學有才思嘗為自其略曰劉向省新語而作新序桓談詠新序而作新論余不自量感子雲之法言而作言道覩賈子之美才而作訪論觀子政洪範而作古今曆覽蔣子通萬機而作審機讀幽通思玄四愁而作娛賓九思真所謂忍愧者也其書近百篇吳平又作西州清論傳於世借稱諸葛孔明以行其書也有較論格品篇曰或問豫薛瑩最是國士之第一者乎答曰以理推之在乎四五之間問者愕然請問答曰夫孫晧無道肆其暴虐若龍蛇其身沈默其體潛而勿用趣不可測此第一人也避尊居卑祿代耕養玄靜守約沖退淡然此第二人也侃然體國思治心不辭貴以方見憚執政不懼此第三人也斟酌時宜在亂猶顯意不忘忠時獻微益此第四人也溫恭修慎不為諂首無所云補從容保寵此第五人也過此已往不足復數故第二已上多淪沒而遠悔吝第三已下有聲位而近咎纍是以深識君子晦其明而履柔順也問者曰始聞高論終年啓寤矣太康中下詔曰偽尚書陸喜等十五人南士歸稱並以貞潔不容晧朝或忠而獲罪或退身修志放在草野主者可皆隨本位就下拜除敕所在以禮發遣須到隨才授用乃以喜為散騎常侍尋卒子育為尚書郎弋陽太守制曰古人云雖楚有才晉實用之觀夫陸機陸雲實荊衡之嵵梓挺圭璋於秀實馳英華於早年風鑒澄爽神情俊邁文藻宏麗獨步當時言論慷慨冠乎終古高詞迥映如朗月之懸光疊意回舒若重巖之積秀千條析理則電坼霜開一緒連文則珠流璧合其詞深而雅其義博而顯故足遠超枚馬高躡王劉百代文宗一人而已然其祖考重光羽楫吳運文武奕葉將相連華而機以廊廟蘊才瑚璉標器宜其承俊之慶奉佐時之業申能展用保譽流功屬吳祚傾基金陵畢氣君移國滅家喪臣遷矯翮南辭翻棲火樹飛鱗北逝卒委湯池遂使穴碎雙龍巢傾兩鳳激浪之心未騁遽骨修鱗陵雲之意將騰先灰徑翮望其翔躍焉可得哉夫賢之立身以功名為本士之居世以富貴為先然則榮利人之所貪禍辱人之所惡故居安保名則君子處焉冒危履貴則哲士去焉是知蘭植中塗必無經時之翠桂生幽壑終保彌年之丹非蘭惌而桂親豈塗害而壑利而生滅有殊者隱顯之勢異也故曰衒美非所罕有常安韜奇擇居故能全性觀機雲之行己也智不逮言矣覩其文章之誡何知易而行難自以智足安時才堪佐命庶保名位無忝前基不知世屬未通運鍾方否進不能闢昏匡亂退不能屏迹全身而奮力危邦竭心庸主忠抱實而不諒謗緣虛而見疑生在己而難長死因人而易促上蔡之犬不誡於前華亭之鶴方悔於後卒令覆宗絶祀良可悲夫然則三世為將釁鍾來葉誅降不祥殃及後昆是知西陵結其凶端河橋收其禍末其天意也豈人事乎
