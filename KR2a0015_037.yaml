body:
  text: 晉書卷三十七列傳第七宗室安平獻王孚子雍雍弟義陽成王望望子河間平王洪洪子威洪弟隨穆王整整弟竟陵王楙望弟太原成王輔輔弟翼翼弟下邳獻王晃晃弟太原烈王瓌瓌弟高陽元王圭圭弟常山孝王衡衡弟沛順王景安平獻王孚字叔達宣帝次弟也初孚長兄朗字伯達宣帝字仲達孚弟馗字季達恂字顯達進字惠達通字雅達敏字幼達俱知名故時號為八達焉孚溫厚廉讓博涉經史漢末喪亂與兄弟處危亡之中簞食瓢飲而披閲不倦性通恕以貞白自立未嘗有怨於人陳留殷武有名於海內嘗罹罪譴孚往省之遂與同處分食談者稱焉魏陳思王植有俊才清選官屬以孚為文學掾植負才陵物孚每切諫初不合意後乃謝之遷太子中庶子魏武帝崩太子號哭過甚孚諫曰大行晏駕天下恃殿下為命當上為宗廟下為萬國奈何效匹夫之孝乎太子良久乃止曰卿言是也時羣臣初聞帝崩相聚號哭無復行列孚厲聲於朝曰今大行晏駕天下震動當早拜嗣君以鎮海內而但哭邪孚與尚書和洽罷羣臣備禁衛具喪事奉太子以即位是為文帝時當選侍中常侍等官太子左右舊人頗諷諭主者便欲就用不調餘人孚曰雖有堯舜必有稷契今嗣君新立當進用海內英賢猶患不得如何欲因際會自相薦舉邪官失其任得者亦不足貴遂更他選轉孚為中書郎給事常侍宿省內除黃門侍郎加騎都尉時孫權稱藩請送任子當遣前將軍于禁還久而不至天子以問孚孚曰先王設九服之制誠以要荒難以德懷不以諸夏禮責也陛下承緒遠人率貢權雖未送任子于禁不至猶宜以寬待之畜養士馬以觀其變不可以嫌疑責讓恐傷懷遠之義自孫策至權奕世相繼惟強與弱不在一禁禁之未至當有他故耳後禁至果以疾遲留而任子竟不至大軍臨江責其違言吳遂絶不貢獻後出為河內典農賜爵關內侯轉清河太守初魏文帝置度支尚書專掌軍國支計朝議以征討未息動須節量及明帝嗣位欲用孚問左右曰有兄風不答云似兄天子曰吾得司馬懿二人復何憂哉轉為度支尚書孚以為擒敵制勝宜有備預每諸葛亮入寇關中邊兵不能制敵中軍奔赴輒不及事機宜預選步騎二萬以為二部為討賊之備又以關中連遭賊寇穀帛不足遣冀州農丁五千屯於上邽秋冬習戰陳春夏修田桑由是關中軍國有餘待賊有備矣後除尚書右僕射進爵昌平亭侯遷尚書令及大將軍曹爽擅權李勝何晏鄧揚等亂政孚不視庶事但正身遠害而已及宣帝誅爽孚與景帝屯司馬門以功進爵長社縣侯加侍中時吳將諸葛恪圍新城以孚進督諸軍二十萬防禦之孚次壽春遣毋丘儉文欽等進討諸將欲速擊之孚曰夫攻者借人之力以為功且當詐巧不可力爭也故稽留月餘乃進軍吳師望風而退魏明悼后崩議書銘旌或欲去姓而書魏或欲兩書孚以為經典正義皆不應書凡帝王皆因本國之名以為天下之號而與往代相別耳非為擇美名以自光也天稱皇天則帝稱皇帝地稱后土則后稱皇后此乃所以同天地之大號流無二之尊名不待稱國號以自表不俟稱氏族以自彰是以春秋隱公三年經曰三月庚戌天王崩尊而稱天不曰周王者所以殊乎列國之君也八月庚辰宋公和卒書國稱名所以異乎天王也襄公十五年經曰劉夏逆王后于齊不云逆周王后薑氏者所以異乎列國之夫人也至乎列國則曰夫人薑氏至自齊又曰紀伯姬卒書國稱姓此所以異乎天王后也由此考之尊稱皇帝赫赫無二何待於魏乎尊稱皇后彰以諡號何待於姓乎議者欲書魏者此以為天皇之尊同於往古列國之君也或欲書姓者此以為天皇之后同於往古之夫人也乖經典之大義異乎聖人之明制非所以垂訓將來為萬世不易之式者也遂從孚議遷司空代王淩為太尉及蜀將薑維寇隴右雍州刺史王經戰敗遣孚西鎮關中統諸軍事征西將軍陳泰與安西將軍鄧艾進擊維維退孚還京師轉太傅及高貴鄉公遭害百官莫敢奔赴孚枕尸於股哭之慟曰殺陛下者臣之罪奏推主者會太后令以庶人禮葬孚與羣公上表乞以王禮葬從之孚性至慎宣帝執政常自退損後逢廢立之際未嘗預謀景文二帝以孚屬尊不敢逼後進封長樂公及武帝受禪陳留王就金墉城孚拜辭執王手流涕歔欷不能自勝曰臣死之日固大魏之純臣也詔曰太傅勳德弘茂朕所瞻仰以光導弘訓鎮靜宇內願奉以不臣之禮其封為安平王邑四萬戶進拜太宰持節都督中外諸軍事有司奏諸王未之國者所置官屬權未有備帝以孚明德屬尊當宣化樹教為羣后作則遂備置官屬焉又以孚內有親戚外有交遊惠下之費而經用不豐奉絹二千匹及元會詔孚乘輿車上殿帝於阼階迎拜既坐帝親奉觴上壽如家人禮帝每拜孚跪而止之又給以雲母輦青蓋車孚雖見尊寵不以為榮常有憂色臨終遺令曰有魏貞士河內溫縣司馬孚字叔達不伊不周不夷不惠立身行道終始若一當以素棺單椁斂以時服泰始八年薨時年九十三帝於太極東堂舉哀三日詔曰王勳德超世尊寵無二期頤在位朕之所倚庶永百齡咨仰訓導奄忽殂隕哀慕感切其以東園溫明祕器朝服一具衣一襲緋練百匹絹布各五百匹錢百萬穀千斛以供喪事諸所施行皆依漢東平獻王蒼故事其家遵孚遺旨所給器物一不施用帝再臨喪親拜盡哀及葬又幸都亭望柩而拜哀動左右給鑾輅輕車介士武賁百人吉凶導從二千餘人前後鼓吹配饗太廟九子雍望輔翼晃瓌圭衡景雍字子魁初為世子拜步兵校尉侍中先孚卒追贈輔國將軍諡曰貞雍子崇為世孫又早夭泰始九年立崇弟平陽亭侯隆為安平王立四年咸寧二年薨諡曰穆無子國絶義陽成王望字子初出繼伯父朗寬厚有父風仕郡上計吏舉孝廉辟司徒掾歷平陽太守洛陽典農中郎將從宣帝討王淩以功封永安亭侯遷護軍將軍改封安樂鄉侯加散騎常侍時魏高貴鄉公好才愛士望與裴秀王沈鍾會並見親待數侍宴筵公性急秀等居內職急有召便至以望外官特給追鋒車一乘武賁五人時景文相繼輔政未嘗朝覲權歸晉室望雖見寵待每不自安由是求出為征西將軍持節都督雍涼二州諸軍事在任八年威化明肅先是蜀將薑維屢寇關中及望至廣設方略維不得為寇關中賴之進封順陽侯徵拜衛將軍領中領軍典禁兵尋加驃騎將軍開府頃之代何曾為司徒武帝受禪封義陽王邑萬戶給兵二千人泰始三年詔曰夫尚賢庸勳尊宗茂親所以體國經化式是百辟也且台司之重存乎天官故周建六職政典為首司徒中領軍以明德近屬世濟其美祖考創業翼佐大命出典方任入贊朝政文德既著武功宣暢逮朕嗣位弼道惟明宜登上司兼統軍戎內輔帝室外隆威重其進位太尉中領軍如故置太尉軍司一人參軍事六人騎司馬五人又增置官騎十人并前三十假羽葆鼓吹吳將施績寇江夏邊境騷動以望統中軍步騎二萬出屯龍陂為二方重鎮假節加大都督諸軍事會荊州刺史胡烈距績破之望乃班師俄而吳將丁奉寇芍陂望又率諸軍以赴之未至而奉退拜大司馬孫晧率衆向壽春詔望統中軍二萬騎三千據淮北晧退軍罷泰始七年薨時年六十七賻贈有加望性儉吝而好聚斂身亡之後金帛盈溢以此獲譏四子奕洪整楙奕至黃門郎先望卒整亦早亡以奕子奇襲爵奇亦好畜聚不知紀極遣三部使到交廣商貨為有司所奏太康九年詔貶為三縱亭侯更以章武王威為望嗣後威誅復立奇為棘陽王以嗣望河間平王洪字孔業出繼叔父昌武亭侯遺仕魏歷位典農中郎將原武太守封襄賁男武帝受禪封河間王立十二年咸寧二年薨二子威混威嗣徙封章武其後威既繼義陽王望更立混為洪嗣混歷位散騎常侍薨及洛陽陷混諸子皆沒于胡而小子滔初嗣新蔡王確亦與其兄俱沒後得南還與新蔡太妃不協太興二年上疏以兄弟並沒在遼東章武國絶宜還所生太妃訟之事下太常太常賀循議章武新蔡俱承一國不絶之統義不得替其本宗而先後傍親按滔既已被命為人後矣必須無復兄弟本國永絶然後得還所生今兄弟在遠不得言無道里雖阻復非絶域且鮮卑恭命信使不絶自宜詔下遼東依劉羣盧諶等例發遣令還繼嗣本封謂滔今未得便委離所後也元帝詔曰滔雖出養自有所生母新蔡太妃相待甚薄滔執意如此如其不聽終當紛紜更為不可今便順其所執還襲章武滔歷位散騎常侍薨子休嗣休與彭城王雄俱奔蘇峻峻平休已戰死弟珍年八歲以小弗坐咸和六年襲爵位至大宗正薨無嗣河間王欽以子範之繼位至遊擊將軍薨子秀嗣義熙元年為桂陽太守秀妻桓振之妹振作逆秀不自安謀反伏誅國除威字景曜初嗣洪咸寧三年徙封章武太康九年嗣義陽王望威凶暴無操行諂附趙王倫元康末為散騎常侍倫將篡使威與黃門郎駱休逼帝奪璽綬倫以威為中書令倫敗惠帝反正曰阿皮捩吾指奪吾璽綬不可不殺阿皮威小字也於是誅威隨穆王整兄奕卒以整為世子歷南中郎將封清泉侯先父望薨追贈冠軍將軍武帝以義陽國一縣追封為隨縣王子邁嗣太康九年以義陽之平林益邁為隨郡王竟陵王楙字孔偉初封樂陵亭侯起家參相國軍事武帝受禪封東平王邑三千九十七戶入為散騎常侍尚書楙善諂諛曲事楊駿及駿誅依法當死東安公繇與楙善故得不坐尋遷大鴻臚加侍中繇欲擅朝政與汝南王亮不平亮託以繇討駿顧望免繇楙等官遣楙就國楙遂殖財貨奢僭踰制趙王倫篡位召還及義兵起倫以楙為衛將軍都督諸軍事倫敗楙免官齊王冏輔政繇復為僕射舉楙為平東將軍都督徐州諸軍事鎮下邳成都王穎輔政進楙為衛將軍會惠帝北征即以楙為車騎將軍都督如故使率衆赴鄴蕩陰之役東海王越奔于下邳楙不納越乃還國帝既西幸越總兵謀迎大駕楙甚懼長史王修説曰東海宗室重望今將興義公宜舉徐州以授之此克讓之美也楙從之乃自承制都督兗州刺史車騎將軍表于天子時帝在長安遣使者劉虔即拜焉楙慮兗州刺史苟晞不避己乃給虔兵使稱詔誅晞晞時已避位楙在州徵求不已郡縣不堪命范陽王虓遣晞還兗州徙楙都督青州諸軍事楙不受命背山東諸侯與豫州刺史劉喬相結虓遣將田徽擊楙破之楙走還國帝還洛陽楙乃詣闕及懷帝踐阼改封竟陵王拜光祿大夫越出牧豫州留世子毗及其黨何倫訪察宮省楙白帝討越乃合衆襲倫不克帝委罪於楙楙奔竄獲免越薨乃出及洛陽傾覆為亂兵所害太原成王輔魏末為野王太守武帝受禪封渤海王邑五千三百七十九戶泰始二年之國後為衛尉出為東中郎將轉南中郎將咸寧三年徙為太原王監并州諸軍事太康四年入朝五年薨追贈鎮北將軍永平元年更贈衛將軍開府儀同三司子弘立元康中為散騎常侍後徙封中丘王三年薨子鑠立翼字子世少歷顯位官至武賁中郎將武帝未受禪而卒以兄雍之支子承為嗣封南宮縣王薨子祐嗣立承遂無後下邳獻王晃字子明魏封武始亭侯拜黃門侍郎改封西安男出為東莞太守武帝受禪封下邳王邑五千一百七十六戶泰始二年就國晃孝友貞廉謙虛下士甚得宗室之稱後為長水校尉南中郎將九年詔曰南中郎將下邳王晃清亮中正體行明潔才周政理有文武策識其以晃為使持節都督寧益二州諸軍事安西將軍領益州刺史晃以疾不行更拜尚書遷右僕射久之出為鎮東將軍都督青徐二州諸軍事惠帝即位入為車騎將軍加散騎常侍將誅楊駿以晃領護軍屯東掖門尋守尚書令遷司空加侍中令如故元康六年薨追贈太傅二子裒綽裒早卒綽有篤疾別封良城縣王以太原王輔第三子韡為嗣官至侍中尚書早薨子韶立太原烈王瓌字子泉魏長樂亭侯改封貴壽鄉侯歷振威將軍祕書監封固始子武帝受禪封太原王邑五千四百九十六戶泰始二年就國四年入朝賜袞冕之服遷東中郎將十年薨詔曰瓌乃心忠篤智器雅亮歷位文武有幹事之績出臨封土夷夏懷附鎮守許都思謀可紀不幸早薨朕甚悼之今安厝在近其追贈前將軍子顒立徙封河間王別有傳高陽元王圭字子璋少有才望魏高陽鄉侯歷河南令進封湞陽子拜給事黃門侍郎武帝受禪封高陽王邑五千五百七十戶歷北中郎將督鄴城守諸軍事泰始六年入朝以父孚年高乞留供養拜尚書遷右僕射十年薨詔遣兼大鴻臚持節監護喪事贈車騎將軍儀同三司圭有美譽於世而帝甚悼惜之無子詔以太原王輔子緝襲爵緝立五年咸寧四年薨諡曰哀無子太康二年詔以太原王瓌世子顒子訟為緝後封真定縣侯常山孝王衡字子平魏封德陽鄉侯進封汝陽子為駙馬都尉武帝受禪封常山王邑三千七百九十戶二年薨無子以安平世子雍第四子敦為嗣沛順王景字子文魏樂安亭侯歷諫議大夫武帝受禪封沛王邑三千四百戶立十一年咸寧元年薨子韜立彭城穆王權曾孫紘紘子俊彭城穆王權字子輿宣帝弟魏魯相東武城侯馗之子也初襲封拜冗從僕射武帝受禪封彭城王邑二千九百戶出為北中郎將都督鄴城守諸軍事泰始中入朝賜袞冕之服咸寧元年薨子元王植立歷位後將軍尋拜國子祭酒太僕卿侍中尚書出為安東將軍都督揚州諸軍事代淮南王允鎮壽春未發或云植助允攻趙王倫遂以憂薨贈車騎將軍增封萬五千戶子康王釋立官至南中郎將持節平南將軍分魯國蕃薛二縣以益其國凡二萬三千戶薨子雄立坐奔蘇峻伏誅更以釋子紘嗣紘字偉德初封堂邑縣公建興末元帝承制以紘繼高密王據及帝即位拜散騎侍郎遷翊軍校尉前將軍雄之誅也紘入繼本宗拜國子祭酒加散騎常侍尋遷大宗正祕書監有風疾性理不或欲上疏陳事歷示公卿又杜門讓還章印貂蟬著杜門賦以顯其志由是更拜光祿大夫領大宗師常侍如故後疾甚馳騁無度或攻劫軍寺或扞傷官屬醜言悖詈誹謗上下又乘車突入端門至太極殿前於是御史中丞車灌奏劾請免紘官下其國嚴加防録成帝詔曰王以明德茂親居宗師之重宜敷道養德靜一其操而頃遊行煩數冒履風塵宜令官屬已下各以職奉衛不得令王復有此勞內外職司各慎其局王可解常侍光祿宗師先所給車牛可録取賜米布牀帳以養疾咸康八年薨贈散騎常侍金紫光祿大夫二子玄俊玄嗣立會庚戌制不得藏戶玄匿五戶桓溫表玄犯禁收付廷尉既而宥之位至中書侍郎薨子弘之立位至散騎常侍薨子邵之立薨子崇之立薨子緝之立宋受禪國除恭王俊字道度出嗣高密王略官至散騎常侍薨子敬王純之立歷臨川內史司農少府卿太宰右長史薨子恢之立義熙末以給事中兼太尉修謁洛陽園陵宋受禪國除高密文獻王泰子孝王略略兄新蔡武哀王騰騰子莊王確略弟南陽王模模子保高密文獻王泰字子舒彭城穆王權之弟魏陽亭侯補陽翟令遷扶風太守武帝受禪封隴西王邑三千二百戶拜遊擊將軍出為兗州刺史加鷹揚將軍遷使持節都督寧益二州諸軍事安西將軍領益州刺史稱疾不行轉安北將軍代兄權督鄴城守事遷安西將軍都督關中事太康初入為散騎常侍前將軍領鄴城門校尉以疾去官後代下邳王晃為尚書左僕射出為鎮西將軍領護西戎校尉假節代扶風王駿都督關中軍事以疾還京師永熙初代石鑒為司空尋領太子太保及楊駿誅泰領駿營加侍中給步兵二千五百人騎五百匹泰固辭乃給千兵百騎楚王瑋之被收泰嚴兵將救之祭酒丁綏諫曰公為宰相不可輕動且夜中倉卒宜遣人參審定問泰從之瑋既誅乃以泰録尚書事遷太尉守尚書令改封高密王邑萬戶元康九年薨追贈太傅泰性廉靜不近聲色雖為宰輔食大國之租服飾肴膳如布衣寒士任真簡率每朝會不識者不知其王公也事親恭謹居喪哀戚謙虛下物為宗室儀表當時諸王惟泰及下邳王晃以節制見稱雖並不能振施其餘莫得比焉泰四子越騰略模越自有傳騰出後叔父弟略立孝王略字元簡孝敬慈順小心下士少有父風元康初愍懷太子在東宮選大臣子弟有名稱者以為賓友略與華等並侍左右歷散騎黃門侍郎散騎常侍祕書監出為安南將軍持節都督沔南諸軍事遷安北將軍都督青州諸軍事略逼青州刺史程牧牧避之略自領州永興初令劉根起兵東萊誑惑百姓衆以萬數攻略於臨淄略不能距走保聊城懷帝即位遷使持節都督荊州諸軍事征南大將軍開府儀同三司京兆流人王逌與叟人郝洛聚衆數千屯于冠軍略遣參軍崔曠率將軍皮初張洛等討逌為逌所譎戰敗略更遣左司馬曹攄統曠等進逼逌將大戰曠在後密自退走攄軍無繼戰敗死之略乃赦曠罪復遣部將韓松又督曠攻逌逌降尋進開府加散騎常侍永嘉三年薨追贈侍中太尉子據立薨無子以彭城康王子紘為嗣其後紘歸本宗立紘子俊以奉其祀新蔡武哀王騰字元邁少拜冗從僕射封東嬴公歷南陽魏郡太守所在稱職徵為宗正遷太常轉持節寧北將軍都督并州諸軍事并州刺史惠帝討成都王穎六軍敗績騰與安北將軍王浚共殺穎所署幽州刺史和演率衆討穎穎遣北中郎將王斌距戰浚率鮮卑騎擊斌騰為後係大破之穎懼挾帝歸洛陽進騰位安北將軍永嘉初遷車騎將軍都督鄴城守諸軍事鎮鄴又以迎駕之勳改封新蔡王初騰發并州次于真定值大雪平地數尺營門前方數丈雪融不積騰怪而掘之得玉馬高尺許表獻之其後公師藩與平陽人汲桑等為羣盜起於清河鄃縣衆千餘人寇頓丘以葬成都王穎為辭載穎主而行與張泓故將李豐等將攻鄴騰曰孤在并州七年胡圍城不能克汲桑小賊何足憂也及豐等至騰不能守率輕騎而走為豐所害四子虞矯紹確虞有勇力騰之被害虞逐豐豐投水而死是日虞及矯紹并巨鹿太守崔曼車騎長史羊從事中郎蔡克等又為豐餘黨所害及諸名家流移依鄴者死亡並盡初鄴中雖府庫虛竭而騰資用甚饒性儉嗇無所振惠臨急乃賜將士米可數升帛各丈尺是以人不為用遂致於禍及苟晞救鄴桑還平陽于時盛夏尸爛壞不可復識騰及三子骸骨不獲庶子確立莊王確字嗣安歷東中郎將都督豫州諸軍事鎮許昌永嘉末為石勒所害無子初以章武王混子滔奉其祀其後復以汝南威王祐子弼為確後太興元年薨無子又以弼弟邈嗣確位至侍中薨子晃立拜散騎侍郎桓溫廢武陵王免晃為庶人徙衡陽孝武帝立晃弟崇繼邈後為奴所害子惠立宋受禪國除南陽王模字元表少好學與元帝及范陽王虓俱有稱於宗室初封平昌公惠帝末拜從僕射纍遷太子庶子員外散騎常侍成都王穎奔長安東海王越以模為北中郎將鎮鄴永興初成都王穎故帳下督公師藩樓權郝昌等攻鄴模左右謀應之廣平太守丁邵率衆救模范陽王虓又遣兗州刺史苟晞援之藩等散走遷鎮東大將軍鎮許昌進爵南陽王永嘉初轉征西大將軍開府都督秦雍梁益諸軍事代河間王顒鎮關中模感丁邵之德敕國人為邵生立碑時關中飢荒百姓相噉加以疾癘盜賊公行模力不能制乃鑄銅人鐘鼎為釜器以易穀議者非之東海王越表徵模為司空遣中書監傅祗代之模謀臣淳于定説模曰關中天府之國霸王之地今以不能綏撫而還既於聲望有虧又公兄弟唱起大事而並在朝廷若自強則有專權之罪弱則受制於人非公之利也模納其言不就徵表遣世子保為西中郎將東羌校尉鎮上邽秦州刺史裴苞距之模使帳下都尉陳安率衆攻苞苞奔安定太守賈匹以郡迎苞模遣軍司謝班伐匹匹退奔盧水其年進位太尉大都督洛京傾覆模使牙門趙染戍蒲坂染求馮翊太守不得怒率衆降于劉聰聰使其子粲及染攻長安模使淳于定距之為染所敗士衆離叛倉庫虛竭軍祭酒韋輔曰事急矣早降可以免模從之遂降于染染箕踞攘袂數模之罪送詣粲粲殺之以模妃劉氏賜胡張本為妻子保立保字景度少有文義好述作初拜南陽國世子模遇害保在上邽其後賈匹死裴苞又為張軌所殺保全有秦州之地自號大司馬承制置百官隴右氐羌並從之涼州刺史張實遣使貢獻及愍帝即位以保為右丞相加侍中都督陝西諸軍事尋進位相國模之敗也都尉陳安歸於保保命統精勇千餘人以討羌寵遇甚厚保將張春等疾之譖安有異志請除之保不許春等輒伏刺客以刺安安被創馳還隴城遣使詣保貢獻不絶愍帝之蒙塵也保自稱晉王時上邽大飢士衆窘困張春奉保之南安陳安自號秦州刺史稱藩於劉曜春復奉保奔桑城將投于張實實使兵迎保實禦之也是歲保病薨時年二十七保體質豐偉嘗自稱重八百斤喜睡痿疾不能御婦人無子張春立宗室司馬瞻奉保後陳安舉兵攻春春走瞻降于安安送詣劉曜曜殺之安迎保喪以天子禮葬于上邽諡曰元范陽康王綏子虓范陽康王綏字子都彭城王權季弟也初為諫議大夫泰始元年受封在位十五年咸寧五年薨子虓立焉虓字武會少好學馳譽研考經記清辨能言論以宗室選拜散騎常侍纍遷尚書出為安南將軍都督豫州諸軍事持節鎮許昌進位征南將軍河間王顒表立成都王穎為太弟為王浚所破挾天子還洛陽虓與東平王楙鎮東將軍周馥等上言曰自愍懷被害皇儲不建委重前相輒失臣節是以前年太宰與臣永惟社稷之二不可久空所以共啓成都王穎以為國副受重之後而弗克負荷小人勿用而以為腹心骨肉宜敦而猜佻荐至險詖宜遠而讒説殄行此皆臣等不聰不明失所宗賴遂令陛下謬於降授雖戮臣等不足以謝天下今大駕還宮文武空曠制度荒破靡有孑遺臣等雖劣足匡王室而道路之言謂張方與臣等不同既惜所在興異又以太宰惇德允元著於具瞻每當義節輒為社稷宗盟之先張方受其指教為國效節昔年之舉有死無二此即太宰之良將陛下之忠臣但以受性強毅不達變通遂守前志已致紛紜然退思惟既是其不易之節且慮事翻之後為天下所罪故不即西還耳原其本事實無深責臣聞先代明主未嘗不全護功臣令福流子孫自中間以來陛下功臣初無全者非獨人才皆劣其於取禍實由朝廷策之失宜不相容恕以一旦之咎喪其積年之勳既違周禮議功之典且使天下之人莫敢復為陛下致節者臣等此言豈獨為一張方實為社稷遠計欲令功臣長守富貴臣愚以為宜委太宰以關右之任一方事重及自州郡已下選舉授任一皆仰成若朝之大事廢興損益每輒疇咨此則二伯述職周召分陝之義陛下復行於今時遣方還郡令羣后申志時定王室所加方官請悉如舊此則忠臣義士有勸功臣必全矣司徒戎異姓之賢司空越公族之望並忠國愛主小心翼翼宜幹機事委以朝政安北將軍王浚佐命之胤率身履道忠亮清正遠近所推如今日之大舉實有定社稷之勳此是臣等所以嘆息歸高也浚宜特崇重之以副羣望遂撫幽朔長為北藩臣等竭力扞城藩屏皇家陛下垂拱而四海自正則四祖之業必隆於今日月之暉昧而復曜乞垂三思察臣所言又可以臣表西示太宰又表曰成都王失道為姦邪所誤論王之身不宜深責且先帝遺體陛下羣弟自元康以來罪戮相尋實海內所為胸胸而臣等所以痛心今廢成都更封一邑宜其必許若廢黜尋有禍害既傷陛下矜慈之恩又令遠近謂公族無復骨肉之情此實臣等內省悲慚無顏於四海也乞陛下察臣忠款於是虓先率衆自許屯於滎陽會惠帝西遷虓與從兄平昌公模長史馮嵩等刑白馬喢血而盟推東海王越為盟主虓都督河北諸軍事驃騎將軍持節領豫州刺史劉喬不受越等節度乘虛破許虓自拔渡河王浚表虓領冀州刺史資以兵馬虓入冀州發兵又南濟河破喬等河間王顒聞喬敗斬張方傳首於越越與虓西迎帝而顒出奔於是奉天子還都拜虓為司徒永興三年暴疾薨時年三十七無子養模子黎為嗣黎隨模就國於長安遇害濟南惠王遂曾孫勳濟南惠王遂字子伯宣帝弟魏鴻臚丞恂之子也仕魏關內侯進封平昌亭侯歷典軍郎將景元二年轉封武城鄉侯督鄴城守諸軍事北中郎將五等建封祝阿伯纍遷冠軍將軍武帝受禪封濟南王泰始二年薨二子耽緝耽嗣立咸寧三年徙為中山王是年薨無子緝繼成都王穎以緝為建威將軍與石熙等率衆距王浚沒於陳薨無子國除後遂之曾孫勳字偉長年十餘歲愍帝末長安陷劉曜將令狐泥養為子及壯便弓馬能左右射咸和六年自關右還自列云是大長秋恂之玄孫冠軍將軍濟南惠王遂之曾孫略陽太守瓘之子遂拜謁者僕射以勇聞庾翼之鎮襄陽以梁州刺史援桓宣卒請勳代之初屯西城退守武當時石季龍死中國亂雍州諸豪帥馳告勳勳率衆出駱谷壁于懸鉤去長安二百里遣部將劉煥攻長安又拔賀城於是關中皆殺季龍太守令長以應勳勳兵少未能自固復還梁州永和中張琚據隴東遣使招勳勳復入長安初京兆人杜洪以豪族陵琚琚以勇俠侮洪洪知勳憚琚兵強因説勳曰不殺張琚關中非國家有也勳乃偽請琚於坐殺之琚弟走池陽合衆攻勳頻戰不利請和歸梁州後桓溫伐關中命勳出子午道而為苻雄所敗退屯于女媧堡俄遷征虜將軍監關中軍事領西戎校尉賜爵通吉亭侯為政暴酷至於治中別駕及州之豪右言語忤意即於坐梟斬之或引弓自射西土患其凶虐在州常懷據蜀有僭偽之意桓溫聞之務相綏懷以其子康為漢中太守勳逆謀已成憚益州刺史周撫未發及撫卒遂擁衆入劍閣梁州別駕雍端西戎司馬隗粹並切諫勳皆誅之自號梁益二州牧成都王桓溫遣朱序討勳勳兵潰為序所獲及息龍子長史梁憚司馬金一等送于溫並斬之傳首京師譙剛王遜子閔王承承子烈王無忌無忌子敬王恬恬子忠王尚之尚之弟恢之休之允之韓延之恬弟愔譙剛王遜字子悌宣帝弟魏中郎進之子也仕魏關內侯改封城陽亭侯參鎮東軍事拜輕車將軍羽林左監五等建徙封涇陽男武帝受禪封譙王邑四千四百戶泰始二年薨二子隨承定王隨立薨子邃立沒于石勒元帝以承嗣遜閔王承字敬才少篤厚有志行拜奉車都尉奉朝請稍遷廣威將軍安夷護軍鎮安定從惠帝還洛陽拜遊擊將軍永嘉中天下漸亂間行依征南將軍山簡會簡卒進至武昌元帝初鎮揚州承歸建康補軍咨祭酒愍帝徵為龍驤將軍不行元帝為晉王承制更封承為譙王太興初拜屯騎校尉加輔國將軍領左軍將軍承居官儉約家無別室尋加散騎常侍輔國左軍如故王敦有無君之心表疏輕慢帝夜召承以敦表示之曰王敦頃年位任足矣而所求不已言至於此將若之何承曰陛下不早裁之難將作矣帝欲樹藩屏會敦表以宣城內史沈充為湘州帝謂承曰湘州南楚險固在上流之要控三州之會是用武之國也今以叔父居之何如承曰臣幸託末屬身當宿衛未有驅馳之勞頻受過厚之遇夙夜自厲思報天德君之所命惟力是視敢有辭焉然湘州蜀寇之餘人物雕盡若上憑天威得之所蒞比及三年請從戎役若未及此雖復灰身亦無益也於是詔曰夫王者體天理物非羣才不足濟其務外建賢哲以樹風聲內睦親親以廣藩屏是以太公封齊伯禽居魯此先王之令典古今之通義也我晉開基列國相望乃授琅邪武王鎮統東夏汝南文成總一淮許扶風梁王迭據關右爰暨東嬴作司并州今公族雖寡不逮曩時豈得替舊章乎散騎常侍左將軍譙王承貞素款亮志存忠恪便蕃左右恭肅彌著今以承監湘州諸軍事南中郎將湘州刺史初劉隗以王敦威權太盛終不可制勸帝出諸心腹以鎮方隅故先以承為湘州續用隗及戴若思等並為州牧承行達武昌釋戎備見王敦敦與之宴欲觀其意謂承曰大王雅素佳士恐非將帥才也承曰公未見知耳鉛刀豈不能一割乎承以敦欲測其情故發此言敦果謂錢鳳曰彼不知懼而學壯語此之不武何能為也聽承之鎮時湘土荒殘公私困弊承躬自儉約乘葦茭車而傾心綏撫甚有能名敦恐其為己患詐稱北伐悉召承境內船乘承知其姦計分半與之敦尋構難遣參軍桓羆説承以劉隗專寵今便討擊請承以為軍司以軍期上道承歎曰吾其死矣地荒人鮮勢孤援絶赴君難忠也死王事義也惟忠與義夫復何求便欲唱義而衆心疑惑承曰吾受國恩義無有二府長史虞悝慷慨有志節謂承曰王敦居分陝之任而一旦作逆天地所不容人神所痛疾大王宗室藩屏寧可從其偽邪便宜電奮存亡以之於是與悝及弟前丞相掾望建昌太守長沙王循衡陽太守淮陵劉翼等共盟誓囚桓羆馳檄湘州指期至巴陵零陵太守尹奉首同義謀出軍營陽於是一州之內皆同義舉乃使虞望討諸不服斬湘東太守鄭淡淡敦姊夫也敦遣南蠻校尉魏將軍李田嵩等甲卒二萬以攻承承且戰且守待救於尹奉虞望而城池不固人情震恐或勸承南投陶侃又云可退據零桂承曰吾舉義衆志在死節寧偷生苟免為奔敗之將乎事之不濟其令百姓知吾心耳初安南將軍甘卓與承書勸使固守當以兵出沔口斷敦歸路則湘圍自解承答書曰季思足下勞於王事天綱暫圮中原丘墟四海義士方謀克復中興江左草創始爾豈圖惡逆萌自寵臣吾以暗短託宗皇屬仰豫密命作鎮南夏親奉中詔成規在心伯仁諸賢扼腕歧路至止尚淺凡百茫然豺狼易驚遂肆醜毒聞知駭踊神氣衝越子來之義人思自百不命而至衆過數千誠足以決一旦之機攄山海之憤矣然迫於倉卒舟楫未備魏李尋見圍逼是故事與意違志力未展猥辱來使深同大趣嘉謀英算發自深衷執讀周復欣無以量足下若能卷甲電赴猶或有濟若其狐疑求我枯魚之肆矣兵聞拙速未覩工遲季思足下勉之勉之書不盡意絶筆而已卓軍次月者口聞王師敗績停師不進等攻戰日逼敦又送所得臺中人書疏令射以示承城內知朝廷不守莫不悵惋劉翼戰死相持百餘日城遂沒檻送承荊州刺史王廙承敦旨於道中害之時年五十九敦平詔贈車騎將軍子無忌立烈王無忌字公壽承之難以年小獲免咸和中拜散騎侍郎纍遷屯騎校尉中書黃門侍郎江州刺史褚裒當之鎮無忌及丹楊尹桓景等餞於版橋時王廙子丹楊丞耆之在坐無忌志欲復讎拔刀將手刃之裒景命左右救捍獲免御史中丞車灌奏無忌欲專殺人付廷尉科罪成帝詔曰王敦作亂閔王遇禍尋事原情今王何責然公私憲制亦已有斷王當以體國為大豈可尋繹由來以亂朝憲主者其申明法令自今已往有犯必誅於是聽以贖論建元初遷散騎常侍轉御史中丞出為輔國將軍長沙相又領江夏相尋轉南郡河東二郡太守將軍如故隨桓溫伐蜀以勳賜少子愔爵廣晉伯進號前將軍永和六年薨贈衛將軍二子恬愔恬立敬王恬字元愈少拜散騎侍郎纍遷散騎常侍黃門郎御史中丞值海西廢簡文帝登阼未解嚴大司馬桓溫屯中堂吹警角恬奏劾溫大不敬請科罪溫視奏歎曰此兒乃敢彈我真可畏也恬忠正有幹局在朝憚之遷右衛將軍司雍秦梁四州大中正拜尚書轉侍中領左衛將軍補吳國內史又領太子詹事恬既宗室勳望有才用孝武帝時深杖之以為都督兗青冀幽并揚州之晉陵徐州之南北郡軍事領鎮北將軍兗青二州刺史假節太元十五年薨追贈車騎將軍四子尚之恢之允之休之尚之立忠王尚之字伯道初拜祕書郎遷散騎侍郎恬鎮京口尚之為振威將軍廣陵相父憂去職服闋為驃騎咨議參軍宗室之內世有人物王國寶之誅也散騎常侍劉鎮之彭城內史劉涓子徐州別駕徐放並以同黨被收將加大辟尚之言於會稽王道子曰刑獄不可廣宜釋鎮之等道子以尚之昆季並居列職每事仗焉乃從之兗州刺史王恭忌其盛也與豫州刺史庾楷並稱兵以討尚之為名南連荊州刺史殷仲堪南郡公桓玄等道子命前將軍王珣右將軍謝琰討恭尚之距楷允之與楷子鴻戰於當利鴻敗走斬楷將段方楷單馬奔于桓玄道子以尚之為建威將軍豫州刺史假節一依楷故事尋進號前將軍允之為吳國內史恢之驃騎司馬丹楊尹休之襄城太守各擁兵馬勢傾朝廷後將軍元顯執政亦倚以為援元顯寵幸張法順每宴會坐起無別尚之入朝正色謂元顯曰張法順驅走小人有何才異而暴被拔擢當今聖世不宜如此元顯默然尚之又曰宗室雖多匡諫者少王者尚納芻蕘之言況下官與使君骨肉不遠蒙眷纍世何可坐視得失而不盡言因叱法順令下舉坐失色尚之言笑自若元顯深銜之後符下西府令出勇力二千人尚之不與曰西藩濱接荒餘寇虜無常兵止數千不足戍衛無復可分徹者元顯尤怒會欲伐桓玄故無他及元顯稱詔西伐命尚之為前鋒尚之子文仲為寧遠將軍宣城內史桓玄至姑熟遣馮該等攻歷陽斷洞浦焚尚之舟艦尚之率步卒九千陳於浦上先遣武都太守楊秋屯橫江秋奔于玄軍尚之衆潰逃于塗中十餘日譙國人韓連丁元等以告玄玄害之於建康市玄上疏以閔王不宜絶嗣乃更封尚之從弟康之為譙縣王安帝反正追贈尚之衛將軍以休之長子文思為尚之嗣襲封譙郡王文思性凶暴每違軌度多殺弗辜好田獵燒人墳墓數為有司所糾遂與羣小謀逆劉裕聞之誅其黨與送文思付父休之令自訓厲後與休之同怨望稱兵為裕所敗而死國除恢之字季明歷官驃騎司馬丹楊尹尚之為桓玄所害徙恢之等於廣州而於道中害之安帝反正追贈撫軍將軍休之字季預少仕清塗以平王恭庾楷功拜龍驤將軍襄城太守鎮歷陽桓玄攻歷陽休之嬰城固守及尚之戰敗休之以五百人出城力戰不捷乃還城攜子姪奔于慕容超聞義軍起復還京師大將軍武陵王令曰前龍驤將軍休之才幹貞審功業既成歷陽之戰事在機捷及至勢乖力屈奉身出奔猶鳩集義徒崎嶇險阻既應親賢之舉宜委分陝之重可監荊益梁寧秦雍六州軍事領護南蠻校尉荊州刺史假節到鎮無幾桓振復襲江陵休之戰敗出奔襄陽寧朔將軍張暢之高平相劉懷肅自沔攻振走之休之還鎮御史中丞王楨之奏休之失戍免官朝廷以豫州刺史魏詠之代之徵休之還京師拜後將軍會稽內史御史中丞阮歆之奏休之與尚書虞嘯父犯禁嬉戲降號征虜將軍尋復為後將軍及盧循作逆加督浙江東五郡軍事坐公事免劉毅誅復以休之都督荊雍梁秦寧益六州軍事平西將軍荊州刺史假節以子文思為亂上疏謝曰文思不能聿修自貽罪戾憂懼震惶惋愧交集臣御家無方威訓不振致使子姪愆法仰負聖朝悚赧兼懷胡顏自處請解所任歸罪闕庭不許後以文思事怨望遂結雍州刺史魯宗之將共誅執政時休之次子文寶及兄子文祖並在都收付廷尉賜死劉裕親自征之密使遺休之治中韓延之書曰文思事意遠近所知去秋遣康之送還司馬君者推至公之極也而了無愧心久絶表疏此是天地所不容吾受命西征止其父子而已彼土僑舊為之驅逼一無所問往年郗僧施謝劭任集之等交構積歲專為劉毅規謀所以至此今卿諸人一時逼迫本無纖釁吾虛懷期物自有由來今在近路是諸賢濟身之日若大軍相臨交鋒接刃蘭艾雜揉或恐不分故白此意并可示同懷諸人延之報曰聞親率戎馬遠履西畿闔境士庶莫不恇駭何者莫知師出之名故也辱來疏始委以譙王前事良增歎息司馬平西體國忠貞款懷待物以君有匡復之勳家國蒙賴推德委誠每事詢仰譙王往以微事見劾猶自遜位況以大過而當默然也但康之前言有所不盡故重使胡道申白所懷道未及反已表奏廢之所不盡者命耳推寄相與正當如此有何不可便及兵戈自義旗以來方伯誰敢不先相咨疇而徑表天子可謂欲加之罪其無辭乎劉裕足下海內之人誰不見足下此心而復欲誑國士天地所不容在彼不在此矣來言虛懷期物自有由來今伐人之君啖人以利真可謂虛懷期物自有由來矣劉藩死於閶闔之門諸葛弊於左右之手甘言詫方伯襲之以輕兵遂使席上靡款懷之士閫外無自信諸侯以是為得算良可恥也吾誠鄙劣嘗聞道於君子以平西之至德寧可無授命之臣乎假令天長喪亂九流渾濁當與臧洪遊於地下耳裕得書歎息以示諸佐曰事人當應如此宗之聞裕向荊州自襄陽就休之共屯江陵使文思及宗之子軌以兵距裕戰于江津休之大敗遂與宗之俱奔于姚興裕平姚泓休之將奔于魏未至道死允之字季度出後叔父愔襲爵廣晉伯歷位輔國將軍吳國宣城譙梁內史王恭庾楷桓玄等內伐也會稽王道子命允之兄弟距楷破之元興初與兄恢之同徙廣州於道被害義軍起追贈太常卿從弟康之以子文惠襲爵宋受禪國除韓延之字顯宗南陽赭陽人魏司徒暨之後也少以分義稱安帝時為建威將軍荊州治中轉平西府録事參軍以劉裕父名翹字顯宗延之遂字顯宗名兒為翹以示不臣劉氏與休之俱奔姚興劉裕入關又奔于魏愔字敬王初封廣晉伯早卒無子兄恬以子允之嗣高陽王睦高陽王睦字子友譙王遜之弟也魏安平亭侯歷侍御史武帝受禪封中山王邑五千二百戶睦自表乞依六蓼祀臯陶鄫嵵祀相立廟事下太常依禮典平議博士祭酒劉喜等議禮記王制諸侯五廟二昭二穆與太祖而五是則立始祖之廟謂嫡統承重一人得立耳假令支弟並為諸侯始封之君不得立廟也今睦非為正統若立祖廟中山不得並也後世中山乃得為睦立廟為後世子孫之始祖耳詔曰禮文不明此制度大事宜令詳審可下禮官博議乃處當之咸寧三年睦遣使募徙國內八縣受逋逃私占及變易姓名詐冒復除者七百餘戶冀州刺史杜友奏睦招誘逋亡不宜君國有司奏事在赦前應原詔曰中山王所行何乃至此覽奏甚用憮然廣樹親戚將以上輔王室下惠百姓也豈徒榮崇其身而使民踰典憲乎此事當大論得失正臧否所在耳苟不宜君國何論於赦令之間耶其貶睦為縣侯乃封丹水縣侯及吳平太康初詔復爵有司奏封江陽王帝曰睦退靜思愆改修其德今有爵土不但以赦江陽險遠其以高陽郡封之乃封為高陽王元康元年為宗正薨於位世子蔚早卒孫毅立拜散騎侍郎永嘉中沒于石勒隆安元年詔以譙敬王恬次子恢之子文深繼毅後立五年薨無嗣復以高密王純之子法蓮繼之宋受禪國除任城景王陵弟順斌任城景王陵字子山宣帝弟魏司隸從事安城亭侯通之子也初拜議郎泰始元年封北海王邑四千七百戶三年轉封任城王之國咸寧五年薨子濟立拜散騎侍郎給事中散騎常侍輔國將軍隨東海王越在項為石勒所害二子俱沒有二弟順斌順字子思初封習陽亭侯及武帝受禪順歎曰事乖唐虞而假為禪名遂悲泣由是廢黜徙武威姑臧縣雖受罪流放守意不移而卒西河繆王斌字子政魏中郎武帝受禪封陳王邑千七百一十戶三年改封西河咸寧四年薨子隱立薨子㨎立史臣曰泰始之初天下少事革魏餘弊遵周舊典並建宗室以為藩翰諸父同虞虢之尊兄弟受魯衛之祉以為歷紀長久本支百世安平風度宏邈器宇高雅內弘道義外闡忠貞洎高貴薨殂則枕尸流慟陳留就國則拜辭隕涕語曰疾風彰徑草獻王其有焉故能位班上列享年眉壽清徽至範為晉宗英子孫遵業世篤其慶高密風監清遠簡素寡欲孝以承親忠以奉上方諸枝庶實謂國楨新蔡南陽俱蒞方嶽值王室多難中原蕪梗表義甄節效績艱危于時醜類實繁凶威日逞勢懸衆寡相繼淪亡悲夫譙閔沈雄壯勇作鎮南服屬姦回肆亂稱兵內侮懷忠憤發建義湘州荊沔響應羣才致力雖元勳不立而誠節克彰垂裕後昆奕世貞烈豈不休哉勳託末屬稟性凶暴仍荷朝寄推轂梁岷遂棄親背主負恩放命憑庸蜀之饒苞藏不逞恃江山之固姦謀日深是以搢紳切齒攄積憤之志義士思奮厲忘身之節天道禍淫應時蕩定昔汲黯猶在淮南寢謀周撫若存凶渠未發以邪忌正異代同規詩云自貽伊戚其勳之謂矣習陽憑慶枝葉守約懷逸棲情塵外希蹤物表顧匹夫之獨善貴達節之弘規言出身播猶為幸也贊曰安平立節雅性貞亮高密含和宗室之望新蔡遇禍忠全元喪譙閔徇義力屈志揚勳自貽戚名隕身亡順不恤忌流播遐方
