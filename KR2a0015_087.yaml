body:
  text: 晉書卷八十七列傳第五十七涼武昭王李玄盛子士業武昭王諱皓字玄盛小字長生隴西成紀人姓李氏漢前將軍廣之十六世孫也廣曾祖仲翔漢初為將軍討叛羌于素昌素昌即狄道也衆寡不敵死之仲翔子伯考奔喪因葬于狄道之東川遂家焉世為西州右姓高祖雍曾祖柔仕晉並歷位郡守祖弇仕張軌為武衛將軍安世亭侯父昶幼有令名早卒遺腹生玄盛少而好學性沈敏寬和美器度通涉經史尤善文義及長頗習武藝誦孫吳兵法嘗與呂光太史令郭黁及其同母弟宋繇同宿黁起謂繇曰君當位極人臣李君有國土之分家有騧草馬生白額駒此其時也呂光末京兆段業自稱涼州牧以敦煌太守趙郡孟敏為沙州刺史署玄盛效穀令敏尋卒敦煌護軍馮翊郭謙沙州治中敦煌索仙等以玄盛溫毅有惠政推為寧朔將軍敦煌太守玄盛初難之會宋繇仕於業告歸敦煌言於玄盛曰兄忘郭黁之言邪白額駒今已生矣玄盛乃從之尋進號冠軍稱藩于業業以玄盛為安西將軍敦煌太守領護西胡校尉及業僭稱涼王其右衛將軍索嗣構玄盛於業乃以嗣為敦煌太守率騎五百而西未至二十里移玄盛使迎己玄盛驚疑將出迎之效穀令張邈及宋繇止之曰呂氏政衰段業暗弱正是英豪有為之日將軍處一國成資奈何束手於人索嗣自以本邦謂人情附己不虞將軍卒能距之可一戰而擒矣宋繇亦曰大丈夫已為世所推今日便授首於嗣豈不為天下笑乎大兄英姿挺傑有雄霸之風張王之業不足繼也玄盛曰吾少無風雲之志因官至此不圖此郡士人忽爾見推向言出迎者未知士大夫之意故也因遣繇覘嗣繇見嗣啖以甘言還謂玄盛曰嗣志驕兵弱易擒耳於是遣其二子士業讓與邈繇及司馬尹建興等逆戰破之嗣奔還張掖玄盛素與嗣善結為刎頸交反為所構故深恨之乃罪狀嗣於段業業將且渠男又惡嗣至是因勸除之業乃殺嗣遣使謝玄盛分敦煌之涼興烏澤晉昌之宜禾三縣為涼興郡進玄盛持節都督涼興已西諸軍事鎮西將軍領護西夷校尉時有赤氣起于玄盛後園龍跡見于小城隆安四年晉昌太守唐瑤移檄六郡推玄盛為大都督大將軍涼公領秦涼二州牧護羌校尉玄盛乃赦其境內建年為庚子追尊祖弇曰涼景公父昶涼簡公以唐瑤為征東將軍郭謙為軍咨祭酒索仙為左長史張邈為右長史尹建興為左司馬張體順為右司馬張條為牧府左長史令狐溢為右長史張林為太府主簿宋繇張謖為從事中郎繇加折衝將軍謖加揚武將軍索承明為牧府右司馬令狐遷為武衛將軍晉興太守泛德瑜為寧遠將軍西郡太守張靖為折衝將軍河湟太守索訓為威遠將軍西平太守趙開為騂馬護軍大夏太守索慈為廣武太守陰亮為西安太守令狐赫為武威太守索術為武興太守以招懷東夏又遣宋繇東伐涼興并擊玉門已西諸城皆下之遂屯玉門陽關廣田積穀為東伐之資初呂光之稱王也遣使市六璽玉於于填至是玉至敦煌納之郡府仍於南門外臨水起堂名曰靖恭之堂以議朝政閲武事圖讚自古聖帝明王忠臣孝子烈士貞女玄盛親為序頌以明鑒戒之義當時文武羣僚亦皆圖焉有白雀翔于靖恭堂玄盛觀之大悅又立泮宮增高門學生五百人起嘉納堂於後園以圖讚所志義熙元年玄盛改元為建初遣舍人黃始梁興間行奉表詣闕曰昔漢運將終三國鼎峙鈞天之曆數鍾皇晉高祖闡鴻基景文弘帝業嗣武受終要荒率服六合同風宇宙齊貫而惠皇失馭權臣亂紀懷愍屯邅蒙塵于外懸象上分九服下裂眷言顧之普天同憾伏惟中宗元皇帝基天紹命遷幸江表荊揚蒙弘覆之矜五都為荒榛之藪故太尉西平武公軌當元康之初屬擾攘之際受命典方出撫此州威略所振聲蓋海內明盛繼統不隕前志長旌所指仍闢三秦義立兵強拓境萬里文桓嗣位奕葉載德囊括關西化被昆裔遐邇款藩世修職貢晉德之遠揚繄此州是賴大都督大將軍天錫以英挺之姿承七世之業志匡時難剋隆先勳而中年降災兵寇侵境皇威遐邈同奬弗及以一方之師抗七州之衆兵孤力屈社稷以喪臣聞曆數相推歸餘於終帝王之興必有閏位是以共工亂象於黃農之間秦項篡竊於周漢之際皆機不轉踵覆餗成凶自戎狄陵華已涉百齡五胡僭襲期運將杪四海顒顒懸心象魏故師次東關趙魏莫不企踵淮南大捷三方欣然引領伏惟陛下道協少康德侔光武繼天統位志清函夏至如此州世篤忠義臣之羣僚以臣高祖東莞太守雍曾祖北地太守柔荷寵前朝參忝時務伯祖龍驤將軍廣晉太守長寧侯卓亡祖武衛將軍天水太守安世亭侯弇毗佐涼州著功秦隴殊寵之隆勒于天府妄臣無庸輒依竇融故事迫臣以義上臣大都督大將軍涼公領秦涼二州牧護羌校尉臣以為荊楚替貢齊桓興召陵之師諸侯不恭晉文起城濮之役用能勳光踐土業隆一匡九域賴其弘猷春秋恕其專命功冠當時美垂千祀況今帝居未復諸夏昏墊大禹所經奄為戎墟五嶽神山狄汙其三九州名都夷穢其七辛有所言於茲而驗微臣所以叩心絶氣忘寢與食雕肝焦慮不遑寧息者也江涼雖遼義誠密邇風雲苟通實如脣齒臣雖名未結于天臺量未著于海內然憑賴纍祖寵光餘烈義不細辭以稽大務輒順羣議亡身即事轅弱任重懼忝威命昔在春秋諸侯宗周國皆稱元以布時令今天臺邈遠正朔未加發號施令無以紀數輒年冠建初以崇國憲冀杖寵靈全制一方使義誠著于所天玄風扇于九壤殉命灰身隕越慷慨玄盛謂羣僚曰昔河右分崩羣豪競起吾以寡德為衆賢所推何嘗不忘寢與食思濟黎庶故前遣母弟繇董率雲騎東殄不庭軍之所至莫不賓下今惟蒙遜鴟跱一城自張掖已東晉之遺黎雖為戎虜所制至於向義思風過於殷人之望西伯大業須定不可安寢吾將遷都酒泉漸逼寇穴諸君以為何如張邈贊成其議玄盛大悅曰二人同心其利斷金張長史與孤同矣夫復何疑乃以張體順為寧遠將軍建康太守鎮樂涫徵宋繇為右將軍領敦煌護軍與其子敦煌太守讓鎮敦煌遂遷居于酒泉手令誡其諸子曰吾自立身不營世利經涉纍朝通否任時初不役智有所要求今日之舉非本願也然事會相驅遂荷州土憂責不輕門戶事重雖詳人事未知天心登車理轡百慮填胸後事付汝等粗舉旦夕近事數條遭意便言不能次比至於杜漸防萌深識情變此當任汝所見深淺非吾敕誡所益也汝等雖年未至大若能克己纂修比之古人亦可以當事業矣苟其不然雖至白首亦復何成汝等其戒之慎之節酒慎言喜怒必思愛而知惡憎而知善動念寬恕審而後舉衆之所惡勿輕承信詳審人核真僞遠佞諛近忠正蠲刑獄忍煩擾存高年恤喪病勤省案聽訟訴刑法所應和顏任理慎勿以情輕加聲色賞勿漏疏罰勿容親耳目人間知外患苦禁禦左右無作威福勿伐善施勞逆詐億必以示己明廣加咨詢無自專用從善如順流去惡如探湯富貴而不驕者至難也念此貫心勿忘須臾僚佐邑宿盡禮承敬宴饗饌食事事留懷古今成敗不可不知退朝之暇念觀典籍面牆而立不成人也此郡世篤忠厚人物敦雅天下全盛時海內猶稱之況復今日實是名邦正為五百年鄉黨婚親相連至于公理時有小小頗回為當隨宜斟酌吾臨蒞五年兵難騷動未得休衆息役惠康士庶至于掩瑕藏疾滌除疵垢朝為寇讐夕委心膂雖未足希準古人粗亦無負於新舊事任公平坦然無類初不容懷有所損益計近便為少經遠如有餘亦無愧於前志也初玄盛之西也留女敬愛養於外祖尹文文既東遷玄盛從姑梁褒之母養之其後禿髮檀假道於北山鮮卑遣褒送敬愛于酒泉并通和好玄盛遣使報聘贈以方物玄盛親率騎二萬略地至于建東鄯善前部王遣使貢其方物且渠蒙遜來侵至于建康掠三千餘戶而歸玄盛大怒率騎追之及于彌安大敗之盡收所掠之戶初苻堅建元之末徙江漢之人萬餘戶于敦煌中州之人有田疇不闢者亦徙七千餘戶郭黁之寇武威武威張掖已東人西奔敦煌晉昌者數千戶及玄盛東遷皆徙之于酒泉分南人五千戶置會稽郡中州人五千戶置廣夏郡餘萬三千戶分置武威武興張掖三郡築城于敦煌南子亭以威南虜又以前表未報復遣沙門法泉間行奉表曰江山悠隔朝宗無階延首雲極翹企遐方伏惟陛下應期踐位景福自天臣去乙巳歲順從羣議假統方城時遣舍人黃始奉表通誠遙途嶮曠未知達不吳涼懸邈蜂蠆充衢方珍貢使無由展御謹副寫前章或希簡達臣以其歲進師酒泉戒戎廣平庶攘茨穢而黠虜恣睢未率威教憑守巢穴阻臣前路竊以諸事草創倉帑未盈故息兵按甲務農養士時移節邁荏苒三年撫劍歎憤以日成歲今資儲已足器械已充西招城郭之兵北引丁零之衆冀憑國威席卷河隴揚旌秦川承望詔旨盡節竭誠隕越為效又臣州界迥遠勍寇未除當須鎮副為行留部分輒假臣世子士業監前鋒諸軍事撫軍將軍護羌校尉督攝前軍為臣先驅又敦煌郡大衆殷制御西域管轄萬里為軍國之本輒以次子讓為寧朔將軍西夷校尉敦煌太守統攝昆裔輯寧殊方自餘諸子皆在戎間率先士伍臣總督大綱畢在輸力臨機制命動靖續聞玄盛既遷酒泉乃敦勸稼穡羣僚以年穀頻登百姓樂業請勒銘酒泉玄盛許之於是使儒林祭酒劉彥明為文刻石頌德既而蒙遜每年侵寇不止玄盛志在以德撫其境內但與通和立盟弗之校也是時白狼白兔白雀白雉白鳩皆棲其園囿其羣下以為白祥金精所誕皆應時雍而至又有神光甘露連理嘉禾衆瑞請史官記其事玄盛從之尋而蒙遜背盟來侵玄盛遣世子士業要擊敗之獲其將且渠百年玄盛上巳日宴于曲水命羣僚賦詩而親為之序於是寫諸葛亮訓誡以勖諸子曰吾負荷艱難寧濟之勳未建雖外總良能憑股肱之力而戎務孔殷坐而待旦以維城之固宜兼親賢故使汝等未及師保之訓皆弱年受任常懼弗克以貽咎悔古今之事不可以不知苟近而可師何必遠也覽諸葛亮訓勵應璩奏諫尋其終始周孔之教盡在中矣為國足以致安立身足以成名質略易通寓目則了雖言發往人道師於此且經史道德如採菽中原勤之者則功多汝等可不勉哉玄盛乃修敦煌舊塞東西二圍以防北虜之患築敦煌舊塞西南二圍以威南虜玄盛以緯世之量當呂氏之末為羣雄所奉遂啓霸圖兵無血刃坐定千里謂張氏之業指期而成河西十郡歲月而一既而禿髮檀入據姑臧且渠蒙遜基宇稍廣於是慨然著述志賦焉其辭曰涉至虛以誕駕乘有輿於本無稟玄元而陶衍承景靈之冥符蔭朝雲之菴藹仰朗日之照昫既敷既載以育以成幼希顏子曲肱之榮游心上典玩禮敦經蔑玄冕于朱門羡漆園之傲生尚漁父於滄浪善沮溺之耦耕穢鵄鳶之籠嚇欽飛鳳于太清杜世競於方寸絶時譽之嘉聲超霄吟於崇領奇秀木之陵霜挺修幹之青蔥經歲寒而彌芳情遙遙以遠寄想四老之暉光將戢繁榮於常衢控雲轡而高驤攀瓊枝於玄圃漱華泉之淥漿和吟鳳之逸響應鳴鸞于南岡時弗獲洆心往形留眷駕陽林宛首一丘衝風沐雨載沈載浮利害繽紛以交錯歡感循環而相求乾扉奄寂以重閉天地絶津而無舟悼貞信之道薄謝慚德於圜流遂乃去玄覽應世賓肇弱巾於東宮並羽儀於英倫踐宣德之祕庭翼明后於紫宸赫赫謙光崇明奕奕岌岌王居詵詵百辟君希虞夏臣庶夔益張王頽巖梁后墜壑淳風杪莽以永喪搢紳淪胥而覆溺呂發釁於閨牆厥構摧以傾顛疾風飄于高木回湯沸於重泉飛塵翕以蔽日大火炎其燎原名都幽然影絶千邑闃而無煙斯乃百六之數起滅相因而迭然於是人希逐鹿之圖家有雄霸之想暗王命而不尋邀非分於無象故覆車接路而繼軌膏生靈於土壤哀餘類之忪懞邈靡依而靡仰求欲專而失逾遠寄玄珠於罔象悠悠涼道鞠焉荒凶杪杪余躬迢迢西邦非相期之所會諒冥契而來同跨弱水以建基躡昆墟以為墉總奔駟之駭轡接摧轅於峻峯崇崖崨重嶮萬尋玄邃窈窕磐紆嶔岑榛棘交橫河廣水深狐貍夾路梟鵄羣吟挺非我以為用任至當如影響執同心以御物懷自彼於握掌匪矯情而任荒乃冥合而一往華德是用來庭野逸所以就鞅休矣時英茂哉雋哲庶罩網以遠籠豈徒射鉤與斬袂或脫梏而纓蕤或後至而先列採殊才於巖陸拔翹彥於無際思留侯之神遇振高浪以蕩穢想孔明於草廬運玄籌之罔滯洪操槃而慷慨起三軍以激鋭詠羣豪之高軌嘉關張之飄傑誓報曹而歸劉何義勇之超出據斷橋而橫矛亦雄姿之壯發輝輝南珍英英周魯挺奇荊吳昭文烈武建策烏林龍驤江浦摧堂堂之徑陳鬱風翔而雲舉紹樊韓之遠蹤侔徽猷於召武非劉孫之鴻度孰能臻茲大祜信乾坤之相成庶物希風而潤雨崏益既蕩三江已清穆穆盛勳濟濟隆平御羣龍而奮策彌萬載以飛榮仰遺塵於絶代企高山而景行將建朱旗以啓路驅長轂而迅征靡商風以抗旆拂招搖之華旌資神兆於皇極協五緯之所寧赳赳干城翼翼上弼恣馘奔鯨截彼醜類且灑游塵於當陽拯涼德於已墜間昌𧜛之驂乘暨襄城而按轡知去害之在茲體牧童之所述審機動之至微思遺餐而忘寐表略韵於紈素託精誠于白日玄盛寢疾顧命宋繇曰吾少離荼毒百艱備嘗於喪亂之際遂為此方所推才弱智淺不能一同河右今氣力惙然當不復起矣死者大理吾不悲之所恨志不申耳居元首之位者宜深誡危殆之機吾終之後世子猶卿子也善相輔導述吾平生勿令居人之上專驕自任軍國之宜委之於卿無使籌略乖衷失成敗之要十三年薨時年六十七國人上諡曰武昭王墓曰建世陵廟號太祖先是河右不生楸槐柏漆張駿之世取於秦隴而植之終於皆死而酒泉宮之西北隅有槐樹生焉玄盛又著槐樹賦以寄情蓋歎僻陋遐方立功非所也亦命主簿梁中庸及劉彥明等並作文感兵難繁興時俗喧競乃著大酒容賦以表恬豁之懷與辛景辛恭靖同志友善景等歸晉遇害江南玄盛聞而弔之玄盛前妻同郡辛納女貞順有婦儀先卒玄盛親為之誄自餘詩賦數十篇世子談早卒第二子士業嗣涼後主諱歆字士業玄盛薨時府僚奉為大都督大將軍涼公領涼州牧護羌校尉大赦境內改年為嘉興尊母尹氏為太后以宋繇為武衛將軍廣夏太守軍咨祭酒録三府事索仙為征虜將軍張掖太守且渠蒙遜遣其張掖太守且渠廣宗詐降誘士業士業遣武衛溫宜等赴之親勒大軍為之後繼蒙遜率衆三萬設伏于蓼泉士業聞引兵還為遜所逼士業親貫甲先登大敗之追奔百餘里俘斬七千餘級明年蒙遜又伐士業士業將出距之左長史張體順固諫乃止蒙遜大芟秋稼而還是歲朝廷以士業為持節都督七郡諸軍事鎮西大將軍護羌校尉酒泉公士業用刑頗嚴又繕築不止從事中郎張顯上疏諫曰入歲已來陰陽失序屢有賊風暴雨犯傷和氣今區域三分勢不久並并兼之本實在農戰懷遠之略事歸寬簡而更繁刑峻法宮室是務人力凋殘百姓愁悴致災之咎實此之由主簿泛稱又上疏諫曰臣聞天之子愛人后殷勤至矣故政之不修則垂災譴以戒之改者雖危必昌宋景是也其不改者雖安必亡虢公是也元年三月癸卯敦煌謙德堂陷八月效穀地裂二年元日昏霧四塞四月日赤無光二旬乃復十一月狐上南門今茲春夏地頻五震六月隕星于建康臣雖學不稽古敏謝仲舒頗亦聞道於先師且行年五十有九請為殿下略言耳目之所聞見不復能遠論書傳之事也乃者咸安之初西平地裂狐入謙光殿前俄而秦師奄至都城不守梁熙既為涼州藉秦氏兵亂規有全涼之地外不撫百姓內多聚斂建元十九年姑臧南門崩隕石於間豫堂二十年而呂光東反子敗於前身戮於後段業因羣胡創亂遂稱制此方三年之中地震五十餘所既而先王龍興瓜州蒙遜殺之張掖此皆目前之成事亦殿下之所聞知效穀先王鴻漸之始謙德即尊之室基陷地裂大凶之徵也日者太陽之精中國之象赤而無光中國將為胡夷之所陵滅諺曰野獸入家主人將去今狐上南門亦災之大也又狐者胡也天意若曰將有胡人居于此城南面而居者也昔春秋之世星隕于宋襄公卒為楚所擒地者至陰胡夷之象當靜而動反亂天常天意若曰胡夷將震動中國中國若不修德將有宋襄之禍臣蒙先朝布衣之眷輒自同子弟之親是以不避忤上之誅昧死而進愚款願殿下親仁善鄰養威觀釁罷宮室之務止游畋之娛後宮嬪妃諸夷子女躬受分田身勸蠶績以清儉素德為榮息茲奢靡之費百姓租稅專擬軍國虛襟下士廣招英雋修秦氏之術以強國富俗待國有數年之積庭盈文武之士然後命韓白為前驅納子房之妙算一鼓而姑臧可平長驅可以飲馬涇渭方東面而爭天下豈蒙遜之足憂不然臣恐宗廟之危必不出紀士業並不納士業立四年而宋受禪士業將謀東伐張體順切諫乃止士業聞蒙遜南伐禿髮檀命中外戒嚴將攻張掖尹氏固諫不聽宋繇又固諫士業並不從繇退而歎曰大事去矣吾見師之出不見師之還也士業遂率步騎三萬東伐次于都瀆澗蒙遜自浩亹來距戰於懷城為蒙遜所敗左右勸士業還酒泉士業曰吾違太后明誨遠取敗辱不殺此胡復何面目以見母也勒衆復戰敗于蓼泉為蒙遜所害士業諸弟酒泉太守翻新城太守預領羽林右監密左將軍眺右將軍亮等西奔敦煌蒙遜遂入于酒泉士業之未敗也有大蛇從南門而入至于恭德殿前有雙雉飛出宮內通街大樹上有烏鵲爭巢鵲為烏所殺又有敦煌父老令狐熾夢白頭公衣帢而謂熾曰南風動吹長木胡桐椎不中轂言訖忽然不見士業小字桐椎至是而亡翻及弟敦煌太守恂與諸子等棄敦煌奔于北山蒙遜以索嗣子元緒行敦煌太守元緒粗嶮好殺大失人和郡人宋承張弘以恂在郡有惠政密信招恂恂率數十騎入于敦煌元緒東奔涼興宋承等推恂為冠軍將軍涼州刺史蒙遜遣世子德政率衆攻恂恂閉門不戰蒙遜自率衆二萬攻之三面起隄以水灌城恂遣壯士一千連版為橋潛欲決隄蒙遜勒兵逆戰屠其城士業子重耳脫身奔于江左仕于宋後歸魏為農太守蒙遜徙翻子寶等于姑臧歲餘北奔伊吾後歸于魏獨尹氏及諸女死於伊吾玄盛以安帝隆安四年立至宋少帝景平元年滅據河右凡二十四年史臣曰王者受圖咸資世德猶混成之先大帝若一氣之生兩儀是以中陽勃興資豢龍之構趾景亳垂統本吞燕之開基涼武昭王英姿傑出運陰陽而緯武應變之道如神吞日月以經天成物之功若歲故能懷荒弭暴開國化家宅五郡以稱藩屈三分而奉順若乃詩褒秦仲後嗣建削平之業頌美公劉末孫興配天之祚或發迹於汧渭或布化於邠岐覆簣創元天之基疏涓開環海之宅彼既有漸此亦同符是知景命攸歸非一朝之可致纍功積慶其所由來遠矣贊曰武昭英睿忠勇霸世王室雖微乃誠無替遺黎飲德絶壤霑惠積祉丕基克昌來裔
