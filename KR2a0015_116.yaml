body:
  text: 晉書卷一百十六載記第十六姚弋仲姚弋仲南安赤亭羌人也其先有虞氏之苗裔禹封舜少子於西戎世為羌酋其後燒當雄於洮罕之間七世孫填虞漢中元末寇擾西州為楊虛侯馬武所敗徙出塞虞九世孫遷那率種人內附漢朝嘉之假冠軍將軍西羌校尉歸順王處之於南安之赤亭那玄孫柯回為魏鎮西將軍綏戎校尉西羌都督回生弋仲少英毅不營産業唯以收恤為務衆皆畏而親之永嘉之亂東徙榆眉戎夏繈負隨之者數萬自稱護西羌校尉雍州刺史扶風公劉曜之平陳安也以弋仲為平西將軍封平襄公邑之于隴上及石季龍克上邽弋仲説之曰明公握兵十萬功高一時正是行權立策之日隴上多豪秦風猛徑道隆後服道汙先叛宜徙隴上豪強虛其心腹以實畿甸季龍納之啓勒以弋仲行安西將軍六夷左都督後晉豫州刺史祖約奔於勒勒禮待之弋仲上疏曰祖約殘賊晉朝逼殺太后不忠於主而陛下寵之臣恐姦亂之萌此其始矣勒善之後竟誅約勒既死季龍執權思弋仲之言遂徙秦雍豪傑於關東弋仲率部衆數萬遷于清河拜奮武將軍西羌大都督封襄平縣公及季龍廢石弘自立弋仲稱疾不賀季龍纍召之乃赴正色謂季龍曰奈何把臂受託而反奪之乎季龍憚其強正而不之責遷持節十郡六夷大都督冠軍大將軍性清儉鯁直不修威儀屢獻讜言無所回避季龍甚重之朝之大議靡不參決公卿亦憚而推下之武城左尉季龍寵姬之弟也曾擾其部弋仲執尉數以迫脅之狀命左右斬之尉叩頭流血左右諫乃止其剛直不回皆此類也季龍末梁犢敗李農於滎陽季龍大懼馳召弋仲弋仲率其部衆八千餘人屯于南郊輕騎至鄴時季龍病不時見弋仲引入領軍省賜其所食之食弋仲怒不食曰召我擊賊豈來覓食邪我不知上存亡若一見雖死無恨左右言之乃引見弋仲數季龍曰兒死來愁邪乃至於疾兒小時不能使好人輔相至令相殺兒自有過責其下人太甚故反耳汝病久所立兒小若不差天下必亂當宜憂此不煩憂賊也犢等因思歸之心共為姦盜所行殘賊此成擒耳老羌請效死前鋒使一舉而了弋仲性狷直俗無尊卑皆汝之季龍恕而不責於坐授使持節侍中征西大將軍賜以鎧馬弋仲曰汝看老羌堪破賊以不於是貫鉀跨馬于庭中策馬南馳不辭而出遂滅梁犢以功加劍履上殿入朝不趨進封西平郡公冉閔之亂弋仲率衆討閔次於混橋石祗僭號于襄國以弋仲為右丞相待以殊禮祗與閔相攻弋仲遣其子襄救祗戒襄曰汝才十倍於閔若不梟擒不須復見我也襄擊閔於常盧澤大破之而歸弋仲怒襄之不擒閔也杖之一百弋仲部曲馬何羅博學有文才張豺之輔石世也背弋仲歸豺豺以為尚書郎豺敗復歸咸勸殺之弋仲曰今正是招才納奇之日當收其力用不足害也以為參軍其寬恕如此弋仲有子四十二人常戒諸子曰吾本以晉室大亂石氏待吾厚故欲討其賊臣以報其德今石氏已滅中原無主自古以來未有戎狄作天子者我死汝便歸晉當竭盡臣節無為不義之事乃遣使請降永和七年拜弋仲使持節六夷大都督都督江淮諸軍事車騎大將軍儀同三司大單于封高陵郡公八年卒時年七十三子襄之入關也為苻生所敗弋仲之柩為生所得生以王禮葬之於天水冀縣萇僭位追諡曰景元皇帝廟號始祖墓曰高陵置園邑五百家姚襄襄字景國弋仲之第五子也年十七身長八尺五寸臂垂過膝雄武多才藝明察善撫納士衆愛敬之咸請為嗣弋仲弗許百姓固請者日有千數乃授之以兵石祗僭號以襄為使持節驃騎將軍護烏丸校尉豫州刺史新昌公晉遣使拜襄持節平北將軍并州刺史即丘縣公弋仲死襄祕不發喪率戶六萬南攻陽平元城發干皆破之殺掠三千餘家屯於碻磝津以太原王亮為長史天水尹赤為司馬略陽伏子成為左部帥南安斂岐為右部帥略陽王黑那為前部帥強白為後部帥太原薛讚略陽權翼為參軍南至滎陽始發喪行服與高昌李歷戰於麻田馬中流矢死賴其弟萇以免晉處襄於譙城遣五弟為任單騎度淮見豫州刺史謝尚於壽春尚命去仗衛幅巾以待之一面交款便若平生襄少有高名雄武冠世好學博通雅善談論英濟之稱著于南夏中軍將軍楊州刺史殷浩憚其威名乃因襄諸弟頻遣刺客殺襄刺客皆推誠告實襄待之若舊浩潛遣將軍魏憬率五千餘人襲襄襄乃斬憬而并其衆浩愈惡之乃使將軍劉啓守譙遷襄于梁國蠡臺表授梁國內史襄遣權翼詣浩浩曰姚平北每舉動自由豈所望也翼曰將軍輕納姦言自生疑二愚謂猜嫌之由不在於彼浩曰姚君縱放小人盜竊吾馬王臣之禮固若是乎翼曰將軍謂姚平北以威武自強終為難保校兵練衆將懲不恪取馬者欲以自衛耳浩曰何至是也浩遣謝萬討襄襄逆擊破之浩甚怒會聞關中有變浩率衆北伐襄乃要擊浩於山桑大敗之斬獲萬計收其資仗使兄益守山桑壘復如淮南浩遣劉啓王彬之伐山桑襄自淮南擊滅之鼓行濟淮屯于盱眙招掠流人衆至七萬分置守宰勸課農桑遣使建鄴罪狀殷浩并自陳謝流人郭斁等千餘人執晉堂邑內史劉仕降于襄朝廷大震以吏部尚書周閔為中軍將軍緣江備守襄將佐部衆皆北人咸勸襄北還襄方軌北引自稱大將軍大單于進攻外黃為晉邊將所敗襄收散卒而勤撫恤之於是復振乃據許昌將如河東以圖關右自許遂攻洛陽踰月不克其長史王亮諫襄曰公英略蓋天下士衆思效力命不可損威勞衆守此孤城宜還河北以弘遠略襄曰洛陽雖小山河四塞之固亦是用武之地吾欲先據洛陽然後開建大業俄而亮卒襄哭之甚慟曰天將不欲成吾事乎王亮捨我去也晉征西大將軍桓溫自江陵伐襄戰於伊水北為溫所敗率麾下數千騎奔于北山其夜百姓棄妻子隨襄者五千餘人屯據陽鄉赴者又四千餘戶襄前後敗喪數矣衆知襄所在輒扶老攜幼奔馳而赴之時或傳襄創重不濟溫軍所得士女莫不北望揮涕其得物情如此先是弘農楊亮歸襄襄待以客禮後奔桓溫溫問襄於亮亮曰神明器宇孫策之儔而雄武過之其見重如是襄尋徙北屈將圖關中進屯杏城遣其從兄輔國姚蘭略地鄜城使其兄益及將軍王欽盧招集北地戎夏歸附者五萬餘戶苻生遣其將苻飛拒戰蘭敗為飛所執襄率衆西引生又遣苻堅鄧羌等要之襄將戰沙門智通固諫襄宜厲兵收衆更思後舉襄曰二雄不俱立冀天不棄德以濟黎元吾計決矣會羌師來逼襄怒遂長驅而進戰于三原襄敗為堅所殺時年二十七是歲晉升平元年也苻生以公禮葬之萇僭號追諡魏武王封襄孫延定為東城侯姚萇萇字景茂弋仲第二十四子也少聰哲多權略廓落任率不修行業諸兄皆奇之隨襄征伐每參大謀襄之寇洛陽也夢萇服袞衣升御坐諸酋長皆侍立旦謂將佐曰吾夢如此此兒志度不或能大起吾族襄之敗于麻田也馬中流矢死萇下馬以授襄襄曰汝何以自免萇曰但令兄濟豎子安敢害萇會救至俱免及襄死萇率諸弟降於苻生苻堅以萇為揚武將軍歷左衛將軍隴東汲郡河東武都武威巴西扶風太守寧幽兗三州刺史復為揚武將軍步兵校尉封益都侯為堅將纍有大功初萇隨楊安伐蜀嘗晝寢水旁上有神光煥然左右咸異之及苻堅寇晉以萇為龍驤將軍督益梁州諸軍事謂萇曰朕本以龍驤建業龍驤之號未曾假人今特以相授山南之事一以委卿堅左將軍竇衝進曰王者無戲言此將不詳之徵也惟陛下察之堅默然堅既敗於淮南歸長安慕容泓起兵叛堅堅遣子睿討之以萇為司馬為泓所敗睿死之萇遣龍驤長史趙都詣堅謝罪堅怒殺之萇懼奔於渭北遂如馬牧西州豪族尹詳趙曜王欽盧牛雙狄廣張乾等率五萬餘家咸推萇為盟主萇將距之天水尹緯説萇曰今百六之數既臻秦亡之兆已見以將軍威靈命世必能匡濟時艱故豪傑驅馳咸同推仰明公宜降心從議以副羣望不可坐觀沈溺而不拯救之萇乃從緯謀以太元九年自稱大將軍大單于萬年秦王大赦境內年號白雀稱制行事以天水尹詳南安龐演為左右長史南安姚晃尹緯為左右司馬天水狄伯支焦虔梁希龐魏任謙為從事中郎薑訓閻遵為掾屬王據焦世蔣秀尹延年牛雙張乾為參軍王欽盧姚方成王破虜楊難尹嵩裴騎趙曜狄廣黨刪等為帥時慕容沖與苻堅相攻衆甚盛萇將西上恐沖遏之乃遣使通知以子崇為質於沖進屯北地厲兵積粟以觀時變苻堅先徙晉人李詳等數千戶于敷陸至是降於萇北地新平安定羌胡降者十餘萬戶堅率諸將攻之不能克萇聞慕容沖攻長安議進趨之計羣下咸曰宜先據咸陽以制天下萇曰燕因懷舊之士而起兵若功成事捷咸有東歸之思安能久固秦川吾欲移兵嶺北廣收資實須秦弊燕回然後垂拱取之兵不血刃坐定天下此卞莊得二之義也堅寧朔將軍宋方率騎三千從雲中將赴長安萇自二縣要破之方單馬奔免其司馬田晃率衆降萇萇遣諸將攻新平克之因略地至安定嶺北諸城盡降之時苻堅為慕容沖所逼走入五將山沖入長安堅司隸校尉權翼尚書趙遷大鴻臚皇甫覆光祿大夫薛讚扶風太守段鏗等文武數百人奔於萇萇遣驍騎將軍吳忠率騎圍堅萇如新平俄而忠執堅送之慕容沖遣其車騎大將軍高蓋率衆五萬來伐戰於新平南大破之蓋率麾下數千人來降拜散騎常侍沖既率衆東下長安空虛盧水郝奴稱帝於長安渭北盡應之扶風王驎有衆數千保據馬嵬奴遣弟多攻驎萇伐驎破之驎走漢中執多而進攻奴降之以太元十一年萇僭即皇帝位于長安大赦改元曰建初國號大秦改長安曰常安立妻氏為皇后子興為皇太子置百官自謂以火德承苻氏木行服色如漢氏承周故事徙安定五千餘戶于長安以弟征虜緒為司隸校尉鎮長安萇如安定擊平涼胡金熙鮮卑沒奕于大破之遂如秦州與苻堅秦州刺史王統相持天水屠各略陽羌胡應萇者二萬餘戶統懼乃降因饗將士于上邽南安人古成詵進曰臣州人殷地險雋傑如林用武之國也王秦州不能收拔賢才三分鼎足而坐玩珠玉以至于此陛下宜散秦州金帛以施六軍旌賢表善以副鄙州之望萇善之擢為尚書郎拜弟碩德都督隴右諸軍事征西將軍秦州刺史領護東羌校尉鎮上邽萇還安定修德政布惠化省非急之費以救時弊閭閻之士有豪介之善者皆顯異之萇復如秦州為苻登所敗語在登傳以其太子興鎮長安而與登相距登馮翊太守蘭犢與苻師奴離二慕容永攻之犢遣使請救萇將赴救尚書令姚旻左僕射尹緯等言於萇曰苻登近在瓦亭陛下未宜輕舉萇曰登遲重少決每失時機聞吾自行正當廣集兵資必不能輕軍深入兩月之間足可克此三豎吾事必矣遂師次於渥源師奴率衆來距大戰敗之盡俘其衆又擒蘭犢收其士馬萇乃掘苻堅尸鞭撻無數裸剝衣裳薦之以棘坎土而埋之慕容永征西將軍王宣率衆降萇初關西雄傑以苻氏既終萇雄略命世天下之事可一旦而定萇既與苻登相持積年數為登所敗遠近咸懷去就之計唯征虜齊難冠軍徐洛生輔國劉郭單冠威彌姐婆觸龍驤趙惡地鎮北梁國兒等守忠不二並留子弟守營供繼軍糧身將精卒隨萇征伐時諸營既多故號萇軍為大營大營之號自此始也時天大雪萇下書深自責罰散後宮文綺珍寶以供戎事身食一味妻不重綵將帥死王事者加秩二等士卒戰沒皆有褒贈立太學禮先賢之後敦煌索盧曜請刺苻登萇曰卿以身徇難將為誰乎曜曰臣死之後深以友人隴西辛暹仰託萇遣之事發為登所殺萇以暹為騎都尉登進逼安定諸將勸萇決戰萇曰與窮寇競勝兵家之下吾將以計取之於是留其尚書令姚旻守安定夜襲登輜重於大界克之諸將或欲因登駭亂擊之萇曰登衆雖亂怒氣猶盛未可輕也遂止萇以安定地狹且逼苻登使姚碩德鎮安定徙安定千餘家于陰密遣弟征南靖鎮之立社稷于長安百姓年七十有德行者拜為中大夫歲賜牛酒尹緯姚晃謂古成詵曰苻登窮寇歷年未滅姦雄鴟峙所在糾扇夷夏皆二將若之何詵曰主上權略無方信賞必罰賢能之士咸懷樂推豈慮大業不成氐賊不滅乎緯曰登窮寇未滅姦雄所在扇合吾等寧無懼乎詵曰三秦天府之國主上十分已有其八今所在可慮者苻登楊定雷惡地耳自餘瑣瑣焉足論哉然惡地地狹衆寡不足為憂苻登藉烏合犬羊偷存假息料其智勇非至尊之匹霸王之起必有驅除然後克定大業昔漢魏之興也皆十有餘年乃能一同於海內五六年間未為久也主上神略內明英武外發可謂無敵於天下耳取登有餘力願布德行仁招賢納士厲兵秣馬以候天機如其鴻業不成者詵請腰斬以謝明公緯言之於萇萇大悅賜詵爵關內侯雷惡地率衆降萇拜為鎮東將軍魏褐飛自稱大將軍衝天王率氐胡數萬人攻安北姚當城於杏城雷惡地應之攻鎮東姚漢得於李潤萇議將討之羣臣咸曰陛下不憂六十里苻登乃憂六百里褐飛萇曰登非可卒殄吾城亦非登所能卒圖惡地多智非常人也南引褐飛東結董成甘言美説以成姦謀若得杏城李潤惡地據之控制遠近相為羽翼長安東北非復吾有於是潛軍赴之萇時衆不滿二千褐飛惡地衆至數萬氐胡赴之者首尾不絶萇每見一軍至輒有喜色羣下怪而問之萇曰今同惡相濟皆來會集吾得乘勝席卷一舉而覆其巢穴東北無復餘也褐飛等以萇兵少盡衆來攻萇固壘不戰示之以弱潛遣子崇率騎數百出其不意以乘其後褐飛兵擾亂萇遣鎮遠王超平遠談亮率步騎擊之褐飛衆大潰斬褐飛及首級萬餘惡地請降萇待之如初惡地每謂人曰吾自言智勇所施足為一時之傑校數諸雄如吾之徒皆應跨據一方獸嘯千里遇姚公智力摧屈是吾分也惡地猛毅清肅不可干以非義嶺北諸豪皆敬憚之萇命其將當城於營處一柵孔中蒔樹一根以旌戰功歲餘問之城曰營所至小已廣之矣萇曰少來鬬戰無如此快以千六百人破三萬衆國之事業由此克舉小乃為奇大何足貴二城胡曹寅王達獻馬三千匹以寅為鎮北將軍并州刺史達鎮遠將軍金城太守萇性簡率羣下有過或面加罵辱太常權翼言於萇曰陛下弘達自任不修小節駕馭羣雄苞羅俊異棄嫌録善有高祖之量然輕慢之風所宜除也萇曰吾之性也吾於舜之美未有片焉漢祖之短已收其一若不聞讜言安知過也南羌竇鴦率戶五千來降拜安西將軍萇下書有復私仇者皆誅之將吏亡滅者各隨所親以立後振給長育之鎮東苟曜據逆萬堡密引苻登萇與登戰敗於馬頭原收衆復戰姚碩德謂諸將曰上慎於輕戰每欲以計取之今戰既失利而更逼賊者必有由也萇聞而謂碩德曰登用兵遲緩不識虛實今輕兵直進徑據吾東必苟曜豎子與之連結也事久變成其禍難測所以速戰者欲使豎子謀之未就好之未深散敗其事耳進戰大敗之登退屯于郿登將金槌以新平降萇萇輕將數百騎入槌營羣下諫之萇曰槌既去苻登復欲圖我將安所歸且懷德初附推款委質吾復以不信待之何以御物乎羣氐果有異謀槌不從而止萇如陰密攻登敕其太子興曰苟曜好姦變將為國害聞吾還北必來見汝汝便執之苟曜果見興于長安興遣尹緯讓而誅之萇大敗登于安定東置酒高會諸將咸曰若值魏武王不令此賊至今陛下將牢太過耳萇笑曰吾不如亡兄有四身長八尺五寸臂垂過膝人望而畏之一也當十萬之衆與天下爭衡望麾而進前無橫陳二也溫古知今講論道藝駕馭英雄收羅雋異三也董率大衆履險若夷上下咸允人盡死力四也所以得建立功業策任羣賢者正望算略中一片耳羣臣咸稱萬歲萇下書令留臺諸鎮各置學官勿有所廢考試優劣隨才擢苻登驃騎將軍沒奕于率戶六千降拜使持節車騎將軍高平公萇寢疾遣姚碩德鎮李潤尹緯守長安召其太子興詣行營征南姚方成言於興曰今寇賊未滅上復寢疾王統苻胤等皆有部曲終為人害宜盡除之興於是誅苻胤王統王廣徐成毛盛乃赴召興至萇怒曰王統兄弟是吾州里無他遠志徐成等昔在秦朝並為名將天下小定吾方任之奈何輒便誅害令人喪氣萇下書兵吏從征伐戶在大營者世世復其家無所豫苻登與竇衝相持萇議擊之尹緯言於萇曰太子純厚之稱著于遐邇將領英略未為遠近所知宜遣太子親行可以漸廣威武防窺之原萇從之戒興曰賊徒知汝轉近必相驅入堡聚而掩之無不克矣比至胡空堡衝圍自解登聞興向胡空堡引還興因襲平涼大獲而歸咸如萇策使興還鎮長安萇下書除妖謗之言及赦前姦穢有相劾舉者皆以其罪罪之晉平遠將軍護氐校尉楊佛嵩率胡蜀三千餘戶降于萇晉將楊佺期趙睦追之遣姚崇赴救大敗晉師斬趙睦以佛嵩為鎮東將軍萇如長安至於新支堡疾篤輿疾而進夢苻堅將天官使者鬼兵數百突入營中萇懼走入宮宮人迎萇刺鬼誤中萇陰鬼相謂曰正中死處拔矛出血石餘寤而驚悸遂患陰腫醫刺之出血如夢萇遂狂言或稱臣萇殺陛下者兄襄非臣之罪願不枉臣至長安召太尉姚旻尚書左僕射尹緯右僕射姚晃尚書狄伯支等入受遺輔政萇謂興曰有毀此諸人者慎勿受之汝撫骨肉以仁接大臣以禮待物以信遇黔首以恩四者既備吾無憂矣以太元十八年死時年六十四在位八年偽諡武昭皇帝廟號太祖墓稱原陵
