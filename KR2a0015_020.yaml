body:
  text: 晉書卷二十志第十禮中五禮之別二曰凶自天子至于庶人身體髮膚受之父母其理既均其情亦等生則養死則哀故曰三年之喪天下之達禮者也漢禮天子崩自不豫至於登遐及葬喪紀之制與夫三代變易魏晉以來大體同漢然自漢文革喪禮之制後代遵之無復三年之禮及魏武臨終遺令天下尚未安定未得遵古百官當臨殿中者十五舉音葬畢便除其將兵屯戍者不得離部魏武以正月庚子崩辛丑即殯是月丁卯葬是為不踰月也及宣帝景帝之崩並從權制文帝之崩國內服三日武帝亦遵漢魏之典既葬除喪然猶深衣素冠降席撤膳太宰司馬孚太傅鄭沖太保王祥太尉何曾司徒領中領軍司馬望司空荀顗車騎將軍賈充尚書令裴秀尚書僕射武陔都護大將軍郭建侍中郭綏中書監荀勖中軍將軍羊祜等奏曰臣聞禮典軌度豐殺隨時虞夏商周咸不相襲蓋有由也大晉紹承漢魏有革有因期於足以興化而已故未得皆返太素同規上古也陛下既以俯遵漢魏降喪之典以濟時務而躬蹈大孝情過乎哀素冠深衣降席撤膳雖武丁行之於殷世曾閔履之於布衣未足以踰方今荊蠻未夷庶政未萬機事殷動勞神慮豈遑全遂聖旨以從至情臣等以為陛下宜割情以康時濟俗輒敕御府易服內者改坐太官復膳諸所施行皆如舊制詔曰每感念幽冥而不得終苴絰於草土以存此痛況當食稻衣錦誠詭然激切其心非所以相解也吾本諸生家傳禮來久何心一旦便易此情於所天相從已多可試省孔子答宰我之言無事紛紜也言及悲剝柰何柰何孚等重奏伏讀聖詔感以悲懷輒思仲尼所以抑宰我之問聖思所以不能已已甚深甚篤然今者干戈未戢武事未偃萬機至重天下至衆陛下以萬乘之尊履布衣之禮服粗席水飲疏食殷憂內盈毀悴外表而躬勤萬機坐而待旦降心接下仄不遑食所以勞力者如斯之甚是以臣等悚息不寧誠懼神氣用損以疚大事輒敕有司改坐復常率由舊典惟陛下察納愚款以慰皇太后之心又詔曰重覽奏議益以悲剝不能自勝柰何柰何三年之喪自古達禮誠聖人稱情立衷明恕而行也神靈日遠無所訴告雖薄於情食旨服美所不堪也不宜反覆重傷其心言用斷絕柰何柰何帝遂以此禮終三年後居太后之喪亦如之泰始二年八月詔曰此上旬先帝棄天下日也便以周年吾當復何時一得人子之情邪思慕煩毒欲詣陵瞻侍以盡哀憤主者具行備太宰安平王孚尚書令裴秀尚書僕射武陔等奏陛下至孝蒸蒸哀思罔極衰麻雖除哀毀疏食有損神和今雖秋節尚有餘暑謁見山陵悲感摧傷羣下竊用竦息以為宜降抑聖情以慰萬國詔曰孤忽爾日月已周痛慕摧感永無逮及欲瞻奉山陵以哀憤體氣自佳耳又已涼便當行不得如所奏也主者便具行備又詔曰漢文不使天下盡哀亦帝王至謙之志當見山陵何心而無服其以衰絰行孚等重奏曰臣聞上古喪期無數後世乃有年月之漸漢文帝隨時之義制為短喪傳之于後陛下以社稷宗廟之重萬方億兆之故既從權制釋除衰麻羣臣百姓吉服今者謁陵以哀慕若加衰絰進退無當不敢奉詔詔曰亦知不在此麻布耳然人子情思為欲令哀喪之物在身蓋近情也羣臣自當案舊制孚等又奏曰臣聞聖人制作必從時宜故五帝殊樂三王異禮此古今所以不同質文所以迭用也陛下隨時之宜既降心克己俯就權制既除衰麻而行心喪之禮今復制服義無所依若君服而臣不服亦未之敢安也參議宜如前奏詔曰患情不能跂及耳衣服何在諸君勤勤之至豈苟相違泰始四年皇太后崩有司奏前代故事倚廬中施白縑帳蓐素牀以布巾裹塊草軺輦版轝細犢車皆施縑𩹉詔不聽但令以布衣車而已其餘居喪之制不改禮文有司又奏大行皇太后當以四月二十五日安厝故事虞著衰服既虞而除其內外官僚皆就朝晡臨位御除服訖各還所次除衰服詔曰夫三年之喪天下之達禮也受終身之愛而無數年之報柰何葬而便即吉情所不忍也有司又奏世有險易道有洿隆所遇之時異誠有由然非忽禮也方今戎馬未散王事至殷更須聽斷以熙庶績昔周康王始登翌室猶戴冕臨朝降于漢魏既葬除釋諒闇之禮自遠代而廢矣惟陛下割高宗之制從當時之宜詔曰夫三年之喪所以盡情致禮葬已便除所不堪也當吾哀懷言用斷絕柰何柰何有司又固請詔曰不能篤孝勿以毀傷為憂也誠知衣服末事耳然今思存草土率當以吉物奪之迺所以重傷至心非見念也每代禮典質文皆不同耳何為限以近制使達喪闕然乎羣臣又固請帝流涕久之迺許文明皇后崩及武元楊后崩天下將吏發哀三日止穆帝崩哀帝立帝於穆帝為從父昆弟穆帝舅褚歆有表中書答表朝廷無其儀詔下議尚書僕射江虨等四人並云閔僖兄弟也而為父子則哀帝應為帝嗣衞軍王述等二十五人云成帝不私親愛越授天倫康帝受命顯宗社稷之重已移所授纂承之序宜繼康皇尚書謝奉等六人云繼體之正宜本天屬考之人情宜繼顯宗也詔從述等議上繼顯宗寧康二年七月簡文帝崩再周而遇閏博士謝攸孔粲議魯襄二十八年十二月乙未楚子卒實閏月而言十二月者附正於前月也喪事先遠則應用博士吳商之言以閏月祥尚書僕射謝安中領軍王劭散騎常侍鄭襲右衞將軍殷康驍騎將軍袁宏散騎侍郎殷茂中書郎車胤左丞劉遵吏部郎劉耽意皆同康曰過七月而未及八月豈可謂之踰朞必所不了則當從其重者宏曰假值閏十二月而不取者此則歲未終固不可得矣漢書以閏為後九月明其同體也襲曰中宗肅祖皆以閏月崩祥除之變皆用閏之後月先朝尚用之後月今閏附七月取之何疑亦合遠日申情之言又閏是後七而非八也豈踰月之嫌乎尚書令王彪之侍中王混中丞譙王恬右丞戴謐等議異彪之曰吳商中才小官非名賢碩儒公輔重臣為時所準則者又取閏無證據直擥遠日之義越祥忌限外取不合卜遠之理又丞相桓公嘗論云禮二十五月大祥何緣越朞取閏乃二十六月乎於是啟曰或以閏附七月宜用閏月除者或以閏名雖附七月而實以三旬別為一月故應以七月除者臣等與中軍將軍沖參詳一代大禮宜準經典三年之喪十三月而練二十五月而畢禮之明文也陽秋之義閏在年內則略而不數明閏在年外則不應取之以越朞忌之重禮制祥除必正朞月故也己酉晦帝除縞即吉徐廣論曰凡辨義詳理無顯據明文可以折中奪易則非疑如何禮疑從重喪易寧戚順情通物固有成言矣彪之不能徵援正義有以相屈但以名位格人君子虛受心無適莫豈其然哉執政從而行之其殆過矣魏武以正月崩魏文以其年七月設妓樂百戲是則魏不以喪廢樂也武帝以來國有大喪輒廢樂終三年惠帝太安元年太子喪未除及元會亦廢樂穆帝永和中為中原山陵未修復頻年元會廢樂是時太后臨朝后父褚裒薨元會又廢樂也孝武太元六年為皇后王氏喪亦廢樂孝武崩太傅錄尚書會稽王道子議山陵之後通婚嫁不得作樂以一朞為斷漢儀太皇太后皇太后崩長樂太僕少府大長秋典喪事三公奉制度他皆如禮魏晉亦同天子之禮泰始十年武元楊皇后崩及將遷于峻陽陵依舊制既葬帝及羣臣除喪即吉先是尚書祠部奏從博士張靖議皇太子亦從制俱釋服博士陳逵議以為今制所依蓋漢帝權制興於有事非禮之正皇太子無有國事自宜終服有詔更詳議尚事杜預以為古者天子諸侯三年之喪始同齊斬既葬除喪服諒闇以居心喪終制不與士庶同禮漢氏承秦率天下為天子修服三年漢文帝見其下不可久行而不知古制更以意制祥禫除喪即吉魏氏直以訖葬為節嗣君皆不復諒闇終制學者非之久矣然竟不推究經傳考其行事專謂王者三年之喪當以衰麻終二十五月嗣君苟若此則天子羣臣皆不得除喪雖志在居篤更逼而不行至今世主皆從漢文輕典由處制者非制也今皇太子與尊同體宜復古典卒哭除衰麻以諒闇終制於義既不應不除又無取於漢文乃所以篤喪禮也於是尚書僕射盧欽尚書魏舒問杜預證據所依預云傳稱三年之喪自天子達此謂天子絕朞唯有三年喪也非謂居喪衰服三年與士庶同也故后世子之喪而叔嚮稱有三年之喪二也周公不言高宗服喪三年而云諒闇三年此釋服心喪之文也叔嚮不譏景王除喪而譏其燕樂已早明既葬應除而違諒闇之節也春秋晉侯享諸侯子產相鄭伯時簡公未葬請免喪以聽命君子謂之得禮宰咺來歸惠公仲子之賵傳曰弔生不及哀此皆既葬除服諒闇之證先儒舊說往往亦見學者未之思耳喪服諸侯為天子亦斬衰豈可謂終服三年邪上考七代未知王者君臣上下衰麻三年者誰下推將來恐百世之主其理一也非必不能乃事勢不得故知聖人不虛設不行之制仲尼曰禮所損益雖百世可知此之謂也於是欽舒從之遂命預造議奏曰侍中尚書令司空魯公臣賈充侍中尚書僕射奉車都尉大梁侯臣盧欽尚書新沓伯臣山濤尚書奉車都尉平春侯臣胡威尚書劇陽子臣魏舒尚書堂陽子臣石鑒尚書豐樂亭侯臣杜預稽首言禮官參議博士張靖等議以為孝文權制三十六日之服以日易月道有樜隆禮不得全皇太子亦宜割情除服博士陳逵等議以為三年之喪人子所以自盡故聖人制禮自上達下是以今制將吏諸遭父母喪皆假寧二十五月敦崇孝道所以風化天下皇太子至孝著于內而衰服除于外非禮所謂稱情者也宜其不除臣欽臣舒臣預謹案靖逵等議各見所學之一端未曉帝者居喪古今之通禮也自上及下尊卑貴賤物有其宜故禮有以多為貴者有以少為貴者有以高為貴者有以下為貴者唯其稱也不然則本末不經行之不遠天子之與羣臣雖哀樂之情若一而所居之宜實異故禮不得同易曰上古之世喪期無數虞書稱三載四海遏密八音其後無文至周公旦乃稱殷之高宗諒闇三年不言其傳曰諒信也闇默也下逮五百餘歲而子張疑之以問仲尼仲尼答云何必高宗古之人皆然君薨百官總己以聽於冢宰三年周景王有后世子之喪既葬除喪而樂晉叔嚮譏之曰三年之喪雖貴遂服禮也王雖弗遂宴樂已早亦非禮也此皆天子喪事見於古文者也稱高宗不云服喪三年而云諒闇三年此釋服心喪之文也譏景王不譏其除喪而譏其宴樂已早明既葬應除而違諒闇之節也堯崩舜諒闇三年故稱遏密八音由此言之天子居喪齊斬之制菲杖絰帶當遂其服既葬而除諒闇以終之三年無改父之道故百官總己聽於冢宰喪服已除故稱不言之美明不復寢苫枕塊以荒大政也禮記三年之喪自天子達又云父母之喪無貴賤一也又云端衰喪車皆無等此通謂天子居喪衣服之節同於凡人心喪之禮終於三年亦無服喪三年之文然繼體之君猶多荒寧自從廢諒闇之制至令高宗擅名於往代子張致疑於當時此乃聖賢所以為譏非譏天子不以服終喪也秦燔書籍率意而行亢上抑下漢祖草創因而不革乃至率天下皆終重服旦夕哀臨經罹寒暑禁塞嫁娶飲酒食肉制不稱情是以孝文遺詔斂畢便葬葬畢制紅禫之除雖不合高宗諒闇之義近於古典故傳之後嗣于時預修陵廟故斂葬得在浹辰之內因以定制近至明帝存無陵寢五旬乃葬安在三十六日此當時經學疏略不師前聖之病也魏氏革命以既葬為節合於古典然不垂心諒闇同譏前代自泰始開元陛下追尊諒闇之禮慎終居篤允臻古制超絕於殷宗天下歌德誠非靖等所能原本也天子諸侯之禮當以具矣諸侯惡其害己而削其籍今其存者唯士喪一篇戴聖之記雜錯其間亦難以取正天子之位至尊萬機之政至大羣臣之衆至廣不同之於凡人故大行既葬祔祭于廟則因疏而除之己不除則羣臣莫敢除故屈己以除之而諒闇以終制天下之人皆曰我王之仁也屈己以從宜皆曰我王之孝也既除而心喪我王猶若此之篤也凡等臣子亦焉得不自勉以崇禮此乃聖制移風易俗之本高宗所以致雍熙豈惟衰裳而已哉若如難者更以權制自居疑於屈伸厭降欲以職事為斷則父在為母朞父卒三年此以至親屈於至尊之義也出母之喪以至親為屬而長子不得有制體尊之義升降皆從不敢獨也禮諸子之職掌國子之倅國有事則帥國子而致之太子唯所用之傳曰君行則守有守則從從曰撫軍守曰監國不無事矣喪服母為長子妻為夫妾為主皆三年內宮之主可謂無事揆度漢制孝文之喪紅禫既畢孝景即吉於未央薄后竇后必不得齊斬於別宮此可知也況皇太子配貳至尊與國為體固宜遠遵古禮近同時制屈除以寬諸下協一代之成典君子之於禮有直而行曲而殺有經而等有順而去之存諸內而已禮云非玉帛之謂喪云唯衰麻之謂乎此既臣等所謂經制大義且即實近言亦有不安今皇太子至孝蒸蒸發於自然號咷之慕匍匐殯宮大行既奠往而不反必想像平故徬徨寢殿若不變從諒闇則東宮臣僕義不釋服此為永福官屬當獨衰麻從事出入殿省亦難以繼今將吏雖蒙同二十五月之寧至於大臣亦奪其制昔翟方進自以身為漢相居喪三十六日不敢踰國典而況於皇太子臣等以為皇太子宜如前奏除服諒闇制于是太子遂以厭降之議從國制除衰麻諒闇終制于時外內卒聞預異議多怪之或者乃謂其違禮以合時時預亦不自解說退使博士段暢博採典籍為之證據令大義著明足以垂示將來暢承預旨遂撰集書傳舊文條諸實事成言以為定證以弘指趣其傳記有與今議同者亦具列之博舉二隅明其會歸以證斯事文多不載武帝楊悼皇后既母養懷帝后遇難時懷帝尚幼及即位中詔述后恩愛及后祖載羣官議帝應為追制服或以庶母慈己依禮制小功五月或以謂慈母服如母服齊衰者衆議不同閭丘沖議云楊后母養聖上蓋以曲情今以恩禮追崇不配世祖廟王者無慈養之服謂宜祖載之日可三朝素服發哀而已於是從之康帝建元元年正月晦成恭杜皇后周忌有司奏至尊朞年應改服詔曰君親名教之重也權制出於近代耳於是素服如舊固非漢魏之典也興寧元年哀帝章皇太妃薨帝欲服重江虨啟先王制禮應在緦服詔欲降朞虨又啟厭屈私情所以上嚴祖考於是制緦麻三月孝武寧康中崇德太后褚氏崩后於帝為從嫂或疑其服博士徐藻議以為資父事君而敬同又禮其夫屬父道者其妻皆母道也則夫屬君道妻亦后道矣服后宜以資母之義魯譏逆祀以明尊尊今上躬奉康穆哀皇及靖后之祀致敬同於所天豈可敬之以君道而服廢於本親謂應服齊衰朞於是帝制朞服隆安四年孝武太皇太后李氏崩疑所服尚書左僕射何澄右僕射王雅尚書車胤孔安國祠部郎徐廣議太皇太后名位允正體同皇極理制備盡情禮彌申陽秋之義母以子貴既稱夫人禮服從正故成風顯夫人之號文公服三年之喪子於父之所生體尊義重且禮祖不厭孫固宜遂服無屈而緣情立制若嫌明文不存則疑斯從重謂應同於為祖母後齊衰朞永安皇后無服但一舉哀百官亦一朞詔可孝武帝太元十五年淑媛陳氏卒皇太子所生也有司參詳母以子貴贈淑媛為夫人置家令典喪事太子前衞率徐邈議喪服傳稱與尊者為體則不服其私親又君父所不服子亦不敢服故王公妾子服其所生母練冠麻衣既葬而除非五服之常則謂之無服從之太元二十一年孝武帝崩孝武太后制三年之服惠帝太安元年三月皇太孫尚薨有司奏御服齊衰朞詔下通議散騎常侍謝衡以為諸侯之太子誓與未誓尊卑體殊喪服云為嫡子長殤謂未誓也已誓則不殤也中書令卞粹曰太子始生故已尊重不待命誓若衡議已誓不殤則無服之子當斬衰三年未誓而殤則雖十九當大功九月誓與未誓其為升降也微斬衰與大功其為輕重也遠而今注云諸侯不降嫡殤重嫌於無服以大功為重嫡之服則雖誓無復有三年之理明矣男能衞社稷女能奉婦道以可成之年而有已成之事故可無殤非孩齔之謂也為殤後者尊之如父猶無所加而止殤服況以天子之尊而為無服之殤行成人之制邪凡諸宜重之殤皆士大夫不加服而令至尊獨居其重未之前聞也博士蔡克同粹祕書監摯虞云太子初生舉以成人之禮則殤理除矣太孫亦體君傳重由位成而服全非以年也天子無服殤之義絕朞故也於是從之魏氏故事國有大喪羣臣凶服以帛為綬囊以布為劍衣新禮以傳稱去喪無所不佩明在喪則無佩也更制齊斬之喪不佩劍綬摯虞以為周禮武賁氏士大夫之職也皆以兵守王宮國有喪故則衰葛執戈楯守門葬則從車而哭又成王崩太保命諸大夫以干戈內外警設明喪故之際蓋重宿衞之防去喪無所不佩謂服飾之事不謂防禦之用宜定新禮布衣劍如舊其餘如新制詔從之漢魏故事將葬設吉凶鹵簿皆以鼓吹新禮以禮無吉駕導從之文臣子不宜釋其衰麻以服玄黃除吉駕鹵簿又凶事無樂遏密八音除凶服之鼓吹摯虞以為葬有祥車曠左則今之容車也既葬日中反虞逆神而還春秋傳鄭大夫公孫蠆卒天子追賜大路使以行士喪禮葬有車乘車以載生之服此皆不唯載柩兼有吉駕之明文也既設吉駕則宜有導從以象平生之容明不致死之義臣子衰麻不得為身而釋以為君父則無不可顧命之篇足以明之宜定新禮設吉服導從如舊其凶服鼓吹宜除詔從之漢魏故事大喪及大臣之喪執紼者輓歌新禮以為輓歌出於漢武帝役人之勞歌聲哀切遂以為送終之禮雖音曲摧愴非經典所制違禮設銜枚之義方在號慕不宜以歌為名除不輓歌摯虞以為輓歌因倡和而為摧愴之聲銜枚所以全哀此亦以感衆雖非經典所載是歷代故事詩稱君子作歌推以告哀以歌為名亦無所嫌宜定新禮如舊詔從之咸寧二年安平穆王薨無嗣以母弟敦上繼獻王後移太常問應何服博士張靖答宜依魯僖服閔三年例尚書符詰靖穆王不臣敦敦不繼穆與閔僖不同孫毓宋昌議以穆王不之國敦不仕諸侯不應三年以義處之敦宜服本服一朞而除主穆王喪祭三年畢乃吉祭獻王毓云禮君之子孫所以臣諸兄者以臨國故也禮又與諸侯為兄弟服斬者謂鄰國之臣於鄰國之君有猶君之義故也今穆王既不之國不臣兄弟敦不仕諸侯無鄰臣之義異於閔僖如符旨也但喪無主敦既奉詔紹國受重主喪典其祭祀大功者主人之喪有三年者則必為之再祭鄭氏注云謂死者之從父昆弟來為喪主也有三年者謂妻若子幼少也再祭謂大小祥也穆妃及國臣於禮皆當三年此為有三年者敦當為之主大小兩祥祭也且哀樂不相雜吉凶不相干凶服在宮哭泣未絕敦遽主穆王之喪而國制未除則不得以己本親服除而吉祭獻王也咸寧四年陳留國上燕公是王之父王出奉明帝祀今於王為從父有司奏應服朞不以親疏尊卑為降詔曰王奉魏氏所承者重不得服其私親穆帝時東海國言哀王薨踰年嗣王乃來繼不復追服羣臣皆已反吉國妃亦宜同除詔曰朝廷所以從權制者以王事奪之非為變禮也婦人傳重義大若從權制義將安託於是國妃終三年之禮孫盛以為廢三年之禮開偷薄之源漢魏失之大者也今若以大夫宜奪以王事婦人可終本服是吉凶之儀雜陳於宮寢綵素之制乖異於內外無乃情禮俱違哀樂失所乎太元十七年太常車胤上言謹案喪服禮經庶子為母緦麻三月傳曰何以緦麻以尊者為體不敢服其私親也此經傳之明文聖賢之格言而自頃開國公侯至于卿士庶子為後各肆私情服其庶母同之於嫡此末俗之弊溺情傷教縱而不革則流遁忘返矣且夫尊尊親親雖禮之大本然厭親於尊由來尚矣禮記曰為父後出母無服也者不祭故也又禮天子父母之喪未葬越紼而祭天地社稷斯皆崇嚴至敬不敢以私廢尊也今身承祖宗之重而以庶母之私廢烝嘗之事五廟闕祀由一妾之終求之情禮失莫大焉舉世皆然莫之裁貶就心不同而事不敢異故正禮遂穨而習非成俗此國風所以思古小雅所以悲歎當今九服漸寧王化惟新誠宜崇明禮訓以一風俗請臺省考修經典式明王度不答十八年胤又上言去年上自頃開國公侯至于卿士庶子為後者服其庶母同之於嫡違禮犯制宜加裁抑事上經年未被告報未審朝議以何為疑若以所陳或謬則經有文若以古今不同則晉有成典升平四年故太宰武陵王所生母喪表求齊衰三年詔聽依昔樂安王故事制大功九月興寧三年故梁王𩼔又所生母喪亦求三年庚子詔書依太宰故事同服大功若謹案周禮則緦麻三月若奉晉制則大功九月古禮今制並無居廬三年之文而頃年已來各申私情更相擬襲漸以成俗縱而不禁則聖典滅矣夫尊尊親親立人之本王化所由二端而已故先王設教務弘其極尊郊社之敬制越紼之禮嚴宗廟之祀厭庶子之服所以經緯人文化成天下夫屈家事於王道厭私恩於祖宗豈非上行乎下父行乎子若尊尊之心有時而替宜厭之情觸事而申祖宗之敬微而君臣之禮虧矣嚴恪微於祖宗致敬虧於事上而欲俗安化隆不亦難乎區區所惜實在於斯職之所司不敢不言請臺參詳尚書奏案如辭輒下主者詳尋依禮庶子與尊者為體不敢服其私親此尊祖敬宗之義自頃陵遲斯禮遂廢封國之君廢五廟之重士庶匹夫闕烝嘗之禮習成穨俗宜被革正輒內外參詳謂宜聽胤所上可依樂安王大功為正請為告書如左班下內外以定永制普令依承事可奉行詔可禮王為三公六卿錫衰為大夫士疑衰首服弁絰天子諸侯皆為貴臣貴妾服三月漢為大臣制服無聞焉漢明帝時東海恭王薨帝出幸津門亭發哀及武帝咸寧二年十一月詔諸王公大臣薨應三朝發哀者踰月舉樂其一朝發哀者三日不舉樂也元帝姨廣昌鄉君喪未葬中丞熊遠表云案禮君於卿大夫比葬不食肉比卒哭不舉樂惻隱之心未忍行吉事故也被尚書符冬至後二日小會臣以為廣昌鄉君喪殯日聖恩垂悼禮大夫死廢一時之祭祭猶可廢而況餘事冬至唯可羣下奉賀而已未便小會詔以遠表示賀循又曰咸寧二年武皇帝故事云王公大臣薨三朝發哀踰月舉樂其一朝發哀三日不舉樂此舊事明文賀循答曰案禮雜記君於卿大夫之喪比葬不食肉比卒哭不舉樂古者君臣義重雖以至尊之義降而無服三月之內猶錫衰以居不接吉事故春秋晉大夫智悼子未葬平公作樂為屠蒯所譏如遠所啟合於古義咸寧詔書雖不會經典然隨時立宜以為定制誠非羣下所得稱論升平元年帝姑廬陵公主未葬符問太常冬至小會應作樂不博士胡訥議云君於卿大夫比卒哭不舉樂公主有骨肉之親宜闕樂太常王彪之云案武帝詔三朝舉哀三旬乃舉樂其一朝舉哀者三日則舉樂泰始十年春長樂長公主薨太康七年秋扶風王駿薨武帝並舉哀三日而已中興已後更參論不改此制今小會宜作樂二議竟不知所取喪服記公為所寓齊衰三月新禮以今無此事除此一章摯虞以為周禮作於刑厝之時而著荒政十二禮備制待物不以時衰而除盛典世隆而闕衰教也曩者王司徒失守播越自稱寄公是時天下又多此比皆禮之所及宜定新禮自如舊經詔從之漢魏故事無五等諸侯之制公卿朝士服喪親疎各如其親新禮王公五等諸侯成國置卿者及朝廷公孤之爵皆傍親絕朞而傍親為之服斬衰卿校位從大夫者皆絕緦摯虞以為古者諸侯君臨其國臣諸父兄今之諸侯未同于古未同于古則其尊未全不宜便從絕朞之制而令傍親服斬衰之重也諸侯既然則公孤之爵亦宜如舊昔魏武帝建安中已曾表上漢朝依古為制事與古異皆不施行施行者著在魏科大晉采以著令宜定新禮皆如舊詔從之喪服無弟子為師服之制新禮弟子為師齊衰三月摯虞以為自古無師服之制故仲尼之喪門人疑於所服子貢曰昔夫子之喪顏回若喪子而無服請喪夫子若喪父而無服遂心喪三年此則懷三年之哀而無齊衰之制也羣居則絰出則否所謂弔服加麻也先聖為禮必易從而可傳師徒義誠重而服制不著歷代相襲不以為缺且尋師者以彌高為得故屢遷而不嫌修業者以日新為益故舍舊而不疑仲尼稱三人行必有我師焉子貢云夫何常師之有淺學之師暫學之師不可皆為之服義有輕重服有廢興則臧否由之而起是非因之而爭愛惡相攻悔吝生焉宜定新禮無服如舊詔從之古者天子諸侯葬禮粗備漢世又多變革魏晉以下世有改變大體同漢之制而魏武以禮送終之制襲稱之數繁而無益俗又過之豫自制送終衣服四篋題識其上春秋冬夏日有不諱隨時以斂金珥珠玉銅鐵之物一不得送文帝遵奉無所增加及受禪刻金璽追加尊號不敢開埏乃為石室藏璽埏首以示陵中無金銀諸物也漢禮明器甚多自是皆省矣魏文帝黃初三年又自作終制曰禮國君即位為椑存不忘亡也壽陵因山為體無封樹無立寢殿造園邑通神道夫葬者藏也欲人之不得見也禮不墓祭欲存亡不黷也皇后及貴人以下不隨王之國者有終沒皆葬澗西前又已表其處矣此詔藏之宗廟副在尚書祕書三府明帝亦遵奉之明帝性雖崇奢然未遽營陵墓之制也宣帝豫自於首陽山為土藏不墳不樹作顧命終制斂以時服不設明器景文皆謹奉成命無所加焉景帝崩喪事制度又依宣帝故事武帝泰始四年文明王皇后崩將合葬開崇陽陵使太尉司馬望奉祭進皇帝密璽綬於便房神坐魏氏金璽此又儉矣江左初元明崇儉且百度草創山陵奉終省約備矣成帝咸康七年皇后杜氏崩詔外官五日一入臨內官旦一入而已過葬虞祭禮畢止有司奏大行皇后陵所作凶門柏歷門號顯陽端門詔曰門如所處凶門柏歷大為煩費停之案蔡謨說以二瓦器盛始死之祭繫於木裹以葦席置庭中近南名為重今之凶門是其象也禮既虞而作主今未葬未有主故以重當之禮稱為主道此其義也范堅又曰凶門非禮禮有懸重形似凶門後人出之門外以表喪俗遂行之薄帳即古弔幕之類也是時又詔曰重壤之下豈宜崇飾無用陵中唯潔掃而已有司又奏依舊選公卿以下六品子弟六十人為挽郎詔又停之孝武帝太元四年九月皇后王氏崩詔曰終事唯從儉速又詔遠近不得遣山陵使有司奏選挽郎二十四人詔停之古無墓祭之禮漢承秦皆有園寢正月上丁祠南郊禮畢次北郊明堂高廟世祖廟謂之五供魏武葬高陵有司依漢立陵上祭殿至文帝黃初三年乃詔曰先帝躬履節儉遺詔省約子以述父為孝臣以繫事為忠古不墓祭皆設於廟高陵上殿皆毀壞車馬還衣服藏府以從先帝儉德之志文帝自作終制又曰壽陵無立寢殿造園邑自後園邑寢殿遂絕齊王在位九年始一謁高平陵而曹爽誅其後遂廢終於魏世及宣帝遺詔子弟羣官皆不得謁陵於是景文遵旨至武帝猶再謁崇陽陵一謁峻平陵然遂不敢謁高原陵至惠帝復止也逮于江左元帝崩後諸公始有謁陵辭告之事蓋由眷同友執率情而舉非洛京之舊也成帝時中宮亦年年拜陵議者以為非禮於是遂止以為永制至穆帝時褚太后臨朝又拜陵帝幼故也至孝武崩驃騎將軍司馬道子曰今雖權制釋服至於朔望諸節自應展情陵所以一周為斷於是至陵變服單衣煩黷無準非禮意也及安帝元興元年尚書左僕射桓謙奏百僚拜陵起於中興非晉舊典積習生常遂為近法尋武皇帝詔乃不使人主諸王拜陵豈唯百僚謂宜遵奉於是施行及義熙初又復江左之舊太康七年大鴻臚鄭默母喪既葬當依舊攝職固陳不起於是始制大臣得終喪三年然元康中陳準傅咸之徒猶以權奪不得終禮自茲已往以為成比也太康元年東平王楙上言相王昌父毖本居長沙有妻息漢末使入中國值吳叛仕魏為黃門郎與前妻息死生隔絕更娶昌母今江表一統昌聞前母久喪言疾求平議守博士謝衡議曰雖有二妻蓋有故而然不為害於道議宜更相為服守博士許猛以為地絕又無前母之制正以在前非沒則絕故也前母雖在猶不應服段暢秦秀騶沖從猛散騎常侍劉智安議禮為常事制不為非常設也亡父母不知其死生者不著於禮平生不相見去其加隆以朞為斷都令史虞溥議曰臣以為禮不二嫡所以重正非徒如前議者防妬忌而已故曰一與之齊終身不改未有遭變而二嫡苟不二則昌父更娶之辰是前妻義絕之日也使昌父尚存二妻俱在必不使二嫡專堂兩婦執祭同為之齊也秦秀議二妾之子父命令相慈養而便有三年之恩便同所生昌父何義不命二嫡依此禮乎父之執友有如子之禮況事兄之母乎許猛又議夫少婦稚則不可許以改娶更適矣今妻在許以更聘夫存而妻得改醮者非絕而何侍中領博士張惲議昔舜不告而娶婚禮蓋闕故堯典以釐降二女為文不殊嫡媵傳記以妃夫人稱之明不立正后也夫以聖人之弘帝者嫡子猶權事而變以定典禮黃昌之告新妻使避正室時論許之推姬氏之讓執黃卿之決宜使各自服其母黃門侍郎崔諒荀悝中書監荀勖領中書令和嶠侍郎夏侯湛皆如溥議侍郎山雄兼侍郎著作陳壽以為溥駁一與之齊非大夫也禮無二嫡不可以並耳若昌父及二母於今各存者則前母不廢已有明徵也設令昌父將前母之子來入中國尚在者當從出母之服苟昌父無棄前妻之命昌兄有服母之理則昌無疑於不服賊曹屬卞粹議昌父當莫審之時而娶後妻則前妻同之於死而義不絕若生相及而後妻不去則妾列於前志矣死而會乎則同祔於葬無並嫡之實必欲使子孫於沒世之後追計二母隔絕之時以為並嫡則背違死父追出亡母議者以為禮無前母之服者可謂以文害意愚以為母之不親而服三年非一無異於前母也倉曹屬衞議或云嫡不可二前妻宜絕此為奪舊與新違母從子禮律所不許人情所未安也或云絕與死同無嫌二嫡據其相及欲令有服此為論嫡則死議服則生還自相伐理又不通愚以為地絕死絕誠無異也宜一如前母不復追服主簿劉卞議毖在南為邦族於北為羈旅以此名分言之前妻為元妃後婦為繼室何至王路既通更當逐其今妻廢其嫡子不書姜氏絕不為親以其犯至惡也趙姬雖貴必推叔隗原同雖寵必嫡宣孟若違禮苟讓何則春秋所當善也論者謂地絕其情終已不得往來今地既通何為故當追而絕之邪黃昌見美斯又近世之明比司空齊王攸議禮記生不及祖父母諸父昆弟而父稅喪己則否諸儒皆以為父以他故子生異域不及此親存時歸見之父雖追服子不從稅不責非時之恩也但不相見尚不服其先終而況前母非親所生義不踰祖莫往莫來恩絕殊隔而令追服殆非稱情立文之謂也以為昌不宜追服司徒李胤議毖為黃門侍郎江南已叛石厚與焉大義滅親況於毖之義可得以為妻乎大司馬騫不議太尉充撫軍大將軍汝南王亮皆從主者溥又駁粹曰喪從寧戚謂喪事尚哀耳不使服非其親也夫死者終也終事已故無絕道分居兩存則離否由人夫婦以判合為義今土隔人殊則配合理絕彼已更娶代己安得自同於死婦哉伯夷讓孤竹不可以為後王法也且既已為嫡後服復云為妾生則或貶或離死則同祔於葬妻專一以事夫夫懷貳以接己開偽薄之風傷貞信之教於以純化篤俗不亦難乎今昌二母雖土地殊隔據同時並存何得為前母後母乎設使昌母先亡以嫡合葬而前母不絕遠聞喪問當復相為制何服邪夫制不應禮動而愈失夫孝子不納親於不義貞婦不昧進而苟容今同前嫡於死婦使後妻居正而或廢於二子之心曾無恧乎而云誣父棄母恐此文致之言難以定臧否也禮違諸侯適天子不服舊君然則昌父絕前君矣更納後室廢舊妻矣又何取於宜誅宜撫乎且婦人之有惡疾乃慈夫之所愍也而在七出誠以人理應絕故也今夫婦殊域與無妻同方之惡疾理無以異據己更娶有絕前之證而云應服於義何居尚書八座以為設令有人於此父為敦煌太守而子後任於洛若父娶妻非徒不見乃可不知及其死亡不得不服但鞠養己者情哀而不相見名制雖戚念之心殊而為之服一也又兩后匹嫡自謂違禮不謂非常之事而以常禮處之也昔子思哭出母於廟其門人曰庶氏之女死何為哭於孔氏之廟子思懼改哭於他室若昌不制服不得不告其父祖掘其前母之尸徙之他地若其不徙昌為罪人何則異族之女不得祔于先姑藏其墓次故也且夫婦人牽夫猶有所尊趙姬之舉禮得權通故先史詳之不譏其事耳今昌之二母各已終亡尚無並主輕重之事也昌之前母宜依叔隗為比若亡在昌未生之前者則昌不應復服生及母存自應如禮以名服三年輒正定為文章下太常報楙奉行制曰凡事有非常當依準舊典為之立斷今議此事稱引趙姬叔隗者粗是也然後狄與晉和故姬氏得迎叔隗而下之吳寇隔塞毖與前妻終始永絕必義無兩嫡則趙衰可以專制隗氏昌為人子豈得擅替其母且毖二妻並以絕亡其子猶後母之子耳昌故不應制服也太興初著作郎干寶論之曰禮有經有變有權王毖之事有為為之也有不可責以始終之義不可求以循常之文何羣議之紛錯同產者無嫡側之別而先生為兄諸侯同爵無等級之差而先封為長今二妻之入無貴賤之禮則宜以先後為秩順序義也今生而同室者寡死而同廟者衆及其神位固有上下也故春秋賢趙姬遭禮之變而得禮情也且夫吉凶哀樂動乎情者也五禮之制所以情而即事也今二母者本他人也以名來親而恩否於時敬不及生愛不及喪夫何追服之道哉張惲劉卞得其先後之節齊王衞通于服絕之制可以斷矣朝廷於此宜導之以趙姬齊之以詔命使先妻恢含容之德後妻崇卑讓之道室人達長少之序百姓見變禮之中若此可以居生又況於死乎古之王者有以師友之禮待其臣而臣不敢自尊今令先妻以一體接後而後妻不敢抗及其子孫交相為服禮之善物也然則王昌兄弟相得之日蓋宜祫祭二母等其禮饋序其先後配以左右兄弟肅雍交酬奏獻上以恕先父之志中以高二母之德下以齊兄弟之好使義風弘于王教慈讓洽乎急難不亦得禮之本乎是時沛國劉仲武先娶毋丘氏生子正舒正則二人毋丘儉反敗仲武出其妻娶王氏生陶仲武為毋丘氏別舍而不告絕及毋丘氏卒正舒求祔葬焉而陶不許舒不釋服訟于上下泣血露骨縗裳綴絡數十年弗得從以至死亡時吳國朱某娶妻陳氏生子東伯入晉晉賜妻某氏生子綏伯太康之中某已亡綏伯將母以歸邦族兄弟交愛敬之道二母篤先後之序雍雍人無間焉及其終也二子交相為服君子以為賢安豐太守程諒先已有妻後又娶遂立二嫡前妻亡後妻子勳疑所服中書令張華造甲乙之問曰甲娶乙為妻後又娶丙匿不說有乙居家如二嫡無有貴賤之差乙亡丙之子當何服本實並列嫡庶不殊雖二嫡非正此失在先人人子何得專制析其親也若為庶母服又不成為庶進退不知所從太傅鄭沖議曰甲失禮於家二嫡並在誠非人子所得正則乙丙之子並當三年禮疑從重車騎賈充侍中少傅任愷議略與鄭同太尉荀顗議曰春秋並后匹嫡古之明典也今不可以犯禮並立二妻不別尊卑而遂其失也故當斷之以禮先至為嫡後至為庶丙子宜以嫡母服乙乙子宜以庶母事丙昔屈建去芰古人以為違禮而得禮丙子非為抑其親斯自奉禮先後貴賤順之義也中書監荀勖議曰昔鄉里鄭子羣娶陳司空從妹後隔呂布之亂不復相知存亡更娶鄉里蔡氏女徐州平定陳氏得還遂二妃並存蔡氏之子字元釁為陳氏服嫡母之服事陳公以從舅之禮族兄宗伯曾責元釁謂抑其親鄉里先達以元釁為合宜不審此事粗相似否建武元年以溫嶠為散騎侍郎嶠以母亡值寇不臨殯葬欲營改葬固讓不拜元帝詔曰溫嶠不拜以未得改卜葬送朝議又頗有異同為審由此邪天下有闕塞行禮制物者當使理可經通古人之制三年非情之所盡蓋存亡有斷不以死傷生耳要絰而服金革之役者豈營官邪隨王事之緩急也今桀逆未梟平陽道斷奉迎諸軍猶未得徑進嶠特一身於何濟其私艱而以理閡自疑不服王命邪其令三司八座門下三省外內羣臣詳共通議如嶠比吾將親裁其中於是太宰西陽王羕司徒臨潁公組驃騎將軍即丘子導侍中紀瞻尚書周顗散騎常侍荀邃等議以昔伍員挾弓去楚為吳行人以謀楚誠志在報讎不苟滅身也溫嶠遭難昔在河朔日尋干戈志刷讎惡萬里投身歸赴朝廷將欲因時竭力憑賴王威以展其情此乃嶠之志也無緣道路未通師旅未進而更中辭王事留志家巷也以為誠宜如明詔於是有司奏曰案如衆議去建武元年九月下辛未令書依禮文父喪未葬唯喪主不除以他故未葬人子之情不可居殯而除故期於畢葬無遠近之斷也若亡遇賊難喪靈無處求索理絕固應三年而除不得故從未葬之例也若骨肉殲於寇害死亡漫於中原而繼以遺賊未滅亡者無收殯之實存者又闕於奔赴之禮而人子之情哀痛無斷輒依未葬之義久而不除若遂其情則人居無限之喪非有禮無時不得之義也諸如此皆依東關故事限行三年之禮畢而除也唯二親生離吉凶未分服喪則凶事未據從吉則疑於不存心憂居素出自人情有如此者非官制之所裁今嶠以未得改卜奔赴累設疾辭案辛未之制已有成斷皆不得復遂其私情不服王命以虧法憲參議可如前詔嶠受拜重告以中丞司徒諸如嶠比者依東關故事辛未令書之制嶠不得已乃拜是時中原喪亂室家離析朝廷議二親陷沒寇難應制服不太常賀循曰二親生離吉凶未分服喪則凶事未據從吉則疑於不存心憂居素允當人情元帝令以循議為然太興二年司徒荀組云二親陷沒寇難萬無一冀者宜使依王法隨例行喪庾蔚之云二親為戎狄所破存亡未可知者宜盡尋求之理尋求之理絕三年之外便宜婚宦胤嗣不可絕王政不可廢故也猶宜以哀素自居不豫吉慶之事待中壽而服之也若境內賊亂清平肆眚之後尋覓無蹤跡者便宜制服咸康二年零陵李繁姊先適南平郡陳詵為妻產四子而遭賊姊投身於賊請活姑命賊略將姊去詵更娶嚴氏生三子繁後得姊消息往迎還詵詵籍注領二妻及李亡詵疑制服以事言征西大將軍庾亮府平議時議亦往往異同司馬王愆期議曰案禮不二嫡故惠公元妃孟子孟子卒繼室以聲子諸侯猶爾況庶人乎士喪禮曰繼母本實繼室故稱繼母事之如嫡故曰如母也詵不能遠慮避難以亡其妻非犯七出見絕於詵始不見絕終又見迎養姑於堂子為首嫡列名黃籍則詵之妻也為詵也妻則為暉也母暉之制服無所疑矣禮為繼母服而不為前母服者如李比類曠世所希前母既終乃有繼母後子不及前母故無制服之文然礿祠蒸嘗未有不以前母為母者亡猶母之況其存乎詵有老母不可以莫之養妻無歸期納妾可也李雖沒賊尚有生冀詵尋求之理不盡而便娶妻誠詵之短也然隴畝之夫不達禮義考之傳記不勝施孝叔之妻失身於郤犨而不棄者以非其罪也詵有兩妻非故犯法李鄙野人而能臨危請活姑命險不忘順可謂李婦矣議者欲令在沒略之中必全苦操有隕無二是望凡人皆為宋伯姬也詵雖不應娶妻要以嚴為妻妻則繼室本非嫡也雖云非嫡義在始終寧可以詵不應二妻而己涉二庭乎若能下之則趙姬之義若云不能官當有制先嫡後繼有自來矣衆議貶譏太峻故略序異懷亮從愆期議定五經通義以為有德則諡善無德則諡惡故雖君臣可同魏朝初諡宣帝為文侯景王為武侯文王表不宜與二祖同於是改諡宣文忠武至文王受晉王之號魏帝又追命宣文為宣王忠武為景王太康八年十月太常上諡故太常平陵男郭奕為景侯有司奏云晉受命以來祖宗號諡羣下未有同者故郭奕為景與景皇同不可聽宜諡曰穆王濟羊璞等並云夫無窮之祚名諡不一若皆相避於制難全如悉不避復非推崇事尊之禮宜依諱名之義但及七廟祖宗而已不及遷毀之廟成粲武茂劉訥並云同諡非嫌號諡者國之大典所以厲時作教經天人之遠旨也固雖君父義有所不隆及在臣子或以行顯故能使上下邁德罔有怠荒臣願聖世同符堯舜行周同諡之禮舍漢魏近制相避之議又引周公父子同諡曰文武帝詔曰非言君臣不可同正以奕諡景不相當耳宜諡曰簡及太元四年侍中王欣之表君臣不嫌同諡尚書奏以欣之言為然詔可驃騎將軍溫嶠前妻李氏在嶠微時便卒又娶王氏何氏並在嶠前死及嶠薨朝廷以問陳舒三人並得為夫人不舒云禮記其妻為夫人而卒而後其夫不為大夫而祔於其妻則不易牲妻卒而後夫為大夫而祔於其妻則以大夫牲然則夫榮於朝妻貴於室雖先夫沒榮辱常隨於夫也禮記曰妻祔於祖姑祖姑有三人則祔其親者如禮則三人皆為夫人也自秦漢已來廢一娶九女之制近世無復繼室之禮先妻卒則更娶苟生加禮則亡不應貶庾蔚之云賤時之妻不得並為夫人若有追贈之命則不論耳嶠傳贈王何二人夫人印綬不及李氏永和十一年彭城國為李太妃求諡博士曹耽之議夫婦行不必同不得以夫諡諡婦春秋婦人有諡甚多經無譏文知禮得諡也胡訥云禮婦人生以夫爵死以夫諡春秋夫人有諡不復依禮耳安平獻王李妃琅邪武王諸葛妃太傅東海王裴妃並無諡今宜率舊典王彪之云婦人有諡禮壞故耳聲子為諡服虔諸儒以為非杜預亦云禮婦人無諡春秋無譏之文所謂不待貶絕自明者也近世惟后乃有諡耳太尉荀顗上諡法云若賜諡而道遠不及葬者皆封策下屬遣所承長吏奉策即家祭賜諡太元十三年召孔安國為侍中安國表以黃門郎王愉名犯私諱不得連署求解有司議云名終諱之有心所同聞名心瞿亦明前誥而禮復云君所無私諱大夫之所有公諱無私諱又云詩書不諱臨文不諱豈非公義奪私情王制屈家禮哉尚書安衆男臣先表中兵曹郎王祐名犯父諱求解職明詔爰發聽許換曹蓋是恩出制外耳而頃者互相瞻式源流既啟莫知其極夫皇朝禮大百僚備職編官列署動相經涉若以私諱人遂其心則移官易職遷流莫已既違典法有虧政體請一斷之從之
