body:
  text: 晉書卷一百一載記第一古者帝王乃生奇類淳維伯禹之苗裔豈異類哉反首衣皮餐羶飲湩而震驚中域其來自遠天未悔禍種落彌繁其風俗險詖性靈馳突前史載之亦以詳備軒帝患其干紀所以徂征武王竄以荒服同乎禽獸而於露寒之野候月覘風覩隙揚埃乘間騁暴邊城不得緩帶百姓靡有室家孔子曰微管仲吾其被髮左袵矣此言能教訓卒伍整齊車甲邊埸既伏境內以安然則燕築造陽之郊秦塹臨洮之險登天山絕地脈苞玄菟款黃河所以防夷狄之亂中華其備豫如此漢宣帝初納呼韓居之亭鄣委以候望始寬戎狄光武亦以南庭數萬徙入西河後亦轉至五原連延七郡董卓之亂則汾晉之郊蕭然矣郭欽騰牋於武帝江統獻策於惠皇皆以為魏處戎夷繡居都鄙請移沙塞之表定一殷周之服統則憂諸并部欽則慮在盟津言猶自口元海已至語曰失以豪釐晉卿大夫之辱也聰之誓兵東兼齊地曜之馳旆西踰隴山覆沒兩京蒸徒百萬天子陵江御物分據地險迴首中原力不能救劃長淮以北大抵棄之胡人利我艱虞分鑣起亂晉臣或阻兵遐遠接武效尤大凡劉元海以惠帝永興元年據離石稱漢後九年石勒據襄國稱趙張氏先據河西是歲自石勒後三十六年也重華自稱涼王後一年冉閔據鄴稱魏後一年苻健據長安稱秦慕容氏先據遼東稱燕是歲自苻健後一年也儁始僭號後三十一年後燕慕容垂據鄴後二年西燕慕容沖據阿房是歲也乞伏國仁據枹罕稱秦後一年慕容永據上黨是歲也呂光據姑臧稱涼後十二年慕容德據滑臺稱南燕是歲也禿髮烏孤據廉川稱南涼段業據張掖稱北涼後三年李玄盛據敦煌稱西涼後一年沮渠蒙遜殺段業自稱涼後四年譙縱據蜀稱成都王後二年赫連勃勃據朔方稱大夏後二年馮跋殺離班據和龍稱北燕提封天下十喪其八莫不龍旌帝服建社開祊華夷咸暨人物斯在或篡通都之鄉或擁數州之地雄圖內卷師旅外并窮兵凶於勝負盡人命於鋒鏑其為戰國者一百三十六載抑元海為之禍首云劉元海子和劉宣劉元海新興匈奴人冒頓之後也名犯高祖廟諱故稱其字焉初漢高祖以宗女為公主以妻冒頓約為兄弟故其子孫遂冒姓劉氏建武初烏珠留若鞮單于子右奧鞬日逐王比自立為南單于入居西河美稷今離石左國城即單于所徙庭也中平中單于羌渠使子於扶羅將兵助漢討平黃巾會羌渠為國人所殺於扶羅以其衆留漢自立為單于屬董卓之亂寇掠太原河東屯於河內於扶羅死弟呼廚泉立以於扶羅子豹為左賢王即元海之父也魏武分其衆為五部以豹為左部帥其餘部帥皆以劉氏為之太康中改置都尉左部居太原茲氏右部居祁南部居蒲子北部居新興中部居大陵劉氏雖分居五部然皆居于晉陽汾澗之濱豹妻呼延氏魏嘉平中祈子於龍門俄而有一大魚頂有二角軒躍鱗而至祭所久之乃去巫覡皆異之曰此嘉祥也其夜夢旦所見魚變為人左手把一物大如半雞子光景非常授呼延氏曰此是日精服之生貴子寤而告豹豹曰吉徵也吾昔從邯鄲張冏母司徒氏相云吾當有貴子孫三世必大昌仿像相符矣自是十三月而生元海左手文有其名遂以名焉齠齔英慧七歲遭母憂擗踴號叫哀感旁鄰宗族部落咸共歎賞時司空太原王昶等聞而嘉之並遣弔賻幼好學師事上黨崔游習毛詩京氏易馬氏尚書尤好春秋左氏傳孫吳兵法略皆誦之史漢諸子無不綜覽嘗謂同門生朱紀范隆曰吾每觀書傳常鄙隨陸無武絳灌無文道由人弘一物之不知者固君子之所恥也二生遇高皇而不能建封侯之業兩公屬太宗而不能開庠序之美惜哉於是遂學武事妙絕於衆猿臂善射膂力過人姿儀魁偉身長八尺四寸鬚長三尺餘當心有赤毫毛三根長三尺六寸有屯留崔懿之襄陵公師彧等皆善相人及見元海驚而相謂曰此人形貌非常吾所未見也於是深相崇敬推分結恩太原王渾虛襟友之命子濟拜焉咸熙中為任子在洛陽文帝深待之泰始之後渾又屢言之於武帝帝召與語大悅之謂王濟曰劉元海容儀機鑒雖由余日磾無以加也濟對曰元海儀容機鑒實如聖旨然其文武才榦賢於二子遠矣陛下若任之以東南之事吳會不足平也帝稱善孔恂楊珧進曰臣觀元海之才當今懼無其比陛下若輕其衆不足以成事若假之威權平吳之後恐其不復北渡也非我族類其心必異任之以本部臣竊為陛下寒心若舉天阻之固以資之無乃不可乎帝默然後秦涼覆沒帝疇咨將帥上黨李憙曰陛下誠能發匈奴五部之衆假元海一將軍之號鼓行而西可指期而定孔恂曰李公之言未盡殄患之理也憙勃然曰以匈奴之勁悍元海之曉兵奉宣聖威何不盡之有恂曰元海若能平涼州斬樹機能恐涼州方有難耳蛟龍得雲雨非復池中物也帝乃止後王彌從洛陽東歸元海餞彌於九曲之濱泣謂彌曰王渾李憙以鄉曲見知每相稱達讒間因之而進深非吾願適足為害吾本無宦情惟足下明之恐死洛陽永與子別因慷慨歔欷縱酒長嘯聲調亮然坐者為之流涕齊王攸時在九曲比聞而馳遣視之見元海在焉言於帝曰陛下不除劉元海臣恐并州不得久寧王渾進曰元海長者渾為君王保明之且大晉方表信殊俗懷遠以德如之何以無萌之疑殺人侍子以示晉德不弘帝曰渾言是也會豹卒以元海代為左部帥太康末拜北部都尉明刑法禁姦邪輕財好施推誠接物五部俊傑無不至者幽冀名儒後門秀士不遠千里亦皆遊焉楊駿輔政以元海為建威將軍五部大都督封漢光鄉侯元康末坐部人叛出塞免官成都王穎鎮鄴表元海行寧朔將軍監五部軍事惠帝失馭寇盜蜂起元海從祖故北部都尉左賢王劉宣等竊議曰昔我先人與漢約為兄弟憂泰同之自漢亡以來魏晉代興我單于雖有虛號無復尺土之業自諸王侯降同編戶今司馬氏骨肉相殘四海鼎沸興邦復業此其時矣左賢王元海姿器絕人榦宇超世天若不恢崇單于終不虛生此人也於是密共推元海為大單于乃使其黨呼延攸詣鄴以謀告之元海請歸會葬穎弗許乃令攸先歸告宣等招集五部引會宜陽諸胡聲言應穎實背之也穎為皇太弟以元海為太弟屯騎校尉惠帝伐穎次于蕩陰穎假元海輔國將軍督北城守事及六軍敗績穎以元海為冠軍將軍封盧奴伯并州剌史東嬴公騰安北將軍王浚起兵伐穎元海說穎曰今二鎮跋扈衆餘十萬恐非宿衞及近都士庶所能禦之請為殿下還說五部以赴國難穎曰五部之衆可保發已不縱能發之鮮卑烏丸勁速如風雲何易可當邪吾欲奉乘輿還洛陽避其鋒銳徐傳檄天下以逆順制之君意何如元海曰殿下武皇帝之子有殊勳於王室威恩光洽四海欽風孰不思為殿下沒命投軀者哉何難發之有乎王浚豎子東嬴疏屬豈能與殿下爭衡邪殿下一發鄴宮示弱於人洛陽可復至乎縱達洛陽威權不復在殿下也紙檄尺書誰為人奉之且東胡之悍不踰五部願殿下勉撫士衆靖以鎮之當為殿下以二部摧東嬴三部梟王浚二豎之首可指日而懸矣穎悅拜元海為北單于參丞相軍事元海至左國城劉宣等上大單于之號二旬之間衆已五萬都于離石王浚使將軍祁弘率鮮卑攻鄴穎敗挾天子南奔洛陽元海曰穎不用吾言逆自奔潰真奴才也然吾與其有言矣不可不救於是命右於陸王劉景左獨鹿王劉延年等率步騎二萬將討鮮卑劉宣等固諫曰晉為無道奴隸御我是以右賢王猛不勝其忿屬晉綱未弛大事不遂右賢塗地單于之恥也今司馬氏父子兄弟自相魚肉此天厭晉德授之於我單于積德在躬為晉人所服方當興我邦族復呼韓邪之業鮮卑烏丸可以為援奈何距之而拯仇敵今天假手於我不可違也違天不祥逆衆不濟天與不取反受其咎願單于勿疑元海曰善當為崇岡峻阜何能為培塿乎夫帝王豈有常哉大禹出於西戎文王生於東夷顧惟德所授耳今見衆十餘萬皆一當晉十鼓行而摧亂晉猶拉枯耳上可成漢高之業下不失為魏氏雖然晉人未必同我漢有天下世長恩德結於人心是以昭烈崎嶇於一州之地而能抗衡於天下吾又漢氏之甥約為兄弟兄亡弟紹不亦可乎且可稱漢追尊後主以懷人望乃遷于左國城遠人歸附者數萬永興元年元海乃為壇于南郊僭即漢王位下令曰昔我太祖高皇帝以神武應期廓開大業太宗孝文皇帝重以明德升平漢道世宗孝武皇帝拓土攘夷地過唐日中宗孝宣皇帝搜揚俊乂多士盈朝是我祖宗道邁三王功高五帝故卜年倍於夏商卜世過於姬氏而元成多僻哀平短祚賊臣王莽滔天篡逆我世祖光武皇帝誕資聖武恢復鴻基祀漢配天不失舊物俾三光晦而復明神器幽而復顯顯宗孝明皇帝肅宗孝章皇帝累葉重暉炎光再闡自和安已後皇綱漸頹天步艱難國統頻絕黃巾海沸於九州羣閹毒流於四海董卓因之肆其猖勃曹操父子凶逆相尋故孝愍委棄萬國昭烈播越岷蜀冀否終有泰旋軫舊京何圖天未悔禍後帝窘辱自社稷淪喪宗廟之不血食四十年于茲矣今天誘其衷悔禍皇漢使司馬氏父子兄弟迭相殘滅黎庶塗炭靡所控告孤今猥為羣公所推紹修三祖之業顧茲闇戰惶靡厝但以大恥未雪社稷無主銜膽栖冰勉從羣議乃赦其境內年號元熙追尊劉禪為孝懷皇帝立漢高祖以下三祖五宗神主而祭之立其妻呼延氏為王后置百官以劉宣為丞相崔游為御史大夫劉宏為太尉其餘拜授各有差東嬴公騰使將軍聶玄討之戰于大陵玄師敗績騰懼率并州二萬餘戶下山東遂所在為寇元海遣其建武將軍劉曜寇太原泫氏屯留長子中都皆陷之二年騰又遣司馬瑜周良石鮮等討之次于離石汾城元海遣其武牙將軍劉欽等六軍距瑜等四戰瑜皆敗欽振旅而歸是歲離石大饑遷于黎亭以就邸閣穀留其太尉劉宏護軍馬景守離石使大司農卜豫運糧以給之以其前將軍劉景為使持節征討大都督大將軍要擊并州刺史劉琨于版橋為琨所敗琨遂據晉陽其侍中劉殷王育進諫元海曰殿下自起兵以來漸已一周而顓守偏方王威未震誠能命將四出決機一擲梟劉琨定河東建帝號鼓行而南克長安而都之以關中之衆席卷洛陽如指掌耳此高皇帝之所以創啟鴻基克殄強楚者也元海悅曰此孤心也遂進據河東攻寇蒲坂平陽皆陷之元海遂入都蒲子河東平陽屬縣壘壁盡降時汲桑起兵趙魏上郡四部鮮卑陸逐延氐酋大單于徵東萊王彌及石勒等並相次降之元海悉署其官爵永嘉二年元海僭即皇帝位大赦境內改元永鳳以其大將軍劉和為大司馬封梁王尚書令劉歡樂為大司徒封陳留王御史大夫呼延翼為大司空封雁門郡公宗室以親疏為等悉封郡縣王異姓以勳謀為差皆封郡縣公侯太史令宣于脩之言於元海曰陛下雖龍興鳳翔奄受大命然遺晉未殄皇居仄陋紫宮之變猶鍾晉氏不出三年必克洛陽蒲子崎嶇非可久安平陽勢有紫氣兼陶唐舊都願陛下上迎乾象下協坤祥於是遷都平陽汾水中得玉璽文曰有新保之蓋王莽時璽也得者因增泉海光三字元海以為己瑞大赦境內改年河瑞封子裕為齊王隆為魯王於是命其子聰與王彌進寇洛陽劉曜與趙固等為之後繼東海王越遣平北將軍曹武將軍宋抽彭默等距之王師敗績聰等長驅至宜陽平昌公模遣將軍淳于定呂毅等自長安討之戰于宜陽定等敗績聰恃連勝不設備弘農太守垣延詐降夜襲聰軍大敗而還元海素服迎師是冬復大發卒遣聰彌與劉曜劉景等率精騎五萬寇洛陽使呼延翼率步卒繼之敗王師于河南聰進屯于西明門護軍賈胤夜薄之戰于大夏門斬聰將呼延顥其衆遂潰聰迴軍而南壁於洛水尋進屯宣陽門曜屯上東門彌屯廣陽門景攻大夏門聰親祈嵩嶽令其將劉厲呼延朗等督留軍東海王越命參軍孫詢將軍丘光樓裒等率帳下勁卒三千自宣陽門擊朗斬之聰聞而馳還厲懼聰之罪已也赴水而死王彌謂聰曰今既失利洛陽猶固殿下不如還師徐為後舉下官當於兗豫之間收兵積穀伏聽嚴期宣于脩之又言於元海曰歲在辛未當得洛陽今晉氣猶盛大軍不歸必敗元海馳遣黃門郎傅詢召聰等還師王彌出自轘轅越遣薄盛等追擊彌戰于新汲彌師敗績於是攝蒲阪之戍還於平陽以劉歡樂為太傅劉聰為大司徒劉延年為大司空劉洋為大司馬赦其境內立其妻單氏為皇后子和為皇太子封子乂為北海王元海寢疾將為顧託之計以歡樂為太宰洋為太傅延年為太保聰為大司馬大單于並錄尚書事置單于臺于平陽西以其子裕為大司徒元海疾篤召歡樂及洋等入禁中受遺詔輔政以永嘉四年死在位六年偽諡光文皇帝廟號高祖墓號永光陵子和立和字玄泰身長八尺雄毅美姿儀好學夙成習毛詩左氏春秋鄭氏昜及為儲貳內多猜忌馭下無恩元海死和嗣偽位其衞尉西昌王劉銳宗正呼延攸恨不參顧命也說和曰先帝不惟輕重之計而使三王總強兵於內大司馬握十萬勁卒居于近郊陛下今便為寄坐耳此之禍難未可測也願陛下早為之所和即攸之甥也深然之召其領軍劉盛及劉欽馬景等告之盛曰先帝尚在殯宮四王未有逆節今忽一旦自相魚肉臣恐人不食陛下之餘四海未定大業甫爾願陛下以上成先帝鴻基為志且塞耳勿聽此狂簡之言也詩云豈無他人不如我同父陛下既不信諸弟復誰可信哉銳攸怒曰今日之議理無有二於是命左右刃之景懼曰惟陛下詔臣等以死奉之蔑不濟矣乃相與盟于東堂使銳景攻聰攸率劉安國攻裕使侍中劉乘武衞劉欽攻魯王隆尚書田密武衞劉璿攻北海王乂密璿等使人斬關奔于聰聰命貫甲以待之銳知聰之有備也馳還與攸乘等會攻隆裕攸乘懼安國欽之有異志也斬之是日斬裕及隆聰攻西明門克之銳等奔入南宮前鋒隨之斬和于光極西室銳攸梟首通衢劉宣字士則朴鈍少言好學修潔師事樂安孫炎沈精積思不舍晝夜好毛詩左氏傳炎每嘆之曰宣若遇漢武當踰於金日磾也學成而返不出門閭蓋數年每讀漢書至蕭何鄧禹傳未曾不反覆詠之曰大丈夫若遭二祖終不令二公獨擅美於前矣并州刺史王廣言之於武帝帝召見嘉其占對因曰吾未見宣謂廣言虛耳今見其進止風儀真所謂如珪如璋觀其性質足能撫集本部乃以宣為右部都尉特給赤幢曲蓋莅官清恪所部懷之元海即王位宣之謀也故特荷尊重勳戚莫二軍國內外靡不專之
