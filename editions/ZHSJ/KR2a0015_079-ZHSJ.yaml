body:
  text: 晉書卷七十九列傳第四十九謝尚謝尚字仁祖豫章太守鯤之子也幼有至性七歲喪兄哀慟過禮親戚異之八歲神悟夙成鯤嘗攜之送客或曰此兒一坐之顏回也尚應聲答曰坐無尼父焉別顏回席賓莫不歎異十餘歲遭父憂丹楊尹溫嶠弔之尚號咷極哀既而收涕告訴舉止有異常童嶠甚奇之及長開率穎秀辨悟絕倫脫略細行不為流俗之事好衣刺文袴諸父責之因而自改遂知名善音樂博綜衆藝司徒王導深器之比之王戎常呼為小安豐辟為掾襲父爵咸亭侯始到府通謁導以其有勝會謂曰聞君能作鴝鵒舞一坐傾想寧有此理不尚曰佳便著衣幘而舞導令坐者撫掌擊節尚俯仰在中傍若無人其率詣如此轉西曹屬時有遭亂與父母乖離議者或以進仕理王事婚姻繼百世於理非嫌尚議曰典禮之興皆因循情理開通弘勝如運有屯夷要當斷之以大義夫無後之罪三千所不過今婚姻將以繼百世崇宗緒此固不可塞也然至於天屬生離之哀父子乖絕之痛痛之深者莫深於茲夫以一體之小患猶或忘思慮損聽察況於抱傷心之巨痛懷忉怛之至戚方寸既亂豈能綜理時務哉有心之人決不冒榮苟進冒榮苟進之疇必非所求之旨徒開偷薄之門而長流弊之路或有執志丘園守心不革者猶當崇其操業以弘風尚而況含艱履慼之人勉之以榮貴邪遷會稽王友入補給事黃門侍郎出為建武將軍歷陽太守轉督江夏義陽隨三郡軍事江夏相將軍如故時安西將軍庾翼鎮武昌尚數詣翼諮謀軍事嘗與翼共射翼曰卿若破的當以鼓吹相賞尚應聲中之翼即以其副鼓吹給之尚為政清簡始到官郡府以布四十匹為尚造烏布帳尚壞之以為軍士襦袴建元二年詔曰尚往以戎戍事要故輟黃散以授軍旅所處險要宜崇其威望今以為南中郎將餘官如故會庾冰薨復以本號督豫州四郡領江州刺史俄而復轉西中郎將督楊州之六郡諸軍事豫州刺史假節鎮歷陽大司馬桓溫欲有事中原使尚率衆向壽春進號安西將軍初苻健將張遇降尚尚不能綏懷之遇怒據許昌叛尚討之為遇所敗收付廷尉時康獻皇后臨朝即尚之甥也特令降號為建威將軍初尚之行也使建武將軍濮陽太守戴施據枋頭會冉閔之子智與其大將蔣幹來附復遣行人劉猗詣尚請救施止猗求傳國璽猗歸以告幹幹謂尚已敗慮不能救己猶豫不許施遣參軍何融率壯士百人入鄴登三臺助戍譎之曰今且可出璽付我凶寇在外道路梗澀亦未敢送璽當遣單使馳白天子聞璽已在吾許知卿等至誠必遣重軍相救并厚相餉幹乃出璽付融融齎璽馳還枋頭尚遣振武將軍胡彬率騎三百迎璽致諸京師時苻健將楊平戍許昌尚遣兵襲破之徵授給事中賜軺車鼓吹戍石頭永和中拜尚書僕射出為都督江西淮南諸軍事前將軍豫州刺史給事中僕射如故鎮歷陽加都督豫州揚州之五郡軍事在任有政績上表求入朝因留京師署僕射事尋進號鎮西將軍鎮壽陽尚於是採拾樂人并制石磬以備太樂江表有鍾石之樂自尚始也桓溫北平洛陽上疏請尚為都督司州諸軍事將鎮洛陽以疾病不行升平初又進都督豫冀幽并四州病篤徵拜衞將軍加散騎常侍未至卒於歷陽時年五十詔贈散騎常侍衞將軍開府儀同三司諡曰簡無子從弟奕以子康襲爵早卒康弟靜復以子肅嗣又無子靜子虔以子靈祐繼鯤後謝安子琰琰子混安兄奕奕子玄安弟萬萬弟石石兄子朗朗弟子邈謝安字安石尚從弟也父裒太常卿安年四歲時譙郡桓彝見而歎曰此兒風神秀徹後當不減王東海及總角神識沈敏風宇條暢善行書弱冠詣王濛清言良久既去濛子修曰向客何如大人濛曰此客亹亹為來逼人王導亦深器之由是少有重名初辟司徒府除佐著作郎並以疾辭寓居會稽與王羲之及高陽許詢桑門支遁遊處出則漁弋山水入則言詠屬文無處世意揚州刺史庾冰以安有重名必欲致之累下郡縣敦逼不得已赴召月餘告歸復除尚書郎琅邪王友並不起吏部尚書范汪舉安為吏部郎安以書距絕之有司奏安被召歷年不至禁錮終身遂棲遲東土嘗往臨安山中坐石室臨濬谷悠然歎曰此去伯夷何遠嘗與孫綽等汎海風起浪湧諸人並懼安吟嘯自若舟人以安為悅猶去不止風轉急安徐曰如此將何歸邪舟人承言即迴衆咸服其雅量安雖放情丘壑然每游賞必以妓女從既累辟不就簡文帝時為相曰安石既與人同樂必不得不與人同憂召之必至時安弟萬為西中郎將總藩任之重安雖處衡門其名猶出萬之右自然有公輔之望處家常以儀範訓子弟安妻劉惔妹也既見家門富貴而安獨靜退乃謂曰丈夫不如此也安掩鼻曰恐不免耳及萬黜廢安始有仕進志時年已四十餘矣征西大將軍桓溫請為司馬將發新亭朝士咸送中丞高崧戲之曰卿累違朝旨高臥東山諸人每相與言安石不肯出將如蒼生何蒼生今亦將如卿何安甚有愧色既到溫甚喜言生平歡笑竟日既出溫問左右頗嘗見我有如此客不溫後詣安值其理髮安性遲緩久而方罷使取幘溫見留之曰令司馬著帽進其見重如此溫當北征會萬病卒安投牋求歸尋除吳興太守在官無當時譽去後為人所思頃之徵拜侍中遷吏部尚書中護軍簡文帝疾篤溫上疏薦安宜受顧命及帝崩溫入赴山陵止新亭大陳兵衞將移晉室呼安及王坦之欲於坐害之坦之甚懼問計於安安神色不變曰晉祚存亡在此一行既見溫坦之流汗沾衣倒執手版安從容就席坐定謂溫曰安聞諸侯有道守在四鄰明公何須壁後置人邪溫笑曰正自不能不爾耳遂笑語移日坦之與安初齊名至是方知坦之之劣溫嘗以安所作簡文帝諡議以示坐賓曰此謝安石碎金也時孝武帝富於春秋政不自己溫威振內外人情噂互生同異安與坦之盡忠匡翼終能輯穆及溫病篤諷朝廷加九錫使袁宏具草安見輒改之由是歷旬不就會溫薨錫命遂寢尋為尚書僕射領吏部加後將軍及中書令王坦之出為徐州刺史詔安總關中書事安義存輔導雖會稽王道子亦賴弼諧之益時強敵寇境邊書續至梁益不守樊鄧陷沒安每鎮以和靖御以長算德政既行文武用命不存小察弘以大綱威懷外著人皆比之王導謂文雅過之嘗與王羲之登冶城悠然遐想有高世之志羲之謂曰夏禹勤王手足胼胝文王旰食日不暇給今四郊多壘宜思自效而虛談廢務浮文妨要恐非當今所宜安曰秦任商鞅二世而亡豈清言致患邪是時宮室毀壞安欲繕之尚書令王彪之等以外寇為諫安不從竟獨決之宮室用成皆仰模玄象合體辰極而役無勞怨又領揚州刺史詔以甲仗百人入殿時帝始親萬機進安中書監驃騎將軍錄尚書事固讓軍號于時懸象失度亢旱彌年安奏興滅繼絕求晉初佐命功臣後而封之頃之加司徒後軍文武盡配大府又讓不拜復加侍中都督揚豫徐兗青五州幽州之燕國諸軍事假節時苻堅強盛疆埸多虞諸將敗退相繼安遣弟石及兄子玄等應機征討所在克捷拜衞將軍開府儀同三司封建昌縣公堅後率衆號百萬次于淮肥京師震恐加安征討大都督玄入問計安夷然無懼色答曰已別有旨既而寂然玄不敢復言乃令張玄重請安遂命駕出山墅親朋畢集方與玄圍賭別墅安常劣於玄是日玄懼便為敵手而又不勝安顧謂其甥羊曇曰以墅乞汝安遂游涉至夜乃還指授將帥各當其任玄等既破堅有驛書至安方對客圍看書既竟便攝放牀上了無喜色如故客問之徐答云小兒輩遂已破賊既罷還內過戶限心喜甚不覺屐齒之折其矯情鎮物如此以總統功進拜太保安方欲混一文軌上疏求自北征乃進都督揚江荊司豫徐兗青冀幽并寧益雍梁十五州軍事加黃鉞其本官悉如故置從事中郎二人安上疏讓太保及爵不許是時桓沖既卒荊江二州並缺物論以玄勳望宜以授之安以父子皆著大勳恐為朝廷所疑又懼桓氏失職桓石虔復有沔陽之功慮其驍猛在形勝之地終或難制乃以桓石民為荊州改桓伊於中流石虔為豫州既以三桓據三州彼此無怨各得所任其經遠無競類皆如此性好音樂自弟萬喪十年不聽音樂及登台輔朞喪不廢樂王坦之書喻之不從衣冠效之遂以成俗又於土山營墅樓館林竹甚盛每攜中外子姪往來游集肴饌亦屢費百金世頗以此譏焉而安殊不以屑意常疑劉牢之既不可獨任又知王味之不宜專城牢之既以亂終而味之亦以貪敗由是識者服其知人時會稽王道子專權而姦諂頗相扇構安出鎮廣陵之步丘築壘曰新城以避之帝出祖於西池獻觴賦詩焉安雖受朝寄然東山之志始末不渝每形於言色及鎮新城盡室而行造汎海之裝欲須經略粗定自江道還東雅志未就遂遇疾篤上疏請量宜旋旆并召子征虜將軍琰解甲息徒命龍驤將軍朱序進據洛陽前鋒都督玄抗威彭沛委以董督若二賊假延來年水生東西齊舉詔遣侍中慰勞遂還都聞當輿入西州門自以本志不遂深自慨失因悵然謂所親曰昔桓溫在時吾常懼不全忽夢乘溫輿行十六里見一白雞而止乘溫輿者代其位也十六里止今十六年矣白雞主酉今太歲在酉吾病殆不起乎乃上疏遜位詔遣侍中尚書喻旨先是安發石頭金鼓忽破又語未嘗謬而忽一誤衆亦怪異之尋薨時年六十六帝三日臨于朝堂賜東園祕器朝服一具衣一襲錢百萬布千匹蠟五百斤贈太傅諡曰文靖以無下舍詔府中備凶儀及葬加殊禮依大司馬桓溫故事又以平苻堅勳更封廬陵郡公安少有盛名時多愛慕鄉人有罷中宿縣者還詣安安問其歸資答曰有蒲葵扇五萬安乃取其中者捉之京師士庶競市價增數倍安本能為洛下書生詠有鼻疾故其音濁名流愛其詠而弗能及或手掩鼻以斅之及至新城築埭於城北後人追思之名為召伯埭羊曇者太山人知名士也為安所愛重安薨後輟樂彌年行不由西州路嘗因石頭大醉扶路唱樂不覺至州門左右白曰此西州門曇悲感不已以馬策扣扉誦曹子建詩曰生存華屋處零落歸山丘慟哭而去安有二子瑤琰瑤襲爵官至琅邪王友早卒子該嗣終東陽太守無子弟光祿勳模以子承伯嗣有罪國除劉裕以安勳德濟世特更封該弟澹為柴桑侯邑千戶奉安祀澹少歷顯位桓玄篡位以澹兼太尉與王謐俱齎冊到姑孰元熙中為光祿大夫復兼太保持節奉冊禪宋琰字瑗度弱冠以貞幹稱美風姿與從兄護軍淡雖比居不往來宗中子弟惟與才令者數人相接拜著作郎轉祕書丞累遷散騎常侍侍中苻堅之役安以琰有軍國才用出為輔國將軍以精卒八千與從兄玄俱陷陣破堅以勳封望蔡公尋遭父憂去官服闋除征虜將軍會稽內史頃之徵為尚書右僕射領太子詹事加散騎常侍將軍如故又遭母憂朝廷疑其葬禮時議者云潘岳為賈充婦宜城宣君誄云昔在武侯喪禮殊倫伉儷一體朝儀則均謂宜資給葬禮悉依太傅故事先是王珣娶萬女珣弟珉娶安女並不終由是與謝氏有隙珣時為僕射猶以前憾緩其事琰聞恥之遂自造轀輬車以葬議者譏之太元末為護軍將軍加右將軍會稽王道子以為司馬右將軍如故王恭舉兵假琰節都督前鋒軍事恭平遷衞將軍徐州刺史假節孫恩作亂加督吳興義興二郡軍事討恩至義興斬賊許允之迎太守魏鄢還郡進討吳興賊丘破之又詔琰與輔國將軍劉牢之俱討孫恩恩逃於海島朝廷憂之以琰為會稽內史都督五郡軍事本官並如故琰既以資望鎮越土議者謂無復東顧之虞及至郡無綏撫之能而不為武備將帥皆諫曰強賊在海伺人形便宜振揚仁風開其自新之路琰曰苻堅百萬尚送死淮南況孫恩奔衄歸海何能復出若其復至正是天不養國賊令速就戮耳遂不從其言恩後果復寇浹口入餘姚破上虞進及邢浦去山陰北三十五里琰遣參軍劉宣之距破恩既而上黨太守張虔碩戰敗羣賊銳進人情震駭咸以宜持重嚴備且列水軍於南湖分兵設伏以待之琰不聽賊既至尚未食琰曰要當先滅此寇而後食也跨馬而出廣武將軍桓寶為前鋒摧鋒陷陣殺賊甚多而塘路迮狹琰軍魚貫而前賊於艦中傍射之前後斷絕琰至千秋亭敗績琰帳下都督張猛於後斫琰馬琰墮地與二子肇峻俱被害寶亦死之後劉裕左里之捷生擒猛送琰小子混混刳肝生食之詔以琰父子隕於君親忠孝萃於一門贈琰侍中司空諡曰忠肅三子肇峻混肇歷驃騎參軍峻以琰勳封建昌侯及沒於賊詔贈肇散騎常侍峻散騎侍郎混字叔源少有美譽善屬文初孝武帝為晉陵公主求壻謂王珣曰主壻但如劉真長王子敬便足如王處仲桓元子誠可才小富貴便豫人家事珣對曰謝混雖不及真長不減子敬帝曰如此便足未幾帝崩袁山松欲以女妻之珣曰卿莫近禁臠初元帝始鎮建業公私窘罄每得一以為珍膳項上一臠尤美輒以薦帝羣下未嘗敢食于時呼為禁臠故珣因以為戲混竟尚主襲父爵桓玄嘗欲以安宅為營混曰召伯之仁猶惠及甘棠文靖之德更不保五畝之宅邪玄聞慚而止歷中書令中領軍尚書左僕射領選以黨劉毅誅國除及宋受禪謝晦謂劉裕曰陛下應天受命登壇日恨不得謝益壽奉璽紱裕亦歎曰吾甚恨之使後生不得見其風流益壽混小字也奕字無奕少有名譽初為剡令有老人犯法奕以醇酒飲之醉猶未已安時年七八歲在奕膝邊諫止之奕為改容遣之與桓溫善溫辟為安西司馬猶推布衣好在溫坐岸幘笑詠無異常日桓溫曰我方外司馬奕每因酒無復朝廷禮嘗逼溫飲溫走入南康主門避之主曰君若無狂司馬我何由得相見奕遂攜酒就聽事引溫一兵帥共飲曰失一老兵得一老兵亦何所怪溫不之責從兄尚有德政既卒為西藩所思朝議以奕立行有素必能嗣尚事乃遷都督豫司冀并四州軍事安西將軍豫州刺史假節未幾卒官贈鎮西將軍三子泉靖玄泉早有名譽歷義興太守靖官至太常玄字幼度少穎悟與從兄朗俱為叔父安所器重安嘗戒約子姪因曰子弟亦何豫人事而正欲使其佳諸人莫有言者玄答曰譬如芝蘭玉樹欲使其生於庭階耳安悅玄少好佩紫羅香囊安患之而不欲傷其意因戲賭取即焚之於此遂止及長有經國才略屢辟不起後與王珣俱被桓溫辟為掾並禮重之轉征西將軍桓豁司馬領南郡相監北征諸軍事于時苻堅強盛邊境數被侵寇朝廷求文武良將可以鎮禦北方者安乃以玄應舉中書郎郗超雖素與玄不善聞而歎之曰安違衆舉親明也玄必不負舉才也時咸以為不然超曰吾嘗與玄共在桓公府見其使才雖履屐間亦得其任所以知之於是徵還拜建武將軍兗州刺史領廣陵相監江北諸軍事時苻堅遣軍圍襄陽車騎將軍桓沖禦之詔玄發三州人丁遣彭城內史何謙游軍淮泗以為形援襄陽既沒堅將彭超攻龍驤將軍戴丄卜於彭城玄率東莞太守高衡後軍將軍何謙次於泗口欲遣間使報丄卜令知救至其道無由小將田泓請行乃沒水潛行將趣城為賊所獲賊厚賂泓使云南軍已敗泓偽許之既而告城中曰南軍垂至我單行來報為賊所得勉之遂遇害時彭超置輜重於留城玄乃揚聲遣謙等向留城超聞之還保輜重謙馳進解彭城圍超復進軍南侵堅將句難毛當自襄陽來會超圍幽州刺史田洛於三阿有衆六萬詔征虜將軍謝石率水軍次涂中右衞將軍毛安之游擊將軍河間王曇之淮南太守楊廣宣城內史丘準次堂邑既而盱眙城陷高密內史毛藻沒安之等軍人相驚遂各散退朝廷震動玄於是自廣陵西討難等何謙解田洛圍進據白馬與賊大戰破之斬其偽將都顏因復進擊又破之斬其偽將邵保超難引退玄率何謙戴丄卜田洛追之戰于君川復大破之玄參軍劉牢之攻破浮航及白船督護諸葛侃單父令李都又破其運艦難等相率北走僅以身免於是罷彭城下邳二戍詔遣殿中將軍慰勞進號冠軍加領徐州刺史還于廣陵以功封東興縣侯及苻堅自率兵次於項城衆號百萬而涼州之師始達咸陽蜀漢順流幽并係至先遣苻融慕容暐張蚝苻方等至潁口梁成王顯等屯洛澗詔以玄為前鋒都督徐兗青三州揚州之晉陵幽州之燕國諸軍事與叔父征虜將軍石從弟輔國將軍琰西中郎將桓伊龍驤將軍檀玄建威將軍戴熙揚武將軍陶隱等距之衆凡八萬玄先遣廣陵相劉牢之五千人直指洛澗即斬梁成及成弟雲步騎崩潰爭赴淮水牢之縱兵追之生擒堅偽將梁他王顯梁悌慕容屈氏等收其軍實堅進屯壽陽列陣臨肥水玄軍不得渡玄使謂苻融曰君遠涉吾境而臨水為陣是不欲速戰諸君稍却令將士得周旋僕與諸君緩轡而觀之不亦樂乎堅衆皆曰宜阻肥水莫令得上我衆彼寡勢必萬全堅曰但却軍令得過而我以鐵騎數十萬向水逼而殺之融亦以為然遂麾使却陣衆因亂不能止於是玄與琰伊等以精銳八千涉渡肥水石軍距張蚝小退玄琰仍進決戰肥水南堅中流矢臨陣斬融堅衆奔潰自相蹈藉投水死者不可勝計肥水為之不流餘衆棄甲宵遁聞風聲鶴唳皆以為王師已至草行露宿重以飢凍死者十七八獲堅乘輿雲母車儀服器械軍資珍寶山積牛馬驢騾駱駝十萬餘詔遣殿中將軍慰勞進號前將軍假節固讓不受賜錢百萬綵千匹既而安奏苻堅喪敗宜乘其釁會以玄為前鋒都督率冠軍將軍桓石虔徑造渦潁經略舊都玄復率衆次于彭城遣參軍劉襲攻堅兗州刺史張崇於鄄城走之使劉牢之守鄄城兗州既平玄患水道險澀糧運艱難用督護聞人奭謀堰呂梁水樹柵立七埭為派擁二岸之流以利運漕自此公私利便又進伐青州故謂之青州派遣淮陵太守高素以三千人向廣固降堅青州刺史苻朗又進伐冀州遣龍驤將軍劉牢之濟北太守丁匡據碻磝濟陽太守郭滿據滑臺奮武將軍顏雄渡河立營堅子丕遣將桑據屯黎陽玄命劉襲夜襲據走之丕惶遽欲降玄許之丕告飢玄饋丕米二千斛又遣晉陵太守滕恬之渡河守黎陽三魏皆降以兗青司豫平加玄都督徐兗青司冀幽并七州軍事玄上疏以方平河北幽冀宜須總督司州懸遠應統豫州以勳封康樂縣公玄請以先封東興侯賜兄子玩詔聽之更封玩豫寧伯復遣寧遠將軍昋演伐申凱於魏郡破之玄欲令豫州刺史朱序鎮梁國玄住彭城北固河上西援洛陽內藩朝廷朝議以征役既久宜置戍而還使玄還鎮淮陰序鎮壽陽會翟遼據黎陽反執滕恬之又泰山太守張願舉郡叛河北騷動玄自以處分失所上疏送節盡求解所職詔慰勞令且還鎮淮陰以朱序代鎮彭城玄既還遇疾上疏解職詔書不許玄又自陳既不堪攝職慮有曠廢詔又使移鎮東陽城玄即路於道疾篤上疏曰臣以常人才不佐世忽蒙殊遇不復自量遂從戎政驅馳十載不辭鳴鏑之險每有征事輒請為軍鋒由恩厚忘軀甘死若生也冀有毫釐上報榮寵天祚大晉王威屢舉實由陛下神武英斷無思不服亡叔臣安協贊雍熙以成天工而雰霧尚翳六合未朗遺黎塗炭巢窟宜除復命臣荷戈前驅董司戎首冀仰憑皇威宇宙寧一陛下致太平之化庸臣以塵露報恩然後從亡叔臣安退身東山以道養壽此誠以形于文旨達于聖聽矣臣所以區區家國實在於此不謂臣愆咎夙積罪鍾中年上延亡叔臣安亡兄臣靖數月之間相係殂背下逮稚子尋復夭昏哀毒兼纏痛百常情臣不勝禍酷暴集每一慟殆弊所以含哀忍悲期之必存者雖哲輔傾落聖明方融伊周嗣作人懷自厲猶欲申臣本志隆國保家故能豁其情滯同之無心耳去冬奉司徒道子告括囊遠圖逮問臣進止之宜臣進不達事機以蹙境為恥退不自揆故欲順其宿心豈謂經略不振自貽斯戾是以奉送章節待罪有司執徇常儀實有愧心而聖恩赦過黷法垂宥使抱罪之臣復得更名於所司木石猶感而況臣乎顧將身不良動與釁會謙德不著害盈是荷先疾既動便至委篤陛下體臣疢重使還藩淮側甫欲休兵靜衆綏懷善撫兼苦自療冀日月漸瘳繕甲俟會思更奮迅而所患沈頓有增無損今者惙惙救命朝夕臣之平日率其常矩加以匪懈猶不能令政理弘宣況今內外天隔永不復接寧可臥居重任以招患慮追尋前事可為寒心臣之微身復何足惜區區血誠憂國實深謹遣兼長史劉濟重奉送節蓋章傳伏願陛下垂天地之仁拯將絕之氣時遣軍司鎮慰荒雜聽臣所乞盡醫藥消息歸誠道門冀神祇之祐若此而不差修短命也使臣得及視息瞻覩墳柏以此之盡公私真無恨矣伏枕悲慨不覺流涕詔遣高手醫一人令自消息又使還京口療疾玄奉詔便還病久不差又上疏曰臣同生七人凋落相繼惟臣一己孑然獨存在生荼酷無如臣比所以含哀忍痛希延視息者欲報之德實懷罔極庶蒙一瘳申其此志且臣孤遺滿目顧之惻然為欲極其求生之心未能自分於灰土慺慺之情可哀可愍伏願陛下矜其所訴霈然垂恕不令微臣銜恨泉壤表寢不報前後表疏十餘上久之乃轉授散騎常侍左將軍會稽內史時吳興太守晉寧侯張玄之亦以才學顯自吏部尚書與玄同年之郡而玄之名亞於玄時人稱為南北二玄論者美之玄既輿疾之郡十三年卒于官時年四十六追贈車騎將軍開府儀同三司諡曰獻武子瑍嗣祕書郎早卒子靈運嗣瑍少不惠而靈運文藻艷逸玄嘗稱曰我尚生瑍瑍那得生靈運永熙中為劉裕世子左衞率始從玄征伐者何謙字恭子東海人戴丄卜字安丘處士逵之弟並驍果多權略逵厲操東山而丄卜以武勇顯謝安嘗謂丄卜曰卿兄弟志業何殊丄卜曰下官不堪其憂家兄不改其樂丄卜以軍功封廣信侯位至大司農萬字萬石才器雋秀雖器量不及安而善自衒曜故早有時譽工言論善屬文漁父屈原季主賈誼楚老龔勝孫登嵇康四隱四顯為八賢論其旨以處者為優出者為劣以示孫綽綽與往反以體公識遠者則出處同歸嘗與蔡系送客於征虜亭與系爭言系推萬落牀冠帽傾脫萬徐拂衣就席神意自若坐定謂系曰卿幾壞我面系曰本不為卿面計然俱不以介意時亦以此稱之弱冠辟司徒掾遷右西屬不就簡文帝作相聞其名召為撫軍從事中郎萬著白綸巾鶴氅裘履版而前既見與帝共談移日太原王述萬之妻父也為揚州刺史萬嘗衣白綸巾乘平肩輿徑至聽事前謂述曰人言君侯癡君侯信自癡述曰非無此論但晚合耳萬再遷豫州刺史領淮南太守監司豫冀并四州軍事假節王羲之與桓溫箋曰謝萬才流經通處廊廟參諷議故是後來一器而今屈其邁往之氣以俯順荒餘近是違才易務矣溫不從萬既受任北征矜豪物嘗以嘯詠自高未嘗撫衆兄安深憂之自隊主將帥已下安無不慰勉謂萬曰汝為元帥諸將宜數接對以悅其心豈有誕若斯而能濟事也萬乃召集諸將都無所說直以如意指四坐云諸將皆勁卒諸將益恨之既而先遣征虜將軍劉建修治馬頭城池自率衆入渦潁以援洛陽北中郎將郗曇以疾病退還彭城萬以為賊盛致退便引軍還衆遂潰散狼狽單歸廢為庶人後復以為散騎常侍會卒時年四十二因以為贈子韶字穆度少有名時謝氏尤彥秀者稱封胡羯末封謂韶胡謂朗羯謂玄末謂川皆其小字也韶朗川並早卒惟玄以功名終韶至車騎司馬韶子恩字景伯宏達有遠略韶為黃門郎武昌太守恩三子曜弘微皆歷顯位朗字長度父據早卒朗善言玄理文義艷發名亞於玄總角時病新起體甚羸未堪勞於叔父安前與沙門支遁講論遂至相苦其母王氏再遣信令還安欲留使竟論王氏因出云新婦少遭艱難一生所寄惟在此兒遂流涕攜朗去安謂坐客曰家嫂辭情慷慨恨不使朝士見之朗終於東陽太守子重字景重明秀有才名為會稽王道子驃騎長史嘗因侍坐于時月夜明淨道子歎以為佳重率爾曰意謂乃不如微雲點綴道子因戲重曰卿居心不淨乃復強欲滓穢太清邪子絢字宣映曾於公坐戲調無禮於其舅袁湛湛甚不堪之謂曰汝父昔已輕舅汝今復來加我可謂世無渭陽情也絢父重即王胡之外孫與舅亦有不協之論湛故有此及云石字石奴初拜祕書郎累遷尚書僕射征句難以勳封興平縣伯淮肥之役詔石解僕射以將軍假節征討大都督與兄子玄琰破苻堅先是童謠云誰謂爾堅石打碎故桓豁皆以石名子以邀功焉堅之敗也雖功始牢之而成于玄琰然石時實為都督焉遷中軍將軍尚書令更封南康郡公于時學校陵遲石上疏請興復國學以訓冑子班下州郡普修鄉校疏奏孝武帝納焉兄安薨石遷衞將軍加散騎常侍以公事與吏部郎王恭互相短長恭甚忿恨自陳褊阨不允且疾源深固乞還私門石亦上疏遜位有司奏石輒去職免官詔曰石以疾求退豈準之常制其喻令還歲餘不起表十餘上帝不許石乞依故尚書令王彪之例於府綜攝詔聽之疾篤進位開府儀同三司加鼓吹未拜卒時年六十二石少患面創療之莫愈乃自匿夜有物來舐其瘡隨舐隨差舐處甚白故世呼為謝白面石在職務存文刻既無他才望直以宰相弟兼有大勳遂居清顯而聚斂無饜取譏當世追贈司空禮官議諡博士范弘之議諡曰襄墨公語在弘之傳朝議不從單諡曰襄子汪嗣早卒汪從兄沖以子明慧嗣為孫恩所害明慧從兄喻復以子暠嗣宋受禪國除邈字茂度父鐵永嘉太守邈性剛骾無所屈撓頗有理識累遷侍中時孝武帝觴樂之後多賜侍臣文詔辭義有不雅者邈輒焚毀之其他侍臣被詔者或宣揚之故論者以此多邈後為吳興太守孫恩之亂為賊胡桀郜驃等所執害之賊逼令北面邈厲聲曰我不得罪天子何北面之有遂害之邈妻郗氏甚妬邈先娶妾郗氏怨懟與邈書告絕邈以其書非婦人詞疑其門下生仇玄達為之作遂斥玄達玄達怒遂投孫恩并害邈兄弟竟至滅門史臣曰建元之後時政多虞巨猾陸梁權臣橫恣其有兼將相於中外系存亡於社稷負扆資之以端拱鑿井賴之以晏安者其惟謝氏乎簡侯任總中臺效彰分閫正議云唱喪禮墮而復弘遺音既補雅樂缺而還備君子哉斯人也文靖始居塵外高謝人間嘯詠山林浮泛江海當此之時蕭然有陵霞之致暨于褫薜蘿而襲朱組去衡泌而踐丹墀庶績於是用康彝倫以之載穆苻堅百萬之衆已瞰吳江桓溫九五之心將移晉鼎衣冠易慮遠邇崩心從容而杜姦謀宴衎而清羣寇宸居獲太山之固惟揚去累卵之危斯為盛矣然激繁會於朞服之辰敦一歡於百金之費廢禮於媮薄之俗崇侈於耕戰之秋雖欲混哀樂而同歸齊奢儉於一致而不知穨風已扇雅道日淪國之儀刑豈期若是琰稱貞幹卒以忠勇垂名混曰風流竟以文詞獲譽並階時宰無墮家風奕萬以放肆為高石奴以褊濁興累雖粵微纇猶稱名實康樂才兼文武志存匡濟淮肥之役勍寇望之而土崩渦潁之師中州應之而席卷方欲西平鞏洛北定幽燕廟算有遺良圖不果降齡何促功敗垂成拊其遺文經綸遠矣贊曰安西英爽才兼辯博宣力方鎮流聲臺閣太保沈浮曠若虛舟任高百辟情惟一丘琰邈忠壯奕萬虛放為龍為光或卿或將偉哉獻武功宣授斧克翦凶渠幾清中𧜛
