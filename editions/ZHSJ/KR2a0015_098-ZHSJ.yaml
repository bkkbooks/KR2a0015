body:
  text: 晉書卷九十八列傳第六十八王敦沈充王敦字處仲司徒導之從父兄也父基治書侍御史敦少有奇人之目尚武帝女襄城公主拜駙馬都尉除太子舍人時王愷石崇以豪侈相尚愷嘗置酒敦與導俱在坐有女伎吹笛小失聲韵愷便敺殺之一坐改容敦神色自若他日又造愷愷使美人行酒以客飲不盡輒殺之酒至敦導所敦故不肯持美人悲懼失色而敦然不視導素不能飲恐行酒者得罪遂勉強盡觴導還歎曰處仲若當世心懷剛忍非令終也洗馬潘滔見敦而目之曰處仲蜂目已露但豺聲未振若不噬人亦當為人所噬及太子遷許昌詔東宮官屬不得送敦及洗馬江統潘滔舍人杜蕤魯瑤等冒禁於路側望拜流涕時論稱之遷給事黃門侍郎趙王倫篡位敦叔父彥為兗州刺史倫遣敦慰勞之會諸王起義兵彥被齊王冏檄懼倫兵強不敢應命敦勸彥起兵應諸王故彥遂立勳績惠帝反正敦遷散騎常侍左衞將軍大鴻臚侍中出除廣武將軍青州刺史永嘉初徵為中書監于時天下大亂敦悉以公主時侍婢百餘人配給將士金銀寶物散之於衆單車還洛東海王越自滎陽來朝敦謂所親曰今威權悉在太傅而選用表請尚書猶以舊制裁之太傅今至必有誅罰俄而越收中書令繆播等十餘人殺之越以敦為揚州刺史潘滔說越曰今樹處仲於江外使其肆豪強之心是見賊也越不從其後徵拜尚書不就元帝召為安東軍諮祭酒會揚州刺史劉陶卒帝復以敦為揚州刺史加廣武將軍尋進左將軍都督征討諸軍事假節帝初鎮江東威名未著敦與從弟導等同心翼戴以隆中興時人為之語曰王與馬共天下尋與甘卓等討江州刺史華軼斬之蜀賊杜弢作亂荊州刺史周顗退走敦遣武昌太守陶侃豫章太守周訪等討弢而敦進住豫章為諸軍繼援及侃破弢敦上侃為荊州刺史既而侃為弢將杜曾所敗敦以處分失所自貶為廣武將軍帝不許侃之滅弢也敦以元帥進鎮東大將軍開府儀同三司加都督江揚荊湘交廣六州諸軍事江州刺史封漢安侯敦始自選置兼統州郡焉頃之杜弢將杜弘南走廣州求討桂林賊自效敦許之陶侃距弘不得進乃詣零陵太守尹奉降奉送弘與敦敦以為將遂見寵待南康人何欽所居嶮固聚黨數千人敦就加四品將軍於是專擅之迹漸彰矣建武初又遷征南大將軍開府如故中興建拜侍中大將軍江州牧遣部將朱軌趙誘伐杜曾為曾所殺敦自貶免侍中并辭牧不拜尋加荊州牧敦上疏曰昔漢祖以神武革命開建帝業繼以文帝之賢纂承洪緒清虛玄默擬跡成康賈誼歎息以為天下倒懸雖言有抑揚不失事體今聖朝肇建漸振宏綱往段匹磾遣使求效忠節尚未有勞便以方州與之今靳明等為國雪恥欲除大逆此之志望皆欲附翼天飛雖功大宜報亦宜有以裁之當杜漸防萌慎之在始中間不逞互生事變皆非忠義率以一朝之榮天下漸弊實由於此春秋之時天子微弱諸侯奢侈晉文思崇周室至有求隧之請襄王讓之以禮聞義而服自爾諸侯莫敢越度臣謂前者賊寇未殄苟以濟事朝廷諸所加授頗多爵位兼重今自臣以下宜皆除之且以塞羣小矜功之望夷狄無木扇之求若復遷延顧望流俗使姦狡生心遂相怨謗指擿朝廷讒諛蜂起臣有以知陛下無以正之此安危之機天下之望臣門戶特受榮任備兼權重渥恩偏隆寵過公族行路厮賤猶謂不可臣獨何心可以安之臣一宗誤陛下傾覆亦將尋至雖復灰身剖心陛下追悔將何所及伏願諒臣至款及今際會小解散之並授賢儁少慰有識各得盡其所懷則人思競勸矣州牧之號所不敢當輒送所假侍中貂蟬又宜并官省職以塞羣小覬覦之望帝優詔不許又固辭州牧聽為刺史時劉隗用事頗疏間王氏導等甚不平之敦上疏曰導昔蒙殊寵委以事機虛己求賢竭誠奉國遂藉恩私居輔政之重帝王體遠事義不同雖皇極初建道教方闡惟新之美猶有所闕臣每慷慨於遐遠愧憤於門宗是以前後表疏何嘗不寄言及此陛下未能少垂顧眄暢臣微懷云導頃見疏外所陳如昨而其萌已著其為咎責豈惟導身而已羣從所蒙並過才分導誠不能自量陛下亦愛忘其短常人近情恃恩昧進獨犯龍鱗迷不自了臣竊所自憂慮未詳所由惶愧踧踖情如灰土天下事大盡理實難導雖凡近未有穢濁之累既往之勳疇昔之顧情好綢繆足以厲薄俗明君臣合德義同古賢昔臣親受嘉命云吾與卿及茂弘當管鮑之交臣忝外任漸冉十載訓誘之誨日有所忘至於斯命銘之於心竊猶眷眷謂前恩不得一朝而盡伏惟陛下聖哲日新廣延俊乂臨之以政齊之以禮頃者令導內綜機密出錄尚書杖節京都并統六軍既為刺史兼重號殊非人臣之體流俗好評必有譏謗宜省錄尚書杖節及都督且王佐之器當得宏達遠識高正明斷道德優備者以臣闇識未見其才然於見人未踰于導加輔翼積年實盡心力霸王之主何嘗不任賢使能共相終始管仲有三歸反坫之譏子犯有臨河要君之責蕭何周勃得罪囹圄然終為良佐以導之才何能無失當令任不過分役其所長以功補過要之將來導性慎密尤能忍事善於斟酌有文章才義動靜顧問起予聖懷外無過寵公私得所今皇祚肇建八表承風聖恩不終則遐邇失望天下荒弊人心易動物聽一移將致疑惑臣非敢苟私親親惟欲忠於社稷表至導封以還敦敦復遣奏之初敦務自矯厲雅尚清談口不言財色既素有重名又立大功於江左專任閫外手控強兵羣從貴顯威權莫貳遂欲專制朝廷有問鼎之心帝畏而惡之遂引劉隗刁協等以為心膂敦益不能平於是嫌隙始構矣每酒後輒詠魏武帝樂府歌曰老驥伏櫪志在千里烈士暮年壯心不已以如意打唾壺為節壺邊盡缺及湘州刺史甘卓遷梁州敦欲以從事中郎陳頒代卓帝不從更以譙王承鎮湘州敦復上表陳古今忠臣見疑於君而蒼蠅之人交構其間欲以感動天子帝愈忌憚之俄加敦羽葆鼓吹增從事中郎掾屬舍人各二人帝以劉隗為鎮北將軍戴若思為征西將軍悉發揚州奴為兵外以討胡實禦敦也永昌元年敦率衆內向以誅隗為名上疏曰劉隗前在門下邪佞諂媚譖毀忠良疑惑聖聽遂居權寵撓亂天機威福自由有識杜口大起事役勞擾士庶外託舉義內自封植奢僭過制乃以黃散為參軍晉魏已來未有此比傾盡帑藏以自資奉賦役不均百姓嗟怨免良人奴自為惠澤自可使其大田以充倉廩今便割配皆充隗軍臣前求迎諸將妻息聖恩聽許而隗絕之使三軍之士莫不怨憤又徐州流人辛苦經載家計始立隗悉驅逼以實己府當陛下踐阼之始投刺王官本以非常之慶使豫蒙榮分而更充征役復依舊名普取出客從來久遠經涉年載或死亡滅絕或自贖得免或見放遣或父兄時事身所不及有所不得輒罪本主百姓哀憤怨聲盈路身欲北渡以遠朝廷為名而密知機要潛行險慝進人退士高下任心姦狡饕餮未有隗比雖無忌宰嚭弘恭石顯未足為喻是以遐邇憤慨羣后失望臣備位宰輔與國存亡誠乏平勃濟時之略然自忘駑駘志存社稷豈忍坐視成敗以虧聖美事不獲已今輒進軍同討姦孼願陛下深垂省察速斬隗首則衆望厭服皇祚復隆隗首朝懸諸軍夕退昔太甲不能遵明湯典顛覆厥度幸納伊尹之勳殷道復昌漢武雄略亦惑江充讒佞邪說至乃父子相屠流血丹地終能克悟不失大綱今日之事有逾於此願陛下深垂三思諮詢善道則四海乂安社稷永固矣又曰陛下昔鎮揚州虛心下士優賢任能寬以得衆故君子盡心小人畢力臣以闇蔽豫奉徽猷是以遐邇望風有識自竭王業遂隆惟新克建四海延頸咸望太平自從信隗已來刑罰不中街談巷議皆云如吳之將亡聞之惶惑精魂飛散不覺胸臆摧破泣血橫流陛下當全祖宗之業存神器之重察臣前後所啟奈何棄忽忠言遂信姦佞誰不痛心願出臣表諮之朝臣介石之幾不俟終日令諸軍早還不至虛擾敦黨吳興人沈充起兵應敦敦至蕪湖又上表罪狀刁協帝大怒下詔曰王敦憑恃寵靈敢肆狂逆方朕太甲欲見幽囚是可忍也孰不可忍也今親率六軍以誅大逆有殺敦者封五千戶侯召戴若思劉隗並會京師敦兄含時為光祿勳叛奔於敦敦至石頭欲攻劉隗其將杜弘曰劉隗死士衆多未易可克不如攻石頭周札少恩兵不為用攻之必敗札敗則隗自走敦從之札果開城門納弘諸將與敦戰王師敗績既入石頭擁兵不朝放肆兵士劫掠內外官省奔散惟有侍中二人侍帝帝脫戎衣著朝服顧而言曰欲得我處但當早道我自還琅邪何至困百姓如此敦收周顗戴若思害之以敦為丞相江州牧進爵武昌郡公邑萬戶使太常荀崧就拜又加羽葆鼓吹並偽讓不受還屯武昌多害忠良寵樹親戚以兄含為衞將軍都督沔南軍事領南蠻校尉荊州刺史以義陽太守任愔督河北諸軍事南中郎將敦又自督寧益二州及帝崩太寧元年敦諷朝廷徵己明帝乃手詔徵之語在明帝紀又使兼太常應詹拜授加黃鉞班劍武賁二十人奏事不名入朝不趨劍履上殿敦移鎮姑孰帝使侍中阮孚齎牛酒犒勞敦稱疾不見使主簿受詔以王導為司徒敦自為揚州牧敦既得志暴慢愈甚四方貢獻多入己府將相嶽牧悉出其門徙含為征東將軍都督揚州江西諸軍事從弟舒為荊州彬為江州邃為徐州含字處弘凶頑剛暴時所不齒以敦貴重故歷顯位敦以沈充錢鳳為謀主諸葛瑤鄧嶽周撫李謝雍為爪牙充等並凶險驕恣共相驅扇殺戮自己又大起營府侵人田宅發掘古墓剽掠市道士庶解體咸知其禍敗焉敦從弟豫章太守棱日夜切諫敦怒陰殺之敦無子養含子應及敦病甚拜應為武衞將軍以自副錢鳳謂敦曰脫其不諱便當以後事付應敦曰非常之事豈常人所能且應年少安可當大事我死之後莫若解衆放兵歸身朝廷保全門戶此計之上也退還武昌收兵自守貢獻不廢亦中計也及吾尚存悉衆而下萬一僥倖計之下也鳳謂其黨曰公之下計乃上策也遂與沈充定謀須敦死後作難敦又忌周札殺之而盡滅其族常從督冉曾公乘雄等為元帝腹心敦又害之以宿衞尚多奏令三番休二及敦病篤詔遣侍中陳晷散騎常侍虞問疾時帝將討敦微服至蕪湖察其營壘又屢遣大臣訊問其起居遷含驃騎大將軍開府儀同三司含子瑜散騎常侍敦以溫嶠為丹楊尹欲使覘伺朝廷嶠至具言敦逆謀帝欲討之知其為物情所畏服乃偽言敦死於是下詔曰先帝以聖德應運創業江東司徒導首居心膂以道翼讚故大將軍敦參處股肱或內或外夾輔之勳與有力焉階緣際會遂據上宰杖節專征委以五州刁協劉隗立朝不允敦抗義致討情希鬻拳兵雖犯順猶嘉乃誠禮秩優崇人臣無貳事解之後劫掠城邑放恣兵人侵及宮省背違赦信誅戮大臣縱凶極逆不朝而退六合阻心人情同憤先帝含垢忍恥容而不責委任如舊禮秩有加朕以不天尋丁酷罰煢煢在疚哀悼靡寄而敦曾無臣子追遠之誠又無輔孤同奬之操繕甲聚兵盛夏來至輒以天官假授私屬將以威脅朝廷傾危宗社朕愍其狂戾冀其覺悟故且含隱以觀其終而敦矜其不義之強有侮弱朝廷之志棄親用羇背賢任惡錢鳳豎子專為謀主逞其凶慝誣罔忠良周嵩亮直讜言致禍周札周莚累世忠義聽受讒構殘夷其宗秦人之酷刑不過五敦之誅戮傍濫無辜滅人之族莫知其罪天下駭心道路以目神怒人怨篤疾所嬰昏荒悖逆日以滋甚輒立兄息以自承代多樹私黨莫非同惡未有宰相繼體而不由王命者也頑凶相奬無所顧忌擅錄冶工輒割運漕志騁凶醜以闚神器社稷之危匪夕則旦天不長姦敦以隕斃鳳承凶宄彌復煽逆是可忍也孰不可忍也今遣司徒導鎮南將軍丹楊尹嶠建威將軍趙胤武旅三萬十道並進平西將軍邃率兗州刺史遐奮武將軍峻奮威將軍瞻精銳三萬水陸齊勢朕親御六軍左衞將軍亮右衞將軍胤護軍將軍詹領軍將軍瞻中軍將軍壼驍騎將軍艾驃騎將軍南頓王宗鎮軍將軍汝南王祐太宰西陽王羕被練三千組甲三萬總統諸軍討鳳之罪罪止一人朕不濫刑有能殺鳳送首封五千戶侯賞布五千匹冠軍將軍鄧嶽志氣平厚識經邪正前將軍周撫質性詳簡義誠素著功臣之冑情義兼常往年從敦情節不展畏逼首領不得相違論其乃心無貳王室朕嘉其誠方任之以事其餘文武諸為敦所授用者一無所問刺史二千石不得輒離所職書到奉承自求多福無或猜嫌以取誅滅敦之將士從敦彌年怨曠日久或父母隕沒或妻子喪亡不得奔赴銜哀從役朕甚愍之希不悽愴其單丁在軍無有兼重者皆遣歸家終身不調其餘皆與假三年休訖還臺當與宿衞同例三番明承詔書朕不負信又詔曰敢有捨王敦姓名而稱大將軍者軍法從事敦病轉篤不能御衆使錢鳳鄧嶽周撫等率衆三萬向京師含謂敦曰此家事吾便當行於是以含為元帥鳳等問敦曰事克之日天子云何敦曰尚未南郊何得稱天子便盡卿兵勢保護東海王及裴妃而已乃上疏罪狀溫嶠以誅姦臣為名含至江寧司徒導遺含書曰近承大將軍困篤緜緜或云已有不諱悲怛之情不能自勝尋知錢鳳大嚴欲肆姦逆朝士忿憤莫不扼腕去月二十三日得征北告劉遐陶瞻蘇峻等深懷憂慮不謀同辭都邑大小及二宮宿衞咸懼有往年之掠不復保其妻孥是以聖主發赫斯之命具如檄旨近有嘉詔崇兄八命望兄奬羣賢忠義之心抑姦細不逞之計當還武昌盡力藩任卒奉來告乃承與犬羊俱下雖當逼迫猶以罔然兄立身率素見信明於門宗年踰耳順位極人臣仲玉安期亦不足作佳少年本來門戶良可惜也兄之此舉謂可得如大將軍昔年之事乎昔年佞臣亂朝人懷不寧如導之徒心思外濟今則不然大將軍來屯于湖漸失人心君子危怖百姓勞弊將終之日委重安期安期斷乳未幾日又乏時望便可襲宰相之迹邪自開闢以來頗有宰相孺子者不諸有耳者皆是將禪代意非人臣之事也先帝中興遺愛在人聖主聰明德洽朝野思與賢哲弘濟艱難不北面而執臣節乃私相樹建肆行威福凡在人臣誰不憤歎此直錢鳳不良之心聞於遠近自知無地遂唱姦逆至如鄧伯山周道和有好情往來人士咸皆明之方欲委任與共戮力非徒無慮而已也導門戶小大受國厚恩兄弟顯寵可謂隆矣導雖不武情在寧國今日之事明目張膽為六軍之首寧忠臣而死不無賴而生矣但恨大將軍桓文之勳不遂而兄一旦為逆節之臣負先人平素之志既沒之日何顏見諸父於黃泉謁先帝於地下邪執省來告為兄羞之且悲且慚願速建大計惟取錢鳳一人使天下獲安家國有福故是竹素之事非惟免禍而已夫福如反手用之即是導所統六軍石頭萬五千人宮內後苑二萬人護軍屯金城六千人劉遐已至征北昨已濟江萬五千人以天子之威文武畢力豈可當乎事猶可追兄早思之大兵一奮導以為灼炟也含不答帝遣中軍司馬曹渾等擊含于越城含軍敗敦聞怒曰我兄老婢耳門戶衰矣兄弟才兼文武者世將處季皆早死今世事去矣語參軍呂寶曰我當力行因作勢而起困乏復臥鳳等至京師屯于水南帝親率六軍以禦鳳頻戰破之敦謂羊鑒及子應曰我亡後應便即位先立朝廷百官然後乃營葬事初敦始病夢白犬自天而下嚙之又見刁協乘軺車導從瞋目令左右執之俄而敦死時年五十九應祕不發喪裹尸以席蠟塗其外埋于廳事中與諸葛瑤等縱酒淫樂沈充自吳率衆萬餘人至與含等合充司馬顧颺說充曰今舉大事而天子已扼其喉情離衆沮鋒摧勢挫持疑猶豫必致禍敗今若決破柵塘因湖水灌京邑肆舟檻之勢極水軍之用此所謂不戰而屈人之兵上策也藉初至之銳并東南衆軍之力十道俱進衆寡過倍理必摧陷中策也轉禍為福因敗為成召錢鳳計事因斬之以降下策也充不能用颺逃歸於吳含復率衆渡淮蘇峻等逆擊大敗之充亦燒營而退既而周光斬錢鳳吳儒斬沈充並傳首京師有司議曰王敦滔天作逆有無君之心宜依崔杼王淩故事剖棺戮尸以彰元惡於是發瘞出尸焚其衣冠跽而刑之敦充首同日懸于南桁觀者莫不稱慶敦首既懸莫敢收葬者尚書令郗鑒言於帝曰昔王莽漆頭以輗車董卓然腹以照市王淩儭土徐馥焚首前朝誅楊駿等皆先極官刑後聽私殯然春秋許齊襄之葬紀侯魏武義王修之哭袁譚由斯言之王誅加於上私義行於下臣以為可聽私葬於義為弘詔許之於是敦家收葬焉含父子乘單船奔荊州刺史王舒舒使人沈之于江餘黨悉平敦眉目疏朗性簡脫有鑒裁學通左氏口不言財利尤好清談時人莫知惟族兄戎異之經略指麾千里之外肅然而麾下擾而不能整武帝嘗召時賢共言伎藝之事人人皆有所說惟敦都無所關意色殊惡自言知擊鼓因振袖揚枹音節諧韵神氣自得傍若無人舉坐歎其雄爽石崇以奢豪矜物廁上常有十餘婢侍列皆有容色置甲煎粉沈香汁有如廁者皆易新衣而出客多羞脫衣而敦脫故著新意色無怍羣婢相謂曰此客必能作賊又嘗荒恣於色體為之弊左右諫之敦曰此甚易耳乃開後閤驅諸婢妾數十人並放之時人歎異焉沈充字士居少好兵書頗以雄豪聞於鄉里敦引為參軍充因薦同郡錢鳳鳳字世儀敦以為鎧曹參軍數得進見知敦有不臣之心因進邪說遂相朋構專弄威權言成禍福遭父喪外託還葬而密為敦使與充交構初敦參軍熊甫見敦委任鳳將有異圖因酒酣謂敦曰開國承家小人勿用佞倖在位鮮不敗業敦作色曰小人阿誰甫無懼容因此告歸臨與敦別因歌曰徂風起蓋山陵氛霧蔽日玉石焚往事既去可長歎念別惆悵復會難敦知其諷己而不納明帝將伐敦遣其鄉人沈禎諭充許以為司空充謂禎曰三司具瞻之重豈吾所任幣厚言甘古人所畏且丈夫共事終始當同寧可中道改易人誰容我禎曰不然舍忠與順未有不亡者也大將軍阻兵不朝爵賞自己五尺之童知其異志今此之舉將行篡弒耳豈同於往年乎是以疆埸諸將莫不歸赴本朝內外之士咸願致死正以移國易主義不北面以事之也奈何協同逆圖當不義之責乎朝廷坦誠禎所知也賊之黨類猶宥其罪與之更始況見機而作邪充不納率兵臨發謂其妻子曰男兒不豎豹尾終不還也及敗歸吳興亡失道誤入其故將吳儒家儒誘充內重壁中因笑謂充曰三千戶侯也充曰封侯不足貪也爾以大義存我我宗族必厚報汝若必殺我汝族滅矣儒遂殺之充子勁竟滅吳氏勁見忠義傳史臣曰琅邪之初鎮建鄴龍德猶潛雖當璧膺圖預定於冥兆豐功厚利未被於黎氓王敦歷官中朝威名夙著作牧淮海望實逾隆遂能託魚水之深期定金蘭之密契弼成王度光佐中興卜世延百二之期論都創三分之業此功固不細也既而負勳高而圖非望恃勢逼而肆驕陵釁隙起自刁劉禍難成於錢沈興晉陽之甲纏象魏之兵蜂目既露豺聲又發擅竊國命殺害忠良遂欲篡盜乘輿逼遷龜鼎賴嗣君英略晉祚靈長諸侯釋位股肱勠力用能運茲廟算殄彼凶徒克固鴻圖載清天步者矣桓溫孟嘉桓溫字元子宣城太守彝之子也生未朞而太原溫嶠見之曰此兒有奇骨可試使啼及聞其聲曰真英物也彝以嶠所賞故遂名之曰溫嶠笑曰果爾後將易吾姓也彝為韓晃所害涇令江播豫焉溫時年十五枕戈泣血志在復讎至年十八會播已終子彪兄弟三人居喪置刃杖中以為溫備溫詭稱弔賓得進刃彪於廬中并追二弟殺之時人稱焉溫豪爽有風概姿貌甚偉面有七星少與沛國劉惔善惔嘗稱之曰溫眼如紫石棱鬚作蝟毛磔孫仲謀晉宣王之流亞也選尚南康長公主拜駙馬都尉襲爵萬寧男除琅邪太守累遷徐州刺史溫與庾翼友善相期以寧濟之事翼嘗薦溫於明帝曰桓溫少有雄略願陛下勿以常人遇之常壻畜之宜委以方召之任託其弘濟艱難之勳翼卒以溫為都督荊梁四州諸軍事安西將軍荊州刺史領護南蠻校尉假節時李勢微弱溫志在立勳于蜀永和二年率衆西伐時康獻太后臨朝溫將發上疏而行朝廷以蜀險遠而溫兵寡少深入敵場甚以為憂初諸葛亮造八陣圖於魚復平沙之上壘石為八行行相去二丈溫見之謂此常山蛇勢也文武皆莫能識之及軍次彭模乃命參軍周楚孫盛守輜重自將步卒直指成都勢使其叔父福及從兄權等攻彭模楚等禦之福退走溫又擊權等三戰三捷賊衆散自間道歸成都勢於是悉衆與溫戰于笮橋參軍龔護戰沒衆懼欲退而鼓吏誤鳴進鼓於是攻之勢衆大潰溫乘勝直進焚其小城勢遂夜遁九十里至晉壽葭萌城其將鄧嵩昝堅勸勢降乃面縛輿櫬請命溫解縛焚櫬送于京師溫停蜀三旬舉賢旌善偽尚書僕射王誓中書監王瑜鎮東將軍鄧定散騎常侍常璩等皆蜀之良也並以為參軍百姓咸悅軍未旋而王誓鄧定隗文等反溫復討平之振旅還江陵進位征西大將軍開府封臨賀郡公及石季龍死溫欲率衆北征先上疏求朝廷議水陸之宜久不報時知朝廷杖殷浩等以抗己溫甚忿之然素知浩弗之憚也以國無他釁遂得相持彌年雖有君臣之跡亦相羈縻而已八州士衆資調殆不為國家用聲言北伐拜表便行順流而下行達武昌衆四五萬殷浩慮為溫所廢將謀避之又欲以騶虞幡住溫軍內外噂人情震駭簡文帝時為撫軍與溫書明社稷大計疑惑所由溫即迴軍還鎮上疏曰臣近親率所統欲北掃趙魏軍次武昌獲撫軍大將軍會稽王昱書說風塵紛紜妄生疑惑辭旨危急憂及社稷省之惋愕不解所由形影相顧隕越無地臣以闇蔽忝荷重任雖才非其人職在靜亂寇讎不滅國恥未雪幸因開泰之期遇可乘之會匹夫有志猶懷憤慨臣亦何心坐觀其弊故荷戈驅馳不遑寧處前後表陳于今歷年矣丹誠坦然公私所察有何纖介容此嫌忌豈醜正之徒心懷怵惕操弄虛說以惑朝聽昔樂毅竭誠垂涕流奔霍光盡忠上官告變讒說殄行姦邪亂德乃歷代之常患存亡之所由也今主上富於陽秋陛下以聖淑臨朝恭己委任責成羣下方寄會通於羣才布德信於遐荒況臣世蒙殊恩服事三朝身非羈旅之賓跡無韓彭之釁而反間起於胸心交亂過於四國此古賢所以歎息於既往而臣亦大懼於當年也今寇賊冰消大事垂定晉之遺黎鵠立南望赴義之衆慷慨即路元凶之命懸在漏刻而橫議妄生成此貝錦使垂滅之賊復獲蘇息所以痛心絕氣悲慨彌深臣雖所存者公所務者國然外難未弭而內弊交興則臣本心陳力之志也進位太尉固讓不拜時殷浩至洛陽修復園陵經涉數年屢戰屢敗器械都盡溫復進督司州因朝野之怨乃奏廢浩自此內外大權一歸溫矣溫遂統步騎四萬發江陵水軍自襄陽入均口至南鄉步自淅川以征關中命梁州刺史司馬勳出子午道別軍攻上洛獲苻健荊州刺史郭敬進擊青泥破之健又遣子生弟雄衆數萬屯嶢柳愁思塠以距溫遂大戰生親自陷陣殺溫將應誕劉泓死傷千數溫軍力戰生衆乃散雄又與將軍桓沖戰白鹿原又為沖所破雄遂馳襲司馬勳勳退次女媧堡溫進至霸上健以五千人深溝自固居人皆安堵復業持牛酒迎溫於路者十八九耆老感泣曰不圖今日復見官軍初溫恃麥熟取以為軍資而健芟苗清野軍糧不屬收三千餘口而還帝使侍中黃門勞溫于襄陽初溫自以雄姿風氣是宣帝劉琨之儔有以其比王敦者意甚不平及是征還於北方得一巧作老婢訪之乃琨伎女也一見溫便潸然而泣溫問其故答曰公甚似劉司空溫大悅出外整理衣冠又呼婢問婢云面甚似恨薄眼甚似恨小鬚甚似恨赤形甚似恨短聲甚似恨雌溫於是褫冠解帶昏然而睡不怡者數日母孔氏卒上疏解職欲送葬宛陵詔不許贈臨賀太夫人印綬諡曰敬遣侍中弔祭謁者監護喪事旬月之中使者八至軺軒相望於道溫葬畢視事欲修復園陵移都洛陽表疏十餘上不許進溫征討大都督督司冀二州諸軍事委以專征之任溫遣督護高武據魯陽輔國將軍戴施屯河上勒舟師以逼許洛以譙梁水道既通請徐豫兵乘淮泗入河溫自江陵北伐行經金城見少為琅邪時所種柳皆已十圍慨然曰木猶如此人何以堪攀枝執條泫然流涕於是過淮泗踐北境與諸僚屬登平乘樓眺矚中原慨然曰遂使神州陸沈百年丘墟王夷甫諸人不得不任其責袁宏曰運有興廢豈必諸人之過溫作色謂四座曰頗聞劉景升有千斤大牛噉芻豆十倍於常牛負重致遠曾不若一羸牸魏武入荊州以享軍士意以況宏坐中皆失色師次伊水姚襄屯水北距水而戰溫結陣而前親被甲督弟沖及諸將奮擊襄大敗自相殺死者數千人越北芒而西走追之不及遂奔平陽溫屯故太極殿前徙入金墉城謁先帝諸陵陵被侵毀者皆繕復之兼置陵令遂旋軍執降賊周成以歸遷降人三千餘家於江漢之間遣西陽太守滕畯出黃城討蠻賊文盧等又遣江夏相劉岵義陽太守胡驥討妖賊李弘皆破之傳首京都溫還軍之後司豫青兗復陷于賊升平中改封南郡公降臨賀為縣公以封其次子濟隆和初寇逼河南太守戴施出奔冠軍將軍陳祐告急溫使竟陵太守鄧遐率三千人助祐并欲還都洛陽上疏曰巴蜀既平逆胡消滅時來之會既至休泰之慶顯著而人事乖違屢喪王略復使二賊雙起海內崩裂河洛蕭條山陵危逼所以遐邇悲惶痛心於既往者也伏惟陛下稟乾坤自然之姿挺羲皇玄朗之德鳳棲外藩龍飛皇極時務陵替備徹天聽人之情偽盡知之矣是以九域宅心幽遐企踵思佇雲羅混網四裔誠宜遠圖廟算大存經略光復舊京疆理華夏使惠風陽澤洽被八表霜威寒陵振無外豈不允應靈休天人齊契今江河悠闊風馬殊邈故向義之徒覆亡相尋而建節之士猶繼踵無悔況辰極既迴衆星斯仰本源既運枝泒自遷則晉之餘黎欣皇德之攸憑羣凶妖逆知滅亡之無日騁思順之心鼓雷霆之勢則二豎之命不誅而自絕矣故員通貴於無滯明哲尚於應機砎如石焉所以成務若乃海運既徙而鵬翼不舉永結根於南垂廢神州於龍漠令五尺之童掩口而歎息夫先王經始玄聖宅心畫為九州制為九服貴中區而內諸夏誠以晷度自中霜露惟均冠冕萬國朝宗四海故也自強胡陵暴中華蕩覆狼狽失據權幸揚越蠖屈以待龍伸之會潛蟠以俟風雲之期蓋屯圮所鍾非理勝而然也而喪亂緬邈五十餘載先舊徂沒後來童幼班荊輟音積習成俗遂望絕於本邦宴安於所託眷言悼之不覺悲歎臣雖庸劣才不周務然攝官承乏屬當重任願竭筋骨宣力先鋒翦除荊棘驅諸豺狼自永嘉之亂播流江表者請一切北徙以實河南資其舊業反其土宇勤農桑之務盡三時之利導之以義齊之以禮使文武兼宣信順交暢井邑既修綱維粗舉然後陛下建三辰之章振旂旗之旌冕旒鍚鑾朝服濟江則宇宙之內誰不幸甚夫人情昧安難與圖始非常之事衆人所疑伏願陛下決玄照之明斷常均之外責臣以興復之效委臣以終濟之功此事既就此功既成則陛下盛勳比隆前代周宣之詠復興當年如其不效臣之罪也褰裳赴鑊其甘如薺詔曰在昔喪亂忽涉五紀戎狄肆暴繼襲凶跡眷言西顧慨歎盈懷知欲躬率三軍蕩滌氛穢廓清中畿光復舊京非夫外身殉國孰能若此者哉諸所處分委之高算但河洛丘墟所營者廣經始之勤致勞懷也於是改授并司冀三州以交廣遼遠罷都督溫表辭不受又加侍中大司馬都督中外諸軍事假黃鉞溫以既總督內外不宜在遠又上疏陳便宜七事其一朋黨雷同私議沸騰宜抑杜浮競莫使能植其二戶口凋寡不當漢之一郡宜并官省職令久於其事其三機務不可停廢常行文案宜為限日其四宜明長幼之禮奬忠公之吏其五褒貶賞罰宜允其實其六宜述遵前典敦明學業其七宜選建史官以成晉書有司皆奏行之尋加羽葆鼓吹置左右長史司馬從事中郎四人受鼓吹餘皆辭復率舟軍進合肥加揚州牧錄尚書事使侍中顏旄宣旨召溫入參朝政溫上疏曰方攘除羣凶掃平禍亂當竭天下智力與衆共濟而朝議咸疑聖詔彌固事異本圖豈敢執遂至於入參朝政非所敢聞臣違離宮省二十餘載鞸木自大戎務役勤思苦若得解帶逍遙鳴玉闕廷參贊無為之契豫聞曲成之化雖實不敏豈不是願但顧以江漢艱難不同曩日而益梁新平寧州始服懸兵漢川戍禦彌廣加強蠻盤哰勢處上流江湖悠遠當制命侯伯自非望實重威無以鎮御遐外臣知捨此之艱危敢背之而無怨願奮臂投身造事中原者實恥帝道皇居仄陋於東南痛神華桑梓遂埋於戎狄若憑宗廟之靈則雲徹席卷呼吸蕩清如當假息游魂則臣據河洛親臨二寇廣宣皇靈襟帶秦趙遠不五載大事必定今臣昱以親賢贊國光輔二世即無煩以臣疏鈍並間機務且不有行者誰扞牧圉表𩹉相濟實深實重伏願陛下察臣所陳兼訪內外乞時還屯撫寧方隅詔不許復徵溫溫至赭圻詔又使尚書車灌止之溫遂城赭圻固讓內錄遙領揚州牧屬鮮卑攻洛陽陳祐出奔簡文帝時輔政會溫於洌洲議征討事溫移鎮姑孰會哀帝崩事遂寢溫性儉每讌惟下七奠柈茶果而已然以雄武專朝窺覦非望或臥對親僚曰為爾寂寂將為文景所笑衆莫敢對既而撫枕起曰既不能流芳後世不足復遺臭萬載邪嘗行經王敦墓望之曰可人可人其心迹若是時有遠方比丘尼名有道術於別室浴溫竊窺之尼倮身先以刀自破腹次斷兩足浴竟出溫問吉凶尼云公若作天子亦當如是太和四年又上疏悉衆北伐平北將軍郗愔以疾解職又以溫領平北將軍徐兗二州刺史率弟南中郎沖西中郎袁真步騎五萬北伐百官皆於南州祖道都邑盡傾軍次湖陸攻慕容暐將慕容忠獲之進次金鄉時亢旱水道不通乃鑿鉅野三百餘里以通舟運自清水入河暐將慕容垂傅末波等率衆八萬距溫戰于林渚溫擊破之遂至枋頭先使袁真伐譙梁開石門以通運真討譙梁皆平之而不能開石門軍糧竭盡溫焚舟步退自東燕出倉垣經陳留鑿井而飲行七百餘里垂以八千騎追之戰于襄邑溫軍敗績死者三萬人溫甚恥之歸罪於真表廢為庶人真怨溫誣己據壽陽以自固潛通苻堅慕容暐帝遣侍中羅含以牛酒犒溫於山陽使會稽王昱會溫于涂中詔以溫世子給事熙為征虜將軍豫州刺史假節及南康公主薨詔賻布千匹錢百萬溫辭不受又陳息熙三年之孤且年少未宜使居偏任詔不許發州人築廣陵城移鎮之時溫行役既久又兼疾癘死者十四五百姓嗟怨袁真病死其將朱輔立其子瑾以嗣事慕容暐苻堅並遣軍援瑾溫使督護竺瑤矯陽之等與水軍擊之時暐軍已至瑤等與戰於武丘破之溫率二萬人自廣陵又至瑾嬰城固守溫築長圍守之苻堅乃使其將王鑒張蚝等率兵以救瑾屯洛澗先遣精騎五千次於肥水北溫遣桓伊及弟子石虔等逆擊大破之瑾衆遂潰生擒之并其宗族數十人及朱輔送於京都而斬之瑾所侍養乞活數百人悉坑之以妻子為賞溫以功詔加班劍十人犒軍於路次文武論功賞賜各有差溫既負其才力久懷異志欲先立功河朔還受九錫既逢覆敗名實頓減於是參軍郗超進廢立之計溫乃廢帝而立簡文帝詔溫依諸葛亮故事甲仗百人入殿賜錢五千萬絹二萬匹布十萬匹溫多所廢徙誅庾倩殷涓曹秀等是時溫威勢翕赫侍中謝安見而遙拜溫驚曰安石卿何事乃爾安曰未有君拜於前臣揖於後時溫有腳疾詔乘輿入朝既見欲陳廢立本意帝便泣下數十行溫兢懼不得一言而出初元明世郭璞為讖曰君非無嗣兄弟代禪謂成帝有子而以國祚傳弟又曰有人姓李兒專征戰譬如車軸脫在一面兒者子也李去子木存車去軸為亘合成桓字也又曰爾來爾來河內大縣爾來謂自爾已來為元始溫字元子也故河內大縣溫也成康既崩桓氏始大故連言之又曰賴子之薨延我國祚痛子之隕皇運其暮二子者元子道子也溫志在篡奪事未成而死幸之也會稽王道子雖首亂晉國而其死亦晉衰之由也故云痛也溫復還白石上疏求歸姑孰詔曰夫乾坤體合而化成萬物二人同心則不言所利古之哲王咸賴元輔姬旦光于四表而周道以隆伊尹格于皇天而殷化以洽大司馬明德應期光大深遠上合天心含章時發用集大命在予一人功美博陸道固萬世今進公丞相其大司馬本官皆如故留公京都以鎮社稷溫固辭仍請還鎮遣侍中王坦之徵溫入相增邑為萬戶又辭詔以西府經袁真事故軍用不足給世子熙布三萬匹米六萬斛又以熙弟濟為給事中及帝不豫詔溫曰吾遂委篤足下便入冀得相見便來便來於是一日一夜頻有四詔溫上疏曰聖體不和以經積日愚心惶恐無所寄情夫盛衰常理過備無害故漢高枕疾呂后問相孝武不豫霍光啟嗣嗚噎以問身後蓋所存者大也今皇子幼稚而朝賢時譽惟謝安王坦之才識智能皆簡在聖鑒內輔幼君外禦強寇實羣情之大懼然理盡於此陛下便宜崇授使羣下知所寄而安等奉命陳力公私為宜至如臣溫位兼將相加陛下垂布衣之顧但朽邁疾病懼不支久無所復堪託以後事疏未及奏而帝崩遺詔家國事一稟之於公如諸葛武侯王丞相故事溫初望簡文臨終禪位於己不爾便為周公居攝事既不副所望故甚憤怨與弟沖書曰遺詔使吾依武侯王公故事耳王謝處大事之際日憤憤少懷及孝武即位詔曰先帝遺敕云事大司馬如事吾令答表便可盡敬又詔大司馬社稷所寄先帝託以家國內外衆事便就關公施行復遣謝安徵溫入輔加前部羽葆鼓吹武賁六十人溫讓不受及溫入朝赴山陵詔曰公勳德尊重師保朕躬兼有風患其無敬又敕尚書安等於新亭奉迎百僚皆拜于道側當時豫有位望者咸戰慴失色或云因此殺王謝內外懷懼溫既至以盧悚入宮乃收尚書陸始付廷尉責替慢罪也於是拜高平陵左右覺其有異既登車謂從者曰先帝向遂靈見既不述帝所言故衆莫之知但見將拜時頻言臣不敢而已又問左右殷涓形狀答者言肥短溫云向亦見在帝側初殷浩既為溫所廢死涓頗有氣尚遂不詣溫而與武陵王晞游故溫疑而害之竟不識也及是亦見涓為祟因而遇疾凡停京師十有四日歸於姑孰遂寢疾不起諷朝廷加己九錫累相催促謝安王坦之聞其病篤密緩其事錫文未及成而薨時年六十二皇太后與帝臨於朝堂三日詔賜九命衮冕之服又朝服一具衣一襲東園祕器錢二百萬布二千匹臘五百斤以供喪事及葬一依太宰安平獻王漢大將軍霍光故事賜九旒鸞輅黃屋左纛轀輬車挽歌二部羽葆鼓吹武賁班劍百人優冊即前南郡公增七千五百戶進地方三百里賜錢五千萬絹二萬匹布十萬匹追贈丞相初沖問溫以謝安王坦之所任溫曰伊等不為汝所處分溫知己存彼不敢異害之無益於沖更失時望所以息謀溫六子熙濟歆禕偉玄熙字伯道初為世子後以才弱使沖領其衆及溫病熙與叔祕謀殺沖沖知之徙于長沙濟字仲道與熙同謀俱徙長沙歆字叔道賜爵臨賀公禕最愚不辨菽麥偉字幼道平厚篤實居藩為士庶所懷歷使持節督荊益寧秦梁五州諸軍事安西將軍領南蠻校尉荊州刺史西昌侯贈驃騎將軍開府儀同三司玄嗣爵別有傳孟嘉字萬年江夏鄳人吳司空宗曾孫也嘉少知名太尉庾亮領江州辟部廬陵從事嘉還都亮引問風俗得失對曰還傳當問吏亮舉麈尾掩口而笑謂弟翼曰孟嘉故是盛德人轉勸學從事褚裒時為豫章太守正旦朝亮裒有器識亮大會州府人士嘉坐次甚遠裒問亮聞江州有孟嘉其人何在亮曰在坐卿但自覓裒歷觀指嘉謂亮曰此君小異將無是乎亮欣然而笑喜裒得嘉奇嘉為裒所得乃益器焉後為征西桓溫參軍溫甚重之九月九日溫燕龍山僚佐畢集時佐吏並著戎服有風至吹嘉帽墮落嘉不之覺溫使左右勿言欲觀其舉止嘉良久如廁溫令取還之命孫盛作文嘲嘉著嘉坐處嘉還見即答之其文甚美四坐嗟歎嘉好酣飲愈多不亂溫問嘉酒有何好而卿嗜之嘉曰公未得酒中趣耳又問聽妓絲不如竹竹不如肉何謂也嘉答曰漸近使之然一坐咨嗟轉從事中郎遷長史年五十三卒于家史臣曰桓溫挺雄豪之逸氣韞文武之奇才見賞通人夙標令譽時既豺狼孔熾疆埸多虞受寄扞城用恢威略乃踰越險阻戡定岷峨獨克之功有可稱矣及觀兵洛汭修復五陵引旆秦郊威懷三輔雖未能梟除凶逆亦足以宣暢王靈既而總戎馬之權居形勝之地自謂英猷不世勳績冠時挾震主之威蓄無君之志企景文而慨息想處仲而思齊睥睨漢廷窺覦周鼎復欲立奇功於趙魏允歸望於天人然後步驟前王憲章虞夏逮乎石門路阻襄邑兵摧懟謀略之乖違恥師徒之撓敗遷怒於朝廷委罪於偏裨廢主以立威殺人以逞欲曾弗知寶命不可以求得神器不可以力征豈不悖哉豈不悖哉斯實斧鉞之所宜加人神之所同棄然猶存極光寵沒享哀榮是知朝政之無章主威之不立也贊曰播越江濆政弱權分元子恃力處仲矜勳迹既陵上志亦無君罪浮浞广部心窺舜禹樹威外略稱兵內侮惟身與嗣竟罹齊斧
