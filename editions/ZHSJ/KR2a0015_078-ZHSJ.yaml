body:
  text: 晉書卷七十八列傳第四十八孔愉子汪安國弟祗從子坦嚴從弟羣羣子沈孔愉字敬康會稽山陰人也其先世居梁國曾祖潛太子少傅漢末避地會稽因家焉祖竺吳豫章太守父恬湘東太守從兄侃大司農俱有名江左愉年十三而孤養祖母以孝聞與同郡張茂字偉康丁潭字世康齊名時人號曰會稽三康吳平愉遷于洛惠帝末歸鄉里行至江淮間遇石冰封雲為亂雲逼愉為參軍不從將殺之賴雲司馬張統營救獲免東還會稽入新安山中改姓孫氏以稼穡讀書為務信著鄉里後忽捨去皆謂為神人而為之立祠永嘉中元帝始以安東將軍鎮揚土命愉為參軍邦族尋求莫知所在建興初始出應召為丞相掾仍除駙馬都尉參丞相軍事時年已五十矣以討華軼功封餘不亭侯愉嘗行經餘不亭見籠龜於路者愉買而放之溪中龜中流左顧者數四及是鑄侯印而印龜左顧三鑄如初印工以告愉乃悟遂佩焉帝為晉王使長兼中書郎于時刁協劉隗用事王導頗見疏遠愉陳導忠賢有佐命之勳謂事無大小皆宜諮訪由是不合旨出為司徒左長史累遷吳興太守沈充反愉棄官還京師拜御史中丞遷侍中太常及蘇峻反愉朝服守宗廟初愉為司徒長史以平南將軍溫嶠母亡遭亂不葬乃不過其品至是峻平而嶠有重功愉往石頭詣嶠嶠執愉手而流涕曰天下喪亂忠孝道廢能持古人之節歲寒不凋者唯君一人耳時人咸稱嶠居公而重愉之守正尋徙大尚書遷安南將軍江州刺史不行轉尚書右僕射領東海王師尋遷左僕射咸和八年詔曰尚書令玩左僕射愉並恪居官次祿不代耕端右任重先朝所崇其給玩親信三十人愉二十人稟賜愉上疏固讓優詔不許重表曰臣以朽闇忝廁朝右而以惰劣無益毗佐方今強寇未殄疆埸日駭政煩役重百姓困苦姦吏擅威暴人肆虐大弊之後倉庫空虛功勞之士賞報不足困悴之餘未見拯卹呼嗟之怨人鬼感動宜并官省職貶食節用勤撫其人以濟其艱臣等不能贊揚大化糾明刑政而偷安高位橫受寵給無德而祿殃必及之不敢橫受殊施以重罪戾從之王導聞而非之於都坐謂愉曰君言姦吏擅威暴人肆虐為患是誰愉欲大論朝廷得失陸玩抑之乃止後導將以趙胤為護軍愉謂導曰中興以來處此官者周伯仁應思遠耳今誠乏才豈宜以趙胤居之邪導不從其守正如此由是為導所銜後省左右僕射以愉為尚書僕射愉年在懸車累乞骸骨不許轉護軍將軍加散騎常侍復徙領軍將軍加金紫光祿大夫領國子祭酒頃之出為鎮軍將軍會稽內史加散騎常侍句章縣有漢時舊陂毀廢數百年愉自巡行修復故堰溉田二百餘頃皆成良業在郡三年乃營山陰湖南侯山下數畝地為宅草屋數間便棄官居之送資數百萬悉無所取病篤遺令斂以時服鄉邑義賵一不得受年七十五咸康八年卒贈車騎將軍開府儀同三司諡曰貞三子誾汪安國誾嗣爵位至建安太守誾子靜字季恭再為會稽內史累遷尚書左僕射加後將軍汪字德澤好學有志行孝武帝時位至侍中時茹千秋以佞媚見幸於會稽王道子汪屢言之于帝帝不納遷尚書太常卿以不合意求出為假節都督交廣二州諸軍事征虜將軍平越中郎將廣州刺史甚有政績為嶺表所稱太元十七年卒安國字安國年小諸兄三十餘歲羣從諸兄並乏才名以富強自立唯安國與汪少厲孤貧之操汪既以直亮稱安國亦以儒素顯孝武帝時甚蒙禮遇仕歷侍中太常及帝崩安國形素羸瘦服衰絰涕泗竟日見者以為真孝再為會稽內史領軍將軍安帝隆安中下詔曰領軍將軍孔安國貞慎清正出內播譽可以本官領東海王師必能導達津梁依仁游藝後歷尚書左右僕射義熙四年卒贈左光祿大夫祗字承祖太守周札命為功曹史札為沈充所害故人賓吏莫敢近者祗冒刃號哭親行殯禮送喪還義興時人義之坦字君平祖沖丹楊太守父侃大司農坦少方直有雅望通左氏傳解屬文元帝為晉王以坦為世子文學東宮建補太子舍人遷尚書郎時臺郎初到普加策試帝手策問曰吳興徐馥為賊殺郡將郡今應舉孝廉不坦對曰四罪不相及殛鯀而興禹徐馥為逆何妨一郡之賢又問姦臣賊子弒君樜宮瀦宅莫大之惡也鄉舊廢四科之選今何所依坦曰季平子逐魯昭公豈可以廢仲尼也竟不能屈先是以兵亂之後務存慰悅遠方秀孝到不策試普皆除署至是帝申明舊制皆令試經有不中科刺史太守免官太興三年秀孝多不敢行其有到者並託疾帝欲除署孝廉而秀才如前制坦奏議曰臣聞經邦建國教學為先移風崇化莫尚斯矣古者且耕且學三年而通一經以平康之世猶假漸漬積以日月自喪亂以來十有餘年干戈載揚俎豆禮戢家廢講誦國闕庠序率爾責試竊以為疑然宣下以來涉歷三載累遇慶會遂未一試揚州諸郡接近京都懼累及君父多不敢行其遠州邊郡掩誣朝廷冀於不試冒昧來赴既到審試遂不敢會臣愚以不會與不行其為闕也同若當偏加除署是為肅法奉憲者失分僥倖投射者得官穨風傷教懼於是始夫王言如絲其出如綸臨事改制示短天下人聽有惑臣竊惜之愚以王命無貳憲制宜信去年察舉一皆策試如不能試可不拘到遣歸不署又秀才雖以事策亦氾問經義苟所未學實難闇通不足復曲碎垂例違舊造異謂宜因其不會徐更革制可申明前下崇修學校普延五年以展講習鈞法齊訓示人軌則夫信之與法為政之綱施之家室猶弗可貳況經國之典而可翫黷乎帝納焉聽孝廉申至七年秀才如故時典客令萬默領諸胡胡人相誣朝廷疑默有所偏助將加大辟坦獨不署由是被譴遂棄官歸會稽久之除領軍司馬未赴召會王敦反與右衞將軍虞潭俱在會稽起義而討沈充事平始就職揚州刺史王導請為別駕咸和初遷尚書左丞深為臺中之所敬憚尋屬蘇峻反坦與司徒司馬陶回白王導曰及峻未至宜急斷阜陵之界守江西當利諸口彼少我衆一戰決矣若峻未至可往逼其城今不先往峻必先至先人有奪人之功時不可失導然之庾亮以為峻脫逕來是襲朝廷虛也故計不行峻遂破姑熟取鹽米亮方悔之坦謂人曰觀峻之勢必破臺城自非戰士不須戎服既而臺城陷戎服者多死白衣者無他時人稱其先見及峻挾天子幸石頭坦奔陶侃侃引為長史時侃等夜築白石壘至曉而成聞峻軍嚴聲咸懼來攻坦曰不然若峻攻壘必須東北風急令我水軍不得往救今天清靜賊必不動決遣軍出江乘掠京口以東矣果如所籌時郗鑒鎮京口侃等各以兵會既至坦議以為本不應須召郗公遂使東門無限今宜遣還雖晚猶勝不也侃等猶疑坦固爭甚切始令鑒還據京口遣郭默屯大業又令驍將李閎曹統周光與默并力賊遂勢分卒如坦計及峻平以坦為吳郡太守自陳吳多賢豪而坦年少未宜臨之王導庾亮並欲用坦為丹楊尹時亂離之後百姓凋弊坦固辭之導等猶未之許坦慨然曰昔肅祖臨崩諸君親據御牀共奉遺詔孔坦疏賤不在顧命之限既有艱難則以微臣為先今由俎上肉任人膾截耳乃拂衣而去導等亦止於是遷吳興內史封晉陵男加建威將軍以歲饑運家米以振窮乏百姓賴之時使坦募江淮流人為軍有殿中兵因亂東還來應坦募坦不知而納之或諷朝廷以坦藏臺叛兵遂坐免尋拜侍中咸康元年石聰寇歷陽王導為大司馬討之請坦為司馬會石勒新死季龍專恣石聰及譙郡太守彭彪等各遣使請降坦與聰書曰華狄道乖南北迥邈瞻河企宋每懷饑渴數會陽九天禍晉國姦凶猾夏乘釁肆虐我德雖衰天命未改乾符啟再集之慶中興應靈期之會百六之艱既過惟新之美日隆而神州振蕩遺氓波散誓命戎狄之手跼蹐豺狼之穴朝廷每臨寐永歎痛心疾首天罰既集罪人斯隕王旅未加自相魚肉豈非人怨神怒天降其災蘭艾同焚賢愚所歎哀矜勿喜我后之仁大赦曠廓唯季龍是討彭譙使至粗具動靜知將軍忿疾醜類翻然同舉承問欣豫慶若在己何知幾之先覺砎石之易悟哉引領來儀怪無聲息將軍出自名族誕育洪冑遭世多故國傾家覆生離親屬假養異類雖逼偽寵將亦何賴聞之者猶或有悼況身嬰之能不憤慨哉非我族類其心必異誠反族歸正之秋圖義建功之日也若將軍喻納往言宣之同盟率關右之衆輔河南之卒申威趙魏為國前驅雖竇融之保西河黥布之去項羽比諸古今未足為喻聖上寬明宰輔弘納雖射鉤之隙賞之故行雍齒之恨侯之列國況二三子無曩人之嫌而遇天啟之會當如影響有何遲疑今六軍誡嚴水陸齊舉熊羆踴躍齕噬爭先鋒鏑一交玉石同碎雖復後悔何嗟及矣僕以不才世荷國寵雖實不敏誠為行李之主區區之情還信所具夫機事不先鮮不後悔自求多福唯將軍圖之朝廷遂不果北伐人皆懷恨坦在職數年遷侍中時成帝每幸丞相王導府拜導妻曹氏有同家人坦每切諫時帝刻日納后而尚書左僕射王彬卒議者以為欲卻期坦曰婚禮之重重於救日蝕救日蝕有后之喪太子墮井則止納后盛禮豈可以臣喪而廢從之及帝既加元服猶委政王導坦每發憤以國事為己憂嘗從容言於帝曰陛下春秋以長聖敬日躋宜博納朝臣諮諏善道由是忤導出為廷尉怏怏不悅以疾去職加散騎常侍遷尚書未拜疾篤庾冰省之乃流涕坦慨然曰大丈夫將終不問安國寧家之術乃作兒女子相問邪冰深謝焉臨終與庾亮書曰不謂疾苦遂至頓弊自省緜緜奄忽無日修短命也將何所悲但以身往名沒朝恩不報所懷未即命多恨耳足下以伯舅之尊居方伯之重抗威顧眄名震天下榱椽之佐常願下風使九服式序四海一統封京觀於中原反紫極於華壤是宿昔之所味詠慷慨之本誠矣今中道而斃豈不惜哉若死而有靈潛聽風烈俄卒時年五十一追贈光祿勳諡曰簡亮報書曰廷尉孔君神遊體離嗚呼哀哉得八月十五日書知疾患轉篤遂不起濟悲恨傷楚不能自勝足下方在中年素少疾患雖天命有在亦禍出不圖且足下才經於世世常須才況於今日倍相痛惜吾以寡乏忝當大任國恥未雪夙夜憂憤常欲足下同在外藩勠力時事此情未果來書奄至申尋往復不覺涕隕深明足下慷慨之懷深痛足下不遂之志邈然永隔夫復何言謹遣報答并致薄祭望足下降神饗之子混嗣嚴字彭祖祖父奕全椒令明察過人時有遺其酒者始提入門奕遙呵之曰人餉吾兩甖酒其一何故非也檢視之一甖果是水或問奕何以知之笑曰酒重水輕提酒者手有輕重之異故耳在官有惠化及卒市人若喪慈親焉父倫黃門郎嚴少仕州郡歷司徒掾尚書殿中郎殷浩臨揚州請為別駕遷尚書左丞時朝廷崇樹浩以抗擬桓溫溫深以不平浩又引接荒人謀立功於閫外嚴言於浩曰當今時事艱難可謂百六之運使君屈己應務屬當其會聖懷所以日昃匪懈臨朝斤斤每欲深根固本靜邊寧國耳亦豈至私哉而處任者所志不同所見各異人口云云無所不至頃來天時人情良可寒心古人為政防人之口甚於防川間日侍座亦已粗申所懷不審竟當何以鎮之老子云夫唯不爭則萬物不能與之爭此言不可不察也愚意故謂朝廷宜更明授任之方韓彭可專征伐蕭曹守管籥內外之任各有攸司深思廉藺屈申之道平勃相和之義令婉然通順人無間言然後乃可保大定功平濟天下也又觀頃日降附之徒皆人面獸心貪而無親難以義感而聚著都邑雜處人間使君常疲聖體以接之虛府庫以拯之足以疑惑視聽耳浩深納之及哀帝踐阼議所承統時多異議嚴與丹楊尹庾龢議曰順本居正親親不可奪宜繼成皇帝諸儒咸以嚴議為長竟從之隆和元年詔曰天文失度太史雖有禳祈之事猶釁眚屢彰今欲依鴻祀之制於太極殿前庭親執虔肅嚴諫曰鴻祀雖出尚書大傳先儒所不究歷代莫之興承天接神豈可以疑殆行事乎天道無親唯德是輔陛下祗順恭敬留心兆庶可以消災復異皆已蹈而行之德合神明丘禱久矣豈須屈萬乘之尊修雜祀之事君舉必書可不慎歟帝嘉之而止以為揚州大中正嚴不就有司奏免詔特以侯領尚書時東海王奕求海鹽錢塘以水牛牽埭稅取錢直帝初從之嚴諫乃止初帝或施私恩以錢帛賜左右嚴又啟諸所別賜及給廚食皆應減省帝曰左右多困乏故有所賜今通斷之又廚膳宜有減徹思詳具聞嚴多所匡益太和中拜吳興太守加秩中二千石善於宰牧甚得人和餘杭婦人經年荒賣其子以活夫之兄子武康有兄弟二人妻各有孕弟遠行未反遇荒歲不能兩全棄其子而活弟子嚴並褒薦之又甄賞才能之士論者美焉五年以疾去職卒于家三子道民宣城內史靜民散騎侍郎福民太子洗馬皆為孫恩所害羣字敬林嚴叔父也有智局志尚不羈蘇峻入石頭時匡術有寵於峻賓從甚盛羣與從兄愉同行於橫塘遇之愉止與語而羣初不視術術怒欲刃之愉下車抱術曰吾弟發狂卿為我宥之乃獲免後峻平王導保存術嘗因衆坐令術勸羣酒以釋橫塘之憾羣答曰羣非孔子厄同匡人雖陽和布氣鷹化為鳩至於識者猶憎其目導有愧色仕歷中丞性嗜酒導嘗戒之曰卿飲不見酒家覆瓿布日月久糜爛邪答曰公不見肉糟淹更堪久邪嘗與親友書云今年田得七百石秫米不足了麴糱事其耽湎如此卒於官嗣子沈沈字德度有美名何充薦沈於王導曰文思通敏宜登宰門辟丞相司徒掾琅邪王文學並不就從兄坦以裘遺之辭不受坦曰晏平仲儉祀其先人豚肩不掩豆猶狐裘數十年卿復何辭於是受而服之是時沈與魏顗虞球虞存謝奉並為四族之儁沈子廞位至吳興太守廷尉廞子琳之以草書擅名又為吳興太守侍中丁潭張茂丁潭字世康會稽山陰人也祖固吳司徒父彌梁州刺史潭初為郡功曹察孝廉除郎中稍遷丞相西閤祭酒時元帝稱制使各陳時事損益潭上書曰為國者恃人須才蓋二千石長吏是也安可不明簡其才使必允當既得其人使久於其職在官者無苟且居下者有心此為政之較也今之長吏遷轉既數有送迎之費古人三載考績三考黜陟中才處局故難以速成矣夫兵所以防禦未然鎮壓姦凶周雖三聖功成由武今戎戰之世益宜留心簡選精銳以備不虞無事則優其身有難則責其力竊聞今之兵士或私有役使而營陣不充夫為國者由為家也計財力之所任審趨舍之舉動不營難成之功損棄分外之役今兵人未強當審其宜經塗遠舉未獻大捷更使力單財盡而威望挫弱也及帝踐阼拜駙馬都尉奉朝請尚書祠部郎時琅邪王裒始受封帝欲引朝賢為其國上卿將用潭以問中書令賀循循曰郎中令職望清重實宜審授潭清淳貞粹雅有隱正聖明所簡才實宜之遂為琅邪王郎中令會裒薨潭上疏求行終喪禮曰在三之義禮有達制近代已來或隨時降殺宜一匡革以敦于後輒案令文王侯之喪官僚服斬既葬而除今國無繼統喪庭無主臣實陋賤不足當重謬荷首任禮宜終喪詔下博議國子祭酒杜夷議古者諒闇三年不言下及周世稅衰效命春秋之時天子諸侯既葬而除此所謂三代損益禮有不同故三年之喪由此而廢然則漢文之詔合於隨時凡有國者皆宜同也非唯施於帝皇而已案禮殤與無後降於成人有後既葬而除今不得以無後之故而獨不除也愚以丁郎中應除衰麻自宜主祭以終三年太常賀循議禮天子諸侯俱以至尊臨人上下之義君臣之禮自古以來其例一也故禮盛則並全其重禮殺則從其降春秋之事天子諸侯不行三年至於臣為君服亦宜以君為節未有君除而臣服君服而臣除者今法令諸侯卿相官屬為君斬衰既葬而除以令文言之明諸侯不以三年之喪與天子同可知也君若遂服則臣子輕重無應除者也若當皆除無一人獨重之文禮有攝主而無攝重故大功之親主人喪者必為之再祭練祥以大功之服主人三年喪者也苟謂諸侯與天子同制國有嗣王自不全服而人主居喪素服主祭三年不攝吉事以尊令制若當遠迹三代令復舊典不依法令者則侯之服貴賤一例亦不得唯一人論於是詔使除服心喪三年太興三年遷王導驃騎司馬轉中書郎出為廣武將軍東陽太守以清潔見稱徵為太子左衞率不拜成帝踐阼以為散騎常侍侍中蘇峻作亂帝蒙塵於石頭唯潭及侍中鍾雅劉超等隨從不離帝側峻誅以功賜爵永安伯遷大尚書徙廷尉累遷左光祿大夫領國子祭酒本國大中正加散騎常侍康帝即位屢表乞骸骨詔以光祿大夫還第門施行馬祿秩一如舊制給傳詔二人賜錢二十萬牀帳褥席年八十卒贈侍中大夫如故諡曰簡王導嘗謂孔敬康有公才而無公望丁世康有公望而無公才子話位至散騎侍郎張茂字偉康少單貧有志行為鄉里所敬信初起義兵討賊陳斌一郡用全元帝辟為掾屬官有老牛數十將賣之茂曰殺牛有禁買者不得輒屠齒力疲老又不任耕駕是以無用之物收百姓利也帝乃止遷太子右衞率出補吳興內史沈充之反也茂與三子並遇害茂弟盎為周札將軍充討札盎又死之贈茂太僕茂少時夢得大象以問占夢萬推推曰君當為大郡而不善也問其故推曰象者大獸獸者守也故知當得大郡然象以齒焚為人所害果如其言陶回陶回丹楊人也祖基吳交州刺史父抗太子中庶子回辟司空府中軍主簿並不就大將軍王敦命為參軍轉州別駕敦死司徒王導引為從事中郎遷司馬蘇峻之役回與孔坦言於導請早出兵守江口語在坦傳峻將至回復謂亮曰峻知石頭有重戍不敢直下必向小丹楊南道步來宜伏兵要之可一戰而擒亮不從峻果由小丹楊經秣陵迷失道逢郡人執以為鄉導時峻夜行甚無部分亮聞之深悔不從回等之言尋王師敗績回還本縣收合義軍得千餘人並為步軍與陶侃溫嶠等并力攻峻又別破韓晃以功封康樂伯時大賊新平綱維弛廢司徒王導以回有器幹擢補北軍中候俄轉中護軍久之遷征虜將軍吳興太守時人饑穀貴三吳尤甚詔欲聽相鬻賣以拯一時之急回上疏曰當今天下不普荒儉唯獨東土穀價偏貴便相鬻賣聲必遠流北賊聞之將窺疆埸如愚臣意不如開倉廩以振之乃不待報輒便開倉及割府郡軍資數萬斛米以救乏絕由是一境獲全既而下詔并敕會稽吳郡依回振恤二郡賴之在郡四年徵拜領軍將軍加散騎常侍征虜將軍如故回性雅正不憚強禦丹楊尹桓景佞事王導甚為導所昵回常慷慨謂景非正人不宜親狎會熒惑守南斗經旬導語回曰南斗揚州分而熒惑守之吾當遜位以厭此讁回答曰公以明德作相輔弼聖主當親忠貞遠邪佞而與桓景造膝熒惑何由退舍導深愧之咸和二年以疾辭職帝不許徙護軍將軍常侍領軍如故未拜卒年五十一諡曰威四子汪陋隱無忌汪嗣爵位至輔國將軍宣城內史陋冠軍將軍隱少府無忌光祿勳兄弟咸有幹用史臣曰孔愉父子暨丁潭等咸以篠簜之材邀締構之運策名霸府騁足高衢歷試清階遂登顯要外宣政績內盡謀猷罄心力以佐時竭股肱以衞主並能保全名節善始令終而愉高謝百萬之貲辭榮數畝之宅弘止足之分有廉讓之風者矣陶回陳邪佞之宜遠明鬻賣之非宜並補闕弼違良可稱也贊曰愉既公才潭唯公望領軍儒雅平越忠亮君平料敵彭祖弘益茂以象焚羣由匡厄陶回規過言同金石
