body:
  text: 晉書卷七十列傳第四十應詹應詹字思遠汝南南頓人魏侍中璩之孫也詹幼孤為祖母所養年十餘歲祖母又終居喪毀頓杖而後起遂以孝聞家富於財年又稚弱乃請族人共居委以資產情若至親世以此異焉弱冠知名性質素弘雅物雖犯而弗之校以學藝文章稱司徒何劭見之曰君子哉若人初辟公府為太子舍人趙王倫以為征東長史倫誅坐免成都王穎辟為掾時驃騎從事中郎諸葛玫委長沙王奔鄴盛稱之非玫浮躁有才辯臨漳人士無不詣之詹與玫有舊歎曰諸葛仁林何與樂毅之相詭乎卒不見之玫聞甚愧鎮南大將軍劉弘詹之祖舅也請為長史謂之曰君器識弘深後當代老子於荊南矣仍委以軍政弘著績漢南詹之力也遷南平太守王澄為荊州假詹督南平天門武陵三郡軍事及洛陽傾覆詹攘袂流涕勸澄赴援澄使詹為檄詹下筆便成辭義壯烈見者慷慨然竟不能從也天門武陵谿蠻並反詹討降之時政令不一諸蠻怨望並謀背叛詹召蠻酋破銅券與盟由是懷詹數郡無虞其後天下大亂詹境獨全百姓歌之曰亂離既普殆為灰朽僥倖之運賴茲應后歲寒不凋孤境獨守拯我塗炭惠隆丘阜潤同江海恩猶父母鎮南將軍山簡復假詹督五郡軍事會蜀賊杜疇作亂來攻詹郡力戰摧之尋與陶侃破杜弢於長沙賊中金寶溢目詹一無所取唯收圖書莫不歎之元帝假詹建武將軍王敦又上詹監巴東五郡軍事賜爵潁陽鄉侯陳人王沖擁衆荊州素服詹名迎為刺史詹以沖等無賴棄還南平沖亦不怨其得人情如此遷益州刺史領巴東監軍詹之出郡也士庶攀車號泣若戀所生俄拜後軍將軍詹上疏陳便宜曰先王設官使君有常尊臣有定卑上無苟且之志下無覬覦之心下至亡秦罷侯置守本替末陵綱紀廢絕漢興雖未能興復舊典猶雜建侯守故能享年享世殆參古迹今大荒之後制度改創宜因斯會釐正憲則先舉盛德元功以為封首則聖世之化比隆唐虞矣又曰性相近習相遠訓導之風宜慎所好魏正始之間蔚為文林元康以來賤經尚道以玄虛宏放為夷達以儒術清儉為鄙俗永嘉之弊未必不由此也今雖有儒官教養未備非所以長育人材納之軌物也宜修辟雍崇明教義先令國子受訓然後皇儲親臨釋奠則普天尚德率土知方矣元帝雅重其才深納之頃之出補吳國內史以公事免鎮北將軍劉隗出鎮以詹為軍司加散騎常侍累遷光祿勳詹以王敦專制自樹故優游諷詠無所標明及敦作逆明帝問詹計將安出詹厲然慷慨曰陛下宜奮赫斯之威臣等當得負戈前驅庶憑宗廟之靈有征無戰如其不然王室必危帝以詹為都督前鋒軍事護軍將軍假節都督朱雀橋南賊從竹格渡江詹與建威將軍趙胤等擊敗之斬賊率杜發梟首數千級賊平封觀陽縣侯食邑一千六百戶賜絹五千匹上疏讓曰臣聞開國承家光啟土宇唯令德元功乃宜封錫臣雖忝當一隊策無微略勞不汗馬猥以疏賤倫亞親密暫廁被練列勤司勳乞迴謬恩聽其所守不許遷使持節都督江州諸軍事平南將軍江州刺史詹將行上疏曰夫欲用天下之智力者莫若使天下信之也商鞅移木豈禮也哉有由而然自經荒弊綱紀穨陵清直之風既澆糟秕之俗猶在誠宜濯以滄浪之流漉以吞舟之網則幽顯明別於變時雍矣弘濟茲務在乎官人今南北雜錯屬託者無保負之累而輕舉所知此博采所以未精職理所以多闕今凡有所用宜隨其能否而與舉主同乎褒貶則人有慎舉之恭官無廢職之吝昔冀缺有功胥臣蒙先茅之賞子玉敗軍子文受蒍賈之責古既有之今亦宜然漢朝使刺史行部乘傳奏事猶恐不足以辨彰幽明弘宣政道故復有繡衣直指今之艱弊過於往昔宜分遣黃散若中書郎等循行天下觀採得失舉善彈違斷截苟且則人不敢為非矣漢宣帝時二千石有居職修明者則入為公卿其不稱職免官者皆還為平人懲勸必行故歷世長久中間以來遷不足競免不足懼或有進而失意退而得分莅官雖美當以素論降替在職實劣直以舊望登校游談為多少不以實事為先後以此責成臣未見其兆也今宜峻左降舊制可二千石免官三年乃得用長史六年戶口折半道里倍之此法必明使天下知官難得而易失必人慎其職朝無惰官矣都督可課佃二十頃州十頃郡五頃縣三頃皆取文武吏醫卜不得撓亂百姓三臺九府中外諸軍有可減損皆令附農市息末伎道無游人不過一熟豐穰可必然後重居職之俸使祿足以代耕頃大事之後遐邇皆想宏略而寂然未副宜早振綱領肅起羣望時王敦新平人情未安詹撫而懷之莫不得其歡心百姓賴之疾篤與陶侃書曰每憶密計自沔入湘頡頏繾綣齊好斷金子南我東忽然一紀其間事故何所不有足下建功嶠南旋鎮舊楚吾承乏幸會來忝此州圖與足下進共竭節本朝報恩幼主退以申尋平生纏綿舊好豈悟時不我與長即幽冥永言莫從能不慨悵今神州未夷四方多難足下年德並隆功名俱盛宜務建洪範雖休勿休至公至平至謙至順即自天祐之吉無不利人之將死其言也善足下察吾此誠以咸和六年卒時年五十三冊贈鎮南大將軍儀同三司諡曰烈祠以太牢子玄嗣位至散騎侍郎玄弟誕有器榦歷六郡太守龍驤將軍追贈冀州刺史初京兆韋泓喪亂之際親屬遇饑疫並盡客遊洛陽素聞詹名遂依託之詹與分甘共苦情若弟兄遂隨從積年為營伉儷置居宅并薦之於元帝曰自遭喪亂人士易操至乃任運固窮耿介守節者尟矣伏見議郎韋泓年三十八字元量執心清沖才識備濟躬耕隴畝不煩人役靜默居常不豫政事昔年流移來在詹境經寇喪資一身特立短褐不掩形菜蔬不充朝而抗志彌厲不遊非類顏回稱不改其樂泓有其分明公輔亮皇室恢維宇宙四門開闢英彥鳧藻收春華於京輦採秋實於巖藪而泓抱璞荊山未剖和璧若蒙銓召付以列曹必能協隆鼎味緝熙庶績者也帝即辟之自後位至少府卿既受詹生成之惠詹卒遂製朋友之服哭止宿草追趙氏祀程嬰杵臼之義祭詹終身甘卓鄧騫甘卓字季思丹楊人秦丞相茂之後也曾祖寧為吳將祖述仕吳為尚書父昌太子太傅吳平卓退居自守郡命主簿功曹察孝廉州舉秀才為吳王常侍討石冰以功賜爵都亭侯東海王越引為參軍出補離狐令卓見天下大亂棄官東歸前至歷陽與陳敏相遇敏甚悅共圖縱橫之計遂為其子景娶卓女共相結託會周玘唱義密使錢廣攻敏弟昶敏遣卓討廣頓朱雀橋南會廣殺昶玘告丹楊太守顧榮共邀說卓卓素敬服榮且以昶死懷懼良久乃從之遂詐疾迎女斷橋收船南岸共滅敏傳首于京都元帝初渡江授卓前鋒都督揚威將軍歷陽內史其後討周馥征杜弢屢經苦戰多所擒獲以前後功進爵南鄉侯拜豫章太守尋遷湘州刺史將軍如故復進爵于湖侯中興初以邊寇未靜學校陵遲特聽不試孝廉而秀才猶依舊策試卓上疏以為答問損益當須博通古今明達政體必求諸墳索乃堪其舉臣所忝州往遭寇亂學校久替人士流播不得比之餘州策試之由當藉學功謂宜同孝廉例申與期限疏奏朝議不許卓於是精加隱括備禮舉桂陽谷儉為秀才儉辭不獲命州厚禮遣之諸州秀才聞當考試皆憚不行惟儉一人到臺遂不復策試儉恥其州少士乃表求試以高第除中郎儉少有志行寒苦自立博涉經史于時南土凋荒經籍道息儉不能遠求師友唯在家研精雖所得實深未有名譽又恥衒耀取達遂歸終身不仕卒于家卓尋遷安南將軍梁州刺史假節督沔北諸軍鎮襄陽卓外柔內剛為政簡惠善於綏撫估稅悉除市無二價州境所有魚池先責稅卓不收其利皆給貧民西土稱為惠政王敦稱兵遣使告卓卓乃偽許而心不同之及敦升舟而卓不赴使參軍孫雙詣武昌諫止敦敦聞雙言大驚曰甘侯前與吾語云何而更有異正當慮吾危朝廷邪吾今下唯除姦凶耳卿還言之事濟當以甘侯作公雙還報卓卓不能決或說卓且偽許敦待敦至都而討之卓曰昔陳敏之亂吾亦先從後圖而論者謂懼逼而謀之雖吾情本不爾而事實有似心愧之今若復爾誰能明我時湘州刺史譙王承遣主簿鄧騫說卓曰劉大連雖乘權寵非有害於天下也大將軍以其私憾稱兵象魏雖託討亂之名實失天下之望此忠臣義士匡救之時也昔魯連匹夫猶懷蹈海之志況受任方伯位同體國者乎今若因天人之心唱桓文之舉杖大順以掃逆節擁義兵以勤王室斯千載之運不可失也卓笑曰桓文之事豈吾所能至於盡力國難乃其心也當共詳思之參軍李梁說卓曰昔隗日𠁽亂隴右竇融保河西以歸光武今日之事有似於此將軍有重名於天下但當推亡固存坐而待之使大將軍勝方當崇將軍以方面之重如其不勝朝廷必以將軍代之何憂不富貴而釋此廟勝決存亡於一戰邪騫謂梁曰光武創業中國未平故隗日𠁽斷隴右竇融兼河西各據一方鼎足之勢故得文服天子從容顧望及海內已定君臣正位終於隴右傾覆河西入朝何則向之文服義所不容也今將軍之於本朝非竇融之喻也襄陽之於大府非河西之固也且人臣之義安忍國難而不陳力何以北面於天子邪使大將軍平劉隗還武昌增石城之守絕荊湘之粟將軍安歸乎勢在人手而曰我處廟勝未之聞也卓尚持疑未決騫又謂卓曰今既不義舉又不承大將軍檄此必至之禍愚智所見也且議者之所難以彼強我弱是不量虛實者也今大將軍兵不過萬餘其留者不能五千而將軍見衆既倍之矣將軍威名天下所聞也此府精銳戰勝之兵也擁強衆藉威名杖節而行豈王含所能御哉遡流之衆勢不自救將軍之舉武昌若摧枯拉朽何所顧慮乎武昌既定據其軍實鎮撫二州施惠士卒使還者如歸此呂蒙所以克敵也如是大將軍可不戰而自潰今釋必勝之策安坐以待危亡不可言知計矣願將軍熟慮之時敦以卓不至慮在後為變遣參軍樂道融苦要卓俱下道融本欲背敦因說卓襲之語在融傳卓既素不欲從敦得道融說遂決曰吾本意也乃與巴東監軍柳純南平太守夏侯承宜都太守譚該等十餘人俱露檄遠近陳敦肆逆率所統致討遣參軍司馬讚孫雙奉表詣臺參軍羅英至廣州與陶侃剋期參軍鄧騫虞沖至長沙令譙王承堅守征西將軍戴若思在江西先得卓書表上之臺內皆稱萬歲武昌大驚傳卓軍至人皆奔散詔書遷卓為鎮南大將軍侍中都督荊梁二州諸軍事荊州牧梁州刺史如故陶侃得卓信即遣參軍高寶率兵下卓雖懷義正而性不果毅且年老多疑計慮猶豫軍次豬口累旬不前敦大懼遣卓兄子行參軍卬求和謝卓曰君此自是臣節不相責也吾家計急不得不爾想便旋軍襄陽當更結好時王師敗績敦求臺騶虞幡駐卓卓聞周顗戴若思遇害流涕謂卬曰吾之所憂正謂今日每得朝廷人書常以胡寇為先不悟忽有蕭牆之禍且使聖上元吉太子無恙吾臨敦上流亦未敢便危社稷吾適徑據武昌敦勢逼必劫天子以絕四海之望不如還襄陽更思後圖即命旋軍都尉秦康說卓曰今分兵取敦不難但斷彭澤上下不得相赴自然離散可一戰擒也將軍既有忠節中道而廢更為敗軍將恐將軍之下亦各便求西還不可得守也卓不能從樂道融亦日夜勸卓速下卓性先寬和忽便強塞徑還襄陽意氣騷擾舉動失常自照鏡不見其頭視庭樹而頭在樹上心甚惡之其家金櫃鳴聲似槌鏡清而悲巫云金櫃將離是以悲鳴主簿何無忌及家人皆勸令自警卓轉更很愎聞諫輒怒方散兵使大佃而不為備功曹榮建固諫不納襄陽太守周慮等密承敦意知卓無備詐言湖中多魚勸卓遣左右皆捕魚乃襲害卓于寢傳首于敦四子散騎郎蕃等皆被害太寧中追贈驃騎將軍諡曰敬鄧騫字長真長沙人少有志氣為鄉鄰所重常推誠行己能以正直全於多難之時刺史譙王承命為主簿便說甘卓卓留為參軍欲與同行以母老辭卓而反承為魏所敗以虞悝兄弟為承黨盡誅之而求騫甚急鄉人皆為之懼騫笑曰欲用我耳彼新得州多殺忠良是其求賢之時豈以行人為罪乃往詣喜曰君所謂古之解揚也以為別駕騫有節操忠信兼識量弘遠善與人交久而益敬太尉庾亮稱之以為長者歷武陵始興太守遷大司農卒於官卞壼從父兄敦卞壼字望之濟陰冤句人也祖統琅邪內史父粹以清辯鑒察稱兄弟六人並登宰府世稱卞氏六龍玄仁無雙玄仁粹字也弟裒嘗忤其郡將郡將怒訐其門內之私粹遂以不訓見譏議陵遲積年惠帝初為尚書郎楊駿執政人多附會而粹正直不阿及駿誅超拜右丞封成陽子稍遷至右軍將軍張華之誅粹以華壻免官齊王冏輔政為侍中中書令進爵為公及長沙王專權粹立朝正色忌而害之初粹如廁見物若兩眼俄而難壼弱冠有名譽司兗二州齊王冏辟皆不就遇家禍還鄉里永嘉中除著作郎襲父爵征東將軍周馥請為從事中郎不就遭本州傾覆東依妻兄徐州刺史裴盾盾以壼行廣陵相元帝鎮建鄴召為從事中郎委以選舉甚見親杖出為明帝東中郎長史遭繼母憂既葬起復舊職累辭不就元帝遣中使敦逼壼牋自陳曰壼天性狷狹不能和俗退以情事欲畢志家門亡父往為中書令時壼蒙大例望門見辟信其所執得不祗就門戶遇禍迸竄易名得存視息私志有素加嬰極難流寄蘭陵為苟晞所召恐見逼迫依下邳裴盾又見假授思暫之郡規得託身尋蒙見召為從事中郎豈曰貪榮直欲自致規暫恭命行當乞退屬華軼之難不敢自陳軼既梟懸壼亦嬰病具自歸聞未蒙恕遣世子北征選寵顯望復以無施忝充元佐榮則榮矣實非素懷顧以命重人輕不敢辭憚聞西臺召壼為尚書郎實欲因此以避賢路未及陳誠奄丁窮罰壼年九歲為先母弟表所見孤背十二蒙亡母張所見覆育壼以陋賤不能榮親家產屢空養道多闕存無歡娛終不備禮拊心永恨五內抽割於公無效如彼私情艱苦如此實無情顏昧冒榮進若廢壼一人江北便有傾危之慮壼居事之日功績以隆者誠不得私其身今東中郎岐嶷自然神明日茂軍司馬諸參佐並以明德宣力王事壼之去留曾無損益賀循謝端顧景丁琛傅晞等皆荷恩命高枕家門壼委質二府漸冉五載考效則不能已彰論心則頻累恭順柰何哀孤之日不見愍恕哉帝以其辭苦不奪其志服闋為世子師壼前後居師佐之任盡匡輔之節一府貴而憚焉中興建補太子中庶子轉散騎常侍侍講東宮遷太子詹事以公事免尋復職轉御史中丞忠於事上權貴屏跡時淮南小中正王式繼母前夫終更適式父式父終喪服訖議還前夫家前夫家亦有繼子奉養至終遂合葬於前夫式自云父臨終母求去父許諾於是制出母齊衰朞壼奏曰就如式父臨終許諾必也正名依禮為無所據若夫有命須顯七出之責當存時棄之無緣以絕義之妻留家制服若式父臨困謬亂使去留自由者此必為相要以非禮則存亡無所得從式宜正之以禮魏顆父命不從其亂陳乾昔欲以二婢子殉其子以非禮不從春秋禮記善之並以妾媵猶正以禮況其母乎式母於夫生事奉終非為既絕之妻夫亡制服不為無義之婦自云守節非為更嫁離絕之斷在夫沒之後夫之既沒是其從子之日而式以為出母此母以子出也致使存無所容居沒無所託也寄命於他人之門埋尸於無名之冢若式父亡後母尋沒於式家必不以為出母明矣許諾之命一耳以為母于同居之時至沒前子之門而不以為母此為制離絕於二居裁出否於意斷離絕之斷非式而誰假使二門之子皆此母之生母戀前子求去求絕非禮於後家還反又非禮於前門去不可去還不可還則為無寄之人也式必內盡匡諫外極防閑不絕明矣何至守不移於至親略情禮於假繼乎繼母如母聖人之教式為國士閨門之內犯禮違義開闢未有於父則無追亡之善於母則無孝敬之道存則去留自由亡則合葬路人可謂生事不以禮死葬不以禮者也虧損世教不可以居人倫詮正之任案侍中司徒臨潁公組敷宣五教實在任人而含容違禮曾不貶黜揚州大中正侍中平望亭侯曄淮南大中正散騎侍郎弘顯執邦論朝野取信曾不能率禮正違崇孝敬之教並為不勝其任請以見事免組曄弘官大鴻臚削爵土廷尉結罪疏奏詔特原組等式付鄉邑清議廢棄終身壼遷吏部尚書王含之難加中軍將軍含滅以功封建興縣公尋遷領軍將軍明帝不豫領尚書令與王導等俱受顧命輔幼主復拜右將軍加給事中尚書令帝崩成帝即位羣臣進璽司徒王導以疾不至壼正色於朝曰王公豈社稷之臣邪大行在殯嗣皇未立寧是人臣辭疾之時導聞之乃輿疾而至皇太后臨朝壼與庾亮對直省中共參機要時召南陽樂謨為郡中正潁川庾怡為廷尉評謨怡各稱父命不就壼奏曰人無非父而生職無非事而立有父必有命居職必有悔有家各私其子此為王者無人職不軌物官不立政如此則先聖之言廢五教之訓塞君臣之道散上下之化替矣樂廣以平夷稱庾珉以忠篤顯受寵聖世身非己有況及後嗣而可專哉所居之職若順夫羣心則戰戍者之父母皆當以命子不以處也若順謨父之意則人皆不為郡中正人倫廢矣順怡父之意人皆不為獄官則刑辟息矣凡如是者其可聽歟若不可聽何以許謨怡之得稱父命乎此為謨以名父子可以虧法怡是親戚可以自專以此二塗服人示世臣所未悟也宜一切班下不得以私廢公絕其表疏以為永制朝議以為然謨怡不得已各居所職是時王導稱疾不朝而私送車騎將軍郗鑒壼奏以導虧法從私無大臣之節御史中丞鍾雅阿撓王典不加準繩並請免官雖事寢不行舉朝震肅壼斷裁切直不畏強禦皆此類也壼榦實當官以褒貶為己任勤於吏事欲軌正督世不肯苟同時好然性不弘裕才不副意故為諸名士所少而無卓爾優譽明帝深器之於諸大臣而最任職阮孚每謂之曰卿無閑泰常如含瓦石不亦勞乎壼曰諸君以道德恢弘風流相尚執鄙吝者非壼而誰時貴游子弟多慕王澄謝鯤為達壼厲色於朝曰悖禮傷教罪莫斯甚中朝傾覆實由於此欲奏推之王導庾亮不從乃止然而聞者莫不折節時王導以勳德輔政成帝每幸其宅嘗拜導婦曹氏侍中孔坦密表不宜拜導聞之曰王茂弘駑痾耳若卞望之之巖巖刁玄亮之察察戴若思之峰岠當敢爾邪壼廉潔儉素居甚貧約息當婚詔特賜錢五十萬固辭不受後患面創累乞解職拜光祿大夫加散騎常侍時庾亮將徵蘇峻言於朝曰峻狼子野心終必為亂今日徵之縱不順命為禍猶淺若復經年為惡滋蔓不可復制此是朝錯勸漢景帝早削七國事也當時議者無以易之壼固爭謂亮曰峻擁強兵多藏無賴且逼近京邑路不終朝一旦有變易為蹉跌宜深思遠慮恐未可倉卒亮不納壼知必敗與平南將軍溫嶠書曰元規召峻意定懷此於邑溫生足下柰此事何吾今所慮是國之大事且峻已出狂意而召之更速必縱其羣惡以向朝廷朝廷威力誠桓桓交須接鋒履刃尚不知便可即擒不王公亦同此情吾與之爭甚懇切不能如之何本出足下為外藩任而今恨出足下在外若卿在內俱諫必當相從今內外戒嚴四方有備峻凶狂必無所至耳恐不能使無傷如何壼司馬任台勸壼宜畜良馬以備不虞壼笑曰以順逆論之理無不濟若萬一不然豈須馬哉峻果稱兵壼復為尚書令右將軍領右衞將軍餘官如故峻至東陵口詔以壼都督大桁東諸軍事假節復加領軍將軍給事中壼率郭默趙胤等與峻大戰於西陵為峻所破壼與鍾雅皆退還死傷者以千數壼雅並還節詣闕謝罪峻進攻青溪壼與諸軍距擊不能禁賊放火燒宮寺六軍敗績壼時發背創猶未合力疾而戰率厲散衆及左右吏數百人攻賊麾下苦戰遂死之時年四十八二子眕盱見父沒相隨赴賊同時見害峻平朝議贈壼左光祿大夫加散騎常侍尚書郎弘訥議以為死事之臣古今所重卞令忠貞之節當書于竹帛今之追贈實未副衆望謂宜加鼎司之號以旌忠烈之勳司徒王導見議進贈驃騎將軍加侍中訥重議曰夫事親莫大於孝事君莫尚於忠唯孝也故能盡敬竭誠唯忠也故能見危授命此在三之大節臣子之極行也案壼委質三朝盡規翼亮遭世險難存亡以之受顧託之重居端右之任擁衞至尊則有保傅之恩正色在朝則有匪躬之節賊峻造逆勠力致討身當矢旝再對賊鋒父子并命可謂破家為國守死勤事昔許男疾終猶蒙二等之贈況壼伏節國難者乎夫賞疑從重況在不疑謂可上準許穆下同嵇紹則允合典謨克厭衆望於是改贈壼侍中驃騎將軍開府儀同三司諡曰忠貞祠以太牢贈世子眕散騎侍郎眕弟盱奉車都尉眕母裴氏撫二子尸哭曰父為忠臣汝為孝子夫何恨乎徵士翟湯聞之歎曰父死於君子死於父忠孝之道萃于一門眕子誕嗣咸康六年成帝追思壼下詔曰壼立朝忠恪喪身兇寇所封懸遠租秩薄少妻息不贍以為慨然可給實口廩其後盜發壼墓尸僵鬢髮蒼白面如生兩手悉拳爪甲穿達手背安帝詔給錢十萬以修塋兆壼第三子瞻位至廣州刺史瞻弟眈尚書郎敦字仲仁父俊清真有檢識以名理著稱其鄉人郤詵恃才陵俊兄弟俊等亦以門盛輕詵相視如讎詵以楊駿故吏被繫俊時為尚書郎案其獄詵懼不免俊平心斷決正之詵卒以免而猶不悛後為左丞復奏陷卞氏俊歷位汝南相廷尉卿敦弱冠仕州郡辟司空府稍遷太子舍人尚書郎朝士多稱之東海王越聞召以為主簿王彌逼洛敦及胡毋輔之勸越擊王彌而王衍潘滔共執不聽敦庭爭苦至衆咸壯之出補汝南內史元帝之為鎮東請為軍諮祭酒不就征南將軍山簡以為司馬尋而王如杜曾相繼為亂簡乃使敦監沔北七郡軍事振威將軍領江夏相戍夏口敦攻討沔中皆平既而杜弢寇湘中加敦征討大都督伐弢有功賜爵安陵亭侯鎮東大將軍王敦請為軍司中興建拜太子左衞率時石勒侵逼淮泗帝備求良將可以式遏邊境者公卿舉敦除征虜將軍徐州刺史鎮泗口及勒寇彭城敦自度力不能支與征北將軍王邃退保盱眙賊勢遂張淮北諸郡多為所陷竟以畏懦貶秩三等為鷹揚將軍徵拜大司農王敦表為征虜將軍都督石頭軍事明帝之討王敦也以為鎮南將軍假節事平更拜尚書以功封益陽侯徙光祿勳出為都督安南將軍湘州刺史假節尋進征南將軍固辭不拜蘇峻反溫嶠庾亮移檄征鎮同赴京師敦擁兵不下又不給軍糧唯遣督護荀璲領數百人隨大軍而已時朝野莫不怪歎獨陶侃亦切齒忿之峻平侃奏敦阻軍顧望不赴國難無大臣之節請檻車收付廷尉丞相王導以喪亂之後宜加寬宥轉安南將軍廣州刺史病不之職徵為光祿大夫領少府敦既不討蘇峻常懷愧恥名論自此虧矣尋以憂卒追贈本官加散騎常侍諡曰敬子滔嗣劉超劉超字世瑜琅邪臨沂人漢城陽景王章之後也章七世孫封臨沂縣慈鄉侯子孫因家焉父和為琅邪國上軍將軍超少有志尚為縣小吏稍遷琅邪國記室掾以忠謹清慎為元帝所拔親侍左右遂從渡江轉安東府舍人專掌文檄相府建又為舍人于時天下擾亂伐叛討貳超自以職在近密而書跡與帝手筆相類乃絕不與人交書時出休沐閉門不通賓客由是漸得親密以左右勤勞賜爵原鄉亭侯食邑七百戶轉行參軍中興建為中書舍人拜騎都尉奉朝請時臺閣初建庶績未康超職典文翰而畏慎靜密彌見親待加以處身清苦衣不重帛家無儋石之儲每帝所賜皆固辭曰凡陋小臣橫竊賞賜無德而祿殃咎足懼帝嘉之不奪其志尋出補句容令推誠於物為百姓所懷常年賦稅主者常自四出結評百姓家貲至超但作大函邨別付之使各自書家產投函中訖送還縣百姓依實投上課輸所入有踰常年入為中書通事郎以父憂去官既葬屬王敦稱兵詔超復職又領安東上將軍尋六軍敗散唯超案兵直衞帝感之遣歸終喪禮及錢鳳構禍超招合義士從明帝征鳳事平以功封零陵伯超家貧妻子不贍帝手詔褒之賜以魚米超辭不受超後須純色牛市不可得啟買官外廄牛詔便以賜之出為義興太守未幾徵拜中書侍郎拜受往還朝廷莫有知者會帝崩穆后臨朝遷射聲校尉時軍校無兵義興人多義隨超因統其衆以宿衞號為君子營咸和初遭母憂去官衰服不離身朝夕號泣朔望輒步至墓所哀感路人及蘇峻謀逆超代趙胤為左衞將軍時京邑大亂朝士多遣家人入東避難義興故吏欲迎超家而超不聽盡以妻孥入處宮內及王師敗績王導以超為右衞將軍親侍成帝屬太后崩軍衞禮章損闕超躬率將士奉營山陵峻遷車駕石頭時天大雨道路沈陷超與侍中鍾雅步侍左右賊給馬不肯騎而悲哀慷慨峻聞之甚不平然未敢加害而以其所親信許方等補司馬督殿中監外託宿衞內實防禦超等時饑饉米貴峻等問遺一無所受繾綣朝夕臣節愈恭帝時年八歲雖幽厄之中超猶啟授孝經論語溫嶠等至峻猜忌朝士而超為帝所親遇疑之尤甚後王導出奔超與懷德令匡術建康令管旆等密謀將欲奉帝而出未及期事泄峻使任讓將兵入收超及鍾雅帝抱持悲泣曰還我侍中右衞任讓不奉詔因害之及峻平任讓與陶侃有舊侃欲特不誅之乃請於帝帝曰讓是殺我侍中右衞者不可宥由是遂誅讓及超將改葬帝痛念之不已詔遷高顯近地葬之使出入得瞻望其墓追贈衞尉諡曰忠超天性謙慎歷事三帝在機密並蒙親遇而不敢因寵驕諂故士人皆安而敬之子訥嗣謹飭有石慶之風歷中書侍郎下邳內史訥子享亦清慎為散騎郎鍾雅鍾雅字彥冑潁川長社人也父虫念公府掾早終雅少孤好學有才志舉四行除汝陽令入為佐著作郎母憂去官服闋復職東海王越請為參軍遷尚書郎避亂東渡元帝以為丞相記室參軍遷臨淮內史振威將軍頃之徵拜散騎侍郎轉尚書右丞時有事於太廟雅奏曰陛下繼承世數於京兆府君為玄孫而今祝文稱曾孫恐此因循之失宜見改正又禮祖之昆弟從祖父也景皇帝自以功德為世宗不以伯祖而登廟亦宜除伯祖之文詔曰禮事宗廟自曾孫已下皆稱曾孫此非因循之失也義取於重孫可歷世共其名無所改也稱伯祖不安如所奏轉北軍中候大將軍王敦請為從事中郎補宣城內史錢鳳作逆加廣武將軍率衆屯青弋時廣德縣人周玘為鳳起兵攻雅雅退據涇縣收合士庶討玘斬之鳳平徵拜尚書左丞明帝崩遷御史中丞時國喪未朞而尚書梅陶私奏女妓雅劾奏曰臣聞放勛之殂八音遏密雖在凡庶猶能三載自茲以來歷代所同肅祖明皇帝崩背萬國當朞來月聖主縞素泣血臨朝百僚慘愴動無歡容陶無大臣忠慕之節家庭侈靡聲妓紛葩絲竹之音流聞衢路宜加放黜以整王憲請下司徒論正清議穆后臨朝特原不問雅直法繩違百僚皆憚之北中郎將劉遐卒遐部曲作亂詔郭默討之以雅監征討軍事假節事平拜驍騎將軍蘇峻之難詔雅為前鋒監軍假節領精勇千人以距峻雅以兵少不敢擊退還拜侍中尋王師敗績雅與劉超並侍衞天子或謂雅曰見可而進知難而退古之道也君性亮直必不容於寇讎何不隨時之宜而坐待其斃雅曰國亂不能匡君危不能濟各遜遁以求免吾懼董狐執簡而至矣庾亮臨去顧謂雅曰後事深以相委雅曰棟折榱崩誰之責也亮曰今日之事不容復言卿當期剋復之效耳雅曰想足下不愧荀林父耳及峻逼遷車駕幸石頭雅超流涕步從明年並為賊所害賊平追贈光祿勳其後以家貧詔賜布帛百匹子誕位至中軍參軍早卒史臣曰應詹行業聿修文史足用入居列位則嘉謀屢陳出撫藩條則惠政斯洽甘卓伐暴寧亂庸績克宣作鎮扞城威略具舉及兇渠犯順志在勤王既而人撓其謀天奪其鑒疑留不斷自取誅夷卞壼束帶立朝以匡正為己任褰裳衞主蹈忠義以成名遂使臣死於君子死於父惟忠與孝萃其一門古稱社稷之臣忠貞之謂矣劉超勤肅奉上鍾雅正直當官屬巨猾滔天幼君危逼乃崎嶇寇難契闊艱虞匪石為心寒松比操貞軌皆沒亮迹雙升雖高赫在難彌恭荀息繼之以死方之二子曾何足云贊曰卓臨南服詹莅西州政刑克舉威惠兼修應嗟運促甘斃疑留望之徇義處死為易惟子惟臣名節斯寄鍾劉入仕忠貞攸履竭其股肱繼之以死
