body:
  text: 晉書卷八十三列傳第五十三顧和顧和字君孝侍中衆之族子也曾祖容吳荊州刺史祖相臨海太守和二歲喪父總角便有清操族叔榮雅重之曰此吾家麒麟興吾宗者必此子也時宗人球亦有令聞為州別駕榮謂之曰卿速步君孝超卿矣王導為揚州辟從事月旦當朝未入停車門外周顗遇之和方擇蝨夷然不動顗既過顧指和心曰此中何所有和徐應曰此中最是難測地顗入謂導曰卿州吏中有一令僕才導亦以為然和嘗詣導導小極對之疲睡和欲叩會之因謂同坐曰昔每聞族叔元公道公叶贊中宗保全江表體小不安令人喘息導覺之謂和曰卿珪璋特達機警有鋒不徒東南之美實為海內之俊由是遂知名既而導遣八部從事之部和為下傳還同時俱見諸從事各言二千石官長得失和獨無言導問和卿何所聞答曰明公作輔寧使網漏吞舟何緣採聽風聞以察察為政導咨嗟稱善累遷司徒掾時東海王沖為長水校尉妙選僚屬以沛國劉耽為司馬和為主簿永昌初除司徒左曹掾太寧初王敦請為主簿遷太子舍人車騎參軍護軍長史王導為揚州請為別駕所歷皆著稱遷散騎侍郎尚書吏部司空郗鑒請為長史領晉陵太守咸康初拜御史中丞劾奏尚書左丞戴抗贓汙百萬付法議罪并免尚書傅玩郎劉傭官百僚憚之遷侍中初中興東遷舊章多闕而冕旒飾以翡翠珊瑚及雜珠等和奏舊冕十有二旒皆用玉珠今用雜珠等非禮若不能用玉可用白琁珠成帝於是始下太常改之先是帝以保母周氏有阿保之勞欲假其名號內外皆奉詔和獨上疏以為周保祐聖躬不遺其勳第舍供給擬於戚屬恩澤所加已為過隆若假名號記籍未見明比惟漢靈帝以乳母趙嬈為平氏君此末代之私恩非先代之令典且君舉必書將軌物垂則書而不法後嗣何觀帝從之轉吏部尚書頻徙領軍將軍太常卿國子祭酒康帝即位將祀南北郊和議以為車駕宜親行帝從之皆躬親行禮遷尚書僕射以母老固辭詔書敕喻特聽暮出朝還其見優遇如此尋朝議以端右之副不宜處外更拜銀青光祿大夫領國子祭酒頃之母憂去職居喪以孝聞既練衞將軍褚裒上疏薦和起為尚書令遣散騎郎喻旨和每見逼促輒號咷慟絕謂所親曰古人或有釋其憂服以祗王命蓋以才足幹時故不得不體國徇義吾在常日猶不如人況今中心荒亂將何以補於萬分祇足以示輕忘孝道貽素冠之議耳帝又下詔曰百揆務殷端右總要而曠職經久甚以悒然昔先朝政道休明中夏隆盛山賈諸公皆釋服從時不獲遂其情禮況今日艱難百王之弊尚書令禮已過祥練豈得聽不赴急疾而遂罔極之情乎和表疏十餘上遂不起服闋然後視職時南中郎將謝尚領宣城內史收涇令陳幹殺之有司以尚違法糾黜詔原之和重奏曰尚先劾姦贓罪入甲戌赦聽自首減死而尚近表云幹包藏姦猾輒收行刑幹事狀自郡非犯軍戎不由都督案尚蒙親賢之舉荷文武之任不能為國惜體平心聽斷內挾小憾肆其威虐遠近怪愕莫不解體尚忝外屬宥之有典至於下吏宜正刑辟尚皇太后舅故寢其奏時汝南王統江夏公衞崇並為庶母制服三年和乃奏曰禮所以軌物成教故有國家者莫不崇正明本以一其統斯人倫之紀不二之道也為人後者降其所出奪天屬之性顯至公之義降殺節文著于周典案汝南王統為庶母居廬服重江夏公衞崇本由疏屬開國之緒近喪所生復行重制違冒禮度肆其私情閭閻許其過厚談者莫以為非則政道陵遲由乎禮廢憲章穨替始於容違若弗糾正無以齊物皆可下太常奪服若不祗王命應加貶黜詔從之和居任多所獻納雖權臣不苟阿撓永和七年以疾篤辭位拜左光祿大夫儀同三司加散騎常侍尚書令如故其年卒年六十四追贈侍中司空諡曰穆子淳歷尚書吏部郎給事黃門侍郎左衞將軍袁瓌子喬喬孫山松瓌弟猷從祖準準孫耽耽子質質子湛豹袁瓌字山甫陳郡陽夏人魏郎中令渙之曾孫也祖父並早卒瓌與弟猷欲奉母避亂求為江淮間縣拜呂令轉江都因南渡元帝以為丹楊令中興建拜奉朝請遷治書御史時東海王越尸既為石勒所焚妃裴氏求招魂葬越朝廷疑之瓌與博士傅純議以為招魂葬是謂埋神不可從也帝然之雖許裴氏招魂葬越遂下詔禁之尋除廬江太守大將軍王敦引為諮議參軍俄為臨川太守敦平為鎮南將軍卞敦軍司尋自解還都游於會稽蘇峻之難與王舒共起義軍以功封長合鄉侯徵補散騎常侍徙大司農尋除國子祭酒頃之加散騎常侍于時喪亂之後禮教陵遲瓌上疏曰臣聞先王之教也崇典訓以弘遠代明禮樂以流後生所以導萬物之性暢為善之道也宗周既興文史載煥端委垂於南蠻頌聲溢於四海故延州聘魯聞雅而歎韓起適魯觀易而美何者立人之道於斯為首孔子恂恂以教洙泗孟軻係之誨誘無倦是以仁義之聲于今猶存禮讓之節時或有之疇昔皇運陵替喪亂屢臻儒林之教漸穨庠序之禮有闕國學索然墳籍莫啟有心之徒抱志無由昔魏武帝身親介冑務在武功猶尚廢鞍覽卷投戈吟詠況今陛下以聖明臨朝百官以虔恭莅事朝野無虞江外謐靜如之何泱泱之風漠然無聞洋洋之美墜於聖世乎古人有言詩書義之府禮樂德之則實宜留心經籍闡明學義使諷誦之音盈於京室味道之賢是則是詠豈不盛哉若得給其宅地備其學徒博士僚屬粗有其官則臣之願也疏奏成帝從之國學之興自瓌始也以年在懸車上疏告老尋卒追贈光祿大夫諡曰恭子喬嗣喬字彥叔初拜佐著作郎輔國將軍桓溫請為司馬除司徒左西屬不就拜尚書郎桓溫鎮京口復引為司馬領廣陵相初喬與褚裒友善及康獻皇后臨朝喬與裒書曰皇太后踐登正阼臨御皇朝將軍之於國外姓之太上皇也至於皇子近屬咸有揖讓之禮而況策名人臣而交媟人父天性攸尊亦宜體國而重矣故友之好請於此辭染絲之變墨翟致懷岐路之感楊朱興歎況與將軍游處少長雖世譽先後而臭味同歸也平昔之交與禮數而降箕踞之歡隨時事而替雖欲虛詠濠肆脫落儀制其能得乎來物無停變化遷代豈惟寸晷事亦有之夫御器者神制衆以約願將軍怡情無事以理勝為任親杖賢達以納善為大執筆惆悵不能自盡論者以為得禮遷安西諮議參軍長沙相不拜尋督沔中諸戍江夏隨義陽三郡軍事建武將軍江夏相時桓溫謀伐蜀衆以為不可喬勸溫曰夫經略大事故非常情所具智者了於胸心然後舉無遺算耳今天下之難二寇而已蜀雖險固方胡為弱將欲除之先從易者今泝流萬里經歷天險彼或有備不必可克然蜀人自以斗絕一方恃其完固不修攻戰之具若以精卒一萬輕軍速進比彼聞之我已入其險要李勢君臣不過自力一戰擒之必矣論者恐大軍既西胡必闚覦此又似是而非何者胡聞萬里征伐以為內有重備必不敢動縱復越逸江渚諸軍足以守境此無憂矣蜀土富實號稱天府昔諸葛武侯欲以抗衡中國今誠不能為害然勢據上流易為寇盜若襲而取之者有其人衆此國之大利也溫從之使喬以江夏相領二千人為軍鋒師次彭模去賊已近議者欲兩道並進以分賊勢喬曰今深入萬里置之死地士無反顧之心所謂人自為戰者也今分為兩軍軍力不一萬一偏敗則大事去矣不如全軍而進棄去釜甑齎三日糧勝可必矣溫以為然即一時俱進去成都十里與賊大戰前鋒失利喬軍亦退矢及馬首左右失色喬因麾而進聲氣愈厲遂大破之長驅至成都李勢既降勢將鄧定隗文以其屬反衆各萬餘溫自擊定喬擊文破之進號龍驤將軍封湘西伯尋卒年三十六溫甚悼惜之追贈益州刺史諡曰簡喬博學有文才注論語及詩并諸文筆皆行於世子方平嗣亦以軌素自立辟大司馬掾歷義興琅邪太守卒子山松嗣山松少有才名博學有文章著後漢書百篇衿情秀遠善音樂舊歌有行路難曲辭頗疏質山松好之乃文其辭句婉其節制每因酣醉縱歌之聽者莫不流涕初羊曇善唱樂桓伊能挽歌及山松行路難繼之時人謂之三絕時張湛好於齋前種松柏而山松每出游好令左右作挽歌人謂湛屋下陳尸山松道上行殯山松歷顯位為吳郡太守孫恩作亂山松守滬瀆城陷被害猷字申甫少與瓌齊名代瓌為呂令復相繼為江都由是俱渡江瓌為丹楊猷為武康兄弟列宰名邑論者美之歷位侍中衞尉卿猷孫宏見文苑傳準字孝尼以儒學知名注喪服經官至給事中準子沖字景玄光祿勳沖子耽耽字彥道少有才氣俶儻不羈為士類所稱桓溫少時游于博徒資產俱盡尚有負進思自振之方莫知所出欲求濟於耽而耽在艱試以告焉耽略無難色遂變服懷布帽隨溫與債主戲耽素有藝名債者聞之而不相識謂之曰卿當不辦作袁彥道也遂就局十萬一擲直上百萬耽投馬絕叫探布帽擲地曰竟識袁彥道不其通脫若此蘇峻之役王導引為參軍隨導在石頭初路永匡術賈寧等皆峻心腹聞祖約奔敗懼事不立迭說峻誅大臣峻既不納永等慮必敗陰結於導導使耽潛說路永使歸順峻平封秭歸男拜建威將軍歷陽太守咸康初石季龍游騎十餘匹至歷陽耽上列不言騎少時胡寇強盛朝野危懼王導以宰輔之重請自討之既而賊騎不多又已退散導止不行朝廷以耽失於輕妄黜之尋復為導從事中郎方加大任會卒時年二十五子質質字道和自渙至質五世並以道素繼業惟其父耽以雄豪著及質又以孝行稱官歷琅邪內史東陽太守質子湛湛字士深少有操植以沖粹自立而無文華故不為流俗所重時謝混為僕射范泰贈湛及混詩云亦有後出雋離羣頗鶱翥湛恨而不答自中書令為僕射左光祿大夫晉寧男卒於官湛弟豹豹字士蔚博學善文辭有經國材為劉裕所知後為太尉長史丹楊尹卒江逌從弟灌灌子績江逌字道載陳留圉人也曾祖蕤譙郡太守祖允蕪湖令父濟安東參軍逌少孤與從弟灌共居甚相友悌由是獲當時之譽避蘇峻之亂屏居臨海絕棄人事翦茅結宇耽翫載籍有終焉之志本州辟從事除佐著作郎並不就征北將軍蔡謨命為參軍何充復引為驃騎功曹以家貧求試守為太末令縣界深山中有亡命數百家恃險為阻前後守宰莫能平逌到官召其魁帥厚加撫接諭以禍福旬月之間襁負而至朝廷嘉之州檄為治中轉別駕遷吳令中軍將軍殷浩將謀北伐請為諮議參軍浩甚重之遷長史浩方修復洛陽經營荒梗逌為上佐甚有匡弼之益軍中書檄皆以委逌時羌及丁零叛浩軍震懼姚襄去浩十里結營以逼浩浩令逌擊之逌進兵至襄營謂將校曰今兵非不精而衆少於羌且其塹柵甚固難與校力吾當以計破之乃取數百雞以長繩連之繫火於足羣雞駭散飛集襄營襄營火發因其亂隨而擊之襄遂小敗及桓溫奏廢浩佐吏逌遂免頃之除中書郎升平中遷吏部郎長兼侍中穆帝將修後池起閣道逌上疏曰臣聞王者處萬乘之極享富有之大必顯明制度以表崇高盛其文物以殊貴賤建靈臺浚辟雍立宮館設苑囿所以弘於皇之尊彰臨下之義前聖創其禮後代遵其矩當代之君咸營斯事周宣興百堵之作鴻雁歌安宅之歡魯僖修泮水之宮採芹有思樂之頌蓋上之有為非予欲是盈下之奉上不以劬勞為勤此自古之令典軌儀之大式也夫理無常然三正相詭司牧之體與世而移致飾則素故賁返於剝有大必盈則受之以謙損上益下順兆庶之悅享以二簋用至約之義是以唐虞流化於茅茨夏禹垂美於卑室過儉之陋非中庸之制然三聖行之以致至道漢高祖當營建之始怒宮庫之壯孝文處既富之世愛十家之產亦以播惠當時著稱來葉今者二虜未殄神州荒蕪舉江左之衆經略艱難漕楊越之粟北餽河洛兵不獲戢運戍悠遠倉庫內罄百姓力竭加春夏以來水旱為害遠近之收普減常年財傷人困大役未已軍國之用無所取給方之往代豐弊相懸損之又損實在今日伏惟陛下聖質天縱凝曠清虛闡日新之盛茂欽明之量無欲體於自然沖素刑乎萬國韶既盡美則必盡善宜養以玄虛守以無為登覽不以臺觀游豫不以苑沼偃息畢於仁義馳騁極於六藝觀巍巍之隆鑒二代之文仰味羲農俯尋周孔其為逍遙足以尊道德之輔親搢紳之秀疇咨以時顧問不倦獻替諷諫日月而聞則庶績惟凝六合咸熙中興之盛邁於殷宗休嘉之慶流乎無窮昔漢起德陽鍾離抗言魏營宮殿陳羣正辭臣雖才非若人然職忝近侍言不足採而義在以聞帝嘉其言而止復領本州大中正升平末遷太常逌累讓不許穆帝崩山陵將用寶器逌諫曰以宣皇顧命終制山陵不設明器以貽後則景帝奉遵遺制逮文明皇后崩武皇帝亦承前制無所施設惟脯糒之奠瓦器而已昔康皇帝玄宮始用寶劍金舄此蓋太妃罔已之情實違先旨累世之法今外欲以為故事臣請述先旨停此二物書奏從之哀帝以天文失度欲依尚書洪祀之制於太極前殿親執虔肅冀以免咎使太常集博士草其制逌上疏諫曰臣尋史漢舊事藝文志劉向五行傳洪祀出於其中然自前代以來莫有用者又其文惟說為祀而不載儀注此蓋久遠不行之事非常人所參校案漢儀天子所親之祠惟宗廟而已祭天於雲陽祭地於汾陰在於別宮遙拜不詣壇所其餘羣祀之所必在幽靜是以圓丘方澤列於郊野今若於承明之庭正殿之前設羣神之坐行躬親之禮準之舊典有乖常式臣聞妖眚之發所以鑒悟時主故夤畏上通則宋災退度德禮增修則殷道以隆此往代之成驗不易之定理頃者星辰頗有變異陛下祗戒之誠達於天人在予之懼忘寢與食仰虔玄象俯凝庶政嘉祥之應實在今日而猶乾乾夕惕思廣茲道誠實聖懷殷勤之至然洪祀有書無儀不行於世詢訪時學莫識其禮且其文曰洪祀大祀也陽曰神陰曰靈舉國相率而行祀順四時之序無令過差今案文而言皆漫而無適不可得詳若不詳而修其失不小帝不納逌又上疏曰臣謹更思尋參之時事今強戎據於關雍桀狄縱於河朔封豕四逸虔劉神州長旌不卷鉦鼓日戒兵疲人困歲無休已人事弊於下則七曜錯於上災沴之作固其宜然又頃者以來無乃大異彼月之蝕義見詩人星辰莫同載於五行故洪範不以為沴陛下今以晷度之失同之六沴引其輕變方之重眚求己篤於禹湯憂勤踰乎日昃將修大祀以禮神祇傳曰外順天地時氣而祭其鬼神然則神必有號祀必有義案洪祀之文惟神靈大略而無所祭之名稱舉國行祀而無貴賤之阻有赤黍之盛而無牲醴之奠儀法所用闕略非一若率文而行則舉義皆閡有所施補則不統其源漢侍中盧植時之達學受法不究則不敢厝心誠以五行深遠神道幽昧探賾之求難以常思錯綜之理不可一數臣非至精孰能與此帝猶敕撰定逌又陳古義帝乃止逌在職多所匡諫著阮籍序贊逸士箴及詩賦奏議數十篇行於世病卒時年五十八子蔚吳興太守灌字道羣父瞢尚書郎灌少知名才識亞于逌州辟主簿舉秀才為治中轉別駕歷司徒屬北中郎長史領晉陵太守簡文帝引為撫軍從事中郎後遷吏部郎時謝奕為尚書銓不允灌每執正不從奕託以他事免之受黜無怨色頃之簡文帝又以為撫軍司馬甚相賓禮遷御史中丞轉吳興太守灌性方正視權貴蔑如也為大司馬桓溫所惡溫欲中傷之徵拜侍中以在郡時公事有失追免之後為祕書監尋復解職時溫方執權朝廷希旨故灌積年不調溫末年以為諮議參軍會溫薨遷尚書中護軍復出為吳郡太守加秩中二千石未拜卒子績績字仲元有志氣除祕書郎以父與謝氏不穆故謝安之世辟召無所從論者多之安薨始為會稽王道子驃騎主簿多所規諫歷諮議參軍出為南郡相會荊州刺史殷仲堪舉兵以應王恭仲堪要績與南蠻校尉殷顗同行並不從仲堪等屢以為言績終不為之屈顗慮績及禍乃於仲堪坐和解之績曰大丈夫何至以死相脅江仲元行年六十但未知獲死所耳一坐皆為之懼仲堪憚其堅正以楊佺期代之朝廷聞而徵績為御史中丞奏劾無所屈撓會稽世子元顯專政夜開六門績密啟會稽王道子欲以奏聞道子不許車胤亦曰元顯驕縱宜禁制之道子默然元顯聞而謂衆曰江績車胤間我父子遣人密讓之俄而績卒朝野悼之車胤車胤字武子南平人也曾祖浚吳稽太守父育郡主簿太守王胡之名知人見胤於童幼之中謂胤父曰此兒當大興卿門可使專學胤恭勤不倦博學多通家貧不常得油夏月則練囊盛數十螢火以照書以夜繼日焉及長風姿美劭機悟敏速甚有鄉曲之譽桓溫在荊州辟為從事以辯識義理深重之引為主簿稍遷別駕征西長史遂顯於朝廷時惟胤與吳隱之以寒素博學知名於世又善於賞會當時每有盛坐而胤不在皆云無車公不樂謝安游集之日輒開筵待之寧康初以胤為中書侍郎關內侯孝武帝嘗講孝經僕射謝安侍坐尚書陸納侍講侍中卞耽執讀黃門侍郎謝石吏部郎袁宏執經胤與丹楊尹王混擿句時論榮之累遷侍中太元中增置太學生百人以胤領國子博士其後年議郊廟明堂之事胤以明堂之制既甚難詳且樂主於和禮主於敬故質文不同音器亦殊既茅茨廣廈不一其度何必守其形範而不弘本順時乎九服咸寧四野無塵然後明堂辟雍可光而修之時從其議又遷驃騎長史太常進爵臨湘侯以疾去職俄為護軍將軍時王國寶諂於會稽王道子諷八坐啟以道子為丞相加殊禮胤曰此乃成王所以尊周公也今主上當陽非成王之地相王在位豈得為周公乎望實二三並不宜爾必大忤上意乃稱疾不署其事疏奏帝大怒而甚嘉胤隆安初為吳興大守秩中二千石辭疾不拜加輔國將軍丹楊尹頃之遷吏部尚書元顯有過胤與江績密言於道子將奏之事泄元顯逼令自裁俄而胤卒朝廷傷之殷顗殷顗字伯通陳郡人也祖融太常卿父康吳興太守顗性通率有才氣少與從弟仲堪俱知名太元中以中書郎擢為南蠻校尉莅職清明政績肅舉及仲堪得王恭書將興兵內伐告顗欲同舉顗不平之曰夫人臣之義慎保所守朝廷是非宰輔之務豈藩屏之所圖也晉陽之事宜所不豫仲堪要之轉切顗怒曰吾進不敢同退不敢異仲堪甚以為恨猶密諫仲堪辭甚切至仲堪既貴素情亦殊而志望無厭謂顗言為非顗見江績亦以正直為仲堪所斥知仲堪當逐異己樹置所親因出行散託疾不還仲堪聞其病出省之謂顗曰兄病殊為可憂顗曰我病不過身死但汝病在滅門幸熟為慮勿以我為念也仲堪不從卒與楊佺期桓玄同下顗遂以憂卒隆安中詔曰故南蠻校尉殷顗忠績未融奄焉隕喪可贈冠軍將軍弟仲文叔獻別有傳王雅王雅字茂達東海郯人魏衞將軍肅之曾孫也祖隆後將軍父景大鴻臚雅少知名州檄主簿舉秀才除郎中出補永興令以幹理著稱累遷尚書左右丞歷廷尉侍中左衞將軍丹楊尹領太子左衞率雅性好接下敬慎奉公孝武帝深加禮遇雖在外職侍見甚數朝廷大事多參謀議帝每置酒宴集雅未至不先舉觴其見重如此然任遇有過其才時人被以佞幸之目帝起清暑殿於後宮開北上閤出華林園與美人張氏同游止惟雅與焉會稽王道子領太子太傅以雅為太子少傅時王珣兒婚賓客車騎甚衆會聞雅拜少傅迴詣雅者過半時風俗穨弊無復廉恥然少傅之任朝望屬珣珣亦頗以自許及中詔用雅衆遂赴雅焉將拜遇雨請以繖入王珣不許之因冒雨而拜雅既貴倖威權甚震門下車騎常數百而善應接傾心禮之帝以道子無社稷器幹慮晏駕之後皇室傾危乃選時望以為藩屏將擢王恭殷仲堪等先以訪雅雅以恭等無當世之才不可大任乃從容曰王恭風神簡貴志氣方嚴既居外戚之重當親賢之寄然其稟性峻隘無所苞容執自是之操無守節之志仲堪雖謹於細行以文義著稱亦無弘量且幹略不長若委以連率之重據形勝之地今四海無事足能守職若道不常隆必為亂階矣帝以恭等為當時秀望謂雅疾其勝己故不從二人皆被升用其後竟敗有識之士稱其知人遷領軍尚書散騎常侍方大崇進之將參副相之重而帝崩倉卒不獲顧命雅素被優遇一旦失權又以朝廷方亂內外攜離但慎默而已無所辯正雖在孝武世亦不能犯顏廷爭凡所謀謨唯唯而已尋遷左僕射隆安四年卒時年六十七追贈光祿大夫儀同三司長子準之散騎侍郎次協之黃門次少卿侍中並有士操立名於世云史臣曰爰在中興玄風滋扇溺王綱於拱默撓國步於清虛骨骾蹇諤之風蓋亦微矣而君孝固情禮而違顯命山甫獻誠讜而振穨風彥叔之兵謀道載之正諫洋洋盈耳有足可稱灌不屈節於權臣績敢危言於賊將道子殊物之禮車胤沮之無懼心仲堪反常之舉殷顗折之以正色求諸古烈何以加焉山松悅哀挽於軒冕之辰彥道歡博徒於衰絰之日天心已喪其能濟乎旋及於促齡俄致於非命宜哉贊曰顧生軌物屢申誠讜袁子崇儒拯斯穨喪逌績剛蹇車殷忠壯睠言遺直莫之能尚
