body:
  text: 晉書卷六十五列傳第三十五王導子悅恬洽協劭薈洽子珣珉劭子謐王導字茂弘光祿大夫覽之孫也父裁鎮軍司馬導少有風鑒識量清遠年十四陳留高士張公見而奇之謂其從兄敦曰此兒容貌志氣將相之器也初襲祖爵即丘子司空劉寔尋引為東閤祭酒遷祕書郎太子舍人尚書郎並不行後參東海王越軍事時元帝為琅邪王與導素相親善導知天下已亂遂傾心推奉潛有興復之志帝亦雅相器重契同友執帝之在洛陽也導每勸令之國會帝出鎮下邳請導為安東司馬軍謀密策知無不為及徙鎮建康吳人不附居月餘士庶莫有至者導患之會敦來朝導謂之曰琅邪王仁德雖厚而名論猶輕兄威風已振宜有以匡濟者會三月上巳帝親觀禊乘肩轝具威儀敦導及諸名勝皆騎從吳人紀瞻顧榮皆江南之望竊覘之見其如此咸驚懼乃相率拜於道左導因進計曰古之王者莫不賓禮故老存問風俗虛己傾心以招俊乂況天下喪亂九州分裂大業草創急於得人者乎顧榮賀循此土之望未若引之以結人心二子既至則無不來矣帝乃使導躬造循榮二人皆應命而至由是吳會風靡百姓歸心焉自此之後漸相崇奉君臣之禮始定俄而洛京傾覆中州士女避亂江左者十六七導勸帝收其賢人君子與之圖事時荊揚晏安戶口殷實導為政務在清靜每勸帝克己勵節匡主寧邦於是尤見委杖情好日隆朝野傾心號為仲父帝嘗從容謂導曰卿吾之蕭何也對曰昔秦為無道百姓厭亂巨猾陵暴人懷漢德革命反正易以為功自魏氏以來迄于太康之際公卿世族豪侈相高政教陵遲不遵法度羣公卿士皆饜於安息遂使姦人乘釁有虧至道然否終斯泰天道之常大王方立命世之勳一匡九合管仲樂毅於是乎在豈區區國臣所可擬議願深弘神慮廣擇良能顧榮賀循紀贍周玘皆南土之秀願盡優禮則天下安矣帝納焉永嘉末遷丹楊太守加輔國將軍導上牋曰昔魏武達政之主也荀文若功臣之最也封不過亭侯倉舒愛子之寵贈不過別部司馬以此格萬物得不局跡乎今者臨郡不問賢愚豪賤皆加重號輒有鼓蓋動見相準時有不得者或為恥辱天官混雜朝望穨毀導忝荷重任不能崇浚山海而開導亂源饕竊名位取紊彝典謹送鼓蓋加崇之物請從導始庶令雅俗區別羣望無惑帝下令曰導德重勳高孤所深倚誠宜表彰殊禮而更約己沖心進思盡誠以身率衆宜順其雅志式允開塞之機拜寧遠將軍尋加振威將軍愍帝即位徵吏部郎不拜晉國既建以導為丞相軍諮祭酒桓彝初過江見朝廷微弱謂周顗曰我以中州多故來此欲求全活而寡弱如此將何以濟憂懼不樂往見導極談世事還謂顗曰向見管夷吾無復憂矣過江人士每至暇日相要出新亭飲宴周顗中坐而歎曰風景不殊舉目有江河之異皆相視流涕惟導愀然變色曰當共勠力王室克復神州何至作楚囚相對泣邪衆收淚而謝之俄拜右將軍揚州刺史監江南諸軍事遷驃騎將軍加散騎常侍都督中外諸軍領中書監錄尚書事假節刺史如故導以敦統六州固辭中外都督後坐事除節于時軍旅不息學校未修導上書曰夫風化之本在於正人倫人倫之正存乎設庠序庠序設五教明德禮洽通彝倫攸而有恥且格父子兄弟夫婦長幼之序順而君臣之義固矣易所謂正家而天下定者也故聖王蒙以養正少而教之使化霑肌骨習以成性遷善遠罪而不自知行成德立然後裁之以位雖王之世子猶與國子齒使知道而後貴其取才用士咸先本之於學故周禮卿大夫獻賢能之書于王王拜而受之所以尊道而貴士也人知士之貴由道存則退而修其身以及家正其家以及鄉學於鄉以登朝反本復始各求諸己敦樸之業著浮偽之競息教使然也故以之事君則忠用之莅下則仁孟軻所謂未有仁而遺其親義而後其君者也自頃皇綱失統頌聲不興于今將二紀矣傳曰三年不為禮禮必壞三年不為樂樂必崩而況如此之久乎先進忘揖讓之容後生惟金鼓是聞干戈日尋俎豆不設先王之道彌遠華偽之俗遂滋非所以端本靖末之謂也殿下以命世之資屬陽九之運禮樂征伐翼成中興誠宜經綸稽古建明學業以訓後生漸之教義使文武之道墜而復興俎豆之儀幽而更彰方今戎虜扇熾國恥未雪忠臣義夫所以扼腕拊心苟禮儀膠固淳風漸著則化之所感者深而德之所被者大使帝典闕而復補皇綱弛而更張獸心革面饕餮檢情揖讓而服四夷緩帶而天下從得乎其道豈難也哉故有虞舞干戚而化三苗魯僖作泮宮而服淮夷桓文之霸皆先教而後戰今若聿遵前典興復道教擇朝之子弟並入于學選明博修禮之士而為之師化成俗定莫尚於斯帝甚納之及帝登尊號百官陪列命導升御牀共坐導固辭至于三四曰若太陽下同萬物蒼生何由仰照帝乃止進驃騎大將軍儀同三司以討華軼功封武岡侯進位侍中司空假節錄尚書領中書監會太山太守徐龕反帝訪可以鎮撫河南者導舉太子左衞率羊鑒既而鑒敗抵罪導上疏曰徐龕叛戾久稽天誅臣創議征討調舉羊鑒鑒闇懦覆師有司極法聖恩降天地之施全其首領然臣受重任總錄機衡使三軍挫衄臣之責也乞自貶黜以穆朝倫詔不許尋代賀循領太子太傅時中興草創未置史官導始啟立於是典籍頗具時孝懷太子為胡所害始奉諱有司奏天子三朝舉哀羣臣一哭而已導以為皇太子副貳宸極普天有情宜同三朝之哀從之及劉隗用事導漸見疏遠任真推分澹如也有識咸稱導善處興廢焉王敦之反也劉隗勸帝悉誅王氏論者為之危心導率羣從昆弟子姪二十餘人每旦詣臺待罪帝以導忠節有素特還朝服召見之導稽首謝曰逆臣賊子何世無之豈意今者近出臣族帝跣而執之曰茂弘方託百里之命於卿是何言邪乃詔曰導以大義滅親可以吾為安東時節假之及敦得志加導守尚書令初西都覆沒海內思主羣臣及四方並勸進於帝時王氏強盛有專天下之心敦憚帝賢明欲更議所立導固爭乃止及此役也敦謂導曰不從吾言幾致覆族導猶執正議敦無以能奪自漢魏已來賜諡多由封爵雖位通德重先無爵者例不加諡導乃上疏稱武官有爵必諡卿校常伯無爵不諡甚失制度之本意也從之自後公卿無爵而諡導所議也初帝愛琅邪王裒將有奪嫡之議以問導導曰夫立子以長且紹又賢不宜改革帝猶疑之導日夕陳諫故太子卒定及明帝即位導受遺詔輔政解揚州遷司徒一依陳羣輔魏故事王敦又舉兵內向時敦始寢疾導便率子弟發哀衆聞謂敦死咸有奮志及帝伐敦假導節都督諸軍領揚州刺史敦平進封始興郡公邑三千戶賜絹九千匹進位太保司徒如故劍履上殿入朝不趨讚拜不名固讓帝崩導復與庾亮等同受遺詔共輔幼主是為成帝加羽葆鼓吹班劍二十人及石勒侵阜陵詔加導大司馬假黃鉞出討之軍次江寧帝親餞于郊俄而賊退解大司馬庾亮將徵蘇峻訪之於導導曰峻猜險必不奉詔且山藪藏疾宜包容之固爭不從亮遂召峻既而難作六軍敗績導入宮侍帝峻以導德望不敢加害猶以本官居己之右峻又逼乘輿幸石頭導爭之不得峻日來帝前肆醜言導深懼有不測之禍時路永匡術賈寧並說峻令殺導盡誅大臣更樹腹心峻敬導不納故永等貳於峻導使參軍袁耽潛諷誘永等謀奉帝出奔義軍而峻衞御甚嚴事遂不果導乃攜二子隨永奔于白石及賊平宗廟宮室並為灰燼溫嶠議遷都豫章三吳之豪請都會稽二論紛紜未有所適導曰建康古之金陵舊為帝里又孫仲謀劉玄德俱言王者之宅古之帝王不必以豐儉移都苟弘衞文大帛之冠則無往不可若不績其麻則樂土為虛矣且北寇游魂伺我之隙一旦示弱竄於蠻越求之望實懼非良計今特宜鎮之以靜羣情自安由是嶠等謀並不行導善於因事雖無日用之益而歲計有餘時帑藏空竭庫中惟有綀數千端鬻之不售而國用不給導患之乃與朝賢俱制綀布單衣於是士人翕然競服之綀遂踴貴乃令主者出賣端至一金其為時所慕如此六年冬蒸詔歸胙於導曰無下拜導辭疾不敢當初帝幼沖見導每拜又嘗與導書手詔則云惶恐言中書作詔則曰敬問於是以為定制自後元正導入帝猶為之興焉時大旱導上疏遜位詔曰夫聖王御世動合至道運無不周故能人倫攸萬物獲宜朕荷祖宗之重託於王公之上不能仰陶玄風俯洽宇宙亢陽踰時兆庶胥怨邦之不臧惟予一人公體道明哲弘猶深遠勳格四海翼亮三世國典之不墜實仲山甫補之而猥崇謙光引咎克讓元首之愆寄責宰輔祇增其闕博綜萬機不可一日有曠公宜遺履謙之近節遵經國之遠略門下速遣侍中以下敦喻導固讓詔累逼之然後視事導簡素寡欲倉無儲穀衣不重帛帝知之給布萬匹以供私費導有羸疾不堪朝會帝幸其府縱酒作樂後令輿車入殿其見敬如此石季龍掠騎至歷陽導請出討之加大司馬假黃鉞中外諸軍事置左右長史司馬給布萬匹俄而賊退解大司馬復轉中外大都督進位太傅又拜丞相依漢制罷司徒官以并之冊曰朕夙罹不造肆陟帝位未堪多難禍亂旁興公文貫九功武經七德外緝四海內齊八政天地以平人神以和業同伊尹道隆姬旦仰思唐虞登庸雋申命羣官允釐庶績朕思憑高謨弘濟遠猷維稽古建爾于上公永為晉輔往踐厥職敬敷道訓以亮天工不亦休哉公其戒之是歲妻曹氏卒贈金章紫綬初曹氏性妬導甚憚之乃密營別館以處衆妾曹氏知將往焉導恐妾被辱遽令命駕猶恐遲之以所執麈尾柄驅牛而進司徒蔡謨聞之戲導曰朝廷欲加公九錫導弗之覺但謙退而已謨曰不聞餘物惟有短轅犢車長柄麈尾導大怒謂人曰吾往與羣賢共游洛中何曾聞有蔡克兒也于時庾亮以望重地逼出鎮於外南蠻校尉陶稱間說亮當舉兵內向或勸導密為之防導曰吾與元規休慼是同悠悠之談宜絕智者之口則如君言元規若來吾便角巾還第復何懼哉又與稱書以為庾公帝之元舅宜善事之於是讒間遂息時亮雖居外鎮而執朝廷之權既據上流擁強兵趣向者多歸之導內不能平常遇西風塵起舉扇自蔽徐曰元規塵樜人自漢魏以來羣臣不拜山陵導以元帝睠同布衣匪惟君臣而已每一崇進皆就拜不勝哀戚由是詔百官拜陵自導始也咸康五年薨時年六十四帝舉哀於朝堂三日遣大鴻臚持節監護喪事賵襚之禮一依漢博陸侯及安平獻王故事及葬給九游轀輬車黃屋左纛前後羽葆鼓吹武賁班劍百人中興名臣莫與為比冊曰蓋高位以酬明德厚爵以答懋勳至乎闔棺標跡莫尚號諡風流百代於是乎在惟公邁達沖虛玄鑒劭邈夷淡以約其心體仁以流其惠棲遲務外則名雋中夏應期濯纓則潛算獨運昔我中宗肅祖之基中興也下帷委誠而策定江左拱己宅心而庶績咸熙故能威之所振寇虐改心化之所鼓檮杌易質調陰陽之和通彝倫之紀遼隴承風丹穴景附隆高世之功復宣武之績舊物不失公協其猷若乃荷負顧命保朕沖人遭遇艱圮夷險委順拯其淪墜而濟之以道扶其顛傾而弘之以仁經緯三朝而蘊道彌曠方賴高謨以穆四海昊天不弔奄忽薨殂朕用震慟于心雖有殷之殞保衡有周之喪二南曷諭茲懷今遣使持節謁者僕射任瞻錫諡曰文獻祠以太牢魂而有靈嘉茲榮寵二弟穎敞少與導俱知名時人以穎方溫太真以敞比鄧伯道並早卒導六子悅恬洽協劭薈悅字長豫弱冠有高名事親色養導甚愛之導嘗共悅弈爭道導笑曰相與有瓜葛得為爾邪導性儉節帳下甘果爛敗令棄之云勿使大郎知悅少侍講東宮歷吳王友中書侍郎先導卒諡貞世子先是導夢人以百萬錢買悅潛為祈禱者備矣尋掘地得錢百萬意甚惡之一皆藏閉及悅疾篤導憂念特至不食積日忽見一人形狀甚偉被甲持刀導問君是何人曰僕是蔣侯也公兒不佳欲為請命故來耳公勿復憂因求食遂噉數升食畢勃然謂導曰中書患非可救者言訖不見悅亦殞絕悅與導語以慎密為端導還臺及行悅未嘗不送至車後又為母曹氏襞斂箱篋中物悅亡後導還臺自悅常所送處哭至臺門其母長封作篋不忍復開悅無子以弟恬子琨為嗣襲導爵丹楊尹卒贈太常子嘏嗣尚鄱陽公主歷中領軍尚書卒子恢嗣義熙末為游擊將軍恬字敬豫少好武不為公門所重導見悅輒喜見恬便有怒色州辟別駕不行襲爵即丘子性誕不拘禮法謝萬嘗造恬既坐少頃恬便入內萬以為必厚待己殊有喜色恬久之乃沐頭散髮而出據胡牀於庭中曬髮神氣邁竟無賓主之禮萬悵然而歸晚節更好士多技藝善弈為中興第一遷中書郎帝欲以為中書令導固讓從之除後將軍魏郡太守加給事中領兵鎮石頭導薨去官俄起為後將軍復鎮石頭轉吳國會稽內史加散騎常侍卒贈中軍將軍諡曰憲洽字敬和導諸子中最知名與荀羨俱有美稱弱冠歷散騎中書郎中軍長史司徒左長史建武將軍吳郡內史徵拜領軍尋加中書令固讓表疏十上穆帝詔曰敬和清裁貴令昔為中書郎吾時尚小數呼見意甚親之今所以用為令既機任須才且欲時時相見共講文章待以友臣之義而累表固讓甚違本懷其催洽令拜苦讓遂不受升平二年卒於官年三十六二子珣珉珣字元琳弱冠與陳郡謝玄為桓溫掾俱為溫所敬重嘗謂之曰謝掾年四十必擁旄杖節王掾當作黑頭公皆未易才也珣轉主簿時溫經略中夏竟無寧歲軍中機務並委珣焉文武數萬人悉識其面從討袁真封東亭侯轉大司馬參軍琅邪王友中軍長史給事黃門侍郎珣兄弟皆謝氏壻以猜嫌致隙太傅安既與珣絕婚又離珉妻由是二族遂成仇釁時希安旨乃出珣為豫章太守不之官除散騎常侍不拜遷祕書監安卒後遷侍中孝武深杖之轉輔國將軍吳國內史在郡為士庶所悅徵為尚書右僕射領吏部轉左僕射加征虞將軍復領太子詹事時帝雅好典籍珣與殷仲堪徐邈王恭郗恢等並以才學文章見昵於帝及王國寶自媚於會稽王道子而與珣等不協帝慮晏駕後怨隙必生故出恭恢為方伯而委珣端右珣夢人以大筆如椽與之既覺語人云此當有大手筆事俄而帝崩哀冊諡議皆珣所草隆安初國寶用事謀黜舊臣遷珣尚書令王恭赴山陵欲殺國寶珣止之曰國寶雖終為禍亂要罪逆未彰今便先事而發必大失朝野之望況擁強兵竊發於京輦誰謂非逆國寶若遂不改惡布天下然後順時望除之亦無憂不濟也恭迺止既而謂珣曰比來視君一似胡廣珣曰王陵廷爭陳平慎默但問歲終何如耳恭尋起兵國寶將殺珣等僅而得免語在國寶傳二年恭復舉兵假珣節進衞將軍都督琅邪水陸軍事事平上所假節加散騎常侍四年以疾解職歲餘卒時年五十二追贈車騎將軍開府諡曰獻穆桓玄與會稽王道子書曰珣神情朗悟經史明徹風流之美公私所寄雖逼嫌謗才用不盡然君子在朝弘益自多時事艱難忽爾喪失歎懼之深豈但風流相悼而已其崎嶇九折風霜備經雖賴明公神鑒亦識會居之故也卒以壽終殆無所哀但情發去來置之未易耳玄輔政改贈司徒初珣既與謝安有隙在東聞安薨便出京師詣族弟獻之曰吾欲哭謝公獻之驚曰所望於法護於是直前哭之甚慟法護珣小字也珣五子弘虞柳孺曇首宋世並有高名珉字季琰少有才藝善行書名出珣右時人為之語曰法護非不佳僧彌難為兄僧彌珉小字也時有外國沙門名提婆妙解法理為珣兄弟講毗曇經珉時尚幼講未半便云已解即於別室與沙門法綱等數人自講法綱歎曰大義皆是但小未精耳辟州主簿舉秀才不行後歷著作散騎郎國子博士黃門侍郎侍中代王獻之為長兼中書令二人素齊名世謂獻之為大令珉為小令太元十三年卒時年三十八追贈太常二子朗練義熙中並歷侍中協字敬祖元帝撫軍參軍襲爵武岡侯早卒無子以弟劭子謐為嗣謐字稚遠少有美譽與譙國桓胤太原王綏齊名拜祕書郎襲父爵遷祕書丞歷中軍長史黃門郎侍中及桓玄舉兵詔謐銜命詣玄玄深敬昵焉拜建威將軍吳國內史未至郡玄以為中書令領軍將軍吏部尚書遷中書監加散騎常侍領司徒及玄將篡以謐兼太保奉璽冊詣玄玄篡封武昌縣開國公加班劍二十人初劉裕為布衣衆未之識也惟謐獨奇貴之嘗謂裕曰卿當為一代英雄及裕破桓玄謐以本官加侍中領揚州刺史錄尚書事謐既受寵桓氏常不自安護軍將軍劉毅嘗問謐曰璽綬何在謐益懼會王綏以桓氏甥自疑謀反父子兄弟皆伏誅謐從弟諶少驍果輕俠欲誘謐還吳起兵為亂乃說謐曰王綏無罪而義旗誅之是除時望也兄少立名譽加位地如此欲不危得乎謐懼而出奔劉裕牋詣大將軍武陵王遵遣人追躡謐既還委任如先加謐班劍二十人義熙三年卒時年四十八追贈侍中司徒諡曰文恭三子瓘球琇入宋皆至大官劭字敬倫歷東陽太守吏部郎司徒左長史丹陽尹劭美姿容有風操雖家人近習未嘗見其墮替之容桓溫甚器之遷吏部尚書尚書僕射領中領軍出為建威將軍吳國內史卒贈車騎將軍諡曰簡三子穆默恢穆臨海太守默吳國內史加二千石恢右衞將軍穆三子簡智超默二子鑒惠義熙中並歷顯職薈字敬文恬虛守靖不競榮利少歷清官除吏部郎侍中建威將軍吳國內史時年饑粟貴人多餓死薈以私米作饘粥以飴餓者所濟活甚衆徵補中領軍不拜徙尚書領中護軍復為征虜將軍吳國內史頃之桓沖表請薈為江州刺史固辭不拜轉督浙江東五郡左將軍會稽內史進號鎮軍將軍加散騎常侍卒於官贈衞將軍子廞歷太子中庶子司徒左長史以母喪居于吳王恭舉兵假廞建武將軍吳國內史令起軍助為聲援廞即墨絰合衆誅殺異己仍遣前吳國內史虞嘯父等入吳興義興聚兵輕俠赴者萬計廞自謂義兵一動勢必未寧可乘間而取富貴而曾不旬日國寶賜死恭罷兵符廞去職廞大怒迴衆討恭恭遣司馬劉牢之距戰于曲阿廞衆潰奔走遂不知所在長子泰為恭所殺少子華以不知廞存亡憂毀布衣蔬食後從兄謐言其死所華始發喪入仕初導渡淮使郭璞筮之卦成璞曰吉無不利淮水絕王氏滅其後子孫繁衍竟如璞言史臣曰飛龍御天故資雲雨之勢帝王興運必俟股肱之力軒轅聖人也杖師臣而授圖商湯哲后也託負鼎而成業自斯已降罔不由之原夫典午發蹤本于陵寡金行撫運無德在時九土未宅其心四夷已承其弊既而中原蕩覆江左嗣興兆著玄石之圖乖少康之祀夏時無思晉之士異文叔之興劉輔佐中宗艱哉甚矣茂弘策名枝屏叶情交好負其才智恃彼江湖思建克復之功用成翌宣之道於是王敦內侮憑天邑而狼顧蘇峻連兵指宸居而隼擊實賴元宰固懷匪石之心潛運忠謨竟翦吞沙之寇乃誠貫日主垂餌以終全貞志陵霜國綴旒而不滅觀其開設學校存乎沸鼎之中爰立章程在乎櫛風之際雖則世道多故而規模弘遠矣比夫蕭曹弼漢六合為家奭望匡周萬方同軌功未半古不足為儔至若夷吾體仁能相小國孔明踐義善翊新邦撫事論情抑斯之類也提挈三世終始一心稱為仲父蓋其宜矣恬珣踵德副呂虔之贈刀謐乃隤聲慚劉毅之徵璽語曰深山大澤有龍有蛇實斯之謂也贊曰贙嘯猋馳龍升雲映武岡矯矯匡時緝政懿績克宣忠規靡競契叶三主榮逾九命貽刀表祥筮水流慶赫矣門族重光斯盛
