body:
  text: 晉書卷一百十一載記第十一慕容暐慕容恪陽騖皇甫真慕容暐字景茂儁第三子也初封中山王尋立為太子及儁死羣臣欲立慕容恪恪辭曰國有儲君非吾節也於是立暐升平四年僭即皇帝位大赦境內改元曰建熙立其母可足渾氏為皇太后以慕容恪為太宰錄尚書行周公事慕容評為太傅副贊朝政慕輿根為太師慕容垂為河南大都督征南將軍兗州牧荊州刺史領護南蠻校尉鎮梁國孫希為安西將軍并州刺史傅顏為護軍將軍其餘封授各有差暐既庸弱國事皆委之於恪慕輿根自恃勳舊驕傲有無上之心忌恪之總朝權將伺隙為亂乃言於恪曰今主上幼沖母后干政殿下宜慮楊駿諸葛元遜之變思有以自全且定天下者殿下之功也兄亡弟及先王之成制過山陵之後可廢主上為一國王殿下踐尊位以建大燕無窮之慶恪曰公醉乎何言之勃也昔曹臧吳札並於家難之際猶曰為君非吾節況今儲君嗣統四海無虞宰輔受遺奈何便有私議公忘先帝之言乎根大懼陳謝而退恪以告慕容垂垂勸恪誅之恪曰今新遭大凶二虜伺隙山陵未建而宰輔自相誅滅恐乖遠近之望且可容忍之根與左衞慕輿干潛謀誅恪及評因而篡位入白可足渾氏及暐曰太宰太傅將謀為亂臣請率禁兵誅之以安社稷可足渾氏將從之暐曰二公國之親穆先帝所託終應無此未必非太師將為亂也於是使其侍中皇甫真護軍傅顏收根等於禁中斬之大赦境內遣傅顏率騎二萬觀兵河南臨淮而還軍威甚盛初儁所署寧南將軍呂護據野王陰通京師穆帝以護為前將軍冀州刺史儁死謀引王師襲鄴事覺暐使慕容恪等率衆五萬討之傅顏言於恪曰護窮寇假合王師既臨則上下喪氣曾不敢闚兵中路展其螗蜋之心此則士卒懾魂敗亡之驗也殿下前以廣固天險守易攻難故為長久之策今賊形便不與往同宜急攻之以省千金之費恪曰護老賊經變多矣觀其為備之道未易卒平今圈之窮城樵採路絕內無蓄積外無強援不過十旬其斃必矣何必遽殘士卒之命而趣一時之利哉吾嚴濬圍壘休養將卒以重官美貨間而離之事淹勢窮其釁易動我則未勞而寇已斃此為兵不血刃坐以制勝也遂列長圍守之護遣其將張興率勁卒七千出戰傅顏擊斬之自三月至八月而野王潰護南奔于晉悉降其衆尋復叛歸于暐暐待之如初因遣傅顏與護率衆據河陰顏北襲勑勒大獲而還護攻洛陽中流矢而死將軍段崇收軍北渡屯于野王暐遣其寧東慕容忠攻陷滎陽又遣鎮南慕容塵寇長平時晉冠軍將軍陳祐戍洛陽遣使請救帝遣桓溫援之興寧初暐復使慕容評寇許昌懸瓠陳城並陷之遂略汝南諸郡徙萬餘戶于幽冀暐豫州刺史孫興上疏請步卒五千先圖洛陽暐納之遣其太宰司馬悅希軍于盟津孫興分戍成臯以為之聲援尋而陳祐率衆奔陸渾河南諸壘悉陷于希慕容恪攻陷金墉害揚威將軍沈勁以其左中郎將慕容筑為假節征虜將軍洛州刺史鎮金墉慕容垂為都督荊揚洛徐兗豫雍益梁秦等十州諸軍事征南大將軍荊州牧配兵一萬鎮魯陽時暐境內多水旱慕容恪慕容評並稽首歸政請遜位還第曰臣以朽闇器非經國過荷先帝拔擢之恩又蒙陛下殊常之遇猥以輕才竊位宰錄不能上諧陰陽下釐庶政致使水旱愆和彝倫失序轅弱任重夕惕唯憂臣聞王者則天建國辨方正位司必量才官惟德舉台傅之重參理三光苟非其人則靈曜為虧尸祿貽殃負乘招悔由來常道未之或差以姬旦之勳聖猶近則二公不悅遠則管蔡流言況臣等寵緣戚來榮非才授而可久點天官塵蔽賢路是以中年拜表披陳丹款聖恩齒舊未忍遐棄奄冉偷榮愆責彌厚自待罪鼎司歲餘辰紀忝冒宰衡七載于茲雖乃心經略而思不周務至令二方干紀跋扈未庭同文之詠有慚盛漢深乖先帝託付之規甚違陛下垂拱之義臣雖不敏竊聞君子之言敢忘虞丘避賢之美輒循兩疏知止之分謹送太宰大司馬太傅司徒章綬惟垂昭許暐曰朕以不天早傾乾覆先帝所託唯在二公二公懿親碩德勳高魯衞翼贊王室輔導朕躬宣慈惠和坐而待旦虔誠夕惕美亦至矣故能外掃羣凶內清九土四海晏如政和時洽雖宗廟社稷之靈抑亦公之力也今關右有未賓之氐江吳有遺燼之虜方賴謀猷混寧六合豈宜虛己謙沖以違委任之重王其割二疏獨善之小以成公旦復袞之大恪評等固請致政暐曰夫建德者必以終善為名佐命者則以功成為效公與先帝開構洪基膺天明命將廓夷羣醜紹復隆周之迹災眚橫流乾光墜曜朕以眇躬猥荷大業不能上成先帝遺志致使二虜遊魂所以功未成也豈宜沖退且古之王者不以天下為榮憂四海若荷擔然後仁讓之風行則比屋而可封今道化未純鯨鯢未殄宗社之重非唯朕身公所憂也當思所以寧濟兆庶靖難敦風垂美將來侔蹤周漢不宜崇飾常節以違至公遂斷其讓表恪評等乃止暐鍾律郎郭欽奏議以暐承石季龍水為木德暐從之太和元年暐遣撫軍慕容厲攻晉太山太守諸葛攸攸奔于淮南厲悉陷兗州諸郡置守宰而還慕容恪有疾深慮暐政不在己慕容評性多猜忌大司馬之位不能允授人望乃召暐兄樂安王臧謂之曰今勁秦跋扈強吳未賓二寇並懷進取但患事之無由耳夫安危在得人國興在賢輔若能推才任忠和同宗盟則四海不足圖二虜豈能為難哉吾以常才受先帝顧託之重每欲掃平關隴蕩一甌吳庶嗣成先帝遺志謝憂責于當年而疾固彌留恐此志不遂所以沒有餘恨也吳王天資英傑經略超時司馬職統兵權不可以失人吾終之後必以授之若以親疏次第不以授汝當以授沖汝等雖才識明敏然未堪多難國家安危實在于此不可昧利忘憂以致大悔也又以告評月餘而死其國中皆痛惜之先是晉南陽督護趙弘以宛降于暐暐遣其南中郎將趙盤自魯陽戍宛至此晉右將軍桓豁攻宛拔之趙盤退奔魯陽豁遣輕騎追盤及於雉城大戰敗之執盤戍宛而歸苻堅將苻謏據陝降于暐時有圖書云燕馬當飲渭水堅恐暐乘釁入關大懼乃盡精銳以備華陰暐羣下議欲遣兵救謏因圖關右慕容評素無經略又受苻堅間貨沮議曰秦雖有難未易可圖朝廷雖明豈如先帝吾等經略又非太宰之匹終不能平秦也但可閉關息旅保寧疆埸足矣暐魏尹慕容德上疏曰先帝應天順時受命革代方以文德懷遠以一六合神功未就奄忽升遐昔周文既沒武王嗣興伏惟陛下則天比德揆聖齊功方闡崇乾基纂成先志逆氐僭據關隴號同王者惡積禍盈自相疑戮釁起蕭牆勢分四國投誠請援旬日相尋豈非凶運將終數歸有道兼弱攻昧取亂侮亡機之上也今秦土四分可謂弱矣時來運集天贊我也天與不取反受其殃吳越之鑒我之師也宜應天人之會建牧野之旗命皇甫真引并冀之衆徑趣蒲坂臣垂引許洛之兵馳解謏圍太傅總京都武旅為二軍後繼飛檄三輔仁聲先路獲城即侯微功必賞此則鬱概待時之雄抱志未申之傑必嶽峙灞上雲屯隴下天羅既張內外勢合區區僭豎不走則降大同之舉今其時也願陛下獨斷聖慮無訪仁人暐覽表大悅將從之評固執不許乃止苻謏知評暐之無遠略恐救師弗至乃牋於慕容垂皇甫真曰苻堅王猛皆人傑也謀為燕患為日久矣今若乘機不赴恐燕之君臣將有甬東之悔垂得書私於真曰方為人患者必在於秦主上富於春秋未能留心政事觀太傅度略豈能抗苻堅王猛乎真曰然繞朝有云謀之不從可如何暐僕射悅綰言於暐曰太宰政尚寬和百姓多有隱附傳曰唯有德者可以寬臨衆其次莫如猛今諸軍營戶三分共貫風教陵弊威綱不舉宜悉罷軍封以實天府之饒肅明法令以清四海暐納之綰既定制朝野震驚出戶二十餘萬慕容評大不平尋賊綰殺之晉大司馬桓溫江州刺史桓沖豫州刺史袁真率衆五萬伐暐前兗州刺史孫元起兵應之溫部將檀玄攻胡陸執暐寧東慕容忠暐遣其將慕容厲與溫戰于黃墟厲師大敗單馬奔還高平太守徐翻以郡歸順溫前鋒朱序又破暐將傅顏于林渚溫軍大振次于枋頭暐懼謀奔和龍慕容垂曰不然臣請擊之若戰不捷走未晚也乃以垂為使持節南討大都督慕容德為征南將軍率衆五萬距溫使其散騎侍郎樂嵩乞師於苻堅堅遣將軍苟池率衆二萬出自洛陽師于潁川外為赴援內實觀隙有兼并之志矣慕容德屯于石門絕溫糧漕豫州刺史李邦率州兵五千斷溫餽運溫頻戰不利糧運復絕及聞堅師之至乃焚舟棄甲而退德率勁騎四千先溫至襄邑東伏於澗中與垂前後夾擊王師大敗死者三萬餘人苟池聞溫班師邀擊於譙溫衆又敗死者萬計垂既有大功威德彌振慕容評素不平之垂又言其將孫蓋等摧鋒陷銳宜論功超授評寢而不錄垂數以為言頗與評廷爭可足渾氏素惡垂毀其戰功遂與評謀殺垂垂懼奔于苻堅先是暐使其黃門侍郎梁琛聘于堅琛還言於評曰秦揚兵講武運粟陝東以琛觀之無久和之理兼吳王西奔必有觀釁之計深宜備之評曰不然秦豈可受吾叛臣而不懷和好哉琛曰鄰國相并有自來矣況今並稱大號理無俱存苻堅機明好斷納善如流王猛有王佐之才銳於進取觀其君臣相得自謂千載一時桓溫不足為慮終為人患者其唯王猛乎暐評不以為虞皇甫真又陳其事曰苻堅雖聘使相尋託輔車為諭然抗均鄰敵勢同戰國明其甘於取利無慕善之心終不能守信存和以崇久要也頃來行人累續兼師出洛川夷險要害具之耳目觀虛實以措姦圖聽風塵而伺國隙者寇之常也又吳王外奔為之謀主伍員之禍不可不慮洛陽并州壺關諸城並宜增兵益守以防未兆暐召評而謀之評曰秦國小力弱杖我為援且苻堅庶幾善道終不納叛臣之言不宜輕自擾懼以動寇心也暐從之俄而堅遣其將王猛率衆伐暐攻慕容筑于金墉暐遣慕容臧率衆救之臧次滎陽猛部將梁成洛州刺史鄧羌與臧戰于石門臧師敗績死者萬餘遂相持于石門筑以救兵不至以金墉降于猛梁成又敗慕容臧斬首三千餘級獲其將軍楊璩臧遂城新樂而還桓溫之敗也歸罪于豫州刺史袁真真怒以壽陽降暐暐遣其大鴻臚溫統署真為使時節散騎常侍都督淮南諸軍事征南大將軍領護南蠻校尉揚州刺史封宣城公未至而真統俱卒真黨朱輔立真子瑾為建威將軍豫州刺史以固壽陽時外則王師及苻堅交侵兵革不息內則暐母亂政評等貪冒政以賄成官非才舉羣下切齒焉其尚書左丞申紹上疏曰臣聞漢宣有言與朕共治天下者其唯良二千石乎是以特重此選必妙盡英才莫不拔自貢士歷資內外用能仁感猛獸惠致羣祥今者守宰或擢自匹夫兵將之間或因寵戚藉緣時會非但無聞於州閭亦不經于朝廷又無考績黜陟幽明貪惰為惡無刑戮之懼清勤奉法無爵賞之勸百姓窮弊侵賕無已兵士逋逃乃相招為賊盜風頹化替莫相糾攝且吏多則政煩由來常患今之見戶不過漢之一大郡而備置百官加之新立軍號兼重有過往時虛假名位廢棄農業公私驅擾人無聊生宜并官省職務勸農桑秦吳二虜僻僭一時尚能任道捐情肅諧偽部況大燕累聖重光君臨四海而可美政或虧取陵姦寇哉鄰之有善衆之所望我之不修彼之願也秦吳狡猾地居形勝非唯守境而已乃有吞噬之心中州豐實戶兼二寇弓馬之勁秦晉所憚雲騎風馳國之常也而比赴敵後機兵不速濟者何也皆由賦法靡役之非道郡縣守宰每於差調之際無不舍越殷強首先貧弱行留俱窘資贍無所人懷嗟怨遂致奔亡進闕供國之饒退離蠶農之要兵豈在多貴於用命宜嚴制軍科務先饒復習兵教戰使偏伍有常從戎之外足營私業父兄有陟岵之觀子弟懷孔爾之顧雖赴水火何所不從節儉約費先王格謨去華敦朴哲后憲故周公戒成王以嗇財為本漢文以皁幃變俗孝景宮人弗過千餘魏武寵賜不盈十萬薄葬不墳儉以率下所以割肌膚之惠全百姓之力謹案後宮四千有餘僮侍厮養通兼十倍日費之重價盈萬金綺縠羅紈歲增常調戎器弗營奢玩是務今帑藏虛竭軍士無襜褕之賚宰相侯王迭以侈麗相尚風靡之化積習成俗臥薪之諭未足甚焉宜罷浮華非要之役峻明婚姻喪葬之條禁絕奢靡浮煩之事出傾宮之女均商農之賦公卿以下以四海為家信賞必罰綱維肅舉者溫猛之首可懸之白旗秦吳二主可以禮之歸命豈唯不復侵寇而已哉陛下若不遠追漢宗弋綈之模近崇先帝補衣之美臣恐頹風弊俗亦革變靡途中興之歌無以軫之絃詠又拓宇兼并不在一城之地控制戎夷者懷之以德今魯陽上郡重山之外雲陰之北四百有餘而未可以羈服塞表為平寇之基徒孤危託落令善附內駭宜攝就并豫以臨二河通接漕轂擬之丘後重晉陽之戍增南藩之兵戰守之備衒以千金之餌蓄力待時可一舉而滅如其虔劉送死俟入境而斷之可令匹馬不反非唯絕二賊闚乃是戡殄之要惟陛下覽焉暐不納苻堅又使王猛楊安率衆伐暐猛攻壺關安攻晉陽暐使慕容評等率中外精卒四十餘萬距之猛安進師潞川州郡盜賊大起鄴中多怪異暐憂懼不知所為乃召其使而問曰秦衆何如今大師既出猛等能戰不或對曰秦國小兵弱豈王師之敵景略常才又非太傅之匹不足憂也黃門侍郎梁琛中書侍郎樂嵩進曰不然兵書之義計敵能鬬當以算取之若冀敵不鬬非萬全之道也慶鄭有云秦衆雖少戰士倍我衆之多少非可問也且秦行師千里固戰是求何不戰之有乎暐不悅猛與評等相持評以猛懸軍遠入利在速戰議以持久制之猛乃遣其將郭慶率騎五千夜從間道起火高山燒評輜重火見鄴中評性貪鄙鄣固山泉賣樵鬻水積錢絹如丘陵三軍莫有鬬志暐遣其侍中蘭伊讓評曰王高祖之子也宜以宗廟社稷為憂奈何不務撫養勳勞專以聚斂為心乎府藏之珍貨朕豈與王愛之若寇軍冒進王持錢帛安所置也皮之不存毛將安傅錢帛可散之三軍以平寇凱旋為先也評懼而與猛戰于潞川評師大敗死者五萬餘人評等單騎遁還猛遂長驅至鄴堅復率衆十萬會猛攻暐先是慕容桓以衆萬餘屯于沙亭為評等後繼聞評敗引屯內黃堅遣將鄧羌攻信都桓率鮮卑五千退保和龍散騎侍郎徐蔚等率扶餘高句麗及上黨質子五百餘人夜開城門以納堅軍暐與評等數十騎奔于昌黎堅遣郭慶追及暐于高陽堅將巨武執暐將縛之暐曰汝何小人而縛天子武曰我梁山巨武受詔縛賊何謂天子邪遂送暐于堅堅詰其奔狀暐曰狐死首丘欲歸死于先人墳墓耳堅哀而釋之令還宮率文武出降郭慶遂追評桓于和龍桓殺其鎮東慕容亮而并其衆攻其遼東太守韓稠于平川郭慶遣將軍朱嶷擊桓執而送之堅徙暐及其王公已下并鮮卑四萬餘戶于長安封暐新興侯署為尚書堅征壽春以暐為平南將軍別部都督淮南之敗隨堅還長安既而慕容垂攻苻丕于鄴慕容沖起兵關中暐謀殺堅以應之事發為堅所誅時年三十五及德僭稱尊號偽諡幽皇帝始廆以武帝太康六年稱公至暐四世暐在位一十一年以海西公太和五年滅通廆皝凡八十五年慕容恪字玄恭皝之第四子也幼而謹厚沈深有大度母高氏無寵皝未之奇也年十五身長八尺七寸容貌魁傑雄毅嚴重每所言及輒經綸世務皝始異焉乃授之以兵數從皝征伐臨機多奇策使鎮遼東甚有威惠高句麗憚之不敢為寇皝使恪與儁俱伐夫餘儁居中指授而已恪身當矢石推鋒而進所嚮輒潰皝將終謂儁曰今中原未一方建大事恪智勇俱濟汝其委之及儁嗣位彌加親任累戰有大功封太原王拜侍中假節大都督錄尚書儁寢疾引恪與慕容評屬以後事及暐之世總攝朝權初建鄴聞儁死曰中原可圖矣桓溫曰慕容恪尚存所憂方為大耳慕輿根之就誅也內外危懼恪容止如常神色自若出入往還一人步從或有諫之者恪曰人情懷懼且當自安以靖之吾復不安則衆何瞻仰哉於是人心稍定恪虛襟待物諮詢善道量才處任使人不踰位朝廷謹肅進止有常度雖執權政每事必諮之於評罷朝歸第則盡心色養手不釋卷其百僚有過未嘗顯之自是庶僚化德稀有犯者恪之圍洛陽也秦中大震苻堅親將以備潼關軍迴乃定恪為將不尚威嚴專以恩信御物務於大略不以小令勞衆軍士有犯法密縱舍之捕斬賊首以令軍營內不整似可犯而防禦甚嚴終無喪敗臨終暐親臨問以後事恪曰臣聞報恩莫大薦士板築猶可而況國之懿藩吳王文武兼才管蕭之亞陛下若任之以政國其少安不然臣恐二寇必有闚之計言終而死陽騖字士秋右北平無終人也父耽仕廆官至東夷校尉騖少清素好學器識沈遠起家為平州別駕屢獻安時強國之術事多納用廆甚奇之皝即王位遷左長史東西征伐參謀幃幄皝臨終謂儁曰陽士秋忠幹貞固可託付大事汝善待之儁之將圖中原也騖制勝之功亞于慕容恪暐既嗣偽位申以師傅之禮親遇日隆及為太尉慨然而歎曰昔常林徐邈先代名臣猶以鼎足任重而終辭三事以吾虛薄何德以堪之固求罷職言甚懇至暐優答不許騖清貞謙謹老而彌篤既以宿望舊齒自慕容恪已下莫不畢拜性儉約常乘弊車瘠馬及死無斂財皇甫真字楚季安定朝那人也弱冠以高才廆拜為遼東國侍郎皝嗣位遷平州別駕時內難連年百姓勞瘁真議欲寬減歲賦休息力役不合旨免官後以破麻秋之功拜奉車都尉守遼東營丘二郡太守皆有善政及儁僭位入為典書令後從慕容評攻拔鄴都珍貨充溢真一無所取唯存恤人物收圖籍而已儁臨終與慕容恪等俱受顧託慕輿根將謀為亂真陰察知之乃言於恪請除之恪未忍顯其事俄而根謀發伏誅恪謝真曰不從君言幾成禍敗呂護之叛恪謀於朝曰遠人不服修文德以來之今護宜以恩詔降乎不宜以兵戈取也真曰護九年之間三背王命揆其姦心凶勃未已明公方飲馬江湘勒銘劍閣況護蕞爾近畿而不梟戮宜以兵算取之不可復以文檄喻也恪從之以真為冠軍將軍別部都督師還拜鎮西將軍并州刺史領護匈奴中郎將徵還拜侍中光祿大夫累遷太尉侍中苻堅密謀兼并欲觀審釁隙乃遣其西戎主簿郭辯潛結匈奴左賢王曹轂令轂遣使詣鄴辯因從之真兄典仕苻堅為散騎常侍從子奮覆並顯關西辯既至鄴歷造公卿言于真曰辯家為秦所誅故寄命曹王貴兄常侍及奮覆兄弟並相知在素真怒曰臣無境外之交斯言何以及我君似姦人得無因緣假託乎乃白暐請窮詰之暐評不許辯還謂堅曰燕朝無綱紀實可圖之鑒機識變唯皇甫真耳堅曰以六州之地豈無智識士一人哉真亦秦人而燕用之固知關西多君子矣真性清儉寡慾不營產業飲酒至石餘不亂雅好屬文凡著詩賦四十餘篇王猛入鄴真望馬首拜之明日更見語乃卿猛猛曰昨拜今卿何恭慢之相違也真答曰卿昨為賊朝是國士吾拜賊而卿國士何所怪也猛大嘉之謂權翼曰皇甫真故大器也從堅入關為奉車都尉數歲而死史臣曰觀夫北陰衍氣醜虜彙生隔閡諸華聲教莫之漸雄據殊壤貪悍成其俗先叛後服蓋常性也自當塗紊紀典午握符推亡之功掩岷吳而可錄御遠之策懷戎狄而猶漏慕容廆英姿偉量是曰邊豪釁迹姦圖實惟亂首何者無名而舉表深譏於魯冊象龔致罰昭大訓於姚典況乎放命挻禍距戰發其狼心剽邑屠城略地騁其蝥賊既而二帝遘平陽之酷按兵窺運五鐸啟金陵之祚率禮稱藩勤王之誠當君危而未立匡主之節俟國泰而將徇適所謂相時而動豈素蓄之款哉然其制敵多權臨下以惠勸農桑敦地利任賢士該時傑故能恢一方之業創累葉之基焉元真體貌不暗符天表沈毅自處頗懷奇略于時羣雄角立爭奪在辰顯宗主祭于沖年庾亮竊政于元舅朝綱不振天步孔艱遂得據已成之資乘土崩之會揚兵南騖則烏丸卷甲建旆東征則宇文摧陣乃負險自固恃勝而驕端拱稱王不待朝命昔鄭武職居三事爵不改伯齊桓績宣九合位止為侯瞻曩烈而功微徵前經而禮縟谿壑難滿此之謂乎宣英文武兼優加之以機斷因石氏之釁首圖中原燕士協其籌冀馬為其用一戰而平巨寇再舉而拔堅城氣讋傍鄰威加邊服便謂深功被物天數在躬遽竊鴻名偷安寶籙猶將席卷京洛肆其蟻聚之徒宰割黎元縱其鯨吞之勢使江左疲於奔命職此之由非夫天厭素靈而啟異類不然者其鋒何以若斯景茂庸材不親厥務賢輔攸賴逆臣挫謀於是陷金墉而款河南包銅城而臨漠北西秦勁卒頓函關而不進東夏遺黎企鄴宮而授首當此之時也凶威轉熾及玄恭即世虐媼亂朝垂以勳德不容評以黷貨干政志士絕忠貞之路讒人襲交亂之風輕鄰反速其咎禦敵罕修其備以攜離之衆抗敢死之師鋒鏑未交白溝淪境衝輣暫擬紫陌成墟是知由余出而戎亡子常升而郢覆終於身死異域智不自全吉凶惟人良所謂也贊曰青山徙構玄塞分疆蠢茲雜種奕世彌昌角端掩月步搖翻霜乘危蝟起怙險鴟張假竊神器憑陵帝鄉守不以德終致餘殃
