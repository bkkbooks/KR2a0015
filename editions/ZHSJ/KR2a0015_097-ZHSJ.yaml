body:
  text: 晉書卷九十七列傳第六十七四夷夫恢恢乾德萬類之所資始蕩蕩坤儀九區之所均載考羲軒於往統肇承天而理物訊炎昊於前辟爰制地而疏疆襲冠帶以辨諸華限要荒以殊遐裔區分中外其來尚矣九夷八狄被青野而亙玄方七戎六蠻緜西宇而橫南極繁種落異君長遇有道則時遵聲教鍾無妄則爭肆虔劉趨扇風塵蓋其常性也詳求遐議歷選深謨莫不待以羈縻防其猾夏武帝受終衰魏廓境全吳威略既申招攜斯廣迷亂華之議矜來遠之名撫舊懷新歲時無怠凡四夷入貢者有二十三國既而惠皇失德中宗遷播凶徒分據天邑傾淪朝化所覃江外而已賝貢之禮於茲殆絕殊風異俗所未能詳故採其可知者為之傳云北狄竊號中壤備於載記在其諸部種類今略書之東夷夫餘國馬韓辰韓肅慎氏倭人裨離等十國夫餘國夫餘國在玄菟北千餘里南接鮮卑北有弱水地方二千里戶八萬有城邑宮室地宜五穀其人強勇會同揖讓之儀有似中國其出使乃衣錦罽以金銀飾腰其法殺人者死沒入其家盜者一責十二男女淫婦人妬皆殺之若有軍事殺牛祭天以其蹄占吉凶蹄解者為凶合者為吉死者以生人殉葬有椁無棺其居喪男女皆衣純白婦人著布面衣去玉佩出善馬及貂豽美珠珠大如酸棗其國殷富自先世以來未嘗被破其王印文稱穢王之印國中有古穢城本穢之城也武帝時頻來朝貢至太康六年為慕容廆所襲破其王依慮自殺子弟走保沃沮帝為下詔曰夫餘王世守忠孝為惡虜所滅甚愍念之若其遺類足以復國者當為之方計使得存立有司奏護東夷校尉鮮于嬰不救夫餘失於機略詔免嬰以何龕代之明年夫餘後王依羅遣詣龕求率見人還復舊國仍請援龕上列遣督郵賈沈以兵送之廆又要之於路沈與戰大敗之廆衆退羅得復國爾後每為廆掠其種人賣於中國帝愍之又發詔以官物贖還下司冀二州禁市夫餘之口馬韓韓種有三一曰馬韓二曰辰韓三曰弁韓辰韓在帶方南東西以海為限馬韓居山海之間無城郭凡有小國五十六所大者萬戶小者數千家各有渠帥俗少綱紀無跪拜之禮居處作土室形如冢其戶向上舉家共在其中無長幼男女之別不知乘牛馬畜者但以送葬俗不重金銀錦罽而貴瓔珠用以綴衣或飾髮垂耳其男子科頭露紒衣布袍履草蹻性勇悍國中有所調役及起築城隍年少勇健者皆鑿其背皮貫以大繩以杖搖繩終日讙呼力作不以為痛善用弓楯矛櫓雖有鬬爭攻戰而貴相屈服俗信鬼神常以五月耕種畢羣聚歌舞以祭神至十月農事畢亦如之國邑各立一人主祭天神謂為天君又置別邑名曰蘇塗立大木懸鈴鼓其蘇塗之義有似西域浮屠也而所行善惡有異武帝太康元年二年其主頻遣使入貢方物七年八年十年又頻至太熙元年詣東夷校尉何龕上獻咸寧三年復來明年又請內附辰韓辰韓在馬韓之東自言秦之亡人避役入韓韓割東界以居之立城柵言語有類秦人由是或謂之為秦韓初有六國後稍分為十二又有弁辰亦十二國合四五萬戶各有渠帥皆屬於辰韓辰韓常用馬韓人作主雖世世相承而不得自立明其流移之人故為馬韓所制也地宜五穀俗饒蠶桑善作縑布服牛乘馬其風俗可類馬韓兵器亦與之同初生子便以石押其頭使扁喜舞善彈瑟瑟形似筑武帝太康元年其王遣使獻方物二年復來朝貢七年又來肅慎氏肅慎氏一名挹婁在不咸山北去夫餘可六十日行東濱大海西接寇漫汗國北極弱水其土界廣袤數千里居深山窮谷其路險阻車馬不通夏則巢居冬則穴處父子世為君長無文墨以言語為約有馬不乘但以為財產而已無牛羊多畜猪食其肉衣其皮績毛以為布有樹名雒常若中國有聖帝代立則其木生皮可衣無井竈作瓦鬲受四五升以食坐則箕踞以足挾肉而啖之得凍肉坐其上令暖土無鹽鐵燒木作灰灌取汁而食之俗皆編髮以布作襜徑尺餘以蔽前後將嫁娶男以毛羽插女頭女和則持歸然後致禮娉之婦貞而女淫貴壯而賤老死者其日即葬之於野交木作小椁殺猪積其上以為死者之糧性凶悍以無憂哀相尚父母死男子不哭泣哭者謂之不壯相盜竊無多少皆殺之故雖野處而不相犯有石砮皮骨之甲檀弓三尺五寸楛矢長尺有咫其國東北有山出石其利入鐵將取之必先祈神周武王時獻其楛矢石砮逮於周公輔成王復遣使入賀爾後千餘年雖秦漢之盛莫之致也及文帝作相魏景元末來貢楛矢石砮弓甲貂皮之屬魏帝詔歸於相府賜其王雞錦罽緜帛至武帝元康初復來貢獻元帝中興又詣江左貢其石砮至成帝時通貢於石季龍四年方達季龍問之答曰每候牛馬向西南眠者三年矣是知有大國所在故來云倭人倭人在帶方東南大海中依山島為國地多山林無良田食海物舊有百餘小國相接至魏時有三十國通好戶有七萬男子無大小悉黥面文身自謂太伯之後又言上古使詣中國皆自稱大夫昔夏少康之子封於會稽斷髮文身以避蛟龍之害今倭人好沈沒取魚亦文身以厭水禽計其道里當會稽東冶之東其男子衣以橫幅但結束相連略無縫綴婦人衣如單被穿其中央以貫頭而皆被髮徒跣其地溫暖俗種禾稻紵麻而蠶桑織績土無牛馬有刀楯弓箭以鐵為鏃有屋宇父母兄弟臥息異處食飲用俎豆嫁娶不持錢帛以衣迎之死有棺無椁封土為冢初喪哭泣不食肉已葬舉家入水澡浴自潔以除不祥其舉大事輒灼骨以占吉凶不知正歲四節但計秋收之時以為年紀人多壽百年或八九十國多婦女不淫不妬無爭訟犯輕罪者沒其妻孥重者族滅其家舊以男子為主漢末倭人亂攻伐不定乃立女子為王名曰卑彌呼宣帝之平公孫氏也其女王遣使至帶方朝見其後貢聘不絕及文帝作相又數至泰始初遣使重譯入貢裨離等十國裨離國在肅慎西北馬行可二百日領戶二萬養雲國去裨離馬行又五十日領戶二萬寇莫汗國去養雲國又百日行領戶五萬餘一羣國去莫汗又百五十日計去肅慎五萬餘里其風俗土壤並未詳泰始三年各遣小部獻其方物至太熙初復有牟奴國帥逸芝惟離模盧國帥沙支臣芝于離末利國帥加牟臣芝蒲都國帥因末繩余國帥馬路沙樓國帥釤加各遣正副使詣東夷校尉何龕歸化西戎吐谷渾焉耆國龜茲國大宛國康居國大秦國吐谷渾吐延葉延辟奚視連視羆樹洛干吐谷渾慕容廆之庶長兄也其父涉歸分部落一千七百家以隸之及涉歸卒廆嗣位而二部馬鬬廆怒曰先公分建有別奈何不相遠離而令馬鬬吐谷渾曰馬為畜耳鬬其常性何怒於人乖別甚易當去汝於萬里之外矣於是遂行廆悔之遣其長史史那樓馮及父時耆舊追還之吐谷渾曰先公稱卜筮之言當有二子克昌祚流後裔我卑庶也理無並大今因馬而別殆天所啟乎諸君試驅馬令東馬若還東我當相隨去矣樓馮遣從者二千騎擁馬東出數百步輒悲鳴西走如是者十餘輩樓馮跪而言曰此非人事也遂止鮮卑謂兄為阿干廆追思之作阿干之歌歲暮窮思常歌之吐谷渾謂其部落曰我兄弟俱當享國廆及曾玄纔百餘年耳我玄孫已後庶其昌乎於是乃西附陰山屬永嘉之亂始度隴而西其後子孫據有西零已西甘松之界極乎白蘭數千里然有城郭而不居隨逐水草廬帳為屋以肉酪為糧其官置長史司馬將軍頗識文字其男子通服長裙帽或戴吓婦人以金花為首飾辮髮縈後綴以珠貝其婚姻富家厚出娉財竊女而去父卒妻其羣母兄亡妻其諸嫂喪服制葬訖而除國無常稅調用不給輒斂富室商人取足而止殺人及盜馬者罪至死他犯則徵物以贖地宜大麥而多蔓菁頗有菽粟出蜀馬氂牛西北雜種謂之為阿柴虜或號為野虜焉吐谷渾年七十二卒有子六十人長曰吐延嗣吐延身長七尺八寸雄姿魁傑羌虜憚之號曰項羽性俶儻不羣嘗慷慨謂其下曰大丈夫生不在中國當高光之世與韓彭吳鄧並驅中原定天下雌雄使名垂竹帛而潛竄窮山隔在殊俗不聞禮教於上京不得策名於天府生與糜鹿同羣死作裘之鬼雖偷觀日月獨不愧於心乎性酷忍而負其智不能恤下為羌酋姜聰所刺劍猶在其身謂其將紇拔泥曰豎子刺吾吾之過也上負先公下愧士女所以控制諸羌者以吾故也吾死之後善相葉延速保白蘭言終而卒在位十三年有子十二人長子葉延嗣葉延年十歲其父為羌酋姜聰所害每旦縛草為姜聰之象哭而射之中之則號泣不中則瞋目大呼其母謂曰姜聰諸將已屠鱠之矣汝何為如此葉延泣曰誠知射草人不益於先讐以申罔極之志耳性至孝母病五日不食葉延亦不食長而沈毅好問天地造化帝王年曆司馬薄洛鄰曰臣等不學實未審三皇何父之子五帝誰母所生延曰自羲皇以來符命玄象昭言著見而卿等面牆何其鄙哉語曰夏蟲不知冬冰良不虛也又曰禮云公孫之子得以王父字為氏吾祖始自昌黎光宅於此今以吐谷渾為氏尊祖之義也在位二十三年卒年三十三有子四人長子辟奚嗣辟奚性仁厚慈惠初聞苻堅之盛遣使獻馬五十匹金銀五百斤堅大悅拜為安遠將軍時辟奚三弟皆專恣長史鍾惡地恐為國害謂司馬乞宿雲曰昔鄭莊公秦昭王以一弟之寵宗祀幾傾況今三孼並驕必為社稷之患吾與公忝當元輔若獲保首領以沒於地先君有問其將何辭吾今誅之矣宿雲請白辟奚惡地曰吾王無斷不可以告於是因羣下入覲遂執三弟而誅之辟奚自投於牀惡地等奔而扶之曰臣昨夢先王告臣云三弟將為逆亂汝速除之臣謹奉先王之命矣辟奚素友愛因恍惚成疾謂世子視連曰吾禍滅同生何以見之於地下國事大小汝宜攝之吾餘年殘命寄食而已遂以憂卒在位二十五年時年四十二有子六人視連嗣視連既立通聘於乞伏乾歸拜為白蘭王視連幼廉慎有志性以父憂卒不知政事不飲酒遊田七年矣鍾惡地進曰夫人君者以德御世以威齊衆養以五味娛以聲色此四者聖帝明王之所先也而公皆略之昔昭公儉嗇而喪偃王仁義而亡然則仁義所以存身亦所以亡己經國者德禮也濟世者刑法也二者或差則綱維失緒明公奕葉重光恩結西夏雖仁孝發於天然猶宜憲章周孔不可獨追徐偃之仁使刑德委而不建視連泣曰先王追友于之痛悲憤升遐孤雖纂業尸存而已聲色遊娛豈所安也綱維刑禮付之將來臨終謂其子視羆曰我高祖吐谷渾公常言子孫必有興者永為中國之西藩慶流百世吾已不及汝亦不見當在汝之子孫輩耳在位十五年而卒有二子長曰視羆少曰烏紇堤視羆性英果有雄略嘗從容謂博士金城騫苞曰易云動靜有常剛柔斷矣先王以仁宰世不任威刑所以剛柔靡斷取輕鄰敵當仁不讓豈宜拱默者乎今將秣馬厲兵爭衡中國先生以為何如苞曰大王之言高世之略秦隴英豪所願聞也於是虛襟撫納衆赴如歸乞伏乾歸遣使拜為使持節都督龍涸已西諸軍事沙州牧白蘭王視羆不受謂使者曰自晉道不綱姦雄競逐劉石虐亂秦燕跋扈河南王處形勝之地宜當糾合義兵以懲不順奈何私相假署擬僭羣凶寡人承五祖之休烈控弦之士二萬方欲掃氛秦隴清彼沙涼然後飲馬涇渭戮問鼎之豎以一丸泥封東關閉燕趙之路迎天子於西京以盡遐藩之節終不能如季孟子陽妄自尊大為吾白河南王何不立勳帝室策名王府建當年之功流芳來葉邪乾歸大怒然憚其強初猶結好後竟遣衆擊之視羆大敗退保白蘭在位十一年年三十三卒子樹洛干年少傳位於烏紇堤烏紇堤一名大孩性磱弱耽酒淫色不恤國事乞伏乾歸之入長安也烏紇堤屢抄其境乾歸怒率騎討之烏紇堤大敗亡失萬餘口保於南涼遂卒於胡國在位八年時年三十五視羆之子樹洛干立樹洛干九歲而孤其母念氏聰惠有姿色烏紇堤妻之有寵遂專國事洛干十歲便自稱世子年十六嗣立率所部數千家奔歸莫何川自稱大都督車騎大將軍大單于吐谷渾王化行所部衆庶樂業號為戊寅可汗沙漒雜種莫不歸附乃宣言曰孤先祖避地於此暨孤七世思與羣賢共康休緒今士馬桓桓控弦數萬孤將振威梁益稱霸西戎觀兵三秦遠朝天子諸君以為何如衆咸曰此盛德之事也願大王自勉乞伏乾歸甚忌之率騎二萬攻之於赤水樹洛干大敗遂降乾歸乾歸拜為平狄將軍赤水都護又以其弟吐護真為捕虜將軍層城都尉其後屢為乞伏熾磐所破又保白蘭慚憤發病而卒在位九年時年二十四熾磐聞其死喜曰此虜矯矯所謂有豕白蹄也有子四人世子拾虔嗣其後世嗣不絕焉耆國焉耆國西去洛陽八千二百里其地南至尉犂北與烏孫接方四百里四面有大山道險隘百人守之千人不過其俗丈夫剪髮婦人衣襦著大袴婚姻同華夏好貨利任姦詭王有侍衞數十人皆倨慢無尊卑之禮武帝太康中其王龍安遣子入侍安夫人獪胡之女姙身十二月剖脅生子曰會立之為世子會少而勇傑安病篤謂會曰我嘗為龜茲王白山所辱不忘於心汝能雪之乃吾子也及會立襲滅白山遂據其國遣子熙歸本國為王會有膽氣籌略遂霸西胡蔥嶺以東莫不率服然恃勇輕率嘗出宿於外為龜茲國人羅雲所殺其後張駿遣沙州刺史楊宣率衆疆理西域宣以部將張植為前鋒所向風靡軍次其國熙距戰於賁崙城為植所敗植進屯鐵門未至十餘里熙又率衆先要之於遮留谷植將至或曰漢祖畏於柏人岑彭死於彭亡今谷名遮留殆將有伏植單騎嘗之果有伏發植馳擊敗之進據尉犂熙率羣下四萬人肉袒降於宣呂光討西域復降於光及光僭位熙又遣子入侍龜茲國龜茲國西去洛陽八千二百八十里俗有城郭其城三重中有佛塔廟千所人以田種畜牧為業男女皆翦髮垂項王宮壯麗煥若神居武帝太康中其王遣子入侍惠懷末以中國亂遣使貢方物於張重華苻堅時堅遣其將呂光率衆七萬伐之其王白純距境不降光進軍討平之大宛國大宛西去洛陽萬三千三百五十里南至大月氏北接康居大小七十餘城土宜稻麥有蒲陶酒多善馬馬汗血其人皆深目多鬚其俗娶婦先以金同心指鐶為娉又以三婢試之不男者絕婚姦淫有子皆卑其母與人馬乘不調墜死者馬主出斂具善市賈爭分銖之利得中國金銀輒為器物不用為幣也太康六年武帝遣使楊顥拜其王藍庾為大宛王藍庾卒其子摩之立遣使貢汗血馬康居國康居國在大宛西北可二千里與粟弋伊列鄰接其王居蘇薤城風俗及人貌衣服略同大宛地和暖饒桐柳蒲陶多牛羊出好馬泰始中其王那鼻遣使上封事并獻善馬大秦國大泰國一名犂鞬在西海之西其地東西南北各數千里有城邑其城周迴百餘里屋宇皆以珊瑚為梲栭琉璃為牆壁水精為柱礎其王有五宮其宮相去各十里每旦於一宮聽事終而復始若國有災異輒更立賢人放其舊王被放者亦不敢怨有官曹簿領而文字習胡亦有白蓋小車旌旗之屬及郵驛制置一如中州其人長大貌類中國人而胡服其土多出金玉寶物明珠大貝有夜光璧駭雞犀及火浣布又能刺金縷繡及織錦縷罽以金銀為錢銀錢十當金錢之一安息天竺人與之交市於海中其利百倍鄰國使到者輒廩以金錢途經大海海水鹹苦不可食商客往來皆齎三歲糧是以至者稀少漢時都護班超遣掾甘英使其國入海船人曰海中有思慕之物往者莫不悲懷若漢使不戀父母妻子者可入英不能渡武帝太康中其王遣使貢獻南蠻林邑扶南林邑國林邑國本漢時象林縣則馬援鑄柱之處也去南海三千里後漢末縣功曹姓區有子曰連殺令自立為王子孫相承其後王無嗣外孫范熊代立熊死子逸立其俗皆開北戶以向日至於居止或東西無定人性凶悍果於戰鬬便山習水不閑平地四時暄暖無霜無雪人皆倮露徒跣以黑色為美貴女賤男同姓為婚婦先娉壻女嫁之時著迦盤衣橫幅合縫如井欄首戴寶花居喪翦鬢謂之孝燔尸中野謂之葬其王服天冠被纓絡每聽政子弟侍臣皆不得近之自孫權以來不朝中國至武帝太康中始來貢獻咸康二年范逸死奴文篡位文日南西卷縣夷帥范椎奴也嘗牧牛澗中獲二鯉魚化成鐵用以為刀刀成乃對大石嶂而呪之曰鯉魚變化冶成雙刀石嶂破者是有神靈進斫之石即瓦解文知其神乃懷之隨商賈往來見上國制度至林邑遂教逸作宮室城邑及器械逸甚愛信之使為將文乃譖逸諸子或徙或奔及逸死無嗣文遂自立為王以逸妻妾悉置之高樓從己者納之不從者絕其食於是乃攻大岐界小岐界式僕徐狼屈都乾魯扶單等諸國并之有衆四五萬人遣使通表入貢於帝其書皆胡字至永和三年文率其衆攻陷日南害太守夏侯覽殺五六千人餘奔九真以覽尸祭天鏟平西卷縣城遂據日南告交州刺史朱蕃求以日南北鄙橫山為界初徼外諸國嘗齎寶物自海路來貿貨而交州刺史日南太守多貪利侵侮十折二三至刺史姜壯時使韓戢領日南太守戢估較太半又伐船調枹聲云征伐由是諸國恚憤且林邑少田貪日南之地戢死絕繼以謝擢侵刻如初及覽至郡又耽荒於酒政教愈亂故被破滅既而文還林邑是歲朱蕃使督護劉雄戍於日南文復攻陷之四年文又襲九真害士庶十八九明年征西督護滕畯率交廣之兵伐文於盧容為文所敗退次九真其年文死子佛嗣升平末廣州刺史滕含率衆伐之佛懼請降含與盟而還至孝武帝寧康中遣使貢獻至義熙中每歲又來寇日南九真九德等諸郡殺傷甚衆交州遂致虛弱而林邑亦用疲弊佛死子胡達立上疏貢金盤椀及金鉦等物扶南國扶南西去林邑三千餘里在海大灣中其境廣袤三千里有城邑宮室人皆醜黑拳髮倮身跣行性質直不為寇盜以耕種為務一歲種三歲穫又好雕文刻鏤食器多以銀為之貢賦以金銀珠香亦有書記府庫文字有類於胡喪葬婚姻略同林邑其王本是女子字葉柳時有外國人混潰者先事神夢神賜之弓又教載舶入海混潰旦詣神祠得弓遂隨賈人汎海至扶南外邑葉柳率衆禦之混潰舉弓葉柳懼遂降之於是混潰納以為妻而據其國後胤衰微子孫不紹其將范尋復世王扶南矣武帝泰始初遣使貢獻太康中又頻來穆帝升平初復有竺旃檀稱王遣使貢馴象帝以殊方異獸恐為人患詔還之北狄匈奴匈奴之類總謂之北狄匈奴地南接燕趙北暨沙漠東連九夷西距六戎世世自相君臣不稟中國正朔夏曰薰鬻殷曰鬼方周曰獫狁漢曰匈奴其強弱盛衰風俗好尚區域所在皆列於前史前漢末匈奴大亂五單于爭立而呼韓邪單于失其國攜率部落入臣於漢漢嘉其意割并州北界以安之於是匈奴五千餘落入居朔方諸郡與漢人雜處呼韓邪感漢恩來朝漢因留之賜其邸舍猶因本號聽稱單于歲給緜絹錢穀有如列侯子孫傳襲歷代不絕其部落隨所居郡縣使宰牧之與編戶大同而不輸貢賦多歷年所戶口漸滋彌漫北朔轉難禁制後漢末天下騷動羣臣競言胡人猥多懼必為寇宜先為其防建安中魏武帝始分其衆為五部部立其中貴者為帥選漢人為司馬以監督之魏末復改帥為都尉其左部都尉所統可萬餘落居於太原故茲氏縣右部都尉可六千餘落居祁縣南部都尉可三千餘落居蒲子縣北部都尉可四千餘落居新興縣中部都尉可六千餘落居大陵縣武帝踐阼後塞外匈奴大水塞泥黑難等二萬餘落歸化帝復納之使居河西故宜陽城下後復與晉人雜居由是平陽西河太原新興上黨樂平諸郡靡不有焉泰始七年單于猛叛屯孔邪城武帝遣婁侯何楨持節討之楨素有志略以猛衆凶悍非少兵所制乃潛誘猛左部督李恪殺猛於是匈奴震服積年不敢復反其後稍因忿恨殺害長史漸為邊患侍御史西河郭欽上疏曰戎狄強獷歷古為患魏初人寡西北諸郡皆為戎居今雖服從若百年之後有風塵之警胡騎自平陽上黨不三日而至孟津北地西河太原馮翊安定上郡盡為狄庭矣宜及平吳之威謀臣猛將之略出北地西河安定復上郡實馮翊於平陽已北諸縣募取死罪徙三河三魏見士四萬家以充之裔不亂華漸徙平陽弘農魏郡京兆上黨雜胡峻四夷出入之防明先王荒服之制萬世之長策也帝不納至太康五年復有匈奴胡太阿厚率其部落二萬九千三百人歸化七年又有匈奴胡都大博及萎莎胡等各率種類大小凡十萬餘口詣雍州刺史扶風王駿降附明年匈奴都督大豆得一育鞠等復率種落大小萬一千五百口牛二萬二千頭羊十萬五千口車廬什物不可勝紀來降并貢其方物帝並撫納之北狄以部落為類其入居塞者有屠各種鮮支種寇頭種烏譚種赤勒種捍蛭種黑狼種赤沙種鬱鞞種萎莎種禿童種勃蔑種羌渠種賀賴種鍾跂種大樓種雍屈種真樹種力羯種凡十九種皆有部落不相雜錯屠各最豪貴故得為單于統領諸種其國號有左賢王右賢王左奕蠡王右奕蠡王左於陸王右於陸王左漸尚王右漸尚王左朔方王右朔方王左獨鹿王右獨鹿王左顯祿王右顯祿王左安樂王右安樂王凡十六等皆用單于親子弟也其左賢王最貴唯太子得居之其四姓有呼延氏卜氏蘭氏喬氏而呼延氏最貴則有左日逐右日逐世為輔相卜氏則有左沮渠右沮渠蘭氏則有左當戶右當戶喬氏則有左都侯右都侯又有車陽沮渠餘地諸雜號猶中國百官也其國人有綦毋氏勒氏皆勇健好反叛武帝時有騎督綦毋俔邪伐吳有功遷赤沙都尉惠帝元康中匈奴郝散攻上黨殺長吏入守上郡明年散弟度元又率馮翊北地羌胡攻破二郡自此已後北狄漸盛中原亂矣史臣曰夫宵形稟氣是稱萬物之靈繫土隨方迺有羣分之異蹈仁義者為中𧜛肆凶獷者為外夷譬諸草木區以別矣夷狄之徒名教所絕闚邊候隙自古為患稽諸前史憑陵匪一軒皇北逐唐帝南征殷后東戡周王西狩皆所以禦其侵亂也嬴劉之際匈奴最強元成之間呼韓委質漢嘉其節處之中壤歷年斯永種類逾繁舛號殊名不可勝載爰及泰始匪革前迷廣闢塞垣更招種落納萎莎之後附開育鞠之新降接帳連韝充郊掩甸既而沸脣成俗鳴鏑為羣振鴞響而挻災恣狼心而逞暴何楨縱策弗沮於姦萌郭欽馳疏無救於妖漸未環星紀坐傾都邑黎元塗地凶族滔天迹其所由抑武皇之失也吐谷渾分緒偽燕遠辭正嫡率東胡之餘衆掩西羌之舊宇網疏政暇地廣兵全廓萬里之基貽一匡之訓弗忘忠義良可嘉焉吐延夙標宏偉見方於項籍始遵朝化遽夭於姜聰高節不羣亦殊藩之秀也葉延至孝寄新哀於射草辟奚深友邁古烈於分荊視連蒸蒸光奉先之義視羆矯矯蘊經時之略洛干童幼早擅英規未騁雄心先摧凶手奉順者必敗豈天亡晉乎且渾廆連枝生自邊極各謀孫而翼子咸革裔而希華廆胤姦凶假鳳圖而竊號渾嗣忠謹距龍涸而歸誠懷姦者數世而亡資忠者累葉彌劭積善餘慶斯言信矣贊曰逖矣前王區別羣方叛由德弛朝因化昌武后升圖智昧遷胡遽淪家國多謝明謨谷渾英奮思矯穨運克昌其緒實資忠訓
