body:
  text: 晉書卷五十二列傳第二十二郤詵郤詵字廣基濟陰單父人也父晞尚書左丞詵博學多才瓌偉倜儻不拘細行州郡禮命並不應泰始中詔天下舉賢良直言之士太守文立舉詵應選詔曰蓋太上以德撫時易簡無文至于三代禮樂大備制度彌繁文質之變其理何由虞夏之際聖明係踵而損益不同周道既衰仲尼猶曰從周因革之宜又何殊也聖王既沒遺制猶存霸者迭興而翼輔之王道之缺其無補乎何陵遲之不反也豈霸德之淺歟期運不可致歟且夷吾之智而功止於霸何哉夫昔人之為政革亂亡之弊建不刊之統移風易俗刑措不用豈非化之盛歟何修而嚮茲朕獲承祖宗之休烈于茲七載而人未服訓政道罔述以古況今何不相逮之遠也雖明之弗及猶思與羣賢慮之將何以辨所聞之疑昧獲至論於讜言乎加自頃戎狄內侵災害屢作邊甿流離征夫苦役豈政刑之謬將有司非其任歟各悉乃心究而論之上明古制下切當今朕之失德所宜振補其正議無隱將敬聽之詵對曰伏惟陛下以聖德君臨猶垂意於博採故招賢正之士而臣等薄陋不足以降大問也是以竊有自疑之心雖致身於闕庭亦僶俛矣伏讀聖策乃知下問之旨篤焉臣聞上古推賢讓位教同德一故易簡而人化三代世及季末相承故文繁而後整虞夏之相因而損益不同非帝王之道異救弊之路殊也周當二代之流承彫偽之極盡禮樂之致窮制度之理其文詳備仲尼因時宜而曰從周非殊論也臣聞聖王之化先禮樂五霸之興勤政刑禮樂之化深政刑之用淺勤之則可以小安墮之則遂陵遲所由之路本近故所補之功不侔也而齊桓失之葵丘夷吾淪于小器功止于霸不亦宜乎策曰建不刊之統移風易俗使天下洽和何修而嚮茲臣以為莫大於擇人而官之也今之典刑匪無一統宰牧之才優劣異績或以之興或以之替此蓋人能弘政非政弘人也舍人務政雖勤何益臣竊觀乎古今而考其美惡古人相與求賢今人相與求爵古之官人君責之於上臣舉之於下得其人有賞失其人有罰安得不求賢乎今之官者父兄營之親戚助之有人事則通無人事則塞安得不求爵乎賢苟求達達在修道窮在失義故靜以待之也爵苟可求得在進取失在後時故動以要之也動則爭競爭競則朋黨朋黨則誣誣則臧否失實真偽相冒主聽用惑姦之所會也靜則貞固貞固則正直正直則信讓信讓則推賢推賢不伐相下無饜主聽用察德之所趣也故能使之靜雖日高枕而人自正不能禁動雖復夙夜俗不一也且人無愚智咸慕名宦莫不飾正於外藏邪於內故邪正之人難得而知也任得其正則衆正益至若得其邪則衆邪亦集物繁其類誰能止之故亡國失世者未嘗不為衆邪所積也方其初作必始於微微而不絕其終乃著天地不能頓為寒暑人主亦不能頓為隆替故寒暑漸於春秋隆替起於得失當今之世宦者無關梁邪門啟矣朝廷不責賢正路塞矣得失之源何以甚此所謂責賢使之相舉也所謂關梁使之相保也賢不舉則有咎保不信則有罰故古者諸侯必貢士不貢者削貢而不適亦削夫士者難知也不適者薄過也不得不責強其所不知也罰其所不適深其薄過非恕也且天子於諸侯有不純臣之義斯責之矣施行之道寧縱不濫之矣今皆反是何也夫賢者天地之紀品物之宗其急之也故寧濫以得之無縱以失之也今則不然世之悠悠者各自取辨耳故其材行並不可必於公則政事紛亂於私則汙穢狼籍自頃長吏特多此累有亡命而被購懸者矣有縛束而絞戮者矣貪鄙竊位不知誰升之者獸兕出檻不知誰可咎者漏網吞舟何以過此人之於利如蹈水火焉前人雖敗後人復起如彼此無已誰止之者風流日競誰憂之者雖今聖思勞於夙夜所使為政得此屬欲聖世化美俗平亦俟河之清耳若欲善之宜創舉賢之典峻關梁之防其制既立則人慎其舉而不苟則賢者可知知賢而試則官得其人矣官得其人則事得其序事得其序則物得其宜物得其宜則生生豐植人用資給和樂興焉是故寡過而遠刑知恥以近禮此所以建不刊之統移風易俗刑措而不用也策曰自頃夷狄內侵災眚屢降將所任非其人乎何由而至此臣聞蠻夷猾夏則臯陶作士此欲善其末則先其本也夫任賢則政惠使能則刑恕政惠則下仰其施刑恕則人懷其勇施以殖其財勇以結其心故人居則資贍而知方動則親上而志勇苟思其利而除其害以生道利之者雖死不貳以逸道勞之者雖勤不怨故其命可授其力可竭以戰則克以攻則拔是以善者慕德而安服惡者畏懼而削迹止戈而武義實在文唯任賢然後無患耳若夫水旱之災自然理也故古者三十年耕必有十年之儲堯湯遭之而人不困有備故也自頃風雨雖頗不時考之萬國或境土相接而豐約不同或頃畝相連而成敗異流固非天之必害於人人實不能均其勞苦失之於人而求之於天則有司惰職而不勸百姓殆業而咎時非所以定人志致豐年也宜勤人事而已臣誠愚鄙不足以奉對聖朝猶進之於廷者將使取諸其懷而獻之乎臣懼不足也若收不知言以致知言臣則可矣是以辭鄙不隱也以對策上第拜議郎母憂去職詵母病苦無車及亡不欲車載柩家貧無以巿馬乃於所住堂北壁外假葬開戶朝夕拜哭養雞種蒜竭其方術喪過三年得馬八匹輿柩至冢負土成墳未畢召為征東參軍徙尚書郎轉車騎從事中郎吏部尚書崔洪薦詵為左丞及在職嘗以事劾洪洪怨詵詵以公正距之語在洪傳洪聞而慚服累遷雍州刺史武帝於東堂會送問詵曰卿自以為何如詵對曰臣舉賢良對策為天下第一猶桂林之一枝崑山之片玉帝笑侍中奏免詵官帝曰吾與之戲耳不足怪也詵在任威嚴明斷甚得四方聲譽卒於官子延登為州別駕阮种阮种字德猷陳留尉氏人漢侍中胥卿八世孫也弱冠有殊操為嵇康所重康著養生論所稱阮生即种也察孝廉為公府掾是時西虜內侵災眚屢見百姓饑饉詔三公卿尹常伯牧守各舉賢良方正直言之士於是太保何曾舉种賢良策曰在昔哲王承天之序光宅宇宙咸用規矩乾坤惠康品類休風流衍彌于千載朕應踐洪運統位七載於今矣惟德弗嗣不明于政宵興惕厲未燭厥猷子大夫韞韥道術儼然而進朕甚嘉焉其各悉乃心以闡喻朕志深陳王道之本勿有所隱朕虛心以覽焉种對曰夫天地設位聖人成能王道至深所以行化至遠故能開物成務而功業不匱近無不聽遠無不服德逮羣生澤被區宇聲施無窮而典垂百代故經曰聖人久於其道而天下化成宜師蹤往代襲迹三五矯世更俗以從人望令率士遷義下知所適播醇美之化杜邪枉之路斯誠羣黎之所欣想盛德而幸望休風也又問政刑不宣禮樂不立對曰政刑之宣故由乎禮樂之用昔之明王唯此之務所以防遏暴慢感動心術制節生靈而陶化萬姓也禮以體德樂以詠功樂本於和而禮師於敬矣又問戎蠻猾夏對曰戎蠻猾夏侵敗王略雖古盛世猶有此虞故詩稱獫狁孔熾書歎蠻夷帥服自魏氏以來夷虜內附鮮有桀悍侵漁之患由是邊守遂怠鄣塞不設而今醜虜內居與百姓雜處邊吏擾習人又忘戰受方任者又非其材或以狙詐侵侮邊夷或干賞啗利妄加討戮夫以微羈而御悍馬又乃操以煩策其不制者固其理也是以羣醜蕩駭緣間而動雖三州覆敗牧守不反此非胡虜之甚勁蓋用之者過也臣聞王者之伐有征無戰懷遠以德不聞以兵夫兵凶器而戰危事也丘興則傷農衆集則費積農傷則人匱積費則國虛昔漢武之世承文帝之業資海內之富役其材臣以甘心匈奴競戰勝之功貪攻取之利良將勁卒屈於沙漠勝敗相若克不過當夭百姓之命填餓狼之口及其以衆制寡令匈奴遠迹收功祁連飲馬瀚海天下之秏已過太半矣夫虛中國以事夷狄誠非計之得者也是以盜賊蜂起山東不振暨宣元之時趙充國征西零馮奉世征南羌皆兵不血刃摧抑強暴擒其首惡此則折衝厭難勝敗相辨中世之明效也又問咎徵作見對曰陰陽否泰六沴之災則人主修政以禦之思患而防之建皇極之首詳庶徵之用詩曰敬之敬之天惟顯思天聰明自我人聰明是以人主祖承天命日慎一日也故能應受多福而永世克祚此先王之所以退災消眚也又問經化之務對曰夫王道之本經國之務必先之以禮義而致人於廉恥禮義立則君子軌道而讓於善廉恥立則小人謹行而不淫於制度賞以勸其能威以懲其廢此先王所以保定功化洽黎元而勳業長世也故上有克讓之風則下有不爭之俗朝有矜節之士則野無貪冒之人夫廉恥之於政猶樹藝之有豐壤良歲之有膏澤其生物必油然茂矣若廉恥不存而惟刑是御則風俗彫弊人失其性錐刀之末皆有爭心雖峻刑嚴辟猶不勝矣其於政也如農者之殖磽野旱年之望豐穡必不幾矣此三代所以享德長久風醇俗美皆數百年保天之祿而秦二世而弊者蓋其所由之塗殊也又問將使武成七德文濟九功何路而臻于茲凡厥庶事曷後曷先對曰夫文武經德所以成功丕業咸熙庶績者莫先於選建明哲授方任能令才當其官而功稱其職則萬機咸理庶僚不曠書曰天工人其代之然則繼天理物寧國安家非賢無以成也夫賢才之畜於國由良工之須利器巧匠之待繩墨也器用利則削易而材不病繩墨設則曲直正而衆形得矣是以人主必勤求賢而佚以任之也賢臣之於主進則忠國愛人退則砥節潔志營職不干私義出心必由公塗明度量以呈其能審經制以效其功此昔之聖王所以恭己南面而化於陶鈞之上者以其所任之賢與所賢之信也方今海內之士皆傾望休光希心紫極唯明主之所趣舍若開四聰之聽廣疇咨之求抽羣英延俊考工授職呈能制官朝無素餐之士如此化流罔極樹功不朽矣時种與郤詵及東平王康俱居上第即除尚書郎然毀譽之徒或言對者因緣假託帝乃更延羣士庭以問之詔曰前者對策各指答所問未盡子大夫所欲言故復延見其具陳所懷又比年連有水旱災眚雖戰戰兢兢未能究天人之理當何修以應其變人遇水旱饑饉者何以救之中間多事未得寧靜思以省息煩務令百姓不失其所若人有所患苦者有宜損益使公私兩濟者委曲陳之又政在得人而知之至難唯有因人視聽耳若有文武隱逸之士各舉所知雖幽賤負俗勿有所限故虛心思聞事實勿務華辭莫有所諱也种對曰伏惟陛下以聖哲玄覽降卹黎蒸將濟元元同之三代旁求俊以輔至化此誠堯舜之用心也臣猥以頑魯之質應清明之舉前者對策不足以疇塞聖詔所陳不究臣誠蒙昧所以為罪臣聞天生蒸庶樹君以司牧之人君道洽則彝倫攸序五福來備若政有愆失刑理頗僻則庶徵不應而淫亢為災此則天人之理而興廢之由也昔之聖王政道備而制先具軌人以務致之於本是以雖有水旱之眚而無饑饉之患也自頃陰陽隔并水旱為災亦猶期運之致不然則亦有司之不帥不能宣承聖德以贊揚大化故和氣未降而人事未也方今百姓凋弊公私無儲誠在於休役靜人勸嗇務分此其救也人之所患由於役煩網密而信道未孚也役煩則百姓失業網密則下背其誠信道未孚則人無固志此則損益之至務安危之大端也傳曰始與善善進則不善蔑由至孔子曰視其所以觀其所由人焉廋哉若夫文武隱逸之士幽賤負俗之才故非愚臣之所能識謹竭愚以對策奏帝親覽焉又擢為第一轉中書郎進止有方正己率下朝廷咸憚其威容每為駁議事皆施用遂為楷則遷平原相時襄邑衞京自南陽太守遷于河內與种俱拜帝望而歎曰二千石皆若此朕何憂乎种為政簡惠百姓稱之卒于郡華譚袁甫華譚字令思廣陵人也祖融吳左將軍錄尚書事父諝吳黃門郎譚朞歲而孤母年十八便守節鞠養勤勞備至及長好學不倦爽慧有口辯為鄰里所重揚州刺史周浚引為從事史愛其才器待以賓友之禮太康中刺史嵇紹舉譚秀才將行別駕陳總餞之因問曰思賢之主以求才為務進取之士以功名為先何仲舒不仕武帝之朝賈誼失分漢文之時此吳晉之滯論可辨此理而後別譚曰夫聖人在上物無不理百揆之職非賢不居故山林無匿景衡門不棲遲至承統之王或是中才或復凡人居聖人之器處兆庶之上是以其教日穨風俗漸弊又中才之君所資者偏物以類感必於其黨黨言雖非彼以為是以所授有顏冉之賢所用有廊廟之器居官者日冀元凱之功在上者日庶堯舜之義彼豈知其政漸毀哉朝雖有求賢之名而無知才之實言雖當彼以為誣策雖奇彼以為妄誣則毀己之言入妄則不忠之責生豈故為哉淺明不見深理近才不覩遠體也是以言不用計不施恐死亡之不暇何論功名之立哉故上官昵而屈原放宰嚭寵而伍員戮豈不哀哉若仲舒抑於孝武賈誼失於漢文蓋復是其輕者耳故白起有云非得賢之難用之難非用之難信之難得賢而不能用用而不能信功業豈可得而成哉譚至洛陽武帝親策之曰今四海一統萬里同風天下有道莫斯之盛然北有未羈之虜西有醜施之氐故謀夫未得高枕邊人未獲晏然將何以長弭斯患混清六合對曰臣聞聖人之臨天下也祖乾綱以流化順谷風以興仁兼三才以御物開四聰以招賢故勞謙日昃務在擇才宣明巖穴垂光隱滯俊龍躍帝道以光清德鳳翔王化克舉是以臯陶見舉不仁者遠陸賈重漢遠夷折節今聖朝德音發於帷幄清風翔乎無外戎旗南指江漢席卷干戈西征羌蠻慕化誠闡四門之秋興禮教之日也故髦俊聞聲而響赴殊才望險而雲集虛高館以俟賢設重爵以待士急善過於饑渴用人疾於影響杜佞諂之門廢鄭聲之樂混清六合實由乎此雖西北有未羈之寇殊漠有不朝之虜征之則勞師得之則無益故班固云有其地不可耕而食得其人不可臣而畜來則懲而禦之去則備而守之蓋安邊之術也又策曰吳蜀恃險今既蕩平蜀人服化無攜貳之心而吳人趑雎屢作妖寇豈蜀人敦樸易可化誘吳人輕銳難安易動乎今將欲綏靜新附何以為先對曰臣聞漢末分崩英雄鼎峙蜀棲岷隴吳據江表至大晉龍興應期受命文皇運籌安樂順軌聖上潛謀歸命向化蜀染化日久風教遂成吳始初附未改其化非為蜀人敦売心而吳人易動也然殊俗遠境風土不同吳阻長江舊俗輕悍所安之計當先籌其人士使雲翔閶闔進其賢才待以異禮明選牧伯致以威風輕其賦斂將順咸悅可以永保無窮長為人臣者也又策曰聖人稱如有王者必世而後仁今天成地平大化無外雖匈奴未羈羌氐驕黠將修文德以綏之舞干戚以來之故兵戈載戢武夫寢息如此已可消鋒刃為佃器罷尚方武庫之用未邪對曰夫唐堯歷載頌聲乃作文武相承禮樂大同清一八紘綏盪無外萬國順軌海內斐然雖復被髮之鄉徒跣之國皆習章甫而入朝要衣裳以磬折夫大舜之德猶有三苗之征以周之盛獫狁為寇雖有文德又須武備備預不虞古之善教安不忘危聖人常誡無為罷武庫之常職鑠鋒刃為佃器自可倒戢干戈苞以獸皮將帥之士使為諸侯於散樂休風未為不泰也又策曰夫法令之設所以隨時制也時險則峻法以取平時泰則寬網以將化今天下太平四方無事百姓承德將就無為而至於律令應有所損益不對曰臣聞五帝殊禮三王異教故或禪讓以光政或干戈以攻取至於興禮樂以和人流清風以寧俗其歸一也今誠風教大同四海無虞人皆感化去邪從正夫以堯舜之盛而猶設象刑殷周之隆而甫侯制律律令之存何妨於政若乃大道四達禮樂交通凡人修行黎庶勵節刑罰懸而不用律令存而無施適足以隆太平之雅化飛仁風乎無外矣又策曰昔帝舜以二八成功文王以多士興周夫制化在於得人而賢才難得今大統始同宜搜才實州郡有貢薦之舉猶未獲出羣卓越之倫將時無其人有而致之未得其理也對曰臣聞興化立法非賢無以光其道平世理亂非才無以宣其業上自皇羲下及帝王莫不張皇綱以羅遠飛仁風以被物故得賢則教興失人則政廢今四海一統萬里同風州郡貢秀孝臺府簡良才以八紘之廣兆庶之衆豈當無卓越儁逸之才乎譬猶南海不少明月之寶大宛不乏千里之駒也異哲難見遠數難覩故堯舜太平之化二八由舜而甫顯殷湯革王之命伊尹負鼎而方用當今聖朝禮亡國之士接遐裔之人或貂蟬於帷幄或剖符於千里巡狩必有呂公之遇宵夢必有巖穴之感賢儁之出可企踵而待也時九州秀孝策無逮譚者譚素以才學為東土所推同郡劉頌時為廷尉見之歎息曰不悟鄉里乃有如此才也博士王濟於衆中嘲之曰五府初開羣公辟命採英奇於仄陋拔賢儁於巖穴君吳楚之人亡國之餘有何秀異而應斯舉譚答曰秀異固產於方外不出於中域也是以明珠文貝生於江鬱之濱夜光之璞出乎荊藍之下故以人求之文王生於東夷大禹生於西羌子弗聞乎昔武王克商遷殷頑民於洛邑諸君得非其苗裔乎濟又曰夫危而不持顛而不扶至於君臣失位國亡無主凡在冠帶將何所取哉答曰吁存亡有運興衰有期天之所廢人不能支徐偃修仁義而失國仲尼逐魯而逼齊段干偃息而成名諒否泰有時曷人力之所能哉濟甚禮之尋除郎中遷太子舍人本國中正以母憂去職服闋為鄄城令過濮水作莊子贊以示功曹而廷掾張延為作答教其文甚美譚異而薦之遂見升擢及譚為廬江延已為淮陵太守又舉寒族周訪為孝廉訪果立功名時以譚為知人以父墓毀去官尋除尚書郎永寧初出為郟令于時兵亂之後境內饑饉譚傾心撫卹司徒王戎聞而善之出穀三百斛以助之譚甚有政績再遷廬江內史加綏遠將軍時石冰之黨陸珪等屯據諸縣譚遣司馬褚敦討平之又遣別軍擊冰都督孟徐獲其驍率以功封都亭侯食邑千戶賜絹千匹陳敏之亂吳士多為其所逼顧榮先受敏官而潛謀圖之譚不悟榮旨露檄遠近極言其非由此為榮所怨又在郡政嚴而與上司多忤揚州刺史劉陶素與譚不善因法收譚下壽陽獄鎮東將軍周馥與譚素相親善理而出之及甘卓討馥百姓奔散馥謂譚已去遣人視之而更移近馥馥歎曰吾嘗謂華令思是臧子源之疇今果效矣甘卓嘗為東海王越所捕下令敢有匿者誅之卓投譚而免及此役也卓遣人求之曰華侯安在吾甘揚威使也譚答不知遺絹二匹以遣之使反告卓卓曰此華侯也復求之譚已亡矣後為紀瞻所薦而為顧榮所止遏遂數年不得調建興初元帝命為鎮東軍諮祭酒譚博學多通在府無事乃著書三十卷名曰辨道上牋進之帝親自覽焉轉丞相軍諮祭酒領郡大中正譚薦干寶范珧於朝乃上牋求退曰譚聞霸主遠聽以求才為務僚屬量身以審己為分故疎廣告老漢宣不違其志干木偃息文侯就式其廬譚無古人之賢竊有懷遠之慕自登清顯出入二載執筆無贊事之功拾遺無補闕之績過在納言闇於舉善狂寇未賓復乏謀策年向七十志力日衰素餐無勞實宜辭退謹奉還所假左丞相軍諮祭酒版不聽建武初授祕書監固讓不拜太興初拜前軍以疾復轉祕書監自負宿名怏怏不得志時晉陵朱鳳吳郡吳震並學行清修老而未調譚皆薦為著作佐郎或問譚曰諺言人之相去如九牛毛寧有此理乎譚對曰昔許由巢父讓天子之貴市道小人爭半錢之利此之相去何啻九牛毛也聞者稱善戴若思弟邈則譚女壻也譚平生時常抑若思而進邈若思每銜之殆用事毀譚於帝由是官塗不至譚每懷觖望嘗從容言於帝曰臣已老矣將待死祕閣汲黯之言復存於今帝不懌久之加散騎常侍屢以疾辭及王敦作逆譚疾甚不能入省坐免卒於家贈光祿大夫金章紫綬加散騎常侍諡曰胡二子化茂化字長風為征虜司馬討汲桑戰沒茂嗣爵淮南袁甫字公冑亦好學與譚齊名以詞辯稱嘗詣中領軍何勖自言能為劇縣勖曰唯欲宰縣不為臺閣職何也甫曰人各有能有不能譬繒中之好莫過錦錦不可以為穀中之美莫過稻稻不可以為齏是以聖王使人必先以器苟非周材何能悉長黃霸馳名於州郡而息譽於京邑廷尉之材不為三公自昔然也勖善之除松滋令轉淮南國大農郎中令石珩問甫曰卿名能辯豈知壽陽已西何以旱壽陽已東何以水甫曰壽陽已東皆是吳人夫亡國之音哀以思鼎足強邦一朝失職憤歎甚積積憂成陰陰積成雨雨久成水故其域澇也壽陽已西皆是中國新平強吳美寶皆入志盈心滿用長歡娛公羊有言魯僖甚悅故致旱京師若能抑強扶弱先疏後親則天下和平災害不生矣觀者歎其敏捷年八十餘卒於家史臣曰夫緝政釐俗拔羣才以成務振景觀光俟明主而宣績武皇之世天下安朝廷屬意於求賢薖軸有懷於干祿郤詵等並韞價州里然應召對揚天問高步雲衢求之前哲亦足稱矣令思行己徇義志篤周甘仁者必勇抑斯之謂雖才行夙章而待終祕閣積薪之恨豈獨古人乎贊曰郤阮洽聞含章體政華生毓德褫巾應命鳥路曾飛龍津派泳素業可久高芬斯盛
