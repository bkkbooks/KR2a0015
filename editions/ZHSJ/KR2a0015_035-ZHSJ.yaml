body:
  text: 晉書卷三十五列傳第五陳騫子輿陳騫臨淮東陽人也父矯魏司徒矯本廣陵劉氏為外祖陳氏所養因而改焉騫沈厚有智謀初矯為尚書令侍中劉曄見幸於魏明帝譖矯專權矯憂懼以問騫騫曰主上明聖大人大臣今若不合意不過不作公耳後帝意果釋騫尚少為夏侯玄所侮意色自若玄以此異之起家尚書郎遷中山安平太守並著稱績徵為相國司馬長史御史中丞遷尚書封安國亭侯蜀賊寇隴右以尚書持節行征蜀將軍破賊而還會諸葛誕之亂復以尚書行安東將軍壽春平拜使持節都督淮北諸軍事安東將軍進爵廣陵侯轉都督豫州諸軍事豫州刺史持節將軍如故又轉都督江南諸軍事徙都督荊州諸軍事征南大將軍封郯侯武帝受禪以佐命之勳進車騎將軍封高平郡公遷侍中大將軍出為都督揚州諸軍事餘如故假黃鉞攻拔吳枳里城破涂中屯戍賜騫兄子悝爵關中侯咸寧初遷太尉轉大司馬騫因入朝言於帝曰胡烈牽弘皆勇而無謀強於自用非綏邊之材將為國恥願陛下詳之時弘為揚州刺史不承順騫命帝以為不協相構於是徵弘既至尋復以為涼州刺史騫竊歎息以為必敗二人後果失羌戎之和皆被寇喪沒征討連歲僅而得定帝乃悔之騫少有度量含垢匿瑕所在有績與賈充石苞裴秀等俱為心膂而騫智度過之充等亦自以為不及也累處方任為士庶所懷既位極人臣年踰致仕思欲退身咸寧三年求入朝因乞骸骨賜衮冕之服詔曰騫元勳舊德統東夏方弘遠績以一吳會而所苦未除每表懇切重勞以方事今聽留京城以前太尉府為大司馬府增置祭酒二人帳下司馬官騎大車鼓吹皆如前親兵百人廚田十頃廚園五十畝廚士十人器物經用皆留給焉又給乘輿輦出入殿中加鼓吹如漢蕭何故事騫累稱疾辭位詔曰騫履德論道朕所諮詢方賴謀猷以弘庶績宜時視事可遣散騎常侍諭意騫輒歸第詔又遣侍中敦諭還府遂固請許之位同保傅在三司之上賜以几杖不朝安車駟馬以高平公還第帝以其勳舊耆老禮之甚重又以騫有疾聽乘輿上殿騫素無謇諤之風然與帝語傲及見皇太子加敬時人以為諂弟稚與其子輿忿爭遂說騫子女穢行騫表徙弟以此獲譏於世元康二年薨年八十一加以衮斂贈太傅諡曰武及葬帝於大司馬門喪望柩流涕禮依大司馬石苞故事子輿嗣爵輿字顯初拜散騎侍郎洛陽令遷黃門侍郎歷將校左軍大司農侍中坐與叔父不睦出為河內太守輿雖無檢正而有力致尋卒子植字弘先嗣官至散騎常侍卒子粹嗣永嘉中遇害孝武帝以騫玄孫襲爵卒弟子浩之嗣宋受禪國除裴秀子頠秀從弟楷楷子憲裴秀字季彥河東聞喜人也祖茂漢尚書令父潛魏尚書令秀少好學有風操八歲能屬文叔父徽有盛名賓客甚衆秀年十餘歲有詣徽者出則過秀然秀母賤嫡母宣氏不之禮嘗使進饌於客見者皆為之起秀母曰微賤如此當應為小兒故也宣氏知之後遂止時人為之語曰後進領袖有裴秀渡遼將軍毋丘儉嘗薦秀於大將軍曹爽曰生而岐嶷長蹈自然玄靜守真性入道奧博學強記無文不該孝友著於鄉黨高聲聞於遠近誠宜弼佐謨明助和鼎味毗贊大府光昭盛化非徒子奇甘羅之儔兼包顏冉游夏之美爽乃辟為掾襲父爵清陽亭侯遷黃門侍郎爽誅以故吏免頃之為廷尉正歷文帝安東及衞將軍司馬軍國之政多見信納遷散騎常侍帝之討諸葛誕也秀與尚書僕射陳泰黃門侍郎鍾會以行臺從豫參謀略及誕平轉尚書進封魯陽鄉侯增邑千戶常道鄉公立以豫議定策進爵縣侯增邑七百戶遷尚書僕射魏咸熙初釐革憲司時荀顗定禮儀賈充正法律而秀改官制焉秀議五等之爵自騎督已上六百餘人皆封於是秀封濟川侯地方六十里邑千四百戶以高苑縣濟川墟為侯國初文帝未定嗣而屬意舞陽侯攸武帝懼不得立問秀曰人有相否因以奇表示之秀後言於文帝曰中撫軍人望既茂天表如此固非人臣之相也由是世子乃定武帝既即王位拜尚書令右光祿大夫與御史大夫王沉衞將軍賈充俱開府加給事中及帝受禪加左光祿大夫封鉅鹿郡公邑三千戶時安遠護軍郝詡與故人書云與尚書令裴秀相知望其為益有司奏免秀官詔曰不能使人之不加諸我此古人所難交關人事詡之罪耳豈尚書令能防乎其勿有所問司隸校尉李憙復上言騎都尉劉尚為尚書令裴秀占官稻田求禁止秀詔又以秀幹翼朝政有勳績於王室不可以小疵掩大德使推正尚罪而解秀禁止焉久之詔曰夫三司之任以翼宣皇極弼成王事者也故經國論道賴之明喆苟非其人官不虛備尚書令左光祿大夫裴秀雅量弘博思心通遠先帝登庸贊事前朝朕受明命光佐大業勳德茂著配蹤元凱宜正位居體以康庶績其以秀為司空秀儒學洽聞且留心政事當禪代之際總納言之要其所裁當禮無違者又以職在地官以禹貢山川地名從來久遠多有變易後世說者或強牽引漸以闇昧於是甄擿舊文疑者則闕古有名而今無者皆隨事注列作禹貢地域圖十八篇奏之藏於祕府其序曰圖書之設由來尚矣自古立象垂制而賴其用三代置其官國史掌厥職暨漢屠咸陽丞相蕭何盡收秦之圖籍今祕書既無古之地圖又無蕭何所得惟有漢氏輿地及括地諸雜圖各不設分率又不考正準望亦不備載名山大川雖有粗形皆不精審不可依據或荒外迂誕之言不合事實於義無取大晉龍興混一六合以清宇宙始於庸蜀冞入其岨文皇帝乃命有司撰訪吳蜀地圖蜀土既定六軍所經地域遠近山川險易征路迂直校驗圖記罔或有差今上考禹貢山海川流原隰陂澤古之九州及今之十六州郡國縣邑疆界鄉陬及古國盟會舊名水陸徑路為地圖十八篇制圖之體有六焉一曰分率所以辨廣輪之度也二曰準望所以正彼此之體也三曰道里所以定所由之數也四曰高下五曰方邪六曰迂直此三者各因地而制宜所以校夷險之異也有圖象而無分率則無以審遠近之差有分率而無準望雖得之於一隅必失之於他方有準望而無道里則施於山海絕隔之地不能以相通有道里而無高下方邪迂直之校則徑路之數必與遠近之實相違失準望之正矣故以此六者參而考之然遠近之實定於分率彼此之實定於道里度數之實定於高下方邪迂直之算故雖有峻山鉅海之隔絕域殊方之迥登降詭曲之因皆可得舉而定者準望之法既正則曲直遠近無所隱其形也秀創制朝儀廣陳刑政朝廷多遵用之以為故事在位四載為當世名公服寒食散當飲熱酒而飲冷酒泰始七年薨時年四十八詔曰司空經德履哲體蹈儒雅佐命翼世勳業弘茂方將宣獻敷制為世宗範不幸薨殂朕甚痛之其賜祕器朝服一具衣一襲錢三十萬布百匹諡曰元初秀以尚書三十六曹統事準例不明宜使諸卿任職未及奏而薨其友人料其書記得表草言平吳之事其詞曰孫晧酷虐不及聖明御世兼弱攻昧使遺子孫將遂不能臣時有否泰非萬安之勢也臣昔雖已屢言未有成旨今既疾篤不起謹重尸啟願陛下時共施用乃封以上聞詔報曰司空薨痛悼不能去心又得表草雖在危困不忘王室盡忠憂國省益傷切輒當與諸賢共論也咸寧初與石苞等並為王公配享廟庭有二子濬頠濬嗣位至散騎常侍早卒濬庶子憬不惠別封高陽亭侯以濬少弟頠嗣頠字逸民弘雅有遠識博學稽古自少知名御史中丞周弼見而嘆曰頠若武庫五兵縱橫一時之傑也賈充即頠從母夫也表秀有佐命之勳不幸嫡長喪亡遺孤稚弱頠才德英茂足以興隆國嗣詔頠襲爵頠固讓不許太康二年徵為太子中庶子遷散騎常侍惠帝即位轉國子祭酒兼右軍將軍初頠兄子憬為白衣頠論述世勳賜爵高陽亭侯楊駿將誅也駿黨左軍將軍劉豫陳兵在門遇頠問太傅所在頠紿之曰向於西掖門遇公乘素車從二人西出矣豫曰吾何之頠曰宜至廷尉豫從頠言遂委而去尋而詔頠代豫領左軍將軍屯萬春門及駿誅以功當封武昌侯頠請以封憬帝竟封頠次子該頠苦陳憬本承嫡宜襲鉅鹿先帝恩旨辭不獲命武昌之封己之所蒙特請以封憬該時尚主故帝不聽累遷侍中時天下暫寧頠奏修國學刻石寫經皇太子既講釋奠祀孔子飲饗射侯甚有儀序又令荀藩終父勖之志鑄鐘鑿磬以備郊廟朝享禮樂頠通博多聞兼明醫術荀勖之修律度也檢得古尺短世所用四分有餘頠上言宜改諸度量若未能悉革可先改太醫權衡此若差違遂失神農岐伯之正藥物輕重分兩乖互所可傷夭為害尤深古壽考而今短折者未必不由此也卒不能用樂廣嘗與頠清言欲以理服之而頠辭論豐博廣笑而不言時人謂頠為言談之林藪頠以賈后不悅太子抗表請增崇太子所生謝淑妃位號仍啟增置後衞率吏給三千兵於是東宮宿衞萬人遷尚書侍中如故加光祿大夫每授一職未嘗不殷勤固讓表疏十餘上博引古今成敗以為言覽之者莫不寒心頠深慮賈后亂政與司空張華侍中賈模議廢之而立謝淑妃華模皆曰帝自無廢黜之意若吾等專行之上心不以為是且諸王方剛朋黨異議恐禍如發機身死國危無益社稷頠曰誠如公慮但昏虐之人無所忌憚亂可立待將如之何華曰卿二人猶且見信然勤為左右陳禍福之戒冀無大悖幸天下尚安庶可優游卒歲此謀遂寢頠旦夕勸說從母廣城君令戒喻賈后親待太子而已或說頠曰幸與中宮內外可得盡言言若不行則可辭病屏退若二者不立雖有十表難乎免矣頠慨然久之而竟不能行遷尚書左僕射侍中如故頠雖后之親屬然雅望素隆四海不謂之以親戚進也惟恐其不居位俄復使頠專任門下事固讓不聽頠上言賈模適亡復以臣代崇外戚之望彰偏私之舉后族何常有能自保皆知重親無脫者也然漢二十四帝惟孝文光武明帝不重外戚皆保其宗豈將獨賢實以安理故也昔穆叔不拜越禮之饗臣亦不敢聞殊常之詔又表云咎繇謨虞伊尹相商呂望翊周蕭張佐漢咸播功化光格四極暨于繼體咎單傅說祖己樊仲亦隆中興或明揚側陋或起自庶族豈非尚德之舉以臻斯美哉歷觀近世不能慕遠溺於近情多任后親以致不靜昔疎廣戒太子以舅氏為官屬前世以為知禮況朝廷何取於外戚正復才均尚當先其疏者以明至公漢世不用馮野王即其事也表上皆優詔敦譬時以陳準子匡韓蔚子嵩並侍東宮頠諫曰東宮之建以儲皇極其所與游接必簡英俊宜用成德匡嵩幼弱未識人理立身之節東宮實體夙成之表而今有童子侍從之聲未是光闡遐風之弘理也愍懷太子之廢也頠與張華苦爭不從語在華傳頠深患時俗放蕩不尊儒術何晏阮籍素有高名於世口談浮虛不遵禮法尸祿耽寵仕不事事至王衍之徒聲譽太盛位高勢重不以物務自嬰遂相放效風教陵遲乃著崇有之論以釋其蔽曰夫總混羣本宗極之道也方以族異庶類之品也形象著分有生之體也化感錯綜理迹之原也夫品而為族則所稟者偏偏無自足故憑乎外資是以生而可尋所謂理也理之所體所謂有也有之所須所謂資也資有攸合所謂宜也擇乎厥宜所謂情也識智既授雖出處異業默語殊塗所以寶生存宜其情一也衆理並而無害故貴賤形焉失得由乎所接故吉凶兆焉是以賢人君子知欲不可絕而交物有會觀乎往復稽中定務惟夫用天之道分地之利躬其力任勞而後饗居以仁順守以恭儉率以忠信行以敬讓志無盈求事無過用乃可濟乎故大建厥極綏理羣生訓物垂範於是乎在斯則聖人為政之由也若乃淫抗陵肆則危害萌矣故欲衍則速患情佚則怨博擅恣則興攻專利則延寇可謂以厚生而失生者也悠悠之徒駭乎若茲之釁而尋艱爭所緣察夫偏質有弊而覩簡損之善遂闡貴無之議而建賤有之論賤有則必外形外形則必遺制遺制則必忽防忽防則必忘禮禮制弗存則無以為政矣衆之從上猶水之居器也故兆庶之情信於所習習則心服其業業服則謂之理然是以君人必慎所教班其政刑一切之務分宅百姓各授四職能令稟命之者不肅而安忽然忘異莫有遷志況於據在三之尊懷所隆之情敦以為訓者哉斯乃昏明所階不可不審夫盈欲可損而未可絕有也過用可節而未可謂無貴也蓋有講言之具者深列有形之故盛稱空無之美形器之故有徵空無之義難檢辯巧之文可悅似象之言足惑衆聽眩焉溺其成說雖頗有異此心者辭不獲濟屈於所狎因謂虛無之理誠不可蓋唱而有和多往弗反遂薄綜世之務賤功烈之用高浮游之業埤經實之賢人情所殉篤夫名利於是文者衍其辭訥者讚其旨染其衆也是以立言藉於虛無謂之玄妙處官不親所司謂之雅遠奉身散其廉操謂之曠達故砥礪之風彌以陵遲放者因斯或悖吉凶之禮而忽容止之表瀆棄長幼之序混漫貴賤之級其甚者至於裸裎言笑忘宜以不惜為弘士行又虧矣老子既著五千之文表摭穢雜之弊甄舉靜一之義有以令人釋然自夷合於易之損謙艮節之旨而靜一守本無虛無之謂也損艮之屬蓋君子之一道非易之所以為體守本無也觀老子之書雖博有所經而云有生於無以虛為主偏立一家之辭豈有以而然哉人之既生以保生為全全之所階以順感為務若味近以虧業則沈溺之釁興懷末以忘本則天理之真滅故動之所交存亡之會也夫有非有於無非無於無非無於有非有是以申縱播之累而著貴無之文將以絕所非之盈謬存大善之中節收流遁於既過反澄正于胸懷宜其以無為辭而旨在全有故其辭曰以為文不足若斯則是所寄之塗一方之言也若謂至理信以無為宗則偏而害當矣先賢達識以非所滯示之深論惟班固著難未足折其情孫卿楊雄大體抑之猶偏有所許而虛無之言日以廣衍衆家扇起各列其說上及造化下被萬事莫不貴無所存僉同情以衆固乃號凡有之理皆義之埤者薄而鄙焉辯論人倫及經明之業遂易門肆頠用矍然申其所懷而攻者盈集或以為一時口言有客幸過咸見命著文擿列虛無不允之徵若未能每事釋正則無家之義弗可奪也頠退而思之雖君子宅情無求於顯及其立言在乎達旨而已然去聖久遠異同紛糾苟少有仿佛可以崇濟先典扶明大業有益於時則惟患言之不能焉得靜默及未舉一隅略示所存而已哉夫至無者無以能生故始生者自生也自生而必體有則有遺而生虧矣生以有為已分則虛無是有之所謂遺者也故養既化之有非無用之所能全也理既有之衆非無為之所能循也心非事也而制事必由於心然不可以制事以非事謂心為無也匠非器也而制器必須於匠然不可以制器以非器謂匠非有也是以欲收重泉之鱗非偃息之所能獲也隕高墉之禽非靜拱之所能捷也審投弦餌之用非無知之所能覽也由此而觀濟有者皆有也虛無奚益於已有之羣生哉王衍之徒攻難交至並莫能屈又著辯才論古今精義皆辨釋焉未成而遇禍初趙王倫諂事賈后頠甚惡之倫數求官頠與張華復固執不許由是深為倫所怨倫又潛懷篡逆欲先除朝望因廢賈后之際遂誅之時年三十四二子嵩該倫亦欲害之梁王肜東海王越稱頠父秀有勳王室配食太廟不宜滅其後嗣故得不死徙帶方惠帝反正追復頠本官改葬以卿禮諡曰成以嵩嗣爵為中書黃門侍郎該出後從伯為散騎常侍並為乞活賊陳午所害楷字叔則父徽魏冀州刺史楷明悟有識量弱冠知名尤精老易少與王戎齊名鍾會薦之於文帝辟相國掾遷尚書郎賈充改定律令以楷為定科郎事畢詔楷於御前執讀平議當否楷善宣吐左右屬目聽者忘倦武帝為撫軍妙選僚采以楷為參軍事吏部郎缺文帝問其人於鍾會會曰裴楷清通王戎簡要皆其選也於是以楷為吏部郎楷風神高邁容儀俊爽博涉羣書特精理義時人謂之玉人又稱見裴叔則如近玉山映照人也轉中書郎出入宮省見者肅然改容武帝初登阼探策以卜世數多少而得一帝不悅羣臣失色莫有言者楷正容儀和其聲氣從容進曰臣聞天得一以清地得一以寧王侯得一以為天下貞武帝大悅羣臣皆稱萬歲俄拜散騎侍郎累遷散騎常侍河內太守入為屯騎校尉右軍將軍轉侍中石崇以功臣子有才氣與楷志趣各異不與之交長水校尉孫季舒嘗與崇酣燕慢傲過度崇欲表免之楷聞之謂崇曰足下飲人狂藥責人正禮不亦乖乎崇乃止楷性寬厚與物無忤不持儉素每遊榮貴輒取其珍玩雖車馬器服宿昔之間便以施諸窮乏嘗營別宅其從兄衍見而悅之即以宅與衍梁趙二王國之近屬貴重當時楷歲請二國租錢百萬以散親族人或譏之楷曰損有餘以補不足天之道也安於毀譽其行己任率皆此類也與山濤和嶠並以盛德居位帝嘗問曰朕應天順時海內更始天下風聲何得何失楷對曰陛下受命四海承風所以未比德於堯舜者但以賈充之徒尚在朝耳方宜引天下賢人與弘正道不宜示人以私時任愷庾純亦以充為言帝乃出充為關中都督充納女於太子乃止平吳之後帝方修太平之化每延公卿與論政道楷陳三五之風次漢魏盛衰之迹帝稱善坐者歎服焉楷子瓚娶楊駿女然楷素輕駿與之不平駿既執政乃轉為衞尉遷太子少師優游無事默如也及駿誅楷以婚親收付廷尉將加法是日事起倉卒誅戮縱橫衆人為之震恐楷容色不變舉動自若索紙筆與親故書賴侍中傅祗救護得免猶坐去官太保衞瓘太宰亮稱楷貞正不阿附宜蒙爵土乃封臨海侯食邑二千戶代楚王瑋為北軍中候加散騎常侍瑋怨瓘亮斥己任楷楷聞之不敢拜轉為尚書楷長子輿先娶亮女女適衞瓘子楷慮內難未已求出外鎮除安南將軍假節都督荊州諸軍事垂當發而瑋果矯詔誅亮瓘瑋以楷前奪己中候又與亮瓘婚親密遣討楷楷素知瑋有望於己聞有變單車入城匿于妻父王渾家與亮小子一夜八徙故得免難瑋既伏誅以楷為中書令加侍中與張華王戎並管機耍楷有渴利疾不樂處勢王渾為楷請曰楷受先帝拔擢之恩復蒙陛下寵遇誠竭節之秋也然楷性不競於物昔為常侍求出為河內太守後為侍中復求出為河南尹與楊深憂之光祿勳缺以為可用今張華在中書王戎在尚書足舉其契無為復令楷入名駿不平求為衞尉及轉東宮班在時類之下安於淡退有識有以見其心也楷今委頓臣深憂之光祿勳缺以為可用今張華在中書王戎在尚書足舉其契無為復令楷入名臣不多當見將養不違其志要其遠濟之益不聽就加光祿大夫開府儀同三司及疾篤詔遣黃門郎王衍省疾楷回眸矚之曰竟未相識衍深嘆其神儁楷有知人之鑒初在河南樂廣僑居郡界未知名楷見而奇之致之於宰府嘗目夏侯玄云肅肅如入宗廟中但見禮樂器鍾會如觀武庫森森但見矛戟在前傅嘏汪翔靡所不見山濤若登山臨下幽然深遠初楷家炊黍在甑或變如拳或作血或作蕪菁子其年而卒時年五十五諡曰元有五子輿瓚憲禮遜輿字祖明少襲父爵官至散騎侍郎卒諡曰簡瓚字國寶中書郎風神高邁見者皆敬之特為王綏所重每從其遊綏父戎謂之曰國寶初不來汝數往何也對曰國寶雖不知綏綏自知國寶楊駿之誅為亂兵所害憲字景思少而穎悟好交輕俠及弱冠更折節嚴重修尚儒學足不踰閾者數年陳郡謝鯤潁川庾敳皆儁朗士也見而奇之相謂曰裴憲鯁亮宏達通機識命不知其何如父至於深弘保素不以世物嬰心者其殆過之初侍講東宮歷黃門吏部郎侍中東海王越以為豫州刺史北中郎將假節王浚承制以憲為尚書永嘉末王浚為石勒所破棗嵩等莫不謝罪軍門貢賂交錯惟憲及荀綽恬然私室勒素聞其名召而謂之曰王浚虐暴幽州人鬼同疾孤恭行乾憲拯茲黎元羇舊咸歡慶謝交路二君齊惡傲威誠信岨絕防風之戮將誰歸乎憲神色侃然泣而對曰臣等世荷晉榮恩遇隆重王浚凶粗醜正尚晉之遺藩雖欣聖化義岨誠心且武王伐紂表商容之閭未聞商容在倒戈之例也明公既不欲以道化厲物必於刑忍為治者防風之戮臣之分也請就辟有司不拜而出勒深嘉之待以賓禮勒乃簿王浚官寮親屬皆貲至巨萬惟憲與荀綽家有書百餘袠鹽米各十數斛而已勒聞之謂其長史張賓曰名不虛也吾不喜得幽州喜獲二子署從事中郎出為長樂太守及勒僭號未遑制度與王波為之撰朝儀於是憲章文物擬於王者勒大悅署太中大夫遷司徒及季龍之世彌加禮重憲有二子挹瑴並以文才知名瑴仕季龍為太子中庶子散騎常侍挹瑴俱豪俠耽酒好臧否人物與河間邢魚有隙魚竊乘瑴馬奔段遼為人所獲魚誣瑴使己以季龍當襲鮮卑告之為備時季龍適謀伐遼而與魚辭正會季龍悉誅挹瑴憲亦坐免未幾復以為右光祿大夫司徒太傅封安定郡公憲歷官無幹績之稱然在朝玄默未嘗以物務經懷但以德重名高動見尊禮竟卒於石氏以族人峙子邁為嗣楷長兄黎次兄康並知名康子盾少歷顯位永嘉中為徐州刺史委任長史司馬奧奧勸盾刑殺立威大發良人為兵有不奉法者罪便至死在任三年百姓嗟怨東海王越盾妹夫也越既薨騎督滿衡便引所發良人東還尋而劉元海遣將王桑趙固向彭城前鋒數騎至下邳文武不堪苛政悉皆散走盾奧奔淮陰妻子為賊人所得奧又誘盾降趙固固妻盾女有寵盾向女涕泣固遂殺之盾弟邵字道期元帝為安東將軍以邵為長史王導為司馬二人相與為深交徵為太子中庶子復轉散騎常侍使持節都督揚州江西淮北諸軍事東中郎將隨越出項而卒於軍中及王導為司空既拜嘆曰裴道期劉王喬在吾不得獨登此位導子仲豫與康同字導思舊好乃改為敬豫焉楷弟綽字季舒器宇宏曠官至黃門侍郎長水校尉綽子遐善言玄理音辭清暢泠然若琴瑟嘗與河南郭象談論一坐嗟服又嘗在平東將軍周馥坐與人圍馥司馬行酒遐未即飲司馬醉怒因曳遐墮地遐徐起還坐顏色不變復如故其性虛和如此東海王越引為主簿後為越子毗所害初裴王二族盛於魏晉之世時人以為八裴方八王徽比王祥楷比王衍康比王綏綽比王澄瓚比王敦遐比王導頠比王戎邈比王玄云史臣曰周稱多士漢曰得人取類星象頡頏符契時乏名流多以幹翮相許自家光國豈陳騫之謂歟秀則聲蓋朋僚稱為領袖楷則機神幼發目以清通俱為晉代名臣良有以也贊曰世既順才才膺世至高平沈敏蘊茲名器鉅鹿自然亦云經笥媧皇鍊石晉圖開祕頠有清規承家來媚
