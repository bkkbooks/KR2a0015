body:
  text: 晉書卷十六志第六律曆上易曰形而上者謂之道形而下者謂之器夫神道廣大妙本於陰陽形器精微義先於律呂聖人觀四時之變刻玉紀其盈虛察五行之聲鑄金均其清濁所以遂八風而宣九德和大樂而成政道然金質從革侈弇無方竹體圓虛修短利制是以神瞽作律用寫鍾聲乃紀之以三平之以六成於十二天之道也又叶時日於晷度效地氣於灰管故陰陽和則景至律氣應則灰飛灰飛律通吹而命之則天地之中聲也故可以範圍百度化成萬品則虞書所謂叶時月正日同律度量衡者也中聲節以成文德音章而和備則可以動天地感鬼神導性情移風俗叶言志於詠歌鑒盛衰於治亂故君子審聲以知音審音以知樂審樂以知政蓋由茲道太史公律書云王者制事立物法度軌則一稟於六律六律為萬事之本其於兵械尤所重焉故云望敵知吉凶聞聲效勝負百王不易之道也及秦氏滅學其道浸微漢室初興丞相張蒼首言音律未能審備孝武帝創置協律之官司馬遷言律呂相生之次詳矣及王莽之際考論音律劉歆條奏大率有五一曰備數一十百千萬也二曰和聲宮商角徵羽也三曰審度分寸尺丈引也四曰嘉量籥合升斗斛也五曰權衡銖兩斤鈞石也班固因而志之蔡邕又記建武已後言律呂者至司馬紹統採而續之漢末天下大亂樂工散亡器法堙滅魏武始獲杜夔使定樂器聲調夔依當時尺度權備典章及武帝受命遵而不革至泰始十年光祿大夫荀勖奏造新度更鑄律呂元康中勖子藩嗣其事未及成功屬永嘉之亂中朝典章咸沒於石勒及元帝南遷皇度草昧禮容樂器掃地皆盡雖稍加採掇而多所淪胥終于恭安竟不能備今考古律相生之次及魏武已後言音律度量者以志于篇云傳云十二律黃帝之所作也使伶倫自大夏之西乃之崑崙之陰取竹之嶰谷生其竅厚均者斷兩節間長三寸九分而吹之以為黃鍾之宮曰含少次制十二竹筩寫鳳之鳴雄鳴為六雌鳴亦六以比黃鍾之宮皆可以生之以定律呂則律之始造以竹為管取其自然圓虛也又云黃帝作律以玉為管長尺六孔為十二月音至舜時西王母獻昭華之琯以玉為之及漢章帝時零陵文學奚景於泠道舜祠下得白玉琯又武帝太康元年汲郡盜發六國時魏襄王冢亦得玉律則古者又以玉為管矣以玉者取其體含廉潤也而漢平帝時王莽又以銅為之銅者自名也所以同天下齊風俗也為物至精不為燥溼寒暑改節介然有常似士君子之行故用焉周禮太師掌六律六呂以合陰陽之聲六律陽聲黃鍾太蔟姑洗蕤賓夷則無射也六呂陰聲大呂應鍾南呂林鍾仲呂夾鍾也又有太師則執同律以聽軍聲而詔以吉凶其典同掌六律六呂之和以辯天地四方陰陽之聲以為樂器皆以十有二律而為之數度以十有二聲而為之齊量焉及周景王將鑄無射問律於泠州鳩對曰夫六中之色故名之曰黃鍾所以宣養六氣九德也由是第之二曰太蔟所以金奏贊陽出滯也三曰姑洗所以羞潔百物考神納賓也四曰蕤賓所以安靜神人獻酬交酢也五曰夷則所以詠歌九德平人無貳也六曰無射所以宣布哲人之令德示人軌儀也為之六間以揚沈伏而黜散越也元間大呂助宣物也二間夾鍾出四隙之細也三間中呂宣中氣也四間林鍾和展百事俾莫不任肅純恪也五間南呂贊陽秀也六間應鍾均利器用俾應復也此皆所以律述時氣效節物也及秦始皇焚書蕩覆典策缺亡諸子璅言時有遺記呂不韋春秋言黃鍾之宮律之本也下生林鍾林鍾上生太蔟太蔟下生南呂南呂上生姑洗姑洗下生應鍾應鍾上生蕤賓蕤賓下生大呂大呂下生夷則夷則上生夾鍾夾鍾下生無射無射上生中呂三分所生益其一分以上生三分所生去其一分以下生後代之言音律者多宗此說及漢興承秦之弊張蒼首治律曆頗未能詳故孝武帝正樂乃置協律之官雖律呂清濁之體粗正金石高下之音有準然徒捃採遺存以成一時之制而數猶用五時淮南王安延致儒博亦為律呂云黃鍾之律九寸而宮音調因而九之九九八十一故黃鍾之數立焉位在子林鍾位在未其數五十四太蔟其數七十二南呂之數四十八姑洗之數六十四應鍾之數四十二蕤賓之數五十七大呂之數七十六夷則之數五十一夾鍾之數六十八無射之數四十五中呂之數六十極不生以黃鍾為宮太蔟為商姑洗為角林鍾為徵南呂為羽宮生徵徵生商商生羽羽生角角生應鍾不比正音故為和應鍾生蕤賓不比正音故為繆日冬至音比林鍾浸以濁日夏至音比黃鍾浸以清十二律應二十四時之變甲子中呂之徵也丙子夾鍾之羽也戊子黃鍾之宮也庚子無射之商也壬子夷則之角也其為音也一律而生五音十二律而為六十音因而六之六六三十六故三百六十音以當一歲之日故律曆之數天地之道也司馬遷八書言律呂粗舉大經著於前史則以太極元氣函三為一而始動於子十二律之生必所起焉於是參一於丑得三因而九三之舉本位合十辰得一萬九千六百八十三謂之成數以為黃鍾之法又參之律於十二辰得十七萬七千一百四十七謂之該數以為黃鍾之實實如法而一得黃鍾之律長九寸十一月冬至之氣應焉蓋陰陽合德氣鍾於子而化生萬物則物之生莫不函三故十二律空徑三分而上下相生皆損益以三其術則因黃鍾之長九寸以下生者倍其實三其法以上生者四其實三其法所以明陽下生陰陰上生陽起子為黃鍾九寸一丑三分之二寅九分之八卯二十七分之十六辰八十一分之六十四巳二百四十三分之一百二十八午七百二十九分之五百一十二未二千一百八十七分之一千二十四申六千五百六十一分之四千九十六酉一萬九千六百八十二分之八千一百九十二戌五萬九千四十九分之三萬二千七百六十八亥十七萬七千一百四十七分之六萬五千五百三十六如是周十二辰在六律為陽則當位自得而下生陰在六呂為陰則得其所衡而上生於陽推算之術無重上生之法也所謂律取妻呂生子陰陽升降律呂之大經也而遷又言十二律之長今依淮南九九之數則蕤賓為重上又言五音相生而以宮生角角生商商生徵徵生羽羽生宮求其理用罔見通途及元始中王莽輔政博徵通知鍾律者考其音義使羲和劉歆典領調奏班固漢書採而志之其序論雖博而言十二律損益次第自黃鍾長九寸三分損一下生林鍾長六寸三分益一上生太蔟而左旋八八為位一上一下終於無射下生中呂校其相生所得與司馬遷正同班固採以為志元帝時郎中京房知五音六十律之數上使太子太傅玄成諫議大夫章雜試問房於樂府房對受學於故小黃令焦延壽六十律相生之法以上生下皆三生二以下生上皆三生四陽下生陰陰上生陽終於中呂而十二律畢矣中呂上生執始執始下生去滅上下相生終於南事而六十律畢矣夫十二律之變至於六十猶八卦之變至於六十四也宓犧作易紀陽氣之初以為律法建日冬至之聲以黃鍾為宮太蔟為商姑洗為角林鍾為徵南呂為羽應鍾為變宮蕤賓為變徵此聲氣之元五音之正也故各統一日其餘以次運行當日者各自為宮而商角徵羽以類從焉禮運曰五聲六律十二管還相為宮此之謂也以六十律分朞之日黃鍾自冬至始及冬至而復陰陽寒燠風雨之占生焉於以檢攝羣音考其高下苟非革木之聲則無不有所合虞書曰律和聲此之謂也京房又曰竹聲不可以度調故作準以定數準之狀如瑟而長丈十三弦隱間九尺以應黃鍾之律九寸中央一弦下有畫分寸以為六十律清濁之節房言律詳於歆所奏其術施行於史官候部用之文多不悉載截管為律吹以考聲列以效氣道之本也術家以其聲微而體難知其分數不明故作準以代之準之聲明暢易達分寸又粗然弦以緩急清濁非管無以正也均其中弦令與黃鍾相得案畫以求諸律則無不如數而應者矣續漢志具載其六十律準度數其相生之次與呂覽淮南同漢章帝元和元年待詔候鍾律殷肜上言官無曉六十律以準調音者故待詔嚴崇具以準法教子男宣願召宣補學官主調樂器詔曰崇子學審曉律別其族協其聲者審試不得依託父學以聾為聰聲微妙獨非莫知獨是莫曉以律錯吹能知命十二律不失一乃為能傳崇學耳試宣十二律其二中其四不中其六不知何律宣遂罷自此律家莫能為準靈帝熹平六年東觀召典律者太子舍人張光等問準意光等不知歸閱舊藏乃得其器形制如房書猶不能定其弦緩急音不可書以曉人知之者欲教而無從心達者體知而無師故史官能辨清濁者遂絕其可以相傳者唯候氣而已漢末紛亂亡失雅樂魏武時河南杜夔精識音韵為雅樂郎中令鑄銅工柴玉鑄鍾其聲均清濁多不如法數毀改作玉甚厭之謂夔清濁任意更相訴白於魏武王魏武王取玉所鑄鍾雜錯更試然後知夔為精於是罪玉泰始十年中書監荀勖中書令張華出御府銅竹律二十五具部太樂郎劉秀等校試其三具與杜夔及左延年律法同其二十二具視其銘題尺寸是笛律也問協律中郎將列和辭昔魏明帝時令和承受笛聲以作此律欲使學者別居一坊歌詠講習依此律調至於都合樂時但識其尺寸之名則絲竹歌詠皆得均合歌聲濁者用長笛長律歌聲清者用短笛短律凡絃歌調張清濁之制不依笛尺寸名之則不可知也勖等奏昔先王之作樂也以振風蕩俗饗神祐賢必協律呂之和以節八音之中是故郊祀朝宴用之有制歌奏分敘清濁有宜故曰五聲十二律還相為宮此經傳記籍可得而知者也如和對辭笛之長短無所象則率意而作不由曲度考以正律皆不相應吹其聲均多不諧合又辭先師傳笛別其清濁直以長短工人裁制舊不依律是為作笛無法而和寫笛造律又令琴瑟歌詠從之為正非所以稽古先哲垂憲于後者也謹條牒諸律問和意狀如左及依典制用十二律造笛象十二枚聲均調和器用便利講肄彈擊必合律呂況乎宴饗萬國奏之廟堂者哉雖伶夔曠遠至音難精猶宜儀形古昔以求厥衷合乎經禮於制為詳若可施用請更部笛工選竹造作下太樂樂府施行平議諸杜夔左延年律可皆留其御府笛正聲下徵各一具皆銘題作者姓名其餘無所施用還付御府毀奏可勖又問和作笛為可依十二律作十二笛令一孔依一律然後乃以為樂不和辭太樂東廂長笛正聲已長四尺二寸今當復取其下徵之聲於法聲濁者笛當長計其尺寸乃五尺有餘和昔日作之不可吹也又笛諸孔雖不校試意謂不能得一孔輒應一律也案太樂四尺二寸笛正聲均應蕤賓以十二律還相為宮推法下徵之孔當應律大呂大呂笛長二尺六寸有奇不得長五尺餘輒令太樂郎劉秀鄧昊等依律作大呂笛以示和又吹七律一孔一校聲皆相應然後令郝生鼓箏宋同吹笛以為雜引相和諸曲和乃辭曰自和父祖漢世以來笛家相傳不知此法而令調均與律相應實非所及也郝生魯基种整朱夏皆與和同又問和笛有六孔及其體中之空為七和為能盡名其宮商角徵不孔調與不調以何檢知和辭先師相傳吹笛但以作曲相語為某曲當舉某指初不知七孔盡應何聲也若當作笛其仰尚方笛工依案舊像訖但吹取鳴者初不復校其諸孔調與不調也案周禮調樂金石有一定之聲是故造鍾磬者先依律調之然後施於廂懸作樂之時諸音皆受鍾磬之均即為悉應律也至於饗宴殿堂之上無廂懸鍾磬以笛有一定調故諸絃歌皆從笛為正是為笛猶鍾磬宜必合於律呂如和所對直以意造率短一寸七孔聲均不知其皆應何律調與不調無以檢正唯取竹之鳴者為無法制輒部郎劉秀鄧昊王艷魏邵等與笛工參共作笛工人造其形律者定其聲然後器象有制音均和協又問和若不知律呂之義作樂音均高下清濁之調當以何名之和辭每合樂時隨歌者聲之清濁用笛有長短假令聲濁者用三尺二笛因名曰此三尺二調也聲清者用二尺九笛因名曰此二尺九調也漢魏相傳施行皆然案周禮奏六樂乃奏黃鍾歌大呂乃奏太蔟歌應鍾皆以律呂之義紀歌奏清濁而和所稱以二尺三尺為名雖漢魏用之俗而不典部郎劉秀鄧昊等以律作笛三尺二寸者應無射之律若宜用長笛執樂者曰請奏無射二尺八寸四分四氂應黃鍾之律若宜用短笛執樂者曰請奏黃鍾則歌奏之義若合經禮考之古典於制為雅書曰予欲聞六律五聲八音在治忽周禮國語載六律六同禮記又曰五聲十二律還相為宮劉歆班固撰律曆志亦紀十二律惟京房始創六十律至章帝時其法已絕蔡邕雖追紀其言亦曰今無能為者依案古典及今音家所用六十律者無施於樂謹依典記以五聲十二律還相為宮之法制十二笛象記注圖側如別省圖不如視笛之孔故復重作蕤賓伏孔笛其制云黃鍾之笛正聲應黃鍾下徵應林鍾長二尺八寸四分四氂有奇正聲調法以黃鍾為宮則姑洗為角翕笛之聲應姑洗故以四角之長為黃鍾之笛也其宮聲正而不倍故曰正聲正聲調法黃鍾為宮第一孔也應鍾為變宮第二孔也南呂為羽第三孔也林鍾為徵第四孔也蕤賓為變徵第五附孔也姑洗為角笛體中聲太蔟為商笛後出孔也商聲濁於角當在角下而角聲以在體中故上其商孔令在宮上清於宮也然則宮商正也餘聲皆倍也是故從宮以下孔轉下轉濁也此章記笛孔上下次第之名也下章說律呂相生笛之制也正聲調法黃鍾為宮作黃鍾之笛將求宮孔以姑洗及黃鍾律從笛首下度之盡二律之長而為孔則得宮聲也宮生徵黃鍾生林鍾也以林鍾之律從宮孔下度之盡律作孔則得徵聲也徵生商林鍾生太蔟也以太蔟律從徵孔上度之盡律以為孔則得商聲也商生羽太蔟生南呂也以南呂律從商孔下度之盡律為孔則得羽聲也羽生角南呂生姑洗也以姑洗律從羽孔上行度之盡律而為孔則得角聲也然則出於商孔之上吹笛者左手所不及也從羽孔下行度之盡律而為孔亦得角聲出於商附孔之下則吹者右手所不逮也故不作角孔推而下之復倍其均是以角聲在笛體中古之制也音家舊法雖一倍再倍但令均同適足為唱和之聲無害於曲均故也國語曰匏竹利制議宜謂便於事用從宜者也角生變宮姑洗生應鍾也上句所謂當為角孔而出於商上者墨點識之以應鍾律從此點下行度之盡律為孔則得變宮之聲也變宮生變徵應鍾生蕤賓也以蕤賓律從變宮下度之盡律為孔則得變徵之聲十二笛之制各以其宮為主相生之法或倍或半其便事用例皆一也下徵調法林鍾為宮第四孔也本正聲黃鍾之徵徵清當在宮上用笛之宜倍令濁下故曰下徵下徵更為宮者記所謂五聲十二律還相為宮也然則正聲清下徵為濁也南呂為商第三孔也本正聲黃鍾之羽今為下徵之商也應鍾為角第二孔也本正聲黃鍾之變宮今為下徵之角也黃鍾為變徵下徵之調林鍾為宮大呂當為變徵而黃鍾笛本無大呂之聲故假用黃鍾以為變徵也假用之法當為變徵之聲則俱發黃鍾及太蔟應鍾三孔黃鍾應濁而太蔟清大呂律在二律之間俱發三孔而微磑𩫅之則得大呂變徵之聲矣諸笛下徵調求變徵之法皆如此也太蔟為徵笛後出孔本正聲之商今為下徵之徵也姑洗為羽笛體中翕聲本正聲之角今為下徵之羽蕤賓為變宮附孔是也本正聲之變徵也今為下徵之變宮也然則正聲之調孔轉下轉濁下徵之調孔轉上轉清也清角之調以姑洗為宮即是笛體中翕聲於正聲為角於下徵為羽清角之調乃以為宮而哨吹令清故曰清角惟得為宛詩謠俗之曲不合雅樂也蕤賓為商正也林鍾為角非正也南呂為變徵非正也應鍾為徵正也黃鍾為羽非正也太蔟為變宮非正也清角之調唯宮商及徵與律相應餘四聲非正者皆濁一律哨吹令清假而用之其例一也凡笛體用角律其長者八之蕤賓林鍾也短者四之其餘十笛皆四角也空中實容長者十六短笛竹宜受八律之黍也若長短大小不合於此或器用不便聲均法度之齊等也然笛竹率上大下小不能均齊必不得已取其聲均合三宮一曰正聲二曰下徵三曰清角也二十一變也宮有七聲錯綜用之故二十一變也諸笛例皆一也伏孔四所以便事用也一曰正角出於商上者也二曰倍角近笛下者也三曰變宮近於宮孔倍令下者也四曰變徵遠於徵孔倍令高者也或倍或半或四分一取則於琴徽也四者皆不作其孔而取其度以應進退上下之法所以協聲均便事用也其本孔隱而不見故曰伏孔也大呂之笛正聲應大呂下徵應夷則長二尺六寸六分三氂有奇太蔟之笛正聲應太蔟下徵應南呂長二尺五寸三分一氂有奇夾鍾之笛正聲應夾鍾下徵應無射長二尺四寸姑洗之笛正聲應姑洗下徵應應鍾長二尺二寸三分三氂有奇蕤賓之笛正聲應蕤賓下徵應大呂長三尺九寸九分五氂有奇變宮近宮孔故倍半令下便於用也林鍾亦如之林鍾之笛正聲應林鍾下徵應太蔟長三尺七寸九分七氂有奇夷則之笛正聲應夷則下徵應夾鍾長三尺六寸變宮之法亦如蕤賓體用四角故四分益一也南呂之笛正聲應南呂下徵應姑洗長三尺三寸七分有奇無射之笛正聲應無射下徵應中呂長三尺二寸應鍾之笛正聲應應鍾下徵應蕤賓長二尺九寸九分六氂有奇五音十二律土音宮數八十一為聲之始屬土者以其最濁君之象也季夏之氣和則宮聲調宮亂則荒其君驕黃鍾之宮律最長也火音徵三分宮去一以生其數五十四屬火者以其徵清事之象也夏氣和則徵聲調徵亂則哀其事勤也金音商三分徵益一以生其數七十二屬金者以其濁次宮臣之象也秋氣和則商聲調商亂則詖其官壞也水音羽三分商去一以生其數四十八屬水者以為最清物之象也冬氣和則羽聲調羽亂則危其財匱也木音角三分羽益一以生其數六十四屬木者以其清濁中人之象也春氣和則角聲調角亂則憂其人怨也凡聲尊卑取象五行數多者濁數少者清大不過宮細不過羽十一月律中黃鍾律之始也長九寸仲冬氣至則其律應所以宣養六氣九德也班固三分損一下生林鍾十二月律中大呂司馬遷未下生之律長四寸二百四十三分寸之五十二倍之為八寸二百四十三分寸之一百四季冬氣至則其律應所以助宣物也三分益一上生夷則京房三分損一下生夷則正月律中太蔟未上生之律長八寸孟春氣至則其律應所以贊陽出滯也三分損一下生南呂二月律中夾鍾酉下生之律長三寸二千一百八十七分寸之一千六百三十一倍之為七寸二千一百八十七分寸之一千七十五仲春氣至則其律應所以出四隙之細也三分益一上生無射京房三分損一下生無射三月律中姑洗酉上生之律長七寸九分寸之一季春氣至則其律應所以修絜百物考神納賓也三分損一下生應鍾四月律中中呂亥下生之律長三寸萬九千六百八十三分寸之六千四百八十七倍之為六寸萬九千六百八十三分寸之萬二千九百七十四孟夏氣至則其律應所以宣中氣也五月律中蕤賓亥上生之律長六寸八十一分寸之二十六仲夏氣至則其律應所以安靜人神獻酬交酢也三分損一下生大呂京房三分益一上生大呂六月律中林鍾丑下生之律長六寸季夏氣至則其律應所以和展百物俾莫不任肅純恪也三分益一上生太蔟七月律中夷則丑上生之律長五寸七百二十九分寸之四百五十一孟秋氣至則其律應所以詠歌九則平百姓而無貸也三分損一下生夾鍾京房三分益一上生夾鍾八月律中南呂卯下生之律長五寸三分寸之一仲秋氣至則其律應所以贊陽秀也三分益一上生姑洗九月律中無射卯上生之律長四寸六千五百六十一分寸之六千五百二十四季秋氣至則其律應所以宣布哲人之令德示人軌儀也三分損一下生中呂京房三分益一上生中呂十月律中應鍾巳下生之律長四寸二十七分寸之二十孟冬氣至則其律應所以均利器用俾應復也三分益一上生蕤賓淮南京房鄭玄諸儒言律曆皆上下相生至蕤賓又重上生大呂長八寸二百四十三分寸之百四夷則上生夾鍾長七寸千一百八十七分寸之千七十五無射上生中呂長六寸萬九千六百八十三分寸之萬二千九百七十四此三品於司馬遷班固所生之寸數及分皆倍焉餘則並同斯則泠州鳩所謂六間之道揚沈伏黜散越假之為用者也變通相半隨事之宜贊助之法也凡音聲之體務在和均益則加倍損則減半其於本音恆為無爽然則言一上一下者相生之道言重上生者吹候之用也於蕤賓重上生者適會為用之數故言律者因焉非相生之正也楊子雲曰聲生於日謂甲己為角乙庚為商丙辛為徵丁壬為羽戊癸為宮也律生於辰謂子為黃鍾丑為大呂之屬也聲以情質質正也各以其行本情為正也律以和聲當以律管鍾均和其清濁之聲聲律相協而八音生協和也宮商角徵羽謂之五聲金石匏革絲竹土木謂之八音聲和音諧是謂五樂夫陰陽和則景至律氣應則灰除是故天子常以冬夏至日御前殿合八能之士陳八音聽樂均度晷景候鍾律權土炭效陰陽冬至陽氣應則灰除是故樂均清景長極黃鍾通土炭輕而衡仰夏至陰氣應則樂均濁景短極蕤賓通土炭重而衡低進退於先後五日之中八能各以候狀聞太史令封上效則和否則占候氣之法為室三重戶閉塗釁周密布緹幔室中以木為案每律各一內庳外高從其方位加律其上以葭莩灰抑其內端案歷而候之氣至者灰去其為氣所動者其灰散人及風所動者其灰聚殿中候用玉律十二惟二至乃候靈臺用竹律楊泉記云取弘農宜陽縣金門山竹為管河內葭莩為灰或云以律著室中隨十二辰埋之上與地平以竹莩灰實律中以羅縠覆律呂氣至吹灰動縠小動為和大動君弱臣強不動君嚴暴之應也審度起度之正漢志言之詳矣武帝泰始九年中書監荀勖校太樂八音不和始知後漢至魏尺長於古四分有餘勖乃部著作郎劉恭依周禮制尺所謂古尺也依古尺更鑄銅律呂以調聲韵以尺量古器與本銘尺寸無差又汲郡盜發六國時魏襄王冢得古周時玉律及鍾磬與新律聲韵闇同于時郡國或得漢時故鍾吹律命之皆應勖銘其尺曰晉泰始十年中書考古器揆校今尺長四分半所校古法有七品一曰姑洗玉律二曰小呂玉律三曰西京銅望臬四曰金錯望臬五曰銅斛六曰古錢七曰建武銅尺姑洗微強西京望臬微弱其餘與此尺同銘八十二字此尺者勖新尺也今尺者杜夔尺也荀勖造新鍾律與古器諧韵時人稱其精密惟散騎侍郎陳留阮咸譏其聲高聲高則悲非興國之音亡國之音亡國之音哀以思其人困今聲不合雅懼非德正至和之音必古今尺有長短所致也會咸病卒武帝以勖律與周漢器合故施用之後始平掘地得古銅尺歲久欲腐不知所出何代果長勖尺四分時人服咸之妙而莫能厝意焉史臣案勖於千載之外推百代之法度數既宜聲韵又契可謂切密信而有徵也而時人寡識據無聞之一尺忽周漢之兩器雷同臧否何其謬哉世說稱有田父於野地中得周時玉尺便是天下正尺荀勖試以校己所治金石絲竹皆短校一米又漢章帝時零陵文學史奚景於泠道舜祠下得玉律度以為尺相傳謂之漢官尺以校荀勖尺勖尺短四分漢官始平兩尺長短度同又杜夔所用調律尺比勖新尺得一尺四分七氂魏景元四年劉徽注九章云王莽時劉歆斛尺弱於今尺四分五氂比魏尺其斛深九寸五分五氂即荀勖所謂今尺長四分半是也元帝後江東所用尺比荀勖尺一尺六分二氂趙劉曜光初四年鑄渾儀八年鑄土圭其尺比荀勖尺一尺五分荀勖新尺惟以調音律至於人間未甚流布故江左及劉曜儀表並與魏尺略相依準嘉量周禮栗氏為量鬴深尺內方尺而圓其外其實一鬴其𣕜一寸其實一豆其耳三寸其實一升重一鈞其聲中黃鍾概而不稅其銘曰時文思索允臻其極嘉量既成以觀四國永啟厥後茲器維則春秋左氏傳曰齊舊四量豆區鬴鍾四升曰豆各自其四以登於鬴四豆為區區斗六升也四區為鬴六斗四升也鬴十則鍾六十四斗也鄭玄以為鬴方尺積千寸比九章粟米法少二升八十一分升之二十二以算術考之古斛之積凡一千五百六十二寸半方尺而圓其外減傍一氂八豪其徑一尺四寸一分四豪七秒二忽有奇而深尺即古斛之制也九章商功法程粟一斛積二千七百寸米一斛積一千六百二十七寸菽荅麻麥一斛積二千四百三十寸此據精粗為率使價齊而不等其器之積寸也以米斛為正則同于漢志魏陳留王景元四年劉徽注九章商功曰當今大司農斛圓徑一尺三寸五分五氂深一尺積一千四百四十一寸十分寸之三王莽銅斛於今尺為深九寸五分五氂徑一尺三寸六分八氂七豪以徽術計之於今斛為容九斗七升四合有奇魏斛大而尺長王莽斛小而尺短也衡權衡權者衡平也權重也衡所以任權而均物平輕重也古有黍絫錘錙鐶鈞鋝溢之目歷代參差漢志言衡權名理甚備自後變更其詳未聞元康中裴頠以為醫方人命之急而稱兩不與古同為害特重宜因此改治權衡不見省趙石勒十八年七月造建德殿得圓石狀如水碓銘曰律權石重四鈞同律度量衡有辛氏造續咸議是王莽時物
