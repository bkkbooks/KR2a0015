body:
  text: 晉書卷三十一列傳第一后妃上夫乾坤定位男女流形伉儷之義同歸貴賤之名異等若乃作配皇極齊體紫宸象玉牀之連後星喻金波之合羲璧爰自敻古是謂元妃降及中年乃稱王后四人並列光于帝嚳之宮二妃同降著彼有虞之典夏商以上六宮之制其詳靡得而聞焉姬劉以降五翟之規其事可略而言矣周禮天子立一后三夫人九嬪二十七世婦八十一御妻以聽王者內政故婚義曰天子之與后如日之與月陰之與陽由斯而談其所從來遠矣故能母儀天𧜛助宣王化德均載物比大坤維宗廟歆其薦羞穹壤俟其交泰是以哲王垂憲尤重造舟之禮詩人立言先奬葛覃之訓後燭流景所以裁其宴私房樂希聲是用節其容止履端正本抑斯之謂歟若乃娉納有方防閑有禮肅尊儀而修四德體柔範而弘六義陰教洽于宮闈淑譽騰於區域則玄雲入戶上帝錫母萌之符黃神降徵坤靈贊壽丘之道終能鼎祚惟永胤嗣克昌至若儷極虧閑憑天作孽倒裳衣于衽席感朓側於弦望則龍漦結釁宗周鞠為黍苗燕尾挻災隆漢墜其枌社矣自曹劉內主位以色登甄衞之家榮非德舉淫荒挺性蔑西郊之禮容婉孌含辭作南國之奇態詖謁由斯外人穢德於是內宣椒掖播晨牝之風蘭殿絕河雎之響永言彤史大練之範逾微緬視青蒲脫珥之猷替矣晉承其末與世樜隆宣皇創基功弘而道屈穆后一善勣侔於十亂洎乎世祖始親選良家既而帝掩紈扇躬行請託后採長白實彰妒忌之情賈納短青竟踐覆亡之轍得失遺跡煥在綈緗興滅所由義同畫一故列其本事以為后妃傳云宣穆張皇后宣穆張皇后諱春華河內平人也父汪魏粟邑令母河內山氏司徒濤之從祖姑也后少有德行智識過人生景帝文帝平原王幹南陽公主宣帝初辭魏武之命託以風痹嘗暴書遇暴雨不覺自起收之家惟有一婢見之后乃恐事泄致禍遂手殺之以滅口而親自執爨帝由是重之其後柏夫人有寵后罕得進見帝嘗臥疾后往省病帝曰老物可憎何煩出也后慚恚不食將自殺諸子亦不食帝驚而致謝后乃止帝退而謂人曰老物不足惜慮困我好兒耳魏正始八年崩時年五十九葬洛陽高原陵追贈廣平縣君咸熙元年追號宣穆妃及武帝受禪追尊為皇后景懷夏侯皇后景懷夏侯皇后諱徽字媛容沛國譙人也父尚魏征南大將軍母曹氏魏德陽鄉主后雅有識度帝每有所為必豫籌畫魏明帝世宣帝居上將之重諸子並有雄才大略后知帝非魏之純臣而后既魏氏之甥帝深忌之青龍二年遂以鴆崩時年二十四葬峻平陵武帝登阼初未追崇弘訓太后每以為言泰始二年始加號諡后無男生五女景獻羊皇后景獻羊皇后諱徽瑜泰山南城人父衜上黨太守后母陳留蔡氏漢左中郎將邕之女也后聰敏有才行景懷皇后崩景帝更娶鎮北將軍濮陽吳質女見黜復納后無子武帝受禪居弘訓宮號弘訓太后泰始九年追贈蔡氏濟陽縣君諡曰穆咸寧四年太后崩時年六十五祔葬峻平陵文明王皇后文明王皇后諱元姬東海郯人也父肅魏中領軍蘭陵侯后年八歲誦詩論尤善喪服苟有文義目所一見必貫於心年九歲遇母疾扶侍不捨左右衣不解帶者久之每先意候指動中所適由是父母令攝家事每盡其理祖朗甚愛異之曰興吾家者必此女也惜不為男矣年十二朗薨后哀戚哭泣發于自然其父益加敬異既筓歸于文帝生武帝及遼東悼王定國齊獻王攸城陽哀王兆廣漢殤王廣德京兆公主后事舅姑盡婦道謙沖接下嬪御有序及居父喪身不勝衣言與淚俱時鍾會以才能見任后每言于帝曰會見利忘義好為事端寵過必亂不可大任會後果反武帝受禪尊為皇太后宮曰崇化初置宮卿重選其職以太常諸葛緒為衞尉太僕劉原為太僕宗正曹楷為少府后雖處尊位不忘素業躬執紡績器服無文御浣濯之衣食不參味而敦睦九族垂心萬物言必典禮浸潤不行帝以后母羊氏未崇諡號泰始三年下詔曰昔漢文追崇靈文之號武宣有平原博平之封咸所以奉尊尊之敬廣親親之恩也故衞將軍蘭陵景侯夫人羊氏含章體順仁德醇備內承世冑出嬪大國三從之行率禮無違仍遭不造頻喪統嗣撫育衆胤克成家道母儀之教光于邦族誕啟聖明祚流萬國而早世殂隕不遇休寵皇太后孝思蒸蒸永慕罔極朕感存遺訓追遠傷懷其封夫人為縣君依德紀諡主者詳如舊典於是使使持節謁者何融追諡為平陽靖君四年后崩時年五十二合葬崇陽陵將遷祔帝手疏后德行命史官為哀策曰明明先后興我晉道暉章淑問以翼皇考邁德宣猷大業有造貽慶孤矇堂構是保庶資復顧永享難老奄然登遐棄我何早沈哀罔訴如何穹昊嗚呼哀哉厥初生民樹之惠康帝遷明德顧予先皇天立厥配我皇是光作邦作對德音無疆愍予不弔天篤降殃日沒明夷中年隕喪煢煢在疚永懷摧傷尋惟景行於穆不已海岱降靈世荷繁祉永錫祚胤篤生文母誕膺純和淑慎容止質直不渝體茲孝友詩書是悅禮籍是紀三從無違中饋允理追惟先后勞謙是尚爰初在室竭力致養嬪于大邦皇基是相謐靜隆化帝業以創內嬪御外協時望履信居順德行洽暢密勿無荒劬勞克讓崇儉抑華沖素是放雖享崇高歡嘉未饗胡寧棄之我將曷仰咨余不造大罰薦臻皇考背世始踰三年仰奉慈親冀無後艱凶災仍集何辜於天嗚呼哀哉靈夙駕設祖中闈轀輬動軫既往不追哀哀皇妣永潛靈暉進攀梓宮顧援素旂屏營窮痛誰告誰依訴情贈策以舒傷悲尚或有聞顧予孤遺嗚呼哀哉其後帝追慕不已復下詔曰外曾祖母故司徒王朗夫人楊氏舅氏尊屬鄭劉二從母先后至愛每惟聖善敦睦遺旨渭陽之感永懷靡及其封楊夫人及從母為鄉君邑各五百戶太康七年追贈繼祖母夏侯氏為滎陽鄉君武元楊皇后武元楊皇后諱艷字瓊芝弘農華陰人也父文宗見外戚傳母天水趙氏早卒后依舅家舅妻仁愛親乳養后遣他人乳其子及長又隨後母段氏依其家后少聰慧善書姿質美麗閑於女工有善相者嘗相后當極貴文帝聞而為世子聘焉甚被寵遇生毗陵悼王軌惠帝秦獻王柬平陽新豐陽平公主武帝即位立為皇后有司奏依漢故事皇后太子各食湯沐邑四十縣而帝以非古典不許后追懷舅氏之恩顯官趙俊納俊兄虞女粲於後宮為夫人帝以皇太子不堪奉大統密以語后后曰立嫡以長不以賢豈可動乎初賈充妻郭氏使賂后求以女為太子妃及議太子婚帝欲娶衞瓘女然后盛稱賈后有淑德又密使太子太傅荀顗進言上乃聽之泰始中帝博選良家以充後宮先下書禁天下嫁娶使宦者乘使車給騶騎馳傳州郡召充選者使后揀擇后性妒惟取潔白長大其端正美麗者並不見留時卞藩女有美色帝掩扇謂后曰卞氏女佳后曰藩三世后族其女不可枉以卑位帝乃止司徒李胤鎮軍大將軍胡奮廷尉諸葛沖太僕臧權侍中馮蓀秘書郎左思及世族子女並充三夫人九嬪之列司冀兗豫四州二千石將吏家補良人以下名家盛族子女多敗衣瘁貌以避之及后有疾見帝素幸胡夫人恐後立之慮太子不安臨終枕帝膝曰叔父駿女男胤有德色願陛下以備六宮因悲泣帝流涕許之泰始十年崩於明光殿絕于帝膝時年三十七詔曰皇后逮事先后常冀能終始永奉宗廟一旦殂隕痛悼傷懷每自以夙喪二親於家門之情特隆又有心欲改葬父祖以頃者務崇儉約初不有言近垂困說此意情亦愍之其使領前軍將軍駿等自克改葬之宜至時主者供給葬事賜諡母趙氏為縣君以繼母段氏為鄉君傳不云乎慎終追遠民德歸厚且使亡者有知尚或嘉之于是有司卜吉窀穸有期乃命史臣作哀策懷其詞曰天地配序成化兩儀王假有家道在伉儷姜嫄佐嚳二妃興媯仰希古昔冀亦同規今胡不然景命夙虧嗚呼哀哉我應圖籙統臨萬方正位于內實在嬪嬙天作之合駿發之祥河嶽降靈啟祚華陽奕世豐衍朱紼斯煌纘女惟行受命溥將來翼家邦憲度是常緝熙陰教德聲顯揚昔我先妣暉曜休光后承前訓奉述遺芳宜嗣徽音繼序無荒如何不弔背世隕喪望齊無主長去烝嘗追懷永悼率土摧傷嗚呼哀哉陵兆既窆將遷幽都宵陳夙駕元妃其徂宮闈遏密階庭空虛設祖布紼告駕啟塗服翬褕狄寄象容車金路晻藹裳帳不舒千乘動軫六驥躊躇銘旌樹表翣柳雲敷祁祁同軌岌岌烝徒孰不云懷哀感萬夫寧神虞卜安體玄廬土房陶簋齊制遂初依行紀諡聲被八區雖背明光亦歸皇姑沒而不朽世德作謨嗚呼哀哉乃葬于峻陽陵武悼楊皇后左貴嬪胡貴嬪諸葛夫人武悼楊皇后諱芷字季蘭小字男胤元后從妹父駿別有傳以咸寧二年立為皇后婉嫕有婦德美暎椒房甚有寵生渤海殤王早薨遂無子太康九年后率內外夫人命婦躬桑于西郊賜帛各有差太子妃賈氏妒忌帝將廢之后言於帝曰賈公閭有勳社稷猶當數世宥之賈妃親是其女正復妒忌之間不足以一眚掩其大德后又數誡厲妃妃不知后之助己因以致恨謂后構之於帝忿怨彌深及帝崩尊為皇太后賈后凶悖忌后父駿執權遂誣駿為亂使楚王瑋與東安王繇稱詔誅駿內外隔塞后題帛為書射之城外曰救太傅者有賞賈后因宣言太后同逆駿既死詔使後軍將軍荀悝送后于永寧宮特全后母高都君龐氏之命聽就后居止賈后諷羣公有司奏曰皇太后陰漸姦謀圖危社稷飛箭繫書要募將士同惡相濟自絕于天魯侯絕文姜春秋所許蓋以奉順祖宗任至公於天下陛下雖懷無已之情臣下不敢奉詔可宣敕王公于朝堂會議詔曰此大事更詳之有司又奏駿藉外戚之資居冢宰之任陛下既居諒闇委以重權至乃陰圖凶逆布樹私黨皇太后內為脣齒協同逆謀禍釁既彰背捍詔命阻兵負衆血刃宮省而復流書募衆以奬凶黨上背祖宗之靈下絕億兆之望昔文姜與亂春秋所貶呂宗叛戾高后降配宜廢皇太后為峻陽庶人中書監張華等以為太后非得罪于先帝者也今黨惡所親為不母于聖世宜依孝成趙皇后故事曰武帝皇后處之離宮以全貴終之恩尚書令下邳王晃等議曰皇太后與駿潛謀欲危社稷不可復奉承宗廟配合先帝宜貶尊號廢詣金墉城于是有司奏請從晃等議廢太后為庶人遣使者以太牢告于郊廟以奉承祖宗之命稱萬國之望至於諸所供奉可順聖恩務從豐厚詔不許有司又固請乃可之又奏楊駿造亂家屬應誅詔原其妻龐命以慰太后之心今太后廢為庶人請以龐付廷尉行刑詔曰聽龐與庶人相隨有司希賈后旨固請乃從之龐臨刑太后抱持號叫截髮稽顙上表詣賈后稱妾請全母命不見省初太后尚有侍御十餘人賈后奪之絕膳而崩時年三十四在位十五年賈后又信妖巫謂太后必訴冤先帝乃覆而殯之施諸厭劾符書藥物永嘉元年追復尊號別立廟神主不配武帝至成帝咸康七年下詔使內外詳議衞將軍虞潭議曰世祖武皇帝光有四海元皇后應乾作配元后既崩悼后繼作至楊駿肆逆禍延天母孝懷皇帝追復號諡豈不以鯀殛禹興義在不替者乎又太寧二年臣忝宗正帝譜泯棄罔所循按時博諮舊齒以定昭穆與故驃騎將軍華尚書荀崧侍中荀邃因舊譜參論撰次尊號之重一無改替今聖上孝思祗肅禋祀詢及羣司將以恢定大禮臣輒思詳伏見惠皇帝起居注羣臣議奏列駿作逆謀危社稷引魯之文姜漢之呂后臣竊以文姜雖莊公之母實為父讐呂后寵樹私戚幾危劉氏按此二事異于今日昔漢章帝竇后殺和帝之母和帝即位盡誅諸竇當時議者欲貶竇后及后之亡欲不以禮葬和帝以奉事十年義不可違臣子之道務從豐厚仁明之稱表于往代又見故尚書僕射裴頠議悼后故事稱繼母雖出追服無改是以孝懷皇帝尊崇號諡還葬峻陵此則母子道全而廢事蕩革也于時祭于弘訓之宮未入太廟蓋是事之未盡非義典也若以悼后復位為宜則應配食世祖若以復之為非則譜諡宜闕未有位號居正而偏祠別室者也若以孝懷皇帝私隆母子之道特為立廟者此苟崇私情有虧國典則國譜帝諱皆宜除棄匪徒不得同祀于世祖之廟也會稽王昱中書監庾冰中書令何充尚書令諸葛恢尚書謝廣光祿勳留擢丹楊尹殷融護軍將軍馮懷散騎常侍鄧逸等咸從潭議由是太后配食武帝左貴嬪名芬兄思別有傳芬少好學善綴文名亞于思武帝聞而納之泰始八年拜修儀受詔作愁思之文因為離思賦曰生蓬戶之側陋兮不閑習於文符不見圖畫之妙像兮不聞先哲之典謨既愚陋而寡識兮謬忝厠于紫廬非草苗之所處兮怵惕以憂懼懷思慕之忉怛兮兼始終之萬慮嗟隱憂之沈積兮獨鬱結而靡訴意慘憒而無聊兮思纏綿以增慕夜耿耿而不寐兮魂憧憧而至曙風騷騷而四起兮霜皚皚而依庭日晻曖而無光兮氣懰慄以洌清懷愁戚之多感兮患涕淚之自零昔伯瑜之婉孌兮每綵衣以娛親悼今日之乖隔兮奄與家為參辰豈相去之云遠兮曾不盈乎數尋何宮禁之清切兮欲瞻覩而莫因仰行雲以歔欷兮涕流射而沾巾惟屈原之哀感兮嗟悲傷于離別彼城闕之作詩兮亦以日而喻月況骨肉之相於兮永緬邈而兩絕長含哀而抱戚兮仰蒼天而泣血亂曰骨肉至親化為他人永長辭兮慘愴愁悲夢想魂歸見所思兮驚寤號咷心不自聊泣漣洏兮援筆舒情涕淚增零訴斯詩兮後為貴嬪姿陋無寵以才德見禮體羸多患常居薄室帝每遊華林輒回輦過之言及文義辭對清華左右侍聽莫不稱美及元楊皇后崩芬獻誄曰惟泰始十年秋七月丙寅晉元皇后楊氏崩嗚呼哀哉昔有莘適殷姜姒歸周宣德中闈徽音永流樊衞二姬匡齊翼楚馬鄧兩妃亦毗漢主峨峨元后光嬪晉宇伉儷聖皇比蹤往古遭命不永背陽即陰六宮號咷四海慟心嗟余鄙妾銜恩特深追慕三良甘心自沈何用存思不忘德音何用紀述託辭翰林乃作誄曰赫赫元后出自有楊奕世朱輪燿彼華陽惟嶽降神顯茲禎祥篤生英媛休有烈光含靈握文異于庶姜和暢春日操厲秋霜疾彼攸遂敦此義方率由四教匪怠匪荒行周六親徽音顯揚顯揚伊何京室是臧乃娉乃納聿嬪聖皇正位閨閾惟德是將鳴珮有節發言有章仰觀列圖俯覽篇籍顧問女史咨詢竹帛思媚皇姑虔恭朝夕允釐中饋執事有恪于禮斯勞于敬斯勤雖曰齊聖邁德日新日新伊何克廣弘仁終溫且惠帝妹是親經緯六宮罔不彌綸羣妾惟仰譬彼北辰亦既青陽鳴鳩告時躬執桑曲率導媵姬修成蠶蔟分繭理絲女工是察祭服是治祗奉宗廟永言孝思于彼六行靡不蹈之皇英佐舜塗山翼禹惟衞惟樊二霸是輔明明我后異世同矩亦能有亂謀及天府內敷陰教外毗陽化綢繆庶正密勿夙夜恩從風翔澤隨雨播中外禔福遐邇詠歌天祚貞吉克昌克繁則百斯慶育聖育賢教踰妊姒訓邁姜嫄堂堂太子惟國之元濟濟南陽為屏為藩本支菴藹四海蔭焉微斯皇妣孰茲克臻曰乾蓋聰曰聖允誠積善之堂五福所并宜享高年匪隕匪傾如彭之齒如聃之齡云胡不造于茲禍殃寢疾彌留寤寐不康巫咸騁術和鵲奏方祈禱無應嘗藥無良形神將離載昏載荒奄忽崩殂湮精滅光哀哀太子南陽繁昌攀援不寐擗踊摧傷嗚呼哀哉闔宮號咷宇內震驚奔者填衢赴者塞庭哀慟雷駭流淚雨零歔欷不已若喪所生惟帝與后契闊在昔比翼白屋雙飛紫閣悼后傷后早即窀穸言斯既及涕泗隕落追惟我后實聰實哲通于性命達于儉節送終之禮比素上世襚無珍寶唅無明月潛輝梓宮永背昭晰臣妾哀號同此斷絕庭宇遏密幽室增陰空設幃帳虛置衣衾人亦有言神道難尋悠悠精爽豈浮豈沈豐奠日陳冀魂之臨孰云元后不聞其音乃議景行景行已溢乃考龜筮龜筮襲吉爰定宅兆克成玄室魂之往矣于以令日仲秋之晨啟明始出星陳夙駕靈輿結駟其輿伊何金根玉箱其駟伊何二駱雙黃習習容車朱服丹章隱隱軒弁絰繐裳華轂曜野素蓋被原方相仡仡旌旐翻翻輓童引歌白驥鳴轅觀者夾塗士女涕漣千乘萬騎迄彼峻山峻山峨峨曾阜重阿弘高顯敞據洛背河左瞻皇姑右睇帝家推存揆亡明神所嘉諸姑姊妹娣姒媵御追送塵軌號咷衢路王侯卿士雲會星布羣官庶僚縞蓋無數咨嗟通夜東方云曙百祇奉迎我后安厝中外俱臨同哀並慕涕如連雲淚如湛露扃闓既闔窈窈冥冥有夜無晝曷用其明不封不樹山坂同形昔后之崩大火西流寒往暑過今亦孟秋自我銜卹儵忽一周衣服將變痛心若抽逼彼禮制惟以增憂去此素衣結戀靈丘有始有終天地之經自非三光誰能不零存播令德沒圖丹青先哲之志以此為榮溫溫元后實宣慈焉撫育羣生恩惠滋焉遺愛不已永見思焉懸名日月垂萬春焉嗚呼庶妾感四時焉言思言慕涕漣洏焉咸寧二年納悼后芬于座受詔作頌其辭曰峨峨華嶽峻極泰清巨靈導流河瀆是經惟瀆之神惟嶽之靈鍾于楊族載育盛明穆穆我后應期挺生含聰履喆岐嶷夙成如蘭之茂如玉之榮越在幼沖休有令名飛聲八極翕習紫庭超妊邈姒比德皇英京室是嘉備禮致娉令月吉辰百僚奉迎周生歸韓詩人是詠我后戾止車服暉暎登位太微明德日盛羣黎欣戴函夏同慶翼翼聖皇叡喆孔純愍茲狂戾闡惠播仁蠲釁滌穢與時惟新沛然洪赦恩詔遐震后之踐阼囹圄虛陳萬國齊歡六合同欣坤神抃舞天人載悅興瑞降祥表精日月和氣烟熅三光朗烈既獲嘉時尋播甘雪玄雲晻藹靈液霏霏既儲既積待陽而晞曣晛沾濡柔潤中畿長享豐年福祿永綏及帝女萬年公主薨帝痛悼不已詔芬為誄其文甚麗帝重芬詞藻每有方物異寶必詔為賦頌以是屢獲恩賜焉答兄思詩書及雜賦頌數十篇並行于世胡貴嬪名芳父奮別有傳泰始九年帝多簡良家子女以充內職自擇其美者以絳紗繫臂而芳既入選下殿號泣左右止之曰陛下聞聲芳曰死且不畏何畏陛下帝遣洛陽令司馬肇策拜芳為貴嬪帝每有顧問不飾言辭率爾而答進退方雅時帝多內寵平吳之後復納孫晧宮人數千自此掖庭殆將萬人而並寵者甚衆帝莫知所適常乘羊車恣其所之至便宴寢宮人乃取竹葉插戶以鹽汁灑地而引帝車然芳最蒙愛幸殆有專房之寵焉侍御服飾亞于皇后帝嘗與之摴蒱爭矢遂傷上指帝怒曰此固將種也芳對曰北伐公孫西距諸葛非將種而何帝甚有慚色芳生武安公主諸葛夫人名婉琅邪陽都人也父沖字茂長廷尉卿婉以泰始九年春入宮帝臨軒使使持節洛陽令司馬肇拜為夫人兄銓字德林散騎常侍銓弟玫字仁林侍中御史中丞玫婦弟周穆清河王覃之舅也永嘉初穆與玫勸東海王越廢懷帝立覃越不許重言之越怒遂斬玫及穆臨刑玫謂穆曰我語卿何道穆曰今日復何所說時人方知謀出於穆非玫之意惠賈皇后惠賈皇后諱南風平陽人也小名父充別有傳初武帝欲為太子取衞瓘女元后納賈郭親黨之說欲婚賈氏帝曰衞公女有五可賈公女有五不可衞家種賢而多子美而長白賈家種妒而少子醜而短黑元后固請荀顗荀勖並稱充女之賢乃定婚始欲聘后妹午午年十二小太子一歲短小未勝衣更娶南風時年十五大太子二歲泰始八年二月辛卯冊拜太子妃妒忌多權詐太子畏而惑之嬪御罕有進幸者帝常疑太子不慧且朝臣和嶠等多以為言故欲試之盡召東宮大小官屬為設宴會而密封疑事使太子決之停信待反妃大懼倩外人作答答者多引古義給使張泓曰太子不學而答詔引義必責作草主更益譴負不如直以意對妃大喜語泓便為我好答富貴與汝共之泓素有小才具草令太子自寫帝省之甚悅先示太子少傅衞瓘瓘大踧踖衆人乃知瓘先有毀言殿上皆稱萬歲充密遣語妃云衞瓘老奴幾破汝家妃性酷虐嘗手殺數人或以戟擲孕妾子隨刃墮地帝聞之大怒已修金墉城將廢之充華趙粲從容言曰賈妃年少妒是婦人之情耳長自當差願陛下察之其後楊珧亦為之言曰陛下忘賈公閭耶荀勖深救之故得不廢惠帝即位立為皇后生河東臨海始平公主哀獻皇女后暴戾日甚侍中賈模后之族兄右衞郭彰后之從舅並以才望居位與楚王瑋東安公繇分掌朝政后母廣城君養孫賈謐干預國事權侔人主繇密欲廢后賈氏憚之及太宰亮衞瓘等表繇徙帶方奪楚王中候后知瑋怨之乃使帝作密詔令瑋誅瓘亮以報宿憾模知后凶暴恐禍及己乃與裴頠王衍謀廢之衍悔而謀寢后遂荒淫放恣與太醫令程據等亂彰內外洛南有盜尉部小吏端麗美容止既給厮役忽有非常衣服衆咸疑其竊盜尉嫌而辯之賈后疏親欲求盜物往聽對辭小吏云先行逢一老嫗說家有疾病師卜云宜得城南少年厭之欲暫相煩必有重報於是隨去上車下帷內簏箱中行可十餘里過六七門限開簏箱忽見樓闕好屋問此是何處云是天上即以香湯見浴好衣美食將入見一婦人年可三十五六短形青黑色眉後有疵見留數夕共寢歡宴臨出贈此衆物聽者聞其形狀知是賈后慚笑而去尉亦解意時他人入者多死惟此小吏以后愛之得全而出及河東公主有疾師巫以為宜施寬令乃稱詔大赦天下初后詐有身內物為產具遂取妹夫韓壽子慰祖養之託諒闇所生故弗顯遂謀廢太子以所養代立時洛中謠曰南風烈烈吹黃沙遙望魯國鬱嵯峨前至三月滅汝家后母廣城君以后無子甚敬重愍懷每勸厲后使加慈愛賈謐恃貴驕縱不能推崇太子廣城君切責之及廣城君病篤占術謂不宜封廣城乃改封宜城后出侍疾十餘日太子常往宜城第將醫出入恂恂盡禮宜城臨終執后手令盡意于太子言甚切至又曰趙粲及午必亂汝事我死後勿復聽入深憶吾言后不能遵之遂專制天下威服內外更與粲午專為姦謀誣害太子衆惡彰著初誅楊駿及汝南王亮太保衞瓘楚王瑋等皆臨機專斷宦人董猛參預其事猛武帝時為寺人監侍東宮得親信于后預誅楊駿封武安侯猛三兄皆為亭侯天下咸怨及太子廢黜趙王倫孫秀等因衆怨謀欲廢后后數遣宮婢微服於人間視聽其謀頗泄后甚懼遂害太子以絕衆望趙王倫乃率兵入宮使翊軍校尉齊王冏入殿廢后后與冏母有隙故倫使之后驚曰卿何為來冏曰有詔收后后曰詔當從我出何詔也后至上閤遙呼帝曰陛下有婦使人廢之亦行自廢又問冏曰起事者誰冏曰梁趙后曰繫狗當繫頸今反繫其尾何得不然至宮西見謐尸再舉聲而哭遽止倫乃矯詔遣尚書劉弘等持節齎金屑酒賜后死后在位十一年趙粲賈午韓壽董猛等皆伏誅臨海公主先封清河洛陽之亂為人所略傳賣吳興錢溫溫以送女女遇主甚酷元帝鎮建鄴主詣縣自言元帝誅溫及女改封臨海宗正曹統尚之惠羊皇后謝夫人惠羊皇后諱獻容泰山南城人祖瑾父玄之並見外戚傳賈后既廢孫秀議立后后外祖孫旂與秀合族又諸子自結於秀故以太安元年立為皇后將入宮衣中有火成都王穎伐長沙王以討玄之為名敗穎奏廢后為庶人處金墉城陳眕等唱伐成都王大赦復后位張方入洛又廢后方逼遷大駕幸長安留臺復后位永興初張方又廢后河間王顒矯詔以后屢為姦人所立遣尚書田淑敕留臺賜后死詔書累至司隸校尉劉暾與尚書僕射荀藩河南尹周馥馳上奏曰奉被手詔伏讀惶悴臣按古今書籍亡國破家毀喪宗祊皆由犯衆違人之所致也陛下遷幸舊京廓然衆庶悠悠罔所依倚家有跂踵之心人想鑾輿之聲思望大德釋兵歸農而兵纏不解處處互起豈非善者不至人情猜隔故耶今上官巳犯闕稱兵焚燒宮省百姓諠駭宜鎮之以靜而大使卒至赫然執藥當詣金墉內外震動謂非聖意羊庶人門戶殘破廢放空宮門禁峻密若絕天地無緣得與姦人搆亂衆無智愚皆謂不然刑書猥至罪不值辜人心一憤易致興動夫殺一人而天下喜悅者宗廟社稷之福也今殺一枯窮之人而令天下傷慘臣懼凶豎乘間妄生變故臣忝司京輦觀察衆心實以深憂宜當含忍不勝所見謹密啟聞願陛下更深與太宰參詳勿令遠近疑惑取謗天下顒見表大怒乃遣陳顏呂朗東收暾暾奔青州后遂得免帝還洛迎后復位後洛陽令何喬又廢后及張方首至其日復后位會帝崩后慮太弟立為嫂叔不得稱太后催前太子清河王覃入將立之不果懷帝即位尊后為惠帝皇后居弘訓宮洛陽敗沒于劉曜曜僭位以為皇后因問曰吾何如司馬家兒后曰胡可並言陛下開基之聖主彼亡國之暗夫有一婦一子及身三耳不能庇之貴為帝王而妻子辱于凡庶之手遣妾爾時實不思生何圖復有今日妾生於高門常謂世間男子皆然自奉巾櫛以來始知天下有丈夫耳曜甚愛寵之生曜二子而死偽諡獻文皇后謝夫人名玖家本貧賤父以屠羊為業玖清惠貞正而有淑姿選入後庭為才人惠帝在東宮將納妃武帝慮太子尚幼未知帷房之事乃遣往東宮侍寢由是得幸有身賈后妒忌之玖求還西宮遂生愍懷太子年三四歲惠帝不知也入朝見愍懷與諸皇子共戲執其手武帝曰是汝兒也及立為太子拜玖為淑媛賈后不聽太子與玖相見處之一室及愍懷遇酷玖亦被害焉永康初詔改葬太子因贈玖夫人印綬葬顯平陵懷王皇太后懷王皇太后諱媛姬不知所出初入武帝宮拜中才人早卒懷帝即位追尊曰皇太后元夏侯太妃元夏侯太妃名光姬沛國譙人也祖威兗州刺史父莊字仲容淮南太守清明亭侯妃生自華宗幼而明慧琅邪武王為世子覲納焉生元帝及恭王薨元帝嗣立稱王太妃永嘉元年薨于江左葬琅邪國初有讖云銅馬入海建鄴期太妃小字銅環而元帝中興於江左焉
