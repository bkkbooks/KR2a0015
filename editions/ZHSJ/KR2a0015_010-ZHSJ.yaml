body:
  text: 晉書卷十帝紀第十安帝安皇帝諱德宗字德宗孝武帝長子也太元十二年八月辛巳立為皇太子二十一年九月庚申孝武帝崩辛酉太子即皇帝位大赦癸亥以司徒會稽王道子為太傅攝政冬十月甲申葬孝武皇帝于隆平陵大雪隆安元年春正月己亥朔帝加元服改元增文武位一等太傅會稽王道子稽首歸政以尚書左僕射王珣為尚書令領軍將軍王國寶為尚書左僕射二月呂光將禿髮烏孤自稱大都督大單于國號南涼擊光將竇苟于金昌大破之甲寅尊皇太后李氏為太皇太后戊午立皇后王氏三月呂光子纂為乞伏乾歸所敗光建康太守段業自號涼州牧慕容寶敗魏師于薊夏四月甲戌兗州刺史王恭豫州刺史庾楷舉兵以討尚書左僕射王國寶建威將軍王緒為名甲申殺國寶及緒以悅于恭恭乃罷兵戊子大赦五月前司徒長史王廞以吳郡反王恭討平之慕容寶將慕容詳僭即皇帝位于中山寶奔黃龍秋八月呂光為其僕射楊軌散騎常侍郭黁所攻光子纂擊走之九月慕容寶將慕容麟斬慕容詳于中山因僭即皇帝位冬十月慕容麟為魏師所敗二年春三月龍舟二災夏五月蘭汗弒慕容寶而自稱大將軍昌黎王秋七月慕容寶子盛斬蘭汗僭稱長樂王攝天子位兗州刺史王恭豫州刺史庾楷荊州刺史殷仲堪廣州刺史桓玄南蠻校尉楊佺期等舉兵反八月江州刺史王愉奔于臨川丙子寧朔將軍鄧啟方及慕容德將慕容法戰于管城王師敗績丙戌慕容盛僭即皇帝位於黃龍桓玄大敗王師于白石九月辛卯加太傅會稽王道子黃鉞遣征虜將軍會稽王世子元顯前將軍王珣右將軍謝琰討桓玄等己亥破庾楷于牛渚丙午會稽王道子屯中堂元顯守石頭己酉前將軍王珣守北郊右將軍謝琰備宣陽門輔國將軍劉牢之次新亭使子敬宣擊敗恭恭奔曲阿長塘湖湖尉收送京師斬之於是遣太常殷茂喻仲堪及玄玄等走于尋陽冬十月新野言騶虞見丙子大赦壬午仲堪等盟于尋陽推桓玄為盟主十一月以琅邪王德文為衞將軍開府儀同三司領軍將軍王雅為尚書左僕射十二月己丑魏王珪即尊位年號天興京兆人韋華帥襄陽流人叛降于姚興己酉前新安太守杜炯反于京口會稽王世子元顯討斬之禿髮烏孤自稱武威王三年春正月辛酉封宗室蘊為淮陵王二月甲辰河間王國鎮薨林邑范胡達陷日南九真遂寇交阯太守杜瑗討破之段業自稱涼王仇池公楊盛遣使稱藩獻方物三月己卯追尊所生陳夫人為德皇太后夏四月乙未加尚書令王珣衞將軍以會稽王世子元顯為揚州刺史六月戊子以琅邪王德文為司徒慕容德陷青州害龍驤將軍辟閭渾遂僭即皇帝位于廣固秋八月禿髮烏孤死其弟利鹿孤嗣偽位冬十月姚興陷洛陽執河南太守辛恭靖十一月甲寅妖賊孫恩陷會稽內史王凝之死之吳國內史桓謙臨海太守新蔡王崇義興太守魏隱並委官而遁吳興太守謝邈永嘉太守司馬逸皆遇害遣衞將軍謝琰輔國將軍劉牢之逆擊走之十二月桓玄襲江陵荊州刺史殷仲堪南蠻校尉楊佺期並遇害呂光立其太子紹為天王自號太上皇是日光死呂纂弒紹而自立是歲荊州大水平地三丈四年春正月乙亥大赦二月己丑有星孛于奎婁進至紫微三月彗星見于太微夏四月地震孫恩寇浹口五月丙寅散騎常侍衞將軍東亭侯王珣卒己卯會稽內史謝琰為孫恩所敗死之恩轉寇臨海六月庚辰朔日有蝕之旱輔國司馬劉裕破恩於南山恩將盧循陷廣陵死者三千餘人以琅邪王師何澄為尚書左僕射秋七月壬子太皇太后李氏崩丁卯大赦是月姚興伐乞伏乾歸降之八月丁亥尚書右僕射王雅卒壬寅葬文太后于脩平陵九月癸丑地震冬十一月寧朔將軍高雅之及孫恩戰於餘姚王師敗績以揚州刺史元顯為後將軍開府儀同三司都督揚豫徐兗青幽冀并荊江司雍梁益交廣十六州諸軍事前將軍劉牢之為鎮北將軍封元顯子彥璋為東海王十二月戊寅有星孛于天市是歲河右諸郡奉涼武昭王李玄盛為秦涼二州牧涼公年號庚子五年春二月丙子孫恩復寇浹口呂超弒呂纂以其兄隆僭即偽位三月甲寅衆星西流歷太微夏五月孫恩寇滬瀆吳國內史袁山松死之沮渠蒙遜殺段業自號大都督北涼州牧六月甲戌孫恩至丹徒乙亥內外戒嚴百官入居于省冠軍將軍高素右衞將軍張崇之守石頭輔國將軍劉襲柵斷淮口丹楊尹司馬恢之戍南岸冠軍將軍桓謙輔國將軍司馬允之游擊將軍毛邃備白石左衞將軍王嘏領軍將軍孔安國屯中皇堂徵豫州刺史譙王尚之衞京師寧朔將軍高雅之擊孫恩于廣陵之郁洲為賊所執秋七月段璣弒慕容盛盛叔父熙盡誅段氏因僭稱尊號九月呂隆降于姚興冬十月姚興帥師侵魏大敗而旋是歲饑禁酒元興元年春正月庚午朔大赦改元以後將軍元顯為驃騎大將軍征討大都督鎮北將軍劉牢之為元顯前鋒前將軍譙王尚之為後部以討桓玄二月丙午帝戎服餞元顯于西池丁巳遣兼侍中齊王柔之以騶虞幡宣告荊江二州丁卯桓玄敗王師于姑孰譙王尚之齊王柔之並死之以右將軍吳隱之為都督交廣二州諸軍事廣州刺史三月己巳劉牢之叛降于桓玄辛未王師敗績于新亭驃騎大將軍會稽王世子元顯東海王彥璋冠軍將軍毛泰游擊將軍毛邃並遇害壬申桓玄自為侍中丞相錄尚書事以桓謙為尚書僕射遷太傅會稽王道子于安城玄俄又自稱太尉揚州牧總百揆以琅邪王德文為太宰臨海太守辛景擊孫恩斬之是月禿髮利鹿孤死弟檀嗣偽位秋七月乙亥新蔡王崇為其奴所害八月庚子尚書下舍災冬十月冀州刺史劉軌叛奔于慕容德十二月庚申會稽王道子為桓玄所害曲赦廣陵彭城大逆以下二年春二月辛丑建威將軍劉裕破徐道覆于東陽乙卯桓玄自稱大將軍丁巳冀州刺史孫無終為桓玄所害夏四月癸巳朔日有蝕之秋八月玄又自號相國楚王九月南陽太守庾仄起義兵為玄所敗冬十一月壬午玄遷帝于永安宮癸未移太廟神主于琅邪國十二月壬辰玄篡位以帝為平固王辛亥帝蒙塵于尋陽三年春二月帝在尋陽庚寅夜濤水入石頭漂殺人戶乙卯建武將軍劉裕帥沛國劉毅東海何無忌等舉義兵丙辰斬桓玄所署徐州刺史桓修于京口青州刺史桓弘于廣陵丁巳義師濟江三月戊午劉裕斬玄將吳甫之于江乘斬皇甫敷於羅落己未玄衆潰而逃庚申劉裕置留臺具百官壬戌桓玄司徒王謐推劉裕行鎮軍將軍徐州刺史都督揚徐兗豫青冀幽并八州諸軍事假節劉裕以謐領揚州刺史錄尚書事辛酉劉裕誅尚書左僕射王愉愉子荊州刺史綏司州刺史溫詳辛未桓玄逼帝西上丙戌密詔以幽逼於玄萬機虛曠令武陵王遵依舊典承制總百官行事加侍中餘如故并大赦謀反大逆已下惟桓玄一祖之後不宥夏四月己丑大將軍武陵王遵稱制總萬機庚寅帝至江陵庚戌輔國將軍何無忌振武將軍劉道規及桓玄將庾稚何澹之戰于湓口大破之玄復逼帝東下五月癸酉冠軍將軍劉毅及桓玄戰于崢嶸洲又破之己卯帝復幸江陵辛巳荊州別駕王康產南郡太守王騰之奉帝居于南郡壬午督護馮遷斬桓玄於貊盤洲乘輿反正于江陵甲申詔曰姦兇篡逆自古有之朕不能式遏杜漸以致播越賴鎮軍將軍裕英略奮發忠勇絕世冠軍將軍毅等誠心宿著協同嘉謀義聲既振士庶效節社稷載安四海齊慶其大赦凡諸畏逼事屈逆命者一無所問戊寅奉神主入于太廟閏月己丑桓玄故將揚武將軍桓振陷江陵劉毅何無忌退守尋陽帝復蒙塵于賊營六月益州刺史毛璩討偽梁州刺史桓希斬之秋七月戊申永安皇后何氏崩八月癸酉祔葬穆帝章皇后于永平陵九月前給事中刁騁祕書丞王邁之謀反伏誅冬十月盧循寇廣州刺史吳隱之為循所敗執始興相阮腆之而還慕容德死兄子超嗣偽位義熙元年春正月帝在江陵南陽太守魯宗之起義兵襲破襄陽己丑劉毅次于馬頭桓振以帝屯于江津辛卯宗之破振將溫楷于柞溪進次紀南為振所敗振武將軍劉道規擊桓謙走之乘輿反正帝與琅邪王幸道規舟戊戌詔曰朕以寡德夙纂洪緒不能緝熙遐邇式遏姦宄逆臣桓玄乘釁肆亂乃誣罔天人篡據極位朕躬播越淪胥荒裔宣皇之基眇焉以墜賴鎮軍將軍裕忠武英斷誠冠終古運謀機始貞賢協其契抆淚誓衆義士感其心故霜戈一揮巨猾奔迸三率棱威大憝授首而孽振猖狂嗣凶荊郢幸天祚社稷義旗載捷狡徒沮潰朕獲反正斯實宗廟之靈勤王之勳豈朕一人獨享伊祜思與億兆幸茲更始其大赦改元唯玄振一祖及同黨不在原例賜百官爵二級魚眾寡孤獨穀人五斛大酺五日二月丁巳留臺備乘輿法駕迎帝於江陵弘農太守戴寧之建威主簿徐惠子等謀反伏誅平西參軍譙縱害平西將軍益州刺史毛璩以蜀叛三月桓振復襲江陵荊州刺史司馬休之奔于襄陽建威將軍劉懷肅討振斬之帝至自江陵乙未百官詣闕請罪詔曰此非諸卿之過其還率職戊戌舉章皇后哀三日臨于西堂劉裕及何無忌等抗表遜位不許庚子以琅邪王德文為大司馬武陵王遵為太保加鎮軍將軍劉裕為侍中車騎將軍都督中外諸軍事甲辰詔曰自頃國難之後人物彫殘常所供奉猶不改舊豈所以視人如傷禹湯歸過之誡哉可籌量減省夏四月劉裕旋鎮京口戊辰餞于東堂五月癸未禁絹扇及摴蒲游擊將軍章武王秀益州刺史司馬軌之謀反伏誅桓玄故將桓亮苻宏刁預寇湘州守將擊走之秋八月甲子封臨川王子脩之為會稽王冬十一月乞伏乾歸伐仇池仇池公楊盛大破之是歲涼武昭王玄盛遣使奉表稱藩二年春正月益州刺史司馬榮期擊譙縱將譙子明于白帝破之夏五月封高密王子法蓮為高陽王秋七月梁州刺史楊孜敬有罪伏誅冬十月論匡復之功封車騎將軍劉裕為豫章郡公撫軍將軍劉毅南平郡公右將軍何無忌安成郡公自餘封賞各有差乙亥以左將軍孔安國為尚書左僕射十二月盜殺零陵太守阮野三年春二月己酉車騎將軍劉裕來朝誅東陽太守殷仲文南蠻校尉殷叔文晉陵太守殷道叔永嘉太守駱球己丑大赦除酒禁夏五月大水六月姚興將赫連勃勃僭稱天王于朔方國號夏秋七月戊戌朔日有蝕之汝南王遵之有罪伏誅八月遣冠軍將軍劉敬宣持節監征蜀諸軍事冬十一月赫連勃勃大敗禿髮檀奔于南山是歲高雲馮跋殺慕容熙雲僭即帝位四年春正月甲辰以琅邪王德文領司徒車騎將軍劉裕為揚州刺史錄尚書事庚申侍中太保武陵王遵薨夏四月散騎常侍尚書左僕射孔安國卒甲午加吏部尚書孟昶尚書左僕射冬十一月癸丑雷梁州刺史楊思平有罪棄市辛卯大風拔樹是月禿髮檀僭即涼王位十二月陳留王曹靈誕薨五年春正月辛卯大赦庚戌以撫軍將軍劉毅為衞將軍開府儀同三司加輔國將軍何無忌鎮南將軍戊戌尋陽地震二月慕容超將慕容興宗寇宿豫陽平太守劉千載南陽太守趙元並為賊所執三月己亥大雪平地數尺車騎將軍劉裕帥師伐慕容超夏六月丙寅震于太廟劉裕大破慕容超于臨朐秋七月姚興將乞伏乾歸僭稱西秦王於苑川九月戊辰離班弒高雲雲將馮跋攻班殺之跋僭即王位仍號燕冬十月魏清河王紹弒其主珪六年春二月丁亥劉裕攻慕容超克之齊地悉平是月廣州刺史盧循反寇江州三月禿髮檀及沮渠蒙遜戰于窮泉檀敗績壬申鎮南將軍江州刺史何無忌及循戰于豫章王師敗績無忌死之夏四月青州刺史諸葛長民兗州刺史劉藩并州刺史劉道憐乃入衞京師五月丙子大風拔木戊子衞將軍劉毅及盧循戰于桑落洲王師敗績尚書左僕射孟昶懼自殺己未大赦乙丑循至淮口內外戒嚴大司馬琅邪王德文都督宮城諸軍事次中皇堂太尉劉裕次石頭梁王珍之屯南掖門冠軍將軍劉敬宣屯北郊輔國將軍孟懷玉屯南岸建武將軍王仲德屯越城廣武將軍劉懷默屯建陽門淮口築柤浦藥園廷尉三壘以距之丙寅震太廟鴟尾秋七月庚申盧循遁走甲子使輔國將軍王仲德廣川太守劉鍾河間內史蒯恩等帥衆追之是月盧循寇荊州刺史劉道規雍州刺史魯宗之等敗之又破徐道覆于華容賊復走尋陽八月姚興將桓謙寇江陵劉道規敗之冬十一月蜀賊譙縱陷巴東守將溫祚時延袓死之十二月壬辰劉裕破盧循于豫章七年春二月壬午右將軍劉藩斬徐道覆于始興傳首京師夏四月盧循走交州刺史杜慧度斬之秋七月丁卯以荊州刺史劉道規為征西大將軍開府儀同三司冬十月袓渠蒙遜伐涼涼武昭王玄盛與戰敗之八年春二月丙子以吳興太守孔靖為尚書右僕射三月甲寅山陰地陷四尺有聲如雷夏五月乞伏公府弒乞伏乾歸乾歸子熾盤誅公府僭即偽位六月以平北將軍魯宗之為鎮北將軍秋七月甲午武陵王季度薨庚子征西大將軍劉道規卒八月皇后王氏崩辛亥高密王純之薨九月癸酉葬僖皇后于休平陵己卯太尉劉裕害右將軍兗州刺史劉藩尚書左僕射謝混庚辰裕矯詔曰劉毅苞藏禍心構逆南夏藩混助亂志肆姦宄賴寧輔玄鑒撫機挫銳凶黨即戮社安夫好生之德所因者本肆眚覃仁實資玄澤況事興大憝禍自元凶其大赦天下唯劉毅不在其例普增文武位一等孝順忠義隱滯遺逸必令聞達己丑劉裕帥師討毅裕參軍王鎮惡陷江陵城毅自殺冬十一月沮渠蒙遜僭號河西王十二月以西陵太守朱齡石為建威將軍益州刺史帥師伐蜀分荊州十郡置湘州是歲廬陵南康地四震九年春三月丙寅劉裕害前將軍諸葛長民及其弟輔國大將軍黎民從弟寧朔將軍秀之戊寅加劉裕鎮西將軍豫州刺史林邑范胡達寇九真交州刺史杜慧度斬之夏四月壬戌罷臨沂湖熟皇后脂澤田四十頃以賜貧人弛湖池之禁封鎮北將軍魯宗之為南陽郡公秋七月朱齡石克成都斬譙縱益州平九月封劉裕次子義真為桂楊公冬十二月安平王球之薨是歲高句麗倭國及西南夷銅頭大師並獻方物十年春三月戊寅地震夏六月乞伏熾盤帥師伐禿髮檀滅之秋七月淮北大風壞廬舍九月丁巳朔日有蝕之林邑遣使來獻方物是歲城東府十一年春正月荊州刺史司馬休之雍州刺史魯宗之並舉兵貳於劉裕裕帥師討之庚午大赦丁丑以吏部尚書謝裕為尚書左僕射二月丁未姚興死子泓嗣偽位三月辛巳淮陵王蘊薨壬午劉裕及休之戰于江津休之敗奔襄陽夏四月乙卯青冀二州刺史劉敬宣為其參軍司馬道賜所害五月甲申彗星二見甲午休之宗之出奔于姚泓論平蜀功封劉裕子義隆彭城公朱齡石豐城公己酉霍山崩出銅鍾六枚秋七月丙戌京師大水壞太廟辛亥晦日有蝕之八月丁未尚書左僕射謝裕卒以尚書右僕射劉穆之為尚書左僕射九月己亥大赦十二年春正月姚泓使其將魯軌寇襄陽雍州刺史趙倫之擊走之二月加劉裕中外大都督夏六月赫連勃勃攻姚泓秦州陷之己酉新除尚書令都鄉亭侯劉柳卒秋八月劉裕及琅邪王德文帥衆伐姚泓丙午大赦冬十月丙寅姚泓將姚光以洛陽降己丑遣兼司空高密王恢之修謁五陵十三年春正月甲戌朔日有蝕之二月涼武昭王李玄盛薨世子士業嗣位為涼州牧涼公三月龍驤將軍王鎮惡大破姚泓將姚紹于潼關夏劉裕敗魏將鵝青于河曲斬青裨將阿薄干是月涼公李士業大敗沮渠蒙遜于鮮支澗五月劉裕克潼關丁亥會稽王脩之薨六月癸亥林邑獻馴象白鸚鵡秋七月劉裕克長安執姚泓收其彝器歸諸京師南海賊徐道期陷廣州始興相劉謙之討平之冬十一月辛未左僕射前將軍劉穆之卒十四年春正月辛巳大赦青州刺史沈田子害龍驤將軍王鎮惡于長安夏六月劉裕為相國進封宋公冬十月以涼公士業為鎮西將軍封酒泉公十一月赫連勃勃大敗王師于青泥北雍州刺史朱齡石焚長安宮殿奔于潼關尋又大潰齡石死之十二月戊寅帝崩于東堂時年三十七葬休平陵帝不惠自少及長口不能言雖寒暑之變無以辯也凡所動止皆非己出故桓玄之篡因此獲全初讖云昌明之後有二帝劉裕將為禪代故密使王韶之縊帝而立恭帝以應二帝云恭帝恭帝諱德文字德文安帝母弟也初封琅邪王歷中軍將軍散騎常侍衞將軍開府儀同三司加侍中領司徒錄尚書六條事元興初遷車騎大將軍桓玄執政進位太宰加兗冕之服綠綟綬玄篡位以帝為石陽縣公與安帝俱居尋陽及玄敗隨至江陵玄死桓振奄至躍馬奮戈直至階下瞋目謂安帝曰臣門戶何負國家而屠滅若是帝乃下牀謂振曰此豈我兄弟意邪振乃下馬致拜振平復為琅邪王又領徐州刺史尋拜大司馬領司徒加殊禮義熙五年置左右長史司馬從事中郎四人加羽葆鼓吹十二年詔曰大司馬明德懋親太尉道勳光大並徽序彝倫燮和二氣髦俊引領思佐鼎飪而雅尚沖挹四門弗闢誠合大雅謙虛之道實違急賢贊世之務昔蒲輪載徵異人並出東平開府奇士嚮臻濟濟之盛朕有欽焉可敕二府依舊辟召必將明敭俊嗣軌前賢矣於是始辟召掾屬時太尉裕都督中外諸軍詔曰大司馬地隆任重親賢莫貳雖府受節度可身無致敬劉裕之北征也帝上疏請帥所莅啟行戎路修敬山陵朝廷從之乃與裕俱發及有司以即戎不得奉辭陵廟帝復上疏曰臣推轂閫外將革寒暑不獲展情埏要私心罔極伏願天慈特垂聽許使臣微誠粗申即路無恨許之及姚泓滅歸于京都十四年十二月戊寅安帝崩劉裕矯稱遺詔曰唯我有晉誕膺明命業隆九有光宅四海朕以不德屬當多難幸賴宰輔拯厥顛覆仍恃保祐克黜禍亂遂冕旒辰極混一六合方憑阿衡惟新洪業而遘疾大漸將遂弗興仰惟祖宗靈命親賢是荷咨爾大司馬琅邪王體自先皇明德光懋屬惟儲貳衆望攸集其君臨晉邦奉係宗祀允執其中燮和天下闡揚末誥無廢我高祖之景命是日即帝位大赦元熙元年春正月壬辰朔改元以山陵未厝不朝會立皇后褚氏甲午徵劉裕還朝戊戌有星孛于太微西藩庚申葬安皇帝于休平陵帝受朝懸而不樂以驃騎將軍劉道憐為司空秋八月劉裕移鎮壽陽以劉懷慎為前將軍北徐州刺史鎮彭城九月劉裕自解揚州冬十月乙酉裕以其子桂陽公義真為揚州刺史十一月丁亥朔日有蝕之十二月辛卯裕加殊禮己卯太史奏黑龍四見于東方二年夏六月壬戌劉裕至于京師傅亮承裕密旨諷帝禪位草詔請帝書之帝欣然謂左右曰晉氏久已失之今復何恨乃書赤紙為詔甲子遂遜于琅邪第劉裕以帝為零陵王居于秣陵行晉正朔車旗服色一如其舊有其文而不備其禮帝自是之後深慮禍機褚后常在帝側飲食所資皆出褚后故宋人莫得伺其宋永初二年九月丁丑裕使后兄叔度請后有間兵人踰垣而入弒帝于內房時年三十六諡恭皇帝葬沖平陵帝幼時性頗忍急及在藩國曾令善射者射馬為戲既而有人云馬者國姓而自殺之不祥之甚帝亦悟甚悔之其後復深信浮屠道鑄貨千萬造丈六金像親於瓦官寺迎之步從十許里安帝既不惠帝每侍左右消息溫涼寢食之節以恭謹聞時人稱焉始元帝以丁丑歲稱晉王置宗廟使郭璞筮之云享二百年自丁丑至禪代之歲年在庚申為一百四歲然丁丑始係西晉庚申終入宋年所餘惟一百有二歲耳璞蓋以百二之期促故婉而倒之為二百也史臣曰安帝即位之辰鍾無妄之日道子元顯並傾朝政主昏臣亂未有如斯不亡者也雖有手握戎麾心存舊國迴首無良忽焉蕭散於是桓玄乘釁勢踰飆指六師咸泯隻馬徂遷是以宋高非典午之臣孫恩豈金行之寇若乃世遇顛覆則恭皇斯甚於越之民詎燻丹穴會稽之侶寧歎入臣去皇屋而歸來灑丹書而不恨夫五運攸革三微數盡猶高秋彫候理之自然觀其搖落人有為之流漣者也贊曰安承流湎大盜斯張恭乃寓命他人是綱猶存周赧始立懷王虛尊假號異術同亡
