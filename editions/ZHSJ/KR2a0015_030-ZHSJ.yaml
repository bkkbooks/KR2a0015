body:
  text: 晉書卷三十志第二十刑法傳曰齊之以禮有恥且格刑之不可犯不若禮之不可踰則昊歲比於犧年宜有降矣若夫穹圓肇判宵貌攸分流形播其喜怒稟氣彰其善惡則有自然之理焉念室後刑衢樽先惠將以屏除災害引導休和取譬琴瑟不忘銜策擬陽秋之成化若堯舜之為心也郊原布肅軒皇有轡野之師雷電揚威高辛有觸山之務陳乎兵甲而肆諸市朝具嚴天刑以懲亂首論其本意蓋有不得已而用之者焉是以丹浦興仁羽山咸服而世屬僥倖事關攸蠹政失禮微獄成刑起則孔子曰聽訟吾猶人也必也使無訟乎及周氏龔行却收鋒刃祖述生成憲章堯禹政有膏露威兼禮樂或觀辭以明其趣或傾耳以照其微或彰善以激其情或除惡以崇其本至夫取威定霸一匡九合寓言成康不由凝網此所謂酌其遺美而愛民治國者焉若乃化蔑彝倫道睽明慎則夏癸之虔劉百姓商辛之毒痡四海衞鞅之無所自容韓非之不勝其虐與夫甘棠流詠未或同歸秦文初造參夷始皇加之抽脅囹圄如市悲哀盈路漢王以三章之法以弔之文帝以刑厝之道以臨之于時百姓欣然將逢交泰而犴逐情遷科隨意往獻瓊杯於闕下徙青衣於蜀路覆醢裁刑傾宗致獄況乃數囚於京兆之夜五日於長安之市北闕相引中都繼及者亦往往而有焉而將亡之國典刑咸棄刊章以急其憲適意以寬其網桓靈之季不其然歟魏明帝時宮室盛興而期會迫急有稽限者帝親召問言猶在口身首已分王肅抗疏曰陛下之所行刑皆宜死之人也然衆庶不知將為倉卒願陛下下之於吏而暴其罪均其死也不汙宮掖不為搢紳驚惋不為遠近所疑人命至重難生易殺氣絕而不續者也是以聖王重之孟軻云殺一不辜而取天下者仁者不為也世祖武皇帝接三統之微酌千年之範乃命有司大明刑憲于時詔書頒新法於天下海內同軌人甚安之條綱雖設稱為簡惠仰昭天睠下濟民心道有法而無敗德俟刑而久立及晉圖南徙百有二年仰止前規挹其流潤江左無外蠻陬來格孝武時會稽王道子傾弄朝權其所樹之黨貨官私獄烈祖惛迷不聞司敗晉之綱紀大亂焉傳曰三皇設言而民不違五帝畫象而民知禁則書所謂象以典刑流宥五刑鞭作官刑扑作教刑者也然則犯黥者皁其巾犯劓者丹其服犯臏者墨其體犯宮者雜其屨大辟之罪殊刑之極布其衣裾而無領緣投之於市與衆棄之舜命臯陶曰五刑有服五服三就五流有宅五宅三居方乎前載事既參倍夏后氏之王天下也則五刑之屬三千殷因於夏有所損益周人以三典刑邦國以五聽察民情左嘉右肺事均鎔造而五刑之屬猶有二千五百焉乃置三刺三宥三赦之法一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民一宥曰不識再宥曰過失三宥曰遺忘一赦曰幼弱再赦曰老旄三赦曰蠢愚司馬法或起甲兵以征不義廢貢職則討不朝會則誅亂嫡庶則縶變禮刑則放傳曰殷周之質不勝其文及昭后徂征穆王斯耄爰制刑辟以詰四方姦宄弘多亂離斯永則所謂夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑者也古者大刑用甲兵中刑用刀鋸薄刑用鞭扑自茲厥後狙詐彌繁武皇帝並以為往憲猶疑不可經國乃命車騎將軍守尚書令魯公徵求英俊刊律定篇云爾漢自王莽篡位之後舊章不存光武中興留心庶獄常臨朝聽訟躬決疑事是時承離亂之後法網弛縱罪名既輕無以懲肅梁統乃上疏曰臣竊見元帝初元五年輕殊刑三十四事哀帝建平元年盡四年輕殊死者刑八十一事其四十二事手殺人皆減死罪一等著為常法自是以後人輕犯法吏易殺人吏民俱失至於不羈臣愚以為刑罰不苟務輕務其中也君人之道仁義為主仁者愛人義者理務愛人故當為除害理務亦當為去亂是以五帝有流殛放殺之誅三王有大辟刻肌之刑所以為除殘去亂也故孔子稱仁者必有勇又曰理財正辭禁人為非曰義高帝受命制約令定法律傳之後世可常施行文帝寬惠溫克遭世康平因時施恩省去肉刑除相坐之法他皆率由舊章天下幾致升平武帝值中國隆盛財力有餘出兵命將征伐遠方軍役數興百姓罷弊豪桀犯禁姦吏弄法故設遁匿之科著知縱之律宣帝聰明正直履道握要以御海內臣下奉憲不失繩墨元帝法律少所改更天下稱安孝成孝哀承平繼體即位日淺聽斷尚寡丞相王嘉等猥以數年之間虧除先帝舊約穿令斷律凡百餘事或不便於政或不厭人心臣謹表取其尤妨政事害善良者傅奏如左伏惟陛下苞五常履九德推時撥亂博施濟時而反因循季世末節衰微軌迹誠非所以還初反本據元更始也願陛下宣詔有司悉舉初元建平之所穿鑿考其輕重察其化俗足以知政教所處擇其善者而從之其不善者而改之定不易之典施之無窮天下幸甚事下三公廷尉議以為隆刑峻法非明王急務不可開許統復上言曰有司猥以臣所上不可施行今臣所言非曰嚴刑竊謂高帝以後至於宣帝其所施行考合經傳比方今事非隆刑峻法不勝至願願得召見若對尚書近臣口陳其意帝令尚書問狀統又對極言政刑宜改議竟不從及明帝即位常臨聽訟觀錄洛陽諸獄帝性既明察能得下姦故尚書奏決罰近於苛碎至章帝時尚書陳寵上疏曰先王之政賞不僭刑不濫與其不得已寧僭不濫故唐堯著典曰流宥五刑眚災肆赦帝舜命臯陶以五宅三居惟明克允文王重易六爻而列叢棘之聽周公作立政戒成王勿誤乎庶獄陛下即位率由此義而有司執事未悉奉承斷獄者急於榜格酷烈之痛執憲者繁於詐欺放濫之文違本離實箠楚為姦或因公行私以逞威福夫為政也猶張琴瑟大弦急者小弦絕故子貢非臧孫之猛法而美鄭僑之仁政方今聖德充塞假於上下宜因此時隆先聖之務蕩滌煩苛輕薄箠楚以濟羣生廣至德也帝納寵言決罪行刑務於寬厚其後遂詔有司禁絕鉆鑽諸酷痛舊制解祅惡之禁除文致之請讞五十餘事定著于令是後獄法和平永元六年寵又代郭躬為廷尉復校律令刑法溢於甫刑者奏除之曰臣聞禮經三百威儀三千故甫刑大辟二百五刑之屬三千禮之所去刑之所取失禮即入刑相為表𩹉者也今律令犯罪應死刑者六百一十耐罪千六百九十八贖罪以下二千六百八十一溢於甫刑千九百八十九其四百一十大辟千五百耐罪七十九贖罪春秋保乾圖曰王者三百年一蠲法漢興以來三百二年憲令稍增科條無限又律有三家說各駁異刑法繁多宜令三公廷尉集平律令應經合義可施行者大辟二百耐罪贖罪二千八百合為三千與禮相應其餘千九百八十九事悉可詳除使百姓改易視聽以成大化致刑措之美傳之無窮未及施行會寵抵罪遂寢寵子忠忠後復為尚書略依寵意奏上三十三條為決事比以省請讞之弊又上除蠶室刑解贓吏三世禁錮狂易殺人得減重論母子兄弟相代死聽赦所代者事皆施行雖時有蠲革而舊律繁蕪未經纂集獻帝建安元年應劭又刪定律令以為漢議表奏之曰夫國之大事莫尚載籍也載籍也者決嫌疑明是非賞刑之宜允執厥中俾後之人永有鑒焉故膠東相董仲舒老病致仕朝廷每有政議數遣廷尉張湯親至陋巷問其得失於是作春秋折獄二百三十二事動以經對言之詳矣逆臣董卓蕩覆王室典憲焚燎靡有孑遺開闢以來莫或茲酷今大駕東邁巡省許都拔出險難其命惟新臣竊不自揆輒撰具律本章句尚書舊事廷尉板令決事比例司徒都目五曹詔書及春秋折獄凡二百五十篇蠲去復重為之節文又集議駁三十篇以類相從凡八十二事其見漢書二十五漢記四皆刪潤色以全本體其二十六博採古今瓌瑋之士德義可觀其二十七臣所創造左氏云雖有姬姜不棄憔悴雖有絲麻不棄菅蒯蓋所以代匱也是用敢露頑才廁於明哲之末雖未足綱紀國體宣洽時雍庶幾觀察增闡聖德惟因萬機之餘暇遊意省覽獻帝善之於是舊事存焉是時天下將亂百姓有土崩之勢刑罰不足以懲惡於是名儒大才故遼東太守崔寔大司農鄭玄大鴻臚陳紀之徒咸以為宜復行肉刑漢朝既不議其事故無所用矣及魏武帝匡輔漢室尚書令荀彧博訪百官復欲申之而少府孔融議以為古者敦厖善否區別吏端刑清政簡一無過失百姓有罪皆自取之末世陵遲風化壞亂政撓其俗法害其教故曰上失其道人散久矣而欲繩之以古刑投之以殘棄非所謂與時消息也紂斮朝涉之脛天下謂為無道夫九牧之地千八百君若各刖一人是天下常有千八百紂也求世休和弗可得已且被刑之人慮不念生志在思死類多趨惡莫復歸正夙沙亂齊伊戾禍宋趙高英布為世大患不能止人遂為非也雖忠如鬻拳信如卞和智如孫臏冤如巷伯才如史遷達如子政一罹刀鋸沒世不齒是太甲之思庸穆公之霸秦陳湯之都賴魏尚之臨邊無所復施也漢開改惡之路凡為此也故明德之君遠度深惟棄短就長不苟革其政者也朝廷善之卒不改焉及魏國建陳紀子羣時為御史中丞魏武帝下令又欲復之使羣申其父論羣深陳其便時鍾繇為相國亦贊成之而奉常王脩不同其議魏武帝亦難以藩國改漢朝之制遂寢不行於是乃定甲子科犯釱左右趾者易以木械是時乏鐵故易以木焉又嫌漢律太重故令依律論者聽得科半使從半減也魏文帝受禪又議肉刑詳議未定會有軍事復寢時有大女劉朱撾子婦酷暴前後三婦自殺論朱減死輸作尚方因是下怨毒殺人減死之令魏明帝改士庶罰金之令男聽以罰金婦人加笞還從鞭督之例以其形體裸露故也是時承用秦漢舊律其文起自魏文侯師李悝悝撰次諸國法著法經以為王者之政莫急於盜賊故其律始於盜賊盜賊須劾捕故著網捕二篇其輕狡越城博戲借假不廉淫侈踰制以為雜律一篇又以具律具其加減是故所著六篇而已然皆罪名之制也商君受之以相秦漢承秦制蕭何定律除參夷連坐之罪增部主見知之條益事律興戶三篇合為九篇叔孫通益律所不及傍章十八篇張湯越宮律二十七篇趙禹朝律六篇合六十篇又漢時決事集為令甲以下三百餘篇及司徒鮑公撰嫁娶辭訟決為法比都目凡九百六卷世有增損率皆集類為篇結事為章一章之中或事過數十事類雖同輕重乖異而通條連句上下相蒙雖大體異篇實相採入盜律有賊傷之例賊律有盜章之文興律有上獄之法律有逮捕之事若此之比錯糅無常後人生意各為章句叔孫宣郭令卿馬融鄭玄諸儒章句十有餘家家數十萬言凡斷罪所當由用者合二萬六千二百七十二條七百七十三萬二千二百餘言言數益繁覽者益難天子於是下詔但用鄭氏章句不得雜用餘家衞覬又奏曰刑法者國家之所貴重而私議之所輕賤獄吏者百姓之所懸命而選用者之所卑下王政之弊未必不由此也請置律博士轉相教授事遂施行然而律文煩廣事比衆多離本依末決獄之吏如廷尉獄吏范洪受囚絹二丈附輕法論之獄吏劉象受屬偏考囚張茂物故附重法論之洪象雖皆棄市而輕枉者相繼是時太傅鍾繇又上疏求復肉刑詔下其奏司徒王朗議又不同時議者百餘人與朗同者多帝以吳蜀未平又寢其後天子又下詔改定刑制命司空陳羣散騎常侍劉邵給事黃門侍郎韓遜議郎庾嶷中郎黃休荀詵等刪約舊科傍采漢律定為魏法制新律十八篇州郡令四十五篇尚書官令軍中令合百八十餘篇其序略曰舊律所難知者由於六篇篇少故也篇少則文荒文荒則事寡事寡則罪漏是以後人稍增更與本體相離今制新律宜都總事類多其篇條舊律因秦法經就增三篇而具律不移因在第六罪條例既不在始又不在終非篇章之義故集罪例以為刑名冠於律首盜律有劫略恐猲和賣買人科有持質皆非盜事故分以為劫略律賊律有欺謾詐偽踰封矯制囚律有詐偽生死令丙有詐自復免事類衆多故分為詐律賊律有賊伐樹木殺傷人畜產及諸亡印金布律有毀傷亡失縣官財物故分為毀亡律囚律有告劾傳覆律有告反逮受科有登聞道辭故分為告劾律囚律有繫囚鞫獄斷獄之法興律有上獄之事科有考事報讞宜別為篇故分為繫訊斷獄律盜律有受所監受財枉法雜律有假借不廉令乙有呵人受錢科有使者驗賂其事相類故分為請賕律盜律有勃辱強賊興律有擅興徭役具律有出賣呈科有擅作修舍事故分為興擅律興律有乏徭稽留賊律有儲峙不辦律有乏軍之興及舊典有奉詔不謹不承用詔書漢氏施行有小愆之反不如令輒劾以不承用詔書乏軍要斬又減以丁酉詔書丁酉詔書漢文所下不宜復以為法故別為之留律秦世舊有置乘傳副車食廚漢初承秦不改後以費廣稍省故後漢但設騎置而無車馬而律猶著其文則為虛設故除律取其可用合科者以為郵驛令其告反逮驗別入告劾律上言變事以為變事令以驚事告急與興律烽燧及科令者以為驚事律盜律有還贓畀主金布律有罰贖入責以呈黃金為價科有平庸坐贓事以為償贓律律之初制無免坐之文張湯趙禹始作監臨部主見知故縱之例其見知而故不舉劾各與同罪失不舉劾各以贖論其不見不知不坐也是以文約而例通科之為制每條有違科不覺不知從坐之免不復分別而免坐繁多宜總為免例以省科文故更制定其由例以為免坐律諸律令中有其教制本條無從坐之文者皆從此取法也凡所定增十三篇就故五篇合十八篇於正律九篇為增於旁章科令為省矣改漢舊律不行於魏者皆除之更依古義制為五刑其死刑有三髠刑有四完刑作刑各三贖刑十一罰金六雜抵罪七凡三十七名以為律首又改賊律但以言語及犯宗廟園陵謂之大逆無道要斬家屬從坐不及祖父母孫至於謀反大逆臨時捕之或汙瀦或梟菹夷其三族不在律令所以嚴絕惡跡也賊鬬殺人以劾而亡許依古義聽子弟得追殺之會赦及過誤相殺不得報讐所以止殺害也正殺繼母與親母同防繼假之隙也除異子之科使父子無異財也歐兄姊加至五歲刑以明教化也囚徒誣告人反罪及親屬異於善人所以累之使省刑息誣也改投書棄市之科所以輕刑也正篡囚棄市之罪斷凶強為義之蹤也二歲刑以上除以家人乞鞫之制省所煩獄也改諸郡不得自擇伏日所以齊風俗也斯皆魏世所改其大略如是其後正始之間天下無事於是征西將軍夏侯玄河南尹李勝中領軍曹羲尚書丁謐又追議肉刑卒不能決其文甚多不載及景帝輔政是時魏法犯大逆者誅及已出之女毋丘儉之誅其子甸妻荀氏應坐死其族兄顗與景帝姻通表魏帝以匄其命詔聽離婚荀氏所生女芝為潁川太守劉子元妻亦坐死以懷姙繫獄荀氏辭詣司隸校尉何曾乞恩求沒為官婢以贖芝命曾哀之使主簿程咸上議曰夫司寇作典建三等之制甫侯修刑通輕重之法叔世多變秦立重辟漢又修之大魏承秦漢之弊未及革制所以追戮已出之女誠欲殄醜類之族也然則法貴得中刑慎過制臣以為女人有三從之義無自專之道出適他族還喪父母降其服紀所以明外成之節異在室之恩而父母有罪追刑已出之女夫黨見誅又有隨姓之戮一人之身內外受辟今女既嫁則為異姓之妻如或產育則為他族之母此為元惡之所忽戮無辜之所重於防則不足懲姦亂之源於情則傷孝子之心男不得罪於他族而女獨嬰戮於二門非所以哀矜女弱蠲明法制之本分也臣以為在室之女從父母之誅既醮之婦從夫家之罰宜改舊科以為永制於是有詔改定律令文帝為晉王患前代律令本注煩雜陳羣劉邵雖經改革而科網本密又叔孫郭馬杜諸儒章句但取鄭氏又為偏黨未可承用於是令賈充定法律令與太傅鄭沖司徒荀覬中書監荀勖中軍將軍羊祜中護軍王業廷尉杜友守河南尹杜預散騎侍郎裴楷潁川太守周雄齊相郭頎騎都尉成公綏尚書郎柳軌及吏部令史榮邵等十四人典其事就漢九章增十一篇仍其族類正其體號改舊律為刑名法例辨囚律為告劾繫訊斷獄分盜律為請賕詐偽水火毀亡因事類為衞宮違制撰周官為諸侯律合二十篇六百二十條二萬七千六百五十七言蠲其苛穢存其清約事從中典歸於益時其餘未宜除者若軍事田農酤酒未得皆從人心權設其法太平當除故不入律悉以為令施行制度以此設教違令有罪則入律其常事品式章程各還其府為故事減梟斬族誅從坐之條除謀反適養母出女嫁皆不復還坐父母棄市省禁固相告之條去捕亡亡沒為官奴婢之制輕過誤老少女人當罰金杖罰者皆令半之重姦伯叔母之令棄市淫寡女三歲刑崇嫁娶之要一以下娉為正不理私約峻禮教之防準五服以制罪也凡律令合二千九百二十六條十二萬六千三百言六十卷故事三十卷泰始三年事畢表上武帝詔曰昔蕭何以定律令受封叔孫通制儀為奉常賜金五百斤弟子百人皆為郎夫立功立事古今之所重宜加祿賞其詳考差輒如詔簡異弟子百人隨才品用賞帛萬餘匹武帝親自臨講使裴楷執讀四年正月大赦天下乃班新律其後明法掾張裴又注律表上之其要曰律始於刑名者所以定罪制也終於諸侯者所以畢其政也王政布於上諸侯奉於下禮樂撫於中故有三才之義焉其相須而成若一體焉刑名所以經略罪法之輕重正加減之等差明發衆篇之多義補其章條之不足較舉上下綱領其犯盜賊詐偽請賕者則求罪於此作役水火畜養守備之細事皆求之作本名告訊為之心舌捕繫為之手足斷獄為之定罪名例齊其制自始及終往而不窮變動無常周流四極上下無方不離于法律之中也其知而犯之謂之故意以為然謂之失違忠欺上謂之謾背信藏巧謂之詐虧禮廢節謂之不敬兩訟相趣謂之鬬兩和相害謂之戲無變斬擊謂之賊不意誤犯謂之過失逆節絕理謂之不道陵上僭貴謂之惡逆將害未發謂之戕唱首先言謂之造意二人對議謂之謀制衆建計謂之率不和謂之強攻惡謂之略三人謂之羣取非其物謂之盜貨財之利謂之贓凡二十者律義之較名也夫律者當慎其變審其理若不承用詔書無故失之刑當從贖謀反之同伍實不知情當從刑此故失之變也卑與尊鬬皆為賊鬬之加兵刃水火中不得為戲戲之重也向人室廬道徑射不得為過失之禁也都城人衆中走馬殺人當為賊賊之似也過失似賊戲似鬬鬬而殺傷傍人又似誤盜傷縛守似強盜呵人取財似受賕囚辭所連似告劾諸勿聽理似故縱持質似恐猲如此之比皆為無常之格也五刑不簡正于五罰五罰不服正于五過意善功惡以金贖之故律制生罪不過十四等死刑不過三徒加不過六囚加不過五累作不過十一歲累笞不過千二百刑等不過一歲金等不過四兩月贖不計日日作不拘月歲數不疑閏不以加至死并死不復加不可累者故有并數不可并數乃累其加以加論者但得其加與加同者連得其本不在次者不以通論以人得罪與人同以法得罪與法同侵生害死不可齊其防親疏公私不可常其教禮樂崇於上故降其刑刑法閑於下故全其法是故尊卑仁義明九族親王道平也律有事狀相似而罪名相涉者若加威勢下手取財為強盜不自知亡為縛守將中有惡言為恐猲不以罪名呵為呵人以罪名呵為受賕劫召其財為持質此六者以威勢得財而名殊者也即不求自與為受求所監求而後取為盜贓輸入呵受為留難斂人財物積藏於官為擅賦加歐擊之為戮辱諸如此類皆為以威勢得財而罪相似者也夫刑者司理之官理者求情之機情者心神之使心感則情動於中而形於言暢於四支發於事業是故姦人心愧而面赤內怖而色奪論罪者務本其心審其情精其事近取諸身遠取諸物然後乃可以正刑仰手似乞俯手似奪捧手似謝擬手似訴拱臂似自首攘臂似格鬬矜莊似威怡悅似福喜怒憂歡貌在聲色姦真猛弱候在視息出口有言當為告下手有禁當為賊喜子殺怒子當為戲怒子殺喜子當為賊諸如此類自非至精不能極其理也律之名例非正文而分明也若八十非殺傷人他皆勿論即誣告謀反者反坐十歲不得告言人即奴婢捍主主得謁殺之賊燔人廬舍積聚盜贓五匹以上棄市即燔官府積聚盜亦當與同歐人教令者與同罪即令人歐其父母不可與行者同得重也若得遺物強取強乞之類無還贓法隨例畀之文法律中諸不敬違儀失式及犯罪為公為私贓入身不入身皆隨事輕重取法以例求其名也夫理者精玄之妙不可以一方行也律者幽理之奧不可以一體守也或計過以配罪或化略以循常或隨事以盡情或趣舍以從時或推重以立防或引輕而就下公私廢避之宜除削重輕之變皆所以臨時觀釁使用法執詮者幽於未制之中采其根牙之微致之於機格之上稱輕重於豪銖考輩類於參伍然後乃可以理直刑正夫奉聖典者若操刀執繩刀妄加則傷物繩妄彈則侵直梟首者惡之長斬刑者罪之大棄市者死之下髠作者刑之威贖罰者誤之誡王者立此五刑所以寶君子而逼小人故為敕慎之經皆擬周易有變通之體焉欲令提綱而大道清舉略而王法齊其旨遠其辭文其言曲而中其事肆而隱通天下之志唯忠也斷天下之疑唯文也切天下之情唯遠也彌天下之務唯大也變無常體唯理也非天下之賢聖孰能與於斯夫形而上者謂之道形而下者謂之器化而財之謂之格刑殺者是冬震曜之象髠罪者似秋彫落之變贖失者是春陽悔吝之疵也五刑成章輒相依準法律之義焉是時侍中盧珽中書侍郎張華又表抄新律諸死罪條目懸之亭傳以示兆庶有詔從之及劉頌為廷尉頻表宜復肉刑不見省又上言曰臣昔上行肉刑從來積年遂寢不論臣竊以為議者拘孝文之小仁而輕違聖王之典刑未詳之甚莫過於此今死刑重故非命者衆生刑輕故罪不禁姦所以然者肉刑不用之所致也今為徒者類性元惡不軌之族也去家懸遠作役山谷飢寒切身志不聊生雖有廉士介者苟慮不首死則皆為盜賊豈況本性姦凶無賴之徒乎又令徒富者輸財解日歸家乃無役之人也貧者起為姦盜又不制之虜也不刑則罪無所禁不制則羣惡橫肆為法若此近不盡善也是以徒亡日屬賊盜日煩亡之數者至有十數得輒加刑日益一歲此為終身之徒也自顧反善無期而災困逼身其志亡思盜勢不得息事使之然也古者用刑以止刑今反於此諸重犯亡者髮過三寸輒重髠之此以刑生刑加作一歲此以徒生徒也亡者積多繫囚猥畜議者曰囚不可不赦復從而赦之此為刑不制罪法不勝姦下知法之不勝相聚而謀為不軌月異而歲不同故自頃年以來姦惡陵暴所在充斥議者不深思此故而曰肉刑於名忤聽忤聽孰與賊盜不禁聖王之制肉刑遠有深理其事可得而言非徒懲其畏剝割之痛而不為也乃去其為惡之具使夫姦人無用復肆其志止姦絕本理之盡也亡者刖足無所用復亡盜者截手無所用復盜淫者割其勢理亦如之除惡塞源莫善於此非徒然也此等已刑之後便各歸家父母妻子共相養恤不流離於塗路有今之困創愈可役上準古制隨宜業作雖已刑殘不為虛棄而所患都塞又生育繁阜之道自若也今宜取死刑之限輕及三犯逃亡淫盜悉以肉刑代之其三歲刑以下已自杖罰遣又宜制其罰數使有常限不得減此其有宜重者又任之官長應四五歲刑者皆髠笞笞至一百稍行使各有差悉不復居作然後刑不復生刑徒不復生徒而殘體為戮終身作誡人見其痛畏而不犯必數倍於今且為惡者隨發被刑去其為惡之具此為諸已刑者皆良士也豈與全其為姦之手足而蹴居必死之窮地同哉而猶曰肉刑不可用臣竊以為不識務之甚也臣昔常侍左右數聞明詔謂肉刑宜用事便於政願陛下信獨見之斷使夫能者得奉聖慮行之於今比填溝壑冀見太平周禮三赦三宥施於老幼悼耄黔黎不屬逮者此非為惡之所出故刑法逆舍而宥之至於自非此族犯罪則必刑而無赦此政之理也暨至後世以時嶮多難因赦解結權以行之又不以寬罪人也至今以罪積獄繁赦以散之是以赦愈數而獄愈塞如此不已將至不勝原其所由肉刑不用之故也今行肉刑非徒不積且為惡無具則姦息去此二端獄不得繁故無取於數赦於政體勝矣疏上又不見省至惠帝之世政出羣下每有疑獄各立私情刑法不定獄訟繁滋尚書裴頠表陳之曰夫天下之事多塗非一司之所管中才之情易擾賴制而後定先王知其所以然也是以辨方分職為之準局準局既立各掌其務刑賞相稱輕重無二故下聽有常羣吏安業也舊宮掖陵廟有水火毀傷之變然後尚書乃躬自奔赴其非此也皆止於郎令史而已刑罰所加各有常刑去元康四年大風之後廟闕屋瓦有數枚傾落免太常荀𧜛于時以嚴詔所譴莫敢據正然內外之意僉謂事輕責重有違于常會五年二月有大風主者懲懼前事臣新拜尚書始三日本曹尚書有疾權令兼出按行蘭臺主者乃瞻望阿棟之間求索瓦之不正者得棟上瓦小邪十五處或是始瓦時邪蓋不足言風起倉卒臺官更往太常按行不及得周文書未至之頃便競相禁止臣以權兼暫出出還便罷不復得窮其事而本曹據執却問無已臣時具加解遣而主者畏咎不從臣言禁止太常復興刑獄昔漢氏有盜廟玉環者文帝欲族誅釋之但處以死刑曰若侵長陵一抔土何以復加文帝從之大晉垂制深惟經遠山陵不封園邑不飾墓而不墳同乎山壤是以丘阪存其陳草使齊乎中原矣雖陵兆尊嚴唯毀發然後族之此古典也若登踐犯損失盡敬之道事止刑罪可也去八年奴聽教加誣周龍燒草廷尉遂奏族龍一門八口并命會龍獄翻然後得免考之情理準之前訓所處實重今年八月陵上荊一枝圍七寸二分者被斫司徒太常奔走道路雖知事小而案劾難測搔擾驅馳各競免負于今太常禁止未解近日太祝署失火燒屋三間半署在廟北隔道在重牆之內又即已滅頻為詔旨所問主者以詔旨使問頻繁便責尚書不即案行輒禁止尚書免皆在法外刑書之文有限而舛違之故無方故有臨時議處之制誠不能皆得循常也至於此等皆為過當每相逼迫不復以理上替聖朝畫一之德下損崇禮大臣之望臣愚以為犯陵上草木不應乃用同產異刑之制按行奏劾應有定準相承務重體例遂虧或因餘事得容淺深頠雖有此表曲議猶不止時劉頌為三公尚書又上疏曰自近世以來法漸多門令甚不一臣今備掌刑斷職思其憂謹具啟聞臣竊伏惟陛下為政每盡善故事求曲當則例不得直盡善故法不得全何則夫法者固以盡理為法而上求盡善則諸下牽文就意以赴主之所許是以法不得全刑書徵文徵文必有乖於情聽之斷而上安於曲當故執平者因文可引則生二端是法多門令不一則吏不知所守下不知所避姦偽者因法之多門以售其情所欲淺深苟斷不一則居上者難以檢下於是事同議異獄犴不平有傷於法古人有言人主詳其政荒人主期其事理詳匪他盡善則法傷故其政荒也期者輕重之當雖不厭情苟入於文則循而行之故其事理也夫善用法者忍違情不厭聽之斷輕重雖不允人心經於凡覽若不可行法乃得直又君臣之分各有所司法欲必奉故令主者守文理有窮塞故使大臣釋滯事有時宜故人主權斷主者守文若釋之執犯蹕之平也大臣釋滯若公孫弘斷郭解之獄也人主權斷若漢祖戮丁公之為也天下萬事自非斯格重為故不近似此類不得出以意妄議其餘皆以律令從事然後法信於下人聽不惑吏不容姦可以言政人主軌斯格以責羣下大臣小吏各守其局則法一矣古人有言善為政者看人設教看人設教制法之謂也又曰隨時之宜當務之謂也然則看人隨時在大量也而制其法法軌既定則行之行之信如四時執之堅如金石羣吏豈得在成制之內復稱隨時之宜傍引看人設教以亂政典哉何則始制之初固已看人而隨時矣今若設法未盡當則宜改之若謂已善不得盡以為制而使奉用之司公得出入以差輕重也夫人君所與天下共者法也已令四海不可以不信以為教方求天下之不慢不可繩以不信之法且先識有言人至愚而不可欺也不謂平時背法意斷不勝百姓願也上古議事以制不為刑辟夏殷及周書法象魏三代之君齊聖然咸棄曲當之妙鑒而任徵文之直準非聖有殊所遇異也今論時敦朴不及中古而執平者欲適情之所安自託於議事以制臣竊以為聽言則美論理則違然天下至大事務衆雜時有不得悉循文如令故臣謂宜立格為限使主者守文死生以之不敢錯思於成制之外以差輕重則法全事無正據名例不及大臣論當以釋不滯則事無閡至如非常之斷出法賞罰若漢祖戮楚臣之私己封趙氏之無功唯人主專之非奉職之臣所得擬議然後情求傍請之跡絕似是而非之奏塞此蓋齊法之大準也主者小吏處事無常何則無情則法徒克有情則撓法積克似無私然乃所以得其私又所岨以衞其身斷當克世謂盡公時一曲法迺所不疑故人君不善倚深似公之斷而責守文如令之奏然後得為有檢此又平法之一端也夫出法權制指施一事厭情合聽可適耳目誠有臨時當意之快勝於徵文不允人心也然起為經制終年施用得一而失十故小有所得者必大有所失近有所漏者必遠有所苞故諳事識體者善權輕重不以小害大不以近妨遠忍曲當之近適以全簡直之大準不牽於凡聽之所安必守徵文以正例每臨其事御此心以決斷此又法之大概也又律法斷罪皆當以法律令正文若無正文依附名例斷之其正文名例所不及皆勿論法吏以上所執不同得為異義如律之文守法之官唯當奉用律令至於法律之內所見不同迺得為異議也今限法曹郎令史意有不同為駁唯得論釋法律以正所斷不得援求諸外論隨時之宜以明法官守局之分詔下其事侍中太宰汝南王亮奏以為夫禮以訓世而法以整俗理化之本事實由之若斷不斷常輕重隨意則王憲不一人無所錯矣故觀人設教在上之舉守文直法臣吏之節也臣以去太康八年隨事異議周懸象魏之書漢詠畫一之法誠以法與時共義不可二今法素定而法為議則有所開長以為宜如頌所啟為永久之制於是門下屬三公曰昔先王議事以制自中古以來執法斷事既以立法誠不宜復求法外小善也若常以善奪法則人逐善而不忌法其害甚於無法也案啟事欲令法令斷一事無二門郎令史已下應復出法駁案隨事以聞也及于江左元帝為丞相時朝廷草創議斷不循法律人立異議高下無狀主簿熊遠奏曰禮以崇善法以閑非故禮有常典法有常防人知惡而無邪心是以周建象魏之制漢創畫一之法故能闡弘大道以至刑厝律令之作由來尚矣經賢智歷夷險隨時斟酌最為周備自軍興以來法度陵替至於處事不用律令競作屬命人立異議曲適物情虧傷大例府立節度復不奉用臨事改制朝作夕改至於主者不敢任法每輒關諮委之大官非為政之體若本曹處事不合法令監司當以法彈違不得動用開塞以壞成事按法蓋粗術非妙道也矯割物情以成法耳若每隨物情輒改法制此為以情壞法法之不一是謂多門開人事之路廣私請之端非先王立法之本意也凡為駁議者若違律令節度當合經傳及前比故事不得任情以破成法愚謂宜令錄事更立條制諸立議者皆當引律令經傳不得直以情言無所依準以虧舊典也若開塞隨宜權道制物此是人君之所得行非臣子所宜專用主者唯當徵文據法以事為斷耳是時帝以權宜從事尚未能從而河東衞展為晉王大理考擿故事有不合情者又上書曰今施行詔書有考子正父死刑或鞭父母問子所在近主者所稱庚寅詔書舉家逃亡家長斬若長是逃亡之主斬之雖重猶可設子孫犯事將考祖父逃亡逃亡是子孫而父祖嬰其酷傷順破教如此者衆相隱之道離則君臣之義廢君臣之義廢則犯上之姦生矣秦網密文峻漢興掃除煩苛風移俗易幾於刑厝大人革命不得不蕩其穢匿通其圮滯今詔書宜除者多有便於當今著為正條則法差簡易元帝令曰禮樂不興則刑罰不中是以明罰敕法先王所慎自元康已來事故荐臻法禁滋漫大理所上宜朝堂會議蠲除詔書不可用者此孤所虛心者也及帝即位展為廷尉又上言古者肉刑事經前聖漢文除之增加大辟今人戶彫荒百不遺一而刑法峻重非句踐養胎之義也愚謂宜復古施行以隆太平之化詔內外通議於是驃騎將軍王導太常賀循侍中紀瞻中書郎庾亮大將軍諮議參軍梅陶散騎郎張嶷等議以肉刑之典由來尚矣肇自古先以及三代聖哲明王所未曾改也豈是漢文常主所能易者乎時蕭曹已沒絳灌之徒不能正其義逮班固深論其事以為外有輕刑之名內實殺人又死刑太重生刑太輕生刑縱於上死刑怨於下輕重失當故刑政不中也且原先王之造刑也非以過怒也非以殘人也所以救姦所以當罪今盜者竊人之財淫者好人之色亡者避叛之役皆無殺害也則加之以刑刑之則止而加之斬戮戮過其罪死不可生縱虐於此歲以巨計此迺仁人君子所不忍聞而況行之於政乎若乃惑其名而不練其實惡其生而趣其死此畏水投舟避坎蹈井愚夫之不若何取於政哉今大晉中興遵復古典率由舊章起千載之滯義拯百殘之遺黎使皇典廢而復存黔首死而更生至義暢于三代之際遺風播乎百世之後生肉枯骨惠侔造化豈不休哉惑者乃曰死猶不懲而況於刑然人者冥也其至愚矣雖加斬戮忽為灰土死事日往生欲日存未以為改若刑諸市朝朝夕鑒戒刑者詠為惡之永痛惡者覩殘刖之長廢故足懼也然後知先王之輕刑以御物顯誡以懲愚其理遠矣尚書令刁協尚書薛兼等議以為聖上悼殘荒之遺黎傷犯死之繁衆欲行刖以代死刑使犯死之徒得存性命則率土蒙更生之澤兆庶必懷恩以反化也今中興祚隆大命惟新誠宜設寬法以育人然懼羣小愚蔽習翫所見而忽異聞或未能咸服愚謂行刑之時先明申法令樂刑者刖甘死者殺則心必服矣古典刑不上大夫今士人有犯者謂宜如舊不在刑例則進退為允尚書周顗郎曹彥中書郎桓彝等議以為復肉刑以代死誠是聖王之至德哀矜之弘私然竊以為刑罰輕重隨時而作時人少罪而易威則從輕而寬之時人多罪而難威則宜化刑而濟之肉刑平世所應立非救弊之宜也方今聖化草創人有餘姦習惡之徒為非未已截頭絞頸尚不能禁而乃更斷足劓鼻輕其刑罰使欲為惡者輕犯寬刑蹈罪更衆是為輕其刑以誘人於罪殘其身以加楚酷也昔之畏死刑以為善人者今皆犯輕刑而殘其身畏重之常人反為犯輕而致囚此則何異斷刖常人以為恩仁邪受刑者轉廣而為非者日多踊貴屨賤有鼻者醜也徒有輕刑之名而實開長惡之源不如以殺止殺重以全輕權小停之須聖化漸著兆庶易威之日徐施行也議奏元帝猶欲從展所上大將軍王敦以為百姓習俗日久忽復肉刑必駭遠近且逆寇未殄不宜有慘酷之聲以聞天下於是乃止咸康之世庾冰好為糾察近於繁細後益矯違復存寬縱疏密自由律令無用矣至安帝元興末桓玄輔政又議欲復肉刑斬左右趾之法以輕死刑命百官議蔡廓上議曰建邦立法弘教穆化必隨時置制德刑兼施長貞一以閑其邪教禁以檢其慢灑湛露以流潤厲嚴霜以肅威雖復質文迭用而斯道莫革肉刑之設肇自哲王蓋由曩世風淳人多惇謹圖像既陳則機心直戢刑人在塗則不逞改操故能勝殘去殺化隆無為季末澆偽設網彌密利巧之懷日滋恥畏之情轉寡終身劇役不足止其姦況乎黥劓豈能反於善徒有酸慘之聲而無濟俗之益至於棄市之條實非不赦之罪事非手殺考律同歸輕重均科減降路塞鍾陳以之抗言元皇所為留愍今英輔翼贊道邈伊周誠宜明慎用刑愛人弘育申哀矜以革濫移大辟於支體全性命之至重恢繁息於將來而孔琳之議不同用王朗夏侯玄之旨時論多與琳之同故遂不行
