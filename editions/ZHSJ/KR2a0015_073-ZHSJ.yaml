body:
  text: 晉書卷七十三列傳第四十三庾亮子彬羲龢弟懌冰條翼庾亮字元規明穆皇后之兄也父琛在外戚傳亮美姿容善談論性好莊老風格峻整動由禮節閨門之內不肅而成時人或以為夏侯太初陳長文之倫也年十六東海王越辟為掾不就隨父在會稽嶷然自守時人皆憚其方儼莫敢造之元帝為鎮東時聞其名辟西曹掾及引見風情都雅過於所望甚器重之由是聘亮妹為皇太子妃亮固讓不許轉丞相參軍預討華軼功封都亭侯轉參丞相軍事掌書記中興初拜中書郎領著作侍講東宮其所論釋多見稱述與溫嶠俱為太子布衣之好時帝方任刑法以韓子賜皇太子亮諫以申韓刻薄傷化不足留聖心太子甚納焉累遷給事中黃門侍郎散騎常侍時王敦在蕪湖帝使亮詣敦籌事敦與亮談論不覺改席而前退而歎曰庾元規賢於裴頠遠矣因表為中領軍明帝即位以為中書監亮上書讓曰臣凡庸固陋少無殊操昔以中州多故舊邦喪亂隨侍先臣遠庇有道爰容逃難求食而已不悟徼時之褔遭遇嘉運先帝龍興垂異常之顧既眷同國士又申以婚姻遂階親寵累忝非服弱冠濯纓沐浴芳風頻煩省闥出總六軍十餘年間位超先達無勞受遇無與臣比小人祿薄褔過災生止足之分臣所宜守而偷榮昧進日爾一日謗讟既集上塵聖朝始欲自聞而先帝登遐區區微誠竟未上達陛下踐阼聖政惟新宰輔賢明庶僚咸允康哉之歌實存于至公而國恩不已復以臣領中書臣領中書則示天下以私矣何者臣於陛下后之兄也姻婭之嫌與骨肉中表不同雖太上至公聖德無私然世之喪道有自來矣悠悠六合皆私其姻人皆有私則天下無公矣是以前後二漢咸以抑后黨安進婚族危向使西京七族東京六姓皆非姻族各以平進縱不悉全決不盡敗今之盡敗更由姻昵臣歷觀庶姓在世無黨於朝無援於時植根之本輕也薄也苟無大瑕猶或見容至於外戚憑託天地連勢四時根援扶疏重矣大矣而或居權寵四海側目事有不允罪不容誅身既招殃國為之弊其故何邪由姻媾之私羣情之所不能免是以疏附則信姻進則疑疑積於百姓之心則禍成於重閨之內矣此皆往代成鑒可為寒心者也夫萬物之所不通聖賢因而不奪冒親以求一寸之用未若防嫌以明至公今以臣之才兼如此之嫌而使內處心膂外總兵權以此求治未之聞也以此招禍可立待也雖陛下二相明其愚款朝士百僚頗識其情天下之人安可門到戶說使皆坦然邪夫富貴榮寵臣所不能忘也刑罰貧賤臣所不能甘也今恭命則愈違命則苦臣雖不達何事背時違上自貽患責邪實仰覽殷鑒量己知弊身不足惜為國取悔是以悾悾屢陳丹款而微誠淺薄未垂察諒憂惶屏營不知所措願陛下垂天地之鑒察臣之愚則臣雖死之日猶生之年矣疏奏帝納其言而止王敦既有異志內深忌亮而外崇重之亮憂懼以疾去官復代王導為中書監及敦舉兵加亮左衛將軍與諸將距錢鳳及沈充之走吳興也又假亮節都督東征諸軍事追充事平以功封永昌縣開國公賜絹五千四百匹固讓不受轉護軍將軍及帝疾篤不欲見人羣臣無得進者撫軍將軍南頓王宗右衛將軍虞胤等素被親愛與西陽王羕將有異謀亮直入臥內見帝流涕不自勝既而正色陳羕與宗等謀廢大臣規共輔政社稷安否將在今日辭旨切至帝深感悟引亮升御座遂與司徒王導受遺詔輔幼主加亮給事中徙中書令太后臨朝政事一決於亮先是王導輔政以寬和得衆亮任法裁物頗以此失人心又先帝遺詔褒進大臣而陶侃祖約不在其例侃約疑亮刪除遺詔並流怨言亮懼亂於是出溫嶠為江州以廣聲援修石頭以備之會南頓王宗復謀廢執政亮殺宗而廢宗兄羕宗帝室近屬羕國族元老又先帝保傅天下咸以亮翦削宗室琅邪人卞咸宗之黨也與宗俱誅咸兄闡亡奔蘇峻亮符峻送闡而峻保匿之峻又多納亡命專用威刑亮知峻必為禍亂徵為大司農舉朝謂之不可平南將軍溫嶠亦累書止之皆不納峻遂與祖約俱舉兵反溫嶠聞峻不受詔便欲下衛京都三吳又欲起義兵亮並不聽而報嶠書曰吾憂西陲過於歷陽足下無過雷池一步也既而峻將韓晃寇宣城亮遣距之不能制峻乘勝至于京都詔假亮節都督征討諸軍事戰于建陽門外軍未及陣士衆棄甲而走亮乘小船西奔亂兵相剝掠亮左右射賊誤中柂工應弦而倒船上咸失色欲散亮不動容徐曰此手何可使著賊衆心乃安亮攜其三弟懌條翼南奔溫嶠嶠素欽重亮雖在奔敗猶欲推為都統亮固辭乃與嶠推陶侃為盟主侃至尋陽既有憾於亮議者咸謂侃欲誅執政以謝天下亮甚懼及見侃引咎自責風止可觀侃不覺釋然乃謂亮曰君侯修石頭以擬老子今曰反見求耶便談宴終日亮噉薤因留白侃問曰安用此為亮云故可以種侃於是尤相稱歎云非惟風流兼有為政之實既至石頭亮遣督護王彰討峻黨張曜反為所敗亮送節傳以謝侃侃答曰古人三敗君侯始二當今事急不宜數耳又曰朝政多門用生國禍喪亂之來豈獨由峻也亮時以二千人守白石壘峻步兵萬餘四面來攻衆皆震懼亮激厲將士並殊死戰峻軍乃退追斬數百級峻平帝幸溫嶠舟亮得進見稽顙鯁噎詔羣臣與亮俱升御坐亮明日又泥首謝罪乞骸骨欲闔門投竄山海帝遣尚書侍中手詔慰喻此社稷之難非舅之責也亮上疏曰臣凡鄙小人才不經世階緣戚屬累忝非服叨竊彌重謗議彌興皇家多難未敢告退遂隨牒展轉便煩顯任先帝不豫臣參侍醫藥登遐顧命又豫聞後事豈云德授蓋以親也臣知其不可而不敢逃命實以田夫之交猶有寄託況君臣之義道貫自然哀悲眷戀不敢違距且先帝謬顧情同布衣既今恩重命輕遂感遇忘身加以陛下初在諒闇先后親覽萬機宣通外內臣當其地是以激節驅馳不敢依違雖知無補志以死報而才下位高知進忘退乘寵驕盈漸不自覺進不能撫寧外內退不能推賢宗長遂使四海側心謗議沸騰祖約蘇峻不堪其憤縱肆兇逆事由臣發社稷傾覆宗廟虛廢先后以憂逼登遐陛下旰食踰年四海哀惶肝腦塗地臣之招也臣之罪也朝廷寸斬之屠戮之不足以謝祖宗七廟之靈臣灰身滅族不足以塞四海之責臣負國家其罪莫大實天所不覆地所不載陛下矜而不誅有司縱而不戮自古及今豈有不忠不孝如臣之甚不能伏劍北闕偷存視息雖生之日亦猶死之年朝廷復何理齒臣於人次臣亦何顏自次於人理臣欲自投草澤思諐之心也而明詔謂之獨善其身聖旨不垂矜察所以重其罪也願陛下覽先朝謬授之失雖垂寬宥全其首領猶宜棄之任其自存自沒則天下粗知勸戒之綱矣疏奏詔曰省告懇惻執以感歎誠是仁舅處物宗之責理亦盡矣若大義既不開塞舅所執理勝何必區區其相易奪賊峻姦逆書契所未有也是天地所不容人神所不宥今年不反明年當反愚智所見也舅與諸公勃然而召正是不忍見無禮於君者也論情與義何得謂之不忠乎若以己總率征討事至敗喪有司宜明直繩以肅國體誠則然矣且舅遂上告方伯席卷來下舅躬貫甲冑賊峻梟懸大事既平天下開泰衍得反正社稷安宗廟有奉豈非舅二三方伯忘身陳力之勳邪方當策勳行賞豈復議既往之咎乎且天下大弊死者萬計而與桀寇對岸舅且當上奉先帝顧託之旨弘濟艱難使衍沖人永有憑賴則天下幸甚亮欲遁逃山海自暨陽東出詔有司錄奪舟船亮乃求外鎮自效出為持節都督豫州揚州之江西宣城諸軍事平西將軍假節豫州刺史領宣城內史亮遂受命鎮蕪湖頃之後將軍郭默據湓口以叛亮表求親征於是以本官加征討都督率將軍路永毛寶趙胤匡術劉仕等步騎二萬會太尉陶侃俱討破之亮還蕪湖不受爵賞侃移書曰夫賞罰黜陟國之大信竊怪矯然獨為君子亮曰元帥指撝武臣效命亮何功之有遂苦辭不受進號鎮西將軍又固讓初以誅王敦功封永昌縣公亮比陳讓疏數十上至是許之陶侃薨遷亮都督江荊豫益梁雍六州諸軍事領江荊豫三州刺史進號征西將軍開府儀同三司假節亮固讓開府乃遷鎮武昌時王導輔政主幼時艱務存大綱不拘細目委任趙胤賈寧等諸將並不奉法大臣患之陶侃嘗欲起兵廢導而郗鑒不從乃止至是亮又欲率衆黜導又以諮鑒而鑒又不許亮與鑒牋曰昔於蕪湖反覆謂彼罪雖重而時弊國危且令方嶽道勝亦足有所鎮壓故共隱忍解釋陶公自茲迄今曾無悛改主上自八九歲以及成人入則在宮人之手出則唯武官小人讀書無從受音句顧問未嘗遇君子侍臣雖非俊士皆時之良也知今古顧問豈與殿中將軍司馬督同年而語哉不云當高選侍臣而云高選將軍司馬督豈合賈生願人主之美習以成德之意乎秦政欲愚其黔首天下猶知不可況乃欲愚其主哉主之少也不登進賢哲以輔導聖躬春秋既盛宜復子明辟不稽首歸政甫居師傅之尊成人之主方受師臣之悖主上知君臣之道不可以然而不得不行殊禮之事萬乘之君寄坐上九亢龍之爻有位無人挾震主之威以臨制百官百官莫之敢忤是先帝無顧命之臣勢屈于驕姦而遵養之也趙賈之徒有無君之心是而可忍孰不可忍且往日之事含容隱忍謂其罪可宥良以時弊國危兵甲不可屢動又冀其當謝往釁懼而修己如頃日之縱是上無所忌下無所憚謂多養無賴足以維持天下公與下官並蒙先朝厚顧荷託付之重大姦不掃何以見先帝於地下願公深惟安國家固社稷之遠算次計公之與下官負荷輕重量其所宜鑒又不許故其事得息時石勒新死亮有開復中原之謀乃解豫州授輔國將軍毛寶使與西陽太守樊峻精兵一萬俱戍邾城又以陶稱為南中郎將江夏相率部曲五千人入沔中亮弟翼為南蠻校尉南郡太守鎮江陵以武昌太守陳囂為輔國將軍梁州刺史趣子午又遣偏軍伐蜀至江陽執偽荊州刺史李閎巴郡太守黃植送于京都亮當率大衆十萬據石城為諸軍聲援乃上疏曰蜀胡二寇凶虐滋甚內相誅鋤衆叛親離蜀甚弱而胡尚強並佃並守修進取之備襄陽北接宛許南阻漢水其險足固其土足食臣宜移鎮襄陽之石城下并遣諸軍羅布江沔比及數年戎士習練乘釁齊進以臨河洛大勢一舉衆知存亡開反善之路宥逼脅之罪因天時順人情誅逋逆雪大恥實聖朝之所先務也願陛下許其所陳濟其此舉淮泗壽陽所宜進據臣輒簡練部分乞槐棘參議以定經略帝下其議時王導與亮意同郗鑒議以資用未備不可大舉亮又上疏便欲遷鎮會寇陷邾城毛寶赴水而死亮陳謝自貶三等行安西將軍有詔復位尋拜司空餘官如故固讓不拜亮自邾城陷沒憂慨發疾會王導薨徵亮為司徒揚州刺史錄尚書事又固辭帝許之咸康六年薨時年五十二追贈太尉諡曰文康喪至車駕親臨及葬又贈永昌公印綬亮弟冰上疏曰臣謹詳先事亦曾聞臣亮對臣等之言懇懇於斯事是以屢自陳請將迄十年豈直好讓而不肅恭顧曩時之釁近出宇下加先帝神武算略兼該是以役不踰時而凶強馘滅計之以事則功歸聖主推之於運則勝非人力至如亮等因聖略之弘得效所職事將何論功將何賞及後傷蹶責踰先功是以陛下優詔聽許亮實思自效以報天德何悟身潛聖世微志長絕存亡哀恨痛貫心膂願陛下發明詔遂先恩則臣亮死且不朽帝從之亮將葬何充會之歎曰埋玉樹於土中使人情何能已初亮所乘馬有的顱殷浩以為不利於主勸亮賣之亮曰曷有己之不安而移之於人浩慚而退亮在武昌諸佐吏殷浩之徒乘秋夜往共登南樓俄而不覺亮至諸人將起避之亮徐曰諸君少住老子於此處興復不淺便據胡牀與浩等談詠竟坐其坦率行己多此類也三子彬羲龢彬年數歲雅量過人溫嶠嘗隱暗怛之彬神色恬如也乃徐跪謂嶠曰君侯何至於此論者謂不減於亮蘇峻之亂遇害羲少有時譽初為吳國內史時穆帝頗愛文義羲至郡獻詩頗存諷諫因上表曰陛下以聖明之德方隆唐虞之化而事役殷曠百姓凋殘以數州之資經贍四海之務其為勞弊豈可具言昔漢文居隆盛之世躬自儉約斷獄四百殆致刑厝賈誼歎息猶有積薪之言以古況今所以益其憂懼陛下明鑒天挺無幽不燭弘濟之道豈待瞽言臣受恩奕世思盡絲髮受任到東親臨所見敢緣弘政獻其丹愚伏願聽斷之暇少垂察覽其詩文多不載羲方見授用而卒子準太元中自侍中代桓石虔為豫州刺史西中郎將鎮歷陽卒官準子悅義熙中江州刺史準弟楷自有傳龢字道季好學有文章叔父翼將遷襄陽龢年十五以書諫曰承進據襄陽耀威荊楚且田且戍漸臨河洛使向化之萌懷德而附凶愚之徒畏威反善太平之基便在於旦夕昔殷伐鬼方三年而克樂生守齊遂至歷載今皇朝雖隆無有殷之盛凶羯雖衰猶醜類有徒而沔漢之水無萬仞之固方城雖峻無千尋之險加以運漕供繼有泝流之艱征夫勤役有勞來之歎若窮寇慮逼送死一決東西互出首尾俱進則廩糧有抄截之患遠略乏率然之勢進退惟思不見其可此明闇所共見賢愚所共聞況於臨事者乎願迴師反旆詳擇全勝修城池立壘壁勤耕農練兵甲若凶運有極天亡此虜則可泛舟北濟方軌齊進水陸騁邁亦不踰旬朔矣願詳思遠猷算其可者翼甚奇之升平中代孔嚴為丹楊尹表除重役六十餘事太和初代王恪為中領軍卒於官子尚書僕射贈光祿大夫懌字叔預少以通簡為兄亮所稱弱冠西陽王羕辟不就東海王沖為長水校尉清選綱紀以懌為功曹除暨陽令又為沖中軍司馬轉散騎侍郎遷左衛將軍以討蘇峻功封廣饒男出補臨川太守歷監梁雍二州軍事轉輔國將軍梁州刺史假節鎮魏興時兄亮總統六州以懌寬厚容衆故授以遠任為東西勢援尋進監秦州氐羌諸軍事懌遣牙門霍佐迎將士妻子佐驅三百餘口亡入石季龍亮表上貶懌為建威將軍朝議欲召還亮上疏曰懌御衆簡而有惠州戶雖小賴其寬政佐等同惡大數不多且懌名號大不可以小故輕議進退其文武之心轉已安定賊帥艾秀遣使歸誠上洛附賊降者五百餘口冀一安隱無復怵惕從之後以所鎮險遠糧運不繼詔懌以將軍率所領還屯半洲尋遷輔國將軍豫州刺史進號西中郎將監宣城廬江歷陽安豐四郡軍事假節鎮蕪湖懌嘗以白羽扇獻成帝帝嫌其非新反之侍中劉劭曰柏梁雲構大匠先居其下管弦繁奏夔牙先聆其音懌之上扇以好不以新後懌聞之曰此人宜在帝之左右又嘗以毒酒餉江州刺史王允之王允之覺其有毒飲犬犬斃乃密奏之帝曰大舅已亂天下小舅復欲爾邪懌聞遂飲鴆而卒時年五十贈侍中衛將軍諡曰簡子統嗣統字長仁少有令名司空太尉辟皆不就調補撫軍會稽王司馬出為建威將軍寧夷護軍尋陽太守年二十九卒時人稱其才器甚痛惜之子玄之官至宣城內史冰字季堅兄亮以名德流訓冰以雅素垂風諸弟相率莫不好禮為世論所重亮常以為庾氏之寶司徒辟不就徵祕書郎預討華軼功封都鄉侯王導請為司徒右長史出補吳國內史會蘇峻作逆遣兵攻冰冰不能禦便棄郡奔會稽會稽內史王舒以冰行奮武將軍距峻別率張健於吳中時健黨甚衆諸將莫敢先進冰率衆擊健走之於是乘勝西進赴于京都又遣司馬滕含攻賊石頭城拔之冰勳為多封新吳縣侯固辭不受遷給事黃門侍郎又讓不拜司空郗鑒請為長史不就出補振威將軍會稽內史徵為領軍將軍又辭尋入為中書監揚州刺史都督揚豫兗三州軍事征虜將軍假節是時王導新喪人情恇然冰兄亮既固辭不入衆望歸冰既當重任經綸時務不捨夙夜賓禮朝賢升擢後進由是朝野注心咸曰賢相初導輔政每從寬惠冰頗任威刑殷融諫之冰曰前相之賢猶不堪其弘況吾者哉范汪謂冰曰頃天文錯度足下宜盡消禦之道冰曰玄象豈吾所測正當勤盡人事耳又隱實戶口料出無名萬餘人以充軍實詔復論前功冰上疏曰臣門戶不幸以短才贊務釁及天庭殃流邦族若晉典休明夷戮久矣而于時顛沛刑憲暫墜遂令臣等復得為時陳力徇國之臣因之而奮立功於大罪之後建義於顛覆之餘此是臣等所以復得視息於天壤王憲不復必明於往諐也此之厚幸可謂弘矣豈復得計勞納封受賞司勳哉願陛下曲降靈澤哀恕由中申命有司惠臣所乞則愚臣之願於此畢矣許之成帝疾篤時有妄為尚書符敕宮門宰相不得前左右皆失色冰神氣自若曰是必虛妄推問果詐衆心乃定進號左將軍康帝即位又進車騎將軍冰懼權盛乃求外出會弟翼當伐石季龍於是以本號除都督江荊寧益梁交廣七州豫州之四郡軍事領江州刺史假節鎮武昌以為翼援冰臨發上疏曰臣因循家寵冠冕當世而志無殊操量不及遠頃皇家多難釁故頻仍朝望國器與時殲落遂令天眷下墜降及臣身俯仰伏事於今五年上不能光贊聖猷下不能緝熙政道而陛下遇之過分求之不已復策敗駕之駟以冀萬里之功非天眷之隆將何以至此是以敢竭狂瞽以獻血誠願陛下暫屏旒纊以弘聽納今強寇未殄戎車未戢兵弱於郊人疲於內寇之侵逸未可量也黎庶之困未之安也羣才之用未之盡也而陛下崇高事與下隔視聽察覽必寄之羣下羣下宜忠不引不進百司宜勤不督不勸是以古之帝王勤於降納雖日總萬機猶兼聽將相或借訟輿人或求謗芻蕘良有以也況今日之弊開闢之極而陛下曆數屬當其運否剝之難嬰之聖躬普天所以痛心於既往而傾首於將來者也實冀否終而泰屬運在今誠願陛下弘天覆之量深地載之厚宅沖虛以為本勤訓督以為務廣引時彥詢於政道朝之得失必關聖聽人之情偽必達天聰然後覽其大當以總國綱躬儉節用堯舜豈遠大布之衣衛文何人是以古人有云非知之難行之難非行之難安之難也願陛下既思日側於勞謙納其起予之情則天下幸甚矣臣朝夕伏膺猶不能暢臨疏徘徊不覺辭盡頃之獻皇后臨朝徵冰輔政冰辭以疾篤尋而卒時年四十九冊贈侍中司空諡曰忠成祠以太牢冰天性清慎常以儉約自居中子襲嘗貸官絹十匹冰怒捶之市絹還官臨卒謂長史江虨曰吾將逝矣恨報國之志不展命也如何死之日斂以時服無以官物也及卒無絹為衾又室無妾媵家無私積世以此稱之冰七子希襲友蘊倩邈柔希字始彥初拜祕書郎累遷司徒右長史黃門侍郎建安太守未拜復為長史兼右衛將軍遷侍中出為輔國將軍吳國內史希既后之戚屬冰女又為海西公妃故希兄弟並顯貴太和中希為北中郎將徐兗二州刺史蘊為廣州刺史並假節友東陽太守倩太宰長史邈會稽王參軍柔散騎常侍倩最有才器桓溫深忌之初慕容厲圍梁父斷澗水太山太守諸葛攸奔鄒山魯高平等數郡皆沒希坐免官頃之徵為護軍將軍希怒固辭希初免時多盜北府軍資溫諷有司劾之復以罪免遂客於晉陵之暨陽初郭璞筮冰云子孫必有大禍唯用三陽可以有後故希求鎮山陽友為東陽家于暨陽及海西公廢桓溫陷倩及柔以武陵王黨殺之希聞難便與弟邈及子攸之逃于海陵陂澤中蘊於廣州飲鴆而死及友當伏誅友子婦桓祕女也請溫故得免故青州刺史武沈希之從母兄也潛餉給希經年溫後知之遣兵捕希武沈之子遵與希聚衆于海濱略漁人船夜入京口城平北司馬卞耽踰城奔曲阿吏士皆散走希放城內囚徒數百人配以器杖遵於外聚衆宣令云逆賊桓溫廢帝殺王稱海西公密旨誅除凶逆京都震擾內外戒嚴屯備六門平北參軍劉奭與高平太守郗逸之遊軍督護郭龍等集衆距之卞耽又與曲阿人弘戎發諸縣兵二千并力屯新城以擊希希戰敗閉城自守溫遣東海太守周少孫討之城陷被擒希邈及子姪五人斬于建康市遵及黨與並伏誅唯友及蘊諸子獲全友子叔宣右衛將軍蘊子廓之東陽太守條字幼序初辟太宰府累遷黃門郎豫章太守徵拜祕書監賜爵鄉亭侯出為冠軍將軍臨川太守豫章黃韜自稱孝神皇帝臨川人李高為相聚黨數百人乘犢車衣皁袍攻郡縣條討平之條於兄弟最凡劣故祿位不至卒官贈左將軍翼字稚恭風儀秀偉少有經綸大略京兆杜陳郡殷浩並才名冠世而翼弗之重也每語人曰此輩宜束之高閣俟天下太平然後議其任耳見桓溫總角之中便期之以遠略因言於成帝曰桓溫有英雄之才願陛下勿以常人遇之常壻畜之宜委以方邵之任必有弘濟艱難之勳蘇峻作逆翼時年二十二兄亮使白衣領數百人備石頭亮敗與翼俱奔事平始辟太尉陶侃府轉參軍累遷從事中郎在公府雍容諷議頃之除振威將軍鄱陽太守轉建威將軍西陽太守撫和百姓甚得歡心遷南蠻校尉領南郡太守加輔國將軍假節及邾城失守石城被圍翼屢設奇兵潛致糧杖石城得全翼之勳也賜爵都亭侯及亮卒授都督江荊司雍梁益六州諸軍事安西將軍荊州刺史假節代亮鎮武昌翼以帝舅年少超居大任遐邇屬目慮其不稱翼每竭志能勞謙匪懈戎政嚴明經略深遠數年之中公私充實人情翕然稱其才幹由是自河以南皆懷歸附石季龍汝南太守戴開率數千人詣翼降又遣使東至遼東西到涼州要給二方欲同大舉慕容皝張駿並報使請期翼雅有大志欲以滅胡平蜀為己任言論慷慨形于辭色將兵都尉錢頎陳事合旨翼拔為五品將軍賜穀二百斛時東土多賦役百姓乃從海道入廣州刺史鄧嶽大開鼓鑄諸夷因此知造兵器翼表陳東境國家所資侵擾不已逃逸漸多夷人常伺隙若知造鑄之利將不可禁時殷浩徵命無所就而翼請為司馬及軍司並不肯赴翼遺浩書因致其意先是浩父羨為長沙在郡貪殘兄冰與翼書屬之翼報曰殷君始往雖多驕豪實有風力之益亦似由有佳兒弟故不令物情難之自頃以來奉公更退私累日滋亦不稍以此寥蕭之也既雅敬洪遠又與浩親善其父兄得失豈以小小計之大較江東政以傴豪強以為民蠹時有行法輒施之寒劣如往年偷石頭倉米一百萬斛皆是豪將輩而直打殺倉督監以塞責山遐作餘姚半年而為官出二千戶政雖不倫公強官長也而羣共驅之不得安席紀睦徐寧奉王使糾罪人船頭到渚桓逸還復而二使免官雖皆前宰之惛謬江東事去實此之由也兄弟不幸橫陷此中自不能拔腳於風塵之外當共明目而治之荊州所統一二十郡唯長沙最惡惡而不黜與殺督監者復何異耶翼有風力格裁發言立論皆如此康帝即位翼欲率衆北伐上疏曰賊季龍年已六十奢淫理盡醜類怨叛又欲決死遼東皝雖驍果未必能固若北無掣手之虜則江南將不異遼左矣臣所以輒發良人不顧忿咎然東西形援未必齊舉且欲北進移鎮安陸入沔五百溳水通流輒率南郡太守王愆期江夏相謝尚尋陽太守袁真西陽太守曹據等精銳三萬風馳上道并勒平北將軍桓宣撲取黃季欲并丹水搖蕩秦雍御以長轡用逸待勞比及數年興復可冀臣既臨許洛竊謂桓溫可渡戍廣陵何充可移據淮泗赭圻路永進屯合肥伏願表御之日便決聖聽不可廣詢同異以乖事會兵聞拙速不聞工之久也於是並發所統六州奴及車牛驢馬百姓嗟怨時欲向襄陽慮朝廷不許故以安陸為辭帝及朝士皆遣使譬止車騎參軍孫綽亦致書諫翼不從遂違詔輒行至夏口復上表曰臣近以胡寇有弊亡之勢暫率所統致討山北並分見衆略復江夏數城臣等以九月十九日發武昌以二十四日達夏口輒簡卒搜乘停當上道而所調借牛馬來處皆遠百姓所穀草不充並多羸瘠難以涉路加以向冬野草漸枯往反二千或容躓頓輒便隨事籌量權停此舉又山南諸城每至秋冬水多燥涸運漕用功實為艱阻計襄陽荊楚之舊西接益梁與關隴咫尺北去洛河不盈千里土沃田良方城險峻水路流通轉運無滯進可以掃盪秦趙退可以保據上流臣雖不武意略淺短荷國重恩志存立效是以受任四年唯以習戎為務實欲上憑聖朝威靈高略下藉士民義慨之誠因寇衰弊漸臨逼之而八年春上表請據樂鄉廣農穀以伺二寇之釁而值天高聽邈未垂察照朝議紛紜遂令微誠不暢自爾以來上參天人之徵下採降俘之言胡寇衰滅其日不遠臣雖未獲長驅中原馘截凶醜亦不可以不進據要害思攻取之宜是以輒量宜入沔徙鎮襄陽其謝尚王愆期等悉令還據本戍須到所在馳遣啟聞翼時有衆四萬詔加都督征討軍事師次襄陽大會僚佐陳旌甲親授弧矢曰我之行也若此射矣遂三起三疊徒衆屬目其氣十倍初翼遷襄陽舉朝謂之不可議者或謂避衰唯兄冰意同桓溫及譙王無忌贊成其計至是冰求鎮武昌為翼繼援朝議謂冰不宜出冰乃止又進翼征西將軍領南蠻校尉胡賊五六百騎出樊城翼遣冠軍將軍曹據追擊於撓溝北破之死者近半獲馬百匹翼綏來荒遠務盡招納之宜立客館置典賓參軍桓宣卒翼以長子方之為義成太守代領宣衆司馬應誕為龍驤將軍襄陽太守參軍司馬勳為建威將軍梁州刺史戍西城康帝崩兄冰卒以家國情事留方之戍襄陽還鎮夏口悉取冰所領兵自配以兄子統為尋陽太守詔使翼還督江州又領豫州刺史辭豫州復欲移鎮樂鄉詔不許繕修軍器大佃積穀欲圖後舉遣益州刺史周撫西陽太守曹據伐蜀破蜀將李桓於江陽翼如厠見一物如方相俄而疽發背疾篤表第二子爰之行輔國將軍荊州刺史司馬朱燾為南蠻校尉以千人守巴陵永和元年卒時年四十一追贈車騎將軍諡曰肅翼卒未幾部將干瓚戴羲等作亂殺將軍曹據翼長史江虨司馬朱燾將軍袁真等共誅之爰之有翼風尋為桓溫所廢溫既廢爰之又以征虜將軍劉惔監沔中軍事領義成太守代方之而方之爰之並遷徙于豫章史臣曰外戚之家連輝椒掖舅氏之族同氣蘭閨靡不憑藉寵私階緣險謁門藏金穴地使其驕馬控龍媒勢成其逼古者右賢左戚用杜溺私之路愛而知惡深慎滿覆之災是以厚贈瓊瑰罕升津要塗山在夏靡與𪅂稷同驅姒氏居周不預燕齊等列聖人慮遠殊有旨哉晉昵元規參聞顧命然其筆敷華藻吻縱濤波方駕搢紳足為翹楚而智小謀大昧經邦之遠圖才高識寡闕安國之長算璿萼見誅物議稱其拔本牙尺垂訓帝念深於負芒是使蘇祖尋戈宗祧殆覆已而猜嫌上宰謀黜負圖向使郗鋻協從必且戎車犯順則與夫台產安桀亦何以異哉幸漏吞舟免淪昭憲是庾宗之大福非晉政之不綱明矣懌恣凶懷鴆加連率再世之後三陽僅存餘殃所及蓋其宜也贊曰元規矯迹寵階椒掖識闇釐道亂由乘隙下拜長沙有慚忠益季堅清貞毓德馳名處泰逾約居權戒盈稚恭慷慨亦擅雄聲
