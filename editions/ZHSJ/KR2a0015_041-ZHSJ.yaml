body:
  text: 晉書卷四十一列傳第十一魏舒魏舒字陽元任城樊人也少孤為外家甯氏所養甯氏起宅相宅者云當出貴甥外祖母以魏氏甥小而慧意謂應之舒曰當為外氏成此宅相久乃別居身長八尺二寸姿望秀偉飲酒石餘而遲鈍質朴不為鄉親所重從叔父吏部郎衡有名當世亦不之知使守水碓每歎曰舒堪數百戶長我願畢矣舒亦不以介意不修常人之節不為皎厲之事每欲容才長物終不顯人之短性好騎射著韋衣入山澤以漁獵為事唯太原王謂舒曰卿終當為台輔然今未能令妻子免飢寒吾當助卿營之常振其匱乏舒受而不辭舒嘗詣野王主人妻夜產俄而聞車馬之聲相問曰男也女也曰男書之十五以兵死復問寢者為誰曰魏公舒後十五載詣主人問所生兒何在曰因條桑為斧傷而死舒自知當為公矣年四十餘郡上計掾察孝廉宗黨以舒無學業勸令不就可以為高耳舒曰若試而不中其負在我安可虛竊不就之高以為己榮乎於是自課百日習一經因而對策升第除澠池長遷浚儀令入為尚書郎時欲沙汰郎官非其才者罷之舒曰吾即其人也樸被而出同僚素無清論者咸有愧色談者稱之累遷後將軍鍾毓長史毓每與參佐射舒常為畫籌而已後遇朋人不足以舒滿數毓初不知其善射舒容範閑雅發無不中舉坐愕然莫有敵者毓歎而謝曰吾之不足以盡卿才有如此射矣豈一事哉轉相國參軍封劇陽子府朝碎務未嘗見是非至於廢興大事衆人莫能斷者舒徐為籌之多出衆議之表文帝深器重之每朝會坐罷目送之曰魏舒堂堂人之領袖也遷宜陽滎陽二郡太守甚有聲稱徵拜散騎常侍出為冀州刺史在州三年以簡惠稱入為侍中武帝以舒清素特賜絹百匹遷尚書以公事當免官詔以贖論舒三娶妻皆亡是歲自表乞假還本郡葬妻詔賜葬地一頃錢五十萬太康初拜右僕射舒與衞瓘山濤張華等以六合混一宜用古典封禪東嶽前後累陳其事帝謙讓不許以舒為左僕射領吏部舒上言今選六宮聘以玉帛而舊使御府丞奉聘宣成嘉禮贄重使輕以為拜三夫人宜使卿九嬪使五官中郎將美人良人使謁者於典制為弘有詔詳之衆議異同遂寢加右光祿大夫儀同三司及山濤薨以舒領司徒有頃即真舒有威重德望祿賜散之九族家無餘財陳留周震累為諸府所辟辟書既下公輒喪亡僉號震為殺公掾莫有辟者舒乃命之而竟無患識者以此稱其達命以年老每稱疾遜位中復暫起署兗州中正尋又稱疾尚書左丞郤詵與舒書曰公久疾小差視事是也唯上所念何意起訖還臥曲身迴法甚失具瞻之望公少立巍巍一旦棄之可不惜哉舒稱疾如初後以災異遜位帝不聽後因正旦朝罷還第表送章綬帝手詔敦勉而舒執意彌固乃下詔曰司徒劇陽子舒體道弘粹思量經遠忠肅居正在公盡規入管銓衡官人允出贊袞職敷弘五教惠訓播流德聲茂著可謂朝之俊者也而屢執沖讓辭旨懇誠申覽反覆省用憮然蓋成人之美先典所與難違至情今聽其所執以劇陽子就第位同三司祿賜如前几杖不朝賜錢百萬牀帳簟褥自副以舍人四人為劇陽子舍人置官騎十人使光祿勳奉策主者詳案典禮令皆如舊制於是賜安車駟馬門施行馬舒為事必先行而後言遜位之際莫有知者時論以為晉興以來三公能辭榮善終者未之有也司空衞瓘與舒書曰每與足下共論此事日日未果可謂瞻之在前忽焉在後矣太熙元年薨時年八十二帝甚傷悼賵賻優厚諡曰康子混字延廣清惠有才行為太子舍人年二十七先舒卒朝野咸為舒悲惜舒每哀慟退而歎曰吾不及莊生遠矣豈以無益自損乎於是終服不復哭詔曰舒惟一子薄命短折舒告老之年處窮獨之苦每念怛然為之嗟悼思所以散愁養氣可更增滋味品物仍給賜陽燧四望繐戶皁輪車牛一乘庶出入觀望或足散憂也以庶孫融嗣又早卒從孫晃嗣李憙李憙字季和上黨銅鞮人也父佺漢大鴻臚憙少有高行博學研精與北海管寧以賢良徵不行累辟三府不就宣帝復辟憙為太傅屬固辭疾郡縣扶輿上道時憙母疾篤乃竊踰泫氏城而徒還遂遭母喪論者嘉其志節後為并州別駕時驍騎將軍秦朗過并州州將畢軌敬焉令乘車至閤憙固諫以為不可軌不得已從之景帝輔政命憙為大將軍從事中郎憙到引見謂憙曰昔先公辟君而君不應今孤命君而君至何也對曰先君以禮見待憙得以禮進退明公以法見繩憙畏法而至帝甚重之轉司馬尋拜右長史從討毋丘儉還遷御史中丞當官正色不憚強禦百僚震肅焉薦樂安孫璞亦以道德顯時人稱為知人尋遷大司馬以公事免司馬伷為寧北將軍鎮鄴以憙為軍司頃之除涼州刺史加揚威將軍假節領護羌校尉綏御華夷甚有聲績羌虜犯塞憙因其隙會不及啟聞輒以便宜出軍深入遂大克獲以功重免譴時人比之漢朝馮甘焉於是請還許之居家月餘拜冀州刺史累遷司隸校尉及魏帝告禪于晉憙以本官行司徒事副太尉鄭沖奉策泰始初封祁侯憙上言故立進令劉友前尚書山濤中山王睦故尚書僕射武陔各占官三更稻田請免濤睦等官陔已亡請貶諡詔曰法者天下取正不避親貴然後行耳吾豈將枉縱其間哉然案此事皆是友所作侵剝百姓以繆惑朝士姦吏乃敢作此其考竟友以懲邪佞濤等不貳其過者皆勿有所問易稱王臣蹇蹇匪躬之故今憙亢志在公當官而行可謂邦之司直者矣光武有云貴戚且斂手以避二鮑豈其然乎其申敕羣僚各慎所司寬宥之恩不可數遇也憙為二代司隸朝野稱之以公事免其年皇太子立以憙為太子太傅自魏明帝以後久曠東宮制度廢闕官司不具詹事左右率庶子中舍人諸官並未置唯置衞率令典兵二傅幷攝衆事憙在位累年訓道盡規遷尚書僕射拜特進光祿大夫以年老遜位詔曰光祿大夫特進李憙杖德居義當升台司毗亮朕躬而以年尊致仕雖優游無為可以頤神而虛心之望能不憮然其因光祿之號改假金紫置官騎十人賜錢五十萬祿賜班禮一如三司門施行馬初憙為僕射時涼州虜寇邊憙唱義遣軍討之朝士謂出兵不易虜未足為患竟不從之後虜果大縱逸涼州覆沒朝廷深悔焉以憙清素貧儉賜絹百匹及齊王攸出鎮憙上疏諫爭辭甚懇切憙自歷仕雖清非異衆而家無儲積親舊故人乃至分衣共食未嘗私以王官及卒追贈太保諡曰成子贊嗣少子儉字仲約歷左積弩將軍屯騎校尉儉子弘字世彥少有清節永嘉末歷給事黃門侍郎散騎常侍劉寔弟智劉寔字子真平原高唐人也漢濟北惠王壽之後也父廣斥丘令寔少貧苦賣牛衣以自給然好學手約繩口誦書博通古今清身潔己行無瑕玷郡察孝廉州舉秀才皆不行以計吏入洛調為河南尹丞遷尚書郎廷尉正後歷吏部郎參文帝相國軍事封循陽子鍾會鄧艾之伐蜀也有客問寔曰二將其平蜀乎寔曰破蜀必矣而皆不還客問其故笑而不答竟如其言寔之先見皆此類也以世多進趣廉遜道闕乃著崇讓論以矯之其辭曰古之聖王之化天下所以貴讓者欲以出賢才息爭競也夫人情莫不欲己之賢也故勸令讓賢以自明賢也豈假讓不賢哉故讓道興賢能之人不求而自出矣至公之舉自立矣百官之副亦豫具矣一官缺擇衆官所讓最多者而用之審之道也在朝之士相讓於上草廬之人咸皆化之推賢讓能之風從此生矣為一國所讓則一國士也天下所共推則天下士也推讓之風行則賢與不肖灼然殊矣此道之行在上者無所用其心因成清議隨之而已故曰蕩蕩乎堯之為君莫之能名言天下自安矣不見堯所以化之故不能名也又曰舜禹之有天下而不與焉無為而化者其舜也歟賢人相讓於朝大才之人在大官小人不爭於野天下無事矣以賢才化無事至道興矣已仰其成復何與焉故可以歌南風之詩彈五弦之琴也成此功者非有他崇讓之所致耳孔子曰能以禮讓為國則不難也在朝之人不務相讓久矣天下化之自魏代以來登進辟命之士及在職之吏臨見受雖自辭不能終莫肯讓有勝己者夫推讓之風息爭競之心生孔子曰上興讓則下不爭明讓不興下必爭也推讓之道興則賢能之人日見推舉爭競之心生則賢能之人日見謗毀夫爭者之欲自先甚惡能者之先不能無毀也故孔墨不能免世之謗己況不及孔墨者乎議者僉然言世少高名之才朝廷不有大才之人可以為大官者山澤人小官吏亦復云朝廷之士雖有大官名德皆不及往時人也余以為此二言皆失之矣非時獨乏賢也時不貴讓一人有先衆之譽毀必隨之名不得成使之然也雖令稷契復存亦不復能全其名矣能否混雜優劣不分士無素定之價官職有缺主選之吏不知所用但案官次而舉之同才之人先用者非勢家之子則必為有勢者之所念也非能獨賢因其先用之資而復遷之無已遷之無已不勝其任之病發矣觀在官之人政績無聞自非勢家之子率多因資次而進也向令天下貴讓士必由於見讓而後名成名成而官乃得用之諸名行不立之人在官無政績之稱讓之者必矣官無因得而用之也所以見用不息者由讓道廢因資用人之有失久矣故自漢魏以來時開大舉令衆官各舉所知唯才所任不限階次如此者甚數矣其所舉必有當者不聞時有擢用不知何誰最賢故也所舉必有不當而罪不加不知何誰最不肖也所以不可得知由當時之人莫肯相推賢愚之名不別令其如此舉者知在上者察不能審故敢漫舉而進之或舉所賢因及所念一頓而至人數猥多各言所舉者賢加之高狀相似如一難得而分矣參錯相亂真偽同貫更復由此而甚雖舉者不能盡忠之罪亦由上開聽察之路濫令其爾也昔齊王好聽竽聲必令三百人合吹而後聽之廩以數人之俸南郭先生不知吹竽者也以三百人合吹可以容其不知因請為王吹竽虛食數人之俸嗣王覺而改之難彰先王之過乃下令曰吾之好聞竽聲有甚於先王欲一一列而聽之先生於此逃矣推賢之風不立濫舉之法不改則南郭先生之徒盈於朝矣才高守道之士日退馳走有勢之門日多矣雖國有典刑弗能禁矣夫讓道不興之弊非徒賢人在下位不得時進也國之良臣荷重任者亦將以漸受罪退矣何以知其然也孔子以為顏氏之子不貳過耳明非聖人皆有過寵貴之地欲之者多矣惡賢能者塞其路其過而毀之者亦多矣夫謗毀之生非徒空設必因人之微過而甚之者也毀謗之言數聞在上者雖欲弗納不能不杖所聞因事之來而微察之也無以其驗至矣得其驗安得不理其罪若知而縱之王之威日衰令之不行自此始矣知而皆理之受罪退者稍多大臣有不自固之心夫賢才不進貴臣日疏此有國者之深憂也詩曰受祿不讓至于已斯亡不讓之人憂亡不暇而望其益國朝不亦難乎竊以為改此俗甚易耳何以知之夫一時在官之人雖雜有凡猥之才其中賢明者亦多矣豈可謂皆不知讓賢為貴邪直以其時皆不讓習以成俗故遂不為耳人臣初除皆通表上聞名之謝章所由來尚矣原謝章之本意欲進賢能以謝國恩也昔舜以禹為司空禹拜稽首讓于稷契及咎繇使益為虞官讓于朱虎熊羆使伯夷典三禮讓于夔龍唐虞之時衆官初除莫不皆讓也謝章之義蓋取於此書記之者欲以永世作則季世所用不賢不能讓賢虛謝見用之恩而已相承不變習俗之失也夫用之官得通章表者其讓賢推能乃通其不能有所讓徒費簡紙者皆絕不通人臣初除各思推賢能而讓之矣讓之文付主者掌之三司有缺擇三司所讓最多者而用之此為一公缺三公已豫選之矣且主選之吏不必任公而選三公不如令三公自共選一公為詳也四征缺擇四征所讓最多者而用之此為一征缺四征已豫選之矣必詳於停缺而令主者選四征也尚書缺擇尚書所讓最多者而用之此為八尚書共選一尚書詳於臨缺令主者選八尚書也郡守缺擇衆郡所讓最多者而用之詳於任主者令選百郡守也夫以衆官百郡之讓與主者共相比不可同歲而論也雖復令三府參舉官本不委以舉選之任各不能以根其心也其所用心者裁之不二三但令主者案官次而舉之不用精也賢愚皆讓百姓耳目盡為國耳目夫人情爭則欲毀己所不知讓則競推於勝己故世爭則毀譽交錯優劣不分難得而讓也時讓則賢智顯出能否之美歷歷相次不可得而亂也當此時也能退身修己者讓之者多矣雖欲守貧賤不可得也馳騖進趣而欲人見讓猶卻行而求前也夫如此愚智咸知進身求通非修之於己則無由矣游外求者於此相隨而歸矣浮聲虛論不禁而自息矣人人無所用其心任衆人之議而天下自化矣不言之化行巍巍之美於此著矣讓可以致此豈可不務之哉春秋傳曰范宣子之讓其下皆讓欒黶雖汰弗敢違也晉國以平數世賴之上世之化也君子尚能而讓其下小人力農以事其上上下有禮讒慝遠黜由不爭也及其亂也國家之弊必由之篤論了了如此在朝君子典選大官能不以人廢言舉而行之各以讓賢舉能為先務則羣才猥出能否殊別蓋世之功莫大於此泰始初進爵為伯累遷少府咸寧中為太常轉尚書杜預之伐吳也寔以本官行鎮南軍司初寔妻盧氏生子躋而卒華氏將以女妻之寔弟智諫曰華家類貪必破門戶辭之不得竟婚華氏而生子夏寔竟坐夏受賂免官頃之為大司農又以夏罪免寔每還州里鄉人載酒肉以候之寔難逆其意輒共啖而返其餘或謂寔曰君行高一世而諸子不能遵何不旦夕切磋使知過而自改邪寔曰吾之所行是所聞見不相祖習豈復教誨之所得乎世以寔言為當後起為國子祭酒散騎常侍愍懷太子初封廣陵王高選師友以寔為師元康初進爵為侯累遷太子太保加侍中特進右光祿大夫開府儀同三司領冀州都督九年策拜司空遷太保轉太傅太安初寔以老病遜位賜安車駟馬錢百萬以侯就第及長沙成都之相攻也寔為軍人所掠潛歸鄉里惠帝崩寔赴山陵懷帝即位復授太尉寔自陳年老固辭不許左丞劉坦上言曰夫堂高級遠主尊相貴是以古之哲王莫不師其元臣崇養老之教訓示四海使少長有禮七十致仕亦所以優異舊德厲廉高之風太尉寔體清素之操執不渝之潔懸車告老二十餘年浩然之志老而彌篤可謂國之碩老邦之宗模臣聞老者不以筋力為禮寔年踰九十命在日制遂自扶輿冒險而至展哀山陵致敬闕庭大臣之節備矣聖詔殷勤必使寔正位上台光飪鼎實斷章敦喻經涉二年而寔頻上露板辭旨懇誠臣以為古之養老以不事為優不以吏之為重謂宜聽寔所守三年詔曰昔虞任五臣致垂拱之化漢相蕭何興寧一之譽故能光隆於當時垂裕于百代朕紹天明命臨御萬邦所以崇顯政道者亦賴之於元臣庶尹畢力股肱以副至望而君年耆告老確然難違今聽君以侯就第位居三司之上秩祿準舊賜几杖不朝及宅一區國之大政將就諮于君副朕意焉歲餘薨時年九十一諡曰元寔少貧窶杖策徒行每所憩止不累主人薪水之事皆自營給及位望通顯每崇儉素不尚華麗嘗詣石崇家如廁見有絳紋帳裍褥甚麗兩婢持香囊寔便退笑謂崇曰誤入卿內崇曰是廁耳寔曰貧士未嘗得此乃更如他廁雖處榮寵居無第宅所得俸祿贍卹親故雖禮教陵遲而行己以正喪妻為廬杖之制終喪不御內輕薄者笑之寔不以介意自少及老篤學不倦雖居職務卷弗離手尤精三傳辨正公羊以為衞輒不應辭以王父命祭仲失為臣之節舉此二端以明臣子之體遂行於世又撰春秋條例二十卷有二子躋夏躋字景雲官至散騎常侍夏以貪污棄放於世弟智字子房貞素有兄風少貧窶每負薪自給讀誦不輟竟以儒行稱歷中書黃門吏部郎出為潁川太守平原管輅嘗謂人曰吾與劉潁川兄弟語使人神思清發昏不假寐自此之外殆白日欲寢矣入為秘書監領南陽王師加散騎常侍遷侍中尚書太常著喪服釋疑論多所辨明太康末卒諡曰成高光高光字宣茂陳留圉城人魏太尉柔之子也光少習家業明練刑理初以太子舍人累遷尚書郎出為幽州刺史潁州太守是時武帝置黃沙獄以典詔囚以光歷世明法用為黃沙御史秩與中丞同遷廷尉元康中拜尚書典三公曹時趙王倫篡逆光於其際守道全貞及倫賜死齊王冏輔政復以光為廷尉遷尚書加奉車都尉後從駕討成都王穎有勳封延陵縣公邑千八百戶于時朝廷咸推光明於用法故頻典理官惠帝為張方所逼幸長安朝臣奔散莫有從者光獨侍帝而西遷尚書左僕射加散騎常侍光兄誕為上官巳等所用歷徐雍二州刺史誕性任放無倫次而決烈過人與光異操常謂光小節輕侮之光事誕愈謹帝既還洛陽時太弟新立重選傅訓以光為少傅加光祿大夫常侍如故及懷帝即位加光祿大夫金章紫綬與傅祗並見推崇尋為尚書令本官如故以疾卒贈司空侍中屬京洛傾覆竟未加諡子韜字子遠放佚無檢光為廷尉時韜受貨賕有司奏案之而光不知時人雖非光不能防閑其子以其用心有素不以為累初光詣長安留臺以韜兼右衞將軍韜與殿省小人交通及光卒仍於喪中往來不絕時東海王越輔政不朝覲韜知人心有望密與太傅參軍姜賾京兆杜概等謀討越事泄伏誅史臣曰下士競而文中庸靜而質不若進不足而退有餘也魏舒劉寔發慮精華結綬登槐覽止成務季和切問近對當官正色詩云貪人敗類豈劉夏之謂歟贊曰舒言不矜憙對千乘子真宣茂雅志難陵進忠能舉退讓攸興皎皎瑚器來光玉繩
