body:
  text: 晉書卷一百五載記第五石勒下子弘張賓太興二年勒偽稱趙王赦殊死已下均百姓田租之半賜孝悌力田死義之孤帛各有差孤老魚眾寡穀人三石大酺七日依春秋列國漢初侯王每世稱元改稱趙王元年始建社稷立宗廟營東西宮署從事中郎裴憲參軍傅暢杜嘏並領經學祭酒參軍續咸庾景為律學祭酒任播崔濬為史學祭酒中壘支雄遊擊王陽並領門臣祭酒專明胡人辭訟以張離張良劉羣劉謨等為門生主書司典胡人出內重其禁法不得侮易衣冠華族號胡為國人遣使循行州郡勸課農桑加張賓大執法專總朝政位冠僚首署石季龍為單于元輔都督禁衞諸軍事署前將軍李寒領司兵勳教國子擊刺戰射之法命記室佐明楷程機撰上黨國記中大夫傅彪賈蒲江軌撰大將軍起居注參軍石泰石同石謙孔隆撰大單于志自是朝會常以天子禮樂饗其羣下威儀冠冕從容可觀矣羣臣議請論功勒曰自孤起軍十六年于茲矣文武將士從孤征伐者莫不蒙犯矢石備嘗艱阻其在葛陂之役厥功尤著宜為賞之先也若身見存爵封輕重隨功位為差死事之孤賞加一等庶足以慰答存亡申孤之心也又下書禁國人不聽報嫂及在喪婚娶其燒葬令如本俗孔萇攻邵續別營十一皆下之續尋為石季龍所獲送于襄國劉曜將尹安宋始據洛陽降于勒晉徐州刺史蔡豹敗徐龕于檀丘龕遣使詣勒陳討豹之計勒遣將王步都為龕前鋒使張敬率騎繼之敬達東平龕疑敬之襲己也斬步都等三百餘人復降于晉勒大怒命張敬據其襟要以守之大雨霖中山常山尤甚滹汎溢衝陷山谷巨松僵拔浮于滹東至渤海原隰之間皆如山積孔萇攻陷文鴦十餘營萇不設備鴦夜擊之大敗而歸勒始制軒懸之樂八佾之舞為金根大輅黃屋左纛天子車旗禮樂備矣使石季龍率步騎四萬討徐龕龕遣長史劉霄詣勒乞降送妻子為質納之時蔡豹屯于譙城季龍攻豹豹夜遁季龍引軍城封丘而旋徙朝臣掾屬已上士族者三百戶于襄國崇仁里置公族大夫以領之勒宮殿及諸門始就制法令甚嚴諱胡尤峻有醉胡乘馬突入止車門勒大怒謂宮門小執法馮翥曰夫人君為令尚望威行天下況宮闕之間乎向馳馬入門為是何人而不彈白邪翥惶懼忘諱對曰向有醉胡乘馬馳入甚呵禦之而不可與語勒笑曰胡人正自難與言恕而不罪使石季龍擊託候部掘咄哪於岍北大破之俘獲牛馬二十餘萬勒清定五品以張賓領選復續定九品署張班為左執法郎孟卓為右執法郎典定士族副選舉之任令羣僚及州郡歲各舉秀才至孝廉清賢良直言武勇之士各一人置署都部從事各一部一州秩二千石職準丞相司直勒下令曰去年水出巨材所在山積將皇天欲孤繕修宮宇也其擬洛陽之太極起建德殿遣從事中郎任汪帥使工匠五千採木以供之黎陽人陳武妻一產三男一女武攜其妻子詣襄國上書自陳勒下書以為二儀諧暢和氣所致賜其乳婢一口穀一百石雜綵四十匹石季龍攻段匹磾于厭次孔萇討匹磾部內諸城陷之匹磾勢窮乃率其臣下輿櫬出降季龍送之襄國勒署匹磾為冠軍將軍以其弟文鴦亞將衞麟為左右中郎將皆金章紫綬散諸流人三萬餘戶復其本業置守宰以撫之於是冀并幽州遼西巴西諸屯結皆陷於勒時晉征北將軍祖逖據譙將平中原逖善於撫納自河以南多背勒歸順勒憚之不敢為寇乃下書曰祖逖屢為邊患逖北州士望也儻有首丘之思其下幽州修祖氏墳墓為置守冢二家冀逖如趙他感恩輟其寇暴逖聞之甚悅遣參軍王愉使於勒贈以方物修結和好勒厚賓其使遣左常侍董樹報聘以馬百匹金五十斤答之自是兗豫乂安人得休息矣從事中郎劉奧坐營建德殿井木斜縮斬于殿中勒悔之贈太常建德校尉王和掘得員石銘曰律權石重四鈞同律度量衡有新氏造議者未詳或以為瑞參軍續咸曰王莽時物也其時兵亂之後典度堙滅遂命下禮官為準程定式又得一鼎容四升中有大錢三十文曰百當千千當萬鼎銘十三字篆書不可曉藏之於永豐倉因此令公私行錢而人情不樂乃出公絹市錢限中絹匹一千二百下絹八百然百姓私買中絹四千下絹二千巧利者賤買私錢貴賣於官坐死者十數人而錢終不行勒徙洛陽銅馬翁仲二于襄國列之永豐門祖逖牙門童建害新蔡內史周密遣使降于勒勒斬之送首于祖逖曰天下之惡一也叛臣逃吏吾之深仇將軍之惡猶吾惡也逖遣使報謝自是兗豫間壘壁叛者逖皆不納二州之人率多兩屬矣勒令武鄉耆舊赴襄國既至勒親與鄉老齒坐歡飲語及平生初勒與李陽鄰居歲常爭麻池迭相敺擊至是謂父老曰李陽壯士也何以不來漚麻是布衣之恨孤方崇信于天下寧讐匹夫乎乃使召陽既至勒與酣謔引陽臂笑曰孤往日厭卿老拳卿亦飽孤毒手因賜甲第一區拜參軍都尉令曰武鄉吾之豐沛萬歲之後魂靈當歸之其復之三世勒以百姓始復業資儲未豐於是重制禁釀郊祀宗廟皆以醴酒行之數年無復釀者尋署石季龍為車騎將軍率騎三萬討鮮卑鬱粥于離石俘獲及牛馬十餘萬鬱粥奔烏丸悉降其衆城先是勒世子興死至是立子弘為世子領中領軍遣季龍統中外精卒四萬討徐龕龕堅守不戰於是築室返耕列長圍以守之晉鎮北將軍劉隗降于勒拜鎮南將軍封列侯石季龍攻陷徐龕送之襄國勒囊盛於百尺樓自上螥殺之令步都等妻子刳而食之坑龕降卒三千晉兗州刺史劉遐懼自鄒山退屯于下邳琅邪內史孫默以琅邪叛降于勒徐兗間壘壁多送任請降皆就拜守宰清河張披為程遐長史遐甚委昵之張賓舉為別駕引參政事遐疾披去己又惡賓之權盛勒世子弘即遐之甥也自以有援欲收威重於朝乃使弘之母譖之曰張披與張賓為游俠門客日百餘乘物望皆歸之非社稷之利也宜除披以便國家勒然之至是披取急召不時至因此遂殺之賓知遐之間己遂弗敢請無幾以遐為右長史總執朝政自是朝臣莫不震懼赴于程氏矣時祖逖卒勒始侵寇邊戍勒征虜石他敗王師于酇西執將軍衞榮而歸征北將軍祖約懼退如壽春勒境內大疫死者十二三乃罷徽文殿作遣其將王陽屯于豫州有闚之志於是兵難日尋梁鄭之間騷然矣又遣季龍統中外步騎四萬討曹嶷先是嶷議欲徙海中保根余山會疾疫甚計未及就季龍進兵圍廣固東萊太守劉巴長廣太守呂披皆以郡降以石他為征東將軍擊羌胡于河西左軍石挺濟師于廣固曹嶷降送于襄國勒害之坑其衆三萬季龍將盡殺嶷衆其青州刺史劉徵曰今留徵使牧人也無人焉牧徵將歸矣季龍乃留男女七百口配徵鎮廣固青州諸郡縣壘壁盡陷勒司州刺史石生攻晉揚武將軍郭誦于陽翟不克進寇襄城俘獲千餘而還勒以參軍樊坦清貧擢授章武內史既而入辭勒見坦衣冠弊壞大驚曰樊參軍何貧之甚也坦性誠朴率然而對曰頃遭羯賊無道資財蕩盡勒笑曰羯賊乃爾暴掠邪今當相償耳坦大懼叩頭泣謝勒曰孤律自防俗士不關卿輩老書生也賜車馬衣服裝錢三百萬以勵貪俗勒將兵都尉石瞻寇下邳敗晉將軍劉長遂寇蘭陵又敗彭城內史劉續東莞太守竺珍東海太守蕭誕以郡叛降于勒勒親臨大小學考諸學生經義尤高者賞帛有差勒雅好文學雖在軍旅常令儒生讀史書而聽之每以其意論古帝王善惡朝賢儒士聽者莫不歸美焉嘗使人讀漢書聞酈食其勸立六國後大驚曰此法當失何得遂成天下至留侯諫乃曰賴有此耳其天資英達如此勒徵徐揚州兵會石瞻于下邳劉遐懼又自下邳奔于泗汭石生攻劉曜河內太守尹平于新安斬之克壘壁十餘降掠五千餘戶而歸自是劉石禍結兵戈日交河東弘農間百姓無聊矣以右常侍霍皓為勸課大夫與典農使者朱表典勸都尉陸充等循行州郡核定戶籍勸課農桑農桑最修者賜爵五大夫使石生自延壽關出寇許潁俘獲萬餘降者二萬生遂攻陷康城晉將軍郭誦追生生大敗死者千餘生收散卒屯于康城勒汲郡內史石聰聞生敗馳救之進攻郭默俘獲男女二千餘人石聰攻敗晉將李矩郭默等勒將狩於近郊主簿程琅諫曰劉馬刺客離布如林變起倉卒帝王亦一夫之敵耳孫策之禍可不慮乎且枯木朽株盡能為害馳騁之弊今古戒之勒勃然曰吾榦力自可足能裁量但知卿文書事不須白此輩也是日遂獸馬觸木而死勒亦幾殆乃曰不用忠臣言吾之過也乃賜琅朝服錦絹爵關內侯於是朝臣謁見忠言競進矣晉都尉魯潛叛以許昌降於勒石瞻攻陷晉兗州刺史檀斌于鄒山斌死之勒西夷中郎將王勝襲殺并州刺史崔琨上黨內史王以并州叛于勒先是石季龍攻劉曜將劉岳于石梁至是石梁潰執岳送襄國季龍又攻王勝于并州殺之李矩以劉岳之敗也懼自滎陽遁歸矩長史崔宣率矩衆二千降于勒於是盡有司兗之地徐豫濱淮諸郡縣皆降之勒命徙洛陽晷影于襄國列之單于庭銘佐命功臣三十九人于石函置于建德前殿立桑梓苑于襄國勒嘗夜微行檢察營衞齎繒帛金銀以賂門者求出永昌門門候王假欲收捕之從者至乃止旦召假以為振忠都尉爵關內侯勒如苑鄉召記室參軍徐光光醉不至以光物情所湊常不平之因此發怒退為牙門勒自苑鄉如鄴徐光侍直慍然攘袂振紛仰視不顧勒因而惡之讓光曰何負卿而敢怏怏邪於是幽光井其妻子于獄勒既將營鄴宮又欲以其世子弘為鎮密與程遐謀之石季龍自以勳效之重仗鄴為基雅無去意及修構三臺遷其家室季龍深恨遐遣左右數十人夜入遐宅姦其妻女掠衣物而去勒以弘鎮鄴配禁兵萬人車騎所統五十四營悉配之以驍騎領門臣祭酒王陽專統六夷以輔之石聰攻壽春不克遂寇逡遒阜陵殺掠五千餘人京師大震濟岷太守劉闓將軍張闔等叛害下邳內史夏侯嘉以下邳降于石生石瞻攻河南太守王羨于邾陷之龍驤將軍王國叛以南郡降于勒晉彭城內史劉續復據蘭陵石城石瞻攻陷之勒令州郡有墳發掘不掩覆者推劾之骸骨暴露者縣為備棺衾之具以牙門將王波為記室參軍典定九流始立秀孝試經之制茌平令師懽獲黑兔獻之於勒程遐等以為勒龍飛革命之祥於晉以水承金兔陰精之獸玄為水色此示殿下宜速副天人之望也於是大赦以咸和三年改年曰太和石堪攻晉豫州刺史祖約于壽春屯師淮上晉龍驤將軍王國以南郡叛降于堪南陽都尉董幼叛率襄陽之衆又降于堪祖約諸將佐皆陰遣使附于勒石聰與堪濟淮陷壽春祖約奔歷陽壽春百姓陷于聰者二萬餘戶劉曜敗季龍于高候遂圍洛陽勒滎陽太守尹矩野王太守張進等皆降之襄國大震勒將親救洛陽左右長史司馬郭敖程遐等固諫曰劉曜乘勝雄盛難與爭鋒金墉糧豐攻之未可卒拔曜懸軍千里勢不支久不可親動動無萬全大業去矣勒大怒按劍叱遐等出於是赦徐光召而謂之曰劉曜乘高候之勢圍守洛陽庸人之情皆謂其鋒不可當也然曜帶甲十萬攻一城而百日不克師老卒殆以我初銳擊之可一戰而擒若洛陽不守曜必送死冀州自河已北席卷南向吾事去矣程遐等不欲吾親行卿以為何如光對曰劉曜乘高候之勢而不能進臨襄國更守金墉此其無能為也懸軍三時亡攻戰之利若鸞旗親駕必望旌奔敗定天下之計在今一舉今此機會所謂天授授而弗應禍之攸集勒笑曰光之言是也佛圖澄亦謂勒曰大軍若出必擒劉曜勒尤悅使內外戒嚴有諫者斬命石堪石聰及豫州刺史桃豹等各統見衆會滎陽使石季龍進據石門以左衞石邃都督中軍事勒統步騎四萬赴金墉濟自大堨先是流澌風猛軍至冰泮清和濟畢流凘大至勒以為神靈之助也命曰靈昌津勒顧謂徐光曰曜盛兵成關上計也阻洛水其次也坐守洛陽者成擒也諸軍集于成步卒六萬騎二萬七千勒見曜無守軍大悅舉手指天又自指額曰天也乃卷甲銜枚而詭道兼路出于鞏訾之間知曜陳其軍十餘萬于城西彌悅謂左右曰可以賀我矣勒統步騎四萬入自宣陽門升故太極前殿季龍步卒三萬自城北而西攻其中軍石堪石聰等各以精騎八千城西而北擊其前鋒大戰于西陽門勒躬貫甲冑出自閶闔夾擊之曜軍大潰石堪執曜送之以徇于軍斬首五萬餘級枕尸于金谷勒下令曰所欲擒者一人耳今已獲之其敕將士抑鋒止銳縱其歸命之路乃旋師使征東石邃等帥騎衞曜而北及是祖約舉兵敗降于勒勒使王波讓之曰卿逆極勢窮方來歸命吾朝豈逋逃之藪邪而卿敢有靦面目也示之以前後檄書乃赦之劉曜子熙等去長安奔于上邽遣季龍討之勒巡行冀州諸郡引見高年孝悌力田文學之士班賜穀帛有差令遠近牧守宣告屬城諸所欲言靡有隱諱使知區區之朝虛渴讜言也季龍克上邽遣主簿趙封送傳國玉璽金璽太子玉璽各一于勒季龍進攻集木且羌于河西克之俘獲數萬秦隴悉平涼州牧張駿大懼遣使稱藩貢方物于勒徙氐羌十五萬落于司冀州勒羣臣議以勒功業既隆祥符並萃宜時革徽號以答乾坤之望於是石季龍等奉皇帝璽綬上尊號于勒勒弗許羣臣固請勒乃以咸和五年僭號趙天王行皇帝事尊其祖邪曰宣王父周曰元王立其妻劉氏為王后世子弘為太子署其子宏為持節散騎常侍都督中外諸軍事驃騎大將軍大單于封秦王左衞將軍斌太原王小子恢為輔國將軍南陽王中山公季龍為太尉守尚書令中山王石生河東王石堪彭城王以季龍子邃為冀州刺史封齊王加散騎常侍武衞將軍宣左將軍挺侍中梁王署左長史郭敖為尚書左僕射右長史程遐為右僕射領吏部尚書左司馬夔安右司馬郭殷從事中郎李鳳前郎中令裴憲為尚書署參軍事徐光為中書令領祕書監論功封爵開國郡公文武二十一人侯二十四人縣公二十六人侯二十二人其餘文武各有差侍中任播等參議以趙承金為水德旗幟尚玄牲牡尚白子社丑臘勒從之勒下書曰自今有疑難大事八坐及委丞郎齎詣東堂詮詳平決其有軍國要務須啟有令僕尚書隨局入陳勿避寒暑昏夜也勒以祖約不忠於本朝誅之及其諸子姪親屬百餘人羣臣固請勒宜即尊號勒乃僭即皇帝位大赦境內改元曰建平自襄國都臨漳追尊其高祖曰順皇曾祖曰威皇祖曰宣皇父曰世宗元皇帝妣曰元昭皇太后文武封進各有差立其妻劉氏為皇后又定昭儀夫人位視上公貴嬪貴人視列侯員各一人三英九華視伯淑媛淑儀視子容華美人視男務簡賢淑不限員數勒荊州監軍郭敬南蠻校尉董幼寇襄陽勒驛敕敬退屯樊城戒之使偃藏旗幟寂若無人彼若使人觀察則告之曰自愛堅守後七八日大騎將至相策不復得走矣敬使人浴馬于津周而復始晝夜不絕偵諜還告南中郎將周撫撫以為勒軍大至懼而奔武昌敬入襄陽軍無私掠百姓安之晉平北將軍魏該弟遐等率該部衆自石城降于敬敬毀襄陽遷其百姓于沔北城樊城以戍之秦州休屠王羌叛于勒刺史臨深遣司馬管光帥州軍討之為羌所敗隴右大擾氐羌悉叛勒遣石生進據隴城王羌兄子擢與羌有仇生乃賂擢與掎擊之羌敗奔涼州徙秦州夷豪五千餘戶于雍州勒下書曰自今諸有處法悉依科令吾所忿戮怒發中旨者若德位已高不宜訓罰或服勤死事之孤邂逅罹譴門下皆各列奏之吾當思擇而行也堂陽人陳豬妻一產三男賜其衣帛廩食乳婢一口復三歲勿事時高句麗肅慎致其楛矢宇文屋孤並獻名馬于勒涼州牧張駿遣長史馬詵奉圖送高昌于窴鄯善大宛使獻其方物晉荊州牧陶侃遣兼長史王敷聘于勒致江南之珍寶奇獸秦州送白獸白鹿荊州送白雉白兔濟陰木連理甘露降苑鄉勒以休瑞並臻遐方慕義赦三歲刑已下均百姓去年逋調特赦涼州殊死涼州計吏皆拜郎中賜絹十匹綿十斤勒南郊有白氣自壇屬天勒大悅還宮赦四歲刑遣使封張駿武威郡公食涼州諸郡勒親耕藉田還宮赦五歲刑賜其公卿已下金帛有差勒以日蝕避正殿三日令羣公卿士各上封事禁州郡諸祠堂非正典者皆除之其能興雲致雨有益於百姓者郡縣更為立祠堂殖嘉樹準嶽瀆已下為差等勒將營鄴宮廷尉續咸上書切諫勒大怒曰不斬此老臣朕宮不得成也敕御史收之中書令徐光進曰陛下天資聰睿超邁唐虞而更不欲聞忠臣之言豈夏癸商辛之君邪其言可用用之不可用故當容之奈何一旦以直言而斬列卿乎勒歎曰為人君不得自專如是豈不識此言之忠乎向戲之爾人家有百匹資尚欲市別宅況有天下之富萬乘之尊乎終當繕之耳且敕停作成吾直臣之氣也因賜咸絹百匹稻百斛又下書令公卿百僚歲薦賢良方正直言秀異至孝廉清各一人答策上第者拜議郎中第中郎下第郎中其舉人得遞相薦引廣招賢之路起明堂辟雍靈臺于襄國城西時大雨霖中山西北暴水流漂巨木百餘萬根集于堂陽勒大悅謂公卿曰諸卿知不此非為災也天意欲吾營鄴都耳於是令少府任汪都水使者張漸等監營鄴宮勒親授規模蜀梓潼建平漢固三郡蠻巴降于勒勒以成周土中漢晉舊京復欲有移都之意乃命洛陽為南都置行臺治書侍御史于洛陽勒因饗高句麗宇文屋孤使酒酣謂徐光曰朕方自古開基何等主也對曰陛下神武籌略邁于高皇雄藝卓犖超絕魏祖自三王已來無可比也其軒轅之亞乎勒笑曰人豈不自知卿言亦以太過朕若逢高皇當北面而事之與韓彭競鞭而爭先耳脫遇光武當並驅于中原未知鹿死誰手大丈夫行事當礌礌落落如日月皎然終不能如曹孟德司馬仲達父子欺他孤兒寡婦狐媚以取天下也朕當在二劉之間耳軒轅豈所擬乎其羣臣皆頓首稱萬歲晉將軍趙胤攻克馬頭石堪遣將軍韓雍救之至則無及遂寇南沙海虞俘獲五千餘人初郭敬之退據樊城也王師復戍襄陽至是敬又攻陷之留戍而歸暴風大雨震電建德殿端門襄國市西門殺五人雹起西河介山大如雞子平地三尺洿下丈餘行人禽獸死者萬數歷太原樂平武鄉趙郡廣平鉅鹿千餘里樹木摧折禾稼蕩然勒正服于東堂以問徐光曰歷代已來有斯災幾也光對曰周漢魏晉皆有之雖天地之常事然明主未始不為變所以敬天之怒也去年禁寒食介推帝鄉之神也歷代所尊或者以為未宜替也一人吁嗟王道尚為之虧況羣神怨憾而不怒動上帝乎縱不能令天下同爾介山左右晉文之所封也宜任百姓奉之勒下書曰寒食既并州之舊風朕生其俗不能異也前者外議以子推諸侯之臣王者不應為忌故從其議儻或由之而致斯災乎子推雖朕鄉之神非法食者亦不得亂也尚書其促檢舊典定議以聞有司奏以子推歷代攸尊請普復寒食更為植嘉樹立祠堂給戶奉祀勒黃門郎韋謏駁曰案春秋藏冰失道陰氣發泄為雹自子推已前雹者復何所致此自陰陽乖錯所為耳且子推賢者曷為暴害如此求之冥趣必不然矣今雖為冰室懼所藏之冰不在固陰沍寒之地多皆山川之側氣泄為雹也以子推忠賢令緜介之間奉之為允於天下則不通矣勒從之於是遷冰室於重陰凝寒之所并州復寒食如初勒令其太子省可尚書奏事使中常侍嚴震參綜可否征伐刑斷大事乃呈之自是震威權之盛過于主相矣季龍之門可設雀羅季龍愈怏怏不悅郭敬南掠江西晉南中郎將桓宣承其虛攻樊城取城中之衆而去敬旋師救樊追戰于涅水敬前軍大敗宣亦死傷太半盡取所掠而止宣遂南取襄陽留軍戍之勒如鄴臨石季龍第謂之曰功力不可並興待宮殿成後當為王起第勿以卑小悒悒也季龍免冠拜謝勒曰與王共有天下何所謝也有流星大如象尾足蛇形自北極西南流五十餘丈光明燭地墜于河聲聞九百餘里黑龍見鄴井中勒觀龍有喜色朝其羣臣于鄴命郡國立學官每郡置博士祭酒二人弟子百五十人三考修成顯升台府於是擢拜太學生五人為佐著作郎錄述時事時大旱勒親臨廷尉錄囚徒五歲刑已下皆輕決遣之重者賜酒食聽沐浴一須秋論還未及宮澍雨大降勒如其灃水宮因疾甚而還召石季龍與其太子弘中常侍嚴震等侍疾禁中季龍矯命絕弘震及內外羣臣親戚勒疾之增損莫有知者詐召石宏石堪還襄國勒疾小瘳見宏驚曰秦王何故來邪使王藩鎮正備今日有呼者邪自來也有呼者誅之季龍大懼曰秦王思慕暫還耳今謹遣之數日復問之季龍曰奉詔即遣今已半路矣更諭宏在外遂不遣之廣阿蝗季龍密遣其子邃率騎三千遊于蝗所熒惑入昴星隕于鄴東北六十里初赤黑黃雲如幕長數十匹交錯聲如雷震墜地氣熱如火塵起連天時有耕者往視之土猶燃沸見有一石方尺餘青色而輕擊之音如磬勒疾甚遣令三日而葬內外百僚既葬除服無禁婚娶祭祀飲酒食肉征鎮牧守不得輒離所司以奔喪斂以時服載以常車無藏金寶無內器玩大雅沖幼恐非能構荷朕志中山已下其各司所典無違朕命大雅與斌宜善相維持司馬氏汝等之殷鑒其務於敦穆也中山王深可三思周霍勿為將來口實以咸和七年死時年六十在位十五年夜瘞山谷莫知其所備文物虛葬號高平陵偽諡明皇帝廟號高祖弘字大雅勒之第二子也幼有孝行以恭謙自守受經於杜嘏誦律於續咸勒曰今世非承平不可專以文業教也於是使劉徵任播授以兵書王陽教之擊刺立為世子領中領軍尋署衞將軍使領開府辟召後鎮鄴勒僭位立為太子虛襟愛士好為文詠其所親昵莫非儒素勒謂徐光曰大雅愔愔殊不似將家子光曰漢祖以馬上取天下孝文以玄默守之聖人之後必世勝殘天之道也勒大悅光因曰皇太子仁孝溫恭中山王雄暴多詐陛下一旦不諱臣恐社稷必危宜漸奪中山威權使太子早參朝政勒納之程遐又言於勒曰中山王勇武權智羣臣莫有及者觀其志也自陛下之外視之蔑如兼荷專征歲久威振外內性又不仁殘忍無賴其諸子並長皆預兵權陛下在自當無他恐其怏怏不可輔少主也宜早除之以便大計勒曰今天下未平兵難未已大雅沖幼宜任強輔中山佐命功臣親同魯衞方委以伊霍之任何至如卿言也卿當恐輔幼主之日不得獨擅帝舅之權故耳吾亦當參卿於顧命勿為過懼也遐泣曰臣所言者至公陛下以私賜距豈明主開襟納說忠臣必盡之義乎中山雖為皇太后所養非陛下天屬不可以親義期也杖陛下神規微建鷹犬之效陛下酬其父子以恩榮亦以足矣魏任司馬懿父子終於鼎祚淪移以此而觀中山豈將來有益者乎臣因緣多幸託瓜葛於東宮臣而不竭言於陛下而誰言之陛下若不除中山臣已見社稷不復血食矣勒不聽遐退告徐光曰主上向言如此太子必危將若之何光曰中山常切齒於吾二人恐非但國危亦為家禍當為安國寧家之計不可坐而受禍也光復承間言於勒曰陛下廓平八州帝有海內而神色不悅者何也勒曰吳蜀未平書軌不一司馬家猶不絕於丹楊恐後之人將以吾為不應符籙每一思之不覺見於神色光曰臣以陛下為憂腹心之患而何暇更憂四支乎何則魏承漢運為正朔帝王劉備雖紹興巴蜀亦不可謂漢不滅也吳雖跨江東豈有虧魏美陛下既苞括二都為中國帝王彼司馬家兒復何異玄德李氏亦猶孫權符籙不在陛下竟欲安歸此四支之輕患耳中山王藉陛下指授神略天下皆言其英武亞於陛下兼其殘暴多姦見利忘義無伊霍之忠父子爵位之重勢傾王室觀其耿耿常有不滿之心近於東宮曲讌有輕皇太子之色陛下隱忍容之臣恐陛下萬年之後宗廟必生荊棘此心腹之重疾也惟陛下圖之勒默然而竟不從及勒死季龍執弘使臨軒命收程遐徐光下廷尉召其子邃率兵入宿衞文武靡不奔散弘大懼讓位于季龍季龍曰君薨而世子立臣安敢亂之弘泣而固讓季龍怒曰若其不堪天下自當有大議何足預論遂以咸和七年逼立之改年曰延熙文武百僚進位一等誅程遐徐光弘策拜季龍為丞相魏王大單于加九錫以魏郡等十三郡為邑總攝百揆季龍偽固讓久而受命赦其境內殊死已下立季龍妻鄭氏為魏王后子邃為魏太子加使持節侍中大都督中外諸軍事大將軍錄尚書事宣為使持節車騎大將軍冀州刺史封河間王韜為前鋒將軍司隸校尉封樂安王遵齊王鑒代王苞樂平王徙太原王斌為章武王勒文武舊臣皆補左右丞相閑任季龍府僚舊昵悉署臺省禁要命太子宮曰崇訓宮勒妻劉氏已下皆徙居之簡其美淑及勒車馬珍寶服御之上者皆入于己署鎮軍夔安領左僕射尚書郭殷為右僕射劉氏謂石堪曰皇祚之滅不復久矣王將何以圖之堪曰先帝舊臣皆已斥外衆旅不復由人宮殿之內無所措籌臣請出奔兗州據廩丘挾南陽王為盟主宣太后詔於諸牧守征鎮令各率義兵同討桀逆蔑不濟也劉氏曰事急矣便可速發恐事淹變生堪許諾微服輕騎襲兗州失期不克遂南奔譙城季龍遣其將郭太等追擊之獲堪于城父送襄國炙而殺之徵石恢還于襄國劉氏謀泄季龍殺之尊弘母程氏為皇太后時石生鎮關中石朗鎮洛陽皆起兵於二鎮季龍留子邃守襄國統步騎七萬攻朗于金墉金墉潰獲朗刖而斬之進師攻長安以石挺為前鋒大都督生遣將軍郭權率鮮卑涉璝部衆二萬為前鋒距之生統大軍繼發次于蒲坂前鋒及挺大戰潼關敗績挺及丞相左長史劉隗皆戰死季龍退奔澠池枕尸三百餘里鮮卑密通于季龍背生而擊之生時停蒲坂不知挺之死也懼單馬奔長安郭權乃復收衆三千與越騎校尉石廣相持于渭汭生遂去長安潛于雞頭山將軍蔣英固守長安季龍聞生之奔也進師入關進攻長安旬餘拔之斬蔣英等分遣諸將屯于汧徙雍秦州華戎十餘萬戶于關東生部下斬生于雞頭山季龍還襄國大赦諷弘命己建魏臺一如魏輔漢故事郭權以生敗據上邽以歸順詔以權為鎮西將軍秦州刺史於是京兆新平扶風馮翊北地皆應之弘鎮西石廣與權戰敗績季龍遣郭敖及其子斌等率步騎四萬討之次于華陰上邽豪族害權以降徙秦州三萬餘戶于青并二州諸郡南氐楊難敵等送任通和長安陳良夫奔于黑羌招誘北羌四角王薄句大等擾北地馮翊與石斌相持石韜等率騎掎句大之後與斌夾擊敗之句大奔于馬蘭山郭敖等懸軍追北為羌所敗死者十七八斌等收軍還于三城季龍聞而大怒遣使殺郭敖石宏有怨言季龍幽之弘齎璽綬親詣季龍諭禪位意季龍曰天下人自當有議何為自論此也弘還宮對其母流涕曰先帝真無復遺矣俄而季龍遣丞相郭殷持節入廢弘為海陽王弘安步就車容色自若謂羣臣曰不堪纂承大統顧慚羣后此亦天命去矣又何言百官莫不流涕宮人慟哭咸康元年幽弘及程氏并宏恢于崇訓宮尋殺之在位二年時年二十二張賓字孟孫趙郡中丘人也父瑤中山太守賓少好學博涉經史不為章句闊達有大節常謂昆弟曰吾自言智算鑒識不後子房但不遇高祖耳為中丘王帳下都督非其好也病免及永嘉大亂石勒為劉元海輔漢將軍與諸將下山東賓謂所親曰吾歷觀諸將多矣獨胡將軍可與共成大事乃提劍軍門大呼請見勒亦未之奇也後漸進規謨乃異之引為謀主機不虛發算無遺策成勒之基業皆賓之勳也及為右長史大執法封濮陽侯任遇優顯寵冠當時而謙虛敬慎開襟下士士無賢愚造之者莫不得盡其情焉肅清百僚屏絕私昵入則格言出則歸美勒甚重之每朝常為之正容貌簡辭令呼曰右侯而不名之勒朝莫與為比也及卒勒親臨哭之哀慟左右贈散騎常侍右光祿大夫儀同三司諡曰景將葬送于正陽門望之流涕顧左右曰天欲不成吾事邪何奪吾右侯之早也程遐代為右長史勒每與遐議有所不合輒歎曰右侯捨我去令我與此輩共事豈非酷乎因流涕彌日
