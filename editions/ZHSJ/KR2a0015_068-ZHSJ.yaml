body:
  text: 晉書卷六十八列傳第三十八顧榮顧榮字彥先吳國吳人也為南土著姓祖雍吳丞相父穆宜都太守榮機神朗悟弱冠仕吳為黃門侍郎太子輔義都尉吳平與陸機兄弟同入洛時人號為三俊例拜為郎中歷尚書郎太子中舍人廷尉正縱酒酣暢謂友人張翰曰惟酒可以忘憂但無如作病何耳會趙王倫誅淮南王允收允僚屬付廷尉皆欲誅之榮平心處當多所全宥及倫篡位倫子虔為大將軍以榮為長史初榮與同僚宴飲見執炙者貌狀不凡有欲炙之色榮割炙啗之坐者問其故榮曰豈有終日執之而不知其味及倫敗榮被執將誅而執炙者為督率遂救之得免齊王冏召為大司馬主簿冏擅權驕恣榮懼及禍終日昏酣不綜府事以情告友人長樂馮熊熊謂冏長史葛旟曰以顧榮為主簿所以甄拔才望委以事機不復計南北親疏欲平海內之心也今府大事殷非酒客之政旟曰榮江南望士且居職日淺不宜輕代易之熊曰可轉為中書侍郎榮不失清顯而府更收實才旟然之白冏以為中書侍郎在職不復飲酒人或問之曰何前醉而後醒邪榮懼罪乃復更飲與州里楊彥明書曰吾為齊王主簿慮禍及見刀與繩每欲自殺但人不知耳及冏誅榮以討葛旟功封嘉興伯轉太子中庶子長沙王為驃騎復以榮為長史敗轉成都王穎丞相從事中郎惠帝幸臨漳以榮兼侍中遣行園陵會張方據洛不得進避之陳留及帝西遷長安徵為散騎常侍以世亂不應遂還吳東海王越聚兵於徐州以榮為軍諮祭酒屬廣陵相陳敏反南渡江逐揚州刺史劉機丹楊內史王曠阻兵據州分置子弟為列郡收禮豪桀有孫氏鼎峙之計假榮右將軍丹楊內史榮數踐危亡之際以恭遜自勉會敏欲誅諸士人榮說之曰中國喪亂胡夷內侮觀太傅今日不能復振華夏百姓無復遺種江南雖有石冰之寇人物尚全榮常憂無竇氏孫劉之策有以存之耳今將軍懷神武之略有孫吳之能功勳效於已著勇略冠於當世帶甲數萬舳艫山積上方雖有數州亦可傳檄而定也若能委信君子各得盡懷散蔕芥之恨塞讒諂之口則大事可圖也敏納其言悉引諸豪族委任之敏仍遣甘卓出橫江堅甲利器盡以委之榮私於卓曰若江東之事可濟當共成之然卿觀事勢當有濟理不敏既常才本無大略政令反覆計無所定然其子弟各已驕矜其敗必矣而吾等安然受其官祿事敗之日使江西諸軍函首送洛題曰逆賊顧榮甘卓之首豈惟一身顛覆辱及萬世可不圖之卓從之明年周玘與榮及甘卓紀瞻潛謀起兵攻敏榮廢橋斂舟於南岸敏率萬餘人出不獲濟榮麾以羽扇其衆潰散事平還吳永嘉初徵拜侍中行至彭城見禍難方作遂輕舟而還語在紀瞻傳元帝鎮江東以榮為軍司加散騎常侍凡所謀畫皆以諮焉榮既南州望士躬處右職朝野甚推敬之時帝所幸鄭貴嬪有疾以祈禱頗廢萬機榮上牋諫曰昔文王父子兄弟乃有三聖可謂窮理者也而文王日昃不暇食周公一沐三握髮何哉誠以一日萬機不可不理一言蹉跌患必及之故也當今衰季之末屬亂離之運而天子流播豺狼塞路公宜露營野次星言夙駕伏軾怒蛙以募勇士懸膽於庭以表辛苦貴嬪未安藥石實急禱祀之事誠復可修豈有便塞參佐白事斷賓客問訊今強賊臨境流言滿國人心萬端去就紛紜願沖虛納下廣延儁彥思畫今日之要塞鬼道淫祀弘九合之勤雪天下之恥則羣生有賴開泰有期矣時南土之士未盡才用榮又言陸士光貞正清貴金玉其質甘季思忠款盡誠膽幹殊快殷慶元質略有明規文武可施用榮族兄公讓明亮守節困不易操會稽楊彥明謝行言皆服膺儒教足為公望賀生沈潛青雲之士陶恭兄弟才幹雖少實事極佳凡此諸人皆南金也書奏皆納之六年卒官帝臨喪盡哀欲表贈榮依齊王功臣格吳郡內史殷祐牋曰昔賊臣陳敏憑寵藉權滔天作亂兄弟姻婭盤固州郡威逼士庶以為臣僕于時賢愚計無所出故散騎常侍安東軍司嘉興伯顧榮經德體道謀猷弘遠忠貞之節在困彌厲崎嶇艱險之中逼迫姦逆之下每惟社稷發憤慷愾密結腹心同謀致討信著羣士名冠東夏德聲所振莫不響應荷戈駿奔其會如林榮躬當矢石為衆率先忠義奮發忘家為國歷年逋寇一朝土崩兵不血刃蕩平六州勳茂上代義彰天下伏聞論功依故大司馬齊王格不在帷幕密謀參議之例下附州征野戰之比不得進爵拓土賜拜子弟遐邇同歎江表失望齊王親則近屬位為方嶽杖節握兵都督近畿外有五國之援內有宗室之助稱兵彌時役連天下元功雖建所喪亦多榮衆無一旅任非藩翰孤絕江外王命不通臨危獨斷以身徇國官無一金之費人無終朝之勞元惡既殄高尚成功封閉倉廩以俟大軍故國安物阜以義成俗今日匡霸事舉未必不由此而隆也方之於齊強弱不同優劣亦異至於齊府參佐扶義助強非創謀之主皆錫珪受瑞或公或侯榮首建密謀為方面盟主功高元帥賞卑下佐上虧經國紀功之班下孤忠義授命之士夫考績幽明王教所崇況若榮者濟難寧國應天先事歷觀古今未有立功若彼酬報如此者也由是贈榮侍中驃騎將軍開府儀同三司諡曰元及帝為晉王追封為公開國食邑榮素好琴及卒家人常置琴於靈座吳郡張翰哭之慟既而上牀鼓琴數曲撫琴而歎曰顧彥先復能賞此不因又慟哭不弔喪主而去子毗嗣官至散騎侍郎紀瞻紀瞻字思遠丹楊秣陵人也祖亮吳尚書令父陟光祿大夫瞻少以方直知名吳平徙家歷陽郡察孝廉不行後舉秀才尚書郎陸機策之曰昔三代明王啟建洪業文質殊制而令名一致然夏人尚忠忠之弊也朴救朴莫若敬殷人革而修焉敬之弊也鬼救鬼莫若文周人矯而變焉文之弊也薄救薄則又反之於忠然則王道之反覆其無一定邪亦所祖之不同而功業各異也自無聖王人散久矣三代之損益百姓之變遷其故可得而聞邪今將反古以救其弊明風以蕩其穢三代之制將何所從太古之化有何異道瞻對曰瞻聞有國有家者皆欲邁化隆政以康庶績垂歌億載永傳于後然而俗變事弊得不隨時雖經聖哲無以易也故忠弊質野敬失多儀周鑒二王之弊崇文以辯等差而流遁者歸薄而無款誠款誠之薄則又反之於忠三代相循如水濟火所謂隨時之義救弊之術也羲皇簡朴無為而化後聖因承所務或異非賢聖之不同世變使之然耳今大晉闡元聖功日隮承天順時九有一貫荒服之君莫不來同然而大道既往人變由久謂當今之政宜去文存朴以反其本則兆庶漸化太和可致也又問在昔哲王象事備物明堂所以崇上帝清廟所以寧祖考辟雍所以班禮教太學所以講藝文此蓋有國之盛典為邦之大司亡秦廢學制度荒闕諸儒之論損益異物漢氏遺作居為異事而蔡邕月令謂之一物將何所從對曰周制明堂所以宗其祖以配上帝敬恭明祀永光孝道也其大數有六古者聖帝明王南面而聽政其六則以明堂為主又其正中皆云太廟以順天時施行法令宗祀養老訓學講肄朝諸侯而選造士備禮辯物一教化之由也故取其宗祀之類則曰清廟取其正室之貌則曰太廟取其室則曰太室取其堂則曰明堂取其四門之學則曰太學取其周水圜如璧則曰璧雍異名同事其實一也是以蔡邕謂之一物又問庶明亮采故時雍穆唐有命既集而多士隆周故書稱明良之歌易貴金蘭之美此長世所以廢興有邦所以崇替夫成功之君勤於求才立名之士急於招世理無世不對而事千載背古之興王何道而如彼後之衰世何闕而如此對曰興隆之政務在得賢清平之化急於拔才故二八登庸則百揆序有亂十人而天下泰武丁擢傅巖之徒周文攜渭濱之士居之上司委之國政故能龍奮天衢垂勳百代先王身下白屋搜揚仄陋使山無扶蘇之才野無伐檀之詠是以化厚物感神祇來應翔鳳飄颻甘露豐墜醴泉吐液朱草自生萬物滋茂日月重光和氣四塞大道以成序君臣之義敦父子之親明夫婦之道別長幼之宜自九州被八荒海外移心重譯入貢頌聲穆穆南面垂拱也今貢賢之塗已闓而教學之務未廣是以進競之志銳而務學之心不修若闢四門以延造士宣五教以明令德考績殿最審其優劣厝之百僚置之羣司使調物度宜節宣國典必協濟康哉符契往代明良來應金蘭復存也又問昔唐虞垂五刑之教周公明四罪之制故世歎清問而時歌緝熙姦宄既殷法物滋有叔世崇三辟之文暴秦加族誅之律淫刑淪胥虐濫已甚漢魏遵承因而弗革亦由險泰不同而救世異術不得已而用之故也寬克之中將何立而可族誅之法足為永制與不對曰二儀分則兆庶生兆庶生則利害作利害之作有由而然也太古之時化道德之教賤勇力而貴仁義仁義貴則強不陵弱衆不暴寡三皇結繩而天下泰非惟象刑緝熙而已也且太古知法所以遠獄及其末不失有罪是以獄用彌繁而人彌暴法令滋章盜賊多有書曰惟敬五刑以成三德叔世道衰既興三辟而文公之弊又加族誅淫刑淪胥感傷和氣化染後代不能變改故漢祖指麾而六合響應魏承漢末因而未革將以俗變由久權時之宜也今四海一統人思反本漸尚簡樸則貪夫不競尊賢黜否則不仁者遠爾則斟參夷之刑除族誅之律品物各順其生緝熙異世而偕也又問曰夫五行迭代陰陽相須二儀所以陶四時所以化生易稱在天成象在地成形形象之作相須之道也若陰陽不調則大數不得不否一氣偏廢則萬物不得獨成此應同之至驗不偏之明證也今有溫泉而無寒火其故何也思聞辯之以釋不同之理對曰蓋聞陰陽升降山澤通氣初九純卦潛龍勿用泉源所託其溫宜也若夫水潤下火炎上剛柔燥溼自然之性故陽動而外陰靜而內內性柔弱以含容為質外動剛直以外接為用是以金水之明內鑒火日之光外輝剛施柔受陽勝陰伏水之受溫含容之性也又問曰夫窮神知化才之盡稱備物致用功之極目以之為政則黃羲之規可踵以之革亂則玄古之風可紹然而唐虞密皇人之闊網夏殷繁帝者之約法機心起而日進淳德往而莫返豈太樸一離理不可振將聖人之道稍有降殺邪對曰政因時以興機隨物而動故聖王究窮通之源審始終之理適時之宜期於濟世皇代質朴禍難不作結繩為信人知所守大道既離智惠擾物夷險不同否泰異數故唐虞密皇人之網夏殷繁帝者之法皆廢興有由輕重以節此窮神之道知化之術隨時之宜非有降殺也永康初州又舉寒素大司馬辟東閤祭酒其年除鄢陵公國相不之官明年左降松滋侯相太安中棄官歸家與顧榮等共誅陳敏語在榮傳召拜尚書郎與榮同赴洛在塗共論易太極榮曰太極者蓋謂混沌之時曚昧未分日月含其輝八卦隱其神天地混其體聖人藏其身然後廓然既變清濁乃陳二儀著象陰陽交泰萬物始萌六合闓拓老子云有物混成先天地生誠易之太極也而王氏云太極天地愚謂未當夫兩儀之謂以體為稱則是天地以氣為名則名陰陽今若謂太極為天地則是天地自生無生天地者也老子又云天地所以能長且久者以其不自生故能長久一生二二生三三生萬物以資始沖氣以為和原元氣之本求天地之根恐宜以此為準也瞻曰昔庖犧畫八卦陰陽之理盡矣文王仲尼係其遺業三聖相承共同一致稱易準天無復其餘也夫天清地平兩儀交泰四時推移日月輝其間自然之數雖經諸聖孰知其始吾子云曚昧未分豈其然乎聖人人也安得混沌之初能藏其身於未分之內老氏先天之言此蓋虛誕之說非易者之意也亦謂吾子神通體解所不應疑意者直謂太極極盡之稱言其理極無復外形外形既極而生兩儀王氏指向可謂近之古人舉至極以為驗謂二儀生於此非復謂有父母若必有父母非天地其孰在榮遂止至徐州聞亂日甚將不行會刺史裴盾得東海王越書若榮等顧望以軍禮發遣乃與榮及陸玩等各解船棄車牛一日一夜行三百里得還揚州元帝為安東將軍引為軍諮祭酒轉鎮東長史帝親幸瞻宅與之同乘而歸以討周馥華軼功封都鄉侯石勒入寇加揚威將軍都督京口以南至蕪湖諸軍事以距勒勒退除會稽內史時有詐作大將軍府符收諸暨令令已受拘瞻覺其詐便破檻出之訊問使者果伏詐妄尋遷丞相軍諮祭酒論討陳敏功封臨湘縣侯西臺除侍中不就及長安不守與王導俱入勸進帝不許瞻曰陛下性與天道猶復役機神於史籍觀古人之成敗今世事舉目可知不為難見二帝失御宗廟虛廢神器去晉于今二載梓宮未殯人神失御陛下膺籙受圖特天所授使六合革面遐荒來庭宗廟既建神主復安億兆向風殊俗畢至若列宿之綰北極百川之歸巨海而猶欲守匹夫之謙非所以闡七廟隆中興也但國賊宜誅當以此屈己謝天下耳而欲逆天時違人事失地利三者一去雖復傾匡於將來豈得救祖宗之危急哉適時之宜萬端其可綱維大業者惟理與當晉祚屯否理盡於今促之則得可以隆中興之祚縱之則失所以資姦寇之權此所謂理也陛下身當厄運纂承帝緒顧望宗室誰復與讓當承大位此所謂當也四祖廓開宇宙大業如此今五都燔爇宗廟無主劉載竊弄神器於西北陛下方欲高讓於東南此所謂揖讓而救火也臣等區區尚所不許況大人與天地合德日月並明而可以失機後時哉帝猶不許使殿中將軍韓績徹去御坐瞻叱績曰帝坐上應星宿敢有動者斬帝為之改容及帝踐位拜侍中轉尚書上疏諫諍多所匡益帝甚嘉其忠烈會久疾不堪朝請上疏曰臣疾疢不痊曠廢轉久比陳誠款未見哀察重以尸素抱罪枕席憂責之重不知垂沒之餘當所投厝臣聞易失者時不再者年故古之志士義人負鼎趣走商歌於市誠欲及時效其忠規名傳不朽也然失之者億萬得之者一兩耳常人之情貪求榮利臣以凡庸邂逅遭遇勞無負鼎口不商歌橫逢大運頻煩饕竊雖思慕古人自效之志竟無豪氂報塞之效而犬馬齒衰衆疾廢頓僵臥救命百有餘日叩棺曳衾日頓一日如復天假之年蒙陛下行葦之惠適可薄存性命枕息陋巷亦無由復廁八坐升降臺閣也臣目冥齒墮胸腹冰冷創既不差足復偏跛為病受困既以荼毒七十之年禮典所遺衰老之徵皎然露見臣雖欲勤自藏護隱伏何地臣之職掌戶口租稅國之所重方今六合波盪人未安居始被大化百度草創發卒轉運皆須人力以臣平強兼以晨夜尚不及事今俟命漏刻而當久停機職使王事有廢若朝廷以之廣恩則憂責日重以之序官則官廢事弊須臣差則臣日月衰退今以天慈使官曠事滯臣受偏私之宥於大望亦有虧損今萬國革面賢俊比跡而當虛停好爵不以縻賢以臣穢病之餘妨官固職誠非古今黜進之急惟陛下割不已之仁賜以敝帷隕仆之日得以藉尸時銓俊使官修事舉臣免罪戮死生厚幸因以疾免尋除尚書右僕射屢辭不聽遂稱病篤還第不許時郗鑒據鄒山屢為石勒等所侵逼瞻以鑒有將相之材恐朝廷棄而不恤上疏請徵之曰臣聞皇代之興必有爪牙之佐扞城之用帝王之利器也故虞舜舉十六相而南面垂拱伏見前輔國將軍郗鑒少立高操體清望峻文武之略時之良幹昔與戴若思同辟推放荒地所在孤特衆無一旅救援不至然能綏集殘餘據險歷載遂使凶寇不敢南侵但士衆單寡無以立功既統名州又為常伯若使鑒從容臺闥出內王命必能盡抗直之規補袞職之闕自先朝以來諸所授用已有成比戴若思以尚書為六州都督征西將軍復加常侍劉隗鎮北陳眕鎮東以鑒年時則與若思同以資則俱八坐況鑒雅望清重一代名器聖朝以至公臨天下惟平是與是以臣寢頓陋巷思盡聞見惟開聖懷垂問臣導冀有豪氂萬分之一明帝嘗獨引瞻於廣室慨然憂天下曰社稷之臣欲無復十人如何因屈指曰君便其一瞻辭讓帝曰方欲與君善語復云何崇謙讓邪瞻才兼文武朝廷稱其忠亮雅正俄轉領軍將軍當時服其嚴毅雖疾病六軍敬憚之瞻以久病請去官不聽復加散騎常侍及王敦之逆帝使謂瞻曰卿雖病但為朕臥護六軍所益多矣乃賜布千匹瞻不以歸家分賞將士賊平復自表還家帝不許固辭不起詔曰瞻忠亮雅正識局經濟屢以年耆病久逡巡告誠朕深明此操重違高志今聽所執其以為驃騎將軍常侍如故服物制度一按舊典遣使就拜止家為府尋卒時年七十二冊贈本官開府儀同三司諡曰穆遣御史持節監護喪事論討王含功追封華容子降先爵二等封次子一人亭侯瞻性靜默少交遊好讀書或手自抄寫凡所著述詩賦牋表數十篇兼解音樂殆盡其妙厚自奉養立宅於烏衣巷館宇崇麗園池竹木有足賞翫焉慎行愛士老而彌篤尚書閔鴻太常薛兼廣川太守河南褚沈給事中宣城章遼歷陽太守沛國武嘏並與瞻素疏咸藉其高義臨終託後於瞻瞻悉營護其家為起居宅同於骨肉焉少與陸機兄弟親善及機被誅贍卹其家周至及嫁機女資送同於所生長子景早卒景子友嗣官至廷尉景弟鑒太子庶子大將軍從事中郎先瞻卒賀循楊方賀循字彥先會稽山陰人也其先慶普漢世傳禮世所謂慶氏學族高祖純博學有重名漢安帝時為侍中避安帝父諱改為賀氏曾祖齊仕吳為名將祖景滅賊校尉父邵中書令為孫晧所殺徙家屬邊郡循少嬰家難流放海隅吳平乃還本郡操尚高厲童齔不羣言行進止必以禮讓國相丁請為五官掾刺史嵇喜舉秀才除陽羨令以寬惠為本不求課最後為武康令俗多厚葬及有拘忌迴避歲月停喪不葬者循皆禁焉政教大行鄰城宗之然無援於朝久不進序著作郎陸機上疏薦循曰伏見武康令賀循德量邃茂才鑒清遠服膺道素風操凝峻歷試二城刑政肅穆前蒸陽令郭訥風度簡曠器識朗拔通濟敏悟才足幹事循守下縣編名凡悴訥歸家巷棲遲有年皆出自新邦朝無知己居在遐外志不自營年時倏忽而邈無階緒實州黨愚智所為恨恨臣等伏思臺郎所以使州州有人非徒以均分顯路惠及外州而已誠以庶士殊風四方異俗壅隔之害遠國益甚至于荊揚二州戶各數十萬今揚州無郎而荊州江南乃無一人為京城職者誠非聖朝待四方之本心至於才望資品循可尚書郎訥可太子洗馬舍人此乃衆望所積非但企及清塗苟充方選也謹條資品乞蒙簡察久之召補太子舍人趙王倫篡位轉侍御史辭疾去職後除南中郎長史不就會逆賊李辰起兵江夏征鎮不能討皆望塵奔走辰別帥石冰略有揚州逐會稽相張景以前寧遠護軍程超代之以其長史宰與領山陰令前南平內史王矩吳興內史顧祕前秀才周玘等唱義傳檄州郡以討之循亦合衆應之冰大將抗寵有衆數千屯郡講堂循移檄於寵為陳逆順寵遂遁走超與皆降一郡悉平循迎景還郡即謝遣兵士杜門不出論功報賞一無豫焉及陳敏之亂詐稱詔書以循為丹楊內史循辭以腳疾手不制筆又服寒食散露髮袒身示不可用敏竟不敢逼是時州內豪傑皆見維縶或有老疾就加秩命惟循與吳郡朱誕不豫其事及敏破征東將軍周馥上循領會稽相尋除吳國內史公車徵賢良皆不就元帝為安東將軍復上循為吳國內史與循言及吳時事因問曰孫晧嘗燒鋸截一賀頭是誰邪循未及言帝悟曰是賀邵也循流涕曰先父遭遇無道循創巨痛深無以上答帝甚愧之三日不出東海王越命為參軍徵拜博士並不起及帝遷鎮東大將軍以軍司顧榮卒引循代之循稱疾篤牋疏十餘上帝遺之書曰夫百行不同故出處道殊因性而用各任其真耳當宇宙清泰彝倫攸序隨運所遇動默在己或有遐棲高蹈輕舉絕俗逍遙養和恬神自足斯蓋道隆人逸勢使其然若乃時運屯弊主危國急義士救時驅馳拯世燭之武乘縋以入秦園綺彈冠而匡漢豈非大雅君子卷舒合道乎虛薄寡德忝備近親謬荷寵位受任方鎮餐服玄風景羨高矩常願棄結駟之軒軌策柴篳而造門徒有其懷而無從賢之實者何良以寇逆殷擾諸夏分崩皇居失御黎元荼毒是以日夜憂懷慷慨發憤志在竭節耳前者顧公臨朝深賴高算元凱既登巢許獲逸至於今日所謂道之云亡邦國殄悴羣望顒顒實在君侯苟義之所在豈得讓勞居逸想達者亦一以貫之也庶稟徽猷以弘遠規今上尚書屈德為軍司謹遣參軍沈禎銜命奉授望必屈臨以副傾遲循猶不起及帝承制復以為軍諮祭酒循稱疾敦逼不得已乃轝疾至帝親幸其舟因諮以政道循羸疾不堪拜謁乃就加朝服賜第一區車馬牀帳衣褥等物循辭讓一無所受廷尉張闓住在小市將奪左右近宅以廣其居乃私作都門早閉晏開人多患之訟於州府皆不見省會循出至破岡連名詣循質之循曰見張廷尉當為言及之闓聞而遽毀其門詣循致謝其為世所敬服如此時江東草創盜賊多有帝思所以防之以問於循循答曰江道萬里通涉五州朝貢商旅之所來往也今議者欲出宣城以鎮江渚或欲使諸縣領兵愚謂令長威弱而兼才難備發憚役之人而御之不肅恐未必為用以循所聞江中劇地惟有闔廬一處地勢險奧亡逃所聚特宜以重兵備戍隨勢討除絕其根蔕沿江諸縣各有分界分界之內官長所任自可度土分力多置亭候使徼行峻其綱目嚴其刑賞使越常科勤則有殊榮之報墮則有一身之罪謂於大理不得不肅所給人以時番休役不至困代易有期案漢制十里一亭亦以防禁切密故也當今縱不能爾要宜籌量使力足相周若寇劫強多不能獨制者可指其蹤跡言所在都督尋當致討今不明部分使所在百姓與軍家雜其徼備兩情俱墮莫適任負故所以徒有備名而不能為益者也帝從之及愍帝即位徵為宗正元帝在鎮又表為侍中道險不行以討華軼功將封鄉侯循自以臥疾私門固讓不受建武初為中書令加散騎常侍又以老疾固辭帝下令曰孤以寡德忝當大位若涉巨川罔知所憑循言行以禮乃時之望俗之表也實賴其謀猷以康萬機疾患有素猶望臥相規輔而固守撝謙自陳懇至此賢履信思順苟以讓為高者也今從其所執於是改拜太常常侍如故循以九卿舊不加官今又疾患不宜兼處此職惟拜太常而已時宗廟始建舊儀多闕或以惠懷二帝應各為世則潁川世數過七宜在迭毀事下太常循議以為禮兄弟不相為後不得以承代為世殷之盤庚不序陽甲漢之光武不繼成帝別立廟寢使臣下祭之此前代之明典而承繼之著義也惠帝無後懷帝承統弟不後兄則懷帝自上繼世祖不繼惠帝當同殷之陽甲漢之成帝議者以聖德沖遠未便改舊諸如此禮通所未論是以惠帝尚在太廟而懷帝復入數則盈八盈八之理由惠帝不出非上祖宜遷也下世既升上世乃遷遷毀對代不得相通未有下升一世而上毀二世者也惠懷二帝俱繼世祖兄弟旁親同為一世而上毀二為一世今以惠帝之崩已毀豫章懷帝之入復毀潁川如此則一世再遷祖位橫折求之古義未見此例惠帝宜出尚未輕論況可輕毀一祖而無義例乎潁川既無可毀之理則見神之數居然自八此盡有由而然非謂數之常也既有八神則不得不於七室之外權安一位也至尊於惠懷俱是兄弟自上後世祖不繼二帝則二帝之神行應別出不為廟中有八室也又武帝初成太廟時正神止七而楊元后之神亦權立一室永熙元年告世祖諡於太廟八室此是苟有八神不拘於七之舊例也又議者以景帝俱已在廟則惠懷一例景帝盛德元功王基之本義著祖宗百世不毀故所以特在本廟且亦世代尚近數得相容安神而已無逼上祖如王氏昭穆既滿終應別廟也以今方之既輕重義異又七廟七世之親昭穆父子位也若當兄弟旁滿輒毀上祖則祖位空懸世數不足何取於三昭三穆與太祖之廟然後成七哉今七廟之義出於王氏從禰以上至於高祖親廟四世高祖以上復有五世六世無服之祖故為三昭三穆并太祖而七也故世祖郊定廟禮京兆潁川曾高之親豫章五世征西六世以應此義今至尊繼統亦宜有五六世之祖豫章六世潁川五世俱不應毀今既云豫章先毀又當重毀潁川此為廟中之親惟從高祖已下無復高祖以上二世之祖於王氏之義三昭三穆廢闕其二甚非宗廟之本所據承又違世祖祭征西豫章之意於一王定禮所闕不少時尚書僕射刁協與循異議循答義深備辭多不載竟從循議焉朝廷疑滯皆諮之於循循輒依經禮而對為當世儒宗其後帝以循清貧下令曰循冰清玉潔行為俗表位處上卿而居身服物蓋周形而已屋室財庇風雨孤近造其廬以為慨然其賜六尺牀薦席褥并錢二十萬以表至德暢孤意焉循又讓不許不得已留之初不服用及帝踐位有司奏琅邪恭王宜稱皇考循又議曰案禮子不敢以己爵加父帝納之俄以循行太子太傅太常如故循自以枕疾廢頓臣節不修上隆降尊之義下替交之敬懼非垂典之教也累表固讓帝以循體德率物有不言之益敦厲備至期於不許命皇太子親往拜焉循有羸疾而恭於接對詔斷賓客其崇遇如此疾漸焉表乞骸骨上還印綬改授左光祿大夫開府儀同三司帝臨軒遣使持節加印綬循雖口不能言指麾左右推去章服車駕親幸執手流涕太子親臨者三焉往還皆拜儒者以為榮太興二年卒時年六十帝素服舉哀哭之甚慟贈司空諡曰穆將葬帝又出臨其柩哭之盡哀遣兼侍御史持節監護皇太子追送近塗望船流涕循少玩篇籍善屬文博覽衆書尤精禮傳雅有知人之鑒拔同郡楊方於卑陋卒成名於世子隰康帝時官至臨海太守楊方字公回少好學有異才初為郡鈴下威儀公事之暇輒讀五經鄉邑未之知內史諸葛恢見而奇之待以門人之禮由是始得周旋貴人間時虞喜兄弟以儒學立名雅愛方為之延譽恢嘗遣方為文薦郡功曹主簿虞預稱美之送以示循循報書曰此子開拔有志意只言異於凡猥耳不圖偉才如此其文甚有奇分若出其胸臆乃是一國所推豈但牧豎中逸羣邪聞處舊黨之中好有謙沖之行此亦立身之一隅然世衰道喪人物凋弊每聞一介之徒有向道之志冀之願之如方者乃荒萊之特苗鹵田之善秀姿質已良但沾染未足耳移植豐壤必成嘉穀足下才為世英位為朝右道隆化立然後為貴昔許子將拔樊仲昭於賈豎郭林宗成魏德公於畎畝足下志隆此業二賢之功不為難及也循遂稱方於京師司徒王導辟為掾轉東安太守遷司徒參軍事方在都邑搢紳之士咸厚遇之自以地寒不願久留京華求補遠郡欲閑居著述導從之上補高梁太守在郡積年著五經鉤枕更撰吳越春秋并雜文筆皆行於世以年老棄郡歸導將進之臺閣固辭還鄉里終于家薛兼薛兼字令長丹楊人也祖綜仕吳為尚書僕射父瑩有名吳朝吳平為散騎常侍兼清素有器宇少與同郡紀瞻廣陵閔鴻吳郡顧榮會稽賀循齊名號為五儁初入洛司空張華見而奇之曰皆南金也察河南孝廉辟公府除比陽相莅任有能名歷太子洗馬散騎常侍懷令司空東海王越引為參軍轉祭酒賜爵安陽亭侯元帝為安東將軍以為軍諮祭酒稍遷丞相長史甚勤王事以上佐祿優每自約損取周而已進爵安陽鄉侯拜丹楊太守中興建轉尹加秩中二千石遷尚書領太子少傅自綜至兼三世傅東宮談者美之永昌初王敦表兼為太常明帝即位加散騎常侍帝以東宮時師傅猶宜盡敬乃下詔曰朕以不德夙遭閔凶猥以眇身託于王公之上哀在疚靡所諮仰憂懷惴惴如臨于谷孔子有云故雖天子必有尊也朕將祗奉先師之禮以諮有德太宰西陽王秩尊望重在貴思降丞相武昌公司空即丘子體道高邈勳德兼備先帝執友朕之師傅太常安陽鄉侯訓保朕躬忠肅篤誠夫崇親尊賢先帝所重朕見四君及書疏儀體一如東宮故事是歲卒詔曰太常安陽鄉侯兼履德沖素盡忠恪己方賴德訓弘濟政道不幸殂殞痛于厥心今遣持節侍御史贈左光祿大夫開府儀同三司魂而有靈嘉茲榮寵及葬屬王敦作逆朝廷多故不得議諡直遣使者祭以太牢子顒先兼卒無後史臣曰元帝樹基淮海百度權輿夢想羣材共康庶績顧紀賀薛等並南金東箭世冑高門委質霸朝豫聞邦政典憲資其刊輯帷幄佇其謀猷望重搢紳任惟元凱官成名立光國榮家非惟感會所鍾抑亦材能斯至而循位登保傅朝望特隆遂使鑾蹕降臨承明下拜雖西漢之恩崇張禹東都之禮重桓榮弗是過也贊曰彥先通識思遠方直薛既清貞賀惟學植逢時遇主摶風矯翼
