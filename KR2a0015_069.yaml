body:
  text: 晉書卷六十九列傳第三十九劉隗孫波劉隗字大連彭城人楚元王交之後也父砥東光令隗少有文翰起家祕書郎稍遷冠軍將軍彭城內史避亂渡江元帝以為從事中郎隗雅習文史善求人主意帝深器遇之遷丞相司直委以刑憲時建康尉收護軍士而為府將篡取之隗奏免護軍將軍戴若思官世子文學王籍之居叔母喪而婚隗奏之帝下令曰詩稱殺禮多婚以會男女之無夫家正今日之謂也可一解禁止自今以後宜為其防東閣祭酒顏含在叔父喪嫁女隗又奏之廬江太守梁龕明日當除婦服今日請客奏伎丞相長史周顗等三十餘人同會隗奏曰夫嫡妻長子皆杖居廬故周景王有三年之喪既除而宴春秋猶譏況龕匹夫暮宴朝祥慢服之愆宜肅喪紀之禮請免龕官削侯爵顗等知龕有喪吉會非禮宜各奪俸一月以肅其違從之丞相行參軍宋挺本揚州刺史劉陶門人陶亡後挺娶陶愛妾以為小妻建興中挺又割盜官布六百餘匹正刑棄市遇赦免既而奮武將軍阮抗請為長史隗劾奏曰挺蔑其死主而專其室悖在三之義傷人倫之序當投之四裔以禦魑魅請除挺名禁錮終身而奮武將軍太山太守阮抗請為長史抗緯文經武剖符東藩當庸勳忠良昵近仁賢而褒求贓污舉頑用嚚請免抗官下獄理罪奏可而挺病死隗又奏符旨挺已喪亡不復追貶愚蠢意暗未達斯義昔鄭人斫子家之棺漢明追討史遷經傳褒貶皆追書先世數百年間非徒區區欲釐當時亦將作法垂於來世當朝亡夕沒便無善惡也請曹如前追除挺名為民録妾還本顯證惡人班下遠近從之南中郎將王含以族強顯貴驕傲自恣一請參佐及守長二十許人多取非其才隗劾奏文致甚苦事雖被寢王氏深忌疾之而隗之彈奏不畏強禦皆此類也建興中丞相府斬督運令史淳于伯而血逆流隗又奏曰古之為獄必察五聽三槐九棘以求民情雖明庶政不敢折獄死者不得復生刑者不可復續是以明王哀矜用刑曹參去齊以市獄為寄自頃蒸荒殺戮無度罪同斷異刑罰失宜謹按行督運令史淳于伯刑血著柱遂逆上終極柱末二丈三尺旋復下流四尺五寸百姓喧譁士女縱觀咸曰其𥦙伯息忠訴辭稱枉云伯督運訖去二月事畢代還無有稽乏受賕使役罪不及死軍是戍軍非為征軍以乏軍興論於理為枉四年之中供給運漕凡諸徵發租調百役皆有稽停而不以軍興論至於伯也何獨明之捶楚之下無求不得囚人畏痛飾辭應之理曹國之典刑而使忠等稱寃明時謹按從事中郎周莚法曹參軍劉胤屬李匡幸荷殊寵並登列曹當思敦奉政道詳法慎殺使兆庶無枉人不稱訴而令伯枉同周青寃魂哭於幽都訴靈恨於黃泉嗟嘆甚於嵵梁血妖過於崩城故有隕霜之人夜哭之鬼伯有晝見彭生為豕刑殺失中妖眚並見以古況今其揆一也皆由莚等不勝其任請皆免官於是右將軍王導等上疏引咎請解職帝曰政刑失中皆吾暗塞所由尋示愧懼思聞忠告以補其闕而引過求退豈所望也由是導等一無所問晉國既建拜御史中丞周嵩嫁女門生斷道解廬斫傷二人建康左尉赴變又被斫隗劾嵩兄顗曰顗幸荷殊寵列位上僚當崇明憲典協和上下刑于左右以御于家邦而乃縱肆小人羣為凶害公于廣都之中白日刃尉遠近訩嚇百姓喧譁虧損風望漸不可長既無大臣檢御之節不可對揚休命宜加貶黜以肅其違顗坐免官太興初長兼侍中賜爵都鄉侯尋代薛兼為丹楊尹與尚書令刁協並為元帝所寵欲排抑豪強諸刻碎之政皆云隗協所建隗雖在外萬機祕密皆豫聞之拜鎮北將軍都督青徐幽平四州軍事假節加散騎常侍率萬人鎮泗口初隗以王敦威權太盛終不可制勸帝出腹心以鎮方隅故以譙王承為湘州續用隗及戴若思為都督敦甚惡之與隗書曰頃承聖上顧眄足下今大賊未滅中原鼎沸欲與足下周生之徒勠力王室共靜海內若其泰也則帝祚於是乎隆若其否也則天下永無望矣隗答曰魚相忘於江湖人相忘於道術竭股肱之力效之以忠貞吾之志也敦得書甚怒及敦作亂以討隗為名詔徵隗還京師百官迎之於道隗岸幘大言意氣自若及入見與刁協奏請誅王氏不從有懼色率衆屯金城及敦克石頭隗攻之不拔入宮告辭帝雪涕與之別隗至淮陰為劉遐所襲攜妻子及親信二百餘人奔于石勒勒以為從事中郎太子太傅卒年六十一子綏初舉秀才除駙馬都尉奉朝請隨隗奔勒卒孫波嗣波字道則初為石季龍冠軍將軍王洽參軍及季龍死洽與波俱降穆帝以波為襄城太守纍遷桓沖中軍咨議參軍大司馬桓溫西征袁真朝廷空虛以波為建威將軍淮南內史領五千人鎮石頭壽陽平除尚書左丞不拜轉冠軍將軍南郡相時苻堅弟融圍雍州刺史朱序於襄陽波率衆八千救之以敵強不敢進序竟陷沒波以畏懦免官後復以波為冠軍將軍纍遷散騎常侍苻堅敗朝廷欲鎮靖北方出波督淮北諸軍冀州刺史以疾未行上疏曰臣聞天地以弘濟為仁君道以惠下為德是以禹湯有身勤之績唐虞有在豫之誥用能惠被蒼生勳流後葉宣帝開拓洪圖始基成命爰及文武曆數在躬而猶虛心側席卑己崇物然後知積纍之功重勤王之業艱先君之德弘貽厥之賜厚惠皇不懷委政內任遂使神器幽淪三光翳曜園陵懷九泉之感宮廟集胡馬之迹所謂肉食失之於朝黎庶暴骸於外也賴元皇帝神武應期祚隆淮海振乾綱於已墜紐絶維而更張陛下承宣帝開始之宏基受元帝克終之成烈保大定功戢兵靜亂故使負鱗橫海之鯨僭位滔天之寇望雲旗而宵潰覩太陽而霧散巍巍蕩蕩人無名焉而頃年已來天文違錯妖怪屢生會稽先帝本封而地動經年昔周之文武有魚烏之瑞君臣猶懷震悚況今災變衆集曾莫之疑公旦有勿休之誡賈誼有積薪之喻臣鑒先徵竊惟今事是以敢肆狂瞽直言無諱往者先帝以玄風御世責成羣后坐運天綱隨化委順故忘日計之功收歲成之用今禮樂征伐自天子出相王賢俊協和百揆六合承風天下響振而鈞臺之詠弗聞景亳之命未布將羣臣之不稱陛下用之不盡乎凡聖王之化莫不敦崇忠信存正棄邪傷化毀俗者雖親雖貴必疏而遠之清公貞修者雖微雖賤必親而近之今則不然此風既替利競滋甚朋黨比周毀譽交興鑽求苟進人希分外見賢而居其上受祿每過其量希旨承意者以為奉公共相讚白者以為忠節舉世見之誰敢正言陛下不明必行之法以絶穿鑿之源者恐脫因疲倦以誤視聽且苻堅滅亡於今五年舊京殘毀山陵無衛百姓塗炭未蒙拯接伏願遠觀漢魏衰滅之由近覽西朝傾覆之際超然易慮為於未有則靈根永固社稷無虞臣豈誣一朝之人皆無忠節但任非其才求之不至耳今政煩役殷所在凋弊倉廩空虛國用傾竭下民侵削流亡相屬略計戶口但咸安已來十分去三百姓懷浮遊之歎下泉興周京之思昔漢宣有云與我共治天下者其惟良二千石乎是以臨下有方者就加璽贈法苛政亂者恤刑不赦事簡於上人悅於下今則不然告時乞職者以家弊為辭振窮恤滯者以公爵為施古者為百姓立君使之司牧今者以百姓恤君使之蠶食至乃貪汙者謂之清勤慎法者謂之怯劣何反古道一至於此陛下雖躬自節儉哀矜於上而羣僚肆欲縱心於下六司垂翼三事拱默故有識者覩人事以歎息觀妖眚而大懼昔宋景退熒惑之災殷宗消鼎雉之異伏願陛下仰觀大禹過門之志俯察商辛沈湎之失遠思國風恭公之刺深惟定薑小臣之喻暫回聖恩大詢羣后延納衆賢訪以得失令百僚率職人言損益察其所由觀其所以審識羣才助鼎和味克念作聖以答天休則四海宅心天下幸甚臣亡祖先臣隗昔荷殊寵匪躬之操猶存舊史有志無時懷恨黃泉及臣凡劣復蒙罔極之眷恩隆纍世實非糜身傾宗所能上報前作此表未及得通暴嬰篤疾恐命在奄忽貪及視息望達愚情氣力惙然不能自宣疏奏而卒追贈前將軍子淡嗣元熙初為廬江太守隗伯父訥字令言有人倫鑒識初入洛見諸名士而歎曰王夷甫太鮮明樂彥輔我所敬張茂先我所不解周弘武巧於用短杜方叔拙於用長終於司隸校尉子疇字王喬少有美譽善談名理曾避亂塢壁賈胡百數欲害之疇無懼色援笳而吹之為出塞入塞之聲以動其遊客之思於是羣胡皆垂泣而去之永嘉中位至司徒左長史尋為閻鼎所殺司空蔡謨每歎曰若使劉王喬得南渡司徒公之美選也又王導初拜司徒謂人曰劉王喬若過江我不獨拜公也其為名流之所推服如此疇兄子劭有才幹辟琅邪王丞相掾咸康世歷御史中丞侍中尚書豫章太守秩中二千石劭族子黃老太元中為尚書郎有義學注慎子老子並傳於世刁協子彝彝子逵刁協字玄亮渤海饒安人也祖恭魏齊郡太守父攸武帝時御史中丞協少好經籍博聞強記釋褐濮陽王文學纍轉太常博士本郡大中正成都王穎請為平北司馬後歷趙王倫相國參軍長沙王驃騎司馬及東嬴公騰鎮臨漳以協為長史轉潁川太守永嘉初為河南尹未拜避難渡江元帝以為鎮東軍咨祭酒轉長史愍帝即位徵為御史中丞例不行元帝為丞相以協為左長史中興建拜尚書左僕射于時朝廷草創憲章未立朝臣無習舊儀者協久在中朝諳練舊事凡所制度皆稟於協焉深為當時所稱許太興初遷尚書令在職數年加金紫光祿大夫令如故協性剛悍與物多忤每崇上抑下故為王氏所疾又使酒放肆侵毀公卿見者莫不側目然悉力盡心志在匡救帝甚信任之以奴為兵取將吏客使轉運皆協所建也衆庶怨望之及王敦構逆上疏罪協帝使協出督六軍既而王師敗績協與劉隗俱侍帝於太極東除帝執協隗手流涕嗚咽勸令避禍協曰臣當守死不敢有二帝曰今事逼矣安可不行乃令給協隗人馬使自為計協年老不堪騎乘素無恩紀募從者皆委之行至江乘為人所殺送首於敦敦聽刁氏收葬之帝痛協不免密捕送協首者而誅之敦平後周顗戴若思等皆被顯贈惟協以出奔不在其例咸康中協子彝上疏訟之在位者多以明帝之世褒貶已定非所得更議且協不能抗節隕身乃出奔遇害不可復其官爵也丹楊尹殷融議曰王敦惡逆罪不容誅則協之善亦不容賞若以忠非良圖謀事失算以此為責者蓋在於譏議之間耳即凶殘之誅以為國刑將何以沮勸乎當敦專逼之時慶賞威刑專自己出是以元帝慮深崇本以協為比事由國計蓋不為私昔孔寧儀行父從君於昏楚復其位者君之黨故也況協之比君在於義順且中興四佐位為朝首于時事窮計屈奉命違寇非為逃刑謂宜顯贈以明忠義時庾冰輔政疑不能決左光祿大夫蔡謨與冰書曰夫爵人者宜顯其功罰人者宜彰其罪此古今之所慎也凡小之人猶尚如此刁令中興上佐有死難之名天下不聞其罪而見其貶致令刁氏稱寃此乃為王敦復讎也內沮忠臣之節論者惑之若實有大罪宜顯其事令天下知之明聖朝不貶死難之臣春秋之義以功補過過輕功重者得以加封功輕過重者不免誅絶功足贖罪者無黜雖先有邪佞之罪而臨難之日黨於其君者不絶之也孔寧儀行父親與靈公淫亂於朝君殺國滅由此二臣而楚尚納之傳稱有禮不絶其位者君之黨也若刁令有罪重于孔儀絶之可也若無此罪宜見追論或謂明帝之世已見寢廢今不宜復改吾又以為不然夫大道宰世殊塗一致萬機之事或異或同同不相善異不相譏故堯抑元凱而舜舉之堯不為失舜不為非何必前世所廢便不宜改乎漢蕭何之後坐法失侯文帝不封而景帝封之後復失侯武昭二帝不封而宣帝封之近去元年車駕釋奠拜孔子之坐此亦元明二帝所不行也又刁令但是明帝所不贈耳非誅之也王平子第五猗皆元帝所誅而今日所贈豈以改前為嫌乎凡處事者當上合古義下準今例然後談者不惑受罪者無怨耳案周僕射戴征西本非王敦唱檄所讎也事定後乃見害耳周莚郭璞等並亦非為主禦難也自平居見殺耳皆見褒贈刁令事義豈輕於此乎自頃員外散騎尚得追贈況刁令位亞三司若先自壽終不失員外散騎之例也就不蒙贈不失以本官殯葬也此為一人之身壽終則蒙贈死難則見絶豈所以明事君之道厲為臣之節乎宜顯評其事以解天下疑惑之論又聞談者亦多謂宜贈凡事不允當而得衆助者若以善柔得衆而刁令粗剛多怨若以貴也刁氏今賤若以富也刁氏今貧人士何故反助寒門而此言之足下宜察此意冰然之事奏成帝詔曰協情在忠主而失為臣之道故令王敦得託名公義而實肆私忌遂令社稷受屈元皇銜恥致禍之原豈不有由若極明國典則曩刑非重今正當以協之勤有可書敦之逆命不可長故議其事耳今可復協本位加之册祭以明有忠於君者纖介必顯雖於貶裁未盡然或足有勸矣於是追贈本官祭以太牢彝字大倫少遭家難王敦誅後彝斬讎人黨以首祭父墓詣廷尉請罪朝廷特宥之由是知名歷尚書吏部郎吳國內史纍遷北中郎將徐兗二州刺史假節鎮廣陵卒於官子逵字伯道逵弟暢字仲遠次子弘字叔仁並歷顯職隆安中逵為廣州刺史領平越中郎將假節暢為始興相弘為冀州刺史兄弟子姪並不拘名行以貨殖為務有田萬頃奴婢數千人餘資稱是桓玄篡位以逵為西中郎將豫州刺史鎮歷陽暢右衛將軍弘撫軍桓修司馬劉裕起義斬桓修時暢弘謀起兵襲裕裕遣劉毅討之暢伏誅弘亡不知所在逵在歷陽執劉裕參軍諸葛長民檻車送于桓玄至當利而玄敗送人共破檻出長民遂趣歷陽逵棄城而走為下人所執斬於石頭子姪無少長皆死惟小弟騁被宥為給事中尋謀反伏誅刁氏遂滅刁氏素殷富奴客縱橫固吝山澤為京口之蠹裕散其資蓄令百姓稱力而取之彌日不盡時天下飢弊編戶賴之以濟焉戴若思弟邈戴若思廣陵人也名犯高祖廟諱祖烈吳左將軍父昌會稽太守若思有風儀性間爽少好遊俠不拘操行遇陸機赴洛船裝甚盛遂與其徒掠之若思登岸據胡牀指麾同旅皆得其宜機察見之知非常人在舫屋上遙謂之曰卿才器如此乃復作劫邪若思感悟因流涕投劍就之機與言深加賞異遂與定交焉若思後舉孝廉入洛機薦之於趙王倫曰蓋聞繁弱登御然後高墉之功顯孤竹在肆然後降神之曲成是以高世之主必假遠邇之器蘊櫝之才思託太音之和伏見處士廣陵戴若思年三十清沖履道德量允塞思理足以研幽才鑒足以辨物安窮樂志無風塵之慕砥節立行有井泄之潔誠東南之遺寶宰朝之奇璞也若得託迹康衢則能結軌驥騄曜質廊廟必能垂光璵璠矣惟明公垂神採察不使忠允之言以人而廢倫乃辟之除沁水令不就遂往武陵省父時同郡人潘京素有理鑒名知人其父遣若思就京與語既而稱若思有公輔之才纍轉東海王越軍咨祭酒出補豫章太守加振威將軍領義軍都督以討賊有功賜爵陵侯遷治書侍御史驃騎司馬拜散騎侍郎元帝召為鎮東右司馬將征杜韜加若思前將軍未發而韜滅帝為晉王以為尚書中興建為中護軍轉護軍將軍尚書僕射皆辭不拜出為征西將軍都督兗豫幽冀雍并六州諸軍事假節加散騎常侍發投刺王官千人為軍吏調揚州百姓家奴萬人為兵配之以散騎常侍王遐為軍司鎮壽陽與劉隗同出帝親幸其營勞勉將士臨發祖餞置酒賦詩若思至合肥而王敦舉兵詔追若思還鎮京都進驃騎將軍與右衛將軍郭逸夾道築壘於大桁之北尋而石頭失守若思與諸軍攻石頭王師敗績若思率麾下百餘人赴宮受詔與公卿百官於石頭見敦敦問若思曰前日之戰有餘力乎若思不謝而答曰豈敢有餘但力不足耳又曰吾此舉動天下以為如何若思曰見形者謂之逆體誠者謂之忠敦笑曰卿可謂能言敦參軍呂猗昔為臺郎有刀筆才性尤姦諂若思為尚書惡其為人猗亦深憾焉至是乃説敦曰周顗戴若思皆有高名足以惑衆近者之言曾無愧色公若不除恐有再舉之患為將來之憂耳敦以為然又素忌之俄而遣鄧嶽繆坦收若思而害之若思素有重望四海之士莫不痛惜焉賊平册贈右光祿大夫儀同三司諡曰簡邈字望之少好學尤精史漢才不逮若思儒博過之弱冠舉秀才尋遷太子洗馬出補西陽內史永嘉中元帝版行邵陵內史丞相軍咨祭酒出為征南軍司于時凡百草創學校未立邈上疏曰臣聞天道之所大莫大於陰陽帝王之至務莫重於禮學是以古之建國有明堂辟雍之制鄉有庠序黌校之儀皆所以抽導幽滯啓廣才思蓋以六四有困蒙之吝君子大養正之功也昔仲尼列國之大夫耳興禮修學於洙泗之間四方髦俊斐然向風身達者七十餘人自茲以來千載絶塵豈天下小於魯衛賢哲乏於曩時勵與不勵故也自頃國遭無妄之禍社稷有綴旒之危寇羯飲馬於長江凶狡鴟張於萬里遂使神州蕭條鞠為茂草四海之內人迹不交霸主有旰食之憂黎元懷荼毒之苦戎首交拜于中原何遽籩豆之事哉然三年不為禮禮必壞三年不為樂樂必崩況曠載纍紀如此之久邪今末進後生目不覩揖讓升降之儀耳不聞鐘鼓管絃之音文章散滅圖讖無遺此蓋聖達之所深悼有識之所嗟歎也夫平世尚文遭亂尚武文武遞用長久之道譬之天地昏明之迭自古以來未有不由之者也今或以天下未一非興禮學之時此言似之而不其然夫儒道深奧不可倉卒而成古之俊必三年而通一經比天下平泰然後修之則功成事定誰與制禮作樂者哉又貴遊之子未必有斬將搴旗之才亦未有從軍征戍之役不及盛年講肄道義使明珠加磨瑩之功荊璞發採琢之榮不亦良可惜乎臣愚以世喪道久人情玩於所習純風日去華競日彰猶火之消膏而莫之覺也今天地告始萬物權輿聖朝以神武之德值革命之運蕩近世之流弊繼千載之絶軌篤道崇儒創立大業明主唱之於上宰輔督之於下夫上之所好下必有過之者焉是故雙劍之節崇而飛白之俗成挾琴之容飾而赴曲之和作君子之德風小人之德草實在感之而已臣以暗淺不能遠識格言奉誦明令慷慨下風謂宜以三時之隙漸就修建疏奏納焉於是始修禮學代劉隗為丹楊尹王敦作逆加左將軍及敦得志而若思遇害邈坐免官敦誅後拜尚書僕射卒官贈衛將軍諡曰穆子謐嗣歷義興太守大司農周顗子閔周顗字伯仁安東將軍浚之子也少有重名神彩秀徹雖時輩親狎莫能媟也司徒掾同郡賁嵩有清操見顗嘆曰汝潁固多奇士自頃雅道陵遲今復見周伯仁將振起舊風清我邦族矣廣陵戴若思東南之美舉秀才入洛素聞顗名往候之終坐而出不敢顯其才辨顗從弟穆亦有美譽欲陵折顗顗陶然弗與之校於是人士益宗附之州郡辟命皆不就弱冠襲父爵武城侯拜祕書郎纍遷尚書吏部郎東海王越子毗為鎮軍將軍以顗為長史元帝初鎮江左請為軍咨祭酒出為寧遠將軍荊州刺史領護南蠻校尉假節始到州而建平流入傅密等叛迎蜀賊杜韜顗狼狽失據陶侃遣將吳寄以兵救之故顗得免因奔王敦於豫章敦留之軍司戴邈曰顗雖退敗未有蒞衆之咎德望素重宜還復之敦不從帝召為揚威將軍兗州刺史顗還建康帝留顗不遣復以為軍咨祭酒尋轉右長史中興建補吏部尚書頃之以醉酒為有司所糾白衣領職復坐門生斫傷人免官太興初更拜太子少傅尚書如故顗上疏讓曰臣退自循省學不通一經智不效一官止足良難未能守分遂忝顯任名位過量不悟天鑒忘臣頑弊乃欲使臣內管銓衡外忝傅訓質輕蟬翼事重千鈞此之不可不待識而明矣若臣受負乘之責必貽聖朝惟塵之恥俯仰愧懼不知所圖詔曰紹幼沖便居儲副之貴當賴軌匠以袪蒙蔽望之儼然斯不言之益何學之習邪所謂與田蘇遊忘其鄙心者便當副往意不宜沖讓轉尚書左僕射領吏部如故庾亮嘗謂顗曰諸人咸以君方樂廣顗曰何乃刻畫無鹽唐突西施也帝宴羣公于西堂酒酣從容曰今日名臣共集何如堯舜時邪顗因醉厲聲曰今雖同人主何得復比聖世帝大怒而起手詔付廷尉將加戮纍日方赦之及出諸公就省顗曰近日之罪固知不至于死尋代戴若思為護軍將軍尚書紀瞻置酒請顗及王導等顗荒醉失儀復為有司所奏詔曰顗參副朝右職掌銓衡當敬慎德音式是百辟屢以酒過為有司所繩吾亮其極歡之情然亦是濡首之誡也顗必能克己復禮者今不加黜責初顗以雅望獲海內盛名後頗以酒失為僕射略無醒日時人號為三日僕射庾亮曰周侯末年所謂鳳德之衰也顗在中朝時能飲酒一石及過江雖日醉每稱無對偶有舊對從北來顗遇之欣然乃出酒二石共飲各大醉及顗醒使視客已腐脅而死顗性寬裕而友愛過人弟嵩嘗因酒瞋目謂顗曰君才不及弟何乃橫得重名以所燃蠟燭投之顗神色無忤徐曰阿奴火攻固出下策耳王導甚重之嘗枕顗膝而指其腹曰此中何所有也答曰此中空洞無物然足容卿輩數百人導亦不以為忤又於導坐然嘯詠導云卿欲希嵇阮邪顗曰何敢近捨明公遠希嵇阮及王敦構逆溫嶠謂顗曰大將軍此舉似有所在當無濫邪顗曰君少年未更事人主自非堯舜何能無失人臣豈可得舉兵以脅主共相推戴未能數年一旦如此豈云非亂乎處仲剛愎強忍狼抗無上其意寧有限邪既而王師敗績顗奉詔詣敦敦曰伯仁卿負我顗曰公戎車犯順下官親率六軍不能其事使王旅奔敗以此負公敦憚其辭正不知所答帝召顗於廣室謂之曰近日大事二宮無恙諸人平安大將軍故副所望邪顗曰二宮自如明詔於臣等故未可知護軍長史郝嘏等勸顗避敦顗曰吾備位大臣朝廷喪敗寧可復草間求活外投胡越邪俄而與戴若思俱被收路經太廟顗大言曰天地先帝之靈賊臣王敦傾覆社稷枉殺忠臣陵虐天下神祇有靈當速殺敦無令縱毒以傾王室語未終收人以戟傷其口血流至踵顏色不變容止自若觀者皆為流涕遂於石頭南門外石上害之時年五十四顗之死也敦坐有一參軍摴蒱馬於博頭被殺因謂敦曰周家奕世令望而位不至公及伯仁將登而墜有似下官此馬敦曰伯仁總角於東宮相遇一面披襟便許之三事何圖不幸自貽王法敦素憚顗每見顗輒面熱雖復冬月扇面手不得休敦使繆坦籍顗家收得素簏數枚盛故絮而已酒五甕米數石在位者服其清約敦卒後追贈左光祿大夫儀同三司諡曰康祀以少牢初敦之舉兵也劉隗勸帝盡除諸王司空導率羣從詣闕請罪值顗將入導呼顗謂曰伯仁以百口纍卿顗直入不顧既見帝言導忠誠申救甚至帝納其言顗喜飲酒致醉而出導猶在門又呼顗顗不與言顧左右曰今年殺諸賊奴取金印如斗大繫肘既出又上表明導言甚切至導不知救己而甚銜之敦既得志問導曰周顗戴若思南北之望當登三司無所疑也導不答又曰若不三司便應令僕邪又不答敦曰若不爾正當誅爾導又無言導後料檢中書故事見顗表救己殷勤款至導執表流涕悲不自勝告其諸子曰吾雖不殺伯仁伯仁由我而死幽冥之中負此良友顗三子閔恬頤閔字子騫方直有父風歷衡陽建安臨川太守侍中中領軍吏部尚書尚書左僕射加中軍將軍轉護軍領祕書監卒追贈金紫光祿大夫諡曰烈無子以弟頤長子琳為嗣琳仕至東陽太守恬頤並歷卿守琳少子文驃騎咨議參軍史臣曰夫太剛則折至察無徒以之為政則害于而國用之行己則凶于乃家誠以器乖容衆非先王之道也大連司憲陰候主情當約法之秋獻棺之議玄亮剛愎與物多違雖有崇上之心專行刻下之化同薄相濟並運天機是使賢宰見疏致物情於解體權臣發怒借其名以誓師既而謀人之國國危而苟免見昵於主主辱而圖生自取流亡非不幸也若思間爽照理研幽伯仁凝正處腴能約咸以高才雅道參豫疇咨及京室淪胥抗言無撓甘赴鼎而全操蓋事君而盡節者歟顗招時論尤其酒德禮經曰瑕不掩瑜未足韜其美也贊曰劉刁亮直志奉興王姦回醜正終致奔亡周戴英爽忠謨允塞道屬屯蒙禍罹凶慝
