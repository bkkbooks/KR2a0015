body:
  text: 晉書卷九十四列傳第六十四隱逸若夫穹昊垂景少微以躔其次文繫探幽貞遁以成其象故有避於言色其道聞乎孔公驕乎富貴厥義詳於孫子是以處柔伊存有生之性在盈斯害惟神之常道古先智士體其若茲介焉超俗浩然養素藏聲江海之上卷迹囂氛之表漱流而激其清寢巢而韜其耀良畫以符其志絶機以虛其心玉輝冰潔川渟嶽峙修至樂之道固無疆之休長往邈而不追安排窅而無悶修身自保悔吝弗生詩人考槃之歌抑在茲矣至於體天作制之後訟息刑清之時尚乃仄席幽貞以康神化徵聘之禮賁於巖穴玉帛之贄委於窐衡故月令曰季春之月聘名士禮賢者斯之謂歟自典午運開旁求隱逸譙元彥之杜絶人事江思悛之嘯詠林藪峻其貞白之軌成其出塵之迹雖不應其嘉招亦足激其貪競今美其高尚之德綴集於篇孫登孫登字公和汲郡共人也無家屬於郡北山為土窟居之夏則編草為裳冬則被髮自覆好讀易撫一絃琴見者皆親樂之性無恚怒人或投諸水中欲觀其怒登既出便大笑時時游人間所經家或設衣食者一無所辭去皆捨棄嘗住宜陽山有作炭人見之知非常人與語登亦不應文帝聞之使阮籍往觀既見與語亦不應嵇康又從之游三年問其所圖終不答康每歎息將別謂曰先生竟無言乎登乃曰子識火乎火生而有光而不用其光果在於用光人生而有才而不用其才而果在於用才故用光在乎得薪所以保其耀用才在乎識真所以全其年今子才多識寡難乎免於今之世矣子無求乎康不能用果遭非命乃作幽憤詩曰昔慚柳下今愧孫登或謂登以魏晉去就易生嫌疑故或默者也竟不知所終董京董京字威輦不知何郡人也初與隴西計吏俱至洛陽被髮而行逍遙吟詠常宿白社中時乞於市得殘碎繒絮結以自覆全帛佳綿則不肯受或見推排罵辱曾無怒色孫楚時為著作郎數就社中與語遂載與俱歸京不肯坐楚乃貽之書勸以今堯舜之世胡為懷道迷邦京答之以詩曰周道斁兮頌聲沒夏政衰兮五常汨便便君子顧望而逝洋洋乎滿目而作者七豈不樂天地之化也哀哉乎時之不可與對之以獨處無娛我以為歡清流可飲至道可餐何為棲棲自使疲單魚懸獸檻鄙夫知之夫古之至人藏器於靈縕袍不能令暖軒冕不能令榮動如川之流靜如川之渟鸚鵡能言泗濱浮磬衆人所玩豈合物情玄鳥紆幕而不被害塭隼遠巢咸以欲死眄彼梁魚逡巡倒尾沈吟不決忽焉失水嗟乎魚鳥相與萬世而不悟以我觀之乃明其故焉知不有達人深穆其度亦將窺我顰顣而去萬物皆賤惟人為貴動以九州為狹靜以環堵為大後數年遁去莫知所之於其所寢處惟有一石竹子及詩二篇其一曰乾道剛簡坤體敦密茫茫太素是則是述末世流奔以文代質悠悠世目孰知其實逝將去此至虛歸我自然之室又曰孔子不遇時彼感麟麟乎麟胡不遁世以存真夏統夏統字仲御會稽永興人也幼孤貧養親以孝聞睦於兄弟每採梠求食星行夜歸或至海邊拘炧蟲截以資養雅善談論宗族勸之仕謂之曰卿清亮質直可作郡綱紀與府朝接自當顯至如何甘辛苦於山林畢性命於海濱也統悖然作色曰諸君待我乃至此乎使統屬太平之時當與元凱評議出處遇濁代念與屈生同汙共泥若汙隆之間自當耦耕沮溺豈有辱身曲意於郡府之間乎聞君之談不覺寒毛盡戴白汗四匝顏如渥丹心熱如炭舌縮口張兩耳壁塞也言者大慚統自此遂不與宗族相見會母疾統侍醫藥宗親因得見之其從父敬寧祠先人迎女巫章丹陳珠二人並有國色莊服甚麗善歌又能隱形匿影甲夜之初撞鐘擊鼓間以絲竹丹珠乃拔刀破舌吞刀吐火雲霧杳冥流光電發統諸從兄弟欲往觀之難統於是共紿之曰從父間疾病得瘳大小以為喜慶欲因其祭祀並往賀之卿可俱行乎統從之入門忽見丹珠在中庭輕步佪靈談鬼笑飛觸挑柈酬酢翩翻統驚愕而走不由門破藩直出歸責諸人曰昔淫亂之俗興衛文公為之悲惋螮蝀之氣見君子尚不敢指季桓納齊女仲尼載馳而退子路見夏南憤恚而慷愾吾常恨不得頓叔向之頭陷華父之眼奈何諸君迎此妖物夜與游戲放傲逸之情縱奢淫之行亂男女之禮破貞高之節何也遂隱牀上被髮而臥不復言衆親踧踖即退遣丹珠各各分散後其母病篤乃詣洛市藥會三月上巳洛中王公已下並至浮橋士女駢填車服燭路統時在船中曝所市藥諸貴人車乘來者如雲統並不之顧太尉賈充怪而問之統初不應重問乃徐答曰會稽夏仲御也充使問其土地風俗統曰其人循循猶有大禹之遺風太伯之義讓嚴遵之抗志黃公之高節又問卿居海濱頗能隨水戲乎答曰可統乃操柂正櫓折旋中流初作鯔竹木匝躍後作鯆引飛鷁首掇獸尾奮長梢而船直逝者三焉於是風波振駭雲霧杳冥俄而白魚跳入船者有八九觀者皆悚遽充心尤異之乃更就船與語其應如響欲使之仕即俯而不答充又謂曰昔堯亦歌舜亦歌子與人歌而善必反而後和之明先聖前哲無不盡歌卿頗能作卿土地間曲乎統曰先公惟寓稽山朝會萬國授化鄙邦崩殂而葬恩澤雲布聖化猶存百姓感詠遂作慕歌又孝女曹娥年甫十四貞順之德過越梁宋其父墮江不得尸娥仰天哀號中流悲歎便投水而死父子喪尸後乃俱出國人哀其孝義為歌河女之章伍子胥諫吳王言不納用見戮投海國人痛其忠烈為作小海唱今欲歌之衆人僉曰善統於是以足叩船引聲喉囀清激慷慨大風應至含水糍天雲雨響集叱咤歡呼雷電晝冥集氣長嘯沙塵煙起王公已下皆恐止之乃已諸人顧相謂曰若不游洛水安見是人聽慕歌之聲便髣佛見大禹之容聞河女之音不覺涕淚交流即謂伯姬高行在目前也聆小海之唱謂子胥屈平立吾左右矣充欲耀以文武鹵簿覬其來觀因而謝之遂命建朱旗舉幡校分羽騎為隊軍伍肅然須臾鼓吹亂作胡葭長鳴車乘紛錯縱橫馳道又使妓女之徒服袿襡炫金翠繞其船三匝統危坐如故若無所聞充等各散曰此吳兒是木人石心也統歸會稽竟不知所終朱沖朱沖字巨容南安人也少有至行間靜寡欲好學而貧常以耕藝為事鄰人失犢認沖犢以歸後得犢於林下大慚以犢還沖沖竟不受有牛犯其禾稼沖屢持芻送牛而無恨色主愧之乃不復為暴咸寧四年詔補博士沖稱疾不應尋又詔曰東宮官屬亦宜得履蹈至行敦悅典籍者其以沖為太子右庶子沖每聞徵書至輒逃入深山時人以為梁管之流沖居近夷俗羌戎奉之若君沖亦以禮讓為訓邑里化之路不拾遺村無凶人毒蟲猛獸皆不為害卒以壽終范粲子喬范粲字承明陳留外黃人漢萊蕪長丹之孫也粲高亮貞正有丹風而博涉強記學皆可師遠近請益者甚衆性不矜莊而見之皆肅如也魏時州府交辟皆無所就久之乃應命為治中轉別駕辟太尉掾尚書郎出為征西司馬所歷職皆有聲稱及宣帝輔政遷武威太守到郡選良吏立學校勸農桑是時戎夷頗侵疆埸粲明設防備敵不敢犯西域流通無烽燧之警又郡壤富實珍玩充積粲檢制之息其華侈以母老罷官郡既接近寇戎粲以重鎮輒去職朝廷尤之左遷樂涫令頃之轉太宰從事中郎遭母憂以至孝稱服闋復為太宰中郎齊王芳被廢遷于金墉城粲素服拜送哀慟左右時景帝輔政召羣官會議粲又不到朝廷以其時望優容之粲又稱疾闔門不出於是特詔為侍中持節使於雍州粲因陽狂不言寢所乘車足不履地子孫侍左右至有婚宦大事輒密咨焉合者則色無變不合則眠寢不安妻子以此知其旨武帝踐阼泰始中粲同郡孫和時為太子中庶子表薦粲稱其操行高潔久嬰疾病可使郡縣輿致京師加以聖恩賜其醫藥若遂瘳除必有益於政乃詔郡縣給醫藥又以二千石祿養病歲以為常加賜帛百匹子喬以父疾篤辭不敢受詔不許以太康六年卒時年八十四不言三十六載終於所寢之車長子喬喬字伯孫年二歲時祖馨臨終撫喬首曰恨不見汝成人因以所用硯與之至五歲祖母以告喬喬便執硯涕泣九歲請學在同輩之中言無媟辭弱冠受業於樂安蔣國明濟陰劉公榮有知人之鑒見喬深相器重友人劉彥秋夙有聲譽嘗謂人曰范伯孫體應純和理思周密吾每欲錯其一事而終不能光祿大夫李銓嘗論楊雄才學優於劉向喬以為向定一代之書正羣籍之篇使雄當之故非所長遂著劉楊優劣論文多不載喬好學不倦父粲陽狂不言喬與二弟並棄學業絶人事侍疾家庭至粲沒足不出邑里司隸校尉劉毅嘗抗論於朝廷曰使范武威疾若不篤是為伯夷叔齊復存於今如其信篤益是聖主所宜哀矜其子久侍父疾名德著茂不加用深為朝廷惜遺賢之譏也元康中詔求廉讓沖退履道寒素者不計資以參選尚書郎王琨乃薦喬曰喬稟德真粹立操高潔儒學精深含章內奧安貧樂道棲志窮巷簞瓢詠業長而彌堅誠當今之寒素著厲俗之清彥時張華領司徒天下所舉凡十七人於喬特發優論又吏部郎郗隆亦思求海內幽遁之士喬供養衡門至於白首於是除樂安令辭疾不拜喬凡一舉孝廉八薦公府再舉清白異行又舉寒素一無所就初喬邑人臘夕盜斫其樹人有告者喬陽不聞邑人愧而歸之喬往喻曰卿節日取柴欲與父母相歡娛耳何以愧為其通物善導皆此類也外黃令高頵歎曰諸士大夫未有不及私者而范伯孫恂恂率道名諱未嘗經於官曹士之貴異於今而見大道廢而有仁義信矣其行身不穢為物所歎服如此以元康八年卒年七十八魯勝魯勝字叔時代郡人也少有才操為佐著作郎元康初遷建康令到官著正天論云以冬至之後立晷測影準度日月星臣案日月裁徑百里無千里星十里不百里遂表上求下羣公卿士考論若臣言合理當得改先代之失而正天地之紀如無據驗甘即刑戮以彰虛妄之罪事遂不報嘗歲日望氣知將來多故便稱疾去官中書令張華遣子勸其更仕再徵博士舉中書郎皆不就其著述為世所稱遭亂遺失惟注墨辨存其曰名者所以別同異明是非道義之門政化之準繩也孔子曰必也正名名不正則事不成墨子著書作辨經以立名本惠施公孫龍祖述其學以正別名顯於世孟子非墨子其辨言正辭則與墨同荀卿莊周等皆非毀名家而不能易其論也名必有形察形莫如別色故有堅白之辨名必有分明分明莫如有無故有無序之辨是有不是可有不可是名兩可同而有異異而有同是之謂辨同異至同無不同至異無不異是謂辨同辨異同異生是非是非生吉凶取辨於一物而原極天下之汙隆名之至也自鄧析至秦時名家者世有篇籍率頗難知後學莫復傳習於今五百餘歲遂亡絶墨辨有上下經經各有說凡四篇與其書衆篇連第故獨存今引說就經各附其章疑者闕之又采諸衆雜集為刑名二篇略解指歸以俟君子其或興微繼絶者亦有樂乎此也董養董養字仲道陳留浚儀人也泰始初到洛下不干祿求榮及楊后廢養因游太學升堂歎曰建斯堂也將何為乎每覽國家赦書謀反大逆皆赦至於殺祖父母父母不赦者以為王法所不容也奈何公卿處議文飾禮典以至此乎天人之理既滅大亂作矣因著無化論以非之永嘉中洛城東北步廣里中地陷有二鵝出焉其蒼者飛去白者不能飛養聞歎曰昔周時所盟會狄泉即此地也今有二鵝蒼者胡象白者國家之象其可盡言乎顧謂謝鯤阮孚曰易稱知機其神乎君等可深藏矣乃與妻荷擔入蜀莫知所終霍原霍原字休明燕國廣陽人也少有志力叔父坐法當死原入獄訟之楚毒備加終免叔父年十八觀太學行禮因留習之貴游子弟聞而重之欲與相見以其名微不欲晝往乃夜共造焉父友同郡劉岱將舉之未果而病篤臨終敕其子沈曰霍原慕道清虛方成奇器汝後必薦之後歸鄉里高陽許猛素服其名會為幽州刺史將詣之主簿當車諫不可出界猛歎恨而止原山居積年門徒百數燕王月致羊酒及劉沈為國大中正元康中進原為二品司徒不過沈乃上表理之詔下司徒參論中書監張華令陳準奏為上品詔可元康末原與王褒等俱以賢良徵纍下州郡以禮發遣皆不到後王浚稱制謀僭使人問之原不答浚心銜之又有遼東囚徒三百餘人依山為賊意欲劫原為主事亦未行時有謠曰天子在何許近在豆田中浚以豆為霍收原斬之懸其首諸生悲哭夜竊尸共埋殯之遠近駭愕莫不冤痛之郭琦郭琦字公偉太原晉陽人也少方直有雅量博學善五行作天文志五行傳注穀梁京氏易百卷鄉人王游等皆就琦學武帝欲以琦為佐著作郎問琦族人尚書郭彰彰素疾琦答云不識帝曰若如卿言烏丸家兒能事卿即堪為郎矣遂決意用之及趙王倫篡位又欲用琦琦曰我已為武帝吏不容復為今世吏終身處於家伍朝伍朝字世明武陵漢壽人也少有雅操間居樂道不修世事性好學以博士徵不就刺史劉弘薦朝為零陵太守主者以非選例不聽尚書郎胡濟奏曰臣以為當今資喪亂之餘運承百王之遺弊進趨者乘國故以僥幸守道者懷蘊櫝以終身故令敦褒之化虧退讓之風薄案朝游心物外不屑時務守靜衡門志道日新年過耳順而所尚無虧誠江南之奇才丘園之逸老也不加飾進何以勸善且白衣為郡前漢有舊宜聽光顯以奬風尚奏可而朝不就終於家魯褒魯褒字元道南陽人也好學多聞以貧素自立元康之後綱紀大壞褒傷時之貪鄙乃隱姓名而著錢神論以刺之其略曰錢之為體有乾坤之象內則其方外則其圓其積如山其流如川動靜有時行藏有節市井便易不患耗折難折象壽不匱象道故能長久為世神寶親之如兄字曰孔方失之則貧弱得之則富昌無翼而飛無足而走解嚴毅之顏開難發之口錢多者處前錢少者居後處前者為君長在後者為臣僕君長者豐衍而有餘臣僕者窮竭而不足詩云哿矣富人哀此煢獨錢之為言泉也無遠不往無幽不至京邑衣冠疲勞講肄厭聞清談對之睡寐見我家兄莫不驚視錢之所祐吉無不利何必讀書然後富貴昔呂公欣悅於空版漢祖克之於贏二文君解布裳而被錦繡相如乘高蓋而解犢鼻官尊名顯皆錢所致空版至虛而況有實贏二雖少以致親密由此論之謂為神物無德而尊無勢而熱排金門而入紫闥危可使安死可使活貴可使賤生可使殺是故忿爭非錢不勝幽滯非錢不拔怨讎非錢不解令問非錢不發洛中朱衣當途之士愛我家兄皆無已已執我之手抱我終始不計優劣不論年紀賓客輻輳門常如市諺曰錢無耳可使鬼凡今之人惟錢而已故曰軍無財士不來軍無賞士不往仕無中人不如歸田雖有中人而無家兄不異無翼而欲飛無足而欲行蓋疾時者共傳其文褒不仕莫知其所終泛騰泛騰字無忌敦煌人也舉孝廉除郎中屬天下兵亂去官還家太守張閟造之閉門不見禮遺一無所受歎曰生於亂世貴而能貧乃可以免散家財五十萬以施宗族柴門灌園琴書自適張軌徵之為府司馬騰曰門一杜其可開乎固辭病兩月餘而卒任旭任旭字次龍臨海章安人也父訪吳南海太守旭幼孤弱兒童時勤於學及長立操清修不染流俗鄉曲推而愛之郡將蔣秀嘉其名請為功曹秀居官貪穢每不奉法旭正色苦諫秀既不納旭謝去閉門講習養志而已久之秀坐事被收旭狼狽營送秀慨然歎曰任功曹真人也吾違其讜言以至於此復何言哉尋察孝廉除郎中州郡仍舉為郡中正固辭歸家永康初惠帝博求清節俊異之士太守仇馥薦旭清貞潔素學識通博詔下州郡以禮發遣旭以朝廷多故志尚隱遁辭疾不行尋天下大亂陳敏作逆江東名豪並見羈縶惟旭與賀循守死不回敏卒不能屈元帝初鎮江東聞其名召為參軍手書與旭欲使必到旭固辭以疾後帝進位鎮東大將軍復召之及為左丞相辟為祭酒並不就中興建公車徵會遭母憂於時司空王導啓立學校選天下明經之士旭與會稽虞喜俱以隱學被召事未行會有王敦之難尋而帝崩事遂寢明帝即位又徵拜給事中旭稱疾篤經年不到尚書以稽留除名僕射荀嵩議以為不可太寧末明帝復下詔備禮徵旭始下而帝崩咸和二年卒太守馮懷上疏謂宜贈九列值蘇峻作亂事竟不行子琚位至大宗正終於家郭文郭文字文舉河內軹人也少愛山水尚嘉遁年十三每游山林彌旬忘反父母終服畢不娶辭家游名山歷華陰之崖以觀石室之石函洛陽陷乃步擔入吳興餘杭大辟山中窮谷無人之地倚木於樹苫覆其上而居焉亦無壁障時猛獸為暴入屋害人而文獨宿十餘年卒無患害著鹿裘葛巾不飲酒食肉區種菽麥採竹葉木實貿鹽以自供人或酬下價者亦即與之後人識文不復賤酬食有餘穀輒恤窮匱人有致遺取其粗者示不逆而已有猛獸殺大麀鹿於菴側文以語人人取賣之分錢與文文曰我若須此自當賣之所以相語正以不須故也聞者皆嗟歎之嘗有猛獸忽張口向文文視其口中有橫骨乃以手探去之猛獸明旦致一鹿於其室前獵者時往寄宿文夜為擔水而無倦色餘杭令顧揚與葛洪共造之而攜與俱歸揚以文山行或須皮衣贈以韋袴褶一具文不納辭歸山中揚追遣使者置衣室中而去文亦無言韋衣乃至爛於戶內竟不服用王導聞其名遣人迎之文不肯就船車荷擔徒行既至導置之西園園中果木成林又有鳥獸麋鹿因以居文焉於是朝士咸共觀之文頽然踑踞傍若無人溫嶠嘗問文曰人皆有六親相娛先生棄之何樂文曰本行學道不謂遭世亂欲歸無路是以來也又問曰飢而思食壯而思室自然之性先生安獨無情乎文曰情由憶生不憶故無情又問曰先生獨處窮山若疾病遭命則為烏鳥所食顧不酷乎文曰藏埋者亦為螻蟻所食復何異乎又問曰猛獸害人人之所畏而先生獨不畏邪文曰人無害獸之心則獸亦不害人又問曰苟世不寧身不得安今將用生以濟時若何文曰山草之人安能佐世導嘗衆賓共集絲竹並奏試使呼之文瞪眸不轉跨躡華堂如行林野於時坐者咸有鉤深味遠之言文常稱不達來語天機鏗宏莫有窺其門者溫嶠嘗稱曰文有賢人之性而無賢人之才柳下梁踦之亞乎永昌中大疫文病亦殆王導遺藥文曰命在天不在藥也夭壽長短時也居導園七年未嘗出入一旦忽求還山導不聽後逃歸臨安結廬舍於山中臨安令萬寵迎置縣中及蘇峻反破餘杭而臨安獨全人皆異之以為知機自後不復語但舉手指麾以宣其意病甚求還山欲枕石安尸不令人殯葬寵不聽不食二十餘日亦不瘦寵問曰先生復可得幾日文三舉手果以十五日終寵葬之於所居之處而祭哭之葛洪庾闡並為作傳贊頌其美云龔壯龔壯字子瑋巴西人也潔己自守與鄉人譙秀齊名父叔為李特所害壯積年不除喪力弱不能復仇及李壽戍漢中與李期有嫌期特孫也壯欲假壽以報乃說壽曰下若能并有西土稱藩於晉人必樂從且捨小就大以危易安莫大之策也壽然之遂率衆討期果克之壽猶襲僞號欲官之壯誓不仕賂遺一無所取會天久雨百姓饑墊壯上書說壽以歸順允天心應人望永為國藩福流子孫壽省書內愧祕而不宣乃遣使入胡壯又諫之壽又不納壯謂百行之本莫大忠孝既假壽殺期私仇以雪又欲使其歸朝以明臣節壽既不從壯遂稱聾又云手不制物終身不復至成都惟研考經典談思文章至李勢時卒初壯每歎中夏多經學而巴蜀鄙陋兼遭李氏之難無復學徒乃著邁德論文多不載孟陋孟陋字少孤武昌人也吳司空宗之曾孫也兄嘉桓溫征西長史陋少而貞立清操絶倫布衣蔬食以文籍自娛口不及世事未曾交游時或弋釣孤興獨往雖家人亦不知其所之也喪母毀瘠殆於滅性不飲酒食肉十有餘年親族迭謂之曰少孤誰無父母誰有父母聖人制禮令賢者俯就不肖企及若使毀性無嗣更為不孝也陋感此言然後從吉由是名著海內簡文帝輔政命為參軍稱疾不起桓溫躬往造焉或謂溫曰孟陋高行學為儒宗宜引在府以和鼎味溫歎曰會稽王尚不能屈非敢擬議也陋聞之曰桓公正當以我不往故耳億兆之人無官者十居其九豈皆高士哉我疾病不堪恭相王之命非敢為高也由是名稱益重博學多通長於三禮注論語行於世卒以壽終韓績韓績字興齊廣陵人也其先避亂居於吳之嘉興父建仕吳至大鴻臚績少好文學以潛退為操布衣蔬食不交當世由是東土並宗敬焉司徒王導聞其名辟以為掾不就咸康末會稽內史孔愈上疏薦之詔以安車束帛徵之尚書令諸葛恢奏績名望猶輕未宜備禮於是召拜博士稱老病不起卒於家於時高密劉鮞字長魚城陽邴郁字弘文並有高名鮞幼不慕俗長而希古篤學厲行化流邦邑郁魏徵士原之曾孫少有原風敕身謹潔口不妄說耳不妄聽端拱恂恂舉動有禮咸康中成帝博求異行之士鮞郁並被公卿薦舉於是依績及翟湯等例以博士徵之郁辭以疾鮞隨使者到京師自陳年老不拜各以壽終譙秀譙秀字元彥巴西人也祖周以儒學著稱顯明蜀朝秀少而靜默不交於世知天下將亂預絶人事雖內外宗親不與相見郡察孝廉州舉秀才皆不就及李雄據蜀略有巴西雄叔父驤驤子壽皆慕秀名具束帛安車徵之皆不應常冠皮辨弊衣躬耕山藪龔壯常歎服焉桓溫滅蜀上疏薦之朝廷以秀年在篤老兼道遠故不徵遣使敕所在四時存問尋而范賁蕭敬相繼作亂秀避避宕渠鄉里宗族依憑之者以百數秀年出八十衆人欲代之負擔秀曰各有老弱當先營護吾氣力猶足自堪豈以垂朽之年纍諸君也年九十餘卒翟湯子莊翟湯字道深尋陽人篤行純素仁讓廉潔不屑世事耕而後食人有饋贈雖釜庾一無所受永嘉末寇害相繼聞湯名德皆不敢犯鄉人賴之司徒王導辟不就隱於縣界南山始安太守干寶與湯通家遣船餉之敕吏云翟公廉讓卿致書訖便委船還湯無人反致乃貨易絹物因寄還寶寶本以為惠而更煩之益愧歎焉咸康中征西大將軍庾亮上疏薦之成帝徵為國子博士湯不起建元初安西將軍庾翼北征石季龍大發僮客以充戎役敕有司特蠲湯所調湯悉推僕使委之鄉吏吏奉旨一無所受湯依所調限放免其僕使令編戶為百姓康帝復以散騎常侍徵湯固辭老疾不至年七十三卒於家子莊字祖休少以孝友著名遵湯之操不交人物耕而後食語不及俗惟以弋釣為事及長不復獵或問漁獵同是害生之事而先生止去其一何哉莊曰獵自我釣自物未能頓盡故先節其甚者且夫貪餌吞鈎豈我哉時人以為知言晚節亦不復釣端居篳門啜菽飲水州府禮命及公車徵並不就年五十六卒子矯亦有高操屢辭辟命矯子法賜孝武帝以散騎郎徵亦不至世有隱行云郭翻郭翻字長翔武昌人也伯父訥廣州刺史父察安城太守翻少有志操辭州郡辟及賢良之舉家於臨川不交世事惟以漁釣射獵為娛居貧無業欲墾荒田先立表題經年無主然後乃作稻將熟有認之者悉推與之縣令聞而詰之以稻還翻翻遂不受嘗以車獵去家百餘里道中逢病人以車送之徒步而歸其漁獵所得或從買者便與之而不取直亦不告姓名由是士庶咸敬貴焉與翟湯俱為庾亮所薦公車博士徵不就咸康末乘小船暫歸武昌省墳墓安西將軍庾翼以帝舅之重躬往造翻欲強起之翻曰人性各有所短焉可強逼翼又以其船小狹欲引就大船翻曰使君不以鄙賤而辱臨之此固野人之舟也翼俯屈入其船中終日而去嘗墜刀於水路人有為取者因與之路人不取固辭翻曰爾向不取我豈能得路人曰我若取此將為天地鬼神所責矣翻知其終不受復沈刀於水路人悵焉乃復沈沒取之翻於是不逆其意乃以十倍刀價與之其廉不受惠皆此類也卒於家辛謐辛謐字叔重隴西狄道人也父怡幽州刺史世稱冠族謐少有志尚博學善屬文工草隸書為時楷法性恬靜不妄交游召拜太子舍人諸王文學纍徵不起永嘉末以謐兼散騎常侍慰撫關中謐以洛陽將敗故應之及長安陷沒於劉聰聰拜太中大夫固辭不受又歷石勒季龍之世並不應辟命雖處喪亂之中頽然高邁視榮利蔑如也及冉閔僭號復備禮徵為太常謐遺閔書曰昔許由辭堯以天下讓之全其清高之節伯夷去國子推逃賞皆顯史牒傳之無窮此往而不反者也然賢人君子雖居廟堂之上無異於山林之中斯窮理盡性之妙豈有識之者邪是故不嬰於禍難者非為避之但冥心至趣而與吉會耳謐聞物極則變冬夏是也致高則危纍棋是也君王功以成矣而久處之非所以顧萬全遠危亡之禍也宜因茲大捷歸身本朝必有許由伯夷之廉享松喬之壽永為世輔豈不美哉因不食而卒劉驎之劉驎之字子驥南陽人光祿大夫耽之族也驎之少尚質素虛退寡欲不修儀操人莫之知好游山澤志存遁逸嘗採藥至衡山深入忘反見有一澗水水南有二石囷一囷閉一囷開水深廣不得過欲還失道遇伐弓人問徑僅得還家或說囷中皆仙靈方藥諸雜物驎之欲更尋索終不復知處也車騎將軍桓沖聞其名請為長史驎之固辭不受沖嘗到其家驎之於樹條桑使者致命驎之曰使君既枉駕光臨宜先詣家君沖聞大愧於是乃造其父父命驎之然後方還拂短褐與沖言話父使驎之於內自持濁酒蔬菜供賓沖敕人代驎之斟酌父辭曰若使從者非野人之意也沖慨然至昏乃退驎之雖冠冕之族信義著於羣小凡厮伍之家婚娶葬送無不躬自造焉居於陽岐在官道之側人物來往莫不投之驎之躬自供給士君子頗以勞纍更憚過焉凡人致贈一無所受去驎之家百餘里有一孤姥病將死歎息謂人曰誰當埋我惟有劉長史耳何由令知驎之先聞其有患故往候之值其命終乃身為營棺殯送之其仁愛隱惻若此卒以壽終索襲索襲字偉祖敦煌人也虛靖好學不應州郡之命舉孝廉賢良方正皆以疾辭游思於陰陽之術著天文地理十餘篇多所啓發不與當世交通或獨語獨笑或長歎涕泣或請問不言張茂時敦煌太守陰淡奇而造焉經日忘反出而歎曰索先生碩德名儒真可以咨大義淡欲行鄉射之禮請襲為三老曰今四表輯寧將行鄉射之禮先生年耆望重道冠一時養老之義實繫儒賢既樹非梧桐而希鸞鳳降翼器謝曹公而冀蓋公枉駕誠非所謂也然夫子至聖有召赴焉孟軻大德無聘不至蓋欲弘闡大猷敷明道化故也今之相屈遵道崇教非有爵位意者或可然乎會病卒時年七十九淡素服會葬贈錢二萬淡曰世人之所有餘者富貴也目之所好者五色也耳之所玩者五音也而先生棄衆人之所收收衆人之所棄味無味於慌惚之際兼重玄於衆妙之內宅不彌畝而志忽九州形居塵俗而棲心天外雖黔婁之高遠莊生之不願蔑以過也乃諡曰玄居先生楊軻楊軻天水人也少好易長而不娶學業精微養徒數百常食粗飲水衣褐縕袍人不堪其憂而軻悠然自得疏賓異客音旨未曾交也雖受業門徒非入室弟子莫得親言欲所論授須旁無雜人授入室弟子令遞相宣授劉曜僭號徵拜太常軻固辭不起曜亦敬而不逼遂隱於隴山曜後為石勒所擒秦人東徙軻留長安及石季龍嗣僞位備玄纁束帛安車徵之軻以疾辭迫之乃發既見季龍不拜與語不言命舍之於永昌乙第其有司以軻倨傲請從大不敬論季龍不從下書任軻所尚軻在永昌季龍每有饋餼輒口授弟子使為表謝其文甚美覽者歎有深致季龍欲觀其真趣乃密令美女夜以動之軻蕭然不顧又使人將其弟子盡行遣魁壯羯士衣甲持刀臨之以兵并竊其所賜衣服而去軻視而言了無懼色常臥土覆以布被倮寢其中下無茵褥潁川荀鋪好奇之士也造而談經軻瞑目不答鋪發軻被露其形大笑之軻神體頽然無驚怒之狀于時咸以為焦先之徒未有能量其深淺也後上疏陳鄉思求還季龍送以安車蒲輪蠲十戶供之自歸秦州仍教授不絶其後秦人西奔涼州軻弟子以牛負之為戍軍追擒并為所害公孫鳳公孫鳳字子鸞上谷人也隱於昌黎之九城山谷冬衣單布寢處土牀夏則并食於器停令臭敗然後食之彈琴吟咏陶然自得人咸異之莫能測也慕容暐以安車徵至鄴及見暐不言不拜衣食舉動如在九城賓客造請鮮得與言數年病卒公孫永公孫永字子陽襄平人也少而好學恬虛隱於平郭南山不娶妻妾非身所墾植則不衣食之吟詠巖間欣然自得年餘九十操尚不虧與公孫鳳俱被慕容暐徵至鄴及見暐不拜王公以下造之皆不與言雖經隆冬盛暑端然自若一歲餘詐狂暐送之平郭後苻堅又將備禮徵之難其年耆路遠乃遣使者致問未至而永亡堅深悼之諡曰崇虛先生張忠張忠字巨和中山人也永嘉之亂隱於泰山恬靜寡欲清虛服氣餐芝餌石修導養之法冬則縕袍夏則帶索端拱若尸無琴書之適不修經典勸教但以至道虛無為宗其居依崇巖幽谷鑿地為窟室弟子亦以窟居去忠六十餘步五日一朝其教以形不以言弟子受業觀形而退立道壇於窟上每旦朝拜之食用瓦器鑿石為釜左右居人饋之衣食一無所受好事少年頗或問以水旱之祥忠曰天不言而四時行焉萬物生焉陰陽之事非窮山野叟所能知之其遣諸外物皆此類也年在期頤而視聽無爽苻堅遣使徵之使者至忠沐浴而起謂弟子曰吾餘年無幾不可以逆時主之意浴訖就車及至長安堅賜以冠衣辭曰年朽髮落不堪衣冠請以野服入覲從之及見堅謂之曰先生考磐山林研精道素獨善之美有餘兼濟之功未也故遠屈先生將任齊尚父忠曰昔因喪亂避地泰山與鳥獸為侶以全朝夕之命屬堯舜之世思一奉聖顏年衰志謝不堪展效尚父之況非敢竊擬山棲之性情存巖岫乞還餘齒歸死岱宗堅以安車送之行達華山歎曰我東嶽道士沒於西嶽命也奈何行五十里及關而死使者馳驛白之堅遣黃門郎韋華持節策弔祀以太牢褒賜命服諡曰安道先生石垣石垣字洪孫自云北海劇人居無定所不娶妻妾不營産業食不求美衣必粗弊或有遺其衣服受而施人人有喪葬輒杖策弔之路無遠近時有寒暑必在其中或同日共時咸皆見焉又能暗中取物如晝無差姚萇之亂莫知所終宋纖宋纖字令艾敦煌效穀人也少有遠操沈靖不與世交隱居於酒泉南山明究經緯弟子受業三千餘人不應州郡辟命惟與陰顒齊好友善張祚時太守楊宣畫其象於閣上出入視之作頌曰為枕何石為漱何流身不可見名不可求酒泉太守馬岌高尚之士也具威儀鳴鐃鼓造焉纖高樓重閣距而不見岌歎曰名可聞而身不可見德可仰而形不可覩吾而今而後知先生人中之龍也銘詩於石壁曰丹崖百丈青壁萬尋奇木蓊鬱蔚若鄧林其人如玉維國之琛室邇人遐實勞我心纖注論語及為詩頌數萬言年八十篤學不倦張祚後遣使者張興備禮徵為太子友興逼喻甚切纖喟然歎曰德非莊生才非干木何敢稽停明命遂隨興至姑臧祚遣其太子太和以執友禮造之纖稱疾不見贈遺一皆不受尋遷太子太傅頃之上疏曰臣受生方外心慕太古生不喜存死不悲沒素有遺屬屬諸知識在山投山臨水投水處澤露形在人親土聲聞書疏勿告我家今當命終乞如素願遂不食而卒時年八十二諡曰玄虛先生郭荷郭荷字承休略陽人也六世祖整漢安順之世公府八辟公車五徵皆不就自整及荷世以經學致位荷明究羣籍特善史書不應州郡之命張祚遣使者以安車束帛徵為博士祭酒使者迫而致之及至署太子友荷上疏乞還祚許之遣以安車蒲輪送還張掖東山年八十四卒諡曰玄德先生郭瑀郭瑀字元瑜敦煌人也少有超俗之操東游張掖師事郭荷盡傳其業精通經義雅辨談論多才藝善屬文荷卒瑀以為父生之師成之君爵之而五服之制師不服重蓋聖人謙也遂服斬衰廬墓三年禮畢隱於臨松薤谷鑿石窟而居服柏實以輕身作春秋墨說孝經錯緯弟子著録千餘人張天錫遣使者孟公明持節以蒲輪玄纁備禮徵之遺瑀書曰先生潛光九臯懷真獨遠心與至境冥符志與四時消息豈知蒼生倒懸四海待拯者乎孤忝承時運負荷大業思與賢明同贊帝道昔傅說龍翔殷朝尚父鷹揚周室孔聖車不停軌墨子駕不俟旦皆以黔首之禍不可以不救君不獨立道由人弘故也況今九服分為狄場二都盡為戎穴天子僻陋江東名教淪於左袵創毒之甚開闢未聞先生懷濟世之才坐觀而不救其於仁智孤竊惑焉故遣使者虛左授綏鶴企先生乃眷下國公明至山瑀指翔鴻以示之曰此鳥也安可籠哉遂深逃絶迹公明拘其門人瑀歎曰吾逃祿非避罪也豈得隱居行義害及門人乃出而就徵及至姑臧值天錫母卒瑀括髮入弔三踊而出還於南山及天錫滅苻堅又以安車徵瑀定禮儀會父喪而止太守辛章遣書生三百人就受業焉及苻氏之末略陽王穆起兵酒泉以應張大豫遣使招瑀瑀歎曰臨河救溺不卜命之短長脈病三年不豫絶其餐饋魯連在趙義不結舌況人將左袵而不救之乃與敦煌索嘏起兵五千運粟三萬石東應王穆穆以瑀為太府左長史軍師將軍雖居元佐而口詠黃老冀功成世定追伯成之蹤穆惑於讒間西伐索嘏瑀諫曰昔漢定天下然後誅功臣今事業未建而誅之立見麋鹿游於此庭矣穆不從瑀出城大哭舉手謝城曰吾不復見汝矣還而引被覆面不與人言不食七日輿疾而歸旦夕祈死夜夢乘青龍上天至屋而止寤而歎曰龍飛在天今止於屋屋之為字尸下至也龍飛至尸吾其死也古之君子不卒內寢況吾正士乎遂還酒泉南山赤崖閣飲氣而卒祈嘉祈嘉字孔賓酒泉人也少清貧好學年二十餘夜忽窗中有聲呼曰祈孔賓祈孔賓隱去來隱去來修飾人世甚苦不可諧所得未毛銖所喪如山崖旦而逃去西至敦煌依學官誦書貧無衣食為書生都養以自給遂博通經傳精究大義西游海渚教授門生百餘人張重華徵為儒林祭酒性和裕教授不倦依孝經作二九神經在朝卿士郡縣守令彭和正等受業獨拜牀下者二千餘人天錫謂為先生而不名之竟以壽終瞿硎先生瞿硎先生者不得姓名亦不知何許人也太和末常居宣城郡界文脊山中山有瞿硎因以為名焉大司馬桓溫嘗往造之既至見先生被鹿裘坐於石室神無忤色溫及僚佐數十人皆莫測之乃命伏滔為之銘贊竟卒於山中謝敷謝敷字慶緒會稽人也性澄靖寡欲入太平山十餘年鎮軍郗愔召為主簿臺徵博士皆不就初月犯少微少微一名處士星占者以隱士當之譙國戴逵有美才人或憂之俄而敷死故會稽人士以嘲吳人云吳中高士便是求死不得死戴逵戴逵字安道譙國人也少博學好談論善屬文能鼓琴工書畫其餘巧藝靡不畢綜總角時以雞卵汁溲白瓦屑作鄭玄碑又為文而自鐫之詞麗器妙時人莫不驚歎性不樂當世常以琴書自娛師事術士范宣於豫章宣異之以兄女妻焉太宰武陵王晞聞其善鼓琴使人召之逵對使者破琴曰戴安道不為王門伶人晞怒乃更引其兄述述聞命欣然擁琴而往逵後徙居會稽之剡縣性高潔常以禮度自處深以放達為非道乃著論曰夫親沒而採藥不反者不仁之子也君危而屢出近關者苟免之臣也而古之人未始以彼害名教之體者何達其旨故也達其旨故不惑其迹若元康之人可謂好遁跡而不求其本故有捐本徇末之弊舍實逐聲之行是猶美西施而學其顰眉慕有道而折其巾角所以為慕者非其所以為美徒貴貌似而已矣夫紫之亂朱以其似朱也故鄉原似中和所以亂德放者似達所以亂道然竹林之為放有疾而為顰者也元康之為放無德而折巾者也可無察乎且儒家尚譽者本以興賢也既失其本則有色取之行懷情喪真以容貌相欺其弊必至於末僞道家去名者欲以篤實也苟失其本又有越檢之行情禮俱虧則仰詠兼忘其弊必至於本薄夫僞薄者非二本之失而為弊者必託二本以自通夫道有常經而弊無常情是以六經有失王政有弊苟乖其本固聖賢所無奈何也嗟夫行道之人自非性足體備暗蹈而當者亦曷能不棲情古烈擬規前修苟迷擬之然後動議之然後言固當先辨其趣舍之極求其用心之本識其枉尺直尋之旨採其被褐懷玉之由若斯塗雖殊而其歸可觀也跡雖亂而其契不乖也不然則流遁忘反為風波之行自驅以物自誑以僞外眩囂華內喪道實以矜尚奪其真主以塵垢翳其天正貽笑千載可不慎歟孝武帝時以散騎常侍國子博士纍徵辭父疾不就郡縣敦逼不已乃逃於吳吳國內史王珣有別館在武丘山逵潛詣之與珣游處積旬會稽內史謝玄慮逵遠遁不反乃上疏曰伏見譙國戴逵希心俗表不嬰世務棲遲衡門與琴書為友雖策命屢加幽操不回超然絶跡自求其志且年垂耳順常抱羸疾時或失適轉至委篤今王命未回將離風霜之患陛下既已愛而器之亦宜使其身名並存請絶其召命疏奏帝許之逵復還剡後王珣為尚書僕射上疏復請徵為國子祭酒加散騎常侍徵之復不至太元二十年皇太子始出東宮太子太傅會稽王道子少傅王雅詹事王珣又上疏曰逵執操貞厲含味獨游年在耆老清風彌劭東宮虛德式延事外宜加旌命以參僚侍逵既重幽居之操必以難進為美宜下所在備禮發遣會病卒長子勃有父風義熙初以散騎侍郎徵不起尋卒龔玄之龔玄之字道玄武陵漢壽人也父登歷長沙相散騎常侍玄之好學潛默安於陋巷州舉秀才公府辟不就孝武帝下詔曰夫哲王御世必搜揚幽隱故空谷流縶維之詠丘園旅束帛之觀譙國戴逵武陵龔玄之並高尚其操依仁游藝潔己貞鮮學弘儒業朕虛懷久矣二三君子豈其戢賢於懷抱哉思挹雅言虛誠諷議可並以為散騎常侍領國子博士指下所在備禮發遣不得循常以稽側席之望郡縣敦逼苦辭疾篤不行尋卒時年五十八弟子元壽亦有德操高尚不仕舉秀才及州辟召並稱疾不就孝武帝以太學博士散騎侍郎給事中纍徵遂不起卒於家陶淡陶淡字處靜太尉侃之孫也父夏以無行被廢淡幼孤好導養之術謂仙道可祈年十五六便服食絶穀不婚娶家纍千金僮客百數淡終日端拱曾不營問頗好讀易善卜筮於長沙臨湘山中結廬居之養一白鹿以自偶親故有候之者輒移渡澗水莫得近之州舉秀才淡聞遂轉逃羅縣埤山中終身不返莫知所終陶潛陶潛字元亮大司馬侃之曾孫也祖茂武昌太守潛少懷高尚博學善屬文穎脫不羈任真自得為鄉鄰之所貴嘗著五柳先生傳以自況曰先生不知何許人不詳姓字宅邊有五柳樹因以為號焉間靜少言不慕榮利好讀書不求甚解每有會意欣然忘食性嗜酒而家貧不能得親舊知其如此或置酒招之造飲必盡期在必醉既醉而退曾不吝情環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也常著文章自娛頗示己志忘懷得失以此自終其自序如此時人謂之實録以親老家貧起為州祭酒不堪吏職少日自解歸州召主簿不就躬耕自資遂抱羸疾復為鎮軍建威參軍謂親朋曰聊欲絃歌以為三徑之資可乎執事者聞之以為彭澤令在縣公田悉令種秫穀曰令吾常醉於酒足矣妻子固請種粳乃使一頃五十畝種秫五十畝種粳素簡貴不私事上官郡遣督郵至縣吏白應束帶見之潛歎曰吾不能為五斗米折腰拳拳事鄉里小人邪義熙二年解印去縣乃賦歸去來其辭曰歸去來兮田園將蕪胡不歸既自以心為形役奚惆悵而獨悲悟已往之不諫知來者之可追實迷途其未遠覺今是而昨非舟遙遙以輕揚風飄飄而吹衣問征夫以前路恨晨光之希微乃瞻衡宇載欣載奔僮僕來迎稚子候門三徑就荒松菊猶存攜幼入室有酒盈樽引壺觴以自酌眄庭柯以怡顏倚南窗以寄傲審容膝之易安園日涉而成趣門雖設而常關策扶老而流憩時翹首而遐觀雲無心而出岫鳥倦飛而知還景翳翳其將入撫孤松而盤桓歸去來兮請息交以絶游世與我而相遺復駕言兮焉求悅親戚之情話樂琴書以消憂農人告余以暮春將有事乎西疇或命巾車或棹孤舟既窈窕以尋壑亦崎嶇而經丘木欣欣以向榮泉涓涓而始流善萬物之得時感吾生之行休已矣乎寓形宇內復幾時曷不委心任去留胡為乎遑遑欲何之富貴非吾願帝鄉不可期懷良晨以孤往或植杖而藝登東臯以舒嘯臨清流而賦詩聊乘化而歸盡樂夫天命復奚疑頃之徵著作郎不就既絶州郡覲謁其鄉親張野及周旋人羊松齡寵遵等或有酒要之或要之共至酒坐雖不識主人亦欣然無忤酣醉便反未嘗有所造詣所之唯至田舍及廬山游觀而已刺史王弘以元熙中臨州甚欽遲之後自造焉潛稱疾不見既而語人云我性不狎世因疾守間幸非潔志慕聲豈敢以王公紆軫為榮邪夫謬以不賢此劉公幹所以招謗君子其罪不細也弘每令人候之密知當往廬山乃遣其故人龐通之等齎酒先於半道要之潛既遇酒便引酌野亭欣然忘進弘乃出與相見遂歡宴窮日潛無履弘顧左右為之造履左右請履度潛便於坐申腳令度焉弘要之還州問其所乘答云素有腳疾向乘籃輿亦足自反乃令一門生二兒共輿之至州而言笑賞適不覺其有羡於華軒也弘後欲見輒於林澤間候之至於酒米乏絶亦時相贍其親朋好事或載酒肴而往潛亦無所辭焉每一醉則大適融然又不營生業家務悉委之兒僕未嘗有喜慍之色惟遇酒則飲時或無酒亦雅詠不輟嘗言夏月虛間高臥北窗之下清風颯至自謂羲皇上人性不解音而畜素琴一張絃徽不具每朋酒之會則撫而和之曰但識琴中趣何勞絃上聲以宋元嘉中卒時年六十三所有文集並行於世史臣曰君子之行殊塗顯晦之謂也出則允釐庶政以道濟時處則振拔囂埃以卑自牧詳求厥義其來敻矣公和之居窟室裳唯編草誡叔夜而凝神鑒威輦之處叢祠衣無全帛對子荊而陳貞則並滅景而弗追柳禽尚平之流亞夏統遠邇稱其孝友宗黨高其諒直歌小海之曲則伍胥猶存固貞石之心則公閭尤愧時幸洛濱之觀信乎茲言宋纖幼懷遠操清規映拔楊宣頌其畫象馬岌歎其人龍玄虛之號實斯為美餘之數子或移病而去官或著論而矯俗或箕踞而對時人或弋釣而棲衡泌含和隱璞乘道匿輝不屈其志激清風於來葉者矣贊曰厚秩招纍修名順欲確乎羣士超然絶俗養粹巖阿銷聲林曲激貪止競永垂高躅
