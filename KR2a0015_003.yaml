body:
  text: 晉書卷三帝紀第三武帝武皇帝諱炎字安世文帝長子也寬惠仁厚沈深有度量魏嘉平中封北平亭侯歷給事中奉車都尉中壘將軍加散騎常侍纍遷中護軍假節迎常道鄉公於東武陽遷中撫軍進封新昌鄉侯及晉國建立為世子拜撫軍大將軍開府副二相國初文帝以景帝既宣帝之嫡早世無後以帝弟攸為嗣特加愛異自謂攝居相位百年之後大業宜歸攸每曰此景王之天下也吾何與焉將議立世子屬意於攸何曾等固爭曰中撫軍聰明神武有超世之才髮委地手過膝此非人臣之相也由是遂定咸熙二年五月立為晉王太子八月辛卯文帝崩太子嗣相國晉王位下令寬刑宥罪撫衆息役國內行服三日是月長人見於襄武長三丈告縣人王始曰今當太平九月戊午以魏司徒何曾為丞相鎮南將軍王沈為御史大夫中護軍賈充為衛將軍議郎裴秀為尚書令光祿大夫皆開府十一月初置四護軍以統城外諸軍乙未令諸郡中正以六條舉淹滯一曰忠恪匪躬二曰孝敬盡禮三曰友于兄弟四曰潔身勞謙五曰信義可復六曰學以為己是時晉德既洽四海宅心於是天子知曆數有在乃使太保鄭沖奉策曰咨爾晉王我皇祖有虞氏誕膺靈運受終于陶唐亦以命于有夏惟三后陟配于天而咸用光敷聖德自茲厥後天又輯大命于漢火德既衰乃眷命我高祖方軌虞夏四代之明顯我不敢知惟王乃祖乃父服膺明哲輔亮我皇家勳德光于四海格爾上下神祇罔不克順地平天成萬邦以應受上帝之命協皇極之中肆豫一人祗承天序以敬授爾位曆數實在爾躬允執其中天祿永終於戲王其欽順天命率循訓典底綏四國用保天休無替我二皇之弘烈帝初以禮讓魏朝公卿何曾王沈等固請乃從之泰始元年冬十二月丙寅設壇于南郊百僚在位及胸奴南單于四夷會者數萬人柴燎告類于上帝曰皇帝臣炎敢用玄牡明告于皇皇后帝魏帝稽協皇運紹天明命以命炎昔者唐堯熙隆大道禪位虞舜舜又以禪禹邁德垂訓多歷年載暨漢德既衰太祖武皇帝撥亂濟時扶翼劉氏又用受命于漢粵在魏室仍世多故幾於顛墜實賴有晉匡拯之德用獲保厥肆祀弘濟于艱難此則晉之有大造于魏也誕惟四方罔不祗順廓清梁岷包懷揚越八紘同軌祥瑞屢臻天人協應無思不服肆豫憲章三后用集大命于茲炎維德不嗣辭不獲命於是羣公卿士百辟庶僚黎獻陪隸暨于百蠻君長僉曰皇天鑒下求人之瘼既有成命固非克讓所得距違天序不可以無統人神不可以曠主炎虔奉皇運寅畏天威敬簡元辰升壇受禪告類上帝永答衆望禮畢即洛陽宮幸太極前殿詔曰昔朕皇祖宣王聖哲欽明誕應期運熙帝之載肇啓洪基伯考景王履道宣猷緝熙諸夏至于皇考文王睿哲光遠允協靈祇應天順時受茲明命仁濟于宇宙功格于上下肆魏氏弘鑒于古訓儀刑于唐虞疇咨羣后爰輯大命于朕身豫一人畏天之命用不敢違惟朕寡德負荷洪烈託于王公之上以君臨四海惴惴惟懼罔知所濟惟爾股肱爪牙之佐文武不二之臣乃祖乃父實左右我先王光隆我大業思與萬國共享休祚於是大赦改元賜天下爵人五級魚衆寡孤獨不能自存者穀人五斛復天下租賦及關市之稅一年逋債宿負皆勿收除舊嫌解禁錮亡官失爵者悉復之丁卯遣太僕劉原告于太廟封魏帝為陳留王邑萬戶居於鄴宮魏氏諸王皆為縣侯追尊宣王為宣皇帝景王為景皇帝文王為文皇帝宣王妃張氏為宣穆皇后尊太妃王氏曰皇太后宮曰崇化封皇叔祖父孚為安平王皇叔父幹為平原王亮為扶風王胄為東莞王駿為汝陰王肜為梁王倫為琅邪王皇弟攸為齊王鑒為樂安王機為燕王皇從伯父望為義陽王皇從叔父輔為渤海王晃為下邳王瓌為太原王圭為高陽王衡為常山王子文為沛王泰為隴西王權為彭城王綏為范陽王遂為濟南王遜為譙王睦為中山王陵為北海王斌為陳王皇從父兄洪為河間王皇從父弟楙為東平王以驃騎將軍石苞為大司馬封樂陵公車騎將軍陳騫為高平公衛將軍賈充為車騎將軍魯公尚書令裴秀為巨鹿公侍中荀勗為濟北公太保鄭沖為太傅壽光公太尉王祥為太保睢陵公丞相何曾為太尉朗陵公御史大夫王沈為驃騎將軍博陵公司空荀顗為臨淮公鎮北大將軍衛瓘為災陽公其餘增封進爵各有差文武普增位二等改景初曆為太始曆臘以酉社以丑戊辰下詔大弘儉約出御府珠玉玩好之物頒賜王公以下各有差置中軍將軍以統宿衛七軍己巳詔陳留王載天子旌旗備五時副車行魏正朔郊祀天地禮樂制度皆如魏舊上書不稱臣賜山陽公劉康安樂公劉禪子弟一人為駙馬都尉乙亥以安平王孚為太宰假黃鉞大都督中外諸軍事詔曰昔王淩謀廢齊王而王竟不足以守位鄧艾雖矜功失節然束手受罪今大赦其家還使立後興滅繼絶約法省刑除魏氏宗室禁錮諸將吏遭三年喪者遣寧終喪百姓復其徭役罷部曲將長吏以下質任省郡國御調禁樂府靡麗百戲之伎及雕文遊畋之具開直言之路置諫官以掌之是月鳳皇六青龍三白龍二麒麟各一見于郡國二年春正月丙戌遣兼侍中侯史光等持節四方循省風俗除禳祝之不在祀典者丁亥有司請建七廟帝重其役不許庚寅罷雞鳴歌辛丑尊景皇帝夫人羊氏曰景皇后宮曰弘訓丙午立皇后楊氏二月除漢宗室禁錮己未常山王衡薨詔曰五等之封皆録舊勳本為縣侯者傳封次子為亭侯鄉侯為關內侯亭侯為關中侯皆食本戶十分之一丁丑郊祀宣皇帝以配天宗祀文皇帝於明堂以配上帝庚午詔曰古者百官官針王闕然保氏特以諫諍為職今之侍中常侍實處此位擇其能正色弼違匡救不逮者以兼此選三月戊戌吳人來弔祭有司奏為答詔帝曰昔漢文光武懷撫尉他公孫述皆未正君臣之儀所以羈縻未賓也晧遣使之始未知國慶但以書答之夏五月戊辰詔曰陳留王操尚謙沖每事輒表非所以優崇之也主者喻意非大事皆使王官表上之壬子驃騎將軍博陵公王沈卒六月壬申濟南王遂薨秋七月辛巳營太廟致荊山之木采華山之石鑄銅柱十二塗以黃金鏤以百物綴以明珠戊戌譙王遜薨丙午晦日有蝕之八月丙辰省右將軍官初帝雖從漢魏之制既葬除服而深衣素冠降席撤膳哀敬如喪者戊辰有司奏改服進膳不許遂禮終而後復吉及太后之喪亦如之九月乙未散騎常侍皇甫陶傅玄領諫官上書諫諍有司奏請寢之詔曰凡關言人主人臣所至難而苦不能聽納自古忠臣直士之所慷慨也每陳事出付主者多從深刻乃云恩貸當由主上是何言乎其詳評議戊戌有司奏大晉繼三皇之蹤蹈舜禹之迹應天順時受禪有魏宜一用前代正朔服色皆如虞遵唐故事奏可冬十月丙午朔日有蝕之丁未詔曰昔舜葬蒼梧農不易畝禹葬成紀市不改肆上惟祖考清簡之旨所徙陵十里內居人動為煩擾一切停之十一月己卯倭人來獻方物并圜丘方丘於南北郊二至之祀合於二郊罷山陽公國督軍除其禁制己丑追尊景帝夫人夏侯氏為景懷皇后辛卯遷祖禰神主于太廟十二月罷農官為郡縣是歲鳳皇六青龍十黃龍九麒麟各一見于郡國三年春正月癸丑白龍二見于弘農澠池丁卯立皇子衷為皇太子詔曰朕以不德託于四海之上兢兢祗畏懼無以康濟𧜛內思與天下式明王度正本清源於置胤樹嫡非所先務又近世每建太子寬宥施惠之事間不獲已順從王公卿士之議耳方今世運垂平將陳之以德義示之以好惡使百姓蠲多幸之慮篤終始之行曲惠小仁故無取焉咸使知聞三月戊寅初令二千石得終三年喪丁未晝昏罷武衛將軍官以李喜為太子太傅太山石崩夏四月戊午張掖太守焦勝上言氐池縣大柳谷口有玄石一所白畫成文實大晉之休祥圖之以獻詔以制幣告于太廟藏之天府秋八月罷都護將軍以其五署還光祿勳九月甲申詔曰古者以德詔爵以庸制祿雖下士猶食上農外足以奉公忘私內足以養親施惠今在位者祿不代耕非所以崇化之本也其議增吏俸賜王公以下帛各有差以太尉何曾為太保義陽王望為太尉司空荀顗為司徒冬十月聽士卒遭父母喪者非在疆埸皆得奔赴十二月徙宗聖侯孔震為奉聖亭侯山陽公劉康來朝禁星氣讖緯之學四年春正月辛未以尚書令裴秀為司空丙戌律令成封爵賜帛各有差有星孛于軫丁亥帝耕於藉田戊子詔曰古設象刑而衆不犯今雖參夷而姦不絶何德刑相去之遠哉先帝深愍黎元哀矜庶獄乃命羣后考正典刑朕守遺業永惟保皇基思與萬國以無為為政方今陽春養物東作始興朕親率王公卿士耕藉田千畝又律令既就班之天下將以簡法務本惠育海內宜寬有罪使得自新其大赦天下長吏郡丞長史各賜馬一匹二月庚子增置山陽公國相郎中令陵令雜工宰人鼓吹車馬各有差罷中軍將軍置北軍中候官甲寅以東海劉儉有至行拜為郎以中軍將軍羊祜為尚書左僕射東莞王胄為尚書右僕射三月戊子皇太后王氏崩夏四月戊戌太保睢陵公王祥薨己亥祔葬文明皇后王氏於崇陽陵罷振威揚威護軍官置左右積弩將軍六月丙申朔詔曰郡國守相三載一巡行屬縣必以春此古者所以述職宣風展義也見長吏觀風俗協禮律考度量存問耆老親見百年録囚徒理寃枉詳察政刑得失知百姓所患苦無有遠近便若朕親臨之敦喻五教勸務農功勉勵學者思勤正典無為百家庸末致遠必泥士庶有好學篤道孝弟忠信清白異行者舉而進之有不孝敬於父母不長悌於族黨悖禮棄常不率法令者糾而罪之田疇闢生業修禮教設禁令行則長吏之能也人窮匱農事荒姦盜起刑獄煩下陵上替禮義不興斯長吏之否也若長吏在官公廉慮不及私正色直節不飾名譽者及身行貪穢諂黷求容公節不立而私門日富者並謹察之揚清激濁舉善彈違此朕所以垂拱總綱責成於良二千石也於戲戒哉秋七月太山石崩衆星西流戊午遣使者侯史光循行天下己卯謁崇陽陵九月青徐兗豫四州大水伊洛溢合於河開倉以振之詔曰雖詔有所欲及奏得可而於事不便者皆不可隱情冬十月吳將施績入江夏萬郁寇襄陽遣太尉義陽王望屯龍陂荊州刺史胡烈擊敗郁吳將顧容寇鬱林太守毛炅大破之斬其交州刺史劉俊將軍修則十一月吳將丁奉等出芍陂安東將軍汝陰王駿與義陽王望擊走之己未詔王公卿尹及郡國守相舉賢良方正直言之士十二月班五條詔書於郡國一曰正身二曰勤百姓三曰撫孤寡四曰敦本息末五曰去人事庚寅帝臨聽訟觀録廷尉洛陽獄囚親平決焉扶南林邑各遣使來獻五年春正月癸巳申戒郡國計吏守相令長務盡地利禁遊食商販丙申帝臨聽訟觀録囚徒多所原遣青龍二見於滎陽二月以雍州隴右五郡及涼州之金城梁州之陰平置秦州辛巳白龍二見於趙國青徐兗三州水遣使振恤之壬寅以尚書左僕射羊祜都督荊州諸軍事征東大將軍衛瓘都督青州諸軍事東莞王胄鎮東大將軍都督徐州諸軍事丁亥詔曰古者歲書羣吏之能否三年而誅賞之諸令史前後但簡遣疏劣而無有勸進非黜陟之謂也其條勤能有稱尤異者歲以為常吾將議其功勞己未詔蜀相諸葛亮孫京隨才署吏夏四月地震五月辛卯朔鳳皇見于趙國曲赦交趾九真日南五歲刑六月鄴奚官督郭廙上疏陳五事以諫言甚切直擢為屯留令西平人麴路伐登聞鼓言多祅謗有司奏棄市帝曰朕之過也捨而不問罷鎮軍將軍復置左右將軍官秋七月延羣公詢讜言九月有星孛于紫宮冬十月丙子以汲郡太守王宏有政績賜穀千斛十一月追封諡皇弟兆為城陽哀王以皇子景度嗣十二月詔州郡舉勇猛秀異之才六年春正月丁亥朔帝臨軒不設樂吳將丁奉入渦口揚州刺史牽弘擊走之三月赦五歲刑已下夏四月白龍二見於東莞五月立壽安亭侯承為南宮王六月戊午秦州刺史胡烈擊叛虜於萬斛堆力戰死之詔遣尚書石鑒行安西將軍都督秦州諸軍事與奮威護軍田章討之秋七月丁酉復隴右五郡遇寇害者租賦不能自存者廩貸之乙巳城陽王景度薨詔曰自泰始以來大事皆撰録祕書寫副後有其事輒宜綴集以為常丁未以汝陰王駿為鎮西大將軍都督雍涼二州諸軍事九月大宛獻汗血馬焉耆來貢方物冬十一月幸辟雍行鄉飲酒之禮賜太常博士學生帛牛酒各有差立皇子柬為汝南王十二月吳夏口督前將軍孫秀帥衆來奔拜驃騎將軍開府儀同三司封會稽公戊辰復置鎮軍官七年春正月丙午皇太子冠賜王公以下帛各有差胸奴帥劉猛叛出塞三月孫晧帥衆趨壽陽遣大司馬望屯淮北以距之丙戌司空巨鹿公裴秀薨癸巳以中護軍王業為尚書左僕射高陽王圭為尚書右僕射孫秀部將何崇帥衆五千人來降夏四月九真太守董元為吳將虞泛所攻軍敗死之北地胡寇金城涼州刺史牽弘討之羣虜內叛圍弘於青山弘軍敗死之五月立皇子憲為城陽王雍涼秦三州飢赦其境內殊死以下閏月大雩太官減膳詔交趾三郡南中諸郡無出今年戶調六月詔公卿以下舉將帥各一人辛丑大司馬義陽王望薨大雨霖伊洛河溢流居人四千餘家殺三百餘人有詔振貸給棺秋七月癸酉以車騎將軍賈充為都督秦涼二州諸軍事吳將陶璜等圍交趾太守楊稷與鬱林太守毛炅及日南等三郡降於吳八月丙戌以征東大將軍衛瓘為征北大將軍都督幽州諸軍事丙申城陽王憲薨分益州之南中四郡置寧州曲赦四郡殊死已下冬十月丁丑日有蝕之十一月丁巳衛公姬署薨十二月大雪罷中領軍并北軍中候以光祿大夫鄭袤為司空八年春正月監軍何楨討胸奴劉猛纍破之左部帥李恪殺猛而降癸亥帝耕于藉田二月乙亥禁雕文綺組非法之物壬辰太宰安平王孚薨詔內外羣官舉任邊郡者各三人帝與右將軍皇甫陶論事陶與帝爭言散騎常侍鄭徽表請罪之帝曰讜言謇諤所望於左右也人主常以阿媚為患豈以爭臣為損哉徽越職妄奏豈朕之意遂免徽官夏四月置後將軍以備四軍六月益州牙門張弘誣其刺史皇甫晏反殺之傳首京師弘坐伏誅夷三族壬辰大赦丙申詔復隴右四郡遇寇害者田租秋七月以車騎將軍賈充為司空九月吳西陵督步闡來降拜衛將軍開府儀同三司封宜都公吳將陸抗攻闡遣車騎將軍羊祜帥衆出江陵荊州刺史楊肇迎闡於西陵巴東監軍徐胤擊建平以救闡冬十月辛未朔日有蝕之十二月肇攻抗不克而還闡城陷為抗所禽九年春正月辛酉司空密陵侯鄭袤薨二月癸巳司徒樂陵公石苞薨立安平亭侯隆為安平王三月立皇子祗為東海王夏四月戊辰朔日有蝕之五月旱以太保何曾領司徒六月乙未東海王祗薨秋七月丁酉朔日有蝕之吳將魯淑圍弋陽征虜將軍王渾擊敗之罷五官左右中郎將弘訓太僕衛尉大長秋等官鮮卑寇廣寧殺略五千人詔聘公卿以下子女以備六宮采擇未畢權禁斷婚姻冬十月辛巳制女年十七父母不嫁者使長吏配之十一月丁酉臨宣武觀大閲諸軍甲辰乃罷十年春正月辛亥帝耕于藉田閏月癸酉太傅壽光公鄭沖薨己卯高陽王圭薨庚辰太原王瓌薨丁亥詔曰嫡庶之別所以辨上下明貴賤而近世以來多皆內寵登妃后之職亂尊卑之序自今以後皆不得登用妾媵以為嫡正二月分幽州五郡置平州三月癸亥日有蝕之夏四月己未太尉臨淮公荀顗薨六月癸巳臨聽訟觀録囚徒多所原遣是夏大蝗秋七月丙寅皇后楊氏崩壬午吳平虜將孟泰偏將軍王嗣等帥衆降八月涼州虜寇金城諸郡鎮西將軍汝陰王駿討之斬其帥乞文泥等戊申葬元皇后于峻陽陵九月癸亥以大將軍陳騫為太尉攻拔吳枳里城獲吳立信校尉莊祐吳將孫遵李承帥衆寇江夏太守嵇喜擊破之立河橋于富平津冬十一月立城東七里澗石橋庚午帝臨宣武觀大閲諸軍十二月有星孛于軫置藉田令立太原王子緝為高陽王吳威北將軍嚴聰揚威將軍嚴整偏將軍朱買來降是歲鑿陝南山決河東注洛以通運漕咸寧元年春正月戊午朔大赦改元二月以將士應已娶者多家有五女者給復辛酉以故鄴令夏謖有清稱賜穀百斛以奉祿薄賜公卿以下帛有差叛虜樹機能送質請降夏五月下邳廣陵大風拔木壞廬舍六月鮮卑力微遣子來獻吳人寇江夏西域戊己校尉馬循討叛鮮卑破之斬其渠帥戊申置太子詹事官秋七月甲申晦日有蝕之郡國螟八月壬寅沛王子文薨以故太傅鄭沖太尉荀顗司徒石苞司空裴秀驃騎將軍王沈安平獻王孚等及太保何曾司空賈充太尉陳騫中書監荀勗平南將軍羊祜齊王攸等皆列於銘饗九月甲子青州螟徐州大水冬十月乙酉常山王殷薨癸巳彭城王權薨十一月癸亥大閲於宣武觀至于己巳十二月丁亥追尊宣帝廟曰高祖景帝曰世宗文帝曰太祖是月大疫洛陽死者太半封裴頠為巨鹿公二年春正月以疾疫廢朝賜諸散吏至于士卒絲各有差二月丙戌河間王洪薨甲午赦五歲刑以下東夷八國歸化并州虜犯塞監并州諸軍事胡奮擊破之初燉煌太守尹璩卒州以燉煌令梁澄領太守事議郎令狐豐廢澄自領郡事豐死弟宏代之至是涼州刺史楊欣斬宏傳首洛陽先是帝不豫及瘳羣臣上壽詔曰每念頃遇疫氣死亡為之愴然豈以一身之休息忘百姓之艱邪諸上禮者皆絶之夏五月鎮西大將軍汝陰王駿討北胡斬其渠帥吐敦立國子學庚午大雩六月癸丑薦荔支于太廟甲戌有星孛于氐自春旱至于是月始雨吳京下督孫楷帥衆來降以為車騎將軍封丹楊侯白龍二見于新興井中秋七月有星孛于大角吳臨平湖自漢末壅塞至是自開父老相傳云此湖塞天下亂此湖開天下平癸丑安平王隆薨東夷十七國內附河南魏郡暴水殺百餘人詔給棺鮮卑阿羅多等寇邊西域戊己校尉馬循討之斬首四千餘級獲生九千餘人於是來降八月庚辰河東平陽地震己亥以太保何曾為太傅太尉陳騫為大司馬司空賈充為太尉鎮軍大將軍齊王攸為司空有星孛于太微九月又孛于翼丁未起太倉於城東常平倉於東西市閏月荊州五郡水流四千餘家冬十月以汝陰王駿為征西大將軍平南將軍羊祜為征南大將軍丁卯立皇后楊氏大赦賜王公以下及于魚衆寡各有差十一月白龍二見于梁國十二月徵處士安定皇甫謐為太子中庶子封后父鎮軍將軍楊駿為臨晉侯是月以平州刺史傅詢前廣平太守孟桓清白有聞詢賜帛二百匹桓百匹三年春正月丙子朔日有蝕之立皇子裕為始平王安平穆王隆弟敦為安平王詔曰宗室戚屬國之枝葉欲令奉率德義為天下式然處富貴而能慎行者寡召穆公糾合兄弟而賦唐棣之詩此姬氏所以本枝百世也今以衛將軍扶風王亮為宗師所當施行皆咨之於宗師也庚寅始平王裕薨有星孛於西方使征北大將軍衛瓘討鮮卑力微三月平虜護軍文淑討叛虜樹機能等並破之有星孛于胃乙未帝將射雉慮損麥苗而止夏五月戊子吳將邵凱夏祥帥衆七千餘人來降六月益梁八郡水殺三百餘人沒邸閣別倉秋七月以都督豫州諸軍事王渾為都督揚州諸軍事中山王睦以罪廢為丹水侯八月癸亥徙扶風王亮為汝南王東莞王胄為琅邪王汝陰王駿為扶風王琅邪王倫為趙王渤海王輔為太原王太原王顒為河間王北海王陵為任城王陳王斌為西河王汝南王柬為南陽王濟南王耽為中山王河間王威為章武王立皇子瑋為始平王允為濮陽王該為新都王遐為清河王巨平侯羊祜為南城侯以汝南王亮為鎮南大將軍大風拔樹暴寒且冰郡國五隕霜傷穀九月戊子以左將軍胡奮為都督江北諸軍事兗豫徐青荊益梁七州大水傷秋稼詔振給之立齊王子蕤為遼東王贊為廣漢王冬十一月丙戌帝臨宣武觀大閲至于壬辰十二月吳將孫慎入江夏汝南略千餘家而去是歲西北雜虜及鮮卑胸奴五溪蠻夷東夷三國前後十餘輩各帥種人部落內附四月春正月庚午朔日有蝕之三月甲申尚書左僕射盧欽卒辛酉以尚書右僕射山濤為尚書左僕射東夷六國來獻夏四月蚩尤旗見於東井六月丁未陰平廣武地震甲子又震涼州刺史楊欣與虜若羅拔能等戰于武威敗績死之弘訓皇后羊氏崩秋七月己丑祔葬景獻皇后羊氏于峻平陵庚寅高陽王緝薨癸巳范陽王綏薨荊揚郡國二十皆大水九月以太傅何曾為太宰辛巳以尚書令李胤為司徒冬十月以征北大將軍衛瓘為尚書令揚州刺史應綽伐吳皖城斬首五千級焚穀米百八十萬斛十一月辛巳太醫司馬程據獻雉頭裘帝以奇技異服典禮所禁焚之於殿前甲申敕內外敢有犯者罪之吳昭武將軍劉翻厲武將軍祖始來降辛卯以尚書杜預都督荊州諸軍事征南大將軍羊祜卒十二月乙未西河王斌薨丁未太宰朗陵公何曾薨是歲東夷九國內附五年春正月虜帥樹機能攻陷涼州乙丑使討虜護軍武威太守馬隆擊之二月甲午白麟見于平原三月胸奴都督拔奕虛帥部落歸化乙亥以百姓飢饉減御膳之半有星孛于柳夏四月又孛于女御大赦降除部曲督以下質任丁亥郡國八雨雹傷秋稼壞百姓廬舍秋七月有星孛于紫宮九月甲午麟見于河南冬十月戊寅胸奴餘渠都督獨雍等帥部落歸化汲郡人不準掘魏襄王冢得竹簡小篆古書十餘萬言藏于祕府十一月大舉伐吳遣鎮軍將軍琅邪王胄出塗中安東將軍王渾出江西建威將軍王戎出武昌平南將軍胡奮出夏口鎮南大將軍杜預出江陵龍驤將軍王濬廣武將軍唐彬率巴蜀之卒浮江而下東西凡二十餘萬以太尉賈充為大都督行冠軍將軍楊濟為副總統衆軍十二月馬隆擊叛虜樹機能大破斬之涼州平肅慎來獻楛矢石砮太康元年春正月己丑朔五色氣冠日癸丑王渾克吳尋陽賴鄉諸城獲吳武威將軍周興二月戊午王濬唐彬等克丹楊城庚申又克西陵殺西陵都督鎮軍將軍留憲征南將軍成璩西陵監鄭廣壬戌濬又克夷道樂鄉城殺夷道監陸晏水軍都督陸景甲戌杜預克江陵斬吳江陵督伍延平南將軍胡奮克江安於是諸軍並進樂鄉荊門諸戍相次來降乙亥以濬為都督益梁二州諸軍事復下詔曰濬彬東下掃除巴丘與胡奮王戎共平夏口武昌順流長騖直造陵與奮戎審量其宜杜預當鎮靜零桂懷輯衡陽大兵既過荊州南境固當傳檄而定預當分萬人給濬七千給彬夏口既平奮宜以七千人給濬武昌既了戎當以六千人增彬太尉充移屯項總督諸方濬進破夏口武昌遂泛舟東下所至皆平王渾周浚與吳丞相張悌戰于版橋大破之斬悌及其將孫震沈瑩傳首洛陽孫晧窮蹙請降送璽綬於琅邪王胄三月壬寅王濬以舟師至于建鄴之石頭孫晧大懼面縳輿櫬降于軍門濬杖節解縛焚櫬送于京都收其圖籍克州四郡四十三縣三百一十三戶五十二萬三千吏三萬二千兵二十三萬男女口二百三十萬其牧守已下皆因吳所置除其苛政示之簡易吳人大悅乙酉大赦改元大酺五日恤孤老困窮夏四月河東高平雨雹傷秋稼遣兼侍中張側黃門侍郎朱震分使揚越慰其初附白麟見于頓丘三河魏郡弘農雨雹傷宿麥五月辛亥封孫晧為歸命侯拜其太子為中郎諸子為郎中吳之舊望隨才擢孫氏大將戰亡之家徙於壽陽將吏渡江復十年百姓及百工復二十年丙寅帝臨軒大會引晧升殿羣臣咸稱萬歲丁卯薦酃淥酒于太廟郡國六雹傷秋稼庚午詔諸士卒年六十以上罷歸于家庚辰以王濬為輔國大將軍襄陽侯杜預當陽侯王戎安豐侯唐彬上庸侯賈充琅邪王胄以下增封於是論功行封賜公卿以下帛各有差六月丁丑初置翊軍校尉官封丹水侯睦為高陽王甲申東夷十國歸化秋七月虜軻成泥寇西平浩亹殺督將以下三百餘人東夷二十國朝獻庚寅以尚書魏舒為尚書右僕射八月車師前部遣子入侍己未封皇弟延祚為樂平王白龍三見于永昌九月羣臣以天下一統屢請封襌帝謙讓弗許冬十月丁巳除五女復十二月戊辰廣漢王贊薨二年春二月淮南丹楊地震三月丙申安平王敦薨賜王公以下吳生口各有差詔選孫晧妓妾五千人入宮東夷五國朝獻夏六月東夷五國內附郡國十六雨雹大風拔樹壞百姓廬舍江夏泰山水流居人三百餘家秋七月上黨又暴風雨雹傷秋稼八月有星孛于張冬十月鮮卑慕容廆寇昌黎十一月壬寅大司馬陳騫薨有星孛于軒轅鮮卑寇遼西平州刺史鮮于嬰討破之三年春正月丁丑罷秦州并雍州甲午以尚書張華都督幽州諸軍事三月安北將軍嚴詢敗鮮卑慕容廆於昌黎殺傷數萬人夏四月庚午太尉魯公賈充薨閏月丙子司徒廣陸侯李胤薨癸丑白龍二見于濟南秋七月罷平州寧州刺史三年一入奏事九月東夷二十九國歸化獻其方物吳故將莞恭帛奉舉兵反攻害建鄴令遂圍揚州徐州刺史嵇喜討平之冬十二月甲申以司空齊王攸為大司馬督青州諸軍事鎮東大將軍琅邪王胄為撫軍大將軍汝南王亮為太尉光祿大夫山濤為司徒尚書令衛瓘為司空丙申詔四方水旱甚者無出田租四年春正月甲申以尚書右僕射魏舒為尚書左僕射下邳王晃為尚書右僕射戊午司徒山濤薨二月己丑立長樂亭侯實為北海王三月辛丑朔日有蝕之癸丑大司馬齊王攸薨夏四月任城王陵薨五月己亥大將軍琅邪王胄薨徙遼東王蕤為東萊王六月增九卿禮秩牂柯獠二千餘落內屬秋七月壬子以尚書右僕射下邳王晃為都督青州諸軍事丙寅兗州大水復其田租八月鄯善國遣子入侍假其歸義侯以隴西王泰為尚書右僕射冬十一月戊午新都王該薨以尚書左僕射魏舒為司徒十二月庚午大閲于宣武觀是歲河內及荊州揚州大水五年春正月己亥青龍二見于武庫井中二月丙寅立南宮王子玷為長樂王壬辰地震夏四月任城魯國池水赤如血五月丙午宣帝廟梁折六月初置黃沙獄秋七月戊申皇子恢薨任城梁國中山雨雹傷秋稼減天下戶課三分之一九月南安大風折木郡國五大水隕霜傷秋稼冬十一月甲辰太原王輔薨十二月庚午大赦林邑大秦國各遣使來獻閏月鎮南大將軍當陽侯杜預卒六年春正月甲申朔以比歲不登免租貸宿負戊辰以征南大將軍王渾為尚書左僕射尚書褚祀都督揚州諸軍事楊濟都督荊州諸軍事三月郡國六隕霜傷桑麥夏四月扶南等十國來獻參離四千餘落內附郡國四旱十大水壞百姓廬舍秋七月巴西地震八月丙戌朔日有蝕之減百姓綿絹三分之一白龍見于京兆以鎮軍大將軍王濬為撫軍大將軍九月丙子山陽公劉康薨冬十月南安山崩水出南陽郡獲兩足獸龜茲焉耆國遣子入侍十二月甲申大閲于宣武觀旬日而罷庚子撫軍大將軍襄陽侯王濬卒七年春正月甲寅朔日有蝕之乙卯詔曰比年災異屢發日蝕三朝地震山崩邦之不臧實在朕躬公卿大臣各上封事極言其故勿有所諱夏五月郡國十三旱鮮卑慕容廆寇遼東秋七月朱提山崩犍為地震八月東夷十一國內附京兆地震九月戊寅驃騎將軍扶風王駿薨郡國八大水冬十一月壬子以隴西王泰都督關中諸軍事十二月遣侍御史巡遭水諸郡出後宮才人妓女以下二百七十人歸于家始制大臣聽終喪三年己亥河陰雨赤雪二頃是歲扶南等二十一國馬韓等十一國遣使來獻八年春正月戊申朔日有蝕之太廟殿陷三月乙丑臨商觀震夏四月齊國天水隕霜傷麥六月魯國大風拔樹木壞百姓廬舍郡國八大水秋七月前殿地陷深數丈中有破船八月東夷二國內附九月改營太廟冬十月南康平固縣吏李豐反聚衆攻郡縣自號將軍十一月海安令蕭輔聚衆反十二月吳興人蔣迪聚黨反圍陽羡縣州郡捕討皆伏誅南夷扶南西域康居國各遣使來獻是歲郡國五地震九年春正月壬申朔日有蝕之詔曰興化之本由政平訟理也二千石長吏不能勤恤人隱而輕挾私故興長刑獄又多貪濁煩撓百姓其敕刺史二千石糾其穢濁舉其公清有司議其黜陟令內外羣官舉清能拔寒素江東四郡地震二月尚書右僕射陽夏侯胡奮卒以尚書朱整為尚書右僕射三月丁丑皇后親桑于西郊賜帛各有差壬辰初并二社為一夏四月江南郡國八地震隴西隕霜傷宿麥五月義陽王奇有罪黜為三縱亭侯詔內外羣官舉守令之才六月庚子朔日有蝕之徙章武王威為義陽王郡國三十二大旱傷麥秋八月壬子星隕如雨詔郡國五歲刑以下決遣無留庶獄九月東夷七國詣校尉內附郡國二十四螟冬十二月癸卯立河間平王洪子英為章武王戊申青龍黃龍各一見于魯國十年夏四月以京兆太守劉霄陽平太守梁柳有政績各賜穀千斛郡國八隕霜太廟成乙巳遷神主于新廟帝迎于道左遂祫祭大赦文武增位一等作廟者二等丁未尚書右僕射廣興侯朱整卒癸丑崇賢殿災五月鮮卑慕容廆來降東夷十一國內附六月庚子山陽公劉瑾薨復置二社冬十月壬子徙南宮王承為武邑王十一月丙辰守尚書令左光祿大夫荀勗卒帝疾瘳賜王公以下帛有差含章殿鞠室火甲申以汝南王亮為大司馬大都督假黃鉞改封南陽王柬為秦王始平王瑋為楚王濮陽王允為淮南王並假節之國各統方州軍事立皇子為長沙王穎為成都王晏為吳王熾為豫章王演為代王皇孫遹為廣陵王立濮陽王子迪為漢王始平王子儀為毗陵王汝南王次子羕為西陽公徙扶風王暢為順陽王暢弟歆為新野公琅邪王覲弟淡為東武公繇為東安公漼為廣陵公卷為東莞公改諸王國相為內史十二月庚寅太廟梁折是歲東夷絶遠三十餘國西南夷二十餘國來獻虜奚軻男女十萬口來降太熙元年春正月辛酉朔改元己巳以尚書左僕射王渾為司徒司空衛瓘為太保二月辛丑東夷七國朝貢琅邪王覲薨三月甲子以右光祿大夫石鑒為司空夏四月辛丑以侍中車騎將軍楊駿為太尉都督中外諸軍録尚書事己酉帝崩于含章殿時年五十五葬峻陽陵廟號世祖帝宇量弘厚造次必於仁恕容納讜正未嘗失色於人明達善謀能斷大事故得撫寧萬國綏靜四方承魏氏奢侈刻弊之後百姓思古之遺風乃厲以恭儉敦以寡欲有司嘗奏御牛青絲紖斷詔以青麻代之臨朝寬裕法度有恆高陽許允既為文帝所殺允子奇為太常丞帝將有事於太廟朝議以奇受害之門不欲接近左右請出為長史帝乃追述允夙望稱奇之才擢為祠部郎時論稱其夷曠平吳之後天下安遂怠於政術耽於遊宴寵愛后黨親貴當權舊臣不得專任彝章紊廢請謁行矣爰至末年知惠帝弗克負荷然恃皇孫聰睿故無廢立之心復慮非賈后所生終致危敗遂與腹心共圖後事説者紛然久而不定竟用王佑之謀遣太子母弟秦王柬都督關中楚王瑋淮南王允並鎮守要害以強帝室又恐楊氏之逼復以佑為北軍中候以典禁兵既而寢疾彌留至於大漸佐命元勳皆已先沒羣臣惶惑計無所從會帝小差有詔以汝南王亮輔政又欲令朝士之有名望年少者數人佐之楊駿祕而不宣帝復尋至迷亂楊后輒為詔以駿輔政促亮進發帝尋小間問汝南王來未意欲見之有所付託左右答言未至帝遂困篤中朝之亂實始於斯矣制曰武皇承基誕膺天命握圖御宇敷化導民以佚代勞以治易亂絶縑綸之貢去雕琢之飾制奢俗以變儉約止澆風而反淳朴雅好直言留心采擢劉毅裴楷以質直見容嵇紹許奇雖仇讐不棄仁以御物寬而得衆宏略大度有帝王之量焉於時民和俗靜家給人足聿修武用思啓封疆決神算於深衷斷雄圖於議表馬隆西伐王濬南征師不延時獯虜削迹兵無血刃揚越為墟通上代之不通服前王之未服禎祥顯應風教肅清天人之功成矣霸王之業大矣雖登封之禮讓而不為驕泰之心因斯以起見土地之廣謂萬葉而無虞覩天下之安謂千年而永治不知處廣以思狹則廣可長廣居治而忘危則治無常治加之建立非所委寄失才志欲就於升平行先迎於禍亂是猶將適越者指沙漠以遵途欲登山者涉舟航而覓路所趣逾遠所尚轉難南北倍殊高下相反求其至也不亦難乎況以新集易動之基而無久安難拔之慮故賈充凶豎懷姦志以擁權楊駿豺狼苞禍心以專輔及乎宮車晚出諒暗未周藩翰變親以成疏連兵競滅其本棟梁回忠而起偽擁衆各舉其威曾未數年綱紀大亂海內版蕩宗廟播遷帝道王猷反居文身之俗神州赤縣翻成被髮之鄉棄所大以資人掩其小而自託為天下笑其故何哉良由失慎於前所以貽患於後且知子者賢父知臣者明君子不肖則家亡臣不忠則國亂國亂不可以安也家亡不可以全也是以君子防其始聖人間其端而世祖惑荀勗之姦謀迷王渾之偽策心屢移於衆口事不定於己圖元海當除而不除卒令擾亂區夏惠帝可廢而不廢終使傾覆洪基夫全一人者德之輕拯天下者功之重棄一子者忍之小安社稷者孝之大況乎資三世而成業延二孽以喪之所謂取輕德而捨重功畏小忍而忘大孝聖賢之道豈若斯乎雖則善始於初而乖令終於末所以殷勤史策不能無慷慨焉
