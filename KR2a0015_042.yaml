body:
  text: 晉書卷四十二列傳第十二王渾子濟王渾字玄沖太原晉陽人也父昶魏司空渾沈雅有器量襲父爵京陵侯辟大將軍曹爽掾爽誅隨例免起為懷令參文帝安東軍事纍遷散騎黃門侍郎散騎常侍咸熙中為越騎校尉武帝受禪加揚烈將軍遷徐州刺史時年荒歲饑渾開倉振贍百姓賴之泰始初增封邑千八百戶久之遷東中郎將監淮北諸軍事鎮許昌數陳損益多見納用轉征虜將軍監豫州諸軍事假節領豫州刺史渾與吳接境宣布威信前後降附甚多吳將薛瑩魯淑衆號十萬淑向弋陽瑩向新息時州兵並放休息衆裁一旅浮淮潛濟出其不意瑩等不虞晉師之至渾擊破之以功封次子尚為關內侯遷安東將軍都督揚州諸軍事鎮壽春吳人大佃皖城圖為邊害渾遣揚州刺史應綽督淮南諸軍攻破之并破諸別屯焚其積穀百八十餘萬斛稻苗四千餘頃船六百餘艘渾遂陳兵東疆視其地形險易歷觀敵城察攻取之勢及大舉伐吳渾率師出橫江遣參軍陳慎都尉張喬攻尋陽瀨鄉又擊吳牙門將孔忠皆破之獲吳將周興等五人又遣殄吳護軍李純據高望城討吳將俞恭破之多所斬獲吳厲武將軍陳代平虜將軍朱明懼而來降吳丞相張悌大將軍孫震等率衆數萬指城陽渾遣司馬孫疇揚州刺史周浚擊破之臨陳斬二將及首虜七千八百級吳人大震孫晧司徒何植建威將軍孫晏送印節詣渾降既而王濬破石頭降孫晧威名益振明日渾始濟江登建鄴宮釃酒高會自以先據江上破晧中軍案甲不進致在王濬之後意甚愧恨有不平之色頻奏濬罪狀時人譏之帝下詔曰使持節都督揚州諸軍事安東將軍京陵侯王渾督率所統遂逼秣陵令賊孫晧救死自衛不得分兵上赴以成西軍之功又摧大敵獲張悌使晧塗窮勢盡面縛乞降遂平定秣陵功勳茂著其增封八千戶進爵為公封子澄為亭侯弟湛為關內侯賜絹八千匹轉征東大將軍復鎮壽陽渾不尚刑名處斷明允時吳人新附頗懷畏懼渾撫循羇旅虛懷綏納座無空席門不停賓於是江東之士莫不悅附徵拜尚書左僕射加散騎常侍會朝臣立議齊王攸當之藩渾上書諫曰伏承聖詔憲章古典進齊王攸為上公崇其禮儀遣攸之國昔周氏建國大封諸姬以藩帝室永世作憲至於公旦武王之弟左右王事輔濟大業不使歸藩明至親義著不可遠朝故也是故周公得以聖德光弼幼主忠誠著於金縢光述文武仁聖之德攸於大晉姬旦之親也宜贊皇朝與聞政事實為陛下腹心不二之臣且攸為人修潔義信加以懿親志存忠貞今陛下出攸之國假以都督虛號而無典戎幹方之實去離天朝不預王政傷母弟至親之體虧友于款篤之義懼非陛下追述先帝文明太后待攸之宿意也若以攸望重於事宜出者今以汝南王亮代攸亮宣皇帝子文皇帝弟胄駿各處方任有內外之資論以後慮亦不為輕攸今之國適足長異同之論以損仁慈之美耳而令天下窺陛下有不崇親親之情臣竊為陛下不取也若以妃后外親任以朝政則有王氏傾漢之權呂産專朝之禍若以同姓至親則有吳楚七國逆亂之殃歷觀古今苟事輕重所在無不為害也不可事事曲設疑防慮方來之患者也唯當任正道而求忠良若以智計猜物雖親見疑至於疏遠者亦何能自保乎人懷危懼非為安之理此最有國有家者之深忌也愚以為太子太保缺宜留攸居之與太尉汝南王亮衛將軍楊珧共為保傅幹理朝事三人齊位足相持正進有輔納廣義之益退無偏重相傾之勢令陛下有篤親親之恩使攸蒙仁覆之惠臣同國休戚義在盡言心之所見不能默已私慕魯女存國之志敢陳愚見觸犯天威欲陛下事每盡善冀萬分之助臣而不言誰當言者帝不納太熙初遷司徒惠帝即位加侍中又京陵置士官如睢陵比及誅楊駿崇重舊臣乃加渾兵渾以司徒文官主史不持兵持兵乃吏屬絳衣自以偶因時寵權得持兵非是舊典皆令皂服論者美其謙而識體楚王瑋將害汝南王亮等也公孫宏說瑋曰昔宣帝廢曹爽引太尉蔣濟參乘以增威重大王今舉非常事宜得宿望鎮厭衆心司徒王渾宿有威名為三軍所信服可請同乘使物情有憑也瑋從之渾辭疾歸第以家兵千餘人閉門距瑋瑋不敢逼俄而瑋以矯詔伏誅渾乃率兵赴官帝嘗訪渾元會問郡國計吏方俗之宜渾奏曰陛下欽明聖哲光于遠近明詔沖虛詢及芻蕘斯乃周文疇咨之求仲尼不恥下問也舊三朝元會前計吏詣軒下侍中讀詔計吏跪受臣以詔文相承已久無他新聲非陛下留心方國之意也可令中書指宣明詔問方土異同賢才秀異風俗好尚農桑本務刑獄得無寃濫守長得無侵虐其勤心政化興利除害者授以紙筆盡意陳聞以明聖指垂心四遠不復因循常辭且察其答對文義以觀計吏人才之實又先帝時正會後東堂見征鎮長史司馬諸王國卿諸州別駕今若不能別見可前詣軒下使侍中宣問以審察方國於事為便帝然之又詔渾録尚書事渾所歷之職前後著稱及居台輔聲望日減元康七年薨時年七十五諡曰元長子尚早亡次子濟嗣濟字武子少有逸才風姿英爽氣蓋一時好弓馬勇力絶人善易及莊老文詞俊茂伎藝過人有名當世與姊夫和嶠及裴楷齊名尚常山公主年二十起家拜中書郎以母憂去官起為驍騎將軍纍遷侍中與侍中孔恂王恂楊濟同列為一時秀彥武帝嘗會公卿藩牧於式乾殿顧濟恂而謂諸公曰朕左右可謂恂恂濟濟矣每侍見未嘗不咨論人物及萬機得失濟善於清言修飾辭令諷議將順朝臣莫能尚焉帝益親貴之仕進雖速論者不以主壻之故咸謂才能致之然外雖弘雅而內多忌刻好以言傷物儕類以此少之以其父之故每排王濬時議譏焉齊王攸當之藩濟既陳請又纍使公主與甄德妻長廣公主俱入稽顙泣請帝留攸帝怒謂侍中王戎曰兄弟至親今出齊王自是朕家事而甄德王濟連遣婦來生哭人以忤旨左遷國子祭酒常侍如故數年入為侍中時渾為僕射主者處事或不當濟性峻厲明法繩之素與從兄佑不平佑黨頗謂濟不能顧其父由是長同異之言出為河南尹未拜坐鞭王官吏免官而王佑始見委任而濟遂被斥外於是乃移第北芒山下性豪侈麗服玉食時洛京地甚貴濟買地為馬埒編錢滿之時人謂為金溝王愷以帝舅奢豪有牛名八百里駁常瑩其蹄角濟請以錢千萬與牛對射而賭之愷亦自恃其能令濟先射一發破的因據胡牀叱左右速探牛心來須臾而至一割便去和嶠性至儉家有好李帝求之不過數十濟候其上直率少年詣園共啖畢伐樹而去帝嘗幸其宅供饌甚豐悉貯琉璃器中蒸肫甚美帝問其故答曰以人乳蒸之帝色甚不平食未畢而去濟善解馬性嘗乘一馬著連乾鄣泥前有水終不肯渡濟云此必是惜鄣泥使人解去便渡故杜預謂濟有馬癖帝嘗謂和嶠曰我將罵濟而後官爵之何如嶠曰濟俊爽恐不可屈帝因召濟切讓之既而曰知愧不濟答曰尺布斗粟之謠常為陛下恥之他人能令親疏臣不能使親親以此愧陛下耳帝默然帝嘗與濟奕而孫晧在側謂晧曰何以好剝人面皮晧曰見無禮於君者則剝之濟時伸腳局下而晧譏焉尋使白衣領太僕年四十六先渾卒追贈驃騎將軍及其將葬時賢無不畢至孫楚雅敬濟而後來哭之甚悲賓客莫不垂涕哭畢向靈牀曰卿常好我作驢鳴我為卿作之體似聲真賓客皆笑楚顧曰諸君不死而令王濟死乎初濟尚主主兩目失明而妬忌尤甚然終無子有庶子二人卓字文宣嗣渾爵拜給事中次聿字茂宣襲公主封敏陽侯濟二弟澄字道深汶字茂深皆辨慧有才藻並歷清顯王濬王濬字士治弘農湖人也家世二千石濬博涉墳典美姿貌不修名行不為鄉曲所稱晚乃變節疏通亮達恢廓有大志嘗起宅開門前路廣數十步人或謂之何太過濬曰吾欲使容長戟幡旗衆咸笑之濬曰陳勝有言燕雀安知鴻鵠之志州郡辟河東從事守令有不廉潔者皆望風自引而去刺史燕國徐邈有女才淑擇夫未嫁邈乃大會佐吏令女於內觀之女指濬告母邈遂妻之後參征南軍事羊祜深知待之祜兄子暨白祜濬為人志太奢侈不節不可專任宜有以裁之祜曰濬有大才將欲濟其所欲必可用也轉車騎從事中郎識者謂祜可謂能舉善焉除巴郡太守郡邊吳境兵士苦役生男多不養濬乃嚴其科條寬其徭課其産育者皆與休復所全活者數千人轉廣漢太守垂惠布政百姓賴之濬夜夢懸三刀於臥屋梁上須臾又益一刀濬驚覺意甚惡之主簿李毅再拜賀曰三刀為州字又益一者明府其臨益州乎及賊張弘殺益州刺史皇甫晏果遷濬為益州刺史濬設方略悉誅弘等以勳封關內侯懷輯殊俗待以威信蠻夷徼外多來歸降徵拜右衛將軍除大司農車騎將軍羊祜雅知濬有奇略乃密表留濬於是重拜益州刺史武帝謀伐吳詔濬修舟艦濬乃作大船連舫方百二十步受二千餘人以木為城起樓櫓開四出門其上皆得馳馬來往又畫鷁首怪獸於船首以懼江神舟楫之盛自古未有濬造船於蜀其木柿蔽江而下吳建平太守吾彥取流柿以呈孫晧曰晉必有攻吳之計宜增建平兵建平不下終不敢渡晧不從尋以謠言拜濬為龍驤將軍監梁益諸軍事語在羊祜傳時朝議咸諫伐吳濬乃上疏曰臣數參訪吳楚同異孫晧荒淫凶逆荊揚賢愚無不嗟怨且觀時運宜速征伐若今不伐天變難預令晧卒死更立賢主文武各得其所則強敵也臣作船七年日有朽敗又臣年已七十死亡無日三者一乖則難圖也誠願陛下無失事機帝深納焉賈充荀勖陳諫以為不可唯張華固勸又杜預表請帝乃發詔分命諸方節度濬於是統兵先在巴郡之所全育者皆堪徭役供軍其父母戒之曰王府君生爾爾必勉之無愛死也太康元年正月濬發自成都率巴東監軍廣武將軍唐彬攻吳丹楊克之擒其丹楊監盛紀吳人於江險磧要害之處並以鐵鎖橫截之又作鐵錐長丈餘暗置江中以逆距船先是羊祜獲吳間諜具知情狀濬乃作大筏數十亦方百餘步縛草為人被甲持杖令善水者以筏先行筏遇鐵錐錐輒著筏去又作火炬長十餘丈大數十圍灌以麻油在船前遇鎖然炬燒之須臾融液斷絶於是船無所礙二月庚申克吳西陵獲其鎮南將軍留憲征南將軍成據宜都太守虞忠壬戌克荊門夷道二城獲監軍陸晏乙丑克樂鄉獲水軍督陸景平西將軍施洪等來降乙亥詔進濬為平東將軍假節都督益梁諸軍事濬自發蜀兵不血刃攻無堅城夏口武昌無相支抗於是順流鼓棹徑造三山晧遣游擊將軍張象率舟軍萬人禦濬象軍望旗而降晧聞濬軍旌旗器甲屬天滿江威勢甚盛莫不破膽用光祿勳薛瑩中書令胡沖計送降文於濬曰吳郡孫晧叩頭死罪昔漢室失御九州幅裂先人因時略有江南遂阻山河與魏乖隔大晉龍興德覆四海暗劣偷安未喻天命至于今者猥煩六軍衡蓋露次遠臨江渚舉國震惶假息漏刻敢緣天朝含弘光大謹遣私署太常張夔等奉所佩璽綬委質請命壬寅濬入于石頭晧乃備亡國之禮素車白馬肉袒面縛銜璧牽羊大夫衰服士輿櫬率其僞太子瑾瑾弟魯王虔等二十一人造于壘門濬躬解其縛受璧焚櫬送于京師收其圖籍封其府庫軍無私焉帝遣使者犒濬軍初詔書使濬下建平受杜預節度至秣陵受王渾節度預至江陵謂諸將帥曰若濬得下建平則順流長驅威名已著不宜令受制於我若不能克則無緣得施節度濬至西陵預與之書曰足下既摧其西藩便當徑取秣陵討纍世之逋寇釋吳人於塗炭自江入淮逾于泗汴泝河而上振旅還都亦曠世一事也濬大悅表呈預書及濬將至秣陵王渾遣信要令暫過論事濬舉帆直指報曰風利不得泊也王渾久破晧中軍斬張悌等頓兵不敢進而濬乘勝納降渾恥而且忿乃表濬違詔不受節度誣罪狀之有司遂按濬檻車徵帝弗許詔讓濬曰伐國事重宜令有一前詔使將軍受安東將軍渾節度渾思謀深重案甲以待將軍云何徑前不從渾命違制昧利甚失大義將軍功勳簡在朕心當率由詔書崇成王法而於事終恃功肆意朕將何以令天下濬上書自理曰臣前被庚戌詔書曰軍人乘勝猛氣益壯便當順流長騖直造秣陵臣被詔之日即便東下又前被詔書云太尉賈充總統諸方自鎮東大將軍胄及渾濬彬等皆受充節度無令臣別受渾節度之文臣自達巴丘所向風靡知孫晧窮踧勢無所至十四日至牛渚去秣陵二百里宿設部分為攻取節度前至三山見渾軍在北岸遣書與臣可暫來過共有所議亦不語臣當受節度之意臣水軍風發乘勢造賊城加宿設部分行有次第無緣得於長流之中回船過渾令首尾斷絶須臾之間晧遣使歸命臣即報渾書並寫晧箋具以示渾使速來當於石頭相待軍以日中至秣陵暮乃被渾所下當受節度之符欲令臣明十六日悉將所領還圍石頭備晧越逸又索蜀兵及鎮南諸軍人名定見臣以為晧已來首都亭無緣共合空圍又兵人定見不可倉卒皆非當今之急不可承用中詔謂臣忽棄明制專擅自由伏讀嚴詔驚怖悚栗不知軀命當所投厝豈惟老臣獨懷戰灼三軍上下咸盡喪氣臣受國恩任重事大常恐託付不效孤負聖朝故投身死地轉戰萬里被蒙寬恕之恩得從臨履之宜是以憑賴威靈幸而能濟皆是陛下神策廟算臣承指授效鷹犬之用耳有何勳勞而恃功肆意寧敢昧利而違聖詔臣以十五日至秣陵而詔書以十六日起洛陽其間懸闊不相赴接則臣之罪責宜蒙察恕假令孫晧猶有螳蜋舉斧之勢而臣輕軍單入有所虧喪罪之可也臣所統八萬餘人乘勝席卷晧以衆叛親離無復羽翼匹夫獨立不能庇其妻子雀鼠貪生苟乞一活耳而江北諸軍不知其虛實不早縛取自為小誤臣至便得更見怨恚並云守賊百日而令他人得之言語噂不可聽聞案春秋之義大夫出疆由有專輒臣雖愚蠢以為事君之道唯當竭節盡忠奮不顧身量力受任臨事制宜苟利社稷死生以之若其顧護嫌疑以避咎責此是人臣不忠之利實非明主社稷之福也臣不自料忘其鄙劣披布丹心輸寫肝腦欲竭股肱之力加之以忠貞庶必掃除凶逆清一宇宙願令聖世與唐虞比隆陛下粗察臣之愚款而識其欲自效之誠是以授臣以方牧之任委臣以征討之事雖燕主之信樂毅漢祖之任蕭何無以加焉受恩深重死且不報而以頑疏舉錯失宜陛下弘恩財加切讓惶怖怔營無地自厝願陛下明臣赤心而已渾又騰周浚書云濬軍得吳寶物濬表曰被壬戌詔書下安東將軍所上揚州刺史周浚書謂臣諸軍得孫晧寶物又謂牙門將李高放火燒晧僞宮輒公文上尚書具列本末又聞渾案陷上臣臣受性愚忠行事舉動信心而前期於不負神明而已秣陵之事皆如前所表而惡直醜正實繁有徒欲構南箕成此貝錦公於聖世反白為黑夫佞邪害國自古而然故無極破楚宰嚭滅吳及至石顯傾亂漢朝皆載在典籍為世所戒昔樂毅伐齊下城七十而卒被讒間脫身出奔樂羊既反謗書盈篋況臣頑疏能免讒慝之口然所望全其首領者實賴陛下聖哲欽明使浸潤之譖不得行焉然臣孤根獨立朝無黨援久棄遐外人道斷絶而結恨強宗取怨豪族以纍卵之身處雷霆之衝繭栗之質當豺狼之路其見吞噬豈抗脣齒夫犯上干主其罪可救乖忤貴臣則禍在不測故朱雲折檻嬰逆鱗之怒慶忌救之成帝不問望之周堪違忤石顯雖闔朝嗟歎而死不旋踵此臣之所大怖也今渾之支黨姻族內外皆根據磐哰並處世位聞遣人在洛中專共交構盜言孔甘疑惑觀聽夫曾參之不殺人亦以明矣然三人傳之其母投杼今臣之信行未若曾參之著而讒構沸騰非徒三夫之對外內扇助為二五之應夫猛獸當塗麒麟恐懼況臣脆弱敢不悚栗僞吳君臣今皆生在便可驗問以明虛實前僞中郎將孔攄說去二月武昌失守水軍行至晧案行石頭還左右人皆跳刀大呼云要當為陛下一死戰決之晧意大喜謂必能然便盡出金寶以賜與之小人無狀得便持走晧懼乃圖降首降使適去左右劫奪財物略取妻妾放火燒宮晧逃身竄首恐不脫死臣至遣參軍主者救斷其火耳周浚以十六日前入晧宮臣時遣記室吏往視書籍浚使收縛若有遺寶則浚前得不應移蹤後人欲求苟免也臣前在三山得浚書云晧散寶貨以賜將士府庫略虛而今復言金銀篋笥動有萬計疑臣軍得之言語反覆無復本末臣復與軍司張牧汝南相馮紞等共入觀晧宮乃無席可坐後日又與牧等共視晧舟船渾又先臣一日上其船船上之物皆渾所知見臣之案行皆出其後若有寶貨渾應得之又臣將軍素嚴兵人不得妄離部陳間在秣陵諸軍凡二十萬衆臣軍先至為土地之主百姓之心皆歸仰臣臣切敕所領秋毫不犯諸有市易皆有伍任證左明從券契有違犯者凡斬十三人皆吳人所知也餘軍縱橫詐稱臣軍而臣軍類皆蜀人幸以此自別耳豈獨浚之將士皆是夷齊而臣諸軍悉聚盜跖耶時有八百餘人緣石頭城劫取布帛臣牙門將軍馬潛即收得二十餘人並疏其督將姓名移以付浚使得自科結而寂無反報疑皆縱遣絶其端緒也又聞吳人言前張悌戰時所殺財有二千人而渾浚露布言以萬計以吳剛子為主簿而遣剛至洛欲令剛增斬級之數可具問孫晧及其諸臣則知其定審若信如所聞浚等虛詐尚欺陛下豈惜於臣云臣屯聚蜀人不時送晧欲有反狀又恐動吳人言臣皆當誅殺取其妻子冀其作亂得騁私忿謀反大逆尚以見加其餘謗故其宜耳渾案臣瓶磬小器蒙國厚恩頻繁擢遂過其任渾此言最信內省慚懼今年平吳誠為大慶於臣之身更受咎纍既無孟側策馬之好而令濟濟之朝有讒邪之人虧穆穆之風損皇代之美由臣頑疏使致於此拜表流汗言不識次濬至京都有司奏濬表既不列前後所被七詔月日又赦後違詔不受渾節度大不敬付廷尉科罪詔曰濬前受詔徑造秣陵後乃下受渾節度詔書稽留所下不至便令與不受詔同責未為經通濬不即表上被渾宣詔此可責也濬有征伐之勞不足以一眚掩之有司又奏濬赦後燒賊船百三十五艘輒敕付廷尉禁推詔曰勿推拜濬輔國大將軍領步兵校尉舊校唯五置此營自濬始也有司又奏輔國依比未為達官不置司馬不給官騎詔依征鎮給五百大車增兵五百人為輔國營給親騎百人官騎十人置司馬封為襄陽縣侯邑萬戶封子彝楊鄉亭侯邑千五百戶賜絹萬匹又賜衣一襲錢三十萬及食物濬自以功大而為渾父子及豪強所抑屢為有司所奏每進見陳其攻伐之勞及見枉之狀或不勝忿憤徑出不辭帝每容恕之益州護軍范通濬之外親也謂濬曰卿功則美矣然恨所以居美者未盡善也濬曰何謂也通曰卿旋旆之日角巾私第口不言平吳之事若有問者輒曰聖主之德羣帥之力老夫何力之有焉如斯顏老之不伐龔遂之雅對將何以過之藺生所以屈廉頗王渾能無愧乎濬曰吾始懼鄧艾之事畏禍及不得無言亦不能遣諸胸中是吾褊也時人咸以濬功重報輕博士秦秀太子洗馬孟康前溫令李密等並表訟濬之屈帝乃遷濬鎮軍大將軍加散騎常侍領後軍將軍王渾詣濬濬嚴設備衛然後見之其相猜防如此濬平吳之後以勳高位重不復素業自居乃玉食錦服縱奢侈以自逸其有辟引多是蜀人示不遺故舊也後又轉濬撫軍大將軍開府儀同三司加特進散騎常侍後軍將軍如故太康六年卒時年八十諡曰武葬柏谷山大營塋域葬垣周四十五里面別開一門松柏茂盛子矩嗣矩弟暢散騎郎暢子粹太康十年武帝詔粹尚潁川公主仕至魏郡太守濬有二孫過江不見齒録安西將軍桓溫鎮江陵表言之曰臣聞崇德賞功為政之所先興滅繼絶百王之所務故德參時雍則奕世承祀功烈一代則永錫祚胤案故撫軍王濬歷職內外任兼文武料敵制勝明勇獨斷義存社稷之利不顧專輒之罪荷戈長騖席卷萬里僭號之吳面縛象魏今皇澤被於九州玄風洽於區外襄陽之封廢而莫續恩寵之號墜於近嗣遐邇酸懷臣竊悼之濬今有二孫年出六十室如懸磬糊口江濱四節蒸嘗菜羹不給昔漢高定業求樂毅之嗣世祖旌賢建葛亮之胤夫效忠異代立功異國尚通天下之善使不泯棄況濬建元勳於當年著嘉慶於身後靈基託根於南垂皇祚中興於江左舊物克彰神器重耀豈不由伊人之功力也哉誠宜加恩少垂矜憫追録舊勳纂錫茅土則聖朝之恩宣暢於上忠臣之志不墜于地矣卒不見省唐彬唐彬字儒宗魯國鄒人也父臺太山太守彬有經國大度而不拘行檢少便弓馬好游獵身長八尺走及奔鹿強力兼人晚乃敦悅經史尤明易經隨師受業還家教授數百人初為郡門下掾轉主簿刺史王沈集諸參佐盛論距吳之策以問九郡吏彬與譙郡主簿張惲俱陳吳有可兼之勢沈善其對又使彬難言吳未可伐者而辭理皆屈還遷功曹舉孝廉州辟主簿纍遷別駕彬忠肅公亮盡規匡救不顯諫以自彰又奉使詣相府計事于時僚佐皆當世英彥見彬莫不欽悅稱之於文帝薦為掾屬帝以問其參軍孔皓皓忌其能良久不答陳騫在坐斂板而稱曰彬之為人勝騫甚遠帝笑曰但能如卿固未易得何論於勝因辟彬為鎧曹屬帝問曰卿何以致辟對曰修業陋巷觀古人之遺迹言滿天下無口過行滿天下無怨惡帝顧四坐曰名不虛行他日謂孔皓曰近見唐彬卿受蔽賢之責矣初鄧艾之誅也文帝以艾久在隴右素得士心一旦夷滅恐邊情搔動使彬密察之彬還白帝曰鄧艾忌克詭狹矜能負才順從者謂為見事直言者謂之觸忤雖長史司馬參佐牙門答對失指輒見罵辱處身無禮大失人心又好施行事役數勞衆力隴右甚患苦之喜聞其禍不肯為用今諸軍已至足以鎮壓內外願無以為慮俄除尚書水部郎泰始初賜爵關內侯出補鄴令彬道德齊禮朞月化成遷弋陽太守明設禁防百姓安之以母喪去官益州東接吳寇監軍位缺朝議用武陵太守楊宗及彬武帝以問散騎常侍文立立曰宗彬俱不可失然彬多財欲而宗好酒惟陛下裁之帝曰財欲可足酒者難改遂用彬尋又詔彬監巴東諸軍事加廣武將軍上征吳之策甚合帝意後與王濬共伐吳彬屯據衝要為衆軍前驅每設疑兵應機制勝陷西陵樂鄉多所擒獲自巴陵沔口以東諸賊所聚莫不震懼倒戈肉袒彬知賊寇已殄孫晧將降未至建鄴二百里稱疾遲留以示不競果有先到者爭物後到者爭功于時有識莫不高彬此舉吳平詔曰廣武將軍唐彬受任方隅東禦吳寇南臨蠻越撫寧疆埸有綏禦之績又每慷慨志在立功頃者征討扶疾奉命首啓戎行獻俘授馘勳效顯著其以彬為右將軍都督巴東諸軍事徵拜翊軍校尉改封上庸縣侯食邑六千戶賜絹六千匹朝有疑議每參預焉北虜侵掠北平以彬為使持節監幽州諸軍事領護烏丸校尉右將軍彬既至鎮訓卒利兵廣農重稼震威耀武宣喻國命示以恩信於是鮮卑二部大莫廆擲何等並遣侍子入貢兼修學校誨誘無倦仁惠廣被遂開拓舊境卻地千里復秦長城塞自溫城洎于碣石綿亙山谷且三千里分軍屯守烽堠相望由是邊境獲安無犬吠之警自漢魏征鎮莫之比焉鮮卑諸種畏懼遂殺大莫廆彬欲討之恐列上俟報虜必逃散乃發幽冀車牛參軍許祗密奏之詔遣御史檻車徵彬付廷尉以事直見釋百姓追慕彬功德生為立碑作頌彬初受學於東海閻德門徒甚多獨目彬有廊廟才及彬官成而德已卒乃為之立碑元康初拜使持節前將軍領西戎校尉雍州刺史下教曰此州名都士人林藪處士皇甫申叔嚴舒龍姜茂時梁子遠等並志節清妙履行高潔踐境望風虛心饑渴思加延致待以不臣之典幅巾相見論道而已豈以吏職屈染高規郡國備禮發遣以副於邑之望於是四人皆到彬敬而待之元康四年卒官時年六十諡曰襄賜絹二百匹錢二十萬長子嗣官至廣陵太守少子岐征虜司馬史臣曰孫氏負江山之阻隔恃牛斗之妖氛奄有水鄉抗衡上國二王屬當戎旅受律遄征渾既獻捷橫江濬亦克清建鄴于時討吳之役將帥雖多定吳之功此焉為最向使弘范父之不伐慕陽夏之推功上稟廟堂下憑將士豈非懋勳懋德善始善終者歟此而不存彼焉是務或矜功負氣或恃勢驕陵競構南箕成茲貝錦遂乃喧黷宸扆斁亂彝倫既為戒於功臣亦致譏于清論豈不惜哉王濟遂驕父之褊心乖爭子之明義俊材雖多亦奚以為也唐彬畏避交爭屬疾遲留退讓之風賢於渾濬遠矣傳云不拘行檢安得長者之行哉贊曰二王總戎淮海攸同渾既害善濬亦矜功武子豪桀夙參朝列逞欲牛心紆情馬埒儒宗知退避名全節
