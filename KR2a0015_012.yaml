body:
  text: 晉書卷十二志第二天文中七曜雜星氣瑞星妖星客星流星雲氣十輝雜氣史傳事驗天變日蝕月變月奄犯五緯五星聚舍七曜日為太陽之精主生養恩德人君之象也人君有瑕必露其慝以告示焉故日月行有道之國則光明人君吉昌百姓安寧人君乘土而王其政太平則日五色無主日變色有軍軍破無軍喪侯王其君無德其臣亂國則日赤無光日失色所臨之國不昌日晝昏行人無影到暮不止者上刑急下不聊生不出一年有大水日晝昏烏鳥羣鳴國失政日中烏見主不明為政亂國有白衣會將軍出旌旗舉日中有黑子黑氣黑雲乍三乍五臣廢其主日蝕陰侵陽臣掩君之象有亡國月為太陰之精以之配日女主之象以之比德刑罰之義列之朝廷諸侯大臣之類故君明則月行依度臣執權則月行失道大臣用事兵刑失理則月行乍南乍北女主外戚擅權則或進或退月變色將有殃月晝明姦邪並作君臣爭明女主失行陰國兵強中國饑天下謀僭數月重見國以亂亡歲星曰東方春木於人五常仁也五事貌也仁虧貌失逆春令傷木氣則罰見歲星歲星盈縮以其舍命國其所居久其國有德厚五穀豐昌不可伐其對為衝歲乃有殃歲星安靜中度吉盈縮失次其國有憂不可舉事用兵又曰人主之象也色欲明光色潤澤德合同又曰進退如度姦邪息變色亂行主無福又主福主大司農主齊吳主司天下諸侯人君之過主歲五穀赤而角其國昌赤黃而沈其野大穰熒惑曰南方夏火禮也視也禮虧視失逆夏令傷火氣罰見熒惑熒惑法使行無常出則有兵入則兵散以舍命國為亂為賊為疾為喪為饑為兵所居國受殃環繞鉤己芒角動搖變色乍前乍後乍左乍右其為殃愈甚其南丈夫北女子喪周旋止息乃為死喪寇亂其野亡地其失行而速兵聚其下順之戰勝又曰熒惑主大鴻臚主死喪主司空又為司馬主楚吳越以南又司天下羣臣之過司驕奢亡亂妖孽主歲成敗又曰熒惑不動兵不戰有誅將其出色赤怒逆行成鉤己戰凶有圍軍鉤己有芒角如鋒刃人主無出宮下有伏兵芒大則人衆怒又為理外則理兵內則理政為天子之理也故曰雖有明天子必視熒惑所在其入守犯太微軒轅營室房心主命惡之填星曰中央季夏土信也思心也仁義禮智以信為主貌言視聽以心為正故四星皆失填乃為之動動而盈侯王不寧縮有軍不復所居之宿國吉得地及女子有福不可伐去之失地若有女憂居宿久國福厚易則薄失次而上二三宿曰盈有主命不成不乃大水失次而下曰縮后戚其歲不復不乃天裂若地動一曰填為黃帝之德女主之象主德厚安危存亡之機司天下女主之過又曰天子之星也天子失信則填星大動太白曰西方秋金義也言也義虧言失逆秋令傷金氣罰見太白太白進退以候兵高埤遲速靜躁見伏用兵皆象之吉其出西方失行夷狄敗出東方失行中國敗未盡期日過參天病其對國若經天天下革民更王是謂亂紀人衆流亡晝見與日爭明強國弱小國強女主昌又曰太白主大臣其號上公也大司馬位謹候此辰星曰北方冬水智也聽也智虧聽失逆冬令傷水氣罰見辰星辰星見則主刑主廷尉主燕趙又為燕趙代以北宰相之象亦為殺伐之氣戰鬬之象又曰軍於野辰星為偏將之象無軍為刑事和陰陽應效不效其時不和出失其時寒暑失其節邦當大饑當出不出是謂擊卒兵大起在於房心間地動亦曰辰星出入躁疾常主夷狄又曰蠻夷之星也亦主刑法之得失色黃而小地大動光明與月相逮其國大水凡五星有色大小不同各依其行而順時應節色變有類凡青皆比參左肩赤比心大星黃比參右肩白比狼星黑比奎大星不失本色而應其四時者吉色害其行凶凡五星所出所行所直之辰其國為得位得位者歲星以德熒惑有禮填星有福太白兵強辰星陰陽和所行所直之辰順其色而有角者勝其色害者敗居實有德也居虛無德也色勝位行勝色行得盡勝之營室為清廟歲星廟也心為明堂熒惑廟也南斗為文太室填星廟也亢為疏廟太白廟也七星為員宮辰星廟也五星行至其廟謹候其命凡五星盈縮失位其精降于地為人歲星降為貴臣熒惑降為童兒歌謠嬉戲填星降為老人婦女太白降為壯夫處於林麓辰星降為婦人吉凶之應隨其象告凡五星木與土合為內亂饑與水合為變謀而更事與火合為饑為旱與金合為白衣之會合鬬國有內亂野有破軍為水太白在南歲星在北名曰牝牡年穀大熟太白在北歲星在南年或有或無火與金合為爍為喪不可舉事用兵從軍為軍憂離之軍却出太白陰分宅出其陽偏將戰與土合為憂主孽卿與水合為北軍用兵舉事大敗一曰火與水合為焠不可舉事用兵土與水合為壅沮不可舉事用兵有覆軍下師一曰為變謀更事必為旱與金合為疾為白衣會為內兵國亡地與木合國饑水與金合為變謀為兵憂入太白中而上出破軍殺將客勝下出客亡地視旗所指以命破軍環繞太白若與鬬大戰客勝凡木火土金與水鬬皆為戰兵不在外皆為內亂凡同舍為合相陵為鬬二星相近其殃大相遠毋傷七寸以內必之凡月蝕五星其國皆亡歲以饑熒惑以亂填以殺太白以強國戰辰以女亂凡五星入月歲其野有逐相太白將僇凡五星所聚其國王天下從歲以義從熒惑以禮從填以重從太白以兵從辰以法從各以其事致天下也三星若合是謂驚立絶行其國外內有兵與喪百姓饑乏改立侯王四星若合是謂大陽其國兵喪並起君子憂小人流五星若合是謂易行有德承慶改立王者奄有四方子孫蕃昌亡德受殃離其國家滅其宗廟百姓離去被滿四方五星皆大其事亦大皆小事亦小凡五星色皆圜白為喪為旱赤中不平為兵青為憂為水黑為疾疫為多死黃為吉皆角赤犯我城黃地之爭白哭泣聲青有兵憂黑有水五星同色天下偃兵百姓安寧歌舞以行不見災疾五穀蕃昌凡五星歲政緩則不行急則過分逆則占熒惑緩則不出急則不入違道則占填緩則不還急則過舍逆則占太白緩則不出急則不入逆則占辰緩則不出急則不入非時則占五星不失行則年穀豐昌凡五星分天之中積于東方中國利積于西方外國用兵者利辰星不出太白為客其出太白為主出而與太白不相從及各出一方為格野雖有軍不戰凡五星見伏留行逆順遲速應曆度者為得其行政合于常違曆錯度而失路盈縮者為亂行亂行則為天矢彗孛而有亡國革政兵饑喪亂之禍云雜星氣圖緯舊說及漢末劉表為荊州牧命武陵太守劉睿集天文衆占名荊州占其雜星之體有瑞星有妖星有客星有流星有瑞氣有妖氣有日月傍氣皆略其名狀舉其占驗次之於此云瑞星一曰景星如半月生於晦朔助月為明或曰星大而中空或曰有三星在赤方氣與青方氣相連黃星在赤方氣中亦名德星二曰周伯星黃色煌煌然所見之國大昌三曰含譽光耀似彗喜則含譽射四曰格澤如炎火下大上兌色黃白起地而上見則不種而穫有土功有大客妖星一曰彗星所謂掃星本類星末類彗小者數寸長或竟天見則兵起大水主掃除除舊布新有五色各依五行本精所主史臣案彗體無光傅日而為光故夕見則東指晨見則西指在日南北皆隨日光而指頓挫其芒或長或短光芒所及則為災二曰孛星彗之屬也偏指曰彗芒氣四出曰孛孛者孛孛然非常惡氣之所生也內不有大亂則外有大兵天下合謀暗蔽不明有所傷害晏子曰君若不改孛星將出彗星何懼乎由是言之災甚於彗三曰天棓一名覺星本類星末鋭長四丈或出東北方西方主奮爭四曰天槍其出不過三月必有破國亂君伏死其辜殃之不盡當為旱飢暴疾五曰天欃石氏曰雲如牛狀甘氏本類星末鋭巫咸曰彗星出西方長可二三丈主捕制六曰蚩尤旗類彗而後曲象旗或曰赤雲獨見或曰其色黃上白下或曰若植雚而長名曰蚩尤之旗或曰如箕可長二丈末有星主伐枉逆主惑亂所見之方下有兵兵大起不然有喪七曰天衝出如人蒼衣赤頭不動見則臣謀主武卒發天子亡八曰國皇大而赤類南極老人星或曰去地一二丈如炬火主內寇內難或曰其下起兵兵強或曰外內有兵喪九曰昭明象如太白光芒不行或曰大而白無角乍上乍下一曰赤彗分為昭明昭明滅光以為起霸起德之徵所起國兵多變一曰大人凶兵大起十曰司危如太白有目或曰出正西西方之野星去地可六丈大而白或曰大而有毛兩角或曰類太白數動察之而赤為乖爭之徵主擊強兵見則主失法豪傑起天子以不義失國有聲之臣行主德十一曰天讒彗出西北狀如劍長四五丈或曰如鉤長四丈或曰狀白小數動主殺罰出則其國內亂其下相讒為飢兵赤地千里枯骨藉藉十二曰五殘一名五鏠出正東東方之星狀類辰可去地六七丈或曰蒼彗散為五殘如辰星出角或曰星表有氣如暈有毛或曰大而赤數動察之而青主乖亡為五分毀敗之徵亦為備急兵見則主誅政在伯野亂成有急兵有喪不利衝十三曰六賊見出正南南方之星去地可六丈大而赤動有光或曰形如彗五殘六賊出禍合天下逆侵關樞其下有兵衝不利十四曰獄漢一名咸漢出正北北方之野星去地可六丈大而赤數動察之中青或曰赤表下有三彗從橫主逐王主刺王出則陰精橫兵起其下又為喪動則諸侯驚十五曰旬始出北斗旁如雄雞其怒有青黑象伏鱉或曰怒雌也主爭兵又曰黃彗分為旬始為立主之題主亂主招橫見則臣亂兵作諸侯虐期十年聖人起伐羣猾橫恣或曰出則諸侯雄鳴十六曰天鋒彗象矛鋒天下從橫則天鋒星見十七曰燭星如太白其出也不行見則不久而滅或曰主星上有三彗上出所出城邑亂有大盜不成又以五色占十八曰蓬星大如二斗器色白一名王星狀如夜火之光多至四五少一二一曰蓬星在西南長數丈左右兌出而易處星見不出三年有亂臣戮死又曰所出大水大旱五穀不收人相食十九曰長庚如一匹布著天見則兵起二十曰四填星出四隅去地六丈餘或曰可四丈或曰星大而赤去地二丈常以夜半時出見十月而兵起皆為兵起其下二十一曰地維藏光出四隅或曰大而赤去地二三丈如月始出見則下有亂亂者亡有德者昌河圖云歲星之精流為天棓天槍天猾天衝國皇反登蒼彗熒惑散為昭旦蚩尤之旗昭明司危天欃赤彗填星散為五殘獄漢大賁昭星絀流旬始蚩尤虹霓擊咎黃彗太白散為天杵天柎伏靈大敗司姦天狗天殘卒起白彗辰星散為枉矢破女拂樞滅寶繞綎驚理大奮祀黑彗五色之彗各有長短曲折應象漢京房著風角書有集星章所載妖星皆見於月旁互有五色方雲以五寅日見各有五星所生云天槍天根天荊真若天榬天樓天垣皆歲星所生也見以甲寅其星咸有兩青方在其旁天陰晉若官張天惑天崔赤若蚩尤皆熒惑之所生也出在丙寅日有兩赤方在其旁天上天伐從星天樞天翟天沸荊彗皆填星所生也出在戊寅日有兩黃方在其旁若星帚星若彗竹彗牆星榬星白雚皆太白之所生也出在庚寅日有兩白方在其旁天美天欃天杜天麻天林天蒿端下皆辰星之所生也出以壬寅日有兩黑方在其旁已前三十五星即五行氣所生皆出於月左右方氣之中各以其所生星將出不出日數期候之當其未出之前而見見則有水旱兵喪饑亂所指亡國失地王死破軍殺將客星張衡曰老子四星及周伯王蓬絮芮各一錯乎五緯之間其見無期其行無度荊州占云老子星色淳白然所見之國為饑為凶為善為惡為喜為怒周伯星黃色煌煌所至之國大昌蓬絮星色青而熒熒然所至之國風雨不節焦旱物不生五穀不登多蝗蟲又云東南有三星出名曰盜星出則天下有大盜西南有三大星出名曰種陵出則天下穀貴十倍西北三大星出而白名曰天狗出則人相食大凶東北有三大星出名曰女帛見則有大喪流星流星天使也自上而降曰流自下而升曰飛大者曰奔奔亦流星也星大者使大星小者使小聲隆隆者怒之象也行疾者期速行遲者期遲大而無光者衆人之事小而有光者貴人之事大而光者其人貴且衆也乍明乍滅者賊成賊敗也前大後小者恐憂也前小後大者喜事也蛇行者姦事也往疾者往而不反也長者其事長久也短者事疾也奔星所墜其下有兵無風雲有流星見良久間乃入為大風發屋折木小流星百數四面行者衆庶流移之象流星之類有音如炬火下地野雉鳴天保也所墜國安有喜若小流星色青赤名曰地雁其所墜者起兵流星有光青赤長二三丈名曰天雁軍中之精華也其國起兵將軍當從星所之流星暉然有光光白長竟天者人主之星也主相將軍從星所之飛星大如缶若甕後皎然白前卑後高此謂頓頑其所從者多死亡飛星大如缶若甕後皎然白星滅後白者曲環如車輪此謂解銜其國人相斬為爵祿飛星大如缶若甕其後皎然白長數丈星滅後白者化為雲流下名曰大滑所下有流血積骨枉矢類流星色蒼黑蛇行望之如有毛目長數匹著天主反萌主射愚見則謀反之兵合射所誅亦為以亂伐亂天狗狀如大奔星色黃有聲其止地類狗所墜望之如火光炎炎衝天其上鋭其下員如數頃田處或曰星有毛旁有短彗下有狗形者或曰星出其狀赤白有光下即為天狗一曰流星有光見人面墜無音若有足者名曰天狗其色白其中黃黃如遺火狀主候兵討賊見則四方相射千里破軍殺將或曰五將鬬人相食所往之鄉有流血其君失地兵大起國易政戒守禦營頭有雲如壞山墮所謂營頭之星所墮其下覆軍流血千里亦曰流星晝隕名營頭雲氣瑞氣一曰慶雲若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂慶雲亦曰景雲此喜氣也太平之應二曰歸邪如星非星如雲非雲或曰星有兩赤彗上向有蓋下連星見必有歸國者三曰昌光赤如龍狀聖人起帝受終則見妖氣一曰虹霓日旁氣也斗之亂精主惑心主內淫主臣謀君天子詘后妃顓妻不一二曰雲如狗赤色長尾為亂君為兵喪十輝周禮祲氏掌十輝之法以觀妖祥辨吉凶一曰祲謂陰陽五色之氣浸淫相侵或曰抱珥背璚之屬如虹而短是也二曰象謂雲氣成形象如赤烏夾日以飛之類是也三曰觿日傍氣刺日形如童子所佩之觿四曰監謂雲氣臨在日上也五曰暗謂日月蝕或曰脫光也六曰瞢謂瞢瞢不光明也七曰彌謂白虹彌天而貫日也八曰序謂氣若山而在日上或曰冠珥背璚重次序在于日旁也九曰隮謂暈氣也或曰虹也詩所謂朝隮于西者也十曰想謂氣五色有形想也青饑赤兵白喪黑憂黃熟或曰想思也赤氣為人狩之形可思而知其吉凶也凡遊氣蔽天日月失色皆是風雨之候也沈陰日月俱無光晝不見日夜不見星有雲障之兩敵相當陰相圖議也日濛濛無光士卒內亂又曰數日俱出若鬬天下兵起大戰日鬬下有拔城日戴者形如直狀其上微起在日上為戴戴者德也國有喜也一云立日上為戴青赤氣抱在日上小者為冠國有喜事青赤氣小而交於日下為纓青赤氣小而員一二在日下左右者為紐青赤氣如小半暈狀在日上為負負者得地為喜又曰青赤氣長而斜倚日旁為戟青赤氣員而小在日左右為珥黃白者有喜又曰有軍日有一珥為喜在日西西軍戰勝在日東東軍戰勝南北亦如之無軍而珥為拜將又日旁如半環向日為抱青赤氣如月初生背日者為背又曰背氣青赤而曲外向為叛象分為反城璚者如帶璚在日四方青赤氣長而立日旁為直日旁有一直敵在一旁欲自立從直所擊者勝日旁有二直三抱欲自立者不成順抱擊者勝殺將氣形三角在日四方為提青赤氣橫在日上下為格氣如半暈在日下為承承者臣承君也又曰日下有黃氣三重若抱名曰承福人主有吉喜且得地青白氣如履在日下者為履日旁抱五重戰順抱者勝日一抱一背為破走抱者順氣也背者逆氣也兩軍相當順抱擊逆者勝故曰破走日抱且兩珥一虹貫抱至日順虹擊者勝殺將日抱兩珥且璚二虹貫抱至日順虹擊者勝日重抱內有璚順抱擊者勝亦曰軍內有欲反者日重抱左右二珥有白虹貫抱順抱擊勝得二將有三虹得三將日抱黃白潤澤內赤外青天子有喜有和親來降者軍不戰敵降軍罷色青黃將喜赤將兵爭白將有喪黑將死日重抱且背順抱擊者勝得地若有罷師日重抱抱內外有璚兩珥順抱擊者勝破軍軍中不和不相信日旁有氣員而周匝內赤外青名為暈日暈者軍營之象周環匝日無厚薄敵與軍勢齊等若無軍在外天子失御民多叛日暈有五色有喜不得五色者有憂凡占兩軍相當必謹審日月暈氣知其所起留止遠近應與不應疾遲大小厚薄長短抱背為多少有無虛實久亟密疏澤枯相應等者勢等近勝遠疾勝遲大勝小厚勝薄長勝短抱勝背多勝少有勝無實勝虛久勝亟密勝疏澤勝枯重背大破重抱為和親抱多親者益多背為天下不和分離相去背於內者離於內背於外者離於外也雜氣天子氣內赤外黃四方所發之處當有王者若天子欲有遊往處其地亦先發此氣或如城門隱隱在氣霧中帶殺氣森森然或如華蓋在氣霧中或氣象青衣人無手在日西或如龍馬或雜色鬱鬱衝天者此皆帝王氣猛將之氣如龍如猛獸或如火煙之狀或白如粉沸或如火光之狀夜照人或白而赤氣繞之或如山林竹木或紫黑如門上樓或上黑下赤狀似黑旌或如張弩或如埃塵頭鋭而卑本大而高此皆猛將之氣也氣發漸漸如雲變作山形將有深謀凡軍勝之氣如堤如坂前後磨地或如火光將軍勇士卒猛或如山堤山上若林木將士驍勇或如埃塵粉沸其色黃白或如人持斧向敵或如蛇舉首向敵或氣如覆舟雲如牽牛或有雲如鬬雞赤白相隨在氣中或發黃氣皆將士精勇凡氣上黃下白名曰善氣所臨之軍敵欲求和退凡負氣如馬肝色或如死灰色或類偃蓋或類偃魚或黑氣如壞山墜軍上者名曰營頭之氣或如羣羊羣猪在氣中此衰氣也或如懸衣如人相隨或紛紛如轉蓬或如揚灰或雲如卷席如匹布亂穰者皆為敗徵氣如繫牛如人臥如雙蛇如飛鳥如決堤垣如壞屋如驚鹿相逐如兩雞相向此皆為敗軍之氣凡降人氣如人十十五五皆叉手低頭又云如人叉手相向或氣如黑山以黃為緣者皆欲降伏之象也凡堅城之上有黑雲如星名曰軍精或白氣如旌旗或青雲黃雲臨城皆有大喜慶或氣青色如牛頭觸人或城上氣如煙火如雙蛇如杵形向外或有雲分為兩彗狀者皆不可攻凡屠城之氣或赤如飛鳥或赤氣如敗車或有赤黑氣如貍皮斑或城中氣聚如樓出見於外營上有雲如衆人頭赤色其城營皆可屠氣如雄雉臨城其下必有降者凡伏兵有黑氣渾渾員長赤氣在其中或白氣粉沸起如樓狀或如幢節狀在烏雲中或如赤杵在烏雲中或如烏人在赤雲中凡暴兵氣白如瓜蔓連結部隊相逐須臾罷而復出或白氣如仙人如仙人衣千萬連結部隊相逐罷而復興當有千里兵來或氣如人持刀楯雲如人色赤所臨城邑有卒兵至或赤氣如人持節兵來未息雲如方虹此皆有暴兵之象凡戰氣青白如膏如人無頭如死人臥如丹蛇赤氣隨之必大戰殺將四望無雲見赤氣如狗入營其下有流血凡連陰十日晝不見日夜不見月亂風四起欲雨而無雨名曰蒙臣有謀霧氣若晝若夜其色青黃更相奄冒乍合乍散亦然視四方常有大雲五色具者其下賢人隱也青雲潤澤蔽日在西北為舉賢良雲氣如亂穰大風將至視所從來雲甚潤而厚大雨必暴至四始之日有黑雲氣如陳厚大重者多雨氣若霧非霧衣冠不濡見則其城帶甲而趣日出沒時有霧雲橫截之白者喪烏者驚三日內雨者各解有雲如蛟龍所見處將軍失魄有雲如鵠尾來蔭國上三日亡有雲赤黃色四塞終日竟夜照地者大臣縱恣有雲如氣昧而濁賢人去小人在位凡白虹者百殃之本衆亂所基霧者衆邪之氣陰來冒陽凡白虹霧姦臣謀君擅權立威晝霧夜明臣志得申凡夜霧白虹見臣有憂晝霧白虹見君有憂虹頭尾至地流血之象凡霧氣不順四時逆相交錯微風小雨為陰陽氣亂之象積日不解晝夜昏暗天下欲分離凡天地四方昏濛若下塵十日五日已上或一月或一時雨不沾衣而有土名曰霾故曰天地霾君臣乖凡海旁蜄氣象樓臺廣野氣成宮闕北夷之氣如牛羊羣畜穹廬南夷之氣類舟船幡旗自華以南氣下黑上赤嵩高三河之郊氣正赤山之北氣青勃碣海岱之間氣皆正黑江淮之間氣皆白東海氣如員簦附漢河水氣如引布江漢氣徑如杼濟水氣如黑渭水氣如狼白尾淮南氣如白羊少室氣如白兔青尾山氣如黑牛青尾東夷氣如樹西夷氣如室屋南夷氣如闍臺或類舟船陳雲如立垣杼軸雲類軸摶兩端兌杓雲如繩居前亘天其半半天其蛪者類闕旗故鉤雲句曲諸此雲見以五色占而澤摶密其見動人乃有兵必起合鬬其直雲氣如三匹帛廣前兌後大軍行氣也韓雲如布趙雲如牛楚雲如日宋雲如車魯雲如馬衛雲如犬周雲如車輪秦雲如行人魏雲如鼠鄭雲如絳衣越雲如龍蜀雲如囷車氣乍高乍下往往而聚騎氣卑而布卒氣摶前卑後高者疾前方而高後鋭而卑者却其氣平者其行徐前高後卑者不止而返校騎之氣正蒼黑長數百丈遊兵之氣如彗掃一云長數百丈無根本喜氣上黃下赤怒氣上下赤憂氣上下黑土功氣黃白徙氣白凡候氣之法氣初出時若雲非雲若霧非霧髣佛若可見初出森森然在桑榆上高五六尺者是千五百里外平視則千里舉目望即五百里仰瞻中天即百里內平望桑榆間二千里登高而望下屬地者三千里敵在東日出候之在南日中候之在西日入候之在北夜半候之軍上氣高勝下厚勝薄實勝虛長勝短澤勝枯氣見以知大占期內有大風雨久陰則災不成史傳事驗天變惠帝元康二年二月天西北大裂案劉向說天裂陽不足地動陰有餘是時人主昏瞀妃后專制太安二年八月庚午天中裂為二有聲如雷者三君道虧而臣下專僭之象也是日長沙王奉帝出距成都河間二王後成都河間東海又迭專威命是其應也穆帝升平五年八月己卯夜天中裂廣三四丈有聲如雷野雉皆鳴是後哀帝荒疾海西失德皇太后臨朝太宗總萬機桓溫專權威振內外陰氣盛陽氣微元帝太興二年八月戊戌天鳴東南有聲如風水相薄京房易妖占曰天有聲人主憂三年十月壬辰天又鳴甲午止其後王敦入石頭王師敗績元帝屈辱制於強臣既而晏駕大恥不雪安帝隆安五年閏月癸丑天東南鳴六年九月戊子天東南又鳴是後桓玄篡位安帝播越憂莫大焉鳴每東南者蓋中興江外天隨之而鳴也義熙元年八月天鳴在東南京房易傳曰萬姓勞厥妖天鳴是時安帝雖反正而兵革歲動衆庶勤勞也日蝕魏文帝黃初二年六月戊辰晦日有蝕之有司奏免太尉詔曰災異之作以譴元首而歸過股肱豈禹湯罪己之義乎其令百官各虔厥職後有天地眚勿復劾三公三年正月丙寅朔日有蝕之十一月庚申晦又日有蝕之五年十一月戊申晦日有蝕之明帝太和初太史令許芝奏日應蝕與太尉於靈臺祈禳帝曰蓋聞人主政有不德則天懼之以災異所以譴告使得自修也故日月薄蝕明治道有不當者朕即位以來既不能光明先帝聖德而施化有不合於皇神故上天有以寤之宜敕政自修有以報於神明天之於人猶父之於子未有父欲責其子而可獻盛饌以求免也今外欲遣上公與太史令俱禳祠之於義未聞也羣公卿士大夫其各勉修厥職有可以補朕不逮者各封上之太和五年十一月戊戌晦日有蝕之六年正月戊辰朔日有蝕之見吳曆青龍元年閏月庚寅朔日有蝕之少帝正始元年七月戊申朔日有蝕之三年四日戊戌朔日有蝕之四年五月丁丑朔日有蝕之五年四月丙辰朔日有蝕之六年四月壬子朔日有蝕之十月戊申朔又日有蝕之八年二月庚午朔日有蝕之是時曹爽專政丁謐鄧揚等轉改法度會有日蝕之變詔羣臣問得失蔣濟上疏曰昔大舜佐治戒在比周周公輔政慎於其朋齊侯問災晏子對以布惠魯君問異臧孫答以緩役塞變應天乃實人事濟旨譬甚切而君臣不悟終至敗亡九年正月乙未朔日有蝕之嘉平元年二月己未朔日有蝕之高貴鄉公甘露四年七月戊子朔日有蝕之五年正月乙酉朔日有蝕之京房易占曰日蝕乙酉君弱臣強司馬將兵反征其王五月有成濟之變元帝景元二年五月丁未朔日有蝕之三年十一月己亥朔日有蝕之武帝泰始二年七月丙午晦日有蝕之十月丙午朔日有蝕之七年十月丁丑朔日有蝕之八年十月辛未朔日有蝕之九年四月戊辰朔日有蝕之又七月丁酉朔日有蝕之十年正月乙未三月癸亥並日有蝕之咸寧元年七月甲申晦日有蝕之三年正月丙子朔日有蝕之四年正月庚午朔日有蝕之太康四年三月辛丑朔日有蝕之七年正月甲寅朔日有蝕之八年正月戊申朔日有蝕之九年正月壬申朔六月庚子朔並日有蝕之永熙元年四月庚申帝崩惠帝元康九年十一月甲子朔日有蝕之十二月廢皇太子遹為庶人尋殺之永康元年正月己卯四月辛卯朔並日有蝕之永寧元年閏月丙戌朔日有蝕之光熙元年正月戊子朔七月乙酉朔並日有蝕之十一月惠帝崩十二月壬午朔又日有蝕之懷帝永嘉元年十一月戊申朔日有蝕之二年正月丙子朔日有蝕之六年二月壬子朔日有蝕之愍帝建興四年六月丁巳朔十二月甲申朔並日有蝕之五年五月丙子十一月丙子並日有蝕之時帝蒙塵于平陽元帝太興元年四月丁丑朔日有蝕之明帝太寧三年十一月癸巳朔日有蝕之在卯至斗斗吳分也其後蘇峻作亂成帝咸和二年五月甲申朔日有蝕之在井井主酒食女主象也明年皇太后以憂崩六年三月壬戌朔日有蝕之是時帝已年長每幸司徒第猶出入見王導夫人曹氏如子弟之禮以人君而敬人臣之妻有虧君德之象也九年十月乙未朔日有蝕之是時帝既冠當親萬機而委政大臣著君道有虧也咸康元年十月乙未朔日有蝕之七年二月甲子朔日有蝕之三月杜皇后崩八年正月乙未朔日有蝕之京都大雨郡國以聞是謂三朝王者惡之六月而帝崩穆帝永和二年四月己酉七年正月丁酉八年正月辛卯並日有蝕之十二年十月癸巳朔日有蝕之在尾尾燕分北狄之象也是時邊表姚襄苻生互相吞噬朝廷憂勞征伐不止升平四年八月辛丑朔日有蝕之幾既在角凡蝕淺者禍淺深者禍大角為天門人主惡之明年而帝崩哀帝隆和元年三月甲寅朔十二月戊午朔並日有蝕之明年而帝有疾不識萬機海西公太和三年三月丁巳朔五年七月癸酉朔並日有蝕之皆海西被廢之應也孝武帝寧康三年十月癸酉朔日有蝕之太元四年閏月己酉朔日有蝕之是時苻堅攻沒襄陽執朱序六年六月庚子朔日有蝕之九年十月辛亥朔日有蝕之十七年五月丁卯朔日有蝕之二十年三月庚辰朔日有蝕之明年帝崩安帝隆安四年六月庚辰朔日有蝕之是時元顯執政元興二年四月癸巳朔日有蝕之其冬桓玄篡位義熙三年七月戊戌朔日有蝕之十年九月丁巳朔日有蝕之十一年七月辛亥晦日有蝕之十三年正月甲戌朔日有蝕之明年帝崩恭帝元熙元年十一月丁亥朔日有蝕之自義熙元年至是日蝕皆從上始皆為革命之徵周禮眂祲氏掌十輝之法以觀妖祥辨吉凶有祲象鐫監暗瞢彌序隮想凡十後代名變說者莫同今録其著應以次之云吳孫權赤烏十一年二月白虹貫日權發詔戒懼武帝泰始五年七月甲寅日暈再重白虹貫之太康元年正月己丑朔五色氣冠日自卯至酉占曰君道失明丑為斗牛主吳越是時孫晧淫暴四月降惠帝元康元年十一月甲申日暈再重青赤有光九年正月日中有若飛燕者數日乃消王隱以為愍懷廢死之徵永康元年正月癸亥朔日暈三重十月乙未日暗黃霧四塞占曰不及三年下有拔城大戰十二月庚戌日中有黑氣京房易傳曰祭天不順茲謂逆厥異日中有黑氣永寧元年九月甲申日中有黑子京房易占黑者陰也臣不掩君惡令下見百姓惡君則有此變又曰臣有蔽主明者太安元年十一月日中有黑氣永興元年十一月日中有黑氣分日光熙元年五月壬辰癸巳日光四散赤如血流照地皆赤甲午又如之占曰君道失明懷帝永嘉元年十一月乙亥黃黑氣掩日所照皆黃案河圖占曰日薄也其說曰凡日蝕皆於朔晦有不於晦朔者為日薄雖非日月同宿時陰氣盛掩日光也占類日蝕二年正月戊申白虹貫日二月癸卯白虹貫日青黃暈五重占曰白虹貫日近臣為亂不則諸侯有反者暈五重有國者受其祥天下有兵破亡其地明年司馬越暴蔑人主五年劉聰破京都帝蒙塵于寇庭五年三月庚申日散光如血下流所照皆赤日中有若飛燕者愍帝建興二年正月辛未辰時日隕于地又有三日相承出於西方而東行五年正月庚子三日並照虹霓彌天日有重暈左右兩珥占曰白虹兵氣也三四五六日俱出並爭天下兵作丁巳亦如其數又曰三日並出不過三旬諸侯爭為帝日重暈天下有立王暈而珥天下有立侯故陳卓曰當有大慶天下其三分乎三月而江東改元為建武劉聰李雄亦跨曹劉疆宇於是兵連纍葉元帝太興元年十一月乙卯日夜出高三丈中有赤青珥四年二月癸亥日鬬三月癸未日中有黑子辛亥帝親録訊囚徒永昌元年十月辛卯日中有黑子時帝寵幸劉隗擅威福虧傷君道王敦因之舉兵逼京都禍及忠賢明帝太寧元年正月己卯朔日暈無光癸巳黃霧四塞占曰君道失明陰陽昏臣有陰謀京房曰下專刑茲謂分威蒙微而日不明先是王敦害尚書令刁協僕射周顗驃騎將軍戴若思等是專刑之應敦既陵上卒伏其辜十一月丙子白虹貫日史官不見桂陽太守華包以聞成帝咸和九年七月白虹貫日咸康元年七月白虹貫日二年七月白虹貫日自後庾氏專政由后族而貴蓋亦婦人擅國之義故頻年白虹貫日八年正月壬申日中有黑子丙子乃滅夏帝崩穆帝永和八年張重華在涼州日暴赤如火中有三足烏形見分明五日乃止十年十月庚辰日中有黑子大如雞卵十一年三月戊申日中有黑子大如桃二枚時天子幼弱久不親國政升平三年十月丙午日中有黑子大如雞卵少時而帝崩海西公太和三年九月戊辰夜二虹見東方四年四月戊辰日暈厚密白虹貫日中十月乙未日中有黑子五年二月辛酉日中有黑子大如李六年三月辛未白虹貫日日暈五重十一月桓溫廢帝即簡文咸安元年也簡文咸安二年十一月丁丑日中有黑子孝武寧康元年十一月己酉日中有黑子大如李二年三月庚寅日中有黑子二枚大如鴨卵十一月己巳日中有黑子大如雞卵時帝已長而康獻皇后以從嫂臨朝實傷君道故日有瑕也太元十三年二月庚子日中有黑子二大如李十四年六月辛卯日中又有黑子大如李二十年十一月辛卯日中又有黑子是時會稽王以母弟干政安帝隆安元年十二月壬辰日暈有背璚是後不親萬機會稽王世子元顯專行威罰四年十一月辛亥日中有黑子元興元年二月甲子日暈白虹貫日中三月庚子白虹貫日未幾桓玄克京都王師敗績明年玄篡位義熙元年五月庚午日有彩珥六年五月丙子日暈有璚時有盧循逼京都內外戒嚴七月循走七年七月五虹見東方占曰天子黜其後劉裕代晉十年日在東井有白虹十餘丈在南干日災在秦分秦亡之象恭帝元熙二年正月壬辰白氣貫日東西有直珥各一丈白氣貫之交匝月變魏文帝黃初四年十一月月暈北斗占曰有大喪赦天下七年五月帝崩明帝即位大赦天下孝懷帝永嘉五年三月壬申丙夜月蝕既丁夜又蝕既占曰月蝕盡大人憂又曰其國貴人死海西公太和四年閏月乙亥月暈軫復有白暈貫月北暈斗柄三星占曰王者惡之六年桓溫廢帝安帝隆安五年三月甲子月生齒占曰月生齒天子有賊臣羣下自相殘桓玄篡逆之徵也義熙九年十二月辛卯朔月猶見東方是謂之仄匿則侯王其肅是時劉裕輔政威刑自己仄匿之應云十一年十一月乙未月入輿鬼而暈占曰主憂財寶出一曰月暈有赦月奄犯五緯凡月蝕五星其國皆亡五星入月其野有逐相魏明帝太和五年十二月甲辰月犯填星青龍二年十月乙丑月又犯填星占同上戊寅月犯太白占曰人君死又為兵景初元年七月公孫文懿叛二年正月遣宣帝討之三年正月天子崩四年三月己巳太白與月俱加景晝見月犯太白占同上景初元年十月丁未月犯熒惑占曰貴人死二年四月司徒韓暨薨齊王嘉平元年正月甲午太白襲月宣帝奏永寧太后廢曹爽等惠帝太安二年十一月庚辰歲星入月中占曰國有逐相十二月壬寅太白犯月占曰天下有兵三年正月己卯月犯太白占同青龍元年七月左衛將軍陳眕等率衆奉帝伐成都王六軍敗績兵逼乘輿後二年帝崩元帝太興二年十一月辛巳月犯熒惑占曰有亂臣三年十二月己未太白入月在斗郭璞曰月屬坎陰府法象也太白金行而來犯之天意若曰刑理失中自毀其法四年十二月丁亥月犯歲星在房占曰其國兵饑人流亡永昌元年三月王敦作亂率江荊之衆來攻敗京都殺將相又鎮北將軍劉隗出奔百姓並去南畝困於兵革四月又殺湘州刺史譙王司馬承鎮南將軍甘卓成帝咸康元年二月乙未太白入月四月甲午月犯太白四年四月己巳七月乙巳月俱奄太白占曰人君死又為兵人主惡之明年石季龍之衆大寇沔南於是內外戒嚴五年四月辛未月犯歲星在胃占曰國饑人流乙未月犯歲星在昴及冬有沔南邾城之敗百姓流亡萬餘家六年二月乙未太白入月占曰人主死四月甲午月犯太白占曰人主惡之穆帝永和八年十二月月在東井犯歲星占曰秦饑人流亡是時兵革連起十年十一月月奄填星在輿鬼占曰秦有兵時桓溫伐苻健健堅壁長安溫退十二年八月桓溫破姚襄升平元年十一月壬午月奄歲星在房占曰人饑一曰豫州有災二年閏三月乙亥月犯歲星在房占同上三年豫州刺史謝萬敗三年三月乙酉月犯太白在昴占曰人君死一曰趙地有兵胡不安四年正月慕容俊卒五年正月乙丑辰時月在危宿奄太白占曰天下靡散三月丁未月犯填星在軫占曰為大喪五月穆帝崩七月慕容恪攻冀州刺史呂護於野王拔之護奔走時桓溫以大衆次宛聞護敗乃退哀帝興寧元年十月丙戌月奄太白在須女占曰天下靡散一曰災在揚州三年洛陽沒其後桓溫傾揚州資實北討敗績死亡太半及征袁真淮南殘破後慕容暐及苻堅互來侵境三年正月乙卯月奄歲星在參占曰參益州分也六月鎮西將軍益州刺史周撫卒十月梁州刺史司馬勳入益州以叛朱序率衆助刺史周楚討平之海西太和元年二月丙子月奄熒惑在參占曰為內亂帝不終之徵一曰參魏地五年慕容暐為苻堅所滅孝武太元十二年二月戊寅熒惑入月占曰有亂臣死若有相戮者一曰女親為政天下亂是時琅邪王輔政王妃從兄王國寶以姻昵受寵又陳郡人袁悅昧私苟進交遘主相扇揚朋黨十三年帝殺悅於市於是主相有隙亂階興矣十三年十二月戊子辰星入月在危占曰賊臣欲殺主不出三年必有內惡是後慕容垂翟遼姚萇苻登慕容永並阻兵爭強十四年十二月乙未月犯歲星占並同上十五年翟遼據司兗衆軍纍討弗克慕容氏又跨略并冀七月旱八月諸郡大水兗州又蝗十八年正月乙酉熒惑入月占曰憂在宮中非賊乃盜也一曰有亂臣若有戮者二十一年九月帝暴崩內殿兆庶宣言夫人張氏潛行大逆又王國寶邪狡卒伏其辜十九年四月己巳月奄歲星在尾占曰為饑燕國亡二十年慕容垂遣息寶伐魏反為所破死者數萬人二十一年垂死國遂衰亡安帝隆安元年六月庚午月奄太白在太微端門外占曰國受兵乙酉月奄歲星在東壁占曰為饑衛地有兵二年六月郗恢遣鄧啓方等以萬人伐慕容寶於滑臺啓方敗三年九月桓玄等並舉兵於是內外戒嚴四年正月乙亥月犯填星在牽牛占曰吳越有兵喪女主憂六月乙未月又犯填星在牽牛十月乙未月奄歲星在北河占曰為饑胡有兵其四年五月孫恩破會稽殺內史謝琰後又破高雅之於餘姚死者十七八七月太皇太后李氏崩元興元年孫恩寇臨海人衆餓死散亡殆盡元興元年四月辛丑月奄辰星七月大饑人相食二年十一月辛巳月犯熒惑占悉同上二年十二月桓玄篡位放遷帝后於尋陽以永安何皇后為零陵君三年二月劉裕盡誅桓氏三年二月甲辰月奄歲星於左角占曰天下兵起是年二月丙辰劉裕起義兵殺桓修等明年正月衆軍攻桓振卒滅諸桓義熙元年四月己卯月犯填星在東壁占曰其地亡國一曰貴人死七月己未月奄填星在東壁占曰其國以伐亡一曰人流十月丁巳月奄填星在營室占同上十一月荊州刺史魏詠之卒二年二月司馬國璠等攻沒弋陽三年司徒揚州刺史王謐薨四年正月太保武陵王遵薨三月左僕射孔安國薨二年十二月丙午月奄太白在危占曰齊亡國一曰強國君死五年四月劉裕大軍北討慕容超卒滅之七年六月庚子月犯歲星在畢占曰有邊兵且饑八月乙未月犯歲星在參占曰益州兵饑七月朱齡石剋蜀蜀人尋反又討之八年正月庚戌月犯歲星在畢占同上九年七月朱齡石滅蜀十二年五月甲申月犯歲星在左角占曰為饑十四年四月壬申月犯填星於張占曰天下有大喪其明年帝崩恭帝元熙元年七月月犯歲星占悉同上十二月丁巳月犯太白于羽林二年六月帝遜位禪宋五星聚舍魏明帝太和四年七月壬戌太白犯歲星占曰太白犯五星有大兵五年三月諸葛亮以大衆寇天水時宣帝為大將軍距退之青龍二年二月己未太白犯熒惑占曰大兵起有大戰是年四月諸葛亮據渭南吳亦起兵應之魏東西奔命惠帝元康三年填星歲星太白三星聚于畢昴占曰為兵喪畢昴趙地也後賈后陷殺太子趙王廢后又殺之斬張華裴頠遂篡位廢帝為太上皇天下從此遘亂連禍永寧二年十一月熒惑太白鬬于虛危占曰大兵起破軍殺將虛危又齊分也十二月熒惑襲太白于營室占曰天下兵起亡君之戒一曰易相初齊王冏之京都因留輔政遂專傲無君是月成都河間檄長沙王討之冏交戰攻焚宮闕冏兵敗夷滅又殺其兄上軍將軍實以下二千餘人太安二年成都又攻長沙於是公私饑困百姓力屈太安三年正月熒惑犯歲星占曰有戰七月左衛將軍陳眕奉帝伐成都六軍敗績光熙元年九月填星犯歲星占曰填與歲合為內亂是時司馬越專權終以無禮破滅內亂之應也十二月癸未太白犯填星占曰為內兵有大戰是後河間王為東海王越所殺明年正月東海王越殺諸葛玫等五月汲桑破馮嵩殺東燕王八月苟晞大破汲桑懷帝永嘉六年七月熒惑歲星太白聚牛女之間徘徊進退案占曰牛女揚州分是後兩都傾覆而元帝中興揚土建武元年五月癸未太白熒惑合於東井占曰金火合曰爍為喪是時愍帝蒙塵于平陽七月崩于寇庭元帝太興二年七月甲午歲星熒惑會于東井八月乙未太白犯歲星合在翼占曰為兵饑三年六月丙辰太白與歲星合于房占同上永昌元年王敦攻京師六軍敗績王敦尋死成帝咸康三年十一月乙丑太白犯歲星于營室占曰為兵饑四年二月石季龍破幽州遷萬餘家以南五年季龍衆五萬寇沔南略七千餘家而去又騎二萬圍陷邾城殺略五千餘人四年十二月癸丑太白犯填星在箕占曰王者亡地七年慕容皓自稱燕王七年三月太白熒惑合于太微中犯左執法明年顯宗崩八年十二月己酉太白犯熒惑于胃占曰大兵起其後庾翼大發兵謀伐石季龍專制上流康帝建元元年八月丁未太白犯歲星在軫占曰有大兵是年石季龍將劉寧寇沒狄道穆帝永和四年五月熒惑入婁犯填星占曰兵大起有喪災在趙其年石季龍死來年冉閔殺石遵及諸胡十萬餘人其後褚裒北伐喪衆而薨六年三月戊戌熒惑犯歲星占曰為戰七年三月戊子歲星熒惑合于奎其年劉顯殺石祗及諸胡帥中土大亂十二年七月丁卯太白犯填星在柳占曰周地有大兵其年八月桓溫伐苻健退因破姚襄於伊水定周地升平二年八月戊午熒惑犯填星在張占曰兵大起三年八月庚午太白犯填星在太微中占曰王者惡之五年十月丁卯熒惑犯歲星在營室占曰大臣有匿謀一曰衛地有兵時桓溫擅權謀移晉室海西公太和元年八月戊午太白犯歲星在太微中三年六月甲寅太白奄熒惑在太微端門中六年海西公廢簡文咸安二年正月己酉歲星犯填星在須女占曰為內亂七月帝崩桓溫擅權謀殺侍中王坦之等內亂之應孝武寧康二年十一月癸酉太白奄熒惑在營室占曰金火合為爍為兵喪太元元年七月苻堅伐涼州破之虜張天錫太元十一年十二月己丑太白犯歲星占曰為兵饑是時河朔未平兵連在外冬大饑十七年九月丁丑歲星熒惑填星同在亢氐十二月癸酉填星去熒惑歲星猶合占曰三星合是謂驚立絶行內外有兵喪與饑改立王公十九年十月太白填星熒惑辰星合于氐十二月癸丑大白犯歲星在斗占曰為亂饑為內兵斗吳越分至隆安元年王恭等舉兵顯王國寶之罪朝廷殺之是後連歲水旱饑安帝隆安元年二月歲星熒惑皆入羽林占曰中軍兵起四月王恭等舉兵內外戒嚴元興元年八月庚子太白犯歲星在上將東南占曰楚兵饑一曰災在上將二年桓玄篡位三年劉裕盡誅桓氏二年十月丁丑太白犯填星在婁占同上三年二月壬辰太白熒惑合于羽林二年十二月桓玄篡位放遷帝后三年二月劉裕起義兵桓玄逼帝東下義熙二年十二月丁未熒惑太白皆入羽林又合于壁三年正月慕容超寇淮北徐州至下邳八月遣劉敬宣伐蜀三年二月癸亥熒惑填星太白辰星聚于奎婁從填星也徐州分是時慕容超僭號于齊兵連徐兗連歲寇抄至于淮泗姚興譙縱僭號秦蜀盧循及魏南北交侵其五年劉裕北殄慕容超其六月辛卯熒惑犯辰星在翼占曰天下兵起八月己卯太白奄熒惑占曰有大兵其四年姚略遣衆征赫連勃勃大為所破五年四月甲戌熒惑犯辰星在東井占曰皆為兵十二月辛丑太白犯歲星在奎占曰大兵起魯有兵是年四月劉裕討慕容超六年二月滅慕容超于魯地七年七月丁卯歲星犯填星在參占曰歲填合為內亂一曰益州戰不勝亡地是時朱齡石伐蜀後竟滅之明年誅謝混劉毅八年七月甲申太白犯填星在東井占曰秦有大兵九年二月丙午熒惑填星皆犯東井占曰秦有兵三月壬辰歲星熒惑填星太白聚于東井從歲星也東井秦分十三年劉裕定關中其後遂移晉祚十四年十月癸巳熒惑入太微犯西蕃上將仍順行至左掖門內留二十日乃逆行至恭帝元熙元年三月五日出西蕃上將西三尺許又順還入太微時填星在太微熒惑繞填星成鉤己其年四月丙戌從端門出占曰熒惑與填星鉤己天庭天下更紀十二月安帝母弟琅邪王踐阼是曰恭帝來年禪于宋
