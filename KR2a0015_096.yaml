body:
  text: 晉書卷九十六列傳第六十六列女夫三才分位室家之道克隆二族交歡貞烈之風斯著振高情而獨秀魯冊於是飛華挺峻節而孤標周篇於焉騰茂徽烈兼劭柔順無愆隔代相望諒非一緒然則虞興媯汭夏盛塗山有娀有廣隆殷之業大妊大姒衍昌姬之化馬鄧恭儉漢朝推德宣昭懿淑魏代揚芬斯皆禮極中闈義殊月室者矣至若恭姜誓節孟母求仁華率傅而經齊樊授規而霸楚譏文伯於奉劍讓子發於分菽少君之從約禮孟光之符隱志既昭婦則且擅母儀子政緝之於前元凱編之於後具宣閨範有裨陰訓故上從泰始下迄恭安一操可稱一藝可紀咸皆撰録為之傳云或位極后妃或事因夫子各隨本傳今所不録在諸僞國暫阻王猷天下之善足以懲勸亦同搜次附於篇末羊耽妻辛氏羊耽妻辛氏字憲英隴西人魏侍中毗之女也聰朗有才鑒初魏文帝得立為太子抱毗項謂之曰辛君知我喜不毗以告憲英憲英歎曰太子代君主宗廟社稷者也代君不可以不戚主國不可以不懼宜戚而喜何以能久魏其不昌乎弟敞為大將軍曹爽參軍宣帝將誅爽因其從魏帝出而閉城門爽司馬魯芝率府兵斬關赴爽呼敞同去敞懼問憲英曰天子在外太傅閉城門人云將不利國家於事可得爾乎憲英曰事有不可知然以吾度之太傅殆不得不爾明皇帝臨崩把太傅臂屬以後事此言猶在朝士之耳且曹爽與太傅俱受寄託之任而獨專權勢於王室不忠於人道不直此舉不過以誅爽耳敞曰然則敞無出乎憲英曰安可以不出職守人之大義也凡人在難猶或恤之為人執鞭而棄其事不祥也且為人任為人死親昵之職也汝從衆而已敞遂出宣帝果誅爽事定後敞歎曰吾不謀於姊幾不獲於義其後鍾會為鎮西將軍憲英謂耽從子祜曰鍾士季何故西出祜曰將為滅蜀也憲英曰會在事縱恣非持久處下之道吾畏其有他志也及會將行請其子琇為參軍憲英憂曰他日吾為國憂今日難至吾家矣琇固請於文帝帝不聽憲英謂琇曰行矣戒之古之君子入則致孝於親出則致節於國在職思其所司在義思其所立不遺父母憂患而已軍旅之間可以濟者其惟仁恕乎會至蜀果反琇竟以全歸祜嘗送錦被憲英嫌其華反而覆之其明鑒儉約如此泰始五年卒年七十九杜有道妻嚴氏杜有道妻嚴氏字憲京兆人也貞淑有識量年十三適於杜氏十八而嫠居子植女韡並孤藐憲雖少誓不改節撫育二子教以禮度植遂顯名於時韡亦有淑德傅玄求為繼室憲便許之時玄與何晏鄧揚不穆晏等每欲害之時人莫肯共婚及憲許玄內外以為憂懼或曰何鄧執權必為玄害亦由排山壓卵以湯沃雪耳奈何與之為親憲曰爾知其一不知其他晏等驕侈必當自敗司馬太傅獸睡耳吾恐卵破雪銷行自有在遂與玄為婚晏等尋亦為宣帝所誅植後為南安太守植從兄預為秦州刺史被誣徵還憲與預書戒之曰諺云忍辱至三公卿今可謂辱矣能忍之公是卿坐預後果為儀同三司玄前妻子咸年六歲嘗隨其繼母省憲謂咸曰汝千里駒也必當遠至以其妹之女妻之咸後亦有名於海內其知人之鑒如此年六十六卒王渾妻鍾氏王渾妻鍾氏字琰潁川人魏太傅繇曾孫也父徽黃門郎琰數歲能屬文及長聰慧弘雅博覽記籍美容止善嘯詠禮儀法度為中表所則既適渾生濟渾嘗共琰坐濟趨庭而過渾欣然曰生子如此足慰人心琰笑曰若使新婦得配參軍生子故不翅如此參軍謂渾中弟淪也琰女亦有才淑為求賢夫時有兵家子甚俊濟欲妻之白琰琰曰要令我見之濟令此兵與羣小雜處琰自幃中察之既而謂濟曰緋衣者非汝所拔乎濟曰是琰曰此人才足拔萃然地寒壽促不足展其器用不可與婚遂止其人數年果亡琰明鑒遠識皆此類也渾弟湛妻郝氏亦有德行琰雖貴門與郝雅相親重郝不以賤下琰琰不以貴陵郝時人稱鍾夫人之禮郝夫人之法云鄭袤妻曹氏鄭袤妻曹氏魯國薛人也袤先娶孫氏早亡娉之為繼室事舅姑甚孝躬紡績之勤以充奉養至於叔妹羣娣之間盡其禮節咸得歡心及袤為司空其子默等又顯朝列時人稱其榮貴曹氏深懼盛滿每默等升進輒憂之形於聲色然食無重味服浣濯之衣袤等所獲祿秩曹氏必班散親姻務令周給家無餘資初孫氏瘞於黎陽及袤薨議者以久喪難舉欲不合葬曹氏曰孫氏元妃理當從葬何可使孤魂無所依邪於是備吉凶導從之儀以迎之具衣衾几筵親執雁行之禮聞者莫不歎息以為趙姬之下叔隗不足稱也太康元年卒年八十三愍懷太子妃王氏愍懷太子妃王氏太尉衍女也字惠風貞婉有志節太子既廢居於金墉衍請絶婚惠風號哭而歸行路為之流涕及劉曜陷洛陽以惠風賜其將喬屬屬將妻之惠風拔劍距屬曰吾太尉公女皇太子妃義不為逆胡所辱屬遂害之鄭休妻石氏鄭休妻石氏不知何許人也少有德操年十餘歲鄉邑稱之既歸鄭氏為九族所重休前妻女既幼又休父布臨終有庶子沈生命棄之石氏曰奈何使舅之胤不存乎遂養沈及前妻女力不兼舉九年之中三不舉子陶侃母湛氏陶侃母湛氏豫章新淦人也初侃父丹娉為妾生侃而陶氏貧賤湛氏每紡績資給之使交結勝己侃少為尋陽縣吏嘗監魚梁以一坩鮓遺母湛氏封鮓及書責侃曰爾為吏以官物遺我非惟不能益吾乃以增吾憂矣鄱陽孝廉范逵寓宿於侃時大雪湛氏乃徹所臥新薦自銼給其馬又密截髮賣與鄰人供肴饌逵聞之歎息曰非此母不生此子侃竟以功名顯賈渾妻宗氏賈渾妻宗氏不知何許人也渾為介休令被劉元海將喬晞攻破死之宗氏有姿色晞欲納之宗氏罵曰屠各奴豈有害人之夫而欲加無禮於爾安乎何不促殺我因仰天大哭晞遂害之時年二十餘梁緯妻辛氏梁緯妻辛氏隴西狄道人也緯為散騎常侍西都陷沒為劉曜所害辛氏有殊色曜將妻之辛氏據地大哭仰謂曜曰妾聞男以義烈女不再醮妾夫已死理無獨全且婦人再辱明公亦安用哉乞即就死下事舅姑遂號哭不止曜曰貞婦也任之乃自縊而死曜以禮葬之許延妻杜氏許延妻杜氏不知何許人也延為益州別駕為李驤所害驤欲納杜氏為妻杜氏號哭守夫尸罵驤曰汝輩逆賊無道死有先後寧當久活我杜家女豈為賊妻也驤怒遂害之虞潭母孫氏虞潭母孫氏吳郡富春人孫權族孫女也初適潭父忠恭順貞和甚有婦德及忠亡遺孤藐爾孫氏雖少誓不改節躬自撫養劬勞備至性聰敏識鑒過人潭始自幼童便訓之忠義故得聲望允洽為朝廷所稱永嘉末潭為南康太守值杜韜構逆率衆討之孫氏勉潭以必死之義俱傾其資産以餽戰士潭遂克捷及蘇峻作亂潭時守吳興又假節征峻孫氏戒之曰吾聞忠臣出孝子之門汝當捨生取義勿以吾老為纍也仍盡發其家僮令隨潭助戰貿其所服環珮以為軍資於時會稽內史王舒遣子允之為督護孫氏又謂潭曰王府君遣兒征汝何為獨不潭即以子楚為督護與允之合勢其憂國之誠如此拜武昌侯太夫人加金章紫綬潭立養堂於家王導以下皆就拜謁咸和末卒年九十五成帝遣使弔祭諡曰定夫人周顗母李氏周顗母李氏字絡秀汝南人也少時在室顗父浚為安東將軍時嘗出獵遇雨過止絡秀之家會其父兄不在絡秀聞浚至與一婢於內宰猪羊具數十人之饌甚精辦而不聞人聲浚怪使覘之獨見一女子甚美浚因求為妾其父兄不許絡秀曰門戶殄瘁何惜一女若連姻貴族將來庶有大益矣父兄許之遂生顗及嵩謨而顗等既長絡秀謂之曰我屈節為汝家作妾門戶計耳汝不與我家為親親者吾亦何惜餘年顗等從命由此李氏遂得為方雅之族中興時顗等並列顯位嘗冬至置酒絡秀舉觴賜三子曰吾本渡江託足無所不謂爾等並貴列吾目前吾復何憂嵩起曰恐不如尊旨伯仁志大而才短名重而識暗好乘人之弊此非自全之道嵩性抗直亦不容於世唯阿奴碌碌當在阿母目下耳阿奴謨小字也後果如其言張茂妻陸氏張茂妻陸氏吳郡人也茂為吳郡太守被沈充所害陸氏傾家産率茂部曲為先登以討充充敗陸詣闕上書為茂謝不克之責詔曰茂夫妻忠誠舉門義烈宜追贈茂太僕尹虞二女尹虞二女長沙人也虞前任始興太守起兵討杜韜戰敗二女為韜所獲並有國色韜將妻之女曰我父二千石終不能為賊婦有死而已韜並害之荀嵩小女灌荀嵩小女灌幼有奇節嵩為襄城太守為杜曾所圍力弱食盡欲求救於故吏平南將軍石覽計無從出灌時年十三乃率勇士數十人踰城突圍夜出賊追甚急灌督厲將士且戰且前得入魯陽山獲免自詣覽乞師又為嵩書與南中郎將周訪請援仍結為兄弟訪即遣子撫率三千人會石覽俱救嵩賊聞兵至散走灌之力也王凝之妻謝氏王凝之妻謝氏字道韞安西將軍奕之女也聰識有才辨叔父安嘗問毛詩何句最佳道韞稱吉甫作頌穆如清風仲山甫永懷以慰其心安謂有雅人深致又嘗內集俄而雪驟下安曰何所似也安兄子朗曰散鹽空中差可擬道韞曰未若柳絮因風起安大悅初適凝之還甚不樂安曰王郎逸少子不惡汝何恨也答曰一門叔父則有阿大中郎羣從兄弟復有封胡羯末不意天壤之中乃有王郎封謂謝韶胡謂謝朗羯謂謝玄末謂謝川皆其小字也又嘗譏玄學植不進曰為塵務經心為天分有限邪凝之弟獻之嘗與賓客談議詞理將屈道韞遣婢白獻之曰欲為小郎解圍乃施青綾步鄣自蔽申獻之前議客不能屈及遭孫恩之難舉厝自若既聞夫及諸子已為賊所害方命婢肩輿抽刃出門亂兵稍至手殺數人乃被虜其外孫劉濤時年數歲賊又欲害之道韞曰事在王門何關他族必其如此寧先見殺恩雖毒虐為之改容乃不害濤自爾嫠居會稽家中莫不嚴肅太守劉柳聞其名請與談議道韞素知柳名亦不自阻乃簪髻素褥坐於帳中柳束修整帶造於別榻道韞風韵高邁致清雅先及家事慷慨流漣徐酬問旨詞理無滯柳退而歎曰實頃所未見瞻察言氣使人心形俱服道韞亦云親從凋亡始遇此士聽其所問殊開人胸府初同郡張玄妹亦有才質適於顧氏玄每稱之以敵道韞有濟尼者游於二家或問之濟尼答曰王夫人神情散朗故有林下風氣顧家婦清心玉映自是閨房之秀道韞所著詩賦誄頌並傳於世劉臻妻陳氏劉臻妻陳氏者亦聰辨能屬文嘗正旦獻椒花頌其詞曰旋穹周回三朝肇建青陽散輝澄景載煥標美靈葩爰採爰獻聖容映之永壽於萬又撰元日及冬至進見之儀行於世皮京妻龍氏皮京妻龍氏字憐西道縣人也年十三適京未逾年而京卒京二弟亦相次而隕既無胤嗣又無朞功之親憐貨其嫁時資裝躬自紡織數年間三喪俱舉葬斂既畢每時享祭無闕州里聞其賢屢有娉者憐誓不改醮守節窮居五十餘載而卒孟昶妻周氏孟昶妻周氏昶弟顗妻又其從妹也二家並豐財産初桓玄雅重昶而劉邁毀之昶知深自惋失及劉裕將建義與昶定謀昶欲盡散財物以供軍糧其妻非常婦人可語以大事乃謂之曰劉邁毀我於桓公便是一生淪陷決當作賊卿幸可早爾離絶脫得富貴相迎不晚也周氏曰君父母在堂欲建非常之謀豈婦人所諫事之不成當於奚官中奉養大家義無歸志也昶愴然久之而起周氏追昶坐云觀君舉厝非謀及婦人者不過欲得財物耳時其所生女在抱推而示之曰此而可賣亦當不惜況資財乎遂傾資産以給之而託以他用及事之將舉周氏謂顗妻云一昨夢殊不好門內宜浣濯沐浴以除之且不宜赤色我當悉取作七日藏厭顗妻信之所有絳色者悉斂以付焉乃置帳中潛自剔綿以絳與昶遂得數十人被服赫然悉周氏所出而家人不之知也何無忌母劉氏何無忌母劉氏征虜將軍建之女也少有志節弟牢之為桓玄所害劉氏每銜之常思報復及無忌與劉裕定謀而劉氏察其舉厝有異喜而不言會無忌夜於屏風𩹉制檄文劉氏潛以器覆燭徐登橙於屏風上窺之既知泣而撫之曰我不如東海呂母明矣既孤其誠常恐壽促汝能如此吾讐恥雪矣因問其同謀知事在裕彌喜乃說桓玄必敗義師必成之理以勸勉之後果如其言劉聰妻劉氏劉聰妻劉氏名娥字麗華僞太保殷女也幼而聰慧晝營女工夜誦書籍傅母止之娥敦習彌厲每與諸兄論經義理趣超遠諸兄深以歎伏性孝友善風儀進止聰既僭位召為右貴嬪甚寵之俄拜為后將起𨶑儀殿以居之其廷尉陳元達切諫聰大怒將斬之娥時在後堂私敕左右停刑手疏啓曰伏聞將為妾營殿今昭德足居𨶑儀非急四海未一禍難猶繁動須人力資財尤宜慎之廷尉之言國家大政夫忠臣之諫豈為身哉帝王距之亦非顧身也妾仰謂陛下上尋明君納諫之昌下忿暗主距諫之禍宜賞廷尉以美爵酬廷尉以列土如何不惟不納而反欲誅之陛下此怒由妾而起廷尉之禍由妾而招人怨國疲咎歸於妾距諫害忠亦妾之由自古敗國喪家未始不由婦人者也妾每覽古事忿之忘食何意今日妾自為之後人之觀妾亦猶妾之視前人也復何面目仰侍巾櫛請歸死此堂以塞陛下誤惑之過聰覽之色變謂其羣下曰朕比得風疾喜怒過常元達忠臣也朕甚愧之以娥表示元達曰外輔如公內輔如此后朕無憂矣及娥死僞諡武宣皇后其姊英字麗芳亦聰敏涉學而文詞機辨曉達政事過於娥初與娥同召拜左貴嬪尋卒僞追諡武德皇后王廣女王廣女者不知何許人也容質甚美慷慨有丈夫之節廣仕劉聰為西揚州刺史蠻帥梅芳攻陷揚州而廣被殺王時年十五芳納之俄於暗室擊芳不中芳驚起曰何故反邪王罵曰蠻畜我欲誅反賊何謂反乎吾聞父仇不同天母仇不同地汝反逆無狀害人父母而復以無禮陵人吾所以不死者欲誅汝耳今死自吾分不待汝殺但恨不得梟汝首於通逵以塞大恥辭氣猛厲言終乃自殺芳止之不可陝婦人陝婦人不知姓字年十九劉曜時嫠居陝縣事叔姑甚謹其家欲嫁之此婦毀面自誓後叔姑病死其叔姑有女在夫家先從此婦乞假不得因而誣殺其母有司不能察而誅之時有羣鳥悲鳴尸上其聲甚哀盛夏暴尸十日不腐亦不為蟲獸所敗其境乃經歲不雨曜遣呼延謨為太守既知其冤乃斬此女設少牢以祭其墓諡曰孝烈貞婦其日大雨靳康女靳康女者不知何許人也美姿容有志操劉曜之誅靳氏將納靳女為妾靳曰陛下既滅其父母兄弟復何用妾為妾聞逆人之誅也尚樜宮伐樹而況其子女乎因號泣請死曜哀之免康一子韋逞母宋氏韋逞母宋氏不知何郡人也家世以儒學稱宋氏幼喪母其父躬自養之及長授以周官音義謂之曰吾家世學周官傳業相繼此又周公所制經紀典誥百官品物備於此矣吾今無男可傳汝可受之勿令絶世屬天下喪亂宋氏諷誦不輟其後為石季龍徙之於山東宋氏與夫在徙中推鹿車背負父所授書到冀州依膠東富人程安壽壽養護之逞時年小宋氏晝則樵採夜則教逞然紡績無廢壽每歎曰學家多士大夫得無是乎逞遂學成名立仕苻堅為太常堅嘗幸其太學問博士經典乃憫禮樂遺闕時博士盧壼對曰廢學既久書傳零落比年綴撰正經粗集唯周官禮注未有其師竊見太常韋逞母宋氏世學家女傳其父業得周官音義今年八十視聽無闕自非此母無可以傳授後生於是就宋氏家立講堂置生員百二十人隔絳紗幔而受業號宋氏為宣文君賜侍婢十人周官學復行於世時稱韋氏宋母焉張天錫妾閻氏薛氏張天錫妾閻氏薛氏並不知何許人也咸有寵於天錫天錫寢疾謂之曰汝二人將何以報我吾死後豈可為人妻乎皆曰尊若不諱妾請效死供灑掃地下誓無他志及其疾篤二姬皆自刎天錫疾瘳追悼之以夫人禮葬焉苻堅妾張氏苻堅妾張氏不知何許人明辨有才識堅將入寇江左羣臣切諫不從張氏進曰妾聞天地之生萬物聖王之馭天下莫不順其性而暢之故黃帝服牛乘馬因其性也禹鑿龍門決洪河因水之勢也后稷之播殖百穀因地之氣也湯武之滅夏商因人之欲也是以有因成無因敗今朝臣上下皆言不可陛下復何所因也書曰天聰明自我民聰明天猶若此況於人主乎妾聞人君有伐國之志者必上觀乾象下採衆祥天道崇遠非妾所知以人事言之未見其可諺言雞夜鳴者不利行師犬羣嘷者宮室必空兵動馬驚軍敗不歸秋冬已來每夜羣犬大嘷衆雞夜鳴伏聞廄馬驚逸武庫兵器有聲吉凶之理誠非微妾所論願陛下詳而思之堅曰軍旅之事非婦人所豫也遂興兵張氏請從堅果大敗於壽春張氏乃自殺竇滔妻蘇氏竇滔妻蘇氏始平人也名蕙字若蘭善屬文滔苻堅時為秦州刺史被徙流沙蘇氏思之織錦為回文旋圖詩以贈滔宛轉循環以讀之詞甚悽惋凡八百四十字文多不録苻登妻毛氏苻登妻毛氏不知何許人壯勇善騎射登為姚萇所襲營壘既陷毛氏猶彎弓跨馬率壯士數百人與萇交戰殺傷甚衆衆寡不敵為萇所執萇欲納之毛氏罵曰吾天子后豈為賊羌所辱何不速殺我因仰天大哭曰姚萇無道前害天子今辱皇后皇天后土寧不鑒照萇怒殺之慕容垂妻段氏慕容垂妻段氏字元妃僞右光祿大夫儀之女也少而婉慧有志操常謂妹季妃曰我終不作凡人妻季妃亦曰妹亦不為庸夫婦鄰人聞而笑之垂之稱燕王納元妃為繼室遂有殊寵僞范陽王德亦娉季妃焉姊妹俱為垂德之妻卒如其志垂既僭位拜為皇后垂立其子寶為太子也元妃謂垂曰太子姿質雍容柔而不斷承平則為仁明之主處難則非濟世之雄陛下託之以大業妾未見克昌之美遼西高陽二王陛下兒之賢者宜擇一以樹之趙王麟姦詐負氣常有輕太子之心陛下一旦不諱必有難作此陛下之家事宜深圖之垂不納寶及麟聞之深以為恨其後元妃又言之垂曰汝欲使我為晉獻公乎元妃泣而退告季妃曰太子不令羣下所知而主上比吾為驪戎之女何其苦哉主上百年之後太子必亡社稷范陽王有非常器度若燕祚未終其在王乎垂死寶嗣僞位遣麟逼元妃曰后常謂主上不能嗣守大統今竟何如宜早自裁以全段氏元妃怒曰汝兄弟尚逼殺母安能保守社稷吾豈惜死念國滅不久耳遂自殺寶議以元妃謀廢嫡統無母后之道不宜成喪羣下咸以為然僞中書令眭邃大言於朝曰子無廢母之義漢之安思閻后親廢順帝猶配饗安皇先后言虛實尚未可知宜依閻后故事寶從之其後麟果作亂寶亦被殺德復僭稱尊號終如元妃之言段豐妻慕容氏段豐妻慕容民德之女也有才慧善書史能鼓琴德既僭位署為平原公主年十四適於豐豐為人所譖被殺慕容氏寡歸將改適僞壽光公餘熾慕容氏謂侍婢曰我聞忠臣不事二君貞女不更二夫段氏既遭無辜己不能同死豈復有心於重行哉今主上不顧禮義嫁我若不從則違嚴君之命矣於是剋日交禮慕容氏姿容婉麗服飾光華熾覩之甚喜經再宿慕容氏僞辭以疾熾亦不之逼三日還第沐浴置酒言笑自若至夕密書其帶云死後當埋我於段氏墓側若魂魄有知當歸彼矣遂於浴室自縊而死及葬男女觀者數萬人莫不歎息曰貞哉公主路經餘熾宅前熾聞挽歌之聲慟絶良久呂纂妻楊氏呂紹妻張氏呂纂妻楊氏弘農人也美艷有義烈纂被呂超所殺楊氏與侍婢十數人殯纂於城西將出宮超慮齎珍物出外使人搜之楊氏厲聲責超曰爾兄弟不能和睦手刃相屠我旦夕死人何用金寶超慚而退又問楊氏玉璽所在楊氏怒曰盡毀之矣超將妻之謂其父桓曰后若自殺禍及卿宗桓以告楊氏楊氏曰大人本賣女與氐以圖富貴一之已甚其可再乎乃自殺時呂紹妻張氏亦有操行年十四紹死便請為尼呂隆見而悅之欲穢其行張氏曰欽樂至道誓不受辱遂升樓自投於地二脛俱折口誦佛經俄然而死涼武昭王李玄盛后尹氏涼武昭王李玄盛后尹氏天水冀人也幼好學清辨有志節初適扶風馬元正元正卒為玄盛繼室以再醮之故三年不言撫前妻子踰於己生玄盛之創業也謨謀經略多所毗贊故西州諺曰李尹王敦煌及玄盛薨子士業嗣位尊為太后士業將攻沮渠蒙遜尹氏謂士業曰汝新造之國地狹人稀靖以守之猶懼其失云何輕舉窺冀非望蒙遜驍武善用兵汝非其敵吾觀其數年已來有并兼之志且天時人事似欲歸之今國雖小足以為政知足不辱道家明誡也且先王臨薨遺令殷勤志令汝曹深慎兵戰俟時而動言猶在耳奈何忘之不如勉修德政蓄力以觀之彼若淫暴人將歸汝汝苟德之不建事之無日矣汝此行也非唯師敗國亦將亡士業不從果為蒙遜所滅尹氏至姑臧蒙遜引見勞之對曰李氏為胡所滅知復何言或諫之曰母子命懸人手奈何倨傲且國敗子孫屠滅何獨無悲尹氏曰興滅死生理之大分何為同凡人之事起兒女之悲吾一婦人不能死亡豈憚斧鉞之禍求為臣妾乎若殺我者吾之願矣蒙遜嘉之不誅為子茂虔娉其女為妻及魏氏以武威公主妻茂虔尹氏及女遷居酒泉既而女卒撫之不哭曰汝死晚矣沮渠無諱時鎮酒泉每謂尹氏曰后諸孫在伊吾后能去不尹氏未測其言答曰子孫流漂託身醜虜老年餘命當死於此不能作裘鬼也俄而潛奔伊吾無諱遣騎追及之尹氏謂使者曰沮渠酒泉許我歸北何故來追汝可斬吾首歸終不回矣使者不敢逼而還年七十五卒於伊吾史臣曰夫繁霜降節彰徑心於後凋橫流在辰表貞期於上德匪伊君子抑亦婦人焉自晉政陵夷罕樹風檢虧間爽操相趨成俗荐之以劉石汨之以苻姚三月歌胡唯見爭新之飾一朝辭漢曾微戀舊之情馳騖風埃脫落名教頽縱忘反於茲為極至若惠風之數喬屬道韞之對孫恩荀女釋急於重圍張妻報怨於強寇僭登之后蹈死不回僞纂之妃捐生匪吝宗辛抗情而致夭王靳守節而就終斯皆冥踐義途匪因教至聳清漢之喬葉有裕徽音振幽谷之貞蕤無慚雅引比夫懸梁靡顧齒劍如歸異如齊風可以激揚千載矣贊曰從容陰禮婉娩柔則載循六行爰昭四德操潔風霜譽流邦國彤管貽訓清芬靡忒
