body:
  text: 晉書卷九十九列傳第六十九桓玄桓玄字敬道一名靈寶大司馬溫之孽子也其母馬氏嘗與同輩夜坐於月下見流星墜銅盆水中忽如二寸火珠冏然明淨競以瓢接取馬氏得而吞之若有感遂有娠及生玄有光照室占者奇之故小名靈寶妳媼每抱詣溫輒易人而後至云其重兼常兒溫甚愛異之臨終命以為嗣襲爵南郡公年七歲溫服終府州文武辭其叔父沖沖撫玄頭曰此汝家之故吏也玄因涕淚覆面衆並異之及長形貌瓌奇風神疏朗博綜藝術善屬文常負其才地以雄豪自處衆咸憚之朝廷亦疑而未用年二十三始拜太子洗馬時議謂溫有不臣之迹故折玄兄弟而為素官太元末出補義興太守鬱鬱不得志嘗登高望震澤歎曰父為九州伯兒為五湖長棄官歸國自以元勳之門而負謗於世乃上疏曰臣聞周公大聖而四國流言樂毅王佐而被謗騎劫巷伯有豺獸之慨蘇公興飄風之刺惡直醜正何代無之先臣蒙國殊遇姻婭皇極常欲以身報德投袂乘機西平巴蜀北清伊洛使竊號之寇繫頸北闕園陵修復大恥載雪飲馬灞滻懸旌趙魏勤王之師功非一捷太和之末皇基有潛移之懼遂乃奉順天人翼登聖朝明離既朗四凶兼澄向使此功不建此事不成宗廟之事豈可孰念昔太甲雖迷商祚無憂昌邑雖昏弊無三孽因茲而言晉室之機危於殷漢先臣之功高於伊霍矣而負重既往蒙謗清時聖世明王黜陟之道不聞廢忽顯明之功探射冥冥之心啓嫌謗之塗開邪枉之路者也先臣勤王艱難之勞匡復克平之勳朝廷若其遺之臣亦不復計也至於先帝龍飛九五陛下之所以繼明南面請問談者誰之由邪誰之德邪豈惟晉室永安祖宗血食於陛下一門實奇功也自頃權門日盛醜政實繁咸稱述時旨互相扇附以臣之兄弟皆晉之罪人臣等復何理可以苟存聖世何顏可以尸饗封祿若陛下忘先臣大造之功信貝錦萋菲之説臣等自當奉還三封受戮市朝然後下從先臣歸先帝於玄宮耳若陛下述遵先旨追録舊勳竊望少垂愷悌覆蓋之恩疏寢不報玄在荊楚積年優遊無事荊州刺史殷仲堪甚敬憚之及中書令王國寶用事謀削弱方鎮內外騷動知王恭有憂國之言玄潛有意於功業乃説仲堪曰國寶與君諸人素已為對唯患相弊之不速耳今既執權要與王緒相為表𩹉其所回易罔不如志孝伯居元舅之地正情為朝野所重必未便動之唯當以君為事首君為先帝所拔超居方任人情未以為允咸謂君雖有思致非方伯人若發詔徵君為中書令用殷顗為荊州君何以處之仲堪曰憂之久矣君謂計將安出玄曰國寶姦凶天下所知孝伯疾惡之情每至而當今日之會以理推之必當過人君若密遣一人信説王恭宜興晉陽之師以內匡朝廷己當悉荊楚之衆順流而下推王為盟主僕等亦皆投袂當此無不響應此事既行桓文之舉也仲堪持疑未決俄而王恭信至招仲堪及玄匡正朝廷國寶既死於是兵罷玄乃求為廣州會稽王道子亦憚之不欲使在荊楚故順其意隆安初詔以玄督交廣二州建威將軍平越中郎將廣州刺史假節玄受命不行其年王恭又與庾楷起兵討江州刺史王愈及譙王尚之兄弟玄仲堪謂恭事必克捷一時響應仲堪給玄五千人與楊佺期俱為前鋒軍至湓口王愈奔於臨川玄遣偏將軍追獲之玄佺期至石頭仲堪至蕪湖恭將劉牢之背恭歸順恭既死庾楷戰敗奔於玄軍既而詔以玄為江州仲堪等皆被換易乃各回舟西還屯於尋陽共相結約推玄為盟主玄始得志乃連名上疏申理王恭求誅尚之牢之等朝廷深憚之乃免桓修復仲堪以相和解初玄在荊州豪縱士庶憚之甚於州牧仲堪親黨勸殺之仲堪不聽及還尋陽資其聲地故推為盟主玄逾自矜重佺期為人驕悍常自謂承藉華胄江表莫比而玄每以寒士裁之佺期甚憾即欲於壇所襲玄仲堪惡佺期兄弟虓勇恐克玄之後復為己害苦禁之於是各奉詔還鎮玄亦知佺期有異謀潛有吞并之計於是屯於夏口隆安中詔加玄都督荊州四郡以兄偉為輔國將軍南蠻校尉仲堪慮玄跋扈遂與佺期結婚為援初玄既與仲堪佺期有隙慮掩襲求廣其所統朝廷亦欲成其釁隙故分佺期所督四郡與玄佺期甚忿懼會姚興侵洛陽佺期乃建牙聲云援洛密欲與仲堪共襲玄仲堪雖外結佺期而疑其心距而不許猶慮弗能禁復遣從弟遹屯於北境以遏佺期佺期既不能獨舉且不測仲堪本意遂息甲南蠻校尉楊廣佺期之兄也欲距桓偉仲堪不聽乃出廣為宜都建平二郡太守加征虜將軍佺期弟孜敬先為江夏相玄以兵襲而召之既至以為咨議參軍玄於是興軍西征亦聲云救洛與仲堪書説佺期受國恩而棄山陵宜共罪之今親率戎旅徑造金墉使仲堪收楊廣如其不爾無以相信仲堪本計欲兩全之既得玄書知不能禁乃曰君自沔而行不得一人入江也玄乃止後荊州大水仲堪振恤飢者倉廩空竭玄乘其虛而伐之先遣軍襲巴陵梁州刺史郭銓當之所鎮路經夏口玄聲云朝廷遣銓為己前鋒乃授以江夏之衆使督諸軍並進密報兄偉令為內應偉遑遽不知所為乃自齎疏示仲堪仲堪執偉為質令與玄書辭甚苦至玄曰仲堪為人不能專決常懷成敗之計為兒子作慮我兄必無憂矣玄既至巴陵仲堪遣衆距之為玄所敗玄進至楊口又敗仲堪弟子道護乘勝至零口去江陵二十里仲堪遣軍數道距之佺期自襄陽來赴與兄廣共擊玄玄懼其鋭乃退軍馬頭佺期等方復追玄苦戰佺期敗走還襄陽仲堪出奔酇城玄遣將軍馮該躡佺期獲之廣為人所縛送玄並殺之仲堪聞佺期死乃將數百人奔姚興至冠軍城為該所得玄令害之於是遂平荊雍乃表求領江荊二州詔以玄都督荊司雍秦梁益寧七州後將軍荊州刺史假節以桓修為江州刺史玄上疏固爭江州於是進督八州及楊豫八郡復領江州刺史玄又輒以偉為冠軍將軍雍州刺史時寇賊未平朝廷難違其意許之玄於是樹用腹心兵馬日盛屢上疏求討孫恩詔輒不許其後恩逼京都玄建牙聚衆外託勤王實欲觀釁而進復上疏請討之會恩已走玄又奉詔解嚴以偉為江州鎮夏口司馬刁暢為輔國將軍督八郡鎮襄陽遣桓振皇甫敷馮該等戍湓口移沮漳蠻二千戶於江南立武寧郡更招集流人立綏安郡又置諸郡丞詔徵廣州刺史刁逵豫章太守郭昶之玄皆留不遣自謂三分有二知勢運所歸屢上禎祥以為己瑞初庾楷既奔於玄玄之求討孫恩也以為右將軍玄既解嚴楷亦去職楷以玄方與朝廷構怨恐事不克禍及於己乃密結於後將軍元顯許為內應元興初元顯稱詔伐玄玄從兄石生時為太傅長史密書報玄玄本謂揚土飢饉孫恩未滅必未遑討己可得蓄力養衆觀釁而動既聞元顯將伐之甚懼欲保江陵長史卞範之説玄曰公英略威名振於天下元顯口尚乳臭劉牢之大失物情若兵臨近畿示以威賞則土崩之勢可翹足而待何有延敵入境自取蹙弱者乎玄大悅乃留其兄偉守江陵抗表率衆下至尋陽移檄京邑罪狀元顯檄至元顯大懼下船而不克發玄既失人情而興師犯順慮衆不為用有回旆之計既過尋陽不見王師意甚悅其將吏亦振庾楷謀泄收縶之至姑孰使其將馮該苻宏皇甫敷索元等先攻譙王尚之尚之敗劉牢之遣子敬宣詣玄降玄至新亭元顯自潰玄入京師矯詔曰義旗雲集罪在元顯太傅已別有教其解嚴息甲以副義心又矯詔加己總百揆侍中都督中外諸軍事丞相録尚書事揚州牧領徐州刺史又加假黃鉞羽葆鼓吹班劍二十人置左右長史司馬從事中郎四人甲仗二百人上殿玄表列太傅道子及元顯之惡徙道子於安成郡害元顯於市於是玄入居太傅府害太傅中郎毛泰泰弟遊擊將軍邃太傅參軍荀遜前豫州刺史庾楷父子吏部郎袁遵譙王尚之等流尚之弟丹楊尹恢之廣晉伯允之驃騎長史王誕太傅主簿毛遁等於交廣諸郡尋追害恢之允之於道以兄偉為安西將軍荊州刺史領南蠻校尉從兄謙為左僕射加中軍將軍領選修為右將軍徐兗二州刺史石生為前將軍江州刺史長史卞範之為建武將軍丹楊尹王謐為中書令領軍將軍大赦改元為大亨玄讓丞相自署太尉領平西將軍豫州刺史又加袞冕之服緑綟綬增班劍為六十人劍履上殿入朝不趨讚奏不名玄將出居姑孰訪之於衆王謐對曰公羊有言周公何以不之魯欲天下一乎周也願靜根本以公旦為心玄善其對而不能從遂大築城府臺館山池莫不壯麗乃出鎮焉既至姑孰固辭録尚書事詔許之而大政皆咨焉小事則決於桓謙卞範之自禍難屢構干戈不戢百姓厭之思歸一統及玄初至也黜凡佞擢俊賢君子之道粗備京師欣然後乃陵侮朝廷幽擯宰輔豪奢縱欲衆務繁興於是朝野失望人不安業時會稽飢荒玄令賑貸之百姓散在江湖採梠內史王愈悉召之還請米米既不多吏不時給頓仆道路死者十八九焉玄又害吳興太守高素輔國將軍竺謙之謙之從兄高平相朗之輔國將軍劉襲襲弟彭城內史季武冠軍將軍孫無終等皆牢之之黨北府舊將也襲兄冀州刺史軌及寧朔將軍高雅之牢之子敬宣並奔慕容德玄諷朝廷以己平元顯功封豫章公食安成郡地方二百二十五里邑七千五百戶平仲堪佺期功封桂陽郡公地方七十五里邑二千五百戶本封南郡如故玄以豫章改封息升桂陽郡公賜兄子濬降為西道縣公又發詔為桓溫諱有姓名同者一皆改之贈其母馬氏豫章公太夫人元興二年玄詐表請平姚興又諷朝廷作詔不許玄本無資力而好為大言既不克行乃云奉詔故止初欲飾裝無他處分先使作輕舸載服玩及書畫等物或諫之玄曰書畫服玩既宜在左右且兵凶戰危脫有不意當使輕而易運衆咸笑之是歲玄兄偉卒贈開府驃騎將軍以桓修代之從事中郎曹靖之説玄以桓修兄弟職居內外恐權傾天下玄納之乃以南郡相桓石康為西中郎將荊州刺史偉服始以公除玄便作樂初奏玄撫節慟哭既而收淚盡歡玄所親仗唯偉偉既死玄乃孤危而不臣之迹已著自知怨滿天下欲速定篡逆殷仲文卞範之等又共催促之於是先改授羣司解琅邪王司徒遷太宰加殊禮以桓謙為侍中衛將軍開府録尚書事王謐散騎常侍中書監領司徒桓胤中書令加桓修散騎常侍撫軍大將軍置學官教授二品子弟數百人又矯詔加其相國總百揆封南郡南平宜都天門零陵營陽桂陽衡陽義陽建平十郡為楚王揚州牧領平西將軍豫州刺史如故加九錫備物楚國置丞相已下一遵舊典又諷天子御前殿而策授焉玄屢偽讓詔遣百僚敦勸又云當親降鑾輿乃受命矯詔贈父溫為楚王南康公主為楚王后以平西長史劉瑾為尚書刁逵為中領軍王嘏為太常殷叔文為左衛皇甫敷為右衛凡衆官合六十餘人為楚官屬玄解平西豫州以平西文武配相國府新野人庾仄聞玄受九錫乃起義兵襲馮該於襄陽走之仄有衆七千於城南設壇祭祖宗七廟南蠻參軍庾彬安西參軍楊道護江安令鄧襄子謀為內應仄本仲堪黨桓偉既死石康未至故乘間而發江陵震動桓濟之子亮起兵於羅縣自號平南將軍湘州刺史以討仄為名南蠻校尉羊僧壽與石康共攻襄陽仄衆散奔姚興彬等皆遇害長沙相陶延壽以亮乘亂起兵遣收之玄徙亮於衡陽誅其同謀桓奧等玄偽上表求歸藩又自作詔留之遣使宣旨玄又上表固請又諷天子作手詔固留焉玄好逞偽辭塵穢簡牘皆此類也謂代謝之際宜有禎祥乃密令所在上臨平湖開除清朗使衆官集賀矯詔曰靈瑞之事非所敢聞也斯誠相國至德故事為之應太平之化於是乎始六合同悅情何可言又詐云江州甘露降王成基家竹上玄以歷代咸有肥遁之士而己世獨無乃徵皇甫謐六世孫希之為著作并給其資用皆令讓而不受號曰高士時人名為充隱議復肉刑斷錢貨回復改異造革紛紜志無一定條制森然動害政理性貪鄙好奇異尤愛寶物珠玉不離於手人士有法書好畫及佳園宅者悉欲歸己猶難逼奪之皆蒱博而取遣臣佐四出掘果移竹不遠數千里百姓佳果美竹無復遺餘信悅諂譽逆忤讜言或奪其所憎與其所愛十一月玄矯制加其冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲罕樂八佾設鍾虡宮縣妃為王后世子為太子其女及孫爵命之號皆如舊制玄乃多斥朝臣為太宰僚佐又矯詔使王謐兼太保領司徒奉皇帝璽禪位於己又諷帝以禪位告廟出居永安宮移晉神主於琅邪廟初玄恐帝不肯為手詔又慮璽不可得逼臨川王寶請帝自為手詔因奪取璽比臨軒璽已久出玄甚喜百官到姑孰勸玄僭偽位玄偽讓朝臣固請玄乃於城南七里立郊登壇篡位以玄牡告天百僚陪列而儀注不備忘稱萬歲又不易帝諱榜為文告天皇后帝云晉帝欽若景運敬順明命以命于玄夫天工人代帝王所以興匪君莫治惟德司其元故承天理物必由一統並聖不可以二君非賢不可以無主故世換五帝鼎遷三代爰暨漢魏咸歸勳烈晉自中葉仍世多故海西之亂皇祚殆移九代廓寧之功升明黜陟之勳微禹之德左衽將及太元之末君子道消積釁基亂鍾於隆安禍延士庶理絶人倫玄雖身在草澤見棄時班義情理感胡能無慨投袂克清之勞阿衡撥亂之績皆仰憑先德遺愛之利玄何功焉屬當理運之會猥集樂推之數以寡昧之身踵下武之重膺革泰之始託王公之上誠仰藉洪基德漸有由夕惕祗懷罔知攸厝君位不可以久虛人神不可以乏饗是用敢不奉以欽恭大禮敬簡良辰升壇受禪告類上帝以永綏衆望式孚萬邦惟明靈是饗乃下書曰夫三才相資天人所以成功理由一統貞夫所以司契帝王之興其源深矣自三五已降世代參差雖所由或殊其歸一也朕皇考宣武王聖德高邈誕啓洪基景命攸歸理貫自昔中間屯險弗克負荷仰瞻宏業殆若綴旒藉否終之運遇時來之會用獲除姦救溺拯拔人倫晉氏以多難荐臻曆數唯既典章唐虞之準述遵漢魏之則用集天祿於朕躬惟德不敏辭不獲命稽若令典遂升壇燎于南郊受終于文祖思覃斯慶願與億兆聿茲更始於是大赦改元永始賜天下爵二級孝悌力田人三級魚衆寡孤獨不能自存者穀人五斛其賞賜之制徒設空文無其實也初出偽詔改年為建始右丞王悠之曰建始趙王倫偽號也又改為永始復是王莽始執權之歲其兆號不祥冥符僭逆如此又下書曰夫三恪作賓有自來矣爰暨漢魏咸建疆宇晉氏欽若曆數禪位于朕躬宜則是古訓授茲茅土以南康之平固縣奉晉帝為平固王車旗正朔一如舊典遷帝居尋陽即陳留王處鄴宮故事降永安皇后為零陵君琅邪王為石陽縣公武陵王遵為彭澤縣侯追尊其父溫宣武皇帝廟稱太廟南康公主為宣皇后封子升為豫章郡王叔父雲孫放之為寧都縣王豁孫稚玉為臨沅縣王豁次子石康為右將軍武陵郡王祕子蔚為醴陵縣王贈沖太傅宣城郡王加殊禮依晉安平王故事以孫胤襲爵為吏部尚書沖次子謙為揚州刺史新安郡王謙弟修為撫軍大將軍安成郡王兄歆臨賀縣王禕富陽縣王贈偉侍中大將軍義興郡王以子濬襲爵為輔國將軍濬弟邈西昌縣王封王謐為武昌公班劍二十人卞範之為臨汝公殷仲文為東興公馮該為魚復侯又降始安郡公為縣公長沙為臨湘縣公廬陵為巴丘縣公各千戶其康樂武昌南昌望蔡建興永修觀陽皆降封百戶公侯之號如故又普進諸征鎮軍號各有差以相國左長史王綏為中書令崇桓謙母庾氏為宣城太妃加殊禮給以輦乘號溫墓曰永崇陵置守衛四十人玄入建康宮逆風迅激旍旗儀飾皆傾偃及小會于西堂設妓樂殿上施絳綾帳縷黃金為顏四角作金龍頭銜五色羽葆旒蘇羣臣竊相謂曰此頗似車亦王莽仙蓋之流也龍角所謂亢龍有悔者也又造金根車駕六馬是月玄臨聽訟觀閲囚徒罪無輕重多被原放有干輿乞者時或恤之其好行小惠如此自以水德壬辰臘于祖改尚書都官郎為賊曹又增置五校三將及強弩積射武衛官元興三年玄之永始二年也尚書答春搜字誤為春菟凡所關署皆被降黜玄大綱不理而糾擲纖微皆此類也以其妻劉氏為皇后將修殿宇乃移入東宮又開東掖平昌廣莫及宮殿諸門皆為三道更造大輦容三十人坐以二百人舁之性好畋遊以體大不堪乘馬又作徘徊輿施轉關令回動無滯既不追尊祖曾疑其禮儀問於羣臣散騎常侍徐廣據晉典宜追立七廟又敬其父則子悅位彌高者情理得申道愈廣者納敬必普也玄曰禮云三昭三穆與太祖為七然則太祖必居廟之主也昭穆皆自下之稱則非逆數可知也禮太祖東向左昭右穆如晉室之廟則宣帝在昭穆之列不得在太祖之位昭穆既錯太祖無寄失之遠矣玄曾祖以上名位不顯故不欲序列且以王莽九廟見譏於前史遂以一廟矯之郊廟齋二日而已祕書監卞承之曰祭不及祖知楚德之不長也又毀晉小廟以廣臺榭其庶母蒸嘗靡有定所忌日見賓客遊宴唯至亡時一哭而已期服之內不廢音樂玄出遊水門飄風飛其儀蓋夜濤水入石頭大桁流壞殺人甚多大風吹朱雀門樓上層墜地玄自篡盜之後驕奢荒侈遊獵無度以夜繼晝兄偉葬日旦哭晚遊或一日之中屢出馳騁性又急暴呼召嚴速直官咸繫馬省前禁內歡雜無復朝廷之體於是百姓疲苦朝野勞瘁怨怒思亂者十室八九焉於是劉裕劉毅何無忌等共謀興復裕等斬桓修於京口斬桓弘於廣陵河內太守辛扈興弘農太守王元德振威將軍童厚之竟陵太守劉邁謀為內應至期裕遣周安穆報之而邁惶遽遂以告玄玄震駭即殺扈興等安穆馳去得免封邁重安侯一宿又殺之裕率義軍至竹里玄移還上宮百僚步從召侍官皆入止省中赦揚豫徐兗青冀六州加桓謙征討都督假節以殷仲文代桓修遣頓丘太守吳甫之右衛將軍皇甫敷北距義軍裕等於江乘與戰臨陳斬甫之進至羅落橋與敷戰復梟其首玄聞之大懼乃召諸道術人推算數為厭勝之法乃問衆曰朕其敗乎曹靖之對曰神怒人怨臣實懼焉玄曰人或可怨神何為怒對曰移晉宗廟飄泊失所大楚之祭不及於祖此其所以怒也玄曰卿何不諫對曰輦上諸君子皆以為堯舜之世臣何敢言玄愈忿懼使桓謙何淡之屯東陵卞範之屯覆舟山西衆合二萬以距義軍裕至蔣山使羸弱貫油帔登山分張旗幟數道並前玄偵候還云裕軍四塞不知多少玄益憂惶遣武衛將軍庾頤之配以精卒副援諸軍於時東北風急義軍放火煙塵張天鼓譟之音震駭京邑劉裕執鉞麾而進謙等諸軍一時奔潰玄率親信數千人聲言赴戰遂將其子升兄子濬出南掖門西至石頭使殷仲文具船相與南奔初玄在姑孰將相星屢有變篡位之夕月及太白又入羽林玄甚惡之及敗走腹心勸其戰玄不暇答直以策指天而經日不得食左右進以粗飯咽不能下升時年數歲抱玄胸而撫之玄悲不自勝劉裕以武陵王遵攝萬機立行臺總百官遣劉毅劉道規躡玄誅玄諸兄子及石康兄權振兄洪等玄至尋陽江州刺史郭昶之給其器用兵力殷仲文自後至望見玄舟旌旗輿服備帝者之儀歎息曰敗中復振故可也玄於是逼乘輿西上桓歆聚黨向歷陽宣城內史諸葛長民擊破之玄於道作起居注其距義軍之事自謂經略指授算無遺策諸將違節度以致虧喪非戰之罪於是不遑與羣下謀議唯耽思誦述宣示遠近玄至江陵石康納之張幔屋於城南署置百官以卞範之為尚書僕射其餘職多用輕資於是大修舟師曾未三旬衆且二萬樓船器械甚盛謂其羣黨曰卿等並清塗翼從朕躬都下竊位者方應謝罪軍門其觀卿等入石頭無異雲霄中人也玄以奔敗之後懼法令不肅遂輕怒妄殺人多離怨殷仲文諫曰陛下少播英譽遠近所服遂掃平荊雍一匡京室聲被八荒矣既據有極位而遇此圮運非為威不足也百姓喁喁想望皇澤宜弘仁風以收物情玄怒曰漢高魏武幾遇敗但諸將失利耳以天文惡故還都舊楚而羣小愚惑妄生是非方當糾之以猛未宜施之以恩也玄左右稱玄為桓詔桓胤諫曰詔者施於辭令不以為稱謂也漢魏之主皆無此言唯聞北虜以苻堅為苻詔耳願陛下稽古帝則令萬世可法玄曰此事已行今宣敕罷之更為不祥必其宜革可待事平也荊州郡守以玄播越或遣使通表有匪寧之辭玄悉不受仍乃更令所在表賀遷都玄遣遊擊將軍何淡之武衛將軍庾稚祖江夏太守桓道恭就郭銓以數千人守湓口又遣輔國將軍桓振往義陽聚衆至弋陽為龍驤將軍胡譁所破振單騎走還何無忌劉道規等破郭銓何淡之郭昶之於桑落洲進師尋陽玄率舟艦二百發江陵使苻宏羊僧壽為前鋒以鄱陽太守徐放為散騎常侍欲遣説解義軍謂放曰諸人不識天命致此妄作遂懼禍屯結不能自反卿三州所信可明示朕心若退軍散甲當與之更始各授位任令不失分江水在此朕不食言放對曰劉裕為唱端之主劉毅兄為陛下所誅並不可説也輒當申聖旨於何無忌玄曰卿使若有功當以吳興相放遂受使入無忌軍魏詠之破桓歆於歷陽諸葛長民又敗歆於芍陂歆單馬渡淮毅率道規及下邳太守孟懷玉與玄戰於崢嶸洲於時義軍數千玄兵甚盛而玄懼有敗衄常漾輕舸於舫側故其衆莫有鬬心義軍乘風縱火盡鋭爭先玄衆大潰燒輜重夜遁郭銓歸降玄故將劉統馮稚等聚黨四百人襲破尋陽城毅遣建威將軍劉懷肅討平之玄留永安皇后及皇后於巴陵殷仲文時在玄艦求出別船收集散軍因叛玄奉二后奔於夏口玄入江陵城馮該勸使更下戰玄不從欲出漢川投梁州刺史桓希而人情乖阻制令不行玄乘馬出城至門左右於暗中斫之不中前後相殺交橫玄僅得至船於是荊州別駕王康産奉帝入南郡府舍太守王騰之率文武營衛時益州刺史毛璩使其從孫祐之參軍費恬送弟璠喪葬江陵有衆二百璩弟子修之為玄屯騎校尉誘玄以入蜀玄從之達枚回洲恬與祐之迎擊玄矢下如雨玄嬖人丁仙期萬蓋等以身蔽玄並中數十箭而死玄被箭其子升輒拔去之益州督護馮遷抽刀而前玄拔頭上玉導與之仍曰是何人邪敢殺天子遷曰欲殺天子之賊耳遂斬之時年三十六又斬石康及濬等五級庾頤之戰死升云我是豫章王諸君勿見殺送至江陵市斬之初玄在宮中覺不安若為鬼神所擾語其所親云恐己當死故與時競元興中衡陽有雌雞化為雄八十日而冠萎及玄建國於楚衡陽屬焉自篡盜至敗時凡八旬矣其時有童謠云長干巷巷長干今年殺郎君後年斬諸桓其凶兆符會如此郎君謂元顯也是月王騰之奉帝入居太府桓謙亦聚衆沮中為玄舉哀立喪庭偽諡為武悼皇帝毅等傳送玄首梟於大桁百姓觀者莫不欣幸何無忌等攻桓謙於馬頭桓蔚於龍洲皆破之義軍乘勝競進振該等距戰於靈溪道規等敗績死沒者千餘人義軍退次尋陽更繕舟甲毛璩自領梁州遣將攻漢中殺桓希江夏相張暢之高平太守劉懷肅攻何淡之於西塞磯破之振遣桓蔚代王曠守襄陽道規進討武昌破偽太守王旻魏詠之劉藩破桓石綏於白茅義軍發尋陽桓亮自號江州刺史侵豫章江州刺史劉敬宣討走之義軍進次夏口偽鎮東將軍馮該等守夏口揚武將軍孟山圖據魯城輔國將軍桓山客守偃月壘劉毅攻魯城道規攻偃月壘無忌與檀祗列艦中流以防越逸義軍騰赴叫聲動山谷自辰及午二城俱潰馮該散走生擒山客毅等平巴陵毛璩遣涪陵太守文處茂東下振遣桓放之為益州屯夷陵處茂距戰放之敗走還江陵義熙元年正月南陽太守魯宗之起義兵襲襄陽破偽雍州刺史桓蔚無忌諸軍次江陵之馬頭振擁帝出營江津魯宗之率衆於柞溪破偽武賁中郎溫楷進至紀南振自擊宗之宗之失利時蜀軍據靈溪毅率無忌道規等破馮該軍推鋒而前即平江陵振見火起知城已陷乃與謙等北走是日安帝反正大赦天下唯逆黨就戮詔特免桓胤一人桓亮自豫章自號鎮南將軍湘州刺史苻宏寇安成廬陵劉敬宣遣將討之宏走入湘中二月桓謙何淡之溫楷等奔於姚興桓振與宏出自溳城襲破江陵劉懷肅自雲杜伐振等破之廣武將軍唐興斬振及偽輔國將軍桓珍毅於臨鄣斬偽零陵太守劉叔祖桓亮苻宏復出寇湘中害郡守長吏檀祗討宏於湘東斬之廣武將軍郭彌斬亮於益陽其餘擁衆假號皆討平之詔徙桓胤及諸黨與於新安諸郡三年東陽太守殷仲文與永嘉太守駱球謀反欲建桓胤為嗣曹靖之桓石松卞承之劉延祖等潛相交結劉裕以次收斬之并誅其家屬後桓謙走入蜀蜀賊譙縱以謙為荊州刺史使率兵而下荊楚之衆多應之謙至枝江荊州刺史劉道規斬之梁州刺史傅歆又斬桓石綏桓氏遂滅卞範之卞範之字敬祖濟陰宛句人也識悟聰敏見美於當世太元中自丹楊丞為始安太守桓玄少與之遊及玄為江州引為長史委以心膂之任潛謀密計莫不決之後玄將為篡亂以範之為丹楊尹範之與殷仲文陰撰策命進範之為征虜將軍散騎常侍玄僭位以範之為侍中班劍二十人進號後將軍封臨汝縣公其禪詔即範之文也玄既奢侈無度範之亦盛營館第自以佐命元勳深懷矜伐以富貴驕人子弟慢衆咸畏嫉之義軍起範之屯兵於覆舟山西為劉毅所敗隨玄西走玄又以範之為尚書僕射玄為劉毅等所敗左右分散唯範之在側玄平斬於江陵殷仲文殷仲文南蠻校尉覬之弟也少有才藻美容貌從兄仲堪薦之於會稽王道子即引為驃騎參軍甚相賞待俄轉咨議參軍後為元顯征虜長史會桓玄與朝廷有隙玄之姊仲文之妻疑而間之左遷新安太守仲文於玄雖為姻親而素不交密及聞玄平京師便棄郡投焉玄甚悅之以為咨議參軍時王謐見禮而不親卞範之被親而少禮而寵遇隆重兼於王卞矣玄將為亂使總領詔命以為侍中領左衛將軍玄九錫仲文之辭也初玄篡位入宮其牀忽陷羣下失色仲文曰將由聖德厚地不能載玄大悅以佐命親貴厚自封崇輿馬器服窮極綺麗後房伎妾數十絲竹不絶音性貪吝多納貨賄家纍千金常若不足玄為劉裕所敗隨玄西走其珍寶玩好悉藏地中皆變為土至巴陵因奉二后投義軍而為鎮軍長史轉尚書帝初反正抗表自解曰臣聞洪波振壑川無恬鱗驚飈拂野林無靜柯何者勢弱則受制於巨力質微則無以自保於理雖可得而言於臣實非所敢譬昔桓玄之代誠復驅逼者衆至如微臣罪實深矣進不能見危授命亡身殉國退不能辭粟首陽拂衣高謝遂乃宴安昏寵叨昧偽封錫文篡事曾無獨固名義以之俱淪情節自茲兼撓宜其極法以判忠邪會鎮軍將軍劉裕匡復社稷大弘善貸佇一戮於微命申三驅於大信既惠之以首領又申之以縶維於時皇輿否隔天人未泰用忘進退是以僶俯從事自同令人今宸極反正唯新告始憲章既明品物思舊臣亦胡顏之厚可以顯居榮次乞解所職待罪私門違離闕庭乃心慕戀詔不許仲文因月朔與衆至大司馬府府中有老槐樹顧之良久而歎曰此樹婆娑無復生意仲文素有名望自謂必當朝政又謝混之徒疇昔所輕者並皆比肩常怏怏不得志忽遷為東陽太守意彌不平劉毅愛才好士深相禮接臨當之郡遊宴彌日行至富陽慨然歎曰看此山川形勢當復出一伯符何無忌甚慕之東陽無忌所統仲文許當便道修謁無忌故益欽遲之令府中命文人殷闡孔寧子之徒撰義構文以俟其至仲文失志恍惚遂不過府無忌疑其薄己大怒思中傷之時屬慕容超南侵無忌言於劉裕曰桓胤殷仲文乃腹心之疾北虜不足為憂義熙三年又以仲文與駱球等謀反及其弟南蠻校尉叔文並伏誅仲文時照鏡不見其面數日而遇禍仲文善屬文為世所重謝靈運嘗云若殷仲文讀書半袁豹則文才不減班固言其文多而見書少也史臣曰桓玄纂凶父之餘基挾姦回之本性含怒於失職苞藏其豕心抗表以稱冤登高以發憤觀釁而動竊圖非望始則假寵於仲堪俄而戮殷以逞欲遂得據全楚之地驅徑勇之兵因晉政之陵遲乘會稽之酗醟縱其狙詐之計扇其陵暴之心敢率犬羊稱兵內侮天長喪亂凶力實繁踰年之間奄傾晉祚自謂法堯禪舜改物君臨鼎業方隆卜年惟永俄而義旗電發忠勇雷奔半辰而都邑廓清踰月而凶渠即戮更延墜曆復振頽綱是知神器不可以暗干天祿不可以妄處者也夫帝王者功高宇內道濟含靈龍宮鳳曆表其祥彤雲玄石呈其瑞然後光臨大寶克享鴻名允徯后之心副樂推之望若桓玄之𡺣𡋉豈足數哉適所以干紀亂常傾宗絶嗣肇金行之禍難成宋氏之驅除者乎贊曰靈寶隱賊世載凶德信順未孚姦回是則肆逆遷鼎憑威縱慝違天虐人覆宗殄國
