body:
  text: 晉書卷八十五列傳第五十五劉毅兄邁劉毅字希樂彭城沛人也曾祖距廣陵相叔父鎮左光祿大夫毅少有大志不修家人産業仕為州從事桓弘以為中兵參軍屬桓玄篡位毅與劉裕何無忌魏詠之等起義兵密謀討玄毅討徐州刺史桓修於京口青州刺史桓弘於廣陵裕率毅等至竹里玄使其將皇甫敷吳甫之北距義軍遇之於江乘臨陳斬甫之進至羅落橋又斬敷首玄大懼使桓謙何淡之屯覆舟山毅等軍至蔣山裕使羸弱登山多張旗幟玄不之測益以危懼謙等士卒多北府人素懾伏裕莫敢出鬬裕與毅等分為數隊進突謙陳皆殊死戰無不一當百時東北風急義軍放火煙塵張天鼓譟之音震駭京邑謙等諸軍一時奔散玄既西走裕以毅為冠軍將軍青州刺史與何無忌劉道規躡玄玄逼帝及琅邪王西上毅與道規及下邳太守孟懷玉等追及玄戰於崢嶸洲毅乘風縱火盡鋭爭先玄衆大潰燒輜重夜走玄將郭銓劉雅等襲陷尋陽毅遣武威將軍劉懷肅討平之及玄死桓振桓謙復聚衆距毅於靈溪玄將馮該以兵會於振毅進擊為振所敗退次尋陽坐免官尋原之劉裕命何無忌受毅節度無忌以督攝為煩輒便解統毅疾無忌專擅免其琅邪內史以輔國將軍攝軍事無忌遂與毅不平毅唯自引咎時論韙之毅復與道規發尋陽桓亮自號江州刺史遣劉敬宣擊走之毅軍次夏口時振黨馮該戍大岸孟山圖據魯城桓山客守偃月壘衆合萬人連艦二岸水陸相援毅督衆軍進討未至夏口遇風飄沒千餘人毅與劉懷肅索邈等攻魯城道規攻偃月壘何無忌與檀祗列艦於中流以防越逸毅躬貫甲胄陵城半日而二壘俱潰生擒山客而馮該遁走毅進平巴陵以毅為使持節兗州刺史將軍如故毅號令嚴整所經墟邑百姓安悅南陽太守魯宗之起義襲襄陽破桓蔚毅等諸軍次江陵之馬頭振擁乘輿出營江津宗之又破偽將溫楷振自擊宗之毅因率無忌道規等諸軍破馮該於豫章口推鋒而進遂入江陵振聞城陷與謙北走乘輿反正毅執玄黨卞範之羊僧壽夏侯崇之桓道恭等皆斬之桓振復與苻宏自鄖城襲陷江陵與劉懷肅相持毅遣部將擊振殺之并斬偽輔國將軍桓珍毅又攻拔遷陵斬玄太守劉叔祖於臨嶂其餘擁衆假號以十數皆討平之二州既平以毅為撫軍將軍時刁預等作亂屯於湘中毅遣將分討皆滅之初毅丁憂在家及義旗初興遂墨絰從事至是軍役漸寧上表乞還京口以終喪禮曰弘道為國者理盡於仁孝訴窮歸天者莫甚於喪親但臣凡庸本無感概不能隕越故其宜耳往年國難滔天故志竭愚忠靦然苟存去春鑾駕回軫而狂狡未滅雖姦凶時梟餘燼竄伏威懷寡方文武勞弊微情未申顧景悲憤今皇威遐肅海內清蕩臣窮毒艱穢亦已具於聖聽兼羸患滋甚衆疾互動如今寢頓無復人理臣之情也本不甘生語其事也亦可以沒乞賜餘骸終其丘墳庶幾忠孝之道獲宥於聖世不許詔以毅為都督豫州揚州之淮南歷陽廬江安豐堂邑五郡諸軍事豫州刺史持節將軍常侍如故本府文武悉令西屬以匡復功封南平郡開國公兼都督宣城軍事給鼓吹一部梁州刺史劉雅反毅遣將討擒之初桓玄於南州起齋悉畫盤龍於其上號為盤龍齋毅小字盤龍至是遂居之俄進拜衛將軍開府儀同三司及何無忌為盧循所敗賊軍乘勝而進朝廷震駭毅具舟船討之將發而疾篤內外失色朝議欲奉乘輿北就中軍劉裕會毅疾瘳將率軍南征裕與毅書曰吾往與妖賊戰曉其變態今修船垂畢將居前撲之克平之日上流之任皆以相委又遣毅從弟藩往止之毅大怒謂藩曰我以一時之功相推耳汝便謂我不及劉裕也投書於地遂以舟師二萬發姑孰徐道覆聞毅將至建鄴報盧循曰劉毅兵重成敗繫此一戰宜併力距之循乃引兵發巴陵與道覆連旗而下毅次于桑落洲與賊戰敗績棄船以數百人步走餘衆皆為賊所虜輜重盈積皆棄之毅走經涉蠻晉飢困死亡至者十二三參軍羊邃竭力營護之僅而獲免劉裕深慰勉之復其本職毅乃以邃為咨議參軍及裕討循詔毅知內外留事毅以喪師乞解任降為後將軍尋轉衛將軍開府儀同三司江州都督毅上表曰臣聞天以盈虛為運政以損益為道時否而政不革人凋而事不損則無以救急病於已危拯塗炭於將絶自頃戎車屢駭干戈溢境所統江州以一隅之地當逆順之衝自桓玄以來驅蹙殘敗至乃男不被養女無匹對逃亡去就不避幽深自非財殫力竭無以至此若不曲心矜理有所釐改則靡遺之歎奄焉必及夫設官分職軍國殊用牧養以息務為大武略以濟事為先兼而領之蓋出於權事因藉既久遂似常體江州在腹心之內憑接揚豫藩屏所倚實為重復昔胡寇縱逸朔馬臨江抗禦之宜蓋權爾耳今江左區區戶不盈數十萬地不踰數千里而統旅鱗次未獲減息大而言之足為國恥況乃地在無虞而猶置軍府文武將佐資費非要豈所謂經國大情揚湯去火者哉自州郡邊江百姓遼落加郵亭險閡畏阻風波轉輸往復有淹廢又非所謂因其所利以濟其弊者也愚謂宜解軍府移鎮豫章處十郡之中厲簡惠之政比及數年可有生氣且屬縣凋散示有所存而役調送迎不得止息亦謂應隨宜并合以簡衆費刺史庾悅自臨蒞以來甚有恤隱之誠但綱維不革自非綱目所理尋陽接蠻宜示有遏防可即州府千兵以助郡戍於是解悅毅移鎮豫章遣其親將趙恢領千兵守尋陽俄進毅為都督荊寧秦雍四州之河東河南廣平揚州之義成四郡諸軍事衛將軍開府儀同三司荊州刺史持節公如故毅表荊州編戶不盈十萬器械索然廣州雖凋殘猶出丹漆之用請依先準於是加督交廣二州毅至江陵乃輒取江州兵及豫州西府文武萬餘留而不遣又告疾困請藩為副劉裕以毅二于己乃奏之安帝下詔曰劉毅傲很凶戾履霜日久中間覆敗宜即顯戮晉法含弘復蒙寵授曾不思愆內訟怨望滋甚賴宰輔藏疾特加遵養遂復推轂陝西寵榮隆泰庶能洗心感遇革音改意而長惡不悛志為姦宄陵上虐下縱逸無度既解督任江州非復所統而輒徙兵衆略取軍資驅斥舊戍厚樹親黨西府二局文武盈萬悉皆割留曾無片言肆心恣欲罔顧天朝又與從弟藩遠相影響招聚剽狡繕甲阻兵外託省疾實規伺隙同惡相濟圖會荊郢尚書左僕射謝混憑藉世資超蒙殊遇而輕佻躁脫職為亂階扇動內外連謀萬里是而可忍孰不可懷乃誅藩混劉裕自率衆討毅命王弘王鎮惡蒯恩等率軍至豫章口於江津燔舟而進毅參軍朱顯之逢鎮惡以所統千人赴毅鎮惡等攻陷外城毅守內城精鋭尚數千人戰至日昃鎮惡以裕書示城內毅怒不發書而焚之毅冀有外救督士卒力戰衆知裕至莫有鬬心既暮鎮惡焚諸門齊力攻之毅衆乃散毅自北門單騎而走去江陵二十里而縊經宿居人以告乃斬於市子姪皆伏誅毅兄模奔於襄陽魯宗之斬送之毅剛猛沈斷而專肆很愎與劉裕協成大業而功居其次深自矜伐不相推伏及居方嶽常怏怏不得志裕每柔而順之毅驕縱滋甚每覽史籍至藺相如降屈於廉頗輒絶歎以為不可能也嘗云恨不遇劉項與之爭中原又謂郗僧施曰昔劉備之有孔明猶魚之有水今吾與足下雖才非古賢而事同斯言衆咸惡其陵傲不遜及敗於桑落知物情去己彌復憤激初裕征盧循凱歸帝大宴於西池有詔賦詩毅詩云六國多雄士正始出風流自知武功不競故示文雅有餘也後於東府聚摴蒱大擲一判應至數百萬餘人並黑犢以還唯劉裕及毅在後毅次擲得雉大喜褰衣繞牀叫謂同坐曰非不能盧不事此耳裕惡之因挼五木久之曰老兄試為卿答既而四子俱黑其一子轉躍未定裕厲聲喝之即成盧焉毅意殊不快然素黑其面如鐵色焉而乃和言曰亦知公不能以此見借既出西藩雖上流分陝而頓失內權又頗自嫌事計故欲擅其威強伺隙圖裕以至於敗初江州刺史庾悅隆安中為司徒長史曾至京口毅時甚屯窶先就府借東堂與親故出射而悅後與僚佐徑來詣堂毅告之曰毅輩屯否之人合一射甚難君於諸堂並可望以今日見讓悅不許射者皆散唯毅留射如故既而悅食鵝毅求其餘悅又不答毅常銜之義熙中故奪悅豫章解其軍府使人微示其旨悅忿懼而死毅之褊躁如此邁字伯羣少有才幹為殷仲堪中兵參軍桓玄之在江陵甚豪橫士庶畏之過於仲堪玄曾於仲堪廳事前戲馬以矟擬仲堪邁時在坐謂玄曰馬矟有餘精理不足玄自以才雄冠世而心知外物不許之仲堪為之失色玄出仲堪謂邁曰卿乃狂人也玄夜遣殺卿我豈能相救邁以正辭折仲堪而不以為悔仲堪使邁下都以避之玄果令追之邁僅而免禍後玄得志邁詣門稱謁玄謂邁曰安知不死而敢相見邁對曰射鉤斬袪與邁為三故知不死玄甚喜以為刑獄參軍後為竟陵太守及毅與劉裕等同謀起義邁將應之事泄為玄所害諸葛長民諸葛長民琅邪陽都人也有文武幹用然不持行檢無鄉曲之譽桓玄引為參軍平西軍事尋以貪刻免及劉裕建義與之定謀為揚武將軍從裕討桓玄以功拜輔國將軍宣城內史于時桓歆聚衆向歷陽長民擊走之又與劉敬宣破歆于芍陂封新淦縣公食邑二千五百戶以本官督淮北諸軍事鎮山陽義熙初慕容超寇下邳長民遣部將徐琰擊走之進位使持節督青揚二州諸軍事青州刺史領晉陵太守鎮丹徒本號及公如故及何無忌為徐道覆所害賊乘勝逼京師朝廷震駭長民率衆入衛京都因表曰妖賊集船伐木而南康相郭澄之隱蔽經年又深相保明屢欺無忌罪合斬刑詔原澄之及盧循之敗劉毅也循與道覆連旗而下京都危懼長民勸劉裕權移天子過江裕不聽令長民與劉毅屯于北陵以備石頭事平轉督豫州揚州之六郡諸軍事豫州刺史領淮南太守及裕討毅以長民監太尉留府事詔以甲杖五十人入殿長民驕縱貪侈不恤政事多聚珍寶美色營建第宅不知紀極所在殘虐為百姓所苦自以多行無禮懼國憲及劉毅被誅長民謂所親曰昔年醢彭越前年殺韓信禍其至矣謀欲為亂問劉穆之曰人間論者謂太尉與我不平其故何也穆之曰相公西征老母弱弟委之將軍何謂不平長民弟黎民輕狡好利固勸之曰黥彭異體而勢不偏全劉毅之誅亦諸葛氏之懼可因裕未還以圖之長民猶豫未發既而歎曰貧賤常思富貴富貴必履機危今日欲為丹徒布衣豈可得也裕深疑之駱驛繼遣輜重兼行而下前剋至日百司於道候之輒差其期既而輕舟徑進潛入東府明旦長民聞之驚而至門裕伏壯士丁旿於幕中引長民進語素所未盡皆説焉長民悅旿自後拉而殺之輿尸付廷尉使收黎民黎民驍勇絶人與捕者苦戰而死小弟幼民為大司馬參軍逃于山中追擒戮之諸葛氏之誅也士庶咸恨正刑之晚若釋桎梏焉初長民富貴之後常一月中輒十數夜眠中驚起跳踉如與人相打毛修之嘗與同宿見之駭愕問其故長民答曰正見一物甚黑而有毛腳不分明奇健非我無以制之其後來轉數屋中柱及椽桷間悉見有蛇頭令人以刀懸斫應刃隱藏去輒復出又搗衣杵相與語如人聲不可解於壁見有巨手長七八尺臂大數圍令斫之豁然不見未幾伏誅何無忌何無忌東海郯人也少有大志忠亮任氣人有不稱其心者輒形於言色州辟從事轉太學博士鎮北將軍劉牢之即其舅也時鎮京口每有大事常與參議之會稽世子元顯子彥章封東海王以無忌為國中尉加廣武將軍及桓玄害彥章於市無忌入市慟哭而出時人義焉隨牢之南征桓玄牢之將降於玄也無忌屢諫辭旨甚切牢之不從及玄篡位無忌與玄吏部郎曹靖之有舊請蒞小縣靖之白玄玄不許無忌乃還京口初劉裕嘗為劉牢之參軍與無忌素相親結至是因密共圖玄劉毅家在京口與無忌素善言及興復之事無忌曰桓氏強盛其可圖乎毅曰天下自有強弱雖強易弱正患事主難得耳無忌曰天下草澤之中非無英雄也毅曰所見唯有劉下邳無忌笑而不答還以告裕因共要毅與相推結遂共舉義兵襲京口無忌偽著傳詔服稱敕使城中無敢動者初桓玄聞裕等及無忌之起兵也甚懼其黨曰劉裕烏合之衆勢必無成願不以為慮玄曰劉裕勇冠三軍當今無敵劉毅家無儋石之儲摴蒱一擲百萬何無忌劉牢之之甥酷似其舅共舉大事何謂無成其見憚如此及玄敗走武陵王遵承制以無忌為輔國將軍琅邪內史以會稽王道子所部精兵悉配之南追桓玄與振武將軍劉道規俱受冠軍將軍劉毅節度玄留其龍驤將軍何淡之前將軍郭銓江州刺史郭昶之守湓口無忌等次桑落洲淡之等率軍來戰淡之常所乘舫旌旗甚盛無忌曰賊帥必不居此欲詐我耳宜亟攻之衆咸曰淡之不在其中其徒得之無益無忌謂道規曰今衆寡不敵戰無全勝淡之雖不居此舫取則易獲因縱兵騰之可以一鼓而敗也道規從之遂獲賊舫因傳呼曰已得何淡之矣賊中驚擾無忌之衆亦謂為然道規乘勝徑進無忌又鼓譟赴之淡之遂潰進據尋陽遣使奉送宗廟主祏及武康公主琅邪王妃還京都又與毅道規破走玄於崢嶸洲無忌進據巴陵玄從兄謙從子振乘間陷江陵無忌道規進攻謙於馬頭攻桓蔚於龍泉皆破之既而為桓振所敗退還尋陽無忌與毅道規復進討振克夏口三城遂平巴陵進次馬頭桓謙請割荊江二州奉送天子無忌不許進軍破江陵謙等敗走無忌侍衛安帝還京師以無忌督豫州揚州淮南廬江安豐歷陽堂邑五郡軍事右將軍豫州刺史加節甲杖五十人入殿未之職遷會稽內史督江東五郡軍事持節將軍如故給鼓吹一部義熙二年遷都督江荊二州江夏隨義陽綏安豫州西陽新蔡汝南潁川八郡軍事江州刺史將軍持節如故以興復之功封安成郡開國公食邑三千戶增督司州之弘農揚州之松滋加散騎侍郎進鎮南將軍盧循遣別帥徐道覆順流而下舟艦皆重樓無忌將率衆距之長史鄧潛之諫曰今以神武之師抗彼逆衆回山壓卵未足為譬然國家之計在此一舉聞其舟艦大盛勢居上流蜂蠆之毒邾魯成鑒宜決破南塘守二城以待之其必不敢捨我遠下蓄力俟其疲老然後擊之若棄萬全之長策而決成敗於一戰如其失利悔無及矣無忌不從遂以舟師距之既及賊令強弩數百登西岸小山以邀射之而薄于山側俄而西風暴急無忌所乘小艦被飄東岸賊乘風以大艦逼之衆遂奔敗無忌尚厲聲曰取我蘇武節來節至乃躬執以督戰賊衆雲集登艦者數十人無忌辭色無撓遂握節死之詔曰無忌秉哲履正忠亮明允亡身殉國則契協英謨經綸屯昧則重氛載廓及敷政方夏實播風惠妖寇搆亂侵擾邦畿投袂致討志清王略而事出慮外臨危彌厲握節隕難誠貫古賢朕用傷慟于厥懷其贈侍中司空本官如故諡曰忠肅子雍嗣初桓玄克京邑劉裕東征無忌密至裕軍所潛謀舉義勸裕於山陰起兵裕以玄大逆未彰恐在遠舉事克濟為難若玄遂竊天位然後於京口圖之事未晚也無忌乃還及義師之舉參贊大勳皆以算略攻取為效而此舉敗於輕脫朝野痛之檀憑之檀憑之字慶子高平人也少有志力閨門雍肅為世所稱從兄子韶兄弟五人皆稚弱而孤憑之撫養若己所生初為會稽王驃騎行參軍轉桓修長流參軍領東莞太守加寧遠將軍與劉裕有州閭之舊又數同東討情好甚密義旗之建憑之與劉毅俱以私艱墨絰而赴雖才望居毅之後而官次及威聲過之故裕以為建武將軍裕將義舉也嘗與何無忌魏詠之同會憑之所會善相者晉陵韋叟見憑之大驚曰卿有急兵之厄其候不過三四日耳且深藏以避之不可輕出及桓玄將皇甫敷之至羅落橋也憑之與裕各領一隊而戰軍敗為敷軍所害贈冀州刺史義熙初詔曰夫旌善紀功有國之通典沒而不朽節義之篤行故冀州刺史檀憑之忠烈果毅亡身為國既義敦其情故臨危授命考諸心迹古人無以遠過近者之贈意猶恨焉可加贈散騎常侍本官如故既隕身王事亦宜追論封賞可封曲阿縣公邑三千戶魏詠之魏詠之字長道任城人也家世貧素而躬耕為事好學不倦生而兔缺有善相者謂之曰卿當富貴年十八聞荊州刺史殷仲堪帳下有名醫能療之貧無行裝謂家人曰殘醜如此用活何為遂齎數斛米西上以投仲堪既至造門自通仲堪與語嘉其盛意召醫視之醫曰可割而補之但須百日進粥不得語笑詠之曰半生不語而有半生亦當療之況百日邪仲堪於是處之別屋令醫善療之詠之遂閉口不語唯食薄粥其厲志如此及差仲堪厚資遣之初為州主簿嘗見桓玄既出玄鄙其精神不雋謂坐客曰庸神而宅偉幹不成令器竟不調而遣之詠之早與劉裕遊款及玄篡位協贊義謀玄敗授建威將軍豫州刺史桓歆寇歷陽詠之率衆擊走之義熙初進征虜將軍吳國內史尋轉荊州刺史持節都督六州領南蠻校尉詠之初在布衣不以貧賤為恥及居顯位亦不以富貴驕人始為殷仲堪之客未幾竟踐其位論者稱之尋卒于官詔曰魏詠之器宇弘劭識局貞隱同奬之誠實銘王府敷績之效垂惠在人奄致隕喪惻愴于心可贈太常加散騎常侍其後録其贊義之功追封江陵縣公食邑二千五百戶諡曰桓弟順之至琅邪內史史臣曰臣觀自古承平之化必杖正人非常之業莫先奇士當衰晉陵夷之際逆玄僭擅之秋外乏桓文內無平勃不有雄傑安能濟之哉此數子者氣足以冠時才足以經世屬大亨數窮之運乘義熙天啓之資建大功若轉圜翦羣凶如拉朽勢傾百辟祿極萬鍾斯亦丈夫之盛也然希樂陵傲而速禍諸葛驕淫以成釁造宋而乖同德復晉而異純臣謀之不臧自取夷滅無忌挾功名之大志挺文武之良才追舊而慟感時人率義而響震勍敵因機效捷處死不懦比乎向時之輩豈同日而言歟贊曰劉生剛愎葛侯凶恣患結滿盈禍生疑二安成英武體茲忠烈捨家殉義忘生存節檀實稜威身隕名飛魏終協契效績揚輝
