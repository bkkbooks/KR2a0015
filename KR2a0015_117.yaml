body:
  text: 晉書卷一百十七載記第十七姚興上姚興字子略萇之長子也苻堅時為太子舍人萇之在馬牧興自馬安冒難奔萇萇立為皇太子萇出征討常留統後事及鎮長安甚有威惠與其中舍人梁喜洗馬范勖等講論經籍不以兵難廢業時人咸化之萇死興祕不發喪以其叔父緒鎮安定碩德鎮陰密弟崇守長安碩德將佐言於碩德曰公威名宿重部曲最強今喪代之際朝廷必相猜忌非永安之道也宜奔秦州觀望事勢碩德曰太子志度寬明必無疑阻今苻登未滅而自尋干戈所謂追二袁之蹤授首與人吾死而已終不若斯及至興優禮而遣之興自稱大將軍以尹緯為長史狄伯支為司馬率衆伐苻登咸陽太守劉忌奴據避世堡以叛興襲忌奴擒之苻登自六陌向廢橋始平太守姚詳據馬嵬堡以距登登衆甚盛興慮詳不能遏乃自將精騎以迫登遣尹緯領步卒赴詳緯用詳計據廢橋以抗登登因急攻緯緯將出戰興馳遣狄伯支謂緯曰兵法不戰而制人者蓋為此也苻登窮寇宜持重不可輕戰緯曰先帝登遐人情擾懼今不因思奮之力梟殄逆豎大事去矣緯敢以死爭遂與登戰大破之登衆渴死者十二三其夜大潰登奔雍興乃發喪行服太元十九年僭即帝位于槐里大赦境內改元曰皇初遂如安定先是苻登使弟廣守雍子崇屯胡空堡聞登敗各棄守走登無所投據遂奔平涼率其餘衆入馬毛山興自安定如涇陽與登戰于山南斬登散其部衆歸復農業徙陰密三萬戶于長安分大營戶為四置四軍以領之安南強熙鎮遠楊多叛推竇衝為盟主所在擾亂興率諸將討之軍次武功多兄子良國殺多而降衝弟彰武與衝離貳衝奔強熙熙聞興將至率戶二千奔秦州竇衝走汧川汧川氐仇高執送之衝從弟統率其衆降于興封征虜緒為晉王征西碩德為隴西王征南靖等及功臣尹緯齊難楊佛嵩等並為公侯其餘封爵各有差鮮卑薛勃於貳城為魏軍所伐遣使請救使姚崇赴救魏師既還薛勃復叛崇伐而執之大收其士馬而還興追尊其庶母孫氏為皇太后配饗太廟楊盛保仇池遣使請命拜使持節鎮南將軍仇池公鮮卑越質詰歸率戶二萬叛乞伏乾歸降于興興處之于成紀拜使持節鎮西將軍平襄公姚碩德討平涼胡金豹于洛城克之初上邽姜乳據本縣以叛自稱秦州刺史碩德進討之乳率衆降以碩德為秦州牧領護東羌校尉鎮上邽徵乳為尚書強熙及略陽豪族權干城率衆三萬圍上邽碩德擊破之熙南奔仇池遂假道歸晉碩德西討干城干城降興令郡國各歲貢清行孝廉一人慕容永既為慕容垂所滅河東太守柳恭等各阻兵自守興遣姚緒討之恭等依河距守緒不得濟鎮東薛彊先據楊氏壁引緒從龍門濟河遂入蒲坂恭勢屈請降徙新平安定新戶六千于蒲坂興母氏死興哀毀過禮不親庶政羣臣議請依漢魏故事既葬即吉興尚書郎李嵩上疏曰三王異制五帝殊禮孝治天下先王之高事也宜遵聖性以光道訓既葬之後應素服臨朝率先天下仁孝之舉也尹緯駁曰帝王喪制漢魏為準嵩矯常越禮愆于軌度請付有司以專擅論既葬即吉乞依前議興曰嵩忠臣孝子有何咎乎尹僕射棄先王之典而欲遵漢魏之權制豈所望於朝賢哉其一依嵩議鮮卑薛勃叛奔嶺北上郡貳川雜胡皆應之遂圍安遠將軍姚詳於金城遣姚崇尹緯討之勃自三交趣金城崇列營掎之而租運不繼三軍大飢緯言於崇曰輔國彌姐高地建節杜成等皆諸部之豪位班三品督運稽留令三軍乏絕宜明置刑書以懲不肅遂斬之諸部大震租入者五十餘萬興率步騎二萬親討之勃懼棄其衆奔于高平公沒奕于于執而送之泫氏男姚買得欲因興葬母氏殺興會有告之者興未之信遣李嵩詐往買得具以告嵩嵩還以聞興乃賜買得死誅其黨與興下書禁百姓造錦繡及淫祀興率衆寇湖城晉弘農太守陶仲山華山太守董邁皆降於興遂如陝城進寇上洛陷之遣姚崇寇洛陽晉河南太守夏侯宗之固守金墉崇攻之不克乃陷柏谷徙流人西河嚴彥河東裴岐韓襲等二萬餘戶而還興下書令士卒戰亡者守宰所在埋藏之求其近親為之立後武都氐屠飛啖鐵等殺隴東太守姚迴略三千餘家據方山以叛興遣姚紹等討之斬飛鐵遣狄伯支迎流人曹會牛壽萬餘戶于漢中興留心政事苞容廣納一言之善咸見禮異京兆杜瑾馮翊吉默始平周寶等上陳時事皆擢處美官天水姜龕東平淳于岐馮翊郭高等皆耆儒碩德經明行修各門徒數百教授長安諸生自遠而至者萬數千人興每於聽政之暇引龕等于東堂講論道藝錯綜名理涼州胡辯苻堅之末東徙洛陽講授弟子千有餘人關中後進多赴之請業興敕關尉曰諸生諮訪道藝修己厲身往來出入勿拘常限於是學者咸勸儒風盛焉給事黃門侍郎古成詵中書侍郎王尚尚書郎馬岱等以文章雅正參管機密詵風韵秀舉確然不羣每以天下是非為己任時京兆韋高慕阮籍之為人居母喪彈琴飲酒詵聞而泣曰吾當私刃斬之以崇風教遂持劍求高高懼逃匿終身不敢見詵興遣將鎮東楊佛嵩攻陷洛陽班命郡國百姓因荒自賣為奴婢者悉免為良人興以日月薄蝕災眚屢見降號稱王下書令羣公卿士將牧守宰各降一等於是其太尉趙公旻等五十三人上疏諫曰伏惟陛下勳格皇天功濟四海威靈振於殊域聲教暨於遐方雖成湯之隆殷基武王之崇周業未足比喻方當廓靖江吳告成中岳豈宜過垂沖損違皇天之眷命乎興曰殷湯夏禹德冠百王然猶順守謙沖未居崇極況朕寡昧安可以處之哉乃遣旻告于社稷宗廟大赦改元弘始賜孤獨魚眾寡粟帛有差年七十已上加衣杖始平太守周班槐里令李洆皆以黷貨誅於是郡國肅然矣洛陽既陷自淮漢已北諸城多請降送任興下書聽祖父母昆弟得相容隱姚緒姚碩德以興降號固讓王爵興弗許京兆韋華譙郡夏侯軌始平龐眺等率襄陽流人一萬叛晉奔于興興引見東堂謂華曰晉自南遷承平已久今政化風俗何如華曰晉主雖有南面之尊無總御之實宰輔執政政出多門權去公家遂成習俗刑網峻急風俗奢宕自桓溫謝安已後未見寬猛之中興大悅拜華中書令興如河東時姚緒鎮河東興待以家人之禮下書封其先朝舊臣姚驢磑趙惡地王平馬萬載黃世等子為五等子男命百僚舉殊才異行之士刑政有不便於時者皆除之兵部郎金城邊熙上陳軍令煩苛宜遵簡約興覽而善之乃依孫吳誓衆之法以損益之興立律學于長安召郡縣散吏以授之其通明者還之郡縣論決刑獄若州郡縣所不能決者讞之廷尉興常臨諮議堂聽斷疑獄于時號無寃滯姚緒姚碩德固讓王爵許之緒碩德威權日盛興恐姦佞小人沮惑之乃簡清正君子為之輔佐興以司隸校尉郭撫扶風太守強超長安令魚佩槐里令彭明倉部郎王年等清勤貞白下書褒美增撫邑一百戶賜超爵關內侯佩等進位一級使碩德率隴右諸軍伐乞伏乾歸興潛軍赴之乾歸敗走降其部衆三萬六千收鎧馬六萬匹軍無私掠百姓懷之興進如枹罕班賜王公以下徧於卒伍興之西也沒奕于密欲乘虛襲安定長史皇甫序切諫乃止于自恨失言陰欲殺序乞伏乾歸以窮蹙來降拜鎮遠將軍河州刺史歸義侯復以其部衆配之興下書將帥遭大喪非在疆埸嶮要之所皆聽奔赴乃朞乃從王役臨戎遭喪聽假百日若身為邊將家有大變交代未至敢輒去者以擅去官罪罪之遣晉將軍劉嵩等二百三十七人歸于建鄴魏人襲沒奕于于棄其部衆率數千騎與赫連勃勃奔于秦州魏軍進次瓦亭長安大震諸城閉門固守魏平陽太守貳塵入侵河東興於是練兵講武大閱于城西榦勇壯異者召入殿中引見羣臣于東堂大議伐魏羣臣咸諫以為不可興不從司隸姚顯進曰陛下天下之鎮不宜親行可使諸將分討授以廟勝之策興曰王者正以廓土靖亂為務吾焉得而辭之興立其子泓為皇太子大赦境內賜男子為父後者爵一級遣姚平狄伯支等率步騎四萬伐魏姚碩德姚穆率步騎六萬伐呂隆平等軍次河東興遣其光遠党娥立節雷星建忠王多等率杏城及嶺北突騎自和寧赴援越騎校尉唐小方積弩姚良國率關中勁卒為平後繼姚緒統河東見兵為前軍節度姚紹率洛東之兵姚詳率朔方見騎並集平望以會于興使沒奕于權鎮上邽中軍廣陵公歛權鎮洛陽姚顯及尚書令姚晃輔其太子泓入直西宮碩德至姑臧大敗呂隆之衆俘斬一萬隆將呂他等率衆二萬五千以東苑來降先是禿髮利鹿孤據西平沮渠蒙遜據張掖李玄盛據敦煌與呂隆相持至是皆遣使隆興率戎卒四萬七千自長安赴姚平平攻魏乾城陷之遂據柴壁魏軍大至攻平截汾水以守之興至蒲坂憚而不進時碩德攻呂隆撫納夷夏分置守宰節糧積粟為持久之計降懼遂降碩德軍令齊整秋毫無犯祭先賢禮儒哲西土悅之姚平糧竭矢盡將麾下三十騎赴汾水而死狄伯支等十將四萬餘人皆為魏所擒興下書軍士戰沒者皆厚加褒贈魏軍乘勝進攻蒲坂姚緒固守不戰魏乃引還興徙河西豪右萬餘戶于長安晉輔國將軍袁虔之寧朔將軍劉壽冠軍將軍高長慶龍驤將軍郭恭等貳于桓玄懼而奔興興臨東堂引見謂虔之等曰桓玄雖名晉臣其實晉賊其才度定何如父也能辦成大事以不虔之曰玄藉世資雄據荊楚屬晉朝失政遂偷竊宰衡安忍無親多忌好殺位不才授爵以愛加無公平之度不如其父遠矣今既握朝權必行篡奪既非命世之才正可為他人驅除耳此天以機便授之陛下願速加經略廓清吳楚興大悅以虔之為大司農餘皆有拜授虔之固讓請疆埸自效改授假節寧南將軍廣州刺史興立其昭儀張氏為皇后封子懿弼洸宣諶愔璞質逵裕國兒皆為公遣其兼大鴻臚梁斐以新平張構為副拜禿髮檀車騎將軍廣武公沮渠蒙遜鎮西將軍沙州刺史西海侯李玄盛安西將軍高昌侯興遣鎮遠趙曜率衆二萬西屯金城建節王松忩率騎助呂隆等守姑臧松忩至魏安為檀弟文真所圍衆潰執松忩送于檀檀大怒送松忩還長安歸罪文真深自陳謝興下書錄馬嵬戰時將吏盡擢之其堡戶給復二十年興性儉約車馬無金玉之飾自下化之莫不敦尚清素然好游田頗損農要京兆杜挻以僕射齊難無匡輔之益著豐草詩以箴之馮翊相雲作德獵賦以諷焉興皆覽而善之賜以金帛然終弗能改晉順陽太守彭泉以郡降興興遣楊佛嵩率騎五千與其荊州刺史趙曜迎之遂寇陷南鄉擒建威將軍劉嵩略地至于梁國而歸又遣其兼散騎常侍席確詣涼州徵呂隆弟超入侍隆遣之呂隆懼禿髮檀之逼表請內徙興遣齊難及鎮西姚詰鎮遠乞伏乾歸鎮遠趙曜等步騎四萬迎隆于河西難至姑臧以其司馬王尚行涼州刺史配兵三千鎮姑臧以將軍閻松為倉松太守郭將為番禾太守分戍二城徙隆及其宗室僚屬于長安沮渠蒙遜遣弟如子貢其方物王尚綏撫遺黎導以信義百姓懷其惠化翕然歸之北部鮮卑並遣使貢款桓玄遣使來聘請辛恭靖何澹之興留恭靖而遣澹之謂曰桓玄不推計曆運將圖篡逆天未忘晉必將有義舉以吾觀之終當傾覆卿今馳往必逢其敗相見之期遲不云遠初恭靖至長安引見興而不拜興曰朕將任卿以東南之事靖曰我寧為國家鬼不為羌賊臣興怒幽之別室至是恭靖亦踰牆遁歸興遣其將姚碩德姚斂成姚壽都等率衆三萬伐楊盛于仇池壽都等入自宕昌斂成從下辯而進盛遣其弟壽距成從子斌距都都逆擊擒之盡俘其衆楊壽等懼率衆請降碩德還師晉汝南太守趙策委守奔于興興如逍遙園引諸沙門于澄玄堂聽鳩摩羅什演說佛經羅什通辯夏言尋覽舊經多有乖謬不與胡本相應興與羅什及沙門僧略僧遷道樹僧叡道坦僧肇曇順等八百餘人更出大品羅什持胡本興執舊經以相考校其新文異舊者皆會於理義續出諸經并諸論三百餘卷今之新經皆羅什所譯興既託意於佛道公卿已下莫不欽附沙門自遠而至者五千餘人起浮圖於永貴里立波若臺于中宮沙門坐禪者有千數州郡化之事佛者十室而九矣使姚碩德及冠軍徐洛生等伐仇池又遣建武趙琨自宕昌而進遣其將斂俱寇漢中時劉裕誅桓玄迎復安帝玄衞將軍新安王桓謙臨原王桓怡雍州刺史桓蔚左衞將軍桓謐中書令桓胤將軍何澹之等奔于興劉裕遣大參軍衡凱之詣姚顯請通和顯遣吉默報之自是聘使不絕晉求南鄉諸郡興許之羣臣咸諫以為不可興曰天下之善一也劉裕拔萃起微匡輔晉室吾何惜數郡而不成其美乎遂割南鄉順陽新野舞陰等十二郡歸於晉姚碩德等頻敗楊盛盛懼請降遣子難當及僚佐子弟數十人為質碩德等引還署盛為使持節散騎常侍都督益寧州諸軍事征南大將軍開府益州牧武都侯斂俱陷城固徙漢中流人郭陶等三千餘家於關中興班告境內及在朝文武立名不得犯叔父緒及碩德之名以彰殊禮興謙恭孝友每見緒及碩德如家人之禮整服傾悚言則稱字車馬服玩必先二叔然後服其次者朝廷大政必諮之而後行太史令郭黁言於興曰戌亥之歲當有孤寇起於西北宜慎其鋒起兵如流沙死者如亂麻戎馬悠悠會隴頭鮮卑烏丸居不安國朝疲於奔命矣時所在有泉水涌出傳云飲則愈病後多無驗屢有妖人自稱神女戮之乃止興大閱自杜郵至於羊牧興以姚碩德來朝大赦其境內及碩德歸於秦州興送之及雍乃還禿髮檀獻興馬三千匹羊三萬頭興以為忠於己乃署檀為涼州刺史徵涼州刺史王尚還長安涼州人申屠英等二百餘人遣主簿胡威詣興請留尚興弗許引威見之威流涕謂興曰臣州奉國五年王威不接銜膽棲冰孤城獨守者仰恃陛下威靈俯仗良牧惠化忽違天人之心以華土資狄若檀才望應代臣豈敢言竊聞乃以臣等貿馬三千匹羊三萬口如所傳實者是為棄人貴畜苟以馬供軍國直煩尚書一符三千餘家戶輸一匹朝下夕辦何故以一方委此姦胡昔漢武傾天下之資開建河西隔絕諸戎斷匈奴右臂所以終能屠大宛王毋寡今陛下方布政玉門流化西域奈何以五郡之地資之玁狁忠誠華族棄之虐虜非但臣州里塗炭懼方為聖朝旰食之憂興乃遣西平人車普馳止王尚又遣使喻檀會檀已至姑臧普以狀先告之檀懼脅遣王尚遂入姑臧尚既至長安坐匿呂氏宮人擅殺逃人薄禾等禁止南臺涼州別駕宗敞治中張穆主簿邊憲胡威等上疏理尚曰臣州荒裔鄰帶寇讐居泰無垂拱之安運否離傾覆之難自張氏頹基德風絕而莫扇呂數將終梟鶚以之翻翔羣生嬰罔極之痛西夏有焚如之禍幸皇鑒降眷純風遠被刺史王尚受任垂滅之州策成難全之際輕身率下躬儉節用勞逸豐約與衆同之勸課農桑時無廢業然後振王威以掃不庭迴天波以蕩氛穢則羣逆冰摧不俟朱陽之曜若秋霜隕籜豈待勁風之威何定遠之足高營平之獨美經始甫爾會朝算改授使希世之功不終於必成易失之機踐之而莫展當其時而明其事者誰不慨然既遠役遐方劬勞于外雖效未酬恩而在公無闕自至京師二旬于今出車之命莫逮萋斐之責惟深以取呂氏宮人裴氏及殺逃人薄禾等為南臺所禁天鑒玄鏡暫免囹圄譏繩之文未離簡墨裴氏年垂知命首髮二毛嫠居本家不在尚室年邁姿陋何用送為邊藩要捍衆力是寄禾等私逃罪應憲墨以殺止殺安邊之義也假若以不送裴氏為罪者正闕奚官之一女子耳論勳則功重言瑕則過微而執憲吹毛求疵忘勞記過斯先哲所以泣血於當年微臣所以仰天而洒淚且尚之奉國歷事二朝能否效于既往優劣簡在聖心就有微過功足相補宜弘罔極之施以彰覆載之恩臣等生自西州無翰飛之翼久沈偽政絕進趣之途及皇化既沾投竿之心冥發遂策名委質位忝吏端主辱臣憂故重繭披款惟陛下亮之興覽之大悅謂其黃門侍郎姚文祖曰卿知宗敞乎文祖曰與臣州里西方之英雋興曰有表理王尚文義甚佳當王尚研思耳文祖曰尚在南臺禁止不與賓客交通敞寓於楊桓非尚明矣興曰若爾桓為措思乎文祖曰西方評敞甚重優於楊桓敞昔與呂超周旋陛下試可問之興因謂超曰宗敞文才何如可是誰輩超曰敞在西土時論甚美方敞魏之陳徐晉之潘陸即以表示超曰涼州小地寧有此才乎超曰臣以敞餘文比之未足稱多琳琅出于崑嶺明珠生於海濱若必以地求人則文命大夏之棄夫姬昌東夷之擯士但當問其文彩何如不可以區宇格物興悅赦尚之罪以為尚書
