body:
  text: 晉書卷一百九載記第九慕容皓慕容翰陽裕慕容皓字元真廆第三子也龍顏版齒身長七尺八寸雄毅多權略尚經學善天文廆為遼東公立為世子建武初拜為冠軍將軍左賢王封望平侯率衆征討纍有功太寧末拜平北將軍進封朝鮮公廆卒嗣位以平北將軍行平州刺史督攝部內尋而宇文乞得龜為其別部逸豆歸所逐奔死於外皓率騎討之逸豆歸懼而請和遂築榆陰安晉二城而還初皓庶兄建威翰驍武有雄才素為皓所忌母弟征虜仁廣武昭並有寵於廆皓亦不平之及廆卒並懼不自容至此翰出奔段遼仁勸昭舉兵廢皓皓殺昭遣使按檢仁之虛實遇仁於險瀆仁知事發殺皓使東歸平郭皓遣其弟建武幼司馬佟壽等討之仁盡衆距戰幼等大敗皆沒於仁襄平令王冰將軍孫機以遼東叛于皓東夷校尉封抽護軍乙逸遼東相韓矯玄菟太守高詡等棄城奔還仁於是盡有遼左之地自稱車騎將軍平州刺史遼東公宇文歸段遼及鮮卑諸部並為之援咸和九年皓遣其司馬封奕攻鮮卑木堤于白狼揚威淑虞攻烏丸悉羅侯於平缸皆斬之材官劉佩攻乙連不克段遼遂寇徒河皓將張萌逆擊敗之遼弟蘭與翰寇柳城都尉石琮擊敗之旬餘蘭翰復圍柳城皓遣寧遠慕容汗及封奕等救之皓戒汗曰賊衆氣鋭難與爭鋒宜顧萬全慎勿輕進必須兵集陳整然後擊之汗性驍鋭遣千餘騎為前鋒而進封奕止之汗不從為蘭所敗死者太半蘭復攻柳城為飛梯地道圍守二旬石琮躬勒將士出擊敗之斬首千五百級蘭乃遁歸是歲成帝遣謁者徐孟閭丘幸等持節拜皓鎮軍大將軍平州刺史大單于遼東公持節都督承制封拜一如廆故事皓自征遼東克襄平仁所署居就令劉程以城降新昌人張衡執縣宰以降於是斬仁所置守宰分徙遼東大姓於棘城置和陽武次西樂三縣而歸咸康初遣封奕襲宇文別部涉奕于大獲而還涉奕于率騎追戰于渾水又敗之皓將乘海討仁羣下咸諫以海道危阻宜從陸路皓曰舊海水無凌自仁反已來凍合者三矣昔漢光武因滹沱之冰以濟大業天其或者欲吾乘此而克之乎吾計決矣有沮謀者斬乃率三軍從昌黎踐凌而進仁不虞皓之至也軍去平郭七里候騎乃告仁狼狽出戰為皓所擒殺仁而還立藉田於朝陽門東置官司以主之段遼遣其將李詠夜襲武興遇雨引還都尉張萌追擊擒詠段蘭擁衆數萬屯于曲水亭將攻柳城宇文歸入寇安晉為蘭聲援皓以步騎五萬擊之師次柳城蘭歸皆遁遣封奕率輕騎追擊敗之收其軍實館穀二旬而還謂諸將曰二虜恥無功而歸必復重至宜於柳城左右設伏以待之遣封奕率騎潛于馬兜山諸道俄而遼騎果至奕夾擊大敗之斬其將榮保遣兼長史劉斌郎中令陽景送徐孟等歸于京師使其世子俊伐段遼諸城封奕攻宇文別部皆大捷而歸立納諫之木以開讜言之路後徙昌黎郡築好城於乙連東使將軍蘭勃戍之以逼乙連又城曲水以為勃援乙連飢甚段遼輸之粟蘭勃要擊獲之遼遣將屈雲攻興國與皓將慕容遵大戰於五官水上雲敗斬之盡俘其衆封奕等以皓任重位輕宜稱燕王皓於是以咸康三年僭即王位赦其境內以封奕為國相韓壽為司馬裴開陽騖王𧜛李洪杜羣宋該劉瞻石琮皇甫真陽協宋晃平熙張泓等並為列卿將帥起文昌殿乘金根車駕六馬出入稱警蹕以其妻段氏為王后世子俊為太子皆如魏武晉文輔政故事皓以段遼屢為邊患遣將軍宋回稱藩于石季龍請師討遼季龍於是總衆而至皓率諸軍攻遼令支以北諸城遼遣其將段蘭來距大戰敗之斬級數千掠五千餘戶而歸季龍至徐無遼奔密雲山季龍進入令支怒皓之不會師也進軍擊之至于棘城戎卒數十萬四面進攻郡縣諸部叛應季龍者三十六城相持旬餘左右勸皓降皓曰孤方取天下何乃降人乎遣子恪等率騎二千晨出擊之季龍諸軍驚擾棄甲而遁恪乘勝追之斬獲三萬餘級築戍凡城而還段遼遣使詐降於季龍請兵應接季龍遣其將麻秋率衆迎遼恪伏精騎七千於密雲山大敗之獲其司馬陽裕將軍鮮于亮擁段遼及其部衆以歸帝又遣使進皓為征北大將軍幽州牧領平州刺史加散騎常侍增邑萬戶持節都督單于公如故皓前軍帥慕容評敗季龍將石成等于遼西斬其將呼延晃張支掠千餘戶以歸段遼謀叛皓誅之季龍又使石成入攻凡城不克進陷廣城皓雖稱燕王未有朝命乃遣其長史劉祥獻捷京師兼言權假之意并請大舉討平中原又聞庾亮薨弟冰翼繼為將相乃表曰臣究觀前代昏明之主若能親賢並建則功致升平若親黨后族必有傾辱之禍是以周之申伯號稱賢舅以其身藩于外不握朝權降及秦昭足為令主委信二舅幾至亂國逮于漢武推重田蚡萬機之要無不決之及蚡死後切齒追恨成帝暗弱不能自立內惑艷妻外恣五舅卒令王莽坐取帝位每覽斯事孰不痛惋設使舅氏賢若穰侯王鳳則但聞有二臣不聞有二主若其不才則有竇憲梁冀之禍凡此成敗亦既然矣苟能易軌可無覆墜陛下命世天挺當隆晉道而遭國多難殷憂備嬰追述往事至今楚灼迹其所由實因故司空亮居元舅之尊勢業之重執政裁下輕侮邊將故令蘇峻祖約不勝其忿遂致敗國至令太后發憤一旦升遐若社稷不靈人神無助豺狼之心當可極邪前事不忘後事之表而中書監左將軍冰等內執樞機外擁上將昆弟並列人臣莫疇陛下深敦渭陽冰等自宜引領臣常謂世主若欲崇顯舅氏何不封以藩國豐其祿賜限其勢利使上無偏優下無私論如此榮辱何從而生噂何辭而起往者惟亮一人宿有名望尚致世變況今居之者素無聞焉且人情易惑難以戶告縱令陛下無私於彼天下之人誰謂不私乎臣與冰等名位殊班出處懸邈又國之戚昵理應降悅以適事會臣獨矯抗此言者上為陛下退為冰計疾苟容之臣坐鑒得失顛而不扶焉用彼相昔徐福陳霍氏之戒宣帝不從至令忠臣更為逆族良由察之不審防之無漸臣今所陳可謂防漸矣但恐陛下不明臣之忠不用臣之計事過之日更處焦爛之後耳昔王章劉向每上封事未嘗不指斥王氏故令二子或死或刑谷永張禹依違不對故容身苟免取譏於世臣被髮殊俗位為上將夙夜惟憂罔知所報惟當外殄寇讐內盡忠規陳力輸誠以答國恩臣若不言誰當言者又與冰書曰君以椒房之親舅氏之昵總據樞機出內王命兼擁列將州司之位昆弟網羅顯布畿甸自秦漢以來隆赫之極豈有若此者乎以吾觀之若功就事舉必享申伯之名如或不立將不免梁竇之迹矣每覩史傳未嘗不寵恣母族使執權亂朝先有殊世之榮尋有負乘之纍所謂愛之適足以為害吾常忿歷代之主不盡防萌終寵之術何不業以一土之封令藩國相承如周之齊陳如此則永保南面之尊復何黜辱之憂乎竇武何進好善虛己賢士歸心雖為閹豎所危天下嗟痛猶有能履以不驕圖國亡身故也方今四海有倒懸之急中夏逋僭逆之寇家有漉血之怨人有復讎之憾寧得安枕逍遙雅談卒歲邪吾雖寡德過蒙先帝列將之授以數郡之人尚欲并吞強虜是以自頃迄今交鋒接刃一時務農三時用武而猶師徒不頓倉有餘粟敵人日畏我境日廣況乃王者之威堂堂之勢豈可同年而語哉冰見表及書甚懼以其絶遠非所能制遂與何充等奏聽皓稱燕王其年皓伐高句麗王釗乞盟而還明年釗遣其世子朝於皓初段遼之敗也建威翰奔于宇文歸自以威名夙振終不保全乃陽狂恣酒被髮歌呼歸信而不禁故得周遊自任至於山川形便攻戰要路莫不練之皓遣商人王車陰使察翰翰見車無言撫膺而已車還以白皓曰翰欲來也乃遣車遺翰弓矢翰乃竊歸駿馬攜其二子而還皓將圖石氏從容謂諸將曰石季龍自以安樂諸城守防嚴重城之南北必不設備今若詭路出其不意冀之北土盡可破也於是率騎二萬出蠮螉塞長驅至于薊城進渡武遂津入于高陽所過焚燒積聚掠徙幽冀三萬餘戶使陽裕唐柱等築龍城構宮廟改柳城為龍城縣於是成帝使兼大鴻臚郭希持節拜皓侍中大都督河北諸軍事大將軍燕王其餘官皆如故封諸功臣百餘人咸康七年皓遷都龍城率徑卒四萬入自南陝以伐宇文高句麗又使翰及子垂為前鋒遣長史王𧜛等勒衆萬五千從北置而進高句麗王釗謂皓軍之從北路也乃遣其弟武統精鋭五萬距北置躬率弱卒以防南陝翰與釗戰于木底大敗之乘勝遂入丸都釗單馬而遁皓掘釗父利墓載其尸并其母妻珍寶掠男女五萬餘口焚其宮室毀丸都而歸明年釗遣使稱臣於皓貢其方物乃歸其父尸宇文歸遣其國相莫淺渾伐皓諸將請戰皓不許渾以皓為憚之荒酒縱獵不復設備皓曰渾奢怠已甚今則可一戰矣遣翰率騎擊之渾大敗僅以身免盡俘其衆皓躬巡郡縣勸課農桑起龍城宮闕尋又率騎二萬親伐宇文歸以翰及垂為前鋒歸使其騎將涉奕于盡衆距翰皓馳遣謂翰曰奕于雄悍宜小避之待虜勢驕然後取也翰曰歸之精鋭盡在於此今若克之則歸可不勞兵而滅奕于徒有虛名其實易與耳不宜縱敵挫吾兵氣於是前戰斬奕于盡俘其衆歸遠遁漠北皓開地千餘里徙其部人五萬餘落於昌黎改涉奕于城為威德城行飲至之禮論功行賞各有差以牧牛給貧家田于苑中公收其八二分入私有牛而無地者亦田苑中公收其七三分入私皓記室參軍封裕諫曰臣聞聖王之宰國也薄賦而藏於百姓分之以三等之田十一而稅之寒者衣之飢者食之使家給人足雖水旱而不為災者何也高選農官務盡勸課人治周田百畝亦不假牛力力田者受旌顯之賞惰農者有不齒之罰又量事置官量官置人使官必稱須人不虛位度歲入多少裁而祿之供百僚之外藏之太倉三年之耕餘一年之粟以斯而積公用於何不足水旱其如百姓何雖務農之令屢發二千石令長莫有志勤在公鋭盡地利者故漢祖知其如此以墾田不實徵殺二千石以十數是以明章之際號次升平自永嘉喪亂百姓流亡中原蕭條千里無煙飢寒流隕相繼溝壑先王以神武聖略保全一方威以殄姦德以懷遠故九州之人塞表殊類襁負萬里若赤子之歸慈父流人之多舊土十倍有餘人殷地狹故無田者十有四焉殿下以英聖之資克廣先業南摧強趙東滅句麗開境三千戶增十萬繼武闡廣之功有高西伯宜省罷諸苑以業流人人至而無資産者賜之以牧牛人既殿下之人牛豈失乎善藏者藏於百姓若斯而已矣邇者深副樂土之望中國之人皆將壺餐奉迎石季龍誰與居乎且魏晉雖道消之世猶削百姓不至於七八持官牛田者官得六分百姓得四分私牛而官田者與官中分百姓安之人皆悅樂臣猶曰非明王之道而況增乎且水旱之厄堯湯所不免王者宜濬治溝澮循鄭白西門史起溉灌之法旱則決溝為雨水則入於溝瀆上無雲漢之憂下無昏墊之患句麗百濟及宇文段部之人皆兵勢所徙非如中國慕義而至咸有思歸之心今戶垂十萬狹湊都城恐方將為國家深害宜分其兄弟宗屬徙于西境諸城撫之以恩檢之以法使不得散在居人知國之虛實今中原未平資畜宜廣官司猥多遊食不少一夫不耕歲受其飢必取於耕者而食之一人食一人之力遊食數萬損亦如之安可以家給人足治致升平殿下降覽古今之事多矣政之巨患莫甚於斯其有經略出世才稱時求者自可隨須置之列位非此已往其耕而食蠶而衣亦天之道也殿下聖性寬明思言若渴故人盡芻蕘有犯無隱前者參軍王憲大夫劉明並竭忠獻款以貢至言雖頗有逆鱗意在無責主者奏以妖言犯上致之於法殿下慈弘苞納恕其大辟猶削黜禁錮不齒於朝其言是也殿下固宜納之如其非也宜亮其狂狷罪諫臣而求直言亦猶北行詣越豈有得邪右長史宋該等阿媚苟容輕劾諫士己無骨鯁嫉人有之掩蔽耳目不忠之甚四業者國之所資教學者有國盛事習戰務農尤其本也百工商賈猶其末耳宜量軍國所須置其員數已外歸之於農教之戰法學者三年無成亦宜還之於農不可徒充大員以塞聰俊之路臣之所言當也願時速施行非也登加罪戮使天下知朝廷從善如流罰惡不淹王憲劉明忠臣也願宥忤鱗之愆收其藥石之效皓乃令曰覽封記室之諫孤實懼焉君以黎元為國黎元以穀為命然則農者國之本也而二千石令長不遵孟春之令惰農弗勸宜以尤不修闢者措之刑法肅厲屬城主者明詳推檢具狀以聞苑囿悉可罷之以給百姓無田業者貧者全無資産不能自存各賜牧牛一頭若私有餘力樂取官牛墾官田者其依魏晉舊法溝洫溉灌有益官私主者量造務盡水陸之勢中州未平兵難不息勳誠既多官僚不可以減也待克平凶醜徐更議之百工商賈數四佐與列將速定大員餘者還農學生不任訓教者亦除員録夫人臣關言於人主至難也妖妄不經之事皆應蕩然不問擇其善者而從之王憲劉明雖其罪應禁黜亦猶孤之無大量也可悉復本官仍居諫司封生蹇蹇深得王臣之體詩不云乎無言不酬其賜錢五萬明宣內外有欲陳孤過者不拘貴賤勿有所諱時有黑龍白龍各一見于龍山皓親率羣僚觀之去龍二百餘步祭以太牢二龍交首嬉翔解角而去皓大悅還宮赦其境內號新宮曰和龍立龍翔佛寺于山上賜其大臣子弟為官學生者號高門生立東庠于舊宮以行鄉射之禮每月臨觀考試優劣皓雅好文籍勤於講授學徒甚盛至千餘人親造太上章以代急就又著典誡十五篇以教胄子慕容恪攻高句麗南蘇克之置戍而還三年遣其世子俊與恪率騎萬七千東襲夫餘克之虜其王及部衆五萬餘口以還皓親臨東庠考試學生其經通秀異者擢充近侍以久旱丐百姓田租罷成周冀陽營丘等郡以勃海人為興集縣河間人為寧集縣廣平魏郡人為興平縣東萊北海人為育黎縣吳人為吳縣悉隸燕國皓嘗畋于西鄙將濟河見一父老服朱衣乘白馬舉手麾皓曰此非獵所王其還也祕之不言遂濟河連日大獲後見白兔馳射之馬倒被傷乃説所見輦而還宮引俊屬以後事以永和四年死在位十五年時年五十二俊僭號追諡文明皇帝慕容翰字元雍廆之庶長子也性雄豪多權略猿臂工射膂力過人廆甚奇之委以折衝之任行師征伐所在有功威聲大振為遠近所憚作鎮遼東高句麗不敢為寇善撫接愛儒學自士大夫至于卒伍莫不樂而從之及奔段遼深為遼所敬愛柳城之敗段蘭欲乘勝深入翰慮成本國之害詭説於蘭蘭遂不進後石季龍征遼皓親將三軍略令支以北遼議欲追之翰知皓躬自總戎戰必克勝乃謂遼曰今石氏向至方對大敵不宜復以小小為事燕王自來士馬精鋭兵者凶器戰有危慮若其失利何以南禦乎蘭怒曰吾前聽卿誑説致成今患不復入卿計中矣乃率衆追皓蘭果大敗翰雖處仇國因事立忠皆此類也及遼奔走翰又北投宇文歸既而逃歸乃遣徑騎百餘追之翰遙謂追者曰吾既思戀而歸理無反面吾之弓矢汝曹足知無為相逼自取死也吾處汝國久恨不殺汝汝可百步豎刀吾射中者汝便宜反不中者可來前也歸騎解刀豎之翰一發便中刀鐶追騎乃散既至皓甚加恩禮建元二年從皓討宇文歸臨陳為流矢所中臥病積時後疾漸愈於其家中騎馬自試或有人告翰私習騎疑為非常皓素忌之遂賜死焉翰臨死謂使者曰翰懷疑外奔罪不容誅不能以骸骨委賊庭故歸罪有司天慈曲愍不肆之市朝今日之死翰之生也但逆胡跨據神州中原未靖翰常剋心自誓志吞醜虜上成先王遺旨下謝山海之責不圖此心不遂沒有餘恨命也奈何仰藥而死陽裕字士倫右北平無終人也少孤兄弟皆早亡單煢獨立雖宗族無能識者惟叔父耽幼而奇之曰此兒非惟吾門之標秀乃佐時之良器也刺史和演辟為主簿王浚領州轉治中從事忌而不能任石勒既克薊城問棗嵩曰幽州人士誰最可者嵩曰燕國劉翰德素長者北平陽裕幹事之才勒曰若如君言王公何以不任嵩曰王公由不能任所以為明公擒也勒方任之裕乃微服潛遁時鮮卑單于段眷為晉驃騎大將軍遼西公雅好人物虛心延裕裕謂友人成泮曰仲尼喜佛肸之召以匏瓜自喻伊尹亦稱何事非君何使非民聖賢尚如此況吾曹乎眷今召我豈徒然哉泮曰今華夏分崩九州幅裂軌迹所及易水而已欲偃蹇考槃以待大通者俟河之清也人壽幾何古人以為白駒之歎少遊有云郡掾足以蔭後況國相乎卿追蹤伊孔抑亦知機其神也裕乃應之拜郎中令中軍將軍處上卿位歷事段氏五主甚見尊重段遼與皓相攻裕諫曰臣聞親仁善鄰國之寶也慕容與國世為婚姻且皓令德之主不宜連兵構怨凋殘百姓臣恐禍害之興將由於此願兩追前失通款如初使國家有太山之安蒼生蒙息肩之惠遼不從出為燕郡太守石季龍克令支裕以郡降拜北平太守徵為尚書左丞段遼之請迎於季龍也裕以左丞領征東麻秋司馬秋敗裕為軍人所執將詣皓皓素聞裕名即命釋其囚拜郎中令遷大將軍左司馬東破高句麗北滅宇文歸皆豫其謀皓甚器重之及遷都和龍裕雅有巧思皓所制城池宮閣皆裕之規模裕雖仕皓日近寵秩在舊人之右性謙恭清儉剛簡慈篤雖歷居朝端若布衣之士士大夫流亡羈絶者莫不經營收葬存恤孤遺士無賢不肖皆傾身待之是以所在推仰初范陽盧諶每稱之曰吾及晉之清平歷觀朝士多矣忠清簡毅篤信義烈如陽士倫者實亦未幾及死皓甚悼之時年六十二
