body:
  text: 晉書卷一百六載記第六石季龍上石季龍勒之從子也名犯太祖廟諱故稱字焉祖曰鞱邪父曰寇覓勒父朱幼而子季龍故或稱勒弟焉年六七歲有善相者曰此兒貌奇有壯骨貴不可言永興中與勒相失後劉琨送勒母王及季龍于葛陂時年十七矣性殘忍好馳獵游蕩無度尤善彈數彈人軍中以為毒患勒白王將殺之王曰快牛為犢子時多能破車汝當小忍之年十八稍折節身長七尺五寸趫捷便弓馬勇冠當時將佐親戚莫不敬憚勒深嘉之拜征虜將軍為娉將軍郭榮妹為妻季龍寵惑優僮鄭櫻桃而殺郭氏更納清河崔氏女櫻桃又譖而殺之所為酷虐軍中有勇幹策略與己侔者輒方便害之前後所殺甚衆至於降城陷壘不復斷別善惡坑斬士女鮮有遺類勒雖屢加責誘而行意自若然御衆嚴而不煩莫敢犯者指授攻討所向無前故勒寵之信任彌隆仗以專征之任勒之居襄國署為魏郡太守鎮鄴三臺後封繁陽侯勒即大單于趙王位署為單于元輔都督禁衛諸軍事遷侍中開府進封中山公及勒僭號授太尉守尚書令進封為王邑萬戶季龍自以勳高一時謂勒即位之後大單于必在己而更以授其子弘季龍深恨之私謂其子邃曰主上自都襄國以來端拱指授而以吾躬當矢石二十餘年南擒劉嶽北走索頭東平齊魯西定秦雍剋殄十有三州成大趙之業者我也大單于之望實在于我而授黃吻婢兒每一憶此令人不復能寢食待主上晏駕之後不足復留種也咸康元年季龍廢勒子弘羣臣已下勸其稱尊號季龍下書曰王室多難海陽自棄四海業重故俯從推逼朕聞道合乾坤者稱皇德協人神者稱帝皇帝之號非所敢聞且可稱居攝趙天王以副天人之望於是赦其境內改年曰建武以夔安為侍中太尉守尚書令郭殷為司空韓晞為尚書左僕射魏概馮莫張崇曹顯為尚書申鍾為侍中郎闓為光祿大夫王波為中書令文武封拜各有差立其子邃為太子季龍以讖文天子當從東北來於是備法駕行自信都而還以應之分廮陶之柳鄉立停駕縣季龍徐州從事朱縱殺刺史郭祥以彭城歸順季龍遣將王朗擊之縱奔淮南季龍荒游廢政多所營繕使邃省可尚書奏事選牧守祀郊廟惟征伐刑斷乃親覽之觀雀臺崩殺典匠少府任汪復使修之倍於常度季龍自率衆南寇歷陽臨江而旋京師大震遣其征虜石遇寇中廬遂圍平北將軍桓宣于襄陽輔國將軍毛寶南中郎將王國征西司馬王愆期等率荊州之衆救之屯于章山遇攻守二旬軍中飢疫而還季龍以租入殷廣轉輸勞煩令中倉歲入百萬斛餘皆儲之水次晉將軍淳于安攻其琅邪費縣俘獲而歸石邃保母劉芝初以巫術進既養邃遂有深寵通賄賂豫言論權傾朝廷親貴多出其門遂封芝為宜城君季龍下書令刑贖之家得以錢代財帛無錢聽以穀麥皆隨時價輸水次倉冀州八郡雨雹大傷秋稼下書深自咎責遣御史所在發水次倉麥以給秋種尤甚之處差復一年季龍將遷于鄴尚書請太常告廟季龍曰古者將有大事必告宗廟而不列社稷尚書可詳議以聞公卿乃請使太尉告社稷從之及入鄴宮澍雨周洽季龍大悅赦殊死已下尚方令解飛作司南車成季龍以其構思精微賜爵關內侯賞賜甚厚始制散騎常侍已上得乘軺軒王公郊祀乘副車駕四馬龍旗八旒朔望朝會即乘軺軒時羌薄句大猶保險未賓遣其子章武王斌帥精騎二萬并秦雍二州兵以討之季龍如長樂衛國有田疇不闢桑業不修者貶其守宰而還咸康二年使牙門將張彌徙洛陽鍾虡九龍翁仲銅駝飛廉于鄴鍾一沒于河募浮沒三百人入河繫以竹牛百頭鹿櫨引之乃出造萬斛舟以渡之以四輪纏輞車轍廣四尺深二尺運至鄴季龍大悅赦二歲刑賚百官穀帛百姓爵一級下書曰三載考績黜陟幽明斯則先王之令典政道之通塞魏始建九品之制三年一清定之雖未盡弘美亦縉紳之清律人倫之明鏡從爾以來遵用無改先帝創臨天下黃紙再定至於選舉銓為首格自不清定三載于茲主者其更銓論務揚清激濁使九流咸允也吏部選舉可依晉氏九班選制永為揆法選畢經中書門下宣示三省然後行之其著此詔書于令銓衡不奉行者御史彈坐以聞索頭郁鞠率衆三萬降于季龍署鞠等一十三人親通趙王皆封列侯散其部衆于冀青等六州時衆役煩興軍旅不息加以久旱穀貴金一斤直米二斗百姓嗷然無生賴矣又納解飛之說於鄴正南投石于河以起飛橋功費數千億萬橋竟不成役夫饑甚乃止使令長率丁壯隨山澤采橡捕魚以濟老弱而復為權豪所奪人無所得焉又料殷富之家配饑人以食之公卿已下出穀以助振給姦吏因之侵割無已雖有貸贍之名而無其實改直蕩為龍騰冠以絳幘於襄國起太武殿於鄴造東西宮至是皆就太武殿基高二丈八尺以文石綷之下穿伏室置衛士五百人於其中東西七十五步南北六十五步皆漆瓦金鐺銀楹金柱珠簾玉壁窮極伎巧又起靈風臺九殿于顯陽殿後選士庶之女以充之後庭服綺縠玩珍奇者萬餘人內置女官十有八等教宮人星占及馬步射置女太史于靈臺仰觀災祥以考外太史之虛實又置女鼓吹羽儀雜伎工巧皆與外侔禁郡國不得私學星讖敢有犯者誅左校令成公段造庭燎于崇杠之末高十餘丈上盤置燎下盤置人繳上下季龍試而悅之其太保夔安等文武五百九人勸季龍稱尊號安等方入而庭燎油灌下盤死者七人季龍惡之大怒斬成公段于閶闔門於是依殷周之制以咸康三年僭稱大趙天王即位于南郊大赦殊死已下追尊祖鞱邪為武皇帝父寇覓為太宗孝皇帝立其鄭氏為天王皇后以子邃為天王皇太子親王皆貶封郡公藩王為縣侯百官封署各有差太原徙人五百餘戶叛入黑羌武鄉長城徙人韓彊獲玄玉璽方四寸七分龜紐金文詣鄴獻之拜彊騎都尉復其一門夔安等又勸進曰臣等謹案大趙水德玄龜者水之精也玉者石之寶也分之數以象七政寸之紀以準四極昊天成命不可久違輒下史官擇吉日具禮儀謹昧死上皇帝尊號季龍下書曰過相褒美猥見推逼覽增恧然非所望也其亟止茲議今東作告始自非京城內外皆不得表慶中書令王波上玄璽頌以美之季龍以石弘時造此璽彊遇而獻之邃自總百揆之後荒酒淫色驕恣無道或盤游于田懸管而入或夜出于宮臣家淫其妻妾妝飾宮人美淑者斬首洗血置於盤上傳共視之又內諸比丘尼有姿色者與其交褻而殺之合牛羊肉而食之亦賜左右欲以識其味也河間公宣樂安公韜有寵於季龍邃疾之如仇季龍荒耽內游威刑失度邃以事為可呈呈之季龍恚曰此小事何足呈也時有所不聞復怒曰何以不呈誚責杖捶月至再三邃甚恨私謂常從無窮長生中庶子李顏等曰官家難稱吾欲行冒頓之事卿從我乎顏等伏不敢對邃稱疾不省事率宮臣文武五百餘騎宴于李顏別舍謂顏等曰我欲至冀州殺石宣有不從者斬行數里騎皆逃散李顏叩頭固諫邃亦昏醉而歸邃母鄭氏聞之私遣中人責邃邃怒殺其使季龍聞邃有疾遣所親任女尚書察之邃呼前與語抽劍擊之季龍大怒收李顏等詰問顏具言始末誅顏等三十餘人幽邃于東宮既而赦之引見太武東堂邃朝而不謝俄而便出季龍遣使謂邃曰太子應入朝中宮何以便去邃徑出不顧季龍大怒廢邃為庶人其夜殺邃及妻張氏并男女二十六人同埋於一棺之中誅其宮臣支黨二百餘人廢鄭氏為東海太妃立其子宣為天王皇太子宣母杜昭儀為天王皇后安定人侯子光弱冠美姿儀自稱佛太子從大秦國來當王小秦國易姓名為李子楊游于鄠縣爰赤眉家頗見其妖狀事微有驗赤眉信敬之妻以二女轉相扇惑京兆樊經竺龍嚴諶謝樂子等聚衆數千人於杜南山子楊稱大黃帝建元曰龍興赤眉與經為左右丞相龍諶為左右大司馬樂子為大將軍鎮西石廣擊斬之子楊頸無血十餘日而面色無異於生季龍將伐遼西鮮卑段遼募有勇力者三萬人皆拜龍騰中郎遼遣從弟屈雲襲幽州刺史李孟退奔易京季龍以桃豹為橫海將軍王華為渡遼將軍統舟師十萬出漂渝津支雄為龍驤大將軍姚弋仲為冠軍將軍統步騎十萬為前鋒以伐段遼季龍衆次金臺支雄長驅入薊遼漁陽太守馬鮑代相張牧北平相陽裕上谷相侯龕等四十餘城並率衆降于季龍支雄攻安次斬其部大夫那樓奇遼懼棄令支奔于密雲山遼左右長史劉羣盧諶司馬崔悅等封其府庫遣使請降季龍遣將軍郭太麻秋等輕騎二萬追遼及之戰于密雲獲其母妻斬級三千遼單馬竄險遣子乞特真送表及名馬季龍納之乃遷其戶二萬餘于雍司兗豫四州之地諸有才行者皆擢之先是北單于乙回為鮮卑敦那所逐既平遼西遣其將李穆擊那破之復立乙回而還季龍入遼宮論功封賞各有差初慕容皓與段遼有隙遣使稱藩于季龍陳遼宜伐請盡衆來會及軍至令支皓師不出季龍將伐之天竺佛圖澄進曰燕福德之國未可加兵季龍作色曰以此攻城何城不克以此衆戰誰能禦之區區小豎何所逃也太史令趙攬固諫曰燕地歲星所守行師無功必受其禍季龍怒鞭之黜為肥如長進師攻棘城旬餘不克皓遣子恪帥胡騎二千晨出挑戰諸門皆若有師出者四面如雲季龍大驚棄甲而遁於是召趙攬復為太史令季龍旋自令支過易京惡其固而毀之還謁石勒墓朝其羣臣於襄國建德前殿復從征文武有差至鄴設飲至之禮賜俘遍於丞郎季龍謀伐昌黎遣渡遼曹伏將青州之衆渡海戍踏頓城無水而還因戍于海島運穀三百萬斛以給之又以船三百艘運穀三十萬斛詣高句麗使典農中郎將王典率衆萬餘屯田于海濱又令青州造船千艘使石宣率步騎二萬擊朔方鮮卑斛摩頭破之斬首四萬餘級冀州八郡大蝗司隸請坐守宰季龍曰此政之失和朕之不德而欲委咎守宰豈禹湯罪己之義邪司隸不進讜言佐朕不逮而歸咎無辜所以重吾之責可白衣領司隸加其子司徒韜金鉦黃鉞鑾輅九旒先是使襄城公涉歸上庸公日歸率衆戍長安二歸告鎮西石廣私樹恩澤潛謀不軌季龍大怒追廣至鄴殺之段遼於密雲山遣使詐降季龍信之使征東麻秋百里郊迎敕秋曰受降如待敵將軍慎之遼又遣使降于慕容皓曰胡貪而無謀吾今請降求迎彼終不疑也若伏重軍以要之可以得志皓遣子恪伏兵於密雲麻秋統衆三萬迎遼為恪所襲死者十六七秋步遁而歸季龍聞之驚怒方食吐餔乃削秋官爵下書令諸郡國立五經博士初勒置大小學博士至是復置國子博士助教季龍以吏部選舉斥外耆德而勢門童幼多為美官免郎中魏奐比為庶人以其太子宣為大單于建天子旌旗以夔安為征討大都督統五將步騎七萬寇荊揚北鄙石閔敗王師于沔陰將軍蔡懷死之宣將朱保又敗王師于白石將軍鄭豹談玄郝莊隨相蔡熊皆遇害季龍將張賀度攻陷邾城敗晉將毛寶于邾西死者萬餘人夔安進據胡亭晉將軍黃沖歷陽太守鄭進皆降之安於是掠七萬戶而還時豪戚侵恣賄託公行季龍患之擢殿中御史李矩為御史中丞特親任之自此百僚震懾州郡肅然季龍曰朕聞良臣如猛獸高步通衢而豺狼避路信矣哉鎮遠王擢表雍秦二州望族自東徙已來遂在戍役之例既衣冠華胄宜蒙優免從自是皇甫胡梁韋杜牛辛等十有七姓蠲其兵貫一同舊族隨才銓思欲分還桑梓者聽之其非此等不得為例以其撫軍李農為使持節監遼西北平諸軍事征東將軍營州牧鎮令支于時大旱白虹經天季龍下書曰朕在位六載不能上和乾象下濟黎元以致星虹之變其令百僚各上封事解西山之禁蒲葦魚鹽除歲供之外皆無所固公侯卿牧不得規占山澤奪百姓之利又下書曰前以豐國澠池二冶初建徙刑徒配之權救時務而主者循為法致起怨聲自今罪犯流徒皆當申奏不得輒配也京獄見囚非手殺人一皆原遣其日澍雨季龍將討慕容皓令司冀青徐幽并雍兼復之家五丁取三四丁取二合鄴城舊軍滿五十萬具船萬艘自河通海運穀豆千一百萬斛于安樂城以備征軍之調徙遼西北平漁陽萬戶于兗豫雍洛四州之地季龍僭位之後有所調用皆選司擬官經令僕而後奏行不得其人案以為令僕之負尚書及郎不坐至是吏部尚書劉真以為失銓考之體而言之季龍責怒主者加真光祿大夫金章紫綬季龍如宛陽大閲於曜武場慕容皓襲幽冀略三萬餘家而去幽州刺史石光坐磱弱徵還賜徵士辛謐几杖衣服穀五百斛敕平原為起甲第先是李壽將李宏自晉奔于季龍壽致書請之題曰趙王石君季龍不悅付外議之多有異同中書監王波議曰今李宏以死自誓若得反魂蜀漢當鳩率宗族混同王化若遣而果也則不煩一旅之師而坐定梁益就有進退豈在逃命一夫壽既號並日月跨僭一方今若制詔或敢酬反則取誚戎裔宜書答之并贈以楛矢使壽知我遐荒必臻也於是遣宏備物以酬之以石韜為太尉與太子宣迭日省可尚書奏事自幽州東至白狼大興屯田張駿憚季龍之盛遣其別駕馬詵朝之季龍初大悅及覽其表辭頗蹇傲季龍大怒將斬詵侍中石璞進曰為陛下之患者丹楊也區區河右焉能為有無今斬馬詵必征張駿則南討之師勢分為二建鄴君臣延其數年之命矣勝之不為武弗克為四夷所笑不如因而厚之彼若改圖謝罪率其臣職者則我又何求迷而不悟討之未後也季龍乃止李宏既至蜀漢李壽欲誇其境內下令云羯使來庭獻其楛矢季龍聞之怒甚黜王波以白衣守中書監季龍志在窮兵以其國內少馬乃禁畜私馬匿者腰斬收百姓馬四萬餘匹以入于公兼盛興宮室於鄴起臺觀四十餘所營長安洛陽二宮作者四十餘萬人又敕河南四州具南師之備并朔秦雍嚴西討之資青冀幽州三五發卒諸州造甲者五十萬人兼公侯牧宰競興私利百姓失業十室而七船夫十七萬人為水所沒猛獸所害三分而一貝丘人李弘因衆心之怨自言姓名應讖遂連結姦黨署置百僚事發誅之連坐者數千家季龍畋獵無度晨出夜歸又多微行躬察作役之所侍中韋謏諫曰臣聞千金之子坐不垂堂萬乘之主行不履危陛下雖天生神武雄據四海乾坤冥贊萬無所慮然白龍魚服有豫且之禍海若潛游罹葛陂之酷深願陛下清宮蹕路思二神為元鑒不可忽天下之重輕行斤斧之間一旦有狂夫之變龍騰之勇不暇施也智士之計豈及設哉又自古聖王之營建宮室未始不於三農之隙所以不奪農時也今或盛功于耘藝之辰或煩役于收穫之月頓斃屬途怨聲塞路誠非聖君仁后所忍為也昔漢明賢君也鍾離一言而德陽役止臣誠識慚昔士言無可採陛下道越前王所宜哀覽季龍省而善之賜以穀帛而興繕滋繁游察自若右僕射張離領五兵尚書專總兵要而欲求媚于石宣因說之曰今諸公侯吏兵過限宜漸削弱以盛儲威宣素疾石韜之寵甚說其言乃使離奏奪諸公府吏秦燕義陽樂平四公聽置吏一百九十七人帳下兵二百人自此以下三分置一餘兵五萬悉配東宮於是諸公咸怨為大釁之漸矣遣征北張舉自雁門討索頭郁鞠克之制征士五人車一乘牛二頭米各十五斛絹十匹調不辦者以斬論將以圖江表於是百姓窮窘鬻子以充軍制猶不能赴自經于道路死者相望而求發無已會青州言濟南平陵城北石獸一中忽移在城東南善石溝上有狼狐千餘迹隨之迹皆成路季龍大悅曰獸者朕也自平陵城北而東南者天意將使朕平蕩江南之徵也天命不可違其敕諸州兵明年悉集朕當親董六軍以副成路之祥羣臣皆賀上皇德頌者一百七人時祅怪尤多石然于泰山八日而滅東海有大石自立帝有血流鄴西山石間血流出長十餘步廣二尺餘太武殿畫古賢悉變為胡旬餘頭悉縮入肩中季龍大惡之佛圖澄對之流涕寧遠劉寧攻武都狄道陷之使石宣討鮮卑斛穀提大破之斬首三萬級中謁者令申扁有寵於季龍而宣亦昵之扁聰辨明斷專綜機密之任季龍既不省奏案宣荒酒內游石韜沈湎好獵生殺除拜皆扁所決於是權傾內外刺史二千石多出其門九卿已下望塵而拜唯侍中鄭系王謨常侍盧諶崔約等十餘人與之抗禮季龍又取州郡吏馬一萬四千餘匹以配曜武關將馬主皆復一年鎮北宇文歸執送段遼之子蘭降于季龍獻駿馬萬匹季龍以平西張伏都為使持節都督征討諸軍事帥步騎三萬擊涼州既濟河與張駿將謝艾大戰于河西伏都敗績季龍雖昏虐無道而頗慕經學遣國子博士詣洛陽寫石經校中經于祕書國子祭酒聶熊注穀梁春秋列于學官燕公石斌淫酒荒獵常懸管而入征北張賀度以邊防宜警每裁諫之斌怒辱賀度季龍聞之大怒杖斌一百遣主書禮儀持節監之斌行意自若儀持法呵禁斌怒殺之欲殺賀度賀度嚴衛馳白之季龍遣尚書張離持節帥騎追斌鞭之三百免官歸第誅其親任十餘人建元初季龍饗羣臣于太武前殿有白雁百餘集于馬道南季龍命射之無所獲既將討三方諸州兵至者百餘萬太史令趙攬私於季龍曰白雁集殿庭宮室將空不宜行也季龍納之臨宣武觀大閲而解嚴以燕公斌為使持節侍中大司馬録尚書事置左右戎昭曜武將軍位在左右衛上東宮置左右統將軍位在四率上置上中光祿大夫在左右光祿上置鎮衛將軍在車騎將軍上時石宣淫虐日甚而莫敢以告領軍王朗言之於季龍曰今隆冬雪寒而皇太子使人斫伐宮材引於漳水功役數萬士衆吁嗟陛下宜因游觀而罷之也季龍如其言既而宣知朗所為怒欲殺之而無因會熒惑守房趙攬承宣旨言於季龍曰昴者趙之分也熒惑所在其主惡之房為天子此殃不小宜貴臣姓王者當之季龍曰誰可當者攬久而對曰無復貴於王領軍也季龍既惜朗且猜之曰更言其次攬曰其次唯中書監王波耳季龍乃下書追波前議遣李宏及答楛矢之愆腰斬之及其四子投于漳水以厭熒惑之變尋愍波之無罪追贈司空封其孫為侯平北尹農攻慕容皓凡城不克而還黜農為庶人時白虹出自太社經鳳陽門東南連天十餘刻乃滅季龍下書曰蓋古明王之理天下也政以均平為首化以仁惠為本故能允協人和緝熙神物朕以眇薄君臨萬邦夕惕乾乾思遵古烈是以每下書蠲除徭賦休息黎元庶俯懷百姓仰稟三光而中年已來變眚彌顯天文錯亂時氣不應斯由人怨於下譴感皇天雖朕之不明亦羣后不能翼奬之所致也昔楚相修政洪災旋弭鄭卿厲道氛祲自消皆股肱之良用康羣變而羣公卿士各懷道迷邦拱默成敗豈所望於台輔百司哉其各上封事極言無隱於是閉鳳陽門唯元日乃開立二畤于靈昌津祠天及五郊李壽以建寧上庸漢固巴徵梓潼五郡降于季龍先是季龍起河橋於靈昌津采石為中濟石無大小下輒隨流用功五百餘萬而不成季龍遣使致祭沈璧于河俄而所沈璧流于渚上地震水波騰上津所殿觀莫不傾壞壓死者百餘人季龍恚甚斬工匠而止作焉命石宣石韜生殺拜除皆迭日省決不復啓也司徒申鍾諫曰慶賞刑威后皇攸執名器至重不可以假人皆以防姦杜漸以示軌儀太子國之儲二朝夕視膳而不及政也庶人邃往以聞政致敗殷鑒不遠宜革而弗遵且二政分權鮮不及禍周有子頽之釁鄭有叔段之難此皆由寵之不道所以亂國害親惟陛下覽之季龍不從太子詹事孫珍問侍中崔約曰吾患目疾何方療之約素狎珍戲之曰溺中則愈珍曰目何可溺約曰卿目睕睕正耐溺中珍恨之以白宣宣諸子中最胡狀目深聞之大怒誅約父子珍有寵于宣頗預朝政自誅約之後公卿已下憚之側目季龍子義陽公鑒時鎮關中役煩賦重失關右之和其友李松勸鑒文武有長髮者拔為冠纓餘以給宮人長史取髮白之季龍大怒以其右僕射張離為征西左長史龍驤將軍雍州刺史以察之信然徵鑒還鄴收松下廷尉以石苞代鎮長安發雍洛秦并州十六萬人城長安未央宮季龍性既好獵其後體重不能跨鞍乃造獵車千乘轅長三丈高一丈八尺罝高一丈七尺格獸車四十乘立三級行樓二層于其上剋期將校獵自靈昌津南至滎陽東極陽都使御史監察其中禽獸有犯者罪至大辟御史因之擅作威福百姓有美女好牛馬者求之不得便誣以犯獸論死者百餘家海岱河濟間人無寧志矣又發諸州二十六萬人修洛陽宮發百姓牛二萬餘頭配朔州牧官增置女官二十四等東宮十有二等諸公侯七十餘國皆為置女官九等先是大發百姓女二十已下十三已上三萬餘人為三等之第以分配之郡縣要媚其旨務於美淑奪人婦者九千餘人百姓妻有美色豪勢因而脅之率多自殺石宣及諸公又私令采發者亦垂一萬總會鄴宮季龍臨軒簡第諸女大悅封使者十二人皆為列侯自初發至鄴諸殺其夫及奪而遣之縊死者三千餘人荊楚揚徐間流叛略盡宰守坐不能綏懷下獄誅者五十餘人金紫光祿大夫逯明因侍切諫季龍大怒遣龍騰拉而殺之自是朝臣杜口相招為祿仕而已季龍常以女騎一千為鹵簿皆著紫綸巾熟錦袴金銀鏤帶五文織成鞾游于戲馬觀觀上安詔書五色紙在木鳳之口鹿盧回轉狀若飛翔焉遣涼州刺史麻秋等伐張重華尚書朱軌與中黃門嚴生不協會大雨霖道路陷滯不通生因而譖軌不修道又訕謗朝政季龍遂殺之於是立私論之條偶語之律聽吏告其君奴告其主威刑日濫公卿已下朝會以目吉凶之問自此而絶軌之囚也冠軍苻洪諫曰臣聞聖主之馭天下也土階三尺茅茨不翦食不纍味刑措而不用亡君之馭海內也傾宮瓊榭象箸玉杯截脛剖心脯賢刳孕故其亡也忽焉今襄國鄴宮足康帝宇長安洛陽何為者哉盤于游田耽於女德三代之亡必由此而忽為獵車千乘養獸萬里奪人妻女十萬盈宮尚書朱軌納言大臣以道路不修將加酷法此自陛下政之失和陰陽災沴暴降霖雨七旬霽方二日縱有鬼兵百萬尚未及修之而況人乎刑政如此其如史筆何其如四海何特願止作徒休宮女赦朱軌允衆望季龍省之不悅憚其強但寢而不納弗之罪也乃停二京作役焉
