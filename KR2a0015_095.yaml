body:
  text: 晉書卷九十五列傳第六十五藝術藝術之興由來尚矣先王以是決猶豫定吉凶審存亡省禍福曰神與智藏往知來幽贊冥符弼成人事既興利而除害亦威衆以立權所謂神道設教率由於此然而詭託近於妖妄迂誕難可根源法術紛以多端變態諒非一緒真雖存矣僞亦憑焉聖人不語怪力亂神良有以也逮丘明首唱妖夢以垂文子長繼作援龜策以立傳自茲厥後史不絶書漢武雅好神仙世祖尤耽讖術遂使文成五利逞詭詐而取寵榮尹敏桓談由忤時而嬰罪戾斯固通人之所蔽千慮之一失者乎詳觀衆術抑惟小道棄之如或可惜存之又恐不經載籍既務在博聞筆削則理宜詳備晉謂之乘義在於斯今録其推步尤精伎能可紀者以為藝術傳式備前史云陳訓陳訓字道元歷陽人少好祕學天文算曆陰陽占候無不畢綜尤善風角孫晧以為奉禁都尉使其占候晧政嚴酷訓知其必敗而不敢言時錢唐湖開或言天下當太平青蓋入洛陽晧以問訓訓曰臣止能望氣不能達湖之開塞退而告其友曰青蓋入洛將有輿櫬銜璧之事非吉祥也尋而吳亡訓隨例內徙拜諫議大夫俄而去職還鄉及陳敏作亂遣弟宏為歷陽太守訓謂邑人曰陳家無王氣不久當滅宏聞將斬之訓鄉人秦璩為宏參軍乃說宏曰訓善風角可試之如不中徐斬未晚也乃赦之時宏攻征東參軍衡彥於歷陽乃問訓曰城中有幾千人攻之可拔不訓登牛渚山望氣曰不過五百人然不可攻攻之必敗宏復大怒曰何有五千人攻五百人而有不得理命將士攻之果為彥所敗方信訓有道術乃優遇之都水參軍淮南周亢嘗問訓以官位訓曰君至卯年當剖符近郡酉年當有曲蓋亢曰脫如來言當相薦拔訓曰性不好官惟欲得米耳後亢果為義興太守金紫將軍時劉聰王彌寇洛陽歷陽太守武瑕問訓曰國家人事如何訓曰胡賊三逼國家當敗天子野死今尚未也其後懷臣攴心二帝果有平陽之酷焉或問其以明年吉凶者訓曰揚州刺史當死武昌大火上方節將亦當死至時劉陶周訪皆卒武昌大火燒數千家時甘卓為歷陽太守訓私謂所親曰甘侯頭低而視仰相法名為眄刀又目有赤脈自外而入不出十年必以兵死不領兵則可以免卓果為王敦所害丞相王導多病每自憂慮以問訓訓曰公耳豎垂肩必壽亦大貴子孫當興於江東咸如其言訓年八十餘卒戴洋戴洋字國流吳興長城人也年十二遇病死五日而蘇說死時天使其為酒藏吏授符録給吏從幡麾將上蓬萊昆崘積石太室廬衡等諸山既而遣歸逢一老父謂之曰汝後當得道為貴人所識及長遂善風角為人短陋無風望然好道術妙解占候卜數吳末為臺吏知吳將亡託病不仕及吳平還鄉里後行至瀨鄉經老子祠皆是洋昔死時所見使處但不復見昔物耳因問守藏應鳳曰去二十餘年嘗有人乘馬東行過老君而不下馬未達橋墜馬死者不鳳言有之所問之事多與洋同揚州刺史嘗問吉凶於洋答曰熒惑入南斗八月有暴水九月當有客軍西南來如期果大水而石冰作亂冰既據揚州洋謂人曰視賊雲氣四月當破果如其言詩陳敏為右將軍堂邑令孫混見而羡之洋曰敏當作賊族滅何足願也未幾敏果反而誅焉初混欲迎其家纍洋曰此地當敗得臘不得正豈可移家於賊中乎混便止歲末敏弟昶攻堂邑混遂以單身走免其後都水馬武舉洋為都水令史洋請急還鄉將赴洛夢神人謂之曰洛中當敗人盡南渡後五年揚州必有天子洋信之遂不去既而皆如其夢廬江太守華談問洋曰天下誰當復作賊者洋曰王機尋而機反陳眕問洋曰人言江南當有貴人顧彥先周宣珮當是不洋曰顧不及臘周不見來年八月榮果以十二月十七日卒十九日臘玘以明年七月晦亡王導遇病召洋問之洋曰君侯本命在申金為土使之主而於申上石頭立冶火光照天此為金火相爍水火相煎以故受害耳導即移居東府病遂差鎮東從事中郎張闓舉洋為丞相令史時司馬揚為烏程令將赴職洋曰君宜深慎下吏揚後果坐吏免官洋又謂曰卿雖免官十一月當作郡加將軍至期為太山太守鎮武將軍揚賣宅將行洋止之曰君不得至當還不可無宅揚果為徐龕所逼不得之郡元帝增揚衆二千使助祖逖洋勸揚不行揚乃稱疾收付廷尉俄而因赦得出元帝將登阼使洋擇日洋以為宜用三月二十四日丙午太史令陳卓奏用二十二日言昔越王用甲辰三月反國范蠡稱在陽之前當主盡出上下盡空德將出遊刑入中宮今與此同洋曰越王為吳所囚雖當時遜媚實懷怨憤蠡故用甲辰乘德而歸留刑吳宮今大王內無含咎外無怨憤當承天洪命納祚無窮何為追越王去國留殃故事邪乃從之及祖約代兄鎮譙請洋為中典軍遷督護永昌元年四月庚辰禺中時有大風起自東南折木洋謂約曰十月必有賊到譙城東至歷陽南方有反者主簿王振以洋為妖白約收洋付刺姦而絶其食五十日言語如故約知其有神術乃赦之而讓振振後有罪被收洋救之約曰振往日相繫今何以救之洋曰振不識風角非有宿嫌振往時垂餓死洋養活之振猶尚遺忘夫處富貴而不棄貧賤甚難約義之即原振賜洋米三十石至十月三日石勒騎果到譙城東洋言於約曰賊必向城父可遣騎水南追之步軍於水北斷要路賊必敗約竟不追賊乃掠城父婦女輜重而去約將魯延求追賊洋曰不可約不從使兄子智與延追之賊僞棄婦女輜重走智與延等爭物賊還掩之智延僅以身免士卒皆死約表洋為下邑長時梁國人反逐太守袁晏梁城峻嶮約欲討之而未決洋曰賊以八月辛酉日反日辰俱王辛德在南方酉受自刑梁在譙北乘德伐刑賊必破亡又甲子日東風而雷西行譙在東南雷在軍前為軍驅除昔吳伐關羽天雷在前周瑜拜賀今與往同故知必克約從之果平梁城太寧三年正月有大流星東南行洋曰至秋府當移壽陽及王敦作逆約問其勝敗洋曰太白在東方辰星不出兵法先起為主應者為客辰星若出太白為主辰星為客辰星不出太白為客先起兵者敗今有客無主有前無後宜傳檄所部應詔伐之約乃率衆向合肥俄而敦死衆敗遂住壽陽洋又曰江淮之間當有軍事譙城虛曠宜還固守不者雍丘沛皆非官有也約不從豫土遂陷於賊咸和元年春約南行佃遇大雷雨西南來洋曰甲子西南天雷其夏必失大將至夏汝南人反執約兄子濟送於石勒約府內地忽赤如丹洋曰案河圖徵云地赤如丹血丸丸當有下反上者恐十月二十七日胡馬當來飲淮水至時石勒騎大至攻城大戰其日西風兵火俱發約大懼會風回賊退時傳言勒遣騎向壽陽約欲送其家還江東洋曰必無此事尋而傳言果妄咸和初月暈左角有赤白珥約問洋洋曰角為天門開布陽道官門當有大戰俄而蘇峻遣使招約俱反洋謂約曰蘇峻必敗然其初起兵鋒不可當可外和內嚴以待其變約不從遂與峻反至三年五月大風雷雨西北來城內晦暝洋謂約曰雷鳴人上明使君當遠佞近直愛下振貧昔秦有此變卒致亂亡約大怒收洋繫之遣部將李概將兵到廬江其衆盡散約召洋出問之曰吾還東何如留壽陽若留壽陽何如入胡洋曰東入失半入胡滅門留壽陽尚可約欲東向歷陽其衆不樂東下皆叛約劫約姊及嫂奔於石勒約到歷陽祖煥問洋曰君昔言平西在壽陽可得五年果如君言今在歷陽可得幾時洋曰得六月耳約問洋臺下及此氣候何如洋曰此當復有反者臺下來年三月當太平江州當大喪後南方復有軍事去此千里尋而牽騰叛約約率所親將家屬奔於石勒二月而天子反正四月而溫嶠卒郭默據湓口以叛後勒誅約及親屬並盡皆如洋言約既敗洋往尋陽時劉胤鎮尋陽胤問洋曰我病當差不洋曰不憂使君不差憂使君今年有大厄使君年四十七行年入庚寅太公陰謀曰六庚為白獸在上為客星在下為害氣年與命并必凶當忌十二月二十二日庚寅勿見客胤曰我當解職將君還野中治病洋曰使君當作江州不得解職胤曰溫公不復還邪洋曰溫公雖還使君故作江州俄如其言九月甲寅申時回風從東來入胤兒船中西過狀如匹練長五六丈洋曰風從咸池下來攝提下去咸池為刀兵大殺為死喪到甲子日申時府內大聚骨埋之胤問在何處洋曰不出州府門也胤架府東門洋又曰東為天牢牢下開門憂天獄至十二月十七日洋又曰臘近可閉門以五十人備守并以百人備東北寅上以却害氣胤不從二十四日壬辰胤遂為郭默所害南中郎將桓宣以洋為參軍將隨宣往襄陽太尉陶侃留之住武昌時侃謀北伐洋曰前年十一月熒惑守胃昴至今年四月積五百餘日昴趙之分野石勒遂死熒惑以七月退從畢右順行入黃道未及天關以八月二十二日復逆行還鉤繞畢向昴昴畢為邊兵主胡夷故置天弓以射之熒惑逆行司無德之國石勒死是也勒之餘燼以自殘害今年官與太歲太陰三合癸巳癸為北方北方當受災歲鎮二星共合翼軫從子及巳徘徊六年荊楚之分歲鎮所守其下國昌豈非功德之徵也今年六月鎮星前角亢角亢鄭之分歲星移入房太白在心心房宋分順之者昌逆之者亡石季龍若興兵東南此其死會也官若應天伐刑徑據宋鄭則無敵矣若天與不取反受其咎侃志在中原聞而大喜會病篤不果行侃薨征西將軍庾亮代鎮武昌復引洋問氣候洋曰天有白氣喪必東行不過數年必應尋有大鹿向西城門洋曰野獸向城主人將去城東家夜半望見城內有數炬火從城上出如大車狀白布幔覆與火俱出城東北行至江乃滅洋聞而歎曰此與前白氣同時亮欲西鎮石城或問洋此西足當欲東不洋曰不當也咸康三年洋言於亮曰武昌土地有山無林政可圖始不可居終山作八字數不及九昔吳用壬寅來上創立宮城至己酉還下秣陵陶公亦涉八年土地盛衰有數人心去就有期不可移也公宜更擇吉處武昌不可久住五年亮令毛寶屯邾城九月洋言於亮曰毛豫州今年受死問昨朝大霧晏風當有怨賊報仇攻圍諸侯誠宜遠偵邏寶問當在何時答曰五十日內其夕又曰九月建戌朱雀飛驚征軍還歸乘戴火光天示有信災發東房葉落歸本慮有後患明日又曰昨夜火殃非國福今年架屋致使君病可因燒屋移家南渡無嫌也寶即遣兒婦還武昌尋傳賊當來攻城洋曰十月丁亥夜半時得賊問干為君支為臣丁為征西府亥為邾城功曹為賊神加子時十月水王木相王相氣合賊必來寅數七子數九賊高可九千人下可七千人從魁為貴人加丁下克上有空亡之事不敢進武昌也賊果陷邾城而去亮問洋曰故當不失石城否洋曰賊從安陸向石城逆太白當伐身無所慮亮曰天何以利胡而病我洋曰天符有吉凶土地有盛衰今年害氣三合己亥己為天下亥為戎胡季龍亦當受死今乃不憂賊但憂公病耳亮曰何方救我疾洋曰荊州受兵江州受災公可去此二州亮曰如此當有解不洋曰恨晚猶差不也亮竟不能解二州遂至大困洋曰昔蘇峻時公於白石祠中祈褔許賽其牛至今未解故為此鬼所考亮曰有之君是神人也或問洋曰庾公可得幾時洋曰見明年時亮已不識人咸以為妄果至正月一日而薨庾翼代亮洋復為占候少時卒年八十餘所占驗者不可勝紀韓友韓友字景先廬江舒人也為書生受易於會稽伍振善占卜能圖宅相冢亦行京費厭勝之術龍舒長鄧林婦病積年垂死醫巫皆息意友為筮之使畫作野猪著臥處屏風上一宿覺佳於是遂差舒縣廷掾王睦病死已復魄友為筮之令以丹畫版作日月置牀頭又以豹皮馬鄣泥臥上立愈劉世則女病魅積年巫為攻禱伐空冢故城間得狸鼉數十病猶不差友筮之命作布囊依女發時張囊著窗間友閉戶作氣若有所驅斯須之間見囊大脹如吹因決敗之女仍大發友乃更作皮囊二枚沓張之施張如前囊復脹滿因急縛囊口懸著樹二十許日漸消開視有二斤狐毛女遂差宣城邊洪以四月中就友卜家中安否友曰卿家有兵殃其禍甚重可伐七十束柴積於庚地至七月丁酉放火燒之咎可消也不爾其凶難言洪即聚柴至日大風不敢發火洪後為廣陽領校遭母喪歸家友來投之時日已暮出告從者速裝束吾當夜去從者曰今日已暝數十里草行何急復去友曰非汝所知也此間血覆地寧可復住苦留之不待食而去其夜洪欻發狂絞殺兩子并殺婦又斫父妾二人皆被創因出亡走明日其宗族往收殯亡者尋索洪數日於宅前林中得之已自經死宣城太守殷祐有病友筮之曰七月晦日將有大鸜鳥來集廳事上宜勤伺取若獲者為善不獲將成禍祐乃謹為其備至日果有大鸜垂尾九尺來集廳事上掩捕得之祐乃遷石頭督護後為吳郡太守友卜占神效甚多而消殃轉禍無不皆驗干寶問其故友曰筮卦用五行相生殺如案方投藥治病以冷熱相救其差與不差不可必也友以元康六年舉賢良元帝渡江以為廣武將軍永嘉末卒淳于智淳于智字叔平濟北盧人也有思義能易筮善厭勝之術高平劉柔夜臥鼠齧其左手中指以問智智曰是欲殺君而不能當為君使其反死乃以朱書手腕橫文後三寸作田字辟方一寸二分使露手以臥明旦有大鼠伏死手前譙人夏侯藻母病困詣智卜忽有一狐當門向之嘷藻怖愕馳見智智曰其禍甚急君速歸在狐嘷處拊心啼哭令家人驚怪大小必出一人不出哭勿止然後其禍可救也藻還如其言母亦扶病而出家人既集堂屋五間拉然而崩護軍張劭母病篤智筮之使西出市沐猴繫母臂令傍人捶拍使作聲三日放去劭從之其猴出門即為犬所咋死母病遂差上黨鮑瑗家多喪病貧苦或謂之曰淳于叔平神人也君何不試就卜知禍所在瑗性質直不信卜筮曰人生有命豈卜筮所移會智來應詹謂曰此君寒士每多屯虞君有通靈之思可為一卦智乃為卦卦成謂瑗曰君安宅失宜故令君困君舍東北有大桑樹君徑至市入門數十步當有一人持荊馬鞭者便就買以懸此樹三年當暴得財瑗承言詣市果得馬鞭懸之三年浚井得錢數十萬銅鐵器復二十餘萬於是致贍疾者亦愈其消災轉禍不可勝紀而卜筮所占千百皆中應詹少亦多病智乃為符使詹佩之誦其文既而皆驗莫能學也性深沈常自言短命曰辛亥歲天下有事當有巫醫挾道術者死吾守易義以行之猶當不應此乎太康末為司馬督有寵於楊駿故見殺步熊步熊字叔羆陽平發干人也少好卜筮數術門徒甚盛熊學舍側有一人燒死吏持熊諸生謂為失火熊曰已為卿卜得其人矣使從道南行當有一人來問得火主未者便縛之吏如熊言果是耕人自言草惡難耕故燒之忽風起延燒遠近實不知草中有人又鄰人兒遠行或告已死其父母號哭制服熊為之卜剋日當還如期果至趙王倫聞其名召之熊謂諸生曰倫死不久不足應也倫怒遣兵圍之數重熊乃使諸生著其裘南走倫兵悉赴捉之熊密從北出得脫後為成都王穎所辟穎使熊射覆物無所失後穎奔關中平昌公模鎮鄴以熊穎黨誅之杜不愆杜不愆廬江人也少就外祖郭璞學易卜屢有驗高平郗超年二十餘得重疾試令筮之不愆曰案卦言之卿所苦尋除然宜於東北三十里上宮姓家索其所養雄雉籠盛置東檐下却後九日丙午日午時必當有雌雉飛來與交既而雙去若如此不出二十日病都除又是休應年將八十位極人臣若但雌逝雄留者病一周方差年半八十名位亦失超時正羸篤慮命在旦夕笑而答曰若保八十之半便有餘矣一周病差何足為淹然未之信或勸依其言索雉果得至丙午日超臥南軒之下觀之至日晏果有雌雉飛入籠與雄雉交而去雄雉不動超歎息曰雖管郭之奇何以尚此超病彌年乃起至四十卒於中書郎不愆後占筮轉疏無復此類後為桓嗣建威參軍嚴卿嚴卿會稽人也善卜筮鄉人魏序欲暫東行荒年多抄盜令卿筮之卿筮曰君慎不可東行必遭暴害之氣而非劫也序不之信卿曰既必不停宜以禳之可索西郭外獨母家白雄狗繫著船前求索止得駮狗無白者卿曰駮者亦足然猶恨其色不純當餘小毒正及六畜輩耳無所復憂序行半路狗忽然作聲甚急有如人打之者比視已死吐黑血斗餘其夕序墅上白鵝數頭無故自死而序家無恙隗照隗照汝陰人也善於易臨終書版授其妻曰吾亡後當大荒窮雖爾慎莫賣宅也卻後五年春當有詔使來頓此亭姓龔此人負吾金即以此版往責之勿違言也照亡後其家大困乏欲賣宅憶夫言輒止期日有龔使者止亭中妻遂齎版往責之使者執版惘然不知所以妻曰夫臨亡手書版見命如此不敢妄也使者沈吟良久而悟謂曰賢夫何善妻曰夫善於易而未曾為人卜也使者曰噫可知矣乃命取蓍筮之卦成撫掌而歎曰妙哉隗生含明隱迹可謂鏡窮達而洞吉凶者也於是告照妻曰吾不相負金也賢夫自有金耳知亡後當暫窮故藏金以待太平所以不告兒婦者恐金盡而困無已也知吾善易故書版以寄意耳金有五百斤盛以青甕覆以銅柈埋在堂屋東頭去壁一丈入地九尺妻還掘之皆如卜焉卜珝卜珝字子玉胸奴後部人也少好讀易郭璞見而歎曰吾所弗如也奈何不免兵厄珝曰然吾大厄在四十一位為卿將當受禍耳不爾者亦為猛獸所害吾亦未見子之令終也璞曰吾禍在江南甚營之未見免兆雖然在南猶可延期住此不過時月珝曰子勿為公吏可以免諸璞曰吾不能免公吏猶子之不能免卿將也珝曰吾此雖當有帝王子終不復奉二京矣琅邪可奉卿謹奉之主晉祀者必此人也珝遂隱於龍門山劉元海僭號徵為大司農侍中固以疾辭元海曰人各有心卜珝之不欲在吾朝何異高祖四公哉可遂其高志後復徵為光祿大夫珝謂使者曰非吾死所也及劉聰嗣僞位徵為太常時劉琨據并州聰問何時可平珝答曰并州陛下之分今茲克之必矣聰戲曰朕欲勞先生一行可乎珝曰臣所以來不及裝者正為是行也聰大悅署珝使持節平北將軍將行謂其妹曰此行也死自吾分後慎勿紛紜及攻晉陽為琨所敗珝卒先奔為其元帥所殺鮑靚鮑靚字太玄東海人也年五歲語父母云本是曲陽李家兒九歲墜井死其父母尋訪得李氏推問皆符驗靚學兼內外明天文河洛書稍遷南陽中部都尉為南海太守嘗行部入海遇風飢甚取白石食之以自濟王機時為廣州刺史入厠忽見二人著烏衣與機相捍良久擒之得二物似烏鴨靚曰此物不祥機焚之徑飛上天機尋誅死靚嘗見仙人陰君授道訣百餘歲卒吳猛吳猛豫章人也少有孝行夏日常手不驅蚊懼其去己而噬親也年四十邑人丁義始授其神方因還豫章江波甚急猛不假舟楫以白羽扇畫水而渡觀者異之庾亮為江州刺史嘗遇疾聞猛神異乃迎之問己疾何如猛辭以算盡請具棺服旬日而死形狀如生未及大斂遂失其尸識者以為亮不祥之徵亮疾果不起幸靈幸靈者豫章建昌人也性少言與小人羣居見侵辱而無慍色邑里號之癡雖其父母兄弟亦以為癡也嘗使守稻羣牛食之靈見而不驅待牛去乃往理其殘亂者其父母見而怒之靈曰夫萬物生天地之間各欲得食牛方食奈何驅之其父愈怒曰即如汝言復用理壞者何為靈曰此稻又欲得終其性牛自犯之靈可以不收乎時順陽樊長賓為建昌令發百姓作官船於建城山中吏令人各作箸一雙靈作而未輸或竊之焉俄而竊者心痛欲死靈謂之曰爾得無竊我箸乎竊者不應有頃愈急靈曰若爾不以情告我者今真死矣竊者急遽乃首出之靈於是飲之以水病即立愈行人由此敬畏之船成當下吏以二百人引一艘不能動方請益人靈曰此以過足但部分未至耳靈請自牽之乃手執箸惟用百人而船去如流衆大驚怪咸稱其神於是知名有龔仲儒女病積年氣息財屬靈使以水含之已而強起應時大愈又呂猗母皇氏得痿痹病十有餘年靈療之去皇氏數尺而坐冥目寂然有頃顧謂猗曰扶夫人令起猗曰老人得病纍年奈何可倉卒起邪靈曰但試扶起於是兩人夾扶以立少選靈又令去扶即能自行由此遂愈於是百姓奔趣水陸輻輳從之如雲皇氏自以病久懼有發動靈乃留水一器令食之每取水輒以新水補處二十餘年水清如新塵垢不能加焉時高悝家有鬼怪言語訶叱投擲內外不見人形或器物自行再三發火巫祝厭劾而不能絶適值靈乃要之靈於陌頭望其屋謂悝曰此君之家邪悝曰是也靈曰知之足矣悝固請之靈不得已至門見符索甚多謂悝曰當以正止邪而以邪救邪惡得已乎並使焚之惟據軒小坐而去其夕鬼怪即絶靈所救愈多此類然不取報謝行不騎乘長不娶妻性至恭見人即先拜言輒自名凡草木之夭傷於山林者必起理之器物之傾覆於途路者必舉正之周旋江州間謂其士人曰天地之於人物一也咸欲不失其情性奈何制服人以為奴婢乎諸君若欲享多褔以保性命可悉免遣之十餘年間賴其術以濟者極多後乃娶妻畜車馬奴婢受貨賂致遺於是其術稍衰所療得失相半焉佛圖澄佛圖澄天竺人也本姓帛氏少學道妙通玄術永嘉四年來適洛陽自云百有餘歲常服氣自養能積日不食善誦神呪能役使鬼神腹旁有一孔常以絮塞之每夜讀書則拔絮孔中出光照于一室又嘗齊時平旦至流水側從腹旁孔中引出五藏六府洗之訖還內腹中又能聽鈴音以言吉凶莫不懸驗及洛中寇亂乃潛草野以觀變石勒屯兵葛陂專行殺戮沙門遇害者甚衆澄投勒大將軍郭黑略家黑略每從勒征伐輒豫克勝負勒疑而問曰孤不覺卿有出衆智謀而每知軍行吉凶何也黑略曰將軍天挺神武幽靈所助有一沙門智術非常云將軍當略有區夏己應為師臣前後所白皆其言也勒召澄試以道術澄即取鉢盛水燒香呪之須臾鉢中生青蓮花光色曜日勒由此信之勒自葛陂還河北過枋頭枋頭人夜欲斫營澄謂黑略曰須臾賊至可令公知果如其言有備故不敗勒欲試澄夜冠胄衣甲執刀而坐遣人告澄云夜來不知大將軍何所在使人始至未及有言澄逆問曰平居無寇何故夜嚴勒益信之勒後因忿欲害諸道士并欲苦澄澄乃潛避至黑略舍語弟子曰若將軍信至問吾所在者報云不知所之既而勒使至覓澄不得使還報勒勒驚曰吾有惡意向澄澄捨我去矣通夜不寢思欲見澄澄知勒意悔明旦造勒勒曰昨夜何行澄曰公有怒心昨故權避公今改意是以敢來勒大笑曰道人謬矣襄國城塹水源在城西北五里其水源暴竭勒問澄何以致水澄曰今當敕龍取水乃與弟子法首等數人至故泉源上坐繩牀燒安息香呪願數百言如此三日水泫然微流有一小龍長五六寸許隨水而來諸道士競往視之有頃水大至隍塹皆滿鮮卑段末波攻勒衆甚盛勒懼問澄澄曰昨日寺鈴鳴云明旦食時當擒段末波勒登城望末波軍不見前後失色曰末波如此豈可獲乎更遣夔安問澄澄曰已獲末波矣時城北伏兵出遇末波執之澄勸勒宥末波遣還本國勒從之卒獲其用劉曜遣從弟嶽攻勒勒遣石季龍距之嶽敗退保石梁塢季龍堅柵守之澄在襄國忽歎曰劉嶽可憫弟子法祚問其故澄曰昨日亥時嶽已敗被執果如所言及曜自攻洛陽勒將救之其羣下咸諫以為不可勒以訪澄澄曰相輪鈴音云秀支替戾岡僕谷劬禿當此羯語也秀支軍也替戾岡出也僕谷劉曜胡位也劬禿當捉也此言軍出捉得曜也又令一童子潔齊七日取麻油合胭脂躬自研於掌中舉手示童子粲然有輝童子驚曰有軍馬甚衆見一人長大白以朱絲縛其肘澄曰此即曜也勒甚悅遂赴洛距曜生擒之勒僭稱趙天王行皇帝事敬澄彌篤時石蔥將叛澄誡勒曰今年蔥中有蟲食必害人可令百姓無食蔥也勒班告境內慎無食蔥俄而石蔥果走勒益重之事必咨而後行號曰大和尚勒愛子斌暴病死將殯勒歎曰朕聞虢太子死扁鵲能生之今可得效乎乃令告澄澄取楊枝沾水灑而呪之就執斌手曰可起矣因此遂蘇有頃平復自是勒諸子多在澄寺中養之勒死之年天靜無風而塔上一鈴獨鳴澄謂衆曰鈴音云國有大喪不出今年矣既而勒果死及季龍僭位遷都於鄴傾心事澄有重於勒下書衣澄以綾錦乘以雕輦朝會之日引之升殿常侍以下悉助舉輿太子諸公扶翼而上主者唱大和尚衆坐皆起以彰其尊又使司空李農旦夕親問其太子諸公五日一朝尊敬莫與為比支道林在京師聞澄與諸石遊乃曰澄公其以季龍為海鷗鳥也百姓因澄故多奉佛皆營造寺廟相競出家真僞混淆多生愆過季龍下書料簡其著作郎王度奏曰佛外國之神非諸華所應祠奉漢代初傳其道惟聽西域人得立寺都邑以奉其神漢人皆不出家魏承漢制亦循前軌今可斷趙人悉不聽詣寺燒香禮拜以遵典禮其百辟卿士下逮衆隸例皆禁之其有犯者與淫祀同罪其趙人為沙門者還服百姓朝士多同度所奏季龍以澄故下書曰朕出自邊戎忝君諸夏至於饗祀應從本俗佛是戎神所應兼奉其夷趙百姓有樂事佛者特聽之澄時止鄴城寺中弟子遍於郡國嘗遣弟子法常北至襄國弟子法佐從襄國還相遇於梁基城下對車夜談言及和尚比旦各去佐始入澄逆笑曰昨夜爾與法常交車共說汝師邪佐愕然愧懺於是國人每相語莫起惡心和尚知汝及澄之所在無敢向其方面涕唾者季龍太子邃有二子在襄國澄語邃曰小阿彌比當得疾可往看之邃即馳信往視果已得疾太醫殷騰及外國道士自言能療之澄告弟子法牙曰正使聖人復出不愈此疾況此等乎後三日果死邃將圖為逆謂內豎曰和尚神通儻發吾謀明日來者當先除之澄月望將入覲季龍謂弟子僧慧曰昨夜天神呼我曰明日若入還勿過人我儻有所過汝當止我澄常入必過邃邃知澄入要候甚苦澄將上南臺僧慧引衣澄曰事不得止坐未安便起邃固留不住所謀遂差還寺歎曰太子作亂其形將成欲言難言欲忍難忍乃因事從容針季龍季龍終不能解俄而事發方悟澄言後郭黑略將兵征長安北山羌墮羌伏中時澄在堂上坐慘然改容曰郭公今有厄乃唱云衆僧祝願澄又自祝願須臾更曰若東南出者活餘向者則困復更祝願有頃曰脫矣後月餘黑略還自說墜羌圍中東南走馬乏正遇帳下人推馬與之曰公乘此馬小人乘公馬濟與不濟命也略得其馬故獲免推檢時日正是澄祝願時也時天旱季龍遣其太子詣臨漳西滏口祈雨久而不降乃令澄自行即有白龍二頭降於祠所其日大雨方數千里澄嘗遣弟子向西域市香既行澄告餘弟子曰掌中見買香弟子在某處被劫垂死因燒香祝願遙救護之弟子後還云某月某日某處為賊所劫垂當見殺忽聞香氣賊無故自驚曰救兵已至棄之而走黃河中舊不生黿時有得者以獻季龍澄見而歎之曰桓溫入河其不久乎溫字元子後果如其言也季龍嘗晝寢夢見羣羊負魚從東北來寤以訪澄澄曰不祥也鮮卑其有中原乎後亦皆驗澄嘗與季龍升中臺澄忽驚曰變變幽州當火災乃取酒噀之久而笑曰救已得矣季龍遣驗幽州云爾日火從四門起西南有黑雲來驟雨滅之雨亦頗有酒氣石宣將殺石韜宣先到寺與澄同坐浮屠一鈴獨鳴澄謂曰解鈴音乎鈴云胡子洛度宣變色曰是何言歟澄謬曰老胡為道不能山居無言重茵美服豈非洛度乎石韜後至澄孰視良久韜懼而問澄澄曰怪公血臭故相視耳季龍夢龍飛西南自天而落旦而問澄澄曰禍將作矣宜父子慈和深以慎之季龍引澄入東閣與其后杜氏問訊之澄曰脅下有賊不出十日自浮圖以西此殿以東當有血流慎勿東也杜后曰和尚耄邪何處有賊澄即易語云六情所受皆悉是賊老自應耄但使少者不昏即好耳遂便寓言不復彰的後二日宣果遣人害韜於佛寺中欲因季龍臨喪殺之季龍以澄先誡故獲免及宣被收澄諫季龍曰皆陛下之子也何為重禍邪陛下若含怒加慈者尚有六十餘歲如必誅之宣當為彗星下掃鄴宮季龍不從後月餘有一妖馬髦尾皆有燒狀入中陽門出顯陽門東首東宮皆不得入走向東北俄爾不見澄聞而歎曰災其及矣季龍大享羣臣於太武前殿澄吟曰殿乎殿乎棘子成林將壞人衣季龍令發殿石下視之有棘生焉冉閔小字棘奴季龍造太武殿初成圖畫自古賢聖忠臣孝子烈士貞女皆變為胡狀旬餘頭悉縮入肩中惟冠䩉髣佛微出季龍大惡之祕而不言也澄對之流涕乃自啓塋墓於鄴西紫陌還寺獨語曰得三年乎自答不得又曰得二年一年百日一月乎自答不得遂無復言謂弟子法祚曰戊申歲禍亂漸萌己酉石氏當滅吾及其未亂先從化矣卒於鄴宮寺後有沙門從雍州來稱見澄西入關季龍掘而視之惟有一石而無尸季龍惡之曰石者朕也葬我而去吾將死矣因而遇疾明年季龍死遂大亂麻襦麻襦者不知何許人也莫得其姓名石季龍時在魏縣市中乞丐著麻襦布裳故時人謂之麻襦言語卓越狀如狂者乞得米穀不食輒散置大路云飴天馬趙興太守籍狀收送詣季龍先是佛圖澄謂季龍曰國東二百里某月日當送一非常人勿殺之也如期果至季龍與共語了無異言惟道陛下當終一柱殿下季龍不解送以詣澄麻襦謂澄曰昔在光和中會奄至今日酉戎受玄命絶曆終有期金離消于壤邊荒不能遵驅除靈期迹莫已已之懿裔苗葉繁其來方積休期於何期永以歎之澄曰天回運極否將不支九木水為難無可以術寧玄哲雖存世莫能基必莫能基必穨久遊閻浮利擾擾多此患行登陵雲宇會於虛游間其所言人莫能曉季龍遣驛馬送還本縣既出城請步云我當有所過君至合口橋見待使人如言而馳至橋麻襦已先至後慕容俊投季龍尸於漳水倚橋柱不流時人以為一柱殿下即謂此也及元帝嗣位江左亦以為天馬之應云單道開單道開敦煌人也常衣粗褐或贈以繒服皆不著不畏寒暑晝夜不臥服細石子一吞數枚日一服或多或少好山居而山樹諸神見異形試之初無懼色石季龍時從西平來一日行七百里其一沙彌年十四行亦及之至秦州表送到鄴季龍令佛圖澄與語不能屈也初止鄴城西沙門法綝祠中後徙臨漳昭德寺於房內造重閣高八九尺於上編菅為禪室常坐其中季龍資給甚厚道開皆以施人人或來咨問者道開都不答日服鎮守藥數丸大如梧子藥有松蜜薑桂伏苓之氣時復飲荼蘇一二升而已自云能療目疾就療者頗驗視其行動狀若有神佛圖澄曰此道士觀國興衰若去者當有大亂及季龍末道開南渡許昌尋而鄴中大亂升平三年至京師後至南海入羅浮山獨處茅茨蕭然物外年百餘歲卒於山舍敕弟子以尸置石穴中弟子乃移入石室陳郡袁宏為南海太守與弟穎叔及沙門支法防共登羅浮山至石室口見道開形骸如生香火瓦器猶存宏曰法師業行殊羣正當如蟬蛻耳乃為之贊云黃泓黃泓字始長魏郡斥丘人也父沈善天文祕術泓從父受業精妙踰深兼博覽經史尤明禮易性忠勤非禮不動永嘉之亂與渤海高瞻避地幽州說瞻曰王浚昏暴終必無成宜思去就以圖久安慕容廆法政修明虛懷引納且讖言真人出東北儻或是乎宜相與歸之同建事業瞻不從泓乃率宗族歸廆廆待以客禮引為參軍軍國之務動輒訪之泓指說成敗事皆如言廆常曰黃參軍孤之仲翔也及皓嗣位遷左常侍領史官甚重之石季龍攻皓皓將走遼東泓曰賊有敗氣無可憂也不過二日必當奔潰宜嚴勒士馬為追擊之備皓曰今寇盛如此卿言必走孤未敢信泓曰殿下言盛者人事耳臣言必走者天時也胡足為疑及期季龍果退皓益奇之及慕容俊即王位遷從事中郎俊聞冉閔亂將圖中原訪之於泓泓勸行俊從之及僭號署為進謀將軍太史令關內侯尋加奉車都尉西海太守領太史令開陽亭侯又封平舒縣五等伯常從左右咨決大事靈臺令許敦害其寵諂事慕容評設異議以毀之乃以泓為太史靈臺諸署統加給事中泓待敦彌厚不以毀己易心慕容暐敗以老歸家歎曰燕必中興其在吳王恨吾年過不見耳年九十七卒卒後三年僞吳王慕容垂興焉索紞索紞字叔徹敦煌人也少遊京師受業太學博綜經籍遂為通儒明陰陽天文善術數占候司徒辟除郎中知中國將亂避世而歸鄉人從紞占問吉凶門中如市紞曰攻乎異端戒在害己無為多事多事多患遂詭言虛說無驗乃止惟以占夢為無悔吝乃不逆問者孝廉令狐策夢立冰上與冰下人語紞曰冰上為陽冰下為陰陰陽事也士如歸妻逮冰未泮婚姻事也君在冰上與冰下人語為陽語陰媒介事也君當為人作媒冰泮而婚成策曰老夫耄矣不為媒也會太守田豹因策為子求鄉人張公徵女仲春而成婚焉郡主簿張宅夢走馬上山還繞舍三周但見松柏不知門處紞曰馬屬離離為火火禍也人上山為凶字但見松柏墓門象也不知門處為無門也三周三朞也後三年必有大禍宅果以謀反伏誅索充初夢天上有二棺落充前紞曰棺者職也當有京師貴人舉君二官者頻再遷俄而司徒王戎書屬太守使舉充太守先署充功曹而舉孝廉充後夢見一虜脫上衣來詣充紞曰虜去上中下半男字夷狄陰類君婦當生男終如其言宋桷夢內中有一人著赤衣桷手把兩杖極打之紞曰內中有人肉字也肉色赤也兩杖箸象也極打之飽肉食也俄而亦驗焉黃平問紞曰我昨夜夢舍中馬舞數十人向馬拍手此何祥也紞曰馬者火也舞為火起向馬拍手救火人也平未歸而火作索綏夢東有二角書詣綏大角朽敗小角有題韋囊角佩一在前一在後紞曰大角朽敗腐棺木小角有題題所詣一在前前凶也一在後後背也當有凶背之問時綏父在東居三日而凶問至郡功曹張邈嘗奉使詣州夜夢狼啖一腳紞曰腳肉被啖為卻字會東虜反遂不行凡所占莫不驗太守陰淡從求占書紞曰昔入太學因一父老為主人其人無所不知又匿姓名有似隱者紞因從父老問占夢之術審測而說實無書也淡命為西閣祭酒紞辭曰少無山林之操游學京師交結時賢希申鄙藝會中國不靖欲養志終年老亦至矣不求聞達又少不習勤老無吏幹濛汜之年弗敢聞命淡以束帛禮之月致羊酒年七十五卒于家孟欽孟欽洛陽人也有左慈劉根之術百姓惑而赴之苻堅召詣長安惡其惑衆命苻融誅之俄而欽至融留之遂大宴郡僚酒酣目左右收欽欽化為旋風飛出第外頃之有告在城東者融遣騎追之垂及忽然已遠或有兵衆距戰或前有溪澗騎不得過遂不知所在堅末復見於青州苻朗尋之入于海島王嘉王嘉字子年隴西安陽人也輕舉止醜形貌外若不足而聰睿內明滑稽好語笑不食五穀不衣美麗清虛服氣不與世人交游隱於東陽谷鑿崖穴居弟子受業者數百人亦皆穴處石季龍之末棄其徒衆至長安潛隱於終南山結菴廬而止門人聞而復隨之乃遷於倒獸山苻堅纍徵不起公侯已下咸躬往參詣好尚之士無不師宗之問其當世事者皆隨問而對好為譬喻狀如戲調言未然之事辭如讖記當時鮮能曉之事過皆驗堅將南征遣使者問之嘉曰金剛火強乃乘使者馬正衣冠徐徐東行數百步而策馬馳反脫衣服棄冠履而歸下馬踞牀一無所言使者還告堅不悟復遣問之曰吾世祚云何嘉曰未央咸以為吉明年癸未敗於淮南所謂未年而有殃也人候之者至心則見之不至心則隱形不見衣服在架履杖猶存或欲取其衣者終不及企而取之衣架踰高而屋亦不大履杖諸物亦如之姚萇之入長安禮嘉如苻堅故事逼以自隨每事咨之萇既與苻登相持問嘉曰吾得殺苻登定天下不嘉曰略得之萇怒曰得當云得何略之有遂斬之先此釋道安謂嘉曰世故方殷可以行矣嘉答曰卿其先行吾負債未果去俄而道安亡至是而嘉戮死所謂負債者也苻登聞嘉死設壇哭之贈太師諡曰文及萇死萇子興字子略方殺登略得之謂也嘉之死日人有隴上見之其所造牽三歌讖事過皆驗纍世猶傳之又著拾遺録十卷其記事多詭怪今行於世僧涉僧涉者西域人也不知何姓少為沙門苻堅時入長安虛靜服氣不食五穀日能行五百里言未然之事驗若指掌能以祕祝下神龍每旱堅常使之呪龍請雨俄而龍下鉢中天輒大雨堅及羣臣親就鉢觀之卒於長安後大旱移時苻堅歎曰涉公若在豈憂此乎郭黁郭黁西平人也少明式易仕郡主簿張天錫末年苻氏每有西伐之問太守趙凝使黁筮之黁曰若郡內二月十五日失囚者東軍當至涼祚必終凝乃申約屬縣至十五日鮮卑折掘送馬於凝凝怒其非駿幽之內鮮卑懼而夜遁凝以告黁黁曰是也國家將亡不可復振苻堅末當陽門震刺史梁熙問黁曰其祥安在黁曰為四夷之事也當有外國二王來朝主上一當反國一死此城歲餘而鄯善及前部王朝於苻堅西歸鄯善王死於姑臧呂光之王河西也西海太守王楨叛黁勸光襲之光之左丞呂寶曰千里襲人自昔所難況王者之師天下所聞何可僥幸以邀成功黁不可從誤人大事黁曰若其不捷黁自伏鈇鉞之誅如其克也左丞為無謀矣光從而克之光比之京管常參帷幄密謀光將伐乞伏乾歸黁諫曰今太白未出不宜行師往必無功終當覆敗太史令賈曜以為必有秦隴之地及克金城光使曜詰黁黁密謂光曰昨有流星東墜當有伏尸死將雖得此城憂在不守正月上旬河冰將解若不早渡恐有大變後二日而敗問至光引軍渡河訖冰泮時人服其神驗光以黁為散騎常侍太常黁後以光年老知其將敗遂與光僕射王祥起兵作亂百姓聞黁起兵咸以聖人起事事無不成故相率從之如不及黁以為代呂者王乃推王乞基為主後呂隆降姚興興以王尚為涼州刺史終如黁言黁之與光相持也逃人稱呂統病死黁曰未也光統之命盡在一時後統死三日而光死黁嘗曰涼州謙光殿後當有索頭鮮卑居之終於禿髮檀沮渠蒙遜迭據姑臧黁性褊酷不為士庶所附戰敗奔乞伏乾歸乾歸敗入姚興黁以滅姚者晉遂將妻子南奔為追兵所殺也鳩摩羅什鳩摩羅什天竺人也世為國相父鳩摩羅炎聰懿有大節將嗣相位乃辭避出家東渡蔥嶺龜茲王聞其名郊迎之請為國師王有妹年二十才悟明敏諸國交娉並不許及見炎心欲當之王乃逼以妻焉既而羅什在胎其母慧解倍常及年七歲母遂與俱出家羅什從師受經日誦千偈偈有三十二字凡三萬二千言義亦自通年十二其母攜到沙勒國王甚重之遂停沙勒一年博覽五明諸論及陰陽星算莫不必盡妙達吉凶言若符契為性率達不拘小檢修行者頗共疑之然羅什自得於心未嘗介意專以大乘為化諸學者皆共師焉年二十龜茲王迎之還國廣說諸經四遠學徒莫之能抗有頃羅什母辭龜茲王往天竺留羅什住謂之曰方等深教不可思議傳之東土惟爾之力但於汝無利其可如何什曰必使大化流傳雖苦而無恨母至天竺道成進登第三果西域諸國咸伏羅什神俊每至講說諸王皆長跪坐側令羅什踐而登焉苻堅聞之密有迎羅什之意會太史奏云有星見外國分野當有大智入輔中國堅曰朕聞西域有鳩摩羅什將非此邪乃遣驍騎將軍呂光等率兵七萬西伐龜茲謂光曰若獲羅什即馳驛送之光軍未至羅什謂龜茲王白純曰國運衰矣當有勍敵從日下來宜恭承之勿抗其鋒純不從出兵距戰光遂破之乃獲羅什光見其年齒尚少以凡人戲之強妻以龜茲王女羅什距而不受辭甚苦至光曰道士之操不踰先父何所固辭乃飲以醇酒同閉密室羅什被逼遂妻之光還中路置軍於山下將士已休羅什曰在此必狼狽宜徙軍隴上光不納至夜果大雨洪潦暴起水深數丈死者數千人光密異之光欲留王西國羅什謂光曰此凶亡之地不宜淹留中路自有福地可居光還至涼州聞苻堅已為姚萇所害於是竊號河右屬姑臧大風羅什曰不祥之風當有姦叛然不勞自定也俄而有叛者尋皆殄滅沮渠蒙遜先推建康太守段業為主光遣其子纂率衆討之時論謂業等烏合纂有威聲勢必全克光以訪羅什答曰此行未見其利既而纂敗於合黎俄又郭黁起兵纂棄大軍輕還復為黁所敗僅以身免中書監張資病光博營救療有外國道人羅叉云能差資病光喜給賜甚重羅什知叉誑詐告資曰叉不能為益徒煩費耳冥運雖隱可以事試也乃以五色絲作繩結之燒為灰末投水中灰若出水還成繩者病不可愈須臾灰聚浮出復為繩叉療果無效少日資亡頃之光死纂立有猪生子一身三頭龍出東箱井中於殿前蟠臥比旦失之纂以為美瑞號其殿為龍翔殿俄而有黑龍升於當陽九宮門纂改九宮門為龍興門羅什曰比日潛龍出游豕妖表異龍者陰類出入有時而今屢見則為災眚必有下人謀上之變宜克己修德以答天戒纂不納後果為呂超所殺羅什之在涼州積年呂光父子既不弘道故蘊其深解無所宣化姚興遣姚碩德西伐破呂隆乃迎羅什待以國師之禮仍使入西明閣及逍遙園譯出衆經羅什多所暗誦無不究其義旨既覽舊經多有紕繆於是興使沙門僧睿僧肇等八百餘人傳受其旨更出經論凡三百餘卷沙門慧睿才識高明常隨羅什傳寫羅什每為慧睿論西方辭體商略同異云天竺國俗甚重文制其宮商體韵以入管弦為善凡覲國王必有贊德經中偈頌皆其式也羅什雅好大乘志在敷演常歎曰吾若著筆作大乘阿毗曇非迦旃子比也今深識者既寡將何所論惟為姚興著實相論二卷興奉之若神嘗講經於草堂寺興及朝臣大德沙門千有餘人肅容觀聽羅什忽下高坐謂興曰有二小兒登吾肩欲鄣須婦人興乃召宮女進之一交而生二子焉興嘗謂羅什曰大師聰明超悟天下莫二何可使法種少嗣遂以伎女十人逼令受之爾後不住僧坊別立解舍諸僧多效之什乃聚針盈鉢引諸僧謂之曰若能見效食此者乃可畜室耳因舉匕進針與常食不別諸僧愧服乃止杯渡比丘在彭城聞羅什在長安乃歎曰吾與此子戲別三百餘年相見杳然未期遲有遇於來生耳羅什未終少日覺四大不悆乃口出三番神呪令外國弟子誦之以自救未及致力轉覺危殆於是力疾與衆僧告別曰因法相遇殊未盡心方復後世惻愴可言死於長安姚興於逍遙園依外國法以火焚尸薪滅形碎惟舌不爛曇霍沙門曇霍者不知何許人也禿髮檀時從河南來持一錫杖令人跪曰此是般若眼奉之可以得道時人咸異之或遺以衣服受而投之於河後日以還其本主衣無所汙行步如風雲言人死生貴賤無毫釐之差人或藏其錫杖曇霍大哭數聲閉目須臾起而取之咸奇其神異莫能測也每謂檀曰若能安坐無為則天下可定祚胤克昌如其窮兵好殺禍將及己檀不能從檀女病甚請救療曇霍曰人之生死自有定期聖人亦不能轉禍為福曇霍安能延命邪正可知早晚耳檀固請之時後宮門閉曇霍曰急開後門及開門則生不及則死檀命開之不及而死後兵亂不知所在也臺産臺産字國俊上洛人漢侍中崇之後也少專京氏易善圖讖祕緯天文洛書風角星算六日七分之學尤善望氣占候推步之術隱居商洛南山兼善經學泛情教授不交當世劉曜時災異特甚命公卿各舉博識直言之士一人其大司空劉均舉産曜親臨東堂遣中黃門策問之産極言其故曜覽而嘉之引見訪以政事産流涕歔欷具陳災變之禍政化之闕辭甚懇至曜改容禮之署為博士祭酒諫議大夫領太史令至明年而其言皆驗曜彌重之轉太中大夫歲中三遷歷位尚書光祿大夫太子少師位特進金章紫綬爵關中侯史臣曰陳戴等諸子並該洽墳典研精數術究推步之幽微窮陰陽之祕奧雖前代京管何以加之郭黁知有晉之亡姚去姚以歸晉追兵奄及致斃中塗斯則遠見秋毫不能近知目睫澄什爰自遐裔來游諸夏什既兆見星象澄乃驅役鬼神並通幽洞冥垂文闡教諒見珍於道藝非取貴於他山姚石奉之若神良有以也鮑吳王幸等或假靈道訣或受教神方遂能厭勝禳災隱文彰義雖獲譏於妖妄頗有益於世用者焉然而碩學通人未宜枉轡贊曰傳災祥書稱龜筮應如影響叶若符契怪力亂神詭時惑世崇尚弗已必致流弊
