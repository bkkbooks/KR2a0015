body:
  text: 晉書卷一百二十八載記第二十八慕容超慕容鍾封孚慕容超字祖明德兄北海王納之子苻堅破鄴以納為廣武太守數歲去官家于張掖德之南征留金刀而去及垂起兵山東苻昌收納及德諸子皆誅之納母公孫氏以耄獲免納妻段氏方娠未決囚之于郡獄獄掾呼延平德之故吏也嘗有死罪德免之至是將公孫及段氏逃于羌中而生超焉年十歲而公孫氏卒臨終授超以金刀曰若天下太平汝得東歸可以此刀還汝叔也平又將超母子奔于呂光及呂隆降于姚興超又隨涼州人徙于長安超母謂超曰吾母子全濟呼延氏之力平今雖死吾欲為汝納其女以答厚惠於是娶之超自以諸父在東恐為姚氏所録乃陽狂行乞秦人賤之惟姚紹見而異焉勸興拘以爵位召見與語超深自晦匿興大鄙之謂紹曰諺云妍皮不裹癡骨妄語耳由是得去來無禁德遣使迎之超不告母妻乃歸及至廣固呈以金刀具宣祖母臨終之言德撫之號慟超身長八尺腰帶九圍精彩秀發容止可觀德甚加禮遇始名之曰超封北海王拜侍中驃騎大將軍司隸校尉開府置佐吏德無子欲以超為嗣故為超起第於萬春門內朝夕觀之超亦深達德旨入則盡歡承奉出則傾身下士於是內外稱美焉頃之立為太子及德死以義熙元年僭嗣僞位大赦境內改元曰太上尊德妻段氏為皇太后以慕容鍾都督中外諸軍録尚書事慕容法為征南都督徐兗揚南兗四州諸軍事慕容鎮加開府儀同三司尚書令封孚為太尉鞠仲為司空潘聰為左光祿大夫封嵩為尚書左僕射自餘封拜各有差後又以鍾為青州牧段宏為徐州刺史公孫五樓為武衛將軍領屯騎校尉內參政事封孚言於超曰臣聞五大不在邊五細不在庭鍾國之宗臣社稷所賴宏外戚懿望親賢具瞻正應參翼百揆不宜遠鎮方外今鍾等出藩五樓內輔臣竊未安超新即位害鍾等權逼以問五樓五樓欲專斷朝政不欲鍾等在內屢有間言孚說竟不行鍾宏俱有不平之色相謂曰黃犬之皮恐當終補狐裘也五樓聞之嫌隙漸遘初超自長安行至梁父慕容法時為兗州鎮南長史悅壽還謂法曰向見北海王子天資弘雅神爽高邁始知天族多奇玉林皆寶法曰昔成方遂詐稱衛太子人莫辨之此復天族乎超聞而恚恨形于言色法亦怒處之外館由是結憾及德死法又不奔喪超遣使讓焉法常懼禍至因此遂與慕容鍾段宏等謀反超知而徵之鍾稱疾不赴於是收其黨侍中慕容統右衛慕容根散騎常侍段封誅之車裂僕射封嵩於東門之外西中郎將封融奔于魏超尋遣慕容鎮等攻青州慕容昱等攻徐州慕容凝韓範攻梁父昱等攻莒城拔之徐州刺史段宏奔于魏封融又集羣盜襲石塞城殺鎮西大將軍餘鬱青土振恐人懷異議慕容凝謀殺韓範將襲廣固範知而攻之凝奔梁父範并其衆攻梁父克之凝奔姚興慕容法出奔于魏慕容鎮克青州鍾殺其妻子為地道而出單馬奔姚興于時超不恤政事畋游是好百姓苦之其僕射韓創切諫不納超議復肉刑九等之選乃下書於境內曰陽九數纏永康多難自北都傾陷典章淪滅律令法憲靡有存者綱理天下此焉為本既不能導之以德必須齊之以刑且虞舜大聖猶命咎繇作士刑之不可已已也如是先帝季興大業草創兵革尚繁未遑修制朕猥以不德嗣承大統撫御寡方致蕭牆釁發遂戎馬生郊典儀寢廢今四境無虞所宜修定尚書可召集公卿至如不忠不孝若封嵩之輩梟斬不足以痛之宜致烹轘之法亦可附之律條納以大辟之科肉刑者乃先聖之經不刊之典漢文易之輕重乖度今犯罪彌多死者稍衆肉刑之于化也濟育既廣懲慘尤深光壽建興中二祖已議復之未及而晏駕其令博士已上參考舊事依呂刑及漢魏晉律令消息增損議成燕律五刑之屬三千而罪莫大于不孝孔子曰非聖人者無法非孝者無親此大亂之道也轘裂之刑烹煮之戮雖不在五品之例然亦行之自古渠彌之轘著之春秋哀公之烹爰自中代世宗都齊亦愍刑罰失中咨嗟寢食王者之有刑糾猶人之左右手焉故孔子曰刑罰不中則人無所措手足是以蕭何定法令而受封叔孫通以制儀為奉常立功立事古之所重其明議損益以成一代準式周漢有貢士之條魏立九品之選二者孰愈亦可詳聞羣下議多不同乃止超母妻既先在長安為姚興所拘責超稱藩求太樂諸伎若不可使送吳口千人超下書遣羣臣詳議左僕射段暉議曰太上囚楚高祖不回今陛下嗣守社稷不宜以私親之故而降統天之尊又太樂諸伎皆是前世伶人不可與彼使移風易俗宜掠吳口與之尚書張華曰若侵掠吳邊必成鄰怨此既能往彼亦能來兵連禍結非國之福也昔孫權重黎庶之命屈己以臣魏惠施惜愛子之頭捨志以尊齊況陛下慈德在秦方寸崩亂宜暫降大號以申至孝之情權變之道典謨所許韓範智能回物辨足傾人昔與姚興俱為秦太子中舍人可遣將命降號修和所謂屈于一人之下申于萬人之上也超大悅曰張尚書得吾心矣使範聘于興及至長安興謂範曰封愷前來燕王與朕抗禮及卿至也款然而附為依春秋以小事大之義為當專以孝敬為母屈也範曰周爵五等公侯異品小大之禮因而生焉今陛下命世龍興光宅西秦本朝主上承祖宗遺烈定鼎東齊中分天曜南面並帝通聘結好義尚謙沖便至矜誕苟折行人殊似吳晉爭盟滕薛競長恐傷大秦堂堂之盛有損皇燕巍巍之美彼我俱失竊未安之興怒曰若如卿言便是非為大小而來範曰雖由大小之義亦緣寡君純孝過于重華願陛下體敬親之道霈然垂愍興曰吾久不見賈生自謂過之今不及矣於是為範設舊交之禮申平生謂範曰燕王在此朕亦見之風表乃可於機辨未也範曰大辨若訥聖人美之況爾日龍潛鳳戢和光同塵若使負日月而行則無繼天之業矣興笑曰可謂使乎延譽者也範承間逞說姚興大悅賜範千金許以超母妻還之慕容凝自梁父奔于姚興言于興曰燕王稱藩本非推德權為母屈耳古之帝王尚興師徵質豈可虛還其母乎母若一還必不復臣也宜先制其送伎然後歸之興意乃變遣使聘于超超遣其僕射張華給事中宗正元入長安送太樂伎一百二十人于姚興興大悅延華入宴酒酣樂作興黃門侍郎尹雅謂華曰昔殷之將亡樂師歸周今皇秦道盛燕樂來庭廢興之兆見于此矣華曰自古帝王為道不同權譎之理會于功成故老子曰將欲取之必先與之今總章西入必由余東歸禍福之驗此其兆乎興怒曰昔齊楚競辨二國連師卿小國之臣何敢抗衡朝士華遜辭曰奉使之始實願交歡上國上國既遺小國之臣辱及寡君社稷臣亦何心而不仰酬興善之于是還超母妻義熙三年追尊其父為穆皇帝立其母段氏為皇太后妻呼延氏為皇后祀南郊將登壇有獸大如馬狀類鼠而色赤集于圓丘之側俄而不知所在須庾大風暴起天地晝昏其行宮羽儀皆振裂超懼密問其太史令成公綏對曰陛下信用姦臣誅戮賢良賦斂繁多事役殷苦所致也超懼而大赦譴責公孫五樓等俄而復之是歲廣固地震天齊水湧井水溢女水竭河濟凍合而澠水不冰超正旦朝羣臣于東陽殿聞樂作歎音佾不備悔送伎于姚興遂議入寇其領軍韓創諫曰先帝以舊京傾沒戢翼三齊苟時運未可上智輟謀今陛下嗣守成規宜閉關養士以待賦釁不可結怨南鄰廣樹仇隙超曰我計已定不與卿言于是遣其將斛穀提公孫歸等率騎寇宿豫陷之執陽平太守劉千載濟陰太守徐阮大掠而去簡男女二千五百付太樂教之時公孫五樓為侍中尚書領左衛將軍專總朝政兄歸為冠軍常山公叔父穨為武衛興樂公五樓宗親皆夾輔左右王公內外無不憚之超論宿豫之功封斛穀提等並為郡縣公慕容鎮諫曰臣聞懸賞待勳非功不侯今公孫歸結禍延兵殘賊百姓陛下封之得無不可乎夫忠言逆耳非親不發臣雖庸朽忝國戚藩輒盡愚款惟陛下圖之超怒不答自是百僚杜口莫敢開言尚書都令史王儼諂事五樓遷尚書郎出為濟南太守入為尚書左丞時人為之語曰欲得侯事五樓又遣公孫歸等率騎三千入寇濟南執太守趙元略男女千餘人而去劉裕率師將討之超引見羣臣于東陽殿議距王師公孫五樓曰吳兵輕果所利在戰初鋒勇鋭不可爭也宜據大峴使不得入曠日延時沮其鋭氣可徐簡精騎二千循海而南絶其糧運別敕段暉率兗州之軍緣山東下腹背擊之上策也各命守宰依險自固校其資儲之外餘悉焚蕩芟除粟苗使敵無所資堅壁清野以待其釁中策也縱賊入峴出城逆戰下策也超曰京都殷盛戶口衆多非可一時入守青苗布野非可卒芟設使芟苗城守以全性命朕所不能今據五州之強帶山河之固戰車萬乘鐵馬萬羣縱令過峴至于平地徐以精騎踐之此成擒也賀賴盧苦諫不從退謂五樓曰上不用吾計亡無日矣慕容鎮曰若如聖旨必須平原用馬為便宜出峴逆戰戰而不勝猶可退守不宜縱敵入峴自貽窘逼昔成安君不守井陘之關終屈于韓信諸葛瞻不據束馬之嶮卒擒于鄧艾臣以為天時不如地利阻守大峴策之上也超不從鎮出謂韓創曰主上既不能芟苗守嶮又不肯徙人逃寇酷似劉璋矣今年國滅吾必死之卿等中華之士復為文身矣超聞而大怒收鎮下獄乃攝莒梁父二戍修城隍簡士馬畜鋭以待之其夏王師次東莞超遣其左軍段暉輔國賀賴盧等六將步騎五萬進據臨朐俄而王師度峴超懼率卒四萬就暉等于臨朐謂公孫五樓曰宜進據川源晉軍至而失水亦不能戰矣五樓馳騎據之劉裕前驅將軍孟龍符已至川源五樓戰敗而返裕遣咨議參軍檀韶率鋭卒攻破臨朐超大懼單騎奔段暉于城南暉衆又戰敗裕軍人斬暉超又奔還廣固徙郭內人入保小城使其尚書郎張綱乞師于姚興赦慕容鎮進録尚書都督中外諸軍事引見羣臣謝之曰朕嗣奉成業不能委賢任善而專固自由覆水不收悔將何及智士逞謀必在事危忠臣立節亦在臨難諸君其勉思六奇共濟艱運鎮進曰百姓之心係于一人陛下既躬率六軍身先奔敗羣臣解心士庶喪氣內外之情不可復恃如聞西秦自有內難恐不暇分兵救人正當更決一戰以爭天命今散卒還者猶有數萬可悉出金帛宮女餌令一戰天若相我足以破賊如其不濟死尚為美不可閉門坐受圍擊司徒慕容惠曰不然今晉軍乘勝有陵人之氣敗軍之將何以禦之秦雖與勃勃相持不足為患且二國連橫勢成脣齒今有寇難秦必救我但自古乞援不遣大臣則不致重兵是以趙隸三請楚師不出平原一使援至從成尚書令韓範德望具瞻燕秦所重宜遣乞援以濟時艱于是遣範與王蒲乞師于姚興未幾裕師圍城四面皆合人有竊告裕軍曰若得張綱為攻具者城乃可得耳是月綱自長安歸遂奔于裕裕令綱周城大呼曰勃勃大破秦軍無兵相救超怒伏弩射之乃退右僕射張華中丞封愷並為裕軍所獲裕令華愷與超書勸令早降超乃遺裕書請為藩臣以大峴為界并獻馬千匹以通和好裕弗許江南繼兵相尋而至尚書張俊自長安還又降于裕說裕曰今燕人所以固守者外杖韓範冀得秦援範既時望又與姚興舊昵若勃勃敗後秦必救燕宜密信誘範啖以重利範來則燕人絶望自然降矣裕從之表範為散騎常侍遺範書以招之時姚興乃遣其將姚強率步騎一萬隨範就其將姚紹于洛陽并兵來援會赫連勃勃大破秦軍興追強還長安範歎曰天其滅燕乎會得裕書遂降于裕裕謂範曰卿欲立申包胥之功何以虛還也範曰自亡祖司空世荷燕寵故泣血秦庭冀匡禍難屬西朝多故丹誠無效可謂天喪弊邑而贊明公智者見機而作敢不至乎翌日裕將範循城由是人情離駭無復固志裕謂範曰卿宜至城下告以禍福範曰雖蒙殊寵猶未忍謀燕裕嘉而不強左右勸超誅範家以止後叛超知敗在旦夕又弟創盡忠無二故不罪焉是歲東萊雨血廣固城門鬼夜哭明年朔旦超登天門朝羣臣于城上殺馬以饗將士文武皆有遷授超幸姬魏夫人從超登城見王師之盛握超手而相對泣韓創諫曰陛下遭百六之會正是勉強之秋而反對女子悲泣何其鄙也超拭目謝之其尚書令董鋭勸超出降超大怒繫之于獄于是賀賴盧公孫五樓為地道出戰王師不利河間人玄文說裕曰昔趙攻曹嶷望氣者以為澠水帶城非可攻拔若塞五龍口城必自陷石季龍從之而嶷請降後慕容恪之圍段龕亦如之而龕降降後無幾又震開之今舊基猶在可塞之裕從其言至是城中男女患腳弱病者太半超輦而升城尚書悅壽言于超曰天地不仁助寇為虐戰士病日就凋隕守困窮城息望外援天時人事亦可知矣苟曆運有終堯舜降位轉禍為福聖達以先宜追許鄭之蹤以全宗廟之重超歎曰廢興命也吾寧奮劍決死不能銜璧求生於是張綱為裕造衝車覆以版屋蒙之以皮并設諸奇巧城上火石弓矢無所施用又為飛樓懸梯木幔之屬遙臨城上超大怒懸其母而支解之城中出降者相繼裕四面進攻殺傷甚衆悅壽遂開門以納王師超與左右數十騎出亡為裕軍所執裕數之以不降之狀超神色自若一無所言惟以母託劉敬宣而已送建康市斬之時年二十六在位六年德以安帝隆安四年僭位至超二世凡十一年以義熙六年滅慕容鍾字道明德從弟也少有識量喜怒不形于色機神秀發言論清辨至于臨難對敵智勇兼濟纍進奇策德用之頗中由是政無大小皆以委之遂為佐命元勳後公孫五樓規挾威權慮鍾抑己因勸超誅之鍾遂謀反事敗奔于姚興興拜始平太守歸義侯封孚字處道渤海蓨人也祖悛振威將軍父放慕容暐之世吏部尚書孚幼而聰敏和裕有士君子之稱寶僭位纍遷吏部尚書及蘭汗之篡南奔辟閭渾渾表為渤海太守德至莒城孚出降德曰朕平青州不以為慶喜于得卿也常外總機事內參密謀雖位任崇重謙虛博納甚有大臣之體及超嗣位政出權嬖多違舊章軌憲日頽殘虐滋甚孚屢盡匡救超不能納也後臨軒謂孚曰朕于百王可方誰孚對曰桀紂之主超大慚怒孚徐步而出不為改容司空鞠仲失色謂孚曰與天子言何其亢厲宜應還謝孚曰行年七十墓木已拱惟求死所耳竟不謝以超三年死于家時年七十一文筆多傳于世史臣曰慕容德以季父之親居鄴中之重朝危未聞其節君存遽踐其位豈人理哉然稟俶儻之雄姿韞從橫之遠略屬分崩之運成角逐之資跨有全齊竊弄神器撫劍而爭衡秦魏練甲而志靜荊吳崇儒術以弘風延讜言而勵己觀其為國有足稱焉超繼已成之基居霸者之業政刑莫恤畋游是好杜忠良而讒佞進暗聽受而勳戚離先緒俄穨家聲莫振陷宿豫而貽禍啓大峴而延敵君臣就虜宗廟為墟迹其人謀非不幸也贊曰德實姦雄轉敗為功奄有青土淫名域中超承僞祚撓其國步廟失良籌庭悲霑露
