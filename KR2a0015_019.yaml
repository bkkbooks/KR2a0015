body:
  text: 晉書卷十九志第九禮上夫人含天地陰陽之靈有哀樂喜怒之情乃聖垂範以為民極節其驕淫以防其暴亂崇高天地虔敬鬼神列尊卑之序成夫婦之義然後為國為家可得而治也傳曰一日克己復禮天下歸仁若乃太一初分燧人鑽火志有暢於恭儉情不由乎玉帛而酌玄流於春澗之右焚封豕於秋林之外亦無得而闕焉軒頊依神唐虞稽古逮乎隆周其文大備或垂百官之範置不刊之法或禮經三百威儀三千皆所以弘宣天意雕刻人理叔代澆訛王風陵謝事睽光國禮亦愆家趙簡子問太叔以揖讓周旋之禮對曰蓋所謂儀而非禮也天經地義之道自茲尤缺哀公十一年孔子自衛反魯迹三代之典垂百王之訓時無明后道曀不行若夫情尚分流隄防之仁是棄澆訛異術洙泗之風斯泯是以漢文罷再期之喪中興為一郊之祭隨時之義不其然歟而西京元鼎之辰中興永平之日疏璧流而延冠帶啓儒門而引諸生兩京之盛於斯為美及山魚登俎澤豕睽經禮樂恆委浮華相尚而郊禋之制綱紀或存魏氏光宅憲章斯美王肅高堂隆之徒博通前載三千條之禮十七篇之學各以舊文增損當世豈所謂致君於堯舜之道焉世屬雕牆時逢秕政周因之典務多違俗而遺編殘册猶有可觀者也景初元年營洛陽南委粟山以為圓丘祀之日以始祖帝舜配房俎生魚陶樽玄酒非搢紳為之綱紀其孰能與於此者哉宣景戎旅未遑伊制太康平吳九州共一禮經咸至樂器同歸於是齊魯諸生各攜緗素武皇帝亦初平寇亂意先儀範其吉禮也則三茅不翦日觀停瑄其凶禮也則深衣布冠降席徹膳明乎一謙三益之義而教化行焉元皇中興事多權道遺文舊典不斷如髮是以常侍戴邈詣闕上疏云方今天地更始萬物權輿蕩近世之流弊創千齡之英範是故雙劍之節崇而飛白之俗成挾琴之容飾而赴曲之和作其所以興起禮文勸帝身先之也穆哀之後王猷漸替桓溫居揆政由己出而有司或曜斯文增暉執事主威長謝臣道專行記曰苟無其位不可以作禮樂豈斯之謂歟晉始則有荀顗鄭沖裁成國典江左則有荀嵩刁協損益朝儀周官五禮吉凶軍賓嘉而吉禮之大莫過祭祀故洪範八政三曰祀祀者所以昭孝事祖通于神明者也漢興承秦滅學之後制度多未能復古歷東西京四百餘年故往往改變魏氏承漢末大亂舊章殄滅命侍中王粲尚書衛顗草創朝儀及晉國建文帝又命荀顗因魏代前事撰為新禮參考今古更其節文羊祜任愷庾峻應貞並共刊定成百六十五篇奏之太康初尚書僕射朱整奏付尚書郎摯虞討論之虞表所宜損增曰臣典校故太尉顗所撰五禮臣以為夫革命以垂統帝王之美事也隆禮以率教邦國之大務也是以臣前表禮事稽留求速訖施行又以喪服最多疑闕宜見補定又以今禮篇卷煩重宜隨類通合事久不出懼見寢默蓋冠婚祭會諸吉禮其制少變至于喪服世之要用而特易失旨故子張疑高宗諒陰三年子思不聽其子服出母子遊謂異父昆弟大功而子夏謂之齊衰及孔子沒而門人疑於所服此等皆明達習禮仰讀周典俯師仲尼漸漬聖訓講肄積年及遇喪事猶尚若此明喪禮易惑不可不詳也況自此已來篇章焚散去聖彌遠喪制詭謬固其宜矣是以喪服一卷卷不盈握而爭説紛然三年之喪鄭云二十七月王云二十五月改葬之服鄭云服緦三月王云葬訖而除繼母出嫁鄭云皆服王云從乎繼寄育乃為之服無服之殤鄭云子生一月哭之一日王云以哭之日易服之月如此者甚衆喪服本文省略必待注解事義乃彰其傳説差詳世稱子夏所作鄭王祖經宗傳而各有異同天下並疑莫知所定而顗直書古經文而已盡除子夏傳及先儒注説其事不可得行及其行事故當還頒異説一彼一此非所以定制也臣以為今宜參采禮記略取傳説補其未備一其殊義可依準王景侯所撰喪服變除使類統明正以斷疑爭然後制無二門咸同所由又此禮當班於天下不宜繁多顗為百六十五篇篇為一卷合十五餘萬言臣猶謂卷多文煩類皆重出案尚書堯典祀山川之禮惟於東嶽備稱牲幣之數陳所用之儀其餘則但曰如初周禮祀天地五帝享先王其事同者皆曰亦如之文約而義舉今禮儀事同而名異者輒別為篇卷煩而不典皆宜省文通事隨類合之事有不同乃列其異如此所減三分之一虞討論新禮訖以元康元年上之所陳惟明堂五帝二社六宗及吉凶王公制度凡十五篇有詔可其議後虞與傅咸纘續其事竟未成功中原覆沒虞之決疑注是其遺事也逮于江左僕射刁協太常荀嵩補緝舊文光祿大夫蔡謨又踵修其事云魏明帝太和元年正月丁未郊祀武帝以配天宗祀文帝於明堂以配上帝於是時二郊禋之制具存魏所損益可知四年八月天子東巡過繁昌使執金吾臧霸行太尉事以特牛祠受禪壇景初元年十月乙卯始營洛陽南委粟山為圜丘詔曰昔漢氏之初承秦滅學之後採托殘缺以備郊祀自甘泉后土雍宮五畤神祇兆位多不經見並以興廢無常一彼一此四百餘年廢無禘禮古代之所更立者遂有闕焉曹氏世系出自有虞氏今祀圜丘以始祖帝舜配號圜丘曰皇皇帝天方丘所祭曰皇皇后地以舜妃伊氏配天郊所祭曰皇天之神以太祖武皇帝配地郊所祭曰皇地之祇以武宣皇后配宗祀皇考高祖文皇帝於明堂以配上帝十二月壬子冬至始祀皇皇帝天于圜丘以始祖有虞帝舜配自正始以後終魏世不復郊祀魏元帝咸熙二年十二月甲子使持節侍中太保鄭沖兼太尉司隸校尉李喜奉皇帝璽綬策書禪位于晉丙寅武皇帝設壇場于南郊柴燎告類于上帝是時尚未有祖配泰始二年正月詔曰有司前奏郊祀權用魏禮朕不慮改作之難令便為永制衆議紛互遂不時定不得以時供饗神祇配以祖考日夕難企貶食忘安其便郊祀時羣臣又議五帝即天也王氣時異故殊其號雖名有五其實一神明堂南郊宜除五帝之坐五郊改五精之號皆同稱昊天上帝各設一坐而已地郊又除先后配祀帝悉從之二月丁丑郊祀宣皇帝以配天宗祀文皇帝於明堂以配上帝是年十一月有司又議奏古者丘郊不異宜并圓丘方丘於南北郊更修立壇兆其二至之祀合於二郊帝又從之一如宣帝所用王肅議也是月庚寅冬至帝親祠圓丘於南郊自是後圓丘方澤不別立太康三年正月帝親郊祀皇太子皇子悉侍祠十年十月又詔曰孝經郊祀后稷以配天宗祀文王於明堂以配上帝而周官云祀天旅上帝又曰祀地旅四望望非地則明堂上帝不得為天也往者衆議除明堂五帝位考之禮文不正且詩序曰文武之功起於后稷故推以配天焉宣帝以神武創業既已配天復以先帝配天於義亦所不安其復明堂及南郊五帝位愍帝都長安未及立郊廟而敗元帝渡江太興二年始議立郊祀儀尚書令刁協國子祭酒杜夷議宜須旋都洛邑乃修之司徒荀組據漢獻帝都許即便立郊自宜於此修奉驃騎王導僕射荀嵩太常華中書侍郎庾亮皆同組議事遂施行立南郊於巳地其制度皆太常賀循所定多依漢及晉初之儀三月辛卯帝親郊祀饗配之禮一依武帝始郊故事是時尚未立北壇地祇衆神共在天郊明帝太寧三年七月始詔立北郊未及建而帝崩及成帝咸和八年正月追述前旨於覆舟山南立之天郊則五帝之佐日月五星二十八宿文昌北斗三台司命軒轅后土太一天一太微句陳北極雨師雷電司空風伯老人凡六十二神也地郊則五嶽四望四海四瀆五湖五帝之佐沂山嶽山白山霍山醫無閭山蔣山松江會稽山錢唐江先農凡四十四神也江南諸小山蓋江左所立猶如漢西京關中小水皆有祭秩也是月辛未祀北郊始以宣穆張皇后配此魏氏故事非晉舊也康帝建元元年正月將北郊有疑議太常顧和表泰始中合二至之禮於二郊北郊之月古無明文或以夏至或同用陽復漢光武正月辛未始建北郊此則與南郊同月及中興草創百度從簡合七郊於一丘憲章未備權用斯禮蓋時宜也至咸和中議別立北郊同用正月魏承後漢正月祭天以地配時高堂隆等以為禮祭天不以地配而稱周禮三王之郊一用夏正於是從和議是月辛未南郊辛巳北郊帝皆親奉安帝元興三年劉裕討桓玄走之己卯告義功于南郊是年帝蒙塵江陵未反其明年應郊朝議以為宜依周禮宗伯攝職三公行事尚書左丞王納之獨曰既殯郊祀自是天子當陽有君存焉稟命而行何所辨也郊之與否豈如今日之比乎議者又云今宜郊故是承制所得令三公行事又郊天極尊惟一而已故非天子不祀也庶人以上莫不蒸嘗嫡子居外介子執事未有不親受命而可祭天者納之又曰武皇受禪用二月郊元帝中興以三月郊今郊時未過日望輿駕無為欲速而使皇輿旋反更不得親奉也於是從納之議郊廟牲幣璧玉之色雖有成文秦世多以䭹駒漢則但云犢未辨其色江左南北郊同用玄牲明堂廟社同以赤牲禮有事告祖禰宜社之文未有告郊之典也漢儀天子之喪使太尉告諡于南郊他無聞焉魏文帝黃初四年七月帝將東巡以大軍當出使太常以一特牛告祠南郊及文帝崩太尉鍾繇告諡南郊皆是有事於郊也江左則廢禮春分朝日於東秋分夕月於西漢武帝郊泰畤平旦出竹宮東向揖日其夕西向揖月即用郊日又不在東西郊也後遂旦夕常拜故魏文帝詔曰漢氏不拜日於東郊而旦夕常於殿下東西拜日月煩褻似家人之事非事天交神之道也黃初二年正月乙亥朝日于東門之外又違禮二分之義魏明帝太和元年二月丁亥朝日于東郊八月己丑夕月于西郊始得古禮及武帝太康二年有司奏春分依舊車駕朝日寒溫未適可不親出詔曰禮儀宜有常若如所奏與故太尉所撰不同復為無定制也間者方難未平故每從所奏今戎事弭息惟此為大案此詔帝復為親朝日也此後廢禮郊祀后稷以配天宗祀文王於明堂以配上帝魏文帝即位用漢明堂而未有配明帝太和元年始宗祀文帝於明堂齊王亦行其禮晉初以文帝配後復以宣帝尋復還以文帝配其餘無所變革是則郊與明堂同配異配參差不同矣摯虞議以為漢魏故事明堂祀五帝之神新禮五帝即上帝即天帝也明堂除五帝之位惟祭上帝案仲尼稱郊祀后稷以配天宗祀文王於明堂以配上帝周禮祀天旅上帝祀地旅四望望非地則上帝非天斷可識矣郊丘之祀掃地而祭牲用繭栗器用陶匏事反其始故配以遠祖明堂之祭備物以薦玉牲並陳籩豆成列禮同人鬼故配以近考郊堂兆位居然異體牲牢品物質文殊趣且祖考同配非謂尊嚴之美三日再祀非謂不黷之義其非一神亦足明矣昔在上古生為明王沒則配五行故太昊配木神農配火少昊配金顓頊配水黃帝配土此五帝者配天之神同兆之於四郊報之於明堂祀天大裘而冕祀五帝亦如之或以為五精之帝佐天育物者也前代相因莫之或廢晉初始從異議庚午詔書明堂及南郊除五帝之位惟祀天神新禮奉而用之前太醫令韓楊上書宜如舊祀五帝太康十年詔已施用宜定新禮明堂及郊祀五帝如舊儀詔從之江左以後未遑修建漢儀太史每歲上其年曆先立春立夏大暑立秋立冬常讀五時令皇帝所服各隨五時之色帝升御坐尚書令以下就席位尚書三公郎以令置案上奉以入就席伏讀訖賜酒一卮魏氏常行其禮魏明帝景初元年通事白曰前後但見讀春夏秋冬四時令至於服黃之時獨闕不讀今不解其故散騎常侍領太史令高堂隆以為黃於五行中央土也王四季各十八日土生於火故于火用事之末服黃三季則否其令則隨四時不以五行為令也是以服黃無令斯則魏氏不讀大暑令也及晉受命亦有其制傅咸云立秋一日白路光於紫庭白旗陳於玉階然則其日旗路皆白也成帝咸和五年六月丁未有司奏讀秋令兼侍中散騎常侍荀奕兼黃門侍郎散騎侍郎曹宇駁曰尚書三公曹奏讀秋令儀注舊典未備臣等參議光祿大夫臣華議武皇帝以秋夏盛暑常闕不讀令在春冬不廢也夫先王所以順時讀令者蓋後天而奉天時正服尊嚴之所重今服章多闕加比熱隆臣等謂可如議依故事闕如不讀詔可六年三月有司奏今月十六日立夏今正服漸備四時讀令是祗述天和隆殺之道謂今故宜讀夏令奏可禮孟春之月乃擇元辰天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝藉至秦滅學其禮久廢漢文帝之後始行斯典魏之三祖亦皆親耕藉田及武帝泰始四年有司奏始耕祠先農可令有司行事詔曰夫國之大事在祀與農是以古之聖王躬耕帝藉以供郊廟之粢盛且以訓化天下近世以來耕藉止於數步之中空有慕古之名曾無供祀訓農之實而有百官車徒之費今修千畝之制當與羣公卿士躬稼穡之艱難以率先天下主者詳具其制下河南處田地於東郊之南洛水之北若無官田隨宜便換而不得侵人也於是乘輿御木輅以耕以太牢祀先農自惠帝之後其事便廢江左元帝將修耕藉尚書符問藉田至尊應躬祠先農不賀循答漢儀無正有至尊應躬祭之文然則周禮王者祭四望則毳冕祭社稷五祀則絺冕以此不為無親祭之義也宜立兩儀注賀循等所上儀注又未詳允事竟不行後哀帝復欲行其典亦不能遂漢儀縣邑常以乙未日祠先農乃耕於乙地以丙戌日祠風伯於戌地以己丑日祠雨師於丑地牲用羊豕立春之日皆青幡幘迎春於東郊外野中迎春至自野中出則迎拜之而還弗祭三時不迎魏氏雖天子耕藉藩鎮闕諸侯百畝之禮及武帝末有司奏古諸侯耕藉田百畝躬執耒以奉社稷宗廟以勸率農功今諸王臨國宜依修耕藉之義然竟未施行周禮王后帥內外命婦蠶於北郊漢儀皇后親桑東郊苑中蠶室祭蠶神曰苑窊婦人寓氏公主祠用少牢魏文帝黃初七年正月命中宮蠶於北郊依周典也及武帝太康六年散騎常侍華嶠奏先王之制天子諸侯親耕藉田千畝后夫人躬蠶桑今陛下以聖明至仁修先王之緒皇后體資生之德合配乾之義而坤道未光蠶禮尚缺以為宜依古式備斯盛典詔曰昔天子親藉以供粢盛后夫人躬蠶以備祭服所以聿遵孝敬明教示訓也今藉田有制而蠶禮不修由中間務多未暇崇備今天下無事宜修禮以示四海其詳依古典及近代故事以參今宜明年施行於是蠶於西郊蓋與藉田對其方也乃使侍中成粲草定其儀先蠶壇高一丈方二丈為四出陛陛廣五尺在皇后採桑壇東南帷宮外門之外而東南去帷宮十丈在蠶室西南桑林在其東取列侯妻六人為蠶母蠶將生擇吉日皇后著十二筓步搖依漢魏故事衣青衣乘油畫雲母安車駕六騩馬女尚書著貂蟬佩璽陪乘載筐鉤公主三夫人九嬪世婦諸太妃太夫人及縣鄉君郡公侯特進夫人外世婦命婦皆步搖衣青各載筐鉤從蠶先桑二日蠶宮生蠶著薄上桑日皇后未到太祝令質明以一太牢告祠謁者一人監祠祠畢撤饌班餘胙於從桑及奉祠者皇后至西郊升壇公主以下陪列壇東皇后東面躬桑採三條諸妃公主各採五條縣鄉君以下各採九條悉以桑授蠶母還蠶室事訖皇后還便坐公主以下乃就位設饗宴賜絹各有差前漢但置官社而無官稷王莽置官稷後復省故漢至魏但太社有稷而官社無稷故常二社一稷也晉初仍魏無所增損至太康九年改建宗廟而社稷壇與廟俱徙乃詔曰社實一神其并二社之祀於是車騎司馬傅咸表曰祭法王社太社各有其義天子尊事郊廟故冕而躬耕躬耕也者所以重孝享之粢盛親耕故自報自為立社者為藉田而報者也國以人為本人以穀為命故又為百姓立社而祈報焉事異報殊此社之所以有二也王景侯之論王社亦謂春祈藉田秋而報之也其論太社則曰王者布下圻內為百姓立之謂之太社不自立之於京都也景侯此論據祭法祭法大夫以下成羣立社曰置社景侯解曰今之里社是也景侯解祭法則以置社為人間之社矣而別論復以太社為人間之社未曉此旨也太社天子為百姓而祀故稱天子社郊特牲曰天子太社必受霜露風雨以羣姓之衆王者通為立社故稱太社也若夫置社其數不一蓋以里所為名左氏傳盟于清丘之社是也衆庶之社既已不稱太矣若復不立之京都當安所立乎祭法又曰王為羣姓立七祀王自為立七祀言自為者自為而祀也為羣姓者為羣姓而祀也太社與七祀其文正等説者窮此因云墳籍但有五祀無七祀也案祭五祀國之大祀七者小祀周禮所云祭凡小祀則墨冕之屬也景侯解大厲曰如周杜伯鬼有所歸乃不為厲今云無二社者稱景侯祭法不謂無二則曰口傳無其文也夫以景侯之明擬議而後為解而欲以口論除明文如此非但二社當見思惟景侯之後解亦未易除也前被敕尚書召誥乃社于新邑惟一太牢不二社之明義也案郊特牲曰社稷太牢必援一牢之文以明社之無二則稷無牲矣説者曰舉社則稷可知苟可舉社以明稷何獨不舉一以明二國之大事在祀與戎若有二而除之不若過而存之況存之有義而除之無據乎周禮封人掌設社壝無稷字今帝社無稷蓋出於此然國主社稷故經傳動稱社稷周禮王祭社稷則絺冕此王社有稷之文也封人所掌社壝之無稷字説者以為略文從可知也謂宜仍舊立二社而加立帝社之稷時成粲議稱景侯論太社不立京都欲破鄭氏學咸重表以為如粲之論景侯之解文以此壞大雅云乃立冢土毛公解曰冢土大社也景侯解詩即用此説禹貢惟土五色景侯解曰王者取五色土為太社封四方諸侯各割其方色土者覆四方也如此太社復為立京都也不知此論何從而出而與解乖上違經記明文下壞景侯之解臣雖頑蔽少長學門不能默已謹復續上劉實與咸議同詔曰社實一神而相襲二位衆議不同何必改作其便仍舊一如魏制其後摯虞奏以為臣案祭法王為羣姓立社曰太社王自為立社曰王社周禮大司徒設其社稷之壝又曰以血祭祭社稷則太社也又曰封人掌設王之社壝又有軍旅宜乎社則王社也太社為羣姓祈報祈報有時主不可廢故凡祓社釁鼓主奉以從是也此皆二社之明文前代之所尊以尚書召誥社于新邑三牲各文詩稱乃立冢土無兩社之文故廢帝社惟立太社詩書所稱各指一事又皆在公旦制作之前未可以易周禮之明典祭法之正義前改建廟社營一社之處朝議斐然執古匡今世祖武皇帝躬發明詔定二社之義以為永制宜定新禮從二社詔從之至元帝建武元年又依洛京立二社一稷其太社之祝曰地德普施惠存無疆乃建太社保祐萬邦悠悠四海咸賴嘉祥其帝社之祝曰坤德厚載邦畿是保乃建帝社以神地道明祀惟辰景福來造漢儀每月旦太史上其月曆有司侍郎尚書見讀其令奉行其正朔前後二日牽牛酒至社下以祭日日有變割羊以祠社用救日變執事者長冠衣絳領袖緣中衣絳袴襪以行禮如故事自晉受命日月將交會太史乃上合朔尚書先事三日宣攝內外戒嚴摯虞決疑曰凡救日蝕者著赤幘以助陽也日將蝕天子素服避正殿內外嚴警太史登靈臺伺候日變便伐鼓於門聞鼓音侍臣皆著赤幘帶劍入侍三臺令史以上皆各持劍立其戶前衛尉卿驅馳繞宮伺察守備周而復始亦伐鼓於社用周禮也又以赤絲為繩以繫社祝史陳辭以責之社勾龍之神天子之上公故陳辭以責之日復常乃罷漢建安中將正會而太史上言正旦當日蝕朝士疑會否共咨尚書令荀彧時廣平計吏劉邵在坐曰梓慎裨竈古之良史猶占水火錯失天時禮諸侯旅見天子入門不得終禮者四日蝕在一然則聖人垂制不為變異豫廢朝禮者或災消異伏或推術謬誤也彧及衆人咸善而從之遂朝會如舊日亦不蝕邵由此顯名至武帝咸寧三年四年並以正旦合朔却元會改魏故事也元帝太興元年四月合朔中書侍郎孔愈奏曰春秋日有蝕之天子伐鼓于社攻諸陰也諸侯伐鼓于朝臣自攻也案尚書符若日有變便擊鼓于諸門有違舊典詔曰所陳有正義輒敕外改之至康帝建元元年太史上元日合朔後復疑應却會與否庾冰輔政寫劉邵議以示八坐于時有謂邵為不得禮意荀彧從之是勝人之一失故蔡謨遂著議非之曰邵論災消異伏又以梓慎裨竈猶有錯失太史上言亦不必審其理誠然也而云聖人垂制不為變異豫廢朝禮此則謬矣災祥之發所以譴告人君王者之所重誡故素服廢樂退避正寢百官降物用幣伐鼓躬親而救之夫敬誡之事與其疑而廢之寧慎而行之故孔子老聃助葬於巷黨以喪不見星而行故日蝕而止柩曰安知其不見星也而邵廢之是棄聖賢之成規也魯桓公壬申有災而以乙亥嘗祭春秋譏之災事既過猶追懼未已故廢宗廟之祭況聞天眚將至行慶樂之會於禮乖矣禮記所云諸侯入門不得終禮者謂日官不豫言諸侯既入見蝕乃知耳非先聞當蝕而朝會不廢也引此可謂失其義旨劉邵所執者禮記也夫子老聃巷黨之事亦禮記所言復違而反之進退無據然荀令所善漢朝所從遂使此言至今見稱莫知其誤矣後來君子將擬以為式故正之云爾於是冰從衆議遂以却會至永和中殷浩輔政又欲從劉邵議不却會王彪之據咸寧建元故事又曰禮云諸侯旅見天子不得終禮而廢者四自謂卒暴有之非為先存其事而僥幸史官推術繆錯故不豫廢朝禮也於是又從彪之議尚書禋于六宗諸儒互説往往不同王莽以易六子遂立六宗祠魏明帝時疑其事以問王肅亦以為易六子故不廢及晉受命司馬彪等表六宗之祀不應特立新禮於是遂罷其祀其後摯虞奏之又以為案舜受終類于上帝禋于六宗望于山川則六宗非上帝之神又非山川之靈也周禮肆師職曰用牲于社宗黨正職曰春秋祭禜亦如之肆師之宗與社並列則班與社同也黨正之禜文不繫社則神與社異也周之命祀莫重郊社宗同於社則貴神明矣又月令孟冬祈于天宗則周禮祭禜月令天宗六宗之神也漢光武即位高邑依虞書禋于六宗安帝元初中立祀乾位禮同太社魏氏因之至景初二年大議其神朝士紛紜各有所執惟散騎常侍劉邵以為萬物負陰而抱陽沖氣以為和六宗者太極沖和之氣為六氣之宗者也虞書謂之六宗周書謂之天宗是時考論異同而從其議漢魏相仍著為貴祀凡崇祀百神放而不至有其興之則莫敢廢之宜定新禮祀六宗如舊詔從之禮王為羣姓立七祀曰司命中霤國門國行大厲戶竈仲春玄鳥至之日以太牢祀高禖毛詩絲衣篇高子曰靈星之尸漢興高帝亦立靈星祠及武帝以李少君故始祠竈及生戾太子始立高禖漢儀云國家亦有五祀有司行事其禮頗輕於社稷則亦存其典矣又云常以仲春之月立高禖祠于城南祀以特牲又是月也祠老人星于國都南郊老人星廟立夏祭竈季秋祠心星于城南壇心星廟元康時洛陽猶有高禖壇百姓祠其旁或謂之落星是後諸祀無聞江左以來不立七祀靈星則配饗南郊不復特置焉左氏傳龍見而雩經典尚矣漢儀自立春至立夏盡立秋郡國尚旱郡縣各掃除社稷其旱也公卿官長以次行雩禮求雨閉諸陽衣皂興土龍立土人舞僮二佾七日一變如故事武帝咸寧二年春久旱四月丁巳詔曰諸旱處廣加祈請五月庚午始祈雨于社稷山川六月戊子獲澍雨此雩之舊典也太康三年四月十年二月又如之其雨多則禜祭赤幘朱衣閉諸陰朱索縈社伐朱鼓焉周禮王者祭昊天上帝日月星辰司中司命風伯雨師社稷五土五嶽山林川澤四方百物兆四類四望亦如之魏文帝黃初二年六月庚子初禮五嶽四瀆咸秩羣祀瘞沈圭璧六年七月帝以舟軍入淮九月壬戌遣使者沈璧于淮魏明帝太和四年八月帝東巡遣使者以特牛祠中嶽魏元帝咸熙元年行幸長安使使者以璧幣禮祠華山及穆帝升平中何琦論修五嶽祠曰唐虞之制天子五載一巡狩順時之方柴燎五嶽望于山川遍于羣神故曰因名山升中于天所以昭告神祇饗報功德是以災厲不作而風雨寒暑以時降及三代年數雖殊而其禮不易五嶽視三公四瀆視諸侯著在經記所謂有其舉之莫敢廢也及秦漢都西京涇渭長水雖不在祀典以近咸陽故盡得比大川之祠而正立之祀可以闕哉自永嘉之亂神州傾覆茲事替矣惟灊之天柱在王略之內也舊臺選百戶吏卒以奉其職中興之際未有官守廬江郡常遣大吏兼假四時禱賽春釋寒而冬請冰咸和迄今又復隳替計今非典之祠可謂非一考其正名則淫昏之鬼推其糜費則百姓之蠹而山川大神更為簡缺禮俗穨紊人神雜擾公私奔蹙漸以繁滋良由頃國家多難日不暇給草建廢滯事有未遑今元憝已殲宜修舊典嶽瀆之域風教所被來蘇之衆咸蒙德澤而神明禋祀未之或甄巡狩柴燎其廢尚矣崇明前典將俟皇輿北旋稽古憲章大釐制度俎豆牲牢祝嘏文辭舊章靡記可令禮官作式歸諸誠簡以達明德馨香如斯而已其諸祅孽可粗依法令先去其甚俾邪正不黷時不見省昔武王入殷未及下車而封先代之後蓋追思其德也孔子以大聖而終於陪臣未有封爵至漢元帝孔霸以帝師賜爵號褒成君奉孔子後魏文帝黃初二年正月詔以議郎孔羡為宗聖侯邑百戶奉孔子祀令魯郡修舊廟置百戶吏卒以守衛之及武帝泰始三年十一月改封宗聖侯孔震為奉聖亭侯又詔太學及魯國四時備三牲以祀孔子明帝太寧三年詔給奉聖亭侯孔亭四時祠孔子祭直如泰始故事禮始立學必先釋奠于先聖先師及行事必用幣漢世雖立學斯禮無聞魏齊王正始二年二月帝講論語通五年五月講尚書通七年十二月講禮記通並使太常釋奠以太牢祠孔子於辟雍以顏回配武帝泰始七年皇太子講孝經通咸寧三年講詩通太康三年講禮記通惠帝元康三年皇太子講論語通元帝太興二年皇太子講論語通太子並親釋奠以太牢祠孔子以顏回配成帝咸康元年帝講詩通穆帝升平元年三月帝講孝經通孝武寧康三年七月帝講孝經通並釋奠如故事穆帝孝武並權以中堂為太學故事祀臯陶於廷尉寺新禮移祀於律署以同祭先聖於太學也故事祀以社日新禮改以孟秋之月以應秋政摯虞以為案虞書臯陶作士師惟明克允國重其功人思其當是以獄官禮其神繫者致其祭功在斷獄之成不在律令之始也太學之設義重太常故祭于太學是崇聖而從重也律署之置卑於廷尉移祀於署是去重而就輕也律非正署廢興無常宜如舊祀於廷尉又祭用仲春義取重生改用孟秋以應刑殺理未足以相易宜定新禮皆如舊制可歲旦常設葦茭桃梗磔雞於宮及百寺之門以禳惡氣案漢儀則仲夏設之有桃印無磔雞及魏明帝大修禳禮故何晏禳祭議雞特牲供禳釁之事磔雞宜起於魏桃印本漢制所以輔卯金又宜魏所除也但未詳改仲夏在歲旦之所起耳魏明帝青龍元年詔郡國山川不在祀典者勿祠武帝泰始元年十二月詔曰昔聖帝明王修五嶽四瀆名山川澤各有定制所以報陰陽之功故也然以道蒞天下者其鬼不神其神不傷人故祝史薦而無愧辭是以其人敬慎幽冥而淫祀不作末世信道不篤僭禮瀆神縱欲祈請曾不敬而遠之徒偷以求幸祅妄相煽舍正為邪故魏朝疾之其案舊禮具為之制使功著於人者必有其報而祅淫之鬼不亂其間二年正月有司奏春分祠厲殃及禳祠詔曰不在祀典除之王制天子七廟諸侯以下各有等差禮文詳矣漢獻帝建安十八年五月以河北十郡封魏武帝為魏公是年七月始建宗廟于鄴自以諸侯禮立五廟也後雖進爵為王無所改易延康元年文帝繼王位七月追尊皇祖為大王丁夫人曰大王后黃初元年十一月受禪又追尊大王曰大皇帝皇考武王曰武皇帝二年六月以洛京宗廟未成乃祠武帝於建始殿親執饋奠如家人禮案禮將營宮室宗廟為先庶人無廟故祭於寢帝者行之非禮甚矣明帝太和三年六月又追尊高祖大長秋曰高皇夫人吳氏曰高皇后並在鄴廟廟所祠則文帝之高祖處士曾祖高皇祖大皇帝共一廟考太祖武皇帝特一廟百世不毀然則所祠止於親廟四室也其年十一月洛京廟成則以親盡遷處士主置園邑使行太傅太常韓暨行太常宗正曹恪持節迎高皇以下神主共一廟猶為四室而已至景初元年六月羣公有司始更奏定七廟之制曰大魏三聖相承以成帝業武皇帝肇建洪基撥亂夷險為魏太祖文皇帝繼天革命應期受禪為魏高祖上集成大命清定華夏興制禮樂宜為魏烈祖於太祖廟北為二祧其左為文帝廟號曰高祖昭祧其右擬明帝號曰烈祖穆祧三祖之廟萬世不毀其餘四廟親盡迭遷一如周后稷文武廟祧之禮文帝甄后賜死故不列廟明帝即位有司奏請追諡曰文昭皇后使司空王朗持節奉策告祠于陵三公又奏曰自古周人歸祖后稷又特立廟以祀薑嫄今文昭皇后之於後嗣聖德至化豈有量哉夫以皇家世妃之尊神靈遷化而無寢廟以承享祀非以報顯德昭孝敬也稽之古制宜依周禮別立寢廟奏可太和元年二月立廟于鄴四月洛邑初營宗廟掘地得玉璽方一寸九分其文曰天子羡思慈親明帝為之改容以太牢告廟至景初元年十二月己未有司又奏文昭皇后立廟京師永傳享祀樂舞與祖廟同廢鄴廟魏元帝咸熙元年進文帝爵為王追命舞陽宣文侯為宣王忠武侯為景王是年八月文帝崩諡曰文王武帝泰始元年十二月丙寅受禪丁卯追尊皇祖宣王為宣皇帝伯考景王為景皇帝考文王為文皇帝宣王妃張氏為宣穆皇后景王夫人羊氏為景皇后二年正月有司奏置七廟帝重其役詔宜權立一廟於是羣臣議奏上古清廟一宮尊遠神祇逮至周室制為七廟以辨宗祧聖旨深弘遠迹上世敦崇唐虞舍七廟之繁華遵一宮之遠旨昔舜承堯禪受終文祖遂陟帝位蓋三十載月正元日又格于文祖遂陟帝位此則虞氏不改唐廟因仍舊宮可依有虞氏故事即用魏廟奏可於是追祭征西將軍豫章府君潁川府君京兆府君與宣皇帝景皇帝文皇帝為三昭三穆是時宣皇未升太祖虛位所以祠六世與景帝為七廟其禮則據王肅説也七月又詔曰主者前奏就魏舊廟誠亦有準然於祗奉神明情猶未安宜更營造於是改創宗廟十一月追尊景帝夫人夏侯氏為景懷皇后任茂議以為夏侯初嬪之時未有王業帝不從太康元年靈壽公主修麗祔于太廟周漢未有其準魏明帝則別立平原主廟晉又異魏也六年因廟陷當改修創羣臣又議奏曰古者七廟異所自宜如禮詔又曰古雖七廟自近代以來皆一廟七室於禮無廢於情為亦隨時之宜也其便仍舊至十年乃更改築於宣陽門內窮極壯麗然坎位之制猶如初爾廟成帝用摯虞議率百官遷神主于新廟自征西以下車服導從皆如帝者之儀及武帝崩則遷征西及惠帝崩又遷豫章而惠帝世愍懷太子太子二子哀太孫臧沖太孫尚並祔廟元帝世懷帝殤太子又祔廟號為陰室四殤懷帝初又策諡武帝楊后曰武悼皇后改葬峻陽陵側別祠弘訓宮不列於廟元帝既即尊位上繼武帝於元為禰如漢光武上繼元帝故事也是時西京神主堙滅虜庭江左建廟皆更新造尋以登懷帝之主又遷潁川位雖七室其實五世蓋從刁協以兄弟為世數故也于時百度草創舊禮未備毀主權居別室至太興三年正月乙卯詔曰吾雖上繼世祖然於懷愍皇帝皆北面稱臣今祠太廟不親執觴酌而令有司行事於情禮不安可依禮更處太常議今聖上繼武皇帝宜準漢世祖故事不親執觴爵又曰今上承繼武帝而廟之昭穆四世而已前太常賀循博士傅純並以為惠懷及愍宜別立廟然臣愚謂廟室當以容主為限無拘常數殷世有二祖三宗若拘七室則當祭禰而已推此論之宜還復豫章潁川全祠七廟之禮驃騎長史溫嶠議凡言兄弟不相入廟既非禮文且光武奮劍振起不策名於孝平務神其事以應九世之讖又古不共廟故別立焉今上以策名而言殊於光武之事躬奉蒸嘗於經既正於情又安矣太常恆欲還二府君以全七世嶠謂是宜驃騎將軍王導從嶠議嶠又曰其非子者可直言皇帝敢告某皇帝又若以一帝為一世則不祭禰反不及庶人帝從嶠議悉施用之於是乃更定制還復豫章潁川于昭穆之位以同惠帝嗣武故事而惠懷愍三帝自從春秋尊尊之義在廟不替也及元帝崩則豫章復遷然元帝神位猶在愍帝之下故有坎室者十也至明帝崩而潁川又遷猶十室也于時續廣太廟故三遷主並還西儲名之曰祧以準遠廟成帝咸康七年五月始作武悼皇后神主祔于廟配饗世祖成帝崩而康帝承統以兄弟一世故不遷京兆始十一室也至康帝崩穆帝立永和二年七月有司奏十月殷祭京兆府君當遷祧室昔征西豫章潁川三府君毀主中興之初權居天府在廟門之西咸康中太常馮懷表續奉還於西儲夾室謂之為祧疑亦非禮今京兆遷入是為四世遠祖長在太祖之上昔周室太祖世遠故遷有所歸今晉廟宣皇為主而四祖居之是屈祖就孫也殷祫在上是代太祖也領司徒蔡謨議四府君宜改築別室若未展者當入就太廟之室人莫敢卑其祖文武不先不窋殷祭之日征西東面處宣皇之上其後遷廟之主藏於征西之祧祭薦不絶護軍將軍馮懷議禮無廟者為壇以祭可立別室藏之至殷禘則祭于壇也輔國將軍譙王司馬無忌等議諸儒謂太王王季遷主藏於文武之祧如此府君遷主宜在宣帝廟中然今無寢室宜變通而改築又殷祫太廟征西東面尚書郎孫綽與無忌議同曰太祖雖位始九五而道以從暢替人爵之尊篤天倫之道所以成教本而光百代也尚書郎徐禪議禮去祧為壇去壇為墠歲祫則祭之今四祖遷主可藏之石室有禱則祭於壇墠又遣禪至會稽訪處士虞喜喜答曰漢世韋玄成等以毀主瘞於園魏朝議者云應埋兩階之間且神主本在太廟若今別室而祭則不如永藏又四君無追號之禮益明應毀而無祭是時簡文為撫軍與尚書郎劉邵等奏四祖同居西祧藏主石室禘祫乃祭如先朝舊儀時陳留范宣兄子問此禮宣答曰舜廟所祭皆是庶人其後世遠而毀不居舜上不序昭穆今四君號猶依本非以功德致祀也若依虞主之瘞則猶藏子孫之所若依夏主之埋則又非本廟之階宜思其變則築一室親未盡則禘祫處宣帝之上親盡則無緣下就子孫之列其後太常劉遐等同蔡謨議博士張憑議或疑陳於太祖者皆其後之毀主憑案古義無別前後之文也禹不先鯀則遷主居太祖之上亦何疑也於是京兆遷入西儲同謂之祧如前三祖遷主之禮故正室猶十一也穆帝崩而哀帝海西並為兄弟無所登除咸安之初簡文皇帝上繼元皇世秩登進於是潁川京兆二主復還昭穆之位至簡文崩潁川又遷孝武帝太元十二年五月壬戌詔曰昔建太廟每事從儉太祖虛位明堂未建郊祀國之大事而稽古之制闕然便可詳議祠部郎中徐邈議圓丘郊祀經典無二宣皇帝嘗辨斯義而檢以聖典爰及中興備加研極以定南北二郊誠非異學所可輕改也謂仍舊為安武皇帝建廟六世祖三昭三穆宣皇帝創基之主實惟太祖親則王考四廟在上未及遷世故權虛東向之位也兄弟相及義非二世故當今廟祀世數未足而欲太祖正位則違事七之義矣又禮曰庶子王亦禘祖立廟蓋謂支胤援立則親近必復京兆府君於今六世宜復立此室則宣皇未在六世之上須前世既遷乃太祖位定耳京兆遷毀宜藏主於石室雖禘祫猶弗及何者傳稱毀主升合乎太祖升者自下之名不謂可降尊就卑也太子太孫陰室四主儲嗣之重升祔皇祖所配之廟世遠應遷然後從食之孫與之俱毀明堂方圓之制綱領已舉不宜闕配帝之祀且王者以天下為家未必一邦故周平光武無廢於二京也明堂所配之神積疑莫辨案易殷薦上帝以配祖考祖考同配則上帝亦為天而嚴父之義顯周禮旅上帝者有故告天與郊祀常禮同用四圭故並言之若上帝是五帝經文何不言祀天旅五帝祀地旅四望乎侍中車胤議同又曰明堂之制既其難詳且樂主於和禮主於敬故質文不同音器亦殊既茅茨廣夏不一其度何必守其形範而不弘本從俗乎九服咸寧河朔無塵然後明堂辟雍可崇而修之時朝議多同於是奉行一無所改十六年始改作太廟殿正室十四間東西儲各一間合十六間棟高八丈四尺備法駕遷神主于行廟征西至京兆四主及太子太孫各用其位之儀服四主不從帝者之儀是與太康異也諸主既入廟設脯醢之奠及新廟成神主還室又設脯醢之奠十九年二月追尊簡文母會稽太妃鄭氏為簡文皇帝宣太后立廟太廟道西及孝武崩京兆又遷如穆帝之世四祧故事義熙九年四月將殷祠詔博議遷毀之禮大司馬琅邪王德文議泰始之初虛太祖之位而緣情流遠上及征西故世盡則宜毀而宣帝正太祖之位又漢光武移十一帝主於洛邑則毀主不設理可推矣宜築別室以居四府君之主永藏而弗祀也大司農徐廣議四府君嘗處廟堂之首歆率土之祭若埋之幽壤於情理未必咸盡謂可遷藏西儲以為遠祧而禘饗永絶也太尉咨議參軍袁豹議仍舊無革殷祠猶及四府君情理為允時劉裕作輔意與大司馬議同須後殷祠行事改制會安帝崩未及禘而天祿終焉武帝咸寧五年十一月己酉弘訓羊太后崩宗廟廢一時之祀天地明堂去樂且不上胙穆帝升平五年十一月己卯殷祀以帝崩後不作樂孝武太元十一年九月皇女亡及應蒸祠中書侍郎范奏案喪服傳有死宮中者三月不舉祭不別長幼之與貴賤也皇女雖在嬰孩臣竊以為疑於是尚書奏使三公行事武帝泰始七年四月帝將親祠車駕夕牲而儀注還不拜詔問其故博士奏歷代相承如此帝曰非致敬宗廟之禮也於是實拜而還遂以為制夕牲必躬臨拜而江左以來復止魏故事天子為次殿於廟殿之北東天子入自北門新禮設次殿於南門中門外之右天子入自南門摯虞以為次殿所以為解息之處凡適尊以不顯為恭以由隱為順而設之於上位入自南門非謙厭之義宜定新禮皆如舊説從之禮大事則告祖禰小事則特告禰秦漢久廢魏文帝黃初四年七月將東巡以大軍當出使太常以特牛告南郊及文帝崩又使太尉告諡策於南郊自是迄晉相承告郊之後仍以告廟至江左其禮廢至成帝咸和三年蘇峻覆亂京都溫嶠等立行廟於白石復行其典告先君及后曰逆臣蘇峻傾覆社稷毀棄三正樜辱海內臣侃臣嶠臣亮等手刃戎首龔行天罰惟中宗元皇帝肅祖明皇帝明穆皇后之靈降鑒有罪剿絶其命翦此羣凶以安宗廟臣等雖隕首摧軀猶生之年魏明帝太和三年詔曰禮王后無嗣擇建支子以繼大宗則當纂正統而奉公義何得復顧私親哉漢宣繼昭帝後加悼考以皇號哀帝以外藩援立而董宏等稱引亡秦惑誤朝議遂尊恭皇立廟京師又寵藩妾使比長信僭差無禮人神弗佑非罪師丹忠正之諫用致丁傅焚如之禍自是之後相踵行之其令公卿有司深以前世為戒後嗣萬一有由諸侯入奉大統則當明為人後之義敢為佞邪導諛君上妄建非正之號謂考為皇稱妣為后則股肱大臣誅之無赦其書之金策藏之宗廟是後高貴常道援立皆不外尊及愍帝建興四年司徒梁芬議追尊之禮帝既不從而左僕射索綝等亦稱引魏制以為不可故追贈吳王為太保而已元帝太興二年有司言琅邪恭王宜稱皇考賀循議云禮典之義子不敢以己爵加其父號帝又從之
