body:
  text: 晉書卷一百二十四載記第二十四慕容寶容寶字道祐垂之第四子也少輕果無志操好人佞己苻堅時為太子洗馬萬年令堅淮肥之役以寶為陵江將軍及為太子砥礪自修敦崇儒學工談論善屬文曲事垂左右小臣以求美譽垂之朝士翕然稱之垂亦以為克保家業甚賢之垂死其年寶嗣偽位大赦境內改元為永康以其太尉庫辱官偉為太師左光祿大夫段崇為太保其餘拜授各有差遵垂遺令校閲戶口罷諸軍營分屬郡縣定士族舊籍明其官儀而法峻政嚴上下離德百姓思亂者十室而九焉初垂以寶冢嗣未建每憂之寶庶子清河公會多材藝有雄略垂深奇之及寶之北伐使會代攝宮事總録禮遇一同太子所以見定旨也垂之伐魏以龍城舊都宗廟所在復使會鎮幽州委以東北之重高選僚屬以崇威望臨死顧命以會為寶嗣而寶寵愛少子濮陽公策意不在會寶庶長子長樂公盛自以同生年長恥會先之乃盛稱策宜為儲二而非毀會焉寶大悅乃訪其趙王麟高陽王隆麟等咸希旨贊成之寶遂與麟等定計立策母段氏為皇后策為皇太子盛會進爵為王策字道符年十一美姿貌而蠢弱不慧魏伐并州驃騎農逆戰敗績還于晉陽司馬慕輿嵩閉門距之農率騎數千奔歸中山行及潞川為魏追軍所及餘騎盡沒單馬遁還寶引羣臣于東堂議之中山尹苻謨曰魏軍強盛千里轉鬬乘勝而來勇氣兼倍若逸騎平原形勢彌盛殆難為敵宜度險距之中書令眭邃曰魏軍多騎師行剽鋭馬上齎糧不過旬日宜令郡縣聚千家為一堡深溝高壘清野待之至無所掠資食無出不過六旬自然窮退尚書封懿曰今魏師十萬天下之勍敵也百姓雖欲營聚不足自固是則聚糧集兵以資強寇且動衆心示之以弱阻關距戰計之上也慕容麟曰魏今乘勝氣鋭其鋒不可當宜自完守設備待其弊而乘之於是修城積粟為持久之備魏攻中山不克進據博陵魯口諸將望風奔退郡縣悉降于魏寶聞魏有內難乃盡衆出距步卒十二萬騎三萬七千次于曲陽柏肆魏軍進至新梁寶憚魏師之鋭乃遣征北隆夜襲魏軍敗績而還魏軍方軌而至對營相持上下凶懼三軍奪氣農麟勸寶還中山乃引歸魏軍追擊之寶農等棄大軍率騎二萬奔還時大風雪凍死者相枕于道寶恐為魏軍所及命去袍杖戎器寸刃無返魏軍進攻中山屯于芳林園其夜尚書慕容晧謀殺寶立慕容麟晧妻兄蘇泥告之寶使慕容隆收晧晧與同謀數十人斬關奔魏麟懼不自安以兵劫左衛將軍北地王精謀率禁旅弒寶精以義距之麟怒殺精出奔丁零初寶聞魏之來伐也使慕容會率幽并之衆赴中山麟既叛寶恐其逆奪會軍將遣兵迎之麟侍郎段平子自丁零奔還説麟招集丁零軍衆甚盛謀襲會軍東據龍城寶與其太子策及農隆等萬餘騎迎會于薊以開封公慕容詳守中山會傾身誘納繕甲厲兵步騎二萬列陳而進迎寶薊南寶分其兵給農隆遣西河公庫辱官驥率衆三千助守中山會以策為太子有恨色寶以告農隆俱曰會一年少專任方事習驕所致豈有他也臣當以禮責之幽平之士皆懷會威德不樂去之咸請曰清河王天資神武權略過人臣等與之誓同生死感王恩澤皆勇氣自倍願陛下與皇太子諸王止駕薊宮使王統臣等進解京師之圍然後奉迎車駕寶左右皆害其勇略譖而不許衆咸有怨言左右勸寶殺會侍御史仇尼歸聞而告會曰左右密謀如是主上將從之大王所恃唯父母也父已異圖所杖者兵也兵已去手進退路窮恐無自全之理盍誅二王廢太子大王自處東宮兼領將相以匡社稷會不從寶謂農隆曰觀會為變事當必然宜早殺之不爾恐成大禍農曰寇賊內侮中州紛亂會鎮撫舊都安衆寧境及京師有難萬里星赴威名之重可以振服戎狄又逆迹未彰宜且隱忍今社稷之危若綴旒然復內相誅戮有損威望寶曰會逆心已成而王等仁慈不欲去之恐一旦釁發必先害諸父然後及吾事敗之後當思朕言農等固諫乃止會聞之彌懼奔于廣都黃榆谷會遣仇尼歸等率壯士二十餘人分襲農隆隆是夜見殺農中重創既而會歸于寶寶意在誅會誘而安之潛使左衛慕輿騰斬會不能傷會復奔其衆於是勒兵攻寶寶率數百騎馳如龍城會率衆追之遣使請誅左右佞臣并求太子寶弗許會圍龍城侍御郎高雲夜率敢死士百餘人襲會敗之衆悉逃散單馬奔還中山乃踰圍而入為慕容詳所殺詳僭稱尊號置百官改年號荒酒奢淫殺戮無度誅其王公以下五百餘人內外震局莫敢忤視城中大飢公卿餓死者數十人麟率丁零之衆入中山斬詳及其親黨三百餘人復僭稱尊號中山飢甚麟出據新市與魏師戰於義臺麟軍敗績魏師遂入中山麟乃奔鄴慕容德遣侍郎李延勸寶南伐寶大悅慕容盛切諫以為兵疲師老魏新平中原宜養兵觀釁更俟他年寶將從之撫軍慕輿騰進曰今衆旅已集宜乘新定之機以成進取之功人可使由之而難與圖始惟當獨決聖慮不足廣採異同以沮亂軍議也寶曰吾計決矣敢諫者斬寶發龍城以慕輿騰為前軍大司馬慕容農為中軍寶為後軍步騎三萬次于乙連長上段速骨宋赤眉因衆軍之憚役也殺司空樂浪王宙逼立高陽王崇寶單騎奔農仍引軍討速骨衆咸憚征幸亂投杖奔之騰衆亦潰寶農馳還龍城蘭汗潛與速骨通謀速骨進師攻城農為蘭汗所譎潛出赴賊為速骨所殺衆皆奔散寶與慕容盛慕輿騰等南奔蘭汗奉太子策承制遣使迎寶及子薊城寶欲還北盛等咸以汗之忠款虛實未明今單馬而還汗有二志者悔之無及寶從之乃自薊而南至黎陽聞慕容德稱制懼而退遣慕輿騰招集散兵于巨鹿慕容盛結豪桀于冀州段儀段溫收部曲于內黃衆皆響會剋期將集會蘭汗遣左將軍蘇超迎寶寶以汗垂之季舅盛又汗之壻也必謂忠款無二乃還至龍城汗引寶入于外邸弒之時年四十四在位三年即隆安三年也汗又殺其太子策及王公卿士百餘人汗自稱大都督大將軍大單于昌黎王盛僭位偽諡寶惠愍皇帝廟號烈宗皓之遷于龍城也植松為社主及秦滅燕大風吹拔之後數年社處忽有桑二根生焉先是遼川無桑及廆通于晉求種江南平州桑悉由吳來廆終而垂以吳王中興寶之將敗大風又拔其一慕容盛盛字道運寶之庶長子也少沈敏多謀略苻堅誅慕容氏盛潛奔于沖及沖稱尊號有自得之志賞罰不均政令不明盛年十二謂叔父柔曰今中山王智不先衆才不出下恩未施人先自驕大以盛觀之鮮不覆敗俄而沖為段木延所殺盛隨慕容永東如長子謂柔曰今崎嶇於鋒刃之間在疑忌之際愚則為人所猜智則危甚巢幕當如鴻鵠高飛一舉萬里不可坐待罟網也於是與柔及弟會間行東歸于慕容垂遇盜陜中盛曰我六尺之軀入水不溺在火不焦汝欲當吾鋒乎試豎爾手中箭百步我若中之宜慎爾命如其不中當束身相授盜乃豎箭盛一發中之盜曰郎貴人之子故相試耳資而遣之歲餘永誅俊垂之子孫男女無遺盛既至垂問以西事畫地成圖垂笑曰昔魏武撫明帝之首遂乃侯之祖之愛孫有自來矣於是封長樂公驍勇剛毅有伯父全之風烈寶即偽位進爵為王寶自龍城南伐盛留統後事及段速骨作亂馳出迎衛幾為速骨所獲賴盛以免盛屢進奇策於寶寶不能從是以屢敗寶既如龍城盛留在後寶為蘭汗所殺盛馳進赴哀將軍張真固諫以為不可盛曰我今投命告以哀窮汗性愚近必顧念婚姻不忍害我旬月之間足展吾志遂入赴喪汗妻乙氏泣涕請盛汗亦哀之遣其子穆迎盛舍之宮內親敬如舊汗兄提弟難勸汗殺盛汗不從慕容奇汗之外孫也汗亦宥之奇入見盛遂相與謀盛遣奇起兵于外衆至數千汗遣蘭提討奇提驕很淫荒事汗無禮盛因間之於汗曰奇小兒也未能辦此必內有應之者提素驕不可委以大衆汗因發怒收提誅之遣其撫軍仇尼慕率衆討奇汗兄弟見提之誅莫不危懼皆阻兵背汗襲敗慕軍汗大懼遣其子穆率衆討之穆謂汗曰慕容盛我之仇也奇今起逆盛必應之兼內有蕭牆之難不宜養心腹之疾汗將誅盛引見察之盛妻以告於是偽稱疾篤不復出入汗乃止有李旱衛雙劉志張豪張真者皆盛之舊昵蘭穆引為腹心旱等屢入見盛潛結大謀會穆討蘭難等斬之大饗將士汗穆皆醉盛夜因如廁袒而踰牆入于東宮與李旱等誅穆衆皆踴呼進攻汗斬之汗二子魯公和陳公楊分屯令支白狼遣李旱張真襲誅之於是內外怗然士女咸悅盛謙揖自卑不稱尊號其年以長樂王稱制赦其境內改元曰建平諸王降爵為公文武各復舊位初慕容奇聚衆于建安將討蘭汗百姓翕然從之汗遣兄子全討奇奇擊滅之進屯乙連盛既誅汗命奇罷兵奇遂與丁零嚴生烏丸王龍之阻兵叛盛引軍至橫溝去龍城十里盛出兵擊敗之執奇而還斬龍生等百餘人盛於是僭即尊位大赦殊死已下追尊伯考獻莊太子全為獻莊皇帝尊寶后段氏為皇太后全妃丁氏為獻莊皇后諡太子策為獻哀太子盛幽州刺史慕容豪尚書左僕射張通昌黎尹張順謀叛盛皆誅之改年為長樂有犯罪者十日一自決之無撾捶之罰而獄情多實高句驪王安遣使貢方物有雀素身緑首集于端門栖翔東園二旬而去改東園為白雀園盛聽詩歌及周公之事顧謂羣臣曰周公之輔成王不能以至誠感上下誅兄弟以杜流言猶擅美於經傳歌德於管絃至如我之太宰桓王承百王之季主在可奪之年二寇窺難過往日臨朝輔政羣情緝穆經略外敷闢境千里以禮讓維宗親德刑制羣后敦睦雍熙時無二論勳道之茂豈可與周公同日而言乎而燕詠闕而不論盛德掩而不述非所謂也乃命中書更為燕頌以述恪之功焉又引中書令常忠尚書陽璆祕書監郎敷于東堂問曰古來君子皆謂周公忠聖豈不謬哉璆曰周公居攝政之重而能達君臣之名及流言之謗致烈風以悟主道契神靈義光萬代故纍葉稱其高後王無以奪其美盛曰常令以為何如忠曰昔武王疾篤周公有請命之誠流言之際義感天地楚撻伯禽以訓就王德周公為臣之忠聖達之美詩書已來未之有也盛曰異哉二君之言朕見周公之詐未見其忠聖也昔武王得九齡之夢白文王文王曰我百爾九十吾與爾三焉及文王之終已驗武王之壽矣武王之算未盡而求代其死是非詐乎若惑于天命是不聖也據攝天位而丹誠不見致兄弟之間有干戈之事夫文王之化自近及遠故曰刑于寡妻至于兄弟周公親違聖父之典而蹈嫌疑之蹤戮罰同氣以逞私忿何忠之有乎但時無直筆之史後儒承其謬談故也忠曰啓金縢而返風亦足以明其不詐遭二叔流言之變而能大義滅親終安宗國復子明辟輔成大業以致太平制禮作樂流慶無窮亦不可謂非至德也盛曰卿徒因成文而未原大理朕今相為論之昔周自后稷積德纍仁至于文武文武以大聖應期遂有天下生靈仰其德四海歸其仁成王雖幼統洪業而卜世修長加呂召毛畢為之師傅若無周公攝政王道足以成也周公無故以安危為己任專臨朝之權闕北面之禮管蔡忠存王室以為周公代主非人臣之道故言公將不利於孺子周公當明大順之節陳誠義以曉羣疑而乃阻兵都邑擅行誅戮不臣之罪彰于海內方貽王鴟梟之詩歸非於主是何謂乎又周公舉事稱告二公二公足明周公之無罪而坐觀成王之疑此則二公之心亦有猜於周公也但以疏不間親故寄言於管蔡可謂忠不見於當時仁不及於兄弟知羣望之有歸天命之不在己然後返政成王以為忠耳大風拔木之徵乃皇天祐存周道不忘文武之德是以赦周公之始愆欲成周室之大美考周公之心原周公之行乃天下之罪人何至德之謂也周公復位二公所以杜口不言其本心者以明管蔡之忠也又謂常忠曰伊尹周公孰賢忠曰伊尹非有周公之親而功濟一代太甲亂德放於桐宮思愆改善然後復之使主無怨言臣無流謗道存社稷美溢來今臣謂伊尹之勳有高周旦盛曰伊尹以舊臣之重顯阿衡之任太甲嗣位君道未洽不能竭忠輔導而放黜桐宮事同夷羿何周公之可擬乎郎敷曰伊尹處人臣之位不能匡制其君恐成湯之道墜而莫就是以居之桐宮與小人從事使知稼穡之艱難然後返之天位此其忠也盛曰伊尹能廢而立之何不能輔之以至於善乎若太甲性同桀紂則三載之間未應便成賢后如其性本休明義心易發當務盡匡規之理以弼成君德安有人臣幽主而據其位哉且臣之事君惟力是視奈何挾智藏仁以成君惡夫太甲之事朕已鑒之矣太甲至賢之主也以伊尹歷奉三朝績無異稱將失顯祖委授之功故匿其日月之明受伊尹之黜所以濟其忠貞之美夫非常之人然後能立非常之事非常人之所見也亦猶太伯之三讓人無德而稱焉敷曰太伯三以天下讓至仲尼而後顯其至德太甲受謗於天下遭陛下乃申其美因而談宴賦詩賜金帛各有差遼西太守李朗在郡十年威制境內盛疑之纍徵不赴以母在龍城未敢顯叛乃陰引魏軍將為自安之計因表請發兵以距寇盛曰此必詐也召其使而詰之果驗盡滅其族遣輔國將軍李旱率騎討之師次建安召旱旋師朗聞其家被誅也擁三千餘戶以自固及聞旱中路而還謂有內變不復為備留其子養守令支躬迎魏師于北平旱候知之襲克令支遣廣威孟廣平率騎追朗及于無終斬之初盛之追旱還也羣臣莫知其故旱既斬朗盛謂羣臣曰前以追旱還者正為此耳朗新為叛逆必忌官威一則鳩合同類劫掠良善二則亡竄山澤未可卒平故非意而還以盈怠其志卒然掩之必克之理也羣臣皆曰非所及也李旱自遼西還聞盛殺其將衛雙懼棄軍奔走既而歸罪復其爵位盛謂侍中孫勍曰旱總三軍之任荷專征之重不能杖節死綏無故逃亡考之軍正不赦之罪也然當先帝之避難衆情離二骨肉忘其親股肱失忠節旱以刑餘之體效力盡命忠款之至精貫白日朕故録其忘身之功免其丘山之罪耳盛去皇帝之號稱庶人大王魏襲幽州執刺史盧溥而去遣孟廣平援之無及盛率衆三萬伐高句驪襲其新城南蘇皆克之散其積聚徙其五千餘戶于遼西盛引見百僚于東堂考詳器藝超拔者十有二人命百司舉文武之士才堪佐世者各一人立其子遼西公定為太子大赦殊死已下宴其羣臣于新昌殿盛曰諸卿各言其志朕將覽之七兵尚書丁信年十五盛之舅子也進曰在上不驕高而不危臣之願也盛笑曰丁尚書年少安得長者之言乎盛以威嚴馭下驕暴少親多所猜忌故信言及之盛討庫莫奚大虜獲而還左將軍慕容國與殿中將軍秦輿段讚等謀率禁兵襲盛事覺誅之死者五百餘人前將軍思悔侯段璣輿子興讚子泰等因衆心動搖夜於禁中鼓譟大呼盛聞變率左右出戰衆皆披潰俄而有一賊從暗中擊傷盛遂輦升前殿申約禁衛召叔父河間公熙屬以後事熙未至而盛死時年二十九在位三年偽諡昭武皇帝墓號興平陵廟號中宗盛幼而羇賤流漂長則遭家多難夷險安危備嘗之矣懲寶暗而不斷遂峻極威刑纖芥之嫌莫不裁之於未萌防之於未兆於是上下振局人不自安雖忠誠親戚亦皆離二舊臣靡不夷滅安忍無親所以卒于不免是歲隆安五年也慕容熙熙字道文垂之少子也初封河間王段速骨之難諸王多被其害熙素為高陽王崇所親愛故得免焉蘭汗之篡也以熙為遼東公備宗祀之義盛初即位降爵為公拜都督中外諸軍事驃騎大將軍尚書左僕射領中領軍從征高句驪契丹皆勇冠諸將盛曰叔父雄果英壯有世祖之風但弘略不如耳及盛死其太后丁氏以國多難宜立長君羣望皆在平原公元而丁氏意在於熙遂廢太子定迎熙入宮羣臣勸進熙以讓元元固以讓熙熙遂僭即尊位誅其大臣段璣秦興等並夷三族元以嫌疑賜死元字道光寶之第四子也赦殊死已下改元曰光始改北燕臺為大單于臺置左右輔位次尚書初熙蒸于丁氏故為所立及寵幸苻貴人丁氏怨恚呪詛與兄子七兵尚書信謀廢熙熙聞之大怒逼丁氏令自殺葬以后禮誅丁信熙狩于北原石城令高和殺司隸校尉張顯閉門距熙熙率騎馳返和衆皆投杖熙入誅之於是引見州郡及單于八部耆舊于東宮問以疾苦大築龍騰苑廣袤十餘里役徒二萬人起景雲山于苑內基廣五百步峯高十七丈又起逍遙宮甘露殿連房數百觀閣相交鑿天河渠引水入宮又為其昭儀苻氏鑿曲光海清涼池季夏盛暑士卒不得休息暍死者太半熙遊於城南止大柳樹下若有人呼曰大王且止熙惡之伐其樹乃有蛇長丈餘從樹中而出立其貴嬪苻氏為皇后赦殊死已下熙北襲契丹大破之昭儀苻氏死偽諡愍皇后贈苻謨太宰諡文獻公二苻並美而艷好微行遊宴熙弗之禁也請謁必從刑賞大政無不由之初昭儀有疾龍城人王溫稱能療之未幾而卒熙忿其妄也立於公車門支解溫而焚之其后好遊田熙從之北登白鹿山東過青嶺南臨滄海百姓苦之士卒為豺狼所害及凍死者五千餘人矣會高句驪寇燕郡殺略百餘人熙伐高句驪以苻氏從為衝車地道以攻遼東熙曰待剗平寇城朕當與后乘輦而入不聽將士先登於是城內嚴備攻之不能下會大雨雪士卒多死乃引歸擬鄴之鳳陽門作弘光門纍級三層熙與苻氏襲契丹憚其衆盛將還苻氏弗聽遂棄輜重輕襲高句驪周行三千餘里士馬疲凍死者屬路攻木底城不克而還盡殺寶諸子大城肥如及宿軍以仇尼倪為鎮東大將軍營州刺史鎮宿軍上庸公懿為鎮西將軍幽州刺史鎮令支尚書劉木為鎮南大將軍冀州刺史鎮肥如為苻氏起承華殿高承光一倍負土於北門土與穀同價典軍杜靜載棺詣闕上書極諫熙大怒斬之苻氏嘗季夏思凍魚膾仲冬須生地黃皆下有司切責不得加以大辟其虐也如此苻氏死熙悲號踊若喪考妣擁其尸而撫之曰體已就冷命遂斷矣於是僵仆氣絶久而乃蘇大斂既訖復啓其棺而與交接服斬縗食粥制百僚於宮內哭臨令沙門素服使有司案檢哭者有淚以為忠孝無則罪之於是羣臣震懼莫不含辛以為淚焉慕容隆妻張氏熙之嫂也美姿容有巧思熙將以為苻氏之殉欲以罪殺之乃毀其襚鞾中有弊遂賜死三女叩頭求哀熙不許制公卿已下至于百姓率戶營墓費殫府藏下錮三泉周輪數里內則圖畫尚書八坐之象熙曰善為之朕將隨后入此陵識者以為不祥其右僕射韋璆等並懼為殉沐浴而待死焉號苻氏墓曰徽平陵熙被髮徒跣步從苻氏喪車高大毀北門而出長老竊相謂曰慕容氏自毀其門將不久也中衛將軍馮跋左衛將軍張興先皆坐事亡奔以熙政之虐也與跋從兄萬泥等二十二人結盟推慕容雲為主發尚方徒五千餘人閉門距守中黃門趙洛生奔告之熙曰此鼠盜耳朕還當誅之乃收髮貫甲馳還赴難夜至龍城攻北門不克遂敗走入龍騰苑微服隱于林中為人所執雲得而弒之及其諸子同殯城北時年二十三在位六年雲葬之于苻氏墓偽諡昭文皇帝垂以孝武帝太元八年僭立至熙四世凡二十四年以安帝義熙三年滅初童謠曰一束䤝兩頭然禿頭小兒來滅燕䤝字上有草下有禾兩頭然則禾草俱盡而成高字雲父名拔小字禿頭三子而雲季也熙竟為雲所滅如謠言焉慕容雲慕容雲字子雨寶之養子也祖父和高句驪之支庶自云高陽氏之苗裔故以高為氏焉雲沈深有局量厚重希言時人咸以為愚唯馮跋奇其志度而友之寶之為太子雲以武藝給事侍東宮拜侍御郎襲敗慕容會軍寶子之賜姓慕容氏封夕陽公熙之葬苻氏也馮跋詣雲告之以謀雲懼曰吾嬰疾歷年卿等所知願更圖之跋逼曰慕容氏世衰河間虐暴惑妖淫之女而逆亂天常百姓不堪其害思亂者十室九焉此天亡之時也公自高氏名家何能為他養子機運難邀千歲一時公焉得辭也扶之而出雲曰吾疾苦日久廢絶世務卿今興建大事謬見推逼所以徘徊非為身也實惟否德不足以濟元元故耳跋等強之雲遂即天王位復姓高氏大赦境內殊死以下改元曰正始國號大燕署馮跋侍中都督中外諸軍事征北大將軍開府儀同三司録尚書事武邑公封伯子男鄉亭侯者五十餘人士卒賜穀帛有差熙之羣官復其爵位立妻李氏為天王后子彭為太子越騎校尉慕輿良謀叛雲誅之雲臨東堂幸臣離班桃仁懷劍執紙而入稱有所啓拔劍擊雲雲以几距班桃仁進而弒之馮跋遷雲尸于東宮偽諡惠懿皇帝雲自以無功德而為豪桀所推常內懷懼故寵養壯士以為腹心離班桃仁等並專典禁衛委之以爪牙之任賞賜月至數千萬衣食臥起皆與之同終以此致敗云史臣曰四星東聚金陵之氣已分五馬南浮玉塞之雄方擾市朝屢改艱虞靡息慕容垂天資英傑威震本朝以雄略見猜而庇身寬政永固受之而以禮道明事之而畢力然而隼質難羈狼心自野淮南失律三甥之謀已構河朔分麾五木之祥云啓斬飛龍而遐舉踰石門而長邁遂使翟氏景從鄴師宵逸收羅趙魏驅駕英雄叩囊餘奇摧五萬於河曲浮船祕策招七郡於黎陽返遼陰之舊物創中山之新社類帝禋宗僭擬斯備夫以重耳歸晉賴五臣之功句踐紿吳資五千之卒惡有業殊二霸衆微一旅掎拔而傾山嶽騰嘯而御風雲雖衛人忘亡復傳於東國任好餘裕伊愧於西鄰信苻氏之姦回非晉室之鯨鯢矣寶以浮譽獲升峻文御俗蕭牆內憤勍敵外陵雖毒不被物而惡足自勦盛則孝友冥符文武不墜韜光而夷讐賊罪己而遜高危翩翩然濁世之佳虜矣熙乃地非奧主舉因淫德驪戎之態取悅於匡牀玄妻之姿見奇於鬒髮蕩輕舟於曲光之海望朝涉於景雲之山飾土木於驕心窮怨嗟於蕞壤宗祀夷滅為馮氏之驅除焉贊曰戎狄憑陵山川沸騰天未悔禍人非與能疾走而捷先鳴則興道明烈烈鞭笞豪傑掃燕夷魏釗屠永滅大盜潛移鴻名遂竊寶心生亂盛清家難熙極驕淫人懷憤惋孽貽身咎災無以逭
