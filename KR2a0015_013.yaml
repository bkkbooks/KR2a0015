body:
  text: 晉書卷十三志第三天文下月五星犯列舍經星變附見妖星客星星流隕雲氣月五星犯列舍經星變附見魏文帝黃初四年三月癸卯月犯心大星占曰心為天王位王者惡之六月甲申太白晝見案劉向五紀論曰太白少陰弱不得專行故以己未為界不得經天而行經天則晝見其占為兵喪為不臣為更王強國弱小國強是時孫權受魏爵號而稱兵距守其十二月丙子月犯心大星占同上五年十月乙卯太白晝見占同上又歲星入太微逆行積百四十九日乃出占曰五星入太微從右入三十日以上人主有大憂一曰有赦至七年五月帝崩明帝即位大赦天下六年五月壬戌熒惑入太微至壬申與歲星相及俱犯右執法至癸酉乃出占曰從右入三十日以上人主有大憂又曰月五星犯左右執法大臣有憂一曰執法者誅金火尤甚十一月皇子東武陽王鑒薨七年正月驃騎將軍曹洪免為庶人四月征南大將軍夏侯尚薨五月帝崩蜀記稱明帝問黃權曰天下鼎立何地為正對曰當驗天文往者熒惑守心而文帝崩吳蜀無事此其徵也案三國史並無熒惑守心之文疑是入太微八月吳遂圍江夏寇襄陽大將軍宣帝救襄陽斬吳將張霸等兵喪更王之應也明帝太和五年五月熒惑犯房占曰房四星股肱臣將相位也月五星犯守之將相有憂其七月車騎將軍張郃追諸葛亮為亮所害十二月太尉華歆薨其十一月乙酉月犯軒轅大星占曰女主憂六年三月乙亥月又犯軒轅大星十一月丙寅太白晝見南斗遂歷八十餘日見占曰吳有兵明年孫權遣張彌等將兵萬人錫授公孫文懿為燕王文懿斬彌等虜其衆青龍三年正月太后郭氏崩青龍二年三月辛卯月犯輿鬼輿鬼主斬殺占曰人多病國有憂又曰大臣憂是年夏及冬大疫四年五月司徒董昭薨其五月丁亥太白晝見積三十餘日以晷度推之非秦魏則楚也是時諸葛亮據渭南宣帝與相持孫權寇合肥又遣陸議孫韶等入淮沔天子親東征蜀本秦地則為秦魏及楚兵悉起矣其七月己巳月犯楗閉占曰有火災三年七月崇華殿災三年六月丁未填星犯井鉞戊戌太白又犯之占曰凡月五星犯井鉞悉為兵災一曰斧鉞用大臣誅七月己丑填星犯東井距星占曰填星入井大人憂行近距為行陰其占曰大水五穀不成景初元年夏大水傷五穀其年十月壬申太白晝見在尾歷二百餘日晝見占曰尾為燕有兵十二月戊辰月犯鉤鈐占曰王者憂四年閏正月己巳填星犯井鉞三月癸卯填星犯東井己巳太白與月加景晝見五月壬寅太白犯畢左股第一星占曰畢為邊兵又主刑罰九月涼州塞外胡阿畢師使侵犯諸國西域校尉張就討之斬首捕虜萬計其年七月甲寅太白犯軒轅大星占曰女主憂景初元年皇后毛氏崩景初元年二月乙酉月犯房第二星占曰將軍有憂其七月司徒陳矯薨二年四月司徒韓暨薨其七月辛卯太白晝見積二百八十餘日時公孫文懿自立為燕王署置百官發兵距守宣帝討滅之二年二月己丑月犯心距星又犯中央大星五月乙亥月又犯心距星及中央大星案占曰王者惡之犯前星太子有憂三年正月帝崩太子立卒見廢其年十月甲午月犯箕占曰將軍死正始元年四月車騎將軍黃權薨其閏十一月癸丑月犯心中央大星少帝正始元年四月戊午月犯昴東頭第一星十月庚寅月又犯昴北斗四星占曰月犯昴胡不安二年六月鮮卑阿妙兒等寇西方敦煌太守王延破之斬二萬餘級三年又斬鮮卑大帥及千餘級二年九月癸酉月犯輿鬼西北星三年二月丁未又犯西南星占曰有錢令一曰大臣憂三年三月太尉滿寵薨四年正月帝加元服賜羣臣錢各有差四年十月十一月月再犯井鉞是月宣帝討諸葛恪恪棄城走五年二月曹爽征蜀五年十一月癸巳填星犯亢距星占曰諸侯有失國者七年七月丁丑月犯左角占曰天下有兵左將軍死七月乙亥熒惑犯畢距星占曰有邊兵一曰刑罰用九年正月辛亥月犯亢南星占曰兵起一曰將軍死七月癸丑填星犯楗閉占曰王者不宜出宮下殿嘉平元年天子謁陵宣帝奏誅曹爽等天子野宿於是失勢嘉平元年六月壬戌太白犯東井距星占曰國失政大臣為亂四月辛巳太白犯輿鬼占曰大臣誅一曰兵起二年三月己未太白又犯井距星三年七月王淩與楚王彪有謀皆伏誅人主遂卑吳孫權赤烏十三年夏五月日北至熒惑逆行入南斗秋七月犯魁第三星而東漢晉春秋云逆行案占熒惑入南斗三月吳王死一曰熒惑逆行其地有死君太元二年權薨是其應也故國志書於吳是時王淩謀立楚王彪謂斗中有星當有暴貴者以問知星人浩詳詳疑有故欲悅其意不言吳有死喪而言淮南楚分吳楚同占當有王者興故淩計遂定嘉平二年十二月丙申月犯輿鬼三年四月戊寅月犯東井五月甲寅月犯亢距星占曰將軍死一曰為兵是月王淩楚王彪等誅七月皇后甄氏崩四年三月吳將為寇鎮東將軍諸葛誕破走之其年七月己巳月犯輿鬼九月乙巳又犯之十月癸未熒惑犯亢南星占曰臣有亂四年十一月丁未月又犯鬼積尸五年六月戊午太白犯角占曰羣臣有謀不成庚辰月犯箕星占曰將軍死七月月犯井鉞丙午月又犯鬼西北星占曰國有憂十一月癸酉月犯東井距星占曰將軍死正元元年正月鎮東將軍毋丘儉揚州刺史文欽反兵俱敗誅死二月李豐及弟翼后父張緝等謀亂事泄悉誅皇后張氏廢九月帝廢為齊王蜀將薑維攻隴西車騎將軍郭淮討破之高貴鄉公正元二年二月戊午熒惑犯東井北轅西頭第一星甘露元年七月乙卯熒惑犯東井鉞星壬戌月又犯鉞星八月辛亥月犯箕吳廢孫亮太平元年九月壬辰太白犯南斗吳志所書也占曰太白犯斗國有兵大臣有反者其明年諸葛誕反又明年孫綝廢亮吳魏並有兵事也甘露元年九月丁巳月犯東井二年六月己酉月犯心中央大星八月壬子歲星犯井鉞九月庚寅歲星逆行乘井鉞十月丙寅太白犯亢距星占曰逆臣為亂人君憂景元元年五月有成濟之變及諸葛誕誅皆其應也二年三月庚子太白犯東井占曰國失政大臣為亂是夜歲星又犯東井占曰兵起至景元元年高貴鄉公敗三年八月壬辰歲星犯輿鬼鑕星占曰斧鑕用大臣誅四年四月甲申歲星又犯輿鬼東南星占曰鬼東南星主兵木入鬼大臣誅景元元年殺尚書王經元帝景元元年二月月犯建星案占月五星犯建星大臣相譖是後鍾會鄧艾破蜀會譖艾二年四月熒惑入太微犯右執法占曰人主有大憂一云大臣憂四年十月歲星守房占曰將相憂一云有大赦明年鄧艾鍾會皆夷滅赦蜀土五年帝遜位武帝咸寧四年九月太白當見不見占曰是謂失舍不有破軍必有亡國是時羊祜表求伐吳上許之五年十一月兵出太白始夕見西方太康元年三月大破吳軍孫皓面縛請罪吳國遂亡太康八年三月熒惑守心占曰王者惡之太熙元年四月乙酉帝崩惠帝元康三年四月熒惑守太微六十日占曰諸侯三公謀其上必有斬臣一曰天子亡國是春太白守畢至是百餘日占曰有急令之憂一曰相死又為邊境不安後賈后陷殺太子六年十月乙未太白晝見九年六月熒惑守心占曰王者惡之八月熒惑入羽林占曰禁兵大起其後帝見廢為太上皇俄而三王起兵討趙王倫倫悉遣中軍兵相距纍月永康元年三月中台星坼太白晝見占曰台星失常三公憂太白晝見為不臣是月賈后殺太子趙王倫尋廢殺后斬司空張華其五月熒惑入南斗占曰宰相死兵大起斗又吳分野是時趙王倫為相明年篡位三王興師誅之太安二年石冰破揚州其八月熒惑入箕占曰人主失位兵起明年趙王倫篡位改元二年二月太白出西方逆行入東井占曰國失政大臣為亂是時齊王冏起兵討趙王倫倫滅冏擁兵不朝專權淫奢明年誅死永寧元年自正月至于閏月五星互經天縱橫無常星傳曰日陽君道也星陰臣道也日出則星亡臣不得專也晝而星見午上者為經天其占為不臣為更王今五星悉經天天變所未有也石氏説曰辰星晝見其國不亡則大亂是後台鼎方伯互執大權二帝流亡遂至六夷更王迭據華夏亦載籍所未有也其四月歲星晝見五月太白晝見占同前七月歲星守虛危占曰木守虛危有兵憂虛危齊分一曰守虛飢守危徭役煩多下屈竭辰星入太微占曰為內亂一曰羣臣相殺太白守右掖門占曰為兵為亂為賊八月戊午填星犯左執法又犯上相占曰上相憂熒惑守昴占曰趙魏有災辰星守輿鬼占曰秦有災九月丁未月犯左角占曰人主憂一曰左衛將軍死天下有兵二年四月癸酉歲星晝見占曰為臣強初齊王冏定京都因留輔政遂專無君是月成都河間檄長沙王討之冏交戰攻焚宮闕冏兵敗夷滅又殺其兄上軍將軍實以下二十餘人太安二年成都攻長沙於是公私飢困百姓力屈太安二年二月太白入昴占曰天下擾兵大起七月熒惑入東井占曰兵起國亂是秋太白守太微上將占曰上將以兵亡是年冬成都河間攻洛陽八月長沙王奉帝出距二王三年正月東海王越執長沙王張方又殺之三年正月熒惑入南斗占同永康七月左衛將軍陳眕率衆奉帝伐成都六軍敗績兵逼乘輿是時天下盜賊羣起張昌尤盛永興元年七月庚申太白犯角亢經房心歷尾箕九月入南斗占曰犯角天下大戰犯亢有大兵人君憂入房心為兵喪犯尾箕女主憂一曰天下大亂入南斗有兵喪一曰將軍為亂其所犯守又兗豫幽冀揚州之分野是年七月有蕩陰之役九月王浚殺幽州刺史和演攻鄴鄴潰於是兗豫為天下兵衝陳敏又亂揚土劉元海石勒李雄等並起微賤跨有州郡皇后羊氏數被幽廢皆其應也二年四月丙子太白犯狼星占曰大兵起九月歲星守東井占曰有兵井又秦分野是年苟晞破公師藩張方破范陽王虓關西諸將攻河間王顒顒奔走東海王迎殺之光熙元年四月太白失行自翼入尾箕占曰太白失行而北是謂反生不有破軍必有屠城五月汲桑攻鄴魏郡太守馮嵩出戰大敗桑遂害東燕王騰殺萬餘人焚燒魏時宮室皆盡其九月丁未熒惑守心占曰王者惡之己亥填星守房心占曰填守房多禍喪守心國內亂天下赦是時司馬越專權終以無禮破滅內亂之應也十一月帝崩懷帝即位大赦天下懷帝永嘉元年十二月丁亥星流震散按劉向説天官列宿在位之象其衆小星無名者衆庶之類此百官衆庶將流散之象也是後天下大亂百官萬姓流移轉死矣二年正月庚午太白伏不見二月庚子始晨見東方是謂當見不見占同上條其後破軍殺將不可勝數帝崩虜庭中夏淪覆三年正月庚子熒惑犯紫微占曰當有野死之王又為火燒宮是時太史令高堂沖奏乘輿宜遷幸不然必無洛陽五年六月劉曜王彌入京都焚燒宮廟執帝歸平陽三年填星久守南斗占曰填星所居久者其國有福是時安東將軍琅邪王始有揚土其年十一月地動陳卓以為是地動應也五年十月熒惑守心六年六月丁卯太白犯太微占曰兵入天子庭王者惡之七月帝崩于寇庭天下行服大臨元帝太興元年七月太白犯南斗占曰吳越有兵大人憂二年二月甲申熒惑犯東井占曰兵起貴臣相戮八月己卯太白犯軒轅大星占曰後宮憂三年五月戊子太白入太微又犯上將星占曰天子自將上將誅九月太白犯南斗十月己亥熒惑在東井居五諸侯南踟鯌留積三十日占曰熒惑守井二十日以上大人憂守五諸侯諸侯有誅者永昌元年三月王敦率江荊之衆來攻京都六軍距戰敗績人主謝過而已於是殺護軍將軍周顗尚書令刁協驃騎將軍戴若思又鎮北將軍劉隗出奔四月又殺湘州刺史譙王司馬承鎮南將軍甘卓閏十二月帝崩明帝太寧三年正月熒惑逆行入太微占曰為兵喪王者惡之閏八月帝崩後二年蘇峻反攻焚宮室太后以憂逼崩天子幽劫于石頭城遠近兵亂至四年乃息成帝咸和六年正月丙辰月入南斗占曰有兵是月石勒殺略婁武進二縣人明年石勒衆又抄略南沙海虞其十一月熒惑守胃昴占曰趙魏有兵八年七月石勒死石季龍自立是時雖二石僭號而其強弱常占於昴不關太微紫宮也八年三月己巳月入南斗與六年占同其年七月石勒死彭彪以譙石生以長安郭權以秦州並歸順於是遣督護喬球率衆救彪彪敗球退又石季龍石斌攻滅生權其七月熒惑入昴占曰胡王死一曰趙地有兵是月石勒死石季龍多所攻沒八月月又犯昴占曰胡不安九年三月己亥熒惑入輿鬼犯積尸占曰兵在西北有沒軍死將六月八月月又犯昴是時石弘雖襲勒位而石季龍擅威橫暴十一月廢弘自立遂幽殺之咸康元年二月己亥太白犯昴占曰兵起歲中旱四月石季龍略騎至歷陽加司徒王導大司馬治兵列戍衝要是時石季龍又圍襄陽六月旱其年三月丙戌月入昴占曰胡王死八月戊戌熒惑入東井占曰無兵兵起有兵兵止十一月月犯昴二年正月辛亥月犯房南第二星八月月又犯昴九月庚寅太白犯南斗因晝見占曰斗為宰相又揚州分金犯之死喪之象晝見為不臣又為兵喪其後石季龍僭稱天王發衆七萬四年二月自隴西攻段遼于薊又襲慕容皓於棘城不克皓擊破其將麻秋并虜段遼殺之三年七月己酉月犯房上星八月熒惑入輿鬼犯積尸甲戌月犯東井距星九月戊子月犯建星四年四月己巳太白晝見在柳占曰為兵為不臣明年石季龍大寇沔南於是內外戒嚴其五月戊戌熒惑犯右執法占曰大臣死執政者憂九月太白又犯右執法案占五星災同金火尤甚十一月戊子太白犯房上星占曰上相憂五年四月乙未月犯畢距星占曰兵起七月己酉月犯房上星占曰將相憂是月庚申丞相王導薨庾冰代輔政八月太尉郗鑒薨又有沔南邾城之敗百姓流亡萬餘家六年正月征西大將軍庾亮薨六年三月甲辰熒惑犯太微上將星占曰上將憂四月丁丑熒惑犯右執法占曰執政者憂六月乙亥月犯牽牛中央星占曰大將憂是時尚書令何充為執法有譴欲避其咎明年求為中書令其四月丙午太白犯畢距星占曰兵革起一曰女主憂六月乙卯太白犯軒轅大星占曰女主憂七年三月皇后杜氏崩七年三月壬午月犯房四月己丑太白入輿鬼五月太白晝見八月辛丑月犯輿鬼八年六月熒惑犯房上第二星占曰次相憂八月壬寅月犯畢占曰下犯上兵革起十月月又掩畢大星占同上其建元二年車騎將軍庾冰薨庾翼大發兵謀伐石季龍專制上流朝廷憚之康帝建元元年正月壬午太白入昴占曰趙地有兵又曰天下兵起四月乙酉太白晝見是年石季龍殺其子邃又遣將寇沒狄道及屯薊東謀慕容皓二年歲星犯天關安西將軍庾翼與兄冰書曰歲星犯天關占云關梁當分比來江東無他故江道亦不艱難而石季龍頻年再閉關不通信使此復是天公憒憒無皂白之徵也其閏月乙酉太白犯斗占曰為喪天下受爵祿九月帝崩太子立大赦賜爵穆帝永和元年正月丁丑月入畢占曰兵大起戊寅月犯天關占曰有亂臣更天子之法五月辛巳太白晝見在東井占曰為臣強秦有兵六月辛丑月入太微犯屏西南星占曰輔臣有免罷者七月八月月皆犯畢占同上己未月犯輿鬼占曰大臣有誅九月庚戌月又犯畢是年初庾翼在襄陽七月翼疾將終輒以子爰之為荊州刺史代己任爰之尋被廢明年桓溫又輒率衆伐蜀執李勢送至京都蜀本秦地也二年二月壬子月犯房上星四月丙戌月又犯房上星八月壬申太白犯左執法三年正月壬午月犯南斗第五星占曰將軍死近臣去五月壬申月犯南斗第四星因入魁占曰有兵一曰有大赦六月月犯東井距星占曰將軍死國有憂戊戌月犯五諸侯占曰諸侯有誅九月庚寅太白犯南斗第五星占曰為喪為兵四年七月丙申太白犯左執法甲寅月犯房丁巳月入南斗犯第二星乙丑太白犯左執法占悉同上十月甲辰月犯亢占曰兵起將軍死十一月戊戌月犯上將星三年六月大赦是月陳逵征壽春敗而還七月氐蜀餘寇反亂益土九月石季龍伐涼州五年征北大將軍褚裒卒四年四月太白入昴是時戎晉相侵趙地連兵尤甚七月太白犯軒轅占曰在趙及為兵喪甲寅月犯房十月甲戌月犯亢占曰兵起將軍死八月石季龍太子宣殺弟韜宣亦死其十一月戊戌月犯上將星五年正月石季龍僭號稱皇帝尋死五年四月丁未太白犯東井占曰秦有兵九月戊戌太白犯左角占曰為兵十月月犯昴占曰胡有憂將軍死是年八月褚裒北征兵敗十月關中二十餘壁舉兵內附石遵攻沒南陽十一月冉閔殺石遵又盡殺胡十餘萬人於是趙魏大亂十二月褚裒薨八年劉顯苻健慕容俊並僭號殷浩北伐敗績見廢六年二月辛酉月犯心大星占曰大人憂又豫州分野也丁丑月犯房占曰將相憂六月己丑月犯昴占同上乙未月犯五諸侯占同上七月壬寅月始出西方犯左角占曰大將軍死一曰天下有兵丁未月犯箕占曰將軍死丙寅熒惑犯鉞星占曰大臣有誅八月辛卯月犯左角太白晝見在南斗月犯右執法占並同上是歲司徒蔡謨免為庶人七年二月太白犯昴占同上三月乙卯熒惑入輿鬼犯積尸占曰貴人有憂五月乙未熒惑犯軒轅大星占曰女主憂太白入畢口犯左股占曰將相當之六月乙亥月犯箕占曰國有兵丙子月犯斗丁丑熒惑入太微犯右執法八月庚午太白犯軒轅戊子太白犯右執法占悉同上七年劉顯殺石祗及諸將帥山東大亂疾疫死亡八年三月戊戌月犯軒轅大星癸丑月入南斗犯第二星五月月犯心星六月癸酉月犯房七月壬子歲星犯東井距星占曰內亂兵起八月戊戌熒惑入輿鬼占曰忠臣戮死丙辰太白入南斗犯第四星占曰將為亂一曰丞相免九年二月乙巳月入南斗犯第三星三月戊辰月犯房八月歲星犯輿鬼東南星占曰兵起是時帝幼沖母后稱制將相有隙兵革連起慕容俊僭號稱燕王攻伐不休十年正月乙卯月蝕昴星占曰趙魏有兵癸酉填星奄鉞星占曰斧鉞用二月甲申月犯心大星占曰王者惡之七月庚午太白晝見晷度推之災在秦鄭九月辛酉太白犯左執法是時桓溫擅命朝臣多見迫脅四月溫伐苻健破其嶢柳軍十二月慕容恪攻齊十一年三月辛亥月奄軒轅占同上四月庚寅月犯牛宿南星占曰國有憂八月己未太白犯天江占曰河津不通十二年六月庚子太白晝見在東井占如上己未月犯鉞星八月癸酉月奄建星九月戊寅熒惑入太微犯西蕃上將星十一月丁丑熒惑犯太微東蕃上相星十二年十一月齊城陷執段龕殺三千餘人永和三年鮮卑侵略河冀升平元年慕容俊遂據臨漳盡有幽并青冀之地緣河諸將奔散河津隔絶時權在方伯九服交兵升平元年四月壬子太白入輿鬼丁亥月奄井南轅西頭第二星占曰秦地有兵一曰將死六月戊戌太白晝見在軫占同上軫是楚分野壬子月犯畢占曰為邊兵七月辛巳熒惑犯天江占曰河津不通十一月歲星犯房占曰豫州有災其年五月苻堅殺苻生而立十二月慕容俊入屯鄴二年八月豫州刺史謝奕薨二年二月辛卯填星犯軒轅大星占曰人主惡之甲午月犯東井六月辛酉月犯房十月己未太白犯哭星占曰有大哭泣三年正月壬辰熒惑犯楗閉星案占曰人主憂三月乙酉熒惑逆行犯鉤鈐案占王者惡之六月太白犯東井七月乙酉熒惑犯天江丙戌太白犯輿鬼占悉同上戊子月犯牽牛中央大星占曰牽牛天將也犯中央大星將軍死八月丁未太白犯軒轅大星甲子月犯畢大星占曰為邊兵一曰下犯上三年十月諸葛攸舟軍入河敗績豫州刺史謝萬入潁衆潰而歸萬除名十一月司徒會稽王以郗曇謝萬二鎮敗求自貶三等四年正月慕容俊死子暐代立慕容恪殺其尚書令陽騖等四年正月乙亥月犯牽牛中央大星六月辛亥辰星犯軒轅占曰女主憂己未太白入太微右掖門從端門出占曰貴奪勢一曰有兵又曰出端門臣不臣八月戊申太白犯氐占曰國有憂丙辰熒惑犯太微西蕃上將星九月壬午太白入南斗口犯第四星占曰為喪有赦天下受爵祿十二月甲寅熒惑犯房丙寅太白晝見庚寅月犯楗閉占曰人君惡之五年正月乙巳填星逆行犯太微五月壬寅月犯太微庚戌月犯建星占曰大臣相謀是時殷浩敗績卒致遷徙其月辛亥月犯牽牛宿占曰國有憂六月癸亥月犯氐東北星占曰大將當之五年正月北中郎將郗曇薨五月帝崩哀帝立大赦賜爵褚后失勢七月慕容恪攻冀州刺史呂護於野王護奔滎陽是時桓溫以大衆次宛聞護敗乃退五年六月癸酉月奄氐東北星占曰大將軍當之九月乙酉月奄畢占曰有邊兵十月丁未月犯畢大星占曰下犯上又曰有邊兵八月范汪廢隆和元年慕容暐遣將寇河陰哀帝興寧三年七月庚戌月犯南斗占曰女主憂歲星犯輿鬼占曰人君憂十月太白晝見在亢占曰亢為朝廷有兵喪為臣強明年五月皇后庾氏崩海西太和二年正月太白入昴五年慕容暐為苻堅所滅又據司冀幽并四州六年閏月熒惑守太微端門占曰天子亡國又曰諸侯三公謀其上一曰有斬臣辛卯月犯心大星占曰王者惡之十一月桓溫廢帝并奏誅武陵王簡文不許溫乃徙之新安皆臣強之應也簡文咸安元年十二月辛卯熒惑逆行入太微二年三月猶不退占曰國不安有憂是時帝有桓溫之逼二年五月丁未太白犯天關占曰兵起歲星形色如太白占曰進退如度姦邪息變色亂行主無福歲星於仲夏當細小而不明此其失常也又為臣強六月太白晝見在七星乙酉太白犯輿鬼占曰國有憂七月帝崩桓溫以兵威擅權將誅王坦之等內外迫脅又庾希入京城盧悚入宮其誅滅之孝武寧康元年正月戊申月奄心大星案占曰災不在王者則在豫州一曰主命惡之三月丙午月奄南斗第五星占曰大臣憂有死亡一曰將軍死七月桓溫薨九月癸巳熒惑入太微是時女主臨朝政事多缺二年閏月己未月奄牽牛南星占曰左將軍死十二月甲申太白晝見在氐氐兗州分野三年五月丙午北中郎將王坦之薨三年六月辛卯太白犯東井占曰秦地有兵九月戊申熒惑奄左執法占曰執法者死太元元年苻堅破涼州二年十月尚書令王彪之卒太元元年四月丙戌熒惑犯南斗第三星丙申又奄第四星占曰兵大起中國飢一曰有赦八月癸酉太白晝見在氐氐兗州分野九月熒惑犯哭泣星遂入羽林占曰天子有哭泣事中軍兵起十一月己未月奄氐角占曰天下有兵一曰國有憂二年二月熒惑守羽林占曰禁兵大起九月壬午太白晝見在角角兗州分野升平元年五月大赦三年八月秦人寇樊鄧襄陽彭城四年二月襄陽陷朱序沒四月魏興陷賊聚廣陵三河衆五六萬於是諸軍外次衝要丹楊尹屯衛京都六月兗州刺史謝玄討賊大破之是時中外連兵比年荒儉四年十一月丁巳太白犯哭星占曰天子有哭泣事五年七月丙子辰星犯軒轅占曰女主當之九月癸未皇后王氏崩六年九月丙子太白晝見七年十一月太白又晝見在斗占曰吳有兵喪八年四月甲子太白又晝見在參占曰魏有兵喪是月桓沖征沔漢楊亮伐蜀並拔城略地八月苻堅自將號百萬九月攻沒壽陽十月劉牢之破苻堅將梁成斬之殺獲萬餘人謝玄等又破苻堅於淝水斬其弟融堅大衆奔潰九年六月皇太后褚氏崩八月謝玄出屯彭城經略中州矣九年七月丙戌太白晝見十一月丁巳又晝見十年四月乙亥又晝見于畢昴占曰魏國有兵喪是時苻堅大衆奔潰趙魏連兵相攻堅為姚萇所殺十一年三月戊申太白晝見在東井占曰秦有兵臣強六月甲申又晝見于輿鬼占曰秦有兵時魏姚萇苻登連兵相征不息甲午歲星晝見在胃占曰魯有兵臣強十二年慕容垂寇東阿翟遼寇河上姚萇假號安定苻登自立隴上呂光竊據涼土十二年六月癸卯太白晝見在柳十月庚午太白晝見在斗十三年正月丙戌又晝見十二月熒惑在角亢形色猛盛占曰熒惑失其常吏且棄其法諸侯亂其政自是後慕容垂翟遼姚萇苻登慕容永並阻兵爭強十四年正月彭城妖賊又稱號於皇丘劉牢之破滅之三月張道破合鄉圍泰山向欽之擊走之是年翟遼又攻沒滎陽侵略陳項于時政事多弊君道陵遲矣十四年四月乙巳太白晝見于柳六月辛卯又晝見于翼九月丙寅又晝見于軫十二月熒惑入羽林占並同上十五年翟遼掠司兗衆軍纍討不克慕容垂又跨略并冀等州七月旱八月諸郡大水兗州又蝗十五年九月癸未熒惑入太微十月太白入羽林十六年四月癸卯朔太白晝見十一月癸巳月奄心前星占曰太子憂是時太子常有篤疾十七年七月丁丑太白晝見十月丁酉又晝見十八年六月又晝見十九年五月又晝見于柳六月辛酉又晝見于輿鬼九月又見于軫二十年六月熒惑入天囷占曰大飢七月丁亥太白晝見在太微占曰太白入太微國有憂晝見為兵喪十二月己巳月犯楗閉及東西咸占曰楗閉司心腹喉舌東西咸主陰謀二十一年二月壬申太白晝見三月癸卯太白連晝見在羽林占曰有強臣有兵喪中軍兵起三月太白晝見于胃占曰中軍兵起四月壬午太白入天囷占曰為飢六月歲星犯哭泣星占曰有哭泣事是年九月帝崩隆安元年王恭等舉兵脅朝廷於是內外戒嚴殺王國寶以謝之又連歲水旱三方動衆人飢安帝隆安元年正月癸亥熒惑犯哭泣星占曰有哭泣事四月丁丑太白晝見在東井占曰秦有兵喪六月姚興攻洛陽郗恢遣兵救之冬姚萇死子略代立魏王圭即位於中山其八月熒惑守井鉞占曰大臣有誅二年六月戊辰攝提移度失常歲星晝見在胃兗州分野是年六月郗恢遣鄧啓方等以萬人伐慕容寶於滑臺敗而還閏月太白晝見在羽林丁丑月犯東上相三年五月辛酉月又奄東上相辛未辰星犯軒轅大星占悉同上二年九月庾楷等舉兵表誅王愈等於是內外戒嚴三年六月洛陽沒于寇桓玄破荊雍州殺殷仲堪等孫恩聚衆攻沒會稽殺內史四年六月辛酉月犯哭泣星五年正月太白晝見自去年十二月在斗晝見至于是月乙卯案占災在吳越七月癸亥大角星散搖五色占曰王者流散丁卯月犯天關占曰王者憂九月庚子熒惑犯少微又守之占曰處士誅十月甲子月犯東次相其年七月太皇太后李氏崩十月妖賊大破高雅之於餘姚死者十七八五年孫恩攻侵郡縣殺內史至京口進軍蒲洲於是內外戒嚴恩遣別將攻廣陵殺三千餘人退據郁洲是時劉裕又追破之九月桓玄表至逆旨陵上十月司馬元顯大治水軍將以伐玄元興元年正月盧循自稱征虜將軍領孫恩餘衆略有永嘉晉安之地二月帝戎服遣西軍三月桓玄克京都殺司馬元顯放太傅會稽王道子元興元年三月戊子太白犯五諸侯因晝見占曰諸侯有誅七月戊寅熒惑在東井熒惑犯輿鬼積尸占並同上八月丙寅太白奄右執法九月癸未太白犯進賢占曰進賢者誅二年二月歲星犯西上將六月甲辰月奄斗第四星占曰大臣誅不出三年八月癸丑太白犯房北第二星九月己丑歲星犯進賢熒惑犯西上將十月甲戌太白犯泣星十一月丁酉熒惑犯東上相十二月乙巳月奄軒轅第二星占悉同上元年冬魏破姚興軍二年十二月桓玄篡位放遷帝后於尋陽以永安何皇后為零陵君三年二月劉裕盡誅桓氏三年正月戊戌熒惑逆行犯太微西上相占曰天子戰於野上相死二月丙辰熒惑逆行在左執法西北占曰執法者誅四月甲午月奄軒轅第二星五月壬申月奄斗第二星填星入羽林占並同上是年二月丙辰劉裕殺桓修等三月己未破走桓玄遣軍西討辛巳誅左僕射王愈桓玄劫天子如江陵五月玄下至崢嶸洲義軍破滅之桓振又攻沒江陵幽劫天子七月永安何皇后崩義熙元年三月壬辰月奄左執法占同上丁酉月奄心前星占曰豫州有災太白犯東井占曰秦有兵七月庚辰太白晝見在翼軫占曰為臣強荊州有兵喪八月丁巳月犯斗第一星占曰天下有兵一曰大臣憂九月甲子熒惑犯少微占曰處士誅庚寅熒惑犯右執法癸卯熒惑犯左執法占並同上十一月丙戌太白犯鉤鈐占曰喉舌憂十二月己卯歲星犯天江占曰有兵亂河津不通十一月荊州刺史魏詠之薨二年二月司馬國璠等攻沒弋陽四月姚興伐仇池公楊盛擊走之九月益州刺史司馬榮期為其參軍楊承祖所害三年十二月司徒揚州刺史王謐薨四年正月太保武陵王遵薨三月左僕射孔安國卒自後政在劉裕人主端拱而已二年二月太白犯南斗占曰兵起己丑月犯心後星占曰豫州有災四月癸丑月犯太微西上將己未月犯房南第二星乙丑歲星犯天江占曰有兵亂河津不通五月癸未月犯左角占曰左將軍死天下有兵壬寅熒惑犯氐占曰氐為宿宮人主憂六月庚午熒惑犯房北第二星八月癸亥熒惑犯南斗第五星丁巳犯建星占曰為兵九月壬午熒惑犯哭星又犯泣星是年二月甲戌司馬國璠等攻沒弋陽又慕容超侵略徐兗三年正月又寇北徐州至下邳十二月司徒王謐薨四年正月武陵王遵薨五年慕容超復寇淮北四月劉裕大軍討之拔臨朐又圍廣固拔之三年正月丙子太白晝見在奎二月庚申月奄心後星占同上五月癸未月犯左角己丑太白晝見在參占曰益州有兵喪臣強八月己卯太白犯左執法辛卯熒惑犯左執法九月壬子熒惑犯進賢星是年八月劉敬宣伐蜀不克而旋四年三月左僕射孔安國卒七月司馬叔璠等攻沒鄒山魯郡太守徐雍破走之姚略遣衆征赫連勃勃大為所破五年劉裕討慕容超滅之四年正月庚子熒惑犯天關五月丁未月奄斗第二星壬子填星犯天廩占曰天下飢倉粟少六月己丑太白犯太微西上將乙卯又犯左執法十月戊子熒惑入羽林占悉同上五年劉裕討慕容超後南北軍旅運轉不息五年二月甲子月犯昴占曰胡不安天子破胸奴五月戊戌歲星入羽林九月壬寅月犯昴十月熒惑犯氐閏月丁酉月犯昴辛亥熒惑犯鉤鈐己巳月奄心大星占曰王者惡之是年四月劉裕討慕容超十月魏王圭遇弒殂六年五月盧循逼郊甸宮衛被甲六年三月丁卯月奄房南第二星災在次相己巳又奄斗第五星占曰斗主吳吳地兵起太白犯五諸侯占曰諸侯有誅五月甲子月奄斗第五星己亥月奄昴第三星占曰國有憂一曰有白衣之會六月己丑月犯房南第二星甲午太白晝見七月己亥月犯輿鬼占曰國有憂一曰秦有兵八月壬午太白犯軒轅大星甲申月犯心前星災在豫州丙戌月犯斗第五星占同上丁亥月奄牛宿南星占曰天下有大誅乙未太白犯少微丙午太白在少微而晝見九月甲寅太白犯左執法丁丑填星犯畢占曰有邊兵是年三月始興太守徐道覆反四月盧循寇湘中沒巴陵率衆逼京畿是月左僕射孟昶懼王威不振仰藥自殺七年十二月劉蕃梟徐道覆首杜慧度斬盧循並傳首京都八年六月劉道規卒時為豫州刺史八月皇后王氏崩九月兗州刺史劉蕃尚書左僕射謝混伏誅劉裕西討劉毅斬首徇之十二月遣益州刺史朱齡石伐蜀七年四月辛丑熒惑入輿鬼占曰秦有兵一曰雍州有災六月太白晝見在翼己亥填星犯天關占曰臣謀主八月太白犯房南第二星十一月丙子太白犯哭星其七月朱齡石克蜀蜀又反討滅之八年七月癸亥月奄房北第二星己未月犯井鉞八月戊申月犯泣星十月辛亥月奄天關占曰有兵十一月丁丑填星犯東井占曰大人憂十二月癸卯填星犯井鉞是年八月皇后王氏崩九月誅劉蕃謝混討滅劉毅十二月朱齡石滅蜀九年二月熒惑入輿鬼占曰有兵喪太白犯南河占曰兵起五月壬辰太白犯右執法晝見七月庚午月奄鉤鈐占曰喉舌臣憂九月庚午歲星犯軒轅大星己丑月犯左角時劉裕擅命兵革不休十月裕討司馬休之王師不利休之等奔長安十年正月丁卯月犯畢占曰將相有以家坐罪者二月己酉月犯房北星五月壬寅月犯牽牛南星乙丑歲星犯軒轅大星占悉同上六月丙申月奄氐占曰將死之國有誅者七月庚辰月犯天關占曰兵起熒惑犯井鉞填星犯輿鬼遂守之占曰大人憂宗廟改八月丁酉月奄牽牛南星占同上九月填星犯輿鬼占曰人主憂丁巳太白入羽林十二月己酉月犯西咸占曰有陰謀十一年林邑寇交州距敗之十一年三月丁巳月入畢占曰天下兵起一曰有邊兵己卯熒惑入輿鬼閏月丙午填星又入輿鬼占曰為旱大疫為亂臣五月癸卯熒惑入太微甲辰犯右執法六月己未太白犯東井占曰秦有兵戊寅犯輿鬼占曰國有憂七月辛丑月犯畢占同上八月壬子月犯氐占同上庚申太白順行從右掖門入太微丁卯奄左執法十一月癸亥月入畢占同上乙未月入輿鬼而暈十二年五月甲申歲星留房心之間宋之分野始封劉裕為宋公六月壬子太白順行入太微右掖門己巳月犯畢占同上七月月犯牛宿十月丙戌月入畢十三年五月丙子月犯軒轅丁亥犯牽牛癸巳熒惑犯右執法八月己酉月犯牽牛丁卯月犯太微占曰人君憂九月壬辰熒惑犯軒轅十月戊申月犯畢占悉同上月犯箕占曰國有憂甲寅月犯畢占同上乙卯填星犯太微留積七十餘日占曰亡君之戒壬戌月犯太微十四年三月癸巳太白犯五諸侯五月庚子月犯太微七月甲辰熒惑犯輿鬼占曰秦有兵又為旱為兵喪亦曰大人憂宗廟改亦為亂臣時劉裕擅命軍旅數興飢旱相屬其後卒移晉室丁巳月犯東井占曰軍將死八月甲子太白犯軒轅癸酉填星入太微犯右執法因留太微中積二百餘日乃去占曰填星守太微亡君之戒有徙王九月乙未太白入太微犯左執法丁巳月入太微占曰大人憂十月甲申月入太微癸巳熒惑入太微犯西蕃上將仍順行至左掖門內留二十日乃逆行義熙十二年七月劉裕伐姚泓十三年八月擒姚泓司兗秦雍悉平十四年劉裕還彭城受宋公十一月左僕射前將軍劉穆之卒明年西虜寇長安雍州刺史朱齡石諸軍陷沒官軍捨而東十二月帝崩恭帝元熙元年正月丙午三月壬寅五月丙申月皆犯太微占悉同上乙卯辰星犯軒轅六月庚辰太白犯太微七月己卯月犯太微太白晝見自義熙元年至是太白經天者九日蝕者四皆從上始革代更王臣失君之象也是夜太白犯哭星十二月丁巳月太白俱入羽林二年二月庚午填星犯太微占悉同上元年七月劉裕受宋王是年六月帝遜位于宋妖星客星魏文帝黃初三年九月甲辰客星見太微左掖門內占曰客星出太微國有兵喪十月帝南征孫權是後纍有征役六年十月乙未有星孛于少微歷軒轅占為兵喪除舊布新之象時帝軍廣陵辛丑親御甲胄觀兵明年五月帝崩明帝太和六年十一月丙寅有星孛于翼近太微上將星占曰為兵喪甘氏曰孛彗所當之國是受其殃翼又楚分野孫權封略也明年權有遼東之敗又明年諸葛亮入秦川孫權發兵緣江淮屯要衝權自圍新城以應亮天子東征權青龍四年十月甲申有星孛于大辰長三尺乙酉又孛于東方十一月己亥彗星見犯宦者天紀星占曰大辰為天王天下有喪劉向五紀論曰春秋星孛于東方不言宿者不加宿也宦者在天市為中外有兵天紀為地震孛彗主兵喪景初元年六月地震九月吳將朱然圍江夏皇后毛氏崩二年正月討公孫文懿三年正月明帝崩景初二年八月彗星見張長三尺逆西行四十一日滅占同上張周分野十月癸巳客星見危逆行在離宮北騰蛇南甲辰犯宗星己酉滅占曰客星所出有兵喪虛危為宗廟又為墳墓客星近離宮則宮中將有大喪就先君於宗廟之象也三年正月帝崩少帝正始元年十月乙酉彗星見西方在尾長三丈拂牽牛犯太白十一月甲子進犯羽林占曰尾為燕又為吳牛亦吳越之分太白為上將羽林中軍兵為吳越有喪中軍兵動二年五月吳遣三將寇邊吳太子登卒六月宣帝討諸葛恪於皖太尉滿寵薨六年八月戊午彗星見七星長二尺色白進至張積二十三日滅七年十一月癸亥又見軫長一尺積百五十六日滅九年三月又見昴長六尺色青白芒西南指七月又見翼長二尺進至軫積四十二日滅案占曰七星張為周分野翼軫為楚昴為趙魏彗所以除舊布新主兵喪也嘉平元年宣帝誅曹爽兄弟及其黨與皆夷三族京師嚴兵三年誅楚王彪又襲王淩於淮南淮南東楚也魏諸王幽於鄴嘉平三年十一月癸亥有星孛于營室西行積九十日滅占曰有兵喪室為後宮後宮且有亂四年二月丁酉彗星見西方在胃長五六丈色白芒南指貫參積二十日滅五年十一月彗星又見軫長五丈在太微左執法西東南指積百九十日滅案占胃兗州之分野參主兵太微天子庭執法為執政孛彗為兵喪除舊布新之象正元元年二月李豐豐弟翼后父張緝等謀亂皆誅皇后亦廢九月帝廢為齊王高貴鄉公正元元年十一月白氣出南斗側廣數丈長竟天王肅曰蚩尤之旗也東南其有亂乎二年正月有彗星見于吳楚分西北竟天鎮東大將軍毌丘儉等據淮南叛景帝討平之案占蚩尤旗見王者征伐四方自後又征淮南西平巴蜀是歲吳主孫亮五鳳元年也斗牛吳越分案占吳有兵喪除舊布新之象也太平三年孫綝盛兵圍宮廢亮為會稽王故國志又書於吳也淮南江東同揚州地故于時變見吳楚楚之分則魏之淮南多與吳同災是以毌丘儉以孛為己應遂起兵而敗後三年即魏甘露二年諸葛誕又反淮南吳遣將救之及城陷誕衆與吳兵死沒各數萬人猶前長星之應也甘露二年十一月彗星見角色白占曰彗星見兩角間色白者軍起不戰邦有大喪景元元年高貴鄉公為成濟所害四年十月丁丑客星見太微中轉東南行歷軫宿積七日滅占曰客星出太微有兵喪景元元年高貴鄉公被害元帝景元三年十一月壬寅彗星見亢色白長五寸轉北行積四十五日滅占曰為兵喪一曰彗星見亢天子失德四年鍾會鄧艾伐蜀克之二將反亂皆誅咸熙二年五月彗星見王良長丈餘色白東南指積十二日滅占曰王良天子御駟彗星掃之禪代之表除舊布新之象也白色為喪王良在東壁宿又并州之分野八月文帝崩十二月武帝受魏禪武帝泰始四年正月丙戌彗星見軫青白色西北行又轉東行占曰為兵喪軫又楚分野三月皇太后王氏崩十月吳寇江夏襄陽五年九月星孛于紫宮占如上紫宮天子內宮十年武元楊皇后崩十年十二月有星孛于軫占曰天下兵起軫又楚分野咸寧二年六月甲戌星孛于氐占曰天子失德易政氐又兗州分七月星孛大角大角為帝坐八月星孛太微至翼北斗三台占曰太微天子庭大人惡之一曰有改王翼又楚分野北斗主殺罰三台為三公三年正月星孛于西方三月星孛于胃胃徐州分四月星孛女御女御為後宮五月又孛于東方七月星孛紫宮占曰天下易主四年四月蚩尤旗見東井後二年傾三方伐吳是其應也五年三月星孛于柳四月又孛于女御七月孛于紫宮占曰外臣陵主柳又三河分野大角太微紫宮女御並為王者明年吳亡是其應也孛主兵喪征吳之役三河徐兗之兵悉出交戰於吳楚之地吳丞相都督以下梟戮十數偏裨行陳之徒馘斬萬計皆其徵也太康二年八月有星孛于張占曰為兵喪十一月星孛于軒轅占曰後宮當之四年三月戊申星孛于西南是年齊王攸任城王陵琅邪王胄新都王該薨八年九月星孛于南斗長數十丈十餘日滅占曰斗主爵祿國有大憂一曰孛于斗王者疾病天下易政大亂兵起太熙元年四月客星在紫宮占曰為兵喪太康末武帝耽宴遊多疾病是月己酉帝崩永平元年賈后誅楊駿及其黨與皆夷三族楊太后亦見弒又誅汝南王亮太保衛瓘楚王瑋王室兵喪之應也惠帝元康五年四月有星孛于奎至軒轅太微經三台太陵占曰奎為魯又為庫兵軒轅為後宮太微天子庭三台為三司太陵有積尸死喪之事其後武庫火西羌反後五年司空張華遇禍賈后廢死魯公賈謐誅又明年趙王倫篡位於是三王興兵討倫兵士戰死十餘萬人永康元年三月妖星見南方占曰妖星出天下大兵將起是月賈后殺太子趙王倫尋廢殺后斬司空張華又廢帝自立於是三王並起迭總天權其十二月彗星出牽牛之西指天市占曰牛者七政始彗出之改元易號之象也天市一名天府一名天子旗帝坐在其中明年趙王倫篡位改元尋為大兵所滅二年四月彗星見齊分占曰齊有兵喪是時齊王冏起兵討趙王倫倫滅冏擁兵不朝專權淫奢明年誅死太安元年四月彗星晝見二年三月彗星見東方指三台占曰兵喪之象三台為三公三年正月東海王越執太尉長沙王張方又殺之永興元年五月客星守畢占曰天子絶嗣一曰大臣有誅時諸王擁兵其後惠帝失統終無繼嗣二年八月有星孛于昴畢占曰為兵喪昴畢又趙魏分野十月丁丑有星孛于北斗占曰琁璣更授天子出走又曰強國發兵諸侯爭權是後諸王交兵皆有應明年惠帝崩成帝咸和四年七月有星孛于西北犯斗二十三日滅占曰為兵亂十二月郭默殺江州刺史劉胤荊州刺史陶侃討默斬之時石勒又始僭號咸康二年正月辛巳彗星夕見西方在奎占曰為兵喪奎又為邊兵三年正月石季龍僭天王位四年石季龍伐慕容皓不克既退皓追擊之又破麻秋時皓稱蕃邊兵之應也六年二月庚辰有星孛于太微七年三月杜皇后崩康帝建元元年十一月六日彗星見亢長七尺白色占曰亢為朝廷主兵喪二年康帝崩穆帝永和五年十一月乙卯彗星見于亢芒西向色白長一丈六年正月丁丑彗星又見亢占曰為兵喪疾疫其五年八月褚裒北征兵敗十一月冉閔殺石遵又盡殺胡十餘萬人於是中土大亂十二月褚裒薨是年大疫升平二年五月丁亥彗星出天船在胃占曰為兵喪除舊布新出天船外夷侵一曰為大水四年五月天下大水五年穆帝崩哀帝興寧元年八月有星孛于角亢入天市案占曰為兵喪三年正月皇后王氏崩二月帝崩三月慕容恪攻沒洛陽沈徑等戰死海西太和四年二月客星見紫宮西垣至七月乃滅占曰客星守紫宮臣弒主六年桓溫廢帝為海西公孝武寧康二年正月丁巳有星孛于女虛經氐亢角軫翼張至三月丙戌彗星見於氐九月丁丑有星孛于天市占曰為兵喪太元元年七月苻堅破涼州虜張天錫太元十一年三月客星在南斗至六月乃沒占曰有兵有赦是後司雍兗冀常有兵役十二年正月大赦八月又大赦十五年七月壬申有星孛于北河戍經太微三台文昌入北斗色白長十餘丈八月戊戌入紫宮乃滅占曰北河戍一名胡門胡有兵喪掃太微入紫微王者當之三台為三公文昌為將相將相三公有災入北斗諸侯戮一曰掃北斗強國發兵諸侯爭權大人憂二十一年帝崩隆安元年王恭殷仲堪桓玄等並發兵表以誅王國寶為名朝廷順而殺之并斬其從弟緒司馬道子由是失勢禍亂成矣十八年二月客星在尾中至九月乃滅占曰燕有兵喪二十年慕容垂息寶伐魏為所破死者數萬人二十一年垂死國遂衰亡二十年九月有蓬星如粉絮東南行歷女虛至哭星占曰蓬星見不出三年必有亂臣戮死於市是時王國寶交構朝廷二十一年九月帝崩隆安元年王恭等興兵而朝廷殺王國寶王緒安帝隆安四年二月己丑有星孛于奎長三丈上至閣道紫宮西蕃入北斗魁至三台三月遂經于太微帝坐端門占曰彗星掃天子庭閣道易主之象經三台入北斗占同上條十二月戊寅有星孛于貫索天市天津占曰貴臣獄死內外有兵喪天津為賊斷王道天下不通案占災在吳越五年二月有孫恩兵亂攻侵郡國於是內外戒嚴營陳屯守柵斷淮口九月桓玄表至逆旨陵上其後玄遂篡位亂京都大飢人相食百姓流亡皆其應也元興元年十月有客星色白如粉絮在太微西至十二月入太微占曰兵入天子庭二年十二月桓玄篡位放遷帝后於尋陽以永安何皇后為零陵君三年二月劉裕盡誅桓氏義熙十一年五月甲申彗星二出天市掃帝坐在房心北房心宋之分野案占得彗柄者興除舊布新宋興之象十四年五月庚子有星孛于北斗魁中七月癸亥彗星出太微西柄起上相星下芒漸長至十餘丈進掃北斗紫微中台占曰彗出太微社稷亡天下易王入北斗紫微帝宮空十四年劉裕還彭城受宋公十二月帝崩恭帝元年正月戊戌有星孛于太微西蕃占曰革命之徵其年宋有天下星流隕蜀後主建興十三年諸葛亮帥大衆伐魏屯于渭南有長星赤而芒角自東北西南流投亮營三投再還往大還小占曰兩軍相當有大流星來走軍上及墜軍中者皆破敗之徵也九月亮卒于軍焚營而退羣帥交怨多相誅殘魏明帝景初二年宣帝圍公孫文懿於襄平八月丙寅夜有大流星長數十丈白色有芒鬣從首山東北流墜襄平城東南占曰圍城而有流星來走城上及墜城中者破又曰星墜當其下有戰場又曰凡星所墜國易姓九月文懿突圍走至星墜所被斬屠城坑其衆元帝景元四年六月有大流星二並如斗見西方分流南北光照地隆隆有聲案占流星為貴使星大者使大是年鍾鄧克蜀二星蓋二帥之象二帥相背又分流南北之應鍾會既叛三軍憤怒隆隆有聲兵將怒之徵也武帝泰始四年七月星隕如雨皆西流占曰星隕為百姓叛西流吳人歸晉之象也二年吳夏口督孫秀率部曲二千餘人來降太康九年八月壬子星隕如雨劉向傳云下去其上之象後三年帝崩而惠帝立天下自此亂矣惠帝元康四年九月甲午枉矢東北行竟天六年六月丙午夜有枉矢自斗魁東南行案占曰以亂伐亂北斗主執殺出斗魁居中執殺者不直之象也是後趙王殺張裴廢賈后以理太子之冤因自篡盜以至屠滅以亂伐亂之應也一曰氐帥齊萬年反之應也太安二年十一月辛巳有星晝隕中天北下光變白有聲如雷案占名曰營首營首所在下有大兵流血明年劉元海石勒攻略并州多所殘滅王浚起燕代引鮮卑攻掠鄴中百姓塗地有聲如雷怒之象也永興元年七月乙丑星隕有聲二年十月星又隕有聲占同上是後遂亡中夏光熙元年五月枉矢西南流是時司馬越西破河間兵奉迎大駕尋收繆胤何綏等肆無君之心天下惡之及死而石勒焚其尸柩是其應也懷帝永嘉元年九月辛卯有大星如日自西南流于東北小者如斗相隨天盡赤聲如雷占曰流星為貴使星大者使大是年五月汲桑殺東燕王騰遂據河北十一月始遣和郁為征北將軍鎮鄴西田甄等大破汲桑斬于樂陵於是以甄為汲郡太守弟蘭巨鹿太守小星相隨者小將別帥之象也司馬越忿魏郡以東平原以南皆黨於桑以賞甄等於是侵掠赤地有聲如雷忿怒之象也四年十月庚子大星西北墜有聲尋而帝蒙塵于平陽元帝太興三年四月壬辰枉矢出虛危沒翼軫占曰枉矢所觸天下之所伐翼軫荊州之分野太寧二年王敦殺譙王承及甘卓而敦又梟夷枉矢觸翼之應也永昌元年七月甲午有流星大如甕長百餘丈青赤色從西方來尾分為百餘岐或散時王敦之亂百姓流亡之應也成帝咸康三年六月辛未流星大如二斗魁色青赤光耀地出奎中沒婁北案占為飢五穀不藏是月大旱飢六年二月庚午朔有流星大如斗光耀地出天市西行入太微占曰大人當之八年六月成帝崩穆帝永和八年六月辛巳日未入有流星大如三斗魁從辰巳上東南行晷度推之在箕斗之間蓋燕分也案占為營首營首之下流血滂沱是時慕容俊僭稱大燕攻伐無已十年四月癸未流星大如斗色赤黃出織女沒造父有聲如雷占曰燕齊有兵百姓流亡其年十二月慕容俊遂據臨漳盡有幽并青冀之地緣河諸將奔散河津隔絶慕容恪攻齊升平二年十一月枉矢自東南流于西北其長半天四年十月庚戌天狗見西南占曰有大兵流血海西太和四年十月壬申有大流星西下有聲如雷明年遣使免袁真為庶人桓溫征壽春真病死息瑾代立求救於苻堅溫破苻堅軍六年壽春城陷孝武太元六年十月乙卯有奔星東南經翼軫聲如雷占曰楚地有兵軍破百姓流亡十二月苻堅荊州刺史梁成襄陽太守閻震率衆伐竟陵桓石虔擊大破之生擒震斬首七千獲生口萬人聲如雷將帥怒之象也十三年閏月戊辰天狗東北下有聲占曰有大戰流血自是後慕容垂翟遼姚萇苻登慕容永並阻兵爭強十四年正月彭城妖賊又稱偽號於皇丘劉牢之破滅之三月張道破合鄉太山向欽之擊走之安帝隆安五年三月甲寅流星赤色衆多西行經牽牛虛危天津閣道貫太微紫宮占曰星庶人類衆多西行衆將西流之象經天子庭主弱臣強諸侯兵不制其年五月孫恩侵吳郡殺內史六月至京口於是內外戒嚴營陳屯守劉裕追破之元興元年七月大飢人相食浙江以東流亡十六七吳郡吳興戶口減半又流奔而西者萬計十月桓玄遣將擊劉軌破走之軌奔青州雲氣惠帝永興元年十二月壬寅夜有赤氣亙天砰隱有聲二年十月丁丑赤氣見北方東西竟天占曰並為大兵砰隱有聲怒之象也是後四海雲擾九服交兵光熙元年十二月甲申有白氣若虹中天北下至地夜見五日乃滅占曰大兵起明年王彌起青徐汲桑亂河北毒流天下懷帝永嘉三年十一月乙亥有白氣如帶出南北方各二起地至天貫參伐中占曰天下大兵起四年三月司馬越收繆胤等又三方雲擾攻戰不休五年三月司馬越死於宀心平城石勒攻破其衆死者十餘萬人六月京都焚滅帝如虜庭愍帝建興元年十月己巳夜有赤氣曜於西北荊州刺史陶侃討杜韜之黨於石城戰敗
