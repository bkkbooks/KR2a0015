body:
  text: 晉書卷七十四列傳第四十四桓彝子雲雲弟豁豁子石虔虔子振虔弟石秀石民石生石綏石康豁弟祕祕弟沖沖子嗣嗣子胤嗣弟謙謙弟修徐寧桓彝字茂倫譙國龍亢人漢五更榮之九世孫也父皓官至郎中彝少孤貧雖簞瓢處之晏如性通朗早獲盛名有人倫識鑒拔才取士或出於無聞或得之孩抱時人方之許郭少與庾亮深交雅為周顗所重顗嘗歎曰茂倫嶔崎歷落固可笑人也起家州主簿赴齊王冏義拜騎都尉元帝為安東將軍版行逡遒令尋辟丞相中兵屬纍遷中書郎尚書吏部郎名顯朝廷於時王敦擅權嫌忌士望彝以疾去職嘗過輿縣縣宰徐寧字安期通朗博涉彝遇之欣然停留纍日結交而別先是庾亮每屬彝覓一佳吏部及至都謂亮曰為卿得一吏部矣亮問所在彝曰人所應有而不必有人所應無而不必無徐寧真海岱清士因為之即遷吏部郎竟歷顯職明帝將伐王敦拜彝散騎常侍引參密謀及敦平以功封萬寧縣男丹楊尹溫嶠上言宣城阻帶山川頻經變亂宜得望實居之竊謂桓彝可充其選帝手詔曰適得太真表如此今大事新定朝廷須才不有君子其能國乎方今外務差輕欲停此事彝上疏深自撝挹內外之任並非所堪但以墳柏在此郡欲暫結名義遂補彝宣城內史在郡有惠政為百姓所懷蘇峻之亂也彝糾合義衆欲赴朝廷其長史裨惠以郡兵寡弱山人易擾可案甲以須後舉彝厲色曰夫見無禮於其君者若鷹鸇之逐鳥雀今社稷危逼義無晏安乃遣將軍朱綽討賊別帥於蕪湖破之彝尋出石硊會朝廷遣將軍司馬流先據慈湖為賊所破遂長驅徑進彝以郡無堅城遂退據廣德尋王師敗績彝聞而慷慨流涕進屯涇縣時州郡多遣使降峻裨惠又勸彝偽與通和以紓交至之禍彝曰吾受國厚恩義在致死焉能忍垢蒙辱與醜逆通問如其不濟此則命也遣將軍俞縱守蘭石峻遣將韓晃攻之縱將敗左右勸縱退軍縱曰吾受桓侯厚恩本以死報吾之不可負桓侯猶桓侯之不負國也遂力戰而死晃因進軍攻彝彝固守經年勢孤力屈賊曰彝若降者當待以優禮將士多勸彝偽降更思後舉彝不從辭氣壯烈志節不撓城陷為晃所害年五十三時賊尚未平諸子並流迸宣城人紀世和率義故葬之賊平追贈廷尉諡曰簡咸安中改贈太常俞縱亦以死節追贈興古太守初彝與郭璞善嘗令璞筮卦成璞以手壞之彝問其故曰卦與吾同丈夫當此非命如何竟如其言有五子溫雲豁祕沖溫別有傳雲字雲子初為驃騎何充參軍尚書郎不拜襲爵萬寧男歷位建武將軍義成太守遭母憂去職葬畢起為江州刺史稱疾廬於墓次詔書敦逼固辭不行服闋然後蒞職加都督司豫二州軍事領鎮蠻護軍西陽太守假節雲招集衆力志在足兵多所枉濫衆皆嗟怨時溫執權有司不敢彈劾升平四年卒贈平南將軍諡曰貞子序嗣官至宣城內史豁字朗子初辟司徒府祕書郎皆不就簡文帝召為撫軍從事中郎除吏部郎以疾辭遷黃門郎未拜時謝萬敗於梁濮許昌潁川諸城相次陷沒西藩騷動溫命豁督沔中七郡軍事建威將軍新野義成二郡太守擊慕容屈塵破之進號右將軍溫既內鎮以豁監荊揚雍州軍事領護南蠻校尉荊州刺史假節將軍如故時梁州刺史司馬勳以梁益叛豁使其參軍桓羆討之而南陽督護趙弘趙憶等逐太守桓淡據宛城以叛豁與竟陵太守羅崇討破之又攻偽南中郎將趙盤於宛盤退走豁追至魯陽獲之送於京師置戍而旋又監寧益軍事溫薨遷征西將軍進督交廣并前五州軍事苻堅寇蜀豁遣江夏相竺瑤距之廣漢太守趙長等戰死瑤引軍退頃之堅又寇涼州弟沖遣輔國將軍朱序與豁子江州刺史石秀泝流就路稟節度豁遣督護桓羆與序等遊軍沔漢為涼州聲援俄而張天錫陷沒詔遣中書郎王尋之詣豁咨謀邊事豁表以梁州刺史毛憲祖監沔北軍事兗州刺史朱序為南中郎將監沔中軍事鎮襄陽以固北鄙太元初遷征西大將軍開府豁上疏固讓曰臣聞三台麗天辰極以之增耀論道作弼王猷以之時雍必將仰參神契對揚成務弘易簡以翼化暢玄風於宗極故宜明揚仄陋登庸賢雋使版築有沖天之舉渭濱無垂竿之逸用乃功濟蒼生道光千載是以德非時望成典所不虛授功微賞厚賢達不以擬心臣實凡人量無遠致階藉門寵遂叨非據進不能闡揚皇風贊明其政道退不能宣力所蒞混一華戎尸素積載庸績莫紀是以敢冒成命歸陳丹款伏願陛下回神玄覽追收謬眷則具瞻革望臣知所免竟不許及苻堅陷仇池豁以新野太守吉挹行魏興太守督護梁州五郡軍事戍梁州堅陷涪城梁州刺史楊亮益州刺史周仲孫並委戍奔潰豁以威略不振所在覆敗又上疏陳謝固辭不拜開府尋卒時年五十八贈司空本官如故諡曰敬贈錢五十萬布五百匹使者持節監護喪事豁時譽雖不及沖而甚有器度但遇強寇故功業不建初豁聞苻堅國中有謠云誰謂爾堅石打碎有子二十人皆以石為名以應之唯石虔石秀石民石生石綏石康知名石虔小字鎮惡有才幹趫捷絶倫從父在荊州於獵圍中見猛獸被數箭而伏諸督將素知其勇戲令拔箭石虔因急往拔得一箭猛獸跳石虔亦跳高於獸身猛獸伏復拔一箭以歸從溫入關沖為苻健所圍垂沒石虔躍馬赴之拔沖於數萬衆之中而還莫敢抗者三軍歎息威震敵人時有患瘧疾者謂曰桓石虔來以怖之病者多愈其見畏如此初袁真以壽陽叛石虔以寧遠將軍南頓太守帥諸將攻之克其南城又擊苻堅將王鑒於石橋獲馬五百匹除竟陵太守以父憂去職尋而苻堅又寇淮南詔曰石虔文武器幹御戎有方古人絶哭金革弗避況在餘哀豈得辭事可授奮威將軍南平太守尋進冠軍將軍苻堅荊州刺史梁成襄陽太守閻震率衆入寇竟陵石虔與弟石民距之賊阻滶水屯管城石虔設計夜渡水既濟賊始覺力戰破之進克管城擒震斬首七千級俘獲萬人馬數百匹牛羊千頭具裝鎧三百領成以輕騎走保襄陽石虔復領河東太守進據樊城逐堅兗州刺史張崇納降二千家而還沖卒石虔以冠軍將軍監豫州揚州五郡軍事豫州刺史尋以母憂去職服闋復本位久之命移鎮馬頭石虔求停歷陽許之太元十三年卒追贈右將軍追論平閻震功進爵作塘侯第五子誕嗣誕長兄洪襄城太守洪弟振振字道全少果鋭而無行玄為荊州以振為揚武將軍淮南太守轉江夏相以凶橫見黜及玄之敗也桓謙匿於沮中振逃於華容之涌中玄先令將軍王稚徽戍巴陵稚徽遣人報振云桓欽已克京邑馮稚等復平尋陽劉毅諸軍並敗於中路振大喜時安帝在江陵振乃聚黨數十人襲江陵比至城有衆二百謙亦聚衆而出遂陷江陵迎帝於行宮振聞桓升死大怒將肆逆於帝謙苦禁之乃止遂命羣臣辭以楚祚不終百姓之心復歸於晉更奉進璽綬以琅邪王領徐州刺史振為都督八州鎮西將軍荊州刺史帝侍御左右皆振之腹心既而歎曰公昔早不用我遂致此敗若使公在我為前鋒天下不足定今獨作此安歸乎遂肆意酒色暴虐無道多所殘害振營於江津南陽太守魯宗之自襄陽破振將溫楷於柞溪進屯紀南振聞楷敗留其將馮該守營自率衆與宗之大戰振勇冠三軍衆莫能禦宗之敗績振追奔遇宗之單騎於道弗之識也乃問宗之所在紿曰已前走矣宗之於是自後而退尋而劉毅等破馮該平江陵振聞該敗衆潰而走後與該子宏出自溳城軍劉懷肅率寧遠將軍索邈與振戰於沙橋振兵雖少左右皆力戰每軍劉懷肅率寧遠將軍索邈與振戰於沙橋振兵雖少左右皆力戰每一合振輒瞋目奮擊衆莫敢當振時醉且中流矢廣武將軍唐興臨陳斬之石秀幼有令名風韻秀徹博涉羣書尤善老莊常獨處一室簡於應接時人方之庾純甚為簡文帝所重豁為荊州請為鷹揚將軍竟陵太守非其好也尋代叔父沖為寧遠將軍江州刺史領鎮蠻護軍西陽太守居尋陽性放曠常弋釣林澤不以榮爵嬰心善騎射發則命中嘗從沖獵登九井山徒旅甚盛觀者傾坐石秀未嘗屬目止嘯詠而已謝安嘗訪以世務默然不答安甚怪之他日安以語其從弟嗣嗣以問之石秀曰世事此公所諳吾又何言哉在州五年以疾去職年四十三卒於家朝野悼惜之追贈後將軍後改贈太常子稚玉嗣玄之篡也以石秀一門之令封稚玉為臨沅王石民弱冠知名衛將軍謝安引為參軍叔父沖上疏版督荊江豫三州之十郡軍事振武將軍領襄城太守戍夏口與石虔攻苻堅荊州刺史梁成等於竟陵明年又與隨郡太守夏侯澄之破苻堅將慕容垂薑成等於漳口復領譙國內史梁郡太守沖薨詔以石民監荊州軍事西中郎將荊州刺史桓氏世蒞荊土石民兼以才望甚為人情所仰初沖遣竟陵太守趙統伐襄陽至是石民復遣兵助之尋而苻堅敗於淮肥石民遣南陽太守高茂衛山陵時堅雖破敗而慕容垂等復盛石民遣將軍晏謙伐弘農賊東中郎將慕容夔降之始置湖陝二戍獲關中擔幢伎以充太樂時苻堅子丕僭號於河北謀襲洛陽石民遣將軍馮該討之臨陳斬丕及其左僕射王孚吏部尚書苟操等傳首京都而丁零翟遼復侵逼山陵石民使河南太守馮遵討之時乞活黃淮自稱并州刺史與遼共攻長社衆數千人石民復遣南平太守郭銓松滋太守王遐之擊淮斬之遼走河北以前後功進左將軍卒無子石生隆安中以司徒左長史遷侍中歷驃騎太傅長史會稽世子元顯將伐桓玄石生馳書報玄玄甚德之及玄用事以為前將軍江州刺史尋卒於官石綏元顯時為司徒左長史玄用事拜黃門郎左衛將軍玄敗石綏走江西塗中聚衆攻歷陽後為梁州刺史傅歆之所殺石康偏為玄所親愛玄為荊州以為振威將軍纍遷荊州刺史討庾仄功討武陵王事具玄傳祕字穆子少有才氣不倫於俗初拜祕書郎兄溫抑而不用久之為輔國將軍宣城內史時梁州刺史司馬勳叛入蜀祕以本官監梁益二州征討軍事假節勳平還郡後為散騎常侍徙中領軍孝武帝初即位妖賊盧竦入宮祕與左衛將軍殷康俱入擊之溫入朝窮考竦事收尚書陸始等罹罪者甚衆祕亦免官居于宛陵每憤憤有不平之色溫疾篤祕與溫子熙濟等謀共廢沖沖密知之不敢入頃溫氣絶先遣力士拘録熙濟而後臨喪祕於是廢棄遂居於墓所放志田園好遊山水後起為散騎常侍凡三表自陳詔曰祕受遇先朝是以延之而頻有讓表以棲尚告誠兼有疾疢省用增歎可順其所執祕素輕沖沖時貴盛祕恥常侍位卑故不應朝命與謝安書及詩十首辭理可觀其文多引簡文帝之眄遇先沖卒長子蔚官至散騎常侍遊擊將軍玄篡以為醴陵王沖字幼子溫諸弟中最淹識有武幹溫甚器之弱冠太宰武陵王晞辟不就除鷹揚將軍鎮蠻護軍西陽太守從溫征伐有功遷督荊州之南陽襄陽新野義陽順陽雍州之京兆揚州之義成七郡軍事寧朔將軍義成新野二郡太守鎮襄陽又從溫破姚襄及虜周成進號征虜將軍賜爵豐城公尋遷振威將軍江州刺史領鎮蠻護軍西陽譙二郡太守溫之破姚襄也獲襄將張駿楊凝等徙于尋陽沖在江陵未及之職而駿率其徒五百人殺江州督護趙毗掠武昌府庫將妻子北叛沖遣將討獲之遽還所鎮初彝亡後沖兄弟並少家貧母患須羊以解無由得之溫乃以沖為質羊主甚富言不欲為質幸為養買德郎買德郎沖小字也及沖為江州出射羊主於堂邊看沖識之謂曰我買德也遂厚報之頃之進監江荊豫三州之六郡軍事南中郎將假節州郡如故在江州凡十三年而溫薨孝武帝詔沖為中軍將軍都督揚江豫三州軍事揚豫二州刺史假節時詔賻溫錢布漆蠟等物而不及大殮沖上疏陳溫素懷每存清儉且私物足舉凶事求還官庫詔不許沖猶固執不受初溫執權大辟之罪皆自己決沖既蒞事上疏以為生殺之重古今所慎凡諸死罪先上須報沖既代溫居任盡忠王室或勸沖誅除時望專執權衡沖不從謝安以時望輔政為羣情所歸沖懼逼寧康三年乃解揚州自求外出桓氏黨與以為非計莫不扼腕苦諫郗超亦深止之沖皆不納處之淡然不以為恨忠言嘉謀每盡心力於是改授都督徐兗豫青揚五州之六郡軍事車騎將軍徐州刺史以北中郎府并中軍鎮京口假節又詔沖及謝安並加侍中以甲杖五十人入殿時丹楊尹王蘊以后父之重昵於安安意欲出蘊為方伯乃復解沖徐州直以車騎將軍都督豫江二州之六郡軍事自京口遷鎮姑熟既而苻堅寇涼州沖遣宣城內史朱序豫州刺史桓伊率衆向壽陽淮南太守劉波泛舟淮泗乘虛致討以救涼州乃表曰氐賊自并東胡醜類實繁而蜀漢寡弱西涼無備斯誠暴與疾顛只速其亡然而天未剿絶屢為國患臣聞勝於無形功立事表伐謀之道兵之上略況此賊陸梁終必越逸北狄陵縱常在秋冬今日月迅邁高風行起臣輒較量畿甸守衛重復又淮泗通流長江如海荊楚偏遠密邇寇讎方城漢水無天險之實而過備之重勢在西門臣雖凡庸識乏武略然猥荷重任思在投袂請率所統徑進南郡與征西將軍臣豁參同謀猷賊若果驅犬羊送死沔漢庶仰憑正順因致人利一舉乘風掃清氛穢不復重勞王師有事三秦則先帝盛業永隆於聖世宣武遺志無恨於在昔如其懾憚皇威窺計屈則觀兵伺釁更議進取振旅旋旆遲速唯宜伏願陛下覽臣所陳特垂聽許詔答曰醜類違天比年縱肆梁益不守河西傾喪每惟宇內未一憤歎盈懷將軍經略深長思算重復忠國之誠形於義旨覽省未周以感以慨寇雖乘間竊利而以無道臨之黷武窮凶虐用其衆滅亡之期勢何得久然備豫不虞軍之善政輒詢于羣后敬從高算想與征西協參令圖嘉謀遠猷動靜以聞會張天錫陷沒於是罷兵俄而豁卒遷都督江荊梁益寧交廣七州揚州之義成雍州之京兆司州之河東軍事領護南蠻校尉荊州刺史持節將軍侍中如故又以其子嗣為江州刺史沖將之鎮帝餞於西堂賜錢五十萬又以酒三百四十石牛五十頭犒賜文武謝安送至溧洲沖既到江陵時苻堅強盛沖欲移阻江南乃上疏曰自中興以來荊州所鎮隨宜回轉臣亡兄溫以石季龍死經略中原因江陵路便即而鎮之事與時遷勢無常定且兵者詭道示之以弱今宜全重江南輕戍江北南平孱陵縣界地名上明田土膏良可以資業軍人在吳時樂鄉城以上四十餘里北枕大江西接三峽若狂狡送死則舊郢以北堅壁不戰接會濟江路不云遠乘其疲墮撲翦為易臣司存閫外輒隨宜處分於是移鎮上明使冠軍將軍劉波守江陵咨議參軍楊亮守江夏詔以荊州水旱飢荒又沖新移草創歲運米三十萬斛以供軍資須年豐乃止堅遣其將苻融寇樊鄧石越寇魯陽姚萇寇南鄉韋鍾寇魏興所在陷沒沖遣江夏相劉奭南中郎將朱序擊之而奭畏懦不進序又為賊所擒沖深自咎責上疏送章節請解職不許遣左衛將軍張玄之詣沖咨謀軍事沖率前將軍劉波及兄子振威將軍石民冠軍將軍石虔等伐苻堅拔堅築陽攻武當走堅兗州刺史張崇堅遣慕容垂毛當寇鄧城苻熙石越寇新野沖既憚堅衆又以疾疫還鎮上明表以夏口江沔衝要密邇強寇兄子石民堪居此任輒版督荊江十郡軍事振武將軍襄城太守尋陽北接強蠻西連荊郢亦一任之要今府州既分請以王薈補江州刺史詔從之時薈始遭兄劭喪將葬辭不欲出於是衛將軍謝安更以中領軍謝輶代之沖聞之而怒上疏以為輶文武無堪求自領江州帝許之沖使石虔伐堅襄陽太守閻震擒之及大小帥二十九人送於京都詔歸沖府以平震功封次子謙宜陽侯堅使其將郝貴守襄陽沖使揚威將軍朱綽討之遂焚燒沔北田稻拔六百餘戶而還又遣上庸太守郭寶伐堅魏興太守褚垣上庸太守段方並降之新城太守麴常遁走三郡皆平詔賜錢百萬袍表千端初沖之西鎮以賊寇方強故移鎮上明謂江東力弱正可保固封疆自守而已又以將相異宜自以德望不逮謝安故委之內相而四方鎮扞以為己任又與朱序款密俄而序沒於賊沖深用愧惋既而苻堅盡國內侵沖深以根本為慮乃遣精鋭三千來赴京都謝安謂三千人不足以為損益而欲外示間暇聞軍在近固不聽報云朝廷處分已定兵革無闕西藩宜以為防時安已遣兄子玄及桓伊等諸軍沖謂不足以為廢興召佐吏對之歎曰謝安乃有廟堂之量不間將略今大敵垂至方遊談不暇雖遣諸不經事少年衆又寡弱天下事可知吾其左衽矣俄而聞堅破大勳克舉又知朱序因以得還沖本疾病加以慚恥發病而卒時年五十七贈太尉本官如故諡曰宣穆賻錢五十萬布五百匹沖性儉素而謙虛愛士嘗浴後其妻送以新衣沖大怒促令持去其妻復送之而謂曰衣不經新何緣得故沖笑而服之命處士南陽劉驎之為長史驎之不屈親往迎之禮之甚厚又辟處士長沙鄧粲為別駕備禮盡恭粲感其好賢乃起應命初郗鑒庾亮庾翼臨終皆有表樹置親戚唯沖獨與謝安書云妙靈靈寶尚小亡兄寄託不終以此為恨言不及私論者益嘉之及喪下江陵士女老幼皆臨江瞻送號哭盡哀後玄篡位追贈太傅宣城王有七子嗣謙修崇弘羡怡嗣字恭祖少有清譽與豁子石秀並為桓氏子姪之冠沖既代豁西鎮詔以嗣督荊州之三郡豫州之四郡軍事建威將軍江州刺史蒞事簡約修所住齋應作版簷嗣命以茅代之版付船官轉西陽襄城二郡太守鎮夏口後領江夏相卒官追贈南中郎將諡曰靖子胤嗣胤字茂遠少有清操雖奕世華貴甚以恬退見稱初拜祕書丞纍遷中書郎祕書監玄甚欽愛之遷中書令玄篡位為吏部尚書隨玄西奔玄死歸降詔曰夫善著則祚遠勳彰故事殊以宣孟之忠蒙後晉國子文之德世嗣獲存故太尉沖昔藩陝西忠誠王室諸子染凶自貽罪戮念沖遺勤用悽於懷其孫胤宜見矜宥以奬為善可特全生命徙于新安及東陽太守殷仲文永嘉太守駱球等謀反陰欲立胤為玄嗣事覺伏誅謙字敬祖詳正有器望初以父功封宜陽縣開國侯纍遷輔國將軍吳國內史孫恩之亂謙出奔無錫徵拜尚書驃騎大將軍元顯引為咨議參軍轉司馬元興初朝廷將伐玄以桓氏世在陝西謙父沖有遺惠於荊楚懼人情向背乃用謙為持節都督荊益寧梁四州諸軍事西中郎將荊州刺史假節以安荊楚玄既用事以謙為尚書左僕射領吏部加中軍將軍謙兄弟顯列玄甚倚杖之而內不能善也改封謙為寧都侯拜尚書令加散騎常侍遷侍中衛將軍開府録尚書事玄篡位復領揚州刺史本官如故封新安王及桓振作亂謙保護乘輿頗有功焉然而暗磱尤不可以造事初勸振率軍下戰己守江陵振既輕謙用事故不從及振敗謙奔於姚興先是譙縱稱藩於姚興縱與盧循通使潛相影響乃表興請謙共順流東下興問謙謙曰臣門著恩荊楚從弟玄末雖篡位皆是逼迫人神所明今臣與縱東下百姓自應駭動興曰小水不容大舟若縱才力足以濟事亦不假君為鱗翼宜自求多福遂遣之謙至蜀欲虛懷引士縱疑之乃置謙於龍格使人守之謙向諸弟泣曰姚主言神矣後與縱引譙道福俱下謙於道占募百姓感沖遺惠投者二萬人劉道規破謙斬之修字承祖尚簡文帝女武昌公主歷吏部郎稍遷左衛將軍王恭將伐譙王尚之先遣何淡之孫無終向句容修以左衛領振武將軍與輔國將軍陶無忌距之修次句容俄而恭敗無終遣書求降修既旋軍而楊佺期已至石頭時朝廷無備內外崩駭修進説曰殷桓之下專恃王恭恭既破滅莫不失色今若優詔用玄玄必內喜則能制仲堪佺期使並順命朝廷納之以修為龍驤將軍荊州刺史假節權領左衛文武之鎮又令劉牢之以千人送之轉仲堪為廣州修未及發而玄等盟於尋陽求誅牢之尚之并訴仲堪無罪獨被降黜於是詔復仲堪荊州御史中丞江績奏修承受楊佺期之言交通信命宣傳不盡以為身計疑誤朝算請收付廷尉特詔免官尋代王凝之為中護軍頃之玄破仲堪佺期詔以修為征虜將軍江州刺史尋復為中護軍玄執政以修都督六州右將軍徐兗二州刺史假節尋進撫軍將軍加散騎常侍玄篡以為撫軍大將軍封安成王劉裕義旗起斬之徐寧者東海郯人也少知名為輿縣令時廷尉桓彝稱有人倫鑒識彝嘗去職至廣陵尋親舊還遇風停浦中纍日憂悒因上岸見一室宇有似廨署訪之云是輿縣彝乃造之寧清惠博涉相遇欣然因留數夕彝大賞之結交而別至都謂庾亮曰吾為卿得一佳吏部郎語在彝傳即遷吏部郎左將軍江州刺史卒官史臣曰醨風潛煽醇源浸竭遺道德於情性顯忠信於名教首陽高節求仁而得仁泗上微言朝聞而夕死原軫免胄懍然於往策季路絶纓邈矣於前志況交霜雪於杪歲晦風雨於將晨喈響或以變其音貞柯罕能全其性桓茂倫抱中和之氣懷不撓之節邁周庾之清塵遵許郭之遐軌懼臨危於取免知處死之為易揚芬千載之上淪骨九泉之下仁者之勇不其然乎至夫基構迭汙隆龍蛇俱山澤沖逡巡於內輔豁陵厲於上遊虔振北門之威秀坦西陽之務外有扞城之用𩹉無末大之嫌求之名臣抑亦可算而溫為亢極之資玄遂履霜之業是知敬仲之美不息檀臺之亂寧俞之忠無救奕之禍子文之不血食悲夫贊曰矯矯宣城貞心莫陵身隨露夭名與雲興虔豁重世沖秀雙美國賴忠臣家推才子振武謙文尋邑為羣歸之篡亂曷足之云
