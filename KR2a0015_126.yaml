body:
  text: 晉書卷一百二十六載記第二十六禿髮烏孤禿髮烏孤河西鮮卑人也其先與後魏同出八世祖匹孤率其部自塞北遷于河西其地東至麥田牽屯西至濕羅南至澆河北接大漠匹孤卒子壽闐立初壽闐之在孕母胡掖氏因寢而産於被中鮮卑謂被為禿髮因而氏焉壽闐卒孫樹機能立壯果多謀略泰始中殺秦州刺史胡烈於萬斛堆敗涼州刺史蘇愈于金山盡有涼州之地武帝為之旰食後為馬隆所敗部下殺之以降從弟務丸立死孫推斤立死子思復鞬立部衆稍盛烏孤即思復鞬之子也及嗣位務農桑修鄰好呂光遣使署為假節冠軍大將軍河西鮮卑大都統廣武縣侯烏孤謂諸將曰呂氏遠來假授當可受不衆咸曰吾士衆不少何故屬人烏孤將從之其將石真若留曰今本根未固理宜隨時光德刑修明境內無虞若致死于我者大小不敵後雖悔之無所及也不如受而遵養之以待其釁耳烏孤乃受之烏孤討乙弗折掘二部大破之遣其將石亦干築廉川堡以都之烏孤登廉川大山泣而不言石亦干進曰臣聞主憂臣辱主辱臣死大王所為不樂者將非呂光乎光年已衰老師徒屢敗今我以士馬之盛保據大川乃可以一擊百光何足懼也烏孤曰光之衰老亦吾所知但我祖宗以德懷遠殊俗憚威盧陵契汗萬里委順及吾承業諸部背叛邇既乖違遠何以附所以泣耳其將苻渾曰大王何不振旅誓衆以討其罪烏孤從之大破諸部呂光封烏孤廣武郡公又討意云鮮卑大破之光又遣使署烏孤征南大將軍益州牧左賢王烏孤謂使者曰呂王昔以專征之威遂有此州不能以德柔遠惠安黎庶諸子貪淫三甥肆暴郡縣土崩下無生賴吾安可違天下之心受不義之爵帝王之起豈有常哉無道則滅有德則昌吾將順天人之望為天下主留其鼓吹羽儀謝其使而遣之隆安元年自稱大都督大將軍大單于西平王赦其境內年號太初曜兵廣武攻克金城光遣將軍竇苟來伐戰于街亭大敗之降光樂都湟河澆河三郡嶺南羌胡數萬落皆附之光將楊軌王乞基率戶數千來奔烏孤更稱武威王後三歲徙于樂都署弟利鹿孤為驃騎大將軍西平公鎮安夷檀為車騎大將軍廣武公鎮西平以楊軌為賓客金石生時連珍四夷之豪雋陰訓郭幸西州之德望楊統楊貞衛殷麴丞明郭黃郭奮史皓鹿嵩文武之秀傑梁昶韓匹張昶郭韶中州之才令金樹薛翹趙振王忠趙朝蘇霸秦雍之世門皆內居顯位外宰郡縣官方授才咸得其所烏孤從容謂其羣下曰隴右區區數郡地耳因其兵亂分裂遂至十餘乾歸擅命河南段業阻兵張掖虐氐假息偷據姑臧吾藉父兄遺烈思廓清西夏兼弱攻昧三者何先楊統進曰乾歸本我所部終必歸服段業儒生才非經世權臣擅命制不由己千里伐人糧運懸絶且與我鄰好許以分災共患乘其危弊非義舉也呂光衰老嗣紹沖暗二子纂弘雖頗有文武而內相猜忌若天威臨之必應鋒瓦解宜遣車騎鎮浩亹鎮北據廉川乘虛迭出多方以誤之救右則擊其左救左則擊其右使纂疲於奔命人不得安其農業兼弱攻昧於是乎在不出二年可以坐定姑臧姑臧既拔二寇不待兵戈自然服矣烏孤然之遂陰有吞并之志段業為呂纂所侵遣利鹿孤救之纂懼燒氐池張掖穀麥而還以利鹿孤為涼州牧鎮西平追檀入録府國事是歲烏孤因酒墜馬傷脅笑曰幾使呂光父子大喜俄而患甚顧謂羣下曰方難未靜宜立長君言終而死在王位三年偽諡武王廟號烈祖弟利鹿孤立禿髮利鹿孤利鹿孤以隆安三年即偽位赦其境內殊死已下又徙居于西平使記室監麴梁明聘于段業業曰貴主先王創業啓運功高先世宜為國之太祖有子何以不立梁明曰有子羌奴先王之命也業曰昔成王弱齡周召作宰漢昭八歲金霍夾輔雖嗣子沖幼而二叔休明左提右挈不亦可乎明曰宋宣能以國讓春秋美之孫伯符委事仲謀終開有吳之業且兄終弟及殷湯之制也亦聖人之格言萬代之通式何必胤己為是紹兄為非業曰美哉使乎之義也利鹿孤聞呂光死遣其將金樹蘇翹率騎五千屯于昌松漠口既逾年赦其境內改元曰建和二千石長吏清高有惠化者皆封亭侯關內侯呂纂來伐使檀距之纂士卒精鋭進度三堆三軍擾懼檀下馬據胡牀而坐士衆心乃始安與纂戰敗之斬二千餘級纂西擊段業檀率騎一萬乘虛襲姑臧纂弟緯守南北城以自固檀置酒于朱明門上鳴鍾鼓以饗將士耀兵于青陽門虜八千餘戶而歸乞伏乾歸為姚興所敗率騎數百來奔處之晉興待以上賓之禮乾歸遣子謙等質于西平鎮北將軍俱延言於利鹿孤曰乾歸本我之屬國妄自尊立理窮歸命非有款誠若奔東秦必引師西侵非我利也宜徙於乙弗之間防其越逸之路利鹿孤曰吾方弘信義以收天下之心乾歸投誠而徙之四海將謂我不可以誠信託也俄而乾歸果奔于姚興利鹿孤謂延曰不用卿言乾歸果叛卿為吾行也延追乾歸至河不及而還利鹿孤立二年龍見于長寧麒麟遊于綏羌於是羣臣勸進以隆安五年僭稱河西王其將鍮勿崘進曰昔我先君肇自幽朔被髮左衽無冠冕之儀遷徙不常無城邑之制用能中分天下威振殊境今建大號誠順天心然寧居樂土非貽厥之規倉府粟帛生敵人之志且首兵始號事必無成陳勝項籍前鑒不遠宜置晉人於諸城勸課農桑以供軍國之用我則習戰法以誅未賓若東西有變長算以縻之如其敵強於我徙而以避其鋒不亦善乎利鹿孤然其言於是率師伐呂隆大敗之獲其右僕射楊桓檀謂之曰安寢危邦不思擇木老為囚虜豈曰智也桓曰受呂氏厚恩位忝端二雖洪水滔天猶欲濟彼俱溺實恥為叛臣以見明主檀曰卿忠臣也以為左司馬利鹿孤謂其羣下曰吾無經濟之才忝承業統自負乘在位三載于茲雖夙夜惟寅思弘道化而刑政未能允中風俗尚多凋弊戎車屢駕無闢境之功務進賢彥而下猶蓄滯豈所任非才將吾不明所致也二三君子其極言無諱吾將覽焉祠部郎中史皓對曰古之王者行師以全軍為上破國次之拯溺救焚東征西怨今不以綏寧為先惟以徙戶為務安土重遷故有離叛所以斬將克城土不加廣今取士拔才必先弓馬文章學藝為無用之條非所以來遠人垂不朽也孔子曰不學禮無以立宜建學校開庠序選耆德碩儒以訓胄子利鹿孤善之於是以田玄沖趙誕為博士祭酒以教胄子時利鹿孤雖僭位尚臣姚興楊桓兄經佐命姚萇早死興聞桓有德望徵之利鹿孤餞桓于城東謂之曰本期與卿共成大業事乖本圖分歧之感實情深古人但鯤非溟海無以運其軀鳳非修梧無以晞其翼卿有佐時之器夜光之寶當振纓雲閣耀價連城區區河右未足以逞卿才力善勗日新以成大美桓泣曰臣往事呂氏情節不建陛下宥臣於俘虜之中顯同賢舊每希攀龍附鳳立尺寸之功龍門既開而臣違離公衡之戀豈曰忘之利鹿孤為之流涕遣檀又攻呂隆昌松太守孟禕于顯美克之檀執禕而數之曰見機而作賞之所先守迷不變刑之所及吾方耀威玉門掃平秦隴卿固守窮城稽淹王憲國有常刑於分甘乎禕曰明公開翦河右聲播宇內文德以綏遠人威武以懲不恪況禕蔑爾敢距天命釁鼓之刑禕之分也但忠於彼者亦忠於此荷呂氏厚恩受藩屏之任明公至而歸命恐獲罪於執事惟公圖之檀大悅釋其縛待之客禮徙顯美麗靬二千餘戶而歸嘉禕忠烈拜左司馬禕請曰呂氏將亡聖朝之并河右昭然已定但為人守而不全復忝顯任竊所未安明公之恩聽禕就戮於姑臧死且不朽檀義而許之呂隆為沮渠蒙遜所伐遣使乞師利鹿孤引羣下議之尚書左丞婆衍崘曰今姑臧飢荒殘弊穀石萬錢野無青草資食無取蒙遜千里行師糧運不屬使二寇相殘以乘其釁若蒙遜拔姑臧亦不能守適可為吾取之不宜救也檀曰崘知其一未知其二姑臧今雖虛弊地居形勝河西一都之會不可使蒙遜據之宜在速救利鹿孤曰車騎之言吾之心也遂遣檀率騎一萬救之至昌松而蒙遜已退檀徙涼澤段冢五百餘家而歸利鹿孤寢疾令曰內外多虞國機務廣其令車騎嗣業以成先王之志在位三年而死葬于西平之東南偽諡曰康王弟檀嗣禿髮檀檀少機警有才略其父奇之謂諸子曰檀明識幹藝非汝等輩也是以諸兄不以授子欲傳之於檀及利鹿孤即位垂拱而已軍國大事皆以委之以元興元年僭號涼王遷于樂都改元曰弘昌初乞伏乾歸之在晉興也以世子熾磐為質後熾磐逃歸為追騎所執利鹿孤命殺之檀曰臣子逃歸君父振古通義故魏武善關羽之奔秦昭恕頃襄之逝熾磐雖逃叛孝心可嘉宜垂全宥以弘海嶽之量乃赦之至是熾磐又奔允街檀歸其妻子姚興遣使拜檀車騎將軍廣武公檀大城樂都姚興遣將齊難率衆迎呂隆于姑臧檀攝昌松魏安二戍以避之興涼州刺史王尚遣主簿宗敞來聘敞父燮呂光時自湟河太守入為尚書郎見檀于廣武執其手曰君神爽宏拔逸氣陵雲命世之傑也必當克清世難恨吾年老不及見耳以敞兄弟託君至是檀謂敞曰孤以常才謬為尊先君所見稱每自恐有纍大人水鏡之明及忝家業竊有懷君子詩云中心藏之何日忘之不圖今日得見卿也敞曰大王仁侔魏祖存念先人雖朱暉眄張堪之孤叔向撫汝齊之子無以加也酒酣語及平生檀曰卿魯子敬之儔恨不與卿共成大業耳檀以姚興之盛又密圖姑臧乃去其年號罷尚書丞郎官遣參軍關尚聘于興興謂尚曰車騎投誠獻款為國藩屏擅興兵衆輒造大城為臣之道固若是乎尚曰王侯設險以自固先王之制也所以安人衛衆預備不虞車騎僻在遐藩密邇勍寇南則逆羌未賓西則蒙遜跋扈蓋為國家重門之防不圖陛下忽以為嫌興笑曰卿言是也檀遣其將文支討南羌西虜大破之上表姚興求涼州不許加檀散騎常侍增邑二千戶檀於是率師伐沮渠蒙遜次于氐池蒙遜嬰城固守芟其禾苗至于赤泉而還獻興馬三千匹羊三萬頭興乃署檀為使持節都督河右諸軍事車騎大將軍領護胸奴中郎將涼州刺史常侍公如故鎮姑臧檀率步騎三萬次于五澗興涼州刺史王尚遣辛朝孟禕彭敏出迎尚出自清陽門鎮南文支入自涼風門宗敞以別駕送尚還長安檀曰吾得涼州三千餘家情之所寄唯卿一人奈何捨我去乎敞曰今送舊君所以忠於殿下檀曰吾今新牧貴州懷遠安邇之略為之若何敞曰涼土雖弊形勝之地道由人弘實在殿下段懿孟禕武威之宿望辛朝彭敏秦隴之冠冕裴敏馬輔中州之令族張昶涼國之舊胤張穆邊憲文齊楊班梁嵩趙昌武同飛羽以大王之神略撫之以威信農戰並修文教兼設可以從橫於天下河右豈足定乎檀大悅賜敞馬二十匹於是大饗文武於謙光殿班賜金馬各有差遣西曹從事史皓聘于姚興興謂皓曰車騎坐定涼州衣錦本國其德我乎皓曰車騎積德河西少播英問王威未接投誠萬里陛下官方任才量功授職彝倫之常何德之有興曰朕不以州授車騎者車騎何從得之皓曰使河西雲擾呂氏顛狽者實由車騎兄弟傾其根本陛下雖鴻羅遐被涼州猶在天網之外故征西以周召之重力屈姑臧齊難以王旅之盛勢挫張掖王尚孤城獨守外逼羣狄陛下不連兵十年殫竭中國涼州未易取也今以虛名假人內收大利乃知妙算自天聖與道合雖云遷授蓋亦時宜興悅其言拜騎都尉檀宴羣僚于宣德堂仰視而歎曰古人言作者不居居者不作信矣孟禕進曰張文王築城苑繕宗廟為貽厥之資萬世之業秦師濟河漼然瓦解梁熙據全州之地擁十萬之衆軍敗於酒泉身死于彭濟呂氏以排山之勢王有西夏率土崩離銜璧秦雍寬饒有言富貴無常忽輒易人此堂之建年垂百載十有二主唯信順可以久安仁義可以永固願大王勉之檀曰非君無以聞讜言也檀雖受制于姚興然車服禮章一如王者以宗敞為太府主簿録記室事檀偽遊澆河襲徙西平湟河諸羌三萬餘戶于武興番禾武威昌松四郡徵集戎夏之兵五萬餘人大閲于方亭遂伐沮渠蒙遜入西陝蒙遜率衆來距戰于均石為蒙遜所敗檀率騎二萬運穀四萬石以給西郡蒙遜攻西郡陷之其後檀又與赫連勃勃戰于陽武為勃勃所敗將佐死者十餘人檀與數騎奔南山幾為追騎所得檀懼東西寇至徙三百里內百姓入于姑臧國中駭怨屠各成七兒因百姓之擾也率其屬三百人叛檀於北城推梁貴為盟主貴閉門不應一夜衆至數千殿中都尉張猛大言於衆曰主上陽武之敗蓋恃衆故也責躬悔過明君之義諸君何故從此小人作不義之事殿內武旅正爾相尋目前之危悔將無及衆聞之咸散七兒奔晏然殿中騎將白路等追斬之軍咨祭酒梁裒輔國司馬邊憲等七人謀反檀悉誅之姚興以檀外有陽武之敗內有邊梁之亂遣其尚書郎韋宗來觀釁檀與宗論六國從橫之規三家戰爭之略遠言天命廢興近陳人事成敗機變無窮辭致清辨宗出而歎曰命世大才經綸名教者不必華宗夏士撥煩理亂澄氣濟世者亦未必八索九丘五經之外冠冕之表復自有人車騎神機秀發信一代之偉人由余日磾豈足為多也宗還長安言於興曰涼州雖殘弊之後風化未穨檀權詐多方憑山河之固未可圖也興曰勃勃以烏合之衆尚能破之吾以天下之兵何足克也宗曰形移勢變終始殊途陵人者易敗自守者難攻陽武之役檀以輕勃勃致敗今以大軍臨之必自固求全臣竊料羣臣無檀匹也雖以天威臨之未見其利興不從乃遣其將姚弼及斂成等率步騎三萬來伐又使其將姚顯為弼等後繼遺檀書云遣尚書左僕射齊難討勃勃懼其西逸故令弼等於河西邀之檀以為然遂不設備弼衆至漠口昌松太守蘇霸嬰城固守弼喻霸令降霸曰汝違負盟誓伐委順之藩天地有靈將不祐汝吾寧為涼鬼何降之有城陷斬霸弼至姑臧屯于西苑州人王鍾宋鍾王娥等密為內應候人執其使送之檀欲誅其元首前軍伊力延侯曰今強敵在外內有姦豎兵交勢踧禍難不輕宜悉坑之以安內外檀從之殺五千餘人以婦女為軍賞命諸郡縣悉驅牛羊於野斂成縱兵虜掠檀遣其鎮北俱延鎮軍敬歸等十將率騎分擊大敗之斬首七千餘級姚弼固壘不出檀攻之未克乃斷水上流欲以持久斃之會雨甚堰壞弼軍乃振姚顯聞弼敗兼道赴之軍勢甚盛遣射將孟欽等五人挑戰於涼風門弦未及發材官將軍宋益等馳擊斬之顯乃委罪斂成遣使謝檀引師而歸檀於是僭即涼王位赦其境內改年為嘉平置百官立夫人折掘氏為王后世子武臺為太子録尚書事左長史趙朝右長史郭幸為尚書左右僕射鎮北俱延為太尉鎮軍敬歸為司隸校尉自餘封署各有差遣其左將軍枯木駙馬都尉胡康伐沮渠蒙遜掠臨松人千餘戶而還蒙遜大怒率騎五千至于顯美方亭破車蓋鮮卑而還俱延又伐蒙遜大敗而歸檀將親率衆伐蒙遜趙朝及太史令景保諫曰今太白未出歲星在西宜以自守難以伐人比年天文錯亂風霧不時唯修德責躬可以寧吉檀曰蒙遜往年無狀入我封畿掠我邊疆殘我禾稼吾蓄力待時將報東門之恥今大軍已集卿欲沮衆邪保曰陛下不以臣不肖使臣主察乾象若見事不言非為臣之體天文顯然動必無利檀曰吾以輕騎五萬伐之蒙遜若以騎兵距我則衆寡不敵兼步而來則舒疾不同救右則擊其左赴前則攻其後終不與之交兵接戰卿何懼乎保曰天文不虛必將有變檀怒鎖保而行曰有功當殺汝以徇無功封汝百戶侯既而蒙遜率衆來距戰于窮泉檀大敗單馬奔還景保為蒙遜所擒讓之曰卿明於天文為彼國所任違天犯順智安在乎保曰臣匪為無智但言而不從蒙遜曰昔漢祖困于平城以婁敬為功袁紹敗于官渡而田豐為戮卿策同二子貴主未可量也卿必有婁敬之賞者吾今放卿但恐有田豐之禍耳保曰寡君雖才非漢祖猶不同本初正可不得封侯豈慮禍也蒙遜乃免之至姑臧檀謝之曰卿孤之蓍龜也而不能從之孤之深罪封保安亭侯蒙遜進圍姑臧百姓懲東苑之戮悉皆驚散掘麥田車蓋諸部盡降于蒙遜檀遣使請和蒙遜許之乃遣司隸校尉敬歸及子他為質歸至胡坑逃還他為追兵所執蒙遜徙其衆八千餘戶而歸右衛折掘奇鎮據石驢山以叛檀懼為蒙遜所滅又慮奇鎮克嶺南乃遷于樂都留大司農成公緒守姑臧檀始出城焦諶王侯等閉門作難收合三千餘家保據南城諶推焦朗為大都督龍驤大將軍諶為涼州刺史降于蒙遜鎮軍敬歸討奇鎮於石驢山戰敗死之蒙遜因克姑臧之威來伐檀遣其安北段苟左將軍雲連乘虛出番禾以襲其後徙三千餘家於西平蒙遜圍樂都三旬不克遣使謂檀曰若以寵子為質我當還師檀曰去否任卿兵勢卿違盟無信何質以供蒙遜怒築室返耕為持久之計羣臣固請乃以子安周為質蒙遜引歸吐谷渾樹洛干率衆來伐檀遣其太子武臺距之為洛干所敗檀又將伐蒙遜邯川護軍孟愷諫曰蒙遜初并姑臧凶勢甚盛宜固守伺隙不可妄動不從五道俱進至番禾苕藋掠五千餘戶其將屈右進曰陛下轉戰千里前無完陳徙戶資財盈溢衢路宜倍道旋師早度峻險蒙遜善於用兵士衆習戰若輕軍卒至出吾慮表大敵外逼徙戶內攻危之道也衛尉伊力延曰我軍勢方盛將士勇氣自倍彼徒我騎勢不相及若倍道旋師必捐棄資財示人以弱非計也屈右出而告其諸弟曰吾言不用天命也此吾兄弟死地俄而昏霧風雨蒙遜軍大至檀敗績而還蒙遜進圍樂都檀嬰城固守以子染干為質蒙遜乃歸久之遣安西紇勃耀兵西境蒙遜侵西平徙戶掠牛馬而還邯川護軍孟愷表鎮南湟河太守文支荒酒愎諫不恤政事檀謂伊力延曰今州土傾覆所杖者文支而已將若之何延曰宜召而訓之使改往修來檀乃召文支既到讓之曰二兄英姿早世吾以不才嗣統不能負荷大業顛狽如是胡顏視世雖存若隕庶憑子鮮存衛藉文種復吳卿之謂也聞卿唯酒是耽荒廢庶事吾年已老卿復若斯祖宗之業將誰寄也文支頓首陳謝邯川人衛章等謀殺孟愷南啓乞伏熾磐郭越止之曰孟君寬以惠下何罪而殺之吾寧違衆而死不負君以生乃密告之愷誘章等飲酒殺四十餘人愷懼熾磐軍之至馳告文支文支遣將軍匹珍赴之熾磐軍到城聞珍將至引歸蒙遜又攻樂都二旬不克而還鎮南文支以湟河降蒙遜徙五千餘戶于姑臧蒙遜又來伐檀以太尉俱延為質蒙遜乃引還檀議欲西征乙弗孟愷諫曰連年不收上下飢弊南逼熾磐北迫蒙遜百姓騷動下不安業今遠征雖克後患必深不如結盟熾磐通糴濟難慰喻雜部以廣軍資畜力繕兵相時而動易曰其亡其亡繫於苞桑惟陛下圖之檀曰孤將略地卿無沮衆謂其太子武臺曰今不種多年內外俱窘事宜西行以拯此弊蒙遜近去不能卒來旦夕所慮唯在熾磐彼名微衆寡易以討禦吾不過一月自足周旋汝謹守樂都無使失墜檀乃率騎七千襲乙弗大破之獲牛馬羊四十餘萬熾磐乘虛來襲撫軍從事中郎尉肅言於武臺曰今外城廣大難以固守宜聚國人於內城肅等率諸晉人距戰於外如或不捷猶有萬全武臺曰小賊蕞爾旦夕當走卿何慮之過也武臺懼晉人有二心也乃召豪望有勇謀者閉之於內孟愷泣曰熾磐不道人神同憤愷等進則荷恩重遷退顧妻子之纍豈有二乎今事已急矣人思自效有何猜邪武臺曰吾豈不知子忠實懼餘人脫生慮表以君等安之耳一旬而城潰安西樊尼自西平奔告檀檀謂衆曰今樂都為熾磐所陷男夫盡殺婦女賞軍雖欲歸還無所赴也卿等能與吾藉乙弗之資取契汗以贖妻子者是所望也不爾歸熾磐便為奴僕矣豈忍見妻子在他懷抱中遂引師而西衆多逃返遣鎮北段苟追之苟亦不還於是將士皆散惟中軍紇勃後軍洛肱安西樊尼散騎侍郎陰利鹿在焉檀曰蒙遜熾磐昔皆委質於吾今而歸之不亦鄙哉四海之廣匹夫無所容其身何其痛也蒙遜與吾名齊年比熾磐姻好少年俱其所忌勢皆不濟與其聚而同死不如分而或全樊尼長兄之子宗部所寄吾衆在北者戶垂一萬蒙遜方招懷遐邇存亡繼絶汝其西也紇勃洛肱亦與尼俱吾年老矣所適不容寧見妻子而死遂歸熾磐唯陰利鹿隨之檀謂利鹿曰去危就安人之常也吾親屬皆散卿何獨留利鹿曰臣老母在家方寸實亂但忠孝之義勢不俱全雖不能西哭沮渠申包胥之誠東感秦援展毛遂之操負羈靮而侍陛下者臣之分也惟願開弘遠猷審進止之算檀歎曰知人固未易人亦未易知大臣親戚皆棄我去終始不虧者唯卿一人歲寒不凋見之於卿檀至西平熾磐遣使郊迎待以上賓之禮初樂都之潰也諸城皆降于熾磐檀將尉賢政固守浩亹不下熾磐呼之曰樂都已潰卿妻子皆在吾間孤城獨守何所為也賢政曰受涼王厚恩為國家藩屏雖知樂都已陷妻子為擒先歸獲賞後順受誅然不知主上存亡未敢歸命妻子小事豈足動懷昔羅憲待命晉文亮之文聘後來魏武不責邀一時之榮忘委付之重竊用恥焉大王亦安用之哉熾磐乃遣武臺手書喻政政曰汝為國儲不能盡節面縛於人棄父負君虧萬世之業賢政義士豈如汝乎既而聞檀至左南乃降熾磐以檀為驃騎大將軍封左南公歲餘為熾磐所鴆左右勸檀解藥檀曰吾病豈宜療邪遂死時年五十一在位十三年偽諡景王武臺後亦為熾磐所殺檀少子保周臘于破羌俱延子覆龍鹿孤孫副周烏孤孫承鉢皆奔沮渠蒙遜久之歸魏魏以保周為張掖王覆龍酒泉公破羌西平公副周永平公承鉢昌松公烏孤以安帝隆安元年僭立至檀三世凡十九年以安帝義熙十年滅史臣曰禿髮纍葉酋豪擅強邊服控弦玉塞躍馬金山候滿月而窺兵乘折膠而縱鏑禮容弗被聲教斯阻烏孤納苻渾之策治兵以討不賓鹿孤從史皓之言建學而延胄子遂能開疆河右抗衡強國道由人弘抑此之謂檀承纍捷之鋭藉二昆之資摧呂氏算無遺策取姑臧兵不血刃武略雄圖比蹤前烈既而叨竊重位盈滿易期窮兵以逞其心縱慝自貽其弊地奪於蒙遜勢衄於赫連覆國喪身猶為幸也昔宋殤好戰致災於華督楚靈黷武取殺於乾溪異代同亡其於檀見之矣贊曰禿髮弟兄擅雄羣虜開疆河外清氛西土檀傑出騰駕時英窮兵黷武喪國穨聲
