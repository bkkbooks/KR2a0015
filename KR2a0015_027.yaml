body:
  text: 晉書卷二十七志第十七五行上夫帝王者配德天地叶契陰陽發號施令動關幽顯休咎之徵隨感而作故書曰惠迪吉從逆凶惟影響昔伏羲氏繼天而王受河圖則而畫之八卦是也禹治洪水賜洛書法而陳之洪範是也聖人行其道寶其真自天祐之吉無不利三五已降各有司存爰及殷之箕子在父師之位典斯大範周既克殷以箕子歸武王虛己而問焉箕子對以禹所得雒書授之以垂訓然則河圖雒書相為經緯八卦九章更為表𩹉殷道絶文王演周易周道弊孔子述春秋奉乾坤之陰陽效洪範之休咎天人之道粲然著矣漢興承秦滅學之後文帝時虙生創紀大傳其言五行庶徵備矣後景武之際董仲舒治公羊春秋始推陰陽為儒者之宗宣元之間劉向治穀梁春秋數其禍福傳以洪範與仲舒多所不同至向子歆治左氏傳其言春秋及五行又甚乖異班固據大傳采仲舒劉向劉歆著五行志而傳載眭孟夏侯勝京房谷永李尋之徒所陳行事訖于王莽博通祥變以傅春秋綜而為言凡有三術其一曰君治以道臣輔克忠萬物咸遂其性則和氣應休徵效國以安二曰君違其道小人在位衆庶失常則乖氣應咎徵效國以亡三日人君大臣見災異退而自省責躬修德共禦補過則消禍而福至此其大略也輒舉斯例錯綜時變婉而成章有足觀者及司馬彪纂光武之後以究漢事災眚之説不越前規今採黃初以降言祥異者著于此篇經曰五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡傳曰田獵不宿飲食不享出入不節奪農時及有姦謀則木不曲直説曰木東方也於易地上之木為觀於王事威儀容貌亦可觀者也故行步有佩玉之度登車有和鸞之節三驅之制飲食有享獻之禮出入有名使人以時務在勸農桑謀在安百姓如此則木得其性矣若乃田獵馳騁不反宮室飲食沈湎不顧法度妄興徭役以奪農時作為姦詐以傷人財則木失其性矣蓋工匠之為輪矢者多傷敗及木為變怪是為不曲直魏文帝黃初六年正月雨木冰案劉歆説上陽施不下通下陰施不上達故雨而木為之冰氛氣寒木不曲直也劉向曰冰者陰之盛木者少陽貴臣卿大夫象也此人將有害則陰氣脅木木先寒故得雨而冰也是年六月利成郡兵蔡方等殺太守徐質據郡反太守古之諸侯貴臣有害之應也一説以木冰為木介介者甲兵之象是歲既討蔡方又八月天子自將以舟師征吳戍卒十餘萬連旌數百里臨江觀兵又屬常雨也元帝太興三年二月辛未雨木冰後二年周顗等遇害是陽施不下通也穆帝永和八年正月乙巳雨木冰是年殷浩北伐明年軍敗十年廢黜又曰荀羡殷浩北伐桓溫入關之象也孝武帝太元十四年十二月乙巳雨木冰明年二月王恭為北藩八月庾楷為西藩九月王國寶為中書令尋加領軍將軍十七年殷仲堪為荊州雖邪正異規而終同夷滅是其應也吳孫亮建興二年諸葛恪征淮南後所坐聽事棟中折恪妄興徵役奪農時作邪謀傷國財力故木失其性致毀折也及旋師而誅滅於周易又為棟撓之凶也武帝太康五年五月宣帝廟地陷梁折八年正月太廟殿又陷改作廟築基及泉其年九月遂更營新廟遠致名材雜以銅柱陳協為匠作者六萬人至十年四月乃成十一月庚寅梁又折天戒若曰地陷者分離之象梁折者木不曲直也明年帝崩而王室遂亂惠帝太安二年成都王穎使陸機率衆向京都擊長沙王及軍始引而牙竿折俄而戰敗機被誅穎遂奔潰卒賜死此姦謀之罰木不曲直也元帝太興四年王敦在武昌鈴下儀仗生華如蓮華五六日而萎落此木失其性干寶以為狂華生枯木又在鈴閣之間言威儀之富榮華之盛皆如狂華之發不可久也其後王敦終以逆命加戮其尸一説亦華孽也於周易為枯楊生華桓玄始篡龍旗竿折時玄田獵無度飲食奢恣土木妨農又多姦謀故木失其性天戒若曰旗所以挂三辰章著明也旗竿之折高明去矣玄果敗傳曰棄法律逐功臣殺太子以妾為妻則火不炎上説曰火南方揚光輝為明者也其於王者南面嚮明而治書云知人則哲能官人故堯舜舉羣賢而命之朝遠四佞而放諸野孔子曰浸潤之譖膚受之訴不行焉可謂明矣賢佞分別官人有序帥由舊章敬重功勳殊別嫡庶如此則火得其性矣若乃信道不篤或耀虛偽讒夫昌邪勝正則火失其性矣自上而降及濫炎妄起焚宗廟燒宮館雖興師衆不能救也是為火不炎上魏明帝太和五年五月清商殿災初帝為平原王納河南虞氏為妃及即位不以為后更立典虞車工卒毛嘉女為后后本仄微非所宜升以妾為妻之罰也青龍元年六月洛陽宮鞠室災二年四月崇華殿災延於南閣繕復之至三年七月此殿又災帝問高堂隆此何咎也於禮寧有祈禳之義乎對曰夫災變之發皆所以明教誡也惟率禮修德可以勝之易傳曰上不儉下不節孽火燒其室又曰君高其臺天火為災此人君苟飾宮室不知百姓空竭故天應之以旱火從高殿起也案舊占曰災火之發皆以臺榭宮室為誡今宜罷散作役務從節約清掃所災之處不敢於此有所營造萐莆嘉禾必生此地以報陛下虔恭之德帝不從遂復崇華殿改曰九龍以郡國前後言龍見者九故以為名多棄法度疲衆逞欲以妾為妻之應也吳孫亮建興元年十二月武昌端門災改作端門又災內殿門者號令所出殿者聽政之所是時諸葛恪執政而矜慢放肆孫峻總禁旅而險害終著武昌孫氏尊號所始天戒若曰宜除其貴要之首者恪果喪衆殄人峻授政於綝綝廢亮也或曰孫權毀徹武昌以增太初宮諸葛恪有遷都意更起門殿事非時宜故見災也京房易傳曰君不思道厥妖火燒宮太平元年二月朔建鄴火人之火也是秋孫綝始執政矯以亮詔殺呂據滕胤明年又輒殺朱異棄法律逐功臣之罰也孫休永安五年二月城西門北樓災六年十月石頭小城火燒西南百八十丈是時嬖人張布專擅國勢多行無禮而韋昭盛沖終斥不用兼遣察戰等為內史驚擾州郡致使交址反亂是其咎也孫晧建衡二年三月大火燒萬餘家死者七百人案春秋齊大災劉向以為桓公好內聽女口妻妾數更之罰也時晧制令詭暴蕩棄法度勞臣名士誅斥甚衆後宮萬餘女謁數行其中隆寵佩皇后璽綬者又多矣故有大火武帝太康八年三月乙丑震災西閣楚王所止坊及臨商觀窗十年四月癸丑崇賢殿災十一月庚辰含章鞠室修成堂前廡景坊東屋暉章殿南閣火時有上書曰漢王氏五侯兄弟迭任今楊氏三公並在大位故天變屢見竊為陛下憂之由是楊珧求退是時帝納馮紞之間廢張華之功聽楊駿之讒離衛瓘之寵此逐功臣之罰也明年宮車宴駕其後楚王承竊發之旨戮害二公身亦不免震災其坊又天意乎惠帝元康五年閏月庚寅武庫火張華疑有亂先命固守然後救火是以纍代異寶王莽頭孔子屐漢高祖斷白蛇劍及二百萬人器械一時蕩盡是後愍懷太子見殺之罰也天戒若曰夫設險擊柝所以固其國儲積戎器所以戒不虞今冢嗣將傾社稷將泯禁兵無所復施皇旅又將誰衛帝后不悟終喪四海是其應也張華閻纂皆曰武庫火而氐羌反太子見廢則四海可知八年十一月高原陵火是時賈后凶恣賈謐擅朝惡積罪稔宜見誅絶天戒若曰臣妾之不可者雖親貴莫比猶宜忍而誅之如吾燔高原陵也帝既眊弱而張華又不納裴頠劉卞之謀故后遂與謐殺太子也干寶以為高原陵火太子廢之應漢武帝世高園便殿火董仲舒對與此占同永康元年帝納皇后羊氏后將入宮衣中忽有火衆咸怪之永興元年成都王遂廢后處之金墉城是後還立立而復廢者四又詔賜死荀藩表全之雖來還在位然憂逼折辱終古未聞此孽火之應也永興二年七月甲午尚書諸曹火起延崇禮闥及閣道夫百揆王化之本王者棄法律之應也後清河王覃入嗣不終於位又殺太子之罰也孝懷帝永嘉四年十一月襄陽火燒死者三千餘人是時王如自號大將軍司雍二州牧衆四五萬攻略郡縣此下陵上陽失其節之應也元帝太興中王敦鎮武昌武昌災火起興衆救之救於此而發於彼東西南北數十處俱應數日不絶舊説所謂濫炎妄起雖興師衆不能救之之謂也干寶以為此臣而君行亢陽失節是為王敦陵上有無君之心故災也永昌二年正月癸巳京都大火三月饒安東光安陵三縣火燒七千餘家死者萬五千人明帝太寧元年正月京都火是時王敦威侮朝廷多行無禮內外臣下咸懷怨毒極陰生陽也成帝咸和二年五月京師火康帝建元元年七月庚申吳郡災穆帝永和五年六月震災石季龍太武殿及兩廟端門震災月餘乃滅金石皆盡其後季龍死大亂遂滅亡海西公太和中郗愔為會稽太守六月大旱災火燒數千家延及山陰倉米數百萬斛炎煙蔽天不可撲滅此亦桓溫強盛將廢海西極陰生陽之應也孝武帝寧康元年三月京師風火大起是時桓溫入朝志在陵上少主踐位人懷憂恐此與太寧火事同太元十年正月國子學生因風放火焚房百餘間是後考課不厲賞黜無章蓋有育才之名而無收賢之實此不哲之罰先兆也十三年十二月乙未延賢堂災是月丙申螽斯則百堂及客館驃騎府庫皆災于時朝多弊政衰陵日兆不哲之罰皆有象類主相不悟終至亂亡會稽王道子寵幸尼及姏母各樹用其親戚乃至出入宮掖禮見人主天戒若曰登延賢堂及客館者多非其人故災之也又孝武帝更不立皇后寵幸微賤張夫人夫人驕妬皇子不繁乖螽斯則百之道故災其殿焉道子復賞賜不節故府庫被災斯亦其罰也安帝隆安二年三月龍舟二乘災是水沴火也其後桓玄篡位帝乃播越天戒若曰王者流遷不復御龍舟故災之耳元興元年八月庚子尚書下舍曹火時桓玄遙録尚書故天火示不復居也三年盧循攻略廣州刺史吳隱之閉城固守其十月壬戌夜火起時百姓避寇盈滿城內隱之懼有應賊者但務嚴兵不先救火由是府舍焚蕩燒死者萬餘人因遂散潰悉為賊擒義熙四年七月丁酉尚書殿中吏部曹火九年京都大火燒數千家十一年京都所在大行火災吳界尤甚火防甚峻猶自不絶王弘時為吳郡晝在聽事見天上有一赤物下狀如信幡遙集路南人家屋上火即大發弘知天為之災故不罪火主此帝室衰微之應也傳曰修宮室飾臺榭內淫亂犯親戚侮父兄則稼穡不成説曰土中央生萬物者也其於王者為內事宮室夫婦親屬亦相生者也古者天子諸侯宮廟大小高卑有制后夫人媵妾多少有度九族親疏長幼有序孔子曰禮與其奢也寧儉故禹卑宮室文王刑于寡妻此聖人之所以昭教化也如此則土得其性矣若乃奢淫驕慢則土失其性亡水旱之災而草木百穀不熟是為稼穡不成吳孫晧時常歲無水旱苗稼豐美而實不成百姓以飢闔境皆然連歲不已吳人以為傷露非也案劉向春秋説曰水旱當書不書水旱而曰大無麥禾者土氣不養稼穡不成此其義也晧初遷都武昌尋還建鄴又起新館綴飾珠玉壯麗過甚破壞諸營增廣苑囿犯暑妨農官私疲怠月令季夏不可以興土功晧皆冒之此修宮室飾臺榭之罰也元帝太興二年吳郡吳興東陽無麥禾大飢成帝咸和五年無麥禾天下大飢穆帝永和十年三麥不登十二年大無麥孝武太元六年無麥禾天下大飢安帝元興元年無麥禾天下大飢傳曰好戰攻輕百姓飾城郭侵邊境則金不從革説曰金西方萬物既成殺氣之始也故立秋而鷹隼擊秋分而微霜降其於王事出軍行師把旄杖鉞誓士衆抗威武所以征叛逆止暴亂也詩云有虔執鉞如火烈烈又曰載戢干戈載櫜弓矢動靜應宜説以犯難人忘其死金得其性矣若乃貪欲恣睢務立威勝不重人命則金失其性蓋工冶鑄金鐵冰滯涸堅不成者衆乃為變怪是為金不從革魏時張掖石瑞雖是晉之符命而於魏為妖好攻戰輕百姓飾城郭侵邊境魏氏三祖皆有其事石圖發於非常之文此不從革之異也晉定大業多斃曹氏石瑞文大討曹之應也案劉歆以春秋石言于晉為金石同類也是為金不從革失其性也劉向以為石白色為主屬白祥魏明帝青龍中盛修宮室西取長安金狄承露槃折聲聞數十里金狄泣於是因留霸城此金失其性而為異也吳時歷陽縣有巖穿似印咸云石印封發天下太平孫晧天璽元年印發又陽羡山有石穴長十餘丈晧初修武昌宮有遷都之意是時武昌為離宮班固云離宮與城郭同占飾城郭之謂也其寶鼎三年後晧出東關遣丁奉至合肥建衡三年晧又大舉出華里侵邊境之謂也故令金失其性卒面縛而吳亡惠帝元康三年閏二月殿前六鍾皆出涕五刻止前年賈后殺楊太后於金墉城而賈后為惡不止故鍾出涕猶傷之也永興元年成都伐長沙每夜戈戟鋒有火光如懸燭此輕人命好攻戰金失其性而為光變也天戒若曰兵猶火也不戢將自焚成都不悟終以敗亡懷帝永嘉元年項縣有魏豫州刺史賈逵石碑生金可採此金不從革而為變也五月汲桑作亂羣寇飆起清河王覃為世子時所佩金鈴忽生起如粟者康王母疑不祥毀棄之及後為惠帝太子不終于位卒為司馬越所殺愍帝建興五年石言于平陽是時帝蒙塵亦在平陽故有非言之物而言妖之大者俄而帝為逆胡所弒元帝永昌元年甘卓將襲王敦既而中止及還家多變怪照鏡不見其頭此金失其性而為妖也尋為敦所襲遂夷滅石季龍時鄴城鳳陽門上金鳳皇二頭飛入漳河海西太和中會稽山陰縣起倉鑿地得兩大船滿中錢錢皆輪文大形時日向暮鑿者馳以告官官夜遣防守甚嚴至明旦失錢所在惟有船存視其狀悉有錢處安帝義熙初東陽太守殷仲文照鏡不見其頭尋亦誅翦占與甘卓同也傳曰簡宗廟不禱祠廢祭祀逆天時則水不潤下説曰水北方終藏萬物者也其於人道命終而形藏精神放越聖人為之宗廟以收魂氣春秋祭祀以終孝道王者即位必郊祀天地禱祈神祇望秩山川懷柔百神亡不宗事慎其齋戒致其嚴敬是故鬼神歆饗多獲福助此聖王所以順事陰氣和神人也及至發號施令亦奉天時十二月咸得其氣則陰陽調而終始成如此則水得其性矣若乃不敬鬼神政令逆時水失其性霧水暴出百川逆溢壞鄉邑溺人民及淫雨傷稼穡是為水不潤下京房易傳曰顓事者加誅罰絶理厥災水其水也雨殺人以隕霜大風天黃飢而不損茲謂泰厥大水水殺人避遏有德茲謂狂厥水水流殺人也已水則地生蟲歸獄不解茲謂追非厥水寒殺人追誅不解茲謂不理厥水五穀不收大敗不解茲謂皆陰厥水流入國邑隕霜殺穀董仲舒曰交兵結讐伏尸流血百姓愁怨陰氣盛故大水也魏文帝黃初四年六月大雨霖伊洛溢至津陽城門漂數千家殺人初帝即位自鄴遷洛營造宮室而不起宗廟太祖神主猶在鄴嘗於建始殿饗祭如家人禮終黃初不復還鄴又郊社神祇未有定位此簡宗廟廢祭祀之罰也吳孫權赤烏八年夏茶陵縣鴻水溢出漂二百餘家十三年秋丹楊故鄣等縣又鴻水溢出案權稱帝三十年竟不於建鄴創七廟惟父堅一廟遠在長沙而郊祀禮闕嘉禾初羣臣奏宜郊祀又不許末年雖一南郊而北郊遂無聞焉吳楚之望亦不見秩反祀羅陽妖神以求福助天戒若曰權簡宗廟不禱祠廢祭祀故示此罰欲其感悟也太元元年又有大風涌水之異是冬權南郊宜是鑒咎徵乎還而寢疾明年四月薨一曰權時信納譖訴雖陸遜勳重子和儲二猶不得其終與漢安帝聽讒免楊震廢太子同事也且赤烏中無年不用兵百姓愁怨八年秋將軍馬茂等又圖逆魏明帝景初元年九月淫雨冀兗徐豫四州水出沒溺殺人漂失財産帝自初即位便淫奢極欲多占幼女或奪士妻崇飾宮室妨害農戰觸情恣欲至是彌甚號令逆時飢不損役此水不潤下之應也吳孫亮五鳳元年夏大水亮即位四年乃立權廟又終吳世不上祖宗之號不修嚴父之禮昭穆之數有闕亮及休晧又並廢二郊不秩羣神此簡宗廟不祭祀之罰也又是時孫峻專政陰勝陽之應乎孫休永安四年五月大雨水泉涌溢昔歲作浦里塘功費無數而田不可成士卒死叛或自賊殺百姓愁怨陰氣盛也休又專任張布退盛沖等吳人賊之應也五年八月壬午大雨震電水泉湧溢武帝泰始四年九月青徐兗豫四州大水七年六月大雨霖河洛伊沁皆溢殺二百餘人自帝即尊位不加三后祖宗之號泰始二年又除明堂南郊五帝座同稱昊天上帝一位而已又省先后配地之祀此簡宗廟廢祭祀之罰也咸寧元年九月徐州大水二年七月癸亥河南魏郡暴水殺百餘人閏月荊州郡國五大水流四千餘家去年采擇良家子女露面入殿帝親簡閲務在姿色不訪德行有蔽匿者以不敬論搢紳愁怨天下非之陰盛之應也三年六月益梁二州郡國八暴水殺三百餘人七月荊州大水九月始平郡大水十月青徐兗豫荊益梁七州又大水是時賈充等用事專恣而正人疏外者多陰氣盛也四年七月司冀兗豫荊揚郡國二十大水傷秋稼壞屋室有死者太康二年六月泰山江夏大水泰山流三百家殺六十餘人江夏亦殺人時平吳後王濬為元功而詆劾妄加荀賈為無謀而並蒙重賞收吳姬五千納之後宮此其應也四年七月兗州大水十二月河南及荊揚六州大水五年九月郡國四大水又隕霜是月南安等五郡大水六年四月郡國十大水壞廬舍七年九月郡國八大水八年六月郡國八大水惠帝元康二年有水災五年五月潁川淮南大水六月城陽東莞大水殺人荊揚徐兗豫五州又水是時帝即位已五載猶未郊祀其蒸嘗亦多不親行事此簡宗廟廢祭祀之罰六年五月荊揚二州大水是時賈后亂朝寵樹賈郭女主專政陰氣盛之應也八年五月金墉城井溢漢志成帝時有此妖後王莽僭逆今有此妖趙王倫篡位倫廢帝於此城井溢所在其天意也九月荊揚徐冀豫五州大水是時賈后暴戾滋甚韓謐驕猜彌扇卒害太子旋以禍滅九年四月宮中井水沸溢永寧元年七月南陽東海大水是時齊王冏專政陰盛之應也太安元年七月兗豫徐冀四州水時將相力政無尊主心陰盛故也孝懷帝永嘉四年四月江東大水時王導等潛懷翼戴之計陰氣盛也元帝太興三年六月大水是時王敦內懷不臣傲很陵上此陰氣盛也四年七月又大水永昌二年五月荊州及丹楊宣城吳興壽春大水明帝太寧元年五月丹楊宣城吳興壽春大水是時王敦威權震主陰氣盛故也成帝咸和元年五月大水是時嗣主幼沖母后稱制庾亮以元舅決事禁中陰勝陽故也二年五月戊子京都大水是冬以蘇峻稱兵都邑塗地四年七月丹楊宣城吳興會稽大水是冬郭默作亂荊豫共討之半歲乃定兵役之應也七年五月大水是時帝未親機務政在大臣陰勝陽也咸康元年八月長沙武陵大水穆帝永和四年五月大水五年五月大水六年五月又大水時幼主沖弱母后臨朝又將相大臣各執權政與咸和初同事也七年七月甲辰夜濤水入石頭死者數百人是時殷浩以私忿廢蔡謨遐邇非之又幼主在上而殷桓交惡選徒聚甲各崇私權陰勝陽之應也一説濤水入石頭以為兵占是後殷浩桓溫謝尚荀羡連年征伐百姓愁怨也升平二年五月大水五年四月又大水是時桓溫權制朝廷專征伐陰勝陽也海西太和六年六月京師大水平地數尺浸及太廟朱雀大航纜斷三艘流入大江丹楊晉陵吳郡吳興臨海五郡又大水稻稼蕩沒黎庶飢饉初四年桓溫北伐敗績十喪其九五年又征淮南踰歲乃克百姓愁怨之應也簡文帝咸安元年十二月壬午濤水入石頭明年妖賊盧竦率其屬數百人入殿略取武庫三庫甲仗遊擊將軍毛安之討滅之兵興陰盛之應也孝武帝太元三年六月大水是時帝幼弱政在將相五年五月大水六年六月揚荊江三州大水八年三月始興南康廬陵大水平地五丈十年五月大水自八年破苻堅後有事中州役無寧歲愁怨之應也十三年十二月濤水入石頭毀大航殺人明年慕容氏寇擾司兗鎮戍西北疲於奔命愁怨之應也十五年七月沔中諸郡及兗州大水是時緣河紛爭征戍勤瘁之應也十七年六月甲寅濤水入石頭毀大航漂船舫有死者京口西浦亦濤入殺人永嘉郡潮水湧起近海四縣人多死後四年帝崩而王恭再攻京師京師亦發衆以禦之兵役頻興百姓愁怨之應也十八年六月己亥始興南康廬陵大水深五丈十九年七月荊徐大水傷秋稼二十年六月荊徐又大水二十一年五月癸卯大水是時政事多弊兆庶非之安帝隆安三年五月荊州大水平地三丈去年殷仲堪舉兵向京師是年春又殺郗恢陰盛作威之應也仲堪尋亦敗亡五年五月大水是時會稽王世子元顯作威陵上又桓玄擅西夏孫恩亂東國陰勝陽之應也元興二年十二月桓玄篡位其明年二月庚寅夜濤水入石頭商旅方舟萬計漂敗流斷骸胔相望江左雖頻有濤變未有若斯之甚三月義軍克京都玄敗走遂夷滅之三年二月己丑朔夜濤水入石頭漂沒殺人大航流敗義熙元年十二月己未濤水入石頭二年十二月己未夜濤水入石頭明年駱球父環潛結桓胤殷仲文等謀作亂劉稚亦謀反凡所誅滅數十家三年五月丙午大水四年十二月戊寅濤水入石頭明年王旅北討六年五月丁巳大水乙丑盧循至蔡洲八年六月大水九年五月辛巳大水十年五月丁丑大水戊寅西明門地穿涌水出毀門扇及限亦水沴土也七月乙丑淮北風災大水殺人十一年七月丙戌大水淹漬太廟百官赴救明年王旅北討關河經曰庶用五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作明作哲聰作謀睿作聖休徵曰肅時雨若時暘若哲時燠若謀時寒若聖時風若咎徵曰狂雨若僭暘若豫燠若急寒若霿風若傳曰貌之不恭是謂不肅厥咎狂厥罰雨厥極惡時則有服妖時則有龜孽時則有雞禍時則有下體生上之痾時則有青眚青祥惟金沴木説曰凡草木之類謂之妖妖猶夭胎言尚微也蟲豸之類謂之孽孽則芽孽矣及六畜謂之禍言其著也及人謂之痾痾病貌也言深也甚則有異物生謂之眚自外來謂之祥祥猶禎也氣相傷謂之沴沴猶臨蒞不和意也每一事云時則以絶之言非必俱至或有或亡或在前或在後孝武時夏侯始昌通五經善推五行傳以傳族子夏侯勝下及許商皆以教所賢弟子其傳與劉向同惟劉歆傳獨異貌之不恭是謂不肅肅敬也內曰恭外曰敬人君行己體貌不恭怠慢驕蹇則不能敬萬事失則狂易故其咎狂也上慢下暴則陰氣勝故其罰常雨也水傷百穀衣食不足則姦宄並作故其極惡也一曰人多被刑或形貌醜惡亦是也風俗狂慢變節易度則為剽輕奇怪之服故有服妖水類動故有龜孽於易巽為雞雞有冠距文武之貌而不為威貌氣毀故有雞禍一曰水歲多雞死及為怪亦是也上失威儀則有強臣害君上者故有下體生於上之痾木色青故有青眚青祥凡貌傷者病木氣木氣病則金沴之衝氣相通也於易震在東方為春為木兌在西方為秋為金離在南方為夏為火坎在北方為冬為水春與秋日夜分寒暑平是以金木之氣易以相變故貌傷則致秋陰常雨言傷則致春陽常旱也至於冬夏日夜相反寒暑殊絶水火之氣不得相并故視傷常燠聽傷常寒者其氣然也逆之其極曰惡順之其福曰攸好德劉歆貌傳曰有鱗蟲之孽羊禍鼻痾説以為於天文東方辰為龍星故為鱗蟲於易兌為羊木為金所病故致羊禍與常雨同應此説非是春與秋氣陰陽相敵木病金盛故能相并惟此一事耳禍與妖痾祥眚同類不得獨異魏尚書鄧揚行步弛縱筋不束體坐起傾倚若無手足此貌之不恭也管駱謂之鬼躁鬼躁者凶終之徵後卒誅也惠帝元康中貴遊子弟相與為散髮倮身之飲對弄婢妾逆之者傷好非之者負譏希世之士恥不與焉蓋貌之不恭胡狄侵中國之萌也其後遂有二胡之亂此又失在狂也元康中賈謐親貴數入二宮與儲君遊戲無降下心又嘗因奕爭道成都王穎厲色曰皇太子國之儲二賈謐何敢無禮謐猶不悛故及於禍貌不恭之罰也齊王冏既誅趙王倫因留輔政坐拜百官符敕臺府淫醟專驕不一朝覲此狂恣不肅之咎也天下莫不高其功而慮其亡也冏終弗改遂致夷滅司馬道子於府園內列肆使姬人酤鬻身自貿易干寶以為貴者失位降在皂隸之象也俄而道子見廢以庶人終此貌不恭之應也安帝義熙七年將拜授劉毅世子毅以王命之重當設饗宴親請吏佐臨視至拜日國僚不重白默拜於廄中王人將反命毅方知之大以為恨免郎中令劉敬叔官天戒若曰此惰略嘉禮不肅之妖也其後毅遂被殺焉庶徵雨劉歆以為春秋大雨劉向以為大水魏明帝太和元年秋數大雨多暴卒雷電非常至殺鳥雀案楊阜上疏此雨之罰也時天子居喪不哀出入弋獵無度奢侈繁興奪農時故水失其性而雨為罰太和四年八月大雨霖三十餘日伊洛河漢皆溢歲以凶飢吳孫亮太平二年二月甲寅大雨震電乙卯雪大寒案劉歆説此時當雨而不當大大雨雨之罰也於始震電之明日而雪大寒又常寒之罰也劉向以為既已雷電則雪不當復降皆失時之異也天戒若曰為君失時賊臣將起先震電而後雪者陰見間隙起而勝陽逆弒之禍將成也亮不悟尋見廢此與春秋魯隱同武帝泰始六年六月大雨霖甲辰河洛伊沁水同時並溢流四千九百餘家殺二百餘人沒秋稼千三百六十餘頃太康五年七月任城梁國暴雨害豆麥九月南安郡霖雨暴雪樹木摧折害秋稼是秋魏郡西平郡九縣淮南平原霖雨暴水霜傷秋稼惠帝永寧元年十月義陽南陽東海霖雨淹害秋麥元帝太興三年春雨至于夏是時王敦執權不恭之罰也永昌元年春雨四十餘日晝夜雷電震五十餘日是時王敦興兵王師敗績之應也成帝咸和四年春雨五十餘日雷電是時雖斬蘇峻其餘黨猶據守石頭至其滅後淫雨乃霽咸康元年八月乙丑荊州之長沙攸醴陵武陵之龍陽三縣雨水浮漂屋室殺人損秋稼是時帝幼權在於下服妖魏武帝以天下凶荒資財乏匱始擬古皮辨裁縑帛為白帢以易舊服傅玄曰白乃軍容非國容也干寶以為縞素凶喪之象也名之為帢毀辱之言也蓋革代之後劫殺之妖也魏明帝著繡帽披縹紈半袖常以見直臣楊阜諫曰此禮何法服邪帝默然近服妖也夫縹非禮之色褻服尚不以紅紫況接臣下乎人主親御非法之章所謂自作孽不可禳也帝既不享永年身沒而祿去王室後嗣不終遂亡天下景初元年發銅鑄為巨人二號曰翁仲置之司馬門外案古長人見為國亡長狄見臨洮為秦亡之禍始皇不悟反以為嘉祥鑄銅人以象之魏法亡國之器而於義竟無取焉蓋服妖也尚書何晏好服婦人之服傅玄曰此妖服也夫衣裳之制所以定上下殊內外也大雅云玄袞赤舄鉤膺鏤鍚歌其文也小雅云有嚴有翼共武之服詠其武也若內外不殊王制失服妖既作身隨之亡末嬉冠男子之冠桀亡天下何晏服婦人之服亦亡其家其咎均也吳婦人修容者急束其髮而劘角過于耳蓋其俗自操束太急而廉隅失中之謂也故吳之風俗相驅以急言論彈射以刻薄相尚居三年之喪者往往有致毀以死諸葛患之著正交論雖不可以經訓整亂蓋亦救時之作也孫休後衣服之制上長下短又積領五六而裳居一二干寶曰上饒奢下儉逼上有餘下不足之妖也至孫晧果奢暴恣情於上而百姓雕困於下卒以亡國是其應也武帝泰始初衣服上儉下豐著衣者皆厭紤此君衰弱臣放縱下掩上之象也至元康末婦人出兩襠加乎交領之上此內出外也為車乘者苟貴輕細又數變易其形皆以白篾為純蓋古喪車之遺象也夫乘者君子之器蓋君子立心無事不崇實也干寶以為晉之禍徵也及惠帝踐阼權制在於寵臣下掩上之應也至永嘉末六宮才人流冗沒於戎狄內出外之應也及天下撓亂宰輔方伯多負其任又數改易不崇實之應也泰始之後中國相尚用胡牀貊槃及為羌煮貊炙貴人富室必畜其器吉享嘉會皆以為先太康中又以為桬頭及絡帶袴口百姓相戲曰中國必為胡所破夫毳産於胡而天下以為桬頭帶身袴口胡既三制之矣能無敗乎至元康中氐羌互反永嘉後劉石遂篡中都自後四夷迭據華土是服妖之應也初作屐者婦人頭圓男子頭方圓者順之義所以別男女也至太康初婦人屐乃頭方與男無別此賈后專妬之徵也太康中天下為晉世寧之舞手接杯盤而反覆之歌曰晉世寧舞杯盤識者曰夫樂生人心所以觀事也今接杯盤於手上而反覆之至危之事也杯盤者酒食之器而名曰晉世寧言晉世之士苟偷於酒食之間而知不及遠晉世之寧猶杯盤之在手也惠帝元康中婦人之飾有五兵佩又以金銀瑁之屬為斧鉞戈戟以當笄干寶以為男女之別國之大節故服物異等贄幣不同今婦人而以兵器為飾此婦人妖之甚者於是遂有賈后之事終亡天下是時婦人結髮者既成以繒急束其環名曰擷子紒始自中宮天下化之其後賈后廢害太子之應也元康中天下始相效為烏杖以柱掖其後稍施其鐓住則植之夫木東方之行金之臣也杖者扶體之器烏其頭者尤便用也必旁柱掖者旁救之象也施其金柱則植之言木因於金能孤立也及懷愍之世王室多故而此中都喪敗元帝以藩臣樹德東方維持天下柱掖之應也至社稷無主海內歸之遂承天命建都江外獨立之應也元康太安之間江淮之域有敗屩自聚于道多者至四五十量人或散投坑谷明日視之復如故或云見狸銜聚之干寶以為夫屩者人之賤服處于勞辱黔庶之象也敗者疲弊之象道者四方往來所以交通王命也今敗屩聚于道者象黔庶罷病將相聚為亂以絶王命也太安中發壬午兵百姓怨叛江夏張昌唱亂荊楚從之如流於是兵革歲起服妖也初魏造白帢橫縫其前以別後名之曰顏帢傳行之至永嘉之間稍去其縫名無顏帢而婦人束髮其緩彌甚紒之堅不能自立髮被于額目出而已無顏者愧之言也覆額者慚之貌也其緩彌甚者言天下亡禮與義放縱情性及其終極至于大恥也永嘉之後二帝不反天下愧焉孝懷帝永嘉中士大夫競服生箋單衣識者指之曰此則古者繐衰諸侯所以服天子也今無故服之殆有應乎其後遂有胡賊之亂帝遇害焉元帝太興中兵士以絳囊縛紒識者曰紒者在首為乾君道也囊者坤臣道也今以朱囊縛紒臣道上侵君之象也於是王敦陵上焉舊為羽扇柄者刻木象其骨形列羽用十取全數也自中興初王敦南征始改為長柄下出可捉而減其羽用八識者尤之曰夫羽扇翼之名也創為長柄者將執其柄以制羽翼也改十為八者將未備奪已備也此殆敦之擅權以制朝廷之柄又將以無德之材欲竊非據也是時為衣者又上短帶才至于掖著帽者又以帶縛項下逼上上無地也為袴者直幅為口無殺下大之象尋而王敦謀逆再攻京師海西嗣位忘設豹尾天戒若曰夫豹尾儀服之主大人所以豹變也而海西豹變之日非所宜忘而忘之非主社稷之人故忘其豹尾示不終也尋而被廢焉孝武太元中人不復著帩頭天戒若曰頭者元首帩者助元首為儀飾者也今忽廢之若人君獨立無輔佐以至危亡也至安帝桓玄乃篡位焉舊為屐者齒皆達楄上名曰露卯太元中忽不徹名曰陰卯識者以為卯謀也必有陰謀之事至烈宗末驃騎參軍袁悅之始攬搆內外隆安中遂謀詐相傾以致大亂太元中公主婦女必緩鬢傾髻以為盛飾用髲既多不可戴乃先於木及籠上裝之名曰假髻或名假頭至於貧家不能自辦自號無頭就人借頭遂布天下亦服妖也無幾時孝武晏駕而天下騷動刑戮無數多喪其元至於大殮皆刻木及蠟或縛菰草為頭是假頭之應云桓玄篡立殿上施絳帳鏤黃金為顏四角金龍銜五色羽葆流蘇羣下相謂曰頗類車尋而玄敗此服之妖也晉末皆冠小而衣裳博大風流相放輿臺成俗識者曰上小而下大此禪代之象也尋而宋受終焉雞禍魏明帝景初二年廷尉府中雌雞化為雄不鳴不將干寶曰是歲宣帝平遼東百姓始有與能之義此其象也然晉三后並以人臣終不鳴不將又天意也惠帝元康六年陳國有雞生雄雞無翅既大墜坑而死王隱以為雄者胤嗣子之象坑者母象今雞生無翅墜坑而死此子無羽翼為母所陷害乎於後賈后誣殺愍懷此其應也太安中周玘家雌雞逃承霤中六七日而下奮翼鳴將獨毛羽不變其後有陳敏之事敏雖控制江表終無紀綱文章殆其象也卒為玘所滅雞禍見玘家又天意也京房易傳曰牝雞雄鳴主不榮元帝太興中王敦鎮武昌有雌雞化為雄天戒若曰雌化為雄臣陵其上其後王敦再攻京師孝武太元十三年四月廣陵高平閻嵩家雌雞生無右翅彭城人劉象之家雞有三足京房易傳曰君用婦人言則雞生妖是時主相並用尼媼之言寵賜過厚故妖象見焉安帝隆安元年八月琅邪王道子家青雌雞化為赤雄雞不鳴不將桓玄將篡不能成業之象四年荊州有雞生角角尋墮落是時桓玄始擅西夏狂慢不肅故有雞禍天戒若曰角兵象尋墮落者暫起不終之妖也後皆應也元興二年衡陽有雌雞化為雄八十日而冠萎天戒若曰衡陽桓玄楚國之邦略也及桓玄篡位果八十日而敗此其應也青祥武帝咸寧元年八月丁酉大風折大社樹有青氣出焉此青祥也占曰東莞當有帝者明年元帝生是時帝大父武王封東莞由是徙封琅邪孫盛以為中興之表晉室之亂武帝子孫無孑遺社樹折之應又常風之罰惠帝元康中洛陽南山有虻作聲曰韓尸尸識者曰韓氏將尸也言尸尸者盡死意也其後韓謐誅而韓族殲焉此青祥也金沴木魏文帝黃初七年正月幸許昌許昌城南門無故自崩帝心惡之遂不入還洛陽此金沴木木動之也五月宮車晏駕京房易傳曰上下咸悖厥妖也城門壞元帝太興二年六月吳郡米廡無故自壞天戒若曰夫米廡貨糴之屋無故自壞此五穀踴貴所以無糴賣也是歲遂大飢死者千數焉明帝太寧元年周莚自歸王敦既立其宅宇所起五間六梁一時躍出墜地餘桁猶亙柱頭此金沴木也明年五月錢鳳謀亂遂族滅筵而湖熟尋亦為墟矣安帝元興元年正月丙子會稽王世子元顯將討桓玄建牙竿于揚州南門其東者難立良久乃正近沴妖也而元顯尋為玄所擒三年五月樂賢堂壞時帝嚚眊無樂賢之心故此堂是沴義熙九年五月國子聖堂壞天戒若曰聖堂禮樂之本無故自壞業祚將墜之象未及十年而禪位焉
