body:
  text: 晉書卷三十六列傳第六衛瓘子孫璪玠衛瓘字伯玉河東安邑人也高祖皓漢明帝時以儒學自代郡徵至河東安邑卒因賜所亡地而葬之子孫遂家焉父覬魏尚書瓘年十歲喪父至孝過人性貞靜有名理以明識清允稱襲父爵閿鄉侯弱冠為魏尚書郎時魏法嚴苛母陳氏憂之瓘自請得徙為通事郎轉中書郎時權臣專政瓘優遊其間無所親疏甚為傅嘏所重謂之寧武子在位十年以任職稱纍遷散騎常侍陳留王即位拜侍中持節慰勞河北以定議功增邑戶數歲轉廷尉卿瓘明法理每至聽訟小大以情鄧艾鍾會之伐蜀也瓘以本官持節監艾會軍事行鎮西軍司給兵千人蜀既平艾輒承制封拜會陰懷異志因艾專擅密與瓘俱奏其狀詔使檻車徵之會遣瓘先收艾會以瓘兵少欲令艾殺瓘因加艾罪瓘知欲危己然不可得而距乃夜至成都檄艾所統諸將稱詔收艾其餘一無所問若來赴官軍爵賞如先敢有不出誅及三族比至雞鳴悉來赴瓘唯艾帳內在焉平旦開門瓘乘使者車徑入至成都殿前艾臥未起父子俱被執艾諸將圖欲劫艾整仗趣瓘營瓘輕出迎之偽作表草將申明艾事諸將信之而止俄而會至乃悉請諸將胡烈等因執之囚益州解舍遂發兵反於是士卒思歸內外騷動人情憂懼會留瓘謀議乃書版云欲殺胡烈等舉以示瓘瓘不許因相疑二瓘如厠見胡烈故給使使宣語三軍言會反會逼瓘定議經宿不眠各橫刀膝上在外諸軍已潛欲攻會瓘既不出未敢先發會使瓘慰勞諸軍瓘心欲去且堅其意曰卿三軍主宜自行會曰卿監司且先行吾當後出瓘便下殿會悔遣之使呼瓘瓘辭眩疾動詐仆地比出閣數十信追之瓘至外解服鹽湯大吐瓘素羸便似困篤會遣所親人及醫視之皆言不起會由是無所憚及暮門閉瓘作檄宣告諸軍諸軍並已唱義陵旦共攻會會率左右距戰諸將擊敗之唯帳下數百人隨會繞殿而走盡殺之瓘於是部分諸將羣情肅然鄧艾本營將士復追破檻車出艾還向成都瓘自以與會共陷艾懼為變又欲專誅會之功乃遣護軍田續至綿竹夜襲艾於三造亭斬艾及其子忠初艾之入江由也以續不進將斬之既而赦焉及瓘遣續謂之曰可以報江由之辱矣事平朝議封瓘瓘以克蜀之功羣帥之力二將跋扈自取滅亡雖運智謀而無搴旗之效固讓不受除使持節都督關中諸軍事鎮西將軍尋遷都督徐州諸軍事鎮東將軍增封災陽侯以餘爵封弟實開陽亭侯泰始初轉征東將軍進爵為公都督青州諸軍事青州刺史加征東大將軍青州牧所在皆有政績除征北大將軍都督幽州諸軍事幽州刺史護烏桓校尉至鎮表立平州後兼督之于時幽並東有務桓西有力微並為邊害瓘離間二虜遂致嫌隙於是務桓降而力微以憂死朝廷嘉其功賜一子亭侯瓘乞以封弟未受命而卒子密受封為亭侯瓘六男無爵悉讓二弟遠近稱之纍求入朝既至武帝善遇之俄使旋鎮咸寧初徵拜尚書令加侍中性嚴整以法御下視尚書若參佐尚書郎若掾屬瓘學問深博明習文藝與尚書郎敦煌索靖俱善草書時人號為一臺二妙漢末張芝亦善草書論者謂瓘得伯英筋靖得伯英肉太康初遷司空侍中令如故為政清簡甚得朝野聲譽武帝敕瓘第四子宣尚繁昌公主瓘自以諸生之胄婚對微素抗表固辭不許又領太子少傅加千兵百騎鼓吹之府以日蝕瓘與太尉汝南王亮司徒魏舒俱遜位帝不聽瓘以魏立九品是權時之制非經通之道宜復古鄉舉里選與太尉亮等上疏曰昔聖王崇賢舉善而教用使朝廷德讓野無邪行誠以閭伍之政足以相檢詢事考言必得其善人知名不可虛求故還修其身是以崇賢而俗益穆黜惡而行彌篤斯則鄉舉里選者先王之令典也自茲以降此法陵遲魏氏承顛覆之運起喪亂之後人士流移考詳無地故立九品之制粗且為一時選用之本耳其始造也鄉邑清議不拘爵位褒貶所加足為勸勵猶有鄉論餘風中間漸染遂計資定品使天下觀望唯以居位為貴人棄德而忽道業爭多少於錐刀之末傷損風俗其弊不細今九域同規大化方始臣等以為宜皆蕩除末法一擬古制以土斷定自公卿以下皆以所居為正無復懸客遠屬異土者如此則同鄉鄰伍皆為邑里郡縣之宰即以居長盡除中正九品之制使舉善進才各由鄉論然則下敬其上人安其教俗與政俱清化與法並濟人知善否之教不在交遊即華競自息各求於己矣今除九品則宜準古制使朝臣共相舉任於出才之路既博且可以厲進賢之公心核在位之明暗誠令典也武帝善之而卒不能改惠帝之為太子也朝臣咸謂純質不能親政事瓘每欲陳啓廢之而未敢發後會宴陵雲臺瓘託醉因跪帝牀前曰臣欲有所啓帝曰公所言何耶瓘欲言而止者三因以手撫牀曰此座可惜帝意乃悟因謬曰公真大醉耶瓘於此不復有言賈后由是怨瓘宣尚公主數有酒色之過楊駿素與瓘不平駿復欲自專權重宣若離婚瓘必遜位於是遂與黃門等毀之諷帝奪宣公主瓘慚懼告老遜位乃下詔曰司空瓘年未致仕而遜讓歷年欲及神志未衰以果本情至真之風實感吾心今聽其所執進位太保以公就第給親兵百人置長史司馬從事中郎掾屬及大車官騎麾蓋鼓吹諸威儀一如舊典給廚田十頃園五十畝錢百萬絹五百匹牀帳簟褥主者務令優備以稱吾崇賢之意焉有司又奏收宣付廷尉免瓘位詔不許帝後知黃門虛構欲還復主而宣疾亡惠帝即位復瓘千兵及楊駿誅以瓘録尚書事加緑綟綬劍履上殿入朝不趨給騎司馬與汝南王亮共輔朝政亮奏遣諸王還藩與朝臣廷議無敢應者唯瓘贊其事楚王瑋由是憾焉賈后素怨瓘且忌其方直不得騁己淫虐又聞瓘與瑋有隙遂謗瓘與亮欲為伊霍之事啓帝作手詔使瑋免瓘等官黃門齎詔授瑋瑋性輕險欲騁私怨夜使清河王遐收瓘左右疑遐矯詔咸諫曰禮律刑名台輔大臣未有此比且請距之須自表得報就戮未晚也瓘不從遂與子嶽裔及孫等九人同被害時年七十二二子璪玠時在醫家得免初杜預聞瓘殺鄧艾言於衆曰伯玉其不免乎身為名士位居總帥既無德音又不御下以正是小人而乘君子之器當何以堪其責乎瓘聞之不俟駕而謝終如預言初瓘家人炊飯墮地盡化為螺歲餘而及禍太保主簿劉繇等冒難收瓘而葬之初瓘為司空時帳下督榮晦有罪瓘斥遣之及難作隨兵討瓘故子孫皆及于禍楚王瑋之伏誅也瓘女與國臣書曰先公名諡未顯無異凡人每怪一國蔑然無言春秋之失其咎安在悲憤感慨故以示意於是繇等執黃幡撾登聞鼓上言曰初矯詔者至公承詔當免即便奉送章綬雖有兵仗不施一刃重敕出第單車從命如矯詔之文唯免公官右軍以下即承詐偽違其本文輒戮宰輔不復表上橫收公子孫輒皆行刑賊害大臣父子九人伏見詔書為楚王所誑誤非本同謀者皆弛遣如書之旨謂里舍人被驅逼齎白杖者耳律受教殺人不得免死況乎手害功臣賊殺忠良雖云非謀理所不赦今元惡雖誅殺賊猶存臣懼有司未詳事實或有縱漏不加精盡使公父子讐賊不滅冤魂永恨訴於穹蒼酷痛之臣悲於明世臣等身被創痍殯斂始訖謹條瓘前在司空時帳下給使榮晦無情被黜知瓘家人數小孫名字晦後轉給右軍其夜晦在門外揚聲大呼宣詔免公還第及門開晦前到中門復讀所齎偽詔手取公章綬貂蟬催公出第晦按次録瓘家口及其子孫皆兵仗將送著東亭道北圍守一時之間便皆斬斫害公子孫實由於晦及將人劫盜府庫皆晦所為考晦一人衆姦皆出乞驗盡情偽加以族誅詔從之朝廷以瓘舉門無辜受禍乃追瓘伐蜀勳封蘭陵郡公增邑三千戶諡曰成贈假黃鉞字巨山少辟司空齊王府轉太子舍人尚書郎祕書丞太子庶子黃門郎善草隸書為四體書勢曰昔在黃帝創制造物有沮誦倉頡者始作書契以代結繩蓋覩鳥迹以興思也因而遂滋則謂之字有六義焉一曰指事上下是也二曰象形日月是也三曰形聲江河是也四曰會意武信是也五曰轉注老考是也六曰假借令長是也夫指事者在上為上在下為下象形者日滿月虧效其形也形聲者以類為形配以聲也會意者止戈為武人言為信也轉注者以老壽考也假借者數言同字其聲雖異文意一也自黃帝至三代其文不改及秦用篆書焚燒先典而古文絶矣漢武時魯恭王壞孔子宅得尚書春秋論語孝經時人以不復知有古文謂之科斗書漢世祕藏希得見之魏初傳古文者出於邯鄲淳祖敬侯寫淳尚書後以示淳而淳不別至正始中立三字石經轉失淳法因科斗之名遂效其形太康元年汲縣人盜發魏襄王冢得策書十餘萬言案敬侯所書猶有髣佛古書亦有數種其一卷論楚事者最為工妙竊悅之故竭愚思以贊其美愧不足廁前賢之作冀以存古人之象焉古無別名謂之字勢云黃帝之史沮誦倉頡眺彼鳥迹始作書契紀綱萬事垂法立制帝典用宣質文著世爰暨暴秦滔天作戾大道既泯古文亦滅魏文好古世傳丘墳歷代莫發真偽靡分大晉開元弘道敷訓天垂其象地耀其文其文乃耀粲矣其章因聲會意類物有方日處君而盈其度月執臣而虧其旁雲委冮而上布星離離以舒光禾卉苯以垂穎山嶽峨嵯而連岡蟲跂跂其若動鳥似飛而未揚觀其錯筆綴墨用心精專勢和體均發止無間或守正循檢矩折規旋或方員靡則因事制權其曲如弓其直如弦矯然特出若龍騰于川森爾下穨若雨墜于天或引筆奮力若鴻雁高飛邈邈翩翩或縱肆阿那若流蘇懸羽靡靡綿綿是故遠而望之若翔風厲水清波漪漣就而察之有若自然信黃唐之遺迹為六藝之範先籀篆蓋其子孫隸草乃其曾玄覩物象以致思非言辭之可宣昔周宣王時史籀始著大篆十五篇或與古同或與古異世謂之籀書者也及平王東遷諸侯力政家殊國異而文字乖形秦始皇帝初兼天下丞相李斯乃奏益之罷不合秦文者斯作倉頡篇中車府令趙高作爰歷篇太史令胡毋敬作博學篇皆取史籀大篆或頗省改所謂小篆者或曰下土人程邈為衙獄吏得罪始皇幽繫雲陽十年從獄中作大篆少者增益多者損減方者使員員者使方奏之始皇始皇善之出以為御史使定書或曰邈所定乃隸字也自秦壞古文有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書王莽時使司空甄豐校文字部改定古文復有六書一曰古文孔氏壁中書也二曰奇字即古文而異者也三曰篆書秦篆書也四曰佐書即隸書也五曰繆篆所以摹印也六曰鳥書所以書幡信也及許慎撰説文用篆書為正以為體例最可得而論也秦時李斯號為二篆諸山及銅人銘皆斯書也漢建初中扶風曹喜少異於斯而亦稱善邯鄲淳師焉略究其妙韋誕師淳而不及也太和中誕為武都太守以能書留補侍中魏氏寶器銘題皆誕書也漢末又有蔡雍采斯喜之法為古今雜形然精密間理不如淳也雍作篆勢曰鳥遺迹皇頡循聖作則制斯文體有六篆為真形要妙巧入神或龜文針列櫛比龍鱗紓體放尾長短復身穨若黍稷之垂穎蘊若蟲蛇之焚縕揚波振撇鷹跱鳥震延頸脅翼勢似陵雲或輕筆內投微本濃末若絶若連似水露緑絲凝垂下端從者如懸衡者如編杳杪邪趣不方不員若行若飛跂跂翾翾遠而望之象鴻鵠羣遊駱驛遷延迫而視之端際不可得見指撝不可勝原研桑不能數其詰屈離婁不能覩其郤間般倕揖讓而辭巧籀誦拱手而韜翰處篇籍之首目粲斌斌其可觀摛華艷於紈素為學藝之範先喜文德之弘懿慍作者之莫刊思字體之俯仰舉大略而論旃秦既用篆奏事繁多篆字難成即令隸人佐書曰隸字漢因行之獨符印璽幡信題署用篆隸書者篆之捷也上谷王次仲始作楷法至靈帝好書時多能者而師宜官為最大則一字徑丈小則方寸千言甚矜其能或時不持錢詣酒家飲因書其壁顧觀者以酬酒討錢足而滅之每書輒削而焚其柎梁鵠乃益為版而飲之酒候其醉而竊其柎鵠卒以書至選部尚書宜官後為袁術將今巨鹿宋子有耿球碑是術所立其書甚工云是宜官也梁鵠奔劉表魏武帝破荊州募求鵠鵠之為選部也魏武欲為洛陽令而以為北部尉故懼而自縳詣門署軍假司馬在祕書以勤書自效是以今者多有鵠手迹魏武帝懸著帳中及以釘壁玩之以為勝宜官今宮殿題署多是鵠篆鵠宜為大字邯鄲淳宜為小字鵠謂淳得次仲法然鵠之用筆盡其勢矣鵠弟子毛弘教於祕書今八分皆弘法也漢末有左子邑小與淳鵠不同然亦有名魏初有鍾胡二家為行書法俱學之於劉德升而鍾氏小異然亦各有巧今大行於世云作隸勢曰鳥迹之變乃惟佐隸蠲彼繁文崇此簡易厥用既弘體象有度煥若星陳鬱若雲布其大徑尋細不容髮隨事從宜靡有常制或穹隆恢廓或櫛比針列或砥平繩直或冝蜒膠戾或長邪角趣或規旋矩折修短相副異體同勢奮筆輕舉離而不絶纖波濃點錯落其間若鍾簴設張庭燎飛煙巖玄嵯高下屬連似崇臺重宇增雲冠山遠而望之若飛龍在天近而察之心亂目眩奇姿譎詭不可勝原研桑所不能計宰賜所不能言何草篆之足算而斯文之未宣豈體大之難覩將祕奧之不傳聊俯仰而詳觀舉大較而論旃漢興而有草書不知作者姓名至章帝時齊相杜度號善作篇後有崔瑗崔實亦皆稱工杜氏殺字甚安而書體微瘦崔氏甚得筆勢而結字小疏弘農張伯英者因而轉精甚巧凡家之衣帛必書而後練之臨池學書池水盡黑下筆必為楷則號匆匆不暇草書寸紙不見遺至今世尤寶其書韋仲將謂之草聖伯英弟文舒者次伯英又有薑孟穎梁孔達田彥和及韋仲將之徒皆伯英弟子有名於世然殊不及文舒也羅叔景趙元嗣者與伯英並時見稱於西州而矜巧自與衆頗惑之故英自稱上比崔杜不足下方羅趙有餘河間張超亦有名然雖與崔氏同州不如伯英之得其法也崔瑗作草書勢曰書契之興始自頡皇寫彼鳥迹以定文章爰暨末葉典籍彌繁時之多僻政之多權官事荒蕪剿其墨翰惟作佐隸舊字是刪草書之法蓋又簡略應時諭指用於卒迫兼功並用愛日省力純儉之變豈必古式觀其法象俯仰有儀方不中矩員不副規抑左揚右望之若崎竦企鳥跱志在飛移狡獸暴駭將奔未馳或鰂鞀點姊狀似連珠絶而不離畜怒怫鬱放逸生奇或凌邃惴栗若據稿臨危旁點邪附似蜩螳挶枝絶筆收勢餘綖糾結若杜伯揵毒緣巇螣蛇赴穴頭沒尾垂是故遠而望之偄焉若沮岑崩崖就而察之一畫不可移機微要妙臨時從宜略舉大較髣佛若斯及瓘為楚王瑋所構聞變以何劭嫂之父也從牆孔中詣之以問消息劭知而不告還經廚下收人正食因而遇害後贈長水校尉諡蘭陵貞世子二子璪玠璪字仲寶襲瓘爵後東海王越以蘭陵益其國改封江夏郡公邑八千五百戶懷帝即位為散騎侍郎永嘉五年沒於劉聰元帝以瓘玄孫崇嗣玠字叔寶年五歲風神秀異祖父瓘曰此兒有異於衆顧吾年老不見其成長耳總角乘羊車入市見者皆以為玉人觀之者傾都驃騎將軍王濟玠之舅也俊爽有風姿每見玠輒歎曰珠玉在側覺我形穢又嘗語人曰與玠同遊冏若明珠之在側朗然照人及長好言玄理其後多病體羸母禁其語遇有勝日親友時請一言無不咨嗟以為入微琅邪王澄有高名少所推服每聞玠言輒嘆息絶倒故時人為之語曰衛玠談道平子絶倒澄及王玄王濟並有盛名皆出玠下世云王家三子不如衛家一兒玠妻父樂廣有海內重名議者以為婦公冰清女壻玉潤辟命屢至皆不就久之為太傅西閣祭酒拜太子洗馬璪為散騎侍郎內侍懷帝玠以天下大亂欲移家南行母曰我不能舍仲寶去也玠啓諭深至為門戶大計母涕泣從之臨別玠謂兄曰在三之義人之所重今可謂致身之日兄其勉之乃扶輿母轉至江夏玠妻先亡征南將軍山簡見之甚相欽重簡曰昔戴叔鸞嫁女唯賢是與不問貴賤況衛氏權貴門戶令望之人乎於是以女妻焉遂進豫章是時大將軍王敦鎮豫章長史謝鯤先雅重玠相見欣然言論彌日敦謂鯤曰昔王輔嗣吐金聲於中朝此子復玉振於江表微言之緒絶而復續不意永嘉之末復聞正始之音何平叔若在當復絶倒玠嘗以人有不及可以情恕非意相干可以理遣故終身不見喜慍之容以王敦豪爽不羣而好居物上恐非國之忠臣求向建鄴京師人士聞其姿容觀者如堵玠勞疾遂甚永嘉六年卒時年二十七時人謂玠被看殺葬於南昌謝鯤哭之慟人問曰子有何恤而致斯哀答曰棟梁折矣不覺哀耳咸和中改塋於江寧丞相王導教曰衛洗馬明當改葬此君風流名士海內所瞻可修薄祭以敦舊好後劉惔謝尚共論中朝人士或問杜可方衛洗馬不尚曰安得相比其間可容數人惔又云杜膚清叔寶神清其為有識者所重若此于時中興名士唯王承及玠為當時第一云族弟展字道舒歷尚書郎南陽太守永嘉中為江州刺史纍遷晉王大理詔有考子證父或鞭父母問子所在展以為恐傷正教並奏除之中興建為廷尉上疏宜復肉刑語在刑法志卒贈光祿大夫張華子禕韙劉卞張華字茂先范陽方城人也父平魏漁陽郡守華少孤貧自牧羊同郡盧欽見而器之鄉人劉放亦奇其才以女妻焉華學業優博辭藻溫麗朗贍多通圖緯方伎之書莫不詳覽少自修謹造次必以禮度勇於赴義篤於周急器識弘曠時人罕能測之初未知名著鷦鷯賦以自寄其詞曰何造化之多端播羣形於萬類惟鷦鷯之微禽亦攝生而受氣育翩翾之陋體無玄黃以自貴毛無施於器用肉不登乎俎味鷹鸇過猶戢翼尚何懼於罿罻翳薈蒙籠是焉遊集飛不飄揚翔不翕集其居易容其求易給巢林不過一枝每食不過數粒栖無所滯遊無所盤匪陋荊棘匪榮茝蘭動翼而逸投足而安委命順理與物無患伊茲禽之無知而處身之似智不懷寶以賈害不飾表以招纍靜守性而不矜動因循而簡易任自然以為資無誘慕於世偽雕鶡介其觜距鵠鷺軼於雲際鵾雞竄於幽險孔翠生乎遐裔彼晨鳧與歸雁又矯翼而增逝咸美羽而豐肌故無罪而皆斃徒銜蘆以避繳終為戮於此世蒼鷹鷙而受紲鸚鵡慧而入籠屈猛志以服養塊幽縶於九重變音聲以順旨思摧翮而為庸戀鍾岱之林野慕隴坻之高松雖蒙幸於今日未若疇昔之從容海鳥爰居避風而至條支巨爵踰嶺自致提挈萬里飄颻逼畏夫惟體大妨物而形瓌足偉也陰陽陶蒸萬品一區巨細舛錯種繁類殊鷦冥巢於蚊睫大鵬彌乎天隅將以上方不足而下比有餘普天壤而遐觀吾又安知大小之所如陳留阮籍見之歎曰王佐之才也由是聲名始著郡守鮮于嗣薦華為太常博士盧欽言之於文帝轉河南尹丞未拜除佐著作郎頃之遷長史兼中書郎朝議表奏多見施用遂即真晉受禪拜黃門侍郎封關內侯華強記默識四海之內若指諸掌武帝嘗問漢宮室制度及建章千門萬戶華應對如流聽者忘倦畫地成圖左右屬目帝甚異之時人比之子産數歲拜中書令後加散騎常侍遭母憂哀毀過禮中詔勉勵逼令攝事初帝潛與羊祜謀伐吳而羣臣多以為不可唯華贊成其計其後祜疾篤帝遣華詣祜問以伐吳之計語在祜傳及將大舉以華為度支尚書乃量計運漕決定廟算衆軍既進而未有克獲賈充等奏誅華以謝天下帝曰此是吾意華但與吾同耳時大臣皆以為未可輕進華獨堅執以為必克及吳滅詔曰尚書關內侯張華前與故太傅羊祜共創大計遂典掌軍事部分諸方算定權略運籌決勝有謀謨之勳其進封為廣武縣侯增邑萬戶封子一人為亭侯千五百戶賜絹萬匹華名重一世衆所推服晉史及儀禮憲章並屬於華多所損益當時詔誥皆所草定聲譽益盛有台輔之望焉而荀勗自以大族恃帝恩深憎疾之每伺間隙欲出華外鎮會帝問華誰可託寄後事者對曰明德至親莫如齊王攸既非上意所在微為忤旨間言遂行乃出華為持節都督幽州諸軍事領護烏桓校尉安北將軍撫納新舊戎夏懷之東夷馬韓新彌諸國依山帶海去州四千餘里歷世未附者二十餘國並遣使朝獻於是遠夷賓服四境無虞頻歲豐稔士馬強盛朝議欲徵華入相又欲進號儀同初華毀徵士馮恢於帝紞即恢之弟也深有寵於帝紞嘗侍帝從容論魏晉事因曰臣竊謂鍾會之釁頗由太祖帝變色曰卿何言邪紞免冠謝曰臣愚冗瞽言罪應萬死然臣微意猶有可申帝曰何以言之紞曰臣以為善御者必識六轡盈縮之勢善政者必審官方控帶之宜故仲由以兼人被抑冉求以退弱被進漢高八王以寵過夷滅光武諸將由抑損克終非上有仁暴之殊下有愚智之異蓋抑揚與奪使之然耳鍾會才見有限而太祖誇奬太過嘉其謀猷盛其名器居以重勢委以大兵故使會自謂算無遺策功在不賞輈張跋扈遂搆凶逆耳向令太祖録其小能節以大禮抑之以權勢納之以軌則則亂心無由而生亂事無由而成矣帝曰然紞稽首曰陛下既已然微臣之言宜思堅冰之漸無使如會之徒復致覆喪帝曰當今豈有如會者乎紞曰東方朔有言談何容易易曰臣不密則失身帝乃屏左右曰卿極言之紞曰陛下謀謨之臣著大功於天下海內莫不聞知據方鎮總戎馬之任者皆在陛下聖慮矣帝默然頃之徵華為太常以太廟屋棟折免官遂終帝之世以列侯朝見惠帝即位以華為太子少傅與王戎裴楷和嶠俱以德望為楊駿所忌皆不與朝政及駿誅後將廢皇太后會羣臣於朝堂議者皆承望風旨以為春秋絶文薑今太后自絶於宗廟亦宜廢黜惟華議以為夫婦之道父不能得之於子子不能得之於父皇太后非得罪於先帝者也今黨其所親為不母於聖世宜依漢廢趙太后為孝成后故事貶太后之號還稱武皇后居異宮以全貴終之恩不從遂廢太后為庶人楚王瑋受密詔殺太宰汝南王亮太保衛瓘等內外兵擾朝廷大恐計無所出華白帝以瑋矯詔擅害二公將士倉卒謂是國家意故從之耳今可遣騶虞幡使外軍解嚴理必風靡上從之瑋兵果敗及瑋誅華以首謀有功拜右光祿大夫開府儀同三司侍中中書監金章紫綬固辭開府賈謐與后共謀以華庶族儒雅有籌略進無逼上之嫌退為衆望所依欲倚以朝綱訪以政事疑而未決以問裴頠頠素重華深贊其事華遂盡忠匡輔彌縫補闕雖當暗主虐后之朝而海內晏然華之功也華懼后族之盛作女史針以為諷賈后雖凶妒而知敬重華久之論前後忠勳進封壯武郡公華十餘讓中詔敦譬乃受數年代下邳王晃為司空領著作及賈后謀廢太子左衛率劉卞甚為太子所信遇每會宴卞必預焉屢見賈謐驕傲太子恨之形于言色謐亦不能平卞以賈后謀問華華曰不聞卞曰卞以寒悴自須昌小吏受公成拔以至今日士感知己是以盡言而公更有疑於卞邪華曰假令有此君欲如何卞曰東宮俊如林四率精兵萬人公居阿衡之任若得公命皇太子因朝入録尚書事廢賈后於金墉城兩黃門力耳華曰今天子當陽太子人子也吾又不受阿衡之命忽相與行此是無其君父而以不孝示天下也雖能有成猶不免罪況權戚滿朝威柄不一而可以安乎及帝會羣臣於式乾殿出太子手書遍示羣臣莫敢有言者惟華諫曰此國之大禍自漢武以來每廢黜正嫡至喪亂且國家有天下日淺願陛下詳之尚書左僕射裴頠以為宜先檢校傳書者又請比校太子手書不然恐有詐妄賈后乃內出太子素啓事十餘紙衆人比視亦無敢言非者議至日西不決后知華等意堅因表乞免為庶人帝乃可其奏初趙王倫為鎮西將軍撓亂關中氐羌反叛乃以梁王肜代之或説華曰趙王貪昧信用孫秀所在為亂而秀變詐姦人之雄今可遣梁王斬秀刈趙之半以謝關右不亦可乎華從之肜許諾秀友人辛冉從西來言於肜曰氐羌自反非秀之為故得免死倫既還諂事賈后因求録尚書事後又求尚書令華與裴頠皆固執不可由是致怨倫秀疾華如讎武庫火華懼因此變作列兵固守然後救之故纍代之寶及漢高斬蛇劍王莽頭孔子屐等盡焚焉時華見劍穿屋而飛莫知所向初華所封壯武郡有桑化為柏識者以為不祥又華第舍及監省數有妖怪少子韙以中台星坼勸華遜位華不從曰天道玄遠惟修德以應之耳不如靜以待之以俟天命及倫秀將廢賈后秀使司馬雅夜告華曰今社稷將危趙王欲與公共匡朝廷為霸者之事華知秀等必成篡奪乃距之雅怒曰刃將加頸而吐言如此不顧而出華方晝臥忽夢見屋壞覺而惡之是夜難作詐稱詔召華遂與裴頠俱被收華將死謂張林曰卿欲害忠臣耶林稱詔詰之曰卿為宰相任天下事太子之廢不能死節何也華曰式乾之議臣諫事具存非不諫也林曰諫若不從何不去位華不能答須臾使者至曰詔斬公華曰臣先帝老臣中心如丹臣不愛死懼王室之難禍不可測也遂害之於前殿馬道南夷三族朝野莫不悲痛之時年六十九華性好人物誘進不倦至于窮賤候門之士有一介之善者便咨嗟稱詠為之延譽雅愛書籍身死之日家無餘財惟有文史溢于機篋嘗徙居載書三十乘祕書監摯虞撰定官書皆資華之本以取正焉天下奇祕世所希有者悉在華所由是博物洽聞世無與比惠帝中人有得鳥毛長三丈以示華華見慘然曰此謂海鳧毛也出則天下亂矣陸機嘗餉華鮓于時賓客滿座華發器便曰此龍肉也衆未之信華曰試以苦酒濯之必有異既而五色光起機還問鮓主果云園中茅積下得一白魚質狀殊常以作鮓過美故以相獻武庫封閉甚密其中忽有雉雊華曰此必蛇化為雉也開視雉側果有蛇蛻焉吳郡臨平岸崩出一石鼓槌之無聲帝以問華華曰可取蜀中桐材刻為魚形扣之則鳴矣於是如其言果聲聞數里初吳之未滅也斗牛之間常有紫氣道術者皆以吳方強盛未可圖也惟華以為不然及吳平之後紫氣愈明華聞豫章人雷煥妙達緯象乃要煥宿屏人曰可共尋天文知將來吉凶因登樓仰觀煥曰僕察之久矣惟斗牛之間頗有異氣華曰是何祥也煥曰寶劍之精上徹於天耳華曰君言得之吾少時有相者言吾年出六十位登三事當得寶劍佩之斯言豈效與因問曰在何郡煥曰在豫章豐城華曰欲屈君為宰密共尋之可乎煥許之華大喜即補煥為豐城令煥到縣掘獄屋基入地四丈餘得一石函光氣非常中有雙劍並刻題一曰龍泉一曰太阿其夕斗牛間氣不復見焉煥以南昌西山北巖下土以拭劍光芒艷發大盆盛水置劍其上視之者精芒炫目遣使送一劍并土與華留一自佩或謂煥曰得兩送一張公豈可欺乎煥曰本朝將亂張公當受其禍此劍當繫徐君墓樹耳靈異之物終當化去不永為人服也華得劍寶愛之常置坐側華以南昌土不如華陰赤土報煥書曰詳觀劍文乃干將也莫邪何復不至雖然天生神物終當合耳因以華陰土一斤致煥煥更以拭劍倍益精明華誅失劍所在煥卒子華為州從事持劍行經延平津劍忽於腰間躍出墮水使人沒水取之不見劍但見兩龍各長數丈蟠縈有文章沒者懼而反須臾光彩照水波浪驚沸於是失劍華歎曰先君化去之言張公終合之論此其驗乎華之博物多此類不可詳載焉後倫秀伏誅齊王冏輔政摯虞致箋於冏曰間於張華沒後入中書省得華先帝時答詔本草先帝問華可以輔政持重付以後事者華答明德至親莫如先王宜留以為社稷之鎮其忠良之謀款誠之言信於幽冥沒而後彰與苟且隨時者不可同世而論也議者有責華以愍懷太子之事不抗節廷爭當此之時諫者必得違命之死先聖之教死而無益者不以責人故晏嬰齊之正卿不死崔杼之難季札吳之宗臣不爭逆順之理理盡而無所施者固聖教之所不責也冏於是奏曰臣聞興微繼絶聖王之高政貶惡嘉善春秋之美義是以武王封比干之墓表商容之閭誠幽明之故有以相通也孫秀逆亂滅佐命之國誅骨鯁之臣以斫喪王室肆其虐戾功臣之後多見泯滅張華裴頠各以見憚取誅於時解系解結同以羔羊並被其害歐陽建等無罪而死百姓憐之今陛下更日月之光布維新之命然此等諸族未蒙恩理昔欒郤降在皂隸而春秋傳其違幽王絶功臣之後棄賢者子孫而詩人以為刺臣備忝在職思納愚誠若合聖意可令羣官通議議者各有所執而多稱其冤壯武國臣竺道又詣長沙王求復華爵位依違者久之太安二年詔曰夫愛惡相攻佞邪醜正自古而有故司空壯武公華竭其忠貞思翼朝政謀謨之勳每事賴之前以華弼濟之功宜同封建而華固讓至于八九深陳大制不可得爾終有顛敗危辱之慮辭義懇誠足勸遠近華之至心誓於神明華以伐吳之勳受爵於先帝後封既非國體又不宜以小功踰前大賞華之見害俱以姦逆圖亂濫被枉賊其復華侍中中書監司空公廣武侯及所沒財物與印綬符策遣使弔祭之初陸機兄弟志氣高爽自以吳之名家初入洛不推中國人士見華一面如舊欽華德範如師資之禮焉華誅後作誄又為詠德賦以悼之華著博物志十篇及文章並行于世二子禕韙禕字彥仲好學謙敬有父風歷位散騎常侍韙儒博曉天文散騎侍郎同時遇害禕子輿字公安襲華爵避難過江辟丞相掾太子舍人劉卞字叔龍東平須昌人也本兵家子質直少言少為縣小吏功曹夜醉如廁使卞執燭不從功曹銜之以他事補亭子有祖秀才者於亭中與刺史箋久不成卞教之數言卓犖有大致秀才謂縣令曰卞公府掾之精者卿云何以為亭子令即召為門下史百事疏簡不能周密令問卞能學不答曰願之即使就學無幾卞兄為太子長兵既死兵例須代功曹請以卞代兄役令曰祖秀才有言遂不聽卞後從令至洛得入太學試經為臺四品吏訪問令寫黃紙一鹿車卞曰劉卞非為人寫黃紙者也訪問知怒言於中正退為尚書令史或謂卞曰君才簡略堪大不堪小不如作守舍人卞從其言後為吏部令史遷齊王攸司空主簿轉太常丞司徒左西曹掾尚書郎所歷皆稱職纍遷散騎侍郎除并州刺史入為左衛率知賈后廢太子之謀甚憂之以計干張華而不見用益以不平賈后親黨微服聽察外間頗聞卞言乃遷卞為輕車將軍雍州刺史卞知言泄恐為賈后所誅乃飲藥卒初卞之并州昔同時為須昌小吏者十餘人祖餞之其一人輕卞卞遣扶出之人以此少之史臣曰夫忠為令德學乃國華譬衆星之有禮義人倫之有冠冕也衛瓘撫武帝之牀張華距趙倫之命進諫則伯玉居多臨危則茂先為美遵乎險轍理有可言昏亂方凝則事睽其趣松筠無改則死勝於生固以赴蹈為期而不辭乎傾覆者也俱陷淫網同嗟承劍邦家殄瘁不亦傷哉贊曰賢人委質道映陵寒尸祿觀敗吾生未安衛以賈滅張由趙殘忠於亂世自古為難
