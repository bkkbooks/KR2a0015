body:
  text: 晉書卷八十六列傳第五十六張軌子實實弟茂實子駿駿子重華華子耀靈靈伯父祚靈弟玄靚靚叔天錫張軌字士彥安定烏氏人漢常山景王耳十七代孫也家世孝廉以儒學顯父溫為太官令軌少明敏好學有器望姿儀典則與同郡皇甫謐善隱于宜陽女几山泰始初受叔父錫官五品中書監張華與軌論經義及政事損益甚器之謂安定中正為蔽善抑才乃美為之談以為二品之精衛將軍楊珧辟為掾除太子舍人纍遷散騎常侍征西軍司軌以時方多難陰圖據河西筮之遇泰之觀乃投策喜曰霸者兆也於是求為涼州公卿亦舉軌才堪御遠永寧初出為護羌校尉涼州刺史于時鮮卑反叛寇盜從橫軌到官即討破之斬首萬餘級遂威著西州化行河右以宋配陰充泛瑗陰淡為股肱謀主徵九郡胄子五百人立學校始置崇文祭酒位視別駕春秋行鄉射之禮祕書監繆世徵少府摯虞夜觀星象相與言曰天下方亂避難之國唯涼土耳張涼州德量不殆其人乎及河間成都二王之難遣兵三千東赴京師初漢末金城人陽成遠殺太守以叛郡人馮忠赴尸號哭嘔血而死張掖人吳詠為護羌校尉馬賢所辟後為太尉龐參掾參賢相誣罪應死各引詠為證詠計理無兩直遂自刎而死參賢慚悔自相和釋軌皆祭其墓而旌其子孫永興中鮮卑若羅拔能皆為寇軌遣司馬宋配擊之斬拔能俘十餘萬口威名大震惠帝遣加安西將軍封安樂鄉侯邑千戶於是大城姑臧其城本胸奴所築也南北七里東西三里地有龍形故名臥龍城初漢末博士敦煌侯瑾謂其門人曰後城西泉水當竭有雙闕起其上與東門相望中有霸者出焉至魏嘉平中郡官果起學築雙闕于泉上與東門正相望矣至是張氏遂霸河西永嘉初會東羌校尉韓稚殺秦州刺史張輔軌少府司馬楊胤言於軌曰今稚逆命擅殺張輔明公杖鉞一方宜懲不恪此亦春秋之義諸侯相滅亡桓公不能救則桓公恥之軌從焉遣中督護泛瑗率衆二萬討之先遺稚書曰今王綱紛撓牧守宜勠力勤王適得雍州檄云卿稱兵內侮吾董任一方義在伐叛武旅三萬駱驛繼發伐木之感心豈可言古之行師全國為上卿若單馬軍門者當與卿共平世難也稚得書而降遣主簿令狐亞聘南陽王模模甚悅遺軌以帝所賜劍謂軌曰自隴以西征伐斷割悉以相委如此劍矣俄而王彌寇洛陽軌遣北宮純張纂馬魴陰濬等率州軍擊破之又敗劉聰于河東京師歌之曰涼州大馬橫行天下涼州鴟苕寇賊消鴟苕翩翩怖殺人帝嘉其忠進封西平郡公不受張掖臨松山石有金馬字磨滅粗可識而張字分明又有文曰初祚天下西方安萬年姑臧又有玄石白點成二十八宿于時天下既亂所在使命莫有至者軌遣使貢獻歲時不替朝廷嘉之屢降璽書慰勞軌後患風口不能言使子茂攝州事酒泉太守張鎮潛引秦州刺史賈龕以代軌密使詣京師請尚書侍郎曹袪為西平太守圖為輔車之勢軌別駕麴朝欲專威福又遣使詣長安告南陽王模稱軌廢疾以請賈龕而龕將受之其兄讓龕曰張涼州一時名士威著西州汝何德以代之龕乃止更以侍中爰瑜為涼州刺史治中楊淡馳詣長安割耳盤上訴軌之被誣模乃表停之晉昌張越涼州大族讖言張氏霸涼自以才力應之從隴西內史遷梁州刺史越志在涼州遂託病歸河西陰圖代軌乃遣兄鎮及曹袪麴佩移檄廢軌以軍司杜耽攝州事使耽表越為刺史軌令曰吾在州八年不能綏靖區域又值中州兵亂秦隴倒懸加以寢患委篤實思斂迹避賢但負荷任重未便輒遂不圖諸人橫興此變是不明吾心也吾視去貴州如脫屣耳欲遣主簿尉髦奉表詣闕便速脂轄將歸老宜陽長史王融參軍孟暢折鎮檄排閣入諫曰晉室多故人神塗炭實賴明公撫寧西夏張鎮兄弟敢肆凶逆宜聲其罪而戮之不可成其志也軌默然融等出而戒嚴武威太守張琠遣子坦馳詣京表曰魏尚安邊而獲戾充國盡忠而被譴皆前史之所譏今日之明鑒也順陽之思劉陶守闕者千人刺史之蒞臣州若慈母之於赤子百姓之愛臣軌若旱苗之得膏雨伏聞信惑流言當有遷代民情嗷嗷如失父母今戎夷猾夏不宜搔動一方尋以子實為中督護率兵討鎮遣鎮外甥太府主簿令狐亞前喻鎮曰舅何不審安危明成敗主公西河著德兵馬如雲此猶烈火已焚待江漢之水溺於洪流望越人之助其何及哉今數萬之軍已臨近境今唯全老親存門戶輸誠歸官必保萬全之福鎮流涕曰人誤我也乃委罪功曹魯連而斬之詣實歸罪南討曹袪走之張坦至自京師帝優詔勞軌依模所表命誅曹袪軌大悅赦州內殊死已下命實率尹員宋配步騎三萬討袪別遣從事田迥王豐率騎八百自姑臧西南出石驢據長寧袪遣麴朝距戰于黃阪實詭道出浩亹戰于破羌軌斬袪及牙門田囂遣治中張閬送義兵五千及郡國秀孝貢計器甲方物歸于京師令有司可推詳立州已來清貞德素嘉遁遺榮高才碩學著述經史臨危殉義殺身為君忠諫而嬰禍專對而釋患權智雄勇為時除難諂佞誤主傷陷忠賢具狀以聞州中父老莫不相慶光祿傅祗太常摯虞遺軌書告京師飢匱軌即遣參軍杜勳獻馬五百匹毯布三萬匹帝遣使者進拜鎮西將軍都督隴右諸軍事封霸城侯進車騎將軍開府辟召儀同三司策未至而王彌遂逼洛陽軌遣將軍張斐北宮純郭敷等率精騎五千來衛京都及京都陷斐等皆沒於賊中州避難來者日月相繼分武威置武興郡以居之太府主簿馬魴言於軌曰四海傾覆乘輿未反明公以全州之力徑造平陽必當萬里風披有征無戰未審何憚不為此舉軌曰是孤心也又聞秦王入關乃馳檄關中曰主上遘危遷幸非所普天分崩率土喪氣秦王天挺聖德神武應期世祖之孫王今為長凡我晉人食土之類龜筮克從幽明同款宜簡令辰奉登皇位今遣前鋒督護宋配步騎二萬徑至長安翼衛乘輿折衝左右西中郎實中軍三萬武威太守張琠胡騎二萬駱驛繼發仲秋中旬會于臨晉俄而秦王為皇太子遣使拜軌為驃騎大將軍儀同三司固辭秦州刺史裴苞東羌校尉貫與據險斷使命宋配討之西平王叔與曹袪餘黨麴儒等劫前福祿令麴恪為主執太守趙彝東應裴苞實回師討之斬儒等左督護陰預與苞戰狹西大敗之苞奔桑凶塢是歲北宮純降劉聰皇太子遣使重申前授固辭左司馬竇濤言於軌曰曲阜周旦弗辭營丘齊望承命所以明國憲厲殊勳天下崩亂皇輿遷幸州雖僻遠不忘匡衛故朝廷傾懷嘉命屢集宜從朝旨以副羣心軌不從初實平麴儒徙元惡六百餘家治中令狐瀏曰夫除惡人猶農夫之去草令絶其本勿使能滋今宜悉徙以絶後患實不納儒黨果叛實進平之愍帝即位進位司空固讓太府參軍索輔言於軌曰古以金貝皮幣為貨息穀帛量度之耗二漢制五銖錢通易不滯泰始中河西荒廢遂不用錢裂匹以為段數縑布既壞市易又難徒壞女工不任衣用弊之甚也今中州雖亂此方安全宜復五銖以濟通變之會軌納之立制準布用錢錢遂大行人賴其利是時劉曜寇北地軌又遣參軍麴陶領三千人衛長安帝遣大鴻臚辛攀拜軌侍中太尉涼州牧西平公軌又固辭在州十三年寢疾遺令曰吾無德於人今疾病彌留殆將命也文武將佐咸當弘盡忠規務安百姓上思報國下以寧家素棺薄葬無藏金玉善相安遜以聽朝旨表立子實為世子卒年六十諡曰武公實字安遜學尚明察敬賢愛士以秀才為郎中永嘉初固辭驍騎將軍請還涼州許之改授議郎及至姑臧以討曹袪功封建武亭侯尋遷西中郎將進爵福祿縣侯建興初除西中郎將領護羌校尉軌卒州人推實攝父位愍帝因下策書曰維乃父武公著勳西夏頃胡賊狡猾侵逼近甸義兵鋭卒萬里相尋方貢遠珍府無虛歲方委專征蕩清九域昊天不弔凋余藩后朕用悼厥心維爾雋劭英毅宜世表西海今授持節都督涼州諸軍事西中郎將涼州刺史領護羌校尉西平公往欽哉其闡弘先緒俾屏王室蘭池長趙奭上軍士張冰得璽文曰皇帝璽羣僚上慶稱德實曰孤常忿袁本初擬肘諸君何忽有此言因送于京師下令國中曰忝紹前蹤庶幾刑政不為百姓之患而比年飢旱殆由庶事有缺竊慕針誦之言以補不逮自今有面刺孤罪者酬以束帛翰墨陳孤過者答以筐篚謗言於市者報以羊米賊曹佐高昌隗瑾進言曰聖王將舉大事必崇三訊之法朝置諫官以匡大理疑承輔弼以補闕拾遺今事無巨細盡決聖慮興軍布令朝中不知若有謬闕則下無分謗竊謂宜偃聰塞智開納羣言政刑大小與衆共之若內斷聖心則羣僚畏威而面從矣善惡專歸於上雖賞千金終無言也實納之增位三等賜帛四十匹遣督護王該送諸郡貢計獻名馬方珍經史圖籍于京師會劉曜逼長安實遣將軍王該率衆以援京城帝嘉之拜都督陝西諸軍事及帝將降于劉曜下詔于實曰天步厄運禍降晉室京師傾陷先帝晏駕賊庭朕流漂宛許爰暨舊京羣臣以宗廟無主歸之於朕遂以沖眇之身託于王公之上自踐寶位四載于茲不能翦除巨寇以救危難元元兆庶仍遭塗炭皆朕不明所致羯賊劉載僭稱大號禍加先帝肆殺藩王深惟仇恥枕戈待旦劉曜自去年九月率其蟻衆乘虛深寇劫質羌胡攻沒北地麴允總戎在外六軍敗績侵逼京城矢流宮闕胡嵩等雖赴國難殿而無效圍塹十重外救不至糧盡人窮遂為降虜仰慚乾靈俯痛宗廟君世篤忠亮勳隆西夏四海具瞻朕所憑賴今進君大都督涼州牧侍中司空承制行事琅邪王宗室親賢遠在江表今朝廷播越社稷倒懸朕以詔王時攝大位君其挾贊琅邪共濟艱運若不忘主宗廟有賴明便出降故夜見公卿屬以後事密遣黃門郎史淑侍御史王沖齎詔假授臨出寄命公其勉之實以天子蒙塵沖讓不拜建威將軍西海太守張肅實叔父也以京師危逼請為先鋒擊劉曜實以肅年老弗許肅曰狐死首丘心不忘本鍾儀在晉楚辨南音肅受晉寵剖符列位羯逆滔天朝廷傾覆肅宴安方裔難至不奮何以為人臣實曰門戶受重恩自當闔宗效死忠衛社稷以申先公之志但叔父春秋已高氣力衰竭軍旅之事非耆耄所堪乃止既而聞京師陷沒肅悲憤而卒實知劉曜逼遷天子大臨三日遣太府司馬韓璞滅寇將軍田齊撫戎將軍張閬前鋒督護陰預步騎一萬東赴國難命討虜將軍陳安故太守賈騫隴西太守吳紹各統郡兵為璞等前驅戒璞曰前遣諸將多違機信所執不同致有乖阻且內不和親焉能服物今遣卿督五將兵事當如一體不得令乖異之問達孤耳也復遺南陽王保書曰王室有事不忘投軀孤州遠域首尾多難是以前遣賈騫瞻望公舉中被符命敕騫還軍忽聞北地陷沒寇逼長安胡嵩不進麴允持金五百請救於嵩是以決遣騫等進軍度嶺會聞朝廷傾覆為忠不達於主遣兵不及於難痛慨之深死有餘責今更遣韓璞等唯公命是從及璞次南安諸羌斷軍路相持百餘日糧竭矢盡璞殺駕牛饗軍泣謂衆曰汝曹念父母乎曰念念妻子乎曰念欲生還乎曰欲從我令乎曰諾乃鼓譟進戰會張閬率金城軍繼至夾擊大敗之斬級數千時焦嵩陳安寇隴右東與劉曜相持雍秦之人死者十八九初永嘉中長安謠曰秦川中血沒腕惟有涼州倚柱觀至是謠言驗矣焦嵩陳安逼上邽南陽王保遣使告急以金城太守竇濤為輕車將軍率威遠將軍宋毅及和苞張閬宋輯辛韜張選董廣步騎二萬赴之軍次新陽會愍帝崩問至素服舉哀大臨三日時南陽王保謀稱尊號破羌都尉張詵言於實曰南陽王忘莫大之恥而欲自尊天不受其圖籙德不足以應運終非濟時救難者也晉王明德昵藩先帝憑屬宜表稱聖德勸即尊號傳檄諸藩副言相府則欲競之心息未合之徒散矣從之於是馳檄天下推崇晉王為天子遣牙門蔡忠奉表江南勸即尊位是歲元帝即位于建鄴改年太興實猶稱建興六年不從中興之所改也保聞愍帝崩自稱晉王建元署置百官遣使拜實征西大將軍儀同三司增邑三千戶俄而保為陳安所叛氐羌皆應之保窘迫遂去上邽遷祁山實遣將韓璞步騎五千赴難陳安退保綿諸保歸上邽未幾保復為安所敗使詣實乞師實遣宋毅赴之而安退會保為劉曜所逼遷于桑城將謀奔實實以其宗室之望若至河右必動物情遣其將陰監逆保聲言翼衛實禦之也會保薨其衆散奔涼州者萬餘人實自恃險遠頗自驕恣初實寢室梁間有人像無頭久而乃滅實甚惡之京兆人劉弘者挾左道客居天梯第五山然燈懸鏡於山穴中為光明以惑百姓受道者千餘人實左右皆事之帳下閻沙牙門趙仰皆弘鄉人弘謂之曰天與我神璽應王涼州沙仰信之密與實左右十餘人謀殺實奉弘為主實潛知其謀收弘殺之沙等不之知以其夜害實在位六年私諡曰昭公元帝賜諡曰元子駿年幼弟茂攝事茂字成遜虛靖好學不以世利嬰心建興初南陽王保辟從事中郎又薦為散騎侍郎中壘將軍皆不就二年徵為侍中以父老固辭尋拜平西將軍秦州刺史太興三年實既遇害州人推茂為大都督太尉涼州牧茂不從但受使持節平西將軍涼州牧乃誅閻沙及黨與數百人赦其境內復以兄子駿為撫軍將軍武威太守西平公歲餘茂築靈鈞臺周輪八十餘堵基高九仞武陵人閻曾夜叩門呼曰武公遣我來曰何故勞百姓而築臺乎姑臧令辛巖以曾妖妄請殺之茂曰吾信勞人曾稱先君之令何謂妖乎太府主簿馬魴諫曰今世難未夷唯當弘尚道素不宜勞役崇飾臺榭且比年已來轉覺衆務日奢於往每所經營輕違雅度實非士女所望於明公茂曰吾過也吾過也命止作役明年劉曜遣其將劉咸攻韓璞於冀城呼延實攻寧羌護軍陰鑒于桑壁臨洮人翟楷石琮等逐令長以縣應曜河西大震參軍馬岌勸茂親征長史泛禕怒曰亡國之人復欲干亂大事宜斬岌以安百姓岌曰泛公書生糟粕刺舉近才不惟國家大計且朝廷旰食有年矣今大賊自至不煩遠師遐邇之情實繫此州事勢不可以不出且宜立信勇之驗以副秦隴之望茂曰馬生之言得之矣乃出次石頭茂謂參軍陳珍曰劉曜以乘勝之聲握三秦之鋭繕兵積年士卒習戰若以精騎奄克南安席卷河外長驅而至者計將何出珍曰曜雖乘威怙衆恩德未結於下又其關東離二內患未除精卒寡少多是氐羌烏合之衆終不能近舍關東之難增隴上之戍曠日持久與我爭衡也若二旬不退者珍請為明公率弊卒數千以擒之茂大悅以珍為平虜護軍率卒騎一千八百救韓璞曜陰欲引歸聲言要先取隴西然後回滅桑壁珍募發氐羌之衆擊曜走之克復南安茂深嘉之拜折衝將軍未幾茂復大城姑臧修靈鈞臺別駕吳紹諫曰伏惟修城築臺蓋是懲既往之事愚以為恩德未洽於近侍雖處層樓適所以疑諸下徒見不安之意而失士民繫託之本心示怯弱之形乖匡霸之勢遐方異境窺我之齷齱也必有乘人之規嘗願止役省勞與下休息而更興功動衆百姓豈所望於明君哉茂曰亡兄怛然失身於物王公設險武夫重閉亦達人之至戒也且忠臣義士豈不欲盡節義於亡兄哉直以危機密發雖有賁育之勇無所復施今事未靖不可以拘繫常言以太平之理責人於迍邅之世紹無以對茂雅有志節能斷大事涼州大姓賈摹實之妻弟也勢傾西土先是謠曰手莫頭圖涼州茂以為信誘而殺之於是豪右屏迹威行涼域永昌初茂使將軍韓璞率衆取隴西南安之地以置秦州太寧三年卒臨終執駿手泣曰昔吾先人以孝友見稱自漢初以來世執忠順今雖華夏大亂皇輿播遷汝當謹守人臣之節無或失墜吾遭擾攘之運承先人餘德假攝此州以全性命上欲不負晉室下欲保完百姓然官非王命位由私議苟以集事豈榮之哉氣絶之日白帢入棺無以朝服以彰吾志焉年四十八在位五年私諡曰成茂無子駿嗣位駿字公庭幼而奇偉建興四年封霸城侯十歲能屬文卓越不羈而淫縱過度常夜微行于邑里國中化之及統任年十八先是愍帝使人黃門侍郎史淑在姑臧左長史泛禕右長史馬謨等諷淑令拜駿使持節大都督大將軍涼州牧領護羌校尉西平公赦其境內置左右前後四率官繕南宮劉曜又使人拜駿涼州牧涼王時辛晏阻兵於枹罕駿宴羣僚于間豫堂命竇濤等進討辛晏從事劉慶諫曰霸王不以喜怒興師不以乾沒取勝必須天時人事然後起也辛晏父子安忍凶狂其亡可待奈何以飢年大舉猛寒攻城昔周武回戈以須亡殷之期曹公緩袁氏使自斃何獨殿下以旋兵為恥乎駿納之遣參軍王騭聘于劉曜曜謂之曰貴州必欲追蹤竇融款誠和好卿能保之乎騭曰不能曜侍中徐邈曰君來和同而云不能何也騭曰齊桓貫澤之盟憂心兢兢諸侯不召自至葵丘之會驕而矜誕叛者九國趙國之化常如今日可也若政教陵遲尚未能察邇者之變況鄙州乎曜顧謂左右曰此涼州高士使乎得人禮而遣之太寧元年駿猶稱建興十二年駿親耕藉田尋承元帝崩問駿大臨三日會有黃龍見于揟次之嘉泉右長史泛禕言於駿曰案建興之年是少帝始起之號帝以凶終理應改易朝廷越在江南音問隔絶宜因龍改號以章休徵不從初駿之立也姑臧謠曰鴻從南來雀不驚誰謂孤雛尾翅生高舉六翮鳳皇鳴至是而復收河南之地咸和初駿遣武威太守竇濤金城太守張閬武興太守辛巖揚烈將軍宋輯等率衆東會韓璞攻討秦州諸郡曜遣其將劉胤來距屯于狄道城韓璞進度沃干嶺辛巖曰我握衆數萬藉氐羌之鋭宜速戰以滅之不可以久久則變生璞曰自夏末以來太白犯月辰星逆行白虹貫日皆變之大者不可以輕動輕動而不捷為禍更深吾將久而斃之且曜與石勒相攻胤亦不能久也積七十餘日軍糧竭遣辛巖督運於金城胤聞之大悅謂其將士曰韓璞之衆十倍於吾羌胡皆叛不為之用吾糧廩將懸難以持久今虜分兵運糧可謂天授吾也若敗辛巖璞等自潰彼衆我寡宜以死戰戰而不捷當無匹馬得還宜厲爾戈矛竭汝智力衆咸奮於是率騎三千襲巖于沃干嶺敗之璞軍遂潰死者二萬餘人面縛歸罪駿曰孤之罪也將軍何辱皆赦之胤乘勝追奔濟河攻陷令居入據振武河西大震駿遣皇甫該禦之赦其境內會劉曜東討石生長安空虛大搜講武將襲秦雍理曹郎中索詢諫曰曜雖東征胤猶守本險阻路遙為主人甚易胤若輕騎憑氐羌以距我者則奔突難測輟彼東合而逆戰者則寇我未已頃年頻出戎馬生郊外有飢羸內資虛耗豈是殿下子物之謂邪駿曰每患忠言不獻面從背違吾政教缺然而莫我匡者卿盡辭規諫深副孤之望也以羊酒禮之西域諸國獻汗血馬火浣布犎牛孔雀巨象及諸珍異二百餘品西域長史李柏請擊叛將趙貞為貞所敗議者以柏造謀致敗請誅之駿曰吾每以漢世宗之殺王恢不如秦穆之赦孟明竟以減死論羣心咸悅駿觀兵新鄉狩于北野因討軻沒虜破之下令境中曰昔鯀殛而禹興芮誅而缺進唐帝所以殄洪災晉侯所以成五霸法律犯死罪期親不得在朝今盡聽之唯不宜內參宿衛耳於是刑清國富羣僚勸駿稱涼王領秦涼二州牧置公卿百官如魏武晉文故事駿曰此非人臣所宜言也敢有言此者罪在不赦然境內皆稱之為王羣僚又請駿立世子駿不從中堅將軍宋輯言於駿曰禮急儲君者蓋重宗廟之故周成漢昭立於繈褓誠以國嗣不可曠儲宮當素定也昔武王始有國元王作儲君建興之初先王在位殿下正名統況今社稷彌崇聖躬介立大業遂殷繼二闕然哉臣竊以為國有纍卵之危而殿下以為安踰泰山非所謂也駿納之遂立子重華為世子先是駿遣傅穎假道于蜀通表京師李雄弗許駿又遣治中從事張淳稱藩于蜀託以假道焉雄大悅雄又有憾於南氐楊初淳因説曰南氐無狀屢為邊害宜先討百頃次平上邽二國并勢席卷三秦東清許洛掃氛燕趙拯二帝梓宮於平陽反皇輿於洛邑此英霸之舉千載一時寡君所以遣下臣冒險通誠不遠萬里者以陛下義聲遠播必能愍寡君勤王之志天下之善一也惟陛下圖之雄怒偽許之將覆淳於東峽蜀人橋贊密以告淳淳言於雄曰寡君使小臣行無迹之地通百蠻之域萬里表誠者誠以陛下義矜勠力之臣能成人之美節故也若欲殺臣者當顯於都市宣示衆目云涼州不忘舊義通使琅邪為表忠誠假途於我主聖臣明發覺殺之當令義聲遠著天下畏威今盜殺江中威刑不顯何足以揚休烈示天下也雄大驚曰安有此邪當相放還河右耳雄司隸校尉景騫言於雄曰張淳壯士宜留任之雄曰壯士豈為人留且可以卿意觀之騫謂淳曰卿體大暑熱可且遣下吏少住須涼淳曰寡君以皇輿幽辱梓宮未反天下之恥未雪蒼生之命倒懸故遣淳來表誠大國所論事重非下吏能傳若下吏所了者則淳本亦不來雖有火山湯海無所辭難豈寒暑之足避哉雄曰此人矯矯不可得用也厚禮遣之謂淳曰貴主英名蓋世土險兵盛何不稱帝自娛一方淳曰寡君以乃祖乃父世濟忠良未能雪天人之大恥解衆庶之倒懸日昃忘食枕戈待旦以琅邪中興江東故萬里翼戴將成桓文之事何言自娛邪雄有慚色曰我乃祖乃父亦是晉臣往與六郡避難此都為同盟所推遂有今日琅邪若能中興大晉於中州者亦當率衆輔之淳還至龍鶴募兵通表後皆達京師朝廷嘉之駿議欲嚴刑峻制衆咸以為宜參軍黃斌進曰臣未見其可駿問其故斌曰夫法制所以經綸邦國篤俗齊物既立必行不可窪隆也若尊者犯令則法不行矣駿屏機改容曰夫法唯上行制無高下且微黃君吾不聞過矣黃君可謂忠之至也於坐擢為敦煌太守駿有計略於是厲操改節勤修庶政總御文武咸得其用遠近嘉詠號曰積賢君自軌據涼州屬天下之亂所在征伐軍無寧歲至駿境內漸平又使其將楊宣率衆越流沙伐龜茲鄯善於是西域並降鄯善王元孟獻女號曰美人立賓遐觀以處之焉耆前部于填王並遣使貢方物得玉璽於河其文曰執萬國建無極時駿盡有隴西之地士馬強盛雖稱臣於晉而不行中興正朔舞六佾建豹尾所置官僚府寺擬於王者而微異其名又分州西界三郡置沙州東界六郡置河州二府官僚莫不稱臣又於姑臧城南築城起謙光殿畫以五色飾以金玉窮盡珍巧殿之四面各起一殿東曰宜陽青殿以春三月居之章服器物皆依方色南曰朱陽赤殿夏三月居之西曰政刑白殿秋三月居之北曰玄武黑殿冬三月居之其傍皆有直省內官寺署一同方色及末年任所遊處不復依四時而居咸和初懼為劉曜所逼使將軍宋輯魏纂將兵徙隴西南安人二千餘家于姑臧使聘於李雄修鄰好及曜攻枹罕護軍辛晏告急駿使韓璞辛巖率步騎二萬擊之戰于臨洮大為曜軍所敗璞等退走追至令居駿遂失河南之地初戊己校尉趙貞不附于駿至是駿擊擒之以其地為高昌郡及石勒殺劉曜駿因長安亂復收河南地至于狄道置武衛石門候和漒川甘松五屯護軍與勒分境勒遣使拜駿官爵駿不受留其使後懼勒強遣使稱臣於勒兼貢方物遣其使歸駿境內嘗大飢穀價踊貴市長談詳請出倉穀與百姓秋收三倍徵之從事陰據諫曰昔西門豹宰鄴積之於人解扁蒞東封之邑計入三倍文侯以豹有罪而可賞扁有功而可罰今詳欲因人之飢以要三倍反裘傷皮未足喻之駿納之初建興中敦煌計吏耿訪到長安既而遇賊不得反奔漢中因東渡江以太興二年至京都屢上書以本州未知中興宜遣大使乞為鄉導時連有內難許而未行至是始以訪守治書御史拜駿鎮西大將軍校尉刺史公如故選西方人隴西賈陵等十二人配之訪停梁州七年以驛道不通召還訪以詔書付賈陵託為賈客到長安不敢進以咸和八年始達涼州駿受詔遣部曲督王豐等報謝并遣陵歸上疏稱臣而不奉正朔猶稱建興二十一年九年復使訪隨豐等齎印板進駿大將軍自是每歲使命不絶後駿遣參軍麴護上疏曰東西隔塞踰歷年載夙承聖德心繫本朝而江吳寂蔑餘波莫及雖肆力修塗同盟靡恤奉詔之日悲喜交并天恩光被褒崇輝渥即以臣為大將軍都督陝西雍秦涼州諸軍事休寵振赫萬里懷戴嘉命顯至銜感屏營伏惟陛下天挺岐嶷堂構晉室遭家不造播幸吳楚宗廟有黍離之哀園陵有殄廢之痛普天咨嗟含氣悲傷臣專命一方職在斧鉞遐域僻陋勢極秦隴勒雄既死人懷反正謂季龍李期之命曾不崇朝而皆篡繼凶逆鴟目有年東西遼曠聲援不接遂使桃蟲鼓翼四夷喧譁向義之徒更思背誕鉛刀有干將之志螢燭希日月之光是以臣前章懇切欲齊力時討而陛下雍容江表坐觀禍敗懷目前之安替四祖之業馳檄布告徒設空文臣所以宵吟荒漠痛心長路者也且兆庶離主漸冉經世先老消落後生靡識忠良受梟懸之罰羣凶貪縱橫之利懷君戀故日月告流雖時有尚義之士畏逼首領哀歎窮廬臣聞少康中興由於一旅光武嗣漢衆不盈百祀夏配天不失舊物況以荊揚慓悍臣州突騎吞噬遺羯在於掌握哉願陛下敷弘臣慮永念先績敕司空鑒征西亮等泛舟江沔使首尾俱至也自後駿遣使多為季龍所獲不達後駿又遣護羌參軍陳𧜛從事徐虓華馭等至京師征西大將軍亮上疏言陳𧜛等冒險遠至宜蒙銓詔除𧜛西平相虓等為縣令永和元年以世子重華為五官中郎將涼州刺史酒泉太守馬岌上言酒泉南山即崑崙之體也周穆王見西王母樂而忘歸即謂此山此山有石室玉堂珠璣鏤飾煥若神宮宜立西王母祠以裨朝廷無疆之福駿從之駿在位二十二年卒時年四十私諡曰文公穆帝追諡曰忠成公重華字泰臨駿之第二子也寬和懿重沈毅少言父卒時年十六以永和二年自稱持節大都督太尉護羌校尉涼州牧西平公假涼王赦其境內尊其母嚴氏為太王太后居永訓宮所生母馬氏為王太后居永壽宮輕賦斂除關稅省園囿以恤貧窮遣使奉章於石季龍季龍使王擢麻秋孫伏都等侵寇不輟金城太守張沖降于秋於是涼州振動重華掃境內使其征南將軍裴禦之壁于廣武欲以持久弊之牧府相司馬張耽言於重華曰臣聞國以兵為強以將為主主將者存亡之機吉凶所繫故燕任樂毅克平全齊及任騎劫喪七十城之地是以古之明君靡不慎于將相也今之所要在於軍師然議者舉將多推宿舊未必妙盡精才也且韓信之舉非舊名也穰苴之信非舊將也呂蒙之進非舊勳也魏延之用非舊德也蓋明王之舉舉無常人才之所能則授以大事今強寇在郊諸將不進人情騷動危機稍逼主簿謝艾兼資文武明識兵略若授以斧鉞委以專征必能折衝禦侮殲殄凶類重華召艾問以討寇方略艾曰昔耿弇不欲以賊遺君父黃權願以萬人當寇乞假臣兵七千為殿下吞王擢麻秋等重華大悅以艾為中堅將軍配步騎五千擊秋引師出振武夜有二梟鳴于牙中艾曰梟邀也六博得梟者勝今梟鳴牙中克敵之兆於是進戰大破之斬首五千級重華封艾為福祿伯善待之諸寵貴惡其賢共毀譖之乃出為酒泉太守季龍又令麻秋進陷大夏大夏護軍梁式執太守宋晏以城應秋秋遣晏以書誘宛戍都尉宋矩宋矩謂秋曰辭父事君當立功義功義不立當守名節矩終不背主偷生於世於是先殺妻子自刎而死是月有司議遣司兵趙長迎秋西郊謝艾以春秋之義國有大喪省搜狩之禮宜待踰年別駕從事索遐議曰禮天子崩諸侯薨未殯五祀不行既殯而行之魯宣三年天王崩不廢郊祀今聖上統承大位百揆惟新宜在璿璣玉衡以齊七政立秋萬物將成殺氣之始其於王事杖麾誓衆釁鼓禮神所以討逆除暴成功濟務寧宗廟社稷致天下之福不可廢也重華從之俄而麻秋進攻枹罕時晉陽太守郎坦以城大難守宜棄外城武城太守張悛曰棄外城則大事去矣不可以動衆心寧戎校尉張璩從之固守大城秋率衆八萬圍塹數重雲梯雹車地突百道皆通於內城中亦應之殺傷秋衆已數萬季龍復遣其將劉渾等率步騎二萬會之郎坦恨言之不從教軍士李嘉潛與秋通引賊千餘人上城西北隅璩使宋修張弘辛挹郭普距之短兵接戰斬二百餘人賊乃退璩戮李嘉以徇燒其攻具秋退保大夏謂諸將曰我用兵於五都之間攻城略地往無不捷及登秦隴謂有征無戰豈悟南襲仇池破軍殺將築城長最匹馬不歸及攻此城傷兵挫鋭殆天所贊非人力也季龍聞而歎曰吾以偏師定九州今以九州之力困於枹罕真所謂彼有人焉未可圖也重華以謝艾為使持節軍師將軍率步騎三萬進軍臨河秋以三萬衆距之艾乘軺車冠白鳴鼓而行秋望而怒曰艾年少書生冠服如此輕我也命黑矟龍驤三千人馳擊之艾左右大擾左戰帥李偉勸艾乘馬艾不從乃下車踞胡牀指麾處分賊以為伏兵發也懼不敢進張瑁從左南緣河而截其後秋軍乃退艾乘勝奔擊遂大敗之斬秋將杜勳汲魚俘斬一萬三千級秋匹馬奔大夏重華論功以謝艾為太府左長史進封福祿縣伯邑五千戶帛八千匹麻秋又據枹罕有衆十二萬進屯河內遣王擢略地晉興廣武越洪池嶺至于曲柳姑臧大震重華議欲親出距之謝艾固諫以為不可別駕從事索遐進曰賊衆甚盛漸逼京畿君者國之鎮也不可以親動左長史謝艾文武兼資國之方邵宜委以推轂之任殿下居中作鎮授以算略小賊不足平也重華納之於是以艾為使持節都督征討諸軍事行衛將軍遐為軍正將軍率步騎二萬距之艾建牙旗盟將士有西北風吹旌旗東南指遐曰風為號令今能令旗指之天所贊也破之必矣軍次神鳥王擢與前鋒戰敗遁還河南還討叛虜斯骨真萬餘落破之斬首千餘級俘擒二千八百獲牛羊十餘萬頭重華自以連破勍敵頗怠政事希接賓客司直索遐諫曰殿下承四聖之基當升平之會荷當今之任憂率土之塗炭宜躬親萬機開延英乂夙夜乾乾勉於庶政自頃內外囂然皆云去賊投誠者應即撫慰而彌日不接國老朝賢當虛己引納詢訪政事比多經旬積朔不留意接之文奏入內歷月不省廢替見務注情於棋奕之間繾綣左右小臣之娛不存將相遠大之謀至使親臣不言朝吏杜口愚臣所以回惶忘寢與食也今王室如燬百姓倒懸正是殿下銜膽茹辛厲心之日深願垂心朝政延納直言周爰五美以成六德捐彼近習弭塞外聲修政聽朝使下觀而化重華覽之大悅優文答謝然不之改也詔遣侍御史俞歸拜重華護羌校尉涼州刺史假節是時石季龍西中郎將王擢屯結隴上為苻雄所破奔重華重華厚寵之以為征虜將軍秦州刺史假節使張弘宗悠率步騎萬五千配擢伐苻健健遣苻碩禦之戰于龍黎擢等大敗單騎而還弘悠皆沒重華痛之素服為戰亡吏士舉哀號慟各遣弔問其家復授擢兵使攻秦州克之遣使上疏曰季龍自斃遺燼遊魂取亂侮亡覩機則發臣今遣前鋒都督裴步騎七萬遙出隴上以俟聖朝赫然之威山東騷擾不足厝懷長安膏腴宜速平蕩臣守任西荒山川悠遠大誓六軍不及聽受之末猛將鷹揚不豫告成之次瞻雲望日孤憤義傷彈劍慷慨中情蘊結於是康獻皇后詔報遣使進重華為涼州牧是時御史俞歸至涼州重華方謀為涼王不肯受詔使親信人沈猛謂歸曰我家主公奕世忠於晉室而不如鮮卑矣臺加慕容皓燕王今甫授州主大將軍何以加勸有功忠義之臣乎明臺今宜移河右共勸州主為涼王大夫出使苟利社稷專之可也歸對曰王者之制異姓不得稱王九州之內重爵不得過公漢高一時王異姓尋皆誅滅蓋權時之宜非舊體也故王陵曰非劉氏而王天下共伐之至於戎狄不從此例春秋時吳楚稱王而諸侯不以為非者蓋蠻夷畜之也假令齊魯稱王諸侯豈不伐之故聖上以貴公忠賢是以爵以上公位以方伯鮮卑北狄豈足為比哉子失問也且吾又聞之有殊勳絶世者亦有不世之賞若今便以貴公為王者設貴公以河右之衆南平巴蜀東掃趙魏修復舊都以迎天子天子復以何爵何位可以加賞幸三思之猛具宣歸言重華遂止重華好與羣小遊戲屢出錢帛以賜左右徵事索振諫曰先王寢不安席志平天下故繕甲兵積資實大業未就懷恨九泉殿下遭巨寇於諒暗之中賴重餌以挫勍敵今遺燼尚廣倉帑虛竭金帛之費所宜慎之昔世祖即位躬親萬機章奏詣闕報不終日故能隆中興之業定萬世之功今章奏停滯動經時月下情不得上達哀窮困於囹圄蓋非明主之事臣竊未安重華善之將受詔未及而卒時年二十七在位十一年私諡曰昭公後改曰桓公穆帝賜諡曰敬烈子耀靈嗣耀靈字元舒年十歲嗣事稱大司馬校尉刺史西平公伯父長寧侯祚性傾巧善承內外初與重華寵臣趙長尉緝等結異姓兄弟長等矯稱重華遺令以祚為持節督中外諸軍撫軍將軍輔政長等議以耀靈沖幼時難未夷宜立長君祚先蒸重華母馬氏馬氏遂從緝議命廢耀靈為涼寧侯而立祚祚尋使楊秋胡害耀靈於東苑埋之於沙坑私諡曰哀公祚字太伯博學雄武有政事之才既立自稱大都督大將軍涼州牧涼公淫暴不道又通重華妻裴氏自閣內媵妾及駿重華未嫁子女無不暴亂國人相目咸賦牆茨之詩永和十年祚納尉緝趙長等議僭稱帝位立宗廟舞八佾置百官下書曰昔金行失馭戎狄亂華胡羯氐羌咸懷竊璽我武公以神武撥亂保寧西夏貢款勤王旬朔不絶四祖承光忠誠彌著往受晉禪天下所知謙沖遜讓四十年于茲矣今中原喪亂華裔無主羣后僉以九州之望無所依歸神祇嶽瀆罔所憑係逼孤攝行大統以一四海之心辭不獲已勉從羣議待掃穢二京蕩清周魏然後迎帝舊都謝罪天闕思與兆庶同茲更始改建興四十二年為和平元年赦殊死賜魚衆寡帛加文武爵各一級追崇曾祖軌為武王祖實為昭王從祖茂為成王父駿為文王弟重華為明王立妻辛氏為皇后弟天錫為長寧王子泰和為太子庭堅為建康王耀靈弟玄靚為涼武侯其夜天有光如車蓋聲若雷霆震動城邑明日大風拔木災異屢見而祚凶虐愈甚其尚書馬岌以切諫免官郎中丁琪又諫曰先公纍執忠節遠宗吳會持盈守謙五十餘載蒼生所以鵠企西望四海所以注心大涼皇天垂贊士庶效死者正以先公道高彭昆忠踰西伯萬里通虔任節不二故也能以一州之衆抗崩天之虜師徒歲起人不告疲陛下雖以大聖雄姿纂戎鴻緒勳德未高於先公而行革命之事臣竊未見其可華夷所以歸系大涼義兵所以千里響赴者以陛下為本朝之故今既自尊人斯高競一隅之地何以當中國之師城峻衝生負乘致寇惟陛下圖之祚大怒斬之于闕下遣其將和昊率衆伐驪靬戎於南山大敗而還太尉桓溫入關王擢時鎮隴西馳使於祚言溫善用兵勢在難測祚既震懼又慮擢反噬即召馬岌復位而與之謀密遣親人刺擢事覺不克祚益懼大聚衆聲言東征實欲西保敦煌會溫還而止更遣其平東將軍秦州刺史牛霸司兵張芳率三千人擊擢破之擢奔于苻健其國中五月霜降殺苗稼果實祚宗人張瓘時鎮枹罕祚惡其強遣其將易揣張玲率步騎萬三千以襲之時張掖人王鸞頗知神道言於祚曰軍出不復還涼國將有不利矣祚大怒以鸞訞言沮衆斬之以徇三軍乃發鸞臨刑曰我死不二十日軍必敗時有神降於玄武殿自稱玄冥與人交語祚日夜祈之神言與之福利祚甚信之祚又遣張掖太守索孚代瓘鎮枹罕為瓘所殺玲等濟河未畢又為瓘兵所破揣單騎奔走瓘軍躡之祚衆震懼敦煌人宋混與弟澄等聚衆以應瓘趙長張璹等懼罪入閣呼重華母馬氏出殿拜耀靈庶弟玄靚為主揣等率衆入殿伐長殺之瓘弟琚及子嵩募數百市人揚聲言張祚無道我兄大軍已到城東敢有舉手者誅三族祚衆披散琚嵩率衆入城祚按劍殿上大呼令左右死戰祚既失衆心莫有鬬志於是被殺梟其首宣示內外暴尸道左國內咸稱萬歲祚篡立三年而亡玄靚字元安既立自號大都督大將軍校尉涼州牧西平公赦其國內廢和平之號復稱建興四十三年誅祚二子以張瓘為衛將軍領兵萬人行大將軍事改易僚屬有隴西人李儼誅大姓彭姚自立於隴右奉中興年號百姓悅之玄靚遣牛霸率衆討之未達而西平人衛綝又據郡叛霸衆潰單騎而還瓘先欲征綝以兄圭在綝中為疑綝亦以弟在瓘中故彼我經年不相伐西平人郭勛解天文不應州郡之命綝禮聘之勛曰張氏應衰衛氏當興豈得以一弟而滅一門宜速伐瓘綝將從之瓘遣弟琚領大衆征綝敗之西平田旋要酒泉太守馬基背瓘應綝旋謂基曰綝擊其東我等絶其西不六旬天下可定斯閉口捕舌也基許之瓘遣司馬張姚王國將二千人伐基敗之斬基旋二人之首傳姑臧瓘兄弟強盛負其勳力有篡立之謀輔國宋混與弟澄共討瓘盡夷其屬玄靚以混為都督中外諸軍事車騎大將軍假節輔政混卒又以澄代之玄靚右司馬張雍惡澄專擅殺之遂滅宋氏玄靚乃以雍為中護軍叔父天錫為中領軍共輔政雍自以功大驕矜淫縱又通馬氏樹黨專權國人患之天錫腹心郭增劉肅二人並年十八九因寢謂天錫曰天下事欲未靜天錫曰何謂也二人曰今護軍出入有似長寧天錫大驚曰我早疑之未敢出口計當云何肅曰政當速除之耳天錫曰安得其人肅曰肅即是也天錫曰汝年少更求可與謀者肅曰趙白駒及肅二人足以辦之矣於是天錫從兵四百人與雍俱入朝肅與白駒剔刀鞘出刃從天錫入值雍於門下肅斫之不中白駒繼之又不克二人與天錫俱入禁中雍得逸走因率甲士三百餘人反攻禁門天錫上屋大呼謂將士曰張雍凶逆所行無道諸宋何罪盡誅滅之傾覆國家肆亂社稷我不惜死實懼先人廢祀事不獲已故耳我家門戶事而將士豈可以干戈見向今之所取雍身而已天地有靈吾不食言雍衆聞之悉散走雍以劍自刎而死於是悉誅雍黨玄靚年既幼沖性又仁弱天錫既克雍專掌朝政改建興四十九年奉升平之號興寧元年駿妻馬氏卒玄靚以其庶母郭氏為太妃郭氏以天錫專政與大臣張欽等謀討之事泄欽等伏法是歲天錫率衆入禁門潛害玄靚宣言暴薨時年十四在位九年私諡曰沖公孝武帝賜諡曰敬悼公天錫字純嘏駿少子也小名獨活初字公純嘏入朝人笑其三字因自改焉玄靚死國人立之自號大將軍校尉涼州牧西平公遣司馬綸騫奉章請命并送御史俞歸還京都太和初詔以天錫為大將軍大都督督隴右關中諸軍事護羌校尉涼州刺史西平公天錫數宴園池政事頗廢蕩難將軍校書祭酒索商上疏極諫天錫答曰吾非好行行有得也觀朝榮則敬才秀之士玩芝蘭則愛德行之臣覩松竹則思貞操之賢臨清流則貴廉潔之行覽蔓草則賤貪穢之吏逢飈風則惡凶狡之徒若引而申之觸類而長之庶無遺漏矣羌廉岐自稱益州刺史率略陽四千家背苻堅就李儼天錫自往討之以別駕楊遹為監前鋒軍事前將軍趣金城晉興相常據為使持節征東將軍向左南遊擊將軍張統出白土天錫自率三萬人次倉松伐儼儼大敗入城固守遣子純求救於苻堅堅使其將王猛救之天錫敗績死者十二三天錫乃還立子大懷為世子自天錫之嗣事也連年地震山崩水泉湧出柳化為松火生泥中而天錫荒于聲色不恤政事初安定梁景敦煌劉肅並以門胄總角與天錫友昵張雍之誅肅景有勳天錫深德之賜姓張氏又改其字以為己子天錫諸子皆以大為字故景曰大奕肅曰大誠廢大懷為高昌公更立嬖子大豫為世子景肅等俱參政事人情怨懼從弟從事中郎憲切諫不納時苻堅強盛每攻之兵無寧歲天錫甚懼乃立壇刑牲率典軍將軍張寧中堅將軍馬芮等遙與晉三公盟誓獻書大司馬桓溫剋六年夏誓同大舉遣從事中郎韓博奮節將軍康妙奉表并送盟文博有口才溫甚稱之嘗大會溫使司馬刁彝嘲之彝謂博曰君是韓盧後邪博曰卿是韓盧後溫笑曰刁以君姓韓故相問焉他自姓刁那得韓盧後邪博曰明公脫未之思短尾者則為刁也一坐推歎焉太元元年苻堅遣其將苟萇毛當梁熙姚萇來寇渡石城津天錫集議中録事席仂曰先公既有故事徐思後變此孫仲謀屈伸之略也衆以仂為老怯咸曰龍驤將軍馬達精兵萬人距之必不敢進廣武太守辛章保城固守章與晉興相彭知正西平相趙疑謀曰馬達出於行陳必不為用則秦軍深入吾相與率三郡精卒斷其糧運決一朝命矣征東常據亦欲先擊姚萇須天錫命天錫率萬人頓金昌城馬達率萬人逆萇等因請降兵人散走常據席仂皆戰死司兵趙充哲與萇苦戰又死中衛將軍史景亦沒于陳天錫大懼出城自戰城內又反天錫窘逼降于萇等初天錫所居安昌門及平章殿無故而崩旬日而國亡即位凡十三年自軌為涼州至天錫凡九世七十六年矣苻堅先為天錫起宅至以為尚書封歸義侯堅大敗于淮肥時天錫為苻融征南司馬於陳歸國詔曰昔孟明不替終顯厥功豈以一眚而廢才用其以天錫為散騎常侍左員外又詔曰故太尉西平公張軌著德遐域世襲前勞強兵縱害遂至失守散騎常侍天錫拔迹登朝先祀淪替用增矜慨可復天錫西平郡公爵俄拜金紫光祿大夫天錫少有文才流譽遠近及歸朝甚被恩遇朝士以其國破身虜多共毀之會稽王道子嘗問其西土所出天錫應聲曰桑椹甜甘鴟梟革響乳酪養性人無妬心後形神昏喪雖處列位不復被齒遇隆安中會稽世子元顯用事常延致之以為戲弄以其家貧拜廬江太守本官如故桓玄時欲招懷四遠乃用天錫為護羌校尉涼州刺史尋卒年六十一追贈金紫光祿大夫史臣曰長河外區流沙作紀玉關懸險金城負固有苗攸竄帝舜投而不羈渠搜是居大禹即而方世逢多難嬰五郡以誰何時遇兵凶阻三邊而高視雖非久安之地足為苟全之所乎周公保之而立功士彥擁之而延世摯虞觀象記洪災之不流侯瑾覘泉知霸者之斯在匪唯地勢抑亦有天道歟茂駿重華資忠踵武崎嶇僻陋無忘本朝故能西控諸戎東攘巨猾綰纍葉之圭組賦絶域之琛賨振曜遐荒良由杖順之效矣祚以卑孽陰傾冢嗣播有茨於彤管擬宸居於黑山丁琪以切諫遇誅夷王鸞以讜言嬰顯戮境內雲擾讐其竊名卒致梟懸自然之理也純嘏微弱竟亡其衆奉身魏闕齒迹朝流再襲銀黃祖德之延慶矣贊曰三象構氛九土瓜分鼎遷江介地絶河濆歸誠晉室美矣張君內撫遺黎外攘逋寇世既綿遠國亦完富杖順為基蓋天所祐
