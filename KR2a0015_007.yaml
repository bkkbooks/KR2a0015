body:
  text: 晉書卷七帝紀第七成帝成皇帝諱衍字世根明帝長子也太寧三年三月戊辰立為皇太子閏月戊子明帝崩己丑太子即皇帝位大赦增文武位二等賜魚衆寡孤老帛人二匹尊皇后庾氏為皇太后秋九月癸卯皇太后臨朝稱制司徒王導録尚書事與中書令庾亮參輔朝政以撫軍將軍南頓王宗為驃騎將軍領軍將軍汝南王祐為衛將軍辛丑葬明帝於武平陵冬十一月癸巳朔日有蝕之廣陵相曹渾有罪下獄死咸和元年春二月丁亥大赦改元大酺五日賜魚衆寡孤老米人二斛京師百里內復一年夏四月石勒遣其將石生寇汝南汝南人執內史祖濟以叛甲子尚書左僕射鄧攸卒五月大水六月癸亥使持節散騎常侍監淮北諸軍事北中郎將徐州刺史泉陵公劉遐卒癸酉以車騎將軍郗鑒領徐州刺史征虜將軍郭默為北中郎將假節監淮北諸軍劉遐部曲將李龍史迭奉遐子肇代遐位以距默臨淮太守劉矯擊破之斬龍傳首京師秋七月癸丑使持節都督江州諸軍事江州刺史平南將軍觀陽伯應詹卒八月以給事中前將軍丹楊尹溫嶠為平南將軍假節都督江州刺史九月旱李雄將張龍寇涪陵執太守謝俊冬十月封魏武帝玄孫曹勱為陳留王以紹魏丙寅衛將軍汝南王祐薨己巳封皇弟嶽為吳王車騎將軍南頓王宗有罪伏誅貶其族為馬氏免太宰西陽王羕降為弋陽縣王庚辰赦百里內五歲以下刑是月劉曜將黃秀帛成寇酇平北將軍魏該帥衆奔襄陽十一月壬子大閲于南郊改定王侯國秩九分食一石勒將石聰攻壽陽不克遂侵逡遒阜陵加司徒王導大司馬假黃鉞都督中外征討諸軍事以禦之歷陽太守蘇峻遣其將韓晃討石聰走之時大旱自六月不雨至於是月十二月濟太守劉闓殺下邳內史夏侯嘉叛降石勒梁王翹薨二年春正月寧州秀才龐遺起義兵攻李雄將任回李謙等雄遣其將羅恆費黑救之寧州刺史尹奉遣裨將姚嶽朱提太守楊術援遺戰于臺登嶽等敗績術死之三月益州地震夏四月旱己未豫章地震五月甲申朔日有蝕之丙戌加豫州刺史祖約為鎮西將軍戊子京師大水冬十月劉曜使其子胤侵枹罕遂略河南地十一月豫州刺史祖約歷陽太守蘇峻等反十二月辛亥蘇峻使其將韓晃入姑孰屠于湖壬子彭城王雄章武王休叛奔峻庚申京師戒嚴假護軍將軍庾亮節為征討都督以右衛將軍趙胤為冠軍將軍歷陽太守使與左將軍司馬流帥師距峻戰于慈湖流敗死之假驍騎將軍鍾雅節帥舟軍與趙胤為前鋒以距峻丙寅徙封琅邪王昱為會稽王吳王嶽為琅邪王辛未宣城內史桓彝及峻戰于蕪湖彝軍敗績車騎將軍郗鑒遣廣陵相劉矩帥師赴京師三年春正月平南將軍溫嶠帥師救京師次於尋陽遣督護王愆期西陽太守鄧嶽鄱陽太守紀睦為前鋒征西大將軍陶侃遣督護龔登受嶠節度鍾雅趙胤等次慈湖王愆期鄧嶽等次直瀆丁未峻濟自橫江登牛渚二月庚戌峻至于蔣山假領軍將軍卞壼節帥六軍及峻戰于西陵王師敗績丙辰峻攻青溪柵因風縱火王師又大敗尚書令領軍將軍卞壼丹楊尹羊曼黃門侍郎周導廬江太守陶瞻並遇害死者數千人庾亮又敗于宣陽門內遂攜其諸弟與郭默趙胤奔尋陽於是司徒王導右光祿大夫陸曄荀嵩等衛帝于太極殿太常孔愈守宗廟賊乘勝麾戈接於帝座突入太后後宮左右侍人皆見掠奪是時太官唯有燒餘米數石以供御膳百姓號泣響震都邑丁巳峻矯詔大赦又以祖約為侍中太尉尚書令自為驃騎將軍録尚書事吳郡太守庾冰奔于會稽三月丙子皇太后庾氏崩夏四月石勒攻宛南陽太守王國叛降於勒壬申葬明穆皇后于武平陵五月乙未峻逼遷天子于石頭帝哀泣升車宮中慟哭峻以倉屋為宮遣管商張瑾弘徽寇晉陵韓晃寇義興吳興太守虞潭與庾冰王舒等起義兵于三吳丙午征西大將軍陶侃平南將軍溫嶠護軍將軍庾亮平北將軍魏該舟軍四萬次于蔡洲六月韓晃攻宣城內史桓彝力戰死之壬辰平北將軍雍州刺史魏該卒于師廬江太守毛寶攻賊合肥戍拔之秋七月祖約為石勒將石聰所攻衆潰奔于歷陽石勒將石季龍攻劉曜於蒲坂八月曜及石季龍戰于高候季龍敗績曜遂圍石生于洛陽九月戊申司徒王導奔于白石庚午陶侃使督護楊謙攻峻于石頭溫嶠庾亮陳于白石竟陵太守李陽距賊南偏峻輕騎出戰墜馬斬之衆遂大潰賊黨復立峻弟逸為帥前交州刺史張璉據始興反進攻廣州鎮南司馬曾協等擊破之冬十月李雄將張龍寇涪陵太守趙弼沒于賊十二月乙未石勒敗劉曜于洛陽獲之是歲石勒將石季龍攻氐帥蒲洪於隴山降之四年春正月帝在石頭賊將匡術以苑城歸順百官赴焉侍中鍾雅右衛將軍劉超謀奉帝出為賊所害戊辰冠軍將軍趙胤遣將甘苗討祖約于歷陽敗之約奔于石勒其將牽騰帥衆降峻子碩攻臺城又焚太極東堂祕閣皆盡城中大飢米斗萬錢二月大雨霖丙戌諸軍攻石頭李陽與蘇逸戰於柤浦陽軍敗建威長史滕含以鋭卒擊之逸等大敗含奉帝御于溫嶠舟羣臣頓首號泣請罪弋陽王羕有罪伏誅丁亥大赦時兵火之後宮闕灰燼以建平園為宮甲午蘇逸以萬餘人自延陵湖將入吳興乙未將軍王允之及逸戰於溧陽獲之壬寅以湘州并荊州劉曜太子毗與其大司馬劉胤帥百官奔于上邽關中大亂三月壬子以征西大將軍陶侃為太尉封長沙郡公車騎將軍郗鑒為司空封南昌縣公平南將軍溫嶠為驃騎將軍開府儀同三司封始安郡公其餘封拜各有差庚午以右光祿大夫陸曄為衛將軍開府儀同三司復封高密王紘為彭城王以護軍將軍庾亮為平西將軍都督揚州之宣城江西諸軍事假節領豫州刺史鎮蕪湖夏四月乙未驃騎將軍始安公溫嶠卒秋七月有星孛于西北會稽吳興宣城丹楊大水詔復遭賊郡縣租稅三年八月劉曜將劉胤等帥衆侵石生次于雍九月石勒將石季龍擊胤斬之進屠上邽盡滅劉氏坑其黨三千餘人冬十月廬山崩十二月壬辰右將軍郭默害平南將軍江州刺史劉胤太尉陶侃帥衆討默是歲天裂西北五年春正月己亥大赦癸亥詔除諸將任子二月以尚書陸玩為尚書左僕射孔愈為右僕射夏五月旱且飢疫乙卯太尉陶侃擒郭默于尋陽斬之石勒將劉徵寇南沙都尉許儒遇害進入海虞六月癸巳初稅田畝三升秋八月石勒僭即皇帝位使其將郭敬寇襄陽南中郎將周撫退歸武昌中州流人悉降于勒郭敬遂寇襄陽屯于樊城九月造新宮始繕苑城甲辰徙樂成王欽為河間王封彭城王紘子俊為高密王冬十月丁丑幸司徒王導第置酒大會李雄將李壽寇巴東建平監軍毋丘奧太守楊謙退歸宜都十二月張駿稱臣于石勒六年春正月癸巳劉徵復寇婁縣遂掠武進乙未進司空郗鑒都督吳國諸軍事戊午以運漕不繼發王公已下千餘丁各運米六斛二月己丑以幽州刺史大單于段遼為驃騎將軍三月壬戌朔日有蝕之癸未詔舉賢良直言之士夏四月旱六月丙申復故河間王顒爵位封彭城王植子融為樂成王章武王混子珍為章武王秋七月李雄將李壽侵陰平武都氐帥楊難敵降之八月庚子以左僕射陸玩為尚書令七年春正月辛未大赦三月西中郎將趙胤司徒中郎匡術攻石勒馬頭塢克之勒將韓雍寇南沙及海虞夏四月勒將郭敬陷襄陽五月大水秋七月丙辰詔諸養獸之屬損費者多一切除之太尉陶侃遣子平西參軍斌與南中郎將桓宣攻石勒將郭敬破之克樊城竟陵太守李陽拔新野襄陽因而戍之冬十一月壬子朔進太尉陶侃為大將軍詔舉賢良十二月庚戌帝遷于新宮八年春正月辛亥朔詔曰昔犬賊縱暴宮室焚蕩元惡雖翦未暇營築有司屢陳朝會逼狹遂作斯宮子來之勞不日而成既獲臨御大饗羣后九賓充庭百官象物知君子勤禮小人盡力矣思蠲密網咸同斯惠其赦五歲刑以下令諸郡舉力人能舉千五百斤以上者丙寅李雄將李壽陷寧州刺史尹奉及建寧太守霍彪並降之癸酉以張駿為鎮西大將軍丙子石勒遣使致賂詔焚之夏四月詔封故新蔡王弼弟邈為新蔡王以束帛徵處士尋陽翟湯會稽虞喜五月有星隕于肥鄉麒麟騶虞見于遼東乙未車騎將軍遼東公慕容廆卒子皓嗣位六月甲辰撫軍將軍王舒卒秋七月戊辰石勒死子弘嗣偽位其將石聰以譙來降冬十月石弘將石生起兵于關中稱秦州刺史遣使來降石弘將石季龍攻石朗于洛陽因進擊石生俱滅之十二月石生故部將郭權遣使請降九年春正月隕石于涼州二以郭權為鎮西將軍雍州刺史二月丁卯加鎮西大將軍張駿為大將軍三月丁酉會稽地震夏四月石弘將石季龍使石斌攻郭權于郿陷之六月李雄死其兄子班嗣偽位乙卯太尉長沙公陶侃薨大旱詔太官徹膳省刑恤孤寡貶費節用辛未加平西將軍庾亮都督江荊豫益梁雍六州諸軍事秋八月大雩自五月不雨至于是月九月戊寅散騎常侍衛將軍江陵公陸曄卒冬十月李雄子期弒李班而自立班弟玝與其將焦噲羅凱等並來降十一月石季龍弒石弘自立為天王十二月丁卯以東海王沖為車騎將軍琅邪王嶽為驃騎將軍蘭陵人朱縱斬石季龍將郭祥以彭城來降咸康元年春正月庚午朔帝加元服大赦改元增文武位一等大酺三日賜魚衆寡孤獨不能自存者米人五斛二月甲子帝親釋奠揚州諸郡飢遣使振給三月乙酉幸司徒府夏四月癸卯石季龍寇歷陽加司徒王導大司馬假黃鉞都督征討諸軍事以禦之癸丑帝觀兵于廣莫門分命諸將遣將軍劉仕救歷陽平西將軍趙胤屯慈湖龍驤將軍路永戍牛渚建武將軍王允之戍蕪湖司空郗鑒使廣陵相陳光帥衆衛京師賊退向襄陽戊午解嚴石季龍將石遇寇中廬南中郎將王國退保襄陽秋八月長沙武陵大水束帛徵處士翟湯郭翻冬十月乙未朔日有蝕之是歲大旱會稽餘姚尤甚米斗五百價人相賣二年春正月辛巳彗星見于奎以吳國內史虞潭為衛將軍二月算軍用稅米空懸五十餘萬石尚書謝褒已下免官辛亥立皇后杜氏大赦增文武位一等庚申高句驪遣使貢方物三月旱詔太官減膳免所旱郡縣繇役戊寅大雩夏四月丁巳皇后見于太廟雨雹秋七月揚州會稽飢開倉振給冬十月廣州刺史鄧嶽遣督護王隨擊夜郎新昌太守陶協擊興古並克之詔曰歷觀先代莫不褒崇明祀賓禮三恪故嵵宋啓土光于周典宗姬侯衛垂美漢册自頃喪亂庶邦殄悴周漢之後絶而莫繼其詳求衛公山陽公近屬有履行修明可以繼承其祀者依舊典施行新作朱雀浮桁十一月遣建威將軍司馬勳安集漢中為李期將李壽所敗三年春正月辛卯立太學夏六月旱冬十月丁卯慕容皓自立為燕王四年春二月石季龍帥衆七萬擊段遼于遼西遼奔于平岡夏四月李壽弒李期僭即偽位國號漢石季龍為慕容皓所敗癸丑加皓征北大將軍五月乙未以司徒王導為太傅都督中外諸軍事司空郗鑒為太尉征西將軍庾亮為司空六月改司徒為丞相以太傅王導為之秋八月丙午分寧州置安州五年春正月辛丑大赦三月乙丑廣州刺史鄧嶽伐蜀建寧人孟彥執李壽將霍彪以降夏四月辛未征西將軍庾亮遣參軍趙松擊巴郡江陽獲石季龍將李閎黃植等秋七月庚申使持節侍中丞相領揚州刺史始興公王導薨辛酉以護軍將軍何充録尚書事八月壬午復改丞相為司徒辛酉太尉南昌公郗鑒薨九月石季龍將夔安李農陷沔南張貉陷邾城因寇江夏義陽征虜將軍毛寶西陽太守樊俊義陽太守鄭進並死之夔安等進圍石城竟陵太守李陽距戰破之斬首五千餘級安乃退遂略漢東擁七千餘家遷于幽冀冬十二月丙戌以驃騎將軍琅邪王嶽為司徒李壽將李奕寇巴東守將勞揚戰敗死之六年春正月庚子使持節都督江豫益梁雍交廣七州諸軍事司空都亭侯庾亮薨辛亥以左光祿大夫陸玩為司空二月慕容皓及石季龍將石成戰于遼西敗之獻捷于京師庚辰有星孛于太微三月丁卯大赦以車騎將軍東海王沖為驃騎將軍李壽陷丹川守將孟彥劉齊李秋皆死之秋七月乙卯初依中興故事朔望聽政于東堂冬十月林邑獻馴象十一月癸卯復琅邪比漢豐沛七年春二月甲子朔日有蝕之己卯慕容皓遣使求假燕王章璽許之三月戊戌杜皇后崩夏四月丁卯葬恭皇后于興平陵實編戶王公已下皆正土斷白籍秋八月辛酉驃騎將軍東海王沖薨九月罷太僕官冬十二月癸酉司空興平伯陸玩薨除樂府雜伎罷安州八年春正月己未朔日有蝕之乙丑大赦三月初以武悼楊皇后配饗武帝廟夏六月庚寅帝不悆詔曰朕以眇年獲嗣洪緒託于王公之上于茲十有八年未能闡融政道翦除逋祲夙夜戰兢匪遑寧處今遘疾殆不興是用震悼于厥心千齡眇眇未堪艱難司徒琅邪王嶽親則母弟體則仁長君人之風允塞時望肆爾王公卿士其輔之以祗奉祖宗明祀協和內外允執其中嗚呼敬之哉無墜祖宗之顯命壬辰引武陵王晞會稽王昱中書監庾冰中書令何充尚書令諸葛恢並受顧命癸巳帝崩于西堂時年二十二葬興平陵廟號顯宗帝少而聰敏有成人之量南頓王宗之誅也帝不之知及蘇峻平問庾亮曰常曰白頭公何在亮對以謀反伏誅帝泣謂亮曰舅言人作賊便殺之人言舅作賊復若何亮懼變色庾懌嘗送酒於江州刺史王允之允之與犬犬斃懼而表之帝怒曰大舅已亂天下小舅復欲爾邪懌聞飲藥而死然少為舅氏所制不親庶政及長頗留心萬機務在簡約常欲于後園作射堂計用四十金以勞費乃止雄武之度雖有愧於前王恭儉之德足追蹤于往烈矣康帝康皇帝諱嶽字世同成帝母弟也咸和元年封吳王二年徙封琅邪王九年拜散騎常侍加驃騎將軍咸康五年遷侍中司徒八年六月庚寅成帝不悆詔以琅邪王為嗣癸巳成帝崩甲午即皇帝位大赦諸屯戍文武及二千石官長不得輒離所局而來奔赴己亥封成帝子丕為琅邪王奕為東海王時帝諒陰不言委政于庾冰何充秋七月丙辰葬成皇帝于興平陵帝親奉奠于西階既發引徒行至閶闔門升素輿至于陵所己未以中書令何充為驃騎將軍八月辛丑彭城王紘薨以江州刺史王允之為衛將軍九月詔琅邪國及府吏進位各有差冬十月甲午衛將軍王允之卒十二月增文武位二等壬子立皇后褚氏建元元年春正月改元振恤魚衆寡孤獨三月以中書監庾冰為車騎將軍夏四月益州刺史周撫西陽太守曹據伐李壽敗其將李恆于江陽五月旱六月壬午又以束帛徵處士尋陽翟湯會稽虞喜有司奏成帝崩一周請改素服御進膳如舊壬寅詔曰禮之降殺因時而寢興誠無常矣至於君親相準名教之重莫之改也權制之作蓋出近代雖曰適事實弊薄之始先王崇之後世猶怠而況因循又從輕降義弗可矣石季龍帥衆伐慕容皓皓大敗之秋七月石季龍將戴開帥衆來降丁巳詔曰慕容皓摧殄羯寇乃云死沒八萬餘人將是其天亡之始也中原之事宜加籌量且戴開已帥部黨歸順宜見慰勞其遣使詣安西驃騎咨謀諸軍事以輔國將軍琅邪內史桓溫為前鋒小督假節帥衆入臨淮安西將軍庾翼為征討大都督遷鎮襄陽庚申晉陵吳郡災八月李壽死子勢嗣偽位石季龍使其將劉寧攻陷狄道冬十月辛巳以車騎將軍庾冰都督荊江司雍益梁六州諸軍事江州刺史以驃騎將軍何充為中書監都督揚豫二州諸軍事揚州刺史録尚書事輔政以琅邪內史桓溫都督青徐兗三州諸軍事徐州刺史褚裒為衛將軍領中書令十一月己巳大赦十二月石季龍侵張駿駿使其將軍謝艾拒之大戰于河西季龍敗績十二月高句驪遣使朝獻二年春正月張駿遣其將和驎謝艾討南羌于闐和大破之二月慕容皓及鮮卑帥宇文歸戰于昌黎歸衆大敗奔于漠北四月張駿將張瓘敗石季龍將王擢于三交城秋八月丙子進安西將軍庾翼為征西將軍庚辰持節都督司雍梁三州諸軍事梁州刺史平北將軍竟陵公桓宣卒丁巳以衛將軍褚裒為特進都督徐兗二州諸軍事兗州刺史鎮金城九月巴東太守楊謙擊李勢勢將申陽走之獲其將樂高丙申立皇子聃為皇太子戊戌帝崩于式乾殿時年二十三葬崇平陵初成帝有疾中書令庾冰自以舅氏當朝權侔人主恐異世之後戚屬將疏乃言國有強敵宜立長君遂以帝為嗣制度年號再興中朝因改元曰建元或謂冰曰郭璞讖云立始之際丘山傾立者建也始者元也丘山諱也冰瞿然既而歎曰如有吉凶豈改易所能救乎至是果驗云史臣曰肆虐滔天豈伊朝夕若乃詳刑不怨庶情猶仰又可以見逆順之機焉成帝因削弱之資守江淮之地政出渭陽聲乖威服凶徒既縱神器阽危京華無敖庾之資宮室類咸陽之火桀犬吠堯封狐嗣亂方諸后羿曷若斯之甚也反我皇駕不有晉文之師繫于苞桑且賴陶公之力古之侯服不幸臣家天子宣遊則避宮北面聞諸遺策用為恆範顯宗于王導之門斂衣前拜豈魯公受玉之卑乎帝亦克儉于躬庶能激揚流弊者也贊曰惟皇夙表余舅為毗勤於致寇拙於行師火及君屋兵䗿帝帷石頭之駕海內含悲康后天資居哀禮縟墜典方興降齡奚促
