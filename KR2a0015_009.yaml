body:
  text: 晉書卷九帝紀第九簡文帝簡文皇帝諱昱字道萬元帝之少子也幼而岐嶷為元帝所愛郭璞見而謂人曰興晉祚者必此人也及長清虛寡欲尤善玄言永昌元年元帝詔曰先公武王先考恭王君臨琅邪繼世相承國嗣未立蒸嘗靡主朕常悼心子昱仁明有智度可以虔奉宗廟以慰罔極之恩其封昱為琅邪王食會稽宣城如舊咸和元年所生鄭夫人薨帝時年七歲號慕泣血固請服重成帝哀而許之故徙封會稽王拜散騎常侍九年遷右將軍加侍中咸康六年進撫軍將軍領祕書監建元元年夏五月癸丑康帝詔曰太常職奉天地兼掌宗廟其為任也可謂重矣是以古今選建未嘗不妙簡時望兼之儒雅會稽王叔履尚清虛志道無倦優游上列諷議朝肆其領太常本官如故永和元年崇德太后臨朝進位撫軍大將軍録尚書六條事二年驃騎何充卒崇德太后詔帝專總萬機八年進位司徒固讓不拜穆帝始冠帝稽首歸政不許廢帝即位以琅邪王絶嗣復徙封琅邪而封王子昌明為會稽王帝固讓故雖封琅邪而不去會稽之號太和元年進位丞相録尚書事入朝不趨讚拜不名劍履上殿給羽葆鼓吹班劍六十人又固讓及廢帝廢皇太后詔曰丞相録尚書會稽王體自中宗明德劭令英秀玄虛神棲事外以具瞻允塞故阿衡三世道化宣流人望攸歸為日已久宜從天人之心以統皇極主者明依舊典以時施行於是大司馬桓溫率百官進太極前殿具乘輿法駕奉迎帝於會稽邸於朝堂變服著平巾幘單衣東向拜受璽綬咸安元年冬十一月己酉即皇帝位桓溫出次中堂令兵屯衛乙卯溫奏廢太宰武陵王晞及子總詔魏郡太守毛安之帥所領宿衛殿內改元為咸安庚戌使兼太尉周頤告于太廟辛亥桓溫遣弟祕逼新蔡王晃詣西堂自列與太宰武陵王晞等謀反帝對之流涕溫皆收付廷尉癸丑殺東海王二子及其母初帝以沖虛簡貴歷宰三世溫素所敬憚及初即位溫乃撰辭欲自陳述帝引見對之悲泣溫懼不能言至是有司承其旨奏誅武陵王晞帝不許溫固執至于再三帝手詔報曰若晉祚靈長公便宜奉行前詔如其大運去矣請避賢路溫覽之流汗變色不復敢言乙卯廢晞及其三子徙于新安丙辰放新蔡王晃于衡陽戊午詔曰王室多故穆哀早世皇胤夙遷神器無主東海王以母弟近屬入纂大統嗣位經年昏暗亂常人倫虧喪大禍將及則我祖宗之靈靡知所託皇太后深懼皇基時定大計大司馬因順天人協同神略親帥羣后恭承明命雲霧既除皇極載清乃顧朕躬仰承弘緒雖伊尹之寧殷朝博陸之安漢室無以尚也朕以寡德猥居元首實懼眇然不克負荷戰戰兢兢罔知攸濟思與兆庶更始其大赦天下大酺五日增文武位二等孝順忠貞魚衆寡孤獨米人五斛己未賜溫軍三萬人人布一匹米一斛庚申加大司馬桓溫為丞相不受辛酉溫旋自白石因鎮姑孰以冠軍將軍毛武生都督荊州之沔中揚州之義城諸軍事十二月戊子詔以京都有經年之儲權停一年之運庚寅廢東海王奕為海西公食邑四千戶辛卯初薦酃淥酒於太廟二年春正月辛丑百濟林邑王各遣使貢方物二月苻堅伐慕容桓於遼東滅之三月丁酉詔曰朕居阿衡三世不能濟彼時雍乃至海西失德殆傾皇祚賴祖宗靈祇之德皇太后淑體應期藩輔忠賢百官勠力用能蕩氛霧於昊蒼耀晨輝於宇宙遂以眇身託于王公之上思賴羣賢以弼其闕夫敦本息末抑絶華競使清濁異流能否殊貫官無秕政士無謗讟不有懲勸則德禮焉施且強寇未殄勞役未息自非軍國戎祀之要其華飾煩費之用皆省之夫肥遁窮谷之賢滑泥揚波之士雖抗志玄霄潛默幽岫貪屈高尚之道以隆協贊之美孰與自足山水棲遲丘壑徇匹夫之潔而忘兼濟之大邪古人不借賢於曩代朕所以虛想於今日內外百官各勤所司使善無不達惡無不聞令詩人無素餐之刺而吾獲虛心之求焉癸丑詔曰吾承祖宗洪基而昧于政道懼不能允釐天工克隆先業夕惕惟憂若涉泉水賴宰輔忠德道濟伊望羣后竭誠協契斷金內外盡匡翼之規文武致匪躬之節冀因斯道終克弘濟每念干戈未戢公私疲悴藩鎮有疆理之務征戍懷東山之勤或白首戎陳忠勞未或行役彌久儋石靡儲何嘗不昧旦晨興夜分忘寢雖未能撫而巡之且欲達其此心可遣大使詣大司馬并問方伯逮于邊戍宣詔大饗求其所安又籌量賜給悉令周普乙卯詔曰往事故之後百度未充羣僚常俸並皆寡約蓋隨時之義也然退食在朝而祿不代耕非經通之制今資儲漸豐可籌量增俸騶虞見豫章夏四月徙海西公於吳縣西柴里追貶庾后曰夫人六月遣使拜百濟王餘句為鎮東將軍領樂浪太守戊子前護軍將軍庾希舉兵反自海陵入京口晉陵太守卞耽奔于曲阿秋七月壬辰桓溫遣東海內史周少孫討希擒之斬于建康市己未立會稽王昌明為皇太子皇子道子為琅邪王領會稽內史是日帝崩于東堂時年五十三葬高平陵廟號太宗遺詔以桓溫輔政依諸葛亮王導故事帝少有風儀善容止留心典籍不以居處為意凝塵滿席湛如也嘗與桓溫及武陵王晞同載遊版橋溫遽令鳴鼓吹角車馳卒奔欲觀其所為晞大恐求下車而帝安然無懼色溫由此憚服溫既仗文武之任屢建大功加以廢立威振內外帝雖處尊位拱默守道而已常懼廢黜先是熒惑入太微尋而海西廢及帝登阼熒惑又入太微帝甚惡焉時中書郎郗超在直帝乃引入謂曰命之修短本所不計故當無復前日事邪超曰大司馬臣溫方內固社稷外恢經略非常之事臣以百口保之及超請急省其父帝謂之曰致意尊公家國之事遂至於此由吾不能以道匡衛愧歎之深言何能喻因詠庾闡詩云志士痛朝危忠臣哀主辱遂泣下霑襟帝雖神識恬暢而無濟世大略故謝安稱為惠帝之流清談差勝耳沙門支道林嘗言會稽有遠體而無遠神謝靈運迹其行事亦以為赧獻之輩云孝武帝孝武皇帝諱曜字昌明簡文帝第三子也興寧三年七月甲申初封會稽王咸安二年秋七月己未立為皇太子是日簡文帝崩太子即皇帝位詔曰朕以不造奄丁閔凶號天扣地靡知所訴藐然幼沖眇若綴旒深惟社稷之重大懼不克負荷仰憑祖宗之靈積德之祀先帝淳風玄化遺詠在民宰輔英賢勳隆德盛顧命之託實賴匡訓羣后率職百僚勤政冀孤弱之躬有寄皇極之基不墜先恩遺惠播于四海思弘餘潤以康黎庶其大赦天下與民更始九月甲寅追尊皇妣會稽王妃曰順皇后冬十月丁卯葬簡文皇帝于高平陵十一月甲午妖賊盧悚晨入殿庭游擊將軍毛安之等討擒之是歲三吳大旱人多餓死詔所在振給苻堅陷仇池執秦州刺史楊世寧康元年春正月己丑朔改元二月大司馬桓溫來朝三月癸丑詔除丹楊竹格等四桁稅夏五月旱秋七月己亥使持節侍中都督中外諸軍事丞相録尚書大司馬揚州牧平北將軍徐兗二州刺史南郡公桓溫薨庚戌進右將軍桓豁為征西將軍以江州刺史桓沖為中軍將軍都督揚豫江三州諸軍事揚州刺史鎮姑孰八月壬子崇德太后臨朝攝政九月苻堅將楊安寇成都丙申以尚書僕射王彪之為尚書令吏部尚書謝安為尚書僕射吳國內史刁彝為北中郎將徐兗二州刺史鎮廣陵復置光祿勳大司農少府官冬十月西平公張天錫貢方物十一月苻堅將楊安陷梓潼及梁益二州刺史周仲孫帥騎五千南遁二年春正月癸未朔大赦追封諡故會稽世子郁為臨川獻王己酉北中郎將徐兗二州刺史刁彝卒二月癸丑以丹楊尹王坦之為北中郎將徐兗二州刺史丁巳有星孛于女虛三月丙戌彗星見於氐夏四月壬戌皇太后詔曰頃玄象或愆上天表異仰觀斯變震懼于懷夫因變致休自古之道朕敢不克意復心以思厥中又三吳奧壤股肱望郡而水旱併臻百姓失業夙夜惟憂不能忘懷宜時拯恤救其雕困三吳義興晉陵及會稽遭水之縣尤甚者全除一年租布其次聽除半年受振貸者即以賜之五月蜀人張育自號蜀王帥衆圍成都遣使稱藩秋七月涼州地震山崩苻堅將鄧羌攻張育滅之八月以長秋將建權停婚姻九月丁丑有星孛于天市冬十一月己酉天門蛋賊攻郡太守王匪死之征西將軍桓豁遣師討平之長城人錢步射錢弘等作亂吳興太守朱序討平之癸酉鎮遠將軍桓石虔破苻堅將姚萇於墊江三年春正月辛亥大赦夏五月丙午北中郎將徐兗二州刺史藍田侯王坦之卒甲寅以中軍將軍揚州刺史桓沖為鎮北將軍徐州刺史鎮丹徒尚書僕射謝安領揚州刺史秋八月癸巳立皇后王氏大赦加文武位一等九月帝講孝經冬十月癸酉朔日有蝕之十二月甲申神獸門災癸未皇太后詔曰頃日蝕告變水旱不適雖克己思救未盡其方其賜百姓窮者米人五斛癸巳帝釋奠于中堂祠孔子以顏回配太元元年春正月壬寅朔帝加元服見于太廟皇太后歸政甲辰大赦改元丙午帝始臨朝以征西將軍桓豁為征西大將軍領軍將軍郗愔為鎮軍大將軍中軍將軍桓沖為車騎將軍加尚書僕射謝安中書監録尚書事甲子謁建平等四陵夏五月癸丑地震甲寅詔曰頃者上天垂監譴告屢彰朕有懼焉震惕于心思所以議獄緩死赦過宥罪庶因大變與之更始於是大赦增文武位各一等六月封河間王欽子範之為章武王秋七月苻堅將苟萇陷涼州虜刺史張天錫盡有其地乙巳除度田收租之制公王以下口稅米三斛蠲在役之身冬十月移淮北流人於淮南十一月己巳朔日有蝕之詔太官徹膳十二月苻堅使其將苻洛攻代執代王涉翼犍二年春正月繼絶世紹功臣三月以兗州刺史朱序為南中郎將梁州刺史監沔中諸軍鎮襄陽閏月壬午地震甲申暴風折木發屋夏四月己酉雨雹五月丁丑地震六月己巳暴風揚沙石林邑貢方物秋七月乙卯老人星見八月壬辰車騎將軍桓沖來朝丁未以尚書僕射謝安為司徒丙辰使持節都督荊梁寧益交廣六州諸軍事荊州刺史征西大將軍桓豁卒冬十月辛丑以車騎將軍桓沖都督荊江梁益寧交廣七州諸軍事領護南蠻校尉荊州刺史尚書王蘊為徐州刺史督江南晉陵諸軍征西司馬謝玄為兗州刺史廣陵相監江北諸軍壬寅散騎常侍左光祿大夫書令王彪之卒十二月庚寅以尚書王劭為尚書僕射三年春二月乙巳作新宮帝移居會稽王邸三月乙丑雷雨暴風發屋折木夏五月庚午陳留王曹恢薨六月大水秋七月辛巳帝入新宮乙酉老人星見南方四年春正月辛酉大赦郡縣遭水旱者減租稅丙子謁建平等七陵二月戊午苻堅使其子丕攻陷襄陽執南中郎將朱序又陷順陽三月大疫壬戌詔曰狡寇縱逸藩守傾沒疆埸之虞事兼平日其內外衆官各悉心勠力以康庶事又年穀不登百姓多匱其詔御所供事從儉約九親供給衆官廩俸權可減半凡諸役費自非軍國事要皆宜停省以周時務癸未使右將軍毛武生帥師伐蜀夏四月苻堅將韋鍾陷魏興太守吉挹死之五月苻堅將句難彭超陷盱眙高密內史毛璪之為賊所執六月大旱戊子征虜將軍謝玄及超難戰于君川大破之秋八月丁亥以左將軍王蘊為尚書僕射乙未暴風揚沙石九月盜殺建安太守傅湛冬十二月己酉朔日有蝕之五年春正月乙巳謁崇平陵夏四月大旱癸酉大赦五歲刑以下五月大水以司徒謝安為衛將軍儀同三司六月甲寅震含章殿四柱并殺內侍二人甲子以比歲荒儉大赦自太元三年以前逋租宿債皆蠲除之其魚衆寡窮獨孤老不能自存者人賜米五斛丁卯以驃騎將軍琅邪王道子為司徒秋九月癸未皇后王氏崩冬十月九真太守李遜據交州反十一月乙酉葬定皇后于隆平陵六年春正月帝初奉佛法立精舍於殿內引諸沙門以居之丁酉以尚書謝石為尚書僕射初置督運御史官夏六月庚子朔日有蝕之揚荊江三州大水己巳改制度減煩費損吏士員七百人秋七月丙子赦五歲刑已下甲午交址太守杜瑗斬李遜交州平大饑冬十一月己亥以鎮軍大將軍郗愔為司空會稽人檀元之反自號安東將軍鎮軍參軍謝藹之討平之十二月甲辰苻堅遣其襄陽太守閻震寇竟陵襄陽太守桓石虔討擒之七年春三月林邑范熊遣使獻方物秋八月癸卯大赦九月東夷五國遣使來貢方物苻堅將都貴焚燒沔北田穀略襄陽百姓而去冬十月丙子雷八年春二月癸未黃霧四塞三月始興南康廬陵大水平地五丈丁巳大赦夏五月輔國將軍楊亮伐蜀拔五城擒苻堅將魏光秋七月鷹揚將軍郭洽及苻堅將張崇戰于武當大敗之八月苻堅帥衆渡淮遣征討都督謝石冠軍將軍謝玄輔國將軍謝琰西中郎將桓伊等距之九月詔司徒琅邪王道子録尚書六條事冬十月苻堅弟融陷壽春乙亥諸將及苻堅戰于肥水大破之俘斬數萬計獲堅輿輦及雲母車十一月庚申詔衛將軍謝安勞旋師于金城壬子立陳留王世子靈誕為陳留王十二月庚午以寇難初平大赦以中軍將軍謝石為尚書令開酒禁始增百姓稅米口五石前句町王翟遼背苻堅舉兵於河南慕容垂自鄴與遼合遂攻堅子暉於洛陽仇池公楊世奔還隴右遣使稱藩九年春正月庚子封武陵王孫寶為臨川王戊午立新寧王晞子遵為新寧王辛亥謁建平等四陵龍驤將軍劉牢之克譙城車騎將軍桓沖部將郭寶伐新城魏興上庸三郡降之二月辛巳使持節都督荊江梁寧益交廣七州諸軍事車騎將軍荊州刺史桓沖卒慕容垂自洛陽與翟遼攻苻堅子丕於鄴三月以衛將軍謝安為太保苻堅北地長史慕容泓平陽太守慕容沖並起兵背堅夏四月己卯增置太學生百人封張天錫為西平公使竟陵太守趙統伐襄陽克之苻堅將姚萇背堅起兵於北地自立為王國號秦六月癸丑朔崇德皇太后褚氏崩慕容泓為其叔父沖所殺沖自稱皇太弟秋七月戊戌遣兼司空高密王純之修謁洛陽五陵己酉葬康獻皇后于崇平陵百濟遣使來貢方物苻堅及慕容沖戰于鄭西堅師敗績八月戊寅司空郗愔薨九月辛卯前鋒都督謝玄攻苻堅將兗州刺史張崇于鄄城克之甲午加太保謝安大都督揚江荊司豫徐兗青冀幽并梁益雍涼十五州諸軍事冬十月辛亥朔日有蝕之丁巳河間王曇之薨乙丑以玄象乖度大赦庚午立前新蔡王晃弟崇為新蔡王苻堅青州刺史苻朗帥衆來降十二月苻堅將呂光稱制于河右自號酒泉公慕容沖僭即皇帝位于阿房十年春正月甲午謁諸陵二月立國學蜀郡太守任權斬苻堅益州刺史李平益州平三月滎陽人鄭燮以郡來降苻堅國亂使使奉表請迎龍驤將軍劉牢之及慕容垂戰于黎陽王師敗績夏四月丙辰劉牢之與沛郡太守周次及垂戰于五橋澤王師又敗績壬戌太保謝安帥衆救苻堅五月大水苻堅留太子宏守長安奔于五將山六月宏來降慕容沖入長安秋七月苻丕自枋頭西走龍驤將軍檀玄追之為丕所敗旱饑丁巳老人星見八月甲午大赦丁酉使持節侍中中書監大都督十五州諸軍事衛將軍太保謝安薨庚子以琅邪王道子為都督中外諸軍事是月姚萇殺苻堅而僭即皇帝位九月呂光據姑臧自稱涼州刺史苻丕僭即皇帝位于晉陽冬十月丁亥論淮肥之功追封謝安廬陵郡公封謝石南康公謝玄康樂公謝琰望蔡公桓伊永修公自餘封拜各有差是歲乞伏國仁自稱大單于秦河二州牧十一年春正月辛未慕容垂僭即皇帝位于中山壬午翟遼襲黎陽執太守滕恬之乙酉謁諸陵慕容沖將許木末殺慕容沖於長安三月大赦太山太守張願以郡叛降於翟遼夏四月以百濟王世子餘暉為使持節都督鎮東將軍百濟王代王拓拔圭始改稱魏癸巳以尚書僕射陸納為尚書左僕射譙王恬為尚書右僕射六月己卯地震庚寅以前輔國將軍楊亮為西戎校尉雍州刺史鎮衛山陵秋八月庚午封孔靖之為奉聖亭侯奉宣尼祀丁亥安平王邃之薨翟遼寇譙龍驤將軍朱序擊走之冬十月慕容垂破苻丕於河東丕走東垣揚威將軍馮該擊斬之傳首京都甲申海西公奕薨十一月苻丕將苻登僭即皇帝位於隴東十二年春正月乙巳以豫州刺史朱序為青兗二州刺史鎮淮陰丁未大赦壬子暴風發屋折木戊午慕容垂寇河東濟北太守溫詳奔彭城翟遼遣子釗寇陳潁朱序擊走之夏四月戊辰尊夫人李氏為皇太妃己丑雨雹高平人翟暢執太守徐含遠以郡降于翟遼六月癸卯束帛聘處士戴逵龔玄之秋八月辛巳立皇子德宗為皇太子大赦增文武位二等大酺五日賜百官布帛各有差九月戊午復新寧王遵為武陵王立梁王𩼔子和為梁王冬十一月松滋太守王遐之討翟遼于洛口敗之十三年夏四月戊午以青兗二州刺史朱序為持節都督雍梁沔中九郡諸軍事雍州刺史譙王恬之為鎮北將軍青兗二州刺史夏六月旱乞伏國仁死弟乾歸嗣僞位僭號河南王秋九月翟遼將翟發寇洛陽河南太守郭給距破之冬十二月戊子濤水入石頭毀大桁殺人乙未大風晝晦延賢堂災丙申螽斯則百堂客館驃騎庫皆災己亥加尚書令謝石衛將軍開府儀同三司庚子尚書令衛將軍開府儀同三司謝石薨十四年春正月癸亥詔淮南所獲俘虜付諸作部者一皆散遣男女自相配匹賜百日廩其沒為軍賞者悉贖出之以襄陽淮南饒沃地各立一縣以居之彭城妖賊劉黎僭稱皇帝於皇丘龍驤將軍劉牢之討平之二月扶南獻方物呂光僭號三河王夏四月甲辰彭城王弘之薨翟遼寇滎陽執太守張卓六月壬寅使持節都督荊益寧三州諸軍事荊州刺史桓石虔卒秋七月甲寅宣陽門四柱災八月姚萇襲破苻登獲其僞后毛氏丁亥汝南王羲薨九月庚午以尚書左僕射陸納為尚書令冬十二月乙巳雨木冰十五年春正月乙亥鎮北將軍譙王恬之薨龍驤將軍劉牢之及翟遼張願戰于太山王師敗績征虜將軍朱序破慕容永於太行二月辛巳以中書令王恭為都督青兗幽并冀五州諸軍事前將軍青兗二州刺史三月己酉朔地震戊辰大赦秋七月丁巳有星孛于北河八月永嘉人李耽舉兵反太守劉懷之討平之己丑京師地震有星孛于北斗犯紫微沔中諸郡及兗州大水龍驤將軍朱序攻翟遼于滑臺大敗之張願來降九月丁未以吳郡太守王珣為尚書僕射冬十二月己未地震十六年春正月庚申改築太廟夏六月慕容永寇河南太守楊佺期擊破之己未章武王範之薨秋九月癸未以尚書右僕射王珣為尚書左僕射以太子詹事謝琰為尚書右僕射新廟成冬十一月姚萇敗苻登于安定十七年春正月己巳朔大赦除逋租宿債夏四月齊國內史蔣哲殺樂安太守辟閭濬據青州反北平原太守辟閭渾討平之五月丁卯朔日有蝕之六月癸卯京師地震甲寅濤水入石頭毀大桁永嘉郡潮水湧起近海四縣人多死者乙卯大風折木戊午梁王和薨慕容垂襲翟釗于黎陽敗之釗奔于慕容永秋七月丁丑太白晝見八月新作東宮冬十月丁酉太白晝見辛亥都督荊益寧三州諸軍事荊州刺史王忱卒十一月癸酉以黃門郎殷仲堪為都督荊益梁三州諸軍事荊州刺史庚寅徙封琅邪王道子為會稽王封皇子德文為琅邪王十二月己未地震是歲自秋不雨至于冬十八年春正月癸亥朔地震二月乙未地又震三月翟釗寇河南夏六月己亥始興南康廬陵大水深五丈秋七月旱閏月妖賊司馬徽聚黨於馬頭山劉牢之遣部將討平之九月丙戌龍驤將軍楊佺期擊氐帥楊佛嵩于潼谷敗之冬十月姚萇死子興嗣僞位十九年夏六月壬子追尊會稽王太妃鄭氏為簡文宣太后秋七月荊徐二州大水傷秋稼遣使振恤之八月己巳尊皇太妃李氏為皇太后宮曰崇訓慕容垂擊慕容永於長子斬之冬十月慕容垂遣其子惡奴寇廩丘東平太守韋簡及垂將尹國戰于平陸簡死之是歲苻登為姚興所殺登太子崇奔于湟中僭稱皇帝二十年春二月作宣太后廟甲寅散騎常侍光祿大夫開府儀同三司尚書令陸納卒三月庚辰朔日有蝕之夏六月荊徐二州大水十一月魏王拓拔圭擊慕容垂子寶于黍谷敗之二十一年春正月造清暑殿三月慕容垂攻平城拔之夏四月新作永安宮丁亥雨雹慕容垂死子寶嗣僞位五月甲子以望蔡公謝琰為尚書左僕射大水六月呂光僭即天王位秋九月庚申帝崩于清暑殿時年三十五葬隆平陵帝幼稱聰悟簡文之崩也時年十歲至晡不臨左右進諫答曰哀至則哭何常之有謝安嘗嘆以為精理不減先帝既威權己出雅有人主之量既而溺于酒色殆為長夜之飲末年長星見帝心甚惡之於華林園舉酒祝之曰長星勸汝一杯酒自古何有萬歲天子邪太白連年晝見地震水旱為變者相屬醒日既少而傍無正人竟不能改焉時張貴人有寵年幾三十帝戲之曰汝以年當廢矣貴人潛怒向夕帝醉遂暴崩時道子昏惑元顯專權竟不推其罪人初簡文帝見讖云晉祚盡昌明及帝之在孕也李太后夢神人謂之曰汝生男以昌明為字及産東方始明因以為名焉簡文帝後悟乃流涕及為清暑殿有識者以為清暑反為楚聲哀楚之徵也俄而帝崩晉祚自此傾矣史臣曰前史稱不有廢也君何以興若乃天挺惟神光膺嗣位邁油雲而驤首濟沈川而能躍少康一旅之衆所以闡帝圖成湯七十之基所以興王業靜河海於既泄補穹圓於已紊事異於斯則弗由也簡皇以虛白之姿在屯如之會政由桓氏祭則寡人太宗晏駕寧康纂業天誘其衷姦臣自隕于時西踰劍岫而跨靈山北振長河而臨清洛荊吳戰旅嘯吒成雲名賢間出舊德斯在謝安可以鎮雅俗彪之足以正紀綱桓沖之夙夜王家謝玄之善魚桀軍事于時上天乃眷強氐自泯五尺童子振袂臨江思所以挂旆天山封泥函谷而條綱弗垂威恩罕樹道子荒乎朝政國寶彙以小人拜授之榮初非天旨鬻刑之貨自走權門毒賦年滋愁民歲廣是以聞人許榮馳書詣闕烈宗知其抗直而惡聞逆耳肆一醉於崇朝飛千觴於長夜雖復昌明表夢安聽神言而金行穨弛抑亦人事語曰大國之政未陵夷小邦之亂已傾覆也屬苻堅百六之秋棄肥水之衆帝號為武不亦優哉贊曰君若綴旒道非交泰簡皇凝寂不貽伊害孝武登朝姦雄自消燕之擊路鄭叔分鑣倡臨帝席酒勸天妖金風不競人事先雕
