body:
  text: 晉書卷一百二十一載記第二十一李雄李雄字仲俊特第三子也母羅氏夢雙虹自門升天一虹中斷既而生蕩後羅氏因汲水忽然如寐又夢大蛇繞其身遂有孕十四月而生雄常言吾二子若有先亡在者必大貴蕩竟前死雄身長八尺三寸美容貌少以烈氣聞每周旋鄉里識達之士皆器重之有劉化者道術士也每謂人曰關隴之士皆當南移李氏子中惟仲俊有奇表終為人主特起兵於蜀承制以雄為前將軍流死雄自稱大都督大將軍益州牧都於郫城羅尚遣將攻雄雄擊走之李驤攻犍為斷尚運道尚軍大餒攻之又急遂留牙門羅特固守尚委城夜遁特開門內雄遂克成都于時雄軍飢甚乃率衆就穀於郪掘野芋而食之蜀人流散東下江陽南入七郡雄以西山范長生巖居穴處求道養志欲迎立為君而臣之長生固辭雄乃深自挹損不敢稱制事無巨細皆決於李國李離兄弟國等事雄彌謹諸將固請雄即尊位以永興元年僭稱成都王赦其境內建元為建興除晉法約法七章以其叔父驤為太傅兄始為太保折衝李離為太尉建威李雲為司徒翊軍李璜為司空材官李國為太宰其餘拜授各有差追尊其曾祖武曰巴郡桓公祖慕隴西襄王父特成都景王母羅氏曰王太后范長生自西山乘素輿詣成都雄迎之於門執版延坐拜丞相尊曰范賢長生勸雄稱尊號雄於是僭即帝位赦其境內改年曰太武追尊父特曰景帝廟號始祖母羅氏為太后加范長生為天地太師封西山侯復其部曲不豫軍征租稅一入其家雄時建國草創素無法式諸將恃恩各爭班位其尚書令閻式上疏曰夫為國制法勳尚仍舊漢晉故事惟太尉大司馬執兵太傅太保父兄之官論道之職司徒司空掌五教九土之差秦置丞相總領萬機漢武之末越以大將軍統政今國業初建凡百未備諸公大將班位有差降而競請施置不與典故相應宜立制度以為楷式雄從之遣李國李雲等率衆二萬寇漢中梁州刺史張殷奔于長安國等陷南鄭盡徙漢中人于蜀先是南土頻歲飢疫死者十萬計南夷校尉李毅固守不降雄誘建寧夷使討之毅病卒城陷殺壯士三千餘人送婦女千口於成都時李離據梓潼其部將羅羕張金苟等殺離及閻式以梓潼歸于羅尚尚遣其將向奮屯安漢之宜福以逼雄雄率衆攻奮不克時李國鎮巴西其帳下文碩又殺國以巴西降尚雄乃引還遣其將張寶襲梓潼陷之會羅尚卒巴郡亂李驤攻涪又陷之執梓潼太守譙登遂乘勝進軍討文碩害之雄大悅赦其境內改元曰玉衡雄母羅氏死雄信巫覡者之言多有忌諱至欲不葬其司空趙肅諫雄乃從之雄欲申三年之禮羣臣固諫雄弗許李驤謂司空上官惇曰今方難未弭吾欲固諫不聽主上終諒暗君以為何如惇曰三年之喪自天子達於庶人故孔子曰何必高宗古之人皆然但漢魏以來天下多難宗廟至重不可久曠故釋縗絰至哀而已驤曰任回方至此人決於行事且上常難違其言待其至當與俱請及回至驤與回俱見雄驤免冠流涕固請公除雄號泣不許回跪而進曰今王業初建凡百草創一日無主天下惶惶昔武王素甲觀兵晉襄墨絰從戎豈所願哉為天下屈己故也願陛下割情從權永隆天保遂強扶雄起釋服親政是時南得漢嘉涪陵遠人繼至雄於是下寬大之令降附者皆假復除虛己愛人授用皆得其才益州遂定偽立其妻任氏為皇后氐王楊難敵兄弟為劉曜所破奔葭萌遣子入質隴西賊帥陳安又附之遣李驤征越嶲太守李釗降驤進軍由小會攻寧州刺史王遜遜使其將姚嶽悉衆距戰驤軍不利又遇霖雨驤引軍還爭濟瀘水士衆多死釗到成都雄待遇甚厚朝廷儀式喪紀之禮皆決於釗楊難敵之奔葭萌也雄安北李稚厚撫之縱其兄弟還武都難敵遂恃險多為不法稚請討之雄遣中領軍琀及將軍樂次費他李乾等由白水橋攻下辨征東李壽督琀弟玝攻陰平難敵遣軍距之壽不得進而琀稚長驅至武街難敵遣兵斷其歸道四面攻之獲琀稚死者數千人琀稚雄兄蕩之子也雄深悼之不食者數日言則流涕深自咎責焉其後將立蕩子班為太子雄有子十餘人羣臣咸欲立雄所生雄曰起兵之初舉手扞頭本不希帝王之業也值天下喪亂晉氏播蕩羣情義舉志濟塗炭而諸君遂見推逼處王公之上本之基業功由先帝吾兄適統丕祚所歸恢懿明睿殆天所命大事垂克薨于戎戰班姿性仁孝好學夙成必為名器李驤與司徒王達諫曰先王樹冢適者所以防篡奪之萌不可不慎吳子捨其子而立其弟所以有專諸之禍宋宣不立與夷而立穆公卒有宋督之變猶子之言豈若子也深願陛下思之雄不從竟立班驤退而流涕曰亂自此始矣張駿遣使遺雄書勸去尊號稱藩于晉雄復書曰吾過為士大夫所推然本無心於帝王也進思為晉室元功之臣退思共為守藩之將掃除氛埃以康帝宇而晉室陵遲德聲不振引領東望有年月矣會獲來貺情在暗室有何已已知欲遠遵楚漢尊崇義帝春秋之義於斯莫大駿重其言使聘相繼巴郡嘗告急云有東軍雄曰吾嘗慮石勒跋扈侵逼琅邪以為耿耿不圖乃能兵使人欣然雄之雅談多如此類雄以中原喪亂乃頻遣使朝貢與晉穆帝分天下張駿領秦梁先是遣傅穎假道于蜀通表京師雄弗許駿又遣治中從事張淳稱藩于蜀託以假道雄大悅謂淳曰貴主英名蓋世土險兵強何不自稱帝一方淳曰寡君以乃祖世濟忠良未能雪天下之恥解衆人之倒懸日昃忘食枕戈待旦以琅邪中興江東故萬里翼戴將成桓文之事何言自取邪雄有慚色曰我乃祖乃父亦是晉臣往與六郡避難此地為同盟所推遂有今日琅邪若能中興大晉於中夏亦當率衆輔之淳還通表京師天子嘉之時李驤死以其子壽為大將軍西夷校尉督征南費黑征東任雙攻陷巴東太守楊謙退保建平壽別遣費黑寇建平晉巴東監軍毋丘奧退保宜都雄遣李壽攻朱提以費黑卬攀為前鋒又遣鎮南任回征木落分寧州之援寧州刺史尹奉降遂有南中之地雄於是赦其境內使班討平寧州夷以班為撫軍咸和八年雄生瘍於頭六日死時年六十一在位三十年偽諡武帝廟曰太宗墓號安都陵雄性寬厚簡刑約法甚有名稱氐苻成隗文既降復叛手傷雄母及其來也咸釋其罪厚加待納由是夷夏安之威震西土時海內大亂而蜀獨無事故歸之者相尋雄乃興學校置史官聽覽之暇手不釋卷其賦男丁歲穀三斛女丁半之戶調絹不過數丈綿數兩事少役稀百姓富實閭門不閉無相侵盜然雄意在招致遠方國用不足故諸將每進金銀珍寶多有以得官者丞相楊褒諫曰陛下為天下主當網羅四海何有以官買金邪雄遜辭謝之後雄嘗酒醉而推中書令杖太官令褒進曰天子穆穆諸侯皇皇安有天子而為酗也雄即捨之雄無事小出褒於後持矛馳馬過雄雄怪問之對曰夫統天下之重如臣乘惡馬而持矛也急之則慮自傷緩之則懼其失是以馬馳而不制也雄寤即還雄為國無威儀官無祿秩班序不別君子小人服章不殊行軍無號令用兵無部隊戰勝不相讓敗不相救攻城破邑動以虜獲為先此其所以失也李班班字世文初署平南將軍後立為太子班謙虛博納敬愛儒賢自何點李釗班皆師之又引名士王嘏及隴西董融天水文夔等以為賓友每謂融等曰觀周景王太子晉魏太子丕吳太子孫登文章鑒識超然卓絶未嘗不有慚色何古賢之高朗後人之莫逮也為性泛愛動修軌度時諸李子弟皆尚奢靡而班常戒厲之每朝有大議雄輒令豫之班以古者墾田均平貧富獲所今貴者廣占荒田貧者種殖無地富者以己所餘而賣之此豈王者大均之義乎雄納之及雄寢疾班晝夜侍側雄少數攻戰多被傷夷至是疾甚痕皆膿潰雄子越等惡而遠之班為吮膿殊無難色每嘗藥流涕不脫衣冠其孝誠如此雄死嗣偽位以李壽録尚書事輔政班居中執喪禮政事皆委壽及司徒何點尚書令王瓌等越時鎮江陽以班非雄所生意甚不平至此奔喪與其弟期密計圖之李玝勸班遣越還江陽以期為梁州刺史鎮葭萌班以未葬不忍遣推誠居厚心無纖芥時有白氣二道帶天太史令韓豹奏宮中有陰謀兵氣戒在親戚班不悟咸和九年班因夜哭越殺班于殯宮時年四十七在位一年遂立雄之子期嗣位焉李期期字世運雄第四子也聰慧好學弱冠能屬文輕財好施虛心招納初為建威將軍雄令諸子及宗室子弟以恩信合衆多者不至數百而期獨致千餘人其所表薦雄多納之故長史列署頗出其門既殺班欲立越為主越以期雄妻任氏所養又多才藝乃讓位于期于是僭即皇帝位大赦境內改元玉恆誅班弟都使李壽伐都弟玝于涪玝棄城降晉封壽漢王拜梁州刺史東羌校尉中護軍録尚書事封兄越建寧王拜相國大將軍録尚書事立妻閻氏為皇后以其衛將軍尹奉為右丞相驃騎將軍尚書令王瓌為司徒期自以謀大事既果輕諸舊臣外則信任尚書令景騫尚書姚華田褒褒無他才藝雄時勸立期故寵待甚厚內則信宦豎許涪等國之刑政希復關之卿相慶賞威刑皆決數人而已于是綱維紊矣乃誣其尚書僕射武陵公李載謀反下獄死先是晉建威將軍司馬勳屯漢中期遣李壽攻而陷之遂置守宰戍南鄭雄子霸保並不病而死皆云期鴆殺之於是大臣懷懼人不自安天雨大魚于宮中其色黃又宮中豕犬交期多所誅夷籍沒婦女資財以實後庭內外凶凶道路以目諫者獲罪人懷苟免期又鴆殺其安北李攸攸壽之養弟也於是與越及景騫田褒姚華謀襲壽等欲因燒市橋而發兵期又纍遣中常侍許涪至壽所伺其動靜及殺攸壽大懼又疑許涪往來之數也乃率步騎一萬自涪向成都表稱景騫田褒亂政興晉陽之甲以除君側之惡以李奕為先登壽到成都期越不虞其至素不備設壽遂取其城屯兵至門期遣侍中勞壽壽奏相國建寧王越尚書令河南公景騫尚書田褒姚華中常侍許涪征西將軍李遐及將軍李西等皆懷姦亂政謀傾社稷大逆不道罪合夷滅期從之於是殺越騫等壽矯任氏令廢期為邛都縣公幽之別宮期歎曰天下主乃當為小縣公不如死也咸康三年自縊而死時年二十五在位三年諡曰幽公及葬賜鸞輅九旒餘如王禮雄之子皆為壽所殺李壽壽字武考驤之子也敏而好學雅量豁然少尚禮容異於李氏諸子雄奇其才以為足荷重任拜前將軍督巴西軍事遷征東將軍時年十九聘處士譙秀以為賓客盡其讜言在巴西威惠甚著驤死遷大將軍大都督侍中封扶風公録尚書事征寧州攻圍百餘日悉平諸郡雄大悅封建寧王雄死受遺輔政期立改封漢王食梁州五郡領梁州刺史壽威名遠振深為李越景騫等所憚壽深憂之代李玝屯涪每應期朝覲常自陳邊疆寇警不可曠鎮故得不朝壽又見期越兄弟十餘人年方壯大而並有強兵懼不自全乃數聘禮巴西龔壯壯雖不應聘數往見壽時岷山崩江水竭壽惡之每問壯以自安之術壯以特殺其父及叔欲假手報仇未有其由因説壽曰節下若能捨小從大以危易安則開國裂土長為諸侯名高桓文勳流百代矣壽從之陰與長史略陽羅巴西解思明共謀據成都稱藩歸順乃誓文武得數千人襲成都克之縱兵虜掠至乃姦略雄女及李氏諸婦多所殘害數日乃定與思明及李奕王利等勸壽稱鎮西將軍益州牧成都王稱藩于晉而任調與司馬蔡興侍中李艷及張烈等勸壽自立壽命筮之占者曰可數年天子調喜曰一日尚為足而況數年乎思明曰數年天子孰與百世諸侯壽曰朝聞道夕死可矣任侯之言策之上也遂以咸康四年僭即偽位赦其境內改元為漢興以董皎為相國羅馬當為股肱李奕任調李閎為爪牙解思明為謀主以安車束帛聘龔壯為太師壯固辭特聽縞巾素帶居師友之位拔擢幽滯處之顯列追尊父驤為獻帝母咱氏為太后立妻閻氏為皇后世子勢為太子有告廣漢太守李乾與大臣通謀欲廢壽者壽令其子廣與大臣盟于前殿徙乾漢嘉太守大風暴雨震其端門壽深自悔責命羣臣極盡忠言勿拘忌諱遣其散騎常侍王嘏中常侍王廣聘於石季龍先是季龍遺壽書欲連橫入寇約分天下壽大悅乃大修船艦嚴兵繕甲吏卒皆備糇糧以其尚書令馬當為六軍都督假節鉞營東場大閲軍士七萬餘人舟師泝江而上過成都鼓譟盈江壽登城觀之其羣臣咸曰我國小衆寡吳會險遠圖之未易解思明又切諫懇至壽於是命羣臣陳其利害龔壯諫曰陛下與胡通孰如與晉通胡豺狼國也晉既滅不得不北面事之若與之爭天下則強弱勢異此虞虢之成範已然之明戒願陛下熟慮之羣臣以壯之言為然叩頭泣諫壽乃止士衆咸稱萬歲遣其鎮東大將軍李奕征牂柯太守謝恕保城距守者積日不拔會奕糧盡引還壽以其太子勢領大將軍録尚書事壽承雄寬儉新行篡奪因循雄政未逞其志欲會李閎王嘏從鄴還盛稱季龍威強宮觀美麗鄴中殷實壽又聞季龍虐用刑法王遜亦以殺罰御下並能控制邦域壽心欣慕人有小過輒殺以立威又以郊甸未實都邑空虛工匠器械事未充盈乃徙旁郡戶三丁已上以實成都興尚方御府發州郡工巧以充之廣修宮室引水入城務於奢侈又廣太學起宴殿百姓疲於使役呼嗟滿道思亂者十室而九矣其左僕射蔡興切諫壽以為誹謗誅之右僕射李嶷數以直言忤旨壽積忿非一託以他罪下獄殺之壽疾篤常見李期蔡興為祟八年壽死時年四十四在位五年偽諡昭文帝廟曰中宗墓曰安昌陵壽初為王好學愛士庶幾善道每覽良將賢相建功立事者未嘗不反覆誦之故能征伐四克闢國千里雄既垂心於上壽亦盡誠於下號為賢相及即偽位之後改立宗廟以父驤為漢始祖廟特雄為大成廟又下書言與期越別族凡諸制度皆有改易公卿以下率用己之僚佐雄時舊臣及六郡士人皆見廢黜壽初病思明等復議奉王室壽不從李演自越嶲上書勸壽歸正返本釋帝稱王壽怒殺之以威龔壯思明等壯作詩七篇託言應璩以諷壽壽報曰省詩知意若今人所作賢哲之話言也古人所作死鬼之常辭耳動慕漢武魏明之所為恥聞父兄時事上書者不得言先世政化自以己勝之也李勢勢字子仁壽之長子也初壽妻閻氏無子驤殺李鳳為壽納鳳女生勢期愛勢姿貌拜翊軍將軍漢王世子勢身長七尺九寸腰帶十四圍善於俯仰時人異之壽死勢嗣偽位赦其境內改元曰太和尊母閻氏為太后妻李氏為皇后太史令韓皓奏熒惑守心以宗廟禮廢勢命羣臣議之其相國董皎侍中王嘏等以為景武昌業獻文承基至親不遠無宜疏絶勢更令祭特雄同號曰漢王勢弟大將軍漢王廣以勢無子求為太弟勢弗許馬當解思明以勢兄弟不多若有所廢則益孤危固勸許之勢疑當等與廣有謀遣其太保李奕襲廣於涪城命董皎收馬當思明斬之夷其三族貶廣為臨邛侯廣自殺思明有計謀強諫諍馬當甚得人心自此之後無復紀綱及諫諍者李奕自晉壽舉兵反之蜀人多有從奕者衆至數萬勢登城距戰奕單騎突門門者射而殺之衆乃潰散勢既誅奕大赦境內改年嘉寧初蜀土無獠至此始從山而出北至犍為梓潼布在山谷十餘萬落不可禁制大為百姓之患勢既驕吝而性愛財色常殺人而取其妻荒淫不恤國事夷獠叛亂軍守離缺境宇日蹙加之荒儉性多忌害誅殘大臣刑獄濫加人懷危懼斥外父祖臣佐親任左右小人羣小因行威福又常居內少見公卿史官屢陳災譴乃加董皎太師以名位優之實欲與分災眚大司馬桓溫率水軍伐勢溫次青衣勢大發軍距守又遣李福與咱堅等數千人從山陽趣合水距溫謂溫從步道而上諸將皆欲設伏於江南以待王師咱堅不從率諸軍從江北鴛鴦崎渡向犍為而溫從山陽出江南咱堅到犍為方知與溫異道乃回從沙頭津北渡及堅至溫已造成都之十里陌咱堅衆自潰溫至城下縱火燒其大城諸門勢衆惶懼無復固志其中書監王嘏散騎常侍常璩等勸勢降勢以問侍中馮孚孚言昔吳漢征蜀盡誅公孫氏今晉下書不赦諸李雖降恐無全理勢乃夜出東門與咱堅走至晉壽然後送降文於溫曰偽嘉寧二年三月十七日略陽李勢叩頭死罪伏惟大將軍節下先人播流恃險因釁竊自汶蜀勢以暗弱復統末緒偷安荏苒未能改圖猥煩朱軒踐冒險阻將士狂愚干犯天威仰慚府愧精魂飛散甘受斧鑕以釁軍鼓伏惟大晉天網恢弘澤及四海恩過陽日逼迫食卒自投草野即日到白水城謹遣私署散騎常侍王幼奉箋以聞并敕州郡投戈釋杖窮池之魚待命漏刻勢尋輿櫬面縛軍門溫解其縛焚其櫬遷勢及弟福從兄權親族十餘人于建康封勢歸義侯升平五年死于建康在位五年而敗始李特以惠帝太安元年起兵至此六世凡四十六年以穆帝永和三年滅史臣曰昔周德方隆古公切踰梁之患漢祚斯永宣后興渡湟之師是知戎狄亂華釁深自古況乎巴濮雜種厥類實繁資剽竊以全生習獷悍而成俗李特世傳凶狡早擅梟雄太息劍門志吞井絡屬晉綱之落紐乘羅侯之無斷騁馬屬鞬同聲雲集殲殄蜀漢薦食巴梁沃野無半菽之資華陽有析骸之爨蓋上失其道覆敗之至於斯仲俊天挺英姿見稱奇偉推鋒纍載克隆霸業蹈玄德之前基掩子陽之故地薄賦而綏弊俗約法而悅新邦擬於其倫實孫權之亞也若夫立子以嫡往哲通訓繼體承基前修茂範而雄暗經國之遠圖蹈匹夫之小節傳大統於猶子託強兵於厥胤遺骸莫斂尋戈之釁已深星紀未周傾巢之釁便及雖云天道抑亦人謀班以寬愛罹災期以暴戾速禍殊塗並失異術同亡武考憑藉世資窮兵竊位罪百周帶毒甚楚圍獲保歸全何其幸也子仁承緒繼傳昏虐驅率餘燼敢距大邦授甲晨征則理均於困獸斬關宵遁則義殊於前禽宜其懸首國門以明大戮遂得禮同劉禪不亦優乎贊曰晉圖弛馭百六斯鍾天垂伏鱉野戰羣龍李特窺釁盜我巴庸世歷五朝年將四紀篡殺移國昏狂繼軌德之不修險亦難恃
