body:
  text: 晉書卷二十三志第十三樂下永嘉之亂海內分崩伶官樂器皆沒於劉石江左初立宗廟尚書下太常祭祀所用樂名太常賀循答云魏氏增損漢樂以為一代之禮未審大晉樂名所以為異遭離喪亂舊典不存然此諸樂皆和之以鍾律文之以五聲詠之於歌辭陳之於舞列宮懸在庭琴瑟在堂八音迭奏雅樂並作登歌下管各有常詠周人之舊也自漢氏以來依倣此禮自造新詩而已舊京荒廢今既散亡音韻曲折又無識者則於今難以意言于時以無雅樂器及伶人省太樂并鼓吹令是後頗得登歌食舉之樂猶有未備太寧末明帝又訪阮孚等增益之咸和中成帝乃復置太樂官鳩集遺逸而尚未有金石也庾亮為荊州與謝尚修復雅樂未具而亮薨庾翼桓溫專事軍旅樂器在庫遂至朽壞焉及慕容俊平冉閔兵戈之際而鄴下樂人亦頗有來者永和十一年謝尚鎮壽陽於是採拾樂人以備太樂并制石磬雅樂始頗具而王猛平鄴慕容氏所得樂聲又入關右太元中破苻堅又獲其樂工楊蜀等間習舊樂於是四廂金石始備焉乃使曹毗王珣等增造宗廟歌詩然郊祀遂不設樂今列其詞於後云歌宣帝曹毗於赫高祖德協靈符應運撥亂釐整天衢勳格宇宙化動八區肅以典刑陶以玄珠神石吐瑞靈芝自敷肇基天命道均唐虞歌景帝曹毗景皇承運纂隆洪緒皇羅重抗天暉再舉蠢矣二寇擾我揚楚乃整元戎以膏齊斧亹亹神算赫赫王旅鯨鯢既平功冠帝宇歌文帝曹毗太祖齊聖王猷誕融仁教四塞天基纍崇皇室多難嚴清紫宮威厲秋霜惠過春風平蜀夷楚以文以戎奄有參墟聲流無窮歌武帝曹毗於穆武皇允龔欽明應期登禪龍飛紫庭百揆時序聽斷以情殊域既賓僞吳亦平晨流甘露宵映朗星野有擊壤路垂頌聲歌元帝曹毗運屯百六天羅解貫元皇勃興網籠江漢仰齊七政俯平禍亂化若風行澤猶雨散淪光更曜金輝復煥德冠千載蔚有餘粲歌明帝曹毗明明肅祖闡弘帝祚英風夙發清暉載路姦逆縱忒罔式皇度躬振朱旗遂豁天步宏猷允塞高羅雲布品物咸寧洪基永固歌成帝曹毗於休顯宗道澤玄播式宣德音暢物以和邁德蹈仁匪禮不過敷以純風濯以清波連理映阜鳴鳳棲柯同規放勛義蓋山河歌康帝曹毗康皇穆穆仰嗣洪德為而不宰雅音四塞間邪以誠鎮物以默威靜區宇道宣邦國歌穆帝曹毗孝宗夙哲休音允臧如彼晨離耀景扶桑垂訓華幄流潤八荒幽贊玄妙爰該典章西平僭蜀北靜舊疆高猷遠暢朝有遺芳歌哀帝曹毗於穆哀皇聖心虛遠雅好玄古大庭是踐道尚無為治存易簡化若風行時猶草偃雖曰登遐徽音彌闡愔愔雲韶盡美盡善歌簡文帝王珣皇矣簡文於昭于天靈明若神周淡如川沖應其來實與其遷亹亹心化日用不言易而有親簡而可傳觀流彌遠求本逾玄歌孝武帝王珣天監有晉欽哉烈宗同規文考玄默允恭威而不猛約而能通神鉦一震九域來同道積淮海雅頌自東氣陶醇露化協時雍四時祠祀曹毗肅肅清廟巍巍聖功萬國來賓禮儀有容鐘鼓振金石熙宣兆祚武開基神斯樂兮理管絃有來斯和說功德吐清歌神斯樂兮洋洋玄化潤被九壤民無不悅道無不往禮有儀樂有式詠九功永無極神斯樂兮漢時有短簫鐃歌之樂其曲有朱鷺思悲翁艾如張上之回雍離戰城南巫山高上陵將進酒君馬黃芳樹有所思雉子班聖人出上邪臨高臺遠如期石留務成玄雲黃爵行釣竿等曲列於鼓吹多序戰陳之事及魏受命改其十二曲使繆襲為詞述以功德代漢改朱鷺為楚之平言魏也改思悲翁為戰滎陽言曹公也改艾如張為獲呂布言曹公東圍臨淮擒呂布也改上之回為克官渡言曹公與袁紹戰破之於官渡也改雍離為舊邦言曹公勝袁紹於官渡還譙收藏死亡士卒也改戰城南為定武功言曹公初破鄴武功之定始乎此也改巫山高為屠柳城言曹公越北塞歷白檀破三郡烏桓於柳城也改上陵為平南荊言曹公平荊州也改將進酒為平關中言曹公征馬超定關中也改有所思為應帝期言文帝以聖德受命應運期也改芳樹為雍熙言魏氏臨其國君臣雍穆庶績咸熙也改上邪為太和言明帝繼體承統太和改元德澤流布也其餘並同舊名是時吳亦使韋昭制十二曲名以述功德受命改朱鷺為炎精缺言漢室衰孫堅奮迅猛志念在匡救王迹始乎此也改思悲翁為漢之季言堅悼漢之微痛董卓之亂興兵奮擊功蓋海內也改艾如張為攄武師言權卒父之業而征伐也改上之回為烏林言魏武既破荊州順流東下欲來爭鋒權命將周瑜逆擊之於烏林而破走也改雍離為秋風言權悅以使人人忘其死也改戰城南為克皖城言魏武志圖并兼而權親征破之於皖也改巫山高為關背德言蜀將關羽背棄吳德權引師浮江而擒之也改上陵曲為通荊州言權與蜀交好齊盟中有關羽自失之愆終復初好也改將進酒為章洪德言權章其大德而遠方來附也改有所思為順曆數言權順籙圖之符而建大號也改芳樹為承天命言其時主聖德踐位道化至盛也改上邪曲為玄化言其時主修文武則天而行仁澤流洽天下喜樂也其餘亦用舊名不改及武帝受禪乃令傅玄製為二十二篇亦述以功德代魏改朱鷺為靈之祥言宣帝之佐魏猶虞舜之事堯既有石瑞之徵又能用武以誅孟達之逆命也改思悲翁為宣受命言宣帝禦諸葛亮養威重運神兵亮震怖而死也改艾如張為征遼東言宣帝陵大海之表討滅公孫氏而梟其首也改上之回為宣輔政言宣帝聖道深遠撥亂反正網羅文武之才以定二儀之序也改雍離為時運多難言宣帝致討吳方有征無戰也改戰城南為景龍飛言景帝克明威教賞順夷逆隆無疆崇洪基也改巫山高為平玉衡言景帝一萬國之殊風齊四海之乖心禮賢養士而纂洪業也改上陵為文皇統百揆言文帝始統百揆用人有序以敷太平之化也改將進酒為因時運言因時運變聖謀潛施解長蛇之交離羣桀之黨以武濟文以邁其德也改有所思為惟庸蜀言文帝既平萬乘之蜀封建萬國復五等之爵也改芳樹為天序言聖皇應曆受禪弘濟大化用人各盡其才也改上邪為大晉承運期言聖皇應籙受圖化象神明也改君馬黃為金靈運言聖皇踐阼致敬宗廟而孝道行於天下也改雉子班為於穆我皇言聖皇受禪德合神明也改聖人出為仲春振旅言大晉申文武之教畋獵以時也改臨高臺為夏苗田言大晉畋狩順時為苗除害也改遠如期為仲秋獮田言大晉雖有文德不廢武事順時以殺伐也改石留為順天道言仲冬大閲用武修文大晉之德配天也改務成為唐堯言聖皇陟帝位德化光四表也玄雲依舊名言聖皇用人各盡其材也改黃爵行為伯益言赤烏銜書有周以興今聖皇受命神雀來也釣竿依舊名言聖皇德配堯舜又有呂望之佐濟大功致太平也其辭並列之於後云靈之祥靈之祥石瑞章旌金德出西方天降命授宣皇應期運時龍驤繼大舜佐陶唐讚武文建帝綱孟氏叛據南疆追有扈亂五常吳寇叛蜀虜強交誓盟連遐荒宣赫怒奮鷹揚震乾威曜電光陵九天陷石城梟逆命拯有生萬國安四海寧宣受命宣受命應天機風雲時動神龍飛禦葛亮鎮雍梁邊境安夷夏康務節事勤定傾攬英雄保持盈深穆穆赫明明沖而泰天之經養威重運神兵亮乃震斃天下安寧征遼東征遼東敵失據威靈邁日域公孫既授首羣逆破膽咸震怖朔北響應海表景附武功赫赫德雲布宣輔政宣皇輔政聖烈深撥亂反正順天心網羅文武才慎厥所生所生賢遺教施安上治民化風移肇創帝基洪業垂於鑠明明時赫戲功濟萬世定二儀定二儀雲行雨施海外風馳時運多難時運多難道教痡天地變化有盈虛蠢爾吳蠻武視江湖我皇赫斯致天誅有征無戰弭其圖天威橫被廓東隅景龍飛景龍飛御天威聰鑒玄察動與神明協機從之者顯逆之者滅夷文教敷武功巍普被四海萬邦望風莫不來綏聖德潛斷先天弗違弗違祥享世永長猛以致寬道化光赫明明祚隆無疆帝績惟期有命既集崇此洪基平玉衡平玉衡糾姦回萬國殊風四海乖禮賢養士羈御英雄思心齊纂戎洪業崇皇階品物咸亨聖敬日躋聰鑒盡下情明明綜天機文皇統百揆文皇統百揆繼天理萬方武將鎮四隅英佐盈朝堂謀言協秋蘭清風發其芳洪澤所漸潤礫石為圭璋大道侔五帝盛德踰三王咸光大上參天與地至化無內外無內外六合並康並康遘茲嘉會在昔羲與農大晉德斯邁鎮征及諸州為藩衛功濟四海洪烈流萬世因時運因時運聖策施長蛇交解羣桀離勢窮奔吳獸騎厲惟武進審大計時邁其德清一世惟庸蜀惟庸蜀僭號天一隅劉備逆帝命禪亮承其餘擁衆數十萬窺隙乘我虛驛騎進羽檄天下不遑居姜維屢寇邊隴上為荒蕪文皇愍斯民歷世受罪辜外謨藩屏臣內謨衆士夫爪牙應指受腹心獻良圖良圖協成文大興百萬軍雷鼓震地起猛勢陵浮雲逋虜畏天誅面縛造壘門萬里同風教逆命稱妾臣光建五等紀綱天人天序天序應曆受禪承靈祜御羣龍勒螭武弘濟大化英雋作輔明明統萬機赫赫鎮四方咎繇稷契之疇協蘭芳禮王臣覆兆民化之如天與地誰敢愛其身大晉承運期大晉承運期德隆聖皇時清晏白日垂光應籙圖陟帝位繼天正玉衡化行象神明至哉道隆虞與唐元首敷洪化百僚股肱並忠良時太康隆隆赫赫福祚盈無疆金靈運金靈運天符發聖徵見參日月惟我皇體神聖受魏禪應天命皇之興靈有徵登大麓御萬乘皇之輔若闞武爪牙奮莫之禦皇之佐讚清化百事理萬邦賀神只應嘉瑞章恭享禮薦先皇樂時奏磬管鏘鼓殷殷鐘鍠鍠奠樽俎實玉觴神歆饗咸悅康宴孫子祐無疆大孝蒸蒸德教被萬方於穆我皇於穆我皇盛德聖且明受禪君世光濟羣生普天率土莫不來庭顒顒六合內望風仰泰清萬國雍雍興頌聲大化洽地平而天成七政齊玉衡惟平峨峨佐命濟濟羣英夙夜乾乾萬機是經雖治興匪荒寧謙道光沖不盈天地合德日月同榮赫赫煌煌曜幽冥三光克從於顯天垂景星龍鳳臻甘露宵零肅神祇祗上靈萬物欣戴自天效其成仲春振旅仲春振旅大致人武教於時日新師執提工執鼓坐作從節有序盛矣允文允武搜田表禡申法誓遂圍禁獻社祭允以時明國制文武並用禮之經列車如戰大教明古今誰能去兵大晉繼天濟羣生夏苗田夏苗田運將徂軍國異容文武殊乃命羣吏撰車徒辨其號名讚契書王軍啓八門行同上帝居時路建大麾雲旗翳紫虛百官象其事疾則疾徐則徐回衡旋軫罷陳弊車獻禽享祀蒸蒸配有虞惟大晉德參兩儀化雲敷仲秋獮田仲秋獮田金德常綱涼風清且厲凝露結為霜白藏司辰倉隼時鷹揚鷹揚猶尚父順天以殺伐春秋時序雷霆震威曜進退由鉦鼓致禽祀祊羽毛之用充軍府赫赫大晉德芬烈陵三五敷化以文雖安不廢武光宅四海永享天之祜順天道順天道握神契三時示講武事冬大閲鳴鐲振鼓鐸旌旗象虹霓文制其中武不窮武動軍誓衆禮成而義舉三驅以崇仁進止不失其序兵卒練將如闞武惟闞武氣陵青雲解圍三面殺不殄羣偃旌麾班六軍獻享蒸修典文嘉大晉德配天祿報功爵俟賢饗燕樂受茲百祿壽萬年唐堯唐堯咨務成謙謙德所興積漸終光大履霜致堅冰神明道自然河海猶可凝舜禹統百揆元凱以次升禪讓應大曆睿聖世相承我皇陟帝位平衡正準繩德化飛四表祥氣見其徵興王坐俟旦亡主恬自矜致遠由近始覆簣成山陵披圖案先籍有其證靈液玄雲玄雲起丘山祥氣萬里會龍飛何蜿蜿鳳翔何翽翽昔在唐虞朝時見青雲際今親遊萬國流光溢天外鶴鳴在後園清音隨風邁成湯隆顯命伊摯來如飛周文獵渭濱遂載呂望歸符合如影響先天天不違輟耕綜地綱解褐襟天維元功配二王芬馨世所稀我皇羣才洪烈何巍巍桓桓征四表濟濟理萬機神化感無方髦才盈帝畿丕顯惟味旦日新孔所咨茂哉明聖德日月同光輝伯益伯益佐舜禹職掌山與川德侔十六相思心入無間智理周萬物下知衆鳥言黃雀應清化翔習何翩翩和鳴棲庭樹徘徊雲日間夏桀為無道密網施山河酷祝振纖網當奈黃雀何殷湯崇天德去其三面羅逍遙羣飛來鳴聲乃復和朱雀作南宿鳳皇統羽羣赤烏銜書至天命瑞周文神雀今來遊為我受命君嘉祥致天和膏澤隆青雲蘭風發芳氣蓋世同其芬釣竿釣竿何冉冉甘餌芳且鮮臨川運思心微綸沈九泉太公寶此術乃在靈祕篇機變隨物移精妙貫未然遊魚驚著釣潛龍飛戾天戾天安所至撫翼翔太清太清一何異兩儀出渾成玉衡正三辰造化賦羣形退願輔聖君與神合其靈我君弘遠略天人不足并天人初并時昧昧何芒芒日月有徵兆文象興二皇蚩尤亂生靈黃帝用兵征萬方逮夏禹而德衰三代不及虞與唐我皇盛德配堯舜受禪即阼享天祥率土蒙祐靡不肅庶事康庶事康穆穆明明荷百祿保無極永太平鼙舞未詳所起然漢代已施於燕享矣傅毅張衡所賦皆其事也舊曲有五篇一關東有賢女二章和二年中三樂久長四四方皇五殿前生桂樹其辭並亡曹植鼙舞詩序云故漢靈帝西園鼓吹有李堅者能鼙舞遭世荒亂堅播越關西隨將軍段煨先帝聞其舊伎下書召堅堅年踰七十中間廢而不為又古曲甚多謬誤異代之文未必相襲故依前曲作新歌五篇及泰始中又製其辭焉其舞故常二八桓玄將僭位尚書殿中郎袁明子啓增滿八佾泰始中歌辭今列之後云鼙舞歌詩五篇洪業篇當魏曲明明魏皇帝古曲關東有賢女宣文創洪業盛德在泰始聖皇應靈符受命君四海萬國何所樂上有明天子唐堯禪帝位虞舜惟恭己恭己正南面道化與時移大赦蕩萌漸文教被黃支象天則地體無為聰明配日月神聖參兩儀雖有三凶類靜言無所施象天則地體無為稷契並佐命伊呂升王臣蘭芷登朝肆下無失宿人聲發響自應表立景來附哮闞順羇制潛龍升天路備物立成器變通極其數百事以時萬機有常度訓之以克讓納之以忠恕羣下仰清風海外同歡慕象天則地化雲布昔日貴雕飾今尚儉與素昔日多纖介今去情與故象天則地化雲布濟濟大朝士夙夜綜萬機萬機無廢理明明降訓咨臣譬列星景君配朝日輝事業並通濟功烈何巍巍五帝繼三皇三皇世所歸聖德應期運天地不能違仰之彌已高猶天不可階將復御龍氏鳳皇在庭棲天命篇當魏曲太和有聖帝古曲章和二年中聖祖受天命應期輔魏皇入則綜萬機出則征四方朝廷無遺理方表寧且康道隆舜臣堯積德踰太王孟度阻窮險造亂天一隅神兵出不意奉命致天誅赦善罰有罪元惡宗為虛威風震徑蜀武烈懾強吳諸葛不知命肆逆亂天常擁徒十餘萬數來寇邊疆我皇邁神武執鉞鎮雍涼亮乃畏天威未戰先仆僵盈虛自然運時變故多艱東征陵海表萬里克朝鮮受遺齊七政曹爽又滔天羣凶受誅殛百祿咸來臻黃華應福始王淩為禍先景皇篇當魏曲魏曆長古曲樂久長景皇帝聰明命世生盛德參天地帝王道大創基既已難繼世亦未易外則夏侯玄內則張與李三凶構逆亂帝紀順天行誅窮其姦宄邊將禦其漸潛謀不得起罪人咸伏辜威風振萬里平衡綜萬機萬機無不理召陵桓不君內外何紛紛衆小便成羣蒙昧恣心治亂不分睿聖獨斷濟武常以文順天惟廢立掃霓披浮雲雲霓既已闢清和未幾間羽檄首尾至變起東南藩儉欽為長蛇外則憑吳蠻萬國紛騷擾戚戚天下懼不安神武御六軍我皇執鉞征儉欽起壽春前鋒據項城出其不意並縱奇兵奇兵誠難御廟勝實難支兩軍不期遇敵退計無施豹騎惟武進大戰沙陽陂欽乃亡魂走奔虜若雲披天因赦有罪東土效鯨鯢大晉篇當魏曲天生蒸民古曲四方皇赫赫大晉於穆文王蕩蕩巍巍道邁陶唐世稱三皇五帝及今重其光九德克明文既顯武又彰思弘六合兼濟萬方內舉元凱朝政以綱外簡武臣時惟鷹揚靡順不懷逆命斯亡仁配春日威踰秋霜濟濟多士同茲蘭芳唐虞至治四凶滔天致討儉欽罔不肅虔化感海內海外來賓獻其聲樂並稱妾臣西蜀猾夏僭號方域命將致討委國稽服吳人放命馮海阻江飛書告喻響應來同先王建萬國九服為藩衛亡秦壞諸侯序祚不二世歷代不能復忽踰五百歲我皇邁聖德應期創典制分土五等藩國正封界莘莘文武佐千秋遘嘉會洪澤溢區內仁風翔海外明君篇當魏曲為君既不易古曲殿前生桂樹明君御四海聽鑒盡物情顧望有譴罰竭忠身必榮蘭芷出荒野萬里升紫庭茨草穢堂階掃截不得生能否莫相蒙百官正其名恭己慎有為有為無不成暗君不自信羣下執異端正直羅浸潤姦臣奪其權雖欲盡忠誠結舌不敢言結舌亦何憚盡忠為身患清流豈不潔飛塵濁其源岐路令人迷未遠勝不還忠臣立君朝正色不顧身邪正不並存譬若胡與秦胡秦有合時邪正各異津忠臣遇明君乾乾惟日新羣目統在綱衆星共北辰設令遭暗主斥退為凡人雖薄供時用白茅猶為珍冰霜晝夜結蘭桂摧為薪邪臣多端變用心何委曲便辟順情指動隨君所欲偷安樂目前不問清與濁積僞罔時主養交以持祿言行相違難饜甚溪谷昧死則乾沒覺露則滅族拂舞出自江左舊云吳舞檢其歌非吳辭也亦陳於殿庭楊泓序云自到江南見白符舞或言白鳧鳩舞云有此來數十年矣察其辭旨乃是吳人患孫晧虐政思屬晉也今列之於後云拂舞歌詩五篇白鳩篇翩翩白鳩再飛再鳴懷我君德來集君庭白雀呈瑞素羽明鮮翔庭舞翼以應仁乾皎皎鳴鳩或丹或黃樂我君惠振羽來翔東壁餘光魚在江湖惠而不費敬我微軀策我良駟習我驅馳與君周旋樂道忘饑我心虛靜我志霑濡彈琴鼓瑟聊以自娛陵雲登臺浮遊太清攀龍附鳳自望身輕濟濟篇暢暢飛舞氣流芳追念三五大綺黃去失有時可行去來時同此未央時冉冉近桑榆但當飲酒為歡娛衰老逝有何期多憂耿耿內懷思深池曠魚獨希願得黃浦衆所依恩感人世無比悲歌且舞無極已獨祿篇獨獨祿祿水深泥濁泥濁尚可水深殺我雍雍雙雁遊戲田畔我欲射雁念子孤散翩翩浮萍得風搖輕我心何合與之同并空牀低幃誰知無人夜衣錦繡誰別僞真刀鳴削中倚牀無施父冤不報欲活何為猛獸班班遊戲山間獸欲嚙人不避豪賢碣石篇東臨碣石以觀滄海水何淡淡山島竦峙樹木叢生百草豐茂秋風蕭瑟洪波涌起日月之行若出其中星漢燦爛若出其𩹉幸甚至哉歌以詠志觀滄海孟冬十月北風徘徊天氣肅清繁霜霏霏鵾雞晨鳴雁過南飛鷙鳥潛藏熊羆窟棲耨鑮停置農收積場逆旅整設以通賈商幸甚至哉歌以詠志冬十月鄉土不同河朔隆寒流澌浮漂舟船行難錐不入地豐籟深奧水竭不流冰堅可蹈士隱者貧勇俠輕非心常歎怨戚戚多悲幸甚至哉歌以詠志土不同神龜雖壽猶有竟時騰蛇乘霧終為土灰驥老伏櫪志在千里烈士暮年壯心不已盈縮之期不但在天養怡之福可得永年幸甚至哉歌以詠志龜雖壽淮南王篇淮南王自言尊百尺高樓與天連後園鑿井銀作牀金瓶素綆汲寒漿汲寒漿飲少年少年窈窕何能賢揚聲悲歌音絶天我欲渡河河無梁願作雙黃鵠還故鄉還故鄉入故里徘徊故鄉苦身不已繁舞奇歌無不泰徘徊桑梓遊天外鼓角橫吹曲鼓案周禮以鼖鼓鼓軍事角說者云蚩尤氏帥魑魅與黃帝戰於涿鹿帝乃始命吹角為龍鳴以禦之其後魏武北征烏丸越沙漠而軍士思歸於是減為中鳴而尤更悲矣胡角者本以應胡笳之聲後漸用之橫吹有雙角即胡樂也張博望入西域傳其法於西京惟得摩訶兜勒一曲李延年因胡曲更造新聲二十八解乘輿以為武樂後漢以給邊將和帝時萬人將軍得用之魏晉以來二十八解不復具存用者有黃鵠隴頭出關入關出塞入塞折揚柳黃覃子赤之楊望行人十曲案魏晉之世有孫氏善弘舊曲宋識善擊節唱和陳左善清歌列和善吹笛郝索善彈箏朱生善琵琶尤發新聲故傅玄著書曰人若欽所聞而忽所見不亦惑乎設此六人生於上世越今古而無儷何但夔牙同契哉案此說則自茲以後皆孫朱等之遺則也相和漢舊歌也絲竹更相和執節者歌本一部魏明帝分為二更遞夜宿本十七曲朱生宋識列和等復合之為十三曲但歌四曲出自漢世無絃節作伎最先唱一人唱三人和魏武帝尤好之時有宋容華者清徹好聲善唱此曲當時之特妙自晉以來不復傳遂絶凡樂章古辭今之存者並漢世街陌謠謳江南可採蓮烏生十五子白頭吟之屬也吳歌雜曲並出江南東晉以來稍有增廣子夜歌者女子名子夜造此聲孝武太元中琅邪王軻之家有鬼歌子夜則子夜是此時以前人也鳳將雛歌者舊曲也應璩百一詩云言是鳳將雛然則其來久矣前溪歌者車騎將軍沈充所制阿子及歡聞歌者穆帝升平初歌畢輒呼阿子汝聞不語在五行志後人衍其聲以為此二曲團扇歌者中書令王珉與嫂婢有情愛好甚篤嫂捶撻婢過苦婢素善歌而珉好捉白團扇故制此歌懊歌者隆安初俗間訛謠之曲語在五行志長史變者司徒左長史王廞臨敗所制凡此諸曲始皆徒歌既而被之管絃又有因絲竹金石造歌以被之魏世三調歌辭之類是也杯柈舞案太康中天下為晉世寧舞務手以接杯柈反覆之此則漢世惟有柈舞而晉加之以杯反覆之也公莫舞今之巾舞也相傳云項莊劍舞項伯以袖隔之使不得害漢高祖且語項莊云公莫古人相呼曰公言公莫害漢王也今之用巾蓋像項伯衣袖之遺式然案琴操有公莫渡河曲然則其聲所從來已久俗云項伯非也白紵舞案舞辭有巾袍之言紵本吳地所出宜是吳舞也晉俳歌又云皎皎白緒節節為雙吳音呼緒為紵疑白紵即白緒也鐸舞歌一篇幡舞歌一篇鼓舞伎六曲並陳於元會後漢正旦天子臨德陽殿受朝賀舍利從西方來戲於殿前激水化成比目魚跳躍嗽水作霧翳日畢又化成龍長八九丈出水遊戲炫耀日光以兩大絲繩繫兩柱頭相去數丈兩倡女對舞行於繩上相逢切肩而不傾魏晉訖江左猶有夏育扛鼎巨象行乳神龜抃舞背負靈嶽桂樹白雪畫地成川之樂成帝咸康七年尚書蔡謨奏八年正會儀注惟作鼓吹鐘鼓其餘伎樂盡不作侍中張澄給事黃門侍郎陳逵駁以為王者觀時設教至於吉凶殊斷不易之道也今四方觀禮陵有儐弔之位庭奏宮懸之樂二禮兼用哀樂不分體國經制莫大於此詔曰今既以天下體大禮從權宜三正之饗宜盡用吉禮也至娛耳目之樂所不忍聞故闕之耳事之大者不過上壽酒稱萬歲已許其大不足復闕鐘鼓鼓吹也澄逵又啓今大禮雖降事吉於朝然儐弔顯於園陵則未滅有哀禮服定於典文義無盡吉是以咸寧之會有徹樂之典實先朝稽古憲章垂式萬世者也詔曰若元日大饗萬國朝宗庭廢鐘鼓之奏遂闕起居之節朝無磬制之音賓無蹈履之度其於事義不亦闕乎惟可量輕重以制事中散騎侍郎顧臻表曰臣聞聖王制樂讚揚政道養以仁義防其淫佚上享宗廟下訓黎元體五行之正音協八風以陶物宮聲正方而好義角聲堅齊而率禮絃歌鐘鼓金石之作備矣故通神至化有率舞之感移風易俗致和樂之極末世之伎設禮外之觀逆行連倒頭足入筥之屬皮膚外剝肝心內摧敦彼行葦猶謂勿踐矧伊生靈而不惻愴加四海朝覲言觀帝庭耳聆雅頌之聲目覩威儀之序足以踏天頭以履地反天地之至順傷彝倫之大方今夷狄對岸外禦為急兵食七升忘身赴難過泰之戲日廩五斗方掃神州經略中甸若此之事不可示遠宜下太常纂備雅樂簫韶九成惟新於盛運功德頌聲永著于來葉此乃所以燕及皇天克昌厥後者也諸伎而傷人者皆宜除之流簡儉之德邁康哉之詠清風既行下應如草此之謂也愚管之誠惟垂採察於是除高紫鹿跂行鱉食及齊王捲衣笮兒等樂又減其廩其後復高紫鹿焉
