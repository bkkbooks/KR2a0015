body:
  text: 晉書卷三十九列傳第九王沈子浚王沈字處道太原晉陽人也祖柔漢胸奴中郎將父機魏東郡太守沈少孤養於從叔司空昶事昶如父奉繼母寡嫂以孝義稱好書善屬文大將軍曹爽辟為掾纍遷中書門下侍郎及爽誅以故吏免後起為治書侍御史轉祕書監正元中遷散騎常侍侍中典著作與荀顗阮籍共撰魏書多為時諱未若陳壽之實録也時魏高貴鄉公好學有文才引沈及裴秀數於東堂講宴屬文號沈為文籍先生秀為儒林丈人及高貴鄉公將攻文帝召沈及王業告之沈業馳白帝以功封安平侯邑二千戶沈既不忠於主甚為衆論所非尋遷尚書出監豫州諸軍事奮武將軍豫州刺史至鎮乃下教曰自古賢聖樂聞誹謗之言聽輿人之論芻蕘有可録之事負薪有廊廟之語故也自至鎮日未聞逆耳之言豈未明虛心故令言者有疑其宣下屬城及士庶若能舉遺逸於林藪黜姦佞於州國陳長吏之可否説百姓之所患興利除害損益昭然者給穀五百斛若達一至之言説刺史得失朝政寬猛令剛柔得適者給穀千斛謂余不信明如皎日主簿陳廞褚祀曰奉省教旨伏用感歎勞謙日昃思聞苦言愚謂上之所好下無不應而近未有極諫之辭遠無傳言之針者誠得失之事將未有也今使教命班下示以賞勸將恐拘介之士或憚賞而不言貪賕之人將慕利而妄舉苟不合宜賞不虛行則遠聽者未知當否之所在徒見言之不用謂設有而不行愚以告下之事可小須後沈又教曰夫德薄而位厚功輕而祿重貪夫之所徇高士之所不處也若陳至言於刺史興益於本州達幽隱之賢去祝鮀之佞立德於上受分於下斯乃君子之操何不言之有直言至理忠也惠加一州仁也功成辭賞廉也兼斯而行仁智之事何故懷其道而迷其國哉褚祀復白曰堯舜周公所以能致忠諫者以其款誠之心著也冰炭不言而冷熱之質自明者以其有實也若好忠直如冰炭之自然則諤諤之臣將濟濟而盈庭逆耳之言不求而自至若德不足以配唐虞明不足以並周公實不可以同冰炭雖懸重賞忠諫之言未可致也昔魏絳由和戎之功蒙女樂之賜管仲有興齊之勳而加上卿之禮功勳明著然後賞勸隨之未聞張重賞以待諫臣懸穀帛以求盡言也沈無以奪之遂從祀議沈探尋善政案賈逵以來法制禁令諸所施行擇善者而從之又教曰後生不聞先王之教而望政道日興不可得也文武並用長久之道也俗化陵遲不可不革革俗之要實在敦學昔原伯魯不悅學閔馬父知其必亡將吏子弟優間家門若不教之必致遊戲傷毀風俗矣於是九郡之士咸悅道教移風易俗遷征虜將軍持節都督江北諸軍事五等初建封博陵侯班在次國平蜀之役吳人大出聲為救蜀振蕩邊境沈鎮御有方寇聞而退轉鎮南將軍武帝即王位拜御史大夫守尚書令加給事中沈以才望顯名當世是以創業之事羊祜荀勗裴秀賈充等皆與沈咨謀焉及帝受禪以佐命之勳轉驃騎將軍録尚書事加散騎常侍統城外諸軍事封博陵郡公固讓不受乃進爵為縣公邑千八百戶帝方欲委以萬機泰始二年薨帝素服舉哀賜祕器朝服一具衣一襲錢三十萬布百匹葬田一頃諡曰元明年帝追思沈勳詔曰夫表揚往行所以崇賢垂訓慎終紀遠厚德興教也故散騎常侍驃騎將軍博陵元公沈蹈禮居正執心清粹經綸墳典才識通洽入歷常伯納言之位出幹監牧方嶽之任內著謀猷外宣威略建國設官首登公輔兼統中朝出納大命實有翼亮佐世之勳其贈沈司空公以寵靈既往使沒而不朽又前以翼贊之勳當受郡公之封而固辭懇至嘉其讓德不奪其志可以郡公官屬送葬沈素清儉不營産業其使所領兵作屋五十間子浚嗣後沈夫人荀氏卒將合葬沈棺櫬已毀更賜東園祕器咸寧中復追封沈為郡公浚字彭祖母趙氏婦良家女也貧賤出入沈家遂生浚沈初不齒之年十五沈薨無子親戚共立浚為嗣拜駙馬都尉太康初與諸王侯俱就國三年來朝除員外散騎侍郎元康初轉員外常侍遷越騎校尉右軍將軍出補河內太守以郡公不得為二千石轉東中郎將鎮許昌及愍懷太子幽于許昌浚承賈后旨與黃門孫慮共害太子遷寧北將軍青州刺史尋徙寧朔將軍持節都督幽州諸軍事于時朝廷昏亂盜賊𧔧起浚為自安之計結好夷狄以女妻鮮卑務勿塵又以一女妻蘇恕延及趙王倫篡位三王起義兵浚擁衆挾兩端遏絶檄書使其境內士庶不得赴義成都王穎欲討之而未暇也倫誅進號安北將軍及河間王顒成都王穎興兵內向害長沙王而浚有不平之心穎表請幽州刺史石堪為右司馬以右司馬和演代堪密使演殺浚并其衆演與烏丸單于審登謀之於是與浚期遊薊城南清泉水上薊城內西行有二道演浚各從一道演與浚欲合鹵簿因而圖之值天暴雨兵器霑溼不果而還單于由是與其種人謀曰演圖殺浚事垂克而天卒雨使不得果是天助浚也違天不祥我不可久與演同乃以謀告浚浚密嚴兵與單于圍演演持白幡詣浚降遂斬之自領幽州大營器械召務勿塵率胡晉合二萬人進軍討穎以主簿祁弘為前鋒遇穎將石超於平棘擊敗之浚乘勝遂克鄴城士衆暴掠死者甚多鮮卑大略婦女浚命敢有挾藏者斬於是沈於易水者八千人黔庶荼毒自此始也浚還薊聲實益盛東海王越將迎大駕浚遣祁弘率烏丸突騎為先驅惠帝旋洛陽轉浚驃騎大將軍都督東夷河北諸軍事領幽州刺史以燕國增博陵之封懷帝即位以浚為司空領烏丸校尉務勿塵為大單于浚又表封務勿塵遼西郡公其別部大飄滑及其弟渴末別部大屠甕等皆為親晉王永嘉中石勒寇冀州浚遣鮮卑文鴦討勒勒走南陽明年勒復寇冀州刺史王斌為勒所害浚又領冀州詔進浚為大司馬加侍中大都督督幽冀諸軍事使者未及發會洛京傾覆浚大樹威令專征伐遣督護王昌中山太守阮豹等率諸軍及務勿塵世子疾陸眷并弟文鴦從弟末柸攻石勒於襄國勒率衆來距昌逆擊敗之末柸逐北入其壘門為勒所獲勒質末柸遣間使求和疾陸眷遂以鎧馬二百五十匹金銀各一簏贖末柸結盟而退其後浚布告天下稱受中詔承制乃以司空荀藩為太尉光祿大夫荀組為司隸大司農華薈為太常中書令李絙為河南尹又遣祁弘討勒及於廣宗時大霧弘引軍就道卒與勒遇為勒所殺由是劉琨與浚爭冀州琨使宗人劉希還中山合衆代郡上谷廣三郡人皆歸于琨浚患之遂輟討勒之師而與琨相距浚遣燕相胡矩督護諸軍與疾陸眷并力攻破希驅略三郡士女出塞琨不復能爭浚還欲討勒使棗嵩督諸軍屯易水召疾陸眷將與之俱攻襄國浚為政苛暴將吏又貪殘並廣占山澤引水灌田漬陷冢墓調發殷煩下不堪命多叛入鮮卑從事韓咸切諫浚怒殺之疾陸眷自以前後違命恐浚誅之勒亦遣使厚賂疾陸眷等由是不應召浚怒以重幣誘單于猗盧子右賢王日律孫令攻疾陸眷反為所破時劉琨大為劉聰所迫諸避亂遊士多歸于浚浚日以強盛乃設壇告類建立皇太子備置衆官浚自領尚書令以棗嵩裴憲並為尚書使其子居王宮持節領護胸奴中郎將以妻舅崔毖為東夷校尉又使嵩監司冀并兗諸軍事行安北將軍以田徽為兗州李惲為青州惲為石勒所殺以薄盛代之浚以父字處道為當塗高應王者之讖謀將僭號胡矩諫浚盛陳其不可浚忿之出矩為魏郡守前渤海太守劉亮從子北海太守搏司空掾高柔並切諫浚怒誅之浚素不平長史燕國王悌遂因他事殺之時童謠曰十囊五囊入棗郎棗嵩浚之子壻也浚聞責嵩而不能罪之也又謠曰幽州城門似藏戶中有伏尸王彭祖有狐踞府門翟雉入聽事時燕國霍原北州名賢浚以僭位事示之原不答浚遂害之由是士人憤怨內外無親以矜豪日甚不親為政所任多苛刻加亢旱災蝗士卒衰弱浚之承制也參佐皆內唯司馬遊統外出統怨密與石勒通謀勒乃詐降於浚許奉浚為主時百姓內叛疾陸眷等侵逼浚喜勒之附己勒遂為卑辭以事之獻遺珍寶使驛相繼浚以勒為誠不復設備勒乃遣使剋日上尊號於浚浚許之勒屯兵易水督護孫緯疑其詐馳白浚而引軍逆勒浚不聽使勒直前衆議皆曰胡貪而無信必有詐請距之浚怒欲斬諸言者衆遂不敢復諫盛張設以待勒勒至城便縱兵大掠浚左右復請討之不許及勒登聽事浚乃走出堂皇勒衆執以見勒勒遂與浚妻並坐立浚于前浚罵曰胡奴調汝公何凶逆如此勒數浚不忠於晉并責以百姓餒乏積粟五十萬斛而不振給遂遣五百騎先送浚于襄國收浚麾下精兵萬人盡殺之停二日而還孫緯遮擊之勒僅而得免勒至襄國斬浚而浚竟不為之屈大罵而死無子太元二年詔興滅繼絶封沈從孫道素為博陵公卒子崇之嗣義熙十一年改封東莞郡公宋受禪國除荀顗荀顗字景倩潁川人魏太尉彧之第六子也幼為姊壻陳羣所賞性至孝總角知名博學洽聞理思周密魏時以父勳除中郎宣帝輔政見顗奇之曰荀令君之子也擢拜散騎侍郎纍遷侍中為魏少帝執經拜騎都尉賜爵關內侯難鍾會易無互體又與扶風王駿論仁孝孰先見稱於世時曹爽專權何晏等欲害太常傅嘏顗營救得免及高貴鄉公立顗言於景帝曰今上踐阼權道非常宜速遣使宣德四方且察外志毋丘儉文欽果不服舉兵反顗預討儉等有功進爵萬歲亭侯邑四百戶文帝輔政遷尚書帝征諸葛誕留顗鎮守顗甥陳泰卒顗代泰為僕射領吏部四辭而後就職顗承泰後加之淑慎綜核名實風俗澄正咸熙中遷司空進爵鄉侯顗年踰耳順孝養蒸蒸以母憂去職毀幾滅性海內稱之文帝奏宜依漢太傅胡廣喪母故事給司空吉凶導從及蜀平興復五等命顗定禮儀顗上請羊祜任愷庾峻應貞孔皓共刪改舊文撰定晉禮咸熙初封臨淮侯武帝踐阼進爵為公食邑一千八百戶又詔曰昔禹命九官契敷五教所以弘崇王化示人軌儀也朕承洪業昧于大道思訓五品以康四海侍中司空顗明允篤誠思心通遠翼亮先皇遂輔朕躬實有佐命弼導之勳宜掌教典以隆時雍其以顗為司徒尋加侍中遷太尉都督城外牙門諸軍事置司馬親兵百人頃之又詔曰侍中太尉顗溫恭忠允至行純備博古洽聞耆艾不殆其以公行太子太傅侍中太尉如故時以正德大豫雅頌未合命顗定樂事未終以泰始十年薨帝為舉哀皇太子臨喪二宮賻贈禮秩有加詔曰侍中太尉行太子太傅臨淮公顗清純體道忠允立朝歷司外內茂績既崇訓傅東宮徽猷弘著可謂行歸于周有始有卒者矣不幸薨殂朕甚痛之其賜溫明祕器朝服一具衣一襲諡曰康又詔曰太尉不恤私門居無館宇素絲之志沒而彌顯其賜家錢二百萬使立宅舍咸寧初詔論次功臣將配饗宗廟所司奏顗等十二人銘功太常配饗清廟顗明三禮知朝廷大儀而無質直之操唯阿意苟合於荀勗賈充之間初皇太子將納妃顗上言賈充女姿德淑茂可以參選以此獲譏於世顗無子以從孫徽嗣中興初以顗兄玄孫序為顗後封臨淮公序卒又絶孝武帝又封序子繼顗後卒子龍符嗣宋受禪國除荀勗子藩藩子邃闓藩弟組組子奕荀勗字公曾潁川潁陰人漢司空爽曾孫也祖棐射聲校尉父肸早亡勗依于舅氏岐嶷夙成年十餘歲能屬文從外祖魏太傅鍾繇曰此兒當及其曾祖既長遂博學達於從政仕魏辟大將軍曹爽掾遷中書通事郎爽誅門生故吏無敢往者勗獨臨赴衆乃從之為安陽令轉驃騎從事中郎勗有遺愛安陽生為立祠遷廷尉正參文帝大將軍軍事賜爵關內侯轉從事中郎領記室高貴鄉公欲為變時大將軍掾孫佑等守閶闔門帝弟安陽侯幹聞難欲入佑謂幹曰未有入者可從東掖門及幹至帝遲之幹以狀白帝欲族誅佑勗諫曰孫佑不納安陽誠宜深責然事有逆順用刑不可以喜怒為輕重今成倅刑止其身佑乃族誅恐義士私議乃免佑為庶人時官騎路遺求為刺客入蜀勗言於帝曰明公以至公宰天下宜杖正義以伐違二而名以刺客除賊非所謂刑于四海以德服遠也帝稱善及鍾會謀反審問未至而外人先告之帝待會素厚未之信也勗曰會雖受恩然其性未可許以見得思義不可不速為之備帝即出鎮長安主簿郭奕參軍王深以勗是會從甥少長舅氏勸帝斥出之帝不納而使勗陪乘待之如初先是勗啓伐蜀宜以衛瓘為監軍及蜀中亂賴瓘以濟會平還洛與裴秀羊祜共管機密時將發使聘吳並遣當時文士作書與孫晧帝用勗所作晧既報命和親帝謂勗曰君前作書使吳思順勝十萬之衆也帝即晉王位以勗為侍中封安陽子邑千戶武帝受禪改封濟北郡公勗以羊祜讓乃固辭為侯拜中書監加侍中領著作與賈充共定律令充將鎮關右也勗謂馮紞曰賈公遠放吾等失勢太子婚尚未定若使充女得為妃則不留而自停矣勗與紞伺帝間並稱充女才色絶世若納東宮必能輔佐君子有關雎后妃之德遂成婚當時甚為正直者所疾而獲佞媚之譏焉久之進位光祿大夫既掌樂事又修律呂並行於世初勗於路逢趙賈人牛鐸識其聲及掌樂音韻未調乃曰得趙之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者又嘗在帝坐進飯謂在坐人曰此是勞薪所炊咸未之信帝遣問膳夫乃云實用故車腳舉世伏其明識俄領祕書監與中書令張華依劉向別録整理記籍又立書博士置弟子教習以鍾胡為法咸寧初與石苞等並為佐命功臣列於銘饗及王濬表請伐吳勗與賈充固諫不可帝不從而吳果滅以專典詔命論功封子一人為亭侯邑一千戶賜絹千匹又封孫顯為潁陽亭侯及得汲郡冢中古文竹書詔勗撰次之以為中經列在祕書時議遣王公之國帝以問勗勗對曰諸王公已為都督而使之國則廢方任又分割郡縣人心戀本必用嗷嗷國皆置軍官兵還當給國而闕邊守帝重使勗思之勗又陳曰如詔準古方伯選才使軍國各隨方面為都督誠如明旨至於割正封疆使親疏不同誠為佳矣然分裂舊土猶懼多所搖動必使人心擾思惟竊宜如前若於事不得不時有所轉封而不至分割土域有所損奪者可隨宜節度其五等體國經遠實不成制度然但虛名其於實事略與舊郡縣鄉亭無異若造次改奪恐不能不以為恨今方了其大者以為五等可須後裁度凡事雖有久而益善者若臨時或有不解亦不可忽帝以勗言為允多從其意時又議省州郡縣半吏以赴農功勗議以為省吏不如省官省官不如省事省事不如清心昔蕭曹相漢載其清靜致畫一之歌此清心之本也漢文垂拱幾致刑措此省事也光武并合吏員縣官國邑裁置十一此省官也魏太和中遣王人四出減天下吏員正始中亦并合郡縣此省吏也今必欲求之於本則宜以省事為先凡居位者使務思蕭曹之心以翼佐大化篤義行崇敦睦使昧寵忘本者不得容而偽行自息浮華者懼矣重敬讓尚止足令賤不妨貴少不陵長遠不間親新不間舊小不加大淫不破義則上下相安遠近相信矣位不可以進趣得譽不可以朋黨求則是非不妄而明官人不惑於聽矣去奇技抑異説好變舊以徼非常之利者必加其誅則官業有常人心不遷矣事留則政稽政稽則功廢處位者而孜孜不怠奉職司者而夙夜不懈則雖在挈瓶而守不假器矣使信若金石小失不害大政忍忿悁以容之簡文案略細苛令之所施必使人易視聽願之如陽春畏之如雷震勿使微文煩撓為百吏所黷二三之命為百姓所饜則吏竭其誠下悅上命矣設官分職委事責成君子心競而不力爭量能受任思不出位則官無異業政典不姦矣凡此皆愚心謂省事之本也苟無此愆雖不省吏天下必謂之省矣若欲省官私謂九寺可并於尚書蘭臺宜省付三府然施行歷代世之所習是以久抱愚懷而不敢言至於省事實以為善若直作大例皆減其半恐文武衆官郡國職業及事之興廢不得皆同凡發號施令典而當則安儻有駁者或致壅否凡職所臨履先精其得失使忠信之官明察之長各裁其中先條上言之然後混齊大體詳宜所省則令下必行不可搖動如其不爾恐適惑人聽比前行所省皆須臾輒復或激而滋繁亦不可不重勗論議損益多此類太康中詔曰勗明哲聰達經識天序有佐命之功兼博洽之才久典內任著勳弘茂詢事考言謀猷允誠宜登大位毗贊朝政今以勗為光祿大夫儀同三司開府辟召守中書監侍中侯如故時太尉賈充司徒李胤並薨太子太傅又缺勗表陳三公保傅宜得其人若使楊珧參輔東宮必當仰稱聖意尚書令衛瓘吏部尚書山濤皆可為司徒若以瓘新為令未出者濤即其人帝並從之明年秋諸州郡大水兗土尤甚勗陳宜立都水使者其後門下啓通事令史伊羡趙咸為舍人對掌文法詔以問勗勗曰今天下幸賴陛下聖德六合為一望道化隆洽垂之將來而門下上稱程咸張惲下稱此等欲以文法為政皆愚臣所未達者昔張釋之諫漢文謂獸圈嗇夫不宜見用邴吉住車明調和陰陽之本此二人豈不知小吏之惠誠重惜大化也昔魏武帝使中軍司荀攸典刑獄明帝時猶以付內常侍以臣所聞明帝時唯有通事劉泰等官不過與殿中同號耳又頃言論者皆云省官減事而求益吏者相尋矣多云尚書郎太令史不親文書乃委付書令史及幹誠吏多則相倚也增置文法之職適恐更耗擾臺閣臣竊謂不可時帝素知太子暗弱恐後亂國遣勗及和嶠往觀之勗還盛稱太子之德而嶠云太子如初於是天下貴嶠而賤勗帝將廢賈妃勗與馮紞等諫請故得不廢時議以勗傾國害時孫資劉放之匹然性慎密每有詔令大事雖已宣布然終不言不欲使人知己豫聞也族弟良曾勸勗曰公大失物情有所進益者自可語之則懷恩多矣其壻武統亦説勗宜有所營置令有歸戴者勗並默然不應退而語諸子曰人臣不密則失身樹私則背公是大戒也汝等亦當宦達人間宜識吾此意久之以勗守尚書令勗久在中書專管機事及失之甚罔罔悵恨或有賀之者勗曰奪我鳳皇池諸君賀我邪及在尚書課試令史以下核其才能有暗於文法不能決疑處事者即時遣出帝嘗謂曰魏武帝言荀文若之進善不進不止荀公達之退惡不退不休二令君之美亦望於君也居職月餘以母憂上還印綬帝不許遣常侍周恢喻旨勗乃奉詔視職勗久管機密有才思探得人主微旨不犯顏忤爭故得始終全其寵祿太康十年卒詔贈司徒賜東園祕器朝服一具錢五十萬布百匹遣兼御史持節護喪諡曰成勗有十子其達者輯藩組輯嗣官至衛尉卒諡曰簡子畯嗣卒諡曰烈無適子以弟息識為嗣輯子綽綽字彥舒博學有才能撰晉後書十五篇傳於世永嘉末為司空從事中郎沒於石勒為勒參軍藩字大堅元康中為黃門侍郎受詔成父所治鍾磬以從駕討齊王冏勳封西華縣公纍遷尚書令永嘉末轉司空未拜而洛陽陷沒藩出奔密王浚承制奉藩為留臺太尉及愍帝為太子委藩督攝遠近建興元年薨於開封年六十九因葬亡所諡曰成追贈太保藩二子邃闓邃字道玄解音樂善談論弱冠辟趙王倫相國掾遷太子洗馬長沙王以為參軍敗成都王為皇太弟精選僚屬以邃為中舍人鄴城不守隨藩在密元帝召為丞相從事中郎以道險不就愍帝就加左將軍陳留相父憂去職服闋襲封愍帝欲納邃女先徵為散騎常侍邃懼西都危逼故不應命而東渡江元帝以為軍咨祭酒太興初拜侍中邃與刁協婚親時協執權欲以邃為吏部尚書邃深距之尋而王敦討協協黨與並及於難唯邃以疏協獲免敦表為廷尉以疾不拜遷太常轉尚書蘇峻作亂邃與王導荀嵩並侍天子於石頭峻平後卒贈金紫光祿大夫諡曰靖子汪嗣闓字道明亦有名稱京都為之語曰洛中英英荀道明大司馬齊王冏辟為掾冏敗暴尸已三日莫敢收葬闓與冏故吏李述嵇含等露板請葬朝議聽之論者稱焉為太傅主簿中書郎與邃俱渡江拜丞相軍咨祭酒中興建遷右軍將軍轉少府明帝嘗從容問王廙曰二荀兄弟孰賢廙答以闓才明過邃帝以語庾亮亮曰邃真粹之地亦闓所不及由是議者莫能定其兄弟優劣歷御史中丞侍中尚書封射陽公太寧二年卒追贈衛尉諡曰定子達嗣組字大章弱冠太尉王衍見而稱之曰夷雅有才識初為司徒左西屬補太子舍人司徒王渾請為從事中郎轉左長史歷太子中庶子滎陽太守趙王倫為相國欲收大名選海內德望之士以江夏李重及組為左右長史東平王堪沛國劉謨為左右司馬倫篡以組為侍中及長沙王敗惠帝遣組及散騎常侍閭丘沖詣成都王穎慰勞其軍帝西幸長安以組為河南尹遷尚書轉衛尉賜爵成陽縣男加散騎常侍中書監轉司隸校尉加特進光祿大夫常侍如故于時天下已亂組兄弟貴盛懼不容於世雖居大官並諷議而已永嘉末復以組為侍中領太子太保未拜會劉曜王彌逼洛陽組與藩俱出奔懷帝蒙塵司空王浚以組為司隸校尉組與藩移檄天下以琅邪王為盟主愍帝稱皇太子組即太子之舅又領司隸校尉行豫州刺史事與藩並保滎陽之開封建興初詔藩行留臺事俄而藩薨帝更以組為司空領尚書左僕射又兼司隸復行留臺事州征郡守皆承制行焉進封臨潁縣公加太夫人世子印綬明年進位太尉領豫州牧假節元帝承制以組都督司州諸軍加散騎常侍餘如故頃之又除尚書令表讓不拜及西都不守組乃遣使移檄天下共勸進帝欲以組為司徒以問太常賀循循曰組舊望清重忠勤顯著遷訓五品實允衆望於是拜組為司徒組逼於石勒不能自立太興初自許昌率其屬數百人渡江給千兵百騎組先所領仍皆統攝頃之詔組與太保西陽王羕並録尚書事各加班劍六十人永昌初遷太尉領太子太保未拜薨年六十五諡曰元子奕嗣奕字玄欣少拜太子舍人駙馬都尉侍講東宮出為鎮東參軍行揚武將軍新汲令愍帝為皇太子召為中舍人尋拜散騎侍郎皆不就隨父渡江元帝踐阼拜中庶子遷給事黃門郎父憂去職服闋補散騎常侍侍中時將繕宮城尚書符下陳留王使出城夫奕駁曰昔虞賓在位書稱其美詩詠有客載在雅頌今陳留王位在三公之上坐在太子之右故答表曰書賜物曰與此古今之所崇體國之高義也謂宜除夫役時尚書張闓僕射孔愈難奕以為昔宋不城周陽秋所譏特蠲非體宜應減夫奕重駁以為陽秋之末文武之道將墜于地新有子朝之亂于時諸侯逋替莫肯率職宋之于周實有列國之權且同已勤王而主之者晉客而辭役責之可也今之陳留無列國之勢此之作否何益有無臣以為宜除於國職為全詔從之時又通議元會日帝應敬司徒王導不博士郭熙杜援等以為禮無拜臣之文謂宜除敬侍中馮懷議曰天子修禮莫盛於辟雍當爾之日猶拜三老況今先帝師傅謂宜盡敬事下門下奕議曰三朝之首宜明君臣之體則不應敬若他日小會自可盡禮又至尊與公書手詔則曰頓首言中書為詔則云敬問散騎優册則曰制命今詔文尚異況大會之與小會理豈得同詔從之咸和七年卒追贈太僕諡曰定馮紞馮紞字少胄安平人也祖浮魏司隸校尉父員汲郡太守紞少博涉經史識悟機辨歷仕為魏郡太守轉步兵校尉徙越騎得幸於武帝稍遷左衛將軍承顏悅色寵愛日隆賈充荀勗並與之親善充女之為皇太子妃也紞有力焉及妃之將廢紞勗乾沒救請故得不廢伐吳之役紞領汝南太守以郡兵隨王濬入秣陵遷御史中丞轉侍中帝病篤得愈紞與勗見朝野之望屬在齊王攸攸素薄勗勗以太子愚劣恐攸得立有害於己乃使紞言於帝曰陛下前者疾若不差太子其廢矣齊王為百姓所歸公卿所仰雖欲高讓其得免乎宜遣還藩以安社稷帝納之及攸薨朝野悲恨初帝友于之情甚篤既納紞勗邪説遂為身後之慮以固儲位既聞攸殞哀慟特深紞侍立因言曰齊王名過於實今得自終此乃大晉之福陛下何乃過哀帝收淚而止初謀伐吳紞與賈充荀勗同共苦諫不可吳平紞內懷慚懼疾張華如讎及華外鎮威德大著朝論當徵為尚書令紞從容侍帝論晉魏故事因諷帝言華不可授以重任帝默然而止事具華傳太康七年紞疾詔以紞為散騎常侍賜錢二十萬牀帳一具尋卒二子播熊播大長秋熊字文羆中書郎紞兄恢自有傳史臣曰夫立身之道曰仁與義動靜既形悔吝斯及有莘之媵殊北門之情渭濱之叟匪西山之節湯武有以濟其功夏殷不能譏其志王沈才經文武早尸人爵在魏參席上之珍居晉為幄中之士桐宮之謀遽泄武闈之禍遂臻是知田光之口豈燕丹之可絶豫讓之形非智氏之能變動靜之際有據蒺藜仁義之方求之彌遠矣彭祖謁由捧雉孕本貿絲因家乏主遂登顯秩擁北州之士馬偶東京之糜沸自可感召諸侯宣力王室而乘間伺隙潛圖不軌放肆獯虜遷播乘輿遂使漳滏蕭然黎元塗地縱貪夫於藏戶戮高士於燕垂阻越石之內難邀世龍之外府惡稔毒痡坐致焚燎假手仇敵方申凶獷慶封之戮慢罵何補哉公曾慈明之孫景倩文若之子踐隆堂而高視齊逸軌而長騖孝敬足以承親周慎足以事主刊姬公之舊典採蕭相之遺法然而援朱均以二極煽褒閻而偶震雖廢興有在隆替靡常稽之人事乃二荀之力也至於斗粟興謠踰里成詠勗之階禍又已甚焉馮紞外騁戚施內窮狙詐斃攸安賈交勗讎張心滔楚費過踰晉伍爰絲獻壽空取慰於仁心紞之陳説幸收哀於迷慮投畀之罰無聞青蠅之詩不作矣贊曰處道文林胡二爾心彭祖凶孽自貽伊戚臨淮翼翼孝形于色安陽英英匪懈其職傾齊附魯是為蝥賊紞之不臧交亂罔極
