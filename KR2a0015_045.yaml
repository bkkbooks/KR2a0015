body:
  text: 晉書卷四十五列傳第十五劉毅子暾程衞劉毅字仲雄東萊掖人漢城陽景王章之後父喈丞相屬毅幼有孝行少厲清節然好臧否人物王公貴人望風憚之僑居平陽太守杜恕請為功曹沙汰郡吏百餘人三魏稱焉為之語曰但聞劉功曹不聞杜府君魏末本郡察孝廉辟司隸都官從事京邑肅然毅將彈河南尹司隸不許曰攫獸之犬鼷鼠蹈其背毅曰既能攫獸又能殺鼠何損於犬投傳而去同郡王基薦毅於公府曰毅方正亮直介然不羣言不苟合行不苟容往日僑仕平陽為郡股肱正色立朝舉綱引墨朱紫有分鄭衞不雜孝弟著於邦族忠貞效於三魏昔孫陽取騏驥於吳坂秦穆拔百里於商旅毅未遇知己無所自呈前已口白謹復申請太常鄭袤舉博士文帝辟為相國掾辭疾積年不就時人謂毅忠於魏氏而帝怒其顧望將加重辟毅懼應命轉主簿武帝受禪為尚書郎駙馬都尉遷散騎常侍國子祭酒帝以毅忠蹇正直使掌諫官轉城門校尉遷太僕拜尚書坐事免官咸寧初復為散騎常侍博士祭酒轉司隸校尉糾正豪右京師肅然司部守令望風投印綬者甚衆時人以毅方之諸葛豐蓋寬饒皇太子朝鼓吹將入東掖門毅以為不敬止之於門外奏劾保傅以下詔赦之然後得入帝嘗南郊禮畢喟然問毅曰卿以朕方漢何帝也對曰可方桓靈帝曰吾雖德不及古人猶克己為政又平吳會混一天下方之桓靈其已甚乎對曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之殆不如也帝大笑曰桓靈之世不聞此言今有直臣故不同也散騎常侍鄒湛進曰世談以陛下比漢文帝人心猶不多同昔馮唐答文帝云不能用頗牧而文帝怒今劉毅言犯順而陛下歡然以此相校聖德乃過之矣帝曰我平天下而不封禪焚雉頭裘行布衣禮卿初無言今於小事何見褒之甚湛曰臣聞猛獸在田荷戈而出凡人能之蜂蠆作於懷袖勇夫為之驚駭出於意外故也夫君臣有自然之尊卑言語有自然之逆順向劉毅始言臣等莫不變色陛下發不世之詔出思慮之表臣之喜慶不亦宜乎在職六年遷尚書左僕射時龍見武庫井中帝親觀之有喜色百官將賀毅獨表曰昔龍降鄭時門之外子產不賀龍降夏庭沫流不禁卜藏其漦至周幽王禍釁乃發易稱潛龍勿用陽在下也證據舊典無賀龍之禮詔報曰正德未修誠未有以膺受嘉祥省來示以為瞿然賀慶之事宜詳依典義動靜數示尚書郎劉漢等議以為龍體既蒼雜以素文意者大晉之行戢武興文之應也而毅乃引衰世妖異以疑今之吉祥又以龍在井為潛皆失其意潛之為言隱而不見今龍彩質明煥示人以物非潛之謂也毅應推處詔不聽後陰氣解而復合毅上言必有阿黨之臣姦以事君者當誅而不誅故也毅以魏立九品權時之制未見得人而有八損乃上疏曰臣聞立政者以官才為本官才有三難而興替之所由也人物難知一也愛憎難防二也情偽難明三也今立中正定九品高下任意榮辱在手操人主之威福奪天朝之權勢愛憎決於心情偽由於己公無考校之負私無告訐之忌用心百態求者萬端廉讓之風滅苟且之俗成天下訩訩但爭品位不聞推讓竊為聖朝恥之夫名狀以當才為清品輩以得實為平安危之要不可不明清平者政化之美也枉濫者亂敗之惡也不可不察然人才異能備體者寡器有大小達有早晚前鄙後修宜受日新之報抱正違時宜有質直之稱度遠闕小宜得殊俗之狀任直不飾宜得清實之譽行寡才優宜獲器任之用是以三仁殊塗而同歸四子異行而均義陳平韓信笑侮於邑里而收功於帝王屈原伍胥不容於人主而顯名於竹帛是篤論之所明也今之中正不精才實務依黨利不均稱尺務隨愛憎所欲與者獲虛以成譽所欲下者吹毛以求疵高下逐強弱是非由愛憎隨世興衰不顧才實衰則削下興則扶上一人之身旬日異狀或以貨賂自通或以計協登進附託者必達守道者困悴無報於身必見割奪有私於己必得其欲是以上品無寒門下品無勢族暨時有之皆曲有故慢主罔時實為亂源損政之道一也置州都者取州里清議咸所歸服將以鎮異同一言議不謂一人之身了一州之才一人不審便坐之若然自仲尼以上至于庖犧莫不有失則皆不堪何獨責于中人者哉若殊不修自可更選今重其任而輕其人所立品格還訪刁攸攸非州里之所歸非職分之所置今訪之歸正於所不服決事於所不職以長讒構之源以生乖爭之兆似非立都之本旨理俗之深防也主者既善刁攸攸之所下而復選以二千石已有數人劉良上攸之所下石公罪攸之所行駁違之論橫於州里嫌讎之隙結於大臣夫桑妾之訟禍及吳楚鬬雞之變難興魯邦況乃人倫交爭而部黨興刑獄滋生而禍根結損政之道二也本立格之體將謂人倫有序若貫魚成次也為九品者取下者為格謂才德有優劣倫輩有首尾今之中正務自遠者則抑割一國使無上人穢劣下比則拔舉非次幷容其身公以為格坐成其私君子無大小之怨官政無繩姦之防使得上欺明主下亂人倫乃使優劣易地首尾倒錯推貴異之器使在凡品之下負戴不肖越在成人之首損政之道三也陛下踐阼開天地之德弘不諱之詔納忠直之言以覽天下之情太平之基不世之法也然賞罰自王公以至於庶人無不加法置中正委以一國之重無賞罰之防人心多故清平者寡故怨訟者衆聽之則告訐無已禁絕則侵枉無極與其理訟之煩猶愈侵枉之害今禁訟訴則杜一國之口培一人之勢使得縱橫無所顧憚諸受枉者抱怨積直獨不蒙天地無私之德而長壅蔽于邪人之銓使上明不下照下情不上聞損政之道四也昔在前聖之世欲敦風俗鎮靜百姓隆鄉黨之義崇六親之行禮教庠序以相率賢不肖於是見矣然鄉老書其善以獻天子司馬論其能以官於職有司考績以明黜陟故天下之人退而修本州黨有德義朝廷有公正浮華邪佞無所容厝今一國之士多者千數或流徙異邦或取給殊方面猶不識況盡其才力而中正知與不知其當品狀采譽於臺府納毀於流言任己則有不識之蔽聽受則有彼此之偏所知者以愛憎奪其平所不知者以人事亂其度既無鄉老紀行之譽又非朝廷考績之課遂使進官之人棄近求遠背本逐末位以求成不由行立品不校功黨譽虛妄損政五也凡所以立品設狀者求人才以理物也非虛飾名譽相為好醜雖孝悌之行不施朝廷故門外之事以義斷恩既以在官職有大小事有劇易各有功報此人才之實效功分之所得也今則反之於限當報雖職之高還附卑品無績於官而獲高是為抑功實而隆虛名也上奪天朝考績之分下長浮華朋黨之士損政六也凡官不同事人不同能得其能則成失其能則敗今品不狀才能之所宜而以九等為例以品取人或非才能之所長以狀取人則為本品之所限若狀得其實猶品狀相妨繫縶選舉使不得精於才宜況今九品所疏則削其長所親則飾其短徒結白論以為虛譽則品不料能百揆何以得理萬機何以得修損政七也前九品詔書善惡必書以為褒貶當時天下少有所忌今之九品所下不彰其罪所上不列其善廢褒貶之義任愛憎之斷清濁同流以植其私故反違前品大其形勢以驅動衆人使必歸己進者無功以表勸退者無惡以成懲懲勸不明則風俗污濁天下人焉得不解德行而銳人事損政八也由此論之選中正而非其人授權勢而無賞罰或缺中正而無禁檢故邪黨得肆枉濫縱橫雖職名中正實為姦府事名九品而有八損或恨結於親親猜生於骨肉當身困于敵讎子孫離其殃咎斯乃歷世之患非徒當今之害也是以時主觀時立法防姦消亂靡有常制故周因於殷有所損益至于中正九品上聖古賢皆所不為豈蔽於此事而有不周哉將以政化之宜無取於此也自魏立以來未見其得人之功而生讎薄之累毀風敗俗無益於化古今之失莫大於此愚臣以為宜罷中正除九品棄魏氏之弊法立一代之美制疏奏優詔答之後司空衞瓘等亦共表宜省九品復古鄉議里選帝竟不施行毅夙夜在公坐而待旦言議切直無所曲撓為朝野之所式瞻嘗散齋而疾其妻省之毅便奏加妻罪而請解齋妻子有過立加杖捶其公正如此然以峭直故不至公輔帝以毅清貧賜錢三十萬日給米肉年七十告老久之見許以光祿大夫歸第門施行馬復賜錢百萬後司徒舉毅為青州大中正尚書以毅懸車致仕不宜勞以碎務陳留相樂安孫尹表曰禮凡卑者執勞尊者居逸是順之宜也司徒魏舒司隸校尉嚴詢與毅年齒相近往者同為散騎常侍後分授外內之職資塗所經出處一致今詢管四十萬戶州兼董司百僚總攝機要舒所統殷廣兼執九品銓十六州論議主者不以為劇毅但以知一州便謂不宜累以碎事於毅太優詢舒太劣若以前聽致仕不宜復與遷授位者故光祿大夫鄭袤為司空是也夫知人則哲惟帝難之尚可復委以宰輔之任不可諮以人倫之論臣竊所未安昔鄭武公年過八十入為周司徒雖過懸車之年必有可用毅前為司隸直法不撓當朝之臣多所按劾諺曰受堯之誅不能稱堯直臣無黨古今所悉是以汲黯死於淮陽董仲舒裁為諸侯之相而毅獨遭聖明不離輦轂當世之士咸以為榮毅雖身偏有風疾而志氣聰明一州品第不足勞其思慮毅疾惡之心小過主者必疑其論議傷物故高其優禮令去事實此為机閣毅使絕人倫之路也臣州茂德惟毅越毅不用則清談倒錯矣於是青州自二品已上光祿勳石鑒等共奏曰謹按陳留相孫尹表及與臣等書如左臣州履境海岱而參風齊魯故人俗務本而世敦德讓今雖不充於舊而遺訓猶存是以人倫歸行士識所守也前被司徒符當參舉州大中正僉以光祿大夫毅純孝至素著在鄉閭忠允亮直竭於事上仕不為榮惟期盡節正身率道崇公忘私行高義明出處同揆故能令義士宗其風景州閭歸其清流雖年耆偏疾而神明克壯實臣州人士所思準繫者矣誠以毅之明格能不言而信風之所動清濁必偃以稱一州咸同之望故也竊以為禮賢尚德教之大典王制奪與動為開塞而士之所歸人倫為大臣等虛劣雖言廢於前今承尹書敢不列啟按尹所執非惟惜名議於毅之身亦通陳朝宜奪與大準以為尹言當否應蒙評議由是毅遂為州都銓正人流清濁區別其所彈貶自親貴者始太康六年卒武帝撫机驚曰失吾名臣不得生作三公即贈儀同三司使者監護喪事羽林左監北海王宮上疏曰中詔以毅忠允匪躬贈班台司斯誠聖朝考績以毅著勳之美事也臣謹按諡者行之迹而號者功之表今毅功德並立而有號無諡於義不體臣竊以春秋之事求之諡法主於行而不繫爵然漢魏相承爵非列侯則皆沒而高行不加之諡至使三事之賢臣不如野戰之將銘跡所殊臣願聖世舉春秋之遠制改列爵之舊限使夫功行之實不相掩替則莫不率賴若以革舊毀制非所倉卒則毅之忠益雖不攻城略地論德進爵亦應在例臣敢惟行甫請周之義謹牒毅功行如右帝出其表使八坐議之多同宮議奏寢不報二子暾總暾字長升正直有父風太康初為博士會議齊王攸之國加崇典禮暾與諸博士坐議迕旨武帝大怒收暾等付廷尉會赦得出免官初暾父毅疾馮紞姦佞欲奏其罪未果而卒至是紞位宦日隆暾慨然曰使先人在不令紞得無患後為酸棗令轉侍御史會司徒王渾主簿劉輿獄辭連暾將收付廷尉渾不欲使府有過欲距劾自舉之與暾更相曲直渾怒便遜位還第暾乃奏渾曰謹按司徒王渾蒙國厚恩備位鼎司不能上佐天子調和陰陽下遂萬物之宜使卿大夫各得其所敢因劉輿拒扞詔使私欲大府興長獄訟昔陳平不答漢文之問邴吉不問死人之變誠得宰相之體也既興刑獄怨懟而退舉動輕速無大臣之節請免渾官右長史楊丘亭侯劉肇便辟善柔苟於阿順請大鴻臚削爵土諸聞暾此奏者皆歎美之其後武庫火尚書郭彰率百人自衞而不救火暾正色詰之彰怒曰我能截君角也暾勃然謂彰曰君何敢恃寵作威作福天子法冠而欲截角乎求紙筆奏之彰伏不敢言衆人解釋乃止彰久貴豪侈每出輒從百餘人自此之後務從簡素暾遷太原內史趙王倫篡位假征虜將軍不受與三王共舉義惠帝復阼暾為左丞正色立朝三臺清肅尋兼御史中丞奏免尚書僕射東安公繇及王粹董艾等十餘人朝廷嘉之遂即真遷中庶子左衞將軍司隸校尉奏免武陵王澹及何綏劉坦溫畿李晅等長沙王討齊王冏暾豫謀封朱虛縣公千八百戶死坐免頃之復為司隸及惠帝之幸長安也留暾守洛陽河間王顒遣使鴆羊皇后暾乃與留臺僕射荀藩河南尹周馥等上表理后無罪語在后傳顒見表大怒遣陳顏呂朗率騎五千收暾暾東奔高密王略會劉根作逆略以暾為大都督加鎮軍將軍討根暾戰失利還洛至酸棗值東海王越奉迎大駕及帝還洛羊后反宮后遣使謝暾曰賴劉司隸忠誠之志得有今日以舊勳復封爵加光祿大夫暾妻前卒先陪陵葬子更生初婚家法婦當拜墓攜賓客親屬數十乘載酒食而行先是洛陽令王棱為越所信而輕暾暾每欲繩之棱以為怨時劉聰王彌屯河北京邑危懼棱告越云暾與彌鄉親而欲投之越嚴騎將追暾右長史傅宣明暾不然暾聞之未至墓而反以正義責越越甚慚及劉曜寇京師以暾為撫軍將軍假節都督城守諸軍事曜退遷尚書僕射越憚暾久居監司又為衆情所歸乃以為右光祿大夫領太子少傅加散騎常侍外示崇進實奪其權懷帝又詔暾領衞尉加特進後復以暾為司隸加侍中暾五為司隸允協物情故也王彌入洛百官殲焉彌以暾鄉里宿望故免於難暾因說彌曰今英雄競起九州幅裂有不世之功者宇內不容將軍自興兵已來何攻不克何戰不勝而復與劉曜不協宜思文種之禍以范蠡為師且將軍可無帝王之意東王本州以觀時勢上可以混一天下下可以成鼎峙之事豈失孫劉乎蒯通有言將軍宜圖之彌以為然使暾于青州與曹嶷謀且徵之暾至東阿為石勒游騎所獲見彌與嶷書而大怒乃殺之暾有二子佑白佑為太傅屬白太子舍人白果烈有才用東海王越忌之竊遣上軍何倫率百餘人入暾第為劫取財物殺白而去總字弘紀好學直亮後叔父彪位至北軍中候程衞字長玄廣平曲周人也少立操行強正方嚴劉毅聞其名辟為都官從事毅奏中護軍羊琇犯憲應死武帝與琇有舊乃遣齊王攸喻毅毅許之衞正色以為不可徑自馳車入護軍營收琇屬吏考問陰私先奏琇所犯狼藉然後言於毅由是名振遐邇百官厲行遂辟公府掾遷尚書郎侍御史在職皆以事幹顯補洛陽令歷安定頓丘太守所涖著績卒于官和嶠和嶠字長輿汝南西平人也祖洽魏尚書令父逌魏吏部尚書嶠少有風格慕舅夏侯玄之為人厚自崇重有盛名于世朝野許其能整風俗理人倫襲父爵上蔡伯起家太子舍人累遷潁川太守為政清簡甚得百姓歡心太傅從事中郎庾顗見而歎曰嶠森森如千丈松雖磥砢多節目施之大廈有棟梁之用賈充亦重之稱於武帝入為給事黃門侍郎遷中書令帝深器遇之舊監令共車入朝時荀勖為監嶠鄙勖為人以意氣加之每同乘高抗專車而坐乃使監令異車自嶠始也吳平以參謀議功賜弟郁爵汝南亭侯嶠轉侍中愈被親禮與任愷張華相善嶠見太子不令因侍坐曰皇太子有淳古之風而季世多偽恐不了陛下家事帝默然不答後與荀顗荀勖同侍帝曰太子近入朝差長進卿可俱詣之粗及世事既奉詔而還顗勖並稱太子明識弘雅誠如明詔嶠曰聖質如初耳帝不悅而起嶠退居懷慨歎知不見用猶不能已在御坐言及社稷未嘗不以儲君為憂帝知其言忠每不酬和後與嶠語不及來事或以告賈妃妃銜之太康末為尚書以母憂去職及惠帝即位拜太子少傅加散騎常侍光祿大夫太子朝西宮嶠從入賈后使帝問嶠曰卿昔謂我不了家事今日定云何嶠曰臣昔事先帝曾有斯言言之不效國之福也臣敢逃其罪乎元康二年卒贈金紫光祿大夫加金章紫綬本位如前永平初策諡曰簡嶠家產豐富擬于王者然性至吝以是獲譏於世杜預以為嶠有錢癖以弟郁子濟嗣位至中書郎郁字仲輿才望不及嶠而以清幹稱歷尚書左右僕射中書令尚書令洛陽傾沒奔于苟晞疾卒武陔武陔字元夏沛國竹邑人也父周魏衞尉陔沈敏有器量早獲時譽與二弟韶叔夏茂季夏並總角知名雖諸父兄弟及鄉閭宿望莫能覺其優劣同郡劉公榮有知人之鑒常造周周見其三子焉公榮曰皆國士也元夏最優有輔佐之才陳力就列可為亞公叔夏季夏不減常伯納言也陔少好人倫與潁川陳泰友善魏明帝世累遷下邳太守景帝為大將軍引為從事中郎累遷司隸校尉轉太僕卿初封亭侯五等建改封薛縣侯文帝甚親重之數與詮論時人嘗問陳泰孰若其父羣陔各稱其所長以為羣泰略無優劣帝然之泰始初拜尚書掌吏部遷左僕射左光祿大夫開府儀同三司陔以宿齒舊臣名位隆重自以無佐命之功又在魏已為大臣不得已而居位深懷遜讓終始全潔當世以為美談卒于位諡曰定子輔嗣韶歷吏部郎太子右衞率散騎常侍茂以德素稱名亞于陔為上洛太守散騎常侍侍中尚書潁川荀愷年少于茂即武帝姑子自負貴戚欲與茂交距而不答由是致怨及楊駿誅愷時為僕射以茂駿之姨弟陷為逆黨遂見害茂清正方直聞於朝野一旦枉酷天下傷焉侍中傅祗上表申明之後追贈光祿勳任愷任愷字元褒樂安博昌人也父昊魏太常愷少有識量尚魏明帝女累遷中書侍郎員外散騎常侍晉國建為侍中封昌國縣侯愷有經國之幹萬機大小多管綜之性忠正以社稷為己任帝器而昵之政事多諮焉泰始初鄭沖王祥何曾荀顗裴秀等各以老疾歸第帝優寵大臣不欲勞以筋力數遣愷諭旨於諸公諮以當世大政參議得失愷惡賈充之為人也不欲令久執朝政每裁抑焉充病之不知所為後承間言愷忠貞局正宜在東宮使護太子帝從之以為太子少傅而侍中如故充計畫不行會秦雍寇擾天子以為憂愷因曰秦涼覆敗關右騷動此誠國家之所深慮宜速鎮撫使人心有庇自非威望重臣有計略者無以康西土也帝曰誰可任者愷曰賈充其人也中書令庾純亦言之於是詔充西鎮長安充用荀勖計得留充既為帝所遇欲專名勢而庾純張華溫顒向秀和嶠之徒皆與愷善楊珧王恂華廙等充所親敬于是朋黨紛然帝知之召充愷宴于式乾殿而謂充等曰朝廷宜一大臣當和充愷各拜謝而罷既而充愷等以帝已知之而不責結怨愈深外相崇重內甚不平或為充謀曰愷總門下樞要得與上親接宜啟令典選便得漸疏此一都令史事耳且九流難精間隙易乘充因稱愷才能宜在官人之職帝不之疑謂充舉得其才即日以愷為吏部尚書加奉車都尉愷既在尚書選舉公平盡心所職然侍覲轉希充與荀勖馮紞承間浸潤謂愷豪侈用御食器充遣尚書右僕射高陽王珪奏愷遂免官有司收太官宰人檢覈是愷妻齊長公主得賜魏時御器也愷既免而毀謗益至帝漸薄之然山濤明愷為人通敏有智局舉為河南尹坐賊發不獲又免官復遷光祿勳愷素有識鑒加以在公勤恪甚得朝野稱譽而賈充朋黨又諷有司奏愷與立進令劉友交關事下尚書愷對不伏尚書杜友廷尉劉良並忠公士也知愷為充所抑欲申理之故遲留而未斷以是愷及友良皆免官愷既失職乃縱酒耽樂極滋味以自奉養初何劭以公子奢侈每食必盡四方珍饌愷乃踰之一食萬錢猶云無可下筯處愷時因朝請帝或慰諭之愷初無復言惟泣而已後起為太僕轉太常初魏舒雖歷位郡守而未被任遇愷為侍中薦舒為散騎常侍至是舒為右光祿開府領司徒帝臨軒使愷拜授舒雖以弘量寬簡為稱時以愷有佐世器局而舒登三公愷止守散卿莫不為之憤歎也愷不得志竟以憂卒時年六十一諡曰元子罕嗣罕字子倫幼有門風才望不及愷以淑行致稱為清平佳士歷黃門侍郎散騎常侍兗州刺史大鴻臚崔洪崔洪字良伯博陵安平人也高祖寔著名漢代父讚魏吏部尚書左僕射以雅量見稱洪少以清厲顯名骨鯁不同於物人之有過輒面折之而退無後言武帝世為御史治書時長樂馮恢父為弘農太守愛少子淑欲以爵傳之恢父終服闋乃還鄉里結草為廬陽瘖不能言淑得襲爵恢始仕為博士祭酒散騎常侍翟嬰薦恢高行邁俗侔繼古烈洪奏恢不敦儒素令學生番直左右雖有讓侯微善不得稱無倫輩嬰為浮華之目遂免嬰官朝廷憚之尋為尚書左丞時人為之語曰叢生棘刺來自博陵在南為鷂在北為鷹選吏部尚書舉用甄明門無私謁薦雍州刺史郤詵代己為左丞詵後糾洪洪謂人曰我舉郤丞而還奏我是挽弩自射也詵聞曰昔趙宣子任韓厥為司馬以軍法戮宣子之僕宣子謂諸大夫曰可賀我矣我選厥也任其事崔侯為國舉才我以才見舉惟官是視各明至公何故私言乃至此洪聞其言而重之洪口不言貨財手不執珠玉汝南王亮常讌公卿以瑠璃鍾行酒酒及洪洪不執亮問其故對曰慮有執玉不趨之義故爾然實乖其常性故為詭說楊駿誅洪與都水使者王佑親坐見黜後為大司農卒于官子廓散騎侍郎亦以正直稱郭奕郭奕字大業太原陽曲人也少有重名山濤稱其高簡有雅量初為野王令羊祜常過之奕歎曰羊叔子何必減郭大業少選復往又歎曰羊叔子去人遠矣遂送祜出界數百里坐此免官咸熙末為文帝相國主簿時鍾會反於蜀荀勖即會之從甥少長會家勖為文帝掾奕啟出之帝雖不用然知其雅正武帝踐阼初建東宮以奕及鄭默並為中庶子遷右衞率驍騎將軍封平陵男咸寧初遷雍州刺史鷹揚將軍尋假赤幢曲蓋鼓吹奕有寡姊隨奕之官姊下僮僕多有姦犯而為人所糾奕省按畢曰大丈夫豈當以老姊求名遂遣而不問時亭長李含有俊才而門寒為豪族所排奕用為別駕含後果有名位時以奕為知人太康中徵為尚書奕有重名當世朝臣皆出其下時帝委任楊駿奕表駿小器不可任以社稷帝不聽駿後果誅及奕疾病詔賜錢二十萬日給酒米太康八年卒太常上諡為景有司議以貴賤不同號諡與景皇同不可請諡曰穆詔曰諡所以旌德表行按諡法一德不懈為簡奕忠毅清直立德不渝於是遂賜諡曰簡侯史光侯史光字孝明東萊掖人也幼有才悟受學於同縣劉夏舉孝廉州辟別駕咸熙初為洛陽典農中郎將封關中侯泰始初拜散騎常侍尋兼侍中與皇甫陶荀廙持節循省風俗及還奏事稱旨轉城門校尉進爵臨海侯其年詔曰光忠亮篤素有居正執義之心歷職內外恪勤在公其以光為御史中丞雖屈其列校之位亦所以伸其司直之才光在職寬而不縱太保王祥久疾廢朝光奏請免之詔優祥而寢光奏後遷少府卒官詔賜朝服一具衣一襲錢三十萬布百匹及葬又詔曰光厲志守約有清忠之節家極貧儉其賜錢五十萬光儒學博古歷官著績文筆奏議皆有條理長子玄嗣官至玄菟太守卒子施嗣東莞太守何攀何攀字惠興蜀郡郫人也仕州為主簿屬刺史皇甫晏為牙門張弘所害誣以大逆時攀適丁母喪遂詣梁州拜表證晏不反故晏冤理得申王濬為益州辟為別駕濬謀伐吳遣攀奉表詣臺口陳事機詔再引見乃令張華與攀籌量進討之宜濬兼遣攀過羊祜面陳伐吳之策攀善于將命帝善之詔攀參濬軍事及孫晧降於濬而王渾恚於後機欲攻濬攀勸濬送晧與渾由是事解以攀為濬輔國司馬封關內侯轉滎陽令上便宜十事甚得名稱除廷尉平時廷尉卿諸葛沖以攀蜀士輕之及共斷疑獄沖始歎服遷宣城太守不行轉散騎侍郎楊駿執政多樹親屬大開封賞欲以恩澤自衞攀以為非乃與石崇共立議奏之語在崇傳帝不納以豫誅駿功封西城侯邑萬戶賜絹萬匹弟逢平鄉侯兄子逵關中侯攀固讓所封戶及絹之半餘所受者分給中外宗親略不入己遷翊軍校尉頃之出為東羌校尉徵為揚州刺史在任三年遷大司農轉兗州刺史加鷹揚將軍固讓不就太常成粲左將軍卞粹勸攀涖職中詔又加切厲攀竟稱疾不起及趙王倫篡位遣使召攀更稱疾篤倫怒將誅之攀不得已扶疾赴召卒于洛陽時年五十八攀居心平允涖官整肅愛樂人物敦儒貴才為梁益二州中正引致遺滯巴西陳壽閻犍為費立皆西州名士並被鄉閭所謗清議十餘年攀申明曲直咸免冤濫攀雖居顯職家甚貧素無妾媵伎樂惟以周窮濟乏為事子璋嗣亦有父風史臣曰幽厲不君上德猶懷進善共驩在位大聖之所不堪況乎志士仁人寧求苟合懷其寵秩所以繫其存亡者也雖復自口銷金投光撫劍馳書北闕敗車猶踐而諫主不易譏臣實難劉毅一遇寬容任和兩遭膚受詳觀餘烈亦各其心焉若夫武陔懷魏臣之志崔洪愛郤詵之道長升勸王彌之尊何攀從趙倫之命君子之人觀乎臨事者也贊曰仲雄初令忠謇揚庭身方諸葛帝擬桓靈大業非楊元褒誚賈和氏條暢堪施大廈崔門不謁聲飛朝野侯史武陔輔佐之才何攀平允冤濫多迴
