body:
  text: 晉書卷五十五列傳第二十五夏侯湛弟淳淳子承夏侯湛字孝若譙國譙人也祖威魏兗州刺史父莊淮南太守湛幼有盛才文章宏富善構新詞而美容觀與潘岳友善每行止同輿接茵京都謂之連璧少為太尉掾泰始中舉賢良對策中第拜郎中累年不調乃作抵疑以自廣其辭曰當路子有疑夏侯湛者而謂之曰吾聞有其才而不遇者時也有其時而不遇者命也吾子童幼而岐立弱冠而著德少而流聲長而垂名拔萃始立而登宰相之朝揮翼初儀而受卿尹之舉盪典籍之華談先王之言入閶闔躡丹墀染彤管吐洪煇干當世之務觸人主之威有效矣而官不過散郎舉不過賢良鳳棲五朞龍蟠六年英耀禿落羽儀摧殘而獨雍容藝文蕩駘儒林志不輟著述之業口不釋雅頌之音徒費情而秏力勞神而苦心此術亦以薄矣而終莫之辯宜吾子之陸沈也且以言乎才則吾子優矣以言乎時則子之所與二三公者義則骨肉之固交則明道之觀也富於德貴於官其所發明雖叩牛操築之客傭賃拘關之隸負俗懷譏之士猶將登為大夫顯為卿尹於何有寶咳唾之音愛錙銖之力向若垂一鱗迴一翼令吾子攀其飛騰之勢挂其羽翼之末猶奮迅於雲霄之際騰驤於四極之外今乃金口玉音漠然沈默使吾子栖遲窮巷守此困極心有窮志貌有饑色吝江河之流不以濯舟船之畔惜東壁之光不以寓貧婦之目抑非二三公之蔽賢也實吾子之拙惑也夏侯子曰噫湛也幸有過人必知之矣吾子所以褒飾之太矣斟酌之喻非小醜之所堪也然過承古人之誨抑因子大夫之忝在弊室也敢布其腹心豈能隱几以覽其概乎客曰敢祗以聽夏侯子曰吾聞先大夫孔聖之言德之不修學之不講聞義不能徙不善不能改是吾憂也四德具而名位不至者非吾任也是以君子求諸己小人求諸人僕也承門戶之業受過庭之訓是以得接冠帶之末充乎士大夫之列頗闚六經之文覽百家之學弱年而入公朝蒙蔽而當顯舉進不能拔羣出萃却不能抗排當世志則乍顯乍昧文則乍幽乍蔚知之者則謂之欲逍遙以養生不知之者則謂之欲遑遑以求達此皆未是僕之所匱也僕又聞世有道則士無所執其節黜陟明則下不在量其力是以當舉而不辭入朝而酬問僕東野之鄙人頑直之陋生也不識當世之便不達朝廷之情不能倚靡容悅出入崎傾逐巧點妍嘔喁辯佞隨羣班之次伏簡墨之後當此之時若失水之魚喪家之狗行不勝衣言不出口安能干當世之務觸人主之威適足以露狂簡而增塵垢縱使心有至言言有偏直此委巷之誠非朝廷之欲也今天子以茂德臨天下以八方六合為四境海內無虞萬國玄靜九夷之從王化猶洪聲之收清響黎苗之樂函夏若遊形之招惠景鄉曲之徒一介之士曾諷急就習甲子者皆奮筆揚文議制論道出草苗起林藪御青瑣入金墉者無日不有充三臺之寺盈中書之閣有司不能竟其文當年不能編其籍此執政之所厭聞也若乃羣公百辟卿士常伯被朱佩紫耀金帶白坐而論道者又充路盈寢黃幄玉階之內飽其尺牘矣若僕之言皆糞土之說消磨灰爛垢辱招穢適可充衞士之爨盈掃除之器譬猶投盈寸之膠而欲使江海易色燒一羽之毛而欲令大鑪增勢若燎原之煙彌天之雲噓之不益其熱噏之不減其氣今子見僕入朝暫對便欲坐望高位吐言數百謂陵嶒一世何吾子之失評也僕固脂車以須放秣馬以待却反耕於枳落歸志乎渦瀨從容乎農夫優游乎卒歲矣古者天子畫土以封羣后羣后受國以臨其邦懸大賞以樂其成列九伐以討其違興衰相形安危相傾故在位者以求賢為務受任者以進才為急今也則九州為一家萬國為百郡政有常道法有訓因循而禮樂自定揖讓而天下大順夫道學之貴游閭邑之搢紳皆高門之子世臣之胤弘風長譽推成而進悠悠者皆天下之彥也諷詁訓傳詩書講儒墨說玄虛僕皆不如也二三公之簡僕於凡庸之肆顯僕於細猥之中則為功也重矣時而清談則為親也周矣且古之君子不知士則不明不安是以居逸而思危對食而肴乾今也則否居位者以善身為靜以寡交為慎以弱斷為重以怯言為信不知士者無公誹不得士者不私愧彼在位者皆稷契咎益伊呂周召之倫叔豹仲熊之儔稽古則踰黃唐經緯則越虞夏蔑昆吾之功嗤桓文之勳抵叅管仲蹉雹晏嬰其遠則欲升鼎湖近則欲超太平方將保重嗇神獨善其身玄白沖虛仡爾養真雖力挾太山將不舉一羽揚波萬里將不濯一鱗咳唾成珠玉揮袂出風雲豈肯一丿夰㫝鄙事取才進人此又吾子之失言也子獨不聞夫神人乎噏風飲露不食五穀登太清遊山嶽靡芝草弄白玉不因而獨備無假而自足不與人路同嗜欲不與世務齊榮辱故能入無窮之門享不死之年以此言之何待進賢客曰聖人有言曰邦有道貧且賤焉恥也今子值有道之世當太平之會不攘袂奮氣發謀出奇使鳴鶴受和好爵見縻抑乃沈身郎署約志勤卑不亦羸哉且伊尹之干成湯甯戚之迕桓公或投己鼎俎或庸身飯牛明廢興之機歌白水之流德入殷王義感齊侯故伊尹起庖廚而登阿衡甯戚出車下而階大夫外無微介內無請謁矯身擢手徑躡名位吾子亦何不慕賢以自厲希古以慷慨乎夏侯子曰嗚呼是何言歟富與貴是人之所欲非僕之所惡也夫干將之劍陸斷狗馬水截蛟龍而鈆刀不能入泥騏驥驊騮之乘一日而致千里而駑蹇不能邁畝百鍊之鑑別鬚眉之數而壁土不見泰山鴻鵠一舉橫四海之區出青雲之外而尺鷃不陵桑榆此利鈍之覺優劣之決也夫欲進其身者不過千萬乘而僕以上朝堂答世問不過顯所知僕以竭心思盡才學意無雅正可準論無片言可採是以頓於鄙劣而莫之能起也以此言之僕何為其不自衒哉子不嫌僕德之不劭而疑其位之不到是猶反鏡而索照登木而下釣僕未以此為不肖也若乃伊尹負鼎以干湯呂尚隱遊以徼文傅說操築以寤主甯戚擊角以要君此非僕所能也莊周駘蕩以放言君平賣卜以自賢接輿陽狂以蔽身梅福棄家以求仙此又非僕之所安也若乃季札抗節於延陵楊雄覃思於太玄伯玉和柔於人懷柳惠三絀於士官僕雖不敏竊頗仿佛其清塵後選補太子舍人轉尚書郎出為野王令以卹隱為急而緩於公調政清務閑優游多暇乃作昆弟誥其辭曰惟正月才生魄湛若曰咨爾弟淳琬䣄謨總瞻古人有言孝乎惟孝友于兄弟死喪之戚兄弟孔懷又曰周之有至德也莫如兄弟於戲古之載于訓籍傳于詩書者厥乃不思不可不行爾其專乃心一乃聽砥礪乃性以聽我之格言淳等拜手稽首湛若曰嗚呼惟我皇乃祖滕公肇釐厥德厥功以左右漢祖弘濟于嗣君用垂祚于後世世增敷前軌濟其好行美德明允相繼冠冕胥及以逮于皇曾祖愍侯寅亮魏祖用康厥世遂啟土宇以大綜厥勳于家我皇祖穆侯崇厥基以允釐顯志用恢闡我令業維我后府君侯祗服哲命欽明文思以熙柔我家道丕隆我先緒欽若稽古訓用敷訓典籍乃綜其微言嗚呼自三墳五典八索九丘圖緯六藝及百家衆流罔不探賾索隱鉤深致遠洪範九疇彝倫攸乃命世立言越用繼尼父之大業斯文在茲且九齡而我王母薛妃登遐我后孝思罔極惟以奉于穆侯之繼室蔡姬以致其子道蔡姬登遐隘于穆侯之命厥禮乃不得成用不祔于祖姑惟乃用騁其永慕厥乃以疾辭位用遜于厥家布衣席以終于三載厥乃古訓無文我后丕孝其心用假于厥制以穆于世父使君侯惟伯后聰明叡智奕世載德用慈友于我后我惟烝烝是虔罔不克承厥誨用增茂我敦篤以播休美于一世厥乃可不遵惟我用夙夜匪懈日鑽其道而仰之彌高鑽之彌堅我用欲罷不敢豈唯予躬是懼實令跡是奉厥乃晝分而食夜分而寢豈唯令跡是畏實爾猶是儀嗚呼予其敬哉俞予聞之周之有至德有婦人焉我母氏羊姬宣慈愷悌明粹篤誠以撫訓羣子厥乃我齔齒則受厥教于書學不遑惟寧敦詩書禮樂孳孳弗倦我有識惟與汝服厥誨惟仁義惟孝友是尚憂深思遠祗以防于微翳義形於色厚愛平恕以濟其寬裕用緝和我七子訓諧我五妹惟我兄弟姊妹束脩慎行用不辱于冠帶實母氏是憑予其為政蕞爾惟母氏仁之不行是戚予其望色思寬獄之不情教之不泰是訓予其納戒思詳嗚呼惟母氏信著于不言行感于神明若夫恭事于蔡姬敦穆于九族乃高于古之人古之人厥乃千里承師矧我惟父惟母世德之餘烈服膺之弗可及景仰之弗可階汝其念哉俾羣弟天祚于我家俾爾咸休明是履淳英哉文明柔順琬乃沈毅篤固惟䣄厥清粹平理謨茂哉儁哲寅亮總其弘肅簡雅瞻乃純鑠惠和惟我蒙蔽極否于義訓嗟爾六弟汝其滋義洗心以補予之尤予乃亦不敢忘汝之闕嗚呼小子瞻汝其見予之長於仁未見予之長於義也瞻曰俞以如何湛若曰我之肇于總角以逮于弱冠暨于今之二毛受學于先載納誨于嚴父慈母予其敬忌于厥身而匡予之纖介翼予之小疵使予有過未曾不知予知之逌改惟沖子是賴予親于心愛于中敬于貌厥乃口無擇言柔惠且直廉而不劌肅而不厲厥其成予哉用集我父母之訓庶明厲翼邇可遠在茲瞻拜手稽首曰俞湛曰都在修身在愛人瞻曰吁惟聖其難之湛曰都厥不行惟難厥行惟易淳曰俞明而昧崇而卑沖而恆顯而賢同而疑厲而柔和而矜湛曰俞乃言厥有道淳曰俞祗服訓湛曰來琬汝亦昌言琬曰俞身不及于人不敢墮于勤厥故維新湛曰俞䣄亦昌言䣄曰俞滋敬于己不滋敬于己惟敬乃恃無忘有恥湛曰俞謨亦昌言謨曰俞無忘於不可不虞形貌以心訪心於虞湛曰俞總亦昌言總曰俞若憂厥憂以休湛曰俞瞻亦昌言瞻曰俞復外惟內取諸內不忘諸外湛曰俞休哉淳等拜手稽首湛亦拜手稽首乃歌曰明德復哉家道休哉世祚悠哉百祿周哉又作歌曰訊德恭哉訓翼從哉內外康哉皆拜曰欽哉居邑累年朝野多歎其屈除中書侍郎出補南陽相遷太子僕未就命而武帝崩惠帝即位以為散騎常侍元康初卒年四十九著論三十餘篇別為一家之言初湛作周詩成以示潘岳岳曰此文非徒溫雅乃別見孝弟之性岳因此遂作家風詩湛族為盛門性頗豪侈侯服玉食窮滋極珍及將沒遺命小棺薄斂不修封樹論者謂湛雖生不砥礪名節死則儉約令終是深達存亡之理淳字孝沖亦有文藻與湛俱知名官至弋陽太守遭中原傾覆子姪多沒胡寇唯息承渡江承字文子參安東軍事稍遷南平太守太興末王敦舉兵內向承與梁州刺史甘卓巴東監軍柳純宜都太守譚該等並露檄遠近列敦罪狀會甘卓懷疑不進王師敗績敦悉誅滅異己者收承欲殺之承外兄王廙苦請得免尋為散騎常侍潘岳從子尼潘岳字安仁滎陽中牟人也祖瑾安平太守父芘琅邪內史岳少以才穎見稱鄉邑號為奇童謂終賈之儔也早辟司空太尉府舉秀才泰始中武帝躬耕藉田岳作賦以美其事曰伊晉之四年正月丁未皇帝親率羣后藉于千畝之甸禮也於是乃使甸師清畿野廬掃路封人壝宮掌舍設枑青壇鬱其嶽立兮翠幕黕以雲布結崇基之靈阯兮啟四塗之廣阼沃野墳腴膏壤平砥清洛濁渠引流激水遐阡繩直邇陌如矢蔥犗服于縹軛兮紺轅綴於黛耜儼儲駕於廛左兮俟萬乘之躬履百僚先置位以職分自上下下具惟命臣襲春服之萋萋兮接游車之轔轔微風生於輕幰兮纖埃起乎朱輪森奉璋以階列兮望皇軒而肅震若湛露之晞朝陽兮衆星之拱北辰也於是前驅魚麗屬車鱗萃閶闔洞啟參塗方駟常伯陪乘太僕執轡后妃獻穜稑之種司農撰播殖之器挈壺掌升降之節宮正設門閭之蹕天子乃御玉輦蔭華蓋衝牙錚鎗綃紈綷金根照耀以烱晃兮龍驥騰驤而沛艾表朱玄於離坎兮飛青縞於震兌中黃曄以發輝兮方綵紛其繁會五路鳴鑾九旗揚旆瓊鈒入蘂雲罕晻藹簫管嘲儎以啾嘈兮鼓鼙土者𡔷以砰筍簴嶷以軒翥兮洪鐘越乎區外震震填填塵霧連天以幸乎藉田蟬冕熲以灼灼兮碧色肅其千干似夜光之剖荊璞兮若茂松之依山顛也於是我皇乃降靈壇撫御耦游場染屨洪縻在手三推而舍庶人終畝貴賤以班或五或九于斯時也居靡都鄙人無華裔長幼雜遝以交集士女頒斌而咸戾被褐振裾垂髫總髻躡踵側肩掎裳連襼黃塵為之四合兮陽光為之潛翳動容發音而觀者莫不抃舞乎康衢謳吟乎聖世情欣樂乎昏作兮慮盡力乎樹藝靡誰督而常勤兮莫之課而自厲躬先勞而悅使兮豈嚴刑而猛制哉有邑老田父或進而稱曰蓋損益隨時理有常然高以下為基人以食為天正其末者端其本善其後者慎其先夫九土之宜弗任四業之務不壹野有菜蔬之色朝乏代耕之秩無儲蓄以虞災徒望歲以自必三代之衰皆此物也今聖上昧旦丕顯夕惕若慄圖匱於豐防儉於逸欽哉欽哉惟穀之恤展三時之弘務致倉廩於盈溢固堯湯之用心而存救之要術也若乃廟祧有事祝宗諏日簠簋普淖則此之自實縮鬯蕭茅又於是乎出黍稷馨香旨酒嘉栗宜其時和年登而神降之吉也古人有言曰聖人之德無以加於孝乎夫孝者天之性人之所由靈也昔者明王以孝治天下其或繼之者尟哉希矣逮我皇晉實光斯道儀刑孚于萬國愛敬盡於祖考故躬稼以供粢盛所以致孝也勸穡以足百姓所以固本也能本而孝盛德大業至矣哉此一役也二美顯焉不亦遠乎不亦重乎敢作頌曰思樂甸畿薄採其芳大君戾止言藉其農其農三推萬國以祗耨我公田遂及我私我簠斯盛我簋斯齊我倉如陵我庾如坻念茲在茲永言孝思人力普存祝史正辭神祇攸歆逸豫無期一人有慶兆民賴之岳才名冠世為衆所疾遂栖遲十年出為河陽令負其才而鬱鬱不得志時尚書僕射山濤領吏部王濟裴楷等並為帝所親遇岳內非之乃題閣道為謠曰閣道東有大牛王濟鞅裴楷畒和嶠刺促不得休轉懷令時以逆旅逐末廢農姦淫亡命多所依湊敗亂法度敕當除之十里一官使老小貧戶守之又差吏掌主依客舍收錢岳議曰謹案逆旅久矣其所由來也行者賴以頓止居者薄收其直交易貿遷各得其所官無役賦因人成利惠加百姓而公無末費語曰許由辭帝堯之命而舍於逆旅外傳曰晉陽處父過甯舍於逆旅魏武皇帝亦以為宜其詩曰逆旅整設以通商賈然則自堯到今未有不得客舍之法唯商鞅尤之固非聖世之所言也方今四海會同九服納貢八方翼翼公私滿路近畿輻輳客舍亦稠冬有溫廬夏有涼蔭芻秣成行器用取給疲牛必投乘涼近進發槅寫鞍皆有所憩又諸劫盜皆起於迥絕止乎人衆十里蕭條則姦軌生心連陌接館則寇情震懾且聞聲有救已發有追不救有罪不追有戮禁暴捕亡有司存凡此皆客舍之益而官之所乏也又行者貪路告糴炊爨皆以昏晨盛夏晝熱又兼星夜既限早閉不及門或避晚關迸逐路隅祇是慢藏誨盜之原苟以客舍多敗法教官守棘獨復何人彼河橋孟津解券輸錢高第督察數入校出品郎兩岸相檢猶懼或失之故懸以祿利許以功報今賤吏疲人獨專稅管開閉之權藉不校之勢此道路之蠹姦利所殖也率歷代之舊俗獲行留之歡心使客舍洒掃以待征旅擇家而息豈非衆庶顒顒之望請曹列上朝廷從之岳頻宰二邑勤於政績調補尚書度支郎遷廷尉評以公事免楊駿輔政高選吏佐引岳為太傅主簿駿誅除名初譙人公孫宏少孤貧客田於河陽善鼓琴頗能屬文岳之為河陽令愛其才蓺待之甚厚至是宏為楚王瑋長史專殺生之政時駿綱紀皆當從坐同署主簿朱振已就戮岳其夕取急在外宏言之瑋謂之假吏故得免未幾選為長安令作西征賦述所經人物山水文清旨詣辭多不錄徵補博士未召以母疾輒去官免尋為著作郎轉散騎侍郎遷給事黃門侍郎岳性輕躁趨世利與石崇等諂事賈謐每候其出與崇輒望塵而拜構愍懷之文岳之辭也謐二十四友岳為其首謐晉書限斷亦岳之辭也其母數誚之曰爾當知足而乾沒不已乎而岳終不能改既仕宦不達乃作閑居賦曰岳讀汲黯傳至司馬安四至九卿而良史書之題以巧宦之目未曾不慨然廢書而歎也曰嗟乎巧誠有之拙亦宜然顧常以為士之生也非至聖無軌微妙玄通者則必立功立事效當年之用是以資忠履信以進德修辭立誠以居業僕少竊鄉曲之譽忝司空太尉之命所奉之主即太宰魯武公其人也舉秀才為郎逮事世祖武皇帝為河陽懷令尚書郎廷尉評今天子諒闇之際領太傅主簿府主誅除名為民俄而復官除長安令遷博士未召拜親疾輒去官免自弱冠涉于知命之年八徙官而一進階再免一除名一不拜職遷者三而已矣雖通塞有遇抑亦拙之效也昔通人和長輿之論余也固曰拙于用多稱多者吾豈敢言拙則信而有徵方今俊乂在官百工惟時拙者可以絕意乎寵榮之事矣太夫人在堂有羸老之疾尚何能違膝下色養而屑屑從斗筲之役於是覽止足之分庶浮雲之志築室種樹逍遙自得池沼足以漁釣舂稅足以代耕灌園鬻蔬供朝夕之膳牧羊酤酪俟伏臘之費孝乎惟孝友于兄弟此亦拙者之為政也乃作閑居賦以歌事遂情焉其辭曰遨墳素之長圃步先哲之高衢雖吾顏之云厚猶內愧於甯蘧有道余不仕無道吾不愚何巧智之不足而拙艱之有餘也於是退而閑居于洛之涘身齊逸民名綴下士背京泝伊面郊後市浮梁黝以逕度靈臺傑其高峙闚天文之祕奧覩人事之終始其西則有元戎禁營玄幕綠徽谿子巨黍異絭同歸礮石雷駭激矢蝱飛以先啟行耀我皇威其東則有明堂辟雍清穆敞閑環林縈映圓海回泉聿追孝以嚴父宗文考以配天祗聖敬以明順養更老以崇年若乃背冬涉春陰謝陽施天子有事于柴燎以郊祖而展義張鈞天之廣樂備千乘之萬騎服棖棖以齊玄管啾啾而並吹煌煌乎隱隱乎茲禮容之壯觀而王制之巨麗也兩學齊列雙宇如一右延國冑左納良逸祁祁生徒濟濟儒術或升之堂或入之室教無常師道在則是故髦士投紱名王懷璽訓若風行應猶草靡此里仁所以為美孟母所以三徙也爰定我居築室穿池長楊映沼芳枳樹遊鱗瀺灂菡萏敷披竹木蓊藹靈果參差張公大谷之棃梁侯烏椑之柿周文弱枝之棗房陵朱仲之李靡不畢植三桃表櫻胡之別二柰耀丹白之色石榴蒲桃之珍磊落蔓延乎其側梅杏郁棣之屬繁榮藻麗之飾華實照爛言所不能極也菜則蔥韭蒜芋青筍紫薑菫薺甘旨蓼荾芬芳蘘荷依陰時藿向陽綠葵含露白薤負霜於是凜秋暑退熙春寒往微雨新晴六合清朗太夫人乃御版輿升輕軒遠覽王畿近周家園體以行和藥以勞宣常膳載加舊痾有痊於是席長筵列孫子柳垂蔭車結軌陸摘紫房水掛赬鯉或宴于林或禊于汜昆弟斑白兒童稚齒稱萬壽以獻觴咸一懼而一喜壽觴舉慈顏和浮杯樂飲絲竹駢羅頓足起舞抗音高歌人生安樂孰知其他退求己而自省信用薄而才劣奉周任之格言敢陳力而就列幾陋身之不保而奚擬乎明哲仰衆妙而絕思終優游以養拙初芘為琅邪內史孫秀為小史給岳而狡黠自喜岳惡其為人數撻辱之秀常銜忿及趙王倫輔政秀為中書令岳於省內謂秀曰孫令猶憶疇昔周旋不答曰中心藏之何日忘之岳於是自知不免俄而秀遂誣岳及石崇歐陽建謀奉淮南王允齊王冏為亂誅之夷三族岳將詣市與母別曰負阿母初被收俱不相知石崇已送在市岳後至崇謂之曰安仁卿亦復爾邪岳曰可謂白首同所歸岳金谷詩云投分寄石友白首同所歸乃成其讖岳母及兄侍御史釋弟燕令豹司徒掾據據弟詵兄弟之子己出之女無長幼一時被害唯釋子伯武逃難得免而豹女與其母相抱號呼不可解會詔原之岳美姿儀辭藻絕麗尤善為哀誄之文少時常挾彈出洛陽道婦人遇之者皆連手縈繞投之以果遂滿車而歸時張載甚醜每行小兒以瓦石擲之委頓而反岳從子尼尼字正叔祖勖漢東海相父滿平原內史並以學行稱尼少有清才與岳俱以文章見知性靜退不競唯以勤學著述為事著安身論以明所守其辭曰蓋崇德莫大乎安身安身莫尚乎存正存正莫重乎無私無私莫深乎寡欲是以君子安其身而後動易其心而後語定其交而後求篤其志而後行然則動者吉凶之端也語者榮辱之主也求者利病之幾也行者安危之決也故君子不妄動也動必適其道不徒語也語必經於理不苟求也求必造於義不虛行也行必由於正夫然用能免或繫之凶享自天之祐故身不安則殆言不從則悖交不審則惑行不篤則危四者行乎中則憂患接乎外矣憂患之接必生於自私而興於有欲自私者不能成其私有欲者不能濟其欲理之至也欲苟不濟能無爭乎私苟不從能無伐乎人人自私家家有欲衆欲並爭羣私交伐爭則亂之萌也伐則怨之府也怨亂既構危害及之得不懼乎然棄本要末之徒知進忘退之士莫不飾才銳智抽鋒擢穎傾側乎勢利之交馳騁乎當塗之務朝有彈冠之朋野有結綬之友黨與熾於前榮名扇其後握權則赴者鱗集失寵則散者瓦解求利則託刎頸之歡爭路則構刻骨之隙於是浮偽波騰曲辯雲沸寒暑殊聲朝夕異價駑蹇希奔放之跡鈆刀競一割之用至於愛惡相攻與奪交戰誹謗噂毀譽縱橫君子務能小人伐技風穨於上俗弊於下禍結而恨爭也不強患至而悔伐之未辯大者傾國喪家次則覆身滅祀其故何邪豈不始於私欲而終於爭伐哉君子則不然知自私之害公也然後外其身知有欲之傷德也故遠絕榮利知爭競之遘災也故犯而不校知好伐之招怨也故有功而不德安身而不為私故身正而私全慎言而不適欲故言濟而欲從定交而不求益故交立而益厚謹行而不求名故行成而名美止則立乎無私之域行則由乎不爭之塗必將通天下之理而濟萬物之性天下猶我故與天下同其欲己猶萬物故與萬物同其利夫能保其安者非謂崇生生之厚而耽逸豫之樂也不忘危而已有期進者非謂窮貴寵之榮而藉名位之重也不忘退而已存其治者非謂嚴刑政之威而明司察之禁也不忘亂而已故寢蓬室隱陋巷披短褐茹藜藿環堵而居易衣而出苟存乎道非不安也雖坐華殿載文軒服黼繡御方丈重門而處成列而行不得與之齊榮用天時分地利甘布衣安藪澤沾體塗足耕而後食苟崇乎德非不進也雖居高位饗重祿執權衡握機祕功蓋當時勢侔人主不得與之比逸遺意慮沒才智忘肝膽棄形器貌若無能志若不及苟正乎心非不治也雖繁計策廣術藝審刑名峻法制文辯流離論議絕世不得與之爭功故安也者安乎道者也進也者進乎德者也治也者治乎心者也未有安身而不能保國家進德而不能處富貴治心而不能治萬物者也然思危所以求安慮退所以能進懼亂所以保治戒亡所以獲存也若乃弱志虛心曠神遠致徙倚乎不拔之根浮遊乎無垠之外不自貴於物而物宗焉不自重於人而人敬焉可親而不可慢也可尊而不可遠也親之如不足天下莫之能狎也舉之如易勝而當世莫之能困也達則濟其道而不榮也窮則善其身而不悶也用則立於上而非爭也舍則藏於下而非讓也夫榮之所不能動者則辱之所不能加也利之所不能勸者則害之所不能嬰也譽之所不能益者則毀之所不能損也今之學者誠能釋自私之心塞有欲之求杜交爭之原去矜伐之態動則行乎至通之路靜則入乎大順之門泰則翔乎寥廓之宇否則淪乎渾冥之泉邪氣不能干其度外物不能擾其神哀樂不能盪其守死生不能易其真而以造化為工匠天地為陶鈞名位為糟粕勢利為埃塵治其內而不飾其外求諸己而不假諸人忠肅以奉上愛敬以事親可以御一體可以牧萬民可以處富貴可以安賤貧經盛衰而不改則庶幾乎能安身矣初應州辟後以父老辭位致養太康中舉秀才為太常博士歷高陸令淮南王允鎮東參軍元康初拜太子舍人上釋奠頌其辭曰元康元年冬十二月上以皇太子富於春秋而人道之始莫先於孝悌初命講孝經于崇正殿實應天縱生知之量微言奧義發自聖問業終而體達三年春閏月將有事於上庠釋奠于先師禮也越二十四日丙申侍祠者既齊輿駕次于太學太傅在前少傅在後恂恂乎弘保訓之道宮臣畢從三率備衞濟濟乎肅翼贊之敬乃掃壇為殿懸幕為宮夫子位于西序顏回侍于北墉宗伯掌禮司儀辯位二學儒官搢紳先生之徒垂纓佩玉規行矩步者皆端委而陪於堂下以待執事之命設樽篚於兩楹之間陳罍洗於阼階之左几筵既布鍾懸既列我后乃躬拜俯之勤資在三之義謙光之美彌劭闕里之教克崇穆穆焉邕邕焉真先王之徽典不刊之美業允不可替已於是牲饋之事既終享獻之禮已畢釋玄衣御春服弛齋禁反故式天子乃命內外羣司百卿士蕃王三事至于學徒國子咸來觀禮我后皆延而與之燕金石簫管之音八佾六代之舞鏗鏘闛般辟俛仰可以澂神滌欲移風易俗者罔不畢奏抑淫哇屏鄭衞遠佞邪釋巧辯是日也人無愚智路無遠邇離鄉越國扶老攜幼不期而俱萃皆延頸以視傾耳以聽希道慕業洗心革志想洙泗之風歌來蘇之惠然後知居室之善著應乎千里之外不言之化洋溢于九有之內於熙乎若典固皇代之壯觀萬載之一會也尼昔忝禮官嘗聞俎豆今廁末列親覩盛美瀸漬徽猷沐浴芳潤不知手舞口詠竊作頌一篇義近辭陋不足測盛德之形容光聖明之遐度其辭曰三元迭運五德代微黃精既亢素靈乃暉有皇承天造我晉畿祚以大寶登以龍飛宣基誕命景熙遐緒三分自文受終惟武席卷要蠻蕩定荒阻道濟羣生化流率土後帝承哉丕隆曾構奄有萬方光宅宇宙篤生上嗣繼期挺秀聖敬日躋濬哲閎茂留精儒術敦閱古訓遵道讓齒降心下問鋪以金聲光以玉潤如日之升如乾之運乃延台保乃命學臣聖容穆穆侍講誾誾抽演微言啟發道真探幽窮賾溫故知新講業既終精義既研崇聖重師卜日告奠陳其三牢引其四縣既戒既式乃盥乃薦恂恂孔聖百王攸希亹亹顏生好學無違曰皇儲后體神合幾兆吉先見知來洞微濟濟二宮藹藹庶僚俊乂鱗萃髦士盈朝如彼和肆莫匪瓊瑤如彼儀鳳樂我雲韶瓊瑤誰剖四門洞開雲韶奚樂神人允諧蟬冕耀庭細珮振階德以謙光仁以恩懷我酒惟清我肴惟馨舞以六代歌以九成莘莘冑子祁祁學生洗心自百觀國之榮學猶蒔苗化若偃草博我以文弘我以道萬邦蟬蛻矧乃俊造鑽蚌瑩珠剖石摛藻絲匪玄黃水罔方圓引之斯流染之斯鮮若金受範若埴在甄上好如雲下效如川昔在周興王化之始曰文曰武時惟世子今我皇儲齊聖通理緝熙重光於穆不已於穆伊何思文哲后媚茲一人實副元首孝洽家邦光照九有純嘏自晉永世昌阜微微下臣過充近侍猥躡風雲鸞龍是廁身澡芳流目玩盛事竭誠作頌祗詠聖志出為宛令在任寬而不縱恤隱勤政厲公平而遺人事入補尚書郎俄轉著作郎為乘輿箴其辭曰易稱有天地然後有人倫有父子然後有君臣傳曰大者天地其次君臣然君臣父子之道天地人倫之本未有以先之者也故天生蒸人而樹之君使司牧之將以導羣生之性而理萬物之情豈以寵一人之身極無量之欲如斯而已哉夫古之為君者無欲而至公故有茅茨土階之儉而後之為君有欲而自利故有瑤臺瓊室之奓無欲者天下共推之有欲者天下共爭之推之之極雖禪代猶脫屣爭之之極雖劫殺而不避故曰天下非一人之天下乃天下之天下安可求而得辭而已者乎夫修諸己而化諸人出乎邇而見乎遠者言行之謂也故人主所患莫甚於不知其過而所美莫美於好聞其過若有君於此而曰予必無過唯其言而莫之違斯孔子所謂其庶幾乎一言而喪國者也蓋君子之過如日月之蝕過也人皆見之更也人皆仰之雖以堯舜湯武之盛必有誹謗之木敢諫之鼓盤杅之銘無諱之史所以閑其邪僻而納諸正道其自維持如此之備故箴規之興將以救過補闕然猶依違諷喻使言之者無罪聞之者足以自誡先儒既援古義舉內外之殊而高祖亦序六官論成敗之要義正辭約又盡善矣自虞人箴以至于百官非唯規其所司誠欲人主斟酌其得失焉春秋傳曰命百官箴王闕則亦天子之事也尼以為王者膺受命之期當神器之運總萬機而撫四海簡羣才而審所授孜孜於得人汲汲於聞過雖廷爭面折猶將祈請而求焉至於箴規諫之順者曷為獨闕之哉是以不量其學陋思淺因負擔之餘嘗試撰而述之不敢斥至尊之號故以乘輿目篇蓋帝王之事至大而古今之變至衆文繁而義詭意局而辭野將欲希企前賢髣髴崇軌譬猶丘坻之望華岱星之繫日月也其不逮明矣頌曰元元遂初芒芒太始清濁同流玄黃錯跱上下弗形尊卑靡紀赫胥悠哉大庭尚矣皇極啟建兩儀既分彝倫永序萬邦已紛國事明王家奉嚴君各有攸尊德用不勤羲農已降暨于夏殷或禪或傳乃質乃文太上無名下知有之仁義不存而人歸孝慈無為無執何欲何思忠信之薄禮刑實滋既譽既畏以侮以欺作誓作盟而人始叛疑煌煌四海藹藹萬乘匪誓焉憑左輔右弼前疑後丞一日萬機業業兢兢夫出其言善則千里是應而莫余違亦喪邦有徵樞機之動式以廢興殷監不遠若之何勿懲且厚味腊毒豐屋生災辛作琁室而夏興瑤臺糟丘酒池象箸玉杯厥肴伊何龍肝豹胎惟此哲婦職為亂階殷用喪師夏亦不恢是以帝堯在位茅茨不翦周文日昃昧旦丕顯夫德輶如毛而或舉之者鮮故濩有慚德武未盡善下世道衰末俗化淺耽樂逸游荒淫沈湎不式古訓而好是佞辯不遵王路而覆車是踐成敗之效載在先典匪唯陵夷厥世用殄故曰樹君如之何將人是司牧視之猶傷而知其寒燠故能撫之斯柔而敦之斯睦無遠不懷靡思不服夫豈厭縱一人而玩其耳目內迷聲色外荒馳逐不修政事而終於顛覆昔唐氏授舜舜亦命禹受終納祖丕承天序放桀惟湯克殷伊武故禪代非一姓社稷無常主四嶽三塗九州之阻彭蠡洞庭殷商之旅虞夏之隆非由尺土而紂之百克卒於絕緒故王者無親唯在擇人傾蓋惟舊白首乃新望由釣夫伊起有莘負鼎鼓刀而謀合聖神夫豈借官左右而取介近臣蓋有國有家者莫云我聰或此面從莫謂我智聽受未易甘言美疾尟不為累由夷逃寵遠於脫屣柰何人主位極則侈知人則哲惟帝所難唐朝既泰四族作姦周室既隆而管蔡不虔匪我二聖孰弭斯患若九德咸受儁乂在官君非臣莫治臣非君莫安故書美康哉而易貴金蘭有皇司國敢告納言及趙王倫篡位孫秀專政忠良之士皆罹禍酷尼遂疾篤取假拜掃墳墓聞齊王冏起義乃赴許昌冏引為參軍與謀時務兼管書記事平封安昌公歷黃門侍郎散騎常侍侍中祕書監永興末為中書令時三王戰爭皇家多故尼職居顯要從容而已雖憂虞不及而備嘗艱難永嘉中遷太常卿洛陽將沒攜家屬東出成臯欲還鄉里道遇賊不得前病卒於塢壁年六十餘張載弟協協弟亢張載字孟陽安平人也父收蜀郡太守載性閑雅博學有文章太康初至蜀省父道經劍閣載以蜀人恃險好亂因著銘以作誡曰巖巖梁山積石峨峨遠屬荊衡近綴岷嶓南通邛僰北達褒斜狹過彭碣高踰嵩華惟蜀之門作固作鎮是曰劍閣壁立千仞窮地之險極路之峻世濁則逆道清斯順閉由往漢開自有晉秦得百二并吞諸侯齊得十二田生獻籌矧茲狹隘土之外區一人荷戟萬夫趦趄形勝之地非親勿昔在武侯中流而喜河山之固見屈吳起洞庭孟門二國不祀興實由德險亦難恃自古及今天命不易憑阻作昏尟不敗績公孫既沒劉氏銜璧覆車之軌無或重跡勒銘山阿敢告梁益益州刺史張敏見而奇之乃表上其文武帝遣使鐫之於劍閣山焉載又為榷論曰夫賢人君子將立天下之功成天下之名非遇其時曷由致之哉故嘗試論之殷湯無鳴條之事則伊尹有莘之匹夫也周武無牧野之陣則呂牙渭濱之釣翁也若茲之類不可勝紀蓋聲發響應形動影從時平則才伏世亂則奇用豈不信歟設使秦莽修三王之法時致隆平則漢祖泗上之健吏光武舂陵之俠客耳況乎附麗者哉故當其有事也則足非千里不入於輿刃非斬鴻不韜於鞘是以駑蹇望風而退頑鈍未試而廢及其無事也則牛驥共牢利鈍齊列而無長塗犀革以決之此離朱與瞽者同眼之說也處守平之世而欲建殊常之勳居太平之際而吐違俗之謀此猶卻步而登山鬻章甫於越也漢文帝見李廣而歎曰惜子不遇當高帝時萬戶侯豈足道哉故智無所運其籌勇無所奮其氣則勇怯一也才無所騁其能辯無所展其說則頑慧均也是以吳榜越船不能無水而浮青虯赤螭不能無雲而飛故和璧之在荊山隨珠之潛重川非遇其人焉有連城之價照車之名乎青骹繁霜縶於籠中何以效其撮東郭於韝下也白猨玄豹藏於欞檻何以知其接垂條於千仞也孱夫與烏獲訟力非龍文赤鼎無以明之蓋聶政與荊卿爭勇非強秦之威孰能辨之故餓夫庸隸抱關屠釣之倫一旦而都卿相之位建金石之號者或有懷顏孟之術抱伊管之略沒世而不齒者此言有事之世易為功無為之時難為名也若斯湮滅而不稱曾不足以多說況夫庸庸之徒少有不得意者則自以為枉伏莫不飾小辯立小善以偶時結朋黨聚虛譽以驅俗進之無補於時退之無損於化而世主相與雷同齊口吹而喣之豈不哀哉今士循常習故規行矩步積階級累閥閱碌碌然以取世資若夫魁梧儁傑卓躒俶儻之徒直將伏死嶔岑之下安能與步驟共爭道里乎至如軒冕黻班之士苟不能匡化輔政佐時益世而徒俯仰取容要榮求利厚自封之資豐私家之積此沐猴而冠耳尚焉足道哉載又為濛汜賦司隸校尉傅玄見而嗟歎以車迎之言談盡日為之延譽遂知名起家佐著作郎出補肥鄉令復為著作郎轉太子中舍人遷樂安相弘農太守長沙王乂請為記室督拜中書侍郎復領著作載見世方亂無復進仕意遂稱疾篤告歸卒於家協字景陽少有儁才與載齊名辟公府掾轉祕書郎補華陰令征北大將軍從事中郎遷中書侍郎轉河間內史在郡清簡寡欲于時天下已亂所在寇盜協遂棄絕人事屏居草澤守道不競以屬詠自娛擬諸文士作七命其辭曰沖漠公子含華隱曜嘉遯龍蟠超世高蹈遊心於浩然玩志乎衆妙絕景乎大荒之遐阻吞響乎幽山之窮奧於是徇華大夫聞而造焉乃整雲輅驂飛黃越奔沙輾流霜陵扶搖之風躡堅冰之津旌拂霄崿軌出蒼垠天清泠而無霞野曠朗而無塵臨重岫而攬轡顧石室而迴輪遂適沖漠公子之所居其居也崢嶸幽藹蕭瑟虛玄溟海渾濩涌其後嶰谷𣫭嶆張其前尋竹竦莖蔭其壑百籟羣鳴籠其山衝發而回日飛礫起而灑天於是登絕巘遡長風陳辨惑之辭命公子於巖中曰蓋聞聖人不卷道而背時智士不遺身而匿跡生必耀華名於玉牒沒則勒鴻伐於金冊今公子違世陸沈避地獨竄有生之歡滅資父之義廢愁洽百年苦溢千載何異促鱗之遊汀濘短羽之栖翳薈今將榮子以天人之大寶悅子以縱性之至娛窮地而遊中天而居傾四海之歡殫九州之腴鑽屈穀之瓠解疏屬之拘子欲之乎公子曰大夫不遺來萃荒外雖在不敏敬聽嘉話大夫曰寒山之桐出自太冥含黃鐘以吐幹據蒼岑而孤生既乃瓊巘層崚金岸崥崹右當風谷左臨雲谿上無陵虛之巢下無跖實之蹊搖刖峻挺茗邈嶕嶢晞三春之溢露遡九秋之鳴零雪寫其根霏霜封其條木既繁而後綠草未素而先彫於是構雲梯陟崢嶸翦蕤賓之陽柯剖大呂之陰莖營匠斲其樸伶倫均其聲器舉樂奏促調高張音朗號鐘韵清繞梁追逸響於八風採奇律於歸昌啟中黃之妙宮發蓐收之變商若乃龍火西頹暄氣初收飛霜迎節高風送秋羈旅懷土之徒流宕百罹之儔撫促柱則酸鼻揮危弦則涕流若乃追清哇赴嚴節奏淥水吐白雪激楚迴流風結悲蓂莢之朝落悼望舒之夕缺煢嫠為之擗摽孀老為之嗚咽王子拂纓而傾耳六馬噓天而仰秣此蓋音曲之至妙子豈能從我而聽之乎公子曰余病未能也大夫曰蘭宮祕宇雕堂綺櫳雲屏爛旰瓊壁青蔥應門八襲琁臺九重表以百常之闕圜以萬雉之墉爾乃嶢榭迎風秀出中天翠觀岑青彤閣霞連長翼臨雲飛陛陵山望玉繩而結極承倒景而開軒赬素煥爛枌栱嵯峨陰虯負檐陽馬承阿錯以瑤英鏤以金華方疏含秀圓井吐葩重殿疊起交綺對榥幽堂晝密明室夜朗焦冥飛而風生尺蠖動而成響若乃目厭常玩體倦帷幄攜公子而雙遊時娛觀於林麓登翠阜臨丹谷華草錦繁飛采星燭陽葉春青陰條秋綠華實代新承意恣觀仰折神虈俯採朝蘭愬惠風於蘅薄眷椒塗於瑤壇爾乃浮三翼戲中沚潛鰓駭驚翰起沈絲結飛矰理掛歸翮於赤霄之表出華鱗於紫潭之𩹉然後縱櫂隨風弭楫乘波吹孤竹撫雲和川客唱淮南之曲榜人奏採菱之歌歌曰乘鷁舟兮為水嬉臨芳洲兮拔靈芝樂以忘戚遊以卒時窮夜為日畢歲為期此蓋宴居之浩麗子豈能從我而處之乎公子曰余病未能也大夫曰若乃白商素節月既授衣天凝地閉風厲霜飛柔條夕勁密葉晨稀將因氣以效殺臨金郊而講師爾乃列輕武整戎剛建雲髦啟雄芒駕紅陽之飛燕驂唐公之驌驦屯羽隊於外林縱輕翼於中荒爾乃張脩罠布飛羅陵黃岑挂青巒畫長壑以為限帶流谿以為關既乃內無疏蹊外無漏跡叩鉦散校舉麾贊獲彀金機馳鳴鏑翦剛豪落勁翮連騎競騖駢武齊轍翕忽揮霍雲迴風烈聲動響飛形移影發舉戈林聳揮鋒電滅仰傾雲巢俯殫地穴乃有圓文之豜斑題之豵鼓鬣風生怒目電瞛口齩霜刃足撥飛鋒齀林蹶石扣跋幽叢於是飛黃奮銳賁育逞伎封狶馮豕拉甝虪挫解宀丿貝鉤爪摧踞牙擺瀾漫狼藉傾榛倒壑隕胔挂山僵踣掩澤藪為毛林隰為丹薄於是徹圍頓網卷旆收鳶虞人數獸林衡計鮮論最犒勤息馬韜弦肴駟連酒駕方軒千鍾電釂萬燧星繁陵阜沾流膏谿谷厭芳煙歡極樂殫迴節而旋此亦畋遊之壯觀子豈能從我而為之乎公子曰余病未能也大夫曰楚之陽劍歐冶所營邪谿之鋌赤山之精銷踰羊頭鍱越鍛成乃鍊乃鑠萬辟千灌豐隆奮椎飛廉扇炭神器化成陽文陰漫既乃流綺星連浮采艷發光如散電質如耀雪霜鍔水凝冰刃露潔形冠豪曹名珍巨闕指鄭則三軍白首麾晉則千里流血豈徒水截蛟鴻陸灑奔駟斷浮翮以為工絕重甲而稱利云爾而已哉若其靈寶則舒辟無方奇鋒異模形震薛燭光駭風胡價兼三鄉聲貴二都或馳名傾秦或夜飛去吳是以功冠萬載威曜無窮揮之者無前擁之者身雄可以從服九國橫制八戎爪牙景附函夏承風此蓋希世之神兵子豈能從我而服之乎公子曰余病未能也大夫曰天驥之駿逸態超越稟氣靈川受精皎月眸瞷黑照玄采紺發沫如揮紅汗如振血秦青不能識其衆尺方堙不能覩其若滅爾乃巾雲軒踐朝霧赴春衢整秋御虯踊螭騰麟超龍翥望山載奔視林載赴氣盛怒發星飛電駭志陵九州勢越四海影不及形塵不暇起浮箭未移再踐千里爾乃踰天根越地隔過汗漫之所不遊躡章亥之所未跡陽烏為之頓羽夸父為之投策斯蓋天下之儁乘子豈能從我而御之乎公子曰余病未能也大夫曰大梁之黍瓊山之禾唐稷播其根農帝嘗其華爾乃六禽殊珍四膳異肴窮海之錯極陸之毛伊公爨鼎庖丁揮刀味重九沸和兼勺藥晨鳧露鵠霜鵽黃雀圓案星亂方丈華錯封熊之蹯翰音之跖燕髀猩脣髦殘象白靈川之龜萊黃之鮐丹穴之鷚玄豹之胎燀以秋橙酤以春梅接以商王之箸承以帝辛之杯范公之鱗出自九谿赬尾丹腮紫翼青爾乃命支離飛霜鍔紅肌綺散素膚雪落婁子之豪不能廁其細秋蟬之翼不足擬其薄繁肴既闋亦有嘉羞商山之果漢臯之楱析龍眼之房剖椰子之殼芳旨萬選承意代奏乃有荊南烏程豫北竹葉浮蟣星沸飛華萍接玄石嘗其味儀氏進其法傾罍一朝可以流湎千日單醪投川可使三軍告捷斯人神之所歆羨觀聽之所煒曄也子豈能強起而御之乎公子曰耽爽口之饌甘腊毒之味服腐腸之藥御亡國之器雖子大夫之所榮顧亦吾人之所畏余病未能也大夫曰蓋有晉之融皇風也金華啟徵大人有作繼明代照配天光宅其基德也隆於姬公之處岐其垂仁也富乎有殷之在亳南箕之風不能暢其化離畢之雲無以豐其澤皇道昭煥帝載緝熙導氣以樂宣德以詩教清乎雲官之世政穆乎鳥紀之時王猷四塞函夏謐靜丹冥投鋒青徼釋警卻馬於糞車之轅銘德於昆吾之鼎羣萌反素時文載郁耕父推畔漁豎讓陸樵夫恥危冠之飾輿臺笑短後之服六合時雍巍巍蕩蕩玄髫巷歌黃髮擊壤解羲皇之繩錯陶唐之象若乃華裔之夷流荒之貊語不傳於輶軒地未被乎正朔莫不駿奔稽顙委質重譯于時昆蚑感惠無思不擾苑戲九尾之禽囿棲三足之鳥鳴鳳在林夥於黃帝之園有龍游川盈於孔甲之沼萬物烟熅天地交泰義懷靡內化感無外林無被褐山無韋帶皆象刻於百工兆發乎靈蔡搢紳濟濟軒冕藹藹功與造化爭流德與二儀比大言未終公子蹶然而興曰鄙夫固陋守茲狂狷蓋理有毀之而爭寶之訟解言有怒之而齊王之疾痊向子誘我以聾耳之樂栖我以蔀家之屋田遊馳蕩利刃駿足既老氏之攸戒非吾人之所欲故靡得而應子至聞皇風載韙時聖道醇舉實為秋摛藻為春下有可封之人上有大哉之君余雖不敏請從後塵世以為工永嘉初復徵為黃門侍郎託疾不就終於家亢字季陽才藻不逮二昆亦有屬綴又解音樂伎術時人謂載協亢陸機雲曰二陸三張中興初過江拜散騎侍郎祕書監荀崧舉亢領佐著作郎出補烏程令入為散騎常侍復領佐著作述曆贊一篇見律曆志史臣曰孝若掞蔚春華時標麗藻覩其抵疑詮理本窮通於自天作誥敷文流英聲於孝悌旨深致遠殊有大雅之風烈焉安仁思緒雲騫詞鋒景煥前史儔於賈誼先達方之士衡賈論政範源王化之幽賾潘著哀詞貫人靈之情性機文喻海韞蓬山而育蕪岳藻如江濯美錦而增絢混三家以通校為二賢之亞匹矣然其挾彈盈果拜塵趨貴蔑棄倚門之訓乾沒不逞之間斯才也而有斯行也天之所賦何其駁歟正叔含咀藝文履危居正安其身而後動契其心而後言著論究人道之綱裁箴懸乘輿之鑒可謂玉質而金相者矣孟陽鏤石之文見奇於張敏濛汜之詠取重於傅玄為名流之所挹亦當代之文宗矣景陽摛光王府棣萼相輝洎乎二陸入洛三張減價考覈遺文非徒語也贊曰湛稱弄翰縟彩雕煥才高位卑往哲攸歎岳實含章藻思抑揚趨權冒勢終亦罹殃尼標雅性夙聞詞令載協飛芳棣華增映
