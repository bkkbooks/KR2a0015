body:
  text: 晉書卷六十二列傳第三十二劉琨子羣琨兄輿輿子演劉琨字越石中山魏昌人漢中山靖王勝之後也祖邁有經國之才為相國參軍散騎常侍父蕃清高沖儉位至光祿大夫琨少得俊朗之目與范陽祖納俱以雄豪著名年二十六為司隸從事時征虜將軍石崇河南金谷澗中有別廬冠絶時輩引致賓客日以賦詩琨預其間文詠頗為當時所許祕書監賈謐參管朝政京師人士無不傾心石崇歐陽建陸機陸雲之徒並以文才降節事謐琨兄弟亦在其間號曰二十四友太尉高密王泰辟為掾頻遷著作郎太學博士尚書郎趙王倫執政以琨為記室督轉從事中郎倫子荂即琨姊壻也故琨父子兄弟並為倫所委任及篡荂為皇太子琨為荂詹事三王之討倫也以琨為冠軍假節與孫秀子會率宿衛兵三萬距成都王穎戰于黃橋琨大敗而還焚河橋以自固及齊王冏輔政以其父兄皆有當世之望故特宥之拜兄輿為中書郎琨為尚書左丞轉司徒左長史冏敗范陽王虓鎮許昌引為司馬及惠帝幸長安東海王越謀迎大駕以琨父蕃為淮北護軍豫州刺史劉喬攻范陽王虓於許昌也琨與汝南太守杜育等率兵救之未至而虓敗琨與虓俱奔河北琨之父母遂為劉喬所執琨乃説冀州刺史溫羡使讓位于虓及虓領冀州遣琨詣幽州乞師於王浚得突騎八百人與虓濟河共破東平王楙於廩丘南走劉喬始得其父母又斬石超降呂朗因統諸軍奉迎大駕於長安以勳封廣武侯邑二千戶永嘉元年為并州刺史加振威將軍領胸奴中郎將琨在路上表曰臣以頑蔽志望有限因緣際會遂忝過任九月末得發道嶮山峻胡寇塞路輒以少擊衆冒險而進頓伏艱危辛苦備嘗即日達壺口關臣自涉州疆目覩困乏流移四散十不存二攜老扶弱不絶於路及其在者鬻賣妻子生相捐棄死亡委危白骨橫野哀呼之聲感傷和氣羣胡數萬周匝四山動足遇掠開目覩寇唯有壺關可得告糴而此二道九州之險數人當路則百夫不敢進公私往反沒喪者多嬰守窮城不得薪采耕牛既盡又乏田器以臣愚短當此至難憂如循環不遑寢食臣伏思此州雖云邊朔實邇皇畿南通河內東連司冀北捍殊俗西禦強虜是徑弓良馬勇士精鋭之所出也當須委輸乃全其命今上尚書請此州穀五百萬斛絹五百萬匹綿五百萬斤願陛下時出臣表速見聽處朝廷許之時東嬴公騰自晉陽鎮鄴并土飢荒百姓隨騰南下餘戶不滿二萬寇賊縱橫道路斷塞琨募得千餘人轉鬬至晉陽府寺焚毀僵尸蔽地其有存者飢羸無復人色荊棘成林豺狼滿道琨翦除荊棘收葬枯骸造府朝建市獄寇盜互來掩襲以城門為戰場百姓負楯以耕屬鞬而耨琨撫循勞徠甚得物情劉元海時在離石相去三百許里琨密遣離間其部雜虜降者萬餘落元海甚懼遂城蒲子而居之在官未期流人稍復雞犬之音復相接矣琨父蕃自洛赴之人士奔迸者多歸於琨琨善於懷撫而短於控御一日之中雖歸者數千去者亦以相繼然素奢豪嗜聲色雖暫自矯勵而輒復縱逸河南徐潤者以音律自通遊于貴勢琨甚愛之署為晉陽令潤恃寵驕恣干預琨政奮威護軍令狐盛性亢直數以此為諫并勸琨除潤琨不納初單于猗甫久以救東嬴公騰之功琨表其弟猗盧為代郡公與劉希合衆於中山王浚以琨侵己之地數來擊琨琨不能抗由是聲實稍損徐潤又譖令狐盛於琨曰盛將勸公稱帝矣琨不之察便殺之琨母曰汝不能弘經略駕豪傑專欲除勝己以自安當何以得濟如是禍必及我不從盛子泥奔于劉聰具言虛實聰大喜以泥為鄉導屬上黨太守襲醇降于聰雁門烏丸復反琨親率精兵出禦之聰遣子粲及令狐泥乘虛襲晉陽太原太守高喬以郡降聰琨父母並遇害琨引猗盧并力攻粲大敗之死者十五六琨乘勝追之更不能克猗盧以為聰未可滅遺琨牛羊車馬而去留其將箕淡段繁等戍晉陽琨志在復讎而屈於力弱泣血尸立撫慰傷痍移居陽邑城以招集亡散愍帝即位拜大將軍都督并州諸軍事加散騎常侍假節琨上疏謝曰陛下略臣大愆録臣小善猥蒙天恩光授殊寵顯以蟬冕之榮崇以上將之位伏省詔書五情飛越臣聞晉文以郤縠為元帥而定霸功高祖以韓信為大將而成王業咸有敦詩閲禮之德戎昭果毅之威故能振豐功於荊南拓洪基於河北況臣凡陋擬蹤前哲俯懼折鼎慮在覆餗昔曹沫三北而收功於柯盟馮異垂翅而奮翼於澠池皆能因敗為成以功補過陛下宥過之恩已隆而臣自新之善不立臣雖不逮預聞前訓恭讓之節臣猶庶幾所以冒承寵命者實欲沒身報國輒死自效要以致命寇場盡其臣節至於寵榮之施非言辭所謝又謁者史蘭殿中中郎王春等繼至奉詔臣俯尋聖旨伏紙飲淚臣聞夷險流行古今代有靈厭皇德曾未悔禍蟻狄縱毒於神州夷裔肆虐於上國七廟闕禋祀之饗百官喪彝倫之序梓宮淪辱山陵未兆率土永慕思同考妣陛下龍姿日茂睿質彌光升區宇於既穨崇社稷於已替四海之內肇有上下九服之萌復覩典制伏惟陛下蒙塵于外越在秦郊蒸嘗之敬在心桑梓之思未克臣備位歷年才質駑下丘山之釁已彰豪釐之效未著頃以時宜權假位號竟無殪戎之績而有負乘之纍當肆刑書以明黜陟是以臣前表上聞敢緣愚款乞奉先朝之班苟存偏師之職赦其三敗之愆收其一功之用得騁志虜場快意大逆雖身膏野草無恨黃墟陛下偏恩過隆曲蒙擢拔遂授上將位兼常伯征討之務得從事宜拜命驚惶五情戰悸懼於隕越以為朝羞昔申胥不徇伯舉而成公壻之勳伍員不從城父而濟入郢之庸臣雖頑凶無覬古人其於被堅執鋭致身寇讎所謂天地之施羣生莫謝不勝受恩至深謹拜表陳聞及麴允敗劉曜斬趙冉琨又表曰逆胡劉聰敢率犬羊馮陵輦轂人神發憤遐邇奮怒伏省詔書相國南陽王保太尉涼州刺史軌糾合二州同恤王室冠軍將軍允護軍將軍綝總齊六軍勠力國難王旅大捷俘馘千計旌旗首於晉路金鼓振於河曲崤函無虔劉之警汧隴有安業之慶斯誠宗廟社稷陛下神武之所致含氣之類莫不引領況臣之心能無踊躍臣前表當與鮮卑猗盧剋今年三月都會平陽會胸羯石勒以三月三日徑掩薊城大司馬博陵公浚受其偽和為勒所虜勒勢轉盛欲來襲臣城塢駭懼志在自守又猗盧國內欲生姦謀幸盧警慮尋皆誅滅遂使南北顧慮用愆成舉臣所以泣血宵吟扼腕長歎者也勒據襄國與臣隔山寇騎朝發夕及臣城同惡相求其徒實繁自東北八州勒滅其七先朝所授存者唯臣是以勒朝夕謀慮以圖臣為計窺伺間隙寇抄相尋戎士不得解甲百姓不得在野天網雖張靈澤未及唯臣孑然與寇為伍自守則稽聰之誅進討則勒襲其後進退唯谷首尾狼狽徒懷憤踊力不從願慚怖征營痛心疾首形留所在神馳寇庭秋穀既登胡馬已肥前鋒諸軍並有至者臣當首啓戎行身先士卒臣與二虜勢不並立聰勒不梟臣無歸志庶憑陛下威靈使微意獲展然後隕首謝國沒而無恨三年帝遣兼大鴻臚趙廉持節拜琨為司空都督并冀幽三州諸軍事琨上表讓司空受都督剋期與猗盧討劉聰尋猗盧父子相圖盧及兄子根皆病死部落四散琨子遵先質於盧衆皆附之及是遵與箕淡等帥盧衆三萬人馬牛羊十萬悉來歸琨琨由是復振率數百騎自平城撫納之屬石勒攻樂平太守韓據請救於琨而琨自以士衆新合欲因其鋭以威勒箕淡諫曰此雖晉人久在荒裔未習恩信難以法御今內收鮮卑之餘穀外抄殘胡之牛羊且閉關守險務農息士既服化感義然後用之則功可立也琨不從悉發其衆命淡領步騎二萬為前驅琨自為後繼勒先據險要設伏以擊淡大敗之一軍皆沒并土震駭尋又炎旱琨窮蹙不能復守幽州刺史鮮卑段匹磾數遣信要琨欲與同奬王室琨由是率衆赴之從飛狐入薊匹磾見之甚相崇重與琨結婚約為兄弟是時西都不守元帝稱制江左琨乃令長史溫嶠勸進於是河朔征鎮夷夏一百八十人連名上表語在元紀令報曰豺狼肆毒荐覆社稷億兆顒顒延首罔繫是以居于王位以答天下庶以克復聖主掃蕩讎恥豈可猥當隆極此孤之至誠著於遐邇者也公受奕世之寵極人臣之位忠允義誠精感天地實賴遠謀共濟艱難南北迥邈同契一致萬里之外心存咫尺公其撫寧華戎致罰醜類動靜以聞建武元年琨與匹磾期討石勒匹磾推琨為大都督喢血載書檄諸方守俱集襄國琨匹磾進屯固安以俟衆軍匹磾從弟末波納勒厚賂獨不進乃沮其計琨匹磾以勢弱而退是歲元帝轉琨為侍中太尉其餘如故并贈名刀琨答曰謹當躬自執佩馘截二虜匹磾奔其兄喪琨遣世子羣送之而末波率衆要擊匹磾而敗走之羣為末波所得末波厚禮之許以琨為幽州刺史共結盟而襲匹磾密遣使齎羣書請琨為內應而為匹磾邏騎所得時琨別屯故征北府小城不之知也因來見匹磾匹磾以羣書示琨曰意亦不疑公是以白公耳琨曰與公同盟志奬王室仰憑威力庶雪國家之恥若兒書密達亦終不以一子之故負公忘義也匹磾雅重琨初無害琨志將聽還屯其中弟叔軍好學有智謀為匹磾所信謂匹磾曰吾胡夷耳所以能服晉人者畏吾衆也今我骨肉構禍是其良圖之日若有奉琨以起吾族盡矣匹磾遂留琨琨之庶長子遵懼誅與琨左長史楊橋并州治中如綏閉門自守匹磾諭之不得因縱兵攻之琨將龍季猛迫於乏食遂斬橋綏而降初琨之去晉陽也慮及危亡而大恥不雪亦知夷狄難以義伏冀輸寫至誠僥幸萬一每見將佐發言慷慨悲其道窮欲率部曲死於賊壘斯謀未果竟為匹磾所拘自知必死神色怡如也為五言詩贈其別駕盧諶曰握中有懸璧本是荊山球惟彼太公望昔是渭濱叟鄧生何感激千里來相求白登幸曲逆鴻門賴留侯重耳憑五賢小白相射鉤能隆二伯主安問黨與讎中夜撫枕歎想與數子遊吾衰久矣夫何其不夢周誰云聖達節知命故無憂宣尼悲獲麟西狩泣孔丘功業未及建夕陽忽西流時哉不我與去矣如雲浮朱實隕徑風繁英落素秋狹路傾華蓋駭駟摧雙輈何意百鍊剛化為繞指柔琨詩託意非常攄暢幽憤遠想張陳感鴻門白登之事用以激諶諶素無奇略以常詞酬和殊乖琨心重以詩贈之乃謂琨曰前篇帝王大志非人臣所言矣然琨既忠於晉室素有重望被拘經月遠近憤歎匹磾所署代郡太守辟閭嵩與琨所署雁門太守王據後將軍韓據連謀密作攻具欲以襲匹磾而韓據女為匹磾兒妾聞其謀而告之匹磾於是執王據辟閭嵩及其徒黨悉誅之會王敦密使匹磾殺琨匹磾又懼衆反己遂稱有詔收琨初琨聞敦使至謂其子曰處仲使來而不我告是殺我也死生有命但恨讎恥不雪無以下見二親耳因歔欷不能自勝匹磾遂縊之時年四十八子姪四人俱被害朝廷以匹磾尚強當為國討石勒不舉琨哀三年琨故從事中郎盧諶崔悅等上表理琨曰臣聞經國之體在於崇明典刑立政之務在於固慎關塞況方嶽之臣殺生之柄而可不正其枉直以杜其姦邪哉竊見故司空廣武侯琨在惠帝擾攘之際值羣后鼎沸之難勠力皇家義誠彌厲躬統華夷親受矢石石超授首呂朗面縛社稷克寧鑾輿反駕奉迎之勳琨實為隆此琨效忠之一驗也其後并州刺史東嬴公騰以晉川荒匱移鎮臨漳太原西河盡徙三魏琨受任并州屬承其弊到官之日遺戶無幾當易危之勢處難濟之土鳩集傷痍撫和戎狄數年之間公私漸振會京都失守羣逆縱逸邊萌頓仆苟懷宴安咸以為并州之地四塞為固且可閉關守險畜資養徒抗辭厲聲忠亮奮發以為天子沈辱而不隕身死節情非所安遂乃跋履山川東西征討屠各乘虛晉陽沮潰琨父母罹屠戮之殃門族受殲夷之禍向使琨從州人之心為自守之計則聖朝未必加誅而族黨可以不喪及猗盧敗亂晉人歸奔琨於平城納其初附將軍箕淡又以為此雖晉人久在荒裔難以法整不可便用琨又讓之義形於色假從淡議偷於苟存則晏然於并土必不亡身於燕薊也琨自以備位方嶽綱維不舉無緣虛荷大任坐居三司是以陛下登阼便引愆告遜前後章表具陳誠款尋令從事中郎臣續淡以章綬節傳奉還本朝與匹磾使榮邵期一時俱發又匹磾以琨王室大臣懼奪己威重忌琨之形漸彰於外琨知其如此慮不可久欲遣妻息大小盡詣京城以其門室一委陛下有征舉之會則身充一卒若匹磾縱凶慝則妻息可免具令臣淡密宣此旨求詔敕路次令相迎衛會王成從平陽逃來説南陽王保稱號隴右士衆甚盛當移關中匹磾聞此私懷顧望留停榮邵欲遣前兼鴻臚邊邈奉使詣保懼淡獨南言其此事遂不許引路丹誠赤心卒不上達匹磾兄眷喪亡嗣子幼弱欲因奔喪奪取其國又自以欺國陵家懷邪樂禍恐父母宗黨不容其罪是以卷甲櫜弓陰圖作亂欲害其從叔驎從弟末波等以取其國匹磾親信密告驎波驎波乃遣人距之匹磾僅以身免百姓謂匹磾已沒皆憑向琨若琨于時有害匹磾之情則居然可擒不復勞於人力自此之後上下並離匹磾遂欲盡勒胡晉徙居上谷琨深不然之勸移厭次南憑朝廷匹磾不能納反禍害父息四人從兄二息同時并命琨未遇害知匹磾必有禍心語臣等云受國厚恩不能克報雖才略不及亦由遇此厄運人誰不死死生命也唯恨下不能效節於一方上不得歸誠於陛下辭旨慷慨動於左右匹磾既害琨橫加誣謗言琨欲窺神器謀圖不軌琨免述囂頑凶之思又無信布懼誅之情踦飳亂亡之際夾肩異類之間而有如此之心哉雖臧獲之愚厮養之智猶不為之況在國士之列忠節先著者乎匹磾之害琨稱陛下密詔琨信有罪陛下加誅自當肆諸市朝與衆棄之不令殊俗之豎戮台輔之臣亦已明矣然則擅詔有罪雖小必誅矯制有功雖大不論正以興替之根咸在於此開塞之由不可不閉故也而匹磾無所顧忌怙亂專殺虛假王命虐害鼎臣辱諸夏之望敗王室之法是可忍也孰不可忍若聖朝猶加隱忍未明大體則不逞之人襲匹磾之迹殺生自由好惡任意陛下將何以誅之哉折衝厭難唯存戰勝之將除暴討亂必須知略之臣故古語云山有猛獸藜藿為之不採非虛言矣自河以北幽并以南醜類有所顧憚者唯琨而已琨受害之後羣凶欣欣莫不得意鼓行中州曾無纖介此又華夷小大所以長歎者也伏惟陛下睿聖之隆中興之緒方將平章典刑以經序萬國而琨受害非所冤痛已甚未聞朝廷有以甄論昔壺關三老訟衛太子之罪谷永劉向辨陳湯之功下足以明功罪之分上足以悟聖主之懷臣等祖考以來世受殊遇入侍翠幄出簪彤管弗克負荷播越遐荒與琨周旋接事終始是以仰慕三臣在昔之義謹陳本末冒以上聞仰希聖朝曲賜哀察太子中庶子溫嶠又上疏理之帝乃下詔曰故太尉廣武侯劉琨忠亮開濟乃誠王家不幸遭難志節不遂朕甚悼之往以戎事未加弔祭其下幽州便依舊弔祭贈侍中太尉諡曰愍琨少負志氣有縱橫之才善交勝己而頗浮誇與范陽祖逖為友聞逖被用與親故書曰吾枕戈待旦志梟逆虜常恐祖生先吾著鞭其意氣相期如此在晉陽嘗為胡騎所圍數重城中窘迫無計琨乃乘月登樓清嘯賊聞之皆悽然長歎中夜奏胡笳賊又流涕歔欷有懷土之切向曉復吹之賊並棄圍而走子羣嗣羣字公度少拜廣武侯世子隨父在晉陽遭逢寇亂數領偏軍征討性清慎有裁斷得士類歡心及琨為匹磾所害琨從事中郎盧諶等率餘衆奉羣依末波溫嶠前後表稱姨弟劉羣內弟崔悅盧諶等皆在末波中翹首南望愚謂此等並有文思於人之中少可愍惜如蒙録召繼絶興亡則陛下更生之恩望古無二咸康二年成帝詔徵羣等為末波兄弟愛其才託以道險不遣石季龍滅遼西羣及諶悅同沒胡中季龍皆優禮之以羣為中書令至冉閔敗後羣遇害時勒及季龍得公卿人士多殺之其見擢用終至大官者唯有河東裴憲渤海石璞滎陽鄭系潁川荀綽北地傅暢及羣悅諶等十餘人而已輿字慶孫俊朗有才局與琨並尚書郭奕之甥名著當時京都為之語曰洛中奕奕慶孫越石辟宰府尚書郎兄弟素侮孫秀及趙王倫輔政孫秀執權並免其官妹適倫世子荂荂與秀不協復以輿為散騎侍郎齊王冏輔政以輿為中書侍郎東海王越范陽王虓之舉兵也以輿為潁川太守及河間王顒檄劉喬討虓於許昌矯詔曰潁川太守劉輿迫脅范陽王虓距逆詔命多樹私黨擅劫郡縣合聚兵衆輿兄弟昔因趙王婚親擅弄權勢凶狡無道久應誅夷以遇赦令得全首領小人不忌為惡日滋輒用苟晞為兗州斷截王命鎮南大將軍弘平南將軍彭城王釋征東大將軍準各勒所領徑會許昌與喬并力今遣右將軍張方為大都督督建威將軍呂朗陽平太守刁默率步騎十萬同會許昌以除輿兄弟敢有舉兵距違王命誅及五族能殺輿兄弟送首者封三千戶縣侯賜絹五千匹虓之敗輿與之俱奔河北虓既鎮鄴以輿為征虜將軍魏郡太守虓薨東海王越將召之或曰輿猶膩也近則樜人及至越疑而御之輿密視天下兵簿及倉庫牛馬器械水陸之形皆默識之是時軍國多事每會議自潘滔以下莫知所對輿既見越應機辨畫越傾膝酬接即以為左長史越既總録以輿為上佐賓客滿筵文案盈機遠近書記日有數千終日不倦或以夜繼之皆人人歡暢莫不悅附命議如流酬對款備時人服其能比之陳遵時稱越府有三才潘滔大才劉輿長才裴邈清才越誅繆播王延等皆輿謀也延愛妾荊氏有音伎延尚未殮輿便娉之未及迎又為太傅從事中郎王俊所爭奪御史中丞傅宣劾奏越不問輿而免俊官輿乃説越遣琨鎮并州為越北面之重洛陽未敗病指疽卒時年四十七追贈驃騎將軍先有功封定襄侯諡曰貞子演嗣演字始仁初辟太尉掾除尚書郎以父憂去職服闋襲爵太傅東海王越引為主簿遷太子中庶子出為陽平太守自洛奔琨琨以為輔國將軍魏郡太守琨將討石勒以演領勇士千人行北中郎將兗州刺史鎮廩丘演斬王桑走趙固得衆七千人為石勒所攻演距戰勒退元帝拜為都督後將軍假節後為石季龍所圍求救於邵續段鴦鴦騎救之季龍走隨鴦屯厭次被害弟胤為琨引兵路逢烏桓賊戰沒胤弟挹初為太傅東海王越掾與琨俱被害挹弟啓啓弟述與琨子羣俱在末波中後並入石季龍啓為季龍尚書僕射後歸國穆帝拜為前將軍加給事中永和九年隨中軍將軍殷浩北伐為姚襄所敗啓戰沒述為季龍侍中隨啓歸國拜驍騎將軍祖逖兄納祖逖字士稚范陽遒人也世吏二千石為北州舊姓父武晉王掾上谷太守逖少孤兄弟六人兄該納等並開爽有才幹逖性豁蕩不修儀檢年十四五猶未知書諸兄每憂之然輕財好俠慷慨有節尚每至田舍輒稱兄意散穀帛以賙貧乏鄉黨宗族以是重之後乃博覽書記該涉古今往來京師見者謂逖有贊世才具僑居陽平年二十四陽平辟察孝廉司隸再辟舉秀才皆不行與司空劉琨俱為司州主簿情好綢繆共被同寢中夜聞荒雞鳴蹴琨覺曰此非惡聲也因起舞逖琨並有英氣每語世事或中宵起坐相謂曰若四海鼎沸豪傑並起吾與足下當相避于中原耳辟齊王冏大司馬掾長沙王乂驃騎祭酒轉主簿纍遷太子中舍人豫章王從事中郎從惠帝北伐王師敗績於蕩陰遂退還洛大駕西幸長安關東諸侯范陽王虓高密王略平昌公模等競召之皆不就東海王越以逖為典兵參軍濟陰太守母喪不之官及京師大亂逖率親黨數百家避地淮泗以所乘車馬載同行老疾躬自徒步藥物衣糧與衆共之又多權略是以少長咸宗之推逖為行主達泗口元帝逆用為徐州刺史尋徵軍咨祭酒居丹徒之京口逖以社稷傾覆常懷振之志賓客義徒皆暴桀勇士逖遇之如子弟時揚土大飢此輩多為盜竊攻剽富室逖撫慰問之曰比復南塘一出不或為吏所繩逖輒擁護救解之談者以此少逖然自若也時帝方拓定江南未遑北伐逖進説曰晉室之亂非上無道而下怨叛也由藩王爭權自相誅滅遂使戎狄乘隙毒流中原今遺黎既被殘酷人有奮擊之志大王誠能發威命將使若逖等為之統主則郡國豪傑必因風向赴沈溺之士欣於來蘇庶幾國恥可雪願大王圖之帝乃以逖為奮威將軍豫州刺史給千人釰布三千匹不給鎧仗使自招募仍將本流徙部曲百餘家渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江辭色壯烈衆皆慨歎屯于江陰起冶鑄兵器得二千餘人而後進初北中郎將劉演距于石勒也流人塢主張平樊雅等在譙演署平為豫州刺史雅為譙郡太守又有董瞻于武謝浮等十餘部衆各數百皆統屬平逖誘浮使取平浮譎平與會遂斬以獻逖帝嘉逖勳使運糧給之而道遠不至軍中大飢進據太丘樊雅遣衆夜襲逖遂入壘拔戟大呼直趣逖幕軍士大亂逖命左右距之督護董昭與賊戰走之逖率衆追討而張平餘衆助雅攻逖蓬陂塢主陳川自號寧朔將軍陳留太守逖遣使求救於川川遣將李頭率衆援之逖遂克譙城初樊雅之據譙也逖以力弱求助於南中郎將王含含遣桓宣領兵助逖逖既克譙宣等乃去石季龍聞而引衆圍譙含又遣宣救逖季龍聞宣至而退宣遂留助逖討諸屯塢未附者李頭之討樊雅也力戰有勳逖時獲雅駿馬頭甚欲之而不敢言逖知其意遂與之頭感逖恩遇每歎曰若得此人為主吾死無恨川聞而怒遂殺頭頭親黨馮寵率其屬四百人歸于逖川益怒遣將魏碩掠豫州諸郡大獲子女車馬逖遣將軍衛策邀擊於谷水盡獲所掠者皆令歸本軍無私焉川大懼遂以衆附石勒逖率衆伐川石季龍領兵五萬救川逖設奇以擊之季龍大敗收兵掠豫州徙陳川還襄國留桃豹等守川故城住西臺逖遣將韓潛等鎮東臺同一大城賊從南門出入放牧逖軍開東門相守四旬逖以布囊盛土如米狀使千餘人運上臺又令數人擔米偽為疲極而息于道賊果逐之皆棄擔而走賊既獲米謂逖士衆豐飽而胡戍飢久益懼無復膽氣石勒將劉夜堂以驢千頭運糧以饋桃豹逖遣韓潛馮鐵等追擊於汴水盡獲之豹宵遁退據東燕城逖使潛進屯封丘以逼之馮鐵據二臺逖鎮雍丘數遣軍要截石勒勒屯戍漸蹙候騎常獲濮陽人逖厚待遣歸咸感逖恩德率鄉里五百家降逖勒又遣精騎萬人距逖復為逖所破勒鎮戍歸附者甚多時趙固上官巳李矩郭默等各以詐力相攻擊逖遣使和解之示以禍福遂受逖節度逖愛人下士雖疏交賤隸皆恩禮遇之由是黃河以南盡為晉土河上堡固先有任子在胡者皆聽兩屬時遣遊軍偽抄之明其未附諸塢主感戴胡中有異謀輒密以聞前後克獲亦由此也其有微功賞不踰日躬自儉約勸督農桑克己務施不畜資産子弟耕耘負擔樵薪又收葬枯骨為之祭醊百姓感悅嘗置酒大會耆老中坐流涕曰吾等老矣更得父母死將何恨乃歌曰幸哉遺黎免俘虜三辰既朗遇慈父玄酒忘勞甘瓠脯何以詠恩歌且舞其得人心如此故劉琨與親故書盛贊逖威德詔進逖為鎮西將軍石勒不敢窺兵河南使成皋縣修逖母墓因與逖書求通使交市逖不報書而聽互市收利十倍於是公私豐贍士馬日滋方當推鋒越河掃清冀朔會朝廷將遣戴若思為都督逖以若思是吳人雖有才望無弘致遠識且已翦荊棘收河南地而若思雍容一旦來統之意甚怏怏且聞王敦與劉隗等構隙慮有內難大功不遂感激發病乃致妻孥汝南大木山下時中原士庶咸謂逖當進據武牢而反置家險厄或諫之不納逖雖內懷憂憤而圖進取不輟營繕武牢城城北臨黃河西接成皋四望甚遠逖恐南無堅壘必為賊所襲乃使從子汝南太守濟率汝陽太守張敞新蔡內史周閎率衆築壘未成而逖病甚先是華談庾闡問術人戴洋洋曰祖豫州九月當死初有妖星見於豫州之分歷陽陳訓又謂人曰今年西北大將當死逖亦見星曰為我矣方平河北而天欲殺我此乃不祐國也俄卒於雍丘時年五十六豫州士女若喪考妣譙梁百姓為之立祠册贈車騎將軍王敦久懷逆亂畏逖不敢發至是始得肆意焉尋以逖弟約代領其衆約別有傳逖兄納納字士言最有操行能清言文義可觀性至孝少孤貧常自炊爨以養母平北將軍王敦聞之遺其二婢辟為從事中郎有戲之曰奴價倍婢納曰百里奚何必輕於五羖皮邪轉尚書三公郎纍遷太子中庶子歷官多所駁正有補於時齊王冏建義趙王倫收冏弟北海王實及前黃門郎弘農董祚弟艾與冏俱起皆將害之納上疏救焉並見宥後為中護軍太子詹事封晉昌公以洛下將亂乃避地東南元帝作相引為軍咨祭酒納好奕王隱謂之曰禹惜寸陰不聞數對曰我亦忘憂耳隱曰蓋聞古人遭逢則以功達其道若其不遇則以言達其道古必有之今亦宜然當晉未有書而天下大亂舊事蕩滅君少長五都遊宦四方華裔成敗皆當聞見何不記述而有裁成應仲遠作風俗通崔子真作政論蔡伯喈作勸學篇史遊作急就章猶皆行於世便成沒而不朽僕雖無才非志不立故疾沒世而無聞焉所以自強不息也況國史明乎得失之迹俱取散愁此可兼濟何必圍然後忘憂也納喟然歎曰非不悅子之道力不足耳乃言之於帝曰自古小國猶有史官況於大府安可不置因舉隱稱清純亮直學思沈敏五經羣史多所綜悉且好學不倦從善如流若使修著一代之典褒貶與奪誠一時之俊也帝以問記室參軍鍾雅雅曰納所舉雖有史才而今未能立也事遂停然史官之立自納始也初弟約與逖同母偏相親愛納與約異母頗有不平乃密以啓帝稱約懷陵上之性抑而使之可也今顯侍左右假其權勢將為亂階人謂納與約異母忌其寵貴乃露其表以示約約憎納如讎朝廷因此棄納納既間居但清談披閲文史而已及約為逆朝野歎納有鑒裁焉溫嶠以納州里父黨敬而拜之嶠既為時用盛言納有名理除光祿大夫納嘗問梅陶曰君鄉里立月旦評何如陶曰善褒惡貶則佳法也納曰未益時王隱在坐因曰尚書稱三載考績三考黜陟幽明何得一月便行褒貶陶曰此官法也月旦私法也隱曰易稱積善之家必有餘慶積不善之家必有餘殃稱家者豈不是官必須積久善惡乃著公私何異古人有言貞良而亡先人之殃酷烈而存先人之勳纍世乃著豈但一月若必月旦則顏回食埃不免貪樜盜跖引少則為清廉朝種暮穫善惡未定矣時梅陶及鍾雅數説餘事納輒困之因曰君汝潁之士利如錐我幽冀之士鈍如槌持我鈍槌捶君利錐皆當摧矣陶雅並稱有神錐不可得槌納曰假有神錐必有神槌雅無以對卒於家史臣曰劉琨弱齡本無異操飛纓賈謐之館借箸馬倫之幕當于是日實佻巧之徒歟祖逖散穀周貧聞雞暗舞思中原之燎火幸天步之多艱原其素懷抑為貪亂者矣及金行中毀乾維失統三后流亡遞縈居彘之禍六戎橫噬交肆長蛇之毒於是素絲改色跅弛易情各運奇並騰英氣遇時屯而感激因世亂以驅馳陳力危邦犯疾風而表徑勵其貞操契寒松而立節咸能自致三鉉成名一時古人有言曰世亂識忠良蓋斯之謂矣天不祚晉方啓戎心越石區區獨禦鯨鯢之鋭推心異類竟終幽圄痛哉士稚叶迹中興克復九州之半而災星告釁笠轂徒招惜矣贊曰越石才雄臨危效忠枕戈長息投袂徼功踦飳汾晉契闊獯戎見欺段氏于嗟道窮祖生烈烈夙懷奇節扣楫中流誓清凶孽鄰醜景附遺萌載悅天妖是徵國恥奚雪
