body:
  text: 晉書卷五十列傳第二十曹志曹志字允恭譙國譙人魏陳思王植之孽子也少好學以才行稱夷簡有大度兼善騎射植曰此保家主也立以為嗣後改封濟北王武帝為撫軍將軍迎陳留王于鄴志夜謁見帝與語自暮達旦甚奇之及帝受禪降為鄄城縣公詔曰昔在前世雖曆運迭興至於先代苗裔傳祚不替或列藩九服式序王官選衆命賢惟德是與蓋至公之道也魏氏諸王公養德藏器壅滯曠久前雖有詔當須簡授而自頃衆職少缺未得式前濟北王曹志履德清純才高行潔好古博物為魏宗英朕甚嘉之其以志為樂平太守志在郡上書以為宜尊儒重道請為博士置吏卒遷章武趙郡太守雖纍郡職不以政事為意晝則遊獵夜誦詩書以聲色自娛當時見者未能審其量也咸寧初詔曰鄄城公曹志篤行履素達學通識宜在儒林以弘胄子之教其以志為散騎常侍國子博士帝嘗閲六代論問志曰是卿先王所作邪志對曰先王有手所作目録請歸尋按還奏曰按録無此帝曰誰作志曰以臣所聞是臣族父冏所作以先王文高名著欲令書傳于後是以假託帝曰古來亦多有是顧謂公卿曰父子證明足以為審自今已後可無復疑後遷祭酒齊王攸將之國下太常議崇錫文物時博士秦秀等以為齊王宜內匡朝政不可之藩志又常恨其父不得志於魏因愴然歎曰安有如此之才如此之親不得樹本助化而遠出海隅晉朝之隆其殆乎哉乃奏議曰伏聞大司馬齊王當出藩東夏備物盡禮同之二伯今陛下為聖君稷契為賢臣內有魯衛之親外有齊晉之輔坐而守安此萬世之基也古之夾輔王室同姓則周公其人也異姓則太公其人也皆身在內五世反葬後雖有五霸代興桓文譎主下有請隧之僭上有九錫之禮終於譎而不正驗於尾大不掉豈與召公之歌棠棣周詩之詠鴟梟同日論哉今聖朝創業之始始之不諒後事難工幹植不強枝葉不茂骨鯁不存皮膚不充自羲皇以來豈是一姓之獨有欲結其心者當有磐石之固夫欲享萬世之利者當與天下議之故天之聰明自我人之聰明秦魏欲獨擅其威而財得沒其身周漢能分其利而親疏為之用此自聖主之深慮日月之所照事雖淺當深謀之言雖輕當重思之志備位儒官若言不及禮是志寇竊知忠不言議所不敢志以為當如博士等議議成當上見其從弟高邑公嘉嘉曰兄議甚切百年之後必書晉史目下將見責邪帝覽議大怒曰曹志尚不明吾心況四海乎以議者不指答所問橫造異論策免太常鄭默於是有司奏收志等結罪詔惟免志官以公還第其餘皆付廷尉頃之志復為散騎常侍遭母憂居喪過禮因此篤病喜怒失常九年卒太常奏以惡諡崔褒歎曰魏顆不從亂以病為亂故也今諡曹志而諡其病豈謂其病不為亂乎於是諡為定庾峻子珉敳庾峻字山甫潁川鄢陵人也祖乘才學洽聞漢司徒辟有道徵皆不就伯父嶷中正簡素仕魏為太僕父道廉退貞固養志不仕牛馬有踶齧者恐傷人不貨於市及諸子貴賜拜太中大夫峻少好學有才思嘗遊京師聞魏散騎常侍蘇林老疾在家往候之林嘗就乘學見峻流涕良久曰尊祖高才而性退讓慈和泛愛清靜寡欲不營當世惟修德行而已鄢陵舊五六萬戶聞今裁有數百君二父孩抱經亂獨至今日尊伯為當世令器君兄弟復俊茂此尊祖積德之所由也歷郡功曹舉計掾州辟從事太常鄭袤見峻大奇之舉為博士時重莊老而輕經史峻懼雅道陵遲乃潛心儒典屬高貴鄉公幸太學問尚書義於峻峻援引師説發明經旨申暢疑滯對答詳悉遷祕書丞長安有大獄久不決拜峻侍御史往斷之朝野稱允武帝踐阼賜爵關中侯遷司空長史轉祕書監御史中丞拜侍中加諫議大夫常侍帝講詩中庶子何劭論風雅正變之義峻起難往反四坐莫能屈之是時風俗趣競禮讓陵遲峻上疏曰臣聞黎庶之性人衆而賢寡設官分職則官寡而賢衆為賢衆而多官則妨化以無官而棄賢則廢道是故聖王之御世也因人之性或出或處故有朝廷之士又有山林之士朝廷之士佐主成化猶人之有股肱心膂共為一體也山林之士被褐懷玉太上棲於丘園高節出於衆庶其次輕爵服遠恥辱以全志最下就列位惟無功而能知止彼其清劭足以抑貪汙退讓足以息鄙事故在朝之士聞其風而悅之將受爵者皆恥躬之不逮斯山林之士避寵之臣所以為美也先王嘉之節雖離世而德合於主行雖詭朝而功同於政故大者有玉帛之命其次有几杖之禮以厚德載物出處有地既廊廟多賢才而野人亦不失為君子此先王之弘也秦塞斯路利出一官雖有處士之名而無爵列於朝者商君謂之六蝎韓非謂之五蠹時不知德惟爵是聞故閭閻以公乘侮其鄉人郎中以上爵傲其父兄漢祖反之大暢斯否任蕭曹以天下重四晧於南山以張良之勳而班在叔孫之後蓋公之賤而曹相咨之以政帝王貴德於上俗亦反本於下故田叔等十人漢廷臣無能出其右者而未嘗干祿於時以釋之之貴結王生之襪於朝而其名愈重自非主臣尚德兼愛孰能通天下之志如此其大者乎夫不革百王之弊徒務救世之政文士競智而務入武夫恃力而爭先官高矣而意未滿功報矣其求不已又國無隨才任官之制俗無難進易退之恥位一高雖無功而不見下已負敗而後見用故因前而升則處士之路塞矣又仕者黜陟無章是以普天之下先競而後讓舉世之士有進而無退大人溺於動俗執政撓於羣言衡石為之失平清濁安可復分昔者先王患向之所以取天下者今之為弊是故功成必改其物業定必易其教雖以爵祿使下臣無貪陵之行雖以甲兵定功主無窮武之悔也臣愚以為古者大夫七十懸車今自非元功國老三司上才可聽七十致仕則士無懷祿之嫌矣其父母八十可聽終養則孝莫大於事親矣吏歷試無績依古終身不仕則官無秕政矣能小而不能大可降還涖小則使人以器矣人主進人以禮退人以禮人臣亦量能受爵矣其有孝如王陽臨九折而去官潔如貢禹冠一免而不著及知止如王孫知足如疏廣雖去列位而居東野與人父言依於慈與人子言依於孝此其出言合於國檢危行彰於本朝去勢如脫屣路人為之隕涕辭寵如金石庸夫為之興行是故先王許之而聖人貴之夫人之性陵上猶水之趣下也益而不已必決升而不已必困始於匹夫行義不敦終於皇輿為之敗績固不可不慎也下人并心進趣上宜以退讓去其甚者退讓不可以刑罰使莫若聽朝士時時從志山林往往間出無使入者不能復出往者不能復反然後出處交泰提衡而立時靡有爭天下可得而化矣又疾世浮華不修名實著論以非之文繁不載九年卒詔賜朝服一具衣一襲錢三十萬臨終敕子珉朝卒夕殯幅巾布衣葬勿擇日珉奉遵遺命斂以時服二子珉敳珉字子琚性淳和好學行己忠恕少歷散騎常侍本國中正侍中封長岑男懷帝之沒劉元海也珉從在平陽元海大會因使帝行酒珉不勝悲憤再拜上酒因大號哭賊惡之會有告珉及王俊等謀應劉琨者元海因圖弒逆珉等並遇害初洛陽之未陷也珉為侍中直于省內謂同僚許遐曰世路如此禍難將及吾當死乎此屋耳及是竟不免焉太元末追諡曰貞敳字子嵩長不滿七尺而腰帶十圍雅有遠韻為陳留相未嘗以事嬰心從容酣暢寄通而已處衆人中居然獨立嘗讀老莊曰正與人意暗同太尉王衍雅重之敳見王室多難終知嬰禍乃著意賦以豁情猶賈誼之服鳥也其詞曰至理歸於渾一兮榮辱固亦同貫存亡既已均齊兮正盡死復何歎物咸定於無初兮俟時至而後驗若四節之素代兮豈當今之得遠且安有壽之與夭兮或者情橫多戀宗統竟初不別兮大德亡其情願蠢動皆神之為兮癡聖惟質所建真人都遣穢纍兮性茫蕩而無岸縱驅於遼廓之庭兮委體乎寂寥之天地短於朝生兮億代促於始旦顧瞻宇宙微細兮眇若豪鋒之半飄颻玄曠之域兮深漠暢而靡玩兀與自然并體兮融液忽而四散從子亮見賦問曰若有意也非賦所盡若無意也復何所賦答曰在有無之間耳遷吏部郎是時天下多故機變屢起敳常靜默無為參東海王越太傅軍事轉軍咨祭酒時越府多雋異敳在其中常自袖手豫州牧長史河南郭象善老莊時人以為王弼之亞敳甚知之每曰郭子玄何必減庾子嵩象後為太傅主簿任事專勢敳謂象曰卿自是當世大才我疇昔之意都已盡矣敳有重名為搢紳所推而聚斂積實談者譏之都官從事溫嶠奏之敳更器嶠目嶠森森如千丈松雖礧砢多節施之大廈有棟梁之用時劉輿見任於越人士多為所構惟敳縱心事外無迹可間後以其性儉家富説越令就換錢千萬冀其有吝因此可乘越於衆坐中問於敳而敳乃穨然已醉幘墮機上以頭就穿取徐答云下官家有二千萬隨公所取矣輿於是乃服越甚悅因曰不可以小人之慮度君子之心王衍不與敳交敳卿之不置衍曰君不得為耳敳曰卿自君我我自卿卿我自用我家法卿自用卿家法衍甚奇之石勒之亂與衍俱被害時年五十郭象郭象字子玄少有才理好老莊能清言太尉王衍每云聽象語如懸河瀉水注而不竭州郡辟召不就常間居以文論自娛後辟司徒掾稍至黃門侍郎東海王越引為太傅主簿甚見親委遂任職當權熏灼內外由是素論去之永嘉末病卒著碑論十二篇先是注莊子者數十家莫能究其旨統向秀於舊注外而為解義妙演奇致大暢玄風惟秋水至樂二篇未竟而秀卒秀子幼其義零落然頗有別本遷流象為人行薄以秀義不傳於世遂竊以為己注乃自注秋水至樂二篇又易馬蹄一篇其餘衆篇或點定文句而已其後秀義別本出故今有向郭二莊其義一也庾純子敷庾純字謀甫博學有才義為世儒宗郡補主簿仍參征南府纍遷黃門侍郎封關內侯歷中書令河南尹初純以賈充姦佞與任愷共舉充西鎮關中充由是不平充嘗宴朝士而純後至充謂曰君行常居人前今何以在後純曰旦有小市井事不了是以來後世言純之先嘗有伍伯者充之先有市魁者充純以此相譏焉充自以位隆望重意殊不平及純行酒充不時飲純曰長者為壽何敢爾乎充曰父老不歸供養將何言也純因發怒曰賈充天下凶凶由爾一人充曰充輔佐二世蕩平巴蜀有何罪而天下為之凶凶純曰高貴鄉公何在衆坐因罷充左右欲執純中護軍羊琇侍中王濟佑之因得出充慚怒上表解職純懼上河南尹關內侯印綬上表自劾曰司空公賈充請諸卿校并及臣臣不自量飲酒過多醉亂行酒重酌於公公不肯飲言語往來公遂訶臣父老不歸供養卿為無天地臣不服罪自引而更忿怒厲聲名公臨時喧譊遂至荒越禮八十月制誠以衰老之年變難無常也臣不惟生育之恩求養老父而懷祿貪榮烏鳥之不若充為三公論道興化以教義責臣是也而以枉錯直居下犯上醉酒迷荒昏亂儀度臣得以凡才擢授顯任易戒濡首論誨酒困而臣聞義不服過言盈庭黷慢台司違犯憲度不可以訓請臺免臣官廷尉結罪大鴻臚削爵土敕身不謹伏須罪誅御史中丞孔恂劾純請免官詔曰先王崇尊卑之禮明貴賤之序著溫克之德記沈酗之禍所以光宣道化示人軌儀也昔廣漢陵慢宰相獲犯上之刑灌夫託醉肆忿致誅斃之罪純以凡才備位卿尹不惟謙敬之節不忌覆車之戒陵上無禮悖言自口宜加顯黜以肅朝倫遂免純官又以純父老不求供養使據禮典正其臧否太傅何曾太尉荀顗驃騎將軍齊王攸議曰凡斷正臧否宜先稽之禮律八十者一子不從政九十者其家不從政新令亦如之按純父年八十一兄弟六人三人在家不廢侍養純不求供養其於禮律未有違也司空公以純備位卿尹望其有加於人而純荒醉肆其忿怒臣以為純不遠布孝至之行而近習常人之失應在譏貶司徒石苞議純榮官忘親惡聞格言不忠不孝宜除名削爵土司徒西曹掾劉斌議以為敦風俗以人倫為先人倫之教以忠孝為主忠故不忘其君孝故不忘其親若孝必專心於色養則明君不得而臣忠必不顧其親則父母不得而子也是以為臣者必以義斷其恩為子也必以情割其義在朝則從君之命在家則隨父之制然後君父兩濟忠孝各序純兄峻以父老求歸峻若得歸純無不歸之勢峻不得歸純無得歸之理純雖自聞同不見聽近遼東太守孫和廣漢太守鄧良皆有老母良無兄弟授之遠郡辛苦自歸皆不見聽且純近為京尹父在界內時得自啓定省獨於禮法外處其貶黜斌愚以為非理也禮年八十一子不從政純有二弟在家不為違禮又令年九十乃聽悉歸今純父實未九十不為犯令罵辱宰相宜加放斥以明國典聖恩愷悌示加貶退臣愚無所清議河南功曹史龐札等表曰臣郡前尹關內侯純醉酒失常戊申詔書既免尹官以父篤老不求供養下五府依禮典正其臧否臣謹按三王養老之制八十一子不從政九十其家不從政斯誠使人無闕孝養之道為臣不違在公之節也先王制禮垂訓莫尚於周當其時也姬公留周伯禽之魯孝子不匱典禮無愆今公府議七十時制八十月制欲以駁奪從政之限削除爵土是為公旦立法還自越之魯侯為子即為罰首也石奮期頤四子列郡近太宰獻王諸子亦在藩外古今同符忠孝並濟臣聞悔吝之疵君子有之尹性少飲多遂至沈醉尹醒聞知悼恨前失執謙引罪深自奏劾求入重法今公府不原所由而謂傲很是為重罪過醉之言而沒迷復之義也臣聞父子天性愛由自然君臣之交出自義合而求忠臣必於孝子是以先王立禮敬同於父原始要終齊於所生如此猶患人臣罕能致身今公府議云禮律雖有常限至於疾病歸養不奪其志如此則為禮禁正直而陷人以詐違越王制開其殆原尹少履清苦事親色養歷職內外公廉無私此陛下之所以屢發明詔而尹之所以仍見擢授也尹行己也恭率下也敬先衆後己實是宿心一旦由醉責以暴慢按奏狀不忠不孝羣公建議削除爵土此愚臣所以自悲自悼拊心泣血也按今父母年過八十聽令其子不給限外職誠以得有歸來之緣今尹居在郡內前每表屢蒙定省尹昆弟六人三人在家孝養不廢兄侍中峻家之嫡長往比自表求歸供養詔喻不聽國體法同兄弟無異而虛責尹不求供養如斯臣懼長假飾之名而損忠誠之實也夫禮者所以經國家定社稷也故陶唐之隆順考古典周成之美率由舊章伏惟陛下聖德欽明敦禮崇教疇咨四嶽以詳典制尹以犯違受黜而所由者醉公以教義見責而所因者忿積忿以立義由醉以得罪禮律不復為斷文致欲以成法是以愚臣敢冒死亡之誅而恥不伸於盛明之世惟蒙哀察帝復下詔曰自中世以來多為貴重順意賤者生情故令釋之定國得揚名於前世今議責庾純不惟溫克醉酒沈湎此責人以齊聖也疑賈公亦醉若其不醉終不於百客之中責以不去官供養也大晉依聖人典禮制臣子出處之宜若有八十皆當歸養亦不獨純也古人云由醉之言俾出童羖明不責醉恐失度也所以免純者當為將來之醉戒耳齊王劉掾議當矣復以純為國子祭酒加散騎常侍後將軍荀眅於朝會中奏純以前坐不孝免黜不宜升進侍中甄德進曰孝以顯親為大祿養為榮詔赦純前愆擢為近侍兼掌教官此純召不俟駕之日而後將軍眅敢以私議貶奪公論抗言矯情誣罔朝廷宜加貶黜眅坐免官初眅與純俱為大將軍所辟眅整麗車服純率素而已眅以為愧恨至是毀純眅既免黜純更以此愧之亟往慰勉之時人稱純通恕遷侍中以父憂去官起為御史中丞轉尚書除魏郡太守不之官拜少府年六十四卒子敷敷字允臧少有清節歷位博士齊王攸之就國也下禮官議崇錫之物敷與博士太叔廣劉暾繆蔚郭頤秦秀傅珍等上表諫曰書稱帝堯克明俊德以親九族武王光有天下兄弟之國十有六人同姓之國四十人元勳睦親顯以殊禮而魯衛齊晉大啓土宇並受分器所謂惟善所在親疏一也大晉龍興隆唐周之遠迹王室親屬佐命功臣咸受爵土而四海安今吳會已平詔大司馬齊王出統方嶽當遂撫其國家將準古典以垂永制昔周之選建明德以左右王室也則周公為太宰康叔為司寇聃季為司空及召芮畢毛諸國皆入居公卿大夫之位明股肱之任重守地之位輕也未聞古典以三事之重出之國者漢氏諸侯王位尊勢重在丞相三公上其入讚朝政者乃有兼官其出之國亦不復假台司虛名為隆寵也昔申無宇曰五大不在邊先儒以為貴寵公子公孫纍世正卿也又曰五細不在庭先儒以為賤妨貴少陵長遠間親新間舊小加大也不在庭不在朝廷為政也又曰親不在外羇不在內今棄疾在外鄭丹在內君其少戒之叔向有言公室將卑其枝葉先落公族公室之本而去之諺所謂芘焉而縱尋斧柯者也今使齊王賢邪則不宜以母弟之親尊居魯衛之常職不賢邪不宜大啓土宇表建東海也古禮三公無職坐而論道不聞以方任嬰之惟周室大壞宣王中興四夷交侵救急朝夕然後命召穆公征淮夷故其詩曰徐方不回王曰旋歸宰相不得久在外也今天下已定六合為家將數延三事與論太平之基而更出之去王城二千里違舊章矣敷草議先以呈父純純不禁太常鄭默博士祭酒曹志並過其事武帝以博士不答所問答所不問大怒事下有司尚書朱整褚祀等奏敷等侵官離局迷罔朝廷崇飾惡言假託無諱請收敷等八人付廷尉科罪敷父純詣廷尉自首敷以議草見示愚淺聽之詔免純罪廷尉劉頌又奏敷等大不敬棄市論求平議尚書又奏請報聽廷尉行刑尚書夏侯駿謂朱整曰國家乃欲誅諫臣官立八座正為此時卿可共駁正之整不從駿怒起曰非所望也乃獨為駁議左僕射魏舒右僕射下邳王晃等從駿議奏留中七日乃詔曰敷等備為儒官不念奉憲制不指答所問敢肆其誣罔之言以干亂視聽而敷是議主應為戮首但敷及家人並自首大信不可奪秦秀傅珍前者虛妄幸而得免復不以為懼當加罪戮以彰凶慝猶復不忍皆丐其死命秀珍敷等並除名後數歲復起為散騎侍郎終于國子祭酒秦秀秦秀字玄良新興雲中人也父朗魏驍騎將軍秀少敦學行以忠直知名咸寧中為博士何曾卒下禮官議諡秀議曰故太宰何曾雖階世族之胤而少以高亮嚴肅顯登王朝事親有色養之名在官奏科尹模此二者實得臣子事上之概然資性驕奢不循軌則詩云節彼南山惟石巖巖赫赫師尹人具爾瞻言其德行高峻動必以禮耳丘明有言儉德之恭侈惡之大也大晉受命勞謙隱約曾受寵二代顯赫纍世暨乎耳順之年身兼三公之位食大國之租荷保傅之貴執司徒之均二子皆金貂卿校列于帝側方之古人責深負重雖舉門盡死猶不稱位而乃驕奢過度名被九域行不履道而享位非常以古義言之非惟失輔相之宜違斷金之利也穢皇代之美壞人倫之教生天下之醜示後生之傲莫大於此自近世以來宰臣輔相未有受垢辱之聲被有司之劾父子塵纍而蒙恩貸若曾者也周公弔二季之陵遲哀大教之不行於是作諡以紀其終曾參奉之啓手歸全易簀而沒蓋明慎終死而後已齊之史氏亂世陪臣耳猶書君賊纍死不懲況於皇代守典之官敢畏強盛而不盡禮管子有言禮義廉恥是謂四維四維不張國乃滅亡宰相大臣人之表儀若生極其情死又無貶是則帝室無正刑也王公貴人復何畏哉所謂四維復何寄乎謹按諡法名與實爽曰繆怙亂肆行曰醜曾之行己皆與此同宜諡繆醜公時雖不同秀議而聞者懼焉秀性忌讒佞疾之如讐素輕鄙賈充及伐吳之役聞其為大都督謂所親者曰充文案小才乃居伐國大任吾將哭以送師或止秀曰昔蹇叔知秦軍必敗故哭送其子耳今吳君無道國有自亡之形羣率踐境將不戰而潰子之哭也既為不智乃不赦之罪於是乃止及孫晧降于王濬充未之知方以吳未可平抗表請班師充表與告捷同至朝野以充位居人上智出人下僉以秀為知言及充薨秀議曰充舍宗族弗授而以異姓為後悖禮溺情以亂大倫昔鄫養外孫莒公子為後春秋書莒人滅鄫聖人豈不知外孫親邪但以義推之則無父子耳又案詔書自非功如太宰始封無後如太宰所取必己自出如太宰不得以為比然則以外孫為後自非元功顯德不之得也天子之禮蓋可然乎絶父祖之血食開朝廷之禍門諡法昏亂紀度曰荒請諡荒公不從王濬有平吳之勳而為王渾所譖毀帝雖不從無明賞罰以濬為輔國大將軍天下咸為之怨秀乃上言曰自大晉啓祚輔國之號率以舊恩此為王濬無功之時受九列之顯位立功之後更得寵人之辱號也四海視之孰不失望蜀小吳大平蜀之後二將皆就加三事今濬還而降等天下安得不惑乎吳之未亡也雖以三祖之神武猶躬受其屈以孫晧之虛名足以驚動諸夏每一小出雖聖心知其垂亡然中國輒懷惶怖當爾時有能借天子百萬之衆平而有之與國家結兄弟之交臣恐朝野實皆甘之耳今濬舉蜀漢之卒數旬而平吳雖舉吳人之財寶以與之本非己分有焉而遽與計校乎後與劉暾等同議齊王攸事忤旨除名尋復起為博士秀性婞直與物多忤為博士前後垂二十年卒於官史臣曰齊獻王以明德茂親經邦論道允釐庶績式彝倫武帝納姦諂之邪謀懷始終之遠慮遂乃君茲青土作牧東藩遠邇驚嗟朝野失望曹志等服膺教義方軌儒門蹇蹇匪躬慺慺體國故能抗言鳳闕忤犯龍鱗身雖暫屈道亦弘矣庾氏世載清德見稱於世汝潁之多奇士斯焉取斯謀甫素疾佞邪而發因醉飽投鼠忌器豈易由言竊人之財猶謂之盜子玄假譽攘善將非盜乎贊曰魏氏維城濟北知名潁川多士峻亦飛英長岑徇義祭酒遺榮謀甫三爵酗醟斯作象既攘善秀惟疸惡敷獻嘉謀幾趨鼎鑊
