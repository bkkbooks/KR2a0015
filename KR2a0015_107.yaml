body:
  text: 晉書卷一百七載記第七石季龍下子世遵鑒冉閔永和三年季龍親耕藉田于其桑梓苑其妻杜氏祠先蠶于近郊遂如襄國謁勒墓以中書監石寧為征西將軍率并司州兵二萬餘人為麻秋等後繼張重華將宋秦等率戶二萬來降河湟間氐羌十餘萬落與張璩相首尾麻秋憚之不進重華金城太守張沖又以郡降石寧麻秋尋次曲柳劉寧王擢進攻晉興武街重華將楊康等與寧戰于沙阜寧敗績乃引還金城王擢克武街執重華護軍曹權胡宣徙七千餘戶于雍州季龍又以孫伏都為征西將軍與麻秋率步騎三萬長驅濟河且城長最重華大懼遣將謝艾逆擊敗之秋退歸金城勒及季龍並貪而無禮既王有十州之地金帛珠玉及外國珍奇異貨不可勝紀而猶以為不足曩代帝王及先賢陵墓靡不發掘而取其寶貨焉邯鄲城西石子缸上有趙簡子墓至是季龍令發之初得炭深丈餘次得木板厚一尺積板厚八尺乃及泉其水清冷非常作絞車以牛皮囊汲之月餘而水不盡不可發而止又使掘秦始皇冢取銅柱鑄以為器時沙門吳進言于季龍曰胡運將衰晉當復興宜苦役晉人以厭其氣季龍于是使尚書張羣發近郡男女十六萬車十萬乘運土築華林苑及長牆于鄴北廣長數十里趙攬申鍾石璞等上疏陳天文錯亂蒼生凋弊及因引見又面諫辭旨甚切季龍大怒曰牆朝成夕沒吾無恨矣乃促張羣以燭夜作起三觀四門三門通漳水皆為鐵扉暴風大雨死者數萬人揚州送黃鵠雛五頸長一丈聲聞十餘里泛之于玄武池郡國前後送蒼麟十六白鹿七季龍命司虞張曷柱調之以駕芝蓋列于充庭之乘鑿北城引水于華林園城崩壓死者百餘人命石宣祈于山川因而遊獵乘大輅羽葆華蓋建天子旌旗十有六軍戎卒十八萬出自金明門季龍從其後宮升陵霄觀望之笑曰我家父子如是自非天崩地陷當復何愁但抱子弄孫日為樂耳宣既馳逐無厭所在陳列行宮四面各以百里為度驅圍禽獸皆暮集其所文武跪立圍守重行烽炬星羅光燭如晝命徑騎百餘馳射其中宣與嬖姬顯德美人乘輦觀之嬉娛忘反獸殫乃止其有禽獸奔逸當之者坐有爵者奪馬步驅一日無爵者鞭之一百峻制嚴刑文武戰栗士卒飢凍而死者萬有餘人宣弓馬衣食皆號為御有亂其間者以冒禁罪罪之所過三州十五郡資儲靡有孑遺季龍復命石韜亦如之出自并州遊于秦晉宣素惡韜寵是行也嫉之彌甚宦者趙生得幸于宣而無寵于韜微勸宣除之於是相圖之計起矣麻秋又襲張重華將張瑁於河陝敗之斬首三千餘級枹罕護軍李逵率衆七千降于季龍自河已南氐羌皆降石韜起堂于太尉府號曰宣光殿梁長九丈宣視而大怒斬匠截梁而去韜怒增之十丈宣聞之恚甚謂所幸楊柸牟成曰韜凶豎勃逆敢違我如是汝能殺之者吾入西宮當盡以韜之國邑分封汝等韜既死主上必親臨喪因行大事蔑不濟矣柸等許諾時東南有黃黑雲大如數畝稍分為三狀若匹布東西經天色黑而青酉時貫日日沒後分為七道每相去數十丈間有白雲如魚鱗子時乃滅韜素解天文見而惡之顧謂左右曰此變不小當有刺客起于京師不知誰定當之是夜韜宴其僚屬于東明觀樂奏酒酣愀然長歎曰人居世無常別易會難各付一杯開意為吾飲令必醉知後會復何期而不飲乎因泫然流涕左右莫不歔欷因宿于佛精舍宣使楊柸牟皮牟成趙生等緣獼猴梯而入殺韜置其刀箭而去旦宣奏之季龍哀驚氣絶久之方蘇將出臨之其司空李農諫曰害秦公者恐在蕭牆之內慮生非常不可以出季龍乃止嚴兵發哀于太武殿宣乘素車從千人臨韜喪不哭直言呵呵使舉衾看尸大笑而去收大將軍記室參軍鄭靖尹武等將委之以罪季龍疑宣之害韜也謀召之懼其不入乃偽言其母哀過危惙宣不虞己之見疑也入朝中宮因而止之建興人史科告稱韜死夜宿東宮長上楊柸家柸夜與五人從外來相與語曰大事已定但願大家老壽吾等何患不富貴語訖便入科寢暗中柸不見也科尋出逃匿俄而柸與二人出求科不得柸曰宿客聞人向語當殺之斷口舌今而得去作大事矣科踰牆獲免季龍馳使收之獲楊柸牟皮趙生等柸皮尋皆亡去執趙生而詰之生具首服季龍悲怒彌甚幽宣於席庫以鐵環穿其頷而鎖之作數斗木槽和羹飯以豬狗法食之取害韜刀箭舐其血哀號震動宮殿積柴鄴北樹標於其上標末置鹿盧穿之以繩倚梯柴積送宣於標所使韜所親宦者郝稚劉霸拔其髮抽其舌牽之登梯上於柴積郝稚以繩貫其頷鹿盧絞上劉霸斷其手足斫眼潰腹如韜之傷四面縱火煙炎際天季龍從昭儀已下數千登中臺以觀之火滅取灰分置諸門交道中殺其妻子九人宣小子年數歲季龍甚愛之抱之而泣兒曰非兒罪季龍欲赦之其大臣不聽遂於抱中取而戮之兒猶挽季龍衣而大叫時人莫不為之流涕季龍因此發病又誅其四率已下三百人宦者五十人皆車裂節解棄之漳水汙其東宮養月者牛東宮衛士十餘萬人皆謫戍涼州先是散騎常侍趙攬言於季龍曰中宮將有變宜防之及宣之殺韜也季龍疑其知而不告亦誅之廢宣母杜氏為庶人貴嬪柳氏尚書耆之女也以才色特幸坐其二兄有寵于宣亦殺之季龍追其姿色復納耆少女于華林園季龍議立太子其太尉張舉進曰燕公斌彭城公遵並有武藝文德陛下神齒已衰四海未一請擇二公而樹之初戎昭張豺之破上邽也獲劉曜幼女年十二有殊色季龍得而嬖之生子世封齊公至是豺以季龍年長多疾規立世為嗣劉當為太后己得輔政説季龍曰陛下再立儲宮皆出自倡賤是以禍亂相尋今宜擇母貴子孝者立之季龍曰卿且勿言吾知太子處矣又議于東堂季龍曰吾欲以純灰三斛洗吾腹腹穢惡故生凶子兒年二十餘便欲殺公今世方十歲比其二十吾已老矣於是與張舉李農定議敕公卿上書請立世大司農曹莫不署名季龍使張豺問其故莫頓首曰天下業重不宜立少是以不敢署也季龍曰莫忠臣也然未達朕意張舉李農知吾心矣其令諭之遂立世為皇太子劉氏為皇后季龍召太常條攸光祿勳杜嘏謂之曰煩卿傅太子實希改轍吾之相託卿宜明之署攸太傅嘏為少傅季龍時疾瘳以永和五年僭即皇帝位于南郊大赦境內建元曰太寧百官增位一等諸子進爵郡王以尚書張良為右僕射故東宮謫卒高力等萬餘人當戍涼州行達雍城既不在赦例又敕雍州刺史張茂送之茂皆奪其馬令步推鹿車致糧戍所高力督定陽梁犢等因衆心之怨謀起兵東還陰令胡人頡獨鹿微告戍者戍者皆踊抃大呼梁犢乃自稱晉征東大將軍率衆攻陷下辨逼張茂為大都督大司馬載以軺車安西劉寧自安定擊之大敗而還秦雍間城戍無不摧陷斬二千石長史長驅而東高力等皆多力善射一當十餘人雖無兵甲所在掠百姓大斧施一丈柯攻戰若神所向崩潰戍卒皆隨之比至長安衆已十萬其樂平王石苞時鎮長安盡鋭距之一戰而敗犢遂東出潼關進如洛川季龍以李農為大都督行大將軍事統衛軍張賀度征西張良征虜石閔等率步騎十萬討之戰于新安農師不利又戰于洛陽農師又敗乃退壁成臯犢東掠滎陽陳留諸郡季龍大懼以燕王石斌為大都督中外諸軍事率精騎一萬統姚弋仲苻洪等擊犢于滎陽東大敗之斬犢首而還討其餘黨盡滅之俄而晉將軍王龕拔其沛郡始平人馬勗起兵於洛氏葛谷自稱將軍石苞攻滅之誅三千餘家時熒惑犯積尸又犯昴月及熒惑北犯河鼓未幾季龍疾甚以石遵為大將軍鎮關右石斌為丞相録尚書事張豺為鎮衛大將軍領軍將軍吏部尚書並受遺輔政劉氏懼斌之輔政也害世與張豺謀誅之斌時在襄國乃遣使詐斌曰主上患已漸損王須獵者可小停也斌性好酒耽獵遂遊畋縱飲劉氏矯命稱斌無忠孝之心免斌官以王歸第使張豺弟雄率龍騰五百人守之石遵自幽州至鄴敕朝堂受拜配禁兵三萬遣之遵慟泣而去是日季龍疾小瘳問曰遵至未左右答言久已去矣季龍曰恨不見之季龍臨於西閣龍騰將軍中郎二百餘人列拜于前季龍曰何所求也皆言聖躬不和宜令燕王入宿衛典兵馬或言乞為皇太子季龍不知斌之廢也責曰燕王不在內邪呼來左右言王酒病不能入季龍曰促持輦迎之當付其璽綬亦竟無行者尋惛眩而入張豺使弟雄等矯季龍命殺斌劉氏又矯命以為太保都督中外諸軍録尚書事加千兵百騎一依霍光輔漢故事侍中徐統歎曰禍將作矣吾無為豫之乃仰藥而死俄而季龍亦死季龍始以咸康元年僭立至此太和六年凡在位十五歲於是世即偽位尊劉氏為皇太后臨朝進張豺為丞相豺請石遵石鑒為左右丞相以慰其心劉氏從之豺與張舉謀誅李農而舉與農素善以豺謀告之農懼率騎百餘奔廣宗率乞活數萬家保于上白劉氏使張舉等統宿衛精卒圍之豺以張離為鎮軍大將軍監中外諸軍事司隸校尉為己之副鄴中羣盜大起迭相劫掠石遵聞季龍之死屯于河內姚弋仲苻洪石閔劉寧及武衛王鸞寧西王午石榮王鐵立義將軍段勤等既平秦洛班師而歸遇遵于李城説遵曰殿下長而且賢先帝亦有意于殿下矣但以末年惛惑為張豺所誤今上白相持未下京師宿衛空虛若聲張豺之罪鼓行而討之孰不倒戈開門而迎殿下者邪遵從之洛州刺史劉國等亦率洛陽之衆至于李城遵檄至鄴張豺大懼馳召上白之軍遵次于蕩陰戎卒九萬石閔為前鋒豺將出距之耆舊羯士皆曰天子兒來奔喪吾當出迎之不能為張豺城戍也踰城而出豺斬之不能止張離率龍騰二千斬關迎遵劉氏懼引張豺入對之悲哭曰先帝梓宮未殯而禍難繁興今皇嗣沖幼託之于將軍將軍何以匡濟邪加遵重官可以弭不豺惶怖失守無復籌計但言唯唯劉氏令以遵為丞相領大司馬大都督中外諸軍録尚書事加黃鉞九錫增封十郡委以阿衡之任遵至安陽亭張豺懼而出迎遵命執之於是貫甲曜兵入自鳳陽門升于太武前殿劈踴盡哀退如東閣斬張豺于平樂市夷其三族假劉氏令曰嗣子幼沖先帝私恩所授皇業至重非所克堪其以遵嗣位遵偽讓至于再三羣臣敦勸乃受之僭即尊位于太武前殿大赦殊死已下罷上白圍封世為譙王邑萬戶待以不臣之禮廢劉氏為太妃尋皆殺之世凡立三十三日于是李農歸請罪遵復其位待之如初尊其母鄭氏為皇太后其妻張氏為皇后以石斌子衍為皇太子石鑒為侍中石沖為太保石苞為大司馬石琨為大將軍石閔為中外諸軍事輔國大將軍録尚書事輔政暴風拔樹震雷雨雹大如盂升太武暉華殿災諸門觀閣蕩然其乘輿服御燒者太半光焰照天金石皆盡火月餘乃滅雨血周遍鄴城石沖時鎮于薊聞遵殺世而自立乃謂其僚佐曰世受先帝之命遵輒廢殺罪逆莫大其敕內外戒嚴孤將親討之於是留寧北沭堅戍幽州帥衆五萬自薊討遵傳檄燕趙所在雲集比及常山衆十餘萬次于苑鄉遇遵赦書謂左右曰吾弟一也死者不可復追何為復相殘乎吾將歸矣其將陳暹進曰彭城篡弒自尊為罪大矣王雖北旆臣將南轅平京師擒彭城然後奉迎大駕沖從之遵馳遣王擢以書喻沖沖弗聽遵假石閔黃鉞金鉦與李農等率精卒十萬討之戰于平棘沖師大敗獲沖于元氏賜死坑其士卒三萬餘人始葬季龍號其墓為顯原陵偽諡武皇帝廟號太祖遵揚州刺史王浹以淮南歸順晉西中郎將陳逵進據壽春征北將軍褚裒率師伐遵次于下邳遵以李農為南討大都督率騎二萬來距裒不能進退屯廣陵陳逵聞之懼遂焚壽春積聚毀城而還石苞時鎮長安謀帥關中之衆攻鄴左長史石光司馬曹曜等固諫苞怒誅光等百餘人苞性貪而無謀雍州豪右知其無成並遣使告晉梁州刺史司馬勳勳於是率衆赴之壁於懸鉤去長安二百餘里使治中劉煥攻京兆太守劉秀離斬之三輔豪右多殺其令長擁三十餘壁有衆五萬以應勳苞輟攻鄴之謀使麻秋姚國等率騎距勳遵遣車騎王朗率精騎二萬外以討勳為名因劫苞送之于鄴勳又為朗所距釋懸鉤拔宛城殺遵南陽太守袁景而還初遵之發李城也謂石閔曰努力事成以爾為儲二既而立衍閔甚失望自以勳高一時規專朝政遵忌而不能任閔既為都督總內外兵權乃懷撫殿中將士及故東宮高力萬餘人皆奏為殿中員外將軍爵關外侯賜以宮女樹己之恩遵弗之猜也而更題名善惡以挫抑之衆咸怨矣而又納中書令孟準左衛將軍王鸞之計頗疑憚於閔稍奪兵權閔益有恨色準等咸勸誅之遵召石鑒等入議于其太后鄭氏之前皆請誅之鄭氏曰李城回師無棘奴豈有今日小驕縱之不可便殺也鑒出遣宦者楊環馳以告閔閔遂劫李農及右衛王基密謀廢遵使將軍蘇亥周成率甲士三十執遵于如意觀遵時方與婦人彈問成等曰反者誰也成曰義陽王鑒當立遵曰我尚如是汝等立鑒復能幾時乃殺之于琨華殿誅鄭氏及其太子衍上光祿張斐中書令孟準左衛王鸞等遵凡在位一百八十三日鑒乃僭位大赦殊死已下以石閔為大將軍封武德王李農為大司馬並録尚書事郎闓為司空秦州刺史劉羣為尚書左僕射侍中盧諶為中書監鑒使石苞及中書令李松殿中將軍張才等夜誅閔農於琨華殿不克禁中擾亂鑒恐閔為變偽若不知者夜斬松才於西中華門并誅石苞時石祗在襄國與姚弋仲苻洪等通和連兵檄誅閔農鑒遣石琨為大都督與張舉及侍中呼延盛率步騎七萬分討祗等中領軍石成侍中石啓前河東太守石暉謀誅閔農閔農殺之龍驤孫伏都劉銖等結羯士三千伏于胡天亦欲誅閔等時鑒在中臺伏都率三十餘人將升臺挾鑒以攻之鑒見伏都毀閣道臨問其故伏都曰李農等反已在東掖門臣嚴率衛士謹先啓知鑒曰卿是功臣好為官陳力朕從臺觀卿勿慮無報也於是伏都及銖率衆攻閔農不克屯於鳳陽門閔農率衆數千毀金明門而入鑒懼閔之誅己也馳招閔農開門內之謂曰孫伏都反卿宜速討之閔農攻斬伏都等自鳳陽至琨華橫尸相枕流血成渠宣令內外六夷敢稱兵杖者斬之胡人或斬關或踰城而出者不可勝數使尚書王簡少府王鬱帥衆數千守鑒于御龍觀懸食給之令城內曰與官同心者住不同心者各任所之敕城門不復相禁於是趙人百里內悉入城胡羯去者填門閔知胡之不為己用也班令內外趙人斬一胡首送鳳陽門者文官進位三等武職悉拜牙門一日之中斬首數萬閔躬率趙人誅諸胡羯無貴賤男女少長皆斬之死者二十餘萬尸門諸城外悉為野犬豺狼所食屯據四方者所在承閔書誅之于時高鼻多鬚至有濫死者半太宰趙鹿太尉張舉中軍張春光祿石嶽撫軍石寧武衛張季及諸公侯卿校龍騰等萬餘人出奔襄國石琨奔據冀州撫軍張沈屯滏口張賀度據石瀆建義段勤據黎陽寧南楊羣屯桑壁劉國據陽城段龕據陳留姚弋仲據混橋苻洪據枋頭衆各數萬王朗麻秋自長安奔于洛陽秋承閔書誅朗部胡千餘朗奔于襄國麻秋率衆奔于苻洪石琨及張舉王朗率衆七萬伐鄴石閔率騎千餘距之城北閔執兩刃矛馳騎擊之皆應鋒摧潰斬級三千琨等大敗遂歸于冀州閔與李農率騎三萬討張賀度于石瀆鑒密遣宦者齎書召張沈等使承虛襲鄴宦者以告閔農閔農馳還廢鑒殺之誅季龍孫三十八人盡殪石氏鑒在位一百三日季龍小男混永和八年將妻妾數人奔京師敕收付廷尉俄而斬之於建康市季龍十三子五人為冉閔所殺八人自相殘害混至此又死初讖言滅石者陵尋而石閔徙封蘭陵公季龍惡之改蘭陵為武興郡至是終為閔所滅始勒以成帝咸和三年僭立二主四子凡二十三年以穆帝永和五年滅閔字永曾小字棘奴季龍之養孫也父瞻字弘武本姓冉名良魏郡內黃人也其先漢黎陽騎都督纍世牙門勒破陳午獲瞻時年十二命季龍子之驍猛多力攻戰無前歷位左積射將軍西華侯閔幼而果鋭季龍撫之如孫及長身長八尺善謀策勇力絶人拜建節將軍徙封修成侯歷位北中郎將遊擊將軍季龍之敗於昌黎閔軍獨全由此功名大顯及敗梁犢之後威聲彌振胡夏宿將莫不憚之永和六年殺石鑒其司徒申鍾司空郎闓等四十八人上尊號于閔閔固讓李農農以死固請於是僭即皇帝位于南郊大赦改元曰永興國號大魏復姓冉氏追尊其祖隆元皇帝考瞻烈祖高皇帝尊母王氏為皇太后立妻董氏為皇后子智為皇太子以李農為太宰領太尉録尚書事封齊王農諸子皆封為縣公封其子胤明裕皆為王文武進位三等封爵有差遣使者持節赦諸屯結皆不從石祗聞鑒死僭稱尊號于襄國諸六夷據州郡擁兵者皆應之閔遣使臨江告晉曰胡逆亂中原今已誅之若能共討者可遣軍來也朝廷不答閔誅李農及其三子并尚書令王謨侍中王衍中常侍嚴震趙升等晉廬江太守袁真攻其合肥執南蠻校尉桑坦遷其百姓而還石祗遣其相國石琨率衆十萬伐鄴進據邯鄲祗鎮南劉國自繁陽會琨閔大敗琨于邯鄲死者萬餘劉國還屯繁陽苻健自枋頭入關張賀度段勤與劉國靳豚會于昌城將攻鄴閔遣尚書左僕射劉羣為行臺都督使其將王泰崔通周成等帥步騎十二萬次于黃城閔躬統精卒八萬繼之戰于蒼亭賀度等大敗死者二萬八千追斬靳豚于陰安鄉盡俘其衆振旅而歸戎卒三十餘萬旌旗鍾鼓綿亙百餘里雖石氏之盛無以過之閔至自蒼亭行飲至之禮清定九流準才授任儒學後門多蒙顯進于時翕然方之為魏晉之初閔率步騎十萬攻石祗于襄國署其子太原王胤為大單于驃騎大將軍以降胡一千配為麾下光祿大夫韋謏啓諫甚切閔覽之大怒誅謏及其子孫閔攻襄國百餘日為土山地道築室反耕祗大懼去皇帝之號稱趙王遣使詣慕容俊姚弋仲以乞師會石琨自冀州援祗弋仲復遣其子襄率騎三萬八千至自滆頭俊遣將軍悅綰率甲卒三萬自龍城三方徑卒合十餘萬閔遣車騎胡睦距襄于長蘆將軍孫威候琨于黃丘皆為敵所敗士卒略盡睦威單騎而還琨等軍且至閔將出擊之衛將軍王泰諫曰窮寇固迷希望外援今強救雲集欲吾出戰腹背擊我宜固壘勿出觀勢而動以挫其謀今陛下親戎如失萬全大事去矣請慎無出臣請率諸將為陛下滅之閔將從之道士法饒進曰太白經昴當殺胡王一戰百克不可失也閔攘袂大言曰吾戰決矣敢諫者斬於是盡衆出戰姚襄悅綰石琨等三面攻之祗衝其後閔師大敗閔潛于襄國行宮與十餘騎奔鄴降胡栗特康等執冉胤及左僕射劉琦等送于祗盡殺之司空石璞尚書令徐機車騎胡睦侍中李綝中書監盧諶少府王鬱尚書劉欽劉休等及諸將士死者十餘萬人於是人物殲矣賊盜峰起司冀大飢人相食自季龍末年而閔盡散倉庫以樹私恩與羌胡相攻無月不戰青雍幽荊州徙戶及諸氐羌胡蠻數百餘萬各還本土道路交錯互相殺掠且飢疫死亡其能達者十有二三諸夏紛亂無復農者閔悔之誅法饒父子支解之贈韋謏大司徒石祗使劉顯帥衆七萬攻鄴時閔潛還莫有知者內外凶凶皆謂閔已沒矣射聲校尉張艾勸閔親郊以安衆心閔從之訛言乃止劉顯次于明光宮去鄴二十三里閔懼召衛將軍王泰議之泰恚其謀之不從辭以瘡甚閔親臨問之固稱疾篤閔怒還宮顧謂左右曰巴奴乃公豈假汝為命邪要將先滅羣胡却斬王泰於是盡衆而戰大敗顯軍追奔及于陽平斬首三萬餘級顯懼密使請降求殺祗為效閔振旅而歸會有告王泰招集秦人將奔關中閔怒誅泰夷其三族劉顯果殺祗及其太宰趙鹿等十餘人傳首于鄴送質請命驃騎石寧奔于柏人閔命焚祗首于通衢閔兗州刺史劉啓以鄄城歸順劉顯復率衆伐鄴閔擊敗之還稱尊號于襄國閔徐州刺史周成兗州刺史魏統豫州牧冉遇荊州刺史樂弘皆以城歸順平南高崇征虜呂護執洛州刺史鄭系以三河歸順慕容彪攻陷中山殺閔寧北白同幽州刺史劉準降于慕容俊時有雲黃赤色起東北長百餘丈一白鳥從雲間西南去占者惡之劉顯率衆伐常山太守蘇亥告難于閔閔留其大將軍蔣幹等輔其太子智守鄴親率騎八千救之顯所署大司馬清河王寧以棗強降于閔收其餘衆擊顯敗之追奔及于襄國顯大將曹伏駒開門為應遂入襄國誅顯及其公卿已下百餘人焚襄國宮室遷其百姓于鄴顯領軍范路率衆千餘斬關奔于枋頭時慕容俊已克幽薊略地至于冀州閔帥騎距之與慕容恪相遇於魏昌城閔大將軍董閏車騎張溫言於閔曰鮮卑乘勝氣徑不可當也請避之以溢其氣然後濟師以擊之可以捷也閔怒曰吾成師以出將平幽州斬慕容俊今遇恪而避之人將侮我矣乃與恪遇十戰皆敗之恪乃以鐵鎖連馬簡善射鮮卑勇而無剛者五千方陳而前閔所乘赤馬曰朱龍日行千里左杖雙刃矛右執鉤戟順風擊之斬鮮卑三百餘級俄而燕騎大至圍之數周閔衆寡不敵躍馬潰圍東走行二十餘里馬無故而死為恪所擒及董閏張溫等送之于薊俊立閔而問之曰汝奴僕下才何自妄稱天子閔曰天下大亂爾曹夷狄人面獸心尚欲篡逆我一時英雄何為不可作帝王邪俊怒鞭之三百送于龍城告廆皓廟遣慕容評率衆圍鄴劉寧及弟崇帥胡騎三千奔于晉陽蘇亥棄常山奔于新興鄴中飢人相食季龍時宮人被食略盡冉智尚幼蔣幹遣侍中繆嵩詹事劉猗奉表歸順且乞師于晉濮陽太守戴施自倉垣次于棘津止猗不聽進責其傳國璽猗使嵩還鄴復命幹沈吟未決施乃率壯士百餘人入鄴助守三臺譎之曰且出璽付我今凶寇在外道路不通未敢送也須得璽當馳白天子耳天子聞璽已在吾處信卿至誠必遣軍糧厚相救餉幹以為然乃出璽付之施宣言使督護何融迎糧陰令懷璽送于京師長水校尉馬願龍驤田香開門降評施融蔣幹懸縋而下奔于倉垣評送閔妻董氏太子智太尉申鍾司空條攸中書監聶熊司隸校尉籍羆中書令李垣及諸王公卿士于薊尚書令王簡左僕射張乾右僕射郎肅自殺俊送閔既至龍城斬于遏陘山山左右七里草木悉枯蝗蟲大起五月不雨至于十二月俊遣使者祀之諡曰武悼天王其日大雪是歲永和八年也史臣曰夫拯溺救焚帝王之師也窮凶騁暴戎狄之舉也蠢茲雜種自古為虞限以塞垣猶懼侵軼況乃入居中壤窺我王政乘弛紊之機覩危亡之隙而莫不嘯羣鳴鏑汨亂天常者乎石勒出自羌渠見奇醜類聞鞞上黨季子鑒其非凡倚嘯洛城夷甫識其為亂及惠皇失統宇內崩離遂乃招聚蟻徒乘間煽禍虔劉我都邑翦害我黎元朝市淪胥若沈航於鯨浪王公顛仆譬遊魂於龍漠豈天厭晉德而假茲妖孽者歟觀其對敵臨危運籌賈勇奇謨間發猛氣橫飛遠嗤魏武則風情慷慨近答劉琨則音詞倜儻焚元超於苦縣陳其亂政之愆戮彭祖于襄國數以無君之罪於是跨躡燕趙并吞韓魏杖奇材而竊徽號擁舊都而抗王室褫裘襲冠帶釋介胄開庠序鄰敵懼威而獻款絶域承風而納貢則古之為國曷以加諸雖曰凶殘亦一時傑也而託授非所貽厥無謀身隕嗣滅業歸攜養斯乃知人之暗焉季龍心昧德義幼而輕險假豹姿於羊質騁梟心於狼性始懷怨懟終行篡奪於是窮驕極侈勞役繁興畚鍤相尋干戈不息刑政嚴酷動見誅夷惵惵遺黎求哀無地戎狄殘獷斯為甚乎既而父子猜嫌兄弟讎隙自相屠膾取笑天下墳土未燥禍亂薦臻釁起於張豺族傾於冉閔積惡致滅有天道哉夫從逆則凶事符影響為咎必應理若循環世龍之殪晉人既窮其酷永曾之誅羯士亦殲其類無德不報斯之謂乎贊曰中朝不競蠻狄爭衡塵飛五嶽霧暗三精狡焉石氏怙亂窮兵流災肆慝剽邑屠城始自羣盜終假鴻名勿謂凶醜亦曰時英季龍篡奪淫虐播聲身喪國泯其由禍盈
