body:
  text: 晉書卷一百三十載記第三十赫連勃勃赫連勃勃字屈孑胸奴右賢王去卑之後劉元海之族也曾祖武劉聰世以宗室封樓煩公拜安北將軍監鮮卑諸軍事丁零中郎將雄據肆盧川為代王猗盧所敗遂出塞表祖豹子招集種落復為諸部之雄石季龍遣使就拜平北將軍左賢王丁零單于父衛辰入居塞內苻堅以為西單于督攝河西諸虜屯于代來城及堅國亂遂有朔方之地控弦之士三萬八千後魏師伐之辰令其子力俟提距戰為魏所敗魏人乘勝濟河克代來執辰殺之勃勃乃奔于叱干部叱干他斗伏送勃勃于魏他斗伏兄子阿利先戍大洛川聞將送勃勃馳諫曰鳥雀投人尚宜濟免況勃勃國破家亡歸命于我縱不能容猶宜任其所奔今執而送之深非仁者之舉他斗伏懼為魏所責弗從阿利潛遣徑勇篡勃勃于路送于姚興高平公沒奕于奕于以女妻之勃勃身長八尺五寸腰帶十圍性辨慧美風儀興見而奇之深加禮敬拜驍騎將軍加奉車都尉常參軍國大議寵遇踰于勳舊興弟雍言于興曰勃勃天性不仁難以親近陛下寵遇太甚臣竊惑之興曰勃勃有濟世之才吾方收其藝用與之共平天下有何不可乃以勃勃為安遠將軍封陽川侯使助沒奕于鎮高平以三城朔方雜夷及衛辰部衆三萬配之使為伐魏偵候姚雍固諫以為不可興曰卿何以知其性氣雍曰勃勃奉上慢御衆殘貪暴無親輕為去就寵之踰分終為邊害興乃止頃之以勃勃為持節安北將軍五原公配以三交五部鮮卑及雜虜二萬餘落鎮朔方時河西鮮卑杜崘獻馬八千匹于姚興濟河至大城勃勃留之召其衆三萬餘人偽獵高平川襲殺沒奕于而并其衆衆至數萬義熙三年僭稱天王大單于赦其境內建元曰龍升署置百官自以胸奴夏后氏之苗裔也國稱大夏以其長兄右地代為丞相代公次兄力俟提為大將軍魏公叱干阿利為御史大夫梁公弟阿利羅引為征南將軍司隸校尉若門為尚書令叱以鞬為征西將軍尚書左僕射乙斗為征北將軍尚書右僕射自餘以次授任其年討鮮卑薛干等三部破之降衆萬數千進討姚興三城已北諸戍斬其將楊丕姚石生等諸將諫固險不從又復言于勃勃曰陛下將欲經營宇內南取長安宜先固根本使人心有所憑係然後大業可成高平險固山川沃饒可以都也勃勃曰卿徒知其一未知其二吾大業草創衆旅未多姚興亦一時之雄關中未可圖也且其諸鎮用命我若專固一城彼必并力于我衆非其敵亡可立待吾以雲騎風馳出其不意救前則擊其後救後則擊其前使彼疲于奔命我則遊食自若不及十年嶺北河東盡我有也待姚興死後徐取長安姚泓凡弱小兒擒之方略已在吾計中矣昔軒轅氏亦遷居無常二十餘年豈獨我乎于是侵掠嶺北嶺北諸城門不晝啓興歎曰吾不用黃兒之言以至于此黃兒姚雍小字也勃勃初僭號求婚于禿髮檀檀弗許勃勃怒率騎二萬伐之自楊非至于支陽三百餘里殺傷萬餘人驅掠二萬七千口牛馬羊數十萬而還檀率衆追之其將焦朗謂檀曰勃勃天姿雄驁御軍齊肅未可輕也今因抄掠之資率思歸之士人自為戰難與爭鋒不如從溫圍北渡趣萬斛堆阻水結營制其咽喉百戰百勝之術也檀將賀連怒曰勃勃以死亡之餘率烏合之衆犯順結禍幸有大功今牛羊塞路財寶若山窘弊之餘人懷貪競不能督厲士衆以抗我也我以大軍臨之必土崩魚潰今引軍避之示敵以弱我衆氣鋭宜在速追檀曰吾追計決矣敢諫者斬勃勃聞而大喜乃于陽武下陝鑿凌埋車以塞路檀遣善射者射之中勃勃左臂勃勃乃勒衆逆擊大敗之追奔八十餘里殺傷萬計斬其大將十餘人以為京觀號髑髏臺還于嶺北勃勃與姚興將張佛生戰于青石原又敗之俘斬五千七百人興遣將齊難率衆二萬來伐勃勃退如河曲難以去勃勃既遠縱兵掠野勃勃潛軍覆之俘獲七千餘人收其戎馬兵杖難引軍而退勃勃復追擊于木城拔之擒難俘其將士萬有三千戎馬萬匹嶺北夷夏降附者數萬計勃勃于是拜置守宰以撫之勃勃又率騎二萬入高岡及于五井掠平涼雜胡七千餘戶以配後軍進屯依力川姚興來伐至三城勃勃候興諸軍未集率騎擊之興大懼遣其將姚文宗距戰勃勃偽退設伏以待之興遣其將姚榆生等追之伏兵夾擊皆擒之興將王奚聚羌胡三千餘戶于敕奇堡勃勃進攻之奚驍悍有膂力短兵接戰勃勃之衆多為所傷于是堰斷其水堡人窘迫執奚出降勃勃謂奚曰卿忠臣也朕方與卿共平天下奚曰若蒙大恩速死為惠乃與所親數十人自刎而死勃勃又攻興將金洛生于黃石固彌姐豪地于我羅城皆拔之徙七千餘家于大城以其丞相右地代領幽州牧以鎮之遣其尚書金纂率騎一萬攻平涼姚興來救纂為興所敗死之勃勃兄子左將軍羅提率步騎一萬攻興將姚廣都于定陽克之坑將士四千餘人以女弱為軍賞拜廣都為太常勃勃又攻興將姚壽都于清水城壽都奔上邽徙其人萬六千家于大城是歲齊難姚廣都謀叛皆誅之姚興將姚詳棄三城南奔大蘇勃勃遣其將平東鹿奕于要擊之執詳盡俘其衆詳至勃勃數而斬之其年勃勃率騎三萬攻安定與姚興將楊佛嵩戰于青石北原敗之降其衆四萬五千獲戎馬二萬匹進攻姚興將黨智隆于東鄉降之署智隆光祿勳徙其三千餘戶于二城姚興鎮北參軍王買德來奔勃勃謂買德曰朕大禹之後世居幽朔祖宗重暉常與漢魏為敵國中世不競受制于人逮朕不肖不能紹隆先構國破家亡流離漂虜今將應運而興復大禹之業卿以為何如買德曰自皇晉失統神器南移羣雄嶽峙人懷問鼎況陛下奕葉載德重光朔野神武超于漢皇聖略邁于魏祖而不于天啓之機建成大業乎今秦政雖衰藩鎮猶固深願蓄力待時詳而後舉勃勃善之拜軍師中郎將乃赦其境內改元為鳳翔以叱干阿利領將作大匠發嶺北夷夏十萬人于朔方水北黑水之南營起都城勃勃自言朕方統一天下君臨萬邦可以統萬為名阿利性尤工巧然殘忍刻暴乃蒸土築城錐入一寸即殺作者而并築之勃勃以為忠故委以營繕之任又造五兵之器精鋭尤甚既成呈之工匠必有死者射甲不入即斬弓人如其入也便斬鎧匠又造百鍊剛刀為龍雀大環號曰大夏龍雀銘其背曰古之利器吳楚湛盧大夏龍雀名冠神都可以懷遠可以柔逋如風靡草威服九區世甚珍之復鑄銅為大鼓飛廉翁仲銅駝龍獸之屬皆以黃金飾之列于宮殿之前凡殺工匠數千以是器物莫不精麗于是議討乞伏熾磐王買德諫曰明王之行師也軌物以德不以暴且熾磐我之與國新遭大喪今若伐之豈所謂乘理而動上感靈和之義乎苟恃衆力因人喪難匹夫猶恥為之而況萬乘哉勃勃曰甚善微卿朕安聞此言其年下書曰朕之皇祖自北遷幽朔姓改姒氏音殊中國故從母氏為劉子而從母之姓非禮也古人氏族無常或以因生為氏或以王父之名朕將以義易之帝王者係天為子是為徽赫實與天連今改姓曰赫連氏庶協皇天之意永享無疆大慶係天之尊不可令支庶同之其非正統皆以鐵伐為氏庶朕宗族子孫剛鋭如鐵皆堪伐人立其妻梁氏為王后子璝為太子封子延陽平公昌太原公倫酒泉公定平原公滿河南公安中山公又攻姚興將姚逵于杏城二旬克之執逵及其將姚大用姚安和姚利僕尹敵等坑戰士二萬人遣其御史中丞烏洛孤盟于沮渠蒙遜曰自金晉數終禍纏九服趙魏為長蛇之墟秦隴為豺狼之穴二都神京鞠為茂草蠢爾羣生罔知憑賴上天悔禍運屬二家封疆密邇道會義親宜敦和好弘康世難爰自終古有國有家非盟誓無以昭神祇之心非斷金無以定終始之好然晉楚之成吳蜀之約咸口血未乾而尋背之今我二家契殊曩日言未發而有篤愛之心音一交而懷傾蓋之顧息風塵之警同克濟之誠勠力一心共濟六合若天下有事則雙振義旗區域既清則並敦魯衛夷險相赴交易有無爰及子孫永崇斯好蒙遜遣其將沮渠漢平來盟勃勃聞姚泓將姚嵩與氐王楊盛相持率騎四萬襲上邽未至而嵩為盛所殺勃勃攻上邽二旬克之殺泓秦州刺史姚平都及將士五千人毀城而去進攻陰密又殺興將姚良子及將士萬餘人以其子昌為使持節前將軍雍州刺史鎮陰密泓將姚恢棄安定奔于長安安定人胡儼華韜率戶五萬據安定降于勃勃以儼為侍中韜為尚書留鎮東羊苟兒鎮之配以鮮卑五千進攻泓將姚諶于雍城諶奔長安勃勃進師次郿城泓遣其將姚紹來距勃勃退如安定胡儼等襲殺苟兒以城降泓勃勃引歸杏城笑謂羣臣曰劉裕伐秦水陸兼進且裕有高世之略姚泓豈能自固吾驗以天時人事必當克之又其兄弟內叛安可以距人裕既克長安利在速返正可留子弟及諸將守關中待裕發軫吾取之若拾芥耳不足復勞吾士馬于是馬厲兵休養士卒尋進據安定姚泓嶺北鎮戍郡縣悉降勃勃于是盡有嶺北之地俄而劉裕滅泓入于長安遣使遺勃勃書請通和好約為兄弟勃勃命其中書侍郎皇甫徽為文而陰誦之召裕使前口授舍人為書封以答裕裕覽其文而奇之使者又言勃勃容儀瓌偉英武絶人裕歎曰吾所不如也既而勃勃還統萬裕留子義真鎮長安而還勃勃聞之大悅謂王買德曰朕將進圖長安卿試言取之方略買德曰劉裕滅秦所謂以亂平亂未有德政以濟蒼生關中形勝之地而以弱才小兒守之非經遠之規也狼狽而返者欲速成篡事耳無暇有意于中原陛下以順伐逆義貫幽顯百姓以君命望陛下義旗之至以日為歲矣青泥上洛南師之衝要宜置遊兵斷其去來之路然後杜潼關塞崤陝絶其水陸之道陛下聲檄長安申布恩澤三輔父老皆壺漿以迎王師矣義真獨坐空城逃竄無所一旬之間必面縛麾下所謂兵不血刃不戰而自定也勃勃善之以子璝都督前鋒諸軍事領撫軍大將軍率騎二萬南伐長安前將軍赫連昌屯兵潼關以買德為撫軍右長史南斷青泥勃勃率大軍繼發璝至渭陽降者屬路義真遣龍驤將軍沈田子率衆逆戰不利而退屯劉回堡田子與義真司馬王鎮惡不平因鎮惡出城遂殺之義真又殺田子于是悉召外軍入于城中閉門距守關中郡縣悉降璝夜襲長安不克勃勃進據咸陽長安樵採路絶劉裕聞之大懼乃召義真東鎮洛陽以朱齡石為雍州刺史守長安義真大掠而東至于灞上百姓遂逐齡石而迎勃勃入于長安璝率衆三萬追擊義真王師敗績義真單馬而遁買德獲晉寧朔將軍傅弘之輔國將軍蒯恩義真司馬毛修之于青泥積人頭以為京觀于是勃勃大饗將士于長安舉觴謂王買德曰卿往日之言一周而果效可謂算無遺策矣雖宗廟社稷之靈亦卿謀猷之力也此觴所集非卿而誰于是拜買德都官尚書加冠軍將軍封河陽侯赫連昌攻齡石及龍驤將軍王敬于潼關之曹公故壘克之執齡石及敬送于長安羣臣乃勸進勃勃曰朕無撥亂之才不能弘濟兆庶自枕戈寢甲十有二年而四海未同遺寇尚熾不知何以謝責當年垂之來葉將明揚仄陋以王位讓之然後歸老朔方琴書卒歲皇帝之號豈薄德所膺羣臣固請乃許之于是為壇于灞上僭即皇帝位赦其境內改元為昌武遣其將叱奴侯提率步騎二萬攻晉并州刺史毛德祖于蒲坂德祖奔于洛陽以侯提為并州刺史鎮蒲坂勃勃歸于長安徵隱士京兆韋祖思既至而恭懼過禮勃勃怒曰吾以國士徵汝奈何以非類處吾汝昔不拜姚興何獨拜我我今未死汝猶不以我為帝王吾死之後汝輩弄筆當置吾何地遂殺之羣臣勸都長安勃勃曰朕豈不知長安纍帝舊都有山河四塞之固但荊吳僻遠勢不能為人之患東魏與我同壤境去北京裁數百餘里若都長安北京恐有不守之憂朕在統萬彼終不敢濟河諸卿適未見此耳其下咸曰非所及也乃于長安置南臺以璝領大將軍雍州牧録南臺尚書事勃勃還統萬以宮殿大成于是赦其境內又改元曰真興刻石都南頌其功德曰夫庸大德盛者必建不刊之業道積慶隆者必享無窮之祚昔在陶唐數鍾厄運我皇祖大禹以至聖之姿當經綸之會鑿龍門而闢伊闕疏三江而決九河夷一元之窮災拯六合之沈溺鴻績侔于天地神功邁于造化故二儀降祉三靈叶贊揖讓受終光啓有夏傳世二十歷載四百賢辟相承哲王繼軌徽猷冠于玄古高範煥乎疇昔而道無常夷數或屯險王桀不綱綱漏殷氏用使金暉絶于中天神轡輟于促路然純曜未渝慶綿萬祀龍飛漠南鳳峙朔北長轡遠馭則西罩昆山之外密網遐張則東滄海之表爰始逮今二千餘載雖三統迭制于崤函五德革運于伊洛秦雍成篡弒之墟周豫為爭奪之藪而幽朔謐爾主有常尊于上海代晏然物無異望于下故能控弦之衆百有餘萬躍馬長驅鼓行秦趙使中原疲于奔命諸夏不得高枕為日久矣是以偏師暫擬涇陽摧隆周之鋒赫斯一奮平陽挫漢祖之鋭雖霸王繼蹤猶朝日之升扶桑英豪接踵若夕月之登濛汜自開闢已來未始聞也非夫卜世與乾坤比長鴻基與山嶽齊固孰能本枝于千葉重光于萬祀履寒霜而踰榮蒙重氛而彌耀者哉于是玄符告徵大猷有會我皇誕命世之期應天縱之運仰協時來俯順時望龍升北京則義風蓋于九區鳳翔天域則威聲格于八表屬姦雄鼎峙之秋羣凶嶽立之際昧旦臨朝日旰忘膳運籌命將舉無遺策親御六戎則有征無戰故偽秦以三世之資喪魂于關隴河源望旗而委質北虜欽風而納款德音著于柔服威刑彰于伐叛文教與武功並宣俎豆與干戈俱運五稔之間道風弘著暨乎七載而王猷允洽乃遠惟周文啓經始之基近詳山川究形勝之地遂營起都城開建京邑背名山而面洪流左河津而右重塞高隅隱日崇墉際雲石郭天池周綿千里其為獨守之形險絶之狀固以遠邁於咸陽超美於周洛若乃廣五郊之義尊七廟之制崇左社之規建右稷之禮御太一以繕明堂模帝坐而營路寢閶闔披霄而山亭象魏排虛而嶽峙華林靈沼崇臺祕室通房連閣馳道苑園可以蔭映萬邦光覆四海莫不鬱然並建森然畢備若紫微之帶皇穹閬風之跨后土然宰司鼎臣羣黎士庶僉以為重威之式有闕前王于是延王爾之奇工命班輸之妙匠搜文梓于鄧林採繡石于嶽九域貢以金銀八方獻其瓌寶親運神奇參制規矩營離宮于露寢之南起別殿于永安之北高構千尋崇基萬仞玄棟鏤榥若騰虹之揚眉飛簷舒咢似翔鵬之矯翼二序啓矣而五時之坐開四隅陳設而一御之位建溫宮膠葛涼殿崢嶸絡以隨珠綷以金鏡雖曦望互升于表而中無晝夜之殊陰陽迭更于外而內無寒暑之別故善目者不能為其名博辨者不能究其稱斯蓋神明之所規模非人工之所經制若乃尋名以求類迹狀以效真據質以究名形疑妙出雖如來須彌之寶塔帝釋利之神宮尚未足以喻其麗方其飾矣昔周宣考室而詠于詩人閟宮有侐而頌聲是作況乃太微肇制清都啓建軌一文昌舊章唯始咸秩百神賓享萬國羣生開其耳目天下詠其來蘇亦何得不播之管弦刊之金石哉乃樹銘都邑敷讚碩美俾皇風振于來葉聖庸垂乎不朽其辭曰於赫靈祚配乾比隆巍巍大禹堂堂聖功仁被蒼生德格玄穹帝錫玄圭揖讓受終哲王繼軌光闡徽風道無常夷數或不競金精南邁天輝北映靈祉踰昌世葉彌盛惟祖惟父克廣休命如彼日月連光接鏡玄符瑞德乾運有歸誕鍾我后應圖龍飛落落神武恢恢聖姿名教內敷羣妖外夷化光四表威截九圍封畿之制王者常經乃延輸爾肇建帝京土苞上壤地跨勝形庶人子來不日而成崇臺霄峙秀闕雲亭千榭連隅萬閣接屏晃若晨曦昭若列星離宮既作別宇云施爰構崇明仰準乾儀懸甍風閲飛軒雲垂溫室嵯峨層城參差楹雕虬獸節鏤龍螭瑩以寶璞飾以珍奇稱因褒著名由實揚偉哉皇室盛矣厥章義高靈臺美隆未央邁軌三五貽則霸王永世垂範億載彌光其祕書監胡義周之辭也名其南門曰朝宋門東門曰招魏門西門曰服涼門北門曰平朔門追尊其高祖訓兒曰元皇帝曾祖武曰景皇帝祖豹子曰宣皇帝父衛辰曰桓皇帝廟號太祖母苻氏曰桓文皇后勃勃性凶暴好殺無順守之規常居城上置弓劍于側有所嫌忿便手自殺之羣臣忤視者毀其目笑者決其脣諫者謂之誹謗先截其舌而後斬之夷夏囂然人無生賴在位十三年而宋受禪以宋元嘉二年死子昌嗣偽位尋為魏所擒弟定僭號于平涼遂為魏所滅自勃勃至定凡二十有六載而亡史臣曰赫連勃勃獯醜種類入居邊宇屬中壤分崩緣間肆慝控弦鳴鏑據有朔方遂乃法玄象以開宮擬神京而建社竊先王之徽號備中國之禮容驅駕英賢窺天下然其器識高爽風骨魁奇姚興覩之而醉心宋祖聞之而動色豈陰山之韞異氣不然何以致斯乎雖雄略過人而凶殘未革飾非距諫酷害朝臣部內囂然忠良卷舌滅亡之禍宜在厥身猶及其嗣非不幸也贊曰淳維遠裔名王之餘嘯羣龍漠乘釁侵漁爰創宮宇易彼廬雖弄神器猶曰凶渠
