body:
  text: 晉書卷一百二十七載記第二十七慕容德慕容德字玄明皓之少子也母公孫氏夢日入臍中晝寢而生德年未弱冠身長八尺二寸姿貌雄偉額有日角偃月重文博觀羣書性清慎多才藝慕容俊之僭立也封為梁公歷幽州刺史左衛將軍及暐嗣位改封范陽王稍遷魏尹加散騎常侍俄而苻堅將苻雙據陝以叛堅將苻柳起兵枹罕將應之德勸暐乘釁討堅辭旨慷慨識者言其有遠略暐竟不能用德兄垂甚壯之因共論軍國大謀言必切至垂謂之曰汝器識長進非復吳下阿蒙也枋頭之役德以征南將軍與垂擊敗晉師及垂奔苻堅德坐免職後遇暐敗徙于長安苻堅以為張掖太守數歲免歸及堅以兵臨江拜德為奮威將軍堅之敗也堅與張夫人相失慕容暐將護致之德正色謂暐曰昔楚莊滅陳納巫臣之諫而棄夏姬此不祥之人惑亂人主戎事不邇女器秦之敗師當由於此宜掩目而過奈何將衛之也暐不從德馳馬而去之還次滎陽言於暐曰昔句踐棲於會稽終獲吳國聖人相時而動百舉百全天將悔禍故使秦師喪敗宜乘其弊以復社稷暐不納乃從垂如鄴及垂稱燕王以德為車騎大將軍復封范陽王居中鎮衛參斷政事久之遷司徒于時慕容永據長子有衆十萬垂議討之羣臣咸以為疑德進曰昔三祖積德遺詠在耳故陛下龍飛不謀而會雖由聖武亦緣舊愛燕趙之士樂為燕臣也今永既建僞號扇動華戎致令羣豎從橫逐鹿不息宜先除之以一衆聽昔光武馳蘇茂之難不顧百官之疲夫豈不仁機急故也兵法有不得已而用之陛下容得已乎垂笑謂其黨曰司徒議與吾同二人同心其利斷金吾計決矣遂從之垂臨終敕其子寶以鄴城委德寶既嗣位以德為使持節都督冀兗青徐荊豫六州諸軍事特進車騎大將軍冀州牧領南蠻校尉鎮鄴罷留臺以都督專總南夏魏將拓拔章攻鄴德遣南安王慕容青等夜擊敗之魏師退次新城青等請擊之別駕韓創進曰古人先決勝廟堂然後攻戰今魏不可擊者四燕不宜動者三魏懸軍遠入利在野戰一不可擊也深入近畿頓兵死地二不可擊也前鋒既敗後陳方固三不可擊也彼衆我寡四不可擊也官軍自戰其地一不宜動動而不勝衆心難固二不宜動城郭未修敵來無備三不宜動此皆兵家所忌不如深溝高壘以逸待勞彼千里餽糧野無所掠久則三軍靡資攻則衆旅多斃師老釁生詳而圖之可以捷矣德曰韓別駕之言良平之策也於是召青還師魏又遣遼西公賀賴盧率騎與章圍鄴德遣其參軍劉藻請救於姚興且參母兄之問而興師不至衆大懼德於是親饗戰士厚加撫接人感其恩皆樂為致死會章盧內相乖爭各引軍潛遁章司馬丁建率衆來降言章師老可以敗之德遣將追破章軍人心始固時魏師入中山慕容寶出奔于薊慕容詳又僭號會劉藻自姚興而至興太史令高魯遣其甥王景暉隨藻送玉璽一紐并圖讖祕文曰有德者昌無德者亡德受天命柔而復剛又有謠曰大風蓬勃揚塵埃八井三刀卒起來四海鼎沸中山穨惟有德人據三臺於是德之羣臣議以慕容詳僭號中山魏師盛于冀州未審寶之存亡因勸德即尊號德不從會慕容達自龍城奔鄴稱寶猶存羣議乃止尋而寶以德為丞相領冀州牧承制南夏德兄子麟自義臺奔鄴因說德曰中山既沒魏必乘勝攻鄴雖糧儲素積而城大難固且人情沮動不可以戰及魏軍未至擁衆南渡就魯陽王和據滑臺而聚兵積穀伺隙而動計之上也魏雖拔中山勢不久留不過驅掠而返人不樂徙理自生變然後振威以援之魏則內外受敵使戀舊之士有所依憑廣開恩信招集遺黎可一舉而取之先是慕容和亦勸德南徙於是許之隆安二年乃率戶四萬車二萬七千乘自鄴將徙于滑臺遇風船沒魏軍垂至衆懼議欲退保黎陽其夕流澌凍合是夜濟師旦魏師至而冰泮若有神焉遂改黎陽津為天橋津及至滑臺景星見于尾箕漳水得白玉狀若璽於是德依燕元故事稱元年大赦境內殊死已下置百官以慕容麟為司空領尚書令慕容法為中軍將軍慕輿拔為尚書左僕射丁通為尚書右僕射自餘封授各有差初河間有麟見慕容麟以為己瑞及此潛謀為亂事覺賜死其夏魏將賀賴盧率衆附之至是慕容寶自龍城南奔至黎陽遣其中黃門令趙思召慕容鍾來迎鍾本首議勸德稱尊號聞而惡之執思付獄馳使白狀德謂其下曰卿等前以社稷大計勸吾攝政吾亦以嗣帝奔亡人神曠主故權順羣議以繫衆望今天方悔禍嗣帝得還吾將具駕奉迎謝罪行闕然後角巾私第卿等以為何如其黃門侍郎張華進曰夫爭奪之世非雄才不振從橫之時豈懦夫能濟陛下若蹈匹婦之仁捨天授之業威權一去則身首不保何退讓之有乎德曰吾以古人逆取順守其道未足所以中路徘徊悵然未決耳慕輿護請馳問寶虛實德流涕而遣之乃率壯土數百隨思而北因謀殺寶初寶遣思之後知德攝位懼而北奔護至無所見執思而還德以思間習典故將任之思曰昔關羽見重曹公猶不忘先主之恩思雖刑餘賤隸荷國寵靈犬馬有心而況人乎乞還就上以明微節德固留之思怒曰周室衰微晉鄭夾輔漢有七國之難實賴梁王殿下親則叔父位則上台不能率先羣后以匡王室而幸根本之傾為趙倫之事思雖無申胥哭秦之效猶慕君賓不生莽世德怒斬之晉南陽太守閭丘羡寧朔將軍鄧啓方率衆二萬來伐師次管城德遣其中軍慕容法撫軍慕容和等距之王師敗績德怒法不窮追晉師斬其撫軍司馬靳瓌初苻登既為姚興所滅登弟廣率部落降於德拜冠軍將軍處之乞活堡會熒惑守東井或言秦當復興者廣乃自稱秦王敗德將慕容鍾時德始都滑臺介于晉魏之間地無十城衆不過數萬及鍾喪師反側之徒多歸于廣德乃留慕容和守滑臺親率衆討廣斬之初寶之至黎陽也和長史李辨勸和納之和不從辨懼謀泄乃引晉軍至管城冀德親率師於後作亂會德不出愈不自安及德此行也辨又勸和反和不從辨怒殺和以滑臺降于魏時將士家悉在城內德將攻之韓範言於德曰魏師已入城據國成資客主之勢翻然復異人情既危不可以戰宜先據一方為關中之基然後畜力而圖之計之上也德乃止德右衛將軍慕容雲斬李辨率將士家纍二萬餘人而出三軍慶悅德謀於衆曰苻廣雖平而撫軍失據進有強敵退無所託計將安出張華進曰彭城阻帶山川楚之舊都地嶮人殷可攻而據之以為基本慕容鍾慕輿護封逞韓創等固勸攻滑臺潘聰曰滑臺四通八達非帝王之居且北通大魏西接強秦此二國者未可以高枕而待之彭城土曠人稀地平無嶮晉之舊鎮必距王師又密邇江淮水路通浚秋夏霖潦千里為湖且水戰國之所短吳之所長今雖克之非久安之計也青齊沃壤號曰東秦土方二千戶餘十萬四塞之固負海之饒可謂用武之國三齊英傑蓄志以待孰不思得明主以立尺寸之功廣固者曹嶷之所營山川阻峻足為帝王之都宜遣辨士馳說于前大兵繼進于後辟閭渾昔負國恩必翻然向化如其守迷不順大軍臨之自然瓦解既據之後閉關養鋭伺隙而動此亦二漢之有關中河內也德猶豫未決沙門朗公素知占候德因訪其所適朗曰敬覽三策潘尚書之議可謂興邦之術矣今歲初長星起於奎婁遂掃虛危而虛危齊之分野除舊布新之象宜先定舊魯巡撫琅邪待秋風戒節然後北轉臨齊天之道也德大悅引師而南兗州北鄙諸縣悉降置守宰以撫之存問高年軍無私掠百姓安之牛酒屬路德遣使喻齊郡太守辟閭渾渾不從遣慕容鍾率步騎二萬擊之德進據琅邪徐兗之士附者十餘萬自琅邪而北迎者四萬餘人德進寇莒城守將任安委城而遁以潘聰鎮莒城鍾傳檄青州諸郡曰隆替有時義列昔經困難啓聖事彰中籙是以宣王龍飛於危周光武鳳起於絶漢斯蓋曆數大期帝王之興廢也自我永康多難長鯨逸網華夏四分黎元五裂逆賊辟閭渾父蔚昔同段龕阻亂淄川太宰東征勦絶凶命渾於覆巢之下蒙全卵之施曾微犬馬識養之心復襲凶父樂禍之志盜據東秦遠附吳越割剝黎元委輸南海皇上應期大命再集矜彼營丘暫阻王略故以七州之衆二十餘萬巡省岱宗問罪齊魯昔韓信以裨將伐齊有征無戰耿弇以偏軍討步克不移朔況以萬乘之師掃一隅之寇傾山碎卵方之非易孤以不才忝荷先驅都督元戎一十二萬皆烏丸突騎三河猛士奮劍與夕火爭光揮戈與秋月競色以此攻城何城不克以此衆戰何敵不平昔竇融以河西歸漢榮被於後裔彭寵盜逆漁陽身死於奴僕近則曹嶷跋扈見擒於後趙段龕干紀取滅於前朝此非古今之吉凶已然之成敗乎渾若先迷後悟榮寵有加如其敢抗王師敗滅必無遺燼稷下之雄岱北之士有能斬送渾者賞同佐命脫履機不發必玉石俱摧渾聞德軍將至徙八千餘家入廣固諸郡皆承檄降德渾懼將妻子奔于魏德遣射聲校尉劉綱追斬於莒城渾參軍張瑛常與渾作檄辭多不遜及此德擒而讓之瑛神色自若徐對曰渾之有臣猶韓信之有蒯通通遇漢祖而蒙恕臣遭陛下而嬰戮比之古人竊為不幸防風之誅臣實甘之但恐堯舜之化未弘於四海耳德初善其言後竟殺之德遂入廣固四年僭即皇帝位于南郊大赦改元為建平設行廟於宮南遣使奉策告成焉進慕容鍾為司徒慕輿拔為司空封孚為左僕射慕輿護為右僕射遣其度支尚書封愷中書侍郎封逞觀省風俗所在大饗將士以其妻段氏為皇后建立學官簡公卿已下子弟及二品士門二百人為太學生後因宴其羣臣酒酣笑而言曰朕雖寡薄恭己南面而朝諸侯在上不驕夕惕於位可方自古何等主也其青州刺史鞠仲曰陛下中興之聖后少康光武之儔也德顧命左右賜仲帛千匹仲以賜多為讓德曰卿知調朕朕不知調卿乎卿飾對非實故亦以虛言相賞賞不謬加何足謝也韓範進曰臣聞天子無戲言忠臣無妄對今日之論上下相欺可謂君臣俱失德大悅賜範絹五十匹自是昌言競進朝多直士矣德母兄先在長安遣平原人杜弘如長安問存否弘曰臣至長安若不奉太后動止便即西如張掖以死為效臣父雄年踰六十未沾榮貴乞本縣之祿以申烏鳥之情張華進曰杜弘未行而求祿要利情深不可使也德曰吾方散所輕之財招所重之死況為親尊而可吝乎且弘為君迎親為父求祿雖外如要利內實忠孝乃以雄為平原令弘至張掖為盜所殺德聞而悲之厚撫其妻子明年德如齊城登營丘望晏嬰冢顧謂左右曰禮大夫不逼城葬平仲古之賢人達禮者也而生居近市死葬近城豈有意乎青州秀才晏謨對曰孔子稱臣先人平仲賢則賢矣豈不知高其梁豐其禮蓋政在家門故儉以矯世存居湫隘卒豈擇地而葬乎所以不遠門者猶冀悟平生意也遂以謨從至漢城陽景王廟宴庶老于申池北登社首山東望鼎足因目牛山而歎曰古無不死愴然有終焉之志遂問謨以齊之山川丘陵賢哲舊事謨歷對詳辨畫地成圖德深嘉之拜尚書郎立冶於商山置鹽官于烏常澤以廣軍國之用德故吏趙融自長安來始具母兄凶問德號慟吐血因而寢疾其司隸校尉慕容達因此謀反遣牙門皇璆率衆攻端門殿中師侯赤眉開門應之中黃門孫進扶德踰城隱於進舍段宏等聞宮中有變勒兵屯四門德入宮誅赤眉等達懼而奔魏慕容法及魏師戰于濟北之摽榆谷魏師敗績其尚書韓創上疏曰二寇逋誅國恥未雪關西為豺狼之藪揚越為鴟梟之林三京社稷鞠為丘墟四祖園陵蕪而不守豈非義夫憤歎之日烈士忘身之秋而皇室多難威略未振是使長蛇弗翦封豕假息人懷憤慨常謂一日之安不可以永久終朝之逸無卒歲之憂陛下中興大業務在遵養矜遷萌之失土假長復而不役愍黎庶之息肩貴因循而不擾斯可以保寧于營丘難以經措于秦越今羣凶僭逆實繁有徒據我三方伺國瑕釁深宜審量虛實大校成敗養兵厲甲廣農積糧進為雪恥討寇之資退為山河萬全之固而百姓因秦晉之弊迭相蔭冒或百室合戶或千丁共籍依託城社不懼燻燒公避課役擅為姦宄損風毀憲法所不容但檢令未宣弗可加戮今宜隱實黎萌正其編貫庶上增皇朝理物之明下益軍國兵資之用若蒙採納冀裨山海雖遇商鞅之刑悅綰之害所不辭也德納之遣其車騎將軍慕容鎮率騎三千緣邊嚴防備百姓逃竄以創為使持節散騎常侍行臺尚書巡郡縣隱實得蔭戶五萬八千創公廉正直所在野次人不擾焉德大集諸生親臨策試既而饗宴乘高遠矚顧謂其尚書魯邃曰齊魯固多君子當昔全盛之時接慎巴生淳于鄒田之徒蔭修檐臨清沼馳朱輪佩長劍恣非馬之雄辭奮談天之逸辨指麾則紅紫成章俯仰則丘陵生韵至於今日荒草穨墳氣消煙滅永言千載能不依然邃答曰武王封比干之墓漢祖祭信陵之墳皆留心賢哲每懷往事陛下慈深二主澤被九泉若使彼而有知寧不銜荷矣先是妖賊王始聚衆于太山自稱太平皇帝號其父為太上皇兄為征東將軍弟征西將軍慕容鎮討擒之斬於都市臨刑或問其父及兄弟所在始答曰太上皇帝蒙塵於外征東征西亂兵所害惟朕一身獨無聊賴其妻怒之曰止坐此口以至於此奈何復爾始曰皇后自古豈有不破之家不亡之國邪行刑者以刀鐶築之仰視曰崩即崩矣終不改帝號德聞而哂之時桓玄將行篡逆誅不附己者冀州刺史劉軌襄城太守司馬休之征虜將軍劉敬宣廣陵相高雅之江都長張誕並內不自安皆奔於德於是德中書侍郎韓範上疏曰夫帝王之道必崇經略有其時無其人則弘濟之功闕有其人無其時則英武之志不申至於能成王業者惟人時合也自晉國內難七載于茲桓玄逆篡虐踰董卓神怒人怨其殃積矣可乘之機莫過此也以陛下之神武經而緯之驅樂奮之卒接厭亂之機譬猶聲發響應形動影隨未足比其易也且江淮南北戶口未幾公私戎馬不過數百守備之事蓋亦微矣若以步騎一萬建雷霆之舉卷甲長驅指臨江會必望旗草偃壺漿屬路跨地數千衆踰十萬可以西并強秦北抗大魏夫欲拓境開疆保寧社稷無過今也如使後機失會豪桀復起梟除桓玄布惟新之化遐邇既寧物無異望非但建鄴難屠江北亦不可冀機過患生憂必至矣天與不取悔將及焉惟陛下覽之德曰自頃數纏百六宏綱暫弛遂令姦逆亂華舊京墟穢每尋否運憤慨兼懷昔少康以一旅之衆復夏配天況朕據三齊之地藉五州之衆教之以軍旅訓之以禮讓上下知義人思自奮繕甲待釁為日久矣但欲先定中原掃除逋孽然後宣布淳風經理九服飲馬長江懸旌隴坂此志未遂且韜戈耳今者之事王公其詳議之咸以桓玄新得志未可圖乃止於是講武於城西步兵三十七萬車一萬七千乘鐵騎五萬三千周亘山澤旌旗彌漫鉦鼓之聲振動天地德登高望之顧謂劉軌高雅之曰昔郤克忿齊子胥怨楚終能暢其剛烈名流千載卿等既知投身有道當使無慚昔人也雅之等頓首答曰幸蒙陛下天覆之恩大造之澤存亡繼絶實在聖時雖則萬隕何以上報俄聞桓玄敗德以慕容鎮為前鋒慕容鍾為大都督配以步卒二萬騎五千剋期將發而德寢疾於是罷兵初德迎其兄子超于長安及是而至德夜夢其父曰汝既無子何不早立超為太子不爾惡人生心寤而告其妻曰先帝神明所敕觀此夢意吾將死矣乃下書以超為皇太子大赦境內子為父後者人爵二級其月死即義熙元年也時年七十乃夜為十餘棺分出四門潛葬山谷竟不知其尸之所在在位五年僞諡獻武皇帝
