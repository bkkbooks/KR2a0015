body:
  text: 晉書卷一百十二載記第十二苻洪苻洪字廣世略陽臨渭氐人也其先蓋有扈之苗裔世為西戎酋長始其家池中蒲生長五丈五節如竹形時咸謂之蒲家因以為氏焉父懷歸部落小帥先是隴右大雨百姓苦之謠曰雨若不止洪水必起故因名曰洪好施多權略驍武善騎射屬永嘉之亂乃散千金召英傑之士訪安危變通之術宗人蒲光蒲突遂推洪為盟主劉曜僭號長安光等逼洪歸曜拜率義侯曜敗洪西保隴山石季龍將攻上邽洪又請降季龍大悅拜冠軍將軍委以西方之事季龍滅石生洪說季龍宜徙關中豪傑及羌戎內實京師季龍從之以洪為龍驤將軍流人都督處于枋頭纍有戰功封西平郡公其部下賜爵關內侯者二千餘人以洪為關內領侯將冉閔言於季龍曰苻洪雄果其諸子並非常才宜密除之季龍待之愈厚及石遵即位閔又以為言遵乃去洪都督餘如前洪怨之乃遣使降晉後石鑒殺遵所在兵起洪有衆十餘萬永和六年帝以洪為征北大將軍都督河北諸軍事冀州刺史廣川郡公時有說洪稱尊號者洪亦以讖文有草付應王又其孫堅背有草付字遂改姓苻氏自稱大將軍大單于三秦王洪謂博士胡文曰孤率衆十萬居形勝之地冉閔慕容俊可指辰而殄姚襄父子克之在吾數中孤取天下有易於漢祖初季龍以麻秋鎮枹罕冉閔之亂秋歸鄴洪使子雄擊而獲之以秋為軍師將軍秋說洪西都長安洪深然之既而秋因宴鴆洪將并其衆世子健收而斬之洪將死謂健曰所以未入關者言中州可指時而定今見困豎子中原非汝兄弟所能辦關中形勝吾亡後便可鼓行而西言終而死年六十六健僭位僞諡惠武帝苻健苻健字建業洪第三子也初母姜氏夢大羆而孕之及長勇果便弓馬好施善事人甚為石季龍父子所親愛季龍雖外禮苻氏心實忌之乃陰殺其諸兄而不害健也及洪死健嗣位去秦王之號稱晉爵遣使告喪于京師且聽王命時京兆杜洪竊據長安自稱晉征北將軍雍州刺史戎夏多歸之健密圖關中懼洪知之乃僞受石祗官繕宮室於枋頭課所部種麥示無西意有知而不種者健殺之以徇既而自稱晉征西大將軍都督關中諸軍事雍州刺史盡衆西行起浮橋於盟津以濟遣其弟雄率步騎五千入潼關兄子菁自軹關入河東健執菁手曰事若不捷汝死河北我死河南不及黃泉無相見也既濟焚橋自統大衆繼雄而進杜洪遣其將張先要健於潼關健逆擊破之健雖戰勝猶修箋于洪并送名馬珍寶請至長安上尊號洪曰幣重言甘誘我也乃盡召關中之衆來距健筮之遇泰之臨健曰小往大來吉亨昔往東而小今還西而大吉孰大焉是時衆星夾河西流占者以為百姓還西之象健遂進軍次赤水遣雄略地渭北又敗張先於陰槃擒之諸城盡陷菁所至無不降者三輔略定健引兵至長安洪奔司竹健入而都之遣使獻捷京師并修好於桓溫健軍師將軍賈玄碩等表健為侍中大都督關中諸軍事大單于秦王健怒曰我官位輕重非若等所知既而潛使諷玄碩等使上尊號永和七年僭稱天王大單于赦境內死罪建元皇始繕宗廟社稷置百官于長安立妻強氏為天王皇后子萇為天王皇太子弟雄為丞相都督中外諸軍事車騎大將軍領雍州刺史自餘封授各有差初杜洪之奔也招晉梁州刺史司馬勳至是勳率步騎三萬入秦川健敗之於五丈原八年健僭即皇帝位于太極前殿諸公進為王以大單于授其子萇杜洪屯宜秋為其將張琚所殺琚自立為秦王置百官健率步騎二萬攻琚斬其首健至自宜秋遣雄菁率衆掠關東并援石季龍豫州刺史張遇於許昌與晉鎮西將軍謝尚戰于潁水之上王師敗績雄乘勝逐北至于壘門殺傷太半遂虜遇及其衆歸于長安拜遇司空豫州刺史鎮許昌雄攻王擢於隴上擢奔涼州雄屯隴東張重華拜擢征東大將軍使與其將張弘宋修連兵伐雄雄與菁率衆擊敗之獲弘修送長安初張遇自許昌來降健納遇後母韓氏為昭儀每於衆中謂遇曰卿吾子也遇慚恨引關中諸將欲以雍州歸順乃與健中黃門劉晃謀夜襲健事覺遇害於是孔特起池陽劉珍夏侯顯起鄠喬景起雍胡陽赤起司竹呼延毒起霸城衆數萬人並遣使詣征西桓溫中軍殷浩請救雄遣菁掠上洛郡於豐陽縣立荊州以引南金奇貨弓竿漆蠟通關市來遠商於是國用充足而異賄盈積矣十年溫率衆四萬趨長安遣別將從均口入淅川攻上洛執健荊州刺史郭敬而遣司馬勳掠西鄙健遣其子萇率雄菁等衆五萬距溫于堯柳城愁思堆溫轉戰而前次于灞上萇等退營城南健以羸兵六千固守長安小城遣精鋭三萬為游軍以距溫三輔郡縣多降于溫健別使雄領騎七千與桓沖戰于白鹿原王師敗績又破司馬勳于子午谷初健聞溫之來也收麥清野以待之故溫衆大飢至是徙關中三千餘戶而歸及至潼關又為萇等所敗司馬勳奔還漢中其年西虜乞沒軍邪遣子入侍健于是置來賓館于平朔門以懷遠人起靈臺於杜門與百姓約法三章薄賦卑宮垂心政事優禮耆老修尚儒學而關右稱來蘇焉新平有長人見語百姓張靖曰苻氏應天受命今當太平外面者歸中而安泰問姓名弗答俄而不見新平令以聞健以為妖下靖獄會大雨霖河渭溢蒲津監寇登得一屐於河長七尺三寸人跡稱之指長尺餘文深一寸健歎曰覆載之中何所不有張靖所見定不虛也赦之蝗蟲大起自華澤至隴山食百草無遺牛馬相噉毛猛獸及狼食人行路斷絶健自蠲百姓租稅減膳徹懸素服避正殿初桓溫之入關也其太子萇與溫戰為流矢所中死至是立其子生為太子健寢疾菁勒兵入東宮將殺苻生自立時生侍健疾菁以健為死回攻東掖門健聞變升端門陳兵衆皆舍杖逃散執菁殺之數日健死時年三十九在位四年僞諡明皇帝廟號世宗後改曰高祖苻生苻雄王墮生字長生健第三子也幼而無賴祖洪甚惡之生無一目為兒童時洪戲之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚也洪大驚鞭之生曰性耐刀槊不堪鞭捶洪曰汝為爾不已吾將以汝為奴生曰可不如石勒也洪懼跣而掩其口謂健曰此兒狂勃宜早除之不然長大必破人家健將殺之雄止之曰兒長成自當修改何至便可如此健乃止及長力舉千鈞雄勇好殺手格猛獸走及奔馬擊刺騎射冠絶一時桓溫之來伐也生單馬入陳搴旗斬將者前後十數萇既死健以讖言三羊五眼應符故立為太子健卒僭即皇帝位大赦境內改年壽光時永和十二年也尊其母強氏為皇太后立妻梁氏為皇后以呂婆樓為侍中左大將軍苻安領太尉苻柳為征東大將軍并州牧鎮蒲坂苻謏為鎮東大將軍豫州牧鎮陝城自餘封授有差初生將強懷與桓溫戰沒其子延未及封而健死會生出游懷妻樊氏於道上書論懷忠烈請封其子生怒射而殺之僞中書監胡文中書令王魚言於生曰比頻有客星孛于大角熒惑入于東井大角為帝坐東井秦之分野於占不出三年國有大喪大臣戮死願陛下遠追周文修德以禳之惠和羣臣以成康哉之美生曰皇后與朕對臨天下亦足以塞大喪之變毛太傅梁車騎梁僕射受遺輔政可謂大臣也於是殺其妻梁氏及太傅毛貴車騎尚書令梁楞左僕射梁安未幾又誅侍中丞相雷弱兒及其九子二十七孫諸羌悉叛弱兒南安羌酋也剛鯁好直言見生嬖臣趙韶董榮亂政每大言於朝故榮等譖而誅之生雖在諒暗游飲自若荒耽淫虐殺戮無道常彎弓露刃以見朝臣錘鉗鋸鑿備置左右又納董榮之言誅其司空王墮以應日蝕之災饗羣臣于太極前殿飲酣樂奏生親歌以和之命其尚書令辛牢典勸既而怒曰何不強酒猶有坐者引弓射牢而殺之於是百僚大懼無不引滿昏醉汙服失冠蓬頭僵仆生以為樂生聞張祚見殺玄靚幼沖命其征東苻柳參軍閻負梁殊使涼州以書喻之負殊至姑臧玄靚年幼不見殊等其涼州牧張瓘謂負殊曰孤之本朝世執忠節遠宗大晉臣無境外之交君等何為而至負殊曰晉王以鄰藩義好有自來矣雖擁阻山河然風通道會不欲使羊陸二公獨美於前主上以欽明紹統八表宅心光被四海格于天地晉王思與張王齊曜大明交玉帛之好兼與君公同金蘭之契是以不遠而來有何怪乎瓘曰羊陸一時之事亦非純臣之義也本朝六世重光固忠不二若與苻征東交玉帛之好者便是上違先公純誠雅志下乖河右遵奉之情負殊曰昔微子去殷項伯歸漢雖背君違親前史美其先覺亡晉之餘遠逃江會天命去之淪絶已久故尊先王翻然改圖北面二趙蓋神算無方鑒機而作君公若欲稱制河西衆旅非秦之敵如欲宗歸遺晉深乖先君雅旨孰若遠蹤竇融附漢之規近述先王歸趙之事垂祚無窮永享遐祉乎瓘曰中州無信好食誓言往與石氏通好旋見寇襲中國之風誡在昔日不足復論通和之事也負殊曰三王異政五帝殊風趙多姦詐秦以義信豈可同年而語哉張先楊初皆擅兵一方不供王貢先帝命將擒之宥其難恕之罪加以爵封之榮今上道合二儀慈弘山海信符陰陽御物無際不可以二趙相況也瓘曰秦若兵強化盛自可先取江南天下自然盡為秦有何辱征東之命負殊曰先帝以大聖神武開構鴻基強燕納款八州順軌主上欽明道必隆世慨徽號擁于河西正朔未加吳會以吳必須兵涼可以義故遣行人先申大好如君公不能蹈機而發者正可緩江南數年之命回師西旆恐涼州弗可保也瓘曰我跨據三州帶甲十萬西包崑域東阻大河伐人有餘而況自固秦何能為患負殊曰貴州險塞孰若崤函五郡之衆何如秦雍張琚杜洪因趙之成資據天阻之固策三秦之鋭藉陸海之饒徑士風集驍騎如雲自謂天下可平關中可固先帝神矛一指望旗冰解人詠來蘇不覺易主燕雖武視關東猶以地勢之義逆順之理北面稱藩貢不踰月致肅慎楛矢通九夷之珍單于屈膝名王內附控弦之士百有餘萬鼓行而濟西河者君公何以抗之盍追遵先王臣趙故事世享大美為秦之西藩瓘曰然秦之德義加於天下江南何以不賓負殊曰文身之俗負阻江山道汙先叛化盛後賓自古而然豈但今也故詩曰蠢爾蠻荊大邦為仇言其不可以德義懷也瓘曰秦據漢舊都地兼將相文武輔臣領袖一時者誰也負殊曰皇室懿藩忠若公旦者則大司馬武都王安征東大將軍晉王柳文武兼才神器秀拔入可允釐百工出能折衝萬里者衛大將軍廣平王黃眉後將軍清河王法龍驤將軍東海王堅之兄弟其耆年碩德德侔尚父者則太師録尚書事廣寧公魚遵其清素剛嚴骨鯁貞亮則左光祿大夫強平金紫光祿程肱牛夷博聞強識探賾索幽則中書監胡文中書令王魚黃門侍郎李柔雄毅厚重權智無方則左衛將軍李威右衛將軍苻雅才識明達令行禁止則特進領御史中丞梁平老特進光祿大夫強汪侍中尚書呂婆樓文史富贍鬱為文宗則尚書右僕射董榮祕書監王揚著作郎梁讜驍勇多權略攻必取戰必勝關張之流萬人之敵者則前將軍新興王飛建節將軍鄧羌立忠將軍彭越安遠將軍范俱難建武將軍徐盛常伯納言卿校牧守則人皆文武莫非才賢其餘懷經世之才蘊佐時之略守南山之操遂而不奪者王猛朱肜之倫相望於巖谷濟濟多士焉可罄言姚襄張平一時之傑各擁衆數萬狼顧偏方皆委忠獻款請為臣妾小不事大春秋所誅惟君公圖之瓘笑曰此事決之主上非身所了負殊曰涼王雖天縱英睿然尚幼沖君公居伊霍之任安危所繫見機之義實在君公瓘新輔政河西所在兵起懼秦師之至乃言於玄靚遣使稱藩生因其所稱而授之慕容俊遣將慕輿長卿等率衆七千入自軹關攻幽州刺史張哲于裴氏堡晉將軍劉度等率衆四千攻青州刺史袁朗于盧氏生遣其前將軍苻飛距晉建節鄧羌距燕飛未至而度退羌及長卿戰于堡南大敗之獲長卿及甲首二千七百餘級姚襄率衆萬餘攻其平陽太守苻産于胸奴堡苻柳救之為襄所敗引還蒲坂襄遂攻堡克之殺苻産盡坑其衆遣使從生假道將還隴西生將許之苻堅諫曰姚襄人傑也今還隴西必為深害不如誘以厚利伺隙而擊之生乃止遣使拜襄官爵襄不受斬其使者焚所送章策寇掠河東生怒命其大將軍張平討之襄乃卑辭厚幣與平結為兄弟平更與襄通和生發三輔人營渭橋金紫光祿大夫程肱以妨農害時上疏極諫生怒殺之長安大風發屋拔樹行人顛頓宮中奔擾或稱賊至宮門晝閉五日乃止生推告賊者殺之刳而出其心左光祿大夫強平諫曰元正盛旦日有蝕之正陽神朔昏風大起兼水旱不時獸災未息此皆由陛下不勉強於政事乖和氣所致也願陛下務養元元平章百姓棄纖介之嫌含山嶽之過致敬宗社愛禮公卿去秋霜之威垂三春之澤則姦回寢止妖祲自消乾靈祗祐皇家永保無窮之美矣生怒以為妖言鑿其頂而殺之平之囚也僞衛將軍苻黃眉前將軍苻飛建節鄧羌侍宴禁中叩頭固諫以太后為言平即生母強氏之弟也生既弗許強氏憂恨而死生下書曰朕受皇天之命承祖宗之業君臨萬邦子育百姓嗣統已來有何不善而謗讟之音扇滿天下殺不過千而謂刑虐行者比肩未足為稀方當峻刑極罰復如朕何時猛獸及狼大暴晝則斷道夜則發屋惟害人而不食六畜自生立一年獸殺七百餘人百姓苦之皆聚而邑居為害滋甚遂廢農桑內外凶懼羣臣奏請禳灾生曰野獸飢則食人飽當自止終不能纍年為患也天豈不子愛羣生而年年降罰正以百姓犯罪不已將助朕專殺而施刑教故耳但勿犯罪何為怨天而尤人哉生如阿房遇兄與妹俱行者逼令為非禮不從生怒殺之又宴羣臣于咸陽故城有後至者皆斬之嘗使太醫令程延合安胎藥問人參好惡并藥分多少延曰雖小小不具自可堪用生以為譏其目鑿延目出然後斬之有司奏太白犯東井東井秦之分也太白罰星必有暴兵起于京師生曰星入井者必將渴耳何所怪乎姚襄遣姚蘭王欽盧等招動鄜城定陽北地芹川諸羌胡皆應之有衆二萬七千進據黃落生遣苻黃眉苻堅鄧羌率步騎萬五千討之襄深溝高壘固守不戰鄧羌說黃眉曰傷弓之鳥落於虛發襄頻為桓溫張平所敗鋭氣喪矣今謀固壘不戰是窮寇也襄性剛很易以剛動若長驅鼓行直壓其壘襄必忿而出師可一戰擒也黃眉從之遣羌率騎三千軍於壘門襄怒盡鋭出戰羌僞不勝引騎而退襄追之于三原羌回騎距襄俄而黃眉與堅至大戰斬之盡俘其衆黃眉等振旅而歸黃眉雖有大功生不加旌賞每於衆中辱之黃眉怒謀殺生自立事發伏誅其王公親戚多有死者初生夢大魚食蒲又長安謠曰東海大魚化為龍男便為王女為公問在何所洛門東東海苻堅封也時為龍驤將軍第在洛門之東生不知是堅以謠夢之故誅其侍中太師録尚書事魚遵及其七子十孫時又謠曰百里望空城鬱鬱何青青瞎兒不知法仰不見天星於是悉壞諸空城以禳之金紫光祿大夫牛夷懼不免禍請出鎮上洛生曰卿忠肅篤敬宜左右朕躬豈有外鎮之理改授中軍夷懼歸而自殺初生少凶暴嗜酒健臨死恐其不能保全家業誡之曰酋帥大臣若不從汝命可漸除之及即僞位殘虐滋甚耽湎於酒無復晝夜羣臣朔望朝謁罕有見者或至暮方出臨朝輒怒惟行殺戮動連月昏醉文奏因之遂寢納姦佞之言賞罰失中左右或言陛下聖明宰世天下惟歌太平生曰媚于我也引而斬之或言陛下刑罰微過曰汝謗我也亦斬之所幸妻妾小有忤旨便殺之流其尸于渭水又遣宮人與男子裸交於殿前生剝牛羊驢馬活爓雞豚鵝三五十為羣放之殿中或剝死囚面皮令其歌舞引羣臣觀之以為嬉樂宗室勳舊親戚忠良殺害略盡王公在位者悉以疾告歸人情危駭道路以目既自有目疾其所諱者不足不具少無缺傷殘毀偏隻之言皆不得道左右忤旨而死者不可勝紀至於截脛刳胎拉脅鋸頸者動有千數太史令康權言于生曰昨夜三月並出孛星入於太微遂入于東井兼自去月上旬沈陰不雨迄至于今將有下人謀上之禍深願陛下修德以消之生怒以為妖言撲而殺之生夜對侍婢曰阿法兄弟亦不可信明當除之是夜清河王苻法夢神告之曰旦將禍集汝門惟先覺者可以免之寤而心悸會侍婢來告乃與特進梁平老強汪等率壯士數百人潛入雲龍門苻堅與呂婆樓率麾下三百餘人鼓譟繼進宿衛將士皆舍杖歸堅生猶昏寐未寤堅衆既至引生置於別室廢之為越王俄而殺之生臨死猶飲酒數斗昏醉無所知矣時年二十三在位二年僞諡厲王苻雄字元才洪之季子也少善兵書而多謀略好施下士便弓馬有政術健僭位為佐命元勳權侔人主而謙恭奉法健常曰元才吾姬旦也及卒健哭之歐血曰天不欲吾定四海邪何奪元才之速也子堅別有載記王墮字安生京兆霸城人也博學有雄才明天文圖緯苻洪征梁犢以墮為司馬謂洪曰讖言苻氏應王公其人也洪深然之及為宰相著匪躬之稱健常歎曰天下羣官皆如王令君者陰陽曷不和乎甚敬重之性剛峻疾惡雅好直言疾董榮強國如仇讎每於朝見之際略不與言人謂之曰董尚書貴幸一時公宜降意墮曰董龍是何雞狗而令國士與之言乎榮聞而慚恨遂勸生誅之及刑榮謂墮曰君今復敢數董龍作雞狗乎墮瞋目而叱之龍榮之小字也
