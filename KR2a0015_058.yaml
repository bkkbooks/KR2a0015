body:
  text: 晉書卷五十八列傳第二十八周處子圮圮子協圮弟札札兄子莚周處字子隱義興陽羡人也父魴吳鄱陽太守處少孤未弱冠膂力絶人好馳騁田獵不修細行縱情肆欲州曲患之處自知為人所惡乃慨然有改勵之志謂父老曰今時和歲豐何苦而不樂耶父老歎曰三害未除何樂之有處曰何謂也答曰南山白額猛獸長橋下蛟并子為三矣處曰若此為患吾能除之父老曰子若除之則一郡之大慶非徒去害而已處乃入山射殺猛獸因投水搏蛟蛟或沈或浮行數十里而處與之俱經三日三夜人謂死皆相慶賀處果殺蛟而反聞鄉里相慶始知人患己之甚乃入吳尋二陸時機不在見雲具以情告曰欲自修而年已蹉跎恐將無及雲曰古人貴朝聞夕改君前塗尚可且患志之不立何憂名之不彰處遂勵志好學有文思志存義烈言必忠信克己朞年州府交辟仕吳為東觀左丞孫晧末為無難督及吳平王渾登建鄴宮釃酒既酣謂吳人曰諸君亡國之餘得無戚乎處對曰漢末分崩三國鼎立魏滅於前吳亡於後亡國之戚豈惟一人渾有慚色入洛稍遷新平太守撫和戎狄叛羌歸附雍土美之轉廣漢太守郡多滯訟有經三十年而不決者處詳其枉直一朝決遣以母老罷歸尋除楚內史未之官徵拜散騎常侍處曰古人辭大不辭小乃先之楚而郡既經喪亂新舊雜居風俗未一處敦以教義又檢尸骸無主及白骨在野收葬之然始就徵遠近稱歎及居近侍多所規諷遷御史中丞凡所糾劾不避寵戚梁王肜違法處深文案之及氐人齊萬年反朝臣惡處強直皆曰處吳之名將子也忠烈果毅乃使隸夏侯駿西征伏波將軍孫秀知其將死謂之曰卿有老母可以此辭也處曰忠孝之道安得兩全既辭親事君父母復安得而子乎今日是我死所也萬年聞之曰周府君昔臨新平我知其為人才兼文武若專斷而來不可當也如受制於人此成擒耳既而梁王肜為征西大將軍都督關中諸軍事處知肜不平必當陷己自以人臣盡節不宜辭憚乃悲慨即路志不生還中書令陳準知肜將逞宿憾乃言於朝曰駿及梁王皆是貴戚非將率之才進不求名退不畏咎周處吳人忠勇果徑有怨無援將必喪身宜詔孟觀以精兵萬人為處前鋒必能殄寇不然肜當使處先驅其敗必也朝廷不從時賊屯梁山有衆七萬而駿逼處以五千兵擊之處曰軍無後繼必至覆敗雖在亡身為國取恥肜復命處進討乃與振威將軍盧播雍州刺史解系攻萬年於六陌將戰處軍人未食肜促令速進而絶其後繼處知必敗賦詩曰去去世事已策馬觀西戎藜藿甘粱黍期之克令終言畢而戰自旦及暮斬首萬計弦絶矢盡播系不救左右勸退處按劍曰此是吾效節授命之日何退之為且古者良將受命鑿凶門以出蓋有進無退也今諸軍負信勢必不振我為大臣以身徇國不亦可乎遂力戰而沒追贈平西將軍賜錢百萬葬地一頃京城地五十畝為第又賜王家近田五頃詔曰處母年老加以遠人朕每愍念給其醫藥酒米賜以終年處著默語三十篇及風土記并撰集吳書時潘嶽奉詔作關中詩曰周徇師令身膏齊斧人之云亡貞節克舉又西戎校尉閻纘亦上詩云周全其節令問不已身雖云沒書名良史及元帝為晉王將加處策諡太常賀循議曰處履德清方才量高出歷守四郡安人立政入司百僚貞節不撓在戎致身見危授命此皆忠賢之茂實烈士之遠節案諡法執德不回曰孝遂以諡焉有三子玘靖札靖早卒玘札並知名玘字宣佩強毅沈斷有父風而文學不及閉門潔己不妄交遊士友咸望風敬憚焉故名重一方弱冠州郡命不就刺史初到召為別駕從事虛己備禮方始應命纍薦名宰府舉秀才除議郎太安初妖賊張昌丘沈等聚衆於江夏百姓從之如歸惠帝使監軍華宏討之敗于障山昌等浸盛殺平南將軍羊伊鎮南大將軍新野王歆等所在覆沒昌別率封雲攻徐州石冰攻揚州刺史陳徽出奔冰遂略有揚土玘密欲討冰潛結前南平內史王矩共推吳興太守顧祕都督揚州九郡軍事及江東人士同起義兵斬冰所置吳興太守區山及諸長史冰遣其將羌毒領數萬人距玘玘臨陳斬毒時右將軍陳敏自廣陵率衆助玘斬冰別率趙於蕪湖因與玘俱前攻冰於建康冰北走投封雲雲司馬張統斬雲冰以降徐揚並平玘不言功賞散衆還家陳敏反于揚州以玘為安豐太守加四品將軍玘稱疾不行密遣使告鎮東將軍劉準令發兵臨江己為內應翦髮為信準在壽春遣督護衡彥率衆而東時敏弟昶為廣武將軍歷陽內史以吳興錢廣為司馬玘密諷廣殺昶玘與顧榮甘卓等以兵攻敏敏衆奔潰單馬北走獲之於江乘界斬之於建康夷三族東海王越聞其名召為參軍詔補尚書郎散騎郎並不行元帝初鎮江左以玘為倉曹屬初吳興人錢璯亦起義兵討陳敏越命為建武將軍使率其屬會于京都璯至廣陵聞劉聰逼洛陽畏磱不敢進帝促以軍期璯乃謀反時王敦遷尚書當應徵與璯俱西璯陰欲殺敦藉以舉事敦聞之奔告帝璯遂殺度支校尉陳豐焚燒邸閣自號平西大將軍八州都督劫孫晧子充立為吳王既而殺之來寇玘縣帝遣將軍郭逸都尉宋典等討之並以兵少未敢前玘復率合鄉里義衆與逸等俱進討璯斬之傳首于建康玘三定江南開復王略帝嘉其勳以玘行建威將軍吳興太守封烏程縣侯吳興寇亂之後百姓饑饉盜賊公行玘甚有威惠百姓敬愛之朞年之間境內寧謐帝以玘頻興義兵勳誠並茂乃以陽羡及長城之西鄉丹楊之永世別為義興郡以彰其功焉玘宗族強盛人情所歸帝疑憚之于時中州人士佐佑王業而玘自以為不得調內懷怨望復為刁協輕之恥恚愈甚時鎮東將軍祭酒東萊王恢亦為周顗所侮乃與玘陰謀誅諸執政推玘及戴若思與諸南士共奉帝以經緯世事先是流人帥夏鐵等寓于淮泗恢陰書與鐵令起兵己當與玘以三吳應之建興初鐵已聚衆數百人臨淮太守蔡豹斬鐵以聞恢聞鐵死懼罪奔于玘玘殺之埋于豕牢帝聞而祕之召玘為鎮東司馬未到復改授建武將軍南郡太守玘既南行至蕪湖又下令曰玘奕世忠烈義誠顯著孤所欽喜今以為軍咨祭酒將軍如故進爵為公祿秩僚屬一同開國之例玘忿於回易又知其謀泄遂憂憤發背而卒時年五十六將卒謂子協曰殺我者諸傖子能復之乃吾子也吳人謂中州人曰傖故云耳贈輔國將軍諡曰忠烈子協嗣協字彥和常緘父言時中國亡官失守之士避亂來者多居顯位駕御吳人吳人頗怨協因之欲起兵潛結吳興郡功曹徐馥馥家有部曲協使馥矯稱叔父札命以合衆豪俠樂亂者翕然附之以討王導刁協為名孫晧族人弼亦起兵於廣德以應之馥殺吳興太守袁琇有衆數千將奉札為主時札以疾歸家聞而大驚乃告亂於義興太守孔侃協知札不同不敢發兵馥黨懼攻馥殺之孫弼衆亦潰宣城太守陶猷滅之元帝以周氏奕世豪望吳人所宗故不窮治撫之如舊協為札所責失志歸家淫侈縱恣每謂人曰人生幾時但當快意耳終於臨淮太守協弟彝少知名元帝辟為丞相掾早亡札字宣季性矜險好利外方內荏少以豪右自處州郡辟命皆不就察孝廉除郎中大司馬齊王冏參軍出補句容令遷吳國上軍將軍辟東海王越參軍不就以討錢璯功賜爵漳浦亭侯元帝為丞相表札為寧遠將軍歷陽內史不之職轉從事中郎徐馥平以札為奮武將軍吳興內史録前後功改封東遷縣侯進號征虜將軍監揚州江北軍事東中郎將鎮涂中未之職轉右將軍都督石頭水陸軍事札㸂疾不堪拜固讓經年有司彈奏不得已乃視職加散騎常侍王敦舉兵攻石頭札開門應敦故王師敗績敦轉札為光祿勳尋補尚書頃之遷右將軍會稽內史時札兄靖子懋晉陵太守清流亭侯懋弟莚征虜將軍吳興內史莚弟贊大將軍從事中郎武康縣侯贊弟縉太子文學都鄉侯次兄子協臨淮太守烏程公札一門五侯並居列位吳士貴盛莫與為比王敦深忌之後莚喪母送者千數敦益憚焉及敦疾錢鳳以周氏宗強與沈充權勢相侔欲自託於充謀滅周氏使充得專威揚土乃說敦曰夫有國者患於強逼自古釁難必由之今江東之豪莫強周沈公萬世之後二族必不靜矣周強而多俊才宜先為之所後嗣可安國家可保耳敦納之時有道士李脫者妖術惑衆自言八百歲故號李八百自中州至建鄴以鬼道療病又署人官位時人多信事之弟子李弘養徒灊山云應讖當王故敦使廬江太守李告札及其諸兄子與脫謀圖不軌時莚為敦咨議參軍即營中殺莚及脫弘又遣參軍賀鸞就沈充盡掩殺札兄弟子既而進軍會稽襲札札先不知卒聞兵至率麾下數百人出距之兵散見殺札性貪財好色惟以業産為務兵至之日庫中有精杖外白以配兵札猶惜不與以弊者給之其鄙吝如此故士卒莫為之用及敦死札莚故吏並詣闕訟周氏之冤宜加贈諡事下八坐尚書卞壼議以札石頭之役開門延寇遂使賊敦恣亂札之責也追贈意所未安懋莚兄弟宜復本位司徒王導議以札在石頭忠存社稷義在亡身至於往年之事自臣等有識以上與札情豈有異此言實貫於聖鑒論者見姦逆既彰便欲徵往年已有不臣之漸即復使爾要當時衆所未悟既悟其姦萌札與臣等便以身許國死而後已札亦尋取梟夷朝廷檄命既下大事既定便正以為逆黨邪正失所進退無據誠國體所宜深惜臣謂宜與周顗戴若思等同例尚書令郗鑒議曰夫褒貶臧否宜令體明例通今周戴以死節復位周札以開門同例事異賞均意所疑惑如司徒議謂往年之事自有識以上皆與札不異此為邪正坦然有在昔宋文失禮華樂荷不臣之罰齊靈嬖孽高厚有從昏之戮以古況今譙王周戴宜受若此之責何加贈復位之有乎今據已顯復則札宜貶責明矣導重議曰省令君議必札之開門與譙王周戴異今札開門直出風言竟實事邪便以風言定褒貶意莫若原情考徵也論者謂札知隗協亂政信敦匡救苟匡救信姦佞除即所謂流四凶族以隆人主巍巍之功耳如此札所以忠於社稷也後敦悖謬出所不圖札亦闔門不同以此滅族是其死於為義也夫信敦當時之匡救不圖將來之大逆惡隗協之亂政不失為臣之貞節者于時朝士豈惟周札邪若盡謂不忠懼有誣乎譙王周戴各以死衛國斯亦人臣之節也但所見有同異然期之於必忠故宜申明耳即如令君議宋華齊高其在隗協矣昔子糾之難召忽死之管仲不死若以死為賢則管仲當貶若以不死為賢則召忽死為失先典何以兩通之明為忠之情同也死雖是忠之一目亦不必為忠皆當死也漢祖遺約非劉氏不王非功臣不侯違命天下共誅之後呂后王諸呂周勃從之王陵廷爭可不謂忠乎周勃誅呂尊文安漢社稷忠莫尚焉則王陵又何足言而前史兩為美談固知死與不死爭與不爭苟原情盡意不可定於一概也且札闔棺定諡違逆黨順受戮凶邪不負忠義明矣鑒又駁不同而朝廷竟從導議追贈札衛尉遣使者祠以少牢札長子淡太宰府掾次子稚察孝廉不行莚卓犖有才幹拜征虜將軍吳興太守遷黃門侍郎徐馥之役莚族兄續亦聚衆應之元帝議欲討之王導以為兵少則不足制寇多遣則根本空虛黃門侍郎周莚忠烈至到為一郡所敬意謂直遣莚足能殺續於是詔以力士百人給莚使輕騎還陽羡莚即日取道晝夜兼行既至郡將入遇續於門莚謂續曰宜與君共詣孔府君有所論續不肯入莚逼牽與俱坐定莚謂太守孔侃曰府君何以置賊在坐續衣𩹉帶小刀便操刃逼莚莚叱郡傳教吳曾何不舉手曾有膽力便以刀環築續殺之莚因欲誅協札拒不許委罪於從兄邵誅之莚不歸家省母遂長驅而去母狼狽追之其忠公如此遷太子右衛率及王敦作難加冠軍將軍都督會稽吳興義興晉陵東陽軍事率水軍三千人討沈充未發而王師敗績莚聞札開城納敦憤咤慷慨形于辭色尋遇害敦平後與札同被復官初莚於姑孰立屋五間而六梁一時躍出墮地衡獨立柱頭零節之上甚危雖以人功不能然也後竟覆族莚弟縉少無行檢嘗在建康烏衣道中逢孔氏婢時與同僚二人共載便令左右捉婢上車其強暴若此周訪子撫撫子楚楚子瓊瓊子虓撫弟光光子仲孫周訪字士達本汝南安城人也漢末避地江南至訪四世吳平因家廬江尋陽焉祖纂吳威遠將軍父敏左中郎將訪少沈毅謙而能讓果於斷割周窮振乏家無餘財為縣功曹時陶侃為散吏訪薦為主簿相與結友以女妻侃子瞻訪察孝廉除郎中上甲令皆不之官鄉人盜訪牛於冢間殺之訪得之密埋其肉不使人知及元帝渡江命參鎮東軍事時有與訪同姓名者罪當死吏誤收訪訪奮擊收者數十人皆散走而自歸於帝帝不之罪尋以為揚烈將軍領兵一千二百屯尋陽鄂陵與甘卓趙誘討華軼所統厲武將軍丁乾與軼所統武昌太守馮逸交通訪收斬之逸來攻訪訪率衆擊破之逸遁保柴桑訪乘勝進討軼遣其黨王約傅札等萬餘人助逸大戰於湓口約等又敗訪與甘卓等會於彭澤與軼水軍將朱矩等戰又敗之軼將周廣燒城以應訪軼衆潰訪執軼斬之遂平江州帝以訪為振武將軍尋陽太守加鼓吹曲蓋復命訪與諸軍共征杜韜韜作桔橰打官軍船艦訪作長岐棖以距之桔橰不得為害而賊從青草湖密抄官軍又遣其將張彥陷豫章焚燒城邑王敦時鎮湓口遣督護繆蕤李受訪節度共擊彥蕤於豫章石頭與彥交戰彥軍退走訪率帳下將李午等追彥破之臨陳斬彥時訪為流矢所中折前兩齒形色不變及暮訪與賊隔水賊衆數倍自知力不能敵乃密遣人如樵採者而出於是結陳鳴鼓而來大呼曰左軍至士卒皆稱萬歲至夜令軍中多布火而食賊謂官軍益至未曉而退訪謂諸將曰賊必引退然終知我無救軍當還掩人宜促渡水北既渡斷橋訖而賊果至隔水不得進於是遂歸湘州訪復以舟師造湘城軍達富口而韜遣杜弘出海昏時湓口騷動訪步上柴桑偷渡與賊戰斬首數百賊退保廬陵訪追擊敗之賊嬰城自守尋而軍糧為賊所掠退住巴丘糧廩既至復圍弘於廬陵弘大擲寶物於城外軍人競拾之弘因陳亂突圍而出訪率軍追之獲鞍馬鎧杖不可勝數弘入南康太守將率兵逆擊又破之奔于臨賀帝又進訪龍驤將軍王敦表為豫章太守加征討都督賜爵尋陽縣侯時梁州刺史張光卒愍帝以侍中第五猗為征南大將軍監荊梁益寧四州出自武關賊率杜曾摯瞻胡混等並迎猗奉之聚兵數萬破陶侃於石城攻平南將軍荀嵩於宛不克引兵向江陵王敦以從弟廙為荊州刺史令督護征虜將軍趙誘襄陽太守朱軌陵江將軍黃峻等討曾而大敗於女觀湖誘軌並遇害曾遂逐廙徑造沔口大為寇害威震江沔元帝命訪擊之訪有衆八千進至沌陽曾等鋭氣甚盛訪曰先人有奪人之心軍之善謀也使將軍李督左甄許朝督右甄訪自領中軍高張旗幟曾果畏訪先攻左右甄曾勇冠三軍訪甚惡之自於陳後射雉以安衆心令其衆曰一甄敗鳴三鼓兩甄敗鳴六鼓趙胤領其父餘兵屬左甄力戰敗而復合胤馳馬告訪訪怒叱令更進胤號哭還戰自旦至申兩甄皆敗訪聞鼓音選精鋭八百人自行酒飲之敕不得妄動聞鼓音乃進賊未至三十步訪親鳴鼓將士皆騰躍奔赴曾遂大潰殺千餘人訪夜追之諸將請待明日訪曰曾驍勇能戰向之敗也彼勞我逸是以克之宜及其衰乘之可滅鼓行而進遂定漢沔曾等走固武當訪以功遷南中郎將督梁州諸軍梁州刺史屯襄陽訪謂其僚佐曰昔城濮之役晉文以得臣不死而有憂色今不斬曾禍難未已於是出其不意又擊破之曾遁走訪部將蘇溫收曾詣軍并獲第五猗胡混摯瞻等送於王敦又白敦說猗逼於曾不宜殺敦不從而斬之進位安南將軍持節都督刺史如故初王敦懼杜曾之難謂訪曰擒曾當相論為荊州刺史及是而敦不用至王廙去職詔以訪為荊州敦以訪名將勳業隆重有疑色其從事中郎郭舒說敦曰鄙州雖遇寇難荒弊實為用武之國若以假人將有尾大之患公宜自領訪為梁州足矣敦從之訪大怒敦手書譬釋并遺玉環玉碗以申厚意訪投碗于地曰吾豈賈豎可以寶悅乎陰欲圖之既在襄陽務農訓卒勤于採納守宰有缺輒補然後言上敦患之而憚其強不敢有異訪威風既著遠近悅服智勇過人為中興名將性謙虛未嘗論功伐或問訪曰人有小善鮮不自稱卿功勳如此初無一言何也訪曰朝廷威靈將士用命訪何功之有士以此重之訪練兵簡卒欲宣力中原與李矩郭默相結慨然有平河洛之志善於撫納士衆皆為致死聞敦有不臣之心訪切齒敦雖懷逆謀故終訪之世未敢為非初訪少時遇善相者廬江陳訓謂訪與陶侃曰二君皆位至方嶽功名略同但陶得上壽周當下壽優劣更由年耳訪小侃一歲太興三年卒時年六十一帝哭之甚慟詔贈征西將軍諡曰壯立碑於本郡二子撫光撫字道和強毅有父風而將御不及元帝辟為丞相掾父喪去官服闋襲爵除鷹揚將軍武昌太守王敦命為從事中郎與鄧嶽俱為敦爪牙甘卓遇害敦以撫為沔北諸軍事南中郎將鎮沔中及敦作逆撫領二千人從之敦敗撫與嶽俱亡走撫弟光將資遺其兄而陰欲取嶽撫怒曰我與伯山同亡何不先斬我會嶽至撫出門遙謂之曰何不速去今骨肉尚欲相危況他人乎嶽回船而走撫遂共入西陽蠻中蠻酋向蠶納之初嶽為西陽欲伐諸蠻及是諸蠻皆怨將殺之蠶不聽曰鄧府君窮來歸我我何忍殺之由是俱得免明年詔原敦黨嶽撫詣闕請罪有詔禁錮之咸和初司徒王導以撫為從事中郎出為寧遠將軍江夏相蘇峻作逆率所領從溫嶠討之峻平遷監沔北軍事南中郎將鎮襄陽石勒將郭敬率騎攻撫撫不能守率所領奔于武昌坐免官尋遷振威將軍豫章太守後代毌丘奧監巴東諸軍事益州刺史假節將軍如故尋進征虜將軍加督寧州諸軍事永和初桓溫征蜀進撫督梁州之漢中巴西梓潼陰平四郡軍事鎮彭模撫擊破蜀餘寇隗文鄧定等斬僞尚書僕射王誓平南將軍王潤以功遷平西將軍隗文鄧定等復反立范賢子賁為帝初賢為李雄國師以左道惑百姓人多事之賁遂有衆一萬撫與龍驤將軍朱燾擊破斬之以功進爵建城縣公征西督護蕭敬文作亂殺征虜將軍楊謹據涪城自號益州牧桓溫使督護鄧遐助撫討之不能拔引退溫又令梁州刺史司馬勳等會撫伐之敬文固守自二月至于八月乃出降撫斬之傳首京師升平中進鎮西將軍在州三十餘年興寧三年卒贈征西將軍諡曰襄子楚嗣楚字元孫起家參征西軍事從父入蜀拜鷹揚將軍犍為太守父卒以楚監梁益二州假節襲爵建城公世在梁益甚得物情時梁州刺史司馬勳作逆楚與朱序討平之進冠軍將軍太和中蜀盜李金銀廣漢妖賊李弘並聚衆為寇僞稱李勢子當以聖道王年號鳳皇又隴西人李高詐稱李雄子破涪城梁州刺史楊亮失守楚遣其子討平之是歲楚卒諡曰定子瓊嗣瓊徑烈有將略歷數郡代楊亮為梁州刺史建武將軍領西戎校尉初氐人竇衝求降朝廷以為東羌校尉後衝反欲入漢中安定人皇甫釗京兆人周勳等謀納衝瓊密知之收釗勳等斬之尋卒子虓嗣虓字孟威少有節操州召為祭酒後歷位至西夷校尉領梓潼太守寧康初苻堅將楊安寇梓潼虓固守涪城遣步騎數千送母妻從漢水將抵江陵為堅將朱肜邀而獲之虓遂降于安堅欲以為尚書郎虓曰蒙國厚恩以至今日但老母見獲失節於此母子獲全秦之惠也雖公侯之貴不以為榮況郎任乎堅乃止自是每入見堅輒箕踞而坐呼之為氐賊堅不悅屬元會威儀甚整堅因謂虓曰晉家元會何如此虓攘袂厲聲曰戎狄集聚譬猶犬羊相羣何敢比天子及呂光征西域堅出餞之戎士二十萬旌旗數百里又問虓曰朕衆力何如虓曰戎狄已來未之有也堅黨以虓不遜屢請除之堅待之彌厚虓乃密書與桓沖說賊姦計太元三年虓潛至漢中堅追得之後又與堅兄子苞謀襲堅事泄堅引虓問其狀虓曰昔漸離豫讓燕智之微臣猶漆身吞炭不忘忠節況虓世荷晉恩豈敢忘也生為晉臣死為晉鬼復何問乎堅曰今殺之適成其名矣遂撻之徙于太原後堅復陷順陽魏興獲二守皆執節不撓堅歎曰周孟威不屈於前丁彥遠潔己於後吉祖沖不食而死皆忠臣也虓竟以病卒於太原其子興迎致其喪冠軍將軍謝玄親臨哭之因上疏曰臣聞旌善表功崇義明節所以振揚聲教垂美來葉故西夷校尉梓潼太守周虓執心忠烈厲節寇庭遂嬰禍荒裔痛填泉壤臣每悲其志以為蘇武之賢不復過也前宣告並州訪求虓喪並索其家負荷數千始得來至即以資送還其舊隴伏願聖朝追其志心表其殊節使負霜之志不墜於地則榮慰存亡惠被幽顯矣孝武帝詔曰虓厲志貞亮無愧古烈未及拔身奄隕厥命甄表義節國之典也贈龍驤將軍益州刺史賻錢二十萬布百匹又贍賜其家光少有父風年十一見王敦敦謂曰貴郡未有將誰可用者光曰明公不恥下問竊謂無復見勝敦笑以為寧遠將軍尋陽太守及敦舉兵光率千餘人赴之既至敦已死光未之知求見敦王應祕不言以疾告光退曰今我遠來而不得見王公公其死乎遽見其兄撫曰王公已死兄何為與錢鳳作賊衆並愕然其夕衆散錢鳳走出至闔廬洲光捕鳳詣闕贖罪故得不廢蘇峻作逆隨溫嶠力戰有功峻平賜爵曲江男卒官子仲孫興寧初督寧州軍事振武將軍寧州刺史在州貪暴人不堪命桓溫以梁益多寇周氏世有威稱復除仲孫監益豫梁州之三郡寧康初楊安寇蜀仲孫失守免官後徵為光祿勳卒初陶侃微時丁艱將葬家中忽失牛而不知所在遇一老父謂曰前岡見一牛眠山汙中其地若葬位極人臣矣又指一山云此亦其次當世出二千石言訖不見侃尋牛得之因葬其處以所指別山與訪訪父死葬焉果為刺史著稱寧益自訪以下三世為益州四十一年如其所言云史臣曰夫仁義豈有常蹈之即君子背之即小人周子隱以跅弛之材負不羈之行比凶蛟猛獸縱毒鄉閭終能克己厲精朝聞夕改輕生重義徇國亡軀可謂志節之士也宣佩奮茲忠勇屢殄妖氛威略冠於本朝庸績書於王府既而結憾朝宰潛構異圖忿不思難斯為隘矣終於憤恚豈不惜哉札莚等負俊逸之材以雄豪自許始見疑於朝廷終獲戾於權右強弗如弱信有徵矣而札受委扞城乃開門揖盜去順效逆彼實有之後雖假手凶徒可謂罪人斯得朝廷議加榮贈不其僭乎有晉之刑政陵夷用此道也周訪器兼文武任在折衝戡定湘羅克清江漢謀孫翼子杖節擁旄西蜀仰其威風中興推為名將功成名立不亦美乎孟威陷迹虜廷抗辭僞主雖圖史所載何以加焉贊曰平西果徑始邪末正勇足除殘忠能致命宣佩懋功三定江東札雖啓敵筵實懷忠尋陽緯武擁旄持斧曰子曰孫重規疊矩孟威抗烈心存舊主
