故名下邽秦武公伐邽戎置有上邽故加下重泉頻陽秦厲公置在頻水之陽粟邑蓮芍郃陽夏陽故少梁秦惠文王更名梁山在西北扶風郡漢武帝以為主爵都尉太初中更名右扶風統縣六戶二萬三千池陽漢惠帝置有嶻嶭山郿成國渠首受渭雍侯相有五畤太昊黃帝以下祠三百三所汧吳山在西古文以為汧山陳倉美陽岐山在西北周太王所邑安定郡漢置統縣七戶五千五百臨涇朝那烏氏都盧鶉觚陰密殷時密國西川北地郡秦置統縣二戶二千六百泥陽富平始平郡泰始二年置統縣五戶一萬八千槐里秦曰廢丘漢高帝更名有黃山宮始平武功太一山在東古文以為終南鄠古國夏啓所伐蒯城新平郡漢置統縣二戶二千七百漆漆水在西汾邑惠帝即位改扶風國為秦國徙都建興之後雍州沒於劉聰及劉曜徙都長安改號曰趙以秦涼二州牧鎮上邽朔州牧鎮高平幽州刺史鎮北地并州牧鎮蒲坂石勒克長安復置雍州石氏既敗苻健僭據關中又都長安是為前秦於是乃於雍州置司隸校尉以豫州刺史鎮許昌秦州刺史鎮上邽荊州刺史鎮豐陽洛州刺史鎮宜陽并州刺史鎮蒲坂苻堅時分司隸為雍州分京兆為咸陽郡洛州刺史鎮陝城滅燕之後分幽州置平州鎮龍城幽州刺史鎮薊城河州刺史鎮枹罕并州刺史鎮晉陽豫州刺史鎮洛陽兗州刺史鎮倉垣雍州刺史鎮蒲坂於是移洛州居豐陽以許昌置東豫州以荊州刺史鎮襄陽徐州刺史鎮彭城既而姚萇滅苻氏是為後秦及萇子興克洛陽以并冀二州牧鎮蒲坂豫州牧鎮洛陽兗州刺史鎮倉垣分司隸領北五郡置雍州刺史鎮安定及姚泓為劉裕所滅其地尋入赫連勃勃勃勃僭號於統萬是為夏置幽州牧於大城又平劉義真於長安遣子璝鎮焉號曰南臺以朔州牧鎮三城秦州刺史鎮杏城雍州刺史鎮陰密并州刺史鎮蒲坂梁州牧鎮安定北秦州刺史鎮武功豫州牧鎮李閏荊州刺史鎮陝其州郡之名並不可知也然自元帝渡江所置州亦皆遙領初以魏該為雍州刺史鎮酇城尋省僑立始平郡寄居武當城有秦國流人至江南改堂邑為秦郡僑立尉氏縣屬焉康帝時庾翼為荊州刺史遷鎮襄陽其後秦雍流人多南出樊沔孝武始於襄陽僑立雍州仍立京兆始平扶風河南廣平義成北河南七郡並屬襄陽襄陽故屬荊州涼州案禹貢雍州之西界周衰其地為狄秦興美陽甘泉宮本胸奴鑄金人祭天之處胸奴既失甘泉又使休屠渾邪王等居涼州之地二王後以地降漢漢置張掖酒泉敦煌武威郡其後又置金城郡謂之河西五郡漢改周之雍州為涼州蓋以地處西方常寒涼也地勢西北邪出在南山之間南隔西羌西通西域于時號為斷胸奴右臂獻帝時涼州數有亂河西五郡去州隔遠於是乃別以為雍州末又依古典定九州乃合關右以為雍州魏時復分以為涼州刺史領戊己校尉護西域如漢故事至晉不改統郡八縣四十六戶三萬七百金城郡漢置統縣五戶二千榆中允街金城白土浩亹西平郡漢置統縣四戶四千西都臨羌長寧安夷武威郡漢置統縣七戶五千九百姑臧宣威揖次倉松顯美驪靬番和張掖郡漢置統縣三戶三千七百永平臨澤漢昭武縣避文帝諱改也屋蘭漢因屋蘭名焉西郡漢置統縣五戶一千九百日勒刪丹仙提萬歲蘭池一云蘭絶池酒泉郡漢置統縣九戶四千四百福祿會水安彌騂馬樂涫表氏延壽玉門沙頭敦煌郡漢置統縣十二戶六千三百昌蒲敦煌龍勒陽關效穀廣至宜禾冥安深泉伊吾新鄉乾齊西海郡故屬張掖漢獻帝興平二年武威太守張雅請置統縣一戶二千五百居延澤在東南尚書所謂流沙也元康五年惠帝分敦煌郡之宜禾伊吾冥安深泉廣至等五縣分酒泉之沙頭縣又別立會稽新鄉凡八縣為晉昌郡永寧中張軌為涼州刺史鎮武威上表請合秦雍流移人於姑臧西北置武興郡統武興大城烏支襄武晏然新鄣平狄司監等縣又分西平界置晉興郡統晉興枹罕永固臨津臨鄣廣昌大夏遂興罕唐左南等縣是時中原淪沒元帝徙居江左軌乃控據河西稱晉正朔是為前涼及張實分金城之令居枝陽二縣又立永登縣合三縣立廣武郡張茂分武興金城西平安故為定州張駿分武威武興西平張掖酒泉建康西海西郡湟河晉興廣武合十一郡為涼州興晉金城武始南安永晉大夏武成漢中為河州敦煌晉昌高昌西域都護戊己校尉玉門大護軍三郡三營為沙州張駿假涼州都督攝三州張祚又以敦煌郡為商州永興中置漢陽縣以守牧地張玄靚改為祁連郡張天錫又別置臨松郡天錫降於苻氏其地尋為呂光所據呂光都於姑臧後以郭黁言讖改昌松為東張掖郡及呂隆降於姚興其地三分武昭王為西涼建號於敦煌禿髮烏孤為南涼建號於樂都沮渠蒙遜為北涼建號於張掖而分據河西五郡秦州案禹貢本雍州之域魏始分隴右置焉刺史領護羌校尉中間暫廢及泰始五年又以雍州隴右五郡及涼州之金城梁州之陰平合七郡置秦州鎮冀城太康三年罷秦州并雍州七年復立鎮上邽統郡六縣二十四戶三萬二千一百隴西郡秦置統縣四戶三千襄武首陽鳥鼠山在東臨洮狄道南安郡漢置統縣三戶四千三百獂道新興中陶天水郡漢武置孝明改為漢陽晉復為天水統縣六戶八千五百上邽冀秦州故居始昌新陽顯新漢顯親縣成紀略陽郡本名廣魏泰始中更名焉統縣四戶九千三百二十臨渭平襄略陽清水武都郡漢置統縣五戶三千下辨河池沮武都故道陰平郡泰始中置統縣二戶三千陰平平廣惠帝分隴西之狄道臨洮河關又立洮陽遂平武街始興第五真仇六縣合九縣置狄道郡屬秦州張駿分屬涼州又以狄道縣立武始郡江左分梁為秦寄居梁州又立氐池為北秦州梁州案禹貢華陽黑水之地舜置十二牧則其一也梁者言西方金剛之氣強梁故因名焉周禮職方氏以梁并雍漢不立州名以其地為益州及獻帝初平六年以臨江縣屬永寧郡建安六年劉璋改永寧為巴東郡分巴郡墊江置巴西郡劉備據蜀又分廣漢之葭萌涪城梓潼白水四縣改葭萌曰漢壽又立漢德縣以為梓潼郡割巴郡之宕渠宣漢漢昌三縣置宕渠郡尋省以縣並屬巴西郡泰始三年分益州立梁州於漢中改漢壽為晉壽又分廣漢置新都郡梁州統郡八縣四十四戶七萬六千三百漢中郡秦置統縣八戶一萬五千南鄭蒲池褒中沔陽成固西鄉黃金興道梓潼郡蜀置統縣八戶一萬二百梓潼涪城武連黃安漢德晉壽劍閣白水廣漢郡漢置統縣三戶五千一百廣漢德陽五城新都郡泰始二年置統縣四戶二萬四千五百雒什方綿竹新都涪陵郡蜀置統縣五戶四千二百漢復涪陵漢平漢葭萬寧巴郡秦置統縣四戶三千三百江州墊江臨江枳巴西郡蜀置統縣九戶一萬二千閬中西充國蒼溪岐愜南充國漢昌宕渠安漢平州巴東郡漢置統縣三戶六千五百魚復朐南浦太康六年九月罷新都郡并廣漢郡惠帝復分巴西置宕渠郡統宕渠漢昌宣漢三縣并以新城魏興上庸合四郡以屬梁州尋而梁州郡縣沒于李特永嘉中又分屬楊茂搜其晉人流寓於梁益者仍於二州立南北二陰平郡及桓溫平蜀之後以巴漢流人立晉昌郡領長樂安晉延壽安樂宣漢寧都新興吉陽東關永安十縣又置益昌晉興二縣屬巴西郡於德陽界東南置遂寧郡又於晉壽置劍閣縣屬梁州後孝武分梓潼北界立晉壽郡統晉壽白水邵歡興安四縣梓潼郡徙居梓潼罷劍閣縣又別置南漢中郡分巴西梓潼為金山郡及安帝時又立新巴汶陽二郡又有北新巴華陽南陰平北陰平四郡其後又立巴渠懷安宋熙白水上洛北上洛南宕渠懷漢新興安康等十郡益州案禹貢及舜十二牧俱為梁州之域周合梁於雍則又為雍州之地春秋元命包云參伐流為益州益之為言厄也言其所在之地險厄也亦曰疆壤益大故以名焉始秦惠王滅蜀置郡以張若為蜀守及始皇置三十六郡蜀郡之名不改漢初有漢中巴蜀高祖六年分蜀置廣漢凡為四郡武帝開西南夷更置犍為牂柯越巂益州四郡凡八郡遂置益州統焉益州蓋始此也及後漢明帝以新附置永昌郡安帝又以諸道置蜀廣漢犍為三郡屬國都尉及靈帝又以汶江蠶陵廣柔三縣立汶山郡獻帝初平元年劉璋分巴郡立永寧郡建安六年改永寧為巴東以巴郡為巴西又立涪陵郡二十一年劉備分巴郡立固陵郡蜀章武元年又改固陵為巴東郡巴西郡為巴郡又分廣漢立梓潼郡分犍為立江陽郡以蜀郡屬國為漢嘉郡以犍為屬國為朱提郡劉禪建興二年改益州郡為建寧郡廣漢屬國為陰平郡分建寧永昌立雲南郡分建寧牂柯立興古郡分廣漢立東廣漢郡魏景元中蜀平省東廣漢郡及武帝泰始二年分益州置梁州以漢中屬焉七年又分益州置寧州益州統郡八縣四十四戶十四萬九千三百蜀郡秦置統縣六戶五萬成都廣都繁江原臨邛郫犍為郡漢置統縣五戶一萬武陽南安僰道資中牛鞞汶山郡漢置統縣八戶一萬六千汶山升遷都安廣陽興樂平康蠶陵廣柔漢嘉郡蜀置統縣四戶一萬三千漢嘉徙陽嚴道旄牛江陽郡蜀置統縣三戶三千一百江陽符漢安朱提郡蜀置統縣五戶二千六百朱提南廣漢陽南秦堂狼越巂郡漢置統縣五戶五萬三千四百會無邛都卑水定苲臺登牂柯郡漢置統縣八戶一千二百萬壽且蘭談指夜郎毋斂并渠鄨平夷惠帝之後李特僭號於蜀稱漢益州郡縣皆沒于特李雄又分漢嘉蜀二郡立沈黎漢原二郡是時益州郡縣雖沒李氏江左並遙置之桓溫滅蜀其地復為晉有省漢原沈黎而立南陰平晉原寧蜀始寧四郡焉咸安二年益州復沒於苻氏太元八年復為晉有隆安二年又立晉熙遂寧晉寧三郡云寧州於漢魏為益州之域泰始七年武帝以益州地廣分益州之建寧興古雲南交州之永昌合四郡為寧州統縣四十五戶八萬三千雲南郡蜀置統縣九戶九千二百雲平雲南梇棟青蛉姑復邪龍楪榆遂久永寧興古郡蜀置統縣十一戶六千二百律高句町宛溫漏臥毋掇賁古滕休鐔封漢興進乘都𤨲建寧郡蜀置統縣十七戶二萬九千味昆澤存草廠倠心新定談母單同瀨漏江牧麻穀昌連然秦臧雙柏俞元修雲泠丘滇池永昌郡漢置統縣八戶三萬八千不韋永壽比蘇雍鄉南涪巂唐哀牢博南太康三年武帝又廢寧州入益州立南夷校尉以護之太安二年惠帝復置寧州又分建寧以西七縣別立為益州郡永嘉二年改益州郡曰晉寧分牂柯立平夷夜郎二郡然是時其地再為李特所有其後李壽分寧州興古永昌雲南朱提越巂河陽六郡為漢州咸康四年分牂柯夜郎朱提越巂四郡置安州八年又罷并寧州以越巂還屬益州省永昌郡焉
