body:
  text: 晉書卷十四志第四地理上總司州兗州豫州冀州幽州平州并州雍州涼州秦州梁州益州寧州昔者元胎無象太素流形對越在天以為元首則記所謂冬居營窟夏居橧巢飲血茹毛未有麻絲者也及燧人鑽火庖犧出震風宗下武炎胤昌基畫野無聞其歸一揆黃帝則東海南江登空躡岱至於崑峯振轡崆山訪道存諸汗竹不可厚誣高陽任地依神帝嚳順天行義東踰蟠木西濟流沙北至幽陵南撫交址日月所經舟車所至莫匪王臣不踰茲域帝堯時禹平水土以為九州虞舜登庸厥功彌劭表提類而分區宇判山河而考疆域冀北創并部之名燕齊起幽營之號則書所謂肇十有二州封十有二山者也夏功在于唐堯殷因無所損益周武克商自豐徂鎬至成王時改作禹貢徐梁入於青雍冀野析於幽并職方掌天下之土以周厥利保章辨九州之野皆有分星東南曰揚州正南曰荊州河南曰豫州正東曰青州河東曰兗州正西曰雍州東北曰幽州河內曰冀州正北曰并州始皇初并天下懲蟽戰國削罷列侯分天下為三十六郡三川河東南陽南郡九江鄣郡會稽潁川碭郡泗水薛郡東郡琅邪齊郡上谷漁陽右北平遼西遼東代郡巨鹿邯鄲上黨太原雲中九原雁門上郡隴西北地漢中巴郡蜀郡黔中長沙凡三十五郡與內史為三十六郡也於是興師踰江平取百越又置閩中南海桂林象郡凡四十郡郡一守焉其地則西臨洮而北沙漠東縈西帶皆臨大海漢祖龍興革秦之弊分內史為三部更置郡國二十有三桂陽江夏豫章河內魏郡東海楚國平原梁國定襄泰山汝南淮陽千乘東萊燕國清河信都常山中山渤海廣漢涿郡合二十三也三內史者河上渭南中地也地理志曰高祖增二十六武帝改河上渭南中地以為京兆馮翊扶風是為三輔也文增厥九廣平城陽淄川濟南膠西膠東河間廬江衡山武帝改衡山曰六安景加其四濟北濟陰山陽北海也宣改濟北曰東平武帝開越攘胡初置十七南海蒼梧鬱林合浦交址九真日南珠崖儋耳九郡平西南夷置牂柯越巂沈黎汶山犍為益州六郡西置武都郡又分立零陵郡合十七郡拓土分疆又增十四弘農臨淮西河朔方酒泉陳留安定天水玄菟樂浪廣陵敦煌武威張掖昭帝少事又增其一金城也至平帝元始二年凡新置郡國七十有一與秦四十合一百一十有一改雍曰涼改梁曰益又置徐州復夏舊號南置交址北有朔方凡為十三部涼益荊揚青豫兗徐幽并冀十一州交址朔方二刺史合十三部光武投戈之歲在雕耗之辰郡國蕭條并省者八城陽淄川高密膠東六安真定泗水廣陽建武十一年省州牧復為刺史員十三人各掌一州明帝置一永昌也章帝置二任城吳郡和順改作其名有九和置濟北廣陽順改淮陽為陳改楚為彭城濟東為東平臨淮為下邳千乘為六安信都為安平天水為漢陽省朔方刺史合之於司隸凡十三部其與西漢不同者司隸校尉部郡治河南朔方隸於并部而郡國百有八焉省前漢八分置五改舊名七因舊九十六少前漢三也桓靈頗增於前復置六郡桓高陽高涼博陵靈南安鄱陽廬陵魏武定霸三方鼎立生靈版蕩關洛荒蕪所置者十二新興樂平西平新平略陽陰平帶方譙樂陵章武南鄉襄陽所省者七上郡朔方五原雲中定襄漁陽廬江而文帝置七朝歌陽平弋陽魏興新城義陽安豐明及少帝增二明上庸也少平陽也得漢郡者五十四焉蜀先主於漢建安之間初置郡九巴東巴西梓潼江陽汶山漢嘉朱提宕渠涪陵後主增二雲南興古得漢郡者十有一焉吳主大皇帝初置郡五臨賀武昌珠崖新安廬陵南部少帝景帝各四少臨川臨海衡陽湘東景天門建安建平合浦北部歸命侯亦置十有二郡始安始興邵陵安成新昌武平九德吳興東陽桂林滎陽宜都得漢郡者十有八焉晉武帝太康元年既平孫氏凡增置郡國二十有三滎陽上洛頓丘臨淮東莞襄城汝陰長廣廣寧昌黎新野隨郡陰平義陽毗陵宣城南康晉安寧浦始平略陽樂平南平省司隸置司州別立梁秦寧平四州仍吳之廣州凡十九州司冀兗豫荊徐揚青幽平并雍涼秦梁益寧交廣州郡國一百七十三仍吳所置二十五仍蜀新置十一仍魏所置二十一仍漢舊九十三置二十三以為冠帶之國盡有殷周之土若乃敦龐於天地之始昭晰於犧農之世用長黎元未爭疆埸而玉環楛矢夷裘風駕南翬表貺東風入律光乎上德奚遠弗臻然則星象麗天山河紀地端掖裁其弘敞崤函判其都邑仰觀俯察萬物攸歸是以洛沚咸陽宛然秦漢晉濱河西同知堯禹于茲新邑宅是鎬京五尺童子皆能口誦者史官弗之書也昔庖犧氏生於成紀而為天子都於陳神農氏都陳而別營于曲阜黃帝生於壽丘而都於涿鹿少昊始自窮桑而遷都曲阜顓頊始自窮桑而徙邑商丘高辛即號建都于亳孫卿子曰不登高山不知天之高不臨深溪不知地之厚也大哉坤象萬物資生載崑華而不墜傾河海而寧泄考卜惟王乘飛駐軫睨山而鐫勒覽曾城以為玩時逢稽浸道接陵夷平王東遷星離豆剖當塗馭𧜛瓜分鼎立世祖武皇帝接千祀之餘當八堯之禪先王桑梓罄宇來歸斯固可得而言者矣惠皇不虞中州盡棄永嘉南度綸行建鄴九分天下而有二焉昔大禹觀於濁河而受緑字寰瀛之內可得而言也天有七星地有七表天有四維地有四瀆八紘之外名為八極地不足東南天不足西北八極之廣東西二億三萬一千三百里南北二億三萬一千三百里自地至天半八極之數自下亦如之昔黃帝令豎亥步自東極至于西極五億十萬九千八百八步史臣案凡周天積百七萬九百一十三里徑三十五萬六千九百七十里所謂南北為經東西為緯天有十二次日月之所躔地有十二辰王侯之所國也或因生得姓因功命土祁酉燕齊在乎茲域昔黃帝旁行天下方制萬里得百里之國萬區則周易所謂首出庶物萬國咸寧者也昔在帝堯叶和萬邦制八家為鄰三鄰為朋三朋為里五里為邑十邑為都十都為師州十有二師焉夏后氏東漸于海西被于流沙南浮于江而朔南暨聲教窮豎亥所步莫不率俾會羣臣於塗山執玉帛者萬國於是九州之內作為五服天子之國內五百里甸服百里賦納總二百里納銍三百里納秸服四百里粟五百里米甸服外五百里侯服百里采二百里任三百里候侯服外五百里綏服三百里揆文教二百里奮武衛綏服外五百里要服三百里夷二百里蔡要服外五百里荒服三百里蠻二百里流訖于四海弼成五服五服至于五千里夏德中微遇有窮之亂少康中興不失舊物自孔甲之後以至于桀諸侯相兼其能存者三千餘國方於塗山十損其七矣成湯敗桀於焦遷鼎於亳伊摯仲虺之徒大明憲典王者之制爵祿公侯伯子男凡五等天子之田方千里公侯田方百里伯七十里子男五十里不能五十里者不達於天子附於諸侯曰附庸凡四海之內九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大澤不以封其餘以為附庸間田八州州二百一十國天子之縣內百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以班其餘以祿士以為間田凡九州千七百七十三國天子之元士諸侯之附庸不與天子百里之內以供官千里之內以為御千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下為左右曰二伯千里之內曰甸千里之外曰采曰流天子使其大夫為三監監於方伯之國國三人天子之縣內諸侯祿也外諸侯嗣也武王歸豐監於二代設爵惟五分土惟三封同姓五十餘國周公康叔建於魯衛各數百里太公封於齊表東海者也凡一千八百國布列於五千里內而太昊黃帝之後唐虞侯伯猶存大司徒以諸公之地封疆方五百里其食者半諸侯之地方四百里其食者參之一諸伯之地方三百里其食者參之一諸子之地方二百里其食者四之一諸男之地方百里其食者四之一不易之地家百畝一易之地家二百畝再易之地家三百畝五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賓小司徒以五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都遺人則十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候候有館館有積遂人則五家為鄰五鄰為里四里為酇五酇為鄙五鄙為縣五縣為遂大司馬以九畿之籍施邦國之政方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衛畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰藩畿畿田限也自王城以外面五千里為界有分限者九也于時治致太平政稱刑措民口千三百七十一萬四千九百三十三蓋周之盛者也其衰也則禮樂征伐出自諸侯強吞弱而衆暴寡春秋之初尚有千二百國迄獲麟之末二百四十二年弒君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數而見於春秋經傳者百有七十國焉百三十九知其所居魯邾鄭宋紀衛西虢莒齊陳杞蔡邢郕晉薛許鄧秦曹楚隨黃梁虞鄖小邾徐燕鄀麋舒庸郯萊吳越有窮三苗瓜州有虞東虢共宿申夷向南燕滕凡戴息郜芮魏淳于穀巴州蓼羅賴牟葛談蕭遂滑權鄣霍耿江冀弦道柏微鄫厲項密任須句顓臾頓管雍畢豐邘應蔣茅胙夔介焦沈六巢根牟唐黎郇瑕寒有鬲斟灌斟尋過有過戈逼陽邿鑄豕韋唐杜楊豳鄶觀扈邳胡黎大庭駘岐邶鍾吾蒲姑昆吾房密須甲父鄅桐亳韓趙三十一國盡亡其處祭極荀賈二軫絞於餘丘陽箕英氏毛聃莘逼封父仍有仍崇鄟庸姺奄商奄褒姒蓐有緡闕鞏飂鬷窮桑蠻夷戎狄不在其間五伯迭興總其盟會陵夷至于戰國遂有七王韓魏趙燕齊秦楚又有宋衛中山不斷如線如三晉篡奪亦稱孤也司馬法廣陳三代曰古者六尺為步步百為畝畝百為夫夫三為屋屋三為井井方一里是為九夫八家共之一夫一婦受私田百畝公田十畝是為八百八十畝餘二十畝為廬舍出入相友守望相助疾病相救民受田上田夫百畝中田夫二百畝下田夫三百畝歲受耕之爰自其處其家衆男為餘夫亦以口受田如此士工商家受田五口乃當農夫一口有賦有稅稅謂公田什一及工商衡虞之入也賦供車馬甲兵士從之役民年二十受田六十歸田種穀必雜五種以備災旱田中不得有樹以妨五穀環廬種桑柘菜茹有畦瓜瓠果蓏植於疆埸雞狗豕無失其時閭有序鄉有庠序以明教庠以行禮司馬之法官設六軍之衆因井田而制軍令地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里故井四為邑邑四為丘丘十六井有戎馬一匹牛三頭四丘為甸甸六十四井也有戎馬四匹兵車一乘牛十二頭甲士三人卒七十二人是謂乘車之制一同百里提封萬井除山川坑岸城池邑居園囿街路三千六百井定出賦六千四百井戎馬四百匹兵車百乘此卿大夫菜地之大者也是謂百乘之家一封三百六十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此謂諸侯之大者也謂之千乘之國天子畿內方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乘戎卒七十二萬人故天子稱萬乘之主焉秦始皇既得志於天下訪周之敗以為處士橫議諸侯尋戈四夷交侵以弱見奪於是削去五等焉漢興創艾亡秦孤立而敗於是割裂封疆立爵二等功臣侯者百有餘邑于時民罹秦項戶口雕弊大侯不過萬家小者五六百戶而尊王子弟大啓九國古者有分土而無分民若乃大者跨州連郡小則十有餘城以戶口為差降略封疆之遠近所謂分民自漢始也起雁門以東盡遼陽為燕代常山以南太行左轉渡河濟漸于海為齊趙穀泗以注奄有龜蒙為梁楚東帶江湖薄會稽為荊吳北界淮瀕略廬衡為淮南波漢之陽亙九疑為長沙諸侯比境周匝三垂外接胡越天子自有三河東郡潁川南陽自江陵以西至巴蜀北至雲中西至隴西與京師內史凡十五郡文帝采賈生之議分齊趙景帝用朝錯之計削吳楚武帝施主父之冊下推恩之令使諸侯王得分戶邑以封子弟不行黜陟而藩國自析自此以來齊分為七趙分為六梁分為五淮南分為三皇子始立者大國不過十餘城長沙燕代雖有舊名皆亡南北邊矣自文景與民休息至平帝元始二年民戶千二百二十三萬三千六十二口五千九百五十九萬四千九百七十八其地東西九千三百二里南北萬三千三百六十八里大率十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫游徼各一人縣大率方百里民稠則減稀則曠鄉亭亦如之皆秦制也光武中興不踰前制東海王彊以去就有禮故優以大封兼食魯郡二十九縣其餘稱為寵錫者兼一郡而已至桓帝永壽三年戶千六十七萬七千九百六十口五千六百四十八萬六千八百五十六斯亦戶口之滋殖者也獻帝建安元年拜曹操為鎮東將軍封費亭侯魏文帝黃初三年初制封王之庶子為鄉公嗣王之庶子為亭侯公侯之庶子為亭伯劉備章武元年亦以郡國封建諸王或遙採嘉名不由檢土地所出其戶二十萬男女口九十萬孫權赤烏五年亦取中州嘉號封建諸王其戶五十二萬三千男女口二百四十萬晉文帝為晉王命裴秀等建立五等之制惟安平郡公孚邑萬戶制度如魏諸王其餘縣公邑千八百戶地方七十五里大國侯邑千六百戶地方七十里次國侯邑千四百戶地方六十五里大國伯邑千二百戶地方六十里次國伯邑千戶地方五十五里大國子邑八百戶地方五十里次國子邑六百戶地方四十五里男邑四百戶地方四十里武帝泰始元年封諸王以郡為國邑二萬戶為大國置上中下三軍兵五千人邑萬戶為次國置上軍下軍兵三千人五千戶為小國置一軍兵千五百人王不之國官於京師罷五等之制公侯邑萬戶以上為大國五千戶以上為次國不滿五千戶為小國太康元年平吳大凡戶二百四十五萬九千八百四十口一千六百一十六萬三千八百六十三而江左諸國並三分食一元帝渡江太興元年始制九分食一司州案禹貢豫州之地及漢武帝初置司隸校尉所部三輔三河諸郡其界西得雍州之京兆馮翊扶風三郡北得冀州之河東河內二郡東得豫州之弘農河南二郡郡凡七位望隆于牧伯銀印青綬及光武都洛陽司隸所部與前漢不異魏氏受禪即都漢宮司隸所部河南河東河內弘農并冀州之平陽合五郡置司州晉仍居魏都乃以三輔還屬雍州分河南立滎陽分雍州之京兆立上洛廢東郡立頓丘遂定名司州以司隸校尉統之州統郡一十二縣一百戶四十七萬五千七百河南郡漢置統縣十二戶一十一萬四千四百置尹洛陽置尉五部三市東西七里南北九里東有建春東陽清明三門南有開陽平昌宣陽建陽四門西有廣陽西明閶闔三門北有大夏廣莫二門司隸校尉河南尹及百官列城內也河南周東都王城郟鄏也鞏周孝王封周桓公孫惠公於鞏號東周故戰國時有東西周號芒山首陽其界也河陰新安函谷關所居成臯有關鄭之武牢緱氏有劉聚周大夫劉子邑有延壽城仙人祠陽城有鄂阪關此邑是為地中夏至景尺五寸有陽城山箕山許由墓在焉新城有延壽關故戎蠻子之國陸渾故蠻子國楚莊王伐陸渾是也梁戰國時謂為南梁別少梁也陽翟滎陽郡泰始二年置統縣八戶三萬四千滎陽地名敖秦置敖倉者京鄭太叔段所居密故周畿內卷有博浪長沙張良擊秦始皇處陽武苑陵中牟六國時趙獻侯都開封宋蓬池在東北或曰蓬澤弘農郡漢置統縣六戶一萬四千弘農本函谷關漢武帝遷於新安縣湖故曰胡漢武更名湖陝故虢國周分陝東西二相主之宜陽黽池華陰華山在縣南上洛郡泰始二年分京兆南部置統縣三戶萬七千上洛嶢關在縣西北商秦相衛商鞅邑盧氏熊耳山在東伊水所出平陽郡故屬河東魏分立統縣十二戶四萬二千平陽舊堯都侯國楊故楊侯國端氏韓魏趙既為諸侯以端氏封晉君也永安故霍伯國霍山在東蒲子狐囁襄陵公國相絳邑晉武公自曲沃徙此濩澤析城山在西南臨汾公國相北屈壺口山在東南有南屈故稱北皮氏故耿國河東郡秦置統縣九戶四萬二千五百安邑舊舜都聞喜故曲沃晉武公自晉陽徙此垣王屋山在東北沇水所出汾陽公國相大陽吳山在西周武王封西周太伯後於此猗氏古猗頓城解有鹽池蒲坂有歷山舜所耕也有雷首山夷齊居其陽所謂首陽山河北汲郡泰始二年置統縣六戶三萬七千汲有銅關朝歌紂所都共故國北山淇水所出林慮獲嘉故汲新中鄉漢武帝行過時獲呂嘉首因改名修武晉所啓南陽秦改名修武河內郡漢置統縣九戶五萬二千野王太行山在西北州故晉邑懷平皋邢侯自襄國徙此河陽沁水軹故周原邑山陽溫故國也蘇忿生封廣平郡魏置統縣十五戶三萬五千二百廣平邯鄲秦置為郡易陽武安涉襄國故邢侯國都南和任曲梁列人肥鄉臨水廣年侯相斥漳平恩陽平郡魏置統縣七戶五萬一千元城漢元后生邑館陶清泉發干東武陽陽平樂平魏郡漢置統縣八戶四萬七百鄴魏武受封居此長樂魏斥丘安陽蕩陰內黃黃池在西黎陽故黎侯國頓丘郡泰始二年置統縣四戶六千三百頓丘繁陽陰安衛永嘉之後司州淪沒劉聰聰以洛陽為荊州及石勒復以為司州石季龍又分司州之河南河東弘農滎陽兗州之陳留東燕為洛州元帝渡江亦僑置司州於徐非本所也後以弘農人流寓尋陽者僑立為弘農郡又以河東人南寓者於漢武陵郡孱陵縣界上明地僑立河東郡統安邑聞喜永安臨汾弘農譙松滋大戚八縣並寄居焉永和五年桓溫入洛復置河南郡屬司州兗州案禹貢濟河之地舜置十二牧則其一也周禮河東曰兗州春秋元命包云五星流為兗州兗端也信也又云蓋取兗水以名焉漢武帝置十三州以舊名為兗州自此不改州統郡國八縣五十六戶八萬三千三百陳留國漢置統縣十戶三萬魏武帝封小黃浚儀有洪溝漢高祖項羽欲分處封丘酸棗烏巢地在東南濟陽長垣故匡城孔子所厄也雍丘故杞國尉氏襄邑外黃濮陽國故屬東郡晉初分東郡置統縣四戶二萬一千濮陽古昆吾國師延為紂作靡靡之樂既而投此水公國相廩丘公國相有羊角城白馬有瓠子堤鄄城公國相濟陰郡漢置統縣九戶七千六百定陶漢高祖封彭越為梁王都此乘氏故侯國句陽離狐宛句己氏成武有楚丘亭單父故侯國城陽舜所漁堯冢在西高平國故屬梁國晉初分山陽置統縣七戶三千八百昌邑侯相有甲父亭巨野魯獲麟所方與金鄉湖陸高平侯國南平陽侯國有漆亭任城國漢置統縣三戶一千七百任城古任國亢父樊東平國漢置統縣七戶六千四百須昌壽張有蚩尤祠范無鹽富城東平陸剛平濟北國漢置統縣五戶三千五百盧扁鵲所生縣西有石門臨邑東阿穀城有烏下聚蛇丘有下灌亭泰山郡漢置統縣十一戶九千三百奉高西南有明堂博有龜山嬴南城梁父侯國有菟裘聚山茌茌山在東北新泰故曰平陽南武陽有顓臾城萊蕪有原山牟故牟國巨平有陽關亭惠帝之末兗州闔境淪沒石勒後石季龍改陳留郡為建昌郡屬洛州是時遺黎南渡元帝僑置兗州寄居京口明帝以郗鑒為刺史寄居廣陵置濮陽濟陰高平太山等郡後改為南兗州或還江南或居盱眙或居山陽後始割地為境常居廣陵南與京口對岸咸康四年於北譙界立陳留郡安帝分廣陵郡之建陵臨江如皋寧海蒲濤五縣置山陽郡屬南兗州豫州案禹貢為荊河之地周禮河南曰豫州豫者舒也言稟中和之氣性理安舒也春秋元命包云鉤鈐星別為豫州地界西自華山東至于淮北自濟南界荊山秦兼天下以為三川河東南陽潁川碭泗水薛七郡漢改三川為河南郡武帝置十三州豫州舊名不改以河南河東二郡屬司隸又以南陽屬荊州先是改泗水曰沛郡改碭郡曰梁改薛曰魯分梁沛立汝南郡分潁川立淮陽郡後漢章帝改淮陽曰陳郡魏武分沛立譙郡魏文分汝南立弋陽郡及武帝受命又分潁川立襄城郡分汝南立汝陰郡合陳郡于梁國州統郡國十縣八十五戶十一萬六千七百九十六潁川郡秦置統縣九戶二萬八千三百許昌漢獻帝都許魏禪徙都洛陽許宮室武庫存焉改為許昌長社潁陰臨潁公國相郾邵陵公國相陵公國相新汲長平汝南郡漢置統縣十五戶二萬一千五百新息南安陽安成侯相慎陽北宜春朗陵陽安故江國有江亭上蔡平輿故沈子國有沈亭定潁灈陽南頓汝陽吳房故房子國西平故柏國有龍泉水可用淬刀劍襄城郡泰始二年置統縣七戶一萬八千襄城侯相有西不羹城繁昌魏文受禪於此郟定陵侯相父城侯相昆陽公國相舞陽宣帝始封此邑汝陰郡魏置郡後廢泰始二年復置統縣八戶八千五百汝陰故胡子國慎故楚邑原鹿固始鮦陽新蔡宋侯相褒信梁國漢置統縣十二戶一萬三千睢陽春秋時宋都蒙虞下邑有碭山山有文石寧陵故葛伯國穀熟陳項長平陽夏武平苦東有賴鄉祠老子所生地沛國漢置統縣九戶五千九十六相沛漢高祖所起處豐竺邑符離杼秋洨虹蕭譙郡魏置統縣七戶一千譙城父酇山桑龍亢蘄銍魯郡漢置統縣七戶三千五百魯曲阜之地魯侯伯禽所居汶陽卞鄒有繹山蕃故小邾之國薛奚仲所封公丘弋陽郡魏置統縣七戶一萬六千七百西陽故弦子國軑蘄春邾西陵期思弋陽安豐郡魏置統縣五戶一千二百安風雩婁安豐侯相蓼松滋侯相惠帝分汝陰立新蔡分梁國立陳郡分汝南立南頓永嘉之亂豫州淪沒石氏元帝渡江以春穀縣僑立襄城郡及繁昌縣成帝乃僑立豫州於江淮之間居蕪湖時淮南入北乃分丹楊僑立淮南郡居于湖又以舊當塗縣流人渡江僑立為縣并淮南廬江安豐並屬豫州寧康元年移鎮姑孰孝武改蘄春縣為蘄陽縣因新蔡縣人於漢九江王黥布舊城置南新蔡郡屬南豫州又於漢廬江郡之南部置晉熙郡冀州案禹貢周禮並為河內之地舜置十二牧則其一也春秋元命包云昴畢散為冀州分為趙國其地有險有易帝王所都亂則冀安弱則冀強荒則冀豐舜以冀州南北闊大分衛以西為并州燕以北為幽州周人因焉及漢武置十三州以其地依舊名為冀州歷後漢至晉不改州統郡國十三縣八十三戶三十二萬六千趙國漢置統縣九戶四萬二千房子元氏平棘高邑公國相中丘柏人平鄉下曲陽故鼓子國鄡巨鹿國秦置統縣二戶一萬四十廮陶巨鹿安平國漢置統縣八戶二萬一千信都下博武邑武遂觀津侯相扶柳廣宗侯國經平原國漢置統縣九戶三萬一千平原高唐茌平博平聊城安德西平昌般鬲樂陵國漢置統縣五戶三萬三千厭次陽信漯沃新樂樂陵有都尉居勃海郡漢置統縣十戶四萬南皮東光浮陽饒安高城重合東安陵蓨廣川侯相阜城章武國泰始元年置統縣四戶一萬三千東平舒文安章武束州河間國漢置統縣六