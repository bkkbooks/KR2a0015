body:
  text: 晉書卷六十七列傳第三十七溫嶠溫嶠字太真司徒羡弟之子也父憺河東太守嶠性聰敏有識量博學能屬文少以孝悌稱於邦族風儀秀整美於談論見者皆愛悅之年十七州郡辟召皆不就司隸命為都官從事散騎常侍庾敳有重名而頗聚斂嶠舉奏之京都振肅後舉秀才灼然司徒辟東閣祭酒補上黨潞令平北大將軍劉琨妻嶠之從母也琨深禮之請為參軍琨遷大將軍嶠為從事中郎上黨太守加建威將軍督護前鋒軍事將兵討石勒屢有戰功琨遷司空以嶠為右司馬于時并土荒殘寇盜羣起石勒劉聰跨帶疆埸嶠為之謀主琨所憑恃焉屬二都傾覆社稷絶祀元帝初鎮江左琨誠繫王室謂嶠曰昔班彪識劉氏之復興馬援知漢光之可輔今晉祚雖衰天命未改吾欲立功河朔使卿延譽江南子其行乎對曰嶠雖無管張之才而明公有桓文之志欲建匡合之功豈敢辭命乃以為左長史檄告華夷奉表勸進嶠既至引見具陳琨忠誠志在效節因說社稷無主天人係望辭旨慷慨舉朝屬目帝器而嘉焉王導周顗謝鯤庾亮桓彝等並與親善于時江左草創綱維未舉嶠殊以為憂及見王導共談歡然曰江左自有管夷吾吾復何慮屢求反命不許會琨為段匹磾所害嶠表琨忠誠雖勳業不遂然家破身亡宜在褒崇以慰海內之望帝然之除散騎侍郎初嶠欲將命其母崔氏固止之嶠絶裾而去其後母亡嶠阻亂不獲歸葬由是固讓不拜苦請北歸詔三司八坐議其事皆曰昔伍員志復私讎先假諸侯之力東奔闔閭位為上將然後鞭荊王之尸若嶠以母未葬沒在胡虜者乃應竭其智謀仰憑皇靈使逆寇冰消反哀墓次豈可稍以乖嫌廢其遠圖哉嶠不得已乃受命後歷驃騎王導長史遷太子中庶子及在東宮深見寵遇太子與為布衣之交數陳規諷又獻侍臣針甚有弘益時太子起西池樓觀頗為勞費嶠上疏以為朝廷草創巨寇未滅宜應儉以率下務農重兵太子納焉王敦舉兵內向六軍敗績太子將自出戰嶠執鞚諫曰臣聞善戰者不怒善勝者不武如何萬乘儲副而以身輕天下太子乃止明帝即位拜侍中機密大謀皆所參綜詔命文翰亦悉豫焉俄轉中書令嶠有棟梁之任帝親而倚之甚為王敦所忌因請為左司馬敦阻兵不朝多行陵縱嶠諫敦曰昔周公之相成王勞謙吐握豈好勤而惡逸哉誠由處大任者不可不爾而公自還輦轂入輔朝政闕拜覲之禮簡人臣之儀不達聖心者莫不於邑昔帝舜服事唐堯伯禹竭身虞庭文王雖盛臣節不愆故有庇人之大德必有事君之小心俾芳烈奮乎百世休風流乎萬祀至聖遺軌所不宜忽願思舜禹文王服事之勤惟公旦吐握之事則天下幸甚敦不納嶠知其終不悟於是謬為設敬綜其府事干說密謀以附其欲深結錢鳳為之聲譽每曰錢世儀精神滿腹嶠素有知人之稱鳳聞而悅之深結好於嶠會丹楊尹缺嶠說敦曰京尹輦轂喉舌宜得文武兼能公宜自選其才若朝廷用人或不盡理敦然之問嶠誰可作者嶠曰愚謂錢鳳可用鳳亦推嶠嶠僞辭之敦不從表補丹楊尹嶠猶懼錢鳳為之姦謀因敦餞別嶠起行酒至鳳前鳳未及飲嶠因僞醉以手版擊鳳幘墜作色曰錢鳳何人溫太真行酒而敢不飲敦以為醉兩釋之臨去言別涕泗橫流出閣復入如是再三然後即路及發後鳳入說敦曰嶠於朝廷甚密而與庾亮深交未必可信敦曰太真昨醉小加聲色豈得以此便相讒二由是鳳謀不行而嶠得還都乃具奏敦之逆謀請先為之備及敦構逆加嶠中壘將軍持節都督東安北部諸軍事敦與王導書曰太真別來幾日作如此事表誅姦臣以嶠為首募生得嶠者當自拔其舌及王含錢鳳奄至都下嶠燒朱雀桁以挫其鋒帝怒之嶠曰今宿衛寡弱徵兵未至若賊豕突危及社稷陛下何惜一橋賊果不得渡嶠自率衆與賊夾水戰擊王含敗之復督劉遐追錢鳳於江寧事平封建寧縣開國公賜絹五千四百匹進號前將軍時制王敦綱紀除名參佐禁固嶠上疏曰王敦剛愎不仁忍行殺戮親任小人疏遠君子朝廷所不能抑骨肉所不能間處其朝者懼危亡故人士結舌道路以目誠賢人君子道窮數盡遵養時晦之辰也且敦為大逆之日拘録人士自免無路原其私心豈遑晏處如陸玩羊曼劉胤蔡謨郭璞常與臣言備知之矣必其凶悖自可罪人斯得如其枉入姦黨宜施之以寬加以玩等之誠聞於聖聽當受同賊之責實負其心陛下仁聖含弘思求允中臣階緣博納干非其事誠在愛才不忘忠益帝從之是時天下凋弊國用不足詔公卿以下詣都坐論時政之所先嶠因奏軍國要務其一曰祖約退舍壽陽有將來之難今二方守禦為功尚易淮泗都督宜竭力以資之選名重之士配征兵五千人又擇一偏將將二千兵以益壽陽可以保固徐豫援助司土其二曰一夫不耕必有受其饑者今不耕之夫動有萬計春廢勸課之制冬峻出租之令下未見施惟賦是聞賦不可以已當思令百姓有以殷實司徒置田曹掾州一人勸課農桑察吏能否今宜依舊置之必得清恪奉公足以宣示惠化者則所益實弘矣其三曰諸外州郡將兵者及都督府非臨敵之軍且田且守又先朝使五校出田今四軍五校有兵者及護軍所統外軍可分遣二軍出并屯要處緣江上下皆有良田開荒須一年之後即易且軍人纍重者在外有樵採蔬食之人於事為便其四曰建官以理世不以私人也如此則官寡而材精周制六卿蒞事春秋之時入作卿輔出將三軍後代建官漸多誠由事有煩簡耳然今江南六州之土尚又荒殘方之平日數十分之一耳三省軍校無兵者九府寺署可有并相領者可有省半者粗計間劇隨事減之荒殘之縣或同在一城可并合之如此選既可精祿俸可優令足代耕然後可責以清公耳其五曰古者親耕藉田以供粢盛舊置藉田廩犧之官今臨時市求既上黷至敬下費生靈非所以虔奉宗廟蒸嘗之旨宜如舊制立此二官其六曰使命愈遠益宜得才宣揚王化延譽四方人情不樂遂取卑品之人虧辱國命生長患害故宜重其選不可減二千石見居二品者其七曰罪不相及古之制也近者大逆誠由凶戾凶戾之甚一時權用今遂施行非聖朝之令典宜如先朝除三族之制議奏多納之帝疾篤嶠與王導郗鑒庾亮陸曄卞壼等同受顧命時歷陽太守蘇峻藏匿亡命朝廷疑之征西將軍陶侃有威名於荊楚又以西夏為虞故使嶠為上流形援咸和初代應詹為江州刺史持節都督平南將軍鎮武昌甚有惠政甄異行能親祭徐孺子之墓又陳豫章十郡之要宜以刺史居之尋陽濱江都督應鎮其地今以州帖府進退不便且古鎮將多不領州皆以文武形勢不同故也宜選單車刺史別撫豫章專理黎庶詔不許在鎮見王敦畫像曰敦大逆宜加斫棺之戮受崔杼之刑古人闔棺而定諡春秋大居正崇王父之命未有受戮於天子而圖形於羣下命削去之嶠聞蘇峻之徵也慮必有變求還朝以備不虞不聽未幾而蘇峻果反嶠屯尋陽遣督護王愆期西陽太守鄧嶽鄱陽內史紀瞻等率舟師赴難及京師傾覆嶠聞之號慟人有候之者悲哭相對俄而庾亮來奔宣太后詔進嶠驃騎將軍開府儀同三司嶠曰今日之急殄寇為先未效勳庸而逆受榮寵非所聞也何以示天下乎固辭不受時亮雖奔敗嶠每推崇之分兵給亮遣王愆期等要陶侃同赴國難侃恨不受顧命不許嶠初從之後用其部將毛寶說復固請侃行語在寶傳初嶠與庾亮相推為盟主嶠從弟充言於嶠曰征西位重兵強宜共推之嶠於是遣王愆期奉侃為盟主侃許之遣督護龔登率兵詣嶠嶠於是列上尚書陳峻罪狀有衆七千灑泣登舟移告四方征鎮曰賊臣祖約蘇峻同惡相濟用生邪心天奪其魄死期將至譴負天地自絶人倫寇不可縱宜增軍討撲輒屯次湓口即日護軍庾亮至宣太后詔寇逼宮城王旅撓敗出告藩臣謀寧社稷後將軍郭默冠軍將軍趙胤奮武將軍龔保與嶠督護王愆期西陽太守鄧嶽鄱陽內史紀瞻率其所領相尋而至逆賊肆凶陵蹈宗廟火延宮掖矢流太極二御幽逼宰相困迫殘虐朝士劫辱子女承問悲惶精魂飛散嶠暗弱不武不能徇難哀恨自咎五情摧隕慚負先帝託寄之重義在畢力死而後已今躬率所統為士卒先催進諸軍一時電擊西陽太守鄧嶽尋陽太守褚誕等連旗相繼宣城內史桓彝已勒所屬屯濱江之要江夏相周撫乃心求征軍已向路昔包胥楚國之微臣重趼致誠義感諸侯藺相如趙邦之陪隸恥君之辱按劍秦庭皇漢之季董卓作亂劫遷獻帝虐害忠良關東州郡相率同盟廣陵功曹臧洪郡之小吏耳登壇喢血涕淚橫流慷慨之節實厲羣后況今居台鼎據方州列名邦受國恩者哉不期而會不謀而同不亦宜乎二賊合衆不盈五千且外畏胡寇城內饑乏後將軍郭默即於戰陳俘殺賊千人賊今雖殘破都邑其宿衛兵人即時出散不為賊用且祖約情性褊厄忌克不仁蘇峻小子惟利是視殘酷驕猜權相假合江表興義以抗其前強胡外寇以躡其後運漕隔絶資食空懸內乏外孤勢何得久羣公征鎮職在禦侮征西陶公國之耆德忠肅義正勳庸弘著諸方鎮州郡咸齊斷金同稟規略以雪國恥苟利社稷死生以之嶠雖怯劣忝據一方賴忠賢之規文武之助君子竭誠小人盡力高操之士被褐而從戎負薪之徒匍匐而赴命率其私僕致其私杖人士之誠竹帛不能載也豈嶠無德而致之哉士稟義風人感皇澤且護軍庾公帝之元舅德望隆重率郭後軍趙龔三將與嶠勠力得有資憑且悲且慶若朝廷之不泯也其各明率所統無後事機賞募之信明如日月有能斬約峻者封五等侯賞布萬匹夫忠為令德為仁由己萬里一契義不在言也時陶侃雖許自下而未發復追其督護龔登嶠重與侃書曰僕謂軍有進而無退宜增而不可減近已移檄遠近言於盟府剋後月半大舉南康建安晉安三郡軍並在路次同赴此會惟須仁公所統至便齊進耳仁公今召軍還疑惑遠近成敗之由將在於此僕才輕任重實憑仁公篤愛遠稟成規至於首啓戎行不敢有辭僕與仁公當如常山之蛇首尾相衛又脣齒之喻也恐惑者不達高旨將謂仁公緩於討賊此聲難追僕與仁公並受方嶽之任安危休戚理既同之且自頃之顧綢繆往來情深義重著於人士之口一旦有急亦望仁公悉衆見救況社稷之難惟僕偏當一州州之文武莫不翹企假令此州不守約峻樹置官長於此荊楚西逼強胡東接逆賊因之以饑饉將來之危乃當甚於此州之今日也以大義言之則社稷顛覆主辱臣死公進當為大晉之忠臣參桓文之義開國承家銘之天府退當以慈父雪愛子之痛約峻凶逆無道囚制人士裸其五形近日來者不可忍見骨肉生離痛感天地人心齊一咸皆切齒今之進討若以石投卵耳今出軍既緩復召兵還人心乖離是為敗於幾成也願深察所陳以副三軍之望峻時殺侃子瞻由是侃激勵遂率所統與嶠亮同赴京師戎卒六萬旌旗七百餘里鉦鼓之聲震於百里直指石頭次于蔡洲侃屯查浦嶠屯沙門浦時祖約據歷陽與峻為首尾見嶠等軍盛謂其黨曰吾本知嶠能為四公子之事今果然矣峻聞嶠將至逼大駕幸石頭時峻軍多馬南軍杖舟楫不敢輕與交鋒用將軍李根計據白石築壘以自固使庾亮守之賊步騎萬餘來攻不下而退追斬二百餘級嶠又於四望磯築壘以逼賊曰賊必爭之設伏以逸待勞是制賊之一奇也是時義軍屢戰失利嶠軍食盡陶侃怒曰使君前云不憂無將士惟得老僕為主耳今數戰皆北良將安在荊州接胡蜀二虜倉廩當備不虞若復無食僕便欲西歸更思良算但今歲計殄賊不為晚也嶠曰不然自古成監師克在和光武之濟昆陽曹公之拔官渡以寡敵衆杖義故也峻約小豎為海內所患今日之舉決在一戰峻勇而無謀藉驕勝之勢自謂無前今挑之戰可一鼓而擒也何捨垂立之功設進退之計且天子幽逼社稷危殆四海臣子肝腦塗地嶠等與公並受國恩是致命之日事若克濟則臣主同祚如其不捷身雖灰滅不足以謝責於先帝今之事勢義無旋踵騎猛獸安可中下哉公若違衆獨反人心必沮沮衆敗事義旗將回指於公矣侃無以對遂留不去嶠於是創建行廟廣設壇場告皇天后土祖宗之靈親讀祝文聲氣激揚流涕覆面三軍莫能仰視其日侃督水軍向石頭亮嶠等率精勇一萬從白石以挑戰時峻勞其將士因醉突陳馬礩為侃將所斬峻弟逸及子碩嬰城自固嶠乃立行臺布告天下凡故吏二千石臺郎御史以下皆令赴臺於是至者雲集司徒王導因奏嶠侃録尚書遣間使宣旨並讓不受賊將匡術以臺城來降為逸所擊求救於嶠江州別駕羅洞曰今水暴長救之不便不如攻榻杭榻杭軍若敗術圍自解嶠從之遂破賊石頭軍奮威長史滕含抱天子奔于嶠船時陶侃雖為盟主而處分規略一出於嶠及賊滅拜驃騎將軍開府儀同三司加散騎常侍封始安郡公邑三千戶初峻黨路永匡術賈寧中塗悉以衆歸順王導將褒顯之嶠曰術輩首亂罪莫大焉晚雖改悟未足以補前失全其首領為幸已過何可復寵授哉導無以奪朝議將留輔政嶠以導先帝所任固辭還藩復以京邑荒殘資用不給嶠借資蓄具器用而後旋于武昌至牛渚磯水深不可測世云其下多怪物嶠遂燬犀角而照之須臾見水族覆火奇形異狀或乘馬車著赤衣者嶠其夜夢人謂己曰與君幽明道別何意相照也意甚惡之嶠先有齒疾至是拔之因中風至鎮未旬而卒時年四十二江州士庶聞之莫不相顧而泣帝下冊書曰朕以眇身纂承洪緒不能光闡大道化洽時雍至乃狂狡滔天社稷危逼惟公明鑒特達識心經遠懼皇綱之不維忿凶寇之縱暴唱率羣后五州響應首啓戎行元惡授馘王室危而復安三光幽而復明功格宇宙勳著八表方賴大猷以拯區夏天不憖遺早世薨殂朕用痛悼于厥心夫褒德銘勳先王之明典今追贈公侍中大將軍持節都督刺史公如故賜錢百萬布千匹諡曰忠武祠以太牢初葬于豫章後朝廷追嶠勳德將為造大墓於元明二帝陵之北陶侃上表曰故大將軍嶠忠誠著于聖世勳義感于人神非臣筆墨所能稱陳臨卒之際與臣書別臣藏之篋笥時時省視每一思述未嘗不中夜撫膺臨飯酸噎人之云亡嶠實當之謹寫嶠書上呈伏惟陛下既垂御省傷其情旨死不忘忠身沒黃泉追恨國恥將臣勠力救濟艱難使亡而有知抱恨結草豈樂今日勞費之事願陛下慈恩停其移葬使嶠棺柩無風波之危魂靈安於后土詔從之其後嶠後妻何氏卒子放之便載喪還都詔葬建平陵北并贈嶠前妻王氏及何氏始安夫人印綬放之嗣爵少歷清官纍至給事黃門侍郎以貧求為交州朝廷許之王述與會稽王箋曰放之溫嶠之子宜見優異而投之嶺外竊用愕然願遠存周禮近參人情則望實惟允時竟不納放之既至南海甚有威惠將征林邑交址太守杜寶別駕阮朗並不從放之以其沮衆誅之勒兵而進遂破林邑而還卒于官弟式之新建縣侯位至散騎常侍郗鑒子愔愔子超愔弟曇曇子恢鑒叔父隆郗鑒字道徽高平金鄉人漢御史大夫慮之玄孫也少孤貧博覽經籍躬耕隴畝吟詠不倦以儒雅著名不應州命趙王倫辟為掾知倫有不臣之迹稱疾去職及倫篡其黨皆至大官而鑒閉門自守不染逆節惠帝反正參司空軍事纍遷太子中舍人中書侍郎東海王越辟為主簿舉賢良不行征東大將軍苟晞檄為從事中郎晞與越方以力爭鑒不應其召從兄旭晞之別駕恐禍及己勸之赴召鑒終不回晞亦不之逼也及京師不守寇難鋒起鑒遂陷於陳午賊中邑人張實先求交於鑒鑒不許至是實於午營來省鑒疾既而卿鑒鑒謂實曰相與邦壤義不及通何可怙亂至此邪實大慚而退午以鑒有名於世將逼為主鑒逃而獲免午尋潰散鑒得歸鄉里于時所在饑荒州中之士素有感其恩義者相與資贍鑒復分所得以恤宗族及鄉曲孤老賴而全濟者甚多咸相謂曰今天子播越中原無伯當歸依仁德可以後亡遂共推鑒為主舉千餘家俱避難於魯之嶧山元帝初鎮江左承制假鑒龍驤將軍兗州刺史鎮鄒山時荀藩用李述劉琨用兄子演並為兗州各屯一郡以力相傾闔州編戶莫知所適又徐龕石勒左右交侵日尋干戈外無救援百姓饑饉或掘野鼠蟄燕而食之終無叛者三年間衆至數萬帝就加輔國將軍都督兗州諸軍事永昌初徵拜領軍將軍既至轉尚書以疾不拜時明帝初即位王敦專制內外危逼謀杖鑒為外援由是拜安西將軍兗州刺史都督揚州江西諸軍假節鎮合肥敦忌之表為尚書令徵還道經姑孰與敦相見敦謂曰樂彥輔短才耳後生流宕言違名檢考之以實豈勝滿武秋邪鑒曰擬人必于其倫彥輔道韵平淡體識沖粹處傾危之朝不可得而親疏及愍懷太子之廢可謂柔而有正武秋失節之士何可同日而言敦曰愍懷廢徙之際交有危機之急人何能以死守之乎以此相方其不減明矣鑒曰丈夫既潔身北面義同在三豈可偷生屈節靦顏天壤邪苟道數終極固當存亡以之耳敦素懷無君之心聞鑒言大忿之遂不復相見拘留不遣敦之黨與譖毀日至鑒舉止自若初無懼心敦謂錢鳳曰郗道徽儒雅之士名位既重何得害之乃放還臺鑒遂與帝謀滅敦既而錢鳳攻逼京都假鑒節加衛將軍都督從駕諸軍事鑒以無益事實固辭不受軍號時議者以王含錢鳳衆力百倍苑城小而不固宜及軍勢未成大駕自出距戰鑒曰羣逆縱逸其勢不可當可以算屈難以力競且含等號令不一抄盜相尋百姓懲往年之暴皆人自為守乘逆順之勢何往不克且賊無經略遠圖惟恃豕突一戰曠日持久必啓義士之心令謀猷得展今以此弱力敵彼強寇決勝負於一朝定成敗於呼吸雖有申胥之徒義存投袂何補於既往哉帝從之鑒以尚書令領諸屯營及鳳等平溫嶠上議請宥敦佐吏鑒以為先王崇君臣之教故貴伏死之節昏亡之主故開待放之門王敦佐吏雖多逼迫然居逆亂之朝無出關之操準之前訓宜加義責又奏錢鳳母年八十宜蒙全宥乃從之封高平侯賜絹四千八百匹帝以其有器望萬機動靜輒問之乃詔鑒特草上表疏以從簡易王導議欲贈周札官鑒以為不合語在札傳導不從鑒於是駁之曰敦之逆謀履霜日久緣札開門令王師不振若敦前者之舉義同桓文則先帝可為幽厲邪朝臣雖無以難而不能從俄而遷車騎將軍都督徐兗青三州軍事兗州刺史假節鎮廣陵尋而帝崩鑒與王導卞壼溫嶠庾亮陸曄等並受遺詔輔少主進位車騎大將軍開府儀同三司加散騎常侍咸和初領徐州刺史及祖約蘇峻反鑒聞難便欲率所領東赴詔以北寇不許於是遣司馬劉矩領三千人宿衛京都尋而王師敗績矩遂退還中書令庾亮宣太后口詔進鑒為司空鑒去賊密邇城孤糧絶人情業業莫有固志奉詔流涕設壇場刑白馬大誓三軍曰賊臣祖約蘇峻不恭天命不畏王誅凶戾肆逆干國之紀陵汨五常侮弄神器遂制脅幽主拔本塞原殘害忠良禍虐黎庶使天地神祇靡所依歸是以率土怨酷兆庶泣血咸願奉辭罰罪以除元惡昔戎狄泯周齊桓糾盟董卓陵漢羣后致討義存君親古今一也今主上幽危百姓倒懸忠臣正士志存報國凡我同盟既盟之後勠力一心以救社稷若二寇不梟義無偷安有渝此盟明神殛之鑒登壇慷慨三軍爭為用命乃遣將軍夏侯長等間行謂平南將軍溫嶠曰今賊謀欲挾天子東入會稽宜先立營壘屯據要害既防其越逸又斷賊糧運然後靜鎮京口清壁以待賊賊攻城不拔野無所掠東道既斷糧運自絶不過百日必自潰矣嶠深以為然及陶侃為盟主進鑒都督揚州八郡軍事時撫軍將軍王舒輔軍將軍虞潭皆受鑒節度率衆渡江與侃會于茄子浦鑒築白石壘而據之會舒潭戰不利鑒與後將軍郭默還丹徒立大業曲阿庱亭三壘以距賊而賊將張健來攻大業城中乏水郭默窘迫遂突圍而出三軍失色參軍曹納以為大業京口之扞一旦不守賊方軌而前勸鑒退還廣陵以俟後舉鑒乃大會僚佐責納曰吾蒙先帝厚顧荷託付之重正復捐軀九泉不足以報今強寇在郊衆心危迫君腹心之佐而生長異端當何以率先義衆鎮一三軍邪將斬之久而乃釋會峻死大業圍解及蘇逸等走吳興鑒遣參軍李閎追斬之降男女萬餘口拜司空加侍中解八郡都督更封南昌縣公以先爵封其子曇時賊帥劉徵聚衆數千浮海抄東南諸縣鑒遂城京口加都督揚州之晉陵吳郡諸軍事率衆討平之進位太尉後以寢疾上疏遜位曰臣疾彌留遂至沈篤自忖氣力差理難冀有生有死自然之分但忝位過才曾無以報上慚先帝下愧日月伏枕哀歎抱恨黃泉臣今虛乏救命朝夕輒以府事付長史劉遐乞骸骨歸丘園惟願陛下崇山海之量弘濟大猷任賢使能事從簡易使康哉之歌復興於今則臣雖死猶生之日耳臣所統錯雜率多北人或逼遷徙或是新附百姓懷土皆有歸本之心臣宣國恩示以好惡處與田宅漸得少安聞臣疾篤衆情駭動若當北渡必啓寇心太常臣謨平簡貞正素望所歸謂可以為都督徐州刺史臣亡兄息晉陵內史邁謙愛養士甚為流亡所宗又是臣門戶子弟堪任兗州刺史公家之事知無不為是以敢希祁奚之舉疏奏以蔡謨為鑒軍司鑒尋薨時年七十一帝朝晡哭于朝堂遣御史持節護喪事贈一依溫嶠故事冊曰惟公道德沖邃體識弘遠忠亮雅正行為世表歷位內外勳庸彌著乃者約峻狂狡毒流朝廷社稷之危賴公以寧功侔古烈勳邁桓文方倚大猷藩翼時難昊天不弔奄忽薨殂朕用震悼于厥心夫爵以顯德諡以表行所以崇明軌迹丕揚徽劭今贈太宰諡曰文成祠以太牢魂而有靈嘉茲寵榮初鑒值永嘉喪亂在鄉里甚窮餒鄉人以鑒名德傳共飴之時兄子邁外甥周翼並小常攜之就食鄉人曰各自饑困以君賢欲共相濟耳恐不能兼有所存鑒於是獨往食訖以飯著兩頰邊還吐與二兒後並得存同過江邁位至護軍翼為剡縣令鑒之薨也翼追撫育之恩解職而歸席苫心喪三年二子愔曇愔字方回少不交競弱冠除散騎侍郎不拜性至孝居父母憂殆將滅性服闋襲爵南昌公徵拜中書侍郎驃騎何充輔政征北將軍褚裒鎮京口皆以愔為長史再遷黃門侍郎時吳郡守闋欲以愔為太守愔自以資望少不宜超蒞大郡朝議嘉之轉為臨海太守會弟曇卒益無處世意在郡優游頗稱簡默與姊夫王羲之高士許詢並有邁世之風俱棲心絶穀修黃老之術後以疾去職乃築宅章安有終焉之志十許年間人事頓絶簡文帝輔政與尚書僕射江虨等薦愔以為執德存正識懷沈敏而辭職遺榮有不拔之操成務須才豈得遂其獨善宜見徵引以參政術於是徵為光祿大夫加散騎常侍既到更除太常固讓不拜深抱沖退樂補遠郡從之出為輔國將軍會稽內史大司馬桓溫以愔與徐兗有故義乃遷愔都督徐兗青幽揚州之晉陵諸軍事領徐兗二州刺史假節雖居藩鎮非其好也俄屬桓溫北伐愔請督所部出河上用其子超計以己非將帥才不堪軍旅又固辭解職勸溫并領己所統轉冠軍將軍會稽內史及帝踐阼就加鎮軍都督浙江東五郡軍事久之以年老乞骸骨因居會稽徵拜司空詔書優美敦奬殷勤固辭不起太元九年卒時年七十二追贈侍中司空諡曰文穆三子超融沖超最知名超字景興一字嘉賓少卓犖不羈有曠世之度交游士林每存勝拔善談論義理精微愔事天師道而超奉佛愔又好聚斂積錢數千萬嘗開庫任超所取超性好施一日中散與親故都盡其任心獨詣皆此類也桓溫辟為征西大將軍掾溫遷大司馬又轉為參軍溫英氣高邁罕有所推與超言常謂不能測遂傾意禮待超亦深自結納時王珣為溫主簿亦為溫所重府中語曰髯參軍短主簿能令公喜能令公怒超髯珣短故也尋除散騎侍郎時愔在北府徐州人多徑悍溫云京口酒可飲兵可用深不欲愔居之而愔暗於事機遣箋詣溫欲共奬王室修復園陵超取視寸寸毀裂乃更作箋自陳老病甚不堪人間乞間地自養溫得箋大喜即轉愔為會稽太守溫懷不軌欲立霸王之基超為之謀謝安與王坦之嘗詣溫論事溫令超帳中臥聽之風動帳開安笑曰郗生可謂入幕之賓矣太和中溫將伐慕容氏於臨漳超諫以道遠汴水又淺運道不通溫不從遂引軍自濟入河超又進策於溫曰清水入河無通運理若寇不戰運道又難因資無所實為深慮也今盛夏悉力徑造鄴城彼伏公威略必望陳而走退還幽朔矣若能決戰呼吸可定設欲城鄴難為功力百姓布野盡為官有易水以南必交臂請命但恐此計輕決公必務其持重耳若此計不從使當頓兵河濟控引糧運令資儲充備足及來夏雖如賒遲終亦濟克若舍此二策而連軍西進進不速決退必愆乏賊因此勢日月相引僶俯秋冬船道澀滯且北土早寒三軍裘褐者少恐不可以涉冬此大限閡非惟無食而已溫不從果有枋頭之敗溫深慚之尋而有壽陽之捷問超曰此足以雪枋頭之恥乎超曰未厭有識之情也既而超就溫宿中夜謂溫曰明公都有慮不溫曰卿欲有所言邪超曰明公既居重任天下之責將歸於公矣若不能行廢立大事為伊霍之舉者不足鎮壓四海震服宇內豈可不深思哉溫既素有此計深納其言遂定廢立超始謀也遷中書侍郎謝安嘗與王文度共詣超日旰未得前文度便欲去安曰不能為性命忍俄頃邪其權重當時如此轉司徒左長史母喪去職常謂其父名公之子位遇應在謝安右而安入掌機權愔優游而已懷憤憤發言慷慨由是與謝氏不穆安亦深恨之服闋除散騎常侍不起以為臨海太守加宣威將軍不拜年四十二先愔卒初超雖實黨桓氏以愔忠於王室不令知之將亡出一箱書付門生曰本欲焚之恐公年尊必以傷愍為弊我亡後若大損眠食可呈此箱不爾便燒之愔後果哀悼成疾門生依旨呈之則悉與溫往反密計愔於是大怒曰小子死恨晚矣更不復哭凡超所交友皆一時秀美雖寒門後進亦拔而友之及死之日貴賤操筆而為誄者四十餘人其為衆所宗貴如此王獻之兄弟自超未亡見愔常躡履問訊甚修舅甥之禮及超死見愔慢怠屐而候之命席便遷延辭避愔每慨然曰使嘉賓不死鼠子敢爾邪性好聞人棲遁有能辭榮拂衣者超為之起屋宇作器服畜僕豎費百金而不吝又沙門支遁以清談著名于時風流勝貴莫不崇敬以為造微之功足參諸正始而遁常重超以為一時之俊甚相知賞超無子從弟儉之以子僧施嗣僧施字惠脫襲爵南昌公弱冠與王綏桓胤齊名纍居清顯領宣城內史入補丹楊尹劉毅鎮江陵請為南蠻校尉假節與毅俱誅國除曇字重熙少賜爵東安縣開國伯司徒王導辟祕書郎朝論以曇名臣之子每逼以憲制年三十始拜通直散騎侍郎遷中書侍郎簡文帝為撫軍引為司馬尋除尚書吏部郎拜御史中丞時北中郎荀羡有疾朝廷以曇為羡軍司加散騎常侍頃之羡徵還仍除北中郎將都督徐兗青幽揚州之晉陵諸軍事領徐兗二州刺史假節鎮下邳後與賊帥傅末波等戰失利降號建威將軍尋卒年四十二追贈北中郎諡曰簡子恢嗣恢字道胤少襲父爵散騎侍郎纍遷給事黃門侍郎領太子右衛率恢身長八尺美鬚髯孝武帝深器之以為有藩伯之望會朱序自表去職擢恢為梁秦雍司荊揚并等州諸軍事建威將軍雍州刺史假節鎮襄陽恢甚得關隴之和降附者動有千計初姚萇將竇衝來降拜東羌校尉衝後舉兵反入漢川襲梁州時關中有巴蜀之衆皆背萇據弘農以結苻登而登署衝為左丞相徙屯華陰河南太守楊佺期遣上黨太守荀靜戍皇天塢以距之衝數來攻恢遣將軍趙睦守金墉城而佺期率衆次湖城討衝走之尋而慕容垂圍慕容永於潞川永窮蹙遣其子弘求救於恢并獻玉璽一紐恢獻璽於臺又陳垂若并永其勢難測今於國計謂宜救永永垂並存自為仇讎連雞不棲無能為患然後乘機雙斃則河北可平孝武帝以為然詔王恭庾楷救之未及發而永沒楊佺期以疾去職恢以隨郡太守夏侯宗之為河南太守戍洛陽姚萇遣其子略攻湖城及上洛又使其將楊佛嵩圍洛陽恢遣建武將軍辛恭靖救洛陽梁州刺史王正胤率衆出子午谷以為聲援略懼而退恢以功進征虜將軍又領秦州刺史加督隴上軍時魏氏強盛山陵危逼恢遣江夏相鄧啓方等以萬人距之與魏主拓跋圭戰於滎陽大敗而還及王恭討王國寶桓玄殷仲堪皆舉兵應恭恢與朝廷掎角玄等襄陽太守夏侯宗之府司馬郭毗並以為不可恢皆殺之既而玄等退守尋陽以恢為尚書將家還都至楊口仲堪陰使人於道殺之及其四子託以羣蠻所殺喪還京師贈鎮軍將軍子循嗣隆字弘始蹇亮有匪躬之節初為尚書郎轉左丞在朝為百僚所憚坐漏泄事免頃之為吏部郎復免補東郡太守隆少為趙王倫所善及倫專擅召為散騎常侍倫之篡也以為揚州刺史僚屬有犯輒依臺閣峻制繩之遠近咸怨尋加寧東將軍未拜而齊王冏檄至中州人在軍者皆欲赴義隆以兄子鑒為趙王掾諸子悉在京洛故猶豫未決主簿趙誘前秀才虞潭白隆曰當今上計明使君自將精兵徑赴齊王中計明使君可留督攝速遣猛將率精兵疾赴下計示遣兵將助而稱背倫隆素敬別駕顧彥密與謀之彥曰趙誘下計乃上策也西曹留承聞彥言請見曰不審明使君當今何施隆曰我俱受二帝恩無所偏助惟欲守州而已承曰天下者世祖皇帝之天下也太上承代已積十年今上取四海不平齊王應天順時成敗之事可見使君若顧二帝自可不行宜急下檄文速遣精兵猛將若其疑惑此州豈可得保也隆無所言而停檄六日時寧遠將軍陳留王邃領東海都尉鎮石頭隆軍人西赴邃甚衆隆遣從事於牛渚禁之不得止將士憤怒夜扶邃為主而攻之隆父子皆死顧彥亦被害誣隆聚合遠近圖為不軌隆之死也時議莫不痛惜焉史臣曰忠臣本乎孝子奉上資乎愛親自家刑國於斯極矣太真性履純深譽流邦族始則承顏候色老萊弗之加也既而辭親蹈義申胥何以尚焉封狐萬里投軀而弗顧猰窳千羣探穴而忘死竟能宣力王室揚名本朝負荷受遺繼之全節言念主辱義聲動於天地祗赴國屯信誓明於日月枕戈雨泣若雪分天之仇皇輿旋軫卒復夷庚之躅微夫人之誠懇大盜幾移國乎道徽儒雅柔而有正協德始安頗均連璧方回踵武奕世登台露冕為飾援高人以同志抑惟大隱者歟愛子云亡省遺文而輟泣殊有大義之風矣贊曰太真懷貞勤宣乃誠謀敦翦峻奮節摛名道徽忠徑高芬遠映愔克負荷超慚雅正
