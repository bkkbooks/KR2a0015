body:
  text: 晉書卷六十列傳第三十解系弟結結弟育解系字少連濟南著人也父修魏琅邪太守梁州刺史考績為天下第一武帝受禪封梁鄒侯系及二弟結育並清身潔己甚得聲譽時荀勖門宗強盛朝野畏憚之勖諸子謂系等曰我與卿為友應向我公拜勖又曰我與尊先使君親厚系曰不奉先君遺教公若與先君厚往日哀頓當垂書問親厚之誨非所敢承勖父子大慚當世壯之後辟公府掾歷中書黃門侍郎散騎常侍豫州刺史遷尚書出為雍州刺史揚烈將軍西戎校尉假節會氐羌叛與征西將軍趙王倫討之倫信用佞人孫秀與系爭軍事更相表奏朝廷知系守正不撓而召倫還系表殺秀以謝氐羌不從倫秀譖之系坐免官以白衣還第闔門自守及張華裴頠之被誅也倫秀以宿憾收系兄弟梁王肜救系等倫怒曰我於水中見蟹且惡之況此人兄弟輕我邪此而可忍孰不可忍肜苦爭之不得遂害之并戮其妻子後齊王冏起義時以裴解為冤首倫秀既誅冏乃奏曰臣聞興微繼絶聖主之高政貶惡嘉善春秋之美談是以武王封比干之墓表商容之閭誠幽明之故有以相通也孫秀逆亂滅佐命之國誅骨鯁之臣以喪王室肆其虐戾功臣之後多見泯滅至如張華裴頠各以見憚取誅於時系結同以羔羊被害歐陽建等無罪而死百姓憐之陛下更日月之光照布惟新之明命然此等未蒙恩理昔欒郤降在皂隸而春秋傳其人幽王絶功臣之後棄賢者子孫而詩人以為刺臣備忝右職思竭股肱獻納愚誠若合聖意可羣官通議八坐議以系等清公正直為姦邪所疾無罪橫戮冤痛已甚如大司馬所啓彰明枉直顯宣當否使冤魂無愧無恨為恩大矣永寧二年追贈光祿大夫改葬加弔祭焉結字叔連少與系齊名辟公府掾纍遷黃門侍郎歷散騎常侍豫州刺史魏郡太守御史中丞時孫秀亂關中結在都坐議秀罪應誅秀由是致憾及系被害結亦同戮女適裴氏明日當嫁而禍起裴氏欲認活之女曰家既若此我何活為亦坐死朝廷遂議革舊制女不從坐由結女始也後贈結光祿大夫改葬加弔祭結弟育字稚連名亞二兄歷公府掾太子洗馬尚書郎衛軍長史弘農太守與二兄俱被害妻子徙邊孫旗孫旗字伯旗樂安人也父歷魏晉際為幽州刺史右將軍旗潔靜少自修立察孝廉纍遷黃門侍郎出為荊州刺史名位與二解相亞永熙中徵拜太子詹事轉衛尉坐武庫火免官歲餘出為兗州刺史遷平南將軍假節旗子弼及弟子髦輔琰四人並有吏材稱於當世遂與孫秀合族及趙王倫起事夜從秀開神武門下觀閲器械兄弟旬月相次為公府掾尚書郎弼又為中堅將軍領尚書左丞轉為上將軍領射聲校尉髦為武衛將軍領太子詹事琰為武威將軍領太子左率皆賜爵開國郡侯推崇旗為車騎將軍開府初旗以弼等受署僞朝遣小息回責讓弼等以過差之事必為家禍弼等終不從旗制之不可但慟哭而已及齊王冏起義四子皆伏誅襄陽太守宗岱承冏檄斬旗夷三族弟尹字文旗歷陳留陽平太守早卒孟觀孟觀字叔時渤海東光人也少好讀書解天文惠帝即位稍遷殿中中郎賈后悖婦姑之禮陰欲誅楊駿而廢太后因駿專權數言之於帝又使人諷觀會楚王瑋將討駿觀受賈后旨宣詔頗加誣其事及駿誅以觀為黃門侍郎特給親信四十人遷積弩將軍封上谷郡公氐帥齊萬年反於關中衆數十萬諸將覆敗相繼中書令陳準監張華以趙梁諸王在關中雍容貴戚進不貪功退不懼罪士卒雖衆不為之用周處喪敗職此之由上下離心難以勝敵以觀沈毅有文武材用乃啓觀討之觀所領宿衛兵皆趫捷勇悍并統關中士卒身當矢石大戰十數皆破之生擒萬年威懾氐羌轉東羌校尉徵拜右將軍趙王倫篡位以觀所在著績署為安南將軍監河北諸軍事假節屯宛觀子平為淮南王允前鋒將軍討倫戰死孫秀以觀杖兵在外假言平為允兵所害贈積弩將軍以安觀義軍既起多勸觀應齊王冏觀以紫宮帝坐無他變謂倫應之遂不從衆議而為倫守及帝反正永饒冶令空桐機斬觀首傳于洛陽遂夷三族牽秀牽秀字成叔武邑觀津人也祖招魏雁門太守秀博辨有文才性豪俠弱冠得美名為太保衛瓘尚書崔洪所知太康中調補新安令纍遷司空從事中郎與帝舅王愷素相輕侮愷諷司隸荀愷奏秀夜在道中載高平國守士田興妻秀即表訴被誣論愷穢行文辭亢厲以譏抵外戚于時朝臣雖多證明其行而秀盛名美譽由是而損遂坐免官後司空張華請為長史秀任氣好為將帥張昌作亂長沙王遣秀討昌秀出關因奔成都王穎穎伐以秀為冠軍將軍與陸機王粹等共為河橋之役機戰敗秀證成其罪又諂事黃門孟玖故見親於穎惠帝西幸長安以秀為尚書秀少在京輦見司隸劉毅奏事而扼腕慷慨自謂居司直之任當能激濁揚清處鼓鞞之間必建將帥之勳及在常伯納言亦未曾有規獻弼違之奇也河間王顒甚親任之關東諸軍奉迎大駕以秀為平北將軍鎮馮翊秀與顒將馬瞻等將輔顒以守關中顒密遣使就東海王越求迎越遣將麋晃等迎顒時秀擁衆在馮翊晃不敢進顒長史楊騰前不應越軍懼越討之欲取秀以自效與馮翊大姓諸嚴詐稱顒命使秀罷兵秀信之騰遂殺秀於萬年繆播從弟胤繆播字宣則蘭陵人也父悅光祿大夫播才思清辨有意義高密王泰為司空以播為祭酒纍遷太弟中庶子惠帝幸長安河間王顒欲挾天子令諸侯東海王越將起兵奉迎天子以播父時故吏委以心膂播從弟右衛率胤顒前妃之弟也越遣播胤詣長安說顒令奉帝還洛約與顒分陝為伯播胤素為顒所敬信既相見虛懷從之顒將張方自以罪重懼為誅首謂顒曰今據形勝之地國富兵強奉天子以號令誰敢不服顒惑方所謀猶豫不決方惡播胤為越游說陰欲殺之播等亦慮方為難不敢復言時越兵鋒甚盛顒深憂之播胤乃復說顒急斬方以謝可不勞而安顒從之於是斬方以謝山東諸侯顒後悔之又以兵距越屢為越所敗帝反舊都播亦從太弟還洛契闊艱難深相親狎及帝崩太弟即帝位是為懷帝以播為給事黃門侍郎俄轉侍中徙中書令任遇日隆專管詔命時越威權自己帝力不能討心甚惡之以播胤等有公輔之量又盡忠於國故委以心膂越懼為己害因入朝以兵入宮執播等於帝側帝歎曰姦臣賊子無世無之不自我先不自我後哀哉起執播等手涕泗歔欷不能自禁越遂害之朝野憤惋咸曰善人國之紀也而加虐焉其能終乎及越薨帝贈播衛尉祠以少牢胤字休祖安平獻王外孫也與播名譽略齊初為尚書郎後遷太弟左衛率轉魏郡太守及王浚軍逼鄴石超等大敗胤奔東海王越於徐州越使胤與播俱入關而所說得行大駕東還越以胤為冠軍將軍南陽太守胤從藍田出武關之南陽前守衛展距胤不受胤乃還洛懷帝即位拜胤左衛將軍轉散騎常侍太僕卿既而與播及帝舅王延尚書何綏太史令高堂沖並參機密為東海王越所害皇甫重皇甫重字倫叔安定朝人也性沈果有才用為司空張華所知稍遷新平太守元康中華版為秦州刺史齊王冏輔政以重弟商為參軍冏誅長沙王又以為參軍時河間王顒鎮關中其將李含先與商重有隙每銜之及此說顒曰商為所任重終不為人用宜急除之以去一方之患可表遷重為內職因其經長安乃執之重知其謀乃露檄上尚書以顒信任李含將欲為亂召集隴上士衆以討含為名以兵革纍興今始寧息表請遣使詔重罷兵徵含為河南尹含既就徵重不奉詔顒遣金城太守游楷隴西太守韓稚等四郡兵攻之頃之成都王穎與顒起兵共攻以討后父尚書僕射羊玄之及商為名以商為左將軍河東太守領萬餘人於闕門距張方為方所破顒軍遂進既屢敗乃使商間行齎帝手詔使游楷盡罷兵令重進軍討顒商行過長安至新平遇其從甥從甥素憎商以告顒顒捕得商殺之既敗重猶堅守閉塞外門城內莫知而四郡兵築土山攻城重輒以連弩射之所在為地窟以防外攻權變百端外軍不得近城將士為之死戰顒知不可拔乃上表求遣御史宣詔喻之令降重知非朝廷本意不奉詔獲御史騶人問曰我弟將兵來欲至未騶云已為河間王所害重失色立殺騶於是城內知無外救遂共殺重先是重被圍急遣養子昌請救於東海王越越以顒新廢成都王穎與山東連和不肯出兵昌乃與故殿中人楊篇詐稱越命迎羊后於金墉城入宮以后令發兵討張方奉迎大駕事起倉卒百官初皆從之俄而又共誅昌張輔張輔字世偉南陽西鄂人漢河間相衡之後也少有幹局與從母兄劉喬齊名初補藍田令不為豪強所屈時強弩將軍龐宗西州大姓護軍趙浚宗婦族也故僮僕放縱為百姓所患輔繩之殺其二奴又奪宗田二百餘頃以給貧戶一縣稱之轉山陽令太尉陳準家僮亦暴橫輔復擊殺之纍遷尚書郎封宜昌亭侯轉御史中丞時積弩將軍孟觀與明威將軍郝彥不協而觀因軍事害彥又賈謐潘嶽石崇等共相引重及義陽王威有詐冒事輔並糾劾之梁州刺史楊欣有姊喪未經旬車騎長史韓預強聘其女為妻輔為中正貶預以清風俗論者稱之及孫秀執權威構輔於秀秀惑之將繩輔以法輔與秀箋曰輔徒知希慕古人當官而行不復自知小為身計今義陽王誠弘恕不以介意然輔母年七十六常見憂慮恐輔將以怨疾獲罪願明公留神省察輔前後行事是國之愚臣而已秀雖凶狡知輔雅正為威所誣乃止後遷馮翊太守是時長沙王以河間王顒專制關中有不臣之跡言於惠帝密詔雍州刺史劉沈秦州刺史皇甫重使討顒於是沈等與顒戰於長安輔遂將兵救顒沈等敗績顒德之乃以輔代重為秦州刺史當赴顒之難金城太守游楷亦皆有功轉梁州刺史不之官楷聞輔之還不時迎輔陰圖之又殺天水太守封尚欲揚威西土召隴西太守韓稚會議未決稚子朴有武幹斬異議者即收兵伐輔輔與稚戰於遮多谷口輔軍敗績為天水故帳下督富整所殺初輔嘗著論云管仲不若鮑叔鮑叔知所奉知所投管仲奉主而不能濟所奔又非濟事之國三歸反坫皆鮑不為又論班固司馬遷云遷之著述辭約而事舉三千年事唯五十萬言班固二百年事乃八十萬言煩省不同不如遷一也良史述事善足以奬勸惡足以監誡人道之常中流小事亦無取焉而班皆書之不如二也毀貶朝錯傷忠臣之道不如三也遷既造創固又因循難易益不同矣又遷為蘇秦張儀范睢蔡澤作傳逞辭流離亦足以明其大才故述辨士則辭藻華靡實録則隱核名檢此所以遷稱良史也又論魏武帝不及劉備樂毅減於諸葛亮詞多不載李含李含字世容隴西狄道人也僑居始平少有才幹兩郡並舉孝廉安定皇甫商州里年少少恃豪族以含門寒微欲與結交含距而不納商恨焉遂諷州以短檄召含為門亭長會州刺史郭奕素聞其賢下車擢含為別駕遂處羣僚之右尋舉秀才薦之公府自太保掾轉秦國郎中令司徒選含領始平中正秦王柬薨含依臺儀葬訖除喪尚書趙浚有內寵疾含不事己遂奏含不應除喪本州大中正傅祗以名義貶含中丞傅咸上表理含曰臣州秦國郎中令始平李含忠公清正才經世務實有史魚秉直之風雖以此不能協和流俗然其名行峻厲不可得掩二郡並舉孝廉異行尚書郭奕臨州含寒門少年而奕超為別駕太保衛瓘辟含為掾每語臣曰李世容當為晉匪躬之臣秦王之薨悲慟感人百僚會喪皆所目見而今以含俯就王制謂之背戚居榮奪其中正天王之朝既葬不除藩國之喪既葬而除藩國欲同不除乃當責引尊準卑非所宜言耳今天朝告于上欲令藩國服于下此為藩國之義隆而天朝之禮薄也又云諸王公皆終喪禮寧盡乃明以喪制宜隆務在敦重也夫寧盡乃明以哀其病耳異於天朝制使終喪未見斯文國制既葬而除既除而祔爰自漢魏迄于聖晉文皇升遐武帝崩殂世祖過哀陛下毀頓銜疚諒暗以終三年率土臣妾豈無攀慕遂服之心實以國制不可而踰故於既葬不敢不除天王之喪釋除於上藩國之臣獨遂于下此不可安復以秦王無後含應為喪主而王喪既除而祔則應吉祭因曰王未有廟主不應除服秦王始封無所連祔靈主所居即便為廟不問國制云何而以無廟為貶以含今日之所行移博士使案禮文必也放勳之殂遏密三載世祖之崩數旬即吉引古繩今闔世有貶何但李含不應除服今也無貶王制故也聖上諒暗哀聲不輟股肱近侍猶宜心喪不宜便行婚娶歡樂之事而莫云者豈不以大制不可而曲邪且前以含有王喪上為差代尚書敕王葬日在近葬訖含應攝職不聽差代葬訖含猶躊躇司徒屢罰訪問踧含攝職而隨擊之此為臺敕府符陷含於惡若謂臺府為傷教義則當據正不正符敕唯含是貶含之困躓尚足惜乎國制不可偏耳又含自以隴西人雖戶屬始平非所綜悉自初見使為中正反覆言辭說非始平國人不宜為中正後為郎中令又自以選官引臺府為比以讓常山太守蘇韶辭意懇切形于文墨含之固讓乃在王未薨之前葬後躊躇窮於對罰而攝職耳臣從弟祗為州都意在欲隆風教議含已過不良之人遂相扇動冀挾名義法外致案足有所邀中正龐騰便割含品臣雖無祁大夫之德見含為騰所侮謹表以聞乞朝廷以時博議無令騰得妄弄刀尺帝不從含遂被貶退割為五品歸長安歲餘光祿差含為壽城邸閣督司徒王戎表含曾為大臣雖見割削不應降為此職詔停後為始平令及趙王倫篡位或謂孫秀曰李含有文武大才無以資人秀以為東武陽令河間王顒表請含為征西司馬甚見信任頃之轉為長史顒誅夏侯奭送齊王冏使與趙王倫遣張方率衆赴倫皆含謀也後顒聞三王兵盛乃加含龍驤將軍統席薳等鐵騎回遣張方軍以應義師天子反正含至潼關而還初梁州刺史皇甫商為趙王倫所任倫敗去職詣顒顒慰撫之甚厚含諫顒曰商倫之信臣懼罪至此不宜數與相見商知而恨之及商當還都顒置酒餞行商因與含忿爭顒和釋之後含被徵為翊軍校尉時商參齊王冏軍事而夏侯奭兄在冏府稱奭立義被西藩枉害含心不自安冏右司馬趙驤又與含有隙冏將閲武含懼驤因兵討之乃單馬出奔于顒矯稱受密詔顒即夜見之乃說顒曰成都王至親有大功還藩甚得衆心齊王越親而專執威權朝廷側目今檄長沙王令討齊使先聞於齊齊必誅長沙因傳檄以加齊罪則冏可擒也既去齊立成都除逼建親以安社稷大勳也顒從之遂表請討冏拜含為都督統張方等率諸軍以向洛陽含屯陰盤而長沙王誅冏含等旋師初含之本謀欲并去冏使權歸於顒含因得肆其宿志既長沙勝齊顒穎猶各守藩志望未允顒表含為河南尹時商復被任遇商兄重時為秦州刺史含疾商滋甚復與重構隙顒自含奔還之後委以心膂復慮重襲己乃使兵圍之更相表罪侍中馮蓀黨顒請召重還商說曰河間之奏皆李含所交構也若不早圖禍將至矣且河間前舉由含之謀乃殺含張方張方河間人也世貧賤以材勇得幸於河間王顒纍遷兼振武將軍永寧中顒表討齊王冏遣方領兵二萬為前鋒及冏被長沙王所殺顒及成都王穎復表討遣方率衆自函谷入屯河南惠帝遣左將軍皇甫商距之方以潛軍破商之衆遂入城奉帝討方于城內方軍望見乘輿於是小退方止之不得衆遂大敗殺傷滿于衢巷方退壁于十三里橋人情挫衄無復固志多勸方夜遁方曰兵之利鈍是常貴因敗以為成耳我更前作壘出其不意此用兵之奇也乃夜潛進逼洛城七里既新捷不以為意忽聞方壘成乃出戰敗績東海王越等執送于金墉城方使郅輔取還營炙殺之於是大掠洛中官私奴婢萬餘人而西還長安顒加方右將軍馮翊太守蕩陰之役顒又遣方鎮洛陽上官巳苗願等距之大敗而退清河王覃夜襲巳願巳願出奔方乃入洛陽覃於廣陽門迎方而拜方馳下車扶止之於是復廢皇后羊氏及帝自鄴還洛方遣息羆以三千騎奉迎將渡河橋方又以所乘陽燧車青蓋素升三百人為小鹵簿迎帝至芒山下方自帥萬餘騎奉雲母輿及旌旗之飾衛帝而進初方見帝將拜帝下車自止之方在洛既久兵士暴掠發哀獻皇女墓軍人喧喧無復留意議欲西遷尚匿其跡欲須天子出因劫移都乃請帝謁廟帝不許方遂悉引兵入殿迎帝帝見兵至避之於竹林中軍人引帝出方於馬上稽首曰胡賊縱逸宿衛單少陛下今日幸臣壘臣當捍禦寇難致死無二於是軍人便亂入宮閣爭割流蘇武帳而為馬帴方奉帝至弘農顒遣司馬周弼報方欲廢太弟方以為不可帝至長安以方為中領軍録尚書事領京兆太守時豫州刺史劉喬檄稱潁川太守劉輿迫脅范陽王虓距逆詔命及東海王越等起兵於山東乃遣方率步騎十萬往討之方屯兵霸上而劉喬為虓等所破顒聞喬敗大懼將罷兵恐方不從遲疑未決初方從山東來甚微賤長安富人郅輔厚相供給及貴以輔為帳下督甚昵之顒參軍畢垣河間冠族為方所侮忿而說顒曰張方久屯霸上聞山東賊盛盤桓不進宜防其未萌其親信郅輔具知其謀矣而繆播等先亦構之顒因使召輔垣迎說輔曰張方欲反人謂卿知之王若問卿何辭以對輔驚曰實不聞方反為之若何垣曰王若問卿但言爾爾不然必不免禍輔既入顒問之曰張方反卿知之乎輔曰爾顒曰遣卿取之可乎又曰爾顒於是使輔送書於方因令殺之輔既昵於方持刀而入守閣者不疑因火下發函便斬方頭顒以輔為安定太守初繆播等議斬方送首與越冀東軍可罷及聞方死更爭入關顒頗恨之又使人殺輔史臣曰晉氏之禍難荐臻實始藩翰解系等以干時之用處危亂之辰並託迹府朝參謀王室或抗忠盡節或飾詐懷姦雖邪正殊途而咸至誅戮豈非時艱政紊利深禍速者乎古人所以危邦不入亂邦不居戒懼於此也閻鼎閻鼎字台臣天水人也初為太傅東海王越參軍轉卷令行豫州刺史事屯許昌遭母喪乃於密縣間鳩聚西州流人數千欲還鄉里值京師失守秦王出奔密中司空荀藩藩弟司隸校尉組及中領軍華河南尹華薈在密縣建立行臺以密近賊南趣許潁司徒左長史劉疇在密為塢主中書令李耳幾太傅參軍騶捷劉蔚鎮軍長史周顗司馬李述皆來赴疇僉以鼎有才用且手握強兵勸藩假鼎冠軍將軍豫州刺史蔚等為參佐鼎少有大志因西土人思歸欲立功鄉里乃與撫軍長史王毗司馬傅遜懷翼戴秦王之計謂疇捷等曰山東非霸王處不如關中河陽令傅暢遺鼎書勸奉秦王過洛陽謁拜山陵徑據長安綏合夷晉興起義衆克復宗廟雪社稷之恥鼎得書便欲詣洛流人謂北道近河懼有抄截欲南自武關向長安疇等皆山東人咸不願西入荀藩及疇捷等並逃散鼎追藩不及耳幾等見殺唯顗述走得免遂奉秦王行止上洛為山賊所襲殺百餘人率餘衆西至藍田時劉聰向長安為雍州刺史賈匹所逐走還平陽匹遣人奉迎秦王遂至長安而與大司馬南陽王保衛將軍梁芬京兆尹梁綜等並同心推戴立王為皇太子登壇告天立社稷宗廟以鼎為太子詹事總攝百揆梁綜與鼎爭權鼎殺綜以王毗為京兆尹鼎首建大謀立功天下始平太守麴允撫夷護軍索綝並害其功且欲專權馮翊太守梁緯北地太守梁肅並綜母弟綝之姻也謀欲除鼎乃證其有無君之心專戮大臣請討之遂攻鼎鼎出奔雍為氐竇首所殺傳首長安索靖子綝索靖字幼安敦煌人也纍世官族父湛北地太守靖少有逸羣之量與鄉人泛衷張甝索紾索永俱詣太學馳名海內號稱敦煌五龍四人並早亡唯靖該博經史兼通內緯州辟別駕郡舉賢良方正對策高第傅玄張華與靖一面皆厚與之相結拜駙馬都尉出為西域戊己校尉長史太子僕同郡張勃特表以靖才藝絶人宜在臺閣不宜遠出邊塞武帝納之擢為尚書郎與襄陽羅尚河南潘嶽吳郡顧榮同官咸器服焉靖與尚書令衛瓘俱以善草書知名帝愛之瓘筆勝靖然有楷法遠不能及靖靖在臺積年除雁門太守遷魯相又拜酒泉太守惠帝即位賜爵關內侯靖有先識遠量知天下將亂指洛陽宮門銅駝歎曰會見汝在荊棘中耳元康中西戎反叛拜靖大將軍梁王肜左司馬加蕩寇將軍屯兵粟邑擊賊敗之遷始平內史及趙王倫篡位靖應三王義舉以左衛將軍討孫秀有功加散騎常侍遷後將軍太安末河間王顒舉兵向洛陽拜靖使持節監洛城諸軍事遊擊將軍領雍秦涼義兵與賊戰大破之靖亦被傷而卒追贈太常時年六十五後又贈司空進封安樂亭侯諡曰莊靖著五行三統正驗論辨理陰陽氣運又撰索子晉詩各二十卷又作草書狀其辭曰聖皇御世隨時之宜倉頡既生書契是為科斗鳥篆類物象形睿哲變通意巧茲生損之隸草以崇簡易百官畢修事業並麗蓋草書之為狀也婉若銀鉤漂若驚鸞舒翼未發若舉復安蟲蛇虬蟉或往或還類阿那以羸形欻奮釁而桓桓及其逸遊肸嚮乍正乍邪騏驥暴怒逼其轡海水窊隆揚其波芝草蒲陶還相繼棠棣融融載其華玄熊對踞于山嶽飛燕相追而差池舉而察之又似乎和風吹林偃草扇樹枝條順氣轉相比附窈嬈廉苫隨體散布紛擾擾以猗靡中持疑而猶豫玄螭狡獸嬉其間騰猿飛匚車丸相奔趣凌魚奮尾蛟龍反據投空自竄張設牙距或若登高望其類或若既往而中顧或若俶儻而不羣或若自檢於常度於是多才之英篤藝之彥役心精微耽此文憲守道兼權觸類生變離析八體靡形不判去繁存微大象未亂上理開元下周謹案騁辭放手雨行冰散高音翰厲溢越流漫忽班班而成章信奇妙之煥爛體磊落而壯麗姿光潤以粲粲命杜度運其指使伯英回其腕著絶勢於紈素垂百世之殊觀先時靖行見姑臧城南石地曰此後當起宮殿至張駿於其地立南城起宗廟建宮殿焉靖有五子鯁綣璆聿綝皆舉秀才聿安昌鄉侯卒少子綝最知名綝字巨秀少有逸羣之量靖每曰綝廊廟之才非簡札之用州郡吏不足汙吾兒也舉秀才除郎中嘗報兄讎手殺三十七人時人壯之俄轉太宰參軍除好畤令入為黃門侍郎出參征西軍事轉長安令在官有稱及成都王穎劫遷惠帝幸鄴穎為王浚所破帝遂播越河間王顒使張方及綝東迎乘輿以功拜鷹揚將軍轉南陽王模從事中郎劉聰侵掠關東以綝為奮威將軍以禦之斬聰將呂逸又破聰黨劉豐遷新平太守聰將蘇鐵劉五斗等劫掠三輔除綝安西將軍馮翊太守綝有威恩華夷嚮服賊不敢犯及懷帝蒙塵長安又陷模被害綝泣曰與其俱死寧為伍子胥乃赴安定與雍州刺史賈匹扶風太守梁綜安夷護軍麴允等糾合義衆頻破賊黨修復舊館遷定宗廟進救新平小大百戰綝手擒賊帥李羌與閻鼎立秦王為皇太子及即尊位是為愍帝綝遷侍中太僕以首迎大駕升壇授璽之功封弋居伯又遷前將軍尚書右僕射領吏部京兆尹加平東將軍進號征東尋又詔曰朕昔遇厄運遭家不造播越宛楚爰失舊京幸宗廟寵靈百辟宣力得從藩衛託乎羣公之上社稷之不隕實公是賴宜贊百揆傅弼朕躬其授衛將軍領太尉位特進軍國之事悉以委之及劉曜侵逼王城以琳為都督征東大將軍持節討之破曜呼日逐王呼延莫以功封上洛郡公食邑萬戶拜夫人荀氏為新豐君子石元為世子賜子弟二人鄉亭侯劉曜入關芟麥苗綝又擊破之自長安伐劉聰聰將趙染杖其纍捷有自矜之色帥精騎數百與綝戰大敗之染單馬而走轉驃騎大將軍尚書左僕射録尚書承制行事劉曜復率衆入馮翊帝纍徵兵於南陽王保保左右議曰蝮蛇在手壯士解其腕且斷隴道以觀其變從事中郎裴詵曰蛇已螫頭頭可截不保以胡嵩行前鋒都督須諸軍集乃當發麴允欲挾天子趣保綝以保必逞私欲乃止自長安以西不復奉朝廷百官饑乏採自存時三秦人尹桓解武等數千家盜發漢霸杜二陵多獲珍寶帝問綝曰漢陵中物何乃多邪綝對曰漢天子即位一年而為陵天下貢賦三分之一供宗廟一供賓客一充山陵漢武帝饗年久長比崩而茂陵不復容物其樹皆已可拱赤眉取陵中物不能減半于今猶有朽帛委積珠玉未盡此二陵是儉者耳亦百世之誡也後劉曜又率衆圍京城綝與麴允固守長安小城胡嵩承檄奔命破曜于靈臺嵩慮國家威舉則麴索功盛乃案兵渭北遂還槐里城中饑窘人相食死亡逃奔不可制唯涼州義衆千人守死不移帝使侍中宋敞送箋降于曜綝潛留敞使其子說曜曰今城中食猶足支一歲未易可克也若許綝以車騎儀同萬戶郡公者請以城降曜斬而送之曰帝王之師以義行也孤將軍十五年未嘗以譎詭敗人必窮兵極勢然後取之今索綝所說如是天下之惡一也輒相為戮之若審兵食未盡者便可勉強固守如其糧竭兵微亦宜早悟天命孤恐霜威一震玉石俱摧及帝出降綝隨帝至平陽劉聰以其不忠於本朝戮之於東市賈匹賈匹字彥度武威人魏太尉詡之曾孫也少有志略器望甚偉見之者莫不悅附特為武夫之所瞻仰願為致命初辟公府遂歷顯職遷安定太守雍州刺史丁綽貪橫失百姓心乃譖匹于南陽王模模以軍司謝班伐之匹奔瀘水與胡彭蕩仲及氐竇首結為兄弟聚衆攻班綽奔武都匹復入安定殺班愍帝以匹為驃騎將軍雍州刺史封酒泉公時諸郡百姓饑饉白骨蔽野百無一存匹帥戎晉二萬餘人將伐長安西平太守竺恢亦固守劉粲聞之使劉曜劉雅及趙染距匹先攻恢不克匹邀擊大敗之曜中流矢退走匹追之至于甘泉旋自渭橋襲蕩仲殺之遂迎秦王奉為皇太子後蕩仲子夫護帥羣胡攻之匹敗走夜墮于澗為夫護所害匹勇略有志節以匡復晉室為己任不幸顛墜時人咸痛惜之史臣曰自永嘉蕩覆宇內橫流億兆靡依人神乏主于時武皇之胤惟有建興衆望攸歸曾無與二閻鼎等忠存社稷志在經綸乃契闊艱難扶持幼孺遂得纂堯承緒祀夏配天校績論功有足稱矣然而抗滔天之巨寇接雕弊之餘基威略未申尋至傾覆昔宗周遭犬戎而東徙有晉違獷狄而西遷彼既靈慶悠長此則禍難遄及豈愍皇地非奧主將綝允材謝輔臣何修短之殊途而成敗之異數者也贊曰懷惠不競戚藩力爭狙詐參謀憑凶亂政為惡不已並罹非命解繆忠肅無聞餘慶愍皇纂戎實賴羣公鼎圖福始綝遂凶終
