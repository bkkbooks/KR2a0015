body:
  text: 晉書卷八十二列傳第五十二陳壽陳壽字承祚巴西安漢人也少好學師事同郡譙周仕蜀為觀閣令史宦人黃皓專弄威權大臣皆曲意附之壽獨不為之屈由是屢被譴黜遭父喪有疾使婢丸藥客往見之鄉黨以為貶議及蜀平坐是沈滯者累年司空張華愛其才以壽雖不遠嫌原情不至貶廢舉為孝廉除佐著作郎出補陽平令撰蜀相諸葛亮集奏之除著作郎領本郡中正撰魏吳蜀三國志凡六十五篇時人稱其善事有良史之才夏侯湛時著魏書見壽所作便壞己書而罷張華深善之謂壽曰當以晉書相付耳其為時所重如此或云丁儀丁廙有盛名於魏壽謂其子曰可覓千斛米見與當為尊公作佳傳丁不與之竟不為立傳壽父為馬謖參軍謖為諸葛亮所誅壽父亦坐被髠諸葛瞻又輕壽壽為亮立傳謂亮將略非長無應敵之才言瞻惟工書名過其實議者以此少之張華將舉壽為中書郎荀勖忌華而疾壽遂諷吏部遷壽為長廣太守辭母老不就杜預將之鎮復薦之於帝宜補黃散由是授御史治書以母憂去職母遺言令葬洛陽壽遵其志又坐不以母歸葬竟被貶議初譙周嘗謂壽曰卿必以才學成名當被損折亦非不幸也宜深慎之壽至此再致廢辱皆如周言後數歲起為太子中庶子未拜元康七年病卒時年六十五梁州大中正尚書郎范頵等上表曰昔漢武帝詔曰司馬相如病甚可遣悉取其書使者得其遺書言封禪事天子異焉臣等案故治書侍御史陳壽作三國志辭多勸誡明乎得失有益風化雖文艷不若相如而質直過之願垂採錄於是詔下河南尹洛陽令就家寫其書壽又撰古國志五十篇益都耆舊傳十篇餘文章傳於世王長文王長文字德叡廣漢郪人也少以才學知名而放蕩不羈州府辟命皆不就州辟別駕乃微服竊出舉州莫知所之後於成都市中蹲踞齧胡餅刺史知其不屈禮遣之閉門自守不交人事著書四卷擬易名曰通玄經有文言卦象可用卜筮時人比之揚雄太玄同郡馬秀曰揚雄作太玄惟桓譚以為必傳後世晚遭陸績玄道遂明長文通玄經未遭陸績君山耳太康中蜀土荒饉開倉振貸長文居貧貸多後無以償郡縣切責送長文到州刺史徐幹捨之不謝而去後成都王穎引為江源令或問前不降志今何為屈長文曰祿以養親非為身也梁王肜為丞相引為從事中郎在洛出行輒著白旃小鄣以載車當時異焉後終於洛虞溥虞溥字允源高平昌邑人也父祕為偏將軍鎮隴西溥從父之官專心墳籍時疆埸閱武人爭視之溥未嘗寓目郡察孝廉除郎中補尚書都令史尚書令衞瓘尚書褚禩並器重之溥謂瓘曰往者金馬啟符大晉應天宜復先王五等之制以綏久長不可承暴秦之法遂漢魏之失也瓘曰歷代歎此而終未能改稍遷公車司馬令除鄱陽內史大修庠序廣招學徒移告屬縣曰學所以定情理性而積衆善者也情定於內而行成於外積善於心而名顯於教故中人之性隨教而移善積則習與性成唐虞之時皆比屋而可封及其廢也而云可誅豈非化以成俗教移人心者哉自漢氏失御天下分崩江表寇隔久替王教庠序之訓廢而莫修今四海一統萬里同軌熙熙兆庶咸休息乎太和之中宜崇尚道素廣開學業以讚協時雍光揚盛化乃具為條制於是至者七百餘人溥乃作誥以奬訓之曰文學諸生皆冠帶之流年盛志美始涉學庭講修典訓此大成之業立德之基也夫聖人之道淡而寡味故始學者不好也及至朞月所觀彌博所習彌多日聞所不聞日見所不見然後心開意朗敬業樂羣忽然不覺大化之陶己至道之入神也故學之染人甚於丹青丹青吾見其久而渝矣未見久學而渝者也夫工人之染先修其質後事其色質修色積而染工畢矣學亦有質孝悌忠信是也君子內正其心外修其行行有餘力則以學文文質彬彬然後為德夫學者不患才不及而患志不立故曰希驥之馬亦驥之乘希顏之徒亦顏之倫也又曰王冀而舍之朽木不知王冀而不舍金石可虧斯非其效乎今諸生口誦聖人之典體閑庠序之訓比及三年可以小成而令名宣流雅譽日新朋友欽而樂之朝士敬而歎之於是州府交命擇官而仕不亦美乎若乃含章舒藻揮翰流離稱述世務探賾究奇使楊班韜筆仲舒結舌亦惟才所居固無常人也然積一勺以成江河累微塵以崇峻極匪志匪勤理無由濟也諸生若絕人間之務心專親學累一以貫之積漸以進之則亦或遲或速或先或後耳何滯而不通何遠而不至邪時祭酒求更起屋行禮溥曰君子行禮無常處也故孔子射於矍相之圃而行禮於大樹之下況今學庭庠序高堂顯敞乎溥為政嚴而不猛風化大行有白烏集于郡庭注春秋經傳撰江表傳及文章詩賦數十篇卒於洛時年六十二子勃過江上江表傳於元帝詔藏于祕書司馬彪司馬彪字紹統高陽王睦之長子也出後宣帝弟敏少篤學不倦然好色薄行為睦所責故不得為嗣雖名出繼實廢之也彪由此不交人事而專精學習故得博覽羣籍終其綴集之務初拜騎都尉泰始中為祕書郎轉丞注莊子作九州春秋以為先王立史官以書時事載善惡以為沮勸撮教世之要也是以春秋不修則仲尼理之關雎既亂則師摯修之前哲豈好煩哉蓋不得已故也漢氏中興訖于建安忠臣義士亦以昭著而時無良史記述煩雜譙周雖已刪除然猶未盡安順以下亡缺者多彪乃討論衆書綴其所聞起于世祖終于孝獻編年二百錄世十二通綜上下旁貫庶事為紀志傳凡八十篇號曰續漢書泰始初武帝親祠南郊彪上疏定議語在郊祀志後拜散騎侍郎惠帝末年卒時年六十餘初譙周以司馬遷史記書周秦以上或採俗語百家之言不專據正經周於是作古史考二十五篇皆憑舊典以糾遷之謬誤彪復以周為未盡善也條古史考中凡百二十二事為不當多據汲冢紀年之義亦行於世王隱王隱字處叔陳郡陳人也世寒素父銓歷陽令少好學有著述之志每私錄晉事及功臣行狀未就而卒隱以儒素自守不交勢援博學多聞受父遺業西都舊事多所諳究建興中過江丞相軍諮祭酒涿郡祖納雅相知重納好博弈每諫止之納曰聊用忘憂耳隱曰蓋古人遭時則以功達其道不遇則以言達其才故否泰不窮也當今晉未有書天下大亂舊事蕩滅非凡才所能立君少長五都游宦四方華夷成敗皆在耳目何不述而裁之應仲遠作風俗通崔子真作政論蔡伯喈作勸學篇史游作急就章猶行於世便為沒而不朽當其同時人豈少哉而了無聞皆由無所述作也故君子疾沒世而無聞易稱自強不息況國史明乎得失之跡何必博弈而後忘憂哉納喟然歎曰非不悅子之道力不足也乃上疏薦隱元帝以草創務殷未遑史官遂寢不報太興初典章稍備乃召隱及郭璞俱為著作郎令撰晉史豫平王敦功賜爵平陵鄉侯時著作郎虞預私撰晉書而生長東南不知中朝事數訪於隱并借隱所著書竊寫之所聞漸廣是後更疾隱形於言色預既豪族交結權貴共為朋黨以斥隱竟以謗免黜歸于家貧無資用書遂不就乃依征西將軍庾亮武昌亮供其紙筆書乃得成詣闕上之隱雖好著述而文辭鄙拙蕪舛不倫其書次第可觀者皆其父所撰文體混漫義不可解者隱之作也年七十餘卒於家隱兄瑚字處仲少重武節成都王穎舉兵向洛以為冠軍參軍積功累遷游擊將軍與司隸滿奮河南尹周馥等俱屯大司馬門以衞宮掖時上官巳縱暴瑚與奮等共謀除之反為所害虞預虞預字叔寧徵士喜之弟也本名茂犯明穆皇后母諱故改焉預十二而孤少好學有文章餘姚風俗各有朋黨宗人共薦預為縣功曹欲使沙汰穢濁預書與其從叔父曰近或聞諸君以預入寺便應委質則當親事不得徒已然預下愚過有所懷邪黨互瞻異同蜂至一旦差跌衆鼓交鳴毫釐之失差以千里此古人之炯戒而預所大恐也卒如預言未半年遂見斥退太守庾琛命為主簿預上記陳時政所失曰軍寇以來賦役繁數兼值年荒百姓失業是輕繇薄斂寬刑省役之時也自頃長吏輕多去來送故迎新交錯道路受迎者惟恐船馬之不多見送者惟恨吏卒之常少窮奢竭費謂之忠義省煩從簡呼為薄俗轉相放效流而不反雖有常防莫肯遵修加以王塗未夷所在停滯送者經年永失播植一夫不耕十夫無食況轉百數所妨不訾愚謂宜勒屬縣若令尉先去官者人船吏侍皆具條列到當依法減省使公私允當又今統務多端動加重制每有特急輒立督郵計今直兼三十餘人人船吏侍皆當出官益不堪命宜復減損嚴為之防琛善之即皆施行太守紀瞻到預復為主簿轉功曹史察孝廉不行安東從事中郎諸葛恢參軍庾亮等薦預召為丞相行參軍兼記室遭母憂服竟除佐著作郎太興二年大旱詔求讜言直諫之士預上書諫曰大晉受命于今五十餘載自元康以來王德始闕戎翟及於中國宗廟焚為灰燼千里無煙爨之氣華夏無冠帶之人自天地開闢書籍所載大亂之極未有若茲者也陛下以聖德先覺超然遠鑒作鎮東南聲教遐被上天眷顧人神贊謀雖云中興其實受命少康宣王誠未足喻然南風之歌可著而陵遲之俗未改者何也臣愚謂為國之要在於得才得才之術在於抽引苟其可用讎賤必舉高宗文王思佐發夢拔巖徒以為相載釣老而師之下至列國亦有斯事故燕重郭隗而三士競至魏式干木而秦兵退舍今天下雖弊人士雖寡十室之邑必有忠信世不乏驥求則可致而束帛未賁於丘園蒲輪頓轂而不駕所以大化不洽而雍熙有闕者也預以寇賊未平當須良將又上疏曰臣聞承平之世其教先文撥亂之運非武不克故牧野之戰呂望杖鉞淮夷作難召伯專征玁狁為暴衞霍長驅故陰陽不和擢士為相三軍不勝拔卒為將漢帝既定天下猶思猛士以守四方孝文志存鉅鹿馮唐進說魏尚復守詩稱赳赳武夫公侯干城折衝之佐豈可忽哉況今中州荒弊百無一存牧守官長非戎貊之族類即寇竊之幸脫陛下登阼威暢四遠故令此等反善向化然狼子獸心輕薄易動羯虜未殄益使難安周撫陳川相係背叛徐龕驕黠無所拘忌放兵侵掠罪已彰灼昔葛伯違道湯獻之牛吳濞失禮錫以几杖惡成罪著方復加戮龕之小醜可不足滅然豫備不虞古之善教矧乃有虞可不為防為防之術宜得良將將不素簡難以應敵壽春無鎮祖逖孤立前有勁虜後無係援雖有智力非可持久願陛下諮之羣公博舉於衆若當局之才必允其任則宜奬厲使不顧命旁料宂猥或有可者厚加寵待足令忘身昔英布見慢恚欲自裁出觀供置然後致力禮遇之恩可不隆哉誠知山河之量非塵露可益神鑒之慮非愚淺所測然匹夫嫠婦猶有憂國之言況臣得廁朝堂之末蒙冠帶之榮者乎轉琅邪國常侍遷祕書丞著作郎咸和初夏旱詔衆官各陳致雨之意預議曰臣聞天道貴信地道貴誠誠信者蓋二儀所以生植萬物人君所以保黎蒸是以殺伐擬於震電推恩象於雲雨刑罰在於必信慶賞貴於平均臣聞間者以來刑獄轉繁多力者則廣牽連逮以稽年月無援者則嚴其檟楚期於入重是以百姓嗷然感傷和氣臣愚以為輕刑耐罪宜速決遣殊死重囚重加以請寬傜息役務遵節儉砥礪朝臣使各知禁蓋老牛不犧禮有常制而自頃衆官拜授祖贈轉相夸尚屠殺牛犢動有十數醉酒流湎無復限度傷財敗俗所虧不少昔殷宗修德以消桑穀之異宋景善言以退熒惑之變楚國無災莊王是懼盛德之君未嘗無眚應以信順天祐乃隆臣學見淺闇言不足採從平王含賜爵西鄉侯蘇峻作亂預先假歸家太守王舒請為諮議參軍峻平進爵平康縣侯遷散騎侍郎著作如故除散騎常侍仍領著作以年老歸卒于家預雅好經史憎疾玄虛其論阮籍裸袒比之伊川被髮所以胡虜遍於中國以為過衰周之時著晉書四十餘卷會稽典錄二十篇諸虞傳十二篇皆行於世所著詩賦碑誄論難數十篇孫盛孫盛字安國太原中都人祖楚馮翊太守父恂潁川太守恂在郡遇賊被害盛年十歲避難渡江及長博學善言名理于時殷浩擅名一時與抗論者惟盛而已盛嘗詣浩談論對食奮擲麈尾毛悉落飯中食冷而復暖者數四至暮忘餐理竟不定盛又著醫卜及易象妙於見形論浩等竟無以難之由是遂知名起家佐著作郎以家貧親老求為小邑出補瀏陽令太守陶侃請為參軍庾亮代侃引為征西主簿轉參軍時丞相王導執政亮以元舅居外南蠻校尉陶稱讒構其間導亮頗懷疑貳盛密諫亮曰王公神情朗達常有世外之懷豈肯為凡人事邪此必佞邪之徒欲間內外耳亮納之庾翼代亮以盛為安西諮議參軍尋遷廷尉正會桓溫代翼留盛為參軍與俱伐蜀軍次彭模溫自以輕兵入蜀盛領羸老輜重在後賊數千忽至衆皆遑遽盛部分諸將并力距之應時敗走蜀平賜爵安懷縣侯累遷溫從事中郎從入關平洛以功進封吳昌縣侯出補長沙太守以家貧頗營資貨部從事至郡察知之服其高名而不劾之盛與溫牋而辭旨放蕩稱州遣從事觀採風聲進無威鳳來儀之美退無鷹鸇搏擊之用徘徊湘川將為怪鳥溫得盛牋復遣從事重案之贓私狼籍檻車收盛到州捨而不罪累遷祕書監加給事中年七十二卒盛篤學不倦自少至老手不釋卷著魏氏春秋晉陽秋并造詩賦論難復數十篇晉陽秋詞直而理正咸稱良史焉既而桓溫見之怒謂盛子曰枋頭誠為失利何至乃如尊君所說若此史遂行自是關君門戶事其子遽拜謝謂請刪改之時盛年老還家性方嚴有軌憲雖子孫班白而庭訓愈峻至此諸子乃共號泣稽顙請為百口切計盛大怒諸子遂爾改之盛寫兩定本寄於慕容儁太元中孝武帝博求異聞始於遼東得之以相考校多有不同書遂兩存子潛放潛字齊由為豫章太守殷仲堪之討王國寶也潛時在郡仲堪逼以為諮議參軍固辭不就以憂卒放字齊莊幼稱令慧年七八歲在荊州與父俱從庾亮獵亮謂曰君亦來邪應聲答曰無小無大從公于邁亮又問欲齊何莊邪放曰欲齊莊周亮曰不慕仲尼邪答曰仲尼生而知之非希企所及亮大奇之曰王輔嗣弗過也庾翼子爰客嘗候盛見放而問曰安國何在放答曰庾稚恭家爰客大笑曰諸孫太盛有兒如此也放又曰未若諸庾翼翼既而語人曰我故得重呼奴父也終於長沙相干寶干寶字令升新蔡人也祖統吳奮武將軍都亭侯父瑩丹楊丞寶少勤學博覽書記以才器召為著作郎平杜弢有功賜爵關內侯中興草創未置史官中書監王導上疏曰夫帝王之迹莫不必書著為令典垂之無窮宣皇帝廓定四海武皇帝受禪於魏至德大勳等蹤上聖而紀傳不存於王府德音未被乎管絃陛下聖明當中興之盛宜建立國史撰集帝紀上敷祖宗之烈下紀佐命之勳務以實錄為後代之準厭率土之望悅人神之心斯誠雍熙之至美王者之弘基也宜備史官敕佐著作郎干寶等漸就撰集元帝納焉寶於是始領國史以家貧求補山陰令遷始安太守王導請為司徒右長史遷散騎常侍著晉紀自宣帝迄于愍帝五十三年凡二十卷奏之其書簡略直而能婉咸稱良史性好陰陽術數留思京房夏侯勝等傳寶父先有所寵侍婢母甚妬忌及父亡母乃生推婢于墓中寶兄弟年小不之審也後十餘年母喪開墓而婢伏棺如生載還經日乃蘇言其父常取飲食與之恩情如生在家中吉凶輒語之考校悉驗地中亦不覺為惡既而嫁之生子又寶兄嘗病氣絕積日不冷後遂悟云見天地間鬼神事如夢覺不自知死寶以此遂撰集古今神祇靈異人物變化名為搜神記凡三十卷以示劉惔惔曰卿可謂鬼之董狐寶既博採異同遂混虛實因作序以陳其志曰雖考先志於載籍收遺逸於當時蓋非一耳一目之所親聞覩也亦安敢謂無失實者哉衞朔失國二傳互其所聞呂望事周子長存其兩說若此比類往往有焉從此觀之聞見之難一由來尚矣夫書赴告之定辭據國史之方策猶尚若茲況仰述千載之前記殊俗之表綴片言於殘闕訪行事於故老將使事不二迹言無異塗然後為信者固亦前史之所病然而國家不廢注記之官學士不絕誦覽之業豈不以其所失者小所存者大乎今之所集設有承於前載者則非余之罪也若使采訪近世之事苟有虛錯願與先賢前儒分其譏謗及其著述亦足以明神道之不誣也羣言百家不可勝覽耳目所受不可勝載今粗取足以演八略之旨成其微說而已幸將來好事之士錄其根體有以游心寓目而無尤焉寶又為春秋左氏義外傳注周易周官凡數十篇及雜文集皆行於世鄧粲鄧粲長沙人少以高潔著名與南陽劉驎之南郡劉尚公同志友善並不應州郡辟命荊州刺史桓沖卑辭厚禮請粲為別駕粲嘉其好賢乃起應召驎之尚公謂之曰卿道廣學深衆所推懷忽然改節誠失所望粲笑答曰足下可謂有志於隱而未知隱夫隱之為道朝亦可隱市亦可隱隱初在我不在於物尚公等無以難之然粲亦於此名譽減半矣後患足疾不能朝拜求去職不聽令臥視事後以病篤乞骸骨許之粲以父騫有忠信言而世無知者乃著元明紀十篇注老子並行於世謝沈謝沈字行思會稽山陰人也曾祖斐吳豫章太守父秀吳翼正都尉沈少孤事母至孝博學多識明練經史郡命為主簿功曹察孝廉太尉郗鑒辟並不就會稽內史何充引為參軍以母老去職平西將軍庾亮命為功曹征北將軍蔡謨版為參軍皆不就閑居養母不交人事耕耘之暇研精墳籍康帝即位朝議疑七廟迭毀乃以太學博士徵以質疑滯以母憂去職服闋除尚書度支郎何充庾冰並稱沈有史才遷著作郎撰晉書三十餘卷會卒時年五十二沈先著後漢書百卷及毛詩漢書外傳所著述及詩賦文論皆行於世其才學在虞預之右云習鑿齒習鑿齒字彥威襄陽人也宗族富盛世為鄉豪鑿齒少有志氣博學洽聞以文筆著稱荊州刺史桓溫辟為從事江夏相袁喬深器之數稱其才於溫轉西曹主簿親遇隆密時溫有大志追蜀人知天文者至夜執手問國家祚運修短答曰世祀方永溫疑其難言乃飾辭云如君言豈獨吾福乃蒼生之幸然今日之語自可令盡必有小小厄運亦宜說之星人曰太微紫微文昌三宮氣候如此決無憂虞至五十年外不論耳溫不悅乃止異日送絹一匹錢五千文以與之星人乃馳詣鑿齒曰家在益州被命遠下今受旨自裁無由致其骸骨緣君仁厚乞為標碣棺木耳鑿齒問其故星人曰賜絹一匹令僕自裁惠錢五千以買棺耳鑿齒曰君幾誤死君嘗聞干知星宿有不覆之義乎此以絹戲君以錢供道中資是聽君去耳星人大喜明便詣溫別溫問去意以鑿齒言答溫笑曰鑿齒憂君誤死君定是誤活然徒三十年看儒書不如一詣習主簿累遷別駕溫出征伐鑿齒或從或守所在任職每處機要莅事有績善尺牘論議溫甚器遇之時清談文章之士韓伯伏滔等並相友善後使至京師簡文亦雅重焉既還溫問相王何似答曰生平所未見以此大忤溫旨左遷戶曹參軍時有桑門釋道安俊辯有高才自北至荊州與鑿齒初相見道安曰彌天釋道安鑿齒曰四海習鑿齒時人以為佳對初鑿齒與其二舅羅崇羅友俱為州從事及遷別駕以坐越舅右屢經陳請溫後激怒既盛乃超拔其二舅相繼為襄陽都督出鑿齒為滎陽太守溫弟祕亦有才氣素與鑿齒相親善鑿齒既罷郡歸與祕書曰吾以去五月三日來達襄陽觸目悲感略無歡情痛惻之事故非書言之所能具也每定省家舅從北門入西望隆中想臥龍之吟東眺白沙思鳳雛之聲北臨樊墟存鄧老之高南眷城邑懷羊公之風縱目檀溪念崔徐之友肆睇魚梁追二德之遠未嘗不徘徊移日惆悵極多撫乘躊躇慨爾而泣曰若乃魏武之所置酒孫堅之所隕斃裴杜之故居繁王之舊宅遺事猶存星列滿目璅璅常流碌碌凡士焉足以感其方寸哉夫芬芳起於椒蘭清響生乎琳琅命世而作佐者必垂可大之餘風高尚而邁德者必有明勝之遺事若向八君子者千載猶使義想其為人況相去之不遠乎彼一時也此一時也焉知今日之才不如疇辰百年之後吾與足下不並為景升乎其風期俊邁如此是時溫覬覦非望鑿齒在郡著漢晉春秋以裁正之起漢光武終於晉愍帝於三國之時蜀以宗室為正魏武雖受漢禪晉尚為篡逆至文帝平蜀乃為漢亡而晉始興焉引世祖諱炎興而為禪受明天心不可以勢力強也凡五十四卷後以腳疾遂廢於里巷及襄陽陷於苻堅堅素聞其名與道安俱輿而致焉既見與語大悅之賜遺甚厚又以其蹇疾與諸鎮書昔晉氏平吳利在二陸今破漢南獲士裁一人有半耳俄以疾歸襄陽尋而襄鄧反正朝廷欲徵鑿齒使典國史會卒不果臨終上疏曰臣每謂皇晉宜越魏繼漢不應以魏後為三恪而身微官卑無由上達懷抱愚情三十餘年今沈淪重疾性命難保遂嘗懷此當與之朽爛區區之情切所悼惜謹力疾著論一篇寫上如左願陛下考尋古義求經常之表超然遠覽不以臣微賤廢其所言論曰或問魏武帝功蓋中夏文帝受禪於漢而吾子謂漢終有晉豈實理乎且魏之見廢晉道亦病晉之臣子寧可以同此言哉答曰此乃所以尊晉也但絕節赴曲非常耳所悲見殊心異雖奇莫察請為子言焉昔漢氏失御九州殘隔三國乘間鼎跱數世干戈日尋流血百載雖各有偏平而其實亂也宣皇帝勢逼當年力制魏氏蠖屈從時遂羈戎役晦明掩耀龍潛下位俛首重足鞠躬屏息道有不容之難躬蹈履霜之險可謂危矣魏武既亡大難獲免始南擒孟達東蕩海隅西抑勁蜀旋撫諸夏摧吳人入侵之鋒掃曹爽見忌之黨植靈根以跨中嶽樹羣才以翼子弟命世之志既恢非常之業亦固景文繼之靈武冠世克伐貳違以定厥庸席卷梁益奄征西極功格皇天勳侔古烈豐規顯祚故以灼如也至於武皇遂并強吳混一宇宙清四海同軌二漢除三國之大害靜漢末之交爭開九域之蒙晦定千載之盛功者皆司馬氏也而推魏繼漢以晉承魏比義唐虞自託純臣豈不惜哉今若以魏有代王之德則其道不足有靜亂之功則孫劉鼎立道不足則不可謂制當年當年不制於魏則魏未曾為天下之主王道不足於曹則曹未始為一日之王矣昔共工伯有九州秦政奄平區夏鞭撻華戎專總六合猶不見序於帝王淪沒於戰國何況暫制數州之人威行境內而已便可推為一代者乎若以晉嘗事魏懼傷皇德拘惜禪名謂不可割則惑之甚者也何者隗囂據隴公孫帝蜀蜀隴之人雖服其役取之大義於彼何有且吳楚僭號周室未亡子文延陵不見貶絕宣皇帝官魏逼於性命舉非擇木何虧德美禪代之義不同堯舜校實定名必彰於後人各有心事胡可掩定空虛之魏以屈於己孰若杖義而以貶魏哉夫命世之人正情遇物假之際會必兼義勇宣皇祖考立功於漢世篤爾勞思報亦深魏武超越志在傾主德不素積義險冰薄宣帝與之情將何重雖形屈當年意申百世降心全己憤慨於下非道服北面有純臣之節畢命曹氏忘濟世之功者也夫成業者係於所為不係所藉立功者言其所濟不言所起是故漢高稟命於懷王劉氏乘斃於亡秦超二偽以遠嗣不論近而計功考五德於帝典不疑道於力政季無承楚之號漢有繼周之業取之既美而己德亦重故也凡天下事有可借喻於古以曉於今定之往昔而足為來證者當陽秋之時吳楚二國皆僭號之王也若使楚莊推鄢郢以尊有德闔閭舉三江以奉命世命世之君有德之主或藉之以應天或撫之而光宅彼必自係於周室不推吳楚以為代明矣況積勳累功靜亂寧衆數之所錄衆之所與不資於燕噲之授不賴於因藉之力長轡廟堂吳蜀兩斃運奇二紀而平定天下服魏武之所不能臣蕩累葉之所不能除者哉自漢末鼎沸五六十年吳魏犯順而強蜀人杖正而弱三家不能相一萬姓曠而無主夫有定天下之大功為天下之所推孰如見推於闇人受尊於微弱配天而為帝方駕於三代豈比俛首於曹氏側足於不正即情而實取之而無慚何與詭事而託偽開亂於將來者乎是故故舊之恩可封魏後三恪之數不宜見列以晉承漢功實顯然正名當事情體亦厭又何為虛尊不正之魏而虧我道於大通哉昔周人詠祖宗之德追述翦商之功仲尼明大孝之道高稱配天之義然后稷勤於所職聿來未以翦商異於司馬氏仕乎曹族三祖之寓於魏世矣且夫魏自君之道不正則三祖臣魏之義未盡義未盡故假塗以運高略道不正故君臣之節有殊然則弘道不以輔魏而無逆取之嫌高拱不勞汗馬而有靜亂之功者蓋勳足以王四海義可以登天位雖我德慚於有周而彼道異於殷商故也今子不疑共工之不得列於帝王不嫌漢之係周而不係秦何至於一魏猶疑滯而不化哉夫欲尊其君而不知推之於堯舜之道欲重其國而反厝之於不勝之地豈君子之高義若猶未悟請於是止矣子辟強才學有父風位至驃騎從事中郎徐廣徐廣字野民東莞姑幕人侍中邈之弟也世好學至廣尤為精純百家數術無不研覽謝玄為兗州辟從事譙王恬為鎮北補參軍孝武世除祕書郎典校祕書省增置省職轉員外散騎侍郎仍領校書尚書令王珣深相欽重舉為祠部郎會稽世子元顯時錄尚書欲使百僚致敬內外順之使廣為議廣常以為愧焉元顯引為中軍參軍遷領軍長史桓玄輔政以為大將軍文學祭酒義熙初奉詔撰車服儀注除鎮軍諮議領記室封樂成侯轉員外散騎常侍領著作尚書奏左史述言右官書事乘志顯於晉鄭春秋著乎魯史自聖代有造中興記者道風帝典煥乎史策而太和以降世歷三朝玄風聖迹儵為疇古臣等參詳宜敕著作郎徐廣撰成國史於是敕廣撰集焉遷驍騎將軍領徐州大中正轉正員常侍大司農仍領著作如故十二年勒成晉紀凡四十六卷表上之乞解史任不許遷祕書監初桓玄篡位帝出宮廣陪列悲動左右及劉裕受禪恭帝遜位廣獨哀感涕泗交流謝晦見之謂曰徐公將無小過也廣收淚而言曰君為宋朝佐命吾乃晉室遺老憂喜之事固不同時乃更歔欷因辭衰老乞歸桑梓性好讀書老猶不倦年七十四卒于家廣答禮問行於世史臣曰古之王者咸建史臣昭法立訓莫近於此若夫原始要終紀情括性其言微而顯其義皎而明然後可以茵藹緹油作程遐世者也丘明既沒班馬迭興奮鴻筆於西京騁直詞於東觀自斯已降分明競爽可以繼明先典者陳壽得之乎江漢英靈信有之矣允源將率之子篤志典墳紹統戚藩之胤研機載籍咸能綜緝遺文垂諸不朽豈必克傳門業方擅箕裘者哉處叔區區勵精著述混淆蕪舛良不足觀叔寧寡聞穿窬王氏雖勒成一家未足多尚令升安國有良史之才而所著之書惜非正典悠悠晉室斯文將墜鄧粲謝沈祖述前史葺宇重軒之下施牀連榻之上奇詞異義罕見稱焉習氏徐公俱云筆削彰善癉惡以為懲勸夫蹈忠履正貞士之心背義圖榮君子不取而彥威跡淪寇壤逡巡於偽國野民運遭革命流漣於舊朝行不違言廣得之矣贊曰陳壽含章巖巖孤峙彪溥勵節摛辭綜理王恧雅才虞慚惇史干孫撫翰前良可擬鄧謝懷鉛異聞無紀習亦研思徐非絢美咸被簡冊共傳遙祀
