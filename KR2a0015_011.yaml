body:
  text: 晉書卷十一志第一天文上天體儀象天文經星中宮二十八舍二十八宿外星天漢起沒十二次度數州郡躔次昔在庖犧觀象察法以通神明之德以類天地之情可以藏往知來開物成務故易曰天垂象見吉凶聖人象之此則觀乎天文以示變者也尚書曰天聰明自我人聰明此則觀乎人文以成化者也是故政教兆於人理祥變應乎天文得失雖微罔不昭著然則三皇邁德七曜順軌日月無薄蝕之變星辰靡錯亂之妖黃帝創受河圖始明休咎故其星傳尚有存焉降在高陽乃命南正重司天北正黎司地爰洎帝嚳亦式序三辰唐虞則羲和繼軌有夏則昆吾紹德年代綿邈文籍靡傳至于殷之巫咸周之史佚格言遺記于今不朽其諸侯之史則魯有梓慎晉有卜偃鄭有裨竈宋有子韋齊有甘德楚有唐昧趙有尹皋魏有石申夫皆掌著天文各論圖驗其巫咸甘石之說後代所宗暴秦燔書六經殘滅天官星占存而不毀及漢景武之際司馬談父子繼為史官著天官書以明天人之道其後中壘校尉劉向廣洪範災條作皇極論以參往之行事及班固漢史馬續述天文而蔡雍譙周各有撰録司馬彪採之以繼前志今詳衆說以著于篇天體古言天者有三家一曰蓋天二曰宣夜三曰渾天漢靈帝時蔡雍於朔方上書言宣夜之學絶無師法周髀術數具存考驗天狀多所違失惟渾天近得其情今史官候臺所用銅儀則其法也立八尺員體而具天地之形以正黃道占察發斂以行日月以步五緯精微深妙百代不易之道也官有其器而無本書前志亦闕蔡雍所謂周髀者即蓋天之說也其本庖犧氏立周天曆度其所傳則周公受於殷高周人志之故曰周髀髀股也股者表也其言天似蓋笠地法覆槃天地各中高外下北極之下為天地之中其地最高而滂四隤三光隱映以為晝夜天中高於外衡冬至日之所在六萬里北極下地高於外衡下地亦六萬里外衡高於北極下地二萬里天地隆高相從日去地恆八萬里日麗天而平轉分冬夏之間日所行道為七衡六間每衡周徑里數各依算術用句股重差推晷影極游以為遠近之數皆得於表股者也故曰周髀又周髀家云天員如張蓋地方如局天旁轉如推磨而左行日月右行隨天左轉故日月實東行而天牽之以西沒譬之於蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨以左回焉天形南高而北下日出高故見日入下故不見天之居如倚蓋故極在人北是其證也極在天之中而今在人北所以知天之形如倚蓋也日朝出陽中暮入陰中陰氣暗冥故沒不見也夏時陽氣多陰氣少陽氣光明與日同輝故日出即見無蔽之者故夏日長也冬天陰氣多陽氣少陰氣暗冥掩日之光雖出猶隱不見故冬日短也宣夜之書亡惟漢祕書郎郗萌記先師相傳云天了無質仰而瞻之高遠無極眼瞀精絶故蒼蒼然也譬之旁望遠道之黃山而皆青俯察千仞之深谷而窈黑夫青非真色而黑非有體也日月衆星自然浮生虛空之中其行其止皆須氣焉是以七曜或逝或住或順或逆伏見無常進退不同由乎無所根繫故各異也故辰極常居其所而北斗不與衆星西沒也攝提填星皆東行日行一度月行十三度遲疾任情其無所繫著可知矣若綴附天體不得爾也成帝咸康中會稽虞喜因宣夜之說作安天論以為天高窮於無窮地深測於不測天確乎在上有常安之形地魄焉在下有居靜之體當相覆冒方則俱方員則俱員無方員不同之義也其光曜布列各自運行猶江海之有潮汐萬品之有行藏也葛洪聞而譏之曰苟辰宿不麗於天天為無用便可言無何必復云有之而不動乎由此而談稚川可謂知言之選也虞喜族祖河間相聳又立穹天論云天形穹隆如雞子幕其際周接四海之表浮于元氣之上譬如覆奩以抑水而不沒者氣充其中故也日繞辰極沒西而還東不出入地中天之有極猶蓋之有斗也天北下於地三十度極之傾在地卯酉之北亦三十度人在卯酉之南十餘萬里故斗極之下不為地中當對天地卯酉之位耳日行黃道繞極極北去黃道百一十五度南去黃道六十七度二至之所舍以為長短也吳太常姚信造昕天論云人為靈蟲形最似天今人頤前侈臨胸而項不能覆背近取諸身故知天之體南低入地北則偏高又冬至極低而天運近南故日去人遠而斗去人近北天氣至故冰寒也夏至極起而天運近北故斗去人遠日去人近南天氣至故蒸熱也極之高時日行地中淺故夜短天去地高故晝長也極之低時日行地中深故夜長天去地下故晝短也自虞喜虞聳姚信皆好奇徇異之說非極數談天者也至於渾天理妙學者多疑漢王仲任據蓋天之說以駁渾儀云舊說天轉從下過今掘地一丈輒有水天何得從水中行乎甚不然也日隨天而轉非入地夫人目所望不過十里天地合矣實非合也遠使然耳今視日入非入也亦遠耳當日入西方之時其下之人亦將謂之為中也四方之人各以其近者為出遠者為入矣何以明之今試使一人把大炬火夜行於平地去人十里火光滅矣非滅也遠使然耳今日西轉不復見是火滅之類也日月不員也望視之所以員者去人遠也夫日火之精也月水之精也水火在地不員在天何故員故丹楊葛洪釋之曰渾天儀注云天如雞子地如雞中黃孤居於天內天大而地小天表𩹉有水天地各乘氣而立載水而行周天三百六十五度四分度之一又中分之則半覆地上半繞地下故二十八宿半見半隱天轉如車轂之運也諸論天者雖多然精於陰陽者少張平子陸公紀之徒咸以為推步七曜之道以度曆象昏明之證候校以四八之氣考以漏刻之分占晷景之往來求形驗於事情莫密於渾象者也張平子既作銅渾天儀於密室中以漏水轉之令伺之者閉戶而唱之其伺之者以告靈臺之觀天者曰璇璣所加某星始見某星已中某星今沒皆如合符也崔子玉為其碑銘曰數術窮天地制作侔造化高才偉藝與神合契蓋由於平子渾儀及地動儀之有驗故也若天果如渾者則天之出入行於水中為的然矣故黃帝書曰天在地外水在天外水浮天而載地者也又易曰時乘六龍夫陽爻稱龍龍者居水之物以喻天天陽物也又出入水中與龍相似故以龍比也聖人仰觀俯察審其如此故晉卦坤下離上以證日出於地也又明夷之卦離下坤上以證日入於地也需卦乾下坎上此亦天入水中之象也天為金金水相生之物也天出入水中當有何損而謂為不可乎故桓君山曰春分日出卯入酉此乃人之卯酉天之卯酉常值斗極為天中今視之乃在北不正在人上而春秋分時日出入乃在斗極之南若如磨右轉則北方道遠而南方道近晝夜漏刻之數不應等也後奏事待報坐西廊廡下以寒故暴背有頃日光出去不復暴背君山乃告信蓋天者曰天若如推磨右轉而日西行者其光景當照此廊下稍而東耳不當拔出去拔出去是應渾天法也渾為天之真形於是可知矣然則天出入水中無復疑矣又今視諸星出於東者初但去地小許耳漸而西行先經人上後遂西轉而下焉不旁旋也其先在西之星亦稍下而沒無北轉者日之出入亦然若謂天磨右轉者日之出入亦然衆星日月宜隨天而回初在於東次經於南次到於西次及於北而復還於東不應橫過去也今日出於東冉冉轉上及其入西亦復漸漸稍下都不繞邊北去了了如此王生必固謂為不然者疏矣今日徑千里圍周三千里中足以當小星之數十也若日以轉遠之故但當光曜不能復來照及人耳宜猶望見其體不應都失其所在也日光既盛其體又大於星多矣今見極北之小星而不見日之在北者明其不北行也若日以轉遠之故不復可見其比入之間應當稍小而日方入之時乃更大此非轉遠之徵也王生以火炬喻日吾亦將借子之矛以刺子之楯焉把火之人去人轉遠其光轉微而日月自出至入不漸小也王生以火喻之謬矣又日之入西方視之稍稍去初尚有半如橫破鏡之狀須臾淪沒矣若如王生之言日轉北去有半者其北都沒之頃宜先如豎破鏡之狀不應如橫破鏡也如此言之日入北方不亦孤孑乎又月之光微不及日遠矣月盛之時雖有重雲蔽之不見月體而夕猶朗然是光猶從雲中而照外也日若繞西及北者其光故應如月在雲中之狀不得夜便大暗也又日入則星月出焉明知天以日月分主晝夜相代而照也若日常出者不應日亦入而星月亦出也又案河洛之文皆云水火者陰陽之餘氣也夫言餘氣則不能生日月可知也顧當言日精生火者可耳若水火是日月所生則亦何得盡如日月之員乎今火出於陽燧陽隧員而火不員也水出於方諸方諸方而水不方也又陽燧可以取火於日而無取日於火之理此則日精之生火明矣方諸可以取水於月而無取月於水之道此則月精之生水了矣王生又云遠故視之員若審然者月初生之時及既虧之後何以視之不員乎而日食或上或下從側而起或如鉤至盡若遠視見員不宜見其殘缺左右所起也此則渾天之理信而有徵矣儀象虞書曰在琁璣玉衡以齊七政考靈曜云分寸之晷代天氣生以制方員方員以成參以規矩昏明主時乃命中星觀玉儀之游鄭玄謂以玉為渾儀也春秋文曜鉤云唐堯即位羲和立渾儀此則儀象之設其來遠矣綿代相傳史官禁密學者不覩故宣蓋沸騰暨漢太初落下閎鮮于妄人耿壽昌等造員儀以考曆度後至和帝時賈逵繫作又加黃道至順帝時張衡又制渾象具內外規南北極黃赤道列二十四氣二十八宿中外星官及日月五緯以漏水轉之於殿上室內星中出沒與天相應因其關戾又轉瑞輪蓂莢於階下隨月虛盈依曆開落其後陸績亦造渾象至吳時中常侍廬江王蕃善數術傳劉洪乾象曆依其法而制渾儀立論考度曰前儒舊說天地之體狀如鳥卵天包地外猶殼之裹黃也周旋無端其形渾渾然故曰渾天也周天三百六十五度五百八十九分度之百四十五半覆地上半在地下其二端謂之南極北極北極出地三十六度南極入地三十六度兩極相去一百八十二度半強繞北極徑七十二度常見不隱謂之上規繞南極七十二度常隱不見謂之下規赤道帶天之紘去兩極各九十一度少強黃道日之所行也半在赤道外半在赤道內與赤道東交於角五少弱西交於奎十四少強其出赤道外極遠者去赤道二十四度斗二十一度是也其入赤道內極遠者亦二十四度井二十五度是也日南至在斗二十一度去極百一十五度少強是也日最南去極最遠故景最長黃道斗二十一度出辰入申故日亦出辰入申日晝行地上百四十六度強故日短夜行地下二百一十九度少弱故夜長自南至之後日去極稍近故景稍短日晝行地上度稍多故日稍長夜行地下度稍少故夜稍短日所在度稍北故日稍北以至於夏至日在井二十五度去極六十七度少強是日最北去極最近景最短黃道井二十五度出寅入戌故日亦出寅入戌日晝行地上二百一十九度少弱故日長夜行地下百四十六度強故夜短自夏至之後日去極稍遠故景稍長日晝行地上度稍少故日稍短夜行地下度稍多故夜稍長日所在度稍南故日出入稍南以至於南至而復初焉斗二十一井二十五南北相應四十八度春分日在奎十四少強秋分日在角五少弱此黃赤二道之交中也去極俱九十一度少強南北處斗二十一井二十五之中故景居二至長短之中奎十四角五出卯入酉故日亦出卯入酉日晝行地上夜行地下俱百八十二度半強故日見之漏五十刻不見之漏五十刻謂之晝夜同夫天之晝夜以日出沒為分人之晝夜以昏明為限日未出二刻半而明日入二刻半而昏故損夜五刻以益晝是以春秋分漏晝五十五刻三光之行不必有常術家以算求之各有同異故諸家曆法參差不齊洛書甄曜度春秋考異郵皆云周天一百七萬一千里一度為二千九百三十二里七十一步二尺七寸四分四百八十七分分之三百六十二陸績云天東西南北徑三十五萬七千里此言周三徑一也考之徑一不啻周三率周百四十二而徑四十五則天徑三十二萬九千四百一里一百二十二步二尺二寸一分七十一分分之十周禮日至之景尺有五寸謂之地中鄭衆說土圭之長尺有五寸以夏至之日立八尺之表其景與土圭等謂之地中今潁川陽城地也鄭玄云凡日景於地千里而差一寸景尺有五寸者南戴日下萬五千里也以此推之日當去其下地八萬里矣日邪射陽城則天徑之半也天體員如彈丸地處天之半而陽城為中則日春秋冬夏昏明晝夜去陽城皆等無盈縮矣故知從日邪射陽城為天徑之半也以句股法言之旁萬五千里句也立八萬里股也從日邪射陽城弦也以句股求弦法入之得八萬一千三百九十四里三十步五尺三寸六分天徑之半而地上去天之數也倍之得十六萬二千七百八十八里六十一步四尺七寸二分天徑之數也以周率乘之徑率約之得五十一萬三千六百八十七里六十八步一尺八寸二分周天之數也減甄曜度考異郵五十五萬七千三百一十二里有奇一度凡千四百六里百二十四步六寸四分十萬七千五百六十五分分之萬九千四十九減舊度千五百二十五里二百五十六步三尺三寸二十一萬五千一百三十分分之十六萬七百三十分黃赤二道相與交錯其間相去二十四度以兩儀推之二道俱三百六十五度有奇是以知天體員如彈丸也而陸績造渾象其形如鳥卵然則黃道應長於赤道矣績云天東西南北徑三十五萬七千里然則績亦以天形正員也而渾象為鳥卵則為自相違背古舊渾象以二分為一度凡周七尺三寸半分張衡更制以四分為一度凡周一丈四尺六寸一分蕃以古制局小星辰稠穊衡器傷大難可轉移更制渾象以三分為一度凡周天一丈九寸五分四分分之三也天文經星洪範傳曰清而明者天之體也天忽變色是謂易常天裂陽不足是謂臣強天裂見人兵起國亡天鳴有聲至尊憂且驚皆亂國之所生也馬續云天文在圖籍昭昭可知者經星常宿中外官凡一百一十八名積數七百八十三皆有州國官宮物類之象張衡云文曜麗乎天其動者有七日月五星是也日者陽精之宗月者陰精之宗五星五行之精衆星列布體生於地精成於天列居錯峙各有攸屬在野象物在朝象官在人象事其以神著有五列焉是為三十五名一居中央謂之北斗四布於方各七為二十八舍日月運行曆示吉凶五緯躔次用告禍福中外之官常明者百有二十四可名者三百二十為星二千五百微星之數蓋萬有一千五百二十庶物蠢蠢咸得繫命不然何以總而理諸後武帝時太史令陳卓總甘石巫咸三家所著星圖大凡二百八十三官一千四百六十四星以為定紀今略其昭昭者以備天官云中宮北極五星鉤陳六星皆在紫宮中北極北辰最尊者也其紐星天之樞也天運無窮三光迭耀而極星不移故曰居其所而衆星共之第一星主月太子也第二星主日帝王也亦太乙之坐謂最赤明者也第三星主五星庶子也中星不明主不用事右星不明太子憂鉤陳後宮也大帝之正妃也大帝之常居也北四星曰女御宮八十一御妻之象也鉤陳口中一星曰天皇大帝其神曰耀魄寶主御羣靈執萬神圖抱北極四星曰四輔所以輔佐北極而出度授政也大帝上九星曰華蓋所以覆蔽大帝之坐也蓋下九星曰杠蓋之柄也華蓋下五星曰五帝內坐設順帝所居也客星犯紫宮中坐大臣犯主華蓋杠旁六星曰六甲可以分陰陽而配節候故在帝旁所以布政教而授農時也極東一星曰柱下史主記過左右史此之象也柱史北一星曰女史婦人之微者主傳漏故漢有侍史傳舍九星在華蓋上近河賓客之館主胡人入中國客星守之備姦使亦曰胡兵起傳舍南河中五星曰造父御官也一曰司馬或曰伯樂星亡馬大貴其西河中九星如鉤狀曰鉤星直則地動天一星在紫宮門右星南天帝之神也主戰鬬知人吉凶者也太一星在天一南相近亦天帝神也主使十六神知風雨水旱兵革饑饉疾疫災害所在之國也紫宮垣十五星其西蕃七東蕃八在北斗北一曰紫微大帝之坐也天子之常居也主命主度也一曰長垣一曰天營一曰旗星為蕃衛備蕃臣也宮闕兵起旗星直天子出自將宮中兵東垣下五星曰天柱建政教懸圖法門內東南維五星曰尚書主納言夙夜咨謀龍作納言此之象也尚書西二星曰陰德陽德主周急振無宮門左星內二星曰大理主平刑斷獄也門外六星曰天牀主寢舍解息燕休西南角外二星曰內廚主六宮之內飲食主后妃夫人與太子宴飲東北維外六星曰天廚主盛饌北斗七星在太微北七政之樞機陰陽之元本也故運乎天中而臨制四方以建四時而均五行也魁四星為琁璣杓三星為玉衡又曰斗為人君之象號令之主也又為帝車取乎運動之義也又魁第一星曰天樞二曰琁三曰璣四曰權五曰玉衡六曰開陽七曰搖光一至四為魁五至七為杓樞為天琁為地璣為人權為時玉衡為音開陽為律搖光為星石氏云第一曰正星主陽德天子之象也二曰法星主陰刑女主之位也三曰令星主中禍四曰伐星主天理伐無道五曰殺星主中央助四旁殺有罪六曰危星主天倉五穀七曰部星亦曰應星主兵又云一主天二主地三主火四主水五主土六主木七主金又曰一主秦二主楚三主梁四主吳五主燕六主趙七主齊魁中四星為貴人之牢曰天理也輔星傅乎開陽所以佐斗成功丞相之象也七政星明其國昌輔星明則臣強杓南三星及魁第一星西三星皆曰三公主宣德化調七政和陰陽之官也文昌六星在北斗魁前天之六府也主集計天道一曰上將大將軍建威武二曰次將尚書正左右三曰貴相太常理文緒四曰司祿司中司隸賞功進五曰司命司怪太史主滅咎六曰司寇大理佐理寶所謂一者起北斗魁前近內階者也明潤大小齊天瑞臻文昌北六星曰內階天皇之階也相一星在北斗南相者總領百司而掌邦教以佐帝王安邦國集衆事也其星明吉太陽守一星在相西大將大臣之象也主戒不虞設武備西北四星曰勢勢腐刑人也天牢六星在北斗魁下貴人之牢也太微天子庭也五帝之坐也十二諸侯府也其外蕃九卿也一曰太微為衡衡主平也又為天庭理法平辭監升授德列宿受符諸神考節舒情稽疑也南蕃中二星間曰端門東曰左執法廷尉之象也西曰右執法御史大夫之象也執法所以舉刺凶姦者也左執法之東左掖門也右執法之西右掖門也東蕃四星南第一星曰上相其北東太陽門也第二星曰次相其北中華東門也第三星曰次將其北東太陰門也第四星曰上將所謂四輔也西蕃四星南第一星曰上將其北西太陽門也第二星曰次將其北中華西門也第三星曰次相其北西太陰門也第四星曰上相亦曰四輔也東西蕃有芒及動搖者諸侯謀天子也執法移刑罰尤急月五星入太微軌道吉其所犯中坐成刑其西南角外三星曰明堂天子布政之宮明堂西三星曰靈臺觀臺也主觀雲物察符瑞候災變也左執法東北一星曰謁者主贊賓客也謁者東北三星曰三公內坐朝會之所居也三公北三星曰九卿內坐主治萬事九卿西五星曰內五諸侯內侍天子不之國也辟雍之禮得則太微諸侯明黃帝坐在太微中含樞紐之神也天子動得天度止得地意從容中道則太微五帝坐明以光黃帝坐不明人主求賢士以輔法不然則奪勢四帝星俠黃帝坐東方蒼帝靈威仰之神也南方赤帝赤熛怒之神也西方白帝白招矩之神也北方黑帝叶光紀之神也五帝坐北一星曰太子帝儲也太子北一星曰從官侍臣也帝坐東北一星曰幸臣屏四星在端門之內近右執法屏所以壅蔽帝庭也執法主刺舉臣尊敬君上則星光明潤澤郎位十五星在帝坐東北一曰依烏郎府也周官之元士漢官之光祿中散諫議議郎三署郎中是其職也郎主守衛也其星不具后妃死幸臣誅星明大及客星入之大臣為亂郎將在郎位北主閲具所以為武備也武賁一星在太微西蕃北下台南靜室旄頭之騎官也常陳七星如畢狀在帝坐北天子宿衛武賁之士以設強禦也星搖動天子自出明則武兵用微則兵弱三台六星兩兩而居起文昌列抵太微一曰天柱三公之位也在人曰三公在天曰三台主開德宣符也西近文昌二星曰上台為司命主壽次二星曰中台為司中主宗室東二星曰下台為司祿主兵所以昭德塞違也又曰三台為天階太一躡以上下一曰泰階上階上星為天子下星為女主中階上星為諸侯三公下星為卿大夫下階上星為士下星為庶人所以和陰陽而理萬物也君臣和集如其常度有變則占其人南四星曰內平近職執法平罪之官也中台之北一星曰太尊貴戚也攝提六星直斗杓之南主建時節伺禨祥攝提為楯以夾擁帝座也主九卿明大三公恣客星入之聖人受制西三星曰周鼎主流亡大角在攝提間大角者天王座也又為天棟正經紀也北三星曰帝席主宴獻酬酢北三星曰梗河天矛也一曰天鋒主胡兵又為喪故其變動應以兵喪也星亡其國有兵謀其北一星曰招搖一曰矛楯其北一星曰玄戈皆主胡兵占與梗河略相類也招搖與北斗杓間曰天庫星去其所則有庫之祥也招搖欲與棟星梗河北斗相應則胡當來受命於中國玄戈又主北夷客星守之胡大敗天槍三星在北斗杓東一曰天鉞天之武備也故在紫宮之左所以禦難也女牀三星在紀星北後宮御也主女事天棓五星在女牀北天子先驅也主分爭與刑罰藏兵亦所以禦難也槍棓皆以備非常也一星不具其國兵起東七星曰扶筐盛桑之器主勸蠶也七公七星在招搖東天之相也三公之象也主七政貫索九星在其前賤人之牢也一曰連索一曰連營一曰天牢主法律禁暴強也牢口一星為門欲其開也九星皆明天下獄煩七星見小赦六星五星大赦動則斧鑕用中空則更元漢志云十五星天紀九星在貫索東九卿也主萬事之紀理怨訟也明則天下多辭訟亡則政理壞國紀亂散絶則地震山崩織女三星在天紀東端天女也主果蓏絲帛珍寶也王者至孝神祇咸喜則織女星俱明天下和平大星怒角布帛貴東足四星曰漸臺臨水之臺也主晷漏律呂之事西足五星曰輦道王者嬉游之道也漢輦道通南北宮其象也左右角間二星曰平道之官平道西一星曰進賢主卿相舉逸才亢東咸西咸各四星在房心北日月五星之道也房之戶所以防淫佚也星明則吉月五星犯守之有陰謀鍵閉一星在房東北近鉤鈐主關籥天市垣二十二星在房心東北主權衡主聚衆一曰天旗庭主斬戮之事也市中星衆潤澤則歲實熒惑守之戮不忠之臣彗星除之為徙市易都客星入之兵大起出之有貴喪帝坐一星在天市中候星西天庭也光而潤則天子吉威令行候一星在帝坐東北主伺陰陽也明大輔臣強四夷開候細微則國安亡則主失位移則不安宦者四星在帝坐西南侍主刑餘之人也星微吉非其常宦者有憂宗正二星在帝坐東南宗大夫也彗星守之若失色宗正有事客星守之更號令也宗人四星在宗正東主録親疏享祀族人有序則如綺文而明正動則天子親屬有變客星守之貴人死宗星二在候星東宗室之象帝輔血脉之臣也客星守之宗支不和天江四星在尾北主太陰江星不具天下津河關道不通明若動搖大水出大兵起參差則馬貴熒惑守之有立王客星入之河津絶天籥八星在南斗柄西主關閉建星六星在南斗北亦曰天旗天之都關也為謀事為天鼓為天馬南二星天庫也中央二星市也鈇鑕也上二星旗跗也斗建之間三光道也星動則衆勞月暈之蛟龍見牛馬疫月五星犯之大臣相譖有謀亦為關梁不通有大水東南四星曰狗國主鮮卑烏丸沃且熒惑守之外夷為變狗國北二星曰天雞主候時天辨九星在建星北市官之長也以知市珍也星欲明吉彗星犯守之糴貴囚徒起兵河鼓三星旗九星在牽牛北天鼓也主軍鼓主鈇鉞一曰三武主天子三將軍中央大星為大將軍左星為左將軍右星為右將軍左星南星也所以備關梁而距難也設守阻險知謀徵也旗即天鼓之旗所以為旌表也左旗九星在鼓左旁鼓欲正直而明色黃光澤將吉不正為兵憂也星怒馬貴動則兵起曲則將失計奪勢旗星差戾亂相陵旗端四星南北列曰天桴鼓桴也星不明漏刻失時前近河鼓若桴鼓相直皆為桴鼓用離珠五星在須女北須女之藏府女子之星也天津九星橫河中一曰天漢一曰天江主四瀆津梁所以度神通四方也一星不備津關道不通騰蛇二十二星在營室北天蛇也主水蟲王良五星在奎北居河中天子奉車御官也其四星曰天駟旁一星曰王良亦曰天馬其星動為策馬車騎滿野亦曰梁為天橋主禦風雨水道故或占車騎或占津梁客星守之橋不通道前一星曰策星王良之御策也主天子之僕在王良旁若移在馬後是謂策馬則車騎滿野閣道六星在王良前飛道也從紫宮至河神所乘也一曰閣道星天子游別宮之道也傅路一星在閣道南旁別道也東壁北十星曰天主馬之官若今驛亭也主傳令置驛逐漏馳騖謂其行急疾與晷漏競馳也天將軍十二星在婁北主武兵中央大星天之大將也南一星曰軍南門主誰何出入太陵八星在胃北亦曰積京主大喪也積京中星衆則諸侯有喪民多疾兵起太陵中一星曰積尸明則死人如山北九星曰天船一曰舟星所以濟不通也中一星曰積水候水災昴西二星曰天街三光之道主伺候關梁中外之境卷舌六星在昴北主口語以知佞讒也曲吉直而動天下有口舌之害中一星曰天讒主巫醫五車五星三柱九星在畢北五車者五帝車舍也五帝坐也主天子五兵一曰主五穀豐耗西北大星曰天庫主太白主秦次東北星曰獄主辰星主燕趙次東星曰天倉主歲星主魯衛次東南星曰司空主填星主楚次西南星曰卿星主熒惑主魏五星有變皆以其所主占之三柱一曰三泉天子得靈臺之禮則五車三柱均明有常其中五星曰天潢天潢南三星曰咸池魚囿也月五星入天潢兵起道不通天下亂五車南六星曰諸王察諸侯存亡其西八星曰八穀主候歲八穀一星亡一穀不登天關一星在五車南亦曰天門日月之所行也主邊事主關閉芒角有兵五星守之貴人多死東井鉞前四星曰司怪主候天地日月星辰變異及鳥獸草木之妖明主聞災修德保福也司怪西北九星曰坐旗君臣設位之表也坐旗西四星曰天高臺榭之高主遠望氣象天高西一星曰天河主察山林妖變南河北河各三星夾東井一曰天高天之關門也主關梁南河曰南戍一曰南宮一曰陽門一曰越門一曰權星主火北河曰北戍一曰北宮一曰陰門一曰胡門一曰衡星主水兩河戍間日月五星之常道也河戍動搖中國兵起南河南三星曰闕丘主宮門外象魏也五諸侯五星在東井北主刺舉戒不虞又曰理陰陽察得失亦曰主帝心一曰帝師二曰帝友三曰三公四曰博士五曰太史此五者常為帝定疑議星明大潤澤則天下大治芒角則禍在中五諸侯南三星曰天樽主盛饘粥以給貧餒積水一星在北河西北水河也所以供酒食之正也積薪一星在積水東北供庖廚之正也水位四星在積薪東主水衡客星若水火守犯之百川流溢軒轅十七星在七星北軒轅黃帝之神黃龍之體也后妃之主士職也一曰東陵一曰權星主雷雨之神南大星女主也次北一星夫人也屏也上將也次北一星妃也次將也其次諸星皆次妃之屬也女主南小星女御也左一星少民后宗也右一星大民太后宗也欲其色黃小而明也軒轅右角南三星曰酒旗酒官之旗也主宴饗飲食五星守酒旗天下大酺有酒肉財物賜若爵宗室酒旗南三星曰天相丞相之象也軒轅西四星曰爟爟者烽火之爟也邊亭之警候爟北四星曰內平平罪之官明刑罰少微四星在太微西士大夫之位也一名處士亦天子副主或曰博士官一曰主衛掖門南第一星處士第二星議士第三星博士第四星大夫明大而黃則賢士舉也月五星犯守之處士女主憂宰相易南四星曰長垣主界域及胡夷熒惑入之胡入中國太白入之九卿謀二十八舍東方角二星為天關其間天門也其內天庭也故黃道經其中七曜之所行也左角為天田為理主刑其南為太陽道右角為將主兵其北為太陰道蓋天之三門猶房之四表其星明大王道太平賢者在朝動搖移徙王者行亢四星天子之內朝也總攝天下奏事聽訟理獄録功者也一曰疏廟主疾疫星明大輔納忠天下寧氐四星王者之宿宮后妃之府休解之房前二星適也後二星妾也後二星大則臣奉度房四星為明堂天子布政之宮也亦四輔也下第一星上將也次次將也次次相也上星上相也南二星君位北二星夫人位又為四表中間為天衢為天關黃道之所經也南間曰陽環其南曰太陽北間曰陰間其北曰太陰七曜由乎天衢則天下平和由陽道則旱喪由陰道則水兵亦曰天駟為天馬主車駕南星曰左驂次左服次右服次右驂亦曰天又主開閉為畜藏之所由也房星明則王者明驂星大則兵起星離民流又北二小星曰鉤鈐房之鈐鍵天之管籥主閉鍵天心也明而近房天下同心房鉤鈐間有星及疏坼則地動河清心三星天王正位也中星曰明堂天子位為大辰主天下之賞罰天下變動心星見祥星明大天下同前星為太子後星為庶子心星直則王失勢尾九星後宮之場妃后之府上第一星后也次三星夫人次星嬪妾第三星傍一星名曰神宮解衣之內室尾亦為九子星色欲均明大小相承則後宮有多子孫箕四星亦後宮妃后之府亦曰天津一曰天雞主八風凡日月宿在箕東壁翼軫者風起又主口舌主客蠻夷胡貉故蠻胡將動先表箕焉北方南斗六星天廟也丞相太宰之位主褒賢進士稟授爵祿又主兵一曰天機南二星魁天梁也中央二星天相也北二星天府庭也亦為壽命之期也將有天子之事占於斗斗星盛明王道平和爵祿行牽牛六星天之關梁主犧牲事其北二星一曰即路一曰聚火又曰上一星主道路次二星主關梁次三星主南越搖動變色則占之星明大王道昌關梁通須女四星天少府也須賤妾之稱婦職之卑者也主布帛裁製嫁娶虛二星冢宰之官也主北方邑居廟堂祭祀祝禱事又主死喪哭泣危三星主天府天市架屋餘同虛占墳墓四星屬危之下主死喪哭泣為墳墓也營室二星天子之宮也一曰玄宮一曰清廟又為軍糧之府及土功事星明國昌小不明祠祀鬼神不享離宮六星天子之別宮主隱藏休息之所東壁二星主文章天下圖書之祕府也星明王者興道術行國多君子星失色大小不同王者好武經士不用圖書隱星動則有土功西方奎十六星天之武庫也一曰天豕亦曰封豕主以兵禁暴又主溝瀆西南大星所謂天豕目亦曰大將欲其明婁三星為天獄主苑牧犧牲供給郊祀胃三星天之廚藏主倉廩五穀府也明則和平昴七星天之耳目也主西方主獄事又為旄頭胡星也昴畢間為天街天子出旄頭罕畢以前驅此其義也黃道之所經也昴明則天下牢獄平昴六星皆明與大星等大水七星皆黃兵大起一星亡為兵喪搖動有大臣下獄及有白衣之會大而數盡動若跳躍者胡兵大起畢八星主邊兵主弋獵其大星曰天高一曰邊將主四夷之尉也星明大則遠夷來貢天下安失色則邊兵亂附耳一星在畢下主聽得失伺愆邪察不祥星盛則中國微有盜賊邊候驚外國反移動佞讒行月入畢多雨觜觿三星為三軍之候行軍之藏府主葆旅收斂萬物明則軍儲盈將得勢參十星一曰參伐一曰大辰一曰天市一曰鈇鉞主斬刈又為天獄主殺伐又主權衡所以平理也又主邊城為九譯故不欲其動也參白獸之體其中三星橫列三將也東北曰左肩主左將西北曰右肩主右將東南曰左足主後將軍西南曰右足主偏將軍故黃帝占參應七將中央三小星曰伐天之都尉也主胡鮮卑戎狄之國故不欲明七將皆明大天下兵精也王道缺則芒角張伐星明與參等大臣皆謀兵起參星失色軍散敗參芒角動搖邊候有急兵起有斬伐之事參星移客伐主參左足入玉井中兵大起秦大水若有喪山石為怪參星差戾王臣二南方東井八星天之南門黃道所經天之亭候主水衡事法令所取平也王者用法平則井星明而端列鉞一星附井之前主伺淫奢而斬之故不欲其明明與井齊則用鉞於大臣月宿井有風雨輿鬼五星天目也主視明察姦謀東北星主積馬東南星主積兵西南星主積布帛西北星主積金玉隨變占之中央星為積尸主死喪祠祀一曰鈇鑕主誅斬鬼星明大穀成不明百姓散鑕欲其忽忽不明明則兵起大臣誅柳八星天之廚宰也主尚食和滋味又主雷雨七星七星一名天都主衣裳文繡又主急兵盜賊故星明王道昌暗則賢良不處天下空張六星主珍寶宗廟所用及衣服又主天廚飲食賞賚之事星明則王者行五禮得天之中翼二十二星天之樂府主俳倡戲樂又主夷狄遠客負海之賓星明大禮樂興四夷賓動則蠻夷使來離徙則天子舉兵軫四星主冢宰輔臣也主車騎主載任有軍出入皆占於軫又主風主死喪軫星明則車駕備動則車駕用轄星傅軫兩傍主王侯左轄為王者同姓右轄為異姓星明兵大起遠軫凶轄舉南蠻侵長沙一星在軫之中主壽命明則主壽長子孫昌又曰車無轄國有憂軫就聚兵大起星官在二十八宿之外者庫樓十星六大星為庫南四星為樓在角南一曰天庫兵車之府也旁十五星三三而聚者柱也中央四小星衡也主陳兵東北二星曰陽門主守隘塞也南門二星在庫樓南天之外門也主守兵平星二星在庫樓北平天下之法獄事廷尉之象也天門二星在平星北亢南七星曰折威主斬殺頓頑二星在折威東南主考囚情狀察詐僞也騎官二十七星在氐南若天子武賁主宿衛東端一星騎陳將軍騎將也南三星車騎車騎之將也陳車三星在騎官東北革車也積卒十二星在房心南主為衛也他星守之近臣誅從官二星在積卒西北龜五星在尾南主卜以占吉凶傅說一星在尾後傅說主章祝巫官也魚一星在尾後河中主陰事知雲雨之期也杵三星在箕南杵給庖舂客星入杵臼天下有急穅星在箕舌前杵西北鱉十四星在南斗南鱉為水蟲歸太陰有星守之白衣會主有水令農丈人一星在南斗西南老農主穡也狗二星在南斗魁前主吠守天田九星在牛南羅堰九星在牽牛東岠馬也以壅蓄水潦灌溉溝渠也九坎九星在牽牛南坎溝渠也所以導達泉源疏盈瀉溢通溝洫也九坎間十星曰天池一曰三池一曰天海主灌溉田疇事虛南二星曰哭哭東二星曰泣泣哭皆近墳墓泣南十三星曰天壘城如貫索狀主北夷丁零胸奴南二星曰蓋屋治宮室之官也其南四星曰虛梁園陵寢廟之所也羽林四十五星在營室南一曰天軍主軍騎又主翼王也壘壁陳十二星在羽林北羽林之垣壘也主軍衛為營壅也五星有在天軍中者皆為兵起熒惑太白辰星尤甚北落師門一星在羽林西南北者宿在北方也落天之藩落也師衆也師門猶軍門也長安城北門曰北落門以象此也主非常以候兵有星守之虜入塞中兵起其西北有十星曰天錢北落西南一星曰天綱主武帳北落東南九星曰八魁主張禽獸天倉六星在婁南倉穀所藏也南四星曰天庾積廚粟之所也天囷十三星在胃南囷倉廩之屬也主給御糧也天廩四星在昴南一曰天廥主蓄黍稷以供饗祀春秋所謂御廩此之象也天苑十六星在昴畢南天子之苑囿養獸之所也苑南十三星曰天園植果菜之所也畢附耳南八星曰天節主使臣之所持者也天節下九星曰九州殊口曉方俗之官通重譯者也參旗九星在參西一曰天旗一曰天弓主司弓弩之張候變禦難玉井四星在參左足下主水漿以給廚西南九星曰九游天子之旗也玉井東南四星曰軍井行軍之井也軍井未達將不言渴名取此也軍市十三星在參東南天軍貿易之市使有無通也野雞一星主變怪在軍市中軍市西南二星曰丈人丈人東二星曰子子東二星曰孫東井西南四星曰水府主水之官也東井南垣之東四星曰四瀆江河淮濟之精也狼一星在東井東南狼為野將主侵掠色有常不欲動也北七星曰天狗主守財弧九星在狼東南天弓也主備盜賊常向於狼弧矢動移不如常者多盜賊胡兵大起狼弧張害及胡天下乖亂又曰天弓張天下盡兵弧南六星為天社昔共工氏之子句龍能平水土故祀以配社其精為星老人一星在弧南一曰南極常以秋分之旦見于丙春分之夕而沒于丁見則治平主壽昌常以秋分候之南郊柳南六星曰外廚廚南一星曰天紀主禽獸之齒稷五星在七星南稷農正也取乎百穀之長以為號也張南十四星曰天廟天子之祖廟也客星守之祠官有憂翼南五星曰東區蠻夷星也軫南三十二星曰器府樂器之府也青丘七星在軫東南蠻夷之國號也青丘西四星曰土司空主界域亦曰司徒土司空北二星曰軍門主營候彪尾威旗天漢起沒天漢起東方經尾箕之間謂之漢津乃分為二道其南經傅說魚天籥天辨河鼓其北經龜貫箕下次絡南斗魁左旗至天津下而合南道乃西南行又分夾匏瓜絡人星杵造父騰蛇王良傅路閣道北端太陵天船卷舌而南行絡五車經北河之南入東井水位而東南行絡南河闕丘天狗天紀天稷在七星南而沒十二次度數十二次班固取三統曆十二次配十二野其言最詳又有費直說周易蔡雍月令章句所言頗有先後魏太史令陳卓更言郡國所入宿度今附而次之自軫十二度至氐四度為壽星於辰在辰鄭之分野屬兗州費直周易分野壽星起軫七度蔡雍月令章句壽星起軫六度自氐五度至尾九度為大火於辰在卯宋之分野屬豫州費直起氐十一度蔡雍起亢八度自尾十度至南斗十一度為析木於辰在寅燕之分野屬幽州費直起尾九度蔡雍起尾四度自南斗十二度至須女七度為星紀於辰在丑吳越之分野屬揚州費直起斗十度蔡雍起斗六度自須女八度至危十五度為玄枵於辰在子齊之分野屬青州費直起女六度蔡雍起女二度自危十六度至奎四度為諏訾於辰在亥衛之分野屬并州費直起危十四度蔡雍起危十度自奎五度至胃六度降婁於辰在戌魯之分野屬徐州費直起奎二度蔡雍起奎八度自胃七度至畢十一度為大梁於辰在酉趙之分野屬冀州費直起婁十度蔡雍起胃一度自畢十二度至東井十五度為實沈於辰在申魏之分野屬益州費直起畢九度蔡雍起畢六度自東井十六度至柳八度為鶉首於辰在未秦之分野屬雍州費直起井十二度蔡雍起井十度自柳九度至張十六度為鶉火於辰在午周之分野屬三河費直起柳五度蔡雍起柳三度自張十七度至軫十一度為鶉尾於辰在巳楚之分野屬荊州費直起張十三度蔡雍起張十二度州郡躔次陳卓范蠡鬼谷先生張良諸葛亮譙周京房張衡並云角亢氐鄭兗州東郡入角一度東平任城山陽入角六度泰山入角十二度濟北陳留入亢五度濟陰入氐二度東平入氐七度房心宋豫州潁川入房一度汝南入房二度沛郡入房四度梁國入房五度淮陽入心一度魯國入心三度楚國入房四度尾箕燕幽州涼州入箕中十度上谷入尾一度漁陽入尾三度右北平入尾七度西河上郡北地遼西東入尾十度涿邵入尾十六度渤海入箕一度樂浪入箕三度玄菟入箕六度廣陽入箕九度斗牽牛須女吳越揚州九江入斗一度盧江入斗六度豫章入斗十度丹楊入斗十六度會稽入牛一度臨淮入牛四度廣陵入牛八度泗水入女一度六安入女六度虛危齊青州齊國入虛六度北海入虛九度濟南入危一度樂安入危四度東萊入危九度平原入危十一度菑川入危十四度營室東壁衛并州安定入營室一度天水入營室八度隴西入營室四度酒泉入營室十一度張掖入營室十二度武都入東壁一度金城入東壁四度武威入東壁六度敦煌入東壁八度奎婁胃魯徐州東海入奎一度琅邪入奎六度高密入婁一度城陽入婁九度膠東入胃一度昴畢趙冀州魏郡入昴一度巨鹿入昴三度常山入昴五度廣平入昴七度中山入昴一度清河入昴九度信都入畢三度趙郡入畢八度安平入畢四度河間入畢十度真定入畢十三度觜參魏益州廣漢入觜一度越嶲入觜三度蜀郡入參一度犍為入參三度牂柯入參五度巴郡入參八度漢中入參九度益州入參七度東井輿鬼秦雍州雲中入東井一度定襄入東井八度雁門入東井十六度代郡入東井二十八度太原入東井二十九度上黨入輿鬼二度柳七星張周三輔弘農入柳一度河南入七星三度河東入張一度河內入張九度翼軫楚荊州南陽入翼六度南郡入翼十度江夏入翼十二度零陵入軫十一度桂陽入軫六度武陵入軫十度長沙入軫十六度
