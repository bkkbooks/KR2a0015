body:
  text: 晉書卷三十二列傳第二后妃下元敬虞皇后荀豫章君元敬虞皇后諱孟母濟陽外黃人也父豫見外戚傳帝為琅邪王納后為妃無子永嘉六年薨時年三十五帝為晉王追尊為王后有司奏王后應別立廟令曰今宗廟未成不宜更興作便修飾陵上屋以為廟太興三年冊曰皇帝咨前琅邪王妃虞氏朕祗順昊天成命用陟帝位悼妃夙徂徽音潛翳御于家邦靡所儀刑陰教有虧用傷于懷追號制諡先王之典今遣使持節兼太尉萬勝奉冊贈皇后璽綬祀以太牢魂而有靈嘉茲寵榮乃祔於太廟葬建平陵太寧中明帝追懷母養之恩贈豫妻王氏為陽縣君從母散騎常侍新野王罕妻為平陽鄉君豫章君荀氏元帝宮人也初有寵生明帝及琅邪王裒由是為虞后所忌自以位卑每懷怨望為帝所譴漸見疏薄及明帝即位封建安君別立第宅太寧元年帝迎還臺內供奉隆厚及成帝立尊重同于太后咸康元年薨詔曰朕少遭憫凶慈訓無稟撫育之勤建安君之仁也一旦薨殂實思報復永惟平昔感痛哀摧其贈豫章郡君別立廟于京都明穆庾皇后明穆庾皇后諱文君潁川鄢陵人也父琛見外戚傳后性仁慈美姿儀元帝聞之聘為太子妃以德行見重明帝即位立為皇后冊曰妃庾氏昔承明命作嬪東宮虔恭中饋思媚軌則履信思順以成肅雝之道正位閨房以著協德之美朕夙罹不造煢煢在疚羣公卿士稽之往代僉以崇嫡明統載在典謨宜建長秋以奉宗廟是以追述先志不替舊命使使持節兼太尉授皇后璽綬夫坤德尚柔婦道承姑崇粢盛之禮敦螽斯之義是以利在永貞克隆堂基母儀天下潛暢陰教鑒于六列考之篇籍禍福無門盛衰由人雖休勿休其敬之哉可不慎歟及成帝即位尊后曰皇太后羣臣奏天子幼沖宜依漢和熹皇后故事辭讓數四不得已而臨朝攝萬機后兄中書令亮管詔命公卿奏事稱皇太后陛下咸和元年有司奏請追贈后父及夫人毋丘氏后陳讓不許三請不從及蘇峻作逆京都傾覆后見逼辱遂以憂崩時年三十二后即位凡六年其後帝孝思罔極贈琛驃騎大將軍儀同三司毋丘氏安陵縣君從母荀氏永寧縣君何氏建安縣君亮表陳先志讓而不受成恭杜皇后周太妃成恭杜皇后諱陵陽京兆人鎮南將軍預之曾孫也父見外戚傳成帝以后奕世名德咸康二年備禮拜為皇后即日入宮帝御太極前殿羣臣畢賀晝漏盡懸籥百官乃罷后少有姿色然長猶無齒有來求婚者輒中止及帝納采之日一夜齒盡生改宣城陵陽縣為廣陽縣七年三月后崩年二十一外官五日一臨內官旦一入葬訖止后在位六年無子先是三吳女子相與簪白花望之如素柰傳言天公織女死為之著服至是而后崩帝下詔曰吉凶典儀誠宜備設然豐約之度亦當隨時況重壤之下而崇飾無用邪今山陵之事一從節儉陵中唯潔掃而已不得施塗車芻靈有司奏造凶門柏歷及調挽郎皆不許又禁遠近遣使明年元會有司奏廢樂詔廢管絃奏金石如故孝武帝立寧康二年以后母裴氏為廣德縣君裴氏名穆長水校尉綽孫太傅主簿遐女太尉王夷甫外孫中表之美高於當世遐隨東海王越遇害無子唯穆渡江遂享榮慶立第南掖門外世所謂杜姥宅云章太妃周氏以選入成帝宮有寵生哀帝及海西公始拜為貴人哀帝即位詔有司議貴人位號太尉桓溫議宜稱夫人尚書僕射江虨議應曰太夫人詔崇為皇太妃儀服與太后同又詔朝臣不為太妃敬合禮典不太常江逌議位號不極不應盡敬興寧元年薨帝欲服重江虨啟應緦麻三月詔欲降為朞年虨又啟厭屈私情所以上嚴祖考帝從之康獻褚皇后康獻褚皇后諱蒜子河南陽翟人也父裒見外戚傳后聰明有器識少以名家入為琅邪王妃及康帝即位立為皇后封母謝氏為尋陽鄉君及穆帝即位尊后曰皇太后時帝幼沖未親國政領司徒蔡謨等上奏曰嗣皇誕哲岐嶷繼承天統率土宅心兆庶蒙賴陛下體茲坤道訓隆文母昔塗山光夏簡狄熙殷實由宣哲以隆休祚伏惟陛下德侔二媯淑美關雎臨朝攝政以寧天下今社稷危急兆庶懸命臣等章惶一日萬機事運之期天祿所鍾非復沖虛高讓之日漢和熹順烈並亦臨朝近明穆故事以為先制臣等不勝悲怖謹伏地上請乞陛下上順祖宗下念臣吏推公弘道以協天人則萬邦承慶羣黎更生太后詔曰帝幼沖當賴羣公卿士將順匡救以酬先帝禮賢之意且是舊德世濟之美則莫重之命不墜祖宗之基有奉是其所以欲正位于內而已所奏懇到形于翰墨執省未究以悲以懼先后允恭謙抑思順坤道所以不距羣情固為國計豈敢執守沖闇以違先旨輒敬從所奏於是臨朝稱制有司奏謝夫人既封荀卞二夫人亦應追贈皆后之前母也太后不許太常殷融議依鄭玄義衞將軍裒在宮庭則盡臣敬太后歸寧之日自如家人之禮太后詔曰典禮誠所未詳如所奏是情所不能安也更詳之征西將軍翼南中郎尚議謂父尊盡於一家君敬重於天下鄭玄義合情禮之中太后從之自後朝臣皆敬裒焉帝既冠太后詔曰昔遭不造帝在幼沖皇緒之微眇若贅旒百辟卿士率遵前朝勸喻攝政以社稷之重先代成義僶俛敬從弗遑固守仰憑七廟之靈俯仗羣后之力帝加元服禮成德備當陽親覽臨御萬國今歸事反政一依舊典于是居崇德宮手詔羣公曰昔以皇帝幼沖從羣后之議既以闇弱又頻丁極艱銜恤歷祀沈憂在疚司徒親尊德重訓救其弊王室之不壞實公是憑帝既備茲冠禮而四海未一五胡叛逆豺狼當路費役日興百姓困苦願諸君子思量遠算勠力一心輔翼幼主匡救不逮未亡人永歸別宮以終餘齒仰惟家國故以一言託懷及哀帝海西公之世太后復臨朝稱制桓溫之廢海西公也太后方在佛屋燒香內侍啟云外有急奏太后乃出尚倚戶前視奏數行乃曰我本自疑此至半便止索筆答奏云未亡人罹此百憂感念存沒心焉如割溫始呈詔草慮太后意異悚動流汗見于顏色及詔出溫大喜簡文帝即位尊后為崇德太后及帝崩孝武帝幼沖桓溫又薨羣臣啟曰王室多故禍艱仍臻國憂始周復喪元輔天下惘然若無攸濟主上雖聖資奇茂固天誕縱而春秋尚富如在諒闇蒸蒸之思未遑庶事伏惟陛下德應坤厚宣慈聖善遭家多艱臨朝親覽光大之美化洽在昔謳歌流詠播溢無外雖有莘熙殷妊姒隆周未足以喻是以五謀克從人鬼同心仰望來蘇懸心日月夫隨時之義周易所尚寧固社稷大人之任伏願陛下撫綜萬機釐和政道以慰祖宗以安兆庶不勝憂國喁喁至誠太后詔曰王室不幸仍有艱屯覽省啟事感增悲歎內外諸君並以主上春秋沖富加蒸蒸之慕未能親覽號令宜有所由苟可安社稷利天下亦豈有所執輒敬從所啟但闇昧之闕望盡弼諧之道於是太后復臨朝帝既冠乃詔曰皇帝婚冠禮備遐邇宅心宜當陽親覽緝熙惟始今歸政事率由舊典於是復稱崇德太后太元九年崩于顯陽殿年六十一在位凡四十年太后於帝為從嫂朝議疑其服太學博士徐藻議曰資父事君而敬同又禮云其夫屬父道者妻皆母道也則夫屬君道妻亦后道矣服后以齊母之義也魯譏逆祀以明尊卑今上躬奉康穆哀皇及靖后之祀致敬同于所天豈可敬之以君道而服廢於本親謂應齊衰朞從之穆章何皇后穆章何皇后諱法倪廬江灊人也父準見外戚傳以名家膺選升平元年八月下璽書曰皇帝咨前太尉參軍何琦混元資始肇經人倫爰及夫婦以奉天地宗廟社稷謀于公卿咸以宜率由舊典今使使持節太常彪之宗正綜以禮納采琦答曰前太尉參軍都鄉侯糞土臣何琦稽首頓首再拜皇帝嘉命訪婚陋族備數採擇臣從祖弟故散騎侍郎準之遺女未閑教訓衣履若如人欽承舊章肅奉典制又使兼太保武陵王晞兼太尉中領軍洽持節奉冊立為皇后后無子哀帝即位稱穆皇后居永安宮桓玄篡位移后入司徒府路經太廟后停輿慟哭哀感路人玄聞而怒曰天下禪代常理何預何氏女子事耶乃降后為零陵縣君與安帝俱西至巴陵及劉裕建義殷仲文奉后還京都下令曰戎車屢警黎元阻饑而饍御豐靡豈與百姓同其儉約減損供給勿令游過后時以遠還欲奉拜陵廟有司以寇難未平奏停元興三年崩年六十六在位凡四十八年哀靖王皇后哀靖王皇后諱穆之太原晉陽人也司徒左長史濛之女也后初為琅邪王妃哀帝即位立為皇后追贈母爰氏為安國鄉君后在位三年無子興寧二年崩廢帝孝庾皇后廢帝孝庾皇后諱道憐潁川陵人也父冰自有傳初為東海王妃及帝即位立為皇后太和六年崩葬于敬平陵帝廢為海西公追貶后曰海西公夫人太元十一年海西公薨于吳又以后合葬于吳陵簡文宣鄭太后簡文宣鄭太后諱阿春河南滎陽人也世為冠族祖合臨濟令父愷字祖元安豐太守后少孤無兄弟唯姊妹四人后最長先適渤海田氏生一男而寡依于舅濮陽吳氏元帝為丞相敬后先崩將納吳氏女為夫人后及吳氏女並游後園或見之言於帝曰鄭氏女雖嫠賢於吳氏遠矣建武元年納為琅邪王夫人甚有寵后雖貴幸而有憂色帝問其故對曰妾有妹中者已適長沙王褒餘二妹未有所適恐姊為人妾無復求者帝因從容謂劉隗曰鄭氏二妹卿可為求佳對使不失舊隗舉其從子傭娶第三者以小者適漢中李氏皆得舊門帝召王褒為尚書郎以悅后意后生琅邪悼王簡文帝尋陽公主帝稱尊號后雖為夫人詔太子及東海武陵王皆母事之帝崩后稱建平國夫人咸和元年薨簡文帝時為琅邪王制服重有司以王出繼宜降所生國臣不能匡正奏免國相諸葛頤王上疏曰亡母生臨臣國沒留國第臣雖出後亦無所厭則私情得昔敬后崩孝王已出繼亦還服重此則明比臣所憲章也明穆皇后不奪其志乃徙琅邪王為會稽王追號后曰會稽太妃及簡文帝即位未及追尊臨崩封皇子道子為琅邪王領會稽國奉太妃祀太元十九年孝武帝下詔曰會稽太妃文母之德徽音有融誕載聖明光延于晉先帝追尊聖善朝議不一道以疑屈朕述遵先志常惕于心今仰奉遺旨依陽秋二漢孝懷皇帝故事上太妃尊號曰簡文太后于是立廟于太廟路西陵曰嘉平時羣臣希旨多謂鄭太后應配食于元帝者帝以問太子前率徐邈邈曰臣案陽秋之義母以子貴魯隱尊桓母別考仲子之宮而不配食于惠廟又平素之時不伉儷于先帝至于子孫豈可為祖考立配其崇尊盡禮由於臣子故得稱太后陵廟備典若乃祔葬配食則義所不可從之簡文順王皇后簡文順王皇后諱簡姬太原晉陽人也父遐見外戚傳后以冠族初為會稽王妃生子道生為世子永和四年母子並失帝意俱被幽廢后遂以憂薨咸安二年孝武帝即位追尊曰順皇后合葬高平陵追贈后父遐特進光祿大夫加散騎常侍孝武文李太后孝武文李太后諱陵容本出微賤始簡文帝為會稽王有三子俱夭自道生廢黜獻王早世其後諸姬絕孕將十年帝令卜者扈謙筮之曰後房中有一女當育二貴男其一終盛晉室時徐貴人生新安公主以德美見寵帝常冀之有娠而彌年無子會有道士許邁者朝臣時望多稱其得道帝從容問焉答曰邁是好山水人本無道術斯事豈所能判但殿下德厚慶深宜隆奕世之緒當從扈謙之言以存廣接之道帝然之更加採納又數年無子乃令善相者召諸愛妾而示之皆云非其人又悉以諸婢媵示焉時后為宮人在織坊中形長而色黑宮人皆謂之崐崘既至相者驚云此其人也帝以大計召之侍寢后數夢兩龍枕膝日月入懷意以為吉祥向儕類說之帝聞而異焉遂生孝武帝及會稽文孝王鄱陽長公主及孝武帝初即位尊為淑妃太元三年進為貴人九年又進為夫人十二年加為皇太妃儀服一同太后十九年會稽王道子啟母以子貴慶厚禮崇伏惟皇太妃純德光大休祐攸鍾啟嘉祚於聖明嗣徽音于上列雖幽顯同謀而稱謂未盡非所以仰述聖心允答天人宜崇正名號詳案舊典八月辛巳帝臨軒遣兼太保劉耽尊為皇太后稱崇訓宮安帝即位尊為太皇太后隆安四年崩于含章殿朝議疑其服制左僕射何澄右僕射王雅尚書車胤孔安國祠部郎徐廣等議曰太皇太后名位允正體同皇極理制備盡情禮兼申陽秋之義母以子貴既稱夫人禮服從正故成風顯夫人之號文公服三年之喪子于父母之所生體尊義重且禮祖不厭孫固宜追服無屈而緣情立制若嫌明文不存則疑斯從重謂應同于為祖母後齊衰三年從之皇后及百官皆服齊衰朞永安皇后一舉哀於是設廬於西堂凶儀施于神獸門葬修平陵神主祔于宣太后廟孝武定王皇后孝武定王皇后諱法慧哀靖皇后之姪也父蘊見外戚傳初帝將納后訪于公卿于時蘊子恭以弱冠見僕射謝安安深敬重之既而謂人曰昔毛嘉恥于魏朝楊駿幾傾晉室若帝納后有父者唯廕望如王蘊乃可既而訪蘊女容德淑令乃舉以應選寧康三年中軍將軍桓沖等奏曰臣聞天地之道蓋相須而化成帝后之德必相協而政隆然後品物流形彝倫攸靈根長固本枝百世天人同致莫不由此是以塗山作儷而夏族以熙妊姒配周而姬祚以昌今長秋將建宜時簡擇伏聞試守晉陵太守王蘊女天性柔順四業允備且盛德之冑美善先積臣等參議可以配德乾元恭承宗廟徽音六宮母儀天下於是帝始納焉封蘊妻劉氏為樂平鄉君后性嗜酒驕妒帝深患之乃召蘊於東堂具說后過狀令加訓誡蘊免冠謝焉后於是少自改飾太元五年崩年二十一葬隆平陵安德陳太后安德陳太后諱歸女松滋潯陽人也父廣以倡進仕至平昌太守后以美色能歌彈入宮為淑媛生安恭二帝太元十五年薨贈夫人追崇曰皇太后神主祔于宣太后廟陵曰熙平安僖王皇后安僖王皇后諱神愛琅邪臨沂人也父獻之見別傳母新安愍公主后以太元二十一年納為太子妃及安帝即位立為皇后無子義熙八年崩于徽音殿時年二十九葬休平陵恭思褚皇后恭思褚皇后諱靈媛河南陽翟人義興太守爽之女也后初為琅邪王妃元熙元年立為皇后生海鹽富陽公主及帝禪位于宋降為零陵王妃宋元嘉十三年崩時年五十三祔葬沖平陵史臣曰方祇體安儷乾儀而合德圓舒循晷配羲曜以齊明故知陽爍陰凝萬物假其陶鑄火炎水潤六氣由其調理取譬賢淑作伉文思靈根式固實資於此宣穆閱禮偶德潛鱗翊天造之艱虞嗣塗山之逸響寶運歸其後胤蓋有母儀之助焉武元楊氏預聞朝政明不逮遠愛溺私情深杜衞瓘之言不曉張泓之詐運其陰沴韜映乾明晉道中微基于是矣惠皇稟質王縱其嚚識暗鳴蛙智昏文蛤南風肆狡扇禍稽天初踐椒宮逞梟心于長樂方觀梓樹頒鴆羽於離明褒后滅周方之蓋小妹妃傾夏曾何足喻中原陷於鳴鏑其兆彰於此焉昔者高宗諒闇總百官於元老成王沖眇託萬機於上公太后御宸諒知非古而明穆康獻仍世臨朝時屬委裘躬行負扆各免華陽之釁竟躡和熹之蹤保陵遲以克終所幸實為多矣贊曰二妃光舜三母翼周末升夷癸褒進亡幽家邦興滅職此之由穆后沈斷忘情執爨故劍辭恩池蒲起歎崇化繁祉肇基商亂二楊繼寵福極災生南風熾虐國喪身傾獻容幸亂居辱疑榮援筆廢主持尺威帝契闊終罹殷憂以斃芬實窈窕芳菲婉嫕呂妾變嬴黃姬化石文遠著金行潛徙婦德傾城迷朱奪紫
