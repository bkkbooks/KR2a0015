body:
  text: 晉書卷四十三列傳第十三山濤子簡簡子遐山濤字巨源河內懷人也父曜宛句令濤早孤居貧少有器量介然不羣性好莊老每隱身自晦與嵇康呂安善後遇阮籍便為竹林之交著忘言之契康後坐事臨誅謂子紹曰巨源在汝不孤矣濤年四十始為郡主簿功曹上計掾舉孝廉州辟部河南從事與石鑒共宿濤夜起蹴鑒曰今為何等時而眠邪知太傅臥何意鑒曰宰相三不朝與尺一令歸第卿何慮也濤曰咄石生無事馬蹄間邪投傳而去未二年果有曹爽之事遂隱身不交世務與宣穆后有中表親是以見景帝帝曰呂望欲仕邪命司隸舉秀才除郎中轉驃騎將軍王昶從事中郎久之拜趙國相遷尚書吏部郎文帝與濤書曰足下在事清明雅操邁時念多所乏今致錢二十萬穀二百斛魏帝嘗賜景帝春服帝以賜濤又以母老並賜藜杖一枚晚與尚書和逌交又與鍾會裴秀並申款昵以二人居勢爭權濤平心處中各得其所而俱無恨焉遷大將軍從事中郎鍾會作亂於蜀而文帝將西征時魏氏諸王公並在鄴帝謂濤曰西偏吾自了之後事深以委卿以本官行軍司馬給親兵五百人鎮鄴咸熙初封新沓子轉相國左長史典統別營時帝以濤鄉閭宿望命太子拜之帝以齊王攸繼景帝後素又重攸嘗問裴秀曰大將軍開建未遂吾但承奉後事耳故立攸將歸功於兄何如秀以為不可又以問濤濤對曰廢長立少違禮不祥國之安危必由之太子位於是乃定太子親拜謝濤及武帝受禪以濤守大鴻臚護送陳留王詣鄴泰始初加奉車都尉進爵新沓伯及羊祜執政時人欲危裴秀濤正色保持之由是失權臣意出為冀州刺史加寧遠將軍冀州俗薄無相推轂濤甄拔隱屈搜訪賢才旌命三十餘人皆顯名當時人懷慕尚風俗頗革轉北中郎將督鄴城守事入為侍中遷尚書以母老辭職詔曰君雖乃心在於色養然職有上下旦夕不廢醫藥且當割情以隆在公濤心求退表疏數十上久乃見聽除議郎帝以濤清儉無以供養特給日契加賜牀帳茵褥禮秩崇重時莫為比後除太常卿以疾不就會遭母喪歸鄉里濤年踰耳順居喪過禮負土成墳手植松柏詔曰吾所共致化者官人之職是也方今風俗陵遲人心進動宜崇明好惡鎮以退讓山太常雖尚居諒暗情在難奪方今務殷何得遂其志邪其以濤為吏部尚書濤辭以喪病章表懇切會元皇后崩遂扶輿還洛逼迫詔命自力就職前後選舉周遍內外而並得其才咸寧初轉太子少傅加散騎常侍除尚書僕射加侍中領吏部固辭以老疾上表陳情章表數十上久不攝職為左丞白褒所奏帝曰濤以病自聞但不聽之耳使濤坐執銓衡則可何必上下邪不得有所問濤不自安表謝曰古之王道正直而已陛下不可以一老臣為加曲私臣亦何心屢陳日月乞如所表以章典刑帝再手詔曰白褒奏君甚妄所以不即推直不喜凶赫耳君之明度豈當介意邪便當攝職令斷章表也濤志必欲退因發從弟婦喪輒還外舍詔曰山僕射近日暫出遂以微苦未還豈吾側席之意其遣丞掾奉詔諭旨若體力故未平康者便以輿車輿還寺舍濤辭不獲已乃起視事濤再居選職十有餘年每一官缺輒啓擬數人詔旨有所向然後顯奏隨帝意所欲為先故帝之所用或非舉首衆情不察以濤輕重任意或譖之於帝故帝手詔戒濤曰夫用人惟才不遺疏遠單賤天下便化矣而濤行之自若一年之後衆情乃寢濤所奏甄拔人物各為題目時稱山公啓事濤中立於朝晚值后黨專權不欲任楊氏多有諷諫帝雖悟而不能改後以年衰疾篤上疏告退曰臣年垂八十救命旦夕若有毫末之益豈遺力於聖時迫以老耄不復任事今四海休息天下思化從而靜之百姓自正但當崇風尚教以敦之耳陛下亦復何事臣耳目聾瞑不能自勵君臣父子其間無文是以直陳愚情乞聽所請乃免冠徒跣上還印綬詔曰天下事廣加吳土初平凡百草創當共盡意化之君不深識往心而以小疾求退豈所望於君邪朕猶側席未得垂拱君亦何得高尚其事乎當崇至公勿復為虛飾之煩濤苦表請退詔又不許尚書令衛瓘奏濤以微苦久不視職手詔頻煩猶未順旨參議以為無專節之尚違在公之義若實沈篤亦不宜居位可免濤官中詔瓘曰濤以德素為朝之望而常深退讓至于懇切故比有詔欲必奪其志以匡輔不逮主者既不思明詔旨而反深加詆案虧崇賢之風以重吾不德何以示遠近邪濤不得已又起視事太康初遷右僕射加光祿大夫侍中掌選如故濤以老疾固辭手詔曰君以道德為世模表況自先帝識君遠意吾將倚君以穆風俗何乃欲舍遠朝政獨高其志耶吾之至懷故不足以喻乎何來言至懇切也且當以時自力深副至望君不降志朕不安席濤又上表固讓不許吳平之後帝詔天下罷軍役示海內大安州郡悉去兵大郡置武吏百人小郡五十人帝嘗講武于宣武場濤時有疾詔乘步輦從因與盧欽論用兵之本以為不宜去州郡武備其論甚精于時咸以濤不學孫吳而暗與之合帝稱之曰天下名言也而不能用及永寧之後屢有變難寇賊猋起郡國皆以無備不能制天下遂以大亂如濤言焉後拜司徒濤復固讓詔曰君年耆德茂朝之碩老是以授君台輔之位而遠崇克讓至于反覆良用於邑君當終始朝政翼輔朕躬濤又表曰臣事天朝三十餘年卒無毫釐以崇大化陛下私臣無已猥授三司臣聞德薄位高力少任重上有折足之凶下有廟門之咎願陛下垂纍世之恩乞臣骸骨詔曰君翼贊朝政保乂皇家匡佐之勳朕所倚賴司徒之職實掌邦教故用敬授以答羣望豈宜沖讓以自抑損邪已敕斷章表使者乃臥加章綬濤曰垂沒之人豈可污官府乎輿疾歸家以太康四年薨時年七十九詔賜東園祕器朝服一具衣一襲錢五十萬布百匹以供喪事策贈司徒蜜印紫綬侍中貂蟬新沓伯蜜印青朱綬祭以太牢諡曰康將葬賜錢四十萬布百匹左長史范晷等上言濤舊第屋十間子孫不相容帝為之立室初濤布衣家貧謂妻韓氏曰忍飢寒我後當作三公但不知卿堪公夫人不耳及居榮貴貞慎儉約雖爵同千乘而無嬪媵祿賜俸秩散之親故初陳郡袁毅嘗為鬲令貪濁而賂遺公卿以求虛譽亦遺濤絲百斤濤不欲異於時受而藏於閣上後毅事露檻車送廷尉凡所受賂皆見推檢濤乃取絲付吏積年塵埃印封如初濤飲酒至八斗方醉帝欲試之乃以酒八斗飲濤而密益其酒濤極本量而止有五子該淳允謨簡該字伯倫嗣父爵仕至并州刺史太子左率贈長水校尉該子瑋字彥祖翊軍校尉次子世回吏部郎散騎常侍淳字子玄不仕允字叔真奉車都尉並少病形甚短小而聰敏過人武帝聞而欲見之濤不敢辭以問於允允自以陋不肯行濤以為勝己乃表曰臣二子病宜絶人事不敢受詔謨字季長明惠有才智官至司空掾簡字季倫性溫雅有父風年二十餘濤不之知也簡歎曰吾年幾三十而不為家公所知後與譙國嵇紹沛郡劉謨弘農楊準齊名初為太子舍人纍遷太子庶子黃門郎出為青州刺史徵拜侍中頃之轉尚書歷鎮軍將軍荊州刺史領南蠻校尉不行復拜尚書光熙初轉吏部尚書永嘉初出為雍州刺史鎮西將軍徵為尚書左僕射領吏部簡欲令朝臣各舉所知以廣得才之路上疏曰臣以為自古興替實在官人苟得其才則無物不理書言知人則哲惟帝難之唐虞之盛元愷登庸周室之隆濟濟多士秦漢已來風雅漸喪至於後漢女君臨朝尊官大位出於阿保斯亂之始也是以郭泰許劭之倫明清議於草野陳蕃李固之徒守忠節於朝廷然後君臣名節古今遺典可得而言自初平之元訖於建安之末三十年中萬姓流散死亡略盡斯亂之極也世祖武皇帝應天順人受禪魏泰始之初躬親萬機佐命之臣咸皆率職時黃門侍郎王恂庾純始於太極東堂聽政評尚書奏事多論刑獄不論選舉臣以為不先所難而辨其所易陛下初臨萬國人思盡誠每於聽政之日命公卿大臣先議選舉各言所見後進俊才鄉邑尤異才堪任用者皆以名奏主者隨缺先是爵人於朝與衆共之之義也朝廷從之永嘉三年出為征南將軍都督荊湘交廣四州諸軍事假節鎮襄陽于時四方寇亂天下分崩王威不振朝野危懼簡優遊卒歲唯酒是耽諸習氏荊土豪族有佳園池簡每出嬉遊多之池上置酒輒醉名之曰高陽池時有童兒歌曰山公出何許往至高陽池日夕倒載歸茗艼無所知時時能騎馬倒著白接嚇舉鞭向葛疆何如并州兒疆家在并州簡愛將也尋加督寧益軍事時劉聰入寇京師危逼簡遣督護王萬率師赴難次于涅陽為宛城賊王如所破遂嬰城自守及洛陽陷沒簡又為賊嚴嶷所逼乃遷于夏口招納流亡江漢歸附時華軼以江州作難或勸簡討之簡曰與彥夏舊友為之惆悵簡豈利人之機以為功伐乎其篤厚如此時樂府伶人避難多奔沔漢宴會之日僚佐或勸奏之簡曰社稷傾覆不能匡救有晉之罪人也何作樂之有因流涕慷慨坐者咸愧焉年六十卒追贈征南大將軍儀同三司子遐遐字彥林為餘姚令時江左初基法禁寬弛豪族多挾藏戶口以為私附遐繩以峻法到縣八旬出口萬餘縣人虞喜以藏戶當棄市遐欲繩喜諸豪強莫不切齒於遐言於執事以喜有高節不宜屈辱又以遐輒造縣舍遂陷其罪遐與會稽內史何充箋乞留百日窮翦逋逃退而就罪無恨也充申理不能得竟坐免官後為東陽太守為政嚴猛康帝詔曰東陽頃來竟囚每多入重豈郡多罪人將捶楚所求莫能自固邪遐處之自若郡境肅然卒于官史臣曰若夫居官以潔其務欲以啓天下之方事親以終其身將以勸天下之俗非山公之具美其孰能與於此者哉自東京喪亂吏曹湮滅西園有三公之錢蒲陶有一州之任貪叨方駕寺署斯滿時移三代世歷九王拜謝私庭此焉成俗若乃餘風稍殄理或可言委以銓綜則羣情自抑通乎魚水則專用生疑將矯前失歸諸後正惠絶臣名恩馳天口世稱山公啓事者豈斯之謂歟若盧子家之前代何足算也王戎從弟衍衍弟澄郭舒王戎字濬沖琅邪臨沂人也祖雄幽州刺史父渾涼州刺史貞陵亭侯戎幼而穎悟神彩秀徹視日不眩裴楷見而目之曰戎眼爛爛如巖下電年六七歲於宣武場觀戲猛獸在檻中虓吼震地衆皆奔走戎獨立不動神色自若魏明帝於閣上見而奇之又嘗與羣兒嬉於道側見李樹多實等輩競趣之戎獨不往或問其故戎曰樹在道邊而多子必苦李也取之信然阮籍與渾為友戎年十五隨渾在郎舍戎少籍二十歲而籍與之交籍每適渾俄頃輒去過視戎良久然後出謂渾曰濬沖清賞非卿倫也共卿言不如共阿戎談及渾卒於涼州故吏賻贈數百萬戎辭而不受由是顯名為人短小任率不修威儀善發談端賞其要會朝賢嘗上巳禊洛或問王濟曰昨遊有何言談濟曰張華善説史漢裴頠論前言往行袞袞可聽王戎談子房季札之間超然玄著其為識鑒者所賞如此戎嘗與阮籍飲時兗州刺史劉昶字公榮在坐籍以酒少酌不及昶昶無恨色戎異之他日問籍曰彼何如人也答曰勝公榮不可不與飲若減公榮則不敢不共飲惟公榮可不與飲戎每與籍為竹林之遊戎嘗後至籍曰俗物已復來敗人意戎笑曰卿輩意亦復易敗耳鍾會伐蜀過與戎別問計將安出戎曰道家有言為而不恃非成功難保之難也及會敗議者以為知言襲父爵辟相國掾歷吏部黃門郎散騎常侍河東太守荊州刺史坐遣吏修園宅應免官詔以贖論遷豫州刺史加建威將軍受詔伐吳戎遣參軍羅尚劉喬領前鋒進攻武昌吳將楊雍孫述江夏太守劉朗各率衆詣戎降戎督大軍臨江吳牙門將孟泰以蘄春邾二縣降吳平進爵安豐縣侯增邑六千戶賜絹六千匹戎渡江綏慰新附宣揚威惠吳光祿勳石偉方直不容晧朝稱疾歸家戎嘉其清節表薦之詔拜偉為議郎以二千石祿終其身荊土悅服徵為侍中南郡太守劉肇賂戎筒中細布五十端為司隸所糾以知而未納故得不坐然議者尤之帝謂朝臣曰戎之為行豈懷私苟得正當不欲為異耳帝雖以是言釋之然為清慎者所鄙由是損名戎在職雖無殊能而庶績修理後遷光祿勳吏部尚書以母憂去職性至孝不拘禮制飲酒食肉或觀奕而容貌毀悴杖然後起裴頠往弔之謂人曰若使一慟能傷人濬沖不免滅性之譏也時和嶠亦居父喪以禮法自持量米而食哀毀不踰於戎帝謂劉毅曰和嶠毀頓過禮使人之毅曰嶠雖寢苫食粥乃生孝耳至於王戎所謂死孝陛下當先憂之戎先有吐疾居喪增甚帝遣醫療之并賜藥物又斷賓客楊駿執政拜太子太傅駿誅之後東安公繇專斷刑賞威震外內戎誡繇曰大事之後宜深遠之繇不從果得罪轉中書令加光祿大夫給恩信五十人遷尚書左僕射領吏部戎始為甲午制凡選舉皆先治百姓然後授用司隸傅咸奏戎曰書稱三載考績三考黜陟幽明今內外羣官居職未期而戎奏還既未定其優劣且送故迎新相望道路巧詐由生傷農害政戎不仰依堯舜典謨而驅動浮華虧敗風俗非徒無益乃有大損宜免戎官以敦風俗戎與賈郭通親竟得不坐尋轉司徒以王政將圮苟媚取容屬愍懷太子之廢竟無一言匡諫裴頠戎之壻也頠誅戎坐免官齊王冏起義孫秀録戎於城內趙王倫子欲取戎為軍司博士王繇曰濬沖譎詐多端安肯為少年用乃止惠帝反宮以戎為尚書令既而河間王顒遣使就説成都王穎將誅齊王冏檄書至冏謂戎曰孫秀作逆天子幽逼孤糾合義兵掃除元惡臣子之節信著神明二王聽讒造構大難當賴忠謀以和不協卿其善為我籌之戎曰公首舉義衆匡定大業開闢以來未始有也然論功報賞不及有勞朝野失望人懷二志今二王帶甲百萬其鋒不可當若以王就第不失故爵委權崇讓此求安之計也冏謀臣葛旟怒曰漢魏以來王公就第寧有得保妻子乎議者可斬於是百官震悚戎偽藥發墮廁得不及禍戎以晉室方亂慕蘧伯玉之為人與時舒卷無蹇諤之節自經典選未嘗進寒素退虛名但與時浮沈戶調門選而已尋拜司徒雖位總鼎司而委事僚寀間乘小馬從便門而出遊見者不知其三公也故吏多至大官道路相遇輒避之性好興利廣收八方園田水碓周遍天下積實聚錢不知紀極每自執牙籌晝夜算計若不足而又儉嗇不自奉養天下人謂之膏肓之疾女適裴頠貸錢數萬久而未還女後歸寧戎色不悅女遽還直然後乃歡從子將婚戎遺其一單衣婚訖而更責取家有好李常出貨之恐人得種鑽其核以此獲譏於世其後從帝北伐王師敗績於蕩陰戎復詣鄴隨帝還洛陽車駕之西遷也戎出奔于郟在危難之間親接鋒刃談笑自若未嘗有懼容時召親賓歡娛永日永興二年薨于郟縣時年七十二諡曰元戎有人倫鑒識嘗目山濤如璞玉渾金人皆欽其寶莫知名其器王衍神姿高徹如瑤林瓊樹自然是風塵表物謂裴頠拙於用長荀勗工於用短陳道寧如束長竿族弟敦有高名戎惡之敦每候戎輒託疾不見敦後果為逆亂其鑒賞先見如此嘗經黃公酒壚下過顧謂後車客曰吾昔與嵇叔夜阮嗣宗酣暢於此竹林之遊亦預其末自嵇阮云亡吾便為時之所羈紲今日視之雖近邈若山河初孫秀為琅邪郡吏求品於鄉議戎從弟衍將不許戎勸品之及秀得志朝士有宿怨者皆被誅而戎衍獲濟焉子萬有美名少而大肥戎令食粳而肥愈甚年十九卒有庶子興戎所不齒以從弟陽平太守愔子為嗣衍字夷甫神情明秀風姿詳雅總角嘗造山濤濤嗟歎良久既去目而送之曰何物老嫗生寧馨兒然誤天下蒼生者未必非此人也父乂為平北將軍常有公事使行人列上不時報衍年十四時在京師造僕射羊祜申陳事狀辭甚清辨祜名德貴重而衍幼年無屈下之色衆咸異之楊駿欲以女妻焉衍恥之遂陽狂自免武帝聞其名問戎曰夷甫當世誰比戎曰未見其比當從古人中求之泰始八年詔舉奇才可以安邊者衍初好論從橫之術故尚書盧欽舉為遼東太守不就於是口不論世事唯雅詠玄虛而已嘗因宴集為族人所怒舉樏擲其面衍初無言引王導共載而去然心不能平在車中攬鏡自照謂導曰爾看吾目光乃在牛背上矣父卒於北平送故甚厚為親識之所借貸因以捨之數年之間家資罄盡出就洛城西田園而居焉後為太子舍人遷尚書郎出補元城令終日清談而縣務亦理入為中庶子黃門侍郎魏正始中何晏王弼等祖述老莊立論以為天地萬物皆以無為本無也者開物成務無往不存者也陰陽恃以化生萬物恃以成形賢者恃以成德不肖恃以免身故無之為用無爵而貴矣衍甚重之惟裴頠以為非著論以譏之而衍處之自若衍既有盛才美貌明悟若神常自比子貢兼聲名藉甚傾動當世妙善玄言唯談老莊為事每捉玉柄麈尾與手同色義理有所不安隨即改更世號口中雌黃朝野翕然謂之一世龍門矣纍居顯職後進之士莫不景慕放效選舉登朝皆以為稱首矜高浮誕遂成風俗焉衍嘗喪幼子山簡弔之衍悲不自勝簡曰孩抱中物何至於此衍曰聖人忘情最下不及於情然則情之所鍾正在我輩簡服其言更為之慟衍妻郭氏賈后之親藉中宮之勢剛愎貪戾聚斂無厭好干預人事衍患之而不能禁時有鄉人幽州刺史李陽京師大俠也郭氏素憚之衍謂郭曰非但我言卿不可李陽亦謂不可郭氏為之小損衍疾郭之貪鄙故口未嘗言錢郭欲試之令婢以錢繞牀使不得行衍晨起見錢謂婢曰舉阿堵物却其措意如此後歷北軍中候中領軍尚書令女為愍懷太子妃太子為賈后所誣衍懼禍自表離婚賈后既廢有司奏衍曰衍與司徒梁王肜書寫呈皇太子手與妃及衍書陳見誣之狀肜等伏讀辭旨懇惻衍備位大臣應以義責也太子被誣得罪衍不能守死善道即求離婚得太子手書隱蔽不出志在苟免無忠蹇之操宜加顯責以厲臣節可禁錮終身從之衍素輕趙王倫之為人及倫篡位衍陽狂斫婢以自免及倫誅拜河南尹轉尚書又為中書令時齊王冏有匡復之功而專權自恣公卿皆為之拜衍獨長揖焉以病去官成都王穎以衍為中軍師纍遷尚書僕射領吏部後拜尚書令司空司徒衍雖居宰輔之重不以經國為念而思自全之計説東海王越曰中國已亂當賴方伯宜得文武兼資以任之乃以弟澄為荊州族弟敦為青州因謂澄敦曰荊州有江漢之固青州有負海之險卿二人在外而吾留此足以為三窟矣識者鄙之及石勒王彌寇京師以衍都督征討諸軍事持節假黃鉞以距之衍使前將軍曹武左衛將軍王景等擊賊退之獲其輜重遷太尉尚書令如故封武陵侯辭封不受時洛陽危逼多欲遷都以避其難而衍獨賣車牛以安衆心越之討苟晞也衍以太尉為太傅軍司及越薨衆共推為元帥衍以賊寇鋒起懼不敢當辭曰吾少無宦情隨牒推移遂至於此今日之事安可以非才處之俄而舉軍為石勒所破勒呼王公與之相見問衍以晉故衍為陳禍敗之由云計不在己勒甚悅之與語移日衍自説少不豫事欲求自免因勸勒稱尊號勒怒曰君名蓋四海身居重任少壯登朝至於白首何得言不豫世事邪破壞天下正是君罪使左右扶出謂其黨孔萇曰吾行天下多矣未嘗見如此人當可活不萇曰彼晉之三公必不為我盡力又何足貴乎勒曰要不可加以鋒刃也使人夜排牆填殺之衍將死顧而言曰嗚呼吾曹雖不如古人向若不祖尚浮虛勠力以匡天下猶可不至今日時年五十六衍俊秀有令望希心玄遠未嘗語利王敦過江常稱之曰夷甫處衆中如珠玉在瓦石間顧愷之作畫贊亦稱衍巖巖清峙壁立千仞其為人所尚如此子玄字眉子少慕簡曠亦有俊才與衛玠齊名荀藩用為陳留太守屯尉氏玄素名家有豪氣荒弊之時人情不附將赴祖逖為盜所害焉澄字平子生而警悟雖未能言見人舉動便識其意衍妻郭性貪鄙欲令婢路上擔糞澄年十四諫郭以為不可郭大怒謂澄曰昔夫人臨終以小郎屬新婦不以新婦屬小郎因捉其衣裾將杖之澄爭得脫踰窗而走衍有重名於世時人許以人倫之鑒尤重澄及王敦庾敳嘗為天下人士目曰阿平第一子嵩第二處仲第三澄嘗謂衍曰兄形似道而神鋒太俊衍曰誠不如卿落落穆穆然也澄由是顯名有經澄所題目者衍不復有言輒云已經平子矣少歷顯位纍遷成都王穎從事中郎穎嬖豎孟玖譖殺陸機兄弟天下切齒澄發玖私姦勸穎殺玖穎乃誅之士庶莫不稱善及穎敗東海王越請為司空長史以迎大駕勳封南鄉侯遷建威將軍雍州刺史不之職時王敦謝鯤庾敳阮修皆為衍所親善號為四友而亦與澄狎又有光逸胡毋輔之等亦豫焉酣宴縱誕窮歡極娛惠帝末衍白越以澄為荊州刺史持節都督領南蠻校尉敦為青州衍因問以方略敦曰當臨事制變不可豫論澄辭義鋒出算略無方一坐嗟服澄將之鎮送者傾朝澄見樹上鵲巢便脫衣上樹探而弄之神氣蕭然傍若無人劉琨謂澄曰卿形雖散朗而內實動俠以此處世難得其死澄默然不答澄既至鎮日夜縱酒不親庶事雖寇戎急務亦不以在懷擢順陽人郭舒於寒悴之中以為別駕委以州府時京師危逼澄率衆軍將赴國難而飄風折其節柱會王如寇襄陽澄前鋒至宜城遣使詣山簡為如黨嚴嶷所獲嶷偽使人從襄陽來而問之曰襄陽拔未答云昨旦破城已獲山簡乃陰緩澄使令得亡去澄聞襄陽陷以為信然散衆而還既而恥之託糧運不贍委罪長史蔣俊而斬之竟不能進巴蜀流人散在荊湘者與土人忿爭遂殺縣令屯聚樂鄉澄使成都內史王機討之賊請降澄偽許之既而襲之於寵洲以其妻子為賞沈八千餘人於江中於是益梁流人四五萬家一時俱反推杜韜為主南破零桂東掠武昌敗王機于巴陵澄亦無憂懼之意但與機日夜縱酒投壺博戲數十局俱起殺富人李才取其家資以賜郭舒南平太守應詹驟諫不納於是上下離心內外怨叛澄望實雖損猶傲然自得後出軍擊杜韜次于作塘山簡參軍王沖叛于豫州自稱荊州刺史澄懼使杜蕤守江陵澄遷于孱陵尋奔沓中郭舒諫曰使君臨州雖無異政未失衆心今西收華容向義之兵足以擒此小醜奈何自棄澄不能從初澄命武陵諸郡同討杜韜天門太守扈瓌次于益陽武陵內史武察為其郡夷所害瓌以孤軍引還澄怒以杜曾代瓌夷袁遂瓌故吏也託為瓌報仇遂舉兵逐曾自稱平晉將軍澄使司馬毋丘邈討之為遂所敗會元帝徵澄為軍咨祭酒於是赴召時王敦為江州鎮豫章澄過詣敦澄夙有盛名出於敦右士庶莫不傾慕之兼勇力絶人素為敦所憚澄猶以舊意侮敦敦益忿怒請澄入宿陰欲殺之而澄左右有二十人持鐵馬鞭為衛澄手嘗捉玉枕以自防故敦未之得發後敦賜澄左右酒皆醉借玉枕觀之因下牀而謂澄曰何與杜韜通信澄曰事自可驗敦欲入內澄手引敦衣至于絶帶乃登于梁因罵敦曰行事如此殃將及焉敦令力士路戎扼殺之時年四十四載尸還其家劉琨聞澄之死歎曰澄自取之及敦平澄故吏佐著作郎桓稚上表理澄請加贈諡詔復澄本官諡曰憲長子詹早卒次子徽右軍司馬郭舒字稚行幼請其母從師歲餘便歸粗識大義鄉人少府范晷宗人武陵太守郭景咸稱舒當為後來之秀終成國器始為領軍校尉坐擅放司馬彪繫廷尉世多義之刺史夏侯含辟為西曹轉主簿含坐事舒自繫理含事得釋刺史宗岱命為治中喪母去職劉弘牧荊州引為治中弘卒舒率將士推弘子璠為主討逆賊郭勱滅之保全一州王澄聞其名引為別駕澄終日酣飲不以衆務在意舒常切諫之及天下大亂又勸澄修德養威保完州境澄以為亂自京都起非復一州所能匡禦雖不能從然重其忠亮荊土士人宗廞嘗因酒忤澄澄怒叱左右棒廞舒厲色謂左右曰使君過醉汝輩何敢妄動澄恚曰別駕狂邪誑言我醉因遣掐其鼻灸其眉頭舒跪而受之澄意少釋而廞遂得免澄之奔敗也以舒領南郡澄又欲將舒東下舒曰舒為萬里紀綱不能匡正令使君奔亡不忍渡江乃留屯沌口採湖澤以自給鄉人盜食舒牛事覺來謝舒曰卿飢所以食牛耳餘肉可共啖之世以此服其弘量舒少與杜曾厚曾嘗召之不往曾銜之至是澄又轉舒為順陽太守曾密遣兵襲舒遁逃得免王敦召為參軍轉從事中郎襄陽都督周訪卒敦遣舒監襄陽軍甘卓至乃還朝廷徵舒為右丞敦留不遣敦謀為逆舒諫不從使守武昌荊州別駕宗淡忌舒才能數譖之於王廙廙疑舒與甘卓同謀密以白敦敦不受高官督護繆坦嘗請武昌城西地為營太守樂凱言於敦曰百姓久買此地種菜自贍不宜奪之敦大怒曰王處仲不來江湖當有武昌地不而人云是我地邪凱懼不敢言舒曰公聽舒一言敦曰平子以卿病狂故掐鼻灸眉頭舊疢復發邪舒曰古之狂也直周昌汲黯朱雲不狂也昔堯立誹謗之木舜置敢諫之鼓然後事無枉縱公為勝堯舜邪乃逆折舒使不得言何與古人相遠敦曰卿欲何言舒曰繆坦可謂小人疑誤視聽奪人私地以強陵弱晏子稱君曰其可臣獻其否以成其可是以舒等不敢不言敦即使還地衆咸壯之敦重舒公亮給賜轉豐數詣其家表為梁州刺史病卒樂廣樂廣字彥輔南陽淯陽人也父方參魏征西將軍夏侯玄軍事廣時年八歲玄常見廣在路因呼與語還謂方曰向見廣神姿朗徹當為名士卿家雖貧可令專學必能興卿門戶也方早卒廣孤貧僑居山陽寒素為業人無知者性沖約有遠識寡嗜欲與物無競尤善談論每以約言析理以厭人之心其所不知默如也裴楷嘗引廣共談自夕申旦雅相欽挹歎曰我所不如也王戎為荊州刺史聞廣為夏侯玄所賞乃舉為秀才楷又薦廣於賈充遂辟太尉掾轉太子舍人尚書令衛瓘朝之耆舊逮與魏正始中諸名士談論見廣而奇之曰自昔諸賢既沒常恐微言將絶而今乃復聞斯言於君矣命諸子造焉曰此人之水鏡見之瑩然若披雲霧而覩青天也王衍自言與人語甚簡至及見廣便覺己之煩其為識者所歎美如此出補元城令遷中書侍郎轉太子中庶子纍遷侍中河南尹廣善清言而不長於筆將讓尹請潘嶽為表嶽曰當得君意廣乃作二百句語述己之志嶽因取次比便成名筆時人咸云若廣不假嶽之筆嶽不取廣之旨無以成斯美也嘗有親客久闊不復來廣問其故答曰前在坐蒙賜酒方欲飲見杯中有蛇意甚惡之既飲而疾于時河南聽事壁上有角漆畫作蛇廣意杯中蛇即角影也復置酒於前處謂客曰酒中復有所見不答曰所見如初廣乃告其所以客豁然意解沈痾頓愈衛玠總角時嘗問廣夢廣云是想玠曰神形所不接而夢豈是想邪廣曰因也玠思之經月不得遂以成疾廣聞故命駕為剖析之玠病即愈廣歎曰此賢胸中當必無膏肓之疾廣所在為政無當時功譽然每去職遺愛為人所思凡所論人必先稱其所長則所短不言而自見矣人有過先盡弘恕然後善惡自彰矣廣與王衍俱宅心事外名重於時故天下言風流者謂王樂為稱首焉少與弘農楊準相善準之二子曰喬曰髦皆知名於世準使先詣裴頠頠性弘方愛喬有高韻謂準曰喬當及卿髦少減也又使詣廣廣性清淳愛髦有神檢謂準曰喬自及卿然髦亦清出準笑曰我二兒之優劣乃裴樂之優劣也論者以為喬雖有高而神檢不足樂為得之矣是時王澄胡毋輔之等皆亦任放為達或至裸體者廣聞而笑曰名教內自有樂地何必乃爾其居才愛物動有理中皆此類也值世道多虞朝章紊亂清己中立任誠保素而已時人莫有見其際焉先是河南官舍多妖怪前尹多不敢處正寢廣居之不疑嘗外戶自閉左右皆驚廣獨自若顧見牆有孔使人掘牆得狸而殺之其怪亦絶愍懷太子之廢也詔故臣不得辭送衆官不勝憤歎皆冒禁拜辭司隸校尉滿奮敕河南中部收縛拜者送獄廣即便解遣衆人代廣危懼孫琰説賈謐曰前以太子罪惡有斯廢黜其臣不懼嚴詔冒罪而送今若繫之是彰太子之善不如釋去謐然其言廣故得不坐遷吏部尚書左僕射後東安王繇當為僕射轉廣為右僕射領吏部代王戎為尚書令始戎薦廣而終踐其位時人美之成都王穎廣之壻也及與長沙王乂遘難而廣既處朝望羣小讒謗之乂以問廣廣神色不變徐答曰廣豈以五男易一女乂猶以為疑廣竟以憂卒荀藩聞廣之不免也為之流涕三子凱肇謨凱字弘緒大司馬齊王掾參驃騎軍事肇字弘茂太傅東海王掾洛陽陷兄弟相攜南渡江謨字弘範征虜將軍吳郡內史史臣曰漢相清靜見機於曠務周史清虛不嫌於尸祿豈台揆之任有異於常班者歟濬沖善發談端夷甫仰希方外登槐庭之顯列顧漆園而高視彼既憑虛朝章已亂戎則取容於世旁委貨財衍則自保其身寧論宗稷及三方搆亂六戎藉手犬羊之侶鋒鏑如雲夷甫區區焉佞彼凶渠以求容貸穨牆之隕猶有禮也平子肆情傲物對鏡難堪終失厥生自貽伊敗且夫衣服表容圭璋範德聲移宮羽彩照山華布武有章立言成訓澄之箕踞不已甚矣若乃解衵登枝裸形捫鵲以此為達謂之高致輕薄是效風流詎及道睽將聖事乖跰指操情獨往自夭其生者焉昔晏嬰哭莊公之尸樂令解愍懷之客豈聞伯夷之風歟懦夫能立志者也贊曰晉家求士乃構仙臺陵雲切漢山叟知材濬沖居鼎談優務劣夷甫兩顧退求三穴神亂當年忠乖曩列平子陵侮多於用拙樂令披雲高天澄徹
