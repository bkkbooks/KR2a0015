body:
  text: 晉書卷二十二志第十二樂上夫性靈之表不知所以發於詠歌感動之端不知所以關於手足生於心者謂之道成於形者謂之用譬諸天地其猶影響百獸率舞而況於人乎美其和平而哀其喪亂以茲援律乃播其聲焉農瑟羲琴倕鍾和磬達靈成性象物昭功由此言之其來自遠殷氏不綱遺風餘孽淫奏既興雅章奔散英莖之制蓋已微矣孔子曰人能弘道非道弘人周始二南風兼六代昔黃帝作雲門堯作咸池舜作大韶禹作大夏殷作大濩周作大武所謂因前王之禮設俯仰之容和順積中英華發外書稱命夔典樂教胄子則周官所謂奏大呂歌黃鍾天貺來下人祇動色抑揚周監以弘雅音及褒艷興災平王逢亂禮廢親疏樂沈河海是以延陵季子聞歌小雅曰其周德之衰乎猶有先王之遺風焉而列壤稱孤各興吟詠魏文侯聆古樂而恐臥晉平公聽新聲而忘食先王之道漸以陵夷八方殊風九州異則秦氏并吞遂專刑憲至於絃歌詩頌干戚旄羽投諸煙火掃地無遺漢祖提劍寰中削平天下文匪躬於德化武有心於制作太后擯儒家之道大臣排賈氏之言搢紳先生所以長歎而子政仲舒猶不能已也炎漢中興明皇帝即位表圭景而陳清廟樹槐陰而疏璧流祀光武於明堂以配上帝召桓榮於太學袒而割牲濟濟焉皇皇焉有足觀者自斯厥後禮樂彌殷永平三年官之司樂改名大豫式揚典禮旁求圖讖道鄰雅頌事邇中和其有五方之樂者則所謂大樂九變天神可得而禮也其有宗廟之樂者則所謂肅雍和鳴先祖是聽者也其有社稷之樂者則所謂琴瑟擊鼓以迓田祖者也其有辟雍之樂者則所謂移風易俗莫善於樂者也其有黃門之樂者則所謂宴樂羣臣蹲蹲舞我者也其有短簫之樂者則所謂王師大捷令軍中凱歌者也魏武挾天子而令諸侯思一戎而匡九服時逢吞滅憲章咸蕩及削平劉表始獲杜夔揚鼙總干式遵前記三祖紛綸咸工篇什聲歌雖有損益愛玩在乎雕章是以王粲等各造新詩抽其藻思吟詠神靈贊揚來饗武皇帝採漢魏之遺範覽景文之垂則鼎鼐唯新前音不改泰始九年光祿大夫荀勖始作古尺以調聲韵仍以張華等所制高文陳諸下管永嘉之亂伶官既減曲臺宣榭咸變汙萊雖復象舞歌工自胡歸晉至於孤竹之管雲和之瑟空桑之琴泗濱之磬其能備者百不一焉夫人受天地之靈蘊菁華之氣剛柔遞用哀樂分情經春陽而自喜遇秋雕而不悅遊乎金石之端出乎管絃之外因物遷逝乘流不反是以楚王升輕軒於彭蠡漢順聽鳴鳥於樊衢聖人功成作樂化平裁曲乃揚節奏以暢中和飾其歡欣止於哀思者也凡樂之道五聲八音六律十二管為之綱紀云五聲宮為君宮之為言中也中和之道無往而不理焉商為臣商之為言強也謂金性之堅強也角為民角之為言觸也謂象諸陽氣觸物而生也徵為事徵之為言止也言物盛則止也羽為物羽之為言舒也言陽氣將復萬物孳育而舒生也古人有言曰禮樂不可斯須去身化上遷善有如不及是以聞其宮聲使人溫良而寬大聞其商聲使人方廉而好義聞其角聲使人惻隱而仁愛聞其徵聲使人樂養而好施聞其羽聲使人恭儉而好禮八音八方之風也乾之音石其風不周坎之音革其風廣莫艮之音匏其風融震之音竹其風明庶巽之音木其風清明離之音絲其風景坤之音土其風涼兌之音金其風閶闔陽六為律謂黃鍾太蔟姑洗蕤賓夷則無射陰六為呂謂大呂應鍾南呂林鍾仲呂夾鍾凡有十二以配十二辰焉律之為言法也言陽氣施生各有法也呂之為言助也所以助成陽功也正月之辰謂之寅寅者津也謂生物之津塗也二月之辰名為卯卯者茂也言陽氣生而孳茂也三月之辰名為辰辰者震也謂時物盡震動而長也四月之辰謂為巳巳者起也物至此時畢盡而起也五月之辰謂為午午者長也大也言物皆長大也六月之辰謂之未未者味也言時萬物向成有滋味也七月之辰謂為申申者身也言時萬物身體皆成就也八月之辰謂為酉酉者緧也謂時物皆緧縮也九月之辰謂為戌戌者滅也謂時物皆衰滅也十月之辰謂為亥亥者劾也言時陰氣劾殺萬物也十一月之辰謂為子子者孳也謂陽氣至此更孳生也十二月之辰謂為丑丑者紐也言終始之際以紐結為名也十一月之管謂之黃鍾黃者陰陽之中色也天有六氣地有五才而天地數畢焉或曰冬至德氣為土土色黃故曰黃鍾正月之管謂為太蔟蔟者蔟也謂萬物隨於陽氣太蔟而生也三月之管名為姑洗姑洗者姑枯也洗濯也謂物生新潔洗除其枯改柯易葉也五月之管名為蕤賓葳蕤垂下貌也賓敬也謂時陽氣下降陰氣始起相賓敬也七月之管名為夷則夷平也則法也謂萬物將成平均皆有法則也九月之管名為無射射者出也言時陽氣上升萬物收藏無復出也十二月之管名為大呂呂者助也謂陽氣方之陰氣助也十月之管名為應鍾應者和也謂歲功皆成應和陽功收而聚之也八月之管名為南呂南者任也謂時物皆秀有懷任之象也六月之管名為林鍾林者茂也謂時物茂盛於野也四月之管名為仲呂者呂助也謂陽氣盛長陰助成功也二月之管名為夾鍾者夾佐也謂時物尚未盡出陰德佐陽而出物也漢自東京大亂絶無金石之樂樂章亡缺不可復知及魏武平荊州獲漢雅樂郎河南杜夔能識舊法以為軍謀祭酒使創定雅樂時又有散騎侍郎鄧靜尹商善訓雅樂歌師尹胡能歌宗廟郊祀之曲舞師馮肅服養曉知先代諸舞夔悉總領之遠詳經籍近採故事考會古樂始設軒懸鍾磬而黃初中柴玉左延年之徒復以新聲被寵改其聲韵及武帝受命之初百度草創泰始二年詔郊祀明堂禮樂權用魏儀遵周室肇稱殷禮之義但改樂章而已使傅玄為之詞云祀天地五郊夕牲歌天命有晉穆穆明明我其夙夜祗事上靈常于時假迄用其成於薦玄牡進夕其牲崇德作樂神祇是聽祀天地五郊迎送神歌宣文蒸哉日靖四方永言保之夙夜匪康光天之命上帝是皇嘉樂殷薦靈祚景祥神祇降假享福無疆饗天地五郊歌天祚有晉其命惟新受終于魏奄有黎民燕及皇天懷和百神丕顯遺烈之德之純享其玄牡式用肇禋神祇來格福祿是臻時邁其猶昊天子之祐享有晉肇庶戴之畏天之威敬授人時丕顯丕承於猶繹思皇極斯建庶績咸熙庶幾夙夜惟晉之祺宣文惟后克配彼天撫寧四海保有康年於乎緝熙肆用靖民爰立典制爰修禮紀作民之極莫匪資始克昌厥後永言保之天地郊明堂夕牲歌皇矣有晉時邁其德受終于天光濟萬國萬國既光神定厥祥虔于郊祀祗事上皇祗事上皇百福是臻巍巍祖考克配彼天嘉牲匪歆德馨惟饗受天之祐神化四方天地郊明堂降神歌於赫大晉應天景祥二帝邁德宣此重光我皇受命奄有萬方郊祀配享禮樂孔章神祇嘉享祖考是皇克昌厥後保祚無疆天郊饗神歌整泰壇禮皇神精氣感百靈賓蘊朱火燎芳薪紫煙遊冠青雲神之體靡象形曠無方幽以清神之來光景昭聽無聞視無兆神之至舉歆歆靈爽協動余心神之坐同歡娛澤雲翔化風舒嘉樂奏文中聲八音諧神是聽咸潔齊並芬芳亨牷牲享玉觴神悅饗歆禋祀祐大晉降繁祉作京邑廣四海保天年窮地紀地郊饗神歌整泰折俟皇祇衆神感羣靈儀陰祀設吉禮施夜將極時未移祇之體無形象潛泰幽洞忽荒祇之出薆若有靈無遠天下母祇之來遺光景昭若存終冥冥祇之至舉欣欣舞象德歌成文祇既坐同歡豫澤雨施化雲布樂八變聲教敷物咸亨祇是娛齊既潔侍者肅玉觴進咸穆穆饗嘉豢歆德馨祚有晉暨羣生溢九壤格天庭保萬壽延億齡明堂饗神歌經始明堂享祀匪懈於皇烈考光配上帝赫赫上帝既高既崇聖考是配明德顯融率土敬職萬方來祭常于時假保祚永世祠廟夕牲歌我夕我牲猗歟敬止嘉豢孔時供茲享祀神鑒厥誠博碩斯歆祖考降饗以虞孝孫之心祠廟迎送神歌嗚呼悠哉日監在茲以時享祀神明降之神明斯降既祐饗之祚我無疆受天之祜赫赫太上巍巍聖祖明明烈考丕承繼序祠征西將軍登歌經始宗廟神明戾止申錫無疆祗承享祀假哉皇祖綏豫孫子燕及後昆錫茲繁祉祠豫章府君登歌嘉樂肆筵薦祀在堂皇皇宗廟乃祖乃皇濟濟辟公相豫蒸嘗享祀不忒降福穰穰祠潁川府君登歌於邈先后實司于天顯矣皇祖帝祉肇臻本枝克昌資始開元惠我無疆享祚永年祠京兆府君登歌於惟曾皇顯顯令德高明清亮匪競柔克保命祐基命惟則篤生聖祖光濟四國祠宣皇帝登歌於鑠皇祖聖德欽明勤施四方夙夜敬止載敷文教載揚武烈匡定社稷龔行天罰經始大業造創帝基畏天之命于時保之祠景皇帝登歌執競景皇克明克哲旁作穆穆惟祗惟畏纂宣之緒耆定厥功登此雋糾彼羣凶業業在位帝既勤止惟天之命於穆不已祠文皇帝登歌於皇時晉允文文皇聰明睿智聖敬神武萬機莫綜皇斯清之蛇豕放命皇斯平之柔遠能邇簡授英賢創業垂統勳格皇天祠廟饗神歌二篇曰晉是常享祀時序宗廟致敬禮樂具舉惟其來祭普天率土犧樽既奠清酤既載亦有和羹薦羞斯備蒸蒸永慕感時興思登歌奏舞神樂其和祖考來格祐我邦家溥天之下罔不休嘉肅肅在位濟濟臣工四海來格禮儀有容鍾鼓振管絃理舞開元歌永始神胥樂兮肅肅在位臣工濟濟小大咸敬上下有禮理管絃振鼓鍾舞象德歌詠功神胥樂兮肅肅在位有來雍雍穆穆天子相維辟公禮有儀樂有則舞象功歌詠德神胥樂兮杜夔傳舊雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀四曰文王皆古聲辭及太和中左延年改夔騶虞伐檀文王三曲更自作聲節其名雖存而聲實異唯因夔鹿鳴全不改易每正旦大會太尉奉璧羣后行禮東廂雅樂常作者是也後又改三篇之行禮詩第一曰於赫篇詠武帝聲節與古鹿鳴同第二曰巍巍篇詠文帝用延年所改騶虞聲第三曰洋洋篇詠明帝用延年所改文王聲第四曰復用鹿鳴鹿鳴之聲重用而除古伐檀及晉初食舉亦用鹿鳴至泰始五年尚書奏使太僕傅玄中書監荀勖黃門侍郎張華各造正旦行禮及王公上壽酒食舉樂歌詩荀勖云魏氏行禮食舉再取周詩鹿鳴以為樂章又鹿鳴以宴嘉賓無取於朝考之舊聞未知所應勖乃除鹿鳴舊歌更作行禮詩四篇先陳三朝朝宗之義又為正旦大會王公上壽歌詩并食舉樂歌詩合十三篇又以魏氏歌詩或二言或三言或四言或五言與古詩不類以問司律中郎將陳頎頎曰被之金石未必皆當故勖造晉歌皆為四言唯王公上壽酒一篇為三言五言焉張華以為魏上壽食舉詩及漢氏所施用其文句長短不齊未皆合古蓋以依詠弦節本有因循而識樂知音足以制聲度曲法用率非凡近之所能改二代三京襲而不變雖詩章辭異興廢隨時至其韵逗留曲折皆繫於舊有由然也是以一皆因就不敢有所改易此則華勖所明異旨也時詔又使中書侍郎成公綏亦作焉今並採列之云四廂樂歌正旦大會行禮歌成公綏穆穆天子光臨萬國多士盈朝莫匪俊德流化罔極王猷允塞嘉會置酒嘉賓充庭羽旄曜宸極鐘鼓振泰清百辟朝三朝彧彧明儀形濟濟鏘鏘金聲玉振禮樂具宴嘉賓眉壽祚聖皇景福惟日新羣后戾止有來雍雍獻酬納贄崇此禮容豐羞萬俎旨酒千鍾嘉樂盡宴樂福祿咸攸同樂哉天下安寧道化行風俗清簫韶作詠九成年豐穰世泰平至治哉樂無窮元首聰明股肱忠樹豐澤揚清風嘉瑞出靈應彰麒麟見鳳皇翔醴泉湧流中唐嘉禾生穗盈箱降繁祉祚聖皇承天位統萬國受命應期授聖德四世重光宣開洪業景克昌文欽明德彌彰肇啓晉邦流祚無疆泰始建元鳳皇龍興龍興伊何享祚萬乘奄有八荒化育黎蒸圖書既煥金石有徵德光大道熙隆被四表格皇穹奕奕萬嗣明明顯融高朗令終保茲永祚與天比崇聖皇君四海順人應天期三葉合重光泰始開洪基明曜參日月功化侔四時宇宙清且泰黎庶咸雍熙善哉雍熙惟天降命翼仁祐聖於穆三皇載德彌盛總齊琁璣光統七政百揆時序化若神聖四海同風興至仁濟民育物擬陶均擬陶均垂惠潤皇皇羣賢峨峨英雋德化宣芬芳播來胤播來胤垂後昆清廟何穆穆皇極闢四門皇極闢四門萬機無不綜亹亹翼翼樂不及荒饑不遑食大禮既行樂無極登崑崙上層城乘飛龍升泰清冠日月佩五星揚虹霓建篲旌披慶雲蔭繁榮覽八極遊天庭順天地和陰陽序四時曜三光張帝網正皇綱播仁風流惠康邁洪化振靈威懷萬方納九夷朝閶闔宴紫微建五旗羅鍾虡列四懸奏韶武鏗金石揚旌羽縱八佾巴渝舞詠雅頌和律呂于胥樂樂聖主化蕩蕩清風泄總英雄御俊傑開宇宙掃四裔光緝熙美聖哲超百代揚休烈流景祚顯萬世皇皇顯祖翼世佐時寧濟六合受命應期神武鷹揚大化咸熙廓開皇衢用成帝基光光景皇無競惟烈匡時拯俗休功蓋世宇宙既康九域有截天命降監啓祚明哲穆穆烈考克明克雋實天生德誕應靈運肇建帝業開國有晉載德奕世垂慶洪胤明明聖帝龍飛在天與靈合契通德幽玄仰化青雲俯育重川受靈之祐於萬斯年正旦大會王公上壽酒歌荀勖踐元辰延顯融獻羽觴祈令終我皇壽而隆我皇茂而嵩本枝奮百世休祚鍾聖躬食舉樂東西廂歌荀勖煌煌七曜重明交暢我有嘉賓是應是貺邦政既圖接以大饗人之好我式遵德讓賓之初筵藹藹濟濟既朝乃宴以洽百禮頒以位或庭或陛登儐台叟亦有兄弟胥子陪寮憲茲度楷觀頤養正降福孔偕昔我三后大業是維今我聖皇焜耀前暉奕世重規明照九畿思輯用光時罔有違陟禹之跡莫不來威天被顯祿福履是綏赫矣太祖克廣明德廓開宇宙正世立則變化不經民無瑕慝創業垂統兆我晉國烈文伯考時維帝景夷險平亂威而不猛御衡不迷皇塗煥景七德咸宣其寧惟永猗歟盛歟先皇聖文則天作孚大哉為君慎徽五典帝載是勤文武發揮茂建嘉勳修己濟治民用寧殷懷遠燭幽玄教氤氳善世不伐服事三分德博化隆道昌無垠隆化洋洋帝命溥將登我晉道越惟聖王龍飛革運臨燾八荒睿哲欽明配蹤虞唐封建厥福駿發其祥三朝習吉終然允臧其臧維何總彼萬方元侯列辟四嶽藩王時見世享率茲有常旅揖在庭嘉客在堂宋衛既臻陳留山陽有賓有使觀國之光貢賢納計獻璧奉璋保祐命之申錫無疆振鷺于飛鴻漸其翼京邑穆穆四方是式無競維人王綱允敕君子來朝言觀其極廙廙大君民之攸暨信理天工惠康不匱將遠不仁訓以醇粹幽明有倫俊在位九族既睦庶邦順比開元布憲四海鱗萃協時正統殊塗同致厚德載物靈心隆貴敷奏讜言納以無諱樹之典象誨之義類上教如風下應如卉一人有慶羣萌以遂我后宴喜令問不墜既宴既喜翕是萬邦禮儀卒度物有其容晢晢庭燎喤喤鼓鐘笙磬詠德萬舞象功八音克諧俗易化從其和如樂庶品時雍時雍斌斌六合同塵往我祖宣威靜殊鄰首定荊楚遂平燕秦亹亹文皇邁德流仁爰造草昧應乾順民靈瑞告符休徵響震天地弗違以和神人既禽庸蜀吳會是賓肅慎率職楛矢來陳韓濊進樂宮徵清鈞西旅獻獒扶南效珍蠻裔重譯玄齒文身我皇撫之景命惟新愔愔嘉會有聞無聲清酤既奠籩豆既升禮充樂備簫韶九成愷樂飲酒酣而不盈率土歡豫邦國以寧王猷允塞萬載無傾冬至初歲小會歌張華日月不留四氣回周節慶代序萬國同休庶尹羣后奉壽升朝我有壽禮式宴百僚繁肴綺錯旨酒泉渟笙鏞和奏磬管流聲上隆其愛下盡其心宣其壅滯訓之德音乃宣乃訓配享交泰永載仁風長撫無外宴會歌張華亹亹我皇配天垂光留精日昃經覽無方聽朝有暇延命衆臣冠蓋雲集樽俎星陳肴蒸多品八珍代變羽爵無算究樂極宴歌者流聲舞者投袂動容有節絲竹並設宣揚四體繁手趣摯歡足發和酣不忘禮好樂無荒翼翼濟濟命將出征歌張華重華隆帝道戎蠻或不賓徐夷興有周鬼方亦違殷今在盛明世寇虐動四垠豺狼染牙爪羣生號穹旻元帥統方夏出車撫涼秦衆貞必以律臧否實在人威信加殊類疏狄思自親單醪豈有味挾纊感至仁武功尚止戈七德美安民遠跡由斯舉永世無風塵勞還師歌張華玁狁背天德構亂擾邦畿戎車震朔野羣帥贊皇威將士齊心旅感義忘其私積勢如鞹弩赴節如發機囂聲動山谷金光曜素暉揮戈陵徑敵武步蹈橫尸鯨鯢皆授首北土永清夷昔往冒隆暑今來白雪霏征夫信勤瘁自古詠采薇收榮於舍爵燕喜在凱歸中宮所歌張華先王統大業玄化漸八維儀刑孚萬邦內訓隆壼闈皇英垂帝典大雅詠三妃執德宣隆教正位理厥機含章體柔順帥禮蹈謙祗螽斯弘慈惠樛木逮幽微徽音穆清風高義邈不追遺榮參日月百世仰餘暉宗親會歌張華族燕明禮順餟食序親親骨肉散不殊昆弟豈他人本枝篤同慶棠棣著先民於皇聖明后天覆弘且仁降禮崇親戚旁施協族姻式宴盡酣娛飲御備羞珍和樂既宣洽上下同歡欣德教加四海敦睦被無垠泰始九年光祿大夫荀勖以杜夔所制律呂校太樂總章鼓吹八音與律呂乖錯乃制古尺作新律呂以調聲韵事具律曆志律成遂班下太常使太樂總章鼓吹清商施用勖遂典知樂事啓朝士解音律者共掌之使郭夏宋識等造正德大豫二舞其樂章亦張華之所作云正德舞歌張華曰皇上天玄鑒惟光神器周回五德代章祚命于晉世有哲王弘濟區夏陶甄萬方大明垂曜旁燭無疆蚩蚩庶類風德永康皇道惟清禮樂斯經金石在懸萬舞在庭象容表慶協律被聲軼武超濩取節六英同進退讓化漸無形大和宣洽通於幽冥大豫舞歌張華惟天之命符運有歸赫赫大晉三后重暉繼明紹世光撫九圍我皇紹期遂在琁璣羣生屬命奄有庶邦慎徽五典玄教遐通萬方同軌率土咸雍爰制大豫宣德舞功醇化既穆王道協隆仁及草木惠加昆蟲億兆夷人悅仰皇風丕顯大業永世彌崇荀勖又作新律笛十二枚以調律呂正雅樂正會殿庭作之自謂宮商克諧然論者猶謂勖暗解時阮咸妙達八音論者謂之神解咸常心譏勖新律聲高以為高近哀思不合中和每公會樂作勖意咸謂之不調以為異己乃出咸為始平相後有田父耕於野得周時玉尺勖以校己所治鐘鼓金石絲竹皆短校一米於此伏咸之妙復徵咸歸勖既以新律造二舞次更修正鐘聲會勖薨未竟其業元康三年詔其子藩修定金石以施郊廟尋值喪亂莫有記之者漢高祖自蜀漢將定三秦閬中范因率賨人以從帝為前鋒及定秦中封因為閬中侯復賨人七姓其俗喜舞高祖樂其猛鋭數觀其舞後使樂人習之閬中有渝水因其所居故名曰巴渝舞舞曲有矛渝本歌曲安弩渝本歌曲安臺本歌曲行辭本歌曲總四篇其辭既古莫能曉其句度魏初乃使軍謀祭酒王粲改創其詞粲問巴渝帥李管种玉歌曲意試使歌聽之以考校歌曲而為之改為矛渝新福歌曲弩渝新福歌曲安臺新福歌曲行辭新福歌曲行辭以述魏德黃初三年又改巴渝舞曰昭武舞至景初元年尚書奏考覽三代禮樂遺曲據功象德奏作武始咸熙章斌三舞皆執羽籥及晉又改昭武舞曰宣武舞羽籥舞曰宣文舞咸寧元年詔定祖宗之號而廟樂乃停宣武宣文二舞而同用荀勖所使郭夏宋識等所造正德大豫二舞云
