body:
  text: 晉書卷八十一列傳第五十一王遜王遜字邵伯魏興人也仕郡察孝廉為吏部令史轉殿中將軍纍遷上洛太守私牛馬在郡生駒犢者秩滿悉以付官云是郡中所産也轉魏興太守惠帝末西南夷叛寧州刺史李毅卒城中百餘人奉毅女固守經年永嘉四年治中毛孟詣京師求刺史不見省孟固陳曰君亡親喪幽閉窮城萬里訴哀不垂愍救既慚包胥無哭秦之感又愧梁妻無崩城之驗存不若亡乞賜臣死朝廷憐之乃以遜為南夷校尉寧州刺史使於郡便之鎮遜與孟俱行道遇寇賊踰年乃至外逼李雄內有夷寇吏士散沒城邑丘墟遜披荒糾厲收聚離散專杖威刑鞭撻殊俗遜未到州遙舉董聯為秀才建寧功曹周悅謂聯非才不下版檄遜既到收悅殺之悅弟潛謀殺遜以前建寧太守趙混子濤代為刺史事覺並誅之又誅豪右不奉法度者數十家征伐諸夷俘馘千計獲馬及牛羊數萬餘於是莫不振服威行寧土又遣子澄奉表勸進於元帝帝嘉之纍加散騎常侍安南將軍假節校尉刺史如故賜爵褒中縣公遜以地勢形便上分牂柯為平夷郡分朱提為南廣郡分建寧為夜郎郡分永昌為梁水郡又改益州郡為晉寧郡事皆施行先是越巂太守李釗為李雄所執自蜀逃歸遜復以釗為越巂太守李雄遣李驤任回攻釗釗自南秦與漢嘉太守王載共距之戰于溫水釗敗績載遂以二郡附雄後驤等又渡瀘水寇寧州遜使將軍姚崇爨琛距之戰于堂狼大破驤等崇追至瀘水透水死者千餘人崇以道遠不敢渡水遜以崇不窮追也怒囚羣帥執崇鞭之怒甚髮上衝冠冠為之裂夜中卒遜在州十四年州人復立遜中子堅行州府事詔除堅為南夷校尉寧州刺史假節諡遜曰壯陶侃懼堅不能抗對蜀人太寧末表以零陵太守尹奉為寧州徵堅還京病卒兄澄襲爵歷魏興太守散騎常侍蔡豹蔡豹字士宣陳留圉城人高祖質漢衛尉左中郎將雍之叔父也祖睦魏尚書父宏陰平太守豹有氣幹歷河南丞長樂清河太守避亂南渡元帝以為振武將軍臨淮太守遷建威將軍徐州刺史初祖逖為徐州豹為司馬素易豹至是逖為豫州而豹為徐州俱受征討之寄逖甚愧之是時太山太守徐龕與彭城內史劉遐同討反賊周撫於寒山龕將于藥斬撫及論功而遐先之龕怒以太山叛自號安北將軍兗州刺史攻破東莞太守侯史旄而據其塢石季龍伐之龕懼求降元帝許焉既而復叛歸石勒勒遣其將王伏都張景等數百騎助龕詔征虜將軍羊鑒武威將軍侯禮臨淮太守劉遐鮮卑段文鴦等與豹共討之諸將畏磱頓兵下邳不敢前豹欲進軍鑒固不許龕遣使請救於勒勒辭以外難而多求於龕又王伏都等淫其室龕知勒不救且患伏都等縱暴乃殺之復求降元帝惡其反覆不納敕豹鑒以時進討鑒及劉遐等並疑憚不相聽從互有表聞故豹久不得進尚書令刁協奏曰臣等伏思淮北征軍已失不速今方盛暑冒涉山險山人便弓弩習土俗一人守厄百夫不當且運漕至難一朝糧乏非復智力所能防禦也書云寧致人不致於人宜頓兵所在深壁固壘至秋不了乃進大軍詔曰知難而退誠合兵家之言然小賊雖狡猾故成擒耳未戰而退先自摧衄亦古之所忌且邵存已據賊壘威勢既振不可退一步也於是遣治書御史郝嘏為行臺催攝令進討豹欲徑進鑒執不聽協又奏免鑒官委豹為前鋒以鑒兵配之降號折衝將軍以責後效豹進據卞城欲以逼龕時石季龍屯巨平將攻豹豹夜遁退守下邳徐龕襲取豹輜重於檀丘將軍留寵陸黨力戰死之豹既敗將歸謝罪北中郎王舒止之曰胡寇方至使君且當攝職為百姓障扞賊退謝罪不晚也豹從之元帝聞豹退使收之使者至王舒夜以兵圍豹豹以為他難率麾下擊之聞有詔乃止舒執豹送至建康斬之尸于市三日時年五十二豹在徐土內撫將士外懷諸衆甚得遠近情聞其死多悼惜之無子兄子裔字元子散騎常侍兗州刺史高陽鄉侯殷浩北伐使裔率衆出彭城卒於軍羊鑒羊鑒字景期太山人也父濟胸奴中郎將兄煒歷太僕兗徐二州刺史鑒為東陽太守纍遷太子左衛率時徐龕反叛司徒王導以鑒是龕州里冠族必能制之請遣北討鑒深辭才非將帥太尉郗鑒亦表謂鑒非才不宜妄使導不納強啓授以征討都督果敗績導以舉鑒非才請自貶帝不從有司正鑒斬刑元帝詔以鑒太妃外屬特免死除名久之為少府及王敦反明帝以鑒敦舅又素相親黨微被嫌責及成帝即位豫討蘇峻以功封豐城縣侯徙光祿勳卒劉胤劉胤字承胤東萊掖人漢齊悼惠王肥之後也美姿容善自任遇交結時豪名著海岱間士咸慕之舉賢良辟司空掾並不就會天下大亂攜母欲避地遼東路經幽州刺史王浚留胤表為渤海太守浚敗轉依冀州刺史邵續續徒衆寡弱謀降於石勒胤言於續曰夫田單包胥齊楚之小吏耳猶能存已滅之邦全喪敗之國今將軍杖精鋭之衆居全勝之城如何墜將登之功於一蕢委忠信之人於豺狼乎且項羽袁紹非不強也高祖縞冠人應如響曹公奉帝而諸侯綏穆何者蓋逆順之理殊自然之數定也況夷戎醜類屯結無賴雖有犬羊之盛終有庖宰之患而欲託根結援無乃殆哉續曰若如君言計將安出胤曰琅邪王以聖德欽明創基江左中興之隆可企踵而待今為將軍計者莫若抗大順以激義士之心奉忠正以厲軍人之志夫機事在密時至難違存亡廢興在此舉矣續從之乃殺異議者數人遣使江南朝廷嘉之胤仍求自行續厚遣之既至元帝命為丞相參軍纍遷尚書吏部郎胤聞石季龍攻厭次言於元帝曰北方方鎮皆沒惟餘邵續而已如使君為季龍所制孤義士之心阻歸本之路愚謂宜存救援元帝將遣救之會續已沒而止王敦素與胤交甚欽貴之請為右司馬胤知敦有不臣心枕疾不視事以是忤敦意出為豫章太守辭以㸂疾詔就家授印綬郡人莫鴻南土豪族因亂殺本縣令橫恣無道百姓患之胤至誅鴻及諸豪右界內肅然咸和初為平南軍司加散騎常侍蘇峻作亂溫嶠率衆而下留胤等守湓口事平以勳賜爵豐城子俄而代嶠為平南將軍都督江州諸軍事領江州刺史假節胤位任轉高矜豪日甚縱酒耽樂不恤政事大殖財貨商販百萬初胤之代嶠也遠近皆謂非選陶侃郗鑒咸云胤非方伯才朝廷不從或問王悅曰今大難之後綱紀弛頓自江陵至于建康三千餘里流人萬計布在江州江州國之南藩要害之地而胤以侈之性臥而對之不有外變必有內患悅曰聞溫平南語家公云連得惡夢思見代者尋云可用劉胤此乃溫意非家公也是時朝廷空罄百官無祿惟資江州運漕而胤商旅繼路以私廢公有司奏免胤官書始下而胤為郭默所害年四十九子赤松嗣尚南平長公主位至黃門郎義興太守桓宣族子伊桓宣譙國銍人也祖詡義陽太守父弼冠軍長史宣開濟篤素為元帝丞相舍人時塢主張平自稱豫州刺史樊雅自號譙郡太守各據一城衆數千人帝以宣信厚又與平雅同州里轉宣為參軍使就平雅平雅遣軍主簿隨宣詣丞相府受節度帝皆加四品將軍即其所部使扦禦北方南中郎將王含請宣為參軍頃之豫州刺史祖逖出屯蘆洲遣參軍殷詣平雅意輕平視其屋云當持作馬廄見大鑊欲鑄作鐵器平曰此是帝王大鑊天下定後方當用之奈何打破曰卿能保頭不而惜大鑊邪平大怒於坐斬阻兵固守歲餘逖攻平殺之而雅據譙城逖以力弱求助於含含遣宣領兵五百助逖逖謂宣曰卿先已說平雅信義大著於彼今復為我說雅雅若降者方相擢用不但免死而已宣復單馬從兩人詣雅曰祖逖方欲平蕩二寇每倚卿為援前殷輕薄非豫州意今若和解則忠勳可立富貴可保若猶固執東府赫然更遣猛將以卿烏合之衆憑阻窮城強賊伺其北國家攻其南萬無一全也願善量之雅與宣置酒結友遣子隨宣詣逖少日雅便自詣逖逖遣雅還撫其衆雅僉謂前數罵辱懼罪不敢降雅復閉城自守逖往攻之復遣宣入說雅雅即斬異己者遂出降未幾石勒別將圍譙城含又遣宣率衆救逖未至而賊退逖留宣討諸未服皆破之遷譙國內史祖約之棄譙城也宣以箋諫不從由是石勒遂有陳留及約與蘇峻同反宣謂祖智曰今強胡未滅將勠力以討之而與峻俱反此安得久乎使君若欲為雄霸何不助國討峻威名自舉智等不能用宣欲諫約遣其子戎白約求入約知宣必諫不聽宣遂距約不與之同邵陵人陳光率部落數百家降宣宣皆慰撫之約還歷陽宣將數千家欲南投尋陽營於馬頭山值祖煥欲襲湓口陶侃使毛寶救之煥遣衆攻宣宣使戎求救於寶寶擊煥破之宣因投溫嶠嶠以戎為參軍賊平宣居於武昌戎復為劉胤參軍郭默害胤復以戎為參軍陶侃討默默遣戎求救於宣宣僞許之西陽太守郭嶽武昌太守劉詡皆疑宣與默同豫州西曹王隨曰宣尚背祖約何緣同郭默邪嶽詡乃遣隨詣宣以觀之隨謂宣曰明府心雖不爾無以自明惟有以戎付隨耳宣乃遣戎與隨俱迎陶侃辟戎為掾上宣為武昌太守尋遷監沔中軍事南中郎將江夏相石勒荊州刺史郭敬戍襄陽陶侃使其子平西參軍斌與宣俱攻樊城拔之竟陵太守李陽又破新野敬懼遁走宣與陽遂平襄陽侃使宣鎮之以其淮南部曲立義成郡宣招懷初附勸課農桑簡刑罰略威儀或載鉏耒於軺軒或親藝穫於隴畝十餘年間石季龍再遣騎攻之宣能得衆心每以寡弱距守論者以為次於祖逖周訪侃方欲使宣北事中原會侃薨後庾亮為荊州將謀北伐以宣為都督沔北前鋒征討軍事平北將軍司州刺史假節鎮襄陽季龍使騎七千渡沔攻之亮遣司馬王愆期輔國將軍毛寶救宣賊三面為地窟攻城宣募精勇出其不意殺傷數百多獲鎧馬賊解圍退走久之宣遣步騎收南陽諸郡百姓沒賊者八千餘人以歸庾翼代亮欲傾國北討更以宣為都督司梁雍三州荊州之南陽襄陽新野南鄉四郡軍事梁州刺史持節將軍如故以前後功封竟陵縣男宣久在襄陽綏撫僑舊甚有稱績庾翼遷鎮襄陽令宣進伐石季龍將李羆軍次丹水為賊所敗翼怒貶宣為建威將軍使移戍峴山宣望實俱喪兼以老疾時南蠻校尉王愆期守江陵以疾求代翼以宣為鎮南將軍南郡太守代愆期宣不得志未之官發憤卒追贈鎮南將軍戎官至新野太守伊字叔夏父景有當世才幹仕至侍中丹楊尹中領軍護軍將軍長社侯伊有武幹標悟簡率為王濛劉惔所知頻參諸府軍事纍遷大司馬參軍時苻堅強盛邊鄙多虞朝議選能距捍疆埸者乃授伊淮南太守以綏御有方進督豫州之十二郡揚州之江西五郡軍事建威將軍歷陽太守淮南如故與謝玄共破賊別將王鑒張蚝等以功封宣城縣子又進都督豫州諸軍事西中郎將豫州刺史及苻堅南寇伊與冠軍將軍謝玄輔國將軍謝琰俱破堅於肥水以功封永修縣侯進號右軍將軍賜錢百萬袍表千端伊性謙素雖有大功而始終不替善音樂盡一時之妙為江左第一有蔡雍柯亭笛常自吹之王徽之赴召京師泊舟青溪側素不與徽之相識伊於岸上過船中客稱伊小字曰此桓野王也徽之便令人謂伊曰聞君善吹笛試為我一奏伊是時已貴顯素聞徽之名便下車踞胡牀為作三調弄畢便上車去客主不交一言時謝安女壻王國寶專利無檢行安惡其為人每抑制之及孝武末年嗜酒好內而會稽王道子昏醟尤甚惟狎昵諂邪於是國寶讒諛之計稍行於主相之間而好利險詖之徒以安功名盛極而構會之嫌隙遂成帝召伊飲宴安侍坐帝命伊吹笛伊神色無忤即吹為一弄乃放笛云臣於箏分乃不及笛然自足以韵合歌管請以箏歌并請一吹笛人帝善其調達乃敕御妓奏笛伊又云御府人於臣必自不合臣有一奴善相便串帝彌賞其放率乃許召之奴既吹笛伊便撫箏而歌怨詩曰為君既不易為臣良獨難忠信事不顯乃有見疑患周旦佐文武金縢功不刊推心輔王政二叔反流言聲節慷慨俯仰可觀安泣下沾襟乃越席而就之捋其鬚曰使君於此不凡帝甚有愧色伊在州十年綏撫荒雜甚得物情桓沖卒遷都督江州荊州十郡豫州四郡軍事江州刺史將軍如故假節伊到鎮以邊境無虞宜以寬恤為務乃上疏以江州虛耗加連歲不登今餘戶有五萬六千宜并合小縣除諸郡逋米移州還鎮豫章詔令移州尋陽其餘皆聽之伊隨宜拯撫百姓賴焉在任纍年徵拜護軍將軍以右軍府千人自隨配護軍府卒官贈右將軍加散騎常侍諡曰烈初伊有馬步鎧六百領豫為表令死乃上之表曰臣過蒙殊寵受任西藩淮南之捷逆兵奔北人馬器鎧隨處放散于時收拾敗破不足貫連比年營繕並已修整今六合雖一餘燼未滅臣不以朽邁猶欲輸效力命仰報皇恩此志永絶銜恨泉壤謹奉輸馬具裝百具步鎧五百領並在尋陽請勒所屬領受詔曰伊忠誠不遂益以傷懷仍受其所上之鎧子肅之嗣卒子陵嗣宋受禪國除伊弟不才亦有將略討孫恩至冠軍將軍朱伺朱伺字仲文安陸人少為吳牙門將陶丹給使吳平內徙江夏伺有武勇而訥口不知書為郡將督見鄉里士大夫揖稱名而已及為將遂以謙恭稱張昌之逆太守弓欽走灄口伺與同輩郴寶布興合衆討之不克乃與欽奔武昌後更率部黨攻滅之轉騎部曲督加綏夷都尉伺部曲等以諸縣附昌惟本部唱義討逆逆順有嫌求別立縣因此遂割安陸東界為灄陽縣而貫焉其後陳敏作亂陶侃時鎮江夏以伺能水戰曉作舟艦乃遣作大艦署為左甄據江口摧破敏前鋒敏弟恢稱荊州刺史在武昌侃率伺及諸軍進討破之敏恢既平伺以功封亭侯領騎督時西陽夷賊抄掠江夏太守楊珉每請督將議距賊之計伺獨不言珉曰朱將軍何以不言伺答曰諸人以舌擊賊伺惟以力耳珉又問將軍前後擊賊何以每得勝邪伺曰兩敵共對惟當忍之彼不能忍我能忍是以勝耳珉大笑永嘉中石勒破江夏伺與楊珉走夏口及陶侃來戍夏口伺依之加明威將軍隨侃討杜韜有殊功語在侃傳夏口之戰伺用鐵面自衛以弩的射賊大帥數人皆殺之賊挽船上岸於水邊作陳伺逐水上下以邀之箭中其脛氣色不變諸軍尋至賊潰追擊之皆棄船投水死者太半賊夜還長沙伺追至蒲圻不及而反加威遠將軍赤幢曲蓋建興中陳聲率諸無賴二千餘家斷江抄掠侃遣伺為督護討聲聲衆雖少伺容之不擊求遣弟詣侃降伺外許之及聲去伺乃遣徑勇要聲弟斬之潛軍襲聲聲正旦並出祭祀飲食伺軍入其門方覺聲將閻晉鄭進皆死戰伺軍人多傷乃還營聲東走保董城伺又率諸軍圍守之遂重柴繞城作高櫓以徑弩下射之又斷其水道城中無水殺牛飲血閻晉聲婦弟也乃斬聲首出降又以平蜀賊襲高之功加伺廣威將軍領竟陵內史時王敦欲用從弟廙代侃為荊州侃故將鄭攀馬俊等乞侃於敦敦不許攀等以侃始滅大賊人皆樂附又以廙忌戾難事謀共距之遂屯結溳口遣使告伺伺外許之而稱疾不赴攀等遂進距廙既而士衆疑阻復散還橫桑口欲入杜曾時朱軌趙誘李桓率衆將擊之攀等懼誅以司馬孫景造謀距廙因斬之降軌等廙將西出遣長史劉浚留鎮揚口壘時杜曾請討第五猗於襄陽伺謂廙曰曾是猾賊外示西還以疑衆心欲誘引官軍使西然後兼道襲揚口耳宜大部分未可便西廙性矝厲自用兼以伺老怯難信遂西行曾等果馳還廙乃遣伺歸裁至壘即為曾等所圍劉浚以壘北門危欲令伺守之或說浚云伺與鄭攀同者乃轉守南門賊知之攻其北門時鄭攀黨馬俊等亦來攻壘俊妻子先在壘內或請皮其面以示之伺曰殺其妻子未能解圍但益其怒耳乃止伺常所調弩忽噤不發伺甚惡之及賊攻陷北門伺被傷退入船初浚開諸船底以木掩之名為船械伺既入賊舉鋋摘伺伺逆接得鋋反以摘賊賊走上船屋大喚云賊帥在此伺從船底沈行五十步乃免遇醫療創小差杜曾遣說伺云馬俊等感卿恩妻孥得活盡以卿家外內百口付俊俊已盡心收視卿可來也伺答曰賊無白首者今吾年六十餘不能復與卿作賊吾死當歸南妻子付汝乃還甑山時王廙與李桓杜曾相持纍戰甑山下軍士數驚喚云賊欲至伺驚創而卒因葬甑山毛寶子穆之孫璩安之宗人德祖毛寶字碩真滎陽陽武人也王敦以為臨湘令敦卒為溫嶠平南參軍蘇峻作逆嶠將赴難而征西將軍陶侃懷疑不從嶠屢說不能回更遣使順侃意曰仁公且守僕宜先下遣信已二日會寶別使還聞之說嶠曰凡舉大事當與天下共同衆克在和不聞有異假令可疑猶當外示不覺況自作疑邪便宜急追信改舊書說必應俱征若不及前信宜更遣使嶠意悟即追信改書侃果共征峻寶領千人為嶠前鋒俱次茄子浦初嶠以南軍習水峻軍便步欲以所長制之宣令三軍有上岸者死時蘇峻送米萬斛饋祖約約遣司馬桓撫等迎之寶告其衆曰兵法軍令有所不從豈可不上岸邪乃設變力戰悉獲其米虜殺萬計約用大飢嶠嘉其勳上為廬江太守約遣祖煥桓撫等欲襲湓口陶侃將自擊之寶曰義軍恃公公不可動寶請討之侃顧謂坐客曰此年少言可用也乃使寶行先是桓宣背約南屯馬頭山為煥撫所攻求救於寶寶衆以宣本是約黨疑之宣遣子戎重請寶即隨戎赴之未至而賊已與宣戰寶軍懸兵少器杖濫惡大為煥撫所破寶中箭貫髀徹鞍使人踏鞍拔箭血流滿鞾夜奔船所百餘里望星而行到先哭戰亡將士洗瘡訖夜還救宣寶至宣營而煥撫亦退寶進攻祖約軍次東關破合肥尋召歸石頭陶侃溫嶠未能破賊侃欲率衆南還寶謂嶠曰下官能留之乃往說侃曰公本應領蕪湖為南北勢援前既已下勢不可還且軍政有進無退非直整齊三軍示衆必死而已亦謂退無所據終至滅亡往者杜韜非不強盛公竟滅之何至於峻獨不可破邪賊亦畏死非皆勇健公可試與寶兵使上岸斷賊資糧出其不意使賊困蹙若寶不立效然後公去人心不恨侃然之加寶督護寶燒峻句容湖孰積聚峻頗乏食侃遂留不去峻既死匡術以苑城降侃使寶守南城鄧嶽守西城賊遣韓晃攻之寶登城射殺數十人晃問寶曰君是毛廬江邪寶曰是晃曰君名壯勇何不出鬬寶曰君若健將何不入鬬晃笑而退賊平封州陵縣開國侯千六百戶庾亮西鎮請為輔國將軍江夏相督隨義陽二郡鎮上明又進南中郎隨亮討郭默默平與亮司馬王愆期等救桓宣於章山擊賊將石遇破之進征虜將軍亮謀北伐上疏解豫州請以授寶於是詔以寶監揚州之江西諸軍事豫州刺史將軍如故與西陽太守樊峻以萬人守邾城石季龍惡之乃遣其子鑒與其將夔安李菟等五萬人來寇張渡二萬騎攻邾城寶求救於亮亮以城固不時遣軍城遂陷寶峻等率左右突圍出赴江死者六千人寶亦溺死亮哭之慟因發疾遂薨詔曰寶之傾敗宜在貶裁然蘇峻之難致力王室今咎其過故不加贈祭之可也其後公卿言寶有重勳加死王事不宜奪爵升平三年乃下詔復本封初寶在武昌軍人有於市買得一白龜長四五寸養之漸大放諸江中邾城之敗養龜人被鎧持刀自投於水中如覺墮一石上視之乃先所養白龜長五六尺送至東岸遂得免焉寶二子穆之安之穆之字憲祖小字武生名犯王靖后諱故行字後又以桓溫母名憲乃更稱小字穆之果毅有父風安西將軍庾翼以為參軍襲爵州陵侯翼等專威陝西以子方之為建武將軍守襄陽方之年少翼選武將可信杖者為輔弼乃以穆之為建武司馬俄而翼薨大將干瓚戴羲等作亂穆之與安西長史江虨司馬朱燾等共平之桓溫代翼復取為參軍從溫平蜀以功賜次子都鄉侯尋除揚威將軍潁川太守隨溫平洛入關溫將旋師以謝尚未至留穆之以二千人衛山陵升平初遷督寧州諸軍事揚威將軍寧州刺史以桓溫封南郡徙穆之為建安侯復為溫太尉參軍加冠軍將軍以所募兵配之溫伐慕容暐使穆之監鑿巨野百餘里引汶會于濟川及溫焚舟步歸使穆之督東燕四郡軍事領東燕太守本官如故袁真以壽陽叛溫將征之穆之以冠軍領淮南太守守歷陽真平餘黨分散乃以穆之督揚州之江西軍事復領陳郡太守俄而徙督揚州之義成荊州五郡雍州之京兆軍事襄陽義成河南三郡太守將軍如故尋進領梁州刺史頃之以疾解職詔以冠軍徵還苻堅別將寇彭城復以將軍假節監江北軍事鎮廣陵遷右將軍宣城內史假節鎮姑孰穆之以為戍在近畿無復軍警不宜加節上疏辭讓許之苻堅別將圍襄陽詔穆之就上明受桓沖節度沖使穆之游軍沔中穆之始至而朱序陷沒引軍還郡堅衆又寇蜀漢梁州刺史楊亮益州刺史周仲孫奔退沖使穆之督梁州之三郡軍事右將軍西蠻校尉益州刺史領建平太守假節戍巴郡以子球為梓潼太守穆之與球伐堅至于巴西郡以糧運乏少退屯巴東病卒追贈中軍將軍諡曰烈子珍嗣位至天門太守珍弟璩球璠瑾瑗璩最知名璩字叔璉弱冠右將軍桓豁以為參軍尋遭父憂服闋為謝安衛將軍參軍除尚書郎安復請為參軍轉安子琰征虜司馬淮肥之役苻堅迸走璩與田次之共躡堅至中陽不及而歸遷寧朔將軍淮南太守尋補鎮北將軍譙王恬司馬海陵縣界地名青蒲四面湖澤皆是菰葑逃亡所聚威令不能及璩建議率千人討之時大旱璩因放火菰葑盡然亡戶窘迫悉出詣璩自首近有萬戶皆以補兵朝廷嘉之轉西中郎司馬龍驤將軍譙梁二郡內史尋代郭銓為建威將軍益州刺史安帝初進征虜將軍及桓玄篡位遣使加璩散騎常侍左將軍璩執留玄使不受命玄以桓希為梁州刺史王异據涪郭法戍宕渠師寂戍巴郡周道子戍白帝以防之璩傳檄遠近列玄罪狀遣巴東太守柳約之建平太守羅述征虜司馬甄季之擊破希等仍率衆次於白帝武陵王令曰益州刺史毛璩忠誠賣心亮自桓玄萌禍常思躡其後今若平殄凶逆肅清荊郢者便當即授上流之任初璩弟寧州刺史璠卒官璩兄球孫祐之及參軍費恬以數百人送喪葬江陵會玄敗謀奔梁州璩弟瑾子修之時為玄屯騎校尉誘玄使入蜀既而修之與祐之費恬及漢嘉人馮遷共殺玄約之等聞玄死進軍到枝江而桓振復攻沒江陵劉毅等還尋陽約之亦退俄而季之述皆病約之詣振僞降因欲襲振事泄被害約之司馬時延祖涪陵太守文處茂等撫其餘衆保涪陵振遣桓放之為益州屯西陵處茂距擊破之振死安帝反正詔曰夫貞松標於歲寒忠臣亮於國危益州刺史璩體識弘正誠契義旗受命偏師次于近畿匡翼之勳實感朕心可進征西將軍加散騎常侍都督益梁秦涼寧五州軍事行宜都寧蜀太守文處茂宣讚蕃牧蒙險夷難可輔國將軍西夷校尉巴西梓潼二郡太守又詔西夷校尉瑾為持節監梁秦二州軍事征虜將軍梁秦二州刺史略陽武都太守瑾弟蜀郡太守瑗為輔國將軍寧州刺史初璩聞振陷江陵率衆赴難使瑾瑗順外江而下使參軍譙縱領巴西梓潼二郡軍下涪水當與璩軍會於巴郡蜀人不樂東征縱因人情思歸於五城水口反還襲涪害瑾瑾留府長史鄭純之自成都馳使告璩璩時在略城去成都四百里遣參軍王瓊討反者相距於廣漢僰道令何林聚黨助縱而璩下人受縱誘說遂共害璩及瑗并子姪之在蜀者一時殄沒璩子弘之嗣義熙中時延祖為始康太守上疏訟璩兄弟於是詔曰故益州刺史璩西夷校尉瑾蜀郡太守瑗勤王忠烈事乖慮外葬送日近益懷惻愴可皆贈先所授官給錢三十萬布三百匹論璩討桓玄功追封歸鄉公千五百戶又以祐之斬玄功封夷道縣侯自寶至璩三葉擁旄開國者四人將帥之家與尋陽周氏為輩而人物不及也瑾子修之頻歷清顯至右衛將軍從劉裕平姚泓後為安西司馬沒於魏安之字仲祖亦有武幹纍遷撫軍參軍魏郡太守簡文輔政委以爪牙及登阼安之領兵從駕使止宿宮中尋拜游擊將軍時庾希入京口朝廷震動命安之督城門諸軍事孝武即位妖賊盧悚突入殿廷安之聞難率衆直入雲龍門手自奮擊既而左衛將軍殷康領軍將軍桓祕等至與安之并力悚因剿滅遷右衛將軍定后崩領將作大匠卒官追贈光祿勳四子潭泰邃遁潭嗣爵官至江夏相泰歷太傅從事中郎後軍咨議參軍與邃俱為會稽王父子所昵乃追論安之討盧悚勳賜爵平都子命潭襲爵元顯嘗宴泰家既而欲去泰苦留之曰公若遂去當取公㸂元顯大怒奮衣而出遂與元顯有隙及元顯敗泰時為冠軍將軍堂邑太山二郡太守邃為游擊將軍遁為太傅主簿桓玄得志使泰收元顯送于新亭泰因宿恨手加毆辱俄並為玄所殺惟遁被徙廣州義熙初得還至宜都太守德祖璩宗人也父祖並沒于賊中德祖兄弟五人相攜南渡皆有武幹荊州刺史劉道規以德祖為建武將軍始平太守又徙涪陵太守盧循之役道規又以為參軍伐徐道覆於始興尋遭母憂劉裕伐司馬休之版補太尉參軍義陽太守賜爵遷陵縣侯轉南陽太守從劉裕伐姚泓頻攻滎陽扶風南安馮翊數郡所在克捷裕嘉之以為龍驤將軍秦州刺史裕留第二子義真為安西將軍雍州刺史以德祖為中兵參軍領天水太守從義真還裕以德祖督河東平陽二郡軍事輔國將軍河東太守代劉遵考守蒲坂及河北覆敗德祖全軍而歸裕方欲蕩平關洛先以德祖督九郡軍事冠軍將軍滎陽京兆太守以前後功賜爵灌陽縣男尋遷督司雍并三州諸軍事冠軍將軍司州刺史戍武牢為魏所沒德祖次弟嶷嶷弟辨並有志節嶷死於盧循之難辨沒於魯宗之役並奮不顧命為世所歎劉遐劉遐字正長廣平易陽人也性果毅便弓馬開豁勇壯值天下大亂遐為塢主每擊賊率壯士陷堅摧鋒冀方比之張飛關羽鄉人冀州刺史邵續深器之以女妻焉遂壁于河濟之間賊不敢逼遐間道遣使受元帝節度朝廷嘉之璽書慰勉以為龍驤將軍平原內史建武初元帝令曰遐忠勇果毅義誠可嘉以遐為下邳內史將軍如故初沛人周堅一名撫與同郡周默因天下亂各為塢主以寇抄為事默降祖逖撫怒遂襲殺默以彭城叛石勒遣騎援之詔遐領彭城內史與徐州刺史蔡豹太山太守徐龕共討撫戰於寒山撫敗走詔徙遐為臨淮太守徐龕復反事平以遐為北中郎將兗州刺史太寧初自彭城移屯泗口王含反遐與蘇峻俱赴京都含敗隨丹楊尹溫嶠追含至于淮南遐頗放兵虜掠嶠曰天道助順故王含剿絶不可因亂為亂也遐深自陳而拜謝事平以功封泉陵公遷散騎常侍監淮北軍事北中郎將徐州刺史假節代王邃鎮淮陰咸和元年卒追贈安北將軍子肇年幼成帝以徐州授郗鑒以郭默為北中郎將領遐部曲遐妹夫田防及遐故將史迭卞咸李龍等不樂他屬共立肇襲遐故位以叛成帝遣郭默等率諸郡討之默等始上道而臨淮太守劉矯率將士數百掩襲遐營迭等迸走斬田防及督護卞咸等追斬迭龍于下邳傳首詣闕遐母妻子參佐將士悉還建康遐妻驍果有父風遐嘗為石季龍所圍妻單將數騎拔遐出於萬衆之中及田防等欲為亂遐妻止之不從乃密起火燒甲杖都盡肇襲爵官至散騎侍郎肇卒子舉嗣卒子遵之嗣卒子伯齡嗣宋受禪國除鄧嶽子遐鄧嶽字伯山陳郡人也本名嶽以犯康帝諱改為嶽後竟改名為岱焉少有將帥才略為王敦參軍轉從事中郎西陽太守王含構逆嶽領兵隨含向京都及含敗嶽與周撫俱奔蠻王向蠶後遇赦與撫俱出久之司徒王導命為從事中郎後復為西陽太守及蘇峻反平南將軍溫嶠遣嶽與督護王愆期鄱陽太守紀睦等率舟軍赴難峻平還郡郭默之殺劉胤也大司馬陶侃使嶽率西陽之衆討之默平遷督交廣二州軍事建武將軍領平越中郎將廣州刺史假節録前後勳封宜城縣伯咸康三年嶽遣軍伐夜郎破之加督寧州進征虜將軍遷平南將軍卒子遐嗣遐字應遠勇力絶人氣蓋當時時人方之樊噲桓溫以為參軍數從溫征伐歷冠軍將軍數郡太守號為名將襄陽城北沔水中有蛟常為人害遐遂拔劍入水蛟繞其足遐揮劍截蛟數段而出枋頭之役溫既懷恥忿且忌憚遐之勇果因免遐官尋卒寧康中追贈廬陵太守嶽弟逸字茂山亦有武幹嶽卒後以逸監交廣州建威將軍平越中郎將廣州刺史假節朱序朱序字次倫義陽人也父燾以才幹歷西蠻校尉益州刺史序世為名將纍遷鷹揚將軍江夏相興寧末梁州刺史司馬勳反桓溫表序為征討都護往討之以功拜征虜將軍封襄平子太和中遷兗州刺史時長城人錢弘聚黨百餘人藏匿原鄉山以序為中軍司馬吳興太守序至郡討擒之事訖還兗州寧康初拜使持節監沔中諸軍事南中郎將梁州刺史鎮襄陽是歲苻堅遣其將苻丕等率衆圍序序固守賊糧將盡率衆苦攻之初苻丕之來攻也序母韓自登城履行謂西北角當先受弊遂領百餘婢并城中女子於其角斜築城二十餘丈賊攻西北角果潰衆便固新築城丕遂引退襄陽人謂此城為夫人城序纍戰破賊人情勞懈又以賊退稍遠疑未能來守備不謹督護李伯護密與賊相應襄陽遂沒序陷於苻堅堅殺伯護徇之以其不忠也序欲逃歸潛至宜陽藏夏揆家堅疑揆收之序乃詣苻暉自首堅嘉而不問以為尚書太元中苻堅南侵謝石率衆距之時堅大兵尚在項苻融以三十萬衆先至堅遣序說謝石稱己兵威序反謂石曰若堅百萬之衆悉到莫可與敵及其未會擊之可以得志於是石遣謝琰選勇士八千人涉肥水挑戰堅衆小却序時在其軍後唱云堅敗衆遂大奔序乃得歸拜龍驤將軍琅邪內史轉揚州豫州五郡軍事豫州刺史屯洛陽後丁零翟遼反序遣將軍秦膺童斌與淮泗諸郡共討之又監兗青二州諸軍事二州刺史將軍如故進鎮彭城序求鎮淮陰帝許焉翟遼又使其子釗寇陳潁序還遣秦膺討釗走之拜征虜將軍表求運江州米十萬斛布五千匹以資軍費詔聽之加都督司雍梁秦四州軍事帝遣廣威將軍河南太守楊佺期南陽太守趙睦各領兵千人隸序序又表求故荊州刺史桓石生府田百頃并穀八萬斛給之仍戍洛陽衛山陵也其後慕容永率衆向洛陽序自河陰北濟與永僞將王次等相遇乃戰於沁水次敗走斬其支將勿支首參軍趙睦江夏相桓不才追永破之于太行永歸上黨時楊楷聚衆數千在湖陝聞永敗遣任子詣序乞降序追永至上黨之白水與永相持二旬聞翟遼欲向金墉乃還遂攻翟釗於石門遣參軍趙蕃破翟遼於懷縣遼宵遁序退次洛陽留鷹揚將軍朱黨戍石門序仍使子略督護洛城趙蕃為助序還襄陽會稽王道子以序勝負相補不加褒貶其後東羌校尉竇衝欲入漢川安定人皇甫釗京兆人周勳等謀納之梁州刺史周瓊失巴西三郡衆寡力弱告急於序序遣將軍皇甫貞率衆赴之衝據長安東釗勳散走序以老病纍表解職不許詔斷表遂輒去任數旬歸罪廷尉詔原不問太元十八年卒贈左將軍散騎常侍史臣曰晉氏淪喪播遷江表內難荐臻外虞不息經略之道是所未弘將帥之功無聞焉爾遜豹宣胤服勤於太興之間毛鄧劉朱馳騖乎咸和之後雖人不逮古亦足列於當世焉贊曰氣分淮海災流瀍澗覆類玄蚖興微鴻雁鼓鞞在聽兔罝有作赳赳羣英勤茲王略
