body:
  text: 晉書卷一百十九載記第十九姚泓姚泓字元子興之長子也孝友寬和而無經世之用又多疾病興將以為嗣而疑焉久之乃立為太子興每征伐巡遊常留總後事博學善談論尤好詩詠尚書王尚黃門郎段章尚書郎富允文以儒術侍講胡義周夏侯稚以文章遊集時尚書王敏右丞郭播以刑政過寬議欲峻制泓曰人情挫辱則壯厲之心生政教煩苛則苟免之行立上之化下如風靡草君等參贊朝化弘昭政軌不務仁恕之道惟欲嚴法酷刑豈是安上馭下之理乎敏等遂止泓受經於博士淳于岐岐病泓親詣省疾拜于牀下自是公侯見師傅皆拜焉興之如平涼也馮翊人劉厥聚衆數千據萬年以叛泓遣鎮軍彭白狼率東宮禁兵討之斬厥赦其餘黨諸將咸勸泓曰殿下神算電發蕩平醜逆宜露布表言廣其首級以慰遠近之情泓曰主上委吾後事使式遏寇逆吾綏御失和以長姦寇方當引咎責躬歸罪行間安敢過自矜誕以重罪責乎其右僕射韋華聞而謂河南太守慕容築曰皇太子實有恭惠之德社稷之福也其弟弼有奪嫡之謀泓恩撫如初未嘗見於色姚紹每為弼羽翼泓亦推心宗事弗以為嫌及僭位任紹以兵權紹亦感而歸誠卒守其忠烈其明識寬裕皆此類也興既死祕不發喪南陽公姚愔及大將軍尹元等謀為亂泓皆誅之命其齊公姚恢殺安定太守呂超恢久乃誅之泓疑恢有陰謀恢自是懷二陰聚兵甲焉泓發喪以義熙十二年僭即帝位大赦殊死已下改元永和廬于咨議堂既葬乃親庶政內外百僚增位一等令文武各盡直言政有不便于時事有光益宗廟者極言勿有所諱初興徙李閏羌三千家於安定尋徙新支至是羌酋黨容率所部叛還遣撫軍姚讚討之容降徙其豪右數百戶于長安餘遣還李閏北地太守毛雍據趙氏塢以叛于泓姚紹討擒之姚宣時鎮李閏未知雍敗遣部將姚佛生等來衛長安衆既發宣參軍韋宗姦諂好亂説宣曰主上初立威化未著勃勃強盛侵害必深本朝之難未可弭也殿下居維城之任宜深慮之邢望地形險固總三方之要若能據之虛心撫禦非但克固維城亦霸王之業也宣乃率戶三萬八千棄李閏南保邢望宣既南移諸羌據李閏以叛紹進討破之宣詣紹歸罪紹怒殺之初宣在邢望泓遣姚佛生諭宣佛生遂讚成宣計紹數其罪又戮之泓下書士卒死王事贈以爵位永復其家將封宮臣十六人五等子男姚讚諫曰東宮文武自當有守忠之誠未有赫然之效何受封之多乎泓曰懸爵於朝所以懲勸來效標明盛德元子遭家不造與宮臣同此百憂獨享其福得不愧於心乎讚默然姚紹進曰陛下不忘報德封之是也古者敬其事命之以始可須來春然後議之乃止并州定陽二城胡數萬落叛泓入于平陽攻立義姚成都於胸奴堡推胸奴曹弘為大單于所在殘掠征東姚懿自蒲坂討弘戰于平陽大破之執弘送於長安徙其豪右萬五千落于雍州仇池公楊盛攻陷祁山執建節王總遂逼秦州泓遣後將軍姚平救之盛引退姚嵩與平追盛及于竹嶺姚讚率隴西太守姚秦都略陽太守王煥以禁兵赴之讚至清水嵩為盛所敗嵩及秦都王煥皆戰死讚至秦州退還仇池先是天水冀縣石鼓鳴聲聞數百里野雉皆雊秦州地震者三十二殷殷有聲者八山崩舍壞咸以為不祥及嵩將出羣僚固諫止之嵩曰若有不祥此乃命也安所逃乎遂及於難識者以為秦州泓之故鄉將滅之徵也赫連勃勃攻陷陰密執秦州刺史姚軍都坑將士五千餘人軍都瞋目厲聲數勃勃殘忍之罪不為之屈勃勃怒而殺之勃勃既克陰密進兵侵雍嶺北雜戶悉奔五將山征北姚恢棄安定率戶五千奔新平安定人胡儼華韜等率衆距恢恢單騎歸長安立節彌姐成建武裴岐為儼所殺鎮西姚諶委鎮東走勃勃遂據雍抄掠郿城姚紹及征虜尹昭鎮軍姚洽等率步騎五萬討勃勃姚恢以精騎一萬繼之軍次橫水勃勃退保安定胡儼閉門距之殺鮮卑數千人據安定以降紹進兵躡勃勃戰于馬鞍坂敗之追至朝那不及而還楊盛遣兄子倦入寇長蛇平陽氐苟渴聚衆千餘據五丈原以叛遣鎮遠姚萬恢武姚難討之為渴所敗姚諶討渴擒之泓使輔國斂曼嵬前將軍姚光兒討楊倦于陳倉倦奔于散關勃勃遣兄子提南侵池陽車騎姚裕前將軍彭白狼建義蛇玄距却之尋而晉太尉劉裕總大軍伐泓次于彭城遣冠軍將軍檀道濟龍驤將軍王鎮惡入自淮肥攻漆丘項城將軍沈林子自汴入河攻倉垣泓將王苟生以漆丘降鎮惡徐州刺史姚掌以項城降道濟王師遂入潁口所至多降服惟新蔡太守董遵固守不降道濟攻破之縛遵而致諸軍門遵厲色曰古之王者伐國待士以禮君奈何以不義行師待國士以非禮乎道濟怒殺之姚紹聞王師之至還長安言于泓曰晉師已過許昌豫州安定孤遠卒難救衛宜遷諸鎮戶內實京畿可得精兵十萬足以橫行天下假使二寇交侵無深害也如其不爾晉侵豫州勃勃寇安定者將若之何事機已至宜在速決其左僕射梁喜曰齊公恢雄勇有威名為嶺北所憚鎮人已與勃勃深仇理應守死無二勃勃終不能棄安定遠寇京畿若無安定虜馬必及於郿雍今關中兵馬足距晉師豈可未有憂危先自削損也泓從之吏部郎懿橫密言於泓曰齊公恢於廣平之難有忠勳於陛下自陛下龍飛紹統未有殊賞以答其意今外則致之死地內則不豫朝權安定人自以孤危逼寇欲思南遷者十室而九若擁精兵四萬鼓行而向京師得不為社稷之纍乎宜徵還朝廷以慰其心泓曰恢若懷不逞之心徵之適所以速禍耳又不從王師至成皋征南姚洸時鎮洛陽馳使請救泓遣越騎校尉閻生率騎三千以赴之武衛姚益男將步卒一萬助守洛陽又遣征東并州牧姚懿南屯陝津為之聲援洸部將趙玄説洸曰今寇逼已深百姓駭懼衆寡勢殊難以應敵宜攝諸戍兵士固守金墉以待京師之援不可出戰如脫不捷大事去矣金墉既固師無損敗吳寇終不敢越金墉而西困之於堅城之下可以坐制其弊時洸司馬姚禹潛通於道濟主簿閻恢楊虔等皆禹之黨嫉玄忠誠咸共毀之固勸洸出戰洸從之乃遣玄率精兵千餘南守柏谷塢廣武石無諱東戍鞏城以距王師玄泣謂洸曰玄受三帝重恩所守正死耳但明公不用忠臣之言為姦孽所誤後必悔之但無及耳會陽城及成皋滎陽武牢諸城悉降道濟等長驅而至無諱至石關奔還玄與晉將毛德祖戰于柏谷以衆寡而敗被瘡十餘據地大呼玄司馬騫鑒冒刃抱玄而泣玄曰吾瘡已重君宜速去鑒曰若將軍不濟當與俱死去將安之皆死於陳姚禹踰城奔于王師道濟進至洛陽洸懼遂降時閻生至新安益男至湖城會洛陽已沒遂留屯不進姚懿嶮薄惑於信受其司馬孫暢姦巧傾佞好亂樂禍勸懿襲長安誅姚紹廢泓自立懿納之乃引兵至陝津散穀以賜河北夷夏欲虛損國儲招引和戎諸羌樹己私惠懿左常侍張敞侍郎左雅固諫懿曰殿下以母弟之親居分陝之重安危休戚與國共之漢有七國之難實賴梁王今吳寇內侵四州傾沒西虜擾邊秦涼覆敗朝廷之危有同纍卵正是諸侯勤王之日穀者國之本也而今散之若朝廷問殿下者將何辭以報懿怒笞而殺之泓聞之召姚紹等密謀於朝堂紹曰懿性識鄙近從物推移造成此事惟當孫暢耳但馳使徵暢遣撫軍讚據陝城臣向潼關為諸軍節度若暢奉詔而至者臣當遣懿率河東見兵共平吳寇如其逆釁已成違距詔敕者當明其罪於天下聲鼓以擊之泓曰叔父之言社稷之計也於是遣姚讚及冠軍司馬國璠建義蛇玄屯陝津武衛姚驢屯潼關懿遂舉兵僭號傳檄州郡欲運胸奴堡穀以給鎮人寧東姚成都距之懿乃卑辭招誘深自結託送佩刀為誓成都送以呈泓懿又遣驍騎王國率甲士數百攻成都成都擒國囚之遣讓懿曰明公以母弟之親受推轂之寄今社稷之危若綴旒然宜恭恪憂勤匡輔王室而更包藏姦宄謀危宗廟三祖之靈豈安公乎此鎮之糧一方所寄鎮人何功而欲給之王國為蛇畫足國之罪人已就囚執聽詔而戮之成都方糾合義衆以懲明公之罪復須大兵悉集當與明公會於河上乃宣告諸城勉以忠義厲兵秣馬徵發義租河東之兵無詣懿者懿深患之臨晉數千戶叛應懿姚紹濟自蒲津擊臨晉叛戶大破之懿等震懼鎮人安定郭純王奴等率衆圍懿紹入於蒲坂執懿囚之誅孫暢等泓以內外離叛王師漸逼歲旦朝羣臣于其前殿悽然流涕羣臣皆泣時征北姚恢率安定鎮戶三萬八千焚燒室宇以車為方陳自北雍州趣長安自稱大都督建義大將軍移檄州郡欲除君側之惡揚威薑紀率衆奔之建節彭完都聞恢將至棄陰密奔還長安恢至新支薑紀説恢曰國家重將在東京師空虛公可輕兵徑襲事必克矣恢不從乃南攻郿城鎮西姚諶為恢所敗恢軍勢彌盛長安大震泓馳使徵紹遣姚裕及輔國胡翼度屯于灃西扶風太守姚雋安夷護軍姚墨蠡建威姚娥都揚威彭蚝皆懼而降恢恢舅苟和時為立節將軍守忠不二泓召而謂之曰衆人咸懷去就卿何能自安邪和曰若天縱妖賊得肆其逆節者舅甥之理不待奔馳而加親如其罪極逆銷天盈其罰者守忠執志臣之體也違親叛君臣之所恥泓善其忠恕加金章紫綬姚紹率輕騎先赴難使姚洽司馬國璠將步卒三萬赴長安恢從曲牢進屯杜成紹與恢相持于靈臺姚讚聞恢漸逼留寧朔尹雅為弘農太守守潼關率諸軍還長安泓謝讚曰元子不能崇明德義導率羣下致禍起蕭牆變自同氣既上負祖宗亦無顏見諸父懿始構逆滅亡恢復擁衆內叛將若之何讚曰懿等所以敢稱兵內侮者諒由臣等輕弱無防遏之方故也因攘袂大泣曰臣與大將軍不滅此賊終不持面復見陛下泓於是班賜軍士而遣之恢衆見諸軍悉集咸懼而思善其將齊黃等棄恢而降恢進軍逼紹讚自後要擊大破之殺恢及其三弟泓哭之悲慟葬以公禮至是王鎮惡至宜陽毛德祖攻弘農太守尹雅于蠡城衆潰德祖使騎追獲之既而殺晉守者奔固潼關檀道濟沈林子攻拔襄邑堡建威薛帛奔河東道濟自陝北渡攻蒲坂使將軍苟卓攻胸奴堡為泓寧東姚成都所敗泓遣姚驢救蒲坂胡翼度據潼關泓進紹太宰大將軍大都督都督中外諸軍事假黃鉞改封魯公侍中司隸宗正節録並如故朝之大政皆往決焉紹固辭弗許於是遣紹率武衛姚鸞等步騎五萬距王師于潼關姚驢與并州刺史尹昭為表𩹉之勢夾攻道濟道濟深壁不戰沈林子説道濟曰今蒲坂城堅池濬非可卒克攻之傷衆守之引日不如棄之先事潼關潼關天岨形勝之地鎮惡孤軍勢危力寡若使姚紹據之則難圖矣如克潼關紹可不戰而服道濟從之乃棄蒲坂南向潼關姚讚率禁兵七千自渭北而東進據蒲津劉裕使沈田子及傅弘之率衆萬餘人入上洛所在多委城鎮奔長安田子等進及青泥姚紹方陳而前以距道濟道濟固壘不戰紹乃攻其西營不克遂以大衆逼之道濟率王敬沈林子等逆衝紹軍將士驚散引還定城紹留姚鸞守險絶道濟糧道時裕別將姚珍入自子午竇霸入自洛谷衆各數千人泓遣姚萬距霸姚強距珍姚鸞遣將尹雅與道濟司馬徐琰戰于潼關南為琰所獲送之劉裕裕以雅前叛欲殺之雅曰前活本在望外今死寧不甘心明公將以大義平天下豈可使秦無守信之臣乎裕嘉而免之泓遣給事黃門侍郎姚和都屯于堯柳以備田子姚紹謂諸將曰道濟等遠來送死衆旅不多嬰壘自固者正欲曠日持久以待繼援耳吾欲分軍徑據閿鄉以絶其糧運不至一月道濟之首可懸之麾下矣濟等既沒裕計自沮諸將咸以為然其將胡翼度曰軍勢宜集不可以分若偏師不利人心駭懼胡可以戰紹乃止薛帛據河曲以叛紹分道置諸軍為掎角之勢遣輔國胡翼度據東原武衛姚鸞營於大路與晉軍相接沈林子簡精鋭銜枚夜襲之鸞衆潰戰死士卒死者九千餘人姚讚屯于河上遣恢武姚難運蒲坂穀以給其軍至香城為王師所敗時泓遣姚諶守堯柳姚和都討薛帛於河東聞王師要難乃兼道赴救未至而難敗因破裕裨將于河曲遂屯蒲坂姚讚為林子所敗單馬奔定城紹遣左長史姚洽及姚墨蠡等率騎三千屯于河北之九原欲絶道濟諸縣租輸洽辭曰夫小敵之堅大敵之擒今兵衆單弱而遠在河外雖明公神武然鞭短勢殊恐無所及紹不聽沈林子率衆八千要洽于河上洽戰死衆皆沒紹聞洽等敗忿恚發病託姚讚以後事使姚難屯關西紹嘔血而死泓以晉師之逼遣使乞師于魏魏遣司徒南平公拔拔嵩正直將軍安平公乙旃眷進據河內遊擊將軍王洛生屯于河東為泓聲援劉裕次于陝城遣沈林子率精兵萬餘越山開道會沈田子等于青泥將攻堯柳泓使姚裕率步騎八千距之泓躬將大衆繼發裕為田子所敗泓退次于灞上關中郡縣多潛通于王師劉裕至潼關遣將軍朱超石徐猗之會薛帛于河北以攻蒲坂姚讚距裕于關西姚難屯于香城裕遣王鎮惡王敬自秋社西渡渭以逼難軍鎮東姚璞及姚和都擊敗猗之等於蒲坂猗之遇害超石棄其衆奔于潼關姚讚遣司馬休之及司馬國璠自軹關向河內引魏軍以躡裕後姚難既為鎮惡所逼引師而西時大霖雨渭水泛溢讚等不得北渡鎮惡水陸兼進追及姚難泓自灞上還軍次于石橋以援之讚退屯鄭城鎮北姚強率郡人數千與姚難陳于涇上以距鎮惡鎮惡遣毛德祖擊強大敗強戰死難遁還長安劉裕進據鄭城泓使姚裕尚書龐統屯兵宮中姚洸屯于灃西尚書姚白瓜徙四軍雜戶入長安姚丕守渭橋胡翼度屯石積姚讚屯霸東泓軍于逍遙園鎮惡夾渭進兵破姚丕于渭橋泓自逍遙園赴之逼水地狹因丕之敗遂相踐而退姚諶及前軍姚烈左衛姚寶安散騎王帛建武姚進揚威姚蚝尚書右丞孫玄等皆死於陳泓單馬還宮鎮惡入自平朔門泓與姚裕等數百騎出奔于石橋讚聞泓之敗也召將士告之衆皆以刀擊地攘袂大泣胡翼度先與劉裕陰通是日棄衆奔裕讚夜率諸軍將會泓于石橋王師已固諸門讚軍不得入衆皆驚散泓計無所出謀欲降于裕其子佛念年十一謂泓曰晉人將逞其欲終必不全願自裁決泓憮然不答佛念遂登宮牆自投而死泓將妻子詣壘門而降讚率宗室子弟百餘人亦降于裕裕盡殺之餘宗遷于江南送泓于建康市斬之時年三十在位二年建康百里之內草木皆燋死焉姚萇以孝武太元九年僭立至泓三世以安帝義熙十三年而滅凡三十二年史臣曰自長江徙御化龍創業巨寇乘機而未寧戎馬交馳而不息晦重氛于六漠鼓洪流於八際天未厭亂凶旅實繁弋仲越自金方言歸石氏抗直詞於暴主闡忠訓於危朝貽厥之謀在乎歸順鳴哀之義有足稱焉景國弱歲英奇見方孫策詳其幹識無忝斯言遽踐迷途良可悲矣景茂因仲襄之緒躡苻亡之會嘯命羣豪恢弘霸業假容沖之鋭俯定函秦挫雷惡之鋒載寧東北在茲姦略實冠凶徒列樹而表新營雖云效績荐棘而陵舊主何其不仁安枕而終斯為幸也子略克摧勍敵荷成先構虛襟訪道側席求賢敦友弟以睦其親明賞罰以臨其下英髦盡節爪牙畢命取汾絳陷許洛款僭燕而藩偽蜀夷隴右而靜河西俗阜年豐遠安邇輯雖楚莊秦穆何以加焉既而逞志矜功弗虞後患委涼都於禿髮授朔方於赫連專己生災邊城繼陷距諫招禍蕭牆屢發戰無寧歲人有危心豈宜騁彼雄圖被深恩於介士翻崇詭説殊禮於桑門當有為之時肄無為之業麗衣腴食殆將萬數析實談空靡然成俗夫以漢朝殷廣猶鄙鴻都之費況乎偽境日侵寧堪永貴之役儲用殫竭山林有稅政荒威挫職是之由坐致淪胥非天喪也元子以庸磱之質屬傾擾之餘內難方殷外禦斯輟王師杖順弭節而下長安凶嗣失圖係組而降軹道物極則反抑斯之謂歟贊曰弋仲剛烈終表奇節襄實英果萇惟姦桀興始崇構泓遂摧滅貽誡將來無踐危轍
