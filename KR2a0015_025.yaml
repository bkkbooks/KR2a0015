記說還備袞冕之服天子車乘冠服從歐陽氏說公卿以下從大小夏侯氏說始制天子三公九卿特進之服侍祠天地明堂皆冠旒冕兼五冕之制一服而已天子備十二章三公諸侯用山龍九章九卿以下用華蟲七章皆具五采魏明帝以公卿袞衣黼黻之飾疑於至尊多所減損始制天子服刺繡文公卿服織成文及晉受命遵而無改天子郊祀天地明堂宗廟元會臨軒黑介幘通天冠平冕冕皂表朱緑𩹉廣七寸長二尺二寸加於通天冠上前圓後方垂白玉珠十有二旒以朱組為纓無緌佩白玉垂珠黃大旒綬黃赤縹紺四采衣皂上絳下前三幅後四幅衣畫而裳繡為日月星辰山龍華蟲藻火粉米黼黻之象凡十二章素帶廣四寸朱𩹉以朱緑裨飾其側中衣以絳緣其領袖赤皮為韍絳袴襪赤舄未加元服者空頂介幘其釋奠先聖則皂紗袍絳緣中衣絳袴襪黑舄其臨軒亦袞冕也其朝服通天冠高九寸金博山顏黑介幘絳紗袍皂緣中衣其拜陵黑介幘單衣其雜服有青赤黃白緗黑色介幘五色紗袍五梁進賢冠遠遊冠平上幘武冠其素服白單衣後漢以來天子之冕前後旒用真白玉珠魏明帝好婦人之飾改以珊瑚珠晉初仍舊不改及過江服章多闕而冕飾以翡翠珊瑚雜珠侍中顧和奏舊禮冕十二旒用白玉珠今美玉難得不能備可用白璇珠從之通天冠本秦制高九寸正豎頂少斜却乃直下鐵為卷梁前有展筒冠前加金博山述乘輿所常服也平冕王公卿助祭於郊廟服之王公八旒卿七旒以組為纓色如其綬王公衣山龍以下九章卿衣華蟲以下七章游遠冠傅玄云秦冠也似通天而前無山述有展筒橫于冠前皇太子及王者後帝之兄弟帝之子封郡王者服之諸王加官者自服其官之冠服惟太子及王者後常冠焉太子則以翠羽為緌綴以白珠其餘但青絲而已緇布冠蔡雍云即委貌冠也太古冠布齊則緇之緇布冠始冠之冠也其制有四形一似武冠又一似進賢其一上方其下如幘顏其一剌上而方下行鄉射禮則公卿委貌冠以皂絹為之形如覆杯與皮辨同制長七寸高四寸衣黑而裳素其中衣以皂緣領袖其執事之人皮辨以鹿皮為之進賢冠古緇布遺象也斯蓋文儒者之服前高七寸後高三寸長八寸有五梁三梁二梁一梁人主元服始加緇布則冠五梁進賢三公及封郡公縣公郡侯縣侯鄉亭侯則冠三梁卿大夫八座尚書關中內侯二千石及千石以上則冠兩梁中書郎祕書丞郎著作郎尚書丞郎太子洗馬舍人六百石以下至于令史門郎小史並冠一梁漢建初中太官令冠兩梁親省御膳為重也博士兩梁崇儒也宗室劉氏亦得兩梁冠示加服也武冠一名武辨一名大冠一名繁冠一名建冠一名籠冠即古之惠文冠或曰趙惠文王所造因以為名亦云惠者蟪也其冠文輕細如蟬翼故名惠文或云齊人見千歲涸澤之神名曰慶忌冠大冠乘小車好疾馳因象其冠而服焉漢幸臣閎孺為侍中皆服大冠天子元服亦先加大冠左右侍臣及諸將軍武官通服之侍中常侍則加金璫附蟬為飾插以貂毛黃金為竿侍中插左常侍插右胡廣曰昔趙武靈王為胡服以金貂飾首秦滅趙以其君冠賜侍臣應劭漢官云說者以為金取剛強百鍊不耗蟬居高飲清口在掖下貂內徑悍而外柔縟又以蟬取清高飲露而不食貂則紫蔚柔潤而毛采不彰灼金則貴其寶瑩於義亦有所取或以為北土多寒胡人常以貂皮溫額後世效此遂以附冠漢貂用赤黑色王莽用黃貂各附服色所尚也高山冠一名側注高九寸鐵為卷梁制似通天頂直豎不斜却無山述展筒高山者詩云高山仰止取其矜莊賓遠者也中外官謁者謁者僕射所服胡廣曰高山齊王冠也傳曰桓公好高冠大帶秦滅齊以其君冠賜謁者近臣應劭曰高山今法冠也秦行人使官亦服之而漢官儀云乘輿冠高山之冠飛翮之纓然則天子亦有時服焉傅子曰魏明帝以其制似通天遠游故改令卑下法冠一名柱後或謂之獬豸冠高五寸以縰為展筒鐵為柱卷取其不曲撓也侍御史廷尉正監平凡執法官皆服之或謂獬豸神羊能觸邪佞異物志云北荒之中有獸名獬豸一角性別曲直見人鬬觸不直者聞人爭咋不正者楚王嘗獲此獸因象其形以制衣冠胡廣曰春秋左氏傳晉侯觀于軍府見鍾儀曰南冠而縶者誰也南冠即楚冠秦滅楚以其冠服賜執法臣也長冠一名齊冠高七寸廣三寸漆纚為之制如版以竹為𩹉漢高祖微時以竹皮為此冠其世因謂劉氏冠後除竹用漆纚司馬彪曰長冠蓋楚制人間或謂之鵲尾冠非也救日蝕則服長冠而祠宗廟諸祀冠之此高祖所造後世以為祭服尊敬之至也建華冠以鐵為柱卷貫大銅珠九枚古用雜木珠原憲所冠華冠是也又春秋左氏傳鄭子臧好聚鷸冠謂建華是也祀天地五郊明堂舞人服之漢育命舞樂人所服方山冠其制似進賢鄧展曰方山冠以五采縠為之漢大豫八佾五行樂人所服冠衣各如其行方之色而舞焉巧士冠前高七寸要後相通直豎此冠不常用漢氏惟郊天黃門從官四人冠之在鹵簿中夾乘輿車前以備宦者四星或云掃除從官所服却非冠高五寸制似長冠宮殿門吏僕射冠之負赤幡青翅燕尾諸僕射幡皆如之却敵冠前高四寸通長四寸後高三寸制似進賢凡當殿門衛士服之樊噲冠廣九寸高七寸前後出各四寸制似平冕昔楚漢會於鴻門項籍圖危高祖樊噲常持鐵楯聞急乃裂裳苞楯戴以為冠排入羽營因數羽罪漢王乘間得出後人壯其意乃制冠象焉凡殿門司馬衛士服之術氏冠前圓吳制差池四重趙武靈王好服之或曰楚莊王復讐冠是也鶡冠加雙鶡尾豎插兩邊鶡鳥名也形類鷂而微黑性果勇其鬬到死乃止上黨貢之趙武靈王以表顯壯士至秦漢猶施之武人皮辨以鹿皮淺毛黃白色者為之禮王皮辨會五采玉象邸玉笄謂之合皮為辨其縫中名曰會以采玉朱為結也天子五采諸侯三采邸冠下抵也象骨為之音帝也天子則縫有十二公九侯伯七子男五孤四卿大夫三韋辨制似皮辨頂上尖韎草染之色如淺絳爵辨一名廣冕高八寸長尺二寸如爵形前小後大增其上似爵頭色有收持笄所謂夏收殷冔者也祠天地五郊明堂雲翹舞樂人服之幘者古賤人不冠者之服也漢元帝有壯髮始引幘服之王莽頂禿又加其屋也漢注曰冠進賢者宜長耳今介幘也冠惠文者宜短耳今平上幘也始時各隨所宜遂因冠為別介幘服文吏平上幘服武官也童子幘無屋者示未成人也又有納言幘幘後收又一重方三寸又有赤幘騎吏武吏乘輿鼓吹所服救日蝕文武官皆免冠著幘對朝服示武威也漢儀立秋日獵服緗幘及江左哀帝從博士曹弘之等議立秋御讀令改用素白案漢末王公名士多委王服以幅巾為雅是以袁紹崔鈞之徒雖為將帥皆著縑巾魏武以天下凶荒資財乏匱擬古皮辨裁縑帛以為合乎簡易隨時之義以色別其貴賤本施軍飾非為國容也徐爰曰俗說本未有岐荀文若巾之行觸樹枝成岐謂之為善因而弗改今通以為慶弔服巾以葛為之形如而橫著之古尊卑共服也故漢末妖賊以黃為巾世謂黃巾賊帽名猶冠也義取於蒙覆其首其本纚也古者冠無幘冠下有纚以繒為之後世施幘於冠因或裁纚為帽自乘輿宴居下至庶人無爵者皆服之成帝咸和九年制聽尚書八座丞郎門下三省侍官乘車白低幃出入掖門又二宮直官著烏紗然則往往士人宴居皆著矣而江左時野人已著帽人士亦往往而然但其頂圓耳後乃高其屋云漢制自天子至於百官無不佩劍其後惟朝帶劍晉世始代之以木貴者猶用玉首賤者亦用金銀玳瑁為雕飾乘輿六璽秦制也曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽漢遵秦不改又有秦始皇藍田玉璽螭獸紐在六璽之外文曰受天之命皇帝壽昌漢高祖佩之後世名曰傳國璽與斬白蛇劍俱為乘輿所寶斬白蛇劍至惠帝時武庫火燒之遂亡及懷帝沒胡傳國璽沒於劉聰後又沒於石勒及石季龍死胡亂穆帝世乃還江南革帶古之鞶帶也謂之鞶革文武衆官牧守丞令下及騶寺皆服之其有囊綬則以綴於革帶其戎服則以皮絡帶代之八坐尚書荷紫以生紫為夾囊綴之服外加於左肩昔周公負成王制此服衣至今以為朝服或云漢世用盛奏事負之以行未詳也車前五百者卿行旅從五百人為一旅漢氏一統故去其人留其名也袴褶之制未詳所起近世凡車駕親戎中外戒嚴服之服無定色冠黑帽綴紫摽摽以繒為之長四寸廣一寸腰有絡帶以代鞶中官紫摽外官絳摽又有纂嚴戎服而不綴摽行留文武悉同其畋獵巡幸則惟從官戎服帶鞶革文官不下纓武官脫冠漢制一歲五郊天子與執事者所服各如方色百官不執事者服常服絳衣以從魏祕書監秦靜曰漢氏承秦改六冕之制但玄冠絳衣而已魏已來名為五時朝服又有四時朝服又有朝服自皇太子以下隨官受給百官雖服五時朝服據今止給四時朝服闕秋服三年一易諸假印綬而官不給鞶囊者得自具作其但假印不假綬者不得佩綬鞶古制也漢世著鞶囊者側在腰間或謂之傍囊或謂之綬囊然則以紫囊盛綬也或盛或散各有其時笏古者貴賤皆執笏其有事則搢之於腰帶所謂搢紳之士者搢笏而垂紳帶也紳垂長三尺笏者有事則書之故常簪筆今之白筆是其遺象三臺五省二品文官簪之王公侯伯子男卿尹及武官不簪加內侍位者乃簪之手版即古笏矣尚書令僕射尚書手版頭復有白筆以紫皮裹之名曰笏皇太子金璽龜鈕朱黃綬四采赤黃縹紺給五時朝服遠遊冠介幘翠緌佩瑜玉垂組朱衣絳紗襮皂緣白紗其中衣白曲領帶劍火珠素首革帶玉鉤燮獸頭鞶囊其大小會祠宗廟朔望五日還朝皆朝服常還上宮則朱服預上宮正會則於殿下脫劍舄又有三梁進賢冠其侍祀則平冕九旒袞衣九章白紗絳緣中單絳繒采畫織成袞帶金辟邪首紫緑二色帶采畫廣領曲領各一赤舄絳襪若講則著介幘單衣釋奠則遠遊冠玄朝服絳緣中單絳袴襪玄舄若未加元服則中舍人執冕從介幘單衣玄服諸王金璽龜鈕纁朱綬四采朱黃縹紺五時朝服遠遊冠介幘亦有三梁進賢冠朱衣絳紗襮皂緣中衣表素革帶黑舄佩山玄玉垂組大帶若加餘官則服其加官之服也皇后謁廟其服皂上皂下親蠶則青上縹下皆深衣制隱領袖緣以絛首飾則假髻步搖俗謂之珠松是也簪珥步搖以黃金為山題貫白珠為支相繆八爵九華熊獸赤羆天鹿辟邪南山豐大特六獸諸爵獸皆以翡翠為毛羽金題白珠璫繞以翡翠為華元康六年詔曰魏以來皇后蠶服皆以文繡非古義也今宜純服青以為永制貴人夫人貴嬪是為三夫人皆金章紫綬章文曰貴人夫人貴嬪之章佩于填玉淑妃淑媛淑儀修華修容修儀婕妤容華充華是為九嬪銀印青綬佩采玉貴人貴嬪夫人助蠶服純縹為上與下皆深衣制太平髻七塔蔽髻黑玳瑁又加簪珥九嬪及公主夫人五塔世婦三塔助蠶之義自古而然矣皇太子妃金璽龜鈕纁朱綬佩瑜玉諸王太妃妃諸長公主公主封君金印紫綬佩山玄玉長公主公主見會太平髻七塔蔽髻其長公主得有步搖皆有簪珥衣服同制自公主封君以上皆帶綬以綵組為緄帶各如其綬色金辟邪首為帶玦郡公侯縣公侯太夫人夫人銀印青綬佩水蒼玉其特加乃金紫公特進侯卿校世婦中二千石二千石夫人紺繒幗黃金龍首銜白珠魚須擲長一尺為簪珥入廟佐祭者皂絹上下助蠶者縹絹上下皆深衣制緣自二千石夫人以上至皇后皆以蠶衣為朝服
