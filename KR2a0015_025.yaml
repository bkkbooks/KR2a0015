body:
  text: 晉書卷二十五志第十五輿服史臣曰昔者乘雲效駕卷領垂衣則黃帝皂衣纁裳放勳彤車白馬叶三微之序舍寅丑之建玄戈玉刃作會相暉若乃參旗分景帝車含曜又所以營衛南宮增華北極月令季夏之月命婦官染綵赬丹班次各有品章矣高旗有日月之象式視有威儀之選衣兼鞙珮衡載鳴和是以間邪屏棄不可入也若乃正名百物補緝四維疏懷山之水靜傾天之害功尤彰者飾彌煥德愈盛者服彌尊莫不質良用成其美書曰明試以功車服以庸禮記曰鸞車有虞氏之路也鉤車夏后氏之路也大路殷路也乘路周路也而韍火山龍以通其意前史以為聖人見鳥獸容貌草木英華始創衣冠而玄黃殊采見秋蓬孤轉杓觿旁建乃作輿輪而方圓異則遇物成象觸類興端周因於殷其來已舊成王之會壇垂陰羽五方之盛有八十物者焉宗馬鳥旌奚往不格殷公曹叔此焉低首周禮巾車氏建大赤以朝大白以戎雅制弘多式遵遺範賓入異憲師行殊則是以有嚴有翼用光其武鉤膺鞗革乃暢其文六服之冕五時之路王之常制各有等差逮禮業雕訛人情馳爽諸侯征伐憲度淪亡一紫亂於齊飾長纓混於鄒玩孔子曰君子其學也博其服也鄉若乃豪傑不經庶人干典彯鷸冠於鄭伯之門躡珠履於春申之第及秦皇并國攬其餘軌豐貂東至獬豸南來又有玄旗皂旒之制旄頭罕車之飾寫九王之廷於咸陽北坂車輿之綵各樹其文所謂秦人大備而陳戰國之後車者也及凝脂布網經書咸燼削滅三代以金根為帝軫除棄六冕以袀玄為祭服高祖入關既因秦制世宗挺英雄之略總文景之資揚霓拂翳皮軒記鼓橫汾河而祠后土登甘泉而祭昊天奉常獻儀謂之大駕車千乘而騎萬匹至於成帝以幸姬趙飛燕置屬車間豹尾中又楊雄所謂彏天狼之威弧張曜日之靈旄駢羅列布霧集雲合者也於後王氏擅朝武車常軔赤眉之亂文物無遺建武十三年吳漢平蜀始送葆車輿輦充庭之飾漸以周備明帝採周官禮記更服袞章天子冠通天而佩玉璽魏明以黼黻之美有疑於僭於是隨章儐略而損者半焉高堂隆奏曰改正朔殊徽號者帝王所以神明其政變民耳目也帝從其議改青龍五年為景初元年服色尚黃從地正也世祖武皇帝接天人之貺開典午之基受終之禮皆如唐虞故事晉氏金行而服色尚赤豈有司失其傳歟玉金象革木等路是為五路並天子之法車皆朱班漆輪畫為文三十輻法月之數重轂二轄以赤油廣八寸長三尺注地繫兩軸頭謂之飛軨金薄繆龍之為輿倚較較重為文獸伏軾龍首銜軛左右吉陽筒鸞雀立衡文畫轅及轓青蓋黃為𩹉謂之黃屋金華施橑末橑二十八以象宿兩箱之後皆玳瑁為鵾翅加以金銀雕飾故世人亦謂之金鵾車斜注旗旗於車之左又加棨戟於車之右皆橐而施之棨戟韜以黻繡上為亞字繫大蛙蟆幡軛長丈餘於戟之杪以氂牛尾大如斗置左騑馬軛上是為左纛轅皆曲向上取禮緯山車垂句之義言不揉而能自曲玉金象三路各以其物飾車因以為名革者漆革木者漆木其制玉路最尊建太常十有二旒九仞委地畫日月升龍以祀天金路建大旗九旒以會萬國之賓亦以賜上公及王子母弟象路建大赤通赤無畫所以視朝亦以賜諸侯革路建大白以即戎兵事亦以賜四鎮諸侯木路建大麾以田獵其麾色黑亦以賜藩國玉路駕六黑馬餘四路皆駕四馬馬並以黃金為文髦插以翟尾象鑣而鏤鍚鍚在馬面所謂當顱者也金而方釳金謂以金為文釳以鐵為之其大三寸中央兩頭高如山形貫中以翟尾而結著之也繁纓赤罽易茸金就十有二繁纓馬飾纓在馬膺前如索五路皆有鍚鸞之飾和鈴之響鉤膺玉瓖鉤膺即繁纓也瓖馬帶玦名也龍輈華轙輈車轅也頭為龍象轙謂車衡上環受鸞者也朱幩幩飾也人君以朱纏鑣扇汗以為飾也法駕行則五路各有所主不俱出臨軒大會則陳乘輿車輦旌鼓於其殿庭車坐乘者謂之安車倚乘者謂之立車亦謂之高車案周禮惟王后有安車也王亦無之自漢以來制乘輿乃有之有青立車青安車赤立車赤安車黃立車黃安車白立車白安車黑立車黑安車合十乘名為五時車俗謂之五帝車天子所御則駕六其餘並駕四建旗十二各如車色立車則正豎其旗安車則邪注駕馬馬亦各隨五時之色白馬則朱其䐥尾左右騑驂金鏤鍚黃屋左纛如金根之制行則從後五牛旗平吳後所造以五牛建旗車設五牛青赤在左黃在中白黑在右豎旗於牛背行則使人輿之牛之為義蓋取其負重致遠而安穩也旗常纏不舒所謂德車結旌也天子親戎則舒謂武車綏旌也金根車駕四馬不建旗幟其上如畫輪車下猶金根之飾耕根車駕四馬建赤旗十有二旒天子親耕所乘者也一名芝車一名三蓋車置耒耜於軾上魏景初元年改正朔易服色色尚黃牲用白戎事乘黑首白馬建大赤之旗朝會則建大白行殷之時也泰始二年有司奏宜如有虞遵唐故事皆用前代正朔服色其金根耕根車並以建赤旗帝從之輦案自漢以來為人君之乘魏晉御小出即乘之戎車駕四馬天子親戎所乘者也載金鼓羽旗幢翳置弩於軾上其建矛麾悉斜注獵車駕四馬天子校獵所乘也重輞漫輪繆龍繞之一名闒戟車一名踏猪車魏文帝改名踏獸車記云國君不乘奇車奇車亦獵車也古天子獵則乘木輅後人代以獵車也遊車九乘駕四先驅之乘是也雲罕車駕四皮軒車駕四以獸皮為軒鸞旗車駕四先輅所載也鸞旗者謂析羽旄而編之列繫幢傍也建華車駕四凡二乘行則分居左右輕車駕二古之戰車也前後二十乘分居左右輿輪洞朱不巾不蓋建矛戟麾幢置弩箙於軾上大駕法駕出射聲校尉司馬吏士戰士載以次屬車司南車一名指南車駕四馬其下制如樓三級四角金龍銜羽葆刻木為仙人衣羽衣立車上車雖回運而手常南指大駕出行為先啓之乘記里鼓車駕四形制如司南其中有木人執槌向鼓行一里則打一槌羊車一名輦車其上如軺伏兔箱漆畫輪軛武帝時護軍羊琇輒乘羊車司隸劉毅糾劾其罪畫輪車駕牛以綵漆畫輪轂故名曰畫輪車上起四夾杖左右開四望緑油幢朱絲絡青交路其上形制事事如輦其下猶如犢車耳古之貴者不乘牛車漢武帝推恩之末諸侯寡弱貧者至乘牛車其後稍見貴之自靈獻以來天子至士遂以為常乘至尊出朝堂舉哀乘之屬車一曰副車一曰二車一曰左車漢因秦制大駕屬車八十一乘行則中央左右分為行法駕屬車三十六乘最後車懸豹尾豹尾以前比之省中屬車皆皂蓋朱𩹉云御衣車御書車御軺車御藥車皆駕牛陽遂四望繐窗皂輪小形車駕牛象車漢鹵簿最在前武帝太康中平吳後南越獻馴象詔作大車駕之以載黃門鼓吹數十人使越人騎之元正大會駕象入庭中朝大駕鹵簿先象車鼓吹一部十三人中道次靜室令駕一中道式道候二人駕一分左右也次洛陽尉二人騎分左右次洛陽亭長九人赤車駕一分三道各吹正二人引次洛陽令皂車駕一中道次河南中部掾中道河橋掾在左功曹史在右並駕一次河南尹駕駟戟吏六人次河南主簿駕一中道次河南主記駕一中道次司隸部河南從事中道都部從事居左別駕從事居右並駕一次司隸校尉駕三戟吏八人次司隸主簿駕一中道次司隸主記駕一中道次廷尉明法掾中道五官掾居左功曹史居右並駕一次廷尉卿駕駟戟吏六人次廷尉主簿主記並駕一在左太僕引從如廷尉在中宗正引從如廷尉在右次太常駕駟中道戟吏六人太常外部掾居左五官掾功曹史居右並駕一次光祿引從中道太常主簿主記居左衛尉引從居右並駕一次太尉外督令史駕一中道次西東賊倉戶等曹屬並駕一引從次太尉駕駟中道太尉主簿舍人各一人祭酒二人並駕一在左次司徒引從駕駟中道次司空引從駕駟中道三公騎令史戟各八人鼓吹各一部七人次中護軍中道駕駟鹵簿左右各二行戟楯在外弓矢在內鼓吹一部七人次步兵校尉在左長水校尉在右並駕一各鹵簿左右二行戟楯在外刀楯在內鼓吹各一部七人次射聲校尉在左翊軍校尉在右並駕一各鹵簿左右各二行戟楯在外刀楯在內鼓吹各一部七人次驍騎將軍在左游擊將軍在右並駕一皆鹵簿左右引各二行戟楯在外刀楯在內鼓吹各一部七人騎隊五在左五在右隊各五十匹命中督二人分領左右各有戟吏二人麾幢獨揭鼓在隊前次左將軍在左前將軍在右並駕一皆鹵簿左右各二行戟楯在外刀楯在內鼓吹各一部七人次黃門麾騎中道次黃門前部鼓吹左右各一部十三人駕駟八校尉佐仗左右各四行外大戟楯次九尺楯次弓矢次弩並熊渠佽飛督領之次司南車駕駟中道護駕御史騎夾左右次謁者僕射駕駟中道次御史中丞駕一中道次武賁中郎將騎中道次九遊車中道武剛車夾左右並駕駟次雲罕車駕駟中道次闒戟車駕駟中道長戟邪偃向後次皮軒車駕駟中道次鸞旗車中道建華車分左右並駕駟次護駕尚書郎三人都官郎中道駕部在左中兵在右並騎又有護駕尚書一人騎督攝前後無常次相風中道次司馬督在前中道左右各司馬史三人引仗左右各六行外大戟楯二行次九尺楯次刀楯次弓矢次弩次五時車左右有遮列騎次典兵中郎中道督攝前却無常左殿中御史右殿中監並騎次高蓋中道左罼右罕次御史中道左右節郎各四人次華蓋中道次殿中司馬中道殿中都尉在左殿中校尉在右左右各四行細楯一行在弩內又殿中司馬一行殿中都尉一行殿中校尉一行次勉鼓中道次金根車駕六馬中道太僕卿御大將軍參乘左右又各增三行為九行司馬史九人引大戟楯二行九尺楯一行刀楯一行由基一行細弩一行跡禽一行椎斧一行力人刀楯一行連細楯殿中司馬殿中都尉殿中校尉為左右各十二行金根車建青旗十二左將軍騎在左右將軍騎在右殿中將軍持鑿侊斧夾車車後衣書主職步從六行合左右三十二行次曲華蓋中道侍中散騎常侍黃門侍郎並騎分左右次黃鉞車駕一在左御麾騎在右次相風中道次中書監騎左袐書監騎右次殿中御史騎左殿中監騎右赤青在左黃在中白黑在右次大輦中道太官令丞在左太醫令丞在右次五牛旗赤青在左黃在中白黑在右次大輦中道太官令丞在左太醫令丞在右次金根車駕駟不建旗次青立車次青安車次赤立車次赤安車次黃立車次黃二熊渠督左佽飛督右次御軺車次御四望車次御衣車次御書車次御藥車並駕牛中道次尚書令在左尚書僕射在右又尚書郎六人分次左右並駕又治書侍御史二人分左右又侍御史二人分次左右又蘭臺令史分次左右並騎次豹尾車駕一自豹尾車後而鹵簿盡矣但以神弩二十張夾道至後部鼓吹其五張神弩置一將左右各二將次輕車二十乘左右分駕次流蘇馬六十匹次金鉞車駕三中道左右護駕尚書郎并令史並騎各一人次金鉦車駕三中道左右護駕侍御史并令史等並騎各一人次黃門後部鼓吹左右各十三人次戟鼓車駕牛二乘分左右次左大鴻臚外部掾右五官掾功曹史並駕次大鴻臚駕駟鉞吏六人次大司農引從中道左大鴻臚主簿主記右少府引從次三卿並騎吏四人鈴下二人執馬鞭辟車六人執方扇羽林十人朱衣次領軍將軍中道鹵簿左右各二行九尺楯在外弓矢在內鼓吹如護軍次後軍將軍在左右將軍在右各鹵簿鼓吹如左軍前軍次越騎校尉在左屯騎校尉在右各鹵簿鼓吹如步兵射聲次領護驍騎游軍校尉皆騎吏四人乘馬夾道都督兵曹各一人乘馬在中騎將軍四人騎校鞉角金鼓鈴下信幡軍校並駕一功曹吏主簿並騎