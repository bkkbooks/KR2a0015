body:
  text: 晉書卷八十列傳第五十王羲之子玄之凝之徽之徽之子楨之徽之弟操之獻之許邁王羲之字逸少司徒導之從子也祖正尚書郎父曠淮南太守元帝之過江也曠首創其議羲之幼訥於言人未之奇年十三嘗謁周顗顗察而異之時重牛心炙坐客未噉顗先割啖羲之於是始知名及長辨贍以骨鯁稱尤善隸書為古今之冠論者稱其筆勢以為飄若浮雲矯若驚龍深為從伯敦導所器重時陳留阮裕有重名為敦主簿敦嘗謂羲之曰汝是吾家佳子弟當不減阮主簿裕亦目羲之與王承王悅為王氏三少時太尉郗鑒使門生求女壻於導導令就東廂遍觀子弟門生歸謂鑒曰王氏諸少並佳然聞信至咸自矜持惟一人在東牀坦腹食獨若不聞鑒曰正此佳壻邪訪之乃羲之也遂以女妻之起家祕書郎征西將軍庾亮請為參軍纍遷長史亮臨薨上疏稱羲之清貴有鑒裁遷寧遠將軍江州刺史羲之既少有美譽朝廷公卿皆愛其才器頻召為侍中吏部尚書皆不就復授謢軍將軍又推遷不拜揚州刺史殷浩素雅重之勸使應命乃遺羲之書曰悠悠者以足下出處足觀政之隆替如吾等亦謂為然至如足下出處正與隆替對豈可以一世之存亡必從足下從容之適幸徐求衆心卿不時起復可以求美政不若豁然開懷當知萬物之情也羲之遂報書曰吾素自無廊廟志直王丞相時果欲內吾誓不許之手迹猶存由來尚矣不於足下參政而方進退自兒娶女嫁便懷尚子平之志數與親知言之非一日也若蒙驅使關隴巴蜀皆所不辭吾雖無專對之能直謹守時命宣國家威德固當不同於凡使必令遠近咸知朝廷留心於無外此所益殊不同居護軍也漢末使太傅馬日磾慰撫關東若不以吾輕微無所為疑宜及初冬以行吾惟恭以待命羲之既拜護軍又苦求宣城郡不許乃以為右軍將軍會稽內史時殷浩與桓溫不協羲之以國家之安在於內外和因以與浩書以戒之浩不從及浩將北伐義之以為必敗以書止之言甚切至浩遂行果為姚襄所敗復圖再舉又遺浩書曰知安西敗喪公私惋怛不能須臾去懷以區區江左所營綜如此天下寒心固以久矣而加之敗喪此可熟念往事豈復可追願思弘將來令天下寄命有所自隆中興之業政以道勝寬和為本力爭武功作非所當因循所長以固大業想識其由來也自寇亂以來處內外之任者未有深謀遠慮括囊至計而疲竭根本各從所志竟無一功可論一事可記忠言嘉謀棄而莫用遂令天下將有土崩之勢何能不痛心悲慨也任其事者豈得辭四海之責追咎往事亦何所復及宜更虛己求賢當與有識共之不可復令忠允之言常屈於當權今軍破於外資竭於內保淮之志非復所及莫過還保長江都督將各復舊鎮自長江以外羈縻而已任國鈞者引咎責躬深自貶降以謝百姓更與朝賢思布平政除其煩苛省其賦役與百姓更始庶可以允塞羣望救倒懸之急使君起於布衣任天下之重尚德之舉未能事事允稱當董統之任而敗喪至此恐闔朝羣賢未有與人分其謗者今亟修德補闕廣延羣賢與之分任尚未知獲濟所期若猶以前事為未工故復求之於分外宇宙雖廣自容何所知言不必用或取怨執政然當情慨所在正自不能不盡懷極言若必親征未達此旨果行者愚智所不解也願復與衆共之復被州符增運千石徵役兼至皆以軍期對之喪氣罔知所厝自頃年割剝遺黎刑徒竟路殆同秦政惟未加參夷之刑耳恐勝廣之憂無復日矣又與會稽王箋陳浩不宜北伐并論時事曰古人恥其君不為堯舜北面之道豈不願尊其所事比隆往代況遇千載一時之運顧智力屈於當年何得不權輕重而處之也今雖有可欣之會內求諸己而所憂乃重於所欣傳云自非聖人外寧必有內憂今外不寧內憂已深古之弘大業者或不謀於衆傾國以濟一時功者亦往往而有之誠獨運之明足以邁衆暫勞之弊終獲永逸者可也求之於今可得擬議乎夫廟算決勝必宜審量彼我萬全而後動功就之日便當因其衆而即其實今功未可期而遺黎殲盡萬不餘一且千里饋糧自古為難況今轉運供繼西輸許洛北入黃河雖秦政之弊未至於此而十室之憂便以交至今運無還期徵求日重以區區吳越經緯天下十分之九不亡何待而不度德量力不弊不已此封內所痛心歎悼而莫敢吐誠往者不可諫來者猶可追願殿下更垂三思解而更張令殷浩荀羡還據合肥廣陵許昌譙郡梁彭城諸軍皆還保淮為不可勝之基須根立勢舉謀之未晚此實當今策之上者若不行此社稷之憂可計日而待安危之機易於反掌考之虛實著於目前願運獨斷之明定之於一朝也地淺而言深豈不知其未易然古人處閭閻行陳之間尚或干時謀國評裁者不以為譏況廁大臣末行豈可默而不言哉存亡所係決在行之不可復持疑後機不定之於此後欲悔之亦無及也殿下德冠宇內以公室輔朝最可直道行之致隆當年而未允物望受殊遇者所以寤寐長歎實為殿下惜之國家之慮深矣常恐伍員之憂不獨在昔麋鹿之遊將不止林藪而已願殿下暫廢虛遠之懷以救倒懸之急可謂以亡為存轉禍為福則宗廟之慶四海有賴矣時東土飢荒羲之輒開倉振貸然朝廷賦役繁重吳會尤甚羲之每上疏爭之事多見從又遺尚書僕射謝安書曰頃所陳論每蒙允納所以令下小得蘇息各安其業若不耳此一郡久以蹈東海矣今事之大者未布漕運是也吾意望朝廷可申下定期委之所司勿復催下但當歲終考其殿最長吏尤殿命檻車送詣天臺三縣不舉二千石必免或可左降令在疆塞極難之地又自吾到此從事常有四五兼以臺司及都水御史行臺文符如雨倒錯違背不復可知吾又瞑目循常推前取重者及綱紀輕者在五曹主者涖事未嘗得十日吏民趨走功費萬計卿方任其重可徐尋所言江左平日揚州一良刺史便足統之況以羣才而更不理正由為法不一牽制者衆思簡而易從便足以保守成業倉督監耗盜官米動以萬計吾謂誅翦一人其後便斷而時意不同近檢校諸縣無不皆爾餘姚近十萬斛重斂以資姦吏令國用空乏良可歎也自軍興以來征役及充運死亡叛散不反者衆虛耗至此而補代循常所在凋困莫知所出上命所差上道多叛則吏及叛者席卷同去又有常制輒令其家及同伍課捕課捕不擒家及同伍尋復亡叛百姓流亡戶口日減其源在此又有百工醫寺死亡絶沒家戶空盡差代無所上命不絶事起或十年十五年彈舉獲罪無懈息而無益實事何以堪之謂自今諸死罪原輕者及五歲刑可以充此其減死者可長充兵役五歲者可充雜工醫寺皆令移其家以實都邑都邑既實是政之本又可絶其亡叛不移其家逃亡之患復如初耳今除罪而充雜役盡移其家小人愚迷或以為重於殺戮可以絶姦刑名雖輕懲肅實重豈非適時之宜邪羲之雅好服食養性不樂在京師初渡浙江便有終焉之志會稽有佳山水名士多居之謝安未仕時亦居焉孫綽李充許詢支遁等皆以文義冠世並築室東土與羲之同好嘗與同志宴集於會稽山陰之蘭亭羲之自為之序以申其志曰永和九年歲在癸丑暮春之初會于會稽山陰之蘭亭修禊事也羣賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管絃之盛一觴一詠亦足以暢幽情是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以遊目騁懷足以極視聽之娛信可樂也夫人之相與俯仰一世或取諸懷抱悟言一室之內或因寄所託放浪形骸之外雖趣舍萬殊靜躁不同當其欣於所遇暫得於己快然自足不知老之將至及其所之既倦情隨事遷感慨係之矣向之所欣俯仰之間已為陳迹猶不能不以之興懷況修短隨化終期於盡古人云死生亦大矣豈不痛哉每覽昔人興感之由若合一契未嘗不臨文嗟悼不能喻之於懷固知一死生為虛誕齊彭殤為妄作後之視今亦猶今之視昔悲夫故列時人録其所述雖世殊事異所以興懷其致一也後之覽者亦將有感於斯文或以潘嶽金谷詩序方其文羲之比於石崇聞而甚喜性愛鵝會稽有孤居姥養一鵝善鳴求市未能得遂攜親友命駕就觀姥聞羲之將至烹以待之羲之歎惜彌日又山陰有一道士養好鵝羲之往觀焉意甚悅固求市之道士云為寫道德經當舉羣相贈耳羲之欣然寫畢籠鵝而歸甚以為樂其任率如此嘗詣門生家見棐几滑淨因書之真草相半後為其父誤刮去之門生驚懊者纍日又嘗在蕺山見一老姥持六角竹扇賣之羲之書其扇各為五字姥初有慍色因謂姥曰但言是王右軍書以求百錢邪姥如其言人競買之他日姥又持扇來羲之笑而不答其書為世所重皆此類也每自稱我書比鍾繇當抗行比張芝草猶當雁行也曾與人書云張芝臨池學書池水盡黑使人耽之若是未必後之也羲之書初不勝庾翼郗愔及其暮年方妙嘗以章草答庾亮而翼深歎伏因與羲之書云吾昔有伯英章草十紙過江顛狽遂乃亡失常歎妙迹永絶忽見足下答家兄書煥若神明頓還舊觀時驃騎將軍王述少有名譽與羲之齊名而羲之甚輕之由是情好不協述先為會稽以母喪居郡境羲之代述止一弔遂不重詣述每聞角聲謂羲之當候己輒灑掃而待之如此者纍年而羲之竟不顧述深以為恨及述為揚州刺史將就徵周行郡界而不過羲之臨發一別而去先是羲之常謂賓友曰懷祖正當作尚書耳投老可得僕射更求會稽便自邈然及述蒙顯授羲之恥為之下遣使詣朝廷求分會稽為越州行人失辭大為時賢所笑既而內懷愧歎謂其諸子曰吾不減懷祖而位遇懸邈當由汝等不及坦之故邪述後檢察會稽郡辨其刑政主者疲於簡對羲之深恥之遂稱病去郡於父母墓前自誓曰維永和十一年三月癸卯朔九日辛亥小子羲之敢告二尊之靈羲之不天夙遭閔凶不蒙過庭之訓母兄鞠育得漸庶幾遂因人乏蒙國寵榮進無忠孝之節退違推賢之義每仰詠老氏周任之誡常恐死亡無日憂及宗祀豈在微身而已是用寤寐永歎若墮深谷止足之分定之於今謹以今月吉辰肆筵設席稽顙歸誠告誓先靈自今之後敢渝此心貪冒苟進是有無尊之心而不子也子而不子天地所不覆載名教所不得容信誓之誠有如皎日羲之既去官與東土人士盡山水之遊弋釣為娛又與道士許邁共修服食採藥石不遠千里遍遊東中諸郡窮諸名山泛滄海歎曰我卒當以樂死謝安嘗謂羲之曰中年以來傷於哀樂與親友別輒作數日惡羲之曰年在桑榆自然至此頃正賴絲竹陶寫恐兒輩覺損其歡樂之趣朝廷以其誓苦亦不復徵之時劉惔為丹楊尹許詢嘗就惔宿牀帷新麗飲食豐甘詢曰若此保全殊勝東山惔曰卿若知吉凶由人吾安得保此羲之在坐曰令巢許遇稷契當無此言二人並有愧色初羲之既優遊無事與吏部郎謝萬書曰古之辭世者或被髮陽狂或樜身穢迹可謂艱矣今僕坐而獲逸遂其宿心其為慶幸豈非天賜違天不祥頃東遊還修植桑果今盛敷榮率諸子抱弱孫遊觀其間有一味之甘割而分之以娛目前雖植德無殊邈猶欲教養子孫以敦厚退讓或以輕薄庶令舉策數馬倣佛萬石之風君謂此何如比當與安石東遊山海并行田視地利頤養間暇衣食之餘欲與親知時共歡宴雖不能興言高詠銜杯引滿語田里所行故以為撫掌之資其為得意可勝言邪常依陸賈班嗣楊王孫之處世甚欲希風數子老夫志願盡於此也萬後為豫州都督又遺萬書誡之曰以君邁往不屑之韻而俯同羣辟誠難為意也然所謂通識正自當隨事行藏乃為遠耳願君每與士之下者同則盡善矣食不二味居不重席此復何有而古人以為美談濟否所由實在積小以致高大君其存之萬不能用果敗年五十九卒贈金紫光祿大夫諸子遵父先旨固讓不受有七子知名者五人玄之早卒次凝之亦工草隸仕歷江州刺史左將軍會稽內史王氏世事張氏五斗米道凝之彌篤孫恩之攻會稽僚佐請為之備凝之不從方入靖室請禱出語諸將佐曰吾已請大道許鬼兵相助賊自破矣既不設備遂為孫恩所害徽之字子猷性卓犖不羈為大司馬桓溫參軍蓬首散帶不綜府事又為車騎桓沖騎兵參軍沖問卿署何曹對曰似是馬曹又問管幾馬曰不知馬何由如數又問馬比死多少曰未知生焉知死嘗從沖行值暴雨徽之因下馬排入車中謂曰公豈得獨擅一車沖嘗謂徽之曰卿在府日久比當相料理徽之初不酬答直高視以手版柱頰云西山朝來致有爽氣耳時吳中一士大夫家有好竹欲觀之便出坐輿造竹下諷嘯良久主人灑掃請坐徽之不顧將出主人乃閉門徽之便以此賞之盡歡而去嘗寄居空宅中便令種竹或問其故徽之但嘯詠指竹曰何可一日無此君邪嘗居山陰夜雪初霽月色清朗四望皓然獨酌酒詠左思招隱詩忽憶戴逵逵時在剡便夜乘小船詣之經宿方至造門不前而反人問其故徽之曰本乘興而行興盡而反何必見安道邪雅性放誕好聲色嘗夜與弟獻之共讀高士傳讚獻之賞井丹高潔徽之曰未若長卿慢世也其達若此時人皆欽其才而穢其行後為黃門侍郎棄官東歸與獻之俱病篤時有術人云人命應終而有生人樂代者則死者可生徽之謂曰吾才位不如弟請以餘年代之術者曰代死者以己年有餘得以足亡者耳今君與弟算俱盡何代也未幾獻之卒徽之奔喪不哭直上靈牀坐取獻之琴彈之久而不調歎曰嗚呼子敬人琴俱亡因頓絶先有背疾遂潰裂月餘亦卒子楨之楨之字公幹歷位侍中大司馬長史桓玄為太尉朝臣畢集問楨之我何如君亡叔在坐咸為氣咽楨之曰亡叔一時之標公是千載之英一坐皆悅操之字子重歷侍中尚書豫章太守獻之字子敬少有盛名而高邁不羈雖間居終日容止不怠風流為一時之冠年數歲嘗觀門生摴蒱曰南風不競門生曰此郎亦管中窺豹時見一班獻之怒曰遠慚荀奉倩近愧劉真長遂拂衣而去嘗與兄徽之操之俱詣謝安二兄多言俗事獻之寒溫而已既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡以其少言故知之嘗與徽之共在一室忽然火發徽之遽走不遑取履獻之神色恬然徐呼左右扶出夜臥齋中而有偷人入其室盜物都盡獻之徐曰偷兒青氈我家舊物可特置之羣偷驚走工草隸善丹青七八歲時學書羲之密從後掣其筆不得歎曰此兒後當復有大名嘗書壁為方丈大字羲之甚以為能觀者數百人桓溫嘗使書扇筆誤落因畫作烏駮牸牛甚妙起家州主簿祕書郎轉丞以選尚新安公主嘗經吳郡聞顧辟強有名園先不相識乘平肩輿徑入時辟強方集賓友而獻之遊歷既畢傍若無人辟強勃然數之曰主人非禮也以貴驕士非道也失是二者不足齒之傖耳便驅出門獻之如也不以屑意謝安甚欽愛之請為長史安進號衛將軍復為長史太元中新起太極殿安欲使獻之題榜以為萬代寶而難言之試謂曰魏時陵雲殿榜未題而匠者誤釘之不可下乃使韋仲將懸橙書之比訖鬚鬢盡白裁餘氣息還語子弟宜絶此法獻之揣知其旨正色曰仲將魏之大臣寧有此事使其若此有以知魏德之不長安遂不之逼安又問曰君書何如君家尊答曰故當不同安曰外論不爾答曰人那得知尋除建威將軍吳興太守徵拜中書令及安薨贈禮有同異之議惟獻之徐邈共明安之忠勳獻之乃上疏曰故太傅臣安少振玄風道譽洋溢弱冠遐棲則契齊箕皓應運釋褐而王猷允塞及至載宣威靈強猾消殄功勳既融投韍高讓且服事先帝眷隆布衣陛下踐阼陽秋尚富盡心竭智以輔聖明考其潛躍始終事情繾綣實大晉之俊輔義篤於曩臣矣伏惟陛下留心宗臣澄神於省察孝武帝遂加安殊禮未幾獻之遇疾家人為上章道家法應首過問其有何得失對曰不覺餘事惟憶與郗家離婚獻之前妻郗曇女也俄而卒於官安僖皇后立以后父追贈侍中特進光祿大夫太宰諡曰憲無子以兄子靜之嗣位至義興太守時議者以為羲之草隸江左中朝莫有及者獻之骨力遠不及父而頗有媚趣桓玄雅愛其父子書各為一帙置左右以玩之始羲之所與共遊者許邁許邁字叔玄一名映丹楊句容人也家世士族而邁少恬靜不慕仕進未弱冠嘗造郭璞璞為之筮遇泰之大畜其上六爻發璞謂曰君元吉自天宜學升遐之道時南海太守鮑靚隱迹潛遁人莫之知邁乃往候之探其至要父母尚存未忍違親謂餘杭懸霤山近延陵之茅山是洞庭西門潛通五嶽陳安世茅季偉常所遊處於是立精舍於懸霤而往來茅嶺之洞室放絶世務以尋仙館朔望時節還家定省而已父母既終乃遣婦孫氏還家遂攜其同志遍遊名山焉初採藥於桐廬縣之桓山餌朮涉三年時欲斷穀以此山近人不得專一四面藩之好道之徒欲相見者登樓與語以此為樂常服氣一氣千餘息永和二年移入臨安西山登巖茹芝眇爾自得有終焉之志乃改名玄字遠遊與婦書告別又著詩十二首論神仙之事焉羲之造之未嘗不彌日忘歸相與為世外之交玄遺羲之書云自山陰南至臨安多有金堂玉室仙人芝草左元放之徒漢末諸得道者皆在焉羲之自為之傳述靈異之迹甚多不可詳記玄自後莫測所終好道者皆謂之羽化矣制曰書契之興肇乎中古繩文鳥迹不可足觀末代去朴歸華舒箋點翰爭相誇尚競其工拙伯英臨池之妙無復餘蹤師宜懸帳之奇罕有遺迹逮乎鍾王以降略可言焉鍾雖擅美一時亦為迥絶論其盡善或有所疑至於布纖濃分疏密霞舒雲卷無所間然但其體則古而不今字則長而逾制語其大量以此為瑕獻之雖有父風殊非新巧觀其字勢疏瘦如隆冬之枯樹覽其筆蹤拘束若嚴家之餓隸其枯樹也雖槎枿而無屈伸其餓隸也則羈羸而不放縱兼斯二者故翰墨之病歟子雲近出擅名江表然僅得成書無丈夫之氣行行若縈春蚓字字如綰秋蛇臥王濛於紙中坐徐偃於筆下雖禿千兔之翰聚無一毫之筋窮萬穀之皮斂無半分之骨以茲播美非其濫名邪此數子者皆譽過其實所以詳察古今研精篆素盡善盡美其惟王逸少乎觀其點曳之工裁成之妙煙霏露結狀若斷而還連鳳翥龍蟠勢如斜而反直玩之不覺為倦覽之莫識其端心慕手追此人而已其餘區區之類何足論哉
