body:
  text: 晉書卷九十二列傳第六十二文苑夫文以化成惟聖之高義行而不遠前史之格言是以溫洛禎圖綠字符其丕業苑山靈篆金簡成其帝載既而書契之道聿興鍾石之文逾廣移風俗於王化崇孝敬於人倫經緯乾坤彌綸中外故知文之時義大哉遠矣洎姬曆云季歌頌滋繁荀宋之流導源自遠總金羈而齊騖揚玉軑而並馳言泉會於九流文律諧於六變自時已降軌躅同趨西都賈馬耀靈蛇於掌握東漢班張發雕龍於綈槧俱標稱首咸推雄伯逮乎當塗基命文宗鬱起三祖叶其高韵七子分其麗則翰林總其菁華典論詳其藻絢彬蔚之美競爽當年獨彼陳王思風遒舉備乎典奧懸諸日月及金行纂極文雅斯盛張載擅銘山之美陸機挺焚研之奇潘夏連輝頡頏名輩並綜採繁縟杼軸清英窮廣內之青編緝平臺之麗曲嘉聲茂迹陳諸別傳至於吉甫太沖江右之才傑曹毗庾闡中興之時秀信乃金相玉潤林薈川沖埒美前修垂裕來葉今撰其鴻筆之彥著之文苑云應貞應貞字吉甫汝南南頓人魏侍中璩之子也自漢至魏世以文章顯軒冕相襲為郡盛族貞善談論以才學稱夏侯玄有盛名貞詣玄玄甚重之舉高第頻歷顯位武帝為撫軍大將軍以為參軍及踐阼遷給事中帝於華林園宴射貞賦詩最美其辭曰悠悠太上人之厥初皇極肇建彝倫攸敷五德更運應錄受符陶唐既謝天曆在虞於時上帝乃顧惟眷光我晉祚應期納禪位以龍飛文以豹變玄澤滂流仁風潛扇區內宅心方隅迴面天垂其象地耀其文鳳鳴朝陽龍翔景雲嘉禾重穎蓂莢載芬率土咸寧人胥悅欣恢恢皇度穆穆聖容言思其允貌思其恭在視斯明在聽斯聰登庸以德明試以功其恭惟何昧旦丕顯無義不經無理不踐行舍其華言去其辯游心至虛同規易簡六府孔修九有來踐澤罔不被化莫不加聲教南暨西漸流沙幽人肆險遠國忘遐越常重譯充牣皇家峨峨列辟赫赫武臣內和五品外威四賓順時貢職入覲天人備言錫命羽蓋朱輪貽宴好會不常厥數神心所授不言而喻於時肆射弓矢斯具發彼互的有酒斯飫文武之道厥猷未墜在昔先王射御茲器示武懼荒過則有失凡厥羣后無懈于位初置太子中庶子官貞與護軍長史孔恂俱為之後遷散騎常侍以儒學與太尉荀顗撰定新禮未施行泰始五年卒文集行於世弟純純子紹永嘉中至黃門郎為東海王越所害純弟秀秀子詹自有傳成公綏成公綏字子安東郡白馬人也幼而聰敏博涉經傳性寡欲不營資產家貧歲飢常晏如也少有俊才詞賦甚麗閑默自守不求聞達時有孝烏每集其廬舍綏謂有反哺之德以為祥禽乃作賦美之文多不載又以賦者貴能分賦物理敷演無方天地之盛可以致思矣歷觀古人未之有賦豈獨以至麗無文難以辭贊不然何其闕哉遂為天地賦曰惟自然之初載兮道虛無而玄清太素紛以溷淆兮始有物而混成何元一之芒昧兮廓開闢而著形爾乃清濁剖分玄黃判離太極既殊是生兩儀星辰煥列日月重規天動以尊地靜以卑昏明迭炤或盈或虧陰陽協氣而代謝寒暑隨時而推移三才殊性五行異位千變萬化繁育庶類授之以形稟之以氣色表文采聲有音律覆載無方流形品物鼓以雷霆潤以慶雲八風翺翔六氣氤氳蚑行蠕動方聚類分鱗殊族別羽毛異羣各含精而鎔冶咸受範於陶鈞何滋育之罔極兮偉造化之至神若夫懸象成文列宿有章三辰燭燿五緯重光河漢委而帶天虹蜺偃蹇於昊蒼望舒彌節於九道羲和正轡於中黃衆星回而環極招搖運而指方白獸峙據於參伐青龍垂尾於心房玄龜匿首於女虛朱鳥奮翼於注張帝皇正坐於紫宮輔臣列位於文昌垣屏駱驛而珠連三台差池而雁翔軒轅華布而曲列攝提鼎跱而相望若乃徵瑞表祥災變呈異交會薄蝕抱暈帶珥流逆犯歷譴悟象事蓬容著而妖害生老人形而主受喜天矢黃而國吉祥彗孛發而世所忌爾乃旁觀四極俯察地理川瀆浩汗而分流山嶽磊落而羅峙滄海沆漭而四周懸圃隆崇而特起昆吾嘉於南極燭龍曜於北阯扶桑高于萬仞尋木長于千里崑崙鎮於陰隅赤縣據於辰巳於是八十一域區分方別風乖俗異險斷阻絕萬國羅布九州並列青冀白壤荊衡塗泥海岱赤埴華梁青黎兗帶河洛揚有江淮辯方正土經略建邦王圻九服列國一同連城比邑深池高墉康衢交路四達五通東至暘谷西極泰濛南暨丹炮北盡空同遐方外區絕域殊鄰人首蛇軀烏翼龍身衣毛被羽或介或鱗棲林浮水若獸若人居于大荒之外處于巨海之濱於是六合混一而同宅宇宙結體而括囊渾元運流而無窮陰陽循度而率常回動糾紛而乾乾天道不息而自強統羣生而載育人託命於所繫尊太一於上皇奉萬神於五帝故萬物之所宗必敬天而事地若乃共工赫怒天柱摧折東南俄其既傾西北豁而中裂斷鼇足而續毀鍊玉石而補缺豈斯事之有徵將言者之虛設何陰陽之難測偉二儀之奓闊坤厚德以載物乾資始而至大俯盡鑒於有形仰蔽視於所蓋游萬物而極思故一言于天外綏雅好音律嘗當暑承風而嘯泠然成曲因為嘯賦曰逸羣公子體奇好異敖世忘榮絕棄人事希高慕古長想遠思將登箕山以抗節浮滄海以游志於是延友生集同好精性命之至機研道德之玄奧愍流俗之未悟獨超然而先覺狹世路之阨僻仰天衢而高蹈邈跨俗而遺身乃慷慨而長嘯于時曜靈俄景流光濛汜逍遙攜手躊躇步趾發妙聲於丹脣激哀音於皓齒響抑揚而潛轉氣衝鬱而熛起協黃宮於清角雜商羽於流徵飄浮雲於泰清集長風于萬里曲既終而響絕遺餘玩而未已良自然之至音非絲竹之所擬是故聲不假器用不借物近取諸身役心御氣動脣有曲發口成音觸類感物因歌隨吟大而不洿細而不沈清激切於竽笙優潤和於瑟琴玄妙足以通神悟靈精微足以窮幽測深收激楚之哀荒節北里之奢淫濟洪災於炎旱反亢陽於重陰引唱萬變曲用無方和樂怡懌悲傷摧藏時幽散而將絕中矯厲而慨慷徐婉約而優游紛繁騖而激揚情既思而能反心雖哀而不傷總八音之至和固極樂而無荒若乃登高臺以臨遠披文軒而騁望喟仰抃而抗首嘈長引而憀亮或舒肆而自反或徘徊而復放或冉弱而柔撓或澎濞而奔壯橫鬱嗚而滔涸咧繚眺而清昶逸氣奮涌繽紛交錯烈烈飈揚啾啾響作奏胡馬之長思迴寒風乎北朔又似鴻雁之將雛羣鳴號乎沙漠故能因形創聲隨事造曲應物無窮機發響速怫鬱衝流參譚雲屬若離若合將絕復續飛廉鼓於幽隧猛獸應於中谷南箕動於穹蒼清飈振於喬木散滯積而播揚蕩埃靄之溷濁變陰陽於至和移淫風之穢俗若乃游崇岡陵景山臨巖側望流川坐磐石漱清泉藉皐蘭之猗靡蔭修竹之蟬蜎乃吟詠而發歎聲驛驛而響連舒蓄思之悱憤奮久結之纏緜心滌蕩而無累志離俗而飄然若夫假象金革擬則陶匏衆聲繁奏若笳若簫磞硠震隱訇丨嘈發徵則隆冬熙烝騁羽則嚴霜夏凋動商則秋霖春降奏角則谷風鳴條音均不曲無定制行而不流止而不滯隨口吻而發揚假芳氣而遠逝音要妙而流響聲激嚁而清厲信自然之極麗羌殊尤而絕世越韶夏與咸池何徒取異乎鄭衞于時緜駒結舌而喪精王豹杜口而失色虞公輟聲而止歌甯子斂手而歎息鍾期棄琴而改聽尼父忘味而不食百獸率而抃足鳳皇來儀而拊翼乃知長嘯之奇妙此音聲之至極張華雅重綏每見其文歎伏以為絕倫薦之太常徵為博士歷祕書郎轉丞遷中書郎每與華受詔並為詩賦又與賈充等參定法律泰始九年卒年四十三所著詩賦雜筆十餘卷行於世左思左思字太沖齊國臨淄人也其先齊之公族有左右公子因為氏焉家世儒學父雍起小吏以能擢授殿中侍御史思少學鍾胡書及鼓琴並不成雍謂友人曰思所曉解不及我少時思遂感激勤學兼善陰陽之術貌寢口訥而辭藻壯麗不好交遊惟以閑居為事造齊都賦一年乃成復欲賦三都會妹芬入宮移家京師乃詣著作郎張載訪岷邛之事遂構思十年門庭藩溷皆著筆紙遇得一句即便疏之自以所見不博求為祕書郎及賦成時人未之重思自以其作不謝班張恐以人廢言安定皇甫謐有高譽思造而示之謐稱善為其賦序張載為注魏都劉逵注吳蜀而序之曰觀中古以來為賦者多矣相如子虛擅名於前班固兩都理勝其辭張衡二京文過其意至若此賦擬議數家傅辭會義抑多精致非夫研覈者不能練其旨非夫博物者不能統其異世咸貴遠而賤近莫肯用心於明物斯文吾有異焉故聊以餘思為其引詁亦猶胡廣之於官箴蔡邕之於典引也陳留衞權又為思賦作略解序曰余觀三都之賦言不苟華必經典要品物殊類稟之圖籍辭義瓌瑋良可貴也有晉徵士故太子中庶子安定皇甫謐西州之逸士耽籍樂道高尚其事覽斯文而慷慨為之都序中書著作郎安平張載中書郎濟南劉逵並以經學洽博才章美茂咸皆悅玩為之訓詁其山川土域草木鳥獸奇怪珍異僉皆研精所由紛散其義矣余嘉其文不能默已聊藉二子之遺忘又為之略解祇增煩重覽者闕焉自是之後盛重於時文多不載司空張華見而歎曰班張之流也使讀之者盡而有餘久而更新於是豪貴之家競相傳寫洛陽為之紙貴初陸機入洛欲為此賦聞思作之撫掌而笑與弟雲書曰此間有傖父欲作三都賦須其成當以覆酒甕耳及思賦出機絕歎伏以為不能加也遂輟筆焉祕書監賈謐請講漢書謐誅退居宜春里專意典籍齊王冏命為記室督辭疾不就及張方縱暴都邑舉家適冀州數歲以疾終趙至趙至字景真代郡人也寓居洛陽緱氏令初到官至年十三與母同觀母曰汝先世本非微賤世亂流離遂為士伍耳爾後能如此不至感母言詣師受業聞父耕叱牛聲投書而泣師怪問之至曰我小未能榮養使老父不免勤苦師甚異之年十四詣洛陽游太學遇嵇康於學寫石經徘徊視之不能去而請問姓名康曰年少何以問邪曰觀君風器非常所以問耳康異而告之後乃亡到山陽求康不得而還又將遠學母禁之至遂陽狂走三五里輒追得之年十六游鄴復與康相遇隨康還山陽改名浚字允元康每曰卿頭小而銳童子白黑分明有白起之風矣及康卒至詣魏興見太守張嗣宗甚被優遇嗣宗遷江夏相隨到溳川欲因入吳而嗣宗卒乃向遼西而占戶焉初至與康兄子蕃友善及將遠適乃與蕃書離并陳其志曰昔李叟入秦及關而歎梁生適越登嶽長謠夫以嘉遁之舉猶懷戀恨況乎不得已者哉惟別之後離羣獨逝背榮讌辭倫好經迥路造沙漠雞鳴戒旦則飄爾晨征日薄西山則馬首靡託尋歷曲阻則沈思紆結登高遠眺則山川攸隔或乃迴風狂厲白日寢光徙倚交錯陵隰相望徘徊九臯之內慷慨重阜之顛進無所由退無所據涉澤求蹊披榛覓路嘯咏溝渠良不可度斯亦行路之艱難然非吾心之所懼也至若蘭芷傾頓桂林移殖根萌未樹而牙淺弦急每恐風波潛駭危機密發此所以怵惕於長衢也又北土之性難以託根投人夜光鮮不按劍今將殖橘柚於玄朔蔕華藕於修陵表龍章於裸壤奏韶武於聾俗固難以取貴矣夫物不我貴則莫之與莫之與則傷之者至矣飄颻遠游之士託身無人之鄉總轡遐路則有前言之難懸鞍陋宇則有後慮之戒朝霞啟暉則身疲而遄征太陽戢曜則情劬而夕惕肆目平隰則寥廓而無覩極聽修原則掩寂而無聞吁其悲矣心傷瘁矣然後知步驟之士不足為貴也顧景中原憤氣雲踊哀物悼世激情風厲龍嘯大野獸睇六合猛志紛紜雄心四據思躡雲梯橫奮八極披艱掃穢蕩海夷嶽蹴崑崙使西倒蹋太山令東覆平滌九區恢維宇宙斯吾之鄙願也時不我與垂翼遠逝鋒距靡加六翮摧屈自非知命孰能不憤悒者哉吾子殖根芳苑濯秀清流晞葉華崖飛藻雲肆俯據潛龍之渚仰蔭游鳳之林榮曜眩其前艷色餌其後良疇交其左聲名馳其右翱翔倫黨之間弄姿帷房之𩹉從容顧眄綽有餘裕俯仰吟嘯自以為得志矣豈能與吾曹同大丈夫之憂樂哉去矣嵇生遠離隔矣煢煢飄寄臨沙漠矣悠悠三千路難涉矣攜手之期邈無日矣思心彌結誰云釋矣無金玉爾音而有遐心身雖胡越意存斷金各敬爾儀敦履璞沈繁華流蕩君子弗欽臨紙意結知復何云至身長七尺四寸論議精辯有從橫才氣遼西舉郡計吏到洛與父相遇時母已亡父欲令其宦立弗之告仍戒以不歸至乃還遼西幽州三辟部從事斷九獄見稱精審太康中以良吏赴洛方知母亡初至自恥士伍欲以宦學立名期於榮養既而其志不就號憤慟哭歐血而卒時年三十七鄒湛鄒湛字潤甫南陽新野人也父軌魏左將軍湛少以才學知名仕魏歷通事郎太學博士泰始初轉尚書郎廷尉平征南從事中郎深為羊祜所器重入為太子中庶子太康中拜散騎常侍出補渤海太守轉太傅楊駿長史遷侍中駿誅以僚佐免官尋起為散騎常侍國子祭酒轉少府元康末卒所著詩及論事議二十五首為時所重初湛嘗夢見一人自稱甄舒仲餘無所言如此非一久之乃悟曰吾宅西有積土敗瓦其中必有死人甄舒仲者予舍西土瓦中人也檢之果然厚加斂葬葬畢遂夢此人來謝子捷字太應亦有文才永康中為散騎侍郎及趙王倫篡逆捷與陸機等俱作禪文倫誅坐下廷尉遇赦免後為太傅參軍永嘉末卒棗據棗據字道彥潁川長社人也本姓棘其先避仇改焉父叔禕魏鉅鹿太守據美容貌善文辭弱冠辟大將軍府出為山陽令有政績遷尚書郎轉右丞賈充伐吳請為從事中郎軍還徙黃門侍郎冀州刺史太子中庶子太康中卒時年五十餘所著詩賦論四十五首遇亂多亡失子腆字玄方亦以文章顯永嘉中為襄城太守弟嵩字臺產才藝尤美為太子中庶子散騎常侍為石勒所殺褚陶褚陶字季雅吳郡錢塘人也弱不好弄少而聰慧清淡閑默以墳典自娛年十三作鷗鳥水磑二賦見者奇之陶嘗謂所親曰聖賢備在黃卷中捨此何求州郡辟不就吳平召補尚書郎張華見之謂陸機曰君兄弟龍躍雲津顧彥先鳳鳴朝陽謂東南之寶已盡不意復見褚生機曰公但未覩不鳴不躍者耳華曰故知延州之德不孤川嶽之寶不匱矣遷九真太守轉中尉年五十五卒王沈王沈字彥伯高平人也少有俊才出於寒素不能隨俗沈浮為時豪所抑仕郡文學掾鬱鬱不得志乃作釋時論其辭曰東野丈人觀時以居隱耕汙腴之墟有冰氏之子者出自沍寒之谷過而問塗丈人曰子奚自曰自涸陰之鄉奚適曰欲適煌煌之堂丈人曰入煌煌之堂者必有赫赫之光今子困於寒而欲求諸熱無得熱之方冰子瞿然曰胡為其然也丈人曰融融者皆趣熱之士其得爐冶之門者惟挾炭之子苟非斯人不如其已冰子曰吾聞宗廟之器不要華林之木四門之賓何必冠蓋之族前賢有解韋索而佩朱韍舍徒擔而乘丹轂由此言之何恤而無祿惟先生告我塗之速也丈人曰嗚呼子聞得之若是不知時之在彼吾將釋子夫道有安危時有險易才有所應行有所適英奇奮於從橫之世賢智顯於霸王之初當厄難則騁權譎以良圖值制作則展儒道以暢攄是則袞龍出於縕褐卿相起於匹夫故有朝賤而夕貴先卷而後舒當斯時也豈計門資之高卑論勢位之輕重乎今則不然上聖下明時隆道寧羣后逸豫宴安守平百辟君子奕世相生公門有公卿門有卿指禿腐骨不簡蚩儜多士豐於貴族爵命不出閨庭四門穆穆綺襦是盈仍叔之子皆為老成賤有常辱貴有常榮肉食繼踵於華屋疏飯襲跡於耨耕談名位者以諂媚附勢舉高譽者因資而隨形至乃空囂者以泓噌為雅量瑣慧者以淺利為鎗鎗脢胎者以無檢為弘曠僂垢者以守意為堅貞嘲哮者以粗發為高亮韞蠢者以色厚為篤誠痷婪者以博納為通濟眂眂者以難入為凝清拉答者有沈重之譽嗛閃者得清剿之聲嗆啍怯畏於謙讓闒茸勇敢於饕諍斯皆寒素之死病榮達之嘉名凡茲流也視其用心察其所安責人必急於己寬德無厚而自貴位未高而自尊眼罔嚮而遠視鼻月面而刺天忌惡君子悅媚小人敖蔑道素懾吁權門心以利傾智以勢惛姻黨相扇毀譽交紛當局迷於所受聽採惑於所聞京邑翼翼羣士千億奔集勢門求官買職童僕闚其車乘閽寺相其服飾親客陰參於靖室疏賓徙倚於門側時因接見矜厲容色心懷內荏外詐剛直譚道義謂之俗生論政刑以為鄙極高會曲宴惟言遷除消息官無大小問是誰力今以子孤寒懷真抱素志陵雲霄偶景獨步直順常道關津難渡欲騁韓盧時無狡兔衆塗圮塞投足何錯於是冰子釋然乃悟曰富貴人之所欲貧賤人之所惡僕少長於孔顏之門久處於清寒之路不謂熱勢自共遮錮敬承明誨服我初素彈琴詠典以保年祚伯成延陵高節可慕丹轂滅族呂霍哀吟朝榮夕滅旦飛暮沈聃周道師巢由德林豐屋蔀家易著明箴人薄位尊積罰難任三郤尸晉宋華咎深投扃正幅實獲我心是時王政陵遲官才失實君子多退而窮處遂終于里閭元康初松滋令吳郡蔡洪字叔開有才名作孤奮論與釋時意同讀之者莫不歎息焉張翰張翰字季鷹吳郡吳人也父儼吳大鴻臚翰有清才善屬文而縱任不拘時人號為江東步兵會稽賀循赴命入洛經吳閶門於船中彈琴翰初不相識乃就循言譚便大相欽悅問循知其入洛翰曰吾亦有事北京便同載即去而不告家人齊王冏辟為大司馬東曹掾冏時執權翰謂同郡顧榮曰天下紛紛禍難未已夫有四海之名者求退良難吾本山林間人無望於時子善以明防前以智慮後榮執其手愴然曰吾亦與子採南山蕨飲三江水耳翰因見秋風起乃思吳中菰菜蓴羹鱸魚膾曰人生貴得適志何能羈宦數千里以要名爵乎遂命駕而歸著首丘賦文多不載俄而冏敗人皆謂之見機然府以其輒去除吏名翰任心自適不求當世或謂之曰卿乃可縱適一時獨不為身後名邪答曰使我有身後名不如即時一杯酒時人貴其曠達性至孝遭母憂哀毀過禮年五十七卒其文筆數十篇行於世庾闡庾闡字仲初潁川鄢陵人也祖輝安北長史父東以勇力聞武帝時有西域健胡趫捷無敵晉人莫敢與校帝募勇士惟東應選遂撲殺之名震殊俗闡好學九歲能屬文少隨舅孫氏過江母隨兄肇為樂安長史在項城永嘉末為石勒所陷闡母亦沒闡不櫛沐不婚宦絕酒肉垂二十年鄉親稱之州舉秀才元帝為晉王辟之皆不行後為太宰西陽王羕掾累遷尚書郎蘇峻之難闡出奔郗鑒為司空參軍峻平以功賜爵吉陽縣男拜彭城內史鑒復請為從事中郎尋召為散騎侍郎領大著作頃之出補零陵太守入湘川弔賈誼其辭曰中興二十三載余忝守衡南鼓觵三江路次巴陵望君山而過洞庭涉湘川而觀汨水臨賈生投書之川慨以永懷矣及造長沙觀其遺象喟然有感乃弔之云偉哉蘭生而芳玉產而潔陽葩熙冰寒松負雪莫邪挺鍔天驥汗血苟云其雋誰與比傑是以高明倬茂獨發奇秀道率天真不議世疚煥乎若望舒燿景而焯羣星矯乎若翔鸞拊翼而逸宇宙也飛榮洛汭擢穎山東質清浮磬聲若孤桐琅琅其璞巖巖其峯信道居正而以天下為公方駕逸步不以曲路期通是以張高弦悲聲激柱落清唱未和而桑濮代作雖有惠音莫過韶濩雖有騰鱗終仆一壑嗚呼大庭既邈玄風悠緬皇道不以智隆上德不以仁顯三五親譽其軌可仰而標霸功雖逸其塗可翼而闡悲矣先生何命之蹇懷寶如玉而生運之淺昔咎繇虞呂尚歸昌德協充符乃應帝王夷吾相桓漢登蕭張草廬三顧臭若蘭芳是以道隱則蠖屈數感則鳳覩若棲不擇木翔非九五雖曰玉折雋才何補夫心非死灰智必存形形託神王故能全生奈何蘭膏揚芳漢庭摧景飈風獨喪厥明悠悠太素存亡一指道來斯通世往斯圮吾哀其生未見其死敢不敬弔寄之淥水後以疾徵拜給事中復領著作吳國內史虞潭為太伯立碑闡製其文又作揚都賦為世所重年五十四卒諡曰貞所著詩賦銘頌十卷行於世子肅之亦有文藻著稱歷給事中相府記室湘東太守太元中卒曹毗曹毗字輔佐譙國人也高祖休魏大司馬父識右軍將軍毗少好文籍善屬詞賦郡察孝廉除郎中蔡謨舉為佐著作郎父憂去職服闋遷句章令徵拜太學博士時桂陽張碩為神女杜蘭香所降毗因以二篇詩嘲之并續蘭香歌詩十篇甚有文彩又著揚都賦亞於庾闡累遷尚書郎鎮軍大將軍從事中郎下邳太守以名位不至著對儒以自釋其辭曰或問曹子曰夫寶以含珍為貴士以藏器為峻麟以絕迹標奇松以負霜稱雋是以蘭生幽澗玉輝千仞故子州浮滄瀾而龍蟠吳季忽萬乘以解印虞公潛崇巖以頤神梁生適南越以保慎固能全真養和夷跡洞潤陵冬揚芳披雪獨振也今子少睎冥風弱挺秀容奇發幼齡翰披孺童吐辭則藻落楊班抗心則志擬高鴻味道則理貫莊肆研妙則穎奪豪鋒固以騰廣莫而萋蒨排素薄而青葱者矣何必以刑禮為己任申韓為宏通既登東觀染史筆又據太學理儒功曾無玄韵淡泊逸氣虛洞養采幽翳晦明蒙籠不追林棲之迹不希抱鱗之龍不營練真之術不慕內聽之聰而處汎位以核物扇塵教以自濛負鹽車以顯能飾一己以求恭退不居漆園之場出不躡曾城之衝游不踐綽約之室趠不希騄駬之蹤徒以區區之懷而整名目之典覆蕢之量而塞北川之洪檢名實於俄頃之間定得失乎一管之鋒子若謂我果是邪則是不必以合俗子若云俗果非邪則俗非不可以苟從俗我紛以交爭利害渾而彌重何異執朽轡以御逸駟承勁風以握秋蓬役恬性以充勞府對羣物以耦怨雙者乎子不聞乎終軍之穎賈生之才拔奇山東玉映漢臺可謂響播六合聲駭嬰孩而見毀絳灌之口身離狼狽之災由此言之名為實賓福萌禍胎朝敷榮華夕歸塵埃未若澄虛心於玄圃蔭瑤林於蓬萊絕世事而雋黃綺鼓滄川而浪龍鰓者矣蒙竊惑焉主人煥耳而笑欣然而言曰夫兩儀既闢陰陽汗浩五才迭用化生紛擾萬類云云孰測其兆故不登閬風安以瞻殊目之形不步景宿何以觀恢廓之表是以迷粗者循一往之智狷介者守一方之矯豈知火林之蔚炎柯冰津之擢陽草故大人達觀任化昏曉出不極勞處不巢皓在儒亦儒在道亦道運屈則紆其清暉時申則散其龍藻此蓋員動之用舍非尋常之所寶也今三明互照二氣載宣玄教夕凝朗風晨鮮道以才暢化隨理全故五典克明於百揆虞音齊響於五絃安期解褐於秀林漁父擺鉤於長川如斯則化無不融道無不延風澄于俗波清于川方將舞黃虯於慶雲招儀鳳於靈山流玉醴乎華闥秀朱草於庭前何有違理之患累真之嫌子徒知辯其說而未測其源明朝菌不可喻晦朔蟪蛄無以觀大年固非管翰之所述聊敬對以終篇累遷至光祿勳卒凡所著文筆十五卷傳於世李充李充字弘度江夏人父矩江州刺史充少孤其父墓中柏樹嘗為盜賊所斫充手刃之由是知名善楷書妙參鍾索世咸重之辟丞相王導掾轉記室參軍幼好刑名之學深抑虛浮之士嘗著學箴稱老子云絕仁棄義家復孝慈豈仁義之道絕然後孝慈乃生哉蓋患乎情仁義者寡而利仁義者衆也道德喪而仁義彰仁義彰而名利作禮教之弊直在茲也先王以道德之不行故以仁義化之行仁義之不篤故以禮律檢之檢之彌繁而偽亦愈廣老莊是乃明無為之益塞爭欲之門夫極靈智之妙總會通之和者莫尚乎聖人革一代之弘制垂千載之遺風則非聖不立然則聖人之在世吐言則為訓辭莅事則為物軌運通則與時隆理喪則與世弊矣是以大為之論以標其旨物必有宗事必有主寄責於聖人而遺累乎陳迹也故化之以絕聖棄智鎮之以無名之樸聖教救其末老莊明其本本末之塗殊而為教一也人之迷也其日久矣見形者衆及道者尟不覿千仞之門而逐適物之迹逐迹逾篤離本逾遠遂使華端與薄俗俱興妙緒與淳風並絕所以聖人長潛而迹未嘗滅矣懼後進惑其如此將越禮棄學而希無為之風見義教之殺而不觀其隆矣略言所懷以補其闕引道家之弘旨會世教之適當義之違本言不流放庶以袪困蒙之蔽悟一往之惑乎其辭曰芒芒太初悠悠鴻荒蚩蚩萬類與道兼忘聖迹未顯賢名不彰怡此鼓腹率我猖狂資生既廣羣塗思通闇實師明匪予求蒙遺己濟物而天下為公大庭唱基羲農宏贊六位時成離暉大觀澤洽雨濡化流風散比屋同塵而人罔僭亂爰暨中古哲王胥承質文代作禮統迭興事藉用以繁化因阻而凝動非性擾靜豈神澄名之攸彰道之攸廢乃損所隆乃崇所替刑作由於德衰三辟興乎叔世既敦既誘乃矯乃厲敦亦既備矯亦既深彫琢生文抑揚成音羣能騁技衆巧竭心野無陸馬山無散林風罔不動化罔不移人之失德反正作奇乃放欲以越禮不知希競之為病違彼夷塗而遵此險徑狡兔陵岡游魚遁川至賾深妙大象幽玄棄餌收罝而責功蹄筌先統喪歸而寄旨忘言政異徵辭拔本塞源遁迹永日尋響窮年刻意離性而失其常然世有險夷運有通圮損益適時升降惟理道不可以一日廢亦不可以一朝擬禮不可以千載制亦不可以當年止非仁無以長物非義無以齊恥仁義固不可遠去其害仁義者而已力行猶懼不逮希企邈以遠矣室有善言應在千里況乎行止復禮克己風人司箴敬貽君子征北將軍褚裒又引為參軍充以家貧苦求外出裒將許之為縣試問之充曰窮猨投林豈暇擇木乃除剡縣令遭母憂服闋為大著作郎于時典籍混亂充刪除煩重以類相從分作四部甚有條貫祕閣以為永制累遷中書侍郎卒官充注尚書及周易旨六篇釋莊論上下二篇詩賦表頌等雜文二百四十首行於世子顒亦有文義多所述作郡舉孝廉充從兄式以平隱著稱善楷隸中興初仕至侍中袁宏袁宏字彥伯侍中猷之孫也父勖臨汝令宏有逸才文章絕美曾為詠史詩是其風情所寄少孤貧以運租自業謝尚時鎮牛渚秋夜乘月率爾與左右微服泛江會宏在舫中諷詠聲既清會辭又藻拔遂駐聽久之遣問焉答云是袁臨汝郎誦詩即其詠史之作也尚傾率有勝致即迎升舟與之譚論申旦不寐自此名譽日茂尚為安西將軍豫州刺史引宏參其軍事累遷大司馬桓溫府記室溫重其文筆專綜書記後為東征賦賦末列稱過江諸名德而獨不載桓彝時伏滔先在溫府又與宏善苦諫之宏笑而不答溫知之甚忿而憚宏一時文宗不欲令人顯問後游青山飲歸命宏同載衆為之懼行數里問宏云聞君作東征賦多稱先賢何故不及家君宏答曰尊公稱謂非下官敢專既未遑啟不敢顯之耳溫疑不實乃曰君欲為何辭宏即答云風鑒散朗或搜或引身雖可亡道不可隕宣城之節信義為允也溫泫然而止宏賦又不及陶侃侃子胡奴嘗於曲室抽刃問宏曰家君勳跡如此君賦云何相忽宏窘急答曰我已盛述尊公何乃言無因曰精金百汰在割能斷功以濟時職思靜亂長沙之勳為史所贊胡奴乃止後為三國名臣頌曰夫百姓不能自牧故立君以治之明君不能獨治則為臣以佐之然則三五迭隆歷代承基揖讓之與干戈文德之與武功莫不宗匠陶鈞而羣才緝熙元首經略而股肱肆力雖遭罹不同迹有優劣至於體分冥固道契不墜風美所扇訓革千載其揆一也故二八升而唐朝盛伊呂用而湯武寧三賢進而小白興五臣顯而重耳霸中古陵遲斯道替矣居上者不以至公理物為下者必以私路期榮御員者不以信誠率衆執方者必以權謀自顯於是君臣離而名教薄世多亂而時不治故蘧甯以之卷舒柳下以之三黜接輿以之行歌魯連以之赴海衰世之中保持名節君臣相體若合符契則燕昭樂毅古之流矣夫未遇伯樂則千載無一驥時值龍顏則當年控三傑漢之得賢於斯為貴高祖雖不以道勝御物羣下得盡其忠蕭曹雖不以三代事主百姓不失其業靜亂庇人抑亦其次夫時方顛沛則顯不如隱萬物思治則默不如語是以古之君子不患弘道難患遭時難遭時匪難遇君難故有道無時孟子所以咨嗟有時無君賈生所以垂泣夫萬歲一期有生之通塗千載一遇賢智之嘉會遇之不能無欣喪之何能無慨古人之言信有情哉余以暇日常覽國志考其君臣比其行事雖道謝先代亦異世一時也文若懷獨見之照而有救世之心論時則人方塗炭計能則莫出魏武故委圖霸朝豫謀世事舉才不以標鑒故人亡而後顯籌畫不以要功故事至而後定雖亡身明順識亦高矣董卓之亂神器遷逼公達慨然志在致命由斯而譚故以大存名節至如身為漢隸而跡入魏幕源流趣舍抑亦文若之謂所以存亡殊致始終不同將以文若既明且哲名教有寄乎夫仁義不可不明則時宗舉其致生理不可不全故達識攝其契相與弘道豈不遠哉崔生高朗折而不撓所以策名魏武執笏霸朝者蓋以漢主當陽魏后北面者哉若乃一旦進璽君臣易位則崔生所以不與魏氏所以不容夫江湖所以濟舟亦所以覆舟仁義所以全身亦所以亡身然而先賢玉摧於前來哲攘袂於後豈天懷發中而名教束物者乎孔明盤桓俟時而動遐想管樂遠明風流治國以禮人無怨聲刑罰不濫沒有餘泣雖古之遺愛何以加茲及其臨終顧託受遺作相劉后授之無疑心武侯受之無懼色繼體納之無貳情百姓信之無異辭君臣之際良可詠矣公瑾卓爾逸志不羣總角料主則素契於伯符晚節曜奇則三分於赤壁惜其齡促志未可量子布佐策致延譽之美輟哭止哀有翼戴之功神情所涉豈徒謇諤而已哉然杜門不用登壇受譏夫一人之身所照未異而用舍之間俄有不同況沈跡溝壑遇與不遇者乎夫詩頌之作有自來矣或以吟詠情性或以紀德顯功雖大指同歸所託或乖若夫出處有道名體不滯風軌德音為世作範不可廢也復綴序所懷以為之贊曰火德既微運纏大過洪飈扇海二溟揚波虯獸雖驚風雲未和潛魚擇川高鳥候柯赫赫三雄並迴乾軸競收杞梓爭採松竹鳳不及棲龍不暇伏谷無幽蘭嶺無停菊英英文若靈鑒洞照應變知微頤奇賞要日月在躬隱之彌曜文明暎心鑽之愈妙滄海橫流玉石俱碎達人兼善廢己存愛謀解時紛功濟宇內始救生靈終明風概公達潛朗思同蓍蔡運用無方動攝羣會爰初發迹遘此顛沛神情玄定處之彌泰愔愔幕𩹉算無不經亹亹通韵跡不暫停雖懷尺璧顧哂連城智能極物愚足全生郎中溫雅器識純素貞而不諒通而能固恂恂德心汪汪軌度志成弱冠道敷歲暮仁者必勇德亦有言雖遇履尾神氣恬然行不修飾名節無愆操不激切素風愈鮮邈哉崔生體正心直天骨疏朗牆岸高嶷忠存軌跡義形風色思樹芳蘭翦除荊棘人惡其上世不容哲琅琅先生雅杖名節雖遇塵霧猶震霜雪運極道消碎此明月景山恢誕韵與道合形器不存方寸海納和而不同通而不雜遇醉忘辭在醒貽答長文通雅義格終始思戴元首擬伊同恥人未知德懼若在己嘉謀肆庭讜言盈耳玉生雖麗光不踰把德積雖微道暎天下邈哉太初宇量高雅器範自然標準無假全身由直跡洿必偽處死匪難理存則易萬物波蕩孰任其累六合徒廣容身靡寄君親自然匪由名教愛敬既同情禮兼到烈烈王生知死不撓求仁不遠期在忠孝玄伯剛簡大存名體志在高構增堂及陛端委獸門正言彌啟臨危致命盡其心禮堂堂孔明基宇宏邈器同生靈獨稟先覺標牓風流遠明管樂初九龍盤雅志彌確百六道喪干戈迭用苟非命世孰掃雰雺宗子思寧薄言解控釋褐中林鬱為時棟士元弘長雅性內融崇善愛物觀始知終喪亂備矣勝塗未隆先生標之振起清風綢繆哲后無妄惟時夙夜匪懈義在緝熙三略既陳霸業已基公琰殖根不忘中正豈曰模擬實在雅性亦既羈勒負荷時命推賢恭己久而可敬公衡沖達秉志淵塞媚茲一人臨難不惑疇昔不造假翮鄰國進能徽音退不失德六合紛紜人心將變鳥擇高梧臣須顧眄公瑾英達朗心獨見披草求君定交一面桓桓魏武外託霸跡志掩衡霍恃戰忘敵卓卓若人曜奇赤壁三光參分宇宙暫隔子布擅名遭世方擾撫翼桑梓息肩江表王略威夷吳魏同寶遂贊宏謨匡此霸道桓王之薨大業未純把臂託孤惟賢與親輟哭止哀臨難忘身成此南面實由老臣才為世生世亦須才得而能任貴在無猜昂昂子敬拔跡草萊荷檐吐奇乃構雲臺子瑜都長體性純懿諫而不犯正而不毅將命公庭退忘私位豈無鶺鴒固慎名器伯言謇謇以道佐世出能勤功入亦獻替謀寧社稷解紛挫銳正以招疑忠而獲戾元歎邈遠神和形檢如彼白珪質無塵點立行以匡主以漸清不增潔濁不加染仲翔高亮性不和物好是不羣折而不屈屢摧逆鱗直道受黜歎過孫陽放同賈屈莘莘衆賢千載一遇整轡高衢驤首天路仰揖玄流俯弘時務名節殊塗雅致同趣日月麗天瞻之不墜仁義在躬用之不匱尚想遐風載揖載味後生擊節懦夫增氣從桓溫北征作北征賦皆其文之高者嘗與王珣伏滔同在溫坐溫令滔讀其北征賦至聞所傳於相傳云獲麟於此野誕靈物以瑞德奚授體於虞者疚尼父之洞泣似實慟而非假豈一性之足傷乃致傷於天下其本至此便改韵珣云此賦方傳千載無容率耳今於天下之後移韵徙事然於寫送之致似為未盡滔云得益寫韵一句或為小勝溫曰卿思益之宏應聲答曰感不絕於余心愬流風而獨寫珣誦味久之謂滔曰當今文章之美故當共推此生性強正亮直雖被溫禮遇至於辯論每不阿屈故榮任不至與伏滔同在溫府府中呼為袁伏宏心恥之每歎曰公之厚恩未優國士而與滔比肩何辱之甚謝安常賞其機對辯速後安為揚州刺史宏自吏部郎出為東陽郡乃祖道於冶亭時賢皆集安欲以卒迫試之臨別執其手顧就左右取一扇而授之曰聊以贈行宏應聲答曰輒當奉揚仁風慰彼黎庶時人歎其率而能要焉宏見漢時傅毅作顯宗頌辭甚典雅乃作頌九章頌簡文之德上之於孝武太元初卒於東陽時年四十九撰後漢紀三十卷及竹林名士傳三卷詩賦誄表等雜文凡三百首傳於世三子長超子次成子次明子明子有父風最知名官至臨賀太守伏滔伏滔字玄度平昌安丘人也有才學少知名州舉秀才辟別駕皆不就大司馬桓溫引為參軍深加禮接每宴集之所必命滔同游從溫伐袁真至壽陽以淮南屢叛著論二篇名曰正淮其上篇曰淮南者三代揚州之分也當春秋時吳楚陳蔡之與地戰國之末楚全有之而考烈王都焉秦并天下建立郡縣是為九江劉項之際號曰東楚爰自戰國至於晉之中興六百有餘年保淮南者九姓稱兵者十一人皆亡不旋踵禍溢於世而終莫戒焉其天時歟地勢歟人事歟何喪亂之若是也試商較而論之夫懸象著明而休徵表於列宿山河衿帶而地險彰於丘陵治亂推移而興亡見於人事由此而觀則兼也必矣昔妖星出於東南而弱楚以亡飛孛橫於天漢而劉安誅絕近則火星晨見而王淩首謀長彗宵暎而毌丘襲亂斯則表乎天時也彼壽陽者南引荊汝之利東連三吳之富北接梁宋平塗不過七日西援陳許水陸不出千里外有江湖之阻內保淮肥之固龍泉之陂良疇萬頃舒六之貢利盡蠻越金石皮革之具萃焉苞木箭竹之族生焉山湖藪澤之隈水旱之所不害土產草滋之實荒年之所取給此則係乎地利者也其俗尚氣力而多勇悍其人習戰爭而貴詐偽豪右并兼之門十室而七藏甲挾劍之家比屋而發然而仁義之化不漸刑法之令不及所以屢多亡國也昔考烈以衰弱之楚屢遷其都外迫強秦之威內遘陽申之禍逃死劫殺三世而滅黥布以三雄之選功成垓下淮陰既囚梁越受戮嫌結震主之威慮生同體之禍遂謀圖全之計庶幾後亡之福衆潰於一戰身脂於漢斧劉長支庶奄王大國承喪亂之餘御新化之俗無德而寵欲極禍發王安內懷先父之憾外眩姦臣之說招引賓客沈溺數術藉二世之資恃戈甲之盛屈強江淮之上西向而圖宗國言未絕口身嗣俱滅李憲因亡新之餘袁術當衰漢之末負力幸亂遂生僭逆之計建號九江稱制下邑狼狽奔亡傾城受戮及至彥雲仲恭公休之徒或憑宿名或怙前功握兵淮楚力制東夏屬當多難之世仍值廢興之會謀非所議相係禍敗祖約助逆身亡家族彼十亂者成乎人事者也然則侵弱昏迷以至絕滅亡楚當之恃強畏逼遂謀叛亂黥布有焉二王遘逆寵之之過也公路僭偽乘釁之盜也二將以圖功首難士少以驕矜樂禍本其所因考其成跡皆寵盛禍淫福過災生而制之不漸積之有由也其下篇曰昔高祖之誅黥布也撮三策之要馳赦過之書乘人主之威以除逆節之虜然猶決戰陳都暴尸橫野僅乃克之害亦深矣長安之謀雖兵未交於山東禍未徧於天下而馳說之士與闔境之人幽囚誅放者亦已衆矣光武連兵於肥舒魏祖馳馬於蘄苦而廬九之間流溺兵凶者十而七八焉夫王淩面縛得之於砎石仲恭接刃成之於後覺也而高祖以之宵征世宗以之發疾豈不勤哉文皇挾萬乘之威杖伊周之權內舉京畿之衆外徵四海之銳雲合雨集推鋒以臨淮浦而誕欽晏然方嬰城自固憑軾以觀王師於是築長圍起棼櫓高壁連塹負戈擊柝以守之自夏及春而後始知亡焉然則屠城之禍其可極言乎約之出奔淮左為墟悲夫信哉魯哀之言夫生乎深宮長於膏粱憂懼不切於身榮辱不交於前則其仁義之本淺矣奉以南面之尊藉以列城之富宅以制險之居養以衆強之盛而無德以臨之無制以節之則厭溢樂禍之心生矣夫以昏主御姦臣利甲資堅城偽令行於封內邪惠結於人心乘間幸濟之說日交於側猾詐錮咎之羣各馳於前見利如歸安在其不為亂乎況乘舊寵挾前功畏逼懼亡以謀圖身之舉者望其俛首就羈不亦哉易稱履霜堅冰馴致之道蓋言漸也嗚呼斯所以亂臣賊子亡國覆家累世而不絕者歟昔先王之宰天下也選於有德訪之三吏正其分位明其等級畫之封疆宣之政令上下有序無僭差之嫌四人安業無并兼之國三載考陟功罪不得逃其跡九伐時修刑賞無所謬其實令之有漸軌之有度寵之有節權不外授威不下黷所以杜其萌際重其名器深根固本傳之百世雖時有盛衰弱者無所懼其亡道有興廢強者不得資其弊夫如是將使天子從風穆然軌道慶自一人惠流萬國安有向時之患哉壽陽平以功封聞喜縣侯除永世令溫薨征西將軍桓豁引為參軍領華容令太元中拜著作郎專掌國史領本州大中正孝武帝嘗會於西堂滔豫坐還下車先呼子系之謂曰百人高會天下先問伏滔在坐不此故未易得為人作父如此定何如也遷游擊將軍著作如故卒官子系之亦有文才歷黃門郎侍中尚書光祿大夫羅含羅含字君章桂陽耒陽人也曾祖彥臨海太守父綏滎陽太守含幼孤為叔母朱氏所養少有志尚嘗晝臥夢一鳥文彩異常飛入口中因驚起說之朱氏曰鳥有文彩汝後必有文章自此後藻思日新弱冠州三辟不就含父嘗宰新淦新淦人楊羨後為含州將引含為主簿含傲然不顧羨招致不已辭不獲而就焉及羨去職含送之到縣新淦人以含舊宰之子咸致賂遺含難違而受之及歸悉封置而去由是遠近推服焉後為郡功曹刺史庾亮以為部江夏從事太守謝尚與含為方外之好乃稱曰羅君章可謂湘中之琳琅尋轉州主簿後桓溫臨州又補征西參軍溫嘗使含詣尚有所檢劾含至不問郡事與尚累日酣飲而還溫問所劾事含曰公謂尚何如人溫曰勝我也含曰豈有勝公而行非邪故一無所問溫奇其意而不責焉轉州別駕以廨舍諠擾於城西池小洲上立茅屋伐木為材織葦為席而居布衣蔬食晏如也溫嘗與僚屬讌會含後至溫問衆坐曰此何如人或曰可謂荊楚之材溫曰此自江左之秀豈惟荊楚而已徵為尚書郎溫雅重其才又表轉征西戶曹參軍俄遷宜都太守及溫封南郡公引為郎中令尋徵正員郎累遷散騎常侍侍中仍轉廷尉長沙相年老致仕加中散大夫門施行馬初含在官舍有一白雀棲集堂宇及致仕還家階庭忽蘭菊叢生以為德行之感焉年七十七卒所著文章行於世顧愷之顧愷之字長康晉陵無錫人也父悅之尚書左丞愷之博學有才氣嘗為箏賦成謂人曰吾賦之比嵇康琴不賞者必以後出相遺深識者亦當以高奇見貴桓溫引為大司馬參軍甚見親昵溫薨後愷之拜溫墓賦詩云山崩溟海竭魚鳥將何依或問之曰卿憑重桓公乃爾哭狀其可見乎答曰聲如震雷破山淚如傾河注海愷之好諧謔人多愛狎之後為殷仲堪參軍亦深被眷接仲堪在荊州愷之嘗因假還仲堪特以布帆借之至破冢遭風大敗愷之與仲堪牋曰地名破冢真破冢而出行人安穩布帆無恙還至荊州人問以會稽山川之狀愷之云千巖競秀萬壑爭流草木蒙籠若雲興霞蔚桓玄時與愷之同在仲堪坐共作了語愷之先曰火燒平原無遺燎玄曰白布纏根樹旒旐仲堪曰投魚深泉放飛鳥復作危語玄曰矛頭淅米劍頭炊仲堪曰百歲老翁攀枯枝有一參軍云盲人騎瞎馬臨深池仲堪眇目驚曰此太逼人因罷愷之每食甘蔗自尾至本人或怪之云漸入佳境尤善丹青圖寫特妙謝安深重之以為有蒼生以來未之有也愷之每畫人成或數年不點目精人問其故答曰四體妍蚩本無闕少於妙處傳神寫照正在阿堵中嘗悅一鄰女挑之弗從乃圖其形於壁以棘針釘其心女遂患心痛愷之因致其情女從之遂密去針而愈愷之每重嵇康四言詩因為之圖云手揮五絃易目送歸鴻難每寫起人形妙絕於時嘗圖裴楷象頰上加三毛觀者覺神明殊勝又為謝鯤象在石巖𩹉云此子宜置丘壑中欲圖殷仲堪仲堪有目病固辭愷之曰明府正為眼耳若明點瞳子飛白拂上使如輕雲之蔽月豈不美乎仲堪乃從之愷之嘗以一廚畫糊題其前寄桓玄皆其深所珍惜者玄乃發其廚後竊取畫而緘閉如舊以還之紿云未開愷之見封題如初但失其畫直云妙畫通靈變化而去亦猶人之登仙了無怪色愷之矜伐過實少年因相稱譽以為戲弄又為吟詠自謂得先賢風制或請其作洛生詠答曰何至作老婢聲義熙初為散騎常侍與謝瞻連省夜於月下長詠瞻每遙贊之愷之彌自力忘倦瞻將眠令人代己愷之不覺有異遂申旦而止尤信小術以為求之必得桓玄嘗以一柳葉紿之曰此蟬所翳葉也取以自蔽人不見己愷之喜引葉自蔽玄就溺焉愷之信其不見己也甚以珍之初愷之在桓溫府常云愷之體中癡黠各半合而論之正得平耳故俗傳愷之有三絕才絕畫絕癡絕年六十二卒於官所著文集及啟矇記行於世郭澄之郭澄之字仲靜太原陽曲人也少有才思機敏兼人調補尚書郎出為南康相值盧循作逆流離僅得還都劉裕引為相國參軍從裕北伐既克長安裕意更欲西伐集僚屬議之多不同次問澄之澄之不答西向誦王粲詩曰南登霸陵岸迴首望長安裕便意定謂澄之曰當與卿共登霸陵岸耳因還澄之位至裕相國從事中郎封南豐侯卒於官所著文集行於世史臣曰夫賞好生於情剛柔本於性情之所適發乎詠歌而感召無象風律殊製至於應貞宴射之文極形言之美華林羣藻罕或疇之子安幼標明敏少蓄清思懷天地之寥廓賦辭人之所遺特構新情豈常均之所企太沖含豪歷載以賦三都士安見而稱善平原覩而韜翰匪惟高步當年故以騰華終古鄒湛之持論棗據之緣情實南陽之人傑蓋潁川之時秀季雅摛屬遒邁夙備成德稱為泉岱之珍固其然矣彥伯未能混迹光塵而屈乎卑位釋時宏論亦足見其志耳季鷹縱誕一時不邀名爵黃花之什濬發神府仲初之文風流可尚擢秀士林揚都之美尤重時彥曹毗沈研祕籍踠足下僚綺靡降神之歌朗暢對儒之論李充之學箴信清壯也袁宏東征名臣之作抑潘陸之亞玄度學藝優贍筆削擅奇降帝問於西堂故其榮觀也君章耀湘中之寶挺荊楚之材夢鳥發乎精誠豈獨日者之蛟鳳長康矜能過實譚諧取容而才多逸氣故有三絕之目仲靜機思通敏延譽清流德輿西伐之計取定於微指者矣贊曰爻彖垂法宮徵流音美哉羣彥揚蕤翰林俱諧振玉各擅鏘金子安太沖遒文綺爛袁庾充愷縟藻霞煥架彼辭人共超清貫
