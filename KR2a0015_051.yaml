body:
  text: 晉書卷五十一列傳第二十一皇甫謐子方回皇甫謐字士安幼名靜安定朝那人漢太尉嵩之曾孫也出後叔父徙居新安年二十不好學游蕩無度或以為癡嘗得瓜果輒進所後叔母任氏任氏曰孝經云三牲之養猶為不孝汝今年餘二十目不存教心不入道無以慰我因歎曰昔孟母三徙以成仁曾父烹豕以存教豈我居不卜鄰教有所闕何爾魯鈍之甚也修身篤學自汝得之於我何有因對之流涕謐乃感激就鄉人席坦受書勤力不怠居貧躬自稼穡帶經而農遂博綜典籍百家之言沈靜寡欲始有高尚之志以著述為務自號玄晏先生著禮樂聖真之論後得風痹疾猶手不輟卷或勸謐修名廣交謐以為非聖人孰能兼存出處居田里之中亦可以樂堯舜之道何必崇接世利事官鞅掌然後為名乎作玄守論以答之曰或謂謐曰富貴人之所欲貧賤人之所惡何故委形待於窮而不變乎且道之所貴者理世也人之所美者及時也先生年邁齒變饑寒不贍轉死溝壑其誰知乎謐曰人之所至惜者命也道之所必全者形也性形所不可犯者疾病也若擾全道以損性命安得去貧賤存所欲哉吾聞食人之祿者懷人之憂形強猶不堪況吾之弱疾乎且貧者士之常賤者道之實處常得實沒齒不憂孰與富貴擾神耗精者乎又生為人所不知死為人所不惜至矣喑聾之徒天下之有道者也夫一人死而天下號者以為損也一人生而四海笑者以為益也然則號笑非益死損生也是以至道不損至德不益何哉體足也如回天下之念以追損生之禍運四海之心以廣非益之病豈道德之至乎夫唯無損則至堅矣夫唯無益則至厚矣堅故終不損厚故終不薄苟能體堅厚之實居不薄之真立乎損益之外游乎形骸之表則我道全矣遂不仕耽玩典籍忘寢與食時人謂之書淫或有針其過篤將損耗精神謐曰朝聞道夕死可矣況命之修短分定懸天乎叔父有子既冠謐年四十喪所生後母遂還本宗城陽太守梁柳謐從姑子也當之官人勸謐餞之謐曰柳為布衣時過吾吾送迎不出門食不過鹽菜貧者不以酒肉為禮今作郡而送之是貴城陽太守而賤梁柳豈中古人之道是非吾心所安也時魏郡召上計掾舉孝廉景元初相國辟皆不行其後鄉親勸令應命謐為釋勸論以通志焉其辭曰相國晉王辟余等三十七人及泰始登禪同命之士莫不畢至皆拜騎都尉或賜爵關內侯進奉朝請禮如侍臣唯余疾困不及國寵宗人父兄及我僚類咸以為天下大慶萬姓賴之雖未成禮不宜安寢縱其疾篤猶當致身余唯古今明王之制事無巨細斷之以情實力不堪豈慢也哉乃伏枕而歎曰夫進者身之榮也退者命之實也設余不疾執高箕山尚當容之況余實篤故堯舜之世士或收迹林澤或過門不敢入咎繇之徒兩遂其願者遇時也故朝貴致功之臣野美全志之士彼獨何人哉今聖帝龍興配名前哲仁道不遠斯亦然乎客或以常言見逼或以逆世為慮余謂上有寬明之主下必有聽意之人天網恢恢至否一也何尤於出處哉遂究賓主之論以解難者名曰釋勸客曰蓋聞天以懸象致明地以含通吐靈故黃鍾次序律呂分形是以春華發萼夏繁其實秋風逐暑冬冰乃結人道以之應機乃發三材連利明若符契故士或同升於唐朝或先覺於有莘或通夢以感主或釋釣於渭濱或叩角以干齊或解褐以相秦或冒謗以安鄭或乘駟以救屯或班荊以求友或借術於黃神故能電飛景拔超次邁倫騰高聲以奮遠抗宇宙之清音由此觀之進德貴乎及時何故屈此而不伸今子以英茂之才游精於六藝之府散意於衆妙之門者有年矣既遭皇禪之朝又投祿利之際委聖明之主偶知己之會時清道真可以沖邁此真吾生濯髮雲漢鴻漸之秋也韜光逐藪含章未曜龍潛九泉焉執高棄通道之遠由守介人之局操無乃乖於道之趣乎且吾聞招搖昏回則天位正五教班則人理定如今王命切至委慮有司上招忤主之纍下致駭衆之疑達者貴同何必獨異羣賢可從何必守意方今同命並臻饑不待餐振藻皇塗咸秩天官子獨栖遲衡門放形世表遜遁丘園不睨華好惠不加人行不合道身嬰大疢性命難保若其羲和促轡大火西穨臨川恨晚將復何階夫貴陰賤璧聖所約也顛倒衣裳明所針也子其鑒先哲之洪範副聖朝之虛心沖靈翼於雲路浴天池以濯鱗排閶闔步玉岑登紫闥侍北辰翻然景曜雜沓英塵輔唐虞之主化堯舜之人宣刑錯之政配殷周之臣銘功景鍾參彝倫存則鼎食亡為貴臣不亦茂哉而忽金白之輝曜忘青紫之班瞵辭容服之光粲抱弊褐之終年無乃勤乎主人笑而應之曰吁若賓可謂習外觀之暉暉未覩幽人之髣佛也見俗人之不容未喻聖皇之兼愛也循方圓於規矩未知大形之無外也故曰天玄而清地靜而寧含羅萬類旁薄羣生寄身聖世託道之靈若夫春以陽散冬以陰凝泰液含光元氣混蒸衆品仰化誕制殊徵故進者享天祿處者安丘陵是以寒暑相推四宿代中陰陽不治運化無窮自然分定兩克厥中二物俱靈是謂大同彼此無怨是謂至通若乃衰周之末貴詐賤誠牽於權力以利要榮故蘇子出而六主合張儀入而橫勢成廉頗存而趙重樂毅去而燕輕公叔沒而魏敗孫臏刖而齊寧蠡種親而越霸屈子疏而楚傾是以君無常籍臣無定名損義放誠一虛一盈故馮以彈劍感主女有反賜之說項奮拔山之力蒯陳鼎足之勢東郭劫於田榮顏闔恥於見逼斯皆棄禮喪真苟榮朝夕之急者也豈道化之本與若乃聖帝之創化也參德乎二皇齊風乎虞夏欲溫溫而和暢不欲察察而明切也欲混混若玄流不欲蕩蕩而名發也欲索索而條解不欲契契而繩結也欲芒芒而無垠際不欲區區而分別也欲暗然而日章不欲示白若冰雪也欲醇醇而任德不欲瑣瑣而執法也是以見機者以動成好遁者無所迫故曰一明一昧得道之概一弛一張合禮之方一浮一沈兼得其真故上有勞謙之愛下有不名之臣朝有聘賢之禮野有遁竄之人是以支伯以幽疾距唐李老寄迹於西鄰顏氏安陋以成名原思娛道於至貧榮期以三樂感尼父黔婁定諡於布衾干木偃息以存魏荊萊志邁於江岑君平因蓍以道著四晧潛德於洛濱鄭真躬耕以致譽幼安發令乎今人皆持難奪之節執不回之意遭拔俗之主全彼人之志故有獨定之計者不借謀於衆人守不動之安者不假慮於羣賓故能棄外親之華通內道之真去顯顯之明路入昧昧之埃塵宛轉萬情之形表排託虛寂以寄身居無事之宅交釋利之人輕若鴻毛重若泥沈損之不得測之愈深真吾徒之師表余迫疾而不能及者也子議吾失宿而駭衆吾亦怪子較論而不折中也夫才不周用衆所斥也寢疾彌年朝所棄也是以胥克之廢丘明列焉伯牛有疾孔子斯歎若黃帝創制於九經岐伯剖腹以蠲腸扁鵲造虢而尸起文摯徇命於齊王醫和顯術於秦晉倉公發祕於漢皇華他存精於獨識仲景垂妙於定方徒恨生不逢乎若人故乞命訴乎明王求絶編於天録亮我躬之辛苦冀微誠之降霜故俟罪而窮處其後武帝頻下詔敦逼不已謐上疏自稱草莽臣曰臣以弊迷於道趣因疾抽簪散髮林阜人綱不間鳥獸為羣陛下披榛採蘭并收蒿艾是以皋陶振褐不仁者遠臣惟頑蒙備食晉粟猶識唐人擊壤之樂宜赴京城稱壽闕外而小人無良致災速禍久嬰篤疾軀半不仁右腳偏小十有九載又服寒食藥違錯節度辛苦荼毒于今七年隆冬裸袒食冰當暑煩悶加以咳逆或若溫瘧或類傷寒浮氣流腫四肢酸重於今困劣救命呼吸父兄見出妻息長訣仰迫天威扶輿就道所苦加焉不任進路委身待罪伏枕歎息臣聞韶衛不並奏雅鄭不兼御故郤子入周禍延王叔虞丘稱賢樊姬掩口君子小人禮不同器況臣穅䖵糅之雕胡庸夫錦衣不稱其服也竊聞同命之士咸以畢到唯臣疾疢抱釁牀蓐雖貪明時懼斃命路隅設臣不疾已遭堯舜之世執志箕山猶當容之臣聞上有明聖之主下有輸實之臣上有在寬之政下有委情之人唯陛下留神垂恕更旌瓌俊索隱於傅巖收釣於渭濱無令泥滓久濁清流謐辭切言至遂見聽許歲餘又舉賢良方正並不起自表就帝借書帝送一車書與之謐雖羸疾而披閲不怠初服寒食散而性與之忤每委頓不倫嘗悲恚叩刃欲自殺叔母諫之而止濟陰太守蜀人文立表以命士有贄為煩請絶其禮幣詔從之謐聞而歎曰亡國之大夫不可與圖存而以革歷代之制其可乎夫束帛戔戔易之明義玄纁之贄自古之舊也故孔子稱夙夜強學以待問席上之珍以待聘士於是乎三揖乃進明致之難也一讓而退明去之易也若殷湯之於伊尹文王之於太公或身即莘野或就載以歸唯恐禮之不重豈吝其煩費哉且一禮不備貞女恥之況命士乎孔子曰賜也爾愛其羊我愛其禮棄之如何政之失賢於此乎在矣咸寧初又詔曰男子皇甫謐沈靜履素守學好古與流俗異趣其以謐為太子中庶子謐固辭篤疾帝初雖不奪其志尋復發詔徵為議郎又召補著作郎司隸校尉劉毅請為功曹並不應著論為葬送之制名曰篤終曰玄晏先生以為存亡天地之定制人理之必至也故禮六十而制壽至于九十各有等差防終以素豈流俗之多忌者哉吾年雖未制壽然嬰疢彌紀仍遭喪難神氣損劣困頓數矣常懼夭隕不期慮終無素是以略陳至懷夫人之所貪者生也所惡者死也雖貪不得越期雖惡不可逃遁人之死也精歇形散魂無不之故氣屬于天寄命終盡窮體反真故尸藏于地是以神不存體則與氣升降尸不久寄與地合形形神不隔天地之性也尸與土并反真之理也今生不能保七尺之軀死何故隔一棺之土然則衣衾所以穢尸棺椁所以隔真故桓司馬石椁不如速朽季孫璵璠比之暴骸文公厚葬春秋以為華元不臣楊王孫親土漢書以為賢於秦始皇如令魂必有知則人鬼異制黃泉之親死多於生必將備其器物用待亡者今若以存況終非即靈之意也如其無知則空奪生用損之無益而啓姦心是招露形之禍增亡者之毒也夫葬者藏也藏也者欲人之不得見也而大為棺椁備贈存物無異於埋金路隅而書表於上也雖甚愚之人必將笑之豐財厚葬以啓姦心或剖破棺椁或牽曳形骸或剝臂捋金環或捫腸求珠玉焚如之形不痛於是自古及今未有不死之人又無不發之墓也故張釋之曰使其中有欲雖固南山猶有隙使其中無欲雖無石椁又何戚焉斯言達矣吾之師也夫贈終加厚非厚死也生者自為也遂生意於無益棄死者之所屬知者所不行也易稱古之葬者衣之以薪葬之中野不封不樹是以死得歸真亡不損生故吾欲朝死夕葬夕死朝葬不設棺椁不加纏斂不修沐浴不造新服殯唅之物一皆絶之吾本欲露形入坑以身親土或恐人情染俗來久頓革理難今故粗為之制奢不石椁儉不露形氣絶之後便即時服幅巾故衣以籧篨裹尸麻約二頭置尸牀上擇不毛之地穿坑深十尺長一丈五尺廣六尺坑訖舉牀就坑去牀下尸平生之物皆無自隨唯齎孝經一卷示不忘孝道籧篨之外便以親土土與地平還其故草使生其上無種樹木削除使生迹無處自求不知不見可欲則姦不生心終始無怵惕千載不慮患形骸與后土同體魂爽與元氣合靈真篤愛之至也若亡有前後不得移祔祔葬自周公來非古制也舜葬蒼梧二妃不從以為一定何必周禮無問師工無信卜筮無拘俗言無張神坐無十五日朝夕上食禮不墓祭但月朔於家設席以祭百日而止臨必昏明不得以夜制服常居不得墓次夫古不崇墓智也今之封樹愚也若不從此是戮尸地下死而重傷魂而有靈則冤悲沒世長為恨鬼王孫之子可以為誡死誓難違幸無改焉而竟不仕太康三年卒時年六十八子童靈方回等遵其遺命謐所著詩賦誄頌論難甚多又撰帝王世紀年曆高士逸士列女等傳玄晏春秋並重於世門人摯虞張軌牛綜席純皆為晉名臣方回少遵父操兼有文才永嘉初博士徵不起避亂荊州閉戶間居未嘗入城府蠶而後衣耕而後食先人後己尊賢愛物南土人士咸崇敬之刺史陶侃禮之甚厚侃每造之著素士服望門輒下而進王敦遣從弟廙代侃遷侃為廣州侃將詣敦方回諫曰吾聞敵國滅功臣亡足下新破杜韜功莫與二欲無危其可得乎侃不從而行敦果欲殺侃賴周訪獲免廙既至荊州大失物情百姓叛廙迎杜韜廙大行誅戮以立威以方回為侃所敬責其不來詣己乃收而斬之荊土華夷莫不流涕摯虞摯虞字仲洽京兆長安人也父模魏太僕卿虞少事皇甫謐才學通博著述不倦郡檄主簿虞嘗以死生有命富貴在天天之所祐者義也人之所助者信也履信思順所以延福違此而行所以速禍然道長世短禍福舛錯怵迫之徒不知所守蕩而積憤或迷或放故借之以身假之以事先陳處世不遇之難遂棄彝倫輕舉遠游以極常人罔惑之情而後引之以正反之以義推神明之應於視聽之表崇否泰之運於智力之外以明天任命之不可違故作思游賦其辭曰有軒轅之遐胄兮氏仲任之洪裔敷華穎於末葉兮晞靈根於上世準乾坤以斡度兮儀陰陽以定制匪時運其焉行兮乘太虛而搖曳戴朗月之高冠兮綴太白之明璜製文霓以為衣兮襲采雲以為裳要華電之煜爚兮珮玉衡之琳琅明景日以鑒形兮信煥曜而重光至美詭好於凡觀兮修稀合而靡呈燕石緹襲以華國兮和璞遙棄於南荊夏像韜塵于巿北兮瓶罍抗方於兩楹鸞皇耿介而偏栖兮蘭桂背時而獨榮關寒暑以練真兮豈改容而爽情感昆吾之易越兮懷暉光之速暮羡一稔而三春兮尚含英以容豫悼曜靈之靡暇兮限天晷之有度聆鳴蜩之號節兮恐隕葉於凝露希前軌而增騖兮眷後塵而旋顧往者倏忽而不逮兮來者冥昧而未著二儀泊焉其無央兮四節環轉而靡窮星鳥逝而時反兮夕景潛而且融景三后之在天兮歎聖哲之永終諒道修而命微兮孰舍盈而戢沖握隋珠與蕙若兮時莫悅而未遑彼未遑其何恤兮懼獨美之有傷蹇委深而投奧兮庶芬藻之不彰芳處幽而彌馨兮寶在夜而愈光逼區內之迫脅兮思攄翼乎八荒望雲階之崇壯兮願輕舉而高翔造庖犧以問象兮辨吉繇於姬文將遠游於太初兮鑒形魄之未分四靈儼而為衛兮六氣紛以成羣驂白獸於商風兮御蒼龍於景雲簡厮徒於靈圉兮從馮夷而問津召陵陽於游溪兮旌王子於柏人前祝融以掌燧兮殿玄冥以掩塵形彯彯而遂遐兮氣亹亹而愈新挹玉膏於萊嵎兮掇紫英於瀛濱揖太昊以假兮聽賦政於三春洪範翕而復張兮百卉隕而更震睇玉女之紛彯兮執懿筐於扶木覽玄象之韡壦兮仍騰躍乎陽谷吸朝霞以療飢兮降廩泉而濯足將縱轡以逍遙兮恨東極之路促詔纖阿而右回兮覿朱明之赫戲蒞羣神於夏庭兮回蒼梧而結知纚鷦明以承旗兮駔天馬而高馳讒羲和於丹丘兮誚倒景之亂儀尋凱風而南暨兮謝太陽於炎離戚溽暑之陶鬱兮余安能乎留斯聞碧雞之長晨兮吾將往乎西游奧浮鷁於弱水兮泊舳艫兮中流苟精粹之攸存兮誠沈羽以泛舟軼望舒以陵厲兮羌神漂而氣浮訊碩老於金室兮采舊聞於前修譏淪陰於危山兮問王母於椒丘觀玄烏之參趾兮會根一之神籌擾毚兔於月窟兮詰姮娥於蓐收爰攬轡而旋驅兮訪北叟之倚伏乘增冰而遂濟兮凌固陰之所滀探龜蛇於幽穴兮瞰罔養之潛哂倏忽之躁狂兮喪中黃於耳目偭燭龍而游衍兮窮大明於北陸攀招搖而上躋兮忽蹈廓而凌虛登閶闔而遺眷兮俯玄黃於地輿召黔雷以先導兮覲天帝於清都觀渾儀以寓目兮拊造化之大爐爰辨惑於上皇兮稽吉凶之元符唐則天而民咨兮癸亂常而感虞孔揮涕於西狩兮臧考祥於婁句跖肆暴而保兮顏履仁而夙徂何否泰之靡所兮眩榮辱之不圖運可期兮不可思道可知兮不可為求之者勞兮欲之者惑信天任命兮理乃自得且也四位為匠乾峍為均散而為物結而為人陽降陰升一替一興流而為川滯而為陵禍不可攘福不可徵其否兮有豫其泰兮有數成形兮未察靈像兮已固承明訓以發蒙兮審性命之靡求將澄神而守一兮奚飄飄而遐游斐陳辭以告退兮主悖惘而永歎惟升降之不仍兮詠別易而會難願大饗以致好兮盍息駕於一餐會司儀於有始兮延嘉賓於九乾陳鈞天之廣樂兮展萬舞之至歡枉矢鑠其在手兮狼弧其斯彎睨翟犬於帝側兮殪熊羆於靈軒爾乃清道夙蹕載輪修祖班命授號轙輈整旅兆司鬱以屆路兮萬靈森而陳庭豐隆軒其警衆兮鉤陳帥以屬兵堪輿竦而進時兮文昌肅以司行抗蚩尤之修旃兮建雄虹之采旌乘雲車電鞭之扶輿委移兮駕應龍青虯之容裔陸離俯游光逸景倏爍徽霍兮仰流旌垂旄猋攸襳纚前湛湛而攝進兮後僸僸而方馳且啓行於重陽兮奄稅駕乎少儀跨列缺兮窺乾峍揮玉關兮出天門涉漢津兮望昆崘經赤霄兮臨玄根觀品物兮終復魂形已消兮氣猶存眺懸舟之離離兮懷舊都之藹藹仍繁榮而督引兮將遄降而速邁華雲依霏而翼衡兮日月炫晃而映蓋蹈煙熅兮辭天衢心闣兮識故居路遂遒兮情欣欣奄忽歸兮反常閭修中和兮崇彝倫大道繇兮味琴書樂自然兮識窮達淡無思兮心娛舉賢良與夏侯湛等十七人策為下第拜中郎武帝詔曰省諸賢良答策雖所言殊塗皆明於王義有益政道欲詳覽其對究觀賢士大夫用心因詔諸賢良方正直言會東堂策問曰頃日食正陽水旱為災將何所修以變大眚及法令有不宜於今為公私所患苦者皆何事凡平世在於得才得才者亦借耳目以聽察若有文武器能有益於時務而未見申者各舉其人及有負俗謗議宜先洗濯者亦各言之虞對曰臣聞古之聖明原始以要終體本以正末故憂法度之不當而不憂人物之失所憂人物之失所而不憂災害之流行誠以法得於此則物理於彼人和於下則災消於上其有日月之眚水旱之災則反聽內視求其所由遠觀諸物近驗諸身耳目聽察豈或有蔽其聰明者乎動心出令豈或有傾其常正者乎大官大職豈或有授非其人者乎賞罰黜陟豈或有不得其所者乎河濱山巖豈或有懷道釣築而未感於夢兆者乎方外遐裔豈或有命世傑出而未蒙膏澤者乎推此類也以求其故詢事考言以盡其實則天人之情可得而見咎徵之至可得而救也若推之於物則無忤求之於身則無尤萬物理順內外咸宜祝史正辭言不負誠而日月錯行夭癘不戒此則陰陽之事非吉凶所在也期運度數自然之分固非人事所能供御其亦振廩散滯貶食省用而已矣是故誠遇期運則雖陶唐殷湯有所不變苟非期運則宋衛之君諸侯之相猶能有感唯陛下審其所由以盡其理則天下幸甚臣生長蓽門不逮異物雖有賢才所未接識不敢瞽言妄舉無以疇答聖問擢為太子舍人除聞喜令時天子留心政道又吳寇新平天下安上太康頌以美晉德其辭曰於休上古人之資始四隩咸宅萬國同軌有漢不競喪亂靡紀畿服外叛侯衛內圮天難既降時惟鞠凶龍戰獸爭分裂遐邦備僭岷蜀度逆海東權乃緣間割據三江明明上帝臨下有赫乃宣皇威致天之辟奮武遼隧罪人斯獲撫定朝鮮奄征韓貊文既應期席卷梁益元憝委命九夷重譯邛冉哀牢是焉底績我皇之登二國既平靡適不懷以育羣生吳乃負固放命南冥聲教未暨弗及王靈皇震其威赫如雷霆截彼江沔荊舒以清邈矣聖皇參乾兩離陶化以正取亂以奇耀武六旬輿徒不疲飲至數實干旄無虧洋洋四海率禮和樂穆穆宮廟歌雍詠鑠光天之下莫匪帝略窮髮反景承正受朔龍馬騤騤風于華陽弓矢櫜服干戈戢藏嚴嚴南金業業餘皇雄劍班朝造舟為梁聖明有造實代天工天地不違黎元時雍三務斯協用底厥庸既遠其迹將明其蹤喬山惟嶽望帝之封猗歟聖帝胡不封哉以母憂解職久之召補尚書郎將作大匠陳協掘地得古尺尚書奏今尺長於古尺宜以古為正潘嶽以為習用已久不宜復改虞駁曰昔聖人有以見天下之賾而擬其形容象物制器以存時用故參天兩地以正算數之紀依律計分以定長短之度其作之也有則故用之也有徵考步兩儀則天地無所隱其情準正三辰則懸象無所容其謬施之金石則音韵和諧措之規矩則器用合宜一本不差而萬物皆正及其差也事皆反是今尺長於古尺幾於半寸樂府用之律呂不合史官用之曆象失占醫署用之孔穴乖錯此三者度量之所由生得失之所取徵皆絓閡而不得通故宜改今而從古也唐虞之制同律度量衡仲尼之訓謹權審度今兩尺並用不可謂之同知失而行不可謂之謹不同不謹是謂謬法非所以軌物垂則示人之極凡物有多而易改亦有少而難變亦有改而致煩有變而之簡度量是人所常用而長短非人所戀惜是多而易改者也正失於得反邪於正一時之變永世無二是變而之簡者也憲章成式不失舊物季末苟合之制異端雜亂之用當以時釐改貞夫一者也臣以為宜如所奏又表論封禪見禮志虞以漢末喪亂譜傳多亡失雖其子孫不能言其先祖撰族姓昭穆十卷上疏進之以為足以備物致用廣多聞之益以定品違法為司徒所劾詔原之時太廟初建詔普增位一等後以主者承詔失旨改除之虞上表曰臣聞昔之聖明不愛千乘之國而惜桐葉之信所以重至尊之命而達於萬國之誠也前乙巳赦書遠稱先帝遺惠餘澤普增位一等以酬四海欣戴之心驛書班下被于遠近莫不鳥騰魚躍喜蒙德澤今一旦更以主者思文不審收既往之詔奪已澍之施臣之愚心竊以為不可詔從之元康中遷吳王友時荀顗撰新禮使虞討論得失而後施行元皇后崩杜預奏諒暗之制乃自上古是以高宗無服喪之文而唯文稱不言漢文限三十六日魏氏以降既虞為節皇太子與國為體理宜釋服卒哭便除虞答預書曰唐稱遏密殷云諒暗各舉事以為名非既葬有殊降周室以來謂之喪服喪服者以服表喪今帝者一日萬機太子監撫之重以宜奪禮葬訖除服變制通理垂典將來何必附之於古使老儒致爭哉皇太孫尚薨有司奏御服齊衰朞詔令博士議虞曰太子生舉以成人之禮則殤理除矣太孫亦體君傳重由位成而服全非以年也從之虞又議玉輅兩社事見輿服志後歷祕書監衛尉卿從惠帝幸長安及東軍來迎百官奔散遂流離鄠杜之間轉入南山中糧絶飢甚拾橡實而食之後得還洛歷光祿勳太常卿時懷帝親郊自元康以來不親郊祀禮儀弛廢虞考正舊典法物粲然及洛京荒亂盜竊縱橫人饑相食虞素清貧遂以餒卒虞撰文章志四卷注解三輔決録又撰古文章類聚區分為三十卷名曰流別集各為之論辭理愜當為世所重虞善觀玄象嘗謂友人曰今天下方亂避難之國其唯涼土乎性愛士人有表薦者為其辭東平太叔廣樞機清辨廣談虞不能對虞筆廣不能答更相嗤笑紛然於世云束皙束皙字廣微陽平元城人漢太子太傅疏廣之後也王莽末廣曾孫孟達避難自東海徙居沙鹿山南因去疏之足遂改姓焉祖混隴西太守父龕馮翊太守並有名譽皙博學多聞與兄璆俱知名少遊國學或問博士曹志曰當今好學者誰乎志曰陽平束廣微好學不倦人莫及也還鄉里察孝廉舉茂才皆不就璆娶石鑒從女棄之鑒以為憾諷州郡公府不得辟故皙等久不得調太康中郡界大旱皙為邑人請雨三日而雨注衆謂皙誠感為作歌曰束先生通神明請天三日甘雨零我黍以育我稷以生何以疇之報束長生皙與衛厚善聞遇禍自本郡赴喪嘗為勸農及諸賦文頗鄙俗時人薄之而性沈退不慕榮利作玄居釋以擬客難其辭曰束皙間居門人並侍方下帷深談隱几而咍含毫散藻考撰同異在側者進而問之曰蓋聞道尚變通達者無窮世亂則救其紛時泰則扶其隆振天維以贊百務熙帝載而鼓皇風生則率土樂其存死則宇內哀其終是以君子屈己伸道不恥干時上國有不索何獲之言周易著躍以求進之辭莘老負金鉉以陳烹割之說齊客當康衢而咏白水之詩今先生耽道修藝嶷然山峙潛朗通微洽覽深識夜兼忘寐之勤晝騁鑽玄之思曠年纍稔不墮其志鱗翼成而愈伏術業優而不試乃欲闔櫝辭價泥蟠深處永戢琳琅之耀匿首窮魚之渚當唐年而慕長沮邦有道而反寧武識彼迷此愚竊不取若乃士以援登進必待求附勢之黨橫擢則林藪之彥不抽丹墀步紈袴之童東野遺白顛之叟盍亦因子都而事博陸憑鷁首以涉洪流蹈翠雲以駭逸龍振光耀以驚沈鰌徒屈蟠於坎井眄天路而不游學既積而身困夫何為乎祕丘且歲不我與時若奔駟有來無反難得易失先生不知盱豫之讖悔遲而忘夫朋盍之義務疾亦豈能登海湄而抑東流之水臨虞泉而招西歸之日徒以曲畏為梏儒學自桎囚大道於環堵苦形骸於蓬室豈若託身權戚憑勢假力擇棲芳林飛不待翼夕宿七娥之房朝享五鼎之食匡三正則太階平贊五教而玉繩直孰若茹藿餐蔬終身自匿哉束子曰居吾將導爾以君子之道諭爾以出處之事爾其明受余訊謹聽余志昔元一既啓兩儀肇立離光夜隱望舒晝戢羽族翔林蛁赴溼物從性之所安士樂志之所執或背豐榮以巖栖或排蘭闥而求入在野者龍逸在朝者鳳集雖其軌迹不同而道無貴賤必安其業交不相羡稷契奮庸以宣道巢由洗耳以避禪同垂不朽之稱俱入賢者之流參名比譽誰劣誰優何必貪與二八為羣而恥為七人之疇乎且道睽而通士不同趣吾竊綴處者之末行未敢聞子之高喻將忽蒲輪而不眄夫何權戚之云附哉昔周漢中衰時難自託福兆既開患端亦作朝遊巍之宮夕墜崢嶸之壑晝笑夜歎晨華暮落忠不足以衛己禍不可以預度是士諱登朝而競赴林薄或毀名自汙或不食其祿比從政於匣笥之龜譬官者於郊廟之犢公孫泣涕而辭相楊雄抗論於赤族今大晉熙隆六合寧靜蜂蠆止毒熊羆輟猛五刑勿用八紘備整主無驕肆之怒臣無氂纓之請上下相安率禮從道朝養觸邪之獸庭有指佞之草禍戮可以忠逃寵祿可以順保且夫進無險懼而惟寂之務者率其性也兩可俱是而舍彼趣此者從其志也蓋無為可以解天下之紛淡泊可以救國家之急當位者事有所窮陳策者言有不入翟璜不能回西鄰之寇平勃不能正如意之立干木臥而秦師退四晧起而戚姬泣夫如是何舍何執何去何就謂山岑之林為芳谷底之莽為臭守分任性唯天所授鳥不假甲於龜魚不借足於獸何必笑孤竹之貧而羡齊景之富恥布衣以肆志寧文裘而拖繡且能約其躬則儋石之以豐苟肆其欲則海陵之積不足存道德者則匹夫之身可榮忘大倫者則萬乘之主猶辱將研六籍以訓世守寂泊以鎮俗偶鄭老於海隅匹嚴叟於僻蜀且世以太虛為輿玄爐為肆神游莫競之林心存無營之室榮利不擾其覺殷憂不干其寐捐夸者之所貪收躁務之所棄剃聖籍之荒蕪總羣言之一至全素履於丘園背纓緌而長逸請子課吾業於千載無聽吾言於今日也張華見而奇之石鑒卒王戎乃辟璆華召皙為掾又為司空下邳王晃所辟華為司空復以為賊曹屬時欲廣農皙上議曰伏見詔書以倉廩不實關右饑窮欲大興田農以蕃嘉穀此誠有虞戒大禹盡力之謂然農穰可致所由者三一曰天時不愆二曰地利無失三曰人力咸用若必春無霂之潤秋繁滂之患水旱失中雩禳有請雖使羲和平秩后稷親農理疆甽於原隰勤藨蓘於中田猶不足以致倉庾盈億之積也然地利可以計生人力可以課致詔書之旨亦將欲盡此理乎今天下千城人多游食廢業占空無田課之實較計九州數過萬計可申嚴此防令監司精察一人失課負及郡縣此人力之可致也又州司十郡土狹人繁三魏尤甚而猪羊馬牧布其境內宜悉破廢以供無業業少之人雖頗割徙在者猶多田諸菀牧不樂曠野貪在人間故謂北土不宜畜牧此誠不然案古今之語以為馬之所生實在冀北大賈牂羊取之清渤放豕之歌起於巨鹿是其效也可悉徙諸牧以充其地使馬牛猪羊齕草於空虛之田游食之人受業於賦給之賜此地利之可致者也昔騅駓在坰史克所以頌魯僖却馬務田老氏所以稱有道豈利之所以會哉又如汲郡之吳澤良田數千頃濘水停汙人不墾植聞其國人皆謂通泄之功不足為難舄鹵成原其利甚重而豪強大族惜其魚捕之饒構說官長終於不破此亦谷口之謠載在史篇謂宜復下郡縣以詳當今之計荊揚兗豫汙泥之土渠塢之宜必多此類最是不待天時而豐年可獲者也以其雲雨生於畚臿多稌生於決泄不必望朝隮而黃潦臻禜山川而霖雨息是故兩周爭東西之流史起惜漳渠之浸明地利之重也宜詔四州刺史使謹按以聞又昔魏氏徙三郡人在陽平頓丘界今者繁盛合五六千家二郡田地逼狹謂可徙還西州以充邊土賜其十年之復以慰重遷之情一舉兩得外實內寬增廣窮人之業以闢西郊之田此又農事之大益也轉佐著作郎撰晉書帝紀十志遷轉博士著作如故初太康二年汲郡人不準盜發魏襄王墓或言安釐王冢得竹書數十車其紀年十三篇記夏以來至周幽王為犬戎所滅以事接之三家分仍述魏事至安釐王之二十年蓋魏國之史書大略與春秋皆多相應其中經傳大異則云夏年多殷益干啓位啓殺之太甲殺伊尹文丁殺季歷自周受命至穆王百年非穆王壽百歲也幽王既亡有共伯和者攝行天子事非二相共和也其易經二篇與周易上下經同易繇陰陽卦二篇與周易略同繇辭則異卦下易經一篇似說卦而異公孫段二篇公孫段與邵陟論易國語三篇言楚晉事名三篇似禮記又似爾雅論語師春一篇書左傳諸卜筮師春似是造書者姓名也瑣語十一篇諸國卜夢妖怪相書也梁丘藏一篇先魏之世數次言丘藏金玉事繳書二篇論弋射法生封一篇帝王所封大曆二篇鄒子談天類也穆天子傳五篇言周穆王游行四海見帝臺西王母圖詩一篇畫贊之屬也又雜書十九篇周食田法周書論楚事周穆王美人盛姬死事大凡七十五篇七篇簡書折壞不識名題冢中又得銅劍一枚長二尺五寸漆書皆科斗字初發冢者燒策照取寶物及官收之多燼簡斷札文既殘缺不復詮次武帝以其書付祕書校綴次第尋考指歸而以今文寫之皙在著作得觀竹書隨疑分釋皆有義證遷尚書郎武帝嘗問摯虞三日曲水之義虞對曰漢章帝時平原徐肇以三月初生三女至三日俱亡村人以為怪乃招攜之水濱洗祓遂因水以泛觴其義起此帝曰必如所談便非好事皙進曰虞小生不足以知臣請言之昔周公成洛邑因流水以泛酒故逸詩云羽觴隨波又秦昭王以三日置酒河曲見金人奉水心之劍曰令君制有西夏乃霸諸侯因此立為曲水二漢相緣皆為盛集帝大悅賜皙金五十斤時有人於嵩高山下得竹簡一枚上兩行科斗書傳以相示莫有知者司空張華以問皙皙曰此漢明帝顯節陵中策文也檢驗果然時人伏其博識趙王倫為相國請為記室皙辭疾罷歸教授門徒年四十卒元城市里為之廢業門生故人立碑墓側皙才學博通所著三魏人士傳七代通記晉書紀志遇亂亡失其五經通論發蒙記補亡詩文集數十篇行于世云王接王接字祖游河東猗氏人漢京兆尹尊十世孫也父蔚世修儒史之學魏中領軍曹羲作至公論蔚善之而著至機論辭義甚美官至夏陽侯相接幼喪父哀毀過禮鄉親皆歎曰王氏有子哉渤海劉原為河東太守好奇以旌才為務同郡馮收試經為郎七十餘薦接於原曰夫騂不總轡則非造父之肆明月不流光則非隨侯之掌伏惟明府苞黃中之德耀重離之明求賢與能小無遺錯是以鄙老思獻所知竊見處士王接岐嶷俊異十三而孤居喪盡禮學過目而知義觸類而長斯玉鉉之妙味經世之徽猷也不患玄黎之不啓竊樂春英之及時原即禮命接不受原乃呼見曰君欲慕肥遁之高邪對曰接薄祜少孤而無兄弟母老疾篤故無心為吏及母終柴毀骨立居墓次積年備覽衆書多出異義性簡率不修俗操鄉里大族多不能善之唯裴頠雅知焉平陽太守柳淡散騎侍郎裴遐尚書僕射鄧攸皆與接友善後為郡主簿迎太守溫宇宇奇之轉功曹史州辟部平陽從事時泰山羊亮為平陽太守薦之於司隸校尉王堪出補都官從事永寧初舉秀才友人滎陽潘滔遺接書曰摯虞卞玄仁並謂足下應和鼎味可無以應秀才行接報書曰今世道交喪將遂剝亂而識智之士鉗口韜筆禍敗日深如火之燎原其可救乎非榮斯行欲極陳所見冀有覺悟耳是歲三王義舉惠帝復阼以國有大慶天下秀孝一皆不試接以為恨除中郎補征虜將軍司馬蕩陰之役侍中嵇紹為亂兵所害接議曰夫謀人之軍軍敗則死之謀人之國國危則亡之古之道也蕩陰之役百官奔北唯嵇紹守職以遇不道可謂臣矣又可稱痛矣今山東方欲大舉宜明高節以號令天下依春秋褒三纍之義加紹致命之賞則遐邇向風莫敢不肅矣朝廷從之河間王顒欲遷駕長安與關東乖異以接成都王佐難之表轉臨汾公相國及東海王越率諸侯討顒尚書令王堪統行臺上請接補尚書殿中郎未至而卒年三十九接學雖博通特精禮傳常謂左氏辭義贍富自是一家書不主為經發公羊附經立傳經所不書傳不妄起於文為儉通經為長任城何休訓釋甚詳而黜周王魯大體乖硋且志通公羊而往往還為公羊疾病接乃更注公羊春秋多有新義時祕書丞衛考正汲冢書未訖而遭難佐著作郎束皙述而成之事多證異義時東萊太守陳留王庭堅難之亦有證據皙又釋難而庭堅已亡散騎侍郎潘滔謂接曰卿才學理議足解二子之紛可試論之接遂詳其得失摯虞謝衡皆博物多聞咸以為允當又撰列女後傳七十二人雜論議詩賦碑頌駁難十餘萬言喪亂盡失長子愆期流寓江南緣父本意更注公羊又集列女後傳云史臣曰皇甫謐素履幽貞間居養疾留情筆削敦悅丘墳軒冕未足為榮貧賤不以為恥確乎不拔斯固有晉之高人者歟洎乎篤終立論薄葬昭儉既戒奢於季氏亦無取於王孫可謂達存亡之機矣摯虞束皙等並詳覽載籍多識舊章秦議可觀文詞雅贍可謂博聞之士也或攝官延閣裁成言事之書或蒞政秩宗參定禋郊之禮虞既厄於從理皙乃年位不充天之報施何其爽也王接才調秀出見賞知音惜其夭枉未申驥足嗟夫贊曰士安好逸栖心薘蓽屬意文雅忘懷榮秩遺制可稱養生乖術摯虞博聞廣微絶羣財成禮度刊緝遺文魏篇式序漢冊斯分祖游後出亦播清芬
