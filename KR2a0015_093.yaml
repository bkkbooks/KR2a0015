body:
  text: 晉書卷九十三列傳第六十三外戚詳觀往誥逖聽前聞階緣外戚以致顯榮者其所由來尚矣而多至禍敗鮮克令終者何哉豈不由祿以恩升位非德舉識慚明哲材謝經通假椒房之寵靈總軍國之樞要或威權震主或勢力傾朝居安而不慮危務進而不知退驕奢既至釁隙隨之者乎是以呂霍之家誅夷於西漢梁鄧之族剿絶於東都其餘干紀亂常害時蠹政者不可勝載至若樊靡卿之父子竇廣國之弟兄陰興之守約戒奢史丹之掩惡揚善斯並后族之所美者也由此觀之干時縱溢者必以凶終守道謙沖者永保貞吉古人所謂禍福無門惟人所召此非其效歟逮于晉難始自宮掖楊駿藉武帝之寵私叨竊非據賈謐乘惠皇之蒙昧成此厲階遂使悼后遇雲林之災愍懷濫湖城之酷天人道盡喪亂弘多宗廟以之顛覆黎庶於焉殄瘁詩云赫赫宗周褒姒滅之其此之謂也爰及江左未改覆車庾亮世族羽儀王恭高門領袖既而職兼出納任切股肱孝伯竟以亡身元規幾於敗國豈不哀哉若褚季野之畏避朝權王叔仁之固求出鎮用能全身遠害有可稱焉賈充楊駿庾亮王獻之王恭等已入列傳其餘即其成敗以為外戚篇云羊琇羊琇字稚舒景獻皇后之從父弟也父耽官至太常兄瑾尚書右僕射琇少舉郡計參鎮西鍾會軍事從平蜀及會謀反琇正言苦諫還賜爵關內侯琇涉學有智算少與武帝通門甚相親狎每接筵同席嘗謂帝曰若富貴見用任領護各十年帝戲而許之初帝未立為太子而聲論不及弟攸文帝素意重攸有代宗之議琇密為武帝畫策甚有匡救又觀察文帝為政損益揆度應所顧問之事皆令武帝默而識之其後文帝與武帝論當世之務及人間可否武帝答無不允由是儲位遂定及帝為撫軍命琇參軍事帝即王位後擢琇為左衛將軍封甘露亭侯帝踐阼纍遷中護軍加散騎常侍琇在職十三年典禁兵豫機密寵遇甚厚初杜預拜鎮南將軍朝士畢賀皆連榻而坐琇與裴楷後至曰杜元凱乃復以連榻而坐客邪遂不坐而去琇性豪侈費用無復齊限而屑炭和作獸形以溫酒洛下豪貴咸競效之又喜遊宴以夜續晝中外五親無男女之別時人譏之然黨慕勝己其所推奉便盡心無二窮窘之徒特能振恤選用多以得意者居先不盡銓次之理將士有冒官位者為其致節不惜軀命然放恣犯法每為有司所貸其後司隸校尉劉毅劾之應至重刑武帝以舊恩直免官而已尋以侯白衣領護軍頃之復職及齊王攸出鎮也琇以切諫忤旨左遷太僕既失寵憤怨遂發病以疾篤求退拜特進加散騎常侍還第卒帝手詔曰琇與朕有先后之親少小之恩歷位外內忠允茂著不幸早薨朕甚悼之其追贈輔國大將軍開府儀同三司賜東園祕器朝服一襲錢三十萬布百匹諡曰威王恂弟虔愷王恂字良夫文明皇后之弟也父肅魏蘭陵侯恂文義通博在朝忠正纍遷河南尹建立二學崇明五經鬲令袁毅嘗餽以駿馬恂不受及毅敗受貨者皆被廢黜焉魏氏給公卿已下租牛客戶數各有差自後小人憚役多樂為之貴勢之門動有百數又太原諸部亦以胸奴胡人為田客多者數千武帝踐位詔禁募客恂明峻其防所部莫敢犯者咸寧四年卒贈車騎將軍恂弟虔愷虔字恭祖以功幹見稱纍遷衛尉封安壽亭侯拜平東將軍假節監青州諸軍事徵為光祿勳轉尚書卒子士文嗣歷右衛將軍南中郎將鎮許昌為劉聰所害愷字君夫少有才力歷位清顯雖無細行有在公之稱以討楊駿勳封山都縣公邑千八百戶遷龍驤將軍領驍騎將軍加散騎常侍尋坐事免官起為射聲校尉久之轉後將軍愷既世族國戚性復豪侈用赤石脂泥壁石崇與愷將為鴆毒之事司隸校尉傅祗劾之有司皆論正重罪詔特原之由是衆人僉畏愷故敢肆其意所欲之事無所顧憚焉及卒諡曰醜楊文宗楊文宗武元皇后父也其先事漢四世為三公文宗為魏通事郎襲封蓩亭侯早卒以后父追贈車騎將軍諡曰穆羊玄之羊玄之惠皇后父尚書右僕射瑾之子也玄之初為尚書郎以后父拜光祿大夫特進散騎常侍更封興晉侯遷尚書右僕射加侍中進爵為公成都王穎之攻長沙王乂也以討玄之為名遂憂懼而卒追贈車騎將軍開府儀同三司虞豫子胤虞豫元敬皇后父也少有美稱州郡禮辟並不就拜南陽王文學早卒明帝即位追贈散騎常侍驃騎大將軍開府儀同三司平山縣侯子胤嗣胤敬后弟也初拜散騎常侍遷步兵校尉太寧末追贈豫官以胤襲侯爵轉右衛將軍與南頓王宗俱為明帝所昵並典禁兵及帝不豫宗以陰謀發覺事連胤帝隱忍不問徙胤為宗正卿加散騎常侍咸和二年宗伏誅左遷胤為桂陽太守秩中二千石頻徙琅邪廬陵太守咸康元年卒追贈衛將軍加散騎常侍子洪襲爵庾琛庾琛字子美明穆皇后父也兄袞在孝友傳琛永嘉初為建威將軍過江為會稽太守徵為丞相軍咨祭酒卒官以后父追贈左將軍妻毋丘氏追封鄉君子亮陳先志不受咸和中成帝又下詔追贈琛驃騎將軍儀同三司亮又辭焉亮在列傳杜乂杜乂字弘理成恭皇后父鎮南將軍預孫尚書左丞錫之子也性純和美姿容有盛名於江左王羲之見而目之曰膚若凝脂眼如點漆此神仙人也桓彝亦曰衛玠神清杜乂形清襲封當陽侯辟公府掾為丹楊丞早卒無男生后而乂終妻裴氏嫠居養后以禮自防甚有德音咸康初追贈金紫光祿大夫諡曰穆封裴氏為高安鄉君邑五百戶至孝武帝時崇進為廣德縣君裴氏壽考百姓號曰杜姥初司徒蔡謨甚器重乂嘗言於朝曰恨諸君不見杜乂也其為名流所重如此褚裒褚裒字季野康獻皇后父也祖祀有局量以幹用稱嘗為縣吏事有不合令欲鞭之祀曰物各有所施榱椽之材不合以為藩落也願明府垂察乃捨之家貧辭吏年垂五十鎮南將軍羊祜與祀有舊言於武帝始被升用官至安東將軍父洽武昌太守裒少有簡貴之風與京兆杜乂俱有盛名冠于中興譙國桓彝見而目之曰季野有皮𩹉陽秋言其外無臧否而內有所褒貶也謝安亦雅重之云裒雖不言而四時之氣亦備矣初辟西陽王掾吳王文學蘇峻之構逆也車騎將軍郗鑒以裒為參軍峻平以功封都鄉亭侯稍遷司徒從事中郎除給事黃門侍郎康帝為琅邪王時將納妃妙選素望詔娉裒女為妃於是出為豫章太守及康帝即位徵拜侍中遷尚書以后父苦求外出除建威將軍江州刺史鎮半洲在官清約雖居方伯使私童樵採頃之徵為衛將軍領中書令裒以中書銓管詔命不宜以姻戚居之固讓詔以為左將軍兗州刺史都督兗州徐州之琅邪諸軍事假節鎮金城又領琅邪內史初裒總角詣庾亮亮使郭璞筮之卦成璞駭然亮曰有不祥乎璞曰此非人臣卦不知此年少何以乃表斯祥二十年外吾言方驗及此二十九年而康獻皇太后臨朝有司以裒皇太后父議加不臣之禮拜侍中衛將軍録尚書事持節都督刺史如故裒以近戚懼獲譏嫌上疏固請居藩曰臣以虛鄙才不周用過蒙國恩纍忝非據無勞受寵負愧實深豈可復加殊特之命顯號重疊臣有何勳可以克堪何顏可以冒進委身聖世豈復遺力實懼顛墜所誤者大今王略未振萬機至殷陛下宜委誠宰輔一遵先帝任賢之道虛己受成坦平心於天下無宜內示私親之舉朝野失望所損豈少於是改授都督徐兗青揚州之晉陵吳國諸軍事衛將軍徐兗二州刺史假節鎮京口永和初復徵裒將以為揚州録尚書事吏部尚書劉遐説裒曰會稽王令德國之周公也足下宜以大政付之裒長史王胡之亦勸焉於是固辭歸藩朝野咸歎服之進號征北大將軍開府儀同三司固辭開府裒又以政道在於得才宜委賢任能升敬舊齒乃薦前光祿大夫顧和侍中殷浩疏奏即以和為尚書令浩為揚州刺史及石季龍死裒上表請伐之即日戒嚴直指泗口朝議以裒事任貴重不宜深入可先遣偏師裒重陳前所遣前鋒督護王頤之等徑造彭城示以威信後遣督護麋嶷進軍下邳賊即奔潰嶷率所領據其城池今宜速發以成聲勢於是除征討大都督青揚徐兗豫五州諸軍事裒率衆三萬徑進彭城河朔士庶歸降者日以千計裒撫納之甚得其歡心先遣督護徐龕伐沛獲偽相支重郡中二千餘人歸降魯郡山有五百餘家亦建義請援裒遣龕領鋭卒三千迎之龕違裒節度軍次代陂為石遵將李菟所敗死傷太半龕執節不撓為賊所害裒以春秋責帥授任失所威略虧損上疏自貶以征北將軍行事求留鎮廣陵詔以偏帥之責不應引咎逋寇未殄方鎮任重不宜貶降使還鎮京口解征討都督時石季龍新死其國大亂遺戶二十萬口渡河將歸順乞師救援會裒已旋威勢不接莫能自拔皆為慕容皓及苻健之衆所掠死亡咸盡裒以遠圖不就憂慨發病及至京口聞哭聲甚衆裒問何哭之多左右曰代陂之役也裒益慚恨永和五年卒年四十七遠近嗟悼吏士哀慕之贈侍中太傅本官如故諡曰元穆子歆字幼安以學行知名歷散騎常侍祕書監何準子澄何準字幼道穆章皇后父也高尚寡欲弱冠知名州府交辟並不就兄充為驃騎將軍勸其令仕準曰第五之名何減驃騎準兄弟中第五故有此言充居宰輔之重權傾一時而準散帶衡門不及人事唯誦佛經修營塔廟而已徵拜散騎郎不起年四十七卒升平元年追贈金紫光祿大夫封晉興縣侯子惔以父素行高潔表讓不受三子放惔澄放繼充惔官至南康太守早卒惔子元度西陽太守次叔度太常卿尚書澄字季玄起家袐書郎轉丞清正有器望纍遷袐書監太常中護軍孝武帝深愛之以為冠軍將軍吳國內史太元末琅邪王出居外第妙選師傅徵拜尚書領琅邪王師安帝即位遷尚書左僕射典選王師如故時澄腳疾固讓特聽不朝坐家視事又領本州大中正及桓玄執政以疾奏免卒于家安帝反正追贈金紫光祿大夫長子籍早卒次子融元熙中為大司農王濛子修王濛字仲祖哀靖皇后父也曾祖黯歷位尚書祖佑北軍中候父訥新淦令濛少時放縱不羈不為鄉曲所齒晚節始克己勵行有風流美譽虛己應物恕而後行莫不敬愛焉事諸母甚謹奉祿資産常推厚居薄喜慍不形於色不修小潔而以清約見稱善隸書美姿容嘗覽鏡自照稱其父字曰王文開生如此兒邪居貧帽敗自入市買之嫗悅其貌遺以新帽時人以為達與沛國劉惔齊名友善惔常稱濛性至通而自然有節濛每云劉君知我勝我自知時人以惔方荀奉倩濛比袁曜卿凡稱風流者舉濛惔為宗焉司徒王導辟為掾導復引匡術弟孝濛致箋於導曰開國承家小人勿用杖德義以尹天下方將澄清彝倫崇重名器夫軍國殊用文武異容豈可令涇渭混流虧清穆之風以允答具瞻儀形海內導不答後出補長山令復為司徒左西屬濛以此職有譴則應受杖固辭詔為停罰猶不就徙中書郎簡文帝之為會稽王也嘗與孫綽商略諸風流人綽言曰劉惔清蔚簡令王濛溫潤恬和桓溫高爽邁出謝尚清易令達而濛性和暢能言理辭簡而有會及簡文帝輔政益貴幸之與劉惔號為入室之賓轉司徒左長史晚求為東陽不許及濛病乃恨不用之濛聞之曰人言會稽王癡竟癡也疾漸篤於燈下轉麈尾視之歎曰如此人曾不得四十也年三十九卒臨殯劉惔以犀杷麈尾置棺中因慟絶久之謝安亦常稱美濛云王長史語甚不多可謂有令音有二子修蘊修字敬仁小字苟子明秀有美稱善隸書號曰流奕清舉年十二作賢全論濛以示劉惔曰敬仁此論便足以參微言起家著作郎琅邪王文學轉中軍司馬未拜而卒年二十四臨終歎曰無愧古人年與之齊矣王遐王遐字桓子簡順皇后父驃騎將軍述之從叔也少以華族仕至光祿勳寧康初追贈特進光祿大夫加散騎常侍諡曰靖長子恪領軍將軍恪子欣之豫章太守秩中二千石欣之弟歡之廣州刺史遐少子臻崇德衛尉王蘊王蘊字叔仁孝武定皇后父司徒左長史濛之子也起家佐著作郎纍遷尚書吏部郎性平和不抑寒素每一官缺求者十輩蘊無所是非時簡文帝為會稽王輔政蘊輒連狀白之曰某人有地某人有才務存進達各隨其方故不得者無怨焉補吳興太守甚有德政屬郡荒人飢輒開倉贍恤主簿執諫請先列表上待報蘊曰今百姓嗷然路有飢饉若表上須報何以救將死之命乎專輒之愆罪在太守且行仁義而敗無所恨也於是大振貸之賴蘊全者十七八焉朝廷以違科免蘊官士庶詣闕訟之詔特左降晉陵太守復有惠化百姓歌之定后立以后父遷光祿大夫領五兵尚書本州大中正封建昌縣侯蘊以恩澤賜爵非三代令典固辭不受朝廷敦勸終不肯拜乃授都督京口諸軍事左將軍徐州刺史假節復固讓謝安謂蘊曰卿居后父之重不應妄自菲薄以虧時遇宜依褚公故事但令在貴權於事不事耳可暫臨此任以紓國姻之重於是乃受命鎮於京口頃之徵拜尚書左僕射將軍如故遷丹楊尹即本軍號加散騎常侍蘊以姻戚不欲在內苦求外出復以為都督浙江東五郡鎮軍將軍會稽內史常侍如故蘊素嗜酒末年尤甚及在會稽略少醒日然猶以和簡為百姓所悅時王悅來拜墓蘊子恭往省之素相善遂留十餘日方還蘊問其故恭曰與阿太語蟬連不得歸蘊曰恐阿太非爾之友阿太悅小字也後竟乖初好時以為知人太元九年卒年五十五追贈左光祿大夫開府儀同三司長子華早卒次恭在列傳恭弟爽字季明強正有志力歷給事黃門侍郎侍中孝武帝崩王國寶夜欲開門入為遺詔爽距之曰大行晏駕皇太子未至敢入者斬乃止爽嘗與會稽王道子飲道子醉呼爽為小子爽曰亡祖長史與簡文皇帝為布衣之交亡姑亡姊伉儷二宮何小子之有及國寶執權免爽官後兄恭再起事並以爽為寧朔將軍參預軍事恭敗被誅褚爽褚爽字弘茂小字期生恭思皇后父也祖裒父歆爽少有令稱謝安甚重之嘗曰若期生不佳我不復論士矣為義興太守早卒以后父追贈金紫光祿大夫爽子秀之炎之喻之義熙中並歷大官史臣曰羊琇託肺腑之親處多聞之益遭逢潛躍之際預參經始之謀故得繾綣恩私便蕃任遇憑寵靈而逞欲恃勢位而驕陵屢犯憲章頻干國紀幸逢寬政得免刑書王愷地即渭陽家承世祿曾弗聞於恭儉但崇縱於奢淫競爽於季倫爭先於武子既塵清論有斁王猷雖復議行易名未足懲惡勸善弘理儀形外朗季野神鑒內融仲祖溫潤風流幼道清虛寡欲皆擅名江表見重當時豈惟后族之英華抑亦搢紳之令望者也贊曰託屬丹掖承輝紫宸地既權寵任惟執鈞約乃寡失驕則陵人覆車遺戒諒足書紳
