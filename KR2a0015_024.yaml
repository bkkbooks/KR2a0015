body:
  text: 晉書卷二十四志第十四職官書曰唐虞稽古建官惟百所以奬導民萌裁成庶政易曰天垂象聖人則之執法在南宮之右上相處端門之外而鳥龍居位雲火垂名前史詳之其以尚矣黃帝置三公之秩以親黎元少昊配九扈之名以為農正命重黎於天地詔融冥於水火則可得而言焉伊尹曰三公調陰陽九卿通寒暑大夫知人事列士去其私而成湯居颶初置二相以伊尹仲虺為之凡厥樞會仰承君命總及周武下車成康垂則六卿分職二公弘化咸樹司存各題標準苟非其道人弗虛榮貽厥孫謀其固本也如此及秦變周官漢遵嬴舊或隨時適用或因務遷革霸王之典義在於斯既獲厥安所謂得其時制者也四征興於漢代四安起於魏初四鎮通於柔遠四平止於喪亂其渡遼淩江輕車強弩式揚遐外用表攻伐興而復毀厥號彌繁及當塗得志克平諸夏初有軍師祭酒參掌戎律建安十三年罷漢台司更置丞相而以曹公居之用兼端揆孫吳劉蜀多依漢制雖復臨時命氏而無忝舊章世祖武皇帝即位之初以安平王孚為太宰鄭沖為太傅王祥為太保司馬望為太尉何曾為司徒荀顗為司空石苞為大司馬陳騫為大將軍世所謂八公同辰攀雲附翼者也若乃成乎棟宇非一枝之勢處乎經綸稱萬夫之敵或牽羊以叶於夢或垂釣以申其道或空桑以獻其術或操版以啓其心臥龍飛鴻方金擬璧秦奚鄭産楚材晉用斯亦曩時之良具其又昭彰者焉宣王既誅曹爽政由己出網羅英俊以備天官及蘭卿受羈貴公顯戮雖復策名魏氏而乃心皇晉及文王纂業初啓晉臺始置二衛有前驅養由之弩及設三部有熊渠佽飛之衆是以武帝龍飛乘茲奮翼猶武王以周之十亂而理殷民者也是以泰始盡於太康喬柯茂葉來居斯位自太興訖于建元南金北銑用處茲秩雖未擬乎夔拊龍言天工人代亦庶幾乎任官惟賢蒞事惟能者也丞相相國並秦官也晉受魏禪並不置自惠帝以後省置無為之者趙王倫梁王肜成都王穎南陽王保王敦王導之徒皆非復尋常人臣之職太宰太傅太保周之三公官也魏初唯置太傅以鍾繇為之末年又置太保以鄭沖為之晉初以景帝諱故又採周官官名置太宰以代太師之任秩增三司與太傅太保皆為上公論道經邦燮理陰陽無其人則闕以安平獻王孚居之自渡江以後其名不替而居之者甚寡太尉司徒司空並古官也自漢歷魏置以為三公及晉受命迄江左其官相承不替大司馬古官也漢制以冠大將軍驃騎車騎之上以代太尉之職故與太尉迭置不並列及魏有太尉而大司馬大將軍各自為官位在三司上晉受魏禪因其制以安平王孚為太宰鄭沖為太傅王祥為太保義陽王望為太尉何曾為司徒荀顗為司空石苞為大司馬陳騫為大將軍凡八公同時並置唯無丞相焉自義陽王望為大司馬之後定令如舊在三司上大將軍古官也漢武帝置冠以大司馬名為崇重之職及漢東京大將軍不常置為之者皆擅朝權至景帝為大將軍亦受非常之任後以叔父孚為太尉奏改大將軍在太尉下及晉受命猶依其制位次三司下後復舊在三司上太康元年琅邪王胄遷大將軍復制在三司下胄薨後如舊開府儀同三司漢官也殤帝延平元年鄧騭為車騎將軍儀同三司儀同之名始自此也及魏黃權以車騎將軍開府儀同三司開府之名起於此也驃騎車騎衛將軍伏波撫軍都護鎮軍中軍四征四鎮龍驤典軍上軍輔國等大將軍左右光祿光祿三大夫開府者皆為位從公太宰太傅太保司徒司空左右光祿大夫光祿大夫開府位從公者為文官公冠進賢三梁黑介幘大司馬大將軍太尉驃騎車騎衛將軍諸大將軍開府位從公者為武官公皆著武冠平上黑幘文武官公皆假金章紫綬著五時服其相國丞相皆衮冕緑盩綬所以殊於常公也諸公及開府位從公者品秩第一食奉日五斛太康二年又給絹春百匹秋絹二百匹綿二百斤元康元年給菜田十頃田騶十人立夏後不及田者食奉一年置長史一人秩一千石西東閣祭酒西東曹掾戶倉賊曹令史屬各一人御屬閣下令史西東曹倉戶賊曹令史門令史記室省事令史閣下記室書令史西東曹學事各一人給武賁二十人持班劍給朝車駕駟安車黑耳駕三各一乘祭酒掾屬白蓋小車七乘軺車施耳後戶皂輪犢車各一乘自祭酒已下令史已上皆皂零辟朝服太尉雖不加兵者吏屬皆絳服司徒加置左右長史各一人秩千石主簿左西曹掾屬各一人西曹稱右西曹其左西曹令史已下人數如舊令司空加置導橋掾一人諸公及開府位從公加兵者增置司馬一人秩千石從事中郎二人秩比千石主簿記室督各一人舍人四人兵鎧士曹營軍刺姦帳下都督外都督令史各一人主簿已下令史已上皆絳服司馬給吏卒如長史從事中郎給侍二人主簿記室督各給侍一人其餘臨時增崇者則褒加各因其時為節文不為定制諸公及開府位從公為持節都督增參軍為六人長史司馬從事中郎主簿記室督祭酒掾屬舍人如常加兵公制特進漢官也二漢及魏晉以加官從本官車服無吏卒太僕羊琇遜位拜特進加散騎常侍無餘官故給吏卒車服其餘加特進者唯食其祿賜位其班位而已不別給特進吏卒車服後定令特進品秩第二位次諸公在開府驃騎上冠進賢兩梁黑介幘五時朝服佩水蒼玉無章綬食奉日四斛太康二年始賜春服絹五十匹秋絹百五十匹綿一百五十斤元康元年給菜田八頃田騶八人立夏後不及田者食奉一年置主簿功曹史門亭長門下書佐各一人給安車黑耳駕御一人軺車施耳後戶一乘左右光祿大夫假金章紫綬光祿大夫加金章紫綬者品秩第二祿賜班位冠幘車服佩玉置吏卒羽林及卒諸所賜給皆與特進同其以為加官者唯假章綬祿賜班位而已不別給車服吏卒也又卒贈此位本已有卿官者不復重給吏卒其餘皆給光祿大夫假銀章青綬者品秩第三位在金紫將軍下諸卿上漢時所置無定員多以為拜假賵贈之使及監護喪事魏氏已來轉復優重不復以為使命之官其諸公告老者皆家拜此位及在朝顯職復用加之及晉受命仍舊不改復以為優崇之制而諸公遜位不復加之或更拜上公或以本封食公祿其諸卿尹中朝大官年老致仕者及內外之職加此者前後甚衆由是或因得開府或進加金章紫綬又復以為禮贈之位泰始中唯太子詹事楊珧加給事中光祿大夫加兵之制諸所供給依三品將軍其餘自如舊制終武惠孝懷三世光祿大夫與卿同秩中二千石著進賢兩梁冠黑介幘五時朝服佩水蒼玉食奉日三斛太康二年始給春賜絹五十匹秋絹百匹綿百斤惠帝元康元年始給菜田六頃田騶六人置主簿功曹史門亭長門下書佐各一人驃騎已下及諸大將軍不開府非持節都督者品秩第二其祿與特進同置長史司馬各一人秩千石主簿功曹史門下督録事兵鎧士賊曹營軍刺姦帳下都督功曹書佐門吏門下書吏各一人其假節為都督者所置與四征鎮加大將軍不開府為都督者同四征鎮安平加大將軍不開府持節都督者品秩第二置參佐吏卒幕府兵騎如常都督制唯朝會祿賜從二品將軍之例然則持節都督無定員前漢遣使始有持節光武建武初征伐四方始權時置督軍御史事竟罷建安中魏武為相始遣大將軍督之二十一年征孫權還夏侯惇督二十六軍是也魏文帝黃初三年始置都督諸州軍事或領刺史又上軍大將軍曹真都督中外諸軍事假黃鉞則總統內外諸軍矣魏明帝太和四年秋宣帝征蜀加號大都督高貴鄉公正元二年文帝都督中外諸軍尋加大都督及晉受禪都督諸軍為上監諸軍次之督諸軍為下使持節為上持節次之假節為下使持節得殺二千石以下持節殺無官位人若軍事得與使持節同假節唯軍事得殺犯軍令者江左以來都督中外尤重唯王導等權重者乃居之三品將軍秩中二千石者著武冠平上黑幘五時朝服佩水蒼玉食奉春秋賜綿絹菜田田騶如光祿大夫諸卿制置長史司馬各一人秩千石主簿功曹門下都督録事兵鎧士賊曹營軍刺姦吏帳下都督功曹書佐門吏門下書吏各一人録尚書案漢武時左右曹諸吏分平尚書奏事知樞要者始領尚書事張安世以車騎將軍霍光以大將軍王鳳以大司馬師丹以左將軍並領尚書事後漢章帝以太傅趙喜太尉牟融並録尚書事尚書有録名蓋自喜融始亦西京領尚書之任猶唐虞大麓之職也和帝時太尉鄧彪為太傅録尚書事位上公在三公上漢制遂以為常每少帝立則置太傅録尚書事猶古冢宰總已之義薨輒罷之自魏晉以後亦公卿權重者為之尚書令秩千石假銅印墨綬冠進賢兩梁冠納言幘五時朝服佩水蒼玉食奉月五十斛受拜則策命之以在端右故也太康二年始給賜絹春三十匹秋七十匹綿七十斤元康元年始給菜田六頃田騶六人立夏後不及田者食奉一年始賈充為尚書令以目疾表置省事吏四人省事蓋自此始僕射服秩印綬與令同案漢本置一人至漢獻帝建安四年以執金吾榮郃為尚書左僕射僕射分置左右蓋自此始經魏至晉迄於江左省置無置二則為左右僕射或不兩置但曰尚書僕射令闕則左為省主若左右並闕則置尚書僕射以主左事列曹尚書案尚書本漢承秦置及武帝遊宴後庭始用宦者主中書以司馬遷為之中間遂罷其官以為中書之職至成帝建始四年罷中書宦者又置尚書五人一人為僕射而四人分為四曹通掌圖書祕記章奏之事各有其任其一曰常侍曹主丞相御史公卿事其二曰二千石曹主刺史郡國事其三曰民曹主吏民上書事其四曰主客曹主外國夷狄事後成帝又置三公曹主斷獄是為五曹後漢光武以三公曹主歲盡考課諸州郡事改常侍曹為吏部曹主選舉祠祀事民曹主繕修功作鹽池園苑事客曹主護駕羌胡朝賀事二千石曹主辭訟事中都官曹主水火盜賊事合為六曹并令僕二人謂之八座尚書雖有曹名不以為號靈帝以侍中梁鵠為選部尚書於此始見曹名及魏改選部為吏部主選部事又有左民客曹五兵度支凡五曹尚書二僕射一令為八座及晉置吏部三公客曹駕部屯田度支六曹而無五兵咸寧二年省駕部尚書四年省一僕射又置駕部尚書太康中有吏部殿中及五兵田曹度支左民為六曹尚書又無駕部三公客曹惠帝世又有右民尚書止於六曹不知此時省何曹也及渡江有吏部祠部五兵左民度支五尚書祠部尚書常與右僕射通職不置以右僕射攝之若右僕射闕則以祠部尚書攝知右事左右丞自漢武帝建始四年置尚書而便置丞四人及光武始減其二唯置左右丞左右丞蓋自此始也自此至晉不改晉左丞主臺內禁令宗廟祠祀朝儀禮制選用署吏急假右丞掌臺內庫藏廬舍凡諸器用之物及廩振人租布刑獄兵器督録遠道文書章表奏事八座郎初拜皆沿漢舊制並集都座交禮遷職又解交焉尚書郎西漢舊置四人以分掌尚書其一人主胸奴單于營部一人主羌夷吏民一人主戶口墾田一人主財帛委輸及光武分尚書為六曹之後合置三十四人秩四百石并左右丞為三十六人郎主作文書起草更直五日於建禮門內尚書郎初從三署詣臺試守尚書郎中歲滿稱尚書郎三年稱侍郎選有吏能者為之至魏尚書郎有殿中吏部駕部金部虞曹比部南主客祠部度支庫部農部水部儀曹三公倉部民曹二千石中兵外兵都兵別兵考功定課凡二十三郎青龍二年尚書陳矯奏置都官騎兵合凡二十五郎每一郎缺白試諸孝廉能結文案者五人謹封奏其姓名以補之及晉受命武帝罷農部定課置直事殿中祠部儀曹吏部三公比部金部倉部度支都官二千石左民右民虞曹屯田起部水部左右主客駕部車部庫部左右中兵左右外兵別兵都兵騎兵左右士北主客南主客為三十四曹郎後又置運曹凡三十五曹置郎二十三人更相統攝及江左無直事右民屯田車部別兵都兵騎兵左右士運曹十曹郎康穆以後又無虞曹二千石二郎但有殿中祠部吏部儀曹三公比部金部倉部度支都官左民起部水部主客駕部庫部中兵外兵十八曹郎後又省主客起部水部餘十五曹云侍中案黃帝時風后為侍中於周為常伯之任秦取古名置侍中漢因之秦漢俱無定員以功高者一人為僕射魏晉以來置四人別加官者則非數掌儐贊威儀大駕出則次直侍中護駕正直侍中負璽陪乘不帶劍餘皆騎從御登殿與散騎常侍對扶侍中居左常侍居右備切問近對拾遺補闕及江左哀帝興寧四年桓溫奏省二人後復舊給事黃門侍郎秦官也漢已後並因之與侍中俱管門下衆事無員及晉置員四人散騎常侍本秦官也秦置散騎又置中常侍散騎騎從乘輿車後中常侍得入禁中皆無員亦以為加官漢東京初省散騎而中常侍用宦者魏文帝黃初初置散騎合之於中常侍同掌規諫不典事貂璫插右騎而散從至晉不改及元康中惠帝始以宦者董猛為中常侍後遂止常為顯職給事中秦官也所加或大夫博士議郎掌顧問應對位次中常侍漢因之及漢東京省魏世復置至晉不改在散騎常侍下給事黃門侍郎上無員通直散騎常侍案魏末散騎常侍又有在員外者泰始十年武帝使二人與散騎常侍通員直故謂之通直散騎常侍江左置四人員外散騎常侍魏末置無員散騎侍郎四人魏初與散騎常侍同置自魏至晉散騎常侍侍郎與侍中黃門侍郎共平尚書奏事江左乃罷通直散騎侍郎四人初武帝置員外散騎侍郎及太興元年元帝使二人與散騎侍郎通員直故謂之通直散騎侍郎後增為四人員外散騎侍郎武帝置無員奉朝請本不為官無員漢東京罷三公外戚宗室諸侯多奉朝請奉朝請者奉朝會請召而已武帝亦以宗室外戚為奉車駙馬騎三都尉而奉朝請焉元帝為晉王以參軍為奉車都尉掾屬為駙馬都尉行參軍舍人為騎都尉皆奉朝請後罷奉車騎二都尉唯留駙馬都尉奉朝請諸尚公主者劉惔桓溫皆為之中書監及令案漢武帝遊宴後庭始使宦者典事尚書謂之中書謁者置令僕射成帝改中書謁者令曰中謁者令罷僕射漢東京省中謁者令而有中官謁者令非其職也魏武帝為魏王置祕書令典尚書奏事文帝黃初初改為中書置監令以祕書左丞劉放為中書監右丞孫資為中書令監令蓋自此始也及晉因之並置員一人中書侍郎魏黃初初中書既置監令又置通事郎次黃門郎黃門郎已署事過通事乃署名已署奏以入為帝省讀書可及晉改曰中書侍郎員四人中書侍郎蓋此始也及江左初改中書侍郎曰通事郎尋復為中書侍郎中書舍人案晉初初置舍人通事各一人江左合舍人通事謂之通事舍人掌呈奏案章後省而以中書侍郎一人直西省又掌詔命祕書監案漢桓帝延熹二年置祕書監後省魏武為魏王置祕書令丞及文帝黃初初置中書令典尚書奏事而祕書改令為監後以何禎為祕書丞而祕書先自有丞乃以禎為祕書右丞及晉受命武帝以祕書并中書省其祕書著作之局不廢惠帝永平中復置祕書監其屬官有丞有郎并統著作省著作郎周左史之任也漢東京圖籍在東觀故使名儒著作東觀有其名尚未有官魏明帝太和中詔置著作郎於此始有其官隸中書省及晉受命武帝以繆徵為中書著作郎元康二年詔曰著作舊屬中書而祕書既典文籍今改中書著作為祕書著作於是改隸祕書省後別自置省而猶隸祕書著作郎一人謂之大著作郎專掌史任又置佐著作郎八人著作郎始到職必撰名臣傳一人太常光祿勳衛尉太僕廷尉大鴻臚宗正大司農少府將作大匠太后三卿大長秋皆為列卿各置丞功曹主簿五官等員太常有博士協律校尉員又統太學諸博士祭酒及太史太廟太樂鼓吹陵等令太史又別置靈臺丞太常博士魏官也魏文帝初置晉因之掌引導乘輿王公已下應追諡者則博士議定之協律校尉漢協律都尉之職也魏杜夔為之及晉改為協律校尉晉初承魏制置博士十九人及咸寧四年武帝初立國子學定置國子祭酒博士各一人助教十五人以教生徒博士皆取履行清淳通明典義者若散騎常侍中書侍郎太子中庶子以上乃得召試及江左初減為九人元帝末增儀禮春秋公羊博士各一人合為十一人後又增為十六人不復分掌五經而謂之太學博士也孝武太元十年損國子助教員為十人光祿勳統武賁中郎將羽林郎將冗從僕射羽林左監五官左右中郎將東園匠太官御府守宮黃門掖庭清商華林園暴室等令哀帝興寧二年省光祿勳并司徒孝武寧康元年復置衛尉統武庫公車衛士諸冶等令左右都候南北東西督冶掾及渡江省衛尉太僕統典農典虞都尉典虞丞左右中典牧都尉車府典牧乘黃驊騮龍馬等令典牧又別置羊牧丞太僕自元帝渡江之後或省或置太僕省故驊騮為門下之職廷尉主刑法獄訟屬官有正監評并有律博士員大鴻臚統大行典客園池華林園鈎盾等令又有青宮列丞鄴玄武苑丞及江左有事則權置無事則省宗正統皇族宗人圖諜又統太醫令史又有司牧掾員及渡江哀帝省并太常太醫以給門下省大司農統太倉籍田導官三令襄國都水長東西南北部護漕掾及渡江哀帝省并都水孝武復置少府統材官校尉中左右三尚方中黃左右藏左校甄官平準奚官等令左校坊鄴中黃左右藏油官等丞及渡江哀帝省并丹楊尹孝武復置自渡江唯置一尚方又省御府將作大匠有事則置無事則罷太后三卿衛尉少府太僕漢置皆隨太后宮為官號在同名卿上無太后則闕魏改漢制在九卿下及晉復舊在同號卿上大長秋皇后卿也有后則置無后則省御史中丞本秦官也秦時御史大夫有二丞其一御史丞其一為中丞中丞外督部刺史內領侍御史受公卿奏事舉劾案章漢因之及成帝綏和元年更名御史大夫為大司空置長史而中丞官職如故哀帝建平二年復為御史大夫元壽二年又為大司空而中丞出外為御史臺主歷漢東京至晉因其制以中丞為臺主治書侍御史案漢宣帝幸宣室齋居而決事令侍御史二人治書侍側後因別置謂之治書侍御史蓋其始也及魏又置治書執法掌奏劾而治書侍御史掌律令二官俱置及晉唯置治書侍御史員四人泰始四年又置黃沙獄治書侍御史一人秩與中丞同掌詔獄及廷尉不當者皆治之後并河南遂省黃沙治書侍御史及太康中又省治書侍御史二員侍御史案二漢所掌凡有五曹一曰令曹掌律令二曰印曹掌刻印三曰供曹掌齋祠四曰尉馬曹掌馬五曰乘曹掌護駕魏置八人及晉置員九人品同治書而有十三曹吏曹課第曹直事曹印曹中都督曹外都督曹媒曹符節曹水曹中壘曹營軍曹法曹算曹及江左初省課第曹置庫曹掌牧牛馬市租後分曹置外左庫內左庫云殿中侍御史案魏蘭臺遣二御史居殿中伺察非法即其始也及晉置四人江左置二人又案魏晉官品令又有禁防御史第七品孝武太元中有檢校御史吳琨則此二職亦蘭臺之職也符節御史秦符璽令之職也漢因之位次御史中丞至魏別為一臺位次御史中丞掌授節銅武符竹使符及泰始九年武帝省并蘭臺置符節御史掌其事焉司隸校尉案漢武初置十三州刺史各一人又置司隸校尉察三輔三河弘農七郡歷漢東京及魏晉其官不替屬官有功曹都官從事諸曹從事部郡從事主簿録事門下書佐省事記室書佐諸曹書佐守從事武猛從事等員凡吏一百人卒三十二人及渡江乃罷司隸校尉官其職乃揚州刺史也謁者僕射秦官也自漢至魏因之魏置僕射掌大拜授及百官班次統謁者十人及武帝省僕射以謁者并蘭臺江左復置僕射後又省都水使者漢水衡之職也漢又有都水長丞主陂池灌溉保守河渠屬太常漢東京省都水置河隄謁者魏因之及武帝省水衡置都水使者一人以河隄謁者為都水官屬及江左省河隄謁者置謁者六人中領軍將軍魏官也漢建安四年魏武丞相府自置及拔漢中以曹休為中領軍文帝踐阼始置領軍將軍以曹休為之主五校中壘武衛等三營武帝初省使中軍將軍羊祜統二衛前後左右驍衛等營即領軍之任也懷帝永嘉中改中軍曰中領軍永昌元年改曰北軍中候尋復為領軍成帝世復為中候尋復為領軍護軍將軍案本秦護軍都尉官也漢因之高祖以陳平為護軍中尉武帝復以為護軍都尉屬大司馬魏武為相以韓浩為護軍史渙為領軍非漢官也建安十二年改護軍為中護軍領軍為中領軍置長史司馬魏初因置護軍將軍主武官選隸領軍晉世則不隸也元帝永昌元年省護軍并領軍明帝太寧二年復置領護各領營兵江左以來領軍不復別領營總統二衛驍騎材官諸營護軍猶別有營也資重者為領軍護軍資輕者為中領軍中護軍屬官有長史司馬功曹主簿五官受命出征則置參軍左右衛將軍案文帝初置中衛及衛武帝受命分為左右衛以羊琇為左趙序為右並置長史司馬功曹主簿員江左罷長史驍騎將軍遊擊將軍並漢雜號將軍也魏置為中軍及晉以領護左右衛驍騎遊擊為六軍左右前後軍將軍案魏明帝時有左軍則左軍魏官也至晉不改武帝初又置前軍右軍泰始八年又置後軍是為四軍屯騎步兵越騎長水射聲等校尉是為五校並漢官也魏晉逮于江左猶領營兵並置司馬功曹主簿後省左軍右軍前軍後軍為鎮衛軍其左右營校尉自如舊皆中領軍統之二衛始制前驅由基強弩為三部司馬各置督史左衛熊渠武賁右衛佽飛武賁二衛各五部督其命中武賁驍騎遊擊各領之又置武賁羽林上騎異力四部并命中為五督其衛鎮四軍如五校各置千人更制殿中將軍中郎校尉司馬比驍騎持椎斧武賁分屬二衛尉中武賁持鈒冗從羽林司馬常從人數各有差武帝甚重兵官故軍校多選朝廷清望之士居之先是陳協為文帝所待特有才用明解軍令帝為晉王委任使典兵事及蜀破後令協受諸葛亮圍陳用兵倚伏之法又甲乙校標幟之制協悉暗練之遂以協為殿中典兵中郎將遷將軍久之武帝每出入協持白獸幡在乘輿左右鹵簿陳列齊肅太康末武帝嘗出射雉協時已為都水使者散從車駕逼暗乃還漏巳盡當合函停乘輿良久不得合乃詔協合之協舉白獸幡指麾須臾之間而函成皆謝協間解甚為武帝所任太子太傅少傅皆古官也泰始三年武帝始建官各置一人尚未置詹事官事無大小皆由二傅並有功曹主簿五官太傅中二千石少傅二千石其訓導者太傅在前少傅在後皇太子先拜諸傅然後答之武帝後以儲副體尊遂命諸公居之以本位重故或行或領時侍中任愷武帝所親敬復使領之蓋一時之制也咸寧元年以給事黃門侍郎楊珧為詹事掌宮事二傅不復領官屬及楊珧為衛將軍領少傅省詹事遂崇廣傅訓命太尉賈充領太保司空齊王攸領太傅所置吏屬復如舊二傅進賢兩梁冠黑介幘五時朝服佩水蒼玉食奉日三斛太康二年始給春賜絹五十匹秋絹百匹綿百斤其後太尉汝南王亮車騎將軍楊駿司空衛瓘石鑒皆領傅保猶不置詹事以終武帝之世惠帝元康元年復置詹事二傅給菜田六頃田騶六人立夏後不及田者食奉一年置丞一人秩千石主簿五官掾功曹史主記門下史録事戶曹法曹倉曹賊曹功曹書佐門下亭長門下書佐省事各一人給赤耳安車一乘及愍懷建官乃置六傅三太三少以景帝諱師故改太師為太保通省尚書事詹事文書關由六傅然自元康之後諸傅或二或三或四或六及永康中復不置詹事也自太安已來置詹事終孝懷之世渡江之後有太傅少傅不立師保中庶子四人職如侍中中舍人四人咸寧四年置以舍人才學美者為之與中庶子共掌文翰職如黃門侍郎在中庶子下洗馬上食官令一人職如太官令庶子四人職比散騎常侍中書監令舍人十六人職比散騎中書等侍郎洗馬八人職如謁者祕書掌圖籍釋奠講經則掌其事出則直者前驅導威儀率更令主官殿門戶及賞罰事職如光祿勳衛尉家令主刑獄穀貨飲食職比司農少府漢東京主食官令食官令及晉自為官不復屬家令僕主車馬親族職如太僕宗正左右衛率案武帝建東宮置衛率初曰中衛率泰始五年分為左右各領一軍惠帝時愍懷太子在東宮又加前後二率及江左省前後二率孝武太元中又置王置師友文學各一人景帝諱故改師為傅友者因文王仲尼四友之名號改太守為內史省相及僕有郎中令中尉大農為三卿大國置左右常侍各一人省郎中置侍郎二人典書典祠典衛學官令典書丞各一人治書四人中尉司馬世子庶子陵廟牧長各一人謁者四人中大夫六人舍人十人典府各一人咸寧三年衛將軍楊珧與中書監荀勗以齊王攸有時望懼惠帝有後難因追故司空裴秀立五等封建之旨從容共陳時宜於武帝以為古者建侯所以藩衛王室今吳寇未殄方嶽任大而諸王為帥都督封國既各不臣其統內於事重非宜又異姓諸將居邊宜參以親戚而諸王公皆在京都非扞城之義萬世之固帝初未之察於是下詔議其制有司奏從諸王公更制戶邑皆中尉領兵其平原汝南琅邪扶風齊為大國梁趙樂安燕安平義陽為次國其餘為小國皆制所近縣益滿萬戶又為郡公制度如小國王亦中尉領兵郡侯如不滿五千戶王置一軍一千一百人亦中尉領之于時唯特增魯公國戶邑追進封故司空博陵公王沈為郡公巨平侯羊祜為南城郡侯又南宮王承隨王萬各於泰始中封為縣王邑千戶至是改正縣王增邑為三千戶制度如郡侯亦置一軍自此非皇子不得為王而諸王之支庶皆皇家之近屬至親亦各以土推恩受封其大國次國始封王之支子為公承封王之支子為侯繼承封王之支子為伯小國五千戶已上始封王之支子為子不滿五千戶始封王之支子及始封公侯之支子皆為男非此皆不得封其公之制度如五千戶國侯之制度如不滿五千戶國亦置一軍千人中尉領之伯子男以下各有差而不置軍大國始封之孫罷下軍曾孫又罷上軍次國始封子孫亦罷下軍其餘皆以一軍為常大國中軍二千人上下軍各千五百人次國上軍二千人下軍千人其未之國者大國置守土百人次國八十人小國六十人郡侯縣公亦如小國制度既行所增徙各如本奏遣就國而諸公皆戀京師涕泣而去及吳平後齊王攸遂之國中朝制典書令在常侍下侍郎上及渡江則侍郎次常侍而典書令居三軍下公國則無中尉常侍三軍侯國又無大農侍郎伯子男唯典書以下又無學官令史職皆以次損焉公侯以下置官屬隨國大小無定制其餘官司各有差名山大澤不以封鹽鐵金銀銅錫始平之竹園別都宮室園囿皆不為屬國其仕在天朝者與之國同皆自選其文武官諸入作卿士而其世子年已壯者皆遣蒞國其王公已下茅社符璽車旗命服一如泰始初故事州置刺史別駕治中從事諸曹從事等員所領中郡以上及江陽朱提郡郡各置部從事一人小郡亦置一人又有主簿門亭長録事記室書佐諸曹佐守從事武猛從事等凡吏四十一人卒二十人諸州邊遠或有山險濱近寇賊羌夷者又置弓馬從事五十餘人徐州又置淮海涼州置河津諸州置都水從事各一人涼益州置吏八十五人卒二十人荊州又置監佃督一人郡皆置太守河南郡京師所在則曰尹諸王國以內史掌太守之任又置主簿主記室門下賊曹議生門下史記室史録事史書佐循行幹小史五官掾功曹史功曹書佐循行小史五官掾等員郡國戶不滿五千者置職吏五十人散吏十三人五千戶以上則職吏六十三人散吏二十一人萬戶以上職吏六十九人散吏三十九人郡國皆置文學掾一人縣大者置令小者置長有主簿録事史主記室史門下書佐幹遊徼議生循行功曹史小史廷掾功曹史小史書佐幹戶曹掾史幹法曹門幹金倉賊曹掾史兵曹史吏曹史獄小史獄門亭長都亭長賊捕掾等員戶不滿三百以下職吏十八人散吏四人三百以上職吏二十八人散吏六人五百以上職吏四十人散吏八人千以上職吏五十三人散吏十二人千五百以上職吏六十八人散吏一十八人三千以上職吏八十八人散吏二十六人郡國及縣農月皆隨所領戶多少為差散吏為勸農又縣五百以上皆置鄉三千以上置二鄉五千以上置三鄉萬以上置四鄉鄉置嗇夫一人鄉戶不滿千以下置治書史一人千以上置史佐各一人正一人五千五百以上置史一人佐二人縣率百戶置里吏一人其土廣人稀聽隨宜置里吏限不得減五十戶戶千以上置校官掾一人縣皆置方略吏四人洛陽縣置六部尉江左以後建康亦置六部尉餘大縣置二人次縣小縣各一人鄴長安置吏如三千戶以上之制四中郎將並後漢置歷魏及晉並有其職江左彌重護羌夷蠻等校尉案武帝置南蠻校尉於襄陽西戎校尉於長安南夷校尉於寧州元康中護羌校尉為涼州刺史西戎校尉為雍州刺史南蠻校尉為荊州刺史及江左初省南蠻校尉尋又置於江陵改南夷校尉曰鎮蠻校尉及安帝時於襄陽置寧蠻校尉護胸奴羌戎蠻夷越中郎將案武帝置四中郎將或領刺史或持節為之武帝又置平越中郎將居廣州主護南越
