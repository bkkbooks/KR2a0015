body:
  text: 晉書卷六帝紀第六元帝元皇帝諱睿字景文宣帝曾孫琅邪恭王覲之子也咸寧二年生於洛陽有神光之異一室盡明所藉䤝如始刈及長白豪生於日角之左隆準龍顏目有精曜顧眄煒如也年十五嗣位琅邪王幼有令問及惠皇之際王室多故帝每恭儉退讓以免於禍沈敏有度量不顯灼然之迹故時人未之識焉惟侍中嵇紹異之謂人曰琅邪王毛骨非常殆非人臣之相也元康二年拜員外散騎常侍纍遷左將軍從討成都王穎蕩陰之敗也叔父東安王繇為穎所害帝懼禍及將出奔其夜月正明而禁衛嚴警帝無由得去甚窘迫有頃雲霧晦冥雷雨暴至徼者皆弛因得潛出穎先令諸關無得出貴人帝既至河陽為津吏所止從者宋典後來以策鞭帝馬而笑曰舍長官禁貴人汝亦被拘邪吏乃聽過至洛陽迎太妃俱歸國東海王越之收兵下邳也假帝輔國將軍尋加平東將軍監徐州諸軍事鎮下邳俄遷安東將軍都督揚州諸軍事越西迎大駕留帝居守永嘉初用王導計始鎮建鄴以顧榮為軍司馬賀循為參佐王敦王導周顗刁協並為腹心股肱賓禮名賢存問風俗江東歸心焉屬太妃薨于國自表奔喪葬畢還鎮增封宣城郡二萬戶加鎮東大將軍開府儀同三司受越命討征東將軍周馥走之及懷帝蒙塵于平陽司空荀藩等移檄天下推帝為盟主江州刺史華軼不從使豫章內史周廣前江州刺史衛展討禽之愍帝即位加左丞相歲餘進位丞相大都督中外諸軍事遣諸將分定江東斬叛者孫弼于宣城平杜韜于湘州承制赦荊揚及西都不守帝出師露次躬擐甲胄移檄四方徵天下之兵剋日進討于時有玉册見於臨安白玉麒麟神璽出於江寧其文曰長壽萬年日有重暈皆以為中興之象焉建武元年春二月辛巳平東將軍宋哲至宣愍帝詔曰遭運迍否皇綱不振朕以寡德奉承洪緒不能祈天永命紹隆中興至使凶胡敢帥犬羊逼迫京輦朕今幽塞窮城憂慮萬端恐一旦崩潰卿指詣丞相具宣朕意使攝萬機時據舊都修復陵廟以雪大恥三月帝素服出次舉哀三日西陽王羕及羣僚參佐州征牧守等上尊號帝不許羕等以死固請至於再三帝慨然流涕曰孤罪人也惟有蹈節死義以雪天下之恥庶贖鈇鉞之誅吾本琅邪王諸賢見逼不已乃呼私奴命駕將反國羣臣乃不敢逼請依魏晉故事為晉王許之辛卯即王位大赦改元其殺祖父母父母及劉聰石勒不從此令諸參軍拜奉車都尉掾屬駙馬都尉辟掾屬百餘人時人謂之百六掾乃備百官立宗廟社稷於建康時四方競上符瑞帝曰孤負四海之責未能思何徵祥之有丙辰立世子紹為晉王太子以撫軍大將軍西陽王羕為太保征南大將軍漢安侯王敦為大將軍右將軍王導都督中外諸軍事驃騎將軍左長史刁協為尚書左僕射封王子宣城公裒為琅邪王六月丙寅司空并州刺史廣武侯劉琨幽州刺史左賢王渤海公段匹磾領護烏丸校尉鎮北將軍劉翰單于廣寧公段辰遼西公段眷冀州刺史祝阿子邵續青州刺史廣饒侯曹嶷兗州刺史定襄侯劉演東夷校尉崔毖鮮卑大都督慕容廆等一百八十人上書勸進曰臣聞天生蒸民樹之以君所以對越天地司牧黎元聖帝明王監其若此知天地不可以乏饗故屈其身以奉之知蒸黎不可以無主故不得已而臨之社稷時難則戚藩定其傾郊廟或替則宗哲纂其祀是以弘振遐風式固萬世三五以降靡不由之伏惟高祖宣皇帝肇基景命世祖武皇帝遂造區夏三葉重光四聖繼軌惠澤侔於有虞卜世過於周氏自元康以來艱難繁興永嘉之際氛厲彌昏宸極失御登遐醜裔國家之危有若綴旒賴先后之德宗廟之靈皇帝嗣建舊物克甄誕授欽明服膺聰哲玉質幼彰金聲夙振冢宰攝其綱百辟輔其政四海想中興之美羣生懷來蘇之望不圖天不悔禍大災荐臻國未忘難寇害尋興逆胡劉曜縱逸西都敢肆犬羊陵虐天邑臣奉表使還乃承西朝以去年十一月不守主上幽劫復沈虜庭神器流離更辱荒逆臣每覽史籍觀之前載厄運之極古今未有苟在食土之毛含血之類莫不叩心絶氣行號巷哭況臣等荷寵三世位廁鼎司聞問震惶精爽飛越且驚且惋五情無主舉哀朔垂上下泣血臣聞昏明迭用否泰相濟天命無改曆數有歸或多難以固邦國或殷憂以啓聖明是以齊有無知之禍而小白為五伯之長晉有麗姬之難而重耳以主諸侯之盟社稷靡安必將有以扶其危黔首幾絶必將有以繼其緒伏惟陛下玄德通于神明聖姿合于兩儀應命世之期紹千載之運符瑞之表天人有徵中興之兆圖讖垂典自京畿隕喪九服崩離天下囂然無所歸懷雖有夏之遭夷羿宗姬之離犬戎蔑以過之陛下撫征江左奄有舊吳柔服以德伐叛以刑抗明威以攝不類杖大順以號宇內純化既敷則率土宅心義風既暢則遐方企踵百揆時于上四門穆穆于下昔少康之隆夏訓以為美談宣王中興周詩以為休詠況茂勳格于皇天清暉光于四海蒼生顒然莫不欣戴聲教所加願為臣妾者哉且宣皇之胤惟有陛下億兆攸歸曾無與二天祚大晉必將有主主晉祀者非陛下而誰是以邇無異言遠無異望謳歌者無不吟諷徽猷獄訟者無不思于聖德天地之際既交華夷之情允洽一角之獸連理之木以為休徵者蓋有百數冠帶之倫要荒之衆不謀同辭者動以萬計是以臣等敢考天地之心因函夏之趣昧死上尊號願陛下存舜禹至公之情狹由巢抗矯之節以社稷為務不以小行為先以黔首為憂不以克讓為事上慰宗廟乃顧之懷下釋普天傾首之勤則所謂生繁華于枯荑育豐肌于朽骨神人獲安無不幸甚臣聞尊位不可久虛萬機不可久曠虛之一日則尊位以殆曠之浹辰則萬機以亂方今踵百王之季當陽九之會狡寇窺窬伺國瑕隙黎元波蕩無所繫心安可廢而不恤哉陛下雖欲逡巡其若宗廟何其若百姓何昔者惠公虜秦晉國震駭呂郤之謀欲立子圉外以絶敵人之志內以固闔境之情故曰喪君有君羣臣輯睦好我者勸惡我者懼前事之不忘後代之元龜也陛下明並日月無幽不燭深謀遠猷出自胸懷不勝犬馬憂國之情遲覩人神開泰之路是以陳其乃誠布之執事臣等忝于方任久在遐外不得陪列闕庭與覩盛禮踊躍之懷南望罔極帝優令答之語在琨傳石勒將石季龍圍譙城平西將軍祖逖擊走之己巳帝傳檄天下曰逆賊石勒肆虐河朔逋誅歷載遊魂縱逸復遣凶黨石季龍犬羊之衆越河南渡縱其鴆毒平西將軍祖逖帥衆討擊應時潰散今遣車騎將軍琅邪王裒等九軍鋭卒三萬水陸四道徑造賊場受逖節度有能梟季龍首者賞絹三千匹金五十斤封縣侯食邑二千戶又賊黨能梟送季龍首封賞亦同之七月散騎侍郎朱嵩尚書郎顧球卒帝痛之將為舉哀有司奏舊尚書郎不在舉哀之例帝曰衰亂之弊特相痛悼於是遂舉哀哭之甚慟丁未梁王悝薨以太尉荀組為司徒弛山澤之禁八月甲午封梁王世子翹為梁王荊州刺史第五猗為賊帥杜曾所推遂與曾同反九月戊寅王敦使武昌太守趙誘襄陽太守朱軌陵江將軍黃峻討猗為其將杜曾所敗誘等皆死之石勒害京兆太守華諝梁州刺史周訪討杜曾大破之十月丁未琅邪王裒薨十一月甲子封汝南王子弼為新蔡王丁卯以司空劉琨為太尉置史官立太學是歲揚州大旱太興元年春正月戊申朔臨朝懸而不樂三月癸丑愍帝崩問至帝斬縗居廬丙辰百僚上尊號令曰孤以不德當厄運之極臣節未立匡救未舉夙夜所以忘寢食也今宗廟廢絶億兆無係羣官庶尹咸勉之以大政亦何敢辭輒敬從所執是日即皇帝位詔曰昔我高祖宣皇帝誕應期運廓開皇基景文皇帝奕世重光緝熙諸夏爰暨世祖應天順時受茲明命功格天地仁濟宇宙昊天不融降此鞠凶懷帝短世越去王都天禍荐臻大行皇帝崩殂社稷無奉肆羣后三司六事之人疇咨庶尹至于華戎致輯大命于朕躬豫一人畏天之威用弗敢違遂登壇南嶽受終文祖焚柴頒瑞告類上帝惟朕寡德纘我洪緒若涉大川罔知攸濟惟爾股肱爪牙之佐文武熊羆之臣用能弼寧晉室輔余一人思與萬國共同休慶於是大赦改元文武增位二等庚午立王太子紹為皇太子壬申詔曰昔之為政者動人以行不以言應天以實不以文故我清靜而人自正其次聽言觀行明試以功其有政績可述刑獄得中人無怨訟久而日新及當官軟弱茹柔吐剛行身穢濁修飾時譽者各以名聞令在事之人仰鑒前烈同心勠力深思所以寬衆息役惠益百姓無廢朕命遠近禮贄一切斷之夏四月丁丑朔日有食之加大將軍王敦江州牧進驃騎將軍王導開府儀同三司戊寅初禁招魂葬乙酉西平地震五月癸丑使持節侍中都督太尉并州刺史廣武侯劉琨為段匹磾所害六月旱帝親雩改丹楊內史為丹楊尹甲申以尚書左僕射刁協為尚書令平南將軍曲陵公荀嵩為尚書左僕射庚寅以滎陽太守李矩為都督司州諸軍事司州刺史戊戌封皇子晞為武陵王初置諫鼓謗木秋七月戊申詔曰王室多故姦凶肆暴皇綱弛墜顛覆大猷朕以不德統承洪緒夙夜憂危思改其弊二千石令長當祗奉舊憲正身明法抑齊豪強存恤孤獨隱實戶口勸課農桑州牧刺史當互相檢察不得顧私虧公長吏有志在奉公而不見進用者有貪婪穢濁而以財勢自安者若有不舉當受故縱蔽善之罪有而不知當受暗塞之責各明慎奉行劉聰死其子粲嗣偽位八月冀徐青三州蝗靳準弒劉粲自號漢王冬十月癸未加廣州刺史陶侃平南將軍劉曜僭即皇帝位于赤壁十一月乙卯日夜出高三丈中有赤青珥新蔡王弼薨加大將軍王敦荊州牧庚申詔曰朕以寡德纂承洪緒上不能調和陰陽下不能濟育羣生災異屢興咎徵仍見壬子乙卯雷震暴雨蓋天災譴戒所以彰朕之不德也羣公卿士其各上封事具陳得失無有所諱將親覽焉新作聽訟觀故歸命侯孫晧子璠謀反伏誅十二月劉聰故將王騰馬忠等誅靳準送傳國璽於劉曜武昌地震丁丑封顯義亭侯煥為琅邪王己卯琅邪王煥薨癸巳詔曰漢高經大梁美無忌之賢齊師入魯修柳下惠之墓其吳之高德名賢或未旌録者具條列以聞江東三郡飢遣使振給之彭城內史周撫殺沛國內史周默以反二年春正月丁卯崇陽陵毀帝素服哭三日使冠軍將軍梁堪守太常馬龜等修復山陵迎梓宮于平陽不克而還二月太山太守徐龕斬周撫傳首京師夏四月龍驤將軍陳川以浚儀叛降于石勒太山太守徐龕以郡叛自號兗州刺史寇濟岱秦州刺史陳安叛降于劉曜五月癸丑太陽陵毀帝素服哭三日徐楊及江西諸郡蝗吳郡大飢平北將軍祖逖及石勒將石季龍戰于浚儀王師敗績壬戌詔曰天下凋弊加以災荒百姓困窮國用並匱吳郡飢人死者百數天生蒸黎而樹之以君選建明哲以左右之當深思以救其弊昔吳起為楚悼王明法審令捐不急之官除廢公族疏遠以附益將士而國富兵強況今日之弊百姓凋困邪且當去非急之務非軍士所須者皆省之甲子梁州刺史周訪及杜曾戰于武當斬之禽第五猗六月丙子加周訪安南將軍罷御府及諸郡丞置博士員五人己亥加太常賀循開府儀同三司秋七月乙丑太常賀循卒八月肅慎獻楛矢石砮徐龕寇東莞遣太子左衛率羊鑒行征虜將軍統徐州刺史蔡豹討之冬十月平北將軍祖逖使督護陳超襲石勒將桃豹超敗沒於陳十一月戊寅石勒僭即王位國號趙十二月乙亥大赦詔百官各上封事并省衆役鮮卑慕容廆襲遼東東夷校尉平州刺史崔毖高句驪是歲南陽王保稱晉王于祁山三吳大飢三年春正月丁酉朔晉王保為劉曜所逼遷于桑城二月辛未石勒將石季龍寇猒次平北將軍冀州刺史邵續擊之續敗沒於陳三月慕容廆奉送玉璽三紐閏月以尚書周顗為尚書僕射夏四月壬辰枉矢流于翼軫五月丙寅孝懷帝太子詮遇害于平陽帝三日哭庚寅地震是月晉王保為其將張春所害劉曜使陳安攻春滅之安因叛曜石勒將徐龕帥衆來降六月大水丁酉盜殺西中郎將護羌校尉涼州刺史西平公張實實弟茂嗣領平西將軍涼州刺史秋七月丁亥詔曰先公武王先考恭王臨君琅邪四十餘年惠澤于百姓遺愛結于人情朕應天符創基江表兆庶宅心繈負子來琅邪國人在此者近有千戶今立為懷德縣統丹楊郡昔漢高祖以沛為湯沐邑光武亦復南頓優復之科一依漢氏故事祖逖部將衛策大破石勒別軍於汴水加逖為鎮西將軍八月戊午尊敬王后虞氏為敬皇后辛酉遷神主于太廟辛未梁州刺史安南將軍周訪卒皇太子釋奠於太學以湘州刺史甘卓為安南將軍梁州刺史九月徐龕又叛降于石勒冬十月丙辰徐州刺史蔡豹以畏磱伏誅王敦殺武陵內史向碩四年春二月徐龕又帥衆來降鮮卑末波奉送皇帝信璽庚戌告於太廟乃受之癸亥日鬬三月置周易儀禮公羊博士癸酉以平東將軍曹嶷為安東將軍夏四月辛亥帝親覽庶獄石勒攻猒次陷之撫軍將軍幽州刺史段匹磾沒于勒五月旱庚申詔曰昔漢二祖及魏武皆免良人武帝時涼州覆敗諸為奴婢亦皆復籍此纍代成規也其免中州良人遭難為揚州諸郡僮客者以備征役秋七月大水甲戌以尚書戴若思為征西將軍都督司兗豫并冀雍六州諸事司州刺史鎮合肥丹楊尹劉隗為鎮北將軍都督青徐幽平四州諸軍事青州刺史鎮淮陰壬午以驃騎將軍王導為司空八月常山崩九月壬寅鎮西將軍豫州刺史祖逖卒冬十月壬午以逖弟侍中約為平西將軍豫州刺史十二月以慕容廆為持節都督幽平二州東夷諸軍事平州牧封遼東郡公永昌元年春正月乙卯大赦改元戊辰大將軍王敦舉兵於武昌以誅劉隗為名龍驤將軍沈充帥衆應之三月徵征西將軍戴若思鎮北將軍劉隗還衛京都以司空王導為前鋒大都督以戴若思為驃騎將軍丹楊諸郡皆加軍號加僕射周顗尚書左僕射領軍王邃尚書右僕射以太子右衛率周莚行冠軍將軍統兵三千討沈充甲午封皇子昱為琅邪王劉隗軍於金城右將軍周札守石頭帝親被甲徇六師於郊外遣平南將軍陶侃領江州安南將軍甘卓領荊州各帥所統以躡敦後四月敦前鋒攻石頭周札開城門應之奮威將軍侯禮死之敦據石頭戴若思劉隗帥衆攻之王導周顗郭逸虞潭等三道出戰六軍敗績尚書令刁協奔於江乘為賊所害鎮北將軍劉隗奔于石勒帝遣使謂敦曰公若不忘本朝于此息兵則天下尚可共安也如其不然朕當歸于琅邪以避賢路辛未大赦敦乃自為丞相都督中外諸軍録尚書事封武昌郡公邑萬戶丙子驃騎將軍秣陵侯戴若思尚書左僕射護軍將軍武城侯周顗為敦所害敦將沈充陷吳國魏陷湘州吳國內史張茂湘州刺史譙王承並遇害五月壬申敦以太保西陽王羕為太宰加司空王導尚書令乙亥鎮南大將軍甘卓為襄陽太守周慮所害蜀賊張龍寇巴東建平太守柳純擊走之石勒遣騎寇河南六月旱秋七月王敦自加兗州刺史郗鑒為安北將軍石勒將石季龍攻陷太山執守將徐龕兗州刺史郗鑒自鄒山退守合肥八月敦以其兄含為衛將軍自領寧益二州都督琅邪太守孫默叛降于石勒冬十月大疫死者十二三己丑都督荊梁二州諸軍事平南將軍荊州刺史武陵侯王廙卒辛卯以下邳內史王邃為征北將軍都督青徐幽平四州諸軍事鎮淮陰新昌太守梁碩起兵反京師大霧黑氣蔽天日月無光石勒攻陷襄城城父遂圍譙破祖約別軍約退據壽春十一月以司徒荀組為太尉己酉太尉荀組薨罷司徒并丞相閏月己丑帝崩于內殿時年四十七葬建平陵廟號中宗帝性簡儉沖素容納直言虛己待物初鎮江東頗以酒廢事王導深以為言帝命酌引觴覆之於此遂絶有司嘗奏太極殿廣室施絳帳帝曰漢文集上書皂囊為帷遂令冬施青布夏施青綀帷帳將拜貴人有司請市雀叉帝以煩費不許所幸鄭夫人衣無文綵從母弟王廙為母立屋過制流涕止之然晉室遘紛皇輿播越天命未改人謀叶贊元戎屢動不出江畿經略區區僅全吳楚終于下陵上辱憂憤告謝恭儉之德雖充雄武之量不足始秦時望氣者云五百年後金陵有天子氣故始皇東遊以厭之改其地曰秣陵塹北山以絶其勢及孫權之稱號自謂當之孫盛以為始皇逮于孫氏四百三十七載考其曆數猶為未及元帝之渡江也乃五百二十六年真人之應在于此矣咸寧初風吹太社樹折社中有青氣占者以為東莞有帝者之祥由是徙封東莞王於琅邪即武王也及吳之亡王濬實先至建鄴而晧之降款遠歸璽於琅邪天意人事又符中興之兆太安之際童謠云五馬浮渡江一馬化為龍及永嘉中歲鎮熒惑太白聚斗牛之間識者以為吳越之地當興王者是歲王室淪覆帝與西陽汝南南頓彭城五王獲濟而帝竟登大位焉初玄石圖有牛繼馬後故宣帝深忌牛氏遂為二榼共一口以貯酒焉帝先飲佳者而以毒酒鴆其將牛金而恭王妃夏侯氏竟通小吏牛氏而生元帝亦有符云史臣曰晉氏不虞自中流外五胡扛鼎七廟隳尊滔天方駕則民懷其舊德者矣昔光武以數郡加名元皇以一州臨極豈武宣餘化猶暢于琅邪文景垂仁傳芳于南頓所謂後乎天時先諸人事者也馳章獻號高蓋成陰星斗呈祥金陵表慶陶士行擁三州之旅郢外以安王茂弘為分陝之計江東可立或高旌未拂而遐心斯偃回首朝陽仰希乾棟帝猶六讓不居七辭而不免也布帳綀帷詳刑簡化抑揚前軌光啓中興古者私家不蓄甲兵大臣不為威福王之常制以訓股肱中宗失馭強臣自亡齊斧兩京胡羯風埃相望雖復六月之駕無聞而鴻雁之歌方遠享國無幾哀哉明帝明皇帝諱紹字道畿元皇帝長子也幼而聰哲為元帝所寵異年數歲嘗坐置膝前屬長安使來因問帝曰汝謂日與長安孰遠對曰長安近不聞人從日邊來居然可知也元帝異之明日宴羣僚又問之對曰日近元帝失色曰何乃異間者之言乎對曰舉目則見日不見長安由是益奇之建興初拜東中郎將鎮廣陵元帝為晉王立為晉王太子及帝即尊號立為皇太子性至孝有文武才略欽賢愛客雅好文辭當時名臣自王導庾亮溫嶠桓彝阮放等咸見親待嘗論聖人真假之意導等不能屈又習武藝善撫將士於時東朝濟濟遠近屬心焉及王敦之亂六軍敗績帝欲帥將士決戰升車將出中庶子溫嶠固諫抽劍斬鞅乃止敦素以帝神武明略朝野之所欽信欲誣以不孝而廢焉大會百官而問溫嶠曰皇太子以何德稱聲色俱厲必欲使有言嶠對曰鉤深致遠蓋非淺局所量以禮觀之可稱為孝矣衆皆以為信然敦謀遂止永昌元年閏月己丑元帝崩庚寅太子即皇帝位大赦尊所生荀氏為建安郡君太寧元年春正月癸巳黃霧四塞京師火李雄使其將李驤任回寇臺登將軍司馬玖死之越巂太守李釗漢嘉太守王載以郡叛降于驤二月葬元帝于建平陵帝徒跣至于陵所以特進華為驃騎將軍都督石頭水陸軍事乙丑黃霧四塞丙寅隕霜壬申又隕霜殺穀三月戊寅朔改元臨軒停饗宴之禮懸而不樂丙戌隕霜殺草饒安東光安陵三縣災燒七千餘家死者萬五千人石勒攻陷下邳徐州刺史卞敦退保盱眙王敦獻皇帝信璽一紐敦將謀篡逆諷朝廷徵己帝乃手詔徵之夏四月敦下屯于湖轉司空王導為司徒自領揚州牧巴東監軍柳純為敦所害以尚書陳眕為都督幽平二州諸軍事幽州刺史五月京師大水李驤等寇寧州刺史王遜遣將姚嶽距戰于堂狼大破之梁碩攻陷交州刺史王諒死之六月壬子立皇后庾氏平南將軍陶侃遣參軍高寶攻梁碩斬之傳首京師進侃位征南大將軍開府儀同三司秋七月丙子朔震太極殿柱是月劉曜攻陳安於隴城滅之八月以安北將軍郗鑒為尚書令石勒將石季龍攻陷青州刺史曹嶷遇害冬十一月王敦以其兄征南大將軍含為征東大將軍都督揚州江西諸軍事以軍國飢乏調刺史以下米各有差二年春正月丁丑帝臨朝停饗宴之禮懸而不樂庚辰赦五歲刑以下術人李脫造妖書惑衆斬于建康市石勒將石季龍寇兗州刺史劉遐自彭城退保泗口三月劉曜將康平寇魏興及南陽夏五月王敦矯詔拜其子應為武衛將軍兄含為驃騎大將軍帝所親信常從督公乘雄冉曾並為敦所害六月敦將舉兵內向帝密知之乃乘巴滇駿馬微行至于湖陰察敦營壘而出有軍士疑帝非常人又敦正晝寢夢日環其城驚起曰此必黃鬚鮮卑奴來也帝母荀氏燕代人帝狀類外氏鬚黃敦故謂帝云於是使五騎物色追帝帝亦馳去馬有遺糞輒以水灌之見逆旅賣食嫗以七寶鞭與之曰後有騎來可以此示也俄而追者至問嫗嫗曰去已遠矣因以鞭示之五騎傳玩稽留遂久又見馬糞冷以為信遠而止不追帝僅而獲免丁卯加司徒王導大都督假節領揚州刺史以丹楊尹溫嶠為中壘將軍與右將軍卞敦守石頭以光祿勳應詹為護軍將軍假節督朱雀橋南諸軍事以尚書令郗鑒行衛將軍都督從駕諸軍事以中書監庾亮領左衛將軍以尚書卞壼行中軍將軍徵平北將軍徐州刺史王邃平西將軍豫州刺史祖約北中郎將兗州刺史劉遐奮武將軍臨淮太守蘇峻奮威將軍廣陵太守陶瞻等還衛京師帝次於中堂秋七月壬申朔敦遣其兄含及錢鳳周撫鄧嶽等水陸五萬至于南岸溫嶠移屯水北燒朱雀桁以挫其鋒帝躬率六軍出次南皇堂至癸酉夜募壯士遣將軍段秀中軍司馬曹渾左衛參軍陳嵩鍾寅等甲卒千人渡水掩其未畢平旦戰于越城大破之斬其前鋒將何康王敦憤惋而死前宗正虞潭起義師于會稽沈充帥萬餘人來會含等庚辰築壘于陵口丁亥劉遐蘇峻等帥精卒萬人以至帝夜見勞之賜將士各有差義興人周蹇殺敦所署太守劉芳平西將軍祖約逐敦所署淮南太守任台于壽春乙未賊衆濟水護軍將軍應詹帥建威將軍趙胤等距戰不利賊至宣陽門北中郎將劉遐蘇峻等自南塘橫擊大破之劉遐又破沈充于青溪丙申賊燒營宵遁丁酉帝還宮大赦惟敦黨不原於是分遣諸將追其黨與悉平之封司徒王導為始興郡公邑三千戶賜絹九千匹丹楊尹溫嶠建寧縣公尚書卞壼建興縣公中書監庾亮永昌縣公北中郎將劉遐泉陵縣公奮武將軍蘇峻邵陵縣公邑各千八百戶絹各五千四百匹尚書令郗鑒高平縣侯護軍將軍應詹觀陽縣侯邑各千六百戶絹各四千八百匹建威將軍趙胤湘南縣侯右將軍卞敦益陽縣侯邑各千六百戶絹各三千二百匹其餘封賞各有差冬十月以司徒王導為太保領司徒太宰西陽王羕領太尉應詹為平南將軍都督江州諸軍事江州刺史劉遐為監淮北諸軍事徐州刺史庾亮為護軍將軍詔王敦羣從一無所問是時石勒將石生屯洛陽豫州刺史祖約退保壽陽十二月壬子帝謁建平陵從大祥之禮梁水太守爨亮益州太守李逖以興古叛降于李雄沈充故將顧揚反於武康攻燒城邑州縣討斬之三年春二月戊辰復三族刑惟不及婦人三月幽州刺史段末波卒以弟牙嗣戊辰立皇子衍為皇太子大赦增文武位二等大酺三日賜魚衆寡孤獨帛人二匹癸巳徵處士臨海任旭會稽虞喜並為博士夏四月詔曰大事初定其命惟新其令太宰司徒已下詣都坐參議政道諸所因革務盡事中又詔曰直言引亮正想羣賢達吾此懷矣豫違汝弼堯舜之相君臣也吾雖虛暗庶不距逆耳之談稷契之任君居之矣望共勗之己亥雨雹石勒將石良寇兗州刺史檀贇力戰死之將軍李矩等並衆潰而歸石勒盡陷司兗豫三州之地五月以征南大將軍陶侃為征西大將軍都督荊湘雍梁四州諸軍事荊州刺史王舒為安南將軍都督廣州諸軍事廣州刺史六月石勒將石季龍攻劉曜將劉嶽于新安陷之以廣州刺史王舒為都督湘州諸軍事湘州刺史湘州刺史劉顗為平越中郎將都督廣州諸軍事廣州刺史大旱自正月不雨至于是月秋七月辛未以尚書令郗鑒為車騎將軍都督青兗二州諸軍事假節鎮廣陵領軍將軍卞壼為尚書令詔曰三恪二王世代之所重興滅繼絶政道之所先又宗室哲王有功勳于大晉受命之際者佐命功臣碩德名賢三祖所與共維大業咸開國胙土誓同山河者而並廢絶禋祀不傳甚用懷傷主者其詳議諸應立後者以聞又詔曰郊祀天地帝王之重事自中興以來惟南郊未曾北郊四時五郊之禮都不復設五嶽四瀆名山大川載在祀典應望秩者悉廢而未舉主者其依舊詳處八月詔曰昔周武克殷封比干之墓漢高過趙録樂毅之後追顯既往以勸將來也吳時將相名賢之胄有能纂修家訓又忠孝仁義靜己守真不聞于時者州郡中正亟以名聞勿有所遺閏月以尚書左僕射荀嵩為光祿大夫録尚書事尚書鄧攸為尚書左僕射壬午帝不悆召太宰西陽王羕司徒王導尚書令卞壼車騎將軍郗鑒護軍將軍庾亮領軍將軍陸曄丹楊尹溫嶠並受遺詔輔太子丁亥詔曰自古有死賢聖所同壽夭窮達歸于一概亦何足特痛哉朕枕疾已久常慮忽然仰惟祖宗洪基不能克終堂構大恥未雪百姓塗炭所以有慨耳不幸之日斂以時服一遵先度務從簡約勞衆崇飾皆勿為也衍以幼弱猥當大重當賴忠賢訓而成之昔周公匡輔成王霍氏擁育孝昭義存前典功冠二代豈非宗臣之道乎凡此公卿時之望也敬聽顧命任託付之重同心斷金以謀王室諸方嶽征鎮刺史將守皆朕扞城推轂于外雖事有內外其致一也故不有行者誰扞牧圉譬若脣齒表𩹉相資宜勠力一心若合符契思美焉之美以緝事為期百辟卿士其總己以聽于冢宰保祐沖幼弘濟艱難永令祖宗之靈寧于九天之上則朕沒于地下無恨黃泉戊子帝崩于東堂年二十七葬武平陵廟號肅祖帝聰明有機斷尤精物理于時兵凶歲飢死疫過半虛弊既甚事極艱虞屬王敦挾震主之威將移神器帝崎嶇遵養以弱制強潛謀獨斷廓清大祲改授荊湘等四州以分上流之勢撥亂反正強本弱枝雖享國日淺而規模弘遠矣史臣曰維揚作𧜛憑帶洪流楚江戰方城對敵不得不推誠將相以總戎麾樓船萬計兵倍王室處其利而無心者周公其人也威權外假嫌隙內興彼有順流之師此無強藩之援商逢九亂堯止八音明皇負圖屬在茲日運龍韜於掌握起天旆於江靡燎其餘燼有若秋原去縗絰而踐戎場斬鯨鯢而拜園闕鎮削威權州分江漢覆車不踐貽厥孫謀其後七十餘年終罹敬道之害或曰興亡在運非止上流豈創制不殊而弘之者異也贊曰傾天害猛獸呈災琅邪之子仁義歸來龔行趙璧命箠荊臺雲瞻北晦江望南開晉陽禦敵河西全壤胡寇雖艱靈心弗爽三方馳騖百蠻從響寶命還昌金輝載朗明后岐嶷軍書接要莽首晨懸董臍昏燎厥德不回餘風可劭
