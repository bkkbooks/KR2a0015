body:
  text: 晉書卷一百二十九載記第二十九沮渠蒙遜沮渠蒙遜臨松盧水胡人也其先世為匈奴左沮渠遂以官為氏焉蒙遜博涉羣史頗曉天文雄傑有英略滑稽善權變梁熙呂光皆奇而憚之故常游飲自晦會伯父羅仇麴粥從呂光征河南光前軍大敗麴粥言于兄羅仇曰主上荒耄驕縱諸子朋黨相傾讒人側目今軍敗將死正是智勇見猜之日可不懼乎吾兄弟素為所憚與其經死溝瀆豈若勒衆向西平出苕藋奮臂大呼涼州不足定也羅仇曰理如汝言但吾家累世忠孝為一方所歸寧人負我無我負人俄而皆為光所殺宗姻諸部會葬者萬餘人蒙遜哭謂衆曰昔漢祚中微吾之乃祖翼奬竇融保寧河右呂王昏耄荒虐無道豈可不上繼先祖安時之志使二父有恨黃泉衆咸稱萬歲遂斬光中田護軍馬邃臨松令井祥以盟一旬之間衆至萬餘屯據金山與從兄男成推光建康太守段業為使持節大都督龍驤大將軍涼州牧建康公改呂光龍飛二年為神璽元年業以蒙遜為張掖太守男成為輔國將軍委以軍國之任業將使蒙遜攻西郡衆咸疑之蒙遜曰此郡據嶺之要不可不取業曰卿言是也遂遣之蒙遜引水灌城城潰執太守呂純以歸于是王德以晉昌孟敏以敦煌降業業封蒙遜臨池侯呂弘去張掖將東走業議欲擊之蒙遜諫曰歸師勿遏窮寇弗追此兵家之戒也不如縱之以為後圖業曰一日縱敵悔將無及遂率衆追之為弘所敗業賴蒙遜而免歎曰孤不能用子房之言以至于此業築西安城以其將臧莫孩為太守蒙遜曰莫孩勇而無謀知進忘退所謂為之築冢非築城也業不從俄而為呂纂所敗蒙遜懼業不能容己每匿智以避之業僭稱涼王以蒙遜為尚書左丞梁中庸為右丞呂光遣其二子紹纂伐業業請救于禿髮烏孤烏孤遣其弟鹿孤及楊軌救業紹以業等軍盛欲從三門關挾山而東纂曰挾山示弱取敗之道不如結陣衝之彼必憚我而不戰也紹乃引軍而南業將擊之蒙遜諫曰楊軌恃虜騎之強有窺覦之志紹纂兵在死地必決戰求生不戰則有太山之安戰則有累卵之危業曰卿言是也乃按兵不戰紹亦難之各引兵歸業憚蒙遜雄武微欲遠之乃以蒙遜從叔益生為酒泉太守蒙遜為臨池太守業門下侍郎馬權雋爽有逸氣武略過人業以權代蒙遜為張掖太守甚見親重每輕陵蒙遜蒙遜亦憚而怨之乃譖之于業曰天下不足慮惟當憂馬權耳業遂殺之蒙遜謂男成曰段業愚闇非濟亂之才信讒愛佞無鑒斷之明所憚惟索嗣馬權今皆死矣蒙遜欲除業以奉兄何如男成曰業羇旅孤飄我所建立有吾兄弟猶魚之有水人既親我背之不祥乃止蒙遜既為業所憚內不自安請為西安太守業亦以蒙遜有大志懼為朝夕之變乃許焉蒙遜期與男成同祭蘭門山密遣司馬許咸告業曰男成欲謀叛許以取假日作逆若求祭蘭門山臣言驗矣至期日果然業收男成令自殺男成曰蒙遜欲謀叛先已告臣臣以兄弟之故隱忍不言以臣今在恐部人不從與臣剋期祭山返相誣告臣若朝死蒙遜必夕發乞詐言臣死說臣罪惡蒙遜必作逆臣投袂討之事無不捷業不從蒙遜聞男成死告衆曰男成忠于段公枉見屠害諸君能為報仇乎且州土兵亂似非業所能濟吾所以初奉之者以之為陳吳耳而信讒多忌枉害忠良豈可安枕臥觀使百姓離于塗炭男成素有恩信衆皆憤泣而從之比至氐池衆逾一萬鎮軍臧莫孩率部衆附之羌胡多起兵響應蒙遜壁于侯塢業先疑其右將軍田昂幽之于內至是謝而赦之使與武衞梁中庸等攻蒙遜業將王豐孫言于業曰西平諸田世有反者昂貌恭而心很志大而情險不可信也業曰吾疑之久矣但非昂無可以討蒙遜豐孫言既不從昂至侯塢率騎五百歸于蒙遜蒙遜至張掖昂兄子承愛斬關內之業左右皆散蒙遜大呼曰鎮西何在軍人曰在此業曰孤單飄一己為貴門所推可見匄餘命投身嶺南庶得東還與妻子相見蒙遜遂斬之業京兆人也博涉史傳有尺牘之才為杜進記室從征塞表儒素長者無他權略威禁不行羣下擅命尤信卜筮讖記巫覡徵祥故為姦佞所誤隆安五年梁中庸房晷田昂等推蒙遜為使持節大都督大將軍涼州牧張掖公赦其境內改元永安署從兄伏奴為鎮軍將軍張掖太守和平侯弟挐為建忠將軍都谷侯田昂為鎮南將軍西郡太守臧莫孩為輔國將軍房晷梁中庸為左右長史張騭謝正禮為左右司馬擢任賢才文武咸悅時姚興遣將姚碩德攻呂隆于姑臧蒙遜遣從事中郎李典聘于興以通和好蒙遜以呂隆既降于興酒泉涼寧二郡叛降李玄盛乃遣建忠挐牧府長史張潛見碩德于姑臧請軍迎接率郡人東遷碩德大悅拜潛張掖太守挐建康太守潛勸蒙遜東遷挐私于蒙遜曰呂氏猶存姑臧未拔碩德糧竭將還不能久也何故違離桑梓受制于人輔國莫孩曰建忠之言是也蒙遜乃斬張潛因下書曰孤以虛薄猥忝時運未能弘闡大猷戡蕩羣孼使桃蟲鼓翼東京封豕烝涉西裔戎車屢動干戈未戢農失三時之業百姓戶不粒食可蠲省百徭專功南畝明設科條務盡地利時梁中庸為西郡太守西奔李玄盛蒙遜聞之笑曰吾與中庸義深一體而不信我但自負耳孤豈怪之乃盡歸其妻孥蒙遜下令曰養老乞言晉文納輿人之誦所以能招禮英奇致時邕之美況孤寡德智不經遠而可不思聞讜言以自鏡哉內外羣僚其各搜揚賢雋廣進芻蕘以匡孤不逮遣輔國臧莫孩襲山北虜大破之姚興遣將齊難率衆四萬迎呂隆隆勸難伐蒙遜難從之莫孩敗其前軍難乃結盟而還蒙遜伯父中田護軍親信臨松太守孔篤並驕奢侵害百姓苦之蒙遜曰亂吾國者二伯父也何以綱紀百姓乎皆令自殺蒙遜襲狄洛磐于番禾不克遷其五百餘戶而還姚興遣使人梁斐張構等拜蒙遜鎮西大將軍沙州刺史西海侯時興亦拜禿髮檀為車騎將軍封廣武公蒙遜聞之不悅謂斐等曰檀上公之位而身為侯者何也構對曰檀輕狡不仁款誠未著聖朝所以加其重爵者褒其歸善即之義耳將軍忠貫白日勳高一時當入諧鼎味匡贊帝室安可以不信待也聖朝爵必稱功官不越德如尹緯姚晃佐命初基齊難徐洛元勳驍將並位纔二品爵止侯伯將軍何以先之乎竇融殷勤固讓不欲居舊臣之右未解將軍忽有此問蒙遜曰朝廷何不即以張掖見封乃更遠封西海邪構曰張掖規畫之內將軍已自有之所以遠授西海者蓋欲廣大將軍之國耳蒙遜大悅乃受拜時地震山崩折木太史令劉梁言于蒙遜曰辛酉金也地動于金金動刻木大軍東行無前之徵時張掖城每有光色蒙遜曰王氣將成百戰百勝之象也遂攻禿髮西郡太守楊統於日勒統降拜為右長史寵踰功舊張掖太守句呼勒出奔西涼以從弟成都為金山太守羅仇子也鄯為西郡太守麴粥子也句呼勒自西涼奔還待之如初蒙遜率騎二萬東征次于丹嶺北虜大人思盤率部落三千降之時木連理生于永安永安令張披上書曰異枝同榦遐方有齊化之應殊本共心上下有莫二之固蓋至道之嘉祥大同之美徵蒙遜曰此皆二千石令長匪躬濟時所致豈吾薄德所能感之蒙遜率步騎三萬伐禿髮檀次于西郡大風從西北來氣有五色俄而晝昏至顯美徙數千戶而還檀追及蒙遜于窮泉蒙遜將擊之諸將皆曰賊已安營弗可犯也蒙遜曰檀謂吾遠來疲弊必輕而無備及其壘壁未成可以一鼓而滅進擊敗之乘勝至于姑臧夷夏降者萬數千戶檀懼請和許之而歸及檀南奔樂都魏安人焦朗據姑臧自立蒙遜率步騎三萬攻朗克而宥之饗文武將士于謙光殿班賜金馬有差以敦煌張穆博通經史才藻清贍擢拜中書侍郎委以機密之任以其弟挐為護羌校尉秦州刺史封安平侯鎮姑臧旬餘而挐死又以從祖益子為鎮京將軍護羌校尉秦州刺史鎮姑臧俄而蒙遜遷于姑臧以義熙八年僭即河西王位大赦境內改元玄始置官僚如呂光為三河王故事繕宮殿起城門諸觀立其子政德為世子加鎮衞大將軍錄尚書事檀來伐蒙遜敗之于若厚塢檀湟河太守文支據湟川護軍成宜侯率衆降之署文支鎮東大將軍廣武太守振武侯成宜侯為振威將軍湟川太守以殿中將軍王建為湟河太守蒙遜下書曰古先哲王應期撥亂者莫不經略八表然後光闡純風孤雖智非靖難職在濟時而狡虜檀鴟峙舊京毒加夷夏東苑之戮酷甚長平邊城之禍害深獫狁每念蒼生之無辜是以不遑啟處身疲甲冑體倦風塵雖傾其巢穴檀猶未授首檀弟文支追項伯歸漢之義據彼重藩請為臣妾自西平已南連城繼順惟檀窮獸守死樂都四支既落命豈久全五緯之會已應清一之期無賒方散馬金山黎元永逸可露布遠近咸使聞知蒙遜西如苕藋遣冠軍伏恩率騎一萬襲卑和烏啼二虜大破之俘二千餘落而還蒙遜寢于新臺閹人王懷祖擊蒙遜傷足其妻孟氏擒斬之夷其三族蒙遜母車氏疾篤蒙遜升南景門散錢以賜百姓下書曰孤庶憑宗廟之靈乾坤之祐濟否剝之運會拯遺黎之荼蓼上望掃清氛穢下冀保寧家福而太后不豫涉歲彌增將刑獄枉濫衆有怨乎賦役繁重時不堪乎羣望不絜神所譴乎內省諸身未知罪之攸在可大赦殊死已下俄而車氏死蒙遜遣其將運糧于湟河自率衆攻克乞伏熾磐廣武郡以運糧不繼自廣武如湟河度浩亹熾磐遣將乞伏魋尼寅距蒙遜蒙遜擊斬之熾磐又遣將王衡折斐麴景等率騎一萬據勒姐嶺蒙遜且戰且前大破之擒折斐等七百餘人麴景奔還蒙遜以弟漢平為折衝將軍湟河太守乃引還晉益州刺史朱齡石遣使來聘蒙遜遣舍人黃迅報聘益州因表曰上天降禍四海分崩靈耀擁于南裔蒼生沒于醜虜陛下累聖重光道邁周漢純風所被八表宅心臣雖被髮邊徼才非時雋謬為河右遺黎推為盟主臣之先人世荷恩寵雖歷夷嶮執義不回傾首朝陽乃心王室去冬益州刺史朱齡石遣使詣臣始具朝廷休問承車騎將軍劉裕秣馬揮戈以中原為事可謂天贊大晉篤生英輔臣聞少康之興大夏光武之復漢業皆奮劍而起衆無一旅猶能成配天之功著車攻之詠陛下據全楚之地擁荊揚之銳而可垂拱晏然棄二京以資戎虜若六軍北軫克復有期臣請率河西戎為晉右翼前驅熾磐率衆三萬襲湟河漢平力戰固守遣司馬隗仁夜出擊熾磐斬級數百熾磐將引退先遣老弱漢平長史焦昶將軍段景密信招熾磐熾磐復進攻漢平漢平納昶景之說面縛出降仁勒壯士百餘據南門樓上三日不下衆寡不敵為熾磐所擒熾磐怒命斬之段暉諫曰仁臨難履危奮不顧命忠也宜宥之以厲事君熾磐乃執之而歸在熾磐所五年暉又為之固請乃得還姑臧及至蒙遜執其手曰卿孤之蘇武也以為高昌太守為政有威惠之稱然頗以愛財為失蒙遜西祀金山遣沮渠廣宗率騎一萬襲烏啼虜大捷而還蒙遜西至苕藋遣前將軍沮渠成都將騎五千襲卑和虜蒙遜率中軍三萬繼之卑和虜率衆迎降遂循海而西至鹽池祀西王母寺寺中有玄石神圖命其中書侍郎張穆賦焉銘之于寺前遂如金山而歸蒙遜下書曰頃自春炎旱害及時苗碧原青野倏為枯壤將刑政失中下有冤獄乎役繁賦重上天所譴乎內省多缺孤之罪也書不云乎百姓有過罪予一人可大赦殊死已下翌日而澍雨大降蒙遜聞劉裕滅姚泓怒甚門下校郎劉祥言事于蒙遜蒙遜曰汝聞劉裕入關敢研研然也遂殺之其峻暴如是顧謂左右曰古之行師不犯歲鎮所在姚氏舜後軒轅之苗裔也今鎮星在軒轅而裕滅之亦不能久守關中蒙遜為李士業敗于鮮支澗復收散卒欲戰前將軍成都諫曰臣聞高祖有彭城之敗終成大漢宜旋師以為後圖蒙遜從之城建康而歸其羣下上書曰設官分職所以經國濟時恪勤官次所以緝熙庶政當官者以匪躬為務受任者以忘身為效自皇綱初震戎馬生郊公私草創未遑舊式而朝士多違憲制不遵典章或公文御案在家臥署或事無可否望空而過至令黜陟絕于皇朝駁議寢于聖世清濁共流能否相雜人無勸競之心苟為度日之事豈憂公忘私奉上之道也今皇化日隆遐邇寧泰宜肅振綱維申修舊則蒙遜納之命征南姚艾尚書左丞房晷撰朝堂制行之旬日百僚振肅太史令張衍言于蒙遜曰今歲臨澤城西當有破兵蒙遜乃遣其世子政德屯兵若厚塢蒙遜西至白岸謂張衍曰吾今年當有所定但太歲在申月又建申未可西行且當南巡要其歸會主而勿客以順天心計在臨機慎勿露也遂攻浩亹而蛇盤于帳前蒙遜笑曰前一為騰蛇今盤在吾帳天意欲吾迴師先定酒泉燒攻具而還次于川巖聞李士業徵兵欲攻張掖蒙遜曰入吾計矣但恐聞吾迴軍不敢前也兵事權乃露布西境稱得浩亹將進軍黃谷士業聞而大悅進入都瀆澗蒙遜潛軍逆之敗士業于壞城遂進克酒泉百姓安堵如故軍無私焉以子茂虔為酒泉太守士業舊臣皆隨才擢蒙遜以安帝隆安五年自稱州牧義熙八年僭立後八年而宋氏受禪以元嘉十年死時年六十六在偽位三十三年子茂虔立六年為魏所擒合三十九載而滅史臣曰蒙遜出自夷陬擅雄邊塞屬呂光之悖德深懷仇粥之冤推段業以濟時假以陳吳之事稱兵白澗南涼請和出師丹嶺北寇賓服然而見利忘義苞禍滅親雖能制命一隅抑亦備諸凶德者矣贊曰光猜人傑業忌時賢游飲自晦匿智圖全兇心既逞偽績攸宣挺茲姦數馳競當年
