body:
  text: 晉書卷二十一志第十一禮下五禮之別三曰賓蓋朝宗覲遇會同之制是也自周以下其禮彌繁自秦滅學之後舊典殘缺漢興始使叔孫通制禮參用先代之儀然亦往往改異焉漢儀有正會禮正旦夜漏未盡七刻鍾鳴受賀公侯以下執贄夾庭二千石以上升殿稱萬歲然後作樂宴饗魏武帝都鄴正會文昌殿用漢儀又設百華燈晉氏受命武帝更定元會儀咸寧注是也傅玄元會賦曰考夏后之遺訓綜殷周之典藝採秦漢之舊儀定元正之嘉會此則兼採衆代可知矣咸寧注先正一日有司各宿設夜漏未盡十刻羣臣集到庭燎起火上賀起謁報又賀皇后還從雲龍東中華門入詣東閣下便坐漏未盡七刻百官及受贄郎官以下至計吏皆入立其次其陛衛者如臨軒儀漏未盡五刻謁者僕射大鴻臚各各奏羣臣就位定漏盡侍中奏外辦皇帝出鐘鼓作百官皆拜伏太常導皇帝升御坐鐘鼓止百官起大鴻臚跪奏請朝賀掌禮郎讚皇帝延王登大鴻臚跪讚藩王臣某等奉白璧各一再拜賀太常報王悉登謁者引上殿當御坐皇帝興王再拜皇帝坐復再拜跪置璧御坐前復再拜成禮訖謁者引下殿還故位掌禮郎讚皇帝延太尉等於是公特進胸奴南單于金紫將軍當大鴻臚西中二千石二千石千石六百石當大行令西皆北面伏鴻臚跪讚太尉中二千石等奉璧皮帛羔雁雉再拜賀太常讚皇帝延公等登掌禮引公至金紫將軍上殿皇帝興皆再拜皇帝坐又再拜跪置璧皮帛御坐前復再拜成禮訖謁者引下殿還故位公置璧成禮時大行令並讚殿下中二千石以下同成禮訖以贄授贄郎郎以璧帛付謁者羔雁雉付太官太樂令跪請奏雅樂樂以次作乘黃令乃出車皇帝罷入百官皆坐晝漏上水六刻諸蠻夷胡客以次入皆再拜訖坐御入後三刻又出鐘鼓作謁者僕射跪奏請羣臣上謁者引王公二千石上殿千石六百石停本位謁者引王詣樽酌壽酒跪授侍中侍中跪置御坐前王還王自酌置位前謁者跪奏藩王臣某等奉觴再拜上千萬歲壽四廂樂作百官再拜已飲又再拜謁者引王等還本位陛下者傳就席羣臣皆跪諾侍中中書令尚書令各於殿上上壽酒登歌樂升太官又行御酒御酒升階太官令跪授侍郎侍郎跪進御坐前乃行百官酒太樂令跪奏奏登歌三終乃降太官令跪請具御飯到階羣臣皆起太官令持羹跪授司徒持飯跪授大司農尚食持案並授持節持節跪進御坐前羣臣就席太樂令跪奏奏食舉樂太官行百官飯案遍食畢太樂令跪奏請進樂樂以次作鼓吹令又前跪奏請以次進衆伎乃召諸郡計吏前受敕戒於階下宴樂畢謁者一人跪奏請罷退鐘鼓作羣臣北面再拜出然則夜漏未盡七刻謂之晨賀晝漏上三刻更出百官奉壽酒謂之晝會別置女樂三十人於黃帳外奏房中之歌江左多虞不復晨賀夜漏未盡十刻開宣陽門至平旦始開殿門晝漏上五刻皇帝乃出受賀皇太子出會者則在三恪下王公上正旦元會設白獸樽於殿庭樽蓋上施白獸若有能獻直言者則發此樽飲酒案禮白獸樽乃杜舉之遺式也為白獸蓋是後代所為示忌憚也魏制藩王不得朝覲魏明帝時有朝者皆由特恩不得以為常乃泰始中有司奏諸侯之國其王公以下入朝者四方各為二番三歲而周周則更始若臨時有故却在明年明年來朝之後更滿三歲乃復朝不得違本數朝禮皆親執璧如舊朝之制不朝之歲各遣卿奉聘奏可江左王侯不之國其有受任居外則同方伯刺史二千石之禮亦無朝聘之制故此禮遂廢漢以高帝十月定秦且為歲首至武帝雖改用夏正然每月朔朝至於十月朔猶常饗會其儀夜漏未盡七刻受賀及贄公侯璧中二千石二千石羔千石六百石雁四百石以下雉三公奉璧上殿御坐前北面太常讚曰皇帝為君興三公伏皇帝坐乃前進璧百官皆賀二千石以上上殿稱萬歲舉觴御食司徒奉羹大司農奉飯奏食舉之樂百官受賜宴饗大作樂如元正之儀魏晉則冬至日受方國及百僚稱賀因小會其儀亞於獻歲之旦古者帝王莫不巡狩魏文帝值天下三分方隅多事皇輿亟動役無寧歲蓋應時之務非舊章也明帝凡三東巡狩所過存問高年恤疾苦或賜穀帛有古巡幸之風焉齊王正始元年巡洛陽縣賜高年力田各有差及武帝泰始四年詔刺史二千石長吏曰古之王者以歲時巡狩方嶽其次則二伯述職不然則行人順省故雖幽遐側微心無壅隔下情上通上指遠諭至于魚衆寡罔不得所用垂風遺烈休聲猶存朕在位纍載如臨深川夙興夕惕明發不寢坐而待旦思四方水旱災眚為之怛然勤躬約己欲令事事當宜常恐衆吏用情誠心未著萬機兼猥慮有不周政刑失謬而弗獲備覽百姓有過在豫一人惟歲之不易未遑卜征巡省之事下之未其何以恤之今使使持節侍中副給事黃門侍郎銜命四出周行天下親見刺史二千石長吏申諭朕心訪求得失損益諸宜觀省政教問人間患苦周典有之曰其萬姓之利害為一書其禮俗政事刑禁之逆順為一書其暴亂作慝犯令為一書其札喪凶荒厄貧為一書其康樂和親安平為一書每國辨異之以返命于王舊章前訓令率由之還具條奏俾朕昭然鑒于幽遠若親行焉大夫君子其各悉乃心敬乃事嘉謀令圖苦言至戒與使者盡之無所隱諱方將虛心以俟其勉哉勖之稱朕意焉新禮巡狩方嶽柴望告設壝宮如禮諸侯之覲者賓及執贄皆如朝儀而不建旗摯虞以為覲禮諸侯覲天子各建其旗旗章所以殊爵命示等威詩稱君子至止言觀其旗宜定新禮建旗如舊禮詔可其議然終晉代其禮不行封禪之說經典無聞禮有因天事天因地事地因名山升中于天而鳳皇降龜龍格天子所以巡狩至于方嶽燔柴祭天以告其成功事似而非也讖緯諸說皆云王者封泰山禪梁甫易姓紀號秦漢行其典前史各陳其制矣魏明帝黃初中護軍蔣濟奏曰夫帝王大禮巡狩為先昭祖揚禰封禪為首是以自古革命受符未有不蹈梁父登泰山刊無竟之名紀天人之際者也故司馬相如謂有文以來七十二君或順所繇於前謹遺教於後太史公曰主上有聖明而不宣布有司之過也然則元功懿德不刊梁山之石無以顯帝王之功示兆庶不朽之觀也語曰當君而歎堯舜之美譬猶人子對厥所生而譽他人之父今大魏承百王之弊亂拯流遁之艱厄接千載之衰緒繼百代之廢業始自武文至于聖躬所以參成天地之道綱維人神之化上天報應嘉瑞顯祥以比往古無所取喻至於歷世迄今未發大禮雖志在掃盡殘盜蕩滌餘穢未遑斯事若爾三苗屈強於江海大舜當廢東巡之儀徐夷跳梁於淮泗周成當止岱嶽之禮且去歲破吳虜於江漢今茲屠蜀賊於隴右其震蕩內潰在不復淹無纍於封禪之事也此儀久廢非倉卒所定宜下公卿廣撰其禮卜年考時昭告上帝以副天下之望臣待罪軍旅不勝大願冒死以聞詔曰聞蔣濟斯言使吾汗出流足自開闢以來封禪者七十餘君耳故太史公曰雖有受命之君而功有不洽是以中間曠遠者千有餘年近者數百載其儀闕不可得記吾何德之修敢庶茲乎濟豈謂世無管仲以吾有桓公登泰山之志乎吾不欺天也濟之所言華則華矣非助我者也公卿侍中尚書常侍省之而已勿復有所議亦不須答詔也天子雖距濟議而實使高堂隆草封禪之儀以天下未一不欲便行大禮會隆卒不復行之及武帝平吳混一區宇太康元年九月庚寅尚書令衛瓘尚書左僕射山濤右僕射魏舒尚書劉實司空張華等奏曰臣聞肇自生靈則有后辟年載之數莫之能紀立德濟世揮揚仁風以登封泰山者七十有四家其諡號可知者十有四焉沈淪寂寞曾無遺聲者不可勝記大晉之德始自重黎實佐顓頊至于夏商世序天地其在于周不失其緒金德將升世濟明聖外平蜀漢海內歸心武功之盛實由文德至于陛下受命踐阼弘建大業羣生仰流惟獨江湖沅湘之表凶桀負固歷代不賓神謀獨斷命將出討兵威暫加數旬蕩定羇其鯨鯢赦其罪逆雲覆雨施八方來同聲教所被達于四極雖黃軒之征大禹遠略周之奕世何以尚今若夫玄石素文底號前載象以數表言以事告雖古河圖洛書之徵不是過也宜宣大典禮中嶽封泰山禪梁父發德號明至尊享天休篤黎庶勒千載之表播流後之聲俾百世之下莫不興起斯帝王之盛業天人之至望也詔曰今逋寇雖殄外則障塞有警內則百姓未寧此盛德之事所未議也瓘等又奏曰今東漸于海西被流沙大漠之陰日南北戶莫不通屬芒芒禹跡今實過之天人之道已周巍巍之功已著宜修禮地祇登封泰山致誠上帝以答人神之願也乞如前奏詔曰今陰陽未和刑政未當百姓未得其所豈可以勒功告成邪詔不許瓘等又奏曰臣聞處帝王之位者必有曆運之期天命之應濟兆庶之功者必有盛德之容告成之典無不可誣有不敢讓自古道也而明詔謙沖屢辭其禮雖盛德攸在推而未居夫三公職典天地實掌人物國之大事取議於此故漢氏封禪非是官也不在其事臣等前奏蓋陳祖考之功天命又應陛下之德合同四海迹古考今宜修此禮至於克定歲月須五府上議然後奏聞詔曰雖蕩清江表皆臨事者之勞何足以告成方望羣后思隆大化以寧區夏百姓獲與之休息斯朕日夜之望無所復下諸府矣瓘等又奏臣聞唐虞三代濟世弘功之君莫不仰承天休俯協人志登介丘履梁父未有辭焉者蓋不可讓也今陛下勳高百王德無與二茂績宏規巍巍之業固非臣等所能究論而聖旨勞謙屢自抑損時至弗應推美不居闕皇代之上儀塞靈祗之款望使大晉之典謨不同風於三五臣等誠不敢奉詔請如前奏施行詔曰方當共思弘道以康庶績且俟他年無所復紛紜也王公有司又奏自古聖明光宅四海封禪名山著於史籍作者七十四君矣舜禹之有天下也巡狩四嶽躬行其道易著觀俗省方禮有升中于天詩頌陟其高山皆載在方策文王為西伯以服事殷周公以魯藩列于諸侯或享于岐山或有事泰山徒以聖德猶得為其事自是以來功薄而僭其義者不可勝數號諡不泯以至于今況高祖宣皇帝肇開王業海外有截世宗景皇帝濟以大功輯寧區夏太祖文皇帝受命造晉蕩定蜀漢陛下應期龍興混一六合澤被羣生威震無外昔漢氏失統吳蜀鼎峙兵興以來近將百年地險俗殊人望絶塞今不羈之寇二代而平非聰明神武先天弗違孰能巍巍其有成功若茲者歟臣等幸以千載得遭運會親服大化目覩太平至公至美誰與為讓宜祖述先朝憲章古昔勒功岱嶽登封告成弘禮樂之制正三雍之典揚名萬世以顯祖宗是以不勝大願敢昧死以聞請告太常具禮儀上復詔曰所議誠列代之盛事也然方今未可以爾便報絶之哀帝即位欲尊崇章皇太妃桓溫議宜稱太夫人尚書僕射江虨議曰虞舜體仁孝之性盡事親之禮貴為天王富有四海而瞽叟無立錐之地一級之爵蒸蒸之心昊天罔極寧當忍父卑賤不以徽號顯之豈不以子無爵父之道理窮義屈靡所厝情者哉春秋經曰紀季姜歸于京師傳曰父母之於子雖為天王后猶曰吾季姜言子尊不加父母也或以為子尊不加父母則武王何以追王太王王季文王乎周之三王德配天地王迹之興自此始也是以武王仰尋前緒遂奉天命追崇祖考明不以子尊加父母也案禮幼不誄長賤不誄貴幼賤猶不得表彰長貴況敢錫之以榮命邪漢祖感家令之言而尊太公荀悅以為孝莫大于嚴父而以子貴加之父母家令之言過矣爰逮孝章不上賈貴人以尊號而厚其金寶幣帛非子道之不至也蓋聖典不可踰也當春秋時庶子承國其母得為夫人不審直子命母邪故當告於宗祧以先君之命命之邪竊見詔書當臨軒拜授貴人為皇太妃今稱皇帝策命命貴人斯則子爵母也貴人北面拜受斯則母臣子也天尊地卑名位定矣母貴子賤人倫序矣雖欲加崇貴人而實卑之雖顯明國典而實廢之且人主舉動史必書之如當載之方策以示後世無乃不順乎竊謂應告顯宗之廟稱貴人仁淑之至宜加殊禮以酬鞠育之惠奉先靈之命事不在己妃后雖是配君之名然自后以下有夫人九嬪無稱妃焉桓公謂宜進號太夫人非不允也如以夫人為少可言皇太夫人皇君也君太夫人於名禮順矣帝特下詔拜皇太妃三月丙辰使兼太保王恬授璽綬儀服一如太后又詔曰朝臣不為太妃敬為合禮不太常江逌議位號不極不應盡敬孝武追崇會稽鄭太妃為簡文太后詔問當開墓不王珣答據三祖追贈及中宗敬后並不開墓位更為塋域制度耳褚太后臨朝時議褚裒進見之典蔡謨王彪之並以虞舜漢高祖猶執子道況后乎王者父無拜禮尚書八座議以為純子則王道缺純臣則孝道虧謂公庭如臣私覿則嚴父為允漢魏故事皇太子稱臣新禮以太子既以子為名而又稱臣臣子兼稱於義不通除太子稱臣之制摯虞以為孝經資於事父以事君義兼臣子則不嫌稱臣宜定新禮皇太子稱臣如舊詔從之太寧三年三月戊辰明帝立皇子衍為皇太子癸巳詔曰禮無生而貴者故帝元子方之於士而漢魏以來尊崇儲二使官屬稱臣朝臣咸拜此甚無謂吾昔在東宮未及啓革今衍幼沖之年便臣先達將令日習所見謂之自然此豈可以教之邪主者其下公卿內外通議使必允禮中尚書令卞壼議以為周禮王后太子不會明禮同於君皆所以重儲二異正嫡苟奉之如君不得不拜矣太子若存謙沖故宜答拜臣以為皇太子之立郊告天地正位儲宮豈得同之皇子揖讓而已謂宜稽則漢魏闔朝同拜從之太元中尚書符問王公已下見皇太子儀及所衣服侍中領國子博士車胤議朝臣宜朱衣幘拜敬太子答拜案經傳不見其文故太傅羊祜箋慶太子稱叩頭死罪此則拜之證也又太寧三年詔議其典尚書卞壼謂宜稽則漢魏闔朝同拜其朱衣冠冕惟施之天朝宜幘而已朝議多同太元十二年議二王後與太子先後博士庾弘之及尚書參議並以為陳留國之上賓皇太子雖國之儲二猶在臣位陳留王坐應在太子上陳留王勱表稱疾病積年求放罷詔禮官博士議之博士曹耽云勱為祭主而無執祭之期宜與穆子孟縶事同王彪之云二王之後不宜輕致廢立記傳未見有已為君而疾病退罷者當知古無此禮孟縶穆子是方應為君非陳留之比咸康四年成帝臨軒遣使拜太傅太尉司空儀注太樂宿縣於殿庭門下奏非祭祀宴饗則無設樂之制太常蔡謨議曰凡敬其事則備其禮禮備則制有樂樂者所以敬事而明義非為耳目之娛故冠亦用之不惟宴饗宴饗之有樂亦所以敬賓也故郤至使楚楚子饗之郤至辭曰不忘先君之好貺之以大禮重之以備樂尋斯辭也則宴樂之意可知矣公侯大臣人君所重故御坐為起在輿為下言稱伯舅傳曰國卿君之二也是以命使之日御親臨軒百僚陪列此即敬事之意也古者天王饗下國之使及命將帥遣使臣皆有樂故詩序曰皇皇者華君遣使臣也又曰采薇以遣之出車以勞還杕杜以勤歸皆作樂而歌之今命大使拜輔相比於下國之臣輕重殊矣輕誠有之重亦宜然故謂臨軒遣使宜有金石之樂議奏從焉漢魏故事王公羣妾見於夫人夫人不答拜新禮以為禮無不答更制妃公侯夫人答妾拜摯虞以為禮妾事女君如婦之事姑妾服女君朞女君不報則敬與婦同而又加賤也名位不同本無酬報禮無不答義不謂此先聖殊嫡庶之別以絶陵替之漸峻明其防猶有僭違宜定新禮自如其舊詔可其議五禮之別其四曰軍所以和外寧內保大定功者也但兵者凶事故因搜狩而習之漢儀立秋之日自郊禮畢始揚威武斬牲於東門以薦陵廟其儀乘輿御戎路白馬朱鬣躬執弩射牲牲以鹿麛太宰令謁者各一人載以獲車馳送陵廟還宮遣使者齎束帛以賜武官武官肄兵習戰陳之儀斬牲之禮名曰貙劉兵官皆肄孫吳兵法六十四陳既還公卿已下陳雒陽前街乘輿到公卿已下拜天子下車公卿親識顏色然後還宮古語曰在車下車則惟此時施行漢世率以為常至獻帝建安二十一年魏國有司奏古四時講武皆於農隙漢西京承秦制三時不講惟十月都試今金革未偃士衆素習可無四時講武但以立秋擇吉日大朝車騎號曰閲兵上合禮名下承漢制奏可是冬閲兵魏王親執金鼓以令進退延康元年魏文帝為魏王是年六月立秋閲兵于東郊公卿相儀王御華蓋親令金鼓之節魏明帝太和元年十月又閲兵武帝泰始四年九月咸寧元年太康四年六年冬皆自臨宣武觀大閲衆軍然不自令進退也自惠帝以後其禮遂廢元帝太興四年詔左右衛及諸營教習依大習儀作雁羽仗成帝咸和中詔內外諸軍戲兵於南郊之場故其地因名鬬場自後藩鎮桓庾諸方伯往往閲習然朝廷無事焉漢魏故事遣將出征符節郎授節鉞於朝堂其後荀顗等所定新禮遣將御臨軒尚書受節鉞依古兵書跪而推轂之義也五禮之別其五曰嘉宴饗冠婚之道於是乎備周末崩離賓射宴饗之則罕復能行冠婚飲食之法又多遷變周禮雖有服冕之數而無天子冠文又儀禮云公侯之有冠禮夏之末造也王鄭皆以為夏末上下相亂篡弒由生故作公侯冠禮則明無天子冠禮之審也大夫又無冠禮古者五十而後爵何大夫冠禮之有周人年五十而有賢才則試以大夫之事猶行士禮也故筮日筮賓冠於阼以著代醮於客位三加彌尊皆士禮耳然漢代以來天子諸侯頗採其儀正月甲子若丙子為吉日可加元服儀從冠禮是也漢順帝冠又兼用曹褒新禮乘輿初加緇布進賢次爵辨武辨次通天皆於高廟以禮謁見世祖廟王公已下初加進賢而已案此文始冠緇布從古制也冠於宗廟是也魏天子冠一加其說曰士禮三加加有成也至於天子諸侯無加數之文者將以踐阼臨下尊極德備豈得與士同也魏氏太子再加皇子王公世子乃三加孫育以為一加再加皆非也禮醮辭曰令月吉日以歲之正以月之令案魯襄公冠以冬漢惠帝冠以三月明無定月而後漢以來帝加元服咸以正月及咸寧二年秋閏九月遣使冠汝南王柬此則非必歲首禮冠於廟然武惠冠太子太子皆即廟見斯亦擬在廟之儀也穆帝孝武將冠皆先以幣告廟訖又廟見也惠帝之為太子將冠武帝臨軒使兼司徒高陽王圭加冠兼光祿大夫屯騎校尉華廙贊冠江左諸帝將冠金石宿設百僚陪位又豫於殿上鋪大牀御府令奉冕幘簪導袞服以授侍中常侍太尉加幘太保加冕將加冕太尉跪讀祝文曰令月吉日始加元服皇帝穆穆思弘袞職欽若昊天六合是式率遵祖考永永無極眉壽惟祺介茲景福加冕訖侍中繫玄紞侍中脫帝絳紗服加袞服冕冠事畢太保率羣臣奉觴上壽王公以下三稱萬歲乃退案儀注一加幘冕而已泰始十年南宮王承年十五依舊應冠有司議奏禮十五成童國君十五而生子以明可冠之宜又漢魏遣使冠諸王非古典於是制諸王十五而冠不復加使命王彪之云禮傳冠皆在廟案成帝既加元服車駕出拜于太廟以告成也蓋亦猶擬在廟之儀魏齊王正始四年立皇后甄氏其儀不存武帝咸寧二年臨軒遣太尉賈充策立皇后楊氏納悼后也因大赦賜王公以下各有差百僚上禮太康八年有司奏婚禮納徵大婚用玄纁束帛加圭馬二駟王侯玄纁束帛加璧乘馬大夫用玄纁束帛加羊古者以皮馬為庭實天子加以穀圭諸侯加大璋可依周禮改璧用璋其羊雁酒米玄纁如故諸侯婚禮加納采告期親迎各帛五匹及納徵馬四匹皆令夫家自備惟璋官為具致之尚書朱整議案魏氏故事王娶妃公主嫁之禮天子諸侯以皮馬為庭實天子加以穀圭諸侯加以大璋漢高后制聘后黃金二百斤馬十二匹夫人金五十斤馬四匹魏氏王娶妃公主嫁之禮用絹百九十匹晉興故事用絹三百匹詔曰公主嫁由夫氏不宜皆為備物賜錢使足而已惟給璋餘如故事成帝咸康二年臨軒遣使持節兼太保領軍將軍諸葛恢兼太尉護軍將軍孔愈六禮備物拜皇后杜氏即日入宮帝御太極殿羣臣畢賀賀非禮也王者婚禮禮無其制春秋祭公逆王后于紀穀梁左氏傳說與公羊又不同而自漢魏遺事並皆闕略武惠納后江左又無復儀注故成帝將納杜后太常華始與博士參定其儀據杜預左氏傳說主婚是供其婚禮之幣而已又周靈王求婚於齊齊侯問於晏桓子桓子對曰夫婦所生若如人姑姊妹則稱先守某公之遺女若如人此則天子之命自得下達臣下之答徑自上通先儒以為丘明詳録其事蓋為王者婚娶之禮也故成帝臨軒遣使稱制拜后然其儀注又不具存康帝建元元年納皇后褚氏而儀注陛者不設旄頭殿中御史奏今迎皇后依成恭皇后入宮御物而儀注至尊袞冕升殿旄頭不設求量處又案昔迎恭皇后惟作青龍旗其餘皆即御物今當臨軒遣使而立五牛旗旄頭罼並出即用故致今闕詔曰所以正法服升太極者以敬其始故備其禮也今云何更闕所重而徹法物邪又恭后神主入廟先帝詔后禮宜降不宜建五牛旗而今猶復設之邪既不設五牛旗則旄頭罼之物易具也又詔曰舊制既難準且於今而備亦非宜府庫之儲惟當以供軍國之費耳法服儀飾粗令舉其餘兼副雜器停之穆帝升平元年將納皇后何氏太常王彪之大引經傳及諸故事以定其禮深非公羊婚禮不稱主人之義又曰王者之於四海無不臣妾雖復父兄之親師友之賢皆純臣也夫崇三綱之始以定乾坤之儀安有天父之尊而稱臣下之命以納伉儷安有臣下之卑而稱天父之名以行大禮遠尋古禮無王者此制近求史籍無王者此比於情不安於義不通案咸寧二年納悼皇后時弘訓太后母臨天下而無命戚屬之臣為武皇父兄主婚之文又考大晉已行之事咸寧故事不稱父兄師友則咸康華所上禮合於舊臣愚謂今納后儀制宜一依咸康故事於是從之華所定之禮依漢舊及晉已行之制故彪之多從咸康由此也惟以娶婦之家三日不舉樂而咸康羣臣賀為失禮故但依咸寧上禮不復賀其告廟六禮版文等儀皆彪之所定也其納采版文璽書曰皇帝咨前太尉參軍何琦渾元資始肇經人倫爰及夫婦以奉天地宗廟社稷謀于公卿咸以宜率由舊典今使使持節太常彪之宗正綜以禮納采主人曰皇帝嘉命訪婚陋族備數采擇臣從祖弟故散騎侍郎準之遺女未間教訓衣履若如人欽承舊章肅奉典制前太尉參軍都鄉侯糞土臣何琦稽首頓首再拜承詔次問名版文曰皇帝曰咨某官某姓兩儀配合承天統物正位乎內必俟令族重申舊典今使使持節太常某宗正某以禮問名主人曰皇帝嘉命使者某到重宣中詔問臣名族臣族女父母所生先臣故光祿大夫雩婁侯禎之遺玄孫先臣故豫州刺史關中侯惲之曾孫先臣故安豐太守關中侯睿之孫先臣故散騎侍郎準之遺女外出自先臣故尚書左丞孔胄之外曾孫先臣故侍中關內侯夷之外孫女年十七欽承舊章肅奉典制次納吉版文曰皇帝曰咨某官某姓人謀龜從僉曰貞吉敬從典禮今使使持節太常某宗正某以禮納吉主人曰皇帝嘉命使者某重宣中詔太卜元吉臣陋族卑鄙憂懼不堪欽承舊章肅奉典制次納徵版文曰皇帝曰咨某官某姓之女有母儀之德窈窕之姿如山如河宜奉宗廟永承天祚以玄纁皮帛馬羊錢璧以章典禮今使使持節司徒某太常某以禮納徵主人曰皇帝嘉命降婚卑陋崇以上公寵以典禮備物典策欽承舊章肅奉典制次請期版文曰皇帝曰咨某官某姓謀于公卿泰筮元龜罔有不臧率遵典禮今使使持節太常某宗正某以禮請期主人曰皇帝嘉命使者某重宣中詔吉日惟某可迎臣欽承舊章肅奉典制次親迎版文曰皇帝曰咨某官某姓歲吉月令吉日惟某率禮以迎今使使持節太保某太尉某以禮迎主人曰皇帝嘉命使者某重宣中詔令月吉辰備禮以迎上公宗卿兼至副介近臣百兩臣螻蟻之族猥承大禮憂懼戰悸欽承舊章肅奉典制某稽首承詔皆如初答孝武納王皇后其禮亦如之其納采問名納吉請期親迎皆用白雁白羊各一頭酒米各十二斛惟納徵羊一頭玄纁用帛三匹絳二匹絹二百匹獸皮二枚錢二百萬玉璧一枚馬六匹酒米各十二斛鄭玄所謂五雁六禮也其圭馬之制備物之數校太康所奏又有不同云古者婚冠皆有醮鄭氏醮文三首具存升平八年臺符問迎皇后大駕應作鼓吹不博士胡訥議臨軒儀注闕無施安鼓吹處所又無舉麾鳴鐘之條太常王彪之以為婚禮不樂鼓吹亦樂之總名儀注所以無者依婚禮今宜備設而不作時用此議永和二年納后議賀不王述云婚是嘉禮春秋傳曰娶者大吉非常吉又傳曰鄭子罕如晉賀夫人鄰國猶相賀況臣下邪如此便應賀但不在三日內耳今因廟見成禮而賀亦是一節也王彪之議云婚禮不樂不賀禮之明文傳稱子罕如晉賀夫人既無經文又傳不云禮也禮取婦三日不舉樂明三日之後自當樂至於不賀無三日之斷恐三日之後故無應賀之禮又云禮記所以言賀取妻者是因就酒食而有慶語也愚謂無直相賀之體而有禮貺共慶會之義今世所共行于時竟不賀穆帝納后欲用九月九月是忌月范汪問王彪之答云禮無忌月不敢以所不見便謂無之博士曹耽荀訥等並謂無忌月之文不應有妨王洽曰若有忌月當復有忌歲太元十二年臺符問皇太子既拜廟朝臣奉賀應上禮與不國子博士車胤云百辟卿士咸預盛禮展敬拜伏不須復上禮惟方伯牧守不覩大禮自非酒牢貢羞無以表其乃誠故宜有上禮猶如元正大慶方伯莫不上禮朝臣奉璧而已太學博士庾弘之議案咸寧三年始平濮陽諸王新拜有司奏依故事聽京城近臣諸王公主應朝賀者復上禮今皇太子國之儲副既已崇建普天同慶謂應上禮奉賀徐邈同又引一有元良慶在於此封諸王及新宮上禮既有前事亦皆已瞻仰致敬而又奉觴上壽應亦無疑也江左以來太子婚納徵禮用玉璧一獸皮二未詳何所準況或者獸取其威猛有班彩玉以象德而有溫潤尋圭璋亦玉之美者豹皮采蔚以譬君子王肅納徵辭云玄纁束帛儷皮雁羊前漢聘后黃金二百斤馬十二匹亦無用羊之旨鄭氏婚物贊曰羊者祥也然則婚之有羊自漢末始也王者六禮尚未用焉是故太康中有司奏太子婚納徵用玄纁束帛加羊馬二駟武帝泰始十年將聘拜三夫人九嬪有司奏禮皇后聘以穀圭無妾媵禮贄之制詔曰拜授可依魏氏故事於是臨軒使使持節兼太常拜三夫人兼御史中丞拜九嬪漢魏之禮云公主居第尚公主者來第成婚司空王朗以為不可其後乃革太元中公主納徵以獸豹皮各一具禮豈謂婚禮不辨王公之序故取獸豹以尊其事乎禮有三王養老膠庠之文饗射飲酒之制周末淪廢漢明帝永平二年三月帝始率羣臣躬養三老五更于辟雍行大射之禮郡國縣道行鄉飲酒于學校皆祠先聖先師周公孔子牲以太牢孟冬亦如之及魏高貴鄉公甘露二年天子親帥羣司行養老之禮於是王祥為三老鄭小同為五更其儀注不存然漢禮猶在武帝泰始六年十二月帝臨辟雍行鄉飲酒之禮詔曰禮儀之廢久矣乃今復講肄舊典賜太常絹百匹丞博士及學生牛酒咸寧三年惠帝元康九年復行其禮魏正始中齊王每講經遍輒使太常釋奠先聖先師於辟雍弗躬親及惠帝明帝之為太子及愍懷太子講經竟並親釋奠於太學太子進爵於先師中庶子進爵於顏回成穆孝武三帝亦皆親釋奠孝武時以太學在水南懸遠有司議依升平元年於中堂權立行太學于時無復國子生有司奏應須復二學生百二十人太學生取見人六十國子生權銓大臣子孫六十人事訖罷奏可釋奠禮畢會百官六品以上漢儀季春上巳官及百姓皆禊於東流水上洗濯祓除去宿垢而自魏以後但用三日不以上巳也晉中朝公卿以下至于庶人皆禊洛水之側趙王倫篡位三日會天泉池誅張林懷帝亦會天泉池賦詩陸機云天泉池南石溝引御溝水池西積石為禊堂本水流杯飲酒亦不言曲水元帝又詔罷三日弄具海西於鍾山立流杯曲水延百僚皆其事也九月九日馬射或說云秋金之節講武習射象立秋之禮也
