body:
  text: 晉書卷三十三列傳第三王祥弟覽王祥字休徵琅邪臨沂人漢諫議大夫吉之後也祖仁青州刺史父融公府辟不就祥性至孝早喪親繼母朱氏不慈數譖之由是失愛於父每使掃除牛下祥愈恭謹父母有疾衣不解帶湯藥必親嘗母常欲生魚時天寒冰凍祥解衣將剖冰求之冰忽自解雙鯉躍出持之而歸母又思黃雀炙復有黃雀數十飛入其幕復以供母鄉里驚歎以為孝感所致焉有丹奈結實母命守之每風雨祥輒抱樹而泣其篤孝純至如此漢末遭亂扶母攜弟覽避地廬江隱居三十餘年不應州郡之命母終居喪毀瘁杖而後起徐州刺史呂虔檄為別駕祥年垂耳順固辭不受覽勸之為具車牛祥乃應召虔委以州事于時寇盜充斥祥率勵兵士頻討破之州界清靜政化大行時人歌之曰海沂之康實賴王祥邦國不空別駕之功舉秀才除溫令纍遷大司農高貴鄉公即位與定策功封關內侯拜光祿勳轉司隸校尉從討毋丘儉增邑四百戶遷太常封萬歲亭侯天子幸太學命祥為三老祥南面几杖以師道自居天子北面乞言祥陳明王聖帝君臣政化之要以訓之聞者莫不砥礪及高貴鄉公之弒也朝臣舉哀祥號哭曰老臣無狀涕淚交流衆有愧色頃之拜司空轉太尉加侍中五等建封睢陵侯邑一千六百戶及武帝為晉王祥與荀顗往謁顗謂祥曰相王尊重何侯既已盡敬今便當拜也祥曰相國誠為尊貴然是魏之宰相吾等魏之三公公王相去一階而已班例大同安有天子三司而輒拜人者損魏朝之望虧晉王之德君子愛人以禮吾不為也及入顗遂拜而祥獨長揖帝曰今日方知君見顧之重矣武帝踐阼拜太保進爵為公加置七官之職帝新受命虛己以求讜言祥與何曾鄭沖等耆艾篤老希復朝見帝遣侍中任愷咨問得失及政化所先祥以年老疲耄纍乞遜位帝不許御史中丞侯史光以祥久疾闕朝會禮請免祥官詔曰太保元老高行朕所毗倚以隆政道者也前後遜讓不從所執此非有司所得議也遂寢光奏祥固乞骸骨詔聽以睢陵公就第位同保傅在三司之右祿賜如前詔曰古之致仕不事王侯今雖以國公留居京邑不宜復苦以朝請其賜几杖不朝大事皆咨訪之賜安車駟馬第一區錢百萬絹五百匹牀帳簟褥以舍人六人為睢陵公舍人置官騎二十人以公子騎都尉肇為給事中使常優遊定省又以太保高潔清素家無宅宇其權留本府須所賜第成乃出及疾篤著遺令訓子孫曰夫生之有死自然之理吾年八十有五啓手何恨不有遺言使爾無述吾生值季末登庸歷試無毗佐之勳沒無以報氣絶但洗手足不須沐浴勿纏尸皆浣故衣隨時所服所賜山玄玉佩衛氏玉玦綬笥皆勿以斂西芒上土自堅貞勿用甓石勿起墳隴穿深二丈椁取容棺勿作前堂布几筵置書箱鏡奩之具棺前但可施牀榻而已糒脯各一盤玄酒一杯為朝夕奠家人大小不須送喪大小祥乃設特牲無違余命高柴泣血三年夫子謂之愚閔子除喪出見援琴切切而哀仲尼謂之孝故哭泣之哀日月降殺飲食之宜自有制度夫言行可覆信之至也推美引過德之至也揚名顯親孝之至也兄弟怡怡宗族欣欣悌之至也臨財莫過乎讓此五者立身之本顏子所以為命未之思也夫何遠之有其子皆奉而行之泰始五年薨詔賜東園祕器朝服一具衣一襲錢三十萬布帛百匹時文明皇太后崩始踰月其後詔曰為睢陵公發哀事乃至今雖每為之感傷要未得特哀情今便哭之明年策諡曰元祥之薨奔赴者非朝廷之賢則親親故吏而已門無雜弔之賓族孫戎嘆曰太保可謂清達矣又稱祥在正始不在能言之流及與之言理致清遠將非以德掩其言乎祥有五子肇夏馥烈芬肇孽庶夏早卒馥嗣爵咸寧初以祥家甚貧儉賜絹三百匹拜馥上洛太守卒諡曰孝子根嗣散騎郎肇仕至始平太守肇子俊守太子舍人封永世侯俊子遐鬱林太守烈芬並幼知名為祥所愛二子亦同時而亡將死烈欲還葬舊土芬欲留葬京邑祥流涕曰不忘故鄉仁也不戀本土達也惟仁與達吾二子有焉覽字玄通母朱遇祥無道覽年數歲見祥被楚撻輒涕泣抱持至于成童每諫其母其母少止凶虐朱屢以非理使祥覽輒與祥俱又虐使祥妻覽妻亦趨而共之朱患之乃止祥喪父之後漸有時譽朱深疾之密使鴆祥覽知之徑起取酒祥疑其有毒爭而不與朱遽奪反之自後朱賜祥饌覽輒先嘗朱懼覽致斃遂止覽孝友恭恪名亞於祥及祥仕進覽亦應本郡之召稍遷司徒西曹掾清河太守五等建封即丘子邑六百戶泰始末除弘訓少府職省轉太中大夫祿賜與卿同咸寧初詔曰覽少篤至行服仁履義貞素之操長而彌固其以覽為宗正卿頃之以疾上疏乞骸骨詔聽之以太中大夫歸老賜錢二十萬牀帳薦褥遣殿中醫療疾給藥後轉光祿大夫門施行馬咸寧四年卒時年七十三諡曰貞有六子裁基會正彥裁字士初撫軍長史基字士先治書御史會字士和侍御史正字士則尚書郎彥字士治中護軍琛字士瑋國子祭酒初呂虔有佩刀工相之以為必登三公可服此刀虔謂祥曰苟非其人刀或為害卿有公輔之量故以相與祥固辭強之乃受祥臨薨以刀授覽曰汝後必興足稱此刀覽後奕世多賢才興於江左矣裁子導別有傳鄭沖鄭沖字文和滎陽開封人也起自寒微卓爾立操清恬寡欲耽玩經史遂博究儒術及百家之言有姿望動必循禮任真自守不要鄉曲之譽由是州郡久不加禮及魏文帝為太子搜揚側陋命沖為文學纍遷尚書郎出補陳留太守沖以儒雅為德蒞職無幹局之譽簞食縕袍不營資産世以此重之大將軍曹爽引為從事中郎轉散騎常侍光祿勳嘉平三年拜司空及高貴鄉公講尚書沖執經親授與侍中鄭小同俱被賞賜俄轉司徒常道鄉公即位拜太保位在三司之上封壽光侯沖雖位階台輔而不預世事時文帝輔政平蜀之後命賈充羊祜等分定禮儀律令皆先咨於沖然後施行及魏帝告禪使沖奉策武帝踐阼拜太傅進爵為公頃之司隸李喜中丞侯史光奏沖及何曾荀顗等各以疾病俱應免官帝不許沖遂不視事表乞骸骨優詔不許遣使申喻沖固辭上貂蟬印綬詔又不許泰始六年詔曰昔漢祖以知人善任克平宇宙推述勳勞歸美三俊遂與功臣剖符作誓藏之宗廟副在有司所以明德庸勳藩翼王室者也昔我祖考遭世多難攬授英俊與之斷金遂濟時務克定大業太傅壽光公鄭沖太保朗陵公何曾太尉臨淮公荀顗各尚德依仁明允篤誠翼亮先皇光濟帝業故司空博陵元公王沈衛將軍巨平侯羊祜才兼文武忠肅居正朕甚嘉之書不云乎天秩有禮五服五章哉其為壽光朗陵臨淮博陵巨平國置郎中令假夫人世子印綬食本秩三分之一皆如郡公侯比九年沖又抗表致仕詔曰太傅韞德深粹履行高潔恬遠清虛確然絶世艾服王事六十餘載忠肅在公慮不及私遂應衆舉歷登三事仍荷保傅之重綢繆論道之任光輔奕世亮茲天工迪宣謀猷弘濟大烈可謂朝之俊老衆所具瞻者也朕昧于政道庶事未康挹仰耆訓導揚厥蒙庶賴顯德緝熙有成而公屢以年高疾篤致仕告退惟從公志則朕孰與咨謀譬彼涉川罔知攸濟是用未許迄于纍載而高讓彌篤至意難違覽其盛指俾朕憮然夫功成弗有上德所隆成人之美君子與焉豈必遂朕憑賴之心以枉大雅進止之度哉今聽其所執以壽光公就第位同保傅在三司之右公宜頤精養神保衛太和以究遐福其賜几杖不朝古之哲王欽祗國老憲行乞言以彌縫其闕若朝有大政皆就咨之又賜安車駟馬第一區錢百萬絹五百匹牀帷簟褥置舍人六人官騎二十人以世子徽為散騎常侍使常優遊定省祿賜所供策命儀制一如舊典而有加焉明年薨帝於朝堂發哀追贈太傅賜祕器朝服衣一襲錢三十萬布百匹諡曰成咸寧初有司奏沖與安平王孚等十二人皆存銘太常配食于廟初沖與孫雍曹羲荀顗何晏共集論語諸家訓注之善者記其姓名因從其義有不安者輒改易之名曰論語集解成奏之魏朝于今傳焉沖無子以從子徽為嗣位至平原內史徽卒子簡嗣何曾子劭遵何曾字穎考陳國陽夏人也父夔魏太僕陽武亭侯曾少襲爵好學博聞與同郡袁侃齊名魏明帝初為平原侯曾為文學及即位纍遷散騎侍郎汲郡典農中郎將給事黃門侍郎上疏曰臣聞為國者以清靜為基而百姓以良吏為本今海內虛耗事役衆多誠宜恤養黎元悅以使人郡守之權雖輕猶專任千里比之於古則列國之君也上當奉宣朝恩以致惠和下當興利而除其害得其人則可安非其人則為患故漢宣稱曰百姓所以安其田里而無歎息愁恨之心者政平訟理也與我共此者其惟良二千石乎此誠可謂知政之本也方今國家大舉新有發調軍師遠征上下劬勞夫百姓可與樂成難與慮始愚惑之人能厭目前之小勤而忘為亂之大禍者是以郡守益不可不得其人才雖難備猶宜粗有威恩為百姓所信憚者臣聞諸郡守有年老或疾病皆委政丞掾不恤庶事或體性疏怠不以政理為意在官積年惠澤不加於人然於考課之限罪亦不至詘免故得經延歲月而無斥罷之期臣愚以為可密詔主者使隱核參訪郡守其有老病不隱親人物及宰牧少恩好修人事煩撓百姓者皆可徵還為更選代頃之遷散騎常侍及宣帝將伐遼東曾上疏魏帝曰臣聞先王制法必全於慎故建官受任則置副佐陳師命將則立監二宣命遣使則設介副臨敵交刃又參御右蓋以盡思謀之功防安危之變也是以在險當難則權足相濟隕缺不豫則才足相代其為國防至深至遠及至漢氏亦循舊章韓信伐趙張耳為二馬援討越劉隆副軍前世之迹著在篇志今太尉奉辭誅罪精甲鋭鋒步騎數萬道路迥阻且四千里雖假天威有征無戰寇或潛遁消引日月命無常期人非金石遠慮詳備誠宜有副今北軍諸將及太尉所督皆為僚屬名位不殊素無定分統御之尊卒有變急不相鎮攝存不忘亡聖達所裁臣愚以為宜選大臣名將威重宿著者成其禮秩遣詣北軍進同謀略退為副佐雖有萬一不虞之變軍主有儲則無患矣帝不從出補河內太守在任有威嚴之稱徵拜侍中母憂去官嘉平中為司隸校尉撫軍校事尹模憑寵作威姦利盈積朝野畏憚莫敢言者曾奏劾之朝廷稱焉時曹爽專權宣帝稱疾曾亦謝病爽誅乃起視事魏帝之廢也曾預其謀焉時步兵校尉阮籍負才放誕居喪無禮曾面質籍於文帝座曰卿縱情背禮敗俗之人今忠賢執政綜核名實若卿之曹不可長也因言於帝曰公方以孝治天下而聽阮籍以重哀飲酒食肉於公座宜擯四裔無令污染華夏帝曰此子羸病若此君不能為吾忍邪曾重引據辭理甚切帝雖不從時人敬憚之毋丘儉誅子甸妻荀應坐死其族兄顗族父虞並景帝姻通共表魏帝以丐其命詔聽離婚荀所生女芝為潁川太守劉子元妻亦坐死以懷妊繫獄荀辭詣曾乞恩曰芝繫在廷尉顧影知命計日備法乞沒為官婢以贖芝命曾哀之騰辭上議朝廷僉以為當遂改法語在刑法志曾在司隸積年遷尚書正元年中為鎮北將軍都督河北諸軍事假節將之鎮文帝使武帝齊王攸辭送數十里曾盛為賓主備太牢之饌侍從吏騶莫不醉飽帝既出又過其子劭曾先敕劭曰客必過汝汝當豫嚴劭不冠帶停帝良久曾深以譴劭曾見崇重如此遷征北將軍進封潁昌鄉侯咸熙初拜司徒改封朗陵侯文帝為晉王曾與高柔鄭沖俱為三公將入見曾獨致拜盡敬二人猶揖而已武帝襲王位以曾為晉丞相加侍中與裴秀王沈等勸進踐阼拜太尉進爵為公食邑千八百戶泰始初詔曰蓋謨明弼諧王躬是保所以宣崇大訓克咸四海也侍中太尉何曾立德高峻執心忠亮博物洽聞明識弘達翼佐先皇勳庸顯著朕纂洪業首相王室迪惟前人施于朕躬實佐命興化光贊政道夫三司之任雖左右王事若乃豫違汝弼匡奬不逮則存乎保傅故將明袞職未如用厥辟之重其以曾為太保侍中如故久之以本官領司徒曾固讓不許遣散騎常侍諭旨乃視事進位太傅曾以老年屢乞遜位詔曰太傅明朗高亮執心弘毅可謂舊德老成國之宗臣者也而高尚其事屢辭祿位朕以寡德憑賴保佑省覽章表實用憮然雖欲成人之美豈得遂其雅志而忘翼佐之益哉又司徒所掌務煩不可久勞耆艾其進太宰侍中如故朝會劍履乘輿上殿如漢相國蕭何田千秋魏太傅鍾繇故事賜錢百萬絹五百匹及八尺牀帳簟褥自副置長史掾屬祭酒及員吏一依舊制所給親兵官騎如前主者依次按禮典務使優備後每召見敕以常所飲食服物自隨令二子侍從咸寧四年薨時年八十帝於朝堂素服舉哀賜東園祕器朝服一具衣一襲錢三十萬布百匹將葬下禮官議諡博士秦秀諡為繆醜帝不從策諡曰孝太康末子劭自表改諡為元曾性至孝閨門整肅自少及長無聲樂嬖幸之好年老之後與妻相見皆正衣冠相待如賓己南向妻北面再拜上酒酬酢既畢便出一歲如此者不過再三焉初司隸校尉傅玄著論稱曾及荀顗曰以文王之道事其親者其潁昌何侯乎其荀侯乎古稱曾閔今曰荀何內盡其心以事其親外崇禮讓以接天下孝子百世之宗仁人天下之命有能行孝之道君子之儀表也詩云高山仰止景行行止令德不遵二夫子之景行者非樂中正之道也又曰荀何君子之宗也又曰潁昌侯之事親其盡孝子之道乎存盡其和事盡其敬亡盡其哀豫於潁昌侯見之矣又曰見其親之黨如見其親六十而孺慕豫於潁昌侯見之矣然性奢豪務在華侈帷帳車服窮極綺麗廚膳滋味過於王者每燕見不食太官所設帝輒命取其食蒸餅上不坼作十字不食食日萬錢猶曰無下箸處人以小紙為書者敕記室勿報劉毅等數劾奏曾侈無度帝以其重臣一無所問都官從事劉享嘗奏曾華侈以銅鉤蕰紖車瑩牛蹄角後曾辟享為椽或勸勿應享謂至公之體不以私憾遂應辟曾常因小事加享杖罰其外寬內忌亦此類也時司空賈充權擬人主曾卑充而附之及充與庾純因酒相競曾議黨充而抑純以此為正直所非二子遵劭劭嗣劭字敬祖少與武帝同年有總角之好帝為王太子以劭為中庶子及即位轉散騎常侍甚見親待劭雅有姿望遠客朝見必以劭侍直每諸方貢獻帝輒賜之而觀其占謝焉咸寧初有司奏劭及兄遵等受故鬲令袁毅貨雖經赦宥宜皆禁止事下廷尉詔曰太保與毅有纍世之交遵等所取差薄一皆置之遷侍中尚書惠帝即位初建東宮太子年幼欲令親萬機故盛選六傅以劭為太子太師通省尚書事後轉特進纍遷尚書左僕射劭博學善屬文陳説近代事若指諸掌永康初遷司徒趙王倫篡位以劭為太宰及三王交爭劭以軒冕而遊其間無怨之者而驕奢簡貴亦有父風衣裘服玩新故巨積食必盡四方珍異一日之供以錢二萬為限時論以為太官御膳無以加之然優遊自足不貪權勢嘗語鄉人王詮曰僕雖名位過幸少無可書之事惟與夏侯長容諫授博士可傳史册耳所撰荀粲王弼傳及諸奏議文章並行於世永寧元年薨贈司徒諡曰康子岐嗣劭初亡袁粲弔岐岐辭以疾粲獨哭而出曰今年決下婢子品王詮謂之曰知死弔死何必見生岐前多罪爾時不下何公新亡便下岐品人謂中正畏強易弱粲乃止遵字思祖劭庶兄也少有幹能起家散騎黃門郎散騎常侍侍中纍轉大鴻臚性亦奢役使御府工匠作禁物又鬻行器為司隸劉毅所奏免官太康初起為魏郡太守遷太僕卿又免官卒於家四子嵩綏機羡嵩字泰基寬弘愛士博觀墳籍尤善史漢少歷清官領著作郎綏字伯蔚位至侍中尚書自以繼世名貴奢侈過度性既輕物翰札簡傲城陽王尼見綏書疏謂人曰伯蔚居亂而矜豪乃爾豈其免乎劉輿潘滔譖之於東海王越越遂誅綏初曾侍武帝宴退而告遵等曰國家應天受禪創業垂統吾每宴見未嘗聞經國遠圖惟説平生常事非貽厥孫謀之兆也及身而已後嗣其殆乎此子孫之憂也汝等猶可獲沒指諸孫曰此等必遇亂亡也及綏死嵩哭之曰我祖其大聖乎機為鄒平令性亦矜傲責鄉里謝鯤等拜或戒之曰禮敬年爵以德為主令鯤拜勢懼傷風俗機不以為慚羡為離狐令既驕且吝陵駕人物鄉閭疾之如讎永嘉之末何氏滅亡無遺焉石苞子崇歐陽建孫鑠石苞字仲容渤海南皮人也雅曠有智局容儀偉麗不修小節故時人為之語曰石仲容姣無雙縣召為吏給農司馬會謁者陽翟郭玄信奉使求人為御司馬以苞及鄧艾給之行十餘里玄信謂二人曰子後並當至卿相苞曰御隸也何卿相乎既而又被使到鄴事久不決乃販鐵於鄴市市長沛國趙元儒名知人見苞異之因與結交歎苞遠量當至公輔由是知名見吏部郎許允求為小縣允謂苞曰卿是我輩人當相引在朝廷何欲小縣乎苞還歎息不意允之知己乃如此也稍遷景帝中護軍司馬宜帝聞苞好色薄行以讓景帝帝答曰苞雖細行不足而有經國才略夫貞廉之士未必能經濟世務是以齊桓忘管仲之奢僭而録其匡合之大謀漢高捨陳平之樜行而取其六奇之妙算苞雖未可以上儔二子亦今日之選也意乃釋徙鄴典農中郎將時魏世王侯多居鄴下尚書丁謐貴傾一時並較時利苞奏列其事由是益見稱歷東萊琅邪太守所在皆有威惠遷徐州刺史文帝之敗於東關也苞獨全軍而退帝指所持節謂苞曰恨不以此授卿以究大事乃遷苞為奮武將軍假節監青州諸軍事及諸葛誕舉兵淮南苞統青州諸軍督兗州刺史州泰徐州刺史胡質簡鋭卒為遊軍以備外寇吳遣大將朱異丁奉等來迎誕等留輜重於都陸輕兵渡黎水苞等逆擊大破之泰山太守胡烈以奇兵詭道襲都陸盡焚其委輸異等收餘衆而退壽春平拜苞鎮東將軍封東光侯假節頃之代王基都督揚州諸軍事苞因入朝當還辭高貴鄉公留語盡日既出白文帝曰非常主也數日而有成濟之事後進位征東大將軍俄遷驃騎將軍文帝崩賈充荀勗議葬禮未定苞時奔喪慟哭曰基業如此而以人臣終乎葬禮乃定後每與陳騫諷魏帝以曆數已終天命有在及禪位苞有力焉武帝踐阼遷大司馬進封樂陵郡公加侍中羽葆鼓吹自諸葛誕破滅苞便鎮撫淮南士馬強盛邊境多務苞既勤庶事又以威德服物淮北監軍王琛輕苞素微又聞童謠曰宮中大馬幾作驢大石壓之不得舒因是密表苞與吳人交通先時望氣者云東南有大兵起及琛表至武帝甚疑之會荊州刺史胡烈表吳人欲大出為寇苞亦聞吳師將入乃築壘遏水以自固帝聞之謂羊祜曰吳人每來常東西相應無緣偏爾豈石苞果有不順乎祜深明之而帝猶疑焉會苞子喬為尚書郎上召之經日不至帝謂為必叛欲討苞而隱其事遂下詔以苞不料賊勢築壘遏水勞擾百姓策免其官遣太尉義陽王望率大軍徵之以備非常又敕鎮東將軍琅邪王胄自下邳會壽春苞用掾孫鑠計放兵步出住都亭待罪帝聞之意解及苞詣闕以公還第苞自恥受任無效而無怨色時鄴奚官督郭廙上書理苞帝詔曰前大司馬苞忠允清亮才經世務幹用之績所歷可紀宜掌教典以讚時政其以苞為司徒有司奏苞前有折撓不堪其任以公還第已為弘厚不宜擢用詔曰吳人輕脆終無能為故疆埸之事但欲完固守備使不得越逸而已以苞計畫不同慮敵過甚故徵還更授昔鄧禹撓於關中而終輔漢室豈以一眚而掩大德哉於是就位苞奏州郡農桑未有賞罰之制宜遣掾屬循行皆當均其土宜舉其殿最然後黜陟焉詔曰農殖者為政之本有國之大務也雖欲安時興化不先富而教之其道無由而至今四海多事軍國用廣加承征伐之後屢有水旱之事倉庫不充百姓無積古者稼穡樹藝司徒掌之今雖登論道然經國立政惟時所急故陶唐之世稷官為重今司徒位當其任乃心王事有毀家紓國乾乾匪躬之志其使司徒督察州郡播殖將委事任成垂拱仰辦若宜有所循行者其增置掾屬十人聽取王官更練事業者苞在位稱為忠勤帝每委任焉泰始八年薨帝發哀於朝堂賜祕器朝服一具衣一襲錢三十萬布百匹及葬給節幢麾曲蓋追鋒車鼓吹介士大車皆如魏司空陳泰故事車駕臨送於東掖門外策諡曰武咸寧初詔苞等並為王功列於銘饗苞豫為終制曰延陵薄葬孔子以為達禮華元厚葬春秋以為不臣古之明義也自今死亡者皆斂以時服不得兼重又不得飯唅為愚俗所為又不得設牀帳明器也定窆之後復土滿坎一不得起墳種樹昔王孫裸葬矯時其子奉命君子不譏況於合禮典者耶諸子皆奉遵遺令又斷親戚故吏設祭有六子越喬統浚俊崇以統為嗣統字弘緒歷位射聲校尉大鴻臚子順為尚書郎越字弘倫早卒喬字弘祖歷尚書郎散騎侍郎帝既召喬不得深疑苞反及苞至有慚色謂之曰卿子幾破卿門苞遂廢之終身不聽仕又以有穢行徙頓丘與弟崇同被害二子超熙亡走得免成都王穎之起義也以超為折衝將軍討孫秀以功封侯又為振武將軍征荊州賊李辰穎與長沙王乂相攻超常為前鋒遷中護軍陳眕等挾惠帝北伐超走還鄴穎使超距帝於蕩陰王師敗績超逼帝幸鄴宮會王浚攻穎於鄴穎以超為右將軍以距浚大敗而歸從駕之洛陽西遷長安河間王顒以超領北中郎將使與穎共距東海王越超於滎陽募兵右將軍王闡與典兵中郎趙則並受超節度為豫州刺史劉喬繼援范陽王虓逆擊斬超而熙得走免永嘉中為太傅越參軍浚字景倫清儉有鑒識敬愛人物位至黃門侍郎為當世名士早卒俊字彥倫少有名譽議者稱為令器官至陽平太守早卒崇字季倫生於青州故小名齊奴少敏惠勇而有謀苞臨終分財物與諸子獨不及崇其母以為言苞曰此兒雖小後自能得年二十餘為修武令有能名入為散騎郎遷城陽太守伐吳有功封安陽鄉侯在郡雖有職務好學不倦以疾自解頃之拜黃門郎兄統忤扶風王駿有司承旨奏統將加重罰既而見原以崇不詣闕謝恩有司欲復加統罪崇自表曰臣兄統以先父之恩早被優遇出入清顯歷位盡勤伏度聖心有以垂察近為扶風王駿橫所誣謗司隸中丞等飛筆重奏劾案深文纍塵天聽臣兄弟局蹐憂心如悸駿戚屬尊重權要赫奕內外有司望風承旨苟有所惡易於投卵自統枉劾以來臣兄弟不敢一言稍自申理戢舌鉗口惟須刑書古人稱榮華於順旨枯稿於逆違誠哉斯言於今信矣是以雖董司直繩不能不深其文抱枉含謗不得不輸其理幸賴陛下天聽四達靈鑒昭遠存先父勳德之重察臣等勉勵之志中詔申料罪譴澄雪臣等刻肌碎首未足上報臣即以今月十四日與兄統浚等詣公車門拜表謝恩伏度奏御之日暫經天聽此月二十日忽被蘭臺禁止符以統蒙宥恩出非常臣晏然私門曾不陳謝復見彈奏訕辱理盡臣始聞此惶懼狼狽靜而思之固無怪也苟尊勢所驅何所不至望奉法之直繩不可得也臣以凡才纍荷顯重不能負載析薪以答萬分一月之中奏劾頻加曲之與直非臣所計所愧不能承奉戚屬自陷於此不媚於竈實愧王孫隨巢子稱明君之德察情為上察事次之所懷具經聖聽伏待罪黜無所多言由是事解纍遷散騎常侍侍中武帝以崇功臣子有幹局深器重之元康初楊駿輔政大開封賞多樹黨援崇與散騎郎蜀郡何攀共立議奏於惠帝曰陛下聖德光被皇靈啓祚正位東宮二十餘年道化宣流萬國歸心今承洪基此乃天授至於班賞行爵優於泰始革命之初不安一也吳會僭逆幾於百年邊境被其荼毒朝廷為之旰食先帝決獨斷之聰奮神武之略蕩滅逋寇易於摧枯然謀臣猛將猶有致思竭力之效而今恩澤之封優於滅吳之功不安二也上天眷祐實在大晉卜世之數未知其紀今之開制當垂于後若尊卑無差有爵必進數世之後莫非公侯不安三也臣等敢冒陳聞竊謂泰始之初及平吳論功制度名牒皆悉具存縱不能遠遵古典尚當依準舊事書奏弗納出為南中郎將荊州刺史領南蠻校尉加鷹揚將軍崇在南中得鴆鳥雛以與後軍將軍王愷時制鴆鳥不得過江為司隸校尉傅祗所糾詔原之燒鴆於都街崇穎悟有才氣而任俠無行檢在荊州劫遠使商客致富不資徵為大司農以徵書未至擅去官免頃之拜太僕出為征虜將軍假節監徐州諸軍事鎮下邳崇有別館在河陽之金谷一名梓澤送者傾都帳飲於此焉至鎮與徐州刺史高誕爭酒相侮為軍司所奏免官復拜衛尉與潘嶽諂事賈謐謐與之親善號曰二十四友廣城君每出崇降車路左望塵而拜其卑佞如此財産豐積室宇宏麗後房百數皆曳紈繡珥金翠絲竹盡當時之選庖膳窮水陸之珍與貴戚王愷羊琇之徒以奢靡相尚愷以腿澳釜崇以蠟代薪愷作紫絲布步障四十里崇作錦步障五十里以敵之崇塗屋以椒愷用赤石脂崇愷爭豪如此武帝每助愷嘗以珊瑚樹賜之高二尺許枝柯扶疏世所罕比愷以示崇崇便以鐵如意擊之應手而碎愷既惋惜又以為嫉己之寶聲色方厲崇曰不足多恨今還卿乃命左右悉取珊瑚樹有高三四尺者六七株條幹絶俗光彩曜日如愷比者甚衆愷恍然自失矣崇為客作豆粥咄嗟便辦每冬得韭嘗與愷出遊爭入洛城崇牛迅若飛禽愷絶不能及愷每以此三事為恨乃密貨崇帳下問其所以答云豆至難煮豫作熟末客來但作白粥以投之耳韭是搗韭根雜以麥苗耳牛奔不遲良由馭者逐不及反制之可聽蹁轅則駃矣於是悉從之遂爭長焉崇後知之因殺所告者嘗與王敦入太學見顏回原憲之象顧而歎曰若與之同升孔堂去人何必有間敦曰不知餘人云何子貢去卿差近崇正色曰士當身名俱泰何至甕哉其立意類此劉輿兄弟少時為王愷所嫉愷召之宿因欲坑之崇素與輿等善聞當有變夜馳詣愷問二劉所在愷迫卒不得隱崇徑進於後齋索出同車而去語曰年少何以輕就人宿輿深德之及賈謐誅崇以黨與免官時趙王倫專權崇甥歐陽建與倫有隙崇有妓曰緑珠美而豔善吹笛孫秀使人求之崇時在金谷別館方登涼臺臨清流婦人侍側使者以告崇盡出其婢妾數十人以示之皆蘊蘭麝被羅縠曰在所擇使者曰君侯服御麗則麗矣然本受命指索緑珠不識孰是崇勃然曰緑珠吾所愛不可得也使者曰君侯博古通今察遠照邇願加三思崇曰不然使者出而又反崇竟不許秀怒乃勸倫誅崇建崇建亦潛知其計乃與黃門郎潘嶽陰勸淮南王允齊王冏以圖倫秀秀覺之遂矯詔收崇及潘嶽歐陽建等崇正宴於樓上介士到門崇謂緑珠曰我今為爾得罪緑珠泣曰當效死於官前因自投于樓下而死崇曰吾不過流徙交廣耳及車載詣東市崇乃歎曰奴輩利吾家財收者答曰知財致害何不早散之崇不能答崇母兄妻子無少長皆被害死者十五人崇時年五十二初崇家稻米飯在地經宿皆化為螺時人以為族滅之應有司簿閲崇水碓三十餘區蒼頭八百餘人他珍寶貨賄田宅稱是及惠帝復阼詔以卿禮葬之封崇從孫演為樂陵公苞曾孫朴字玄真為人謹厚無他材藝沒於胡石勒以與朴同姓俱出河北引朴為宗室特加優寵位至司徒歐陽建字堅石世為冀方右族雅有理思才藻美贍擅名北州時人為之語曰渤海赫赫歐陽堅石辟公府歷山陽令尚書郎馮翊太守甚得時譽及遇禍莫不悼惜之年三十餘臨命作詩文甚哀楚孫鑠字巨鄴河內懷人也少樂為縣吏太守吳奮轉以為主簿鑠自微賤登綱紀時僚大姓猶不與鑠同坐奮大怒遂薦鑠為司隸都官從事司隸校尉劉訥甚知賞之時奮又薦鑠於大司馬石苞苞辟為掾鑠將應命行達許昌會臺已密遣輕軍襲苞于時汝陰王鎮許鑠過謁之王先識鑠以鄉里之情私告鑠曰無與禍鑠既出即馳詣壽春為苞畫計苞賴而獲免遷尚書郎在職駁議十有餘事為當時所稱史臣曰若夫經為帝師鄭沖於焉無愧孝為德本王祥所以當仁何曾善其親而及其親之黨者也夏禹恭儉殷因損益牲牢服用各有品章諸侯不牛命士不豕禦而驕奢其關乎治政乘時立制莫不由之石崇學乃多聞情乖寡悔超四豪而取富喻五侯而競爽春畦冰文靡列於凝沍之晨錦障逶迤亙以山川之外撞鐘舞女流宕忘歸至於金谷含悲吹樓將墜所謂高蟬處乎輕陰不知螳蜋襲其後也贊曰鄭沖含素王祥遲暮百行斯融雙飛天路何石殊操芳標奇帝風流靡崇心載馳矜奢不極寇害成資邦分身墜樂往哀隨
