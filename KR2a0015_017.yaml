body:
  text: 晉書卷十七志第七律曆中昔者聖人擬宸極以運璿璣揆天行而序景曜分辰野辨躔曆敬農時興物利皆以繫順兩儀紀綱萬物者也然則觀象設卦扐閏成爻曆數之原存乎此也逮乎炎帝分八節以始農功軒轅紀三綱而闡書契乃使羲和占日常儀占月臾區占星氣伶倫造律呂大撓造甲子隸首作算數容成綜斯六術考定氣象建五行察發斂起消息正閏餘述而著焉謂之調曆洎于少昊則鳳鳥司曆顓頊則南正司天陶唐則分命羲和虞舜則因循堯法及夏殷承運周氏應期正朔既殊創法斯異傳曰火出於夏為三月於商為四月於周為五月是故天子置日官諸侯有日御以和萬國以協三辰至乎寒暑晦明之徵陰陽生殺之數啓閉升降之紀消息盈虛之節皆應躔次而無淫流故能該浹生靈堪輿天地周德既衰史官失職疇人分散禨祥不理秦并天下頗推五勝自以獲水德之瑞用十月為正漢氏初興多所未暇百有餘載襲秦正朔爰及武帝始詔司馬遷等議造漢曆乃行夏正其後劉歆更造三統以說左傳辨而非實班固惑之采以為志逮光武中興太僕朱浮數言曆有乖謬于時天下初定未能詳考至永平之末改行四分七十餘年儀式乃備及光和中乃命劉洪蔡雍共修律曆其後司馬彪因之以繼班史今采魏文黃初已後言曆數行事者以續司馬彪云漢靈帝時會稽東部尉劉洪考史官自古迄今曆注原其進退之行察其出入之驗視其往來度其終始始悟四分於天疏闊皆斗分太多故也更以五百八十九為紀法百四十五為斗分作乾象法冬至日日在斗二十二度以術追日月五星之行推而上則合於古引而下則應於今其為之也依易立數遁行相號潛處相求名為乾象曆又創制日行遲速兼考月行陰陽交錯於黃道表𩹉日行黃道於赤道宿度復有進退方於前法轉為精密矣獻帝建安元年鄭玄受其法以為窮幽極微又加注釋焉魏文帝黃初中太史令高堂隆復詳議曆數更有改革太史丞韓翊以為乾象減斗分太過後當先天造黃初曆以四千八百八十三為紀法千二百五為斗分其後尚書令陳羣奏以為曆數難明前代通儒多共紛爭黃初之元以四分曆久遠疏闊大魏受命宜改曆明時韓翊首建猶恐不審故以乾象互相參校其所校日月行度弦望朔晦歷三年更相是非無時而決案三公議皆綜盡典理殊塗同歸欲使效之璿璣各盡其法一年之間得失足定奏可太史令許芝云劉洪月行術用以來且四十餘年以復覺失一辰有奇孫欽議史遷造太初其後劉歆以為疏復為三統章和中改為四分以儀天度考合符應時有差跌日蝕覺過半日至熹平中劉洪改為乾象推天七曜之符與天地合其董巴議云聖人迹太陽於晷景效太陰於弦望明五星於見伏正是非於晦朔弦望伏見者曆數之綱紀檢驗之明者也徐嶽議劉洪以曆後天潛精內思二十餘載參校漢家太初三統四分曆術課弦望於兩儀郭間而月行九歲一終謂之九道九章百七十一歲九道小終九九八十一章五百六十七分而九終進退牛前四度五分學者務追合四分但減一道六十三分分不下通是以疏闊皆由斗分多故也課弦望當以昏明度月所在則知加時先後之意不宜用兩儀郭間洪加太初元十二紀減十斗下分元起己丑又為月行遲疾交會及黃道去極度五星術理實粹密信可長行今韓翊所造皆用洪法小益斗下分所錯無幾翊所增減致亦留思然十術新立猶未就悉至於日蝕有不盡效效曆之要要在日蝕熹平之際時洪為郎欲改四分先上驗日蝕日蝕在晏加時在辰蝕從下上三分侵二事御之後如洪言海內識真莫不聞見劉歆以來未有洪比夫以黃初二年六月二十九日戊辰加時未日蝕乾象術加時申半強於消息就加未黃初以為加辛強乾象後天一辰半強為近黃初二辰半為遠消息與天近三年正月丙寅朔加時申北日蝕黃初加酉弱乾象加午少消息加未黃初後天半辰近乾象先天二辰少弱於消息先天一辰強為遠天三年十一月二十九日庚申加時西南維日蝕乾象加未初消息加申黃初加未強乾象先天一辰遠黃初先天半辰近消息乾象近中天二年七月十五日癸未日加壬月加丙蝕乾象月加申消息加未黃初月加子強入甲申日乾象後天二辰消息後一辰為近黃初後天六辰遠三年十一月十五日乙巳日加丑月加未蝕乾象月加巳半於消息加午黃初以丙午月加酉強乾象先天二辰近黃初後天二辰強為遠於消息於乾象先一辰凡課日月蝕五事乾象四遠黃初一近翊於課難徐嶽乾象消息但可減不可加加之無可說不可用嶽云本術自有消息受師法以消息為奇辭不能改故列之正法消息翊術自疏木以三年五月二十四日丁亥晨見黃初五月十七日庚辰見先七日乾象五月十五日戊寅見先九日土以二年十一月二十六日壬辰見乾象十一月二十一日丁亥見先五日黃初十一月十八日甲申見先八日土以三年十月十一日壬申伏乾象同壬申伏黃初已下十月七日戊辰伏先四日土以三年十一月二十二日壬子見乾象十一月十五日乙巳見先七日黃初十一月十二日壬寅見先十日金以三年閏六月十五日丁丑晨伏乾象六月二十五日戊午伏先十九日黃初六月二十二日乙卯伏先二十三日金以三年九月十一日壬寅見乾象以八月十八日庚辰見先二十三日黃初八月十五日丁丑見先二十五日水以二年十一月十七日癸未晨見乾象十一月十三日己卯見先四日黃初十一月十二日戊寅見先五日水以二年十二月十三日己酉晨伏乾象十二月十五日辛亥伏後二日黃初十二月十四日庚戌伏後一日水以三年五月十八日辛巳夕見乾象亦以五月十八日見黃初五月十七日庚辰見先一日水以三年六月十三日丙午伏乾象六月二十日癸丑伏後七日黃初六月十九日壬子伏後六日水以三年閏六月二十五日丁亥晨見乾象以閏月九日辛未見先十六日黃初閏月八日庚午見先十七日水以三年七月七日己亥伏乾象七月十一日癸卯伏後四日黃初以七月十日壬寅伏後三日水以三年十一月日於晷度十四日甲辰伏乾象以十一月九日己亥伏先五日黃初十一月八日戊戌伏先六日水以三年十二月二十八日戊子夕見二曆同以十二月壬申見俱先十六日凡四星見伏十五乾象七近二中黃初五近一中郎中李恩議以太史天度與相覆校二年七月三年十一月望與天度日皆差異月蝕加時乃後天六時半非從三度之謂定為後天過半日也董巴議曰昔伏羲始造八卦作三畫以象二十四氣黃帝因之初作調曆歷代十一更年五千凡有七曆顓頊以今之孟春正月為元其時正月朔旦立春五星會于天廟營室也冰凍始泮蟄蟲始發雞始三號天曰作時地曰作昌人曰作樂鳥獸萬物莫不應和故顓頊聖人為曆宗也湯作殷曆弗復以正月朔旦立春為節也更以十一月朔旦冬至為元首下至周魯及漢皆從其節據正四時夏為得天以承堯舜從顓頊故也禮記大戴曰虞夏之曆建正於孟春此之謂也楊偉請六十日中疏密可知不待十年若不從法是校方員棄規矩考輕重背權衡課長短廢尺寸論是非違分理若不先定校曆之本法而懸聽棄法之末爭則孟軻所謂方寸之基可使高於岑樓者也今韓翊據劉洪術者知貴其術珍其法而棄其論背其術廢其言違其事是非必使洪奇妙之式不傳來世若知而違之是挾故而背師也若不知而據之是為挾不知而罔知也校議未定會帝崩而寢至明帝景初元年尚書郎楊偉造景初曆表上帝遂改正朔施行偉曆以建丑之月為正改其年三月為孟夏其孟仲季月雖與夏正不同至於郊祀搜狩班宣時令皆以建寅為正三年正月帝崩復用夏正其劉氏在蜀仍漢四分曆吳中書令闞澤受劉洪乾象法於東萊徐嶽又加解注中常侍王蕃以洪術精妙用推渾天之理以制儀象及論故孫氏用乾象曆至吳亡武帝踐阼泰始元年因魏之景初曆改名泰始曆楊偉推五星尤疏闊故元帝渡江左以後更以乾象五星法代偉曆自黃初已後改作曆術皆斟酌乾象所減斗分朔餘月行陰陽遲疾以求折衷洪術為後代推步之師表故先列之云乾象曆上元己丑以來至建安十一年丙戍歲積七千三百七十八年乾法千一百七十八會通七千一百七十一紀法五百八十九周天二十一萬五千一百三十通法四萬三千二十六通數三十一日法千四百五十七歲中十二餘數三千九十章歲十九沒法百三章閏七會數四十七會歲八百九十三章月二百三十五會率千八百八十二朔望合數九百四十一會月萬一千四十五紀月七千二百八十五元月一萬四千五百七十月周七千八百七十四小周二百五十四推入紀置上元盡所求年以乾法除之不滿乾法以紀法除之餘不滿紀法者入內紀甲子年也滿法去之入外紀甲午年也推朔置入紀年外所求以章月乘之章歲而一所得為定積月不盡為閏餘閏餘十二以上歲月閏以通法乘定積月為假積日滿日法為定積日不盡為小餘以六旬去積日為大餘命以所入紀算外所求年天正十一月朔日也求次月加大餘二十九小餘七百七十三小餘滿日法從大餘小餘六百八十四已上其月大推冬至置入紀年外所求以餘數乘之滿紀法為大餘不盡為小餘以六旬去之命以紀算外天正冬至日也求二十四氣置冬至小餘加大餘十五小餘五百一十五滿二千三百五十六從大餘命如法推閏月以閏餘減章歲餘以歲中乘之滿章閏為一月不盡半法已上亦一有進退以無中月推弦望加大餘七小餘五百五十七半小餘如日法從大餘餘命如前得上弦又加得望又加得下弦又加得後月朔其弦望定小餘四百一以下以百刻乘之滿日法得一刻不盡什之求分以課所近節氣夜漏未盡以算上為日推沒置入紀年外所求以餘數乘之滿紀法為積沒有餘加盡積為一以會通乘之滿沒法為大餘不盡為小餘大餘命以紀算外冬至後沒日求次沒加大餘六十九小餘六十四滿其法從大餘無分為滅推日度以紀法乘積日滿周天去之餘以紀法除之所得為度命度以牛前五度起宿次除之不滿宿即天正朔夜半日所在求次日加一度經斗除分分少損一度為紀法加焉推月度以月周乘積日滿周天去之餘滿紀法為度不盡為分命如上則天正朔夜半月所在度求次月小月加度二十二分二百五十八大月又加一日度十三分二百一十七滿法得一度其冬下旬月在張心署之推合朔度以章歲乘朔小餘滿會數為大分不盡小分以大分從朔夜半日分滿紀法從度命如前天正合朔日月所共會也求次月加度二十九大分三百一十二小分二十五小分滿會數從大分大分滿紀法後度經斗除大分求弦望日所在度加合朔度七分二百二十五小分十七半大小分及度命如前則上弦日所在度又加得望下弦後月合求弦望月行所在度加合朔度九十八大分四百八小分四十一大小分及度命如前合朔則上弦月所在又加得望下弦後月合求日月昏明度日以紀法月以月周乘所近節氣夜漏二百而一為明分日以減紀法月以減月周餘為昏分各以加夜半如法為度推月蝕置上元年外所求以會歲去之其餘年以會率乘之如會歲為積蝕有餘加積一會月乘之如會率為積月不盡為月餘以章閏乘餘年滿章歲為積閏以減積月餘以歲中去之不盡數起天正求次蝕加五月月餘千六百三十五滿會率得一月月以望推卦用事日因冬至大餘倍其小餘坎用事日也加小餘千七十五滿乾法從大餘中孚用事日也求次卦各加大餘六小餘百三其四正各因其中日而倍其小餘推五行用事置冬至大小餘加大餘二十七小餘九百二十七滿二千三百五十六從大餘得土用事日也加大餘十八小餘六百一十八得立春木用事日加大餘七十三小餘百一十六復得土又加土如得其火金水放此推加時以十二乘小餘滿其法得一辰數從子起算外朔弦望以定小餘推漏刻以百乘小餘滿其法得一刻不盡什之求分課所近節氣起夜分盡夜上水未盡以所近言之推有進退進加退減所得也進退有差起二分度後率四度轉增少少每半者三而轉之差滿三止歷五度而減如初月行三道術月行遲疾周進有會數從天地凡數乘餘率自乘如會數而一為過周分以從周天月周除之曆日數也遲疾有衰其變者勢也以衰減加月行率為日轉度分衰左右相加為損益率益轉相益損轉相損盈縮積也半小周乘通法如通數而一以曆周減焉為朔行分也日轉度分列衰損益率盈縮積月行分一日十四度十分一退減益二十二盈初二百七十六二日十四度九分二退減益二十一盈二十二二百七十五三日十四度七分三退減益十九盈四十三二百七十三四日十四度四分四退減益十六盈六十二二百七十五日十四度四退減益十二盈七十八二百六十六六日十三度十五分四退減益八盈九十二百六十二七日十三度十一分四退減益四盈九十八二百五十八八日十三度七分四退減損盈百二二百五十四九日十三度三分四退加損四盈百二二百五十十日十二度十八分三退加損八盈九十八二百四十六十一日十二度十五分四退加損十一盈九十二百四十三十二日十二度十一分三退加損十五盈七十九二百三十九十三日十二度八分二退加損十八盈六十四二百三十六十四日十二度六分一退加損二十盈四十六二百三十四十五日十二度五分一進減損二十一盈二十六二百三十三十六日十二度六分二進減損二十損不足反減五為益盈盈五縮初二百三十四有五謂益而損縮初二十故不足十七日十二度八分三進減益十八縮十五二百三十六十八日十二度十一分四進減益十五縮二十三二百三十九十九日十二度十五分三進減益十一縮四十八二百四十三二十日十二度十八分四進減益八縮五十九二百四十六二十一日十三度三分四進減益四縮六十七二百五十二十二日十三度七分四進加損縮七十一二百五十四二十三日十三度十一分四進加損四縮七十一二百五十八二十四日十三度十五分四進加損八縮六十七二百六十二二十五日十四度四進加損十二縮五十九二百六十六二十六日十四度四分三進加損十六縮四十七二百七十二十七日十四度七分三曆初進加三大損十九縮三十一二百七十三周日周日十四度九分少進加損二十一縮十二二百七十五周日分三千三百三周虛二千六百六十六周日法五千九百六十九通周十八萬五千三十九曆周十六萬四千四百六十六少大法一千一百一朔行大分萬一千八百一小分二十五周半一百二十七推合朔入曆以上元積月乘朔行大小分小分滿通數三十一從大分大分滿曆周去之餘滿周法得一日不盡為日餘日餘命算外所求合朔入曆也求次月加一日日餘五千八百三十二小分二十五求弦望各加七日日餘二千二百八十三小分二十九半分各如法成日日滿二十七日去之餘如周分不足除減一日加周虛求弦望定大小餘置所入曆盈縮積以通周乘之為實令通數乘日餘分以乘損益率以損益實為加時盈縮也章歲減月行分乘周半為差法以除之所得盈減縮加大小餘如日法盈不足朔加時在前後日弦望進退大餘為定小餘求朔弦望加時定度以章歲乘加時盛縮差法除之所得滿會數為盈縮大小分以盈減縮加本日月所在盈不足以紀法進退度為日月所在定度分推月行夜半入曆以周半乘朔小餘如通數而一以減入曆日餘餘不足加周法而減焉却一日却得周日加其分即得夜半入曆求次日轉一日因日餘到二十七日日餘滿周日分去之不直周日也其不滿直之加周虛於餘餘皆次日入曆日餘也求月夜半定度以夜半入曆日餘乘損益率如周法得一不盡為餘以損益盈縮積餘無所損破全為法損之為夜半盈縮也滿章歲為度不盡為分通數乘分及餘餘如周法從分分滿紀法從度以盈加縮減本夜半度及餘為定度求變衰法以入曆日餘乘列衰如周法得一不盡為餘即各知其日變衰也求次曆以周虛乘列衰如周法為常數曆竟輒以加變衰滿列衰去之轉為次曆變衰也求次日夜半定度以變衰進加退減曆日轉分分盈不足章歲出入度也通數乘分及餘而日轉加夜定度為次日也竟曆不直周日減餘千三十八乃以通數乘之直周日者加餘八百三十七又以少大分八百九十九加次曆變衰轉求如前求次日夜半盈縮以變衰減加損益率為變損益率而以轉損益夜半盈縮曆竟損不足反減為入次曆減加餘如上數求昏明月度以曆月行分乘所近節氣夜漏二百而一為明分以減月行分為昏分分如章歲為度以通數乘分以加夜半定度為昏明定度餘分半法以上成不滿廢之求月行遲疾月經四表出入三道交錯分天以月率除之為曆之日周天乘朔望合如會月而一朔合分也通數乘合數餘如會數而一退分也以從月周為日進分會數而一為差率也陰陽曆衰損益率兼數一日一減益十七初二日限餘千二百九十微分四百一減益十六十七五十七此為前限三日三減益十五三十三四日四減益十二四十八五日四減益八六十六日三減益四六十八七日三減減不足反損為加謂益有益一七十二一當減三為不足八日四加損二過極損之謂月行半周七十三度已過極則當損之九日四加損六七十一十日三加損十六十五十一日二加損十三五十五十二日一加損十五四十二十三日限餘三千九百一十二微一加曆初大分日損十六二十七分一千七百五十二此為後限分日五千二百而三少加少者損十六大十一少大法四百七十三曆周十萬七千五百六十五差率萬一千九百八十六朔合分萬八千三百二十八微分九百一十四微分法二千二百九推朔入陰陽曆以會月去上元積月餘以朔合分及微分各乘之微分滿其法從合分合分滿周天去之其餘不滿曆周者為入陽曆滿去之餘為入陰曆餘皆如月周得一日算外所求月合朔入曆不盡為日餘求次月加二日日餘二千五百八十微分九百一十四如法成日滿十三去之除餘如分日陰陽曆竟互入端入曆在前限餘前後限餘後者月行中道也求朔望定數各置入遲疾曆盈縮大小分會數乘小分為微分盈減縮加陰陽日餘日餘盈不足進退日而定以定日餘乘損益率如月周得一以損益兼數為加時定數推夜半入曆以差率乘朔小餘如微分法得一以減入曆日餘不足加月周而減之却一日却得分日加其分以會數約微分為小分即朔日夜半入曆求次日加一日日餘三十一小分三十一小分如會數從餘餘滿月周去之又加一日曆竟下日餘滿分日去之為入曆初也不滿分日者直之加餘二千七百二小分三十一為入次曆求夜半定日以通數乘入遲疾曆夜半盈縮及餘餘滿周半為小分以盈加縮減入陰陽日餘日餘盈不足以月周進退日而定也以定日餘乘損益率如月周得一以損益兼數為夜半定數也求昏明數以損益率乘所近節氣夜漏二百而一為明以減損益率為昏而以損益夜半數為昏明定數求月去極度置加時若昏明定數以十二除之為度其餘三而一為少不盡一為強二少弱也所得為月去黃道度也其陽曆以加日所在黃道曆去極度陰曆以減之則月去極度強正弱負強弱相并同名相從異名相消其相減也同名相消異名相從無對互之二強進少而弱上元己丑以來至建安十一年丙戌歲積七千三百七十八己丑戊寅丁卯丙辰乙巳甲午癸未壬申辛酉庚戌己亥戊子丁丑丙寅推五星五行木歲星火熒惑土填星金太白水辰星各以終日與天度相約為周率日率章歲乘周為月法章月乘日為月分分如法為月數通數乘月法日度法也斗分乘周率為斗分日度法用紀法乘周率故此同以分乘之五星朔大餘小餘以通法各乘月數日法各除之為大餘不盡為小餘以六十去大餘五星入月日日餘各以通法乘月餘以合月法乘朔小餘并之會數約之所得各以日度法除之則皆是五星度數度餘減多為度餘分以周天乘之以日度法約之所得為度不盡為度餘過周天去之及斗分紀月七千二百八十五章閏七章月二百三十五歲中十二通法四萬三千二十六日法千四百五十七會數四十七周天二十一萬五千一百三十斗分一百四十五木周率六千七百二十二日率七千三百四十一合月數十三月餘六萬四千八百一合月法十二萬七千七百一十八日度法三百九十五萬九千二百五十八朔大餘二十三朔小餘一千三百七入月日十五日餘三百四十八萬四千六百四十六朔虛分一百五十斗分九十七萬四千六百九十度數三十三度餘二百五十萬九千九百五十六火周率三千四百七日率七千二百七十一合月數二十六月餘二萬五千六百二十七合月法六萬四千七百三十三日度法二百萬六千七百二十三朔大餘四十七朔小餘一千一百五十七入月日十二日餘九十七萬三千一十三朔虛分三百斗分四十九萬四千一十五度數四十八度餘一百九十九萬一千七百六土周率三千五百二十九日率三千六百五十三合月數十二月餘五萬三千八百四十三合月法六萬七千五十一日度法二百七萬八千五百八十一朔大餘五十四朔小餘五百三十四入月日二十四日餘十六萬六千二百七十二朔虛分九百二十三斗分五十一萬一千七百五度數十二度餘一百七十三萬三千一百四十八金周率九千二十二日率七千二百一十三合月數九月餘十五萬二千二百九十三合月法十七萬一千四百一十八日度法五百三十一萬三千九百五十八朔大餘二十五朔小餘一千一百二十九入月日二十七日餘五萬六千九百五十四朔虛分三百二十八斗分一百三十萬八千一百九十度數二百九十二度餘五萬六千九百五十四水周率一萬一千五百六十一日率一千八百三十四合月數一月餘二十一萬一千三百三十一合月法二十一萬九千六百五十九日度法六百八十萬九千四百二十九朔大餘二十九朔小餘七百七十三入月日二十八日餘六百四十一萬九百六十七朔虛分六百八十四斗分一百六十七萬六千三百四十五度數五十七度餘六百四十一萬九百六十七推五星置上元盡所求年以周率乘之滿日率得一名積合不盡為合餘以周率除之得一星合往年二合前往年無所得合其年合餘減周率為度分金水積合奇為晨耦為夕推星合月以月數月餘各乘積合滿合月法從月不盡為月餘以紀月去積月餘為入紀月副以章閏乘之滿章月得一閏以減入紀月餘以歲中去之命以天正算外合月也其在閏交際以朔御之推入月日以通法乘月餘合月法乘朔小餘并以會數約之所得滿日度法得一則星合入月日也不滿為日餘命以朔算外推星合度以周天乘度分滿日度法得一度不盡為餘命度以牛前五起右求星合求後合月以月數加月數以月餘加月餘滿合月法得一月不滿歲中即合其年滿去之有閏計焉餘為後年再滿在後二年金水加晨得夕加夕得晨求後合朔日以朔大小餘加合月大小餘上成月者又加大餘二十九小餘七百七十三小餘滿日法從大餘命如前求後入月日術以入月日日餘加合入月日及餘餘滿日度法得一日其前合朔小餘滿其虛分者減一日後小餘滿七百七十三以上者去二十九日不滿去三十日其餘則後合入月日也求後度以度加度度餘加度餘滿日度法得一度木伏三十二日三百四十八萬四千六百四十六分見三百六十六日伏行五度二百五十萬九千九百五十六分見行四十度除逆退十二度定行二十八度火伏百四十三日九十七萬三千一十三分見六百三十六日伏行一百一十度四十七萬八千九百九十八分見行三百二十度除逆十七度定行三百三度土伏三十三日十六萬六千二百七十二分見三百四十五日伏行三度一百七十三萬三千一百四十八分見行十五度除逆六度定行九度金晨伏東方八十二日十一萬三千九百八分見西方二百四十六日除逆六度定行二百四十六度晨伏行百度十一萬三千九百八分見東方日度如西伏十日退八度水晨伏三十三日六百一萬二千五百五分見西方三十二日除逆一度定行三十二度伏行六十五度六百一萬二千五百五分見東方日度如西伏十八日退十四度五星曆步術以法伏日度及餘加星合日度餘餘滿日度法得一從全命之如前得星見日及度也以星行分母乘見度餘如日度法得一分不盡半法以上亦得一而日加所行分分滿其母得一度逆順母不同以當行之母乘故分如故母而一當行分也留者承前逆則減之伏不盡度經斗除分以行母為率分有損益前後相御凡言如盈約滿皆求實之除也去及除之取盡之除也木晨與日合伏順十六日百七十四萬二千三百二十三分行星二度三百二十三萬四千六百七分而晨見東方在日後順疾日行五十八分之十一五十八日行十一度更順遲日行九分五十八日行九度留不行二十五日而旋逆日行七分之一八十四日退十二度復留二十五日而順日行五十八分之九五十八日行九度順疾日行十一分五十八日行十一度在日前夕伏西方十六日百七十四萬二千三百二十三分行星二度三百二十三萬四千六百七分而與日合凡一終三百九十八日三百四十八萬四千六百四十六分行星四十三度二百五十萬九千九百五十六分火晨與日合伏順七十一日百四十八萬九千八百六十八分行星五十五度百二十四萬二千八百六十分半而晨見東方在日後順日行二十三分之十四百八十四日行一百一十二度更順遲日行二十三分之十二九十二日行四十八度留不行十一日旋逆日行六十二分之十七六十二日退十七度復留十一日而順日行十二分九十二日行四十八度復順疾日行十四分百八十四日行百一十二度在日前夕伏西方七十一日百四十八萬九千八百六十八分行星五十五度百二十四萬二千八百六十分半而與日合凡一終七百七十九日九十七萬三千一十三分行星四百一十四度四十七萬八千九百九十八分土晨與日合伏順十六日百一十二萬二千四百二十六分半行星一度百九十九萬五千八百六十四分半而晨見東方在日後順日行三十五分之三八十七日半行七度半留不行三十四日旋逆日行十七分之一百二日退六度復三十四日而順日行三分八十七日行七度半在日前夕伏西方十六日百一十二萬二千四百二十六分半行星一度百九十萬五千八百六十四分半而與日合也凡一終三百七十八日十六萬六千二百七十二分行星十二度百七十三萬三千一百四十八分金晨與日合伏逆五日退四度而晨見東方在日後逆日行五分度之三十日退六度留不行八日旋順遲日行四十六分之三十三四十六日行三十三度而順疾日行一度九十一分之十五九十一日行一百六度更順益疾日行一度九十一分之二十二九十一日行百一十三度在日後晨伏東方順四十一日五萬六千九百五十四分行星五十度五萬六千九百五十四分而與日合一合二百九十二日五萬六千九百五十四分行星亦如之金夕與日合伏順四十一日五萬六千九百五十四分行星五十度五萬九千九百五十四分而夕見西方在日前順疾日行一度九十一分之二十二九十一日行百一十三度更順減疾日行一度十五分九十一日行百六度而順遲日行四十六分之三十三四十六日行三十三度留不行八日施逆日行五分之三十日退六度在日前夕伏西方逆疾五日退四度而與日合凡再合一終五百八十四日十一萬三千九百八分行星亦如之水晨與日合伏逆九日退七度而晨見東方在日後更逆疾一日退一度留不行二日旋順遲日行九分之八九日行八度而順疾日行一度四分之一二十日行二十五度在日後晨伏東方順十六日六百四十一萬九百六十七分行星三十二度六百四十一萬九百六十七分而與日合一合五十七日六百四十一萬九百六十七分行星亦如之水夕與日合伏順十六日六百四十一萬九百六十七分行星三十二度六百四十一萬九百六十七分而夕見西方在日前順疾日行一度四分之一二十日行二十五度而順遲日行九分之八九日行八度留不行二日旋逆一日退一度在日前夕伏西方逆遲九日退七度與日合凡再合一終一百一十五日六百一萬二千五百五分行星亦如之
