body:
  text: 晉書卷一帝紀第一宣帝宣皇帝諱懿字仲達河內溫縣孝敬里人姓司馬氏其先出自帝高陽之子重黎為夏官祝融歷唐虞夏商世序其職及周以夏官為司馬其後程伯休父周宣王時以世官克平徐方錫以官族因而為氏楚漢間司馬卬為趙將與諸侯伐秦秦亡立為殷王都河內漢以其地為郡子孫遂家焉自卬八世生征西將軍鈞字叔平鈞生豫章太守量字公度量生潁川太守俊字元異俊生京兆尹防字建公帝即防之第二子也少有奇節聰朗多大略博學洽聞伏膺儒教漢末大亂常慨然有憂天下心南陽太守同郡楊俊名知人見帝未弱冠以為非常之器尚書清河崔琰與帝兄朗善亦謂朗曰君弟聰亮明允剛斷英特非子所及也漢建安六年郡舉上計掾魏武帝為司空聞而辟之帝知漢運方微不欲屈節曹氏辭以風痹不能起居魏武使人夜往密刺之帝堅臥不動及魏武為丞相又辟為文學掾敕行者曰若復盤桓便收之帝懼而就職於是使與太子游處遷黃門侍郎轉議郎丞相東曹屬尋轉主簿從討張魯言於魏武曰劉備以詐力虜劉璋蜀人未附而遠爭江陵此機不可失也今若曜威漢中益州震動進兵臨之勢必瓦解因此之勢易為功力聖人不能違時亦不失時矣魏武曰人苦無足既得隴右復欲得蜀言竟不從既而從討孫權破之軍還權遣使乞降上表稱臣陳說天命魏武帝曰此兒欲踞吾著爐炭上邪答曰漢運垂終殿下十分天下而有其九以服事之權之稱臣天人之意也虞夏殷周不以謙讓者畏天知命也魏國既建遷太子中庶子每與大謀輒有奇策為太子所信重與陳羣吳質朱鑠號曰四友遷為軍司馬言於魏武曰昔箕子陳謀以食為首今天下不耕者蓋二十餘萬非經國遠籌也雖戎甲未卷自宜且耕且守魏武納之於是務農積穀國用豐贍帝又言荊州刺史胡修粗暴南鄉太守傅方驕奢並不可居邊魏武不之察及蜀將關羽圍曹仁於樊于禁等七軍皆沒修方果降羽而仁圍甚急焉是時漢帝都許昌魏武以為近賊欲徙河北帝諫曰禁等為水所沒非戰守之所失於國家大計未有所損而便遷都既示敵以弱又淮沔之人大不安矣孫權劉備外親內疏羽之得意權所不願也可喻權所令掎其後則樊圍自解魏武從之權果遣將呂蒙西襲公安拔之羽遂為蒙所獲魏武以荊州遺黎及屯田在潁川者逼近南寇皆欲徙之帝曰荊楚輕脫易動難安關羽新破諸為惡者藏竄觀望今徙其善者既傷其意將令去者不敢復還從之其後諸亡者悉復業及魏武薨于洛陽朝野危懼帝綱紀喪事內外肅然乃奉梓宮還鄴魏文帝即位封河津亭侯轉丞相長史會孫權帥兵西過朝議以樊襄陽無穀不可以禦寇時曹仁鎮襄陽請召仁還宛帝曰孫權新破關羽此其欲自結之時也必不敢為患襄陽水陸之衝禦寇要害不可棄也言竟不從仁遂焚棄二城權果不為寇魏文悔之及魏受漢禪以帝為尚書頃之轉督軍御史中丞封安國鄉侯黃初二年督軍官罷遷侍中尚書右僕射五年天子南巡觀兵吳疆帝留鎮許昌改封向鄉侯轉撫軍假節領兵五千加給事中録尚書事帝固辭天子曰吾於庶事以夜繼晝無須臾寧息此非以為榮乃分憂耳六年天子復大興舟師征吳復命帝居守內鎮百姓外供軍資臨行詔曰吾深以後事為念故以委卿曹參雖有戰功而蕭何為重使吾無西顧之憂不亦可乎天子自廣陵還洛陽詔帝曰吾東撫軍當總西事吾西撫軍當總東事於是帝留鎮許昌及天子疾篤帝與曹真陳羣等見於崇華殿之南堂並受顧命輔政詔太子曰有間此三公者慎勿疑之明帝即位改封舞陽侯及孫權圍江夏遣其將諸葛瑾張霸并攻襄陽帝督諸軍討權走之進擊敗瑾斬霸并首級千餘遷驃騎將軍太和元年六月天子詔帝屯于宛加督荊豫二州諸軍事初蜀將孟達之降也魏朝遇之甚厚帝以達言行傾巧不可任驟諫不見聽乃以達領新城太守封侯假節達於是連吳固蜀潛圖中國蜀相諸葛亮惡其反覆又慮其為患達與魏興太守申儀有隙亮欲促其事乃遣郭模詐降過儀因漏泄其謀達聞其謀漏泄將舉兵帝恐達速發以書喻之曰將軍昔棄劉備託身國家國家委將軍以疆埸之任任將軍以圖蜀之事可謂心貫白日蜀人愚智莫不切齒於將軍諸葛亮欲相破惟苦無路耳模之所言非小事也亮豈輕之而令宣露此殆易知耳達得書大喜猶與不決帝乃潛軍進討諸將言達與二賊交構宜觀望而後動帝曰達無信義此其相疑之時也當及其未定促決之乃倍道兼行八日到其城下吳蜀各遣其將向西城安橋木闌塞以救達帝分諸將以距之初達與亮書曰宛去洛八百里去吾一千二百里聞吾舉事當表上天子比相反覆一月間也則吾城已固諸軍足辦則吾所在深險司馬公必不自來諸將來吾無患矣及兵到達又告亮曰吾舉事八日而兵至城下何其神速也上庸城三面阻水達於城外為木柵以自固帝渡水破其柵直造城下八道攻之旬有六日達甥鄧賢將李輔等開門出降斬達傳首京師俘獲萬餘人振旅還于宛乃勸農桑禁浮費南土悅附焉初申儀久在魏興專威疆埸輒承制刻印多所假授達既誅有自疑心時諸郡守以帝新克捷奉禮求賀皆聽之帝使人諷儀儀至問承制狀執之歸于京師又徙孟達餘衆七千餘家於幽州蜀將姚靜鄭他等帥其屬七千餘人來降時邊郡新附多無戶名魏朝欲加隱實屬帝朝於京師天子訪之於帝帝對曰賊以密網束下故下棄之宜弘以大綱則自然安樂又問二虜宜討何者為先對曰吳以中國不習水戰故敢散居東關凡攻敵必扼其喉而摏其心夏口東關賊之心喉若為陸軍以向皖城引權東下為水戰軍向夏口乘其虛而擊之此神兵從天而墮破之必矣天子並然之復命帝屯於宛四年遷大將軍加大都督假黃鉞與曹真伐蜀帝自西城斫山開道水陸並進泝沔而上至於朐拔其新豐縣軍次丹口遇雨班師明年諸葛亮寇天水圍將軍賈嗣魏平於祁山天子曰西方有事非君莫可付者乃使帝西屯長安都督雍梁二州諸軍事統車騎將軍張郃後將軍費曜征蜀護軍戴淩雍州刺史郭淮等討亮張郃勸帝分軍住雍郿為後鎮帝曰料前軍獨能當之者將軍言是也若不能當而分為前後此楚之三軍所以為黥布禽也遂進軍隃麋亮聞大軍且至乃自帥衆將芟上邽之麥諸將皆懼帝曰亮慮多決少必安營自固然後芟麥吾得二日兼行足矣於是卷甲晨夜赴之亮望塵而遁帝曰吾倍道疲勞此曉兵者之所貪也亮不敢據渭水此易與耳進次漢陽與亮相遇帝列陳以待之使將牛金輕騎餌之兵才接而亮退追至祁山亮屯鹵城據南北二山斷水為重圍帝攻拔其圍亮宵遁追擊破之俘斬萬計天子使使者勞軍增封邑時軍師杜襲督軍薛悌皆言明年麥熟亮必為寇隴右無穀宜及冬豫運帝曰亮再出祁山一攻陳倉挫衄而反縱其後出不復攻城當求野戰必在隴東不在西也亮每以糧少為恨歸必積穀以吾料之非三稔不能動矣於是表徙冀州農夫佃上邽興京兆天水南安監冶青龍元年穿成國渠築臨晉陂溉田數千頃國以充實焉二年亮又率衆十餘萬出斜谷壘于郿之渭水南原天子憂之遣征蜀護軍秦朗督步騎二萬受帝節度諸將欲住渭北以待之帝曰百姓積聚皆在渭南此必爭之地也遂引軍而濟背水為壘因謂諸將曰亮若勇者當出武功依山而東若西上五丈原則諸軍無事矣亮果上原將北渡渭帝遣將軍周當屯陽遂以餌之數日亮不動帝曰亮欲爭原而不向陽遂此意可知也遣將軍胡遵雍州剌史郭淮共備陽遂與亮會于積石臨原而戰亮不得進還於五丈原會有長星墜亮之壘帝知其必敗遣奇兵掎亮之後斬五百餘級獲生口千餘降者六百餘人時朝廷以亮僑軍遠寇利在急戰每命帝持重以候其變亮數挑戰帝不出因遺帝巾幗婦人之飾帝怒表請決戰天子不許乃遣骨鯁臣衛尉辛毗杖節為軍師以制之後亮復來挑戰帝將出兵以應之毗杖節立軍門帝乃止初蜀將姜維聞毗來謂亮曰辛毗杖節而至賊不復出矣亮曰彼本無戰心所以固請者以示武于其衆耳將在軍君命有所不受苟能制吾豈千里而請戰邪帝弟孚書問軍事帝復書曰亮志大而不見機多謀而少決好兵而無權雖提卒十萬巳墮吾畫中破之必矣與之對壘百餘日會亮病卒諸將燒營遁走百姓奔告帝出兵追之亮長史楊儀反旗鳴鼓若將距帝者帝以窮寇不之逼於是楊儀結陳而去經日乃行其營壘觀其遺事獲其圖書糧穀甚衆帝審其必死曰天下奇才也辛毗以為尚未可知帝曰軍家所重軍書密計兵馬糧穀今皆棄之豈有人捐其五藏而可以生乎宜急追之關中多蒺草利木帝使軍士二千人著軟材平底木屐前行蒺草悉著屐然後馬步俱進追到赤岸乃知亮死審問時百姓為之諺曰死諸葛走生仲達帝聞而笑曰吾便料生不便料死故也先是亮使至帝問曰諸葛公起居何如食可幾米對曰三四升次問政事曰二十罰已上皆自省覽帝既而告人曰諸葛孔明其能久乎竟如其言亮部將楊儀魏延爭權儀斬延并其衆帝欲乘隙而進有詔不許三年遷太尉纍增封邑蜀將馬岱入寇帝遣將軍牛金擊走之斬千餘級武都氐王苻雙強端帥其屬六千餘人來降關東饑帝運長安粟五百萬斛輸於京師四年獲白鹿獻之天子曰昔周公旦輔成王有素雉之貢今君受陝西之任有白鹿之獻豈非忠誠協符千載同契俾邦家以永厥休邪及遼東太守公孫文懿反徵帝詣京師天子曰此不足以勞君事欲必克故以相煩耳君度其作何計對曰棄城預走上計也據遼水以距大軍次計也坐守襄平此成擒耳天子曰其計將安出對曰惟明者能深度彼己豫有所棄此非其所及也今懸軍遠征將謂不能持久必先距遼水而後守此中下計也天子曰往還幾時對曰往百日還百日攻百日以六十日為休息一年足矣是時大修宮室加之以軍旅百姓饑弊帝將即戎乃諫曰昔周公營洛邑蕭何造未央今宮室未備臣之責也然自河以北百姓困窮外內有役勢不並興宜假絶內務以救時急景初二年帥牛金胡遵等步騎四萬發自京都車駕送出西明門詔弟孚子師送過溫賜以穀帛牛酒敕郡守典農以下皆往會焉見父老故舊宴飲纍日帝歎息悵然有感為歌曰天地開闢日月重光遭遇際會畢力遐方將掃羣穢還過故鄉肅清萬里總齊八荒告成歸老待罪舞陽遂進師經孤竹越碣石次于遼水文懿果遣步騎數萬阻遼隧堅壁而守南北六七十里以距帝帝盛兵多張旗幟出其南賊盡鋭赴之乃泛舟潛濟以出其北與賊營相逼沈舟焚梁傍遼水作長圍棄賊而向襄平諸將言曰不攻賊而作圍非所以示衆也帝曰賊堅營高壘欲以老吾兵也攻之正入其計此王邑所以恥過昆陽也古人曰敵雖高壘不得不與我戰者攻其所必救也賊大衆在此則巢窟虛矣我直指襄平則人懷內懼懼而求戰破之必矣遂整陳而過賊見兵出其後果邀之帝謂諸將曰所以不攻其營正欲致此不可失也乃縱兵逆擊大破之三戰皆捷賊保襄平進軍圍之初文懿聞魏師之出也請救於孫權權亦出兵遙為之聲援遺文懿書曰司馬公善用兵變化若神所向無前深為弟憂之會霖潦大水平地數尺三軍恐欲移營帝令軍中敢有言徙者斬都督令史張靜犯令斬之軍中乃定賊恃水樵牧自若諸將欲取之皆不聽司馬陳圭曰昔攻上庸八部並進晝夜不息故能一旬之半拔堅城斬孟達今者遠來而更安緩愚竊惑焉帝曰孟達衆少而食支一年吾將士四倍于達而糧不淹月以一月圖一年安可不速以四擊一正令半解猶當為之是以不計死傷與糧競也今賊衆我寡賊飢我飽水雨乃爾功力不設雖當促之亦何所為自發京師不憂賊攻但恐賊走今賊糧垂盡而圍落未合掠其牛馬抄其樵采此故驅之走也夫兵者詭道善因事變賊憑衆恃雨故雖飢困未肯束手當示無能以安之取小利以驚之非計也朝廷聞師遇雨咸請召還天子曰司馬公臨危制變計日擒之矣既而雨止遂合圍起土山地道楯櫓鉤橦發矢石雨下晝夜攻之時有長星色白有芒鬣自襄平城西南流于東北墜於梁水城中震懾文懿大懼乃使其所署相國王建御史大夫柳甫乞降請解圍面縛不許執建等皆斬之檄告文懿曰昔楚鄭列國而鄭伯猶肉袒牽羊而迎之孤為王人位則上公而建等欲孤解圍退舍豈楚鄭之謂邪二人老耄必傳言失旨已相為斬之若意有未已可更遣年少有明決者來文懿復遣侍中衛演乞剋日送任帝謂演曰軍事大要有五能戰當戰不能戰當守不能守當走餘二事惟有降與死耳汝不肯面縛此為決就死也不須送任文懿攻南圍突出帝縱兵擊敗之斬于梁水之上星墜之所既入城立兩標以別新舊焉男子年十五已上七千餘人皆殺之以為京觀僞公卿已下皆伏誅戮其將軍畢盛等二千餘人收戶四萬口三十餘萬初文懿篡其叔父恭位而囚之及將反將軍綸直賈範等苦諫文懿皆殺之帝乃釋恭之囚封直等之墓顯其遺嗣令曰古之伐國誅其鯨鯢而已諸為文懿所詿誤者皆原之中國人欲還舊鄉恣聽之時有兵士寒凍乞襦帝弗之與或曰幸多故襦可以賜之帝曰襦者官物人臣無私施也乃奏軍人年六十已上者罷遣千餘人將吏從軍死亡者致喪還家遂班師天子遣使者勞軍于薊增封食昆陽并前二縣初帝至襄平夢天子枕其膝曰視吾面俯視有異於常心惡之先是詔帝便道鎮關中及次白屋有詔召帝三日之間詔書五至手詔曰間側息望到到便直排閣入視吾面帝大遽乃乘追鋒車晝夜兼行自白屋四百餘里一宿而至引入嘉福殿臥內升御牀帝流涕問疾天子執帝手目齊王曰以後事相託死乃復可忍吾忍死待君得相見無所復恨矣與大將軍曹爽並受遺詔輔少主及齊王即帝位遷侍中持節都督中外諸軍録尚書事與爽各統兵三千人共執朝政更直殿中乘輿入殿爽欲使尚書奏事先由己乃言於天子徙帝為大司馬朝議以為前後大司馬纍薨於位乃以帝為太傅入殿不趨贊拜不名劍履上殿如漢蕭何故事嫁娶喪葬取給於官以世子師為散騎常侍子弟三人為列侯四人為騎都尉帝固讓子弟官不受正始元年春正月東倭重譯納貢焉耆危須諸國弱水以南鮮卑名王皆遣使來獻天子歸美宰輔又增帝封邑初魏明帝好修宮室制度靡麗百姓苦之帝自遼東還役者猶萬餘人雕玩之物動以千計至是皆奏罷之節用務農天下欣賴焉二年夏五月吳將全琮寇芍陂朱然孫倫圍樊城諸葛瑾步騭掠柤中帝請自討之議者咸言賊遠來圍樊不可卒拔挫於堅城之下有自破之勢宜長策以御之帝曰邊城受敵而安坐廟堂疆埸騷動衆心疑惑是社稷之大憂也六月乃督諸軍南征車駕送出津陽門帝以南方暑溼不宜持久使輕騎挑之然不敢動於是休戰士簡精鋭募先登申號令示必攻之勢吳軍夜遁走追至三州口斬獲萬餘人收其舟船軍資而還天子遣侍中常侍勞軍于宛秋七月增封食郾臨潁并前四縣邑萬戶子弟十一人皆為列侯帝勳德日盛而謙恭愈甚以太常常林鄉邑舊齒見之每拜恆戒子弟曰盛滿者道家之所忌四時猶有推移吾何德以堪之損之又損之庶可以免乎三年春天子追封諡皇考京兆尹為舞陽成侯三月奏穿廣漕渠引河入汴溉東南諸陂始大佃於淮北先是吳遣將諸葛恪屯皖邊鄙苦之帝欲自擊恪議者多以賊據堅城積穀欲引致官兵今懸軍遠攻其救必至進退不易未見其便帝曰賊之所長者水也今攻其城以觀其變若用其所長棄城奔走此為廟勝也若敢固守湖水冬淺船不得行勢必棄水相救由其所短亦吾利也四年秋九月帝督諸軍擊諸葛恪車駕送出津陽門軍次於舒恪焚燒積聚棄城而遁帝以滅賊之要在於積穀乃大興屯守廣開淮陽百尺二渠又修諸陂於潁之南北萬餘頃自是淮北倉庾相望壽陽至於京師農官屯兵連屬焉五年春正月帝至自淮南天子使持節勞軍尚書鄧揚李勝等欲令曹爽建立功名勸使伐蜀帝止之不可爽果無功而還六年秋八月曹爽毀中壘中堅營以兵屬其弟中領軍羲帝以先帝舊制禁之不可冬十二月天子詔帝朝會乘輿升殿七年春正月吳寇柤中夷夏萬餘家避寇北渡沔帝以沔南近賊若百姓奔還必復致寇宜權留之曹爽曰今不能修守沔南而留百姓非長策也帝曰不然凡物致之安地則安危地則危故兵書曰成敗形也安危勢也形勢御衆之要不可以不審設令賊以二萬人斷沔水三萬人與沔南諸軍相持萬人陸梁柤中將何以救之爽不從卒令還南賊果襲破柤中所失萬計八年夏四月夫人張氏薨曹爽用何晏鄧揚丁謐之謀遷太后於永寧宮專擅朝政兄弟并典禁兵多樹親黨屢改制度帝不能禁於是與爽有隙五月帝稱疾不與政事時人為之謠曰何鄧丁亂京城九年春三月黃門張當私出掖庭才人石英等十一人與曹爽為伎人爽晏謂帝疾篤遂有無君之心與當密謀圖危社稷期有日矣帝亦潛為之備爽之徒屬亦頗疑帝會河南尹李勝將蒞荊州來候帝帝詐疾篤使兩婢侍持衣衣落指口言渴婢進粥帝不持杯飲粥皆流出霑胸勝曰衆情謂明公舊風發動何意尊體乃爾帝使聲氣才屬說年老枕疾死在旦夕君當屈并州并州近胡善為之備恐不復相見以子師昭兄弟為託勝曰當還忝本州非并州帝乃錯亂其辭曰君方到并州勝復曰當忝荊州帝曰年老意荒不解君言今還為本州盛德壯烈好建功勳勝退告爽曰司馬公尸居餘氣形神已離不足慮矣他日又言曰太傅不可復濟令人愴然故爽等不復設備嘉平元年春正月甲午天子謁高平陵爽兄弟皆從是日太白襲月帝于是奏永寧太后廢爽兄弟時景帝為中護軍將兵屯司馬門帝列陳闕下經爽門爽帳下督嚴世上樓引弩將射帝孫謙止之曰事未可知三注三止皆引其肘不得發大司農桓範出赴爽蔣濟言於帝曰智囊往矣帝曰爽與範內疏而智不及駑馬戀短豆必不能用也於是假司徒高柔節行大將軍事領爽營謂柔曰君為周勃矣命太僕王觀行中領軍攝羲營帝親帥太尉蔣濟等勒兵出迎天子屯于洛水浮橋上奏曰先帝詔陛下秦王及臣升於御牀握臣臂曰深以後事為念今大將軍爽背棄顧命敗亂國典內則僭擬外專威權羣官要職皆置所親宿衛舊人並見斥黜根據槃互縱恣日甚又以黃門張當為都監專共交關伺候神器天下洶洶人懷危懼陛下便為寄坐豈得久安此非先帝詔陛下及臣升御牀之本意也臣雖朽邁敢忘前言昔趙高極意秦是以亡呂霍早斷漢祚永延此乃陛下之殷鑒臣授命之秋也公卿羣臣皆以爽有無君之心兄弟不宜典兵宿衛奏皇太后皇太后敕如奏施行臣輒敕主者及黃門令罷爽羲訓吏兵各以本官侯就第若稽留車駕以軍法從事臣輒力疾將兵詣洛水浮橋伺察非常爽不通奏留車駕宿伊水南伐樹為鹿角發屯兵數千人以守桓範果勸爽奉天子幸許昌移檄徵天下兵爽不能用而夜遣侍中許允尚書陳泰詣帝觀望風旨帝數其過失事止免官泰還以報爽勸之通奏帝又遣爽所信殿中校尉尹大目諭爽指洛水為誓爽意信之桓範等援引古今諫說萬端終不能從乃曰司馬公正當欲奪吾權耳吾得以侯還第不失為富家翁範拊膺曰坐卿滅吾族矣遂通帝奏既而有司劾黃門張當并發爽與何晏等反事乃收爽兄弟及其黨與何晏丁謐鄧揚畢軌李勝桓範等誅之蔣濟曰曹真之勳不可以不祀帝不聽初爽司馬魯芝主簿楊綜斬關奔爽及爽之將歸罪也芝綜泣諫曰公居伊周之任挾天子杖天威孰敢不從舍此而欲就東市豈不痛哉有司奏收芝綜科罪帝赦之曰以勸事君者二月天子以帝為丞相增封潁川之繁昌鄢陵新汲父城并前八縣邑二萬戶奏事不名固讓丞相冬十二月加九錫之禮朝會不拜固讓九錫二年春正月天子命帝立廟于洛陽置左右長史增掾屬舍人滿十人歲舉掾屬任御史秀才各一人增官騎百人鼓吹十四人封子肜平樂亭侯倫安樂亭侯帝以久疾不任朝請每有大事天子親幸第以咨訪焉兗州刺史令狐愚太尉王淩二於帝謀立楚王彪三年春正月王淩詐言吳人塞涂水請發兵以討之帝潛知其計不聽夏四月帝自帥中軍泛舟沿流九日而到甘城淩計無所出乃迎於武丘面縛水次曰淩若有罪公當折簡召淩何苦自來邪帝曰以君非折簡之客故耳即以淩歸于京師道經賈逵廟淩呼曰賈梁道王淩是大魏之忠臣惟爾有神知之至項仰鴆而死收其餘黨皆夷三族并殺彪悉録魏諸王公置于鄴命有司監察不得交關天子遣侍中韋誕持節勞軍于五池帝至自甘城天子又使兼大鴻臚太僕庾嶷持節策命帝為相國封安平郡公孫及兄子各一人為列侯前後食邑五萬戶侯者十九人固讓相國郡公不受六月帝寢疾夢賈逵王淩為祟甚惡之秋八月戊寅崩於京師時年七十三天子素服臨弔喪葬威儀依漢霍光故事追贈相國郡公弟孚表陳先志辭郡公及轀輬車九月庚申葬于河陰諡曰文後改諡宣文先是預作終制於首陽山為土藏不墳不樹作顧命三篇斂以時服不設明器後終者不得合葬一如遺命晉國初建追尊曰宣王武帝受禪上尊號曰宣皇帝陵曰高原廟稱高祖帝內忌而外寬猜忌多權變魏武察帝有雄豪志聞有狼顧相欲驗之乃召使前行令反顧面正向後而身不動又嘗夢三馬同食一槽甚惡焉因謂太子丕曰司馬懿非人臣也必預汝家事太子素與帝善每相全佑故免帝於是勤於吏職夜以忘寢至於芻牧之間悉皆臨履由是魏武意遂安及平公孫文懿大行殺戮誅曹爽之際支黨皆夷及三族男女無少長姑姊妹女子之適人者皆殺之既而竟遷魏𣇓云明帝時王導侍坐帝問前世所以得天下導乃陳帝創業之始及文帝末高貴鄉公事明帝以面覆牀曰若如公言晉祚復安得長遠迹其猜忍蓋有符於狼顧也制曰夫天地之大黎元為本邦國之貴元首為先治亂無常興亡有運是故五帝之上居萬乘以為憂三王已來處其憂而為樂競智力爭利害大小相吞強弱相襲逮乎魏室三方𣇓峙干戈不息氛霧交飛宣皇以天挺之姿應期佐命文以纘治武以棱威用人如在己求賢若不及情深阻而莫測性寬綽而能容和光同塵與時舒卷戢鱗潛翼思屬風雲飾忠于已詐之心延安于將危之命觀其雄略內斷英猷外決殄公孫於百日擒孟達於盈旬自以兵動若神謀無再計矣既而擁衆西舉與諸葛相持抑其甲兵本無鬬志遺其巾幗方發憤心杖節當門雄圖頓屈請戰千里詐欲示威且秦蜀之人勇懦非敵夷險之路勞逸不同以此爭功其利可見而返閉軍固壘莫敢爭鋒生怯實而未前死疑虛而猶遁良將之道失在斯乎文帝之世輔翼權重許昌同蕭何之委崇華甚霍光之寄當謂竭誠盡節伊傅可齊及明帝將終棟梁是屬受遺二主佐命三朝既承忍死之託曾無殉生之報天子在外內起甲兵陵土未乾遽相誅戮貞臣之體寧若此乎盡善之方以斯為惑夫征討之策豈東智而西愚輔佐之心何前忠而後亂故晉明掩面恥欺僞以成功石勒肆言笑姦回以定業古人有云積善三年知之者少為惡一日聞于天下可不謂然乎雖自隱過當年而終見嗤後代亦猶竊鍾掩耳以衆人為不聞鋭意盜金謂市中為莫覩故知貪于近者則遺遠溺于利者則傷名若不損己以益人則當禍人而福己順理而舉易為力背時而動難為功況以未成之晉基逼有餘之魏祚雖復道格區宇德被蒼生而天未啓時寶位猶阻非可以智競不可以力爭雖則慶流後昆而身終於北面矣
