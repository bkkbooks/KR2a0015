body:
  text: 晉書卷三十八列傳第八宣五王宣帝九男穆張皇后生景帝文帝平原王幹伏夫人生汝南文成王亮琅邪武王胄清惠亭侯京扶風武王駿張夫人生梁王肜柏夫人生趙王倫亮及倫別有傳平原王幹平原王幹字子良少以公子魏時封安陽亭侯稍遷撫軍中郎將進爵平陽鄉侯五等建改封定陶伯武帝踐阼封平原王邑萬一千三百戶給鼓吹駙馬二匹加侍中之服咸寧初遣諸王之國幹有篤疾性理不而頗清虛靜退簡於情欲故特詔留之太康末拜光祿大夫加侍中特假金章紫綬班次三司惠帝即位進左光祿大夫侍中如故劍履上殿入朝不趨幹雖王大國不事其務有所調補必以才能雖有爵祿若不在己秩奉布帛皆露積腐爛陰雨則出犢車而內露車或問其故對曰露者宜內也朝士造之雖通姓名必令立車馬於門外或終夕不見時有得覲與人物酬接亦恂恂恭遜初無闕失前後愛妾死既斂輒不釘棺置後空室中數日一發視或行淫穢須其尸壞乃葬之趙王倫輔政以幹為衛將軍惠帝反正復為侍中加太保齊王冏之平趙王倫也宗室朝士皆以牛酒勞冏幹獨懷百錢見冏出之曰趙王逆亂汝能義舉是汝之功今以百錢賀汝雖然大勢難居不可不慎冏既輔政幹詣之冏出迎拜幹入踞其牀不命冏坐語之曰汝勿效白女兒其意指倫也及冏誅幹哭之慟謂左右曰宗室日衰唯此兒最可而復害之從今殆矣東海王越興義至洛陽往視幹幹閉門不通越駐車良久幹乃使人謝遣而自於門間窺之當時莫能測其意或謂之有疾或以為晦迹焉永嘉五年薨時年八十會劉聰寇洛不遑贈諡有二子世子廣早卒次子永以太熙中封安德縣公散騎常侍皆為善士遇難合門堙滅琅邪王胄子覲淡繇漼琅邪武王胄字子將正始初封南安亭侯早有才望起家為寧朔將軍監守鄴城有綏懷之稱纍遷散騎常侍進封東武鄉侯拜右將軍監兗州諸軍事兗州刺史五等初建封南皮伯轉征虜將軍假節武帝踐阼封東莞郡王邑萬六百戶始置二卿特詔諸王自選令長胄表讓不許入為尚書右僕射撫軍將軍出為鎮東大將軍假節徐州諸軍事代衛瓘鎮下邳胄鎮御有方得將士死力吳人憚之加開府儀同三司改封琅邪王以東莞益其國平吳之役率衆數萬出塗中孫晧奉箋送璽綬詣胄請降詔曰琅邪王胄督率所統連據塗中使賊不得相救又使琅邪相劉弘等進軍逼江賊震懼遣使奉偽璽綬又使長史王恆率諸軍渡江破賊邊守獲督蔡機斬首降附五六萬計諸葛靚孫奕等皆歸命請死功勳茂著其封子二人為亭侯各三千戶賜絹六千匹頃之并督青州諸軍事加侍中之服進拜大將軍開府儀同三司胄既戚屬尊重加有平吳之功克己恭儉無矜滿之色僚吏盡力百姓懷化疾篤賜牀帳衣服錢帛粳粱等物遣侍中問焉太康四年薨時年五十七臨終表求葬母太妃陵次并乞分國封四子帝許之子恭王覲立又封次子淡為武陵王繇為東安王漼為淮陵王覲字思祖拜冗從僕射太熙元年薨時年三十五子睿立是為元帝中興初以皇子裒為琅邪王奉恭王祀裒早薨更以皇子煥為琅邪王其日薨復以皇子昱為琅邪王咸和之初既徙封會稽成帝又以康帝為琅邪王康帝即位封成帝長子哀帝為琅邪王哀帝即位以廢帝為琅邪王廢帝即位以會稽王攝行琅邪國祀簡文帝登阼琅邪王無嗣及帝臨崩封少子道子為琅邪王道子後為會稽王更以恭帝為琅邪王帝既即位琅邪國除武陵莊王淡字思弘初為冗從僕射後封東武公邑五千二百戶轉前將軍中護軍性忌害無孝友之行弟東安王繇有令名為父母所愛淡惡之如讐遂譖繇於汝南王亮亮素與繇有隙奏廢徙之趙王倫作亂以淡為領軍將軍淡素與河內郭俶俶弟侃親善酒酣俶等言張華之冤淡性酗酒因並殺之送首于倫其酗虐如此淡妻郭氏賈后內妹也初恃勢無禮於淡母齊王冏輔政淡母諸葛太妃表淡不孝乞還繇由是淡與妻子徙遼東其子禧年五歲不肯隨去曰要當為父求還無為俱徙陳訴歷年太妃薨繇被害然後得還拜光祿大夫尚書太子太傅改封武陵王永嘉末為石勒所害子哀王哲立哲字景林拜散騎常侍亦為勒所害無子其後元帝立皇子晞為武陵王以奉淡祀焉東安王繇字思玄初拜東安公歷散騎黃門侍郎遷散騎常侍美鬚髯性剛毅有威望博學多才事親孝居喪盡禮誅楊駿之際繇屯雲龍門兼統諸軍以功拜右衛將軍領射聲校尉進封郡王邑二萬戶加侍中兼典軍大將軍領右衛如故遷尚書右僕射加散騎常侍是日誅賞三百餘人皆自繇出東夷校尉文俶父欽為繇外祖諸葛誕所殺繇慮俶為舅家之患是日亦以非罪誅俶繇兄淡屢構繇於汝南王亮亮不納至是以繇專行誅賞淡因隙譖之亮惑其説遂免繇官以公就第坐有悖言廢徙帶方永康初徵繇復封拜宗正卿遷尚書轉左僕射惠帝之討成都王穎時繇遭母喪在鄴勸穎解兵而降及王師敗績穎怨繇乃害之後立琅邪王覲子長樂亭侯渾為東安王以奉繇祀尋薨國除淮陵元王漼字思沖初封廣陵公食邑二千九百戶歷左將軍散騎常侍趙王倫之篡也三王起義漼與左衛將軍王輿攻殺孫秀因而廢倫以功進封淮陵王入為尚書加侍中轉宗正光祿大夫薨子貞王融立薨無子安帝時立武陵威王孫蘊為淮陵王以奉元王之祀位至散騎常侍薨無子以臨川王寶子安之為嗣宋受禪國除清惠亭侯京字子佐魏末以公子賜爵年二十四薨追贈射聲校尉以文帝子機字太玄為嗣泰始元年封燕王邑六千六百六十三戶機之國咸寧初徵為步兵校尉以漁陽郡益其國加侍中之服拜青州都督鎮東將軍假節以北平上谷廣郡一萬三百三十七戶增燕國為二萬戶薨無子齊王冏表以子幾嗣後冏敗國除扶風王駿子暢歆扶風武王駿字子臧幼聰惠年五六歲能書疏諷誦經籍見者奇之及長清貞守道宗室之中最為俊望魏景初中封平陽亭侯齊王芳立駿年八歲為散騎常侍侍講焉尋遷步兵屯騎校尉常侍如故進爵鄉侯出為平南將軍假節都督淮北諸軍事改封平壽侯轉安東將軍咸熙初徙封東牟侯轉安東大將軍鎮許昌武帝踐阼進封汝陰王邑萬戶都督豫州諸軍事吳將丁奉寇芍陂駿督諸軍距退之遷使持節都督揚州諸軍事代石苞鎮壽春尋復都督豫州還鎮許昌遷鎮西大將軍使持節都督雍涼等州諸軍事代汝南王亮鎮關中加袞冕侍中之服駿善撫御有威恩勸督農桑與士卒分役己及僚佐并將帥兵士等人限田十畝具以表聞詔遣普下州縣使各務農事咸寧初羌虜樹機能等叛遣衆討之斬三千餘級進位征西大將軍開府辟召儀同三司持節都督如故又詔駿遣七千人代涼州守兵樹機能侯彈勃等欲先劫佃兵駿命平虜護軍文俶督涼秦雍諸軍各進屯以威之機能乃遣所領二十部及彈勃面縛軍門各遣入質子安定北地金城諸胡吉軻羅侯金多及北虜熱冏等二十萬口又來降其年入朝徙封扶風王以氐戶在國界者增封給羽葆鼓吹太康初進拜驃騎將軍開府持節都督如故駿有孝行母伏太妃隨兄亮在官駿常涕泣思慕若聞有疾輒憂懼不食或時委官定省少好學能著論與荀顗論仁孝先後文有可稱及齊王攸出鎮駿表諫懇切以帝不從遂發病薨追贈大司馬加侍中假黃鉞西土聞其薨也泣者盈路百姓為之樹碑長老見碑無不下拜其遺愛如此有子十人暢歆最知名暢字玄舒改封順陽王拜給事中屯騎校尉遊擊將軍永嘉末劉聰入洛不知所終新野莊王歆字弘舒武王薨後兄暢推恩請分國封歆太康中詔封新野縣公邑千八百戶儀比縣王歆雖少貴而謹身履道母臧太妃薨居喪過禮以孝聞拜散騎常侍趙王倫篡位以為南中郎將齊王冏舉義兵移檄天下歆未知所從嬖人王綏曰趙親而強齊疏而弱公宜從趙參軍孫洵大言於衆曰趙王凶逆天下當共討之大義滅親古之明典歆從之乃使洵詣冏冏迎執其手曰使我得成大節者新野公也冏入洛歆躬貫甲胄率所領導冏以勳進封新野郡王邑二萬戶遷使持節都督荊州諸軍事鎮南大將軍開府儀同三司歆將之鎮與冏同乘謁陵因説冏曰成都至親同建大勳今宜留之與輔政若不能爾當奪其兵權冏不從俄而冏敗歆懼自結於成都王穎歆為政嚴刻蠻夷並怨及張昌作亂於江夏歆表請討之時長沙王執政與成都王穎有隙疑歆與穎連謀不聽歆出兵昌衆日盛時孫洵為從事中郎謂歆曰古人有言一日縱敵數世之患公荷藩屏之任居推轂之重拜表輒行有何不可而使姦凶滋蔓禍釁不測豈維翰王室鎮靜方夏之謂乎歆將出軍王綏又曰昌等小賊偏裨自足制之不煩違帝命親矢石也乃止昌至樊城歆出距之衆潰為昌所害追贈驃騎將軍無子以兄子劭為後永嘉末沒於石勒梁王肜梁孝王肜字子徽清修恭慎無他才能以公子封平樂亭侯及五等建改封開平子武帝踐阼封梁王邑五千三百五十八戶及之國遷北中郎將督鄴城守事時諸王自選官屬肜以汝陰上計吏張蕃為中大夫蕃素無行本名雄妻劉氏解音樂為曹爽教伎蕃又往來何晏所而恣為姦淫晏誅徙河間乃變名自結於肜為有司所奏詔削一縣咸寧中復以陳國汝南南頓增封為次國太康中代孔洵監豫州軍事加平東將軍鎮許昌頃之又以本官代下邳王晃監青徐州軍事進號安東將軍元康初轉征西將軍代秦王柬都督關中軍事領護西戎校尉加侍中進督梁州尋徵為衛將軍録尚書事行太子太保給千兵百騎久之復為征西大將軍代趙王倫鎮關中都督涼雍諸軍事置左右長史司馬又領西戎校尉屯好畤督建威將軍周處振威將軍盧播等伐氐賊齊萬年於六陌肜與處有隙促令進軍而絶其後播又不救之故處見害朝廷尤之尋徵拜大將軍尚書令領軍將軍録尚書事肜嘗大會謂參軍王銓曰我從兄為尚書令不能啖大臠大臠故難銓曰公在此獨嚼尚難矣肜曰長史大臠為誰曰盧播是也肜曰是家吏隱之耳銓曰天下咸是家吏便恐王法不可復行肜又曰我在長安作何等不善因指單衣補幰以為清銓答曰朝野望公舉薦賢才使不仁者遠而位居公輔以衣補幰以此為清無足稱也肜有慚色永康初共趙王倫廢賈后詔以肜為太宰守尚書令增封二萬戶趙王倫輔政有星變占曰不利上相孫秀懼倫受災乃省司徒為丞相以授肜猥加崇進欲以應之或曰肜無權不益也肜固讓不受及倫篡位以肜為阿衡給武賁百人軒懸之樂十人倫滅詔以肜為太宰領司徒又代高密王泰為宗師永康二年薨喪葬依汝南文成王亮故事博士陳留蔡克議諡曰肜位為宰相責深任重屬尊親近且為宗師朝所仰望下所具瞻而臨大節無不可奪之志當危事不能舍生取義愍懷之廢不聞一言之諫淮南之難不能因勢輔義趙王倫篡逆不能引身去朝宋有蕩氏之亂華元自以不能居官曰君臣之訓我所司也公室卑而不正吾罪大矣夫以區區之宋猶有不素餐之臣而況帝王之朝而有苟容之相此而不貶法將何施謹案諡法不勤成名曰靈肜見義不為不可謂勤宜諡曰靈梁國常侍孫霖及肜親黨稱枉臺乃下符曰賈氏專權趙王倫篡逆皆力制朝野肜勢不得去而責其不能引身去朝義何所據克重議曰肜為宗臣而國亂不能匡主顛不能扶非所以為相故春秋譏華元樂舉謂之不臣且賈氏之酷烈不甚於呂后而王陵猶得杜門趙王倫之無道不甚於殷紂而微子猶得去之近者太尉陳準異姓之人加弟徽有射鉤之隙亦得託疾辭位不涉偽朝何至於肜親倫之兄而獨不得去乎趙盾入諫不從出亡不遠猶不免於責況肜不能去位北面事偽主乎宜如前議加其貶責以廣為臣之節明事君之道於是朝廷從克議肜故吏復追訴不已故改焉無子以武陵王淡子禧為後是為懷王拜征虜將軍與淡俱沒於石勒元帝時以西陽王羕子悝為肜嗣早薨是為殤王至是懷王子翹自石氏歸國得立是為聲王官至散騎常侍薨無子詔以武陵威王子𩼔為翹嗣歷永安太僕與父晞俱廢徙新安薨太元中復國子和立薨子珍之立桓玄篡位國臣孔璞奉珍之奔于壽陽義熙初乃歸纍遷左衛將軍太常卿劉裕伐姚泓請為咨議參軍為裕所害國除文六王文帝九男文明王皇后生武帝齊獻王攸城陽哀王兆遼東悼惠王定國廣漢殤王廣德其樂安平王鑒燕王機皇子永祚樂平王延祚不知母氏燕王機繼清惠亭侯別有傳永祚早亡無傳齊王攸子蕤贊實齊獻王攸字大猷少而岐嶷及長清和平允親賢好施愛經籍能屬文善尺牘為世所楷才望出武帝之右宣帝每器之景帝無子命攸為嗣從征王淩封長樂亭侯及景帝崩攸年十歲哀動左右大見稱歎襲封舞陽侯奉景獻羊后於別第事后以孝聞復歷散騎常侍步兵校尉時年十八綏撫營部甚有威惠五等建改封安昌侯遷衛將軍居文帝喪哀毀過禮杖而後起左右以稻米乾飯雜理中丸進之攸泣而不受太后自往勉喻曰若萬一加以他疾將復如何宜遠慮深計不可專守一志常遣人逼進飲食司馬嵇喜又諫曰毀不滅性聖人之教且大王地即密親任惟元輔匹夫猶惜其命以為祖宗況荷天下之大業輔帝室之重任而可盡無極之哀與顏閔爭孝不可令賢人笑愚人幸也喜躬自進食攸不得已為之強飯喜退攸謂左右曰嵇司馬將令我不忘居喪之節得存區區之身耳武帝踐阼封齊王時朝廷草創而攸總統軍事撫寧內外莫不景附焉詔議藩王令自選國內長吏攸奏議曰昔聖王封建萬國以親諸侯軌迹相承莫之能改誠以君不世居則人心偷幸人無常主則風俗偽薄是以先帝深覽經遠之統思復先哲之軌分土畫疆建爵五等或以進德或以酬功伏惟陛下應期創業樹建親戚聽使藩國自除長吏而今草創制度初立雖庸蜀順軌吳猶未賓宜俟清泰乃議復古之制書比三上輒報不許其後國相上長吏缺典書令請求差選攸下令曰忝受恩禮不稱惟憂至於官人才皆朝廷之事非國所宜裁也其令自上請之時王家人衣食皆出御府攸表租秩足以自供求絶之前後十餘上帝又不許攸雖未之國文武官屬下至士卒分租賦以給之疾病死喪賜與之而時有水旱國內百姓則加振貸須豐年乃責十減其二國內賴之遷驃騎將軍開府辟召禮同三司降身虛己待物以信常歎公府不案吏然以董御戎政復有威克之宜乃下教曰夫先王馭世明罰敕法鞭撲作教以正逋慢且唐虞之朝猶須督責前欲撰次其事使粗有常懼煩簡之宜未審其要故令劉程二君詳定然思惟之鄭鑄刑書叔向不韙范宣議制仲尼譏之令皆如舊無所增損其常節度所不及者隨事處決諸吏各竭乃心思同在公古人之節如有所闕以賴股肱匡救之規庶以免負於是內外祗肅時驃騎當罷營兵兵士數千人戀攸恩德不肯去遮京兆主言之帝乃還攸兵攸每朝政大議悉心陳之詔以比年飢饉議所節省攸奏議曰臣聞先王之教莫不先正其本務農重本國之大綱當今方隅清穆武夫釋甲廣分休假以就農業然守相不能勤心恤公以盡地利昔漢宣歎曰與朕理天下者惟良二千石乎勤加賞罰黜陟幽明于時翕然用多名守計今地有餘羡而不農者衆加附業之人復有虛假通天下謀之則飢者必不少矣今宜嚴敕州郡檢諸虛詐害農之事督實南畝上下同奉所務則天下之穀可復古政豈患於暫一水旱便憂飢餒哉考績黜陟畢使嚴明畏威懷惠莫不自厲又都邑之內遊食滋多巧伎末業服飾奢麗富人兼美猶有魏之遺弊染化日淺靡財害穀動復萬計宜申明舊法必禁絶之使去奢即儉不奪農時畢力稼穡以實倉廩則榮辱禮節由之而生興化反本於茲為盛轉鎮軍大將軍加侍中羽葆鼓吹行太子少傅數年授太子太傅獻針於太子曰伊昔上皇建國立君仰觀天文俯察地理創業恢道以安人承祀祚延統重故援立太子尊以弘道固以二己儲德既立邦有所恃夫親仁者功成邇佞者國傾故保相之材必擇賢明昔在周成旦奭作傅外以明德自輔內以親親立固德以義濟親則自然嬴廢公族其崩如山劉建子弟漢祚永傳楚以無極作亂宋以伊戾興難張禹佞給卒危強漢輔弼不忠禍及乃躬匪徒乃躬乃喪乃邦無曰父子不間昔有江充無曰至親匪二或容潘崇諛言亂真譖潤離親驪姬之讒晉侯疑申固親以道勿固以恩修身以敬勿託以尊自損者有餘自益者彌昏庶事不可以不恤大本不可以不敦見亡戒危覩安思存冢子司義敢告在閽世以為工咸寧二年代賈充為司空侍中太傅如故初攸特為文帝所寵愛每見攸輒撫牀呼其小字曰此桃符座也幾為太子者數矣及帝寢疾慮攸不安為武帝漢淮南王魏陳思故事而泣臨崩執攸手以授帝先是太后有疾既瘳帝與攸奉觴上壽攸以太后前疾危篤因歔欷流涕帝有愧焉攸嘗侍帝疾有憂戚之容時人以此稱歎之及太后臨崩亦流涕謂帝曰桃符性急而汝為兄不慈我若遂不起恐必不能相容以是屬汝勿忘我言及帝晚年諸子並弱而太子不令朝臣內外皆屬意於攸中書監荀勗侍中馮紞皆諂諛自進攸素疾之勗等以朝望在攸恐其為嗣禍必及己乃從容言於帝曰陛下萬歲之後太子不得立也帝曰何故勗曰百僚內外皆歸心於齊王太子焉得立乎陛下試詔齊王之國必舉朝以為不可則臣言有徵矣紞又言曰陛下遣諸侯之國成五等之制者宜先從親始親莫若齊王帝既信勗言又納紞説太康三年乃下詔曰古者九命作伯或入毗朝政或出御方嶽周之呂望五侯九伯實得征之侍中司空齊王攸明德清暢忠允篤誠以母弟之親受台輔之任佐命立勳劬勞王室宜登顯位以稱具瞻其以為大司馬都督青州諸軍事侍中如故假節將本營千人親騎帳下司馬大車皆如舊增鼓吹一部官騎滿二十人置騎司馬五人餘主者詳案舊制施行攸不悅主簿丁頤曰昔太公封齊猶表東海桓公九合以長五伯況殿下誕德欽明恢弼大藩穆然東軫莫不得所何必絳闕乃弘帝載攸曰吾無匡時之用卿言何多明年策攸曰於戲惟命不于常天既遷有魏之祚我有晉既受順天明命光建羣后越造王國于東土錫茲青社用藩翼我邦家茂哉無怠以永保宗廟又詔下太常議崇錫之物以濟南郡益齊國又以攸子實為北海王於是備物典策設軒懸之樂六佾之舞黃鉞朝車乘輿之副從焉攸知勗紞構己憤怨發疾乞守先后陵不許帝遣御醫診視諸醫希旨皆言無疾疾轉篤猶催上道攸自強入辭素持容儀疾雖困尚自整厲舉止如常帝益疑無疾辭出信宿歐血而薨時年三十六帝哭之慟馮紞侍側曰齊王名過其實而天下歸之今自薨隕社稷之福也陛下何哀之過帝收淚而止詔喪禮依安平王孚故事廟設軒懸之樂配饗太廟子冏立別有傳攸以禮自拘鮮有過事就人借書必手刊其謬然後反之加以至性過人有觸其諱者輒泫然流涕雖武帝亦敬憚之每引之同處必擇言而後發三子蕤贊實蕤字景回出繼遼東王定國太康初徙封東萊王元康中歷步兵屯騎校尉蕤性強暴使酒數陵侮弟冏冏以兄故容之冏起義兵趙王倫收蕤及弟北海王實繫廷尉當誅倫太子中庶子祖納上疏諫曰罪不相及惡止其身此先哲之弘謨百王之達制也是故鯀既殛死禹乃嗣興二叔誅放而邢衛無責逮乎戰國及至秦漢明恕之道寢猜嫌之情用乃立質任以御衆設從罪以發姦其所由來蓋三代之弊法耳蕤實獻王之子明德之胤宜蒙特宥以全穆親之典會孫秀死蕤等悉得免冏擁衆入洛蕤於路迎之冏不即見須符付前頓蕤恚曰吾坐爾殆死曾無友于之情及冏輔政詔以蕤為散騎常侍加大將軍領後軍侍中特進增邑滿二萬戶又從冏求開府冏曰武帝子吳豫章尚未開府宜且須後蕤以是益怨密表冏專權與左衛將軍王輿謀共廢冏事覺免為庶人尋詔曰大司馬以經識明斷高謀遠略猥率同盟安復社稷自書契所載周召之美未足比勳故授公上宰東萊王蕤潛懷忌妬包藏禍心與王輿密謀圖欲譖害收輿之日蕤與青衣共載微服奔走經宿乃還姦凶赫然妖惑外內又前表冏所言深重雖管蔡失道牙慶亂宗不復過也春秋之典大義滅親其徙蕤上庸後封微陽侯永寧初上庸內史陳鍾承冏旨害蕤冏死詔誅鍾復蕤封改葬以王禮贊字景期繼廣漢殤王廣德後年六歲太康元年薨諡沖王實字景深初為長樂亭侯攸以贊薨又以實繼廣漢殤王後改封北海王永寧初為平東將軍假節加散騎常侍代齊王冏鎮許昌尋進安南將軍都督豫州軍事增邑滿二萬戶未發留為侍中上軍將軍給千兵百騎城陽王兆城陽哀王兆字千秋年十歲而夭武帝踐阼詔曰亡弟千秋少聰慧有夙成之質不幸早亡先帝先后特所哀愍先后欲紹立其後而竟未遂每追遺意情懷感傷其以皇子景度為千秋後雖非典禮亦近世之所行且以述先后本旨也於是追加兆封諡景度以泰始六年薨復以第五子憲繼哀王後薨復以第六子祗為東海王繼哀王後薨咸寧初又封第十三子遐為清河王以繼兆後遼東王定國遼東悼惠王定國年三歲薨咸寧初追加封諡齊王攸以長子蕤為嗣蕤薨子遵嗣廣漢王廣德廣漢殤王廣德年二歲薨咸寧初追加封諡齊王攸以第五子贊紹封薨攸更以第二子實嗣廣德樂安王鑒樂安平王鑒字大明初封臨泗亭侯武帝踐阼封樂安王帝為鑒及燕王機高選師友下詔曰樂安王鑒燕王機並以長大宜得輔導師友取明經儒學有行義節儉使足嚴憚昔韓起與田蘇遊而好善宜必得其人泰始中拜越騎校尉咸寧初以齊之梁鄒益封因之國服侍中之服元康初徵為散騎常侍上軍大將軍領射聲校尉尋遷使持節都督豫州軍事安南將軍代清河王遐鎮許昌以疾不行七年薨子殤王籍立薨無子齊王冏以子冰紹鑒後以濟陰萬一千二百一十九戶改為廣陽國立冰為廣陽王冏敗廢樂平王延祚樂平王延祚字大思少有篤疾不任封爵太康初詔曰弟祚早孤無識情所哀愍幼得篤疾日冀其差今遂廢痼無復後望意甚傷之其封為樂平王使有名號以慰吾心尋薨無子史臣曰平原性理不世莫之測及其處亂離之際屬交爭之秋而能遠害全身享茲介福其愚不可及已琅邪武功既暢飾之以溫恭扶風文教克宣加之以孝行抑宗室之可稱者也齊王以兩獻之親弘二南之化道光雅俗望重台衡百辟具瞻萬方屬意既而地疑致逼文雅見疵紞勗陳蔓草之邪謀武皇深翼子之滯愛遂乃褫龍章於袞職徙侯服於下藩未及戒塗終於憤恚惜哉若使天假之年而除其害奉綴衣之命膺負圖之託光輔嗣君允釐邦政求諸冥兆或廢興之有期徵之人事庶勝殘之可及何八王之敢力爭五胡之能競逐哉詩云人之云亡邦國殄瘁攸實有之讒人罔極交亂四國其荀馮之謂也贊曰文宣孫子或賢或鄙扶風遺愛琅邪克己淡諂凶魁肜參釁始幹雖靜退性乖理彼美齊獻卓爾不羣自家刑國緯武經文木摧於秀蘭燒以薰
