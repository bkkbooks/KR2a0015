body:
  text: 晉書卷三十四列傳第四羊祜羊祜字叔子泰山南城人也世吏二千石至祜九世並以清德聞祖續仕漢南陽太守父衜上黨太守祜蔡邕外孫景獻皇后同產弟祜年十二喪父孝思過禮事叔父耽甚謹嘗遊汶水之濱遇父老謂之曰孺子有好相年未六十必建大功於天下既而去莫知所在及長博學能屬文身長七尺三寸美鬚眉善談論郡將夏侯威異之以兄霸之子妻之舉上計吏州四辟從事秀才五府交命皆不就太原郭奕見之曰此今日之顏子也與王沈俱被曹爽辟沈勸就徵祜曰委質事人復何容易及爽敗沈以故吏免因謂祜曰常識卿前語祜曰此非始慮所及其先識不伐如此夏侯霸之降蜀也姻親多告絕祜獨安其室恩禮有加焉尋遭母憂長兄發又卒毀慕寢頓十餘年以道素自居恂恂若儒者文帝為大將軍辟祜未就公車徵拜中書侍郎俄遷給事中黃門郎時高貴鄉公好屬文在位者多獻詩賦汝南和逌以忤意見斥祜在其間不得而親疏有識尚焉陳留王立賜爵關中侯邑百戶以少帝不願為侍臣求出補吏徙祕書監及五等建封鉅平子邑六百戶鍾會有寵而忌祜亦憚之及會誅拜相國從事中郎與荀勖共掌機密遷中領軍悉統宿衞入直殿中執兵之要事兼內外武帝受禪以佐命之勳進號中軍將軍加散騎常侍改封郡公邑三千戶固讓封不受乃進本爵為侯置郎中令備九官之職加夫人印綬泰始初詔曰夫總齊機衡允釐六職朝政之本也祜執德清劭忠亮純茂經緯文武謇謇正直雖處腹心之任而不總樞機之重非垂拱無為委任責成之意也其以祜為尚書右僕射衞將軍給本營兵時王佑賈充裴秀皆前朝名望祜每讓不處其右帝將有滅吳之志以祜為都督荊州諸軍事假節散騎常侍衞將軍如故祜率營兵出鎮南夏開設庠序綏懷遠近甚得江漢之心與吳人開布大信降者欲去皆聽之時長吏喪官後人惡之多毀壞舊府祜以死生有命非由居室書下征鎮普加禁斷吳石城守去襄陽七百餘里每為邊害祜患之竟以詭計令吳罷守於是戍邏減半分以墾田八百餘頃大獲其利祜之始至也軍無百日之糧及至季年有十年之積詔罷江北都督置南中郎將以所統諸軍在漢東江夏者皆以益祜在軍常輕裘緩帶身不被甲鈴閤之下侍衞者不過十數人而頗以畋漁廢政嘗欲夜出軍司徐胤執棨當營門曰將軍都督萬里安可輕脫將軍之安危亦國家之安危也胤今日若死此門乃開耳祜改容謝之此後稀出矣後加車騎將軍開府如三司之儀祜上表固讓曰臣伏聞恩詔拔臣使同台司臣自出身以來適十數年受任外內每極顯重之任常以智力不可頓進恩寵不可久謬夙夜戰悚以榮為憂臣聞古人之言德未為人所服而受高爵則使才臣不進功未為人所歸而荷厚祿則使勞臣不勸今臣身託外戚事連運會誡在過寵不患見遺而猥降發中之詔加非次之榮臣有何功可以堪之何心可以安之身辱高位傾覆尋至願守先人弊廬豈可得哉違命誠忤天威曲從即復若此蓋聞古人申於見知大臣之節不可則止臣雖小人敢緣所蒙念存斯義今天下自服化以來方漸八年雖側席求賢不遺幽賤然臣不能推有德達有功使聖聽知勝臣者多未達者不少假令有遺德於版築之下有隱才於屠釣之間而朝議用臣不以為非臣處之不以為愧所失豈不大哉臣忝竊雖久未若今日兼文武之極寵等宰輔之高位也且臣雖所見者狹據今光祿大夫李憙執節高亮在公正色光祿大夫魯芝潔身寡欲和而不同光祿大夫李胤清亮簡素立身在朝皆服事華髮以禮終始雖歷位外內之寵不異寒賤之家而猶未蒙此選臣更越之何以塞天下之望少益日月是以誓心守節無苟進之志今道路行通方隅多事乞留前恩使臣得速還屯不爾留連必於外虞有闕匹夫之志有不可奪不聽及還鎮吳西陵督步闡舉城來降吳將陸抗攻之甚急詔祜迎闡祜率兵五萬出江陵遣荊州刺史楊肇攻抗不克闡竟為抗所擒有司奏祜所統八萬餘人賊衆不過三萬祜頓兵江陵使賊備得設乃遣楊肇偏軍入險兵少糧懸軍人挫衄背違詔命無大臣節可免官以侯就第竟坐貶為平南將軍而免楊肇為庶人祜以孟獻營武牢而鄭人懼晏弱城東陽而萊子服乃進據險要開建五城收膏腴之地奪吳人之資石城以西盡為晉有自是前後降者不絕乃增修德信以懷柔初附慨然有吞并之心每與吳人交兵剋日方戰不為掩襲之計將帥有欲進譎詐之策者輒飲以醇酒使不得言人有略吳二兒為俘者祜遣送還其家後吳將夏詳邵顗等來降二兒之父亦率其屬與俱吳將陳尚潘景來寇祜追斬之美其死節而厚加殯斂景尚子弟迎喪祜以禮遣還吳將鄧香掠夏口祜募生縛香既至宥之香感其恩甚率部曲而降祜出軍行吳境刈穀為糧皆計所侵送絹償之每會衆江沔遊獵常止晉地若禽獸先為吳人所傷而為晉兵所得者皆封還之於是吳人翕然悅服稱為羊公不之名也祜與陸抗相對使命交通抗稱祜之德量雖樂毅諸葛孔明不能過也抗嘗病祜饋之藥抗服之無疑心人多諫抗抗曰羊祜豈酖人者時談以為華元子反復見於今日抗每告其戍曰彼專為德我專為暴是不戰而自服也各保分界而已無求細利孫晧聞二境交和以詰抗抗曰一邑一鄉不可以無信義況大國乎臣不如此正是彰其德於祜無傷也祜貞売心無私疾惡邪佞荀勖馮紞之徒甚忌之從甥王衍嘗詣祜陳事辭甚俊辯祜不然之衍拂衣而起祜顧謂賓客曰王夷甫方以盛名處大位然敗俗傷化必此人也步闡之役祜以軍法將斬王戎故戎衍並憾之每言論多毀祜時人為之語曰二王當國羊公無德咸寧初除征南大將軍開府儀同三司得專辟召初祜以伐吳必藉上流之勢又時吳有童謠曰阿童復阿童銜刀浮渡江不畏岸上獸但畏水中龍祜聞之曰此必水軍有功但當思應其名者耳會益州刺史王濬徵為大司農祜知其可任濬又小字阿童因表留濬監益州諸軍事加龍驤將軍密令修舟檝為順流之計祜繕甲訓卒廣為戎備至是上疏曰先帝順天應時西平巴蜀南和吳會海內得以休息兆庶有樂安之心而吳復背信使邊事更興夫期運雖天所授而功業必由人而成不一大舉掃滅則衆役無時得安亦所以隆先帝之勳成無為之化也故堯有丹水之伐舜有三苗之征咸以寧靜宇宙戢兵和衆者也蜀平之時夭下皆謂吳當并亡自此來十三年是謂一周平定之期復在今日矣議者常言吳楚有道後服無禮先強此乃謂侯之時耳當今一統不得與古同諭夫適道之論皆未應權是故謀之雖多而決之欲獨凡以險阻得存者謂所敵者同力足自固苟其輕重不齊強弱異勢則智士不能謀而險阻不可保也蜀之為國非不險也高山尋雲霓深谷肆無景束馬懸車然後得濟皆言一夫荷戟千人莫當及進兵之日曾無藩籬之限斬將搴旗伏尸數萬乘勝席卷徑至成都漢中諸城皆鳥棲而不敢出非皆無戰心誠力不足相抗至劉禪降服諸營堡者索然俱散今江淮之難不過劍閣山川之險不過岷漢孫晧之暴侈於劉禪吳人之困甚於巴蜀而大晉兵衆多於前世資儲器械盛於往時今不於此平吳而更阻兵相守征夫苦役日尋干戈經歷盛衰不可長久宜當時定以一四海今若引梁益之兵水陸俱下荊楚之衆進臨江陵平南豫州直指夏口徐揚青兗並向秣陵鼓旆以疑之多方以誤之以一隅之吳當天下之衆勢分形散所備皆急巴漢奇兵出其空虛一處傾壞則上下震蕩吳緣江為國無有內外東西數千里以藩籬自持所敵者大無有寧息孫晧恣情任意與下多忌名臣重將不復自信是以孫秀之徒皆畏逼而至將疑於朝士困於野無有保世之計一定之心平常之日猶懷去就兵臨之際必有應者終不能齊力致死已可知也其俗急速不能持久弓弩戟楯不如中國唯有水戰是其所便一入其境則長江非復所固還保城池則去長入短而官軍懸進人有致節之志吳人戰於其內有憑城之心如此軍不踰時克可必矣帝深納之會秦涼屢敗祜復表曰吳平則胡自定但當速濟大功耳而議者多不同祜歎曰天下不如意十居七八故有當斷不斷天與不取豈非更事者恨於後時哉其後詔以泰山之南武陽牟南城梁父平陽五縣為南城郡封祜為南城侯置相與郡公同祜讓曰昔張良請受留萬戶漢祖不奪其志臣受鉅平於先帝敢辱重爵以速官謗固執不拜帝許之祜每被登進常守沖退至心素著故特見申於分列之外是以名德遠播朝野具瞻搢紳僉議當居台輔帝方有兼并之志仗祜以東南之任故寢之祜歷職二朝任典樞要政事損益皆諮訪焉勢利之求無所關與其嘉謀讜議皆焚其草故世莫聞凡所進達人皆不知所由或謂祜慎密太過者祜曰是何言歟夫入則造膝出則詭辭君臣不密之誡吾惟懼其不及不能舉賢取異豈得不愧知人之難哉且拜爵公朝謝恩私門吾所不取祜女夫嘗勸祜有所營置令有歸戴者可不美乎祜默然不應退告諸子曰此可謂知其一不知其二人臣樹私則背公是大惑也汝宜識吾此意嘗與從弟琇書曰既定邊事當角巾東路歸故里為容棺之墟以白士而居重位何能不以盛滿受責乎疎廣是吾師也祜樂山水每風景必造峴山置酒言詠終日不倦嘗慨然歎息顧謂從事中郎鄒湛等曰自有宇宙便有此山由來賢達勝士登此遠望如我與卿者多矣皆湮滅無聞使人悲傷如百歲後有知魂魄猶應登此也湛曰公德冠四海道嗣前哲令聞令望必與此山俱傳至若湛輩乃當如公言耳祜當討吳賊有功將進爵土乞以賜舅子蔡襲詔封襲關內侯邑三百戶會吳人寇弋陽江夏略戶口詔遣侍臣移書詰祜不追討之意并欲移州復舊之宜祜曰江夏去襄陽八百里比知賊問賊去亦已經日矣步軍方往安能救之哉勞師以免責恐非事宜也昔魏武帝置都督類皆與州相近以兵勢好合惡離疆埸之間一彼一此慎守而已古之善教也若輒徙州賊出無常亦未知州之所宜據也使者不能詰祜寢疾求入朝既至洛陽會景獻宮車在殯哀慟至篤中詔申諭扶疾引見命乘輦入殿無下拜甚見優禮及侍坐面陳伐吳之計帝以其病不宜常入遣中書令張華問其籌策祜曰今主上有禪代之美而功德未著吳人虐政已甚可不戰而克混一六合以興文教則主齊堯舜臣同稷契為百代之盛軌如舍之若孫晧不幸而沒吳人更立令主雖百萬之衆長江未可而越也將為後患乎華深贊成其計祜謂華曰成吾志者子也帝欲使祜臥護諸將祜曰取吳不必須臣自行但既平之後當勞聖慮耳功名之際臣所不敢居若事了當有所付授願審擇其人疾漸篤乃舉杜預自代尋卒時年五十八帝素服哭之甚哀是日大寒帝涕淚霑鬚鬢皆為冰焉南州人征市日聞祜喪莫不號慟罷市巷哭者聲相接吳守邊將士亦為之泣其仁德所感如此賜以東園祕器朝服一襲錢三十萬布百匹詔曰征南大將軍南城侯祜蹈德沖素思心清遠始在內職值登大命乃心篤誠左右王事入綜機密出統方岳當終顯烈永輔朕躬而奄忽殂隕悼之傷懷其追贈侍中太傅持節如故祜立身清儉被服率素祿俸所資皆以贍給九族賞賜軍士家無餘財遺令不得以南城侯印入柩從弟琇等述祜素志求葬於先人墓次帝不許賜去城十里外近陵葬地一頃諡曰成祜喪既引帝於大司馬門南臨送祜甥齊王攸表祜妻不以侯斂之意帝乃詔曰祜固讓歷年志不可奪身沒讓存遺操益厲此夷叔所以稱賢季子所以全節也今聽復本封以彰高美初文帝崩祜謂傅玄曰三年之喪雖貴遂服自天子達而漢文除之毀禮傷義常以歎息今主上天縱至孝有曾閔之性雖奪其服實行喪禮喪禮實行除服何為邪若因此革漢魏之薄而興先王之法以敦風俗垂美百代不亦善乎玄曰漢文以末世淺薄不能行國君之喪故因而除之除之數百年一旦復古難行也祜曰不能使天下如禮且使主上遂服不猶善乎玄曰主上不除而天下除此為但有父子無復君臣三綱之道虧矣祜乃止祜所著文章及為老子傳並行於世襄陽百姓於峴山祜平生游憩之所建碑立廟歲時饗祭焉望其碑者莫不流涕杜預因名為墮淚碑荊州人為祜諱名屋室皆以門為稱改戶曹為辭曹焉祜開府累年謙讓不辟士始有所命會卒不得除署故參佐劉儈趙寅劉彌孫勃等牋詣預曰昔以謬選忝備官屬各得與前征南大將軍祜參同庶事祜執德沖虛操尚清遠德高而體卑位優而行恭前膺顯命來撫南夏既有三司之儀復加大將軍之號雖居其位不行其制至今海內渴佇羣俊望風涉其門者貪夫反廉懦夫立志雖夷惠之操無以尚也自鎮此境政化被乎江漢潛謀遠計闢國開疆諸所規摹皆有軌量志存公家以死勤事始辟四掾未至而隕夫舉賢報國台輔之遠任也搜揚側陋亦台輔之宿心也中道而廢亦台輔之私恨也履謙積稔晚節不遂此遠近所以為之感痛者也昔召伯所憩愛流甘棠宣子所游封殖其樹夫思其人尚及其樹況生存所辟之士便當隨例放棄者乎乞蒙列上得依已至掾屬預表曰祜雖開府而不備僚屬引謙之至宜見顯明及扶疾辟士未到而沒家無胤嗣官無命士此方之望隱憂載懷夫篤終追遠人德歸厚漢祖不惜四千戶之封以慰趙子弟心請議之詔不許祜卒二歲而吳平羣臣上壽帝執爵流涕曰此羊太傅之功也因以克定之功策告祜廟仍依蕭何故事封其夫人策曰皇帝使謁者杜宏告故侍中太傅鉅平成侯祜昔吳為不恭負險稱號郊境不闢多歷年所祜受任南夏思靜其難外揚王化內經廟略著德推誠江漢歸心舉有成資謀有全策昊天不弔所志不卒朕用悼恨于厥心乃班命羣帥致天之討兵不踰時一征而滅疇昔之規若合符契夫賞不失勞國有彝典宜增啟土宇以崇前命而重違公高讓之素今封夫人夏侯氏萬歲鄉君食邑五千戶又賜帛萬匹穀萬斛祜年五歲時令乳母取所弄金環乳母曰汝先無此物祜即詣鄰人李氏東垣桑樹中探得之主人驚曰此吾亡兒所失物也云何持去乳母具言之李氏悲惋時人異之謂李氏子則祜之前身也又有善相墓者言祜祖墓所有帝王氣若鑿之則無後祜遂鑿之相者見曰猶出折臂三公而祜竟墮馬折臂位至公而無子帝以祜兄子暨為嗣暨以父沒不得為人後帝又令暨弟伊為祜後又不奉詔帝怒並收免之太康二年以伊弟篇為鉅平侯奉祜嗣篇歷官清慎有私牛於官舍產犢及遷而留之位至散騎常侍早卒孝武太元中封祜兄玄孫之子法興為鉅平侯邑五千戶以桓玄黨誅國除尚書祠部郎荀伯子上表訟之曰臣聞咎繇亡嗣臧文以為深歎伯氏奪邑管仲所以稱仁功高可百世不泯濫賞無得崇朝故太傅鉅平侯羊祜明德通賢國之宗主勳參佐命功成平吳而後嗣闕然烝嘗莫寄漢以蕭何元功故絕世輒繼愚謂鉅平封宜同酇國故太尉廣陵公準黨翼賊倫禍加淮南因逆為利竊饗大邦值西朝政刑失裁中興因而不奪今王道維新豈可不大判臧否謂廣陵國宜在削除故太保衞瓘本爵菑陽縣公既被橫害乃進茅土始贈蘭陵又轉江夏中朝名臣多非理終瓘功德無殊而獨受偏賞謂宜罷其郡封復邑菑陽則與奪有倫善惡分矣竟寢不報祜前母孔融女生兄發官至都督淮北護軍初發與祜同母兄承俱得病祜母度不能兩存乃專心養發故得濟而承竟死發長子倫高陽相倫弟暨陽平太守暨弟伊初為車騎賈充掾後歷平南將軍都督江北諸軍事鎮宛為張昌所殺追贈鎮南將軍祜伯父祕官至京兆太守子祉魏郡太守祕孫亮字長玄有才能多計數與之交者必偽盡款誠人皆謂得其心而殊非其實也初為太傅楊駿參軍時京兆多盜竊駿欲更重其法盜百錢加大辟請官屬會議亮曰昔楚江乙母失布以為盜由令尹公若無欲盜宜自止何重法為駿慚而止累轉大鴻臚時惠帝在長安亮與關東連謀內不自安奔于并州為劉元海所害亮弟陶為徐州刺史杜預子錫杜預字元凱京兆杜陵人也祖畿魏尚書僕射父恕幽州刺史預博學多通明於興廢之道常言德不可以企及立功立言可庶幾也初其父與宣帝不相能遂以幽死故預久不得調文帝嗣立預尚帝妹高陸公主起家拜尚書郎襲祖爵豐樂亭侯在職四年轉參相府軍事鍾會伐蜀以預為鎮西長史及會反僚佐並遇害唯預以智獲免增邑千一百五十戶與車騎將軍賈充等定律令既成預為之注解乃奏之曰法者蓋繩墨之斷例非窮理盡性之書也故文約而例直聽省而禁簡例直易見禁簡難犯易見則人知所避難犯則幾於刑厝刑之本在於簡直故必審名分審名分者必忍小理古之刑書銘之鍾鼎鑄之金石所以遠塞異端使無淫巧也今所注皆網羅法意格之以名分使用之者執名例以審趣舍伸繩墨之直去析薪之理也詔班于天下泰始中守河南尹預以京師王化之始自近及遠凡所施論務崇大體受詔為黜陟之課其略曰臣聞上古之政因循自然虛己委誠而信順之道應神感心通而天下之理得逮至淳樸漸散彰美顯惡設官分職以頒爵祿弘宣六典以詳考察然猶倚明哲之輔建忠貞之司使名不得越功而獨美功不得後名而獨隱皆疇咨博詢敷納以言及至末世不能紀遠而求於密微疑諸心而信耳目疑耳目而信簡書簡書愈繁官方愈偽法令滋章巧飾彌多昔漢之刺史亦歲終奏事不制算課而清濁粗舉魏氏考課即京房之遺意其文可謂至密然由於累細以違其體故歷代不能通也豈若申唐堯之舊去密就簡則簡而易從也夫宣盡物理神而明之存乎其人去人而任法則以傷理今科舉優劣莫若委任達官各考所統在官一年以後每歲言優者一人為上第劣者一人為下第因計偕以名聞如此六載主者總集採案其六歲處優舉者超用之六歲處劣舉者奏免之其優多劣少者用之劣多優少者左遷之今考課之品所對不鈞誠有難易若以難取優以易而否主者固當準量輕重微加降殺不足復曲以法盡也己丑詔書以考課難成聽通薦例薦例之理即亦取於風聲六年頓薦黜陟無漸又非古者三考之意也今每歲一考則積優以成陟累劣以取黜以士君子之心相處未有官故六年六黜清能六進否劣者也監司將亦隨而彈之若令上下公相容過此為清議大穨亦無取於黜陟也司隸校尉石鑒以宿憾奏預免職時虜寇隴右以預為安西軍司給兵三百人騎百匹到長安更除秦州刺史領東羌校尉輕車將軍假節屬虜兵強盛石鑒時為安西將軍使預出兵擊之預以虜乘勝馬肥而官軍懸乏宜并力大運須春進討陳五不可四不須鑒大怒復奏預擅飾城門官舍稽乏軍興遣御史檻車徵詣廷尉以預尚主在八議以侯贖論其後隴右之事卒如預策是時朝廷皆以預明於籌略會匈奴帥劉猛舉兵反自并州西及河東平陽詔預以散侯定計省闥俄拜度支尚書預乃奏立藉田建安邊論處軍國之要又作人排新器興常平倉定穀價較鹽運制課調內以利國外以救邊者五十餘條皆納焉石鑒自軍還論功不實為預所糾遂相讎恨言論諠譁並坐免官以侯兼本職數年復拜度支尚書元皇后梓宮將遷於峻陽陵舊制既葬帝及羣臣即吉尚書奏皇太子亦宜釋服預議皇太子宜復古典以諒闇終制從之預以時曆差舛不應晷度奏上二元乾度曆行於世預又以孟津渡險有覆沒之患請建河橋于富平津議者以為殷周所都歷聖賢而不作者必不可立故也預曰造舟為梁則河橋之謂也及橋成帝從百僚臨會舉觴屬預曰非君此橋不立也對曰非陛下之明臣亦不得施其微巧周廟欹器至漢東京猶在御坐漢末喪亂不復存形制遂絕預創意造成奏上之帝甚嘉歎焉咸寧四年秋大霖雨蝗蟲起預上疏多陳農要事在食貨志預在內七年損益萬機不可勝數朝野稱美號曰杜武庫言其無所不有也時帝密有滅吳之計而朝議多違唯預羊祜張華與帝意合祜病舉預自代因以本官假節行平東將軍領征南軍司及祜卒拜鎮南大將軍都督荊州諸軍事給追鋒車第二駙馬預既至鎮繕甲兵耀威武乃簡精銳襲吳西陵督張政大破之以功增封三百六十五戶政吳之名將也據要害之地恥以無備取敗不以所喪之實告于孫晧預欲間吳邊將乃表還其所獲之衆於晧晧果召政遣武昌監劉憲代之故大軍臨至使其將帥移易以成傾蕩之勢預處分既定乃啟請伐吳之期帝報待明年方欲大舉預表陳至計曰自閏月以來賊但敕嚴下無兵上以理勢推之賊之窮計力不兩完必先護上流勤保夏口以東以延視息無緣多兵西上空其國都而陛下過聽便用委棄大計縱敵患生此誠國之遠圖使舉而有敗勿舉可也事為之制務從完牢若或有成則開太平之基不成不過費損日月之間何惜而不一試之若當須後年天時人事不得如常臣恐其更難也陛下宿議分命臣等隨界分進其所禁持東西同符萬安之舉未有傾敗之慮臣心實了不敢以曖昧之見自取後累惟陛下察之預旬月之中又上表曰羊祜與朝臣多不同不先博畫而密與陛下共施此計故益令多異凡事當以利害相較今此舉十有八九利其一二止於無功耳其言破敗之形亦不可得直是計不出己功不在身各恥其前言故守之也自頃朝廷事無大小異意鋒起雖人心不同亦由恃恩不慮後難故輕相同異也昔漢宣帝議趙充國所上事效之後詰責諸議者皆叩頭而謝以塞異端也自秋已來討賊之形頗露若今中止孫晧怖而生計或徙都武昌更完修江南諸城遠其居人城不可攻野無所掠積大船於夏口則明年之計或無所及時帝與中書令張華圍而預表適至華推枰斂手曰陛下聖明神武朝野清晏國富兵強號令如一吳主荒淫驕虐誅殺賢能當今討之可不勞而定帝乃許之預以太康元年正月陳兵于江陵遣參軍樊顯尹林鄧圭襄陽太守周奇等率衆循江西上授以節度旬日之間累克城邑皆如預策焉又遣牙門管定周旨伍巢等率奇兵八百泛舟夜渡以襲樂鄉多張旗幟起火巴山出於要害之地以奪賊心吳都督孫歆震恐與伍延書曰北來諸軍乃飛渡江也吳之男女降者萬餘口旨巢等伏兵樂鄉城外歆遣軍出距王濬大敗而還旨等發伏兵隨歆軍而入歆不覺直至帳下虜歆而還故軍中為之謠曰以計代戰一當萬於是進逼江陵吳督將伍延偽請降而列兵登陴預攻克之既平上流於是沅湘以南至于交廣吳之州郡皆望風歸命奉送印綬預仗節稱詔而綏撫之凡所斬及生獲吳都督監軍十四牙門郡守百二十餘人又因兵威徙將士屯戍之家以實江北南郡故地各樹之長吏荊土肅然吳人赴者如歸矣王濬先列上得孫歆頭預後生送歆洛中以為大笑時衆軍會議或曰百年之寇未可盡克今向暑水潦方降疾疫將起宜俟來冬更為大舉預曰昔樂毅藉濟西一戰以并強齊今兵威已振譬如破竹數節之後皆迎刃而解無復著手處也遂指授羣帥徑造秣陵所過城邑莫不束手議者乃以書謝之孫晧既平振旅凱入以功進爵當陽縣侯增邑并前九千六百戶封子耽為亭侯千戶賜絹八千匹初攻江陵吳人知預病癭憚其智計以瓠繫狗頸示之每大樹似癭輒斫使白題曰杜預頸及城平盡捕殺之預既還鎮累陳家世吏職武非其功請退不許預以天下雖安忘戰必危勤於講武修立泮宮江漢懷德化被萬里攻破山夷錯置屯營分據要害之地以固維持之勢又修邵信臣遺跡激用滍淯諸水以浸原田萬餘頃分疆刊石使有定分公私同利衆庶賴之號曰杜父舊水道唯沔漢達江陵千數百里北無通路又巴丘湖沅湘之會表𩹉山川實為險固荊蠻之所恃也預乃開楊口起夏水達巴陵千餘里內瀉長江之險外通零桂之漕南土歌之曰後世無叛由杜翁孰識智名與勇功預公家之事知無不為凡所興造必考度始終鮮有敗事或譏其意碎者預曰禹稷之功期於濟世所庶幾也預好為後世名常言高岸為谷深谷為陵刻石為二碑紀其勳績一沈萬山之下一立峴山之上曰焉知此後不為陵谷乎預身不跨馬射不穿札而每任大事輒居將率之列結交接物恭而有禮問無所隱誨人不倦敏於事而慎於言既立功之後從容無事乃耽思經籍為春秋左氏經傳集解又參攷衆家譜第謂之釋例又作盟會圖春秋長曆備成一家之學比老乃成又撰女記讚當時論者謂預文義質直世人未之重唯祕書監摯虞賞之曰左丘明本為春秋作傳而左傳遂自孤行釋例本為傳設而所發明何但左傳故亦孤行時王濟解相馬又甚愛之而和嶠頗聚斂預常稱濟有馬癖嶠有錢癖武帝聞之謂預曰卿有何癖對曰臣有左傳癖預在鎮數餉遺洛中貴要或問其故預曰吾但恐為害不求益也預初在荊州因宴集醉臥齋中外人聞嘔吐聲竊窺於戶止見一大蛇垂頭而吐聞者異之其後徵為司隸校尉加位特進行次鄧縣而卒時年六十三帝甚嗟悼追贈征南大將軍開府儀同三司諡曰成預先為遺令曰古不合葬明於終始之理同於無有也中古聖人改而合之蓋以別合無在更緣生以示教也自此以來大人君子或合或否未能知生安能知死故各以己意所欲也吾往為臺郎嘗以公事使過密縣之邢山山上有冢問耕父云是鄭大夫祭仲或云子產之冢也遂率從者祭而觀焉其造冢居山之頂四望周達連山體南北之正而邪東北向新鄭城意不忘本也其隧道唯塞其後而空其前不填之示藏無珍寶不取於重深也山多美石不用必集洧水自然之石以為冢藏貴不勞工巧而此石不入世用也君子尚其有情小人無利可動歷千載無毀儉之致也吾去春入朝因郭氏喪亡緣陪陵舊義自表營洛陽城東首陽之南為將來兆域而所得地中有小山上無舊冢其高顯雖未足比邢山然東奉二陵西瞻宮闕南觀伊洛北望夷叔曠然遠覽情之所安也故遂表樹開道為一定之制至時皆用洛水圓石開隧道南向儀制取法於鄭大夫欲以儉自完耳棺器小斂之事皆當稱此子孫一以遵之子錫嗣錫字世嘏少有盛名起家長沙王乂文學累遷太子中舍人性亮直忠烈屢諫愍懷太子言辭懇切太子患之後置針著錫常所坐處中刺之流血他日太子問錫向著何事錫對醉不知太子詰之曰君喜責人何自作過也後轉衞將軍長史趙王倫篡位以為治書御史孫秀求交於錫而錫拒之秀雖銜之憚其名高不敢害也惠帝反政遷吏部郎城陽太守不拜仍遷尚書左丞年四十八卒贈散騎常侍子乂嗣在外戚傳史臣曰泰始之際人祇呈貺羊公起平吳之策其見天地之心焉昔齊有黔夫燕人北門之鬼趙有李牧秦王罷東并之勢桑枝不競瓜潤空慚垂大信於南服傾吳人於漢渚江衢如砥襁袂同歸而在乎成功弗居幅巾窮巷落落焉其有風者也杜預不有生知用之則習振長策而攻取兼儒風而轉戰孔門稱四則仰止其三春秋有五而獨擅其一不其優歟夫三年之喪云無貴賤輕纖奪於在位可以興嗟既葬釋於儲君何其斯酷徇以苟合不求其正以當代之元良為諸侯之庶子檀弓習於變禮者也杜預其有焉贊曰漢池西險吳江左迴羊公恩信百萬歸來昔之誓旅懷經罕素元凱文場稱為武庫
