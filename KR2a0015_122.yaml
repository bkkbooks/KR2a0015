body:
  text: 晉書卷一百二十二載記第二十二呂光呂光字世明略陽氐人也其先呂文和漢文帝初自沛避難徙焉世為酋豪父婆樓佐命苻堅官至太尉光生于枋頭夜有神光之異故以光為名年十歲與諸童兒遊戲邑里為戰陳之法儔類咸推為主部分詳平羣童歎服不樂讀書唯好鷹馬及長身長八尺四寸目重瞳子左肘有肉印沈毅凝重寬簡有大量喜怒不形于色時人莫之識也惟王猛異之曰此非常人言之苻堅舉賢良除美陽令夷夏愛服遷鷹揚將軍從堅征張平戰于銅壁刺平養子蚝中之自是威名大著苻雙反于秦州堅將楊成世為雙將苟興所敗光與王鑒討之鑒欲速戰光曰興初破成世姦氣漸張宜持重以待其弊興乘勝輕來糧竭必退退而擊之可以破也二旬而興退諸將不知所為光曰揆其姦計必攻榆眉若得榆眉據城斷路資儲復贍非國之利也宜速進師若興攻城尤須赴救如其奔也彼糧既盡可以滅之鑒從焉果敗興軍從王猛滅慕容暐封都亭侯苻重之鎮洛陽以光為長史及重謀反苻堅聞之曰呂光忠孝方正必不同也馳使命光檻重送之尋入為太子右率甚見敬重蜀人李焉聚衆二萬攻逼益州堅以光為破虜將軍率兵討滅之遷步兵校尉苻洛反光又擊平之拜驍騎將軍堅既平山東士馬強盛遂有圖西域之志乃授光使持節都督西討諸軍事率將軍薑飛彭晃杜進康盛等總兵七萬鐵騎五千以討西域以隴西董方馮翊郭抱武威賈虔弘農楊穎為四府佐將堅太子宏執光手曰君器相非常必有大福宜深保愛行至高昌聞堅寇晉光欲更須後命部將杜進曰節下受任金方赴機宜速有何不了而更留乎光乃進及流沙三百餘里無水將士失色光曰吾聞李廣利精誠玄感飛泉涌出吾等豈獨無感致乎皇天必將有濟諸君不足憂也俄而大雨平地三尺進兵至焉耆其王泥流率其旁國請降龜茲王帛純距光光軍其城南五里為一營深溝高壘廣設疑兵以木為人被之以甲羅之壘上帛純驅徙城外人入于城中附庸侯王各嬰城自守至是光左臂內脈起成字文曰巨霸營外夜有一黑物大如斷堤搖動有頭角目光若電及明而雲霧四周遂不復見旦視其處南北五里東西三十餘步鱗甲隱地之所昭然猶在光笑曰黑龍也俄而雲起西北暴雨滅其迹杜進言於光曰龍者神人君利見之象易曰見龍在田德施普也斯誠明將軍道合靈和德符幽顯願將軍勉之以成大慶光有喜色又進攻龜茲城夜夢金象飛越城外光曰此謂佛神去之胡必亡矣光攻城既急帛純乃傾國財寶請救獪胡獪胡弟訥龍侯將馗率騎二十餘萬并引溫宿尉頭等國王合七十餘萬以救之胡便弓馬善矛矟鎧如連鎖射不可入以革索為策馬擲人多有中者衆甚憚之諸將咸欲每營結陳案兵以距之光曰彼衆我寡營又相遠勢分力散非良策也於是遷營相接陳為勾鎖之法精騎為遊軍彌縫其闕戰于城西大敗之斬萬餘級帛純收其珍寶而走王侯降者三十餘國光入其城大饗將士賦詩言志見其宮室壯麗命參軍京兆段業著龜茲宮賦以譏之胡人奢侈厚於養生家有蒲桃酒或至千斛經十年不敗士卒淪沒酒藏者相繼矣諸國憚光威名貢款屬路乃立帛純弟震為王以安之光撫寧西域威恩甚著桀黠胡王昔所未賓者不遠萬里皆來歸附上漢所賜節傳光皆表而易之堅聞光平西域以為使持節散騎常侍都督玉門已西諸軍事安西將軍西域校尉道絶不通光既平龜茲有留焉之志時始獲鳩摩羅什羅什勸之東還語在西夷傳光於是大饗文武博議進止衆咸請還光從之以駝二萬餘頭致外國珍寶及奇伎異戲殊禽怪獸千有餘品駿馬萬餘匹而苻堅高昌太守楊翰説其涼州刺史梁熙距守高桐伊吾二關熙不從光至高昌翰以郡迎降初光聞翰之説惡之又聞苻堅喪敗長安危逼謀欲停師杜進諫曰梁熙文雅有餘機鑒不足終不能納善從説也願不足憂之聞其上下未同宜在速進進而不捷請受過言之誅光從之及至玉門梁熙傳檄責光擅命還師遣子胤與振威姚皓別駕衛翰率衆五萬距光于酒泉光報檄涼州責熙無赴難之誠數其遏歸師之罪遣彭晃杜進薑飛等為前鋒擊胤大敗之胤輕將麾下數百騎東奔杜進追擒之於是四山胡夷皆來款附武威太守彭濟執熙請降光入姑臧自領涼州刺史護羌校尉表杜進為輔國將軍武威太守封武始侯自餘封拜各有差光主簿尉祐姦佞傾薄人也見棄前朝與彭濟同謀執梁熙光深見寵任乃譖誅南安姚皓天水尹景等名士十餘人遠近頗以此離二光尋擢祐為寧遠將軍金城太守祐次允吾襲據外城以叛祐從弟隨據鸇陰以應之光遣其將魏真討隨隨敗奔祐光將薑飛又擊敗祐衆祐奔據興城扇動百姓夷夏多從之飛司馬張象參軍郭雅謀殺飛應祐發覺逃奔初苻堅之敗張天錫南奔其世子大豫為長水校尉王穆所匿及堅還長安穆將大豫奔禿髮思復鞬思復鞬送之魏安是月魏安人焦松齊肅張濟等起兵數千迎大豫於揟次陷昌松郡光遣其將杜進討之為大豫所敗大豫遂進逼姑臧求決勝負王穆諫曰呂光糧豐城固甲兵精鋭逼之非利不如席卷嶺西厲兵積粟東向而爭不及期年可以平也大豫不從乃遣穆求救於嶺西諸郡建康太守李隰祁連都尉嚴純及閻襲起兵應之大豫進屯城西王穆率衆三萬及思復鞬子奚于等陳于城南光出擊破之斬奚于等二萬餘級光謂諸將曰大豫若用王穆之言恐未可平也諸將曰大豫豈不及此邪皇天欲贊成明公八百之業故令大豫迷於良算耳光大悅賜金帛有差大豫自西郡詣臨洮驅略百姓五千餘戶保據俱城光將彭晃徐炅攻破之大豫奔廣武穆奔建康廣武人執大豫送之斬于姑臧巿光至是始聞苻堅為姚萇所害奮怒哀號三軍縞素大臨于城南偽諡堅曰文昭皇帝長吏百石已上服斬縗三月庶人哭泣三日光於是大赦境內建元曰太安自稱使持節侍中中外大都督督隴右河西諸軍事大將軍領護胸奴中郎將涼州牧酒泉公王穆襲據酒泉自稱大將軍涼州牧時穀價踊貴斗直五百人相食死者太半光西平太守康寧自稱胸奴王阻兵以叛光屢遣討之不捷初光之定河西也杜進有力焉以為輔國將軍武威太守既居都尹權高一時出入羽儀與光相亞光甥石聰至自關中光曰中州人言吾政化何如聰曰止知有杜進耳實不聞有舅光默然因此誅進光後宴羣僚酒酣語及政事時刑法峻重參軍段業進曰嚴刑重憲非明王之義也光曰商鞅之法至峻而兼諸侯吳起之術無親而荊蠻以霸何也業曰明公受天眷命方君臨四海景行堯舜猶懼有弊奈何欲以商申之末法臨道義之神州豈此州士女所望於明公哉光改容謝之於是下令責躬及崇寬簡之政其將徐炅與張掖太守彭晃謀叛光遣師討炅炅奔晃晃東結康寧西通王穆光議將討之諸將咸曰今康寧在南阻兵伺隙若大駕西行寧必乘虛出于嶺左晃穆未平康寧復至進退狼狽勢必大危光曰事勢實如卿言今而不往當坐待其來晃穆共相脣齒寧又同惡相救東西交至城外非吾之有若是大事去矣今晃叛逆始爾寧穆與之情契未密及其倉卒取之為易且隆替命也卿勿復言光於是自率步騎三萬倍道兼行既至攻之二旬晃將寇顗斬關納光於是誅彭晃王穆以其黨索嘏為敦煌太守既而忌其威名率衆攻嘏光聞之謂諸將曰二虜相攻此成擒也光將攻之衆咸以為不可光曰取亂侮亡武之善經不可以纍征之勞而失永逸之舉率步騎二萬攻酒泉克之進次涼興穆引師東還路中衆散穆單騎奔騂馬騂馬令郭文斬首送之是時麟見金澤縣百獸從之光以為己瑞以孝武太元十四年僭即三河王位置百官自丞郎已下赦其境內年號麟嘉光妻石氏子紹弟德世至自仇池光迎于城東大饗羣臣遣其子左將軍他武賁中郎將纂討北虜匹勤于三巖山大破之立妻石氏為王妃子紹為世子宴其羣臣于內苑新堂太廟新成追尊其高祖為敬公曾祖為恭公祖為宣公父為景昭王母曰昭烈妃其中書侍郎楊穎上疏請依三代故事追尊呂望為始祖永為不遷之廟光從之是歲張掖督郵傅曜考核屬縣而丘池令尹興殺之投諸空井曜見夢於光曰臣張掖郡小吏案校諸縣而丘池令尹興贓狀狼藉懼臣言之殺臣投於南亭空井中臣衣服形狀如是光寤而猶見久之乃滅遣使覆之如夢光怒殺興著作郎段業以光未能揚清激濁使賢愚殊貫因療疾于天梯山作表志詩九歎七諷十六篇以諷焉光覽而悅之南羌彭奚念入攻白土都尉孫峙退奔興城光遣其南中郎將呂方及其弟右將軍呂寶振威楊範強弩竇苟討乞伏乾歸于金城方屯河北寶進師濟河為乾歸所敗寶死之武賁呂纂強弩竇苟率步騎五千南討彭奚念戰于盤夷大敗而歸光親討乾歸奚念遣纂及揚武楊軌建忠沮渠羅仇建武梁恭軍于左南奚念大懼于白土津纍石為堤以水自固遣精兵一萬距守河津光遣將軍王寶潛趣上津夜渡湟河光濟自石堤攻克枹罕奚念單騎奔甘松光振旅而旋初光徙西海郡人於諸郡至是謠曰朔馬心何悲念舊中心勞燕雀何徘徊意欲還故巢頃之遂相扇動復徙之於西河樂都羣議以高昌雖在西垂地居形勝外接胡虜易生翻覆宜遣子弟鎮之光以子覆為使持節鎮西將軍都督玉門已西諸軍事西域大都護鎮高昌命大臣子弟隨之光於是以太元二十一年僭即天王位大赦境內改年龍飛立世子紹為太子諸子弟為公侯者二十人中書令王詳為尚書左僕射段業等五人為尚書乾歸從弟軻彈來奔光下書曰乾歸狼子野心前後反覆朕方東清秦趙勒銘會稽豈令豎子鴟峙洮南且其兄弟內相離間可乘之機勿過今也其敕中外戒嚴朕當親討光於是次于長最使呂纂率楊軌竇苟等步騎三萬攻金城乾歸率衆二萬救之光遣其將王寶徐炅率騎五千邀之乾歸懼而不進光又遣其將梁恭金石生以甲卒萬餘出陽武下峽與秦州刺史沒奕于攻其東光弟天水公延以枹罕之衆攻臨洮武始河關皆克之呂纂克金城擒乾歸金城太守衛鞬鞬瞋目謂光曰我寧守節斷頭不為降虜也光義而免之乾歸因大震泣歎曰死中求生正在今日也乃縱反間稱乾歸衆潰東奔成紀呂延信之引師輕進延司馬耿稚諫曰乾歸雄勇過人權略難測破王廣克楊定皆羸師以誘之雖蕞爾小國亦不可輕也困獸猶鬬況乾歸而可望風自散乎且告者視高而色動必為姦計而今宜部陳而前步騎相接徐待諸軍大集可一舉滅之延不從與乾歸相遇戰敗死之耿稚及將軍薑顯收集散卒屯于枹罕光還于姑臧光荒耄信讒殺尚書沮渠羅仇三河太守沮渠麴粥羅仇弟子蒙遜叛光殺中田護軍馬邃攻陷臨松郡屯兵金山大為百姓之患蒙遜從兄男成先為將軍守晉昌聞蒙遜起兵逃奔資虜扇動諸夷衆至數千進攻福祿建安寧戎護軍趙策擊敗之男成退屯樂涫呂纂敗蒙遜于忽谷酒泉太守壘澄率將軍趙策趙陵步騎萬餘討男成于樂涫戰敗澄策死之男成進攻建康説太守段業曰呂氏政衰權臣擅命刑罰失中人不堪役一州之地叛者連城瓦解之勢昭然在目百姓嗷然無所宗附府君豈可以蓋世之才而立忠於垂亡之世男成等既唱大義欲屈府君撫臨鄙州使塗炭之餘蒙來蘇之惠業不從相持二旬而外救不至郡人高逵史惠等言於業曰今孤城獨立臺無救援府君雖心過田單而地非即墨宜思高算轉禍為福業先與光侍中房晷僕射王詳不平慮不自容乃許之男成等推業為大都督龍驤大將軍涼州牧建康公光命呂纂討業沮渠蒙遜進屯臨洮為業聲勢戰于合離纂師大敗光散騎常侍太常郭黁明天文善占候謂王詳曰於天文涼之分野將有大兵主上老病太子沖暗纂等凶武一旦不諱必有難作以吾二人久居內要常有不善之言恐禍及人深宜慮之田胡王氣乞機部衆最強二苑之人多其故衆吾今與公唱義推機為主則二苑之衆盡我有也克城之後徐更圖之詳以為然夜燒光洪範門二苑之衆皆附之詳為內應事發光誅之黁遂據東苑以叛光馳使召纂諸將勸纂曰業聞師回必躡軍後若潛師夜還庶無後患矣纂曰業雖憑城阻衆無雄略之才若夜潛還張其姦志乃遣使告業曰郭黁作亂吾今還都卿能決者可出戰於是引還業不敢出纂司馬楊統謂其從兄桓曰郭黁明善天文起兵其當有以京城之外非復朝廷之有纂今還都復何所補統請除纂勒兵推兄為盟主西襲呂弘據張掖以號令諸郡亦千載一時也桓怒曰吾聞臣子之事君親有隕無二吾未有包胥存救之效豈可安榮其祿亂增其難乎呂宗若敗吾為弘演矣統懼至番禾遂奔郭黁黁遣軍邀纂于白石纂大敗光西安太守石元良率步騎五千赴難與纂共擊黁軍破之遂入于姑臧黁之叛也得光孫八人于東苑及軍敗恚甚悉投之于鋒刃之上枝分節解飲血盟衆衆皆掩目不忍視之黁悠然自若黁推後將軍楊軌為盟主軌自稱大將軍涼州牧西平公呂纂擊黁將王斐于城西大破之自是黁勢漸衰光遺楊軌書曰自羌胡不靖郭黁叛逆南藩安否音問兩絶行人風傳云卿擁逼百姓為黁脣齒卿雅志忠貞有史魚之操鑒察成敗遠侔古人豈宜聽納姦邪以虧大美陵霜不雕者松柏也臨難不移者君子也何圖松柏雕於微霜雞鳴已於風雨郭黁巫卜小數時或誤中考之大理率多虛謬朕宰化寡方澤不逮遠致世事紛紜百城離叛勠力一心同濟巨海者望之於卿也今中倉積粟數百千萬東人戰士一當百餘入則言笑晏晏出則武步涼州吞黁咀業綽有餘暇但與卿形雖君臣心過父子欲全卿名節不使貽笑將來軌不答率步騎二萬北赴郭黁至姑臧壘于城北軌以士馬之盛議欲大決成敗黁每以天文裁之呂弘為段業所逼光遣呂纂迎之軌謀於衆曰呂弘精兵一萬若與光合則敵強我弱養獸不討將為後患遂率兵邀纂纂擊敗之郭黁聞軌敗東走魏安遂奔于乞伏乾歸楊軌聞黁走南奔廉川光疾甚立其太子紹為天王自號太上皇帝以呂纂為太尉呂弘為司徒謂紹曰吾疾病唯增恐將不濟三寇窺迭伺國隙吾終之後使纂統六軍弘管朝政汝恭己無為委重二兄庶可以濟若內相猜二釁起蕭牆則晉趙之變旦夕至矣又謂纂弘曰永業才非撥亂直以正嫡有常猥居元首今外有強寇人心未寧汝兄弟緝穆則貽厥萬世若內自相圖則禍不旋踵纂弘泣曰不敢有二心光以安帝隆安三年死時年六十三在位十年偽諡懿武皇帝廟號太祖墓號高陵呂纂纂字永緒光之庶長子也少便弓馬好鷹犬苻堅時入太學不好讀書唯以交結公侯聲樂為務及堅亂西奔上邽轉至姑臧拜武賁中郎將封太原公光死呂紹祕不發喪纂排閣入哭盡哀而出紹懼為纂所害以位讓之曰兄功高年長宜承大統願兄勿疑纂曰臣雖年長陛下國家之冢嫡不可以私愛而亂大倫紹固以讓纂纂不許之及紹嗣偽位呂超言於紹曰纂統戎積年威震內外臨喪不哀步高視遠觀其舉止亂常恐成大變宜早除之以安社稷紹曰先帝顧命音猶在耳兄弟至親豈有此乎吾弱年而荷大任方賴二兄以寧家國縱其圖我我視死如歸終不忍有此意也卿慎勿過言超曰纂威名素盛安忍無親今不圖之後必噬臍矣紹曰吾每念袁尚兄弟未曾不痛心忘寢食寧坐而死豈忍行之超曰聖人稱知機其神陛下臨機不斷臣見大事去矣既而纂見紹於湛露堂超執刀侍紹目纂請收之紹弗許初光欲立弘為世子會聞紹在仇池乃止弘由是有憾於紹遣尚書薑紀密告纂曰先帝登遐主上暗弱兄總攝內外威恩被于遐邇輒欲遠追廢昌邑之義以兄為中宗何如纂於是夜率壯士數百踰北城攻廣夏門弘率東苑之衆斫洪範門左衛齊從守融明觀逆問之曰誰也衆曰太原公從曰國有大故主上新立太原公行不由道夜入禁城將為亂邪因抽劍直前斫纂中額纂左右擒之纂曰義士也勿殺紹遣武賁中郎將呂開率其禁兵距戰于端門驍騎呂超率卒二千赴之衆素憚纂悉皆潰散纂入自青角門升于謙光殿紹登紫閣自殺呂超出奔廣武纂憚弘兵強勸弘即位弘曰自以紹弟也而承大統衆心不順是以違先帝遺敕慚負黃泉今復越兄而立何面目以視息世間大兄長且賢威名振于二賊宜速即大位以安國家纂以隆安四年遂僭即天王位大赦境內改元為咸寧諡紹為隱王以弘為使持節侍中大都督都督中外諸軍事大司馬車騎大將軍司隸校尉録尚書事改封番禾郡公其餘封拜各有差纂謂齊從曰卿前斫我一何甚也從泣曰隱王先帝所立陛下雖應天順時而微心未達惟恐陛下不死何謂甚也纂嘉其忠善遇之纂遣使謂征東呂方曰超實忠臣義勇可嘉但不識經國大體權變之宜方賴其忠節誕濟世難可以此意諭之超上疏陳謝纂復其爵位呂弘自以功名崇重恐不為纂所容纂亦深忌之弘遂起兵東苑劫尹文楊桓以為謀主請宗燮俱行燮曰老臣受先帝大恩位為列棘不能隕身授命死有餘罪而復從殿下親為戎首者豈天地所容乎且智不能謀衆不足恃將焉用之弘曰君為義士我為亂臣乃率兵攻纂纂遣其將焦辨擊弘弘衆潰出奔廣武纂縱兵大掠以東苑婦女賞軍弘之妻子亦為士卒所辱纂笑謂羣臣曰今日之戰何如其侍中房晷對曰天禍涼室釁起戚藩先帝始崩隱王幽逼山陵甫訖大司馬驚疑肆逆京邑交兵友于接刃雖弘自取夷滅亦由陛下無棠棣之義宜考己責躬以謝百姓而反縱兵大掠幽辱士女釁自由弘百姓何罪且弘妻陛下之弟婦也弘女陛下之姪女也奈何使無賴小人辱為婢妾天地神明豈忍見此遂歔欷悲泣纂改容謝之召弘妻及男女于東宮厚撫之呂方執弘繫獄馳使告纂纂遣力士康龍拉殺之是月立其妻楊氏為皇后以楊氏父桓為散騎常侍尚書左僕射涼都尹封金城侯纂將伐禿髮利鹿孤中書令楊穎諫曰夫起師動衆必參之天人苟非其時聖賢所不為禿髮利鹿孤上下用命國未有釁不可以伐宜繕甲養鋭勸課農殖待可乘之機然後一舉蕩滅比年多事公私罄竭不深根固本恐為患將來願抑赫斯之怒思萬全之算纂不從度浩亹河為鹿孤弟檀所敗遂西襲張掖薑紀諫曰方今盛夏百姓廢農所利既少所喪者多若師至嶺西虜必乘虛寇抄都下宜且回師以為後圖纂曰虜無大志聞朕西征正可自固耳今速襲之可以得志遂圍張掖略地建康聞檀寇姑臧乃還即序胡安據盜發張駿墓見駿貌如生得真珠簏琉璃榼白玉樽赤玉簫紫玉笛珊瑚鞭馬腦鍾水陸奇珍不可勝紀纂誅安據黨五十餘家遣使弔祭駿并繕修其墓道士句摩羅耆婆言於纂曰潛龍屢出豕犬見妖將有下人謀上之禍宜增修德政以答天戒纂納之耆婆即羅什之別名也纂遊田無度荒耽酒色其太常楊穎諫曰臣聞皇天降鑒惟德是與德由人弘天應以福故勃焉之美奄在聖躬大業已爾宜以道守之廓靈基於日新邀洪福於萬祀自陛下龍飛疆宇未闢崎嶇二嶺之內綱維未振於九州當兢兢夕惕經略四方成先帝之遺志拯蒼生於荼蓼而更飲酒過度出入無宴安遊盤之樂沈湎樽酒之間不以寇讐為慮竊為陛下危之糟丘酒池洛汭不返皆陛下之殷鑒臣蒙先帝夷險之恩故不敢避干將之戮纂曰朕之罪也不有貞亮之士誰匡邪僻之君然昏虐自任終不能改常與左右因醉馳獵於坑澗之間殿中侍御史王回中書侍郎王儒扣馬諫曰千金之子坐不垂堂萬乘之主清道而行奈何去輿輦之安冒奔騎之危銜之變動有不測之禍愚臣竊所不安敢以死爭願陛下遠思袁盎攬轡之言不令臣等受譏千載纂不納纂番禾太守呂超擅伐鮮卑思盤思盤遣弟乞珍訴超於纂纂召超將盤入朝超至姑臧大懼自結於殿中監杜尚纂見超怒曰卿恃兄弟桓桓欲欺吾也要當斬卿然後天下可定超頓首不敢纂因引超及其諸臣宴于內殿呂隆屢勸纂酒已至昏醉乘步挽車將超等遊于內至琨華堂東閣車不得過纂親將竇川駱騰倚劍於壁推車過閣超取劍擊纂纂下車擒超超刺纂洞胸奔于宣德堂川騰與超格戰超殺之纂妻楊氏命禁兵討超杜尚約兵舍杖將軍魏益多入斬纂首以徇曰纂違先帝之命殺害太子荒耽酒獵昵近小人輕害忠良以百姓為草芥番禾太守超以骨肉之親懼社稷顛覆已除之矣上以安宗廟下為太子報仇凡我士庶同茲休慶偽巴西公呂他隴西公呂緯時在北城或説緯曰超陵天逆上士衆不附明公以懿弟之親投戈而起薑紀焦辨在南城楊桓田誠在東苑皆我之黨也何慮不濟緯乃嚴兵謂他曰隆超弒逆所宜擊之昔田之亂孔子鄰國之臣猶抗言於哀公況今蕭牆有難而可坐觀乎他將從之他妻梁氏止之曰緯超俱兄弟之子何為舍超助緯而為禍首乎他謂緯曰超事已立據武庫擁精兵圖之為難且吾老矣無能為也超聞登城告他曰纂信讒言將滅超兄弟超以身命之切且懼社稷覆亡故出萬死之計為國家唱義叔父當有以亮之超弟邈有寵於緯説緯曰纂殘國破家誅戮兄弟隆超此舉應天人之心正欲尊立明公耳先帝之子明公為長四海顒顒人無異議隆超雖不達臧否終不以孽代宗更圖異望也願公勿疑緯信之與隆超結盟單馬入城超執而殺之初纂嘗與鳩摩羅什殺羅什子曰斫胡奴頭羅什曰不斫胡奴頭胡奴斫人頭超小字胡奴竟以殺纂纂在位三年以元興元年死隆既纂位偽諡纂靈皇帝墓號白石陵呂隆隆字永基光弟寶之子也美姿貌善騎射光末拜北部護軍稍歷顯位有聲稱超既殺纂讓位於隆隆有難色超曰今猶乘龍上天豈可中下隆以安帝元興元年遂僭即天王位超先於番禾得小鼎以為神瑞大赦改元為神鼎追尊父寶為文皇帝母衛氏為皇太后妻楊氏為皇后以弟超有佐命之勳拜使持節侍中都督中外諸軍事輔國大將軍司隸校尉録尚書事封安定公隆多殺豪望以立威名內外囂然人不自固魏安人焦朗遣使説姚興將姚碩德曰呂氏因秦之亂制命此州自武皇棄世諸子競尋干戈德刑不恤殘暴是先飢饉流亡死者太半唯泣訴昊天而精誠無感伏惟明公道邁前賢任尊分陝宜兼弱攻昧經略此方救生靈之沈溺布徽政于玉門纂奪之際為功不難遣妻子為質碩德遂率衆至姑臧其部將姚國方言於碩德曰今懸師三千後無繼援師之難也宜曜徑鋒示其威武彼以我遠來必決死距戰可一舉而平碩德從之呂超出戰大敗遁還隆收集離散嬰城固守時熒惑犯帝坐有羣雀鬬于太廟死者數萬東人多謀外叛將軍魏益多又唱動羣心乃謀殺隆超事發誅之死者三百餘家於是羣臣表求與姚興通好隆弗許呂超諫曰通塞有時艱泰相襲孫權屈身於魏譙周勸主迎降豈非大丈夫哉勢屈故也天錫承七世之資樹恩百載武旅十萬謀臣盈朝秦師臨境識者導以見機而愎諫自專社稷為墟前鑒不遠我之元龜也何惜尺書單使不以危易安且令卑辭以退敵然後內修德政廢興由人未損大略隆曰吾雖常人屬當家國之重不能嗣守成基保安社稷以太祖之業委之於人何面目見先帝於地下超曰應龍以屈伸為靈大人以知機為美今連兵積歲資儲內盡強寇外逼百姓嗷然無糊口之寄假使張陳韓白亦無如之何陛下宜思權變大綱割區區常慮苟卜世有期不在和好若天命去矣宗族可全隆從之乃請降碩德表隆為使持節鎮西大將軍涼州刺史建康公於是遣母弟愛子文武舊臣慕容築楊穎史難閻松等五十餘家質于長安碩德乃還姚興謀臣皆曰隆藉伯父餘資制命河外今雖飢窘尚能自支若將來豐贍終非國有涼州險絶世難先違道清後順不如因其飢弊而取之興乃遣使來觀虛實沮渠蒙遜又伐隆隆擊敗之蒙遜請和結盟留穀萬餘斛以振飢人姑臧穀價踊貴斗直錢五千文人相食餓死者十餘萬口城門晝閉樵採路絶百姓請出城乞為夷虜奴婢者日有數百隆懼沮動人情盡坑之於是積尸盈于衢路禿髮檀及蒙遜頻來伐之隆以二寇之逼也遣超率騎二百多齎珍寶請迎于姚興興乃遣其將齊難等步騎四萬迎之難至姑臧隆素車白馬迎于道旁使胤告光廟曰陛下往運神略開建西夏德被蒼生威振遐裔枝嗣不臧迭相纂弒二虜交逼將歸東京謹與陛下奉訣於此歔欷慟泣酸感興軍隆率騎一萬隨難東遷至長安興以隆為散騎常侍公如故超為安定太守文武三十餘人皆擢之其後隆坐與子弼謀反為興所誅呂光以孝武太元十二年定涼州十五年僭立至隆凡十有三載以安帝元興三年滅史臣曰自晉室不綱中原蕩析苻氏乘釁竊號神州世明委質偽朝位居上將爰以心膂受脤遐征鐵騎如雲出玉門而長騖雕戈耀景捐金丘而一息蕞爾夷陬承風霧卷宏圖壯節亦足稱焉屬永固運銷羣雄競起班師右地便有覬覦於是要結六戎潛窺雁鼎并吞五郡遂假鴻名控黃河以設險負玄漠而為固自謂克昌霸業貽厥孫謀尋而耄及政昏親離衆叛瞑目甫爾釁發蕭牆紹纂凡才負乘致寇弘超凶狡職為亂階永基庸庸面縛姚氏昔竇融歸順榮煥纍葉隗囂干紀靡終身世而光棄茲勝躅遵彼覆車十數年間終致殘滅向使矯邪歸正革偽為忠鳴檄而蕃晉朝仗義而誅醜虜則燕秦之地可定桓文之功可立郭黁段業豈得肆其姦蒙遜烏孤無所窺其隙矣而猥竊非據何其謬哉夫天地之大德曰生聖人之大寶曰位非其人而處其位者其禍必速在其位而忘其德者其殃必至天鑒非遠庸可濫乎贊曰金行不競寶業斯屯瓜分九𧜛沴聚三秦呂氏伺隙欺我人神天命難假終亦傾淪
