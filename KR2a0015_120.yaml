body:
  text: 晉書卷一百二十載記第二十李特李特字玄休巴西宕渠人其先廩君之苗裔也昔武落鍾離山崩有石穴二所其一赤如丹一黑如漆有人出於赤穴者名曰務相姓巴氏有出于黑穴者凡四姓曰曎氏樊氏柏氏鄭氏五姓俱出皆爭為神於是相與以劍刺穴屋能著者以為廩君四姓莫著而務相之劍懸焉又以土為船雕畫之而浮水中曰若其船浮存者以為廩君務相船又獨浮於是遂稱廩君乘其土船將其徒卒當夷水而下至於鹽陽鹽陽水神女子止廩君曰此魚鹽所有地又廣大與君俱生可止無行廩君曰我當為君求廩地不能止也鹽神夜從廩君宿旦輒去為飛蟲諸神皆從其飛蔽日晝昏廩君欲殺之不可別又不知天地東西如此者十日廩君乃以青縷遺鹽神曰嬰此即宜之與汝俱生弗宜將去汝鹽神受而嬰之廩君立碭石之上望膺有青縷者跪而射之中鹽神鹽神死羣神與俱飛者皆去天乃開朗廩君復乘土船下及夷城夷城石岸曲泉水亦曲廩君望如穴狀歎曰我新從穴中出今又入此奈何岸即為崩廣三丈餘而階陛相乘廩君登之岸上有平石方一丈長五尺廩君休其上投策計算皆著石焉因立城其旁而居之其後種類遂繁秦并天下以為黔中郡薄賦斂之口歲出錢四十巴人呼賦為賨因謂之賨人焉及漢高祖為漢王募賨人平定三秦既而求還鄉里高祖以其功復同豐沛不供賦稅更名其地為巴郡土有鹽鐵丹漆之饒俗性剽勇又善歌舞高祖愛其舞詔樂府習之今巴渝舞是也漢末張魯居漢中以鬼道教百姓賨人敬信巫覡多往奉之值天下大亂自巴西之宕渠遷于漢中楊車坂抄掠行旅百姓患之號為楊車巴魏武帝克漢中特祖將五百餘家歸之魏武帝拜為將軍遷於略陽北土復號之為巴氐特父慕為東羌獵將特少仕州郡見異當時身長八尺雄武善騎射沈毅有大度元康中氐齊萬年反關西擾亂頻歲大飢百姓乃流移就穀相與入漢川者數萬家特隨流人將入于蜀至劍閣箕踞太息顧眄險阻曰劉禪有如此之地而面縛於人豈非庸才邪同移者閻式趙肅李遠任回等咸歎異之初流人既至漢中上書求寄食巴蜀朝議不許遣侍御史李苾持節慰勞且監察之不令入劍閣苾至漢中受流人貨賂反為表曰流人十萬餘口非漢中一郡所能振贍東下荊州水湍迅險又無舟船蜀有倉儲人復豐稔宜令就食朝廷從之由是散在益梁不可禁止永康元年詔徵益州刺史趙廞為大長秋以成都內史耿滕代廞廞遂謀叛潛有劉氏割據之志乃傾倉廩振施流人以收衆心特之黨類皆巴西人與廞同郡率多勇壯廞厚遇之以為爪牙故特等聚衆專為寇盜蜀人患之滕密上表以為流人剛剽而蜀人磱弱客主不能相制必為亂階宜使移還其本若致之險地將恐秦雍之禍萃於梁益必貽聖朝西顧之憂廞聞而惡之時益州文武千餘人已往迎滕滕率衆入州廞遣衆逆滕戰于西門滕敗死之廞自稱大都督大將軍益州牧特弟庠與兄弟及妹夫李含任回上官惇扶風李攀始平費他氐苻成隗伯等以四千騎歸廞廞以庠為威寇將軍使斷北道庠素東羌良將曉軍法不用麾幟舉矛為行伍斬部下不用命者三人部陳肅然廞惡其齊整欲殺之而未言長史杜淑司馬張粲言於廞曰傳云五大不在邊將軍起兵始爾便遣李庠握強兵於外愚竊惑焉且非我族類其心必異倒戈授人竊以為不可願將軍圖之廞斂容曰卿言正當吾意可謂起豫者商此天使卿等成吾事也會庠在門請見廞廞大悅引庠見之庠欲觀廞意旨再拜進曰今中國大亂無復綱維晉室當不可復興也明公道格天地德被區宇湯武之事實在於今宜應天時順人心拯百姓於塗炭使物情知所歸則天下可定非但庸蜀而已廞怒曰此豈人臣所宜言令淑等議之於是淑等上庠大逆不道廞乃殺之及其子姪宗族三十餘人廞慮特等為難遣人喻之曰庠非所宜言罪應至死不及兄弟以庠尸還特復以特兄弟為督將以安其衆牙門將許弇求為巴東監軍杜淑張粲固執不許弇怒於廞閣下手刃殺淑粲淑粲左右又殺弇皆廞腹心也特兄弟既以怨廞引兵歸綿竹廞恐朝廷討己遣長史費遠犍為太守李苾督護常俊督萬餘人斷北道次綿竹之石亭特密收合得七千餘人夜襲遠軍遠大潰因放火燒之死者十八九進攻成都廞聞兵至驚懼不知所為李苾張徵等夜斬關走出文武盡散廞獨與妻子乘小船走至廣都為下人朱竺所殺特至成都縱兵大掠害西夷護軍薑發殺廞長史袁洽及廞所置守長遣其牙門王角李基詣洛陽陳廞之罪狀先是惠帝以梁州刺史羅尚為平西將軍領護西夷校尉益州刺史督牙門將王敦上庸都尉義歆蜀郡太守徐儉廣漢太守辛冉等凡七千餘人入蜀特等聞尚來甚懼使其弟驤於道奉迎并貢寶物尚甚悅以驤為騎督特及弟流復以牛酒勞尚於綿竹王敦辛冉並説尚曰特等流人專為盜賊急宜梟除可因會斬之尚不納冉先與特有舊因謂特曰故人相逢不吉當凶矣特深自猜懼尋有符下秦雍州凡流人入漢川者皆下所在召還特兄輔素留鄉里託言迎家既至蜀謂特曰中國方亂不足復還特以為然乃有雄據巴蜀之意朝廷以討趙廞功拜特宣威將軍封長樂鄉侯流為奮威將軍武陽侯璽書下益州條列六郡流人與特協同討廞者將加封賞會辛冉以非次見徵不願應召又欲以滅廞為己功乃寢朝命不以實上衆咸怨之羅尚遣從事催遣流人限七月上道辛冉性貪暴欲殺流人首領取其資貨乃移檄發遣又令梓潼太守張演於諸要施關搜索寶貨特等固請求至秋收流人布在梁益為人傭力及聞州郡逼遣人人愁怨不知所為又知特兄弟頻請求停皆感而恃之且水雨將降年穀未登流人無以為行資遂相與詣特特乃結大營於綿竹以處流人移冉求自寬冉大怒遣人分榜通逵購募特兄弟許以重賞特見大懼悉取以歸與驤改其購云能送六郡之豪李任閻趙楊上官及氐叟侯王一首賞百匹流人既不樂移咸往歸特騁馬屬鞬同聲雲集旬月間衆過二萬流亦聚衆數千特乃分為二營特居北營流居東營特遣閻式詣羅尚求申期式既至見冉營柵衝要謀掩流人歎曰無寇而城讎必保焉今而速之亂將作矣又知冉及李苾意不可回乃辭尚還綿竹尚謂式曰子且以吾意告諸流人今聽寬矣式曰明公惑於姦説恐無寬理弱而不可輕者百姓也今促之不以理衆怒難犯恐為禍不淺尚曰然吾不欺子子其行矣式至綿竹言於特曰尚雖云爾然未可必信也何者尚威刑不立冉等各擁強兵一旦為變亦非尚所能制深宜為備特納之冉苾相與謀曰羅侯貪而無斷日復一日流人得展姦計李特兄弟並有雄才吾屬將為豎子虜矣宜為決計不足復問之乃遣廣漢都尉曾元牙門張顯劉並等潛率步騎三萬襲特營羅尚聞之亦遣督護田佐助元特素知之乃繕甲厲兵戒嚴以待之元等至特安臥不動待其衆半入發伏擊之殺傷者甚衆害田佐曾元張顯傳首以示尚冉尚謂將佐曰此虜成去矣而廣漢不用吾言以張賊勢今將若之何於是六郡流人推特為主特命六郡人部曲督李含上邽令任臧始昌令閻式諫議大夫李攀陳倉令李武陰平令李遠將兵都尉楊褒等上書請依梁統奉竇融故事推特行鎮北大將軍承制封拜其弟流行鎮東將軍以相鎮統於是進兵攻冉於廣漢冉衆出戰特每破之尚遣李苾及費遠率衆救冉憚特不敢進冉智力既窘出奔江陽特入據廣漢以李超為太守進兵攻尚於成都閻式遺尚書責其信用讒構欲討流人又陳特兄弟立功王室以寧益土尚覽書知特等將有大志嬰城固守求救於梁寧二州於是特自稱使持節大都督鎮北大將軍承制封拜一依竇融在河西故事兄輔為驃騎將軍弟驤為驍騎將軍長子始為武威將軍次子蕩為鎮軍將軍少子雄為前將軍李含為西夷校尉含子國離任回李恭上官晶李攀費他等為將帥任臧上官惇楊褒楊圭王達麴歆等為爪牙李遠李博夕斌嚴柳上官琦李濤王懷等為僚屬閻式為謀主何巨趙肅為腹心時羅尚貪殘為百姓患而特與蜀人約法三章施捨振貸禮賢拔滯軍政肅然百姓為之謠曰李特尚可羅尚殺我尚頻為特所敗乃阻長圍緣水作營自都安至犍為七百里與特相距河間王顒遣督護衙博廣漢太守張徵討特南夷校尉李毅又遣兵五千助尚尚遣督護張龜軍繁城三道攻特特命蕩雄襲博特躬擊張龜龜衆大敗蕩又與博接戰連日博亦敗績死者太半蕩追博至漢德博走葭萌蕩進寇巴西巴西郡丞毛植五官襄珍以郡降蕩蕩撫恤初附百姓安之蕩進攻葭萌博又遠遁其衆盡降於蕩太安元年特自稱益州牧都督梁益二州諸軍事大將軍大都督改年建初赦其境內於是進攻張徵徵依高據險與特相持連日時特與蕩分為二營徵候特營空虛遣步兵循山攻之特逆戰不利山險窘逼衆不知所為羅準任道皆勸引退特量蕩必來故不許徵衆至稍多山道至狹唯可一二人行蕩軍不得前謂其司馬王辛曰父在深寇之中是我死日也乃衣重鎧持長矛大呼直前推鋒必死殺十餘人徵衆來相救蕩軍皆殊死戰徵軍遂潰特議欲釋徵還涪蕩與王辛進曰徵軍連戰士卒傷殘智勇俱竭宜因其弊遂擒之若舍而寬之徵養病收亡餘衆更合圖之未易也特從之復進攻徵徵潰圍走蕩水陸追之遂害徵生擒徵子存以徵喪還之以騫碩為德陽太守碩略地至巴郡之墊江特之攻張徵也使李驤與李攀任回李恭屯軍毗橋以備羅尚尚遣軍挑戰驤等破之尚又遣數千人出戰驤又陷破之大獲器甲攻燒其門流進次成都之北尚遣將張興偽降於驤以觀虛實時驤軍不過二千人興夜歸白尚尚遣精勇萬人銜枚隨興夜襲驤營李攀逆戰死驤及將士奔于流柵與流并力回攻尚軍尚軍亂敗還者十一二晉梁州刺史許雄遣軍攻特特陷破之進擊破尚水上軍遂寇成都蜀郡太守徐儉以小城降特以李瑾為蜀郡太守以撫之羅尚據大城自守流進屯江西尚懼遣使求和是時蜀人危懼並結村堡請命于特特遣人安撫之益州從事任明説尚曰特既凶逆侵暴百姓又分人散衆在諸村堡驕怠無備是天亡之也可告諸村密剋期日內外擊之破之必矣尚從之明先偽降特特問城中虛實明曰米穀已欲盡但有貨帛耳因求省家特許之明潛説諸村諸村悉聽命還報尚尚許如期出軍諸村亦許一時赴會二年惠帝遣荊州刺史宋岱建平太守孫阜救尚阜已次德陽特遣蕩督李璜助任臧距阜尚遣大衆奄襲特營連戰二日衆少不敵特軍大敗收合餘卒引趣新繁尚軍引還特復追之轉戰三十餘里尚出大軍逆戰特軍敗績斬特及李輔李遠皆焚尸傳首洛陽在位二年其子雄僭稱王追諡特景王及僭號追尊曰景皇帝廟號始祖李流李庠李流字玄通特第四弟也少好學便弓馬東羌校尉何攀稱流有賁育之勇舉為東羌督及避地益州刺史趙廞器異之廞之使庠合部衆也流亦招鄉里子弟得數千人庠為廞所殺流從特安慰流人破常俊於綿竹平趙廞於成都朝廷論功拜奮威將軍封武陽侯特之承制也以流為鎮東將軍居東營號為東督護特常使流督鋭衆與羅尚相持特之陷成都小城使六郡流人分口入城壯勇督領村堡流言於特曰殿下神武已克小城然山藪未集糧仗不多宜録州郡大姓子弟以為質任送付廣漢縶之二營收集猛鋭嚴為防衛又書與特司馬上官惇深陳納降若待敵之義特不納特既死蜀人多叛流人大懼流與兄子蕩雄收遺衆還赤祖流保東營蕩雄保北營流自稱大將軍大都督益州牧時宋岱水軍三萬次于墊江前鋒孫阜破德陽獲特所置守將騫碩太守任臧等退屯涪陵縣羅尚遣督護常深軍毗橋牙門左泛黃訇何沖三道攻北營流身率蕩雄攻深柵克之深士衆星散追至成都尚閉門自守蕩馳馬追擊鹽倚矛被傷死流以特蕩並死而岱阜又至甚懼太守李含又勸流降流將從之雄與李驤迭諫不納流遣子世及含子胡質於阜軍胡兄含子離聞父欲降自梓潼馳還欲諫不及退與雄謀襲阜軍曰若功成事濟約與君三年迭為主雄曰今計可定二翁不從將若之何離曰今當制之若不可制便行大事翁雖是君叔勢不得已老父在君夫復何言雄大喜乃攻尚軍尚保大城雄渡江害汶山太守陳圖遂入郫城流移營據之三蜀百姓並保險結塢城邑皆空流野無所略士衆飢困涪陵人范長生率千餘家依青城山尚參軍涪陵徐輿求為汶山太守欲要結長生等與尚掎角討流尚不許輿怨之求使江西遂降於流説長生等使資給流軍糧長生從之故流軍復振流素重雄有長者之德每云興吾家者必此人也敕諸子尊奉之流疾篤謂諸將曰驍騎高明仁愛識斷多奇固足以濟大事然前軍英武殆天所相可共受事於前軍以為成都王遂死時年五十六諸將共立雄為主雄僭號追諡流秦文王李庠字玄序特第三弟也少以烈氣聞仕郡督郵主簿皆有當官之稱元康四年察孝廉不就後以善騎射舉良將亦不就州以庠才兼文武舉秀異固以疾辭州郡不聽以其名上聞中護軍切徵不得已而應之拜中軍騎督弓馬便捷膂力過人時論方之文鴦以洛陽方亂稱疾去官性在任俠好濟人之難州黨爭附之與六郡流人避難梁益道路有飢病者庠常營護隱恤振施窮乏大收衆心至蜀趙廞深器之與論兵法無不稱善每謂所親曰李玄序蓋亦一時之關張也及將有異志委以心膂之任乃表庠為部曲督使招合六郡壯勇至萬餘人以討叛羌功表庠為威寇將軍假赤幢曲蓋封陽泉亭侯賜錢百萬馬五十匹被誅之日六郡士庶莫不流涕時年五十五
