body:
  text: 晉書卷四十七列傳第十七傅玄子咸咸從父弟祗傅玄字休奕北地泥陽人也祖燮漢漢陽太守父幹魏扶風太守玄少孤貧博學善屬文解鍾律性剛徑亮直不能容人之短郡上計吏再舉孝廉太尉辟皆不就州舉秀才除郎中與東海繆施俱以時譽選入著作撰集魏書後參安東衛軍軍事轉溫令再遷弘農太守領典農校尉所居稱職數上書陳便宜多所匡正五等建封鶉觚男武帝為晉王以玄為散騎常侍及受禪進爵為子加駙馬都尉帝初即位廣納直言開不諱之路玄及散騎常侍皇甫陶共掌諫職玄上疏曰臣聞先王之臨天下也明其大教長其義節道化隆於上清議行於下上下相奉人懷義心亡秦蕩滅先王之制以法術相御而義心亡矣近者魏武好法術而天下貴刑名魏文慕通達而天下賤守節其後綱維不攝而虛無放誕之論盈於朝野使天下無復清議而亡秦之病復發於今陛下聖德龍興受禪弘堯舜之化開正直之路體夏禹之至儉綜殷周之典文臣詠歎而已將又奚言惟未舉清遠有禮之臣以敦風節未退虛鄙以懲不恪臣是以猶敢有言詔報曰舉清遠有禮之臣者此尤今之要也乃使玄草詔進之玄復上疏曰臣聞舜舉五臣無為而化用人得其要也天下羣司猥多不可不審得其人也不得其人一日則損不資況積日乎典謨曰無曠庶官言職之不可久廢也諸有疾病滿百日不差宜令去職優其禮秩而寵存之既差而後更用臣不廢職於朝國無曠官之纍此王政之急也臣聞先王分士農工商以經國制事各一其業而殊其務自士已上子弟為之立太學以教之選明師以訓之各隨其才優劣而授用之農以豐其食工以足其器商賈以通其貨故雖天下之大兆庶之衆無有一人遊手分數之法周備如此漢魏不定其分百官子弟不修經藝而務交遊未知蒞事而坐享天祿農工之業多廢或逐淫利而離其事徒繫名於太學然不聞先王之風今聖明之政資始而漢魏之失未改散官衆而學校未設遊手多而親農者少工器不盡其宜臣以為亟定其制通計天下若干人為士足以副在官之吏若干人為農三年足有一年之儲若干人為工足其器用若干人為商賈足以通貨而已尊儒尚學貴農賤商此皆事業之要務也前皇甫陶上事欲令賜拜散官皆課使親耕天下享足食之利禹稷躬稼祚流後世是以明堂月令著帝藉之制伊尹古之名臣耕於有莘晏嬰齊之大夫避莊公之難亦耕於海濱昔者聖帝明王賢佐俊士皆嘗從事於農矣王人賜官散無事者不督使學則當使耕無緣放之使坐食百姓也今文武之官既衆而拜賜不在職者又多加以服役為兵不得耕稼當農者之半南面食祿者參倍於前使散之官農而收其租稅家得其實而天下之穀可以無乏矣夫家足食為子則孝為父則慈為兄則友為弟則悌天下足食則仁義之教可不令而行也為政之要計人而置官分人而授事士農工商之分不可斯須廢也若未能精其防制計天下文武之官足為副二者使學其餘皆歸之於農若百工商賈有長者亦皆歸之於農務農若此何有不贍乎虞書曰三載考績三考黜陟幽明是為九年之後乃有遷也故居官久則念立慎終之化居不見久則競為一切之政六年之限日月淺近不周黜陟陶之所上義合古制夫儒學者王教之首也尊其道貴其業重其選猶恐化之不崇忽而不以為急臣懼日有陵遲而不覺也仲尼有言人能弘道非道弘人然則尊其道者非惟尊其書而已尊其人之謂也貴其業者不妄教非其人也重其選者不妄用非其人也若此而學校之綱舉矣書奏帝下詔曰二常侍懇懇於所論可謂乃心欲佐益時事者也而主者率以常制裁之豈得不使發憤耶二常侍所論或舉其大較而未備其條目亦可便令作之然後主者八坐廣共研精凡關言於人主人臣之所至難而人主若不能虛心聽納自古忠臣直士之所慷慨至使杜口結舌每念於此未嘗不歎息也故前詔敢有直言勿有所距庶幾得以發懞補過獲保高位苟言有偏善情在忠益雖文辭有謬誤言語有失得皆當曠然恕之古人猶不拒誹謗況皆善意在可採録乎近者孔鼂綦毋和皆案以輕慢之罪所以皆原欲使四海知區區之朝無諱言之忌也俄遷侍中初玄進皇甫陶及入而抵玄以事與陶爭言喧譁為有司所奏二人竟坐免官泰始四年以為御史中丞時頗有水旱之災玄復上疏曰臣聞聖帝明王受命天時未必無災是以堯有九年之水湯有七年之旱惟能濟之以人事耳故洪水滔天而免沈溺野無生草而不困匱伏惟陛下聖德欽明時小水旱人未大飢下祗畏之詔求極意之言同禹湯之罪己侔周文之夕惕臣伏歡喜上便宜五事其一曰耕夫務多種而耕暵不熟徒喪功力而無收又舊兵持官牛者官得六分士得四分自持私牛者與官中分施行來久衆心安之今一朝減持官牛者官得八分士得二分持私牛及無牛者官得七分士得三分人失其所必不歡樂臣愚以為宜佃兵持官牛者與四分持私牛與官中分則天下兵作歡然悅樂愛惜成穀無有損棄之憂其二曰以二千石雖奉務農之詔猶不勤心以盡地利昔漢氏以墾田不實徵殺二千石以十數臣愚以為宜申漢氏舊典以警戒天下郡縣皆以死刑督之其三曰以魏初未留意於水事先帝統百揆分河堤為四部并本凡五謁者以水功至大與農事並興非一人所周故也今謁者一人之力行天下諸水無時得遍伏見河堤謁者車誼不知水勢轉為他職更選知水者代之可分為五部使各精其方宜其四曰古以步百為畝今以二百四十步為一畝所覺過倍近魏初課田不務多其頃畝但務修其功力故白田收至十餘斛水田收數十斛自頃以來日增田頃畝之課而田兵益甚功不能修理至畝數斛已還或不足以償種非與曩時異天地橫遇災害也其病正在於務多頃畝而功不修耳竊見河堤謁者石恢甚精練水事及田事知其利害乞中書召恢委曲問其得失必有所補益其五曰臣以為胡夷獸心不與華同鮮卑最甚本鄧艾苟欲取一時之利不慮後患使鮮卑數萬散居人間此必為害之勢也秦州刺史胡烈素有恩信於西方今烈往諸胡雖已無惡必且消弭然獸心難保不必其可久安也若後有動釁烈計能制之惟恐胡虜適困於討擊便能東入安定西赴武威外名為降可動復動此二郡非烈所制則惡胡東西有穴浮遊之地故復為患無以禁之也宜更置一郡於高平川因安定西州都尉募樂徙民重其復除以充之以通北道漸以實邊詳議此二郡及新置郡皆使并屬秦州令烈得專御邊之宜詔曰得所陳便宜言農事得失及水官興廢又安邊御胡政事寬猛之宜申省周備一二具之此誠為國大本當今急務也如所論皆善深知乃心廣思諸宜動靜以聞也五年遷太僕時比年不登羌胡擾邊詔公卿會議玄應對所問陳事切直雖不盡施行而常見優容轉司隸校尉獻皇后崩於弘訓宮設喪位舊制司隸於端門外坐在諸卿上絶席其入殿按本品秩在諸卿下以次坐不絶席而謁者以弘訓宮為殿內制玄位在卿下玄恚怒厲聲色而責謁者謁者妄稱尚書所處玄對百僚而罵尚書以下御史中丞庾純奏玄不敬玄又自表不以實坐免官然玄天性峻急不能有所容每有奏劾或值日暮捧白簡整簪帶竦踊不寐坐而待旦於是貴遊懾伏臺閣生風尋卒於家時年六十二諡曰剛玄少時避難於河內專心誦學後雖顯貴而著述不廢撰論經國九流及三史故事評斷得失各為區例名為傅子為內外中篇凡有四部六録合百四十首數十萬言并文集百餘卷行於世玄初作內篇成子咸以示司空王沈沈與玄書曰省足下所著書言富理濟經綸政體存重儒教足以塞楊墨之流遁齊孫孟於往代每開卷未嘗不歎息也不見賈生自以過之乃今不及信矣其後追封清泉侯子咸嗣咸字長虞剛簡有大節風格峻整識性明悟疾惡如仇推賢樂善常慕季文子仲山甫之志好屬文論雖綺麗不足而言成規鑒潁川庾純常歎曰長虞之文近乎詩人之作矣咸寧初襲父爵拜太子洗馬纍遷尚書右丞出為冀州刺史繼母杜氏不肯隨咸之官自表解職三旬之間遷司徒左長史時帝留心政事詔訪朝臣政之損益咸上言曰陛下處至尊之位而修布衣之事親覽萬機勞心日昃在昔帝王躬自菲薄以利天下未有踰陛下也然泰始開元以暨于今十有五年矣而軍國未豐百姓不贍一歲不登便有菜色者誠由官衆事殷復除猥濫蠶食者多而親農者少也臣以頑疏謬忝近職每見聖詔以百姓飢饉為慮無能云補伏用慚恧敢不自竭以對天問舊都督有四今并監軍乃盈於十夏禹敷土分為九州今之刺史幾向一倍戶口比漢十分之一而置郡縣更多空校牙門無益宿衛而虛立軍府動有百數五等諸侯復坐置官屬諸所寵給皆生於百姓一夫不農有受其飢今之不農不可勝計縱使五稼普收僅足相接暫有災患便不繼贍以為當今之急先并官省事靜事息役上下用心惟農是務也咸在位多所執正豫州大中正夏侯駿上言魯國小中正司空司馬孔育四移病所不能接賓求以尚書郎曹馥代育旬日復上育為中正司徒三却駿故據正咸以駿與奪惟意乃奏免駿大中正司徒魏舒駿之姻屬屢却不署咸據正甚苦舒終不從咸遂獨上舒奏咸激訕不直詔轉咸為車騎司馬咸以世俗奢侈又上書曰臣以為穀帛難生而用之不節無緣不匱故先王之化天下食肉衣帛皆有其制竊謂奢侈之費甚於天災古者堯有茅茨今之百姓競豐其屋古者臣無玉食今之賈豎皆厭粱肉古者后妃乃有殊飾今之婢妾被服綾羅古者大夫乃不徒行今之賤隸乘輕驅肥古者人稠地狹而有儲蓄由於節也今者土廣人稀而患不足由於奢也欲時之儉當詰其奢奢不見詰轉相高尚昔毛玠為吏部尚書時無敢好衣美食者魏武帝歎曰孤之法不如毛尚書令使諸部用心各如毛玠風俗之移在不難矣又議移縣獄於郡及二社應立朝廷從之遷尚書左丞惠帝即位楊駿輔政咸言於駿曰事與世變禮隨時宜諒暗之不行尚矣由世道彌薄權不可假故雖斬焉在疚而躬覽萬機也逮至漢文以天下體大服重難久遂制既葬而除世祖武皇帝雖大孝蒸蒸亦從時釋服制心喪三年至於萬機之事則有不遑今聖上欲委政於公諒暗自居此雖謙讓之心而天下未以為善天下未以為善者以億兆顒顒戴仰宸極聽於冢宰懼天光有蔽人心既已若此而明公處之固未為易也竊謂山陵之事既畢明公當思隆替之宜周公聖人猶不免謗以此推之周公之任既未易而處況聖上春秋非成王之年乎得意忘言言未易盡苟明公有以察其悾款言豈在多時司隸荀愷從兄喪自表赴哀詔聽之而未下愷乃造駿咸因奏曰死喪之戚兄弟孔懷同堂亡隕方在信宿聖恩矜憫聽使臨喪詔未下而便以行造急諂媚之敬無友于之情宜加顯貶以隆風教帝以駿管朝政有詔不問駿甚憚之咸復與駿箋諷切之駿意稍折漸以不平由是欲出為京兆弘農太守駿甥李斌説駿不宜斥出正人乃止駿弟濟素與咸善與咸書曰江海之流混混故能成其深廣也天下大器非可稍了而相觀每事欲了生子癡了官事官事未易了也了事正作癡復為快耳左丞總司天臺維正八坐此未易居以君盡性而處未易居之任益不易也想慮破頭故具有白咸答曰衛公云酒色之殺人此甚於作直坐酒色死人不為悔逆畏以直致禍此由心不直正欲以苟且為明哲耳自古以直致禍者當自矯枉過直或不忠允欲以亢厲為聲故致忿耳安有悾悾為忠益而當見疾乎居無何駿誅咸轉為太子中庶子遷御史中丞時太宰汝南王亮輔政咸致書曰咸以為太甲成王年在蒙幼故有伊周之事聖人且猶不免疑況臣既不聖王非孺子而可以行伊周之事乎上在諒暗聽於冢宰而楊駿無狀便作伊周自為居天下之安所以至死其罪既不可勝亦是殿下所見駿之見討發自天聰孟觀李肇與知密旨耳至於論功當歸美於上觀等已數千戶縣侯聖上以駿死莫不欣悅故論功寧厚以其歡心此羣下所宜以實裁量而遂扇動東安封王孟李郡公餘侯伯子男既妄有加復又三等超遷此之熏赫震動天地自古以來封賞未有若此者也無功而厚賞莫不樂國有禍禍起當復有大功也人而樂禍其可極乎作此者皆由東安公謂殿下至止當有以正之正之以道衆亦何所怒乎衆之所怒在於不平耳而今皆更倍論莫不失望咸之愚冗不惟失望而已竊以為憂又討駿之時殿下在外實所不綜今欲委重故令殿下論功論功之事實未易可處莫若坐觀得失有居正之事宜也咸復以亮輔政專權又諫曰楊駿有震主之威委任親戚此天下所以喧譁今之處重宜反此失謂宜靜默頤神有大得失乃維持之自非大事一皆抑遣比四造詣及經過尊門冠蓋車馬填塞街衢此之翕習既宜弭息又夏侯長容奉使為先帝請命祈禱無感先帝崩背宜自咎責而自求請命之勞而公以為少府私竊之論云長容則公之姻故至於此一犬吠形羣犬吠聲懼於羣吠遂至叵聽也咸之為人不能面從而有後言嘗觸楊駿幾為身禍況於殿下而當有惜往從駕殿下見語卿不識韓非逆鱗之言耶而欻摩天子逆鱗自知所陳誠觸猛獸之鬚耳所以敢言庶殿下當識其不勝區區前摩天子逆鱗欲以盡忠今觸猛獸之鬚非欲為惡必將以此見恕亮不納長容者夏侯駿也會丙寅詔羣僚舉郡縣之職以補內官咸復上書曰臣咸以為夫興化之要在於官人才非一流職有不同譬諸林木洪纖枉直各有攸施故明揚逮于仄陋疇咨無拘內外內外之任出處隨宜中間選用惟內是隆外舉既穨復多節目競內薄外遂成風俗此弊誠宜亟革之當內外通塞無所偏耳既使通塞無偏若選用不平有以深責責之苟深無憂不平也且膠柱不可以調瑟況乎官人而可以限乎伏思所限者以防選用不能出人不能出人當隨事而制無須限法法之有限其於致遠無乃泥乎或謂不制其法以何為貴臣聞刑懲小人義責君子君子之責在心不在限也正始中任何晏以選舉內外之衆職各得其才粲然之美於斯可觀如此非徒御之以限法之所致乃委任之由也委任之懼甚於限法是法之失非己之尤尤不在己責之無懼所謂齊之以刑人免而無恥者也苟委任之一則慮罪之及二則懼致怨謗己快則朝野稱詠不善則衆惡見歸此之戰戰孰與倚限法以苟免乎咸再為本郡中正遭繼母憂去官頃之起以議郎長兼司隸校尉咸前後固辭不聽敕使者就拜咸復送還印綬公車不通催使攝職咸以身無兄弟喪祭無主重自陳乞乃使於官舍設靈坐咸又上表曰臣既駑弱不勝重任加在哀疚假息日闋陛下過意授非所堪披露丹款歸窮上聞謬詔既往終然無改臣雖不能滅身以全禮教義無靦然虛忝隆寵前受嚴詔視事之日私心自誓隕越為報以貨賂流行所宜深絶切敕都官以此為先而經彌日月未有所得斯由陛下有以獎厲慮於愚戇將必死繫故自掩檢以避其鋒耳在職有日既無赫然之舉又不應弦垂翅人誰復憚故光祿大夫劉毅為司隸聲震內外遠近清肅非徒毅有王臣匪躬之節亦由所奏見從威風得伸也詔曰但當思必應繩中理威風日伸何獨劉毅時朝廷寬弛豪右放恣交私請託朝野溷淆咸奏免河南尹淡左將軍倩廷尉高光兼河南尹何攀等京都肅然貴戚懾伏咸以聖人久於其道天下化成是以唐虞三載考績九年黜陟其在周禮三年大比孔子亦云三年有成而中間以來長吏到官未幾便遷百姓困於無定吏卒疲於送迎時僕射王戎兼吏部咸奏戎備位台輔兼掌選舉不能謐靜風俗以凝庶績至令人心傾動開張浮競中郎李重李義不相匡正請免戎等官詔曰政道之本誠宜久於其職咸奏是也戎職在論道吾所崇委其解禁止御史中丞解結以咸劾戎為違典制越局侵官干非其分奏免咸官詔亦不許咸上事以為按令御史中丞督司百僚皇太子以下其在行馬內有違法憲者皆彈糾之雖在行馬外而監司不糾亦得奏之如令之文行馬之內有違法憲謂禁防之事耳宮內禁防外司不得而行故專施中丞今道路橋梁不修鬬訟屠沽不絶如此之比中丞推責州坐即今所謂行馬內語施於禁防既云中丞督司百僚矣何復説行馬之內乎既云百僚而不得復説行馬之內者內外衆官謂之百僚則通內外矣司隸所以不復説行馬內外者禁防之事已於中丞説之故也中丞司隸俱糾皇太子以下則共對司內外矣不為中丞專司內百僚司隸專司外百僚自有中丞司隸以來更互奏內外衆官惟所糾得無內外之限也而結一旦橫挫臣臣前所以不羅縷者冀因結奏得從私願也今既所願不從而敕云但為過耳非所不及也以此見原臣忝司直之任宜當正己率人若其有過不敢受原是以申陳其愚司隸與中丞俱共糾皇太子以下則從皇太子以下無所不糾也得糾皇太子而不得糾尚書臣之暗塞既所未譬皇太子為在行馬之內邪皇太子在行馬之內而得糾之尚書在行馬之內而不得糾無有此理此理灼然而結以此挫臣臣可無恨耳其於觀聽無乃有怪邪臣識石公前在殿上脫衣為司隸荀愷所奏先帝不以為非于時莫謂侵官今臣裁糾尚書而當有罪乎咸纍自上稱引故事條理灼然朝廷無以易之吳郡顧榮常與親故書曰傅長虞為司隸徑直忠果劾按驚人雖非周才偏亮可貴也元康四年卒官時年五十六詔贈司隸校尉朝服一具衣一襲錢二十萬諡曰貞有三子敷晞纂長子敷嗣敷字穎根清靜有道素解屬文除太子舍人轉尚書郎太傅參軍皆不起永嘉之亂避地會稽元帝引為鎮東從事中郎素有羸疾頻見敦喻辭不獲免輿病到職數月卒時年四十六晞亦有才思為上虞令甚有政績卒於司徒西曹屬祗字子莊父嘏魏太常祗性至孝早知名以才識明練稱武帝始建東宮起家太子舍人遷散騎黃門郎賜爵關內侯食邑三百戶母憂去職及葬母詔給太常五等吉凶導從其後諸卿夫人葬給導從自此始也服終為滎陽太守自魏黃初大水之後河濟泛溢鄧艾嘗著濟河論開石門而通之至是復浸壞祗乃造沈萊堰至今兗豫無水患百姓為立碑頌焉尋表兼廷尉遷常侍左軍將軍及帝崩梓宮在殯而太傅楊駿輔政欲悅衆心議普進封爵祗與駿書曰未有帝王始崩臣下論功者也駿不從入為侍中時將誅駿而駿不之知祗侍駿坐而雲龍門閉內外不通祗請與尚書武茂聽國家消息揖而下階茂猶坐祗顧曰君非天子臣邪今內外隔絶不知國家所在何得安坐茂乃驚起駿既伏誅裴楷息瓚駿之壻也為亂兵所害尚書左僕射荀愷與楷不平因奏楷是駿親收付廷尉祗證楷無罪有詔赦之時又收駿官屬祗復啓曰昔魯芝為曹爽司馬斬關出赴爽宣帝義之尚遷青州刺史駿之僚佐不可加罰詔又赦之祗多所維正皆如此除河南尹未拜遷司隸校尉以討楊駿勳當封郡公八千戶固讓減半降封靈川縣公千八百戶餘二千二百戶封少子暢為武鄉亭侯又以本封賜兄子雋為東明亭侯楚王瑋之矯詔也祗以聞奏稽留免官期年遷光祿勳復以公事免氐人齊萬年舉兵反以祗為行安西軍司加常侍率安西將軍夏侯駿討平之遷衛尉以風疾遜位就拜常侍食卿祿秩賜錢及牀帳等尋加光祿大夫門施行馬及趙王倫輔政以為中書監常侍如故以鎮衆心祗辭之以疾倫遣御史輿祗就職王戎陳準等相與言曰傅公在事吾屬無憂矣其為物所倚信如此倫篡又為右光祿開府加侍中惠帝還宮祗以經受偽職請退不許初倫之篡也孫秀與義陽王威等十餘人預撰儀式禪文及倫敗齊王冏收侍中劉逵常侍騶捷杜育黃門郎陸機右丞周導王尊等付廷尉以禪文出中書復議處祗罪會赦得原後以禪文草本非祗所撰於是詔復光祿大夫子宣尚弘農公主尋遷太子少傅上章遜位還第及成都王穎為太傅復以祗為少傅加侍中懷帝即位遷光祿大夫侍中未拜加右僕射中書監時太傅東海王越輔政祗既居端右每宣君臣謙光之道由此上下雍穆祗明達國體朝廷制度多所經綜歷左光祿開府行太子太傅侍中如故疾篤遜位不許遷司徒以足疾詔版輿上殿不拜大將軍苟晞表請遷都使祗出詣河陰修理舟楫為水行之備及洛陽陷沒遂共建行臺惟祗為盟主以司徒持節大都督諸軍事傳檄四方遣子宣將公主與尚書令和郁赴告方伯徵義兵祗自屯盟津小城宣弟暢行河陰令以待宣祗以暴疾薨時年六十九祗自以義誠不終力疾手筆敕厲其二子宣暢辭旨深切覽者莫不感激慷慨祗著文章駁論十餘萬言宣字世弘年六歲喪繼母哭泣如成人中表異之及長好學趙王倫以為相國掾尚書郎太子中舍人遷司徒西曹掾去職纍遷為祕書丞驃騎從事中郎惠帝至自長安以宣為左丞不就遷黃門郎懷帝即位轉吏部郎又為御史中丞卒年四十九無子以暢子沖為嗣暢字世道年五歲父友見而戲之解暢衣取其金環與侍者暢不之惜以此賞之年未弱冠甚有重名以選入侍講東宮為祕書丞尋沒於石勒勒以為大將軍右司馬諳識朝儀居機密勒甚重之作晉諸公讚二十二卷又為公卿故事九卷咸和五年卒子詠過江為交州刺史太子右率史臣曰武帝覽觀四方平章百姓永言啓沃任切爭臣傅玄體強直之姿懷匪躬之操抗辭正色補闕弼違諤諤當朝不忝其職者矣及乎位居三獨彈擊是司遂能使臺閣生風貴戚斂手雖前代鮑葛何以加之然而惟此褊心乏弘雅之度驟聞競爽為物議所譏惜哉古人取戒於韋弦良有以也長虞風格凝峻弗墜家聲及其納諫汝南獻書臨晉居諒直之地有先見之明矣傅祗名父之子早樹風猷崎嶇危亂之朝匡救君臣之際卒能保全祿位可謂有道存焉贊曰鶉觚貞諒實惟朝望志厲強直性乖夷曠長虞剛簡無虧風尚子莊才識爰膺衮職忠績未申泉途遽逼
