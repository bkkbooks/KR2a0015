body:
  text: 晉書卷八十四列傳第五十四王恭王恭字孝伯光祿大夫蘊子定皇后之兄也少有美譽清操過人自負才地高華恆有宰輔之望與王忱齊名友善慕劉惔之為人謝安常曰王恭人地可以為將來伯舅嘗從其父自會稽至都忱訪之見恭所坐六尺簟忱謂其有餘因求之恭輒以送焉遂坐薦上忱聞而大驚恭曰吾平生無長物其簡率如此起家為佐著作郎歎曰仕宦不為宰相才志何足以騁因以疾辭俄為祕書丞轉中書郎未拜遭父憂服闋除吏部郎歷建威將軍太元中代沈嘉為丹楊尹遷中書令領太子詹事孝武帝以恭后兄深相欽重時陳郡袁悅之以傾巧事會稽王道子恭言之於帝遂誅之道子嘗集朝士置酒於東府尚書令謝石因醉為委巷之歌恭正色曰居端右之重集藩王之第而肆淫聲欲令羣下何所取則石深銜之淮陵內史虞珧子妻裴氏有服食之術常衣黃衣狀如天師道子甚悅之令與賓客談論時人皆為降節恭抗言曰未聞宰相之坐有失行婦人坐賓莫不反側道子甚愧之其後帝將擢時望以為藩屏乃以恭為都督兗青冀幽并徐州晉陵諸軍事平北將軍兗青二州刺史假節鎮京口初都督以北為號者纍有不祥故桓沖王坦之刁彝之徒不受鎮北之號恭表讓軍號以超受為辭而實惡其名於是改號前將軍慕容垂入青州恭遣偏師禦之失利降號輔國將軍及帝崩會稽王道子執政寵昵王國寶委以機權恭每正色直言道子深憚而忿之及赴山陵罷朝歎曰榱棟雖新便有黍離之歎矣時國寶從弟緒説國寶因恭入覲相王伏兵殺之國寶不許而道子亦欲輯和內外深布腹心於恭冀除舊惡恭多不順每言及時政輒厲聲色道子知恭不可和協王緒之説遂行於是國難始結或勸恭因入朝以兵誅國寶而庾楷黨於國寶士馬甚盛恭憚之不敢發遂還鎮臨別謂道子曰主上諒暗冢宰之任伊周所難願大王親萬機納直言遠鄭聲放佞人辭色甚厲故國寶等愈懼以恭為安北將軍不拜乃謀誅國寶遣使與殷仲堪桓玄相結仲堪偽許之恭得書大喜乃抗表京師曰後將軍國寶得以姻戚頻登顯列不能感恩效力以報時施而專寵肆威將危社稷先帝登遐夜乃犯閣叩扉欲矯遺詔賴皇太后聰明相王神武故逆謀不果又割東宮見兵以為己府讒疾二昆甚於讐敵與其從弟緒同黨凶狡共相扇動此不忠不義之明白也以臣忠誠必亡身殉國是以譖臣非一賴先帝明鑒浸潤不行昔趙鞅興甲誅君側之惡臣雖駑劣敢忘斯義表至內外戒嚴國寶及緒惶懼不知所為用王珣計請解職道子收國寶賜死斬緒于市深謝愆失恭乃還京口恭之初抗表也慮事不捷乃版前司徒左長史王廞為吳國內史令起兵於東會國寶死令廞解軍去職廞怒以兵伐恭恭遣劉牢之擊滅之上疏自貶詔不許譙王尚之復説道子以藩伯強盛宰相權弱宜多樹置以自衛道子然之乃以其司馬王愈為江州刺史割庾楷豫州四郡使愈督之由是楷怒遣子鴻説恭曰尚之兄弟專弄相權欲假朝威貶削方鎮懲警前事勢轉難測及其議未成宜早圖之恭以為然復以謀告殷仲堪桓玄玄等從之推恭為盟主剋期同赴京師時內外疑阻津邏嚴急仲堪之信因庾楷達之以斜絹為書內箭簳中合鏑漆之楷送於恭恭發書絹文角戾不復可識謂楷為詐又料仲堪去年已不赴盟今無動理乃先期舉兵司馬劉牢之諫曰將軍今動以伯舅之重執忠貞之節相王以姬旦之尊時望所係昔年已戮寶緒送王廞書是深伏將軍也頃所授用雖非皆允未為大失割庾楷四郡以配王愈於將軍何損晉陽之師其可再乎恭不從乃上表以討王愈司馬尚之兄弟為辭朝廷使元顯及王珣謝琰等距之恭夢牢之坐其處旦謂牢之曰事克即以卿為北府遣牢之率帳下督顏延先據竹里元顯使説牢之啖以重利牢之乃斬顏延以降是日牢之遣其壻高雅之子敬宣因恭曜軍輕騎擊恭恭敗將還雅之已閉城門恭遂與弟履單騎奔曲阿恭久不騎乘髀生瘡不復能去曲阿人殷確恭故參軍也以船載之藏於葦席之下將奔桓玄至長塘湖遇商人錢強強宿憾於確以告湖浦尉尉收之以送京師道子聞其將至欲出與語面折之而未之殺也時桓玄等已至石頭懼其有變即於建康之倪塘斬之恭五男及弟爽爽兄子祕書郎和及其黨孟璞張恪等皆殺之恭性抗直深存節義讀左傳至奉王命討不庭每輟卷而歎為性不弘以暗於機會自在北府雖以簡惠為政然自矜貴與下殊隔不間用兵尤信佛道調役百姓修營佛寺務在壯麗士庶怨嗟臨刑猶誦佛經自理鬚鬢神無懼容謂監刑者曰我暗於信人所以致此原其本心豈不忠於社稷但令百代之下知有王恭耳家無財帛唯書籍而已為識者所傷恭美姿儀人多愛悅或目之云濯濯如春月柳嘗被鶴氅裘涉雪而行孟昶窺見之歎曰此真神仙中人也初見執遇故吏戴耆之為湖孰令恭私告之曰我有庶兒未舉在乳母家卿為我送寄桓南郡耆之遂送之於夏口桓玄撫養之為立喪庭弔祭焉及玄執政上表理恭詔贈侍中太保諡曰忠簡爽贈太常和及子簡並通直散騎郎殷確散騎侍郎腰斬湖浦尉及錢強等恭庶子曇亨義熙中為給事中庾楷庾楷征西將軍亮之孫會稽內史羲小子也初拜侍中代兄準為西中郎將豫州刺史假節鎮歷陽隆安初進號左將軍時會稽王道子憚王恭殷仲堪等擅兵故出王愈為江州督豫州四郡以為形援楷上疏以江州非險塞之地而西府北帶寇戎不應使愈分督詔不許時楷懷恨使子鴻説王恭以譙王尚之兄弟復握機權勢過國寶恭亦素忌尚之遂連謀舉兵事在恭傳詔使尚之討楷楷遣汝南太守段方逆尚之戰于慈湖方大敗被殺楷奔于桓玄及玄等盟于柴桑連名上疏自理詔赦玄等而不赦恭楷楷遂依玄玄用為武昌太守楷後懼玄必敗密遣使結會稽世子元顯若朝廷討玄當為內應及玄得志楷以謀泄為玄所誅劉牢之子敬宣劉牢之字道堅彭城人也曾祖羲以善射事武帝歷北地雁門太守父建有武幹為征虜將軍世以壯勇稱牢之面紫赤色鬚目驚人而沈毅多計畫太元初謝玄北鎮廣陵時苻堅方盛玄多募徑勇牢之與東海何謙琅邪諸葛侃樂安高衡東平劉軌西河田洛及晉陵孫無終等以驍猛應選玄以牢之為參軍領精鋭為前鋒百戰百勝號為北府兵敵人畏之及堅將句難南侵玄率何謙等距之牢之破難輜重於盱眙獲其運船遷鷹揚將軍廣陵相時車騎將軍桓沖擊襄陽宣城內史胡彬率衆向壽陽以為沖聲援牢之領卒二千為彬後繼淮肥之役苻堅遣其弟融及驍將張蚝攻陷壽陽謝玄使彬與牢之距之師次硤石不敢進堅將梁成又以二萬人屯洛澗玄遣牢之以精卒五千距之去賊十里成阻澗列陳牢之率參軍劉襲諸葛求等直進渡水臨陳斬成及其弟雲又分兵斷其歸津賊步騎崩潰爭赴淮水殺獲萬餘人盡收其器械堅尋亦大敗歸長安餘黨所在屯結牢之進平譙城使安豐太守戴寶戍之遷龍驤將軍彭城內史以功賜爵武岡縣男食邑五百戶牢之進屯鄄城討諸未服河南城堡承風歸順者甚衆時苻堅子丕據鄴為慕容垂所逼請降牢之引兵救之垂聞軍至出新城北走牢之與沛郡太守田次之追之行二百里至五橋澤中爭趣輜重稍亂為垂所擊牢之敗績士卒殲焉牢之策馬五丈澗得脫會丕救至因入臨漳集亡散兵復少振牢之以軍敗徵還頃之復為龍驤將軍守淮陰後進戍彭城復領太守祅賊劉黎僭尊號於皇丘牢之討滅之苻堅將張遇遣兵擊破金鄉圍太山太守羊邁牢之遣參軍向欽之擊走之會慕容垂叛將翟釗救遇牢之引還釗還牢之進平太山追釗於鄄城釗走河北因獲張遇以歸之彭城祅賊司馬徽聚黨馬頭山牢之遣參軍竺朗之討滅之時慕容氏掠釰丘高平太守徐含遠告急牢之不能救坐畏懦免及王恭將討王國寶引牢之為府司馬領南彭城內史加輔國將軍恭使牢之討破王廞以牢之領晉陵太守恭本以才地陵物及檄至京師朝廷戮國寶王緒自謂威德已著雖杖牢之為爪牙但以行陳武將相遇禮之甚薄牢之負其才能深懷恥恨及恭之後舉元顯遣廬江太守高素説牢之使叛恭事成當即其位號牢之許焉恭參軍何淡之以其謀告恭牢之與淡之有隙故恭疑而不納乃置酒請牢之於衆中拜牢之為兄精兵利器悉以配之使為前鋒行至竹里牢之背恭歸朝廷恭既死遂代恭為都督兗青冀幽并徐揚州晉陵軍事牢之本自小將一朝據恭位衆情不悅乃樹用腹心徐謙之等以自強時楊佺期桓玄將兵逼京師上表理王恭求誅牢之牢之率北府之衆馳赴京師次于新亭玄等受詔退兵牢之還鎮京口及孫恩攻陷會稽牢之遣將桓寶率師救三吳復遣子敬宣為寶後繼比至曲阿吳郡內史桓謙已棄郡走牢之乃率衆東討拜表輒行至吳與衛將軍謝琰擊賊屢勝殺傷甚衆徑臨浙江進拜前將軍都督吳郡諸軍事時謝琰屯烏程遣司馬高素助牢之牢之率衆軍濟浙江恩懼逃于海牢之還鎮恩復入會稽害謝琰牢之進號鎮北將軍都督會稽五郡率衆東征屯上虞分軍戍諸縣恩復攻破吳國殺內史袁山松牢之使參軍劉裕討之恩復入海頃之恩浮海奄至京口戰士十萬樓船千餘牢之在山陰使劉裕自海鹽赴難牢之率大衆而還裕兵不滿千人與賊戰破之恩聞牢之已還京口乃走郁洲又為敬宣劉裕等所破及恩死牢之威名轉振元興初朝廷將討桓玄以牢之為前鋒都督征西將軍領江州事元顯遣使以討玄事咨牢之牢之以玄少有雄名杖全楚之衆懼不能制又慮平玄之後功蓋天下必不為元顯所容深懷疑二不得已率北府文武屯洌洲桓玄遣何穆説牢之曰自古亂世君臣相信者有燕昭樂毅玄德孔明然皆勳業未卒而二主早世設使功成事遂未保二臣之禍也鄙語有之高鳥盡良弓藏狡兔殫獵犬烹故文種誅於句踐韓白戮於秦漢彼皆英雄霸王之主猶不敢信其功臣況凶愚凡庸之流乎自開闢以來戴震主之威挾不賞之功以見容於暗世者而誰至如管仲相齊雍齒侯漢則往往有之況君見與無射鉤屢逼之仇邪今君戰敗則傾宗戰勝亦覆族欲以安歸乎孰若翻然改圖保其富貴則身與金石等固名與天壤無窮孰與頭足異處身名俱滅為天下笑哉惟君圖之牢之自謂握強兵才能算略足以經綸江表時譙王尚之已敗人情轉沮乃頗納穆説遣使與玄交通其甥何無忌與劉裕固諫之並不從俄令敬宣降玄玄大喜與敬宣置酒宴集陰謀誅之陳法書畫圖與敬宣共觀以安悅其志敬宣不之覺玄佐吏莫不相視而笑元顯既敗玄以牢之為征東將軍會稽太守牢之乃歎曰始爾便奪我兵禍將至矣時玄屯相府敬宣勸牢之襲玄猶豫不決移屯班瀆將北奔廣陵相高雅之欲據江北以距玄集衆大議參軍劉襲曰事不可者莫大於反而將軍往年反王兗州近日反司馬郎君今復欲反桓公一人而三反豈得立也語畢趨出佐吏多散走而敬宣先還京口拔其家失期不到牢之謂其為劉襲所殺乃自縊而死俄而敬宣至不遑哭奔于高雅之將吏共殯斂牢之喪歸丹徒桓玄令棺斬首暴尸於市及劉裕建義追理牢之乃復本官敬宣牢之長子也智略不及父而技藝過之孫恩之亂隨父征討所向有功為元顯從事中郎又為桓玄咨議參軍牢之敗與廣陵相高雅之俱奔慕容超夢丸土而服之既覺喜曰丸者桓也丸既吞矣我當復本土也旬日而玄敗遂與司馬休之還京師拜輔國將軍晉陵太守與諸葛長民破桓歆於芍陂遷建威將軍江州刺史鎮尋陽又擊桓亮苻宏於湘中所在有功安帝反政徵拜冠軍將軍宣城內史領襄城太守譙縱反以敬宣督征蜀諸軍事假節與寧朔將軍臧喜西伐敬宣入自白帝所攻皆克軍次黃獸與偽將譙道福相持六十餘日遇癘疫又以食盡班師為有司所劾免官頃之為中軍咨議加冠軍將軍尋遷鎮蠻護軍安豐太守梁國內史會盧循反以冠軍將軍從大軍南討循平遷左衛將軍散騎常侍又遷征虜將軍青州刺史尋改鎮冀州為其參軍司馬道賜所害殷仲堪殷仲堪陳郡人也祖融太常吏部尚書父師驃騎咨議參軍晉陵太守沙陽男仲堪能清言善屬文每云三日不讀道德論便覺舌本間強其談理與韓康伯齊名士咸愛慕之調補佐著作郎冠軍謝玄鎮京口請為參軍除尚書郎不拜玄以為長史厚任遇之仲堪致書於玄曰胡亡之後中原子女鬻於江東者不可勝數骨肉星離荼毒終年怨苦之氣感傷和理誠喪亂之常足以懲戒復非王澤廣潤愛育蒼生之意也當世大人既慨然經略將以救其塗炭而使理至於此良可歎息願節下弘之以道德運之以神明隱心以及物垂理以禁暴使足踐晉境者必無懷戚之心枯稿之類莫不同漸天潤仁義與干戈並運德心與功業俱隆實所期於明德也頃聞抄掠所得多皆採梠飢人壯者欲以救子少者志在存親行者傾筐以顧念居者吁嗟以待延而一旦幽縶生離死絶求之於情可傷之甚昔孟孫獵而得麑使秦西以之歸其母隨而悲鳴不忍而放之孟孫赦其罪以傅其子禽獸猶不可離況於人乎夫飛梟惡鳥也食桑椹猶懷好音雖曰戎狄其無情乎苟感之有物非難化也必使邊界無貪小利強弱不得相陵德音一發必聲振沙漠二寇之黨將靡然向風何憂黃河之不濟函谷之不開哉玄深然之領晉陵太守居郡禁産子不舉久喪不葬録父母以質亡叛者所下條教甚有義理父病積年仲堪衣不解帶躬學醫術究其精妙執藥揮淚遂眇一目居喪哀毀以孝聞服闋孝武帝召為太子中庶子甚相親愛仲堪父嘗患耳聰聞牀下蟻動謂之牛鬬帝素聞之而不知其人至是從容問仲堪曰患此者為誰仲堪流涕而起曰臣進退惟谷帝有愧焉復領黃門郎寵任轉隆帝嘗示仲堪詩乃曰勿以己才而笑不才帝以會稽王非社稷之臣擢所親幸以為藩捍乃授仲堪都督荊益寧三州軍事振威將軍荊州刺史假節鎮江陵將之任又詔曰卿去有日使人酸然常謂永為廊廟之寶而忽為荊楚之珍良以慨恨其恩狎如此仲堪雖有英譽議者未以分陝許之既受腹心之任居上流之重朝野屬想謂有異政及在州綱目不舉而好行小惠夷夏頗安附之先是仲堪遊於江濱見流棺接而葬焉旬日間門前之溝忽起為岸其夕有人通仲堪自稱徐伯玄云感君之惠無以報也仲堪因問門前之岸是何祥乎對曰水中有岸其名為洲君將為州言終而沒至是果臨荊州桂陽人黃欽生父沒已久詐服衰麻言迎父喪府曹先依律詐取父母卒棄市仲堪乃曰律詐取父母寧依驅詈法棄市原此之旨當以二親生存而橫言死沒情事悖逆忍所不當故同之驅詈之科正以大辟之刑今欽生父實終沒墓在舊邦積年久遠方詐服迎喪以此為大妄耳比之於父存言亡相殊遠矣遂活之又以異姓相養禮律所不許子孫繼親族無後者唯令主其蒸嘗不聽別籍以避役也佐史咸服之時朝廷徵益州刺史郭銓犍為太守卞苞於坐勸銓以蜀反仲堪斬之以聞朝廷以仲堪事不預察降號鷹揚將軍尚書下以益州所統梁州三郡人丁一千番戍漢中益州未肯承遣仲堪乃奏之曰夫制險分國各有攸宜劍閣之隘實蜀之關鍵巴西梓潼宕渠三郡去漢中遼遠在劍閣之內成敗與蜀為一而統屬梁州蓋定鼎中華慮在後伏所以分斗絶之勢開荷戟之路自皇居南遷守在岷邛襟帶之形事異曩昔是以李勢初平割此三郡配隸益州將欲重復上流為習坎之防事經英略歷年數紀梁州以統接曠遠求還得三郡忘王侯設險之義背地勢內外之實盛陳事力之寡弱飾哀矜之苦言今華陽清汧隴順軌關中餘燼自相魚肉梁州以論求三郡益州以本統有定更相牽制莫知所從致令巴宕二郡為羣獠所覆城邑空虛士庶流亡要害膏腴皆為獠有今遠慮長規宜保全險塞又蠻獠熾盛兵力寡弱如遂經理乖謬號令不一則劍閣非我保醜類轉難制此乃藩扞之大機上流之至要昔三郡全實正差文武三百以助梁州今俘沒蠻獠十不遺二加逐食鳥散資生未立苟順符指以副梁州恐公私困弊無以堪命則劍閣之守無擊柝之儲號令選用不專於益州虛有監統之名而無制御之用懼非分位之本旨經國之遠術謂今正可更加梁州文武五百合前為一千五百自此之外一仍舊貫設梁州有急蜀當傾力救之書奏朝廷許焉桓玄在南郡論四晧來儀漢庭孝惠以立而惠帝柔弱呂后凶忌此數公者觸彼埃塵欲以救弊二家之中各有其黨奪彼與此其讐必興不知匹夫之志四公何以逃其患素履終吉隱以保生者其若是乎以其文贈仲堪仲堪乃答之曰隱顯默語非賢達之心蓋所遇之時不同故所乘之塗必異道無所屈而天下以之獲寧仁者之心未能無感若夫四公者養志巖阿道高天下秦網雖虐遊之而莫懼漢祖雖雄請之而弗顧徒以一理有感泛然而應事同賓客之禮言無是非之對孝惠以之獲安莫由報其德如意以之定藩無所容其怨且爭奪滋生主非一姓則百姓生心祚無常人則人皆自賢況夫漢以劍起人未知義式遏姦邪特宜以正順為寶天下大器也苟亂亡見懼則滄海橫流原夫若人之振策豈為一人之廢興哉苟可以暢其仁義與夫伏節委質可榮可辱者道迹懸殊理勢不同君何疑之哉又謂諸呂強盛幾危劉氏如意若立必無此患夫禍福同門倚伏萬端又未可斷也于時天下新定權由上制高祖分王子弟有磐石之固社稷深謀之臣森然比肩豈瑣瑣之祿産所能傾奪之哉此或四公所預于今亦無以辨之但求古賢之心宜存之遠大耳端本正源者雖不能無危其危易持苟啓競津雖未必不安而其安難保此最有國之要道古今賢哲所同惜也玄屈之仲堪自在荊州連年水旱百姓飢饉仲堪食常五碗盤無餘肴飯粒落席間輒拾以噉之雖欲率物亦緣其性真素也每語子弟云人物見我受任方州謂我豁平昔時意今吾處之不易貧者士之常焉得登枝而捐其本爾其存之其後蜀水大出漂浮江陵數千家以隄防不嚴復降為寧遠將軍安帝即位進號冠軍將軍固讓不受初桓玄將應王恭乃説仲堪推恭為盟主共興晉陽之舉立桓文之功仲堪然之仲堪以王恭在京口去都不盈二百自荊州道遠連兵勢不相及乃偽許恭而實不欲下聞恭已誅王國寶等始抗表興師遣龍驤將軍楊佺期次巴陵會稽王道子遣書止之仲堪乃還初桓玄棄官歸國仲堪憚其才地深相交結玄亦欲假其兵勢誘而悅之國寶之役仲堪既納玄之誘乃外結雍州刺史郗恢內要從兄南蠻校尉顗南郡相江績等恢顗績並不同之乃以楊佺期代績顗自遜位會王恭復與豫州刺史庾楷舉兵討江州刺史王愈及譙王尚之等仲堪因集議以為朝廷去年自戮國寶王恭威名已震今其重舉勢無不克而我去年緩師已失信於彼今可整棹晨征參其霸功於是使佺期舟師五千為前鋒桓玄次之仲堪率兵二萬相繼而下佺期玄至湓口王愈奔于臨川玄遣偏軍追獲之佺期等進至橫江庾楷敗奔於玄譙王尚之等退走尚之弟恢之所領水軍皆沒玄等至石頭仲堪至蕪湖忽聞王恭已死劉牢之反恭領北府兵在新亭玄等三軍失色無復固志乃回師屯于蔡洲時朝廷新平恭楷且不測西方人心仲堪等擁衆數萬充斥郊畿內外憂逼玄從兄修告會稽王道子曰西軍可説而解也修知其情矣若許佺期以重利無不倒戈於仲堪者道子納之乃以玄為江州佺期為雍州黜仲堪為廣州以桓修為荊州遣仲堪叔父太常茂宣詔回軍仲堪恚被貶退以王恭雖敗己衆亦足以立事令玄等急進軍玄等喜於寵授並欲順朝命猶豫未決會仲堪弟遹為佺期司馬夜奔仲堪説佺期受朝命納桓修仲堪遑遽即於蕪湖南歸使徇於玄等軍曰若不各散而歸大軍至江陵當悉戮餘口仲堪將劉系先領二千人隸于佺期輒率衆而歸玄等大懼狼狽追仲堪至尋陽及之於是仲堪失職倚玄為援玄等又資仲堪之兵雖互相疑阻亦不得異仲堪與佺期以子弟交質遂於尋陽結盟玄為盟主臨壇歃血並不受詔申理王恭求誅劉牢之譙王尚之等朝廷深憚之於是詔仲堪曰間以將軍憑寄失所朝野懷憂然既往之事宜其兩忘用乃班師回旆祗順朝旨所以改授方任蓋隨時之宜將軍大義誠感朕心今還復本位即撫所鎮釋甲休兵則內外寧一故遣太常茂具宣乃懷仲堪等並奉詔各旋所鎮頃之桓玄將討佺期先告仲堪云今當入沔討除佺期已頓兵江口若見與無二可殺楊廣若其不然便當率軍入江仲堪乃執玄兄偉遣從弟遹等水軍七千至江西口玄使郭銓苻宏擊之遹等敗走玄頓巴陵而館其穀玄又破楊廣於夏口仲堪既失巴陵之積又諸將皆敗江陵震駭城內大飢以胡麻為廩仲堪急召佺期佺期率衆赴之直濟江擊玄為玄所敗走還襄陽仲堪出奔酇城為玄追兵所獲逼令自殺死于柞溪弟子道護參軍羅企生等並被殺仲堪少奉天師道又精心事神不吝財賄而怠行仁義嗇於周急及玄來攻猶勤請禱然善取人情病者自為診脈分藥而用計倚伏煩密少於鑒略以至於敗子簡之載喪下都葬于丹徒遂居墓側義旗建率私僮客隨義軍躡桓玄玄死簡之食其肉桓振之役義軍失利簡之沒陳弟曠之有父風仕至剡令楊佺期楊佺期弘農華陰人漢太尉震之後也曾祖準太常自震至準七世有名德祖林少有才望值亂沒胡父亮少仕偽朝後歸國終於梁州刺史以貞幹知名佺期沈勇果徑而兄廣及弟思平等皆強獷粗暴自云門戶承籍江表莫比有以其門地比王珣者猶恚恨而時人以其晚過江婚宦失類每排抑之恆慷慨切齒欲因事際以逞其志佺期少仕軍府咸康中領衆屯成固苻堅將潘猛距守康回壘佺期擊走之其衆悉降拜廣威將軍河南太守戍洛陽苻堅將竇衝率衆攻平陽太守張元熙於皇天塢佺期擊走之佺期自湖城入潼關纍戰皆捷斬獲千計降九百餘家歸於洛陽進號龍驤將軍以病改為新野太守領建威司馬遷唐邑太守督石頭軍事以疾去職荊州刺史殷仲堪引為司馬代江績為南郡相仲堪與桓玄舉衆應王恭庾楷仲堪素無戎略軍旅之事一委佺期兄弟以兵五千人為前鋒與桓玄相次而下至石頭恭死楷敗朝廷未測玄軍乃以佺期代郗恢為都督梁雍秦三州諸軍事雍州刺史仲堪玄皆有遷換於是俱還尋陽結盟不奉詔俄而朝廷復仲堪本職乃各還鎮初玄未奉詔欲自為雍州以郗恢為廣州恢懼玄之來問於衆咸曰佺期來者誰不勠力若桓玄來恐難與為敵既知佺期代己乃謀於南陽太守閭丘羡稱兵距守佺期慮事不濟乃聲言玄來入沔而佺期為前驅恢衆信之無復固志恢軍散請降佺期入府斬閭丘羡放恢還都撫將士恤百姓繕修城池簡練甲卒甚得人情佺期仲堪與桓玄素不穆佺期屢欲相攻仲堪每抑止之玄以是告執政求廣其所統朝廷亦欲成其釁隙故以桓偉為南蠻校尉佺期內懷忿懼勒兵建牙聲云援洛欲與仲堪襲玄仲堪雖外結佺期內疑其心苦止之又遣從弟遹屯北塞以駐之佺期勢不獨舉乃解兵隆安三年桓玄遂舉兵討佺期先攻仲堪初仲堪得玄書急召佺期佺期曰江陵無食當何以待敵可來見就共守襄陽仲堪自以保境全軍無緣棄城逆走憂佺期不赴乃紿之曰比來收集已有儲矣佺期信之乃率衆赴焉步騎八千精甲耀日既至仲堪唯以飯餉其軍佺期大怒曰今茲敗矣乃不見仲堪時玄在零口佺期與兄廣擊玄玄畏佺期之鋭乃渡軍馬頭明日佺期率殷道護等精鋭萬人乘艦出戰玄距之不得進佺期乃率其麾下數十艦直濟江徑向玄船俄而回擊郭銓殆獲銓會玄諸軍至佺期退走餘衆盡沒單馬奔襄陽玄追軍至佺期與兄廣俱死之傳首京都梟於朱雀門弟思平從弟尚保孜敬俱逃于蠻劉裕起義始歸國歷位州郡孜敬為人剽鋭果於行事昔與佺期勸殷仲堪殺殷顗仲堪不從孜敬拔刃而起欲自出取之仲堪苦禁乃止及為梁州刺史常怏怏不滿其志經襄陽見魯宗之侍衛皆佺期之舊也孜敬愈憤見於辭色宗之參軍劉千期於座面折之因大發怒抽劍刺千期立死宗之表而斬之思平尚保後亦以罪誅楊氏遂滅史臣曰生靈道斷忠貞路絶棄彼弊冠崇茲新履牢之事非其主抑亦不臣功多見疑勢陵難信而投兵散地二三之甚若夫司牧居愆方隅作戾口順勤王心乖抗節王恭鯁言時政有昔賢之風國寶就誅而晉陽猶起是以仲堪僥幸佺期無狀雅志多隙佳兵不和足以亡身不足以靜亂也贊曰孝伯懷功牢之總戎王因起釁劉亦慚忠殷楊乃武抽旆爭雄庾君含怨交鬬其中猗歟羣采道睽心異是曰亂階非關臣事
