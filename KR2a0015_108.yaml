body:
  text: 晉書卷一百八載記第八慕容廆裴嶷高瞻慕容廆字弈洛瓌昌黎棘城鮮卑人也其先有熊氏之苗裔世居北夷邑于紫蒙之野號曰東胡其後與匈奴並盛控弦之士二十餘萬風俗官號與匈奴略同秦漢之際為匈奴所敗分保鮮卑山因以為號曾祖莫護跋魏初率其諸部入居遼西從宣帝伐公孫氏有功拜率義王始建國於棘城之北時燕代多冠步搖冠莫護跋見而好之乃斂髮襲冠諸部因呼之為步搖其後音訛遂為慕容焉或云慕二儀之德繼三光之容遂以慕容為氏祖木延左賢王父涉歸以全柳城之功進拜鮮卑單于遷邑於遼東北於是漸慕諸夏之風矣廆幼而魁岸美姿貌身長八尺雄傑有大度安北將軍張華雅有知人之鑒廆童冠時往謁之華甚嘆異謂曰君至長必為命世之器匡難濟時者也因以所服簪幘遺廆結殷勤而別涉歸死其弟耐篡位將謀殺廆廆亡潛以避禍後國人殺耐迎廆立之初涉歸有憾於宇文鮮卑廆將修先君之怨表請討之武帝弗許廆怒入寇遼西殺略甚衆帝遣幽州諸軍討廆戰于肥如廆衆大敗自後復掠昌黎每歲不絕又率衆東伐扶餘扶餘王依慮自殺廆夷其國城驅萬餘人而歸東夷校尉何龕遣督護賈沈將迎立依慮之子為王廆遣其將孫丁率騎邀之沈力戰斬丁遂復扶餘之國廆謀於其衆曰吾先公以來世奉中國且華裔理殊強弱固別豈能與晉競乎何為不和以害吾百姓邪乃遣使來降帝嘉之拜為鮮卑都督廆致敬於東夷府巾衣詣門抗士大夫之禮何龕嚴兵引見廆乃改服戎衣而入人問其故廆曰主人不以禮賓復何為哉龕聞而慚之彌加敬憚時東胡宇文鮮卑段部以廆威德日廣懼有吞并之計因為寇掠往來不絕廆卑辭厚幣以撫之太康十年廆又遷于徒河之青山廆以大棘城即帝顓頊之墟也元康四年乃移居之教以農桑法制同于上國永寧中燕垂大水廆開倉振給幽方獲濟天子聞而嘉之褒賜命服太安初宇文莫圭遣弟屈雲寇邊城雲別帥大素延攻掠諸部廆親擊敗之素延怒率衆十萬圍棘城衆咸懼人無距志廆曰素延雖犬羊蟻聚然軍無法制已在吾計中矣諸君但為力戰無所憂也乃躬貫甲冑馳出擊之素延大敗追奔百里俘斬萬餘人永嘉初廆自稱鮮卑大單于遼東太守龐本以私憾殺東夷校尉李臻附塞鮮卑素連木津等託為臻報讎實欲因而為亂遂攻陷諸縣殺掠士庶太守袁謙頻戰失利校尉封釋懼而請和連歲寇掠百姓失業流亡歸附者日月相繼廆子翰言於廆曰求諸侯莫如勤王自古有為之君靡不杖此以成事業者也今連津跋扈王師覆敗蒼生屠膾豈甚此乎豎子外以龐本為名內實幸而為寇封使君以誅本請和而毒害滋深遼東傾沒垂已二周中原兵亂州師屢敗勤王杖義今其時也單于宜明九伐之威救倒懸之命數連津之罪合義兵以誅之上則興復遼邦下則并吞二部忠義彰於本朝私利歸于我國此則吾鴻漸之始也終可以得志於諸侯廆從之是日率騎討連津大敗斬之二部悉降徙之棘城立遼東郡而歸懷帝蒙塵于平陽王浚承制以廆為散騎常侍冠軍將軍前鋒大都督大單于廆不受建興中愍帝遣使拜廆鎮軍將軍昌黎遼東二國公建武初元帝承制拜廆假節散騎常侍都督遼左雜夷流人諸軍事龍驤將軍大單于昌黎公廆讓而不受征虜將軍魯昌說廆曰今兩京傾沒天子蒙塵琅邪承制江東實人命所係明公雄據海朔跨總一方而諸部猶怙衆稱兵未遵道化者蓋以官非王命又自以為強今宜通使琅邪勸承大統然後敷宣帝命以伐有罪誰敢不從廆善之乃遣其長史王濟浮海勸進及帝即尊位遣謁者陶遼重申前命授廆將軍單于廆固辭公封時二京傾覆幽冀淪陷廆刑政修明虛懷引納流亡士庶多襁負歸之廆乃立郡以統流人冀州人為冀陽郡豫州人為成周郡青州人為營丘郡并州人為唐國郡於是推舉賢才委以庶政以河東裴嶷代郡魯昌北平陽耽為謀主北海逢羨廣平游邃北平西方虔渤海封抽西河宋奭河東裴開為股肱渤海封弈平原宋該安定皇甫岌蘭陵繆愷以文章才儁任居樞要會稽朱左車太山胡毋翼魯國孔纂以舊德清重引為賓友平原劉讚儒學該通引為東庠祭酒其世子皝率國冑束脩受業焉廆覽政之暇親臨聽之於是路有頌聲禮讓興矣時平州刺史東夷校尉崔毖自以為南州士望意存懷集而流亡者莫有赴之毖意廆拘留乃陰結高句麗及宇文段國等謀滅廆以分其地太興初三國伐廆廆曰彼信崔毖虛說邀一時之利烏合而來耳既無統一莫相歸伏吾今破之必矣然彼軍初合其鋒甚銳幸我速戰若逆擊之落其計矣靖以待之必懷疑貳迭相猜防一則疑吾與毖譎而覆之二則自疑三國之中與吾有韓魏之謀者待其人情沮惑然後取之必矣於是三國攻棘城廆閉門不戰遣使送牛酒以犒宇文大言於衆曰崔毖昨有使至於是二國果疑宇文同於廆也引兵而歸宇文悉獨官曰二國雖歸吾當獨兼其國何用人為盡衆逼城連營三十里廆簡銳士配皝推鋒於前翰領精騎為奇兵從旁出直衝其營廆方陣而進悉獨官自恃其衆不設備見廆軍之至方率兵距之前鋒始交翰已入其營縱火焚之其衆皆震擾不知所為遂大敗悉獨官僅以身免盡俘其衆於其營候獲皇帝玉璽三紐遣長史裴嶷送于建鄴崔毖懼廆之仇己也使兄子燾偽賀廆會三國使亦至請和曰非我本意也崔平州教我耳廆將燾示以攻圍之處臨之以兵曰汝叔父教三國滅我何以詐來賀我乎燾懼首服廆乃遣燾歸說毖曰降者上策走者下策也以兵隨之毖與數十騎棄家室奔于高句麗廆悉降其衆徙燾及高瞻等于棘城待以賓禮明年高句麗寇遼東廆遣衆擊敗之裴嶷至自建鄴帝遣使者拜廆監平州諸軍事安北將軍平州刺史增邑二千戶尋加使持節都督幽州東夷諸軍事車騎將軍平州牧進封遼東郡公邑一萬戶常侍單于並如故丹書鐵券承制海東命備官司置平州守宰段末波初統其國而不修備廆遣皝襲之入令支收其名馬寶物而還石勒遣使通和廆距之送其使於建鄴勒怒遣宇文乞得龜擊廆廆遣皝距之以裴嶷為右部都督率索頭為右翼命其少子仁自平郭趣柏林為左翼攻乞得龜克之悉虜其衆乘勝拔其國城收其資用億計徙其人數萬戶以歸成帝即位加廆侍中位特進咸和五年又加開府儀同三司固辭不受廆嘗從容言曰獄者人命之所懸也不可以不慎賢人君子國家之基也不可以不敬稼穡者國之本也不可以不急酒色便佞亂德之甚也不可以不戒乃著家令數千言以申其旨遣使與太尉陶侃箋曰明公使君轂下振德曜威撫寧方夏勞心文武士馬無恙欽高仰止注情彌久王塗嶮遠隔以燕越每瞻江湄延首遐外天降艱難禍害屢臻舊都不守奄為虜庭使皇輿遷幸假勢吳楚大晉啟基祚流萬世天命未改玄象著明是以義烈之士深懷憤踴猥以功薄受國殊寵上不能掃除羣羯下不能身赴國難仍縱賊臣屢逼京輦王敦唱禍於前蘇峻肆毒於後凶暴過於董卓惡逆甚於傕氾普天率土誰不同忿深怪文武之士過荷朝榮不能滅中原之寇刷天下之恥君侯植根江陽發曜荊衡杖葉公之權有包胥之志而令白公伍員殆得極其暴竊為丘明恥之區區楚國子重之徒猶恥君弱羣臣不及先大夫厲己戒衆以服陳鄭越之種蠡尚能弼佐句踐取威黃池況今吳土英賢比肩而不輔翼聖主陵江北伐以義聲之直討逆暴之羯檄命舊邦之士招懷存本之人豈不若因風振落頓坂走輪哉且孫氏之初以長沙之衆摧破董卓志匡漢室雖中遇寇害雅志不遂原其心誠乃忽身命及權據揚越外杖周張內馮顧陸距魏赤壁克取襄陽自茲以降世主相襲咸能侵逼徐豫令魏朝旰食不知今之江表為賢儁匿智藏其勇略邪將呂蒙凌統高蹤曠世哉況今凶羯虐暴中州人士逼迫勢促其顛沛之危甚於累卵假號之強衆心所去敵有釁矣易可震蕩王郎袁術雖自詐偽皆基淺根微禍不旋踵此皆君侯之所聞見者矣王司徒清虛寡欲善於全己昔曹參亦崇此道著畫一之稱也庾公居元舅之尊處申伯之任超然高蹈明智之權廆於寇難之際受大晉累世之恩自恨絕域無益聖朝徒係心萬里望風懷憤今海內之望足為楚漢輕重者惟在君侯若勠力盡心悉五州之衆據兗豫之郊使向義之士倒戈釋甲則羯寇必滅國恥必除廆在一方敢不竭命孤軍輕進不足使勒畏首畏尾則懷舊之士欲為內應無由自發故也故遠陳寫言不宣盡廆使者遭風沒海其後廆更寫前箋并齎其東夷校尉封抽行遼東相韓矯等三十餘人疏上侃府曰自古有國有家鮮不極盛而衰自大晉龍興克平會神武之略邁蹤前史惠皇之末后黨構難禍結京畿釁成公族遂使羯寇乘虛傾覆諸夏舊都淪滅山陵毀掘人神悲悼幽明發憤昔獫狁之強匈奴之盛未有如今日羯寇之暴跨躡華裔盜稱尊號者也天祚有晉挺授英傑車騎將軍慕容廆自弱冠涖國忠於王室明允恭肅志在立勳屬海內分崩皇輿遷幸元皇中興初唱大業肅祖繼統蕩平江外廆雖限以山海隔以羯寇翹首引領係心京師常假寤寐欲憂國忘身貢篚相尋連舟載路戎不稅駕動成義舉今羯寇滔天怙其醜類樹基趙魏跨略燕齊廆雖率義衆誅討大逆然管仲相齊猶曰寵不足以御下況廆輔翼王室有匡霸之功而位卑爵輕九命未加非所以寵異藩翰敦奬殊勳者也方今詔命隔絕王路嶮遠貢使往來動彌年載今燕之舊壤北周沙漠東盡樂浪西暨代山南極冀方而悉為虜庭非復國家之域將佐等以為宜遠遵周室近準漢初進封廆為燕王行大將軍事上以總統諸部下以割損賊境使冀州之人望風向化廆得祗承詔命率合諸國奉辭夷逆以成桓文之功苟利社稷專之可也而廆固執謙光守節彌高每詔所加讓動積年非將佐等所能敦逼今區區所陳不欲苟相崇重而愚情至心實為國計侃報抽等書其略曰車騎將軍憂國忘身貢篚載路羯賊求和執使送之西討段國北伐塞外遠綏索頭荒服以獻惟北部未賓屢遣征伐又知東方官號高下齊班進無統攝之權退無等差之降欲進車騎為燕王一二具之夫功成進爵古之成制也車騎雖未能為官摧勒然忠義竭誠今騰牋上聽可不遲速當任天臺也朝議未定八年廆卒乃止時年六十五在位四十九年帝遣使者策贈大將軍開府儀同三司諡曰襄及儁僭號偽諡武宣皇帝裴嶷字文冀河東聞喜人也父昶司隸校尉嶷清方有幹略累遷至中書侍郎轉給事黃門郎滎陽太守屬天下亂嶷兄武先為玄菟太守嶷遂求為昌黎太守至郡久之武卒嶷被徵乃將武子開送喪俱南既達遼西道路梗塞乃與開投廆時諸流寓之士見廆草創並懷去就嶷首定名分為羣士啟行廆甚悅以嶷為長史委以軍國之謀及悉獨官寇逼城下外內騷動廆問策於嶷嶷曰悉獨官雖擁大衆軍無號令衆無部陣若簡精兵乘其無備則成擒耳廆從之遂陷寇營廆威德於此甚振將遣使獻捷於建鄴妙簡行人令嶷將命初朝廷以廆僻在荒遠猶以邊裔之豪處之嶷既使至盛言廆威略又知四海英賢並為其用舉朝改觀焉嶷將還帝試留嶷以觀之嶷辭曰臣世荷朝恩濯纓華省因事遠寄投迹荒遐今遭開泰得覩朝廷復賜恩詔即留京輦於臣之私誠為厚幸顧以皇居播遷山陵幽辱慕容龍驤將軍越在遐表乃心王室慷慨之誠義感天地方掃平中壤奉迎皇輿故遣使臣萬里表誠今若留臣必謂國家遺其僻陋孤其丹心使懷義懈怠是以微臣區區忘身為國貪還反命耳帝曰卿言是也乃遣嶷還廆後謂羣僚曰裴長史名重中朝而降屈于此豈非天以授孤也出為遼東相轉樂浪太守高瞻字子前渤海蓨人也少而英爽有俊才身長八尺二寸光熙中調補尚書郎屬永嘉之亂還鄉里乃與父老議曰今皇綱不振兵革雲擾此郡沃壤憑固河海若兵荒歲儉必為寇庭非謂圖安之所王彭祖先在幽薊據燕代之資兵強國富可以託也諸君以為何如衆咸善之乃與叔父隱率數千家北徙幽州既而以王浚政令無乃依崔毖隨毖如遼東毖之與三國謀伐廆也瞻固諫以為不可毖不從及毖奔敗瞻隨衆降于廆廆署為將軍瞻稱疾不起廆敬其姿器數臨候之撫其心曰君之疾在此不在餘也今天子播越四海分崩蒼生紛擾莫知所係孤思與諸君匡復帝室翦鯨豕于二京迎天子於吳會廓清八表侔勳古烈此孤之心也孤之願也君中州大族冠冕之餘宜痛心疾首枕戈待旦柰何以華夷之異有懷介然且大禹出于西羌文王生于東夷但問志略何如耳豈以殊俗不可降心乎瞻仍辭疾篤廆深不平之瞻又與宋該有隙該陰勸廆除之瞻聞其言彌不自安遂以憂死
